<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Code &mdash; Tutorial</title>
  <script>
    // Apply dark/light theme from URL before any paint to avoid a flash.
    (function () {
      var p = new URLSearchParams(location.search);
      if (p.get('dark') === '1') document.documentElement.classList.add('dark-mode');
    })();
  </script>
  <link rel="stylesheet" href="{{ '/css/tutorial.css' | relative_url }}">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    body { display: flex; flex-direction: column; background: #1e1e1e; color: #e8e8f0; }
    html:not(.dark-mode) body { background: #fff; color: #222; }
    .ttp-bar {
      display: flex; align-items: center; gap: 10px;
      padding: 6px 12px; background: #161618; border-bottom: 1px solid #2a2a2e;
      flex-shrink: 0; font-size: 12.5px;
    }
    html:not(.dark-mode) .ttp-bar { background: #f3f3f3; border-bottom-color: #d4d4d4; }
    .ttp-filename { font-weight: 600; color: #e8e8f0; }
    html:not(.dark-mode) .ttp-filename { color: #333; }
    .ttp-status { color: #888; font-size: 11.5px; margin-left: auto; }
    .ttp-status.ok { color: #4caf50; }
    .ttp-status.warn { color: #d4a017; }
    .ttp-status.bad { color: #c0392b; }
    .ttp-orphan {
      flex: 1; display: flex; align-items: center; justify-content: center;
      color: #888; font-size: 13px; text-align: center; padding: 24px; line-height: 1.5;
    }
    #editorRoot { flex: 1; min-height: 0; }
    .ttp-overlay {
      position: absolute; inset: 0; background: rgba(20,20,28,0.86); color: #ddd;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; z-index: 999; backdrop-filter: blur(2px);
    }
    html:not(.dark-mode) .ttp-overlay { background: rgba(255,255,255,0.92); color: #333; }
    .ttp-wrap { flex: 1; min-height: 0; position: relative; display: flex; flex-direction: column; }
  </style>
</head>
<body>
  <div class="ttp-bar">
    <span class="ttp-filename" id="filenameEl">&hellip;</span>
    <span class="ttp-status" id="statusEl">Connecting&hellip;</span>
  </div>
  <div class="ttp-wrap">
    <div id="editorRoot"></div>
    <div class="ttp-overlay" id="overlayEl">Waiting for tutorial&hellip;</div>
    <div class="ttp-orphan" id="orphanEl" style="display:none">
      This file isn&rsquo;t part of the current step.<br>
      <button class="tvm-btn" id="closeBtn" style="margin-top:14px">Close window</button>
    </div>
  </div>

  <script src="{{ '/js/tutorial-popout-client.js' | relative_url }}"></script>
  <script src="{{ '/js/monaco-sebook-langs.js' | relative_url }}"></script>
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs/loader.min.js"></script>
  <script>
  (function () {
    var filename = new URLSearchParams(location.search).get('filename') || '';
    if (!filename) {
      document.getElementById('overlayEl').textContent = 'Invalid popup URL (missing filename).';
      return;
    }

    var els = {
      filename: document.getElementById('filenameEl'),
      status:   document.getElementById('statusEl'),
      overlay:  document.getElementById('overlayEl'),
      orphan:   document.getElementById('orphanEl'),
      close:    document.getElementById('closeBtn'),
      editor:   document.getElementById('editorRoot'),
    };
    els.filename.textContent = filename;
    els.close.addEventListener('click', function () { window.close(); });

    // Editor state
    var editor = null;
    var monacoModel = null;
    var currentVersion = 0;
    var suppressEditEvents = false;

    var client = SebookPopoutClient.connect({
      role: 'tab:' + filename,
      statusEl: els.status,
      statusClass: 'ttp-status',
      overlayEl: els.overlay,
      onMessage: handleMessage,
      onDarkModeChange: function (enabled) {
        if (window.monaco) {
          monaco.editor.setTheme(window.SebookMonacoLangs ? (enabled ? 'sebook-dark' : 'sebook-light')
                                  : (enabled ? 'vs-dark' : 'vs'));
        }
      },
      getFinalState: function () {
        return { finalContent: monacoModel ? monacoModel.getValue() : null };
      },
    });

    document.title = filename + ' — ' + client.tutorialTitle;

    // ── Editor lifecycle ─────────────────────────────────────────────────
    function bootMonaco(content, language) {
      require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs' } });
      require(['vs/editor/editor.main'], function () {
        if (window.SebookMonacoLangs) window.SebookMonacoLangs.register(monaco);
        var lang = window.SebookMonacoLangs
          ? window.SebookMonacoLangs.languageForFile(filename, language)
          : (language || 'plaintext');
        var dark = document.documentElement.classList.contains('dark-mode');
        var theme = window.SebookMonacoLangs ? (dark ? 'sebook-dark' : 'sebook-light')
                                              : (dark ? 'vs-dark' : 'vs');
        monacoModel = monaco.editor.createModel(content || '', lang);
        editor = monaco.editor.create(els.editor, {
          model: monacoModel, theme: theme, fontSize: 14,
          minimap: { enabled: false }, scrollBeyondLastLine: false,
          automaticLayout: true, tabSize: 2, wordWrap: 'on',
          padding: { top: 8 },
        });

        var debounceTimer;
        function flushEdit() {
          clearTimeout(debounceTimer);
          currentVersion++;
          client.post('file-edit', {
            filename: filename, content: monacoModel.getValue(), version: currentVersion,
          });
        }
        editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, function () {
          // Flush latest edit immediately so main has the freshest content
          // before save side effects (autosave, React preview patch, UML).
          flushEdit();
          client.post('request-save', { filename: filename });
        });
        monacoModel.onDidChangeContent(function () {
          if (suppressEditEvents) return;
          clearTimeout(debounceTimer);
          debounceTimer = setTimeout(flushEdit, 30);
        });
      });
    }

    function applySnapshot(snap) {
      if (!snap || snap.filename !== filename) return;
      if (typeof snap.version === 'number') currentVersion = snap.version;
      if (typeof snap.darkMode === 'boolean') {
        document.documentElement.classList.toggle('dark-mode', snap.darkMode);
      }
      if (!editor) {
        bootMonaco(snap.content || '', snap.language || '');
      } else if (monacoModel.getValue() !== snap.content) {
        suppressEditEvents = true;
        try { monacoModel.setValue(snap.content || ''); }
        finally { suppressEditEvents = false; }
      }
      els.orphan.style.display = 'none';
      els.editor.style.display = '';
      client.markConnected();
    }

    function showOrphaned() {
      els.orphan.style.display = '';
      els.editor.style.display = 'none';
      client.setStatus('File not in current step', 'warn');
    }

    // ── Role-specific message routing ────────────────────────────────────
    function handleMessage(msg) {
      switch (msg.type) {
        case 'file-snapshot':
          if (msg.filename === filename) applySnapshot(msg);
          break;
        case 'state-snapshot':
          if (msg.files && msg.files[filename]) applySnapshot(msg.files[filename]);
          break;
        case 'step-change':
          // Mark orphaned if the new step doesn't include our file.
          if (Array.isArray(msg.fileList) && msg.fileList.indexOf(filename) === -1) {
            showOrphaned();
          }
          break;
        case 'save-confirmed':
          if (msg.filename === filename) client.flashStatus('Saved ✓', 'ok');
          break;
      }
    }
  })();
  </script>
</body>
</html>
