<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Code &mdash; Tutorial</title>
  <script>
    // Apply dark/light theme from URL before any paint to avoid a flash.
    (function () {
      var p = new URLSearchParams(location.search);
      if (p.get('dark') === '1') document.documentElement.classList.add('dark-mode');
    })();
  </script>
  <link rel="stylesheet" href="{{ '/css/tutorial.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/js/debugger/debugger.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/css/tutorial-popouts.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/css/print-light.css' | relative_url }}">
</head>
<body>
  <main aria-label="Code editor popout">
  <h1 class="sr-only">Code editor popout</h1>
  <div class="ttp-bar">
    <span class="ttp-filename" id="filenameEl">&hellip;</span>
    <span class="ttp-status" id="statusEl" role="status" aria-live="polite">Connecting&hellip;</span>
  </div>
  <div class="ttp-wrap">
    <div id="editorRoot"></div>
    <div class="ttp-overlay" id="overlayEl">Waiting for tutorial&hellip;</div>
    <div class="ttp-orphan is-hidden" id="orphanEl">
      This file isn&rsquo;t part of the current step.<br>
      <button class="tvm-btn ttp-close-btn" id="closeBtn">Close window</button>
    </div>
  </div>
  </main>

  <script src="{{ '/js/tutorial-popout-client.js' | relative_url }}"></script>
  <script src="{{ '/js/monaco-sebook-langs.js' | relative_url }}"></script>
  <script src="{{ '/js/tutorial-refactorings.js' | relative_url }}"></script>
  <script src="{{ '/js/debugger/sync.js' | relative_url }}"></script>
  <script src="{{ '/js/debugger/editor-attach.js' | relative_url }}"></script>
  <script src="{{ '/js/popout/shared-editor.js' | relative_url }}"></script>
  <script src="{{ '/js/vendor/monaco-editor/0.44.0/min/vs/loader.js' | relative_url }}"></script>
  <script>
    SebookSharedEditor.bootForRole({
      kind: 'tab',
      filename: new URLSearchParams(location.search).get('filename') || '',
      els: {
        filename: document.getElementById('filenameEl'),
        status:   document.getElementById('statusEl'),
        overlay:  document.getElementById('overlayEl'),
        orphan:   document.getElementById('orphanEl'),
        close:    document.getElementById('closeBtn'),
        editor:   document.getElementById('editorRoot'),
      },
    });
  </script>
</body>
</html>
