<!DOCTYPE html>
<html lang="en">

{% include head.html %}

<body id="page-top">

  <!-- Navbar — same style as SEBook but simplified -->
  <nav class="navbar top-nav-collapse navbar-inverse navbar-fixed-top" id="navnav">
    <div class="container-fluid">
      <div class="navbar-header page-scroll">
        <a class="navbar-brand" href="/SEBook">
          <i class="fa fa-arrow-left"></i> SE Book
        </a>
        <span class="navbar-brand" style="color: #fff; font-weight: 600;">
          {{ page.title }}
        </span>
      </div>
    </div>
  </nav>

  <!-- Tutorial container — full viewport below navbar -->
  <div class="tutorial-page" style="margin-top: 52px;">
    <div id="tutorial-container"></div>
  </div>

  <!-- Tutorial styles -->
  <link rel="stylesheet" href="{{ '/css/tutorial.css' | relative_url }}">

  <!-- Tutorial engine -->
  <script src="{{ '/js/tutorial-vm.js' | relative_url }}"></script>

  <!-- Initialize tutorial with data from _data/tutorials/ -->
  {% assign tutorial_data = site.data.tutorials[page.tutorial] %}
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var config = {{ tutorial_data | jsonify }};
      var tutorial = new TutorialVM('#tutorial-container', {
        steps: config.steps,
        v86Path: '{{ page.v86_path | default: "/assets/v86" }}',
        vmPath: '{{ page.vm_path | default: "/vm/dist" }}',
        memoryMB: {{ page.memory_mb | default: 256 }},
        fontSize: {{ page.font_size | default: 14 }},
      });
      tutorial.start();
    });
  </script>

  <!-- Only load jQuery + Bootstrap (skip portfolio/carousel scripts) -->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.2/js/bootstrap.min.js"></script>

</body>
</html>
