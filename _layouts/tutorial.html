<!DOCTYPE html>
<html lang="en">

{% include head.html %}
<meta name="pdf-url" content="{{ page.url | replace: '.html', '' }}/print">

<body id="page-top">

  <!-- Navbar — same style as SEBook but simplified -->
  <nav class="navbar top-nav-collapse navbar-inverse navbar-fixed-top" id="navnav">
    <div class="container-fluid">
      <div class="navbar-header page-scroll" style="display: flex; align-items: center; height: 45px;">
        <a class="navbar-brand" href="/SEBook" style="display: flex; align-items: center; height: 100%; padding-top: 0; padding-bottom: 0; padding-left: 15px; font-size: 20px; font-weight: 400; text-decoration: none;">
          <i class="fa fa-arrow-left" style="margin-right: 10px; font-size: 18px;"></i> SE Book
        </a>
        <span class="navbar-brand" style="display: flex; align-items: center; height: 100%; padding-top: 0; padding-bottom: 0; color: #fff; font-size: 20px; font-weight: 600; margin-left: 5px;">
          {{ page.title }}
        </span>
      </div>
      <div class="navbar-right" style="display:flex; align-items:center; height:45px; padding-right:16px; gap:14px;">
        <a id="solutionBtn" href="#"
           style="display:none; color:#fff; font-size:14px; font-weight:600; text-decoration:none; align-items:center; gap:5px;"
           title="Apply solution for current step">
          <i class="fa fa-key"></i> Solution
        </a>
        <a id="printBtn" href="{{ page.url | replace: '.html', '' }}/print" target="_blank"
           style="color:#fff; font-size:14px; font-weight:600; text-decoration:none; display:flex; align-items:center; gap:5px;" title="Print view">
          <i class="fa fa-print"></i> Print
        </a>
        <label style="display:flex; align-items:center; gap:8px; cursor:pointer; margin:0; color:#fff; font-size:13px; font-weight:600;">
          Dark mode
          <span class="tvm-dark-toggle-wrap">
            <input type="checkbox" id="darkModeToggle" style="display:none;">
            <span class="tvm-dark-toggle-track">
              <span class="tvm-dark-toggle-thumb"></span>
            </span>
          </span>
        </label>
      </div>
    </div>
  </nav>

  <script>
    (function () {
      function setCookie(name, value, days) {
        var d = new Date();
        d.setTime(d.getTime() + (days * 24 * 60 * 60 * 1000));
        document.cookie = name + '=' + value + ';expires=' + d.toUTCString() + ';path=/;SameSite=Lax';
      }
      function getCookie(name) {
        var nameEQ = name + '=', ca = document.cookie.split(';');
        for (var i = 0; i < ca.length; i++) {
          var c = ca[i]; while (c.charAt(0) === ' ') c = c.substring(1);
          if (c.indexOf(nameEQ) === 0) return c.substring(nameEQ.length);
        }
        return null;
      }
      function initDarkMode() {
        var toggle = document.getElementById('darkModeToggle');
        if (!toggle) return;
        var isDark = getCookie('dark-mode') === 'true';
        toggle.checked = isDark;
        toggle.addEventListener('change', function () {
          document.documentElement.classList.add('dark-mode-transition');
          if (this.checked) {
            document.documentElement.classList.add('dark-mode');
          } else {
            document.documentElement.classList.remove('dark-mode');
          }
          setCookie('dark-mode', this.checked, 300);
          setTimeout(function () {
            document.documentElement.classList.remove('dark-mode-transition');
          }, 300);
        });
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initDarkMode);
      } else {
        initDarkMode();
      }

      // Intercept print (Ctrl/Cmd+P and File > Print) — open the
      // dedicated print view instead of printing the live tutorial UI.
      var PRINT_URL = '{{ page.url | replace: ".html", "" | relative_url }}/print?autoprint=1'
        + (window.location.search.indexOf('instructor-mode=true') !== -1 ? '&instructor-mode=true' : '');
      document.addEventListener('keydown', function (e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'p') {
          e.preventDefault();
          window.open(PRINT_URL, '_blank');
        }
      });
      window.addEventListener('beforeprint', function () {
        window.open(PRINT_URL, '_blank');
      });
    })();
  </script>

  <!-- Tutorial container — full viewport below navbar -->
  <div class="tutorial-page">
    <div id="tutorial-container"></div>
  </div>

  <!-- Tutorial styles -->
  <link rel="stylesheet" href="{{ '/css/tutorial.css' | relative_url }}">

  <!-- Tutorial engine — unified (v86 / pyodide / webcontainer) -->
  <script src="{{ '/js/tutorial-code.js' | relative_url }}"></script>

  {% assign tutorial_data = site.data.tutorials[page.tutorial] %}
  {% assign tutorial_backend = tutorial_data.backend | default: 'v86' %}

  {% if tutorial_backend == 'webcontainer' %}
  <!-- Register Cross-Origin Isolation service worker required by WebContainers -->
  <script>
    (function () {
      if (window.crossOriginIsolated) return; // already isolated — no action needed
      if (!('serviceWorker' in navigator)) return;
      navigator.serviceWorker.register('{{ "/js/coi-serviceworker.js" | relative_url }}')
        .then(function (reg) {
          function reload() { window.location.reload(); }
          if (reg.installing) {
            reg.installing.addEventListener('statechange', function () {
              if (this.state === 'installed') reload();
            });
          } else if (reg.active) {
            reload();
          }
        });
    })();
  </script>
  {% endif %}

  <!-- Initialize tutorial with data from _data/tutorials/ -->
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var config = {{ tutorial_data | jsonify }};
      // Server-side markdown rendering (Rouge syntax highlighting)
      var instructionHTML = [{% for step in tutorial_data.steps %}{{ step.instructions | markdownify | jsonify }}{% unless forloop.last %},{% endunless %}{% endfor %}];
      config.steps.forEach(function (step, i) { step.instructionsHTML = instructionHTML[i]; });

      // Pre-render solution explanation markdown (same Rouge highlighting)
      var solutionExplanationHTML = [{% for step in tutorial_data.steps %}{% if step.solution.explanation %}{{ step.solution.explanation | markdownify | jsonify }}{% else %}null{% endif %}{% unless forloop.last %},{% endunless %}{% endfor %}];
      config.steps.forEach(function (step, i) {
        if (step.solution && solutionExplanationHTML[i]) {
          step.solution.explanationHTML = solutionExplanationHTML[i];
        }
      });

      var instructorMode = new URLSearchParams(window.location.search).get('instructor-mode') === 'true';

      var tutorial = new TutorialCode('#tutorial-container', {
        backend:      '{{ tutorial_backend }}',
        steps:        config.steps,
        setupCommands: config.setup_commands || [],
        requireTests: config.require_tests || false,
        instructorMode: instructorMode,
        v86Path:  '{{ page.v86_path  | default: "/assets/v86" }}',
        vmPath:   '{{ page.vm_path   | default: "/vm/dist" }}',
        memoryMB: {{ page.memory_mb  | default: 256 }},
        fontSize: {{ page.font_size  | default: 14 }},
        workerPath:    '{{ "/js/pyodide-worker.js" | relative_url }}',
        sqlWorkerPath: '{{ "/js/sql-worker.js"    | relative_url }}',
        prologWorkerPath: '{{ "/js/prolog-worker.js" | relative_url }}',
      });
      tutorial.start();

      // Instructor mode: show and wire Solution button + update Print link
      if (instructorMode) {
        var solBtn = document.getElementById('solutionBtn');
        if (solBtn) {
          solBtn.style.display = 'flex';
          solBtn.addEventListener('click', function (e) {
            e.preventDefault();
            tutorial.applySolution();
          });
        }
        var printBtn = document.getElementById('printBtn');
        if (printBtn) {
          printBtn.href += '?instructor-mode=true';
        }
      }
    });
  </script>

  <!-- Only load jQuery + Bootstrap (skip portfolio/carousel scripts) -->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.2/js/bootstrap.min.js"></script>

</body>
</html>
