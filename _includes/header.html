<!-- Page Header -->
<header class="intro-header">
  <div class="container">
    <script>
      (function () {
        function setCookie(name, value, days) {
          const d = new Date();
          d.setTime(d.getTime() + (days * 24 * 60 * 60 * 1000));
          const expires = "expires=" + d.toUTCString();
          document.cookie = name + "=" + value + ";" + expires + ";path=/;SameSite=Lax";
        }

        function getCookie(name) {
          const nameEQ = name + "=";
          const ca = document.cookie.split(';');
          for (let i = 0; i < ca.length; i++) {
            let c = ca[i];
            while (c.charAt(0) == ' ') c = c.substring(1, c.length);
            if (c.indexOf(nameEQ) == 0) return c.substring(nameEQ.length, c.length);
          }
          return null;
        }

        function initDarkMode() {
          const toggle = document.getElementById('darkModeToggle');
          if (!toggle) return;

          const saved = getCookie('dark-mode');
          const isDark = saved === 'true';
          toggle.checked = isDark;

          toggle.addEventListener('change', function () {
            document.documentElement.classList.add('dark-mode-transition');
            if (this.checked) {
              document.documentElement.classList.add('dark-mode');
            } else {
              document.documentElement.classList.remove('dark-mode');
            }
            setCookie('dark-mode', this.checked, 300);
            setTimeout(() => {
              document.documentElement.classList.remove('dark-mode-transition');
            }, 300);
          });
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', initDarkMode);
        } else {
          initDarkMode();
        }
      })();
    </script>

    <div class="row portrait">
      <div class="col-md-4 col-md-offset-4 col-sm-6 col-sm-offset-3 col-xs-12">
        <img class="portrait-oval" src="{{ site.portrait }}" alt="portrait">
      </div>
    </div>

    <div class="row text-center">
      <br>
      <h1>{{ site.authortitle }} {{ site.author }}</h1>
      {% if site.authorexplain and site.authorexplainname %}
      <a data-toggle="collapse" href="#authorexplain">{{ site.authorexplainname }}</a>
      <div class="collapse bibtex" id="authorexplain">
        <p>{{ site.authorexplain }}</p>
      </div>
      <br>
      {% endif %}
    </div>
    <br>
    <hr class="small">
    <br>
    <p class="lead">{{ site.subheading }}</p>
  </div>
  </div>
  <noscript>
    <div class="row">
      <div class="col-md-8 col-md-offset-2 text-center">
        <div class="alert alert-danger" role="alert">Enable JavaScript to unlock Galleries, BibTeXs, and the Contact
          Form.</div>
      </div>
    </div>
  </noscript>
  </div>
</header>
