
<div class="custom-audio-player">
    <audio preload="metadata">
        <source src="{{ include.src }}" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>
    
    <button class="play-pause-btn" title="Play/Pause">
        <i class="fa-solid fa-play"></i>
    </button>
    
    <div class="progress-container">
        <span class="time current">0:00</span>
        <input type="range" value="0" min="0" max="100" step="0.1">
        <span class="time total">0:00</span>
    </div>
    
    <div class="controls-right">
        <div class="speed-control">
            <select title="Playback Speed">
                <option value="0.5">0.5x</option>
                <option value="0.75">0.75x</option>
                <option value="1" selected>1.0x</option>
                <option value="1.25">1.25x</option>
                <option value="1.5">1.5x</option>
                <option value="1.75">1.75x</option>
                <option value="2">2.0x</option>
            </select>
        </div>

        <div class="volume-control">
            <i class="fa-solid fa-volume-up" title="Mute/Unmute"></i>
            <input type="range" value="1" min="0" max="1" step="0.05">
        </div>
    </div>
</div>
