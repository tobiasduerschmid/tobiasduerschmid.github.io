
<!-- Videos -->
<section id="videos">
  <div class="container">

    <div class="row">
      <div class="col-lg-12 text-center">
        <h2 class="page-header">Videos</h2>
      </div>
    </div>
    {% assign videos = site.data.videos.videos %}
    {% for v in videos %}
    <div class="row">
	  <div class="col-sm-8 col-sm-offset-2">
	    <section class="video-item" aria-label="{{ v.title | escape }}">
        <div class="col-sm-12">
          {% include youtube_embed.html id=v.id title=v.title description=v.description %}
		</div>
		</section>
      </div>
    </div>
    {% endfor %}
  </div>
</section>
