<div id="carousel-example-generic" class="carousel slide" data-ride="carousel"
  aria-roledescription="carousel" aria-label="Photography gallery">
  <div class="carousel-indicators" role="group" aria-label="Choose gallery slide">
    <button type="button" data-target="#carousel-example-generic" data-slide-to="0" class="active" aria-current="true" aria-label="Go to slide 1"></button>
    <button type="button" data-target="#carousel-example-generic" data-slide-to="1" aria-label="Go to slide 2"></button>
    <button type="button" data-target="#carousel-example-generic" data-slide-to="2" aria-label="Go to slide 3"></button>
    <button type="button" data-target="#carousel-example-generic" data-slide-to="3" aria-label="Go to slide 4"></button>
    <button type="button" data-target="#carousel-example-generic" data-slide-to="4" aria-label="Go to slide 5"></button>
    <button type="button" data-target="#carousel-example-generic" data-slide-to="5" aria-label="Go to slide 6"></button>
    <button type="button" data-target="#carousel-example-generic" data-slide-to="6" aria-label="Go to slide 7"></button>
    <button type="button" data-target="#carousel-example-generic" data-slide-to="7" aria-label="Go to slide 8"></button>
    <button type="button" data-target="#carousel-example-generic" data-slide-to="8" aria-label="Go to slide 9"></button>
    <button type="button" data-target="#carousel-example-generic" data-slide-to="9" aria-label="Go to slide 10"></button>
    <button type="button" data-target="#carousel-example-generic" data-slide-to="10" aria-label="Go to slide 11"></button>
  </div>
  <div class="carousel-inner" aria-live="polite" aria-atomic="false">
    <div class="item active">
      <img alt="Close-up of a dog's eyes seen through a white fence." src="img/photography/img_1.jpg">
    </div>
    <div class="item">
      <img alt="Pittsburgh skyline at sunset with rivers and bridges below a dramatic cloudscape." src="img/photography/img_2.jpg">
    </div>
    <div class="item">
      <img alt="Black-and-white seagull on a wooden post with a suspension bridge in the background." src="img/photography/img_4.jpg">
    </div>
    <div class="item">
      <img alt="Macro photograph of a butterfly feeding on bright orange flowers." src="img/photography/img_9.jpg">
    </div>
    <div class="item">
      <img alt="Black-and-white waterfront scene with a runner silhouetted against the Manhattan skyline." src="img/photography/img_6.jpg">
    </div>
    <div class="item">
      <img alt="Symmetrical vaulted arcade with ornate painted ceiling tiles and arches." src="img/photography/img_10.jpg">
    </div>
    <div class="item">
      <img alt="Squirrel standing on a tree stump in a softly blurred woodland." src="img/photography/img_8.jpg">
    </div>
    <div class="item">
      <img alt="Jefferson Memorial at sunrise framed by cherry blossoms across the water." src="img/photography/img_7.jpg">
    </div>
    <div class="item">
      <img alt="Snow-covered footbridge leading to a small stone building at sunrise." src="img/photography/img_3.jpg">
    </div>
    <div class="item">
      <img alt="Brooklyn Bridge walkway at golden hour with one person walking toward the tower." src="img/photography/img_5.jpg">
    </div>
    <div class="item">
      <img alt="Close-up of a human eye with a watch face reflected in the iris." src="img/photography/img_11.jpg">
    </div>
  </div>
  <a class="left carousel-control" href="#carousel-example-generic" role="button" data-slide="prev" aria-label="Previous slide">
    <span class="glyphicon glyphicon-chevron-left" aria-hidden="true"></span>
    <span class="sr-only">Previous slide</span>
  </a>
  <a class="right carousel-control" href="#carousel-example-generic" role="button" data-slide="next" aria-label="Next slide">
    <span class="glyphicon glyphicon-chevron-right" aria-hidden="true"></span>
    <span class="sr-only">Next slide</span>
  </a>
  {% include carousel_pause.html target="#carousel-example-generic" %}
  <script>
    (function () {
      document.querySelectorAll('#carousel-example-generic .carousel-indicators [data-slide-to]').forEach(function (dot) {
        dot.addEventListener('keydown', function (e) {
          if (e.key === 'Enter' || e.key === ' ' || e.key === 'Spacebar') {
            e.preventDefault();
            if (window.jQuery) window.jQuery('#carousel-example-generic').carousel(parseInt(dot.getAttribute('data-slide-to'), 10));
            else dot.click();
          }
        });
      });
      if (window.jQuery) {
        window.jQuery('#carousel-example-generic').on('slid.bs.carousel', function () {
          document.querySelectorAll('#carousel-example-generic .carousel-indicators [data-slide-to]').forEach(function (dot) {
            var active = dot.classList.contains('active');
            if (active) dot.setAttribute('aria-current', 'true');
            else dot.removeAttribute('aria-current');
          });
        });
      }
    })();
  </script>
</div>
