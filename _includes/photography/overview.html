<div id="carousel-example-generic" class="carousel slide" data-ride="carousel"
  aria-roledescription="carousel" aria-label="Photography gallery">
  <ol class="carousel-indicators">
    <li data-target="#carousel-example-generic" data-slide-to="0" class="active" aria-label="Go to slide 1"></li>
    <li data-target="#carousel-example-generic" data-slide-to="1" aria-label="Go to slide 2"></li>
    <li data-target="#carousel-example-generic" data-slide-to="2" aria-label="Go to slide 3"></li>
    <li data-target="#carousel-example-generic" data-slide-to="3" aria-label="Go to slide 4"></li>
    <li data-target="#carousel-example-generic" data-slide-to="4" aria-label="Go to slide 5"></li>
    <li data-target="#carousel-example-generic" data-slide-to="5" aria-label="Go to slide 6"></li>
    <li data-target="#carousel-example-generic" data-slide-to="6" aria-label="Go to slide 7"></li>
    <li data-target="#carousel-example-generic" data-slide-to="7" aria-label="Go to slide 8"></li>
    <li data-target="#carousel-example-generic" data-slide-to="8" aria-label="Go to slide 9"></li>
    <li data-target="#carousel-example-generic" data-slide-to="9" aria-label="Go to slide 10"></li>
    <li data-target="#carousel-example-generic" data-slide-to="10" aria-label="Go to slide 11"></li>
  </ol>
  <div class="carousel-inner">
    <div class="item active">
      <img alt="Photograph 1" src="img/photography/img_1.jpg">
    </div>
    <div class="item">
      <img alt="Photograph 2" src="img/photography/img_2.jpg">
    </div>
    <div class="item">
      <img alt="Photograph 3" src="img/photography/img_4.jpg">
    </div>
    <div class="item">
      <img alt="Photograph 4" src="img/photography/img_9.jpg">
    </div>
    <div class="item">
      <img alt="Photograph 5" src="img/photography/img_6.jpg">
    </div>
    <div class="item">
      <img alt="Photograph 6" src="img/photography/img_10.jpg">
    </div>
    <div class="item">
      <img alt="Photograph 7" src="img/photography/img_8.jpg">
    </div>
    <div class="item">
      <img alt="Photograph 8" src="img/photography/img_7.jpg">
    </div>
    <div class="item">
      <img alt="Photograph 9" src="img/photography/img_3.jpg">
    </div>
    <div class="item">
      <img alt="Photograph 10" src="img/photography/img_5.jpg">
    </div>
    <div class="item">
      <img alt="Photograph 11" src="img/photography/img_11.jpg">
    </div>
  </div>
  <a class="left carousel-control" href="#carousel-example-generic" role="button" data-slide="prev" aria-label="Previous slide">
    <span class="glyphicon glyphicon-chevron-left" aria-hidden="true"></span>
    <span class="sr-only">Previous (Zurück)</span>
  </a>
  <a class="right carousel-control" href="#carousel-example-generic" role="button" data-slide="next" aria-label="Next slide">
    <span class="glyphicon glyphicon-chevron-right" aria-hidden="true"></span>
    <span class="sr-only">Next (Weiter)</span>
  </a>
  {% include carousel_pause.html target="#carousel-example-generic" %}
</div>
