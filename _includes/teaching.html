<!-- Teaching -->
<section id="teaching">
  <div class="container">

    <div class="row">
      <div class="col-lg-12 text-center">
        <h2 class="page-header">Teaching</h2>
      </div>
    </div>

    <div class="row" style="display: flex; flex-wrap: wrap;">
      {% assign terms = site.data.teaching.teaching %}
      {% for t in terms reversed %}
      <div class="col-md-6 col-sm-12 col-xs-12" style="display: flex; margin-bottom: 20px;">
        <div class="panel panel-default" style="width: 100%; display: flex; flex-direction: column; margin-bottom: 0;">

          <div class="panel-heading">{{ t.term }}</div>
          <div class="panel-body">
            <ul>{% for c in t.courses %}
              <li>
                <h4>{{ c.course }}</h4>
                <span class="text-danger">{{ c.type }}</span>, {{ c.role }}
              </li>{% endfor %}
            </ul>
          </div>
        </div>
      </div>
      {% endfor %}

    </div>

  </div>
</section>
