{%- comment -%}
  Compatibility loader for the retired standalone hero variants.

  - Renders the canonical customizable hero once inside an inert <template>.
  - At page load, the script clones it into every legacy
    [data-gym-hero-slot] element on the page.
  - When prefers-reduced-motion is "reduce", <animate> / <animateTransform>
    elements are stripped from the clone before insertion so the chosen
    superhero shows but does not move.
  - The former named SVG includes now delegate to this same renderer, so visual,
    accessibility, and reduced-motion fixes have one source of truth.
{%- endcomment -%}
<template id="se-gym-hero-variants" aria-hidden="true">
  <div data-hero-variant="canonical">{% include se-gym-hero.svg variant="legacy-cycle" ready=true %}</div>
</template>
<script>
  (function () {
    var template = document.getElementById('se-gym-hero-variants');
    var slots = document.querySelectorAll('[data-gym-hero-slot]');
    if (!template || !slots.length) return;

    var variants = template.content.children;
    if (!variants.length) return;

    var pick = variants[Math.floor(Math.random() * variants.length)];
    var sourceSvg = pick.querySelector('svg');
    if (!sourceSvg) return;

    var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    slots.forEach(function (slot) {
      var clone = sourceSvg.cloneNode(true);
      if (reduced) {
        clone.querySelectorAll('animate, animateTransform, animateMotion, set').forEach(function (n) {
          n.remove();
        });
      }
      clone.setAttribute('data-hero-variant', pick.getAttribute('data-hero-variant'));
      slot.replaceChildren(clone);
    });
  })();
</script>
