{% assign hero_variant = include.variant | default: "main" %}
<svg xmlns="http://www.w3.org/2000/svg" viewBox="50 -20 700 665" class="se-gym-hero-svg se-gym-hero-svg-{{ hero_variant }}" data-gym-hero-svg data-hero-body="athletic" aria-hidden="true" focusable="false" preserveAspectRatio="xMidYMid meet">
