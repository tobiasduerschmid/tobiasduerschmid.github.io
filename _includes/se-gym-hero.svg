         Drawn BEFORE the head-assembly so long hair drapes naturally
         OVER the arms. Arms never cross the face area (x=357–443),
         so face visibility is preserved at all rotation angles.
         Bones do not stretch or morph: they ROTATE around joints.
           • Upper arm bone (108 px) rotates around the SHOULDER joint
           • Forearm bone (109 px) rotates around the ELBOW joint
             (nested inside the upper arm so the elbow tracks it)
         Motion (2.2 s overhead-press cycle, sync'd with barbell-lift):
           • At t=0,1 (barbell UP):  α=−4°/+4°, β=+8°/−8° → soft lockout
           • At t=0.55 (barbell DOWN):
                LEFT:  α=−28°  β=+56°
