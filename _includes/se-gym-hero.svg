      <stop offset=".25" stop-color="var(--hero-hair-light, #4a3220)" stop-opacity=".4"/>
      <stop offset="1" stop-color="var(--hero-hair, #1f140c)" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hair-sheen-{{ hero_variant }}" cx=".35" cy=".2" r=".8">
