{% assign hero_variant = include.variant | default: "main" %}
<svg xmlns="http://www.w3.org/2000/svg" viewBox="50 -20 700 665" class="se-gym-hero-svg se-gym-hero-svg-{{ hero_variant }}" data-gym-hero-svg data-hero-body="athletic" aria-hidden="true" focusable="false" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="suit-{{ hero_variant }}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--hero-suit-light, #4393d2)"/><stop offset=".55" stop-color="var(--hero-suit, #1F6EBD)"/><stop offset="1" stop-color="var(--hero-suit-dark, #0c4a87)"/></linearGradient>
    <linearGradient id="cape-grad-{{ hero_variant }}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--hero-cape-light, #3B8AD8)"/><stop offset=".55" stop-color="var(--hero-cape, #15538f)"/><stop offset="1" stop-color="var(--hero-cape-dark, #001F38)"/></linearGradient>
    <linearGradient id="cape-inner-{{ hero_variant }}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--hero-cape-inner-light, #FFE470)"/><stop offset="1" stop-color="var(--hero-cape-inner, #B38B00)"/></linearGradient>
