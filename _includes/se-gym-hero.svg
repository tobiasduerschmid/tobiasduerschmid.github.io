      <stop offset=".36" stop-color="var(--hero-hair-light, #4a3220)" stop-opacity=".74"/>
      <stop offset=".72" stop-color="var(--hero-hair-light, #4a3220)" stop-opacity=".22"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="hair-comic-shadow-{{ hero_variant }}" gradientUnits="userSpaceOnUse" x1="360" y1="158" x2="440" y2="176">
