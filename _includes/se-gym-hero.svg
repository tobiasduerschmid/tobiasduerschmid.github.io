    <style>
      .se-gym-hero-svg-{{ hero_variant }} [data-hero-slot="hair"]{clip-path:url(#hair-shoulder-clip-{{ hero_variant }});filter:url(#hair-depth-{{ hero_variant }});}
      .se-gym-hero-svg-{{ hero_variant }} [data-hero-slot="hair"] path,
      .se-gym-hero-svg-{{ hero_variant }} [data-hero-slot="hairline"] path,
      .se-gym-hero-svg-{{ hero_variant }} [data-hero-slot="hair-root"] path{vector-effect:non-scaling-stroke;}
      .se-gym-hero-svg-{{ hero_variant }} .hero-milestone-shoe-plate{fill:url(#milestone-metal-{{ hero_variant }});stroke:var(--hero-milestone-metal-dark, #6b3e1d);stroke-linejoin:round;}
      .se-gym-hero-svg-{{ hero_variant }} .hero-milestone-shoe-line{fill:none;stroke:var(--hero-milestone-metal-light, #f5d2a5);stroke-linecap:round;}
      .se-gym-hero-svg-{{ hero_variant }} .hero-milestone-shoe-jewel{fill:url(#milestone-jewel-{{ hero_variant }});stroke:var(--hero-milestone-metal-light, #f5d2a5);}
      .se-gym-hero-svg-{{ hero_variant }} [data-hero-head-assembly] [data-hero-option="chain-necklace"],
      .se-gym-hero-svg-{{ hero_variant }} [data-hero-head-assembly] [data-hero-option="delicate-pendant-necklace"],
      .se-gym-hero-svg-{{ hero_variant }} [data-hero-head-assembly] [data-hero-option="cross-pendant"],
      .se-gym-hero-svg-{{ hero_variant }} [data-hero-head-assembly] [data-hero-option="six-point-star-pendant"],
      .se-gym-hero-svg-{{ hero_variant }} [data-hero-head-assembly] [data-hero-option="wheel-pendant"],
      .se-gym-hero-svg-{{ hero_variant }} [data-hero-head-assembly] [data-hero-option="sacred-syllable-pendant"],
      .se-gym-hero-svg-{{ hero_variant }} [data-hero-head-assembly] [data-hero-option="open-hand-pendant"],
      .se-gym-hero-svg-{{ hero_variant }} [data-hero-head-assembly] [data-hero-option="campus-lanyard"],
      .se-gym-hero-svg-{{ hero_variant }} [data-hero-head-assembly] [data-hero-option="student-id-badge"],
      .se-gym-hero-svg-{{ hero_variant }} [data-hero-head-assembly] [data-hero-option="backpack-straps"],
      .se-gym-hero-svg-{{ hero_variant }} [data-hero-head-assembly] [data-hero-option="messenger-bag"],
      .se-gym-hero-svg-{{ hero_variant }} [data-hero-head-assembly] [data-hero-option="circuit-pin"],
      .se-gym-hero-svg-{{ hero_variant }} [data-hero-head-assembly] [data-hero-option="code-patch"],
      .se-gym-hero-svg-{{ hero_variant }} [data-hero-head-assembly] [data-hero-option="utility-belt"]{transform:scale(.8928571429);transform-box:view-box;transform-origin:400px 252px;}
    </style>
