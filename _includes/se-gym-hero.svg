    <g id="shoulder-hair-backfill-{{ hero_variant }}">
      <path d="M 346 178 C 340 136, 363 104, 400 102 C 437 104, 460 136, 454 178 C 442 166, 423 158, 404 159 C 401 158, 399 158, 396 159 C 377 158, 358 166, 346 178 Z" fill="url(#hair-grad-{{ hero_variant }})"/>
      <path d="M 344 174 C 334 214, 338 264, 354 296 C 362 304, 374 302, 380 290 C 368 256, 367 218, 378 182 C 364 174, 354 171, 344 174 Z" fill="url(#hair-grad-{{ hero_variant }})"/>
      <path d="M 456 174 C 466 214, 462 264, 446 296 C 438 304, 426 302, 420 290 C 432 256, 433 218, 422 182 C 436 174, 446 171, 456 174 Z" fill="url(#hair-grad-{{ hero_variant }})"/>
