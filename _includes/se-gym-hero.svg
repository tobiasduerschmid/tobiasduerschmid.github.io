    <clipPath id="comic-crown-hair-clip-{{ hero_variant }}" clipPathUnits="userSpaceOnUse">
      <path d="M 350 180 C 346 140, 368 108, 400 106 C 432 108, 454 140, 450 180 C 436 166, 418 158, 400 158 C 382 158, 364 166, 350 180 Z"/>
    </clipPath>
    <g id="comic-crown-hair-detail-{{ hero_variant }}" clip-path="url(#comic-crown-hair-clip-{{ hero_variant }})">
      <!-- Soft crown highlight band — no interior zigzag strokes. -->
      <path d="M 356 164 C 366 136, 386 118, 404 120 C 422 122, 438 136, 446 156 C 426 147, 408 145, 390 150 C 374 154, 364 160, 356 164 Z" fill="url(#hair-comic-highlight-{{ hero_variant }})" opacity=".4"/>
      <!-- Soft crown shadow band along the lower edge (cubic curves only). -->
      <path d="M 350 174 C 366 164, 383 158, 400 158 C 417 158, 434 164, 450 174 C 448 178, 446 181, 444 184 C 431 176, 416 168, 400 168 C 384 168, 369 176, 356 184 C 354 181, 352 178, 350 174 Z" fill="url(#hair-comic-shadow-{{ hero_variant }})" opacity=".22"/>
    </g>
    <linearGradient id="bruin-fur-{{ hero_variant }}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--hero-bruin-fur-light, #a06840)"/><stop offset=".55" stop-color="var(--hero-bruin-fur, #8b5a35)"/><stop offset="1" stop-color="var(--hero-bruin-fur-dark, #3d2515)"/></linearGradient>
    <radialGradient id="bruin-muzzle-{{ hero_variant }}" cx=".42" cy=".22" r=".85"><stop offset="0" stop-color="#fff2d4"/><stop offset=".58" stop-color="var(--hero-bruin-muzzle, #d0a070)"/><stop offset="1" stop-color="var(--hero-bruin-fur-light, #a06840)"/></radialGradient>
    <g id="hair-temple-roots-{{ hero_variant }}">
      <path d="M 350 162 C 356 158, 364 162, 366 172 C 361 184, 359 194, 362 202 C 356 198, 350 186, 350 162 Z" fill="url(#hair-grad-{{ hero_variant }})" opacity=".5"/>
      <path d="M 450 162 C 444 158, 436 162, 434 172 C 439 184, 441 194, 438 202 C 444 198, 450 186, 450 162 Z" fill="url(#hair-grad-{{ hero_variant }})" opacity=".5"/>
      <path d="M 356 168 C 353 180, 355 190, 361 199 M 444 168 C 447 180, 445 190, 439 199" stroke="var(--hero-hair-rim, #4a3220)" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="var(--hero-hair-detail-opacity, .26)"/>
    </g>
    <g id="long-hair-backfill-{{ hero_variant }}">
      <path d="M 346 180 C 338 134, 361 100, 400 98 C 438 100, 462 134, 454 180 C 442 166, 424 158, 406 159 C 402 158, 398 158, 394 159 C 376 158, 358 166, 346 180 Z" fill="var(--hero-hair-dark, #0f0905)" opacity=".54"/>
      <path d="M 344 174 C 332 226, 334 300, 352 350 C 360 362, 374 366, 382 354 C 368 302, 366 232, 378 182 C 364 174, 354 171, 344 174 Z" fill="url(#hair-grad-{{ hero_variant }})" opacity=".95"/>
      <path d="M 456 174 C 468 226, 466 300, 448 350 C 440 362, 426 366, 418 354 C 432 302, 434 232, 422 182 C 436 174, 446 171, 456 174 Z" fill="url(#hair-grad-{{ hero_variant }})" opacity=".95"/>
      <path d="M 356 210 C 350 254, 352 306, 362 342 M 444 210 C 450 254, 448 306, 438 342" stroke="var(--hero-hair-rim, #4a3220)" stroke-width="1.55" fill="none" stroke-linecap="round" opacity="var(--hero-hair-detail-opacity, .28)"/>
    </g>
    <g id="shoulder-hair-backfill-{{ hero_variant }}">
      <path d="M 346 178 C 340 136, 363 104, 400 102 C 437 104, 460 136, 454 178 C 442 166, 423 158, 404 159 C 401 158, 399 158, 396 159 C 377 158, 358 166, 346 178 Z" fill="var(--hero-hair-dark, #0f0905)" opacity=".5"/>
      <path d="M 344 174 C 334 214, 338 264, 354 296 C 362 304, 374 302, 380 290 C 368 256, 367 218, 378 182 C 364 174, 354 171, 344 174 Z" fill="url(#hair-grad-{{ hero_variant }})" opacity=".95"/>
      <path d="M 456 174 C 466 214, 462 264, 446 296 C 438 304, 426 302, 420 290 C 432 256, 433 218, 422 182 C 436 174, 446 171, 456 174 Z" fill="url(#hair-grad-{{ hero_variant }})" opacity=".95"/>
      <path d="M 356 200 C 350 232, 352 266, 362 292 M 444 200 C 450 232, 448 266, 438 292" stroke="var(--hero-hair-rim, #4a3220)" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="var(--hero-hair-detail-opacity, .26)"/>
    </g>
    <!-- Reusable curl symbol per research: a small S-spiral that can be rotated/scaled into the silhouette. -->
    <path id="curl-symbol-{{ hero_variant }}" d="M 0 0 C 7 -8 16 2 11 9 C 7 14 9 21 18 22"
          fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <pattern id="knurl-{{ hero_variant }}" patternUnits="userSpaceOnUse" width="3" height="3" patternTransform="rotate(45)"><rect width="3" height="3" fill="#aab3be"/><line x1="0" y1="0" x2="0" y2="3" stroke="#5b6470" stroke-width="0.90"/></pattern>
    <g id="hero-topic-icon-code-{{ hero_variant }}" fill="none" stroke="currentColor" stroke-width="9" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="-18,-22 -40,0 -18,22"/>
      <polyline points="18,-22 40,0 18,22"/>
      <line x1="11" y1="-30" x2="-11" y2="30"/>
    </g>
    <g id="hero-topic-icon-testing-{{ hero_variant }}" fill="none" stroke="currentColor" stroke-width="9" stroke-linecap="round" stroke-linejoin="round">
      <rect x="-34" y="-34" width="68" height="68" rx="11"/>
      <polyline points="-18,3 -5,18 22,-15"/>
    </g>
    <g id="hero-topic-icon-git-{{ hero_variant }}" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <path d="M -22 -30 L -22 30 M -22 -10 C 14 -10 14 10 -22 10" fill="none" stroke-width="8"/>
      <g fill="currentColor" stroke="none">
        <circle cx="-22" cy="-32" r="10"/>
        <circle cx="-22" cy="32" r="10"/>
        <circle cx="18" cy="0" r="10"/>
      </g>
    </g>
    <g id="hero-topic-icon-data-{{ hero_variant }}" fill="none" stroke="currentColor" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
      <rect x="-34" y="-34" width="68" height="16" rx="3"/>
      <rect x="-34" y="-8" width="68" height="16" rx="3"/>
      <rect x="-34" y="18" width="68" height="16" rx="3"/>
      <line x1="-15" y1="-18" x2="-15" y2="-8"/>
      <line x1="15" y1="-18" x2="15" y2="-8"/>
      <line x1="-15" y1="8" x2="-15" y2="18"/>
      <line x1="15" y1="8" x2="15" y2="18"/>
    </g>
    <g id="hero-topic-icon-uml-{{ hero_variant }}" fill="none" stroke="currentColor" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="-34" y="-34" width="28" height="22" rx="3"/>
      <rect x="6" y="-34" width="28" height="22" rx="3"/>
      <rect x="-17" y="12" width="34" height="22" rx="3"/>
      <path d="M -20 -12 L -3 12 M 20 -12 L 3 12"/>
      <path d="M -3 12 L -10 4 L -1 6 M 3 12 L 10 4 L 1 6" fill="currentColor" stroke="none"/>
    </g>
    <g id="hero-topic-icon-graph-{{ hero_variant }}" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <path d="M -26 -22 H 26 V 22 H -26 Z M -26 -22 L 26 22 M 26 -22 L -26 22 M 0 -22 V 22" fill="none" stroke-width="5.5"/>
      <g fill="currentColor" stroke="none">
        <circle cx="-26" cy="-22" r="9"/>
        <circle cx="26" cy="-22" r="9"/>
        <circle cx="-26" cy="22" r="9"/>
        <circle cx="26" cy="22" r="9"/>
        <circle cx="0" cy="-22" r="8"/>
        <circle cx="0" cy="22" r="8"/>
      </g>
    </g>
    <clipPath id="face-clear-clip-{{ hero_variant }}" clipPathUnits="userSpaceOnUse">
      <!-- Top edge extended to y=126 (matches head-shape crown) so the polish
           overlays and cheek tints fade smoothly across the forehead instead
           of starting at a hard line at the brow. -->
      <path d="M 352 174 C 354 145, 372 128, 400 126 C 428 128, 446 145, 448 174 C 452 198, 446 227, 429 245 C 416 259, 384 259, 371 245 C 354 227, 348 198, 352 174 Z"/>
    </clipPath>
    <clipPath id="hair-shoulder-clip-{{ hero_variant }}" clipPathUnits="userSpaceOnUse">
      <path d="M 300 58 H 500 V 380 H 454 C 454 338, 450 314, 444 292 C 430 290, 418 284, 410 274 C 404 268, 396 268, 390 274 C 382 284, 370 290, 356 292 C 350 314, 346 338, 346 380 H 300 Z"/>
    </clipPath>
    <style>
      .se-gym-hero-svg-{{ hero_variant }} [data-hero-slot="hair"]{clip-path:url(#hair-shoulder-clip-{{ hero_variant }});filter:url(#hair-depth-{{ hero_variant }});}
      .se-gym-hero-svg-{{ hero_variant }} [data-hero-slot="hair"] path,
