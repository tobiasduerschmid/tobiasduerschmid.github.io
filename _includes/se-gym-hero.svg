      <path d="M 456 174 C 468 226, 466 300, 448 350 C 440 362, 426 366, 418 354 C 432 302, 434 232, 422 182 C 436 174, 446 171, 456 174 Z" fill="url(#hair-grad-{{ hero_variant }})"/>
