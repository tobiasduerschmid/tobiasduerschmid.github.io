      <stop offset=".12" stop-color="var(--hero-hair-light, #4a3220)" stop-opacity=".9"/>
      <stop offset=".45" stop-color="var(--hero-hair, #1f140c)" stop-opacity=".4"/>
      <stop offset="1" stop-color="var(--hero-hair, #1f140c)" stop-opacity="0"/>
