{% assign hero_variant = include.variant | default: "main" %}
<svg xmlns="http://www.w3.org/2000/svg" viewBox="80 -20 640 665" class="se-gym-hero-svg se-gym-hero-svg-{{ hero_variant }}" data-gym-hero-svg data-hero-body="athletic" aria-hidden="true" focusable="false" preserveAspectRatio="xMidYMid meet">
    <defs>
    <filter id="comic-drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <linearGradient id="suit-{{ hero_variant }}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="var(--hero-suit-light, #68c4ea)"/>
      <stop offset=".42" stop-color="var(--hero-suit, #1F8FBD)"/>
      <stop offset="1" stop-color="var(--hero-suit-dark, #064b7b)"/>
    </linearGradient>
    <radialGradient id="suit-sheen-{{ hero_variant }}" cx=".5" cy="0" r="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".34"/>
      <stop offset=".5" stop-color="#ffffff" stop-opacity=".06"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="torso-rim-light-{{ hero_variant }}" gradientUnits="userSpaceOnUse" x1="324" y1="262" x2="476" y2="432"><stop offset="0" stop-color="#dff7ff" stop-opacity=".58"/><stop offset=".18" stop-color="#b8eeff" stop-opacity=".28"/><stop offset=".48" stop-color="#ffffff" stop-opacity=".08"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/></linearGradient>
    <radialGradient id="torso-core-glow-{{ hero_variant }}" gradientUnits="userSpaceOnUse" cx="400" cy="314" r="118"><stop offset="0" stop-color="#ffffff" stop-opacity=".26"/><stop offset=".42" stop-color="#9be5ff" stop-opacity=".18"/><stop offset="1" stop-color="#9be5ff" stop-opacity="0"/></radialGradient>
    <linearGradient id="suit-panel-{{ hero_variant }}" gradientUnits="userSpaceOnUse" x1="330" y1="260" x2="470" y2="430"><stop offset="0" stop-color="#94e3ff" stop-opacity=".52"/><stop offset=".55" stop-color="#2aa6d2" stop-opacity=".2"/><stop offset="1" stop-color="#062f54" stop-opacity=".18"/></linearGradient>
    <linearGradient id="suit-deep-panel-{{ hero_variant }}" gradientUnits="userSpaceOnUse" x1="350" y1="260" x2="450" y2="560"><stop offset="0" stop-color="#052944" stop-opacity=".22"/><stop offset=".65" stop-color="#03213d" stop-opacity=".58"/><stop offset="1" stop-color="#06172c" stop-opacity=".76"/></linearGradient>
    <linearGradient id="leg-rim-light-{{ hero_variant }}" gradientUnits="userSpaceOnUse" x1="352" y1="436" x2="448" y2="562"><stop offset="0" stop-color="#b7efff" stop-opacity=".42"/><stop offset=".32" stop-color="#b7efff" stop-opacity=".14"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/></linearGradient>
    <linearGradient id="leg-inner-shadow-{{ hero_variant }}" gradientUnits="userSpaceOnUse" x1="372" y1="434" x2="428" y2="562"><stop offset="0" stop-color="#001a2f" stop-opacity="0"/><stop offset=".34" stop-color="#001a2f" stop-opacity=".14"/><stop offset="1" stop-color="#001a2f" stop-opacity=".46"/></linearGradient>
    <linearGradient id="cape-grad-{{ hero_variant }}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--hero-cape-light, #4eb7df)"/><stop offset=".55" stop-color="var(--hero-cape, #0d5f91)"/><stop offset="1" stop-color="var(--hero-cape-dark, #001F38)"/></linearGradient>
    <linearGradient id="cape-inner-{{ hero_variant }}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--hero-cape-inner-light, #FFE470)"/><stop offset="1" stop-color="var(--hero-cape-inner, #B38B00)"/></linearGradient>
    <linearGradient id="gold-{{ hero_variant }}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFE470"/><stop offset=".5" stop-color="#FFD100"/><stop offset="1" stop-color="#B38B00"/></linearGradient>
    <radialGradient id="gold-radial-{{ hero_variant }}" cx=".38" cy=".32" r=".95"><stop offset="0" stop-color="#fff7c0"/><stop offset=".5" stop-color="#FFD100"/><stop offset="1" stop-color="#8a6a00"/></radialGradient>
    <linearGradient id="boot-cream-{{ hero_variant }}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fffdf0"/><stop offset=".5" stop-color="#f4f0d9"/><stop offset="1" stop-color="#cfc7a2"/></linearGradient>
    <linearGradient id="boot-shadow-{{ hero_variant }}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f4f0d9" stop-opacity=".72"/><stop offset="1" stop-color="#6f5a18" stop-opacity=".52"/></linearGradient>
    <linearGradient id="boot-side-light-{{ hero_variant }}" gradientUnits="userSpaceOnUse" x1="336" y1="552" x2="392" y2="626"><stop offset="0" stop-color="#ffffff" stop-opacity=".48"/><stop offset=".22" stop-color="#fff7d2" stop-opacity=".24"/><stop offset="1" stop-color="#fff7d2" stop-opacity="0"/></linearGradient>
    <radialGradient id="boot-toe-gloss-{{ hero_variant }}" gradientUnits="userSpaceOnUse" cx="366" cy="592" r="34"><stop offset="0" stop-color="#ffffff" stop-opacity=".44"/><stop offset=".5" stop-color="#fff0b0" stop-opacity=".16"/><stop offset="1" stop-color="#fff0b0" stop-opacity="0"/></radialGradient>
    <linearGradient id="boot-sole-depth-{{ hero_variant }}" gradientUnits="userSpaceOnUse" x1="334" y1="616" x2="394" y2="634"><stop offset="0" stop-color="#4a3806" stop-opacity=".16"/><stop offset=".52" stop-color="#8f6c00" stop-opacity=".48"/><stop offset="1" stop-color="#fff6c0" stop-opacity=".2"/></linearGradient>
      <linearGradient id="boot-side-light-right-{{ hero_variant }}" gradientUnits="userSpaceOnUse" x1="464" y1="552" x2="408" y2="626"><stop offset="0" stop-color="#ffffff" stop-opacity=".48"/><stop offset=".22" stop-color="#fff7d2" stop-opacity=".24"/><stop offset="1" stop-color="#fff7d2" stop-opacity="0"/></linearGradient>
      <radialGradient id="boot-toe-gloss-right-{{ hero_variant }}" gradientUnits="userSpaceOnUse" cx="434" cy="592" r="34"><stop offset="0" stop-color="#ffffff" stop-opacity=".44"/><stop offset=".5" stop-color="#fff0b0" stop-opacity=".16"/><stop offset="1" stop-color="#fff0b0" stop-opacity="0"/></radialGradient>
      <linearGradient id="boot-sole-depth-right-{{ hero_variant }}" gradientUnits="userSpaceOnUse" x1="466" y1="616" x2="406" y2="634"><stop offset="0" stop-color="#4a3806" stop-opacity=".16"/><stop offset=".52" stop-color="#8f6c00" stop-opacity=".48"/><stop offset="1" stop-color="#fff6c0" stop-opacity=".2"/></linearGradient>
    <linearGradient id="milestone-metal-{{ hero_variant }}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--hero-milestone-metal-light, #f5d2a5)"/><stop offset=".5" stop-color="var(--hero-milestone-metal, #b7793c)"/><stop offset="1" stop-color="var(--hero-milestone-metal-dark, #6b3e1d)"/></linearGradient>
    <radialGradient id="milestone-glow-{{ hero_variant }}" cx=".5" cy=".42" r=".58"><stop offset="0" stop-color="var(--hero-milestone-glow, #f5a35c)" stop-opacity=".34"/><stop offset=".65" stop-color="var(--hero-milestone-glow, #f5a35c)" stop-opacity=".12"/><stop offset="1" stop-color="var(--hero-milestone-glow, #f5a35c)" stop-opacity="0"/></radialGradient>
    <radialGradient id="milestone-jewel-{{ hero_variant }}" cx=".38" cy=".3" r=".85"><stop offset="0" stop-color="#ffffff"/><stop offset=".42" stop-color="var(--hero-milestone-jewel, #f2a45d)"/><stop offset="1" stop-color="var(--hero-milestone-metal-dark, #6b3e1d)"/></radialGradient>
    <linearGradient id="skin-{{ hero_variant }}" gradientUnits="userSpaceOnUse" x1="0" y1="82" x2="0" y2="270"><stop offset="0" stop-color="var(--hero-skin-highlight-soft, var(--hero-skin-light, #dfa07a))"/><stop offset=".38" stop-color="var(--hero-skin-light, #dfa07a)"/><stop offset=".78" stop-color="var(--hero-skin-mid, #c5815b)"/><stop offset="1" stop-color="var(--hero-skin, #b46a3d)"/></linearGradient>
    <radialGradient id="face-round-light-{{ hero_variant }}" gradientUnits="userSpaceOnUse" cx="386" cy="198" r="88"><stop offset="0" stop-color="var(--hero-skin-highlight-soft, #fff1dc)" stop-opacity=".42"/><stop offset=".42" stop-color="var(--hero-skin-highlight-soft, #fff1dc)" stop-opacity=".18"/><stop offset=".78" stop-color="var(--hero-skin-light, #dfa07a)" stop-opacity=".06"/><stop offset="1" stop-color="var(--hero-skin-light, #dfa07a)" stop-opacity="0"/></radialGradient>
    <radialGradient id="face-form-shadow-{{ hero_variant }}" gradientUnits="userSpaceOnUse" cx="430" cy="228" r="82"><stop offset="0" stop-color="var(--hero-face-plane-shadow, #7a4a2a)" stop-opacity=".22"/><stop offset=".48" stop-color="var(--hero-face-plane-shadow, #7a4a2a)" stop-opacity=".11"/><stop offset="1" stop-color="var(--hero-face-plane-shadow, #7a4a2a)" stop-opacity="0"/></radialGradient>
    <radialGradient id="face-scatter-{{ hero_variant }}"><stop offset="0" stop-color="var(--hero-skin-scatter, #a14e47)" stop-opacity=".62"/><stop offset=".56" stop-color="var(--hero-skin-scatter, #a14e47)" stop-opacity=".18"/><stop offset="1" stop-color="var(--hero-skin-scatter, #a14e47)" stop-opacity="0"/></radialGradient>
    <radialGradient id="face-soft-shadow-{{ hero_variant }}"><stop offset="0" stop-color="var(--hero-face-plane-shadow, #7a4a2a)" stop-opacity=".42"/><stop offset=".66" stop-color="var(--hero-face-plane-shadow, #7a4a2a)" stop-opacity=".12"/><stop offset="1" stop-color="var(--hero-face-plane-shadow, #7a4a2a)" stop-opacity="0"/></radialGradient>
    <radialGradient id="face-rim-light-{{ hero_variant }}"><stop offset="0" stop-color="var(--hero-skin-ambient, #dfa07a)" stop-opacity=".52"/><stop offset=".58" stop-color="var(--hero-skin-ambient, #dfa07a)" stop-opacity=".14"/><stop offset="1" stop-color="var(--hero-skin-ambient, #dfa07a)" stop-opacity="0"/></radialGradient>
    <linearGradient id="steel-{{ hero_variant }}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#7e8895"/><stop offset=".35" stop-color="#e6ebf1"/><stop offset=".55" stop-color="#c0c8d2"/><stop offset="1" stop-color="#42495a"/></linearGradient>
    <linearGradient id="steel-dark-{{ hero_variant }}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#5b6470"/><stop offset=".5" stop-color="#aab3be"/><stop offset="1" stop-color="#2a323d"/></linearGradient>
    <radialGradient id="plate-face-{{ hero_variant }}" cx=".38" cy=".3" r=".95"><stop offset="0" stop-color="#58bff4"/><stop offset=".52" stop-color="#1f82ce"/><stop offset="1" stop-color="#00345f"/></radialGradient>
    <radialGradient id="plate-face-dark-{{ hero_variant }}" cx=".4" cy=".32" r=".95"><stop offset="0" stop-color="#237fc2"/><stop offset=".55" stop-color="#0e4a87"/><stop offset="1" stop-color="#001428"/></radialGradient>
    <radialGradient id="plate-glow-{{ hero_variant }}" cx=".5" cy=".48" r=".62"><stop offset="0" stop-color="#7fdcff" stop-opacity=".28"/><stop offset=".72" stop-color="#3aa7ff" stop-opacity=".16"/><stop offset="1" stop-color="#3aa7ff" stop-opacity="0"/></radialGradient>
    <radialGradient id="hero-stage-glow-{{ hero_variant }}" cx=".5" cy=".18" r=".78"><stop offset="0" stop-color="#edf7ff" stop-opacity=".2"/><stop offset=".42" stop-color="#82bde8" stop-opacity=".12"/><stop offset="1" stop-color="#081325" stop-opacity="0"/></radialGradient>
    <radialGradient id="brain-glow-{{ hero_variant }}" cx=".5" cy=".5" r=".5"><stop offset="0" stop-color="#FFE470" stop-opacity=".55"/><stop offset=".55" stop-color="#FFD100" stop-opacity=".18"/><stop offset="1" stop-color="#FFD100" stop-opacity="0"/></radialGradient>
    <linearGradient id="hair-grad-{{ hero_variant }}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="var(--hero-hair-light, #4a3220)"/>
      <stop offset=".36" stop-color="var(--hero-hair, #1f140c)"/>
      <stop offset=".78" stop-color="var(--hero-hair-dark, #0f0905)"/>
      <stop offset="1" stop-color="var(--hero-hair-dark, #0f0905)" stop-opacity=".74"/>
    </linearGradient>
    <radialGradient id="hair-luster-{{ hero_variant }}" cx=".4" cy=".25" r=".6">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".18"/>
      <stop offset=".25" stop-color="var(--hero-hair-light, #4a3220)" stop-opacity=".34"/>
      <stop offset="1" stop-color="var(--hero-hair, #1f140c)" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hair-sheen-{{ hero_variant }}" cx=".35" cy=".2" r=".8">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".24"/>
      <stop offset=".12" stop-color="var(--hero-hair-light, #4a3220)" stop-opacity=".72"/>
      <stop offset=".45" stop-color="var(--hero-hair, #1f140c)" stop-opacity=".32"/>
      <stop offset="1" stop-color="var(--hero-hair, #1f140c)" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hair-comic-highlight-{{ hero_variant }}" gradientUnits="userSpaceOnUse" x1="360" y1="112" x2="440" y2="166">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".18"/>
      <stop offset=".36" stop-color="var(--hero-hair-light, #4a3220)" stop-opacity=".54"/>
      <stop offset=".72" stop-color="var(--hero-hair-light, #4a3220)" stop-opacity=".14"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="hair-comic-shadow-{{ hero_variant }}" gradientUnits="userSpaceOnUse" x1="360" y1="158" x2="440" y2="176">
      <stop offset="0" stop-color="var(--hero-hair-dark, #0f0905)" stop-opacity=".1"/>
      <stop offset=".45" stop-color="var(--hero-hair-dark, #0f0905)" stop-opacity=".58"/>
      <stop offset="1" stop-color="var(--hero-hair-dark, #0f0905)" stop-opacity=".16"/>
    </linearGradient>
    <filter id="hair-depth-{{ hero_variant }}" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.4" flood-color="#160b04" flood-opacity=".22"/>
