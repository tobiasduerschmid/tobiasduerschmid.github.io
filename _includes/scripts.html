<script>
  $(document).ready(function () {
    // Tooltips: manual triggers keep the tooltip hoverable and persistent
    // while focus/hover remains, and Esc dismisses without moving focus.
    var tooltipSelector = '[data-toggle="tooltip"], [data-original-title], [data-tooltip], [title]:not([data-no-tooltip]):not(iframe)';

    function normalizeTooltipTrigger(trigger) {
      var $trigger = $(trigger);
      var nativeTitle = $trigger.attr('title');
      if (nativeTitle && !$trigger.attr('data-original-title')) {
        $trigger.attr('data-original-title', nativeTitle);
      }
      $trigger.removeAttr('title');
    }

    function clearTooltipTimer($trigger, dataKey) {
      var timer = $trigger.data(dataKey);
      if (!timer) return;
      window.clearTimeout(timer);
      $trigger.removeData(dataKey);
    }

    function clearHideTimer($trigger) {
      clearTooltipTimer($trigger, 'a11yTooltipHideTimer');
    }

    function clearShowTimer($trigger) {
      clearTooltipTimer($trigger, 'a11yTooltipShowTimer');
    }

    function initAccessibleTooltips(selector, options) {
      var $triggers = $(selector);
      if (!$triggers.length) return;
      $triggers.each(function () { normalizeTooltipTrigger(this); });
      $triggers.tooltip($.extend({
        trigger: 'manual',
        delay: 0,
        container: 'body',
        html: false,
        placement: 'auto',
        viewport: { selector: 'body', padding: 8 }
      }, options || {}));

      function getTip($trigger) {
        var data = $trigger.data('bs.tooltip');
        if (data && data.$tip) return data.$tip;
        var id = $trigger.attr('aria-describedby');
        return id ? $('#' + id) : $();
      }

      // :focus-visible isolates genuine keyboard focus. Plain :focus also
      // matches buttons that received focus from a mouse click — those buttons
      // keep :focus after the cursor moves away, which would otherwise pin the
      // tooltip open until the user clicked somewhere else.
      function hasKeyboardFocus($trigger) {
        try { return $trigger.is(':focus-visible'); }
        catch (e) { return false; }
      }

      function scheduleHide($trigger) {
        clearHideTimer($trigger);
        var timer = window.setTimeout(function () {
          $trigger.removeData('a11yTooltipHideTimer');
          var $tip = getTip($trigger);
          if ($trigger.is(':hover') || hasKeyboardFocus($trigger) || ($tip.length && $tip.is(':hover'))) {
            scheduleHide($trigger);
            return;
          }
          $trigger.tooltip('hide');
        }, 150);
        $trigger.data('a11yTooltipHideTimer', timer);
      }

      function showTooltip(trigger) {
        var $trigger = $(trigger);
        clearHideTimer($trigger);
        clearShowTimer($trigger);
        $trigger.tooltip('show');
        window.setTimeout(function () {
          getTip($trigger)
            .off('.a11yTooltipHover')
            .on('mouseenter.a11yTooltipHover', function () {
              clearHideTimer($trigger);
            })
            .on('mouseleave.a11yTooltipHover', function () {
              scheduleHide($trigger);
            });
        }, 0);
      }

      // Delay hover-only tooltips so quick cursor travel across dense toolbars
      // does not fill the page with boxes. Focus remains immediate for keyboard
      // users because it is deliberate navigation, not incidental pointer motion.
      var HOVER_SHOW_DELAY = 1000;
      function scheduleShow(trigger) {
        var $trigger = $(trigger);
        clearShowTimer($trigger);
        var timer = window.setTimeout(function () {
          $trigger.removeData('a11yTooltipShowTimer');
          if ($trigger.is(':hover')) showTooltip(trigger);
        }, HOVER_SHOW_DELAY);
        $trigger.data('a11yTooltipShowTimer', timer);
      }

      // Touch devices fire `mouseenter` and `focusin` on tap but never the
      // matching `mouseleave` / `focusout`, so a tap would pin the tooltip
      // open until the next tap somewhere else. Skip the hover trigger on
      // hover-less devices, and require :focus-visible (keyboard focus) for
      // the focus trigger — tap focus does not match :focus-visible.
      function deviceCanHover() {
        return !!(window.matchMedia && window.matchMedia('(hover: hover)').matches);
      }
      function isKeyboardFocus(el) {
        try { return !!(el && el.matches && el.matches(':focus-visible')); }
        catch (e) { return false; }
      }
      $triggers
        .off('.a11yTooltip')
        .on('mouseenter.a11yTooltip', function () {
          if (!deviceCanHover()) return;
          scheduleShow(this);
        })
        .on('focusin.a11yTooltip', function () {
          if (!isKeyboardFocus(this)) return;
          showTooltip(this);
        })
        .on('mouseleave.a11yTooltip focusout.a11yTooltip', function () {
          var $trigger = $(this);
          clearShowTimer($trigger);
          scheduleHide($trigger);
        });

    }

    function hideLiveAccessibleTooltips() {
      $(tooltipSelector).each(function () {
        var $trigger = $(this);
        clearHideTimer($trigger);
        clearShowTimer($trigger);
        if ($trigger.data('bs.tooltip')) {
          $trigger.tooltip('hide');
        }
      });
    }

    function onAccessibleTooltipKeydown(e) {
      if (e.key === 'Escape' || e.keyCode === 27) {
        hideLiveAccessibleTooltips();
      }
    }

    // Initialization runs repeatedly for MutationObserver batches. Keep one
    // document-level listener and query the live DOM on demand so removed
    // trigger collections are never retained by old closures.
    $(document)
      .off('keydown.a11yTooltip')
      .on('keydown.a11yTooltip', onAccessibleTooltipKeydown);

    window.initAccessibleTooltips = initAccessibleTooltips;
    initAccessibleTooltips(tooltipSelector);
    if (window.MutationObserver) {
      new MutationObserver(function (mutations) {
        mutations.forEach(function (mutation) {
          if (mutation.type === 'attributes' && (
              mutation.attributeName === 'title' ||
              mutation.attributeName === 'data-original-title' ||
              mutation.attributeName === 'data-tooltip')) {
            if (mutation.target.matches && mutation.target.matches(tooltipSelector)) {
              initAccessibleTooltips(mutation.target);
            }
          }
          if (mutation.type === 'childList') {
            mutation.addedNodes.forEach(function (node) {
              if (!node || node.nodeType !== 1) return;
              if (node.matches && node.matches(tooltipSelector)) {
                initAccessibleTooltips(node);
              }
              if (node.querySelectorAll) {
                node.querySelectorAll(tooltipSelector).forEach(function (child) {
                  initAccessibleTooltips(child);
                });
              }
            });
            // Bootstrap appends the tooltip element to <body> separately from
            // its trigger. If a trigger is removed while its tooltip is open
            // (e.g. a step nav re-render), the tooltip element is left behind
            // and stays visible forever. Sweep any orphans whose
            // aria-describedby target no longer points at a live trigger.
            mutation.removedNodes.forEach(function (node) {
              if (!node || node.nodeType !== 1) return;
              cleanupOrphanedTooltipsFor(node);
              if (node.querySelectorAll) {
                node.querySelectorAll('[aria-describedby]').forEach(cleanupOrphanedTooltipsFor);
              }
            });
          }
        });
      }).observe(document.documentElement, {
        attributes: true,
        attributeFilter: ['title', 'data-original-title', 'data-tooltip'],
        childList: true,
        subtree: true
      });
    }

    function cleanupOrphanedTooltipsFor(node) {
      var id = node.getAttribute && node.getAttribute('aria-describedby');
      if (!id) return;
      var tip = document.getElementById(id);
      if (!tip || !tip.classList || !tip.classList.contains('tooltip')) return;
      // Only remove if no live trigger still references this tip id.
      if (!document.querySelector('[aria-describedby="' + id + '"]')) {
        tip.parentNode && tip.parentNode.removeChild(tip);
      }
    }

    // Keep the navbar hamburger's aria-expanded in sync with the Bootstrap 3
    // collapse state (SC 4.1.2). The toggle button points at the collapse
    // via data-target, so its state should track shown/hidden transitions.
    $('.navbar-collapse').on('show.bs.collapse hidden.bs.collapse', function (e) {
      var expanded = e.type === 'show';
      $('.navbar-toggle[data-target]').each(function () {
        var tgt = $(this).attr('data-target');
        if (tgt && $(e.target).is(tgt)) {
          $(this).attr('aria-expanded', expanded ? 'true' : 'false');
        }
      });
    });
    $(document).on('show.bs.collapse hidden.bs.collapse', '.collapse', function (e) {
      $('[data-toggle="collapse"][aria-controls="' + this.id + '"]').attr('aria-expanded', e.type === 'show' ? 'true' : 'false');
    });
  });
</script>

<script>
  // Carousel
  (function ($) {
    "use strict";
    var $container = $('.portfolio'),
      $items = $container.find('.portfolio-item'),
      portfolioLayout = 'fitRows';

    if ($container.hasClass('portfolio-centered')) {
      portfolioLayout = 'masonry';
    }

    $container.isotope({
      filter: '*',
      animationEngine: 'best-available',
      layoutMode: portfolioLayout,
      animationOptions: {
        duration: 750,
        easing: 'linear',
        queue: false
      },
      masonry: {
      }
    }, refreshWaypoints());

    function refreshWaypoints() {
      setTimeout(function () {
      }, 1000);
    }

    $('nav.portfolio-filter ul a').on('click', function () {
      var selector = $(this).attr('data-filter');
      $container.isotope({ filter: selector }, refreshWaypoints());
      $('nav.portfolio-filter ul a').removeClass('active');
      $(this).addClass('active');
      return false;
    });

    function getColumnNumber() {
      var divWidth = $('#carousellist').width(),
        columnNumber = 1;

      if (divWidth > 800) {
        columnNumber = 5;
      } else if (divWidth > 600) {
        columnNumber = 4;
      } else if (divWidth > 400) {
        columnNumber = 3;
      } else if (divWidth > 200) {
        columnNumber = 2;
      } else if (divWidth > 100) {
        columnNumber = 1;
      }
      return columnNumber;
    }

    function setColumns() {
      var divWidth = $('#carousellist').width(),
        columnNumber = getColumnNumber(),
        itemWidth = Math.floor(divWidth / columnNumber);

      $container.find('.portfolio-item').each(function () {
        $(this).css({
          width: itemWidth + 'px'
        });
      });
    }

    function setPortfolio() {
      setColumns();
      $container.isotope('reLayout');
    }

    $container.imagesLoaded(function () {
      setPortfolio();
    });

    $('#carousellist').on('resize', function () {
      setPortfolio();
    });
  })(jQuery);
</script>

<script>

  jQuery.fn.selectInner = function () {
    var doc = document;
    var element = this[0];

    if (doc.body.createTextRange) {
      var range = document.body.createTextRange();
      range.moveToElementText(element);
      range.select();
    }
    else if (window.getSelection) {
      var selection = window.getSelection();
      selection.removeAllRanges();

      var range = document.createRange();
      range.selectNodeContents(element);

      selection.addRange(range);
    }
  };

  // since there is currently no way to use custom plugins on gh-pages
  // flickr integration is done on demand via javascript

  var flickr_api = "https://api.flickr.com/services/rest/";
  var flickr_api_key = "{{ site.flickr_api_key }}";

  function flickr_photo_url(photo) {
    return "https://farm" + photo.farm
      + ".staticflickr.com/" + photo.server + "/"
      + photo.id + "_" + photo.secret + "_b.jpg";
  }

  var blueimp_gallery_cache = [];

  function blueimp_gallery(photoset_id) {
    blueimp.Gallery(blueimp_gallery_cache[photoset_id]
      , { useBootstrapModal: false, event: event, container: '#blueimp-gallery' });
  }

  function blueimp_video(photoset_id) {
    blueimp.Gallery(blueimp_gallery_cache[photoset_id]
      , { useBootstrapModal: false, event: event, container: '#blueimp-gallery' });
  }

  function flickr_photosets(photoset_id) {
    if (photoset_id in blueimp_gallery_cache) {
      blueimp_gallery(photoset_id);
      return;
    }

    var spin_attributes = {
      lines: 12,
      length: 12,
      width: 4,
      radius: 16,
      corners: 1,
      zIndex: 1,
    };

    $('#' + photoset_id).spin(spin_attributes);

    $.getJSON(flickr_api,
      {
        method: "flickr.photosets.getPhotos",
        api_key: flickr_api_key,
        photoset_id: photoset_id,
        format: "json",
        nojsoncallback: 1
      })

      .done(function (data) {
        var blueimpl_gallery = [];

        $.each(data.photoset.photo, function (i, photo) {
          blueimpl_gallery.push({ href: flickr_photo_url(photo), title: photo.title })
        });

        blueimp_gallery_cache[photoset_id] = blueimpl_gallery;
        blueimp_gallery(photoset_id);
      })
      .fail(function (data, textStatus, error) {
        var $target = $('#' + photoset_id);
        $target.attr({ role: 'alert', 'aria-live': 'assertive' });
        $target.text('Photos could not load right now. Check your connection and try again later.');
        if (window.console && console.warn) console.warn('Flickr photoset load failed:', textStatus, error);
      })
      .always(function () {
        var spinner = $('#' + photoset_id).data().spinner;
        if (spinner)
          spinner.stop();
      });
  }

  $(document).ready(function () {
    // assign flickr photosets to thumbnails
    $('.flickr').on('click', function (event) {
      event.preventDefault();
      flickr_photosets($(this).attr("id"));
    });

    // assign bibtex select scripts
    {% for p in publications %} {% if p.bibtex %}
    $('#bibtex-select-{{ p.key }}').on('click', function (event) { $('#bibtex-tex-{{ p.key }}').selectInner(); });
    {% endif %} {% endfor %}
  });

  // contact form validation
  $("#contact-form").validate(
    {
      rules:
      {
        name: { required: true },
        _replyto: { required: true, email: true },
        message: { required: true, maxlength: 1024 }
      },

      errorClass: 'error form-control-static text-danger',
      errorElement: 'div',

      // Ensure every error message has a stable id, is linked to its input
      // via aria-describedby, is wrapped in a polite live region, and that
      // the input is flagged aria-invalid="true" (SC 3.3.1, 4.1.3).
      errorPlacement: function (error, element) {
        var inputId = element.attr('id') || element.attr('name');
        var errId = 'err-' + inputId;
        error.attr('id', errId);
        error.attr('role', 'alert');
        error.attr('aria-live', 'polite');
        element.attr('aria-describedby', errId);
        element.attr('aria-invalid', 'true');
        error.insertAfter(element);
      },

      highlight: function (label) {
        $(label).closest('.form-group').addClass('has-error');
        $(label).attr('aria-invalid', 'true');
      },

      unhighlight: function (label) {
        $(label).removeAttr('aria-invalid');
      },

      success: function (label, element) {
        $(label).closest('.form-group').removeClass('has-error');
        $(element).removeAttr('aria-describedby');
        $(element).removeAttr('aria-invalid');
        $(label).remove();
      },

      submitHandler: function (form) {
        $.ajax(
          {
            url: form.action,
            type: form.method,
            data: $(form).serializeJSON()
          });
      }
    });

</script>
