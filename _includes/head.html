<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Early highlight initialization to prevent blinking -->
  <script>
    (function () {
      var nameEQ = "show-highlights=";
      var darkEQ = "dark-mode=";
      var ca = document.cookie.split(';');
      var show = true;
      var dark = false;
      for (var i = 0; i < ca.length; i++) {
        var c = ca[i];
        while (c.charAt(0) == ' ') c = c.substring(1, c.length);
        if (c.indexOf(nameEQ) == 0) {
          show = c.substring(nameEQ.length, c.length) === 'true';
        }
        if (c.indexOf(darkEQ) == 0) {
          dark = c.substring(darkEQ.length, c.length) === 'true';
        }
      }
      if (!show) {
        document.documentElement.classList.add('highlights-disabled');
      }
      if (dark) {
        document.documentElement.classList.add('dark-mode');
      }
    })();
  </script>

  <!-- Reduced-motion detection: runs BEFORE any other JS on the page so
       lab scripts that check `window.__prefersReducedMotion` on init see
       the final value, and so the `html.prm-reduce` class is applied in
       the same paint as first render (no flash of motion).
       Three triggers are OR'd together:
         1. `window.matchMedia('(prefers-reduced-motion: reduce)').matches`
            — the OS-level accessibility preference (canonical signal).
         2. `?reduce-motion=1` in the URL — ad-hoc override, current page
            load only. `?reduce-motion=0` forces motion on.
         3. Firefox gotcha: some user-level prefs don't flip matchMedia,
            so the URL override is the user-facing escape hatch.
       Clears any `localStorage.prefersReducedMotion` legacy entries from
       an earlier persistent-override version of this script. -->
  <script>
    (function () {
      try { localStorage.removeItem('prefersReducedMotion'); } catch (e) {}
      var forced = null;  // null = not forced, true = on, false = off
      try {
        var p = new URLSearchParams(window.location.search).get('reduce-motion');
        if (p != null) {
          forced = !(p === '0' || p.toLowerCase() === 'false');
        }
      } catch (e) {}
      var mq = (window.matchMedia ? window.matchMedia('(prefers-reduced-motion: reduce)') : null);
      function active() {
        if (forced !== null) return forced;
        return !!(mq && mq.matches);
      }
      function sync() {
        if (document.documentElement) {
          document.documentElement.classList.toggle('prm-reduce', active());
        }
      }
      sync();
      if (mq) {
        if (mq.addEventListener) mq.addEventListener('change', sync);
        else if (mq.addListener) mq.addListener(sync);
      }
      // Single, site-wide helper — lab scripts call this instead of
      // window.matchMedia directly so the URL override and OS pref are
      // honoured uniformly.
      window.__prefersReducedMotion = active;
    })();
  </script>
