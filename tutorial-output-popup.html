<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Output &mdash; Tutorial</title>
  <script>
    (function () {
      var p = new URLSearchParams(location.search);
      if (p.get('dark') === '1') document.documentElement.classList.add('dark-mode');
    })();
  </script>
  <link rel="stylesheet" href="{{ '/css/tutorial.css' | relative_url }}">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    body { display: flex; flex-direction: column; background: #1e1e1e; color: #e8e8f0; }
    html:not(.dark-mode) body { background: #fff; color: #222; }
    .top-bar {
      display: flex; align-items: center; gap: 10px;
      padding: 6px 12px; background: #161618; border-bottom: 1px solid #2a2a2e;
      flex-shrink: 0; font-size: 12.5px;
    }
    html:not(.dark-mode) .top-bar { background: #f3f3f3; border-bottom-color: #d4d4d4; }
    .kind-name { font-weight: 600; color: #e8e8f0; text-transform: uppercase;
      letter-spacing: 0.06em; font-size: 11.5px; }
    html:not(.dark-mode) .kind-name { color: #333; }
    .stat { color: #888; font-size: 11.5px; margin-left: auto; }
    .stat.ok { color: #4caf50; }
    .stat.warn { color: #d4a017; }
    .stat.bad { color: #c0392b; }
    .wrap { flex: 1; min-height: 0; position: relative; display: flex; flex-direction: column; }
    .overlay {
      position: absolute; inset: 0; background: rgba(20,20,28,0.86); color: #ddd;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; z-index: 999;
    }
    html:not(.dark-mode) .overlay { background: rgba(255,255,255,0.92); color: #333; }
    .out-pre {
      flex: 1; min-height: 0; margin: 0; overflow: auto;
      background: #0e0e14; color: #e0e0e8; font-family: 'Fira Code', 'Cascadia Code', Menlo, monospace;
      font-size: 13px; line-height: 1.5; padding: 12px 14px; white-space: pre-wrap;
    }
    html:not(.dark-mode) .out-pre { background: #fafafa; color: #1f1f1f; }
    .preview-frame { flex: 1; min-height: 0; border: 0; width: 100%; height: 100%; background: #fff; }
  </style>
</head>
<body>
  <div class="top-bar">
    <span class="kind-name" id="kindEl">&hellip;</span>
    <span class="stat" id="statusEl">Connecting&hellip;</span>
  </div>
  <div class="wrap">
    <pre class="out-pre" id="outEl" style="display:none"></pre>
    <iframe class="preview-frame" id="frameEl" style="display:none"
      sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
    <div class="overlay" id="overlayEl">Waiting for tutorial&hellip;</div>
  </div>

  <script>
  (function () {
    var params  = new URLSearchParams(location.search);
    var chName  = params.get('channel');
    var kind    = params.get('kind') || 'output';
    if (!chName) {
      document.getElementById('overlayEl').textContent = 'Invalid popup URL.';
      return;
    }
    var sourceId = 'out-' + Math.random().toString(36).slice(2, 10);
    var role     = 'output';
    var channel  = new BroadcastChannel(chName);

    var kindEl    = document.getElementById('kindEl');
    var statusEl  = document.getElementById('statusEl');
    var overlayEl = document.getElementById('overlayEl');
    var outEl     = document.getElementById('outEl');
    var frameEl   = document.getElementById('frameEl');
    var lastHeartbeat = 0;
    var booted = false;
    var lastFrameSrc = null;

    function setKind(k) {
      kind = k;
      var label = k === 'terminal' ? 'TERMINAL'
                : k === 'preview' ? 'LIVE PREVIEW'
                : 'OUTPUT';
      kindEl.textContent = label;
      document.title = label + ' — Tutorial';
    }
    setKind(kind);

    function post(type, payload) {
      var msg = { type: type, sourceId: sourceId, ts: Date.now() };
      if (payload) for (var k in payload) msg[k] = payload[k];
      try { channel.postMessage(msg); } catch (e) { /* ignore */ }
    }

    function setStatus(text, cls) {
      statusEl.textContent = text;
      statusEl.className = 'stat' + (cls ? ' ' + cls : '');
    }

    function applyDarkMode(enabled) {
      document.documentElement.classList.toggle('dark-mode', !!enabled);
    }

    function applySnapshot(snap) {
      if (!snap) return;
      if (typeof snap.darkMode === 'boolean') applyDarkMode(snap.darkMode);
      setKind(snap.kind || 'output');
      if (kind === 'preview') {
        outEl.style.display = 'none';
        frameEl.style.display = '';
        if (snap.content && snap.content !== lastFrameSrc) {
          lastFrameSrc = snap.content;
          frameEl.src = snap.content;
        }
      } else {
        // terminal + output both render to <pre>
        frameEl.style.display = 'none';
        outEl.style.display = '';
        if (kind === 'terminal') {
          // Terminal serialized as plain text — render as textContent
          outEl.textContent = snap.content || '';
        } else {
          // Output is HTML (may contain colored stdout/stderr spans)
          outEl.innerHTML = snap.content || '';
        }
        // Auto-scroll to bottom
        outEl.scrollTop = outEl.scrollHeight;
      }
      booted = true;
      overlayEl.style.display = 'none';
      setStatus('Connected', 'ok');
    }

    channel.addEventListener('message', function (e) {
      var msg = e.data || {};
      if (msg.sourceId === sourceId) return;
      switch (msg.type) {
        case 'heartbeat':
          lastHeartbeat = Date.now();
          setStatus('Connected', 'ok');
          post('heartbeat-ack', { role: role });
          break;
        case 'output-snapshot':
          applySnapshot(msg);
          break;
        case 'output-update':
          applySnapshot(msg);
          break;
        case 'dark-mode':
          applyDarkMode(msg.enabled);
          break;
        case 'force-close':
          if (msg.targetRole === role) {
            post('popup-closing', { role: role });
            setTimeout(function () { window.close(); }, 30);
          }
          break;
      }
    });

    window.addEventListener('beforeunload', function () {
      post('popup-closing', { role: role });
    });

    setInterval(function () {
      if (!lastHeartbeat) return;
      var age = Date.now() - lastHeartbeat;
      if (age > 12000) setStatus('Disconnected', 'bad');
      else if (age > 6000) setStatus('Reconnecting…', 'warn');
    }, 1500);

    post('hello', { role: role });
    setTimeout(function () { if (!booted) post('hello', { role: role }); }, 400);
    setTimeout(function () {
      if (!booted) {
        overlayEl.textContent = 'Reconnecting to tutorial…';
        setStatus('Reconnecting…', 'warn');
      }
    }, 2000);
  })();
  </script>
</body>
</html>
