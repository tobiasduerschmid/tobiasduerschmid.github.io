<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Output &mdash; Tutorial</title>
  <script>
    (function () {
      var p = new URLSearchParams(location.search);
      if (p.get('dark') === '1') document.documentElement.classList.add('dark-mode');
    })();
  </script>
  <link rel="stylesheet" href="{{ '/css/tutorial.css' | relative_url }}">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    body { display: flex; flex-direction: column; background: #1e1e1e; color: #e8e8f0; }
    html:not(.dark-mode) body { background: #fff; color: #222; }
    .top-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 12px; background: #161618; border-bottom: 1px solid #2a2a2e;
      flex-shrink: 0; font-size: 12.5px;
    }
    html:not(.dark-mode) .top-bar { background: #f3f3f3; border-bottom-color: #d4d4d4; }
    .kind-name { font-weight: 600; color: #e8e8f0; text-transform: uppercase;
      letter-spacing: 0.06em; font-size: 11.5px; }
    html:not(.dark-mode) .kind-name { color: #333; }
    .stat { color: #888; font-size: 11.5px; margin-left: auto; }
    .stat.ok { color: #4caf50; }
    .stat.warn { color: #d4a017; }
    .stat.bad { color: #c0392b; }
    .actions { display: flex; align-items: center; gap: 6px; }
    .actions button {
      padding: 3px 10px; border: 1px solid #3a3a52; border-radius: 3px;
      background: #1f1f2a; color: #c8d4e4; font-size: 12px; line-height: 1.3;
      cursor: pointer; font-family: inherit;
    }
    .actions button.primary { background: #0078d4; color: #fff; border-color: #0078d4; }
    .actions button.primary:hover { background: #1a8be0; }
    .actions button:hover { background: #303046; border-color: #5a5a78; }
    .actions input.args {
      padding: 3px 8px; border: 1px solid #3a3a52; border-radius: 3px;
      background: #1f1f2a; color: #c8d4e4; font-family: 'Fira Code','Cascadia Code',Menlo,monospace;
      font-size: 12px; width: 200px;
    }
    .actions select {
      padding: 3px 6px; border: 1px solid #3a3a52; border-radius: 3px;
      background: #1f1f2a; color: #c8d4e4; font-size: 11.5px; font-family: inherit;
    }
    html:not(.dark-mode) .actions button {
      background: #fff; color: #333; border-color: #c8c8d0;
    }
    html:not(.dark-mode) .actions button:hover {
      background: #e8edf3; border-color: #8a96a8;
    }
    html:not(.dark-mode) .actions input.args,
    html:not(.dark-mode) .actions select {
      background: #fff; color: #333; border-color: #c8c8d0;
    }
    .wrap { flex: 1; min-height: 0; position: relative; display: flex; flex-direction: column; }
    .overlay {
      position: absolute; inset: 0; background: rgba(20,20,28,0.86); color: #ddd;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; z-index: 999;
    }
    html:not(.dark-mode) .overlay { background: rgba(255,255,255,0.92); color: #333; }
    .out-pre {
      flex: 1; min-height: 0; margin: 0; overflow: auto;
      background: #0e0e14; color: #e0e0e8; font-family: 'Fira Code', 'Cascadia Code', Menlo, monospace;
      font-size: 13px; line-height: 1.5; padding: 12px 14px; white-space: pre-wrap;
    }
    html:not(.dark-mode) .out-pre { background: #fafafa; color: #1f1f1f; }
    .preview-frame { flex: 1; min-height: 0; border: 0; width: 100%; height: 100%; background: #fff; }
  </style>
</head>
<body>
  <div class="top-bar">
    <span class="kind-name" id="kindEl">&hellip;</span>
    <div class="actions" id="actionsEl">
      <input type="text" class="args" id="argsEl" placeholder="Program args…" style="display:none">
      <select id="streamFilterEl" style="display:none">
        <option value="all">All Output</option>
        <option value="stdout">Stdout Only</option>
        <option value="stderr">Stderr Only</option>
      </select>
      <button id="runBtn" class="primary" title="Run current file">▶ Run</button>
      <button id="stopBtn" style="display:none" title="Stop execution">◼ Stop</button>
      <button id="clearBtn" title="Clear output">Clear</button>
      <button id="refreshBtn" style="display:none" title="Rebuild preview">↻ Refresh</button>
    </div>
    <span class="stat" id="statusEl">Connecting&hellip;</span>
  </div>
  <div class="wrap">
    <pre class="out-pre" id="outEl" style="display:none"></pre>
    <iframe class="preview-frame" id="frameEl" style="display:none"
      sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
    <div class="overlay" id="overlayEl">Waiting for tutorial&hellip;</div>
  </div>

  <script>
  (function () {
    var params  = new URLSearchParams(location.search);
    var chName  = params.get('channel');
    var kind    = params.get('kind') || 'output';
    if (!chName) {
      document.getElementById('overlayEl').textContent = 'Invalid popup URL.';
      return;
    }
    var sourceId = 'out-' + Math.random().toString(36).slice(2, 10);
    var role     = 'output';
    var channel  = new BroadcastChannel(chName);

    var kindEl    = document.getElementById('kindEl');
    var statusEl  = document.getElementById('statusEl');
    var overlayEl = document.getElementById('overlayEl');
    var outEl     = document.getElementById('outEl');
    var frameEl   = document.getElementById('frameEl');
    var argsEl    = document.getElementById('argsEl');
    var streamEl  = document.getElementById('streamFilterEl');
    var runBtn    = document.getElementById('runBtn');
    var stopBtn   = document.getElementById('stopBtn');
    var clearBtn  = document.getElementById('clearBtn');
    var refreshBtn = document.getElementById('refreshBtn');
    var lastHeartbeat = 0;
    var booted = false;
    var lastFrameSrc = null;

    runBtn.addEventListener('click', function () {
      post('request-run', { args: argsEl.value || '' });
    });
    stopBtn.addEventListener('click', function () { post('request-stop', {}); });
    clearBtn.addEventListener('click', function () { post('request-clear', {}); });
    refreshBtn.addEventListener('click', function () { post('request-refresh', {}); });
    argsEl.addEventListener('input', function () {
      post('args-change', { args: argsEl.value || '' });
    });
    streamEl.addEventListener('change', function () {
      post('stream-filter-change', { filter: streamEl.value });
    });

    var tutorialTitle = params.get('title') || 'Tutorial';

    function setKind(k) {
      kind = k;
      var label = k === 'terminal' ? 'TERMINAL'
                : k === 'preview' ? 'LIVE PREVIEW'
                : 'OUTPUT';
      kindEl.textContent = label;
      document.title = label + ' — ' + tutorialTitle;
      // Show/hide controls per kind. Run/Stop/Clear are output-only; Refresh
      // is preview-only; terminal has no header controls in main, so we
      // suppress them here too.
      if (k === 'preview') {
        runBtn.style.display = 'none';
        stopBtn.style.display = 'none';
        clearBtn.style.display = 'none';
        refreshBtn.style.display = '';
      } else if (k === 'terminal') {
        runBtn.style.display = 'none';
        stopBtn.style.display = 'none';
        clearBtn.style.display = 'none';
        refreshBtn.style.display = 'none';
      } else {
        runBtn.style.display = '';
        clearBtn.style.display = '';
        refreshBtn.style.display = 'none';
      }
    }
    setKind(kind);

    function post(type, payload) {
      var msg = { type: type, sourceId: sourceId, ts: Date.now() };
      if (payload) for (var k in payload) msg[k] = payload[k];
      try { channel.postMessage(msg); } catch (e) { /* ignore */ }
    }

    function setStatus(text, cls) {
      statusEl.textContent = text;
      statusEl.className = 'stat' + (cls ? ' ' + cls : '');
    }

    function applyDarkMode(enabled) {
      document.documentElement.classList.toggle('dark-mode', !!enabled);
    }

    function applyControlsState(c) {
      if (!c) return;
      if (typeof c.argsVisible === 'boolean') argsEl.style.display = c.argsVisible ? '' : 'none';
      if (typeof c.streamFilterVisible === 'boolean') streamEl.style.display = c.streamFilterVisible ? '' : 'none';
      if (typeof c.runDisabled === 'boolean') runBtn.disabled = c.runDisabled;
      if (typeof c.stopVisible === 'boolean') stopBtn.style.display = c.stopVisible ? '' : 'none';
      if (typeof c.args === 'string' && document.activeElement !== argsEl) argsEl.value = c.args;
      if (typeof c.streamFilter === 'string') streamEl.value = c.streamFilter;
    }

    function applySnapshot(snap) {
      if (!snap) return;
      if (typeof snap.darkMode === 'boolean') applyDarkMode(snap.darkMode);
      setKind(snap.kind || 'output');
      if (snap.controls) applyControlsState(snap.controls);
      if (kind === 'preview') {
        outEl.style.display = 'none';
        frameEl.style.display = '';
        // Detect URL vs srcdoc heuristically: URLs are short, start with
        // a scheme. Anything else (typically an HTML doc) goes into srcdoc.
        var content = snap.content || '';
        var isUrl = /^(https?:|blob:|data:|\/)/.test(content) && content.length < 2048;
        var key = (isUrl ? 'src:' : 'srcdoc:') + content;
        if (key !== lastFrameSrc) {
          lastFrameSrc = key;
          if (isUrl) {
            frameEl.removeAttribute('srcdoc');
            frameEl.src = content;
          } else {
            frameEl.removeAttribute('src');
            frameEl.srcdoc = content;
          }
        }
      } else {
        // terminal + output both render to <pre>
        frameEl.style.display = 'none';
        outEl.style.display = '';
        if (kind === 'terminal') {
          // Terminal serialized as plain text — render as textContent
          outEl.textContent = snap.content || '';
        } else {
          // Output is HTML (may contain colored stdout/stderr spans)
          outEl.innerHTML = snap.content || '';
        }
        // Auto-scroll to bottom
        outEl.scrollTop = outEl.scrollHeight;
      }
      booted = true;
      overlayEl.style.display = 'none';
      setStatus('Connected', 'ok');
    }

    channel.addEventListener('message', function (e) {
      var msg = e.data || {};
      if (msg.sourceId === sourceId) return;
      switch (msg.type) {
        case 'heartbeat':
          lastHeartbeat = Date.now();
          setStatus('Connected', 'ok');
          post('heartbeat-ack', { role: role });
          break;
        case 'output-snapshot':
          applySnapshot(msg);
          break;
        case 'output-update':
          applySnapshot(msg);
          break;
        case 'controls-state':
          applyControlsState(msg.controls);
          break;
        case 'react-patch':
          // Forward the hot-reload payload into our iframe — its srcdoc
          // registered the same `react-hot-reload` message listener, so
          // this re-renders without a full srcdoc swap.
          if (msg.payload && frameEl && frameEl.contentWindow) {
            try { frameEl.contentWindow.postMessage(msg.payload, '*'); }
            catch (e) { /* ignore */ }
          }
          break;
        case 'dark-mode':
          applyDarkMode(msg.enabled);
          break;
        case 'force-close':
          if (msg.targetRole === role) {
            post('popup-closing', { role: role });
            setTimeout(function () { window.close(); }, 30);
          }
          break;
      }
    });

    window.addEventListener('beforeunload', function () {
      post('popup-closing', { role: role });
    });

    setInterval(function () {
      if (!lastHeartbeat) return;
      var age = Date.now() - lastHeartbeat;
      if (age > 12000) setStatus('Disconnected', 'bad');
      else if (age > 6000) setStatus('Reconnecting…', 'warn');
    }, 1500);

    post('hello', { role: role });
    setTimeout(function () { if (!booted) post('hello', { role: role }); }, 400);
    setTimeout(function () {
      if (!booted) {
        overlayEl.textContent = 'Reconnecting to tutorial…';
        setStatus('Reconnecting…', 'warn');
      }
    }, 2000);
  })();
  </script>
</body>
</html>
