<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Output &mdash; Tutorial</title>
  <script>
    (function () {
      var p = new URLSearchParams(location.search);
      if (p.get('dark') === '1') document.documentElement.classList.add('dark-mode');
    })();
  </script>
  <link rel="stylesheet" href="{{ '/css/tutorial.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/css/tutorial-popouts.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/css/print-light.css' | relative_url }}">
</head>
<body>
  <main aria-label="Tutorial output popout">
  <h1 class="sr-only">Output popout</h1>
  <div class="top-bar">
    <span class="kind-name" id="kindEl">&hellip;</span>
    <div class="actions" id="actionsEl">
      <input type="text" class="args is-hidden" id="argsEl" placeholder="Program args…" aria-label="Program arguments">
      <select id="streamFilterEl" class="is-hidden" aria-label="Filter output streams">
        <option value="all">All Output</option>
        <option value="stdout">Stdout Only</option>
        <option value="stderr">Stderr Only</option>
      </select>
      <button id="runBtn" class="primary" aria-label="Run current file">▶ Run</button>
      <button id="stopBtn" class="is-hidden" aria-label="Stop execution">◼ Stop</button>
      <button id="clearBtn" aria-label="Clear output">Clear</button>
      <button id="refreshBtn" class="is-hidden" aria-label="Rebuild preview">↻ Refresh</button>
    </div>
    <span class="stat" id="statusEl" role="status" aria-live="polite">Connecting&hellip;</span>
  </div>
  <div class="wrap">
    <pre class="out-pre is-hidden" id="outEl"></pre>
    <iframe class="preview-frame is-hidden" id="frameEl" title="Live tutorial preview"
      sandbox="allow-scripts allow-forms"></iframe>
    <div class="overlay" id="overlayEl">Waiting for tutorial&hellip;</div>
  </div>
  </main>

  <script src="{{ '/js/tutorial-popout-client.js' | relative_url }}"></script>
  <script>
  (function () {
    var els = {
      kind:       document.getElementById('kindEl'),
      status:     document.getElementById('statusEl'),
      overlay:    document.getElementById('overlayEl'),
      out:        document.getElementById('outEl'),
      frame:      document.getElementById('frameEl'),
      args:       document.getElementById('argsEl'),
      stream:     document.getElementById('streamFilterEl'),
      run:        document.getElementById('runBtn'),
      stop:       document.getElementById('stopBtn'),
      clear:      document.getElementById('clearBtn'),
      refresh:    document.getElementById('refreshBtn'),
    };

    var kind = new URLSearchParams(location.search).get('kind') || 'output';
    var lastFrameContent = null;
    var previewReady = false;
    var expectedPreviewGeneration = null;
    var activePreviewGeneration = null;
    var pendingReactPatch = null;

    var client = SebookPopoutClient.connect({
      role: 'output',
      statusEl: els.status,
      statusClass: 'stat',
      overlayEl: els.overlay,
      onMessage: handleMessage,
    });

    setKind(kind);
    document.title = labelForKind(kind) + ' — ' + client.tutorialTitle;

    window.addEventListener('message', function (event) {
      if (!els.frame || event.source !== els.frame.contentWindow) return;
      var message = event.data;
      if (!message || message.type !== 'sebook-react-preview-ready') return;
      if (expectedPreviewGeneration !== null &&
          message.generation !== expectedPreviewGeneration) return;
      activePreviewGeneration = message.generation;
      previewReady = true;
      flushReactPatch();
    });

    // ── Header control wiring (button → request main) ────────────────────
    els.run.addEventListener('click', function () { client.post('request-run', { args: els.args.value || '' }); });
    els.stop.addEventListener('click', function () { client.post('request-stop'); });
    els.clear.addEventListener('click', function () { client.post('request-clear'); });
    els.refresh.addEventListener('click', function () { client.post('request-refresh'); });
    els.args.addEventListener('input', function () { client.post('args-change', { args: els.args.value || '' }); });
    els.stream.addEventListener('change', function () { client.post('stream-filter-change', { filter: els.stream.value }); });

    // ── View-mode helpers ────────────────────────────────────────────────
    function labelForKind(k) {
      return k === 'terminal' ? 'TERMINAL' : k === 'preview' ? 'LIVE PREVIEW' : 'OUTPUT';
    }
    function setKind(k) {
      kind = k;
      els.kind.textContent = labelForKind(k);
      document.title = labelForKind(k) + ' — ' + client.tutorialTitle;
      // Run/Stop/Clear are output-only; Refresh is preview-only; terminal
      // has no header controls (matches main's terminal panel).
      var preview = k === 'preview';
      var terminal = k === 'terminal';
      setVisible(els.run, !(preview || terminal));
      setVisible(els.clear, !(preview || terminal));
      setVisible(els.refresh, preview);
      if (preview || terminal) setVisible(els.stop, false);
    }
    function setVisible(el, visible) {
      if (!el) return;
      el.classList.toggle('is-hidden', !visible);
      el.style.display = visible ? '' : 'none';
    }
    function applyControlsState(c) {
      if (!c) return;
      if (typeof c.argsVisible === 'boolean') setVisible(els.args, c.argsVisible);
      if (typeof c.streamFilterVisible === 'boolean') setVisible(els.stream, c.streamFilterVisible);
      if (typeof c.runDisabled === 'boolean') els.run.disabled = c.runDisabled;
      if (typeof c.stopVisible === 'boolean') setVisible(els.stop, c.stopVisible);
      if (typeof c.args === 'string' && document.activeElement !== els.args) els.args.value = c.args;
      if (typeof c.streamFilter === 'string') els.stream.value = c.streamFilter;
    }

    function flushReactPatch() {
      if (!previewReady || !pendingReactPatch || !els.frame.contentWindow) return;
      if (pendingReactPatch.generation !== activePreviewGeneration) return;
      var payload = pendingReactPatch;
      pendingReactPatch = null;
      try { els.frame.contentWindow.postMessage(payload, '*'); }
      catch (e) { pendingReactPatch = payload; }
    }

    function queueReactPatch(payload) {
      if (!payload) return;
      pendingReactPatch = payload;
      flushReactPatch();
    }

    function applySnapshot(snap) {
      if (!snap) return;
      if (typeof snap.darkMode === 'boolean') {
        document.documentElement.classList.toggle('dark-mode', snap.darkMode);
      }
      setKind(snap.kind || 'output');
      if (snap.controls) applyControlsState(snap.controls);
      if (kind === 'preview') {
        setVisible(els.out, false);
        setVisible(els.frame, true);
        // URL vs srcdoc: short content starting with a URL scheme → src,
        // anything else (typically a full HTML doc) → srcdoc.
        var content = snap.content || '';
        var isUrl = /^(https?:|blob:|data:|\/)/.test(content) && content.length < 2048;
        var key = (isUrl ? 'src:' : 'srcdoc:') + content;
        if (key !== lastFrameContent) {
          lastFrameContent = key;
          previewReady = false;
          activePreviewGeneration = null;
          expectedPreviewGeneration = typeof snap.previewGeneration === 'number'
            ? snap.previewGeneration : null;
          if (!pendingReactPatch ||
              pendingReactPatch.generation !== expectedPreviewGeneration) {
            pendingReactPatch = null;
          }
          if (isUrl) {
            els.frame.removeAttribute('srcdoc');
            els.frame.src = content;
          } else {
            els.frame.removeAttribute('src');
            els.frame.srcdoc = content;
          }
        }
      } else {
        previewReady = false;
        expectedPreviewGeneration = null;
        activePreviewGeneration = null;
        pendingReactPatch = null;
        setVisible(els.frame, false);
        setVisible(els.out, true);
        if (kind === 'terminal') els.out.textContent = snap.content || '';
        else els.out.innerHTML = snap.content || '';
        els.out.scrollTop = els.out.scrollHeight;
      }
      client.markConnected();
    }

    // ── Role-specific message routing ────────────────────────────────────
    function handleMessage(msg) {
      switch (msg.type) {
        case 'output-snapshot':
        case 'output-update':
          applySnapshot(msg);
          break;
        case 'controls-state':
          applyControlsState(msg.controls);
          break;
        case 'react-patch':
          queueReactPatch(msg.payload);
          break;
      }
    }
  })();
  </script>
</body>
</html>
