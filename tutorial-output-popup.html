<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Output &mdash; Tutorial</title>
  <script>
    (function () {
      var p = new URLSearchParams(location.search);
      if (p.get('dark') === '1') document.documentElement.classList.add('dark-mode');
    })();
  </script>
  <link rel="stylesheet" href="{{ '/css/tutorial.css' | relative_url }}">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    body { display: flex; flex-direction: column; background: #1e1e1e; color: #e8e8f0; }
    html:not(.dark-mode) body { background: #fff; color: #222; }
    .top-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 12px; background: #161618; border-bottom: 1px solid #2a2a2e;
      flex-shrink: 0; font-size: 12.5px;
    }
    html:not(.dark-mode) .top-bar { background: #f3f3f3; border-bottom-color: #d4d4d4; }
    .kind-name { font-weight: 600; color: #e8e8f0; text-transform: uppercase;
      letter-spacing: 0.06em; font-size: 11.5px; }
    html:not(.dark-mode) .kind-name { color: #333; }
    .stat { color: #888; font-size: 11.5px; margin-left: auto; }
    .stat.ok { color: #4caf50; }
    .stat.warn { color: #d4a017; }
    .stat.bad { color: #c0392b; }
    .actions { display: flex; align-items: center; gap: 6px; }
    .actions button {
      padding: 3px 10px; border: 1px solid #3a3a52; border-radius: 3px;
      background: #1f1f2a; color: #c8d4e4; font-size: 12px; line-height: 1.3;
      cursor: pointer; font-family: inherit;
    }
    .actions button.primary { background: #0078d4; color: #fff; border-color: #0078d4; }
    .actions button.primary:hover { background: #1a8be0; }
    .actions button:hover { background: #303046; border-color: #5a5a78; }
    .actions input.args {
      padding: 3px 8px; border: 1px solid #3a3a52; border-radius: 3px;
      background: #1f1f2a; color: #c8d4e4; font-family: 'Fira Code','Cascadia Code',Menlo,monospace;
      font-size: 12px; width: 200px;
    }
    .actions select {
      padding: 3px 6px; border: 1px solid #3a3a52; border-radius: 3px;
      background: #1f1f2a; color: #c8d4e4; font-size: 11.5px; font-family: inherit;
    }
    html:not(.dark-mode) .actions button {
      background: #fff; color: #333; border-color: #c8c8d0;
    }
    html:not(.dark-mode) .actions button:hover {
      background: #e8edf3; border-color: #8a96a8;
    }
    html:not(.dark-mode) .actions input.args,
    html:not(.dark-mode) .actions select {
      background: #fff; color: #333; border-color: #c8c8d0;
    }
    .wrap { flex: 1; min-height: 0; position: relative; display: flex; flex-direction: column; }
    .overlay {
      position: absolute; inset: 0; background: rgba(20,20,28,0.86); color: #ddd;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; z-index: 999;
    }
    html:not(.dark-mode) .overlay { background: rgba(255,255,255,0.92); color: #333; }
    .out-pre {
      flex: 1; min-height: 0; margin: 0; overflow: auto;
      background: #0e0e14; color: #e0e0e8; font-family: 'Fira Code', 'Cascadia Code', Menlo, monospace;
      font-size: 13px; line-height: 1.5; padding: 12px 14px; white-space: pre-wrap;
    }
    html:not(.dark-mode) .out-pre { background: #fafafa; color: #1f1f1f; }
    .preview-frame { flex: 1; min-height: 0; border: 0; width: 100%; height: 100%; background: #fff; }
  </style>
</head>
<body>
  <div class="top-bar">
    <span class="kind-name" id="kindEl">&hellip;</span>
    <div class="actions" id="actionsEl">
      <input type="text" class="args" id="argsEl" placeholder="Program args…" style="display:none">
      <select id="streamFilterEl" style="display:none">
        <option value="all">All Output</option>
        <option value="stdout">Stdout Only</option>
        <option value="stderr">Stderr Only</option>
      </select>
      <button id="runBtn" class="primary" title="Run current file">▶ Run</button>
      <button id="stopBtn" style="display:none" title="Stop execution">◼ Stop</button>
      <button id="clearBtn" title="Clear output">Clear</button>
      <button id="refreshBtn" style="display:none" title="Rebuild preview">↻ Refresh</button>
    </div>
    <span class="stat" id="statusEl">Connecting&hellip;</span>
  </div>
  <div class="wrap">
    <pre class="out-pre" id="outEl" style="display:none"></pre>
    <iframe class="preview-frame" id="frameEl" style="display:none"
      sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
    <div class="overlay" id="overlayEl">Waiting for tutorial&hellip;</div>
  </div>

  <script src="{{ '/js/tutorial-popout-client.js' | relative_url }}"></script>
  <script>
  (function () {
    var els = {
      kind:       document.getElementById('kindEl'),
      status:     document.getElementById('statusEl'),
      overlay:    document.getElementById('overlayEl'),
      out:        document.getElementById('outEl'),
      frame:      document.getElementById('frameEl'),
      args:       document.getElementById('argsEl'),
      stream:     document.getElementById('streamFilterEl'),
      run:        document.getElementById('runBtn'),
      stop:       document.getElementById('stopBtn'),
      clear:      document.getElementById('clearBtn'),
      refresh:    document.getElementById('refreshBtn'),
    };

    var kind = new URLSearchParams(location.search).get('kind') || 'output';
    var lastFrameContent = null;

    var client = SebookPopoutClient.connect({
      role: 'output',
      statusEl: els.status,
      statusClass: 'stat',
      overlayEl: els.overlay,
      onMessage: handleMessage,
    });

    setKind(kind);
    document.title = labelForKind(kind) + ' — ' + client.tutorialTitle;

    // ── Header control wiring (button → request main) ────────────────────
    els.run.addEventListener('click', function () { client.post('request-run', { args: els.args.value || '' }); });
    els.stop.addEventListener('click', function () { client.post('request-stop'); });
    els.clear.addEventListener('click', function () { client.post('request-clear'); });
    els.refresh.addEventListener('click', function () { client.post('request-refresh'); });
    els.args.addEventListener('input', function () { client.post('args-change', { args: els.args.value || '' }); });
    els.stream.addEventListener('change', function () { client.post('stream-filter-change', { filter: els.stream.value }); });

    // ── View-mode helpers ────────────────────────────────────────────────
    function labelForKind(k) {
      return k === 'terminal' ? 'TERMINAL' : k === 'preview' ? 'LIVE PREVIEW' : 'OUTPUT';
    }
    function setKind(k) {
      kind = k;
      els.kind.textContent = labelForKind(k);
      document.title = labelForKind(k) + ' — ' + client.tutorialTitle;
      // Run/Stop/Clear are output-only; Refresh is preview-only; terminal
      // has no header controls (matches main's terminal panel).
      var preview = k === 'preview';
      var terminal = k === 'terminal';
      els.run.style.display = preview || terminal ? 'none' : '';
      els.stop.style.display = preview || terminal ? 'none' : els.stop.style.display;
      els.clear.style.display = preview || terminal ? 'none' : '';
      els.refresh.style.display = preview ? '' : 'none';
    }
    function applyControlsState(c) {
      if (!c) return;
      if (typeof c.argsVisible === 'boolean') els.args.style.display = c.argsVisible ? '' : 'none';
      if (typeof c.streamFilterVisible === 'boolean') els.stream.style.display = c.streamFilterVisible ? '' : 'none';
      if (typeof c.runDisabled === 'boolean') els.run.disabled = c.runDisabled;
      if (typeof c.stopVisible === 'boolean') els.stop.style.display = c.stopVisible ? '' : 'none';
      if (typeof c.args === 'string' && document.activeElement !== els.args) els.args.value = c.args;
      if (typeof c.streamFilter === 'string') els.stream.value = c.streamFilter;
    }

    function applySnapshot(snap) {
      if (!snap) return;
      if (typeof snap.darkMode === 'boolean') {
        document.documentElement.classList.toggle('dark-mode', snap.darkMode);
      }
      setKind(snap.kind || 'output');
      if (snap.controls) applyControlsState(snap.controls);
      if (kind === 'preview') {
        els.out.style.display = 'none';
        els.frame.style.display = '';
        // URL vs srcdoc: short content starting with a URL scheme → src,
        // anything else (typically a full HTML doc) → srcdoc.
        var content = snap.content || '';
        var isUrl = /^(https?:|blob:|data:|\/)/.test(content) && content.length < 2048;
        var key = (isUrl ? 'src:' : 'srcdoc:') + content;
        if (key !== lastFrameContent) {
          lastFrameContent = key;
          if (isUrl) {
            els.frame.removeAttribute('srcdoc');
            els.frame.src = content;
          } else {
            els.frame.removeAttribute('src');
            els.frame.srcdoc = content;
          }
        }
      } else {
        els.frame.style.display = 'none';
        els.out.style.display = '';
        if (kind === 'terminal') els.out.textContent = snap.content || '';
        else els.out.innerHTML = snap.content || '';
        els.out.scrollTop = els.out.scrollHeight;
      }
      client.markConnected();
    }

    // ── Role-specific message routing ────────────────────────────────────
    function handleMessage(msg) {
      switch (msg.type) {
        case 'output-snapshot':
        case 'output-update':
          applySnapshot(msg);
          break;
        case 'controls-state':
          applyControlsState(msg.controls);
          break;
        case 'react-patch':
          // Forward hot-reload payload into our iframe — its srcdoc
          // registered the same react-hot-reload listener, so this
          // re-renders without a full srcdoc swap.
          if (msg.payload && els.frame && els.frame.contentWindow) {
            try { els.frame.contentWindow.postMessage(msg.payload, '*'); }
            catch (e) { /* ignore */ }
          }
          break;
      }
    }
  })();
  </script>
</body>
</html>
