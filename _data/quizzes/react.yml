title: "React Concepts Quiz"
description: "Test your deeper understanding of React's design philosophy, state management, and component architecture."
questions:
  - question: |
      A C++ developer writes this React component and is confused why clicking the button does nothing:
      ```jsx
      function Counter() {
        let count = 0;
        return <button onClick={() => count++}>{count}</button>;
      }
      ```
      **Analyze** the bug using the React rendering model.
    options:
      - "`count++` is invalid JavaScript syntax inside an arrow function"
      - "React re-executes the component function on every render. `let count = 0` resets `count` each time, and mutating a local variable doesn't signal React to re-render. The fix: `const [count, setCount] = React.useState(0)` with `setCount(count + 1)`"
      - "Arrow functions cannot access variables from the outer scope"
      - "The `onClick` handler needs to be a named function, not an anonymous arrow function"
    correct_index: 1
    explanation: "React's model is fundamentally different from C++ member variables. A component function is re-invoked on every render, destroying all local variables. `useState` stores values in React's internal data structure that persists across renders. The setter function is the ONLY way to signal React that state changed."

  - question: "A student stores the full filtered list in state alongside the unfiltered list: `const [allTasks, setAllTasks] = useState(tasks)` and `const [filteredTasks, setFilteredTasks] = useState(tasks)`. **Evaluate** this design."
    options:
      - "This is correct — having both lists in state makes the component faster"
      - "This violates the 'minimal state' principle. Storing derived data creates sync bugs — if tasks change, you must remember to update BOTH states. Instead, store only the filter string in state and derive the filtered list: `const filtered = tasks.filter(t => ...)`"
      - "This is correct — React requires all displayed data to be in state"
      - "The only problem is naming — `filteredTasks` should be called `visibleTasks`"
    correct_index: 1
    explanation: "React's principle: store the MINIMAL state and DERIVE everything else. The filtered list is computable from (allTasks + filter), so it should not be separate state. Two pieces of state that must be kept in sync is a recipe for bugs — the data becomes inconsistent the moment one is updated without the other."

  - question: "Why does React require a stable `key` prop on list items, and why is using the array index as a key dangerous for dynamic lists?"
    options:
      - "Keys are needed for CSS styling — React uses them to apply animations"
      - "Keys let React's reconciler identify which items are stable across re-renders. With index keys, deleting the middle item shifts all subsequent indices — React maps keys to component instances, so it associates the wrong state (e.g., checked checkboxes) with the wrong items"
      - "Keys are optional — React works fine without them, just slower"
      - "Array indices are not valid as React keys — React requires string keys only"
    correct_index: 1
    explanation: "React uses keys to match elements between the old and new virtual DOM trees. If keys are stable (like database IDs), React knows item #42 is the same item #42 even if its position changed. With index keys, React thinks 'the item at index 2' is always the same item — but after a deletion, a different item now sits at index 2, inheriting the wrong state."

  - question: "In 'Thinking in React', why should you build a **static version** (props only, no state) BEFORE adding any state?"
    options:
      - "Because React cannot compile components that use both props and state"
      - "A static version establishes the component hierarchy and data flow without the complexity of interactivity. This separates two concerns: (1) what the UI looks like and (2) how it changes. Starting with state leads to over-engineering and makes it harder to identify minimal state"
      - "State is slow — building without state first ensures optimal performance"
      - "It is just a convention — there is no technical reason to build static first"
    correct_index: 1
    explanation: "Building static first forces you to think about data flow (which component gets which props) before worrying about interactivity. This naturally reveals the component hierarchy and makes it easy to identify the minimal state: any data that (a) changes over time and (b) can't be computed from other state or props."

  - question: |
      **Analyze** this code. What renders when `count` is `0`?
      ```jsx
      {count && <Badge count={count} />}
      ```
    options:
      - "Nothing — `0` is falsy, so the short-circuit prevents rendering"
      - "The number `0` appears as text in the UI. Unlike `false`, `null`, and `undefined`, the number `0` IS a valid React node. Fix: `{count > 0 && <Badge count={count} />}`"
      - "`<Badge count={0} />` renders normally"
      - "A React error about invalid node type"
    correct_index: 1
    explanation: "JavaScript's `&&` returns the first falsy value. `0 && <Badge />` evaluates to `0`. React renders `false`, `null`, and `undefined` as nothing, but renders `0` as the text '0'. This is a subtle and common bug. The fix: ensure the left operand is always a boolean."

  - question: "A `<SearchBar>` and a `<ProductTable>` are sibling components. The user types in the search bar and the table should filter. **Analyze**: where should the `filterText` state live, and why?"
    options:
      - "In `SearchBar` — it owns the input, so it should own the state"
      - "In `ProductTable` — it needs the filter to display results"
      - "In their common ancestor — both components need `filterText` (one for display, one for filtering). State should live in the lowest common ancestor that needs it, passed down as props with a callback for updates"
      - "In a global variable — both can access it without prop passing"
    correct_index: 2
    explanation: "This is 'lifting state up'. `SearchBar` needs `filterText` to show the current value. `ProductTable` needs it to filter rows. Their parent owns the state and passes it down: `<SearchBar value={text} onChange={setText} />` and `<ResultsList filter={text} />`. The child calls `onChange(newValue)` to notify the parent — this is inverse data flow."

  - question: |
      **Evaluate**: A student proposes using class inheritance for React components: `class AdminCard extends UserCard`. Why does React prefer composition instead?
    options:
      - "JavaScript does not support class inheritance"
      - "Deep inheritance hierarchies are fragile — changing `UserCard` can break `AdminCard`. Composition using `children` and small components is more flexible: `<Card><AdminBadge /><UserInfo /></Card>` can be rearranged without touching Card's implementation"
      - "Inheritance is slower at runtime in React's virtual DOM"
      - "React does not support class components at all"
    correct_index: 1
    explanation: "The 'fragile base class' problem: modifying a parent class can unexpectedly break subclasses. React's composition model avoids this — a `Card` component that accepts `children` can wrap ANY content without knowing what it is. This gives more flexibility than inheritance and follows the same 'prefer composition over inheritance' principle from OOP courses."
