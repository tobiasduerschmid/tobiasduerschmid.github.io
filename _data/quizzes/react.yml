title: "React Concepts Quiz"
description: "Test your deeper understanding of React's design philosophy, state management, component architecture, event handlers, useEffect, and state immutability."
active: true
questions:
  - id: 1
    difficulty: intermediate
    question: |
      A C++ developer writes this React component and is confused why clicking the button does nothing:
      ```jsx
      function Counter() {
        let count = 0;
        return <button onClick={() => count++}>{count}</button>;
      }
      ```
      What is the bug, using the React rendering model?
    options:
      - "`count++` is invalid JavaScript syntax inside an arrow function"
      - "Each render resets `let count = 0`; persistent state needs `useState`."
      - "Arrow functions cannot access variables from the outer scope"
      - "The `onClick` handler needs to be a named function, not an anonymous arrow function"
    correct_index: 1
    option_feedback:
      0: |
        The arrow function is valid JavaScript; the problem is that changing a local variable does not
        persist state or request a React render.
      2: |
        Arrow functions do close over surrounding variables; the issue is that the variable is recreated
        on each render.
      3: |
        A named function would still mutate a throwaway local; the fix is to put persistent UI data in
        state.
    explanation: "Unlike a C++ member variable, a component function is re-invoked on every render, so each `let count = 0` starts fresh and any mutation is discarded. `useState` stores the value in React's own data structure that survives across renders, and calling its setter is the only thing that signals a re-render."

  - id: 2
    difficulty: advanced
    question: "A student stores the full filtered list in state alongside the unfiltered list: `const [allTasks, setAllTasks] = useState(tasks)` and `const [filteredTasks, setFilteredTasks] = useState(tasks)`. What design problem does this create?"
    options:
      - "This is correct — having both lists in state makes the component faster"
      - "Storing derived data violates minimal state — only the filter string is real state."
      - "This is correct — React requires all displayed data to be in state"
      - "The only problem is naming — `filteredTasks` should be called `visibleTasks`"
    correct_index: 1
    option_feedback:
      0: |
        Storing a filtered copy creates a second source of truth that can drift from the original list.
      2: |
        React can render values derived from props and state during render; only data that changes
        independently needs state.
      3: |
        A clearer variable name does not remove the bug-prone obligation to update two related states
        together.
    explanation: "Keep state minimal and derive everything else. The filtered list is fully computable from `allTasks` plus a filter string, so storing it separately creates a second source of truth that goes stale the moment one is updated without the other."

  - id: 3
    difficulty: advanced
    question: "Why does React require a stable `key` prop on list items, and why is using the array index as a key dangerous for dynamic lists?"
    options:
      - "Keys are needed for CSS styling — React uses them to apply animations"
      - "Keys let React match items across renders; index keys mis-attach state after a deletion."
      - "Keys are optional — React works fine without them, just slower"
      - "Array indices are not valid as React keys — React requires string keys only"
    correct_index: 1
    option_feedback:
      0: |
        React keys are for reconciliation identity, not CSS selection or animation by themselves.
      2: |
        Bad or missing keys can attach component state to the wrong item, not merely make rendering
        slower.
      3: |
        Index keys are allowed, but they are unsafe when list items can be inserted, deleted, or
        reordered.
    explanation: "Keys match elements between the old and new virtual DOM trees. A stable ID lets React recognise item #42 as the same item even when its position changes; an index key only ever means \"the item currently at slot 2\", so after a deletion a different item inherits that slot's component state (checkbox, focus, input value)."

  - id: 4
    difficulty: advanced
    question: "In 'Thinking in React', why should you build a **static version** (props only, no state) BEFORE adding any state?"
    options:
      - "Because React cannot compile components that use both props and state"
      - "A static pass settles the component hierarchy and data flow before interactivity arrives."
      - "State is slow — building without state first ensures optimal performance"
      - "It is just a convention — there is no technical reason to build static first"
    correct_index: 1
    option_feedback:
      0: |
        React components can use both; the teaching sequence is about reducing design complexity, not
        satisfying a compiler limit.
      2: |
        The static-first pass is mainly about finding the minimal state model, not avoiding state
        because it is inherently slow.
      3: |
        Building the static version first exposes component boundaries and data flow before
        interactivity makes the design harder to reason about.
    explanation: "A static, props-only pass settles the component hierarchy and data flow before interactivity is in the picture. With that structure visible, the minimal state is easy to spot — any data that both changes over time and can't be computed from other state or props."

  - id: 5
    difficulty: advanced
    question: |
      What renders when `count` is `0`?
      ```jsx
      {count && <Badge count={count} />}
      ```
    options:
      - "Nothing renders — `0` is falsy, so the short-circuit prevents output entirely"
      - "The text `0` appears because `0` is a valid React node and `&&` returns it"
      - "`<Badge count={0} />` renders normally because React unwraps the `0` operand"
      - "React throws an invalid-node-type error because `0` cannot be a JSX child"
    correct_index: 1
    option_feedback:
      0: |
        React suppresses `false`, `null`, and `undefined`, but the number `0` is valid text and will
        render.
      2: |
        JavaScript `&&` returns the left operand when it is falsy, so React receives `0`, not `<Badge
        />`.
      3: |
        `0` is not an invalid React child; it is exactly the kind of primitive React renders as text.
    explanation: "`&&` returns its left operand when that operand is falsy, so `0 && <Badge />` evaluates to `0` — and `0` is a valid React node that renders as the text \"0\". React skips `false`, `null`, and `undefined`, but not `0`. Make the left operand a real boolean (`count > 0 && ...`) so it short-circuits to `false`."

  - id: 6
    difficulty: advanced
    question: "A `<SearchBar>` and a `<ProductTable>` are sibling components. The user types in the search bar and the table should filter. Where should the `filterText` state live, and why?"
    options:
      - "In `SearchBar` — it owns the input, so it should own the state"
      - "In `ProductTable` — it needs the filter to display results"
      - "In their lowest common ancestor — both siblings need it via props."
      - "In a global variable — both can access it without prop passing"
    correct_index: 2
    option_feedback:
      0: |
        `SearchBar` owns the event source, but the state must live where every dependent sibling can
        receive the same value.
      1: |
        `ProductTable` uses the filter, but putting state there would leave the input sibling unable to
        display and update the shared value.
      3: |
        A global avoids prop passing by creating hidden shared state that React cannot track through the
        component tree.
    explanation: "This is \"lifting state up\". Both siblings depend on `filterText` — one to display it, one to filter rows — so it belongs in their lowest common ancestor, passed down as props (`value`) with a callback (`onChange`). The child calls `onChange(newValue)` to notify the parent, which re-renders both: data flows down, notifications flow up."

  - id: 7
    difficulty: advanced
    question: |
      A student proposes using class inheritance for React components: `class AdminCard extends UserCard`. Why does React prefer composition instead?
    options:
      - "JavaScript does not support class inheritance, so `extends UserCard` is invalid"
      - "Deep inheritance is fragile — composition with `children` decouples `Card` from contents"
      - "Inheritance is slower at runtime because React's virtual DOM cannot diff subclasses"
      - "React class components were removed in React 18, so inheritance is no longer supported"
    correct_index: 1
    option_feedback:
      0: |
        JavaScript supports class inheritance; React discourages it because composition fits UI
        variation better.
      2: |
        The main issue is coupling and fragile reuse, not virtual-DOM speed.
      3: |
        React still understands class components, but composition is preferred over inheritance for
        sharing UI structure.
    explanation: "Deep inheritance hits the \"fragile base class\" problem — a change to the parent can silently break every subclass. Composition sidesteps it: a `Card` that accepts `children` wraps any content without knowing what it is. This is the same \"prefer composition over inheritance\" principle from OOP, applied to UI."

  - id: 8
    difficulty: advanced
    question: |
      **Arrange** the lines to build a React component with a controlled input that filters a list of items.
    type: parsons
    lines:
      - "function FilterList({ items }) {"
      - "    const [query, setQuery] = useState('');"
      - "    const filtered = items.filter(item => item.includes(query));"
      - "    return ("
      - "        <>"
      - "            <input value={query} onChange={e => setQuery(e.target.value)} />"
      - "            <ul>{filtered.map(item => <li key={item}>{item}</li>)}</ul>"
      - "        </>"
      - "    );"
      - "}"
    distractors:
      - "    const [filtered, setFiltered] = useState(items);"
      - "    <input onChange={e => query = e.target.value} />"
    explanation: "Only the query is state; the filtered list is derived from `items` and `query` (minimal state), and the controlled `<input>` binds `value` to state while updating through `setQuery`. The `useState(items)` distractor stores `filtered` as a second, drift-prone copy; the `query = e.target.value` distractor mutates the variable directly and so never signals a re-render."

  - id: 9
    difficulty: advanced
    question: |
      **Arrange** the lines to create a custom React hook that fetches data from an API on mount.
    type: parsons
    lines:
      - "function useFetch(url) {"
      - "    const [data, setData] = useState(null);"
      - "    useEffect(() => {"
      - "        fetch(url)"
      - "            .then(res => res.json())"
      - "            .then(json => setData(json));"
      - "    }, [url]);"
      - "    return data;"
      - "}"
    distractors:
      - "    }, []);"
      - "    setData(fetch(url));"
    explanation: "Custom hooks start with `use`. `useState(null)` holds the data, `useEffect` runs the fetch after render, and the `[url]` dependency array re-runs it whenever `url` changes. The `[]` distractor pins the effect to the first `url` (stale closure — it never re-fetches); the `setData(fetch(url))` distractor stores the Promise itself instead of the resolved JSON."

  - id: 10
    difficulty: advanced
    question: |
      **Arrange** the fragments to write a JSX expression that conditionally renders a badge, avoiding the `0` rendering bug.
    type: parsons
    display: inline
    lines:
      - "{count > 0"
      - "&&"
      - "<Badge count={count} />}"
    distractors:
      - "{count"
      - "||"
    explanation: "Making the left operand a boolean (`count > 0`) means it short-circuits to `false` when `count` is `0`, so React renders nothing. The bare `{count` operand would hand React the number `0`, which renders as text; swapping `&&` for `||` flips the logic, showing the badge precisely when `count` is falsy."

  - id: 11
    difficulty: advanced
    question: |
      What happens when the component first renders?
      ```jsx
      function App() {
        const [count, setCount] = useState(0);
        return <button onClick={setCount(count + 1)}>{count}</button>;
      }
      ```
    options:
      - "The button renders and increments `count` once per click — this is correct"
      - "A React error is thrown because `setCount` cannot be used as a prop value"
      - "`setCount(count + 1)` runs during render, retriggering itself — infinite loop."
      - "The component renders fine but clicking does nothing because the handler returns `undefined`"
    correct_index: 2
    option_feedback:
      0: |
        `onClick={setCount(count + 1)}` calls the setter during render instead of passing React a
        function to call later.
      1: |
        Setters can be used from handlers; the bug is invoking the setter while JSX is being evaluated.
      3: |
        The code never waits for a click because the function call has already happened during render.
    explanation: "`onClick` wants a function reference to call later, but `setCount(count + 1)` calls the setter right now, during render, and hands its return value (`undefined`) to `onClick`. Because that state update triggers another render, which calls the setter again, the component re-renders in a loop until React halts it with a \"Too many re-renders\" error. Pass the function, don't call it: `onClick={fn}`, never `onClick={fn()}`."

  - id: 12
    difficulty: advanced
    question: |
      A component fetches user data based on a `userId` prop:
      ```jsx
      useEffect(() => {
        fetch(`/api/users/${userId}`)
          .then(res => res.json())
          .then(data => setUser(data));
      }, []);
      ```
      The parent changes `userId` from `1` to `2`, but the screen still shows user `1`. **Diagnose** the bug.
    options:
      - "`fetch` is asynchronous and cannot be used inside `useEffect`"
      - "The `[]` dependency array fires once on mount; use `[userId]` to refetch on changes."
      - "`useEffect` cannot read props — `userId` is undefined inside the callback"
      - "The `.then()` chain should be replaced with `async/await`"
    correct_index: 1
    option_feedback:
      0: |
        Fetching in an effect is common; the missing dependency is what prevents the effect from
        following prop changes.
      2: |
        Effects close over props from a render; the dependency array tells React when to create a fresh
        effect with new prop values.
      3: |
        `async/await` would not change when the effect runs; `[userId]` is the needed data-flow
        correction.
    explanation: "The dependency array controls when an effect re-runs: `[]` fires once on mount and never again, while `[userId]` also re-fires whenever `userId` changes. Leaving `userId` out leaves the callback closed over the first render's value, so it never refetches. The `react-hooks/exhaustive-deps` lint rule flags exactly this omission."

  - id: 13
    difficulty: advanced
    question: |
      A component tracks a user object: `const [user, setUser] = useState({ name: 'Alice', age: 25 })`. How should you update **only** the `name` to `'Bob'` while keeping `age` intact?
    options:
      - "`user.name = 'Bob'; setUser(user);`"
      - "`setUser({ name: 'Bob' });`"
      - "`setUser({ ...user, name: 'Bob' });`"
      - "`setUser(prev => { prev.name = 'Bob'; return prev; });`"
    correct_index: 2
    option_feedback:
      0: |
        Mutating the same object and passing it back gives React the same reference, so change detection
        and rerendering can be skipped.
      1: |
        Replacing the whole object with `{ name: 'Bob' }` loses `age`; object spread preserves unchanged
        fields.
      3: |
        The functional form gives the previous value safely, but returning that same mutated object
        still violates React's immutability model.
    explanation: "React detects state changes by comparing references, so an update has to produce a *new* object. Spreading `...user` into a fresh object gives that new reference while copying unchanged fields like `age`; mutating the existing object in place keeps the same reference and stays invisible to React."

  - id: 14
    difficulty: advanced
    question: |
      A student has four bugs in different components. Match each bug to the React concept that fixes it:
      **(a)** Product names don't update when different data is passed in
      **(b)** A like counter always shows 0
      **(c)** Deleting the 2nd item in a list causes the 3rd item's checkbox to jump to the 2nd position
      **(d)** A `<div class="header">` renders but has no CSS styling
    options:
      - "(a) state, (b) props, (c) keys, (d) JSX rules"
      - "(a) props, (b) state, (c) keys, (d) JSX rules"
      - "(a) keys, (b) JSX rules, (c) state, (d) props"
      - "(a) JSX rules, (b) keys, (c) props, (d) state"
    correct_index: 1
    option_feedback:
      0: |
        Incoming data changes are a props problem, while a counter that should change over time needs
        state.
      2: |
        Keys diagnose identity moving between list items; they do not explain why incoming product data
        fails to update.
      3: |
        JSX rules explain `className`, but they do not explain persistent counters or sibling data flow.
    explanation: "Each symptom maps to one concept: data not updating when passed in is a **props** issue; a counter stuck at 0 means values aren't in **state** (bare `let` instead of `useState`); state attaching to the wrong row after a delete is an index-**key** issue; and a `class` attribute with no effect is **JSX** (`class` → `className`)."

  - id: 15
    difficulty: advanced
    question: |
      **Arrange** the lines to add an item to a shopping cart stored in React state, using immutable updates.
    type: parsons
    lines:
      - "const [cart, setCart] = React.useState([]);"
      - "const addToCart = (product) => {"
      - "    setCart(prev => [...prev, product]);"
      - "};"
    distractors:
      - "    cart.push(product);"
      - "    setCart(cart);"
    explanation: "The functional update `setCart(prev => [...prev, product])` builds a new array — previous items plus the new one — giving React a fresh reference to re-render on. The `cart.push(product)` distractor mutates in place, and `setCart(cart)` hands back the same reference; React detects changes by reference, so it ignores both."

  - id: 16
    difficulty: advanced
    question: |
      **Arrange** the lines to build a counter component that safely increments using the functional update pattern.
    type: parsons
    lines:
      - "function Counter() {"
      - "  const [count, setCount] = useState(0);"
      - "  function handleClick() {"
      - "    setCount(prev => prev + 1);"
      - "  }"
      - "  return ("
      - "    <div>"
      - "      <p>Count: {count}</p>"
      - "      <button onClick={handleClick}>+</button>"
      - "    </div>"
      - "  );"
      - "}"
    distractors:
      - "    count = count + 1;"
      - "      <button onClick={handleClick()}>+</button>"
    explanation: "The functional form `setCount(prev => prev + 1)` asks React for the latest state at update time, so batched clicks don't read a stale value. The `count = count + 1` distractor reassigns a local variable and never re-renders; the `onClick={handleClick()}` distractor calls the handler during render instead of registering it, which fires the setter every render and loops forever."

  - id: 17
    difficulty: advanced
    question: |
      **Arrange** the lines to build a component that fetches user data when it mounts or when `userId` changes, and shows a loading message while waiting.
    type: parsons
    lines:
      - "function UserProfile({ userId }) {"
      - "  const [user, setUser] = useState(null);"
      - "  useEffect(() => {"
      - "    fetch(`/api/users/${userId}`)"
      - "      .then(res => res.json())"
      - "      .then(data => setUser(data));"
      - "  }, [userId]);"
      - "  if (user === null) {"
      - "    return <p>Loading...</p>;"
      - "  }"
      - "  return <h2>{user.name}</h2>;"
      - "}"
    distractors:
      - "  }, []);"
      - "    .then(data => setUser(fetch(data)));"
    explanation: "The `[userId]` dependency array re-runs the fetch whenever the prop changes, and the `user === null` guard shows a loading message until the response arrives. The `[]` distractor fetches only on mount, leaving stale data when `userId` changes; the `setUser(fetch(data))` distractor stores a Promise in state instead of the already-parsed JSON."
