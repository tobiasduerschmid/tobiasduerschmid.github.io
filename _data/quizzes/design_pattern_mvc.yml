title: "MVC Pattern Quiz"
description: "Test your understanding of the MVC architectural pattern, its compound structure, and its modern variants."
active: true
questions:
  - id: 1
    difficulty: intermediate
    type: single
    question: |
      MVC is called a "compound pattern." Which three design patterns does it combine, and what role does each play?
    options:
      - "Observer (model→view notification), Strategy (view delegates to controller), Composite (view is a tree of UI components)"
      - "Singleton (one model), Factory Method (create views), Adapter (controller adapts input)"
      - "State (model states), Mediator (controller mediates), Facade (view simplifies display)"
      - "Iterator (traverse model data), Command (controller commands), Decorator (view decorates output)"
    correct_index: 0
    option_feedback:
      1: |
        MVC does not require one model, nor is its main structure about creating views or adapting input. The classic compound explanation is about notification, delegated input behavior, and nested UI components.
      2: |
        Controllers can coordinate some interaction, but MVC's controller role is not the same as a Mediator owning all colleague coordination. MVC is usually taught as Observer plus Strategy plus Composite.
      3: |
        Commands may appear in some UI architectures, but this is not the classic compound structure of MVC. MVC's central split is model state, view presentation, and controller input handling.
    explanation: "MVC combines **Observer** (the model is the Subject; views register and are auto-synchronized), **Strategy** (the view delegates input handling to a swappable controller), and **Composite** (the view is often a tree of nested UI components — windows > panels > buttons). The emergent property is a clean three-way separation that no individual pattern achieves alone."

  - id: 2
    difficulty: intermediate
    type: single
    question: |
      In MVC, the Model is completely independent of the View and Controller. Why is this considered the most important architectural property of MVC?
    options:
      - "It makes the Model smaller and simpler"
      - "It allows the core domain logic to be reused, tested, and ported to different platforms without modification"
      - "It prevents the Model from becoming a god class"
      - "It makes the View easier to implement"
    correct_index: 1
    option_feedback:
      0: |
        A model can still be large if the domain is large. MVC's main benefit is not size reduction; it is keeping domain logic independent of presentation and input mechanisms.
      2: |
        Separating the model from the UI helps with responsibilities, but it does not automatically prevent the model from accumulating too much domain behavior. A model can still need its own internal design.
      3: |
        A view may become easier to replace, but MVC's deeper value is that the domain model survives view changes. The architecture protects the core logic from UI churn.
    explanation: "Because the Model knows nothing about Views or Controllers, the core domain logic can be reused across applications, tested without any UI framework, and ported to a different platform by rewriting only the View and Controller. This is why MVC says the Model is blind to how it is displayed."

  - id: 3
    difficulty: intermediate
    type: single
    question: |
      A team uses MVC for a simple CRUD form with one view and no plans for additional views. A colleague suggests the architecture is over-engineered. Is this criticism valid?
    options:
      - "No — MVC should always be used for any application with a user interface"
      - "Yes — for simple UIs, MVC's three-component division adds complexity without proportionate benefit"
      - "No — MVC is necessary for any application that handles user input"
      - "Yes — but only because CRUD forms should use the State pattern instead"
    correct_index: 1
    option_feedback:
      0: |
        Patterns are trade-offs, not universal upgrades. If there is one stable screen and little domain complexity, the extra separation may cost more than it returns.
      2: |
        Handling user input alone does not require full MVC. MVC is more justified when domain logic, presentation, and interaction are likely to evolve independently.
      3: |
        State is useful when behavior changes with an object's internal state. A simple CRUD form may need neither full MVC nor State; the issue is proportional design.
    explanation: "Separating model, view, and controller for simple UI elements increases complexity without much flexibility gain. MVC earns its keep when the model is complex, has multiple views, or the UI changes frequently; for a single-view CRUD form a simpler layered architecture or Facade may suffice."

  - id: 4
    difficulty: intermediate
    type: single
    question: |
      The Model in MVC automatically notifies all registered Views whenever its state changes. A developer adds 50 Views to the same Model. Performance degrades. What Observer-specific problem has MVC inherited?
    options:
      - "The lapsed listener problem — observers that should have detached stay subscribed and leak memory"
      - "The notification storm problem — every model change broadcasts to every view, many of which don't need to update"
      - "The inverted dependency problem — registration points one way in code while data flows the other"
      - "The god class problem — one class accumulates too many responsibilities"
    correct_index: 1
    option_feedback:
      0: |
        Lapsed listeners are observers that stay registered after they should be removed, often causing leaks or stale updates. This scenario is about too many active observers being notified on each change.
      2: |
        Inverted dependency flow is about code-level registration pointing one way while runtime data flows the other. The performance problem here comes from broad notification fan-out.
      3: |
        A god class centralizes too many responsibilities in one class. Here the issue is broadcast behavior inherited from Observer, not one class doing everything.
    explanation: "**MVC inherits the notification storm from Observer — every model change broadcasts to all 50 views even if most don't need to update.** When the Model changes, it blindly broadcasts to ALL 50 views, even if most don't need to update for a given change. For example, a view with an iconized window may not need an update until the window is restored. Solutions include batched/deferred notifications, granular event types, and smart change detection."

  - id: 5
    difficulty: advanced
    type: single
    question: |
      Modern frameworks like React effectively replace MVC's Observer mechanism with reactive state management (hooks, signals). Which core MVC principle do these frameworks still preserve?
    options:
      - "The Strategy pattern for swappable controllers"
      - "Separation of state, presentation, and event handling — even when the underlying mechanism changes"
      - "The Composite pattern for UI tree structure"
      - "The use of explicit Subject and Observer base classes"
    correct_index: 1
    option_feedback:
      0: |
        Some frameworks do not expose controllers as swappable Strategy objects. The durable MVC idea is broader: separate state, presentation, and interaction even when the mechanism changes.
      2: |
        UI trees are common in modern frameworks, but the question asks for the core MVC principle. A component tree helps structure views; it is not the whole architectural separation.
      3: |
        Modern reactive systems often replace explicit Subject and Observer classes with hooks, signals, or data binding. The mechanism changes while the separation of state, UI, and events remains useful.
    explanation: "React reconciles a virtual DOM on state change; Angular and SolidJS use signals; Vue 3 uses reactive proxies. The mechanism changes — framework-managed reactivity replaces explicit Observer — but the architectural principle endures: separate what the system *knows* (Model) from how it *looks* (View) from how the user *interacts* with it (Controller)."

  - id: 6
    difficulty: intermediate
    type: single
    question: |
      A user clicks "Add Task" in a classic MVC desktop app. In what order do the three components participate, starting with the click?
    options:
      - "View receives the click, updates itself, then asks the Model to record the change"
      - "Controller receives the click, updates the Model; the Model then notifies the View, which queries the Model and re-renders"
      - "Model receives the click directly, updates its state, then pushes new data into the View"
      - "View receives the click, asks the Controller to compute a new screen, then writes that screen into the Model"
    correct_index: 1
    option_feedback:
      0: |
        A view that updates its own state before involving the model bypasses the architecture's main rule: the model owns state. Letting the view mutate display data independently is where stale views and "two sources of truth" bugs come from.
      2: |
        The model in classic MVC is blind to input devices. It does not know about clicks, mouse events, or HTTP requests — it only exposes domain operations. Translating raw input into a domain call is the controller's job.
      3: |
        The view does delegate input to a controller, but the controller updates the *model*, not the view. The view re-renders by reading the model in response to a notification, not by being handed a pre-built screen.
    explanation: "**The controller receives input and updates the model; the model then notifies subscribed views, which query the model and redraw.** Classic MVC has a clear input → state → presentation flow. The **controller** translates the raw user event into a domain operation on the **model**. Mutating the model fires an Observer notification, which prompts each registered **view** to query the model for the data it needs and re-render. The view never receives input directly, and the model never knows about input devices."

  - id: 7
    difficulty: advanced
    type: single
    question: |
      A team builds a server-side web app in Ruby on Rails. The Controller receives an HTTP request, updates the Model, then selects a template and renders HTML. The View never subscribes to model change events. Which statement best characterizes this architecture relative to classic Smalltalk MVC?
    options:
      - "It is identical to classic MVC — the request-response cycle is just an implementation detail"
      - "It is a server-side adaptation sometimes called 'Model 2'; the View does not observe the Model, which is closer to Model-View-Adapter than to classic MVC"
      - "It is not MVC at all because it lacks a Controller — Rails uses MVT (Model-View-Template) instead"
      - "It is the Document-View variant from POSA1, used by MFC and ET++"
    correct_index: 1
    option_feedback:
      0: |
        The Observer link between Model and View is the defining mechanism of classic MVC. Removing it (because HTTP is request-response and the page is regenerated each request) is a real architectural difference, not just an implementation detail.
      2: |
        Rails uses MVC terminology and very much has a Controller layer. MVT is Django's renaming, where Django's "View" plays the controller role and the "Template" plays the view role.
      3: |
        Document-View merges *view and controller* into one component while keeping the model separate. The Rails arrangement keeps view and controller distinct but removes the Observer link between model and view.
    explanation: "In classic Smalltalk MVC the View *observes* the Model directly. A web request-response cycle has no persistent View to subscribe — the page is regenerated each request — so the Controller fetches data from the Model and hands it to the chosen View template. This arrangement was originally called 'Model 2', and Martin Fowler has argued it is closer to Model-View-Adapter than to classic MVC."

  - id: 8
    difficulty: advanced
    type: single
    question: |
      An Android team rewrites a screen using MVVM. Compared to MVP's Passive View variant, what does the ViewModel add that the Presenter does not?
    options:
      - "A way to make the View completely passive and forward all events to the mediator"
      - "View-shaped state and commands exposed through data binding, so the View updates automatically without the developer wiring an Observer subscription"
      - "A swappable input-handling Strategy so the controller can be replaced at runtime"
      - "A Composite structure for nested UI components"
    correct_index: 1
    option_feedback:
      0: |
        A passive View that forwards every event to a mediator is the *Presenter's* job in MVP's Passive View. MVVM also keeps the View thin, but its distinguishing mechanism is data binding, not the passivity itself.
      2: |
        A swappable controller is the Strategy role in classic MVC. MVVM does not introduce that as its central new idea; data binding between View and ViewModel is what differentiates it from MVP.
      3: |
        Composite UI trees show up in both MVP and MVVM (and classic MVC). It is not the load-bearing distinction between Presenter and ViewModel.
    explanation: "In MVP's Passive View the Presenter pushes data into View setters by hand and the View forwards events back. MVVM instead exposes view-shaped state and commands on the ViewModel through **data binding**, so the framework propagates changes for you with no Observer subscription written by the developer. It is described as a specialisation of Fowler's earlier *Presentation Model*."
