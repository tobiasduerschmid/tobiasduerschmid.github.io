title: "Basic Git Quiz"
description: "Test your knowledge of core version control concepts, Git architecture, branching, merging, and collaboration."
questions:
  - question: "Which of the following best describes the core difference between centralized and distributed version control systems (like Git)?"
    options:
      - "Distributed systems require a constant internet connection to the central server to make any changes."
      - "In distributed systems, each developer has a full, local copy of the entire repository and its history."
      - "Centralized systems are generally considered the best practice for massive, globally distributed open-source projects."
      - "Distributed systems are designed exclusively to track binary files, whereas centralized systems track text files."
    correct_index: 1
    explanation: "This defines the distributed model, giving developers offline access to the full project history and the ability to work independently."

  - question: "What are the three primary local states that a file can reside in within a standard Git workflow?"
    options:
      - "Untracked, Tracked, and Ignored"
      - "Main Branch, Feature Branch, and Remote Server"
      - "Working Directory, Staging Area, and Local Repository"
      - "Uploaded, Downloaded, and Synced"
    correct_index: 2
    explanation: "Files are edited in the working directory, moved to the staging area to prep for a snapshot, and finally committed to the local repository."

  - question: "What does the command `git diff HEAD` compare?"
    options:
      - "The working directory to the staging area."
      - "The staging area to the remote repository."
      - "The latest commit to the commit immediately before it."
      - "The working directory to the latest commit."
    correct_index: 3
    explanation: "Adding `HEAD` tells Git to compare the uncommitted files currently on your disk with the snapshot of the most recent commit."

  - question: "Which Git command should you NEVER use on a shared branch because it can permanently overwrite and destroy work pushed by other team members?"
    options:
      - "`git pull`"
      - "`git fetch`"
      - "`git push -f`"
      - "`git merge --squash`"
    correct_index: 2
    explanation: "Force-pushing overwrites the remote repository's history to exactly match yours, which will permanently delete any new commits made by your collaborators."

  - type: multiple
    question: "Which of the following are advantages of a Distributed Version Control System (like Git) compared to a Centralized one? (Select all that apply)"
    options:
      - "Developers can commit changes and view history while working offline."
      - "Every developer has a full, independent copy of the repository's history."
      - "It mathematically prevents merge conflicts from ever occurring."
      - "It strictly relies on a single central server to store all file metadata."
      - "It is generally better suited for massive, globally distributed open-source projects."
    correct_indices: [0, 1, 4]
    explanation: "In distributed systems like Git, developers have a full local copy of the repository, allowing for offline work and eliminating the single point of failure found in centralized systems. This makes it ideal for large, distributed teams. However, it does not prevent merge conflicts."

  - type: multiple
    question: "Which of the following represent the core local states (or areas) where files can reside in a standard Git architecture? (Select all that apply)"
    options:
      - "Working Directory"
      - "Staging Area (Index)"
      - "Remote Server"
      - "Local Repository"
      - "Detached Head"
    correct_indices: [0, 1, 3]
    explanation: "The three primary local states in Git's architecture are the Working Directory (files on disk), the Staging Area (prepped for the next commit), and the Local Repository (the compressed history of commits). The remote server is external, and 'Detached HEAD' is a state of the HEAD pointer, not a file area."

  - type: multiple
    question: "Which of the following commands are primarily used to review changes, history, or differences in a Git repository? (Select all that apply)"
    options:
      - "`git log`"
      - "`git diff`"
      - "`git show`"
      - "`git push`"
      - "`git init`"
    correct_indices: [0, 1, 2]
    explanation: "`git log` shows the commit history, `git diff` shows differences between states or commits, and `git show` displays details about a specific Git object (like a commit). `git push` uploads data, and `git init` creates a new repository."

  - question: "A faulty commit was pushed to a shared 'main' branch last week and your teammates have already synced it. Why should you use `git revert` to fix this rather than `git reset --hard` followed by a force-push?"
    options:
      - "`git revert` automatically resolves any merge conflicts introduced by the bad commit."
      - "`git revert` moves the faulty files back to the staging area so you can manually edit and fix them."
      - "`git revert` deletes the bad commit from the remote server without affecting local copies."
      - "`git revert` creates a new commit with the exact inverse changes, preserving the shared history for all collaborators."
    correct_index: 3
    explanation: "`git revert` is the safe choice on shared branches because it adds a new forward-moving commit that nullifies the targeted commit, without rewriting or destroying history. Using `git reset --hard` and force-pushing would overwrite the shared history, causing serious disruption for any teammate who has already synced that commit."

  - question: "When integrating a feature branch into 'main', under what condition will Git perform a fast-forward merge rather than creating a three-way merge commit?"
    options:
      - "When the feature branch has been squashed into a single commit before merging."
      - "When 'main' has received no new commits since the feature branch was created."
      - "When there are conflicting changes on the same lines in both branches."
      - "When you explicitly pass the `--squash` flag to `git merge`."
    correct_index: 1
    explanation: "A fast-forward merge occurs when the target branch's history has not diverged — Git can simply slide its pointer forward to incorporate the changes linearly. If both branches have unique commits since they split, Git must perform a three-way merge using their common ancestor, resulting in a merge commit with two parents."

  - question: |
      **Arrange** the Git commands into the correct order to: create a feature branch, make changes, and integrate them back into main via a merge.
    type: parsons
    display: inline
    lines:
      - "git switch -c feature"
      - "&&"
      - "git add app.py"
      - "&&"
      - "git commit -m 'Add feature'"
      - "&&"
      - "git switch main"
      - "&&"
      - "git merge feature"
    distractors:
      - "git push -f"
      - "git init"
    explanation: "The workflow is: create and switch to a feature branch (`switch -c`), stage changes (`add`), commit them, switch back to main, and merge the feature branch in. `git push -f` is dangerous on shared branches and is not part of a local merge workflow. `git init` creates a new repository — irrelevant here."

  - question: |
      **Arrange** the commands to undo a bad commit on a shared branch safely: first identify the commit, then revert it, then push the fix.
    type: parsons
    display: inline
    lines:
      - "git log --oneline"
      - "&&"
      - "git revert <bad-commit-hash>"
      - "&&"
      - "git push"
    distractors:
      - "git reset --hard <bad-commit-hash>"
      - "git push -f"
    explanation: "`git log` identifies the bad commit hash. `git revert` creates a new commit that undoes the bad one — preserving history for all collaborators. `git push` shares the fix. The distractors (`reset --hard` + `push -f`) would rewrite shared history, destroying teammates' work. Always use `revert` on shared branches, never `reset --hard` + force-push."

  - question: |
      **Arrange** the commands to initialize a new repository and record an initial commit.
    type: parsons
    display: inline
    lines:
      - "git init"
      - "&&"
      - "git add ."
      - "&&"
      - "git commit -m 'Initial commit'"
    distractors:
      - "git clone ."
      - "git push"
    explanation: "`git init` creates the repository, `git add .` stages every file in the working directory, and `git commit` records the first snapshot. `git clone` copies an *existing* remote repo — it doesn't create one from scratch. `git push` requires a remote to already exist."

  - question: |
      **Arrange** the commands to register a remote called `origin` and push the `main` branch to it for the first time.
    type: parsons
    display: inline
    lines:
      - "git remote add origin <url>"
      - "&&"
      - "git push -u origin main"
    distractors:
      - "git fetch origin"
      - "git pull origin main"
    explanation: "`git remote add origin <url>` registers the remote address under the alias `origin`. `git push -u origin main` uploads the branch and sets the upstream tracking reference so future `git push`/`git pull` calls need no extra arguments. `git fetch` and `git pull` *download* data — they don't publish your local branch."
