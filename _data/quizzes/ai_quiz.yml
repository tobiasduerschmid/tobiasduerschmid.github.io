title: "AI & Learning Quiz"
description: "Recalling what you just learned is the best way to form lasting memory. Use this quiz to test your understanding."
active: true
questions:
  - id: 1
    difficulty: basic
    question: "What is 'cognitive offloading'?"
    options:
      - "Using AI to generate entire essays to save time."
      - "Using external tools to reduce cognitive demand for a task."
      - "Turning off your brain while watching educational videos."
      - "A technique to increase memory capacity through brain exercises."
    correct_index: 1
    option_feedback:
      0: "Generating an entire essay is one possible use of an external tool, but cognitive offloading is broader than AI-written work. The key idea is shifting part of a task's mental demand onto an external aid."
      2: "Offloading is active use of a tool or representation to reduce a specific mental demand. Passive disengagement does not provide the same support for a task."
      3: "External tools do not increase biological memory capacity. They reduce what must be held or processed mentally by putting some of the work outside the mind."
    explanation: "**Cognitive offloading** is the use of external tools (like calculators, calendars, or AI) to reduce the mental effort required for a task."
  - id: 2
    difficulty: basic
    question: "According to research, who benefits more from using AI for technical tasks?"
    options:
      - "Absolute novices with no prior experience."
      - "Students who want to skip the 'desirable difficulties'."
      - "Skilled developers with strong foundational knowledge."
      - "Everyone benefits equally regardless of skill level."
    correct_index: 2
    option_feedback:
      0: "Novices can get help from AI, but they often have less background knowledge for judging whether an answer is correct or appropriate. The benefit depends heavily on being able to guide and verify the output."
      1: "Skipping productive practice can make the work look easier while weakening learning. AI is most useful when it removes peripheral friction, not when it replaces the reasoning the student is trying to develop."
      3: "AI support is not equally useful in every learner's hands. People with stronger foundations are usually better able to ask precise questions, detect errors, and adapt the result."
    explanation: "**Skilled developers benefit most from AI because it amplifies their existing ability to direct and verify outputs.** Research shows that AI acts as an amplifier; those with stronger foundational skills can better guide, verify, and utilize AI outputs, leading to a larger productivity boost."
  - id: 3
    difficulty: basic
    question: "Which of these is an example of 'Beneficial Offloading' for a CS student?"
    options:
      - "Asking AI to solve the core algorithm of a homework assignment."
      - "Using AI to generate boilerplate HTML or format dummy data."
      - "Letting AI decide the architecture and edge cases of a system."
      - "Copying AI code without understanding how it works."
    correct_index: 1
    option_feedback:
      0: "The core algorithm is usually the part of the assignment meant to build understanding. Offloading it removes the very practice that makes the concept stick."
      2: "Architecture and edge cases are central design reasoning, not just busywork. AI can help surface possibilities, but the student still needs to make and justify those decisions."
      3: "Copying code without understanding can create a false sense of fluency and hide defects. Beneficial offloading should leave the learner able to explain, test, and revise the result."
    explanation: "**Beneficial offloading** involves delegating 'extraneous load' (tedious, non-core tasks) to AI so you can focus on the 'intrinsic load' (the actual concepts you need to learn)."
  - id: 4
    difficulty: basic
    question: "What is the 'desirable difficulty' in the context of learning?"
    options:
      - "Any difficulty that makes a student want to give up."
      - "Difficulties that appear during learning but actually trigger deeper processing."
      - "Cognitive load that comes from confusing or poorly written course material."
      - "A state of confusion that has no educational benefit."
    correct_index: 1
    option_feedback:
      0: "Difficulty is only desirable when it remains productive and connected to the learning goal. Overload, discouragement, or impossible tasks can block learning instead of deepening it."
      2: "Struggle with badly explained material is *extraneous* cognitive load, not desirable difficulty. Desirable difficulty comes from the structure of the practice itself (retrieval, spacing, interleaving), not from having to decode unclear instruction."
      3: "An unresolved stuck state is not the goal. Productive challenge helps when it leads to retrieval, discrimination, explanation, or other deeper processing."
    explanation: "**Desirable difficulties** are challenges that might slow down initial performance but result in better long-term retention and deeper understanding."
