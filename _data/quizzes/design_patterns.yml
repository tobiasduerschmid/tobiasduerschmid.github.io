title: "Design Patterns Quiz"
description: "Test your understanding of design-pattern selection, trade-offs, and design reasoning."
active: true
questions:
  - id: 1
    difficulty: intermediate
    type: single
    question: |
      A colleague proposes using the Observer pattern in a module that has exactly one dependent object which will never change. What is the best assessment of this decision?
    options:
      - "Good idea — it future-proofs the design for when more observers are needed"
      - "Bad idea — the pattern adds unnecessary complexity without addressing a real problem"
      - "Good idea — design patterns should always be applied to improve code quality"
      - "It depends on whether the programming language supports interfaces"
    correct_index: 1
    option_feedback:
      0: |
        Future-proofing only helps when the future pressure is plausible enough to justify today's complexity. With one stable dependent, a direct call is clearer.
      2: |
        Design patterns are not automatic quality upgrades. They solve specific forces, and applying them without those forces adds indirection.
      3: |
        Interfaces can make Observer easier to express, but language support is not the deciding factor. The question is whether the dependency is dynamic and one-to-many.
    explanation: "Observer solves a **dynamic, one-to-many** dependency. With exactly one dependent that never changes, there is no one-to-many problem and no need for dynamic subscription, so the subscriber list and notification logic add indirection for no benefit — the 'Hammer and Nail' syndrome of applying a pattern without a matching problem. The **Rule of Three** suggests waiting until you've seen the need at least three times."

  - id: 2
    difficulty: advanced
    type: single
    question: |
      A student implements the Observer pattern. Their code works correctly: when the Subject changes, the Observer updates. However, the Observer's `update()` method directly accesses `subject.internalData` (a private field accessed via reflection) rather than using `subject.getState()`. What is the primary design problem?
    options:
      - "The code has a bug because reflection is not allowed in Java"
      - "The Observer violates the pattern's intent by introducing a tight coupling that defeats modularity"
      - "There is no problem — the code works correctly"
      - "The Observer should use the Push model instead of the Pull model"
    correct_index: 1
    option_feedback:
      0: |
        Java reflection exists; the problem is design intent, not mere legality. Reaching into private state bypasses the subject's public abstraction.
      2: |
        Passing a test is not the same as preserving the pattern's design benefit. Observer is meant to reduce coupling, and private-field access reintroduces it.
      3: |
        Push versus pull concerns how state is supplied during notification. Either variant can still be tightly coupled if the observer bypasses the subject's public API.
    explanation: "Reaching into the subject's private state recouples the observer to its concrete implementation, defeating the loose coupling Observer exists to provide — even though the code still produces correct output. Studies of student work find exactly this: students reproduce a pattern's gross structure but introduce dependencies that violate its intent (74% of submissions in one study). Correct behavior is not the same as correct design."

  - id: 3
    difficulty: intermediate
    type: single
    question: |
      You have a `Document` class whose behavior depends on its state (Draft, Review, Published, Archived). Currently, every method contains a large `switch` statement checking `this.status`. Which pattern best addresses this?
    options:
      - "Observer — the document should notify other objects of state changes"
      - "Strategy — the client should choose the behavior at runtime"
      - "State — the behavior should change implicitly as the document's internal state transitions"
      - "Factory Method — creation of documents should be deferred to subclasses"
    correct_index: 2
    option_feedback:
      0: |
        Observer would notify other objects after a change. It does not remove the repeated `switch` logic that decides how the document itself behaves in each status.
      1: |
        Strategy fits when a client selects an algorithm. Here the document's own lifecycle status determines behavior and transitions internally.
      3: |
        Factory Method addresses object creation. The pain here is state-dependent behavior repeated across methods after the document already exists.
    explanation: "The diagnostic is a `switch` on a status variable repeated across many methods, with transitions driven by the object's own lifecycle. State replaces each branch with a polymorphic state object — **polymorphism over conditions**. Strategy would fit if the *client* selected the behavior explicitly, but here the transitions are internal."

  - id: 4
    difficulty: advanced
    type: single
    question: |
      A system uses the Singleton pattern for a database connection pool. A new requirement arrives: the system must support multi-tenant deployments where each tenant has its own database. What happens to the Singleton?
    options:
      - "Add a parameter to `getInstance(tenantId)` — simple fix"
      - "The Singleton's core assumption (exactly one instance) is invalidated, requiring a fundamental redesign"
      - "Create a Singleton for each tenant — the pattern still works"
      - "Use the Adapter pattern to wrap the existing Singleton for each tenant"
    correct_index: 1
    option_feedback:
      0: |
        `getInstance(tenantId)` changes the pattern into a registry or cache of instances. That may be a redesign direction, but it is not a simple preservation of one global instance.
      2: |
        "A singleton for each tenant" contradicts the original process-wide one-instance premise. The design needs scoped lifetime management, not several globals with the same problem.
      3: |
        Adapter can translate an interface, but it cannot turn one shared pool into separate tenant pools. The cardinality assumption has to change.
    explanation: "Multi-tenancy invalidates Singleton's core premise: 'exactly one instance' was a convenience assumption, not a hard requirement, and many singletons later need per-tenant, per-test, or per-thread instances. POSA5 calls Singleton a 'pattern with a weak solution' for exactly this reason. **Dependency injection with singleton scope** sidesteps it — the container manages lifetime without baking the cardinality into the code."

  - id: 5
    difficulty: intermediate
    type: single
    question: |
      You need to create objects from a family of related types (Dough, Sauce, Cheese) that must always be used together consistently (e.g., NY-style ingredients vs. Chicago-style). Which creational pattern is most appropriate?
    options:
      - "Factory Method — create one product type with subclass override"
      - "Abstract Factory — create families of related products that must work together"
      - "Builder — construct a complex product step by step"
      - "Singleton — ensure only one ingredient factory exists"
    correct_index: 1
    option_feedback:
      0: |
        Factory Method is a good fit for varying one created product through subclassing. The requirement is about keeping several product types from the same family consistent.
      2: |
        Builder assembles one complex product through steps. Here the central force is choosing compatible objects across a product family.
      3: |
        One ingredient factory instance would not by itself guarantee family consistency. The pattern needed is an interface that creates related products together.
    explanation: "The discriminator is *consistency across a product family*: Abstract Factory hands back a whole set of related products (Dough, Sauce, Cheese) guaranteed to match, so NY dough always pairs with NY sauce and NY cheese. Factory Method varies only one product type; Builder assembles one complex product step by step."

  - id: 6
    difficulty: intermediate
    type: single
    question: |
      An existing third-party library provides a `LegacyPrinter` class with methods `printText(String s)` and `printImage(byte[] data)`. Your system expects a `ModernPrinter` interface with `render(Document d)`. Which pattern is most appropriate?
    options:
      - "Facade — simplify the complex printing subsystem"
      - "Adapter — convert the incompatible LegacyPrinter interface to match ModernPrinter"
      - "Decorator — add rendering capability to LegacyPrinter"
      - "Mediator — coordinate communication between the legacy and modern systems"
    correct_index: 1
    option_feedback:
      0: |
        Facade is for simplifying a subsystem's interface. The prompt describes one incompatible interface that must be made to look like another.
      2: |
        Decorator keeps the same interface while adding behavior. Here the interface itself is the mismatch: `printText` and `printImage` need to satisfy `render`.
      3: |
        Mediator coordinates several peers through shared rules. This is a translation problem between a legacy API and the interface your system expects.
    explanation: "Adapter fits an existing class whose interface you cannot change but must make compatible with what your system expects. The Adapter implements `ModernPrinter` and wraps `LegacyPrinter`, translating `render(Document)` into the right `printText()` / `printImage()` calls — the interface itself is what changes, which is what separates Adapter from Facade (simplifies a subsystem), Decorator (adds behavior through the same interface), and Mediator (coordinates peers)."

  - id: 7
    difficulty: intermediate
    type: single
    question: |
      In the Composite pattern, a `Menu` can contain both `MenuItem` objects (leaves) and other `Menu` objects (composites). A developer declares `add(MenuComponent)` and `remove(MenuComponent)` on the abstract `MenuComponent` class. What design trade-off does this represent?
    options:
      - "The Safe Composite approach — only composites expose child management"
      - "The Transparent Composite approach — uniform interface at the cost of meaningless methods on leaves"
      - "A violation of the pattern — these methods should only be on Composite"
      - "The Observer approach — leaves subscribe to composites"
    correct_index: 1
    option_feedback:
      0: |
        Safe Composite puts child-management methods only on composite nodes. Declaring them on the abstract component is the transparent choice.
      2: |
        Putting child-management methods on the component is a recognized Composite variation. It is a trade-off, not automatically a pattern violation.
      3: |
        Observer is about subjects notifying observers of changes. Child-management methods on a tree component belong to Composite design.
    explanation: "Putting the full child-management interface on the Component base class is the **Transparent Composite** design: clients treat every component uniformly, but leaves inherit methods that are meaningless for them (what does `add()` mean for a `MenuItem`?). The alternative, **Safe Composite**, puts those methods only on `Composite` — gaining type safety but forcing clients to distinguish leaf from composite."

  - id: 8
    difficulty: intermediate
    type: single
    question: |
      A smart home system has an alarm clock, coffee maker, calendar, and sprinkler that need to coordinate: "When the alarm rings on a weekday, brew coffee and skip watering." Where should the rule "only on weekdays" live?
    options:
      - "In the AlarmClock — it should check the calendar before notifying others"
      - "In the CoffeeMaker — it should check the calendar before brewing"
      - "In a Mediator (SmartHomeHub) — it centralizes coordination rules"
      - "In an Observer — the calendar observes the alarm and decides"
    correct_index: 2
    option_feedback:
      0: |
        The alarm clock's job is to report an alarm event, not to own calendar and coffee policy. Putting the rule there makes the device know too much about the wider routine.
      1: |
        The coffee maker can decide how to brew, but the weekday rule depends on calendar state and sprinkler coordination. That rule belongs in the coordination layer.
      3: |
        "An Observer" names a notification role, not a place for multi-object policy by itself. If the calendar decides what several devices should do, it is effectively acting as a coordinator.
    explanation: "The rule depends on several objects (alarm event, calendar state, coffee maker, sprinkler), so it belongs in a coordinator rather than any one device. The Mediator (SmartHomeHub) receives the 'alarm rang' event, checks the calendar, and commands the coffee maker — keeping each device reusable and the rules in one maintainable place. Lodging the rule in the AlarmClock or CoffeeMaker would force those devices to know about each other."

  - id: 9
    difficulty: advanced
    type: multiple
    question: |
      Which of the following are valid reasons to **avoid** using the Singleton pattern? (Select all that apply)
    options:
      - "It makes unit testing difficult because dependencies are hidden and hard to substitute"
      - "The 'only one instance' assumption often turns out to be a convenience, not a hard requirement"
      - "It conflates singleton lifetime management with global access"
      - "It is always slower than creating new instances"
    correct_indices: [0, 1, 2]
    option_feedback:
      0: |
        Hidden global access keeps dependencies out of constructors and method signatures. That makes ordinary test substitution harder than with injected collaborators.
      1: |
        Many "only one" assumptions later become per-tenant, per-thread, or per-test requirements. That is a valid reason to avoid hardcoding global cardinality too early.
      2: |
        Lifetime management can be legitimate on its own. The risk is bundling it with global access, which spreads hidden coupling through the codebase.
      3: |
        Singleton is not primarily a performance pattern. It can be faster, slower, or irrelevant depending on initialization and access costs; performance alone is not the general critique here.
    explanation: "Three substantive criticisms apply: (1) `getInstance()` is a hardcoded dependency with no seam for test doubles; (2) many singletons later need per-tenant, per-thread, or per-test instances; (3) POSA5 argues Singleton conflates lifetime management (legitimate) with global access (harmful). Performance is not part of the standard critique — Singleton controls instance count, not speed."

  - id: 10
    difficulty: intermediate
    type: single
    question: |
      MVC is described as a 'compound pattern.' Which three patterns does it combine?
    options:
      - "Singleton + Factory Method + Adapter"
      - "Observer + Strategy + Composite"
      - "State + Mediator + Facade"
      - "Iterator + Command + Decorator"
    correct_index: 1
    option_feedback:
      0: |
        MVC does not require a single model or revolve around object creation and interface adaptation. Its classic compound explanation is notification, input delegation, and UI composition.
      2: |
        MVC may include stateful models and coordinating controllers, but the standard pattern compound taught here is Observer, Strategy, and Composite.
      3: |
        Iteration, command objects, and decorators can appear in UI systems, but they are not the classic trio that explains MVC's model-view-controller separation.
    explanation: "MVC combines **Observer** (the model notifies views of state changes), **Strategy** (the view delegates input handling to a swappable controller), and **Composite** (the view is a tree of nested UI components). Together they decouple model, view, and controller while keeping them synchronized."

  - id: 11
    difficulty: intermediate
    type: single
    question: |
      The State and Strategy patterns have identical UML class diagrams. What is the key difference between them?
    options:
      - "State uses interfaces; Strategy uses abstract classes"
      - "State involves implicit internal transitions between implementations; Strategy involves explicit client selection"
      - "State is a behavioral pattern; Strategy is a structural pattern"
      - "There is no meaningful difference — they are the same pattern with different names"
    correct_index: 1
    option_feedback:
      0: |
        Either pattern can use interfaces or abstract classes. The difference is not the implementation mechanism.
      2: |
        Both State and Strategy are behavioral patterns in the GoF classification. Their distinction is intent, not category.
      3: |
        The class diagrams can match, but the runtime story differs. State objects transition as the context changes; strategies are selected as interchangeable algorithms.
    explanation: "Same structure, different **intent**. In State, the concrete implementations transition between each other based on internal logic — the client does not choose which state is active. In Strategy, the client explicitly selects the algorithm and there are no automatic transitions."

  - id: 12
    difficulty: advanced
    type: single
    question: |
      A developer writes a `TurkeyAdapter` that implements the `Duck` interface. The `quack()` method calls `turkey.gobble()`, and the `fly()` method calls `turkey.fly()` in a loop five times (a `Duck.fly()` flies a long distance, but a `Turkey.fly()` only goes a short burst). Which aspect of this adapter introduces the most design risk?
    options:
      - "The quack()-to-gobble() mapping, because it changes the method name"
      - "The looped fly() simulation, because it involves behavioral adaptation beyond simple interface translation"
      - "The fact that the adapter wraps the turkey via composition"
      - "The adapter should use multiple inheritance instead"
    correct_index: 1
    option_feedback:
      0: |
        Renaming or redirecting a call is ordinary adapter work. The riskier part is behavior simulation, where the adapter starts doing more than interface translation.
      2: |
        Wrapping an adaptee via composition is a standard object-adapter implementation. The concern is the logic inside the wrapper, not the fact that it wraps.
      3: |
        Multiple inheritance is not required for Adapter and is unavailable or discouraged in many languages. Composition is a normal implementation route.
    explanation: "Looping five short turkey flights to approximate one long duck flight is **behavioral adaptation**, not interface translation. As adapters accumulate this kind of logic they grow 'thicker' and drift from translators into separate service components. Renaming a call (quack→gobble) is low-risk; behavioral logic inside an adapter warrants scrutiny."
