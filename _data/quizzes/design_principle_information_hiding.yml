title: "Information Hiding Quiz"
description: "Test your ability to identify, apply, and evaluate the Information Hiding principle in real code."
active: true
questions:
  - id: 1
    difficulty: intermediate
    type: single
    question: |
      Who introduced the Information Hiding principle, and in what paper?
    options:
      - "Edsger W. Dijkstra, in *On the Role of Scientific Thought* (EWD 447)"
      - "David L. Parnas, in *On the Criteria To Be Used in Decomposing Systems into Modules*, Communications of the ACM"
      - "Robert C. Martin, in *Clean Architecture*"
      - "John Ousterhout, in *A Philosophy of Software Design*"
    correct_index: 1
    option_feedback:
      0: |
        Dijkstra coined separation of concerns, not the information-hiding principle introduced through
        the KWIC module-decomposition argument.
      2: |
        Martin built on earlier modularity principles; he did not introduce information hiding.
      3: |
        Ousterhout explains deep modules and modern design practice, but the original information-hiding
        paper is Parnas's.
    explanation: "Parnas's *CACM* paper introduced the principle, four years after the 1968 NATO Software Crisis conference. Dijkstra coined *Separation of Concerns* — a related but broader principle."

  - id: 2
    difficulty: basic
    type: single
    question: |
      In Parnas's KWIC (Key Word In Context) example, what was wrong with the **conventional** decomposition (one module per processing step)?
    options:
      - "It used too many modules and was therefore too slow"
      - "It exposed the shared data structure to every module, so a change to that data structure forced edits to nearly every module"
      - "It used inheritance instead of composition"
      - "It violated the Liskov Substitution Principle"
    correct_index: 1
    option_feedback:
      0: |
        The problem was not simply speed or number of modules. The harmful part was that many modules
        knew the same representation detail.
      2: |
        The KWIC example is about modular decomposition, not inheritance versus composition.
      3: |
        LSP is about subtype substitution. The KWIC issue was shared knowledge of a data structure
        across modules.
    explanation: "Both decompositions worked, but in the conventional one almost every module *knew* the shared data structure. The information-hiding decomposition kept that decision in one module — only that module changed when the structure was redesigned. Parnas's argument was that step-by-step decomposition uses the wrong criterion: it splits along the processing sequence, not along design decisions."

  - id: 3
    difficulty: intermediate
    type: single
    question: |
      Look at this Java code:

      ```java
      public class OrderService {
          private final PayPalClient paypal;
          public PayPalCharge checkout(Order o, PayPalAccount acc) {
              paypal.authenticate(acc);
              return paypal.charge(acc.getAccountToken(), o.getTotal());
          }
      }
      ```

      Every field is `private`. Is this an example of good Information Hiding?
    options:
      - "Yes — all fields are `private`, so the implementation is hidden"
      - "No — the *interface* (parameter and return types) names PayPal-specific types, so the PayPal decision has leaked into the contract"
      - "No — Information Hiding requires inheritance, which this class doesn't use"
      - "Yes — Java visibility modifiers always guarantee Information Hiding"
    correct_index: 1
    option_feedback:
      0: |
        Private fields do not help if the public method signature exposes PayPal-specific types. Callers
        are still coupled to the vendor decision.
      2: |
        Information hiding does not require inheritance. It requires keeping volatile design decisions
        behind stable interfaces.
      3: |
        Visibility modifiers are useful but insufficient. Public signatures, exceptions, data formats,
        and protocols can all leak hidden decisions.
    explanation: "`private` controls access to fields, but the *public method signatures* expose `PayPalClient`, `PayPalAccount`, and `PayPalCharge`. Every caller of `checkout` now compiles against PayPal. The fix is to introduce a `PaymentGateway` abstraction that exposes only neutral types like `PaymentDetails` and `ChargeResult`."

  - id: 4
    difficulty: basic
    type: single
    question: |
      What is a **deep** module?
    options:
      - "A module with many subclasses arranged in a deep inheritance tree"
      - "A module that hides a lot of complexity behind a small interface"
      - "A module placed deep inside the directory structure"
      - "A module that uses recursion heavily"
    correct_index: 1
    option_feedback:
      0: |
        Deep modules are not about inheritance depth. They are about how much complexity is hidden
        behind a small interface.
      2: |
        Directory nesting says little about abstraction value. A deeply nested file can still expose a
        shallow interface.
      3: |
        Recursion is an implementation technique. A module can be deep without recursion, or recursive
        without hiding much.
    explanation: "A deep module hides a *lot* of internal complexity behind a *small* interface — the file system (`open/read/write/close`), TCP, garbage collection. Deep modules are the goal of Information Hiding. Shallow modules — those whose interface is nearly as large as their implementation — add vocabulary without buying any abstraction."

  - id: 5
    difficulty: intermediate
    type: single
    question: |
      A teammate proposes splitting a 30-line helper function into its own class with a one-method interface, "for Information Hiding." When is this **most likely** the wrong move?
    options:
      - "When the helper is genuinely a likely-to-change decision used by several modules"
      - "When the helper has only one caller, the implementation is trivial, and there is no plausible variation that the abstraction would protect against"
      - "Never — extracting a class is always good Information Hiding"
      - "When the helper is over 100 lines"
    correct_index: 1
    option_feedback:
      0: |
        If the helper hides a likely-to-change decision used by several modules, extraction may be
        exactly the right move.
      2: |
        Extracting a class is not automatically beneficial. A new interface has to hide enough
        complexity or variation to pay for itself.
      3: |
        Line count alone does not decide whether an abstraction is useful. A 30-line helper may hide an
        important policy, and a 100-line helper may still be one coherent detail.
    explanation: "This is a **shallow module**: if the new 'module' has nothing meaningful to hide and no plausible second variant, you have added an interface and a file without buying any abstraction value. Information Hiding pays off when there is a real secret worth hiding; otherwise, it just adds vocabulary the reader must learn."

  - id: 6
    difficulty: advanced
    type: single
    question: |
      Which of the following is *most likely* to be **part of the interface** (visible) rather than a hidden secret?
    options:
      - "Whether `find_user` looks up the user in MySQL or in MongoDB"
      - "Whether the network protocol used by the API is **stateful or stateless**"
      - "Whether `sortItems` uses quicksort or mergesort"
      - "Whether passwords are hashed with bcrypt or argon2"
    correct_index: 1
    option_feedback:
      0: |
        Storage technology is usually a secret. Clients should ask for users, not know whether MySQL or
        MongoDB was queried.
      2: |
        Sorting algorithm choice is normally hidden behind the sorting operation unless clients depend
        on algorithm-specific behavior.
      3: |
        Password hashing choice is a security-sensitive implementation decision that should be
        centralized and hidden behind an authentication boundary.
    explanation: "Statefulness changes how clients **must** interact with the server (do they reconnect? carry a session token? retransmit on disconnect?). Clients cannot ignore it, so it belongs in the contract. The other three are textbook secrets — clients neither know nor care, and the choice can change without breaking callers."

  - id: 7
    difficulty: intermediate
    type: single
    question: |
      Which statement best captures the relationship between **Information Hiding** and **Separation of Concerns (SoC)**?
    options:
      - "They are synonyms"
      - "SoC decides *which* aspects belong in separate modules; Information Hiding decides *how* each module protects its internal decisions behind a stable interface"
      - "Information Hiding is a deprecated 1972 idea; SoC replaced it"
      - "SoC applies to data; Information Hiding applies only to functions"
    correct_index: 1
    option_feedback:
      0: |
        They complement each other, but they answer different design questions. Separating concerns does
        not automatically hide each module’s volatile choices.
      2: |
        Information hiding remains relevant because implementation decisions still change. SoC did not
        replace the need for stable interfaces.
      3: |
        Both apply broadly. Data representation, functions, protocols, and module APIs can all be
        separated and hidden.
    explanation: "They are complementary. SoC is about *identifying* distinct aspects (data access vs. business rules vs. UI). Information Hiding is about *protecting* each one — the interface should expose only what is unlikely to change. SoC without Information Hiding gives you separate modules that still rip apart when details change."

  - id: 8
    difficulty: intermediate
    type: single
    question: |
      The CFO announces that PayPal will be replaced with Stripe. In a codebase that follows Information Hiding well, what is the expected scope of the change?
    options:
      - "Edit every service that processes a payment, refund, or wallet operation"
      - "Write one new `StripeGateway` implementation of the existing `PaymentGateway` interface, plus update the dependency-injection configuration"
      - "Rewrite the entire system because vendor changes always cascade"
      - "Add a `try/catch` block in every payment-related method"
    correct_index: 1
    option_feedback:
      0: |
        If every payment-using service changes, the PayPal decision was not hidden. Vendor-specific
        knowledge escaped the gateway boundary.
      2: |
        A vendor swap should not force a whole-system rewrite when the payment boundary was designed
        well.
      3: |
        Adding try/catch blocks everywhere treats symptoms at call sites. It does not replace the
        vendor-specific implementation behind a stable gateway.
    explanation: "If the secret 'we use PayPal' lives in exactly one module behind a stable interface, the swap is bounded: write a new implementation, change the wiring, redeploy. None of the services that *use* `PaymentGateway` need to be touched. This is the canonical Information Hiding payoff — local, low-risk change instead of cross-cutting rework."

  - id: 9
    difficulty: intermediate
    type: single
    question: |
      Which is the strongest evidence that a module is **shallow**?
    options:
      - "Its public methods are mostly one-line pass-throughs that delegate to another module"
      - "It has more than 200 lines of code"
      - "It uses generics or templates"
      - "It is in its own file"
    correct_index: 0
    option_feedback:
      1: |
        Line count does not determine module depth. A long module can hide substantial complexity behind
        a small API.
      2: |
        Generics or templates do not by themselves make a module shallow. The question is whether the
        interface hides meaningful complexity.
      3: |
        Being in its own file says nothing about abstraction depth. A separate file can still be just a
        pass-through.
    explanation: "Shallowness is about the *ratio* of interface to implementation. If almost every public method is a thin pass-through, the module hides nothing — readers pay the cost of learning a new API and gain no abstraction. The fix is usually to inline the shallow module back into its caller, or to deepen it by absorbing real responsibilities."

  - id: 10
    difficulty: intermediate
    type: single
    question: |
      Two modules in your codebase both depend on the assumption "phone numbers are stored as exactly 10 digits, no separators." There is no shared constant, no shared validator — just two pieces of code that happen to assume the same thing. What is this?
    options:
      - "Healthy duplication that improves performance"
      - "**Semantic coupling** — a hidden dependency that no compiler or static analyzer can detect"
      - "Strict syntactic coupling, easy to detect with `grep`"
      - "An example of good Information Hiding because the assumption is implicit"
    correct_index: 1
    option_feedback:
      0: |
        Duplicating a hidden assumption is risky, not healthy. If the phone-number rule changes, the two
        modules can silently diverge.
      2: |
        Syntactic coupling would show up through direct references or imports. Here the dependency is
        shared meaning that tools may not detect.
      3: |
        Implicit assumptions are the opposite of good information hiding. The rule should live behind
        one explicit normalization or value-object boundary.
    explanation: "Semantic coupling is the dangerous cousin of syntactic coupling: tools cannot see it, but if you change the assumption in one place, the other silently breaks. Information Hiding fights it by ensuring that the assumption (here, a `PhoneNumber` value object or a single normalization function) lives in exactly one module."

  - id: 11
    difficulty: intermediate
    type: single
    question: |
      You inherit a `UserRepository` whose `findByEmail` method returns `sqlite3.Row`. Why is this a problem?
    options:
      - "Because `sqlite3.Row` is slower than `dict`"
      - "Because it leaks the storage technology into the return type — every caller of `findByEmail` is now coupled to SQLite, and switching databases would force changes throughout the code"
      - "Because `findByEmail` should return a list, not a single row"
      - "Because Python doesn't allow returning custom types"
    correct_index: 1
    option_feedback:
      0: |
        Speed is not the design problem. The issue is that a storage-specific type escaped the
        repository boundary.
      2: |
        Whether a lookup returns one user or many depends on the domain. The storage leak is the more
        fundamental information-hiding failure.
      3: |
        Python can return many custom types. The problem is returning a database-library type instead of
        a domain type.
    explanation: "The repository's *job* is to hide the storage decision. Returning a SQLite-specific type undoes that job: every caller now compiles against SQLite. Map the row to a domain `User` object before returning. The interface should mention only domain types — never storage-specific ones."

  - id: 12
    difficulty: intermediate
    type: single
    question: |
      In *change impact analysis*, what does it mean if a single plausible change (say, "we switch from JSON to Protobuf for our wire format") would force edits across dozens of unrelated modules?
    options:
      - "Information Hiding has been applied very well"
      - "The wire-format decision has *leaked* — it is not actually a secret of one module, but a shared assumption across many"
      - "The system is too small for Information Hiding to matter"
      - "The team is following SRP correctly"
    correct_index: 1
    option_feedback:
      0: |
        Wide change impact is evidence the decision was not hidden. A well-hidden wire format would be
        localized behind a boundary.
      2: |
        Small systems can still suffer from leaked decisions. Size changes the cost, not the principle.
      3: |
        SRP might separate responsibilities, but it does not guarantee the wire-format decision is
        hidden from all of them.
    explanation: "Change impact analysis falsifies bad designs. If 'one decision' touches dozens of modules, that decision is not really hidden — it is a *de facto* shared secret encoded in many places. The right response is to redesign so the decision lives in one module behind a stable interface."

  - id: 13
    difficulty: intermediate
    type: single
    question: |
      Which of the following is **not** a typical mechanism for enforcing Information Hiding?
    options:
      - "Defining an abstract interface and writing clients against it"
      - "The Facade pattern"
      - "A globally accessible singleton with a long list of public mutator methods"
      - "Repository / Gateway pattern"
    correct_index: 2
    option_feedback:
      0: |
        An abstract interface is a common way to keep clients dependent on a stable contract rather than
        volatile implementation details.
      1: |
        A Facade can hide subsystem complexity behind a smaller API, which is a classic
        information-hiding mechanism.
      3: |
        Repository and Gateway patterns exist largely to hide storage or external-service details behind
        domain-facing operations.
    explanation: "A globally accessible singleton with many public mutators is the *opposite* of Information Hiding — it gives every module access to internal state with no insulation. The other three (interfaces, Facade, Repository/Gateway) are standard mechanisms for hiding decisions behind stable contracts."

  - id: 14
    difficulty: basic
    type: single
    question: |
      Why does Information Hiding **reduce cognitive load** on developers reading code?
    options:
      - "It removes all code comments, leaving less text to read"
      - "By bounding what a reader needs to know about a module to its small interface, it lets the reader reason about one module without paging in the implementations of every other module"
      - "It enforces shorter variable names"
      - "It uses fewer files, so navigation is easier"
    correct_index: 1
    option_feedback:
      0: |
        Removing comments does not reduce the essential design knowledge a reader needs. It may make
        code harder to understand.
      2: |
        Shorter names do not hide complexity. They can actually increase cognitive load if they remove
        useful meaning.
      3: |
        Information hiding can use more files or fewer files depending on the design. The benefit is a
        smaller interface to reason about, not file count.
    explanation: "Field studies of professional developers find that program comprehension consumes most of their time. A well-hidden module lets a reader load only the interface — not the entire implementation tree — into working memory. This is one of the most underrated practical benefits of the principle."

  - id: 15
    difficulty: advanced
    type: single
    question: |
      A reviewer says: "Don't add an abstraction for this — we only have one database and we'll never have another." When is this argument **most reasonable**?
    options:
      - "Always — abstractions are forbidden until proven necessary"
      - "When the system is genuinely throwaway, single-variant, has stable scope, and the abstraction would not buy any other benefit (testability, comprehensibility) right now"
      - "Whenever the database is SQL — only NoSQL deserves a repository"
      - "Never — predictions of stability are usually wrong"
    correct_index: 1
    option_feedback:
      0: |
        Abstractions are not forbidden until a second implementation appears. Testability,
        comprehension, and risk containment can justify one earlier.
      2: |
        SQL versus NoSQL is not the deciding factor. The question is whether hiding the persistence
        decision buys enough value for this system.
      3: |
        Predictions of stability are often wrong, but abstractions still have costs. For genuinely
        throwaway stable code, skipping the boundary can be reasonable.
    explanation: "Information Hiding has real costs: indirection, file count, vocabulary. Spending those costs on a decision that genuinely will never change is wasted ceremony. But 'we'll never need another database' is one of the most commonly falsified predictions in software, so the argument earns scrutiny — and is usually weakest in long-lived systems with multiple teams."

  - id: 16
    difficulty: intermediate
    type: single
    question: |
      Why does unmanaged complexity grow so quickly as a system adds more modules?
    options:
      - "Every new module creates possible relationships with the modules already present, so possible pairwise relationships grow roughly quadratically"
      - "Every new module must contain more lines of code than the previous module"
      - "Modern developers are less able to understand software than developers in the 1960s"
      - "Hardware improvements automatically make software design harder"
    correct_index: 0
    option_feedback:
      1: |
        Module count and line count are related, but the design problem is the number of possible
        relationships and assumptions between modules.
      2: |
        The lecture's point is almost the opposite: human cognitive capacity has not grown enough to
        explain modern software scale. Architecture has to reduce what each developer must understand.
      3: |
        Faster hardware lets us run larger programs, but it does not by itself make those programs
        understandable or maintainable.
    explanation: "With `n` modules, there are `n * (n - 1) / 2` possible pairwise relationships. A good architecture keeps the *actual* dependency graph much smaller by hiding decisions behind stable interfaces. A Big Ball of Mud lets too many of those possible relationships become real."

  - id: 17
    difficulty: advanced
    type: single
    question: |
      In a client/server checkout system, which statement best handles the PayPal decision?
    options:
      - "PayPal should be hidden from every boundary, including the user interface; the client can simply report that payment succeeded"
      - "Supported payment methods may be visible in the client/server contract, but backend services should still hide the provider SDK behind a vendor-neutral `PaymentGateway`"
      - "Every backend service should call the PayPal SDK directly so the implementation is easier to trace"
      - "All payment logic should run in the browser because that keeps the server independent"
    correct_index: 1
    option_feedback:
      0: |
        The client must know enough to display and initiate supported payment methods, and the server must
        verify payment securely. Hiding the user-facing method everywhere would make the contract unusable.
      2: |
        Direct SDK calls make the vendor decision leak into every service. Tracing one concrete API becomes
        easier, but changing providers becomes much harder.
      3: |
        Client-only payment logic is not trustworthy for real transactions. The server still needs a secure
        payment boundary that can verify what happened.
    explanation: "Information Hiding is boundary-relative. The checkout UI and server contract may need to expose supported payment methods, while order, refund, and wallet services should not know which vendor SDK implements those methods. The backend implementation detail belongs behind `PaymentGateway`."

  - id: 18
    difficulty: intermediate
    type: single
    question: |
      `OrderService`, `RefundService`, and `WalletService` each contain the same `switch` over `paypal`, `stripe`, and `apple-pay`. Which principle is most directly being violated?
    options:
      - "The Single Choice principle, because multiple modules know the exhaustive list of payment alternatives"
      - "DRY only, because duplicating any text is the entire design problem"
      - "Encapsulation, because the payment-provider fields should all be `private`"
      - "The Open/Closed Principle only, because Information Hiding does not apply to lists of alternatives"
    correct_index: 0
    option_feedback:
      1: |
        Repeated code is part of the smell, but the deeper issue is shared knowledge of the exhaustive
        provider list. Removing textual duplication without hiding the list would not fix the design.
      2: |
        Private fields do not help if several public modules still know every provider alternative. The
        choice list itself needs one owner.
      3: |
        The Open/Closed Principle is related, but the Single Choice principle names the more specific
        information-hiding failure: the list of alternatives is not owned in one place.
    explanation: "The Single Choice principle says only one module should know the exhaustive list of alternatives. A common repair is polymorphism: services call `PaymentGateway`, and one factory or configuration boundary chooses which implementation to supply."

  - id: 19
    difficulty: intermediate
    type: single
    question: |
      What is the strongest evidence that a design is turning into a **Big Ball of Mud**?
    options:
      - "A small feature change regularly requires edits across many unrelated modules, and nobody can predict the side effects confidently"
      - "The system has more than one programming language in its repository"
      - "Some modules are implemented with abstract interfaces"
      - "The codebase contains comments explaining why functions exist"
    correct_index: 0
    option_feedback:
      1: |
        Multiple languages can be fine when each boundary has a clear contract. The issue is uncontrolled
        coupling, not language count.
      2: |
        Abstract interfaces can be useful information-hiding mechanisms. They become harmful only when
        they hide nothing or expose the wrong contract.
      3: |
        Good comments can support comprehension. They are a problem only when comments substitute for an
        actual boundary around a leaked decision.
    explanation: "A Big Ball of Mud is characterized by high coupling, low cohesion, low understandability, and high fragility. The practical symptom is wide, unpredictable change impact: the team cannot make a local change locally."

  - id: 20
    difficulty: advanced
    type: single
    question: |
      Which design-doc content is most useful to a future maintainer who asks, "Why does this `PaymentGateway` abstraction exist?"
    options:
      - "A screenshot of the current checkout page"
      - "The alternatives considered, the quality attributes evaluated, and the trade-offs accepted when choosing the gateway boundary"
      - "A statement that the team used interfaces because interfaces are always better"
      - "Only the final UML diagram, with no rejected alternatives"
    correct_index: 1
    option_feedback:
      0: |
        A screenshot may give context, but it does not explain the design reasoning or the change pressure
        the abstraction was meant to absorb.
      2: |
        Interfaces are not always better. A useful design doc explains the concrete decision, not a blanket
        rule.
      3: |
        The final diagram shows what was chosen, but future maintainers also need to know why other options
        were rejected.
    explanation: "Design docs create organizational memory. The most valuable part is often the alternatives-and-trade-offs section: it records why the team chose a boundary, which future changes it anticipated, and which costs it accepted."

  - id: 21
    difficulty: advanced
    type: single
    question: |
      You are reviewing a proposed `EmailHelper` module. Nobody can name a design decision it owns, and every method is a one-line pass-through to a library call. What is the best Information Hiding critique?
    options:
      - "The module may not justify its existence; a separate module should hide a meaningful secret or provide another clear boundary value"
      - "The module is automatically good because all library calls are now in a separate file"
      - "The module is automatically bad because helper modules can never hide information"
      - "The module should expose the library's full API so callers have maximum flexibility"
    correct_index: 0
    option_feedback:
      1: |
        Moving calls into a separate file does not by itself hide a design decision. A boundary earns its
        keep when it reduces what callers need to know or localizes future change.
      2: |
        Helper modules can be useful when they hide a real policy, library choice, format, or tricky
        sequence. The issue is not the word helper; it is whether anything meaningful is hidden.
      3: |
        Exposing the full library API usually leaks the very dependency the wrapper was supposed to hide.
        A good wrapper exposes the operations callers need, not every underlying capability.
    explanation: "A practical Information Hiding test is: list the module's secrets. If the list is empty, the module needs another justification, such as ownership, testability, or a real abstraction boundary. Otherwise it may just be shallow-module overhead."

  - id: 22
    difficulty: basic
    type: single
    question: |
      Which operating-system example best illustrates Information Hiding?
    options:
      - "Applications call stable file and process APIs while the OS hides file-system layout, disk caching, scheduling, and device-driver details"
      - "Applications directly choose the disk block layout so they can optimize every file write"
      - "Every application bundles its own CPU scheduler so the OS can stay simple"
      - "The OS exposes every hardware interrupt to every program because hidden details are always bad"
    correct_index: 0
    option_feedback:
      1: |
        Directly depending on disk layout would make applications fragile whenever the OS changed file
        systems, caching, or storage hardware.
      2: |
        Per-application schedulers would destroy the shared contract that lets many programs run safely on
        one machine.
      3: |
        Exposing every low-level hardware detail would make ordinary programs harder to write and easier to
        break. Hidden details are good when callers do not need them.
    explanation: "Operating systems are deep modules: they expose relatively stable abstractions like files, processes, sockets, and memory mappings while hiding difficult design decisions such as scheduling, device management, caching, and file-system implementation."

  - id: 23
    difficulty: advanced
    type: single
    question: |
      In Parnas's A-7E flight-software work, what is the main purpose of a **module guide**?
    options:
      - "To list every public function alphabetically so callers can look up parameter types"
      - "To organize the system around module secrets, so designers and maintainers can find which module should change for a given design decision"
      - "To replace all module specifications with a single runtime process diagram"
      - "To prove that every module must be implemented as exactly one subroutine"
    correct_index: 1
    option_feedback:
      0: |
        Alphabetical API lookup helps callers use functions, but it does not explain which module owns a
        design decision or where a future change should land.
      2: |
        A process diagram describes runtime activity. The module guide describes the module structure:
        work assignments and hidden secrets.
      3: |
        Parnas explicitly rejects treating a module as necessarily one subroutine. A module is a
        responsibility boundary around a secret.
    explanation: "The module guide extends Information Hiding to complex systems. It records which secrets belong to which modules, so maintainers can identify the relevant module without reading unrelated internals or rediscovering the original design intent."

  - id: 24
    difficulty: advanced
    type: single
    question: |
      According to Parnas's *Software Aging*, why can a successful product become harder to maintain over time?
    options:
      - "Because software mathematically decays the way physical materials corrode"
      - "Because memory leaks are the only meaningful source of software aging"
      - "Because the product's environment changes, and repeated maintenance by people who do not understand the design can damage the original structure"
      - "Because old programs automatically become slower whenever the hardware gets faster"
    correct_index: 2
    option_feedback:
      0: |
        Parnas's point is that the bits do not decay. The product ages because its world changes and its
        structure can be damaged by maintenance.
      1: |
        Memory leaks can cause slowdowns, but Parnas separates that kind of failure from the broader
        structural aging caused by environment change and poorly understood modifications.
      3: |
        Faster hardware can make larger systems possible, but it does not automatically make an old
        program slower. The core problem is changing expectations and deteriorating structure.
    explanation: "Parnas identifies two forces: lack of movement, where unchanged software falls behind a changing world, and change-induced aging, where maintenance that ignores the original design concept makes future changes harder."

  - id: 25
    difficulty: advanced
    type: single
    question: |
      A support tool exposes this public API:

      ```python
      search_bm25(query: str) -> list[tuple[sqlite3.Row, float, int]]
      ```

      The caller uses the row fields, compares the BM25 score to `0.75`, and uses the integer as a posting-list tie breaker. Which redesign best follows Information Hiding?
    options:
      - "Keep the API, but document the BM25 score range more carefully"
      - "Expose `search(query) -> SearchPage`, where each `SearchHit` contains domain fields such as title, excerpt, confidence, and an opaque cursor"
      - "Return the SQL string used to produce the result so advanced clients can tune it"
      - "Return the embedding vector as well, so clients can switch between keyword and vector search themselves"
    correct_index: 1
    option_feedback:
      0: |
        Better documentation does not hide the ranking algorithm, score scale, storage row, or tie-break
        mechanism. It makes the leaked assumptions easier to depend on.
      2: |
        Returning SQL exposes storage and query details. That is the opposite of hiding the search
        module's representation and ranking decisions.
      3: |
        Exposing vectors moves algorithm and representation choices into clients. A future search change
        should usually stay inside the search module.
    explanation: "The caller needs meaningful hits, not BM25 internals. A domain-level result keeps clients away from algorithm choice, score calibration, database row shape, and pagination mechanics."

  - id: 26
    difficulty: advanced
    type: single
    question: |
      A team creates `DatabaseWrapper.execute_sql(sql)` and has service-layer code call it everywhere. What is the best critique?
    options:
      - "This is good Information Hiding because all database access now passes through one class"
      - "This centralizes connection handling, but it still leaks the query language, table names, column names, and storage model into clients"
      - "This is only a problem if the SQL strings are longer than one line"
      - "This would become good Information Hiding if every service built SQL through helper functions instead of string literals"
    correct_index: 1
    option_feedback:
      0: |
        A wrapper can centralize mechanics without hiding the important secret. If callers still know SQL
        schema details, the storage decision has leaked.
      2: |
        Line length is not the issue. The issue is what knowledge the interface permits clients to use.
      3: |
        Helper functions may reduce duplication, but callers would still depend on a storage-shaped
        contract unless the interface becomes domain-shaped.
    explanation: "A stronger boundary would expose operations such as `UserDirectory.find_by_email(email) -> UserProfile`, while keeping query language, schema, connection handling, and row mapping inside the persistence module."

  - id: 27
    difficulty: advanced
    type: single
    question: |
      In a module-guide card for `PaymentGateway`, which entry best distinguishes **primary** and **secondary** secrets?
    options:
      - "Primary secret: provider authorization protocol and response mapping. Secondary secrets: retry rules, idempotency-key format, and credential handling."
      - "Primary secret: the class name. Secondary secrets: the method names."
      - "Primary secret: users do not see the provider SDK. Secondary secret: the checkout page displays a provider logo."
      - "Primary secret: all code in the `payments/` folder. Secondary secret: all tests for that folder."
    correct_index: 0
    option_feedback:
      1: |
        Names matter, but the guide should identify design decisions likely to change, not merely list
        syntactic parts of the class.
      2: |
        User-visible payment options may be part of the product contract. The backend gateway secret is
        the provider integration decision and its implementation details.
      3: |
        A folder is a location, not a secret. The guide should say what knowledge belongs there and what
        changes the module is meant to absorb.
    explanation: "Primary secrets are the main likely-to-change decisions a module exists to hide. Secondary secrets are implementation decisions made while realizing those primary secrets."

  - id: 28
    difficulty: advanced
    type: single
    question: |
      Which statement correctly separates Parnas's **module structure**, **uses structure**, and **process structure**?
    options:
      - "They are three names for the same diagram, so choosing one is mostly a notation preference"
      - "Module structure is about work assignments and hidden secrets; uses structure is about execution dependencies; process structure is about runtime activities"
      - "Module structure only applies to object-oriented classes; process structure only applies to operating systems"
      - "A module must always compile to exactly one process, otherwise Information Hiding has failed"
    correct_index: 1
    option_feedback:
      0: |
        Treating the structures as one diagram hides important design questions. Ownership of secrets,
        execution requirements, and runtime concurrency can differ.
      2: |
        Parnas-style modules are not limited to classes, and process structure appears in many kinds of
        software, not just operating systems.
      3: |
        One process can run code from many modules, and one module can contribute code to multiple
        processes. That does not violate Information Hiding.
    explanation: "A module is a responsibility boundary around a secret. It is not necessarily one file, class, package, process, or runtime thread."

  - id: 29
    difficulty: advanced
    type: single
    question: |
      A student says, "The monolithic version is easier to understand because all the code is on one page. The modular version has more names to learn." What is the best response?
    options:
      - "The student is wrong because modular code is always easier to understand immediately"
      - "The student may be noticing a real first-read cost; evaluate the design by a plausible modification or change-impact task"
      - "The monolithic version is always better because fewer files means fewer dependencies"
      - "The modular version is automatically better because any extra abstraction improves design"
    correct_index: 1
    option_feedback:
      0: |
        Good modularity can add an abstraction that must be learned. The payoff is often clearest when a
        likely change stays local.
      2: |
        Fewer files can look simpler while still spreading volatile knowledge everywhere.
      3: |
        Extra abstractions are not automatically valuable. Each boundary should hide a real secret or
        localize a plausible change.
    explanation: "Information Hiding is a design-for-change principle. First-glance readability matters, but the central test is whether likely future changes stay local and clients avoid forbidden assumptions."
