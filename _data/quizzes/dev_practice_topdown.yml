title: "Top-Down Code Comprehension Quiz"
description: "Practice hypothesis-driven code reading, beacon recognition, layout critique, and strategic switching between top-down and bottom-up comprehension."
active: true
questions:
  - id: 1
    difficulty: basic
    bloom: apply
    type: single
    question: |
      A reviewer opens a complex PR and immediately starts reading the diff line by line. Ten minutes later they still do not know why the change exists. What should they do instead?
    options:
      - "Keep tracing; understanding always emerges after enough lines."
      - "Return to the specification layer: read the PR description, issue, tests, and design notes, then form a hypothesis about the intended change before revisiting the diff."
      - "Ask the author to rewrite every function before review."
      - "Review only files with familiar names and ignore the rest."
    correct_index: 1
    option_feedback:
      0: |
        More tracing can deepen confusion when the reader lacks purpose. The top-down move is to establish intent first.
      2: |
        Rewriting may eventually be needed, but the immediate problem is the reviewer's missing context, not proven bad code.
      3: |
        Familiar files can be useful beacons, but ignoring unfamiliar files creates blind spots.
    explanation: "Top-down review starts by building the 'why' and 'what' of the change. The implementation becomes easier to inspect once the reader has a hypothesis to test."

  - id: 2
    difficulty: basic
    bloom: analyze
    type: single
    question: |
      Which source-file organization best supports the Stepdown Rule and Newspaper Metaphor?
    options:
      - "Public orchestration function at the top, followed by helper functions in the order the orchestration calls them, with low-level utilities near the bottom."
      - "All helper functions first, public API last, so the reader sees every detail before the summary."
      - "Alphabetical ordering of functions, regardless of call relationships."
      - "Random ordering, because modern IDE search makes physical layout irrelevant."
    correct_index: 0
    option_feedback:
      1: |
        Placing details before the story forces bottom-up reconstruction. The Stepdown Rule gives the reader the high-level map first.
      2: |
        Alphabetical order may help lookup, but it does not encode abstraction descent or call structure.
      3: |
        Search helps navigation, but layout still shapes the first mental model a reader forms.
    explanation: "Top-down layout lets a reader skim the main concept first, then descend into lower-level details only when needed."

  - id: 3
    difficulty: basic
    bloom: analyze
    type: multiple
    question: |
      Which of these are useful beacons for top-down comprehension? Select all that apply.
    options:
      - "A test named `rejectsExpiredCoupon`."
      - "A package named `data_access` in a layered architecture."
      - "A variable named `x` that stores a payment authorization result."
      - "A class named `ReportVisitor` that genuinely implements the Visitor pattern."
      - "A PR description that explains the customer-visible behavior being changed."
    correct_indices: [0, 1, 3, 4]
    option_feedback:
      0: |
        The test name exposes intended behavior before the reader sees the implementation.
      1: |
        Package names can make architectural intent visible directly in the source tree.
      2: |
        `x` hides domain information. It forces the reader to infer purpose from surrounding statements.
      3: |
        A truthful pattern name can activate a known schema and compress a whole collaboration into one concept.
      4: |
        Review context can be a beacon too. It helps build the specification layer before source reading begins.
    explanation: "Beacons are any reliable cues that help a reader connect low-level code to high-level purpose. They can live in source, tests, architecture, or review metadata."

  - id: 4
    difficulty: basic
    bloom: evaluate
    type: single
    question: |
      A developer expects a payment service to contain a `refund` path, but no naming, tests, or call hierarchy confirms that hypothesis. What is the most expert next move?
    options:
      - "Assume the refund path exists because the domain schema says it should."
      - "Switch temporarily to bottom-up or tool-supported tracing: search call sites, inspect tests, and follow data flow until the hypothesis is confirmed, revised, or rejected."
      - "Rename unrelated methods until one of them becomes a refund beacon."
      - "Stop reviewing because top-down comprehension failed."
    correct_index: 1
    option_feedback:
      0: |
        A schema is a hypothesis, not proof. When beacons fail to appear, the reader needs evidence.
      2: |
        Renaming without understanding risks creating false beacons. The reader must first discover the real behavior.
      3: |
        Failed hypotheses are normal. The expert move is to repair the mental model with targeted evidence.
    explanation: "Top-down comprehension is opportunistic. Experts switch strategies when evidence does not support the current model."

  - id: 5
    difficulty: basic
    bloom: analyze
    type: single
    question: |
      A class named `PaymentFactory` quietly applies fraud policy, discounts, and audit logging before returning an object. Why is this harmful to top-down comprehension?
    options:
      - "Factory names are never useful beacons."
      - "The name activates a creation-only schema, but the implementation hides business behavior behind that schema. The beacon is misleading, so readers form the wrong hypothesis."
      - "The class should be renamed `PaymentSingleton` because Singleton names are more recognizable."
      - "The problem is only that the file should be shorter."
    correct_index: 1
    option_feedback:
      0: |
        Factory names are useful when the class really owns object creation. The issue is mismatch, not the word itself.
      2: |
        A more recognizable but false pattern name would make the problem worse.
      3: |
        File length may contribute, but the deeper issue is semantic deception: the beacon points to the wrong responsibility.
    explanation: "A beacon is valuable only when it is reliable. Misleading beacons force readers to abandon top-down understanding and re-trace behavior from scratch."

  - id: 6
    difficulty: basic
    bloom: create
    type: single
    question: |
      You are mentoring students who trace every line of every program, even when the structure is familiar. Which practice best helps them grow toward expert comprehension?
    options:
      - "Ban tracing entirely so they are forced to guess."
      - "Teach programming plans and beacons, then ask students to predict the high-level purpose of a code block before tracing only the lines needed to verify or correct the prediction."
      - "Give them only obfuscated code so they cannot rely on names."
      - "Make them memorize design-pattern definitions without reading code."
    correct_index: 1
    option_feedback:
      0: |
        Tracing is still essential when hypotheses fail or syntax is new. The goal is strategic tracing, not no tracing.
      2: |
        Obfuscation is useful for experiments that isolate bottom-up reading, but it is a poor default for teaching expert strategies.
      3: |
        Pattern definitions without code recognition do not build the transfer skill students need.
    explanation: "Students need a bridge from accurate tracing to purposeful abstraction. Predict-then-verify teaches them when a beacon is strong enough to replace exhaustive line reading."

