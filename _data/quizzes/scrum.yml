title: "Scrum Quiz"
description: "Recalling what you just learned is the best way to form lasting memory. Use this quiz to test your understanding of the Scrum framework, roles, events, and principles."
questions:
  - id: 1
    question: "A software development group realizes their newest feature is confusing users based on early behavioral data. They immediately halt their current plan to redesign the user interface. Which foundational philosophy of their framework does this best illustrate?"
    options:
      - "Rigorous upfront predictive planning"
      - "The empirical pillar of adaptation"
      - "Expanding the project scope arbitrarily"
      - "The prioritization duties of the Value Navigator"
      - "The daily synchronization meeting"
    correct_index: 1
    explanation: "**Halting the plan to respond to new user data illustrates the empirical pillar of adaptation — adjusting course as soon as inspection reveals something isn't working.** Scrum is founded on **empiricism**, and **adaptation** requires adjusting the process or product as soon as possible if aspects deviate outside acceptable limits."

  - id: 2
    question: "In an environment that prioritizes agility, the individuals actually building the product must possess a specific dynamic. Which description best captures how this group should operate?"
    options:
      - "A siloed group of specialists awaiting detailed instructions from a project manager."
      - "A self-managing unit equipped with all necessary skills to deliver a completed piece of value."
      - "A hierarchy of junior and senior engineers reporting directly to external stakeholders."
      - "A temporary task force assembled only for the duration of a single specific feature."
    correct_index: 1
    explanation: "**Scrum Teams must be cross-functional (all skills needed to deliver value) and self-managing (deciding internally who does what, when, and how) — not siloed or manager-directed.** Scrum Teams are **cross-functional** (possessing all necessary skills) and **self-managing** (deciding internally who does what, when, and how)."

  - id: 3
    question: "The development group is completely blocked because they lack access to a third-party API required for their current iteration. Who is primarily responsible for facilitating the resolution of this organizational bottleneck?"
    options:
      - "The Developers, by pausing all development until the issue resolves itself."
      - "The Product Owner, by rewriting the requirements to avoid the API."
      - "The Scrum Master, by causing the removal of the impediment."
      - "The external stakeholders, by extending the iteration's deadline."
    correct_index: 2
    explanation: "**Removing impediments to the team's progress is the Scrum Master's responsibility — not the Developers', the Product Owner's, or external stakeholders'.** The **Scrum Master** serves the team by causing the removal of **impediments** to their progress."

  - id: 4
    question: "To ensure the team is consistently tackling the most crucial problems first, someone must dictate the priority of upcoming work items. Who holds this responsibility?"
    options:
      - "The individual contributors writing the code."
      - "The Product Owner."
      - "The Scrum Master."
      - "A consensus vote among all stakeholders during the review session."
      - "The users submitting bug reports."
    correct_index: 1
    explanation: "**Ordering the Product Backlog to maximize value is the Product Owner's sole responsibility — the Scrum Master facilitates process, and Developers own technical decisions.** The **Product Owner** is the one who orders the work for a complex problem into a **Product Backlog** to maximize value."

  - id: 5
    question: "What condition must be strictly satisfied before a newly developed feature is officially considered a completed, verifiable stepping stone toward the ultimate product vision?"
    options:
      - "It must be formally approved and signed off by the Scrum Master."
      - "It must fulfill the team's agreed-upon checklist of quality measures."
      - "It must be deployed to the live production environment for end-users."
      - "It must be previewed in a slide deck for corporate stakeholders."
    correct_index: 1
    explanation: "**A feature is considered done only when it meets the team's agreed-upon Definition of Done — not when it is approved by a role, deployed, or presented in a slide deck.** The **Scrum Master** helps the team focus on creating high-value **Increments** that specifically meet the **Definition of Done** (the quality measures checklist)."

  - id: 6
    question: "What is the primary objective of the Daily Scrum?"
    options:
      - "To provide a daily status report to upper management."
      - "To evaluate progress toward the current iteration's goal and adjust the upcoming day's plan."
      - "To demonstrate newly completed features to external clients."
      - "To reflect on long-term team friction and interpersonal conflicts."
      - "To refine and estimate future work items."
    correct_index: 1
    explanation: "**The Daily Scrum's purpose is to inspect progress toward the Sprint Goal and adapt the plan for the next day — it is not a status report for management or a backlog refinement session.** The **Daily Scrum** focuses on progress toward the **Sprint Goal** and produces an actionable plan for the next day of work."

  - id: 7
    question: "At the conclusion of a work cycle, the team gathers specifically to discuss how they can improve their internal collaboration and technical practices for the next cycle. Which event does this describe?"
    options:
      - "The Sprint Planning session."
      - "The Daily Scrum."
      - "The Sprint Review."
      - "The Sprint Retrospective."
    correct_index: 3
    explanation: "**The Sprint Retrospective is for inspecting and improving the team's internal process — distinct from the Sprint Review which examines the product increment with stakeholders.** The **Sprint Retrospective** is an event for the team to inspect their process, reflect on it, and adjust for the next Sprint to continuously improve."

  - id: 8
    question: "When a massive enterprise needs to coordinate dozens of teams working on the same vast product, they might adopt a 'team of teams' approach. According to common critiques, what is a potential drawback of this heavily synchronized model?"
    options:
      - "It completely eliminates the need for any overarching business goals."
      - "It restricts the self-governing autonomy of individual teams due to extensive planning constraints."
      - "It forces development cycles to be reduced to daily, chaotic increments."
      - "It removes the need for any formal quality checklists or verification."
      - "It requires all developers to become management professionals."
    correct_index: 1
    explanation: "**A key critique of scaled frameworks like SAFe is that extensive cross-team planning and synchronization reduces individual team autonomy — the opposite of Scrum's self-managing principle.** Common critiques of frameworks like SAFe suggest they can reduce individual team autonomy through heavy planning and synchronization requirements."
