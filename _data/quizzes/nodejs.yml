title: "Node.js Concepts Quiz"
description: "Test your deeper understanding of JavaScript's async model, type system, and paradigm differences from C++ and Python. Includes Parsons problems, technique-selection questions, and spaced interleaving across all concepts."
active: true
questions:
  - id: 1
    difficulty: intermediate
    question: "A C++ developer argues: 'Single-threaded means Node.js can only handle one request at a time, so it's useless for servers.' What is the flaw in this reasoning?"
    options:
      - "Node.js is actually multi-threaded — each request gets its own thread"
      - "Node delegates I/O to the OS (via libuv) while one thread handles many concurrent connections"
      - "Single-threaded is slower, but Node.js compensates with a faster garbage collector"
      - "The flaw is that Node.js compiles to C++ before running, so it actually uses threads internally"
    correct_index: 1
    option_feedback:
      0: |
        Node has worker resources under the hood, but JavaScript request callbacks are not assigned one
        OS thread each.
      2: |
        Garbage-collector speed does not solve the architectural point: non-blocking I/O keeps the event
        loop available.
      3: |
        V8 executes JavaScript with native machinery, but Node's concurrency model is still event-loop
        driven rather than one C++ thread per request.
    explanation: "Most server work is I/O-bound (waiting on databases, files, network), not CPU-bound. While the Chef (call stack) does one thing at a time, the Appliances (OS, via libuv) handle I/O in the background, so the single thread stays free to serve other requests. This makes the model highly efficient for I/O-bound work but unsuitable for CPU-heavy tasks like video encoding."

  - id: 2
    difficulty: advanced
    question: |
      A developer writes this code and is confused why the output is `A, C, B` instead of `A, B, C`:
      ```javascript
      console.log("A");
      setTimeout(() => console.log("B"), 0);
      console.log("C");
      ```
      Explain the output using the Event Loop model.
    options:
      - "`setTimeout` has a minimum delay of 1ms, so B is slightly delayed"
      - "The timer callback waits in the Task Queue until the Call Stack empties"
      - "`console.log` is asynchronous in Node.js, so the order is random"
      - "Arrow functions execute after regular functions by design"
    correct_index: 1
    option_feedback:
      0: |
        The important rule is not the exact minimum delay; queued callbacks wait until synchronous code
        leaves the call stack.
      2: |
        The order is deterministic here because `console.log("A")` and `console.log("C")` run
        synchronously before the timer callback.
      3: |
        Arrow syntax does not delay execution; the callback is delayed because `setTimeout` schedules
        it.
    explanation: "A 0ms delay means 'as soon as possible', not 'immediately' — the callback waits in the Task Queue while `A` and `C` run synchronously. The Event Loop never interrupts the Call Stack, so it only hands the `B` callback over once synchronous code finishes. This is why blocking the main thread with a long loop prevents all callbacks from firing."

  - id: 3
    difficulty: advanced
    question: "A teammate's code uses `==` for all comparisons and it 'works fine in tests.' You suggest changing to `===` in code review. They push back: 'If it works, why change it?' What is the strongest argument for `===`?"
    options:
      - "`===` is measurably faster at runtime"
      - "`==` silently coerces across types, masking bugs the moment types diverge (e.g. `'0' == 0`)"
      - "`==` is deprecated and will be removed in future JavaScript versions"
      - "There is no strong argument — `==` and `===` are interchangeable when types match"
    correct_index: 1
    option_feedback:
      0: |
        The main reason for `===` is semantic safety against coercion bugs, not speed.
      2: |
        `==` still exists; the review concern is that implicit coercion can hide type mismatches.
      3: |
        `==` and `===` agree only while operands stay the same type, so tests can miss the future
        mismatch.
    explanation: "The danger isn't that `==` fails now — it's that it hides a fragile assumption. When requirements change (e.g., a user ID becomes a string UUID instead of a number), `==` silently coerces and produces wrong results with no error. `===` fails loudly when types diverge, catching the bug before it reaches production."

  - id: 4
    difficulty: advanced
    question: |
      Compare these two approaches for fetching data from two independent APIs:

      **Approach A (Sequential):**
      ```javascript
      const users = await fetchUsers();
      const posts = await fetchPosts();
      ```

      **Approach B (Parallel):**
      ```javascript
      const [users, posts] = await Promise.all([fetchUsers(), fetchPosts()]);
      ```

      When should you prefer B over A?
    options:
      - "Always — parallel is always better than sequential"
      - "When the two operations are independent of each other"
      - "Only when the server supports HTTP/2 multiplexing"
      - "Never — `Promise.all` is harder to debug and should be avoided"
    correct_index: 1
    option_feedback:
      0: |
        Parallelizing dependent operations can fail or waste work when the second result needs data from
        the first.
      2: |
        `Promise.all` is about JavaScript scheduling of independent promises, not specifically about
        HTTP/2 support.
      3: |
        Avoiding `Promise.all` for independent work preserves no semantic benefit and can double
        avoidable wait time.
    explanation: "Sequential `await` is correct when operations depend on each other (fetch a user, then fetch that user's posts). For independent operations, `Promise.all` runs them concurrently — `max(A, B)` instead of `A + B`. If each fetch takes 200ms, sequential = 400ms but parallel = 200ms."

  - id: 5
    difficulty: advanced
    question: "A student writes `var x = 5` inside a `for` loop body. After the loop, they access `x` and are surprised it's still in scope. A C++ programmer would expect `x` to be destroyed at the closing brace. What JavaScript concept explains this?"
    options:
      - "`var` is function-scoped — it ignores `{}` blocks"
      - "`var` creates a global variable that persists for the entire program"
      - "JavaScript does not have any form of block scoping"
      - "`for` loops in JavaScript are macros that expand inline, so there is no inner scope"
    correct_index: 0
    option_feedback:
      1: |
        `var` is scoped to the enclosing function; it becomes global only when declared at top level in
        the relevant environment.
      2: |
        `let` and `const` are block-scoped; the confusing legacy behavior belongs to `var`.
      3: |
        The loop is not macro-expanded; the observed lifetime follows JavaScript's `var` scoping rule.
    explanation: "`var` hoists to the enclosing function scope and ignores block boundaries (`if`, `for`, `while`), so it survives past the loop's closing brace — one of JavaScript's most confusing legacy features. `let` and `const` use block scope, matching the behavior C++ and Python lead you to expect. Always prefer `let` or `const`."

  - id: 6
    difficulty: intermediate
    question: "Why is the callback pattern fundamental to ALL of Node.js — not just a stylistic choice?"
    options:
      - "Callbacks are the only way to define functions in JavaScript"
      - "They are how the single-threaded Event Loop notifies your code that an async operation completed"
      - "Callbacks are required by the V8 engine's garbage collector"
      - "Callbacks are only used in legacy Node.js — modern versions use a different mechanism"
    correct_index: 1
    option_feedback:
      0: |
        JavaScript has many ways to define functions; callbacks matter because async APIs need a
        function to call later.
      2: |
        V8 garbage collection is not why callbacks are used; the event loop needs a continuation for
        completed async work.
      3: |
        Promises and `async/await` improve syntax, but they still represent work that resumes through
        scheduled continuations.
    explanation: "Every async API follows the pattern 'start this operation and call this function when done': `fs.readFile(path, callback)`, `setTimeout(callback, ms)`, `fetch(url).then(callback)` all accept functions. The single-threaded Event Loop has no other way to notify your code that an operation completed. Even `async/await` is syntactic sugar over Promises, which are themselves built on this pattern."

  - id: 7
    difficulty: advanced
    question: |
      A student writes:
      ```javascript
      async function processAll(items) {
          items.forEach(async (item) => {
              await processItem(item);
          });
          console.log("All done!");
      }
      ```
      They expect "All done!" to print after all items are processed. What is the bug?
    options:
      - "`.forEach()` ignores the returned promises and returns immediately"
      - "The `async` keyword is not needed inside `.forEach()`"
      - "`processItem` must return a string, not a Promise"
      - "There is no bug — `.forEach()` correctly awaits each callback"
    correct_index: 0
    option_feedback:
      1: |
        Marking the callback `async` makes each callback return a promise, but `.forEach()` does not
        collect or await those promises.
      2: |
        The bug is not the eventual value returned by `processItem`; it is that the surrounding loop
        ignores the promise lifecycle.
      3: |
        Most array iteration helpers are synchronous; `await` inside their callbacks does not make the
        helper itself wait.
    explanation: "`.forEach()` has no mechanism to wait for the Promises its async callbacks return — it fires them all and returns immediately, so `\"All done!\"` prints before any item finishes. The `await` inside each callback works, but `.forEach` itself ignores it. Fix: `for (const item of items) { await processItem(item); }` (sequential) or `await Promise.all(items.map(item => processItem(item)))` (parallel)."

  - id: 8
    difficulty: advanced
    question: |
      **Arrange** the lines to write an async function that reads a file and returns its parsed JSON content, handling errors gracefully.
    type: parsons
    lines:
      - "async function loadConfig(path) {"
      - "    try {"
      - "        const data = await fs.promises.readFile(path, 'utf-8');"
      - "        return JSON.parse(data);"
      - "    } catch (err) {"
      - "        console.error('Failed to load config:', err.message);"
      - "        return null;"
      - "    }"
      - "}"
    distractors:
      - "        fs.readFileSync(path);"
      - "    finally { return data; }"
    explanation: "`async/await` with `fs.promises.readFile` reads without blocking, and the `try/catch` handles both file-not-found and invalid-JSON errors. The `readFileSync` distractor blocks the Event Loop — the cardinal sin in Node.js. The `finally { return data; }` distractor would override the return value from both `try` and `catch`, a subtle bug since a `return` in `finally` wins."

  - id: 9
    difficulty: intermediate
    question: |
      **Arrange** the lines to set up a basic Express.js route handler that reads a query parameter and sends a JSON response.
    type: parsons
    lines:
      - "const express = require('express');"
      - "const app = express();"
      - "app.get('/api/greet', (req, res) => {"
      - "    const name = req.query.name || 'World';"
      - "    res.json({ message: `Hello, ${name}!` });"
      - "});"
      - "app.listen(3000);"
    distractors:
      - "app.post('/api/greet', (req, res) => {"
      - "    res.send(name);"
    explanation: "`require('express')` imports the framework and `express()` creates the app; `app.get()` registers a handler where `req.query.name` reads the `?name=` parameter and `res.json()` replies with correct JSON headers; `app.listen(3000)` starts the server. The `app.post` distractor uses the wrong HTTP method for a read, and `res.send(name)` would send plain text without JSON formatting."

  - id: 10
    difficulty: advanced
    question: |
      **Arrange** the fragments to build a Promise chain that fetches data, parses JSON, and handles errors.
    type: parsons
    display: inline
    lines:
      - "fetch(url)"
      - ".then(res => res.json())"
      - ".then(data => console.log(data))"
      - ".catch(err => console.error(err))"
    distractors:
      - ".finally(data => process(data))"
      - ".then(res => res.text)"
    explanation: "`fetch(url)` resolves to a Response, `.then(res => res.json())` parses the body (also returning a Promise), `.then(data => ...)` receives the parsed data, and `.catch()` handles any error in the chain — network failure, parse error, and so on. The `.finally` distractor receives no argument, so it can't process data. `res.text` without `()` is a property reference, not a method call."

  - id: 11
    difficulty: advanced
    question: |
      You are building a TikTok-style feed. Match each task to the best array method:
      - Task A: Remove videos the user has already seen
      - Task B: Convert each video object into a `<VideoCard>` component
      - Task C: Calculate the total watch time across all videos
    options:
      - "A: `.map()`, B: `.filter()`, C: `.reduce()`"
      - "A: `.filter()`, B: `.map()`, C: `.reduce()`"
      - "A: `.reduce()`, B: `.map()`, C: `.filter()`"
      - "A: `.filter()`, B: `.reduce()`, C: `.map()`"
    correct_index: 1
    option_feedback:
      0: |
        `.map()` keeps the same cardinality and transforms each item; it does not remove seen videos.
      2: |
        `.reduce()` can implement many things, but using it to select unseen videos hides the simpler
        operation: filtering.
      3: |
        `.reduce()` collapses to one accumulated value, so it is the wrong fit for rendering one
        component per video.
    explanation: "`.filter()` selects elements matching a condition (unseen videos), `.map()` transforms each element into something new (video → component), and `.reduce()` combines all elements into one value (total watch time). Knowing *which* method fits the task — not just how each works — is the critical skill."

  - id: 12
    difficulty: advanced
    question: |
      A Discord bot fetches a user's message count from an API. The API returns `"42"` (a string). The bot checks `if (count == 42)` to award a badge. What are ALL the problems?
    options:
      - "Only one problem: `==` should be `===`"
      - "`==` coerces the string and hides a type mismatch that breaks at other thresholds"
      - "No problems — `==` correctly handles string-to-number comparison"
      - "The only problem is that the API should return a number, not a string"
    correct_index: 1
    option_feedback:
      0: |
        The dangerous part is not merely using the wrong operator; the operator hides an API type
        mismatch that should be made explicit.
      2: |
        `==` makes this example pass by accident, which is exactly why the bug can survive until a less
        friendly value appears.
      3: |
        Even if the API should return a number, client code still needs explicit conversion or strict
        comparison at the boundary.
    explanation: "`==` coerces the string `\"42\"` to the number `42`, so the check passes by accident while hiding a type mismatch `===` would catch. The accidental success is exactly what lets the bug survive until a less friendly value (like a threshold of `0`) appears. `Number(count) === 42` makes the conversion explicit and the comparison strict."

  - id: 13
    difficulty: intermediate
    question: |
      **Arrange** the lines to process an array of Spotify tracks: filter explicit songs, extract just the titles, and join them into a comma-separated string.
    type: parsons
    display: inline
    lines:
      - "const playlist = tracks"
      - "    .filter(t => !t.explicit)"
      - "    .map(t => t.title)"
      - "    .join(', ');"
    distractors:
      - "    .reduce(t => !t.explicit)"
      - "    .map(t => t.title())"
    explanation: "`.filter()` drops explicit tracks (the `!` keeps non-explicit ones), `.map()` extracts each title string, and `.join()` concatenates the array into one comma-separated string. The `.reduce()` distractor accumulates rather than selects, so it's the wrong tool for filtering. `t.title()` calls `title` as a function, but it's a property, not a method."

  - id: 14
    difficulty: intermediate
    question: "What does calling an `async` function **always** return, even if the function body just returns a plain number like `return 42`?"
    options:
      - "The plain value (`42`) — `async` is only meaningful when the function contains an `await`"
      - "A Promise — every `async` function wraps its return in `Promise.resolve()`"
      - "An `AsyncIterator` object that must be consumed with `for await...of`"
      - "`undefined` — async functions cannot return values directly"
    correct_index: 1
    option_feedback:
      0: |
        The `async` keyword always wraps the function result in a Promise, even when the body has no
        `await`.
      2: |
        `async` functions return Promises; `for await...of` is for async iterables, a different
        protocol.
      3: |
        They can return values, but callers receive those values through the returned Promise.
    explanation: "An `async` function always returns a Promise: `async function answer() { return 42; }` is equivalent to `function answer() { return Promise.resolve(42); }`. This is why `const result = someAsyncFunction()` without `await` gives you a Promise object, not the value — one of the most common async bugs."

  - id: 15
    difficulty: advanced
    question: |
      A developer needs a `delay(ms)` utility that returns a Promise resolving after `ms` milliseconds. Which implementation is correct?
    options:
      - |
        ```javascript
        function delay(ms) {
            return setTimeout(() => {}, ms);
        }
        ```
      - |
        ```javascript
        async function delay(ms) {
            await ms;
        }
        ```
      - |
        ```javascript
        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
        ```
      - |
        ```javascript
        function delay(ms) {
            Promise.resolve(setTimeout(() => {}, ms));
        }
        ```
    correct_index: 2
    option_feedback:
      0: |
        `setTimeout` returns an identifier for canceling the timer, not a Promise that resolves later.
      1: |
        `await ms` immediately yields the same number because `ms` is not a Promise tied to a timer.
      3: |
        Wrapping the timer ID with `Promise.resolve` resolves immediately with the ID; it does not wait
        for the callback.
    explanation: "`new Promise(resolve => ...)` creates a Promise that settles when `resolve` is called; passing `resolve` directly to `setTimeout` means 'call `resolve` after `ms` milliseconds', so the Promise resolves exactly when the timer fires. The other approaches return a timer ID immediately, await a non-Promise (resolving instantly), or never return the Promise at all."

  - id: 16
    difficulty: intermediate
    question: |
      **Arrange** the lines to filter passing students (grade ≥ 60) and extract just their names.
    type: parsons
    display: inline
    lines:
      - "const passingNames = students"
      - "    .filter(s => s.grade >= 60)"
      - "    .map(s => s.name);"
    distractors:
      - "    .map(s => s.grade >= 60)"
      - "    .filter(s => s.name)"
      - "    .reduce((acc, s) => acc + s.name, '')"
    explanation: "`.filter()` selects the passing students first, then `.map()` transforms the survivors into names. Reversing them fails because `.map(s => s.grade >= 60)` produces booleans, leaving no `grade` property to filter on. `.filter(s => s.name)` keeps every student with a name — all of them — so nothing is filtered, and `.reduce` accumulates into a single value, not an array."

  - id: 17
    difficulty: advanced
    question: |
      **Arrange** the lines of a corrected `processAll` function. The original bug: `"All done!"` printed before items finished processing because `.forEach()` ignores the `await` inside its callback.
    type: parsons
    lines:
      - "async function processAll(items) {"
      - "    for (const item of items) {"
      - "        await processItem(item);"
      - "    }"
      - "    console.log(\"All done!\");"
      - "}"
    distractors:
      - "    items.forEach(async (item) => {"
      - "    await items;"
    explanation: "`for...of` is the idiomatic fix for sequential async iteration — `await` inside it pauses the loop body before the next item. The `items.forEach(async ...)` distractor is the original bug: `.forEach()` doesn't await async callbacks, so all of them fire immediately and `\"All done!\"` prints before any finish. `await items` makes no sense — `items` is an array, not a Promise."

  - id: 18
    difficulty: advanced
    question: |
      A student writes this code for a multiplayer game server and wonders why player moves are "laggy":
      ```javascript
      app.post('/move', (req, res) => {
          // Compute best AI response (CPU-intensive, ~2 seconds)
          const aiMove = computeAIResponse(req.body.board);
          res.json({ move: aiMove });
      });
      ```
      What is wrong, and what would you suggest?
    options:
      - "The `app.post` callback should use `async/await` to make `computeAIResponse` non-blocking"
      - "CPU work on the event loop blocks every other player; offload to a Worker Thread"
      - "The problem is that `res.json()` is slow — use `res.send()` instead for faster responses"
      - "Nothing is wrong — 2 seconds is an acceptable response time for game servers"
    correct_index: 1
    option_feedback:
      0: |
        `async` changes how waiting is expressed, but a synchronous two-second computation still
        occupies the event loop thread.
      2: |
        The lag comes before `res.json()`, while the server is unable to handle other callbacks during
        CPU work.
      3: |
        In an event-loop server, one slow CPU-bound request harms every other request waiting for a
        turn.
    explanation: "The Chef (call stack) is stuck computing AI moves for 2 seconds, during which every other player's request sits in the queue. `async/await` can't help because the work is CPU-bound, not I/O-bound — there's nothing to delegate to the OS while waiting. A Worker Thread moves the heavy computation off the main thread so the Event Loop stays responsive."

  - id: 19
    difficulty: advanced
    question: |
      **Arrange** the lines to look up a student by ID from a roster array, handle the case where the student isn't found, and return their data as JSON.
    type: parsons
    lines:
      - "router.get('/students/:id', async (req, res) => {"
      - "    const roster = await fetchRoster();"
      - "    const student = roster.find(s => s.id === Number(req.params.id));"
      - "    if (!student) { return res.json({ error: 'Not found' }); }"
      - "    res.json(student);"
      - "});"
    distractors:
      - "    const student = roster.filter(s => s.id === req.params.id);"
      - "    if (student === null) { return res.json({ error: 'Not found' }); }"
    explanation: "`.find()` returns the first match or `undefined`, so `!student` is the right guard — it catches both `undefined` and `null`. The `.filter()` distractor returns an array, not a single object, and the `=== null` distractor misses `undefined`, which is what `.find()` actually produces. Note `Number(req.params.id)` converts the string route param to match the numeric `id` under `===`."

  - id: 20
    difficulty: basic
    question: |
      **Arrange** the lines to create a JavaScript object, convert it to a JSON string, parse it back, and log a property.
    type: parsons
    lines:
      - "const student = { name: 'Alice', grade: 95 };"
      - "const jsonStr = JSON.stringify(student);"
      - "const parsed = JSON.parse(jsonStr);"
      - "console.log(parsed.name);"
    distractors:
      - "const jsonStr = student.toJSON();"
      - "const parsed = JSON.decode(jsonStr);"
    explanation: "`JSON.stringify()` converts an object to a JSON string and `JSON.parse()` converts it back. Plain objects have no `.toJSON()` method, and there is no `JSON.decode()` — both distractors are confusions carried over from other languages."

  - id: 21
    difficulty: intermediate
    question: |
      What is the value of `x` after this code runs?
      ```javascript
      let x;
      console.log(x);
      console.log(typeof x);
      ```
    options:
      - "`x` is `null` and `typeof x` is `\"null\"`"
      - "`x` is `undefined`, `typeof x` is `\"undefined\"` — unassigned, not null"
      - "The code throws a `ReferenceError` because `x` has no value"
      - "`x` is `0` — JavaScript auto-initializes numeric variables to zero"
    correct_index: 1
    option_feedback:
      0: |
        `undefined` means no value has been assigned; `null` is an explicit empty value chosen by the
        program.
      2: |
        A declared `let x;` exists in scope; a `ReferenceError` would come from using a name that was
        never declared.
      3: |
        JavaScript does not infer that an unassigned variable should be numeric zero.
    explanation: "A declared variable with no value assigned is `undefined` ('not yet assigned'), distinct from `null` ('intentionally empty') and from Python, which raises `NameError` for an uninitialized name. `typeof undefined` is `\"undefined\"`; confusingly, `typeof null` is `\"object\"` — a famous JS bug."

  - id: 22
    difficulty: advanced
    question: |
      **Arrange** the lines to safely access a nested property, provide a default, and log the result.
    type: parsons
    display: inline
    lines:
      - "const user = { profile: { address: null } };"
      - "const city = user?.profile?.address?.city ?? 'Unknown';"
      - "console.log(city);"
    distractors:
      - "const city = user.profile.address.city || 'Unknown';"
      - "const city = user?.profile?.address?.city != null ? city : 'Unknown';"
    explanation: "When `address` is `null`, `address?.city` returns `undefined` instead of throwing, and `??` supplies the default only for `null`/`undefined`. The `||` distractor would also replace `0` and empty strings with the default — wrong when those are valid values. The ternary distractor references `city` before it is defined."
