title: "Node.js Concepts Quiz"
description: "Test your deeper understanding of JavaScript's async model, type system, and paradigm differences from C++ and Python. Includes Parsons problems, technique-selection questions, and spaced interleaving across all concepts."
questions:
  - id: 1
    question: "A C++ developer argues: 'Single-threaded means Node.js can only handle one request at a time, so it's useless for servers.' What is the flaw in this reasoning?"
    options:
      - "Node.js is actually multi-threaded — each request gets its own thread"
      - "Node.js IS single-threaded, but its Event Loop delegates I/O operations to the OS (via libuv) and processes callbacks when results arrive. This lets it handle thousands of concurrent I/O-bound connections with one thread — unlike C++ where each connection typically needs its own thread"
      - "Single-threaded is slower, but Node.js compensates with a faster garbage collector"
      - "The flaw is that Node.js compiles to C++ before running, so it actually uses threads internally"
    correct_index: 1
    explanation: "**Node.js is single-threaded but its Event Loop delegates I/O to the OS, keeping the thread free to handle other requests — making it highly efficient for I/O-bound work despite having only one thread.** The key insight is that most server work is I/O-bound (waiting for databases, files, network), not CPU-bound. While the Chef (call stack) can only do one thing at a time, the Appliances (OS) handle I/O in the background. The Chef stays free to serve other requests. This model is efficient for I/O workloads but unsuitable for CPU-heavy tasks like video encoding."

  - id: 2
    question: |
      A developer writes this code and is confused why the output is `A, C, B` instead of `A, B, C`:
      ```javascript
      console.log("A");
      setTimeout(() => console.log("B"), 0);
      console.log("C");
      ```
      Explain the output using the Event Loop model.
    options:
      - "`setTimeout` has a minimum delay of 1ms, so B is slightly delayed"
      - "The `setTimeout` callback enters the **Task Queue** immediately, but the Event Loop only dequeues it when the **Call Stack is empty**. `A` and `C` are synchronous and execute first. Only after both complete does the Event Loop hand the `B` callback to the Chef"
      - "`console.log` is asynchronous in Node.js, so the order is random"
      - "Arrow functions execute after regular functions by design"
    correct_index: 1
    explanation: "**`setTimeout(() => ..., 0)` queues the callback in the Task Queue, but the Event Loop only dequeues it after the Call Stack is empty — so synchronous code always runs first.** The 0ms delay means 'as soon as possible', NOT 'immediately'. The callback waits in the Task Queue. The Event Loop's rule: never interrupt the Call Stack. Synchronous code runs to completion first. This is why blocking the main thread (e.g., with a long loop) prevents ALL callbacks from firing."

  - id: 3
    question: "A teammate's code uses `==` for all comparisons and it 'works fine in tests.' You suggest changing to `===` in code review. They push back: 'If it works, why change it?' What is the strongest argument for `===`?"
    options:
      - "`===` is measurably faster at runtime"
      - "`==` works when both operands happen to be the same type (common in tests), but silently masks bugs when types diverge — e.g., if a form field returns a string `'0'` instead of the number `0`, `==` would equate them. Using `===` consistently prevents this entire class of latent bugs"
      - "`==` is deprecated and will be removed in future JavaScript versions"
      - "There is no strong argument — `==` and `===` are interchangeable when types match"
    correct_index: 1
    explanation: "**`==` silently coerces types and hides fragile assumptions — `===` fails loudly when types diverge, catching latent bugs before they reach production.** The danger isn't that `==` fails now — it's that it hides a fragile assumption. When requirements change (e.g., user ID becomes a string UUID instead of a number), `==` comparisons silently coerce and produce wrong results with no error. `===` is defensive coding — it fails loudly when types don't match."

  - id: 4
    question: |
      **Evaluate** these two approaches for fetching data from two independent APIs:

      **Approach A (Sequential):**
      ```javascript
      const users = await fetchUsers();
      const posts = await fetchPosts();
      ```

      **Approach B (Parallel):**
      ```javascript
      const [users, posts] = await Promise.all([fetchUsers(), fetchPosts()]);
      ```

      When should you prefer B over A?
    options:
      - "Always — parallel is always better than sequential"
      - "When the two operations are **independent** (neither needs the other's result). B takes `max(A, B)` time; A takes `A + B` time. If `fetchPosts()` depends on `fetchUsers()`'s result, you must use A"
      - "Only when the server supports HTTP/2 multiplexing"
      - "Never — `Promise.all` is harder to debug and should be avoided"
    correct_index: 1
    explanation: "**`Promise.all` should be preferred when the two operations are independent — it takes `max(A, B)` time instead of `A + B`, cutting wall-clock time significantly.** Sequential `await` is correct when operations depend on each other (fetch user, then fetch that user's posts). For independent operations, `Promise.all` cuts wall-clock time significantly. Example: if each fetch takes 200ms, sequential = 400ms, parallel = 200ms."

  - id: 5
    question: "A student writes `var x = 5` inside a `for` loop body. After the loop, they access `x` and are surprised it's still in scope. A C++ programmer would expect `x` to be destroyed at the closing brace. What JavaScript concept explains this?"
    options:
      - "`var` uses **function scope**, not block scope — it ignores `{}` blocks entirely and is scoped to the enclosing function. This violates C++ and Python scoping rules. `let` and `const` use block scope and behave as expected"
      - "`var` creates a global variable that persists for the entire program"
      - "JavaScript does not have any form of block scoping"
      - "`for` loops in JavaScript are macros that expand inline, so there is no inner scope"
    correct_index: 0
    explanation: "**`var` uses function scope and ignores block boundaries — unlike C++ and Python — so it remains accessible after the `for` loop closes; use `let` or `const` for block scope.** `var` hoists to the enclosing function scope and ignores block boundaries (`if`, `for`, `while`). This is one of JavaScript's most confusing legacy features. `let` and `const` (introduced in ES6) use block scope — matching the behavior you expect from C++ and Python. Always use `let`/`const`."

  - id: 6
    question: "Why is the callback pattern fundamental to ALL of Node.js — not just a stylistic choice?"
    options:
      - "Callbacks are the only way to define functions in JavaScript"
      - "Node.js's single-threaded Event Loop communicates results of async operations (file reads, network requests, timers) by **calling a function you provided**. Without callbacks, there is no mechanism for the Event Loop to notify your code that an operation completed"
      - "Callbacks are required by the V8 engine's garbage collector"
      - "Callbacks are only used in legacy Node.js — modern versions use a different mechanism"
    correct_index: 1
    explanation: "**Callbacks are fundamental to Node.js because the single-threaded Event Loop has no other mechanism to notify your code when an async operation completes — every async API is built on this pattern.** Every async API in Node.js follows the pattern: 'start this operation and call this function when done.' `fs.readFile(path, callback)`, `setTimeout(callback, ms)`, `fetch(url).then(callback)` — they all accept functions. Even `async/await` is syntactic sugar over Promises, which are themselves built on callbacks. Understanding this chain is essential."

  - id: 7
    question: |
      A student writes:
      ```javascript
      async function processAll(items) {
          items.forEach(async (item) => {
              await processItem(item);
          });
          console.log("All done!");
      }
      ```
      They expect "All done!" to print after all items are processed. What is the bug?
    options:
      - "`.forEach()` doesn't support async callbacks — the `await` inside is ignored, and `\"All done!\"` prints immediately while items are still being processed. Use `for...of` or `Promise.all(items.map(...))` instead"
      - "The `async` keyword is not needed inside `.forEach()`"
      - "`processItem` must return a string, not a Promise"
      - "There is no bug — `.forEach()` correctly awaits each callback"
    correct_index: 0
    explanation: "**`.forEach()` ignores async callbacks — it fires them all and returns immediately, so `'All done!'` prints before any item finishes; use `for...of` with `await` or `Promise.all` instead.** `.forEach()` does not await the async callbacks it spawns — it fires them all and returns immediately. The `await` inside each callback works, but `.forEach` itself doesn't wait for them. Fix: `for (const item of items) { await processItem(item); }` (sequential) or `await Promise.all(items.map(item => processItem(item)))` (parallel)."

  - id: 8
    question: |
      **Arrange** the lines to write an async function that reads a file and returns its parsed JSON content, handling errors gracefully.
    type: parsons
    lines:
      - "async function loadConfig(path) {"
      - "    try {"
      - "        const data = await fs.promises.readFile(path, 'utf-8');"
      - "        return JSON.parse(data);"
      - "    } catch (err) {"
      - "        console.error('Failed to load config:', err.message);"
      - "        return null;"
      - "    }"
      - "}"
    distractors:
      - "        fs.readFileSync(path);"
      - "    finally { return data; }"
    explanation: "**The correct order is: async readFile → JSON.parse → return inside try/catch — `readFileSync` blocks the Event Loop and `finally { return data }` silently overrides the catch return.** The function uses `async/await` with `fs.promises.readFile` (the async version). The `try/catch` handles both file-not-found and invalid JSON errors. The distractor `readFileSync` would block the Event Loop — the cardinal sin in Node.js. The `finally { return data; }` distractor would override the return value from both try and catch, which is a subtle JavaScript bug."

  - id: 9
    question: |
      **Arrange** the lines to set up a basic Express.js route handler that reads a query parameter and sends a JSON response.
    type: parsons
    lines:
      - "const express = require('express');"
      - "const app = express();"
      - "app.get('/api/greet', (req, res) => {"
      - "    const name = req.query.name || 'World';"
      - "    res.json({ message: `Hello, ${name}!` });"
      - "});"
      - "app.listen(3000);"
    distractors:
      - "app.post('/api/greet', (req, res) => {"
      - "    res.send(name);"
    explanation: "**The correct order is: require → create app → register GET route → read query param → send JSON → listen; `app.post` uses the wrong method and `res.send` omits JSON headers.** `require('express')` imports the framework, `express()` creates the app. `app.get()` registers a GET route handler. Inside the handler, `req.query.name` reads the `?name=` query parameter, and `res.json()` sends a JSON response with correct headers. `app.listen(3000)` starts the server. The `app.post` distractor uses the wrong HTTP method. `res.send(name)` would send plain text without JSON formatting."

  - id: 10
    question: |
      **Arrange** the fragments to build a Promise chain that fetches data, parses JSON, and handles errors.
    type: parsons
    display: inline
    lines:
      - "fetch(url)"
      - ".then(res => res.json())"
      - ".then(data => console.log(data))"
      - ".catch(err => console.error(err))"
    distractors:
      - ".finally(data => process(data))"
      - ".then(res => res.text)"
    explanation: "**The correct chain is fetch → .then(res.json()) → .then(data) → .catch(err); `.finally` receives no data and `res.text` without `()` is a property reference, not a method call.** `fetch(url)` returns a Promise that resolves to a Response object. `.then(res => res.json())` parses the body as JSON (also returns a Promise). `.then(data => ...)` receives the parsed data. `.catch()` handles any error in the chain — network failure, JSON parse error, etc. The `finally` distractor takes no argument (it doesn't receive data). `res.text` without `()` is just a property reference, not a method call."

  - id: 11
    question: |
      **[Technique Selection]** You are building a TikTok-style feed. Match each task to the best array method:
      - Task A: Remove videos the user has already seen
      - Task B: Convert each video object into a `<VideoCard>` component
      - Task C: Calculate the total watch time across all videos
    options:
      - "A: `.map()`, B: `.filter()`, C: `.reduce()`"
      - "A: `.filter()`, B: `.map()`, C: `.reduce()`"
      - "A: `.reduce()`, B: `.map()`, C: `.filter()`"
      - "A: `.filter()`, B: `.reduce()`, C: `.map()`"
    correct_index: 1
    explanation: "**`.filter()` selects, `.map()` transforms, and `.reduce()` aggregates — matching unseen-video removal, component rendering, and total-time calculation respectively.** `.filter()` selects elements matching a condition (unseen videos). `.map()` transforms each element into something new (video → component). `.reduce()` combines all elements into a single value (total time). Knowing *which* method to reach for — not just how each works — is the critical skill."

  - id: 12
    question: |
      **[Interleaving: Async + Types]** A Discord bot fetches a user's message count from an API. The API returns `"42"` (a string). The bot checks `if (count == 42)` to award a badge. What are ALL the problems?
    options:
      - "Only one problem: `==` should be `===`"
      - "Two problems: (1) `==` coerces the string to a number, hiding a type mismatch — use `===`. (2) The comparison will silently 'work' with `==` but break if the badge threshold changes to `0` (since `'' == 0` is `true`)"
      - "No problems — `==` correctly handles string-to-number comparison"
      - "The only problem is that the API should return a number, not a string"
    correct_index: 1
    explanation: "**`==` accidentally coerces the string `\"42\"` to match the number `42`, hiding a type mismatch that `===` would catch — use `Number(count) === 42` to make the conversion explicit.** This question interleaves async concepts (API fetch) with the `===` trap from earlier. The `==` coercion makes the check work *accidentally*, but it hides a fragile assumption. Using `===` with explicit `Number(count) === 42` makes the type conversion intentional and visible."

  - id: 13
    question: |
      **Arrange** the lines to process an array of Spotify tracks: filter explicit songs, extract just the titles, and join them into a comma-separated string.
    type: parsons
    display: inline
    lines:
      - "const playlist = tracks"
      - "    .filter(t => !t.explicit)"
      - "    .map(t => t.title)"
      - "    .join(', ');"
    distractors:
      - "    .reduce(t => !t.explicit)"
      - "    .map(t => t.title())"
    explanation: "**The correct chain is filter (remove explicit) → map (extract title) → join (concatenate); `.reduce()` accumulates rather than selects, and `t.title()` incorrectly calls a property as a function.** `.filter()` removes explicit tracks (the `!` negates — keep non-explicit). `.map()` extracts just the title string from each object. `.join()` concatenates array elements into a single string. The `.reduce()` distractor is wrong because filtering is selection, not accumulation. `t.title()` with parentheses would call `title` as a function — it's a property, not a method."

  - id: 14
    question: "What does calling an `async` function **always** return, even if the function body just returns a plain number like `return 42`?"
    options:
      - "The plain value (`42`) — `async` is only meaningful when the function contains an `await`"
      - "A **Promise** — every `async` function wraps its return value in `Promise.resolve()`. To get `42` out, you must `await` the call or use `.then()`"
      - "An `AsyncIterator` object that must be consumed with `for await...of`"
      - "`undefined` — async functions cannot return values directly"
    correct_index: 1
    explanation: "**Every `async` function always returns a Promise — even `return 42` wraps the value in `Promise.resolve(42)`, so you must `await` the call to get the plain value.** Every `async` function returns a Promise — always. `async function answer() { return 42; }` is equivalent to `function answer() { return Promise.resolve(42); }`. This is why `const result = someAsyncFunction()` without `await` gives you a Promise object, not the value. Forgetting this is one of the most common async bugs."

  - id: 15
    question: |
      A developer needs a `delay(ms)` utility that returns a Promise resolving after `ms` milliseconds. Which implementation is correct?
    options:
      - |
        ```javascript
        function delay(ms) {
            return setTimeout(() => {}, ms);
        }
        ```
      - |
        ```javascript
        async function delay(ms) {
            await ms;
        }
        ```
      - |
        ```javascript
        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
        ```
      - |
        ```javascript
        function delay(ms) {
            Promise.resolve(setTimeout(() => {}, ms));
        }
        ```
    correct_index: 2
    explanation: "**`new Promise(resolve => setTimeout(resolve, ms))` is correct because it resolves when the timer fires — the other options return a timer ID, await a number immediately, or fail to return the Promise.** `new Promise(resolve => ...)` creates a Promise that resolves when `resolve` is called. Passing `resolve` directly to `setTimeout` means: 'call `resolve` after `ms` milliseconds.' Option A returns a numeric timer ID, not a Promise. Option B `await`s the number `ms` directly — awaiting a non-Promise resolves immediately, so there is no delay. Option D calls `Promise.resolve` with a timer ID and doesn't `return` the Promise."

  - id: 16
    question: |
      **Arrange** the lines to filter passing students (grade ≥ 60) and extract just their names.
    type: parsons
    display: inline
    lines:
      - "const passingNames = students"
      - "    .filter(s => s.grade >= 60)"
      - "    .map(s => s.name);"
    distractors:
      - "    .map(s => s.grade >= 60)"
      - "    .filter(s => s.name)"
      - "    .reduce((acc, s) => acc + s.name, '')"
    explanation: "**`.filter()` must come before `.map()` — reversing them produces booleans instead of grade-bearing objects, making subsequent filtering impossible.** `.filter()` comes first — select elements, then `.map()` transforms the surviving elements. Reversing them would fail because `.map(s => s.grade >= 60)` produces booleans, not objects with a `grade` property to filter on. `.filter(s => s.name)` would keep students who have a name — which is all of them, so nothing is filtered. `.reduce` accumulates into a single value, not an array."

  - id: 17
    question: |
      **Arrange** the lines of a corrected `processAll` function. The original bug: `"All done!"` printed before items finished processing because `.forEach()` ignores the `await` inside its callback.
    type: parsons
    lines:
      - "async function processAll(items) {"
      - "    for (const item of items) {"
      - "        await processItem(item);"
      - "    }"
      - "    console.log(\"All done!\");"
      - "}"
    distractors:
      - "    items.forEach(async (item) => {"
      - "    await items;"
    explanation: "**`for...of` with `await` correctly pauses each iteration before the next — `forEach` ignores async callbacks and `await items` makes no sense because an array is not a Promise.** `for...of` is the idiomatic fix for sequential async iteration — `await` inside a `for...of` loop correctly pauses the loop body before moving to the next item. The distractor `items.forEach(async (item) => {` is the original bug: `.forEach()` does not await async callbacks, so all callbacks fire immediately and `\"All done!\"` prints before any of them finish. `await items` makes no sense — `items` is an array, not a Promise."

  - id: 18
    question: |
      A student writes this code for a multiplayer game server and wonders why player moves are "laggy":
      ```javascript
      app.post('/move', (req, res) => {
          // Compute best AI response (CPU-intensive, ~2 seconds)
          const aiMove = computeAIResponse(req.body.board);
          res.json({ move: aiMove });
      });
      ```
      What is wrong, and what would you suggest?
    options:
      - "The `app.post` callback should use `async/await` to make `computeAIResponse` non-blocking"
      - "`computeAIResponse` is synchronous and CPU-intensive — it blocks the Chef for ~2 seconds, freezing ALL other players. Offload to a Worker Thread or compute asynchronously"
      - "The problem is that `res.json()` is slow — use `res.send()` instead for faster responses"
      - "Nothing is wrong — 2 seconds is an acceptable response time for game servers"
    correct_index: 1
    explanation: "**`computeAIResponse` is CPU-intensive and blocks the Event Loop for 2 seconds, freezing all other requests — `async/await` cannot fix CPU-bound work; a Worker Thread is required.** This connects the Event Loop (Restaurant metaphor) to a real scenario. The Chef is stuck computing AI moves for 2 seconds — during which EVERY other player's request sits in the queue. `async/await` alone won't help because the computation is CPU-bound, not I/O-bound. Worker Threads move the heavy computation off the main thread."

  - id: 19
    question: |
      **Arrange** the lines to look up a student by ID from a roster array, handle the case where the student isn't found, and return their data as JSON.
    type: parsons
    lines:
      - "router.get('/students/:id', async (req, res) => {"
      - "    const roster = await fetchRoster();"
      - "    const student = roster.find(s => s.id === Number(req.params.id));"
      - "    if (!student) { return res.json({ error: 'Not found' }); }"
      - "    res.json(student);"
      - "});"
    distractors:
      - "    const student = roster.filter(s => s.id === req.params.id);"
      - "    if (student === null) { return res.json({ error: 'Not found' }); }"
    explanation: "**`.find()` returns `undefined` (not `null`) for a missing student, so `!student` is the correct check — `.filter()` returns an array and `=== null` misses `undefined`.** `.find()` returns the first match or `undefined` (not `null`). The distractor uses `.filter()` which returns an array, not a single object. The second distractor checks `=== null` but `.find()` returns `undefined` when no match is found — checking `!student` correctly handles both `undefined` and `null`. Also note `Number(req.params.id)` converts the string param to match the numeric `id` property."

  - id: 20
    question: |
      **Arrange** the lines to create a JavaScript object, convert it to a JSON string, parse it back, and log a property.
    type: parsons
    lines:
      - "const student = { name: 'Alice', grade: 95 };"
      - "const jsonStr = JSON.stringify(student);"
      - "const parsed = JSON.parse(jsonStr);"
      - "console.log(parsed.name);"
    distractors:
      - "const jsonStr = student.toJSON();"
      - "const parsed = JSON.decode(jsonStr);"
    explanation: "**`JSON.stringify()` serializes and `JSON.parse()` deserializes — there is no `.toJSON()` method on plain objects and no `JSON.decode()` in JavaScript.** `JSON.stringify()` converts an object to a JSON string. `JSON.parse()` converts a JSON string back to an object. There is no `.toJSON()` method on plain objects and no `JSON.decode()` — these are common confusions from other languages."

  - id: 21
    question: |
      What is the value of `x` after this code runs?
      ```javascript
      let x;
      console.log(x);
      console.log(typeof x);
      ```
    options:
      - "`x` is `null` and `typeof x` is `\"null\"`"
      - "`x` is `undefined` and `typeof x` is `\"undefined\"` — a declared variable with no value assigned is `undefined`, not `null`"
      - "The code throws a `ReferenceError` because `x` has no value"
      - "`x` is `0` — JavaScript auto-initializes numeric variables to zero"
    correct_index: 1
    explanation: "**A declared variable with no value assigned is `undefined`, not `null` — `undefined` means 'not yet assigned' while `null` means 'intentionally empty'.** In JavaScript, `undefined` means 'declared but no value assigned.' This is different from Python (which raises `NameError` for uninitialized variables) and from `null` (which means 'intentionally empty'). `typeof undefined` is `\"undefined\"`. Confusingly, `typeof null` is `\"object\"` — a famous JS bug."

  - id: 22
    question: |
      **Arrange** the lines to safely access a nested property, provide a default, and log the result.
    type: parsons
    display: inline
    lines:
      - "const user = { profile: { address: null } };"
      - "const city = user?.profile?.address?.city ?? 'Unknown';"
      - "console.log(city);"
    distractors:
      - "const city = user.profile.address.city || 'Unknown';"
      - "const city = user?.profile?.address?.city != null ? city : 'Unknown';"
    explanation: "**Optional chaining `?.` returns `undefined` instead of throwing when a nested property is null, and `??` correctly defaults only for `null`/`undefined` — `||` would also replace `0` and empty strings.** Optional chaining `?.` safely navigates: when `address` is `null`, `address?.city` returns `undefined` instead of throwing. `??` defaults only for `null`/`undefined`. The `||` distractor would also replace empty strings and `0` with the default. The ternary distractor references `city` before it's defined."
