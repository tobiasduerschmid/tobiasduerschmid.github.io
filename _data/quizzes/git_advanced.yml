title: "Advanced Git Quiz"
description: "Test your knowledge of advanced Git commands, debugging tools, and integration strategies."
active: true
questions:
  - id: 1
    difficulty: intermediate
    question: "You have some uncommitted, incomplete changes in your working directory, but you need to switch to another branch to urgently fix a bug. Which command is best suited to temporarily save your current work without making a messy commit?"
    options:
      - "`git cherry-pick`"
      - "`git bisect`"
      - "`git revert`"
      - "`git stash`"
    correct_index: 3
    option_feedback:
      0: |
        Cherry-pick copies an existing commit onto the current branch; it does not temporarily save
        uncommitted work.
      1: |
        Bisect searches history for the commit that introduced a bug; it is not a work-in-progress
        storage tool.
      2: |
        Revert creates a new commit that undoes an old commit, which is the opposite of keeping
        incomplete work out of history.
    explanation: "**`git stash` is the right tool here because it temporarily shelves incomplete changes so you can switch branches without committing messy work.** `git stash` temporarily shelves your staged and unstaged changes, leaving you with a clean working directory so you can safely switch contexts."

  - id: 2
    difficulty: intermediate
    question: "What happens when you enter a 'Detached HEAD' state in Git?"
    options:
      - "A merge conflict occurs that Git cannot resolve automatically."
      - "The HEAD pointer is attached directly to a specific commit rather than a branch name."
      - "You accidentally delete the main branch of your repository."
      - "The remote server goes offline, and your local repository can no longer push updates."
    correct_index: 1
    option_feedback:
      0: |
        Detached HEAD is a pointer state, not an automatic merge conflict.
      2: |
        Checking out a commit directly does not delete `main`; it only makes `HEAD` stop following a
        branch name.
      3: |
        Detached HEAD is local repository state and says nothing about whether a remote server is
        online.
    explanation: "**Detached HEAD means HEAD points directly to a commit hash rather than a branch, so new commits are not anchored to any branch and can be lost.** Checking out a specific commit hash detaches HEAD. Any new commits made in this state won't update a branch pointer and can easily be lost."

  - id: 3
    difficulty: intermediate
    question: "Which Git command utilizes a binary search through your commit history to help you pinpoint the exact commit that introduced a bug?"
    options:
      - "`git blame`"
      - "`git bisect`"
      - "`git diff`"
      - "`git cherry-pick`"
    correct_index: 1
    option_feedback:
      0: |
        `git blame` shows the last commit touching each line, but it does not run a binary search over
        good and bad revisions.
      2: |
        `git diff` compares two states; it does not manage the iterative good/bad testing process.
      3: |
        Cherry-pick applies one known commit elsewhere; it is not for discovering which commit was bad.
    explanation: "**`git bisect` uses binary search through commit history to efficiently pinpoint the exact commit that introduced a bug.** `git bisect` systematically halves your commit history, asking you to test if the bug is present at each step, to efficiently find the exact commit that broke the code."

  - id: 4
    difficulty: intermediate
    question: "What is the primary purpose of Git Submodules?"
    options:
      - "To break a single, massive file into smaller, trackable pieces to improve performance."
      - "To include an external Git repository as a subdirectory of your project while maintaining its independent history."
      - "To securely store passwords, API keys, and private credentials outside of the main repository."
      - "To automatically squash a long sequence of commits into a single bugfix."
    correct_index: 1
    option_feedback:
      0: |
        Submodules track another repository at a chosen commit; they do not partition large files for
        performance.
      2: |
        A submodule is versioned source history, not a credential vault.
      3: |
        Squashing rewrites or combines commits; submodules preserve an external repository's independent
        history.
    explanation: "**Git Submodules let you embed an external repository as a subdirectory, pinned to a specific commit, while keeping its history independent.** Submodules allow you to nest an independent repository inside your main project, pointing to a specific commit of that external library."

  - id: 5
    difficulty: intermediate
    type: multiple
    question: "In which of the following scenarios would using `git stash` be considered an appropriate and helpful practice? (Select all that apply)"
    options:
      - "You have uncommitted, incomplete changes but need to switch branches urgently to fix a bug."
      - "You want to temporarily clear your working directory so you can safely pull down new remote changes."
      - "You want to permanently delete unneeded code files from your project's history."
      - "You want to permanently apply a completed commit from a completely different branch."
    correct_indices: [0, 1]
    option_feedback:
      0: |
        Stash is designed for this exact temporary pause: keep unfinished edits without creating a
        misleading commit.
      1: |
        Stashing before pulling avoids mixing local unfinished edits with incoming changes.
      2: |
        Stash stores working changes temporarily; it does not remove files from project history.
      3: |
        Applying a completed commit from another branch is cherry-pick territory, not stash.
    explanation: "**`git stash` is appropriate for temporary context switches and clean pulls — it is not for permanent deletion or applying commits from other branches.** `git stash` temporarily shelves your local modifications (both staged and unstaged), leaving you with a clean working directory. This is perfect for quick context switches or pulling updates without committing messy, incomplete work. It is not used for permanent deletion or applying commits (which would be `git cherry-pick`)."

  - id: 6
    difficulty: advanced
    type: multiple
    question: "Which of the following are valid methods or strategies for integrating changes from a feature branch back into the main codebase? (Select all that apply)"
    options:
      - "`git merge`"
      - "`git rebase`"
      - "`git merge --squash`"
      - "`git bisect`"
      - "`git blame`"
    correct_indices: [0, 1, 2]
    option_feedback:
      0: |
        A merge preserves the branch topology while bringing feature changes into the target branch.
      1: |
        Rebasing can integrate work by replaying commits onto a new base, with the tradeoff that commit
        identities change.
      2: |
        Squash merge integrates the final content as one new commit rather than preserving every
        feature-branch commit.
      3: |
        `git bisect` identifies a bad commit; it does not combine branch histories.
      4: |
        `git blame` attributes lines to commits; it does not move changes between branches.
    explanation: "**Merging, rebasing, and squash-merging are the three integration techniques — `git bisect` and `git blame` are inspection tools, not integration strategies.** Merging, rebasing, and squashing (`git merge --squash`) are all techniques used to integrate branch histories together. Note that `git merge --squash` only **stages** the combined changes — you must follow it with `git commit` to actually create the squashed commit. `git bisect` is a debugging tool for finding bugs, and `git blame` is used to see who last modified specific lines of code."

  - id: 7
    difficulty: advanced
    question: "What does the file `.git/HEAD` contain when you are checked out on a branch, compared to when you are in a detached HEAD state?"
    options:
      - "On a branch, it contains an exact commit hash; in detached HEAD, it contains a symbolic reference to a branch."
      - "Both states contain the same exact commit hash, but the detached HEAD state also includes a warning string."
      - "On a branch, it contains a symbolic reference (e.g., `ref: refs/heads/main`); in detached HEAD, it contains a raw commit hash."
      - "Both states contain `ref: refs/heads/main`, but detached HEAD additionally points to the staging area index."
    correct_index: 2
    option_feedback:
      0: |
        On a branch, `.git/HEAD` usually points to the branch ref; the branch ref points to the commit
        hash.
      1: |
        Detached HEAD changes the pointer representation to a raw hash; Git does not store the state as
        the same hash plus warning text.
      3: |
        `HEAD` identifies the current commit or branch ref, while the staging area is stored separately
        as the index.
    explanation: "**On a branch, `.git/HEAD` holds a symbolic reference to the branch; in detached HEAD state it holds a raw commit hash because HEAD is no longer anchored to any branch.** Normally, `.git/HEAD` is a symbolic reference like `ref: refs/heads/main` — a pointer to a branch pointer. When you enter detached HEAD state (e.g., with `git switch --detach <hash>`), HEAD is disconnected from any branch and contains the raw SHA hash of a specific commit directly. Any commits made in this state are not anchored to a branch and can be lost when switching away."

  - id: 8
    difficulty: basic
    question: |
      **Arrange** the commands to safely stash your work, pull remote changes, and restore your stashed work.
    type: parsons
    display: inline
    lines:
      - "git stash"
      - "&&"
      - "git pull"
      - "&&"
      - "git stash pop"
    distractors:
      - "git stash drop"
      - "git reset --hard"
    explanation: "**The correct order is stash → pull → pop: shelve local changes first, then pull onto a clean working directory, then restore — drop discards the stash and reset --hard destroys local work.** `git stash` saves uncommitted changes temporarily, `git pull` fetches and merges remote changes onto a clean working directory, and `git stash pop` re-applies the stashed changes on top. `git stash drop` would *discard* the stash without applying it. `git reset --hard` would destroy all local changes — dangerous!"

  - id: 9
    difficulty: advanced
    question: |
      **Arrange** the commands to stage a forgotten file and fold it into the last commit without changing the commit message.
    type: parsons
    display: inline
    lines:
      - "git add forgotten.py"
      - "&&"
      - "git commit --amend --no-edit"
    distractors:
      - "git reset --hard HEAD~1"
      - "git commit -m 'Add forgotten file'"
    explanation: "**The correct order is add → amend --no-edit: stage the forgotten file, then fold it into the last commit without changing its message — reset --hard destroys the commit and a new commit pollutes history.** `git add forgotten.py` stages the missing file, and `git commit --amend --no-edit` rewrites the previous commit to include it while keeping the original message. `git reset --hard HEAD~1` would *destroy* the previous commit entirely. Creating a brand-new commit (`-m 'Add forgotten file'`) is valid but pollutes history with a fixup commit — amend is cleaner when the previous commit hasn't been pushed."
