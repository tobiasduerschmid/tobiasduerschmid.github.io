title: "Architectural Tactics Quiz"
description: "Apply availability and performance tactics to concrete quality-attribute scenarios."
active: true
questions:
  - id: 1
    difficulty: basic
    type: single
    question: |
      Which statement best distinguishes an architectural tactic from an architectural style?
    options:
      - "A tactic defines the dominant structure of the whole system; a style is a small coding trick."
      - "A style defines the dominant element/connector vocabulary and constraints; a tactic is a reusable move that improves a quality attribute inside a design."
      - "A tactic is always object-oriented; a style is always language-independent."
      - "A style improves performance; a tactic improves only maintainability."
    correct_index: 1
    option_feedback:
      0: |
        The direction is reversed. Styles shape the gross structure; tactics are smaller quality-attribute moves.
      2: |
        Tactics are not tied to object-oriented programming. Heartbeat, caching, and redundancy appear in many paradigms.
      3: |
        Both styles and tactics can affect many qualities. There is no fixed performance-versus-maintainability split.
    explanation: "**Styles are structural constraints at architectural scale; tactics are reusable quality-attribute moves.** A publish-subscribe system can still use heartbeat, redundancy, and caching."

  - id: 2
    difficulty: intermediate
    type: single
    question: |
      A watchdog sends a request every 2 seconds to each worker. Each healthy worker replies immediately. If no reply arrives before timeout, the watchdog restarts the worker. Which tactic is this?
    options:
      - "Heartbeat."
      - "Ping-echo."
      - "Cold spare."
      - "Caching."
    correct_index: 1
    option_feedback:
      0: |
        In heartbeat, the monitored component initiates periodic messages. Here the watchdog initiates the check and expects a reply.
      2: |
        A cold spare is a backup component waiting to be activated after failure. It does not describe the failure-detection message pattern.
      3: |
        Caching stores resources to avoid expensive reacquisition. It is unrelated to liveness checks.
    explanation: "**Ping-echo has the watchdog initiate the check.** The monitored component only needs to answer the ping; missing echoes trigger recovery."

  - id: 3
    difficulty: intermediate
    type: single
    question: |
      Each worker sends an "alive" message to a monitor every 5 seconds. If the monitor stops receiving messages from one worker, it replaces that worker. Which tactic is this, and what is one cost?
    options:
      - "Heartbeat; every monitored component needs heartbeat logic and the messages consume resources."
      - "Ping-echo; the watchdog does all the work and workers stay passive."
      - "Caching; workers reuse stored liveness messages."
      - "Active redundancy; all workers must be exact replicas."
    correct_index: 0
    option_feedback:
      1: |
        Ping-echo is watchdog-initiated. The stem says each worker initiates the periodic message.
      2: |
        Liveness messages are not cached resources. Reusing an old heartbeat would be actively dangerous.
      3: |
        Replacement may use redundancy, but the described detection tactic is heartbeat.
    explanation: "**Heartbeat shifts the periodic message to the monitored component.** It can use fewer messages than ping-echo, but it complicates each monitored component and still consumes network and processing resources."

  - id: 4
    difficulty: advanced
    type: multiple
    question: |
      A team is choosing between ping-echo and heartbeat for 10,000 IoT devices on a low-bandwidth network. Which trade-offs should they consider? Select all that apply.
    options:
      - "Ping-echo usually sends more messages because it uses a request and response."
      - "Heartbeat requires each device to implement periodic liveness messaging."
      - "Heartbeat eliminates the need for timeouts."
      - "Both tactics can reduce available bandwidth and processing capacity."
      - "Ping-echo is a performance tactic, while heartbeat is an availability tactic."
    correct_indices: [0, 1, 3]
    option_feedback:
      0: |
        Ping-echo's request-response pattern can matter a lot at 10,000 devices.
      1: |
        Heartbeat saves the ping side of the exchange, but the device firmware now owns periodic liveness behavior.
      2: |
        Heartbeat still needs timeouts. The monitor infers failure from silence only after a threshold.
      3: |
        Monitoring is not free. Even tiny liveness messages add up at scale.
      4: |
        Both are availability tactics because both detect failed components. Both can inhibit performance as a cost.
    explanation: "**The useful comparison is who sends messages, how many messages exist, and where complexity lives.** Both tactics improve availability by detecting faults, and both charge a performance cost for monitoring."

  - id: 5
    difficulty: intermediate
    type: single
    question: |
      A checkout service keeps a standby payment worker stopped until the active worker fails. On failure, the standby is started and warmed up. Which redundancy tactic is this?
    options:
      - "Active redundancy."
      - "Cold spare."
      - "Ping-echo."
      - "Content-based routing."
    correct_index: 1
    option_feedback:
      0: |
        Active redundancy keeps multiple replicas running at the same time. The stem says the standby is stopped until failure.
      2: |
        Ping-echo detects liveness. It does not describe whether a backup is already running.
      3: |
        Content-based routing is a publish-subscribe routing variant, not a redundancy tactic.
    explanation: "**Cold spare saves steady-state resources but increases recovery time.** The system must start, warm, and synchronize the spare after detecting failure."

  - id: 6
    difficulty: intermediate
    type: single
    question: |
      A product catalog receives repeated requests for the same item. A cache serves 92% of repeat requests and keeps p95 latency below 100 ms. Which quality attribute does the tactic primarily improve, and what risk did it introduce?
    options:
      - "Availability; it introduces dependency cycles."
      - "Performance; it introduces stale-data and invalidation risk."
      - "Testability; it introduces lower network bandwidth."
      - "Portability; it introduces faster CPU scheduling."
    correct_index: 1
    option_feedback:
      0: |
        Caching can sometimes help degraded availability, but the scenario's measure is latency. Dependency cycles are not the cache-specific risk.
      2: |
        Caching may affect tests, but the scenario is explicitly about latency. Lower bandwidth is usually a benefit, not the central risk.
      3: |
        Portability is about moving across environments. CPU scheduling is not the relevant cache trade-off.
    explanation: "**Caching primarily improves performance by avoiding expensive reacquisition.** The architectural cost is deciding when cached data is fresh enough and how invalidation works."

  - id: 7
    difficulty: advanced
    type: single
    question: |
      A team says, "We should add caching." What is the best architectural response?
    options:
      - "Approve it immediately, because caching is always a performance win."
      - "Ask for the quality scenario: what repeated resource, under what load, what hit rate or latency target, and what stale-data tolerance?"
      - "Reject it immediately, because caching always violates correctness."
      - "Convert the system to pipe-and-filter first."
    correct_index: 1
    option_feedback:
      0: |
        Caching can slow systems down or break semantics if hit rates are low or invalidation is hard.
      2: |
        Caching is not inherently wrong. It is wrong when the consistency cost exceeds the performance benefit for the scenario.
      3: |
        Pipe-and-filter is a style choice and is unrelated to whether a repeated resource should be cached.
    explanation: "**Tactics should be tied to scenarios.** A cache is justified when the measured performance gain is worth the memory, invalidation, and stale-data costs."

  - id: 8
    difficulty: advanced
    type: multiple
    question: |
      A quality scenario says: "If one perception worker crashes while the robot is operating, the system detects the crash within 2 seconds and starts a replacement worker within 5 seconds." Which architectural elements or tactics are likely relevant? Select all that apply.
    options:
      - "Heartbeat or ping-echo to detect the crash."
      - "Redundancy or process supervision to provide the replacement."
      - "A cache of old heartbeat messages so the monitor can keep receiving liveness."
      - "Observability so operators can verify detection and recovery timing."
      - "Layer bridging so upper modules skip lower modules."
    correct_indices: [0, 1, 3]
    option_feedback:
      0: |
        The scenario's first half is fault detection within 2 seconds, exactly what heartbeat or ping-echo addresses.
      1: |
        Starting a replacement worker requires recovery capacity, commonly redundancy or supervision.
      2: |
        Old heartbeat messages would hide failure. Liveness must be current.
      3: |
        If the team cannot observe detection and recovery times, it cannot verify the quality scenario.
      4: |
        Layer bridging is a layered-style performance trade-off, not a recovery tactic.
    explanation: "**Availability tactics often compose.** Detection, recovery capacity, and observability all have to work together for the quality scenario to be satisfied."
