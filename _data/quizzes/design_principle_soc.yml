title: "Separation of Concerns Quiz"
description: "Test your ability to identify, apply, and evaluate Separation of Concerns in real code."
questions:
  - id: 1
    type: single
    question: |
      Who coined the term "separation of concerns", and in what context was it first introduced?
    options:
      - "Robert C. Martin, when he proposed the SOLID principles in the early 2000s"
      - "Edsger W. Dijkstra, in his 1974 note 'On the Role of Scientific Thought' (EWD 447), about how intelligent thinking works"
      - "David Parnas, in his 1972 paper on criteria for decomposing systems into modules"
      - "Erich Gamma et al., in the 1994 'Design Patterns' book"
    correct_index: 1
    explanation: "Dijkstra coined the phrase in EWD 447 (1974), describing it as 'the only available technique for effective ordering of one's thoughts'. He framed SoC first as a *thinking* technique, and the software-engineering usage followed. Parnas's 1972 paper is about **information hiding** — a related but distinct principle that tells you *how* to encapsulate one of those concerns."

  - id: 2
    type: single
    question: |
      Look at this Python snippet. Which Separation-of-Concerns violation is it guilty of?

      ```python
      def render_user_profile(user_id):
          conn = sqlite3.connect("users.db")
          row = conn.execute("SELECT name, email FROM users WHERE id=?", (user_id,)).fetchone()
          print(f"<h1>{row[0]}</h1><p>{row[1]}</p>")
      ```
    options:
      - "It violates the Open/Closed Principle because you cannot extend it"
      - "It mixes data access (SQL), domain lookup, and presentation (HTML rendering) into one function"
      - "It violates the Liskov Substitution Principle"
      - "It has no SoC violation — the function does exactly one thing: 'render a user profile'"
    correct_index: 1
    explanation: "The function name sounds like one concern, but the body mixes **three**: connecting to a database, issuing a SQL query, and emitting HTML. If the database schema changes, this code breaks. If the HTML changes, this code breaks. A well-separated version would have a `user_service` for data and a `renderer` for presentation, each with its own interface."

  - id: 3
    type: single
    question: |
      In the Monopoly example from the lecture, the **Application Layer** (game logic) exposes three kinds of interaction to the **Presentation Layer**. Which of the following is NOT one of them?
    options:
      - "Getters, e.g., getCurrentBalance()"
      - "Commands, e.g., buyProperty(name, user)"
      - "Callbacks for state changes, e.g., onBalanceChanged(...)"
      - "Direct calls into the UI's render function, e.g., updateUI(balance)"
    correct_index: 3
    explanation: "The whole point of the separation is that the Application Layer **doesn't know a UI exists**. Calling into the UI directly would destroy the separation — you'd no longer be able to run the same game engine in a terminal, on mobile, and in a 3D live-stream simultaneously. Instead, the Application Layer exposes getters, commands, and callbacks; the Presentation Layer does the rendering itself."

  - id: 4
    type: single
    question: |
      Why is **logging** almost always considered a *crosscutting concern*?
    options:
      - "Because logging is slow, and it crosses the performance budget of most modules"
      - "Because logging code naturally appears in many different modules, which causes tangling (mixed with business code) and scattering (duplicated across modules)"
      - "Because logging requires network access, which cuts across the application boundary"
      - "Because logs must be written in a specific format that crosses language boundaries"
    correct_index: 1
    explanation: "A crosscutting concern is one that **does not fit** within a single module in the main decomposition of the system. Logging is the textbook example: every service, every handler, every data layer wants to log something. If you put logging calls directly inside each of these, you get **tangling** (business code mixed with logging) and **scattering** (the same pattern copy-pasted everywhere). AOP, decorators, and middleware are common mechanisms to pull logging out into one place *(Marin et al., 2009)*."

  - id: 5
    type: single
    question: |
      A teammate argues: *"We don't need a Presentation/Application separation. We only have one UI, and we never plan to have another. Let's just put the rules inside the buttons."*
      When is this argument **most reasonable**?
    options:
      - "Always — YAGNI (You Aren't Gonna Need It) forbids layering"
      - "For a true throwaway script or prototype that will be read once and deleted, and where the 'rules' are trivial"
      - "Whenever the business logic is simpler than 100 lines of code"
      - "Never — separation is always worth the cost"
    correct_index: 1
    explanation: "SoC is a *judgment call*, not a law. For a true throwaway — a 30-line automation script, a one-off data cleanup — the cost of a full layered architecture exceeds the benefit, and 'rules inside buttons' is fine. But the argument fails as soon as the code outlives its expected lifetime, multiple people touch it, or a second UI/API surface is requested. In practice, 'we'll never need another UI' is one of the most commonly falsified predictions in software engineering."

  - id: 6
    type: single
    question: |
      The iOS anti-pattern known as **Massive View Controller** (MVC where controllers balloon into 2,000-line monsters that handle networking, parsing, caching, validation, navigation, and view layout) is best described as:
    options:
      - "A violation of the Liskov Substitution Principle because the controller cannot be substituted for its parent class"
      - "A violation of Separation of Concerns: multiple independent concerns have been collapsed into a single module"
      - "A correct implementation of MVC that simply needs more RAM"
      - "A violation of Information Hiding because controller fields are public"
    correct_index: 1
    explanation: "Massive View Controller is the canonical mobile-development SoC failure *(Dobrean & Dioşan, 2019)*. MVC is supposed to *separate* Model, View, and Controller, but when developers treat 'Controller' as a dumping ground for everything not-obviously-Model-or-View, the Controller re-absorbs all the concerns MVC was designed to split apart. The fix is to extract Coordinating Controllers, view-models, and services — each handling a single concern."

  - id: 7
    type: single
    question: |
      Which statement best captures the **difference** between Separation of Concerns and Information Hiding?
    options:
      - "They are synonyms; both are slogans for 'write modular code'"
      - "SoC decides *which* aspects should live in separate modules; Information Hiding decides *how* those modules protect their internal decisions behind stable interfaces"
      - "Information Hiding is a 1972 principle and SoC is a 2000s principle; Information Hiding has been deprecated"
      - "SoC applies to code, Information Hiding applies only to data"
    correct_index: 1
    explanation: "They are complementary, not the same. SoC is about **identifying and separating** distinct aspects (data access vs. rules vs. UI). Information Hiding is about **protecting** each separated decision: the module's interface should only expose what is unlikely to change, and its secret (storage format, algorithm, library choice) stays inside. SoC without Information Hiding gives you separate modules that still break each other when details change."

  - id: 8
    type: single
    question: |
      You are designing a new service. Which decomposition shows the BEST Separation of Concerns?
    options:
      - "Module A: 'handles everything about users including login, profile, orders, and reports'"
      - "Module A: 'user authentication'; Module B: 'user profile'; Module C: 'order processing'; Module D: 'reporting' — each with narrow interfaces between them"
      - "One module per file, where each file contains exactly one function, no matter how trivial"
      - "Split by file type: all `.py` files in one module, all `.js` files in another, all `.sql` in a third"
    correct_index: 1
    explanation: "Option B separates concerns along axes that plausibly change for different reasons (security rules, UX, business rules, analytics) — each with a narrow interface to the others. Option A is the God Module. Option C is hyper-decomposition that destroys cohesion. Option D splits on the wrong axis (programming language has nothing to do with the domain concern)."

  - id: 9
    type: single
    question: |
      Why might splitting an internal helper function into its own class *reduce* rather than increase the quality of a system?
    options:
      - "Because smaller classes are always harder to optimize"
      - "Because if the 'two concerns' always change together for the same reason, the split is artificial — now every change has to edit two files instead of one"
      - "Because Python does not support inheritance well"
      - "Because SRP explicitly forbids extracting classes"
    correct_index: 1
    explanation: "A split is only valuable if the separated pieces change **independently**, for different reasons, on different timelines. If they always change together, the boundary is a fiction that doubles maintenance cost with no benefit. This is the 'premature abstraction' trap — SoC is a *direction*, not a target score on a file-count metric."

  - id: 10
    type: single
    question: |
      Which benefit of SoC most directly explains why a team of five developers can work in parallel on one system?
    options:
      - "Testability — they can each write unit tests"
      - "Local reasoning combined with narrow interfaces — each developer can modify their own concern without needing to understand or fear changes in others"
      - "Performance — separated code runs faster"
      - "Security — developers cannot see each other's code"
    correct_index: 1
    explanation: "Parallel work is really a consequence of *local reasoning* plus *narrow interfaces*. When concerns are separated, Alice working on the UI doesn't need to understand Bob's database optimizer, because their code only meets at a small, well-defined contract. This is SoC's biggest practical payoff in teams — and it's why **Conway's Law** says team structure and system architecture tend to mirror each other."

  - id: 11
    type: single
    question: |
      You spot this code in a React component:

      ```jsx
      function Dashboard() {
        const [data, setData] = useState([]);
        useEffect(() => {
          fetch("/api/data")
            .then(r => r.json())
            .then(raw => {
              // business rule: only show rows with score > 80
              const filtered = raw.filter(x => x.score > 80);
              setData(filtered);
            });
        }, []);
        return <ul>{data.map(d => <li>{d.name}</li>)}</ul>;
      }
      ```

      What is the **most important** SoC violation here?
    options:
      - "The business rule 'score > 80' is buried inside a UI component, tangling a domain rule into the presentation layer"
      - "The component uses useState and useEffect, which should be separate"
      - "The fetch call should be a POST, not a GET"
      - "The <ul> tag should be a <div>"
    correct_index: 0
    explanation: "The dangerous violation is the hidden **business rule**. If marketing asks 'what counts as a top-scoring row?', no one will look inside a React component to find the answer. The rule should live in a domain service (or an API endpoint) that both the UI and any other consumer share. Otherwise, six months from now two different components will disagree on what 'top-scoring' means."

  - id: 12
    type: single
    question: |
      Which is the best definition of a **concern** in the phrase 'Separation of Concerns'?
    options:
      - "A bug report filed by a customer"
      - "Any single aspect of a system that a developer might want to reason about, design, or change independently"
      - "A feature that is behind a feature flag"
      - "A class with private fields"
    correct_index: 1
    explanation: "A concern is a *unit of reasoning and change*: rendering, validation, authorization, caching, logging, the billing rule, the retry policy. SoC asks you to give each such aspect its own place in the code, so that thinking about, changing, or testing any one of them does not require entangling with the others."
