title: "Generative AI in Software Engineering Quiz"
description: "Apply GenAI judgment across Bloom levels, with extra emphasis on analyzing, evaluating, and creating safe AI-assisted engineering workflows."
active: true
questions:
  - id: 1
    difficulty: intermediate
    type: single
    question: |
      Compilers (1960s) delivered a 10x productivity gain. Current research estimates GenAI delivers 21%–50%. What is the most accurate explanation for the gap?
    options:
      - "Compilers ran faster than today's LLMs."
      - "Compilers automated *accidental* complexity; GenAI doesn't yet touch *essential* complexity."
      - "GenAI is being measured wrong — once measured correctly it also delivers 10x."
      - "Compilers and GenAI have the same productivity effect; the difference is purely marketing."
    correct_index: 1
    option_feedback:
      0: |
        Compilers were vastly slower than LLMs (compilation took hours on 1960s hardware). Execution speed of the *tool* is not what produces engineering productivity. The compiler's leverage came from what it automated, not how fast it ran.
      2: |
        The 21–50% range is the consistent finding across multiple controlled studies — not a measurement artifact. Treating it as undercounted overstates current AI capability and underestimates the work that essential complexity still demands.
      3: |
        Compilers eliminated whole categories of repetitive translation work that previously consumed half a developer's day. GenAI's reduction is real but smaller in scope. The asymmetry is well-documented, not marketing.
    explanation: "**Compilers automated *accidental* complexity (translating high-level intent into machine instructions) — a near-pure mechanical task. GenAI helps with parts of that but leaves *essential* complexity (understanding requirements, choosing data structures, navigating trade-offs, integrating with messy real systems) largely intact.** This is why productivity gains plateau where genuine engineering judgment is needed, and why systems-thinking and requirements skills remain decisive even with AI assistance."

  - id: 2
    difficulty: intermediate
    type: single
    question: |
      A developer says "Copilot wrote the whole feature in 5 minutes — I'm so much more productive!" Two days later they're still debugging it and have shipped a security vulnerability. Which trap have they fallen into?
    options:
      - "Cognitive offloading — they let the AI think for them."
      - "The *illusion of AI productivity*: generation isn't shipping."
      - "Hallucination — the AI invented APIs that didn't exist."
      - "Premature optimization — the AI optimized too early."
    correct_index: 1
    option_feedback:
      0: |
        Cognitive offloading is a *separate* trap — it concerns *skill formation*, not the productivity illusion specifically. The pattern described is about misattributing speed to productivity, then paying the debt downstream.
      2: |
        Hallucination is one *cause* of bugs in AI output, but the framing of the question is about how 'fast' the generation felt vs how slow the end-to-end work was. The illusion is a measurement error, not a single defect type.
      3: |
        Premature optimization is unrelated — the issue isn't over-engineering, it's that the generated code is subtly broken and the bug-tail is long.
    explanation: "**The illusion of AI productivity is the gap between *generation* (fast, satisfying, visible) and *end-to-end shipping* (debug, fix, verify, secure — slow and invisible).** Measure productivity in features shipped per week with acceptable defect and security rates, not in characters generated per minute. Controlled studies report that developers *feel* more productive with AI even when measured throughput is flat or lower."

  - id: 3
    difficulty: intermediate
    type: single
    question: |
      Two computer-science students use a chatbot to learn linked lists. Student A pastes the assignment prompt and copies the answer. Student B asks the chatbot to explain why a tail pointer matters, then implements it themselves. Six months later, which is most likely to struggle on the data-structures exam, and why?
    options:
      - "Student B — they spent more time on the problem and got tired."
      - "Student A — paste-and-copy *offloads* the effortful learning."
      - "Neither — both will perform equally on the exam."
      - "Student A — they didn't pay for the chatbot subscription."
    correct_index: 1
    option_feedback:
      0: |
        Time-on-task with active engagement is what builds long-term memory. Student B's extra time was *productive struggle*, the strongest predictor of durable learning.
      2: |
        Equal performance would mean cognitive engagement has no effect on learning — which contradicts decades of cognitive-science research (effortful retrieval, generation effect, desirable difficulties).
      3: |
        Subscription tier is irrelevant. The difference is *how* the AI was used, not which version answered.
    explanation: "**Cognitive offloading (paste-prompt, copy-answer) bypasses the effortful retrieval that builds durable knowledge — the same reason students who only re-read notes fail compared to those who self-test. Conceptual inquiry (asking the AI to explain, compare, justify) preserves cognitive engagement and exercises the continual-learning skill humans retain over AI.** For junior engineers especially, the way GenAI is used predicts whether it accelerates or kneecaps skill formation."

  - id: 4
    difficulty: intermediate
    type: multiple
    question: |
      Which of these are valid items in the **Supervisor Mentality** for working with GenAI? Select all that apply.
    options:
      - "Always review AI-generated code before committing."
      - "Never commit AI-generated code you cannot comfortably explain to a colleague."
      - "Assume the AI's output is subtly buggy or insecure until proven otherwise."
      - "Trust AI more than human teammates because it has read more code."
      - "Treat the AI as a knowledgeable but unreliable intern."
    correct_indices: [0, 1, 2, 4]
    option_feedback:
      0: |
        AI output looks polished even when wrong. Every block needs review at the same scrutiny a junior teammate's code would receive — same defect rate, more confident phrasing.
      1: |
        The **explainability rule** prevents the team from accumulating code nobody understands. When the bug appears at 3 AM, you'll need to debug it — being able to explain it is a precondition for being able to fix it.
      2: |
        Roughly 40% of Copilot suggestions in *security-sensitive scenarios* have been found to contain vulnerabilities, and AI fluently produces plausible-but-wrong patterns it pattern-matched from training data. Defaulting to "subtly broken until proven otherwise" changes review quality immediately.
      3: |
        Reading more code does not produce better judgment. AI lacks domain context, system-specific constraints, and accountability — all of which experienced human teammates bring. Trusting it more is the inversion of the right calibration.
      4: |
        Capable but unreliable is the right mental model: useful for first drafts, dangerous when given final authority. The same trust calibration you'd extend to a smart intern: review, verify, don't auto-merge.
    explanation: "**The Supervisor Mentality is the antidote to vibe coding. It treats GenAI as a capable but unreliable contributor — every output gets the same scrutiny as an unfamiliar teammate's PR, and nothing ships that the human can't explain or own.** This calibration is what separates engineers who scale up safely with AI from those who accumulate bugs and security debt invisibly until production catches fire."

  - id: 5
    difficulty: intermediate
    type: single
    question: |
      Your team adopts **Test-Driven Generation**. Walk through the correct sequence.
    options:
      - "Generate the implementation, then generate tests that pass it."
      - "AI drafts tests, human reviews as spec, AI implements, loop on failures."
      - "Write tests yourself, then ask the AI to write code that defeats them."
      - "Generate everything in one prompt, then run it."
    correct_index: 1
    option_feedback:
      0: |
        Reversing the order destroys the entire benefit: tests written *for* the existing implementation just rubber-stamp it instead of constraining it. This is the textbook TDD anti-pattern, AI version.
      2: |
        Tests that 'defeat' code is adversarial security testing, not TDG. The point of TDG is to use generated tests as a *specification* the implementation must satisfy.
      3: |
        Single-shot prompts give the AI no feedback loop to correct itself, and the developer no opportunity to verify the tests before committing to them as the spec. Throughput is fast, defect rate is high.
    explanation: "**Test-Driven Generation: (1) AI generates tests from the description → (2) human reviews tests as the specification → (3) AI generates implementation → (4) remediation loop feeds failing test output back to the AI.** The review step in (2) is what gives the workflow its quality: the tests are the contract, and the human's job is to make sure the contract is right *before* the AI is asked to satisfy it. Skipping review means the implementation passes broken tests."

  - id: 6
    difficulty: advanced
    type: single
    question: |
      Two teams adopt the same AI coding assistant. Team A's codebase is a tightly coupled monolith ("spaghetti"); Team B's is a set of well-bounded microservices with clean interfaces. Both apply AI to similar tasks. Why does Team B see substantially larger productivity gains?
    options:
      - "Team B uses better prompt engineering by coincidence."
      - "Loose coupling *amplifies* AI benefits — bounded modules fit the context window."
      - "Microservices use newer programming languages that AI handles better."
      - "Team A is staffed with weaker engineers."
    correct_index: 1
    option_feedback:
      0: |
        Same assistant, similar tasks — the structural difference between codebases is the variable, not prompt skill. Even strong prompt engineering on a spaghetti codebase will run into context-window limits and hidden coupling.
      2: |
        Microservices can be written in any language; many are in the same languages as monoliths. The benefit comes from *modularity*, not language choice.
      3: |
        Attributing the difference to staff skill ignores the architectural variable explicitly described. The same engineers in either codebase would see the same architecture-mediated effect.
    explanation: "**Information Hiding and modularity *limit the context window* the AI needs to process — bounded interfaces mean the AI sees only the relevant slice, hidden internals don't leak unexpected coupling, and generated code can be reasoned about locally. In spaghetti codebases the AI is asked to operate in a context it cannot fully see, and its plausible-looking output silently breaks distant code.** Good architecture is now a force multiplier for AI productivity, not just a maintainability concern — sloppy architecture pays a compounding tax."

  - id: 7
    difficulty: basic
    type: single
    question: |
      An LLM confidently produces this line in a Python script: `import datafetcher_v2 as dfv2`. The library does not exist. What is this called, and why does it happen?
    options:
      - "A compiler error — the IDE will catch it."
      - "A *hallucination*: token prediction can't verify an API exists."
      - "An old version reference — the library used to exist."
      - "A network failure — the model couldn't reach pypi."
    correct_index: 1
    option_feedback:
      0: |
        Python is interpreted; the missing import is caught at run time, not by an IDE that does only static checks. Calling this a 'compiler error' frames the wrong tool as the safety net.
      2: |
        Some hallucinations *are* references to deleted libraries, but most are fabricated names that never existed. The mechanism is the same — token prediction without verification — but framing it as 'old version' understates the breadth of the problem.
      3: |
        The model has no network connection during inference. Hallucination is a property of the model's generation process, not of any external lookup.
    explanation: "**Hallucinations come from how LLMs work: they predict the *most likely next token* given prior context, without any grounding in real-world facts. A plausible-looking import like `datafetcher_v2` is *linguistically* plausible — but linguistic plausibility is not factual existence.** This is the 'statistical parrot' framing: the model produces sequences that look like correct code without any knowledge of whether the code is correct. Tools like retrieval-augmented generation and IDE integrations help by grounding suggestions in real codebases, but the underlying risk remains."

  - id: 8
    difficulty: basic
    type: single
    question: |
      Two pair-programming modes with AI: in the **Driver** mode, the human writes the code; in the **Navigator** mode, the human directs the AI to write blocks. Which role assignment is correct?
    options:
      - "Driver = human writes, AI critiques; Navigator = human directs AI to write blocks."
      - "Driver = AI writes everything; Navigator = human reviews after."
      - "Driver = human types prompts; Navigator = AI handles all decisions."
      - "Driver and Navigator are just informal terms — they don't change the workflow."
    correct_index: 0
    option_feedback:
      1: |
        Letting the AI fully drive while a human reviews after is the **vibe-coding** anti-pattern the SEBook explicitly warns against. The human's role in both roles is to retain understanding and accountability for every line shipped.
      2: |
        AI handling all decisions removes engineering judgment from the loop and abandons the explainability rule. Pair programming with AI is collaborative, not delegated.
      3: |
        The roles are deliberate and well-defined — they describe different distributions of writing vs reviewing work between human and AI, each appropriate in different situations.
    explanation: "**Both AI-pair-programming roles keep the human in active intellectual control. Driver: human writes, AI critiques (good for security review, performance ideas, edge-case enumeration). Navigator: AI writes under human direction, and the human verifies every line.** The crucial invariant in both: the human retains explainability and ownership of the result. The roles change *who types*, not who *understands*."

  - id: 9
    difficulty: advanced
    type: single
    question: |
      Industry analysis has reported that codebases using AI coding assistants had a noticeable rise in **code complexity** and **static-analysis warnings** relative to pre-AI baselines. Assume the finding generalizes. What is the architectural risk?
    options:
      - "AI suggestions are additive — local fixes accumulate as *technical debt*."
      - "Developers are writing more code overall, so complexity grows proportionally with the codebase size."
      - "AI introduces new programming paradigms that legacy static analyzers haven't been updated to handle."
      - "The increases reflect richer test coverage, which static analyzers misclassify as warnings."
    correct_index: 0
    option_feedback:
      1: |
        Proportional growth would not produce *per-file* or *per-function* complexity rises — the metrics cited normalize for size. The rise is in complexity-per-unit-code, not just total lines.
      2: |
        Mainstream static analyzers handle the same languages and constructs whether code is human- or AI-written. The "new paradigms" framing tries to attribute the gap to tool blind spots; the gap is in the code, not the analyzer.
      3: |
        Tests are typically excluded or analyzed separately. Even if included, the complexity-per-function metric doesn't credit tests as warnings; the increase is in production code structure.
    explanation: "**AI assistants tend to produce *additive* solutions — adding code that solves the local problem rather than refactoring to fit the system's idioms or remove duplication. Without an explicit refactor step in the workflow, complexity compounds and static-analysis warnings climb.** The fix is process-level: pair AI generation with a deliberate refactor pass, enforce complexity limits in CI, and reject AI-suggested duplication that human review would have rejected."

  - id: 10
    difficulty: intermediate
    type: single
    question: |
      A senior architect predicts: "The future belongs to engineers who can **orchestrate AI agents**, not just write code." What underlying skills does that prediction imply will become more valuable, and which less?
    options:
      - "More valuable: typing speed and language-syntax memorization. Less valuable: requirements engineering and architecture."
      - "More valuable: requirements, architecture, systems thinking, review. Less valuable: rote syntax and boilerplate."
      - "All skills will become equally valued."
      - "No skill change is needed — AI will replace engineers entirely."
    correct_index: 1
    option_feedback:
      0: |
        Typing speed and syntax memorization are exactly the work AI is best at automating. Predicting they will become *more* valuable inverts the trend.
      2: |
        Equal valuation would mean the skill mix is unchanged, which contradicts every workflow analysis from the past three years. The shift is real and one-directional toward specification, judgment, and verification.
      3: |
        Studies show AI is best as a force multiplier, weakest at autonomous end-to-end engineering. Domain knowledge, real systems thinking, accountability, and the ability to translate ambiguity into structure remain irreplaceable.
    explanation: "**The skill shift is from *producing* code to *specifying and verifying* it. Requirements engineering (INVEST stories, acceptance criteria), systems thinking (where the boundaries are, what fails), architecture (modular interfaces the AI can reason inside), security review, and prompt/context engineering all become more decisive. Rote syntax and boilerplate become commoditized.** The engineer who raises the *ceiling* of what they can build is the one who treats AI as leverage over engineering judgment — not as a substitute for it."

  - id: 11
    difficulty: advanced
    type: single
    question: |
      An AI coding agent reads a blog post while debugging your build and then asks permission to run a shell command you do not recognize. What is the most responsible response?
    options:
      - "Approve it — the agent found the command while researching the bug."
      - "Treat it as possible *prompt injection*: refuse if you can't explain it."
      - "Disable all AI tool use until you can audit the entire conversation."
      - "Run it only if the agent says it is confident in its source."
    correct_index: 1
    option_feedback:
      0: |
        Finding a command on the web is not evidence that it is safe. A malicious page can plant instructions for agents to copy, so the human must inspect the command and source before approving it.
      2: |
        The lesson is not "never use agents." The lesson is that tool access raises the supervision bar: inspect commands, bound permissions, and keep the human accountable.
      3: |
        Model confidence is not a security control. The right check is whether the human understands the command's effects and whether the command is necessary for the task.
    explanation: "**Coding agents are powerful because they can read files and run tools, but that also exposes them to prompt injection and unsafe shell suggestions.** A responsible supervisor verifies the command, source, and task fit before allowing execution. If you cannot explain the command, you are not ready to approve it."

  - id: 12
    difficulty: basic
    type: single
    question: |
      Why do project-level skill files or rule files improve AI coding-agent results?
    options:
      - "They turn the LLM into a deterministic compiler."
      - "They persist project conventions so prompts needn't repeat them."
      - "They remove the need for code review."
      - "They let the agent ignore the repository and rely only on the rules."
    correct_index: 1
    option_feedback:
      0: |
        Skill files improve context, but they do not make an unsound, non-deterministic model sound or deterministic.
      2: |
        Rule files reduce omissions; they do not prove the output is correct. The human still reviews, tests, and owns the resulting code.
      3: |
        Rules are useful only when combined with repository context. They tell the agent how to work here; they do not replace reading the relevant files.
    explanation: "**Skill files encode durable project knowledge: accessibility rules, storage inventories, dark-mode requirements, testing expectations, naming conventions, and similar guardrails.** They improve the default behavior of the agent, but they are still instructions to a fallible system, not proof that the system complied."

  - id: 13
    difficulty: advanced
    type: single
    question: |
      You want an agent to implement a stateful feature in an unfamiliar codebase. Which workflow best applies the lecture's advice?
    options:
      - "Ask for the whole feature in one prompt and review only the running UI."
      - "Have the agent inspect files, propose a plan, then approve one small step at a time."
      - "Tell the agent to use maximum thinking mode and skip tests because planning is enough."
      - "Let the agent choose the architecture because it has read more code than you."
    correct_index: 1
    option_feedback:
      0: |
        A running UI checks the happy path, not the design, state transitions, security, or maintainability. Large one-shot prompts also make it harder to locate where the agent made a bad assumption.
      2: |
        Planning helps, but it does not replace executable verification. Stateful code needs tests because the hard part is often the interaction among cases.
      3: |
        The agent can propose architecture, but the human must judge whether it fits the domain, existing system, and long-term maintenance constraints.
    explanation: "**For complex work, the professional loop is plan, question, approve a small task, implement, test, review, and refactor.** This keeps the human in control of architecture and lets mistakes surface while they are still small."

  - id: 14
    difficulty: intermediate
    type: single
    question: |
      Why is "read the entire repository before coding" often a bad instruction for an AI agent?
    options:
      - "LLMs cannot reliably process that many text files at once."
      - "Finite context and uneven attention let irrelevant files crowd out real constraints."
      - "Reading too much always makes the agent slower than asking targeted questions."
      - "It prevents the agent from later editing those same files."
    correct_index: 1
    option_feedback:
      0: |
        Agents can read text files. The issue is not whether text can be read, but whether the right text stays salient inside the model's limited context.
      2: |
        Speed is not the core problem. A slower prompt can still be worthwhile if it provides the relevant context; the failure is low-signal context, not context itself.
      3: |
        Reading files does not prevent editing. It can simply crowd the context window with details unrelated to the task.
    explanation: "**Context engineering is selective.** Give the agent the smallest relevant slice: the target files, nearby interfaces, tests, conventions, and constraints. Dumping everything into context increases search cost and 'lost in the middle' failures."

  - id: 15
    difficulty: intermediate
    type: multiple
    question: |
      Which tasks are especially well-suited for AI assistance once the human already understands the domain? Select all that apply.
    options:
      - "Drafting boilerplate or scaffolding that follows a familiar pattern."
      - "Making an unreviewed architecture decision for a safety-critical system."
      - "Explaining an unfamiliar stack trace or API behavior."
      - "Generating a rapid prototype so a user can react to a concrete version."
      - "Implementing a data structure the student has not learned and submitting it without reading the code."
    correct_indices: [0, 2, 3]
    option_feedback:
      0: |
        Boilerplate is a strong AI use case when the human can review the pattern and spot deviations.
      1: |
        High-stakes architecture decisions require domain understanding, trade-off judgment, and accountability. AI can help list trade-offs, but it should not make the final decision unreviewed.
      2: |
        Explanation is one of the safest high-value uses: it supports conceptual inquiry while keeping the human responsible for applying the idea.
      3: |
        Prototypes are useful because they make requirements concrete. They still need engineering review before becoming production code.
      4: |
        This is cognitive offloading. It may finish the assignment, but it prevents the student from building the schema needed to review or debug similar code later.
    explanation: "**AI is strongest on repetitive, well-specified, common tasks and on learning support.** It is weakest when the task requires unshared domain knowledge, high-stakes judgment, or understanding the student has not yet built."

  - id: 16
    difficulty: advanced
    type: single
    question: |
      A team adds a hero avatar customizer. A student suggests storing the entire customized SVG in localStorage; another suggests storing the selected parameters and regenerating the SVG. What is the best engineering lesson from this disagreement?
    options:
      - "Ask the AI to pick whichever storage format is shorter."
      - "Humans must own this design decision before telling the agent what to implement."
      - "The SVG is always correct because it exactly matches the current picture."
      - "The parameters are always correct because they use less space."
    correct_index: 1
    option_feedback:
      0: |
        Shorter is only one possible criterion, and often not the important one. Design decisions need explicit quality attributes, not a vague preference.
      2: |
        Storing the SVG captures the current rendering but may make future migrations, validation, and privacy review harder. Exactness today is not the same as good design over time.
      3: |
        Parameters are often better for evolvability, but "always" overstates it. If regeneration is unstable or the renderer changes incompatibly, raw output might have a defensible role.
    explanation: "**AI can implement either storage strategy, but the engineer must decide which strategy fits the product and quality attributes.** Good prompts expose the decision: ask for trade-offs, choose deliberately, then give the agent a bounded implementation task."

  - id: 17
    difficulty: advanced
    type: single
    question: |
      During test-driven generation, the AI writes an implementation that passes every visible example by hard-coding a dictionary from sample inputs to sample outputs. What should the human do?
    options:
      - "Accept it because all tests pass."
      - "Reject the overfit code; add tests for the general property."
      - "Delete the tests because they made the AI cheat."
      - "Ask the AI to add more comments explaining the dictionary."
    correct_index: 1
    option_feedback:
      0: |
        Passing tests is useful only when the tests specify the behavior rather than merely list examples. A hard-coded lookup table passes examples while failing the real requirement.
      2: |
        The tests revealed a weakness in the specification; removing them loses that signal. Strengthen the tests and inspect the implementation.
      3: |
        Comments do not turn an overfit implementation into a correct one. The problem is behavioral generality, not readability of the wrong approach.
    explanation: "**Generated code can overfit tests just like a student can memorize answers.** The human reviewer must inspect whether the implementation solves the general problem, then add stronger tests and refactor until the code matches the actual specification."

  - id: 18
    difficulty: basic
    type: single
    question: |
      Which sequence correctly names the three main stages discussed for LLM development and use?
    options:
      - "Pre-training, post-training, inference."
      - "Compilation, linking, execution."
      - "Requirements, design, maintenance."
      - "Tokenization, refactoring, deployment."
    correct_index: 0
    option_feedback:
      1: |
        That sequence describes a traditional compiled-program toolchain, not the lifecycle of an LLM.
      2: |
        Requirements, design, and maintenance are software-engineering phases. They matter when supervising AI, but they are not the model-development stages.
      3: |
        Tokenization is part of how text is represented, and deployment may follow model development, but this sequence does not capture the training-and-use pipeline from the lecture.
    explanation: "**Pre-training creates the base model, post-training tunes it for useful behavior, and inference is the use-time step where a prompt produces output.** This item is the low-Bloom anchor: students need the vocabulary before they can analyze agent workflows."

  - id: 19
    difficulty: intermediate
    type: single
    question: |
      A reasoning model shows a polished step-by-step explanation before generating code. Why should that trace still be treated cautiously?
    options:
      - "The trace proves the model used the same logical reasoning process as a human expert."
      - "The trace is still probabilistic text and can rationalize a wrong answer."
      - "A reasoning trace means the output is deterministic."
      - "A reasoning trace means tests are unnecessary."
    correct_index: 1
    option_feedback:
      0: |
        Human-looking explanation is not evidence of human-like cognition. The model can generate plausible reasoning text while still missing the real invariant.
      2: |
        Reasoning mode does not turn a non-deterministic system into a deterministic compiler. The same prompt can still lead to different outputs.
      3: |
        Reasoning traces can help, but executable behavior still needs tests and human review.
    explanation: "**Thinking traces can be useful scaffolding, not proof.** The engineer should read them as a proposal to inspect, then verify the generated code against requirements, tests, and system context."

  - id: 20
    difficulty: intermediate
    type: single
    question: |
      You want an agent to add a title-only search box to the SEBook home page. Which prompt best applies the lecture's prompt-engineering advice?
    options:
      - "\"Add a search feature to the SEBook home page. Make it work well.\""
      - "\"Add a title-only search box on the home page. Propose a plan with tests before coding.\""
      - "\"Read the whole repo, then build whatever search experience you think is best.\""
      - "\"Add a snappy modern search bar. Use any library you want and make it look polished.\""
    correct_index: 1
    option_feedback:
      0: |
        "Make it work well" gives the agent no acceptance criteria and no scope. The feature it ships may not be the one you wanted.
      2: |
        Dumping the whole repo into context buries the constraints that matter and lets the agent decide design questions you should own.
      3: |
        "Modern" and "polished" are taste words, not criteria. New libraries also expand scope; constrain the feature instead.
    explanation: "**A strong implementation prompt gives role, task, context, acceptance criteria, constraints, and process.** It also asks the agent to surface design questions before it silently chooses behavior you did not intend."

  - id: 21
    difficulty: advanced
    type: multiple
    question: |
      An agent adds a "schedule study" feature that looks polished, but the generated quiz links use URLs that do not exist. What should a reviewer infer? Select all that apply.
    options:
      - "The feature needs tests or manual checks that the generated URLs resolve."
      - "The agent may have hallucinated a route the repo never had."
      - "The UI polish proves the implementation is production-ready."
      - "The acceptance criteria were too loose — they didn't require valid link destinations."
      - "This is harmless because broken links are not code bugs."
    correct_indices: [0, 1, 3]
    option_feedback:
      0: |
        Link validity is observable behavior. A test or manual check should catch it before the feature ships.
      1: |
        Plausible routes are exactly the kind of thing an LLM can invent when it has not been grounded in the repository's real routing conventions.
      2: |
        Visual polish is not correctness. A polished broken link is still broken.
      3: |
        Acceptance criteria should describe the behavior that makes the feature valuable. If links are part of the value, their validity belongs in the criteria.
      4: |
        Broken links are user-facing defects. They can strand learners and fail the core purpose of the feature.
    explanation: "**This is an analysis-level failure: separate surface polish from behavioral correctness.** The reviewer should trace the bug to missing grounding, weak acceptance criteria, and missing verification."

  - id: 22
    difficulty: expert
    type: single
    question: |
      A team wants AI to implement a feature for a public educational site that must meet WCAG 2.2 AA. Which decision best evaluates the risk?
    options:
      - "Use AI freely because accessibility can be fixed later if a user complains."
      - "State the WCAG constraint up front and verify markup, keyboard, focus, and contrast each change."
      - "Avoid AI for all accessibility-related work, including explanations and test brainstorming."
      - "Ask the AI to say whether the feature is accessible and accept the answer if it is confident."
    correct_index: 1
    option_feedback:
      0: |
        Accessibility is a release constraint, not optional polish. Waiting for a user complaint shifts the cost to people the system is supposed to serve.
      2: |
        AI can help brainstorm checks and draft code, but the workflow must keep human verification and explicit standards in the loop.
      3: |
        Confidence is not evidence. Accessibility requires concrete checks such as semantic markup, keyboard operation, focus visibility, contrast, reflow, and status-message behavior.
    explanation: "**Evaluation means judging whether the process is adequate for the risk.** For a public educational site, the AI workflow must include explicit accessibility criteria and verification, not just generation."

  - id: 23
