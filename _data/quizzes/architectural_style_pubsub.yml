title: "Publish-Subscribe Quiz"
description: "Apply the publish-subscribe style to real architectural decisions — choose between push and pull, diagnose coupling smells, pick QoS levels, and judge when pub-sub is the wrong tool."
active: true
questions:
  - id: 1
    difficulty: basic
    type: single
    question: |
      Your team runs an e-commerce backend. A new `Recommendations` service needs to react to every `OrderPlaced` event the `Checkout` service emits. The architect insists no code in `Checkout` may change to add the new consumer. Which style makes this possible?
    options:
      - "Direct method call — `Checkout` calls `Recommendations.handleOrder()` after writing to the database."
      - "Publish-subscribe — `Checkout` publishes `OrderPlaced` to a bus; `Recommendations` registers as a subscriber."
      - "Layered architecture — `Recommendations` is placed below `Checkout` so `Checkout` can call down to it."
      - "Pipes and filters — `OrderPlaced` events stream through a fixed pipeline ending in `Recommendations`."
    correct_index: 1
    option_feedback:
      0: |
        Direct call forces a code change in `Checkout` to add the new consumer — the exact constraint the architect ruled out. Every future subscriber would require another `Checkout` edit.
      2: |
        Layering would require `Checkout` to know about `Recommendations` (it would be making the downward call), again violating the no-change-to-`Checkout` constraint.
      3: |
        A fixed pipeline forces every event through `Recommendations`, even ones that should not reach it, and adding a *parallel* consumer like `Inventory` would require restructuring the pipeline.
    explanation: "**Pub-sub is the only style here that lets a new consumer be added without touching the producer.** The publisher's dual ignorance — it doesn't know who subscribes — is what makes runtime extensibility possible. This is the headline reason to reach for pub-sub: evolvability of the consumer set."

  - id: 2
    difficulty: intermediate
    type: single
    question: |
      A real-time stock-trading dashboard pushes `PriceChanged` events at ~5,000 per second. Subscribers (chart, alert engine, order matcher) all need the new price every tick. The team is choosing between push and pull. Which is correct?
    options:
      - "Pull — minimal notifications reduce bandwidth, and subscribers fetch only when interested."
      - "Push — bundling the price in the notification avoids a second round trip per subscriber per tick."
      - "Pull — it lets each subscriber decide whether to re-query, which scales better at 5,000 events/sec."
      - "Push is unsafe at this rate because the publisher could become a bottleneck — only pull avoids that risk."
    correct_index: 1
    option_feedback:
      0: |
        Pull adds a round trip per interested subscriber per event. At 5,000 events × 3 subscribers, that's 15,000 extra round trips per second — exactly the wrong direction for a hot path.
      2: |
        Every subscriber here always wants the price. "Decide whether to re-query" optimizes for a case that doesn't exist; you're paying for flexibility you don't use.
      3: |
        Pull does not reduce publisher load — the publisher still answers every fetch. Bandwidth concerns are real for very large payloads, but a price tick is a small number.
    explanation: "**Push wins when every interested subscriber will use the payload, especially at high event rates with small payloads.** Pull wins for large or expensive-to-produce payloads where most subscribers will discard them. A price tick going to three always-interested subscribers is the canonical push case."

  - id: 3
    difficulty: advanced
    type: single
    question: |
      A pub-sub framework offers three delivery modes: **at most once** (may lose messages), **at least once** (may deliver duplicates), and **exactly once** (stronger protocol coordination, higher latency). A team uses the broker to publish `InvoicePaid` events to a billing-fulfillment consumer. The consumer is **not idempotent**, so a duplicate `InvoicePaid` would charge the customer twice. Loss would mean a paid invoice is never recorded. Latency is acceptable. Which delivery mode fits this *exact* stem?
    options:
      - "At most once — the broker performs lowest-latency, fire-and-forget delivery with no acknowledgments."
      - "At least once — the broker retries until the consumer acknowledges, accepting that duplicates may reach the consumer."
      - "Exactly once — sender and receiver coordinate so the message is delivered once at that protocol boundary."
      - "The delivery mode is irrelevant — the broker always guarantees exactly-once delivery regardless of configuration."
    correct_index: 2
    option_feedback:
      0: |
        At-most-once delivery may silently drop the message — a paid invoice never recorded is a regulatory and reputational disaster, not just a UX bug.
      1: |
        At-least-once retries until acknowledged, which is safe *only if* the consumer is idempotent. The stem stipulates it is not, so a retried delivery would double-charge the customer.
      3: |
        Delivery mode controls per-message delivery semantics; the broker does *not* default to exactly-once. Without configuring the stronger mode, neither the broker nor the consumer gets that protocol-level guarantee.
    explanation: "**Given the stem's constraint (non-idempotent consumer, neither loss nor duplication acceptable), exactly-once delivery is the only mode that fits the stated delivery requirement.** Treat this as 'understand the delivery guarantees' — not 'always pick exactly-once for money movement.' Exactly-once is a protocol-level delivery guarantee, not a complete business-transaction guarantee; real billing systems more commonly use idempotent consumers plus at-least-once delivery, or synchronous REST with idempotency keys."

  - id: 4
    difficulty: expert
    type: multiple
    question: |
      Your manager wants to use a *typical* asynchronous pub-sub bus (e.g., Kafka with default settings) for the **money-transfer engine** of a retail bank. Transfers must commit in a strictly defined order, must never be lost, and an ops team must be able to trace why any specific transfer failed within seconds. Which of these are *legitimate* warning signs that this style is the wrong fit *as proposed*? Select all that apply.
    options:
      - "Bus dispatch is asynchronous and gives no ordering guarantee across subscribers."
      - "Tracing causality through a bus during incident response is significantly harder than tracing a synchronous call stack."
      - "Adding new subscribers in the future would be easy — that flexibility is unwanted in a regulated context."
      - "The combinatorial number of reachable system states grows quickly with each new subscriber, complicating verification."
      - "Pub-sub cannot be implemented with reliable transport — TCP is forbidden."
    correct_indices: [0, 1, 3]
    option_feedback:
      0: |
        Strict ordering is exactly what asynchronous bus dispatch does not guarantee. For money movement where order matters (debit-before-credit, idempotency keys in sequence), this is disqualifying.
      1: |
        Pub-sub turns a stack trace into a graph trace across asynchronous boundaries. For sub-second incident triage in a regulated industry, this is a real operational cost.
      2: |
        Easy extensibility is a *feature* of pub-sub, not a problem. Even in regulated contexts, you'd want to gate which subscribers are allowed via configuration — not abandon pub-sub for being too flexible.
      3: |
        Each new subscriber can react to events from any publisher and emit its own events, fanning out the reachable state space. Formal verification and reasoning become exponentially harder.
      4: |
        Pub-sub middleware routinely uses TCP (Kafka, RabbitMQ over AMQP, MQTT). Transport reliability is independent of the style.
    explanation: "**Default-config asynchronous pub-sub is the wrong fit for ordered, traceable, transactional workflows.** Banks reach for synchronous request/response with strong consistency, or event sourcing with explicit causal ordering, when guarantees matter more than evolvability. With careful design — per-account partitioning for ordering, idempotency keys, strict QoS, and full distributed tracing — pub-sub *can* be made to work in finance (some banks do exactly this), but you're paying significant engineering effort to claw back what the style gives up by default. The 'too flexible to add subscribers' argument is not a real cost; the real costs are ordering, traceability, and verification."

  - id: 5
    difficulty: advanced
    type: single
    question: |
      A microservices team's bus is implemented with a single method `bus.send(Message msg)` and every subscriber casts the message to a concrete type. After 18 months the team can no longer answer "what breaks if I change `OrderPlaced`'s `currency` field?" without a manual codebase grep. Which architectural smell does this match, and what is the right refactor?
    options:
      - "Layer bridging; refactor by re-introducing a strict layer between publishers and subscribers."
      - "Wide coupling; refactor by replacing the untyped `send`/`receive` with typed channels per event class."
      - "Big ball of mud; refactor by deleting the bus and reverting to direct calls."
      - "Cyclic dependency; refactor by topologically sorting the publishers."
    correct_index: 1
    option_feedback:
      0: |
        Layer bridging is the layered-style smell of calling non-adjacent layers downward. The problem described is not about call direction; it is about losing the dependency graph between publishers and subscribers.
      2: |
        Deleting the bus would replace one problem with a much worse one: tightly coupled point-to-point dependencies between services. The fix is to restore *visibility* of the existing coupling, not to remove the bus.
      3: |
        Cycles arise when A depends on B and B depends on A. The smell here is *opacity* of the dependency graph, not its directionality.
    explanation: "**Wide coupling is the pub-sub smell where every subscriber appears coupled to every publisher because the bus's type erasure hides the real dependency graph.** Typed channels — one per event class, or per-event-class topics — restore the static visibility so each subscription is statically traceable and a maintenance engineer can answer 'who breaks if I change this payload?' from the type system alone."

  - id: 6
    difficulty: intermediate
    type: single
    question: |
      A mobile chat app must continue to deliver messages to users whose phones were offline for hours. Which pub-sub feature is the team relying on?
    options:
      - "Space decoupling — subscribers don't need to know publisher addresses."
      - "Time decoupling — the broker buffers events for offline subscribers."
      - "Synchronization decoupling — the publisher does not block."
      - "Content-based routing — only relevant messages are delivered."
    correct_index: 1
    option_feedback:
      0: |
        Space decoupling means parties don't know each other's locations. It does not address the case where one party is unreachable at the moment of publication.
      2: |
        Synchronization decoupling means neither party blocks during the call. It does not survive the subscriber being absent entirely.
      3: |
        Content-based routing controls *which* events match, not *when* they are delivered. An offline subscriber still misses events without time decoupling.
    explanation: "**Time decoupling — implemented via durable subscriptions (JMS), retained messages (MQTT), or log retention (Kafka) — is what lets a subscriber receive events that were published while it was unreachable.** Without it, every offline minute is a delivery gap. With it, the subscriber catches up on reconnect."

  - id: 7
    difficulty: advanced
    type: single
    question: |
      Your team adopts a content-based pub-sub broker so subscribers can register predicates like `region == 'EU' AND amount > 10000`. After three months, broker CPU is saturated at 80% and the team is debating switching to topic-based. Under what condition is this switch justified?
    options:
      - "Always — content-based is never appropriate at scale."
      - "When the predicates partition cleanly into a few stable categories that map to topics."
      - "When the team wants to add wildcard support, since content-based has no equivalent."
      - "When the team wants stronger delivery guarantees — only topic-based supports QoS."
    correct_index: 1
    option_feedback:
      0: |
        Content-based is *expensive*, not *inappropriate*. It is the correct choice when fine-grained payload filtering is needed and broker capacity can handle the load. Many systems run it successfully.
      2: |
        Wildcard matching is more expressive than literal topic strings but strictly less expressive than predicates over payload attributes. The motivation for switching would be cost, not capability.
      3: |
        QoS is a delivery-guarantee concern independent of routing style. Both topic-based and content-based brokers support QoS levels.
    explanation: "**Switch from content-based to topic-based when the subscription space naturally partitions: each distinct predicate category becomes a topic, and the broker's job becomes a hash lookup instead of per-event predicate evaluation.** If predicates are highly dynamic or numerically constrained (`amount > X` for arbitrary X), topics cannot replace them and content-based is the necessary cost."

  - id: 8
    difficulty: advanced
    type: single
    question: |
      An architect proposes pub-sub for syncing inventory counts across a global e-commerce platform. The product manager pushes back: "we need every region to see the same count instantly so we never oversell." How should the architect respond?
    options:
      - "Agree — pub-sub delivers events instantly, so all regions see the same count."
      - "Asynchronous pub-sub is only eventually consistent; this need is different."
      - "Switch to topic-based pub-sub, which guarantees consistency across topics."
      - "Use exactly-once delivery, which makes pub-sub strongly consistent."
    correct_index: 1
    option_feedback:
      0: |
        Pub-sub delivers asynchronously; "instantly" is marketing language, not an architectural guarantee. Network partitions and bus delays produce real inconsistency windows.
      2: |
        Topic-based vs content-based is about routing, not consistency. Neither variant guarantees synchronous global state.
      3: |
        Exactly-once delivery guarantees delivery at the protocol boundary. It does not synchronize subscriber state — subscriber A and subscriber B still apply the event at different wall-clock times.
    explanation: "**Typical asynchronous pub-sub favors decoupled, available event propagation over immediate globally consistent state.** The architecturally honest answer is to name the trade-off explicitly: either redesign the business process around eventual consistency (reserve-then-confirm), or pick a coordination style with strong consistency (distributed transactions, single source-of-truth with synchronous reads)."

  - id: 9
    difficulty: intermediate
    type: single
    question: |
      You inherit a system whose architecture diagram shows 20 microservices, each connected by a single arrow to a central "Event Bus" component. After three weeks you still cannot answer "which services break if we change the `UserDeleted` payload?" What is the root cause of your confusion, per Fairbanks?
    options:
      - "The diagram is missing the QoS configuration on each connection."
      - "It shows runtime connectivity but hides the design-time producer→consumer links."
      - "The diagram should also show the deployment tiers, since pub-sub depends on them."
      - "Microservice architectures cannot be diagrammed; you need to read the code instead."
    correct_index: 1
    option_feedback:
      0: |
        QoS detail would not answer "which services break if a payload changes." Even fully annotated, the diagram still wouldn't show conceptual producer→consumer links.
      2: |
        Tier information explains *where* services run, not *which* of them depend on a given event payload. The missing information is conceptual, not deployment.
      3: |
        Microservice systems can absolutely be diagrammed at the architecture level — and must be, for change-impact analysis. The diagram failure here is in *what* it shows, not whether to draw one.
    explanation: "**Fairbanks calls this the *illusion of obliviousness*: technically every service is just attached to the bus, but the *design intent* — which producer exists because which consumer needs it — is the load-bearing information that maintenance engineers rely on.** Document conceptual producer→consumer relationships explicitly (event catalog, service-to-event matrix, contract tests) so the design rationale survives the runtime decoupling."

  - id: 10
    difficulty: advanced
    type: single
    question: |
      Two designs for an IoT temperature monitor are on the table. **Design A:** sensors call `monitor.report(temp)` directly via REST. **Design B:** sensors publish `TempReading` to MQTT; the monitor subscribes. The PM says "Design B is obviously more decoupled, so it's better." Which counter-argument best frames the *honest* trade-off?
    options:
      - "Design B is always better for IoT because MQTT is the standard."
      - "Design A is always better because synchronous calls are easier to debug."
      - "Design B trades debuggability and ordering for evolvability and offline tolerance."
      - "The two are equivalent — there is no architectural difference."
    correct_index: 2
    option_feedback:
      0: |
        "Standard" is not an architectural argument. MQTT being widely used is a *deployment* benefit; it does not justify the style choice on its own.
      1: |
        Debuggability is a real Design A advantage, but framing it as "always better" ignores legitimate Design B wins (offline sensors, multiple consumers, decoupled deployment).
      3: |
        The two have markedly different consequences for evolvability, debugging, ordering, and offline tolerance. Calling them equivalent ignores the load-bearing trade-off the architect is making.
    explanation: "**The pedagogically honest answer in any 'should we use pub-sub?' debate is to name the trade-off explicitly — pub-sub buys decoupling and evolvability (new subscribers can join without touching sensors, offline endpoints can catch up), and pays for it with ordering, debuggability, and per-event latency.** If the system has only one consumer today, no plans for more, and runs on a reliable network with always-online endpoints, the synchronous alternative is often the right call. Decoupling is not free."

  - id: 11
    difficulty: intermediate
    type: single
    question: |
      In a robotics pub-sub system, one team renames the publisher topic from `line_class` to `line_topic`, but a safety component still subscribes to `line_class`. Tests compile, both components start, and the safety component silently receives no data. What architectural lesson does this illustrate?
    options:
      - "Topic names are implementation details and should never appear in architecture documentation."
      - "Publish-subscribe removes all coupling, so the missing data must be a hardware fault."
      - "Topic names are runtime connectors; pub-sub needs schemas or contract tests to catch breaks."
      - "The system should be converted to layered architecture because layered systems cannot have string mismatches."
    correct_index: 2
    option_feedback:
      0: |
        In topic-based pub-sub, the topic name is the connector. Hiding it from architecture documentation hides the thing that binds publishers to subscribers.
      1: |
        Pub-sub removes direct identity coupling, not semantic coupling to event names and payload contracts.
      3: |
        Layered systems can also have string mismatches. The right fix is not a blanket style conversion; it is better contract visibility and validation for the chosen style.
    explanation: "**Pub-sub's decoupling makes this bug easy to create and hard to notice.** The architecture must treat topics and payload schemas as first-class contracts, then verify them with event catalogs, typed topics, contract tests, or runtime tracing."
