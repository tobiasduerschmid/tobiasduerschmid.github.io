title: "Null Object Pattern Quiz"
description: "Test your understanding of the Null Object pattern's intent, its relationship to Singleton/Strategy/State, when it applies, and the bug-masking risk it introduces."
active: true
questions:
  - id: 1
    difficulty: basic
    type: single
    question: |
      Which sentence most accurately captures the **intent** of the Null Object pattern?
    options:
      - "Provide a surrogate for another object that shares the same interface but does nothing meaningful."
      - "Wrap an existing object so that all calls to it can be intercepted, controlled, or audited."
      - "Replace a `null` reference with a thrown exception so the caller is forced to handle the error."
      - "Defer creation of a collaborator until the first time a client actually calls a method on it."
    correct_index: 0
    option_feedback:
      1: |
        That's the [Proxy](https://en.wikipedia.org/wiki/Proxy_pattern) pattern, and the two are easy to confuse — a Proxy controls access to a real subject, possibly forwarding calls; a Null Object replaces the real subject and never forwards anywhere.
      2: |
        Throwing on `null` access (e.g., `Objects.requireNonNull`) defends *against* missing collaborators — it does not give clients a do-nothing collaborator they can call uniformly. The Null Object's whole point is to avoid the conditional or exception-handling burden at the call site.
      3: |
        That's lazy initialization (a Proxy variant). A Null Object never wakes up and starts doing real work — it permanently does nothing. If your stand-in transforms into a real collaborator on first use, you have a Proxy, not a Null Object.
    explanation: "A Null Object provides a surrogate that shares the same interface as a real collaborator but does nothing. It encapsulates *how to do nothing* and hides those details from collaborators, so clients call it exactly as they would the real object."

  - id: 2
    difficulty: intermediate
    type: single
    question: |
      Consider this `BankTransfer` class:

      ```java
      class BankTransfer {
          private final AuditLogger logger;        // may be null

          void transfer(int amount, String to) {
              if (logger != null) {
                  logger.log("transfer " + amount + " to " + to);
              }
              // ... do the actual transfer ...
          }
      }
      ```

      Refactoring `logger` to use the Null Object pattern would replace the `null` field with a `SilentLogger` whose `log()` does nothing. **Which design problem does this primarily address?**
    options:
      - "Performance — eliminating the null check shaves a CPU branch off every call."
      - "Call-site clarity — the field can never be null, so the guard cannot be forgotten."
      - "Concurrency — the Null Object eliminates a data race on the `logger` field."
      - "Memory — sharing one `SilentLogger` instance avoids allocating a new logger per `BankTransfer`."
    correct_index: 1
    option_feedback:
      0: |
        Performance is not why the pattern exists, and the call still happens — the JIT may inline an empty method, but you would not adopt Null Object for that reason. The benefit is design-level: the call site is uniform and the guard cannot be forgotten.
      2: |
        The pattern doesn't add or remove any synchronization. If two threads were already racing on the `logger` field, they would still race after the refactor — the Null Object addresses *call-site clarity*, not concurrency.
      3: |
        Memory savings (via Singleton) are a downstream consequence, not the design driver. You would not introduce Null Object to save a few bytes; you introduce it to make the *call site* uniform.
    explanation: "**Null Object turns 'absence of behavior' into a real, polymorphic implementation of behavior — the call site stays uniform and the guard cannot be forgotten.** Once `logger` can never be null, the conditional disappears at every call site (current and future), and the design intent of 'no audit trail here' is encoded in a real type (`SilentLogger`) instead of an absent reference. This is the same reason `Optional<T>.empty()` beats raw nulls in modern APIs."

  - id: 3
    difficulty: advanced
    type: single
    question: |
      A teammate proposes adding a `NoController` Null Object to a `Controller` interface that has 30 methods. Currently no view in the codebase actually needs a `NoController`. How should you respond?
    options:
      - "Add it now — having the Null Object available makes future read-only views easier to write."
      - "Push back — the pattern's Applicability says 'some collaborator instances should do nothing'; without that, you are speculating on a need that may never appear."
      - "Add it as a `@Deprecated` placeholder so future code can opt in."
      - "Replace the entire `Controller` interface with `Optional<Controller>` and remove the Null Object plan."
    correct_index: 1
    option_feedback:
      0: |
        Adding a 30-method do-nothing class on speculation is exactly the over-abstraction the [Rule of Three](/SEBook/designpatterns.html#design-patterns-and-refactoring) warns against. Pattern-fit is contextual; nothing in the present design needs the Null Object.
      2: |
        `@Deprecated` signals "don't use this anymore," not "don't use this yet." The annotation would mislead future readers about what the placeholder is for, and it still pays the maintenance cost of a 30-method class no one calls.
      3: |
        That's a much larger refactor than the prompt asks for and changes the type at every call site. Even worse, `Optional<Controller>` *re-introduces* the null check at every call site — exactly the burden the original team was trying to avoid by considering Null Object in the first place.
    explanation: "The pattern's Applicability requires that *some collaborator instances should do nothing* and that the do-nothing behavior is *reusable*. With no current users, neither holds, so the cost — a 30-method class to maintain — is paid up front while the benefit is hypothetical. Wait until at least one real client needs it."

  - id: 4
    difficulty: intermediate
    type: single
    question: |
      A startup logs `"Audit logger: SilentLogger"` in production for six months before anyone notices that no audit trail has been written. The bug originated in a misconfigured DI binding that wired the test-only `SilentLogger` into the prod build. **Which Null Object liability does this story illustrate?**
    options:
      - "The Null Object's class hierarchy is too deep to debug."
      - "Silent do-nothing collaborators can mask real bugs when one is wired in by mistake."
      - "The Null Object cannot be implemented as a Singleton in DI containers."
      - "The Null Object pattern is incompatible with audit logging requirements."
    correct_index: 1
    option_feedback:
      0: |
        The Null Object hierarchy is shallow — typically `AbstractObject`, one Real, one Null. Class-depth is not what made the bug invisible; *behavioral silence* is.
      2: |
        Singletons in DI work fine. The bug here is one of *configuration* (wrong binding), not one of pattern compatibility. The same misconfiguration would happen with a non-singleton SilentLogger.
      3: |
        The pattern itself is fine for audit logging — `SilentLogger` is a perfectly valid choice for some environments (tests, internal jobs). The bug was that it was *also* used in production by mistake, not that the pattern is wrong here.
    explanation: "**Null Object swallows operations silently — that is exactly what you want when 'do nothing' is a valid response, and exactly what you do not want when 'do nothing' hides a bug.** Mitigations: (1) name the class for what it actually does (`SilentLogger`, never `DefaultLogger`); (2) log at startup which collaborator was wired in (`'Audit logger: SilentLogger'` is conspicuous); (3) reserve Null Object for cases where do-nothing is a legitimate domain decision, not a fallback for 'we couldn't construct the real one.'"

  - id: 5
    difficulty: intermediate
    type: single
    question: |
      A `RubberDuck` class is implemented with `flyBehavior = new FlyNullObject()`, where `FlyNullObject implements FlyBehavior` and its `fly()` method does nothing. **Which pattern compound does this illustrate?**
    options:
      - "Null Object + Strategy (a Null Strategy)"
      - "Null Object + Decorator (a Null Decorator)"
      - "Null Object + Proxy (a Null Proxy)"
      - "Null Object + Adapter (a Null Adapter)"
    correct_index: 0
    option_feedback:
      1: |
        There is no Null Decorator: a Decorator must wrap a real object, otherwise it has nothing to decorate. The compound listed in the [Pattern Compounds](/SEBook/designpatterns.html#communicating-design-intent-and-context-tailoring) discussion explicitly notes this.
      2: |
        A Proxy controls access to a real subject. `FlyNullObject` does not stand in front of any real `FlyBehavior` — it *replaces* one. Proxy and Null Object are easy to confuse but have opposite intents.
      3: |
        Adapter wraps an object to translate one interface into another. `FlyNullObject` implements `FlyBehavior` directly without translating between two interfaces — there is nothing to adapt to.
    explanation: "`FlyNullObject` plays both the Strategy role (a `FlyBehavior` the duck composes with) and the Null Object role (its `fly()` does nothing) — a Null Strategy compound. When one ConcreteStrategy in a Strategy hierarchy consistently does nothing, that strategy *is* a Null Object. The same role-superimposition appears as **Null State** when a do-nothing State sits in a State hierarchy."

  - id: 6
    difficulty: advanced
    type: single
    question: |
      The State and Strategy patterns each have a "null variant" (Null State, Null Strategy). Why is there **no** Null Decorator?
    options:
      - "Decorators were not part of the original GoF catalog."
      - "A Decorator's job is to forward to a wrappee; without one, the role disappears."
      - "Null Decorators exist but are called Adapters in the GoF catalog."
      - "Decorators are immutable, so a Null Decorator would have no observable difference from a Real Decorator."
    correct_index: 1
    option_feedback:
      0: |
        Decorator *is* in the GoF catalog (Structural patterns). Membership in the catalog isn't what makes a Null variant possible; the role's intrinsic structure is.
      2: |
        Decorator and Adapter are distinct GoF patterns with different intents — Decorator extends behavior preserving the interface; Adapter translates one interface into another. Neither swallows the other.
      3: |
        Immutability is unrelated. The reason there is no Null Decorator is structural: a Decorator's job is *to forward to a wrappee*. Without a wrappee, there is nothing to forward to and the role disappears.
    explanation: "**A Decorator's contract is to wrap a real object and forward calls — a Decorator with no wrappee has nothing to decorate, so the role itself doesn't make sense.** This is called out explicitly in the [Pattern Compounds](/SEBook/designpatterns.html#communicating-design-intent-and-context-tailoring) discussion. State and Strategy work because a 'do nothing' implementation is still a complete implementation of the state/strategy interface. A Decorator that wraps nothing isn't an empty decorator; it's just a Null Object impersonating the wrapped type directly."

  - id: 7
    difficulty: advanced
    type: multiple
    question: |
      Which of the following are **valid reasons to apply** the Null Object pattern? Select all that apply.
    options:
      - "An object requires a collaborator, and some legitimate instances should do nothing."
      - "You want clients to ignore the difference between a real collaborator and a do-nothing one (no scattered null checks)."
      - "The do-nothing behavior is reusable across multiple clients."
      - "Modern languages have `Optional`/`Maybe` types, so every nullable field should be replaced by a Null Object regardless of context."
      - "All of the do-nothing behavior fits inside a single class."
    correct_indices: [0, 1, 2, 4]
    option_feedback:
      0: |
        A real, non-optional collaboration where some instances should legitimately do nothing is the canonical Null Object scenario — the reason the pattern exists at all.
      1: |
        Uniform call sites are the pattern's central payoff. Without this requirement the conditional logic comes back at the call site, defeating the main benefit.
      2: |
        Reusable do-nothing behavior is what justifies a dedicated *class* over a one-off conditional. Without it, Null Object is a single-use trick rather than a sharable abstraction.
      3: |
        `Optional<T>` and `Maybe T` already give a type-checked alternative; layering a Null Object on top is sometimes useful but should be a *deliberate* choice, not a blanket policy. Cases like "user not found" or "no record exists" should stay `Optional`, because there the absence is meaningful information.
      4: |
        A single Null Object class can only absorb do-nothing behavior that lives behind one collaborator interface. When "do nothing" must span several collaborators, the concern is cross-cutting and belongs in aspects or middleware instead.
    explanation: "Null Object's Applicability requires a real collaboration that needs a do-nothing variant, uniform call sites, reusable do-nothing behavior, and a single-class scope. Blanket replacement of `Optional` is the modern misuse: when absence carries meaning the client must handle (404, no match, opt-out), preserve that signal rather than burying it under a do-nothing surrogate."

  - id: 8
    difficulty: advanced
    type: single
    question: |
      A `LinkedTreeNode` returns `Collections.emptyIterator()` when asked for an iterator over its (non-existent) children. Which pattern compound is at play?
    options:
      - "Null Object + Composite (the empty iterator is a Null Object playing the Composite role)."
      - "Null Object + Iterator (`emptyIterator` is a Null Iterator — a do-nothing implementation of the Iterator interface)."
      - "Null Object + Singleton + Visitor (the empty iterator visits no children)."
      - "Null Object + Factory Method (a factory returning a null result)."
    correct_index: 1
    option_feedback:
      0: |
        Composite is about *treating leaves and composites uniformly through a Component interface* — the iterator returned by `children()` isn't itself the Component. The leaf node still implements Component; the iterator is a separate abstraction.
      2: |
        There's no Visitor in this scenario — no visitor is being applied to the children. `emptyIterator` is just a no-op implementation of the Iterator interface; the Visitor pattern is unrelated here.
      3: |
        Factory Method is about *who decides which subclass to create*. `Collections.emptyIterator()` is a factory call, but the *thing it returns* is what's relevant — and that thing is a Null Iterator, not a Factory Method.
    explanation: "`Collections.emptyIterator()` is the canonical Null Iterator: it implements `Iterator<T>` so clients can call `hasNext()` and `next()` uniformly, with `hasNext()` always returning `false`. The Gang of Four use it to introduce Null Object inside the Iterator catalog entry. Clients iterate over leaves and composites with the same code; leaves need no special case for 'no children to iterate over.'"

  - id: 9
    difficulty: advanced
    type: single
    question: |
      Which of the following best describes how Null Object **differs from** the Special Case pattern (Fowler, *Patterns of Enterprise Application Architecture*)?
    options:
      - "Special Case and Null Object are different names for the same pattern; the choice is purely terminological."
      - "Null Object is a special case of Special Case — limited to the do-nothing variant."
      - "Special Case is for object-relational mapping; Null Object is only for in-memory objects."
      - "Special Case requires reflection at runtime; Null Object is statically dispatched."
    correct_index: 1
    option_feedback:
      0: |
        Fowler explicitly cites Null Object as related to Special Case in PoEAA — they're related but distinguishable. The names are not interchangeable; collapsing them loses the broader generalization Special Case offers.
      2: |
        Special Case has nothing to do with O/R mapping specifically. It's a general-purpose pattern for representing exceptional instances — useful in any domain (UI, business logic, persistence layers, etc.).
      3: |
        Both patterns dispatch through normal polymorphism (virtual methods). Reflection is not part of either pattern's mechanics.
    explanation: "**Special Case is the broader pattern: any 'exceptional' instance handled uniformly through the same interface (e.g., `MissingCustomer` returning sensible defaults instead of throwing). Null Object is the special case where 'exceptional' means 'do nothing.'** Fowler's `MissingCustomer` might still answer questions sensibly (`name() = 'Unknown'`, `taxId() = 'N/A'`) — that's Special Case but not Null Object. A `SilentLogger` whose `log()` is a no-op is both Special Case *and* Null Object."

  - id: 10
    difficulty: advanced
    type: single
    question: |
      A teammate proposes implementing `SilentLogger` as a parameterized class so the same Null Object can absorb log entries with configurable behavior — for example, `new SilentLogger("test")` vs `new SilentLogger("prod-fallback")`. **What design risk does this create?**
    options:
      - "Parameterized Null Objects always violate the Singleton constraint, so they cannot be implemented at all."
      - "If parameters drive materially different behavior, the class has become a Real Object with a 'mode' field."
      - "Parameterized Null Objects break Liskov substitutability with the AbstractObject."
      - "The Java compiler refuses to compile parameterized constructors on classes intended to do nothing."
    correct_index: 1
    option_feedback:
      0: |
        Parameterized Null Objects are a documented variant — essentially Flyweights with extrinsic state. The Singleton constraint can be relaxed when parameters genuinely differ; that is fine.
      2: |
        Liskov substitutability isn't broken just by accepting parameters — the Null Object still implements the AbstractObject interface. The risk lies elsewhere: in *what the parameters drive*, not in their existence.
      3: |
        There's no such Java restriction; constructors can take parameters whether or not the class does nothing. The risk is design-level, not compiler-enforced.
    explanation: "**A 'Null Object' whose behavior changes meaningfully based on parameters is no longer a Null Object — it is a Real Object with a `mode` field, which puts the conditional back inside the class.** Parameterized Null Objects are valid when the parameter only varies the trivial null-result return value (e.g., `new EmptyString()` vs `new EmptyList()`) — those are Flyweights with intrinsic do-nothing behavior. They become a problem when 'do nothing' starts to mean different things in different cases — at which point you should split into multiple Null Object classes (one per do-nothing semantic) or accept that the abstraction is wrong for your domain."

  - id: 11
    difficulty: expert
    type: single
    question: |
      A senior developer points at this class and says *"this is technically a Null Object, but it's the wrong tool here":*

      ```python
      class SilentNotFoundResult:
          def get_user(self, id: int) -> User:
              return SilentNotFoundResult()  # do nothing for any access
          def __getattr__(self, name): return self.get_user(0)
      ```

      What is the most likely problem they're flagging?
    options:
      - "The class is implemented in Python instead of a statically typed language."
      - "It hides a meaningful absence ('user not found') and turns a 404 into a silent success."
      - "Null Objects must implement an explicit interface — `__getattr__` is too dynamic."
      - "The class needs to be registered as a Singleton or it will leak memory."
    correct_index: 1
    option_feedback:
      0: |
        Language choice is irrelevant — Null Object exists in dynamically typed languages too. The senior's objection is design-level: the absence of a user is *information* the caller needs to handle, not something to silently swallow.
      2: |
        Dynamic dispatch via `__getattr__` is a Python idiom and not in itself a problem. The real issue is what the class encodes (silent success on missing data), not how it dispatches.
      3: |
        Memory is not the concern. The concern is *semantics*: the class disguises a domain failure as a success, which is the canonical Null Object misuse.
    explanation: "**Null Object is for cases where 'do nothing' is a valid domain response, not for swallowing meaningful absences.** *User not found* is information the caller must act on (return 404, prompt for re-login, retry with a different id). Returning a recursive do-nothing object turns a clear failure mode into mysterious downstream bugs ('why is the user's email always blank?'). The right tool here is `Optional[User]`, an exception, or a `MissingUser` Special Case that *announces* itself rather than impersonating a real user."

  - id: 12
    difficulty: advanced
    type: multiple
    question: |
      Which of the following are **liabilities (downsides)** of the Null Object pattern that authors should weigh before adopting it? Select all that apply.
    options:
      - "Can mask real bugs by silently swallowing operations that signal misconfigurations."
      - "Class proliferation — each AbstractObject family adds at least one more class."
      - "Inappropriate when monitoring or auditing systems must distinguish 'operation skipped' from 'operation succeeded with no effect.'"
      - "Always slower at runtime than a `null` check, regardless of language or JIT behavior."
      - "Hard to mix do-nothing into multiple collaborators when the do-nothing concern cuts across class boundaries."
    correct_indices: [0, 1, 2, 4]
    option_feedback:
      0: |
        This is the most important liability — it's why naming matters (`SilentLogger`, not `DefaultLogger`) and why startup logs should announce which collaborator was wired in.
      1: |
        Each `AbstractObject` family that needs a Null Object adds at least one class — often two, the abstract interface plus the Null implementation. That up-front class cost is easy to understate.
      2: |
        Monitoring or auditing systems may *need* to know an operation was skipped, and a Null Object hides that distinction by definition. In audit-sensitive code this trade-off is easy to miss.
      3: |
        Performance is not a real liability of this pattern and depends entirely on the language and runtime — the empty method may be inlined to literally zero cost. The genuine costs are design-level: masking, proliferation, monitoring opacity.
      4: |
        Cross-cutting do-nothing concerns are the wrong fit — they're better served by aspects, decorators, or middleware. Null Object is not a general absence-handling mechanism.
    explanation: "Null Object's real liabilities are design-level: silently masking bugs, proliferating classes, hiding distinctions monitoring systems need, and being unable to absorb cross-cutting do-nothing concerns. Performance is not one of them — the JIT often inlines empty methods to zero cost, so adopting or rejecting the pattern on performance grounds is misguided."
