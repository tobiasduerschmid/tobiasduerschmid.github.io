title: "Software Architecture Quiz"
description: "Test your understanding of architecture definitions, drivers, views, decisions, and degradation."
active: true
questions:
  - id: 1
    difficulty: basic
    question: "One influential paradigm defines software architecture as 'the set of principal design decisions governing a system' — emphasizing rationale rather than boxes and lines. Which paradigm is this?"
    options:
      - "The Structural Paradigm"
      - "The Decision-Based Paradigm"
      - "The Allocation Paradigm"
      - "The Module Paradigm"
    correct_index: 1
    option_feedback:
      0: |
        The structural paradigm defines architecture as elements, relations, and their properties — boxes and lines. That is the view the decision-based paradigm was proposed as an alternative to.
      2: |
        Allocation is one structure within the structural paradigm (software mapped to hardware, teams, or files), not a paradigm that defines architecture as principal decisions.
      3: |
        The module view is one structure used to document architecture, not a competing definition of what architecture *is*.
    explanation: "The **decision-based paradigm** defines architecture as the set of **principal design decisions** governing a system — centering rationale and trade-offs rather than the boxes and lines of the structural view."

  - id: 2
    difficulty: advanced
    question: "What formula did Perry and Wolf propose to define software architecture?"
    options:
      - "Architecture = {Components, Connectors, Style}"
      - "Architecture = {Elements, Form, Rationale}"
      - "Architecture = {Modules, Layers, Interfaces}"
      - "Architecture = {Structure, Behavior, Constraints}"
    correct_index: 1
    option_feedback:
      0: |
        Components, connectors, and style are associated with later structural definitions. Perry and
        Wolf’s formulation explicitly included rationale.
      2: |
        Modules, layers, and interfaces are useful structures, but they are not Perry and Wolf’s
        three-part formula.
      3: |
        Structure, behavior, and constraints are plausible architectural concerns, but the Perry and
        Wolf formula is elements, form, and rationale.
    explanation: "Perry and Wolf's 1992 formula defines architecture as **Elements**, **Form**, and **Rationale**. Including rationale is what makes it distinct from later purely structural formulations like Bass's elements-and-relations."

  - id: 3
    difficulty: intermediate
    question: "What is the key difference between 'Architectural Drift' and 'Architectural Erosion'?"
    options:
      - "Drift is intentional, while erosion is accidental."
      - "Drift occurs in the prescriptive architecture, while erosion occurs in the descriptive."
      - "Drift involves new decisions that don't violate rules; erosion involves direct violations of the intended architecture."
      - "Drift is structural, whereas erosion is decision-based."
    correct_index: 2
    option_feedback:
      0: |
        Drift is not necessarily intentional. The distinction is whether the new choices violate the
        intended architecture.
      1: |
        Both terms describe divergence between intended and realized architecture. Erosion is the more
        direct rule-breaking form.
      3: |
        The difference is not structural versus decision-based. Both are about how implementation
        choices relate to architectural intent.
    explanation: "**Drift** adds decisions not in the prescriptive plan but that do not break its rules; **erosion** explicitly violates those rules and constraints. Erosion is the more damaging because the realized system now directly contradicts the architecture meant to preserve its qualities."

  - id: 4
    difficulty: basic
    question: "Which term refers to the architecture as it is 'realized' in the source code and physical build artifacts?"
    options:
      - "Prescriptive Architecture"
      - "Target Architecture"
      - "Descriptive Architecture"
      - "Conceptual Architecture"
    correct_index: 2
    option_feedback:
      0: |
        Prescriptive architecture is the intended or planned architecture. The question asks for what
        actually exists in code and artifacts.
      1: |
        Target architecture is another way to talk about intended direction. It is not the observed
        as-built architecture.
      3: |
        Conceptual architecture is an abstraction used for reasoning. Descriptive architecture is the
        realized system.
    explanation: "**Descriptive architecture** is the 'as-realized' structure embodied in the actual source code and build artifacts — what was built, as opposed to the prescriptive plan for what was intended."

  - id: 5
    difficulty: intermediate
    question: "According to the literature, what happens when a system's descriptive and prescriptive architectures diverge completely?"
    options:
      - "The system becomes more flexible."
      - "It loses conceptual integrity, accumulates technical debt, and becomes unmaintainable."
      - "The descriptive architecture becomes the new prescription."
      - "The system's performance improves through ad-hoc optimizations."
    correct_index: 1
    option_feedback:
      0: |
        Complete divergence usually reduces coherence rather than increasing flexibility. Flexibility
        comes from intentional structure, not accidental inconsistency.
      2: |
        The built system can inform a new plan, but divergence alone does not automatically create a
        healthy new prescription.
      3: |
        Ad-hoc optimizations may improve one local metric, but total loss of conceptual integrity is a
        maintainability failure, not an architectural success.
    explanation: "**When descriptive and prescriptive architectures diverge completely, the system loses conceptual integrity and accumulates technical debt.** Complete divergence leaves the team without a coherent structure to reason about, so maintenance becomes increasingly expensive and may require architectural recovery or overhaul."

  - id: 6
    difficulty: intermediate
    type: single
    question: |
      A team says: "The system shall use the same PostgreSQL cluster the customer already uses for all analytics projects." How should an architect classify this statement?
    options:
      - "A high-level functional requirement, because it says what users can do."
      - "A constraint, because it is a business or technical decision already made that reduces the design space."
      - "A quality attribute, because databases always determine performance."
      - "A descriptive architecture, because it describes what the code currently does."
    correct_index: 1
    option_feedback:
      0: |
        Functional requirements describe capabilities such as booking flights or processing payments. This statement chooses part of the implementation environment.
      2: |
        The database choice may affect performance, but the statement itself is not a measurable performance requirement. It is a pre-made design decision.
      3: |
        Descriptive architecture is the architecture actually found in the built system. This statement is an input to design, not an observation of existing code.
    explanation: "**A constraint is a decision already made for the architecture.** It does not say what user-visible capability the system must provide; it narrows the set of acceptable designs before the architect starts choosing among them."

  - id: 7
    difficulty: basic
    type: single
    question: |
      Which statement best describes an **architectural driver**?
    options:
      - "Any requirement written by a stakeholder."
      - "A requirement whose change would plausibly change the architecture, usually because it is important and difficult."
      - "Any implementation detail chosen by a developer."
      - "A diagram that shows component names and connectors."
    correct_index: 1
    option_feedback:
      0: |
        Many stakeholder requirements are local or easy. Architectural drivers are the subset that materially shape the architecture.
      2: |
        Some implementation details are architectural, but most are local. Driver status comes from impact on architectural choice, not from being a code detail.
      3: |
        A diagram can document architecture, but it is not itself the input requirement that drives the design.
    explanation: "**Architecturally significant requirements are the inputs that force architecture decisions.** If changing the requirement would change the design strategy, style, deployment, or major boundaries, it is probably a driver."

  - id: 8
    difficulty: intermediate
    type: single
    question: |
      A shared C++ library appears once in the source tree. At build time, it is compiled into both the client executable and the server executable. Which view explains this cleanly?
    options:
      - "The module view shows one code module; the component-and-connector view shows two runtime components that both contain that compiled code."
      - "The component-and-connector view shows one component, because there is one source directory."
      - "The data view shows two tables, because executables are data."
      - "The behavioral view replaces both views because it contains the call order."
    correct_index: 0
    option_feedback:
      1: |
        Runtime components are deployable/executable units. One source directory can contribute code to multiple runtime components.
      2: |
        Data views describe entities, tables, records, schemas, and their relationships. They do not explain how source code maps into executables.
      3: |
        Behavioral views describe interactions over time. They do not replace structural views that answer where code lives and what executes.
    explanation: "**Module and runtime views are related but not isomorphic.** A module is a design-time code unit; a component is an independently deployable runtime unit. One module can be compiled into multiple components."

  - id: 9
    difficulty: advanced
    type: multiple
    question: |
      Which view is the best starting point for each analysis? Select all correct matches.
    options:
      - "Whether a database schema represents customers, courses, and enrollments correctly → data view."
      - "Whether a service can tolerate one process crashing and being restarted → module view."
      - "Whether information hiding is preserved across packages → module view."
      - "Whether a message protocol can deadlock because two participants wait for each other → behavioral view."
      - "Whether two deployed services exchange messages through a broker → component-and-connector view."
    correct_indices: [0, 2, 3, 4]
    option_feedback:
      0: |
        The data view is exactly the structure for entities, tables, keys, records, and semantic relationships.
      1: |
        Process crashes are runtime availability concerns. Start with component-and-connector, deployment, and behavioral views, not just module organization.
      2: |
        Information hiding is visible in module boundaries, imports, allowed-to-use relationships, and interfaces.
      3: |
        Waiting, ordering, state transitions, and protocol deadlock are behavioral concerns.
      4: |
        Deployed runtime services and broker connections are component-and-connector concerns.
    explanation: "**Each architectural view supports different claims.** Good architectural reasoning starts by choosing the view whose elements and relations match the property being analyzed."

  - id: 10
    difficulty: intermediate
    type: single
    question: |
      Attribute-Driven Design (ADD) is best summarized as:
    options:
      - "Draw all architecture diagrams first, then infer the quality attributes afterward."
      - "Iteratively select a quality attribute, refine part of the system, sketch candidate decisions, analyze trade-offs, and repeat."
      - "Choose the most popular framework and let its architectural style decide the rest."
      - "Implement the lowest-level modules first so upper layers have something concrete to call."
    correct_index: 1
    option_feedback:
      0: |
        ADD starts from drivers and quality goals, not from drawing every diagram in advance.
      2: |
        Frameworks often impose styles, but ADD is about deliberately analyzing the trade-offs rather than inheriting them blindly.
      3: |
        Bottom-up implementation order is a development strategy, not the architecture decision method described by ADD.
    explanation: "**ADD is an iterative quality-attribute-driven design loop.** It makes architecture decisions by asking which quality should improve, what part of the system is affected, and what trade-offs each candidate design creates."
