title: "UML Sequence Diagram Practice"
description: "Test your ability to read and interpret UML Sequence Diagrams."
questions:
  - id: 1
    type: single
    question: >
      What type of message is represented by a **solid line with a filled (solid) arrowhead**?

      <div data-uml-type="sequence" data-uml-spec="participant a: Client&#10;participant b: Server&#10;a -> b: request()"></div>
    options:
      - "Asynchronous message — the sender does not wait for a response."
      - "Synchronous message — the sender waits for a response before continuing."
      - "Return message — the response to a previous call."
      - "Create message — a new object is being instantiated."
    correct_index: 1
    explanation: "**A solid line with a filled arrowhead is a synchronous message — the sender blocks until the receiver finishes processing.** A solid line with a **filled arrowhead** represents a **synchronous message**. The sender blocks and waits for the receiver to finish processing before continuing. An asynchronous message uses an **open (stick) arrowhead** instead."

  - id: 2
    type: single
    question: >
      What does the **dashed line** in the diagram below represent?

      <div data-uml-type="sequence" data-uml-spec="participant a: Client&#10;participant b: Server&#10;a -> b: calculate()&#10;b --> a: result"></div>
    options:
      - "An asynchronous message from Server to Client."
      - "A dependency from Server to Client."
      - "A return message carrying a response back to the caller."
      - "A synchronous callback from Server to Client."
    correct_index: 2
    explanation: "**A dashed line with an open arrowhead is a return message, carrying the response back to the caller.** A **dashed line with an open arrowhead** represents a **return message** — the response flowing back from a called method. Return messages are optional in sequence diagrams but are shown when the return value is important to understand the interaction."

  - id: 3
    type: single
    question: >
      Which combined fragment would you use to model an **if-else** decision in a sequence diagram?

      <div data-uml-type="sequence" data-uml-spec="@startuml&#10;participant c: Client&#10;participant a: AuthService&#10;c -> a: login(user, pass)&#10;alt [credentials valid]&#10;  a --> c: token&#10;else [credentials invalid]&#10;  a --> c: error&#10;end&#10;@enduml"></div>
    options:
      - "`loop` — repeats messages while a condition is true."
      - "`opt` — executes messages only if a condition is true."
      - "`alt` — selects one of multiple branches based on guard conditions."
      - "`par` — executes messages in parallel."
    correct_index: 2
    explanation: "**`alt` models if-else logic by selecting one of multiple guarded branches — `opt` handles a simple if-without-else.** The **`alt`** (alternatives) fragment models if-else logic. It contains two or more regions separated by dashed lines, each with a guard condition. Only one region executes. The **`opt`** fragment is for a simple if-without-else."

  - id: 4
    type: single
    question: >
      Look at this diagram. How many times could the `ping()` message be sent?

      <div data-uml-type="sequence" data-uml-spec="participant app: App&#10;participant server: Server&#10;app -> server: connect()&#10;loop [1, 5]&#10;  app -> server: ping()&#10;  server --> app: ack()&#10;end"></div>
    options:
      - "Exactly 5 times."
      - "Between 1 and 5 times (inclusive)."
      - "Zero or more times."
      - "Exactly once."
    correct_index: 1
    explanation: "**`loop [1, 5]` means the enclosed messages execute between 1 and 5 times — the minimum and maximum iteration bounds.** The `loop [1, 5]` fragment specifies a **minimum of 1** and **maximum of 5** iterations. The messages inside will execute between 1 and 5 times depending on conditions at runtime."

  - id: 5
    type: multiple
    question: >
      Which of the following are **valid combined fragment types** in UML sequence diagrams? (Select all that apply.)
    options:
      - "`alt` — alternative branches"
      - "`opt` — optional execution"
      - "`if` — conditional execution"
      - "`loop` — repeated execution"
      - "`try` — exception handling"
      - "`par` — parallel execution"
    correct_indices: [0, 1, 3, 5]
    explanation: "**`alt`, `opt`, `loop`, and `par` are valid UML combined fragments — there is no `if` or `try` fragment in UML.** The valid UML combined fragment operators include **`alt`**, **`opt`**, **`loop`**, and **`par`**. There is no `if` or `try` fragment in UML — conditional logic uses `alt`/`opt`, and exception-like behavior uses the `break` fragment."

  - id: 6
    type: single
    question: >
      What does the `opt` fragment in this diagram mean?

      <div data-uml-type="sequence" data-uml-spec="participant c: Checkout&#10;participant p: Pricing Engine&#10;c -> p: calculateTotal()&#10;opt [hasPromoCode == true]&#10;  c -> p: applyDiscount()&#10;  p --> c: discountApplied()&#10;end&#10;p --> c: finalTotal()"></div>
    options:
      - "The discount is always applied after calculating the total."
      - "The discount is applied only if `hasPromoCode` is true; otherwise the messages inside are skipped entirely."
      - "The system chooses between applying the discount or returning the final total."
      - "The discount is applied repeatedly until the promo code expires."
    correct_index: 1
    explanation: "**`opt` is an if-without-else — the discount messages execute only if `hasPromoCode` is true, otherwise the entire fragment is skipped.** An **`opt` fragment** is equivalent to an `if` statement **without** an `else`. The enclosed messages execute only when the guard condition is true. If the guard is false, the entire fragment is skipped and execution continues after it."

  - id: 7
    type: single
    question: >
      In UML sequence diagrams, what does time represent?
    options:
      - "Time flows left-to-right along the horizontal axis."
      - "Time flows top-to-bottom along the vertical axis."
      - "Time is not represented; messages can occur in any order."
      - "Time flows right-to-left, with the most recent message on the left."
    correct_index: 1
    explanation: "**Time flows top-to-bottom along the vertical axis — messages higher in the diagram happen first.** In sequence diagrams, **time flows top-to-bottom** along the vertical axis. Messages higher in the diagram occur before messages lower in the diagram. The horizontal axis shows the different participants (lifelines)."

  - id: 8
    type: single
    question: >
      Which arrow style represents an **asynchronous message** where the sender does NOT wait for a response?

    options:
      - "Solid line with filled arrowhead."
      - "Dashed line with open arrowhead."
      - "Solid line with open (stick) arrowhead."
      - "Dashed line with filled arrowhead."
    correct_index: 2
    explanation: >
      **An asynchronous message uses a solid line with an open (stick) arrowhead — the sender fires and continues without waiting.** An **asynchronous message** is drawn as a solid line with an **open (stick) arrowhead**. The sender fires off the message and continues immediately without waiting. This contrasts with synchronous messages (filled arrowhead) where the sender blocks.

      <div data-uml-type='sequence' data-uml-spec='participant a: Sender&#10;participant b: Receiver&#10;a ->> b: notify()'></div>

  - id: 9
    type: single
    question: >
      What does an **activation bar** (thin rectangle on a lifeline) represent?

      <div data-uml-type="sequence" data-uml-spec="@startuml&#10;participant ui: UI&#10;participant os: OrderService&#10;participant db: Database&#10;ui -> os: placeOrder(items)&#10;os -> db: saveOrder(items)&#10;db --> os: orderId&#10;os --> ui: confirmation(orderId)&#10;@enduml"></div>
    options:
      - "The object is waiting for input and doing nothing."
      - "The object is actively performing an action or executing a method."
      - "The object has been destroyed."
      - "The object is in a suspended state."
    correct_index: 1
    explanation: "**An activation bar shows the period during which an object is actively executing — it can nest when one method call triggers another.** An **activation bar** (execution specification) shows the period during which an object is **actively processing** — executing a method, performing computation, or waiting for a sub-call to return. Activation bars can nest when one method calls another."

  - id: 10
    type: single
    question: >
      What is the correct lifeline label format for an unnamed instance of class `ShoppingCart`?

      <div data-uml-type="sequence" data-uml-spec="@startuml&#10;participant sc: ShoppingCart&#10;participant ch: Checkout&#10;sc -> ch: submit()&#10;ch --> sc: receipt&#10;@enduml"></div>
    options:
      - "`ShoppingCart`"
      - "`: ShoppingCart`"
      - "`cart: ShoppingCart`"
      - "`class ShoppingCart`"
    correct_index: 1
    explanation: "**An unnamed instance is written `: ClassName` with the colon — sequence diagrams model specific instances, not classes.** The standard UML format is `objectName : ClassName`. When the specific object name is irrelevant, you omit the name and write `: ShoppingCart` (with the colon). Sequence diagrams model interactions between **specific object instances**, not classes in general."

  - id: 11
    type: single
    question: >
      Given this Java code, which sequence diagram element represents the `new Payment(amount)` call?

      ```java
      public void makePayment(int amount) {
          Payment p = new Payment(amount);
          p.authorize();
      }
      ```

      <div data-uml-type="sequence" data-uml-spec="@startuml&#10;participant ch: Checkout&#10;participant p: Payment&#10;ch -> p: new Payment(amount)&#10;ch -> p: authorize()&#10;p --> ch: authorized&#10;@enduml"></div>
    options:
      - "A synchronous message labeled `new Payment(amount)` to an existing Payment lifeline."
      - "A create message to a new Payment lifeline that appears at the point of creation."
      - "A return message from Payment back to the caller."
      - "A loop fragment containing the Payment creation."
    correct_index: 1
    explanation: "**`new Payment(amount)` becomes a create message — the Payment lifeline starts at the point of creation, not at the top of the diagram.** Constructor calls (`new`) in code become **create messages** in sequence diagrams. The new object's lifeline starts at the point in time when it is created (placed at that vertical position), rather than appearing at the top of the diagram like pre-existing objects."

  - id: 12
    type: single
    question: >
      A sequence diagram and a class diagram are drawn for the same system. An arrow in the sequence diagram shows `order -> inventory: checkStock(itemId)`. What must be true in the class diagram?
    options:
      - "There must be an `Inventory` class with a method `checkStock(itemId)` (or its superclass must define it)."
      - "There must be a dependency arrow from Order to Inventory."
      - "Inventory must be an interface that Order realizes."
      - "Order must have an attribute of type Inventory."
    correct_index: 0
    explanation: "**The sequence diagram message requires a corresponding `checkStock(itemId)` method on the `Inventory` class because both diagrams must be consistent.** Sequence diagrams and class diagrams must be **consistent**. Every message in a sequence diagram must correspond to a method defined in the receiving object's class (or a superclass). The `Inventory` class must have a `checkStock` method that accepts the appropriate parameter type."
