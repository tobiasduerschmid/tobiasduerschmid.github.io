title: "UML Component Diagram Practice"
description: "Test your ability to read and interpret UML Component Diagrams."
questions:
  - id: 1
    type: single
    question: >
      What level of abstraction do component diagrams operate at, compared to class diagrams?
    options:
      - "Lower — component diagrams show more implementation detail than class diagrams."
      - "The same — both show classes and their relationships."
      - "Higher — component diagrams show deployable modules and their interfaces, not individual classes."
      - "Component diagrams are only used for hardware, not software."
    correct_index: 2
    option_feedback:
      0: |
        Component diagrams intentionally hide class-level detail. They are for larger architectural units such as services, libraries, modules, and databases.
      1: |
        Class diagrams and component diagrams answer different questions. A class diagram shows internal types and relationships; a component diagram shows deployable pieces and their interface connections.
      3: |
        UML component diagrams are very much for software architecture. Hardware placement belongs more naturally in deployment diagrams.
    explanation: "**Component diagrams operate at a higher level of abstraction, showing deployable modules and their interfaces rather than internal class-level details.** Component diagrams operate at a **higher level of abstraction** than class diagrams. They show deployable units (services, libraries, subsystems) and how they connect through well-defined interfaces, while class diagrams show the internal code-level structure (attributes, methods, inheritance)."

  - id: 2
    type: single
    question: >
      In a component diagram, what does a **provided interface** (lollipop/ball symbol) indicate?

      <div data-uml-type="component" data-uml-spec="@startuml&#10;component OrderService {&#10;  provide &quot;IOrderAPI&quot; as p1&#10;  require &quot;IPayment&quot; as r1&#10;}&#10;@enduml"></div>
    options:
      - "The component requires this interface from another component."
      - "The component implements and offers this interface to other components."
      - "The component has a dependency on this interface."
      - "The interface is optional and may not be implemented."
    correct_index: 1
    option_feedback:
      0: |
        A required interface is shown with the socket notation. The lollipop/ball means the component provides the service to others.
      2: |
        A dependency says one element uses another. A provided interface is stronger and more specific: the component offers an interface that clients may connect to.
      3: |
        "Provided" does not mean optional. It means this component is responsible for implementing and offering that interface.
    explanation: "**A provided interface (lollipop) means the component implements and offers this service to others; a required interface (socket) means it needs the service from elsewhere.** A **provided interface** (lollipop/ball) means the component **implements and offers** this service. Other components can connect to it. The opposite --- a **required interface** (socket) --- means the component needs this service from someone else."

  - id: 3
    type: single
    question: >
      What is the purpose of **ports** (small squares on component boundaries)?

      <div data-uml-type="component" data-uml-spec="@startuml&#10;component NotificationService {&#10;  portin &quot;requests&quot; as ns_in&#10;  portout &quot;email&quot; as ns_email&#10;  portout &quot;sms&quot; as ns_sms&#10;}&#10;@enduml"></div>
    options:
      - "They represent individual methods on the component."
      - "They are named interaction points that organize the component's interfaces into logical groups."
      - "They indicate that the component is abstract and cannot be deployed."
      - "They show the number of instances of the component."
    correct_index: 1
    option_feedback:
      0: |
        A port can expose or group interfaces, but it is not a single method. It marks a named interaction point on the component boundary.
      2: |
        Abstractness is a classifier property, not the purpose of a port. Ports describe where communication enters or leaves the component.
      3: |
        Multiplicity or deployment notation would be used for instance counts. Ports organize interaction surfaces, not how many component instances exist.
    explanation: "**Ports are named interaction points on a component's boundary that organize interfaces into logical incoming and outgoing groups.** **Ports** are named interaction points on a component's boundary. They organize interfaces into logical groups. An incoming port (**portin**) receives requests on the left edge; an outgoing port (**portout**) sends requests on the right edge."

  - id: 4
    type: single
    question: >
      When would you choose a component diagram over a class diagram?
    options:
      - "When you need to show the inheritance hierarchy of classes."
      - "When you need to show attribute types and method signatures."
      - "When you need to show the high-level deployable modules of a system and how they communicate."
      - "When you need to model the lifecycle states of a single object."
    correct_index: 2
    option_feedback:
      0: |
        Inheritance hierarchies belong in class diagrams. Component diagrams stay at the module or service level.
      1: |
        Attributes and method signatures are class-level details. A component diagram should keep attention on architectural pieces and interfaces.
      3: |
        Lifecycle behavior belongs in a state machine diagram. Component diagrams describe structural architecture, not state transitions of one object.
    explanation: "**Use a component diagram when you need to show high-level deployable modules and their interfaces — not for class-level details or object lifecycles.** Component diagrams are for **architecture-level** modeling — showing the major deployable parts (services, libraries, databases) and their connections through interfaces. Class diagrams are for **code-level** details (attributes, methods, inheritance). State machines model **object lifecycles**."

  - id: 5
    type: single
    question: >
      What does a **dashed arrow** between two components represent?

      <div data-uml-type="component" data-uml-spec="@startuml&#10;component OrderService {&#10;  portout &quot;log&quot; as os_log&#10;}&#10;component LoggingService {&#10;  portin &quot;write&quot; as ls_in&#10;}&#10;os_log ..> ls_in&#10;@enduml"></div>
    options:
      - "An assembly connector between provided and required interfaces."
      - "A dependency — one component uses or depends on another."
      - "A generalization — one component inherits from another."
      - "A bidirectional communication link."
    correct_index: 1
    option_feedback:
      0: |
        Assembly connectors connect required and provided interfaces, often with ball-and-socket or a solid connector. The dashed arrow is the weaker "uses" dependency notation.
      2: |
        Generalization uses a hollow triangle arrowhead. A dashed dependency arrow does not mean inheritance.
      3: |
        A dashed arrow is directed from the dependent element toward what it uses. It does not by itself mean two-way communication.
    explanation: "**A dashed arrow represents a dependency — a weaker 'uses' relationship, as opposed to solid assembly connectors for primary interface connections.** A **dashed arrow** (<span class=\"uml-sym\" data-diagram=\"class\" data-sym=\"..>\"></span>) represents a **dependency** — a weaker relationship where one component uses another (e.g., for logging, metrics). This is the same notation as class diagram dependencies. Solid arrows (<span class=\"uml-sym\" data-diagram=\"class\" data-sym=\"-->\"></span>) represent assembly connectors for primary communication pathways."

  - id: 6
    type: multiple
    question: >
      Which of the following are valid elements in a UML Component Diagram? (Select all that apply.)
    options:
      - "Components (rectangles with component icon)"
      - "Provided interfaces (lollipop/ball)"
      - "Required interfaces (socket/half-circle)"
      - "Ports (small squares on component boundary)"
      - "Lifelines (dashed vertical lines)"
      - "Assembly connectors (solid arrows between interfaces)"
    correct_indices: [0, 1, 2, 3, 5]
    option_feedback:
      0: |
        Components are the central element of a component diagram: they represent larger replaceable or deployable software units.
      1: |
        Provided interfaces are valid component-diagram elements; they show services a component offers.
      2: |
        Required interfaces are valid component-diagram elements; they show services a component needs from elsewhere.
      3: |
        Ports are valid when the diagram needs named interaction points on a component boundary.
      4: |
        Lifelines are sequence-diagram elements. They show participants over time, not component-level architecture.
      5: |
        Assembly connectors are valid; they show a required interface being connected to a compatible provided interface.
    explanation: "**Component diagrams contain components, provided/required interfaces, ports, and assembly connectors — lifelines belong in sequence diagrams, not here.** Component diagrams contain **components**, **provided interfaces** (ball), **required interfaces** (socket), **ports** (squares), and **assembly connectors** (arrows). **Lifelines** belong in sequence diagrams, not component diagrams."

  - id: 7
    type: single
    question: >
      What does the ball-and-socket notation (assembly connector) represent?

      <div data-uml-type="component" data-uml-spec="@startuml&#10;component ShoppingCart {&#10;  require &quot;IPayment&quot; as r1&#10;}&#10;component StripeGateway {&#10;  provide &quot;IPayment&quot; as p1&#10;}&#10;r1 --> p1&#10;@enduml"></div>
    options:
      - "A component inherits from another component."
      - "A required interface on one component is connected to a matching provided interface on another component."
      - "Two components share the same database."
      - "A component is deployed on a specific server."
    correct_index: 1
    option_feedback:
      0: |
        Inheritance is shown with generalization notation, not ball-and-socket. Ball-and-socket connects needed and offered interfaces.
      2: |
        Sharing a database might be shown as both components depending on or connecting to a database component. The ball-and-socket specifically means a required interface is satisfied.
      3: |
        Deployment on servers is modeled with deployment diagrams and nodes. This connector is about interface compatibility between components.
    explanation: "**The ball-and-socket connector links a required interface to a matching provided interface, showing the dependency is satisfied through loose coupling.** The **ball-and-socket** (assembly connector) links a component's **required interface** (socket) to another component's **provided interface** (ball). This shows the dependency is satisfied and enables **loose coupling** — components depend on interfaces, not specific implementations."

  - id: 8
    type: single
    question: >
      A system has a `ShoppingCart` component that needs payment processing, and a `StripeGateway` component that provides it. If you want to later swap `StripeGateway` for `PayPalGateway`, what UML concept enables this?

      <div data-uml-type="component" data-uml-spec="@startuml&#10;component ShoppingCart {&#10;  require &quot;IPayment&quot; as r1&#10;}&#10;component StripeGateway {&#10;  provide &quot;IPayment&quot; as p1&#10;}&#10;component PayPalGateway {&#10;  provide &quot;IPayment&quot; as p2&#10;}&#10;r1 --> p1&#10;@enduml"></div>
    options:
      - "Generalization — PayPalGateway inherits from StripeGateway."
      - "Provided/required interfaces — ShoppingCart requires `IPayment`, and any component providing `IPayment` can be substituted."
      - "Dependency — add a dashed arrow from ShoppingCart to PayPalGateway."
      - "Composition — embed PayPalGateway inside ShoppingCart."
    correct_index: 1
    option_feedback:
      0: |
        Substitutability here does not require payment gateways to inherit from each other. They can be separate components that provide the same required interface.
      2: |
        A dependency arrow would show that one component uses another, but it would tie the cart to a particular provider. Depending on `IPayment` keeps the provider replaceable.
      3: |
        Embedding a gateway inside the cart would make replacement harder and blur component boundaries. The point is to depend on an interface supplied by an external component.
    explanation: "**Provided/required interfaces enable substitutability — any component providing `IPayment` can replace StripeGateway without changing ShoppingCart.** The **provided/required interface** pattern enables substitutability. If `ShoppingCart` requires `IPayment` and `StripeGateway` provides it, any other component that provides `IPayment` (like `PayPalGateway`) can be substituted without changing `ShoppingCart`. This is the key architectural benefit of component diagrams."
