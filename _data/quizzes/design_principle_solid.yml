title: "SOLID Design Principles Quiz"
description: "Test your ability to apply and evaluate the five SOLID principles — with an emphasis on the Single Responsibility and Liskov Substitution Principles."
active: true
questions:
  - id: 1
    difficulty: basic
    type: single
    question: |
      Which of the following best captures the **modern** formulation of the Single Responsibility Principle (SRP)?
    options:
      - "A class should contain only one public method"
      - "A module should be responsible to one, and only one, actor — a single stakeholder or group that requests changes"
      - "A class should be describable in one sentence without using the word 'and'"
      - "A class should have no more than 200 lines of code"
    correct_index: 1
    option_feedback:
      0: |
        A one-method rule can split cohesive behavior into artificial fragments. SRP is about one actor
        or reason for change, not method count.
      2: |
        The one-sentence test is a rough smell, not the modern formulation. Grammar does not
        reliably identify who will request changes.
      3: |
        Line count can correlate with complexity, but it is not SRP. A short class can serve multiple
        actors, and a longer class can still have one reason to change.
    explanation: "The refined definition centers on **people, not grammar**. SRP is about actors — Accounting, HR, DBAs, compliance, etc. A class serving multiple actors will be pulled in conflicting directions, and a change requested by one actor may silently break another's feature. 'One method', 'no ands', and line-count rules are all folk-theoretic proxies that routinely misfire."

  - id: 2
    difficulty: intermediate
    type: single
    question: |
      You review this class:

      ```java
      class Invoice {
          BigDecimal calculateTax()       // tax logic, changed by Accounting
          String renderHtml()             // layout, changed by the Web team
          void saveToDatabase()           // persistence, changed by the DBA team
      }
      ```

      What is the BEST refactor, given SRP?
    options:
      - "Split methods into three separate classes (`TaxCalculator`, `InvoiceRenderer`, `InvoiceRepository`) that operate on a shared `InvoiceData` structure"
      - "Mark `calculateTax` and `saveToDatabase` as `private` so only `renderHtml` is public"
      - "Inline all three methods into a single `process()` method to reduce the surface area"
      - "Keep the class as-is; SRP is only about classes with a single method"
    correct_index: 0
    option_feedback:
      1: |
        Changing visibility does not change the reasons the code must change. Accounting, web layout,
        and persistence changes would still collide in the same class.
      2: |
        Inlining hides the boundaries even more. One larger method would still mix tax, rendering, and
        persistence concerns requested by different actors.
      3: |
        SRP is not a rule that classes have one method. A class can have many methods if they all answer
        to the same actor.
    explanation: "Three different actors (Accounting, Web, DBA) each request changes to `Invoice` for unrelated reasons. The canonical SRP refactor is to extract one class per actor around a shared data record. Visibility modifiers do not reduce the *axes of change*; inlining all three methods into one makes the tangle worse; treating SRP as 'one method per class' is what the chapter explicitly debunks."

  - id: 3
    difficulty: advanced
    type: single
    question: |
      A teammate refactors a 40-line `OrderValidator` class into three micro-classes: `OrderValidator`, `OrderAuditLogger`, and `OrderErrorFormatter`. In practice, all three change **only** when the order business rules change — and always together.
      Evaluating this refactor against SRP:
    options:
      - "It is a good SRP application — more classes always means better SRP compliance"
      - "It violates SRP because no class has exactly one public method"
      - "It is a poor SRP application: if the three pieces always change together for the same reason, there is only **one** actor, and the split is artificial abstraction"
      - "It is neutral: SRP has nothing to say about splits that don't change the set of actors"
    correct_index: 2
    option_feedback:
      0: |
        More classes are not automatically better SRP. If all pieces change together for the same
        business-rule reason, the split adds coordination cost without isolating change.
      1: |
        Public method count is not the relevant axis. The question is whether the code has separate
        actors or reasons to change.
      3: |
        SRP does have something to say: if the split does not isolate an independent reason to change,
        it may be needless abstraction.
    explanation: "SRP is about *axes of change*, not file count. If three classes always move together for the same reason, they serve **one** actor — and splitting them doubles maintenance cost with no benefit. This is premature separation: wait for the second actor to appear before extracting."

  - id: 4
    difficulty: intermediate
    type: single
    question: |
      Which argument for SRP is **strongest** from a team-productivity perspective?
    options:
      - "It guarantees that every class fits on one screen"
      - "It reduces merge conflicts by ensuring that changes requested by different stakeholders edit different files"
      - "It enforces the use of dependency injection frameworks"
      - "It prevents the creation of any class with more than one field"
    correct_index: 1
    option_feedback:
      0: |
        Fitting on one screen is a readability preference, not SRP’s strongest team benefit. The
        important issue is isolating stakeholder-driven changes.
      2: |
        Dependency injection can support other designs, but SRP does not require a framework. The
        productivity benefit comes from separating change axes.
      3: |
        Field count does not measure responsibility. A class with one field can still serve several
        actors, and a class with several fields can remain cohesive.
    explanation: "The practical team-level payoff of SRP is **merge-conflict reduction and fault isolation**: when Finance requests a tax change, they edit a file that HR never touches, so HR's feature cannot be accidentally broken. The other options confuse SRP with unrelated stylistic rules (screen size, DI tooling, field count)."

  - id: 5
    difficulty: intermediate
    type: single
    question: |
      According to Liskov's Design-by-Contract formulation, a subclass method must:
    options:
      - "Strengthen preconditions and strengthen postconditions relative to the parent"
      - "Weaken preconditions (accept same-or-wider input) and strengthen postconditions (guarantee same-or-stricter output), while preserving invariants"
      - "Override every non-abstract method of its parent"
      - "Throw checked exceptions for all invalid inputs the parent accepted"
    correct_index: 1
    option_feedback:
      0: |
        Strengthening preconditions makes callers do more than the parent required, which can break code
        written against the parent type.
      2: |
        A subtype does not need to override every inherited method. It needs to preserve the behavioral
        contract of the methods clients rely on.
      3: |
        Throwing for inputs the parent accepted strengthens the precondition. That is exactly the kind
        of substitution break LSP forbids.
    explanation: "The classic LSP rules: **preconditions may not be strengthened**, **postconditions may not be weakened**, **invariants must be preserved**. A subclass that demands more from its caller or promises less to its caller silently breaks code written against the parent."

  - id: 6
    difficulty: intermediate
    type: single
    question: |
      Consider this code:

      ```java
      class Bird        { void fly() { /* soar */ } }
      class Ostrich extends Bird {
          void fly() { throw new UnsupportedOperationException(); }
      }

      void release(List<Bird> birds) { for (Bird b : birds) b.fly(); }
      ```

      Which fix best addresses the LSP violation without introducing a new one?
    options:
      - "Catch and swallow the exception inside `release()` so the loop continues"
      - "Add an `isOstrich()` check in `release()` and skip those objects"
      - "Extract a `FlyingBird` interface; only flying species implement it, and `release()` is typed to `List<FlyingBird>`"
      - "Make `Bird.fly()` abstract and have `Ostrich.fly()` return `null`"
    correct_index: 2
    option_feedback:
      0: |
        Catching the exception hides the broken type relationship instead of fixing it. Client code
        would still need defensive knowledge about birds that cannot fly.
      1: |
        Adding type checks spreads the taxonomy problem into clients. The type system should express
        which objects can be released as flying things.
      3: |
        Returning `null` from `fly()` still leaves `Ostrich` in a type position where clients expect
        flight behavior. The contract remains misleading.
    explanation: "The real problem is the **taxonomy**: `Ostrich` is-a bird but is-not-a flying thing. Segregating `FlyingBird` aligns the type hierarchy with behavior, eliminating the need for clients to defensive-check (which is itself an LSP symptom)."

  - id: 7
    difficulty: advanced
    type: single
    question: |
      You are asked to review this subclass contract:

      ```java
      class Queue           { void enqueue(Object x) { /* accepts any non-null */ } }
      class StringQueue extends Queue {
          @Override void enqueue(Object x) {
              if (!(x instanceof String)) throw new IllegalArgumentException();
              // ...
          }
      }
      ```

      Which LSP rule does `StringQueue` violate, and why?
    options:
      - "It weakens the precondition — `StringQueue` accepts a wider set of inputs than `Queue`"
      - "It strengthens the precondition — `StringQueue` rejects inputs that the parent `Queue` accepts, so code written against `Queue` may suddenly fail"
      - "It weakens the postcondition — the return value is less specific"
      - "It violates no rule, because Java's generics would catch this at compile time"
    correct_index: 1
    option_feedback:
      0: |
        The subclass accepts fewer inputs, not more. It rejects non-string objects that the parent
        promised to accept.
      2: |
        There is no return-value postcondition involved here. The failure is the narrowed input
        requirement.
      3: |
        The example uses `Object` and runtime checks; generics do not automatically save a subtype that
        changes the parent’s accepted inputs.
    explanation: "`Queue.enqueue` accepts any non-null `Object`; `StringQueue.enqueue` narrows that to `String`. A client holding a `Queue` reference that was in fact a `StringQueue` will throw at runtime on previously-legal calls — **strengthened precondition**, the most common LSP violation in practice. This is exactly why Java's `Stack extends Vector` is cited in the chapter as a legacy LSP mistake."

  - id: 8
    difficulty: advanced
    type: single
    question: |
      The chapter says a `Square` class can **perfectly** enforce its own geometric invariants and still violate LSP when used in place of a `Rectangle`. Which statement best explains *why*?
    options:
      - "Mathematical squares are not rectangles; the real-world taxonomy is wrong"
      - "LSP is judged from the perspective of the **client's expectations of the parent type** — if client code relies on width and height mutating independently, any subtype that couples them breaks that expectation"
      - "`Square` will throw a `NullPointerException` when `setWidth` is called"
      - "A `Square` class is always slower than a `Rectangle` class at runtime"
    correct_index: 1
    option_feedback:
      0: |
        In ordinary mathematics a square is a rectangle, but LSP is about software contracts. The parent
        API may promise independent width and height mutation.
      2: |
        A null-pointer failure is not the issue. The square can be internally valid and still surprise
        clients of the rectangle API.
      3: |
        Runtime speed is irrelevant to the substitution problem. The issue is whether parent-type
        clients can rely on the same behavior.
    explanation: "The Square/Rectangle lesson is subtle: *self-consistency is not enough*. LSP is evaluated by the contracts that **clients of the parent** have implicitly written into their code (e.g., an area-assertion test that assumes setting width leaves height alone). Any subtype that surprises those clients — even if internally coherent — violates LSP. The fix is making `Square` and `Rectangle` siblings of a common `Shape` interface."

  - id: 9
    difficulty: intermediate
    type: single
    question: |
      A `ShippingCostCalculator` uses a long `switch` on `carrier` (UPS, FedEx, USPS). Management wants to add DHL next week.
      Which refactor best satisfies the Open/Closed Principle?
    options:
      - "Add a `case \"DHL\"` branch — it's just one more line"
      - "Define a `Carrier` interface with a `cost(order)` method; make UPS, FedEx, USPS, and DHL concrete implementations; the calculator dispatches polymorphically without a switch"
      - "Copy the class into `ShippingCostCalculatorV2` and modify the new copy"
      - "Use reflection to invoke carrier-specific methods by string name"
    correct_index: 1
    option_feedback:
      0: |
        Adding another branch modifies the same tested calculator every time a carrier appears. OCP asks
        whether new variants can be added without editing that policy code.
      2: |
        Copying the class creates duplicated policy and makes future fixes diverge. It avoids
        modification by multiplying maintenance burden.
      3: |
        Reflection keeps the stringly-typed dependency and adds fragility. It does not create a stable
        abstraction for carrier behavior.
    explanation: "OCP = **open for extension, closed for modification**. Strategy/polymorphism lets you add a new `Carrier` without touching calculator code."

  - id: 10
    difficulty: advanced
    type: single
    question: |
      A `Printer` interface exposes `print()`, `scan()`, `fax()`, and `staple()`. A simple home printer class must implement all four but throws `UnsupportedOperationException` on `scan`, `fax`, and `staple`.
      Which SOLID principle is most directly violated, and what is the correct fix?
    options:
      - "LSP — because the home printer returns early; fix by caching the result"
      - "ISP — clients and implementers are forced to depend on methods they don't use; fix by segregating into role-specific interfaces like `Printable`, `Scannable`, `Faxable`, `Stapleable`"
      - "DIP — because `Printer` is concrete; fix by making it abstract"
      - "SRP — because the interface has four methods; fix by giving it only one"
    correct_index: 1
    option_feedback:
      0: |
        The exception is a symptom, but caching does not address the interface forcing devices to expose
        operations they cannot support.
      2: |
        Making a concrete type abstract does not invert dependencies by itself. The problem is that
        clients and implementers depend on too many unrelated methods.
      3: |
        The issue is not simply that the interface has four methods. It is that those methods belong to
        different client roles and should not be forced on every implementer.
    explanation: "Though the `throw` also breaks LSP, the *root cause* is a fat interface — the textbook Interface Segregation symptom. Splitting into cohesive role interfaces means clients depend only on what they need, and simple devices need only implement `Printable`. Treating SRP as a method-count rule is what the chapter debunks; DIP is about the direction of dependencies, not interface size."

  - id: 11
    difficulty: advanced
    type: single
    question: |
      Which scenario shows the **correct** application of the Dependency Inversion Principle?
    options:
      - "The `OrderService` imports `MySqlOrderRepository` directly so the database can be queried efficiently"
      - "The `OrderService` defines an `OrderRepository` interface tailored to its needs; `MySqlOrderRepository` implements this interface; in tests, an `InMemoryOrderRepository` is swapped in"
      - "A Spring `@Autowired` annotation is added to every field in `OrderService`, guaranteeing DIP"
      - "`MySqlOrderRepository` defines the interface, and `OrderService` conforms to it"
    correct_index: 1
    option_feedback:
      0: |
        This makes business policy depend directly on a database detail. DIP asks high-level policy to
        depend on an abstraction it owns.
      2: |
        Dependency injection annotations do not guarantee dependency inversion. If the injected types
        are concrete infrastructure details, the dependency direction is still wrong.
      3: |
        If infrastructure defines the interface, the abstraction often mirrors the database. The
        high-level service should define the contract it needs.
    explanation: "DIP requires that **the high-level module owns the abstraction**. When business logic declares the interface it needs and infrastructure conforms, the dependency direction runs from concrete to abstract — exactly what DIP prescribes."

  - id: 12
    difficulty: expert
    type: single
    question: |
      The chapter argues SOLID principles **reinforce** each other. Which pairing below best captures a genuine dependency between two principles?
    options:
      - "SRP requires DIP: you cannot have one responsibility without dependency injection"
      - "LSP enables OCP: if subtypes honor their parents' contracts, a router can iterate polymorphically over them without modification when a new subtype is added"
      - "ISP replaces DIP: segregated interfaces make dependency inversion unnecessary"
      - "OCP implies SRP: code closed for modification automatically has a single reason to change"
    correct_index: 1
    option_feedback:
      0: |
        SRP does not require dependency injection. A module can have one actor without using a DI
        container or inversion pattern.
      2: |
        ISP and DIP solve different problems. Small client-specific interfaces do not remove the need to
        keep policy from depending on concrete details.
      3: |
        Being closed to modification does not prove there is only one reason to change. OCP and SRP
        reinforce each other, but neither automatically implies the other.
    explanation: "LSP → OCP is the cleanest dependency: safe polymorphism is what lets a client stay *closed for modification* while the system remains *open for extension* via new subtypes."
