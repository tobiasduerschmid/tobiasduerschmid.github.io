title: "UML State Machine Diagram Practice"
description: "Test your ability to read and interpret UML State Machine Diagrams."
questions:
  - id: 1
    type: single
    question: >
      What does the **solid black circle** represent in a state machine diagram?

      <div data-uml-type="state" data-uml-spec="[*] --> Idle : powerOn()&#10;Idle --> Active : start()"></div>
    options:
      - "A regular state named 'Start'."
      - "The initial pseudostate — the entry point of the state machine."
      - "The final state — the end of the object's lifecycle."
      - "A choice point for conditional branching."
    correct_index: 1
    explanation: "**The solid black circle is the initial pseudostate marking the entry point — the final state uses a different bullseye symbol (◎).** A **solid black circle** (<span class=\"uml-sym\" data-diagram=\"state\" data-sym=\"[*]\"></span>) is the **initial pseudostate**. It marks where the state machine begins. There is always exactly one initial pseudostate, and it must have exactly one outgoing transition (with no trigger). The **final state** is a different symbol: a solid circle inside a hollow circle (◎)."

  - id: 2
    type: single
    question: >
      Given the transition label `buttonPressed [isEnabled] / playSound()`, which part is the **guard condition**?

      <div data-uml-type="state" data-uml-spec="@startuml&#10;[*] --> Idle&#10;Idle --> Running : startButton [isReady] / initDisplay()&#10;Running --> Idle : stopButton / saveState()&#10;@enduml"></div>
    options:
      - "`buttonPressed`"
      - "`[isEnabled]`"
      - "`/ playSound()`"
      - "`buttonPressed [isEnabled]`"
    correct_index: 1
    explanation: "**The guard condition is `[isEnabled]` — the boolean in square brackets that must be true for the transition to fire.** The transition syntax is `Event [Guard] / Effect`. The **guard** is `[isEnabled]` — a boolean condition in square brackets that must be true for the transition to fire. `buttonPressed` is the event (trigger), and `/ playSound()` is the effect (action executed during the transition)."

  - id: 3
    type: single
    question: >
      In this diagram, what happens if `threatDetected` occurs but `sysCheckOK` is **false**?

      <div data-uml-type="state" data-uml-spec="[*] --> Idle : powerOn()&#10;Idle --> CombatMode : threatDetected [sysCheckOK] / deployUI()&#10;CombatMode --> Idle : threatNeutralized / retractWeapons()"></div>
    options:
      - "The system transitions to CombatMode anyway, but without calling deployUI()."
      - "The system remains in the Idle state — the transition does not fire."
      - "The system enters an error state."
      - "The system transitions to the final state."
    correct_index: 1
    explanation: "**When the guard `[sysCheckOK]` is false, the transition does not fire and the system remains in Idle.** When a guard condition evaluates to **false**, the transition is **not taken** and the object stays in its current state. The event is effectively ignored. The system remains in **Idle** until the event occurs again with the guard satisfied."

  - id: 4
    type: multiple
    question: >
      Which of the following are valid components of a UML transition label? (Select all that apply.)

      Syntax: `Event [Guard] / Effect`
    options:
      - "Event — the trigger that causes the transition"
      - "Guard — a boolean condition in square brackets"
      - "Effect — an action executed during the transition"
      - "State — the name of the target state"
      - "Priority — a number indicating transition precedence"
    correct_indices: [0, 1, 2]
    explanation: "**A UML transition label consists of Event, Guard, and Effect — all optional; the target state is shown by the arrow, and there is no priority field.** A UML transition label has three optional parts: **Event** (trigger), **Guard** (boolean condition in `[]`), and **Effect** (action after `/`). All three are optional — you can have a transition with just a guard, just an event, or any combination. The target state is shown by the arrow's destination, not the label. There is no priority concept."

  - id: 5
    type: single
    question: >
      What does the symbol ◎ (a filled circle inside a hollow circle) represent?

      <div data-uml-type="state" data-uml-spec="[*] --> Active : create()&#10;Active --> [*] : destroy()"></div>
    options:
      - "The initial pseudostate — where the state machine starts."
      - "A history state — remembers the last active substate."
      - "The final state — the end of the object's lifecycle."
      - "A choice pseudostate — a conditional branch point."
    correct_index: 2
    explanation: "**The bullseye symbol ◎ is the final state marking the end of the object's lifecycle — different from the solid black initial pseudostate ●.** The **bullseye symbol** (<span class='uml-sym' data-diagram='state' data-sym='final'></span>) is the **final state**. It indicates that the object's lifecycle has ended. This is different from the **initial pseudostate** (solid black circle ●), which marks where the state machine begins."

  - id: 6
    type: single
    question: >
      Which of these is a well-named state according to UML conventions?

      <div data-uml-type="state" data-uml-spec="@startuml&#10;[*] --> WaitingForInput&#10;WaitingForInput --> Processing : submitForm&#10;Processing --> DisplayingResults : dataLoaded&#10;DisplayingResults --> WaitingForInput : reset&#10;DisplayingResults --> [*] : logout&#10;@enduml"></div>
    options:
      - "`Login`"
      - "`WaitingForInput`"
      - "`doPayment`"
      - "`check_status`"
    correct_index: 1
    explanation: "**State names should be present-participial or noun phrases describing a condition — `WaitingForInput` is correct; action verbs like `Login` or `doPayment` are not.** State names should use **present-participial phrases** (e.g., *WaitingForInput*, *Processing*) or **noun phrases** (e.g., *Active*, *Idle*). `Login` is a verb (an action, not a condition of being). `doPayment` and `check_status` are also action verbs. A state represents a *condition or situation*, not an action."

  - id: 7
    type: single
    question: >
      When should you choose a **state machine diagram** over a **sequence diagram**?
    options:
      - "When you want to show interactions between multiple objects over time."
      - "When you want to model how a single object's behavior changes based on its current condition."
      - "When you want to show the physical deployment of software components."
      - "When you want to model a business workflow with swim lanes."
    correct_index: 1
    explanation: "**A state machine diagram is correct when you need to model how a single object's behavior changes based on its current condition.** State machine diagrams model the **lifecycle of a single object** — how it responds differently to events based on its current state. Sequence diagrams show **interactions between multiple objects**. Activity diagrams model **workflows/processes**. Deployment diagrams show **physical infrastructure**."

  - id: 8
    type: single
    question: >
      Look at this diagram. What is the **effect** that executes when transitioning from CombatMode to Idle?

      <div data-uml-type="state" data-uml-spec="[*] --> Idle : powerOn()&#10;Idle --> CombatMode : threatDetected [sysCheckOK] / deployUI()&#10;CombatMode --> Idle : threatNeutralized / retractWeapons()&#10;CombatMode --> EmergencyPower : powerCritical / rerouteToLifeSupport()&#10;EmergencyPower --> [*] : manualOverride()"></div>
    options:
      - "`threatNeutralized`"
      - "`deployUI()`"
      - "`retractWeapons()`"
      - "`manualOverride()`"
    correct_index: 2
    explanation: "**The effect for CombatMode → Idle is `retractWeapons()` — the action after the `/` in the transition label `threatNeutralized / retractWeapons()`.** The transition from CombatMode to Idle is labeled `threatNeutralized / retractWeapons()`. Using the syntax `Event [Guard] / Effect`, the effect is **`retractWeapons()`** — the action executed as the transition occurs. `threatNeutralized` is the event (trigger)."

  - id: 9
    type: single
    question: >
      How many **states** (not counting the initial pseudostate or final state) are in this diagram?

      <div data-uml-type="state" data-uml-spec="[*] --> Created : orderPlaced&#10;Created --> Paid : paymentReceived&#10;Paid --> Shipped : itemDispatched&#10;Shipped --> Delivered : deliveryConfirmed&#10;Created --> Cancelled : customerCancels&#10;Delivered --> [*]&#10;Cancelled --> [*]"></div>
    options:
      - "3"
      - "4"
      - "5"
      - "6"
    correct_index: 2
    explanation: "**There are 5 regular states — Created, Paid, Shipped, Delivered, and Cancelled — because the initial pseudostate and final states do not count as regular states.** There are **5 regular states**: Created, Paid, Shipped, Delivered, and Cancelled. The solid black circle (initial pseudostate) and the bullseye symbols (final states) are **pseudostates**, not regular states."

  - id: 10
    type: single
    question: >
      In this diagram, which transition has **both** a guard condition and an effect?

      <div data-uml-type="state" data-uml-spec="[*] --> Idle : powerOn()&#10;Idle --> CombatMode : threatDetected [sysCheckOK] / deployUI()&#10;CombatMode --> Idle : threatNeutralized / retractWeapons()&#10;CombatMode --> EmergencyPower : powerCritical / rerouteToLifeSupport()"></div>
    options:
      - "Idle to CombatMode"
      - "CombatMode to Idle"
      - "CombatMode to EmergencyPower"
      - "Initial to Idle"
    correct_index: 0
    explanation: "**The Idle → CombatMode transition is the only one with all three parts: event (`threatDetected`), guard (`[sysCheckOK]`), and effect (`/ deployUI()`).** The transition from **Idle to CombatMode** is labeled `threatDetected [sysCheckOK] / deployUI()`. It has all three parts: event (`threatDetected`), guard (`[sysCheckOK]`), and effect (`/ deployUI()`). The other transitions have an event and effect but no guard condition."

  - id: 11
    type: multiple
    question: >
      Which of the following are **true** about the initial pseudostate (<span class="uml-sym" data-diagram="state" data-sym="[*]"></span>) in a state machine diagram? (Select all that apply.)
    options:
      - "It represents the starting point of the state machine."
      - "It can have multiple outgoing transitions."
      - "Its outgoing transition should have no event trigger."
      - "It is a regular state where the object can remain indefinitely."
      - "There must be exactly one initial pseudostate per state machine (or per region)."
    correct_indices: [0, 2, 4]
    explanation: "**The initial pseudostate marks the entry point, must have exactly one trigger-free outgoing transition, and is not a regular state the object can remain in.** The initial pseudostate (<span class=\"uml-sym\" data-diagram=\"state\" data-sym=\"[*]\"></span>) marks the **entry point** of the state machine. It must have **exactly one** outgoing transition, and that transition should have **no event trigger** (it fires automatically). The initial pseudostate is NOT a regular state — the object passes through it immediately."

  - id: 12
    type: single
    question: >
      What is the difference between an `entry/` internal activity and an effect on a transition (`/ action`)?

      <div data-uml-type="state" data-uml-spec="@startuml&#10;[*] --> Connecting : connect()&#10;Connecting : entry/ showSpinner()&#10;Connecting : exit/ hideSpinner()&#10;Connecting --> Connected : handshakeOK / logSuccess()&#10;Connecting --> Error : timeout / logError()&#10;@enduml"></div>
    options:
      - "There is no difference; they are the same thing."
      - "The entry/ action runs every time the state is entered (from any transition), while a transition effect only runs during that specific transition."
      - "The entry/ action runs before the transition, while the effect runs after."
      - "The entry/ action is optional, while transition effects are mandatory."
    correct_index: 1
    explanation: "**An entry/ action runs on every incoming transition; a transition effect runs only for that specific transition.** An **entry/** action runs every time the state is entered, regardless of which incoming transition was taken. A **transition effect** (`/ action`) runs only when that specific transition fires. If a state has three incoming transitions, the entry/ action runs for all three, but each transition's effect only runs for its own transition."

  - id: 13
    type: single
    question: >
      Does every state machine diagram need a **final state**?

      <div data-uml-type="state" data-uml-spec="@startuml&#10;[*] --> Listening : start()&#10;Listening --> Processing : requestReceived&#10;Processing --> Listening : requestHandled&#10;@enduml"></div>
    options:
      - "Yes — every state machine must have both an initial and a final state."
      - "No — a final state is only needed if the object's lifecycle can actually end."
      - "No — state machines never have final states."
      - "Yes — but only if the state machine has more than 3 states."
    correct_index: 1
    explanation: "**A final state is only needed if the object's lifecycle can actually end — servers and controllers that run indefinitely do not need one.** A state machine **always** needs an initial pseudostate (the starting point), but a final state is **only needed if the object's lifecycle can end**. Many real-world objects (servers, embedded controllers) run indefinitely and never reach a final state. Objects like orders or transactions do have a clear end-of-life."
