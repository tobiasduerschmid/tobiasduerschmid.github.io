title: "Version Control and Git Quiz"
description: "Test your knowledge of core version control concepts, Git architecture, branching strategies, and advanced commands."
active: true
questions:
  - id: 1
    difficulty: basic
    question: "Which of the following best describes the core difference between centralized and distributed version control systems (like Git)?"
    options:
      - "Distributed systems require a constant internet connection to the central server to make any changes."
      - "In distributed systems, each developer has a full, local copy of the entire repository and its history."
      - "Centralized systems are generally considered the best practice for massive, globally distributed open-source projects."
      - "Centralized systems make branching and merging faster than distributed systems because there is only one source of truth."
    correct_index: 1
    option_feedback:
      0: |
        Git can commit and inspect history locally because each clone has the repository history, even
        if teams later share through a remote.
      2: |
        A single source of truth can be useful, but distributed history is precisely what made large
        open-source collaboration practical.
      3: |
        Git branching is cheap because branches are lightweight refs to commits, not because a central
        server serializes all work.
    explanation: "**Distributed VCS gives every developer a full local copy of the entire repository and its history, enabling offline work and independent development.** This defines the distributed model, giving developers offline access to the full project history and the ability to work independently."

  - id: 2
    difficulty: basic
    question: "What are the three primary local states that a file can reside in within a standard Git workflow?"
    options:
      - "Untracked, Tracked, and Ignored"
      - "Main Branch, Feature Branch, and Remote Server"
      - "Working Directory, Staging Area, and Local Repository"
      - "Uploaded, Downloaded, and Synced"
    correct_index: 2
    option_feedback:
      0: |
        Untracked, tracked, and ignored describe how Git classifies files; they are not the three places
        changes move through before a commit.
      1: |
        Branches and remotes name histories and sharing locations; they are not local areas holding a
        file version.
      3: |
        Git's local workflow is about working tree, index, and committed snapshots, not upload/download
        status.
    explanation: "**The three local areas are the Working Directory (files on disk), the Staging Area (prepped for commit), and the Local Repository (committed history).** Files are edited in the working directory, moved to the staging area to prep for a snapshot, and finally committed to the local repository."

  - id: 3
    difficulty: basic
    question: "What does the command `git diff HEAD` compare?"
    options:
      - "The working directory to the staging area."
      - "The staging area to the remote repository."
      - "The latest commit to the commit immediately before it."
      - "The working directory to the latest commit."
    correct_index: 3
    option_feedback:
      0: |
        `git diff` without `HEAD` compares working tree to the index; adding `HEAD` compares against the
        latest commit snapshot.
      1: |
        `HEAD` is local; comparing to a remote requires naming a remote ref such as `origin/main`.
      2: |
        Comparing the latest commit to its parent is a history inspection task, not what `git diff HEAD`
        does to uncommitted work.
    explanation: "**`git diff HEAD` compares the current working directory (including staged changes) against the latest commit.** Adding `HEAD` tells Git to compare the uncommitted files currently on your disk with the snapshot of the most recent commit."

  - id: 4
    difficulty: basic
    question: "Which Git command should you NEVER use on a shared branch because it can permanently overwrite and destroy work pushed by other team members?"
    options:
      - "`git pull`"
      - "`git fetch`"
      - "`git push -f`"
      - "`git merge --squash`"
    correct_index: 2
    option_feedback:
      0: |
        `git pull` can create conflicts or merge commits, but it does not overwrite shared history the
        way a force push can.
      1: |
        `git fetch` downloads remote objects and updates remote-tracking refs locally; it does not
        publish or delete teammates' commits.
      3: |
        Squashing changes commit shape during integration, but it is not the command that overwrites an
        existing remote branch ref.
    explanation: "**`git push -f` is dangerous on shared branches because it overwrites the remote branch history and can hide or orphan collaborators' commits.** Force-pushing makes the remote branch match your local history, which can remove teammates' commits from that branch and disrupt anyone who based work on them. Those commits may still be recoverable from another clone or reflog, but the shared branch has been rewritten."

  - id: 5
    difficulty: intermediate
    question: "You have some uncommitted, incomplete changes in your working directory, but you need to switch to another branch to urgently fix a bug. Which command is best suited to temporarily save your current work without making a messy commit?"
    options:
      - "`git cherry-pick`"
      - "`git bisect`"
      - "`git revert`"
      - "`git stash`"
    correct_index: 3
    option_feedback:
      0: |
        Cherry-pick copies an existing commit onto the current branch; it does not temporarily save
        uncommitted work.
      1: |
        Bisect searches history for the commit that introduced a bug; it is not a work-in-progress
        storage tool.
      2: |
        Revert creates a new commit that undoes an old commit, which is the opposite of keeping
        incomplete work out of history.
    explanation: "**`git stash` temporarily shelves uncommitted changes so you can switch contexts without making a messy commit.** `git stash` temporarily shelves your staged and unstaged changes, leaving you with a clean working directory so you can safely switch contexts."

  - id: 6
    difficulty: advanced
    question: "What happens when you enter a 'Detached HEAD' state in Git?"
    options:
      - "A merge conflict occurs that Git cannot resolve automatically."
      - "The HEAD pointer is attached directly to a specific commit rather than a branch name."
      - "You accidentally delete the main branch of your repository."
      - "The remote server goes offline, and your local repository can no longer push updates."
    correct_index: 1
    option_feedback:
      0: |
        Detached HEAD is a pointer state, not an automatic merge conflict.
      2: |
        Checking out a commit directly does not delete `main`; it only makes `HEAD` stop following a
        branch name.
      3: |
        Detached HEAD is local repository state and says nothing about whether a remote server is
        online.
    explanation: "**Detached HEAD means HEAD points directly to a commit hash rather than a branch — new commits in this state are not anchored to any branch and can be lost.** Checking out a specific commit hash detaches HEAD. Any new commits made in this state won't update a branch pointer and can easily be lost."

  - id: 7
    difficulty: intermediate
    question: "Which Git command utilizes a binary search through your commit history to help you pinpoint the exact commit that introduced a bug?"
    options:
      - "`git blame`"
      - "`git bisect`"
      - "`git diff`"
      - "`git cherry-pick`"
    correct_index: 1
    option_feedback:
      0: |
        `git blame` shows the last commit touching each line, but it does not run a binary search over
        good and bad revisions.
      2: |
        `git diff` compares two states; it does not manage the iterative good/bad testing process.
      3: |
        Cherry-pick applies one known commit elsewhere; it is not for discovering which commit was bad.
    explanation: "**`git bisect` uses binary search through commit history to efficiently pinpoint the exact commit that introduced a bug.** `git bisect` systematically halves your commit history, asking you to test if the bug is present at each step, to efficiently find the exact commit that broke the code."

  - id: 8
    difficulty: expert
    question: "What is the primary purpose of Git Submodules?"
    options:
      - "To break a single, massive file into smaller, trackable pieces to improve performance."
      - "To include an external Git repository as a subdirectory of your project while maintaining its independent history."
      - "To securely store passwords, API keys, and private credentials outside of the main repository."
      - "To automatically squash a long sequence of commits into a single bugfix."
    correct_index: 1
    option_feedback:
      0: |
        Submodules track another repository at a chosen commit; they do not partition large files for
        performance.
      2: |
        A submodule is versioned source history, not a credential vault.
      3: |
        Squashing rewrites or combines commits; submodules preserve an external repository's independent
        history.
    explanation: "**Git Submodules let you embed an external repository as a subdirectory, pinned to a specific commit, while keeping its history independent.** Submodules allow you to nest an independent repository inside your main project, pointing to a specific commit of that external library."

  - id: 9
    difficulty: intermediate
    type: multiple
    question: "Which of the following are advantages of a Distributed Version Control System (like Git) compared to a Centralized one? (Select all that apply)"
    options:
      - "Developers can commit changes and view history while working offline."
      - "Every developer has a full, independent copy of the repository's history."
      - "It mathematically prevents merge conflicts from ever occurring."
      - "It strictly relies on a single central server to store all file metadata."
      - "It is generally better suited for massive, globally distributed open-source projects."
    correct_indices: [0, 1, 4]
    option_feedback:
      0: |
        Offline commits and history inspection are central benefits of a distributed repository, not
        conveniences added by hosting services.
      1: |
        A full local history is what lets developers branch, inspect, and recover work without constant
        server access.
      2: |
        Distribution changes where history lives; conflicting edits to the same lines can still happen
        and still require resolution.
      3: |
        Git teams often use a central remote socially, but the VCS model does not strictly rely on one
        server for all metadata.
      4: |
        Large open-source projects benefit because contributors can work independently and exchange
        history without a single write bottleneck.
    explanation: "**Git's distributed model enables offline work and removes the single point of failure, making it ideal for large distributed teams — but it does not prevent merge conflicts.** In distributed systems like Git, developers have a full local copy of the repository, allowing for offline work and eliminating the single point of failure found in centralized systems. This makes it ideal for large, distributed teams. However, it does not prevent merge conflicts."

  - id: 10
    difficulty: intermediate
    type: multiple
    question: "Which of the following represent the core local states (or areas) where files can reside in a standard Git architecture? (Select all that apply)"
    options:
      - "Working Directory"
      - "Staging Area (Index)"
      - "Remote Server"
      - "Local Repository"
      - "Detached Head"
    correct_indices: [0, 1, 3]
    option_feedback:
      0: |
        The working directory is where editable files live before Git snapshots them.
      1: |
        The staging area is Git's proposed next snapshot, which is why staging can differ from both disk
        and the last commit.
      2: |
        A remote server may store repository history, but it is not one of the three local areas on the
        developer's machine.
      3: |
        The local repository is where committed snapshots and refs are stored.
      4: |
        Detached HEAD describes what `HEAD` points to, not a place where file contents reside.
    explanation: "**The three local areas are Working Directory, Staging Area, and Local Repository — the remote server and Detached HEAD are not file areas.** The three primary local states in Git's architecture are the Working Directory (files on disk), the Staging Area (prepped for the next commit), and the Local Repository (the compressed history of commits). The remote server is external, and 'Detached HEAD' is a state of the HEAD pointer, not a file area."

  - id: 11
    difficulty: intermediate
    type: multiple
    question: "Which of the following commands are primarily used to review changes, history, or differences in a Git repository? (Select all that apply)"
    options:
      - "`git log`"
      - "`git diff`"
      - "`git show`"
      - "`git push`"
      - "`git init`"
    correct_indices: [0, 1, 2]
    option_feedback:
      0: |
        `git log` answers what happened in the commit graph, so omitting it misses a core review tool.
      1: |
        `git diff` is the command for comparing file content across Git states.
      2: |
        `git show` displays the content and metadata of a particular object such as a commit.
      3: |
        `git push` publishes local history to a remote; it is not primarily a review command.
      4: |
        `git init` creates repository metadata; it does not review existing changes or history.
    explanation: "**`git log`, `git diff`, and `git show` are the review/inspection commands — `git push` uploads data and `git init` creates repos.** `git log` shows the commit history, `git diff` shows differences between states or commits, and `git show` displays details about a specific Git object (like a commit). `git push` uploads data, and `git init` creates a new repository."

  - id: 12
    difficulty: intermediate
    type: multiple
    question: "In which of the following scenarios would using `git stash` be considered an appropriate and helpful practice? (Select all that apply)"
    options:
      - "You have uncommitted, incomplete changes but need to switch branches urgently to fix a bug."
      - "You want to temporarily clear your working directory so you can safely pull down new remote changes."
      - "You want to permanently delete unneeded code files from your project's history."
      - "You want to permanently apply a completed commit from a completely different branch."
    correct_indices: [0, 1]
    option_feedback:
      0: |
        Stash is designed for this exact temporary pause: keep unfinished edits without creating a
        misleading commit.
      1: |
        Stashing before pulling avoids mixing local unfinished edits with incoming changes.
      2: |
        Stash stores working changes temporarily; it does not remove files from project history.
      3: |
        Applying a completed commit from another branch is cherry-pick territory, not stash.
    explanation: "`git stash` temporarily shelves your local modifications (both staged and unstaged), leaving you with a clean working directory. This is perfect for quick context switches or pulling updates without committing messy, incomplete work. It is not used for permanent deletion or applying commits (which would be `git cherry-pick`)."

  - id: 13
    difficulty: advanced
    type: multiple
    question: "Which of the following are valid methods or strategies for integrating changes from a feature branch back into the main codebase? (Select all that apply)"
    options:
      - "`git merge`"
      - "`git rebase`"
      - "`git merge --squash`"
      - "`git bisect`"
      - "`git blame`"
    correct_indices: [0, 1, 2]
    option_feedback:
      0: |
        A merge preserves the branch topology while bringing feature changes into the target branch.
      1: |
        Rebasing can integrate work by replaying commits onto a new base, with the tradeoff that commit
        identities change.
      2: |
        Squash merge integrates the final content as one new commit rather than preserving every
        feature-branch commit.
      3: |
        `git bisect` identifies a bad commit; it does not combine branch histories.
      4: |
        `git blame` attributes lines to commits; it does not move changes between branches.
    explanation: "**Merging, rebasing, and squash-merging are the three integration techniques — `git bisect` and `git blame` are inspection tools, not integration strategies.** Merging, rebasing, and squashing (`git merge --squash`) are all techniques used to integrate branch histories together. Note that `git merge --squash` only **stages** the combined changes — you must follow it with `git commit` to actually create the squashed commit. `git bisect` is a debugging tool for finding bugs, and `git blame` is used to see who last modified specific lines of code."

  - id: 14
    difficulty: intermediate
    question: "A faulty commit was pushed to a shared 'main' branch last week and your teammates have already synced it. Why should you use `git revert` to fix this rather than `git reset --hard` followed by a force-push?"
    options:
      - "`git revert` automatically resolves any merge conflicts introduced by the bad commit."
      - "`git revert` moves the faulty files back to the staging area so you can manually edit and fix them."
      - "`git revert` deletes the bad commit from the remote server without affecting local copies."
      - "`git revert` creates a new commit with the exact inverse changes, preserving the shared history for all collaborators."
    correct_index: 3
    option_feedback:
      0: |
        `git revert` may still need conflict resolution; its safety comes from preserving shared
        history.
      1: |
        Revert creates a new inverse commit rather than moving old changes back into the index for
        editing.
      2: |
        Revert does not remove the bad commit; it records a later commit that cancels its changes.
    explanation: "**`git revert` is safe on shared branches because it adds a new undo commit without rewriting history, while `reset --hard` + force-push would destroy teammates' synced work.** `git revert` is the safe choice on shared branches because it adds a new forward-moving commit that nullifies the targeted commit, without rewriting or destroying history. Using `git reset --hard` and force-pushing would overwrite the shared history, causing serious disruption for any teammate who has already synced that commit."

  - id: 15
    difficulty: intermediate
    question: "When integrating a feature branch into 'main', under what condition will Git perform a fast-forward merge rather than creating a three-way merge commit?"
    options:
      - "When the feature branch has been squashed into a single commit before merging."
      - "When 'main' has received no new commits since the feature branch was created."
      - "When there are conflicting changes on the same lines in both branches."
      - "When you explicitly pass the `--squash` flag to `git merge`."
    correct_index: 1
    option_feedback:
      0: |
        Squashing changes the number of commits being integrated; fast-forward depends on whether the
        target branch has diverged.
      2: |
        Conflicting edits indicate divergent work; a fast-forward has no merge to reconcile.
      3: |
        `--squash` stages a combined change for a new commit; it is not the condition that lets Git
        slide a branch pointer forward.
    explanation: "**A fast-forward merge is only possible when the base branch has received no new commits since the feature branch was created, allowing Git to slide its pointer forward linearly.** A fast-forward merge occurs when the target branch's history has not diverged — Git can simply slide its pointer forward to incorporate the changes linearly. If both branches have unique commits since they split, Git must perform a three-way merge using their common ancestor, resulting in a merge commit with two parents."

  - id: 16
    difficulty: advanced
    question: "What does the file `.git/HEAD` contain when you are checked out on a branch, compared to when you are in a detached HEAD state?"
    options:
      - "On a branch, it contains an exact commit hash; in detached HEAD, it contains a symbolic reference to a branch."
      - "Both states contain the same exact commit hash, but the detached HEAD state also includes a warning string."
      - "On a branch, it contains a symbolic reference (e.g., `ref: refs/heads/main`); in detached HEAD, it contains a raw commit hash."
      - "Both states contain `ref: refs/heads/main`, but detached HEAD additionally points to the staging area index."
    correct_index: 2
    option_feedback:
      0: |
        On a branch, `.git/HEAD` usually points to the branch ref; the branch ref points to the commit
        hash.
      1: |
        Detached HEAD changes the pointer representation to a raw hash; Git does not store the state as
        the same hash plus warning text.
      3: |
        `HEAD` identifies the current commit or branch ref, while the staging area is stored separately
        as the index.
    explanation: "**On a branch, `.git/HEAD` holds a symbolic reference to the branch; in detached HEAD state it holds a raw commit hash because HEAD is no longer anchored to any branch.** Normally, `.git/HEAD` is a symbolic reference like `ref: refs/heads/main` — a pointer to a branch pointer. When you enter detached HEAD state (e.g., with `git switch --detach <hash>`), HEAD is disconnected from any branch and contains the raw SHA hash of a specific commit directly. Any commits made in this state are not anchored to a branch and can be lost when switching away."

  - id: 17
    difficulty: intermediate
    question: |
      **Arrange** the Git commands into the correct order to: create a feature branch, make changes, and integrate them back into main via a merge.
    type: parsons
    display: inline
    lines:
      - "git switch -c feature"
      - "&&"
      - "git add app.py"
      - "&&"
      - "git commit -m 'Add feature'"
      - "&&"
      - "git switch main"
      - "&&"
      - "git merge feature"
    distractors:
      - "git push -f"
      - "git init"
    explanation: "**The correct order is: create the branch, stage changes, commit, switch back to main, then merge — force-push and init are distractors irrelevant to a local merge workflow.** The workflow is: create and switch to a feature branch (`switch -c`), stage changes (`add`), commit them, switch back to main, and merge the feature branch in. `git push -f` is dangerous on shared branches and is not part of a local merge workflow. `git init` creates a new repository — irrelevant here."

  - id: 18
    difficulty: intermediate
    question: |
      **Arrange** the commands to safely stash your work, pull remote changes, and restore your stashed work.
    type: parsons
    display: inline
    lines:
      - "git stash"
      - "&&"
      - "git pull"
      - "&&"
      - "git stash pop"
    distractors:
      - "git stash drop"
      - "git reset --hard"
    explanation: "**The correct order is stash → pull → pop: shelve local changes first, then pull onto a clean working directory, then restore — drop discards the stash and reset --hard destroys local work.** `git stash` saves uncommitted changes temporarily, `git pull` fetches and merges remote changes onto a clean working directory, and `git stash pop` re-applies the stashed changes on top. `git stash drop` would *discard* the stash without applying it. `git reset --hard` would destroy all local changes — dangerous!"

  - id: 19
    difficulty: intermediate
    question: |
      **Arrange** the commands to undo a bad commit on a shared branch safely: first identify the commit, then revert it, then push the fix.
    type: parsons
    display: inline
    lines:
      - "git log --oneline"
      - "&&"
      - "git revert <bad-commit-hash>"
      - "&&"
      - "git push"
    distractors:
      - "git reset --hard <bad-commit-hash>"
      - "git push -f"
    explanation: "**The correct order is log → revert → push: identify the bad commit, create a safe undo commit, then share it — reset --hard and force-push rewrite shared history and destroy teammates' work.** `git log` identifies the bad commit hash. `git revert` creates a new commit that undoes the bad one — preserving history for all collaborators. `git push` shares the fix. (On a busy shared branch, run `git pull` before `git push` to pick up any new commits first — otherwise the push may be rejected as non-fast-forward.) The distractors (`reset --hard` + `push -f`) would rewrite shared history, destroying teammates' work. Always use `revert` on shared branches, never `reset --hard` + force-push."

  - id: 20
    difficulty: basic
    question: |
      **Arrange** the commands to initialize a new repository and record an initial commit.
    type: parsons
    display: inline
    lines:
      - "git init"
      - "&&"
      - "git add ."
      - "&&"
      - "git commit -m 'Initial commit'"
    distractors:
      - "git clone ."
      - "git push"
    explanation: "**The correct order is init → add → commit: create the repository, stage all files, then record the first snapshot — clone copies an existing repo and push requires a remote to already exist.** `git init` creates the repository, `git add .` stages every file in the working directory, and `git commit` records the first snapshot. `git clone` copies an *existing* remote repo — it doesn't create one from scratch. `git push` requires a remote to already exist."

  - id: 21
    difficulty: advanced
    question: |
      **Arrange** the commands to register a remote called `origin` and push the `main` branch to it for the first time.
    type: parsons
    display: inline
    lines:
      - "git remote add origin <url>"
      - "&&"
      - "git push -u origin main"
    distractors:
      - "git fetch origin"
      - "git pull origin main"
    explanation: "**The correct order is remote add → push -u: register the remote alias first, then push with -u to set the upstream tracking reference — fetch and pull download data and cannot publish a local branch.** `git remote add origin <url>` registers the remote address under the alias `origin`. `git push -u origin main` uploads the branch and sets the upstream tracking reference so future `git push`/`git pull` calls need no extra arguments. `git fetch` and `git pull` *download* data — they don't publish your local branch."

  - id: 22
    difficulty: advanced
    question: |
      **Arrange** the commands to stage a forgotten file and fold it into the last commit without changing the commit message.
    type: parsons
    display: inline
    lines:
      - "git add forgotten.py"
      - "&&"
      - "git commit --amend --no-edit"
    distractors:
      - "git reset --hard HEAD~1"
      - "git commit -m 'Add forgotten file'"
    explanation: "**The correct order is add → amend --no-edit: stage the forgotten file, then fold it into the last commit without changing its message — reset --hard destroys the commit and a new commit pollutes history.** `git add forgotten.py` stages the missing file, and `git commit --amend --no-edit` rewrites the previous commit to include it while keeping the original message. `git reset --hard HEAD~1` would *destroy* the previous commit entirely. Creating a brand-new commit (`-m 'Add forgotten file'`) is valid but pollutes history with a fixup commit — amend is cleaner when the previous commit hasn't been pushed."
