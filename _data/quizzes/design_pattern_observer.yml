title: "Observer Pattern Quiz"
description: "Test your understanding of the Observer pattern's design decisions, trade-offs, and common pitfalls."
active: true
questions:
  - id: 1
    difficulty: advanced
    type: single
    question: |
      A stock market dashboard updates 50 UI widgets whenever the price feed changes (1,000 updates/second). The team uses the **Push model**, sending the full price data to every observer on every update. What is the most significant problem with this approach?
    options:
      - "The Push model violates the Open/Closed Principle"
      - "Observers receive much data they don't need, throttling updates"
      - "The Push model creates tighter coupling than the Pull model"
      - "The Push model prevents adding new observers at runtime"
    correct_index: 1
    option_feedback:
      0: |
        Push does not inherently block extension; new observers can still register. The pressure here is runtime cost from sending every observer more data than it needs.
      2: |
        The SEBook describes Push as coupling observers to the subject's **data format** rather than its API, but the problem at 1,000 updates/second is the volume of unused data flowing through every notification, not type coupling.
      3: |
        Observer still supports adding observers at runtime in both push and pull variants. The issue is what each observer receives once it is registered.
    explanation: "Push sends the full data set to every observer on every update, so at 1,000 updates/second with 50 widgets that each need only a subset, most of that transfer is wasted work. The SEBook recommends the **Hybrid model** (push the event type, let observers pull only what they need) combined with **batched/deferred notifications** for exactly this scenario."

  - id: 2
    difficulty: intermediate
    type: single
    question: |
      A developer registers observers with a subject but never calls `detach()` when the observers are no longer needed. The application gradually slows down over time. What is this problem called?
    options:
      - "The notification storm problem"
      - "The inverted dependency problem"
      - "The lapsed listener problem"
      - "The god class problem"
    correct_index: 2
    option_feedback:
      0: |
        Notification storms happen when many observers receive too many updates. Here the gradual slowdown comes from observers that should have gone away but remain registered.
      1: |
        Inverted dependency flow is about how registration code can hide the runtime data path. The symptom here is lifecycle leakage: the subject keeps references to observers after their useful life.
      3: |
        A god class has too many responsibilities concentrated in one class. This case is about retained subscriptions and object lifetime, not a single class owning too much logic.
    explanation: "Observers that never detach stay alive in memory because the subject's reference list keeps them from being garbage-collected — the lapsed listener problem. The SEBook lists three remedies: **explicit unsubscribe** (disciplined but error-prone), **weak references** (language-dependent), and **scoped subscriptions** tied to a lifecycle scope (common in modern UI frameworks)."

  - id: 3
    difficulty: advanced
    type: single
    question: |
      The Observer pattern is widely cited as creating an "inverted dependency flow" that hurts program comprehension. What does this mean in practice?
    options:
      - "Observers depend on the subject, but the subject also depends on observers — creating a circular dependency"
      - "Observers call the subject to register (observer→subject), but data later flows the opposite way (subject→observer)"
      - "The subject must be created before any observers, inverting the normal object creation order"
      - "The Pull model inverts the Push model's data flow direction"
    correct_index: 1
    option_feedback:
      0: |
        A subject normally depends only on an observer interface, not on concrete observers — that is the whole point of loose coupling. The hard-to-trace part is that registration appears in one place while later data updates arrive from the opposite direction.
      2: |
        Creation order is not the main issue; many systems can create subjects and observers in different orders. The term points to how dependency evidence in code differs from the runtime flow of updates.
      3: |
        Pull changes how much data is sent with a notification, but the subject still triggers observers. The "inverted" part is about code navigation and registration, not push versus pull payload style.
    explanation: "Data flows subject→observer, but in the code the observer calls the subject to register, so the dependency is invisible at the observer itself. When a reader meets an observer for the first time there is no sign nearby of what it depends on — the wiring lives elsewhere, in the `attach()` call. Modern reactive frameworks try to make the dependency graph explicit at the call site for this reason."

  - id: 4
    difficulty: intermediate
    type: single
    question: |
      A colleague says: "We only have one observer right now, so we don't need the Observer pattern — just call the method directly." When is this argument **most valid**?
    options:
      - "Never — the Observer pattern should always be used when notifications are needed"
      - "When the single observer will never change and no additional observers are foreseeable"
      - "When the observer uses the Pull model instead of the Push model"
      - "When the subject and observer are in the same package"
    correct_index: 1
    option_feedback:
      0: |
        Observer is not a mandatory wrapper around every callback. It earns its complexity when there is a real one-to-many or dynamically changing dependency.
      2: |
        Push versus pull decides how notification data is delivered. It does not determine whether a subscription mechanism is justified in the first place.
      3: |
        Package placement does not decide the design force. A direct call can still be better when the relationship is stable, and Observer can still be useful across classes in the same package if the dependency is dynamic.
    explanation: "Observer solves a **dynamic, one-to-many** dependency. With exactly one dependent that will never change, the subscriber list, notification mechanism, and interface abstractions add complexity without addressing a real problem, so a direct call is simpler. The tutorial's design-judgment step makes the same call: a simple calculator with one fixed display does not need Observer."

  - id: 5
    difficulty: intermediate
    type: single
    question: |
      In MVC, the Model acts as the Observer's Subject. The View registers as an Observer, and the Model calls `update()` on all views whenever its setter methods mutate state. Which notification trigger approach is this?
    options:
      - "Client-triggered — the Controller explicitly calls notifyObservers() after updating the Model"
      - "Automatic — the Model's setter methods call notifyObservers() internally after every state change"
      - "Batched — notifications are deferred and sent at a synchronization point"
      - "It depends on whether Push or Pull model is used"
    correct_index: 1
    option_feedback:
      0: |
        Client-triggered notification would make the controller responsible for remembering to notify after each model change. In the described flow, the model itself calls `update()` from its setter after changing.
      2: |
        Batched notification waits and dispatches grouped updates later. The prompt says the model notifies whenever its setter runs, so notification is immediate and internal to mutation.
      3: |
        Push and pull describe the payload strategy: whether data is sent or queried. The trigger strategy is separate: who decides when observers are notified.
    explanation: "When the setter itself calls `notifyObservers()` after every state change, the trigger is **automatic** — the Controller never has to remember to notify. The SEBook contrasts this with **client-triggered** (the client notifies after a batch of changes, avoiding intermediate updates but risking forgotten calls) and **batched/deferred** (updates collected and dispatched at a synchronization point)."

  - id: 6
    difficulty: advanced
    type: single
    question: |
      A `Subject` subclass overrides a state-changing operation inherited from `Subject`. The inherited operation calls `notify()` at its end. Inside the override, the subclass updates its own additional state *after* calling `super()`. What problem does this create?
    options:
      - "Observers will be notified twice instead of once"
      - "Observers see a half-updated subject because notify() fires before the override finishes"
      - "The subclass cannot legally override a Subject operation in this pattern"
      - "Garbage collection will reclaim the observers before they receive update()"
    correct_index: 1
    option_feedback:
      0: |
        Nothing here doubles the notification — `notify()` runs exactly once, at the end of `super()`. The problem is *when* it runs relative to the subclass's own work.
      2: |
        Overriding Subject operations is allowed and common. The trap is the order in which the override does its work, not the override itself.
      3: |
        The observer list still holds references; nothing here changes lifetime. The problem is timing of the notification within a single update path.
    explanation: "The subject must be self-consistent before calling `notify()`. Because `super()` fires `notify()` before the subclass finishes its own update, observers query a half-updated subject and read stale data. The SEBook's fix is a **Template Method**: give subclasses a primitive operation to override and make `notify()` the last step of the template method in the abstract Subject, so the object is always consistent when subclasses extend it."

  - id: 7
    difficulty: advanced
    type: multiple
    question: |
      Which of the following are documented **consequences** of the Observer pattern (per the GoF / SEBook)? (Select all that apply)
    options:
      - "Abstract coupling between Subject and Observer — the Subject only knows the Observer interface, not concrete classes"
      - "Support for broadcast communication — notifications need not specify a receiver"
      - "Unexpected updates — a single state change can cascade through observers and their dependents"
      - "Guaranteed notification order — observers are always notified in the order they attached"
    correct_indices: [0, 1, 2]
    option_feedback:
      3: |
        Notification order is not part of the pattern's contract. Many implementations preserve insertion order incidentally (a Python list does), but a set-, queue-, or DAG-based dispatcher would not. The tutorial's Step 5 quiz makes the same point: client code should not depend on order between observers.
    explanation: "Abstract coupling and broadcast communication are canonical GoF benefits; unexpected updates are a documented liability — \"a seemingly innocuous operation on the subject can cause a cascade of updates to observers and their dependent objects.\" Because the `update()` protocol carries no information about *what* changed, observers may have to work hard to deduce the change, a frequent source of subtle bugs."

  - id: 8
    difficulty: advanced
    type: single
    question: |
      A spreadsheet cell observes three different data-source subjects. When any source changes, the cell must recompute. What does the cell's `update()` operation need that a single-subject design would not?
    options:
      - "A way to identify which subject changed, e.g. `update(Subject*)`"
      - "A separate `notify()` method for each subject it observes"
      - "Three independent observer lists, one per subject type"
      - "It cannot be done — observers must observe exactly one subject"
    correct_index: 0
    option_feedback:
      1: |
        `notify()` lives on the subject, not the observer. Each subject already calls `update()` on every attached observer — the question is what the observer can learn from the call.
      2: |
        Observer lists are kept by the *subject*, not by the observing cell. The cell needs to discriminate among its incoming notifications, not maintain its own dispatch tables.
      3: |
        Nothing in the pattern restricts an observer to a single subject. The SEBook explicitly cites the spreadsheet-cell case as a motivating example for multi-subject observers.
    explanation: "With several subjects, `update()` must identify *which* one changed — typically by passing the subject as a parameter, `update(Subject* changedSubject)`, so the observer can query the right source. A pure push style with no subject identity in the signature cannot distinguish sources. The SEBook flags this under GoF Implementation issue #2 (observing multiple subjects)."

  - id: 9
    difficulty: advanced
    type: single
    question: |
      A subject is destroyed while several observers still hold references to it (e.g., to query its state in `update()`). What is this problem called, and what is the standard remedy?
    options:
      - "Lapsed listener — observers should call detach() before holding the reference"
      - "Dangling references to deleted subjects — the dying subject must notify observers to clear them"
      - "Inverted dependency flow — observers should not hold references to subjects in the Pull model"
      - "Notification storm — the observers should be batched to avoid the dangling refs"
    correct_index: 1
    option_feedback:
      0: |
        The lapsed-listener problem is the *dual* of this one: there, the subject outlives the observer's usefulness and keeps stale observers alive. Here, the subject is destroyed and observers are left with stale pointers.
      2: |
        Inverted dependency flow is about code-reading comprehension, not lifetime management. The Pull model's reference-back is exactly what creates the dangling pointer here, but the term names a different concept.
      3: |
        Notification storms describe excessive runtime traffic, not lifetime hazards. The problem here is what happens when the source of notifications is freed while listeners still point to it.
    explanation: "This is the dangling-reference problem — the dual of the lapsed-listener problem — and it matters most in languages without garbage collection (e.g., C++). The SEBook's remedy is for the subject to notify its observers as it is destroyed so they can null out their references, preventing later access through a stale pointer."

  - id: 10
    difficulty: expert
    type: single
    question: |
      The dependency graph between subjects and observers in a system is intricate: some observers depend on several subjects at once, and when multiple subjects change in one logical operation, observers must be updated exactly once — not once per source. Which structural addition does the GoF recommend?
    options:
      - "Replace Observer with Mediator everywhere"
      - "Introduce a ChangeManager that maps subjects to observers and dispatches"
      - "Switch from Pull to Push so observers don't need to coordinate"
      - "Have each observer keep a counter and ignore duplicate updates"
    correct_index: 1
    option_feedback:
      0: |
        Mediator and Observer are related (the ChangeManager *is* a Mediator), but you don't discard Observer wholesale. You introduce one Mediator-shaped object to coordinate the dispatch, and observers still use the standard `update()` contract.
      2: |
        Push versus pull is about the payload, not the dispatch graph. Switching to Push does not solve duplicate updates when one observer subscribes to several subjects.
      3: |
        Counters in every observer push coordination back into the observers — the whole point of the recommendation is to centralize update-graph logic in one place. Per-observer dedup is fragile and easy to get wrong.
    explanation: "Following GoF Implementation issue #9, when dependencies form a graph (especially a DAG) a `ChangeManager` maps subjects to observers, defines an update strategy, and dispatches so each observer is notified exactly once per logical change. GoF cite a `SimpleChangeManager` (notifies every observer) and a `DAGChangeManager` (handles directed acyclic dependency graphs). The ChangeManager is itself a Mediator and is typically a Singleton."
