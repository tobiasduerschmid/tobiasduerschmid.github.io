title: "Modern Code Review Quiz"
description: "Apply modern code-review research to PR size, reviewer cognition, socio-technical dynamics, reviewable-code practices, Google-scale workflow, and AI-era review."
active: true
questions:
  - id: 1
    difficulty: basic
    bloom: understand
    type: single
    question: |
      Which statement best distinguishes formal inspections from Modern Code Review?
    options:
      - "Formal inspections are synchronous and role-heavy; MCR is asynchronous and diff-centered."
      - "Formal inspections are faster because everyone is in the same room."
      - "Modern Code Review requires printed code and a Reader role."
      - "Formal inspections and Modern Code Review differ only in programming language."
    correct_index: 0
    option_feedback:
      1: |
        Formal inspections were effective but slow, especially because scheduling multiple people into meetings consumed large amounts of development time.
      2: |
        The Reader role belongs to formal inspections, not typical asynchronous MCR.
      3: |
        The shift was process and tooling, not language.
    explanation: "MCR arose because formal inspections were too slow for Agile, CI, and distributed teams. It keeps peer review but changes the workflow."

  - id: 2
    difficulty: intermediate
    bloom: analyze
    type: single
    question: |
      Your manager says, "If only 14% to 25% of review comments find functional defects, code review is mostly waste." What is the strongest response?
    options:
      - "Agree; review should be removed whenever CI exists."
      - "Defect finding is one outcome; most MCR value is maintainability and shared ownership."
      - "The numbers prove reviewers should comment on more bugs, even if they have to guess."
      - "The numbers only apply to formal inspections."
    correct_index: 1
    option_feedback:
      0: |
        CI catches some classes of failures, but it does not provide mentorship, design judgment, ownership diffusion, or maintainability critique.
      2: |
        Guessing produces low-signal comments. Review quality improves by focusing human attention on outcomes humans are suited to judge.
      3: |
        The defect-finding gap is specifically about modern review datasets, not only formal inspections.
    explanation: "The defect-finding fallacy is assuming review is valuable only when it catches bugs. MCR also teaches teams, enforces norms, spreads context, and improves future modifiability."

  - id: 3
    difficulty: intermediate
    bloom: apply
    type: single
    question: |
      A teammate submits a 1,200-line feature PR touching database migrations, backend rules, and UI. They say one large PR is easier because reviewers see the whole feature at once. What should you recommend?
    options:
      - "Use stacked PRs or logical slices that each fit a reviewer's attention budget."
      - "Add six reviewers so the total attention multiplies."
      - "Merge it quickly because large PRs are inevitable."
      - "Ask reviewers to skim at maximum speed to stay under 60 minutes."
    correct_index: 0
    option_feedback:
      1: |
        More reviewers can create a bystander effect. It does not guarantee that anyone forms a complete mental model.
      2: |
        Large PRs may happen sometimes, but accepting them as normal makes deep review unlikely.
      3: |
        Faster skimming is the opposite of effective review. Speed without comprehension misses design and functional problems.
    explanation: "Stacking is a workflow answer to cognitive limits. It preserves reviewability by keeping each change small enough to understand."

  - id: 4
    difficulty: advanced
    bloom: analyze
    type: multiple
    question: |
      Which strategies fit the Code Review Comprehension Model for a non-trivial PR? Select all that apply.
    options:
      - "Read tests first to understand the author's intended behavior."
      - "Find the core design change and trace outward to affected files."
      - "Group a massive PR into logical chunks such as schema, backend logic, and UI."
      - "Approve once no line looks suspicious during a quick scroll."
      - "Use an easy-first pass to clear boilerplate from working memory before deep review."
    correct_indices: [0, 1, 2, 4]
    option_feedback:
      0: |
        Tests can provide the specification layer the reviewer needs before reading implementation detail.
      1: |
        Core-based reading spends attention where the most important design decision lives.
      2: |
        Chunking keeps the mental model small enough to reason about.
      3: |
        A quick scroll is impression-based, not specification-driven review.
      4: |
        Easy-first can be useful when it intentionally reduces clutter before harder reasoning.
    explanation: "CRCM treats review as comparative comprehension: existing system, proposed change, and ideal solution. Good strategies manage that working-memory load explicitly."

  - id: 5
    difficulty: intermediate
    bloom: apply
    type: multiple
    question: |
      An author wants to make a complex function more reviewable before opening a PR. Which changes are aligned with the chapter? Select all that apply.
    options:
      - "Write clear pre- and post-conditions for the most important function."
      - "Use assertions for programmer-error invariants."
      - "Replace nested edge-case conditionals with guard clauses."
      - "Extract meaningful helpers so the main path reads as named chunks."
      - "Move all logic into one method so reviewers never navigate between functions."
    correct_indices: [0, 1, 2, 3]
    option_feedback:
      0: |
        Contracts let reviewers check behavior against explicit assumptions instead of reconstructing intent from scratch.
      1: |
        Assertions make impossible states fail fast and expose local assumptions.
      2: |
        Guard clauses reduce nesting and let the normal path stay flat.
      3: |
        Named chunks compress working-memory load and let reviewers drill into one concept at a time.
      4: |
        One giant method removes navigation but overloads working memory. Reviewability depends on meaningful abstraction, not merely file locality.
    explanation: "Reviewable code is designed around the reader's cognitive limits. Contracts, assertions, guard clauses, and chunks each make the reviewer's job more precise."

  - id: 6
    difficulty: advanced
    bloom: analyze
    type: single
    question: |
      In `apply_discount`, a check rejects a user-entered discount of 150% and returns a validation error. Elsewhere, `assert subtotal >= 0` documents an invariant after pricing. Which statement is most accurate?
    options:
      - "Both should be assertions because they are both checks."
      - "User input belongs in a guard clause; the negative subtotal is an assertion."
      - "Both should be guard clauses because assertions are never useful."
      - "Neither belongs in code because comments are enough."
    correct_index: 1
    option_feedback:
      0: |
        User input can be invalid in normal operation. Assertions may be stripped in production and should not be the only handling for expected runtime conditions.
      2: |
        Assertions are useful for invariants that should never be false if the code is correct.
      3: |
        Comments do not fail fast or protect control flow. Executable checks carry stronger evidence.
    explanation: "Assertions and guard clauses both aid review, but they serve different contracts: impossible programmer-error invariants versus expected invalid inputs or edge cases."

  - id: 7
    difficulty: intermediate
    bloom: understand
    type: single
    question: |
      In Google's review process, why might one change require both an owner approval and a readability approval?
    options:
      - "Ownership certifies directory authority; Readability certifies language/style norms."
      - "Owner approval checks formatting; Readability checks whether the author is popular."
      - "Both approvals exist only to slow down small changes."
      - "Readability replaces testing, so owner approval is optional."
    correct_index: 0
    option_feedback:
      1: |
        Ownership is about codebase authority, not formatting. Readability is a trained quality norm, not a popularity signal.
      2: |
        Google's data shows many changes are approved quickly despite the gates. The gates protect different quality dimensions.
      3: |
        Readability does not replace tests or ownership. It adds a human norm check for maintainable code.
    explanation: "Google separates who knows the directory from who can certify language readability. The two gates protect different aspects of quality at scale."

  - id: 8
    difficulty: advanced
    bloom: evaluate
    type: single
    question: |
      An AI agent opens a 2,000-line PR that passes unit tests. The reviewer feels pressure to approve because the code looks polished and CI is green. What is the safest review posture?
    options:
      - "Approve because polished AI code plus green CI is enough evidence."
      - "Treat it as rubber-stamp risk: smaller slices, verify outcomes, audit test coverage."
      - "Reject all AI-generated code regardless of evidence."
      - "Ask the AI to add more comments so the reviewer does not need to run the code."
    correct_index: 1
    option_feedback:
      0: |
        AI code can look authoritative while being subtly wrong. Green tests only prove the existing tests passed.
      2: |
        A blanket ban ignores useful AI assistance. The safer standard is stronger verification and smaller reviewable units.
      3: |
        More comments can help explain intent, but they do not prove behavior or security. Outcome evidence is needed.
    explanation: "AI-generated code raises the risk of plausible-but-wrong diffs overwhelming human attention. The review artifact must shift toward smaller slices and observable behavior."
