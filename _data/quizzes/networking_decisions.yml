title: "Networking: Making Decisions"
description: "Given real-world application scenarios, choose the right network architecture, transport protocol, and application protocol. These questions test your ability to analyze trade-offs and justify design decisions."
active: true
questions:
  - id: 1
    difficulty: intermediate
    question: "You are building a **collaborative coding interview platform** where the candidate and the interviewer edit the same file at the same time, character by character. The candidate types `def foo():`, then immediately replaces it with `def bar():`. If those two edits arrive at the interviewer in the **wrong order**, the interviewer's screen ends up showing `def foo():` even though the candidate's screen shows `def bar():`. Which transport protocol should the editing channel use?"
    options:
      - "UDP — interactive editors need the lowest latency to feel responsive."
      - "TCP — the two edits must arrive, in the order they were typed."
      - "UDP — the next keystroke will overwrite any earlier one that got lost."
      - "Either one — the front-end can sort edits by their timestamp before applying them."
    correct_index: 1
    option_feedback:
      0: |
        Latency does matter, but the platform also depends on the **order** of every operation. A faster
        channel that delivers a delete before its earlier insert leaves the shared file inconsistent.
      2: |
        Each keystroke is a separate operation (insert this character, delete that one), so a missing edit
        cannot be reconstructed by the next one. Replacement semantics only work when every message carries
        the full state, not a delta.
      3: |
        Timestamps can sort edits at the receiver, but a *missing* edit never arrives at all. Sorting cannot
        fix a hole — the receiver still ends up with a different file than the sender.
    explanation: "**TCP is required because every edit must arrive in the order it was typed.** Collaborative editors send each keystroke as a small `insert` or `delete` operation; if a `delete` arrives before its preceding `insert`, or never arrives at all, the two screens drift apart. TCP's ordering and retransmission guarantees rule this out, and the handshake/ACK overhead is negligible for tiny keystroke payloads — the same reason web apps and SSH (both TCP) handle their interactive workloads cleanly."

  - id: 2
    difficulty: intermediate
    question: "You're building a **smart doorbell with a live camera feed**. When a visitor presses the button, the homeowner's phone displays the camera in real time so the homeowner can see who's there before deciding to answer. Which transport protocol should carry the **camera video stream**?"
    options:
      - "TCP — the homeowner needs to see every frame of the visitor."
      - "UDP — a brief glitch is less disruptive than waiting for a re-sent frame to arrive."
      - "TCP — TCP's ordering guarantee prevents frames from displaying out of sequence."
      - "Neither — live video runs at the application layer and bypasses the transport layer."
    correct_index: 1
    option_feedback:
      0: |
        A single missing frame is replaced within milliseconds by the next one — the visitor's face stays
        visible. Waiting to retransmit it instead causes a visible stall right when the homeowner is trying to act.
      2: |
        Frames are displayed in order, but a re-sent frame from a moment ago shows a moment that has already
        passed. Real-time video benefits more from skipping than from waiting.
      3: |
        Live video still travels over the transport layer. Real-time media commonly uses UDP-based protocols
        (RTP, WebRTC); it does not skip the transport layer.
    explanation: "**UDP is correct because a re-sent video frame arrives too late to be useful in an interactive camera feed.** A dropped UDP packet causes a tiny visual glitch (often imperceptible — the next frame arrives within milliseconds), but TCP's retransmission can *pause the stream* to wait for a packet describing what the visitor was doing a moment ago — exactly when the homeowner needs the present view. Low-latency interactive video products commonly use UDP-based media protocols such as RTP/WebRTC for this reason. Buffered broadcast streaming is a different trade-off and may use HTTP-based delivery."

  - id: 3
    difficulty: advanced
    question: "An indie team is building an **online multiplayer racing game**. Each player's car position and speed update **60 times per second** so all players see each other accurately on the track. The game also records **lap completion events**, awards **podium finishes**, and lets players spend earned currency on **car cosmetic upgrades** that persist between matches. What transport-protocol strategy fits best?"
    options:
      - "TCP for everything — losing a single position update would cause cars to teleport on screen."
      - "UDP for everything — racing is a real-time game, and lap and purchase events are short messages anyway."
      - "UDP for car positions and speeds; TCP for lap completion, podium finishes, and cosmetic purchases."
      - "HTTP for everything — HTTP is the standard application-layer protocol and fits all game data."
    correct_index: 2
    option_feedback:
      0: |
        Re-sending 60 stale position updates per second would freeze the screen waiting for snapshots that
        no longer matter. Position data is a continuous stream where each new update replaces the previous one.
      1: |
        Some game data must never be lost. A missed podium finish or a vanished cosmetic purchase would
        corrupt the player's persistent progress, and there is no later message that reconstructs it.
      3: |
        HTTP is request-response and runs over TCP — it is poorly suited to 60-Hz position broadcasts. The
        transport choice should match each data type's tolerance for loss, not default to one application protocol.
    explanation: "**A hybrid is correct because position updates and progression events have opposite requirements.** Car positions arrive at 60 Hz with absolute coordinates — a missed snapshot is replaced within ~17 ms, so UDP is ideal. But a lost lap completion or purchase would corrupt persistent state — those need TCP's reliable, ordered delivery. This is the same hybrid pattern the SEBook describes for live online stock-trading platforms: UDP for the high-frequency snapshot stream of values that supersede each other, TCP for the events that must be recorded once and exactly once."

  - id: 4
    difficulty: basic
    question: "You are building a **cloud file storage service** similar to Dropbox or Google Drive. A user clicks 'Upload' on a 200 MB folder of design files. The folder must arrive at the server **bit-for-bit identical** so that other devices syncing the same folder see the exact same files. Which transport protocol should carry the upload?"
    options:
      - "UDP — to maximize raw upload speed for large folders."
      - "TCP — every byte must arrive correctly and in the right order."
      - "UDP — the sync client can detect missing chunks and re-request them later."
      - "It depends — use UDP for small files (<10 MB) and TCP for larger ones."
    correct_index: 1
    option_feedback:
      0: |
        Faster transfer is irrelevant if the file arrives corrupted. A storage service's core promise is that
        what was uploaded is exactly what comes down again on every other device.
      2: |
        Detecting and re-requesting missing chunks on top of UDP is essentially rebuilding TCP — and getting
        the details (timeouts, sequence numbers, congestion handling) wrong, when the OS already provides
        them for free.
      3: |
        File size doesn't change the requirement. A 5 MB photo and a 500 MB video both need byte-perfect
        delivery for the sync invariant to hold.
    explanation: "**TCP is required because the storage service's core invariant is byte-for-byte fidelity.** A single flipped bit in a `.psd` or `.docx` file can corrupt it silently — the user only discovers the damage when they reopen the file later. TCP's retransmission, ordering, and checksum guarantees prevent this. The handshake/ACK overhead is negligible compared to the size of the payload, which is why every major cloud-sync product uses TCP — typically over HTTPS."

  - id: 5
    difficulty: intermediate
    question: "A startup is launching an **online concert ticketing platform**. Fans browse upcoming shows, **pay** with a credit card, and receive a unique QR-code ticket. The platform must prevent **two fans buying the same seat**, and it must keep an **immutable record** of every sale for tax and refunds. Should the backend be **client-server** or **peer-to-peer**?"
    options:
      - "Peer-to-peer — fans and venues can negotiate seats directly, avoiding platform fees."
      - "Client-server — a central server is needed to coordinate seat inventory, payments, and the audit trail."
      - "Peer-to-peer — eliminates the cost of running backend infrastructure."
      - "It doesn't matter — both architectures work equally well for marketplaces."
    correct_index: 1
    option_feedback:
      0: |
        Direct peer-to-peer negotiation cannot enforce the no-double-booking rule across the whole platform.
        Without a single coordinator, two peers can each independently decide to sell the same seat.
      2: |
        Saving on infrastructure cost still leaves the platform with no way to record sales authoritatively
        or process refunds. The product depends on a central authority that pure P2P does not provide.
      3: |
        The architecture matters because the requirements include central inventory, central payment
        processing, and a tamper-resistant audit trail — features client-server provides and pure P2P does not.
    explanation: "**Client-server is required because the platform must serialize seat reservations, process payments, and own the audit trail.** A central server is the only place where seat inventory can be locked, transactions can be recorded once, and disputes can be resolved against an authoritative record. P2P would let two buyers commit to the same seat independently and would have nowhere to enforce payment finality. This is the same pattern any multi-sided marketplace (Uber, Airbnb, eBay) uses for the same reasons."

  - id: 6
    difficulty: intermediate
    question: "A research consortium is designing a **distributed scientific data archive**: each participating university hosts a copy of selected genome datasets and serves them directly to other universities that request a copy. There must be **no single institution** that controls or can take down the archive, and the system should keep functioning even if **several universities go offline at once**. Which architecture fits these requirements best?"
    options:
      - "Client-server — running one central archive server is simpler to operate."
      - "Client-server — a central index makes lookup fastest and most reliable."
      - "Peer-to-peer — every university is both a supplier and a consumer of datasets, with no single controlling institution."
      - "Hybrid — a single university hosts the master index server, with raw data transfer happening directly between peers."
    correct_index: 2
    option_feedback:
      0: |
        Operational simplicity is real, but it conflicts with the explicit requirement that no single
        institution control the archive or be a single point of failure.
      1: |
        A central index reintroduces the single point of failure the requirements rule out. If the indexing
        institution goes offline or revokes access, the whole archive becomes unreachable.
      3: |
        Even if raw data transfer is peer-to-peer, a single central index is still a single point of control
        and failure. The requirement here is about *control*, not just bandwidth.
    explanation: "**Peer-to-peer is correct because decentralization is an explicit requirement, not just a preference.** Any central server (including just a central index) creates a single point of control and failure that the requirements forbid. True P2P systems use a Distributed Hash Table or similar peer-discovery mechanism so participants find each other without any central coordinator — the same idea behind BitTorrent's trackerless mode and IPFS. Each peer is both supplier and consumer, exactly the property the SEBook describes for P2P architectures."

  - id: 7
    difficulty: basic
    question: "You are building a **walkie-talkie style voice app** for outdoor crews — a hiker holds the talk button, speaks for a few seconds, and any teammate within range hears the audio in real time. The audio must feel **immediate**, and a brief audio gap is far less disruptive than a hesitation in the middle of a sentence. Which transport protocol should carry the voice audio?"
    options:
      - "TCP — losing voice packets degrades the listener's understanding."
      - "UDP — a brief audio gap is less disruptive than waiting for a re-sent packet to arrive."
      - "TCP — TCP's ordering guarantees prevent the audio from sounding garbled."
      - "Neither — voice audio is encoded at the application layer and bypasses the transport layer."
    correct_index: 1
    option_feedback:
      0: |
        Losing a tiny slice of live audio sounds like a brief crackle. Waiting to retransmit it produces a
        noticeable hesitation right when the speaker is mid-sentence — far more disruptive than the original gap.
      2: |
        Ordering an old audio packet correctly is not useful after its playback moment has passed. Real-time
        voice prefers timely packets over late perfect ones.
      3: |
        Voice audio still uses transport-layer protocols. Real-time voice typically rides on UDP (often via
        RTP or WebRTC); it does not skip the transport layer.
    explanation: "**UDP is correct because in real-time voice, a re-sent packet often arrives too late to be useful.** TCP's retransmission can stall the audio waiting for a packet describing a moment the listener has already passed — producing audible jitter exactly when the speaker is mid-word. A dropped UDP packet creates a brief gap that codecs can often conceal better than a playback stall. Real-time voice products commonly use UDP-based media protocols, often via RTP or WebRTC, while still needing fallbacks on restrictive networks."

  - id: 8
    difficulty: basic
    question: "A smart-home product ships a phone app that **refreshes every 5 seconds** to show the current state of the user's connected devices — lights on/off, thermostat temperature, door-lock status. The phone app sends a request to the company's **central hub server**, which responds with the latest readings collected from devices in the home. Which architecture pattern is this?"
    options:
      - "Peer-to-peer — both the phone and the smart devices send and receive data, so they are peers."
      - "Hybrid — the periodic polling combined with the server's responses combines two architectures."
      - "Client-server — the phone (client) initiates each request; the company's central server responds."
      - "Peer-to-peer — the smart devices push updates directly to the phone, bypassing any server."
    correct_index: 2
    option_feedback:
      0: |
        Sending and receiving data is not what defines an architecture — every networked node does both. The
        relevant question is whether peers coordinate **directly** or always through a central service.
      1: |
        Polling is just a *way of using* a client-server connection, not a separate architecture. Repeating
        a request every 5 seconds doesn't make the design hybrid by itself.
      3: |
        In the scenario, the smart devices report to the company's central hub, not directly to the phone.
        The phone always reaches the server, so direct device-to-phone P2P isn't happening here.
    explanation: "**Client-server is correct — polling is just a frequency choice within client-server.** The phone (client) initiates each request; the central hub (server) responds — the textbook definition of client-server. The 5-second interval changes only *how often* requests happen, not who initiates or where the authoritative state lives. The same shape applies to most dashboard-style apps that poll a backend for the latest data."

  - id: 9
    difficulty: intermediate
    type: multiple
    question: "For which of the following would **TCP** be the better choice over UDP? (Select all that apply)"
    options:
      - "Submitting a credit-card payment over HTTPS at the checkout of an online store"
      - "A two-way video call where participants need sub-second audio and video"
      - "Sending an email with a 5 MB PDF attachment from a webmail interface to a recipient"
      - "An HTTPS download of a 100 MB software update from the vendor's update server"
    correct_indices:
      - 0
      - 2
      - 3
    option_feedback:
      0: |
        A payment submission must be recorded once and exactly once. Transport-level loss or reordering
        would either drop the charge or duplicate it — neither acceptable at a payment boundary.
      1: |
        Interactive calls prize low latency. A late packet from half a second ago is often less useful
        than keeping the current conversation moving, so UDP-based media protocols are common.
      2: |
        Email content must arrive complete and uncorrupted. A missing or reordered byte in the message
        body or the PDF attachment would render the text as gibberish or break the attached file when the
        recipient tries to open it.
      3: |
        A software update must arrive byte-for-byte intact — a single corrupted byte can break installation
        or fail the package's signature verification.
    explanation: "**Payments, emails, and software downloads all require byte-perfect, ordered delivery — exactly what TCP provides.** A missing or duplicated payment would lose money or charge a customer twice; a corrupted email body or attachment would render text as gibberish or break the file the recipient is trying to open; a single corrupted byte can break a software install. The **two-way video call** is the UDP case: preserving the current conversation is more important than waiting for stale media packets."
