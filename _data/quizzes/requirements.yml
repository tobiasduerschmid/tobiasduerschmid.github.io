title: "Software Requirements Quiz"
description: "Recalling what you just learned is the best way to form lasting memory. Use this quiz to test your ability to discriminate between problem-space statements (requirements) and solution-space statements (design) in novel scenarios."
questions:
  - question: "A startup is building a new music streaming application. The product owner states, 'Listeners need the ability to seamlessly transition between songs without any perceivable loading delays.' What does this statement best represent?"
    options:
      - "A constraint on the technical solution space."
      - "A (slighty vague) quality attribute requirement."
      - "A specific architectural implementation strategy."
      - "A concrete algorithmic choice for data caching."
    correct_index: 1
    explanation: "The statement describes what the system must achieve for the user (seamless transitions) without dictating how the engineers must build it. It defines the **problem space**. To make it more specific, the definition of 'perceivable loading delays' needs to be included in the requirement."

  - question: "A Quality Assurance (QA) engineer is writing automated checks for a new e-commerce checkout flow. They ensure that every test maps directly back to a specific stakeholder request. Which core benefit of defining the problem space does this mapping best demonstrate?"
    options:
      - "Over-constraining the system architecture."
      - "Avoiding premature performance optimization."
      - "Establishing verifiable traceability."
      - "Delegating design choices to the QA team."
    correct_index: 2
    explanation: "Good requirements allow developers to write clear acceptance criteria, ensuring every test and line of code traces back to a specific requirement via **verifiable traceability**."

  - question: "A client requests a new social media dashboard and specifies, 'The platform must use a graph database to map user connections.' Why might a software architect push back on this specific phrasing?"
    options:
      - "It fails to articulate any functional value for the end-user."
      - "It artificially narrows the available technical solutions before development even starts."
      - "It makes it impossible to write automated acceptance tests."
      - "It requires the use of unproven, experimental technologies."
    correct_index: 1
    explanation: "Specifying a 'graph database' is a design decision. Including it in the requirement prematurely constrains the engineering team from exploring potentially better data persistence options."

  - question: "In a cross-functional Agile team, who is ideally suited to articulate the functional expectations of a new feature, and who should decide the underlying technical mechanics?"
    options:
      - "Software engineers define expectations; product managers dictate mechanics."
      - "Customers or product representatives define expectations; software engineers decide mechanics."
      - "The project manager dictates both expectations and mechanics to ensure alignment."
      - "End-users define mechanics; quality assurance engineers dictate expectations."
    correct_index: 1
    explanation: "Requirements (expectations) should be negotiated with the customer/product manager, while design decisions (mechanics) belong to the software engineers and architects."

  - question: "Which of the following statements represents an exploration of the solution space rather than a statement of user need?"
    options:
      - "The interface must remain readable on both 4K monitors and 6-inch mobile displays."
      - "The university catalog must return results ordered alphabetically by course name."
      - "The application will utilize an in-memory Redis store to temporarily hold the user's unpurchased items."
      - "Consumers must receive an email notification immediately after a successful transaction."
    correct_index: 2
    explanation: "Utilizing **`Redis`** is a specific technical implementation (design decision) for data persistence, unlike the other options which simply state the required system behavior."

  - question: "A development team originally built a search feature using a basic database query but later migrated to a dedicated indexing engine to handle typos more effectively. If their original specification was written perfectly, what happened to that specification during this technical migration?"
    options:
      - "It was completely rewritten to reflect the new indexing engine."
      - "It remained entirely unchanged because the core user need didn't shift."
      - "It was discarded because iterative teams do not use specifications."
      - "It was expanded to mandate the new indexing engine for all future company projects."
    correct_index: 1
    explanation: "Because design decisions change frequently, a well-written requirement focused strictly on the **'what'** preserves flexibility and remains valid even if the underlying technical solution is swapped out."

  - question: "A team needs to ensure their new banking portal can handle 10,000 simultaneous logins within two seconds without crashing. What is the recommended format for capturing this specific type of system characteristic?"
    options:
      - "A high-level user persona."
      - "A concrete Quality Attribute Scenario."
      - "A detailed relational database schema."
      - "An Operational Transformation matrix."
      - "A long user story."
    correct_index: 1
    explanation: "Quality attribute requirements (performance, security, availability) are best captured via **Quality Attribute Scenarios** to make them concrete and measurable."

  - question: "A transit application needs to serve commuters who frequently lose cell service in subway tunnels. Which of the following represents the 'how' (the implementation) rather than the 'what' for this scenario?"
    options:
      - "Commuters must be able to view their ticket barcode without an active network connection."
      - "The system should display the last known train schedule when the device is offline."
      - "The application embeds a local database to cache schedule data directly on the device."
      - "The app must notify the user with a banner that they are viewing offline data."
    correct_index: 2
    explanation: "Embedding a local database to cache data is the design decision (the **'how'**). The other options describe the required offline capabilities (the **'what'**)."
