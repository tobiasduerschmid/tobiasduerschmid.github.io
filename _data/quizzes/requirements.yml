title: "Software Requirements Quiz"
description: "Recalling what you just learned is the best way to form lasting memory. Use this quiz to test your ability to discriminate between problem-space statements (requirements) and solution-space statements (design) in novel scenarios."
active: true
questions:
  - id: 1
    difficulty: intermediate
    question: "A startup is building a new music streaming application. The product owner states, 'Listeners need the ability to seamlessly transition between songs without any perceivable loading delays.' What does this statement best represent?"
    options:
      - "A constraint on the technical solution space."
      - "A (slightly vague) quality attribute requirement."
      - "A specific architectural implementation strategy."
      - "A concrete algorithmic choice for data caching."
    correct_index: 1
    option_feedback:
      0: |
        A constraint would restrict the solution choices, such as requiring a specific CDN or audio
        buffer size. This statement describes an experience the system should provide.
      2: |
        No architecture has been chosen yet. The sentence says what quality the user should perceive,
        not how components should be arranged.
      3: |
        Caching might be one possible design, but the requirement does not name an algorithm. Treating
        the first possible solution as the requirement would narrow the design too early.
    explanation: "It states what the system must achieve for the user (seamless transitions) without dictating how engineers build it, so it sits in the **problem space** as a quality attribute requirement. To be testable, though, 'perceivable loading delays' needs a concrete, measurable definition."

  - id: 2
    difficulty: basic
    question: "A Quality Assurance (QA) engineer is writing automated checks for a new e-commerce checkout flow. They ensure that every test maps directly back to a specific stakeholder request. Which core benefit of defining the problem space does this mapping best demonstrate?"
    options:
      - "Over-constraining the system architecture."
      - "Avoiding premature performance optimization."
      - "Establishing verifiable traceability."
      - "Delegating design choices to the QA team."
    correct_index: 2
    option_feedback:
      0: |
        Mapping tests back to requests does the opposite of over-constraining architecture. It checks
        that implementation work remains tied to stated needs.
      1: |
        Performance optimization may be a separate concern, but traceable tests are about evidence that
        requirements were satisfied.
      3: |
        QA is verifying the requested behavior, not taking ownership of design mechanics. Traceability
        connects tests to stakeholder intent.
    explanation: "Linking every test back to a stated need is **traceability**: it lets the team confirm each piece of implementation work serves a real requirement, and analyze impact when a requirement later changes."

  - id: 3
    difficulty: intermediate
    question: "A client requests a new social media dashboard and specifies, 'The platform must use a graph database to map user connections.' Why might a software architect push back on this specific phrasing?"
    options:
      - "It fails to articulate any functional value for the end-user."
      - "It artificially narrows the available technical solutions before development even starts."
      - "It makes it impossible to write automated acceptance tests."
      - "It requires the use of unproven, experimental technologies."
    correct_index: 1
    option_feedback:
      0: |
        The dashboard may have functional value, but the phrasing jumps straight to a database choice.
        The objection is premature solution detail.
      2: |
        A graph database requirement could still be tested by inspecting the stack. Testability is not
        the problem; unnecessary constraint is.
      3: |
        A graph database is not inherently experimental. The issue is that the client named a technology
        before the team established that it is the right solution.
    explanation: "Naming a 'graph database' is a design decision, not a user need. Baking it into the requirement constrains the solution space before the team has confirmed it is the best way to store the connections."

  - id: 4
    difficulty: basic
    question: "In a cross-functional Agile team, who is ideally suited to articulate the functional expectations of a new feature, and who should decide the underlying technical mechanics?"
    options:
      - "Software engineers define expectations; product managers dictate mechanics."
      - "Customers or product representatives define expectations; software engineers decide mechanics."
      - "The project manager dictates both expectations and mechanics to ensure alignment."
      - "End-users define mechanics; quality assurance engineers dictate expectations."
    correct_index: 1
    option_feedback:
      0: |
        This reverses the usual responsibilities. Engineers should not invent stakeholder expectations,
        and product managers should not normally dictate implementation mechanics.
      2: |
        A project manager can coordinate, but making one role dictate both problem and solution removes
        the negotiation that requirements are meant to support.
      3: |
        End users are the source of needs and expectations, not the designers of internal mechanics. QA
        helps verify expectations but should not replace stakeholders.
    explanation: "Customers and product representatives own the *what* (expectations), since they understand the business need; engineers and architects own the *how* (mechanics), since they understand the technology. Mixing the roles tends to produce over-constrained or poorly understood requirements."

  - id: 5
    difficulty: intermediate
    question: "Which of the following statements represents an exploration of the solution space rather than a statement of user need?"
    options:
      - "The interface must remain readable on both 4K monitors and 6-inch mobile displays."
      - "The university catalog must return results ordered alphabetically by course name."
      - "The application will utilize an in-memory Redis store to temporarily hold the user's unpurchased items."
      - "Consumers must receive an email notification immediately after a successful transaction."
    correct_index: 2
    option_feedback:
      0: |
        Readable display across device sizes is a required quality of the interface. It states an
        outcome without choosing the layout technology.
      1: |
        Alphabetical ordering is required behavior visible to users. It does not prescribe the data
        structure or query implementation.
      3: |
        Sending an email after a transaction is required system behavior. It says what must happen, not
        which messaging provider or architecture must be used.
    explanation: "Naming **`Redis`** picks a specific storage technology, which explores the solution space. The remaining statements describe required system behavior (readable layout, alphabetical order, an email after a transaction) without dictating how to build it."

  - id: 6
    difficulty: intermediate
    question: "A development team originally built a search feature using a basic database query but later migrated to a dedicated indexing engine to handle typos more effectively. If their original specification was written perfectly, what happened to that specification during this technical migration?"
    options:
      - "It was completely rewritten to reflect the new indexing engine."
      - "It remained entirely unchanged because the core user need didn't shift."
      - "It was discarded because iterative teams do not use specifications."
      - "It was expanded to mandate the new indexing engine for all future company projects."
    correct_index: 1
    option_feedback:
      0: |
        A technology migration should not force a rewrite of a requirement that was stated at the
        user-need level. Only the design changed.
      2: |
        Iterative teams still use requirements; they try to keep them focused on stable needs while
        designs evolve.
      3: |
        Mandating the new indexing engine would turn a flexible requirement into a solution constraint.
        The migration is an implementation choice, not the user need itself.
    explanation: "Because it states the **what** (typo-tolerant search) and never names a technology, the requirement stays valid even when the implementation is swapped out. Keeping design out of requirements is exactly what preserves this flexibility."

  - id: 7
    difficulty: advanced
    question: "A team needs to ensure their new banking portal can handle 10,000 simultaneous logins within two seconds without crashing. What is the recommended format for capturing this specific type of system characteristic?"
    options:
      - "A high-level user persona."
      - "A concrete Quality Attribute Scenario."
      - "A detailed relational database schema."
      - "An Operational Transformation matrix."
      - "A long user story."
    correct_index: 1
    option_feedback:
      0: |
        A persona explains who the users are, but it does not capture a measurable performance condition
        like simultaneous logins within two seconds.
      2: |
        A database schema is a design artifact. It would not by itself express the required performance
        response under load.
      3: |
        Operational Transformation is a collaboration algorithm family, not a requirements format for
        performance qualities.
      4: |
        A long user story would likely bury the measurable quality attribute. A quality attribute
        scenario captures stimulus, environment, response, and measure more directly.
    explanation: "Quality attribute requirements (performance, security, availability) are best captured as **Quality Attribute Scenarios**, which pin down stimulus, environment, response, and a measurable target. That turns a vague goal into something testable, like the 10,000 logins within two seconds here."

  - id: 8
    difficulty: intermediate
    question: "A transit application needs to serve commuters who frequently lose cell service in subway tunnels. Which of the following represents the 'how' (the implementation) rather than the 'what' for this scenario?"
    options:
      - "Commuters must be able to view their ticket barcode without an active network connection."
      - "The system should display the last known train schedule when the device is offline."
      - "The application embeds a local database to cache schedule data directly on the device."
      - "The app must notify the user with a banner that they are viewing offline data."
    correct_index: 2
    option_feedback:
      0: |
        Viewing a ticket barcode offline describes required user-visible behavior. It does not say how
        the app stores the barcode.
      1: |
        Showing the last known schedule offline is still a behavioral requirement. The storage mechanism
        is left open.
      3: |
        Displaying an offline-data banner is user-visible behavior. It can be required without deciding
        whether data comes from a local database, file cache, or another mechanism.
    explanation: "**'Embeds a local database to cache data' is the 'how' because it names a specific implementation technique — the other options describe the required offline behavior without specifying the mechanism.** Embedding a local database to cache data is the design decision (the **'how'**). The other options describe the required offline capabilities (the **'what'**)."
