title: "Shell Scripting & UNIX Philosophy Quiz"
description: "Test your conceptual understanding of shell environments, data streams, and scripting paradigms beyond basic command memorization."
active: true
questions:
  - id: 1
    difficulty: intermediate
    question: "A developer needs to parse a massive log file, extract IP addresses, sort them, and count unique occurrences. Instead of writing a 500-line Python script, they use `grep | cut | sort | uniq -c`. Why is this approach fundamentally preferred in the UNIX environment?"
    options:
      - "Because shell scripts execute faster than compiled C or C++ programs."
      - "It adheres to the UNIX philosophy of combining small, single-purpose programs that communicate via universal text streams."
      - "Because `cut` and `sort` are built-in OS functions that completely bypass the system's kernel."
      - "It prevents the operating system from allocating memory to background processes."
    correct_index: 1
    option_feedback:
      0: |
        The UNIX benefit here is composability, not a guarantee that shell pipelines are faster than
        compiled programs. The pipeline works because each tool accepts and emits a simple stream.
      2: |
        `cut` and `sort` are ordinary programs using OS services. The design win is the shared
        text-stream interface, not bypassing the kernel.
      3: |
        Pipelines can avoid temporary files and stream data between processes, but they do not prevent
        the OS from allocating memory. The core idea is composition through standard streams.
    explanation: "**This pipeline follows the UNIX philosophy of combining single-purpose tools that communicate via text streams.** Each program 'does one thing well' and they cooperate through a shared text-stream interface, so complex tasks emerge from chaining simple tools rather than writing one large program."
  - id: 2
    difficulty: intermediate
    question: "A script runs a command that generates both useful output and a flood of permission error messages. The user runs `script.sh > output.txt`, but the errors still clutter the terminal screen while the useful data goes to the file. What underlying concept explains this behavior?"
    options:
      - "The terminal always mirrors file output for security reasons."
      - "Standard Output (stdout) and Standard Error (stderr) are entirely separate data streams; the `>` operator only redirected stdout."
      - "The script is missing the `#!/bin/bash` shebang, causing it to execute in a fallback compatibility mode."
      - "Standard Error cannot be redirected in UNIX systems and must always be printed to the screen to alert the user."
    correct_index: 1
    option_feedback:
      0: |
        The terminal is showing stderr because only stdout was redirected. There is no security rule
        that mirrors redirected output back to the screen.
      2: |
        The shebang controls which interpreter runs the script, not which stream `>` redirects. This
        behavior comes from stdout and stderr being separate file descriptors.
      3: |
        Stderr can be redirected explicitly, for example with `2> errors.txt`. It stays on the terminal
        here only because the command redirected stdout alone.
    explanation: "**Errors still appear in the terminal because stdout and stderr are separate streams, and `>` only redirects stdout.** A process has three default streams (stdin, stdout, stderr); `>` captures only stdout, so the errors need their own redirection such as `2> errors.txt`."
  - id: 3
    difficulty: advanced
    question: "A C++ developer writes a Bash script with a `for` loop. Inside the loop, they declare a variable `temp_val`. After the loop finishes, they try to print `temp_val` expecting it to be undefined or empty, but it prints the last value assigned in the loop. Why did this happen?"
    options:
      - "Bash automatically exports all variables to the global environment by default."
      - "The developer forgot to use the `let` keyword when declaring the variable."
      - "Unlike C++, Bash lacks strict block-level scoping (like `{}` blocks), meaning variables set within loops or if-statements remain accessible in the script's global scope."
      - "The script was executed with `sudo` privileges, which ignores standard scoping rules."
    correct_index: 2
    option_feedback:
      0: |
        Assignment in Bash creates a shell variable, not an exported environment variable. `export` is
        needed before child processes inherit it.
      1: |
        `let` performs arithmetic evaluation; it does not declare a C++-style block-local variable. Bash
        loop bodies do not create a new lexical scope.
      3: |
        Privilege does not change Bash scoping rules. `sudo` affects permissions and identity, not
        whether loop variables remain visible after the loop.
    explanation: "**Bash lacks block-level scoping, so variables set inside loops remain accessible throughout the entire script.** Unlike C++ `{}` blocks, loops and conditionals do not create a new scope. Unless a variable is declared `local` inside a function, its value persists after the control structure ends."
  - id: 4
    difficulty: advanced
    question: "You want to use a command that requires two file inputs (like `diff`), but your data is currently coming from the live outputs of two different commands. Instead of creating temporary files on the disk, you use the `<(command)` syntax. What is this concept called and what does it achieve?"
    options:
      - "Piping; it concatenates the outputs of both commands into a single, unified text stream."
      - "Process substitution; it runs the commands and treats their outputs as if they were temporary files for the primary command to read."
      - "I/O Redirection; it overwrites the standard input of the `diff` command with standard error."
      - "Arithmetic expansion; it mathematically evaluates the commands and returns their integer exit codes."
    correct_index: 1
    option_feedback:
      0: |
        A pipe gives one command a single stdin stream. `diff` needs two file-like inputs, so process
        substitution is the better fit.
      2: |
        Redirection changes stdin, stdout, or stderr for a process. Process substitution creates a
        filename-like handle that a command can open as an input file.
      3: |
        `<(command)` does not evaluate arithmetic or return exit codes. It exposes the command output
        through a temporary file descriptor.
    explanation: "**This is process substitution — it lets the OS present a command's output as a temporary file descriptor without writing to disk.** The OS exposes the command's stdout through a file-like handle (such as `/dev/fd/63`) that the consuming command opens as if it were a real file — which is why it works with tools like `diff` that expect file arguments."
  - id: 5
    difficulty: intermediate
    question: "A script contains entirely valid Python code, but the file is named `script.sh` and has `#!/bin/bash` at the very top. When executed via `./script.sh`, the terminal throws dozens of 'command not found' and syntax errors. What is the fundamental misunderstanding here?"
    options:
      - "The file extension '.sh' forces the operating system to compile it as a C program."
      - "The shebang (`#!`) dictates which interpreter the OS uses to execute the file, completely overriding the file's extension or the actual code syntax."
      - "Python scripts cannot be made executable via `chmod +x` and must always be run using the 'python' keyword."
      - "The script requires the `set -e` flag to switch the shell into a dynamic Python compatibility mode."
    correct_index: 1
    option_feedback:
      0: |
        UNIX does not execute a file based on the `.sh` extension. The executable bit and the shebang
        determine how `./script.sh` is launched.
      2: |
        Python scripts can be executable when they have execute permission and a Python shebang. They do
        not have to be invoked with the `python` command every time.
      3: |
        `set -e` changes failure handling; it cannot make Bash understand Python syntax. The interpreter
        selection is wrong before that option would help.
    explanation: "**The shebang `#!` dictates the interpreter, completely overriding the file extension — which the OS treats as superficial.** The first line's shebang tells the program loader which interpreter (Bash, Python, Node, …) parses the rest of the file. A `.sh` name with `#!/bin/bash` runs everything through Bash, so valid Python is read as broken shell syntax."
  - id: 6
    difficulty: intermediate
    question: "A developer uses the regular expression `[0-9]{4}` to validate that a user's input is exactly a four-digit PIN. However, the system incorrectly accepts '12345' and 'A1234'. What crucial RegEx concept did the developer omit?"
    options:
      - "Escape characters (`\\`) to neutralize the literal numbers."
      - "The `*` wildcard to capture the whole string."
      - "Anchors (`^` and `$`) to strictly bind the match to the start and end of the string."
      - "Named groups to extract the exact digits into memory."
    correct_index: 2
    option_feedback:
      0: |
        Digits in `[0-9]` are already being matched intentionally. The missing piece is requiring the
        match to cover the whole input.
      1: |
        `*` repeats the previous atom; it is not a general instruction to validate the entire string.
        Anchors are what bind a pattern to the input boundaries.
      3: |
        Named groups help retrieve parts of a match after it succeeds. They do not prevent extra
        characters from appearing before or after the match.
    explanation: "**Anchors were omitted, so the regex matches the valid substring inside the input and ignores the surrounding characters.** `[0-9]{4}` matches *anywhere*, so '12345' succeeds because it contains '1234'. Wrapping the pattern in `^...$` forces it to span the entire input, rejecting any extra characters."
  - id: 7
    difficulty: advanced
    type: multiple
    question: "You are designing a data pipeline in the shell. Which of the following statements correctly describe how UNIX handles data streams and command chaining? (Select all that apply)"
    options:
      - "The pipe operator (`|`) connects the standard output of one command directly to the standard input of the next command."
      - "The `>>` operator appends standard output to a file without overwriting its existing contents."
      - "Standard Error (stderr) is automatically piped to the next command when using the `|` operator."
      - "The `<` operator is used to redirect standard input, allowing a command to read from a file instead of the keyboard."
      - "The `>!` operator is fundamentally required to redirect both stdout and stderr simultaneously in modern Bash."
    correct_indices: [0, 1, 3]
    option_feedback:
      0: |
        One process writes stdout, and the next process reads that same data as stdin. That stream
        connection is the core pipe model.
      1: |
        `>>` matters because it appends stdout instead of replacing the file. That is a different
        operation from ordinary `>` redirection.
      2: |
        A pipe carries stdout by default, not stderr. Error text needs explicit redirection if it should
        join the pipeline.
      3: |
        `< file` is the input-side counterpart to output redirection. It lets a command read stdin from
        a file rather than from the keyboard or previous pipe.
      4: |
        `>!` is not the Bash mechanism for redirecting both stdout and stderr. In Bash, common forms are
        `&>` or explicit descriptor redirection such as `>out 2>err`.
    explanation: "**`|` links stdout to stdin, `>>` appends, and `<` redirects stdin — but pipes do NOT carry stderr and `>!` is not standard Bash.** A plain pipe leaves stderr on the terminal, so error text needs explicit redirection to join the stream. To send both streams to the same place Bash uses `&>` or descriptor forms like `>out 2>err`, not `>!`."
  - id: 8
    difficulty: intermediate
    type: multiple
    question: "You've written a shell script `deploy.sh` but it throws a 'Permission denied' error or fails to run when you type `./deploy.sh`. Which of the following are valid reasons or necessary steps to successfully execute a script as a standalone program? (Select all that apply)"
    options:
      - "The file must have execute permissions granted to it using a command like `chmod +x`."
      - "The file must first be compiled into a binary language using the `gcc` compiler."
      - "The script should start with a valid shebang (e.g., `#!/bin/bash`) to inform the OS which interpreter to invoke."
      - "The script's directory must be permanently added to the `$PATH` variable in order to run it using the `./` prefix."
    correct_indices: [0, 2]
    option_feedback:
      0: |
        `./deploy.sh` asks the OS to execute that file, so execute permission must be present. Read
        permission alone is not enough for direct execution.
      1: |
        Shell scripts are interpreted text, not C/C++ source. Compiling with `gcc` is unrelated to
        running a Bash script.
      2: |
        The shebang is how the OS knows which interpreter should read the script. Without it, direct
        execution may use the wrong shell or fail.
      3: |
        `./deploy.sh` already gives a path to the file. `$PATH` is only searched when the command name
        has no slash.
    explanation: "**A script needs execute permissions (`chmod +x`) and a valid shebang — it is interpreted, not compiled, and `./` bypasses `$PATH`.** The execute bit lets the OS run the file; the shebang says which interpreter reads it. No compilation is involved, and the leading `./` already names the path, so the directory need not be on `$PATH`."
  - id: 9
    difficulty: advanced
    type: multiple
    question: "In Bash, exit codes are crucial for determining if a command succeeded or failed. Which of the following statements are true regarding how Bash handles exit statuses and control flow? (Select all that apply)"
    options:
      - "The `false` command does absolutely nothing except return an error exit code (a non-zero value)."
      - "Running the `set -e` command configures the script to abort on many unhandled non-zero statuses, with documented exceptions."
      - "An exit status of '1' universally indicates complete, bug-free success in UNIX shell scripting."
      - "Control structures like `if` statements evaluate the underlying exit code of a command, rather than looking for a boolean literal like 'true' or 'false'."
    correct_indices: [0, 1, 3]
    option_feedback:
      0: |
        `false` is useful precisely because it does no work except return a failing status. It is a tiny
        command for testing shell control flow.
      1: |
        `set -e` changes the script into fail-fast mode for many unhandled nonzero statuses, but it is
        not a blanket "any nonzero exits" rule. Bash ignores `-e` in several control-flow contexts.
      2: |
        Shell success is exit status `0`; nonzero values indicate failure. That is the reverse of
        treating `1` as boolean true.
      3: |
        Bash `if` runs a command and checks its exit status. It is not looking for a boolean object
        named `true` or `false`.
    explanation: "**Exit code 0 means success; `if` tests exit codes not booleans; and `set -e` creates fail-fast behavior for many unhandled failures.** In UNIX, an exit code of 0 means success, while non-zero (like 1) means failure/error. `if` statements work by running a command and proceeding if its exit code is 0. `set -e` is useful, but Bash intentionally does not exit for every nonzero status: tests in `if`/`while`, non-final commands in `&&`/`||` lists, non-final pipeline commands unless `pipefail` is set, and commands inverted with `!` are common exceptions."
  - id: 10
    difficulty: advanced
    type: multiple
    question: "When you type a command like `python` or `grep` into the terminal, the shell knows exactly what program to run without you providing the full file path. How does the `$PATH` environment variable facilitate this, and how is it managed? (Select all that apply)"
    options:
      - "`$PATH` contains a colon-separated, ordered list of directories that the operating system searches through to find matching executable files."
      - "If you add a directory to `$PATH` using the `export PATH=...` command in your terminal, the change is temporary and disappears when you close the session."
      - "To make a `$PATH` modification permanent, you must append the export command to a shell startup script, such as `~/.bashrc` or `~/.zshrc`."
      - "`$PATH` automatically crawls every single folder on your hard drive in real-time, which is why system commands are discovered so rapidly."
    correct_indices: [0, 1, 2]
    option_feedback:
      0: |
        `$PATH` is an explicit ordered list of directories. The shell searches those directories in
        order until it finds an executable name.
      1: |
        Changing `$PATH` in a terminal affects that shell session and child processes. A new terminal
        will not inherit it unless startup files recreate the change.
      2: |
        Startup files such as `~/.bashrc` or `~/.zshrc` are how a user makes the path change happen
        again in future shells.
      3: |
        The shell does not crawl the whole disk for commands. That would be slow, unpredictable, and
        unsafe compared with an explicit path list.
    explanation: "**`$PATH` is an explicit ordered directory list, not a global crawler — session changes are temporary unless saved to a startup file.** The shell checks the listed directories in order and stops at the first match (crawling the whole disk would be slow and unsafe). An `export PATH=...` in the terminal lasts only for that session unless it is added to a startup file like `~/.bashrc`."
  - id: 11
    difficulty: intermediate
    question: "A developer writes `LOGFILE=\"access errors.log\"` and then runs `wc -l $LOGFILE`. The command fails with 'No such file or directory' errors for both 'access' and 'errors.log'. What is the root cause?"
    options:
      - "The `wc` command does not support filenames with spaces."
      - "The variable name `LOGFILE` must be lowercase in Bash."
      - "The shell performs word splitting on the unquoted variable expansion, breaking the value into two separate arguments at the space boundary."
      - "The `.log` extension is not recognized as a text file by `wc -l`."
    correct_index: 2
    option_feedback:
      0: |
        `wc` can process files whose names contain spaces. The shell split the unquoted variable before
        `wc` received the arguments.
      1: |
        Variable case did not cause this failure. The problem is unquoted expansion followed by word
        splitting on the embedded space.
      3: |
        `wc -l` does not care that the file ends in `.log`. The command failed because one intended
        filename became two arguments.
    explanation: "**The shell word-splits the unquoted variable at the space, turning one filename into two separate arguments.** `wc -l $LOGFILE` expands to `wc -l access errors.log`, so `wc` looks for two files. Quoting the expansion — `wc -l \"$LOGFILE\"` — keeps the value as a single argument."
  - id: 12
    difficulty: basic
    question: "A script is invoked with `./deploy.sh production 8080 myapp`. Inside the script, which variable holds the value `8080`?"
    options:
      - "`$0`"
      - "`$1`"
      - "`$2`"
      - "`$#`"
    correct_index: 2
    option_feedback:
      0: |
        `$0` is the script path or command name. User-supplied positional arguments start at `$1`.
      1: |
        `$1` is `production` in this invocation. `8080` is the second user-supplied argument, so it is
        `$2`.
      3: |
        `$#` is the argument count, which would be `3` here. It does not hold the value of any
        particular argument.
    explanation: "**`$2` holds the value `8080` because `$0` is the script name, `$1` is the first argument, and `$2` is the second.** `$0` is the script name (`./deploy.sh`), `$1` is the first argument (`production`), `$2` is the second argument (`8080`), and `$3` would be `myapp`. `$#` holds the total argument count (3)."
  - id: 13
    difficulty: intermediate
    question: "A script contains the line: `cd /deploy/target && ./run_tests.sh && echo 'All tests passed!'`. If `./run_tests.sh` exits with a non-zero status code, what happens next?"
    options:
      - "The script immediately exits and returns a non-zero status to the caller."
      - "`echo 'All tests passed!'` runs regardless, because it is the last command in the chain."
      - "`echo 'All tests passed!'` does not run, because `&&` short-circuits when the preceding command fails."
      - "The shell re-tries `./run_tests.sh` once before giving up."
    correct_index: 2
    option_feedback:
      0: |
        `&&` skips later commands after a failure, but it does not by itself mean the whole script must
        exit in every context. It is a short-circuit operator.
      1: |
        The last command in an `&&` chain only runs if every earlier command succeeded. A failing test
        command prevents the success message.
      3: |
        Shell control operators do not retry commands automatically. Retrying requires an explicit loop
        or retry command in the script.
    explanation: "**`&&` short-circuits when `./run_tests.sh` fails, so `echo 'All tests passed!'` is never executed.** A non-zero exit code stops the chain — every remaining `&&`-linked command is skipped. The success message runs only when every preceding command exits 0."
  - id: 14
    difficulty: advanced
    type: multiple
    question: "Which of the following statements correctly describe Bash quoting and command substitution behavior? (Select all that apply)"
    options:
      - "Single quotes (`'...'`) prevent all variable and command substitution, treating the content as a completely literal string."
      - "Double quotes (`\"...\"`) allow `$VARIABLE` and `$(command)` to be expanded while still preserving spaces."
      - "Wrapping a variable in double quotes (e.g., `\"$FILE\"`) prevents the shell from splitting its value on whitespace."
      - "Single quotes and double quotes are completely interchangeable in all Bash contexts."
      - "The `$(command)` syntax runs the command in a subshell and replaces itself with the command's standard output."
    correct_indices: [0, 1, 2, 4]
    option_feedback:
      0: |
        Single quotes are the strongest ordinary quoting form: the content is taken literally, including
        `$` and `$(...)`.
      1: |
        Double quotes preserve spaces while still allowing variable and command substitution. That
        combination is why they are common around variable expansions.
      2: |
        Quoting `"$FILE"` keeps a filename with spaces as one argument. Without the quotes, the shell
        performs word splitting.
      3: |
        Single and double quotes are not interchangeable when expansion is involved. Single quotes
        suppress `$...`; double quotes allow it.
      4: |
        `$(command)` runs the command and substitutes its stdout into the surrounding command line.
        Stderr is not captured unless redirected.
    explanation: "**Single quotes suppress all expansion, double quotes allow substitution while protecting spaces, and `$(command)` captures output — single and double quotes are not interchangeable.** Because single quotes block `$...` and double quotes do not, the two are only interchangeable when no expansion is needed. Quoting `\"$VARIABLE\"` is what stops word splitting on values that contain spaces."

  - id: 15
    difficulty: advanced
    question: |
      **Arrange** the pipeline fragments to build a command that extracts all ERROR lines from a log, sorts them, removes duplicates, and counts how many unique errors remain.
    type: parsons
    display: inline
    lines:
      - "grep 'ERROR' server.log"
      - "|"
      - "sort"
      - "|"
      - "uniq"
      - "|"
      - "wc -l"
    distractors:
      - "cat"
      - ">"
    explanation: "**The pipeline is grep → sort → uniq → wc -l; `cat` is unnecessary and `>` would write to a file instead of piping.** `grep` filters for ERROR lines, `sort` orders them (required before `uniq`), `uniq` removes adjacent duplicates, and `wc -l` counts the remaining lines. Each `|` pipes stdout to the next command's stdin — the UNIX philosophy of chaining single-purpose tools. `cat` is unnecessary here (UUOC — Useless Use of Cat) and `>` would redirect to a file rather than pipe."

  - id: 16
    difficulty: expert
    question: |
      **Arrange** the lines to write a shell script that validates a command-line argument, prints an error to stderr if missing, and exits with a non-zero code. Otherwise it prints a logging message.
    type: parsons
    lines:
      - "#!/bin/bash"
      - "if [ $# -lt 1 ]; then"
      - "    echo \"Error: no filename given\" >&2"
      - "    exit 1"
      - "fi"
      - "echo \"Processing $1...\""
    distractors:
      - "    return 1"
      - "endif"
    explanation: "**The script starts with the shebang, uses `[ $# -lt 1 ]` to check arguments, redirects errors to stderr with `>&2`, exits with `1` on failure, and closes the conditional with `fi`.** The shebang (`#!/bin/bash`) must be the first line. The `if [ $# -lt 1 ]` test checks argument count, `>&2` redirects echo to stderr, and `exit 1` terminates with a failure code. The distractor `return 1` only works inside functions, not at the top level of a script. Bash closes an `if` block with `fi`, not `endif`."

  - id: 17
    difficulty: expert
    question: |
      **Arrange** the pipeline fragments to find the 5 most frequently occurring IP addresses in an access log.
    type: parsons
    display: inline
    lines:
      - "grep -oE '[0-9]+\\.[0-9]+\\.[0-9]+\\.[0-9]+' access.log"
      - "|"
      - "sort"
      - "|"
      - "uniq -c"
      - "|"
      - "sort -rn"
      - "|"
      - "head -5"
    distractors:
      - "tail -5"
      - "wc -l"
    explanation: "**The pipeline is grep -oE → sort → uniq -c → sort -rn → head -5; `tail -5` gives the least frequent IPs, not the most.** The `grep -oE` extracts all IPv4 addresses (one per line). `sort` groups identical IPs together (required for `uniq`). `uniq -c` counts each group. `sort -rn` sorts by count in descending numeric order. `head -5` takes the top 5. `tail -5` would give the *least* frequent, and `wc -l` would just count total lines."

  - id: 18
    difficulty: advanced
    question: |
      **Arrange** the fragments to redirect both stdout and stderr of a deployment script into a single log file.
    type: parsons
    display: inline
    lines:
      - "./deploy.sh"
      - ">"
      - "output.log"
      - "2>&1"
    distractors:
      - "1>&2"
      - "2> output.log"
    explanation: "**`> output.log` then `2>&1` captures both streams to the file — order matters because reversing them sends stderr to the terminal.** `> output.log` redirects stdout to the file first, then `2>&1` redirects stderr to wherever stdout currently points (the file). Order matters: `2>&1 > output.log` would send stderr to the *original* stdout (terminal) and only stdout to the file. The distractor `1>&2` goes the wrong direction — it sends stdout to stderr. Using `2> output.log` alone still lets stdout reach the terminal."

  - id: 19
    difficulty: advanced
    question: |
      **Arrange** the pipeline to count how many files under `src/` contain the word `TODO`.
    type: parsons
    display: inline
    lines:
      - "grep -rl 'TODO' src/"
      - "|"
      - "wc -l"
    distractors:
      - "grep -r 'TODO' src/"
      - "sort"
    explanation: "**`grep -rl` prints one filename per match (not per occurrence), so `wc -l` correctly counts matching files — `grep -r` without `-l` would count lines, not files.** `grep -rl` (recursive, files-with-matches) prints one matching filename per line — each file counted once regardless of how many matches it contains. `wc -l` then counts those filenames. The distractor `grep -r` (without `-l`) prints every matching *line*, so `wc -l` would count occurrences, not files. `sort` is unnecessary here since we only need a count."

  - id: 20
    difficulty: intermediate
    question: |
      **Arrange** the fragments to grant execute permission on a script and immediately run it.
    type: parsons
    display: inline
    lines:
      - "chmod +x script.sh"
      - "&&"
      - "./script.sh"
    distractors:
      - "||"
      - "sh script.sh"
    explanation: "**`chmod +x` makes the file executable, `&&` ensures it only runs on success, and `./script.sh` uses the shebang — `||` would run it only on failure.** `chmod +x script.sh` adds the execute bit, making the file runnable as a program. `&&` ensures the script only runs if `chmod` succeeded. `./script.sh` executes it using the shebang to select the interpreter. Using `||` instead of `&&` would run the script only when `chmod` *fails* — the opposite of the intent. `sh script.sh` works but bypasses the shebang, hardcoding the interpreter to `sh` regardless of what the script specifies."

  - id: 21
    difficulty: intermediate
    question: |
      You are working inside `project/` which currently has this structure:

      ```folder-tree
      project/
        README.md
        src/
          app.js
          utils.js
      ```

      You run `mkdir src/components/ui`. What is the result?
    options:
      - "Creates both `src/components/` and `src/components/ui/` successfully."
      - "Creates only `src/components/` since `mkdir` stops at the first missing parent."
      - "Fails with an error — `src/components/` does not exist, and no directories are created."
      - "Creates `src/components/ui/` directly, skipping the intermediate `components/` directory."
    correct_index: 2
    option_feedback:
      0: |
        Plain `mkdir` does not create missing parents. Use `mkdir -p src/components/ui` when
