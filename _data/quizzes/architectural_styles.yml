title: "Architectural Styles Quiz"
description: "Reason across architectural styles — choose the right style for a problem, distinguish styles from patterns, compare platonic and embodied forms, and design heterogeneous architectures that combine multiple styles coherently."
active: true
questions:
  - id: 1
    difficulty: advanced
    type: single
    question: |
      A team is designing a music-streaming service. Track files are processed through `decode → normalize → encode → upload`. Users browse a catalog, get personalized recommendations, and receive new-release notifications. Which architectural-style decisions fit the two parts of the system?
    options:
      - "Use pipe-and-filter for the whole system — it scales naturally."
      - "Use pub-sub for the whole system — it decouples cleanly."
      - "Pipe-and-filter for the pipeline, pub-sub for notifications — a *heterogeneous* architecture."
      - "Use a single layered architecture — layering is the most general style."
    correct_index: 2
    option_feedback:
      0: |
        Pipe-and-filter is great for the track-processing pipeline, but it's a poor fit for new-release notifications — those are events with one producer and many consumers, exactly the use case pub-sub is designed for.
      1: |
        Pub-sub is great for notifications but a poor fit for track processing — there is no benefit to event-routing each `decode` output to a `normalize` subscriber; the linear data flow makes pipe-and-filter simpler and more efficient.
      3: |
        Layered architecture organizes code by abstraction hierarchies (allowed-to-use downward); it is a module style, not a fit for streaming data transformation or asynchronous event distribution. Defaulting to layering for both subproblems leaves better-matched styles (pipe-and-filter, pub-sub) unused.
    explanation: "**Real-world systems are *heterogeneous architectures* — they combine styles because no single style suits every concern.** Pick the style whose promoted qualities match each subproblem: pipe-and-filter for transformation pipelines, pub-sub for asynchronous notification, layered for abstraction stratification, client-server for request/response APIs. The architect's job is to combine them coherently, not to force one onto everything."

  - id: 2
    difficulty: basic
    type: single
    question: |
      Two engineers argue: one calls *Layered Architecture* an architectural **pattern**; the other calls it an architectural **style**. What is the precise distinction?
    options:
      - "Patterns and styles are interchangeable terms — both engineers are right."
      - "A *style* is a strategic framework of constraints; a *pattern* is a tactical solution to a recurring problem."
      - "Patterns are limited to object-oriented systems; styles apply more broadly."
      - "Patterns are documented in catalogs; styles are not."
    correct_index: 1
    option_feedback:
      0: |
        Practitioners do conflate the terms, but they describe different abstractions: a style is a *strategic*, declarative framework of constraints; a pattern is a *tactical* solution to a recurring problem in context. Treating them as interchangeable loses the distinction between picking a macro-structure and solving a specific local design problem inside it.
      2: |
        Both patterns and styles apply to OO and non-OO systems. The Gang of Four book popularized one OO pattern catalog, but other pattern catalogs cover procedural, functional, distributed, and concurrent systems — and architectural styles are typically language-agnostic.
      3: |
        Both styles and patterns are extensively documented in the architecture literature. The distinction is *what they describe* (a vocabulary of constraints vs. a context-problem-solution triple), not *whether they are written down*.
    explanation: "**Styles are *strategic and declarative* (focus on constraints — 'pipes only connect to filters'); patterns are *tactical and constructive* (focus on specific solutions — 'separate business logic from data management with Repository').** A system uses an architectural style; design patterns are applied *inside* the style to solve specific local problems. The boundary is fuzzy in practice but useful for separating macro-structural decisions from recurring tactical solutions."

  - id: 3
    difficulty: intermediate
    type: single
    question: |
      A team's microservice has a published spec saying "pub-sub style" but the code is full of direct service-to-service REST calls bypassing the bus. How would Fairbanks describe what they have, vs. what they intended?
    options:
      - "The *platonic* style is pub-sub but the *embodied* style is mostly client-server."
      - "They have a platonic client-server architecture, which the team has drifted toward."
      - "They have an embodied pub-sub architecture, since pub-sub is what they intended."
      - "They have neither style — the resulting system is essentially style-less."
    correct_index: 0
    option_feedback:
      1: |
        Platonic means the *idealized* style, not the embodied/realized one. The platonic intent here is pub-sub; client-server is the embodied reality that diverged from it.
      2: |
        Intent doesn't make a style embodied. Embodied refers to what is actually realized in the source code — and that is dominated by direct REST calls, not bus interactions.
      3: |
        Real systems always have *some* style, even if it's degraded or hybrid. Calling it 'style-less' obscures the analytic work needed to recognize the mismatch and its consequences.
    explanation: "**Fairbanks distinguishes *platonic* styles (the idealized textbook blueprint with all its constraints) from *embodied* styles (the messy realization in actual source code where constraints are sometimes bent or broken).** When the embodied departs from the platonic, the quality attributes the platonic style guaranteed are no longer in force. Recognizing this gap is what lets architects evaluate whether the deviation is acceptable engineering trade-off or accumulated technical debt."

  - id: 4
    difficulty: intermediate
    type: multiple
    question: |
      Why do mature production systems almost always use a **heterogeneous architecture** rather than a single style? Select all reasons that apply.
    options:
      - "Every style has inhibited quality attributes; no single style satisfies all the system's quality requirements."
      - "Different subsystems have different concerns, each fitting a different style."
      - "Heterogeneous architectures are required by international software standards."
      - "Mixing styles makes a system harder to attack."
      - "Architects can apply each style's strengths to the subproblems where they fit best."
    correct_indices: [0, 1, 4]
    option_feedback:
      0: |
        Every style trades off some qualities for others. Picking one style for the whole system means inheriting its inhibited qualities everywhere — including where they don't apply.
      1: |
        A music app has streaming pipelines (pipe-and-filter), event notifications (pub-sub), a REST API (client-server), and a layered web app. Each subsystem is better served by the style that matches its concerns.
      2: |
        No standard requires heterogeneous architectures. They emerge from engineering judgment about which style suits which concern, not from compliance.
      3: |
        Heterogeneity is not a security technique; uniform architectures can be secure and heterogeneous ones can be insecure. The motivation is fitness, not attack surface.
      4: |
        Each style is a *tool* — composing the right tools for each subproblem produces a better system than forcing one tool everywhere. This is the central practical insight of style theory.
    explanation: "**Real systems are heterogeneous because every style trades off some qualities for others, and a single style cannot satisfy a system whose subsystems have different concerns.** Two integration modes: *hierarchy* (a filter is internally layered), or *overlay* (one set of components participates in multiple styles concurrently, like REST). Mastering architecture means fluency in combining styles deliberately."

  - id: 5
    difficulty: advanced
    type: single
    question: |
      REST is famously described as an *engineered composite*. Which architectural-style constraints from Fielding's derivation are the relevant ones here, and what does each contribute?
    options:
      - "It combines pipe-and-filter, pub-sub, and microservices."
      - "It combines Client-Server, Layered, and optional Code-on-Demand, unified by a uniform interface."
      - "It is just client-server; the other styles are coincidental."
      - "It combines pub-sub, layered, and microservices."
    correct_index: 1
    option_feedback:
      0: |
        Pipe-and-filter is not part of REST's composite; REST does not have a notion of streaming linear transformations through pipes. Microservices are *built on top of* REST but are not part of REST itself.
      2: |
        Calling the other styles coincidental ignores Fielding's deliberate design rationale in his thesis. The layered constraint, for example, is what makes HTTP caching and reverse proxies architecturally legitimate. Removing it would break the web.
      3: |
        Microservices is a *higher-level* architectural style that uses REST (and other protocols), not a constituent of REST itself.
    explanation: "**REST is a deliberately engineered composite: Client-Server provides asymmetric separation; Layered makes intermediaries (CDNs, proxies, caches) transparent and architecturally legitimate; optional Code-on-Demand lets the server extend the client with downloaded scripts (HTML+JS).** These constraints are bound together by REST's uniform-interface constraint (URIs, HTTP verbs, MIME types, hypermedia). Code-on-Demand is optional in Fielding's derivation, so an API can still be RESTful without sending executable client code."

  - id: 6
    difficulty: advanced
    type: single
    question: |
      A team can choose: a Service-Oriented Architecture (SOA) with an enterprise service bus, or a Microservices architecture. The product manager says "they're basically the same — both have services." What is the most important architectural distinction?
    options:
      - "Microservices are a strictly older style than Service-Oriented Architecture."
      - "Microservices use lightweight protocols and own their data; SOA uses heavier protocols and shared data."
      - "SOA is implemented in Java while microservices are implemented in Python or Go."
      - "There is no real difference — both architectural styles are now obsolete."
    correct_index: 1
    option_feedback:
      0: |
        Microservices emerged from SOA in the 2010s. The chronology is the reverse.
      2: |
        Both styles work in any language. Language is a downstream choice, not an architectural distinction.
      3: |
        Both are actively used in industry. SOA dominates large legacy enterprises; microservices dominate cloud-native and modern web companies. Calling either obsolete misreads the market.
    explanation: "**The architecturally significant differences are protocol weight, data ownership, and domain mapping. Microservices use lightweight protocols, own their data, and map to bounded contexts; SOA uses heavier protocols, often shares data via ESBs, and aims at enterprise-wide integration.** These differences cascade into operational complexity (microservices add DevOps overhead), team structure (one team per microservice often works; SOA is more centralized), and evolution (microservices change independently; SOA standardizes interfaces across the enterprise)."

  - id: 7
    difficulty: intermediate
    type: single
    question: |
      A team designs an architecture where their main system is structured as a *pipe-and-filter* pipeline, but each filter is *internally* organized as a strict 4-layer mini-architecture. What kind of style combination is this?
    options:
      - "Overlay — two styles applied concurrently to the same components."
      - "*Hierarchy*: one style governs the macro-structure, a different style governs each component's internals."
      - "Incoherent — you cannot legitimately mix styles in this way."
      - "REST — the canonical example of this kind of style combination."
    correct_index: 1
    option_feedback:
      0: |
        Overlay applies multiple styles to the *same* components concurrently (like REST). This case is different: one style outside, a different style inside — that's hierarchical composition.
      2: |
        Internal sub-style composition is a standard, well-documented combination pattern. Calling it incoherent would invalidate compilers, web servers, and most production systems.
      3: |
        REST is a specific named overlay composite; this scenario is not REST. The composition pattern (hierarchy) is named separately from any specific instance.
    explanation: "**Hierarchical composition: one style governs the macro-structure, a different style governs each component's internal structure.** This is how a compiler's pipe-and-filter pipeline can have a layered lexer inside it, or how a microservice (the macro style) is internally layered. Each level is internally consistent with its own style, and the two compose without conflict because they apply at different scales."

  - id: 8
    difficulty: basic
    type: single
    question: |
      A consultant claims: "If we pick the right architectural style, we'll get all the quality attributes we need automatically." Why is this misleading?
    options:
      - "They are correct — choosing the right style fully determines quality attributes."
      - "Every style *promotes* some qualities and *inhibits* others; the architect must align and compensate."
      - "Quality attributes are independent of the architectural style chosen."
      - "Quality attributes are an outdated concept superseded by modern practice."
    correct_index: 1
    option_feedback:
      0: |
        Style choice strongly *influences* qualities but does not determine all of them. Implementation choices, deployment choices, and operational discipline matter too. A poorly implemented pub-sub system can be less reliable than a well-implemented monolith.
      2: |
        Style choice has *major* impact on quality attributes — pipe-and-filter promotes modifiability, pub-sub promotes evolvability, layered promotes portability. Claiming independence contradicts the entire premise of style-based architecture.
      3: |
        Quality attributes are a foundational concept in modern software architecture (ISO 25010, ATAM evaluation). Far from outdated, they're the basis on which most architectural decisions are evaluated.
    explanation: "**Every style is a fixed trade-off — promoting some qualities and inhibiting others. There is no universally 'best' style; only styles that fit a system's quality priorities better or worse.** The architect must choose a style whose promoted qualities align with the priorities *and* deliberately compensate for the inhibited qualities (e.g., pub-sub's inhibited testability is addressed with extensive tracing and contract testing). Pretending a style 'gives you everything' is the consultant version of wishful thinking."

  - id: 9
    difficulty: intermediate
    type: single
    question: |
      A team has been running their service on a monolithic layered architecture for years. They want microservices. They ask: "do we need to abandon all our layering?" What is the right answer?
    options:
      - "Yes — layering and microservices are fundamentally incompatible styles."
      - "No — they operate at different scales; each service can still be *internally* layered."
      - "Maybe — it depends on the programming language being used."
      - "Yes — microservices require a pipe-and-filter internal structure."
    correct_index: 1
    option_feedback:
      0: |
        The two styles operate at different scales — the microservice boundary is the macro structure, layering is the per-service internal organization. They compose hierarchically without conflict.
      2: |
        Language is irrelevant. Both layered monoliths and layered microservices exist in every major language.
      3: |
        Microservices are agnostic about internal structure — many use layered architecture inside; others use Hexagonal/Clean; others use simple flat modules. There is no requirement for any particular internal style.
    explanation: "**Microservices and layering are not competing — they operate at different scales. The macro-architecture defines service boundaries; layering organizes the code inside each service.** Most production microservices are internally layered or Clean/Hexagonal. The migration question is about boundary placement (where to split monolith into services), not whether to abandon layering."

  - id: 10
    difficulty: expert
    type: single
    question: |
      A team is integrating a third-party library that violates the layering constraints of their architecture (the library makes direct database calls from what should be the application layer). How should they reason about the architectural impact?
    options:
      - "It's fine — third-party libraries don't count toward architectural rules."
      - "Treat it as an *embodied* violation: isolate behind an adapter, accept the trade-off, or pick another library."
      - "Stop using the library immediately — there can be no architectural exceptions."
      - "Layering only applies to code the team wrote, not to third-party dependencies."
    correct_index: 1
    option_feedback:
      0: |
        Third-party code is *part of the embodied system* — its violations have the same architectural consequences as in-house code. Excluding it would create blind spots in architectural reasoning.
      2: |
        Refusing to use any library that doesn't perfectly fit the architecture would block most third-party adoption. The right response is informed evaluation, not absolutist rejection.
      3: |
        Layering applies to the *system as actually realized in source*. In-house vs library code distinction matters for blame and modification cost, not for architectural impact.
    explanation: "**Third-party library violations are real embodied departures from the platonic style — they erode the same quality attributes (modifiability, portability, testability) as in-house violations.** The mature response: contain the violation behind an Adapter (isolate the library's behavior at a single seam), accept the trade-off explicitly, or pick an alternative library that respects the architecture. Pretending the violation doesn't exist accelerates architectural erosion silently."

  - id: 11
    difficulty: basic
    type: multiple
    question: |
      Which items are architectural styles rather than architectural tactics? Select all that apply.
    options:
      - "Publish-subscribe."
      - "Heartbeat."
      - "Pipes and filters."
      - "Caching."
      - "Layered architecture."
    correct_indices: [0, 2, 4]
    option_feedback:
      0: |
        Publish-subscribe defines runtime elements, topics or buses, and constraints such as publisher and subscriber ignorance.
      1: |
        Heartbeat is a tactic for detecting failed components, usually used inside some larger style.
      2: |
        Pipes and filters defines filters, pipes, stream flow, and constraints such as filter independence.
      3: |
        Caching is a tactic for improving a performance scenario, not the dominant shape of the system.
      4: |
        Layered architecture defines modules, allowed-to-use relations, and dependency-direction constraints.
    explanation: "**Styles define the gross structure and constraints; tactics are smaller quality-attribute moves.** A layered or pub-sub system can still use heartbeat, caching, redundancy, and other tactics."

  - id: 12
    difficulty: intermediate
    type: single
    question: |
      A diagram shows source-code packages organized into UI, Service, Domain, and Repository layers. A teammate claims the diagram proves the system will stay available if the Repository layer fails. What is the best correction?
    options:
      - "Correct: layered architecture directly proves availability because the upper layers can keep running."
      - "The diagram is a module view; availability needs runtime, deployment, and recovery views."
      - "The diagram proves performance, not availability."
      - "A layered diagram is invalid unless every layer is deployed on a separate machine."
    correct_index: 1
    option_feedback:
      0: |
        A source-code layer is not an independently failing runtime process. Availability claims need runtime failure and recovery information.
      2: |
        Layered diagrams can reveal some performance costs, such as extra calls through layers, but that is not the claim in the stem.
      3: |
        Layers are design-time modules. Tiers are runtime deployment units; they do not have to correspond one-to-one.
    explanation: "**The viewtype determines the claim you can make.** Layered architecture is primarily a module style, so it helps reason about modifiability, portability, and dependency direction. Availability needs component-and-connector, deployment, and behavioral evidence."
