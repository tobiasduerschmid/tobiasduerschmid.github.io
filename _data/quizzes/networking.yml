title: "Networking Fundamentals Quiz"
description: "Test your understanding of network architectures, the TCP/IP protocol stack, HTTP, and how the internet works."
questions:
  - id: 1
    question: "In a client-server architecture, which statement is TRUE?"
    options:
      - "Both clients and servers can initiate connections to each other."
      - "The server proactively pushes updates to clients without being asked."
      - "Connections are always initiated by the client, not the server."
      - "Only one client can be connected to a server at any given time."
    correct_index: 2
    explanation: "In client-server architectures, the client always initiates the connection. The server passively listens for incoming requests and responds to them. Multiple clients can connect to the same server simultaneously, and the server never reaches out to a client unprompted (unless a different pattern like WebSockets is used on top)."

  - id: 2
    question: "What is the key advantage of peer-to-peer (P2P) architecture over client-server?"
    options:
      - "P2P guarantees faster speeds than client-server in every situation."
      - "P2P has no single point of failure because there is no central server."
      - "P2P is always simpler to implement than client-server."
      - "P2P produces fewer total network messages than client-server."
    correct_index: 1
    explanation: "In a P2P architecture there is no central server whose failure would bring down the whole system. Each peer continues communicating with other available peers. However, if a peer goes offline, any resources unique to that peer become temporarily unavailable — P2P eliminates a single point of failure at the infrastructure level, but individual peers are still fallible."

  - id: 3
    question: "What is the difference between throughput and latency?"
    options:
      - "They are the same thing — both measure how fast a system responds."
      - "Throughput measures the volume of requests processed per time period; latency measures the time for a single request to complete."
      - "Latency measures how many servers are active; throughput measures how many clients are connected."
      - "Throughput is only relevant for UDP connections; latency is only relevant for TCP connections."
    correct_index: 1
    explanation: "Throughput is about volume (e.g., 500 requests/second), while latency is about individual speed (e.g., a single database query takes 40ms). They are related but distinct — adding more servers increases throughput without necessarily reducing latency. Caching reduces latency and may also improve throughput."

  - id: 4
    question: "In the TCP/IP stack, what is the purpose of the Transport Layer?"
    options:
      - "It handles the physical transmission of data over Ethernet cables and Wi-Fi."
      - "It provides addressing and routing of data packets between different networks."
      - "It provides end-to-end communication between specific applications running on different hosts."
      - "It provides an interface for applications to exchange data using protocols like HTTP."
    correct_index: 2
    explanation: "The Transport Layer (TCP, UDP) sits between the Internet Layer and the Application Layer. It enables communication between specific *applications* on different machines — not just between machines. The Link Layer handles physical transmission, the Internet Layer handles routing between networks, and the Application Layer gives apps protocols like HTTP to talk to each other."

  - id: 5
    question: "When data travels *down* through the TCP/IP stack before being sent, what happens at each layer?"
    options:
      - "Each layer removes a header from the message before passing it down."
      - "Each layer re-encrypts the entire message with a different cipher."
      - "Each layer wraps the higher-layer message as its payload and adds its own header."
      - "Each layer splits the message into equal-sized fragments and sends them independently."
    correct_index: 2
    explanation: "This process is called encapsulation — think of sealing a letter inside successively larger envelopes. An HTTP message is placed inside a TCP envelope (port numbers added), that is placed inside an IP envelope (IP addresses added), that is placed inside an Ethernet envelope (MAC addresses added). Each envelope carries only the metadata needed for its own delivery step. The process reverses (decapsulation) at the receiving end."

  - id: 6
    question: "A student runs `node server.js` and their terminal shows: `Server listening on http://127.0.0.1:5000`. They open a browser on the same machine. Which URL should they visit?"
    options:
      - "http://127.0.0.1:5000 — the loopback address the server is listening on"
      - "http://0.0.0.0:5000 — the universal interface address"
      - "They cannot connect without a public IP address and port-forwarding."
      - "http://mymachine.local:5000 — the local DNS hostname"
    correct_index: 0
    explanation: "`127.0.0.1` is the loopback (localhost) address that always refers to the local machine itself. A server listening on `127.0.0.1:5000` is reachable from any browser on the *same* machine at that exact address — no internet connection or public IP required. This is the standard local development workflow."

  - id: 7
    question: "HTTP is described as a 'stateless' protocol. What does this mean?"
    options:
      - "The server discards all data from memory after each request."
      - "Each request is independent — the server retains no memory of previous requests from the same client."
      - "HTTP connections are never encrypted."
      - "HTTP can only transfer plain text, not binary content like images."
    correct_index: 1
    explanation: "Stateless means every HTTP request is treated as completely independent. The server does not automatically track which requests came from the same user or session. This is why web applications use mechanisms like cookies and session tokens to maintain state across multiple requests."

  - id: 8
    question: "Your Express route handler queries the database for a course by ID, but no matching course exists. Which HTTP status code should the handler return?"
    options:
      - "200 OK — the server processed the request without crashing."
      - "201 Created — a new resource will be created to fill the gap."
      - "404 Not Found — the server processed the request but the resource does not exist."
      - "500 Internal Server Error — the missing data constitutes a server failure."
    correct_index: 2
    explanation: "404 Not Found is the correct response when the server successfully handled the request but the requested resource simply doesn't exist at that URL. Use 200 when data is returned successfully, 201 when a new resource was created, and 500 only for unexpected server-side failures (like an unhandled exception or a crashed database connection)."

  - id: 9
    question: "Why was HTTPS created, and what does it add on top of HTTP?"
    options:
      - "HTTPS is faster than HTTP because it compresses data before transmission."
      - "HTTPS uses SSL/TLS to encrypt the connection, protecting data like passwords from being read or tampered with in transit."
      - "HTTPS replaces TCP with UDP to reduce round-trip latency for web browsing."
      - "HTTPS adds server-side caching so the browser avoids repeated database lookups."
    correct_index: 1
    explanation: "HTTPS (HTTP Secure) wraps HTTP inside an SSL/TLS encryption layer. This prevents anyone intercepting traffic between the client and server from reading or modifying it — critical for passwords, personal information, and financial transactions. HTTPS has become the default for all public web pages, even static ones without sensitive data, because it also verifies the server's identity."

  - id: 10
    question: "What is the correct order of the TCP/IP layers from bottom (closest to hardware) to top (closest to the application)?"
    options:
      - "Application → Transport → Internet → Link"
      - "Link → Internet → Transport → Application"
      - "Internet → Link → Application → Transport"
      - "Transport → Application → Link → Internet"
    correct_index: 1
    explanation: "Bottom to top: **Link** (physical hardware — Ethernet, Wi-Fi), **Internet** (IP addressing and routing between networks), **Transport** (TCP/UDP end-to-end communication between applications), **Application** (HTTP, HTTPS, DNS, SSH — the protocols your code uses directly). Each layer uses only the layer immediately below it, enabling clean separation of concerns."

  - id: 11
    type: multiple
    question: "Which of the following are guarantees provided by **TCP** but **NOT** by UDP? (Select all that apply)"
    options:
      - "Messages are delivered in the order they were sent."
      - "Lost messages are automatically detected and retransmitted."
      - "Each message includes a checksum for error detection."
      - "Messages are delivered with zero additional latency or overhead."
    correct_indices:
      - 0
      - 1
      - 2
    explanation: "TCP guarantees ordering (sequence numbers), retransmission of lost messages (ACK + timeout), and error detection (checksums) — but all three come at a cost: the 3-way handshake, per-message ACKs, and connection teardown add overhead. 'Zero additional latency' is a property of **UDP**, which fires data at the receiver with no setup and no acknowledgement."
