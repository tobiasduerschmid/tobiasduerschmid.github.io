title: "Networking Fundamentals Quiz"
description: "Test your understanding of network architectures, the TCP/IP protocol stack, HTTP, and how the internet works."
active: true
questions:
  - id: 1
    difficulty: basic
    question: "In a client-server architecture, which statement is TRUE?"
    options:
      - "Both clients and servers can initiate connections to each other."
      - "The server proactively pushes updates to clients without being asked."
      - "In the basic request-response model, the client initiates contact and the server listens/responds."
      - "Only one client can be connected to a server at any given time."
    correct_index: 2
    option_feedback:
      0: |
        A server can send data after a connection or session exists, but in this simple client-server
        model the client initiates contact.
      1: |
        Server push requires an established mechanism such as WebSockets or server-sent events. It is
        not the default meaning of client-server architecture.
      3: |
        Many clients can connect to one server. The architecture centralizes service, not exclusivity.
    explanation: "**In the basic client-server request-response model, the client initiates contact and the server listens/responds.** Multiple clients can connect to the same server simultaneously. A server can send data after a connection or session exists — for example through WebSockets, server-sent events, or push notifications — but that is an additional interaction mechanism layered on top of the basic client-server shape."

  - id: 2
    difficulty: basic
    question: "What is the key advantage of peer-to-peer (P2P) architecture over client-server?"
    options:
      - "P2P guarantees faster speeds than client-server in every situation."
      - "P2P has no single point of failure because there is no central server."
      - "P2P is always simpler to implement than client-server."
      - "P2P produces fewer total network messages than client-server."
    correct_index: 1
    option_feedback:
      0: |
        P2P can improve resilience, but it does not guarantee better speed. Peer availability, upload
        capacity, and routing all affect performance.
      2: |
        P2P is often harder to implement because discovery, trust, NAT traversal, and consistency move
        into the application design.
      3: |
        P2P can produce more coordination messages than client-server. Its main advantage here is
        avoiding one central failure point.
    explanation: "**P2P eliminates the single point of failure because there is no central server — every peer can continue communicating with other available peers if one goes offline.** In a P2P architecture there is no central server whose failure would bring down the whole system. Each peer continues communicating with other available peers. However, if a peer goes offline, any resources unique to that peer become temporarily unavailable — P2P eliminates a single point of failure at the infrastructure level, but individual peers are still fallible."

  - id: 3
    difficulty: basic
    question: "What is the difference between throughput and latency?"
    options:
      - "They are the same thing — both measure how fast a system responds."
      - "Throughput measures the volume of requests processed per time period; latency measures the time for a single request to complete."
      - "Latency measures how many servers are active; throughput measures how many clients are connected."
      - "Throughput is only relevant for UDP connections; latency is only relevant for TCP connections."
    correct_index: 1
    option_feedback:
      0: |
        A system can have high throughput and still make one user wait a long time. Volume per second
        and delay per request are different measurements.
      2: |
        Server count and client count may influence performance, but they are not the definitions of
        latency and throughput.
      3: |
        Both latency and throughput matter for TCP, UDP, and higher-level protocols. They are general
        performance concepts, not protocol-exclusive metrics.
    explanation: "**Throughput measures volume per time period (e.g., requests/sec) while latency measures the time for a single request to complete — they are related but independently optimized.** Throughput is about volume (e.g., 500 requests/second), while latency is about individual speed (e.g., a single database query takes 40ms). They are related but distinct — adding more servers increases throughput without necessarily reducing latency. Caching reduces latency and may also improve throughput."

  - id: 4
    difficulty: basic
    question: "In the TCP/IP stack, what is the purpose of the Transport Layer?"
    options:
      - "It handles the physical transmission of data over Ethernet cables and Wi-Fi."
      - "It provides addressing and routing of data packets between different networks."
      - "It provides end-to-end communication between specific applications running on different hosts."
      - "It provides an interface for applications to exchange data using protocols like HTTP."
    correct_index: 2
    option_feedback:
      0: |
        Physical transmission over Wi-Fi or Ethernet belongs below the transport layer. TCP and UDP
        operate above that link-level delivery.
      1: |
        Routing packets between networks is the Internet layer’s job. The transport layer adds
        application-to-application communication through ports and transport behavior.
      3: |
        HTTP is an application-layer protocol. It uses transport services rather than being provided by
        the transport layer itself.
    explanation: "**The Transport Layer provides end-to-end communication between specific applications (ports) on different hosts — distinguishing it from the Internet Layer which routes between machines.** The Transport Layer (TCP, UDP) sits between the Internet Layer and the Application Layer. It enables communication between specific *applications* on different machines — not just between machines. The Link Layer handles physical transmission, the Internet Layer handles routing between networks, and the Application Layer gives apps protocols like HTTP to talk to each other."

  - id: 5
    difficulty: basic
    question: "When data travels *down* through the TCP/IP stack before being sent, what happens at each layer?"
    options:
      - "Each layer removes a header from the message before passing it down."
      - "Each layer re-encrypts the entire message with a different cipher."
      - "Each layer wraps the higher-layer message as its payload and adds its own header."
      - "Each layer splits the message into equal-sized fragments and sends them independently."
    correct_index: 2
    option_feedback:
      0: |
        Headers are removed when data moves upward at the receiver. Moving downward adds each layer’s
        header around the higher-layer payload.
      1: |
        Encryption may happen in some protocols, but encapsulation is the normal layer-by-layer
        operation being tested here.
      3: |
        Fragmentation or segmentation can happen, but the general per-layer operation is wrapping data
        with layer-specific metadata.
    explanation: "**Each layer wraps the higher-layer message as its payload and adds its own header — a process called encapsulation — which reverses as decapsulation at the receiver.** This process is called encapsulation — think of sealing a letter inside successively larger envelopes. An HTTP message is placed inside a TCP envelope (port numbers added), that is placed inside an IP envelope (IP addresses added), that is placed inside an Ethernet envelope (MAC addresses added). Each envelope carries only the metadata needed for its own delivery step. The process reverses (decapsulation) at the receiving end."

  - id: 6
    difficulty: basic
    question: "A student runs `node server.js` and their terminal shows: `Server listening on http://localhost:5000`. They open a browser on the same machine. Which URL should they visit?"
    options:
      - "http://localhost:5000 — the exact loopback URL printed by the server"
      - "http://0.0.0.0:5000 — the universal interface address"
      - "They cannot connect without a public IP address and port-forwarding."
      - "http://mymachine.local:5000 — the local DNS hostname"
    correct_index: 0
    option_feedback:
      1: |
        `0.0.0.0` is a bind address meaning all local interfaces; it is not the usual destination URL
        typed into a browser.
      2: |
        A browser on the same machine can reach a loopback server without public IPs or port forwarding.
      3: |
        A local hostname may work if local name resolution is configured, but it is not the URL the
        server printed. Start with the shown `localhost` URL.
    explanation: "**The browser should visit the exact `localhost` URL printed by the server.** `localhost` is the local loopback name; on most systems it resolves to a loopback address such as `127.0.0.1` or `::1`. A browser on the same machine can reach that server without a public IP address or port forwarding. Typing `127.0.0.1:5000` often works for IPv4 loopback too, but the most direct answer is the URL the terminal already gave: `http://localhost:5000`."

  - id: 7
    difficulty: basic
    question: "HTTP is described as a 'stateless' protocol. What does this mean?"
    options:
      - "The server discards all data from memory after each request."
      - "Each request is independent — the server retains no memory of previous requests from the same client."
      - "HTTP connections are never encrypted."
      - "HTTP can only transfer plain text, not binary content like images."
    correct_index: 1
    option_feedback:
      0: |
        Stateless does not mean a server literally clears all memory after every request. It means HTTP
        itself does not remember a client’s previous request context.
      2: |
        Encryption is a separate HTTP-versus-HTTPS issue. Statelessness is about request independence.
      3: |
        HTTP can transfer many media types, including images and other binary content. Statelessness is
        not about payload format.
    explanation: "**HTTP is stateless because the server retains no memory of previous requests — each request is treated as completely independent, which is why cookies and session tokens are needed.** Stateless means every HTTP request is treated as completely independent. The server does not automatically track which requests came from the same user or session. This is why web applications use mechanisms like cookies and session tokens to maintain state across multiple requests."

  - id: 8
    difficulty: basic
    question: "Your Express route handler queries the database for a course by ID, but no matching course exists. Which HTTP status code should the handler return?"
    options:
      - "200 OK — the server processed the request without crashing."
      - "201 Created — a new resource will be created to fill the gap."
      - "404 Not Found — the server processed the request but the resource does not exist."
      - "500 Internal Server Error — the missing data constitutes a server failure."
    correct_index: 2
    option_feedback:
      0: |
        The server did not successfully return the requested resource. A handled request with missing
        data should not pretend success with `200`.
      1: |
        `201 Created` is for successful creation of a new resource. A missing course lookup is not a
        creation event.
      3: |
        A missing course is normally a client-visible resource absence, not an unexpected server
        failure. Use `500` for server-side faults such as crashes or unhandled exceptions.
    explanation: "**404 Not Found is correct because the server successfully handled the request but the resource simply does not exist — 500 is only for unexpected server-side failures.** 404 Not Found is the correct response when the server successfully handled the request but the requested resource simply doesn't exist at that URL. Use 200 when data is returned successfully, 201 when a new resource was created, and 500 only for unexpected server-side failures (like an unhandled exception or a crashed database connection)."

  - id: 9
    difficulty: basic
    question: "Why was HTTPS created, and what does it add on top of HTTP?"
    options:
      - "HTTPS is faster than HTTP because it compresses data before transmission."
      - "HTTPS uses TLS to encrypt and authenticate the connection, protecting data like passwords from being read or tampered with in transit."
      - "HTTPS replaces TCP with UDP to reduce round-trip latency for web browsing."
      - "HTTPS adds server-side caching so the browser avoids repeated database lookups."
    correct_index: 1
    option_feedback:
      0: |
        HTTPS may have performance optimizations in practice, but its defining addition is TLS security,
        not compression.
      2: |
        Adding HTTPS does not mean the protocol simply swaps TCP for UDP. HTTP/1.1 and HTTP/2 over
        HTTPS commonly use TLS over TCP; HTTP/3 uses QUIC over UDP, but security is still the defining
        addition.
      3: |
        Caching is an HTTP/application concern. HTTPS protects traffic in transit rather than adding
        server-side caching.
    explanation: "**HTTPS adds TLS security to HTTP: confidentiality, integrity, and server authentication.** This prevents someone intercepting traffic between the client and server from reading or modifying it — critical for passwords, personal information, and financial transactions. Historically, HTTPS most often meant HTTP over TLS over TCP; modern HTTP/3 carries the same HTTP semantics over QUIC, which runs over UDP. The key idea is therefore security in transit, not caching, compression, or one fixed transport protocol."

  - id: 10
    difficulty: basic
    question: |
      **Arrange** the TCP/IP layers in order from bottom (closest to hardware) to top (closest to the application).
    type: parsons
    lines:
      - "Link Layer"
      - "Internet Layer"
      - "Transport Layer"
      - "Application Layer"
    distractors:
      - "Security Layer"
      - "Performance Layer"
    explanation: "**The correct bottom-to-top order is Link → Internet → Transport → Application, with each layer using only the layer immediately below it.** Bottom to top: **Link** (physical hardware — Ethernet, Wi-Fi), **Internet** (IP addressing and routing between networks), **Transport** (TCP/UDP end-to-end communication between applications), **Application** (HTTP, HTTPS, DNS, SSH — the protocols your code uses directly). Each layer uses only the layer immediately below it, enabling clean separation of concerns."

  - id: 11
    difficulty: basic
    type: multiple
    question: "Which of the following are guarantees provided by **TCP** but **NOT** by UDP by itself? (Select all that apply)"
    options:
      - "Application bytes are delivered to the receiver in order."
      - "Lost data is detected and retransmitted."
      - "Corrupted TCP segments are discarded and the affected data is recovered through TCP's reliability mechanisms."
      - "Data is delivered with no setup, acknowledgment, or reliability overhead."
    correct_indices:
      - 0
      - 1
      - 2
    option_feedback:
      0: |
        In-order byte delivery is one of TCP's central guarantees. UDP datagrams can arrive out of
        order unless the application adds its own sequencing.
      1: |
        TCP detects missing data and retransmits. UDP leaves loss handling to the application.
      2: |
        TCP checksum failures cause bad segments to be discarded, and missing acknowledgments lead to
        retransmission. UDP has a checksum too, but not the same recovery guarantee.
      3: |
        TCP’s guarantees require acknowledgments, sequencing, and retransmission machinery. Those
        mechanisms add overhead rather than eliminating it. UDP is lower-overhead, not zero-overhead.
    explanation: "**TCP provides reliable, in-order byte-stream delivery; UDP provides a minimal datagram service and leaves reliability to the application.** TCP uses sequence numbers, checksums, acknowledgments, and retransmission to recover from loss or corruption. UDP has much less protocol machinery and can be a better fit for latency-sensitive traffic, but it does not provide zero latency, zero overhead, ordered delivery, duplicate protection, or automatic retransmission."
