title: "Networking Fundamentals Quiz"
description: "Test your understanding of network architectures, the TCP/IP protocol stack, HTTP, and how the internet works."
questions:
  - question: "In a client-server architecture, which statement is TRUE?"
    options:
      - "Both clients and servers can initiate connections to each other."
      - "The server is always the one initiating connections to clients."
      - "Connections are always initiated by the client, not the server."
      - "Clients can only connect to the server one at a time."
    correct_index: 2
    explanation: "In client-server architectures, it is always the client that initiates the connection. The server passively listens for incoming requests and responds to them. Multiple clients can connect to the same server simultaneously."

  - question: "What is the key advantage of peer-to-peer (P2P) architecture over client-server?"
    options:
      - "P2P guarantees faster speeds than client-server in all situations."
      - "P2P has no single point of failure since there is no central server."
      - "P2P is simpler to implement than client-server."
      - "P2P requires fewer total network messages than client-server."
    correct_index: 1
    explanation: "In a P2P architecture, there is no central server that, if it fails, would bring down the entire system. Each peer can continue operating and communicating with other available peers. However, if a peer goes offline, any resources only that peer offers become unavailable."

  - question: "What is the difference between throughput and latency?"
    options:
      - "They are the same thing — both measure how fast a system responds."
      - "Throughput measures the volume of requests processed per time period; latency measures the time for a single request to complete."
      - "Latency measures how many servers are running; throughput measures how many clients are connected."
      - "Throughput is only relevant for UDP; latency is only relevant for TCP."
    correct_index: 1
    explanation: "Throughput is about volume (e.g., 100 requests/second), while latency is about individual speed (e.g., 10ms per request). They are related but distinct — you can increase throughput by adding servers without reducing latency, and you can reduce latency with caching without necessarily changing throughput."

  - question: "In the TCP/IP stack, what is the purpose of the Transport Layer?"
    options:
      - "It handles the physical transmission of data over cables and Wi-Fi."
      - "It provides addressing and routing of data packets between networks."
      - "It provides end-to-end communication between applications running on different hosts."
      - "It provides an interface for applications to exchange data using protocols like HTTP."
    correct_index: 2
    explanation: "The Transport Layer (TCP, UDP) sits between the Internet Layer and the Application Layer. It enables communication between specific applications on different machines, not just between machines. The Link Layer handles physical transmission, the Internet Layer handles addressing/routing, and the Application Layer provides the interface for apps."

  - question: "When data travels through the TCP/IP stack, what happens to the message at each layer?"
    options:
      - "Each layer removes a header from the message before passing it down."
      - "Each layer encrypts the message using a different algorithm."
      - "Each layer wraps the higher-layer message as its payload and adds its own header."
      - "Each layer splits the message into equal-sized fragments."
    correct_index: 2
    explanation: "This is called encapsulation. When an HTTP message is sent, the Transport Layer wraps it inside a TCP segment (adding a TCP header), the Internet Layer wraps that inside an IP packet (adding an IP header), and the Link Layer wraps that inside an Ethernet frame (adding an Ethernet header) — like Russian nesting dolls."

  - question: "What does the IP address `127.0.0.1` refer to?"
    options:
      - "The default gateway router on your local network."
      - "Google's public DNS server."
      - "The broadcast address that sends data to all devices on the network."
      - "Localhost — your own machine."
    correct_index: 3
    explanation: "`127.0.0.1` is a special reserved address called 'localhost' that always refers to the computer you are currently using. When developing web applications, you run a server on localhost so your browser (also on your machine) can connect to it for testing."

  - question: "HTTP is described as a 'stateless' protocol. What does this mean?"
    options:
      - "The server crashes and loses all data after each request."
      - "Each request is independent — the server does not remember any information about previous requests from the same client."
      - "HTTP connections never use encryption."
      - "HTTP can only transfer text, not binary data like images."
    correct_index: 1
    explanation: "Stateless means each HTTP request is treated as completely independent. The server does not automatically track which requests came from the same user. This is why web applications use techniques like cookies and sessions to maintain state across requests."

  - question: "You receive an HTTP response with status code `404`. What happened?"
    options:
      - "The request was successful and the data was returned."
      - "The server encountered an internal error and could not process your request."
      - "The server cannot find the requested resource at the given URL."
      - "Your request was malformed and the server could not parse it."
    correct_index: 2
    explanation: "404 Not Found is a 4xx client error — it means the URL you requested does not correspond to any resource on the server. 200 means success, 500 means server error, and 400 means bad request (malformed syntax)."

  - question: "Why was HTTPS created, and what does it add on top of HTTP?"
    options:
      - "HTTPS is faster than HTTP because it compresses all data before sending."
      - "HTTPS uses SSL/TLS to encrypt communication, protecting sensitive data like passwords from being intercepted."
      - "HTTPS replaces TCP with UDP to reduce latency for web browsing."
      - "HTTPS adds server-side caching to reduce the number of database queries."
    correct_index: 1
    explanation: "HTTPS (HTTP Secure) adds an encryption layer using SSL/TLS protocols. This prevents attackers from reading data in transit — critical for passwords, personal information, and financial data. HTTPS has become the default for all public web pages, even those without sensitive data."

  - question: "What is the correct order of the TCP/IP layers from bottom (closest to hardware) to top (closest to the user)?"
    options:
      - "Application → Transport → Internet → Link"
      - "Link → Internet → Transport → Application"
      - "Internet → Link → Application → Transport"
      - "Transport → Application → Link → Internet"
    correct_index: 1
    explanation: "The layers from bottom to top are: Link (physical hardware like Ethernet/Wi-Fi), Internet (IP addressing and routing), Transport (TCP/UDP end-to-end communication), Application (HTTP, HTTPS, DNS — what your apps use directly). Higher layers use only lower layers, creating a clean layered architecture."

  - type: multiple
    question: "Which of the following are guarantees provided by TCP but NOT by UDP? (Select all that apply)"
    options:
      - "Messages are delivered in the order they were sent."
      - "Lost messages are automatically retransmitted."
      - "Error detection via checksums is included."
      - "Messages are delivered with no additional delay or overhead."
    correct_indices:
      - 0
      - 1
      - 2
    explanation: "TCP guarantees message ordering, retransmission of lost messages, and error detection — but these come at a cost of additional overhead (the 3-way handshake, per-message ACKs, and connection teardown). 'No additional delay' is actually a property of UDP, which just sends data without any of these reliability mechanisms."
