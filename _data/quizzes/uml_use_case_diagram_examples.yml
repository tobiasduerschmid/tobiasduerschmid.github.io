title: "UML Use Case Diagram Practice"
description: "Test your ability to read and interpret UML Use Case Diagrams."
active: true
questions:
  - id: 1
    difficulty: basic
    type: single
    question: >
      In a use case diagram, what does an **actor** represent?

      <div data-uml-type="usecase" data-uml-spec="@startuml&#10;actor Customer&#10;actor &quot;Payment System&quot; as PS&#10;usecase &quot;Place Order&quot; as UC1&#10;usecase &quot;Process Payment&quot; as UC2&#10;rectangle &quot;Online Store&quot; {&#10;  UC1&#10;  UC2&#10;}&#10;Customer -- UC1&#10;PS -- UC2&#10;@enduml"></div>
    options:
      - "A specific person who uses the system."
      - "A role that interacts with the system."
      - "A class that implements system behavior."
      - "A database that stores user information."
    correct_index: 1
    option_feedback:
      0: |
        Actors abstract away from individuals. The same person can act as different roles in different scenarios, and many people can share one actor role.
      2: |
        Classes belong inside design models such as class diagrams. A use case actor is external to the system being modeled.
      3: |
        A database can be an external system actor if it interacts with the subject, but an actor is not defined as a data store. It represents a role or external system participating in a use case.
    explanation: "**An actor represents a role, not a specific person.** One person can play multiple roles (a professor who is also a student), and many people can share the same role; an actor can also be an external system, not just a human."

  - id: 2
    difficulty: basic
    type: single
    question: >
      Look at this diagram. What does the `<<include>>` relationship mean here?

      <div data-uml-type="usecase" data-uml-spec="@startuml&#10;actor Customer&#10;usecase &quot;Purchase Item&quot; as UC1&#10;usecase &quot;Login&quot; as UC2&#10;rectangle &quot;Store&quot; {&#10;  UC1&#10;  UC2&#10;}&#10;Customer -- UC1&#10;UC1 ..> UC2 : <<include>>&#10;@enduml"></div>
    options:
      - "Login can optionally occur when purchasing an item."
      - "Login always occurs as part of purchasing an item."
      - "Purchase Item is a specialized version of Login."
      - "Login extends the Purchase Item behavior with additional steps."
    correct_index: 1
    option_feedback:
      0: |
        Optional behavior is modeled with `<<extend>>`, not `<<include>>`. Include means the base use case always uses the included behavior.
      2: |
        Specialization would use generalization notation. Include is about factoring mandatory shared behavior into a separate use case.
      3: |
        That describes `<<extend>>`, where optional behavior supplements a base flow. Here `Purchase Item` includes `Login`.
    explanation: "**`<<include>>` means Login always occurs as a mandatory part of Purchase Item.** The included behavior is unconditional — like a function call that always runs — not the sometimes-behavior that `<<extend>>` models."

  - id: 3
    difficulty: intermediate
    type: single
    question: >
      What is the key difference between `<<include>>` and `<<extend>>`?

      <div data-uml-type="usecase" data-uml-spec="@startuml&#10;actor User&#10;usecase &quot;Checkout&quot; as UC1&#10;usecase &quot;Login&quot; as UC2&#10;usecase &quot;Apply Coupon&quot; as UC3&#10;rectangle &quot;Shop&quot; {&#10;  UC1&#10;  UC2&#10;  UC3&#10;}&#10;User -- UC1&#10;UC1 ..> UC2 : <<include>>&#10;UC3 ..> UC1 : <<extend>>&#10;@enduml"></div>
    options:
      - "Include uses a solid arrow; extend uses a dashed arrow."
      - "Include is for actors; extend is for use cases."
      - "Include means the behavior always happens; extend means it sometimes happens."
      - "Include arrows point to the base; extend arrows point to the extension."
    correct_index: 2
    option_feedback:
      0: |
        Both include and extend are shown as dashed dependency arrows with stereotypes. The distinction is mandatory shared behavior versus optional extension behavior.
      1: |
        Include and extend are relationships between use cases. Actor associations are the lines between actors and use cases.
      3: |
        The arrow directions are easy to reverse: include points from the base use case to the included use case, while extend points from the extension to the base.
    explanation: "**`<<include>>` is mandatory shared behavior (always happens); `<<extend>>` is optional or conditional (sometimes happens).** Both use dashed arrows, but they point in opposite directions: include from base to included, extend from extension to base."

  - id: 4
    difficulty: intermediate
    type: single
    question: >
      In this diagram, what does the `<<extend>>` arrow mean?

      <div data-uml-type="usecase" data-uml-spec="@startuml&#10;actor User&#10;usecase &quot;Place Order&quot; as UC1&#10;usecase &quot;Apply Coupon&quot; as UC2&#10;rectangle &quot;Shop&quot; {&#10;  UC1&#10;  UC2&#10;}&#10;User -- UC1&#10;UC2 ..> UC1 : <<extend>>&#10;@enduml"></div>
    options:
      - "Apply Coupon is optional behavior that may supplement the basic Place Order flow."
      - "Apply Coupon is a specialized version of Place Order."
      - "Apply Coupon always occurs as part of Place Order."
      - "Place Order is optional behavior that may supplement the basic Apply Coupon flow."
    correct_index: 0
    option_feedback:
      1: |
        Specialization uses generalization notation with a hollow triangle. `<<extend>>` means optional or conditional additional behavior.
      2: |
        Mandatory shared behavior would be `<<include>>`. Applying a coupon is conditional, so it extends the base order flow only sometimes.
      3: |
        The arrow points from the extension to the base. `Apply Coupon` extends `Place Order`, not the other way around.
    explanation: "**`<<extend>>` means Apply Coupon is optional behavior that may supplement Place Order.** The arrow points from the extension (Apply Coupon) toward the base (Place Order) — the opposite direction from `<<include>>`."

  - id: 5
    difficulty: basic
    type: single
    question: >
      What does the **rectangle** (system boundary) represent in a use case diagram?

      <div data-uml-type="usecase" data-uml-spec="@startuml&#10;actor Student&#10;actor Admin&#10;usecase &quot;Enroll in Course&quot; as UC1&#10;usecase &quot;Drop Course&quot; as UC2&#10;usecase &quot;Manage Courses&quot; as UC3&#10;rectangle &quot;University Portal&quot; {&#10;  UC1&#10;  UC2&#10;  UC3&#10;}&#10;Student -- UC1&#10;Student -- UC2&#10;Admin -- UC3&#10;@enduml"></div>
    options:
      - "A package of related classes."
      - "The system's scope — use cases inside, actors outside."
      - "A composite state containing substates."
      - "A container for related sequence diagrams."
    correct_index: 1
    option_feedback:
      0: |
        Packages and classes are class-diagram concepts. In a use case diagram, the rectangle marks what functionality is inside the system being described.
      2: |
        Composite states belong to state machine diagrams. The use case boundary separates system functionality from external actors.
      3: |
        Sequence diagrams can elaborate use case flows elsewhere, but the boundary rectangle is not a sequence-diagram container. It defines system scope.
    explanation: "**The rectangle defines the system's scope — use cases (functionality) go inside, actors (external roles) go outside.** The system name appears at the top of the boundary."

  - id: 6
    difficulty: intermediate
    type: multiple
    question: >
      Which of the following are valid elements in a UML Use Case Diagram? (Select all that apply.)
    options:
      - "Actors (stick figures)"
      - "Use cases (ovals)"
      - "System boundary (rectangle)"
      - "Classes (three-compartment rectangles)"
      - "Lifelines (dashed vertical lines)"
      - "Associations (lines between actors and use cases)"
    correct_indices: [0, 1, 2, 5]
    option_feedback:
      0: |
        Actors are valid use case elements; they represent external roles or systems interacting with the subject.
      1: |
        Use cases are valid and are usually drawn as ovals naming user-visible goals or services.
      2: |
        The system boundary is valid when the diagram needs to show what is inside the subject system and what remains external.
      3: |
        Three-compartment class boxes belong in class diagrams. Use case diagrams stay at the requirements and interaction-scope level.
      4: |
        Lifelines belong in sequence diagrams, where they show participants over time.
      5: |
        Associations between actors and use cases are valid; they show which external roles participate in which system functions.
    explanation: "**Use case diagrams contain actors (stick figures), use cases (ovals), system boundaries (rectangles), and associations (lines).** Three-compartment classes belong in class diagrams and lifelines in sequence diagrams — neither appears here."

  - id: 7
    difficulty: intermediate
    type: single
    question: >
      How is **generalization** between use cases shown?

      <div data-uml-type="usecase" data-uml-spec="@startuml&#10;actor User&#10;usecase &quot;Pay Online&quot; as UC1&#10;usecase &quot;Pay by Credit Card&quot; as UC2&#10;usecase &quot;Pay by PayPal&quot; as UC3&#10;rectangle &quot;Payment System&quot; {&#10;  UC1&#10;  UC2&#10;  UC3&#10;}&#10;User -- UC1&#10;UC2 --|> UC1&#10;UC3 --|> UC1&#10;@enduml"></div>
    options:
      - "A dashed arrow labeled `<<generalize>>`."
      - "Solid line with a hollow triangle on the parent."
      - "A dotted line with no arrowhead."
      - "A solid line with a filled diamond."
    correct_index: 1
    option_feedback:
      0: |
        Generalization is not shown with the same dashed dependency arrow style as include and extend. It uses the hollow triangle notation.
      2: |
        A dotted line without an arrowhead does not communicate parent-child specialization. The hollow triangle points to the more general use case.
      3: |
        A filled diamond is composition notation in class-style structural diagrams. Use case generalization uses a hollow triangle.
    explanation: "**Use case generalization uses the same solid line with a hollow triangle as class generalization, pointing to the parent.** A specialized use case can replace or enhance the parent's behavior."

  - id: 8
    difficulty: intermediate
    type: single
    question: >
      A university system requires that both 'Enroll in Course' and 'Drop Course' always verify the student's identity first. How should 'Verify Identity' be related to these use cases?

      <div data-uml-type="usecase" data-uml-spec="@startuml&#10;actor Student&#10;usecase &quot;Enroll in Course&quot; as UC1&#10;usecase &quot;Drop Course&quot; as UC2&#10;usecase &quot;Verify Identity&quot; as UC3&#10;rectangle &quot;University System&quot; {&#10;  UC1&#10;  UC2&#10;  UC3&#10;}&#10;Student -- UC1&#10;Student -- UC2&#10;UC1 ..> UC3 : <<include>>&#10;UC2 ..> UC3 : <<include>>&#10;@enduml"></div>
    options:
      - "Verify Identity can sometimes include both Enroll and Drop (optional behavior)."
      - "Enroll and Drop both always verify identity (mandatory shared behavior)."
      - "Verify Identity is a specialized version of both Enroll and Drop."
      - "No relationship needed --- just connect the actor to all three use cases."
    correct_index: 1
    option_feedback:
      0: |
        The shared behavior is mandatory, not optional. Also, the enrolling and dropping use cases include `Verify Identity`; `Verify Identity` does not include them.
      2: |
        Identity verification is shared sub-behavior, not a specialized kind of enrollment or drop. Generalization would say "is a kind of," which does not fit.
      3: |
        Connecting the actor to `Verify Identity` would make it look like a separate user goal. In this scenario it is reused internally by both top-level use cases.
    explanation: "**Because identity verification always happens, both Enroll and Drop `<<include>>` Verify Identity.** The include arrows point from each including use case toward the shared Verify Identity — one behavior maintained in one place."
