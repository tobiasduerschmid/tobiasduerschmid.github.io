title: "CS 35L Final Exam Fall 2025 MCQs"
description: "Test your knowledge on software construction principles, design patterns, testing, security, and Git based on the CS 35L Final Exam."
active: true
questions:
  - id: 1
    difficulty: basic
    question: "What is the primary goal of implementing information hiding in a program?"
    options:
      - "To expose only the executable logic while hiding personally-identifiable user data for security purposes."
      - "To maximize execution speed by placing all related components into a single file"
      - "To define an interface that reveals what a module does and isolates callers from changes to its internals"
      - "Ensure that module decomposition follows the chronological steps outlined in a processing flowchart."
    correct_index: 2
    option_feedback:
      0: "Information hiding is about design decisions and module boundaries, not only secrecy or privacy. Security may hide sensitive data, but this principle is mainly about limiting how far implementation changes spread."
      1: "Putting related code in one file can actually expose more implementation detail to the rest of the program. Information hiding uses stable interfaces so internals can change without forcing other modules to change."
      3: "A processing flowchart describes the order of steps in a procedure. Information hiding instead asks which design details should be isolated behind a module interface."
    explanation: "Information hiding limits the impact of changes. By defining a stable interface and concealing implementation details, a program ensures that modifying the internal logic of one module does not necessitate changes in other modules that depend on it."

  - id: 2
    difficulty: intermediate
    question: "Which software construction practice is least likely, by itself, to increase a team's bus factor?"
    options:
      - "Always conducting a code review before merging changes into main"
      - "Following all clean code guidelines taught in this course"
      - "Writing unit tests & integration tests with high coverage"
      - "Generating code with GenAI without review or knowledge sharing"
    correct_index: 3
    option_feedback:
      0: "Code review spreads knowledge about a change before it reaches the main branch. That shared understanding usually raises the bus factor instead of lowering it."
      1: "Readable, consistent code makes it easier for teammates to understand and maintain areas they did not originally write. That directly supports knowledge transfer."
      2: "Good tests document expected behavior and give future maintainers confidence when changing unfamiliar code. They are not a replacement for people sharing knowledge, but they do make the project less dependent on one expert."
    explanation: "The bus factor represents the number of team members who would need to suddenly leave the project before it stalls. Practices like code reviews and clean code distribute knowledge among the team. Generating code with AI does not inherently share project-specific architectural understanding among developers."

  - id: 3
    difficulty: advanced
    question: "How does Test-Driven Development (TDD) relate to information hiding?"
    options:
      - "When precisely following all TDD steps, information hiding is always guaranteed"
      - "TDD results in larger and more complex interfaces of methods & classes"
      - "TDD nudges toward small interfaces but doesn't guarantee architectural hiding"
      - "TDD only improves information hiding if tests are generated from UML diagrams"
    correct_index: 2
    option_feedback:
      0: "TDD can encourage small, testable units, but it does not automatically produce a well-hidden architecture. Larger design decisions still need deliberate attention."
      1: "TDD usually pushes code toward smaller interfaces because large, tangled interfaces are hard to test. Complexity can still emerge if the broader design is not managed."
      3: "UML diagrams are not required for TDD or for information hiding. Tests can guide local design, while architectural information hiding still comes from how module responsibilities and interfaces are chosen."
    explanation: "Test-Driven Development naturally encourages creating small, decoupled interfaces to make testing easier. However, strictly writing tests and code incrementally without upfront planning can neglect the large-scale architecture. To achieve proper information hiding across complex systems, developers must engage in deliberate architectural design beyond localized refactoring."

  - id: 4
    difficulty: advanced
    question: "The UNIX philosophy emphasizes writing programs to handle text streams (stdin, stdout, stderr) as a universal interface. Which software construction concept does this design choice most directly support?"
    options:
      - "Single Responsibility Principle, because each tool focuses on one task"
      - "Interface Segregation Principle, because they are three separate streams instead of one"
      - "Information Hiding, because programs need not know which device produced the data."
      - "Separation of Concerns, because stderr is separated from stdout."
    correct_index: 2
    option_feedback:
      0: "The Unix philosophy also values small tools with focused jobs, so this connection is real. This question is asking specifically about the uniform stream interface hiding whether data comes from a file, terminal, pipe, or device."
      1: "Separate streams are not the same idea as client-specific interfaces. The main construction benefit here is that programs can treat many concrete data sources and sinks through the same abstraction."
      3: "Separating standard output from standard error is useful, but it is only one detail of the stream design. The broader point is that the program does not need to know the concrete input or output device."
    explanation: "By standardizing on text streams, UNIX programs hide the underlying hardware or file system details from the application logic. Programs interact via standard inputs and outputs, meaning they do not need to make assumptions about the specific devices providing or receiving the data."

  - id: 5
    difficulty: basic
    question: "What is the most effective way to prevent SQL Injection attacks?"
    options:
      - "Using prepared statements and parameterized queries"
      - "Using f-strings for efficient string concatenation"
      - "Updating the DBMS to the newest version"
      - "Avoiding the C programming language"
    correct_index: 0
    option_feedback:
      1: "Efficient string formatting still mixes untrusted input directly into SQL text. Parameterization matters because the database receives the query structure separately from the values."
      2: "Keeping a DBMS updated is important for security patches, but it does not fix application code that builds SQL by concatenating user input. Injection prevention happens at the query construction boundary."
      3: "SQL injection is not tied to C. Any language can create the vulnerability if it treats untrusted input as part of executable SQL."
    explanation: "Prepared statements and parameterized queries separate the SQL code structure from the user-provided data. This ensures that the database engine treats all inputs strictly as literal values rather than executable commands, neutralizing attempts to inject malicious SQL logic."

  - id: 6
    difficulty: intermediate
    question: "What does a test stub do?"
    options:
      - "Verifying indirect outputs by adding assertions"
      - "Verifying the order of indirect outputs by recording all events"
      - "Injecting controlled indirect inputs so the test exercises a specific path"
      - "Validating with real users that the right system was built"
    correct_index: 2
    option_feedback:
      0: "Assertions check whether the observed result matches the expected result. A stub instead supplies controlled input or behavior from a collaborator so the test can exercise a specific path."
      1: "Recording calls or event order is closer to a spy or mock. A stub's main role is to return predetermined data or behavior to the system under test."
      3: "User validation checks whether the product satisfies real needs. A test stub is a technical test double used inside automated tests."
    explanation: "A test stub acts as a controlled replacement for a system component. It supplies predetermined indirect inputs (such as hardcoded responses) to the system under test so specific behaviors or edge cases can be reliably verified without depending on external systems."

  - id: 7
    difficulty: basic
    question: "What is the necessary first step in the systematic process of debugging a bug reported by a user?"
    options:
      - "Determining the root cause of the bug."
      - "Implementing a temporary fix and deploying it."
      - "Reproducing the bug reliably."
      - "Writing a test case that verifies whether we fixed the bug."
    correct_index: 2
    option_feedback:
      0: "Finding the root cause depends on first seeing the failure under controlled conditions. Reliable reproduction turns a vague report into something that can be investigated."
      1: "A temporary fix before reproduction can mask the symptom without proving what failed. Reproduction gives the team a way to know whether any fix actually addresses the bug."
      3: "A regression test is valuable once the failure has been reproduced and understood well enough to encode. The first step is establishing a reliable way to make the bug appear."
    explanation: "Before attempting to find the root cause or implement a fix, a bug must be reliably reproduced. Consistent reproduction confirms the exact conditions under which the failure occurs and provides a definitive way to verify if the subsequent fix is actually successful."

  - id: 8
    difficulty: advanced
    question: "The Single Choice Principle is a software modularity guideline proposed to handle systems that must support a set of alternatives (e.g., different DBMS, network protocols, or payment types). What does this principle mandate?"
    options:
      - "The system must delay the choice until runtime (e.g., using the Strategy design pattern)"
      - "The choice will be made by the user based on the most important user story."
      - "One module should know the full list of supported alternatives"
      - "All modules must be designed to have a single purpose or function."
    correct_index: 2
    option_feedback:
      0: "Delaying a choice until runtime can be useful, and Strategy is one way to implement alternatives. The Single Choice Principle is narrower: keep the complete list of alternatives in one place."
      1: "A user story may describe what value a user needs, but it does not centralize knowledge of all supported technical alternatives. The principle is about where that knowledge lives in the code."
      3: "Single purpose belongs to the Single Responsibility Principle. Single Choice is about isolating the list of alternatives so adding one alternative does not require edits throughout the system."
    explanation: "The Single Choice Principle dictates that whenever a software system must support a set of alternatives, one and only one module should know the exhaustive list of those alternatives. This isolates the knowledge so that adding a new alternative requires changes in only that single location."

  - id: 9
    difficulty: intermediate
    question: "When integrating LLM-based generative AI into the development workflow for complex tasks, which approach is specifically recommended to improve the quality of the generated code?"
    options:
      - "Minimize the number of design decisions you share with the AI to keep the prompt concise"
      - "Rely on the AI to solve the complex design problem entirely, since its context window is large enough for most programs"
      - "Commit changes only when a major feature is completed to simplify history tracking"
      - "Break the overall task into smaller, simpler tasks while guiding the AI through the steps"
    correct_index: 3
    option_feedback:
      0: "Concise prompts help only when they still include the constraints that matter. With complex work, hiding design decisions often leaves the model guessing about architecture, trade-offs, and acceptance criteria."
      1: "A large context window does not remove the need for decomposition, review, and steering. Complex design work still benefits from smaller steps with explicit checks."
      2: "Commit history organization is useful for collaboration, but it is not what improves an LLM's generated code during the task. The quality gain comes from bounded instructions and iterative feedback."
    explanation: "Large Language Models perform best when complex problems are decomposed. Instead of relying on the AI to solve a massive design problem all at once, developers should break the task into small, bounded instructions and provide continuous, incremental guidance."

  - id: 10
    difficulty: intermediate
    question: "For which use case is Python a better programming language choice than C?"
    options:
      - "Developing an operating system (like Linux or Windows)"
      - "Creating a scientific data analysis"
      - "Developing the firmware of a drone"
      - "Developing a database management system (like MySQL or MongoDB)"
    correct_index: 1
    option_feedback:
      0: "Operating systems need tight control over memory, hardware, and low-level execution. C is commonly chosen for that kind of systems programming, while Python is better suited to higher-level automation and analysis."
      2: "Drone firmware often has hardware, timing, memory, and reliability constraints that favor C or similar systems languages. Python can be useful around the workflow, but it is usually not the core firmware choice."
      3: "Database engines are performance-critical systems that manage storage, memory, and concurrency directly. Python is excellent for scripting and analysis around data, but not usually for the core DBMS engine."
    explanation: "Python features an extensive ecosystem of libraries for data processing and scientific computing, making it highly effective for data analysis. Conversely, C and related systems languages provide fine-grained control over hardware and memory, which is why they are common choices for low-level firmware, operating systems, and performance-critical database engines."

  - id: 11
    difficulty: advanced
    question: "In the TCP/IP model, which layer is responsible for breaking down Application Layer messages into smaller, reliable segments and ensuring they are delivered in the correct order?"
    options:
      - "The network layer"
      - "The application layer"
      - "The internet layer"
      - "The transport layer"
    correct_index: 3
    option_feedback:
      0: "In the TCP/IP model, routing across networks belongs to the internet layer, not a separate reliable-delivery layer. Reliability and ordering for TCP are transport-layer responsibilities."
      1: "Application protocols define message formats and application behavior. They rely on the transport layer when they need generic reliable, ordered byte delivery."
      2: "The internet layer moves IP packets on a best-effort basis across networks. It does not guarantee ordered, reliable delivery of application data."
    explanation: "The transport layer handles end-to-end communication by breaking application data into smaller segments, ensuring reliable, ordered delivery, and managing error recovery during transmission."

  - id: 12
    difficulty: basic
    question: "Which answer best describes a framework, as opposed to a library?"
    options:
      - "A framework consists of multiple libraries bundled together"
      - "A framework is maintained by a large company and requires a commercial license"
      - "A framework dictates the overall architecture of an application and calls your code"
      - "A framework deals with interoperability and not with reuse"
    correct_index: 2
    option_feedback:
      0: "Many frameworks include libraries, but a bundle alone is not what makes something a framework. The defining difference is that a framework shapes the application's flow and invokes the code supplied to it."
      1: "Licensing and vendor size do not define the technical distinction. Open-source projects maintained by small teams can still be frameworks."
      3: "Frameworks and libraries can both support reuse and interoperability. The useful distinction is control flow: library code is called by the application, while framework code often calls into the application."
    explanation: "The defining characteristic of a framework is the Inversion of Control. While a developer's code calls functions from a library, a framework dictates the overall application flow and architecture, making calls to the custom code plugged into it."

  - id: 13
    difficulty: intermediate
    question: "What is a direct implication of the CAP theorem?"
    options:
      - "MySQL is more suitable for data-intense systems than MongoDB"
      - "Distributed systems face inherent trade-offs between key properties"
      - "Non-error responses always include the most recent write"
      - "ATM systems do not let users withdraw money during a network outage"
    correct_index: 1
    option_feedback:
      0: "CAP does not rank specific products for all data-intensive systems. It describes trade-offs distributed systems face when partitions occur."
      2: "A non-error response containing the most recent write is a consistency guarantee. CAP says that during a partition, a distributed system may have to trade that guarantee against availability."
      3: "ATM behavior is a design and policy choice, not a universal theorem result. Some systems preserve availability with limits or reconciliation; others reject operations to protect consistency."
    explanation: "CAP states that in distributed data stores, it is impossible to simultaneously guarantee Consistency, Availability, and Partition Tolerance. Systems must make architectural trade-offs, often sacrificing either consistency or availability during network partitions."

  - id: 14
    difficulty: intermediate
    question: "Which of these systems is most prone to cross-site scripting attacks?"
    options:
      - "A web app that allows users to book flights"
      - "A web app that allows users to upload photos (without any meta data) to a shared drive"
      - "An Android app that allows users to communicate via direct messages"
      - "A web app that allows users to write and read reviews for movies"
    correct_index: 3
    option_feedback:
      0: "A flight-booking site can have web security bugs, but the option does not clearly involve one user publishing script-like content for other users to render. Stored XSS risk is especially direct when user-written text is displayed back to other users."
      1: "File upload features have serious security risks, but plain photos without rendered metadata are not the clearest XSS path. XSS centers on untrusted content being interpreted by a browser as script or markup."
      2: "Messaging apps can have injection problems, especially if they render rich content, but the option is not specifically a web page displaying shared user text. XSS is a browser-side web vulnerability."
    explanation: "Cross-Site Scripting (XSS) occurs when untrusted user input is rendered directly in a web application without proper sanitization. Applications that display user-generated text to other users are highly vulnerable, as malicious scripts can be injected and executed in victims' browsers."

  - id: 15
    difficulty: intermediate
    question: "What is a primary benefit of employing rational decision making (as opposed to intuitive decision making) in software engineering?"
    options:
      - "It enables quicker decision-making when the problem is ill-defined or highly uncertain"
      - "It results in better decisions, because it uses UML diagrams to visualize the architecture"
      - "It usually guides non-expert designers to better design outcomes & documents decisions"
      - "It results in cleaner architectures, because it prioritizes information hiding over algorithmic optimization"
    correct_index: 2
    option_feedback:
      0: "Intuitive decisions are often faster, especially under uncertainty or time pressure. Rational decision making is valued here because it makes criteria, trade-offs, and reasoning explicit."
      1: "UML can help communicate a design, but diagrams do not automatically make a decision rational or better. The benefit comes from structured evaluation and documented reasoning."
      3: "Rational decision making does not always rank information hiding above performance. It helps teams compare criteria explicitly, including maintainability, performance, risk, and cost."
    explanation: "Rational decision making uses structured, logical processes rather than relying solely on intuition. This systematic approach documents the reasoning behind architectural choices, making the design process transparent and helping non-experts achieve robust design outcomes."

  - id: 16
    difficulty: intermediate
    type: multiple
    question: "Which of these git commands might create major challenges in team projects? Select all that apply."
    options:
      - "`git rebase -i`"
      - "`git cherry-pick`"
      - "`git revert`"
      - "`git push -f`"
    correct_indices: [0, 3]
    option_feedback:
      0: "Interactive rebase can rewrite commit history. That is useful on private branches, but dangerous once other teammates may have based work on the same commits."
      1: "Cherry-pick can create duplicate changes or conflicts if used carelessly, but it does not inherently rewrite existing shared history. The major team risk in this question is history rewriting."
      2: "Revert adds a new commit that undoes earlier changes while preserving the branch history. That property makes it much safer for shared branches than rewriting commands."
      3: "A force push can replace the remote branch history with local history. On a shared branch, that can discard or strand teammates' commits."
    explanation: "Commands that rewrite history, such as force pushing (`git push -f`) or interactive rebasing (`git rebase -i`), replace the branch's existing sequence of commits with a different sequence. If applied to shared branches, they can hide or orphan teammates' commits and cause serious repository coordination problems."

  - id: 17
    difficulty: intermediate
    type: multiple
    question: "In which situations would an agile software process be most appropriate, compared with a plan-driven approach? Select all that apply."
    options:
      - "Developing the software for a radiation therapy machine"
      - "Developing the software for the probe that should explore the moons of the planet Saturn"
      - "Developing software for a start-up"
    correct_indices: [2]
    option_feedback:
      0: "Safety-critical medical software can still use iterative practices inside a disciplined process, but compared with a startup it usually needs stronger upfront requirements, traceability, documentation, and verification."
      1: "Space-probe software has high cost of failure and limited ability to patch after deployment. Those constraints usually favor more plan-driven assurance than a lightweight agile process."
      2: "Startups often face changing requirements, uncertain markets, and a need for rapid feedback. Those conditions are where agile practices tend to fit best."
    explanation: "Agile methodologies excel in environments with high uncertainty and rapidly evolving requirements, such as startups. In contrast, mission-critical systems like medical devices or space probes require strict, plan-driven documentation and rigorous upfront verification to ensure safety."
