title: "Debugging Quiz"
description: "Apply, Analyze, and Evaluate-level questions on the four-step debugging process — distinguish fault / error / failure on real scenarios, pick the right tactic (logs vs debugger vs git bisect vs rubber duck) for the situation, and recognize when a fix isn't actually done."
active: true
questions:
  - id: 1
    difficulty: basic
    type: single
    question: |
      A user reports: *"I clicked 'Submit' and the page froze with a spinning wheel that never stopped."* You open the code and find that a callback in `handlePayment()` never resolves its `Promise` when the payment gateway returns a 5xx response. How would you classify each of these in the fault / error / failure vocabulary?
    options:
      - "The frozen spinner is the **fault**; the unresolved Promise is the **error**; the unhandled 5xx is the **failure**."
      - "The unresolved Promise in `handlePayment()` is the **fault**; the program state with a pending Promise is the **error**; the frozen UI the user sees is the **failure**."
      - "The 5xx response is the **fault**; the user's click is the **error**; the frozen page is the **failure**."
      - "All three are interchangeable terms for the same defect; the user only cares about the visible symptom."
    correct_index: 1
    option_feedback:
      0: |
        The frozen spinner is what the *user observes* — that is the failure, not the fault. The fault is the *location in the code* that produces the bug, which is the missing resolution path in `handlePayment()`.
      2: |
        The 5xx response is an external event, not the bug. The fault is something *the developer wrote* (or didn't write) — here, the missing handling for the 5xx case in `handlePayment()`.
      3: |
        The vocabulary is load-bearing for debugging: each term names a different *observation point*. A `try/catch` that swallows the exception turns a failure back into a contained error, even though the fault still exists — and you fix it in a different place than where you observe it.
    explanation: "**Fault** = the erroneous location in the source code (e.g., the unresolved Promise path). **Error** = the incorrect program state during execution (a pending Promise that will never settle). **Failure** = the incorrect observable behavior at the system boundary (the spinner the user sees). Keeping them distinct guides you to the right fix location — you find the failure on the screen, but you fix the fault in the code."

  - id: 2
    difficulty: intermediate
    type: single
    question: |
      A user reports that your web app sometimes shows them another user's data. You cannot reproduce it locally. They send a screenshot but no other details. What should your **first** action be?
    options:
      - "Ship a patch that re-fetches the user object on every request and assume it fixes the cross-account leak."
      - "Open a debugger on production, set a breakpoint in the session middleware, and wait for the bug to recur."
      - "Ask the user for the problem environment and problem history — browser, OS, the exact sequence of clicks before the leak, whether they were on Wi-Fi or VPN, the timestamp — so you can try to reproduce it."
      - "Add `print()` statements to every endpoint, deploy them, and grep the logs for anomalies overnight."
    correct_index: 2
    option_feedback:
      0: |
        Shipping a fix before you can reproduce the bug means you cannot verify the fix worked. A cross-account data leak that *seems* gone may just be a leak you have not yet reproduced. Reproduce first, then fix.
      1: |
        Setting breakpoints in production stops the world for real users every time the breakpoint fires — unacceptable for a live service. Debuggers belong in a local reproduction of the bug, which is exactly what you don't yet have.
      3: |
        Spraying `print()` across every endpoint generates a haystack to search, when the user can hand you a needle. Targeted logging *after* you have a reproduction hypothesis is useful; blind logging in production is mostly noise.
    explanation: "Step 1 of the debugging process is **reproducing the bug**, and that requires both the *problem environment* (browser, OS, network, build version) and the *problem history* (the exact click sequence). Without a reproduction you cannot verify a fix worked — and for a cross-account data leak, an unverified fix is a serious incident waiting to recur. Mature bug-report templates ask these questions precisely because reproduction is load-bearing."

  - id: 3
    difficulty: intermediate
    type: multiple
    question: |
      Your team has *just* manually reproduced an intermittent payment bug after two days of investigation. Before anyone touches the production code, which of the following are **worthwhile next steps**? (Select all that apply.)
    options:
      - "Write an automated test that triggers the bug, so subsequent fix attempts can be verified in seconds rather than minutes."
      - "Simplify the reproduction by removing every step that doesn't actually affect whether the bug occurs."
      - "Delete the manual reproduction notes now that you have the bug in your head; they will just clutter the ticket."
      - "Commit the test even though it currently fails, so CI documents the bug's existence until the fix lands."
    correct_indices: [0, 1, 3]
    option_feedback:
      2: |
        The notes are precisely what lets a teammate (or future you) reproduce the bug after a context switch. Delete them and the next intermittent failure starts from scratch. Add them to the ticket instead of the trash.
      3: |
        Committing the failing test (often marked `xfail` or skipped with a TODO referencing the ticket) makes the bug visible in CI and gives the fix a measurable definition of done. Some teams call this "checkpointing the bug."
    explanation: "After reproduction, three moves pay dividends: **automate** the reproduction (a fast feedback loop is what lets you iterate on fixes), **simplify** it (a 200-step reproduction usually has 5 essential steps and 195 confounders), and **preserve** it (committed test, ticket notes, anything that lets the next person continue from where you left off). The automated test also becomes the permanent regression test once the bug is fixed."

  - id: 4
    difficulty: intermediate
    type: single
    question: |
      A teammate has a Python bug they've been stuck on for an hour. They walk over to your desk and say *"can you look at this?"* You read the function — about 30 lines — and notice nothing obviously wrong. Which suggestion is the **highest-leverage pedagogical move**?
    options:
      - "Take over the keyboard and step through the code with the debugger together; they'll learn by watching."
      - "Ask them to explain the function to you line by line, from the top, saying what each line *should* do before they read it."
      - "Suggest they paste the function into an AI assistant and ask 'what's the bug?' — it's faster than either of you reading it again."
      - "Tell them to take a 20-minute walk; bugs often resolve themselves when you stop thinking about them."
    correct_index: 1
    option_feedback:
      0: |
        Taking over the keyboard finds the bug faster *for you*, but the teammate loses the chance to build the debugging skill. They will be in the same spot on the next bug. Make them drive.
      2: |
        Outsourcing the diagnosis short-circuits the most valuable part of debugging — the moment of realizing what the code *actually* does versus what they *intended* it to do. That moment is where the mental model updates. AI assistants are useful for things you already understand, less useful for unblocking the learning itself.
      3: |
        A break sometimes helps, but it is a stalling tactic, not a debugging technique. Rubber-duck-explaining produces the same insight without the wait.
    explanation: "This is **rubber-duck debugging** applied to a colleague. The curse of knowledge means the author reads what they *intended* to write — explaining the code line by line forces them to compare intent against the actual text, and the discrepancy is usually the bug. The duck (or in this case, you-as-duck) is most valuable when the explainer says aloud what a line *should* do and then notices it doesn't."

  - id: 5
    difficulty: intermediate
    type: single
    question: |
      You have a regression: a test that passed on Friday now fails on Monday. There are 87 commits between the two versions and no obvious culprit in the diff. Which tool is the **most efficient** for finding the commit that introduced the regression?
    options:
      - "`git blame` on each file the test touches — find the most recent author and ask them what they changed."
      - "`git bisect`, with the failing test scripted as the bisect command, so git runs a binary search across the 87 commits."
      - "Manually `git checkout` each commit in reverse chronological order and re-run the test until it passes."
      - "Revert the last 10 commits as a batch; whichever revert makes the test pass identifies the offending batch."
    correct_index: 1
    option_feedback:
      0: |
        `git blame` is excellent for *"who last touched this line?"* but it does not tell you which commit *broke* a test. A regression often comes from a change in a different file than the one the test exercises.
      2: |
        Linear search through 87 commits is roughly 87 test runs in the worst case. `git bisect` does the same job in roughly $\log_2(87) \approx 7$ test runs — over an order of magnitude faster.
      3: |
        Batch reverting throws away unrelated work and only narrows the search to a batch of 10 commits, not the single offending one. You still have to bisect the batch.
    explanation: "`git bisect` performs a binary search across commits, asking *good* or *bad* at each midpoint. With an automated test you can `git bisect run ./test.sh` and let git work through the history while you do something else. For 87 commits, you go from ~87 tests to ~7 tests. This is exactly why writing the automated reproduction test in Step 1 of debugging is so valuable — it turns regression hunting into a one-liner."

  - id: 6
    difficulty: intermediate
    type: single
    question: |
      You see this error in your terminal while setting up a new project: `ERROR 3680 (HY000): Failed to create schema directory 'tobias_dev_orders_2026_q1' (errno: 2 - No such file or directory)`. What is the **best** thing to copy into a search engine or AI assistant?
    options:
      - "The entire line, verbatim, including the database name `tobias_dev_orders_2026_q1`."
      - "`ERROR 3680 (HY000): Failed to create schema directory (errno: 2 - No such file or directory)` — keep the error codes, strip the project-specific schema name."
      - "Just *'mysql error'* — anything more specific will narrow the results too much."
      - "Nothing — search engines cannot help with database errors; only the DBA can."
    correct_index: 1
    option_feedback:
      0: |
        Including the project-specific schema name pollutes the query: nobody else has a database with that exact name, so search engines can't match your query to anyone else's solution. It also leaks information you may not want to send to a third party.
      2: |
        Stripping the error code throws away the most useful diagnostic the message contains. `ERROR 3680 (HY000)` and `errno: 2` are stable identifiers other developers will have searched for. Strip the *project-specific* bits, keep the *framework-specific* bits.
      3: |
        Errors from frameworks, libraries, and external services have almost always been encountered before — your job is to find the prior thread. The DBA is a last resort, not a first.
    explanation: "The pattern is *strip project-specific identifiers, keep framework-specific ones*. The schema name is unique to you; the error code, error number, and message structure are shared by every MySQL user who hit the same problem. Stripping also helps with privacy — usernames and internal hostnames don't need to leave your machine. And when you *do* run a suggested command from the results, read it before executing — prompt-injection attacks on AI-search-result pages are an emerging risk."

  - id: 7
    difficulty: advanced
    type: single
    question: |
      You're chasing a bug that only triggers when a specific user's account has more than 10,000 line items. Stepping through the loop one iteration at a time in the debugger would mean clicking *Step Over* tens of thousands of times. What's the **right move**?
    options:
      - "Comment out the loop and re-run; the bug must be inside the loop body, so you can find it by reading the loop body carefully."
      - "Set a **conditional breakpoint** with the expression `len(line_items) > 10000`, so the debugger only pauses on iterations where the bug-triggering condition holds."
      - "Replace the loop with a hard-coded short list of items and debug that instead; the principles of the loop body are the same."
      - "Use `print()` statements inside the loop to log every iteration; grep the output afterwards for the anomaly."
    correct_index: 1
    option_feedback:
      0: |
        Commenting the loop changes the program's behavior — if the bug interacts with loop state (accumulator overflow, off-by-one at the boundary, an unexpected value at iteration 9,847), the reading-without-running approach misses it entirely.
      2: |
        Hard-coded short lists exercise *different* code paths than 10,000-item lists. The bug you're chasing depends on scale; shrinking the input is exactly what makes it disappear.
      3: |
        Printing 10,000 iterations to a log is the *non-interactive* equivalent of clicking *Step* 10,000 times. A conditional breakpoint lets you ask the same question (*"what's happening at iteration 10,000?"*) without generating a forest of noise.
    explanation: "**Conditional breakpoints** trigger only when a given expression evaluates to true, in any expression the debugger can evaluate (variable comparisons, function calls, boolean combinations). Most IDEs also support **hit-count breakpoints** (*'fire only on the 10,000th time this line is hit'*) — the same idea, expressed differently. Both let you skip directly to the interesting moment without sitting through the boring ones."

  - id: 8
    difficulty: advanced
    type: single
    question: |
      A teammate marks a ticket *"FIXED"* with this commit: a one-line change that makes the previously-failing reproduction pass. They did not run the rest of the test suite. **What is the most important risk** they have left exposed?
    options:
      - "Their commit message doesn't include the ticket number, so the fix is hard to find in the git log later."
      - "They didn't write a code comment explaining why the change was necessary, so a future reader (or AI agent) may revert it without realizing what it fixed."
      - "They may have introduced a **regression** — a fix that breaks previously-passing behavior elsewhere — and the test suite is the only mechanism that would have caught it before users do."
      - "They should have added an `assert` statement near the fix to catch similar bugs in the future."
    correct_index: 2
    option_feedback:
      0: |
        Searchable commit messages are a real benefit, but missing them produces an inconvenience rather than a broken product. A regression silently shipped to users is a much larger risk.
      1: |
        The documentation point is real (and worth flagging), but a missing comment doesn't break the product. A regression does.
      3: |
        Nearby assertions are a *good* practice — they catch related bugs proactively — but they don't compensate for skipping the existing regression suite. A passing single test plus no suite run is weaker evidence than failing assertions.
    explanation: "Skipping the test suite is the most common failure mode in step 4 of the debugging process. A fix that closes one bug while opening another is called a **regression**, and the suite exists precisely to catch them. Run the failing reproduction test (it should now pass), *and* the entire suite (no previously-green test should now be red), before calling anything fixed. Code comments and assertions matter too, but they don't replace the suite — they complement it."

  - id: 9
    difficulty: advanced
    type: single
    question: |
      Look at this code:

      ```python
      def transfer(account_from, account_to, amount):
          try:
              account_from.balance -= amount
              account_to.balance += amount
          except:
              pass
      ```

      The team lead says *"This is fault-tolerant — if anything goes wrong, the user doesn't see a crash."* What's **wrong with this reasoning**?
    options:
      - "Nothing — graceful degradation is a sign of mature engineering and this is a textbook example."
      - "The bare `except: pass` swallows every error including `AttributeError`, `TypeError`, and `KeyboardInterrupt` — it can leave the system in a half-updated state (e.g., money debited but not credited) with no signal to anyone that anything went wrong."
      - "The `except` block should print the error to the console so the developer can see it during testing."
      - "`account_from.balance -= amount` should use `account_from.balance = account_from.balance - amount` for clarity."
    correct_index: 1
    option_feedback:
      0: |
        Fault tolerance is *selective* error handling for known failure modes with deliberate recovery — not a bare `except: pass` that swallows everything. The latter is one of the most dangerous patterns in the language because it hides bugs *and* leaves invariants violated.
      2: |
        Printing to the console helps during development but is no substitute for proper error handling in production. The bigger problem is the violated invariant (money debited but not credited), which printing doesn't fix.
      3: |
        That is a style preference unrelated to the correctness or fault-tolerance argument. The dangerous pattern is the swallow-everything `except`.
    explanation: "**Fault tolerance does not mean 'hide every error.'** It means designing so that *known* failure modes are detected, contained, and (when possible) recovered — usually with a write to a log, a metric, an alert, or a compensating transaction. A bare `except: pass` does the opposite: it converts a failure (visible, debuggable) into a silent error that leaves the system in an inconsistent state. For money transfers specifically, the right pattern is an atomic transaction that either commits both updates or rolls both back — never half. See also the [test design](/SEBook/testing/goodtests.html) discussion on why broad exception catching also tends to hide real test failures."

  - id: 10
    difficulty: advanced
    type: single
    question: |
      A junior engineer is debugging a deeply nested issue in a backend microservice. They have been at it for three hours with no progress, just rereading the same 200 lines of code. What is the **single most likely** explanation for why they are stuck?
    options:
      - "The bug requires advanced language knowledge they haven't learned yet; they need a senior engineer to take over."
      - "They are under the **curse of knowledge** — reading the code they wrote, they keep seeing what they *intended* rather than what is actually there — and they have not done anything (rubber duck, debugger, fresh perspective) to break that loop."
      - "The bug is unfixable without rewriting the service; they should escalate to architecture."
      - "Their IDE doesn't support the language well enough; switching IDEs would resolve the issue."
    correct_index: 1
    option_feedback:
      0: |
        Most bugs in production code do not require deep language esoterica. The much more common pattern is a smart engineer running a mental model that doesn't match the code — which is exactly what the curse of knowledge predicts and what rubber-ducking breaks.
      2: |
        Unfixable bugs are rare; stuck-on-fixable bugs are common. *"Rewrite from scratch"* is almost always the wrong answer when the actual problem is a stale mental model.
      3: |
        Tool quality matters at the margins, but a 3-hour stall has a stale-mental-model smell, not a missing-IDE-feature smell. New tools are unlikely to provide the insight that switching debugging tactics would.
    explanation: "*'Reading the same code for hours'* is the textbook symptom of the curse of knowledge — the author's mental model is overwriting the actual text. The remedy is to force a comparison between *intent* and *implementation*: explain the code line by line to a duck (or colleague), step through it in a debugger so the actual variable values are visible, or set targeted assertions. Three hours of staring rarely beats 15 minutes of any of those. Stuck-because-stale-model is far more common than stuck-because-impossible."
