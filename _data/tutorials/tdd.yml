  - title: "Cycle 11 — Invalid Dice Raise an Error"
    instructions: |
      > **Spec:** `score([1, 2, 9])` raises `ValueError("Die values must be between 1 and 6")`. Dice are integers 1–6.

      ## Your task

      1. **🔴 RED** — add `test_invalid_die_value_raises_error` using `pytest.raises(ValueError, match=...)`. **Predict** the failure: will the test fail because no exception is raised, the wrong exception is raised, or the wrong message?
      2. **🟢 GREEN** — make the test pass. *Before you implement*, decide: **where does validation live?** Inside `score()`? In a helper? On `BattleReport`? Each choice is defensible. Pick one, implement, run.
      3. **🔵 REFACTOR** — checklist; constants like `VALID_DICE` keep the rule explicit.

      <details markdown="1"><summary>Why <code>match=</code> matters</summary>

      Without `match=`, the test would accept *any* `ValueError` — even one with no message, or the wrong message. With it, the test pins down the *contract*: the function raises and explains *why*. That's an oracle for the error case, not just for success.
      </details>

      🪞 **Pause (after green):** validation is *typically* what students reach for first when starting on a new function — yet here it arrives in cycle 11, not cycle 1. **Why was leaving validation out of cycle 1 the right move?** (Hint: revisit cycle 1's test list — was "invalid input" on it?)

      <details markdown="1"><summary>Compare your answer — the rule that travels</summary>

      Happy-path-only suites are the single most common smell in student-written test code (per testing-education research). The deeper lesson: line coverage doesn't catch missing error handling. A function that silently processes invalid input passes every happy-path assertion. Only an invalid-input test asks "does the boundary actually error?"

      **The rule that travels:** if a behavior isn't on the test list, code for it isn't earned. Validation is no exception — it joins the list when the spec demands it, not when habit suggests it.
      </details>

