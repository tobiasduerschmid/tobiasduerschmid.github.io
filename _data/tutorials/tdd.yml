title: "TDD & Testing with pytest"
description: "Learn Test-Driven Development hands-on: write failing tests first, make them pass with minimal code, then refactor. Build the TDD mindset — testing as a design tool, not just verification."

backend: pyodide

require_tests: true

# Global setup: install pytest, add /tutorial to sys.path, patch module cache
setup_commands:
  - "import pyodide_js; await pyodide_js.loadPackage('pytest')"
  - "import sys; sys.path.insert(0, '/tutorial')"
  - |
    import pytest as _pytest, sys as _sys
    _orig_main = _pytest.main
    def _patched_main(*a, **kw):
        for m in list(_sys.modules):
            if m.startswith('test_') or m in ('password','fizzbuzz','word_counter','temperature','grades','shopping_cart'):
                del _sys.modules[m]
        return _orig_main(*a, **kw)
    _pytest.main = _patched_main

steps:

  # --------------------------------------------------------------------------
  # STEP 1 — Why Test? The Bug That Got Away
  # Pedagogy:
  #   Lay of the Land   — macro overview: why testing matters.
  #   Generation Effect  — predict the bug before running.
  #   Growth Mindset     — normalize errors and debugging.
  #   Ratchet metaphor   — tests lock in progress (from Percival).
  #   Bloom's level      — Remember / Understand / Analyze (quiz).
  # --------------------------------------------------------------------------
  - title: "Why Test? The Bug That Got Away"
    instructions: |
      ## The Lay of the Land

      > **Learning objective:** After this step you will be able to **explain** why automated tests are valuable and **use** `assert` to verify function behavior.

      You write Python code that works... until someone changes it and breaks something you did not expect. Testing is the safety net that catches those breaks *before* they reach users.

      ### A Common Misconception

      Many students think testing is about **finding bugs after you write code**. That is only half the story. Tests also:

      - **Specify behavior** — a test says *"this function should do X"* before you write it
      - **Prevent regressions** — once a bug is fixed, a test ensures it never comes back
      - **Enable fearless refactoring** — change code confidently because tests catch breakage

      Think of tests as a **ratchet**: once a test passes, your progress is locked in. You can never accidentally slip backward.

      ### Predict Before You Run

      The function below is supposed to convert a numeric score (0–100) to a letter grade. **Before running it**, read the code carefully and predict: what will `calculate_grade(85)` return? What about `calculate_grade(90)`?

      Write your predictions down, then click **Run** to see if you were right.

      ### Task

      1. Run `grades.py` and observe the output. Was your prediction correct?
      2. Find and fix the bug in `calculate_grade()`.
      3. Add three `assert` statements at the bottom of the file to verify:
         - `calculate_grade(95)` returns `"A"`
         - `calculate_grade(85)` returns `"B"`
         - `calculate_grade(72)` returns `"C"`

      An `assert` works like this:
      ```python
      assert calculate_grade(95) == "A", "95 should be an A"
      ```
      If the condition is `False`, Python raises an `AssertionError` with the message.

    files:
      - path: "grades.py"
        content: |
          def calculate_grade(score):
              """Convert a numeric score (0-100) to a letter grade."""
              if score > 90:
                  return "A"
              if score >= 80:
                  return "B"
              if score >= 70:
                  return "C"
              if score >= 60:
                  return "D"
              return "F"


          # Try it out — predict the output before running!
          print("grade(95) =", calculate_grade(95))
          print("grade(85) =", calculate_grade(85))
          print("grade(90) =", calculate_grade(90))
          print("grade(45) =", calculate_grade(45))

          # TODO: Add three assert statements below to verify:
          #   calculate_grade(95) == "A"
          #   calculate_grade(85) == "B"
          #   calculate_grade(72) == "C"
        language: "python"

    open_file: "grades.py"

    tests:
      - description: "Script runs without errors"
        command: |
          output = __run_capture('/tutorial/grades.py')
      - description: "Contains assert for grade 95 == 'A'"
        command: |
          source = open('/tutorial/grades.py').read()
          assert 'assert' in source and '95' in source, \
              "Add an assert statement that checks calculate_grade(95) == 'A'"
      - description: "Contains assert for grade 85 == 'B'"
        command: |
          source = open('/tutorial/grades.py').read()
          assert 'assert' in source and '85' in source, \
              "Add an assert statement that checks calculate_grade(85) == 'B'"
      - description: "Contains assert for grade 72 == 'C'"
        command: |
          source = open('/tutorial/grades.py').read()
          assert 'assert' in source and '72' in source, \
              "Add an assert statement that checks calculate_grade(72) == 'C'"
      - description: "All assertions pass (function is correct)"
        command: |
          output = __run_capture('/tutorial/grades.py')
          assert 'AssertionError' not in output and 'Error' not in output, \
              f"Your assertions failed — is the function correct? Output: {output}"

    quiz:
      title: "Why Test? — Knowledge Check"
      min_score: 0.67
      shuffle: true
      questions:

        - question: |
            A teammate says: *"I only write tests after I finish all my code, to check for bugs."*

            What is the main limitation of this approach?
          type: single
          options:
            - "There is no limitation — this is the standard approach"
            - "Tests written after the fact only verify what you *think* the code does, not what it *should* do. They also can't guide your design or catch regressions during development"
            - "Writing tests afterward is fine as long as you achieve 100% code coverage"
            - "The only problem is that it takes slightly longer"
          correct_index: 1
          explanation: |
            Post-hoc tests verify *your implementation* rather than *intended behavior*.
            They also cannot serve as a safety net during development because they don't exist yet.
            TDD flips this: tests are written first to specify behavior, then code is written to satisfy them.

        - question: |
            What does this code do?
            ```python
            assert len(result) == 3, "Expected 3 items"
            ```
          type: single
          options:
            - "It prints the message 'Expected 3 items' to the console"
            - "It checks that `result` has exactly 3 elements; if not, it raises an `AssertionError` with the given message"
            - "It creates a variable called `result` with 3 items"
            - "It silently ignores the check if the condition is False"
          correct_index: 1
          explanation: |
            `assert condition, message` evaluates the condition. If `True`, nothing happens and
            execution continues. If `False`, Python raises an `AssertionError` with the message.
            This is the simplest form of automated testing in Python.

        - question: |
            Which of the following is **not** a benefit of automated tests?
          type: single
          options:
            - "They prevent regressions — bugs that were fixed from coming back"
            - "They enable fearless refactoring by catching breakage immediately"
            - "They guarantee your code has zero bugs"
            - "They specify expected behavior as executable documentation"
          correct_index: 2
          explanation: |
            Tests **reduce** bugs and catch **regressions**, but they cannot guarantee zero bugs.
            A test suite is only as good as the scenarios it covers. Dijkstra famously said:
            "Testing can show the presence of bugs, but never their absence."

        - question: |
            The "ratchet metaphor" for testing means:
          type: single
          options:
            - "Tests should be run as fast as a ratchet clicks"
            - "Once a test passes, it locks in that progress — you can never accidentally slip backward on that behavior"
            - "You should ratchet up test coverage to 100% as quickly as possible"
            - "Tests should be written in a specific mechanical order"
          correct_index: 1
          explanation: |
            The ratchet metaphor (from Harry Percival's "Obey the Testing Goat") captures the key
            psychological benefit of TDD: each passing test is a permanent checkpoint. Even if you
            are stuck on a new feature, you know everything that passed before still works.


  # --------------------------------------------------------------------------
  # STEP 2 — Your First pytest Test
  # Pedagogy:
  #   Guide-and-Release  — explain conventions, then immediate hands-on.
  #   Component Skills    — isolate test-writing from TDD cycle.
  #   Bloom's level       — Remember / Apply (quiz).
  # --------------------------------------------------------------------------
  - title: "Your First pytest Test"
    instructions: |
      > **Learning objective:** After this step you will be able to **write** pytest test functions and **interpret** pytest output.

      ## From `assert` to pytest

      Raw `assert` statements work, but they give minimal feedback when things fail. **pytest** is Python's most popular testing framework. It discovers and runs your tests automatically, gives clear failure output, and scales from tiny scripts to enormous projects.

      ### pytest Conventions

      pytest uses simple naming conventions — no classes, no boilerplate:

      | Convention | Rule | Example |
      |---|---|---|
      | **File name** | Must start with `test_` | `test_temperature.py` |
      | **Function name** | Must start with `test_` | `def test_freezing_point():` |
      | **Assertions** | Plain `assert` — same as before | `assert celsius_to_fahrenheit(0) == 32` |

      That is it. No `import unittest`, no `class TestSomething(unittest.TestCase)`, no `self.assertEqual()`. Just functions and `assert`.

      ### Running Tests

      In this tutorial, clicking **Run** on a test file will execute pytest automatically.
      You will see output like:

      ```
      test_temperature.py::test_freezing_point PASSED
      test_temperature.py::test_boiling_point PASSED
      ```

      A **PASSED** test means the assertion held. A **FAILED** test shows you exactly what went wrong.

      ### Task

      The `temperature.py` module is provided and working. Your job is to complete `test_temperature.py`:

      1. Fill in `test_freezing_point` — assert that `celsius_to_fahrenheit(0)` returns `32.0`
      2. Fill in `test_boiling_point` — assert that `celsius_to_fahrenheit(100)` returns `212.0`
      3. Write `test_negative_forty` from scratch — assert that `celsius_to_fahrenheit(-40)` returns `-40.0` (the unique crossover point where Celsius equals Fahrenheit!)

      ### Predict Before You Run

      Before clicking Run, predict: what will pytest print if a test function only has `pass` and no `assert`? Will it PASS or FAIL? Try it and see.

      Click **Run** on `test_temperature.py` to see your tests execute.

    files:
      - path: "temperature.py"
        content: |
          """Temperature conversion utilities."""


          def celsius_to_fahrenheit(celsius):
              """Convert Celsius to Fahrenheit."""
              return celsius * 9 / 5 + 32


          def fahrenheit_to_celsius(fahrenheit):
              """Convert Fahrenheit to Celsius."""
              return (fahrenheit - 32) * 5 / 9
        language: "python"

      - path: "test_temperature.py"
        content: |
          """Tests for the temperature module."""
          import pytest
          from temperature import celsius_to_fahrenheit, fahrenheit_to_celsius


          def test_freezing_point():
              # TODO: assert that celsius_to_fahrenheit(0) returns 32.0
              pass


          def test_boiling_point():
              # TODO: assert that celsius_to_fahrenheit(100) returns 212.0
              pass


          # TODO: Write a test_negative_forty function from scratch.
          # Assert that celsius_to_fahrenheit(-40) returns -40.0


          if __name__ == "__main__":
              pytest.main(["-v"])
        language: "python"

    open_file: "test_temperature.py"

    tests:
      - description: "test_temperature.py runs without errors"
        command: |
          output = __run_capture('/tutorial/test_temperature.py')
      - description: "test_freezing_point has a real assertion (not just pass)"
        command: |
          source = open('/tutorial/test_temperature.py').read()
          # Find the test_freezing_point function body
          assert 'assert' in source.split('test_freezing_point')[1].split('def ')[0], \
              "test_freezing_point still has 'pass' — replace it with an assert statement"
      - description: "test_boiling_point has a real assertion"
        command: |
          source = open('/tutorial/test_temperature.py').read()
          assert 'assert' in source.split('test_boiling_point')[1].split('def ')[0], \
              "test_boiling_point still has 'pass' — replace it with an assert statement"
      - description: "test_negative_forty function exists"
        command: |
          source = open('/tutorial/test_temperature.py').read()
          assert 'def test_negative_forty' in source, \
              "Write a new function called test_negative_forty"
      - description: "All tests pass"
        command: |
          import pytest, io, sys
          old = sys.stdout; sys.stdout = buf = io.StringIO()
          code = pytest.main(['/tutorial/test_temperature.py', '-v', '--tb=short', '--no-header'])
          sys.stdout = old; output = buf.getvalue(); print(output)
          assert code == 0, f"Some tests failed:\n{output}"

    quiz:
      title: "pytest Basics — Knowledge Check"
      min_score: 0.67
      shuffle: true
      questions:

        - question: |
            Which file name will pytest **automatically discover** as a test file?
          type: single
          options:
            - "`testing_temperature.py`"
            - "`test_temperature.py`"
            - "`check_temperature.py`"
            - "`temperature_tests.py`"
          correct_index: 1
          explanation: |
            pytest discovers files whose names start with `test_` or end with `_test.py`.
            `test_temperature.py` matches the `test_` prefix. The others do not match either pattern.
            Functions inside must also start with `test_`.

        - question: |
            What does this pytest output mean?
            ```
            test_math.py::test_addition PASSED
            test_math.py::test_division FAILED
            ```
          type: single
          options:
            - "Both tests ran successfully"
            - "The `test_addition` assertion held; the `test_division` assertion did not"
            - "The test file has a syntax error"
            - "`test_division` was skipped"
          correct_index: 1
          explanation: |
            PASSED means the assertions in that test function all held (no `AssertionError`).
            FAILED means at least one assertion in `test_division` was `False`. pytest will
            show the exact line and values that caused the failure.

        - question: |
            Which is a valid pytest test function?
          type: single
          options:
            - |
              ```python
              class TestMath(unittest.TestCase):
                  def test_add(self):
                      self.assertEqual(add(1, 2), 3)
              ```
            - |
              ```python
              def test_add():
                  assert add(1, 2) == 3
              ```
            - |
              ```python
              def check_add():
                  assert add(1, 2) == 3
              ```
            - |
              ```python
              def test_add():
                  return add(1, 2) == 3
              ```
          correct_index: 1
          explanation: |
            pytest uses plain functions (no class needed) that start with `test_` and use `assert`.
            Option A is the older `unittest` style — it works but is verbose. Option C won't be
            discovered (wrong prefix). Option D returns a boolean but never asserts — it would
            always "pass" even if the result is wrong.

        - question: |
            **(Spaced review — Step 1)** What is the "ratchet" metaphor for testing?
          type: single
          options:
            - "Tests should be written very quickly"
            - "Each passing test locks in progress, preventing regression"
            - "You should ratchet up complexity one test at a time"
            - "Tests should be deleted after the feature is complete"
          correct_index: 1
          explanation: |
            The ratchet metaphor means that once a test passes, that behavior is permanently
            verified. Even as you add new features, the old tests ensure nothing slips backward.


  # --------------------------------------------------------------------------
  # STEP 3 — The Red-Green-Refactor Rhythm
  # Pedagogy:
  #   Worked Example     — full R-G-R cycle with sub-goal labels.
  #   PRIMM              — predict before running.
  #   Threshold concept  — TDD is design, not verification (from PDF).
  #   Fading begins      — first test given, second scaffolded, third TODO.
  #   Bloom's level      — Understand / Apply / Analyze (quiz).
  # --------------------------------------------------------------------------
  - title: "The Red-Green-Refactor Rhythm"
    instructions: |
      > **Learning objective:** After this step you will be able to **execute** a complete Red-Green-Refactor TDD cycle and **explain** why TDD is a design technique, not just testing.

      ## The Core Insight

      Here is the single most important idea in this tutorial:

      > **TDD is a design technique, not a testing technique.**

      When you write the test *first*, you are forced to decide:
      - What is the **public interface**? (function name, parameters, return type)
      - What is the **expected behavior**? (given this input, what should happen?)
      - What are the **edge cases**? (empty input, negative numbers, etc.)

      You answer all these design questions *before writing a single line of implementation*. The tests are a byproduct — the real value is the design thinking.

      ## The Three Phases

      TDD follows a strict three-phase cycle, repeated in short iterations:

      | Phase | Color | What You Do | Key Rule |
      |-------|-------|-------------|----------|
      | **1. RED** | :red_circle: | Write ONE failing test | The test describes desired behavior that does not exist yet |
      | **2. GREEN** | :green_circle: | Write the MINIMUM code to pass | Do not optimize. Do not add features. Just make the test pass |
      | **3. REFACTOR** | :large_blue_circle: | Clean up the code | Remove duplication, improve names — but don't change behavior. All tests must still pass |

      **Critical misconception:** You do NOT write all your tests first. You write **one test**, make it pass, refactor, then write the **next** test. One cycle at a time.

      ## Worked Example: WordCounter

      Let's build a `WordCounter` class using TDD. We will walk through one full cycle together, then you will continue.

      ### Cycle 1: Count words in a simple sentence (WORKED EXAMPLE)

      **RED** — Write a test that describes the behavior we want:
      ```python
      # Sub-goal: Define WHAT we want (the interface + expected behavior)
      def test_count_words_simple():
          counter = WordCounter()
          result = counter.count("hello world")
          assert result == {"hello": 1, "world": 1}
      ```
      Run this test — it fails because `WordCounter` does not exist yet. This is the **RED** phase. The failure is expected and correct.

      **GREEN** — Write the *minimum* code to make it pass:
      ```python
      # Sub-goal: Write just enough code to pass the test
      class WordCounter:
          def count(self, text):
              words = text.split()
              result = {}
              for word in words:
                  result[word] = result.get(word, 0) + 1
              return result
      ```
      Run the test again — it passes. This is the **GREEN** phase.

      **REFACTOR** — The code is clean enough for now, so no refactoring needed. All tests still pass.

      ### Task

      Open `test_word_counter.py`. Cycle 1's test is already provided.

      1. **SEE RED FIRST:** Click **Run** on `test_word_counter.py` *before writing any code*. You should see the test FAIL with an `ImportError` — this IS the RED phase. The test describes behavior that does not exist yet. This failure is expected and correct.
      2. **Go GREEN:** Now write the `WordCounter` class in `word_counter.py` to make the test pass. Run again — you should see GREEN.
      3. **Cycle 2:** Complete `test_count_repeated_words` (partially scaffolded). Run the tests — the new test should FAIL (RED). Then update your implementation if needed to pass it (GREEN).
      4. **Cycle 3:** Write `test_count_empty_string` entirely on your own. What should `count("")` return? Decide, write the test, see it fail, then make it pass.

      **Important:** Always run the tests and see RED before writing implementation. If you skip this step, you cannot be sure your test is actually testing something.

    files:
      - path: "word_counter.py"
        content: |
          # TODO: Implement the WordCounter class here.
          # It should have a count(text) method that returns
          # a dictionary of {word: count} for each word in the text.
        language: "python"

      - path: "test_word_counter.py"
        content: |
          """TDD for WordCounter — practice the Red-Green-Refactor rhythm."""
          import pytest
          from word_counter import WordCounter


          # --- Cycle 1 (test provided — see RED first, then write implementation to go GREEN) ---
          def test_count_words_simple():
              """A simple sentence with no repeated words."""
              counter = WordCounter()
              result = counter.count("hello world")
              assert result == {"hello": 1, "world": 1}


          # --- Cycle 2 (partially scaffolded — complete the assertion) ---
          def test_count_repeated_words():
              """A sentence with repeated words should count each occurrence."""
              counter = WordCounter()
              result = counter.count("the cat sat on the mat")
              # TODO: assert that 'the' appears 2 times and 'cat' appears 1 time
              # Hint: assert result["the"] == ??? and result["cat"] == ???
              pass


          # --- Cycle 3 (write this test entirely on your own) ---
          # TODO: Write test_count_empty_string
          # What should counter.count("") return? Decide, then test it.


          if __name__ == "__main__":
              pytest.main(["-v"])
        language: "python"

    open_file: "test_word_counter.py"

    tests:
      - description: "WordCounter class exists and is importable"
        command: |
          exec(open('/tutorial/word_counter.py').read())
          assert 'WordCounter' in dir() or 'WordCounter' in open('/tutorial/word_counter.py').read(), \
              "Define a class called WordCounter in word_counter.py"
      - description: "test_count_words_simple passes"
        command: |
          import pytest, io, sys
          old = sys.stdout; sys.stdout = buf = io.StringIO()
          code = pytest.main(['/tutorial/test_word_counter.py::test_count_words_simple', '-v', '--tb=short', '--no-header'])
          sys.stdout = old; output = buf.getvalue(); print(output)
          assert code == 0, f"test_count_words_simple failed:\n{output}"
      - description: "test_count_repeated_words has a real assertion (not just pass)"
        command: |
          source = open('/tutorial/test_word_counter.py').read()
          func_body = source.split('test_count_repeated_words')[1].split('def ')[0]
          assert 'assert' in func_body, \
              "Replace 'pass' in test_count_repeated_words with an assert statement"
      - description: "test_count_repeated_words passes"
        command: |
          import pytest, io, sys
          old = sys.stdout; sys.stdout = buf = io.StringIO()
          code = pytest.main(['/tutorial/test_word_counter.py::test_count_repeated_words', '-v', '--tb=short', '--no-header'])
          sys.stdout = old; output = buf.getvalue(); print(output)
          assert code == 0, f"test_count_repeated_words failed:\n{output}"
      - description: "test_count_empty_string function exists"
        command: |
          source = open('/tutorial/test_word_counter.py').read()
          assert 'def test_count_empty_string' in source, \
              "Write a test function called test_count_empty_string"
      - description: "All tests pass"
        command: |
          import pytest, io, sys
          old = sys.stdout; sys.stdout = buf = io.StringIO()
          code = pytest.main(['/tutorial/test_word_counter.py', '-v', '--tb=short', '--no-header'])
          sys.stdout = old; output = buf.getvalue(); print(output)
          assert code == 0, f"Some tests failed:\n{output}"

    quiz:
      title: "Red-Green-Refactor — Knowledge Check"
      min_score: 0.67
      shuffle: true
      questions:

        - question: |
            A student writes five test functions, then starts implementing the code to make them all pass at once. What is wrong with this approach?
          type: single
          options:
            - "Nothing — this is a valid TDD workflow"
            - "TDD requires writing ONE test, making it pass, then writing the NEXT test. Writing all tests first means you cannot use the feedback from each cycle to guide your design"
            - "You should write ten tests, not five"
            - "The tests should be in a separate repository"
          correct_index: 1
          explanation: |
            TDD's power comes from the rapid feedback loop. Each cycle (one test at a time)
            tells you something about your design. If you write all tests upfront, you
            lose this feedback and often end up with tests that don't match the final design.

        - question: |
            In the GREEN phase, a developer writes optimized, production-ready code. Is this correct?
          type: single
          options:
            - "Yes — you should always write the best possible code"
            - "No — the GREEN phase requires writing the MINIMUM code to pass the test. Optimization happens in the REFACTOR phase"
            - "No — the GREEN phase is for writing comments, not code"
            - "Yes — as long as the test passes, any amount of code is fine"
          correct_index: 1
          explanation: |
            The GREEN phase is about making the test pass as quickly and simply as possible.
            Resist the urge to optimize or add features. The REFACTOR phase is where you
            clean up, remove duplication, and improve the design — with all tests still passing.

        - question: |
            **Analyze:** A teammate says *"TDD is just a way to write more tests."* How would you correct this?
          type: single
          options:
            - "They are right — TDD is primarily about test coverage"
            - "TDD is fundamentally a DESIGN technique. Writing the test first forces you to define the interface, expected behavior, and edge cases before implementation. Tests are a valuable byproduct, but the real value is the design thinking"
            - "TDD is about writing fewer tests, not more"
            - "TDD has nothing to do with testing — it is purely about refactoring"
          correct_index: 1
          explanation: |
            This is the threshold concept in TDD: it is a design technique, not a testing technique.
            The test forces you to think about the public interface (how will I call this?)
            and expected behavior (what should it return?) before you write any implementation.
            This produces better-designed, more modular code as a natural consequence.

        - question: |
            What is the correct order of the TDD cycle?
          type: single
          options:
            - "Green → Red → Refactor"
            - "Refactor → Red → Green"
            - "Red → Green → Refactor"
            - "Red → Refactor → Green"
          correct_index: 2
          explanation: |
            RED (write a failing test) → GREEN (write minimum code to pass) → REFACTOR (clean up).
            The order matters: you must see the test fail first to confirm it is testing something real.
            If a test passes immediately, it is not testing new behavior — this is the "Success Against
            All Odds" anti-pattern.


