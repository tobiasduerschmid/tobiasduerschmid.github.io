          content: |
            def fizzbuzz(n):
                if n < 0:
                    raise ValueError(f"n must be non-negative, got {n}")
                result = []
                for i in range(1, n + 1):
                    if i % 15 == 0:
                        result.append("FizzBuzz")
                    elif i % 3 == 0:
                        result.append("Fizz")
                    elif i % 5 == 0:
                        result.append("Buzz")
                    else:
                        result.append(str(i))
                return result
          language: "python"
