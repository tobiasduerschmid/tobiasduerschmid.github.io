    quiz:
      title: "TDD Kata — Knowledge Check"
      min_score: 0.67
      shuffle: true
      questions:

        - question: |
            Why do we add one test at a time instead of writing all four FizzBuzz tests upfront?
          type: single
          options:
            - "To save time — fewer tests means less work"
            - "Each test drives a small, incremental design decision. Writing all tests first would force you to design the entire solution upfront, losing the feedback that each cycle provides"
            - "pytest can only run one test at a time"
            - "It does not matter — both approaches produce the same result"
          correct_index: 1
          explanation: |
            Incremental test-writing is the heart of TDD. Each test cycle gives you feedback:
            "Does this design still work? Do I need to refactor?" Writing all tests first
            is essentially waterfall planning disguised as TDD.

        - question: |
            You write a new test and run it. It **passes immediately** without you changing any code. What should you do?
          type: single
          options:
            - "Celebrate — you are ahead of schedule"
            - "Be suspicious — a test that passes without new code might not be testing anything meaningful. This is the 'Success Against All Odds' anti-pattern. Verify the test is checking the right behavior"
            - "Delete the test since it is redundant"
            - "Move on to the next test — passing is always good"
          correct_index: 1
          explanation: |
            If a test passes immediately, it means one of two things: (1) the behavior was
            already implemented by a previous cycle (which is fine — but verify), or (2) the
            test is not actually testing what you think. Always see RED first to confirm the
            test is meaningful.

        - question: |
            If you use `if/elif` to implement FizzBuzz, why should you check divisibility by 15 **before** checking 3 or 5?
          type: single
          options:
            - "15 is a larger number and should be checked first by convention"
            - "Because 15 is divisible by both 3 and 5. With `if/elif`, checking 3 first would return 'Fizz' for 15 instead of 'FizzBuzz' — the first matching branch wins"
            - "Python requires if-statements to check larger numbers first"
            - "It does not matter — the order of checks has no effect"
          correct_index: 1
          explanation: |
            With `if/elif`, the first matching branch executes and the rest are skipped. Since
            15 is divisible by both 3 and 5, checking `if number % 3 == 0` first would return
            "Fizz" and never reach the 15 check. The most specific condition must come first.
            (Note: the string-concatenation approach from Step 5 avoids this issue entirely
            because it uses two separate `if` statements instead of `elif`.)

        - question: |
            **(Spaced review — Step 2)** A test function is named `def check_fizzbuzz():`. Will pytest discover and run it?
          type: single
          options:
            - "Yes — pytest runs all functions in test files"
            - "No — pytest only discovers functions whose names start with `test_`"
            - "Yes — but only if you pass the function name explicitly"
            - "No — pytest requires class-based tests"
          correct_index: 1
          explanation: |
            pytest auto-discovers functions starting with `test_`. A function named
            `check_fizzbuzz` would be silently ignored — a common mistake that leads
            to tests never running without the developer realizing it.


  # --------------------------------------------------------------------------
  # STEP 5 — Test Behavior, Not Implementation
  # Pedagogy:
  #   Negative Transfer   — CS1 instinct to test line-by-line.
  #   Anti-pattern        — The Nitpicker (from PDF taxonomy).
  #   Bloom's level       — Analyze / Evaluate (quiz).
  # --------------------------------------------------------------------------
  - title: "Test Behavior, Not Implementation"
    instructions: |
      > **Learning objective:** After this step you will be able to **distinguish** between brittle (implementation-coupled) and robust (behavior-focused) tests, and **explain** why this matters for refactoring.

      ## The Key Principle

      > **Test what a function DOES, not how it does it.**

      A **brittle test** breaks when you change the internal implementation, even if the behavior is unchanged. A **robust test** only breaks when the actual behavior changes.

      ### Example: Two Ways to Test the Same Function

      Consider testing a function that sorts a list of students by GPA:

      ```python
      # BRITTLE — tests implementation details
      def test_sort_brittle():
          sorter = StudentSorter()
          sorter.sort(students)
          # Checks internal state — breaks if we rename the field
          assert sorter._sorted_list[0].name == "Alice"
          assert sorter._comparison_count == 3  # Why do we care?

      # ROBUST — tests behavior
      def test_sort_robust():
          sorter = StudentSorter()
          result = sorter.sort(students)
          # Checks what the function RETURNS — the observable behavior
          assert result[0].gpa >= result[1].gpa  # Sorted descending
          assert len(result) == len(students)     # No items lost
      ```

      The brittle test will break if you rename `_sorted_list` or change the sort algorithm (even to a faster one). The robust test only cares about the result.

      ### The Refactoring Litmus Test

      Here is a simple rule: **if you refactor the internals of a function and all tests still pass, your tests are robust.** If tests break after a pure refactoring (no behavior change), they are testing implementation.

      ### Task 1: Spot the Brittle Tests

      Open `test_brittle_audit.py`. It contains four tests for a simple `ShoppingCart` class. **Two tests are brittle** (they test implementation details) and **two are robust** (they test behavior). Your job:

      1. Read each test carefully
      2. Identify which two are brittle and which two are robust
      3. Fix the two brittle tests by rewriting them to test behavior instead of implementation
      4. Run the tests to confirm they all pass

      ### Task 2: The Refactoring Litmus Test

      Now refactor your FizzBuzz from Step 4 using a different approach — for example, string concatenation instead of `if/elif`:
      ```python
      def fizzbuzz(number):
          result = ""
          if number % 3 == 0:
              result += "Fizz"
          if number % 5 == 0:
              result += "Buzz"
          return result or str(number)
      ```
      Run `test_fizzbuzz.py` — all tests should still pass, proving they test *behavior*, not *implementation*.

    files:
      - path: "shopping_cart.py"
        content: |
          class ShoppingCart:
              def __init__(self):
                  self._items = []

              def add(self, name, price):
                  self._items.append({"name": name, "price": price})

              def total(self):
                  return sum(item["price"] for item in self._items)

              def item_count(self):
                  return len(self._items)

              def items(self):
                  return [item["name"] for item in self._items]
        language: "python"

      - path: "test_brittle_audit.py"
        content: |
          """AUDIT: Two of these tests are brittle. Find and fix them."""
          import pytest
          from shopping_cart import ShoppingCart


          # Test 1
          def test_add_item_updates_count():
              cart = ShoppingCart()
              cart.add("Apple", 1.50)
              assert cart.item_count() == 1


          # Test 2 — BRITTLE? Check if this tests behavior or implementation.
          def test_add_item_internal_list():
              cart = ShoppingCart()
              cart.add("Apple", 1.50)
              # Accesses private attribute directly
              assert cart._items[0]["name"] == "Apple"
              assert cart._items[0]["price"] == 1.50


          # Test 3
          def test_total_sums_prices():
              cart = ShoppingCart()
              cart.add("Apple", 1.50)
              cart.add("Bread", 2.00)
              assert cart.total() == 3.50


          # Test 4 — BRITTLE? Check if this tests behavior or implementation.
          def test_internal_list_length():
              cart = ShoppingCart()
              cart.add("Apple", 1.50)
              cart.add("Bread", 2.00)
              # Accesses private attribute directly
              assert len(cart._items) == 2


          if __name__ == "__main__":
              pytest.main(["-v"])
        language: "python"

    open_file: "test_brittle_audit.py"

    tests:
      - description: "Brittle tests have been fixed (no private attribute access)"
        command: |
          source = open('/tutorial/test_brittle_audit.py').read()
          assert '_items' not in source, \
              "Your tests still access the private attribute `_items`. Rewrite them to use public methods like item_count(), total(), or items() instead."
      - description: "All audit tests pass"
        command: |
          import pytest, io, sys
          old = sys.stdout; sys.stdout = buf = io.StringIO()
          code = pytest.main(['/tutorial/test_brittle_audit.py', '-v', '--tb=short', '--no-header'])
          sys.stdout = old; output = buf.getvalue(); print(output)
          assert code == 0, f"Some tests failed:\n{output}"
      - description: "FizzBuzz has been refactored"
        command: |
          source = open('/tutorial/fizzbuzz.py').read()
          assert 'Fizz' in source, \
              "Refactor your fizzbuzz.py using a different approach (e.g., string concatenation)"
      - description: "All FizzBuzz tests still pass after refactoring"
        command: |
          import pytest, io, sys
          old = sys.stdout; sys.stdout = buf = io.StringIO()
          code = pytest.main(['/tutorial/test_fizzbuzz.py', '-v', '--tb=short', '--no-header'])
          sys.stdout = old; output = buf.getvalue(); print(output)
          assert code == 0, f"Tests broke after refactoring — your tests may be too brittle:\n{output}"

    quiz:
      title: "Behavior vs. Implementation — Knowledge Check"
      min_score: 0.67
      shuffle: true
      questions:

        - question: |
            Which test is **more robust**?

            **Test A:**
            ```python
            def test_sort_a():
                result = sort_names(["Charlie", "Alice", "Bob"])
                assert result == ["Alice", "Bob", "Charlie"]
            ```

            **Test B:**
            ```python
            def test_sort_b():
                result = sort_names(["Charlie", "Alice", "Bob"])
                assert result[0] < result[1] < result[2]
                assert len(result) == 3
            ```
          type: single
          options:
            - "Test A — it checks the exact output"
            - "Test B — it checks the behavioral property (sorted order) without hard-coding specific values, making it resilient to input changes"
            - "Both are equally robust"
            - "Neither is robust — they both need mocking"
          correct_index: 1
          explanation: |
            Test A is fine for this specific input, but Test B expresses the *property* that matters:
            the output is sorted and the same length. If you add a fourth name to the input,
            Test A breaks but Test B still works. Robust tests verify behavioral properties.

        - question: |
            You refactor a function's internal algorithm (from bubble sort to quicksort) without changing its return value. Two of your tests break. What does this tell you?
          type: single
          options:
            - "The refactoring introduced a bug"
            - "The broken tests are testing implementation details (how the sort works internally) rather than behavior (what the function returns). They should be rewritten to test behavior"
            - "You should revert the refactoring since it broke tests"
            - "The tests are too strict — you should remove them"
          correct_index: 1
          explanation: |
            If the function's behavior (inputs → outputs) is unchanged but tests break,
            those tests are coupled to the implementation. This is the "Nitpicker" anti-pattern.
            The fix is to rewrite the tests to assert on observable behavior, not internal details.

        - question: |
            **(Spaced review — Step 3)** What is the correct order of the TDD cycle?
          type: single
          options:
            - "Green → Red → Refactor"
            - "Red → Green → Refactor"
            - "Refactor → Green → Red"
            - "Red → Refactor → Green"
          correct_index: 1
          explanation: |
            RED (write failing test) → GREEN (minimum code to pass) → REFACTOR (clean up).
            You must always see the test fail first (RED) to confirm it is testing real behavior.


  # --------------------------------------------------------------------------
  # STEP 6 — TDD Kata: Password Validator
  # Pedagogy:
  #   Production phase   — PPP framework, full scaffolding removal.
  #   Generation Effect   — desirable difficulty, blank slate.
  #   Bloom's level       — Apply / Create (quiz).
  # --------------------------------------------------------------------------
  - title: "TDD Kata: Password Validator"
    instructions: |
      > **Learning objective:** After this step you will be able to **independently apply** the full TDD cycle — writing tests first, then implementation — for a new problem.

      ## The Production Phase

      This is the real test of your TDD skills. You will receive **requirements** and a minimal scaffold — a stub function and one example test. The rest is up to you.

      ## Requirements: `validate_password(password)`

      Build a function that validates passwords. It should return a tuple: `(is_valid, message)`.

      | Rule | Valid Example | Invalid Example |
      |------|--------------|-----------------|
      | At least 8 characters | `"SecureP1"` | `"Short1"` |
      | Contains at least one uppercase letter | `"Password1"` | `"password1"` |
      | Contains at least one digit | `"Password1"` | `"Password"` |

      **Return values:**
      - Valid: `(True, "Valid")`
      - Invalid: `(False, "<reason>")` — e.g., `(False, "Password must be at least 8 characters")`

      ## Your TDD Workflow

      The first test (`test_valid_password`) is provided as scaffolding. Your job:

      1. **Write at least 3 more test functions** in `test_password.py` — one for each rule (too short, missing uppercase, missing digit). The function signatures are suggested in the comments.
      2. **Run tests** — they should all FAIL (RED) since `password.py` only has a stub
      3. **Implement `validate_password()`** in `password.py` to make tests pass (GREEN)
      4. **Refactor** if needed

      ### If You Feel Stuck

      That is completely normal. Writing tests for something that does not exist yet feels backward at first. Every TDD practitioner felt this way initially. Focus on what the function *should return* for each input — that is all a test needs to express.

      **Remember:** Write the tests *before* the implementation. This forces you to design the interface (function name, parameters, return type) before writing any logic.

    files:
      - path: "password.py"
        content: |
          def validate_password(password):
              """Validate a password against security rules.

              Returns:
                  (True, "Valid") if all rules pass.
                  (False, "reason") if a rule is violated.
              """
              pass  # TODO: Implement the validation logic
        language: "python"

      - path: "test_password.py"
        content: |
          """TDD Kata: Password Validator — write your tests FIRST."""
          import pytest
          from password import validate_password


          # Here is the first test as an example (the "happy path"):
          def test_valid_password():
              is_valid, message = validate_password("SecureP1")
              assert is_valid is True
              assert message == "Valid"


          # TODO: Write at least 3 more test functions below.
          # Each test should check ONE validation rule:
          #
          # def test_rejects_short_password():
          #     ...
          #
          # def test_rejects_missing_uppercase():
          #     ...
          #
          # def test_rejects_missing_digit():
          #     ...


          if __name__ == "__main__":
              pytest.main(["-v"])
        language: "python"

    open_file: "test_password.py"

    tests:
      - description: "test_password.py contains at least 4 test functions"
        command: |
          source = open('/tutorial/test_password.py').read()
          test_count = source.count('def test_')
          assert test_count >= 4, \
              f"Write at least 4 test functions (found {test_count}). Test valid passwords, too-short, missing uppercase, and missing digit."
      - description: "validate_password function exists"
        command: |
          source = open('/tutorial/password.py').read()
          assert 'def validate_password' in source, \
              "Implement the validate_password function in password.py"
      - description: "All student tests pass"
        command: |
          import pytest, io, sys
          old = sys.stdout; sys.stdout = buf = io.StringIO()
          code = pytest.main(['/tutorial/test_password.py', '-v', '--tb=short', '--no-header'])
          sys.stdout = old; output = buf.getvalue(); print(output)
          assert code == 0, f"Your tests failed:\n{output}"
      - description: "Valid passwords are accepted"
        command: |
          exec(open('/tutorial/password.py').read())
          result = validate_password("SecureP1")
          assert result[0] is True, f"Expected (True, ...) for 'SecureP1', got {result}"
      - description: "Too-short passwords are rejected"
        command: |
          exec(open('/tutorial/password.py').read())
          result = validate_password("Short1")
          assert result[0] is False, f"Expected (False, ...) for 'Short1', got {result}"
      - description: "Passwords without uppercase are rejected"
        command: |
          exec(open('/tutorial/password.py').read())
          result = validate_password("password1")
          assert result[0] is False, f"Expected (False, ...) for 'password1', got {result}"
      - description: "Passwords without digits are rejected"
        command: |
          exec(open('/tutorial/password.py').read())
          result = validate_password("Password")
          assert result[0] is False, f"Expected (False, ...) for 'Password', got {result}"

    quiz:
      title: "Independent TDD — Knowledge Check"
      min_score: 0.67
      shuffle: true
      questions:

        - question: |
            A student's test for the password validator looks like this:
            ```python
            def test_password():
                assert validate_password("SecureP1") == (True, "Valid")
                assert validate_password("short") == (False, "Password must be at least 8 characters")
                assert validate_password("nouppercase1") == (False, "Password must contain an uppercase letter")
                assert validate_password("NoDigits") == (False, "Password must contain a digit")
            ```
            What is the problem with this approach?
          type: single
          options:
            - "Nothing — this is a perfectly fine test"
            - "All four assertions are in a single test function. If the first assertion fails, the remaining three never run, hiding additional failures. Each rule should be its own test function"
            - "The test is too long"
            - "The test function name is wrong"
          correct_index: 1
          explanation: |
            Each `assert` should be in its own test function so you can see exactly which
            rule failed. If `test_password()` fails on line 2, you don't know if lines 3 and 4
            would also fail. Separate test functions give you precise, independent feedback.

        - question: |
            You are writing a test for a new feature, but you find it very difficult to set up the test — you need to create five objects and configure them just to call one function. What does this difficulty tell you?
          type: single
          options:
            - "Testing is inherently hard — just push through it"
            - "The difficulty is diagnostic: it tells you the function is too tightly coupled or has too many dependencies. 'Listen to the test' — simplify the design so the function is easier to test"
            - "Skip the test and write a comment instead"
            - "Use more mocking to simplify the setup"
          correct_index: 1
          explanation: |
            This is the "listen to the test" principle. When a test is hard to write, the
            function's design is often the problem. A function that requires complex setup
            usually has too many responsibilities or hidden dependencies. TDD uses this
            pain as architectural feedback — simplify the design, and the test becomes easy.

        - question: |
            **(Spaced review — Step 1)** Which of the following is **not** a benefit of automated tests?
          type: single
          options:
            - "They prevent regressions"
            - "They guarantee zero bugs"
            - "They enable safe refactoring"
            - "They specify expected behavior"
          correct_index: 1
          explanation: |
            Tests reduce bugs and catch regressions, but they cannot guarantee zero bugs.
            Testing shows the presence of bugs, not their absence.


