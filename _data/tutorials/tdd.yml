            from dataclasses import dataclass


            @dataclass(frozen=True)
            class ScoringEvent:
                name: str
                dice_used: tuple
                damage: int


            @dataclass(frozen=True)
            class BattleReport:
                events: tuple = ()

                @property
                def total_damage(self) -> int:
                    return sum(event.damage for event in self.events)


            def score(dice: list[int]) -> BattleReport:
                if dice == [1]:
                    return BattleReport((
                        ScoringEvent("Dragon Flame", (1,), 100),
                    ))
                return BattleReport()
          language: "python"

