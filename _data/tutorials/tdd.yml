                ComboRule(1, 3, "Dragon Blast", 1000),
                ComboRule(2, 3, "Goblin Swarm", 200),
                ComboRule(3, 3, "Orc Charge", 300),
                ComboRule(4, 3, "Troll Smash", 400),
                ComboRule(5, 3, "Lightning Storm", 500),
                ComboRule(6, 3, "Demon Strike", 600),
            )

            SINGLE_RULES = (
