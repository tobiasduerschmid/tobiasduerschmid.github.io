            0: "There is no such pytest issue. Bugs aren't \"deferred\" by the collection algorithm — they exist or don't based on whether a test exercises the buggy input. The reason this bug hid for four cycles is *purely about which inputs got tested*, not about pytest internals."
            2: "Bugs are deterministic functions of input, not of date. (Time-dependent bugs do exist — e.g., daylight savings — but the cycle-7 bug isn't one of them; it depends only on the dice list.)"
            3: "Cycle 7 didn't change the rule. The spec was \"three 1s = one Dragon Blast, leftovers score as singles\" all along. The bug is that for six 1s, the *cycle-5 code* emits 1 Blast + 3 Flames, when the spec says 2 Blasts + 0 Flames. The defect was always there; only cycle 7's test surfaced it."
          explanation: |
            Boundary thinking. Every previous combo test gave the rule *exactly* `count`
            dice. The bug was on the boundary where `counts[X] >= 2 * count`. Without a test
            on that boundary, the code would have shipped wrong — and the developer would
            have been completely confident in it. This is exactly the kind of failure mode
            empirical TDD studies report.

        - question: |
            What is the **most defensible** general lesson from cycle 7 about test-suite design?
          type: single
          options:
            - "Always test every input combinatorially — only complete coverage of the input space catches all bugs"
            - "Coverage by line is what matters; cycle 7's bug was in code already covered, so coverage didn't help. The lesson is to *also* think about boundary cases (`exactly N`, `2N`, `between N and 2N`, `0`) per behavior"
            - "Never use floor-division and modulo in production code — they are too easy to get wrong"
            - "TDD is unreliable; this bug proves that even careful test-first development can miss things, so we should add manual QA after every cycle"
          correct_index: 1
          option_feedback:
            0: "Combinatorial coverage is **infeasible** for any nontrivial input space (six 1–6 dice already gives `6^6 = 46656` possibilities; ten dice would be 60 million). The lesson isn't \"test more,\" it's \"test *the right boundaries*.\" One well-chosen test on `2N` catches the bug; thousands of random inputs in the same partition don't."
            2: "This blames the operator instead of the test design. `//` and `%` are correct primitives for this exact problem — a *cycle-7 test* would catch a wrong implementation just as readily as a wrong subtraction. The remedy is more careful test-input selection, not avoiding correct Python features."
            3: "Inverts the lesson. The bug *was caught*, in cycle 7, by a TDD-style test. The takeaway isn't \"TDD is unreliable\" — it's \"TDD's effectiveness depends on which inputs your tests probe.\" Adding manual QA on top of a test suite that misses boundaries doesn't fix the root cause; better boundary-value test selection does."
          explanation: |
            *Coverage* told us we executed the line. It did not tell us whether the line
            was right *for all relevant inputs*. Boundary-value analysis (the partition
            tradition you encountered in Foundations) complements coverage: every behavior
            has a "just-at-the-boundary," "just-past-the-boundary," and "well-past-the-
            boundary" input — and a healthy suite probes each.

        - question: |
            Cycle 5's bonus leftover guardrail (`[1, 1, 1, 1, 5]`) still passes after cycle 7's refactor. Why? Be precise.
          type: single
          options:
            - "Because pytest skips guardrail tests after they pass once — they are stored as cached green results"
            - "Because for `counts[1] = 4`, the old `counts[1] -= 3` and the new `counts[1] %= 3` both leave 1 in the counter — the two implementations agree on this specific input even though they disagree on `counts[1] >= 6`"
            - "Because the leftover test is parameterized, and pytest reruns parameterized tests with looser tolerances"
            - "Because the leftover test has been deleted by the cycle 7 refactor — the green count went down, not up"
          correct_index: 1
          option_feedback:
            0: "Pytest doesn't cache test results between runs. Every `pytest` invocation re-executes every selected test from scratch. Made-up framework behavior — the explanation needs to come from the code's semantics."
            2: "Pytest doesn't loosen tolerances for parametrized tests. Each parameter row runs the same assertion logic. The reason the guardrail still passes is *mathematical* (the two operations agree on 4), not framework-related."
            3: "Refactors don't delete tests — that would defeat the safety net. The green count *increased* because cycle 7 added a new passing test. The code is what gets restructured during refactoring; the tests remain as guards."
          explanation: |
            This is a subtle but important point: a refactor does not have to *change every
            output*. The two implementations of `apply` produce the same answer for any
            input where the old answer was correct — and only the new answer is correct
            where the old was wrong. That is what makes the cycle-7 fix a *generalisation*
            rather than a *replacement*.

        - question: |
            A teammate looks at cycle 7's fix and says: *"This bug only existed because we extracted ComboRule. If we'd kept the inline `if counts[1] >= 3:` from cycle 5, we wouldn't have had this issue."* Are they right?
          type: single
          options:
            - "Yes — the rule-object refactor introduced complexity that produced the bug. Inline code would have been simpler and safer"
            - "No — the *exact same bug* was present in cycle 5's inline code (`if counts[1] >= 3: ... counts[1] -= 3` would also fail for six 1s). The rule-object refactor moved the bug from one place to another but did not introduce it. The defect was a missing test, not a missing pattern"
            - "It depends on Python version — Python 3.10+ silently rewrites `if` to a multi-iteration form for combos, which is why old Python had the bug"
            - "Yes — Python's `Counter` class re-orders subtraction operations under the hood when used with dataclasses"
          correct_index: 1
          option_feedback:
            0: "Trace the cycle-5 inline code on six 1s by hand: `if counts[1] >= 3: ... counts[1] -= 3` runs once, leaves 3, then SingleRule emits 3 Flames. The same defect existed before the refactor, just in a different file. The algorithm needed a loop over complete triples; the abstraction did not create that bug."
            2: "Python doesn't rewrite `if` statements; that's invented language behavior. (And version-blame is a common dodge for design questions — the language is rarely the actual culprit.) The bug is in the *algorithm*, which Python executes faithfully on every version."
            3: "Counter doesn't re-order operations. (Made-up implementation detail, again.) The actual lesson here is that abstractions don't introduce algorithmic bugs — they at most *relocate* them. The fix has to be in the algorithm, no matter where the algorithm lives."
          explanation: |
            The bug is the algorithm's bug, not the abstraction's. Whether the `if`/`-=`
            sits in `score()` or in `ComboRule.apply` makes no difference to its behavior.
            The lesson is honest: TDD does not prevent every bug; it surfaces them when
            tests probe the right inputs. The rule-object refactor was about *future-
            proofing the design*, not *correctness of cycle 5's logic*.


  # --------------------------------------------------------------------------
  # STEP 10 — TRANSFER CYCLE: TDD on FizzBuzz (different domain, same rhythm)
  #
  # Pedagogy:
  #   Variation Theory     — same TDD pattern applied to a *totally* different
  #                          domain. The Dragon Dice cycles teach the rhythm;
  #                          this step proves it transfers (Marton & Booth's
  #                          "generalization" pattern of variation).
  #   Faded scaffolding    — the most-faded cycle in the tutorial. No
  #                          instructor-provided RED test, no GREEN scaffold,
  #                          no REFACTOR checklist. Student drives.
  #   Canon TDD step 1     — student is now responsible for writing the test
  #                          list themselves (they saw the discipline modeled
  #                          in Step 1; here they apply it).
  #   Compression          — seven Dragon-Dice cycles condensed to roughly
  #                          four FizzBuzz mini-cycles in one step. The
  #                          condensation is itself the test of mastery.
  #   Threshold check      — Janzen & Saiedian's "residual effect": this
  #                          step is where students discover the rhythm now
  #                          feels natural — earned, not preached.
  #   Quiz                 — explicit Variation-Theory comparison: which
  #                          Dragon-Dice cycle does each FizzBuzz move
  #                          parallel? Surfaces the structural invariants.
  # ==========================================================================
  - title: "Transfer Cycle — TDD on FizzBuzz (Different Domain, Same Rhythm)"
    instructions: |
      ### Why this matters

      Seven Dragon-Dice cycles risk teaching you "TDD works *because* dice are compositional." The transfer cycle disproves that — same rhythm, totally different domain (FizzBuzz), and *no scaffolding from us*: you write your own test list (Canon TDD step 1), you order the items, you drive the cycles. Janzen & Saiedian's "residual effect" predicts that this is where the rhythm finally feels *natural* — earned, not preached. The compression of seven Dragon-Dice cycles into ~four FizzBuzz mini-cycles is itself the test of mastery.

      ### 🎯 You will learn to

      - Create your own Canon TDD test list for an unfamiliar problem, ordered from simplest to most design-breaking
      - Apply RED-GREEN-REFACTOR to FizzBuzz with no instructor scaffolding — driving the cycles yourself in compressed form
      - Evaluate the structural parallels between each FizzBuzz move and the Dragon-Dice cycle it mirrors (Variation Theory generalization)

      You've completed seven cycles of TDD on dice scoring. The risk: *"TDD only works because Dragon Dice is a naturally compositional domain."* The way to disprove that risk is to apply the same rhythm to a completely unrelated problem — right now, in compressed form.

      ## The classic spec — FizzBuzz

      `fizzbuzz(n)` returns a list of strings of length `n`. For each integer `i` from `1` to `n`:

      - If `i` is a multiple of **15** → `"FizzBuzz"`
      - else if `i` is a multiple of **3** → `"Fizz"`
      - else if `i` is a multiple of **5** → `"Buzz"`
      - else → `str(i)`

      So `fizzbuzz(5) == ["1", "2", "Fizz", "4", "Buzz"]`.

      ## Canon TDD step 1 — write your own test list

      Before reading any further, take 60 seconds and **write your own test list**. What behaviors does the spec define? Order them from *simplest* to *most design-breaking* — the way the Dragon Dice tutorial implicitly did across cycles 1–7. **You did this implicitly throughout — now you do it explicitly.**

      <details markdown="1"><summary>📋 One possible test list (open ONLY after you've written your own — 60 seconds first)</summary>

      A natural ordering, simplest first:

      - ☐ `fizzbuzz(0) == []`
      - ☐ `fizzbuzz(1) == ["1"]`
      - ☐ `fizzbuzz(2) == ["1", "2"]`
      - ☐ `fizzbuzz(3)[-1] == "Fizz"`
      - ☐ `fizzbuzz(5)[-1] == "Buzz"`
      - ☐ `fizzbuzz(15)[-1] == "FizzBuzz"`
      - ☐ `fizzbuzz(-1)` raises `ValueError`

      Compare with your list. Did you have the same items? In the same order? *(The reflection at the bottom of this step asks you to map each item to its Dragon-Dice parallel — don't peek there yet either.)*
      </details>

      ## Your task — drive the cycles yourself (~10–15 minutes)

      Pick the **simplest unimplemented item** from your list. Convert *only that one item* into a runnable test in `test_fizzbuzz.py`. Make it pass with the **simplest** code (TPP — start with constants, not loops; the *tests* will force the loop when ready). Refactor on green. Pick the next item. Repeat.

      **Don't try to handle all rules at once. One test at a time.** (Beck's Canon TDD is explicit on this — converting all list items to tests up-front "leads to rework and depression.")

      ## What you're doing here

      You are *applying* what you learned. There is no instructor-provided RED test, no GREEN scaffold, no REFACTOR checklist. **The cycle discipline is now yours.** If the rhythm feels familiar — that's the threshold concept doing its work.

      <details markdown="1"><summary>🛟 Stuck? (Open only after at least 5 minutes of trying)</summary>

      The hard test is `multiple of 15`. *Before reading further*, ask yourself: **which earlier Dragon-Dice cycle had a test that the previous structure couldn't satisfy with a local edit? What was the move there?**

      Hint without the answer: trace by hand what your current code returns for `i=15`. Why? Then ask what you'd change.

      <details markdown="1"><summary>If you've named the structural pressure yourself — open for two known options</summary>

      - **Order matters**: check `i % 15 == 0` *first*, then `% 3`, then `% 5`. Simplest TPP move.
      - **String concatenation**: build up the result — start empty; if divisible by `3`, append `"Fizz"`; if by `5`, append `"Buzz"`; if still empty, use `str(i)`.

      Either passes the test list. Pick one; if a future requirement makes the other fit better, you'll refactor *toward* it.
      </details>
      </details>

      ## Reflection (after green — this is the heart of the step)

      Compare the FizzBuzz cycles you just did with the Dragon Dice arc. **Write your answers before opening the reveal.**

      1. Which Dragon-Dice cycle's RED moment does FizzBuzz's *"multiple of 3"* test echo?
      2. Which Dragon-Dice cycle does FizzBuzz's *`multiple of 15`* test parallel?
      3. What was *different*?
      4. What was *the same*? (Try to name 3–4 invariants of the rhythm.)

      <details markdown="1"><summary>Compare your invariants — order doesn't matter, but check each is in your version somewhere</summary>

      Items that should appear in your "same" list:

      - The rhythm itself (RED → GREEN → REFACTOR, one test at a time)
      - Test-list discipline (Canon TDD step 1 — a list before any tests)
      - RED-as-success (the failing test is the deliverable, not a problem)
      - Refactor-toward-duplication (Rule of Two; wait for the second example)
      - TPP — smallest transformation that passes the failing test
      - Allow-the-ugly-first-GREEN (don't pre-design the abstraction)

      If your answer captured the *rhythm and the discipline*, you have the threshold concept. **TDD is a rhythm, not a problem-specific technique** — you just demonstrated it on a problem with no shared code with Dragon Dice.
      </details>

      ---

      ### 📦 Commit your progress

      Before moving on, commit this cycle. Stage **only the files you actually changed** (fizzbuzz.py test_fizzbuzz.py) and write a short message — recommended: `Transfer cycle: FizzBuzz via TDD`.

    files:
      - path: "fizzbuzz.py"
        content: |
          # Empty by design — TDD says: write a failing test first.
          # Build this file up, one test cycle at a time.
        language: "python"

      - path: "test_fizzbuzz.py"
        content: |
          """Your TDD cycles for FizzBuzz.

          Pick the simplest test case from your test list. Write it.
          Watch it fail. Make it pass with the simplest code (TPP).
          Refactor on green. Pick the next one. Repeat.

          Suggested first test: fizzbuzz(0) == []
          """
          import pytest
          from fizzbuzz import fizzbuzz


          # Write your tests below — one per behavior in your list.


        language: "python"

    open_file: "test_fizzbuzz.py"
    run_file: "test_fizzbuzz.py"

    solution:
      files:
        - path: "fizzbuzz.py"
          content: |
            def fizzbuzz(n: int) -> list[str]:
                if n < 0:
                    raise ValueError(f"n must be non-negative, got {n}")
                result: list[str] = []
                for i in range(1, n + 1):
                    if i % 15 == 0:
                        result.append("FizzBuzz")
                    elif i % 3 == 0:
                        result.append("Fizz")
                    elif i % 5 == 0:
                        result.append("Buzz")
                    else:
                        result.append(str(i))
                return result
          language: "python"
        - path: "test_fizzbuzz.py"
          content: |
            """One full TDD-driven test list for FizzBuzz."""
            import pytest
            from fizzbuzz import fizzbuzz


            def test_empty_returns_empty_list():
                assert fizzbuzz(0) == []


            def test_single_number_is_stringified():
                assert fizzbuzz(1) == ["1"]


            def test_regular_numbers_become_strings():
                assert fizzbuzz(2) == ["1", "2"]


            def test_multiple_of_three_is_fizz():
                assert fizzbuzz(3) == ["1", "2", "Fizz"]


            def test_multiple_of_five_is_buzz():
                assert fizzbuzz(5) == ["1", "2", "Fizz", "4", "Buzz"]


            def test_multiple_of_fifteen_is_fizzbuzz():
                # The design-breaking moment: 15 is divisible by BOTH 3 and 5.
                # Without the right ordering or composition, "Fizz" wins (or
                # "Buzz" wins), not "FizzBuzz".
                assert fizzbuzz(15)[-1] == "FizzBuzz"


            def test_negative_n_raises():
                with pytest.raises(ValueError, match="non-negative"):
                    fizzbuzz(-1)


          language: "python"
      explanation: |
        One disciplined path through the FizzBuzz spec. The order is
        simple-to-design-breaking: empty → single → regular → multiple
        of 3 → multiple of 5 → multiple of 15 → invalid input.

        The `multiple of 15` test is the design-breaking moment. The
        simplest fix is *ordering*: check `% 15` before `% 3` or `% 5`.
        A more compositional implementation (build the string from
        "Fizz" and "Buzz" parts) is *eventually* nicer, but it isn't the
        *simplest* GREEN — and TPP says don't reach for it until a test
        demands it. None does, so the ordered conditional stays.

        You followed the same rhythm you used on Dragon Dice — that's
        the proof the rhythm transfers.

    tests:
      - description: "fizzbuzz function exists and produces correct output for n=15"
        command: |
          import sys, importlib
          sys.modules.pop('fizzbuzz', None)
          fz = importlib.import_module('fizzbuzz')
          assert hasattr(fz, 'fizzbuzz'), \
              "Define a function called `fizzbuzz(n)` in fizzbuzz.py."
          result = fz.fizzbuzz(15)
          expected = ["1", "2", "Fizz", "4", "Buzz", "Fizz", "7", "8",
                      "Fizz", "Buzz", "11", "Fizz", "13", "14", "FizzBuzz"]
          assert result == expected, \
              f"fizzbuzz(15) returned {result!r}; expected {expected!r}.\n\n" \
              "Check your multiple-of-15 case — the 'FizzBuzz' must win " \
              "over plain 'Fizz' or 'Buzz' at i=15. (Ordering: check % 15 first.)"
        hints:
          - title: "Small nudge"
            text: "What does your code return for i=15? Trace it by hand. Which `if` branch claims it first?"
          - title: "Strategic hint"
            text: "If the `% 3` branch fires before `% 15`, the result at i=15 will be 'Fizz', not 'FizzBuzz'. Either reorder so `% 15` is checked first, or build the result by composing 'Fizz'+'Buzz'."
          - title: "Spoiler — full ordering"
            text: "```python\nif i % 15 == 0:\n    result.append('FizzBuzz')\nelif i % 3 == 0:\n    result.append('Fizz')\nelif i % 5 == 0:\n    result.append('Buzz')\nelse:\n    result.append(str(i))\n```"

      - description: "At least 4 tests written (test-list discipline)"
        command: |
          import re
          source = open('/tutorial/test_fizzbuzz.py').read()
          test_count = len(re.findall(r'^def test_', source, re.MULTILINE))
          assert test_count >= 4, \
              f"You have {test_count} test function(s). The TDD discipline " \
              "is one-test-per-behavior. Aim for at least 4 from your test " \
              "list — for example: empty, regular numbers, multiple of 3, " \
              "multiple of 15. (Multiple of 5 and invalid input are bonus.)"

      - description: "All your tests pass"
        command: |
          import pytest, io, sys
          old = sys.stdout
          sys.stdout = buf = io.StringIO()
          code = pytest.main(['/tutorial/test_fizzbuzz.py', '-v', '--tb=short', '--no-header'])
          sys.stdout = old
          output = buf.getvalue()
          print(output)
          assert code == 0, \
              f"Some of your FizzBuzz tests fail — fix fizzbuzz.py until " \
              f"all pass:\n\n{output}"

    quiz:
      title: "Step 10 — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            FizzBuzz's `multiple of 15` test most directly parallels which Dragon-Dice cycle — and why?
          type: single
          options:
            - "Cycle 5 (Triple 1s = Dragon Blast). Both are *design-breaking tests* — the simplest code that passed earlier tests cannot be tweaked locally to satisfy the new test; the structure has to acknowledge a combined case before earlier cases."
            - "Cycle 1 (Empty roll). Both are the simplest case anyone could write."
            - "Cycle 4 (Repeated singles). Both are about handling duplicates of the same input."
            - "Cycle 6 (Goblin Swarm). Both are about adding a second example that reveals an abstraction."
          correct_index: 0
          option_feedback:
            1: "Cycle 1 was the *simplest* case (the empty input), not a structural pivot. FizzBuzz's empty-list test (`fizzbuzz(0) == []`) is the cycle-1 parallel — but `multiple of 15` is structurally hard, not trivially simple. The match here is on *structural pressure*, not on \"first cycle of the tutorial.\""
            2: "Cycle 4 is about generalizing per-input handling into a loop — a refactor, not a structural pivot. The new test (`[1, 1]`) is satisfiable by either a third hardcoded branch *or* a loop. FizzBuzz's `multiple of 15` test cannot be satisfied by either of the two prior conditional shapes; it forces a re-ordering. Different kind of design moment."
            3: "Cycle 6 (Goblin Swarm) is about *abstraction discovery* — the second example reveals the right shape for a refactor. FizzBuzz's `multiple of 15` isn't about extracting a `Rule` object; it's about the previous code being structurally unable to produce the right answer at all. Structural pivot, not abstraction extraction."
          explanation: |
            Cycle 5 is the right parallel. The signature of a design-breaking test: previous cycles produced code that looks correct, but the *new* test cannot be satisfied by a local edit — the structure has to change. For Dragon Dice that meant moving from per-die iteration to count-then-emit. For FizzBuzz that meant either reordering the conditionals (so `% 15` is checked first) or switching to a compositional string builder. Either way, the existing structure had to accept a behavior the previous tests didn't anticipate. **That feeling — "I can't tweak this; I have to restructure" — is a TDD rhythm invariant, not a Dragon-Dice quirk.**

        - question: |
            A teammate, who has never done TDD, pushes back: *"FizzBuzz is just trivia — the real work is the algorithm. Why did you spend 12 minutes on the cycles instead of 30 seconds typing the obvious solution?"* Pick the strongest reply.
          type: single
          options:
            - "**On a one-shot toy problem the time is comparable, but the cycles produced a regression-proof test suite and a record of every design choice.** The 'obvious' solution often hides the design-breaking moment (FizzBuzz at 15) until a refactor exposes it later — at which point there's no test to catch the slip. Erdogmus et al. (2005) found test-first students wrote *more* tests AND were *more* productive per test."
            - "TDD is faster than typing the obvious solution because pytest's parallelism speeds up small test runs."
            - "The 'obvious' solution might be wrong; TDD is more correct because tests catch all bugs."
            - "TDD is a religious commitment — the question isn't worth answering."
          correct_index: 0
          option_feedback:
            1: "Speed-by-parallelism is a fabricated technical justification. Pytest parallelism (with `pytest-xdist`) saves seconds on large suites — nowhere near the order of magnitude that would make TDD net-faster than typing. The argument has to stand on *durable design value*, not on runtime tricks."
            2: "Tests don't catch all bugs. Cycle 7 of this tutorial (the hidden six-1s bug) showed a defect surviving four cycles of green tests. The honest claim is that tests catch the behaviors they actually check, which is narrower than \"all bugs\" and still enormously valuable for regression."
            3: "Dismissing the question avoids the engineering tradeoff. TDD's case is empirical (Microsoft/IBM, Erdogmus, Janzen & Saiedian — all measured studies), not faith-based. A teammate who hears \"it's a religion\" walks away thinking the practice has no defense; that's the opposite of what the evidence supports."
          explanation: |
            The honest answer combines two things: (a) for *small* problems with experienced devs, the time cost of TDD is roughly the same as ad-hoc coding — the same number of tests get written either way, just in a different order; (b) the *durable* benefit is the test suite as a regression net plus the rhythm of small steps preventing speculative complexity. On a toy, the gain is small. On long-lived code modified by multiple people it's the difference between a 39–91% drop in pre-release defects (Microsoft/IBM, Williams et al. 2008) and not. TDD isn't a religion — it's a tradeoff with strong empirical evidence in specific contexts (long-lived, multi-author, behavior-rich domains). FizzBuzz lets you *practice* the rhythm cheaply, where the stakes are low.

        - question: |
            Compare doing FizzBuzz now to what doing it *before* the Dragon Dice tutorial would have been like. What's the most likely difference?
          type: single
          options:
            - "**You no longer fight the rhythm.** RED-as-success, the discipline of one-test-at-a-time, the patience for two examples before refactoring, the pull of TPP toward simple constants — all of these now feel natural. That's the *residual effect* Janzen & Saiedian (ICSE 2007) measured: programmers who actually practiced TDD prefer it afterward, even ones who initially resisted."
            - "FizzBuzz is harder now because dice scoring uses different syntax than number sequences."
            - "There is no difference. TDD is a procedure; anyone can follow the steps once they're listed."
            - "FizzBuzz is now slower because the Dragon-Dice habits (`@dataclass`, `Counter`) don't apply here."
          correct_index: 0
          option_feedback:
            1: "Inverts the transfer claim. Familiarity *with the rhythm* is what should make the second problem easier — even when the *domain* is unrelated. If FizzBuzz felt harder, you might be transferring *Dragon-Dice tools* (looking for a `Counter` use that isn't there) instead of *the rhythm*. Notice the difference; the rhythm is what transfers."
            2: "TDD-as-procedure underestimates what changed. Anyone *can* follow the steps once listed — but doing it *naturally*, with the right pacing and the right small-step instinct, is a different skill. Janzen & Saiedian's measured residual effect is exactly the gap between \"can follow\" and \"prefers,\" and it only appears after lived practice."
            3: "Over-transferring tools to a new domain is a real risk, but slowness from \"`@dataclass` doesn't apply\" misframes the issue: those tools were *never the lesson*. The lesson is the rhythm; the tools were Dragon-Dice-specific. If FizzBuzz felt slow, look at *which* habit you tried to carry over — odds are it was a Dragon-Dice tool, not the cycle structure."
          explanation: |
            The Janzen & Saiedian study (230+ programmers): the *residual effect* of having actually practiced TDD is preference for it afterward — not because it was preached, but because the rhythm came to feel natural. A FizzBuzz attempt today should feel categorically different from a same-instructions attempt before this tutorial: not just because you know what to type, but because the *rhythm itself* — pause for the test, allow the ugly first GREEN, wait for two examples — now has a felt naturalness. **That felt naturalness is the threshold concept stuck in your hands, not just your head.** The Dragon-Dice-specific tools (`@dataclass`, `Counter`) didn't transfer; they were never the lesson. The rhythm transferred — that's the *whole* lesson.


