title: "TDD with pytest — Dragon Dice Battle"
description: "Live the Red-Green-Refactor rhythm by growing a fantasy dice-scoring engine from scratch — twelve tiny tests, one design pressure at a time, plus a final transfer cycle (FizzBuzz) that proves the rhythm carries to a brand-new problem. Tests drive design, refactors stay safe, and the rules of the game emerge as code."

backend: pyodide
debugger: true
pytest: true

# Show code (left) and tests (right) side by side. Files prefixed `test_`
# auto-route to the right pane; `scorer.py` lands on the left.
editor_split: true

# Compact output panel — most action is in the editors. The strip below the
# editors is just for skimming pytest's pass/fail summary.
output_height: "25%"

require_tests: true
autosave_type: files

# Live git visualization next to the editor — students can switch to the Git
# Graph view at any time and commit each Red-Green-Refactor step to watch the
# DAG grow. The embedded terminal accepts a small set of git commands.
git_graph: /tutorial
git_setup:
  - "git config user.name 'Student'"
  - "git config user.email 'student@example.com'"

# Global setup: install pytest, expose /tutorial on sys.path, and patch the
# pytest module cache so each `pytest.main(...)` call sees the latest source
# rather than a stale import. The module name list MUST include every project
# module the student edits — `scorer` for cycles 1-12, `fizzbuzz` for the
# transfer cycle.
setup_commands:
  - "import pyodide_js; await pyodide_js.loadPackage('pytest')"
  - "import sys; sys.path.insert(0, '/tutorial')"
  - |
    import pytest as _pytest, sys as _sys
    def _make_pytest_patch():
        _orig = _pytest.main
        _sysmod = _sys
        def _patched(*a, **kw):
            for m in list(_sysmod.modules):
                if m.startswith('test_') or m in ('scorer', 'fizzbuzz'):
                    del _sysmod.modules[m]
            return _orig(*a, **kw)
        return _patched
    _pytest.main = _make_pytest_patch()

steps:

  # ==========================================================================
  # CYCLE 1 — Empty roll creates an empty battle report
  #
  # The first cycle is split into THREE separate tutorial steps so that
  # students live each phase of Red-Green-Refactor as a distinct moment, not
  # a slogan. No quiz appears until after the REFACTOR step — the goal here
  # is to *feel* the rhythm before being asked to reason about it.
  # ==========================================================================

  # --------------------------------------------------------------------------
  # STEP 1 — Cycle 1 RED: write the failing test
  # Pedagogy:
  #   Worked example      — the test is given; student types it and runs.
  #   PRIMM (Predict)     — student predicts what failure they will see.
  #   Threshold concept   — TDD is design, not verification (set up here).
  #   Cognitive load      — only ONE moving part: the test. No code yet.
  #   Misconception fix   — "failing test = bad test" is named and refuted.
  # --------------------------------------------------------------------------
  - title: "Cycle 1 — RED: Write the Failing Test"
    instructions: |
      > **Prerequisite:** [Testing Foundations](/SEBook/tools/testing-foundations-tutorial) — pytest discovery, `assert`, partitions, behavior-not-implementation. If those feel new, do that one first.

      ## What you're building — *Dragon Dice*

      **Dragon Dice** is a (fictional) tabletop combat game. The mechanic is simple: a player rolls a handful of six-sided dice, and certain face values and combinations trigger named *combat events* — *Dragon Flame*, *Lightning Spark*, *Goblin Swarm*, and so on — each worth a damage number. A turn's roll is just a Python list of dice values, e.g. `[1, 1, 1, 1, 5]`.

      Two kinds of scoring happen on every roll:

      - **Singles** — a `1` becomes one *Dragon Flame* (100 damage); a `5` becomes one *Lightning Spark* (50). Other face values, on their own, score nothing.
      - **Triples (combos)** — three matching dice trigger a bigger event that *consumes* its dice. Three 1s become **one** *Dragon Blast* (1000) instead of three Dragon Flames; three 2s become a *Goblin Swarm*; and so on. Whatever the combos don't consume keeps scoring as singles, so `[1, 1, 1, 1, 5]` produces *one* Dragon Blast (consuming three 1s) **plus** a leftover Dragon Flame **plus** a Lightning Spark — for 1150 total damage. The full ruleset is in the table further down.

      Your goal across the twelve Dragon-Dice cycles is to grow a `score(dice)` function that turns any roll into a `BattleReport` — its `total_damage` and the ordered tuple of `ScoringEvent`s it produced. **You will not look at the full ruleset and write it all at once.** TDD adds **one rule at a time**, each one earned by a test that demands it. After cycle 12 a thirteenth *transfer* cycle reapplies the same rhythm to a totally unrelated problem (FizzBuzz), as proof the discipline carries beyond this domain.

      ## Test-Driven Development in one minute

      TDD is a **design** technique that uses tests as the medium of pressure. You write code in short cycles of three phases:

      | Phase | What you do | Why this phase exists |
      |---|---|---|
      | 🔴 **RED** | Write **one** failing test that names a behavior you want | Forces the interface and expected behavior to be decided *before* any logic exists |
      | 🟢 **GREEN** | Write the **smallest** code that makes the test pass | Resists speculative design; only build what a test demands |
      | 🔵 **REFACTOR** | Improve the code while all tests stay green | The safety net lets you reshape structure without fear of regression |

      Each phase of cycle 1 is its own tutorial step so the rhythm becomes a *felt sequence*, not a slogan. From cycle 2 onward, each cycle is one step containing all three phases.

      ## Why a *failing* test is the goal of RED

      A failing test is **not a bug** — RED is the expected starting state of every cycle. But the failure has to come from the *behavior under test*, not from a typo:

      - **Right reason** — `ImportError`, `AttributeError`, a value-mismatch on the assertion you wrote. The test correctly says *"this behavior does not exist yet."*
      - **Wrong reason** — `SyntaxError`, missing colon, misspelled `test_` prefix. The test never ran. You've learned nothing about the unit, only about your typing.

      Students commonly delete a failing test to make the bar green. We're leaning into that discomfort instead. **Learning to read the failure** is what TDD trains.

      <details markdown="1"><summary>🤔 But why <em>test-first</em>? Why not just write the code, then test it?</summary>

      The honest answer: most developers' instinct is to write the code first. *That* is the habit TDD is replacing — and it deserves a real argument, not just a style claim.

      **A small concrete scenario.** Suppose you skip the test and just write `score()` directly. You're confident it's right; you eyeball-check it in a REPL with `score([1])` and `score([1, 5])`, see plausible numbers, ship. Two weeks later your teammate adds a `triple 1s = Dragon Blast` rule by inserting an `elif` branch that *fires before* the per-die loop. The `elif` only matches *exactly* `[1, 1, 1]`; rolls like `[1, 1, 1, 5]` silently fall through and score wrong.

      *With* a test-first cycle, the `triple 1s` test would have run against an empty `score()` and forced the question "what does the spec say happens with leftover singles?" *before* the elif was written. Without the test, the bug ships and surfaces only when a player notices their score is off — if they notice at all.

      **The general pattern.** Code-first writes a function and *then* asks "what should it do?" Test-first writes a behavioral commitment and *then* asks "what's the simplest code that delivers that?" The first habit lets implementation choices smuggle themselves into your sense of what the spec was. The second prevents that — the spec is on disk, in code, before any implementation can pollute it. (Janzen & Saiedian's ICSE 2007 study of 230+ programmers: even programmers who tried test-first once kept reverting to code-first afterward; the habit is *that* sticky. Naming it here, so you can notice it in yourself, is half the work.)

      So you might still resist test-first today. Notice the resistance. The goal of these twelve cycles is to give you the *felt experience* of small-step rhythm — after which you'll be choosing test-first because it works, not because we said so. (And per Fucci et al. 2017: even if you sometimes write the code an instant before the test, the *granularity* and *rhythm* are where TDD's measured benefits come from. So don't worry about being a purist; worry about being incremental.)
      </details>

      ## The shape of every pytest test

      Every pytest test you write has the same four-part structure:

      | Part | What it does |
      |---|---|
      | **Import** the unit under test | Tells Python what code you'll call |
      | **Define** a function whose name starts with `test_` | pytest only discovers functions matching this pattern |
      | **Arrange + act** | Set up any input and call the unit |
      | **Assert** an observable property of the result | Pin down one thing the spec promises |

      The pattern generalises; the *specifics* (what to import, call, and assert) come from the spec — and only from the spec.

      ## The dragon dice rules (reference for all 12 cycles)

      | Roll | Event | Damage |
      |------|-------|--------|
      | Single 1 | Dragon Flame | 100 |
      | Single 5 | Lightning Spark | 50 |
      | Triple 1 | Dragon Blast | 1000 |
      | Triple 2 | Goblin Swarm | 200 |
      | Triple 3 | Orc Charge | 300 |
      | Triple 4 | Troll Smash | 400 |
      | Triple 5 | Lightning Storm | 500 |
      | Triple 6 | Demon Strike | 600 |

      Triples consume three dice; leftover 1s and 5s still score as singles. Dice are integers 1–6. **Today you implement only the empty-roll case.** Eleven more cycles add the rest, and a final **transfer cycle** (a different problem entirely) proves the rhythm carries.

      ## Your test list (Canon TDD step 1)

      Kent Beck's *Canon TDD* (December 2023) starts with **a written list of behaviors you want the code to have** — *before* writing any tests. The list isn't a contract; it's a thinking tool. New behaviors get appended as they occur to you; ones you finish get struck through; ones that turn out to be already-implemented (cycle 5, cycle 7) get a checkmark with no code change.

      Here are the first three items, *in the order the cycles will tackle them*:

      - ☐ Cycle 1 — Empty roll → no damage, no events
      - ☐ Cycle 2 — A single 1 → one Dragon Flame event
      - ☐ Cycle 3 — A single 5 → one Lightning Spark event
      - ☐ Cycle 4 — …

      More items appear as we work through them — Beck's discipline is to *not* pre-resolve them all. Pick the next item, turn *only that one* into a runnable test, make it pass, optionally refactor, repeat. He warns explicitly against converting every list item up front ("leads to rework and depression") and against mixing refactor into making a test pass ("wearing two hats simultaneously"). The platform's step-by-step structure enforces both disciplines for you.

      ## Cycle 1's spec

      > **An empty roll produces a battle report with zero damage and no events.**

      That sentence names everything you need: a function `score`, a return value with `total_damage` and `events` attributes. Translate it into a pytest test using the four-part shape.

      ## Your task

      1. In **`test_scorer.py`** (right pane), fill in the three sub-goal comments. Leave **`scorer.py`** empty — its code belongs to the GREEN step.
      2. **Predict** the *category* of failure you'll see — `ImportError`, `AttributeError`, or `AssertionError`? Write it down.
      3. Click **Run**. Compare the actual failure to your prediction.

      <details markdown="1"><summary>Reveal — what we expected (open after running)</summary>

      `ImportError: cannot import name 'score'` (or `ModuleNotFoundError` if `scorer.py` is empty). **That IS the deliverable** — RED for the right reason.
      </details>

      <details markdown="1"><summary>Why `()` and not `[]`? (open if you wondered)</summary>

      Tuples are immutable — they can't be mutated by accident, and they're safe dataclass defaults (cycle 2 uses that). Every test in this tutorial that pins down events uses a tuple.
      </details>

      <details markdown="1"><summary>📚 References</summary>

      - [pytest — Get started](https://docs.pytest.org/en/stable/getting-started.html)
      - [Python — `assert` statement](https://docs.python.org/3/reference/simple_stmts.html#the-assert-statement)
      - If you get stuck on the test, click **Show Solution** below the editor for one possible form.
      </details>

      <details markdown="1"><summary>🪞 Self-check (open after running, answer from memory)</summary>

      - What two pieces of information does pytest's failure message give you? *(Discriminator: it names which test failed AND on which assertion the values diverged. If you said "pass or fail," you were thinking of the bar, not the message.)*
      - Why is "RED for the right reason" worth distinguishing from "RED for any reason"? *(Discriminator: a `SyntaxError` proves nothing about the unit; an `ImportError` proves the unit is missing.)*
      - If you had to write a test for a `multiply(a, b)` function from scratch, what four parts would it contain? *(Import • test_ function • arrange+act • assert.)*
      </details>

    files:
      - path: "scorer.py"
        content: |
