  # --------------------------------------------------------------------------
  - title: "The Big Picture"
    instructions: |
      > **Learning objective:** After this step you will be able to **evaluate** when TDD is appropriate, **identify** common TDD anti-patterns, and **articulate** the key principles you learned.

      ## When TDD Shines

      TDD is most valuable when:
      - Building **new features** with clear behavioral requirements
      - Working with **complex logic** (validation, calculation, state machines)
      - Designing **APIs and interfaces** — the test forces you to think from the caller's perspective
      - Working on a **team** — tests document expected behavior for other developers

      ## When TDD is Overkill

      TDD is less useful for:
      - **One-off scripts** — quick data transformations you will use once
      - **Exploratory prototyping** — when you are still figuring out the problem
      - **UI layout code** — visual correctness is hard to assert programmatically

      Even in these cases, *some* tests are almost always valuable. The question is whether to write them *first*.

      ## The Residual Effect

      Research shows that students who learn TDD properly continue to write **significantly more tests** in future projects, even when not explicitly asked to. TDD doesn't just teach testing — it permanently shifts how you think about code quality.

      ## Key Takeaways

      1. **TDD is a design technique**, not a testing technique — tests are a valuable byproduct
      2. **Red-Green-Refactor** — one test at a time, cycling every 2–5 minutes
      3. **Test behavior, not implementation** — if refactoring breaks tests, the tests are brittle
      4. **Listen to the test** — difficulty writing a test is diagnostic feedback about your design
      5. **The ratchet** — each passing test locks in progress permanently

      ## What's Next

      This tutorial covered the fundamentals. In more advanced TDD work, you will encounter:
      - **`@pytest.mark.parametrize`** — test multiple inputs without duplicate test functions
      - **Fixtures** — reusable test setup with `@pytest.fixture`
      - **Mocking** — isolate code from external dependencies (databases, APIs)
      - **The Double Loop** — outer acceptance tests + inner unit tests (from "Obey the Testing Goat")

      ### Final Exercise: Diagnose This Test Suite

      Open `test_diagnose.py`. It contains a test suite written by a junior developer. Read each test and identify which TDD principle it violates (if any). Add a `# VERDICT:` comment to each test function explaining your analysis. This is not graded — it is a reflection exercise.

    files:
      - path: "test_diagnose.py"
        content: |
          """Diagnose: Which principles does each test violate (if any)?"""
          import pytest


          # --- Test 1 ---
          def test_login_system():
              """Tests login, logout, session, and password reset all in one."""
              user = {"username": "alice", "password": "Secret1"}
              assert authenticate(user["username"], user["password"]) == True
              assert create_session(user["username"]) is not None
              assert logout(user["username"]) == True
              assert reset_password(user["username"], "NewSecret1") == True
              # VERDICT: (your analysis here)


          # --- Test 2 ---
          def test_add_returns_sum():
              assert add(2, 3) == 5
              # VERDICT: (your analysis here)


          # --- Test 3 ---
          def test_user_internals():
              user = User("Bob")
              assert user._internal_id is not None
              assert user._created_at is not None
              # VERDICT: (your analysis here)


          # --- Test 4 ---
          def test_divide_by_zero():
              result = safe_divide(10, 0)
              assert result is None
              # VERDICT: (your analysis here)
        language: "python"

    quiz:
      title: "The Big Picture — Knowledge Check"
      min_score: 0.67
      shuffle: true
      questions:

        - question: |
            **Evaluate:** For which scenario is TDD **most** beneficial?
          type: single
          options:
            - "Writing a quick one-off script to rename 100 files"
            - "Implementing a payment processing module with complex validation rules that must be correct"
            - "Experimenting with a new plotting library to see what it can do"
            - "Writing CSS for a landing page"
          correct_index: 1
          explanation: |
            Payment processing has complex logic, strict correctness requirements, and is
            modified by multiple developers over time. TDD excels here because the tests
            specify exact behavior and prevent regressions. The other scenarios are either
            too exploratory or too visual for TDD to add significant value.

        - question: |
            A student's test file contains a single function with 20 assertions testing five different behaviors. Another student has five functions with four assertions each. Which approach is better, and why?
          type: single
          options:
            - "The single function — fewer functions means less code"
            - "Five functions — each test function isolates one behavior, so when a test fails you immediately know which behavior is broken. The single function stops at the first failure, hiding the rest"
            - "Both are equivalent"
            - "Neither — 20 assertions is too many in total"
          correct_index: 1
          explanation: |
            Test isolation is a core TDD principle. One test function = one behavior = one
            potential failure point. When `test_valid_password` fails but `test_missing_digit`
            passes, you know exactly where the problem is. A monolithic test function hides
            this information behind the first failure.

        - question: |
            **(Anti-pattern identification)** A developer writes this test:
            ```python
            def test_user_creation():
                user = User("Alice", "alice@example.com")
                assert user._name == "Alice"
                assert user._email == "alice@example.com"
                assert user._id is not None
            ```
            What anti-pattern is present?
          type: single
          options:
            - "The test is too short"
            - "The test accesses private attributes (`_name`, `_email`, `_id`) — it is testing implementation details instead of public behavior. If the internal field names change, this test breaks even though the User class works correctly"
            - "The test does not use pytest.fixture"
            - "The test should use assertEqual instead of assert"
          correct_index: 1
          explanation: |
            This is the "Nitpicker" anti-pattern. The test is coupled to the internal
            representation (private attributes) rather than the public interface. A robust
            test would check `user.name` (public property) or `str(user)` or whatever the
            class exposes publicly. Internal details should be free to change without breaking tests.

        - question: |
            **(Spaced review — Step 3)** A teammate says *"TDD is just a testing technique."* What is the key correction?
          type: single
          options:
            - "TDD is a design technique — writing the test first forces you to define the interface and expected behavior before implementation"
            - "TDD is a debugging technique"
            - "TDD is a documentation technique"
            - "TDD is a refactoring technique"
          correct_index: 0
          explanation: |
            The threshold concept of TDD: it is fundamentally a design technique.
            Writing the test first forces you to answer design questions (what is the interface?
            what is the expected behavior?) before writing any implementation code.
            The tests themselves are a valuable byproduct of this design process.
