    quiz:
      title: "Final Quiz"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            Which **single** statement most accurately captures TDD?
          type: single
          options:
            - "A way to achieve 100% line coverage without writing extra tests later"
            - "A *design discipline* where tests drive the structure of production code; the test suite is a valuable byproduct"
            - "A workflow optimisation that ships features faster than test-after development"
            - "A coverage technique ensuring every line is exercised before release"
          correct_index: 1
          option_feedback:
            0: "TDD does not primarily target coverage; coverage is a side effect. A line written under test pressure usually does end up covered, but framing TDD as a coverage technique inverts the causation and misses the design role tests play."
            2: "Speed-of-shipping isn't the case for TDD on small features (initial development is 15–35% *slower* per Microsoft/IBM). The case is on **long-lived code with multiple authors**, where the regression net pays back many-fold. \"Faster shipping\" oversells; the honest claim is *defect reduction over time*."
            3: "This frames the same issue around coverage from a different angle. The lesson the tutorial built across 12+1 cycles is design pressure, not coverage. Cycle 10 specifically showed how 100%-covered code can still be wrong."
          explanation: |
            The threshold concept of the tutorial: TDD is design, not testing. Cycle 8's
            rule-object refactor *emerged* under cycle-8's test pressure, not from a
            whiteboard. The test suite is a (valuable) byproduct.

        - question: |
            **For which scenario is TDD most beneficial?**
          type: single
          options:
            - "A 25-line one-off file-renaming script run once and discarded"
            - "A new payment-processing module: complex validation, multi-developer code, high cost of regression"
            - "A Jupyter notebook exploring a new dataset"
            - "Hand-written CSS for a landing page judged visually"
          correct_index: 1
          option_feedback:
            0: "**TDD-everywhere overcorrection.** Beck himself said \"the discipline of working strictly test-first is valuable but not necessarily something you want to do all the time.\" One-shot scripts have low cost of failure and short life — TDD's payoff (regression net, multi-author safety) doesn't materialise."
            2: "**Notebook misfit.** Exploratory data analysis is *defining the problem*; you can't write a test for a behavior you haven't decided on. TDD assumes the spec is at least partially knowable. Notebooks live before that assumption holds."
            3: "**Visual-correctness misfit.** CSS layouts are judged by humans looking at pixels. Automated assertions on visual correctness are notoriously brittle (screenshot-diff testing exists but is fragile). TDD applies to behavior describable in code; visual judgment isn't."
          explanation: |
            Payment processing has every property TDD rewards: complex logic, strict
            correctness, multiple developers, long life. Microsoft/IBM measured 39–91%
            defect-density reductions exactly here.

        - question: |
            A test file contains:
            ```python
            def test_user_creation():
                user = User("Alice", "alice@example.com")
                assert user._name == "Alice"
                assert user._email == "alice@example.com"
            ```
            Which anti-pattern is present?
          type: single
          options:
            - "*Excessive Setup* — too many asserts"
            - "*The Nitpicker* — asserts on private attributes (`_name`, `_email`), coupling the test to implementation details"
            - "*The Mockery* — the test verifies the User constructor"
            - "*Skip-the-Refactor* — the cycle's REFACTOR phase was never entered, so the test was never tightened"
          correct_index: 1
          option_feedback:
            0: "**Definition mismatch.** Excessive Setup is about *Arrange* code dominating the test (30+ lines of fixture before one assertion); two assertions is normal. The smell here is *which* attributes the assertions touch, not *how many* there are."
            2: "**Mockery misclassification.** The Mockery is about over-mocking (more mock setup than test logic). This test uses a real `User` instance with no mocks at all. The smell here is the leading-underscore reach into private state."
            3: "**Smell-of-process versus smell-of-test.** Skip-the-Refactor is a *workflow* smell — \"the author never entered REFACTOR\" — and as a diagnosis it's unfalsifiable from the test code alone (you'd need to see the author's process). The smell *visible in this snippet* is a *test-design* problem: assertions on private attributes (`_name`, `_email`). That's the Nitpicker."
          explanation: |
            *The Nitpicker.* Leading underscores signal "private — implementation detail."
            Tests that touch private state break on every refactor. Assert on observable
            behavior via the public API.

        - question: |
            The "one Dragon Blast for any count ≥ 3" bug lived in cycles 6–10. Why didn't *line coverage* catch it?
          type: single
          options:
            - "Coverage caught it; pytest ignored the warning"
            - "Coverage measures which *lines ran*, not whether the line is correct *for all relevant inputs*. The concept that catches it is **boundary thinking** — probing inputs at `exactly N`, `2N`, between, etc."
            - "Coverage requires the `--strict` flag we didn't enable"
            - "Coverage can't measure exception-raising code"
          correct_index: 1
          option_feedback:
            0: "Coverage tools don't \"catch bugs\" — they measure which lines were exercised. There's no \"warning\" to ignore. The bug went undetected because no test gave the buggy line an *input that would trigger the wrong output*, not because pytest filtered something out."
            2: "There's no `--strict` mode for coverage that would have caught this. Even 100% line + branch + path coverage would have missed cycle-10's bug, because *every line ran* on every prior test — the *input space* is what the suite under-explored, and no coverage flag changes that."
            3: "Coverage tools do measure exception code; that's not the limit at issue. The actual limit is conceptual: coverage measures *line execution*, not *correctness across the input space*. That's why boundary thinking complements coverage rather than being subsumed by it."
          explanation: |
            Coverage tells you the line *ran*, not that it was *right*. Every prior combo
            test used exactly `count` dice; nothing probed `2 × count`. Boundary thinking
            is the discipline that catches it. Coverage is a *locator of under-tested
            code*, not a measure of correctness.

        - question: |
            **(Bloom's Create — design a test list from a spec.)** A teammate hands you this spec for a function `is_valid_password(password: str) -> bool`:

            > Returns `True` iff **all** of these hold: length is at least 8 *and* at most 64; contains at least one digit (`0`–`9`); contains at least one symbol from `!@#$%`; otherwise returns `False`. The empty string is invalid.

            Apply Canon TDD step 1 — **write a test list, in the order you'd implement it**. Which list below best honours TDD discipline (simplest-first, boundary-aware, behavior-named)?
          type: single
          options:
            - "(1) test_long_string_with_digit_and_symbol_is_valid (2) test_short_string_is_invalid (3) test_no_digit_is_invalid (4) test_no_symbol_is_invalid (5) test_length_8_with_digit_and_symbol_is_valid (6) test_length_7_with_digit_and_symbol_is_invalid (7) test_length_64_with_digit_and_symbol_is_valid (8) test_length_65_is_invalid (9) test_empty_string_is_invalid"
            - "Just one parametrized test that tries 50 random strings and checks `is_valid_password` returns the right answer for each."
            - "(1) test_returns_a_bool (2) test_handles_unicode (3) test_is_thread_safe (4) test_is_not_None (5) test_does_not_raise"
            - "(1) test_password_validation — all the rules in one test with multiple assertions covering length, digit, symbol, and empty-string cases."
          correct_index: 0
          option_feedback:
            1: "Random testing belongs more naturally to property-based testing; Hypothesis is great for that. It does not substitute for a behaviorally named test list. With 50 random strings there is no record of which behaviors are pinned down, no boundary discipline, and no readable test names that double as documentation; the boundary `len == 8` may even be missed by chance."
            2: "None of these tests come from the password spec; they check ambient properties like `is not None` and `returns a bool`. \"Returns a bool\" is implicit in the type annotation, and `is not None` passes for almost any non-None return. The test list must come from the rules the function implements, not from generic Python-correctness checks."
            3: "One test asserting all four rules at once is exactly the Giant antipattern from the Step 16 taxonomy. When it fails, it is hard to tell which rule is broken, and the failure message has to cover every assertion. The TDD discipline is one test per behavior, so the test name itself documents which rule that test pins down."
          explanation: |
            **Why option A wins**: it follows the same shape as Dragon Dice's twelve cycles —
            simplest case first (typical valid input), then *each rule rejected* in isolation
            (no digit, no symbol, too short), then *boundaries on the length range* (7 invalid,
            8 valid, 64 valid, 65 invalid — the same `>` vs `>=` discipline as cycle 1's
            grade bug), then the *empty-string* edge. Each test name reads like a one-line
            bug report. Notice how the boundary-pair pattern (7/8 and 64/65) matches the
            cycle-3 lesson on partition transitions.

            **Why this is a Bloom's Create item, not Apply**: there's no single canonical
            answer (your *exact* ordering may differ, e.g., empty-string first as the
            simplest-of-all). The skill being tested is *generating* a structured plan from
            a spec — the same skill you'll use on every function you TDD outside this
            tutorial. The four candidate lists above contrast different wrong-answer patterns:
            random-instead-of-systematic, wrong-rules, and the Giant antipattern.

            If you found yourself drafting your own list before scrolling to the options —
            even better. That's exactly Canon TDD step 1 in your hands.

