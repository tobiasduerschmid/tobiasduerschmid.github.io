    quiz:
      title: "Transfer Cycle — Did the Rhythm Carry?"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            FizzBuzz's `multiple of 15` test most directly parallels which Dragon-Dice cycle — and why?
          type: single
          options:
            - "Cycle 6 (Triple 1s = Dragon Blast). Both are *design-breaking tests* — the simplest code that passed earlier tests cannot be tweaked locally to satisfy the new test; the structure has to acknowledge a combined case before earlier cases."
            - "Cycle 1 (Empty roll). Both are the simplest case anyone could write."
            - "Cycle 11 (Invalid dice). Both involve special-case error handling."
            - "Cycle 12 (Summary). Both produce formatted string output."
          correct_index: 0
          option_feedback:
            1: "Cycle 1 was the *simplest* case (the empty input), not a structural pivot. FizzBuzz's empty-list test (`fizzbuzz(0) == []`) is the cycle-1 parallel — but `multiple of 15` is structurally hard, not trivially simple. The match here is on *structural pressure*, not on \"first cycle of the tutorial.\""
            2: "Cycle 11 is about robustness (raise on bad input). FizzBuzz's `multiple of 15` doesn't raise; it returns a *correct value the prior code couldn't produce*. That's a different kind of design moment — error handling versus structural restructuring."
            3: "Cycle 12 was about *adding behavior to the existing object* (a `summary()` method). FizzBuzz's `% 15` test isn't about adding a new method; it's about the previous code being structurally unable to produce the right answer for an input it already accepts."
          explanation: |
            Cycle 6 is the right parallel. The signature of a design-breaking test: previous cycles produced code that looks correct, but the *new* test cannot be satisfied by a local edit — the structure has to change. For Dragon Dice that meant moving from per-die iteration to count-then-emit. For FizzBuzz that meant either reordering the conditionals (so `% 15` is checked first) or switching to a compositional string builder. Either way, the existing structure had to accept a behavior the previous tests didn't anticipate. **That feeling — "I can't tweak this; I have to restructure" — is a TDD rhythm invariant, not a Dragon-Dice quirk.**

        - question: |
            A teammate, who has never done TDD, pushes back: *"FizzBuzz is just trivia — the real work is the algorithm. Why did you spend 12 minutes on the cycles instead of 30 seconds typing the obvious solution?"* Pick the strongest reply.
          type: single
          options:
            - "**On a one-shot toy problem the time is comparable, but the cycles produced a regression-proof test suite and a record of every design choice.** The 'obvious' solution often hides the design-breaking moment (FizzBuzz at 15) until a refactor exposes it later — at which point there's no test to catch the slip. Erdogmus et al. (2005) found test-first students wrote *more* tests AND were *more* productive per test."
            - "TDD is faster than typing the obvious solution because pytest's parallelism speeds up small test runs."
            - "The 'obvious' solution might be wrong; TDD is more correct because tests catch all bugs."
            - "TDD is a religious commitment — the question isn't worth answering."
          correct_index: 0
          option_feedback:
            1: "Speed-by-parallelism is a fabricated technical justification. Pytest parallelism (with `pytest-xdist`) saves seconds on large suites — nowhere near the order of magnitude that would make TDD net-faster than typing. The argument has to stand on *durable design value*, not on runtime tricks."
            2: "Tests don't catch all bugs. Cycle 10 of this tutorial showed a defect surviving four cycles of green tests. The honest claim is that tests catch the behaviors they actually check, which is narrower than \"all bugs\" and still enormously valuable for regression."
            3: "Dismissing the question avoids the engineering tradeoff. TDD's case is empirical (Microsoft/IBM, Erdogmus, Janzen & Saiedian — all measured studies), not faith-based. A teammate who hears \"it's a religion\" walks away thinking the practice has no defense; that's the opposite of what the evidence supports."
          explanation: |
            The honest answer combines two things: (a) for *small* problems with experienced devs, the time cost of TDD is roughly the same as ad-hoc coding — the same number of tests get written either way, just in a different order; (b) the *durable* benefit is the test suite as a regression net plus the rhythm of small steps preventing speculative complexity. On a toy, the gain is small. On long-lived code modified by multiple people it's the difference between a 39–91% drop in pre-release defects (Microsoft/IBM, Williams et al. 2008) and not. TDD isn't a religion — it's a tradeoff with strong empirical evidence in specific contexts (long-lived, multi-author, behavior-rich domains). FizzBuzz lets you *practice* the rhythm cheaply, where the stakes are low.

        - question: |
            Compare doing FizzBuzz now to what doing it *before* the Dragon Dice tutorial would have been like. What's the most likely difference?
          type: single
          options:
            - "**You no longer fight the rhythm.** RED-as-success, the discipline of one-test-at-a-time, the patience for two examples before refactoring, the pull of TPP toward simple constants — all of these now feel natural. That's the *residual effect* Janzen & Saiedian (ICSE 2007) measured: programmers who actually practiced TDD prefer it afterward, even ones who initially resisted."
            - "FizzBuzz is harder now because dice scoring uses different syntax than number sequences."
            - "There is no difference. TDD is a procedure; anyone can follow the steps once they're listed."
            - "FizzBuzz is now slower because the Dragon-Dice habits (`@dataclass`, `Counter`) don't apply here."
          correct_index: 0
          option_feedback:
            1: "Inverts the transfer claim. Familiarity *with the rhythm* is what should make the second problem easier — even when the *domain* is unrelated. If FizzBuzz felt harder, you might be transferring *Dragon-Dice tools* (looking for a `Counter` use that isn't there) instead of *the rhythm*. Notice the difference; the rhythm is what transfers."
            2: "TDD-as-procedure underestimates what changed. Anyone *can* follow the steps once listed — but doing it *naturally*, with the right pacing and the right small-step instinct, is a different skill. Janzen & Saiedian's measured residual effect is exactly the gap between \"can follow\" and \"prefers,\" and it only appears after lived practice."
            3: "Over-transferring tools to a new domain is a real risk, but slowness from \"`@dataclass` doesn't apply\" misframes the issue: those tools were *never the lesson*. The lesson is the rhythm; the tools were Dragon-Dice-specific. If FizzBuzz felt slow, look at *which* habit you tried to carry over — odds are it was a Dragon-Dice tool, not the cycle structure."
          explanation: |
            The Janzen & Saiedian study (230+ programmers): the *residual effect* of having actually practiced TDD is preference for it afterward — not because it was preached, but because the rhythm came to feel natural. A FizzBuzz attempt today should feel categorically different from a same-instructions attempt before this tutorial: not just because you know what to type, but because the *rhythm itself* — pause for the test, allow the ugly first GREEN, wait for two examples — now has a felt naturalness. **That felt naturalness is the threshold concept stuck in your hands, not just your head.** The Dragon-Dice-specific tools (`@dataclass`, `Counter`) didn't transfer; they were never the lesson. The rhythm transferred — that's the *whole* lesson.


