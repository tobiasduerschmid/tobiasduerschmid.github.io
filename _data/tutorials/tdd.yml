          type: single
          options:
            - "**Two examples are the minimum to see the shape of an abstraction.** With one (Dragon Blast alone), any abstraction is a guess. With three or more, the duplication has metastasised and the refactor is risky. Two is the sweet spot — *refactor toward duplication, not before it, and not after it has rotted.*"
            - "Refactoring earlier would have made the test fail, breaking the discipline."
            - "Python's `dataclass` decorator can only be introduced after at least two `dataclass`es exist."
            - "Cycle 8 was where the YAML scaffold provided `ComboRule`; the timing is arbitrary."
          correct_index: 0
          option_feedback:
            1: "Refactoring at cycle 6 wouldn't have *broken* tests — refactor on green is always safe. The reason against early refactor isn't that the test would have failed; it's that you wouldn't have known *which* abstraction to extract with only one example to look at."
            2: "There's no Python rule like that — you can put `@dataclass` on any class. (And confusing language mechanics with design timing is the same category error from earlier questions.) The real constraint is *epistemic*: you can't see a pattern with one data point."
            3: "Tutorial-as-arbitrary view dodges the design lesson. The scaffold's timing reflects a real principle: two examples is the minimum for visible commonality. Treating it as a tutorial accident misses the transfer-to-other-projects lesson — *you'll face this same timing question when you're refactoring code outside this tutorial*."
          explanation: |
            This is a hinge insight from cycle 8 — it's worth recalling now precisely *because* cycle 9 just rewarded the timing. One example doesn't show you the shape: any abstraction designed against a single case is speculation. Three or more, and you've paid duplication tax twice or thrice while waiting. Two is the reveal moment. (Kent Beck's *Rule of Three*, popularised by Fowler, is the same idea with one more data point of caution; for *forced abstractions* — where you can't ship without one — two is enough.)

        - question: |
            Which of the following would *most* threaten the OCP property your `score()` function now has?
          type: single
          options:
            - "Adding a new rule type whose `apply()` signature is different from `ComboRule.apply` and `SingleRule.apply` — `score()` would have to learn about the new shape, breaking the closed-for-modification property."
            - "Adding a fifth combo rule with a new die value (e.g., triples of 6) by appending one row to `COMBO_RULES`."
            - "Renaming `Dragon Blast` to `Dragon Burst` in the rule data."
            - "Changing the damage value of an existing rule."
          correct_index: 0
          option_feedback:
            1: "Appending a row is *exactly* the OCP-friendly move. The whole point of cycle 9 was demonstrating that adding rules of the same shape costs nothing in `score()`. This is the case OCP *protects*, not the case that threatens it."
            2: "Renaming a string in the rule data has zero effect on `score()`'s structure. The rule-object pattern is exactly what makes this kind of edit safe — `score()` doesn't care about the human-readable name, only the protocol. (You might break user-visible expectations, but that's a *spec* concern, not an OCP concern.)"
            3: "Changing damage values is data, not structure. `score()` will continue to work without modification because the protocol (\"call apply, get events\") doesn't depend on what's *inside* each rule's fields. OCP is about the dispatch interface, not the rule contents."
          explanation: |
            OCP is a property of **shape contracts**, not of *adding rows*. As long as every rule honors the same `apply(counts) -> list[ScoringEvent]` interface, `score()` stays closed. The moment a new rule type needs different parameters or a different return shape, `score()` has to special-case it — and you're back to editing the function for every new behavior. The interface (the *protocol* `apply` describes) is the load-bearing piece; that's why cycle 8's refactor designed the protocol first, then both `ComboRule` and `SingleRule` conformed to it.


