    quiz:
      title: "Step 7 — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            What makes cycle 5's test a *design-breaking* test, as opposed to a normal "add a branch" test?
          type: single
          options:
            - "Cycle 5's assertion is longer than previous assertions, so the implementation has to grow proportionally to satisfy it"
            - "The per-die loop processes each die in isolation. There is no way for the loop to know, when it sees the first 1, that two more 1s exist later. Counting *requires* a structural shift — not a new branch"
            - "It uses pytest.raises, which forces the implementation to add exception handling"
            - "It tests three dice instead of one or two, and pytest internally requires a different runner for tests that exceed two arguments"
          correct_index: 1
          option_feedback:
            0: "Assertion length isn't the diagnostic. A test can have a one-line assertion and still be design-breaking; another test can be huge but locally satisfiable. The diagnostic is whether the *current structure* can be patched, or whether the structure itself has to change."
            2: "Cycle 5 doesn't use `pytest.raises`. The design-breaking property here has nothing to do with exception handling — it's about per-die iteration vs. per-face counting."
            3: "Pytest has no special runner for any number of dice. This is invented machinery. The structural-pressure phenomenon is about *your code*'s shape, not pytest's internals — those are entirely separate concerns."
          explanation: |
            A *design-breaking* test is one no local edit can satisfy. The cycle-4 loop is
            fundamentally per-die; combos are fundamentally per-face-count. You cannot
            patch your way from one to the other — you have to re-shape the algorithm.
            That re-shaping is what the test extracts as design pressure.

        - question: |
            After the count-then-emit refactor, all five previous tests still passed. What does that tell you about the previous tests?
          type: single
          options:
            - "That they were unnecessary — passing on a totally different implementation means they were not pinning down anything specific"
            - "That they were testing observable behavior (return values), not implementation details (which loop was used). Behavior-level tests survive a structural rewrite; implementation-level tests would have broken"
            - "That pytest silently re-imports the previous implementation if the new one breaks them, so the green bar in this case is misleading"
            - "That the previous tests were duplicates of each other and could be deleted to simplify the suite"
          correct_index: 1
          option_feedback:
            0: "Inverts the meaning. Surviving a structural rewrite is *evidence the tests are well-designed*, not evidence they're useless. The right reading: behavior-level tests are *exactly* the ones you want, and structural rewrites are *exactly* when their value shows up."
            2: "Pytest doesn't import \"the previous implementation\" — it imports whatever's on disk now. The green bar reflects the *new* implementation passing the old behavioral assertions. (If pytest silently swapped implementations, the test suite would be unfalsifiable, which would defeat its entire purpose.)"
            3: "Different tests pin different behaviors (empty roll, single 1, single 5, two-1s). Each is unique evidence. Deletion would shrink the safety net every cycle 5+ refactor relies on. Confusing \"all green\" with \"all redundant\" is a category error — you couldn't *prove* the rewrite preserved each behavior without each test."
          explanation: |
            This is the *Refactoring Litmus Test* concept. Robust tests assert on what the
            unit *does* (`report.total_damage == 100`, `report.events == (event,)`), not
            on *how* it does it (`assert "for die in dice" in inspect.getsource(score)`).
            The first survives a rewrite; the second breaks at the slightest refactor.

        - question: |
            Why does cycle 5's GREEN code subtract from `counts[1]` after emitting the Dragon Blast event?
          type: single
          options:
            - "To avoid an off-by-one error in the next cycle's parametrized tests"
            - "Because a combo *consumes* the dice it uses. If three 1s become a Dragon Blast, those three 1s are no longer available to score as Dragon Flames. The subtraction makes the bookkeeping explicit"
            - "Because Python's Counter requires explicit decrement after every read; otherwise it caches stale values"
            - "It is a stylistic choice — `counts[1] = 0` and `del counts[1]` would also work and produce the same behavior"
          correct_index: 1
          option_feedback:
            0: "The next cycle isn't the reason. Cycle 5's GREEN should be motivated by the *spec* (\"combos consume dice; leftovers score as singles\"), not by speculative future tests. Forward-anticipation is exactly the speculation TDD asks you to avoid."
            2: "Counter has no caching. Reads are pure dict lookups; values aren't stale unless you change them. This invents machinery to explain a code line whose real motivation is *domain semantics*, not a Python quirk."
            3: "These produce *different* behavior at scale. With six 1s, `counts[1] -= 3` after the first Blast leaves 3 for a *second* Blast (that's cycle 7's hidden bug, foreshadowed). `counts[1] = 0` would emit only one Blast and silently drop the second. The difference is the cycle-7 lesson — it's not stylistic at all."
          explanation: |
            "Combos consume dice, leftovers still score as singles" is one of the rules. The
            subtraction isn't a Python quirk — it is the domain rule made explicit in the
            code. The bonus guardrail test you write at the end of this cycle pins down
            exactly this leftover behavior.

        - question: |
            A teammate suggests "let's just add `if Counter(dice)[1] >= 3: ...` at the top of the existing per-die loop." Why is that *not* the same as the count-then-emit refactor we did?
          type: single
          options:
            - "It would still re-walk dice in two different shapes (the loop + the Counter pass), which is a different smell — the code now has two competing models of what the input is, and future combos would multiply the inconsistency"
            - "It would be slightly faster but would produce the same result, so functionally it is equivalent"
            - "It would not work in Python — `Counter` cannot be called inside a `for` loop body"
            - "Pytest would refuse to run it because the test runner forbids mixing iteration styles"
          correct_index: 0
          option_feedback:
            1: "Performance isn't the lesson. Cycle 5's restructuring isn't about speed (it's negligibly different); it's about *which model of the input the code commits to*. Two competing models is the structural smell, regardless of microbenchmarks."
            2: "`Counter` works fine inside loops — it's just a dict subclass. This invents a Python constraint that doesn't exist. The real reason against the hybrid approach is design coherence, not language mechanics."
            3: "Pytest has no opinion on iteration styles. (As with earlier questions, made-up framework rules are a sign you're searching for *external* enforcement of discipline that has to come from your own design judgment.)"
          explanation: |
            The refactor is not "add Counter on top of the existing loop." It is "*replace*
            the per-die view with the per-face-count view." Mixing both is the worst of
            both worlds: now the function maintains two parallel models of the input, and
            every future change has to update both. The structural shift was the point.


