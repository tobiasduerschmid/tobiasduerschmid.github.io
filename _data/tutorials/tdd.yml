          class SingleRule:
              die: int
              name: str
              damage: int

              def apply(self, counts):
                  events = []

                  for _ in range(counts[self.die]):
                      events.append(ScoringEvent(self.name, (self.die,), self.damage))

                  return events


          COMBO_RULES = (
