title: "Design by Contract in Python"
description: "A 75-90 minute Python tutorial for students who have completed Defensive Programming in Python or already know Python functions, classes, exceptions, and basic pytest. You will practice contracts as responsibility allocation: caller preconditions, supplier postconditions, old-state reasoning, invariants, and legal contract strengthening."

# Authoring-time Bloom-verb objectives. Not yet rendered to students.
learning_objectives:
  - "Classify contract failures as caller precondition violations or supplier postcondition violations."
  - "Apply explicit `require` and `ensure` checks to small Python functions."
  - "Write preconditions that reject invalid inputs before computation begins."
  - "Use old-state snapshots to specify exact postconditions for sequence-transforming functions."
  - "Maintain class invariants across construction and state-changing methods."
  - "Evaluate contract changes for substitutability by comparing precondition and postcondition strength."

backend: pyodide
pytest: true
linter: true
editor_split: true
output_height: "25%"
require_tests: true
autosave_type: files

setup_commands:
  - "import pyodide_js; await pyodide_js.loadPackage('pytest')"
  - "import pyodide_js; await pyodide_js.loadPackage('hypothesis')"
  - "import sys; sys.path.insert(0, '/tutorial')"
  - |
    import pytest as _pytest, sys as _sys
    def _make_pytest_patch():
        _orig = _pytest.main
        _sysmod = _sys
        def _patched(*a, **kw):
            for m in list(_sysmod.modules):
                if m.startswith('test_') or m in (
                    'discounts',
                    'means',
                    'sequences',
                    'accounts',
                    'savings',
                ):
                    del _sysmod.modules[m]
            return _orig(*a, **kw)
        return _patched
    _pytest.main = _make_pytest_patch()

steps:

  # Pedagogy: contrasting cases (Variation Theory) — Defensive Programming and
  # Design by Contract are made visible by placing two versions of the same
  # function side by side, then introducing contract notation as responsibility
  # allocation rather than "another way to check inputs."
  - title: "Contract Mindset"
    instructions: |
      ### Why this matters

      Defensive Programming asks "how do I reject bad input clearly?" Design by Contract asks a sharper question first: **"whose job was this?"** That single shift in framing changes how the code is structured — sometimes radically.

      Bertrand Meyer, who coined Design by Contract in the 1980s, argued explicitly *against* defensive programming. He called blanket input-checking a methodology that "can only … cause … a decrease in reliability" because redundant checks across a large system compound into "a monster of useless complexity." His **Non-Redundancy Principle**: *under no circumstances shall the body of a routine ever test for its precondition*. The caller's job is to satisfy preconditions; the supplier's job is to satisfy postconditions, *assuming the preconditions held*.

      That's a strong claim — and the opposite of the DP tutorial you just finished. This step makes the contrast visible by putting two versions of the same function side by side, then introduces the pragmatic Python middle ground we'll use for the rest of the tutorial.

      ### 🎯 You will learn to

      - Analyze the same function as a Defensive Programming artifact vs. a Design by Contract artifact.
      - Distinguish caller obligations (preconditions) from supplier guarantees (postconditions).
      - Apply the Non-Redundancy Principle to decide where a check belongs.

      ### Two implementations, same behavior on valid inputs

      Open `discounts.py`. It contains two versions of `discounted_price(price, discount)`. Their visible behavior on valid inputs is *identical*. Their framing of responsibility is *very* different.

      #### Version A

      ```python
      def discounted_price_A(price, discount):
          if not isinstance(price, (int, float)):
              raise TypeError("price must be a number")
          if not isinstance(discount, (int, float)):
              raise TypeError("discount must be a number")
          if price < 0:
              raise ValueError("price must be non-negative")
          if not (0 <= discount <= 1):
              raise ValueError("discount must be between 0 and 1")
          return price * (1 - discount)
      ```

      #### Version B

      ```python
      def discounted_price_B(price, discount):
          """Return price after applying a fractional discount.

          Preconditions (caller's obligation):
              - price >= 0
              - 0 <= discount <= 1

          Postcondition (supplier's guarantee, given preconditions hold):
              - result == price * (1 - discount)
              - 0 <= result <= price
          """
          return price * (1 - discount)
      ```

      ### ✏️ Predict before you read on

      Commit to a letter, *then* open the reveal.

      - (a) A is Defensive Programming; B is Design by Contract.
      - (b) B is Defensive Programming; A is Design by Contract.
      - (c) They are equivalent — labels are decoration.
      - (d) Both are Defensive — DbC requires a different language like Eiffel.

      <details>
      <summary>Reveal</summary>

      **(a) is correct.** Version A is **Defensive Programming**: every assumption is checked at the boundary of the routine, before any useful work happens. Version B is **Design by Contract** in the pure Meyer sense: the contract is *documented*; the body *assumes* the precondition; there are no defensive checks in the body.

      The other letters map to specific misconceptions worth naming:

      - **(b)** confuses "more code = more rigorous." DbC's claim is the opposite: contracts let you write *less* code by allocating responsibility.
      - **(c)** treats this as a style preference. It isn't. Labels matter because they change *who is responsible when something fails*. A failure in Version A is the function's fault for letting bad input through. A failure in Version B is the *caller's* fault for violating the documented precondition.
      - **(d)** DbC is a methodology, not a language. Eiffel makes it ergonomic; Python can do it with discipline and small helpers.

      </details>

      ### What each style optimizes for

      | Aspect | Defensive Programming (A) | Design by Contract (B) |
      |---|---|---|
      | Trust assumption | Caller may be hostile or buggy | Caller is a partner who reads the contract |
      | Where checks live | Inside the routine body | Outside, in the caller's context — or not at all |
      | Scales well to | Public APIs, untrusted boundaries | Large libraries with many internal callers |
      | Fails badly when | Internal callers pay validation cost on every call | Public APIs accept untrusted input |
      | Performance cost | Permanent | Optional — Eiffel disables monitoring in release builds |

      The conclusion both Meyer and modern practice agree on: **use DbC for internal module boundaries; use DP at the system boundary** (user input, network, files, databases). They are complementary, not competing. The mistake is doing both for the same condition — that's the redundancy Meyer warned about.

      ### A pragmatic Python middle ground

      Python doesn't have a built-in contract language. For this tutorial we use two tiny helpers that make the contract *visible* and *runtime-checked* — useful for learning and for debugging, optional in production:

      ```python
      def require(condition: bool, message: str, *, kind: str = "value") -> None:
          """Caller obligation. kind='type' raises TypeError; default raises ValueError."""
          if not condition:
              raise (TypeError if kind == "type" else ValueError)(message)

      def ensure(condition: bool, message: str) -> None:
          """Supplier guarantee. Failure is a supplier bug → AssertionError."""
          if not condition:
              raise AssertionError(message)
      ```

      Two intentional design choices worth naming:

      - **`require` accepts a `kind="type"` flag.** This keeps us consistent with the DP tutorial's TypeError/ValueError discipline. *In pure DbC, every precondition violation is the same thing — a caller bug — and the exception class is a Python-pragmatic refinement, not a core concept.* We use `kind="type"` only when distinguishing the diagnostic adds clarity.
      - **`ensure` raises `AssertionError`** instead of `ValueError`. A postcondition failure is *the supplier's* bug, not the caller's. Distinct exception classes make blame visible in tracebacks. We don't use Python's built-in `assert` because `python -O` strips it — but conceptually it's the same thing. In Eiffel, contract monitoring is a compile flag that turns checks on or off *without altering the specification itself*.

      Version C below is the working version we'll build on for the rest of the tutorial — DbC framing, runtime monitoring, no inline type defense:

      ```python
      def discounted_price(price: float, discount: float) -> float:
          require(price >= 0, "price must be non-negative")
          require(0 <= discount <= 1, "discount must be between 0 and 1")
          result = price * (1 - discount)
          ensure(0 <= result <= price, "result must stay between 0 and original price")
          return result
      ```

      Notice what's *not* there: type checks. In pure DbC you would document `price: REAL` and let the type system or the caller's contract handle wrong types. We will sometimes add `require(isinstance(...), ..., kind="type")` later when it sharpens diagnostics — but every time we do, we're paying the same redundancy cost Meyer warned about. It's a trade-off, not a default.

    files:
      - path: "discounts.py"
        language: "python"
        content: |
          # ============================================================
          # Two methodologies, one function.
          # Read both versions, then study Version C — the DbC framing
          # we will build on for the rest of the tutorial.
          # ============================================================

          # ---- Version A: Defensive Programming ----
          def discounted_price_A(price, discount):
              if not isinstance(price, (int, float)):
                  raise TypeError("price must be a number")
              if not isinstance(discount, (int, float)):
                  raise TypeError("discount must be a number")
              if price < 0:
                  raise ValueError("price must be non-negative")
              if not (0 <= discount <= 1):
                  raise ValueError("discount must be between 0 and 1")
              return price * (1 - discount)


          # ---- Version B: Design by Contract (pure Meyer) ----
          def discounted_price_B(price, discount):
              """Return price after applying a fractional discount.

              Preconditions (caller's obligation):
                  - price >= 0
                  - 0 <= discount <= 1

              Postcondition (supplier's guarantee, given preconditions hold):
                  - result == price * (1 - discount)
                  - 0 <= result <= price
              """
              return price * (1 - discount)


          # ---- Contract helpers (used from Version C onward) ----
          def require(condition: bool, message: str, *, kind: str = "value") -> None:
              """Caller obligation. kind='type' raises TypeError; default raises ValueError."""
              if not condition:
                  raise (TypeError if kind == "type" else ValueError)(message)


          def ensure(condition: bool, message: str) -> None:
              """Supplier guarantee. Failure is the supplier's bug → AssertionError."""
              if not condition:
                  raise AssertionError(message)


          # ---- Version C: DbC with runtime monitoring (our working version) ----
          def discounted_price(price: float, discount: float) -> float:
              """Return price after applying a fractional discount."""
              require(price >= 0, "price must be non-negative")
              require(0 <= discount <= 1, "discount must be between 0 and 1")
              result = price * (1 - discount)
              ensure(0 <= result <= price, "result must stay between 0 and original price")
              return result

    open_file: "discounts.py"
    run_file: "discounts.py"

    quiz:
      title: "Step 1 — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - type: single
          difficulty: basic
          question: |
            Which statement best captures Meyer's Non-Redundancy Principle?
          options:
            - "A routine's body should never test for its own precondition; the caller is responsible."
            - "Every routine should validate every input at the top of its body."
            - "Preconditions and postconditions should always be checked, even in production."
            - "Defensive programming and Design by Contract are equivalent in practice."
          correct_index: 0
          option_feedback:
            1: "This is the *defensive programming* prescription Meyer was arguing against. Non-Redundancy says the opposite."
            2: "Meyer specifically allowed turning monitoring off in production (it's a compile flag in Eiffel). The principle is about *who is responsible*, not whether checks run."
            3: "They use related vocabulary (preconditions, postconditions) but reach opposite conclusions about where checks should live."
          explanation: "Non-Redundancy: a consistency condition belongs to *one* of the two parties — caller or supplier — never both. Checking on both sides is wasted complexity that scales badly."

        - type: single
          difficulty: intermediate
          question: |
            `discounted_price_A(-10, 0.2)` raises `ValueError`. `discounted_price_B(-10, 0.2)` returns `-12.0` — a negative price. Which framing is each version using?
          options:
            - "A is Defensive (catches the bad input itself); B is DbC (relies on the caller to satisfy the precondition)."
            - "A is DbC (precise exception); B is Defensive (silent acceptance)."
            - "Both are Defensive — both are written in Python."
            - "Both are DbC — both have meaningful behavior."
          correct_index: 0
          option_feedback:
            1: "Raising a precise exception is a DP move, not a DbC one. DbC's claim is that the *caller* should have prevented this call in the first place."
            2: "The framing is about *where the check lives*, not the language. Python supports both styles equally."
            3: "B has a docstring contract; A does not. The presence of inline checks (A) vs. a documented precondition (B) is the distinguishing mark."
          explanation: "A actively defends against bad input. B trusts the caller to satisfy the precondition — and exhibits 'arbitrary behavior' when the caller breaks it. Meyer's view: that's not a bug in B; it's a bug in the *caller*."

        - type: single
          difficulty: intermediate
          question: |
            In Version C, `require` raises `ValueError` (or `TypeError` with `kind="type"`) and `ensure` raises `AssertionError`. Why two different exception classes?
          options:
            - "To make traceback blame visible: `ValueError`/`TypeError` ⇒ caller bug; `AssertionError` ⇒ supplier bug."
            - "Because `AssertionError` is faster to raise."
            - "Because `ValueError` is reserved for caller bugs by the Python language."
            - "It's stylistic with no semantic meaning."
          correct_index: 0
          option_feedback:
            1: "Exception cost is dominated by traceback construction, not the class. The choice is pedagogical, not performance."
            2: "Python does not enforce this — `ValueError` is just an exception class. The convention here is *ours*, encoding the contract responsibility split."
            3: "It's stylistic in the sense Python doesn't force it, but it's *load-bearing* for the contract framing: blame should be visible at the point of failure."
          explanation: "The two exception classes encode the DbC responsibility split in Python's exception system. A `ValueError` in a stack trace says 'caller did wrong'; an `AssertionError` says 'this routine failed to deliver on its promise.'"

        - type: single
          difficulty: basic
          question: |
            `discounted_price(100, 0.25)` returns `10` — clearly wrong; should be `75`. The caller satisfied both preconditions. Who violated the contract?
          options:
            - "The supplier — preconditions held, so the result must satisfy every postcondition."
            - "The caller — 25 percent is a large discount."
            - "Neither — the result is non-negative, which is one of the postconditions."
            - "Both — discount math is shared responsibility."
          correct_index: 0
          option_feedback:
            1: "0.25 is inside the documented range [0, 1]. The caller met the precondition."
            2: "A weak postcondition that *any* result satisfies (like 'non-negative') is not the full contract. The formula and the upper bound are *both* postconditions."
            3: "When the caller met every precondition, the supplier owes every postcondition. Shared blame would defeat the responsibility allocation."
          explanation: "Preconditions held ⇒ supplier owes every postcondition. The implementation produced `10`, violating both the formula and the upper-bound postcondition — that's a supplier bug, and `ensure` raises `AssertionError` to make it visible."

  # Pedagogy: worked example with fading — implement preconditions before the
  # computation. Bridging callout retrieves the DP framing for comparison.
  - title: "Good Preconditions"
    instructions: |
      ### Why this matters

      A good precondition rejects calls that the function cannot honestly handle *before* the algorithm starts. That keeps the body simple and makes failures point to the caller's contract violation, not to obscure runtime errors deep inside the math.

      ### 🔗 Bridging from Defensive Programming

      > In DP Step 2 (`repeat`) you used `TypeError` for wrong-kind inputs and `ValueError` for wrong-value inputs. In Design by Contract, **both are just "the caller violated a precondition"** — the responsibility label is the core concept, not the exception class. We keep `kind="type"` on `require` as a Python-pragmatic refinement (it sharpens diagnostics), but Meyer's argument is that *who* matters more than *what*.

      ### 🎯 You will learn to

      - Apply `require` to reject invalid inputs before computation.
      - Validate emptiness, numeric type, `NaN`, and infinity as separate precondition concerns.
      - Keep the actual mean calculation small after preconditions pass.

      ### Your task

      Implement `mean_nonempty(xs)`.

      Preconditions:

      - `xs` is non-empty.
      - Every element is a real number, but not `bool`.
      - Every element is finite: not `NaN`, not positive infinity, and not negative infinity.

      Postcondition:

      - The result equals `sum(xs) / len(xs)` for the validated values.

      Use `require(...)` for precondition checks and `ensure(...)` for the postcondition.

    files:
      - path: "means.py"
        language: "python"
        content: |
          import math
          from collections.abc import Sequence


          def require(condition: bool, message: str, *, kind: str = "value") -> None:
              """Caller obligation. kind='type' raises TypeError; default raises ValueError."""
              if not condition:
                  raise (TypeError if kind == "type" else ValueError)(message)


          def ensure(condition: bool, message: str) -> None:
              """Supplier guarantee. Failure raises AssertionError."""
              if not condition:
                  raise AssertionError(message)


          def mean_nonempty(xs: Sequence[float]) -> float:
              """Return the arithmetic mean of a non-empty finite numeric sequence."""
              # Add preconditions before computing.
              result = sum(xs) / len(xs)
              return result

      - path: "test_means.py"
        language: "python"
        content: |
          import math
          import pytest
          from means import mean_nonempty


          def test_valid_values_return_mean():
              assert mean_nonempty([2, 4, 6]) == pytest.approx(4)
              assert mean_nonempty([1.5, 2.5]) == pytest.approx(2.0)


          def test_empty_sequence_violates_precondition():
              with pytest.raises(ValueError):
                  mean_nonempty([])


          def test_nonnumeric_value_violates_precondition():
              # Type predicate violated → TypeError (require with kind="type").
              with pytest.raises(TypeError):
                  mean_nonempty([1, "2", 3])


          def test_nan_and_infinity_violate_precondition():
              for value in [math.nan, math.inf, -math.inf]:
                  with pytest.raises(ValueError):
                      mean_nonempty([1, value])

    open_file: "means.py"
    run_file: "test_means.py"

    tests:
      - description: "Mean preconditions reject empty, nonnumeric, NaN, and infinity before computation"
        command: |
          import pytest, io, sys
          old = sys.stdout
          sys.stdout = buf = io.StringIO()
          code = pytest.main(['/tutorial/test_means.py', '-v', '--tb=short', '--no-header'])
          sys.stdout = old
          output = buf.getvalue()
          print(output)
          assert code == 0, output

          from means import mean_nonempty
          with pytest.raises(TypeError):
              mean_nonempty([True, 2, 3])
        hints:
          - title: "Validate before `sum`"
            text: "The starter computes immediately. Move precondition checks above `sum(xs) / len(xs)`."
          - title: "Check each element"
            text: "Loop through `xs`. Each element must be an `int` or `float`, must not be `bool`, and must pass `math.isfinite(...)`."
          - title: "Type predicates use kind=\"type\""
            text: "When the precondition checks the *kind* of value (`isinstance`, not-a-bool), pass `kind=\"type\"` to `require`. Numeric-domain checks like `math.isfinite` are value checks, so they stay default."
          - title: "Ensure the formula"
            text: "After computing `result`, use `ensure(result == sum(xs) / len(xs), ...)`. The function itself can compare the exact expression for these small inputs."

    solution:
      files:
        - path: "means.py"
          language: "python"
          content: |
            import math
            from collections.abc import Sequence


            def require(condition: bool, message: str, *, kind: str = "value") -> None:
                """Caller obligation. kind='type' raises TypeError; default raises ValueError."""
                if not condition:
                    raise (TypeError if kind == "type" else ValueError)(message)


            def ensure(condition: bool, message: str) -> None:
                """Supplier guarantee. Failure raises AssertionError."""
                if not condition:
                    raise AssertionError(message)


            def mean_nonempty(xs: Sequence[float]) -> float:
                """Return the arithmetic mean of a non-empty finite numeric sequence."""
                require(len(xs) > 0, "xs must be non-empty")
                for value in xs:
                    require(
                        isinstance(value, (int, float)) and not isinstance(value, bool),
                        "all values must be real numbers",
                        kind="type",
                    )
                    require(math.isfinite(value), "all values must be finite")

                result = sum(xs) / len(xs)
                ensure(result == sum(xs) / len(xs), "result must equal the arithmetic mean")
                return result
      explanation: |
        The computation is only reached after the caller has supplied a non-empty sequence of finite numbers — the contract split: caller prepares valid inputs, supplier computes the promised result. Type predicates use `kind="type"` so wrong-kind inputs raise `TypeError`; numeric-domain checks (`math.isfinite`, length) stay default and raise `ValueError`. In pure DbC both would be the same — "caller violated precondition" — but the Python-pragmatic split keeps stack traces diagnostic.

  # Pedagogy: worked example with fading — introduce old-state reasoning for a
  # sequence transformation. Bridging callout connects to DP's invariant work.
  - title: "Strong Postconditions"
    instructions: |
      ### Why this matters

      Weak postconditions let broken code pass. For a sequence operation, "returns a list" is not enough; the contract should say exactly what changed and what stayed untouched.

      ### 🔗 Bridging from Defensive Programming

      > In DP Step 4 (`ClosedInterval.__post_init__`) you enforced an invariant *at construction*: a one-time check at the start of the object's life. Postconditions are a related but different idea — instead of "what must always be true of this object," they say "what must be true *after this call returns*, given the inputs and the prior state." The `old_xs` snapshot is the new tool that lets a postcondition reference the input *as it was at entry*, even after the function has done work.

      ### 🎯 You will learn to

      - Use an old-state snapshot to compare before and after behavior.
      - Specify a sequence transformation without mutating the input.
      - Apply `ensure` to check a strong postcondition.

      ### Your task

      Implement:

      ```python
      def remove_at(xs: Sequence[int], index: int) -> list[int]:
          ...
      ```

      Contract:

      - Precondition: `0 <= index < len(xs)`.
      - The function returns a new list.
      - The input sequence is not mutated.
      - The returned list is exactly the old sequence with the element at `index` removed.

      Create `old_xs = list(xs)` before making the result. Use `ensure(...)` to check the returned list against `old_xs[:index] + old_xs[index + 1:]`.

    files:
      - path: "sequences.py"
        language: "python"
        content: |
          from collections.abc import Sequence


          def require(condition: bool, message: str, *, kind: str = "value") -> None:
              """Caller obligation. kind='type' raises TypeError; default raises ValueError."""
              if not condition:
                  raise (TypeError if kind == "type" else ValueError)(message)


          def ensure(condition: bool, message: str) -> None:
              """Supplier guarantee. Failure raises AssertionError."""
              if not condition:
                  raise AssertionError(message)


          def remove_at(xs: Sequence[int], index: int) -> list[int]:
              """Return a new list with the item at index removed."""
              require(0 <= index < len(xs), "index must be in range")
              # Snapshot old state before building the result.
              old_xs = ...
              result = list(xs)
              result.pop(index)
              return result

      - path: "test_sequences.py"
        language: "python"
        content: |
          import pytest
          from sequences import remove_at


          def test_removes_first_middle_and_last_items():
              assert remove_at([10, 20, 30], 0) == [20, 30]
              assert remove_at([10, 20, 30], 1) == [10, 30]
              assert remove_at([10, 20, 30], 2) == [10, 20]


          def test_invalid_index_violates_precondition():
              with pytest.raises(ValueError):
                  remove_at([10, 20, 30], -1)
              with pytest.raises(ValueError):
                  remove_at([10, 20, 30], 3)


          def test_input_list_is_not_mutated():
              xs = [10, 20, 30]
              result = remove_at(xs, 1)
              assert result == [10, 30]
              assert xs == [10, 20, 30]
              assert result is not xs

    open_file: "sequences.py"
    run_file: "test_sequences.py"

    tests:
      - description: "remove_at uses old-state reasoning, preserves the input, and removes exactly one element"
        command: |
          import ast, pytest, io, sys
          source = open('/tutorial/sequences.py').read()
          assert "old_xs" in source and "old_xs = ..." not in source, "Create a real old_xs snapshot before changing or building the result."
          assert "ensure(" in source, "Use ensure(...) to state the postcondition, not only visible pytest tests."

          old = sys.stdout
          sys.stdout = buf = io.StringIO()
          code = pytest.main(['/tutorial/test_sequences.py', '-v', '--tb=short', '--no-header'])
          sys.stdout = old
          output = buf.getvalue()
          print(output)
          assert code == 0, output
        hints:
          - title: "Copy the input first"
            text: "`old_xs = list(xs)` gives the postcondition a stable value to compare against, even if `xs` is a mutable list."
          - title: "Build the expected result from slices"
            text: "The exact postcondition is `old_xs[:index] + old_xs[index + 1:]`."
          - title: "Return a new list"
            text: "Do not call `pop` on `xs` itself. Build or copy into `result`, then compare `result` with the old-state expression."

    solution:
      files:
        - path: "sequences.py"
          language: "python"
          content: |
            from collections.abc import Sequence


            def require(condition: bool, message: str, *, kind: str = "value") -> None:
                """Caller obligation. kind='type' raises TypeError; default raises ValueError."""
                if not condition:
                    raise (TypeError if kind == "type" else ValueError)(message)


            def ensure(condition: bool, message: str) -> None:
                """Supplier guarantee. Failure raises AssertionError."""
                if not condition:
                    raise AssertionError(message)


            def remove_at(xs: Sequence[int], index: int) -> list[int]:
                """Return a new list with the item at index removed."""
                require(0 <= index < len(xs), "index must be in range")
                old_xs = list(xs)
                result = old_xs[:index] + old_xs[index + 1:]
                ensure(list(xs) == old_xs, "input sequence must not be mutated")
                ensure(result == old_xs[:index] + old_xs[index + 1:], "result must remove exactly one item")
                return result
      explanation: |
        The old-state snapshot lets the postcondition say exactly what changed. Without `old_xs`, a postcondition can easily become a weak check against whatever the current state happens to be.

  # Pedagogy: guided practice — maintain a class invariant through state-changing
  # methods. Bridging callout extends DP's construction-time check to all
  # stable times in the object's lifetime.
  - title: "Class Invariants"
    instructions: |
      ### Why this matters

      An invariant is a fact that should be true after construction and after every public method call. Once an object promises an invariant, every method can rely on it instead of re-validating the whole object from scratch.

      ### 🔗 Bridging from Defensive Programming

      > In DP Step 4 (`ClosedInterval.__post_init__`) you protected the object by validating *at construction* — one stable time, at the start of the object's life. DbC's invariant idea extends this: there are *many* stable times — after construction, and **before and after every public method call**. The invariant must hold at every one of them. Meyer's diagram (an object lifecycle as `S1 → S2 → S3 → …` with `INV` true at each `S_i`) makes this visible. The constructor check is the first guardrail in a longer chain.

      ### 🎯 You will learn to

      - Define a `_check_invariant` method for object state.
      - Use preconditions for invalid caller requests.
      - Use postconditions and invariant checks after mutation.

