                    isinstance(value, int) and not isinstance(value, bool),
                    f"{name} must be an integer",
                    kind="type",
                )
                require(value > 0, f"{name} must be positive")


            class BankAccount:
                def __init__(self, owner: str, balance: int = 0) -> None:
                    require(isinstance(owner, str), "owner must be a string", kind="type")
                    require(owner.strip() != "", "owner must be non-empty")
                    require(
                        isinstance(balance, int) and not isinstance(balance, bool),
                        "balance must be an integer",
                        kind="type",
                    )
                    require(balance >= 0, "balance must be non-negative")
                    self.owner = owner
                    self.balance = balance
                    self._check_invariant()

                def _check_invariant(self) -> None:
                    ensure(isinstance(self.owner, str) and self.owner.strip() != "", "owner invariant failed")
                    ensure(isinstance(self.balance, int) and not isinstance(self.balance, bool), "balance type invariant failed")
                    ensure(self.balance >= 0, "balance invariant failed")

                def deposit(self, amount: int) -> None:
                    _ensure_positive_int(amount)
                    old_balance = self.balance
                    self.balance += amount
                    self._check_invariant()
                    ensure(self.balance == old_balance + amount, "deposit must increase balance exactly")

                def withdraw(self, amount: int) -> None:
                    _ensure_positive_int(amount)
                    require(amount <= self.balance, "insufficient funds")
                    old_balance = self.balance
                    self.balance -= amount
                    self._check_invariant()
                    ensure(self.balance == old_balance - amount, "withdraw must decrease balance exactly")


            def transfer(src: BankAccount, dst: BankAccount, amount: int) -> None:
                """Move amount from src to dst."""
                require(isinstance(src, BankAccount), "src must be a BankAccount", kind="type")
                require(isinstance(dst, BankAccount), "dst must be a BankAccount", kind="type")
                require(src is not dst, "source and destination must be distinct accounts")
                _ensure_positive_int(amount)
                require(src.balance >= amount, "source has insufficient funds")

                old_src_balance = src.balance
                old_dst_balance = dst.balance
                old_total = old_src_balance + old_dst_balance

                src.withdraw(amount)
                dst.deposit(amount)

                src._check_invariant()
                dst._check_invariant()
                ensure(src.balance == old_src_balance - amount, "source must be debited exactly once")
                ensure(dst.balance == old_dst_balance + amount, "destination must be credited exactly once")
                ensure(src.balance + dst.balance == old_total, "total money must be preserved")
      explanation: |
        The transfer contract coordinates two local objects and one global property. Preconditions reject invalid operations before mutation (type predicates raise `TypeError`; value predicates raise `ValueError`); postconditions verify the exact debit, exact credit, and preserved total. The `isinstance(src, BankAccount)` guards are *language-level pragmatism*, not core DbC — in Eiffel the type system would handle this at compile time.

    quiz:
      title: "Step 5 — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - type: single
          difficulty: intermediate
          question: |
            Suppose `transfer` is exposed as a public REST endpoint receiving JSON like `{"src": "acct-1", "dst": "acct-2", "amount": "40"}`. Which Defensive Programming techniques from the DP tutorial re-enter the picture, and *where*?
          options:
            - "All of: parse and validate JSON shape at the boundary, raise TypeError for non-strings, raise ValueError for malformed amounts, look up BankAccount instances from validated IDs, *then* call `transfer` with already-validated arguments."
            - "None — `transfer`'s preconditions already cover it, so DbC is sufficient end-to-end."
            - "Only the postcondition check matters; type validation is the framework's job."
            - "Wrap the call in `except Exception:` so the endpoint can return generic 400s."
          correct_index: 0
          option_feedback:
            1: "DbC works between *trusting* parties. JSON over HTTP arrives from an *untrusting* boundary — every field could be anything. Preconditions presume the input is already a `BankAccount` and an `int`; that presumption is what the boundary layer must establish."
            2: "Type validation belongs at the trust boundary, not deferred. If `amount` arrives as the string `\"40\"`, no postcondition can save the day — the function will fail or silently produce garbage before any `ensure` runs."
            3: "Broad exception catching is the DP anti-pattern from DP Step 5 (`load_json_config`). It hides the cause — exactly the opposite of what DbC's blame allocation is trying to make visible."
          explanation: "At the *system boundary* (network, files, user input), DP is the right tool — validate aggressively, raise precise exceptions, translate failures into domain errors. *Inside* the system, between trusted modules, DbC takes over. Meyer endorses this exact split: filter modules at the boundary, contract-based modules in the interior."

        - type: single
          difficulty: intermediate
          question: |
            Your `transfer` solution uses `require(isinstance(src, BankAccount), ..., kind="type")`. In pure Meyer DbC, this would be considered redundant. Why do we keep it in Python?
          options:
            - "In statically-typed DbC (Eiffel), the type system enforces it at compile time. Python is dynamic, so this `isinstance` is the lightweight equivalent — a *language pragmatism*, not a DbC concept."
            - "Because `isinstance` is faster than the alternatives."
            - "Because `transfer` should validate every argument as defensively as possible."
            - "Because `BankAccount` instances might be corrupted between calls."
          correct_index: 0
          option_feedback:
            1: "Performance isn't the issue. Contract responsibility doesn't change based on speed; the question is whether the type system can already enforce the precondition."
            2: "DbC does *not* recommend defensive maximalism. It recommends precise responsibility allocation. We add this check only because Python can't enforce it for us at compile time."
            3: "Object integrity is what *invariants* protect — and `_check_invariant` already does that work. The `isinstance` guard is about the *variable* `src` (could be `None`, a string, etc.), not the BankAccount instance."
          explanation: "Pure DbC assumes static types. Python doesn't have static type enforcement at runtime, so we add a small `isinstance` guard as a language-level necessity. It's a DP-style check, but we're using it specifically to compensate for what static typing would otherwise provide for free."

  # Pedagogy: constructive engagement on substitutability — students implement a
  # subclass and verify Liskov substitutability with parametrized fixtures and
  # property-based testing. Brings DP-style retrieval (clamp's silent-repair
  # lesson generalizes to silent-contract-narrowing in subclasses).
  - title: "Substitution: Subclass Contracts"
    instructions: |
      ### Why this matters

      Contracts matter most when code is reused through an interface or subclass. The **Liskov Substitution Principle** says a subclass must be usable *anywhere the base class was expected* — which means it must accept everything the base accepted, and guarantee everything the base guaranteed. Violating substitutability silently breaks every caller written against the base.

      The rules sound simple but trap students every time: most learners' intuition is "a subclass is *more specific*, so it can demand more." The opposite is true. This step makes the rules executable — you'll implement a subclass, and a test harness will run *every* base-class test against your subclass to verify substitutability holds. Then property-based testing will explore the substitution space with hundreds of generated operation sequences.

      ### 🔗 Bridging from Defensive Programming

      > In DP Step 3 (`clamp`) you saw why silent repair is dangerous: swapping reversed bounds hid the caller's mistake. The Liskov rule is the inheritance-time version of the same idea — a subclass that *demands more* (stronger precondition) or *promises less* (weaker postcondition) silently breaks every caller written against the base. Same harm, different layer. Substitutability protects callers from invisible contract changes the way `clamp`'s explicit rejection protected callers from invisible argument swaps.

      ### 🎯 You will learn to

      - Apply the weaker-precondition / stronger-postcondition rule to subclass contracts.
      - Create a subclass that legally strengthens a postcondition.
      - Evaluate substitutability with both example-based and property-based tests.

      ### The rule

      A safe replacement **may**:

      - **Weaken preconditions** — accept everything the base accepted, and maybe more.
      - **Strengthen postconditions** — guarantee everything the base guaranteed, and maybe more.

      It **may not**:

      - **Strengthen preconditions** — old callers might now be rejected.
      - **Weaken postconditions** — old callers might no longer get what they relied on.

      Mnemonic: a subclass can be *more accepting on the way in* and *more generous on the way out* — never the reverse.

      ### Your task

      Implement `SavingsAccount(BankAccount)` with a **strengthened postcondition**: every successful deposit and withdraw is recorded in a `transactions` list. The list contains tuples of `(kind, amount, balance_after)`, where `kind` is `"deposit"` or `"withdraw"`.

      Concretely, `SavingsAccount` must:

      - Inherit from `BankAccount`.
      - Maintain a `transactions` attribute (a `list[tuple[str, int, int]]`).
      - Override `deposit` and `withdraw` to record the transaction *after* the base operation succeeds.
      - **Not** strengthen any precondition — every call that worked on a `BankAccount` must still work on a `SavingsAccount`.
      - **Not** weaken any postcondition — balance changes must still be exactly as the base specified.

      This is a *legal* contract change: postconditions strengthen (the new `transactions` guarantee), preconditions stay equal, and the existing balance invariant is preserved.

      ### How substitutability is tested

      Two layers, both visible in `test_savings.py`:

      1. **Parametrized fixture (`AccountCls`)**: every base-class test runs against both `BankAccount` *and* `SavingsAccount`. If the subclass narrowed the contract in any way, at least one base test fails on it.
      2. **Hypothesis property test**: generates random valid sequences of deposit/withdraw operations and asserts the two classes agree on final balance across the whole sequence. This catches contract narrowing that example tests miss.

      Property-based testing is *evidence, not proof* — it samples many inputs, not all. But for substitutability it's an excellent fit because the property ("base and subclass agree") is straightforward to state and surprisingly hard to game.

