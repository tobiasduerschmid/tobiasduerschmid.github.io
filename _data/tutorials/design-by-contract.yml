    solution:
      files:
        - path: "savings.py"
          language: "python"
          content: |
            from accounts import BankAccount, ensure


            class SavingsAccount(BankAccount):
                """A BankAccount that additionally records every transaction.

                Contract strengthening:
                  - Same preconditions as BankAccount.deposit / withdraw (do not narrow).
                  - Same balance-change postconditions as BankAccount (do not weaken).
                  - ADDITIONAL postcondition: after a successful deposit/withdraw,
                    the last element of self.transactions describes that operation.
                """

                def __init__(self, owner: str, balance: int = 0) -> None:
                    self.transactions: list[tuple[str, int, int]] = []
                    super().__init__(owner, balance)

                def deposit(self, amount: int) -> None:
                    super().deposit(amount)
                    self.transactions.append(("deposit", amount, self.balance))
                    ensure(self.transactions[-1] == ("deposit", amount, self.balance),
                           "transactions ledger must reflect the deposit")

                def withdraw(self, amount: int) -> None:
                    super().withdraw(amount)
                    self.transactions.append(("withdraw", amount, self.balance))
                    ensure(self.transactions[-1] == ("withdraw", amount, self.balance),
                           "transactions ledger must reflect the withdrawal")
      explanation: |
        The subclass legally strengthens the postcondition (adds the transactions guarantee) without touching preconditions. By delegating to `super()` first, the base precondition checks fire — failed operations raise before `transactions.append` runs, so the ledger stays clean. The parametrized fixture confirms the subclass passes every base-class behavioral test; the Hypothesis property confirms substitutability across hundreds of random valid operation sequences. Together they make Liskov substitutability *executable* rather than aspirational.

    quiz:
      title: "Step 6 — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - type: single
          difficulty: intermediate
          question: |
            A teammate proposes `PremiumSavingsAccount.withdraw` that requires `amount >= 100`. The base `withdraw` accepted any positive integer. Which Liskov rule did the proposal violate, and what's the visible harm?
          options:
            - "It strengthened a precondition — every caller that withdrew small amounts (e.g., a $20 ATM fee) now fails when handed a PremiumSavingsAccount."
            - "It weakened a precondition — callers gain valid calls, which is always safe."
            - "It strengthened a postcondition — that's always safe and substitutable."
            - "Nothing — subclasses may always demand more, since they are 'more specific.'"
          correct_index: 0
          option_feedback:
            1: "Rejecting *more* calls is a *stronger* precondition, not a weaker one. The set of accepted inputs shrinks."
            2: "The scenario changes which calls are *allowed*, not what's guaranteed *after* success — that's a precondition change, not a postcondition change."
            3: "This is the canonical Liskov misconception. 'More specific' in vocabulary does *not* mean 'demands more' in contract terms — quite the opposite. Behavioral subtyping requires *weaker-or-equal* preconditions."
          explanation: "Strengthened preconditions break substitutability. Any caller that withdrew $20 from a `BankAccount` will fail when handed a `PremiumSavingsAccount` — the subclass has narrowed the contract."

        - type: single
          difficulty: intermediate
          question: |
            Your `SavingsAccount` adds a `transactions` list — a field that `BankAccount` doesn't have. Why does this still preserve substitutability?
          options:
            - "Adding a guarantee (every successful operation is recorded) strengthens the postcondition; the base guarantees are still intact, and the new guarantee gives callers *more*."
            - "It violates substitutability — adding fields is forbidden."
            - "It only works because Python allows attribute access without declaration."
            - "It violates substitutability — only base-class fields may be touched."
          correct_index: 0
          option_feedback:
            1: "Subclasses adding new state is standard OO and explicitly allowed by Liskov's rule — *provided* the new state does not weaken any existing guarantee."
            2: "Subclasses routinely add fields. The question is whether they preserve the *visible-from-base* contract."
            3: "Adding state is allowed in statically-typed languages too. The substitutability question is about contract, not language ergonomics."
          explanation: "A subclass may add fields, methods, and stronger postconditions. As long as every guarantee of the base still holds, the subclass remains substitutable. Our parametrized fixture verifies the base guarantees; the new ledger guarantee strengthens, doesn't weaken."

        - type: single
          difficulty: intermediate
          question: |
            The Hypothesis property test runs ~100 random operation sequences and checks that `BankAccount` and `SavingsAccount` agree on final balance. What does this *prove*, and what does it *not*?
          options:
            - "Strong evidence of substitutability on the observed property (balance after operations) across the explored input space — not a proof across all inputs or all unobserved properties."
            - "Proof of substitutability for all possible inputs, since Hypothesis explores all inputs."
            - "Nothing — property-based tests are no better than example tests."
            - "Proof that the implementations are byte-for-byte identical."
          correct_index: 0
          option_feedback:
            1: "Hypothesis explores *many* inputs intelligently, not *all* of them. It is a sampling tool with smart shrinking, not a proof tool. CrossHair or formal verification would be needed for full proof."
            2: "Property tests are dramatically better than examples at finding edge cases (Hypothesis is excellent at counter-example shrinking), but they sample, not exhaust."
            3: "Two different classes can have identical *observable* behavior on the tested slice while differing internally — that's fine. Substitutability is about observable behavior, not implementation."
          explanation: "Property tests are evidence, not proof. They cover far more inputs than examples and excel at finding contract violations, but for *full* substitutability across every possible input and observable property you'd need formal verification. The pragmatic combination — parametrized examples + property tests + mutation testing — is the strongest practical evidence available."

        - type: single
          difficulty: intermediate
          question: |
            Suppose someone implements `transfer(savings_src, savings_dst, amount)` where `savings_src.balance` decreases twice after the call. The caller satisfied every documented precondition. Who violated the contract, and what role do `SavingsAccount`'s extra guarantees play?
          options:
            - "The supplier — the postcondition specified exactly one debit. The `transactions` ledger now also shows the bug as two recorded withdrawals, making the violation easier to detect."
            - "The caller — they should have re-checked the balance afterward."
            - "Both — multi-object operations have shared responsibility."
            - "Neither — total money may still be preserved across the two accounts."
          correct_index: 0
          option_feedback:
            1: "Callers are not required to re-verify postconditions. That's *what postconditions are for* — guarantees the caller can rely on without re-checking."
            2: "Shared blame defeats the responsibility allocation. Either the preconditions held (supplier owes) or they didn't (caller owes)."
            3: "Total preservation is one postcondition; the 'exactly one debit' postcondition is another — and it failed."
          explanation: "Valid preconditions shift responsibility to the supplier. A double debit violates the postcondition that source is debited by exactly `amount`, once. The `transactions` ledger SavingsAccount adds is also a debugging asset here — it materializes the violation as two recorded withdrawals, where a plain `BankAccount` would only show the wrong final balance."
