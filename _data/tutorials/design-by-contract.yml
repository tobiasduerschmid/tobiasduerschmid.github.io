      files:
        - path: "accounts.py"
          language: "python"
          content: |
            def require(condition: bool, message: str, *, kind: str = "value") -> None:
                """Caller obligation. kind='type' raises TypeError; default raises ValueError."""
                if not condition:
                    raise (TypeError if kind == "type" else ValueError)(message)


