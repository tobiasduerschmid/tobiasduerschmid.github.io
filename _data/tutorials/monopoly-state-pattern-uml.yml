title: "Monopoly State Pattern UML"
description: "Design Monopoly player behavior with the State pattern by drawing class, state machine, and sequence diagrams in the UML editor."

learning_objectives:
  - "Apply the State design pattern to a game-domain behavior problem."
  - "Create class, state machine, and sequence diagrams that describe the same design consistently."
  - "Evaluate whether sequence messages, state transitions, and class operations agree across diagrams."
  - "Use UML labels to document concrete conditions for behavior changes."

backend: uml-editor
require_tests: false

steps:

  # Pedagogy: productive failure — students model first, then structural checks guide consistency.
  - title: "Class Diagram"
    uml_type: class
    instructions: |
      ### Why this matters

      The State pattern replaces a growing pile of turn-condition `if` statements with a `PlayerState` abstraction and one class per behavior. Your class diagram should make that delegation visible.

      ### 🎯 You will learn to

      - Create the State-pattern roles for Monopoly player behavior
      - Show the operations that the sequence diagram will later call

      Draw a class diagram with:

      - `Player`
      - a state abstraction such as `PlayerState` as either an interface or an abstract class
      - concrete states for normal turns, jail, and bankruptcy
      - an abstract operation for taking a turn and an operation for changing state
      - an aggregation or composition relationship showing that `Player` holds its current state
    tests:
      - description: "State-pattern classes are present"
        assertions:
          - kind: class
            id: Player
            naming_hint: "Use role-revealing class names. The context object should read as the player role, not as a generic game object."
          - kind: element
            id: PlayerState
            element_type_any:
              - abstract class
              - interface
            naming_hint: "Name the state abstraction so it clearly reads as the player's state role; the concrete state classes should point back to that abstraction."
          - kind: class
            id_contains: normal
            naming_hint: "Concrete state class names should expose their Monopoly role. Look back at the assignment wording and include the role words in the class names."
          - kind: class
            id_contains_any:
              - jail
              - prison
            naming_hint: "Concrete state class names should expose their Monopoly role. Look back at the assignment wording and include the role words in the class names."
          - kind: class
            id_contains: bankrupt
            naming_hint: "Concrete state class names should expose their Monopoly role. Look back at the assignment wording and include the role words in the class names."
      - description: "Operations support the later sequence diagram"
        assertions:
          - kind: member
            owner: Player
            text_contains_any:
              - takeTurn
              - doTurn
              - playTurn
              - performTurn
              - executeTurn
              - processTurn
              - handleTurn
              - runTurn
              - makeMove
              - takeAction
              - performAction
            naming_hint: "This operation should read like the player starting, taking, or doing a turn. Use a verb phrase you would also be comfortable calling in the sequence diagram."
          - kind: member
            owner: Player
            text_contains_any:
              - setState
              - changeState
              - stateChange
              - switchState
              - updateState
              - transitionState
              - transitionToState
            naming_hint: "This operation should read like the player changing, updating, switching, or transitioning its current state."
          - kind: member
            owner: PlayerState
            is_abstract: true
            text_contains_any:
              - takeTurn
              - doTurn
              - playTurn
              - performTurn
              - executeTurn
              - processTurn
              - handleTurn
              - runTurn
              - makeMove
              - takeAction
              - performAction
            naming_hint: "The state abstraction's operation should name the turn behavior that every concrete state implements; keep it aligned with the turn operation you plan to call later."
      - description: "Player owns or aggregates its current state"
        assertions:
          - kind: relation
            from: Player
            to: PlayerState
            relation_type_any:
              - aggregation
              - composition
      - description: "Concrete states implement the state abstraction"
        assertions:
          - kind: relation
            from_contains: normal
            to: PlayerState
            relation_type_for_target_type:
              abstract class: generalization
              interface: realization
            naming_hint: "If the inheritance or realization arrows are present, check the concrete state class names on the child side; the grader identifies their roles from those names."
          - kind: relation
            from_contains_any:
              - jail
              - prison
            to: PlayerState
            relation_type_for_target_type:
              abstract class: generalization
              interface: realization
            naming_hint: "If the inheritance or realization arrows are present, check the concrete state class names on the child side; the grader identifies their roles from those names."
          - kind: relation
            from_contains: bankrupt
            to: PlayerState
            relation_type_for_target_type:
              abstract class: generalization
              interface: realization
            naming_hint: "If the inheritance or realization arrows are present, check the concrete state class names on the child side; the grader identifies their roles from those names."

  # Pedagogy: Make — students create a behavioral model and label transition causes.
  - title: "State Diagram"
    uml_type: state
    instructions: |
      ### Why this matters

      A State-pattern design still needs a precise lifecycle: which condition moves a player from one state object to another? The state diagram records those rules without burying them in code.

      ### 🎯 You will learn to

      - Model Monopoly player-state transitions
      - Label transitions with clear state-change conditions

      Draw a state diagram with the same normal-turn, in-jail, and bankrupt state names you used for the concrete state classes in your class diagram. Label each transition with a clear condition.
    tests:
      - description: "States reuse the concrete state class names"
        assertions:
          - kind: state
            class_role: normal
            naming_hint: "State nodes should reuse the concrete state class names from your class diagram, not a second set of shorter state-machine-only names."
          - kind: state
            class_role: jail
            naming_hint: "State nodes should reuse the concrete state class names from your class diagram, not a second set of shorter state-machine-only names."
          - kind: state
            class_role: bankrupt
            naming_hint: "State nodes should reuse the concrete state class names from your class diagram, not a second set of shorter state-machine-only names."
      - description: "State transitions are labeled and consistent"
        assertions:
          - kind: transition
            from_class_role: normal
            to_class_role: jail
            label_min_length: 4
            naming_hint: "Transition labels should describe the condition or event that causes the state change, not just a short marker."
          - kind: transition
            from_class_role: jail
            to_class_role: normal
            label_min_length: 4
            naming_hint: "Transition labels should describe the condition or event that causes the state change, not just a short marker."
          - kind: transition
            from_class_role: normal
            to_class_role: bankrupt
            label_min_length: 4
            naming_hint: "Transition labels should describe the condition or event that causes the state change, not just a short marker."
          - kind: transition
            from_class_role: jail
            to_class_role: bankrupt
            label_min_length: 4
            optional: true
            naming_hint: "Transition labels should describe the condition or event that causes the state change, not just a short marker."

  # Pedagogy: Make — students connect the static design to one runtime interaction.
  - title: "Sequence Diagram"
    uml_type: sequence
    instructions: |
      ### Why this matters

      The sequence diagram is the consistency check: the calls you show here should be operations from the class diagram, and the participating state object should correspond to a state from the state diagram.

      ### 🎯 You will learn to

      - Show one typical State-pattern turn interaction
      - Keep operation names consistent across UML diagrams

      Draw one typical interaction. A good version shows a `Player` object calling at least two different concrete state objects, with a state-change call between those turn calls. Use method names that also appear in your class diagram.
    tests:
      - description: "Player and concrete state objects are shown"
        assertions:
          - kind: sequence
            check: player_object
            naming_hint: "Use a typed lifeline for the player object so the diagram can connect messages back to the Player class."
          - kind: sequence
            check: state_objects
            min: 2
            different_types: true
            naming_hint: "Use typed lifelines for concrete state objects; the class side of each lifeline should reuse a concrete state class name from your class diagram."
      - description: "Player talks to each state and changes state between calls"
        assertions:
          - kind: sequence
            check: messages_between_player_and_states
          - kind: sequence
            check: state_change_between_state_calls
            naming_hint: "The message between the two state calls should use the state-changing operation name from the class diagram."
      - description: "Sequence method calls exist in the class diagram"
        assertions:
          - kind: sequence
            check: called_methods_exist
            naming_hint: "Read each arrow as a method call on the receiving lifeline. The message name should be an operation on that receiver's class or inherited state abstraction."
