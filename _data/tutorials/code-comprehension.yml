            2: "Assertions live in test files, not in production aggregation code."
            3: "Aesthetic is not a behavior beacon."
          explanation: "Beacon classes (Step 3): lexical (names), structural (code shapes), framework (library/API), specification (tests). The `dict.get(key, default) + value` pattern is the textbook *aggregation plan* — a structural beacon."

