            2: "`badges` gathers output strings; it is not choosing the strongest topic."
            3: "`minimum_minutes` is a threshold, and `topic` is a local item from iteration or return unpacking."
          explanation: "A best-so-far plan usually keeps a current candidate and the score that justifies it."

        - type: single
