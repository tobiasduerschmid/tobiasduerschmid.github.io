      - path: "study-queue/styles.css"
        language: "css"
        content: |
          .queue-shell {
            max-width: 58rem;
            margin: 0 auto;
            padding: 1.5rem;
          }

          .task-card {
            border: 1px solid #c9d3df;
            border-radius: 6px;
            padding: 1rem;
            margin-block: 0.75rem;
