            2: "`entry` is the loop stepper. `topic_minutes` persists across loop iterations."
            3: "Display strings are appended to `badges`; `topic_minutes` stores numeric totals."
          explanation: "The dictionary key is the topic, and the value accumulates minutes for that topic."

        - type: single
