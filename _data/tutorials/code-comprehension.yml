            2: "The stepper is `day` — the loop variable from `for day in days`."
            3: "It is `int | None`, not a boolean."
          explanation: "Variable roles (Step 5) compress code into plans. `previous_day` is a *most-recent holder*: keep the last value so you can ask 'is this consecutive?' on the next iteration. Recognizing the role makes the streak plan obvious without tracing every increment."

