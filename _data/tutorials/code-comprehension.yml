            0: "Yes — the test *name* says 'appearance order' but the assertion only checks that the key exists with one of two values. The test is underspecified."
            1: "Yes — the no-tie tests don't exercise the `>=`/`>` distinction at all."
            2: "Running them gives only one outcome; you can't compare against the alternative without changing the code."
