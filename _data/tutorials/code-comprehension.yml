          explanation: "A useful secondary lesson: tests can *appear* to pin a behavior while actually leaving it under-specified. The name `test_ties_resolved_by_appearance_order` is itself a specification beacon — but the assertion doesn't honor the name. A reviewer who skims test *names* without reading their *assertions* gets the wrong picture."

        - type: single
          difficulty: advanced
          question: "Which single-character change to the function would make the standard 'max-tracking first-wins' plan true?"
          options:
            - "Change `>=` to `>` in the conditional."
