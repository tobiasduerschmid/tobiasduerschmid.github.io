title: "C for C++ Programmers"
description: "Learn C by leveraging what you already know from C++. Master printf/scanf, manual memory management, structs, function pointers, and idiomatic C — all through hands-on practice in an interactive Linux terminal."

require_tests: true

setup_commands:
  - "mkdir -p /tutorial/c_project"

steps:
  # --------------------------------------------------------------------------
  # STEP 1: Hello C — What's Missing from C++
  # --------------------------------------------------------------------------
  - title: "Hello C — What's Missing from C++"
    instructions: |
      Welcome to the **C Tutorial**! You already know C++ — so instead of starting from zero, we'll focus on what's **different** and what's **missing**.

      **A note before we begin:** Moving from C++ to C can feel like losing superpowers — no classes, no RAII, no `std::string`. That's normal. Every C programmer has felt that friction. But C's simplicity is also its strength: you'll develop a deep understanding of exactly what the machine does with your code, with no abstractions hiding the truth. Expect to be confused by things that "should just work" — that confusion is the learning.

      C is not a "simpler C++." It's an *older, smaller* language that C++ grew out of. Many features you rely on in C++ simply don't exist:

      | C++ Feature | C Equivalent |
      |-------------|--------------|
      | `cout << x` | `printf("%d", x)` |
      | `new` / `delete` | `malloc()` / `free()` |
      | `class` | `struct` (no methods, no access control) |
      | `string` | `char[]` arrays + string functions |
      | References (`&`) | Pointers only |
      | `bool` | `#include <stdbool.h>` or use `int` |
      | Namespaces | None — everything is global |
      | Function overloading | Not supported |
      | Templates | Not supported |

      ### Task: Compile and run your first C program

      A file `hello.c` has been created. Look at it in the editor, then compile and run it:

      ```bash
      cd c_project
      gcc -Wall -std=c11 hello.c -o hello
      ./hello
      ```

      **Important:** We use `gcc`, not `g++`. Using `g++` would compile as C++ and mask the differences we're here to learn.

      Before you start editing code, **study the program first**. You'll learn more by reading code before writing it. Read `hello.c` carefully and identify all the differences from C++ you can spot.

      Notice:
      - `#include <stdio.h>` instead of `#include <iostream>`
      - `printf()` instead of `cout <<`
      - No `using namespace std;` — C has no namespaces

    files:
      - path: "c_project/hello.c"
        content: |
          #include <stdio.h>

          int main(void) {
              printf("=== Welcome to the Danger Zone ===\n");
              printf("No classes. No RAII. No safety net.\n");
              printf("Just you, raw memory, and a compiler.\n");
              printf("Let's go.\n");
              return 0;
          }
        language: "c"

    open_file: "c_project/hello.c"

    solution:
      commands:
        - "cd /tutorial/c_project && gcc -Wall -std=c11 hello.c -o hello && ./hello"
      explanation: |
        - **`gcc` vs `g++`:** `gcc` compiles C code. `g++` compiles C++ code. Using the wrong compiler masks important differences — C code that accidentally uses C++ features will compile under `g++` but fail under `gcc`.
        - **`-Wall`:** Enables all common warnings. In C, warnings are even more important than in C++ because C gives you far less safety by default.
        - **`-std=c11`:** Uses the C11 standard, which adds useful features like `_Bool` and anonymous structs.
        - **`int main(void)`:** In C, `int main()` means "main takes an *unspecified* number of arguments." Writing `int main(void)` explicitly says "main takes zero arguments" — this is the correct C idiom.

    tests:
      - description: "Compiled hello.c successfully"
        command: "cd /tutorial/c_project && [ -f hello ]"
      - description: "The program runs and produces output"
        command: "cd /tutorial/c_project && ./hello | grep -q 'Danger Zone'"

    quiz:
      title: "Hello C — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "In C, what is the correct way to print text to the terminal?"
          options:
            - "cout << \"hello\";"
            - "printf(\"hello\");"
            - "System.out.println(\"hello\");"
            - "print(\"hello\");"
          correct_index: 1
          explanation: "C uses `printf()` from `<stdio.h>` for output. `cout` is C++ only. C has no objects, no operator overloading, and no `<<` for I/O."

        - question: "Why do we compile with `gcc` instead of `g++` in this tutorial?"
          options:
            - "gcc produces faster binaries"
            - "g++ cannot compile .c files"
            - "gcc compiles as C — g++ would allow C++ features and hide the differences"
            - "gcc is newer than g++"
          correct_index: 2
          explanation: "g++ compiles .c files as C++, silently accepting features like references, classes, and overloading that don't exist in C. Using gcc ensures we learn real C."

        - question: "What does `int main(void)` mean in C, and how does it differ from `int main()`?"
          options:
            - "They are identical in both C and C++"
            - "`main(void)` explicitly takes zero arguments; `main()` means unspecified arguments in C"
            - "`main(void)` returns void; `main()` returns int"
            - "`main()` is invalid C syntax"
          correct_index: 1
          explanation: "In C, `int main()` means 'main can take any number of arguments' — it's an old-style declaration. `int main(void)` explicitly says 'no arguments.' In C++, both mean the same thing, but in C, the distinction matters."

        - question: "A C++ program uses `std::string name = \"Alice\"; std::cout << name.length();`. Why can't this approach work in C? (Select the **most fundamental** reason.)"
          options:
            - "C doesn't have a `length()` function"
            - "C has no objects, methods, or operator overloading — strings are raw char arrays with no built-in operations"
            - "C strings are immutable"
            - "C uses `printf` instead of `cout`, but otherwise strings work the same"
          correct_index: 1
          explanation: "The core issue isn't a missing function — it's a missing *paradigm*. C has no objects, no methods, no operator overloading. A C 'string' is just a `char[]` array. You must use standalone functions like `strlen()` from `<string.h>`. This is the fundamental shift: C gives you data and functions, not objects and methods."

        - question: |
            **Arrange** the lines to write a minimal C program that prints `"42"` to the terminal.
          type: parsons
          lines:
            - "#include <stdio.h>"
            - "int main(void) {"
            - "    printf(\"%d\\n\", 42);"
            - "    return 0;"
            - "}"
          distractors:
            - "#include <iostream>"
            - "    std::cout << 42 << std::endl;"
          explanation: "A C program needs `#include <stdio.h>` (not `<iostream>`), uses `printf` with a format specifier (not `cout`), and has the standard `int main(void)` signature. The distractors are C++ syntax that won't compile under `gcc`."

  # --------------------------------------------------------------------------
  # STEP 2: printf — Formatted Output
  # --------------------------------------------------------------------------
  - title: "printf — Formatted Output"
    instructions: |
      ### The Format String

      `printf` is C's Swiss Army knife for output. It takes a **format string** containing ordinary text and **conversion specifiers** that start with `%`:

      | Specifier | Type | Example |
      |-----------|------|---------|
      | `%d` | `int` | `printf("%d", 42)` → `42` |
      | `%f` | `double` | `printf("%f", 3.14)` → `3.140000` |
      | `%c` | `char` | `printf("%c", 'A')` → `A` |
      | `%s` | `char*` (string) | `printf("%s", "hi")` → `hi` |
      | `%p` | pointer | `printf("%p", ptr)` → `0x7fff...` |
      | `%x` | hex `int` | `printf("%x", 255)` → `ff` |
      | `%%` | literal `%` | `printf("100%%")` → `100%` |

      ### Width and Precision

      You can control formatting with **width** and **precision** modifiers:

      - `%10d` — right-align integer in a field 10 characters wide
      - `%-10s` — left-align string in a field 10 characters wide
      - `%.2f` — show exactly 2 decimal places
      - `%05d` — pad with zeros: `00042`

      ### Predict Before You Run (PRIMM)

      Before compiling, **predict** what each line in `format_lab.c` will print. Write down your predictions on paper, then compile and check. This predict-then-verify cycle is called **PRIMM** (Predict, Run, Investigate, Modify, Make) — and it's one of the most effective ways to learn a new language's quirks.

      ```bash
      gcc -Wall -std=c11 format_lab.c -o format_lab
      ./format_lab
      ```

      How many did you get right?

      ### Investigate and Modify

      Now try these modifications to deepen your understanding:

      1. **Investigate:** Change `%.2f` to `%.5f`. How many decimal places appear now?
      2. **Investigate:** What does `%+d` do? Try `printf("%+d", 42)` and `printf("%+d", -7)`.
      3. **Modify:** Add a new line that prints: `Score in hex: 0x2a` (Hint: use `%x` and the `0x` prefix).

    files:
      - path: "c_project/format_lab.c"
        content: |
          #include <stdio.h>

          int main(void) {
              int xp = 42;
              double hp = 97.5;
              char rank = 'S';
              char player[] = "xX_SlayerKing_Xx";

              // Basic specifiers
              printf("Player: %s\n", player);
              printf("XP: %d\n", xp);
              printf("HP: %f\n", hp);
              printf("Rank: %c\n", rank);

              // Width and precision
              printf("HP (1 decimal):   %.1f\n", hp);
              printf("HP (no decimals): %.0f\n", hp);
              printf("XP (zero-padded): [%05d]\n", xp);
              printf("Player (right-20):[%20s]\n", player);
              printf("Player (left-20): [%-20s]\n", player);

              // Multiple values in one call
              printf("%s: %d/%d XP (%.1f%% to next level)\n",
                     player, xp, 100, (xp / 100.0) * 100);

              return 0;
          }
        language: "c"

    open_file: "c_project/format_lab.c"

    solution:
      commands:
        - "cd /tutorial/c_project && gcc -Wall -std=c11 format_lab.c -o format_lab && ./format_lab"
      explanation: |
        - **`%f` default precision:** `printf("%f", 97.5)` prints `97.500000` — six decimal places by default. Use `%.1f` to control this.
        - **`%.0f` rounding:** `%.0f` rounds to the nearest integer: `97.5` → `98`. Note this *rounds*, not truncates.
        - **`%05d` zero-padding:** Pads with leading zeros to fill the width: `42` → `00042`.
        - **`%%` for literal percent:** Since `%` starts a format specifier, you need `%%` to print an actual `%` character.
        - **`xp / 100.0`:** Using `100.0` (not `100`) forces floating-point division. `42 / 100` would give `0` (integer division truncates).

    tests:
      - description: "Compiled format_lab.c successfully"
        command: "cd /tutorial/c_project && [ -f format_lab ]"
      - description: "The program runs and produces formatted output"
        command: "cd /tutorial/c_project && ./format_lab | grep -q '42.0%'"

    quiz:
      title: "printf — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "What does `printf(\"%.2f\", 3.14159)` print?"
          options:
            - "3.14159"
            - "3.14"
            - "3.1"
            - "3"
          correct_index: 1
          explanation: "`.2f` means 'show exactly 2 decimal places.' The value is rounded to 3.14."

        - question: "You want to print a literal `%` character. Which format string is correct?"
          options:
            - "printf(\"%\");"
            - "printf(\"%%\");"
            - "printf(\"\\%\");"
            - "printf(\"%c\", '%');"
          correct_index: 1
          explanation: "Since `%` starts a conversion specifier, the only way to print a literal `%` in printf is `%%`. Using `\\%` is not valid in C's printf (unlike some other languages)."

        - question: "What happens if you use the wrong specifier, like `printf(\"%d\", 3.14)`?"
          options:
            - "It prints 3 (truncates to int)"
            - "The compiler prevents it — compile error"
            - "Undefined behavior — the output is unpredictable garbage"
            - "It prints 3.14 anyway because printf is smart"
          correct_index: 2
          explanation: "printf reads raw bytes from the stack based on the format specifier. `%d` reads 4 bytes as an int, but 3.14 was passed as an 8-byte double. The result is undefined behavior — typically garbage output. The compiler may warn (`-Wall`) but won't stop you."

        - question: |
            **Arrange** the printf arguments to correctly print: `Player xX_SlayerKing_Xx has 42/100 XP (42.0%)`
          type: parsons
          display: inline
          lines:
            - "printf(\"Player"
            - " %s has %d/%d XP (%.1f%%%%)"
            - "\\n\","
            - "\"xX_SlayerKing_Xx\","
            - "42,"
            - "100,"
            - "42.0"
            - ");"
          distractors:
            - "%f has %s"
            - "\"42\","
          explanation: "`%s` matches the string `\"xX_SlayerKing_Xx\"`, `%d` matches ints `42` and `100`, `%.1f` matches the double `42.0`, and `%%%%` produces the literal `%%` which renders as `%`. The distractor `\"42\"` is wrong because `%d` expects an int, not a string."

        - question: "**[Interleaved: Revisit Step 1]** Which of the following C++ features does NOT exist in C?"
          options:
            - "Pointers"
            - "Structs"
            - "Function overloading"
            - "Header files"
          correct_index: 2
          explanation: "C has pointers, structs, and header files — these are shared with C++. But function overloading (two functions with the same name but different parameters) is a C++ feature. In C, every function must have a unique name."

  # --------------------------------------------------------------------------
  # STEP 3: scanf — Reading Input (and Its Dangers)
  # --------------------------------------------------------------------------
  - title: "scanf — Reading Input (and Its Dangers)"
    instructions: |
      ### scanf: The Dangerous Twin of printf

      `scanf` reads formatted input from the user. It uses the same `%` specifiers as `printf`, but with a critical difference: **scanf needs pointers** because it must *store* the input somewhere.

      ```c
      int age;
      scanf("%d", &age);   // & gives the ADDRESS of age
      ```

      The `&` (address-of operator) is required for basic types. Without it, `scanf` would receive the *value* of `age` (garbage, since it's uninitialized), interpret it as a memory address, and write to a random location — a classic undefined behavior bug.

      ### The Buffer Overflow Danger

      Reading strings with `scanf` is notoriously dangerous:

      ```c
      char name[10];
      scanf("%s", name);   // DANGER: no length limit!
      ```

      If the user types more than 9 characters, `scanf` writes past the end of the array — a **buffer overflow**. This is the exact vulnerability class that has caused thousands of real-world security exploits.

      **The safe alternative:** Use `fgets()` to read a line with a length limit:
      ```c
      fgets(name, sizeof(name), stdin);  // reads at most 9 chars + '\0'
      ```

      ### Task: Fix the vulnerable program

      The file `input_lab.c` has a buffer overflow bug. This is a **Bug Hunt** — you'll learn more from finding and fixing broken code than from writing it yourself. Let's go.

      1. Replace the dangerous `scanf("%s", ...)` with `fgets()`.
      2. Compile with `gcc -Wall -std=c11 input_lab.c -o input_lab`.
      3. Run `./input_lab` and test it.

      **Hint:** `fgets` includes the newline character `\n` in the buffer. The provided `strip_newline` helper removes it.

    files:
      - path: "c_project/input_lab.c"
        content: |
          #include <stdio.h>
          #include <string.h>

          // Helper: remove trailing newline from fgets input
          void strip_newline(char *str) {
              size_t len = strlen(str);
              if (len > 0 && str[len - 1] == '\n') {
                  str[len - 1] = '\0';
              }
          }

          int main(void) {
              char server[20];
              int players;

              printf("Enter server name: ");
              // BUG: scanf with %s has no length limit — buffer overflow!
              scanf("%s", server);

              printf("Enter player count: ");
              scanf("%d", &players);

              printf("Server %s: %d players online.\n", server, players);
              return 0;
          }
        language: "c"

    open_file: "c_project/input_lab.c"

    watch_files:
      - "c_project/input_lab.c"

    solution:
      files:
        - path: "c_project/input_lab.c"
          content: |
            #include <stdio.h>
            #include <string.h>

            // Helper: remove trailing newline from fgets input
            void strip_newline(char *str) {
                size_t len = strlen(str);
                if (len > 0 && str[len - 1] == '\n') {
                    str[len - 1] = '\0';
                }
            }

            int main(void) {
                char server[20];
                int players;

                printf("Enter server name: ");
                fgets(server, sizeof(server), stdin);
                strip_newline(server);

                printf("Enter player count: ");
                scanf("%d", &players);

                printf("Server %s: %d players online.\n", server, players);
                return 0;
            }
          language: "c"
      explanation: |
        - **`fgets(server, sizeof(server), stdin)`:** Reads at most `sizeof(server) - 1` characters (19), leaving room for the null terminator `\0`. This prevents buffer overflow.
        - **`sizeof(server)`** returns 20 (the array size). `fgets` uses this to cap input length.
        - **`strip_newline`:** `fgets` includes the `\n` in the buffer, unlike `scanf`. We must manually remove it.
        - **Why `scanf("%d", &players)` is still OK:** For integers, `scanf` reads digits until it hits a non-digit. There's no buffer to overflow — it just writes a single `int`. The risk is only with `%s` (strings).

    tests:
      - description: "Replaced scanf %s with fgets for the server name"
        command: "cd /tutorial/c_project && grep -q 'fgets' input_lab.c"
      - description: "The program compiles without warnings"
        command: "cd /tutorial/c_project && gcc -Wall -std=c11 input_lab.c -o input_lab 2>&1 | grep -v '^$' | wc -l | grep -q '^0$'"
      - description: "The program runs correctly with test input"
        command: "cd /tutorial/c_project && echo -e 'Azeroth\n5000' | ./input_lab | grep -q 'Azeroth'"

    quiz:
      title: "scanf — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "Why does `scanf(\"%d\", &age)` need the `&` before `age`?"
          options:
            - "& converts age from int to string"
            - "scanf needs the memory ADDRESS where it should store the result"
            - "& is optional — it works either way"
            - "& tells scanf to read from a file instead of stdin"
          correct_index: 1
          explanation: "scanf must *write* the parsed value somewhere. `&age` provides the memory address of `age`. Without `&`, scanf would interpret the current (garbage) value of `age` as an address — undefined behavior."

        - question: "What is the specific danger of `scanf(\"%s\", buffer)` when the user types more characters than `buffer` can hold?"
          options:
            - "scanf truncates the input automatically"
            - "The program prints an error and stops"
            - "Buffer overflow — scanf writes past the end of the array, corrupting memory"
            - "The extra characters are silently discarded"
          correct_index: 2
          explanation: "scanf with `%s` has no built-in length limit. It keeps writing characters until it sees whitespace, potentially overwriting adjacent memory. This is a classic security vulnerability."

        - question: "`fgets(buf, 20, stdin)` reads at most how many characters into `buf`?"
          options:
            - "20 characters"
            - "19 characters (reserves 1 byte for the null terminator)"
            - "21 characters (20 plus the newline)"
            - "It reads until newline, regardless of the size argument"
          correct_index: 1
          explanation: "fgets reads at most `size - 1` characters, reserving the last byte for `\\0`. So `fgets(buf, 20, stdin)` reads at most 19 characters. This is what makes it safe — unlike scanf, it respects the buffer boundary."

        - question: |
            **Arrange** the lines to safely read a username (max 50 chars) and print a greeting.
          type: parsons
          lines:
            - "char username[50];"
            - "printf(\"Enter name: \");"
            - "fgets(username, sizeof(username), stdin);"
            - "strip_newline(username);"
            - "printf(\"Hello, %s!\\n\", username);"
          distractors:
            - "scanf(\"%s\", username);"
            - "gets(username);"
          explanation: "Declare the buffer first, prompt the user, read safely with `fgets` (which limits input to `sizeof(username) - 1` chars), strip the trailing newline that `fgets` includes, then print. `scanf(\"%s\")` and `gets()` are both unsafe — `gets` was removed from the C standard entirely because it cannot be used safely."

        - question: "**[Interleaved: Revisit Step 2]** What does `printf(\"%05d\", 42)` print?"
          options:
            - "   42 (3 spaces then 42)"
            - "00042"
            - "42000"
            - "42.00"
          correct_index: 1
          explanation: "The `0` flag means 'pad with zeros instead of spaces,' and `5` is the field width. So 42 gets zero-padded to 5 digits: `00042`. Without the `0` flag, `%5d` would give `   42` (space-padded)."

  # --------------------------------------------------------------------------
  # STEP 4: Pointers and malloc — Manual Memory Management
  # --------------------------------------------------------------------------
  - title: "Pointers and malloc — Manual Memory Management"
    instructions: |
      ### No new/delete — Welcome to malloc/free

      Pointer and memory errors are the most common bugs in C programs. When researchers tracked real CS2 students, they found that **74% created memory leaks**, **70% dereferenced dead pointers**, and **57% dereferenced null pointers** — and most of these errors were completely silent. No crash, no warning, just corrupted memory that manifests as mysterious bugs way later. Spooky.

      This step teaches you the discipline that prevents these errors.

      In C++, you allocate heap memory with `new` and release it with `delete`. C uses lower-level functions from `<stdlib.h>`:

      | C++ | C |
      |-----|---|
      | `int *p = new int;` | `int *p = malloc(sizeof(int));` |
      | `int *a = new int[10];` | `int *a = malloc(10 * sizeof(int));` |
      | `delete p;` | `free(p);` |
      | `delete[] a;` | `free(a);` |

      ### Key Differences from C++

      1. **`malloc` returns `void*`** — in C, this implicitly converts to any pointer type (no cast needed). Don't add a cast; it hides bugs.
      2. **`malloc` does NOT initialize memory** — the bytes are garbage. Use `calloc()` if you need zeroed memory.
      3. **`malloc` can fail** — it returns `NULL` if there's no memory. Always check.
      4. **No constructors** — `malloc` just gives you raw bytes. You must initialize fields yourself.

      ### The Pointer Lifecycle: A Mental Model

      Here's a mental model that will save you hours of debugging. Every pointer variable is in one of **four states**:

      ```
      ┌──────────────┐   malloc()   ┌───────┐
      │ Uninitialized │────────────▶│ Alive │
      └──────────────┘             └───┬───┘
                                       │
                              free()   │   = NULL
                                 ┌─────┴─────┐
                                 ▼           ▼
                             ┌──────┐   ┌──────┐
                             │ Dead │   │ Null │
                             └──────┘   └──────┘
      ```

      | State | Meaning | Safe Operations |
      |-------|---------|-----------------|
      | **Uninitialized** | Declared but not assigned | None — using it is undefined behavior |
      | **Alive** | Points to valid, allocated memory | Dereference (`*p`), member access (`p->x`), free |
      | **Null** | Explicitly set to `NULL` | Compare (`p == NULL`), reassign |
      | **Dead** | Was freed — memory returned to OS | **Nothing!** Accessing a dead pointer is use-after-free |

      The most dangerous transition is **Alive → Dead** (via `free()`), because the pointer variable *still holds the old address* — it just doesn't point to valid memory anymore. The pointer looks fine, but the memory behind it is gone. This is why 70% of students hit use-after-free bugs. **Pro tip:** set pointers to `NULL` immediately after freeing them.

      ### Task: Build a dynamic array

      Complete the program in `memory_lab.c`:

      1. Allocate an array of `count` integers using `malloc`.
      2. Check if `malloc` returned `NULL`.
      3. Fill the array with squares: `arr[i] = i * i`.
      4. Print the array.
      5. **Free the memory** when done.

      ```bash
      gcc -Wall -std=c11 memory_lab.c -o memory_lab
      ./memory_lab
      ```

    files:
      - path: "c_project/memory_lab.c"
        content: |
          #include <stdio.h>
          #include <stdlib.h>

          int main(void) {
              int count = 5;

              // Sub-goal 1: Allocate heap memory
              // Use malloc(count * sizeof(int)) to request space for 'count' ints
              int *squares = NULL;  // Replace NULL with your malloc call

              // Sub-goal 2: Validate allocation
              // Check if malloc returned NULL (out of memory). If so, print error and exit.

              // Sub-goal 3: Initialize data
              // Fill array with squares: squares[i] = i * i

              // Print the array
              printf("Squares:");
              for (int i = 0; i < count; i++) {
                  printf(" %d", squares[i]);
              }
              printf("\n");

              // Sub-goal 4: Release memory
              // Every malloc must have a matching free

              return 0;
          }
        language: "c"

    open_file: "c_project/memory_lab.c"

    watch_files:
      - "c_project/memory_lab.c"

    solution:
      files:
        - path: "c_project/memory_lab.c"
          content: |
            #include <stdio.h>
            #include <stdlib.h>

            int main(void) {
                int count = 5;

                // Allocate an array of 'count' ints with malloc
                int *squares = malloc(count * sizeof(int));

                // Check if malloc failed (returned NULL)
                if (squares == NULL) {
                    fprintf(stderr, "malloc failed\n");
                    return 1;
                }

                // Fill array with squares (arr[i] = i * i)
                for (int i = 0; i < count; i++) {
                    squares[i] = i * i;
                }

                // Print the array
                printf("Squares:");
                for (int i = 0; i < count; i++) {
                    printf(" %d", squares[i]);
                }
                printf("\n");

                // Free the allocated memory
                free(squares);

                return 0;
            }
          language: "c"
      explanation: |
        - **`malloc(count * sizeof(int))`:** Allocates `count * 4` bytes (on most systems, `sizeof(int)` is 4). Always use `sizeof` — never hardcode sizes.
        - **No cast needed:** In C, `void*` implicitly converts to `int*`. Writing `(int*)malloc(...)` is a C++ habit — in C it can hide the bug of forgetting `#include <stdlib.h>`.
        - **NULL check:** `malloc` returns `NULL` if the system is out of memory. Dereferencing `NULL` is undefined behavior (usually a segfault).
        - **`free(squares)`:** Every `malloc` must have a matching `free`. Forgetting to free causes a **memory leak**. In C, there is no garbage collector.
        - **`fprintf(stderr, ...)`:** Error messages should go to stderr, not stdout.

    tests:
      - description: "Uses malloc to allocate memory"
        command: "cd /tutorial/c_project && grep -q 'malloc' memory_lab.c"
      - description: "Checks for NULL after malloc"
        command: "cd /tutorial/c_project && grep -q 'NULL' memory_lab.c"
      - description: "Frees the allocated memory"
        command: "cd /tutorial/c_project && grep -q 'free' memory_lab.c"
      - description: "Program compiles and produces correct output"
        command: "cd /tutorial/c_project && gcc -Wall -std=c11 memory_lab.c -o memory_lab && ./memory_lab | grep -q 'Squares: 0 1 4 9 16'"

    quiz:
      title: "malloc/free — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "What does `malloc(10 * sizeof(int))` return?"
          options:
            - "An array of 10 integers initialized to zero"
            - "A pointer to 40 bytes of uninitialized memory (or NULL on failure)"
            - "An integer with value 10"
            - "A pointer to 10 bytes of memory"
          correct_index: 1
          explanation: "malloc allocates raw, uninitialized bytes and returns a pointer. `10 * sizeof(int)` = 40 bytes (assuming 4-byte ints). Unlike `calloc`, malloc does NOT zero-initialize. It returns NULL if allocation fails."

        - question: "In C, should you cast the return value of `malloc`? E.g., `int *p = (int*)malloc(...);`"
          options:
            - "Yes — C requires the cast just like C++"
            - "No — in C, void* implicitly converts to any pointer type, and the cast can hide bugs"
            - "Yes — otherwise you get a compile error"
            - "It doesn't matter either way"
          correct_index: 1
          explanation: "In C, `void*` implicitly converts to any pointer type — no cast needed. Adding a cast like `(int*)` can mask the bug of forgetting `#include <stdlib.h>`, because without the header, the compiler assumes `malloc` returns `int` (in older C standards), and the cast silently converts the wrong type."

        - question: "What happens if you forget to call `free()` on malloc'd memory?"
          options:
            - "The program crashes immediately"
            - "Nothing — the OS reclaims it when the process exits"
            - "Memory leak — the memory stays allocated, reducing available RAM; in long-running programs this is a serious bug"
            - "The compiler warns you"
          correct_index: 2
          explanation: "While the OS does reclaim memory on process exit, memory leaks in long-running programs (servers, daemons) gradually consume all available RAM. In C, there is no garbage collector — you are responsible for every byte you allocate."

        - question: |
            **Arrange** the lines to dynamically allocate an array of 100 doubles, check for failure, use it, and clean up.
          type: parsons
          lines:
