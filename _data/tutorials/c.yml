              return 0; // Replace this
          }

          int main(void) {
              int data[] = {42, 17, 93, 8, 56, 31, 74};
              int n = sizeof(data) / sizeof(data[0]);

              printf("Original: ");
              print_array(data, n);

              qsort(data, n, sizeof(int), compare_ascending);
              printf("Ascending: ");
              print_array(data, n);

