    solution:
      files:
        - path: "c_project/fileio_lab.c"
          content: |
            #include <stdio.h>
            #include <string.h>

            int main(void) {
                // === PART 1: Write words to a file ===
                FILE *fp = fopen("words.txt", "w");
                if (fp == NULL) {
                    perror("fopen failed");
                    return 1;
                }

                const char *words[] = {"hello", "world", "from", "C", "file", "I/O"};
                int num_words = sizeof(words) / sizeof(words[0]);

                for (int i = 0; i < num_words; i++) {
                    fprintf(fp, "%s\n", words[i]);
                }

                fclose(fp);
                printf("Wrote %d words to words.txt\n", num_words);

                // === PART 2: Read the file back and count lines ===
                fp = fopen("words.txt", "r");
                if (fp == NULL) {
                    perror("fopen failed");
                    return 1;
                }

                char line[100];
                int line_count = 0;

                while (fgets(line, sizeof(line), fp) != NULL) {
                    line_count++;
                }

                fclose(fp);

                printf("Read back %d lines from words.txt\n", line_count);
                return 0;
            }
          language: "c"
      explanation: |
        - **`fopen("words.txt", "w")`:** Opens the file for writing. `"w"` creates the file if it doesn't exist, or truncates it if it does. Always check the return value — it's NULL on failure.
        - **`perror("fopen failed")`:** Prints your message plus the system error (e.g., "fopen failed: No such file or directory"). Much more informative than a generic error.
        - **`fprintf(fp, "%s\n", words[i])`:** Exactly like `printf`, but writes to the file instead of stdout. The `FILE*` is the first argument.
        - **`fgets(line, sizeof(line), fp)`:** Reads one line (up to 99 chars + null terminator). Returns `NULL` at end-of-file — this is the loop termination condition.
        - **`fclose(fp)`:** Flushes any buffered writes and releases the file descriptor. Always close files when done. In C, there is no automatic cleanup — forgetting `fclose` can cause data loss.
        - **Reusing `fp`:** We reuse the same `FILE*` variable for both open calls. After `fclose(fp)`, the old handle is invalid, so reassigning `fp` is safe and clean.

