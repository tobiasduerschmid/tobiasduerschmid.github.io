            - 1
            - 2
            - 3
          explanation: "The linked list integrates everything: structs (Node), malloc/free (allocation/cleanup), pointers (traversal, next-links, pass-by-reference), and printf/scanf (I/O). This is why it's the capstone — it requires fluency in all the component skills."
