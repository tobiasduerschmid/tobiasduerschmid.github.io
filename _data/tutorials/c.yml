          explanation: "The sequence is: (1) allocate with `malloc`, (2) check for NULL, (3) use the memory, (4) print, (5) free. The distractors use C++ syntax (`new`/`delete[]`), which doesn't exist in C."

        - question: "**[Interleaved: Revisit Step 3]** You write `scanf(\"%d\", age)` (without `&`). What happens?"
