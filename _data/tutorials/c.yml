    open_file: "c_project/linked_list.c"

    watch_files:
      - "c_project/linked_list.c"

    solution:
      files:
        - path: "c_project/linked_list.c"
          content: |
            #include <stdio.h>
            #include <stdlib.h>

            typedef struct Node {
                int value;
                struct Node *next;
            } Node;

            Node *node_create(int value) {
                Node *n = malloc(sizeof(Node));
                if (n == NULL) return NULL;
                n->value = value;
                n->next = NULL;
                return n;
            }

            void list_print(const Node *head) {
                const Node *curr = head;
                while (curr != NULL) {
                    printf("%d", curr->value);
                    if (curr->next != NULL) printf(" ");
                    curr = curr->next;
                }
                printf("\n");
            }

            void list_free(Node *head) {
                Node *curr = head;
                while (curr != NULL) {
                    Node *next = curr->next;
                    free(curr);
                    curr = next;
                }
            }

            int main(void) {
                int n;
                printf("Enter count: ");
                scanf("%d", &n);

                Node *head = NULL;
                Node *tail = NULL;

                for (int i = 0; i < n; i++) {
                    int val;
                    printf("Enter value: ");
                    scanf("%d", &val);

                    Node *new_node = node_create(val);
                    if (new_node == NULL) {
                        fprintf(stderr, "malloc failed\n");
                        list_free(head);
                        return 1;
                    }

                    if (head == NULL) {
                        head = new_node;
                        tail = new_node;
                    } else {
                        tail->next = new_node;
                        tail = new_node;
                    }
                }

                printf("List: ");
                list_print(head);
                list_free(head);

                return 0;
            }
          language: "c"
      explanation: |
        - **`node_create`:** Allocates a `Node`, checks for `NULL`, initializes fields, returns it. This is C's equivalent of a constructor.
        - **`list_print`:** Walks the list using `curr = curr->next` until `curr` is `NULL`. This is the fundamental linked list traversal pattern.
        - **`list_free`:** The trickiest part — you must save `curr->next` *before* calling `free(curr)`, because after `free`, the memory at `curr` is invalid. Accessing `curr->next` after `free(curr)` is a **use-after-free** bug.
        - **Tail insertion:** We track both `head` and `tail` pointers. New nodes go at the tail, preserving insertion order. Without a `tail` pointer, each insertion would require walking the entire list — O(n) per insert.
        - **Error handling:** If `malloc` fails mid-list, we free all previously allocated nodes before exiting. This prevents memory leaks even on failure paths.

    tests:
      - description: "Implemented node_create with malloc"
        command: "cd /tutorial/c_project && grep -A5 'node_create' linked_list.c | grep -q 'malloc'"
      - description: "Implemented list_print that traverses the list"
        command: "cd /tutorial/c_project && grep -A8 'list_print' linked_list.c | grep -q 'curr.*next\\|->next'"
      - description: "Implemented list_free that saves next before freeing"
        command: "cd /tutorial/c_project && grep -A8 'list_free' linked_list.c | grep -q 'free'"
      - description: "Program compiles and produces correct output"
        command: "cd /tutorial/c_project && gcc -Wall -std=c11 linked_list.c -o linked_list && echo '4 10 20 30 40' | ./linked_list | grep -q 'List: 10 20 30 40'"

    quiz:
      title: "Linked List & Integration — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "Why must you save `curr->next` BEFORE calling `free(curr)` in `list_free`?"
          options:
            - "free() modifies the next pointer to NULL"
            - "After free(curr), the memory at curr is released — accessing curr->next is a use-after-free bug (undefined behavior)"
            - "free() returns the next pointer automatically"
            - "It's a style convention — either order works"
          correct_index: 1
          explanation: "After `free(curr)`, the memory is returned to the allocator. Any access to `curr->next` is undefined behavior — the allocator may have already overwritten that memory, or the page may be unmapped. Always save what you need before freeing."

        - question: "In `typedef struct Node { ... struct Node *next; } Node;`, why do we need both the struct tag `Node` and the typedef name `Node`?"
          options:
            - "They serve the same purpose — either one would work"
            - "The struct must reference itself using the struct tag (`struct Node *next`) because the typedef isn't complete until the closing `}`"
            - "The typedef must match the struct tag name"
            - "The struct tag is for the compiler, the typedef is for the linker"
          correct_index: 1
          explanation: "Inside the struct definition, the typedef `Node` doesn't exist yet — it's defined at the closing brace. So self-referential structs must use the tag name `struct Node`. The typedef `Node` only becomes available after the full definition is complete."

        - question: |
            **Arrange** the lines to free a linked list without leaking memory or causing use-after-free.
          type: parsons
          lines:
            - "Node *curr = head;"
            - "while (curr != NULL) {"
            - "    Node *next = curr->next;"
            - "    free(curr);"
            - "    curr = next;"
            - "}"
          distractors:
            - "    curr = curr->next;"
            - "    free(next);"
          explanation: "Save `curr->next` into a temp variable BEFORE freeing `curr`. Then advance to the saved `next`. The distractor `curr = curr->next` after `free(curr)` is a use-after-free bug — the most common mistake. `free(next)` would free the wrong node."

        - question: |
            **Arrange** the lines to create a node, insert it at the tail of a linked list, and update the tail pointer.
          type: parsons
          lines:
            - "Node *new_node = malloc(sizeof(Node));"
            - "new_node->value = val;"
            - "new_node->next = NULL;"
            - "tail->next = new_node;"
            - "tail = new_node;"
          distractors:
            - "new_node->next = tail;"
            - "head = new_node;"
          explanation: "Allocate a new node, set its value, set its next to NULL (it's the new tail). Link it to the current tail with `tail->next = new_node`, then update the tail pointer. `new_node->next = tail` would create a circular reference (wrong direction). `head = new_node` would lose the rest of the list."

        - question: "**[Final Integration]** Which of the following C features have you used in the linked list program? (Select all that apply)"
          type: multiple
