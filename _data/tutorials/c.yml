    quiz:
      title: "File I/O — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "What happens if you open an existing file with `fopen(\"data.txt\", \"w\")`?"
          options:
            - "The file is opened for reading"
            - "The existing contents are preserved, and new writes are appended"
            - "The existing contents are DESTROYED — the file is truncated to zero length"
            - "fopen returns NULL because the file already exists"
          correct_index: 2
          explanation: "The `\"w\"` mode truncates the file to zero length before writing. This is a common source of data loss. If you want to add to an existing file, use `\"a\"` (append mode) instead."

        - question: "What does `fgets(buf, 100, fp)` return when it reaches the end of the file?"
          options:
            - "An empty string"
            - "The number of bytes read"
            - "NULL"
            - "EOF (a special integer constant)"
          correct_index: 2
          explanation: "`fgets` returns `NULL` when there is nothing more to read (end-of-file or error). This is why the standard reading loop is `while (fgets(buf, size, fp) != NULL)`. Note: `EOF` is used with character-level functions like `fgetc`, not with `fgets`."

        - question: "Why is it important to call `fclose()` on every file you open?"
          options:
            - "It's just good style — the OS closes files automatically when the program exits"
            - "Buffered writes may not be flushed to disk without fclose, causing data loss; also prevents file descriptor leaks"
            - "fclose frees the memory used by the file contents"
            - "fclose is only needed for files opened in write mode"
          correct_index: 1
          explanation: "C I/O is buffered — `fprintf` writes to an in-memory buffer, not directly to disk. `fclose` flushes this buffer. Without it, the last writes may never reach the file. Additionally, each open file uses a file descriptor, and the OS limits how many a process can hold."

        - question: |
            **Arrange** the lines to safely read all lines from a file and print them with line numbers.
          type: parsons
          lines:
            - "FILE *fp = fopen(\"input.txt\", \"r\");"
            - "if (fp == NULL) { perror(\"open\"); return 1; }"
            - "char buf[256];"
            - "int n = 1;"
            - "while (fgets(buf, sizeof(buf), fp) != NULL) {"
            - "    printf(\"%d: %s\", n++, buf);"
            - "}"
            - "fclose(fp);"
          distractors:
            - "while (!feof(fp)) {"
            - "fp.close();"
          explanation: "Open the file, check for NULL, declare buffer and counter, loop with `fgets` (which returns NULL at EOF), print each line with its number, then close. The distractor `while (!feof(fp))` is a classic C bug — `feof` only returns true *after* a read fails, causing the last line to be processed twice. `fp.close()` is C++/Java syntax — C uses `fclose(fp)`."

        - question: "**[Interleaved: Revisit Step 3]** How is `fprintf(fp, \"%s\\n\", word)` related to `printf(\"%s\\n\", word)`?"
          options:
            - "They are completely different functions with different syntax"
            - "fprintf writes to a file (FILE*); printf writes to stdout. Otherwise identical format strings."
            - "fprintf is safer because it does bounds checking"
            - "printf is a macro that calls fprintf(stdout, ...) internally"
          correct_index: 1
          explanation: "In fact, `printf(...)` is essentially `fprintf(stdout, ...)`. The C standard I/O library uses the same formatting engine for both. `stdout`, `stdin`, and `stderr` are all `FILE*` pointers — they're just pre-opened for you."

  # --------------------------------------------------------------------------
  # STEP 11: Putting It All Together — A Linked List in C (Capstone)
  # --------------------------------------------------------------------------
  - title: "Putting It All Together — A Linked List in C"
    instructions: |
      ### The Final Challenge: Build a Linked List

      Now you'll combine everything you've learned — structs, pointers, malloc, free, printf, and scanf — to build a **singly linked list** from scratch.

      This exercise deliberately removes all scaffolding. You've practiced each component skill individually; now you must integrate them.

      **This step is hard — and that's the point.** If you get stuck, that doesn't mean you're bad at C. It means you're doing real systems programming. Professional C developers debug linked list code regularly. When you're stuck, go back and re-read the specific step that covers the concept you're struggling with. The component skills you've built are all here — the challenge is combining them.

      **Why linked lists are the ultimate pointer test:** Research tracking real student code found three categories of pointer errors that account for nearly all bugs (Adcock et al., 2007):

      | Error Category | % of Students Who Make It |
      |----------------|--------------------------|
      | Memory leak (pointer leaves scope without free) | 74% |
      | Dereferencing a dead pointer (use-after-free) | 70% |
      | Dereferencing a null pointer | 57% |

      Building a linked list exercises all three. Pay special attention to freeing nodes and checking for NULL.

      ### Requirements

      Your program should:

      1. **Read an integer `n`** from stdin (how many values to insert).
      2. **Read `n` integers** and insert each into a linked list.
      3. **Print the list** (space-separated values, then a newline).
      4. **Free all memory** — every node must be deallocated.

      ### The Node Struct

      ```c
      typedef struct Node {
          int value;
          struct Node *next;
      } Node;
      ```

      Note: For recursive (self-referencing) structs, you **must** name the struct (`struct Node`) and use `struct Node *next` inside — because `Node` (the typedef) isn't defined yet at that point.

      ### Example Run

      ```
      Enter count: 4
      Enter value: 10
      Enter value: 20
      Enter value: 30
      Enter value: 40
      List: 10 20 30 40
      ```

      ### Hints

      - To **insert at the tail**, track a `tail` pointer.
      - `malloc(sizeof(Node))` allocates one node.
      - Set `new_node->next = NULL` for the last node.
      - To **free the list**, walk through and free each node — but save `next` *before* calling `free`!

      ```bash
      gcc -Wall -std=c11 linked_list.c -o linked_list
      echo "4 10 20 30 40" | ./linked_list
      ```

