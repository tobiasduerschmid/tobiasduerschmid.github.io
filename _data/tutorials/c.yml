  # --------------------------------------------------------------------------
  # STEP 5: C Strings — char Arrays, Not Objects
  # --------------------------------------------------------------------------
  - title: "C Strings — char Arrays, Not Objects"
    instructions: |
      ### Strings in C Are Just char Arrays

      In C++, `std::string` handles memory, length tracking, and concatenation for you. In C, a "string" is just an array of `char` terminated by a null byte `'\0'`:

      ```
      char name[] = "Alice";
      // Memory layout: ['A']['l']['i']['c']['e']['\0']
      //                  [0]  [1]  [2]  [3]  [4]  [5]
      ```

      The null terminator `'\0'` marks where the string ends. Every string function (`strlen`, `printf %s`, etc.) scans forward until it hits `'\0'`. **If you forget the null terminator, functions will read past the end of your array** — undefined behavior.

      ### String Functions (from `<string.h>`)

      | Function | Purpose | Gotcha |
      |----------|---------|--------|
      | `strlen(s)` | Returns length (not counting `'\0'`) | O(n) — scans for `'\0'` every time |
      | `strcpy(dst, src)` | Copies src into dst | **No bounds checking!** Use `strncpy` |
      | `strcat(dst, src)` | Appends src to dst | **No bounds checking!** |
      | `strcmp(a, b)` | Compares: returns 0 if equal | You CANNOT use `==` to compare strings |
      | `strncpy(dst, src, n)` | Copies at most n chars | May NOT null-terminate if src >= n |

      ### "False Friends" from C++

      Research on language transfer (Du et al., 2025, CSEE&T) found that C++ students transitioning to C-like string handling exhibit a specific form of **negative transfer**: they try to process strings character-by-character using array indexing (a C habit) even when higher-level functions exist, and they forget that C strings require manual null-termination. The study calls these "false friends" — syntax that *looks* the same but behaves differently. For example, `+` concatenates `std::string` in C++, but in C, `+` on `char*` does pointer arithmetic, not concatenation. You must use `strcat()` instead.

      ### The #1 Mistake: Using `==` to Compare Strings

      ```c
      if (name == "Alice")  // WRONG! Compares pointer addresses, not contents
      if (strcmp(name, "Alice") == 0)  // CORRECT! Compares character-by-character
      ```

      ### Task: Fix the string bugs

      The file `strings_lab.c` has three bugs related to C strings. Find and fix all of them:

      1. A string comparison using `==` instead of `strcmp`
      2. An unsafe `strcpy` that should use `strncpy`
      3. A missing null terminator after `strncpy`

      ```bash
      gcc -Wall -std=c11 strings_lab.c -o strings_lab
      ./strings_lab
      ```

    files:
      - path: "c_project/strings_lab.c"
        content: |
          #include <stdio.h>
          #include <string.h>

          int main(void) {
              // Bug 1: comparing strings with ==
              char lang[] = "C";
              if (lang == "C") {
                  printf("Language is C\n");
              } else {
                  printf("Language is not C\n");
              }

              // Bug 2: strcpy with no size limit
              char dest[8];
              char src[] = "A very long string that overflows the buffer";
              strcpy(dest, src);
              printf("Copied: %s\n", dest);

              // Bug 3: strncpy may not null-terminate
              char abbrev[4];
              strncpy(abbrev, "Pittsburgh", sizeof(abbrev));
              printf("Abbreviation: %s\n", abbrev);

              return 0;
          }
        language: "c"

    open_file: "c_project/strings_lab.c"

    watch_files:
      - "c_project/strings_lab.c"

    solution:
      files:
        - path: "c_project/strings_lab.c"
          content: |
            #include <stdio.h>
            #include <string.h>

            int main(void) {
                // Fixed Bug 1: use strcmp instead of ==
                char lang[] = "C";
                if (strcmp(lang, "C") == 0) {
                    printf("Language is C\n");
                } else {
                    printf("Language is not C\n");
                }

                // Fixed Bug 2: use strncpy with size limit
                char dest[8];
                char src[] = "A very long string that overflows the buffer";
                strncpy(dest, src, sizeof(dest) - 1);
                dest[sizeof(dest) - 1] = '\0';
                printf("Copied: %s\n", dest);

                // Fixed Bug 3: manually null-terminate after strncpy
                char abbrev[4];
                strncpy(abbrev, "Pittsburgh", sizeof(abbrev) - 1);
                abbrev[sizeof(abbrev) - 1] = '\0';
                printf("Abbreviation: %s\n", abbrev);

                return 0;
            }
          language: "c"
      explanation: |
        - **Bug 1:** `==` compares *pointer addresses*, not string contents. `strcmp` returns 0 when strings match.
        - **Bug 2:** `strcpy` copies without limit — classic buffer overflow. `strncpy(dest, src, sizeof(dest) - 1)` limits the copy, and we manually add `'\0'`.
        - **Bug 3:** If `src` is longer than `n`, `strncpy` does NOT add a null terminator. You must always ensure the last byte is `'\0'`.
        - **Why `sizeof(dest) - 1`?** Reserve one byte for the null terminator. `sizeof` returns the total array size (8), so we copy at most 7 characters plus `'\0'`.

    tests:
      - description: "Uses strcmp for string comparison (not ==)"
        command: "cd /tutorial/c_project && grep -q 'strcmp' strings_lab.c"
      - description: "Uses strncpy instead of strcpy for the long string copy"
        command: "cd /tutorial/c_project && grep 'strncpy.*dest' strings_lab.c | head -1 | grep -q 'strncpy'"
      - description: "Manually null-terminates after strncpy"
        command: "cd /tutorial/c_project && grep -q \"'..0'\" strings_lab.c || grep -q \"'\\\\0'\" strings_lab.c"
      - description: "Program compiles and runs without crashing"
        command: "cd /tutorial/c_project && gcc -Wall -std=c11 strings_lab.c -o strings_lab && ./strings_lab | grep -q 'Language is C'"

    quiz:
      title: "C Strings — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "What is the length of the string `\"Hello\"` in memory (including the null terminator)?"
          options:
            - "5 bytes"
            - "6 bytes"
            - "7 bytes"
            - "It depends on the system"
          correct_index: 1
          explanation: "'Hello' has 5 visible characters, plus the invisible `\\0` null terminator = 6 bytes total. `strlen(\"Hello\")` returns 5 (it doesn't count `\\0`), but the array needs 6 bytes of storage."

        - question: "Why can't you use `==` to compare C strings?"
          options:
            - "`==` is only for integers"
            - "`==` compares the pointer addresses, not the actual characters"
            - "`==` triggers a compilation error on char arrays"
            - "`==` compares only the first character"
          correct_index: 1
          explanation: "In C, a string is an array, and array names decay to pointers. `str1 == str2` compares whether both pointers refer to the *same memory address*, not whether the characters match. Use `strcmp(str1, str2) == 0` to compare contents."

        - question: |
            **Arrange** the lines to safely copy a string from `src` into `dest` (size 20), ensuring null-termination.
          type: parsons
          lines:
            - "char dest[20];"
            - "char *src = \"Hello, World!\";"
            - "strncpy(dest, src, sizeof(dest) - 1);"
            - "dest[sizeof(dest) - 1] = '\\0';"
            - "printf(\"%s\\n\", dest);"
          distractors:
            - "strcpy(dest, src);"
            - "dest = src;"
          explanation: "Declare the buffer, define the source, copy safely with `strncpy` (reserving space for `\\0`), manually null-terminate, then print. `strcpy` has no size limit (unsafe). `dest = src` doesn't copy — it just changes the pointer (and is illegal for arrays)."

        - question: "**[Interleaved: Revisit Step 4]** After `char *s = malloc(50);`, what is the content of the 50 bytes?"
          options:
            - "All zeros"
            - "All null characters (\\0)"
            - "Uninitialized — garbage values from whatever was in that memory before"
            - "Empty string"
          correct_index: 2
          explanation: "malloc returns uninitialized memory. The bytes could be anything — remnants of previous allocations. If you need zeroed memory, use `calloc(50, 1)` instead. For a string buffer, you must at minimum set `s[0] = '\\0'` before using it with string functions."

  # --------------------------------------------------------------------------
  # STEP 6: Structs — C's Classes (Without Methods)
  # --------------------------------------------------------------------------
  - title: "Structs — C's Classes (Without Methods)"
    instructions: |
      ### C Has No Classes — Only Structs

      In C++, `class` and `struct` are nearly identical (differing only in default access). In C, `struct` is all you have, and it's much more limited:

      - **No methods** — functions that operate on a struct are standalone
      - **No access control** — no `private`, `protected`, or `public`
      - **No constructors/destructors** — you write init/cleanup functions yourself
      - **No inheritance** — you can nest structs for composition

      ### Declaring and Using Structs

      ```c
      struct Point {
          double x;
          double y;
      };

      // Without typedef, you must write 'struct Point' everywhere:
      struct Point p1;
      p1.x = 3.0;
      p1.y = 4.0;
      ```

      ### typedef Saves Typing

      ```c
      typedef struct {
          double x;
          double y;
      } Point;

      // Now you can just write 'Point':
      Point p1 = {3.0, 4.0};
      ```

      ### The Arrow Operator (->)

      When you have a **pointer to a struct**, use `->` instead of `.`:

      ```c
      Point *pp = &p1;
      pp->x = 5.0;       // same as (*pp).x = 5.0
      ```

      ### Task: Build a Student record system

      Complete `structs_lab.c` to create a `Student` struct and functions that operate on it. This is how you do "object-oriented" programming in C — structs hold data, standalone functions provide behavior.

      Research on teaching well-structured code emphasizes that **scaffolded code-writing tasks** — where students fill in parts of an existing structure rather than starting from a blank file — are among the most effective instructional approaches (Nurollahian et al., 2025, CSEE&T). That's why this exercise provides the `main()` function and asks you to implement the struct and its associated functions.

      1. Define the `Student` struct using `typedef`.
      2. Implement `student_init` to populate a student.
      3. Implement `student_print` to display a student's info.

      ```bash
      gcc -Wall -std=c11 structs_lab.c -o structs_lab
      ./structs_lab
      ```

    files:
      - path: "c_project/structs_lab.c"
        content: |
          #include <stdio.h>
          #include <string.h>

          // TODO: Define a Student struct using typedef with fields:
          //   - char name[50]
          //   - int id
          //   - double gpa


          // TODO: Implement student_init
          // Takes a POINTER to Student, plus name, id, gpa as parameters
          // Copies name into s->name using strncpy (safely!)
          // Sets s->id and s->gpa


          // TODO: Implement student_print
          // Takes a POINTER to Student (use const for safety)
          // Prints: "Student: <name> (ID: <id>, GPA: <gpa>)"


          int main(void) {
              Student s1;
              student_init(&s1, "Grace Hopper", 1906, 3.95);
              student_print(&s1);

              Student s2;
              student_init(&s2, "Alan Turing", 1912, 3.88);
              student_print(&s2);

              return 0;
          }
        language: "c"

    open_file: "c_project/structs_lab.c"

    watch_files:
      - "c_project/structs_lab.c"

    solution:
      files:
        - path: "c_project/structs_lab.c"
          content: |
            #include <stdio.h>
            #include <string.h>

            typedef struct {
                char name[50];
                int id;
                double gpa;
            } Student;

            void student_init(Student *s, const char *name, int id, double gpa) {
                strncpy(s->name, name, sizeof(s->name) - 1);
                s->name[sizeof(s->name) - 1] = '\0';
                s->id = id;
                s->gpa = gpa;
            }

            void student_print(const Student *s) {
                printf("Student: %s (ID: %d, GPA: %.2f)\n", s->name, s->id, s->gpa);
            }

            int main(void) {
                Student s1;
                student_init(&s1, "Grace Hopper", 1906, 3.95);
                student_print(&s1);

                Student s2;
                student_init(&s2, "Alan Turing", 1912, 3.88);
                student_print(&s2);

                return 0;
            }
          language: "c"
      explanation: |
        - **`typedef struct { ... } Student;`:** Defines an anonymous struct and gives it the alias `Student`. Without `typedef`, you'd have to write `struct Student` everywhere.
        - **Pointer parameters (`Student *s`):** We pass pointers so the function modifies the *original* struct, not a copy. In C, all arguments are passed by value — passing a large struct by value copies the entire thing.
        - **`s->name`:** The arrow operator `->` dereferences the pointer and accesses the member. It's shorthand for `(*s).name`.
        - **`const Student *s`:** In `student_print`, `const` promises we won't modify the struct — a C convention for read-only access. This is the closest C gets to "const methods."
        - **Safe string copy:** `strncpy` + manual null-termination, as learned in Step 5.

    tests:
      - description: "Defined a Student struct or typedef"
        command: "cd /tutorial/c_project && grep -q 'typedef struct' structs_lab.c || grep -q 'struct Student' structs_lab.c"
      - description: "Implemented student_init function"
        command: "cd /tutorial/c_project && grep -q 'student_init' structs_lab.c && grep -q 'strncpy\\|strcpy' structs_lab.c"
      - description: "Implemented student_print function"
        command: "cd /tutorial/c_project && grep -q 'student_print' structs_lab.c"
      - description: "Program compiles and runs correctly"
        command: "cd /tutorial/c_project && gcc -Wall -std=c11 structs_lab.c -o structs_lab && ./structs_lab | grep -q 'Grace Hopper'"

    quiz:
      title: "Structs — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "Why do C programmers pass struct pointers to functions instead of passing structs by value?"
          options:
            - "C doesn't allow passing structs by value"
            - "Passing by value copies the entire struct — wasteful for large structs, and the function can't modify the original"
            - "Pointers are faster because they use less CPU"
            - "Structs cannot be returned from functions"
          correct_index: 1
          explanation: "C passes everything by value. Passing a 200-byte struct copies all 200 bytes onto the stack. A pointer is just 8 bytes and lets the function modify the original. C has no references — pointers are the only option for 'pass by reference' behavior."

        - question: "Given `Student *s = &my_student;`, which syntax accesses the `name` field?"
          options:
            - "s.name"
            - "s->name"
            - "*s.name"
            - "s[name]"
          correct_index: 1
          explanation: "`->` is the member access operator for pointers to structs. `s->name` is equivalent to `(*s).name`. Using `s.name` would fail because `s` is a pointer, not a struct."

        - question: |
            **Arrange** the lines to define a `Rectangle` struct and a function that calculates its area.
          type: parsons
          lines:
            - "typedef struct {"
            - "    double width;"
            - "    double height;"
            - "} Rectangle;"
            - "double rect_area(const Rectangle *r) {"
            - "    return r->width * r->height;"
            - "}"
          distractors:
            - "class Rectangle {"
            - "    return r.width * r.height;"
          explanation: "`typedef struct { ... } Rectangle;` defines the struct. The area function takes a `const` pointer (read-only) and uses `->` to access members through the pointer. `class` doesn't exist in C. `r.width` would be wrong because `r` is a pointer — you need `r->width`."

        - question: "**[Interleaved: Revisit Step 3]** Why does `student_init` use `strncpy` instead of `strcpy` for the name?"
          options:
            - "strncpy is faster than strcpy"
            - "strncpy limits the number of characters copied, preventing buffer overflow if the name is too long"
            - "strcpy doesn't work with struct members"
            - "strncpy automatically adds a null terminator"
          correct_index: 1
          explanation: "As we learned in the strings step, `strcpy` has no length limit and can overflow the destination buffer. `strncpy` copies at most `n` characters, making it safe for fixed-size char arrays like `name[50]`. But remember: `strncpy` may NOT null-terminate, so we add `'\\0'` manually."

  # --------------------------------------------------------------------------
  # STEP 7: Unions — One Memory, Multiple Interpretations
  # --------------------------------------------------------------------------
  - title: "Unions — One Memory, Multiple Interpretations"
    instructions: |
      ### What Is a Union?

      Unions are one of C's more abstract features, and it's normal to wonder "when would I ever use this?" The answer: unions show up in parsers, network protocols, and any system that handles multiple data types through the same interface. If this step feels harder than previous ones, that's expected — you're building a more sophisticated mental model.

      A `union` looks like a `struct`, but with a critical difference: **all members share the same memory**. The size of a union equals the size of its *largest* member.

      ```c
      union Value {
          int    i;    // 4 bytes
          double d;    // 8 bytes
          char   s[8]; // 8 bytes
      };
      // sizeof(union Value) == 8 (size of largest member)
      ```

      At any moment, only **one member is valid**. Writing to `val.d` overwrites whatever was in `val.i`. Reading a member you didn't last write to is undefined behavior.

      ### Tagged Unions: The C Pattern for "Variant Types"

      Since the union doesn't know which member is active, you need to track it yourself. The standard pattern is a struct with a **tag** (enum) and a union:

      ```c
      typedef enum { TYPE_INT, TYPE_DOUBLE, TYPE_STRING } ValueType;

      typedef struct {
          ValueType type;     // tag: which union member is valid
          union {
              int    i;
              double d;
              char   s[32];
          };                  // anonymous union (C11)
      } TaggedValue;
      ```

      This is C's version of `std::variant` from C++17.

      ### Task: Build a tagged value system

      Complete `unions_lab.c` to implement a `TaggedValue` that can hold an int, double, or string. Implement the `print_value` function that uses a `switch` on the tag.

      ```bash
      gcc -Wall -std=c11 unions_lab.c -o unions_lab
      ./unions_lab
      ```

    files:
      - path: "c_project/unions_lab.c"
        content: |
          #include <stdio.h>
          #include <string.h>

          typedef enum { TYPE_INT, TYPE_DOUBLE, TYPE_STRING } ValueType;

          typedef struct {
              ValueType type;
              union {
                  int    i;
                  double d;
                  char   s[32];
              };
          } TaggedValue;

          // TODO: Implement print_value
          // Use a switch on val->type to print the correct member:
          //   TYPE_INT:    printf("int: %d\n", ...)
          //   TYPE_DOUBLE: printf("double: %.2f\n", ...)
          //   TYPE_STRING: printf("string: %s\n", ...)
          void print_value(const TaggedValue *val) {

          }

          int main(void) {
              TaggedValue v1 = { .type = TYPE_INT, .i = 42 };
              TaggedValue v2 = { .type = TYPE_DOUBLE, .d = 3.14 };
              TaggedValue v3 = { .type = TYPE_STRING };
              strncpy(v3.s, "hello", sizeof(v3.s) - 1);
              v3.s[sizeof(v3.s) - 1] = '\0';

              print_value(&v1);
              print_value(&v2);
              print_value(&v3);

              return 0;
          }
        language: "c"

    open_file: "c_project/unions_lab.c"

    watch_files:
      - "c_project/unions_lab.c"

    solution:
      files:
        - path: "c_project/unions_lab.c"
          content: |
            #include <stdio.h>
            #include <string.h>

            typedef enum { TYPE_INT, TYPE_DOUBLE, TYPE_STRING } ValueType;

            typedef struct {
                ValueType type;
                union {
                    int    i;
                    double d;
                    char   s[32];
                };
            } TaggedValue;

            void print_value(const TaggedValue *val) {
                switch (val->type) {
                    case TYPE_INT:
                        printf("int: %d\n", val->i);
                        break;
                    case TYPE_DOUBLE:
                        printf("double: %.2f\n", val->d);
                        break;
                    case TYPE_STRING:
                        printf("string: %s\n", val->s);
                        break;
                }
            }

            int main(void) {
                TaggedValue v1 = { .type = TYPE_INT, .i = 42 };
                TaggedValue v2 = { .type = TYPE_DOUBLE, .d = 3.14 };
                TaggedValue v3 = { .type = TYPE_STRING };
                strncpy(v3.s, "hello", sizeof(v3.s) - 1);
                v3.s[sizeof(v3.s) - 1] = '\0';

                print_value(&v1);
                print_value(&v2);
                print_value(&v3);

                return 0;
            }
          language: "c"
      explanation: |
        - **Tagged union pattern:** The `type` field (tag) tells you which union member is valid. This is essential because the union itself doesn't track this — reading the wrong member is undefined behavior.
        - **Anonymous union (C11):** The `union { ... };` inside the struct has no name, so you access members directly as `val->i` instead of `val->u.i`. This is a C11 feature.
        - **Designated initializers:** `{ .type = TYPE_INT, .i = 42 }` initializes specific fields by name. This is standard C99/C11 syntax.
        - **`switch` on enum:** The natural way to dispatch on the tag. If you compile with `-Wall`, gcc will warn you about unhandled enum values — a safety net.

    tests:
