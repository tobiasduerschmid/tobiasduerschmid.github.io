      - description: "Program sorts correctly in both directions"
        command: "cd /tutorial/c_project && gcc -Wall -std=c11 funcptr_lab.c -o funcptr_lab && ./funcptr_lab | grep -q 'Ascending: 8 17 31 42 56 74 93' && ./funcptr_lab | grep -q 'Descending: 93 74 56 42 31 17 8'"

