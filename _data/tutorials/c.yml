            - "A pointer to a function that takes two doubles and returns an int"
            - "A double pointer to a function"
            - "A function that returns a pointer to an int"
          correct_index: 1
          explanation: "The parentheses in `(*fp)` are critical. They make `fp` a pointer to a function. Without them, `int *fp(double, double)` would declare a function returning `int*` — very different!"

        - question: "Why does `qsort` use `void*` parameters in its comparison function?"
          options:
            - "void* is faster than typed pointers"
            - "C has no templates/generics, so void* is the only way to make qsort work with any data type"
            - "void* automatically detects the element type"
            - "void* prevents buffer overflows"
          correct_index: 1
          explanation: "C lacks C++ templates. `void*` is C's mechanism for generic programming — it's a pointer to 'any type.' The downside: you must manually cast to the correct type inside the callback, with no compiler safety net."

        - question: |
            **Arrange** the lines to define a comparison function for sorting strings with `qsort`, then call `qsort` on a string array.
          type: parsons
          lines:
            - "int cmp_str(const void *a, const void *b) {"
            - "    return strcmp(*(const char **)a, *(const char **)b);"
            - "}"
            - "char *words[] = {\"banana\", \"apple\", \"cherry\"};"
            - "qsort(words, 3, sizeof(char *), cmp_str);"
          distractors:
            - "    return *(char *)a - *(char *)b;"
            - "std::sort(words, words + 3);"
          explanation: "For an array of `char*` strings, `qsort` passes pointers to array elements — i.e., `char**` cast as `void*`. We cast back to `const char**` and dereference to get the `char*`, then compare with `strcmp`. The distractor `*(char*)a - *(char*)b` compares single characters, not full strings. `std::sort` is C++ only."

        - question: "**[Interleaved: Revisit Step 6]** How do function pointers relate to structs in C?"
          options:
            - "Structs automatically generate function pointers for each field"
            - "You can store function pointers as struct members, simulating methods from C++"
            - "Function pointers can only be used in global scope, not in structs"
            - "Structs and function pointers are completely unrelated features"
          correct_index: 1
          explanation: "By putting function pointers inside structs, C programmers can simulate object-oriented patterns — the struct holds data + function pointers, like a C++ vtable. This is how early 'C with Classes' (the precursor to C++) worked."

  # --------------------------------------------------------------------------
  # STEP 9: Arrays, Pointers, and the "Decay" Trap
  # --------------------------------------------------------------------------
  - title: "Arrays, Pointers, and the Decay Trap"
    instructions: |
      ### The Most Confusing "False Friend" in C

      In C++, arrays and pointers are related but distinct. In C, they are so intertwined that students routinely confuse them — research on language transfer calls this a "false friend" that causes negative transfer (Du et al., 2025, CSEE&T).

      **The Decay Rule:** When you pass an array to a function, it silently **decays** into a pointer to its first element. The function receives *just* a pointer — all size information is lost.

      ```c
      void print_size(int arr[]) {
          // SURPRISE: sizeof(arr) is 8 (pointer size), NOT the array size!
          printf("sizeof = %zu\n", sizeof(arr));  // prints 8
      }

      int main(void) {
          int data[100];
          printf("sizeof = %zu\n", sizeof(data));  // prints 400
          print_size(data);                         // prints 8!
      }
      ```

      **This is the #1 source of bugs in C array code.** The function signature `int arr[]` is *identical* to `int *arr` — it's just syntactic sugar.

      ### C Is Strictly Pass-by-Value

      C++ has references (`int &x`). C does not. **Everything in C is passed by value** — including pointers. When you pass a pointer, the function gets a *copy* of the pointer (the address), not a reference to the original pointer variable.

      This means:
      - Modifying `*ptr` inside a function changes the pointed-to data (the copy points to the same address)
      - Modifying `ptr` itself (e.g., `ptr = malloc(...)`) does NOT affect the caller's pointer

      To modify a pointer from inside a function, you need a **pointer to a pointer** (`int **pp`).

      ### Task: Find and fix the array/pointer bugs

      The file `arrays_lab.c` has three bugs, ordered by difficulty:

      - **Bug 1 (easy):** `array_length` uses `sizeof` on a decayed array — fix: pass length as parameter.
      - **Bug 2 (easy):** `zero_fill` has the same sizeof bug.
      - **Bug 3 (hard):** `allocate` modifies a local copy of the pointer. Fix: change the parameter to `int **ptr` and use `*ptr = malloc(...)`. Also update the caller to pass `&heap_data`.

      Start with Bugs 1-2. Once those compile and run, tackle Bug 3 — it's conceptually different (pass-by-value for pointers).

      ```bash
      gcc -Wall -std=c11 arrays_lab.c -o arrays_lab
      ./arrays_lab
      ```

    files:
      - path: "c_project/arrays_lab.c"
        content: |
          #include <stdio.h>
          #include <stdlib.h>

          // Bug 1: This function tries to compute array length
          // but sizeof(arr) gives POINTER size, not array size!
          int array_length(int arr[]) {
              return sizeof(arr) / sizeof(arr[0]);
          }

          // Bug 2: This function tries to zero-fill an array
          // but uses the wrong size
          void zero_fill(int arr[]) {
              int len = sizeof(arr) / sizeof(arr[0]);  // BUG: decay!
              for (int i = 0; i < len; i++) {
                  arr[i] = 0;
              }
          }

          // Bug 3: This function tries to allocate memory for the caller
          // but the caller's pointer never changes (pass-by-value!)
          void allocate(int *ptr, int n) {
              ptr = malloc(n * sizeof(int));  // BUG: modifies local copy only
              if (ptr != NULL) {
                  for (int i = 0; i < n; i++) {
                      ptr[i] = i * 10;
                  }
              }
          }

          int main(void) {
              // Test Bug 1 & 2
              int data[5] = {1, 2, 3, 4, 5};
              printf("Array length: %d (expected 5)\n", array_length(data));

              zero_fill(data);
              printf("After zero_fill: %d %d %d %d %d (expected all 0s)\n",
                     data[0], data[1], data[2], data[3], data[4]);

              // Test Bug 3
              int *heap_data = NULL;
              allocate(heap_data, 5);
              if (heap_data == NULL) {
                  printf("heap_data is still NULL! allocate() didn't work.\n");
              }

              // After fixing: uncomment these lines
              // printf("heap_data[0] = %d (expected 0)\n", heap_data[0]);
              // free(heap_data);

              return 0;
          }
        language: "c"

    open_file: "c_project/arrays_lab.c"

    watch_files:
      - "c_project/arrays_lab.c"

    solution:
      files:
        - path: "c_project/arrays_lab.c"
          content: |
            #include <stdio.h>
            #include <stdlib.h>

            // Fixed Bug 1: Pass the length explicitly — sizeof doesn't work on decayed arrays
            int array_length(int arr[], int n) {
                return n;  // Must be passed from the caller, who knows the real size
            }

            // Fixed Bug 2: Accept length as a parameter
            void zero_fill(int arr[], int len) {
                for (int i = 0; i < len; i++) {
                    arr[i] = 0;
                }
            }

            // Fixed Bug 3: Use pointer-to-pointer so we can modify the caller's pointer
            void allocate(int **ptr, int n) {
                *ptr = malloc(n * sizeof(int));
                if (*ptr != NULL) {
                    for (int i = 0; i < n; i++) {
                        (*ptr)[i] = i * 10;
                    }
                }
            }

            int main(void) {
                // Test Bug 1 & 2
                int data[5] = {1, 2, 3, 4, 5};
                printf("Array length: %d (expected 5)\n", array_length(data, 5));

                zero_fill(data, 5);
                printf("After zero_fill: %d %d %d %d %d (expected all 0s)\n",
                       data[0], data[1], data[2], data[3], data[4]);

                // Test Bug 3
                int *heap_data = NULL;
                allocate(&heap_data, 5);
                if (heap_data == NULL) {
                    printf("heap_data is still NULL! allocate() didn't work.\n");
                } else {
                    printf("heap_data[0] = %d (expected 0)\n", heap_data[0]);
                    free(heap_data);
                }

                return 0;
            }
          language: "c"
      explanation: |
        - **Bug 1 & 2 — Array Decay:** When an array is passed to a function, it decays to a pointer. `sizeof(arr)` returns the pointer size (8 bytes), not the array size. The fix: always pass the array length as a separate parameter. This is a universal C idiom — virtually every C function that takes an array also takes its length.
        - **Bug 3 — Pass-by-Value:** `allocate(int *ptr, ...)` receives a *copy* of the pointer. Assigning `ptr = malloc(...)` only modifies the local copy — the caller's `heap_data` stays NULL. The fix: pass a pointer-to-pointer (`int **ptr`) and dereference with `*ptr = malloc(...)`. This is how C simulates "output parameters."
        - **`(*ptr)[i]`:** Parentheses are needed because `[]` binds tighter than `*`. Without them, `*ptr[i]` would mean "dereference the pointer at index i" — a different operation.

    tests:
      - description: "Fixed array_length to accept a length parameter"
        command: "cd /tutorial/c_project && grep -q 'array_length.*int.*n\\|array_length.*int.*len\\|array_length.*int.*size' arrays_lab.c"
      - description: "Fixed zero_fill to accept a length parameter"
        command: "cd /tutorial/c_project && grep -q 'zero_fill.*int.*len\\|zero_fill.*int.*n\\|zero_fill.*int.*size' arrays_lab.c"
      - description: "Fixed allocate to use pointer-to-pointer (int **)"
        command: "cd /tutorial/c_project && grep -q 'int \\*\\*' arrays_lab.c"
      - description: "Program compiles and runs correctly"
        command: "cd /tutorial/c_project && gcc -Wall -std=c11 arrays_lab.c -o arrays_lab && ./arrays_lab | grep -q 'expected 5' && ./arrays_lab | grep -q 'expected all 0s'"

    quiz:
      title: "Arrays, Pointers, and Pass-by-Value — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "What happens to an array when you pass it to a function in C?"
          options:
            - "The entire array is copied onto the stack (pass-by-value)"
            - "The array decays into a pointer to its first element — size information is lost"
            - "The function receives a reference to the array (like C++)"
            - "The compiler inlines the array into the function"
          correct_index: 1
          explanation: "Array decay is one of C's most important rules. `void f(int arr[])` is identical to `void f(int *arr)` — both receive a pointer. `sizeof(arr)` inside the function returns the pointer size (8 bytes), not the array size. You must pass the length separately."

        - question: "A function `void resize(int *p, int new_size)` calls `p = realloc(p, new_size * sizeof(int))` inside. After `resize(data, 100)` returns, what is `data` in the caller?"
          options:
            - "Points to the resized memory"
            - "Unchanged — still points to the original (possibly freed!) memory"
            - "NULL"
            - "Compiler error — can't reassign a parameter"
          correct_index: 1
          explanation: "C is strictly pass-by-value. The function modifies its local copy of `p`, not the caller's `data`. After `realloc`, the original memory may have been freed and moved, so `data` now points to freed memory — a use-after-free bug. Fix: use `int **p` or return the new pointer."

        - question: |
            **Arrange** the lines to write a function that doubles every element in an array, accepting the length as a parameter (since sizeof won't work on a decayed array).
          type: parsons
          lines:
            - "void double_array(int *arr, int len) {"
            - "    for (int i = 0; i < len; i++) {"
            - "        arr[i] *= 2;"
            - "    }"
            - "}"
          distractors:
            - "    int len = sizeof(arr) / sizeof(arr[0]);"
            - "void double_array(int arr[100]) {"
          explanation: "The function must accept `len` as a parameter because `sizeof(arr)` would return 8 (pointer size) due to array decay. The distractor `sizeof(arr) / sizeof(arr[0])` is the classic bug this step teaches. `int arr[100]` in a parameter is misleading — it's still just a pointer."

        - question: "**[Interleaved: Revisit Step 4]** After `free(p)`, what state is the pointer `p` in (using Adcock et al.'s model)?"
          options:
            - "Null — free automatically sets pointers to NULL"
            - "Dead — the pointer still holds the old address, but the memory is no longer valid"
            - "Alive — free just marks the memory as available but the pointer is still usable"
            - "Uninitialized — free resets the pointer to its original state"
          correct_index: 1
          explanation: "After `free(p)`, the pointer is in the Dead state. It still holds the old memory address — `free` does NOT set it to NULL automatically. Any dereference of a dead pointer is undefined behavior (use-after-free). Best practice: immediately write `p = NULL;` after `free(p);`."

  # --------------------------------------------------------------------------
  # STEP 10: File I/O — Reading and Writing Files
  # --------------------------------------------------------------------------
  - title: "File I/O — Reading and Writing Files"
    instructions: |
      ### Files in C: Open, Use, Close

      File I/O in C follows a simple pattern that mirrors how you use files in real life:

      1. **Open** the file with `fopen()` → get a `FILE*` handle
      2. **Read or write** using the handle
      3. **Close** the file with `fclose()`

      ```c
      FILE *fp = fopen("data.txt", "r");  // "r" = read mode
      if (fp == NULL) {
          perror("fopen failed");          // prints reason (e.g., file not found)
          return 1;
      }
      // ... use fp ...
      fclose(fp);
      ```

      ### File Modes

      | Mode | Meaning | If file doesn't exist |
      |------|---------|----------------------|
      | `"r"` | Read only | Returns NULL (error) |
      | `"w"` | Write (truncates existing content!) | Creates new file |
      | `"a"` | Append (adds to end) | Creates new file |
      | `"r+"` | Read and write | Returns NULL (error) |

      **Warning:** `"w"` **destroys** existing file contents. Use `"a"` to append.

      ### Predict: What happens here?

      Before reading further, predict what this code does:
      ```c
      FILE *fp = fopen("important_data.txt", "w");
      fclose(fp);
      ```
      Does `important_data.txt` still have its original contents? (Answer: No — `"w"` truncated it to zero bytes. This two-line program just erased the file's contents.)

      ### Reading and Writing Functions

      | Function | Purpose | Like printf/scanf but to files |
      |----------|---------|-------------------------------|
      | `fprintf(fp, fmt, ...)` | Write formatted text to file | `printf` → stdout; `fprintf` → file |
      | `fscanf(fp, fmt, ...)` | Read formatted input from file | `scanf` → stdin; `fscanf` → file |
      | `fgets(buf, n, fp)` | Read a line (safe, with limit) | Same as stdin version, but from file |
      | `feof(fp)` | Check if end-of-file reached | Returns non-zero at EOF |

      Notice the pattern: `printf`, `scanf`, and `fgets` all have file-based counterparts — just add `f` and pass the `FILE*` as the first (or last) argument.

      ### The Resource Management Pattern

      C has no RAII (like C++ destructors) and no `with` statement (like Python). You must **manually close every file you open**. Forgetting `fclose()` can cause:
      - Data loss (buffered writes not flushed to disk)
      - File descriptor leaks (the OS limits how many files a process can have open)

      ### Task: Build a word frequency counter

      Complete `fileio_lab.c` to:

      1. Write a list of words to a file using `fprintf`.
      2. Read the file back line by line using `fgets`.
      3. Count the total number of lines and print the result.
      4. Properly close all files.

      ```bash
      gcc -Wall -std=c11 fileio_lab.c -o fileio_lab
      ./fileio_lab
      ```

