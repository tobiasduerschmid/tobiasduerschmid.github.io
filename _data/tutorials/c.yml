    open_file: "c_project/funcptr_lab.c"

    watch_files:
      - "c_project/funcptr_lab.c"

    solution:
      files:
        - path: "c_project/funcptr_lab.c"
          content: |
            #include <stdio.h>
            #include <stdlib.h>

            void print_array(const int *arr, int n) {
                for (int i = 0; i < n; i++) {
                    printf("%d ", arr[i]);
                }
                printf("\n");
            }

            int compare_ascending(const void *a, const void *b) {
                int ia = *(const int *)a;
                int ib = *(const int *)b;
                return ia - ib;
            }

            int compare_descending(const void *a, const void *b) {
                int ia = *(const int *)a;
                int ib = *(const int *)b;
                return ib - ia;
            }

            int main(void) {
                int data[] = {42, 17, 93, 8, 56, 31, 74};
                int n = sizeof(data) / sizeof(data[0]);

                printf("Original: ");
                print_array(data, n);

                qsort(data, n, sizeof(int), compare_ascending);
                printf("Ascending: ");
                print_array(data, n);

                qsort(data, n, sizeof(int), compare_descending);
                printf("Descending: ");
                print_array(data, n);

                return 0;
            }
          language: "c"
      explanation: |
        - **`const void*` → `const int*`:** `qsort` uses `void*` for genericity. Inside the comparator, you cast to the actual type. `*(const int *)a` means: cast the `void*` to `int*`, then dereference to get the `int` value.
        - **Return value convention:** Negative means "a goes before b", positive means "b goes before a", zero means "equal." The `ia - ib` trick works for ints but can overflow with extreme values — a production comparator should use explicit `<` / `>` checks.
        - **`sizeof(data) / sizeof(data[0])`:** A C idiom to compute array length. `sizeof(data)` is the total byte size; dividing by one element's size gives the count.
        - **Why `void*`?** C has no templates or generics. `void*` is the only way to write type-agnostic functions. You trade type safety for flexibility.

    tests:
