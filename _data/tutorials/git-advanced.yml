title: 'Advanced Git: Debugging, History Rewriting, and Submodules'
description: Go beyond the basics — master detached HEAD, git's object model, stash, cherry-pick, blame, bisect, rebase (including interactive), squash merge, and submodules. Every step is grounded in a real scenario you will meet on the job.
backend: v86
require_tests: true
autosave_type: commands-and-files
reset_type: commands
git_graph: /tutorial/myproject
setup_commands:
- "echo 'export LANG=C.UTF-8' >> ~/.bashrc\necho 'export LESSCHARSET=utf-8' >> ~/.bashrc\nexport LANG=C.UTF-8\nexport LESSCHARSET=utf-8\ngit config --global user.email 'diligent-student@cs.ucla.edu'\ngit config --global user.name 'Soon-to-be Git Hero'\ngit config --global init.defaultBranch main\ngit config --global advice.detachedHead false\n# Pre-build a small calculator repo (idempotent via sentinel).\n# Two commits on `main`, one on a `feature-divide` branch —\n# enough history to explore pointers, detached HEAD, etc.\ncd /tutorial\nif [ -d myproject/.git ] && git -C myproject log main --oneline 2>/dev/null | grep -q 'Add add function'; then\n  exit 0\nfi\nrm -rf myproject\ngit init -q myproject\ncd myproject\necho '\"\"\"A simple calculator module.\"\"\"' > calculator.py\ngit add calculator.py\ngit commit -qm 'Initial commit'\necho 'def add(a, b): return a + b' >> calculator.py\ngit commit -qam 'Add add function'\ngit switch -qc feature-divide\necho 'def divide(a, b): return a / b' >> calculator.py\ngit commit -qam 'Add divide function'\ngit switch -q main\n"
steps:
- title: Branch Internals and Detached HEAD
  view: git_graph
  instructions: "### Welcome to Advanced Git\n\nYou already know `init`, `add`, `commit`, `branch`, `merge`, and remotes.\nThis tutorial does two things the basic course did not:\n\n1. It lifts the hood and shows **how Git actually stores your work** —\n   the object database, refs, and HEAD pointer. Knowing the internals\n   turns intimidating commands like `rebase` and `bisect` into\n   predictable mechanical operations.\n2. It practices **every tool from Lecture 10** in a realistic scenario:\n   detached HEAD, relative addresses, stash, cherry-pick, blame, bisect,\n   simple & interactive rebase, squash merge, and submodules.\n\nYou will intentionally break things and recover them with `git reflog` —\na safe sandbox is the best place to learn destructive commands.\n\n### Two antipatterns you will *not* fall into by the end\n\nResearch on how students actually use Git (Isomöttönen & Cochez 2014)\nidentified two behaviours that separate novices from professionals:\n\n1. **Blind-testing** — typing random permutations of `add`, `commit`,\n   `push`, `pull` until the terminal stops complaining. You get\n   a fragile *illusion* of competence that collapses the first\n   time you hit a conflict or divergence.\n2. **\"Burning down the repo\"** — when something goes wrong, the\n   novice deletes their local folder, copies their uncommitted\n   code to a text file, re-clones from the server, pastes the\n   changes back, and force-commits. This \"works\" but destroys\n   atomic history and guarantees you never actually learn.\n\nBoth antipatterns come from the same root cause: **no accurate\nmental model of what Git is doing.** Every step in this tutorial\nis designed to build that model piece by piece. When you finish,\nyou won't need to guess or burn down anything — you'll read the\nstate and reach for the right tool.\n\n### What is a branch, really? — Predict first\n\nYou have seen branches behave like separate timelines.\nBefore we look under the hood, **write down your current mental\nmodel** (on paper or in your head):\n\n> *\"A branch in Git is physically stored as ________.\"*\n\nFinish the sentence with your best guess **before** scrolling. A\nfolder? A snapshot? A compressed diff? A network resource? Keep\nyour guess; we will test it against reality in Task 1.\n\nOnce you have your guess, read on:\n\nA branch is **not a copy** of your project — it is a **41-byte text file**\ncontaining one commit hash. Let's prove it (and see whether your\nguess was right).\n\n### The starter repo\n\nA small `myproject/` calculator repo has already been built for you —\ntwo commits on `main`, one on a `feature-divide` branch. Drop into it:\n\n```bash\ncd /tutorial/myproject\ngit log --all --oneline --graph --decorate\n```\n\nYou should see three commits arranged across `main` and\n`feature-divide`. **Compare the terminal output with the git graph\npanel on the left** — they show the same history. The panel updates\nlive as you run commands; use it throughout this step to confirm your\nmental model matches what Git actually records.\n\n### Task 1: Look at the branch pointer files\n\n**Predict first:** how many lines do you think\n`.git/refs/heads/main` contains? 1? 10? 1000? Write a number down\nbefore running.\n\n```bash\ncat .git/refs/heads/main\ncat .git/refs/heads/feature-divide\n```\n\nEach file is **one line** containing the SHA of the commit that\nbranch points to. Branches are not folders, not backups, not\nnetwork resources — they are **single-line text files**. Creating\none is literally one `fwrite()` of a 40-character hash. (How did\nyour prediction compare to what you actually saw?)\n\nNow inspect `HEAD`:\n\n```bash\ncat .git/HEAD\n```\n\nYou see `ref: refs/heads/main`. `HEAD` is a **symbolic reference** —\na pointer to another pointer:\n\n```freeform\n@startuml\nlayout horizontal\nbox \"HEAD\" as head\nbox \"refs/heads/main\" as ref\nbox round \"<commit SHA>\" as sha\nhead --> ref\nref --> sha\n@enduml\n```\n\nThis indirection is why `git commit` can move the branch forward\nwithout touching `HEAD` itself: the branch pointer file is rewritten,\nand `HEAD` dereferences to the new commit automatically.\n\n### Task 2: Detach HEAD\n\nSometimes you need to inspect an old commit without being on a branch.\nThe `--detach` flag lets you do this:\n\n```bash\ngit switch --detach HEAD~1\ncat .git/HEAD\n```\n\nNow `.git/HEAD` contains a **raw SHA hash** instead of a branch\nreference. This is **detached HEAD state**.\n\n**Look at the git graph panel on the left.** The HEAD label should now\nfloat directly on a commit node rather than sitting next to the\n`main` branch name. That visual is the exact picture of what\n\"detached\" means: HEAD is anchored to a commit, not to a branch pointer.\n\n> Think of it as visiting a museum archive. You can pull out any\n> document and read it. But if you leave scribbled notes on a desk\n> without labelling which room they belong to, the archive staff have\n> nowhere to file them when you walk away. `git switch -c <name>` is\n> the label you must leave before walking away.\n\n**Warning:** Any new commits you make in detached HEAD state are\nanchored to no branch. When you `git switch` away, Git has no pointer\nto keep them reachable — they become orphaned and are eventually\npruned by `git gc`.\n\n### Task 3: Rescue work from a detached HEAD with reflog\n\nLet's intentionally create an orphan, then recover it — this is\nthe kind of mistake students panic about, so let's tame it.\n\n```bash\ngit switch --detach HEAD\necho \"# experimental note\" >> calculator.py\ngit add calculator.py\ngit commit -m \"Experimental: add note in detached HEAD\"\ngit switch main\n```\n\nThose detached commits are now **orphaned** — no branch points to\nthem.\n\n**\"Why can't I just `git checkout <sha>` the commit directly?\"**\nYou could — *if* you still had the SHA. But try:\n\n```bash\ngit log --all --oneline\n```\n\nThe experimental commit does not appear. `git log --all` walks every\nbranch and tag to collect reachable commits; an orphan is reachable\nfrom *no* ref, so it is invisible. The SHA is nowhere on screen.\nYou have lost the address of the very object you want to visit.\n\nThis is the exact situation `git reflog` solves. Unlike `git log`,\nthe reflog is not a commit graph traversal — it is a **local diary**\nof every position `HEAD` has occupied, regardless of reachability.\nGit never forgets *where HEAD has been*:\n\n```bash\ngit reflog\n```\n\nEach line has the form `<sha>  HEAD@{n}: <action>: <description>`.\nThe most recent entry (`HEAD@{0}`) is the `git switch main` you just\nran. The entry above it — `HEAD@{1}` — is the experimental commit.\n\n**What is `HEAD@{1}`?** The `@{n}` suffix is **reflog syntax**.\nIt means \"where this ref was *n* moves ago in the reflog.\" So:\n\n| Expression   | Meaning                        |\n|--------------|--------------------------------|\n| `HEAD@{0}`   | where HEAD is **right now**    |\n| `HEAD@{1}`   | where HEAD was **one move ago** |\n| `HEAD@{2}`   | two moves ago, and so on       |\n\nYou can use `HEAD@{n}` anywhere Git expects a commit SHA — no need to\ncopy-paste the raw hash. Anchor a branch to the experimental commit:\n\n```bash\ngit branch rescued-work HEAD@{1}\ngit log rescued-work --oneline\n```\n\n**Check the git graph panel** — `rescued-work` should now appear as a\nnew branch label pointing to your experimental commit. The \"lost\" commit\nis safe again. **The reflog is your safety net for every destructive\noperation in this tutorial.** Bookmark it.\n\n### Cleanup — return to main\n\n```bash\ngit switch main\n```\n\nThe git-graph view on the left should now show `main`, `feature-divide`,\nand `rescued-work` — three pointers, one shared history.\n\n### You can now\n\n- **Explain** why creating a branch is a millisecond operation, in\n  terms of what is physically written to disk.\n- **Distinguish** attached HEAD from detached HEAD by inspecting\n  `.git/HEAD`.\n- **Recover** orphaned commits using `git reflog` + `git branch\n  <name> <sha>` — your safety net for every destructive operation\n  later in this tutorial.\n\n> **Normalize the struggle:** Every experienced Git user has\n> panicked at \"detached HEAD\" at some point. You just turned that\n> panic moment into a routine recovery. That skill transfers to\n> rebase, reset, and every other \"scary\" Git operation.\n"
  solution:
    commands:
    - cd /tutorial/myproject
    - git switch --detach HEAD~1
    - git switch main
    - 'git show-ref --verify --quiet refs/heads/rescued-work || (git switch --detach HEAD && echo ''# experimental note'' >> calculator.py && git add calculator.py && git commit -m ''Experimental: add note in detached HEAD'' && git switch main)'
    - 'git show-ref --verify --quiet refs/heads/rescued-work || (EXP_SHA=$(git reflog | grep -m1 ''Experimental: add note'' | awk ''{print $1}'') && git branch rescued-work $EXP_SHA)'
    explanation: '- **Branch = 41-byte pointer file:** `.git/refs/heads/main` literally contains one line — the commit SHA. No file copies, no timeline duplication. Creating a branch is a single `fwrite()`.

      - **HEAD = symbolic reference:** `.git/HEAD` contains `ref: refs/heads/main`, not the commit SHA directly. That indirection lets `git commit` update the branch pointer while `HEAD` follows automatically.

      - **Detached HEAD:** `HEAD` holds a raw SHA rather than a ref. Any commits made here are reachable only from `HEAD` — once you move `HEAD`, they are orphaned.

      - **reflog recovery:** `git reflog` logs every position `HEAD` has been at, for ~90 days by default. A new branch anchored at `HEAD@{n}` rescues otherwise-unreachable commits.

      '
  tests:
  - description: myproject is a Git repository
    command: '[ -d /tutorial/myproject/.git ]'
  - description: feature-divide branch exists
    command: cd /tutorial/myproject && git branch | grep -q 'feature-divide'
  - description: Currently on main branch (not detached)
    command: cd /tutorial/myproject && git symbolic-ref -q HEAD | grep -q 'refs/heads/main'
  - description: rescued-work branch exists and points to an experimental commit
    command: cd /tutorial/myproject && git log rescued-work --oneline 2>/dev/null | grep -qi 'experimental'
    hints:
    - text: You need to use `git reflog` to find the SHA of the experimental commit you made in detached HEAD, then create a branch at that SHA with `git branch rescued-work <sha>`.
  quiz:
    title: Branch Internals & Detached HEAD — Knowledge Check
    min_score: 0.8
    shuffle: true
    questions:
    - question: What is a Git branch, physically speaking?
      options:
      - A full copy of all project files stored separately
      - A 41-byte text file in `.git/refs/heads/` containing one commit SHA
      - A separate network connection to a remote server
      - A compressed archive of your working directory
      correct_index: 1
      explanation: A branch is just a tiny file holding a 40-character SHA. That is why `git switch -c new-branch` is instantaneous — Git does not copy files, it writes one line of text.
    - question: Which statements about **Detached HEAD** state are true? (Select all that apply)
      type: multiple
      options:
      - '`HEAD` points directly to a commit hash instead of a branch name'
      - Any commit you make in detached HEAD is automatically saved to the nearest branch
      - Commits made here are orphaned unless you anchor them with a branch before leaving
      - '`git reflog` can recover orphaned commits within the default reflog retention window'
      correct_indices:
      - 0
      - 2
      - 3
      explanation: Detached HEAD stores a raw SHA. No branch tracks commits made here. Before leaving, create a branch (`git switch -c rescue`) or you may need `git reflog` to recover.
    - question: You made three commits in detached HEAD state, then ran `git switch main` without creating a branch. A teammate asks if the commits are lost. What do you tell them?
      options:
      - Yes, they are permanently gone — detached HEAD commits are deleted by `git switch`
      - They are currently orphaned but still in the object database; `git reflog` can find their SHA, and `git branch rescue <sha>` makes them reachable again
      - Git automatically migrated them to the `main` branch when we switched
      - They are stored in a hidden recovery folder we can copy from
      correct_index: 1
      explanation: 'Orphaned commits remain in `.git/objects/` until `git gc` prunes them (default: ~30 days unreferenced). `git reflog` shows every position HEAD has been at, including the orphaned one. `git branch rescue <sha>` rescues the work.'
    - question: Why can `HEAD` point to a branch name rather than a commit SHA?
      options:
      - Branch names are shorter and easier to type
      - Symbolic refs let `git commit` update the branch pointer and `HEAD` automatically stays current through indirection
      - Git requires it for compatibility with GitHub
      - It prevents you from committing on the wrong branch
      correct_index: 1
      explanation: The pointer chain is `HEAD → refs/heads/branch → commit`. A commit only needs to rewrite the branch file — HEAD dereferences through it. This indirection is the engineering reason branches are cheap.
    - question: You want to inspect a commit from last week without risking any accidental edits. Which is the safest approach?
      options:
      - '`git switch --detach <old-sha>` — look around; return to main with `git switch main`'
      - '`git reset --hard <old-sha>` — rewinds your current branch to that point'
      - '`git checkout <old-sha> .` — overwrite files in working directory'
      - '`rm -rf .git && git clone <old-sha>` — start fresh'
      correct_index: 0
      explanation: '`git switch --detach` enters read-only-feeling detached HEAD at any commit. You can look around freely; `git switch main` returns you unchanged. `git reset --hard` would rewrite your current branch — destructive. `git checkout <sha> .` overwrites files without moving HEAD.'
- title: Relative Commit Addresses & Git's Object Database
  view: git_graph
  instructions: "### Warm-up: one prediction\n\nImagine two separate Git repos on two separate laptops. Alice's\n`foo.txt` contains exactly the bytes `hello world\\n`. Bob's\n`bar.txt` contains exactly the bytes `hello world\\n`.\n\n> **Predict (yes/no/depends):** Do Alice's repo and Bob's repo\n> internally store that content using the **same SHA-1 hash**?\n\nWrite your guess down. We will prove the answer at the end of this\nstep. It matters more than it sounds — the answer is the\nfoundation of every efficient operation in Git.\n\n> ⚠️ **Common wrong model you may be carrying:**\n> *\"Git stores a diff between each commit — that's why it's so\n> compact.\"* This is the **SVN mental model** and it is **wrong**\n> for Git. Git stores full snapshots, deduplicated by content\n> hash. Holding onto the diff model makes rebase, cherry-pick, and\n> bisect feel magical and unpredictable. This step replaces it.\n\n### The address problem\n\nEvery advanced Git command takes a commit as an argument.\nTyping `a73f2d9c81...` by hand is error-prone. Git gives you two\nbetter options:\n\n1. **Relative references** — `HEAD~1`, `main~3`, `feature^2`.\n2. **Symbolic references** — `HEAD`, branch and tag names, ranges.\n\n### Task 1: Practice relative references\n\nYour `main` branch has two commits. Let's name them without copying\nany SHA.\n\n```bash\ncd /tutorial/myproject\ngit log --oneline\n```\n\nNow resolve relative references:\n\n```bash\ngit rev-parse HEAD        # the current commit SHA\ngit rev-parse HEAD~1      # one commit before HEAD\ngit rev-parse main        # same as HEAD right now\ngit rev-parse main~1      # same as HEAD~1\n```\n\n**`BRANCH~n`** means *n steps back along the first-parent chain*.\n**`BRANCH^`** is shorthand for `BRANCH~1`. **`BRANCH^2`** is the\n*second parent* of a merge commit (first-parent chain ignores it).\n\n```gitgraph\n@startuml\nbranch main:\n  A \"Oldest commit\"\n  B \"main~2\"\n  C \"HEAD~1\"\n  D \"HEAD / main\"\nhead main\n@enduml\n```\n\nSo on this history, `feature~2 = A`, `main~2 = B`, and `HEAD~1 = C`.\n\nTry one more — how many commits back is the initial commit?\n\n```bash\ngit log --oneline | wc -l\ngit rev-parse HEAD~$(($(git log --oneline | wc -l) - 1))\n```\n\nThat last expression jumps to the root commit without typing its SHA.\n\n### Task 2: Lift the hood — Git's object database\n\nEvery commit, file, and directory you version is stored as a\n**Git object** in `.git/objects/`. There are only three kinds:\n\n| Object | What it stores |\n|---|---|\n| **blob** | The raw content of a file (no filename) |\n| **tree** | A directory listing: filename → blob or sub-tree |\n| **commit** | A tree SHA + parent SHAs + author + message |\n\nEverything is addressed by SHA-1 of its content — a *content-addressable\nfilesystem*. Let's settle the warm-up prediction.\n\n```bash\necho \"hello world\" | git hash-object --stdin\n```\n\nNote the 40-character hash. Now run the **same command in a\nfresh, unrelated repo** (simulate Bob's laptop):\n\n```bash\ncd /tmp && git init -q bob-repo && cd bob-repo\necho \"hello world\" | git hash-object --stdin\ncd /tutorial/myproject\n```\n\n**Identical output.** That is the answer to the warm-up prediction:\nanyone hashing the same content gets the same SHA. Git is\ncontent-addressable — deduplication across repos, branches, and\nhistory is automatic and free. (If your prediction was \"no\" or\n\"depends,\" this is the moment to update your mental model.)\n\n### Task 3: Inspect the current commit\n\n**Predict first:** If you could pretty-print the commit `HEAD`\npoints to as plain text, what fields would you expect to see?\nWrite down at least three fields you expect.\n\n<details><summary>Reveal the answer after you've committed to a guess</summary>\n\nA commit object contains exactly these fields:\n- `tree <SHA>` — points at the root directory snapshot\n- one or more `parent <SHA>` lines (zero for root commit, two\n  for a merge commit)\n- `author <name> <email> <timestamp> <timezone>`\n- `committer <name> <email> <timestamp> <timezone>`\n- blank line\n- commit message (multi-line free text)\n\nThat is **everything**. No file bytes, no diffs, no deltas — just\na tiny text record. Now run the command and compare.\n\n</details>\n\n```bash\ngit cat-file -t HEAD          # object type\ngit cat-file -p HEAD          # pretty-printed content\n```\n\nYou will see something like:\n\n```\ntree 8a1b2c...\nparent e3f4a5...\nauthor Soon-to-be Git Hero <...> 1712000000 -0700\ncommitter Soon-to-be Git Hero <...> 1712000000 -0700\n\nAdd add function\n```\n\nA commit is **a text file** with a tree reference, parent reference,\nauthor metadata, and message — nothing more. Now walk into the tree:\n\n```bash\nTREE_SHA=$(git cat-file -p HEAD | sed -n 's/^tree //p')\ngit cat-file -p $TREE_SHA\n```\n\nThe tree lists `calculator.py → <blob SHA>`. Dereference the blob:\n\n```bash\nBLOB_SHA=$(git cat-file -p $TREE_SHA | awk '{print $3}' | head -1)\ngit cat-file -p $BLOB_SHA\n```\n\nThat blob **is** your file content — byte for byte. You just walked\nthe object graph by hand from commit → tree → blob.\n\n### The one sentence to remember\n\n**Every command in this tutorial (rebase, cherry-pick, bisect,\nstash, submodules) is just creating or moving pointers across the\nimmutable object graph you just walked by hand.**\n\nThat single sentence, internalized, will make the next nine steps\nfeel mechanical instead of magical.\n\n### You can now\n\n- **Resolve** any commit without typing a SHA using `HEAD~n`,\n  `BRANCH^`, or `git rev-parse`.\n- **Walk the object graph** manually from commit → tree → blob\n  using `git cat-file`.\n- **Prove** that Git is snapshot-based (not diff-based) by\n  hashing identical content and seeing identical SHAs.\n\nYou have now built the mental model that the remaining 9 steps\nall build on.\n"
  setup_commands:
  - cd /tutorial/myproject && git switch main 2>/dev/null; true
  solution:
    commands:
    - cd /tutorial/myproject
    - TREE_SHA=$(git cat-file -p HEAD | sed -n 's/^tree //p') && git cat-file -p $TREE_SHA
    - TREE_SHA=$(git cat-file -p HEAD | sed -n 's/^tree //p') && BLOB_SHA=$(git cat-file -p $TREE_SHA | awk '{print $3}' | head -1) && git cat-file -p $BLOB_SHA
    explanation: '- **`HEAD~n`:** n commits back along the first-parent chain. `HEAD~0` is HEAD itself, `HEAD~1` is its parent, `HEAD~2` its grandparent. `HEAD^` is equivalent to `HEAD~1`. For a merge commit, `HEAD^2` accesses the *second* parent (the merged-in branch tip).

      - **`git rev-parse`:** Converts any ref (relative, symbolic, short SHA) into a full 40-character SHA. Plumbing-level tool used internally by nearly every porcelain command.

      - **`git hash-object`:** Computes the SHA Git would assign to content. Feeding the same bytes always produces the same hash — that is what makes Git content-addressable.

      - **`git cat-file -t <obj>` / `-p <obj>`:** Inspect object type / pretty-print. You walked commit → tree → blob manually — the same walk every `git log -p` and every clone performs at scale.

      - **Why it matters:** Every advanced command later (rebase, cherry-pick, bisect) is just moving ref pointers across this immutable object graph. Once you see commits as *hashed snapshots*, not *edits*, nothing in Git is mysterious.

      '
  tests:
  - description: On main branch with calculator.py
    command: cd /tutorial/myproject && git symbolic-ref -q HEAD | grep -q 'refs/heads/main' && [ -f calculator.py ]
  - description: HEAD resolves to a commit object (object database intact)
    command: cd /tutorial/myproject && git cat-file -t HEAD 2>/dev/null | grep -qx 'commit'
  - description: You can resolve HEAD~1 (at least 2 commits on main)
    command: cd /tutorial/myproject && git rev-parse --quiet --verify HEAD~1 >/dev/null
  - description: HEAD's tree object contains calculator.py (walked commit → tree → blob)
    command: cd /tutorial/myproject && TSHA=$(git cat-file -p HEAD | sed -n 's/^tree //p') && git cat-file -p $TSHA | grep -q 'calculator.py'
  quiz:
    title: Relative Addresses & Object Database — Knowledge Check
    min_score: 0.8
    shuffle: true
    questions:
    - question: You want the commit **two before** `main`. Which reference is correct?
      options:
      - '`main^2`'
      - '`main~2`'
      - '`main-2`'
      - '`main..2`'
      correct_index: 1
      explanation: '`main~2` walks back 2 commits along the first-parent chain. `main^2` means the *second parent* of a merge commit — completely different. `main-2` and `main..2` are not valid syntax.'
    - question: What does `git hash-object` do?
      options:
      - Uploads the file to GitHub
      - Computes the SHA-1 Git would assign to the content — letting you prove that identical content always produces the same hash
      - Encrypts the file with a cryptographic hash
      - Compresses the file for storage
      correct_index: 1
      explanation: '`git hash-object` is the low-level plumbing that every commit uses internally. Because identical content always yields the same SHA, Git deduplicates identical files across the entire history for free.'
    - question: Which statements about Git objects are true? (Select all that apply)
      type: multiple
      options:
      - A commit object stores a reference to a tree, not the files themselves
      - A blob stores file content without the filename
      - Trees map filenames to blob or sub-tree SHAs
      - Git stores file differences (deltas) between commits, not full snapshots
      correct_indices:
      - 0
      - 1
      - 2
      explanation: Git stores **full snapshots** as blobs, not deltas. (Pack files compress with delta encoding later, but the logical model is snapshot-based.) Filenames live in tree objects, not in blobs — so two files with identical content share one blob.
    - question: You run `git cat-file -p HEAD` and see a `tree` line, a `parent` line, author info, and a message. What have you just inspected?
      options:
      - A raw blob containing your file's bytes
      - A commit object — a plain text record pointing at a tree snapshot and parent commits
      - A compressed diff against the previous commit
      - A branch pointer file
      correct_index: 1
      explanation: 'A commit is a small text record: a tree SHA, parent SHA(s), author/committer metadata, and the message. That is *all*. The actual file bytes live in blobs referenced through the tree.'
    - question: '**[Revisit Step 1]** You are in detached HEAD at a commit that is 4 back from `main`. Which command prints that SHA without copying it from `git log`?'
      options:
      - '`git rev-parse main~4`'
      - '`git log main --limit 4`'
      - '`git checkout main~4`'
      - '`git cat-file -t main~4`'
      correct_index: 0
      explanation: '`git rev-parse` is the universal ''ref → SHA'' translator. It accepts relative (`main~4`), symbolic (`main`), short (`a73f`), or branch/tag references. `cat-file -t` prints the *type*, not the SHA. `git log --limit` is not valid syntax.'
    - question: Why does `git branch feature` complete in milliseconds even on a 10-GB repo?
      options:
      - Git compresses the whole working directory in parallel
      - It just writes one 41-byte file (`.git/refs/heads/feature`) containing the current commit SHA — no files are copied
      - Branches are stored on the remote server, not locally
      - Git skips adding the branch until you commit to it
      correct_index: 1
      explanation: A branch creation is a single `fwrite()` of 41 bytes. No copying, no traversal, no network. Once you see branches as tiny pointer files, their speed and cheapness stops being mysterious.
    - question: '**[Revisit Step 1]** You enter detached HEAD at an old commit, make one exploratory commit, and switch away without creating a branch. In terms of Git objects, what happens to that commit?'
      options:
      - Git deletes the commit object immediately
      - The commit object still exists in `.git/objects` but is unreachable from any ref, so `git gc` will eventually prune it
      - The commit is moved into the `.git/orphans` directory
      - The commit is converted into a blob
      correct_index: 1
      explanation: 'Objects in Git live until garbage collection. An orphaned commit is not ''deleted'' — it is just unreachable from any ref. `git reflog` still records HEAD''s path through it, which is how `git branch rescue <sha>` can rescue it. This links Step 1''s reflog safety net to Step 2''s object-model view: unreachable ≠ deleted.'
- title: Saving Work Temporarily with git stash
  view: editor
  instructions: "### The context-switch problem\n\nReal development rarely lets you finish one task before another\ndemands attention. Imagine you are halfway through a feature when\nyour team lead says: **\"Drop everything — there's a critical bug on\n`main` that needs a hotfix now.\"**\n\nWithout `git stash`, your choices are all bad:\n\n- **Commit half-finished work** → pollutes history.\n- **Discard changes with `git restore`** → permanent loss.\n- **Stay on your branch** → cannot isolate the hotfix.\n\n`git stash` is the fourth, clean option: **temporarily set aside**\nyour work-in-progress so the working directory is clean, context-switch,\nthen **restore your work** exactly where you left off.\n\n> ⚠️ **Anti-pattern alert:** a common novice response to \"clean\n> tree needed now\" is to **delete the local folder, copy code to\n> a text file, re-clone, paste back** (the \"burning down the\n> repo\" pattern). This works but destroys atomic history, loses\n> authorship, and you never learn the real tool. `git stash` is\n> the professional one-command alternative — learn it once, use\n> it forever.\n\n```freeform\n@startuml\nlayout horizontal\n\nbox \"Working Directory\\n(half-finished feature)\" as wd\nbox \"Stash\\nWIP: power function\" as st\nbox \"Working Directory restored\" as restored\n\nwd --> st : git stash\nst --> restored : git stash pop\n\nnote bottom of wd : do hotfix, commit, merge\n@enduml\n```\n\n### Task 1: Create work-in-progress\n\n```bash\ncd /tutorial/myproject\ngit switch main\n```\n\nOpen `calculator.py` in the editor (top-left). At the bottom of\nthe file, add this half-finished `power` function — exactly as if\nyou had been interrupted mid-implementation:\n\n```python\n\ndef power(a, b):\n    # TODO: add input validation\n    return a ** b\n```\n\nSave the file (Ctrl+S / Cmd+S). The change syncs to the VM\nautomatically. Confirm Git sees the unsaved change:\n\n```bash\ngit status\ngit diff\n```\n\n### Task 2: Stash\n\n**Predict first:** after running `git stash`, what will `git\nstatus` report? Will your changes still show up as \"modified\"?\nWill they be \"staged\"? Will the working tree be \"clean\"? Commit\nto one prediction before running.\n\n```bash\ngit stash\ngit status\n```\n\nThe working directory is **clean** — that's the answer to the\nprediction. The half-finished `power` function is in the stash — not\ncommitted, not lost.\n\n```bash\ngit stash list\n```\n\nEach entry looks like `stash@{0}: WIP on main: <hash> <message>`.\nInternally, a stash is a **commit object** (actually two — one for\nindex, one for working tree) stored under `.git/refs/stash`.\n\n### Task 3: Do the hotfix on a dedicated branch\n\nWith the tree clean, isolate the hotfix:\n\n```bash\ngit switch -c hotfix-divide-zero\n```\n\nNow open `calculator.py` in the editor and add this function at the\nbottom:\n\n```python\n\ndef safe_divide(a, b):\n    \"\"\"Divide a by b, raising ValueError on zero denominator.\"\"\"\n    if b == 0:\n        raise ValueError(\"Cannot divide by zero\")\n    return a / b\n```\n\nSave it. Back in the terminal, commit and merge:\n\n```bash\ngit add calculator.py\ngit commit -m \"Hotfix: add safe_divide to prevent zero-division errors\"\ngit switch main\ngit merge hotfix-divide-zero --no-edit\ngit branch -d hotfix-divide-zero\n```\n\n### Task 4: Recover your stashed work\n\n```bash\ngit stash pop\ngit status\ngit stash list    # now empty\n```\n\nYour `power` function work-in-progress is restored — `pop` removes\nthe stash after applying. The stash list is empty.\n\n### Stash reference\n\n| Command | Effect |\n|---|---|\n| `git stash` | Save tracked modifications + staged changes; clean working tree |\n| `git stash list` | Show all stash entries (stack) |\n| `git stash pop` | Restore the most recent stash **and** drop it |\n| `git stash apply` | Restore the most recent stash but **keep** it |\n| `git stash drop` | Delete the most recent stash without applying |\n| `git stash push -m \"msg\"` | Save with a descriptive message |\n| `git stash -u` | Also include **untracked** files (new files never `git add`-ed) |\n\n> **Gotcha:** Plain `git stash` ignores untracked files. A brand-new\n> file you have never `git add`-ed stays in the working directory.\n> Use `git stash -u` if you need to include it.\n\n### Task 5: Finish the feature properly\n\nEdit `calculator.py` in the editor. Finalize the `power` function\nwith proper validation, then commit with a descriptive message.\n(The test checks for \"power\" in the commit message.)\n\n```python\ndef power(a, b):\n    \"\"\"Return a raised to the power of b.\"\"\"\n    if not isinstance(a, (int, float)) or not isinstance(b, (int, float)):\n        raise TypeError(\"Arguments must be numbers\")\n    return a ** b\n```\n\n### You can now\n\n- **Context-switch cleanly** mid-work: stash, do the urgent task,\n  pop back to where you were — without polluting history.\n- **Distinguish** `pop` from `apply`, and know when each is\n  appropriate.\n- **Diagnose** why `git stash` sometimes seems to \"miss\" a new\n  file (it was untracked; need `-u`).\n"
  watch_files:
  - myproject/calculator.py
  open_file: myproject/calculator.py
  setup_commands:
  - cd /tutorial/myproject && git switch main 2>/dev/null; true
  solution:
