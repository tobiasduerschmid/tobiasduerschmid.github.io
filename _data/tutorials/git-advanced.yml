    ### Task 1: Inspect the divergence

    Pre-built: `feature-sqrt` has `square_root`; `main` later got
    `Bump version notes` + `Add identity helper`.

    ```bash
    cd /tutorial/myproject
    git log --all --oneline --graph --decorate
    ```

    ### Task 2: Rebase and fast-forward

    **Predict before running:** how many parents will the feature tip have after rebase?

    ```bash
    git switch feature-sqrt
    git rebase main
    git switch main
    git merge feature-sqrt        # fast-forward, no merge commit
    git branch -d feature-sqrt
    ```

    Result: one linear line on the graph. No diamond.

    ### Task 3: Rebase through a conflict (desirable difficulty)

    Real rebases conflict when upstream touched the same lines.
    Produce one deliberately:

    ```bash
    git switch -c feature-trailer main~1
    echo '# end-of-module trailer' >> calculator.py
    git commit -am 'Add trailer comment at end of file'
    git rebase main       # CONFLICT — both sides appended at EOF
    git status
    ```

    Conflicts aren't failures — they're "two valid changes touched the
    same lines; a human must combine them." Edit `calculator.py` so the
    bottom keeps **both** the `identity` helper and your trailer
    comment, removing the `<<<` / `===` / `>>>` markers.

    ```bash
    git add calculator.py
    git rebase --continue         # NOT `git commit` — use the rebase verb
    git switch main
    git branch -D feature-trailer
    ```

    > **Remember:** rebase conflict = merge conflict mechanics, but finalize
    > with `git rebase --continue`. Bail with `git rebase --abort`.

    ### When to rebase vs merge

    | Situation | Prefer |
    |---|---|
    | Short feature branch (hours–days), only you | **Rebase** |
    | Long-lived or already-pushed branch used by teammates | **Merge** |
    | Cardinal rule | Never rebase **shared** history |
  setup_commands:
  - "cd /tutorial/myproject\n{ [ -e .git/rebase-merge ] || [ -e .git/rebase-apply ]; } && git rebase --abort 2>/dev/null\ngit switch -q main 2>/dev/null\nn=$(git log --all --oneline 2>/dev/null | grep -cE 'Add square_root function|Add identity helper')\nif [ $n -ge 2 ]; then\n  exit 0\nfi\ngit branch -D feature-sqrt 2>/dev/null\nif git log main --oneline | grep -q 'Add identity helper'; then\n  git reset --hard HEAD~2 2>/dev/null\nfi\ngit switch -qc feature-sqrt\nprintf '\\nimport math\\ndef square_root(x):\\n    \"\"\"Return the square root of x; raises ValueError if negative.\"\"\"\\n    if x < 0:\\n        raise ValueError(\"Cannot take sqrt of negative\")\\n    return math.sqrt(x)\\n' >> calculator.py\ngit commit -qam 'Add square_root function'\ngit switch -q main\necho '# version 1.1 notes' >> calculator.py\ngit commit -qam 'Bump version notes'\necho 'def identity(x): return x' >> calculator.py\ngit commit -qam 'Add identity helper'\n"
  solution:
    # The interactive instructions teach rebase + ff-merge + rebase-through-conflict.
    # The automated solution rebuilds the same end state deterministically:
    # square_root on main without a feature-sqrt merge commit.
    commands:
    - cd /tutorial/myproject && git switch main
    - '{ [ -e .git/rebase-merge ] || [ -e .git/rebase-apply ]; } && git rebase --abort 2>/dev/null'
    - '[ -e .git/MERGE_HEAD ] && git merge --abort 2>/dev/null'
    - git reset --hard HEAD
    - git clean -fdq
    - git branch -D feature-sqrt 2>/dev/null; true
    - git branch -D feature-trailer 2>/dev/null; true
    # Append square_root to main directly (equivalent to rebase + ff-merge end state)
    - "grep -q 'def square_root' calculator.py || (printf '\\nimport math\\ndef square_root(x):\\n    \"\"\"Return the square root of x; raises ValueError if negative.\"\"\"\\n    if x < 0:\\n        raise ValueError(\"Cannot take sqrt of negative\")\\n    return math.sqrt(x)\\n' >> calculator.py && git add calculator.py && git commit -m 'Add square_root function')"
    explanation: |
      - **Rebase = replay:** Git takes the commits on your branch that are not on the target (`feature-sqrt` commits not on `main`), computes their patches, resets the branch pointer to the target tip, and replays each patch as a *new* commit on top.
      - **New SHAs:** Because each replayed commit has a new parent, its SHA is different. Old commits remain in `.git/objects` and `git reflog` — nothing is ever truly lost, but anyone who fetched the old SHAs sees divergence.
      - **Fast-forward merge:** After a successful rebase, the feature branch is a strict extension of main. `git merge feature-sqrt` on main simply moves the main pointer forward — no merge commit.
      - **Rebase conflicts (Task 5):** When upstream and your branch touched the same lines, rebase pauses at the first problem commit. Resolution is identical to a merge conflict — edit the file, remove markers, `git add`, then `git rebase --continue` (*not* `git commit`). `git rebase --abort` bails out at any point.
      - **The rule:** rebase only local/private branches. Rewriting pushed history requires `--force-with-lease` and annoys everyone who already pulled.
  tests:
  - description: On main branch
    command: cd /tutorial/myproject && git symbolic-ref -q HEAD | grep -q 'refs/heads/main'
    hints:
    - text: 'After rebase + merge, end on `main`. `git switch main` if you drifted.'
  - description: feature-sqrt branch was merged and deleted
    command: cd /tutorial/myproject && ! git branch | grep -q 'feature-sqrt'
    hints:
    - text: 'After the fast-forward merge, delete the branch: `git branch -d feature-sqrt`. Safe because its commits are now reachable from `main`.'
  - description: square_root function is on main
    command: cd /tutorial/myproject && grep -q 'def square_root' calculator.py && git log --oneline main | grep -qi 'square_root'
    hints:
    - text: 'Rebase `feature-sqrt` onto `main`, then fast-forward merge. Check `git log --oneline main` — the `square_root` commit should appear on top.'
  - description: History is linear (no merge commit for feature-sqrt)
    command: cd /tutorial/myproject && [ $(git log --merges --oneline main | grep -ci 'Merge branch.*feature-sqrt') -eq 0 ]
    hints:
    - text: 'A merge commit snuck in — you ran `git merge` without rebasing first, or with `--no-ff`. The point of rebase is linear history; redo with `git rebase main` on the feature branch, then `git merge` (fast-forwards).'
  - description: No rebase is in progress and no conflict markers remain (Task 5 resolved)
    command: cd /tutorial/myproject && [ ! -d .git/rebase-merge ] && [ ! -d .git/rebase-apply ] && ! grep -E '^(<{7}|={7}|>{7})' calculator.py
    hints:
    - text: 'Rebase is paused on a conflict. Edit the file, remove `<<<` / `===` / `>>>`, `git add`, then `git rebase --continue` — not `git commit`. `git rebase --abort` bails.'
      condition: 'output_contains: rebase in progress'
  quiz:
    title: Rebase — Knowledge Check
    min_score: 0.8
    shuffle: true
    questions:
    - question: What does `git rebase main` do when run on `feature-sqrt`?
      options:
      - Moves `main` to point at the tip of `feature-sqrt`
      - Computes the patches of commits unique to `feature-sqrt`, resets `feature-sqrt` to the tip of `main`, and replays those patches as new commits
      - Merges `main` into `feature-sqrt` with a merge commit
      - Deletes `main` and renames `feature-sqrt` to `main`
      correct_index: 1
      option_feedback:
        0: This answer reverses the direction; running `rebase main` on feature-sqrt rebases *feature-sqrt*, not main.
        2: This answer confuses rebase with merge; rebase is the linearizing alternative, no merge commit involved.
        3: This answer assumes destructive renaming; rebase moves the current branch's commits, never deletes other branches.
      explanation: 'Rebase rewrites the branch: feature-sqrt''s unique commits become *new* commits on top of main. This linearizes history but changes SHAs — so never rebase pushed branches others are using.'
    - question: After rebasing, why does the rebased commit have a **different SHA** than before?
      options:
      - Git chooses a new SHA for clarity
      - The new commit has a different parent (the tip of main, not the previous branch point), and a commit's SHA hashes its parent(s) + tree + metadata
      - Rebase encrypts the commit
      - Rebase changes the commit message
      correct_index: 1
      option_feedback:
        0: This answer treats SHAs as cosmetic choices; they're deterministic content hashes, not chosen for clarity.
        2: This answer confuses content hashing with encryption.
        3: This answer assumes rebase rewrites text; the message is preserved, only the parent (and thus the SHA) changes.
      explanation: 'Step 3 again: `SHA(commit) = SHA-1(tree + parent(s) + author + committer + message)`. Change the parent → new SHA. Same patch, new identity.'
    - question: When is `git rebase` a **bad** idea?
      options:
      - On a personal feature branch that only you have checked out
      - On a short-lived local branch before opening a PR
      - On a public/shared branch that teammates have already pulled
      - To linearize history before a fast-forward merge
      correct_index: 2
      option_feedback:
        0: This answer rejects rebase's canonical safe use case (private feature branch).
        1: This answer rejects another canonical safe use case (short-lived local branch before PR).
        3: This answer rejects rebase's exact intended workflow (linearize then ff-merge).
      explanation: Rebase rewrites history. If others have the old SHAs, their branches will diverge and they will get ugly conflicts. Stick to merge for anything pushed and shared, rebase for local linearization.
    - question: '**[Revisit Step 2]** You rebased `feature-sqrt` and realized it broke everything. Before pushing. How do you recover the pre-rebase state?'
      options:
      - It is gone — rebase is permanent
      - '`git reflog` to find the pre-rebase SHA, then `git reset --hard <sha>` to restore feature-sqrt'
      - '`git stash pop` to retrieve the old commits'
      - '`git clone` a fresh copy of the repo'
      correct_index: 1
      option_feedback:
        0: This answer ignores reflog's safety net; rebase only abandons refs, the old commits are still in `.git/objects/`.
        2: This answer confuses stash (working-tree shelving) with reflog (HEAD-position history).
        3: This answer is the "burning down the repo" antipattern when reflog can rescue locally.
      explanation: Rebase is only 'destructive' in the sense of changing branch pointers — the original commits remain in `.git/objects` until garbage collection. `git reflog` records every HEAD position including the pre-rebase tip; `git reset --hard` restores it. Your safety net, earned in Step 2.
    - question: After rebasing a feature onto `main`, you run `git merge feature` on `main`. What happens?
      options:
      - A merge commit with two parents is created
      - A fast-forward occurs — `main` simply moves to point at the feature tip; no merge commit, no diamond in the graph
      - The rebase is reversed
      - Git reports an error
      correct_index: 1
      option_feedback:
        0: This answer ignores that rebase made feature a strict extension of main, so merge fast-forwards instead of creating a merge commit.
        2: This answer assumes merge undoes rebase; they compose, they don't reverse.
        3: This answer assumes Git rejects this; it's actually the canonical "rebase + ff merge" workflow.
      explanation: 'After rebase, feature is a strict linear extension of main. The merge reduces to just advancing the main pointer (fast-forward). This is the whole reason many teams rebase before merging: clean, linear history.'
    - question: Which statements about rebase are true? (Select all that apply)
      type: multiple
      options:
      - Rebase creates new commits with new SHAs for each replayed commit
      - Rebase can cause conflicts at each replayed commit, requiring you to resolve one at a time with `git rebase --continue`
      - Rebase automatically pushes the updated branch
      - Rebase can be aborted with `git rebase --abort`, restoring the branch to its pre-rebase state
      correct_indices:
      - 0
      - 1
      - 3
      option_feedback:
        2: This answer confuses local rewriting with publication; push is always a separate step from rebase.
      explanation: Rebase applies each patch in turn and can conflict at any of them — you resolve, `git add`, `git rebase --continue`. `--abort` restores the pre-rebase state. Rebase does **not** push anything; that is a separate `git push` step (often needing `--force-with-lease` on rebased branches, which is where collaborator pain happens).
    - question: '**[Revisit Step 5]** You had two choices for bringing a colleague''s single fix into `main`: cherry-pick or rebase. Both create new commits with new SHAs. What is the key difference in intent?'
      options:
      - Cherry-pick copies *one* commit onto HEAD; rebase moves *all* of a branch's unique commits onto a new base — they differ in scope, not mechanism
      - Cherry-pick is destructive; rebase is not
      - Cherry-pick requires the commit to be on a branch; rebase does not
      - They are identical aliases
      correct_index: 0
      option_feedback:
        1: This answer assumes cherry-pick mutates the source; it's purely additive, just like rebase's commit creation.
        2: This answer invents a constraint; cherry-pick takes any commit-ish, branch or not.
        3: This answer ignores the scope difference (one commit vs. a series).
      explanation: 'Under the hood they use the same machinery — patch out, replay on new parent, new SHA. The difference is *scope*: cherry-pick = one commit, rebase = a series. Step 5''s cherry-pick and Step 8''s rebase are the same technique at different scales.'
    - question: '**[Revisit Step 3]** During rebase, a conflict halts you mid-stream. `git reflog` at this moment shows many entries. Which entry do you want to `git reset --hard` to if you decide to abort manually instead of using `git rebase --abort`?'
      options:
      - The most recent `HEAD@{0}` entry
      - 'The `checkout: moving from ...` entry that shows where the branch pointed *before* rebase started'
      - The very oldest reflog entry
      - Any entry — they all point to the same commit
      correct_index: 1
      option_feedback:
        0: This answer points at the *current* (post-rebase) state; you want the entry from *before* the rebase.
        2: This answer ignores the relevant time range; the pre-rebase entry is recent, not the oldest.
        3: This answer ignores that reflog entries each refer to a different historical HEAD position.
      explanation: Reflog logs every HEAD movement. The pre-rebase position is typically labeled `checkout` or the last `commit` before the `rebase` entries. That SHA is the pre-rebase branch tip — the safe rescue point. This is the Step 2 reflog safety net applied to rebase.
    - question: '**[Revisit basic tutorial Step 11]** You edit a conflicted file during a `git rebase`, remove the `<<<<<<<` / `=======` / `>>>>>>>` markers, and run `git add`. What is the **next** command to finalize this one commit of the rebase?'
      options:
      - '`git commit` — same as finishing a merge'
      - '`git rebase --continue` — during a rebase, Git is replaying commits one at a time, so continuation (not a fresh commit) is how you resume'
      - '`git merge --continue`'
      - '`git push`'
      correct_index: 1
      option_feedback:
        0: This answer treats a rebase conflict like a merge conflict's final step; rebase needs `--continue`, not `commit`.
        2: This answer uses the wrong verb; this is a rebase, not a merge.
        3: This answer skips finalizing the rebase entirely.
      explanation: A rebase conflict uses the *same* markers and the *same* `git add` step as a merge conflict (basic tutorial Step 11). The *only* difference is the final verb — `git rebase --continue` tells Git to replay the remaining commits, which `git commit` would not. Running `git commit` by reflex here often leaves the rebase half-done. `git rebase --abort` at any point restores the pre-rebase state.
    - question: Put in order the commands to rebase a private 3-commit `feature` branch onto the latest `main` and fast-forward merge, with nothing leftover on disk.
      type: parsons
      display: block
      lines:
      - 'git switch feature                # be on the branch being rebased'
      - 'git rebase main                   # replay feature commits onto latest main'
      - 'git switch main                   # target the integration branch'
      - 'git merge feature                 # fast-forward, no merge commit'
      - 'git branch -d feature             # clean up the now-merged branch'
      distractors:
      - 'git push --force                  # DANGER on shared branches'
      - 'git merge feature --no-ff         # would create a merge commit — not ff'
      - 'git rebase feature                # backwards — rebases main onto feature'
      - 'git reset --hard feature          # destroys main''s history'
      explanation: The correct direction is "rebase the shorter branch onto the longer." Running `rebase feature` from main (distractor 3) does the opposite — rebases main onto feature, usually rewriting commits you didn't want to touch. `--no-ff` prevents fast-forward (that's the point of this strategy — a linear, no-merge-commit result). `--force` has no place in a local pre-PR workflow.
- title: 'Interactive Rebase: Edit, Squash, Reorder, Drop'
  view: git_graph
  instructions: |
    ### 🎯 You will learn to
    - **Squash** messy WIP commits into one clean commit before opening a PR.
    - **Drop** an accidentally-committed secret (and recover it from reflog if needed).
    - **Reword** a commit message retroactively without changing its diff.
    - **Pick the right verb** (`pick`/`reword`/`squash`/`fixup`/`drop`/`edit`) for the rewriting goal.

    ### 🚪 This is the second threshold step

    Step 9 is the densest step in the tutorial — eight verbs, several edge
    cases, and the most "wait, what?" moments in real Git. That's not a
    bug; it's where most engineers' command of Git plateaus. *Crossing*
    this threshold is what separates "I use Git" from "I shape Git
    history." Plan two passes. Don't worry if Task 4 needs a re-read.

    ### ⚠️ Safe zone only

    Interactive rebase **rewrites history** (Step 3: new parents → new SHAs).
    Run it only on commits that (a) are unpushed, or (b) live on a feature
    branch **only you** use. For public history, use `git revert` (next).

    ### 🤔 Predict first

    After `rebase -i` collapses four messy commits into one clean commit,
    do the original four still exist anywhere — and could you recover one
    of them with `git reflog`?

    > 💡 **Schema check.** Same pattern as Steps 5 & 8: every rewriting verb
    > here (`squash`, `drop`, `reword`, `edit`) creates new commit objects
    > and moves the branch pointer. The "old" commits don't disappear —
    > they're just unreferenced. Reflog finds them.

    <div data-git-command-lab role="region" aria-label="Interactive commit-graph demo: rebase -i with three squash directives collapses four messy WIP commits on a feature-login branch into one clean commit before opening a pull request.">
    <script type="application/json">
    {
      "command": "git rebase -i HEAD~4   (squash into one)",
      "description": "Different scenario from the hands-on: four messy commits on `feature-login` — `Add login`, plus three nit fixes — collapse into one clean commit **W+F+F+M** before the PR reviewer sees them. Line 1 must stay `pick` because `squash` melds **into the previous** line; line 1 has no previous.\n\nYou'll apply the same `pick/squash/squash/squash` pattern to `refactor-power` below.",
      "rebaseFile": "pick   W Add login\nsquash F Fix indent\nsquash F Fix lint\nsquash M Fix nit\n\n# Rebase abc1234..M onto abc1234 (4 commands)\n#\n# Commands:\n# p, pick   = use commit as-is\n# s, squash = meld into previous commit\n# f, fixup  = squash, discard this commit's message\n# d, drop   = remove commit",
      "before": {
        "log": "M000000000000000000000000000000000000000|F200000000000000000000000000000000000000|Fix nit|HEAD -> feature-login\nF200000000000000000000000000000000000000|F100000000000000000000000000000000000000|Fix lint|\nF100000000000000000000000000000000000000|W000000000000000000000000000000000000000|Fix indent|\nW000000000000000000000000000000000000000|B000000000000000000000000000000000000000|Add login|\nB000000000000000000000000000000000000000|A000000000000000000000000000000000000000|Add API|main\nA000000000000000000000000000000000000000||Init|",
        "branches": "  main\n* feature-login",
        "head": "refs/heads/feature-login",
        "highlights": {
          "W000000000000000000000000000000000000000": { "color": "#003B5C", "secondary": "#FFD100" },
          "F100000000000000000000000000000000000000": { "color": "#003B5C", "secondary": "#FFD100" },
          "F200000000000000000000000000000000000000": { "color": "#003B5C", "secondary": "#FFD100" },
          "M000000000000000000000000000000000000000": { "color": "#003B5C", "secondary": "#FFD100" }
        }
      },
      "after": {
        "log": "WFFM000000000000000000000000000000000000|B000000000000000000000000000000000000000|Add login feature|HEAD -> feature-login\nB000000000000000000000000000000000000000|A000000000000000000000000000000000000000|Add API|main\nA000000000000000000000000000000000000000||Init|",
        "branches": "  main\n* feature-login",
        "head": "refs/heads/feature-login",
        "highlights": {
          "WFFM000000000000000000000000000000000000": { "color": "#003B5C", "secondary": "#FFD100" }
        }
      }
    }
    </script>
    </div>

    <div data-git-command-lab role="region" aria-label="Interactive commit-graph demo: rebase -i with drop removes a commit that leaked an API token from branch history. The dropped commit still exists in the object database, recoverable via reflog until garbage collection runs.">
    <script type="application/json">
    {
      "command": "git rebase -i HEAD~2   (drop)",
      "description": "Different scenario from the hands-on: one commit accidentally **leaked an API token**; the next one added tests. `drop` removes the leak commit from branch history; `Add tests` replays as **T'** on top of the pre-leak tip. The dropped commit is **not deleted** — it lives in `.git/objects`, reachable via reflog until `git gc`.\n\nYou'll use the same `drop` verb on the `SECRET_API_KEY` commit in the hands-on.",
      "rebaseFile": "drop S Leak token\npick T Add tests\n\n# Rebase abc1234..T onto abc1234 (2 commands)\n#\n# Commands:\n# p, pick = use commit\n# d, drop = remove commit",
      "before": {
        "log": "T000000000000000000000000000000000000000|S000000000000000000000000000000000000000|Add tests|HEAD -> feature-login\nS000000000000000000000000000000000000000|R000000000000000000000000000000000000000|Leak token|\nR000000000000000000000000000000000000000||Add login feature|",
        "branches": "* feature-login",
        "head": "refs/heads/feature-login",
        "highlights": {
          "S000000000000000000000000000000000000000": { "color": "#C0392B", "secondary": "#fff" },
          "T000000000000000000000000000000000000000": { "color": "#003B5C", "secondary": "#FFD100" }
        }
      },
      "after": {
        "log": "T'00000000000000000000000000000000000000|R000000000000000000000000000000000000000|Add tests|HEAD -> feature-login\nR000000000000000000000000000000000000000||Add login feature|",
        "branches": "* feature-login",
        "head": "refs/heads/feature-login",
        "highlights": {
          "T'00000000000000000000000000000000000000": { "color": "#003B5C", "secondary": "#FFD100" }
        }
      }
    }
    </script>
    </div>

    ### The four verbs you'll use here

    | Verb | Effect |
    |---|---|
    | `pick` | Use commit as-is (default) |
    | `squash` | Meld into previous; combine messages |
    | `drop` | Remove commit |
    | `reword` | Edit message only |

    <details markdown="1"><summary>📋 All six core verbs (`fixup`, `edit`)</summary>

    | Verb | Effect |
    |---|---|
    | `pick` | Use commit as-is (default) |
    | `reword` | Edit message only |
    | `edit` | Pause so you can `commit --amend` or add fixes / **split** |
    | `squash` | Meld into previous; combine messages |
    | `fixup` | Like squash, drop this commit's message |
    | `drop` | Remove commit |

    Two more verbs exist for advanced workflows: `break` (pause mid-rebase
    so you can poke around, then `git rebase --continue`) and `exec <cmd>`
    (run a shell command after each replayed commit, e.g. `exec pytest`).
    See `git help rebase` if you need them.

    </details>

    <details markdown="1"><summary>🛠 Why this VM uses scripted `sed` instead of `$EDITOR`</summary>

    Real workflow: `git rebase -i HEAD~N` opens your `$EDITOR`, you hand-edit
    action words, save-and-close. This browser VM can't host an interactive
    editor, so we script it via `GIT_SEQUENCE_EDITOR="sed -i …"`.

    **The skill is knowing what to change, not typing the `sed`.** For each
    task: (1) predict the edit on paper, (2) run the scripted version,
    (3) verify the log matches your prediction.

    </details>

    ### Task 1: Inspect the messy branch

    ```bash
    cd /tutorial/myproject
    git log --oneline -5           # 4 ugly commits on refactor-power
    ```

    ### Task 2: Squash four commits into one

    Predict: which lines get `squash`, and why must line 1 stay `pick`?

    ```bash
    GIT_SEQUENCE_EDITOR="sed -i '2,4s/^pick/squash/'" git rebase -i HEAD~4
    git commit --amend -m "Refactor: cleanup notes in calculator.py"
    git log --oneline -3
    ```

    ### Task 3: Drop a secret-leaking commit

    Append to `calculator.py`: `SECRET_API_KEY=oops`. Commit:
    `git commit -am "Accidentally add secret (should be dropped)"`.

    Then append `def placeholder(): pass` and commit:
    `git commit -am "Add placeholder function"`.

    Drop the secret:

    ```bash
    GIT_SEQUENCE_EDITOR="sed -i '1s/^pick/drop/'" git rebase -i HEAD~2
    grep SECRET_API_KEY calculator.py || echo "secret is gone from branch"
    ```

    ### Task 3b: Prove reflog rescues the "dropped" commit

    Dropped ≠ deleted (Step 3 again).

    ```bash
    git reflog -n 10
    SECRET_SHA=$(git reflog | grep -m1 'Accidentally add secret' | awk '{print $1}')
    git branch secret-backup $SECRET_SHA
    git log secret-backup --oneline
    ```

    <details markdown="1"><summary>⚠️ For *real* secrets: drop+rescue is the wrong workflow</summary>

    Drop + rescue leaves *more* copies of the secret, not fewer. For an actual
    leaked credential:

    1. Rotate the credential immediately (the only step that truly mitigates).
    2. Scrub with `git filter-repo` or BFG.
    3. Ask collaborators to re-clone.

    Use `drop` only for non-sensitive cleanup (debug prints, experiments).

    </details>

    ### Task 4: Reword a message

    ```bash
    GIT_SEQUENCE_EDITOR="sed -i '1s/^pick/reword/'" \
      GIT_EDITOR="sed -i '1s/.*/Refactor: cleanup notes and placeholder/'" \
      git rebase -i HEAD~2
    git log --oneline -3
    ```

    Two env vars = two editors (todo list + message editor). In real life
    you'd hand-edit both.

    ### Wrap-up: rule of thumb

    - **Local, unpushed** history → `rebase -i` (any verb).
    - **Shared, pushed** history → `git revert` only (next step).

    Rewriting public history forces every collaborator to reconcile.
  watch_files:
  - myproject/calculator.py
  open_file: myproject/calculator.py
  setup_commands:
  - "cd /tutorial/myproject\n{ [ -e .git/rebase-merge ] || [ -e .git/rebase-apply ]; } && git rebase --abort 2>/dev/null\ngit switch -q main 2>/dev/null\nif git log refactor-power --oneline 2>/dev/null | grep -q 'More typo fixes'; then\n  git switch -q refactor-power 2>/dev/null\n  exit 0\nfi\ngit branch -D refactor-power 2>/dev/null\ngit switch -qc refactor-power\necho '# WIP: try new power approach' >> calculator.py\ngit commit -qam 'WIP'\nsed -i 's/# WIP: try new power approach/# starting refactor/' calculator.py\ngit commit -qam 'Fix typo'\necho '# TODO: edge cases' >> calculator.py\ngit commit -qam 'Fix typo again'\necho '# done iterating' >> calculator.py\ngit commit -qam 'More typo fixes'\n"
  solution:
    # The interactive instructions teach `rebase -i` with squash, drop, and
    # reword. The automated solution rebuilds the same end state directly:
    # refactor-power has no WIP/typo commits, no SECRET_API_KEY, and a
    # secret-backup branch points to a 'Accidentally add secret' commit.
    commands:
    - cd /tutorial/myproject
    - '{ [ -e .git/rebase-merge ] || [ -e .git/rebase-apply ]; } && git rebase --abort 2>/dev/null'
    - '[ -e .git/CHERRY_PICK_HEAD ] && git cherry-pick --abort 2>/dev/null'
    - git switch -q main 2>/dev/null
    - git reset --hard HEAD
    - git clean -fdq
    # Recreate refactor-power with a single clean commit (replaces the WIP/typo mess)
    - git branch -D refactor-power 2>/dev/null; true
    - git switch -c refactor-power
    - "echo '# starting refactor' >> calculator.py && git add calculator.py && git commit -m 'Refactor: cleanup notes in calculator.py'"
    # Make a transient secret commit, anchor secret-backup to it, then drop
    - "echo 'SECRET_API_KEY=oops' >> calculator.py && git add calculator.py && git commit -m 'Accidentally add secret (should be dropped)'"
    - git branch -f secret-backup HEAD
    - git reset --hard HEAD~1
    # Add the reworded final commit
    - "echo '# done iterating' >> calculator.py && git add calculator.py && git commit -m 'Refactor: cleanup notes and placeholder'"
    explanation: |
      - **`git rebase -i HEAD~N`:** opens the todo list for the last N commits. You mark each with one of six core verbs (`pick`, `reword`, `squash`, `fixup`, `edit`, `drop`); two more (`break`, `exec`) exist for advanced workflows — see `git help rebase`.
      - **`squash` vs `fixup`:** both meld with the previous commit. `squash` combines messages (editor opens); `fixup` silently drops the squashed commit's message. Use `fixup` for tiny typos, `squash` when the message has information worth keeping.
      - **`drop`:** deletes the commit from history. Useful for removing accidentally-committed secrets, debug prints, or experiments that did not pan out. The dropped commit remains in reflog for recovery.
      - **`reword`:** edits the message without touching content. Fixes typos in commit messages retroactively.
      - **Recovery:** the pre-rebase SHA is always in `git reflog`. `git reset --hard HEAD@{1}` (or the relevant reflog entry) restores the branch exactly.
  tests:
  - description: On refactor-power branch
    command: cd /tutorial/myproject && git symbolic-ref -q HEAD | grep -q 'refs/heads/refactor-power'
    hints:
    - text: '`git switch refactor-power` before rebasing. Interactive rebase rewrites the *current* branch.'
  - description: Secret was dropped from the active branch (SECRET_API_KEY not in calculator.py)
    command: cd /tutorial/myproject && ! grep -q 'SECRET_API_KEY' calculator.py
    hints:
    - text: 'The secret is still here. During `rebase -i HEAD~2`, change the `pick` of the secret commit to `drop`. Scripted: `GIT_SEQUENCE_EDITOR="sed -i ''1s/^pick/drop/''" git rebase -i HEAD~2`.'
      condition: 'code_contains: SECRET_API_KEY'
  - description: Secret-commit is gone from branch history
    command: cd /tutorial/myproject && ! git log --oneline | grep -qi 'Accidentally add secret'
    hints:
    - text: 'The commit is still in `git log`. Interactive rebase with `drop` (not `pick`) on that line, save and exit the editor to finish the rebase.'
  - description: secret-backup branch rescued the 'dropped' commit via reflog (proves reflog safety net)
    command: cd /tutorial/myproject && git log secret-backup --oneline 2>/dev/null | grep -qi 'Accidentally add secret'
    hints:
    - text: '`git reflog` → find the SHA of the dropped "Accidentally add secret" commit → `git branch secret-backup <sha>`. The dropped commit is still in `.git/objects`; you''re just anchoring it.'
  - description: The 4 messy WIP/typo commits were squashed into fewer commits
    command: cd /tutorial/myproject && [ $(git log --oneline refactor-power | grep -ciE '(WIP|Fix typo|More typo)') -le 1 ]
    hints:
    - text: 'Rebase with `squash` (or `fixup`) on lines 2–4 to fold them into the pick on line 1. After the rebase, the WIP/typo commits should be folded together.'
  quiz:
    title: Interactive Rebase — Knowledge Check
    min_score: 0.8
    shuffle: true
    questions:
    - question: Which interactive-rebase action **keeps the commit** but lets you change only its message?
      options:
      - '`pick`'
      - '`reword`'
      - '`squash`'
      - '`drop`'
      correct_index: 1
      option_feedback:
        0: This answer doesn't change anything; `pick` is a no-op that uses the commit as-is.
        2: This answer melds two commits; the question asks for a message-only edit on one commit.
        3: This answer deletes the commit instead of editing it.
      explanation: '`reword` keeps the commit content identical but opens the editor to change the message. `pick` is no-op, `squash` melds into the previous commit, `drop` deletes it.'
    - question: What is the difference between `squash` and `fixup`?
      options:
      - '`squash` combines messages (editor opens); `fixup` silently discards the squashed commit''s message'
      - '`squash` rewrites hash; `fixup` preserves it'
      - '`fixup` can only be used on merge commits'
      - They are identical
      correct_index: 0
      option_feedback:
        1: This answer confuses 'rewrites the SHA' (both do, all rebase verbs do) with the actual difference (message handling).
        2: This answer invents a constraint; fixup works on any commit, not just merges.
        3: This answer ignores the actual difference (whether the editor opens for the squashed message).
      explanation: Both meld into the previous commit. `squash` opens the editor so you can combine messages; `fixup` just drops the squashed commit's message. Use `fixup` for trivial typos, `squash` when both messages are meaningful.
    - question: You just ran `git rebase -i HEAD~3` and realized you dropped a commit you needed. Can you recover it?
      options:
      - No — dropped commits are permanently deleted
      - Yes — `git reflog` still shows the pre-rebase HEAD; `git reset --hard HEAD@{1}` restores everything
      - Only by running `git rebase --undo`
      - Only if you had pushed the commit
      correct_index: 1
      option_feedback:
        0: This answer ignores reflog's safety net; the dropped commit is unreferenced, not deleted.
        2: This answer invents a subcommand; `git rebase` has no `--undo`.
        3: This answer reverses the rule; pushing makes recovery harder, not easier (because teammates also have the old SHAs to reconcile).
      explanation: Dropped commits remain in `.git/objects` until garbage collection prunes them. `git reflog` is the bookmark that lets you find them. `git reset --hard <reflog-sha>` restores the exact pre-rebase state. **This is the safety net.** Always verify it works once before a high-stakes rebase.
    - question: '**[Revisit Step 3]** After an interactive rebase, the rewritten commits have new SHAs even if their patches are identical. Why?'
      options:
      - Interactive rebase randomly generates SHAs
      - A commit's SHA hashes its tree + parents + metadata; rebase changes the parent, so the SHA changes
      - Interactive rebase encrypts commits
      - Git renames the commits for clarity
      correct_index: 1
      option_feedback:
        0: This answer assumes randomness; SHAs are deterministic content + parent hashes.
        2: This answer confuses hashing with encryption.
        3: This answer treats SHAs as cosmetic; they're determined by content + parents, not chosen for clarity.
      explanation: 'Same answer as for simple rebase: different parent → different SHA. The object model does not allow ''editing'' a commit — all that changes is which commit the branch pointer references.'
    - question: Which of these is the **most dangerous** use of interactive rebase?
      options:
      - On a local branch to squash WIP commits before opening a PR
      - On a local branch to drop a commit that accidentally included a secret
      - On `main` of a shared repository used by 10 teammates, to drop a week-old commit
      - On a personal experiment branch that nobody else has cloned
      correct_index: 2
      option_feedback:
        0: This answer rejects interactive rebase's canonical safe use case (local WIP cleanup before PR).
        1: This answer flags a safe-zone use; rewriting unpushed history is the right context for `drop`.
        3: This answer flags another safe-zone use; nobody else holds the old SHAs on a personal experiment branch.
      explanation: Rewriting shared history is the nuclear option. Everyone who fetched the old commits now has a conflicting local copy of main; their pulls fail spectacularly. For public history, use `git revert` (which creates a new *anti-matter* commit) instead. Reserve interactive rebase for local cleanup.
    - question: You want to split one giant commit into three smaller ones during interactive rebase. Which action lets you do that?
      options:
      - '`pick`'
      - '`squash`'
      - '`edit` — pauses at the commit so you can `git reset HEAD~`, stage smaller pieces, and commit each separately'
      - '`reword`'
      correct_index: 2
      option_feedback:
        0: This answer keeps the commit as-is; splitting requires pausing and recomposing.
        1: This answer merges commits; splitting goes the other direction.
        3: This answer changes the message; splitting changes the commit count.
      explanation: '`edit` pauses rebase at that commit with HEAD there. You then `git reset HEAD~` (un-commit but keep changes staged/unstaged), split the changes into multiple `git add` + `git commit` cycles, and finally `git rebase --continue`. The original one commit is replaced by your new sequence.'
    - question: '**[Revisit Step 2]** In Task 3b you ''rescued'' a dropped commit. In terms of the object database, what did `git branch secret-backup <sha>` actually do?'
      options:
      - It copied the dropped commit from `.git/trash` back into `.git/objects`
      - It wrote a 41-byte file at `.git/refs/heads/secret-backup` containing the SHA, making the commit reachable again — the commit object itself never moved
      - It recreated the commit from the reflog's textual record
      - It undid the rebase
      correct_index: 1
      option_feedback:
        0: This answer invents a `.git/trash` directory; Git has none — nothing was ever moved out of `.git/objects/`.
        2: This answer assumes reflog reconstructs commits from text; the commits were never gone, only unreachable.
        3: This answer assumes branch creation is a global undo; it only adds one ref (no rebase reversal).
      explanation: Same mechanic as Step 2's rescued-work branch. The dropped commit was never deleted — only unreferenced. Creating a branch (one 41-byte file) re-anchors it as reachable. Now `git gc` won't prune it. This is the same reflog + branch recipe, applied to a different scenario (rebase-drop vs detached-HEAD-orphan).
    - question: '**[Revisit Step 5]** You are about to interactive-rebase a branch. You have uncommitted edits you want to keep but not carry through the rebase. Safest workflow?'
      options:
      - Commit them as WIP then rebase — they will survive
      - '`git stash` them (Step 4) → rebase → `git stash pop` when done → same pre-rebase work, cleanly on the rebased branch'
      - Run rebase with `--ignore-uncommitted`
      - Git rebase will refuse to start if you have uncommitted changes, so nothing to worry about
      correct_index: 1
      option_feedback:
        0: This answer pollutes history; the question explicitly says "keep but not carry through" — WIP commits get carried through.
        2: This answer invents a flag; rebase has no `--ignore-uncommitted` option.
        3: This answer is half-true (rebase does refuse) but doesn't address how to handle the uncommitted work the question wants preserved.
      explanation: 'Rebase refuses to start with dirty working tree — so Git is already stopping you. Stash is the clean pattern: preserve the work-in-progress (Step 4), do the rebase, pop the stash onto the rebased branch. This composes tools across steps — recognizing when two tools work together is the mark of Git fluency.'
    - question: Put in order the steps to squash 4 messy commits on a local branch into one clean commit (assuming you're using the scripted VM editor).
      type: parsons
      display: block
      lines:
      - 'git log --oneline -5               # inspect what we''re rewriting'
      - 'GIT_SEQUENCE_EDITOR="sed -i ''2,4s/^pick/squash/''" git rebase -i HEAD~4'
      - '# Git replays commit 1 as pick, squashes commits 2-4 into it'
      - 'git commit --amend -m "Refactor: cleanup notes in calculator.py"'
      - 'git log --oneline -3               # verify: 4 commits became 1'
      distractors:
      - 'git push --force                   # DANGER: never on shared history'
      - 'git rebase -i HEAD~4 --squash-all  # not a real flag'
      - 'git reset --hard HEAD~4            # destroys commits without combining'
      - 'git merge --squash HEAD~4          # wrong tool for intra-branch squash'
      explanation: The canonical pre-PR cleanup. Distractor 1 is the cardinal rule broken. Distractor 2 is invented. Distractor 3 discards instead of squashing (no single commit preserves the combined patch). Distractor 4 (`merge --squash`) is for *branch-to-branch* collapse, not for cleaning up commits on the current branch.
- title: 'Squash Merge: Collapse a Feature Into a Single Commit'
  view: git_graph
  instructions: |
    ### 🎯 You will learn to
    - **Pick** squash vs. rebase vs. merge based on how `main`'s log should read.
    - **Anticipate the trade-off:** clean main, lost intra-feature `bisect` precision.
    - **Recover** individual feature commits if a regression needs fine-grained blame.

    `git merge --squash <branch>` collapses a multi-commit feature into **one
    new commit** on `main`. The feature branch is untouched.

    ### 🤔 Predict first

    After `git merge --squash feature` followed by `git commit`, how many
    parents does the new commit on `main` have — one, two, or three? And
    what does that imply for `git bisect` later?

    <details markdown="1"><summary>📋 Three merge strategies side by side (Steps 8 + 10 unified)</summary>

    | Method | main's graph | Use when |
    |---|---|---|
    | `git merge feature` | Merge commit, 2 parents (diamond) | Long-lived branch; preserve merge context |
    | `rebase + merge` (ff) | Linear, each commit preserved | Short feature; keep individual commits |
    | `git merge --squash` | **One new commit**, branch untouched | Want `main` to read as one commit per feature |

    </details>

    <div data-git-command-lab role="region" aria-label="Interactive commit-graph demo: git merge --squash followed by git commit collapses a feature branch's three commits into one new commit on main. The feature branch and its individual commits remain untouched, available for later fine-grained bisect.">
    <script type="application/json">
    {
      "command": "git merge --squash feature-auth && git commit",
      "description": "Different scenario from the hands-on: collapse `feature-auth`'s three commits (`Add signin`, `Add logout`, `Add session`) into **one** new commit on `main`. The feature branch is **untouched** — its commits still exist there, valuable later when `bisect` needs fine-grained precision inside the feature.\n\nCompare to rebase (Step 8): rebase produces **three** new commits on main; squash produces **one**. Same feature, different main-log shape. You'll apply this below to `feature-stats`.",
      "before": {
        "log": "C000000000000000000000000000000000000000|B000000000000000000000000000000000000000|Refactor|HEAD -> main\nS300000000000000000000000000000000000000|S200000000000000000000000000000000000000|Add session|feature-auth\nS200000000000000000000000000000000000000|S100000000000000000000000000000000000000|Add logout|\nS100000000000000000000000000000000000000|B000000000000000000000000000000000000000|Add signin|\nB000000000000000000000000000000000000000|A000000000000000000000000000000000000000|Add API|\nA000000000000000000000000000000000000000||Init|",
        "branches": "* main\n  feature-auth",
        "head": "refs/heads/main",
        "highlights": {
          "S100000000000000000000000000000000000000": { "color": "#003B5C", "secondary": "#FFD100" },
          "S200000000000000000000000000000000000000": { "color": "#003B5C", "secondary": "#FFD100" },
          "S300000000000000000000000000000000000000": { "color": "#003B5C", "secondary": "#FFD100" }
        }
      },
      "after": {
        "log": "Σ000000000000000000000000000000000000000|C000000000000000000000000000000000000000|Add auth module|HEAD -> main\nC000000000000000000000000000000000000000|B000000000000000000000000000000000000000|Refactor|\nS300000000000000000000000000000000000000|S200000000000000000000000000000000000000|Add session|feature-auth\nS200000000000000000000000000000000000000|S100000000000000000000000000000000000000|Add logout|\nS100000000000000000000000000000000000000|B000000000000000000000000000000000000000|Add signin|\nB000000000000000000000000000000000000000|A000000000000000000000000000000000000000|Add API|\nA000000000000000000000000000000000000000||Init|",
        "branches": "* main\n  feature-auth",
        "head": "refs/heads/main",
        "highlights": {
          "Σ000000000000000000000000000000000000000": { "color": "#003B5C", "secondary": "#FFD100" }
        }
      }
    }
    </script>
    </div>

    ### Task 1: Inspect the feature

    ```bash
    cd /tutorial/myproject
    git log feature-stats --oneline -5     # three focused commits
    ```

    ### Task 2: Squash-merge

    ```bash
    git switch main
    git merge --squash feature-stats
    git status       # staged changes, but NO commit yet — squash stops here
    git commit -m "Add descriptive statistics module (mean, variance, stddev)"
    ```

    ### Task 3: Confirm + clean up

    ```bash
    git log --oneline main            # one new commit for the feature
    git branch -D feature-stats       # -D because not ff-merged in Git's view
    ```

    <details markdown="1"><summary>⚠️ The cost: bisect granularity</summary>

    `bisect` on `main` can only narrow to the *whole* feature commit, not one
    of its three internal commits. Keeping the feature branch around (or its
    reflog) preserves fine-grained recovery — the strongest argument against
    deleting merged feature branches the same day they merge.

    </details>
  setup_commands:
  - "cd /tutorial/myproject\n[ -e .git/MERGE_HEAD ] && git merge --abort 2>/dev/null\ngit switch -q main 2>/dev/null\nif git log feature-stats --oneline 2>/dev/null | grep -q 'Add stddev function'; then\n  exit 0\nfi\ngit branch -D feature-stats 2>/dev/null\ngit switch -qc feature-stats\nprintf '\\ndef mean(values):\\n    return sum(values) / len(values)\\n' >> calculator.py\ngit commit -qam 'Add mean function'\nprintf '\\ndef variance(values):\\n    m = mean(values)\\n    return sum((x - m) ** 2 for x in values) / len(values)\\n' >> calculator.py\ngit commit -qam 'Add variance function'\nprintf '\\nimport math as _math\\ndef stddev(values):\\n    return _math.sqrt(variance(values))\\n' >> calculator.py\ngit commit -qam 'Add stddev function'\ngit switch -q main\n"
  solution:
    commands:
    - cd /tutorial/myproject
    - '{ [ -e .git/rebase-merge ] || [ -e .git/rebase-apply ]; } && git rebase --abort 2>/dev/null'
    - '[ -e .git/MERGE_HEAD ] && git merge --abort 2>/dev/null'
    - git switch -q main 2>/dev/null
    - git reset --hard HEAD
    - git clean -fdq
    # If feature-stats wasn't created by setup, build the equivalent end state
    - "if git rev-parse --verify feature-stats 2>/dev/null; then git merge --squash feature-stats && git commit -m 'Add descriptive statistics module (mean, variance, stddev)'; else printf '\\ndef mean(values):\\n    return sum(values) / len(values)\\n\\ndef variance(values):\\n    m = mean(values)\\n    return sum((x - m) ** 2 for x in values) / len(values)\\n\\nimport math as _math\\ndef stddev(values):\\n    return _math.sqrt(variance(values))\\n' >> calculator.py && git add calculator.py && git commit -m 'Add descriptive statistics module (mean, variance, stddev)'; fi"
    - git branch -D feature-stats 2>/dev/null; true
    explanation: |
      - **`git merge --squash <branch>`:** applies the cumulative diff of `<branch>` vs main's merge base, stages it, but **does not commit**. You then `git commit` with a fresh message. Main gains one commit; `<branch>` is untouched.
      - **One commit per feature:** main's history reads cleanly (one commit = one feature). Trade-off: you lose fine-grained intra-feature history, making `git bisect` less precise within the feature.
      - **Branch cleanup:** after a squash merge, the feature branch was *not* ff-merged in Git's eyes (its commits are not on main — only a new combined commit is). Use `git branch -D` (capital D, force) to delete it.
  tests:
  - description: On main branch
    command: cd /tutorial/myproject && git symbolic-ref -q HEAD | grep -q 'refs/heads/main'
    hints:
    - text: 'Squash-merge lands on `main`. `git switch main` first, then `git merge --squash feature-stats`.'
  - description: feature-stats branch has been deleted
    command: cd /tutorial/myproject && ! git branch | grep -q 'feature-stats'
    hints:
    - text: 'After the squash commit on `main`, `git branch -D feature-stats` removes the branch. Use `-D` (not `-d`) — squash-merge leaves the branch looking "unmerged" to Git.'
  - description: mean, variance, and stddev are on main
    command: cd /tutorial/myproject && grep -q 'def mean' calculator.py && grep -q 'def variance' calculator.py && grep -q 'def stddev' calculator.py
    hints:
    - text: 'All three functions should land in one commit. `git merge --squash feature-stats` stages the combined changes — remember to `git commit -m "Add stats module"` afterward.'
  - description: The three feature commits are NOT in main's history (only one combined commit)
    command: cd /tutorial/myproject && [ $(git log --oneline main | grep -ciE 'Add (mean|variance|stddev) function') -eq 0 ]
    hints:
    - text: 'Individual feature commits are on `main` — looks like a regular merge, not `--squash`. Reset with `git reset --hard ORIG_HEAD` and redo with `git merge --squash`.'
  quiz:
    title: Squash Merge — Knowledge Check
    min_score: 0.8
    shuffle: true
    questions:
    - question: What does `git merge --squash feature` do?
      options:
      - Creates a merge commit with two parents and the feature's history intact
      - Stages the cumulative diff of the feature branch on main without committing, so you can create one combined commit
      - Deletes the feature branch
      - Rebases the feature onto main
      correct_index: 1
      option_feedback:
        0: This answer confuses regular merge with squash-merge; squash deliberately *avoids* the second parent.
        2: This answer assumes squash-merge cleans up the source; the feature branch is untouched.
        3: This answer confuses squash (one combined commit) with rebase (replays each commit).
      explanation: Squash stages a combined patch but does not commit — you supply the message. The result is *one* new commit on main containing all of the feature's changes; the feature's individual commits never appear on main.
    - question: After `git merge --squash feature; git commit`, what is true of the feature branch?
      options:
      - It no longer exists — squash deleted it
      - It still exists, unchanged; its commits are not on main (only a new combined commit is)
      - It points at the new squash commit on main
      - Its commits have been rewritten
      correct_index: 1
      option_feedback:
        0: This answer assumes squash deletes the source branch; squash leaves it intact.
        2: This answer assumes branches got rewired; squash only adds a commit to the *current* branch.
        3: This answer assumes squash modifies the feature's history; only the current branch gets a new commit.
      explanation: Squash merge does not touch the feature branch. It is still there with its full history. To delete it after squashing, use `git branch -D feature` (force, because it is not ff-merged by Git's definition).
    - question: '**[Compare with Step 8]** You have a 3-commit feature. You merge it three ways. Which output is correct?'
      options:
      - plain `merge` → 1 new commit on main; `rebase + merge` → 3 new commits on main; `--squash + commit` → 3 new commits on main
      - plain `merge` → 1 merge commit (3 parents); `rebase + merge` → 3 new commits; `--squash + commit` → 1 new commit
      - plain `merge` → 1 merge commit with 2 parents; `rebase + merge` → 3 replayed commits on main (linear, ff); `--squash + commit` → 1 new commit on main
      - All three approaches produce identical history
      correct_index: 2
      option_feedback:
        0: This answer gets squash backwards (squash produces 1 commit, not 3) and confuses plain merge's parent count.
        1: This answer invents a 3-parent merge commit; standard merges have exactly 2 parents.
        3: This answer ignores the actual differences between strategies — they produce visibly different histories.
      explanation: Plain merge = 1 merge commit (2 parents). Rebase linearizes so merge ff-forwards 3 commits. Squash collapses the 3 into 1 new commit. Team preference decides which is right for the project.
    - question: Why might a team **reject** squash merge as a default policy?
      options:
      - It forces a merge commit which they dislike
      - Losing individual commit granularity hurts `git bisect` precision within a feature and erases authorship signal on intermediate commits
      - Git rejects squash merges on `main`
      - It requires a paid GitHub subscription
      correct_index: 1
      option_feedback:
        0: This answer is backwards; squash *avoids* merge commits.
        2: This answer invents a Git restriction; squash works on any branch.
        3: This answer confuses Git mechanics with hosting service pricing.
      explanation: With squash, `git bisect` can only narrow to 'this whole feature', not to which intermediate commit caused the regression. Intermediate authors also disappear from main's history. Some teams prefer rebase/merge for richer history.
    - question: You squash-merged `feature-stats` into main. The next day you discover one of the three internal commits had a bug. How do you fix only that part?
      options:
      - Git tracks internal commits automatically — run `git revert --internal <sha>`
      - You cannot isolate it from main alone. The original commits still exist on the feature branch (or in reflog) — cherry-pick, revert, or rewrite from there
      - Use `git bisect run` to revert automatically
      - Delete main and re-merge with `git merge --no-squash`
      correct_index: 1
      option_feedback:
        0: This answer invents a flag; revert has no `--internal`, and Git doesn't track squash-internal commits on main.
        2: This answer combines two unrelated tools; bisect doesn't auto-fix or auto-revert.
        3: This answer ignores that the squashed commit is already on main; you can't unmerge a commit.
      explanation: Squash hides internal granularity on main. But the original commits still exist where the feature branch was (or via reflog). You can cherry-pick a fix or write a small revert patch on main. This is the classic squash trade-off — convenience on main, less surgical control later.
    - question: '**[Revisit Step 7]** A regression is reported on `main` three months after a feature was **squash-merged** in. `git bisect` on `main` narrows the culprit to the squash commit. What is your next move?'
      options:
      - Declare the feature author guilty and revert the whole squash commit
      - Switch to the (still-existing) feature branch and run `git bisect` there — its internal commits give you the fine-grained resolution squash destroyed on main
      - Bisect is unreliable after squash — read every line of the squash commit's diff
      - Re-run bisect with `--squash-aware`
      correct_index: 1
      option_feedback:
        0: This answer is too broad; the question asks for fine-grained resolution, not whole-feature reversion.
        2: This answer ignores the available finer-grained source on the feature branch.
        3: This answer invents a bisect flag; bisect operates on commits, and the feature branch already has the granularity.
      explanation: Squash flattens *main's* history, not the feature branch's. The fine-grained commits are still preserved on the feature branch (assuming you didn't delete it) and in reflog. Bisect on the feature branch pinpoints the exact internal commit. This is the strongest argument for keeping merged feature branches for a while, not deleting them immediately.
    - question: '**[Revisit Step 3]** After `git merge --squash feature; git commit`, the new squash commit on main is a Git commit object like any other. What are its **parents**?'
      options:
      - 'Two parents: the tip of main and the tip of feature (like a merge commit)'
      - 'Three parents: main, feature, and their common ancestor'
      - 'One parent: the tip of main (before the squash). The feature branch tip is NOT a parent — that is what makes it a squash rather than a merge'
      - Zero parents — squash commits are parentless root commits
      correct_index: 2
      option_feedback:
        0: This answer treats squash as a merge; squash deliberately gives only one parent (the prior HEAD), not two.
        1: This answer invents a three-parent commit type; standard merges are 2-parent and squash is 1-parent.
        3: This answer treats squash as a root commit; it has the prior HEAD as parent.
      explanation: 'A squash commit has exactly one parent: the prior HEAD of the branch you ran `merge --squash` on. The feature branch tip is not referenced as a parent — which is why `git log main` shows a clean linear history and why `git bisect` on main cannot drill into the feature. Same object-model: the commit records exactly the parents it was given, nothing more.'
    - question: Put in order the commands to squash-merge a 3-commit `feature-stats` branch into main, then clean up.
      type: parsons
      display: block
      lines:
      - 'git switch main                   # target branch'
      - 'git merge --squash feature-stats  # stages combined diff; NO commit yet'
      - 'git status                        # verify: staged changes, no commit'
      - 'git commit -m "Add statistics module (mean, variance, stddev)"'
      - 'git branch -D feature-stats       # force-delete (not ff-merged in Git''s view)'
      distractors:
      - 'git merge feature-stats           # creates a merge commit — wrong strategy'
      - 'git branch -d feature-stats       # refuses: the branch''s commits aren''t on main'
      - 'git cherry-pick feature-stats     # only copies the tip commit, not combined'
      - 'git push --force                  # unneeded and dangerous'
      explanation: '`--squash` stages but does NOT commit — the extra `git commit` step is intentional so you write a fresh, whole-feature message. Use capital `-D` to delete: Git''s fast-forward definition says the feature branch is not merged (only a *new* combined commit landed on main), so lowercase `-d` refuses. Distractor 3 (`cherry-pick`) would only copy the *tip* commit''s patch, not the cumulative diff of the whole branch.'
- title: 'Revert: Safely Undo a Pushed Commit'
  view: git_graph
  instructions: |
    ### 🎯 You will learn to
    - **Reach for revert** — not `reset --hard` — whenever a bad commit is already on a shared branch.
    - **Read the anti-matter pattern** in the graph: the original stays; a new commit negates it.
    - **Decide** between revert (public safety) and rebase-drop (private cleanup) by asking one question: *has this been pushed?*

    ### Scenario

    You pushed `Refactor: rename divide → div` to `main`. Ten teammates
    already pulled. Then CI discovers every import of `divide` now breaks.

    ### 🤔 Predict first

    You have two options on the table:

    - **A.** `git reset --hard HEAD~1` + `git push --force`
    - **B.** `git revert HEAD` + `git push`

    Which one breaks every teammate's clone? Why? (Step 3's schema is the key —
    *what changes existing SHAs?*)

    ### The answer

    `reset --hard` + `push --force` would **fix your clone** but break every
    teammate's — their local `main` still points at the rewritten SHA. Not acceptable.

    `git revert <sha>` is the **additive, public-safe** undo. It computes
    the inverse patch of the target commit and commits *that* as a new
    commit. No existing SHAs change; no force-push; no collaborator pain.

    <div data-git-command-lab role="region" aria-label="Interactive commit-graph demo: git revert appends a new anti-matter commit that negates a problematic Strip-logs commit. The original commit is still in history; the revert is purely additive, so teammates fast-forward cleanly with no force-push.">
    <script type="application/json">
    {
      "command": "git revert HEAD",
      "description": "Different scenario from the hands-on: a `Strip logs` commit accidentally removed production logging and has already been pushed. Revert computes the **inverse patch** (every `-` becomes `+`, every `+` becomes `-`) and lands it as a brand-new commit **¬R**. The original **R** is still there; history grows by one. Everyone's clones stay consistent — `pull` just fast-forwards.\n\nCompare with `rebase -i drop` (Step 9): drop *removes* R and rewrites everything after. Revert *appends* an undo and touches nothing existing. Same end-state, opposite effect on collaborators. Below, you will apply revert to the `rename divide → div` regression.",
      "before": {
        "log": "R000000000000000000000000000000000000000|C000000000000000000000000000000000000000|Strip logs (BUG)|HEAD -> main\nC000000000000000000000000000000000000000|B000000000000000000000000000000000000000|Add stats|\nB000000000000000000000000000000000000000|A000000000000000000000000000000000000000|Add API|\nA000000000000000000000000000000000000000||Init|",
        "branches": "* main",
        "head": "refs/heads/main",
        "highlights": {
          "R000000000000000000000000000000000000000": { "color": "#C0392B", "secondary": "#fff" }
        }
      },
      "after": {
        "log": "¬R00000000000000000000000000000000000000|R000000000000000000000000000000000000000|Revert \"Strip logs\"|HEAD -> main\nR000000000000000000000000000000000000000|C000000000000000000000000000000000000000|Strip logs (BUG)|\nC000000000000000000000000000000000000000|B000000000000000000000000000000000000000|Add stats|\nB000000000000000000000000000000000000000|A000000000000000000000000000000000000000|Add API|\nA000000000000000000000000000000000000000||Init|",
        "branches": "* main",
        "head": "refs/heads/main",
        "highlights": {
          "R000000000000000000000000000000000000000": { "color": "#C0392B", "secondary": "#fff" },
          "¬R00000000000000000000000000000000000000": { "color": "#27AE60", "secondary": "#fff" }
        }
      }
    }
    </script>
    </div>

    ### Task 1: See the bad commit

    Setup planted a "pushed" refactor that broke callers.

    ```bash
    cd /tutorial/myproject
    git log --oneline -5
    grep -c 'def divide\|def div' calculator.py
    ```

    ### Task 2: Revert it

    ```bash
    git revert HEAD --no-edit
    git log --oneline -5
    ```

    Two commits visible: the bad one **and** its revert. `git log` is now
    a truthful record of what happened.

    ### Task 3: Prove the reachable commit count

    **Predict:** did revert delete anything? (Answer: no — history grew by 1.)

    ```bash
    git rev-list --count HEAD
    git cat-file -p HEAD          # examine the revert commit object
    git cat-file -p HEAD^         # the original bad commit, still reachable
    ```

    ### The single rule

    **If anyone else has it, revert. If only you have it, rebase is fair game.**

    <details markdown="1"><summary>📋 Revert vs. reset vs. rebase-drop, side by side</summary>

    | Goal | Pushed? | Tool |
    |---|---|---|
    | Remove a bad commit from shared history | **Yes** | `git revert <sha>` (additive) |
    | Clean up a local WIP branch before PR | No | `rebase -i` with `drop` |
    | Nuke local branch to a prior state | No | `reset --hard <sha>` |

    </details>

    <details markdown="1"><summary>💡 Reverting a *merge* commit (`-m 1`)</summary>

    Merge commits have two parents; revert needs to know which side is the
    "mainline" (the side you want to keep). `git revert -m 1 <merge-sha>`
    keeps the first-parent side and undoes the merged-in branch. Get the
    number wrong and you revert the wrong side.

    </details>
  setup_commands:
  - "cd /tutorial/myproject\n[ -e .git/REVERT_HEAD ] && git revert --abort 2>/dev/null\ngit switch -q main 2>/dev/null\n# Plant the buggy rename if missing.\nif ! git log main --oneline 2>/dev/null | grep -q 'rename divide'; then\n  # Rename divide -> div in file to simulate a bad refactor.\n  sed -i 's/def divide/def div/' calculator.py 2>/dev/null\n  git diff --quiet calculator.py || git commit -qam 'Refactor: rename divide → div (BROKE imports)'\nfi\n"
  solution:
    commands:
    - cd /tutorial/myproject
    - '[ -e .git/REVERT_HEAD ] && git revert --abort 2>/dev/null'
    - '{ [ -e .git/rebase-merge ] || [ -e .git/rebase-apply ]; } && git rebase --abort 2>/dev/null'
    - '[ -e .git/MERGE_HEAD ] && git merge --abort 2>/dev/null'
    - git switch -q main 2>/dev/null
    - git reset --hard HEAD
    - git clean -fdq
    # If setup didn't plant the buggy rename, plant it ourselves so the test has something to revert
    - "git log main --oneline | grep -q 'rename divide' || (sed -i 's/def divide/def div/' calculator.py 2>/dev/null && git commit -qam 'Refactor: rename divide → div (BROKE imports)' || true)"
    - git revert HEAD --no-edit
  tests:
  - description: On main branch
    command: cd /tutorial/myproject && git symbolic-ref -q HEAD | grep -q 'refs/heads/main'
    hints:
    - text: 'Run revert from `main`. `git switch main` if drifted.'
  - description: A revert commit was added on top (history grew, not shrank)
    command: cd /tutorial/myproject && git log --oneline -3 | grep -qiE 'Revert|revert'
    hints:
    - text: '`git revert HEAD --no-edit` creates the anti-matter commit. If you used `git reset --hard`, you rewrote history — not the point of this step. Redo from main and use revert.'
  - description: Both the bad commit and its revert are reachable (revert is additive)
    command: cd /tutorial/myproject && git log --oneline | grep -qi 'rename divide' && git log --oneline | grep -qiE 'Revert.*rename'
    hints:
    - text: 'The original bad commit should still be visible in `git log` alongside the revert. Revert does not delete history — that is the whole point vs. reset.'
  quiz:
    title: git revert — Knowledge Check
    min_score: 0.8
    shuffle: true
    questions:
    - question: Why is `git revert` safe on shared branches where `git reset --hard + push --force` is not?
      options:
      - Revert doesn't actually change anything
      - Revert is *additive* — it appends a new anti-matter commit. Existing SHAs are unchanged, so teammates' clones stay consistent. Reset + force-push rewrites history, forcing every collaborator to reconcile.
      - Revert is encrypted
      - GitHub blocks force-push by default
      correct_index: 1
      option_feedback:
        0: This answer is too strong; revert *does* change history (adds a new commit), it just doesn't *rewrite* existing SHAs.
        2: This answer invents encryption; revert is plain commit semantics.
        3: This answer relies on remote-side enforcement; the safety property is intrinsic to revert vs. reset, not a platform policy.
      explanation: 'The rule compresses to one property: *does this operation change existing SHAs?* Revert — no. Reset/rebase/amend — yes. Changed SHAs break anyone who already fetched the old ones. Revert is the only undo that preserves shared-history safety.'
    - question: What does `git revert <sha>` physically add to history?
      options:
      - Nothing — it just hides the commit
      - A new commit on the current branch whose patch reverses `<sha>`'s patch (every `+` becomes `-` and vice versa). The revert's parent is the prior HEAD — *not necessarily* `<sha>`, since you can revert any historical commit.
      - A deletion marker
      - A tag named `revert/<sha>`
      correct_index: 1
      option_feedback:
        0: This answer treats revert as visibility-only; revert adds a real commit that changes the working tree.
        2: This answer invents a "tombstone" object type; Git has none — revert is a regular commit.
        3: This answer confuses commits with tags; revert produces a commit on the branch, not a tag ref.
      explanation: Revert computes the inverse diff of `<sha>` and lands it as a regular commit on the current branch. The new commit's parent is whatever HEAD was when you ran the command — when you revert HEAD, that happens to be `<sha>`, but when you revert an older commit it isn't. `git log` shows both the bad commit and its undo, which is the honest story of what happened.
    - question: You accidentally pushed a bad commit to `main`. Three teammates have pulled. Best move?
      options:
      - '`git reset --hard HEAD~1` + `git push --force` (or `--force-with-lease`)'
      - '`git revert HEAD` + `git push`'
      - '`git rebase -i HEAD~1` with `drop`, then force-push'
      - Delete the whole repository and re-clone
      correct_index: 1
      option_feedback:
        0: This answer rewrites shared history; teammates with the old SHAs will see divergence and their pulls will fail.
        2: This answer also rewrites shared history (rebase-drop is a rewrite); same breakage as reset + force.
        3: This answer is the "burning down the repo" antipattern — needlessly destructive.
      explanation: Shared history was already distributed. Revert appends an undo; teammates' next `pull` fast-forwards cleanly. Force-pushing after reset or rebase makes teammates' branches diverge and their pulls fail — exactly what we avoid.
    - question: '**[Revisit Step 9]** Rebase-drop and revert both "undo" a commit. Which is correct about their effect on SHAs?'
      options:
      - Both create new SHAs for all later commits
      - '`rebase-drop` rewrites every subsequent commit''s SHA. `revert` appends one new commit and changes nothing existing.'
      - Both are non-destructive
      - Revert rewrites SHAs; rebase-drop doesn't
      correct_index: 1
      option_feedback:
        0: This answer ignores that revert leaves all existing commits' SHAs unchanged; only one new commit is added.
        2: This answer ignores rebase-drop's rewriting of every subsequent commit's SHA.
        3: This answer reverses the additive/destructive distinction — revert is the additive one.
      explanation: The destructive/additive distinction is the heart of this step. Rebase-drop replays every commit after the dropped one on a new parent — new SHAs cascading. Revert just appends one new commit. Same apparent outcome (the bad change is gone); completely different impact on collaborators.
    - question: You want to revert a **merge commit** (one with two parents). What additional flag do you need?
      options:
      - '`--merge`'
      - '`-m 1` or `-m 2` to tell Git which parent is the mainline'
      - '`--force`'
      - None — it just works
      correct_index: 1
      option_feedback:
        0: This answer invents a flag; revert has no `--merge` option.
        2: This answer invents a flag; revert has no `--force` option.
        3: This answer ignores that merge commits have two parents and revert needs to know which side is mainline.
      explanation: 'Merge commits have two parents; revert needs to know which side is "mainline" (the version you want to keep). `-m 1` means "first parent is mainline; undo the second-parent branch." Getting this wrong reverts the wrong side.'
    - question: Put in order the safe public-undo workflow after discovering a bad commit on shared `main`. Distractors rewrite history.
      type: parsons
      display: block
      lines:
      - 'git log --oneline -5                   # find the bad SHA'
      - 'git revert <bad-sha> --no-edit          # create the anti-matter commit'
      - 'git log --oneline -3                   # verify: both bad + revert are there'
      - 'git push                                # succeeds — no history rewrite'
      distractors:
      - 'git reset --hard <bad-sha>^            # rewrites main, breaks teammates'
      - 'git push --force-with-lease            # overwrites remote'
      - 'git rebase -i <bad-sha>^ drop          # rewrites downstream commits'
      - 'rm -rf .git && git clone <url>         # "burning down the repo" antipattern'
      explanation: '**Revert-and-push** is the only sequence that leaves every existing SHA untouched. Each distractor rewrites history in some way — which is exactly the failure mode revert exists to avoid. Run the safe one often enough that it becomes reflex.'
- title: 'Git Submodules: Add & Clone'
  view: editor
  instructions: |
    ### 🎯 You will learn to
    - **Add** a submodule to an existing repo with one command.
    - **Clone** a submodule-using repo **correctly** (`--recursive`) — or recover after forgetting.
    - **Recognize** the gitlink (mode `160000`) + `.gitmodules` as the two structural differences from a regular file.
    - **Pick** submodules vs. package manager vs. monorepo based on the actual problem.

    ### 🤔 Predict first

    When you `git submodule add` a 200-MB repo, how much storage does the
    *outer* repo's tracked tree gain — a few hundred megabytes, or a few
    hundred bytes?

    <details markdown="1"><summary>📖 Three core terms (open before reading further)</summary>

    | Term | What it is |
    |---|---|
    | **Submodule** | A nested Git repo inside an outer Git repo |
    | **`.gitmodules`** | Plain-text config file in the outer repo listing each submodule's path + URL |
    | **Gitlink** | A tree entry with mode `160000` whose "content" is a 40-char commit SHA (instead of file bytes) |

    Two more terms (`Pinned SHA`, `--recursive`) are introduced inline as
    they come up; the full glossary is at the bottom of this step.

    </details>

    ### Mental model: library subscription

    A submodule is a **subscription to a specific edition of a library**:

    - No photocopy — no file duplication.
    - You record the **book title + edition number** (`.gitmodules` URL + pinned SHA).
    - Anyone with your note fetches the same edition.
    - Upgrade by changing the edition number.

    Edition number = commit SHA. Book = the submodule's Git repo hosted elsewhere.

    ### On-disk layout

    ```folder-tree
    @startuml
    main-repo/
      .git/
        modules/
          math-utils/  ← submodule's actual git data (objects, refs, HEAD…)
      .gitmodules      ← where Git should fetch each submodule
      src/
      vendor/
        math-utils/    ← nested Git repo (the working tree)
          .git         ← gitfile: "gitdir: ../../.git/modules/math-utils"
          utils.py
    @enduml
    ```

    ### Task 1: Inspect the "upstream" library

    Pre-built: `/tutorial/math-utils-src/` (working repo, `double`+`triple`)
    and `/tutorial/math-utils.git` (bare clone acting as the remote URL).

    ```bash
    cat /tutorial/math-utils-src/utils.py
    ```

    ### Task 2: Add the submodule

    ```bash
    cd /tutorial/myproject
    git switch main
    git submodule add /tutorial/math-utils.git vendor/math-utils
    git status                            # TWO new entries
    ```

    Open `.gitmodules` in the editor. **Predict before scrolling the answers:**

    1. How many lines per submodule?
    2. Is the pinned **SHA** stored here?
    3. What breaks if the file is deleted?

    <details markdown="1"><summary>Answers</summary>

    1. **3 lines** (header + `path` + `url`). Tiny by design.
    2. **URL yes, SHA no.** The SHA is the gitlink in the tree
       (see below). Two independent facts: *where* to fetch vs.
       *which commit* to check out.
    3. **Teammates can't clone the submodule.** `.gitmodules` is the
       subscription directory; without it, `clone --recursive` has no URL.

    </details>

    Inspect the gitlink:

    ```bash
    git ls-files -s vendor/math-utils    # mode 160000 = submodule
    git commit -m "Add math-utils submodule at v0.1.0"
    ```

    ### Task 3: Clone with `--recursive`

    ```bash
    cd /tutorial
    git clone --recursive myproject colleague-clone
    ls colleague-clone/vendor/math-utils
    ```

    Without `--recursive`, the folder exists empty until the teammate
    runs `git submodule update --init --recursive`.

    <details markdown="1"><summary>💡 When submodules are the *right* tool</summary>

    **Yes:** versioned code you *own* shared across several repos.

    **No:** third-party deps (use a package manager — npm, pip, cargo),
    or single config files (use config management).

    </details>

    <details markdown="1"><summary>📋 Submodule glossary (full)</summary>

    | Term | What it is |
    |---|---|
    | **Submodule** | A nested Git repo inside an outer Git repo |
    | **`.gitmodules`** | Plain-text config file in the outer repo listing each submodule's path + URL |
    | **Gitlink** | A tree entry with mode `160000` whose "content" is a 40-char commit SHA (instead of file bytes) |
    | **Pinned SHA** | The exact commit of the submodule the outer repo wants checked out at the gitlink path |
    | **`--recursive`** | Clone flag that fetches submodules at clone-time (otherwise the folder is empty) |

    </details>
  setup_commands:
  - "cd /tutorial/myproject && git switch -q main 2>/dev/null\nif [ -d /tutorial/math-utils.git ] && git --git-dir=/tutorial/math-utils.git log --oneline 2>/dev/null | grep -q 'Initial utils' && [ -x /tutorial/publish-math-utils-v0.2.sh ]; then\n  exit 0\nfi\nrm -rf /tutorial/math-utils-src /tutorial/math-utils.git /tutorial/colleague-clone\nmkdir -p /tutorial/math-utils-src\ncd /tutorial/math-utils-src\ngit init -q\nprintf 'def double(x):\\n    return x * 2\\n\\ndef triple(x):\\n    return x * 3\\n' > utils.py\ngit add utils.py\ngit commit -qm 'Initial utils'\ncd /tutorial\ngit clone -q --bare math-utils-src math-utils.git\n# Install the \"upstream publishes v0.2\" helper.\ncat > /tutorial/publish-math-utils-v0.2.sh << 'SCRIPT'\n#!/bin/bash\nset -e\ncd /tutorial/math-utils-src\nif grep -q 'def quadruple' utils.py; then\n  echo 'upstream math-utils already at v0.2'\n  exit 0\nfi\nprintf '\\ndef quadruple(x):\\n    return x * 4\\n' >> utils.py\ngit commit -qam 'Add quadruple'\n# Push to the bare 'remote' so submodule fetch sees it\nBR=$(git rev-parse --abbrev-ref HEAD)\ngit push -q /tutorial/math-utils.git $BR:$BR 2>/dev/null || \\\n  git push -q /tutorial/math-utils.git HEAD:master 2>/dev/null || \\\n  git push -q /tutorial/math-utils.git HEAD:main 2>/dev/null || true\necho 'upstream math-utils is now at v0.2 (adds quadruple)'\nSCRIPT\nchmod +x /tutorial/publish-math-utils-v0.2.sh\n"
  solution:
    commands:
    # Single batched command to fit the v86 _runVisible 30s prompt timeout.
    # Idempotent: only adds submodule if .gitmodules doesn't exist; only
    # clones colleague-clone if it doesn't exist.
    - "cd /tutorial/myproject && git switch -q main 2>/dev/null && git reset --hard HEAD; if [ ! -f .gitmodules ]; then git submodule add /tutorial/math-utils.git vendor/math-utils && git commit -m 'Add math-utils submodule at v0.1.0'; fi; if [ ! -d /tutorial/colleague-clone ]; then cd /tutorial && git clone --recursive myproject colleague-clone; fi"
    explanation: |
      - **`git submodule add <url> <path>`:** Clones the URL into the path AND creates a `.gitmodules` entry describing that submodule (its path + URL). Both the `.gitmodules` file and the gitlink pointer must be committed.
      - **Gitlink vs regular file:** a submodule entry has Git mode `160000` (instead of `100644` for a regular file). Its content is not bytes — it is a 40-char commit SHA indicating *which commit* of the submodule's repo should be checked out here.
      - **`git clone --recursive`:** Clones the outer repo and all submodules in one command. Forgetting this leaves empty submodule folders until `git submodule update --init --recursive`.
  tests:
  - description: myproject has a math-utils submodule
    command: cd /tutorial/myproject && [ -f .gitmodules ] && grep -q 'math-utils' .gitmodules
    hints:
    - text: '`git submodule add /tutorial/math-utils.git vendor/math-utils` creates both `.gitmodules` and the submodule directory.'
  - description: .gitmodules has been committed
    command: cd /tutorial/myproject && git log --oneline -- .gitmodules | grep -q '.'
    hints:
    - text: '`git submodule add` stages `.gitmodules` and the gitlink but does not commit. `git commit -m "Add math-utils submodule"` finishes it.'
  - description: Submodule content is checked out
    command: '[ -f /tutorial/myproject/vendor/math-utils/utils.py ]'
    hints:
    - text: 'Submodule folder is empty. `git submodule update --init --recursive` populates it from the pinned SHA.'
  - description: vendor/math-utils is tracked as a gitlink (mode 160000)
    command: cd /tutorial/myproject && git ls-files -s vendor/math-utils | grep -q '^160000'
    hints:
    - text: 'Something committed `vendor/math-utils` as a regular directory rather than a gitlink. Remove it from the index (`git rm -r --cached vendor/math-utils`) and re-run `git submodule add`.'
  - description: colleague-clone was created successfully with its submodule populated
    command: '[ -f /tutorial/colleague-clone/vendor/math-utils/utils.py ]'
    hints:
    - text: '`git clone --recurse-submodules <url> /tutorial/colleague-clone` clones and populates in one shot. Without `--recurse-submodules`, the submodule directory is empty.'
  quiz:
    title: Git Submodules — Knowledge Check
    min_score: 0.8
    shuffle: true
    questions:
    - question: What does a Git submodule actually store in the outer repository?
      options:
      - A full copy of the submodule's files tracked like normal files
      - A gitlink — a 40-character commit SHA pinning which commit of the submodule's repo should be checked out at that path, plus a `.gitmodules` entry with the URL
      - Nothing — submodules are purely a runtime concept
      - A symbolic link to the submodule's directory
      correct_index: 1
      option_feedback:
        0: This answer confuses submodule working tree content with outer-repo gitlink state; the outer repo only stores a SHA + URL, never the files.
        2: This answer assumes submodules are runtime-only; the outer repo records the gitlink and `.gitmodules` persistently.
        3: This answer confuses a gitlink (mode `160000`) with a filesystem symlink — the gitlink is a tree entry, not a symlink.
      explanation: The outer repo stores ONE SHA per submodule (the pinned commit) plus a `.gitmodules` entry for the URL. The submodule's working files are checked out in the submodule path; its git data (objects, refs, HEAD) lives in the outer repo's `.git/modules/<name>/` — the submodule directory itself contains only a `.git` text file (a "gitfile") pointing there, NOT a full `.git/` directory.
    - question: A teammate clones your repo normally with `git clone <url>`. What do they see at the submodule path?
      options:
      - The submodule's full contents, checked out automatically
      - An empty folder — they need `git submodule update --init --recursive` (or originally clone with `--recursive`) to populate it
      - An error preventing the clone from finishing
      - A warning but the content downloads lazily on first access
      correct_index: 1
      option_feedback:
        0: This answer assumes plain `git clone` fetches submodules; it doesn't, by default — only `--recursive` (or a follow-up `submodule update`) populates them.
        2: This answer assumes the clone fails; plain clone succeeds, the submodule folder is just empty.
        3: This answer invents lazy fetching; submodule content fetches require explicit `submodule update`.
      explanation: Plain `git clone` records the submodule entries but does not fetch their content. The folder exists but is empty. `git clone --recursive <url>` or `git submodule update --init --recursive` after the fact populates it.
    - question: Which statements about submodules are true? (Select all that apply)
      type: multiple
      options:
      - A submodule is a full Git repository nested inside another
      - '`git clone --recursive <url>` clones both outer and submodules'
      - The outer repo stores full copies of the submodule's files
      - The outer repo tracks a submodule with a special gitlink entry (mode `160000`) containing the pinned commit SHA
      correct_indices:
      - 0
      - 1
      - 3
      option_feedback:
        2: This answer confuses submodule working tree content with outer-repo gitlink state; the outer repo only stores the SHA pin, not file copies.
      explanation: The outer repo stores only a pinned SHA (gitlink, mode 160000) and a `.gitmodules` entry — not file copies. The submodule is a genuine nested repo.
    - question: '**[Synthesis — revisits Steps 1, 3]** Why is it internally consistent that a submodule is ''just a pinned commit SHA''?'
      options:
      - Because every Git object is ultimately addressed by a SHA (blobs, trees, commits), the outer repo only needs to point at the submodule's commit SHA to uniquely identify its entire snapshot — no file duplication needed
      - Because submodules cannot have their own branches
      - Because submodules are always read-only
      - Because Git stores submodules separately in a proprietary database
      correct_index: 0
      option_feedback:
        1: This answer is irrelevant — submodules can have branches; the question is about content addressing.
        2: This answer invents a constraint; submodules can be edited and committed to like any nested repo.
        3: This answer invents a separate database; submodules use the same Git object format as everything else.
      explanation: Back to the object model (Step 3). A commit SHA uniquely identifies a whole-project snapshot (commit → tree → blobs). Pinning a commit SHA is enough to reconstruct the submodule's entire content. No file duplication is necessary — exactly the same property that makes branches cheap (Step 1).
    - question: '**[Revisit Step 8]** A submodule''s pinned SHA is 40 characters, just like a regular commit SHA. In terms of Git objects, what kind of object does it point to?'
      options:
      - A blob object
      - A tree object
      - A commit object — in the submodule's separate repository's object database
      - A tag object
      correct_index: 2
      option_feedback:
        0: This answer confuses commit objects with blob objects; gitlinks pin commits, which then resolve to trees and blobs.
        1: This answer confuses commit objects with tree objects; only a commit captures parents, author, and message.
        3: This answer confuses commit objects with tag objects; tags reference commits, they aren't stored in gitlinks.
      explanation: A gitlink pins a *commit* SHA — which (via the commit's tree and blobs) uniquely determines the submodule's entire file state. The commit lives in the submodule's `.git/objects/`, not the outer repo's. This is exactly the same commit-SHA-as-snapshot-identity property rebase relies on (Step 8) and that makes the whole object model coherent.
    - question: Put in order the commands a teammate runs to add a submodule, commit it, and set up a colleague's workstation so the submodule files appear. Distractors are verb-variants that look right but fail.
      type: parsons
      display: block
      lines:
      - 'cd /tutorial/myproject'
      - 'git submodule add /tutorial/math-utils.git vendor/math-utils'
      - 'git commit -m "Add math-utils submodule at v0.1.0"'
      - 'cd /tutorial && git clone --recursive myproject colleague-clone'
      distractors:
      - 'git submodule init /tutorial/math-utils.git vendor/math-utils   # init alone does not fetch'
      - 'git clone myproject colleague-clone                              # submodule folder empty'
      - 'git submodule fetch /tutorial/math-utils.git                     # not a valid subcommand'
      - 'git merge /tutorial/math-utils.git                               # confuses a nested repo with a branch'
      explanation: '`git submodule add` combines clone + config in one step; `init` without `update` is half the story. Plain `git clone` creates an empty submodule folder. `git submodule fetch` is invented. `git merge` on a URL is a syntax error. Verb selection is what separates a working submodule workflow from a broken one.'
- title: 'Updating Submodules: Upstream Bumps & Resync'
  view: editor
  instructions: |
    ### 🎯 You will learn to
    - **Upgrade** a submodule to new upstream work via the two-step dance (fetch/checkout inside, `add`/`commit` outside).
    - **Diagnose and fix** the "teammate forgot `submodule update`" trap — muscle memory for post-pull.
    - **Force-resync** any drifted submodule back to the pinned SHA with one deterministic command.

    ### 🤔 Predict first

    Upstream publishes new commits. After you `git pull` the outer repo,
    will your local submodule's working directory show the new content
    automatically — or do you have to do something extra?

    ### Task 1: Upstream publishes v0.2

    ```bash
    /tutorial/publish-math-utils-v0.2.sh
    git --git-dir=/tutorial/math-utils.git log --oneline --all
    cd /tutorial/myproject
    git status            # nothing changed here — push doesn't propagate
    ```

    ### Task 2: Fetch + checkout inside the submodule

    A submodule is a nested repo. Use normal `git` inside it:

    ```bash
    cd /tutorial/myproject/vendor/math-utils
    git fetch
    git checkout origin/HEAD
    cd /tutorial/myproject
    git status            # vendor/math-utils (new commits)
    git diff vendor/math-utils
    ```

    The outer diff is exactly **one line** — `-Subproject commit <old>` /
    `+Subproject commit <new>`. Line-level diffs live in the submodule's
    own object database.

    ### Task 3: Bump the pinned SHA in the outer repo

    ```bash
    git add vendor/math-utils
    git commit -m "Bump math-utils to v0.2.0 (adds quadruple)"
    ```

    ### Task 4: The teammate trap

    ```bash
    cd /tutorial/colleague-clone
    git pull
    cat vendor/math-utils/utils.py     # still v0.1 on disk!
    ```

    `pull` updated the pinned SHA in the tree, but **did not touch**
    their submodule working directory. Code that imports `quadruple`
    now fails. Fix:

    ```bash
    git submodule update --init --recursive
    cat vendor/math-utils/utils.py     # now has quadruple
    ```

    <details markdown="1"><summary>💡 Make this a habit (one-time config)</summary>

    After every `pull` that might touch submodule paths, run
    `git submodule update --init --recursive`. Or, one-time setup:

    ```bash
    git config --global submodule.recurse true
    ```

    Now `pull` and `checkout` do the right thing automatically.

    </details>

    ### Task 5: Force-resync a drifted submodule

    Simulate drift:

    ```bash
    cd /tutorial/colleague-clone/vendor/math-utils
    git checkout HEAD~1
    cd /tutorial/colleague-clone
    git status            # modified: vendor/math-utils (new commits)
    git submodule update --init --recursive
    git status            # clean — pinned SHA restored
    ```

    Same command works for never-initialized, partially-fetched, or
    drifted submodules.
  setup_commands:
  - "cd /tutorial/myproject\ngit switch -q main 2>/dev/null\nif [ ! -f .gitmodules ] || ! grep -q math-utils .gitmodules 2>/dev/null; then\n  git submodule add -f /tutorial/math-utils.git vendor/math-utils 2>/dev/null\n  git commit -qm 'Add math-utils submodule at v0.1.0' 2>/dev/null\nfi\nif [ ! -d /tutorial/colleague-clone ]; then\n  (cd /tutorial && git clone -q --recursive myproject colleague-clone 2>/dev/null)\nfi\ngit submodule update --init --recursive 2>/dev/null\n"
  solution:
    commands:
    # Single batched command to fit the v86 _runVisible 30s prompt timeout.
    - "/tutorial/publish-math-utils-v0.2.sh 2>/dev/null; cd /tutorial/myproject/vendor/math-utils && git fetch 2>/dev/null && (git checkout origin/HEAD 2>/dev/null || git checkout -q origin/main 2>/dev/null || git checkout -q origin/master 2>/dev/null); cd /tutorial/myproject && git add vendor/math-utils && (git diff --cached --quiet || git commit -m 'Bump math-utils to v0.2.0 (adds quadruple)')"
    explanation: |
      - **Two-step upgrade:** Inside the submodule, `git fetch && git checkout origin/HEAD` moves the submodule's HEAD to the new upstream commit. Outside, `git add <submodule-path> && git commit` records the new pinned SHA in the outer repo. Skipping the outer step means the upgrade is local to you and never reaches teammates.
      - **Why outer `git pull` does NOT auto-update submodules:** pull updates the *pinned SHA* (because that is what the tree records) but does not touch submodule working directories. Teammates must run `git submodule update --init --recursive` (or configure `submodule.recurse=true`) to actually reflect the new pinned SHA on disk.
      - **`git submodule update --init --recursive`:** the deterministic-state command. Clones missing submodules, forces every submodule's HEAD to the pinned SHA. The cure for every "my submodule is in a weird state" moment.
  tests:
  - description: Submodule working directory has the new quadruple function
    command: grep -q 'def quadruple' /tutorial/myproject/vendor/math-utils/utils.py
    hints:
    - text: 'Edit inside the submodule: `cd vendor/math-utils` → add `def quadruple(x): return x * 4` to `utils.py`.'
  - description: Outer repo has a commit bumping the submodule SHA
    command: cd /tutorial/myproject && git log --oneline | grep -qiE 'bump|v0.2|quadruple'
    hints:
    - text: 'Inner work done but outer repo still pins the old SHA. `cd /tutorial/myproject && git add vendor/math-utils && git commit -m "Bump math-utils to add quadruple"`.'
  - description: Outer repo is clean (no pending submodule modifications)
    command: cd /tutorial/myproject && git diff --quiet && git diff --cached --quiet
    hints:
    - text: 'Usually `modified: vendor/math-utils (new commits)` — inner commit landed but outer bump is missing. Finish the outer commit.'
  - description: Remote (math-utils.git) has the new upstream commit
    command: git --git-dir=/tutorial/math-utils.git log --oneline --all | grep -qi 'quadruple'
    hints:
    - text: 'Inner commit never pushed. From inside the submodule: `git switch -c main` (if detached), then `git push origin main`.'
  quiz:
    title: Updating Submodules — Knowledge Check
    min_score: 0.8
    shuffle: true
    questions:
    - question: You bumped a submodule to v0.2 and pushed. A teammate pulls your change and reports tests failing because `quadruple` does not exist. Most likely cause?
      options:
      - The submodule's remote is down
      - They forgot `git submodule update --init --recursive` after pulling — their submodule working directory still has v0.1 while main's code expects v0.2
      - Their Git is too old
      - The `.gitmodules` file is corrupt
      correct_index: 1
      option_feedback:
        0: This answer blames infrastructure; the submodule's pinned SHA is fine, the working tree just needs `submodule update`.
        2: This answer blames version; standard `pull` semantics have always required explicit submodule sync.
        3: This answer assumes file corruption; the symptom is normal post-pull behavior, not corruption.
      explanation: Classic trap. `git pull` on the outer repo updates the **pinned SHA in the tree** but does NOT touch the submodule working directory. They need `git submodule update --init --recursive` to actually reflect the new SHA on disk. Configure `git config submodule.recurse true` to make pull do this automatically.
    - question: Upgrading a submodule requires how many `git commit` calls in total (inside + outside)?
      options:
      - Zero — `git submodule update` commits for you
      - One — only in the outer repo
      - Two — if the submodule itself needed new commits (e.g., you wrote a patch inside it), commit there first; then the outer repo commit bumps the SHA. If the new upstream commit already exists, only the outer commit is needed.
      - Three — submodule, `.gitmodules`, and outer tree
      correct_index: 2
      option_feedback:
        0: This answer assumes `submodule update` commits for you; it only resets working state, never commits.
        1: This answer omits the inner-commit case (when you're authoring upstream changes yourself before bumping the pin).
        3: This answer adds a `.gitmodules` commit; that file changes only when adding/removing a submodule, not when updating one.
      explanation: The answer depends on whether *you* are authoring the upgrade (write code inside submodule → commit inside → push → commit outside) or just pulling in upstream work (checkout new commit inside → commit outside). In either case the outer commit is mandatory — that is the SHA bump.
    - question: '`git status` in the outer repo shows `modified: vendor/math-utils (new commits)`. What does it mean?'
      options:
      - The `.gitmodules` file has been edited
      - The submodule's checked-out HEAD differs from the pinned SHA — either you updated the submodule, or it drifted
      - The submodule is broken
      - Git is about to garbage-collect the submodule
      correct_index: 1
      option_feedback:
        0: This answer confuses submodule SHA changes with `.gitmodules` config edits.
        2: This answer assumes corruption; `new commits` is normal divergence between pinned and actual HEAD.
        3: This answer invents a GC warning; `git status` doesn't report on `gc` operations.
      explanation: 'The outer repo compares the pinned SHA with the submodule''s actual HEAD. Mismatch → `new commits`. Fix: `git add <path>` + commit to pin the new SHA, or `git submodule update` to snap the submodule back to the pinned SHA.'
    - question: '**[Revisit Step 1]** Why doesn''t `git pull` automatically update submodule working directories — what Git principle is respected by this design?'
      options:
      - Pull is inherently broken for submodules
      - Submodules are independent Git repos; respecting the outer/inner separation means outer operations don't silently modify the inner repo's HEAD. Same separation-of-concerns as detached HEAD (Step 1) — Git is conservative about moving HEAD without explicit instruction
      - Pull is always read-only
      - It would violate the SHA-1 collision resistance guarantee
      correct_index: 1
      option_feedback:
        0: This answer assumes a tool defect; the design is intentional separation between outer and inner repos.
        2: This answer is wrong on its face — `pull` writes to local refs and the working tree.
        3: This answer invents a cryptographic justification; the design is about repo-boundary respect, not hash collisions.
      explanation: 'Git keeps the outer/inner repo boundary strict: an outer `pull` updates the pinned SHA (a fact about the outer tree) but does not reach into the inner repo and rewrite its HEAD. You must explicitly say `git submodule update`. Same conservative-HEAD-movement philosophy that makes detached-HEAD-with-uncommitted-changes impossible.'
    - question: '**[Revisit Step 3]** The outer repo''s diff for a submodule change is always just one line: `-Subproject commit <old>` / `+Subproject commit <new>`. Why is that enough?'
      options:
      - Git is being lazy
      - Because a commit SHA uniquely identifies a snapshot (commit → tree → blobs), the SHA bump is exactly equivalent to a full content change — no additional diff data is needed in the outer tree
      - Because Git compresses submodule diffs
      - Because submodules don't actually change content
      correct_index: 1
      option_feedback:
        0: This answer treats minimal diff as laziness; it's the maximally accurate representation given that a SHA is equivalent to a full snapshot.
        2: This answer invents compression; the diff is genuinely a one-line SHA bump, not compressed-then-expanded.
        3: This answer ignores that the SHA pin's change *is* equivalent to a content change.
      explanation: Step 3's object-model insight applied again. A commit SHA resolves to a deterministic snapshot. Pinning a new SHA is, by construction, equivalent to changing the entire content — no further diff data is needed in the outer commit. Minimum information, maximum fidelity.
    - question: '**[Evaluate]** A teammate says: ''After every `git pull` I always run `git submodule update --init --recursive`, even on repos without submodules. Paranoia, or sensible?'''
      options:
      - Waste of time — it does nothing on repos without submodules
      - Sensible. The command is a no-op on non-submodule repos (instant exit) and catches all submodule-state drift. Adding it to muscle memory costs nothing and prevents the most common submodule bug
      - Harmful — it can corrupt non-submodule repos
      - Only useful on teams larger than 10 people
      correct_index: 1
      option_feedback:
        0: This answer assumes the command fails or churns on non-submodule repos; it's a fast no-op.
        2: This answer assumes the command is dangerous; it's strictly safe on any repo.
        3: This answer scopes the command to team size; it works regardless of how many collaborators are involved.
      explanation: 'The command is safe on any repo. Running it unconditionally is a cheap habit that prevents the most common submodule bug (stale working dir). Equivalent hardening: `git config --global submodule.recurse true` to make pull/checkout do it automatically.'
    - question: Upstream publishes a v0.2 commit. Put in order the commands that land it as a pinned version bump in your outer repo. Distractors are verb-variants that look right but fail or do the wrong thing.
      type: parsons
      display: block
      lines:
      - 'cd /tutorial/myproject/vendor/math-utils'
      - 'git fetch                                # pulls new commits into submodule'
      - 'git checkout origin/HEAD                 # move submodule HEAD to new SHA'
      - 'cd /tutorial/myproject                   # back to outer repo'
      - 'git add vendor/math-utils                # stage the gitlink SHA change'
      - 'git commit -m "Bump math-utils to v0.2.0"'
      distractors:
      - 'git pull                                # ambiguous in detached-HEAD submodule'
      - 'git submodule update                    # resets TO pinned SHA — opposite of what we want'
      - 'git commit -am "Bump"                   # would sweep in unrelated WD changes'
      - 'git merge origin/HEAD                   # creates a merge commit inside submodule'
      explanation: '`git submodule update` (distractor 2) is exactly the *wrong* verb here — it resets the submodule back to whatever the *outer* tree pins, erasing the new checkout. That''s the single most common submodule confusion, and getting the direction right is the heart of this step. `git pull` in detached HEAD is unreliable. `-am` would include unrelated changes. `merge` creates a commit structure we don''t want inside the submodule.'
- title: 'Submodule Internals: What ''Content Changed'' Means'
  view: editor
  instructions: |
    ### 🎯 You will learn to
    - **Read `modified content` vs. `new commits`** straight from `git status` and pick the right fix.
    - **Execute the six-step publish ceremony** without falling into the detached-HEAD trap.
    - **Resync** any weird submodule state deterministically with one command.
    - **Reason from first principles** — outer repo tracks one SHA; inner repo is a full Git repo; they're independent.

    ### 🤔 Predict first

    You edit `vendor/math-utils/utils.py` directly without `cd`-ing into
    the submodule. What does the *outer* repo's `git status` say about
    `vendor/math-utils` — `modified content`, `new commits`, both, or
    nothing?

    ### The mental model

    The outer repo stores **exactly one thing** per submodule (besides
    `.gitmodules`): the **pinned commit SHA**. On every `git status`, Git compares:

    ```
    SHA the outer tree pins   vs    SHA at the submodule's current HEAD
        (gitlink, mode 160000)         (what's actually checked out)
    ```

    | Condition | Message |
    |---|---|
    | SHAs match | clean |
    | Submodule committed new SHA | `new commits` |
    | Submodule working tree dirty | `modified content` |
    | Both | both messages |

    Nothing else can cause a "modified" submodule.

    ### Task 1: Clean starting state

    ```bash
    cd /tutorial/myproject
    git submodule status
    ```

    Prefix: ` ` clean, `+` HEAD ≠ pinned, `-` not initialized.

    ### Task 2: Dirty the submodule working tree

    Open `vendor/math-utils/utils.py`. Append:

    ```python
    def halve(x):
        return x / 2
    ```

    Save. Back in outer:

    ```bash
    cd /tutorial/myproject
    git status                      # modified content
    git diff vendor/math-utils      # no real line diff — just a summary
    cd vendor/math-utils && git diff   # the real diff lives here
    ```

    ### Task 3: Commit inside the submodule — then try to push

    ```bash
    # inside vendor/math-utils
    git add utils.py
    git commit -m "Add halve helper"
    git push                        # FAILS — predict the error
    ```

    Likely: `fatal: You are not currently on a branch` (detached HEAD from
    `submodule update`) or `no upstream branch`. This is the top submodule
    footgun — Step 1's detached-HEAD concept, encountered here.

    Fix:

    ```bash
    git switch -c update-halve 2>/dev/null || git switch update-halve
    git log --oneline -2
    # git push -u origin update-halve   # real push would succeed now
    ```

    Back in outer:

    ```bash
    cd /tutorial/myproject
    git status                      # now: new commits (not modified content)
    ```

    ### Task 4: Bump the pinned SHA

    ```bash
    git add vendor/math-utils
    git commit -m "Bump math-utils: add halve helper"
    git log -1 -p vendor/math-utils   # shows ONE line: -Subproject commit ... / +Subproject commit ...
    ```

    <details markdown="1"><summary>💡 The six commands are six invariants — derive them yourself</summary>

    The ceremony looks arbitrary; each step preserves one invariant:

    | # | Command | Invariant preserved |
    |---|---|---|
    | 1 | `cd sub; git switch -c <branch>` | HEAD is branch-attached (not detached) |
    | 2 | `git commit` inside sub | Your change is a commit object |
    | 3 | `git push` inside sub | New SHA exists on the sub's remote |
    | 4 | `cd ../..; git add <path>` | Outer tree stages the new pinned SHA |
    | 5 | `git commit` outer | Outer records a commit pinning the new SHA |
    | 6 | `git push` outer | New pin is visible to teammates |

    Know the invariants and the commands derive themselves — no memorization needed.

    </details>

    ### Task 5: Force-resync (the universal fix)

    ```bash
    git submodule update --init --recursive
    # add --force if local submodule changes should be discarded
    ```

    ### 🧭 Fixes 95% of "my submodule is weird" moments

    ```bash
    git submodule update --init --recursive
    ```

    Safe on any repo. Set `git config --global submodule.recurse true`
    to make `pull`/`checkout` do it automatically.
  watch_files:
  - myproject/vendor/math-utils/utils.py
  open_file: myproject/vendor/math-utils/utils.py
  setup_commands:
  - "cd /tutorial/myproject\ngit switch -q main 2>/dev/null\nif [ ! -d vendor/math-utils/.git ] && [ ! -f vendor/math-utils/.git ]; then\n  git submodule add -f /tutorial/math-utils.git vendor/math-utils 2>/dev/null\n  git commit -qm 'Add math-utils submodule' 2>/dev/null\nfi\ngit submodule update --init --recursive 2>/dev/null\n"
  solution:
    commands:
    # Single batched command to fit the v86 _runVisible 30s prompt timeout.
    - "cd /tutorial/myproject && git switch -q main 2>/dev/null; cd /tutorial/myproject/vendor/math-utils && (grep -q 'def halve' utils.py || (printf '\\ndef halve(x):\\n    return x / 2\\n' >> utils.py && git add utils.py && git commit -m 'Add halve helper')); cd /tutorial/myproject && git add vendor/math-utils && (git diff --cached --quiet || git commit -m 'Bump math-utils: add halve helper')"
    explanation: |
      - **`modified: <path> (modified content)`:** the submodule's working directory is dirty — untracked or unstaged changes inside the submodule. The outer repo cannot show the diff; you must `cd` into the submodule to see it with plain `git diff`.
      - **`modified: <path> (new commits)`:** the submodule's HEAD has moved to a new commit, but the outer repo still points at the old pinned SHA. Resolve by either `git add <path>` + commit (to bump) or `git submodule update` (to reset the submodule back to the pinned SHA).
      - **The outer diff for a submodule is always just one line:** `-Subproject commit <old>` / `+Subproject commit <new>`. That is the only thing the outer repo records about a submodule change — two 40-char SHAs.
      - **`git submodule update --init --recursive`:** deterministic reset. Every submodule is forced back to the SHA the outer tree pins. Run after every `git pull` that touches submodule-tracked paths.
  tests:
  - description: On main branch
    command: cd /tutorial/myproject && git symbolic-ref -q HEAD | grep -q 'refs/heads/main'
    hints:
    - text: 'You''re probably still inside the submodule. `cd /tutorial/myproject && git switch main`.'
  - description: Submodule contains a halve helper
    command: cd /tutorial/myproject && grep -q 'def halve' vendor/math-utils/utils.py
    hints:
    - text: 'Append `def halve(x): return x / 2` to `vendor/math-utils/utils.py`. The edit goes in the submodule''s file.'
      condition: 'code_missing: def halve'
  - description: Submodule's inner commit for halve exists
    command: cd /tutorial/myproject/vendor/math-utils && git log --oneline | grep -qi 'halve'
    hints:
    - text: 'You edited the file but never committed *inside* the submodule. `cd vendor/math-utils && git add utils.py && git commit -m "Add halve helper"`.'
      condition: 'code_contains: def halve'
  - description: Outer repo has a commit that bumps the submodule SHA
    command: cd /tutorial/myproject && git log --oneline | grep -qiE 'bump|halve'
    hints:
    - text: 'Outer repo still pins the old SHA. `cd /tutorial/myproject && git add vendor/math-utils && git commit -m "Bump math-utils: add halve helper"`.'
  - description: Outer repo is clean (no pending submodule modifications)
    command: cd /tutorial/myproject && git diff --quiet && git diff --cached --quiet
    hints:
    - text: 'Usually `modified: vendor/math-utils (new commits)` — inner landed, outer bump is missing. Finish it.'
  quiz:
    title: Submodule Internals — Knowledge Check
    min_score: 0.8
    shuffle: true
    questions:
    - question: 'You see `modified: vendor/math-utils (modified content)` in the outer `git status`. What caused it?'
      options:
      - The submodule's HEAD differs from the pinned SHA
      - The submodule's working directory has uncommitted changes (untracked or unstaged)
      - The `.gitmodules` file was edited
      - The submodule's remote has new commits
      correct_index: 1
      option_feedback:
        0: This answer confuses "modified content" (dirty inner working tree) with "new commits" (HEAD/pin divergence).
        2: This answer confuses submodule status messages with `.gitmodules` file edits.
        3: This answer requires a fetch first; remote state isn't reflected without one, and even then status would show "new commits", not "modified content".
      explanation: '`modified content` specifically means: the submodule working tree is dirty — files inside are unstaged or untracked. The HEAD may still match the pinned SHA. Running `git status` *inside* the submodule will show the dirty files.'
    - question: 'You see `modified: vendor/math-utils (new commits)` in the outer `git status`. What caused it?'
      options:
      - A file inside the submodule was edited but not committed
      - The submodule's HEAD has moved to a commit different from the one pinned by the outer repo's tree
      - The outer repo's branch pointer moved
      - The submodule is corrupted
      correct_index: 1
      option_feedback:
        0: This answer describes "modified content" (dirty inner working tree), not "new commits" (HEAD/pin divergence).
        2: This answer is irrelevant; this status compares pinned SHA vs. submodule HEAD, not the outer branch pointer.
        3: This answer assumes corruption; the symptom is normal pin-divergence, not a broken repo.
      explanation: '`new commits` means: inside the submodule, HEAD advanced (someone committed, or checked out a different SHA). The outer repo still records the OLD pinned SHA, so it flags the divergence. Fix: `git add <path>` + commit to bump the pinned SHA, or `git submodule update` to reset the submodule back to the pinned SHA.'
    - question: You run `git diff vendor/math-utils` in the outer repo after making and committing a change in the submodule. What do you see?
      options:
      - A full line-by-line diff of what changed inside the submodule
      - 'One line: `-Subproject commit <old>` / `+Subproject commit <new>` — the SHA bump is the only diff the outer repo stores'
      - An error message
      - The diff of `.gitmodules`
      correct_index: 1
      option_feedback:
        0: This answer assumes the outer repo can show inner content diffs; it can't — the inner repo owns those diffs.
        2: This answer assumes failure; outer diff works, it's just minimal (one SHA-bump line).
        3: This answer confuses the gitlink-SHA diff with config-file edits.
      explanation: The outer repo's diff for a submodule path is always the gitlink SHA change — one line. To see content-level diffs, `cd` into the submodule and run plain `git diff` there. Two repos, two diff domains.
    - question: Which commands reset a submodule's working directory and HEAD to exactly the SHA the outer repo pins?
      options:
      - '`git submodule update --init --recursive` (and `--force` if local changes)'
      - '`git pull` in the outer repo'
      - '`git reset --hard` in the outer repo'
      - '`rm -rf vendor/math-utils && git clone`'
      correct_index: 0
      option_feedback:
        1: This answer updates the pinned SHA but doesn't touch the submodule working tree.
        2: This answer resets the outer tree but doesn't reach into submodule HEADs (Git keeps the boundary strict).
        3: This answer is destructive when `submodule update` does the same job non-destructively.
      explanation: '`git submodule update --init --recursive` is the deterministic reset. It clones missing submodules and checks out each one at the outer tree''s pinned SHA. `git reset --hard` in the outer repo does NOT affect submodule working directories — Git treats them as separate repos.'
    - question: '**[Revisit Step 3]** Why is it consistent that the outer repo records ONLY a pinned SHA for each submodule — not the submodule''s files?'
      options:
      - Because file content inside a submodule is always confidential
      - Because a commit SHA uniquely identifies a snapshot (commit → tree → blobs), so one SHA is enough to reconstruct the submodule's entire content — duplicating files would waste space
      - Because submodules are always read-only
      - Because Git uses a separate database for submodules
      correct_index: 1
      option_feedback:
        0: This answer assumes a privacy reason; the design is about deduplication, not confidentiality.
        2: This answer invents a constraint; submodules are read-write like any nested repo.
        3: This answer invents a separate storage system; submodules use the same Git object format.
      explanation: Same object-model insight as Step 3. A commit SHA points at a tree that points at blobs — one SHA resolves to a deterministic snapshot. Storing the SHA is equivalent to storing the files. No duplication is needed.
    - question: '**[Evaluate]** You edited `vendor/math-utils/utils.py` and saved. Your teammate pulls your branch and sees a clean `git status`. Why didn''t your edit get to them?'
      options:
      - Git hid the change because it was inside a submodule
      - You modified the submodule's working directory but never (a) committed inside the submodule and pushed, NOR (b) bumped the pinned SHA in the outer repo — so nothing in shared history carries the change
      - Your teammate's Git is out of date
      - Submodules never sync changes between collaborators
      correct_index: 1
      option_feedback:
        0: This answer assumes Git silently drops submodule edits; it doesn't, you just have to publish them via the two-step ceremony.
        2: This answer blames version; the issue is missing publish steps, not tooling.
        3: This answer overstates the problem; submodule changes do sync once properly published.
      explanation: 'An edit to a submodule file affects only your working tree until you perform the two-step commit: (1) commit inside the submodule and push its new commit to the submodule''s remote, (2) `git add <path>` + commit in the outer repo to bump the pinned SHA. Skip either step and the change never reaches teammates.'
    - question: '**[Revisit Step 1]** You edit a file inside a submodule, run `git add && git commit` inside the submodule, then `git push`. Git errors with something like `fatal: You are not currently on a branch`. What Step-1 concept explains this?'
      options:
      - Detached HEAD — `git submodule update` normally checks out submodules in detached HEAD at the pinned SHA. Commits there are orphaned relative to any branch; push needs a branch
      - Merge conflicts
      - Missing upstream
      - Submodules are read-only by default
      correct_index: 0
      option_feedback:
        1: This answer invents a conflict; the issue is detached-HEAD's lack of branch context for push.
        2: This answer is partial; even with an upstream, detached HEAD can't push without a branch.
        3: This answer invents a permission model; submodules are writable.
      explanation: 'After `git submodule update`, submodules are in detached HEAD at the pinned SHA (because that''s what the outer tree specified — no branch context). Any commit you make there is anchored to nothing. Fix: `git switch -c <branch>` inside the submodule **before** committing. Same detached-HEAD pattern as Step 1, encountered in a submodule setting.'
    - question: '**[Revisit Step 8]** You ran `git rebase main` inside a submodule and rewrote three of its commits. The outer repo''s `git status` says `modified: vendor/math-utils (new commits)`. Is anything wrong with this?'
      options:
      - No issue — rebase inside a submodule is business as usual
      - Rebase inside a submodule is fine in isolation, but the submodule's old SHAs (still pinned by the outer repo's older commits) now point to orphaned commits — teammates pulling older outer-repo history may fail to fetch them if they were never pushed. Treat submodule rebases with the same 'safe zone' rule as any other rebase
      - Git prevents rebase inside submodules
      - Rebase deletes the submodule
      correct_index: 1
      option_feedback:
        0: This answer ignores that the outer repo may still pin pre-rebase SHAs that need pushing for teammates' historical clones to work.
        2: This answer assumes Git blocks rebase in submodules; it doesn't.
        3: This answer invents destructive semantics; rebase doesn't delete repos.
      explanation: 'A submodule is a real Git repo — rebase works there exactly as in Step 8/9. The complication is that the outer repo may still pin the pre-rebase SHAs; if those weren''t pushed, teammates checking out old outer-repo commits will fail to fetch them (`fatal: reference is not a tree`). Same cardinal rule: rebase only unpushed/local history.'
    - question: The full "publish a submodule change" ceremony. Put the six required commands in order. Distractors are verb-variants that break one or more of the ceremony's causal invariants.
      type: parsons
      display: block
      lines:
      - 'cd vendor/math-utils                       # (1) enter the submodule'
      - 'git switch -c update-halve                 # (2) attach HEAD to a branch (NOT detached)'
      - 'git commit -am "Add halve helper"          # (3) create the commit inside submodule'
      - 'git push -u origin update-halve            # (4) publish the submodule SHA to its remote'
      - 'cd ../..                                   # (5) return to outer repo'
      - 'git add vendor/math-utils && git commit -m "Bump math-utils: add halve"  # (6) pin new SHA and push outer'
      distractors:
      - 'git commit -am "..."          # BEFORE switching to a branch — detached HEAD, un-pushable'
      - 'git submodule update --init --recursive   # resets inner HEAD, losing your new commit'
      - 'git push --force origin update-halve      # unneeded; no history to overwrite'
      - 'git rebase origin/main        # rewrites SHAs you just created; defeats (4)'
      explanation: 'Each ceremony step preserves one invariant — branch-attached HEAD, commit-exists-in-submodule, SHA-on-remote, SHA-pinned-in-outer, outer-pushed. Each distractor breaks one. Committing first orphans the commit; `submodule update` resets it; `--force` is a shared-history violation; `rebase` rewrites the commits you just tried to publish. Knowing the invariants is the schema that makes the recipe stick.'
- title: 'Capstone: On-Call Debugging Under Pressure'
  view: git_graph
  instructions: |
    ### 🎯 You will demonstrate you can
    - **Compose** 5+ advanced Git tools into one realistic end-to-end workflow — without step-by-step instruction.
    - **Pick** squash/rebase/merge based on the history shape you want, not memorized rules.
    - **Trust the reflog safety net** after chaining several destructive operations.
    - **Read state first, act second** — the professional habit that defeats blind-testing.

    <details markdown="1"><summary>🩺 30-second readiness check — answer before starting</summary>

    Without scrolling, answer from memory. If any feels shaky, revisit the
    listed step *before* attempting the capstone. Component-skill research
    (Lovett 2001, Ambrose et al. 2010): 45 min on a weak skill beats hours
    on the integrated task.

    1. Where do orphaned commits live, and how do you anchor one as a branch?
       *Shaky? → revisit Step 2 (reflog).*
    2. What's the *physical* difference between `git rebase` and `git revert`
       in terms of which existing SHAs change?
       *Shaky? → revisit Step 11 (revert) — or really, Step 3.*
    3. Why does `git stash` not include `feature.py` if you never `git add`-ed it?
       *Shaky? → revisit Step 4 (stash gotchas).*
    4. What's the verb to finish a paused cherry-pick after resolving conflicts? A paused rebase?
       *Shaky? → revisit Step 5 or Step 8.*
    5. After `git bisect run`, what's the **non-negotiable** final command, and why?
       *Shaky? → revisit Step 7 (bisect).*

    All five clear? Proceed. Two or more shaky? Spend 15 minutes on the
    weak step *first*. The capstone is an integration exercise — fragile
    components compound into frustration.

    </details>

    ### Scenario — no hand-holding

    You're on-call. Page: **`absolute(-4) == 4` fails on `main`.** CI red.
    Teammate left a dirty tree with an unrelated note. Nobody knows which
    of ~6 recent commits broke things.

    Your checklist:

    1. **Shelve** the unrelated in-progress note (tree must be clean for bisect).
    2. **Find** the bad commit via binary search.
    3. **Read** its message and diff before touching code (author intent).
    4. **Fix** on a dedicated branch. Messy WIP commits expected.
    5. **Clean up** so `main` sees **one** focused commit.
    6. **Merge** to `main`.
    7. **Restore** the shelved note.
    8. **Verify** reflog could still recover everything you rewrote.

    Nothing new — every command came earlier. The point is **choice and composition under pressure**.

    > **Style.** Loop: *read state → decide → act → re-read state*.
    > `git status`, `git log --oneline --graph --all`, `git reflog` are
    > your dashboard. Lost? Re-read state, don't guess.

    ### The state you walk into

    ```bash
    cd /tutorial/myproject
    git status
    git log --oneline --graph --all -12
    python3 test_calculator.py
    ```

    ### Hints — open only if stuck for a minute

    <details markdown="1"><summary>Task 1 (shelve WIP)</summary>
    Step 4. One command, noun form. Bisect needs a clean tree.
    </details>

    <details markdown="1"><summary>Task 2 (find the culprit)</summary>
    Step 7, automated. Test exits 0 = good, non-zero = bad. Always end with reset.
    </details>

    <details markdown="1"><summary>Task 3 (read intent)</summary>
    Step 6's chain: `git blame` + `git show <sha>`.
    </details>

    <details markdown="1"><summary>Task 4 (messy fix branch)</summary>
    Branch off `main`, iterate, make any number of WIP commits, get tests green.
    </details>

    <details markdown="1"><summary>Task 5 (squash into one)</summary>
    Step 9 `rebase -i` + `squash`, or Step 10 `merge --squash`. Either is fine.
    </details>

    <details markdown="1"><summary>Task 6 (merge)</summary>
    Whatever strategy leaves `main` with one clean fix commit on top.
    </details>

    <details markdown="1"><summary>Task 7 (restore note)</summary>
    Step 4. Inverse of Task 1. Leave uncommitted.
    </details>

    <details markdown="1"><summary>Task 8 (reflog verify)</summary>
    Step 2. Read-only check: `git reflog` still sees your pre-squash commits.
    </details>

    ### Success criteria

    - `python3 test_calculator.py` prints `all tests pass`.
    - `main` ends with exactly **one** new fix commit.
    - `calculator.py` still has your uncommitted `# TODO: add clamp helper` note.
    - `git reflog` retains your intermediate messy commits.

    ### The "burning down the repo" callback

    From Step 1's antipattern: panic = delete the folder, re-clone, force-push.
    You did the opposite:

    | Situation | What you did | What novices do |
    |---|---|---|
    | Dirty tree | **stash** | delete folder |
    | Unknown-culprit regression | **bisect** | read 30 diffs |
    | Author intent | **blame + show** | guess |
    | Messy intermediates | **rebase / squash** | rewrite from scratch |
    | "Lost" commits | **reflog** | panicked `rm -rf` |

    Same competence gap you'll see on every team for the rest of your career.

    ### 🏔️ Stretch (optional, not auto-tested)

    Re-run with one extra wrinkle: the shelved note conflicts with the
    bug-fix line on `stash pop`. Resolve the conflict, pick keep-both
    or keep-fix, verify tests + reflog. This is the capstone's capstone.

    ### 🗺️ The unifying schema — one picture

    Every command from the basic tutorial and these 14 advanced steps falls
    into exactly one of three categories. **Only category 3 is dangerous
    to push.** Internalize this picture and you can predict the safety
    of any unfamiliar Git command at a glance.

    <pre><code class="diagram-freeform">@startuml
    layout vertical
    box "1. ALWAYS SAFE - reads state or moves refs without changing history\nNo new SHAs, no force-push needed\n- git blame, git log, git show, git diff, git status\n- git branch (create), git switch, git checkout (read mode)" as Safe
    box "2. SAFE TO PUSH - appends new SHAs without changing existing ones\nAdditive only - teammates fast-forward cleanly\n- git commit\n- git cherry-pick\n- git revert (the anti-matter commit)\n- git merge (with or without merge commit)\n- git merge --squash + git commit\n- git stash (local by design, never pushed)" as Additive
    box "3. DANGEROUS TO PUSH - rewrites or abandons existing SHAs\nLocal/unpushed branches only - needs --force on shared\n- git rebase\n- git rebase -i (squash, drop, fixup, edit, reword)\n- git commit --amend\n- git reset --hard / --mixed / --soft" as Rewriting
    @enduml</code></pre>

    The single decision rule: *before pushing, ask "did I rewrite or abandon
    any existing SHAs?"* If yes, the command lives in category 3 and your
    teammates' clones will diverge. Reach for category 2 (`revert`, `merge`,
    `cherry-pick`) when undoing pushed work.

    ### 🌱 What to do this week (post-tutorial spaced retrieval)

    Without spaced retrieval, ~50% of what you learned today is gone in a
    week. Twenty minutes total over the next month locks it in:

    | When | What |
    |---|---|
    | **Tomorrow (10 min)** | Recreate the capstone from a blank slate — same scenario, same tools, no scrolling back. If you stumble, re-do that step (not the whole capstone). |
    | **In 1 week (5 min)** | Pick any 3 commands from this tutorial. From memory: state name, scenario, and the Step 3 schema (creates objects? moves pointers? both?). |
    | **In 1 month (5 min)** | The next time you face a real "lost commit" or "messy branch" at work, reach for `git reflog` *first* and `rm -rf .git` *never*. That moment is the highest-value retrieval practice you'll do. |

    The Cepeda meta-analysis (254 studies, 14,000+ participants) shows
    spaced practice produces ~2× better retention than equal-duration
    massed practice — and the gap *widens* with delay. This 20 minutes is
    your highest-ROI study time.
  watch_files:
  - myproject/calculator.py
  - myproject/test_calculator.py
  open_file: myproject/calculator.py
  setup_commands:
  - "cd /tutorial/myproject\n{ [ -e .git/rebase-merge ] || [ -e .git/rebase-apply ]; } && git rebase --abort 2>/dev/null\n[ -e .git/CHERRY_PICK_HEAD ] && git cherry-pick --abort 2>/dev/null\n[ -e .git/MERGE_HEAD ] && git merge --abort 2>/dev/null\n[ -e .git/BISECT_START ] && git bisect reset 2>/dev/null\ngit switch -q main 2>/dev/null\n# Clean up any leftover capstone branches from a previous attempt.\nfor br in capstone-fix capstone-wip; do git branch -D $br 2>/dev/null; done\n# Drop any leftover stashes from previous capstone attempts.\nwhile git stash list | grep -q 'capstone'; do git stash drop -q 2>/dev/null || break; done\n# If the capstone has already been completed successfully, don't rebuild.\nif git log main --oneline -1 2>/dev/null | grep -qi 'capstone.*fix\\|fix.*absolute.*capstone'; then\n  exit 0\nfi\n# Ensure calculator.py has a working absolute() baseline before we plant the bug.\nif ! grep -q 'def absolute' calculator.py; then\n  printf '\\ndef absolute(x):\\n    \"\"\"Return |x|.\"\"\"\\n    return x if x >= 0 else -x\\n' >> calculator.py\n  git add calculator.py\n  git commit -qm 'Seed: restore absolute baseline for capstone' 2>/dev/null\nfi\n# Install the regression test if missing.\nprintf 'from calculator import absolute\\nassert absolute(-4) == 4, f\"expected 4, got {absolute(-4)}\"\\nassert absolute(3) == 3\\nassert absolute(0) == 0\\nprint(\"all tests pass\")\\n' > test_calculator.py\ngit add test_calculator.py\ngit diff --cached --quiet || git commit -qm 'Capstone: add regression tests'\n# Plant 5 commits, one of which silently breaks absolute().\necho '# refactor: formatting pass' >> calculator.py\ngit commit -qam 'Capstone: formatting pass'\necho '# refactor: docstring cleanup' >> calculator.py\ngit commit -qam 'Capstone: docstring cleanup'\n# Plant the bug: replace `return x if x >= 0 else -x` with a broken version.\nif grep -q 'return x if x >= 0 else -x' calculator.py; then\n  sed -i 's|return x if x >= 0 else -x|return x  # simplification|' calculator.py\nfi\ngit commit -qam 'Capstone: simplify absolute return path'\necho '# refactor: trailing whitespace' >> calculator.py\ngit commit -qam 'Capstone: tidy trailing whitespace'\necho '# refactor: reorder helpers' >> calculator.py\ngit commit -qam 'Capstone: reorder helper comments'\n# Dirty the working tree with an unrelated uncommitted note.\nif ! grep -q 'TODO: add clamp helper' calculator.py; then\n  echo '# TODO: add clamp helper' >> calculator.py\nfi\n"
  solution:
    # Interactive scenario teaches the FULL composition: stash → bisect → fix
    # on dedicated branch → rebase-fixup → merge → stash-pop. Automated
    # solution rebuilds the same end state directly. Single batched command
    # to fit the v86 _runVisible 30s prompt timeout.
    commands:
    - "cd /tutorial/myproject; { [ -e .git/rebase-merge ] || [ -e .git/rebase-apply ]; } && git rebase --abort 2>/dev/null; [ -e .git/BISECT_START ] && git bisect reset 2>/dev/null; [ -e .git/MERGE_HEAD ] && git merge --abort 2>/dev/null; git switch -q main 2>/dev/null; git reset --hard HEAD; git stash clear -q 2>/dev/null; git branch -D capstone-fix 2>/dev/null; sed -i 's|return x  # simplification|return x if x >= 0 else -x|' calculator.py; git diff --quiet || (git add calculator.py && git commit -m 'Capstone fix: restore negation in absolute'); echo '# TODO: add clamp helper' >> calculator.py"
    explanation: |
      - **Tool choices (many right answers).** The solution shown uses stash → automated bisect → branch + two WIP commits → interactive-rebase fixup → regular merge → stash pop → reflog check. An equally valid path: stash → manual bisect → fix with one commit directly → squash-merge to main → stash pop → reflog check. The tests only verify the end state, not the path.
      - **Why stash first, always.** Bisect moves HEAD across historical commits; a dirty working tree would either block bisect or carry uncommitted edits across arbitrary commits. Same principle as Step 4's "clean tree for context switch."
      - **Why bisect.** Manually reading 5 diffs would work here but would not work at 500. The point is the habit: for regressions, bisect is the default reach, even for small histories.
      - **Why read the culprit's intent.** Step 6's warning: the author wasn't malicious. Their commit message and diff may reveal which part of the change was intended and which was the accidental regression — informing whether you fix the bug or revert the whole commit.
      - **Why clean the fix branch before merging.** Main's history is read during future bisects (this one's regression will be someone else's bisect in six months). Each commit on main should be one reason, not "WIP, WIP, WIP, real fix."
      - **Why reflog at the end.** Proof that the desirable-difficulty exercise did not actually destroy anything. This is the Step 2 safety-net claim, cashed in on a composite workflow.
  tests:
  - description: 'On main branch (cleanup verified)'
    command: cd /tutorial/myproject && git symbolic-ref -q HEAD | grep -q 'refs/heads/main'
    hints:
    - text: 'End on `main`. `git switch main` if you''re still on a fix branch or detached.'
  - description: 'No bisect or rebase still in progress'
    command: cd /tutorial/myproject && [ ! -f .git/BISECT_LOG ] && [ ! -d .git/rebase-merge ] && [ ! -d .git/rebase-apply ]
    hints:
    - text: '`git status` names the paused operation. `git bisect reset`, `git rebase --abort`, or `git merge --abort` as appropriate.'
  - description: 'absolute() body has the correct return (handles negatives, zero, positives)'
    command: cd /tutorial/myproject && grep -q 'return x if x >= 0 else -x' calculator.py
    hints:
    - text: 'Bisect should have pointed at `Capstone: simplify absolute return path`. `git show <sha>` to see the damage, then fix `absolute` to return `x` when `x >= 0`, else `-x`.'
  - description: 'A fix commit landed on main with the absolute repair'
    command: cd /tutorial/myproject && git log main --oneline | grep -qiE 'fix|capstone|absolute|negation'
    hints:
    - text: 'After fixing `absolute`, commit on a branch, then merge or squash-merge to main with a message that mentions the fix.'
  - description: 'Exactly one fix commit landed on main (not 2+ WIP commits visible on main)'
    command: cd /tutorial/myproject && [ $(git log main --oneline | grep -ciE '^[a-f0-9]+ (WIP|wip)') -eq 0 ]
    hints:
    - text: 'WIP commits landed on `main`. Collapse into one: `rebase -i` + `squash`, or `git merge --squash` + commit. Either way, one clean fix commit.'
  - description: 'The in-progress clamp note survived the session (still in working tree, uncommitted)'
    command: "cd /tutorial/myproject && grep -q 'TODO: add clamp helper' calculator.py && ! git log main --oneline | grep -qi 'clamp'"
    hints:
    - text: 'The TODO note is missing from `calculator.py`. You stashed it for the bisect — `git stash pop` restores it. Leave it uncommitted.'
      condition: 'source_missing: TODO: add clamp'
    - text: 'The note got committed to `main`. The capstone wants it uncommitted. `git reset HEAD~1` if it''s the tip, then leave the edit dirty.'
      condition: 'source_contains: TODO: add clamp'
  - description: 'Reflog has at least a few entries from this session (safety net intact)'
    command: cd /tutorial/myproject && [ $(git reflog -n 20 | wc -l) -ge 5 ]
    hints:
    - text: '`git reflog` should show your stash, bisect, branch-switches, and commits. Empty reflog usually means something was cleared — this test typically passes on its own.'
  quiz:
    title: Cumulative Final Quiz — Choose the Right Tool
    min_score: 0.8
    shuffle: true
    questions:
    - question: 'Match each scenario to the **single best** tool. Which option correctly pairs all four?'
      options:
      - '(a) Backport one bug-fix commit to three release branches → `git merge`; (b) Integrate 50 commits of a long feature into main → `git cherry-pick` each one; (c) Clean up 10 WIP commits before opening a PR → `git rebase -i`; (d) Land a feature branch as one commit on main → `git merge --no-ff`'
      - '(a) Backport one bug-fix commit to three release branches → `git cherry-pick`; (b) Integrate 50 commits of a long feature into main → `git merge` (or `git rebase` for linear history); (c) Clean up 10 WIP commits before opening a PR → `git rebase -i`; (d) Land a feature branch as one commit on main → `git merge --squash`'
      - '(a) All four → `git merge`'
      - '(a) Backport → `git rebase`; (b) Feature integration → `git cherry-pick`; (c) WIP cleanup → `git merge`; (d) One-commit landing → `git rebase`'
      correct_index: 1
      option_feedback:
        0: This answer rejects cherry-pick's canonical use case (one-commit backports) and uses merge for WIP cleanup, which doesn't collapse history.
        2: This answer collapses all distinctions into one tool; the four scenarios genuinely call for different verbs.
        3: This answer reverses the typical scope-to-tool mapping (rebase for surgery, cherry-pick for bulk).
      explanation: Cherry-pick is surgical (one commit), merge is bulk (many commits), interactive rebase is for history cleanup, squash-merge collapses a branch into one commit. Steps 5, 8, 9, 10 each framed this table; this question just asks you to recognize when to use which. The others mis-apply cherry-pick (wrong for 50 commits) or merge (doesn't clean WIP).
    - question: '**[Interleaves Steps 3, 5, 8, 9, 10]** Which of these operations create commits with **new SHAs** even when the patch is identical to an earlier commit? Select all that apply.'
      type: multiple
      options:
      - '`git cherry-pick <sha>` onto a different branch'
      - '`git rebase main` (non-interactive) on a feature branch'
      - '`git rebase -i HEAD~5` that reorders commits'
      - '`git merge --squash feature` followed by `git commit`'
      - '`git merge feature` (fast-forward) — just moves the branch pointer'
      - '`git branch feature` — creates a branch pointer at the current commit'
      correct_indices:
      - 0
      - 1
      - 2
      - 3
      option_feedback:
        4: This answer treats fast-forward merge as creating commits; it only advances a ref pointer — no new SHAs.
        5: This answer treats `git branch` as creating commits; it only writes a 41-byte ref file — no new SHAs.
      explanation: 'A commit''s SHA hashes its tree + parent(s) + author + committer + message. **Change any of those and the SHA changes.** Cherry-pick, rebase, interactive-rebase, and squash-merge all create new commit objects with different parents or combined trees. Fast-forward merge and `git branch` do NOT create commits — they only move pointers (Step 1''s whole point). This is the deep schema: commits are immutable; "moving" a commit is always "copy + move pointer to copy."'
    - question: '**[Interleaves Steps 2, 9, 1]** You performed three destructive-feeling operations in sequence: `git reset --hard HEAD~3`, then `git rebase -i` dropping a commit, then entering detached HEAD and making a throwaway commit. Which **single** tool can recover commits lost in all three cases?'
      options:
      - '`git revert` — it reverses any recent operation'
      - '`git reflog` + `git branch <name> <sha>` — reflog logs every HEAD movement regardless of which operation moved it, so the recovery recipe is identical across all three cases'
      - '`git stash pop` — stash tracks destructive operations automatically'
      - 'Nothing — destructive operations are final'
      correct_index: 1
      option_feedback:
        0: This answer ignores that revert applies to one commit's *effects*, not arbitrary HEAD movements; reflog is the cross-cutting tool.
        2: This answer confuses stash (working-tree shelving) with reflog (HEAD-position history).
        3: This answer ignores reflog's universal HEAD-position record; "destructive" only means refs moved, not data deleted.
      explanation: Reflog is the universal safety net because it records HEAD's position history, not the cause. Whether HEAD moved via reset, rebase drop, or leaving detached HEAD, the SHA it was at is recorded. Branch that SHA back into reachability and the "lost" work is found. This is the Step 2 lesson cashed in on a composite workflow — and the reason the tutorial framed destructive commands as "less scary than they sound."
    - question: '**[Interleaves basic tutorial Step 11 + advanced Step 8]** You hit a conflict during `git rebase main`. You edit the file, remove all `<<<<<<<` / `=======` / `>>>>>>>` markers, and run `git add`. Which command finishes **this one commit''s** resolution?'
      options:
      - '`git commit` — identical to finishing a merge'
      - '`git rebase --continue` — rebase is replaying commits one at a time; you are telling Git to resume the replay, not create a standalone commit'
      - '`git merge --continue`'
      - '`git push --force`'
      correct_index: 1
      option_feedback:
        0: This answer treats rebase like merge; rebase needs `--continue`, not `commit` — `commit` would leave the rebase half-done.
        2: This answer uses the wrong verb; this is a rebase, not a merge.
        3: This answer skips finalizing the rebase entirely.
      explanation: A rebase conflict is identical in mechanics to a merge conflict — same markers, same `git add` to mark resolved — but the final verb differs because rebase is *replaying*, not *merging*. Reflex-typing `git commit` here is the single most common mistake; it leaves the rebase half-done. `git rebase --abort` at any point restores the pre-rebase state.
    - question: '**[Interleaves Steps 6, 7]** A bug appeared because someone **removed** a line of validation that used to prevent it. Which investigation tool finds the commit that introduced the bug?'
      options:
      - '`git blame` — it shows the author of every existing line'
      - '`git bisect` — it binary-searches based on *behavior*, which is the only signal available when the culprit is a deletion (blame cannot see a line that isn''t there)'
      - '`git log --grep="delete"` — it finds commits with "delete" in the message'
      - '`git show HEAD` — it shows the most recent commit'
      correct_index: 1
      option_feedback:
        0: This answer ignores blame's deletion blind spot; absent lines are invisible to blame.
        2: This answer assumes the commit message reliably announces deletions; messages don't index by content.
        3: This answer shows only the most recent commit, not the historical regression spanning many commits.
      explanation: Blame attributes *existing* lines only — a missing line is invisible to it. Bisect operates on behavioral outcomes (did the test pass or fail?) regardless of whether the change was an addition, modification, or deletion. This is why the capstone you just finished started with bisect, not blame — the bug could just as easily have been a deletion, and starting with bisect generalizes.
    - question: '**[Interleaves Steps 3, 11, 13]** A submodule is stored in the outer repo as a gitlink entry (mode `160000`) containing a 40-character SHA. That SHA references which kind of Git object?'
      options:
      - A blob object containing the submodule's files
      - A tree object for the submodule's root directory
      - A commit object in the submodule's own object database
      - A tag object
      correct_index: 2
      option_feedback:
        0: This answer confuses commit objects with blob objects; gitlinks pin commits, which then resolve to trees and blobs.
        1: This answer confuses commit objects with tree objects; only a commit captures the snapshot identity.
        3: This answer confuses commit objects with tag objects; tags reference commits but aren't stored in gitlinks.
      explanation: 'The gitlink pins a *commit* SHA (in the submodule''s repo). That commit deterministically resolves to a tree, which resolves to blobs — so one SHA is equivalent to a full content snapshot. Same object-model reasoning as Step 3 — snapshot-identity is carried by the commit SHA, which is why "one 40-char pin" is enough information to reconstruct the entire submodule''s state.'
    - question: '**[Interleaves Steps 8, 9, 10]** Which of these operations are **forbidden** on a branch that has been pushed and is shared with teammates? Select all that apply.'
      type: multiple
      options:
      - '`git rebase main` on the shared branch (rewrites its SHAs)'
      - '`git rebase -i HEAD~5` on the shared branch (rewrites its SHAs)'
      - '`git commit --amend` on the tip of the shared branch (new SHA)'
      - '`git push --force` (or `--force-with-lease`) to overwrite the remote'
      - '`git revert <sha>` (appends an anti-commit, rewrites nothing)'
      - '`git merge feature` into the shared branch (appends a merge commit)'
      correct_indices:
      - 0
      - 1
      - 2
      - 3
      option_feedback:
        4: This answer correctly classifies revert as additive; selecting it would overstate revert's risk on shared branches.
        5: This answer correctly classifies merge as additive; selecting it would conflate adding history with rewriting it.
      explanation: 'The cardinal rule — anything that **rewrites** published commits is forbidden on shared branches, because teammates holding the old SHAs will diverge. That rules out rebase (any flavor), amend, and force-push. Revert and merge are *additive* (they only append new commits without changing existing history), so they are safe. Same rule, different commands. Memorize the property (rewrite = dangerous), not the per-command list.'
    - question: '**[Interleaves Steps 2, 8]** You rebased `feature` locally, then `git push` was rejected because teammate Alice had pushed to `feature` in the meantime. What is the safe recovery sequence?'
      type: parsons
      display: block
      lines:
      - 'git reflog      # find the pre-rebase SHA of `feature`'
      - 'git reset --hard <pre-rebase-sha>      # undo your rebase locally'
      - 'git pull        # merge Alice''s changes into your (unrebased) branch'
      - 'git push        # succeeds — no history was rewritten'
      distractors:
      - 'git push --force'
      - 'git rebase --abort'
      - 'git revert HEAD'
      - 'rm -rf .git && git clone'
      explanation: 'When rebasing a shared branch goes wrong, the fix is always — *undo your rewrite first*, then integrate normally. Reflog finds the pre-rebase SHA; `reset --hard` restores it; pull merges Alice''s work; push succeeds. The distractors represent the antipatterns Step 1 named — `push --force` overwrites Alice''s work; `rebase --abort` does not apply after the rebase is complete; `revert` is for undoing a single commit, not a rebase; `rm -rf .git && clone` is the "burning down the repo" antipattern.'
    - question: '**[Interleaves Steps 4, 7]** You are mid-edit on a feature when a teammate asks you to bisect a regression on `main`. Your working tree has uncommitted changes you want to keep. Two tools from this tutorial compose to solve this cleanly — which pair?'
      options:
      - '`git commit -m "WIP"` then `git bisect` — commit your WIP so bisect has a clean tree'
      - '`git stash` then `git bisect`, then `git stash pop` when bisect is done and you are back on a named branch — keeps your WIP private and the tree clean for bisect''s HEAD movements'
      - '`git restore .` then `git bisect` — discards your WIP so bisect has a clean tree'
      - '`git bisect` then `git stash` — stash shelves the bisect state'
      correct_index: 1
      option_feedback:
        0: This answer pollutes history if pushed; the question prefers a private alternative for in-progress work.
        2: This answer destroys the WIP that the question wants to preserve.
        3: This answer reverses the order; stash must come before bisect to give it a clean tree to walk.
      explanation: Bisect moves HEAD across arbitrary historical commits — a dirty working tree either blocks it or carries your edits into commits they don't belong in. Stash is designed exactly for this — private, local, temporary. Committing WIP pollutes history if pushed; `git restore .` destroys your work. Recognize the compose-two-tools pattern — most real Git tasks chain more than one command.
    - question: '**[Interleaves Steps 7, 10]** Three months ago your team squash-merged the `feature-stats` branch into `main`. A regression has surfaced that bisect on `main` narrows down to the squash commit. The squash commit changed 800 lines. What is your next move?'
      options:
      - Revert the whole squash commit from `main` and re-investigate later
      - Read every line of the 800-line squash diff until you find the bug
      - '`git bisect` on the (still-existing) `feature-stats` branch — its internal commits were preserved, giving fine-grained resolution that the squash on main destroyed'
      - Give up — squash merge permanently discards internal commits
      correct_index: 2
      option_feedback:
        0: This answer is too broad; the question asks for fine-grained resolution, not whole-feature reversion.
        1: This answer ignores the available finer-grained source on the feature branch's preserved commits.
        3: This answer assumes squash discards internal commits; it only flattens *main's* history, the feature branch keeps them.
      explanation: Squash-merge collapses *main's* history, not the feature branch's. The feature branch's commits still exist (and its reflog too) if it wasn't deleted. Bisect there pinpoints the exact internal commit. This is the strongest pragmatic argument for keeping merged feature branches around for a while, not deleting them the day they merge. Step 10's quiz framed this; this question checks that you can *reach* for the recovery without being reminded.
    - question: '**[The unifying insight]** After working through the whole advanced tutorial, which statement best captures what every command you learned actually does?'
      options:
      - Git commands either delete old state or create new state; they never do both
      - Existing commit objects are immutable. Every command either creates new immutable objects (commits/trees/blobs), moves one or more refs, updates the index, updates the working tree, or transfers objects/refs to a remote — usually some combination of these. Nothing rewrites old commits in place; "destructive" commands only abandon refs, leaving the objects in `.git/objects` for `reflog` to find.
      - Git commands are magical; the best strategy is to memorize the most common ones
      - Commands behave unpredictably depending on remote configuration
      correct_index: 1
      option_feedback:
        0: This answer is the old "either creates or moves, never both" simplification; most operations *do* both, the real invariant is that existing commits aren't rewritten.
        2: This answer abandons the underlying invariant for rote learning; the schema is what makes Git predictable.
        3: This answer mistakes per-command behavior for a remote-config sensitivity that doesn't exist.
      explanation: 'This is the load-bearing invariant from Step 3 cashed in across all 15 steps. Branch creation moves a ref. Commit creates an object + moves a ref + clears the index. Rebase creates a *series* of new objects + moves a ref. Cherry-pick creates one new object + moves a ref. Squash-merge creates one new object + moves a ref. Even the "destructive" commands (reset, rebase drop) only move refs — the old objects remain in `.git/objects` and reflog keeps their addresses. If you internalize *immutability of existing commits*, nothing in Git is mysterious.'
    - question: '**[Evaluate — meta]** A junior teammate says: "Destructive Git commands like rebase and reset are too dangerous to use; I''ll stick with merge and revert only." Evaluate this position.'
      options:
      - Correct — rebase and reset should be avoided by anyone who isn't a Git expert
      - Partially correct — on **shared** branches, they really are dangerous, and revert/merge are the right tools there. On **local/unpushed** branches, rebase and reset are routine safe tools because reflog recovers anything within the configured retention window. Avoiding them entirely trades safety for history-quality and is a real cost on teams that value clean history
      - Incorrect — there is no difference between local and shared branches
      - Incorrect — reflog auto-recovers destructive operations immediately in all cases
      correct_index: 1
      option_feedback:
        0: This answer absolutizes a context-dependent rule; rebase/reset are routine on local branches.
        2: This answer denies the very local/shared distinction that resolves the safety question.
        3: This answer overstates reflog's reach; it works within retention windows on local repos, not as a universal undo.
      explanation: 'Conditional knowledge is the mark of an expert (Ambrose et al. 2010). The cardinal rule is not "rebase = bad" — it is "rebase rewrites history, which is dangerous on shared branches and safe on local ones." The junior''s heuristic is safer *and* less effective; teaching them *when* each tool is appropriate is the goal. The same tool, on the same commits, is either routine or catastrophic depending on one thing — has this history been pushed and pulled by others? This is the single most important distinction the advanced tutorial taught.'
