title: 'Advanced Git: Debugging, History Rewriting, and Submodules'
description: Go beyond the basics — master detached HEAD, git's object model, stash, cherry-pick, blame, bisect, rebase (including interactive), squash merge, and submodules. Every step is grounded in a real scenario you will meet on the job.

# Authoring-time Bloom-verb objectives. Not yet rendered to students.
learning_objectives:
  - "Predict what a given Git command does to the commit DAG before running it."
  - "Apply `git stash`, `cherry-pick`, `bisect`, `rebase`, `revert`, and `submodule` commands to debug and rewrite history safely."
  - "Recover 'lost' work using `git reflog` — and explain why no commit is truly lost without a force-push."
  - "Evaluate when to use `revert` (safe, additive) vs. history-rewriting commands (rebase, reset, amend) on shared branches."
  - "Use submodules to compose repos and update submodule references without losing the parent's pin."

backend: v86
require_tests: true
autosave_type: commands-and-files
reset_type: commands
git_graph: /tutorial/myproject
git_gutter: true  # +/-/~ markers in the editor gutter vs HEAD
setup_commands:
- "echo 'export LANG=C.UTF-8' >> ~/.bashrc\necho 'export LESSCHARSET=utf-8' >> ~/.bashrc\nexport LANG=C.UTF-8\nexport LESSCHARSET=utf-8\ngit config --global user.email 'diligent-student@cs.ucla.edu'\ngit config --global user.name 'Soon-to-be Git Hero'\ngit config --global init.defaultBranch main\ngit config --global advice.detachedHead false\ngit config --global protocol.file.allow always\n# Pre-build a small calculator repo (idempotent via sentinel).\n# Two commits on `main`, one on a `feature-divide` branch —\n# enough history to explore pointers, detached HEAD, etc.\ncd /tutorial\nif [ -d myproject/.git ] && git -C myproject log main --oneline 2>/dev/null | grep -q 'Add add function'; then\n  exit 0\nfi\nrm -rf myproject\ngit init -q myproject\ncd myproject\necho '\"\"\"A simple calculator module.\"\"\"' > calculator.py\ngit add calculator.py\ngit commit -qm 'Initial commit'\necho 'def add(a, b): return a + b' >> calculator.py\ngit commit -qam 'Add add function'\ngit switch -qc feature-divide\necho 'def divide(a, b): return a / b' >> calculator.py\ngit commit -qam 'Add divide function'\ngit switch -q main\n"
steps:
- title: Branches, HEAD, and Detached HEAD
  view: git_graph
  instructions: |
    ### 🎯 You will learn to
    - **Explain** why branch creation is O(1) — no files get copied.
    - **Tell** attached from detached HEAD by reading `.git/HEAD`.
    - **Anticipate** where orphaned commits come from, setting up the reflog rescue.

    <details markdown="1"><summary>📚 The 15-step arc (open once, then close)</summary>

    | Phase | Steps | What you build |
    |---|---|---|
    | **Foundations** | 1–3 | Mental model: branches are pointers; commits are immutable hashed snapshots |
    | **Daily tools** | 4–7 | Stash, cherry-pick, blame, bisect — used weekly on real teams |
    | **History rewriting** | 8–11 | Rebase, interactive rebase, squash-merge, revert — when to use each |
    | **Submodules** | 12–14 | Nested repos, the gitlink, six-step publish ceremony |
    | **Capstone** | 15 | Compose 5+ tools under pressure with no hand-holding |

    Steps 1–3 are foundational — every later step refers back. After Step 7, take a break before Step 8 (spacing helps consolidation).

    </details>

    ### Why this tutorial exists

    You already know `init`, `add`, `commit`, `branch`, `merge`, remotes.
    This tutorial lifts the hood — object database, refs, HEAD — so every
    "scary" command becomes a safe, predictable pointer move.

    Two antipatterns to retire on sight:

    | Antipattern | What it looks like |
    |---|---|
    | **Blind-testing** | Typing random `add/commit/push/pull` permutations until errors stop |
    | **Burning down the repo** | Deleting the folder, copying files out, re-cloning, force-pushing |

    Both come from an inaccurate mental model. Each step fixes one piece.

    ### Prerequisite self-check

    Answer from memory. Any shaky? Revisit the basic tutorial.

    1. New file is red in `git status`. State name? Command to green?
    2. After a commit + one more edit, what does bare `git diff` compare?
    3. `main` and `feature` have diverged. Can `merge feature` fast-forward?
    4. Teammate pushed a buggy commit to shared `main`. `reset --hard + force-push`, or `revert`?
    5. Staged a `.env` with secrets. Does adding to `.gitignore` now help?

    <details markdown="1"><summary>Expected answers</summary>

    1. **Untracked** → `git add` stages it.
    2. **Working tree vs. index.** Index matches HEAD (nothing staged), so you see unstaged edits.
    3. **No** — diverged branches need a merge commit with two parents.
    4. **`git revert`.** Additive; doesn't break teammates' clones.
    5. **No.** `.gitignore` only blocks *future* tracking. Use `git rm --cached` + rotate the secret.

    </details>

    ### Task 1: Prove a branch is a 41-byte pointer

    **Predict first:** what's in `.git/refs/heads/main`? A commit list? A snapshot?

    ```bash
    cd /tutorial/myproject
    cat .git/refs/heads/main
    cat .git/refs/heads/feature-divide
    cat .git/HEAD
    ```

    Each branch file is **one line** — a commit SHA. `HEAD` is
    `ref: refs/heads/main` — a pointer to a pointer.

    ```gitgraph
    @startuml
    branch main:
      A "Initial commit"
      B "Add add function"
    head main
    @enduml
    ```

    That indirection lets `commit` advance the branch pointer while `HEAD`
    auto-follows — no HEAD rewrite needed.

    ### Task 2: Detach HEAD and feel the difference

    ```bash
    git switch --detach HEAD~1
    cat .git/HEAD        # now a raw 40-char SHA, not a ref
    ```

    **Detached HEAD** = HEAD pinned to a commit, not a branch. Watch the
    graph: HEAD floats on the commit node itself.

    > **Museum-archive analogy.** You can read any document, but notes
    > left without a label have nowhere to go when you leave.
    > `git switch -c <name>` is that label.

    Any commit you make here is anchored to nothing. `git switch`ing away
    orphans it. The next step shows how to rescue orphans.

    ### Cleanup

    ```bash
    git switch main
    ```

    ### ✍️ Before moving on (30-second self-test)

    Without scrolling up, answer:

    1. How many bytes is a branch?
    2. What's the *physical* difference between attached and detached HEAD?

    Got both? You've internalized the schema this whole tutorial rests on.
  solution:
    commands:
    - cd /tutorial/myproject
    - git switch --detach HEAD~1
    - git switch main
    explanation: |
      - **Branch = 41-byte pointer file:** `.git/refs/heads/main` literally contains one line — the commit SHA. No file copies, no timeline duplication. Creating a branch is a single `fwrite()`.
      - **HEAD = symbolic reference:** `.git/HEAD` contains `ref: refs/heads/main`, not the commit SHA directly. That indirection lets `git commit` update the branch pointer while `HEAD` follows automatically.
      - **Detached HEAD:** `HEAD` holds a raw SHA rather than a ref. Any commits made here are reachable only from `HEAD` — once you move `HEAD`, they are orphaned. The rescue tool (`git reflog`) is the subject of the next step.
  tests:
  - description: myproject is a Git repository
    command: '[ -d /tutorial/myproject/.git ]'
    hints:
    - text: '`/tutorial/myproject/.git` is missing — something went wrong with setup. Re-run the step to rebuild the starter repo.'
  - description: feature-divide branch exists
    command: cd /tutorial/myproject && git branch | grep -q 'feature-divide'
    hints:
    - text: 'No `feature-divide` branch. From main, run `git switch -c feature-divide` (or branch + switch separately). `git branch` lists what you have.'
  - description: Currently on main branch (not detached)
    command: cd /tutorial/myproject && git symbolic-ref -q HEAD | grep -q 'refs/heads/main'
    hints:
    - text: 'HEAD is detached or on another branch. `git switch main` re-attaches.'
  quiz:
    title: Branch Internals & Detached HEAD — Knowledge Check
    min_score: 0.8
    shuffle: true
    questions:
    - question: What is a Git branch, physically speaking?
      options:
      - A full copy of all project files stored separately
      - A 41-byte text file in `.git/refs/heads/` containing one commit SHA
      - A separate network connection to a remote server
      - A compressed archive of your working directory
      correct_index: 1
      option_feedback:
        0: This answer treats a branch like a folder copy — branch creation never duplicates files; only one ref file is written.
        2: This answer confuses a branch with a remote; branches are local refs in `.git/refs/heads/`, not network connections.
        3: This answer treats a branch like a backup archive rather than a single-line pointer file.
      explanation: A branch is just a tiny file holding a 40-character SHA. That is why `git switch -c new-branch` is instantaneous — Git does not copy files, it writes one line of text.
    - question: Which statements about **Detached HEAD** state are true? (Select all that apply)
      type: multiple
      options:
      - '`HEAD` points directly to a commit hash instead of a branch name'
      - Any commit you make in detached HEAD is automatically saved to the nearest branch
      - Commits made here are orphaned unless you anchor them with a branch before leaving
      - '`.git/HEAD` contains a 40-char SHA rather than a line like `ref: refs/heads/main`'
      correct_indices:
      - 0
      - 2
      - 3
      option_feedback:
        1: This answer assumes Git auto-anchors detached-HEAD commits to a branch — it doesn't, which is the whole reason orphans happen.
      explanation: Detached HEAD stores a raw SHA in `.git/HEAD`. No branch tracks commits made here. Before leaving, create a branch (`git switch -c rescue`) — otherwise the commits become orphaned and the next step's reflog is your recovery path.
    - question: Why can `HEAD` point to a branch name rather than a commit SHA?
      options:
      - Branch names are shorter and easier to type
      - Symbolic refs let `git commit` update the branch pointer and `HEAD` automatically stays current through indirection
      - Git requires it for compatibility with GitHub
      - It prevents you from committing on the wrong branch
      correct_index: 1
      option_feedback:
        0: This answer mistakes ergonomics for mechanism — the indirection exists so commits can update the branch ref without rewriting HEAD.
        2: This answer assumes a remote constraint drives a local design decision; symbolic refs predate any hosting service.
        3: This answer treats indirection as a safety feature; it's actually a mechanism for cheap commits, not a guard rail.
      explanation: The pointer chain is `HEAD → refs/heads/branch → commit`. A commit only needs to rewrite the branch file — HEAD dereferences through it. This indirection is the engineering reason branches are cheap.
    - question: You want to inspect a commit from last week without risking any accidental edits. Which is the safest approach?
      options:
      - '`git switch --detach <old-sha>` — look around; return to main with `git switch main`'
      - '`git reset --hard <old-sha>` — rewinds your current branch to that point'
      - '`git checkout <old-sha> .` — overwrite files in working directory'
      - '`rm -rf .git && git clone <old-sha>` — start fresh'
      correct_index: 0
      option_feedback:
        1: This answer confuses inspection with rewinding — `reset --hard` mutates the current branch's pointer, the opposite of read-only inspection.
        2: This answer overwrites working-tree files without moving HEAD; not destructive to history but stomps your editor state.
        3: This answer is the "burning down the repo" antipattern — far more destructive than the read-only detached HEAD it replaces.
      explanation: '`git switch --detach` enters read-only-feeling detached HEAD at any commit. You can look around freely; `git switch main` returns you unchanged. `git reset --hard` would rewrite your current branch — destructive. `git checkout <sha> .` overwrites files without moving HEAD.'
    - question: Put in order the steps to safely inspect an old commit and return to normal operation.
      type: parsons
      display: block
      lines:
      - 'git log --oneline main         # find the old commit SHA'
      - 'git switch --detach <old-sha>  # enter detached HEAD at it'
      - 'cat calculator.py              # look around, read freely'
      - 'git switch main                # return; no changes made'
      distractors:
      - 'git reset --hard <old-sha>     # DANGER: rewinds main'
      - 'git checkout <old-sha> .       # DANGER: overwrites working dir'
      - 'git branch -f main <old-sha>   # DANGER: moves branch pointer'
      explanation: Detached HEAD is the safe inspection mode — HEAD anchored to the commit, no branch pointer moved. The distractors all *modify* state (main's pointer, working directory), which is the opposite of inspection.
- title: "Rescuing Lost Work with git reflog"
  view: git_graph
  instructions: |
    ### 🎯 You will learn to
    - **Recover** commits lost to bad rebases, hard resets, and detached-HEAD orphans.
    - **Tell** what `git log --all` can see from what `git reflog` can see.
    - **Know reflog's limits** — it's local, and disappears with the clone.

    ### 🤔 Predict first

    You make an experimental commit in detached HEAD, then `git switch main`
    away without creating a branch. Can `git log --all` find that commit?
    Can anything?

    ### `log --all` vs `reflog` — the load-bearing distinction

    | Question | `git log --all` | `git reflog` |
    |---|---|---|
    | Walks | Commits reachable from refs | Every position HEAD occupied |
    | Sees orphans? | No (unreachable = invisible) | Yes (reachability irrelevant) |
    | Shared across clones? | Yes | **No — local only** |

    ### Task 1: Deliberately lose work

    ```bash
    cd /tutorial/myproject
    git switch --detach HEAD
    echo "# experimental note" >> calculator.py
    git add calculator.py && git commit -m "Experimental: add note in detached HEAD"
    git switch main
    git log --all --oneline      # the Experimental commit is GONE from this view
    ```

    It's orphaned — no ref reaches it, so `log --all` walks right past.

    ### Task 2: Find the orphan

    ```bash
    git reflog
    ```

    Each line: `<sha>  HEAD@{n}: <action>: <description>`.

    | Expression | Meaning |
    |---|---|
    | `HEAD@{0}` | where HEAD is now |
    | `HEAD@{1}` | where HEAD was one move ago |
    | `HEAD@{n}` | n moves ago |

    The detached-HEAD commit is at `HEAD@{1}`.

    ### Task 3: Anchor it with a branch

    ```bash
    git branch rescued-work HEAD@{1}
    git log rescued-work --oneline
    ```

    **The universal recipe:** `git reflog` → note the SHA or `HEAD@{n}` →
    `git branch <name> <sha>` anchors it as reachable. Works for dropped
    commits after interactive rebase, botched resets, failed rebases —
    any "lost" commit that's still in `.git/objects`.
  setup_commands:
  - cd /tutorial/myproject
  - git switch -q main 2>/dev/null; true
  - git branch -D rescued-work 2>/dev/null; true
  solution:
    commands:
    - cd /tutorial/myproject
    - 'git show-ref --verify --quiet refs/heads/rescued-work || (git switch --detach HEAD && echo ''# experimental note'' >> calculator.py && git add calculator.py && git commit -m ''Experimental: add note in detached HEAD'' && git switch main)'
    - 'git show-ref --verify --quiet refs/heads/rescued-work || (EXP_SHA=$(git reflog | grep -m1 ''Experimental: add note'' | awk ''{print $1}'') && git branch rescued-work $EXP_SHA)'
    explanation: |
      - **`git log --all` vs `git reflog`:** the former walks the commit graph from every ref; the latter keeps a local diary of every HEAD position. Only reflog sees orphans.
      - **Reflog recovery recipe:** `git reflog` → copy the target SHA or use `HEAD@{n}` → `git branch <name> <sha>` anchors the orphan as a reachable commit.
      - **`HEAD@{n}` syntax:** "where HEAD was n movements ago." Works anywhere Git expects a commit ref — no SHA copy-pasting needed.
      - **Local only:** reflog lives in `.git/logs/HEAD`. Destroying a clone destroys its reflog. Unpublished work is only protected by backups, not by Git itself.
  tests:
  - description: Currently on main branch (not detached)
    command: cd /tutorial/myproject && git symbolic-ref -q HEAD | grep -q 'refs/heads/main'
    hints:
    - text: 'Still detached after the rescue? `git switch main` re-attaches. The rescued-work branch you anchored stays put.'
  - description: rescued-work branch exists and points to an experimental commit (proves reflog rescue)
    command: cd /tutorial/myproject && git log rescued-work --oneline 2>/dev/null | grep -qi 'experimental'
    hints:
    - text: 'The recipe: (1) make an orphan commit in detached HEAD and switch away, (2) `git reflog` to find its SHA, (3) `git branch rescued-work <sha>` to anchor it. `HEAD@{1}` works as a shortcut for the SHA.'
  quiz:
    title: git reflog — Knowledge Check
    min_score: 0.8
    shuffle: true
    questions:
    - question: You made three commits in detached HEAD state, then ran `git switch main` without creating a branch. A teammate asks if the commits are lost. What do you tell them?
      options:
      - Yes, they are permanently gone — detached HEAD commits are deleted by `git switch`
      - They are currently orphaned but still in the object database; `git reflog` can find their SHA, and `git branch rescue <sha>` makes them reachable again
      - Git automatically migrated them to the `main` branch when we switched
      - They are stored in a hidden recovery folder we can copy from
      correct_index: 1
      option_feedback:
        0: This answer assumes `git switch` deletes data — it only moves HEAD; the commit objects stay in `.git/objects/` until `git gc` decides to prune them.
        2: This answer assumes Git auto-attaches detached commits to a branch on switch — it doesn't, which is exactly why we need the rescue.
        3: This answer invents a recovery folder that doesn't exist; orphans live in the same `.git/objects/` as every other commit.
      explanation: Orphaned commits remain in `.git/objects/` until `git gc` prunes them. `git reflog` shows every position HEAD has been at, including the orphaned one. `git branch rescue <sha>` rescues the work.
    - question: In one sentence, why can `git reflog` show commits that `git log --all` cannot?
      options:
      - '`git log --all` walks only reachable commits from refs (branches, tags); an orphan is reachable from no ref. `git reflog` logs every HEAD position regardless of reachability, so it remembers SHAs even after all references to them are gone.'
      - '`git reflog` is a newer, more powerful version of `git log`'
      - '`git log --all` is broken by default'
      - '`git reflog` reads from the remote server; `git log` only from local'
      correct_index: 0
      option_feedback:
        1: This answer treats reflog as "log v2" — they're different tools answering different questions (graph traversal vs. HEAD-position diary).
        2: This answer assumes a default tool is broken; both work correctly, they differ only in *what* they walk.
        3: This answer confuses reflog with remote history; reflog is purely local, while `log --all` walks any ref including remote-tracking ones.
      explanation: This is the load-bearing distinction. `git log --all` is a graph traversal starting at refs; an unreachable commit is invisible to it. `git reflog` is a literal diary of HEAD positions — reachability is irrelevant. Internalize this or later destructive commands will feel unpredictable.
    - question: What does `HEAD@{2}` mean?
      options:
      - The second commit on the current branch
      - Where `HEAD` was **two movements ago** in the reflog — usable anywhere Git expects a commit ref
      - The second parent of HEAD (like `HEAD^2`)
      - A tag named `HEAD@{2}`
      correct_index: 1
      option_feedback:
        0: This answer confuses `HEAD@{2}` (a reflog position) with `HEAD~2` (a parent walk along commit history).
        2: This answer confuses `HEAD@{2}` with `HEAD^2` — three similar-looking suffixes (`~`, `^`, `@{}`) all mean different things.
        3: This answer treats `@{n}` as part of a name rather than reflog syntax.
      explanation: '`HEAD@{n}` is reflog syntax — n movements back in the HEAD-position log. Different from `HEAD~n` (n commits back along first-parent chain) and `HEAD^n` (nth parent of HEAD). Three similar-looking but semantically different suffixes — get them wrong and you will end up at a different commit than you intended.'
    - question: Reflog is **local only**. Which of these destroys your reflog and the rescue path with it? (Select all that apply)
      type: multiple
      options:
      - '`rm -rf .git` (or deleting the whole clone directory)'
      - A fresh `git clone` of the same repo from the remote
      - '`git push --force` to a remote'
      - Default reflog expiry once the configured retention window passes without activity
      correct_indices:
      - 0
      - 1
      - 3
      option_feedback:
        2: This answer confuses remote history with local reflog; force-pushing rewrites the *remote* branch but leaves your local `.git/logs/` (and its rescue path) untouched.
      explanation: Reflog lives in `.git/logs/`. Destroying `.git/` (option 1) takes the reflog with it. A fresh clone (option 2) starts with an empty reflog of *that* clone. Expiry (option 4) is configurable via `gc.reflogExpire`. A force-push (option 3) rewrites the remote's *branch* but doesn't touch your local reflog — your local rescue path is still intact.
    - question: Put these steps in the correct order to rescue an orphaned commit you just made in detached HEAD.
      type: parsons
      display: block
      lines:
      - 'git switch main      # leave detached HEAD'
      - 'git reflog          # find the SHA of the orphaned commit'
      - 'git branch rescued-work HEAD@{1}      # anchor it with a branch'
      - 'git log rescued-work --oneline        # verify it is reachable again'
      distractors:
      - 'git log --all --oneline     # would NOT show the orphan'
      - 'git checkout <orphan-sha>   # needs the SHA you just lost'
      - 'git push origin rescued-work'
      explanation: The canonical rescue recipe. Distractor 1 would fail silently — `log --all` cannot see orphans. Distractor 2 needs the SHA, which was lost when the terminal scrolled. Distractor 3 is a separate sharing concern — irrelevant to rescue.
    - question: '**[Revisit Step 3 — preview]** In the next step you will see that commits are content-addressable and immutable. Given that, what does `git branch rescue <orphan-sha>` actually do to the commit object?'
      options:
      - It copies the commit into a new location
      - It does **nothing** to the commit object — it only writes a 41-byte file (`.git/refs/heads/rescue`) containing the SHA. The commit itself never moves; it just becomes reachable again via the new ref
      - It rewrites the commit's SHA so it becomes reachable
      - It restores the commit from a backup
      correct_index: 1
      option_feedback:
        0: This answer treats `git branch` as a copy operation; it only writes a 41-byte ref file — the commit object itself never moves.
        2: This answer assumes Git mutates commits to make them reachable; SHAs are content-addressable and immutable, so any rewrite would be a *different* commit.
        3: This answer invents a backup mechanism; the commit was never deleted, only unreferenced.
      explanation: Same mechanic you learned in the previous step. Creating a branch is one `fwrite()` of 41 bytes. Rescue doesn't move commits; it makes them reachable. This is why rescue is instantaneous regardless of commit size — a concept the next step formalizes as Git's object model.
- title: Relative Commit Addresses & Git's Object Database
  view: git_graph
  instructions: |
    ### 🎯 You will learn to
    - **Name any commit without a SHA** using `HEAD~n`, `BRANCH^`, and `rev-parse`.
    - **Prove Git's history model is snapshot-based** — commits point to trees that point to blobs holding full file bytes — by hashing content directly.
    - **Predict** that a single trailing space changes the entire SHA chain — and say why that matters for `blame` later.

    ### 🚪 This is the threshold step

    Step 3 is the conceptual hinge of the whole tutorial. Every later
    step (rebase, cherry-pick, bisect, submodules) becomes obvious *or*
    mysterious depending on whether the object model clicks here.

    If it doesn't click on the first read, that's expected — threshold
    concepts (Meyer & Land) are *transformative* (they reframe the whole
    domain) and *troublesome* (they resist quick mastery). Re-read,
    re-run the hashing experiment, sleep on it. Most learners need two
    passes. The recall prompt at the bottom is your self-check.

    ### Relative references

    | Expression | Meaning |
    |---|---|
    | `HEAD~n` | n commits back along first-parent chain |
    | `BRANCH^` | shorthand for `BRANCH~1` |
    | `BRANCH^2` | **second** parent of a merge commit |

    ```gitgraph
    @startuml
    branch main:
      A "Oldest commit"
      B "main~2"
      C "HEAD~1"
      D "HEAD / main"
    head main
    @enduml
    ```

    ### Task 1: Practice

    ```bash
    cd /tutorial/myproject
    git rev-parse HEAD        # current SHA
    git rev-parse HEAD~1      # parent
    git rev-parse main        # same as HEAD
    ```

    ### Task 2: Prove content-addressability

    Every object in `.git/objects/` is **addressed by the SHA-1 of its
    content**. Three object kinds:

    | Object | Stores |
    |---|---|
    | **blob** | Raw file bytes (no filename) |
    | **tree** | Directory: filename → blob/tree SHA |
    | **commit** | Tree SHA + parent SHAs + author + message |

    Hash the same bytes in two unrelated repos:

    ```bash
    echo "hello world" | git hash-object --stdin
    cd /tmp && git init -q bob-repo && cd bob-repo
    echo "hello world" | git hash-object --stdin
    cd /tutorial/myproject
    ```

    **Identical 40-char SHA.** Same bytes → same hash, always, everywhere.
    That's why Git deduplicates across branches and history for free.

    ### Task 3: Byte-exact means byte-exact

    **Predict:** hashing `"hello world "` with one trailing space — same SHA?

    ```bash
    printf 'hello world \n' | git hash-object --stdin
    ```

    **Different.** One whitespace byte → new blob SHA → new tree SHA →
    new commit SHA. That's why reformatter commits (Step 6) mask real
    authorship: every whitespace tweak rewrites the entire hash chain.

    ### ✍️ Before moving on (the unifying invariant)

    Close this and answer from memory:

    > *"What's the one property of existing commit objects that lets every later step in this tutorial work?"*

    <details markdown="1"><summary>The invariant (peek only after attempting)</summary>

    **Existing commit objects are immutable.** Git changes history by
    creating new objects and/or moving references — never by editing old
    commits in place.

    Every Git command falls into one of these operation categories:

    | Operation type | Examples | What changes |
    |---|---|---|
    | **Create immutable objects** | `hash-object`, `commit`, `stash`, `cherry-pick`, `revert` | New blob / tree / commit objects |
    | **Move refs** | `branch`, `reset`, fast-forward `merge`, finalizing a successful `rebase` | Branch / ref points to a different commit |
    | **Update index** | `add`, conflicted-resolution staging, `merge --squash` | Staging area changes |
    | **Update working tree** | `switch`, `restore`, `checkout`, `stash pop`, `submodule update` | Files on disk change |
    | **Transfer objects/refs** | `fetch`, `push`, `pull` | Local/remote object/ref sets change |

    Most everyday commands combine categories (e.g., `commit` creates a
    commit object **and** moves a branch ref **and** clears the index).
    The point isn't that operations are pure — it's that *no operation
    rewrites existing commit objects*. Whenever a later step feels
    confusing, ask: *what objects is this creating? what refs is it
    moving? what's still in `.git/objects` that I could recover?*

    </details>
  setup_commands:
  - cd /tutorial/myproject && git switch main 2>/dev/null; true
  solution:
    commands:
    - cd /tutorial/myproject
    explanation: |
      - **`HEAD~n`:** n commits back along the first-parent chain. `HEAD~0` is HEAD itself, `HEAD~1` is its parent, `HEAD~2` its grandparent. `HEAD^` is equivalent to `HEAD~1`. For a merge commit, `HEAD^2` accesses the *second* parent (the merged-in branch tip).
      - **`git rev-parse`:** Converts any ref (relative, symbolic, short SHA) into a full 40-character SHA. Plumbing-level tool used internally by nearly every porcelain command.
      - **`git hash-object`:** Computes the SHA Git would assign to content. Feeding the same bytes always produces the same hash — that is what makes Git content-addressable.
      - **Why it matters:** Every advanced command later (rebase, cherry-pick, bisect) is just moving ref pointers across this immutable object graph. Once you see commits as *hashed snapshots*, not *edits*, nothing in Git is mysterious.
  tests:
  - description: On main branch with calculator.py
    command: cd /tutorial/myproject && git symbolic-ref -q HEAD | grep -q 'refs/heads/main' && [ -f calculator.py ]
    hints:
    - text: 'Not on main, or `calculator.py` went missing. `git switch main`; if the file is gone, restore it from the last commit: `git restore calculator.py`.'
  - description: You can resolve HEAD~1 (at least 2 commits on main)
    command: cd /tutorial/myproject && git rev-parse --quiet --verify HEAD~1 >/dev/null
    hints:
    - text: 'Only one commit on main, so `HEAD~1` resolves to nothing. Make a small second commit (touch any file, `git add && git commit`) and retry.'
  quiz:
    title: Relative Addresses & Object Database — Knowledge Check
    min_score: 0.8
    shuffle: true
    questions:
    - question: You want the commit **two before** `main`. Which reference is correct?
      options:
      - '`main^2`'
      - '`main~2`'
      - '`main-2`'
      - '`main..2`'
      correct_index: 1
      option_feedback:
        0: This answer confuses `^2` (the second parent of a merge) with `~2` (two commits back along the first-parent chain).
        2: This answer invents a syntax — Git uses `~` and `^`, never `-` for relative addressing.
        3: This answer confuses `..` (a range expression) with single-commit addressing.
      explanation: '`main~2` walks back 2 commits along the first-parent chain. `main^2` means the *second parent* of a merge commit — completely different. `main-2` and `main..2` are not valid syntax.'
    - question: What does `git hash-object` do?
      options:
      - Uploads the file to GitHub
      - Computes the SHA-1 Git would assign to the content — letting you prove that identical content always produces the same hash
      - Encrypts the file with a cryptographic hash
      - Compresses the file for storage
      correct_index: 1
      option_feedback:
        0: This answer confuses a local plumbing command with a network operation; `hash-object` never touches a remote.
        2: This answer confuses cryptographic hashing (one-way fingerprint) with encryption (reversible).
        3: This answer confuses content hashing (identity) with compression (size reduction).
      explanation: '`git hash-object` is the low-level plumbing that every commit uses internally. Because identical content always yields the same SHA, Git deduplicates identical files across the entire history for free.'
    - question: Which statements about Git objects are true? (Select all that apply)
      type: multiple
      options:
      - A commit object stores a reference to a tree, not the files themselves
      - A blob stores file content without the filename
      - Trees map filenames to blob or sub-tree SHAs
      - Git stores file differences (deltas) between commits, not full snapshots
      correct_indices:
      - 0
      - 1
      - 2
      option_feedback:
        3: This answer confuses Git's snapshot-based history *model* with its later pack-file *storage* layer; delta compression is a storage optimization, not the model.
      explanation: 'Git''s **history model is snapshot-based**: each commit points to a tree, which points to blobs holding full file content. Storage may later be packed and delta-compressed (`git gc` produces pack files using delta encoding) without changing the model — the abstraction commits expose is always whole snapshots. Filenames live in tree objects, not in blobs, so two files with identical content share one blob.'
    - question: '**[Revisit Step 1]** You are in detached HEAD at a commit that is 4 back from `main`. Which command prints that SHA without copying it from `git log`?'
      options:
      - '`git rev-parse main~4`'
      - '`git log main --limit 4`'
      - '`git checkout main~4`'
      - '`git show main~4`'
      correct_index: 0
      option_feedback:
        1: This answer invents a flag — `git log` uses `-n` or `--max-count`, not `--limit`.
        2: This answer moves HEAD instead of just printing the SHA; the prompt asked for the SHA without checkout.
        3: This answer prints the full commit diff; `git show` is overkill when you only need the resolved SHA.
      explanation: '`git rev-parse` is the universal ''ref → SHA'' translator. It accepts relative (`main~4`), symbolic (`main`), short (`a73f`), or branch/tag references. `git show` displays the full commit diff, not just the SHA. `git log --limit` is not valid syntax.'
    - question: Why does `git branch feature` complete in milliseconds even on a 10-GB repo?
      options:
      - Git compresses the whole working directory in parallel
      - It just writes one 41-byte file (`.git/refs/heads/feature`) containing the current commit SHA — no files are copied
      - Branches are stored on the remote server, not locally
      - Git skips adding the branch until you commit to it
      correct_index: 1
      option_feedback:
        0: This answer assumes branch creation involves heavyweight work; it's just a `fwrite()` of 41 bytes — no traversal, no compression.
        2: This answer confuses local branches with remote refs; local branch creation is purely local and offline-capable.
        3: This answer assumes lazy initialization; the branch is created and ready immediately, no commit required.
      explanation: A branch creation is a single `fwrite()` of 41 bytes. No copying, no traversal, no network. Once you see branches as tiny pointer files, their speed and cheapness stops being mysterious.
    - question: '**[Revisit Steps 1-2]** You enter detached HEAD at an old commit, make one exploratory commit, and switch away without creating a branch. In terms of Git objects, what happens to that commit?'
      options:
      - Git deletes the commit object immediately
      - The commit object still exists in `.git/objects` but is unreachable from any ref, so `git gc` will eventually prune it
      - The commit is moved into the `.git/orphans` directory
      - The commit is converted into a blob
      correct_index: 1
      option_feedback:
        0: This answer assumes Git is eager about cleanup; objects survive until `git gc` decides to prune unreachable ones.
        2: This answer invents a `.git/orphans` directory; orphans live in the same `.git/objects/` as everything else.
        3: This answer assumes Git mutates the object type; commits stay commits, they just lose their refs.
      explanation: 'Objects in Git live until garbage collection. An orphaned commit is not ''deleted'' — it is just unreachable from any ref. `git reflog` still records HEAD''s path through it, which is how `git branch rescue <sha>` can rescue it. This links Step 2''s reflog safety net to Step 3''s object-model view: unreachable ≠ deleted.'
    - question: Put in order the commands that prove Git is content-addressable (same bytes → same SHA, across unrelated repos).
      type: parsons
      display: block
      lines:
      - 'echo "hello world" | git hash-object --stdin         # in your main repo'
      - '# note the 40-char SHA — call it SHA-A'
      - 'cd /tmp && git init -q other && cd other             # fresh unrelated repo'
      - 'echo "hello world" | git hash-object --stdin         # same bytes'
      - '# output is IDENTICAL — call it SHA-B; SHA-A == SHA-B'
      distractors:
      - 'git push origin main          # sharing has nothing to do with hashing'
      - 'git config user.email alice   # author metadata is in commits, not blobs'
      - 'git commit -m "hello"         # commit SHA includes parent/time; not the demo'
      explanation: Content-addressability is a property of *bytes hashed*, independent of repo, branch, or user. Distractor 1 (push) is irrelevant — hashes are local. Distractor 2 (email) affects commit objects but not blob hashes. Distractor 3 (commit) creates a commit object whose SHA depends on parent + time + author — not the cleanest demo of blob deduplication.
- title: Saving Work Temporarily with git stash
  view: git_graph
  instructions: |
    ### 🎯 You will learn to
    - **Context-switch cleanly** mid-feature without polluting history with WIP commits.
    - **Pick** `pop` vs. `apply` correctly.
    - **Diagnose** the classic "stash missed my new file" footgun.

    ### Scenario

    You're mid-feature when your lead yells **"hotfix on main, now!"**
    Your options without stash are all bad: WIP commit (pollutes history),
    `git restore` (destroys work), or stay put (can't isolate the fix).

    `git stash` is the escape hatch.

    ### 🤔 Predict first

    After `git stash`, where does your in-progress work end up — in the
    index, in the working tree, in a private commit, or deleted? And what
    will `git status` say about your working tree?

    ### Task 1: See the dirty tree

    A half-finished `power` function is already sitting in `calculator.py`:

    ```python
    def power(a, b):
        # TODO: add input validation
        return a ** b
    ```

    ```bash
    cd /tutorial/myproject
    git status
    git diff
    ```

    ### Task 2: Stash it

    ```bash
    git stash
    git status           # clean!
    git stash list       # your WIP is here
    ```

    <details markdown="1"><summary>💡 How stash works internally (Step 3 callback)</summary>

    A stash is a merge commit at `refs/stash` — first parent is HEAD at stash
    time, second parent records the index (and a third parent records untracked
    files when you use `-u`). Same object model as every other commit, which is
    why `git stash apply <sha>` works on any historical stash.

    </details>

    ### Task 3: Do the hotfix on a dedicated branch

    ```bash
    git switch -c hotfix-divide-zero
    ```

    In the editor, append to `calculator.py`:

    ```python
    def safe_divide(a, b):
        """Divide a by b, raising ValueError on zero denominator."""
        if b == 0:
            raise ValueError("Cannot divide by zero")
        return a / b
    ```

    ```bash
    git add calculator.py
    git commit -m "Hotfix: add safe_divide to prevent zero-division errors"
    git switch main
    git merge hotfix-divide-zero --no-edit
    git branch -d hotfix-divide-zero
    ```

    ### Task 4: Restore your WIP

    ```bash
    git stash pop
    git stash list       # empty — pop removed it
    ```

    `pop` = apply + drop. Use `apply` instead if you want to keep the stash
    (e.g. to apply it on multiple branches).

    <details markdown="1"><summary>📋 Full stash cheat sheet (other flags)</summary>

    | Command | Effect |
    |---|---|
    | `git stash` | Save tracked mods + staged; clean tree |
    | `git stash pop` | Restore **and drop** the top stash |
    | `git stash apply` | Restore but **keep** the stash |
    | `git stash drop` | Delete without applying |
    | `git stash push -m "msg"` | Save with a message |
    | `git stash -u` | Also include **untracked** files |

    **Gotcha:** plain `git stash` skips untracked (never-`add`-ed) files. Use
    `-u` to include them — the most common stash footgun.

    </details>

    ### Task 5: Finish the feature

    Edit `calculator.py` so `power` has real validation, then commit
    (message must include "power"):

    ```python
    def power(a, b):
        """Return a raised to the power of b."""
        if not isinstance(a, (int, float)) or not isinstance(b, (int, float)):
            raise TypeError("Arguments must be numbers")
        return a ** b
    ```
  watch_files:
  - myproject/calculator.py
  open_file: myproject/calculator.py
  setup_commands:
  - "cd /tutorial/myproject\ngit switch -q main 2>/dev/null\n! git stash list 2>/dev/null | grep -q . && grep -q 'def power' calculator.py && exit 0\ngit stash clear -q 2>/dev/null\nif ! grep -q 'def power' calculator.py; then\n  printf '\\ndef power(a, b):\\n    # TODO: add input validation\\n    return a ** b\\n' >> calculator.py\nfi\n"
  solution:
    files:
    - path: myproject/calculator.py
      content: "\"\"\"A simple calculator module.\"\"\"\ndef add(a, b): return a + b\n\ndef divide(a, b): return a / b\n\ndef safe_divide(a, b):\n    \"\"\"Divide a by b, raising ValueError on zero denominator.\"\"\"\n    if b == 0:\n        raise ValueError(\"Cannot divide by zero\")\n    return a / b\n\ndef power(a, b):\n    \"\"\"Return a raised to the power of b.\"\"\"\n    if not isinstance(a, (int, float)) or not isinstance(b, (int, float)):\n        raise TypeError(\"Arguments must be numbers\")\n    return a ** b\n"
      language: python
    commands:
    # The interactive instructions above teach the stash → hotfix → pop dance.
    # The automated solution below rebuilds the same end state deterministically:
    # the harness applies solution.files BEFORE these commands, so a literal
    # stash/pop sequence collides on conflicting end-of-file diffs (the manual
    # student flow doesn't see this because the student edits the file inline
    # instead of having it pre-set to final state).
    - cd /tutorial/myproject && git switch main
    - git reset --hard HEAD
    - git clean -fdq
    - while git stash list 2>/dev/null | grep -q .; do git stash drop -q 2>/dev/null || break; done
    - (git branch -D hotfix-divide-zero 2>/dev/null; true) && git switch -c hotfix-divide-zero
    - printf '\ndef safe_divide(a, b):\n    """Divide a by b, raising ValueError on zero denominator."""\n    if b == 0:\n        raise ValueError("Cannot divide by zero")\n    return a / b\n' >> calculator.py
    - "git add calculator.py && git commit -m 'Hotfix: add safe_divide to prevent zero-division errors'"
    - git switch main && git merge hotfix-divide-zero --no-edit
    - git branch -D hotfix-divide-zero 2>/dev/null; true
    - printf '\ndef power(a, b):\n    """Return a raised to the power of b."""\n    if not isinstance(a, (int, float)) or not isinstance(b, (int, float)):\n        raise TypeError("Arguments must be numbers")\n    return a ** b\n' >> calculator.py
    - git add calculator.py && git commit -m 'Add power function with input validation'
    explanation: |
      - **`git stash`:** snapshots tracked modifications and staged changes into a stash commit in `.git/refs/stash`, then resets the working tree to match HEAD. Untracked files are **not** included unless you use `git stash -u`.
      - **`git stash pop`:** applies the top stash and removes it. Conflicts surface exactly like merge conflicts — resolve them, then `git add` and commit (or drop the stash manually).
      - **Why not just `git commit -m "WIP"`?** A WIP commit pollutes shared history if pushed. The stash is *private, local, and temporary* — no risk of shipping half-baked work.
      - **Internal:** a stash is stored as a merge commit reachable via `refs/stash`. Its **first parent** is HEAD at stash time; its **second parent** is a commit recording the **index** state. With `git stash -u`, a **third parent** records the untracked files. This is why `git stash apply <sha>` works even on detached stashes.
  tests:
  - description: Stash is empty (work was popped and committed)
    command: cd /tutorial/myproject && [ $(git stash list | wc -l) -eq 0 ]
    hints:
    - text: '`git stash list` still shows entries. After popping your work and committing, there should be nothing left. `git stash drop` removes stale entries.'
  - description: calculator.py contains the safe_divide hotfix
    command: cd /tutorial/myproject && grep -q 'def safe_divide' calculator.py
    hints:
    - text: 'No `safe_divide` in `calculator.py`. The hotfix lives on `hotfix-divide-zero` — after `git switch main`, merge it in (`git merge hotfix-divide-zero`).'
      condition: 'code_missing: def safe_divide'
    - text: '`safe_divide` is in the file but the test still reports it missing. Did you save and switch back to `main`?'
      condition: 'code_contains: def safe_divide'
  - description: power function was committed AFTER the hotfix (verifies the stash → hotfix → pop → commit flow really happened)
    command: |
      cd /tutorial/myproject
      if ! git log --oneline | grep -qi 'power'; then
        echo "The 'power' commit is missing from main's history. After popping your stash, did you commit?"
        exit 1
      fi
      # Pickaxe each function to find the commit that introduced it.
      hotfix_sha=$(git log --oneline -S 'def safe_divide' 2>/dev/null | head -1 | awk '{print $1}')
      power_sha=$(git log --oneline -S 'def power' 2>/dev/null | head -1 | awk '{print $1}')
      if [ -z "$hotfix_sha" ]; then
        echo "Couldn't find a commit that introduced 'def safe_divide'. The hotfix should be a separate commit."
        exit 1
      fi
      if [ -z "$power_sha" ]; then
        echo "Couldn't find a commit that introduced 'def power'."
        exit 1
      fi
      if [ "$hotfix_sha" = "$power_sha" ]; then
        echo "safe_divide and power are in the SAME commit. The stash workflow requires the hotfix to be its own commit, then power separately."
        echo "Redo: stash your power work first, do the hotfix as its own commit, merge to main, pop the stash, then commit power on top."
        exit 1
      fi
      if ! git merge-base --is-ancestor "$hotfix_sha" "$power_sha"; then
        echo "The hotfix commit ($hotfix_sha) isn't an ancestor of the power commit ($power_sha). Expected order: hotfix (safe_divide) → power (HEAD)."
        exit 1
      fi
    hints:
    - text: 'No `power` in the file — pop your stash first: `git stash pop` brings it back.'
      condition: 'code_missing: def power'
    - text: '`power` is in the file but not committed. `git add calculator.py && git commit -m "Add power function"`.'
      condition: 'code_contains: def power'
    - text: 'safe_divide and power are in the SAME commit — that means you skipped the hotfix flow. Redo with the correct sequence: stash power, do the hotfix on its own branch, merge to main, pop the stash, then commit power.'
      condition: 'output_contains: SAME commit'
  - description: Working tree is clean
    command: cd /tutorial/myproject && git diff --quiet && git diff --cached --quiet
    hints:
    - text: 'Uncommitted changes remain. `git status` tells you what; commit or discard to finish the step.'
  quiz:
    title: git stash — Knowledge Check
    min_score: 0.8
    shuffle: true
    questions:
    - question: You are mid-edit on `app.py` when your lead asks for an urgent hotfix on `main`. You have NOT staged your changes yet. Which approach keeps your tree clean for the hotfix **without** losing your in-progress work?
      options:
      - '`git restore app.py` — discards the edits'
      - '`git commit -m ''WIP''` — commits the half-finished changes'
      - '`git stash` — saves modifications to a temporary holding area and cleans the tree'
      - '`git reset --hard` — resets everything so you can restart later'
      correct_index: 2
      option_feedback:
        0: This answer destroys the in-progress work the question wants to preserve.
        1: This answer pollutes shared history if pushed; the prompt asks to keep the tree clean *without* losing work.
        3: This answer wipes the in-progress changes entirely — the opposite of preserving them.
      explanation: '`git stash` is built for this: save tracked modifications and staged changes to a private stack, reset the tree, let you context-switch cleanly. Recovered with `git stash pop`.'
    - question: What does `git status` report immediately after `git stash`?
      options:
      - Your modified files appear staged and ready to commit
      - Your modified files appear untracked — Git has forgotten about them
      - '`nothing to commit, working tree clean`'
      - An error, because `git status` cannot be run after stashing
      correct_index: 2
      option_feedback:
        0: This answer confuses stash with staging — stash moves changes to a private commit at `refs/stash`, not the index.
        1: This answer assumes Git forgets the changes; they're safe in a stash commit, the working tree just matches HEAD.
        3: This answer assumes stash breaks `git status`; status works fine after stashing.
      explanation: '`git stash` resets the working tree to match HEAD — so `git status` reports clean. Your changes are safe in the stash commit at `refs/stash`.'
    - question: Difference between `git stash pop` and `git stash apply`?
      options:
      - '`pop` restores AND removes the stash entry; `apply` restores but keeps the entry'
      - '`pop` works only on the oldest entry; `apply` works on any entry'
      - '`apply` creates a new commit; `pop` does not'
      - They are identical
      correct_index: 0
      option_feedback:
        1: This answer reverses the constraint; both verbs work on any entry, the difference is whether the entry is removed afterward.
        2: This answer confuses applying a stash with creating a commit; neither pop nor apply produces a new commit.
        3: This answer ignores the actual difference (whether the entry survives or is dropped).
      explanation: Use `pop` for the usual workflow. Use `apply` when you want the same stash on multiple branches — the entry stays in the list until you manually `git stash drop`.
    - question: You ran `git stash` but your brand-new file `feature.py` (never `git add`-ed) is still there. Why?
      options:
      - The file is too large to stash
      - By default, `git stash` only stores tracked file changes; untracked files need `git stash -u`
      - '`git stash` needs a message for untracked files; use `git stash push -m`'
      - Git ignores files starting with `.`
      correct_index: 1
      option_feedback:
        0: This answer invents a size restriction — stash has no size limit; the issue is tracked vs. untracked.
        2: This answer confuses message annotation with the inclusion of untracked files; `-u` is the relevant flag, not `-m`.
        3: This answer confuses `.gitignore` rules with stash's tracked-files default; dot-files aren't ignored by default.
      explanation: Plain `git stash` only captures what Git is tracking — modified tracked files and staged changes. For brand-new files, use `git stash -u` (`--include-untracked`).
    - question: '**[Evaluate]** A teammate says: ''I never use stash — I just commit with `WIP` and squash later.'' Best evaluation?'
      options:
      - WIP is strictly better — stashes can be accidentally dropped
      - Equivalent — personal preference only
      - Both work; WIP pollutes shared history if pushed and requires disciplined squash, stash stays private/local. Mature teams have conventions for both
      - WIP is wrong — Git rejects commits with that message
      correct_index: 2
      option_feedback:
        0: This answer ignores the cost of WIP commits polluting shared history if pushed.
        1: This answer flattens a real distinction (private/local stash vs. potentially-pushed WIP commits) into mere preference.
        3: This answer assumes Git rejects messages — it doesn't; the practice is just discouraged, not blocked.
      explanation: Both preserve work. The difference is visibility. Pushed WIP commits enter shared history and degrade `git log`, `git bisect`, and code review. Stash is private — no pollution, but you can forget it. Neither is universally right.
    - question: '**[Revisit Step 1]** You stashed on `main`, then switched to a commit with `git switch --detach HEAD~2` to inspect old code. What is the safe way to recover the stash?'
      options:
      - Run `git stash pop` here — stash works in any HEAD state
      - Return to a named branch first (`git switch main`), then `git stash pop` — applying a stash in detached HEAD risks creating orphaned state if conflicts arise
      - The stash is lost — it was tied to `main`
      - Run `git stash apply detached` to redirect it
      correct_index: 1
      option_feedback:
        0: This answer ignores the conflict-on-pop risk in detached HEAD where there's no branch to anchor unresolved changes.
        2: This answer assumes stashes are tied to the branch where they were created; they aren't — `refs/stash` is independent.
        3: This answer invents a syntax — `git stash apply` takes a stash ref, not a branch state name.
      explanation: Stashes are not tied to a branch — but a conflicting pop in detached HEAD leaves you with unresolved changes and nothing anchoring them. Always return to a named branch before popping.
    - question: '**[Revisit Step 3]** Where does Git physically store a stash entry?'
      options:
      - As a plain text file in `.git/stash.txt`
      - As a single merge commit reachable via `refs/stash` (with `HEAD` and an index-state commit as its parents) — the same object model as any other commit
      - In RAM only; restarting the shell loses it
      - In the remote repository
      correct_index: 1
      option_feedback:
        0: This answer invents a `stash.txt` file; stash uses the regular Git object database, not a separate text store.
        2: This answer assumes stash is volatile; it survives reboots because it's a real commit anchored at `refs/stash`.
        3: This answer confuses local stash with remote sync; stash is local-only by design.
      explanation: A stash is a proper commit in the object database, anchored by `refs/stash`. This is why `git stash` survives across terminals and reboots, and why `git stash apply <sha>` works with any historical stash. Same object model as Step 3 — stash is not a special case.
    - question: Put in order the complete "stash → hotfix → resume" workflow from Task 3 of this step.
      type: parsons
      display: block
      lines:
      - 'git stash                       # save WIP, clean working tree'
      - 'git switch -c hotfix-xyz        # dedicated branch for the hotfix'
      - 'git commit -am "Hotfix: ..."    # fix + commit on the hotfix branch'
      - 'git switch main && git merge hotfix-xyz --no-edit'
      - 'git branch -d hotfix-xyz        # clean up the merged hotfix branch'
      - 'git stash pop                   # restore your WIP on main'
      distractors:
      - 'git commit -m "WIP"             # pollutes history if pushed'
      - 'git restore .                   # discards WIP permanently'
      - 'git stash drop                  # would throw away the WIP'
      - 'git push origin stash           # you cannot push a stash'
      explanation: The canonical context-switch sequence. Each distractor is a common novice mistake — committing WIP pollutes shared history; `git restore` destroys work; dropping the stash before popping loses it; stashes are local-only (no push). Learn this six-line sequence as a unit.
- title: 'Cherry-Pick: Copy One Specific Commit'
  view: git_graph
  instructions: |
    ### 🎯 You will learn to
    - **Pick** cherry-pick for one-commit backports; reject it for many-commit integration.
    - **Resolve** a cherry-pick conflict end-to-end (same marker dance as merge — different final verb).
    - **Explain** why the copied commit has a new SHA (apply Step 3's object model).

    ### Scenario

    Lead: *"The `absolute` helper on `experimental` is useful on `main` too.
    Bring that one commit over — leave the half-baked multiply behind."*

    ### 🤔 Predict first

    Cherry-pick produces a new commit with a new SHA. What happens to the
    **original** commit on `experimental` — does it move, get rewritten,
    vanish, or stay put unchanged?

    `cherry-pick <sha>` replays one commit's patch on top of HEAD as a
    **new commit** (new parent → new SHA, same message + diff).

    <div data-git-command-lab role="region" aria-label="Interactive commit-graph demo: cherry-pick copies a Fix-parse commit from a hotfix branch onto main as a new commit with a new SHA, leaving the original untouched.">
    <script type="application/json">
    {
      "command": "git cherry-pick hotfix-parse",
      "description": "A different scenario to reinforce the pattern: `hotfix-parse` has one critical `Fix parse` commit the team wants on `main` *without* dragging along the WIP `Try tokens` commit below it.\n\n`H'` lands on `main` with the same patch as `H` but a new parent → new SHA. `hotfix-parse` is untouched. Same mechanic you'll apply to your `experimental` branch in the hands-on task.",
      "before": {
        "log": "C000000000000000000000000000000000000000|B000000000000000000000000000000000000000|Refactor|HEAD -> main\nH000000000000000000000000000000000000000|W000000000000000000000000000000000000000|Fix parse|hotfix-parse\nW000000000000000000000000000000000000000|B000000000000000000000000000000000000000|Try tokens (WIP)|\nB000000000000000000000000000000000000000|A000000000000000000000000000000000000000|Add parser|\nA000000000000000000000000000000000000000||Init|",
        "branches": "* main\n  hotfix-parse",
        "head": "refs/heads/main",
        "highlights": {
          "H000000000000000000000000000000000000000": { "color": "#003B5C", "secondary": "#FFD100" }
        }
      },
      "after": {
        "log": "H'00000000000000000000000000000000000000|C000000000000000000000000000000000000000|Fix parse|HEAD -> main\nC000000000000000000000000000000000000000|B000000000000000000000000000000000000000|Refactor|\nH000000000000000000000000000000000000000|W000000000000000000000000000000000000000|Fix parse|hotfix-parse\nW000000000000000000000000000000000000000|B000000000000000000000000000000000000000|Try tokens (WIP)|\nB000000000000000000000000000000000000000|A000000000000000000000000000000000000000|Add parser|\nA000000000000000000000000000000000000000||Init|",
        "branches": "* main\n  hotfix-parse",
        "head": "refs/heads/main",
        "highlights": {
          "H000000000000000000000000000000000000000": { "color": "#003B5C", "secondary": "#FFD100" },
          "H'00000000000000000000000000000000000000": { "color": "#003B5C", "secondary": "#FFD100" }
        }
      }
    }
    </script>
    </div>

    ### Task 1: Inspect

    The pre-built `experimental` has two commits: a half-baked
    `experimental_multiply`, and a reusable `absolute`.

    ```bash
    cd /tutorial/myproject
    git log experimental --oneline
    ```

    You only want the second commit.

    ### Task 2: Cherry-pick the tip

    A branch name resolves to its tip commit — no SHA copy needed:

    ```bash
    git switch main
    git cherry-pick experimental
    git log --oneline
    ```

    A new commit `Add absolute value function` sits on `main` with a
    **different SHA** from the original. Same patch, new parent → new SHA.

    > 💡 **Schema check (Step 3 callback).** Cherry-pick *creates* a new
    > immutable object and *moves* the branch pointer to it. The original
    > commit on `experimental` is untouched — Git never edits commits in
    > place. This pattern repeats in every step from here on.

    > 🔍 **Contrast — what's *not* like cherry-pick.** `git branch foo` at
    > the same commit creates **zero** new objects (just a 41-byte ref file).
    > Both move pointers; only cherry-pick also creates a new commit. That's
    > why branch creation is instant and cherry-pick can fail with a conflict.

    ### Task 3: Produce and resolve a conflict

    Make the same line differ on both branches:

    **On `main`,** edit `calculator.py` so `def add(a, b): return a + b` becomes:

    ```python
    def add(a, b):
        """Return the sum of two numbers."""
        return a + b
    ```

    ```bash
    git add calculator.py && git commit -m "Document add function"
    ```

    **On `experimental`,** change the same line differently:

    ```bash
    git switch experimental
    ```

    Edit to:

    ```python
    def add(a, b): return a + b  # simple addition
    ```

    ```bash
    git add calculator.py && git commit -m "Inline comment on add"
    git switch main
    git cherry-pick experimental      # CONFLICT
    git status
    ```

    You'll see `<<<<<<<` / `=======` / `>>>>>>>` in the file. Conflicts
    are **not failures** — Git is asking a human to combine two valid
    changes.

    Edit the block to keep **both** sides:

    ```python
    def add(a, b):
        """Return the sum of two numbers."""
        return a + b  # simple addition
    ```

    ```bash
    git add calculator.py
    git cherry-pick --continue     # NOT `git commit` — use the cherry-pick verb
    ```

    <details markdown="1"><summary>🆘 Stuck on the conflict?</summary>

    1. Open `calculator.py` and find the `<<<<<<<` / `=======` / `>>>>>>>` block.
    2. The block has two halves: above `=======` is **what you have** (HEAD), below is **what's coming in** (the cherry-picked commit).
    3. Edit so the result keeps the docstring **and** the inline comment, then delete all three marker lines.
    4. `git add calculator.py` → `git cherry-pick --continue`.
    5. To bail at any point: `git cherry-pick --abort` resets cleanly.

    </details>
  watch_files:
  - myproject/calculator.py
  open_file: myproject/calculator.py
  setup_commands:
  - "cd /tutorial/myproject\n[ -e .git/CHERRY_PICK_HEAD ] && git cherry-pick --abort 2>/dev/null\ngit switch -q main 2>/dev/null\nif git log experimental --oneline 2>/dev/null | grep -q 'Add absolute value function'; then\n  exit 0\nfi\ngit branch -D experimental 2>/dev/null\ngit switch -qc experimental\nprintf '\\ndef experimental_multiply(a, b):\\n    # half-baked — uses addition in a loop\\n    result = 0\\n    for _ in range(b):\\n        result += a\\n    return result\\n' >> calculator.py\ngit commit -qam 'Add experimental multiply (not ready)'\nprintf '\\ndef absolute(x):\\n    \"\"\"Return |x| — handles negatives, zero, and positives.\"\"\"\\n    return x if x >= 0 else -x\\n' >> calculator.py\ngit commit -qam 'Add absolute value function'\ngit switch -q main\n"
  solution:
    # The interactive instructions teach cherry-pick + a deliberate conflict
    # resolved via sed. The automated solution rebuilds the same end state
    # deterministically (the harness can't replicate mid-flow conflict edits).
    commands:
    - cd /tutorial/myproject && git switch main
    - '[ -e .git/CHERRY_PICK_HEAD ] && git cherry-pick --abort 2>/dev/null'
    - '[ -e .git/MERGE_HEAD ] && git merge --abort 2>/dev/null'
    - git reset --hard HEAD
    - git clean -fdq
    # Ensure def divide is on main (downstream steps' tests import it)
    - "grep -q 'def divide' calculator.py || (printf '\\ndef divide(a, b): return a / b\\n' >> calculator.py && git add calculator.py && git commit -m 'Add divide function')"
    # Cherry-pick result: bring def absolute onto main
    - "grep -q 'def absolute' calculator.py || (printf '\\ndef absolute(x):\\n    \"\"\"Return |x|.\"\"\"\\n    return x if x >= 0 else -x\\n' >> calculator.py && git add calculator.py && git commit -m 'Add absolute value function')"
    # The "Document add function" commit (Task 3 of the interactive flow)
    - "git log --oneline | grep -qiE 'document|comment' || git commit --allow-empty -m 'Document add function'"
    explanation: |
      - **Cherry-pick = patch + replay:** Git diffs the target commit against its parent, applies the diff on top of HEAD, creates a new commit. The original commit is untouched.
      - **New SHA:** The cherry-picked commit has a different parent on main, so its content and SHA differ from the source. This is fine for isolated fixes but means `git log` will show it as "new" even though the patch is identical.
      - **Conflicts:** When the patch does not apply cleanly, Git pauses the cherry-pick. Resolve conflicts in the working tree, `git add` the files, then `git cherry-pick --continue`. Use `--abort` to bail out and restore the pre-cherry-pick state.
      - **Use cases:** Backporting a fix to a release branch, pulling a reviewed commit into main while leaving the rest of the branch, un-stashing one commit from a rejected pull request.
  tests:
  - description: On main branch
    command: cd /tutorial/myproject && git symbolic-ref -q HEAD | grep -q 'refs/heads/main'
    hints:
    - text: 'Cherry-pick while on the target branch. `git switch main` first, then cherry-pick.'
  - description: main contains the absolute value function (cherry-picked)
    command: cd /tutorial/myproject && grep -q 'def absolute' calculator.py && git log --oneline | grep -qi 'absolute value'
    hints:
    - text: 'Cherry-pick the tip of `experimental` — a branch name resolves to its tip, so `git cherry-pick experimental` works.'
      condition: 'code_missing: def absolute'
    - text: 'The function is there but the commit message does not mention "absolute value". Did you edit the message during cherry-pick?'
      condition: 'code_contains: def absolute'
  - description: main does NOT contain experimental_multiply
    command: cd /tutorial/myproject && ! grep -q 'def experimental_multiply' calculator.py
    hints:
    - text: 'You cherry-picked the wrong commit — `experimental_multiply` should have stayed on `experimental`. Undo with `git reset --hard HEAD~1` and pick the correct SHA.'
  - description: main includes a commit with 'Document' or 'comment' in the message
    command: cd /tutorial/myproject && git log --oneline | grep -qiE 'document|comment'
    hints:
    - text: 'Task 4 wants a docstring edit on `main` with "Document" in the commit message — that is what creates the conflict Task 4 asks you to resolve.'
      condition: 'code_missing: Return the sum'
    - text: 'Docstring is in the file but no commit mentions "Document" or "comment" yet. `git commit -am "Document add function"`.'
      condition: 'code_contains: Return the sum'
  - description: No unresolved conflict markers remain
    command: cd /tutorial/myproject && ! grep -E '^(<{7}|={7}|>{7})' calculator.py
    hints:
    - text: 'Conflict markers still in `calculator.py`. Keep both the docstring and the inline comment, remove the `<<<` / `===` / `>>>` lines, then `git add calculator.py && git cherry-pick --continue`.'
      condition: 'code_contains: <<<<<<<'
    - text: '`git cherry-pick --abort` bails if you want to start over — it resets cleanly.'
  quiz:
    title: Cherry-Pick — Knowledge Check
    min_score: 0.8
    shuffle: true
    questions:
    - question: What does `git cherry-pick <sha>` do?
      options:
      - Permanently moves the commit from its original branch to the current branch
      - Computes the patch of that commit vs its parent and creates a new commit on the current branch applying the same patch
      - Merges the entire branch containing that commit
      - Renames the commit on the current branch
      correct_index: 1
      option_feedback:
        0: This answer assumes cherry-pick mutates the source branch; it's a copy, not a move — the source commit is untouched.
        2: This answer confuses single-commit cherry-pick with whole-branch merge.
        3: This answer treats cherry-pick as a metadata edit; it actually creates a new commit object with a new SHA.
      explanation: Cherry-pick replays one commit as a *new* commit on HEAD. The source commit is unchanged. The new commit has the same patch and message but a new parent and therefore a new SHA.
    - question: You cherry-pick commit `abc123` from `experimental` onto `main`. Afterwards, what is on `experimental`?
      options:
      - '`abc123` has been removed from `experimental`'
      - '`abc123` is still on `experimental`, unchanged — cherry-pick copies, not moves'
      - '`experimental` now points to `main`'
      - '`experimental` has been deleted'
      correct_index: 1
      option_feedback:
        0: This answer assumes cherry-pick removes the source commit; cherry-pick is purely additive and doesn't touch the source.
        2: This answer assumes branches got rewired; cherry-pick only adds to the current branch.
        3: This answer assumes cherry-pick is destructive on the source; it isn't.
      explanation: Cherry-pick is a copy operation. The source commit stays where it is. Two commits with the same patch now live in two branches with different SHAs.
    - question: During a cherry-pick, Git reports a conflict. Which sequence correctly completes it?
      options:
      - Delete the conflicted file and run `git cherry-pick --continue`
      - Resolve conflicts in the file, `git add` the file, then `git cherry-pick --continue`
      - Run `git cherry-pick --force` to override the conflict
      - Run `git commit --amend` to finalize the cherry-pick
      correct_index: 1
      option_feedback:
        0: This answer destroys the work instead of resolving the conflict.
        2: This answer invents a flag; Git has no `--force` option for cherry-pick.
        3: This answer breaks the cherry-pick flow — `--amend` rewrites the previous commit, not the cherry-pick in progress.
      explanation: 'Standard conflict resolution: edit the file to remove `<<<<<<<` markers, `git add` to mark as resolved, `git cherry-pick --continue` (commits silently with the original message; pass `-e`/`--edit` if you want the editor). `--abort` bails and restores HEAD.'
    - question: '**[Revisit Step 3]** After a cherry-pick, the new commit has a different SHA from the source. Why?'
      options:
      - Cherry-pick mutates the patch content
      - The new commit has a different parent, and a commit's SHA hashes its tree + parent(s) + metadata — any change alters the SHA
      - Git randomly regenerates SHAs for safety
      - The new commit has no parent at all
      correct_index: 1
      option_feedback:
        0: This answer assumes cherry-pick rewrites content; the patch is identical, only the parent differs.
        2: This answer assumes randomness; SHAs are deterministic hashes of (tree + parents + metadata).
        3: This answer assumes the new commit is parentless; it has the current HEAD as its parent.
      explanation: A commit's SHA is `SHA-1(tree + parent(s) + author + committer + message)`. Same patch on a different parent → different tree (possibly) and definitely different parent reference → different SHA. Chapter 2's object-model lesson makes this inevitable.
    - question: Which scenario is a **bad** fit for cherry-pick?
      options:
      - Backporting a single bugfix from main to a release branch
      - Pulling one reviewed commit from a colleague's branch while the rest is still in review
      - Integrating all 50 commits of a long-running feature branch into main
      - Applying the same emergency patch to three parallel maintenance branches
      correct_index: 2
      option_feedback:
        0: This answer rejects cherry-pick's canonical use case; one-commit backports are exactly what it's for.
        1: This answer rejects cherry-pick's other canonical use case (surgical extraction from a partial branch).
        3: This answer rejects another canonical use case; cherry-picking the same fix into multiple maintenance branches is standard practice.
      explanation: For integrating many commits, use `git merge` or `git rebase` — cherry-picking 50 commits by hand is laborious and loses merge base information, which complicates future merges. Cherry-pick is surgical — reserve it for one or a few commits.
    - question: '**[Revisit Step 4]** Mid-cherry-pick, a conflict pauses Git. You realize you need to check something on another branch first. Which sequence safely preserves your conflict-resolution progress so far?'
      options:
      - '`git stash` — stashes work across branches, including mid-cherry-pick state'
      - '`git cherry-pick --abort` first to restore a clean state, then switch; re-do the cherry-pick when you return'
      - Just `git switch other-branch` — Git will remember the cherry-pick
      - '`git commit -m ''WIP conflict'' --allow-empty` to save the mid-state'
      correct_index: 1
      option_feedback:
        0: This answer assumes stash captures Git's internal cherry-pick state (CHERRY_PICK_HEAD, conflicted index); it doesn't.
        2: This answer assumes Git tolerates mid-cherry-pick switches; it doesn't, the index is in an unmergeable state.
        3: This answer corrupts the cherry-pick state by inserting a foreign commit into its in-progress flow.
      explanation: You cannot cleanly stash or switch with an in-progress cherry-pick — Git's internal state (MERGE_MSG, CHERRY_PICK_HEAD, conflicted index) is not stash-compatible. Abort, switch, do the other task, come back, and re-start the cherry-pick. The abort is cheap and restores a clean state.
    - question: Put in order the commands that resolve a conflicted cherry-pick end-to-end.
      type: parsons
      display: block
      lines:
      - 'git switch main                        # be on the target branch'
      - 'git cherry-pick <sha>                  # CONFLICT reported'
      - 'git status                             # see which files conflict'
      - '# edit the conflicted file: remove <<<<<<<, =======, >>>>>>> markers'
      - 'git add <file>                         # mark resolved'
      - 'git cherry-pick --continue             # finalize with original message'
      distractors:
      - 'git commit -m "resolve conflict"       # breaks the cherry-pick flow'
      - 'git cherry-pick --force                # not a real flag'
      - 'git merge --continue                   # wrong verb — not a merge'
      - 'git reset --hard                       # would abort + discard'
      explanation: The post-conflict verb is `cherry-pick --continue`, not `commit`. The other distractors are common reflex mistakes — `--force` doesn't exist here; `merge --continue` is a different operation; `reset --hard` discards rather than finalizes. Use `--abort` to bail out cleanly.
- title: 'git blame: Who Last Changed This Line (and Why)?'
  view: editor
  instructions: |
    ### 🎯 You will learn to
    - **Answer "why does this line exist?"** by chaining `blame -L` → `show <sha>`.
    - **Predict when plain blame lies** — reformatter commits mask real authors.
    - **Defuse** the lie with `-w` or `blame.ignoreRevsFile`.
    - **Recognize blame's blind spot:** it can only see *existing* lines.

    ### The two-command forensic workflow

    1. `git blame -L <start>,<end> <file>` → find the SHA that last touched the line.
    2. `git show <sha>` → read the commit message and diff — the **why** lives here.

    Blame is for *context*, not accusation.

    ### Task 1: Why does this line exist?

    ```bash
    git blame -L 7,7 calculator.py
    # Copy the SHA from the first column, then:
    git show <that-sha>
    ```

    Who, when, why — covered. That chain is 90% of real blame use.

    ### Task 2: The reformatter-masked authorship case

    Setup planted: **Bob** wrote `clip`. **CI-Bot** later ran whitespace
    normalization (no logic change).

    **Predict:** who will plain blame name as the last author of `def clip`?

    ```bash
    git blame -L 1,$(wc -l < calculator.py) calculator.py | grep -i 'clip'
    ```

    Last-toucher wins — blame names **CI-Bot**, masking Bob. Inspect:

    ```bash
    git show <ci-bot-sha>     # pure whitespace diff
    ```

    Add `-w` to skip whitespace-only changes:

    ```bash
    git blame -w -L 1,$(wc -l < calculator.py) calculator.py | grep -i 'clip'
    ```

    Now the author is Bob — the real logic author. For recurring
    formatters, persist this:

    ```bash
    echo "<ci-bot-sha>" >> .git-blame-ignore-revs
    git config blame.ignoreRevsFile .git-blame-ignore-revs
    ```

    GitHub's web blame UI honors this file too.

    ### Task 3: Default blame vs. `HEAD --` blame

    **Predict first:** if your working tree has uncommitted edits to a
    file, will plain `git blame <file>` show those uncommitted lines or
    hide them?

    ```bash
    echo "# uncommitted note" >> calculator.py
    git blame calculator.py | tail        # the uncommitted line is shown — with a zero SHA "Not Committed Yet"
    git blame HEAD -- calculator.py | tail # only what's committed at HEAD
    git restore calculator.py             # discard the experimental edit
    ```

    **The distinction.** Default `git blame <file>` annotates the **file
    as it currently is on disk** — uncommitted lines included, marked
    with the zero SHA `00000000` and the author "Not Committed Yet".
    `git blame HEAD -- <file>` instead asks "who last touched this line
    in the version recorded at HEAD?" Different question, different
    answer when the working tree is dirty.

    **Still a real blind spot, though.** Blame can only attribute *existing*
    lines (in either mode). A bug caused by a *deleted* line is invisible.
    For deletions, reach for `git log -p`, `git log -S` (pickaxe search),
    or `git bisect` (next step) — the official Git docs are explicit that
    deleted/replaced lines require diff- or pickaxe-style history search.

    <details markdown="1"><summary>📋 Full flag cheat sheet (`-C`, `-M`, `ignoreRevsFile`)</summary>

    | Flag | Use when |
    |---|---|
    | `-L start,end` | You know which lines matter (avoid scanning 1000 lines) |
    | `-w` | A reformatter was the last toucher |
    | `-C -M` | A line moved or was copied across files |
    | `blame.ignoreRevsFile` | Permanently skip known reformat commits |

    </details>

    <details markdown="1"><summary>💡 Sanity check: when `-w` is a no-op (try it)</summary>

    ```bash
    git blame -L 1,$(wc -l < calculator.py) calculator.py | grep -i 'def add'
    ```

    Plain blame already shows the real author — `-w` is identical here.
    **Rule:** `-w` matters only when a reformatter was the last toucher.

    </details>
  setup_commands:
  - |
    cd /tutorial/myproject
    git switch main 2>/dev/null || true
    if ! git log --all --oneline 2>/dev/null | grep -q 'auto-format via whitespace-normalize'; then
      if ! grep -q 'def clip' calculator.py; then
        printf '\ndef clip(x, lo, hi):    \n    """Clip x to [lo, hi]."""    \n    if x < lo:\n        return lo\n    if x > hi:\n        return hi\n    return x\n' >> calculator.py
      fi
      if ! git diff --quiet calculator.py; then
        GIT_AUTHOR_NAME=Bob GIT_AUTHOR_EMAIL=bob@example.com GIT_COMMITTER_NAME=Bob GIT_COMMITTER_EMAIL=bob@example.com git commit -qam 'feat: add clip function'
      fi
      sed -i 's/ *$//' calculator.py
      if ! git diff --quiet calculator.py; then
        GIT_AUTHOR_NAME=CI-Bot GIT_AUTHOR_EMAIL=ci@example.com GIT_COMMITTER_NAME=CI-Bot GIT_COMMITTER_EMAIL=ci@example.com git commit -qam 'CI: auto-format via whitespace-normalize'
      fi
    fi
  solution:
    commands:
    - cd /tutorial/myproject
    # The interactive instructions teach `git blame -L` + `git show`. The
    # solution intentionally doesn't run `git show` (it would page in v86);
    # the tests only verify blame works on the file setup leaves behind.
    - git --no-pager blame -L 1,3 calculator.py >/dev/null 2>&1; true
    explanation: |
      - **`git blame <file>`:** Shows, for every line, the SHA / author / timestamp of the commit that last modified it.
      - **`-L start,end`:** Restrict to a line range — avoids hundreds of irrelevant lines on large files.
      - **`-w`:** Ignore whitespace-only changes so reformatting commits do not shadow the real author.
      - **`-C -M`:** Follow moves and copies across the file; essential when a line was refactored into a new location.
      - **Workflow:** use blame to find the SHA, then `git show <sha>` to read the full commit message and diff. That is where the *why* lives.
  tests:
  - description: calculator.py exists and has at least 2 commits in its history
    command: cd /tutorial/myproject && [ -f calculator.py ] && [ $(git log --oneline -- calculator.py | wc -l) -ge 2 ]
    hints:
    - text: '`calculator.py` needs at least two commits in its history for blame to show interesting output. Make a small edit and commit it if the file has only one.'
  - description: Blame runs without error on calculator.py
    command: cd /tutorial/myproject && git blame calculator.py >/dev/null
    hints:
    - text: 'Run `git blame calculator.py` in the terminal. If it errors, check the working directory — you must be inside `/tutorial/myproject`.'
  - description: Blame reports per-line SHA + author + timestamp (format check)
    command: cd /tutorial/myproject && git blame calculator.py | head -1 | grep -qE '^[\^a-f0-9]+ +\([^)]+[0-9]+\)'
    hints:
    - text: 'Each blame line should look like `<sha> (<author> <date> <lineno>) <code>`. If yours does not, your Git version may need an upgrade — but normally this just means blame was never run.'
  - description: -L line-range flag works (returns output for specified range)
    command: cd /tutorial/myproject && [ -n "$(git blame -L 1,3 calculator.py 2>/dev/null)" ]
    hints:
    - text: 'Try `git blame -L 1,3 calculator.py` — restricts blame to lines 1–3. Syntax is `-L <start>,<end>`.'
  quiz:
    title: git blame — Knowledge Check
    min_score: 0.8
    shuffle: true
    questions:
    - question: What does `git blame calculator.py` show?
      options:
      - A list of bugs that were found in `calculator.py`
      - 'For every line in the file: the SHA, author, and timestamp of the commit that last modified that line'
      - The remote collaborators who have access to the file
      - The diff of the most recent commit that touched the file
      correct_index: 1
      option_feedback:
        0: This answer treats `git blame` as static analysis; blame is purely about line provenance, not bug detection.
        2: This answer confuses authorship-of-lines with access-control of the file.
        3: This answer confuses blame's per-line view with `git show`'s per-commit view.
      explanation: 'Blame gives per-line provenance — the last-touching commit and author. Combined with `git show <sha>`, you see the full context: why the line was written this way.'
    - question: You need to know the commit message for line 42's last modification. Which sequence gets you there fastest?
      options:
      - '`git log calculator.py | grep 42`'
      - '`git blame -L 42,42 calculator.py` to get the SHA, then `git show <sha>` for the message and diff'
      - '`git diff calculator.py` to see what changed'
      - '`git status calculator.py`'
      correct_index: 1
      option_feedback:
        0: This answer treats line numbers as a search string; `git log` doesn't index by line number, only `blame` does.
        2: This answer shows uncommitted changes, not authorship of committed lines.
        3: This answer reports working-tree state, not historical authorship.
      explanation: '`git blame -L 42,42` restricts output to line 42 only — instant. The first column is the SHA; pipe that SHA into `git show` for the full message. This two-step recipe is idiomatic.'
    - question: A colleague recently ran `black` across the whole repository. Now `git blame` shows them as the author of every line. How do you see the *real* last-meaningful author?
      options:
      - Revert the `black` commit
      - Use `git blame -w` to ignore whitespace-only changes, and/or configure `blame.ignoreRevsFile` to exclude the `black` commit SHA
      - Git has no way to recover this information
      - Use `git reflog` to rewind blame
      correct_index: 1
      option_feedback:
        0: This answer is needlessly destructive; `-w` and `blame.ignoreRevsFile` solve this without rewriting history.
        2: This answer assumes the reformatter has masked the data permanently; it hasn't, blame just needs the right flags.
        3: This answer confuses reflog (HEAD-position diary) with blame's commit-by-line attribution.
      explanation: '`-w` ignores whitespace-only changes, hiding pure reformatting from blame. For recurring formatters, add the reformat commit SHAs to a file referenced by `blame.ignoreRevsFile` — now everyone skips them consistently.'
    - question: '**[Revisit Step 3]** When `git blame` prints a SHA for a line, what kind of object does that SHA refer to?'
      options:
      - A blob object containing just that one line
      - A tree object for the file's containing directory
      - A commit object — the last one that modified that line
      - A stash entry
      correct_index: 2
      option_feedback:
        0: This answer confuses commit objects with blob objects; blame attributes to commits, not blobs.
        1: This answer confuses commit objects with tree objects; blame's SHAs are commit SHAs.
        3: This answer confuses commits with stash entries; blame doesn't reference stashes.
      explanation: Blame attributes lines to commits. The SHA printed is a commit SHA — run `git cat-file -t <sha>` to confirm it reports `commit`. You then use `git show <sha>` to read it.
    - question: When is `git blame` the **wrong** tool for finding a bug?
      options:
      - When the bug is a missing line that was never added
      - When you need to know who last modified a specific line
      - When you need the timestamp of a line
      - When you need the commit message behind a line
      correct_index: 0
      option_feedback:
        1: This answer states blame's *core use case* — the question asked when blame is the *wrong* tool.
        2: This answer states another core blame use case; blame prints timestamps for every line.
        3: This answer describes the standard blame → show chain; it's blame's strength, not its weakness.
      explanation: Blame only tells you about *existing* lines. A bug caused by an *absent* line (e.g., forgetting to call `validate()`) leaves blame blind. For regressions introduced by a missing line, use `git bisect` (next step) or `git log -p` to scan history.
    - question: '**[Analyze]** Give a concrete bug where `git blame` would mislead you even though the culprit line IS in the file. Which of the following fits best?'
      options:
      - A one-character typo fixed by a teammate — blame shows the typo's original commit, not the fix
      - A logic bug in a line that was auto-reformatted by a CI script last week — plain blame points at the CI bot, not the author who introduced the logic bug
      - A commit that was cherry-picked to `main` from `experimental`
      - A commit that was merged via a merge commit
      correct_index: 1
      option_feedback:
        0: This answer assumes blame keeps showing the original typo; once fixed, blame attributes the line to the fixer.
        2: This answer assumes cherry-pick fools blame; the new commit has its own SHA but blame still attributes correctly.
        3: This answer assumes merge commits mask authorship; standard merges leave per-line history intact.
      explanation: 'Reformatter commits are the classic blame-mislead scenario. The CI bot''s commit ''last touched'' every line, so blame attributes all lines to the bot — hiding the real author who introduced the logic bug. Defense: `git blame -w` to skip whitespace-only changes, or `blame.ignoreRevsFile` to skip known reformat commits.'
    - question: '**[Revisit Step 4]** Your working tree has an uncommitted edit to `calculator.py`. You run plain `git blame calculator.py`. What do you see for the modified line?'
      options:
      - Nothing — Git refuses to run blame on a dirty file
      - The line appears with a zero SHA labeled "Not Committed Yet" — default blame annotates the working-tree copy of the file, including uncommitted lines
      - The line appears with the SHA of the last commit that touched the file — uncommitted edits are invisible to blame
      - An error about a detached working tree
      correct_index: 1
      option_feedback:
        0: This answer assumes Git refuses dirty trees; blame works fine, it just shows the uncommitted line specially.
        2: This answer assumes blame ignores the working tree; default blame uses the working-tree copy, only `blame HEAD --` restricts to committed lines.
        3: This answer invents an error condition; "detached" applies to HEAD, not to working trees.
      explanation: Default `git blame <file>` annotates the **file as it currently is** — so an uncommitted line appears with the zero SHA `00000000` and author "Not Committed Yet". To restrict to the committed version of the file, use `git blame HEAD -- <file>`. Two different questions ("who touched what I'm reading right now?" vs. "who touched what's recorded at HEAD?"); two different commands. Note this is separate from the *deletion* blind spot — a line that no longer exists in the file is invisible to either mode of blame.
    - question: Put in order the "forensic chain" for understanding why a specific line in `parser.py` exists.
      type: parsons
      display: block
      lines:
      - 'git blame -L 42,42 parser.py                 # find SHA of last change to line 42'
      - '# copy the SHA from the first column'
      - 'git show <that-sha>                          # read commit message + full diff'
      - '# is the commit message a reformatter? If yes, try -w:'
      - 'git blame -w -L 42,42 parser.py              # ignore whitespace-only commits'
      distractors:
      - 'git log parser.py | grep 42    # slow, imprecise'
      - 'git diff HEAD parser.py        # shows YOUR uncommitted edits, not authorship'
      - 'git status parser.py           # unrelated to authorship'
      explanation: The blame → show chain answers "why does this line exist?" The `-w` fallback defuses reformatter masking. The distractors are all plausible-looking commands that don't answer the authorship question — common cul-de-sacs when learners panic-grep instead of reaching for blame.
- title: 'git bisect: Binary Search for the Commit That Broke Things'
  view: editor
  instructions: |
    ### 🎯 You will learn to
    - **Decide** when bisect is worth reaching for (rule: ≥ ~5 commits or slow tests).
    - **Run an automated bisect** end-to-end and **always reset** afterward.
    - **Spot regressions blame cannot find** — deletions, behavioral changes, and anything involving missing lines.

    ### 🤔 Predict first

    A regression appeared somewhere in the last **1000 commits**.
    Roughly how many tests would `git bisect` need to find the exact
    breaking commit? Pick one before reading on: 1000, 500, 100, or ~10.

    ### Why bisect beats every alternative

    Reading 30 diffs by hand is slow. `blame` can't see missing lines.
    `log --grep="fix"` is wishful thinking.

    Bisect runs **binary search** on history: `log₂(30) ≈ 5` tests to pin
    the exact culprit. 1000 commits → **~10 tests**. Scales forever.

    <div data-git-command-lab-multi role="region" aria-label="Interactive multi-step commit-graph demo: bisect narrows a regression in five commits to one in just two tests by binary search; HEAD detaches to a midpoint while bisect/bad and bisect/good refs mark the boundaries.">
    <script type="application/json">
    {
      "description": "Different scenario from the hands-on: a regression in `sort()` hides somewhere in the last 5 commits. Bisect pinpoints it in **just 2 tests** (log₂(5) ≈ 2.3).\n\n**Watch the labels.** Red = known bad, green = known good. `bisect/bad` and `bisect/good` refs mark the current boundaries. `HEAD` detaches to the midpoint Git wants you to test. You will apply this same algorithm below on the calculator `absolute` bug.",
      "initialState": {
        "log": "F000000000000000000000000000000000000000|E000000000000000000000000000000000000000|Lint|HEAD -> main\nE000000000000000000000000000000000000000|D000000000000000000000000000000000000000|Docs|\nD000000000000000000000000000000000000000|C000000000000000000000000000000000000000|Skip stable (BUG)|\nC000000000000000000000000000000000000000|B000000000000000000000000000000000000000|Add compare|\nB000000000000000000000000000000000000000|A000000000000000000000000000000000000000|Add sort|\nA000000000000000000000000000000000000000||Init|",
        "branches": "* main",
        "head": "refs/heads/main"
      },
      "steps": [
        {
          "command": "git bisect start HEAD HEAD~5",
          "description": "One-shot form: mark `HEAD` (F) **bad** and `HEAD~5` (A) **good** in a single command. Git prints:\n\n```\nBisecting: 2 revisions left to test after this (roughly 2 steps)\n```\n\nSuspects: {B, C, D, E, F} — 5 commits. Git picks the balanced midpoint **D** (2 ancestors B,C; 2 descendants E,F) and detaches HEAD to D for you to test.",
          "state": {
            "log": "F000000000000000000000000000000000000000|E000000000000000000000000000000000000000|Lint|main, bisect/bad\nE000000000000000000000000000000000000000|D000000000000000000000000000000000000000|Docs|\nD000000000000000000000000000000000000000|C000000000000000000000000000000000000000|Skip stable (BUG)|HEAD\nC000000000000000000000000000000000000000|B000000000000000000000000000000000000000|Add compare|\nB000000000000000000000000000000000000000|A000000000000000000000000000000000000000|Add sort|\nA000000000000000000000000000000000000000||Init|bisect/good",
            "branches": "  main",
            "head": "detached",
            "highlights": {
              "F000000000000000000000000000000000000000": { "color": "#C0392B", "secondary": "#fff" },
              "A000000000000000000000000000000000000000": { "color": "#27AE60", "secondary": "#fff" }
            }
          }
        },
        {
          "command": "./test_sort.sh  →  exit 1  →  git bisect bad",
          "description": "Tests **fail** at D, so D is bad. `refs/bisect/bad` now points at D (the tighter bad boundary). Git prints:\n\n```\nBisecting: 1 revision left to test after this (roughly 1 step)\n```\n\nSuspects narrow to {B, C, D} — 3 commits. Midpoint **C**; HEAD moves there. E and F are now *inferred bad* (descendants of a bad D) — shown red even though you didn't test them.",
          "state": {
            "log": "F000000000000000000000000000000000000000|E000000000000000000000000000000000000000|Lint|main\nE000000000000000000000000000000000000000|D000000000000000000000000000000000000000|Docs|\nD000000000000000000000000000000000000000|C000000000000000000000000000000000000000|Skip stable (BUG)|bisect/bad\nC000000000000000000000000000000000000000|B000000000000000000000000000000000000000|Add compare|HEAD\nB000000000000000000000000000000000000000|A000000000000000000000000000000000000000|Add sort|\nA000000000000000000000000000000000000000||Init|bisect/good",
            "branches": "  main",
            "head": "detached",
            "highlights": {
              "F000000000000000000000000000000000000000": { "color": "#C0392B", "secondary": "#fff" },
              "E000000000000000000000000000000000000000": { "color": "#C0392B", "secondary": "#fff" },
              "D000000000000000000000000000000000000000": { "color": "#C0392B", "secondary": "#fff" },
              "A000000000000000000000000000000000000000": { "color": "#27AE60", "secondary": "#fff" }
            }
          }
        },
        {
          "command": "./test_sort.sh  →  exit 0  →  git bisect good",
          "description": "Tests **pass** at C, so C is good. C (good) and D (bad) are now adjacent — the answer is pinned. Git prints:\n\n```\nD is the first bad commit\ncommit D…\n    Skip stable (BUG)\n```\n\nB is *inferred good* (ancestor of a good C). HEAD stays on C (last tested). Run `git show D` to read the culprit's full diff and message.",
          "state": {
            "log": "F000000000000000000000000000000000000000|E000000000000000000000000000000000000000|Lint|main\nE000000000000000000000000000000000000000|D000000000000000000000000000000000000000|Docs|\nD000000000000000000000000000000000000000|C000000000000000000000000000000000000000|Skip stable (BUG)|bisect/bad\nC000000000000000000000000000000000000000|B000000000000000000000000000000000000000|Add compare|HEAD, bisect/good\nB000000000000000000000000000000000000000|A000000000000000000000000000000000000000|Add sort|\nA000000000000000000000000000000000000000||Init|bisect/good",
            "branches": "  main",
            "head": "detached",
            "highlights": {
              "F000000000000000000000000000000000000000": { "color": "#C0392B", "secondary": "#fff" },
              "E000000000000000000000000000000000000000": { "color": "#C0392B", "secondary": "#fff" },
              "D000000000000000000000000000000000000000": { "color": "#C0392B", "secondary": "#fff" },
              "C000000000000000000000000000000000000000": { "color": "#27AE60", "secondary": "#fff" },
              "B000000000000000000000000000000000000000": { "color": "#27AE60", "secondary": "#fff" },
              "A000000000000000000000000000000000000000": { "color": "#27AE60", "secondary": "#fff" }
            }
          }
        },
        {
          "command": "git bisect reset",
          "description": "**Non-negotiable final step.** Re-attaches `HEAD` from the detached midpoint back to `main` and deletes every `refs/bisect/*` ref. Skip it and your working tree looks mysteriously stale (HEAD stuck on C).\n\nThe diagram keeps D highlighted as a reminder of the culprit. In a real terminal, `git bisect log` captures the verdict — paste it into the PR description.",
          "state": {
            "log": "F000000000000000000000000000000000000000|E000000000000000000000000000000000000000|Lint|HEAD -> main\nE000000000000000000000000000000000000000|D000000000000000000000000000000000000000|Docs|\nD000000000000000000000000000000000000000|C000000000000000000000000000000000000000|Skip stable (BUG)|\nC000000000000000000000000000000000000000|B000000000000000000000000000000000000000|Add compare|\nB000000000000000000000000000000000000000|A000000000000000000000000000000000000000|Add sort|\nA000000000000000000000000000000000000000||Init|",
            "branches": "* main",
            "head": "refs/heads/main",
            "highlights": {
              "D000000000000000000000000000000000000000": { "color": "#C0392B", "secondary": "#fff" },
              "C000000000000000000000000000000000000000": { "color": "#27AE60", "secondary": "#fff" },
              "B000000000000000000000000000000000000000": { "color": "#27AE60", "secondary": "#fff" },
              "A000000000000000000000000000000000000000": { "color": "#27AE60", "secondary": "#fff" }
            }
          }
        }
      ]
    }
    </script>
    </div>

    ### Task 1: See the regression

    Setup planted 5 commits; one of them broke `absolute(-4) == 4`.

    ```bash
    cd /tutorial/myproject
    git log --oneline -7
    python3 test_calculator.py      # AssertionError
    ```

    ### Task 2: Manual bisect (feel the motion)

    ```bash
    git bisect start
    git bisect bad HEAD
    git bisect good HEAD~5
    # Git checks out a midpoint. Test it:
    python3 test_calculator.py
    # exit 0 → git bisect good ;  exit ≠ 0 → git bisect bad
    # Repeat until Git prints "<sha> is the first bad commit"
    git bisect reset
    ```

    ### Task 3: Automated bisect (the real-world default)

    ```bash
    git bisect start HEAD HEAD~5
    git bisect run python3 test_calculator.py
    git bisect reset
    ```

    `bisect run` uses the script's exit code (0 = good, non-zero = bad)
    to drive the search. Always finish with `reset` — otherwise HEAD
    stays on the last midpoint.

    ### Task 4: Fix the bug

    Bisect points at `Simplify absolute (BUG: removes negation!)`.
    In the editor, restore the body of `absolute`:

    ```python
    def absolute(x):
        """Return |x| — handles negatives, zero, and positives."""
        return x if x >= 0 else -x
    ```

    ```bash
    git commit -am "Fix: restore negation in absolute"
    python3 test_calculator.py      # all tests pass
    ```

    <details markdown="1"><summary>⚠️ Test-portability caveat (real-world bisects)</summary>

    Bisect runs the test at *every historical commit* in range. If the test
    itself was added mid-range, older commits won't have it and bisect breaks.
    Restore the modern test each iteration:

    ```bash
    git bisect run -- bash -c 'cp /tmp/test.py . && python3 test.py'
    ```

    </details>

    ### 🌙 Halftime: take a break before Step 8

    You've finished the **daily tools** phase (stash, cherry-pick, blame, bisect).
    Steps 8–11 are **history rewriting** — denser and structurally riskier.

    **Walk away for at least 30 minutes** (overnight is better) before continuing.
    Spaced practice is one of the most replicated findings in cognitive science:
    a 30-minute break before harder material produces measurably better retention
    than pushing straight through. Your hippocampus consolidates while you're not
    studying.

    When you come back, predict from memory: *what does `git stash` actually save?
    Why does cherry-pick create a new SHA?* If those don't come fast, re-do the
    step. If they do, Step 8 awaits.

  watch_files:
  - myproject/calculator.py
  - myproject/test_calculator.py
  open_file: myproject/calculator.py
  setup_commands:
  - "cd /tutorial/myproject\n[ -e .git/BISECT_START ] && git bisect reset 2>/dev/null\ngit switch -q main 2>/dev/null\nif git log main --oneline 2>/dev/null | grep -q 'Simplify absolute (BUG'; then\n  exit 0\nfi\nif ! grep -q 'def absolute' calculator.py; then\n  printf '\\ndef absolute(x):\\n    \"\"\"Return |x|.\"\"\"\\n    return x if x >= 0 else -x\\n' >> calculator.py\n  git add calculator.py\n  git commit -qm 'Seed: add absolute function' 2>/dev/null\nfi\nprintf 'from calculator import add, divide, absolute\\nassert add(2, 3) == 5\\nassert divide(10, 2) == 5\\nassert absolute(-4) == 4\\nprint(\"all tests pass\")\\n' > test_calculator.py\ngit add test_calculator.py\ngit diff --cached --quiet || git commit -qm 'Add regression tests'\necho '# commit A: refactor docstring' >> calculator.py\ngit commit -qam 'Refactor: tidy docstring'\necho '# commit B: new helper' >> calculator.py\ngit commit -qam 'Add unused helper comment'\nsed -i 's/return x if x >= 0 else -x/return x/' calculator.py\nif git diff --quiet calculator.py; then\n  sed -i 's/def absolute(x):/def absolute(x):\\n    return x  # BUG\\n    pass  # unreachable/' calculator.py\nfi\ngit commit -qam 'Simplify absolute (BUG: removes negation!)'\necho '# commit D: later tweak' >> calculator.py\ngit commit -qam 'Later tweak'\necho '# commit E: even later' >> calculator.py\ngit commit -qam 'Even later tweak'\n"
  solution:
    # Interactive instructions teach bisect + sed-fix. Automated solution
    # reverses the setup's planted bug via sed (the inverse substitution).
    # No python in v86 — tests verify the fix string via grep.
    commands:
    - "cd /tutorial/myproject && git bisect reset 2>/dev/null; git switch -q main 2>/dev/null; git reset --hard HEAD; sed -i 's|^    return x$|    return x if x >= 0 else -x|' calculator.py; git add calculator.py && (git diff --cached --quiet || git commit -m 'Fix: restore negation in absolute')"
    explanation: |
      - **Binary search:** bisect halves the candidate range each step. `log₂(n)` tests find the exact breaking commit — 5 tests for 30 commits, 10 tests for 1000.
      - **`git bisect start` / `bad` / `good`:** establishes the range. Git checks out the midpoint and waits for your verdict.
      - **`git bisect run <cmd>`:** automates the search. The command runs at each candidate; exit 0 = good, non-zero = bad. Git iterates until one commit remains, prints it, and stops.
      - **`git bisect reset`:** returns HEAD to the pre-bisect state and cleans up. **Always run this at the end**, even after `run` — otherwise you may end up on a commit in the middle of history and wonder why your code looks weird.
      - **Test portability:** The test script must work at every commit in the range. If the test file itself was added partway through, copy it from outside the range for each iteration.
  tests:
  - description: Bisect has been cleaned up (no active bisect)
    command: cd /tutorial/myproject && [ ! -f .git/BISECT_LOG ]
    hints:
    - text: '`git bisect reset` ends the bisect session and returns HEAD to where you started.'
  # Removed the "Test file was committed" gate — setup_commands already committed
  # test_calculator.py before the student touched anything, so the gate passed
  # without verifying any student work. The post-bisect repair-and-commit gates
  # below cover what we actually want to check.
  - description: At least 5 new commits exist on main
    command: cd /tutorial/myproject && [ $(git log --oneline main | wc -l) -ge 7 ]
    hints:
    - text: 'Setup issue — normally the step seeds 5+ commits automatically. Re-run the step if history is sparse.'
  - description: The absolute function has been repaired (handles negatives, zero, and positives correctly)
    command: cd /tutorial/myproject && grep -q 'return x if x >= 0 else -x' calculator.py
    hints:
    - text: 'Fix `absolute(x)` to return `x` when `x >= 0`, else `-x`. After bisect pointed at the culprit, commit the repair on top of main.'
      condition: 'code_contains: def absolute'
    - text: '`def absolute` is gone entirely. Add it back with a one-line body using the sign of `x`, then commit.'
      condition: 'code_missing: def absolute'
  quiz:
    title: git bisect — Knowledge Check
    min_score: 0.8
    shuffle: true
    questions:
    - question: A regression appeared somewhere in the last **50 commits**. Roughly how many tests does `git bisect` need to find the exact breaking commit?
      options:
      - 50 — one per commit
      - 25 — approximately half
      - ~6 — `log₂(50) ≈ 6`
      - 1 — bisect inspects all commits at once
      correct_index: 2
      option_feedback:
        0: This answer assumes linear search; bisect halves candidates each step (log₂(50) ≈ 6, not 50).
        1: This answer halves only once; bisect halves repeatedly until one commit remains.
        3: This answer assumes a single oracle; bisect needs one test per midpoint to drive the search.
      explanation: 'Binary search halves the range each test: 50 → 25 → 13 → 7 → 4 → 2 → 1. About 6 iterations. For 1000 commits, ~10 tests. This scaling is why bisect is irreplaceable on long-running projects.'
    - question: Which sequence correctly runs an automated bisect?
      options:
      - '`git bisect start; git bisect run <cmd>`'
      - '`git bisect start; git bisect bad; git bisect good <old-sha>; git bisect run <cmd>`'
      - '`git bisect run <cmd> HEAD HEAD~50`'
      - '`git bisect <cmd>`'
      correct_index: 1
      option_feedback:
        0: This answer skips the boundary-marking step; without `bad`/`good` markers, bisect can't binary-search.
        2: This answer puts boundaries in the wrong place; `start` takes them, `run` takes a command.
        3: This answer omits both `start` and `run`; bisect needs both for automation.
      explanation: You must tell bisect the boundaries first — `bad` (usually HEAD) and a known-good earlier commit. Only then can `run` automate. The command's exit code (0 = good, nonzero = bad) drives the search.
    - question: You ran `git bisect run` successfully. What must you do afterwards?
      options:
      - Nothing — bisect cleans itself up
      - '`git bisect reset` — otherwise HEAD stays on the midpoint commit it last checked out'
      - '`git stash` to preserve bisect state'
      - Push the result to the remote
      correct_index: 1
      option_feedback:
        0: This answer assumes auto-cleanup; HEAD stays at the last midpoint until you `bisect reset`.
        2: This answer confuses stash (working-tree shelving) with bisect cleanup.
        3: This answer assumes the bisect result needs to be shared via push; the result is local diagnostic info.
      explanation: '`git bisect reset` is non-negotiable. It restores HEAD to where you started and removes bisect''s temporary refs. Skipping it leaves HEAD on a random historical commit — a common cause of ''why is my code weird?'' panic.'
    - question: Which test property is **required** for `git bisect run` to work?
      options:
      - The test must produce JSON output
      - The test must exit 0 on pass and non-zero on fail, and must run on every commit in the range
      - The test must be written in Python
      - The test must only exist in the latest commit
      correct_index: 1
      option_feedback:
        0: This answer invents an output-format requirement; bisect cares about exit codes, not output format.
        2: This answer invents a language requirement; bisect runs any executable.
        3: This answer is backwards; the test must work at *every* commit in the range, not just the latest.
      explanation: 'Bisect uses the exit code as its oracle. Also critical: the test must actually run at every historical commit — if the test file was added mid-range, older commits will fail to even find the test, confusing bisect. Use `git bisect run -- bash -c ''cp /tmp/test.py . && python3 test.py''` to work around this.'
    - question: '**[Revisit Step 1]** In the middle of a manual bisect, Git leaves HEAD at a historical commit while you decide good/bad. What HEAD state are you in, and why is that OK?'
      options:
      - Detached HEAD — and it is safe because bisect manages it; `git bisect reset` restores you to the starting branch afterwards
      - Attached to a new branch called `bisect/working` that Git creates automatically
      - Detached HEAD — and any `git commit` you make here will corrupt history
      - Attached to `main` — bisect only moves the working tree, not HEAD
      correct_index: 0
      option_feedback:
        1: This answer invents a `bisect/working` branch; bisect uses internal refs (`refs/bisect/*`), not a magic branch.
        2: This answer assumes detached-HEAD commits are dangerous; bisect's transient state is safe and `reset` undoes it.
        3: This answer assumes HEAD doesn't move; bisect explicitly checks out historical commits at each midpoint.
      explanation: During bisect, HEAD is detached at whichever historical commit Git picked as midpoint. That is fine because bisect's internal refs (`BISECT_HEAD`, `refs/bisect/*`) track progress. `git bisect reset` restores the pre-bisect HEAD. Same detached-HEAD concept as Step 1 — just used in service of a search.
    - question: '**[Revisit Step 6]** A bug appears because a line that *used to exist* was deleted. Which tool finds the deletion commit?'
      options:
      - '`git blame` — it shows every line''s author'
      - '`git bisect` — it binary-searches the history for the commit where behavior changed, regardless of whether the change was an addition or deletion'
      - '`git log --grep=''delete''` — it finds commits with ''delete'' in the message'
      - '`git cherry-pick --find-deletion`'
      correct_index: 1
      option_feedback:
        0: This answer ignores blame's deletion blind spot; absent lines are invisible to blame regardless of mode.
        2: This answer assumes the commit message contains "delete"; commit messages don't reliably announce deletions.
        3: This answer invents a flag that doesn't exist on cherry-pick.
      explanation: 'Blame only attributes *existing* lines. A deletion is invisible to blame (the line isn''t there!). Bisect operates on *behavior*, not lines: if the test failed after commit X and passed at commit X-1, X is the culprit, regardless of whether X added, modified, or deleted code.'
    - question: Put in order the commands for an automated bisect that finds a regression in the last 100 commits and returns HEAD to normal.
      type: parsons
      display: block
      lines:
      - 'python3 test_calculator.py       # verify HEAD currently fails'
      - 'git bisect start HEAD HEAD~100   # bad=HEAD, good=100 back'
      - 'git bisect run python3 test_calculator.py   # Git iterates ~7 times'
      - '# Git prints: "<sha> is the first bad commit"'
      - 'git bisect reset                 # return HEAD to pre-bisect state'
      distractors:
      - 'git bisect stop                  # not a real subcommand'
      - 'git bisect --force               # not a real flag'
      - 'git reflog                       # unrelated to bisect workflow'
      - 'git bisect run -- python3 test.py HEAD HEAD~100   # wrong arg order'
      explanation: Bisect needs boundaries first (`start <bad> <good>`), *then* `run`. The `run` script's exit code (0 = good, nonzero = bad) drives the binary search — ~log₂(100) ≈ 7 iterations. `reset` is non-negotiable; skipping it leaves HEAD on a historical midpoint commit and your code "looks weird."
- title: 'Rebase: Integrate Changes Without a Merge Commit'
  view: git_graph
  instructions: |
    ### 🎯 You will learn to
    - **Pick** rebase for short local branches, merge for shared/long-lived ones — and say *why*.
    - **Produce linear history** with rebase + fast-forward merge (no diamond).
    - **Resolve a rebase conflict** — same marker dance as merge, but finish with `rebase --continue`.
    - **Recover** from a bad rebase using reflog (Step 2's safety net applied).

    ### Mental model: the video-editor timeline cut

    Select the clips (commits) unique to your feature, cut, move playhead to
    `main`'s tip, paste. Each paste is a **new commit object** — same patch,
    new parent, new SHA. Originals stay in `.git/objects` (reflog recovers).

    > 💡 **Schema check (Step 3 callback).** Rebase = "cherry-pick a *series*"
    > under the hood. New objects, branch pointer moved. Same mechanic Step 5
    > used on one commit; Step 8 just iterates.

    > 🔍 **Contrast — what's *not* like rebase.** A **fast-forward merge**
    > on a strict-extension branch creates **zero** new commits — `main`'s
    > pointer just slides forward to the feature tip. Rebase + ff-merge
    > together produce linear history because rebase did all the
    > new-commit-creation up front; the merge has nothing left to do.

    <div data-git-command-lab role="region" aria-label="Interactive commit-graph demo: rebase replays a topic-branch commit T onto the new main tip as a new commit T-prime, with the same patch but a new parent and new SHA. The original T remains in the object database, recoverable via reflog.">
    <script type="application/json">
    {
      "command": "git rebase main",
      "description": "Different scenario from the hands-on: `topic` has one commit (`Add cache`); meanwhile `main` moved forward with `Update docs` and `Fix typo`. Rebasing replays `T` on top of the new `main` tip as **T'** (same patch, new parent, new SHA).\n\nThe old `T` commit lives on in `.git/objects` — reflog recovers it. The branch pointer just moves to the replayed copy. Below, you will apply this same mechanic to `feature-sqrt`.",
      "before": {
        "log": "D000000000000000000000000000000000000000|C000000000000000000000000000000000000000|Fix typo|main\nC000000000000000000000000000000000000000|B000000000000000000000000000000000000000|Update docs|\nT000000000000000000000000000000000000000|B000000000000000000000000000000000000000|Add cache|HEAD -> topic\nB000000000000000000000000000000000000000|A000000000000000000000000000000000000000|Add API|\nA000000000000000000000000000000000000000||Init|",
        "branches": "  main\n* topic",
        "head": "refs/heads/topic",
        "highlights": {
          "T000000000000000000000000000000000000000": { "color": "#003B5C", "secondary": "#FFD100" }
        }
      },
      "after": {
        "log": "T'00000000000000000000000000000000000000|D000000000000000000000000000000000000000|Add cache|HEAD -> topic\nD000000000000000000000000000000000000000|C000000000000000000000000000000000000000|Fix typo|main\nC000000000000000000000000000000000000000|B000000000000000000000000000000000000000|Update docs|\nB000000000000000000000000000000000000000|A000000000000000000000000000000000000000|Add API|\nA000000000000000000000000000000000000000||Init|",
        "branches": "  main\n* topic",
        "head": "refs/heads/topic",
        "highlights": {
          "T'00000000000000000000000000000000000000": { "color": "#003B5C", "secondary": "#FFD100" }
        }
