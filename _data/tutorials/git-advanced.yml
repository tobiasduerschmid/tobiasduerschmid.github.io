title: 'Advanced Git: Debugging, History Rewriting, and Submodules'
description: Go beyond the basics — master detached HEAD, git's object model, stash, cherry-pick, blame, bisect, rebase (including interactive), squash merge, and submodules. Every step is grounded in a real scenario you will meet on the job.
backend: v86
require_tests: true
autosave_type: commands-and-files
reset_type: commands
git_graph: /tutorial/myproject
setup_commands:
- "echo 'export LANG=C.UTF-8' >> ~/.bashrc\necho 'export LESSCHARSET=utf-8' >> ~/.bashrc\nexport LANG=C.UTF-8\nexport LESSCHARSET=utf-8\ngit config --global user.email 'diligent-student@cs.ucla.edu'\ngit config --global user.name 'Soon-to-be Git Hero'\ngit config --global init.defaultBranch main\ngit config --global advice.detachedHead false\n# Pre-build a small calculator repo (idempotent via sentinel).\n# Two commits on `main`, one on a `feature-divide` branch —\n# enough history to explore pointers, detached HEAD, etc.\ncd /tutorial\nif [ -d myproject/.git ] && git -C myproject log main --oneline 2>/dev/null | grep -q 'Add add function'; then\n  exit 0\nfi\nrm -rf myproject\ngit init -q myproject\ncd myproject\necho '\"\"\"A simple calculator module.\"\"\"' > calculator.py\ngit add calculator.py\ngit commit -qm 'Initial commit'\necho 'def add(a, b): return a + b' >> calculator.py\ngit commit -qam 'Add add function'\ngit switch -qc feature-divide\necho 'def divide(a, b): return a / b' >> calculator.py\ngit commit -qam 'Add divide function'\ngit switch -q main\n"
steps:
- title: Branches, HEAD, and Detached HEAD
  view: git_graph
  instructions: |
    ### Welcome to Advanced Git

    You already know `init`, `add`, `commit`, `branch`, `merge`, and remotes.
    This tutorial lifts the hood (object database, refs, HEAD) and drills
    every tool from Lecture 10: detached HEAD, reflog, stash, cherry-pick,
    blame, bisect, rebase (incl. interactive), squash merge, and submodules.

    You will intentionally break things. The next step teaches
    `git reflog` — the safety net that makes every destructive command
    recoverable.

    ### Two antipatterns to avoid

    1. **Blind-testing** — typing random permutations of `add`, `commit`,
       `push`, `pull` until the terminal stops complaining.
    2. **"Burning down the repo"** — deleting the local folder, copying
       files to a text file, re-cloning, and force-pushing when anything
       goes wrong. Destroys history and prevents learning.

    Both come from no accurate mental model of what Git is doing. Each
    step builds that model.

    ### Prerequisite self-check

    Answer these five from memory before continuing. If any feel shaky,
    go back to the basic tutorial — the rest assumes these are reflex.

    1. A new file appears red in `git status`. What's the state name,
       and which command promotes it to green?
    2. You commit, then edit the file again. What does `git diff`
       (no arguments) compare?
    3. `main` and `feature` have diverged. Can `git merge feature`
       fast-forward? Why or why not?
    4. A teammate pushed a buggy commit to shared `main`. Safer:
       `git reset --hard HEAD~1` + force-push, or `git revert <sha>`?
    5. Someone staged a `.env` file with secrets. Adding `.env` to
       `.gitignore` now — does that stop the secret from being committed?

    <details markdown="1"><summary>Expected answers</summary>

    1. **Untracked.** `git add` moves it to staged.
    2. **Working directory vs. staging area.** Since nothing is
       staged, the staging area still matches `HEAD`, so the diff
       shows your unstaged edits.
    3. **No.** Diverged branches need a three-way merge (new merge
       commit with two parents). Fast-forward requires the target
       branch to be a strict ancestor.
    4. **`git revert`.** It appends an anti-commit without
       rewriting history, so teammates who already pulled stay in
       sync. `reset --hard` + force-push breaks every teammate's
       local copy.
    5. **No.** `.gitignore` only stops *future* tracking.
       Already-staged files need `git restore --staged .env` now, or
       `git rm --cached .env` if already committed — and for a real
       secret, rotate the credential.

    </details>

    ### What is a branch, really?

    A branch is **not a copy** of your project — it is a **41-byte text
    file** containing one commit hash. Let's prove it.

    ### The starter repo

    A small `myproject/` calculator repo has been built for you —
    two commits on `main`, one on a `feature-divide` branch. Inspect it:

    ```bash
    git log --all --oneline --graph --decorate
    ```

    Compare the terminal output with the git graph panel on the right —
    they show the same history.

    ### Task 1: Look at the branch pointer files

    **Predict:** what's inside `.git/refs/heads/main`? A list of commits?
    A snapshot? A diff? Then run:

    ```bash
    cat .git/refs/heads/main
    cat .git/refs/heads/feature-divide
    ```

    Each file is **one line** containing the commit SHA that branch
    points to. Branches are single-line text files — creating one is
    just an `fwrite()` of a few bytes.

    Now inspect `HEAD`:

    ```bash
    cat .git/HEAD
    ```

    You see `ref: refs/heads/main`. `HEAD` is a **symbolic reference** —
    a pointer to another pointer:

    ```gitgraph
    @startuml
    branch main:
      A "Initial commit"
      B "Add add function"
    head main
    @enduml
    ```

    This indirection is why `git commit` can move the branch forward
    without touching `HEAD` itself: the branch pointer file is rewritten,
    and `HEAD` dereferences to the new commit automatically.

    ### Task 2: Detach HEAD

    ```bash
    git switch --detach HEAD~1
    cat .git/HEAD
    ```

    Now `.git/HEAD` contains a **raw SHA hash** instead of a branch ref.
    This is **detached HEAD state** — HEAD anchored directly to a
    commit, not to a branch pointer. Look at the git-graph panel: the
    HEAD label floats directly on a commit node.

    > Think of it as visiting a museum archive. You can read any
    > document, but notes you leave without a label have nowhere to go
    > when you walk away. `git switch -c <name>` is that label.

    **Warning:** New commits in detached HEAD are anchored to no branch.
    When you `git switch` away, they become orphaned (eventually
    pruned by `git gc`). The next step (`git reflog`) is how you rescue
    them.

    ### Cleanup

    ```bash
    git switch main
    ```

    ### You can now

    - **Explain** why creating a branch is a millisecond operation.
    - **Distinguish** attached vs. detached HEAD by inspecting `.git/HEAD`.
    - **Anticipate** where orphaned commits come from — the next step
      teaches how to rescue them.
  solution:
    commands:
    - cd /tutorial/myproject
    - git switch --detach HEAD~1
    - git switch main
    explanation: |
      - **Branch = 41-byte pointer file:** `.git/refs/heads/main` literally contains one line — the commit SHA. No file copies, no timeline duplication. Creating a branch is a single `fwrite()`.
      - **HEAD = symbolic reference:** `.git/HEAD` contains `ref: refs/heads/main`, not the commit SHA directly. That indirection lets `git commit` update the branch pointer while `HEAD` follows automatically.
      - **Detached HEAD:** `HEAD` holds a raw SHA rather than a ref. Any commits made here are reachable only from `HEAD` — once you move `HEAD`, they are orphaned. The rescue tool (`git reflog`) is the subject of the next step.
  tests:
  - description: myproject is a Git repository
    command: '[ -d /tutorial/myproject/.git ]'
  - description: feature-divide branch exists
    command: cd /tutorial/myproject && git branch | grep -q 'feature-divide'
  - description: Currently on main branch (not detached)
    command: cd /tutorial/myproject && git symbolic-ref -q HEAD | grep -q 'refs/heads/main'
  quiz:
    title: Branch Internals & Detached HEAD — Knowledge Check
    min_score: 0.8
    shuffle: true
    questions:
    - question: What is a Git branch, physically speaking?
      options:
      - A full copy of all project files stored separately
      - A 41-byte text file in `.git/refs/heads/` containing one commit SHA
      - A separate network connection to a remote server
      - A compressed archive of your working directory
      correct_index: 1
      explanation: A branch is just a tiny file holding a 40-character SHA. That is why `git switch -c new-branch` is instantaneous — Git does not copy files, it writes one line of text.
    - question: Which statements about **Detached HEAD** state are true? (Select all that apply)
      type: multiple
      options:
      - '`HEAD` points directly to a commit hash instead of a branch name'
      - Any commit you make in detached HEAD is automatically saved to the nearest branch
      - Commits made here are orphaned unless you anchor them with a branch before leaving
      - '`.git/HEAD` contains a 40-char SHA rather than a line like `ref: refs/heads/main`'
      correct_indices:
      - 0
      - 2
      - 3
      explanation: Detached HEAD stores a raw SHA in `.git/HEAD`. No branch tracks commits made here. Before leaving, create a branch (`git switch -c rescue`) — otherwise the commits become orphaned and the next step's reflog is your recovery path.
    - question: Why can `HEAD` point to a branch name rather than a commit SHA?
      options:
      - Branch names are shorter and easier to type
      - Symbolic refs let `git commit` update the branch pointer and `HEAD` automatically stays current through indirection
      - Git requires it for compatibility with GitHub
      - It prevents you from committing on the wrong branch
      correct_index: 1
      explanation: The pointer chain is `HEAD → refs/heads/branch → commit`. A commit only needs to rewrite the branch file — HEAD dereferences through it. This indirection is the engineering reason branches are cheap.
    - question: You want to inspect a commit from last week without risking any accidental edits. Which is the safest approach?
      options:
      - '`git switch --detach <old-sha>` — look around; return to main with `git switch main`'
      - '`git reset --hard <old-sha>` — rewinds your current branch to that point'
      - '`git checkout <old-sha> .` — overwrite files in working directory'
      - '`rm -rf .git && git clone <old-sha>` — start fresh'
      correct_index: 0
      explanation: '`git switch --detach` enters read-only-feeling detached HEAD at any commit. You can look around freely; `git switch main` returns you unchanged. `git reset --hard` would rewrite your current branch — destructive. `git checkout <sha> .` overwrites files without moving HEAD.'
    - question: Put in order the steps to safely inspect an old commit and return to normal operation.
      type: parsons
      display: block
      lines:
      - 'git log --oneline main         # find the old commit SHA'
      - 'git switch --detach <old-sha>  # enter detached HEAD at it'
      - 'cat calculator.py              # look around, read freely'
      - 'git switch main                # return; no changes made'
      distractors:
      - 'git reset --hard <old-sha>     # DANGER: rewinds main'
      - 'git checkout <old-sha> .       # DANGER: overwrites working dir'
      - 'git branch -f main <old-sha>   # DANGER: moves branch pointer'
      explanation: Detached HEAD is the safe inspection mode — HEAD anchored to the commit, no branch pointer moved. The distractors all *modify* state (main's pointer, working directory), which is the opposite of inspection.
- title: "Rescuing Lost Work with git reflog"
  view: git_graph
  instructions: |
    ### The safety net

    Commits made in detached HEAD become orphaned the instant you
    switch away. Git keeps a **diary of every position `HEAD` has
    ever occupied**, regardless of reachability. That diary is the
    **reflog** — the recovery tool for bad rebases, dropped commits,
    hard resets, and detached-HEAD orphans.

    ### `git log --all` vs `git reflog`

    | | `git log --all` | `git reflog` |
    |---|---|---|
    | **What it walks** | Commits reachable from any branch/tag | Every position HEAD has occupied |
    | **Sees orphans?** | No — unreachable = invisible | Yes — reachability is irrelevant |
    | **Scope** | Whole repo history | Local to this clone |
    | **Retention** | Forever (until `gc`) | Default 90 days |
    | **Shared across clones?** | Yes (via push/pull) | No — local only |

    ### Task 1: Deliberately lose some work

    ```bash
    cd /tutorial/myproject
    git switch --detach HEAD
    echo "# experimental note" >> calculator.py
    git add calculator.py
    git commit -m "Experimental: add note in detached HEAD"
    git switch main
    ```

    Those detached commits are now orphaned. Confirm:

    ```bash
    git log --all --oneline
    ```

    The `Experimental` commit **does not appear** — `git log --all`
    walks refs, orphans aren't reachable from any ref.

    ### Task 2: Find the orphan with `git reflog`

    ```bash
    git reflog
    ```

    Each line: `<sha>  HEAD@{n}: <action>: <description>`. `HEAD@{0}`
    is where HEAD is now; `HEAD@{1}` is the detached-HEAD commit.
    Reflog is a literal log of HEAD movements — orphanhood doesn't
    matter to it.

    ### Task 3: Rescue the orphan with a branch

    The `@{n}` syntax works anywhere Git expects a commit ref:

    | Expression   | Meaning                        |
    |--------------|--------------------------------|
    | `HEAD@{0}`   | where HEAD is **right now**    |
    | `HEAD@{1}`   | where HEAD was **one move ago** |
    | `HEAD@{n}`   | n moves ago                    |

    Anchor a branch to the experimental commit:

    ```bash
    git branch rescued-work HEAD@{1}
    git log rescued-work --oneline
    ```

    The "lost" commit is reachable again. The full recipe: **`git reflog`
    to find the SHA, `git branch <name> <sha>` to anchor it.** Same
    recipe rescues dropped commits after interactive rebase, bad
    resets, and failed rebases.

    ### You can now

    - **Distinguish** `git log --all` (reachability walk) from
      `git reflog` (HEAD-movement diary).
    - **Recover** orphans with `git reflog` + `git branch <name> <sha>`.
    - **Know the failure mode:** reflog is local; destroying the clone
      destroys its reflog.
  setup_commands:
  - cd /tutorial/myproject
  - git switch -q main 2>/dev/null; true
  - git branch -D rescued-work 2>/dev/null; true
  solution:
    commands:
    - cd /tutorial/myproject
    - 'git show-ref --verify --quiet refs/heads/rescued-work || (git switch --detach HEAD && echo ''# experimental note'' >> calculator.py && git add calculator.py && git commit -m ''Experimental: add note in detached HEAD'' && git switch main)'
    - 'git show-ref --verify --quiet refs/heads/rescued-work || (EXP_SHA=$(git reflog | grep -m1 ''Experimental: add note'' | awk ''{print $1}'') && git branch rescued-work $EXP_SHA)'
    explanation: |
      - **`git log --all` vs `git reflog`:** the former walks the commit graph from every ref; the latter keeps a local diary of every HEAD position. Only reflog sees orphans.
      - **Reflog recovery recipe:** `git reflog` → copy the target SHA or use `HEAD@{n}` → `git branch <name> <sha>` anchors the orphan as a reachable commit.
      - **`HEAD@{n}` syntax:** "where HEAD was n movements ago." Works anywhere Git expects a commit ref — no SHA copy-pasting needed.
      - **Local only:** reflog lives in `.git/logs/HEAD`. Destroying a clone destroys its reflog. Unpublished work is only protected by backups, not by Git itself.
  tests:
  - description: Currently on main branch (not detached)
    command: cd /tutorial/myproject && git symbolic-ref -q HEAD | grep -q 'refs/heads/main'
  - description: rescued-work branch exists and points to an experimental commit (proves reflog rescue)
    command: cd /tutorial/myproject && git log rescued-work --oneline 2>/dev/null | grep -qi 'experimental'
    hints:
    - text: You need to (1) create an orphan commit in detached HEAD and switch away, then (2) use `git reflog` to find its SHA, and (3) `git branch rescued-work <sha>` to anchor it.
  quiz:
    title: git reflog — Knowledge Check
    min_score: 0.8
    shuffle: true
    questions:
    - question: You made three commits in detached HEAD state, then ran `git switch main` without creating a branch. A teammate asks if the commits are lost. What do you tell them?
      options:
      - Yes, they are permanently gone — detached HEAD commits are deleted by `git switch`
      - They are currently orphaned but still in the object database; `git reflog` can find their SHA, and `git branch rescue <sha>` makes them reachable again
      - Git automatically migrated them to the `main` branch when we switched
      - They are stored in a hidden recovery folder we can copy from
      correct_index: 1
      explanation: Orphaned commits remain in `.git/objects/` until `git gc` prunes them. `git reflog` shows every position HEAD has been at, including the orphaned one. `git branch rescue <sha>` rescues the work.
    - question: In one sentence, why can `git reflog` show commits that `git log --all` cannot?
      options:
      - '`git log --all` walks only reachable commits from refs (branches, tags); an orphan is reachable from no ref. `git reflog` logs every HEAD position regardless of reachability, so it remembers SHAs even after all references to them are gone.'
      - '`git reflog` is a newer, more powerful version of `git log`'
      - '`git log --all` is broken by default'
      - '`git reflog` reads from the remote server; `git log` only from local'
      correct_index: 0
      explanation: This is the load-bearing distinction. `git log --all` is a graph traversal starting at refs; an unreachable commit is invisible to it. `git reflog` is a literal diary of HEAD positions — reachability is irrelevant. Internalize this or later destructive commands will feel unpredictable.
    - question: What does `HEAD@{2}` mean?
      options:
      - The second commit on the current branch
      - Where `HEAD` was **two movements ago** in the reflog — usable anywhere Git expects a commit ref
      - The second parent of HEAD (like `HEAD^2`)
      - A tag named `HEAD@{2}`
      correct_index: 1
      explanation: '`HEAD@{n}` is reflog syntax — n movements back in the HEAD-position log. Different from `HEAD~n` (n commits back along first-parent chain) and `HEAD^n` (nth parent of HEAD). Three similar-looking but semantically different suffixes — get them wrong and you will end up at a different commit than you intended.'
    - question: Reflog is **local only**. Which of these destroys your reflog and the rescue path with it? (Select all that apply)
      type: multiple
      options:
      - '`rm -rf .git` (or deleting the whole clone directory)'
      - A fresh `git clone` of the same repo from the remote
      - '`git push --force` to a remote'
      - Default reflog expiry after ~90 days without activity
      correct_indices:
      - 0
      - 1
      - 3
      explanation: Reflog lives in `.git/logs/`. Destroying `.git/` (option 1) takes the reflog with it. A fresh clone (option 2) starts with an empty reflog of *that* clone. Expiry (option 4) is configurable via `gc.reflogExpire`. A force-push (option 3) rewrites the remote's *branch* but doesn't touch your local reflog — your local rescue path is still intact.
    - question: Put these steps in the correct order to rescue an orphaned commit you just made in detached HEAD.
      type: parsons
      display: block
      lines:
      - 'git switch main      # leave detached HEAD'
      - 'git reflog          # find the SHA of the orphaned commit'
      - 'git branch rescued-work HEAD@{1}      # anchor it with a branch'
      - 'git log rescued-work --oneline        # verify it is reachable again'
      distractors:
      - 'git log --all --oneline     # would NOT show the orphan'
      - 'git checkout <orphan-sha>   # needs the SHA you just lost'
      - 'git push origin rescued-work'
      explanation: The canonical rescue recipe. Distractor 1 would fail silently — `log --all` cannot see orphans. Distractor 2 needs the SHA, which was lost when the terminal scrolled. Distractor 3 is a separate sharing concern — irrelevant to rescue.
    - question: '**[Revisit Step 3 — preview]** In the next step you will see that commits are content-addressable and immutable. Given that, what does `git branch rescue <orphan-sha>` actually do to the commit object?'
      options:
      - It copies the commit into a new location
      - It does **nothing** to the commit object — it only writes a 41-byte file (`.git/refs/heads/rescue`) containing the SHA. The commit itself never moves; it just becomes reachable again via the new ref
      - It rewrites the commit's SHA so it becomes reachable
      - It restores the commit from a backup
      correct_index: 1
      explanation: Same mechanic you learned in the previous step. Creating a branch is one `fwrite()` of 41 bytes. Rescue doesn't move commits; it makes them reachable. This is why rescue is instantaneous regardless of commit size — a concept the next step formalizes as Git's object model.
- title: Relative Commit Addresses & Git's Object Database
  view: git_graph
  instructions: |
    ### The address problem

    Every advanced Git command takes a commit as an argument.
    Typing `a73f2d9c81...` by hand is error-prone. Git gives you two
    better options:

    1. **Relative references** — `HEAD~1`, `main~3`, `feature^2`.
    2. **Symbolic references** — `HEAD`, branch and tag names, ranges.

    ### Task 1: Practice relative references

    Your `main` branch has two commits. Let's name them without copying
    any SHA.

    ```bash
    cd /tutorial/myproject
    git log --oneline
    ```

    Now resolve relative references:

    ```bash
    git rev-parse HEAD        # the current commit SHA
    git rev-parse HEAD~1      # one commit before HEAD
    git rev-parse main        # same as HEAD right now
    git rev-parse main~1      # same as HEAD~1
    ```

    **`BRANCH~n`** means *n steps back along the first-parent chain*.
    **`BRANCH^`** is shorthand for `BRANCH~1`. **`BRANCH^2`** is the
    *second parent* of a merge commit (first-parent chain ignores it).

    ```gitgraph
    @startuml
    branch main:
      A "Oldest commit"
      B "main~2"
      C "HEAD~1"
      D "HEAD / main"
    head main
    @enduml
    ```

    So on this history, `feature~2 = A`, `main~2 = B`, and `HEAD~1 = C`.

    Try one more — how many commits back is the initial commit?

    ```bash
    git log --oneline | wc -l
    git rev-parse HEAD~$(($(git log --oneline | wc -l) - 1))
    ```

    That last expression jumps to the root commit without typing its SHA.

    ### Task 2: Lift the hood — Git's object database

    Every commit, file, and directory you version is stored as a
    **Git object** in `.git/objects/`. There are only three kinds:

    | Object | What it stores |
    |---|---|
    | **blob** | The raw content of a file (no filename) |
    | **tree** | A directory listing: filename → blob or sub-tree |
    | **commit** | A tree SHA + parent SHAs + author + message |

    Everything is addressed by SHA-1 of its content — a
    *content-addressable filesystem*.

    ```bash
    echo "hello world" | git hash-object --stdin
    ```

    Note the 40-character hash. Run the same command in a fresh,
    unrelated repo:

    ```bash
    cd /tmp && git init -q bob-repo && cd bob-repo
    echo "hello world" | git hash-object --stdin
    cd /tutorial/myproject
    ```

    **Identical output.** Anyone hashing the same bytes gets the same
    SHA. Deduplication across repos, branches, and history is free.

    ### Task 3: Byte-exact hashing

    **Predict:** hashing `"hello world "` with one trailing space —
    same SHA as above, or different?

    ```bash
    printf 'hello world \n' | git hash-object --stdin
    ```

    **Different.** One trailing space changes every byte of the hash.
    Content-addressability is byte-exact, not "close enough" — a file
    differing by a single invisible character gets a new blob SHA, new
    tree SHA, new commit SHA. This is why reformatter commits
    (Step 6) mask real authorship: every whitespace tweak rewrites
    the whole chain.

    ### You can now

    - **Resolve** any commit without typing a SHA using `HEAD~n`,
      `BRANCH^`, or `git rev-parse`.
    - **Prove** that Git is snapshot-based (not diff-based).
    - **Predict** that one trailing space changes the whole hash.
  setup_commands:
  - cd /tutorial/myproject && git switch main 2>/dev/null; true
  solution:
    commands:
    - cd /tutorial/myproject
    explanation: |
      - **`HEAD~n`:** n commits back along the first-parent chain. `HEAD~0` is HEAD itself, `HEAD~1` is its parent, `HEAD~2` its grandparent. `HEAD^` is equivalent to `HEAD~1`. For a merge commit, `HEAD^2` accesses the *second* parent (the merged-in branch tip).
      - **`git rev-parse`:** Converts any ref (relative, symbolic, short SHA) into a full 40-character SHA. Plumbing-level tool used internally by nearly every porcelain command.
      - **`git hash-object`:** Computes the SHA Git would assign to content. Feeding the same bytes always produces the same hash — that is what makes Git content-addressable.
      - **Why it matters:** Every advanced command later (rebase, cherry-pick, bisect) is just moving ref pointers across this immutable object graph. Once you see commits as *hashed snapshots*, not *edits*, nothing in Git is mysterious.
  tests:
  - description: On main branch with calculator.py
    command: cd /tutorial/myproject && git symbolic-ref -q HEAD | grep -q 'refs/heads/main' && [ -f calculator.py ]
  - description: You can resolve HEAD~1 (at least 2 commits on main)
    command: cd /tutorial/myproject && git rev-parse --quiet --verify HEAD~1 >/dev/null
  quiz:
    title: Relative Addresses & Object Database — Knowledge Check
    min_score: 0.8
    shuffle: true
    questions:
    - question: You want the commit **two before** `main`. Which reference is correct?
      options:
      - '`main^2`'
      - '`main~2`'
      - '`main-2`'
      - '`main..2`'
      correct_index: 1
      explanation: '`main~2` walks back 2 commits along the first-parent chain. `main^2` means the *second parent* of a merge commit — completely different. `main-2` and `main..2` are not valid syntax.'
    - question: What does `git hash-object` do?
      options:
      - Uploads the file to GitHub
      - Computes the SHA-1 Git would assign to the content — letting you prove that identical content always produces the same hash
      - Encrypts the file with a cryptographic hash
      - Compresses the file for storage
      correct_index: 1
      explanation: '`git hash-object` is the low-level plumbing that every commit uses internally. Because identical content always yields the same SHA, Git deduplicates identical files across the entire history for free.'
    - question: Which statements about Git objects are true? (Select all that apply)
      type: multiple
      options:
      - A commit object stores a reference to a tree, not the files themselves
      - A blob stores file content without the filename
      - Trees map filenames to blob or sub-tree SHAs
      - Git stores file differences (deltas) between commits, not full snapshots
      correct_indices:
      - 0
      - 1
      - 2
      explanation: Git stores **full snapshots** as blobs, not deltas. (Pack files compress with delta encoding later, but the logical model is snapshot-based.) Filenames live in tree objects, not in blobs — so two files with identical content share one blob.
    - question: '**[Revisit Step 1]** You are in detached HEAD at a commit that is 4 back from `main`. Which command prints that SHA without copying it from `git log`?'
      options:
      - '`git rev-parse main~4`'
      - '`git log main --limit 4`'
      - '`git checkout main~4`'
      - '`git show main~4`'
      correct_index: 0
      explanation: '`git rev-parse` is the universal ''ref → SHA'' translator. It accepts relative (`main~4`), symbolic (`main`), short (`a73f`), or branch/tag references. `git show` displays the full commit diff, not just the SHA. `git log --limit` is not valid syntax.'
    - question: Why does `git branch feature` complete in milliseconds even on a 10-GB repo?
      options:
      - Git compresses the whole working directory in parallel
      - It just writes one 41-byte file (`.git/refs/heads/feature`) containing the current commit SHA — no files are copied
      - Branches are stored on the remote server, not locally
      - Git skips adding the branch until you commit to it
      correct_index: 1
      explanation: A branch creation is a single `fwrite()` of 41 bytes. No copying, no traversal, no network. Once you see branches as tiny pointer files, their speed and cheapness stops being mysterious.
    - question: '**[Revisit Steps 1-2]** You enter detached HEAD at an old commit, make one exploratory commit, and switch away without creating a branch. In terms of Git objects, what happens to that commit?'
      options:
      - Git deletes the commit object immediately
      - The commit object still exists in `.git/objects` but is unreachable from any ref, so `git gc` will eventually prune it
      - The commit is moved into the `.git/orphans` directory
      - The commit is converted into a blob
      correct_index: 1
      explanation: 'Objects in Git live until garbage collection. An orphaned commit is not ''deleted'' — it is just unreachable from any ref. `git reflog` still records HEAD''s path through it, which is how `git branch rescue <sha>` can rescue it. This links Step 2''s reflog safety net to Step 3''s object-model view: unreachable ≠ deleted.'
    - question: Put in order the commands that prove Git is content-addressable (same bytes → same SHA, across unrelated repos).
      type: parsons
      display: block
      lines:
      - 'echo "hello world" | git hash-object --stdin         # in your main repo'
      - '# note the 40-char SHA — call it SHA-A'
      - 'cd /tmp && git init -q other && cd other             # fresh unrelated repo'
      - 'echo "hello world" | git hash-object --stdin         # same bytes'
      - '# output is IDENTICAL — call it SHA-B; SHA-A == SHA-B'
      distractors:
      - 'git push origin main          # sharing has nothing to do with hashing'
      - 'git config user.email alice   # author metadata is in commits, not blobs'
      - 'git commit -m "hello"         # commit SHA includes parent/time; not the demo'
      explanation: Content-addressability is a property of *bytes hashed*, independent of repo, branch, or user. Distractor 1 (push) is irrelevant — hashes are local. Distractor 2 (email) affects commit objects but not blob hashes. Distractor 3 (commit) creates a commit object whose SHA depends on parent + time + author — not the cleanest demo of blob deduplication.
- title: Saving Work Temporarily with git stash
  view: git_graph
  instructions: |
    ### The context-switch problem

    You're halfway through a feature when your lead says: **"Drop
    everything — critical bug on `main`, hotfix now."** Your choices
    without `git stash` are all bad: commit half-finished work
    (pollutes history), discard with `git restore` (permanent loss),
    or stay on your branch (can't isolate the hotfix).

    `git stash` temporarily sets aside your work-in-progress so the
    working directory is clean, then restores it.

    ### Task 1: You have been interrupted mid-work

    A half-finished `power` function is sitting at the bottom of
    `calculator.py`:

    ```python

    def power(a, b):
        # TODO: add input validation
        return a ** b
    ```

    Confirm Git sees the dirty working tree:

    ```bash
    cd /tutorial/myproject
    git status
    git diff
    ```

    ### Task 2: Stash

    ```bash
    git stash
    git status
    git stash list
    ```

    The working directory is **clean**. The half-finished `power`
    function is in the stash — not committed, not lost. Internally, a
    stash is a commit object (two, actually — index + working tree)
    stored under `.git/refs/stash`.

    ### Task 3: Do the hotfix on a dedicated branch

    With the tree clean, isolate the hotfix:

    ```bash
    git switch -c hotfix-divide-zero
    ```

    Now open `calculator.py` in the editor and add this function at the
    bottom:

    ```python

    def safe_divide(a, b):
        """Divide a by b, raising ValueError on zero denominator."""
        if b == 0:
            raise ValueError("Cannot divide by zero")
        return a / b
    ```

    Save it. Back in the terminal, commit and merge:

    ```bash
    git add calculator.py
    git commit -m "Hotfix: add safe_divide to prevent zero-division errors"
    git switch main
    git merge hotfix-divide-zero --no-edit
    git branch -d hotfix-divide-zero
    ```

    ### Task 4: Recover your stashed work

    ```bash
    git stash pop
    git status
    git stash list    # now empty
    ```

    Your `power` function work-in-progress is restored — `pop` removes
    the stash after applying. The stash list is empty.

    ### Stash reference

    | Command | Effect |
    |---|---|
    | `git stash` | Save tracked modifications + staged changes; clean working tree |
    | `git stash list` | Show all stash entries (stack) |
    | `git stash pop` | Restore the most recent stash **and** drop it |
    | `git stash apply` | Restore the most recent stash but **keep** it |
    | `git stash drop` | Delete the most recent stash without applying |
    | `git stash push -m "msg"` | Save with a descriptive message |
    | `git stash -u` | Also include **untracked** files (new files never `git add`-ed) |

    > **Gotcha:** Plain `git stash` ignores untracked files. A brand-new
    > file you have never `git add`-ed stays in the working directory.
    > Use `git stash -u` if you need to include it.

    ### Task 5: Finish the feature properly

    Edit `calculator.py` in the editor. Finalize the `power` function
    with proper validation, then commit with a descriptive message.
    (The test checks for "power" in the commit message.)

    ```python
    def power(a, b):
        """Return a raised to the power of b."""
        if not isinstance(a, (int, float)) or not isinstance(b, (int, float)):
            raise TypeError("Arguments must be numbers")
        return a ** b
    ```

    ### You can now

    - **Context-switch cleanly** mid-work: stash, do the urgent task,
      pop back to where you were — without polluting history.
    - **Distinguish** `pop` from `apply`, and know when each is
      appropriate.
    - **Diagnose** why `git stash` sometimes seems to "miss" a new
      file (it was untracked; need `-u`).
  watch_files:
  - myproject/calculator.py
  open_file: myproject/calculator.py
  setup_commands:
  - "cd /tutorial/myproject\ngit switch -q main 2>/dev/null\nwhile git stash list | grep -q '.'; do git stash drop -q 2>/dev/null || break; done\nif ! grep -q 'def power' calculator.py; then\n  printf '\\ndef power(a, b):\\n    # TODO: add input validation\\n    return a ** b\\n' >> calculator.py\nfi\n"
  solution:
    files:
    - path: myproject/calculator.py
      content: "\"\"\"A simple calculator module.\"\"\"\ndef add(a, b): return a + b\n\ndef divide(a, b): return a / b\n\ndef safe_divide(a, b):\n    \"\"\"Divide a by b, raising ValueError on zero denominator.\"\"\"\n    if b == 0:\n        raise ValueError(\"Cannot divide by zero\")\n    return a / b\n\ndef power(a, b):\n    \"\"\"Return a raised to the power of b.\"\"\"\n    if not isinstance(a, (int, float)) or not isinstance(b, (int, float)):\n        raise TypeError(\"Arguments must be numbers\")\n    return a ** b\n"
      language: python
    commands:
    - cd /tutorial/myproject && git switch main
    - 'grep -q ''def power'' calculator.py || printf ''\ndef power(a, b):\n    # TODO: add input validation\n    return a ** b\n'' >> calculator.py'
    - git diff --quiet || git stash
    - (git branch -D hotfix-divide-zero 2>/dev/null; true) && git switch -c hotfix-divide-zero
    - grep -q 'def safe_divide' calculator.py || printf '\ndef safe_divide(a, b):\n    if b == 0:\n        raise ValueError("Cannot divide by zero")\n    return a / b\n' >> calculator.py
    - git add calculator.py
    - 'git diff --cached --quiet || git commit -m ''Hotfix: add safe_divide to prevent zero-division errors'''
    - git switch main
    - grep -q 'def safe_divide' calculator.py || git merge hotfix-divide-zero --no-edit
    - git branch -D hotfix-divide-zero 2>/dev/null; true
    - git stash pop
    - git add calculator.py
    - git diff --cached --quiet || git commit -m 'Add power function with input validation'
    explanation: |
      - **`git stash`:** snapshots tracked modifications and staged changes into a stash commit in `.git/refs/stash`, then resets the working tree to match HEAD. Untracked files are **not** included unless you use `git stash -u`.
      - **`git stash pop`:** applies the top stash and removes it. Conflicts surface exactly like merge conflicts — resolve them, then `git add` and commit (or drop the stash manually).
      - **Why not just `git commit -m "WIP"`?** A WIP commit pollutes shared history if pushed. The stash is *private, local, and temporary* — no risk of shipping half-baked work.
      - **Internal:** a stash is stored as a merge commit reachable via `refs/stash`. Its **first parent** is HEAD at stash time; its **second parent** is a commit recording the **index** state. With `git stash -u`, a **third parent** records the untracked files. This is why `git stash apply <sha>` works even on detached stashes.
  tests:
  - description: Stash is empty (work was popped and committed)
    command: cd /tutorial/myproject && [ $(git stash list | wc -l) -eq 0 ]
  - description: calculator.py contains the safe_divide hotfix
    command: cd /tutorial/myproject && grep -q 'def safe_divide' calculator.py
  - description: power function has been committed
    command: cd /tutorial/myproject && git log --oneline | grep -qi 'power'
  - description: Working tree is clean
    command: cd /tutorial/myproject && git diff --quiet && git diff --cached --quiet
  quiz:
    title: git stash — Knowledge Check
    min_score: 0.8
    shuffle: true
    questions:
    - question: You are mid-edit on `app.py` when your lead asks for an urgent hotfix on `main`. You have NOT staged your changes yet. Which approach keeps your tree clean for the hotfix **without** losing your in-progress work?
      options:
      - '`git restore app.py` — discards the edits'
      - '`git commit -m ''WIP''` — commits the half-finished changes'
      - '`git stash` — saves modifications to a temporary holding area and cleans the tree'
      - '`git reset --hard` — resets everything so you can restart later'
      correct_index: 2
      explanation: '`git stash` is built for this: save tracked modifications and staged changes to a private stack, reset the tree, let you context-switch cleanly. Recovered with `git stash pop`.'
    - question: What does `git status` report immediately after `git stash`?
      options:
      - Your modified files appear staged and ready to commit
      - Your modified files appear untracked — Git has forgotten about them
      - '`nothing to commit, working tree clean`'
      - An error, because `git status` cannot be run after stashing
      correct_index: 2
      explanation: '`git stash` resets the working tree to match HEAD — so `git status` reports clean. Your changes are safe in the stash commit at `refs/stash`.'
    - question: Difference between `git stash pop` and `git stash apply`?
      options:
      - '`pop` restores AND removes the stash entry; `apply` restores but keeps the entry'
      - '`pop` works only on the oldest entry; `apply` works on any entry'
      - '`apply` creates a new commit; `pop` does not'
      - They are identical
      correct_index: 0
      explanation: Use `pop` for the usual workflow. Use `apply` when you want the same stash on multiple branches — the entry stays in the list until you manually `git stash drop`.
    - question: You ran `git stash` but your brand-new file `feature.py` (never `git add`-ed) is still there. Why?
      options:
      - The file is too large to stash
      - By default, `git stash` only stores tracked file changes; untracked files need `git stash -u`
      - '`git stash` needs a message for untracked files; use `git stash push -m`'
      - Git ignores files starting with `.`
      correct_index: 1
      explanation: Plain `git stash` only captures what Git is tracking — modified tracked files and staged changes. For brand-new files, use `git stash -u` (`--include-untracked`).
    - question: '**[Evaluate]** A teammate says: ''I never use stash — I just commit with `WIP` and squash later.'' Best evaluation?'
      options:
      - WIP is strictly better — stashes can be accidentally dropped
      - Equivalent — personal preference only
      - Both work; WIP pollutes shared history if pushed and requires disciplined squash, stash stays private/local. Mature teams have conventions for both
      - WIP is wrong — Git rejects commits with that message
      correct_index: 2
      explanation: Both preserve work. The difference is visibility. Pushed WIP commits enter shared history and degrade `git log`, `git bisect`, and code review. Stash is private — no pollution, but you can forget it. Neither is universally right.
    - question: '**[Revisit Step 1]** You stashed on `main`, then switched to a commit with `git switch --detach HEAD~2` to inspect old code. What is the safe way to recover the stash?'
      options:
      - Run `git stash pop` here — stash works in any HEAD state
      - Return to a named branch first (`git switch main`), then `git stash pop` — applying a stash in detached HEAD risks creating orphaned state if conflicts arise
      - The stash is lost — it was tied to `main`
      - Run `git stash apply detached` to redirect it
      correct_index: 1
      explanation: Stashes are not tied to a branch — but a conflicting pop in detached HEAD leaves you with unresolved changes and nothing anchoring them. Always return to a named branch before popping.
    - question: '**[Revisit Step 3]** Where does Git physically store a stash entry?'
      options:
      - As a plain text file in `.git/stash.txt`
      - As a commit object (actually two — index + working tree) reachable via `refs/stash` — the same object model as any other commit
      - In RAM only; restarting the shell loses it
      - In the remote repository
      correct_index: 1
      explanation: A stash is a proper commit in the object database, anchored by `refs/stash`. This is why `git stash` survives across terminals and reboots, and why `git stash apply <sha>` works with any historical stash. Same object model as Step 3 — stash is not a special case.
    - question: Put in order the complete "stash → hotfix → resume" workflow from Task 3 of this step.
      type: parsons
      display: block
      lines:
      - 'git stash                       # save WIP, clean working tree'
      - 'git switch -c hotfix-xyz        # dedicated branch for the hotfix'
      - 'git commit -am "Hotfix: ..."    # fix + commit on the hotfix branch'
      - 'git switch main && git merge hotfix-xyz --no-edit'
      - 'git branch -d hotfix-xyz        # clean up the merged hotfix branch'
      - 'git stash pop                   # restore your WIP on main'
      distractors:
      - 'git commit -m "WIP"             # pollutes history if pushed'
      - 'git restore .                   # discards WIP permanently'
      - 'git stash drop                  # would throw away the WIP'
      - 'git push origin stash           # you cannot push a stash'
      explanation: The canonical context-switch sequence. Each distractor is a common novice mistake — committing WIP pollutes shared history; `git restore` destroys work; dropping the stash before popping loses it; stashes are local-only (no push). Learn this six-line sequence as a unit.
- title: 'Cherry-Pick: Copy One Specific Commit'
  view: git_graph
  instructions: |
    ### The problem

    Your lead asks: *"The bugfix in commit `b73f...` on the
    `experimental` branch also applies to `main`. Pull in just that
    one commit — not the rest of the branch."*

    `git cherry-pick <sha>` computes the patch of that commit against
    its parent, applies it on top of HEAD, and creates a **new commit**
    with the same changes but a different SHA.

    **Before** — `experimental` has commits `α β γ`; `main` stops at `C`:

    ```gitgraph
    @startuml
    branch main:
      A "Initial"
      B "Shared base"
      C "Refactor"

    branch experimental from B:
      α "α — work-in-progress"
      β "β — the one to backport"
      γ "γ — more work"

    head main
    @enduml
    ```

    **After** `git cherry-pick β` — a new commit `β'` lands on `main` carrying the same patch as `β`, while `experimental` is unchanged:

    ```gitgraph
    @startuml
    branch main:
      A "Initial"
      B "Shared base"
      C "Refactor"
      β' "β' — cherry-picked copy of β"

    branch experimental from B:
      α "α — unchanged"
      β "β — original"
      γ "γ — unchanged"

    head main
    @enduml
    ```

    The copy is a **new commit object** — same patch, new parent, new SHA,
    same message.

    ### Task 1: Inspect the pre-built `experimental` branch

    The tutorial has already created an `experimental` branch with two
    commits — a half-baked `experimental_multiply` (not ready), and a
    reusable `absolute` value function you want to backport. Inspect:

    ```bash
    git log experimental --oneline
    git diff main experimental -- calculator.py
    ```

    You want only the **second** commit on main, not the half-baked
    one. Time to cherry-pick.

    You want only the **second** commit (`Add absolute value function`)
    on `main`, not the half-baked experimental multiply.

    ### Task 2: Return to main and cherry-pick

    ```bash
    git switch main
    git log experimental --oneline
    ```

    Copy the SHA of the `Add absolute value function` commit, then:

    ```bash
    git cherry-pick <that-sha>
    ```

    Or avoid copying the SHA entirely by using a relative reference —
    since `Add absolute value function` is the **tip** of `experimental`:

    ```bash
    git cherry-pick experimental
    ```

    Now check:

    ```bash
    git log --oneline
    cat calculator.py
    ```

    You will see a new commit on `main` with message
    `Add absolute value function`. Its SHA is **different** from the
    original on `experimental`, but the patch is identical.

    A commit's SHA hashes `tree + parent(s) + author + committer +
    message`. The cherry-picked commit has a different parent (tip of
    main, not experimental), so the SHA changes. Same patch, new
    identity.

    ### Task 3: Handle a cherry-pick conflict

    Cherry-picks can conflict — the patch does not apply cleanly. Let's
    force one. Make sure you are on `main`, then in the editor change
    the line `def add(a, b): return a + b` to a multi-line version with
    a docstring:

    ```python
    def add(a, b):
        """Return the sum of two numbers."""
        return a + b
    ```

    Save, then commit:

    ```bash
    git add calculator.py
    git commit -m "Document add function"
    ```

    Now switch to `experimental` and make a **different** change to the
    same line. Switch first:

    ```bash
    git switch experimental
    ```

    In the editor, change `def add(a, b): return a + b` to:

    ```python
    def add(a, b): return a + b  # simple addition
    ```

    Save, then commit:

    ```bash
    git add calculator.py
    git commit -m "Inline comment on add"
    ```

    Attempt to cherry-pick the conflicting commit onto main:

    ```bash
    git switch main
    git cherry-pick experimental
    ```

    Git will report a conflict. Inspect:

    ```bash
    git status
    cat calculator.py
    ```

    You will see conflict markers `<<<<<<<`, `=======`, `>>>>>>>` in
    the editor.

    > Merge/cherry-pick conflicts are not failures — Git is saying
    > "two valid changes touched the same lines; a human must decide
    > how to combine them."

    Resolve the conflict by keeping the docstring
    **and** the inline comment — edit in the editor so the block reads:

    ```python
    def add(a, b):
        """Return the sum of two numbers."""
        return a + b  # simple addition
    ```

    (Delete the `<<<<<<<`, `=======`, `>>>>>>>` markers as you go.)
    Save, then complete the cherry-pick:

    ```bash
    git add calculator.py
    git cherry-pick --continue
    ```

    If you had wanted to bail out entirely, `git cherry-pick --abort`
    would restore `main` to before the cherry-pick.

    ### You can now

    - **Recognize** when cherry-pick is the right tool (one-commit
      backport) versus the wrong tool (many-commit integration).
    - **Resolve** a cherry-pick conflict end-to-end: inspect markers,
      edit to merge both sides, `git add`, `git cherry-pick --continue`.
    - **Explain** why the copied commit has a new SHA, invoking the
      object-model reasoning from Step 3.
  watch_files:
  - myproject/calculator.py
  open_file: myproject/calculator.py
  setup_commands:
  - "cd /tutorial/myproject\ngit cherry-pick --abort 2>/dev/null\ngit switch -q main 2>/dev/null\nif git log experimental --oneline 2>/dev/null | grep -q 'Add absolute value function'; then\n  exit 0\nfi\ngit branch -D experimental 2>/dev/null\ngit switch -qc experimental\nprintf '\\ndef experimental_multiply(a, b):\\n    # half-baked — uses addition in a loop\\n    result = 0\\n    for _ in range(b):\\n        result += a\\n    return result\\n' >> calculator.py\ngit commit -qam 'Add experimental multiply (not ready)'\nprintf '\\ndef absolute(x):\\n    \"\"\"Return |x| — handles negatives, zero, and positives.\"\"\"\\n    return x if x >= 0 else -x\\n' >> calculator.py\ngit commit -qam 'Add absolute value function'\ngit switch -q main\n"
  solution:
    commands:
    - cd /tutorial/myproject
    - git cherry-pick experimental
    - 'sed -i ''s/def add(a, b): return a + b/def add(a, b):\n    """Return the sum of two numbers."""\n    return a + b/'' calculator.py'
    - git add calculator.py
    - git commit -m 'Document add function'
    - git switch experimental
    - 'sed -i ''s/def add(a, b): return a + b/def add(a, b): return a + b  # simple addition/'' calculator.py'
    - git add calculator.py
    - git commit -m 'Inline comment on add'
    - git switch main
    - git cherry-pick experimental || true
    - sed -i 's/<<<<<<<.*//; s/=======//; s/>>>>>>>.*//' calculator.py
    - git add calculator.py
    - GIT_EDITOR=true git cherry-pick --continue || git commit --no-edit
    explanation: |
      - **Cherry-pick = patch + replay:** Git diffs the target commit against its parent, applies the diff on top of HEAD, creates a new commit. The original commit is untouched.
      - **New SHA:** The cherry-picked commit has a different parent on main, so its content and SHA differ from the source. This is fine for isolated fixes but means `git log` will show it as "new" even though the patch is identical.
      - **Conflicts:** When the patch does not apply cleanly, Git pauses the cherry-pick. Resolve conflicts in the working tree, `git add` the files, then `git cherry-pick --continue`. Use `--abort` to bail out and restore the pre-cherry-pick state.
      - **Use cases:** Backporting a fix to a release branch, pulling a reviewed commit into main while leaving the rest of the branch, un-stashing one commit from a rejected pull request.
  tests:
  - description: On main branch
    command: cd /tutorial/myproject && git symbolic-ref -q HEAD | grep -q 'refs/heads/main'
  - description: main contains the absolute value function (cherry-picked)
    command: cd /tutorial/myproject && grep -q 'def absolute' calculator.py && git log --oneline | grep -qi 'absolute value'
  - description: main does NOT contain experimental_multiply
    command: cd /tutorial/myproject && ! grep -q 'def experimental_multiply' calculator.py
  - description: main includes a commit with 'Document' or 'comment' in the message
    command: cd /tutorial/myproject && git log --oneline | grep -qiE 'document|comment'
  - description: No unresolved conflict markers remain
    command: cd /tutorial/myproject && ! grep -E '^(<{7}|={7}|>{7})' calculator.py
  quiz:
    title: Cherry-Pick — Knowledge Check
    min_score: 0.8
    shuffle: true
    questions:
    - question: What does `git cherry-pick <sha>` do?
      options:
      - Permanently moves the commit from its original branch to the current branch
      - Computes the patch of that commit vs its parent and creates a new commit on the current branch applying the same patch
      - Merges the entire branch containing that commit
      - Renames the commit on the current branch
      correct_index: 1
      explanation: Cherry-pick replays one commit as a *new* commit on HEAD. The source commit is unchanged. The new commit has the same patch and message but a new parent and therefore a new SHA.
    - question: You cherry-pick commit `abc123` from `experimental` onto `main`. Afterwards, what is on `experimental`?
      options:
      - '`abc123` has been removed from `experimental`'
      - '`abc123` is still on `experimental`, unchanged — cherry-pick copies, not moves'
      - '`experimental` now points to `main`'
      - '`experimental` has been deleted'
      correct_index: 1
      explanation: Cherry-pick is a copy operation. The source commit stays where it is. Two commits with the same patch now live in two branches with different SHAs.
    - question: During a cherry-pick, Git reports a conflict. Which sequence correctly completes it?
      options:
      - Delete the conflicted file and run `git cherry-pick --continue`
      - Resolve conflicts in the file, `git add` the file, then `git cherry-pick --continue`
      - Run `git cherry-pick --force` to override the conflict
      - Run `git commit --amend` to finalize the cherry-pick
      correct_index: 1
      explanation: 'Standard conflict resolution: edit the file to remove `<<<<<<<` markers, `git add` to mark as resolved, `git cherry-pick --continue` (opens editor for message, which defaults to the original). `--abort` bails and restores HEAD.'
    - question: '**[Revisit Step 3]** After a cherry-pick, the new commit has a different SHA from the source. Why?'
      options:
      - Cherry-pick mutates the patch content
      - The new commit has a different parent, and a commit's SHA hashes its tree + parent(s) + metadata — any change alters the SHA
      - Git randomly regenerates SHAs for safety
      - The new commit has no parent at all
      correct_index: 1
      explanation: A commit's SHA is `SHA-1(tree + parent(s) + author + committer + message)`. Same patch on a different parent → different tree (possibly) and definitely different parent reference → different SHA. Chapter 2's object-model lesson makes this inevitable.
    - question: Which scenario is a **bad** fit for cherry-pick?
      options:
      - Backporting a single bugfix from main to a release branch
      - Pulling one reviewed commit from a colleague's branch while the rest is still in review
      - Integrating all 50 commits of a long-running feature branch into main
      - Applying the same emergency patch to three parallel maintenance branches
      correct_index: 2
      explanation: For integrating many commits, use `git merge` or `git rebase` — cherry-picking 50 commits by hand is laborious and loses merge base information, which complicates future merges. Cherry-pick is surgical — reserve it for one or a few commits.
    - question: '**[Revisit Step 4]** Mid-cherry-pick, a conflict pauses Git. You realize you need to check something on another branch first. Which sequence safely preserves your conflict-resolution progress so far?'
      options:
      - '`git stash` — stashes work across branches, including mid-cherry-pick state'
      - '`git cherry-pick --abort` first to restore a clean state, then switch; re-do the cherry-pick when you return'
      - Just `git switch other-branch` — Git will remember the cherry-pick
      - '`git commit -m ''WIP conflict'' --allow-empty` to save the mid-state'
      correct_index: 1
      explanation: You cannot cleanly stash or switch with an in-progress cherry-pick — Git's internal state (MERGE_MSG, CHERRY_PICK_HEAD, conflicted index) is not stash-compatible. Abort, switch, do the other task, come back, and re-start the cherry-pick. The abort is cheap and restores a clean state.
    - question: Put in order the commands that resolve a conflicted cherry-pick end-to-end.
      type: parsons
      display: block
      lines:
      - 'git switch main                        # be on the target branch'
      - 'git cherry-pick <sha>                  # CONFLICT reported'
      - 'git status                             # see which files conflict'
      - '# edit the conflicted file: remove <<<<<<<, =======, >>>>>>> markers'
      - 'git add <file>                         # mark resolved'
      - 'git cherry-pick --continue             # finalize with original message'
      distractors:
      - 'git commit -m "resolve conflict"       # breaks the cherry-pick flow'
      - 'git cherry-pick --force                # not a real flag'
      - 'git merge --continue                   # wrong verb — not a merge'
      - 'git reset --hard                       # would abort + discard'
      explanation: The post-conflict verb is `cherry-pick --continue`, not `commit`. The other distractors are common reflex mistakes — `--force` doesn't exist here; `merge --continue` is a different operation; `reset --hard` discards rather than finalizes. Use `--abort` to bail out cleanly.
- title: 'git blame: Who Last Changed This Line (and Why)?'
  view: editor
  instructions: |
    ### The forensic question

    You spot a suspicious line in `calculator.py` and want to know:
    who last changed it, when, and **why**. `git blame` answers all
    three. Used for *context* (not accusation), it's one of the most-used
    commands in professional development.

    The real workflow is two commands:

    1. `git blame -L <start>,<end> <file>` → find the SHA that last
       touched the line.
    2. `git show <sha>` → read the commit message and diff — where
       the *why* lives.

    ### Flag reference

    | Flag | Use when |
    |---|---|
    | `-L start,end` | You know roughly which lines matter |
    | `-w` | A reformatter masked the real author |
    | `-C -M` | A line was moved/copied across files |
    | `blame.ignoreRevsFile` | Permanently skip known reformat commits |

    ### Task 1: Find why a line exists

    ```bash
    git blame -L 7,7 calculator.py
    # Copy the SHA from the first column, then:
    git show <that-sha>
    ```

    You now know who, when, and why — that's 90% of real blame usage.

    ### Task 2: The reformatter-masked authorship case

    The setup planted:
    - **Bob** wrote the `clip` function.
    - **CI-Bot** ran a whitespace-normalization job after — no functional
      change, just whitespace.

    **Predict:** who will plain `git blame` name as the last author of
    the `def clip(...)` line?

    ```bash
    git blame -L 1,$(wc -l < calculator.py) calculator.py | grep -i 'clip'
    ```

    "Last to touch" wins — plain blame names CI-Bot, masking Bob.
    Grab the SHA and inspect:

    ```bash
    git log --oneline -10
    git show <ci-bot-sha>
    ```

    Pure whitespace diff. Now add `-w` to skip whitespace-only changes:

    ```bash
    git blame -w -L 1,$(wc -l < calculator.py) calculator.py | grep -i 'clip'
    ```

    The author column changes to Bob — the real logic author. On teams
    with recurring formatter commits, configure `blame.ignoreRevsFile`:

    ```bash
    echo "<ci-bot-sha>" >> .git-blame-ignore-revs
    git config blame.ignoreRevsFile .git-blame-ignore-revs
    ```

    GitHub's web blame UI honors this file too.

    ### Task 3: Contrast — when blame is NOT masked

    Run blame on a line CI-Bot never touched:

    ```bash
    git blame -L 1,$(wc -l < calculator.py) calculator.py | grep -i 'def add'
    ```

    Plain blame already shows the real author — `-w` is a no-op here.
    That's the pattern: `-w` matters only when a reformatter was the
    last toucher.

    ### You can now

    - **Chain** `git blame -L` → `git show` to answer "why does this
      line exist?".
    - **Predict** when plain blame will lie (reformatter was last toucher).
    - **Defuse** with `-w` or `blame.ignoreRevsFile`.
    - **Recognize** blame's limit: it cannot see *missing* lines.
  setup_commands:
  - cd /tutorial/myproject && git switch main 2>/dev/null; true
  - cd /tutorial/myproject && (git log --all --oneline 2>/dev/null | grep -q 'auto-format via whitespace-normalize' || grep -q 'def clip' calculator.py) || printf '\ndef clip(x, lo, hi):    \n    """Clip x to [lo, hi]."""    \n    if x < lo:\n        return lo\n    if x > hi:\n        return hi\n    return x\n' >> calculator.py
  - cd /tutorial/myproject && git diff --quiet calculator.py || GIT_AUTHOR_NAME=Bob GIT_AUTHOR_EMAIL=bob@example.com GIT_COMMITTER_NAME=Bob GIT_COMMITTER_EMAIL=bob@example.com git commit -qam 'feat: add clip function'
  - cd /tutorial/myproject && git log --all --oneline 2>/dev/null | grep -q 'auto-format via whitespace-normalize' || sed -i 's/ *$//' calculator.py
  - cd /tutorial/myproject && git diff --quiet calculator.py || GIT_AUTHOR_NAME=CI-Bot GIT_AUTHOR_EMAIL=ci@example.com GIT_COMMITTER_NAME=CI-Bot GIT_COMMITTER_EMAIL=ci@example.com git commit -qam 'CI: auto-format via whitespace-normalize'
  solution:
    commands:
    - cd /tutorial/myproject
    - SHA=$(git blame -L 7,7 calculator.py | awk '{print $1}' | tr -d '^') && git show $SHA
    explanation: |
      - **`git blame <file>`:** Shows, for every line, the SHA / author / timestamp of the commit that last modified it.
      - **`-L start,end`:** Restrict to a line range — avoids hundreds of irrelevant lines on large files.
      - **`-w`:** Ignore whitespace-only changes so reformatting commits do not shadow the real author.
      - **`-C -M`:** Follow moves and copies across the file; essential when a line was refactored into a new location.
      - **Workflow:** use blame to find the SHA, then `git show <sha>` to read the full commit message and diff. That is where the *why* lives.
  tests:
  - description: calculator.py exists and has at least 2 commits in its history
    command: cd /tutorial/myproject && [ -f calculator.py ] && [ $(git log --oneline -- calculator.py | wc -l) -ge 2 ]
  - description: Blame runs without error on calculator.py
    command: cd /tutorial/myproject && git blame calculator.py >/dev/null
  - description: Blame reports per-line SHA + author + timestamp (format check)
    command: cd /tutorial/myproject && git blame calculator.py | head -1 | grep -qE '^[\^a-f0-9]+ .* \([^)]+[0-9]+\)'
  - description: -L line-range flag works (returns output for specified range)
    command: cd /tutorial/myproject && [ -n "$(git blame -L 1,3 calculator.py 2>/dev/null)" ]
  quiz:
    title: git blame — Knowledge Check
    min_score: 0.8
    shuffle: true
    questions:
    - question: What does `git blame calculator.py` show?
      options:
      - A list of bugs that were found in `calculator.py`
      - 'For every line in the file: the SHA, author, and timestamp of the commit that last modified that line'
      - The remote collaborators who have access to the file
      - The diff of the most recent commit that touched the file
      correct_index: 1
      explanation: 'Blame gives per-line provenance — the last-touching commit and author. Combined with `git show <sha>`, you see the full context: why the line was written this way.'
    - question: You need to know the commit message for line 42's last modification. Which sequence gets you there fastest?
      options:
      - '`git log calculator.py | grep 42`'
      - '`git blame -L 42,42 calculator.py` to get the SHA, then `git show <sha>` for the message and diff'
      - '`git diff calculator.py` to see what changed'
      - '`git status calculator.py`'
      correct_index: 1
      explanation: '`git blame -L 42,42` restricts output to line 42 only — instant. The first column is the SHA; pipe that SHA into `git show` for the full message. This two-step recipe is idiomatic.'
    - question: A colleague recently ran `black` across the whole repository. Now `git blame` shows them as the author of every line. How do you see the *real* last-meaningful author?
      options:
      - Revert the `black` commit
      - Use `git blame -w` to ignore whitespace-only changes, and/or configure `blame.ignoreRevsFile` to exclude the `black` commit SHA
      - Git has no way to recover this information
      - Use `git reflog` to rewind blame
      correct_index: 1
      explanation: '`-w` ignores whitespace-only changes, hiding pure reformatting from blame. For recurring formatters, add the reformat commit SHAs to a file referenced by `blame.ignoreRevsFile` — now everyone skips them consistently.'
    - question: '**[Revisit Step 3]** When `git blame` prints a SHA for a line, what kind of object does that SHA refer to?'
      options:
      - A blob object containing just that one line
      - A tree object for the file's containing directory
      - A commit object — the last one that modified that line
      - A stash entry
      correct_index: 2
      explanation: Blame attributes lines to commits. The SHA printed is a commit SHA — run `git cat-file -t <sha>` to confirm it reports `commit`. You then use `git show <sha>` to read it.
    - question: When is `git blame` the **wrong** tool for finding a bug?
      options:
      - When the bug is a missing line that was never added
      - When you need to know who last modified a specific line
      - When you need the timestamp of a line
      - When you need the commit message behind a line
      correct_index: 0
      explanation: Blame only tells you about *existing* lines. A bug caused by an *absent* line (e.g., forgetting to call `validate()`) leaves blame blind. For regressions introduced by a missing line, use `git bisect` (next step) or `git log -p` to scan history.
    - question: '**[Analyze]** Give a concrete bug where `git blame` would mislead you even though the culprit line IS in the file. Which of the following fits best?'
      options:
      - A one-character typo fixed by a teammate — blame shows the typo's original commit, not the fix
      - A logic bug in a line that was auto-reformatted by a CI script last week — plain blame points at the CI bot, not the author who introduced the logic bug
      - A commit that was cherry-picked to `main` from `experimental`
      - A commit that was merged via a merge commit
      correct_index: 1
      explanation: 'Reformatter commits are the classic blame-mislead scenario. The CI bot''s commit ''last touched'' every line, so blame attributes all lines to the bot — hiding the real author who introduced the logic bug. Defense: `git blame -w` to skip whitespace-only changes, or `blame.ignoreRevsFile` to skip known reformat commits.'
    - question: '**[Revisit Step 4]** You are about to run `git blame` on a file. Your working directory has uncommitted changes to that file. Will blame show you the committed lines or your uncommitted edits?'
      options:
      - Your uncommitted edits — blame always reflects the current working tree
      - The committed lines — blame operates on the file's most recent committed state, so your unstaged edits are invisible to it
      - Both, merged together with conflict markers
      - Git refuses to run blame until changes are committed or stashed
      correct_index: 1
      explanation: Blame operates on committed history. Your uncommitted edits are invisible to blame — which is usually what you want (you are trying to find who wrote the *committed* version of a line). If you want to clear uncommitted changes first to compare cleanly, `git stash` (Step 4) is a non-destructive option.
    - question: Put in order the "forensic chain" for understanding why a specific line in `parser.py` exists.
      type: parsons
      display: block
      lines:
      - 'git blame -L 42,42 parser.py                 # find SHA of last change to line 42'
      - '# copy the SHA from the first column'
      - 'git show <that-sha>                          # read commit message + full diff'
      - '# is the commit message a reformatter? If yes, try -w:'
      - 'git blame -w -L 42,42 parser.py              # ignore whitespace-only commits'
      distractors:
      - 'git log parser.py | grep 42    # slow, imprecise'
      - 'git diff HEAD parser.py        # shows YOUR uncommitted edits, not authorship'
      - 'git status parser.py           # unrelated to authorship'
      explanation: The blame → show chain answers "why does this line exist?" The `-w` fallback defuses reformatter masking. The distractors are all plausible-looking commands that don't answer the authorship question — common cul-de-sacs when learners panic-grep instead of reaching for blame.
- title: 'git bisect: Binary Search for the Commit That Broke Things'
  view: editor
  instructions: |
    ### The scenario

    It is Friday. Tests passed yesterday. Today `pytest` reports a
    failure. You have made **~30 commits** in between. Which one broke it?

    Reading 30 diffs by hand is slow and error-prone. `git blame` only
    helps if you know the guilty line (you usually don't). `git log
    --grep="fix"` is hopeful guessing.

    `git bisect` runs a **binary search** across history. It needs:

    1. A commit where the test **passed** (`good`).
    2. A commit where the test **fails** (`bad`, usually HEAD).
    3. A command (or manual judgment) to test each candidate.

    With 30 commits, it takes `log2(30) ≈ 5` tests to pinpoint the
    exact breaking commit. Scales beautifully: 1000 commits → 10 tests.

    ### Task 1: Inspect the broken project

    The tutorial has pre-built a regression for you to hunt:

    - `test_calculator.py` — a regression test that used to pass.
    - 5 unrelated-looking commits on top of it, **one of which
      silently broke the `absolute` function.** Your job is to find
      which one.

    First, see the history:

    ```bash
    git log --oneline -7
    ```

    You will see commits like `Refactor: tidy docstring`, `Add unused
    helper comment`, `Simplify absolute`, `Later tweak`, `Even later
    tweak`.

    Now confirm the test fails:

    ```bash
    python3 test_calculator.py
    ```

    You should see an `AssertionError` on the `absolute(-4) == 4` line —
    proof that *something* in the last 5 commits broke it.

    ### Task 2: Run bisect manually

    Start the search. Mark the current state `bad` and an earlier-known-good
    commit `good`:

    ```bash
    git bisect start
    git bisect bad HEAD
    git bisect good HEAD~5
    ```

    Git checks out a commit in the middle and prompts you. Test it:

    ```bash
    python3 test_calculator.py
    ```

    Based on the result:

    - **Tests pass** → `git bisect good`
    - **Tests fail** → `git bisect bad`

    Repeat 2-3 times. Git narrows the range each step. When it
    finishes, it prints the first bad commit and its full message.

    When done, always clean up:

    ```bash
    git bisect reset
    ```

    ### Task 3: Automate with `git bisect run`

    Manually marking good/bad is tedious. If the test script returns
    **exit 0 on pass**, **non-zero on fail**, bisect can automate the
    whole search:

    ```bash
    git bisect start HEAD HEAD~5
    git bisect run python3 test_calculator.py
    git bisect reset
    ```

    `git bisect run` invokes the command at each candidate commit and
    uses the exit code to decide good/bad. It reports the culprit and
    exits, no user input needed. This is the feature you will use on
    real projects.

    ### Task 4: Fix the bug you just found

    Bisect pointed at the `Simplify absolute (BUG: removes negation!)`
    commit. In the editor, open `calculator.py` and find the
    `absolute` function. Restore its correct body:

    ```python
    def absolute(x):
        """Return |x| — handles negatives, zero, and positives."""
        return x if x >= 0 else -x
    ```

    Save, then commit the fix:

    ```bash
    git commit -am "Fix: restore negation in absolute"
    ```

    Verify the tests pass:

    ```bash
    python3 test_calculator.py
    ```

    You should see `all tests pass`. The regression is closed.

    ### You can now

    - **Decide** whether bisect is worth it for a given regression
      (rule of thumb: ≥ ~5 commits or slow tests → yes).
    - **Run** an automated bisect with `git bisect start HEAD
      <known-good>; git bisect run <cmd>` — and always end with `git
      bisect reset`.
    - **Recognize** scenarios where blame (Step 6) fails but bisect
      succeeds: missing lines, behavioral regressions, deletions.

    ### Why does this work?

    Version history is (approximately) a chain of commits. If commit X
    is bad and an ancestor Y is good, the break is somewhere on the
    path from Y to X. Binary search halves the candidate range at each
    step — guaranteed `O(log n)` tests to find the exact culprit.

    > **Required properties of your test:** It must run cleanly on
    > every historical commit. If the test was added after the
    > regression, either use `git bisect run -- bash -c 'cp
    > /tmp/test.py . && python3 test.py'` (restoring the modern test
    > each iteration), or write a smaller, older-friendly regression
    > test before you start.

  watch_files:
  - myproject/calculator.py
  - myproject/test_calculator.py
  open_file: myproject/calculator.py
  setup_commands:
  - "cd /tutorial/myproject\ngit bisect reset 2>/dev/null\ngit switch -q main 2>/dev/null\nif git log main --oneline 2>/dev/null | grep -q 'Simplify absolute (BUG'; then\n  exit 0\nfi\nif ! grep -q 'def absolute' calculator.py; then\n  printf '\\ndef absolute(x):\\n    \"\"\"Return |x|.\"\"\"\\n    return x if x >= 0 else -x\\n' >> calculator.py\n  git add calculator.py\n  git commit -qm 'Seed: add absolute function' 2>/dev/null\nfi\nprintf 'from calculator import add, divide, absolute\\nassert add(2, 3) == 5\\nassert divide(10, 2) == 5\\nassert absolute(-4) == 4\\nprint(\"all tests pass\")\\n' > test_calculator.py\ngit add test_calculator.py\ngit diff --cached --quiet || git commit -qm 'Add regression tests'\necho '# commit A: refactor docstring' >> calculator.py\ngit commit -qam 'Refactor: tidy docstring'\necho '# commit B: new helper' >> calculator.py\ngit commit -qam 'Add unused helper comment'\nsed -i 's/return x if x >= 0 else -x/return x/' calculator.py\nif git diff --quiet calculator.py; then\n  sed -i 's/def absolute(x):/def absolute(x):\\n    return x  # BUG\\n    pass  # unreachable/' calculator.py\nfi\ngit commit -qam 'Simplify absolute (BUG: removes negation!)'\necho '# commit D: later tweak' >> calculator.py\ngit commit -qam 'Later tweak'\necho '# commit E: even later' >> calculator.py\ngit commit -qam 'Even later tweak'\n"
  solution:
    commands:
    - cd /tutorial/myproject && git switch main
    - python3 test_calculator.py || true
    - git bisect start HEAD HEAD~5
    - git bisect run python3 test_calculator.py || true
    - git bisect reset
    - sed -i 's/return x$/return x if x >= 0 else -x/' calculator.py
    - 'git commit -am ''Fix: restore negation in absolute'''
    - python3 test_calculator.py
    explanation: |
      - **Binary search:** bisect halves the candidate range each step. `log₂(n)` tests find the exact breaking commit — 5 tests for 30 commits, 10 tests for 1000.
      - **`git bisect start` / `bad` / `good`:** establishes the range. Git checks out the midpoint and waits for your verdict.
      - **`git bisect run <cmd>`:** automates the search. The command runs at each candidate; exit 0 = good, non-zero = bad. Git iterates until one commit remains, prints it, and stops.
      - **`git bisect reset`:** returns HEAD to the pre-bisect state and cleans up. **Always run this at the end**, even after `run` — otherwise you may end up on a commit in the middle of history and wonder why your code looks weird.
      - **Test portability:** The test script must work at every commit in the range. If the test file itself was added partway through, copy it from outside the range for each iteration.
  tests:
  - description: Bisect has been cleaned up (no active bisect)
    command: cd /tutorial/myproject && [ ! -f .git/BISECT_LOG ]
  - description: Test file was committed
    command: cd /tutorial/myproject && git log --oneline -- test_calculator.py | grep -q '.'
  - description: At least 5 new commits exist on main
    command: cd /tutorial/myproject && [ $(git log --oneline main | wc -l) -ge 7 ]
  - description: The absolute function has been repaired (handles negatives, zero, and positives correctly)
    command: cd /tutorial/myproject && python3 -c "import sys; sys.path.insert(0,'.'); from calculator import absolute; assert absolute(-4) == 4 and absolute(3) == 3 and absolute(0) == 0 and absolute(-0.5) == 0.5"
  quiz:
    title: git bisect — Knowledge Check
    min_score: 0.8
    shuffle: true
    questions:
    - question: A regression appeared somewhere in the last **50 commits**. Roughly how many tests does `git bisect` need to find the exact breaking commit?
      options:
      - 50 — one per commit
      - 25 — approximately half
      - ~6 — `log₂(50) ≈ 6`
      - 1 — bisect inspects all commits at once
      correct_index: 2
      explanation: 'Binary search halves the range each test: 50 → 25 → 13 → 7 → 4 → 2 → 1. About 6 iterations. For 1000 commits, ~10 tests. This scaling is why bisect is irreplaceable on long-running projects.'
    - question: Which sequence correctly runs an automated bisect?
      options:
      - '`git bisect start; git bisect run <cmd>`'
      - '`git bisect start; git bisect bad; git bisect good <old-sha>; git bisect run <cmd>`'
      - '`git bisect run <cmd> HEAD HEAD~50`'
      - '`git bisect <cmd>`'
      correct_index: 1
      explanation: You must tell bisect the boundaries first — `bad` (usually HEAD) and a known-good earlier commit. Only then can `run` automate. The command's exit code (0 = good, nonzero = bad) drives the search.
    - question: You ran `git bisect run` successfully. What must you do afterwards?
      options:
      - Nothing — bisect cleans itself up
      - '`git bisect reset` — otherwise HEAD stays on the midpoint commit it last checked out'
      - '`git stash` to preserve bisect state'
      - Push the result to the remote
      correct_index: 1
      explanation: '`git bisect reset` is non-negotiable. It restores HEAD to where you started and removes bisect''s temporary refs. Skipping it leaves HEAD on a random historical commit — a common cause of ''why is my code weird?'' panic.'
    - question: Which test property is **required** for `git bisect run` to work?
      options:
      - The test must produce JSON output
      - The test must exit 0 on pass and non-zero on fail, and must run on every commit in the range
      - The test must be written in Python
      - The test must only exist in the latest commit
      correct_index: 1
      explanation: 'Bisect uses the exit code as its oracle. Also critical: the test must actually run at every historical commit — if the test file was added mid-range, older commits will fail to even find the test, confusing bisect. Use `git bisect run -- bash -c ''cp /tmp/test.py . && python3 test.py''` to work around this.'
    - question: '**[Revisit Step 1]** In the middle of a manual bisect, Git leaves HEAD at a historical commit while you decide good/bad. What HEAD state are you in, and why is that OK?'
      options:
      - Detached HEAD — and it is safe because bisect manages it; `git bisect reset` restores you to the starting branch afterwards
      - Attached to a new branch called `bisect/working` that Git creates automatically
      - Detached HEAD — and any `git commit` you make here will corrupt history
      - Attached to `main` — bisect only moves the working tree, not HEAD
      correct_index: 0
      explanation: During bisect, HEAD is detached at whichever historical commit Git picked as midpoint. That is fine because bisect's internal refs (`BISECT_HEAD`, `refs/bisect/*`) track progress. `git bisect reset` restores the pre-bisect HEAD. Same detached-HEAD concept as Step 1 — just used in service of a search.
    - question: '**[Revisit Step 6]** A bug appears because a line that *used to exist* was deleted. Which tool finds the deletion commit?'
      options:
      - '`git blame` — it shows every line''s author'
      - '`git bisect` — it binary-searches the history for the commit where behavior changed, regardless of whether the change was an addition or deletion'
      - '`git log --grep=''delete''` — it finds commits with ''delete'' in the message'
      - '`git cherry-pick --find-deletion`'
      correct_index: 1
      explanation: 'Blame only attributes *existing* lines. A deletion is invisible to blame (the line isn''t there!). Bisect operates on *behavior*, not lines: if the test failed after commit X and passed at commit X-1, X is the culprit, regardless of whether X added, modified, or deleted code.'
    - question: Put in order the commands for an automated bisect that finds a regression in the last 100 commits and returns HEAD to normal.
      type: parsons
      display: block
      lines:
      - 'python3 test_calculator.py       # verify HEAD currently fails'
      - 'git bisect start HEAD HEAD~100   # bad=HEAD, good=100 back'
      - 'git bisect run python3 test_calculator.py   # Git iterates ~7 times'
      - '# Git prints: "<sha> is the first bad commit"'
      - 'git bisect reset                 # return HEAD to pre-bisect state'
      distractors:
      - 'git bisect stop                  # not a real subcommand'
      - 'git bisect --force               # not a real flag'
      - 'git reflog                       # unrelated to bisect workflow'
      - 'git bisect run -- python3 test.py HEAD HEAD~100   # wrong arg order'
      explanation: Bisect needs boundaries first (`start <bad> <good>`), *then* `run`. The `run` script's exit code (0 = good, nonzero = bad) drives the binary search — ~log₂(100) ≈ 7 iterations. `reset` is non-negotiable; skipping it leaves HEAD on a historical midpoint commit and your code "looks weird."
- title: 'Rebase: Integrate Changes Without a Merge Commit'
  view: git_graph
  instructions: |
    ### Mental model: the video-editor timeline cut

    Rebase is like a video editor: select the clips (commits) unique
    to your feature, cut them out, move the playhead to the tip of
    `main`, paste the clips onto the new location. Each paste is a
    new commit object — same content, new parent, new SHA. The
    originals stay in `.git/objects` (recoverable via reflog).

    ### The merge-commit noise problem

    You have been working on `feature-sqrt` for a day. Meanwhile, `main`
    has received 3 other commits. A plain `git merge main` into your
    feature branch produces a merge commit with two parents — visible
    forever in `git log --graph`.

    For short, linear features, many teams find merge commits noisy.
    They prefer history that reads as a **straight line**:

    **Before rebase** — `feature` branched off `main` at `B`; `main` has since moved to `D`:

    ```gitgraph
    @startuml
    branch main:
      A "Initial"
      B "Shared base"
      C "More on main"
      D "Latest on main"
    branch feature from B:
      α "α"
      β "β"
      γ "γ"
    head main
    @enduml
    ```

    **After rebase** — `α β γ` are replayed as new commits `α' β' γ'` on top of `D`:

    ```gitgraph
    @startuml
    branch main:
      A "Initial"
      B "Shared base"
      C "More on main"
      D "Latest on main"
    branch feature from D:
      α' "α' — replayed"
      β'  "β' — replayed"
      γ' "γ' — replayed"
    head feature
    @enduml
    ```

    `git rebase main` on the feature branch **replays** `α, β, γ` on
    top of the new `main` tip, producing new commits `α', β', γ'` with
    the same patches but different parents (and therefore different
    SHAs).

    > **Key insight:** rebase does **not** modify commits. Commits are
    > immutable (recall Step 3: SHA = hash of content + parents). Rebase
    > creates *brand-new* commits with the same patches, and moves the
    > branch pointer to the new tip. The old commits are still in the
    > object database — recoverable via reflog.

    ### Task 1: Inspect the pre-built divergence

    The tutorial has set up the scenario for you:

    - `feature-sqrt` branch — contains one commit adding a
      `square_root` function.
    - `main` branch — has two newer commits (`Bump version notes`,
      `Add identity helper`) made *after* `feature-sqrt` was created.

    The two branches now diverge. See it:

    ```bash
    git log --all --oneline --graph --decorate
    ```

    You should see `feature-sqrt` diverging from `main` — two parallel
    lines on the graph.

    ### Task 3: Rebase feature-sqrt onto main

    Switch to the feature branch. **Predict before rebasing:** how
    many commits will be on `feature-sqrt` after the rebase? How many
    *parents* will its tip commit have? (Trick question — think back
    to the basic tutorial's merge-commit structure.)

    ```bash
    git switch feature-sqrt
    git rebase main
    ```

    Check the log:

    ```bash
    git log --all --oneline --graph --decorate
    ```

    **Linear history restored.** `feature-sqrt` now sits on top of
    the latest `main`. Its tip commit has **one** parent, not two —
    no merge commit anywhere.

    The rebased commit's SHA changed because rebase replayed it on a
    new parent (tip of `main`, not the old branch point). Commits are
    immutable; rebase creates new ones. `git reflog` still has the
    pre-rebase SHA.

    ### Task 4: Fast-forward merge into main

    Because `feature-sqrt` is now a strict extension of `main`, a merge
    is trivial — no merge commit is even needed:

    ```bash
    git switch main
    git merge feature-sqrt           # fast-forward, no merge commit
    git branch -d feature-sqrt
    ```

    Final graph: one linear line of history. No diamond, no merge noise.

    ### Task 5: Rebase through a conflict (desirable difficulty)

    That rebase was clean — Git applied the patch and moved on. In
    real life, rebases conflict when upstream touched the same lines
    your branch did. Let's produce one deliberately so you see
    `git rebase --continue` once before you need it for real.

    Start a new branch from *before* the identity commit, and add a
    competing line at the same location:

    ```bash
    git switch -c feature-trailer main~1
    echo '# end-of-module trailer' >> calculator.py
    git commit -am 'Add trailer comment at end of file'
    ```

    Now rebase onto the newer `main` (which added `identity` at the
    same spot):

    ```bash
    git rebase main
    ```

    Git pauses: **CONFLICT** — both sides appended to the end of the
    file. This is the normal case, not a failure. Inspect:

    ```bash
    git status
    cat calculator.py   # <<<<<<< HEAD, =======, >>>>>>> markers
    ```

    Resolve by keeping **both** lines — edit `calculator.py` so the
    end contains the `identity` helper *and* your trailer comment.
    Delete the three marker lines (`<<<<<<<`, `=======`, `>>>>>>>`).
    Save. Then tell Git the conflict is resolved:

    ```bash
    git add calculator.py
    git rebase --continue
    ```

    Git finishes. Clean up the now-unneeded branch:

    ```bash
    git switch main
    git branch -D feature-trailer
    ```

    > **The sentence to remember:** a rebase conflict uses the *same*
    > markers and the *same* `git add` as a merge conflict (basic
    > tutorial Step 12). The only difference is you finalize with
    > `git rebase --continue` instead of `git commit`. If you can
    > resolve one, you can resolve the other — the mechanics are
    > identical; only the ceremony differs.

    > **If you panic:** `git rebase --abort` at any point restores
    > the pre-rebase state. Same safety net as `git merge --abort`
    > from the basic tutorial.

    ### When to rebase vs merge

    | Situation | Prefer |
    |---|---|
    | Short feature branch (hours–days) | **Rebase** — keeps history linear |
    | Long-lived integration branch | **Merge** — preserves the actual merge event |
    | Branch has been **pushed and others are using it** | **Merge** — rebasing rewrites SHAs and breaks collaborators |
    | PR review is complete and ready to land | Depends on team — some teams enforce rebase, others enforce merge |

    > **The cardinal rule of rebase:** only rebase commits that exist
    > only on your local machine or on a feature branch **only you**
    > are working on. Rewriting shared history breaks other people's
    > branches.

    ### You can now

    - **Explain** the video-editor analogy of rebase and why it
      produces new SHAs.
    - **Choose** rebase for short local branches, merge for shared or
      long-lived branches.
    - **Resolve** a rebase conflict with the same marker-edit + `git
      add` recipe as a merge conflict, finishing with `git rebase
      --continue` instead of `git commit`.
    - **Recover** from a bad rebase with `git reflog` + `git reset
      --hard` (same safety net as Step 2's reflog rescue),
      or bail out cleanly with `git rebase --abort`.
  setup_commands:
  - "cd /tutorial/myproject\ngit rebase --abort 2>/dev/null\ngit switch -q main 2>/dev/null\nHAS_SQRT=0\nHAS_IDENTITY=0\ngit log feature-sqrt --oneline 2>/dev/null | grep -q 'Add square_root function' && HAS_SQRT=1\ngit log main --oneline 2>/dev/null | grep -q 'Add identity helper' && HAS_IDENTITY=1\nif [ $HAS_SQRT = 1 ] && [ $HAS_IDENTITY = 1 ]; then\n  exit 0\nfi\ngit branch -D feature-sqrt 2>/dev/null\nif git log main --oneline | grep -q 'Add identity helper'; then\n  git reset --hard HEAD~2 2>/dev/null\nfi\ngit switch -qc feature-sqrt\nprintf '\\nimport math\\ndef square_root(x):\\n    \"\"\"Return the square root of x; raises ValueError if negative.\"\"\"\\n    if x < 0:\\n        raise ValueError(\"Cannot take sqrt of negative\")\\n    return math.sqrt(x)\\n' >> calculator.py\ngit commit -qam 'Add square_root function'\ngit switch -q main\necho '# version 1.1 notes' >> calculator.py\ngit commit -qam 'Bump version notes'\necho 'def identity(x): return x' >> calculator.py\ngit commit -qam 'Add identity helper'\n"
  solution:
    commands:
    - cd /tutorial/myproject && git switch main
    - git switch feature-sqrt
    - git rebase main
    - git switch main
    - git merge feature-sqrt
    - git branch -d feature-sqrt
    - git rebase --abort 2>/dev/null; true
    - git switch -c feature-trailer main~1 2>/dev/null || git switch feature-trailer
    - grep -q 'end-of-module trailer' calculator.py || (echo '# end-of-module trailer' >> calculator.py && git commit -am 'Add trailer comment at end of file')
    - git rebase main 2>/dev/null || (sed -i 's/<<<<<<<.*//; s/=======//; s/>>>>>>>.*//' calculator.py && git add calculator.py && GIT_EDITOR=true git rebase --continue)
    - git switch main
    - git branch -D feature-trailer 2>/dev/null; true
    explanation: |
      - **Rebase = replay:** Git takes the commits on your branch that are not on the target (`feature-sqrt` commits not on `main`), computes their patches, resets the branch pointer to the target tip, and replays each patch as a *new* commit on top.
      - **New SHAs:** Because each replayed commit has a new parent, its SHA is different. Old commits remain in `.git/objects` and `git reflog` — nothing is ever truly lost, but anyone who fetched the old SHAs sees divergence.
      - **Fast-forward merge:** After a successful rebase, the feature branch is a strict extension of main. `git merge feature-sqrt` on main simply moves the main pointer forward — no merge commit.
      - **Rebase conflicts (Task 5):** When upstream and your branch touched the same lines, rebase pauses at the first problem commit. Resolution is identical to a merge conflict — edit the file, remove markers, `git add`, then `git rebase --continue` (*not* `git commit`). `git rebase --abort` bails out at any point.
      - **The rule:** rebase only local/private branches. Rewriting pushed history requires `--force-with-lease` and annoys everyone who already pulled.
  tests:
  - description: On main branch
    command: cd /tutorial/myproject && git symbolic-ref -q HEAD | grep -q 'refs/heads/main'
  - description: feature-sqrt branch was merged and deleted
    command: cd /tutorial/myproject && ! git branch | grep -q 'feature-sqrt'
  - description: square_root function is on main
    command: cd /tutorial/myproject && grep -q 'def square_root' calculator.py && git log --oneline main | grep -qi 'square_root'
  - description: History is linear (no merge commit for feature-sqrt)
    command: cd /tutorial/myproject && [ $(git log --merges --oneline main | grep -ci 'Merge branch.*feature-sqrt') -eq 0 ]
  - description: No rebase is in progress and no conflict markers remain (Task 5 resolved)
    command: cd /tutorial/myproject && [ ! -d .git/rebase-merge ] && [ ! -d .git/rebase-apply ] && ! grep -E '^(<{7}|={7}|>{7})' calculator.py
  quiz:
    title: Rebase — Knowledge Check
    min_score: 0.8
    shuffle: true
    questions:
    - question: What does `git rebase main` do when run on `feature-sqrt`?
      options:
      - Moves `main` to point at the tip of `feature-sqrt`
      - Computes the patches of commits unique to `feature-sqrt`, resets `feature-sqrt` to the tip of `main`, and replays those patches as new commits
      - Merges `main` into `feature-sqrt` with a merge commit
      - Deletes `main` and renames `feature-sqrt` to `main`
      correct_index: 1
      explanation: 'Rebase rewrites the branch: feature-sqrt''s unique commits become *new* commits on top of main. This linearizes history but changes SHAs — so never rebase pushed branches others are using.'
    - question: After rebasing, why does the rebased commit have a **different SHA** than before?
      options:
      - Git chooses a new SHA for clarity
      - The new commit has a different parent (the tip of main, not the previous branch point), and a commit's SHA hashes its parent(s) + tree + metadata
      - Rebase encrypts the commit
      - Rebase changes the commit message
      correct_index: 1
      explanation: 'Step 3 again: `SHA(commit) = SHA-1(tree + parent(s) + author + committer + message)`. Change the parent → new SHA. Same patch, new identity.'
    - question: When is `git rebase` a **bad** idea?
      options:
      - On a personal feature branch that only you have checked out
      - On a short-lived local branch before opening a PR
      - On a public/shared branch that teammates have already pulled
      - To linearize history before a fast-forward merge
      correct_index: 2
      explanation: Rebase rewrites history. If others have the old SHAs, their branches will diverge and they will get ugly conflicts. Stick to merge for anything pushed and shared, rebase for local linearization.
    - question: '**[Revisit Step 2]** You rebased `feature-sqrt` and realized it broke everything. Before pushing. How do you recover the pre-rebase state?'
      options:
      - It is gone — rebase is permanent
      - '`git reflog` to find the pre-rebase SHA, then `git reset --hard <sha>` to restore feature-sqrt'
      - '`git stash pop` to retrieve the old commits'
      - '`git clone` a fresh copy of the repo'
      correct_index: 1
      explanation: Rebase is only 'destructive' in the sense of changing branch pointers — the original commits remain in `.git/objects` until garbage collection. `git reflog` records every HEAD position including the pre-rebase tip; `git reset --hard` restores it. Your safety net, earned in Step 2.
    - question: After rebasing a feature onto `main`, you run `git merge feature` on `main`. What happens?
      options:
      - A merge commit with two parents is created
      - A fast-forward occurs — `main` simply moves to point at the feature tip; no merge commit, no diamond in the graph
      - The rebase is reversed
      - Git reports an error
      correct_index: 1
      explanation: 'After rebase, feature is a strict linear extension of main. The merge reduces to just advancing the main pointer (fast-forward). This is the whole reason many teams rebase before merging: clean, linear history.'
    - question: Which statements about rebase are true? (Select all that apply)
      type: multiple
      options:
      - Rebase creates new commits with new SHAs for each replayed commit
      - Rebase can cause conflicts at each replayed commit, requiring you to resolve one at a time with `git rebase --continue`
      - Rebase automatically pushes the updated branch
      - Rebase can be aborted with `git rebase --abort`, restoring the branch to its pre-rebase state
      correct_indices:
      - 0
      - 1
      - 3
      explanation: Rebase applies each patch in turn and can conflict at any of them — you resolve, `git add`, `git rebase --continue`. `--abort` restores the pre-rebase state. Rebase does **not** push anything; that is a separate `git push` step (often needing `--force-with-lease` on rebased branches, which is where collaborator pain happens).
    - question: '**[Revisit Step 5]** You had two choices for bringing a colleague''s single fix into `main`: cherry-pick or rebase. Both create new commits with new SHAs. What is the key difference in intent?'
      options:
      - Cherry-pick copies *one* commit onto HEAD; rebase moves *all* of a branch's unique commits onto a new base — they differ in scope, not mechanism
      - Cherry-pick is destructive; rebase is not
      - Cherry-pick requires the commit to be on a branch; rebase does not
      - They are identical aliases
      correct_index: 0
      explanation: 'Under the hood they use the same machinery — patch out, replay on new parent, new SHA. The difference is *scope*: cherry-pick = one commit, rebase = a series. Step 5''s cherry-pick and Step 8''s rebase are the same technique at different scales.'
    - question: '**[Revisit Step 3]** During rebase, a conflict halts you mid-stream. `git reflog` at this moment shows many entries. Which entry do you want to `git reset --hard` to if you decide to abort manually instead of using `git rebase --abort`?'
      options:
      - The most recent `HEAD@{0}` entry
      - 'The `checkout: moving from ...` entry that shows where the branch pointed *before* rebase started'
      - The very oldest reflog entry
      - Any entry — they all point to the same commit
      correct_index: 1
      explanation: Reflog logs every HEAD movement. The pre-rebase position is typically labeled `checkout` or the last `commit` before the `rebase` entries. That SHA is the pre-rebase branch tip — the safe rescue point. This is the Step 2 reflog safety net applied to rebase.
    - question: '**[Revisit basic tutorial Step 11]** You edit a conflicted file during a `git rebase`, remove the `<<<<<<<` / `=======` / `>>>>>>>` markers, and run `git add`. What is the **next** command to finalize this one commit of the rebase?'
      options:
      - '`git commit` — same as finishing a merge'
      - '`git rebase --continue` — during a rebase, Git is replaying commits one at a time, so continuation (not a fresh commit) is how you resume'
      - '`git merge --continue`'
      - '`git push`'
      correct_index: 1
      explanation: A rebase conflict uses the *same* markers and the *same* `git add` step as a merge conflict (basic tutorial Step 11). The *only* difference is the final verb — `git rebase --continue` tells Git to replay the remaining commits, which `git commit` would not. Running `git commit` by reflex here often leaves the rebase half-done. `git rebase --abort` at any point restores the pre-rebase state.
    - question: Put in order the commands to rebase a private 3-commit `feature` branch onto the latest `main` and fast-forward merge, with nothing leftover on disk.
      type: parsons
      display: block
      lines:
      - 'git switch feature                # be on the branch being rebased'
      - 'git rebase main                   # replay feature commits onto latest main'
      - 'git switch main                   # target the integration branch'
      - 'git merge feature                 # fast-forward, no merge commit'
      - 'git branch -d feature             # clean up the now-merged branch'
      distractors:
      - 'git push --force                  # DANGER on shared branches'
      - 'git merge feature --no-ff         # would create a merge commit — not ff'
      - 'git rebase feature                # backwards — rebases main onto feature'
      - 'git reset --hard feature          # destroys main''s history'
      explanation: The correct direction is "rebase the shorter branch onto the longer." Running `rebase feature` from main (distractor 3) does the opposite — rebases main onto feature, usually rewriting commits you didn't want to touch. `--no-ff` prevents fast-forward (that's the point of this strategy — a linear, no-merge-commit result). `--force` has no place in a local pre-PR workflow.
- title: 'Interactive Rebase: Edit, Squash, Reorder, Drop'
  view: git_graph
  instructions: |
    ### Your history is a draft until you push

    Sitting on your feature branch, you have 5 commits. Looking at them,
    the history is embarrassing:

    ```
    * f3e2d1c  More typo fixes
    * 8a1c4b5  Fix typo
    * 9e7d23c  Fix typo again
    * 7d5a8e2  Add power function
    * 4e5d6c1  WIP
    ```

    Nobody wants to review that. Before opening a pull request, you
    clean it up into something like:

    ```
    * a9f8e7d  Add power function with full input validation
    ```

    `git rebase -i` (interactive) is the tool.

    ### Doctor Strange warning sign

    `git rebase -i` **rewrites commits**. Commits are immutable objects,
    so technically what happens is: Git creates new commits with new
    SHAs and moves the branch pointer. The old commits are still in
    `.git/objects` (recoverable via `reflog`).

    > **The safe zone**: only run interactive rebase on commits that
    > (a) exist only on your machine, OR (b) exist on a feature branch
    > that **only you** work on. Rewriting pushed commits devastates
    > teammates — their branches will conflict horrendously on next pull.

    ### How the editor works

    When you run `git rebase -i HEAD~N`, Git opens an editor with
    something like:

    ```
    pick 4e5d6c1 WIP
    pick 7d5a8e2 Add power function
    pick 9e7d23c Fix typo again
    pick 8a1c4b5 Fix typo
    pick f3e2d1c More typo fixes

    # Commands:
    # p, pick   = use commit as-is
    # r, reword = use commit, but edit the message
    # e, edit   = use commit, but pause for amending
    # s, squash = use commit, but meld into the previous commit (combine messages)
    # f, fixup  = like squash but DISCARD this commit's log message
    # d, drop   = remove the commit
    # b, break  = stop and let me run commands, then `git rebase --continue`
    ```

    You edit this list (any text editor), save and close. Git replays
    according to your instructions.

    ### Task 1: Inspect the pre-built messy history

    The tutorial has created a `refactor-power` branch with four
    embarrassing commits (`WIP`, `Fix typo`, `Fix typo again`, `More
    typo fixes`) — the kind of history you would never want reviewers
    to see. Inspect it:

    ```bash
    git log --oneline -5
    ```

    Four ugly commits — a perfect target for interactive rebase.

    ### ⚠️ About the scripted-editor shortcut in this tutorial

    In a real terminal, `git rebase -i HEAD~4` opens your `$EDITOR`
    (vim, nano, VS Code, whatever you configured). You visually edit
    a text buffer that lists each commit, one per line, prefixed with
    an action word (`pick`, `squash`, `drop`, …). You save and close
    the file; Git replays based on what you wrote.

    **That interaction — reading a todo list and editing action words —
    is the whole skill.** It's what you'll do every time at work.

    Unfortunately this browser VM cannot host a full interactive
    editor session, so we **script** the editor via
    `GIT_SEQUENCE_EDITOR="sed -i ..."`. The `sed` expression below is
    a **scripted shortcut for this environment only**. It is NOT what
    you will type at work — you will open a real editor and change
    the action words by hand.

    **So for every `sed`-based command below, we also show the
    editor buffer you'd see in a real terminal.** Before running the
    scripted version:

    1. Read the "what you'd actually see" panel.
    2. Say out loud (or write on paper) what you would change, line
       by line.
    3. *Then* run the scripted version and verify the result matches.

    This preserves the generative work. Do not skip step 2 — "run
    the `sed` command" is not the skill; "know what to change in the
    editor" is.

    ### Task 2: Squash four messy commits into one

    **What you'd actually see** — in a real terminal,
    `git rebase -i HEAD~4` opens your editor with this buffer:

    ```
    pick 4e5d6c1 WIP
    pick 7d5a8e2 Fix typo
    pick 9e7d23c Fix typo again
    pick 8a1c4b5 More typo fixes

    # Rebase abc1234..8a1c4b5 onto abc1234 (4 commands)
    #
    # Commands:
    # p, pick   = use commit
    # s, squash = use commit, but meld into previous commit
    # ...
    ```

    **Verbalize your edit first.** You want one commit instead of
    four. Which action word do you put on which line, and why must
    the first line stay `pick`? (Hint: `squash` melds the current
    line *into the previous* one — so line 1 has nothing above it to
    meld into; it has to be `pick`.) Write the four-line result on
    paper:

    ```
    pick    4e5d6c1 WIP
    squash  7d5a8e2 Fix typo
    squash  9e7d23c Fix typo again
    squash  8a1c4b5 More typo fixes
    ```

    **Now the scripted shortcut** that produces that exact edit in
    this VM — the `sed` expression rewrites lines 2–4's action from
    `pick` to `squash`:

    ```bash
    GIT_SEQUENCE_EDITOR="sed -i '2,4s/^pick/squash/'" git rebase -i HEAD~4
    ```

    In real life you'd just type `:wq` after hand-editing those
    three lines. The mechanics Git runs are identical.

    After you save, Git replays the first commit as-is, then melds
    commits 2, 3, 4 into it and **opens a second editor** for the
    combined commit message. That buffer looks like:

    ```
    # This is a combination of 4 commits.
    # This is the 1st commit message:
    WIP

    # This is the commit message #2:
    Fix typo

    # This is the commit message #3:
    Fix typo again

    # This is the commit message #4:
    More typo fixes

    # Please enter the commit message for your changes. ...
    ```

    **What you'd do in a real editor:** delete all those lines and
    type one clean message like `Refactor: cleanup notes in
    calculator.py`, then save-and-close. In this VM we achieve the
    same end-state by amending afterwards:

    ```bash
    git commit --amend -m "Refactor: cleanup notes in calculator.py"
    ```

    Check the log:

    ```bash
    git log --oneline -3
    ```

    Four commits became one. The remaining history is clean.

    ### Task 3: Drop a bad commit

    Make two more commits — one of them accidentally leaks a secret.

    **Bad commit — append this line to `calculator.py` in the editor:**
    ```
    SECRET_API_KEY=oops
    ```
    Save.
    Commit: `git commit -am "Accidentally add secret (should be dropped)"`

    **Good commit — append this line below the secret:**
    ```python
    def placeholder(): pass
    ```
    Save.
    Commit: `git commit -am "Add placeholder function"`

    Now drop the secret-leaking commit, keep the others.

    **What you'd actually see** — `git rebase -i HEAD~2` opens the
    editor with this two-line todo list (oldest first):

    ```
    pick <sha-secret>  Accidentally add secret (should be dropped)
    pick <sha-ok>      Add placeholder function

    # Commands:
    # p, pick = use commit
    # d, drop = remove commit
    # ...
    ```

    **Verbalize first.** Which line do you change, and to what
    action word? Write the intended result:

    ```
    drop    <sha-secret>  Accidentally add secret (should be dropped)
    pick    <sha-ok>      Add placeholder function
    ```

    **Scripted shortcut** (in real life you'd hand-edit the first
    line's `pick` to `drop`):

    ```bash
    GIT_SEQUENCE_EDITOR="sed -i '1s/^pick/drop/'" git rebase -i HEAD~2
    ```

    The first (older) of the two commits is dropped. Verify the
    secret is gone:

    ```bash
    git log --oneline -5
    grep SECRET_API_KEY calculator.py || echo "secret is gone"
    ```

    ### Task 3b: Rescue the "dropped" commit — prove the safety net

    You just dropped a commit from history. **Dropped ≠ deleted.** The
    commit object still exists in `.git/objects` (Step 3 again —
    commits are immutable, rebase only moves ref pointers). Prove it:

    ```bash
    git reflog -n 10
    ```

    Find the reflog entry with message `Accidentally add secret
    (should be dropped)` — it has the SHA of the "dropped" commit.
    Use that SHA to create a backup branch pointing at it:

    ```bash
    # Replace <sha> with the SHA you just saw in reflog
    SECRET_SHA=$(git reflog | grep -m1 'Accidentally add secret' | awk '{print $1}')
    git branch secret-backup $SECRET_SHA
    git log secret-backup --oneline
    ```

    The "deleted" commit is fully recoverable. You now have a branch
    `secret-backup` anchoring it.

    > ⚠️ **For real secrets**, drop + rescue leaves *more* copies,
    > not fewer. Real response: rotate the credential immediately, then
    > scrub history with `git filter-repo` (or BFG), then force-push
    > and ask collaborators to re-clone.

    ### Task 4: Reword a commit message

    Interactive rebase can edit messages without altering content
    using the `reword` action. Your goal: rename the tip commit's
    message to something like `Refactor: cleanup notes and placeholder`.

    **What you'd actually see** — `git rebase -i HEAD~2` opens the
    todo list (after Task 3 dropped the secret, only two commits
    remain in the last two positions):

    ```
    pick <sha1> Add placeholder function
    pick <sha2> <previous commit — will be "picked" unchanged>

    # Commands:
    # p, pick   = use commit
    # r, reword = use commit, but edit the message
    # ...
    ```

    **Verbalize first.** Which action do you change, on which line,
    and what happens next? Write down the predicted two-editor flow:

    1. In the todo-list editor, change line 1's `pick` to `reword`,
       save-and-close.
    2. A **second editor** opens with the current commit message.
       Replace it with `Refactor: cleanup notes and placeholder`,
       save-and-close.
    3. Git replays; the commit now has the new message but the same
       diff.

    **Scripted shortcut for this VM** (runs both editors
    non-interactively — in real life you'd hand-edit each one):

    <details markdown="1"><summary>Hint (expand if stuck)</summary>

    ```bash
    GIT_SEQUENCE_EDITOR="sed -i '1s/^pick/reword/'" \
      GIT_EDITOR="sed -i '1s/.*/Refactor: cleanup notes and placeholder/'" \
      git rebase -i HEAD~2
    ```

    The first env var scripts the todo list (change `pick` → `reword`
    on line 1). The second env var scripts the message editor
    (overwrite line 1 with the new message). Two env vars = two
    editors, because interactive rebase with `reword` opens two.

    </details>

    Check the result:

    ```bash
    git log --oneline -3
    ```

    ### Rebase todo list reference

    | Command | Effect |
    |---|---|
    | `pick` | Use commit as-is (default) |
    | `reword` (`r`) | Keep commit, open editor to edit message |
    | `edit` (`e`) | Pause at commit so you can `git commit --amend` or add fixes |
    | `squash` (`s`) | Meld into previous commit — opens editor to combine messages |
    | `fixup` (`f`) | Like squash, but discard this commit's message |
    | `drop` (`d`) | Remove the commit entirely |
    | `break` (`b`) | Stop here; resume later with `git rebase --continue` |
    | `exec <cmd>` | Run a shell command between steps (e.g., `exec pytest`) |

    ### When NOT to use interactive rebase

    - On commits that are already pushed and being used by others
    - When you are not sure what you are doing **and** have no reflog
      safety net (always verify `reflog` is recording — it is, by default)
    - When the history is about to be merged with `--squash` anyway
      (redundant effort)

    ### The public-history alternative: `git revert`

    If a commit already reached shared history and you want to "undo"
    it, do **not** rebase-drop. Use `git revert <sha>` instead:

    - `git revert` creates a new **anti-matter commit** that
      negates the bad commit's changes.
    - History grows (you now have both the bad commit and the
      revert), but no SHAs change — no force-push, no collaborator
      pain.

    Rule of thumb:
    - **Local, unpushed commits** → rebase -i is fine (as in this step)
    - **Shared, pushed commits** → always revert, never rebase

    ### You can now

    - **Squash** multiple messy commits into one clean commit before
      opening a PR.
    - **Drop** a commit that accidentally leaked a secret (and then
      recover it from reflog if needed).
    - **Reword** commit messages retroactively without altering
      content.
    - **Choose** the right verb (`pick`/`reword`/`squash`/`fixup`/`drop`)
      for a given rewriting goal, instead of memorizing one recipe.
    - **Trust** `git reflog` as your reversal path for any mistake.
  watch_files:
  - myproject/calculator.py
  open_file: myproject/calculator.py
  setup_commands:
  - "cd /tutorial/myproject\ngit rebase --abort 2>/dev/null\ngit switch -q main 2>/dev/null\nif git log refactor-power --oneline 2>/dev/null | grep -q 'More typo fixes'; then\n  git switch -q refactor-power 2>/dev/null\n  exit 0\nfi\ngit branch -D refactor-power 2>/dev/null\ngit switch -qc refactor-power\necho '# WIP: try new power approach' >> calculator.py\ngit commit -qam 'WIP'\nsed -i 's/# WIP: try new power approach/# starting refactor/' calculator.py\ngit diff --quiet calculator.py && echo '# starting refactor' >> calculator.py\ngit commit -qam 'Fix typo'\necho '# TODO: edge cases' >> calculator.py\ngit commit -qam 'Fix typo again'\necho '# done iterating' >> calculator.py\ngit commit -qam 'More typo fixes'\n"
  solution:
    commands:
    - cd /tutorial/myproject
    - GIT_SEQUENCE_EDITOR="sed -i '2,4s/^pick/squash/'" GIT_EDITOR="sed -i '1,/^# Please/{/^# Please/q}'" git rebase -i HEAD~4 || true
    - 'git commit --amend -m ''Refactor: cleanup notes in calculator.py'' 2>/dev/null || true'
    - echo 'SECRET_API_KEY=oops' >> calculator.py && git commit -am 'Accidentally add secret (should be dropped)'
    - 'echo ''def placeholder(): pass'' >> calculator.py && git commit -am ''Add placeholder function'''
    - GIT_SEQUENCE_EDITOR="sed -i '1s/^pick/drop/'" git rebase -i HEAD~2
    - SECRET_SHA=$(git reflog | grep -m1 'Accidentally add secret' | awk '{print $1}') && git branch secret-backup $SECRET_SHA
    - 'GIT_SEQUENCE_EDITOR="sed -i ''1s/^pick/reword/''" GIT_EDITOR="sed -i ''1s/.*/Refactor: cleanup notes and placeholder/''" git rebase -i HEAD~2 || true'
    explanation: |
      - **`git rebase -i HEAD~N`:** opens the todo list for the last N commits. You mark each with `pick`, `reword`, `squash`, `fixup`, `edit`, `drop`, `break`, or `exec`.
      - **`squash` vs `fixup`:** both meld with the previous commit. `squash` combines messages (editor opens); `fixup` silently drops the squashed commit's message. Use `fixup` for tiny typos, `squash` when the message has information worth keeping.
      - **`drop`:** deletes the commit from history. Useful for removing accidentally-committed secrets, debug prints, or experiments that did not pan out. The dropped commit remains in reflog for recovery.
      - **`reword`:** edits the message without touching content. Fixes typos in commit messages retroactively.
      - **Recovery:** the pre-rebase SHA is always in `git reflog`. `git reset --hard HEAD@{1}` (or the relevant reflog entry) restores the branch exactly.
  tests:
  - description: On refactor-power branch
    command: cd /tutorial/myproject && git symbolic-ref -q HEAD | grep -q 'refs/heads/refactor-power'
  - description: Secret was dropped from the active branch (SECRET_API_KEY not in calculator.py)
    command: cd /tutorial/myproject && ! grep -q 'SECRET_API_KEY' calculator.py
  - description: Secret-commit is gone from branch history
    command: cd /tutorial/myproject && ! git log --oneline | grep -qi 'Accidentally add secret'
  - description: secret-backup branch rescued the 'dropped' commit via reflog (proves reflog safety net)
    command: cd /tutorial/myproject && git log secret-backup --oneline 2>/dev/null | grep -qi 'Accidentally add secret'
    hints:
    - text: Use `git reflog` to find the SHA of the dropped 'Accidentally add secret' commit, then `git branch secret-backup <sha>` to anchor it. This is the safety-net step from Task 3b.
  - description: The 4 messy WIP/typo commits were squashed into fewer commits
    command: cd /tutorial/myproject && [ $(git log --oneline refactor-power | grep -ciE '(WIP|Fix typo|More typo)') -le 1 ]
  quiz:
    title: Interactive Rebase — Knowledge Check
    min_score: 0.8
    shuffle: true
    questions:
    - question: Which interactive-rebase action **keeps the commit** but lets you change only its message?
      options:
      - '`pick`'
      - '`reword`'
      - '`squash`'
      - '`drop`'
      correct_index: 1
      explanation: '`reword` keeps the commit content identical but opens the editor to change the message. `pick` is no-op, `squash` melds into the previous commit, `drop` deletes it.'
    - question: What is the difference between `squash` and `fixup`?
      options:
      - '`squash` combines messages (editor opens); `fixup` silently discards the squashed commit''s message'
      - '`squash` rewrites hash; `fixup` preserves it'
      - '`fixup` can only be used on merge commits'
      - They are identical
      correct_index: 0
      explanation: Both meld into the previous commit. `squash` opens the editor so you can combine messages; `fixup` just drops the squashed commit's message. Use `fixup` for trivial typos, `squash` when both messages are meaningful.
    - question: You just ran `git rebase -i HEAD~3` and realized you dropped a commit you needed. Can you recover it?
      options:
      - No — dropped commits are permanently deleted
      - Yes — `git reflog` still shows the pre-rebase HEAD; `git reset --hard HEAD@{1}` restores everything
      - Only by running `git rebase --undo`
      - Only if you had pushed the commit
      correct_index: 1
      explanation: Dropped commits remain in `.git/objects` until garbage collection prunes them. `git reflog` is the bookmark that lets you find them. `git reset --hard <reflog-sha>` restores the exact pre-rebase state. **This is the safety net.** Always verify it works once before a high-stakes rebase.
    - question: '**[Revisit Step 3]** After an interactive rebase, the rewritten commits have new SHAs even if their patches are identical. Why?'
      options:
      - Interactive rebase randomly generates SHAs
      - A commit's SHA hashes its tree + parents + metadata; rebase changes the parent, so the SHA changes
      - Interactive rebase encrypts commits
      - Git renames the commits for clarity
      correct_index: 1
      explanation: 'Same answer as for simple rebase: different parent → different SHA. The object model does not allow ''editing'' a commit — all that changes is which commit the branch pointer references.'
    - question: Which of these is the **most dangerous** use of interactive rebase?
      options:
      - On a local branch to squash WIP commits before opening a PR
      - On a local branch to drop a commit that accidentally included a secret
      - On `main` of a shared repository used by 10 teammates, to drop a week-old commit
      - On a personal experiment branch that nobody else has cloned
      correct_index: 2
      explanation: Rewriting shared history is the nuclear option. Everyone who fetched the old commits now has a conflicting local copy of main; their pulls fail spectacularly. For public history, use `git revert` (which creates a new *anti-matter* commit) instead. Reserve interactive rebase for local cleanup.
    - question: You want to split one giant commit into three smaller ones during interactive rebase. Which action lets you do that?
      options:
      - '`pick`'
      - '`squash`'
      - '`edit` — pauses at the commit so you can `git reset HEAD~`, stage smaller pieces, and commit each separately'
      - '`reword`'
      correct_index: 2
      explanation: '`edit` pauses rebase at that commit with HEAD there. You then `git reset HEAD~` (un-commit but keep changes staged/unstaged), split the changes into multiple `git add` + `git commit` cycles, and finally `git rebase --continue`. The original one commit is replaced by your new sequence.'
    - question: '**[Revisit Step 2]** In Task 3b you ''rescued'' a dropped commit. In terms of the object database, what did `git branch secret-backup <sha>` actually do?'
      options:
      - It copied the dropped commit from `.git/trash` back into `.git/objects`
      - It wrote a 41-byte file at `.git/refs/heads/secret-backup` containing the SHA, making the commit reachable again — the commit object itself never moved
      - It recreated the commit from the reflog's textual record
      - It undid the rebase
      correct_index: 1
      explanation: Same mechanic as Step 2's rescued-work branch. The dropped commit was never deleted — only unreferenced. Creating a branch (one 41-byte file) re-anchors it as reachable. Now `git gc` won't prune it. This is the same reflog + branch recipe, applied to a different scenario (rebase-drop vs detached-HEAD-orphan).
    - question: '**[Revisit Step 5]** You are about to interactive-rebase a branch. You have uncommitted edits you want to keep but not carry through the rebase. Safest workflow?'
      options:
      - Commit them as WIP then rebase — they will survive
      - '`git stash` them (Step 4) → rebase → `git stash pop` when done → same pre-rebase work, cleanly on the rebased branch'
      - Run rebase with `--ignore-uncommitted`
      - Git rebase will refuse to start if you have uncommitted changes, so nothing to worry about
      correct_index: 1
      explanation: 'Rebase refuses to start with dirty working tree — so Git is already stopping you. Stash is the clean pattern: preserve the work-in-progress (Step 4), do the rebase, pop the stash onto the rebased branch. This composes tools across steps — recognizing when two tools work together is the mark of Git fluency.'
    - question: Put in order the steps to squash 4 messy commits on a local branch into one clean commit (assuming you're using the scripted VM editor).
      type: parsons
      display: block
      lines:
      - 'git log --oneline -5               # inspect what we''re rewriting'
      - 'GIT_SEQUENCE_EDITOR="sed -i ''2,4s/^pick/squash/''" git rebase -i HEAD~4'
      - '# Git replays commit 1 as pick, squashes commits 2-4 into it'
      - 'git commit --amend -m "Refactor: cleanup notes in calculator.py"'
      - 'git log --oneline -3               # verify: 4 commits became 1'
      distractors:
      - 'git push --force                   # DANGER: never on shared history'
      - 'git rebase -i HEAD~4 --squash-all  # not a real flag'
      - 'git reset --hard HEAD~4            # destroys commits without combining'
      - 'git merge --squash HEAD~4          # wrong tool for intra-branch squash'
      explanation: The canonical pre-PR cleanup. Distractor 1 is the cardinal rule broken. Distractor 2 is invented. Distractor 3 discards instead of squashing (no single commit preserves the combined patch). Distractor 4 (`merge --squash`) is for *branch-to-branch* collapse, not for cleaning up commits on the current branch.
- title: 'Squash Merge: Collapse a Feature Into a Single Commit'
  view: git_graph
  instructions: |
    ### The goal

    Your feature branch has 7 commits — useful while developing, but on
    `main` you want **one clean commit** per feature. This is the
    default on many GitHub-based teams (the green "Squash and merge"
    button on a PR).

    Three ways to get there:

    | Method | Resulting history | When |
    |---|---|---|
    | `git merge feature` | Merge commit (2 parents) preserving branch | Long-lived branches, preserving merge context |
    | `git rebase feature` (on main) | Linear, each commit preserved | Short features, keeping individual commits |
    | `git merge --squash feature` | **One new commit** on main, branch history discarded | You want feature = single commit |

    ### How squash merge works

    `git merge --squash feature` takes the cumulative patch of all
    commits on `feature` (not on `main`) and stages it as a single
    change. You then `git commit` with a message describing the feature
    as a whole.

    **Before** — feature work lives on its own branch:

    ```gitgraph
    @startuml
    branch main:
      A "Initial"
      B "Shared base"
      C "Refactor"
    branch feature from B:
      α "α"
      β "β"
      γ "γ"
    head main
    @enduml
    ```

    **After** `git merge --squash feature; git commit` — one new commit on `main` containing the combined diff of `α β γ`; `feature` is unchanged:

    ```gitgraph
    @startuml
    branch main:
      A "Initial"
      B "Shared base"
      C "Refactor"
      αβγ "αβγ — single squashed commit"
    branch feature from B:
      α "α"
      β "β"
      γ "γ"
    head main
    @enduml
    ```

    Feature branch is untouched; main gets one commit that contains
    all of the feature's changes combined.

    ### Task 1: Inspect the pre-built feature branch

    The tutorial has set up a `feature-stats` branch with three
    independent commits — `mean`, `variance`, `stddev` — building one
    statistics feature. Inspect:

    ```bash
    git log feature-stats --oneline -5
    git diff main feature-stats -- calculator.py | head -40
    ```

    Three focused commits. You now want to land this as **one**
    commit on main rather than three.

    ### Task 2: Squash-merge into main

    ```bash
    git switch main
    git merge --squash feature-stats
    git status
    ```

    Three things to notice: **no new commit yet** (you still need to
    run `git commit`), **feature branch untouched**, **working tree
    has staged changes** (the combined diff is in the index).

    Finalize with a commit message describing the whole feature:

    ```bash
    git status
    git commit -m "Add descriptive statistics module (mean, variance, stddev)"
    ```

    ### Task 3: Inspect the result

    ```bash
    git log --oneline main
    git log --all --oneline --graph
    ```

    Main has **one** new commit for the entire feature. The original
    three commits on `feature-stats` are still there (for reference or
    bisect), but they are not merged into main.

    Clean up the feature branch since main has the work now:

    ```bash
    git branch -D feature-stats      # -D (force) because not ff-merged
    ```

    > **Trade-off:** squash merge loses individual commit granularity
    > on main. If a bug is introduced in one of the three sub-features,
    > `git bisect` on main can only narrow it down to "the whole
    > feature", not to which of the three internal commits caused it.
    > Teams value this trade-off differently.

    ### Comparison: three merge strategies on the same history

    | Command | main commit graph |
    |---|---|
    | `git merge feature` | `A ── B ── C ── M` where `M` has two parents |
    | `git rebase main` on feature, then `git merge feature` on main | `A ── B ── C ── α' ── β' ── γ'` (linear) |
    | `git merge --squash feature; git commit` | `A ── B ── C ── αβγ` (one new commit) |

    ### You can now

    - **Choose** squash vs rebase vs merge based on how you want
      `main`'s history to read.
    - **Anticipate** the trade-off: squash gives clean main-history
      but loses `git bisect` precision *within* a feature.
    - **Recover** individual feature commits if needed — they still
      exist on the (pre-delete) feature branch and in reflog.
  setup_commands:
  - "cd /tutorial/myproject\ngit merge --abort 2>/dev/null\ngit switch -q main 2>/dev/null\nif git log feature-stats --oneline 2>/dev/null | grep -q 'Add stddev function'; then\n  exit 0\nfi\ngit branch -D feature-stats 2>/dev/null\ngit switch -qc feature-stats\nprintf '\\ndef mean(values):\\n    return sum(values) / len(values)\\n' >> calculator.py\ngit commit -qam 'Add mean function'\nprintf '\\ndef variance(values):\\n    m = mean(values)\\n    return sum((x - m) ** 2 for x in values) / len(values)\\n' >> calculator.py\ngit commit -qam 'Add variance function'\nprintf '\\nimport math as _math\\ndef stddev(values):\\n    return _math.sqrt(variance(values))\\n' >> calculator.py\ngit commit -qam 'Add stddev function'\ngit switch -q main\n"
  solution:
    commands:
    - cd /tutorial/myproject && git switch main
    - git merge --squash feature-stats
    - git commit -m 'Add descriptive statistics module (mean, variance, stddev)'
    - git branch -D feature-stats
    explanation: |
      - **`git merge --squash <branch>`:** applies the cumulative diff of `<branch>` vs main's merge base, stages it, but **does not commit**. You then `git commit` with a fresh message. Main gains one commit; `<branch>` is untouched.
      - **One commit per feature:** main's history reads cleanly (one commit = one feature). Trade-off: you lose fine-grained intra-feature history, making `git bisect` less precise within the feature.
      - **Branch cleanup:** after a squash merge, the feature branch was *not* ff-merged in Git's eyes (its commits are not on main — only a new combined commit is). Use `git branch -D` (capital D, force) to delete it.
  tests:
  - description: On main branch
    command: cd /tutorial/myproject && git symbolic-ref -q HEAD | grep -q 'refs/heads/main'
  - description: feature-stats branch has been deleted
    command: cd /tutorial/myproject && ! git branch | grep -q 'feature-stats'
  - description: mean, variance, and stddev are on main
    command: cd /tutorial/myproject && grep -q 'def mean' calculator.py && grep -q 'def variance' calculator.py && grep -q 'def stddev' calculator.py
  - description: The three feature commits are NOT in main's history (only one combined commit)
    command: cd /tutorial/myproject && [ $(git log --oneline main | grep -ciE 'Add (mean|variance|stddev) function') -eq 0 ]
  quiz:
    title: Squash Merge — Knowledge Check
    min_score: 0.8
    shuffle: true
    questions:
    - question: What does `git merge --squash feature` do?
      options:
      - Creates a merge commit with two parents and the feature's history intact
      - Stages the cumulative diff of the feature branch on main without committing, so you can create one combined commit
      - Deletes the feature branch
      - Rebases the feature onto main
      correct_index: 1
      explanation: Squash stages a combined patch but does not commit — you supply the message. The result is *one* new commit on main containing all of the feature's changes; the feature's individual commits never appear on main.
    - question: After `git merge --squash feature; git commit`, what is true of the feature branch?
      options:
      - It no longer exists — squash deleted it
      - It still exists, unchanged; its commits are not on main (only a new combined commit is)
      - It points at the new squash commit on main
      - Its commits have been rewritten
      correct_index: 1
      explanation: Squash merge does not touch the feature branch. It is still there with its full history. To delete it after squashing, use `git branch -D feature` (force, because it is not ff-merged by Git's definition).
    - question: '**[Compare with Step 8]** You have a 3-commit feature. You merge it three ways. Which output is correct?'
      options:
      - plain `merge` → 1 new commit on main; `rebase + merge` → 3 new commits on main; `--squash + commit` → 3 new commits on main
      - plain `merge` → 1 merge commit (3 parents); `rebase + merge` → 3 new commits; `--squash + commit` → 1 new commit
      - plain `merge` → 1 merge commit with 2 parents; `rebase + merge` → 3 replayed commits on main (linear, ff); `--squash + commit` → 1 new commit on main
      - All three approaches produce identical history
      correct_index: 2
      explanation: Plain merge = 1 merge commit (2 parents). Rebase linearizes so merge ff-forwards 3 commits. Squash collapses the 3 into 1 new commit. Team preference decides which is right for the project.
    - question: Why might a team **reject** squash merge as a default policy?
      options:
      - It forces a merge commit which they dislike
      - Losing individual commit granularity hurts `git bisect` precision within a feature and erases authorship signal on intermediate commits
      - Git rejects squash merges on `main`
      - It requires a paid GitHub subscription
      correct_index: 1
      explanation: With squash, `git bisect` can only narrow to 'this whole feature', not to which intermediate commit caused the regression. Intermediate authors also disappear from main's history. Some teams prefer rebase/merge for richer history.
    - question: You squash-merged `feature-stats` into main. The next day you discover one of the three internal commits had a bug. How do you fix only that part?
      options:
      - Git tracks internal commits automatically — run `git revert --internal <sha>`
      - You cannot isolate it from main alone. The original commits still exist on the feature branch (or in reflog) — cherry-pick, revert, or rewrite from there
      - Use `git bisect run` to revert automatically
      - Delete main and re-merge with `git merge --no-squash`
      correct_index: 1
      explanation: Squash hides internal granularity on main. But the original commits still exist where the feature branch was (or via reflog). You can cherry-pick a fix or write a small revert patch on main. This is the classic squash trade-off — convenience on main, less surgical control later.
    - question: '**[Revisit Step 7]** A regression is reported on `main` three months after a feature was **squash-merged** in. `git bisect` on `main` narrows the culprit to the squash commit. What is your next move?'
      options:
      - Declare the feature author guilty and revert the whole squash commit
      - Switch to the (still-existing) feature branch and run `git bisect` there — its internal commits give you the fine-grained resolution squash destroyed on main
      - Bisect is unreliable after squash — read every line of the squash commit's diff
      - Re-run bisect with `--squash-aware`
      correct_index: 1
      explanation: Squash flattens *main's* history, not the feature branch's. The fine-grained commits are still preserved on the feature branch (assuming you didn't delete it) and in reflog. Bisect on the feature branch pinpoints the exact internal commit. This is the strongest argument for keeping merged feature branches for a while, not deleting them immediately.
    - question: '**[Revisit Step 3]** After `git merge --squash feature; git commit`, the new squash commit on main is a Git commit object like any other. What are its **parents**?'
      options:
      - 'Two parents: the tip of main and the tip of feature (like a merge commit)'
      - 'Three parents: main, feature, and their common ancestor'
      - 'One parent: the tip of main (before the squash). The feature branch tip is NOT a parent — that is what makes it a squash rather than a merge'
      - Zero parents — squash commits are parentless root commits
      correct_index: 2
      explanation: 'A squash commit has exactly one parent: the prior HEAD of the branch you ran `merge --squash` on. The feature branch tip is not referenced as a parent — which is why `git log main` shows a clean linear history and why `git bisect` on main cannot drill into the feature. Same object-model: the commit records exactly the parents it was given, nothing more.'
    - question: Put in order the commands to squash-merge a 3-commit `feature-stats` branch into main, then clean up.
      type: parsons
      display: block
      lines:
      - 'git switch main                   # target branch'
      - 'git merge --squash feature-stats  # stages combined diff; NO commit yet'
      - 'git status                        # verify: staged changes, no commit'
      - 'git commit -m "Add statistics module (mean, variance, stddev)"'
      - 'git branch -D feature-stats       # force-delete (not ff-merged in Git''s view)'
      distractors:
      - 'git merge feature-stats           # creates a merge commit — wrong strategy'
      - 'git branch -d feature-stats       # refuses: the branch''s commits aren''t on main'
      - 'git cherry-pick feature-stats     # only copies the tip commit, not combined'
      - 'git push --force                  # unneeded and dangerous'
      explanation: '`--squash` stages but does NOT commit — the extra `git commit` step is intentional so you write a fresh, whole-feature message. Use capital `-D` to delete: Git''s fast-forward definition says the feature branch is not merged (only a *new* combined commit landed on main), so lowercase `-d` refuses. Distractor 3 (`cherry-pick`) would only copy the *tip* commit''s patch, not the cumulative diff of the whole branch.'
- title: 'Git Submodules: Add & Clone'
  view: editor
  instructions: |
    ### Mental model: a library subscription

    Think of a submodule like **subscribing to a specific edition
    (version) of a library**:

    - You don't photocopy the library book into your own bookshelf
      (no file duplication).
    - You write down the **book title + edition number** (`.gitmodules`
      URL + pinned SHA).
    - Anyone with your note can fetch the same edition.
    - To upgrade, you edit the edition number — not the book.

    The "edition number" is the commit SHA. The "book" is the
    submodule's Git repository, hosted elsewhere.

    ### The problem

    Your main application depends on a shared library your team
    maintains in a separate repository (e.g., `math-utils`). You want:

    1. The library's source available in your project's working tree.
    2. The ability to **pin a specific version** (commit) of the library.
    3. To upgrade the library independently — without duplicating its
       code into your main repo.

    `git submodule` solves this. Internally, it is surprisingly simple:
    your main repo stores **a pointer to a specific commit** in the
    submodule's repo, plus a `.gitmodules` config file describing where
    to fetch it.

    ### On-disk layout

    ```folder-tree
    @startuml
    main-repo/
      .git/
        modules/
          math-utils/  ← submodule's actual git data (objects, refs, HEAD…)
      .gitmodules  ← tells Git where to fetch each submodule
      src/
      vendor/
        math-utils/  ← a whole nested Git repo (just nested)
          .git  ← gitfile: "gitdir: ../../.git/modules/math-utils"
          utils.py
    @enduml
    ```

    In main-repo, `vendor/math-utils` is tracked as a special "gitlink"
    entry — essentially a file that says "check out commit `abc123` of
    the math-utils repo here."

    ### Task 1: Inspect the pre-built "remote" library

    The tutorial has prepared a tiny `math-utils` library as if it
    were hosted on GitHub:

    - `/tutorial/math-utils-src/` — the "upstream" working repo (one
      commit with `double` and `triple` functions).
    - `/tutorial/math-utils.git` — a bare clone that acts as the
      remote URL your main project will reference.

    Inspect:

    ```bash
    ls /tutorial/math-utils-src
    cat /tutorial/math-utils-src/utils.py
    ls /tutorial/math-utils.git
    ```

    In real life `math-utils.git` would be
    `https://github.com/example/math-utils.git`. Here it is a local
    path — same semantics for `git clone`.

    ### Task 2: Add the submodule to your main project

    ```bash
    cd /tutorial/myproject
    git switch main
    git submodule add /tutorial/math-utils.git vendor/math-utils
    ```

    Inspect what changed:

    ```bash
    ls vendor/math-utils
    git status
    ```

    You should see *two* new entries in `git status`: `.gitmodules` and
    `vendor/math-utils`. The latter is the special gitlink pointer;
    the former is the plain-text config file Git just created for you.

    ### Open `.gitmodules` in the editor

    **Don't `cat` it in the terminal — open it in the Monaco editor
    on the right.** Click `.gitmodules` in the file tree (or use
    File → Open). You will see something like:

    ```ini
    [submodule "vendor/math-utils"]
            path = vendor/math-utils
            url = /tutorial/math-utils.git
    ```

    **Inspect it closely. Answer these before moving on:**

    1. How many lines? (Is it a "big complicated config" or a "tiny
       stanza"?)
    2. Where is the URL you passed to `git submodule add`? Is the
       pinned **commit SHA** stored in this file?
    3. What would break if you deleted this file?

    <details markdown="1"><summary>Reveal answers</summary>

    1. **Three lines per submodule** (a header + `path` + `url`). If
       you add three submodules, the file grows to 9 lines. `.gitmodules`
       is tiny by design — it only contains what teammates need to
       *fetch* each submodule.
    2. **URL yes, pinned SHA no.** The SHA lives in the outer tree
       as a gitlink (`git ls-files -s vendor/math-utils` — see
       below). `.gitmodules` answers "*where* can I fetch this"; the
       tree answers "*which commit* do I check out". Two independent
       pieces of information.
    3. **Teammates could not clone your submodules.** Without
       `.gitmodules`, `git clone --recursive` and `git submodule
       update --init` would not know any URLs to fetch from. The
       gitlink would still point at a SHA, but Git would have no
       way to retrieve the commit. `.gitmodules` is the
       **subscription directory**; the gitlink is the **edition
       selection**.

    </details>

    Now look at the gitlink in the terminal:

    ```bash
    git ls-files -s vendor/math-utils
    ```

    The output starts with `160000` — a special mode meaning "this is a
    submodule gitlink, not a regular file". The SHA after it is the
    **submodule's current commit SHA** that your main repo pins.

    Commit both the `.gitmodules` config and the gitlink pointer:

    ```bash
    git commit -m "Add math-utils submodule at v0.1.0"
    ```

    ### Task 3: Clone a repo with submodules

    A colleague cloning your main repo needs `--recursive` or they get
    an empty submodule folder. Simulate that:

    ```bash
    cd /tutorial
    git clone --recursive myproject colleague-clone
    ls colleague-clone/vendor/math-utils
    ```

    The colleague's clone has the submodule content at the correct
    pinned commit. Without `--recursive`, `vendor/math-utils/` would
    exist but be empty until they ran `git submodule update --init`.

    ### Summary so far

    You have added a submodule and cloned it recursively. The outer
    repo now stores: (1) a `.gitmodules` entry with the URL, (2) one
    40-char pinned SHA. That is the entire "subscription record" —
    no file duplication, consistent with the Step 3 object model.

    **Upgrade** and **resync** are the subjects of the next step.

    > **When to use submodules:** versioned code *you own* across
    > several repos. Not for third-party deps (use a package manager),
    > not for single config files (use config management).

    ### You can now

    - **Add** a submodule to an existing repo with `git submodule add
      <url> <path>`.
    - **Clone** a repo that uses submodules correctly with `git clone
      --recursive` (or recover after a plain clone with `git
      submodule update --init --recursive`).
    - **Recognize** the gitlink's `160000` mode and the `.gitmodules`
      file — the two structural differences between a regular file
      and a submodule.
    - **Discriminate** between cases where submodules fit and
      cases where a package manager or monorepo serves better.
  setup_commands:
  - "cd /tutorial/myproject && git switch -q main 2>/dev/null\nif [ -d /tutorial/math-utils.git ] && git --git-dir=/tutorial/math-utils.git log --oneline 2>/dev/null | grep -q 'Initial utils' && [ -x /tutorial/publish-math-utils-v0.2.sh ]; then\n  exit 0\nfi\nrm -rf /tutorial/math-utils-src /tutorial/math-utils.git /tutorial/colleague-clone\nmkdir -p /tutorial/math-utils-src\ncd /tutorial/math-utils-src\ngit init -q\nprintf 'def double(x):\\n    return x * 2\\n\\ndef triple(x):\\n    return x * 3\\n' > utils.py\ngit add utils.py\ngit commit -qm 'Initial utils'\ncd /tutorial\ngit clone -q --bare math-utils-src math-utils.git\n# Install the \"upstream publishes v0.2\" helper.\ncat > /tutorial/publish-math-utils-v0.2.sh << 'SCRIPT'\n#!/bin/bash\nset -e\ncd /tutorial/math-utils-src\nif grep -q 'def quadruple' utils.py; then\n  echo 'upstream math-utils already at v0.2'\n  exit 0\nfi\nprintf '\\ndef quadruple(x):\\n    return x * 4\\n' >> utils.py\ngit commit -qam 'Add quadruple'\n# Push to the bare 'remote' so submodule fetch sees it\nBR=$(git rev-parse --abbrev-ref HEAD)\ngit push -q /tutorial/math-utils.git $BR:$BR 2>/dev/null || \\\n  git push -q /tutorial/math-utils.git HEAD:master 2>/dev/null || \\\n  git push -q /tutorial/math-utils.git HEAD:main 2>/dev/null || true\necho 'upstream math-utils is now at v0.2 (adds quadruple)'\nSCRIPT\nchmod +x /tutorial/publish-math-utils-v0.2.sh\n"
  solution:
    commands:
    - cd /tutorial/myproject && git switch main
    - git submodule add /tutorial/math-utils.git vendor/math-utils
    - git commit -m 'Add math-utils submodule at v0.1.0'
    - cd /tutorial && git clone --recursive myproject colleague-clone
    explanation: |
      - **`git submodule add <url> <path>`:** Clones the URL into the path AND creates a `.gitmodules` entry describing that submodule (its path + URL). Both the `.gitmodules` file and the gitlink pointer must be committed.
      - **Gitlink vs regular file:** a submodule entry has Git mode `160000` (instead of `100644` for a regular file). Its content is not bytes — it is a 40-char commit SHA indicating *which commit* of the submodule's repo should be checked out here.
      - **`git clone --recursive`:** Clones the outer repo and all submodules in one command. Forgetting this leaves empty submodule folders until `git submodule update --init --recursive`.
  tests:
  - description: myproject has a math-utils submodule
    command: cd /tutorial/myproject && [ -f .gitmodules ] && grep -q 'math-utils' .gitmodules
  - description: .gitmodules has been committed
    command: cd /tutorial/myproject && git log --oneline -- .gitmodules | grep -q '.'
  - description: Submodule content is checked out
    command: '[ -f /tutorial/myproject/vendor/math-utils/utils.py ]'
  - description: vendor/math-utils is tracked as a gitlink (mode 160000)
    command: cd /tutorial/myproject && git ls-files -s vendor/math-utils | grep -q '^160000'
  - description: colleague-clone was created successfully with its submodule populated
    command: '[ -f /tutorial/colleague-clone/vendor/math-utils/utils.py ]'
  quiz:
    title: Git Submodules — Knowledge Check
    min_score: 0.8
    shuffle: true
    questions:
    - question: What does a Git submodule actually store in the outer repository?
      options:
      - A full copy of the submodule's files tracked like normal files
      - A gitlink — a 40-character commit SHA pinning which commit of the submodule's repo should be checked out at that path, plus a `.gitmodules` entry with the URL
      - Nothing — submodules are purely a runtime concept
      - A symbolic link to the submodule's directory
      correct_index: 1
      explanation: The outer repo stores ONE SHA per submodule (the pinned commit) plus a `.gitmodules` entry for the URL. The submodule's working files are checked out in the submodule path; its git data (objects, refs, HEAD) lives in the outer repo's `.git/modules/<name>/` — the submodule directory itself contains only a `.git` text file (a "gitfile") pointing there, NOT a full `.git/` directory.
    - question: A teammate clones your repo normally with `git clone <url>`. What do they see at the submodule path?
      options:
      - The submodule's full contents, checked out automatically
      - An empty folder — they need `git submodule update --init --recursive` (or originally clone with `--recursive`) to populate it
      - An error preventing the clone from finishing
      - A warning but the content downloads lazily on first access
      correct_index: 1
      explanation: Plain `git clone` records the submodule entries but does not fetch their content. The folder exists but is empty. `git clone --recursive <url>` or `git submodule update --init --recursive` after the fact populates it.
    - question: Which statements about submodules are true? (Select all that apply)
      type: multiple
      options:
      - A submodule is a full Git repository nested inside another
      - '`git clone --recursive <url>` clones both outer and submodules'
      - The outer repo stores full copies of the submodule's files
      - The outer repo tracks a submodule with a special gitlink entry (mode `160000`) containing the pinned commit SHA
      correct_indices:
      - 0
      - 1
      - 3
      explanation: The outer repo stores only a pinned SHA (gitlink, mode 160000) and a `.gitmodules` entry — not file copies. The submodule is a genuine nested repo.
    - question: '**[Synthesis — revisits Steps 1, 3]** Why is it internally consistent that a submodule is ''just a pinned commit SHA''?'
      options:
      - Because every Git object is ultimately addressed by a SHA (blobs, trees, commits), the outer repo only needs to point at the submodule's commit SHA to uniquely identify its entire snapshot — no file duplication needed
      - Because submodules cannot have their own branches
      - Because submodules are always read-only
      - Because Git stores submodules separately in a proprietary database
      correct_index: 0
      explanation: Back to the object model (Step 3). A commit SHA uniquely identifies a whole-project snapshot (commit → tree → blobs). Pinning a commit SHA is enough to reconstruct the submodule's entire content. No file duplication is necessary — exactly the same property that makes branches cheap (Step 1).
    - question: '**[Revisit Step 8]** A submodule''s pinned SHA is 40 characters, just like a regular commit SHA. In terms of Git objects, what kind of object does it point to?'
      options:
      - A blob object
      - A tree object
      - A commit object — in the submodule's separate repository's object database
      - A tag object
      correct_index: 2
      explanation: A gitlink pins a *commit* SHA — which (via the commit's tree and blobs) uniquely determines the submodule's entire file state. The commit lives in the submodule's `.git/objects/`, not the outer repo's. This is exactly the same commit-SHA-as-snapshot-identity property rebase relies on (Step 8) and that makes the whole object model coherent.
    - question: Put in order the commands a teammate runs to add a submodule, commit it, and set up a colleague's workstation so the submodule files appear. Distractors are verb-variants that look right but fail.
      type: parsons
      display: block
      lines:
      - 'cd /tutorial/myproject'
      - 'git submodule add /tutorial/math-utils.git vendor/math-utils'
      - 'git commit -m "Add math-utils submodule at v0.1.0"'
      - 'cd /tutorial && git clone --recursive myproject colleague-clone'
      distractors:
      - 'git submodule init /tutorial/math-utils.git vendor/math-utils   # init alone does not fetch'
      - 'git clone myproject colleague-clone                              # submodule folder empty'
      - 'git submodule fetch /tutorial/math-utils.git                     # not a valid subcommand'
      - 'git merge /tutorial/math-utils.git                               # confuses a nested repo with a branch'
      explanation: '`git submodule add` combines clone + config in one step; `init` without `update` is half the story. Plain `git clone` creates an empty submodule folder. `git submodule fetch` is invented. `git merge` on a URL is a syntax error. Verb selection is what separates a working submodule workflow from a broken one.'
- title: 'Updating Submodules: Upstream Bumps & Resync'
  view: editor
  instructions: |
    You added a submodule in Step 11 and pinned v0.1. Now the
    upstream library team publishes v0.2 with a new `quadruple`
    function. You need to:

    1. Fetch the new version inside the submodule.
    2. Bump the pinned SHA in the outer repo.
    3. Understand what happens to a teammate who pulls your change.

    Plus: what happens when your submodule working directory has
    "drifted" from the pinned SHA — how you force-sync it back.

    ### Task 1: Upstream publishes v0.2

    Simulate the upstream library team publishing v0.2. The tutorial
    provides a helper script — run it (the upstream team's work, not
    yours):

    ```bash
    /tutorial/publish-math-utils-v0.2.sh
    ```

    The script commits a `quadruple` function in the upstream repo
    and pushes it to the remote `math-utils.git`. Confirm the remote
    now has two commits:

    ```bash
    git --git-dir=/tutorial/math-utils.git log --oneline --all
    ```

    Check your outer repo — nothing has changed yet:

    ```bash
    cd /tutorial/myproject
    git status
    ```

    The upstream push doesn't automatically propagate to your
    checked-out submodule. You must opt in.

    ### Task 2: Fetch and check out the new version inside the submodule

    Remember: a submodule is a nested Git repo. To fetch new commits,
    use normal `git` commands **inside** the submodule:

    ```bash
    cd /tutorial/myproject/vendor/math-utils
    git fetch
    git checkout origin/HEAD
    ```

    Back in the outer repo, see what Git notices:

    ```bash
    cd /tutorial/myproject
    git status
    git diff vendor/math-utils
    ```

    You will see something like:

    ```
    modified:   vendor/math-utils (new commits)

    Subproject commit abc123...  ← old (pinned) commit
    Subproject commit def456...  ← new (checked-out) commit
    ```

    That one-line diff is the entire thing the outer repo can say
    about the submodule's change: "the pinned SHA is now this SHA
    instead of that SHA." **The outer repo does not track the line-level
    diff** — that lives in the submodule's own object database.

    ### Task 3: Bump the pinned SHA in the outer repo

    The upstream version is fetched, but your main repo still *pins*
    the old SHA. To officially "bump the version":

    ```bash
    git add vendor/math-utils
    git commit -m "Bump math-utils to v0.2.0 (adds quadruple)"
    ```

    Now `git log main --oneline` shows a commit that just bumps the
    pinned SHA. In the library-subscription analogy, you changed the
    edition number in your bookshelf log.

    ### Task 4: The "teammate forgot submodule update" trap

    Here is the most common submodule pain point. Imagine your teammate
    pulls your change:

    ```bash
    cd /tutorial/colleague-clone
    git pull
    cat vendor/math-utils/utils.py
    ```

    They have the new *pinned SHA* in their outer repo's tree — but
    **their submodule working directory is still at v0.1**. If their
    code imports `quadruple`, it will fail with a `NameError`,
    because the file on disk does not have it yet.

    The fix is one command:

    ```bash
    git submodule update --init --recursive
    cat vendor/math-utils/utils.py
    ```

    Now `quadruple` is present. This command clones missing submodules
    and forces each submodule's working directory to match the outer
    repo's pinned SHA — the **deterministic state**.

    > **Rule of thumb:** after every `git pull` that may have touched
    > submodule paths, run `git submodule update --init --recursive`.
    > Or set `git config submodule.recurse true` so pull does it
    > automatically.

    ### Task 5: Force-resync a drifted submodule

    Simulate a teammate who experimentally checked out an old commit
    inside the submodule and forgot to come back:

    ```bash
    cd /tutorial/colleague-clone/vendor/math-utils
    git checkout HEAD~1
    cd /tutorial/colleague-clone
    git status
    ```

    The outer repo says `modified: vendor/math-utils (new commits)`
    because the checked-out SHA no longer matches the pinned one.
    One command restores determinism:

    ```bash
    git submodule update --init --recursive
    git status
    ```

    Clean again — the submodule is back at the pinned SHA the outer
    repo expected. Same command works whether the submodule was never
    initialized, partially fetched, or drifted.

    ### You can now

    - **Upgrade** a submodule to a new upstream commit with the
      two-step dance: `fetch`/`checkout` inside submodule, then
      `git add`/`commit` outside.
    - **Diagnose** and fix the classic "teammate forgot submodule
      update" failure — add `git submodule update --init --recursive`
      to your post-pull muscle memory.
    - **Force-resync** any submodule to the outer repo's pinned SHA
      regardless of how it drifted.
    - **Generalize the two-step pattern** to downgrades, tag-pins,
      and fork-swaps — the command surface is the same each time.
  setup_commands:
  - "cd /tutorial/myproject\ngit switch -q main 2>/dev/null\nif [ ! -f .gitmodules ] || ! grep -q math-utils .gitmodules 2>/dev/null; then\n  git submodule add -f /tutorial/math-utils.git vendor/math-utils 2>/dev/null\n  git commit -qm 'Add math-utils submodule at v0.1.0' 2>/dev/null\nfi\nif [ ! -d /tutorial/colleague-clone ]; then\n  (cd /tutorial && git clone -q --recursive myproject colleague-clone 2>/dev/null)\nfi\ngit submodule update --init --recursive 2>/dev/null\n"
  solution:
    commands:
    - /tutorial/publish-math-utils-v0.2.sh
    - git --git-dir=/tutorial/math-utils.git log --oneline --all
    - cd /tutorial/myproject/vendor/math-utils && git fetch && git checkout origin/HEAD
    - cd /tutorial/myproject && git add vendor/math-utils && git commit -m 'Bump math-utils to v0.2.0 (adds quadruple)'
    - cd /tutorial/colleague-clone && git pull
    - cd /tutorial/colleague-clone && git submodule update --init --recursive
    - cd /tutorial/colleague-clone/vendor/math-utils && git checkout HEAD~1
    - cd /tutorial/colleague-clone && git submodule update --init --recursive
    explanation: |
      - **Two-step upgrade:** Inside the submodule, `git fetch && git checkout origin/HEAD` moves the submodule's HEAD to the new upstream commit. Outside, `git add <submodule-path> && git commit` records the new pinned SHA in the outer repo. Skipping the outer step means the upgrade is local to you and never reaches teammates.
      - **Why outer `git pull` does NOT auto-update submodules:** pull updates the *pinned SHA* (because that is what the tree records) but does not touch submodule working directories. Teammates must run `git submodule update --init --recursive` (or configure `submodule.recurse=true`) to actually reflect the new pinned SHA on disk.
      - **`git submodule update --init --recursive`:** the deterministic-state command. Clones missing submodules, forces every submodule's HEAD to the pinned SHA. The cure for every "my submodule is in a weird state" moment.
  tests:
  - description: Submodule working directory has the new quadruple function
    command: grep -q 'def quadruple' /tutorial/myproject/vendor/math-utils/utils.py
  - description: Outer repo has a commit bumping the submodule SHA
    command: cd /tutorial/myproject && git log --oneline | grep -qiE 'bump|v0.2|quadruple'
  - description: Outer repo is clean (no pending submodule modifications)
    command: cd /tutorial/myproject && git diff --quiet && git diff --cached --quiet
  - description: Remote (math-utils.git) has the new upstream commit
    command: git --git-dir=/tutorial/math-utils.git log --oneline --all | grep -qi 'quadruple'
  quiz:
    title: Updating Submodules — Knowledge Check
    min_score: 0.8
    shuffle: true
    questions:
    - question: You bumped a submodule to v0.2 and pushed. A teammate pulls your change and reports tests failing because `quadruple` does not exist. Most likely cause?
      options:
      - The submodule's remote is down
      - They forgot `git submodule update --init --recursive` after pulling — their submodule working directory still has v0.1 while main's code expects v0.2
      - Their Git is too old
      - The `.gitmodules` file is corrupt
      correct_index: 1
      explanation: Classic trap. `git pull` on the outer repo updates the **pinned SHA in the tree** but does NOT touch the submodule working directory. They need `git submodule update --init --recursive` to actually reflect the new SHA on disk. Configure `git config submodule.recurse true` to make pull do this automatically.
    - question: Upgrading a submodule requires how many `git commit` calls in total (inside + outside)?
      options:
      - Zero — `git submodule update` commits for you
      - One — only in the outer repo
      - Two — if the submodule itself needed new commits (e.g., you wrote a patch inside it), commit there first; then the outer repo commit bumps the SHA. If the new upstream commit already exists, only the outer commit is needed.
      - Three — submodule, `.gitmodules`, and outer tree
      correct_index: 2
      explanation: The answer depends on whether *you* are authoring the upgrade (write code inside submodule → commit inside → push → commit outside) or just pulling in upstream work (checkout new commit inside → commit outside). In either case the outer commit is mandatory — that is the SHA bump.
    - question: '`git status` in the outer repo shows `modified: vendor/math-utils (new commits)`. What does it mean?'
      options:
      - The `.gitmodules` file has been edited
      - The submodule's checked-out HEAD differs from the pinned SHA — either you updated the submodule, or it drifted
      - The submodule is broken
      - Git is about to garbage-collect the submodule
      correct_index: 1
      explanation: 'The outer repo compares the pinned SHA with the submodule''s actual HEAD. Mismatch → `new commits`. Fix: `git add <path>` + commit to pin the new SHA, or `git submodule update` to snap the submodule back to the pinned SHA.'
    - question: '**[Revisit Step 1]** Why doesn''t `git pull` automatically update submodule working directories — what Git principle is respected by this design?'
      options:
      - Pull is inherently broken for submodules
      - Submodules are independent Git repos; respecting the outer/inner separation means outer operations don't silently modify the inner repo's HEAD. Same separation-of-concerns as detached HEAD (Step 1) — Git is conservative about moving HEAD without explicit instruction
      - Pull is always read-only
      - It would violate the SHA-1 collision resistance guarantee
      correct_index: 1
      explanation: 'Git keeps the outer/inner repo boundary strict: an outer `pull` updates the pinned SHA (a fact about the outer tree) but does not reach into the inner repo and rewrite its HEAD. You must explicitly say `git submodule update`. Same conservative-HEAD-movement philosophy that makes detached-HEAD-with-uncommitted-changes impossible.'
    - question: '**[Revisit Step 3]** The outer repo''s diff for a submodule change is always just one line: `-Subproject commit <old>` / `+Subproject commit <new>`. Why is that enough?'
      options:
      - Git is being lazy
      - Because a commit SHA uniquely identifies a snapshot (commit → tree → blobs), the SHA bump is exactly equivalent to a full content change — no additional diff data is needed in the outer tree
      - Because Git compresses submodule diffs
      - Because submodules don't actually change content
      correct_index: 1
      explanation: Step 3's object-model insight applied again. A commit SHA resolves to a deterministic snapshot. Pinning a new SHA is, by construction, equivalent to changing the entire content — no further diff data is needed in the outer commit. Minimum information, maximum fidelity.
    - question: '**[Evaluate]** A teammate says: ''After every `git pull` I always run `git submodule update --init --recursive`, even on repos without submodules. Paranoia, or sensible?'''
      options:
      - Waste of time — it does nothing on repos without submodules
      - Sensible. The command is a no-op on non-submodule repos (instant exit) and catches all submodule-state drift. Adding it to muscle memory costs nothing and prevents the most common submodule bug
      - Harmful — it can corrupt non-submodule repos
      - Only useful on teams larger than 10 people
      correct_index: 1
      explanation: 'The command is safe on any repo. Running it unconditionally is a cheap habit that prevents the most common submodule bug (stale working dir). Equivalent hardening: `git config --global submodule.recurse true` to make pull/checkout do it automatically.'
    - question: Upstream publishes a v0.2 commit. Put in order the commands that land it as a pinned version bump in your outer repo. Distractors are verb-variants that look right but fail or do the wrong thing.
      type: parsons
      display: block
      lines:
      - 'cd /tutorial/myproject/vendor/math-utils'
      - 'git fetch                                # pulls new commits into submodule'
      - 'git checkout origin/HEAD                 # move submodule HEAD to new SHA'
      - 'cd /tutorial/myproject                   # back to outer repo'
      - 'git add vendor/math-utils                # stage the gitlink SHA change'
      - 'git commit -m "Bump math-utils to v0.2.0"'
      distractors:
      - 'git pull                                # ambiguous in detached-HEAD submodule'
      - 'git submodule update                    # resets TO pinned SHA — opposite of what we want'
      - 'git commit -am "Bump"                   # would sweep in unrelated WD changes'
      - 'git merge origin/HEAD                   # creates a merge commit inside submodule'
      explanation: '`git submodule update` (distractor 2) is exactly the *wrong* verb here — it resets the submodule back to whatever the *outer* tree pins, erasing the new checkout. That''s the single most common submodule confusion, and getting the direction right is the heart of this step. `git pull` in detached HEAD is unreliable. `-am` would include unrelated changes. `merge` creates a commit structure we don''t want inside the submodule.'
- title: 'Submodule Internals: What ''Content Changed'' Means'
  view: editor
  instructions: |
    ### The confusing situation

    You `cd` into `vendor/math-utils`, fix a bug, run `git status`
    back in the outer repo, and see:

    ```
    modified:   vendor/math-utils (modified content)
    ```

    Or sometimes:

    ```
    modified:   vendor/math-utils (new commits)
    ```

    What do those two messages actually mean? And why does `git diff`
    on a submodule print lines like `Subproject commit abc123...`
    instead of a real diff?

    This step pulls the submodule concept apart one more time so you
    can **reason from first principles** whenever you see that status
    line.

    ### The mental model

    The outer repo stores **exactly one thing** about each submodule
    (in addition to the `.gitmodules` entry): the **pinned commit SHA**.

    Every time you run `git status` in the outer repo, Git compares
    two SHAs:

    ```
    SHA pinned by outer tree          vs      SHA at submodule's current HEAD
        (the "gitlink" 160000 entry)                 (what's actually checked out)
    ```

    - **SHAs match** → submodule is clean from the outer repo's view.
    - **SHAs differ because submodule made commits** →
      `modified: vendor/... (new commits)`
    - **Submodule has uncommitted working-tree changes (dirty
      working directory)** → `modified: vendor/... (modified content)`
    - **Both** → both messages together.

    Nothing else can cause "modified" on a submodule gitlink.

    ### Task 1: See a clean starting state

    Ensure you are on main with the submodule cloned from Step 11. If
    you jumped straight here, the setup has already wired everything up.

    ```bash
    cd /tutorial/myproject
    git status
    git submodule status
    ```

    `git submodule status` shows, for each submodule, the pinned SHA,
    the path, and the current checked-out branch/tag. No prefix
    character means clean. `+` means checked-out commit differs from
    pinned. `-` means submodule is not initialized.

    ### Task 2: Make an uncommitted change **inside** the submodule

    Open `vendor/math-utils/utils.py` in the editor (top-right). Add
    this function at the bottom:

    ```python

    def halve(x):
        return x / 2
    ```

    Save. Check the outer repo:

    ```bash
    cd /tutorial/myproject
    git status
    ```

    You now see:

    ```
    modified:   vendor/math-utils (modified content)
    ```

    This **does not mean** Git tracks that new line. It means:
    the submodule's working directory is dirty. The outer repo only
    knows "the submodule directory doesn't match its own HEAD". It
    does not store or commit the inner changes.

    Also try:

    ```bash
    git diff vendor/math-utils
    ```

    You will see **no diff** (or a short submodule summary, depending
    on Git version). The outer repo cannot show a real line-level diff
    for a submodule — it only knows about the pinned SHA.

    To see the actual content diff, cd into the submodule:

    ```bash
    cd vendor/math-utils
    git diff
    ```

    That is a normal `git diff` in the submodule's own repo.

    ### Task 3: Commit the change **inside** the submodule

    In the submodule, stage and commit:

    ```bash
    # still inside vendor/math-utils
    git add utils.py
    git commit -m "Add halve helper"
    ```

    ### Task 3b: Try to share it — and watch it fail

    You made and committed a change inside the submodule. Seems
    complete? **Try to push it**:

    ```bash
    # still inside vendor/math-utils
    git push
    ```

    **Predict the error before you run.** What will Git complain about?

    You will likely see either:

    - `fatal: The current branch ... has no upstream branch`, or
    - `fatal: You are not currently on a branch` (if the submodule is
      in detached HEAD — the default after `git submodule update`).

    **This is the most common submodule footgun in the wild.** You
    made the inner commit, you believe you published it — but the
    submodule was in detached HEAD (Step 1!) so the commit has no
    branch and cannot be pushed, OR the branch has no upstream.

    The fix: check out a proper branch inside the submodule before
    committing:

    ```bash
    # inside vendor/math-utils
    git switch -c update-halve 2>/dev/null || git switch update-halve
    git log --oneline -2     # your commit is on this branch now
    # Push would work now:
    # git push -u origin update-halve
    ```

    (We can't actually push to the bare repo in this tutorial without
    extra setup, but you now see why the push failed and how to
    recover. This is a *core* submodule skill.)

    Back in the outer repo:

    ```bash
    cd /tutorial/myproject
    git status
    ```

    The outer-repo message changes to:

    ```
    modified:   vendor/math-utils (new commits)
    ```

    **"Modified content" became "new commits"** — because the
    submodule's working tree is now clean (you committed), but its
    HEAD moved to a new SHA that does not match the outer repo's
    pinned SHA.

    At this point the outer repo has **not yet recorded the new
    submodule SHA**. Your main branch is still pinning the *old*
    commit.

    ### Task 4: Bump the pinned SHA in the outer repo

    To "publish" the new submodule commit to teammates, commit the
    gitlink update in the outer repo:

    ```bash
    git add vendor/math-utils
    git commit -m "Bump math-utils: add halve helper"
    git status
    ```

    `git status` reports clean. `git log -1 -p vendor/math-utils`
    shows the single line that changed — the gitlink SHA.

    ### The six steps are really six invariants

    The ceremony looks like six arbitrary commands you must memorize.
    It isn't — each step **preserves one invariant** without which
    the rest of the ceremony collapses. Learn the invariants and
    the steps derive themselves:

    | # | Command | **Invariant preserved** |
    |---|---|---|
    | 1 | `cd submodule; git switch -c <branch>` | **HEAD is reachable from a branch ref** (not detached) |
    | 2 | `git commit -am "..."` inside submodule | **Your change is a commit object** (not just a working-tree edit) |
    | 3 | `git push` inside submodule | **The new SHA exists on the submodule's remote** where teammates can fetch it |
    | 4 | `cd ../..; git add <submodule-path>` in outer | **The outer repo's tree stages the new pinned SHA** |
    | 5 | `git commit -m "Bump..."` in outer | **The outer repo records a new commit pinning the new SHA** |
    | 6 | `git push` outer | **The new pin is visible to teammates** |

    The ceremony isn't "follow six commands." It's "maintain six
    invariants in a dependency order": each later invariant requires
    the earlier ones to already hold.

    ```bash
    git log -1 -p vendor/math-utils
    ```

    You see something like:

    ```
    -Subproject commit <old-sha>
    +Subproject commit <new-sha>
    ```

    That is the entire diff the outer repo stores for a submodule
    bump: one line, the SHA. Everything else lives inside the
    submodule's own object database.

    ### Task 5: Reset a submodule back to the pinned SHA

    What if a teammate clones your repo and their submodule folder
    somehow drifts (they experimented, forgot to commit, etc.)? The
    outer repo's pinned SHA is the deterministic truth. Force the
    submodule back to it:

    ```bash
    git submodule update --init --recursive
    ```

    Or more aggressively if the submodule has local changes:

    ```bash
    git submodule update --init --recursive --force
    ```

    This resets every submodule's HEAD to exactly the SHA stored in
    the outer tree. `git status` in the outer repo then reports
    clean.

    ### The three ways to exit a "modified" state

    | Message | Meaning | Fix |
    |---|---|---|
    | `modified content` | submodule working tree is dirty | commit or discard inside the submodule |
    | `new commits` | submodule HEAD ≠ pinned SHA | `git add <path>` + commit (to bump) OR `git submodule update` (to reset) |
    | both | working tree dirty *and* unrecorded commits | same — resolve each layer |

    Those are the only three states. Memorizing them removes 90% of
    the submodule confusion you will see in practice.

    ### You can now

    - **Distinguish** `modified content` from `new commits` just from
      `git status`, and pick the correct fix for each.
    - **Execute** the six-step "publish a submodule change" ceremony
      without missing the detached-HEAD-before-committing trap.
    - **Resync** a submodule to its pinned SHA deterministically with
      `git submodule update --init --recursive`.
    - **Reason from first principles** whenever a submodule confuses
      you: the outer repo tracks one SHA; the inner repo is a full
      Git repo; the two are independent.

    ### Fixes 95% of "my submodule is weird" moments

    ```bash
    git submodule update --init --recursive
    ```

    Safe to run after any `git pull`. Add `--force` to discard local
    submodule changes. Set `git config --global submodule.recurse true`
    to make pull/checkout do this automatically.
  watch_files:
  - myproject/vendor/math-utils/utils.py
  open_file: myproject/vendor/math-utils/utils.py
  setup_commands:
  - "cd /tutorial/myproject\ngit switch -q main 2>/dev/null\nif [ ! -d vendor/math-utils/.git ] && [ ! -f vendor/math-utils/.git ]; then\n  git submodule add -f /tutorial/math-utils.git vendor/math-utils 2>/dev/null\n  git commit -qm 'Add math-utils submodule' 2>/dev/null\nfi\ngit submodule update --init --recursive 2>/dev/null\n"
  solution:
    commands:
    - cd /tutorial/myproject/vendor/math-utils && printf '\ndef halve(x):\n    return x / 2\n' >> utils.py
    - cd /tutorial/myproject/vendor/math-utils && git add utils.py && git commit -m 'Add halve helper'
    - 'cd /tutorial/myproject && git add vendor/math-utils && git commit -m ''Bump math-utils: add halve helper'''
    - cd /tutorial/myproject && git submodule update --init --recursive
    explanation: |
      - **`modified: <path> (modified content)`:** the submodule's working directory is dirty — untracked or unstaged changes inside the submodule. The outer repo cannot show the diff; you must `cd` into the submodule to see it with plain `git diff`.
      - **`modified: <path> (new commits)`:** the submodule's HEAD has moved to a new commit, but the outer repo still points at the old pinned SHA. Resolve by either `git add <path>` + commit (to bump) or `git submodule update` (to reset the submodule back to the pinned SHA).
      - **The outer diff for a submodule is always just one line:** `-Subproject commit <old>` / `+Subproject commit <new>`. That is the only thing the outer repo records about a submodule change — two 40-char SHAs.
      - **`git submodule update --init --recursive`:** deterministic reset. Every submodule is forced back to the SHA the outer tree pins. Run after every `git pull` that touches submodule-tracked paths.
  tests:
  - description: On main branch
    command: cd /tutorial/myproject && git symbolic-ref -q HEAD | grep -q 'refs/heads/main'
  - description: Submodule contains a halve helper
    command: cd /tutorial/myproject && grep -q 'def halve' vendor/math-utils/utils.py
  - description: Submodule's inner commit for halve exists
    command: cd /tutorial/myproject/vendor/math-utils && git log --oneline | grep -qi 'halve'
  - description: Outer repo has a commit that bumps the submodule SHA
    command: cd /tutorial/myproject && git log --oneline | grep -qiE 'bump|halve'
  - description: Outer repo is clean (no pending submodule modifications)
    command: cd /tutorial/myproject && git diff --quiet && git diff --cached --quiet
  quiz:
    title: Submodule Internals — Knowledge Check
    min_score: 0.8
    shuffle: true
    questions:
    - question: 'You see `modified: vendor/math-utils (modified content)` in the outer `git status`. What caused it?'
      options:
      - The submodule's HEAD differs from the pinned SHA
      - The submodule's working directory has uncommitted changes (untracked or unstaged)
      - The `.gitmodules` file was edited
      - The submodule's remote has new commits
      correct_index: 1
      explanation: '`modified content` specifically means: the submodule working tree is dirty — files inside are unstaged or untracked. The HEAD may still match the pinned SHA. Running `git status` *inside* the submodule will show the dirty files.'
    - question: 'You see `modified: vendor/math-utils (new commits)` in the outer `git status`. What caused it?'
      options:
      - A file inside the submodule was edited but not committed
      - The submodule's HEAD has moved to a commit different from the one pinned by the outer repo's tree
      - The outer repo's branch pointer moved
      - The submodule is corrupted
      correct_index: 1
      explanation: '`new commits` means: inside the submodule, HEAD advanced (someone committed, or checked out a different SHA). The outer repo still records the OLD pinned SHA, so it flags the divergence. Fix: `git add <path>` + commit to bump the pinned SHA, or `git submodule update` to reset the submodule back to the pinned SHA.'
    - question: You run `git diff vendor/math-utils` in the outer repo after making and committing a change in the submodule. What do you see?
      options:
      - A full line-by-line diff of what changed inside the submodule
      - 'One line: `-Subproject commit <old>` / `+Subproject commit <new>` — the SHA bump is the only diff the outer repo stores'
      - An error message
      - The diff of `.gitmodules`
      correct_index: 1
      explanation: The outer repo's diff for a submodule path is always the gitlink SHA change — one line. To see content-level diffs, `cd` into the submodule and run plain `git diff` there. Two repos, two diff domains.
    - question: Which commands reset a submodule's working directory and HEAD to exactly the SHA the outer repo pins?
      options:
      - '`git submodule update --init --recursive` (and `--force` if local changes)'
      - '`git pull` in the outer repo'
      - '`git reset --hard` in the outer repo'
      - '`rm -rf vendor/math-utils && git clone`'
      correct_index: 0
      explanation: '`git submodule update --init --recursive` is the deterministic reset. It clones missing submodules and checks out each one at the outer tree''s pinned SHA. `git reset --hard` in the outer repo does NOT affect submodule working directories — Git treats them as separate repos.'
    - question: '**[Revisit Step 3]** Why is it consistent that the outer repo records ONLY a pinned SHA for each submodule — not the submodule''s files?'
      options:
      - Because file content inside a submodule is always confidential
      - Because a commit SHA uniquely identifies a snapshot (commit → tree → blobs), so one SHA is enough to reconstruct the submodule's entire content — duplicating files would waste space
      - Because submodules are always read-only
      - Because Git uses a separate database for submodules
      correct_index: 1
      explanation: Same object-model insight as Step 3. A commit SHA points at a tree that points at blobs — one SHA resolves to a deterministic snapshot. Storing the SHA is equivalent to storing the files. No duplication is needed.
    - question: '**[Evaluate]** You edited `vendor/math-utils/utils.py` and saved. Your teammate pulls your branch and sees a clean `git status`. Why didn''t your edit get to them?'
      options:
      - Git hid the change because it was inside a submodule
      - You modified the submodule's working directory but never (a) committed inside the submodule and pushed, NOR (b) bumped the pinned SHA in the outer repo — so nothing in shared history carries the change
      - Your teammate's Git is out of date
      - Submodules never sync changes between collaborators
      correct_index: 1
      explanation: 'An edit to a submodule file affects only your working tree until you perform the two-step commit: (1) commit inside the submodule and push its new commit to the submodule''s remote, (2) `git add <path>` + commit in the outer repo to bump the pinned SHA. Skip either step and the change never reaches teammates.'
    - question: '**[Revisit Step 1]** You edit a file inside a submodule, run `git add && git commit` inside the submodule, then `git push`. Git errors with something like `fatal: You are not currently on a branch`. What Step-1 concept explains this?'
      options:
      - Detached HEAD — `git submodule update` normally checks out submodules in detached HEAD at the pinned SHA. Commits there are orphaned relative to any branch; push needs a branch
      - Merge conflicts
      - Missing upstream
      - Submodules are read-only by default
      correct_index: 0
      explanation: 'After `git submodule update`, submodules are in detached HEAD at the pinned SHA (because that''s what the outer tree specified — no branch context). Any commit you make there is anchored to nothing. Fix: `git switch -c <branch>` inside the submodule **before** committing. Same detached-HEAD pattern as Step 1, encountered in a submodule setting.'
    - question: '**[Revisit Step 8]** You ran `git rebase main` inside a submodule and rewrote three of its commits. The outer repo''s `git status` says `modified: vendor/math-utils (new commits)`. Is anything wrong with this?'
      options:
      - No issue — rebase inside a submodule is business as usual
      - Rebase inside a submodule is fine in isolation, but the submodule's old SHAs (still pinned by the outer repo's older commits) now point to orphaned commits — teammates pulling older outer-repo history may fail to fetch them if they were never pushed. Treat submodule rebases with the same 'safe zone' rule as any other rebase
      - Git prevents rebase inside submodules
      - Rebase deletes the submodule
      correct_index: 1
      explanation: 'A submodule is a real Git repo — rebase works there exactly as in Step 8/9. The complication is that the outer repo may still pin the pre-rebase SHAs; if those weren''t pushed, teammates checking out old outer-repo commits will fail to fetch them (`fatal: reference is not a tree`). Same cardinal rule: rebase only unpushed/local history.'
    - question: The full "publish a submodule change" ceremony. Put the six required commands in order. Distractors are verb-variants that break one or more of the ceremony's causal invariants.
      type: parsons
      display: block
      lines:
      - 'cd vendor/math-utils                       # (1) enter the submodule'
      - 'git switch -c update-halve                 # (2) attach HEAD to a branch (NOT detached)'
      - 'git commit -am "Add halve helper"          # (3) create the commit inside submodule'
      - 'git push -u origin update-halve            # (4) publish the submodule SHA to its remote'
      - 'cd ../..                                   # (5) return to outer repo'
      - 'git add vendor/math-utils && git commit -m "Bump math-utils: add halve"  # (6) pin new SHA and push outer'
      distractors:
      - 'git commit -am "..."          # BEFORE switching to a branch — detached HEAD, un-pushable'
      - 'git submodule update --init --recursive   # resets inner HEAD, losing your new commit'
      - 'git push --force origin update-halve      # unneeded; no history to overwrite'
      - 'git rebase origin/main        # rewrites SHAs you just created; defeats (4)'
      explanation: 'Each ceremony step preserves one invariant — branch-attached HEAD, commit-exists-in-submodule, SHA-on-remote, SHA-pinned-in-outer, outer-pushed. Each distractor breaks one. Committing first orphans the commit; `submodule update` resets it; `--force` is a shared-history violation; `rebase` rewrites the commits you just tried to publish. Knowing the invariants is the schema that makes the recipe stick.'
- title: 'Capstone: On-Call Debugging Under Pressure'
  view: git_graph
  instructions: |
    ### The scenario — no hand-holding this time

    You're the on-call engineer. A teammate paged you: **the
    `absolute` function in `calculator.py` is producing wrong answers
    on `main`**, CI is red, and they don't know which of the last
    handful of commits caused it. They've also left you a dirty
    working tree with an unrelated in-progress note.

    **Your job**, in order:

    1. **Shelve** the unrelated in-progress note so your tree is
       clean for investigation.
    2. **Find** the exact commit that introduced the bug, using a
       binary search across the recent history.
    3. **Read** the culprit commit's message and diff so you
       understand *what the author was trying to do* before you
       touch their code.
    4. **Fix** the bug on a dedicated branch. It's fine (expected,
       even) to make a couple of messy WIP commits as you iterate.
    5. **Clean up** your fix branch so it lands on `main` as one
       focused commit — no WIP noise.
    6. **Merge** the fix into `main`.
    7. **Restore** the in-progress note you shelved in step 1.
    8. **Verify** you could still recover any of the commits you
       rewrote — the safety net has to actually work.

    You already know every command you need. No new material. This
    step exists to prove you can **choose** and **compose** the
    right tools under pressure, not just execute them when told.

    > **Style expectation.** Real on-call work is not a list of
    > commands with commentary — it is a loop of *read state →
    > decide → act → re-read state*. Run `git status`, `git log
    > --oneline --graph --all`, and `git reflog` *between* your
    > actions. They are your dashboard. If you feel lost, your first
    > move is always to re-read the state, not to guess.

    ### The state you're walking into

    The setup has prepared `/tutorial/myproject` with:

    - A `test_calculator.py` whose `absolute(-4) == 4` assertion
      currently **fails**.
    - `~6` recent commits on `main` — somewhere among them the
      regression lives.
    - A dirty working tree: an unrelated `# TODO: add clamp helper`
      note has been appended to `calculator.py` and is **not yet
      committed**. That note is unrelated to the bug — it must
      survive this session intact.

    Start by reading state. These commands are your eyes; run them
    whenever you want:

    ```bash
    cd /tutorial/myproject
    git status
    git log --oneline --graph --all -12
    python3 test_calculator.py
    ```

    ### Hints — expand only if stuck

    Try each task first; open the hint only if you're stuck for more
    than a minute.

    <details markdown="1"><summary>Hint — Task 1 (shelve uncommitted work)</summary>

    Step 4. One command, noun form. The working tree must be
    **clean** for bisect to move HEAD around safely.
    </details>

    <details markdown="1"><summary>Hint — Task 2 (find the culprit)</summary>

    Step 7. You want the automated version so you don't mark
    good/bad by hand. The test script exits 0 on pass, non-zero on
    fail — feed it to the right subcommand. Don't forget to
    **reset** afterward or HEAD stays on a random historical
    commit.
    </details>

    <details markdown="1"><summary>Hint — Task 3 (read the culprit's intent)</summary>

    Step 6 gave you a two-command chain. `git blame` alone is noise;
    pair it with `git show <sha>` to read the commit message and
    full diff. Target the line of `absolute` that looks wrong.
    </details>

    <details markdown="1"><summary>Hint — Task 4 (fix on a branch, messily)</summary>

    Step 9 showed you that messy intermediate commits are fine as
    long as you clean them before sharing. Branch from `main`, make
    at least two commits (any real workflow would), and get
    `test_calculator.py` passing.
    </details>

    <details markdown="1"><summary>Hint — Task 5 (squash messy commits into one)</summary>

    Step 9's interactive rebase is exactly this. Or — if your two
    commits are both small and you don't mind losing the individual
    messages — Step 10's `git merge --squash` does the same job at
    merge time. **Either is acceptable**; the test only cares that
    `main` ends with exactly one new commit containing your fix.
    </details>

    <details markdown="1"><summary>Hint — Task 6 (merge to main)</summary>

    Step 10 or the basic tutorial's Step 9. Whichever merge strategy
    you pick, main should end up with your one clean fix commit on
    top.
    </details>

    <details markdown="1"><summary>Hint — Task 7 (restore the shelved note)</summary>

    Step 4. Inverse of Task 1. The note must reappear in
    `calculator.py` exactly as it was, still uncommitted.
    </details>

    <details markdown="1"><summary>Hint — Task 8 (prove reflog still has your back)</summary>

    Step 2. `git reflog` should still show the messy pre-squash
    commits. This is a *read-only* verification — don't branch or
    reset anything, just confirm the history of HEAD's movements is
    intact and would let you recover your intermediate work if you
    needed to. If you see at least two reflog entries from your fix
    branch, you're safe.
    </details>

    ### Success criteria

    When you think you're done, check each of these yourself — the
    automated tests check the same things:

    - `python3 test_calculator.py` prints `all tests pass`.
    - `main`'s log ends with exactly **one** new fix commit on top
      of the pre-session state — not two or three WIP commits.
    - `calculator.py` still contains your uncommitted
      `# TODO: add clamp helper` note.
    - `git reflog` shows your intermediate messy commits — proof
      you could still recover them if asked.

    ### You can now

    - **Compose** 5+ advanced Git tools into one realistic
      end-to-end workflow, without instruction.
    - **Choose** between squash/rebase/merge based on what the
      resulting history should look like, not memorized rules.
    - **Trust** the reflog safety net after combining multiple
      destructive operations.
    - **Read state first, act second** — the habit that
      distinguishes professional Git usage from the "blind-testing"
      antipattern Step 1 named.

    ### The "burning down the repo" callback

    Remember **"burning down the repo"** from Step 1 — the novice
    panic response of deleting the local folder, copying files to a
    text file, re-cloning, and force-pushing? Look at what you just
    did instead:

    - Dirty working tree → **stash**, not delete the folder.
    - Regression in unknown commit → **bisect**, not read 30 diffs.
    - Find the culprit's intent → **blame + show**, not guess.
    - Messy intermediate commits → **interactive rebase or squash
      merge**, not re-write from scratch.
    - Worried about losing the messy commits → **reflog**, not
      a panicked `rm -rf`.

    You could still have burned down the repo. You didn't need to.
    That's the competence difference.

    ### 🏔️ Stretch variant (optional)

    If the capstone felt manageable and you want to push one level
    further: **re-run the capstone with one extra wrinkle**. The
    unrelated in-progress `# TODO: add clamp helper` note you
    stashed also conflicts with a line added by the bug-fix commit
    (pretend the author touched the same region).

    Now your `git stash pop` at the end hits a conflict. You have
    to:
    - Resolve the stash-pop conflict (same marker-edit dance as
      any conflict).
    - Decide whether to keep the note *and* the fix, or drop the
      note.
    - Verify the tests still pass after resolution.
    - Verify reflog *still* shows you could unwind any of it.

    This tests everything in the capstone *plus* composable
    conflict resolution. It is the capstone's capstone. Only the
    most confident learners should attempt it — but if you do and
    succeed, there is nothing in advanced Git you aren't prepared
    for.

    (This variant is not tested by the automated check; it's
    voluntary extension practice.)
  watch_files:
  - myproject/calculator.py
  - myproject/test_calculator.py
  open_file: myproject/calculator.py
  setup_commands:
  - "cd /tutorial/myproject\ngit rebase --abort 2>/dev/null\ngit cherry-pick --abort 2>/dev/null\ngit merge --abort 2>/dev/null\ngit bisect reset 2>/dev/null\ngit switch -q main 2>/dev/null\n# Clean up any leftover capstone branches from a previous attempt.\nfor br in capstone-fix capstone-wip; do git branch -D $br 2>/dev/null; done\n# Drop any leftover stashes from previous capstone attempts.\nwhile git stash list | grep -q 'capstone'; do git stash drop -q 2>/dev/null || break; done\n# If the capstone has already been completed successfully, don't rebuild.\nif git log main --oneline -1 2>/dev/null | grep -qi 'capstone.*fix\\|fix.*absolute.*capstone'; then\n  exit 0\nfi\n# Ensure calculator.py has a working absolute() baseline before we plant the bug.\nif ! grep -q 'def absolute' calculator.py; then\n  printf '\\ndef absolute(x):\\n    \"\"\"Return |x|.\"\"\"\\n    return x if x >= 0 else -x\\n' >> calculator.py\n  git add calculator.py\n  git commit -qm 'Seed: restore absolute baseline for capstone' 2>/dev/null\nfi\n# Install the regression test if missing.\nprintf 'from calculator import absolute\\nassert absolute(-4) == 4, f\"expected 4, got {absolute(-4)}\"\\nassert absolute(3) == 3\\nassert absolute(0) == 0\\nprint(\"all tests pass\")\\n' > test_calculator.py\ngit add test_calculator.py\ngit diff --cached --quiet || git commit -qm 'Capstone: add regression tests'\n# Plant 5 commits, one of which silently breaks absolute().\necho '# refactor: formatting pass' >> calculator.py\ngit commit -qam 'Capstone: formatting pass'\necho '# refactor: docstring cleanup' >> calculator.py\ngit commit -qam 'Capstone: docstring cleanup'\n# Plant the bug: replace `return x if x >= 0 else -x` with a broken version.\nif grep -q 'return x if x >= 0 else -x' calculator.py; then\n  sed -i 's|return x if x >= 0 else -x|return x  # simplification|' calculator.py\nfi\ngit commit -qam 'Capstone: simplify absolute return path'\necho '# refactor: trailing whitespace' >> calculator.py\ngit commit -qam 'Capstone: tidy trailing whitespace'\necho '# refactor: reorder helpers' >> calculator.py\ngit commit -qam 'Capstone: reorder helper comments'\n# Dirty the working tree with an unrelated uncommitted note.\nif ! grep -q 'TODO: add clamp helper' calculator.py; then\n  echo '# TODO: add clamp helper' >> calculator.py\nfi\n"
  solution:
    commands:
    - cd /tutorial/myproject
    - git stash push -m 'capstone: clamp note' -- calculator.py
    - git bisect start HEAD HEAD~5 2>/dev/null
    - git bisect run python3 test_calculator.py 2>/dev/null || true
    - git bisect reset
    - git switch -c capstone-fix main
    - sed -i 's|return x  # simplification|return x if x >= 0 else -x|' calculator.py
    - git commit -am 'WIP: trying fix for absolute'
    - 'echo "# verified via test_calculator" >> calculator.py'
    - git commit -am 'WIP: add verification note'
    - GIT_SEQUENCE_EDITOR="sed -i '2s/^pick/fixup/'" git rebase -i HEAD~2 || true
    - git commit --amend -m 'Capstone fix: restore negation in absolute' 2>/dev/null || true
    - git switch main
    - git merge capstone-fix --no-edit
    - git branch -d capstone-fix 2>/dev/null || git branch -D capstone-fix
    - git stash pop
    - git reflog -n 20
    - python3 test_calculator.py
    explanation: |
      - **Tool choices (many right answers).** The solution shown uses stash → automated bisect → branch + two WIP commits → interactive-rebase fixup → regular merge → stash pop → reflog check. An equally valid path: stash → manual bisect → fix with one commit directly → squash-merge to main → stash pop → reflog check. The tests only verify the end state, not the path.
      - **Why stash first, always.** Bisect moves HEAD across historical commits; a dirty working tree would either block bisect or carry uncommitted edits across arbitrary commits. Same principle as Step 4's "clean tree for context switch."
      - **Why bisect.** Manually reading 5 diffs would work here but would not work at 500. The point is the habit: for regressions, bisect is the default reach, even for small histories.
      - **Why read the culprit's intent.** Step 6's warning: the author wasn't malicious. Their commit message and diff may reveal which part of the change was intended and which was the accidental regression — informing whether you fix the bug or revert the whole commit.
      - **Why clean the fix branch before merging.** Main's history is read during future bisects (this one's regression will be someone else's bisect in six months). Each commit on main should be one reason, not "WIP, WIP, WIP, real fix."
      - **Why reflog at the end.** Proof that the desirable-difficulty exercise did not actually destroy anything. This is the Step 2 safety-net claim, cashed in on a composite workflow.
  tests:
  - description: 'On main branch (cleanup verified)'
    command: cd /tutorial/myproject && git symbolic-ref -q HEAD | grep -q 'refs/heads/main'
  - description: 'No bisect or rebase still in progress'
    command: cd /tutorial/myproject && [ ! -f .git/BISECT_LOG ] && [ ! -d .git/rebase-merge ] && [ ! -d .git/rebase-apply ]
  - description: 'absolute() works correctly for negatives, zero, and positives'
    command: cd /tutorial/myproject && python3 -c "import sys; sys.path.insert(0,'.'); from calculator import absolute; assert absolute(-4) == 4 and absolute(3) == 3 and absolute(0) == 0"
  - description: 'Regression test passes end-to-end'
    command: cd /tutorial/myproject && python3 test_calculator.py | grep -q 'all tests pass'
  - description: 'Exactly one fix commit landed on main (not 2+ WIP commits visible on main)'
    command: cd /tutorial/myproject && [ $(git log main --oneline | grep -ciE '^[a-f0-9]+ (WIP|wip)') -eq 0 ]
  - description: 'The in-progress clamp note survived the session (still in working tree, uncommitted)'
    command: "cd /tutorial/myproject && grep -q 'TODO: add clamp helper' calculator.py && ! git log main --oneline | grep -qi 'clamp'"
  - description: 'Reflog has at least a few entries from this session (safety net intact)'
    command: cd /tutorial/myproject && [ $(git reflog -n 20 | wc -l) -ge 5 ]
    hints:
    - text: '`git reflog` should show HEAD movements from your stash, bisect, branch-switches, and commits. If it is empty or near-empty, something has been cleared — but normally this test passes automatically once you''ve done any work.'
  quiz:
    title: Cumulative Final Quiz — Choose the Right Tool
    min_score: 0.8
    shuffle: true
    questions:
    - question: 'Match each scenario to the **single best** tool. Which option correctly pairs all four?'
      options:
      - '(a) Backport one bug-fix commit to three release branches → `git merge`; (b) Integrate 50 commits of a long feature into main → `git cherry-pick` each one; (c) Clean up 10 WIP commits before opening a PR → `git rebase -i`; (d) Land a feature branch as one commit on main → `git merge --no-ff`'
      - '(a) Backport one bug-fix commit to three release branches → `git cherry-pick`; (b) Integrate 50 commits of a long feature into main → `git merge` (or `git rebase` for linear history); (c) Clean up 10 WIP commits before opening a PR → `git rebase -i`; (d) Land a feature branch as one commit on main → `git merge --squash`'
      - '(a) All four → `git merge`'
      - '(a) Backport → `git rebase`; (b) Feature integration → `git cherry-pick`; (c) WIP cleanup → `git merge`; (d) One-commit landing → `git rebase`'
      correct_index: 1
      explanation: Cherry-pick is surgical (one commit), merge is bulk (many commits), interactive rebase is for history cleanup, squash-merge collapses a branch into one commit. Steps 5, 8, 9, 10 each framed this table; this question just asks you to recognize when to use which. The others mis-apply cherry-pick (wrong for 50 commits) or merge (doesn't clean WIP).
    - question: '**[Interleaves Steps 3, 5, 8, 9, 10]** Which of these operations create commits with **new SHAs** even when the patch is identical to an earlier commit? Select all that apply.'
      type: multiple
      options:
      - '`git cherry-pick <sha>` onto a different branch'
      - '`git rebase main` (non-interactive) on a feature branch'
      - '`git rebase -i HEAD~5` that reorders commits'
      - '`git merge --squash feature` followed by `git commit`'
      - '`git merge feature` (fast-forward) — just moves the branch pointer'
      - '`git branch feature` — creates a branch pointer at the current commit'
      correct_indices:
      - 0
      - 1
      - 2
      - 3
      explanation: 'A commit''s SHA hashes its tree + parent(s) + author + committer + message. **Change any of those and the SHA changes.** Cherry-pick, rebase, interactive-rebase, and squash-merge all create new commit objects with different parents or combined trees. Fast-forward merge and `git branch` do NOT create commits — they only move pointers (Step 1''s whole point). This is the deep schema: commits are immutable; "moving" a commit is always "copy + move pointer to copy."'
    - question: '**[Interleaves Steps 2, 9, 1]** You performed three destructive-feeling operations in sequence: `git reset --hard HEAD~3`, then `git rebase -i` dropping a commit, then entering detached HEAD and making a throwaway commit. Which **single** tool can recover commits lost in all three cases?'
      options:
      - '`git revert` — it reverses any recent operation'
      - '`git reflog` + `git branch <name> <sha>` — reflog logs every HEAD movement regardless of which operation moved it, so the recovery recipe is identical across all three cases'
      - '`git stash pop` — stash tracks destructive operations automatically'
      - 'Nothing — destructive operations are final'
      correct_index: 1
      explanation: Reflog is the universal safety net because it records HEAD's position history, not the cause. Whether HEAD moved via reset, rebase drop, or leaving detached HEAD, the SHA it was at is recorded. Branch that SHA back into reachability and the "lost" work is found. This is the Step 2 lesson cashed in on a composite workflow — and the reason the tutorial framed destructive commands as "less scary than they sound."
    - question: '**[Interleaves basic tutorial Step 11 + advanced Step 8]** You hit a conflict during `git rebase main`. You edit the file, remove all `<<<<<<<` / `=======` / `>>>>>>>` markers, and run `git add`. Which command finishes **this one commit''s** resolution?'
      options:
      - '`git commit` — identical to finishing a merge'
      - '`git rebase --continue` — rebase is replaying commits one at a time; you are telling Git to resume the replay, not create a standalone commit'
      - '`git merge --continue`'
      - '`git push --force`'
      correct_index: 1
      explanation: A rebase conflict is identical in mechanics to a merge conflict — same markers, same `git add` to mark resolved — but the final verb differs because rebase is *replaying*, not *merging*. Reflex-typing `git commit` here is the single most common mistake; it leaves the rebase half-done. `git rebase --abort` at any point restores the pre-rebase state.
    - question: '**[Interleaves Steps 6, 7]** A bug appeared because someone **removed** a line of validation that used to prevent it. Which investigation tool finds the commit that introduced the bug?'
      options:
      - '`git blame` — it shows the author of every existing line'
      - '`git bisect` — it binary-searches based on *behavior*, which is the only signal available when the culprit is a deletion (blame cannot see a line that isn''t there)'
      - '`git log --grep="delete"` — it finds commits with "delete" in the message'
      - '`git show HEAD` — it shows the most recent commit'
      correct_index: 1
      explanation: Blame attributes *existing* lines only — a missing line is invisible to it. Bisect operates on behavioral outcomes (did the test pass or fail?) regardless of whether the change was an addition, modification, or deletion. This is why the capstone you just finished started with bisect, not blame — the bug could just as easily have been a deletion, and starting with bisect generalizes.
    - question: '**[Interleaves Steps 3, 11, 13]** A submodule is stored in the outer repo as a gitlink entry (mode `160000`) containing a 40-character SHA. That SHA references which kind of Git object?'
      options:
      - A blob object containing the submodule's files
      - A tree object for the submodule's root directory
      - A commit object in the submodule's own object database
      - A tag object
      correct_index: 2
      explanation: 'The gitlink pins a *commit* SHA (in the submodule''s repo). That commit deterministically resolves to a tree, which resolves to blobs — so one SHA is equivalent to a full content snapshot. Same object-model reasoning as Step 3 — snapshot-identity is carried by the commit SHA, which is why "one 40-char pin" is enough information to reconstruct the entire submodule''s state.'
    - question: '**[Interleaves Steps 8, 9, 10]** Which of these operations are **forbidden** on a branch that has been pushed and is shared with teammates? Select all that apply.'
      type: multiple
      options:
      - '`git rebase main` on the shared branch (rewrites its SHAs)'
      - '`git rebase -i HEAD~5` on the shared branch (rewrites its SHAs)'
      - '`git commit --amend` on the tip of the shared branch (new SHA)'
      - '`git push --force` (or `--force-with-lease`) to overwrite the remote'
      - '`git revert <sha>` (appends an anti-commit, rewrites nothing)'
      - '`git merge feature` into the shared branch (appends a merge commit)'
      correct_indices:
      - 0
      - 1
      - 2
      - 3
      explanation: 'The cardinal rule — anything that **rewrites** published commits is forbidden on shared branches, because teammates holding the old SHAs will diverge. That rules out rebase (any flavor), amend, and force-push. Revert and merge are *additive* (they only append new commits without changing existing history), so they are safe. Same rule, different commands. Memorize the property (rewrite = dangerous), not the per-command list.'
    - question: '**[Interleaves Steps 2, 8]** You rebased `feature` locally, then `git push` was rejected because teammate Alice had pushed to `feature` in the meantime. What is the safe recovery sequence?'
      type: parsons
      display: block
      lines:
      - 'git reflog      # find the pre-rebase SHA of `feature`'
      - 'git reset --hard <pre-rebase-sha>      # undo your rebase locally'
      - 'git pull        # merge Alice''s changes into your (unrebased) branch'
      - 'git push        # succeeds — no history was rewritten'
      distractors:
      - 'git push --force'
      - 'git rebase --abort'
      - 'git revert HEAD'
      - 'rm -rf .git && git clone'
      explanation: 'When rebasing a shared branch goes wrong, the fix is always — *undo your rewrite first*, then integrate normally. Reflog finds the pre-rebase SHA; `reset --hard` restores it; pull merges Alice''s work; push succeeds. The distractors represent the antipatterns Step 1 named — `push --force` overwrites Alice''s work; `rebase --abort` does not apply after the rebase is complete; `revert` is for undoing a single commit, not a rebase; `rm -rf .git && clone` is the "burning down the repo" antipattern.'
    - question: '**[Interleaves Steps 4, 7]** You are mid-edit on a feature when a teammate asks you to bisect a regression on `main`. Your working tree has uncommitted changes you want to keep. Two tools from this tutorial compose to solve this cleanly — which pair?'
      options:
      - '`git commit -m "WIP"` then `git bisect` — commit your WIP so bisect has a clean tree'
      - '`git stash` then `git bisect`, then `git stash pop` when bisect is done and you are back on a named branch — keeps your WIP private and the tree clean for bisect''s HEAD movements'
      - '`git restore .` then `git bisect` — discards your WIP so bisect has a clean tree'
      - '`git bisect` then `git stash` — stash shelves the bisect state'
      correct_index: 1
      explanation: Bisect moves HEAD across arbitrary historical commits — a dirty working tree either blocks it or carries your edits into commits they don't belong in. Stash is designed exactly for this — private, local, temporary. Committing WIP pollutes history if pushed; `git restore .` destroys your work. Recognize the compose-two-tools pattern — most real Git tasks chain more than one command.
    - question: '**[Interleaves Steps 7, 10]** Three months ago your team squash-merged the `feature-stats` branch into `main`. A regression has surfaced that bisect on `main` narrows down to the squash commit. The squash commit changed 800 lines. What is your next move?'
      options:
      - Revert the whole squash commit from `main` and re-investigate later
      - Read every line of the 800-line squash diff until you find the bug
      - '`git bisect` on the (still-existing) `feature-stats` branch — its internal commits were preserved, giving fine-grained resolution that the squash on main destroyed'
      - Give up — squash merge permanently discards internal commits
      correct_index: 2
      explanation: Squash-merge collapses *main's* history, not the feature branch's. The feature branch's commits still exist (and its reflog too) if it wasn't deleted. Bisect there pinpoints the exact internal commit. This is the strongest pragmatic argument for keeping merged feature branches around for a while, not deleting them the day they merge. Step 10's quiz framed this; this question checks that you can *reach* for the recovery without being reminded.
    - question: '**[The unifying insight]** After working through the whole advanced tutorial, which statement best captures what every command you learned actually does?'
      options:
      - Git commands either delete old state or create new state; they never do both
      - Every command either **moves one or more pointers** across the immutable object graph, or **creates new immutable objects** (commits/trees/blobs) and then moves a pointer to the new one — never both, never edit-in-place
      - Git commands are magical; the best strategy is to memorize the most common ones
      - Commands behave unpredictably depending on remote configuration
      correct_index: 1
      explanation: 'This is the one-sentence schema from Step 3 that every subsequent step cashed in. Branch creation is pointer-only. Commit creates an object + moves a pointer. Rebase creates new objects + moves a pointer. Cherry-pick creates one new object + moves a pointer. Merge creates at most one new object (the merge commit) + moves a pointer. Squash creates one new object + moves a pointer. Even the "destructive" commands (reset, rebase drop) only move pointers — the old objects remain in `.git/objects` and reflog keeps their addresses. If you internalize this, nothing in Git is mysterious.'
    - question: '**[Evaluate — meta]** A junior teammate says: "Destructive Git commands like rebase and reset are too dangerous to use; I''ll stick with merge and revert only." Evaluate this position.'
      options:
      - Correct — rebase and reset should be avoided by anyone who isn't a Git expert
      - Partially correct — on **shared** branches, they really are dangerous, and revert/merge are the right tools there. On **local/unpushed** branches, rebase and reset are routine safe tools because reflog recovers anything for ~90 days. Avoiding them entirely trades safety for history-quality and is a real cost on teams that value clean history
      - Incorrect — there is no difference between local and shared branches
      - Incorrect — reflog auto-recovers destructive operations immediately in all cases
      correct_index: 1
      explanation: 'Conditional knowledge is the mark of an expert (Ambrose et al. 2010). The cardinal rule is not "rebase = bad" — it is "rebase rewrites history, which is dangerous on shared branches and safe on local ones." The junior''s heuristic is safer *and* less effective; teaching them *when* each tool is appropriate is the goal. The same tool, on the same commits, is either routine or catastrophic depending on one thing — has this history been pushed and pulled by others? This is the single most important distinction the advanced tutorial taught.'
