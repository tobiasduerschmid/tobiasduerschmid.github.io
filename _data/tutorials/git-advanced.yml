    - "grep -q 'def safe_divide' calculator.py || cat >> calculator.py << 'EOF'\n\ndef safe_divide(a, b):\n    if b == 0:\n        raise ValueError('Cannot divide by zero')\n    return a / b\nEOF"
    - git add calculator.py
