            - "`featureFlags.betaDashboard` directly enables Labs for every verified user and overrides invite or plan policy."
            - "`welcomeBanner` disables Labs when the banner is visible."
            - "`dashboardRoute()` returns 404 for Kai."
          correct_index: 0
