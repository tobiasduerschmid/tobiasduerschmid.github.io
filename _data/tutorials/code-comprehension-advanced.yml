        content: |
          const LESSONS = [
            { id: 1, title: "Python plan roles", topic: "python", done: true },
            { id: 2, title: "React callback descent", topic: "react", done: false },
            { id: 3, title: "Node tests as beacons", topic: "node", done: false },
