  # =========================================================================
  # STEP 6: Architecture-Code Alignment Review
  # =========================================================================
  # Pedagogy: mini code-review packet — architecture-to-code mapping and responsibility diagnosis
  - title: "Architecture-Code Alignment Review"
    backend: webcontainer
    instructions: |
      ### Why this matters

      Advanced comprehension means reading code against an intended architecture, not just finding the line that produces an output. A route, service, data store, and policy helper each have different responsibilities. When those responsibilities stay visible, the code gives future readers trustworthy architectural beacons.

      ### 🎯 You will learn to

      - Map a Node.js behavior from route to service to data and policy helpers
      - Separate specification evidence from runtime implementation evidence
      - Evaluate whether files preserve their intended responsibilities

      ### Mini Review Packet

      Requirement:

      > When a student completes a lesson, store the completion, return the completed lesson id, and award a three-day streak badge when the student's completion days contain a three-day run.

      Intended architecture:

      | Layer | Responsibility |
      |---|---|
      | Route | Read HTTP request fields and choose HTTP status/response shape |
      | Progress service | Coordinate completion behavior |
      | Store | Save and list completion records |
      | Badge service | Decide whether the records earn a badge |
      | Email preview | Nearby formatting helper, not part of completion behavior |

      Read `__tests__/progressRoutes.test.js` first, then map the requirement to code. Your final answer should name central, supporting, and incidental files.

    files:
      - path: "data/progressStore.js"
        language: "javascript"
        content: |
          const completions = [];

          function listCompletions(userId) {
            return completions
              .filter(record => record.userId === userId)
              .map(record => ({ ...record }));
          }

          function saveCompletion(record) {
            const alreadySaved = completions.some(existing =>
              existing.userId === record.userId &&
              existing.lessonId === record.lessonId &&
              existing.day === record.day
            );
            if (!alreadySaved) {
              completions.push({ ...record });
            }
            return { ...record };
          }

          function resetCompletions() {
            completions.length = 0;
          }

          module.exports = { listCompletions, saveCompletion, resetCompletions };

      - path: "services/badgeService.js"
        language: "javascript"
        content: |
          function streakBadgeFor(records) {
            const days = [...new Set(records.map(record => record.day))].sort((a, b) => a - b);
            let current = 0;
            let previous = null;
            for (const day of days) {
              current = previous === null || day === previous + 1 ? current + 1 : 1;
              if (current >= 3) {
                return "three-day-streak";
              }
              previous = day;
            }
            return null;
          }

          module.exports = { streakBadgeFor };

      - path: "services/progressService.js"
        language: "javascript"
        content: |
          const { listCompletions, saveCompletion } = require("../data/progressStore");
          const { streakBadgeFor } = require("./badgeService");

          function completeLesson({ userId, lessonId, day }) {
            saveCompletion({ userId, lessonId, day });
            const records = listCompletions(userId);
            return {
              completed: true,
              lessonId,
              badge: streakBadgeFor(records),
            };
          }

          module.exports = { completeLesson };

      - path: "services/emailPreview.js"
        language: "javascript"
        content: |
          function previewCompletionEmail(studentName, lessonTitle) {
            return `${studentName} completed ${lessonTitle}.`;
          }

          module.exports = { previewCompletionEmail };

      - path: "routes/progressRoutes.js"
        language: "javascript"
        content: |
          const { completeLesson } = require("../services/progressService");

          function completeLessonRoute(req, res) {
            const { userId, lessonId, day } = req.body;
            if (!userId || !lessonId || !day) {
              return res.status(400).json({ error: "missing completion fields" });
            }

            const summary = completeLesson({ userId, lessonId, day });
            return res.status(201).json(summary);
          }

          module.exports = { completeLessonRoute };

      - path: "__tests__/progressRoutes.test.js"
        language: "javascript"
        content: |
          const { beforeEach, test } = require("node:test");
          const assert = require("node:assert/strict");
          const { listCompletions, resetCompletions } = require("../data/progressStore");
          const { completeLessonRoute } = require("../routes/progressRoutes");

          function fakeResponse() {
            return {
              statusCode: 200,
              body: undefined,
              status(code) {
                this.statusCode = code;
                return this;
              },
              json(payload) {
                this.body = payload;
                return this;
              },
            };
          }

          beforeEach(() => {
            resetCompletions();
          });

          test("POST /progress/completions stores a completion and returns 201", () => {
            const res = fakeResponse();

            completeLessonRoute({ body: { userId: "u1", lessonId: "react-flow", day: 1 } }, res);

            assert.equal(res.statusCode, 201);
            assert.deepEqual(res.body, {
              completed: true,
              lessonId: "react-flow",
              badge: null,
            });
            assert.deepEqual(listCompletions("u1"), [
              { userId: "u1", lessonId: "react-flow", day: 1 },
            ]);
          });

          test("third consecutive completion returns a streak badge", () => {
            completeLessonRoute({ body: { userId: "u2", lessonId: "python-plan", day: 1 } }, fakeResponse());
            completeLessonRoute({ body: { userId: "u2", lessonId: "react-flow", day: 2 } }, fakeResponse());
            const res = fakeResponse();

            completeLessonRoute({ body: { userId: "u2", lessonId: "node-route", day: 3 } }, res);

            assert.equal(res.statusCode, 201);
            assert.equal(res.body.badge, "three-day-streak");
          });

          test("missing fields return 400 without storing a completion", () => {
            const res = fakeResponse();

            completeLessonRoute({ body: { userId: "u3", day: 4 } }, res);

            assert.equal(res.statusCode, 400);
            assert.deepEqual(res.body, { error: "missing completion fields" });
            assert.deepEqual(listCompletions("u3"), []);
          });

    open_file: "__tests__/progressRoutes.test.js"
    run_file: "__tests__/progressRoutes.test.js"

    quiz:
      title: "Step 6 — Knowledge Check"
      min_score: 0.8
      shuffle: true
      shuffle_questions: false
      questions:
        - type: single
          difficulty: basic
          question: "Which first-pass hypothesis comes from the tests?"
          options:
            - "Records completions, returns status codes, can award a three-day streak badge."
            - "Renders a React progress dashboard for the lesson catalog."
            - "Sends a completion email whenever a lesson completes and a streak badge appears."
            - "Sorts the lessons in the data store by their title fields."
          correct_index: 0
          option_feedback:
            1: "There is no JSX or browser rendering in this packet."
            2: "The email helper is nearby, but the tests never exercise it."
            3: "The tests describe completions and badges, not lesson-title sorting."
          explanation: "The tests provide the specification layer: completion storage, status shape, and streak badge behavior."

        - type: single
          difficulty: intermediate
          question: "Where is the missing-field `400` behavior implemented?"
          options:
            - "`completeLessonRoute()` in `routes/progressRoutes.js`"
            - "`completeLesson()` in `services/progressService.js`, because services often validate route input before saving"
            - "`saveCompletion()` in `data/progressStore.js`"
            - "`streakBadgeFor()` in `services/badgeService.js`"
          correct_index: 0
          option_feedback:
            1: "The service receives already-validated fields in this design."
            2: "The store saves records. It does not know about HTTP status codes."
            3: "The badge helper only decides whether completion records earn a badge."
          explanation: "The route owns HTTP boundary behavior, including input checks and status/response shape."

        - type: multiple
          difficulty: intermediate
          question: "Which files are central runtime evidence for awarding the streak badge?"
          options:
            - "`services/progressService.js`"
            - "`services/badgeService.js`"
            - "`data/progressStore.js`"
            - "`services/emailPreview.js`"
            - "`__tests__/progressRoutes.test.js`"
          correct_indices: [0, 1, 2]
          option_feedback:
            0: "The progress service coordinates saving records and asking for a badge."
            1: "The badge service owns the three-day streak policy."
            2: "The store supplies the completion records the badge service evaluates."
            3: "The email helper is nearby but never imported by the route or service."
            4: "The test specifies expected behavior, but it is not runtime implementation."
          explanation: "Central runtime files are the ones the successful completion path actually calls."

        - type: single
          difficulty: advanced
          question: "Which responsibility map best matches the implementation?"
          options:
            - "Route: HTTP validation/status. Progress service: completion workflow. Store: persistence. Badge service: streak policy."
            - "Route: streak algorithm. Progress service: CSS rendering. Store: HTTP validation. Badge service: database connection."
            - "Route: email preview. Progress service: test runner. Store: React state. Badge service: route params."
            - "Route: static data only. Progress service: no behavior. Store: all user-visible response decisions. Badge service: unused."
          correct_index: 0
          option_feedback:
            1: "Those responsibilities do not match the imports or function bodies."
            2: "Those concepts are either absent or assigned to the wrong files."
            3: "The implementation clearly distributes behavior across route, service, store, and badge helper."
          explanation: "Architecture-code alignment means the code vocabulary preserves the intended responsibility vocabulary."

        - type: single
          difficulty: expert
          question: "Which explanation best fits the completion flow?"
          options:
            - "`emailPreview.js` sounds related, but central files do not import it and tests do not exercise it."
            - "`badgeService.js` is incidental because badges are just strings."
            - "`progressStore.js` is irrelevant because tests should be the only source of truth and runtime persistence is just setup."
            - "`completeLessonRoute()` is unrelated because routes never affect behavior."
          correct_index: 0
          option_feedback:
            1: "The badge string is user-visible policy, and the helper is called by the progress service."
            2: "Tests specify behavior, but runtime code still implements it."
            3: "The route reads request fields, validates them, and chooses HTTP response shape."
          explanation: "A plausible nearby file can be a weak contextual beacon. Strong readers verify relevance through imports, calls, and tests."

  # =========================================================================
  # STEP 7: Dashboard Access Sprint
  # =========================================================================
  # Pedagogy: capstone transfer — realistic false beacon across route/service/config files
  - title: "Dashboard Access Sprint"
    backend: webcontainer
    max-time: 13
    lockout-time: 5
    instructions: |
      ### Why this matters

      In production code, the first clue that looks relevant is often only part of the story. It may be a file you would expect to matter: `featureFlags.js`, `betaDashboard`, imported config, dashboard route. The advanced skill is to say, "That is a plausible hypothesis," then verify whether the property is actually on the runtime path.

      This sprint is a small incident review. A student named Kai cannot see the Labs tab. A fast reader may jump to the global `betaDashboard` flag because it is true. Your job is to test that hypothesis against tests, imports, and call flow. Let's see how far you can make it.

      ### 🎯 You will learn to

      - Separate a plausible config clue from the property actually read at runtime
      - Use tests as specification beacons without mistaking them for implementation
      - Trace a cross-file hypothesis through route, service, policy, and data files

      ### Reading Goal

      You have **13 minutes**. Read the tests first, then inspect the smallest path that explains Kai's missing Labs tab.

      Focus on these questions:

      - What behavior do the tests specify for invited users and non-invited users?
      - Which file decides whether the Labs tab is added?
      - Which `featureFlags` property is read by the route?
      - Where is `betaDashboard: true` read, if at all, on the tab-building path?

    files:
      - path: "reading-notes.md"
        language: "markdown"
        content: |
          # Dashboard Access Sprint Notes

          First hypothesis:

          First clue I noticed:

          Test evidence:

          Runtime path:

          Evidence that changes or strengthens the hypothesis:

          Final EiPE summary:

      - path: "data/users.js"
        language: "javascript"
        content: |
          const users = [
            { id: "ava", plan: "free", verified: true, betaInvite: true },
            { id: "kai", plan: "free", verified: true, betaInvite: false },
            { id: "mira", plan: "pro", verified: false, betaInvite: false },
            { id: "noor", plan: "pro", verified: true, betaInvite: false },
          ];

          function findUser(userId) {
            const user = users.find(candidate => candidate.id === userId);
            return user ? { ...user } : null;
          }

          module.exports = { findUser };

      - path: "config/featureFlags.js"
        language: "javascript"
        content: |
          const featureFlags = Object.freeze({
            betaDashboard: true,
            welcomeBanner: true,
          });

          module.exports = { featureFlags };

      - path: "services/accessPolicy.js"
        language: "javascript"
        content: |
          function canUseBetaDashboard(user) {
            if (!user || !user.verified) {
              return false;
            }
            return user.betaInvite || user.plan === "pro";
          }

          module.exports = { canUseBetaDashboard };

      - path: "services/dashboardService.js"
        language: "javascript"
        content: |
          const { findUser } = require("../data/users");
          const { canUseBetaDashboard } = require("./accessPolicy");

          function dashboardTabsFor(userId) {
            const user = findUser(userId);
            if (!user) {
              return { status: "missing", tabs: [] };
            }

            const tabs = ["overview", "assignments"];
            if (canUseBetaDashboard(user)) {
              tabs.push("labs");
            }

            return { status: "ok", tabs };
          }

          module.exports = { dashboardTabsFor };

      - path: "routes/dashboardRoute.js"
        language: "javascript"
        content: |
          const { featureFlags } = require("../config/featureFlags");
          const { dashboardTabsFor } = require("../services/dashboardService");

          function dashboardRoute(req, res) {
            const result = dashboardTabsFor(req.params.userId);
            if (result.status === "missing") {
              return res.status(404).json({ error: "user not found" });
            }

            return res.json({
              tabs: result.tabs,
              banner: featureFlags.welcomeBanner ? "new dashboard preview" : null,
            });
          }

          module.exports = { dashboardRoute };

      - path: "__tests__/dashboardRoute.test.js"
        language: "javascript"
        content: |
          const test = require("node:test");
          const assert = require("node:assert/strict");
          const { dashboardRoute } = require("../routes/dashboardRoute");

          function fakeResponse() {
            return {
              statusCode: 200,
              body: undefined,
              status(code) {
                this.statusCode = code;
                return this;
              },
              json(payload) {
                this.body = payload;
                return this;
              },
            };
          }

          test("invited verified student receives the Labs tab", () => {
            const res = fakeResponse();

            dashboardRoute({ params: { userId: "ava" } }, res);

            assert.equal(res.statusCode, 200);
            assert.deepEqual(res.body.tabs, ["overview", "assignments", "labs"]);
          });

          test("global beta flag does not override a missing invite", () => {
            const res = fakeResponse();

            dashboardRoute({ params: { userId: "kai" } }, res);

            assert.equal(res.statusCode, 200);
            assert.deepEqual(res.body.tabs, ["overview", "assignments"]);
            assert.equal(res.body.banner, "new dashboard preview");
          });

          test("unknown users receive 404", () => {
            const res = fakeResponse();

            dashboardRoute({ params: { userId: "unknown" } }, res);

            assert.equal(res.statusCode, 404);
            assert.deepEqual(res.body, { error: "user not found" });
          });

    open_file: "__tests__/dashboardRoute.test.js"
    run_file: "__tests__/dashboardRoute.test.js"

    quiz:
      title: "Step 7 — Knowledge Check"
