            margin: 0 0 8px;
          }

          .lesson-card h2 {
            font-size: 1.2em;
          }

          .lesson-card p {
            color: var(--muted);
          }

          .lesson-card button {
            min-height: 40px;
            min-width: 92px;
            border: 2px solid var(--accent);
            border-radius: 6px;
            padding: 8px 14px;
            background: var(--accent);
            color: var(--button-text);
            font: inherit;
            cursor: pointer;
          }

          .lesson-card button:hover {
            border-color: var(--accent-strong);
            background: var(--accent-strong);
          }

