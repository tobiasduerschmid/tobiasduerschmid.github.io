          Final EiPE summary:

      - path: "data/items.js"
        language: "javascript"
        content: |
          const items = [
            { sku: "mochi", name: "Mango Mochi", price: 4, stock: 8 },
            { sku: "ramen", name: "Late-Night Ramen", price: 7, stock: 0 },
            { sku: "tea", name: "Jasmine Tea", price: 3, stock: 15 },
          ];

          module.exports = { items };

      - path: "services/stockService.js"
        language: "javascript"
        content: |
          const { items } = require("../data/items");

          function findItem(sku) {
            return items.find(item => item.sku === sku);
          }

          function checkStock(lineItems) {
            const missing = [];
            for (const lineItem of lineItems) {
              const item = findItem(lineItem.sku);
              if (!item || item.stock < lineItem.quantity) {
                missing.push(lineItem.sku);
              }
            }
            return { ok: missing.length === 0, missing };
          }

          function subtotalFor(lineItems) {
            return lineItems.reduce((total, lineItem) => {
              const item = findItem(lineItem.sku);
              return total + item.price * lineItem.quantity;
            }, 0);
          }

          module.exports = { checkStock, subtotalFor };

      - path: "services/discountService.js"
        language: "javascript"
        content: |
          function discountFor(coupon, subtotal) {
            if (coupon === "STUDY10" && subtotal >= 10) {
              return Math.round(subtotal * 0.10);
            }
            if (coupon === "TEA3") {
              return 3;
            }
            return 0;
          }

          module.exports = { discountFor };

      - path: "services/receiptFormatter.js"
        language: "javascript"
        content: |
          function formatReceiptLine(name, quantity, total) {
            return `${quantity}x ${name}: $${total}`;
          }

          module.exports = { formatReceiptLine };

      - path: "routes/checkoutRoute.js"
        language: "javascript"
        content: |
          const { checkStock, subtotalFor } = require("../services/stockService");
          const { discountFor } = require("../services/discountService");

          function quoteCheckout(req, res) {
            const lineItems = req.body.items || [];
            const stockReport = checkStock(lineItems);

            if (!stockReport.ok) {
              return res.status(409).json({
                error: "out of stock",
                missing: stockReport.missing,
              });
            }

            const subtotal = subtotalFor(lineItems);
            const discount = discountFor(req.body.coupon, subtotal);

            return res.json({
              subtotal,
              discount,
              total: subtotal - discount,
            });
          }

          module.exports = { quoteCheckout };

      - path: "__tests__/checkoutRoute.test.js"
        language: "javascript"
        content: |
          const assert = require("assert");
          const { quoteCheckout } = require("../routes/checkoutRoute");

          function fakeResponse() {
            return {
              statusCode: 200,
              body: undefined,
              status(code) {
                this.statusCode = code;
                return this;
              },
              json(payload) {
                this.body = payload;
                return this;
              },
            };
          }

          function test(name, body) {
            body();
            console.log(`PASS: ${name}`);
          }

          test("successful quote applies STUDY10 when subtotal is at least 10", () => {
            const res = fakeResponse();
            quoteCheckout({
              body: {
                coupon: "STUDY10",
                items: [
                  { sku: "mochi", quantity: 2 },
                  { sku: "tea", quantity: 1 },
                ],
              },
            }, res);
            assert.deepStrictEqual(res.body, { subtotal: 11, discount: 1, total: 10 });
          });

          test("out-of-stock items return 409 and skip totals", () => {
            const res = fakeResponse();
            quoteCheckout({
              body: {
                coupon: "STUDY10",
                items: [{ sku: "ramen", quantity: 1 }],
              },
            }, res);
            assert.strictEqual(res.statusCode, 409);
            assert.deepStrictEqual(res.body, { error: "out of stock", missing: ["ramen"] });
          });

    open_file: "__tests__/checkoutRoute.test.js"
    run_file: "__tests__/checkoutRoute.test.js"

    quiz:
      title: "Step 4 — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - type: single
          question: "For the out-of-stock request, what is the shortest correct trace?"
          options:
            - "`quoteCheckout()` reads `req.body.items`, calls `checkStock()`, sees `ok: false`, and returns `res.status(409).json(...)`."
            - "Trace `discountFor()` because coupons decide every response."
            - "Trace `subtotalFor()` because every checkout must compute totals first."
            - "Trace only the `items` array and infer the HTTP status from stock values."
          correct_index: 0
          option_feedback:
            1: "The route returns early before coupon logic when stock is missing."
            2: "The route returns early before subtotal calculation when stock is missing."
            3: "The data is necessary evidence, but the HTTP status is created in the route."
          explanation: "The relevant branch is route → stock check → early 409 response. A targeted trace stops before discount and subtotal helpers."

        - type: single
          question: "Where is the `STUDY10` coupon applied in a successful quote?"
          options:
            - "`discountFor(req.body.coupon, subtotal)` in `routes/checkoutRoute.js`, with rules defined in `services/discountService.js`"
            - "`checkStock()` in `services/stockService.js`"
            - "`findItem()` in `services/stockService.js`"
            - "`fakeResponse()` in the test file"
          correct_index: 0
          option_feedback:
            1: "Stock checking decides whether the request can proceed. It does not apply coupons."
            2: "`findItem()` locates catalog items for stock and subtotal helpers."
            3: "`fakeResponse()` captures what the route sends; it does not compute business rules."
          explanation: "The route passes the coupon and subtotal to the discount helper. The helper owns coupon rules."

        - type: single
          question: "Which helper computes `subtotal: 11` for two mochi and one tea?"
          options:
            - "`subtotalFor(lineItems)`"
            - "`discountFor(coupon, subtotal)`"
            - "`checkStock(lineItems)`"
            - "`quoteCheckout(req, res)` without any helper calls"
          correct_index: 0
          option_feedback:
            1: "The discount helper subtracts from an already-computed subtotal."
            2: "Stock checking returns availability, not price totals."
            3: "The route coordinates the helpers; it does not contain the price multiplication."
          explanation: "`subtotalFor()` reduces line items by looking up each item price and multiplying by quantity."

        - type: multiple
          question: "Which files are part of the runtime flow for a successful checkout quote?"
          options:
            - "`routes/checkoutRoute.js`"
            - "`services/stockService.js`"
            - "`services/discountService.js`"
            - "`data/items.js`"
            - "`__tests__/checkoutRoute.test.js`"
            - "`services/receiptFormatter.js`"
          correct_indices: [0, 1, 2, 3]
          option_feedback:
            0: "The route reads request data and sends the response."
            1: "The stock service checks availability and computes the subtotal."
            2: "The discount service applies coupon rules."
            3: "The data file supplies prices and stock counts."
            4: "The test is specification evidence, not part of the runtime flow."
            5: "The receipt formatter is nearby code, but this route never imports or calls it."
          explanation: "A successful quote is a runtime flow: route coordination, stock and price helpers, discount rules, and catalog data."

        - type: single
          question: "A bug report says `TEA3` can make tiny orders too cheap. Which beacon could mislead a fast reader, and what evidence corrects it?"
          options:
            - "The `discountFor(coupon, subtotal)` name sounds like every coupon uses the subtotal, but the `coupon === \"TEA3\"` branch returns `3` without checking the subtotal."
            - "The `checkStock()` name sounds like it applies coupons, and the missing array proves it."
            - "The `receiptFormatter.js` file name proves receipts control discounts."
            - "The `items` array proves all coupons depend only on item names."
          correct_index: 0
          option_feedback:
            1: "`checkStock()` is a stock beacon, not a coupon beacon."
            2: "A nearby receipt formatter is incidental because the route never imports it."
            3: "The catalog data supplies prices and stock, but coupon policy is in the discount helper."
          explanation: "Concept location starts from domain language, then false-beacon diagnosis names both the tempting inference and the exact branch that corrects it."

        - type: single
          question: "When should a reader switch from top-down beacon reading to bottom-up tracing in this example?"
          options:
            - "When a hypothesis depends on a risky branch such as the early `409` return or a coupon boundary."
            - "Immediately at the first line of every file, before reading tests."
            - "Never; names are always enough if they are descriptive."
            - "Only after changing the code."
          correct_index: 0
          option_feedback:
            1: "Starting with exhaustive tracing wastes attention before you know the behavior question."
            2: "Beacons guide attention, but behavior still needs verification when risk or ambiguity is present."
            3: "Comprehension verification should happen before edits, especially around branches and boundaries."
          explanation: "Top-down reading is efficient until the evidence gets risky, surprising, or incomplete. Then a short bottom-up trace repairs or confirms the model."
