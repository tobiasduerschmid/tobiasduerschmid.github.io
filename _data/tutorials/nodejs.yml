        - question: "**[Spaced Practice: Revisit Step 5]** An Express route handler has a 5-second synchronous loop. During those 5 seconds, 100 other requests arrive. What happens to them?"
          options:
            - "Express creates new threads to handle the other requests in parallel"
            - "All 100 requests wait — the single-threaded call stack is occupied by the slow handler, so no other route callbacks can execute"
            - "Express drops the 100 requests and returns 503 errors automatically"
            - "The other requests execute inside the slow handler's loop, interleaved between iterations"
          correct_index: 1
          explanation: "Node.js is single-threaded. While the slow synchronous loop runs, the Call Stack is occupied. The Event Loop cannot hand any other callbacks (including route handlers for the 100 waiting requests) to the Chef until the loop finishes. This is why blocking the event loop is catastrophic for Express servers."

