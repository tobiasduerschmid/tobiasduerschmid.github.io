  - title: "Capstone: Build a Student Grade Dashboard"
    instructions: |
      > **Learning objective:** After this step you will be able to **design and implement** a complete async JavaScript program that integrates arrow functions, array methods, destructuring, the Event Loop, and `async`/`await`.

      ## Putting It All Together

      You now have all the component skills. This capstone integrates them into a single
      program — with **no scaffolding**. You decide how to structure the code.

      ### The Scenario

      You are building a dashboard that fetches student records from two simulated API
      endpoints, merges the data, and prints a formatted report. The two data sources
      are already provided for you as helper functions in the starter file:

      - `fetchRoster()` — returns a Promise that resolves with an array of `{ name, id }` objects
      - `fetchGrades()` — returns a Promise that resolves with an array of `{ studentId, course, grade }` objects

      ### Requirements

      1. Write an `async` function called `buildDashboard()` that:
         - Fetches **both** data sources **concurrently** using `Promise.all` (not sequentially)
         - Merges each student with their grades using their `id`/`studentId` (use destructuring and `.filter()` / `.map()`)
         - Computes each student's average grade (numeric)
         - Identifies students who are **passing** (average **>=** 60) — use `===` or strict comparisons where appropriate
      2. Print a report to the console in this exact format:
         ```
         === Grade Dashboard ===
         Alice  | Avg: 87.7 | PASS
         Bob    | Avg: 54.3 | FAIL
         Clara  | Avg: 91.0 | PASS
         ```
         - Names should be left-padded to 6 characters (use `.padEnd(6)`)
         - Averages should show exactly one decimal place (use `.toFixed(1)`)
         - End with a summary line: `Passing: 2/3 students`
      3. Call `buildDashboard()` at the bottom of the file
      4. Wrap the entire body in `try`/`catch` for error handling

      **Hints** (only if you're stuck):
      - Use `const [roster, grades] = await Promise.all([...])` to fetch concurrently
      - Use `grades.filter(g => g.studentId === student.id)` to find a student's grades
      - Use `.map(g => g.grade)` then `.reduce((sum, g) => sum + g, 0) / length` for the average
      - Use template literals and `.padEnd()` / `.toFixed()` for formatting

    files:
      - path: "dashboard.js"
        content: |
          // === Simulated API (do not modify) ===
          function fetchRoster() {
              return new Promise(resolve => {
                  setTimeout(() => resolve([
                      { name: "Alice", id: 1 },
                      { name: "Bob",   id: 2 },
                      { name: "Clara", id: 3 }
                  ]), 50);
              });
          }

          function fetchGrades() {
              return new Promise(resolve => {
                  setTimeout(() => resolve([
                      { studentId: 1, course: "Math",    grade: 92 },
                      { studentId: 1, course: "English", grade: 88 },
                      { studentId: 1, course: "Science", grade: 83 },
                      { studentId: 2, course: "Math",    grade: 45 },
                      { studentId: 2, course: "English", grade: 61 },
                      { studentId: 2, course: "Science", grade: 57 },
                      { studentId: 3, course: "Math",    grade: 95 },
                      { studentId: 3, course: "English", grade: 89 },
                      { studentId: 3, course: "Science", grade: 89 }
                  ]), 50);
              });
          }

          // === Your code below — no scaffolding! ===
        language: "javascript"

    open_file: "dashboard.js"

    tests:
      - description: "Uses async/await"
        command: "assert(source.includes('async') && source.includes('await'), 'Your solution should use async/await')"
      - description: "Uses Promise.all for concurrent fetching"
        command: "assert(source.includes('Promise.all'), 'Fetch both data sources concurrently with Promise.all')"
      - description: "Uses try/catch for error handling"
        command: "assert(source.includes('try') && source.includes('catch'), 'Wrap your code in try/catch for error handling')"
      - description: "Output includes the dashboard header"
        command: "assert(output.includes('Grade Dashboard'), 'Print the === Grade Dashboard === header')"
      - description: "Output includes Alice with a passing average"
        command: "assert(output.includes('Alice') && output.includes('87.7') && output.includes('PASS'), 'Alice should have Avg: 87.7 and PASS')"
      - description: "Output includes Bob with a failing average"
        command: "assert(output.includes('Bob') && output.includes('54.3') && output.includes('FAIL'), 'Bob should have Avg: 54.3 and FAIL')"
      - description: "Output includes Clara with a passing average"
        command: "assert(output.includes('Clara') && output.includes('91.0') && output.includes('PASS'), 'Clara should have Avg: 91.0 and PASS')"
      - description: "Output includes passing summary"
        command: "assert(output.includes('Passing: 2/3'), 'End with a summary line: Passing: 2/3 students')"

    quiz:
      title: "Capstone — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            Why is `Promise.all([fetchRoster(), fetchGrades()])` faster than awaiting each one sequentially?
          type: single
          options:
            - "`Promise.all` uses multiple threads to run both functions in parallel"
            - "`Promise.all` starts both Promises immediately; the Event Loop handles both timers concurrently, so total wait time is the maximum of the two, not the sum"
            - "`Promise.all` skips the Event Loop entirely for performance"
            - "It is not faster — `Promise.all` is just syntactic sugar for sequential awaits"
          correct_index: 1
          explanation: "Both `setTimeout` timers start immediately when `fetchRoster()` and `fetchGrades()` are called. `Promise.all` simply waits for both to resolve. Since Node.js is single-threaded, there are no extra threads — the Event Loop manages both timers concurrently. Total wait is ~50ms (the slower one), not ~100ms."

        - question: |
            **Evaluate** this code for computing a student's average grade. What is the bug?
            ```javascript
            const avg = grades
                .filter(g => g.studentId == student.id)
                .map(g => g.grade)
                .reduce((sum, g) => sum + g) / grades.length;
            ```
          type: single
          options:
            - "`.reduce()` needs an initial value of `0` to handle empty arrays safely, and the division should use the filtered array's length, not `grades.length`"
            - "`.filter()` should use `.find()` instead — filter returns only one element"
            - "The `==` operator will crash because `studentId` and `id` are different types"
            - "There is no bug — this code is correct"
          correct_index: 0
          explanation: "Two bugs: (1) `.reduce((sum, g) => sum + g)` with no initial value throws on empty arrays — always pass `0` as the second argument. (2) Dividing by `grades.length` (all grades) instead of the filtered array's length gives the wrong average. Also, `==` should be `===` for strict comparison (Step 2)."

        - question: |
            **[Spaced Practice: Revisit Step 4]** In the capstone, `fetchRoster()` and `fetchGrades()` both use `setTimeout` with 50ms. If you `await fetchRoster()` first (line A) then `await fetchGrades()` (line B), what is the minimum total wait time?
          type: single
          options:
            - "~50ms — both timers run concurrently on the Event Loop"
            - "~100ms — the second timer does not start until the first `await` resolves"
            - "~0ms — `setTimeout` with small values resolves instantly"
            - "It depends on how fast the CPU is"
          correct_index: 1
          explanation: "When you `await` sequentially, the second call does not execute until the first Promise resolves. The first timer fires after ~50ms, then the second starts and fires after another ~50ms — total ~100ms. This is why `Promise.all` matters: it starts both timers at the same time."
