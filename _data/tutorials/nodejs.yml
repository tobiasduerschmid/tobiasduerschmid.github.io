          [
            { "name": "Alice", "grade": 95 },
            { "name": "Bob",   "grade": 42 },
            { "name": "Carol", "grade": 78 },
            { "name": "Dave",  "grade": 55 },
            { "name": "Eve",   "grade": 88 }
          ]
