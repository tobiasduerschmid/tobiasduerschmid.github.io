  - title: "Capstone: Deploy the Student Grade API"
    http_client: true
    http_url: "http://CS35L-nodejs.org/api/dashboard"
    instructions: |
      > **Learning objective:** After this step you will be able to **design and implement** a complete Express API using the Router pattern, async data fetching, and all JavaScript skills from this tutorial.

      ## Ship It ŌĆö Your API Goes Live

      You have unlocked every component skill: arrow functions, `.filter()`, `.map()`, `.reduce()`, destructuring, Express routes, the Router, query parameters, route parameters, POST, the Event Loop, and `async`/`await`. Now you are building a real API and deploying it to `CS35L-nodejs.org` ŌĆö with **no scaffolding**. You decide how to structure the code.

      > **Growth mindset moment:** This capstone has no scaffolding ŌĆö and that is intentional. If you feel stuck, it does not mean you are missing something fundamental. It means you are doing the hard work of *integrating* skills that you practiced in isolation. Go back to the specific step that covers the concept you are stuck on. Every professional developer references prior work when building something new.

      ### Design Before You Code

      Before opening `routes.js`, sketch your design on paper (or mentally):

      1. What is the file structure? What goes in `routes.js` vs `app.js`?
      2. Write the `app.use()` call you'll need in `app.js` before you type it.
      3. For `GET /api/dashboard`: what is the order of operations? List the steps (fetch, merge, compute, respond) before coding.
      4. Which tests will be hardest to pass? Which component skill from Steps 3ŌĆō9 does each test exercise?

      > Designing before coding is a professional habit. It surfaces structural decisions (like forgetting `module.exports`) before you've written 50 lines. If you skip this and get stuck, come back to this list and check each step.

      ### The Scenario

      You are building a Student Grade API backed by two JSON files (`roster.json` and `grades.json`). Two async helper functions are provided at the top of `routes.js` that read these files using `fs.promises.readFile` ŌĆö the same pattern from Step 9:

      - `fetchRoster()` ŌĆö reads `roster.json` and resolves with `[{ name, id }]`
      - `fetchGrades()` ŌĆö reads `grades.json` and resolves with `[{ studentId, course, grade }]`

      ### Requirements

      Build an Express API with an **Express Router** mounted at `/api`. The router must have these routes:

      1. **`GET /api/dashboard`** ŌĆö The main endpoint.
         - Fetch **both** data sources **concurrently** with `Promise.all`
         - Merge each student with their grades (match by `id`/`studentId`)
         - Compute each student's average grade
         - Return JSON: `{ students: [{ name, avg, status }], passing: count, total: count }`
         - `status` is `"PASS"` if average >= 60, else `"FAIL"`
         - `avg` formatted to 1 decimal place (as a string, e.g., `"87.7"`)

      2. **`GET /api/students/:id`** ŌĆö Get one student's details.
         - Fetch both data sources
         - Find the student matching `:id` (use `Number()` + `===`)
         - Return: `{ name, courses: [{ course, grade }], avg }`
         - If not found, return `{ error: "Not found" }`

      3. **`POST /api/students`** ŌĆö Add a student to the roster.
         - Read the new student from `req.body`
         - Respond with `{ message: "Added", student: ... }`

      4. **Error handling:** Wrap all route handlers in `try`/`catch`

      **Put routes in `routes.js` (the Router), and mount them in `app.js`.** When your code looks complete, switch to the **`app.js`** tab and press **Ō¢Č Run** to deploy your API to `CS35L-nodejs.org` ŌĆö then use the HTTP Client to hit your live endpoints. (`routes.js` is a module that only exports a router; running it directly does nothing.)

      ### Suggested Order (if you are unsure where to start)

      1. **Start with the skeleton:** In `routes.js`, add `const express = require('express')`, create a router, and export it. In `app.js`, import and mount it at `/api`. Run ŌĆö you should see no errors.
      2. **Add the POST route first** ŌĆö it is the simplest (just read `req.body` and respond).
      3. **Add `GET /api/students/:id`** ŌĆö fetch data, find one student, respond.
      4. **Add `GET /api/dashboard` last** ŌĆö it is the most complex (merge, compute, format).

      ### Hints (only if you're stuck)

      - Use `const [roster, grades] = await Promise.all([...])` for concurrent fetching
      - Use `grades.filter(g => g.studentId === student.id)` to get a student's grades
      - Use `.map(g => g.grade)` then `.reduce()` for averages
      - Use `express.Router()` and `module.exports`

