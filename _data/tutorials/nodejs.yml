    solution:
      files:
        - path: "server.js"
          content: |
            const express = require('express');
            const app = express();
            app.use(express.json());

            const students = [
                { id: 1, name: "Alice", grade: 95 },
                { id: 2, name: "Bob",   grade: 42 },
                { id: 3, name: "Carol", grade: 78 },
                { id: 4, name: "Dave",  grade: 55 },
                { id: 5, name: "Eve",   grade: 88 },
            ];

            // ROUTE 1: GET /students
            app.get('/students', (req, res) => {
                if (req.query.passing === 'true') {
                    const passing = students.filter(s => s.grade >= 60);
                    res.json(passing);
                } else {
                    res.json(students);
                }
            });

            // ROUTE 2: GET /students/:id
            app.get('/students/:id', (req, res) => {
                const student = students.find(s => s.id === Number(req.params.id));
                if (student) {
                    res.json(student);
                } else {
                    res.json({ error: "Not found" });
                }
            });

            // ROUTE 3: POST /students
            app.post('/students', (req, res) => {
                const newStudent = req.body;
                students.push(newStudent);
                res.json(students);
            });

            app.listen(3000, () => {
                console.log("Student API listening on port 3000");
            });
          language: "javascript"
      explanation: |
        **Route 1 ŌĆö Query params:** `req.query.passing` is always a string, so we compare with `=== 'true'` (not `== true`). When the condition matches, `.filter()` from Step 3 selects only passing students.

        **Route 2 ŌĆö Route params:** `req.params.id` is a string. We use `Number()` to convert it and `===` for strict comparison ŌĆö applying the Step 2 lesson about type coercion. `.find()` returns the first matching element (or `undefined`).

        **Route 3 ŌĆö POST body:** `req.body` contains the parsed JSON sent by the client. We push it into the array and respond with the updated list.

        **Scaffolding fade:** In Step 5, everything was given and you changed one string. Here, the route *declarations* are given but you wrote the handler *logic*. In Step 7, you will write entire routes from scratch.

