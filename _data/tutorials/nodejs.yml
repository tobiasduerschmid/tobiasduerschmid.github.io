  # STEP 4: Array Transformation & Destructuring
  # Pedagogy: Component skill isolation ŌĆö teach .map(), .reduce(), and
  #           destructuring BEFORE Express. These are building blocks
  #           that will be combined with Express routes in Steps 5ŌĆō7.
  #           Interleaving quiz revisits arrow functions and ===.
  # --------------------------------------------------------------------------
  - title: "Array Transformation & Destructuring"
    instructions: |
      ## Transforming Data with Array Methods

      > **Learning objective:** After this step you will be able to **use** `.map()` to transform arrays, `.reduce()` to accumulate values, and **destructure** objects and arrays.

      In Step 3 you learned `.filter()` ŌĆö selecting elements. Now you will learn to **transform** them with `.map()` and **combine** them with `.reduce()`. These three methods ŌĆö `.filter()`, `.map()`, `.reduce()` ŌĆö are the workhorses of data processing in JavaScript, and you will use all three inside Express route handlers starting in Step 5.

      ### `.map()` ŌĆö Transform Every Element

      `.map()` creates a new array by applying a callback to each element:

      ```javascript
      // Python equivalent: list(map(lambda x: x * 2, [1, 2, 3]))
      const numbers = [1, 2, 3];
      const doubled = numbers.map(n => n * 2);     // [2, 4, 6]
      const labels  = numbers.map(n => `#${n}`);   // ["#1", "#2", "#3"]
      ```

      `.map()` always returns an array of the **same length**. `.filter()` can return fewer elements; `.map()` transforms every one.

      ### `.reduce()` ŌĆö Accumulate a Single Value

      `.reduce()` combines all elements into one value:

      ```javascript
      const numbers = [1, 2, 3, 4, 5];
      const sum = numbers.reduce((accumulator, current) => accumulator + current, 0);
      // Step by step: 0+1=1, 1+2=3, 3+3=6, 6+4=10, 10+5=15 ŌåÆ result: 15
      ```

      The second argument (`0`) is the **initial value** of the accumulator. Always provide it ŌĆö without it, `.reduce()` throws on empty arrays.

      ```javascript
      // Python equivalent: functools.reduce(lambda acc, n: acc + n, [1,2,3,4,5], 0)
      // Or simply: sum([1, 2, 3, 4, 5])
      ```

      ### Destructuring: Unpacking Values

      JavaScript has a compact syntax for extracting values from arrays and objects:

      **Array destructuring** ŌĆö assign items by position:

      ```javascript
      const coords = [40.7, -74.0];
      const [lat, lng] = coords;    // lat = 40.7, lng = -74.0

      // Python equivalent: lat, lng = coords  (tuple unpacking ŌĆö same idea)
      ```

      **Object destructuring** ŌĆö extract properties by name:

      ```javascript
      const student = { name: "Alice", grade: 95 };
      const { name, grade } = student;   // name = "Alice", grade = 95

      // Works in function parameters ŌĆö you will see this in every React component:
      function printStudent({ name, grade }) {
          console.log(`${name}: ${grade}`);
      }
      ```

      Destructuring is especially useful inside `.map()` callbacks:

      ```javascript
      const students = [{ name: "Alice", grade: 95 }, { name: "Bob", grade: 42 }];
      const names = students.map(({ name }) => name);  // ["Alice", "Bob"]
      ```

      ### Formatting Output: `.toFixed()` and `.padEnd()`

      Two small utilities you will need for formatting:

      ```javascript
      // .toFixed(n) ŌĆö format a number to n decimal places (returns a string)
      const avg = 87.666;
      console.log(avg.toFixed(1));   // "87.7"

      // .padEnd(n) ŌĆö pad a string with spaces to reach length n (left-aligns text)
      console.log("Alice".padEnd(7));   // "Alice  " (7 chars total)
      console.log("Bob".padEnd(7));     // "Bob    " (7 chars total)
      ```

      ### Predict Before You Code

      Predict: what does `[1, 2, 3].map(n => n * 10)` return? What about `[1, 2, 3].reduce((acc, n) => acc + n, 0)`? Write your predictions, then verify in the editor.

      ### Task: Build a Grade Report

      Open `transform.js`. The `getLetterGrade` arrow function from Step 3 is provided. Complete the four `TODO` items ŌĆö **each builds on the previous one**, so do them in order:

      1. **Use** `.map()` to extract just the grade numbers into a new array: `students.map(s => s.grade)` ŌåÆ `[95, 42, 78, 55, 88]`. This is the simplest `.map()` ŌĆö transform objects into numbers.
      2. **Use** `.reduce()` to compute the **sum** of the grade numbers, then divide by the count to get the class average.
      3. **Use** `.map()` again, this time with **destructuring** `({ name, grade })` in the arrow function parameter, to format each student as `"Name   | grade (Letter)"`. Use `getLetterGrade()` for the letter and `.padEnd(7)` to align names.
      4. **Print** the class average formatted to 1 decimal place using `.toFixed(1)`.

      > **Why four steps instead of jumping straight to the hardest one?** The first `.map()` is simple (extract one property). The second combines `.reduce()` with division. The third `.map()` adds destructuring and template literals. Each step adds exactly one new concept.

      Click **Ō¢Č Run** to check your result.

