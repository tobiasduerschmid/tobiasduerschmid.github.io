    solution:
      files:
        - path: "studentRoutes.js"
          content: |
            // Student Routes
            const express = require('express');
            const router = express.Router();

            const students = [
                { id: 1, name: "Alice", grade: 95 },
                { id: 2, name: "Bob",   grade: 42 },
                { id: 3, name: "Carol", grade: 78 },
            ];

            // GET / ŌĆö all students (mounted at /api/students/)
            router.get('/', (req, res) => {
                res.json(students);
            });

            // GET /:id ŌĆö one student by ID
            router.get('/:id', (req, res) => {
                const student = students.find(s => s.id === Number(req.params.id));
                if (student) {
                    res.json(student);
                } else {
                    res.json({ error: "Not found" });
                }
            });

            // POST / ŌĆö add a new student
            router.post('/', (req, res) => {
                const newStudent = req.body;
                students.push(newStudent);
                res.json(students);
            });

            module.exports = router;
          language: "javascript"
        - path: "app.js"
          content: |
            // Main Express app
            const express = require('express');
            const app = express();
            app.use(express.json());

            const studentRoutes = require('./studentRoutes');
            app.use('/api/students', studentRoutes);

            app.listen(3000, () => {
                console.log("Server with Router listening on port 3000");
            });
          language: "javascript"
      explanation: |
        **`express.Router()`:** Creates a modular route handler. Routes defined on `router` are relative ŌĆö `router.get('/')` handles whatever path the router is mounted at.

        **`module.exports = router`:** Exports the router so `app.js` can import it with `require('./studentRoutes')`.

        **`app.use('/api/students', studentRoutes)`:** Mounts the router at `/api/students`. Now:
        - `router.get('/')` handles `GET /api/students`
        - `router.get('/:id')` handles `GET /api/students/3`
        - `router.post('/')` handles `POST /api/students`

        **Scaffolding progression:** Step 5 changed one string. Step 6 filled in handler logic. Step 7 wrote entire routes and organized them into a Router. You are doing more independently with each step ŌĆö and the capstone will have NO scaffolding at all.

