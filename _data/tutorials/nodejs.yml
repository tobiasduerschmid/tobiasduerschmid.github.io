    quiz:
      title: "Arrow Functions & Callbacks ŌĆö Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "What does it mean that functions are 'first-class values' in JavaScript?"
          options:
            - "Functions execute faster than other value types at runtime due to JIT optimization"
            - "Functions can be stored in variables, passed as arguments, and returned from other functions"
            - "Functions must always be declared at the top of a file before any other values"
            - "Functions have a special protected memory region that prevents garbage collection"
          correct_index: 1
          explanation: "A first-class value is one that can be used anywhere any other value can: stored in a variable, passed as an argument, returned from a function, placed in an array. This is why `numbers.filter(n => n > 2)` works ŌĆö you pass a function just like you'd pass a number. This is the key to callbacks and the Express route handlers you will write in Step 5."

        - question: "In Python, `sorted(items, key=lambda x: x['grade'])` sorts by grade. Which JavaScript expression is the direct equivalent?"
          options:
            - "`items.sort(key = x => x.grade)`"
            - "`items.sort((a, b) => a.grade - b.grade)`"
            - "`items.sort(function key(x) { return x.grade; })`"
            - "`items.sort(by='grade')`"
          correct_index: 1
          explanation: "JavaScript's `sort` takes a **comparator** function `(a, b) => ...` that returns negative (a before b), zero (equal), or positive (b before a). The Python `key=` and JS comparator are both callbacks ŌĆö functions passed to another function."

        - question: "What does `[1, 2, 3, 4, 5].filter(n => n > 3)` return?"
          options:
            - "`[1, 2, 3]`"
            - "`[4, 5]`"
            - "`[true, true, true, false, false]`"
            - "`3` (the count of elements that pass)"
          correct_index: 1
          explanation: "`.filter()` returns a **new array** containing only the elements where the callback returns `true`. Here, only `4` and `5` satisfy `n > 3`. The original array is unchanged. Note: `.filter()` always returns an array, never a count or boolean array."

        - question: "A student writes `numbers.filter(isEven)` where `isEven` is a function. Why does this work without calling `isEven()` with parentheses?"
          options:
            - "JavaScript automatically detects when parentheses are missing and adds them at runtime"
            - "`isEven` without `()` is a reference to the function ŌĆö `.filter()` calls it for each element"
            - "`.filter()` accepts both function references and immediate function calls interchangeably"
            - "This is a bug ŌĆö passing `isEven` without parentheses gives `.filter()` the value `undefined`"
          correct_index: 1
          explanation: "Functions are first-class values. `isEven` is the function itself; `isEven()` is the result of calling it. `.filter(isEven)` says 'here is a function ŌĆö you call it.' `.filter(isEven())` says 'call isEven now and pass whatever it returns.' This distinction is fundamental to callbacks."

        - question: "**[Spaced Practice: Revisit Step 2]** A student declares `let API_URL = 'https://api.school.edu'` and never reassigns it. What change should they make, and why?"
          options:
            - "Change `let` to `var` ŌĆö `var` is the standard keyword for declaring constant URLs in Node.js"
            - "Change `let` to `const` ŌĆö the value never changes, so `const` prevents accidental reassignment"
            - "No change needed ŌĆö `let` and `const` are interchangeable for string values in JavaScript"
            - "Wrap it in a function to protect it from being modified by other parts of the program"
          correct_index: 1
          explanation: "This is the same principle from Step 2: default to `const` for values that never change. `const` communicates intent to readers and catches accidental reassignment bugs at the point of the mistake, rather than causing subtle issues later. `var` should be avoided entirely due to hoisting."

