  - title: "From Callbacks to `async`/`await`"
    instructions: |
      ## What is a Promise?

      Before the generations, you need to know what a **Promise** is: an object representing a value that does not exist yet.

      ```javascript
      // CREATING a Promise — this is how async operations are built under the hood:
      const promise = new Promise((resolve, reject) => {
          // The function you pass receives two callbacks:
          //   resolve(value) — call this when the work succeeds
          //   reject(error)  — call this when it fails
          setTimeout(() => resolve("data ready!"), 100);
      });

      // CONSUMING a Promise (you will do this constantly):
      promise.then(data => console.log(data));   // "data ready!" after 100ms
      ```

      The two arguments to `new Promise(...)` are just callbacks — the same concept you learned in step 3. `resolve` and `reject` are functions that the Promise machinery calls for you.

      > **In practice**: you rarely *create* Promises from scratch. You mostly *consume* them using `await` or `.then()`. The step 5 task provides `fetchStudents()` as a Promise-returning function (built this way) so you can see what it looks like — and then practice consuming it with `async`/`await`.

      ## The Three Generations of Async

      Node.js async syntax has evolved through three generations. You need to recognize all three — and write the third.

      ### Generation 1: Callbacks (Legacy — "Callback Hell")

      ```javascript
      fetchData('a', (err, dataA) => {            // Level 1
          if (err) throw err;
          fetchData('b', (err2, dataB) => {        // Level 2
              if (err2) throw err2;
              // Level 3... "Pyramid of Doom"
          });
      });
      ```

      Every nested async operation adds another indentation level. This is "Callback Hell."

      ### Generation 2: Promises (Flattened)

      ```javascript
      // C++ analogy: std::future   |   Python analogy: concurrent.futures.Future
      fetchData('a')
          .then(dataA => fetchData('b'))
          .then(dataB => console.log(dataB))
          .catch(err  => console.error(err));
      ```

      ### Generation 3: async/await (Modern — looks like synchronous code)

      ```javascript
      async function loadData() {
          try {
              // 'await' suspends THIS function (non-blocking!) and lets other work proceed
              const dataA = await fetchData('a');
              const dataB = await fetchData('b');
              console.log(dataA, dataB);
          } catch (err) {
              console.error(err);
          }
      }
      loadData();
      ```

      This looks like synchronous C++/Python code — but it does **not** block the event loop. When JavaScript hits `await`, it suspends the async function, frees the call stack, and lets the Event Loop process other work. When the Promise resolves, execution resumes.

      > ⚠️ **Critical Caveat — Sequential vs Parallel:**
      > ```javascript
      > // SLOWER: sequential — total time = time(A) + time(B)
      > const a = await fetchA();
      > const b = await fetchB();
      >
      > // FASTER: parallel — total time = max(time(A), time(B))
      > const [a, b] = await Promise.all([fetchA(), fetchB()]);
      > ```
      > If two operations are independent, always prefer `Promise.all()`.

      ### Task: Refactor the Fixer-Upper

      Open `async.js`. It loads student data using the old Generation 1 callback style.
      `fetchStudents()` simulates an async data source (in a real app, this would be a database or file read).

      1. Refactor `readStudents` to be an `async` function using `await fetchStudents()`.
      2. Add a `try`/`catch` block for error handling (like C++'s try/catch or Python's try/except).
      3. Call your refactored function at the bottom.

      Click **▶ Run** to check your output.

    files:
      - path: "async.js"
        content: |
          // Simulated async data source — in a real Node.js app this would be
          // fs.promises.readFile, a database query, or a network fetch.
          function fetchStudents() {
              return new Promise((resolve) => {
                  setTimeout(() => {
                      resolve([
                          { name: "Alice",  grade: 95 },
                          { name: "Bob",    grade: 42 },
                          { name: "Carol",  grade: 78 },
                          { name: "Dave",   grade: 55 },
                          { name: "Eve",    grade: 88 },
                      ]);
                  }, 100);
              });
          }

          // GENERATION 1: Old callback style — "Callback Hell" starts here
          // TASK: Refactor readStudents() to use async/await (Generation 3)
          function readStudents(callback) {
              fetchStudents().then(data => callback(null, data)).catch(err => callback(err, null));
          }

          // TODO: Replace the function above with an async function that:
          //   1. Is declared with 'async'
          //   2. Uses 'await fetchStudents()' to get the data
          //   3. Logs each student's name and grade
          //   4. Wraps everything in try/catch for error handling

          // Original invocation (for reference — replace this call too):
          readStudents((err, students) => {
              if (err) { console.error(err); return; }
              console.log("=== Student Roster ===");
              students.forEach(s => console.log(`  ${s.name}: ${s.grade}`));
          });
        language: "javascript"

    open_file: "async.js"

