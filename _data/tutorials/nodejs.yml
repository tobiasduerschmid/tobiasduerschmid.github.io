        command: "assert(files['routes.js'] && files['routes.js'].includes('express.Router()'), 'Create a Router in routes.js with express.Router()')"
        hints:
          - text: "In routes.js, after `require('express')`, create a router with `const router = express.Router()`. Note the capital R. Then define your routes on `router`, not on `app`."
            condition: "code_missing: Router()"
      - description: "routes.js exports the router"
        command: "assert(files['routes.js'] && files['routes.js'].includes('module.exports'), 'Export the router with module.exports')"
        hints:
          - text: "At the very bottom of routes.js, add `module.exports = router;`. Without this, app.js cannot import your router and all routes will be unreachable."
            condition: "code_missing: module.exports"
      - description: "Uses async/await"
        command: "assert(files['routes.js'] && files['routes.js'].includes('async') && files['routes.js'].includes('await'), 'Route handlers should be async and use await')"
        hints:
          - text: "Your route handlers that call `fetchRoster()` or `fetchGrades()` need to be declared `async` and use `await`. The pattern is: `router.get('/path', async (req, res) => { const data = await fetchRoster(); ... })`."
            condition: "code_missing: async"
      - description: "Uses Promise.all for concurrent fetching"
        command: "assert(files['routes.js'] && files['routes.js'].includes('Promise.all'), 'Fetch both data sources concurrently with Promise.all')"
        hints:
          - text: "Instead of two sequential `await` calls, fetch both at once: `const [roster, grades] = await Promise.all([fetchRoster(), fetchGrades()]);`. This halves the wait time since both Promises run concurrently."
            condition: "code_missing: Promise.all"
      - description: "Uses try/catch for error handling"
        command: "assert(files['routes.js'] && files['routes.js'].includes('try') && files['routes.js'].includes('catch'), 'Wrap async routes in try/catch')"
        hints:
          - text: "Each async route handler should wrap its body in `try { ... } catch (err) { res.status(500).json({ error: err.message }); }`. Without `catch`, an unhandled rejection will crash the server."
            condition: "code_missing: try"
      - description: "app.js mounts the router at /api"
        command: "assert(files['app.js'] && files['app.js'].includes('/api') && files['app.js'].includes('app.use'), 'Mount the router at /api in app.js')"
        hints:
          - text: "In app.js: (1) import the router with `const routes = require('./routes');`, then (2) mount it with `app.use('/api', routes);`. The `/api` prefix means all router routes are accessible under `/api/...`."
            condition: "code_missing: /api"
      - description: "Uses .filter() and .map() for data processing"
        command: "assert(files['routes.js'] && files['routes.js'].includes('.filter(') && files['routes.js'].includes('.map('), 'Use .filter() and .map() to process student data')"
        hints:
          - text: "To get a student's grades: `grades.filter(g => g.studentId === student.id)` selects matching grades. Then `.map(g => g.grade)` extracts the numeric values. Both patterns are from Step 3 and Step 4."
            condition: "code_missing: .filter("
      - description: "Uses .reduce() for computing averages"
        command: "assert(files['routes.js'] && files['routes.js'].includes('.reduce('), 'Use .reduce() to compute grade averages')"
        hints:
          - text: "Once you have an array of grade numbers, use `.reduce((sum, g) => sum + g, 0)` to sum them, then divide by the array's `.length`. Don't forget the initial value `0` ŌĆö `.reduce()` without it throws on empty arrays."
            condition: "code_missing: .reduce("
      - description: "Uses fs.promises.readFile in helpers"
        command: "assert(files['routes.js'] && files['routes.js'].includes('fs.promises.readFile'), 'The data helpers should use fs.promises.readFile to read the JSON files')"
        hints:
          - text: "The `fetchRoster` and `fetchGrades` helpers at the top of `routes.js` use `fs.promises.readFile('roster.json', 'utf8')` to read the data files. Do not replace them with `new Promise(resolve => setTimeout(...))`."
            condition: "code_missing: fs.promises"
      - description: "Uses strict equality ==="
        command: "assert(files['routes.js'] && files['routes.js'].includes('==='), 'Use === for strict comparisons')"
        hints:
          - text: "When comparing `studentId` (a number in the data) to `student.id`, or when matching route params, always use `===`. For route params: `Number(req.params.id) === student.id`."
            condition: "code_missing: ==="

    quiz:
      title: "Capstone ŌĆö Comprehensive Knowledge Check"
      min_score: 0.7
      shuffle: true
      questions:
        # --- Capstone-specific questions ---
        - question: "Why is `Promise.all([fetchRoster(), fetchGrades()])` faster than awaiting each one sequentially?"
          type: single
          options:
            - "`Promise.all` spawns a separate thread for each Promise"
            - "`Promise.all` starts both Promises immediately; total time is the max of the two"
            - "`Promise.all` bypasses the Event Loop and runs both synchronously"
            - "It is not faster ŌĆö `Promise.all` is syntactic sugar"
          correct_index: 1
          explanation: "Both operations start immediately. `Promise.all` waits for both to resolve. Since both are ~50ms, total wait is ~50ms, not ~100ms. No extra threads ŌĆö the Event Loop manages both."

        - question: |
            **Evaluate** this code for computing a student's average grade. What is the bug?
            ```javascript
            const avg = grades
                .filter(g => g.studentId == student.id)
                .map(g => g.grade)
                .reduce((sum, g) => sum + g) / grades.length;
            ```
          type: single
          options:
            - "`.reduce()` needs initial value `0`, division should use filtered length, and `==` should be `===`"
            - "`.filter()` should use `.find()` instead"
            - "The `==` operator will crash because types differ"
            - "There is no bug"
          correct_index: 0
          explanation: "Three bugs: (1) `.reduce()` without an initial value throws on empty arrays. (2) Dividing by `grades.length` (all grades) instead of filtered length gives wrong averages. (3) `==` should be `===` for strict comparison (Step 2)."

        - question: "**[Technique Selection]** A Spotify-like app needs to: (1) fetch a user's playlists, (2) for each playlist fetch its tracks, (3) display all track names. Which combination is most appropriate?"
          type: single
          options:
            - "`.filter()` to select playlists, then `await` each track fetch sequentially"
            - "`.map()` into Promises, then `Promise.all()` concurrently, then `.flat()` to merge"
            - "`.reduce()` to accumulate all tracks, with `await` inside the reducer"
            - "A `for` loop with `setTimeout` to space out requests"
          correct_index: 1
          explanation: "`.map()` transforms each playlist into a Promise. `Promise.all()` fires all fetches concurrently. `.flat()` merges nested arrays. This combines `.map()` (Step 3), `Promise.all` (Step 9), and Event Loop concurrency (Step 8)."

        # --- Comprehensive review: Steps 1ŌĆō9 ---
        - question: "What two components does Node.js bundle to let JavaScript run outside the browser?"
          options:
            - "React and Webpack"
            - "V8 (JIT compiler) and libuv (async I/O and Event Loop)"
            - "npm and Express"
            - "TypeScript and Babel"
          correct_index: 1
          explanation: "[Step 1] V8 compiles JavaScript to machine code. libuv provides the Event Loop and OS-level I/O access."

        - question: "What is the output of `console.log('' == false)` in JavaScript?"
          options:
            - "`true` ŌĆö the empty string is coerced to `false` by `==`"
            - "`false` ŌĆö strings and booleans cannot be compared"
            - "A TypeError at runtime"
            - "`undefined`"
          correct_index: 0
          explanation: "[Step 2] JavaScript's `==` coerces types. The empty string is 'falsy', so `'' == false` is `true`. Use `===` to avoid this."

        - question: "A student writes `setTimeout(console.log('hello'), 1000)`. Why does 'hello' print immediately?"
          options:
            - "`setTimeout` ignores the delay parameter when passed a built-in function like `console.log`"
            - "`console.log('hello')` executes now; its return value (`undefined`) is what gets passed"
            - "The delay of 1000 is interpreted as microseconds, not milliseconds, so it fires instantly"
            - "`setTimeout` only accepts arrow functions ŌĆö `console.log` is silently rejected as invalid"
          correct_index: 1
          explanation: "[Step 3] `console.log('hello')` *calls* the function now. `() => console.log('hello')` *passes* a function for later. The most common callback mistake."

        - question: "What does `[5, 10, 15, 20].filter(n => n > 10).map(n => n * 2)` return?"
          options:
            - "`[10, 20, 30, 40]`"
            - "`[30, 40]`"
            - "`[15, 20]`"
            - "`60`"
          correct_index: 1
          explanation: "[Steps 3ŌĆō4] `.filter(n => n > 10)` selects `[15, 20]`. `.map(n => n * 2)` transforms each: `[30, 40]`."

        - question: "In Express, what is the difference between `res.send('hello')` and `res.json({ message: 'hello' })`?"
          options:
            - "They are functionally identical ŌĆö both serialize data and send it as plain text to the client"
            - "`res.send()` sends text/HTML; `res.json()` serializes to JSON with the correct Content-Type"
            - "`res.json()` is faster because it bypasses Express's header processing and middleware pipeline"
            - "`res.send()` only works with GET requests; `res.json()` works with all HTTP methods"
          correct_index: 1
          explanation: "[Step 5] `res.send()` sends text/HTML as-is. `res.json()` converts to JSON and sets `Content-Type: application/json`."

        - question: "A route is `app.get('/products/:category/:id', handler)`. For `/products/electronics/42`, what does `req.params` contain?"
          options:
            - "`{ category: 'electronics', id: 42 }` (string and number)"
            - "`{ category: 'electronics', id: '42' }` (both strings)"
            - "`{ 0: 'electronics', 1: '42' }`"
            - "`{ product: 'electronics/42' }`"
          correct_index: 1
          explanation: "[Step 6] Route parameters are always strings. To use as a number: `Number(req.params.id)`."

        - question: "**Analyze** the output order:\n```javascript\nfs.readFile('data.json', 'utf8', (err, data) => console.log('A'));\nconsole.log('B');\nsetTimeout(() => console.log('C'), 0);\nconsole.log('D');\n```"
          options:
            - "A, B, C, D"
            - "B, D, A, C (or B, D, C, A)"
            - "B, A, D, C"
            - "A, B, D, C"
          correct_index: 1
          explanation: "[Step 8] `B` and `D` are synchronous ŌĆö they run first. `A` and `C` are async callbacks that fire only after the call stack empties."

        - question: "What happens if you forget `await`: `const data = fs.promises.readFile('file.json', 'utf8');`?"
          options:
            - "`data` contains the file contents as a string, exactly the same as with `await`"
            - "`data` is a Promise object, not the file contents"
            - "The code throws a TypeError immediately because `await` is required by the function signature"
            - "The file is never read ŌĆö `fs.promises.readFile` requires `await` to start the I/O operation"
          correct_index: 1
          explanation: "[Step 9] Without `await`, `data` holds a Promise, not the resolved string. The most common async/await mistake."

        - question: "**[Evaluate]** Review this route. Identify ALL the problems:\n```javascript\napp.get('/students', (req, res) => {\n    const data = fs.readFileSync('students.json', 'utf8');\n    const students = JSON.parse(data);\n    const passing = students.filter(s => s.grade == 60);\n    res.json(passing);\n});\n```"
          options:
            - "No problems ŌĆö this is a correct, production-ready Express route handler"
            - "Only one problem: the `==` loose comparison should be `===` for strict equality"
            - "Three: `readFileSync` blocks; `== 60` should be `>= 60` with `===`; no `try`/`catch`"
            - "`readFileSync` is acceptable for small files; the only real issue is the missing error handling"
          correct_index: 2
          explanation: "[Steps 2, 8, 9] (1) `readFileSync` blocks the server. (2) `== 60` should be `>= 60` with `===`. (3) No `try`/`catch` ŌĆö the server crashes if the file is missing."

