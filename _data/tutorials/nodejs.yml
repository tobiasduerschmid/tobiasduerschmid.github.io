          options:
            - "The `/fast` user gets an instant response — Express handles each request in a separate thread"
            - "The `/fast` user waits the remaining ~2.5 seconds — the synchronous loop occupies the Call Stack, so the Event Loop cannot deliver the `/fast` callback until the loop finishes"
            - "Express detects the slow route and switches to the `/fast` handler after 100ms"
            - "The `/fast` user gets their response immediately because `/fast`'s callback is registered before `/slow`'s"
          correct_index: 1
          explanation: "This is the Event Loop in action. The 3-second loop holds the Call Stack. The Event Loop only processes queued callbacks (like the `/fast` handler) when the stack empties. The `/fast` user is stuck waiting ~2.5 seconds for a response that should take microseconds — demonstrating exactly why blocking operations in route handlers are catastrophic in Node.js."
