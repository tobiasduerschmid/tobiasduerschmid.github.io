      - path: "event_loop.js"
        content: |
          // The Blocked Chef Demo ŌĆö reading a real file
          // PREDICT the console.log order BEFORE you run!

          const fs = require('fs');

          // fs.readFile is ASYNCHRONOUS ŌĆö it schedules a callback and moves on.
          // The OS reads the file in the background; the Chef keeps working.
          fs.readFile('students.json', 'utf8', (err, data) => {
              if (err) throw err;
              const students = JSON.parse(data);
              console.log(`[3] File read finished ŌĆö ${students.length} students loaded`);
          });

          // These run synchronously ŌĆö BEFORE the file is ready
          console.log('[1] File read has been requested (but not finished yet)');
          console.log('[2] Chef is free ŌĆö doing other work while OS reads the file');

          // TODO: Add a second fs.readFile here that logs "[4] Second read complete!"
          // Will [4] arrive before or after [3]? Predict first, then run!
        language: "javascript"

    open_file: "event_loop.js"

    solution:
      files:
        - path: "students.json"
          content: |
            [
              { "name": "Alice", "grade": 95 },
              { "name": "Bob",   "grade": 42 },
              { "name": "Carol", "grade": 78 },
              { "name": "Dave",  "grade": 55 },
              { "name": "Eve",   "grade": 88 }
            ]
          language: "json"
        - path: "event_loop.js"
          content: |
            // The Blocked Chef Demo
            const fs = require('fs');

            fs.readFile('students.json', 'utf8', (err, data) => {
                if (err) throw err;
                const students = JSON.parse(data);
                console.log(`[3] File read finished ŌĆö ${students.length} students loaded`);
            });

            console.log('[1] File read has been requested (but not finished yet)');
            console.log('[2] Chef is free ŌĆö doing other work while OS reads the file');

            // Second fs.readFile ŌĆö also async, also queued behind [1] and [2]
            fs.readFile('students.json', 'utf8', (err, data) => {
                if (err) throw err;
                console.log('[4] Second read complete!');
            });
          language: "javascript"
      explanation: |
        **Output order:** `[1]` ŌåÆ `[2]` ŌåÆ `[3]` ŌåÆ `[4]` (though `[3]` and `[4]` may arrive in either order depending on OS scheduling ŌĆö they are both queued callbacks).

        **Why `[1]` and `[2]` print first:** `fs.readFile` is non-blocking ŌĆö it hands the read request to the OS and immediately returns. The Chef is free to run `[1]` and `[2]` synchronously. Only when both synchronous lines complete AND the OS finishes reading the file does the Event Loop deliver the callbacks.

        **`[3]` vs `[4]`:** Both reads are queued to the OS at roughly the same time. Because the first `fs.readFile` was called first, its callback typically arrives first ŌĆö but since both are async, the exact order is not strictly guaranteed. This is a real-world property of async I/O.

