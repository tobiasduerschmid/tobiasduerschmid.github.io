    quiz:
      title: "async/await ŌĆö Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "What does `await` actually do inside an `async` function?"
          options:
            - "It blocks the entire Node.js process until the Promise resolves, like a synchronous call in C++"
            - "It suspends only this async function and frees the call stack, letting the Event Loop process other work until the Promise resolves"
            - "It creates a new thread to wait for the Promise, similar to `std::thread` in C++"
            - "It converts the Promise into a synchronous value by canceling the async operation"
          correct_index: 1
          explanation: "`await` suspends the current async function ŌĆö not the entire program. The call stack is freed, so the Event Loop can process other callbacks, timers, and requests."

        - question: "Two independent API calls each take 100ms. Which approach is faster?\n```javascript\n// Option A\nconst a = await fetchA();\nconst b = await fetchB();\n\n// Option B\nconst [a, b] = await Promise.all([fetchA(), fetchB()]);\n```"
          options:
            - "Option A ŌĆö sequential awaits are optimized by V8 to run in parallel"
            - "Both are the same ŌĆö await does not affect execution time"
            - "Option B ŌĆö `Promise.all` starts both operations concurrently, so total time is ~100ms instead of ~200ms"
            - "Option A ŌĆö `Promise.all` adds overhead that makes it slower for only two Promises"
          correct_index: 2
          explanation: "Option A awaits fetchA first (100ms), then starts fetchB (another 100ms) ŌĆö total ~200ms. Option B starts both immediately and waits for the slower one ŌĆö total ~100ms."

        - question: |
            **Arrange** the lines to write an async Express route handler that fetches students from a database and returns them as JSON.
          type: parsons
          lines:
            - "app.get('/students', async (req, res) => {"
            - "    try {"
            - "        const students = await fetchFromDatabase();"
            - "        res.json(students);"
            - "    } catch (err) {"
            - "        res.status(500).json({ error: err.message });"
            - "    }"
            - "});"
          distractors:
            - "        const students = fetchFromDatabase();"
            - "    } finally {"
          explanation: "The route callback is marked `async` so it can use `await`. The `try`/`catch` handles database errors gracefully by returning a 500 status. The distractor without `await` would assign the Promise object itself, not the resolved data."

        - question: "**[Spaced Practice: Revisit Step 8]** What is the output order?\n```javascript\nasync function demo() {\n    console.log('A');\n    await new Promise(r => setTimeout(r, 0));\n    console.log('B');\n}\ndemo();\nconsole.log('C');\n```"
          options:
            - "A, B, C"
            - "A, C, B"
            - "C, A, B"
            - "A, B, C ŌĆö await with 0ms resolves instantly"
          correct_index: 1
          explanation: "'A' prints synchronously. Then `await` suspends `demo()` and frees the call stack. 'C' prints (synchronous code after `demo()` call). When the Promise resolves, 'B' prints. Same Event Loop principle from Step 8."

        - question: "**[Spaced Practice: Revisit Step 7]** An Express Router has three async route handlers that each query a database. How many threads are used to execute these handlers?"
          options:
            - "Three ŌĆö one thread per route handler for parallel execution"
            - "One ŌĆö all route handlers execute on the single-threaded Event Loop, but `await` frees the call stack between database queries"
            - "It depends on how many requests arrive simultaneously"
            - "Zero ŌĆö async functions run outside the main thread"
          correct_index: 1
          explanation: "Node.js is single-threaded. All route handlers ŌĆö whether on the main app or on Routers ŌĆö execute on the same Event Loop. The magic of `async`/`await` is that `await` suspends the handler and frees the call stack, allowing other handlers to run. This is concurrency without parallelism."

        - question: "**[Spaced Practice: Revisit Step 3]** In the Promise constructor `new Promise((resolve, reject) => { ... })`, what are `resolve` and `reject`?"
          options:
            - "Global variables provided by Node.js for error handling"
            - "Callbacks ŌĆö functions passed as arguments that you call to signal success or failure"
            - "Special keywords in JavaScript that only work inside Promise constructors"
            - "Return values from the async operation that are automatically assigned"
          correct_index: 1
          explanation: "`resolve` and `reject` are callbacks ŌĆö the same pattern from Step 3. The Promise machinery passes these functions to your callback. You call `resolve(value)` when the work succeeds and `reject(error)` when it fails."

