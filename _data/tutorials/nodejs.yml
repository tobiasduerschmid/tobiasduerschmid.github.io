            condition: "code_missing: .filter("
      - description: "Uses .reduce() for computing averages"
        command: "assert(files['routes.js'] && files['routes.js'].includes('.reduce('), 'Use .reduce() to compute grade averages')"
        hints:
          - text: "Once you have an array of grade numbers, use `.reduce((sum, g) => sum + g, 0)` to sum them, then divide by the array's `.length`. Don't forget the initial value `0` — `.reduce()` without it throws on empty arrays."
            condition: "code_missing: .reduce("
      - description: "Uses fs.promises.readFile in helpers"
        command: "assert(files['routes.js'] && files['routes.js'].includes('fs.promises.readFile'), 'The data helpers should use fs.promises.readFile to read the JSON files')"
        hints:
          - text: "The `fetchRoster` and `fetchGrades` helpers at the top of `routes.js` use `fs.promises.readFile('roster.json', 'utf8')` to read the data files. Do not replace them with `new Promise(resolve => setTimeout(...))`."
            condition: "code_missing: fs.promises"
      - description: "Uses strict equality ==="
        command: "assert(files['routes.js'] && files['routes.js'].includes('==='), 'Use === for strict comparisons')"
        hints:
          - text: "When comparing `studentId` (a number in the data) to `student.id`, or when matching route params, always use `===`. For route params: `Number(req.params.id) === student.id`."
            condition: "code_missing: ==="

    quiz:
      title: "Capstone — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "Why is `Promise.all([fetchRoster(), fetchGrades()])` faster than awaiting each one sequentially?"
          type: single
          options:
            - "`Promise.all` spawns a separate thread for each Promise"
            - "`Promise.all` starts both Promises immediately; the Event Loop handles both concurrently, so total time is the max of the two"
            - "`Promise.all` bypasses the Event Loop and runs both synchronously"
            - "It is not faster — `Promise.all` is syntactic sugar"
          correct_index: 1
          explanation: "Both timers start immediately. `Promise.all` waits for both to resolve. Since both are 50ms, total wait is ~50ms, not ~100ms. No extra threads — the Event Loop manages both."

        - question: |
            **Evaluate** this code for computing a student's average grade. What is the bug?
            ```javascript
            const avg = grades
                .filter(g => g.studentId == student.id)
                .map(g => g.grade)
                .reduce((sum, g) => sum + g) / grades.length;
            ```
          type: single
          options:
            - "`.reduce()` needs an initial value of `0`, and division should use the filtered array's length, not `grades.length`. Also `==` should be `===`."
            - "`.filter()` should use `.find()` instead"
            - "The `==` operator will crash because types differ"
            - "There is no bug"
          correct_index: 0
          explanation: "Three bugs: (1) `.reduce()` without an initial value throws on empty arrays. (2) Dividing by `grades.length` (all grades) instead of filtered length gives wrong averages. (3) `==` should be `===` for strict comparison (Step 2)."

        - question: "**[Spaced Practice: Revisit Step 7]** What URL pattern does `router.get('/dashboard')` match when the router is mounted with `app.use('/api', router)`?"
          type: single
          options:
            - "`/dashboard`"
            - "`/api/dashboard`"
            - "`/api`"
            - "`/router/dashboard`"
          correct_index: 1
          explanation: "Routes on a Router are relative to the mount path. `app.use('/api', router)` means `router.get('/dashboard')` handles `GET /api/dashboard`."

        - question: "**[Technique Selection — Interleaving]** A Spotify-like app needs to: (1) fetch a user's playlists, (2) for each playlist fetch its tracks, (3) display all track names. Which combination is most appropriate?"
          type: single
          options:
            - "`.filter()` to select playlists, then `await` each track fetch sequentially"
            - "`.map()` to transform playlists into fetch Promises, then `Promise.all()` to fetch concurrently, then `.flat()` to merge results"
            - "`.reduce()` to accumulate all tracks, with `await` inside the reducer"
            - "A `for` loop with `setTimeout` to space out requests"
          correct_index: 1
          explanation: "`.map()` transforms each playlist into a Promise. `Promise.all()` fires all fetches concurrently. `.flat()` merges nested arrays. This combines Step 3 (`.map()`), Step 9 (`Promise.all`), and Step 8 (Event Loop concurrency)."

        - question: "**[Spaced Practice: Revisit Step 8]** A student's async Express route handler fetches data with `await`. During the `await`, can the server handle other incoming requests?"
          type: single
          options:
            - "No — `await` blocks the entire Node.js process until the data arrives"
            - "Yes — `await` suspends only this handler and frees the call stack, allowing the Event Loop to process other requests"
            - "Only if the server has multiple CPU cores available"
            - "Only if the handler uses `Promise.all` instead of a single `await`"
          correct_index: 1
          explanation: "`await` suspends the current async function, not the entire process. The call stack is freed, so the Event Loop can execute other route handlers. This is the key insight: `async`/`await` gives you synchronous-looking code with non-blocking behavior."

        - question: "**[Spaced Practice: Revisit Step 2]** In a route parameter handler, `req.params.id` is always a string. A student writes `students.find(s => s.id == req.params.id)`. It works. Why should they change it anyway?"
          type: single
          options:
            - "There is no reason to change it — `==` is fine for id comparisons"
            - "`==` relies on type coercion (string `'3'` coerced to number `3`). Using `===` with `Number(req.params.id)` makes the intent explicit and prevents subtle bugs when IDs change format"
            - "`==` is slower than `===` and will cause performance issues at scale"
            - "`==` will throw a TypeError in strict mode"
          correct_index: 1
          explanation: "This is the same lesson from Step 2: `==` coerces silently, which *works* here but hides a fragile assumption. If IDs become UUIDs (strings), the coercion fails silently. `===` with explicit `Number()` conversion makes the code's intent clear to every reader."
