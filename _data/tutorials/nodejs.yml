    quiz:
      title: "Dynamic Routes — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "A developer has a route `app.get('/students/:id', handler)` and a student sends `GET /students/3`. Inside `handler`, they write `if (req.query.id === '3')`. What is wrong with their code and what should they write instead?"
          options:
            - "Nothing is wrong — `req.query.id` and `req.params.id` are equivalent for this URL"
            - "`req.query` holds parameters from the URL query string (`?key=value`), but `/students/3` has no query string. The `3` is a route parameter — they should use `req.params.id`"
            - "They should use `req.body.id` because POST requests are more secure"
            - "The condition should use `==` instead of `===` for route parameter comparisons"
          correct_index: 1
          explanation: "Route parameters (`:id` placeholder in the path) are captured in `req.params`. Query parameters (`?id=3` appended to the URL) live in `req.query`. Since the route is `/students/:id`, the value `3` is in `req.params.id`. `req.query.id` would be `undefined` for this URL — the condition would silently never match."

        - question: "A route is defined as `app.get('/users/:userId/posts/:postId', handler)`. What does `req.params` contain for `GET /users/42/posts/7`?"
          options:
            - "`{ userId: 42, postId: 7 }` (numbers)"
            - "`{ userId: '42', postId: '7' }` (strings)"
            - "`{ id: '42/7' }` (single concatenated string)"
            - "`{ 0: '42', 1: '7' }` (indexed array)"
          correct_index: 1
          explanation: "Route parameters are *always strings*. Express captures the URL segments and stores them by name. To use them as numbers, you must explicitly convert with `Number(req.params.userId)`. This is why using `===` with `Number()` is essential — it prevents the type coercion trap from Step 2."

        - question: "When should you use POST instead of GET?"
          options:
            - "When you want the request to run faster"
            - "When you are sending data that creates or modifies a resource, or when the data is sensitive (passwords, large payloads)"
            - "When the server is running on HTTPS instead of HTTP"
            - "POST and GET are interchangeable — the distinction is purely cosmetic"
          correct_index: 1
          explanation: "GET is for *reading* data — parameters are visible in the URL. POST is for *sending* data that creates or modifies resources — data is hidden in the request body. GET requests can also be bookmarked and cached; POST cannot. These are HTTP conventions used by every web API."

        - question: "**[Spaced Practice: Revisit Step 3]** In `app.get('/students', (req, res) => { ... })`, if a student writes `app.get('/students', handler())` with parentheses on `handler`, what goes wrong?"
          options:
            - "Nothing — both forms are equivalent in JavaScript"
            - "`handler()` calls the function immediately and passes its *return value* to `app.get()` — Express gets the result, not the function itself"
            - "Express will throw an error because route handlers cannot be named functions"
            - "The parentheses cause the route to match POST requests instead of GET"
          correct_index: 1
          explanation: "This is the same function reference vs. function call distinction from Step 3. `handler` is the function itself — Express stores it and calls it later. `handler()` calls it *now* and passes the return value. Express needs the function, not its result. This mistake causes routes to fail."

        - question: "**[Technique Selection — Interleaving]** Match each Express data source to its use case:\n- Task A: Filter a product list by category\n- Task B: Retrieve a specific user by their ID\n- Task C: Submit a new blog post with title and content"
          type: single
          options:
            - "A: `req.params`, B: `req.query`, C: `req.body`"
            - "A: `req.query`, B: `req.params`, C: `req.body`"
            - "A: `req.body`, B: `req.params`, C: `req.query`"
            - "A: `req.query`, B: `req.body`, C: `req.params`"
          correct_index: 1
          explanation: "Filtering/searching uses query parameters (`?category=electronics`). Identifying one specific resource uses route parameters (`/users/42`). Submitting new data uses the request body (POST). This discrimination — knowing *which* data source applies — is the key skill."

        - question: "**[Spaced Practice: Revisit Step 2]** `req.query.maxPrice` contains the string `'500'`. A developer writes `if (product.price < req.query.maxPrice)`. Will this comparison work correctly?"
          options:
            - "Yes — JavaScript automatically converts the string to a number for the `<` comparison"
            - "It works for most cases due to type coercion, but it is fragile. Convert explicitly with `Number(req.query.maxPrice)` to be safe and clear."
            - "No — comparing a number to a string always returns `false` in JavaScript"
            - "No — this will throw a TypeError at runtime"
          correct_index: 1
          explanation: "JavaScript's `<` operator does coerce strings to numbers for comparison, so `50 < '500'` works. But this relies on implicit coercion — the same trap from Step 2. Explicit conversion with `Number()` makes the intent clear and prevents subtle bugs when the value isn't a clean number (e.g., `'500px'` coerces to `NaN`)."

