        **`fs.promises.readFile`:** The Promise-based sibling of `fs.readFile`. Instead of a callback, it returns a Promise that resolves with the file contents. `await` suspends the async function ŌĆö freeing the Chef ŌĆö until the OS finishes reading.

        **`JSON.parse(data)`:** The file contents arrive as a string. `JSON.parse()` converts it to a JavaScript object/array.

        **`try`/`catch`:** Handles any rejection ŌĆö file not found (`ENOENT`), permission denied, malformed JSON. This is identical in structure to `try`/`except` in Python.

        **`displayStudents()` is called at the bottom:** Defining an async function does not run it. The explicit call produces the output the test checks for.

