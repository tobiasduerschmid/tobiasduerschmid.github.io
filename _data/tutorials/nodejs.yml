          explanation: "setTimeout's delay is a *minimum* delay, not a guaranteed time. The Event Loop only dequeues callbacks when the call stack is completely empty. The 10-million-iteration for-loop occupies the call stack the entire time ŌĆö the Chef is busy."

        - question: "What is the output order of this code?\n```javascript\nconsole.log('A');\nsetTimeout(() => console.log('B'), 0);\nconsole.log('C');\n```"
          options:
            - "A, B, C"
            - "B, A, C"
            - "A, C, B"
            - "C, A, B"
          correct_index: 2
          explanation: "Synchronous code always runs to completion before any callbacks fire. 'A' and 'C' are synchronous and execute in order. The setTimeout callback ('B') is queued in the Task Queue and only runs after ALL synchronous code has finished."

        - question: "Two Express route handlers are registered: (A) `app.get('/slow', ...)` runs a 3-second synchronous loop. (B) `app.get('/fast', ...)` just calls `res.send('ok')`. A user hits `/slow`, and 0.5 seconds later another user hits `/fast`. **Analyze** what happens ŌĆö when does the `/fast` user get their response?"
          options:
            - "The `/fast` user gets an instant response ŌĆö Express handles requests in separate threads"
            - "The `/fast` user waits ~2.5s ŌĆö the sync loop blocks the Call Stack"
            - "Express detects the blocked route and automatically switches to the `/fast` handler"
            - "The `/fast` user responds immediately because `/fast` was registered before `/slow`"
          correct_index: 1
          explanation: "This is the Event Loop in action. The 3-second loop holds the Call Stack. The Event Loop only processes queued callbacks (like the `/fast` handler) when the stack empties. The `/fast` user is stuck waiting ~2.5 seconds for a response that should take microseconds ŌĆö demonstrating exactly why blocking operations in route handlers are catastrophic in Node.js."
          type: single

        - question: "**[Spaced Practice: Revisit Step 5]** An Express route handler has a 5-second synchronous loop. During those 5 seconds, 100 other requests arrive. What happens to them?"
          options:
            - "Express spawns new worker threads to handle each of the 100 incoming requests in parallel"
            - "All 100 requests wait ŌĆö the call stack is occupied and no callbacks can run"
            - "Express automatically drops stale requests and returns 503 Service Unavailable errors"
            - "The other requests execute interleaved between iterations of the slow handler's loop"
          correct_index: 1
          explanation: "Node.js is single-threaded. While the slow synchronous loop runs, the Call Stack is occupied. The Event Loop cannot hand any other callbacks (including route handlers for the 100 waiting requests) to the Chef until the loop finishes. This is why blocking the event loop is catastrophic for Express servers."

        - question: "**[Technique Selection ŌĆö Interleaving]** You are building a Discord bot. For each of these tasks, which array method is the best fit?\n- Task A: Get only the messages from a specific channel\n- Task B: Convert each message object into a display string\n- Task C: Count the total character length of all messages"
          type: single
          options:
            - "A: `.map()`, B: `.filter()`, C: `.reduce()`"
            - "A: `.filter()`, B: `.map()`, C: `.reduce()`"
            - "A: `.reduce()`, B: `.filter()`, C: `.map()`"
            - "A: `.filter()`, B: `.reduce()`, C: `.map()`"
          correct_index: 1
          explanation: "`.filter()` selects elements matching a condition (messages from a channel). `.map()` transforms each element (message ŌåÆ display string). `.reduce()` accumulates a single value (total character count). This discrimination ŌĆö knowing *which* method to apply ŌĆö is the key skill that interleaving builds."

        - question: "**[Spaced Practice: Revisit Step 7]** Does `express.Router()` create a separate thread or Event Loop for handling its routes?"
          options:
            - "Yes ŌĆö each Router gets its own Event Loop, which is how Express handles concurrent requests efficiently"
            - "No ŌĆö Routers are a code organization tool. All routes still execute on the same single-threaded Event Loop"
            - "Yes ŌĆö but only when mounted with `app.use()`, which spawns a worker thread"
            - "No ŌĆö Routers bypass the Event Loop entirely and use synchronous processing"
          correct_index: 1
          explanation: "Routers are purely a code organization tool ŌĆö they group related routes into modules. Every route handler, regardless of which Router it is defined on, runs on the same single call stack and Event Loop. The Router pattern is about maintainability, not concurrency."

