title: "Node.js Essentials: JavaScript for the Backend"
description: "A hands-on introduction to Node.js for students who already know Python and C++. Learn to run JavaScript, understand the event loop, and write modern async code — all in the browser."

backend: browser

require_tests: true

steps:
  # --------------------------------------------------------------------------
  # STEP 1: "Lay of the Land" — Hello, Node.js!
  # Pedagogy: "Lay of the Land" pattern — macro overview before syntax.
  #           Transfer Tutor — explicit Python/C++ comparison table.
  #           Guide-and-Release — brief explanation then immediate practice.
  # --------------------------------------------------------------------------
  - title: "Hello, Node.js!"
    instructions: |
      ## The Lay of the Land

      You already know two languages. Here is how JavaScript (via Node.js) fits into your mental model:

      | | C++ | Python | JavaScript (Node.js) |
      |---|---|---|---|
      | Typing | Static | Dynamic | Dynamic |
      | Memory | Manual (`new`/`delete`) | GC (reference counting) | GC (V8 engine) |
      | Run with | Compile → `./app` | `python script.py` | `node script.js` |
      | I/O model | Synchronous (blocks) | Synchronous (blocks) | **Asynchronous** (non-blocking) |

      **Node.js** takes JavaScript out of the browser by wrapping two engines:
      - **V8** — Google's JIT compiler that turns JavaScript into machine code (like `g++` for C++).
      - **libuv** — A C library providing the **Event Loop** and non-blocking I/O access to the OS.

      Together, they let JavaScript write backend servers, CLI tools, and scripts — just like Python or C++.

      ### Task: Your First Node.js Script

      Open `hello.js` in the editor. Add a line to print your greeting:

      ```javascript
      // Python equivalent: print("Hello from Node.js!")
      // C++ equivalent:    printf("Hello from Node.js!\n");
      console.log("Hello from Node.js!");
      ```

      Click **▶ Run** to execute the script and see the output.

    files:
      - path: "hello.js"
        content: |
          // Your first Node.js script!
          // Task: Add a console.log() statement below to print "Hello from Node.js!"

        language: "javascript"

    open_file: "hello.js"

    tests:
      - description: "hello.js contains a console.log statement"
        command: "assert(source.includes('console.log'), 'Add a console.log() call to hello.js')"
      - description: "Output includes 'Hello from Node.js!'"
        command: "assert(output.includes('Hello from Node.js'), 'Your console.log should print \"Hello from Node.js!\"')"

    quiz:
      title: "Hello, Node.js! — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "JavaScript was originally designed to run only inside a web browser. Why can Node.js run on a server?"
          options:
            - "Node.js is a completely different language that only looks like JavaScript"
            - "Node.js embeds the V8 engine plus libuv, giving JavaScript access to the OS, filesystem, and networking outside the browser"
            - "Node.js compiles JavaScript to C++ before execution, which enables server usage"
            - "Browser vendors updated their runtimes to support server-side execution"
          correct_index: 1
          explanation: "Node.js bundles Google's V8 engine (which compiles JS to machine code) with libuv (a C library for async I/O). This gives JavaScript everything it needs to work as a backend runtime — file access, TCP sockets, and a non-blocking Event Loop."

        - question: "How do you run a Node.js script named `app.js`?"
          options:
            - "`./app.js`"
            - "`python app.js`"
            - "`node app.js`"
            - "`node --execute app.js`"
          correct_index: 2
          explanation: "`node <filename>` runs a JavaScript file, analogous to `python script.py`. Unlike C++, there is no separate compile step — V8 JIT-compiles the code at runtime."

        - question: "A student from a C++ background says: 'JavaScript is just a browser scripting language, it cannot power a real backend.' What is the flaw in this argument?"
          options:
            - "JavaScript is a compiled language and has always been able to run anywhere"
            - "Node.js gives JavaScript OS-level access via libuv, and it powers production backends at Netflix, LinkedIn, and Uber"
            - "JavaScript has better memory management than C++ for server applications"
            - "The student is correct — Node.js is only suitable for front-end tooling"
          correct_index: 1
          explanation: "Node.js broke JavaScript out of the browser sandbox by providing OS-level access. Its non-blocking event loop makes it highly efficient for I/O-heavy workloads. Netflix, LinkedIn, and Uber all use Node.js for production backend services."

  # --------------------------------------------------------------------------
  # STEP 2: Variables, Types & The === Trap
  # Pedagogy: Fixer Upper — repair buggy code using == instead of ===.
  #           Transfer Tutor — C++ static types vs JS dynamic, Python f-strings → template literals.
  #           Targets negative transfer risk: the == coercion landmine.
  # --------------------------------------------------------------------------
  - title: "Variables, Types & The `===` Trap"
    instructions: |
      ## Bridging Your Mental Models

      JavaScript's type system *looks* like Python but hides a critical landmine.

      ### `let` and `const`

      Forget C++'s `int x = 5`. Modern JavaScript uses:

      ```javascript
      let count = 0;          // Mutable — like a regular Python variable
      const MAX_SIZE = 200;   // Immutable binding — like Python's ALL_CAPS convention, but enforced
      ```

      > **Never use `var`** — it has "hoisting" scoping rules that violate everything you know from C++ and Python. Always use `let` or `const`.

      ### Template Literals (like Python's f-strings)

      ```javascript
      // Python:      f"Hello, {name}! You scored {grade}."
      // JavaScript:  `Hello, ${name}! You scored ${grade}.`
      //               ^backtick                  ^dollar-brace
      ```

      ### The `===` Trap ⚠️

      JavaScript has TWO equality operators. **Only ever use `===`:**

      ```javascript
      // WRONG: == triggers implicit type coercion — a JS-specific danger
      console.log(1 == "1");    // true  ← DANGEROUS SURPRISE
      console.log(0 == false);  // true  ← DANGEROUS SURPRISE

      // RIGHT: === checks value AND type (behaves like == in Python and C++)
      console.log(1 === "1");   // false ← correct
      console.log(0 === false); // false ← correct
      ```

      This is **negative transfer**: your existing `==` intuition from C++ and Python is correct — but JavaScript's `==` does something different. Use `===` and it matches your expectation.

      ### Destructuring: Unpacking Values

      JavaScript has a compact shorthand for extracting values from arrays and objects. This is used **constantly** in modern JS and in every React tutorial that follows.

      **Array destructuring** — assign items by position:

      ```javascript
      const coords = [40.7, -74.0];
      const [lat, lng] = coords;    // lat = 40.7, lng = -74.0

      // Python equivalent: lat, lng = coords  (tuple unpacking — same idea)

      // Swap without a temp variable:
      let a = 1, b = 2;
      [a, b] = [b, a];              // a = 2, b = 1
      ```

      **Object destructuring** — extract properties by name:

      ```javascript
      const student = { name: "Alice", grade: 95 };

      const { name, grade } = student;   // name = "Alice", grade = 95

      // Works in function parameters — you will see this in every React component:
      function printStudent({ name, grade }) {
          console.log(`${name}: ${grade}`);
      }
      printStudent(student);   // Alice: 95
      ```

      This is not new data — it is a compact way to bind existing values to named variables.

      ### Task: Fix the Fixer-Upper

      Open `types.js`. It has **three bugs**:

      1. Two `==` comparisons that produce wrong results — fix them to `===`.
      2. A `let` declaration for a value that never changes — change it to `const`.
      3. A messy string concatenation — replace it with a **template literal** using backticks.

      Click **▶ Run** to check your output. It should no longer show any `[BUG]` messages.

    files:
      - path: "types.js"
        content: |
          // FIXER-UPPER: This file has three bugs. Find and fix them all.

          // BUG 1: This == comparison gives a wrong (surprising) answer
          let userInput = "42";
          let expectedScore = 42;
          if (userInput == expectedScore) {
              console.log("[BUG] String '42' should NOT equal number 42 here!");
          } else {
              console.log("Score check: types are different, correctly rejected.");
          }

          // BUG 2: Same problem with a different pair of values
          let isAdmin = false;
          if (isAdmin == 0) {
              console.log("[BUG] false should NOT equal the number 0 here!");
          } else {
              console.log("Admin check: false and 0 are different types, correctly rejected.");
          }

          // BUG 3: This should be a constant (it never changes)
          let MAX_STUDENTS = 200;

          // TASK: Replace this concatenation with a template literal
          // Expected output format: "Student Alex scored 95 out of 200"
          let studentName = "Alex";
          let studentGrade = 95;
          let message = "Student " + studentName + " scored " + studentGrade + " out of " + MAX_STUDENTS;
          console.log(message);
        language: "javascript"

    open_file: "types.js"

    tests:
      - description: "Fixed both == comparisons to === (no [BUG] messages in output)"
        command: "assert(!output.includes('[BUG]'), 'Fix both == comparisons to === — the [BUG] messages should disappear')"
      - description: "MAX_STUDENTS is now declared with const"
        command: "assert(source.includes('const MAX_STUDENTS'), 'Change \"let MAX_STUDENTS\" to \"const MAX_STUDENTS\"')"
      - description: "Used a template literal (backtick with ${}) for the message"
        command: "assert(source.includes('${'), 'Replace the + concatenation with a template literal using backticks and ${}')"
      - description: "Code runs without errors"
        command: "assert(!output.toLowerCase().includes('error'), 'The code should run without any errors')"

    quiz:
      title: "Variables, Types & The === Trap — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "Why does `1 == '1'` evaluate to `true` in JavaScript, when the same comparison in Python or C++ would be `false`?"
          options:
            - "JavaScript automatically converts (coerces) the string '1' to the number 1 before comparing with =="
            - "The string '1' and number 1 are actually the same type in JavaScript"
            - "This is a known bug in older JavaScript engines that has since been fixed"
            - "== in JavaScript compares memory addresses, which happen to be equal here"
          correct_index: 0
          explanation: "JavaScript's == performs *implicit type coercion* — it converts values to a common type before comparing. This creates traps: `0 == false`, `'' == false`, `null == undefined`. The === operator skips coercion and requires both value AND type to match, behaving exactly like == in Python and C++. Always use ===."

        - question: "A student writes `let MAX_RETRY = 3` but never reassigns it in 200 lines of code. Why is `const MAX_RETRY = 3` a better choice?"
          options:
            - "const variables execute faster than let variables at runtime"
            - "const prevents accidental reassignment and signals to readers that this value is intentionally fixed throughout the program"
            - "let variables are automatically garbage collected, while const variables persist in memory"
            - "There is no practical difference — const and let behave identically"
          correct_index: 1
          explanation: "`const` prevents accidental reassignment and communicates intent. It is the JavaScript equivalent of C++'s `const` keyword. Unlike C++ const, JavaScript's `const` for objects and arrays prevents rebinding the variable, but does not make the contents immutable."

        - question: "What is the JavaScript equivalent of Python's f-string `f\"Welcome, {name}! Score: {score}\"`?"
          options:
            - "`'Welcome, ${name}! Score: ${score}'`"
            - "`\"Welcome, \" + name + \"! Score: \" + score`"
            - "`` `Welcome, ${name}! Score: ${score}` ``"
            - "`\"Welcome, %s! Score: %d\" % (name, score)`"
          correct_index: 2
          explanation: "Template literals use backticks (`` ` ``) and `${expression}` for interpolation — a direct equivalent of Python's f-strings. Single or double quotes create plain strings with no interpolation. Note: `'Welcome, ${name}!'` in single quotes prints the literal text `${name}`, not the variable's value."

        - question: "Which behaviors of `var` violate the scoping rules you learned in C++ and Python? (Select all that apply)"
          type: multiple
          options:
            - "`var` declarations are hoisted to the top of their function, so they can be referenced before the line where they are declared"
            - "`var` ignores block scope (`if`, `for`, `while` blocks) and leaks into the enclosing function"
            - "`var` cannot hold string values — only numbers and booleans"
            - "`var` allows re-declaring the same variable name multiple times without any error"
          correct_indices:
            - 0
            - 1
            - 3
          explanation: "All three of these behaviors break the mental model from C++ and Python. C++ block scope (`{}`) strictly contains variables. Python raises a NameError if you use a variable before assignment. `var` violates both. `let` and `const` behave like C++/Python block-scoped variables — use them exclusively."

        - question: "What does `const { name, grade } = student` do if `student = { name: 'Alice', grade: 95 }`?"
          options:
            - "Creates a new object with only the `name` and `grade` properties"
            - "Declares two new variables, `name = 'Alice'` and `grade = 95`, extracting them from the object"
            - "Modifies `student` so it only has `name` and `grade` properties"
            - "Throws an error — you cannot destructure an object into two variables at once"
          correct_index: 1
          explanation: "Object destructuring extracts named properties into local variables in one step. `const { name, grade } = student` is equivalent to writing `const name = student.name; const grade = student.grade;`. The original object is unchanged. This pattern is used in every React component that receives props."

        - question: "Given `const [first, second] = ['Alice', 'Bob', 'Carol']`, what is `first` and what is `second`?"
          options:
            - "`first = 'Alice'`, `second = 'Carol'`"
            - "`first = 0`, `second = 1`"
            - "`first = 'Alice'`, `second = 'Bob'`"
            - "An error — array destructuring requires the lengths to match exactly"
          correct_index: 2
          explanation: "Array destructuring assigns by **position**. `first` gets index 0 (`'Alice'`), `second` gets index 1 (`'Bob'`). Extra array elements (`'Carol'`) are simply ignored. No error is thrown for length mismatches."

  # --------------------------------------------------------------------------
  # STEP 3: Functions as First-Class Values
  # Pedagogy: Transfer Tutor — C++ function pointers / Python callbacks → JS first-class functions.
  #           Fixer Upper — convert regular functions to arrow functions, add callbacks.
  #           Builds the mental model required to understand async in steps 4 and 5.
  # --------------------------------------------------------------------------
  - title: "Functions as First-Class Values"
    instructions: |
      ## The Foundation of Async Programming

      In C++, you've encountered function pointers. In Python, you've passed functions to `sorted(key=...)` or `map()`. JavaScript takes this further: **functions are just values**, exactly like numbers or strings.

      This is not merely a stylistic feature — it is the entire foundation of Node.js's asynchronous model. Understanding it now makes everything in the next two steps obvious.

      ### Arrow Functions

      ```javascript
      // C++ equivalent: int add(int a, int b) { return a + b; }
      // Python equivalent: def add(a, b): return a + b

      // JavaScript (regular function):
      function add(a, b) { return a + b; }

      // JavaScript (arrow function — the modern preferred style):
      const add = (a, b) => a + b;

      // More examples:
      const greet  = (name) => `Hello, ${name}!`;
      const double = n => n * 2;   // Parentheses optional for a single parameter
      const hi     = () => "Hi!";  // Empty parentheses for no parameters
      ```

      ### Callbacks: Passing Functions as Arguments

      ```javascript
      // Python equivalent: list(map(lambda x: x * 2, [1, 2, 3]))
      const numbers = [1, 2, 3, 4, 5];

      const doubled = numbers.map(n => n * 2);          // [2, 4, 6, 8, 10]
      const evens   = numbers.filter(n => n % 2 === 0); // [2, 4]
      const sum     = numbers.reduce((acc, n) => acc + n, 0); // 15
      ```

      You are passing a function **as an argument**. That function is a **callback** — `map` calls it back for each element.

      ### Callbacks in the Browser: Event Handlers

      The same callback pattern drives all user interaction in the browser. When a user clicks a button, the browser calls your function:

      ```javascript
      // Vanilla JS — attaching a click handler:
      button.addEventListener('click', () => {
          console.log('Button clicked!');
      });

      // The arrow function IS the callback — the browser calls it when the event fires.
      ```

      In the React tutorial that follows this one, you will write `onClick={handler}` directly on elements. React is wiring up `addEventListener` for you behind the scenes. The mental model — *pass a function, get called back later* — is identical to what you just learned with `.map()` and `.filter()`.

      ### Task: Build a Grade Processor

      Open `functions.js`. Complete the three `TODO` items:

      1. **Convert** `getLetterGrade` to an **arrow function** assigned to a `const`.
      2. **Use** `.filter()` with an arrow function to keep only passing students (grade ≥ 60).
      3. **Use** `.map()` with an arrow function to format each passing student as `"Name: grade (Letter)"` (e.g. `"Alice: 95 (A)"`).

      Click **▶ Run** to check your result.

    files:
      - path: "functions.js"
        content: |
          // Grade processor — complete the three TODOs below

          const students = [
              { name: "Alice", grade: 95 },
              { name: "Bob",   grade: 42 },
              { name: "Carol", grade: 78 },
              { name: "Dave",  grade: 55 },
              { name: "Eve",   grade: 88 },
          ];

          // TODO 1: Convert this to an arrow function assigned to a const
          function getLetterGrade(score) {
              if (score >= 90) return "A";
              if (score >= 80) return "B";
              if (score >= 70) return "C";
              if (score >= 60) return "D";
              return "F";
          }

          // TODO 2: Use .filter() with an arrow function to keep only passing students (grade >= 60)
          // Replace the line below — Bob (42) and Dave (55) should be excluded
          const passingStudents = students;

          // TODO 3: Use .map() with an arrow function to format each entry
          // Expected format per line: "Alice: 95 (A)"
          const report = passingStudents;

          console.log("=== Grade Report (Passing Students Only) ===");
          report.forEach(line => console.log(line));
        language: "javascript"

    open_file: "functions.js"

    tests:
      - description: "Used an arrow function (=>) somewhere in the solution"
        command: "assert(source.includes('=>'), 'Convert getLetterGrade to an arrow function using =>')"
      - description: "Used .filter() to select students"
        command: "assert(source.includes('.filter('), 'Use .filter() with an arrow function to select passing students')"
      - description: "Used .map() to transform the data"
        command: "assert(source.includes('.map('), 'Use .map() with an arrow function to format each student')"
      - description: "Output excludes Bob (grade 42) — he should fail the filter"
        command: "assert(!output.includes('Bob'), 'Bob (grade 42) should be filtered out — only students with grade >= 60 should appear')"

    quiz:
      title: "First-Class Functions — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "What does it mean that functions are 'first-class values' in JavaScript?"
          options:
            - "Functions execute faster than other values at runtime"
            - "Functions can be stored in variables, passed as arguments to other functions, and returned from functions"
            - "Functions must always be declared before any other values in a file"
            - "Functions have a special protected memory region that prevents garbage collection"
          correct_index: 1
          explanation: "A first-class value is one that can be used anywhere any other value can: stored in a variable, passed as an argument, returned from a function, placed in an array. This is why `numbers.map(n => n * 2)` works — you pass a function just like you'd pass a number. This is the key to callbacks and async programming."

        - question: "In Python, `sorted(items, key=lambda x: x['grade'])` sorts by grade. Which JavaScript expression is the direct equivalent?"
          options:
            - "`items.sort(key = x => x.grade)`"
            - "`items.sort((a, b) => a.grade - b.grade)`"
            - "`items.sort(function key(x) { return x.grade; })`"
            - "`items.sort(by='grade')`"
          correct_index: 1
          explanation: "JavaScript's `sort` takes a **comparator** function `(a, b) => ...` that returns negative (a before b), zero (equal), or positive (b before a). The Python `key=` and JS comparator are both callbacks — functions passed to another function. This is the Transfer Tutor connection between the two languages."

        - question: "Why is understanding callbacks essential *before* learning Node.js async programming?"
          options:
            - "Callbacks are only relevant for Node.js version 10 and earlier — newer versions don't use them"
            - "All of Node.js's async operations notify you they finished by calling a function you provided — without understanding callbacks, async code is incomprehensible"
            - "JavaScript cannot use any other pattern for async programming besides callbacks"
            - "Callbacks are required by the operating system's file system API directly"
          correct_index: 1
          explanation: "The entire Node.js async model is built on callbacks: 'start this operation, and when it finishes, call *this* function.' When you call `fs.readFile('data.txt', myCallback)`, you pass a function that Node.js will invoke once the file is ready. Callbacks are not just a style preference — they are how the Event Loop communicates results back to your code."

  # --------------------------------------------------------------------------
  # STEP 4: The Blocked Chef — The Event Loop
  # Pedagogy: "Restaurant and the Event Loop" metaphor from cognitive science research.
  #           Pain point first: demonstrate blocking, let students feel the freeze.
  #           Conceptual voting — predict output BEFORE running (peer instruction).
  #           Toy Box: safe isolated environment to experiment.
  # --------------------------------------------------------------------------
  - title: "The Blocked Chef — The Event Loop"
    instructions: |
      ## The Most Important Concept in Node.js

      This is the paradigm shift that trips up every C++ and Python developer. Read carefully.

      **JavaScript is single-threaded.** There is only one "chef" in the kitchen.

      ### The Restaurant Metaphor

      | Kitchen Role | Node.js Equivalent | What It Does |
      |---|---|---|
      | **The Chef** | Call Stack | Executes one task at a time. If busy, everything else waits. |
      | **The Appliances** (oven, fryer) | libuv / OS | Handle slow work (file reads, network) in the background. Chef starts them and moves on. |
      | **The Waiter** | Task Queue | When an appliance finishes, the waiter puts the callback on a staging table to wait. |
      | **The Kitchen Manager** | Event Loop | Watches the Chef. Only when the Chef's hands are **completely empty** does the Manager hand over the next callback. |

      ```
      Key insight: setTimeout(fn, 0) does NOT mean "run immediately."
                   It means "run when the call stack is empty."
      ```

      ### Predict Before You Run

      Look at `event_loop.js` in the editor. **Before running it**, predict the output order of A, B, and C:

      ```javascript
      setTimeout(() => console.log("B: setTimeout callback"), 0);
      console.log("A: synchronous line 1");
      console.log("C: synchronous line 2");
      ```

      Most C++/Python developers predict A → B → C. The actual output is **A → C → B**.

      The synchronous code runs to completion before ANY callback fires — even with `0` ms delay. The Chef finishes all current tasks before the Manager hands over the next callback.

      ### Task: Experience the Blocked Chef

      Open `event_loop.js`. It shows a long-running synchronous loop "blocking the chef."

      1. Click **▶ Run** and observe: the `setTimeout` fires LAST, even though it was scheduled FIRST.
      2. **Your task**: At the END of the file, add a **second** `setTimeout` call with `0` ms delay that logs `"Event loop is free again!"`.

      Click **▶ Run** again. Observe the order: both `setTimeout` callbacks fire only after ALL synchronous code has finished.

    files:
      - path: "event_loop.js"
        content: |
          // The Blocked Chef Demo
          // PREDICT the output order BEFORE you run this file!
          //
          // Mental model check: does setTimeout(fn, 0) run "immediately"?

          // Schedule a callback — should run "right away" with 0ms delay, right?
          setTimeout(() => {
              console.log("[3] setTimeout fired — the chef is finally free!");
          }, 0);

          // Synchronous code: this runs first, blocking everything else
          console.log("[1] Starting synchronous work...");

          // Simulates a slow synchronous operation (like processing a large dataset)
          // The chef is stuck here — no callbacks can fire while this loop runs
          let total = 0;
          for (let i = 0; i < 5000000; i++) {
              total += i;
          }
          console.log("[2] Synchronous work done. total = " + total);

          // TODO: Add a second setTimeout here that logs "Event loop is free again!"
          // with a 0ms delay.
          // Question to ponder: will it print before or after [3]?

        language: "javascript"

    open_file: "event_loop.js"

    tests:
      - description: "Added a second setTimeout call"
        command: "assert((source.match(/setTimeout/g)||[]).length >= 2, 'Add a second setTimeout call at the end of the file')"
      - description: "Second setTimeout logs 'Event loop is free again!'"
        command: "assert(output.includes('free again'), 'The second setTimeout should log \"Event loop is free again!\"')"
      - description: "Synchronous log [1] appears before setTimeout callback [3]"
        command: "assert(output.indexOf('[1]') < output.indexOf('[3]'), 'The synchronous log [1] should appear before the setTimeout callback [3]')"

    quiz:
      title: "The Event Loop — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "A developer writes `setTimeout(sendEmail, 0)` and expects `sendEmail` to fire instantly. Immediately after, a `for` loop runs 10 million iterations. What actually happens?"
          options:
            - "sendEmail runs immediately because the delay is 0 milliseconds"
            - "sendEmail runs in a separate thread while the for-loop continues in parallel"
            - "sendEmail waits in the Task Queue until the for-loop finishes and the call stack empties, then runs"
            - "The for-loop is paused so sendEmail can execute first"
          correct_index: 2
          explanation: "setTimeout's delay is a *minimum* delay, not a guaranteed time. The Event Loop only dequeues callbacks when the call stack is completely empty. The 10-million-iteration for-loop occupies the call stack the entire time — the Chef is busy. Only after the loop completes does the Kitchen Manager hand the email callback to the Chef."

        - question: "What is the output order of this code?\n```javascript\nconsole.log('A');\nsetTimeout(() => console.log('B'), 0);\nconsole.log('C');\n```"
          options:
            - "A, B, C"
            - "B, A, C"
            - "A, C, B"
            - "C, A, B"
          correct_index: 2
          explanation: "Synchronous code always runs to completion before any callbacks fire. 'A' and 'C' are synchronous and execute in order. The setTimeout callback ('B') is queued in the Task Queue and only runs after ALL synchronous code — including 'C' — has finished. Even with 0ms delay."

        - question: "In the Restaurant metaphor, what is the singular job of the 'Kitchen Manager' (Event Loop)?"
          options:
            - "Cook multiple dishes simultaneously using multiple chefs"
            - "Monitor the Chef and, only when the Chef's hands are empty, hand the next queued callback to the Chef"
            - "Cancel tasks that have been waiting in the queue too long"
            - "Decide which variables (ingredients) the Chef is allowed to access"
          correct_index: 1
          explanation: "The Event Loop has exactly one job: check if the Call Stack is empty, and if so, dequeue the next callback from the Task Queue and push it onto the stack. It never interrupts mid-execution — run-to-completion is guaranteed in JavaScript. This is why a blocked call stack prevents ALL other work."

        - question: "Why is it harmful to run a slow synchronous computation on Node.js's main thread?"
          options:
            - "It causes a syntax error that crashes the Node.js process"
            - "It occupies the call stack the entire time, preventing ALL other requests, timers, and I/O callbacks from being processed — the application appears frozen"
            - "Synchronous operations are not allowed in Node.js by design"
            - "It uses more RAM than an equivalent asynchronous query"
          correct_index: 1
          explanation: "Node.js handles thousands of concurrent connections using a SINGLE thread. If that thread is occupied with a slow synchronous operation, no other request can be processed until it finishes. Under load, this is catastrophic. This is why Node.js best practices mandate non-blocking I/O."

        - question: "**[Interleaved: Revisit Step 3]** Why does Node.js use callbacks (functions passed as arguments) for async I/O — rather than making file reads and network requests synchronous?"
