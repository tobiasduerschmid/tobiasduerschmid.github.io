            - "A: `req.params`, B: `req.query`, C: `req.body`"
            - "A: `req.query`, B: `req.params`, C: `req.body`"
            - "A: `req.body`, B: `req.params`, C: `req.query`"
            - "A: `req.query`, B: `req.body`, C: `req.params`"
