    quiz:
      title: "Array Transformation & Destructuring ŌĆö Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "What does `const { name, grade } = student` do if `student = { name: 'Alice', grade: 95 }`?"
          options:
            - "Creates a shallow copy of the `student` object containing only the `name` and `grade` properties"
            - "Declares two variables: `name = 'Alice'` and `grade = 95`, extracted from the object"
            - "Modifies the original `student` object so it only retains the `name` and `grade` properties"
            - "Throws a TypeError ŌĆö objects in JavaScript cannot be destructured into separate variables"
          correct_index: 1
          explanation: "Object destructuring extracts named properties into local variables in one step. `const { name, grade } = student` is equivalent to writing `const name = student.name; const grade = student.grade;`. The original object is unchanged."

        - question: "What does `[10, 20, 30].reduce((acc, n) => acc + n, 0)` evaluate to?"
          options:
            - "An array: `[10, 20, 30]`"
            - "The number `60`"
            - "The number `30` (only the last element)"
            - "An error ŌĆö `.reduce()` requires at least 4 elements"
          correct_index: 1
          explanation: "`.reduce()` accumulates a single value. Starting with `acc = 0` (the second argument), it processes each element: `0 + 10 = 10`, `10 + 20 = 30`, `30 + 30 = 60`. The initial value `0` is critical ŌĆö without it, `.reduce()` uses the first element as the initial accumulator and throws on empty arrays."

        - question: "What is the key difference between `.map()` and `.filter()`?"
          options:
            - "`.map()` transforms every element (same-length result); `.filter()` selects elements (shorter or equal result)"
            - "`.map()` modifies the original array in place; `.filter()` creates a new copy of the entire array"
            - "`.map()` only works with objects and arrays; `.filter()` only works with numbers and strings"
            - "There is no meaningful difference ŌĆö they are interchangeable aliases for the same operation"
          correct_index: 0
          explanation: "`.map()` applies a transformation to every element: `[1,2,3].map(n => n*2)` ŌåÆ `[2,4,6]` (same length). `.filter()` tests each element and keeps only those that pass: `[1,2,3].filter(n => n>1)` ŌåÆ `[2,3]` (shorter). Neither mutates the original array."

        - question: |
            **Arrange** the lines to compute the average grade from an array of student objects using destructuring, `.map()`, and `.reduce()`.
          type: parsons
          lines:
            - "const students = [{ name: 'A', grade: 80 }, { name: 'B', grade: 90 }];"
            - "const grades = students.map(({ grade }) => grade);"
            - "const sum = grades.reduce((acc, g) => acc + g, 0);"
            - "const avg = sum / grades.length;"
            - "console.log(avg.toFixed(1));"
          distractors:
            - "const grades = students.filter(({ grade }) => grade);"
            - "const sum = grades.reduce((acc, g) => acc + g);"
          explanation: "`.map()` with destructuring extracts just the grades. `.reduce()` sums them ŌĆö the `0` initial value is critical because without it, `.reduce()` uses the first element as the initial accumulator (which happens to work for non-empty arrays but throws a TypeError on empty arrays ŌĆö a silent bug waiting to happen). `.filter()` selects elements, not transforms ŌĆö wrong method for extracting grades."

        - question: "**[Spaced Practice: Revisit Step 3]** A student writes `const result = students.filter(s => s.grade >= 60).map(s => s.name)`. What does this expression produce?"
          options:
            - "An array of the full student objects whose grade is at least 60"
            - "An array of name strings for students with grade >= 60"
            - "A single comma-separated string of all passing student names"
            - "An error ŌĆö `.filter()` and `.map()` cannot be chained together on the same expression"
          correct_index: 1
          explanation: "`.filter()` returns a new array of student objects matching the condition. `.map()` then transforms each object into just its `name` string. Method chaining works because each method returns a new array. This chain combines skills from Step 3 (`.filter()`) and Step 4 (`.map()`)."

        - question: "**[Spaced Practice: Revisit Step 2]** A function receives a user ID from a form field. The code uses `if (userId == 42)` to check for the admin. The ID arrives as the string `'42'`. Will this check correctly identify the admin? Should you keep it as-is?"
          options:
            - "Yes, it works and is safe to keep ŌĆö the comparison is correct and there is no risk"
            - "Yes, it works via coercion, but use `===` with `Number()` to make the intent explicit"
            - "No, `==` will return `false` here because strings and numbers are never equal in JavaScript"
            - "No, the code will throw a TypeError at runtime"
          correct_index: 1
          explanation: "JavaScript's `==` coerces `'42'` to `42`, so the check works ŌĆö but it is fragile. If the ID format changes (e.g., UUID strings), the coercion silently breaks. Using `===` with explicit conversion (`Number(userId) === 42`) makes the intent clear and safe."

  # --------------------------------------------------------------------------
  # STEP 5: Your First Express Route
  # Pedagogy: HEAVY SCAFFOLDING ŌĆö full worked example provided.
  #           Student makes ONE small change to a working server.
  #           Connects callbacks from Step 3 to real-world Express usage.
  #           This is the "full worked example" phase of scaffolding.
  # --------------------------------------------------------------------------
  - title: "Your First Express Route"
    http_client: true
    http_url: "http://localhost:3000/"
    instructions: |
      ## From Callbacks to Web Servers

      > **Learning objective:** After this step you will be able to **explain** how Express uses callbacks to handle HTTP requests and **create** a basic Express GET route.

      You have been building callback skills for two steps. Now you will see why: **an Express route handler is a callback**. The entire Express framework is built on the pattern you already know.

      ### What is Express?

      Express is a web framework for Node.js. While Node.js has a built-in `http` module, almost every real project uses Express because it makes routing easy.

      ```
      Express lets you say:
        "When someone visits THIS URL, call THIS function."
      ```

      That is literally it. Express routing = URL ŌåÆ callback.

      ### The Anatomy of an Express App

      ```javascript
      // Step 1: Import the Express module
      const express = require('express');

      // Step 2: Create an Express application
      const app = express();

      // Step 3: Define a route ŌĆö THIS IS A CALLBACK!
      //         (req, res) => { ... } is the same arrow function pattern from Step 3
      app.get('/', (req, res) => {
          res.send('Hello from Express!');
      });

      // Step 4: Start the server ŌĆö listen for requests on port 3000
      app.listen(3000);
      ```

      **Look at Step 3 carefully.** The second argument to `app.get()` is an arrow function ŌĆö a *callback*. Express calls this function whenever someone visits the `'/'` URL. This is exactly how `.filter()` calls your function for each array element.

      | Concept | Array Method | Express Route |
      |---|---|---|
      | You provide | A callback function | A callback function |
      | It gets called when | `.filter()` processes each element | A user visits the URL |
      | Arguments passed to you | The current array element | `req` (request info) and `res` (response tools) |

      ### The `req` and `res` Objects

      - **`req`** (request): Contains information about the incoming HTTP request ŌĆö the URL, headers, query parameters, body data, etc.
      - **`res`** (response): Contains methods to send a response back ŌĆö `res.send()` sends text, `res.json()` sends JSON.

      ### Predict Before You Run

      Look at `server.js` and predict ŌĆö **before clicking Run**:

      1. After you click Run and start the server, what text will appear in the terminal?
      2. After you click the HTTP Client's Send button for `GET /`, what text will appear in the response body?

      Write your predictions down, then run the code and compare. Getting it right matters less than doing the prediction.

      > If your server starts but the HTTP client says "Cannot GET /" or shows an error ŌĆö that is completely normal. Read the error message. It tells you exactly what is wrong. Debugging a server that does not respond yet is how every Express developer learns.

      ### Task: Modify a Working Express Server

      The file `server.js` contains a **complete, working** Express server. Almost everything is done for you.

      **Your only task:** Change the response message from `"Replace me!"` to `"Hello from Express!"` and click **Ō¢Č Run**.

      Then use the HTTP Client below to send a GET request to `http://localhost:3000/` and see your response appear.

      > This step has maximum scaffolding on purpose ŌĆö you are seeing the full pattern for the first time. In the next steps, you will write more and more of it yourself.

    files:
      - path: "server.js"
        content: |
          // Your first Express server ŌĆö almost everything is provided!
          const express = require('express');
          const app = express();

          // This route handles GET requests to "/"
          // The arrow function is a CALLBACK ŌĆö the same pattern from Step 3
          app.get('/', (req, res) => {
              // TODO: Change "Replace me!" to "Hello from Express!"
              res.send("Replace me!");
          });

          app.listen(3000, () => {
              console.log("Express server listening on port 3000");
          });
        language: "javascript"

    open_file: "server.js"

