          explanation: "Filtering/searching uses query parameters (`?category=electronics`). Identifying one specific resource uses route parameters (`/users/42`). Submitting new data uses the request body (POST). This discrimination ŌĆö knowing *which* data source applies ŌĆö is the key skill."

        - question: "**[Spaced Practice: Revisit Step 2]** A Twitch-like streaming API has `req.query.maxViewers` as the string `'500'`. A developer writes `if (stream.viewers < req.query.maxViewers)`. Will this comparison work correctly?"
          options:
            - "Yes ŌĆö JavaScript automatically converts the string to a number for the `<` comparison"
            - "It works for most cases due to type coercion, but it is fragile. Convert explicitly with `Number(req.query.maxViewers)` to be safe and clear."
            - "No ŌĆö comparing a number to a string always returns `false` in JavaScript"
            - "No ŌĆö this will throw a TypeError at runtime"
