title: "Node.js Essentials: JavaScript for the Backend"
description: "A hands-on introduction to Node.js for students who already know Python and C++. Learn to run JavaScript, understand the event loop, and write modern async code ŌĆö all in the browser."

backend: browser

require_tests: true
autosave_type: none

steps:
  # --------------------------------------------------------------------------
  # STEP 1: "Lay of the Land" ŌĆö Hello, Node.js!
  # Pedagogy: "Lay of the Land" pattern ŌĆö macro overview before syntax.
  #           Transfer Tutor ŌĆö explicit Python/C++ comparison table.
  #           Guide-and-Release ŌĆö brief explanation then immediate practice.
  # --------------------------------------------------------------------------
  - title: "Hello, Node.js!"
    instructions: |
      ## The Lay of the Land

      > **Learning objective:** After this step you will be able to **explain** how Node.js uses V8 and libuv to run JavaScript outside the browser and **write** a basic Node.js script.

      You already know two languages. JavaScript powers the apps you use every day ŌĆö Discord, Spotify, Netflix, TikTok's web player, and even parts of VS Code. Here is how it fits into your mental model:

      | | C++ | Python | JavaScript (Node.js) |
      |---|---|---|---|
      | Typing | Static | Dynamic | Dynamic |
      | Memory | Manual (`new`/`delete`) | GC (reference counting) | GC (V8 engine) |
      | Run with | Compile ŌåÆ `./app` | `python script.py` | `node script.js` |
      | I/O model | Synchronous (blocks) | Synchronous (blocks) | **Asynchronous** (non-blocking) |

      **Node.js** takes JavaScript out of the browser by wrapping two engines:
      - **V8** ŌĆö Google's just-in-time (JIT) compiler that turns JavaScript into machine code (like `g++` for C++) right before you execute it.
      - **libuv** ŌĆö A C library providing the **Event Loop** and non-blocking I/O access to the OS.
      
      Together, they let JavaScript write backend servers, CLI tools, and scripts ŌĆö just like Python or C++.
      Node.js powers the backend of apps you probably used today: Netflix, Discord, Spotify, Twitch, and many more.


      ### Predict Before You Code

      Look at `hello.js` ŌĆö this is our soon-to-be hello world program.
      In C++ your hello world would be `printf("Hello from C++!\n");`
      In Python it would be `print("Hello from Python!")`.
      What might it be for JavaScript running in Node.js? Maybe a mix of both?
      Not at all. JavaScript has its own syntax for printing to the console.

      ### Task: Your First Node.js Script

      Open `hello.js` in the editor. Add a line to print your greeting:

      ```javascript
      console.log("Hello from Node.js!");
      ```

      Click **Ō¢Č Run** to execute the script and see the output. This executes `node hello.js` in background.
      In this tutorial you focus just on writing Node.js. We run these commands for you.

      > **Semicolons:** Unlike Python, JavaScript statements conventionally end with `;` (like C++). JavaScript can usually auto-insert them, but always using semicolons avoids subtle bugs and matches the style you will see in professional codebases.

    files:
      - path: "hello.js"
        content: |
          // Your first Node.js script!
          // Task: Add a console.log() statement below to print "Hello from Node.js!"

        language: "javascript"

    open_file: "hello.js"

    solution:
      files:
        - path: "hello.js"
          content: |
            // Your first Node.js script!
            // Task: Add a console.log() statement below to print "Hello from Node.js!"
            console.log("Hello from Node.js!");
          language: "javascript"
      explanation: |
        **`console.log()`:** The Node.js equivalent of Python's `print()` and C++'s `printf()`. It writes to stdout with a trailing newline.

        The test checks two things: (1) the source contains `console.log`, and (2) the output includes `"Hello from Node.js"`. Both are satisfied by this one line.

        Node.js scripts run top-to-bottom like Python scripts ŌĆö no `main()` function, no compilation step. V8 JIT-compiles the JavaScript at runtime.

    tests:
      - description: "hello.js contains a console.log statement"
        command: "assert(code.includes('console.log('), 'Add a console.log() call to hello.js')"
        hints:
          - text: "JavaScript's built-in function for printing is NOT `print()` like Python or `printf()` like C++. Look at the code comment in the instructions ŌĆö what object and method does JavaScript use to write to stdout?"
            condition: "code_missing: console.log("
          - text: "Good ŌĆö you have the right function. Make sure your file isn't empty and the syntax is complete (parentheses, quotes, semicolon)."
            condition: "code_contains: console.log("
      - description: "Output includes 'Hello from Node.js!'"
        command: "assert(output.includes('Hello from Node.js'), 'Your console.log should print \"Hello from Node.js!\"')"
        hints:
          - text: "Your code runs but the output doesn't match. The test checks for an exact string ŌĆö compare your message character-by-character with the expected output in the instructions."
            condition: "code_contains: console.log("

    quiz:
      title: "Hello, Node.js! ŌĆö Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "JavaScript was originally designed to run only inside a web browser. Why can Node.js run on a server?"
          options:
            - "Node.js is a completely different language with new syntax designed specifically for server-side functionality."
            - "Node.js embeds V8 and libuv, giving JavaScript access to the OS and networking outside the browser."
            - "Node.js compiles JavaScript to C++ before execution, which enables server usage just like any other compiled program would."
            - "Browser vendors updated their JavaScript runtimes to natively support server-side execution and filesystem access."
          correct_index: 1
          explanation: "Node.js bundles Google's V8 engine (which compiles JS to machine code) with libuv (a C library for async I/O). This gives JavaScript everything it needs to work as a backend runtime ŌĆö file access, TCP sockets, and a non-blocking Event Loop."

        - question: "How do you run a Node.js script named `app.js`?"
          options:
            - "`./app.js`"
            - "`python app.js`"
            - "`node app.js`"
            - "`node --execute app.js`"
          correct_index: 2
          explanation: "`node <filename>` runs a JavaScript file, analogous to `python script.py`. Unlike C++, there is no separate compile step ŌĆö V8 JIT-compiles the code at runtime."

        - question: "A student from a C++ background says: 'JavaScript is just a browser scripting language, it cannot power a real backend.' What is the flaw in this argument?"
          options:
            - "JavaScript is a compiled language and has always been able to run anywhere"
            - "Node.js gives JavaScript OS-level access via libuv."
            - "JavaScript has better memory management than C++ for server applications"
            - "The student is correct ŌĆö Node.js is only suitable for front-end tooling"
          correct_index: 1
          explanation: "Node.js broke JavaScript out of the browser sandbox by providing OS-level access. Its non-blocking event loop makes it highly efficient for I/O-heavy workloads. Netflix, LinkedIn, and Uber all use Node.js for production backend services."

  # --------------------------------------------------------------------------
  # STEP 2: Variables, Types & The === Trap
  # Pedagogy: Fixer Upper ŌĆö repair buggy code using == instead of ===.
  #           Transfer Tutor ŌĆö C++ static types vs JS dynamic, Python f-strings ŌåÆ template literals.
  #           Targets negative transfer risk: the == coercion landmine.
  # --------------------------------------------------------------------------
  - title: "Variables, Types & The === Trap"
    instructions: |
      ## Bridging Your Mental Models

      > **Learning objective:** After this step you will be able to **declare** variables with `let`/`const`, **use** template literals, and **explain** why `===` should be preferred over `==`.

      JavaScript's type system *looks* like Python but hides a critical landmine.

      ### `let` and `const`

      Forget C++'s `int x = 5`. Modern JavaScript uses:

      ```javascript
      let count = 0;          // Mutable ŌĆö like a regular Python variable
      const MAX_SIZE = 200;   // Immutable binding ŌĆö like Python's ALL_CAPS convention, but enforced
      ```
      Mutable variables can be assigned different values afterwards. 
      This is useful when the value is expected to change, e.g. a counter.
      However, it also masks bugs that result from incorrect assignments.
      Use immutable bindings (`const` in JS, `final` in Java, `const` in C++) when declaring constants that are not expected to change.

      > **Avoid using `var`** ŌĆö it has "hoisting" scoping rules that violate everything you know from C++ and Python. Always use `let` or `const`.

      ### Template Literals (like Python's f-strings)

      ```javascript
      // Python:      f"Hello, {name}! You scored {grade}."
      // JavaScript:  `Hello, ${name}! You scored ${grade}.`
      //               ^backtick                  ^dollar-brace
      ```

      ### The `===` Trap ŌÜĀ’ĖÅ

      JavaScript has TWO equality operators with different semantics. To avoid surprises, **always use `===`:**

      ```javascript
      // SURPRISE: == triggers implicit type coercion ŌĆö a JS-specific danger
      console.log(1 == "1");    // true  ŌåÉ DANGEROUS SURPRISE
      console.log(0 == false);  // true  ŌåÉ DANGEROUS SURPRISE

      // AS EXPECTED: === checks value AND type (behaves like == in Python and C++)
      console.log(1 === "1");   // false ŌåÉ correct
      console.log(0 === false); // false ŌåÉ correct
      ```

      This is **negative transfer**: your existing `==` intuition from C++ and Python does not transfer to JavaScript. Use `===` and it matches your expectation.

      > **Debugging tip:** When a comparison behaves unexpectedly, use `typeof` to check what type a value actually is: `console.log(typeof myVar)` prints `"string"`, `"number"`, `"boolean"`, `"undefined"`, or `"object"`. This is your first debugging tool for type-related surprises.

      > **Feeling confused by `==` vs `===`?** That is completely normal ŌĆö this trips up experienced developers too. The fact that you are learning the distinction now puts you ahead of most JavaScript beginners.

      ### Predict Before You Run

      Before clicking Run on `types.js`, predict: will `userInput == expectedScore` (where `userInput` is the string `"42"` and `expectedScore` is the number `42`) be `true` or `false`? What would it be in Python?

      ### Task: Fix the Fixer-Upper

      Open `types.js`. It has **three bugs**:

      1. Two comparisons that produce wrong results because they do not type-check ŌĆö fix them!
      2. A mutable declaration for a value that never changes ŌĆö change it to be immutable.
      3. A messy string concatenation ŌĆö replace it with a **template literal**.

      Click **Ō¢Č Run** to check your output. It should no longer show any `[BUG]` messages.

    files:
      - path: "types.js"
        content: |
          // FIXER-UPPER: This file has three bugs. Find and fix them all.

          // Does this comparison really make sense?
          let userInput = "42";
          let expectedScore = 42;
          if (userInput == expectedScore) {
              console.log("[BUG] String '42' should NOT equal number 42 here!");
          } else {
              console.log("Score check: types are different, correctly rejected.");
          }

          // How about this comparison?
          let isAdmin = false;
          if (isAdmin == 0) {
              console.log("[BUG] false should NOT equal the number 0 here!");
          } else {
              console.log("Admin check: false and 0 are different types, correctly rejected.");
          }

          // What if we accidently use the same name later on in the program, how could we ensure that we always find that bug?
          let MAX_STUDENTS = 200;

          // Bruh so many + and " characters. How could we simplify this?
          // Expected output format: "Student Alex scored 95 out of 200"
          let studentName = "Alex";
          let studentGrade = 95;
          let message = "Student " + studentName + " scored " + studentGrade + " out of " + MAX_STUDENTS;
          console.log(message);
        language: "javascript"

    open_file: "types.js"

    solution:
      files:
        - path: "types.js"
          content: |
            // FIXER-UPPER: Three bugs fixed.

            // BUG 1 FIXED: == changed to === (no type coercion)
            let userInput = "42";
            let expectedScore = 42;
            if (userInput === expectedScore) {
                console.log("[BUG] String '42' should NOT equal number 42 here!");
            } else {
                console.log("Score check: types are different, correctly rejected.");
            }

            // BUG 2 FIXED: == changed to ===
            let isAdmin = false;
            if (isAdmin === 0) {
                console.log("[BUG] false should NOT equal the number 0 here!");
            } else {
                console.log("Admin check: false and 0 are different types, correctly rejected.");
            }

            // BUG 3 FIXED: let changed to const (value never changes)
            const MAX_STUDENTS = 200;

            // TASK DONE: Replaced + concatenation with a template literal
            const studentName = "Alex";
            const studentGrade = 95;
            const message = `Student ${studentName} scored ${studentGrade} out of ${MAX_STUDENTS}`;
            console.log(message);
          language: "javascript"
      explanation: |
        **`===` instead of `==`:** JavaScript's `==` performs implicit type coercion ŌĆö `"42" == 42` is `true` and `false == 0` is `true`. These are the dangerous surprises shown in the tutorial. `===` checks both value AND type, matching the behavior you expect from C++ and Python. After both fixes, neither `[BUG]` message appears in output.

        **`const MAX_STUDENTS`:** The value `200` never changes, so `const` is the correct declaration ŌĆö it prevents accidental reassignment and signals intent to readers. The test checks `source.includes('const MAX_STUDENTS')`.

        **Bonus improvement:** The solution also changes `studentName`, `studentGrade`, and `message` from `let` to `const` ŌĆö none are reassigned, so `const` is the better choice. This is not required by the task (only `MAX_STUDENTS` is listed as a bug), but it follows best practice #1: "default to `const`, use `let` only when reassigning."

        **Template literal:** Backtick strings with `${expression}` syntax replace the `+` concatenation. The test checks `source.includes('${')`. Template literals are the direct JavaScript equivalent of Python's f-strings.

        **Test: no `[BUG]` in output:** The test `assert(!output.includes('[BUG]'), ...)` verifies both `===` fixes worked ŌĆö neither branch with `[BUG]` in its message should execute.

    tests:
      - description: "Fixed both == comparisons to === (no [BUG] messages in output)"
        command: "assert(!output.includes('[BUG]'), 'Fix both == comparisons to === ŌĆö the [BUG] messages should disappear')"
        hints:
          - text: "The [BUG] messages appear because JavaScript's `==` silently converts types before comparing. What operator checks both value AND type? Look at the '=== Trap' section in the instructions."
            condition: "code_missing: ==="
          - text: "You've fixed at least one comparison ŌĆö but there are TWO `==` bugs in the file. Search for every `==` and check if it should be `===`."
            condition: "code_contains: ==="
      - description: "MAX_STUDENTS is now declared with const"
        command: "assert(code.includes('const MAX_STUDENTS'), 'Change \"let MAX_STUDENTS\" to \"const MAX_STUDENTS\"')"
        hints:
          - text: "One of the bugs involves a variable declaration keyword. Is `MAX_STUDENTS` ever reassigned anywhere in the code? If not, which keyword signals 'this value is fixed'?"
            condition: "code_missing: const MAX_STUDENTS"
      - description: "Used a template literal (backtick with ${}) for the message"
        command: "assert(code.includes('${'), 'Replace the + concatenation with a template literal using backticks and ${}')"
        hints:
          - text: "The messy string concatenation with `+` can be replaced with JavaScript's equivalent of Python's f-strings. What kind of quotes (not single, not double) enable `${}` interpolation?"
            condition: "code_missing: ${"
      - description: "Code runs without errors"
        command: "assert(!output.toLowerCase().includes('error'), 'The code should run without any errors')"
        hints:
          - text: "Your code has a syntax error. Check for mismatched backticks, missing semicolons, or unclosed braces. The error message in the output may tell you the line number."

    quiz:
      title: "Variables, Types & The === Trap ŌĆö Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "Why does `1 == '1'` evaluate to `true` in JavaScript, when the same comparison in Python or C++ would be `false`?"
          options:
            - "JavaScript's `==` coerces the string `'1'` to the number `1` before comparing"
            - "The string `'1'` and number `1` are actually the same type in JavaScript's type system"
            - "This is a known bug in older JavaScript engines that has since been patched in ES6"
            - "`==` in JavaScript compares memory addresses, which happen to be equal for small values"
          correct_index: 0
          explanation: "JavaScript's == performs *implicit type coercion* ŌĆö it converts values to a common type before comparing. This creates traps: `0 == false`, `'' == false`, `null == undefined`. The === operator skips coercion and requires both value AND type to match, behaving exactly like == in Python and C++. Always use ===."

        - question: "A student writes `let MAX_RETRY = 3` but never reassigns it in 200 lines of code. Why is `const MAX_RETRY = 3` a better choice?"
          options:
            - "`const` variables are stored in a faster memory region than `let` variables, improving runtime performance"
            - "`const` prevents accidental reassignment and signals intent to readers"
            - "`let` variables are automatically garbage collected, while `const` variables persist across function calls"
            - "There is no practical difference ŌĆö `const` and `let` behave identically for primitive values"
          correct_index: 1
          explanation: "`const` prevents accidental reassignment and communicates intent. It is the JavaScript equivalent of C++'s `const` keyword. Unlike C++ const, JavaScript's `const` for objects and arrays prevents rebinding the variable, but does not make the contents immutable."

        - question: "What is the JavaScript equivalent of Python's f-string `f\"Welcome, {name}! Score: {score}\"`?"
          options:
            - "`'Welcome, ${name}! Score: ${score}'`"
            - "`\"Welcome, \" + name + \"! Score: \" + score`"
            - "`` `Welcome, ${name}! Score: ${score}` ``"
            - "`\"Welcome, %s! Score: %d\" % (name, score)`"
          correct_index: 2
          explanation: "Template literals use backticks (`` ` ``) and `${expression}` for interpolation ŌĆö a direct equivalent of Python's f-strings. Single or double quotes create plain strings with no interpolation. Note: `'Welcome, ${name}!'` in single quotes prints the literal text `${name}`, not the variable's value."

        - question: "The tutorial says to avoid `var` and always use `let` or `const`. Why?"
          options:
            - "`var` is slower than `let` and `const` because V8 cannot optimize hoisted declarations"
            - "`var` ignores block scope and hoists declarations, violating the scoping rules from C++ and Python"
            - "`var` was removed from JavaScript in ES6, so it causes syntax errors in modern Node.js versions"
            - "`var` and `let` are identical in behavior ŌĆö the advice is purely a coding style preference"
          correct_index: 1
          explanation: "In C++ and Python, a variable declared inside a `for` or `if` block stays inside that block. `var` violates this ŌĆö it leaks out of blocks and can be used before its declaration line (hoisting). `let` and `const` restore the block-scoping behavior you expect. This is why modern JavaScript linters flag every use of `var`."

        - question: "Your teammate's Discord bot code has `if (userRole == 'admin')` and it works in all their tests. Should you flag this in code review? Why or why not?"
          options:
            - "No ŌĆö both sides are strings so `==` and `===` behave identically, and there is no risk to flag"
            - "Yes ŌĆö using `==` hides a habit of relying on coercion, and a future change to a numeric role ID would silently introduce a bug"
            - "Yes ŌĆö `==` is measurably slower than `===` at runtime due to the type coercion step, which impacts performance"
            - "No ŌĆö `==` and `===` are identical for same-type operands, and linters will only flag cross-type comparisons"
          correct_index: 1
          explanation: "When both operands are already the same type, `==` and `===` produce the same result. But using `===` consistently prevents future bugs when types change (e.g., role becomes a number). This is a defensive coding practice ŌĆö the code review should flag it as a latent risk, not a current bug."


  # --------------------------------------------------------------------------
  # STEP 3: Arrow Functions & Callbacks
  # Pedagogy: Component skill isolation ŌĆö teach arrow functions and .filter()
  #           WITHOUT Express. Establishes the callback mental model that
  #           Express routes will use in Step 5.
  #           Transfer Tutor ŌĆö C++ function pointers, Python lambda/sorted.
  # --------------------------------------------------------------------------
  - title: "Arrow Functions & Callbacks"
    instructions: |
      ## The Foundation of Everything That Follows

      > **Learning objective:** After this step you will be able to **write** arrow functions, **pass** functions as callbacks, and **use** `.filter()` to select array elements.

      In C++, you've encountered function pointers. In Python, you've passed functions to `sorted(key=...)` or `map()`. JavaScript takes this further: **functions are just values**, exactly like numbers or strings.

      This is not merely a stylistic feature ŌĆö it is the entire foundation of Node.js's asynchronous model and the Express web framework you will use starting in Step 5. Understanding it now makes everything later obvious.

      ### Arrow Functions

      ```javascript
      // C++ equivalent: int add(int a, int b) { return a + b; }
      // Python equivalent: def add(a, b): return a + b

      // JavaScript (regular function):
      function add(a, b) { return a + b; }

      // JavaScript (arrow function ŌĆö the modern preferred style):
      const add = (a, b) => a + b;

      // More examples:
      const greet  = (name) => `Hello, ${name}!`;
      const double = n => n * 2;   // Parentheses optional for a single parameter
      const hi     = () => "Hi!";  // Empty parentheses for no parameters
      ```

      ### Callbacks: Passing Functions as Arguments

      A **callback** is a function you pass as an argument to another function. The receiving function "calls it back" at the right time.

      ```javascript
      // Python equivalent: list(filter(lambda x: x > 2, [1, 2, 3, 4, 5]))
      const numbers = [1, 2, 3, 4, 5];

      const bigNums = numbers.filter(n => n > 2);        // [3, 4, 5]
      const evens   = numbers.filter(n => n % 2 === 0);  // [2, 4]
      ```

      `.filter()` takes a callback ŌĆö an arrow function that returns `true` or `false` for each element. Only elements where the callback returns `true` are kept.

      ### Why Callbacks Matter

      In the upcoming steps, you will see callbacks everywhere:

      ```javascript
      // In Express (Step 5): the route handler IS a callback
      app.get('/', (req, res) => { res.send('Hello!'); });

      // In setTimeout (Step 8): the Event Loop calls your function later
      setTimeout(() => console.log('done'), 1000);
      ```

      The mental model ŌĆö *pass a function, get called back later* ŌĆö is the single most important pattern in JavaScript.

      ### Predict Before You Code

      What does `[10, 20, 30, 40, 50].filter(n => n > 25)` return? Write your prediction before reading on.

      ### Investigate (after completing the task)

      - What happens if you change `>=` to `>` in your passing filter? Which students change?
      - What does `students.filter(s => s.grade >= 60).length` return? (Hint: not an array.)

      ### Task: Arrow Functions & Filtering

      Open `functions.js`. Complete the three `TODO` items:

      1. **Convert** `getLetterGrade` from a `function` declaration to an **arrow function** assigned to `const`.
      2. **Use** `.filter()` with an arrow function to keep only **passing** students (grade >= 60).
      3. **Use** `.filter()` again to create an **honors** list (grade >= 90).

      Click **Ō¢Č Run** to check your output.

    files:
      - path: "functions.js"
        content: |
          // Arrow Functions & Callbacks ŌĆö complete the three TODOs below

          const students = [
              { name: "Alice", grade: 95 },
              { name: "Bob",   grade: 42 },
              { name: "Carol", grade: 78 },
              { name: "Dave",  grade: 55 },
              { name: "Eve",   grade: 88 },
          ];

          // TODO 1: Convert this to an arrow function assigned to a const
          function getLetterGrade(score) {
              if (score >= 90) return "A";
              if (score >= 80) return "B";
              if (score >= 70) return "C";
              if (score >= 60) return "D";
              return "F";
          }

          // TODO 2: Use .filter() with an arrow function to keep only passing students (grade >= 60)
          // Replace the line below ŌĆö Bob (42) and Dave (55) should be excluded
          const passingStudents = students;

          // TODO 3: Use .filter() to create an honors list (grade >= 90)
          // Only Alice (95) should be in this list
          const honorsStudents = students;

          console.log("=== Passing Students ===");
          passingStudents.forEach(s => console.log(`${s.name}: ${s.grade} (${getLetterGrade(s.grade)})`));

          console.log("\n=== Honors Students ===");
          honorsStudents.forEach(s => console.log(`${s.name}: ${s.grade}`));
        language: "javascript"

    open_file: "functions.js"

    solution:
      files:
        - path: "functions.js"
          content: |
            // Arrow Functions & Callbacks ŌĆö all three TODOs complete

            const students = [
                { name: "Alice", grade: 95 },
                { name: "Bob",   grade: 42 },
                { name: "Carol", grade: 78 },
                { name: "Dave",  grade: 55 },
                { name: "Eve",   grade: 88 },
            ];

            // TODO 1 DONE: Arrow function assigned to a const
            const getLetterGrade = (score) => {
                if (score >= 90) return "A";
                if (score >= 80) return "B";
                if (score >= 70) return "C";
                if (score >= 60) return "D";
                return "F";
            };

            // TODO 2 DONE: .filter() keeps only passing students (grade >= 60)
            const passingStudents = students.filter(s => s.grade >= 60);

            // TODO 3 DONE: .filter() keeps only honors students (grade >= 90)
            const honorsStudents = students.filter(s => s.grade >= 90);

            console.log("=== Passing Students ===");
            passingStudents.forEach(s => console.log(`${s.name}: ${s.grade} (${getLetterGrade(s.grade)})`));

            console.log("\n=== Honors Students ===");
            honorsStudents.forEach(s => console.log(`${s.name}: ${s.grade}`));
          language: "javascript"
      explanation: |
        **Arrow function:** `const getLetterGrade = (score) => { ... }` converts the `function` declaration to an arrow function assigned to a `const`. The test checks that the source no longer contains `function getLetterGrade` and does contain `=>`.

        **`.filter()` for passing:** `students.filter(s => s.grade >= 60)` keeps Alice (95), Carol (78), and Eve (88). Bob (42) and Dave (55) are excluded.

        **`.filter()` for honors:** `students.filter(s => s.grade >= 90)` keeps only Alice (95).

        **The callback pattern:** In both `.filter()` calls, the arrow function is a *callback* ŌĆö a function you pass as an argument that `.filter()` calls for each element. This exact pattern (pass a function, let someone else call it) is how Express route handlers work in Step 5.

    tests:
      - description: "Converted getLetterGrade to an arrow function"
        command: "assert(!code.includes('function getLetterGrade'), 'Convert getLetterGrade to an arrow function assigned to const')"
        hints:
          - text: "Replace `function getLetterGrade(grade) { ... }` with the arrow form: `const getLetterGrade = (grade) => { ... }`. The body stays the same ŌĆö only the declaration syntax changes."
