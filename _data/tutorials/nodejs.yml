  - title: "Dynamic Routes: Queries, Params & POST"
    http_client: true
    http_url: "http://localhost:3000/students?passing=true"
    instructions: |
      ## Making Routes Dynamic

      > **Learning objective:** After this step you will be able to **read** query parameters with `req.query`, **extract** URL parameters with `req.params`, and **handle** POST requests with `req.body`.

      In Step 5, your route always returned the same response. Real APIs need to respond differently based on what the user asks for. Express provides three ways to receive data from users:

      ### 1. Query Parameters (`req.query`)

      Query parameters are key-value pairs appended to the URL after a `?`:

      ```
      GET /students?passing=true&sort=name
                    ^^^^^^^^^^^^^^^^^^^^^^^^ query string
      ```

      ```javascript
      app.get('/students', (req, res) => {
          const passing = req.query.passing;   // "true" (always a string!)
          const sort    = req.query.sort;       // "name"
          // Use these to filter/sort your data
      });
      ```

      > ŌÜĀ’ĖÅ **Step 2 connection:** `req.query.passing` is always a **string** ŌĆö even if the URL says `?passing=true`, the value is the string `"true"`, NOT the boolean `true`. Use `=== 'true'` to compare (not `== true`).

      ### 2. Route Parameters (`req.params`)

      Route parameters are **placeholders** in the URL path:

      ```
      GET /students/3        ŌĆö :id is 3
      GET /students/alice     ŌĆö :id is alice
      ```

      ```javascript
      app.get('/students/:id', (req, res) => {
          const id = req.params.id;   // "3" (also a string!)
          // Find the student with this ID
      });
      ```

      The `:id` in the route pattern tells Express "capture whatever appears here and put it in `req.params.id`."

      ### 3. POST with Request Body (`req.body`)

      **GET** requests data and puts parameters in the URL (visible to everyone). **POST** sends data hidden inside the request "body" ŌĆö used for creating/modifying data or sending sensitive information.

      ```javascript
      // Tell Express to parse incoming JSON bodies
      app.use(express.json());

      app.post('/students', (req, res) => {
          const newStudent = req.body;   // { name: "Frank", grade: 72 }
          // Process the data
      });
      ```

      > **What is `app.use(express.json())`?** Express does not read request bodies by default ŌĆö they arrive as raw bytes. `express.json()` is **middleware**: a function that runs *before* your route handler and converts the raw JSON bytes into a JavaScript object. Without it, `req.body` would be `undefined`. Think of it as a translator that runs between the incoming HTTP request and your handler callback.

      | | GET + Query Params | GET + Route Params | POST + Body |
      |---|---|---|---|
      | **Data in** | URL: `?key=value` | URL: `/path/:param` | Request body (hidden) |
      | **Use for** | Filtering, searching | Identifying ONE resource | Creating/modifying data |
      | **Example** | `/students?passing=true` | `/students/3` | `POST /students` with JSON |

      ### New Array Method: `.find()`

      You already know `.filter()` returns **all** matching elements. Often you need just **one**. That is what `.find()` does:

      ```javascript
      const students = [{ id: 1, name: "Alice" }, { id: 2, name: "Bob" }];

      // .filter() returns an array (possibly empty):
      students.filter(s => s.id === 2);   // [{ id: 2, name: "Bob" }]

      // .find() returns the FIRST match (or undefined if none):
      students.find(s => s.id === 2);     // { id: 2, name: "Bob" }
      ```

      Use `.find()` when you are looking for **one specific item** (like a student by ID). Use `.filter()` when you want **all items** matching a condition.

      ### Task: Build a Dynamic Student API

      Open `server.js`. The Express app and student data are provided. **Implement the three route handlers** (the route structure is given ŌĆö you fill in the logic):

      1. **`GET /students`** ŌĆö Return all students. If `?passing=true` is in the URL, use `.filter()` to return only passing students (grade >= 60).
      2. **`GET /students/:id`** ŌĆö Find and return the student matching the given `id`. Use `===` with `Number(req.params.id)` to compare (remember: params are strings!).
      3. **`POST /students`** ŌĆö Read the new student from `req.body` and add them to the array with `.push()`. Respond with the updated students list.

      > **Scaffolding level:** The full route declarations are provided ŌĆö you write the handler *logic* inside each callback. This is more independence than Step 5, but you still have the structure.

      ### Predict Before You Implement

      Before writing any code, look at the starter file and answer:

      1. If you send `GET /students?passing=true` right now (with `res.json("Implement me!")` unchanged), what will the HTTP client show?
      2. What is the data type of `req.query.passing` ŌĆö a boolean or a string?
      3. Will `req.params.id === 3` (comparing to the number `3`) ever be `true`? Why not? (Hint: revisit Step 2's lesson about types.)

      > **Expect at least one route to return wrong results on your first attempt** ŌĆö that is not failure, it is the normal debugging loop. Read the response body; it usually tells you exactly what went wrong.

      > **Note:** The starter code includes `app.use(express.json())` at the top. This middleware is required for POST routes ŌĆö without it, `req.body` would be `undefined`.

