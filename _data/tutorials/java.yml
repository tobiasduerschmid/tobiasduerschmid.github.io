        command: |
          public class __Test {
              public static void main(String[] args) {
                  double avg = Welcome.calculateAverage(new int[]{88, 95, 72, 91, 84});
                  if (Math.abs(avg - 86.0) > 0.001) {
                      throw new RuntimeException("Expected 86.0, got " + avg);
                  }
                  double avg2 = Welcome.calculateAverage(new int[]{100, 50});
                  if (Math.abs(avg2 - 75.0) > 0.001) {
                      throw new RuntimeException("Expected 75.0, got " + avg2);
                  }
              }
          }
        hints:
