          explanation: "Auto-unboxing calls `.intValue()` on the Integer object. If the object is null, this throws NullPointerException. This is a common production bug."
        - question: "Why is `Integer sum = 0;` in a loop slower than `int sum = 0;`?"
          options:
            - "Integer uses more memory because it's 64-bit"
            - "Each `sum += i` unboxes, adds, then creates a new Integer object — every iteration"
            - "Integer arithmetic uses BigDecimal internally"
            - "There is no performance difference"
          correct_index: 1
          explanation: "Auto-boxing/unboxing creates temporary wrapper objects on every iteration. With `int`, the operation is pure arithmetic on the stack — no object allocation."
        - question: "**[Spaced Practice: Step 2]** You need to check if two `Integer` variables hold the same value. Which approach is always correct?"
          options:
            - "`a == b` — works for all integer values"
            - "`a.equals(b)` — compares values regardless of caching"
