                  int[] above = Welcome.gradesAbove(new int[]{88, 95, 72, 91, 84}, 86.0);
                  if (above.length != 3) {
                      throw new RuntimeException("Expected 3 grades above 86.0, got " + above.length);
                  }
                  if (above[0] != 88 || above[1] != 95 || above[2] != 91) {
                      throw new RuntimeException("Expected {88, 95, 91}, got wrong values");
                  }
