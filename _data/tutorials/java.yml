          import java.util.HashSet;
          import java.util.ArrayList;

          public class WordCounter {
              // TODO: Private fields:
              //   - counts: HashMap<String, Integer>
              //   - uniqueWords: HashSet<String>


              // TODO: Constructor taking String[] words
              //   - Populate counts map (word → frequency)
              //   - Populate uniqueWords set


              // TODO: getCount(String word) — return count for that word (0 if not found)


              // TODO: getUniqueCount() — return number of unique words


              // TODO: getMostFrequent() — return the word with highest count


