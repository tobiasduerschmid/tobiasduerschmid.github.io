      title: "Comprehensive Review"
      min_score: 0.75
      shuffle: true
      questions:
        - question: "Which type of exception does the Java compiler force you to handle?"
          options:
            - "RuntimeException and its subclasses"
            - "Exception subclasses that are NOT RuntimeException (checked exceptions)"
            - "All exceptions"
            - "Only NullPointerException"
          correct_index: 1
          explanation: "Checked exceptions (subclasses of Exception but NOT RuntimeException) must be caught or declared with `throws`. Unchecked exceptions (RuntimeException and its subclasses) have no compiler enforcement."
        - question: "**[Spaced Practice: Step 5]** What keyword does a Java class use to declare that it fulfills an interface contract?"
          options:
            - "extends"
            - "implements"
            - "inherits"
            - "interface"
          correct_index: 1
          explanation: "`implements` declares that a class fulfills an interface contract. `extends` is for class inheritance. A class can implement multiple interfaces but can only extend one class."
        - question: "**[Spaced Practice: Step 7]** Why can't you write `ArrayList<int>` in Java?"
          options:
            - "Because int is too small for ArrayList"
            - "Because Java generics use type erasure, which only works with objects — use `ArrayList<Integer>` instead"
            - "Because ArrayList only accepts strings"
            - "Because you should use int[] arrays instead"
          correct_index: 1
          explanation: "Java generics are erased at compile time — they become raw types operating on `Object`. Primitives like `int` are not objects, so they can't participate in generics. The wrapper class `Integer` is used instead."
        - question: "**[Technique Selection]** Match each scenario to the correct Java construct: (A) Multiple unrelated classes need a `serialize()` method. (B) Dog and Cat share `name`, `age` fields and `eat()` behavior. (C) You need a type-safe list that works for any element type."
