                      new Motorcycle("Harley", 2023, true),
                      new Car("Honda", 2022, 2),
                      new Motorcycle("Ducati", 2025, false)
                  };

                  for (Vehicle v : fleet) {
                      System.out.println(v.describe() + " — " + v.startEngine());
                  }
              }
          }
