                      throw new RuntimeException("Expected count of 'a' to be 3, got " + wc.getCount("a"));
                  }
                  if (wc.getCount("b") != 1) {
                      throw new RuntimeException("Expected count of 'b' to be 1, got " + wc.getCount("b"));
                  }
                  if (wc.getCount("z") != 0) {
                      throw new RuntimeException("Missing word should return 0, got " + wc.getCount("z"));
                  }
              }
          }
        hints:
