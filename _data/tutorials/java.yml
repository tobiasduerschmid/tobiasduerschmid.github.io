            - "A: interface, B: abstract class, C: generics"
            - "A: abstract class, B: interface, C: generics"
            - "A: generics, B: abstract class, C: interface"
            - "A: interface, B: generics, C: abstract class"
          correct_index: 0
          explanation: "Interfaces define contracts for unrelated classes (A). Abstract classes share state and behavior among related classes (B). Generics provide type-safe parameterization (C)."


  # --------------------------------------------------------------------------
  # STEP 10 — Design Challenge: Course Enrollment System (Full UML)
  # Pedagogy: Integration — combine all prior concepts
  #           Design-First — UML before code
  #           Multi-file — realistic project structure
  #           Bloom's: Create + Evaluate
  # --------------------------------------------------------------------------
  - title: "Design Challenge: Course Enrollment"
    uml_files:
      - Student.java
      - EnrollmentException.java
      - Enrollable.java
      - Course.java
      - EnrollmentDemo.java
    view: uml_diagram
    instructions: |

      > **Learning objective:** Integrate interfaces, inheritance, generics, collections, and exceptions to implement a system from a UML specification.

      This is your integration challenge. You'll implement a small course enrollment system using everything you've learned. Read the UML diagram carefully before writing any code.

      ### Full UML Class Diagram

      <div class="uml-class-diagram-container" data-uml-type="class" data-uml-spec='@startuml
      interface Enrollable {
        + enroll(student: Student): void
        + drop(name: String): boolean
        + isEnrolled(name: String): boolean
        + getRoster(): ArrayList
      }
      class Course {
        - name: String
        - capacity: int
        - students: ArrayList
        + Course(name: String, capacity: int)
        + getName(): String
        + getCapacity(): int
        + getEnrollmentCount(): int
        + enroll(student: Student): void
        + drop(name: String): boolean
        + isEnrolled(name: String): boolean
        + getRoster(): ArrayList
        + toString(): String
      }
      class Student {
        - name: String
        - id: int
        + Student(name: String, id: int)
        + getName(): String
        + getId(): int
        + toString(): String
      }
      class EnrollmentException {
        + EnrollmentException(message: String)
      }
      EnrollmentException --|> Exception
      Course ..|> Enrollable
      Course "1" o-- "0..*" Student
      Course ..> EnrollmentException : throws
      @enduml'></div>

      ### Requirements

      1. **`Student`**: Simple data class with name and id. `toString()` returns `"Student(name, id)"`.

      2. **`EnrollmentException`**: A checked exception (extends `Exception`).

      3. **`Enrollable`**: Interface defining the enrollment contract.

      4. **`Course`**: Implements `Enrollable`.
         - `enroll()` throws `EnrollmentException` if the course is full OR if the student is already enrolled
         - `drop()` removes a student by name, returns `true` if found
         - `isEnrolled()` checks if a student with that name is enrolled
         - `getRoster()` returns an `ArrayList<String>` of enrolled student names

      ### Before You Code — Plan Your Approach

      Before writing any code, answer these questions mentally:
      1. Which concepts from **earlier steps** does each class use? (interfaces, encapsulation, exceptions, collections, `.equals()`)
      2. What is the "secret" each class hides? (What could change without affecting other classes?)
      3. Where will you use `ArrayList<Student>` vs `ArrayList<String>`, and why?

      ### Investigate

      Look at the `EnrollmentDemo.java` main method (provided, read-only). It exercises every feature of your system. Your implementations must make it run correctly.

