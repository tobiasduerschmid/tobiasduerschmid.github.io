            condition: "code_missing: containsKey"
          - text: "getCount should return 0 for words not in the map, not throw an exception"
            condition: "code_missing: return 0"
      - description: "Unique count and most frequent work"
        command: |
          public class __Test {
              public static void main(String[] args) {
                  String[] words = {"x", "y", "x", "z", "x"};
                  WordCounter wc = new WordCounter(words);
                  if (wc.getUniqueCount() != 3) {
                      throw new RuntimeException("Expected 3 unique words");
                  }
                  if (!wc.getMostFrequent().equals("x")) {
                      throw new RuntimeException("Most frequent should be 'x'");
                  }
              }
          }
        hints:
          - text: "Use uniqueWords.size() to get the number of unique words"
            condition: "code_missing: size()"


  # --------------------------------------------------------------------------
  # STEP 9 — Exception Handling: The Bureaucratic Contract
  # Pedagogy: Transfer Tutor — Python EAFP vs Java checked exceptions
  #           Mistake Pattern — show what happens without handling
  #           UML — exception hierarchy
  #           Bloom's: Analyze + Apply
  # --------------------------------------------------------------------------
  - title: "Exception Handling"
    uml_files:
      - SafeCalculator.java
    instructions: |
      ## Exception Handling: Checked vs Unchecked

      > **Learning objective:** Understand Java's checked/unchecked exception model and write proper try-catch-finally blocks.

      > **⚠ New concept — no analogue in Python or C++:** Java uniquely divides exceptions into **checked** (compiler-enforced handling) and **unchecked** (runtime errors). Neither Python nor C++ has this distinction.

      ### The Three Philosophies

      | Language | Philosophy | Approach |
      |----------|-----------|----------|
      | **Python** | EAFP ("Easier to Ask Forgiveness than Permission") | Catch exceptions freely; use try/except as control flow |
      | **C++** | Exceptions are expensive | Prefer error codes; use exceptions sparingly |
      | **Java** | The Bureaucratic Contract | Checked exceptions force you to handle or declare every possible failure |

      ### Exception Hierarchy

      <div class="uml-class-diagram-container" data-uml-type="class" data-uml-spec='@startuml
      class Throwable
      class Error
      class Exception
      class RuntimeException
      class OutOfMemoryError
      class StackOverflowError
      class IOException
      class SQLException
      class NullPointerException
      class IllegalArgumentException
      class ArithmeticException
      Error --|> Throwable
      Exception --|> Throwable
      OutOfMemoryError --|> Error
      StackOverflowError --|> Error
      IOException --|> Exception
      SQLException --|> Exception
      RuntimeException --|> Exception
      NullPointerException --|> RuntimeException
      IllegalArgumentException --|> RuntimeException
      ArithmeticException --|> RuntimeException
      note right of Error: Do not catch -- JVM failures
      note right of IOException: CHECKED\n(compiler enforces handling)
      note right of RuntimeException: UNCHECKED\n(no enforcement)
      @enduml'></div>

      ### The Rules

      **Checked exceptions** (`Exception` but not `RuntimeException`):
      - You **must** either `catch` them or declare them with `throws` in the method signature
      - Used for **recoverable** external failures (file not found, network error)

      **Unchecked exceptions** (`RuntimeException` and subclasses):
      - No compiler enforcement — same as Python/C++
      - Used for **programming errors** (null pointer, bad index, bad argument)

      ```java
      // Checked: compiler FORCES you to handle this
      public String readFile(String path) throws IOException {
          // ...might throw IOException
      }

      // Calling code MUST handle it:
      try {
          String content = readFile("data.txt");
      } catch (IOException e) {
          System.err.println("File error: " + e.getMessage());
      }

      // Unchecked: no compiler enforcement
      public int divide(int a, int b) {
          return a / b;  // might throw ArithmeticException — but compiler won't complain
      }
      ```

      ### Custom Exceptions

      ```java
      // Checked custom exception
      public class InsufficientFundsException extends Exception {
          private double deficit;

          public InsufficientFundsException(double deficit) {
              super("Insufficient funds: need " + deficit + " more");
              this.deficit = deficit;
          }

          public double getDeficit() { return deficit; }
      }
      ```

      ### Task

      Complete `SafeCalculator.java`:

      1. Define an `CalculatorException` (checked, extends `Exception`) with a message
      2. Implement `divide(int a, int b)` that throws `CalculatorException` if `b` is 0
      3. Implement `sqrt(double x)` that throws `CalculatorException` if `x` is negative
      4. In `main`, use try-catch to handle errors gracefully, printing the error messages

