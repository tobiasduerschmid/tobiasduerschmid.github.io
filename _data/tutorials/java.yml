      questions:
        - question: "Why does Java's `main` method signature include `static`?"
          options:
            - "So the JVM can call it without creating an instance of the class"
            - "To make the method run faster"
            - "Because all Java methods must be static"
            - "To prevent the method from being overridden"
          correct_index: 0
          explanation: "The JVM needs to call `main` as the program entry point. Since no object exists yet when the program starts, `main` must be `static` — callable on the class itself, not on an instance."
        - question: "What does `int[] grades = {88, 95, 72};` create in Java?"
          options:
            - "An array of 3 int primitives on the stack/heap (like C++ `int[]`)"
            - "An ArrayList of Integer objects"
            - "A Python-style list that can grow dynamically"
            - "A pointer to an uninitialized array"
          correct_index: 0
          explanation: "Java arrays are fixed-size, typed containers — similar to C++ arrays. Unlike Python lists, they cannot grow after creation. For a resizable collection, use `ArrayList<Integer>`."
        - question: "In Java, `scores.length` has no parentheses but `name.length()` does. Why?"
          options:
            - "`length` on arrays is a field; `length()` on Strings is a method"
            - "They're interchangeable — both work either way"
            - "Arrays don't have methods in Java"
            - "`length()` is deprecated in favor of `length`"
          correct_index: 0
          explanation: "This is a well-known Java inconsistency. Arrays have a `length` field (no parentheses). Strings have a `length()` method. Collections use `size()`. You'll memorize this quickly."


  # --------------------------------------------------------------------------
  # STEP 2 — The Identity Trap: == vs .equals()
  # Pedagogy: PRIMM — Predict (wrong), Run, Investigate, Modify, Make
  #           Fixer Upper — debug existing buggy code
  #           False Friend — highest priority misconception
  #           Bloom's: Analyze (identify why code produces wrong results)
  # --------------------------------------------------------------------------
  - title: "The Identity Trap: == vs .equals()"
    instructions: |

      > **Learning objective:** Understand why `==` behaves differently for objects in Java than in Python or C++, and use `.equals()` for value comparison.

      > **⚠ False Friend — Unlearn This:** In Python, `==` compares values. In C++, `operator==` can be overloaded for value equality. In Java, `==` on objects compares **identity** (are these the exact same object in memory?), NOT value equality.

      ### Predict Before You Code

      **Before running the code**, predict the output of each comparison:

      ```java
      String a = "hello";
      String b = "hello";
      System.out.println(a == b);        // Prediction: ____

      String c = new String("hello");
      String d = new String("hello");
      System.out.println(c == d);        // Prediction: ____
      System.out.println(c.equals(d));   // Prediction: ____
      ```

      <details markdown="1">
      <summary>Reveal the answers</summary>

      - `a == b` → `true` — but only because Java **interns** string literals (puts them in a pool). Don't rely on this!
      - `c == d` → `false` — `new` creates separate objects. `==` checks identity, not content.
      - `c.equals(d)` → `true` — `.equals()` checks value equality.

      </details>

      ### The Rule

      **Always use `.equals()` for object comparison in Java.** Use `==` only for primitives (`int`, `double`, `boolean`, `char`).

      ### The Integer Cache Trap

      Java caches `Integer` objects for values -128 to 127. This means `==` on boxed integers **sometimes works and sometimes doesn't**:

      ```java
      Integer x = 127;
      Integer y = 127;
      System.out.println(x == y);     // true (cached — same object!)

      Integer p = 128;
      Integer q = 128;
      System.out.println(p == q);     // false (not cached — different objects!)
      System.out.println(p.equals(q)); // true (value equality)
      ```

      This is one of the most dangerous bugs in Java — it works in testing (small numbers) and fails in production (large numbers).

      ### Task — Fix the Bug

      The `IdentityTrap.java` file contains a student registry that uses `==` to compare strings and integers. It has **three bugs** caused by using `==` instead of `.equals()`. Find and fix all three.

      The program should output:
      ```
      Found: Alice
      Found: Bob
      Same course: true
      ```

      But currently it prints wrong results because of identity comparison.

    files:
      - path: "IdentityTrap.java"
        content: |
          public class IdentityTrap {

              // Fix these three methods — they use == instead of .equals()

              public static boolean findStudent(String input, String stored) {
                  return input == stored;  // BUG: should use .equals()
              }

              public static boolean sameCourse(Integer a, Integer b) {
                  return a == b;           // BUG: should use .equals()
              }

              public static void main(String[] args) {
                  // Bug 1: String comparison
                  String input = new String("Alice");
                  String stored = new String("Alice");
                  System.out.println("Found Alice: " + findStudent(input, stored));

                  // Bug 2: Another string comparison
                  String name1 = "B" + "ob";
                  String name2 = new String("Bob");
                  System.out.println("Found Bob: " + findStudent(name1, name2));

                  // Bug 3: Integer comparison (200 is outside the cache range!)
                  Integer courseA = 200;
                  Integer courseB = 200;
                  System.out.println("Same course: " + sameCourse(courseA, courseB));
              }
          }
        language: "java"

    open_file: "IdentityTrap.java"

    solution:
      files:
        - path: "IdentityTrap.java"
          content: |
            public class IdentityTrap {

                public static boolean findStudent(String input, String stored) {
                    return input.equals(stored);  // FIXED: .equals() for value comparison
                }

                public static boolean sameCourse(Integer a, Integer b) {
                    return a.equals(b);           // FIXED: .equals() for wrapper types
                }

                public static void main(String[] args) {
                    String input = new String("Alice");
                    String stored = new String("Alice");
                    System.out.println("Found Alice: " + findStudent(input, stored));

                    String name1 = "B" + "ob";
                    String name2 = new String("Bob");
                    System.out.println("Found Bob: " + findStudent(name1, name2));

                    Integer courseA = 200;
                    Integer courseB = 200;
                    System.out.println("Same course: " + sameCourse(courseA, courseB));
                }
            }
          language: "java"
      explanation: |
        Both methods needed `==` replaced with `.equals()`:

        - **`findStudent`:** `new String("Alice")` creates a fresh object each time, so `==` returns `false` even though the content is identical. `.equals()` compares the characters.
        - **`sameCourse`:** Java caches `Integer` values -128 to 127, so `==` works for small numbers *by accident*. For 200, it fails. `.equals()` always compares values.

        **The golden rule:** Use `==` for primitives (`int`, `double`, `char`, `boolean`). Use `.equals()` for everything else.

    tests:
      - description: "findStudent uses .equals() for Strings"
        command: |
          public class __Test {
              public static void main(String[] args) {
                  if (!IdentityTrap.findStudent(new String("Alice"), new String("Alice"))) {
                      throw new RuntimeException("findStudent should return true for equal strings");
                  }
                  if (IdentityTrap.findStudent(new String("Alice"), new String("Bob"))) {
                      throw new RuntimeException("findStudent should return false for different strings");
                  }
              }
          }
        hints:
          - text: "Replace == with .equals() in findStudent: return input.equals(stored)"
            condition: "code_contains: input == stored"
      - description: "sameCourse uses .equals() for Integers"
        command: |
          public class __Test {
              public static void main(String[] args) {
                  if (!IdentityTrap.sameCourse(200, 200)) {
                      throw new RuntimeException("sameCourse(200, 200) should be true — values above 127 need .equals()");
                  }
                  if (IdentityTrap.sameCourse(200, 300)) {
                      throw new RuntimeException("sameCourse(200, 300) should be false");
                  }
              }
          }
        hints:
          - text: "Integer values > 127 are NOT cached. Use .equals() instead of == for Integer comparison"
            condition: "code_contains: a == b"

    quiz:
      title: "Identity vs Equality"
      min_score: 0.75
      shuffle: true
      questions:
        - question: "What does `==` do when applied to two `String` objects in Java?"
          options:
            - "Compares their character content (value equality)"
            - "Checks if they are the exact same object in memory (reference equality)"
            - "Calls the .equals() method automatically"
            - "Compares their hash codes"
          correct_index: 1
          explanation: "In Java, `==` on objects always checks reference identity — whether two variables point to the same object. Use `.equals()` for value comparison."
        - question: "`Integer x = 100; Integer y = 100; System.out.println(x == y);` prints `true`. What happens if you change 100 to 200?"
          options:
            - "Still prints true — integers are always compared by value"
            - "Prints false — Java only caches Integer objects for -128 to 127"
            - "Compile error — you can't use == on Integer"
            - "Throws NullPointerException"
          correct_index: 1
          explanation: "Java caches Integer objects for -128 to 127 (the Integer cache). Outside this range, `new` objects are created, so `==` returns false. This is why you must always use `.equals()` for wrapper types."
        - question: "In Python, `'hello' == 'hello'` compares values. Which Java expression achieves the same thing?"
          options:
            - "`\"hello\" == \"hello\"`"
            - "`\"hello\".equals(\"hello\")`"
            - "`String.compare(\"hello\", \"hello\")`"
            - "`\"hello\".compareTo(\"hello\") == 0`"
          correct_index: 1
          explanation: "`.equals()` is the standard way to compare object values in Java. While `compareTo` also works for strings, `.equals()` is the idiomatic choice for equality checks."


  # --------------------------------------------------------------------------
  # STEP 3 — Java's Dual Type System
  # Pedagogy: Transfer Tutor — contrast with Python (everything is object)
  #           and C++ (value types but no autoboxing)
  #           Component Skill Isolation — focus on types alone
  #           Bloom's: Understand + Apply
  # --------------------------------------------------------------------------
  - title: "Java's Dual Type System: Primitives & Wrappers"
    instructions: |

      > **Learning objective:** Understand why Java has both primitives and wrapper objects, and recognize the traps of autoboxing.

      > **Partial Transfer:** C++ has primitives but no autoboxing. Python has only objects (everything is an object). Java has **both** — and automatically converts between them, sometimes dangerously.

      ### Two Worlds of Types

      Java has **8 primitive types** that live on the stack (like C++ value types):

      | Primitive | Size | Default | Wrapper Class |
      |-----------|------|---------|---------------|
      | `byte` | 8-bit | 0 | `Byte` |
      | `short` | 16-bit | 0 | `Short` |
      | `int` | 32-bit | 0 | `Integer` |
      | `long` | 64-bit | 0L | `Long` |
      | `float` | 32-bit | 0.0f | `Float` |
      | `double` | 64-bit | 0.0 | `Double` |
      | `char` | 16-bit | '\u0000' | `Character` |
      | `boolean` | 1-bit | false | `Boolean` |

      ### Why Wrappers Exist

      Java generics use **type erasure** (more in Step 7), which means they only work with objects, not primitives. You **cannot** write `ArrayList<int>` — you must write `ArrayList<Integer>`.

      ```java
      // ILLEGAL — generics don't accept primitives
      // ArrayList<int> numbers = new ArrayList<>();

      // LEGAL — use the wrapper class
      ArrayList<Integer> numbers = new ArrayList<>();
      numbers.add(42);         // autoboxing: int 42 → Integer.valueOf(42)
      int first = numbers.get(0);  // unboxing: Integer → int
      ```

      ### Predict Before You Code

      **Before reading further**, predict what each snippet does:

      ```java
      // Snippet 1
      Integer count = null;
      int n = count;
      // What happens? ____
      ```

      ```java
      // Snippet 2
      Integer sum = 0;
      for (int i = 0; i < 5; i++) {
          sum += i;  // What's happening behind the scenes? ____
      }
      ```

      <details markdown="1">
      <summary>Reveal the answers</summary>

      - **Snippet 1:** `NullPointerException`! Java tries to unbox `null` to `int`, which is impossible.
      - **Snippet 2:** Every iteration unboxes `sum` to `int`, adds `i`, then boxes the result back to `Integer` — creating a new object each time. Use `int sum = 0` instead.

      </details>

      ### The Autoboxing Traps

      **Trap 1: Null unboxing causes NullPointerException**
      ```java
      Integer count = null;
      int n = count;    // NullPointerException! Can't unbox null.
      ```

      **Trap 2: Performance in loops**
      ```java
      // BAD — creates millions of Integer objects
      Integer sum = 0;
      for (int i = 0; i < 1_000_000; i++) {
          sum += i;  // unbox sum, add i, box result — every iteration!
      }

      // GOOD — use primitive type for accumulation
      int sum = 0;
      for (int i = 0; i < 1_000_000; i++) {
          sum += i;  // pure arithmetic, no boxing
      }
      ```

      ### Task

      The `TypeSystem.java` file has a working `countAbove` method (read it to understand `ArrayList<Integer>`). Your job:

      1. Read the provided `countAbove` — understand how it uses `ArrayList<Integer>` with an `int` threshold
      2. Implement `sumScores(ArrayList<Integer> list)` — return the sum using a **primitive `int`** accumulator (avoid the autoboxing trap!)
      3. Complete `main`: create the ArrayList, add scores, and call both methods

    files:
      - path: "TypeSystem.java"
        content: |
          import java.util.ArrayList;

          public class TypeSystem {

              public static int countAbove(ArrayList<Integer> list, int threshold) {
                  int count = 0;
                  for (int val : list) {   // auto-unboxing: Integer → int
                      if (val > threshold) {
                          count++;
                      }
                  }
                  return count;
              }

              // Implement this: return the sum of all elements
              // Use a primitive int accumulator, NOT Integer!
              public static int sumScores(ArrayList<Integer> list) {
                  return 0; // fix this
              }

              public static void main(String[] args) {
                  // Create an ArrayList<Integer> called scores
                  // and add: 95, 87, 42, 73, 61

                  // Print "Above 70: " + countAbove(scores, 70)
                  // Print "Sum: " + sumScores(scores)
              }
          }
        language: "java"

    open_file: "TypeSystem.java"

    solution:
      files:
        - path: "TypeSystem.java"
          content: |
            import java.util.ArrayList;

            public class TypeSystem {

                public static int countAbove(ArrayList<Integer> list, int threshold) {
                    int count = 0;
                    for (int val : list) {
                        if (val > threshold) {
                            count++;
                        }
                    }
                    return count;
                }

                public static int sumScores(ArrayList<Integer> list) {
                    int sum = 0;
                    for (int s : list) {
                        sum += s;
                    }
                    return sum;
                }

                public static void main(String[] args) {
                    ArrayList<Integer> scores = new ArrayList<>();
                    scores.add(95);
                    scores.add(87);
                    scores.add(42);
                    scores.add(73);
                    scores.add(61);

                    System.out.println("Above 70: " + countAbove(scores, 70));
                    System.out.println("Sum: " + sumScores(scores));
                }
            }
          language: "java"
      explanation: |
        Notice how the enhanced for loop `for (int val : list)` automatically **unboxes** each `Integer` to `int`. We use a primitive `int` for `sum` to avoid creating a new `Integer` object on every iteration.

        The `countAbove` method takes `ArrayList<Integer>` (not `ArrayList<int>`) because Java generics require wrapper types. The `int threshold` parameter stays primitive since it's not in a generic context.

