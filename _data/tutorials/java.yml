    open_file: "BankAccount.java"

    solution:
      files:
        - path: "BankAccount.java"
          content: |
            public class BankAccount {
                private String owner;
                private double balance;

                public BankAccount(String owner, double initialBalance) {
                    this.owner = owner;
                    this.balance = initialBalance;
                }

                public void deposit(double amount) {
                    if (amount > 0) {
                        balance += amount;
                    }
                }

                public boolean withdraw(double amount) {
                    if (amount > 0 && balance >= amount) {
                        balance -= amount;
                        return true;
                    }
                    return false;
                }

                public double getBalance() {
                    return balance;
                }

                public String getOwner() {
                    return owner;
                }

                public String toString() {
                    return "BankAccount[owner=" + owner + ", balance=" + balance + "]";
                }

                public static void main(String[] args) {
                    BankAccount acct = new BankAccount("Alice", 1000.0);
                    System.out.println(acct);

                    acct.deposit(500.0);
                    System.out.println("After deposit: " + acct.getBalance());

                    boolean ok = acct.withdraw(200.0);
                    System.out.println("Withdraw 200: " + ok + ", balance: " + acct.getBalance());

                    boolean fail = acct.withdraw(5000.0);
                    System.out.println("Withdraw 5000: " + fail + ", balance: " + acct.getBalance());
                }
            }
          language: "java"
      explanation: |
        **Encapsulation in action:** Fields are `private`, accessed only through `public` methods. This is Java's standard pattern — unlike Python where `self.balance` is directly accessible.

        The `this` keyword disambiguates `this.owner` (the field) from `owner` (the constructor parameter) — identical to C++'s `this->owner`.

        Note that `toString()` is called automatically by `System.out.println(acct)` — similar to Python's `__str__` or C++'s `operator<<`.

    tests:
      - description: "BankAccount constructor and getters work"
        command: |
          public class __Test {
              public static void main(String[] args) {
                  BankAccount a = new BankAccount("Test", 500.0);
                  if (a.getBalance() != 500.0) {
                      throw new RuntimeException("Initial balance wrong");
                  }
                  if (!a.getOwner().equals("Test")) {
                      throw new RuntimeException("Owner wrong");
                  }
              }
          }
        hints:
          - text: "Make sure the constructor stores both owner and initialBalance in the private fields using this.fieldName = parameter"
            condition: "code_missing: this.owner"
      - description: "deposit and withdraw work correctly"
        command: |
          public class __Test {
              public static void main(String[] args) {
                  BankAccount a = new BankAccount("Test", 100.0);
                  a.deposit(50.0);
                  if (a.getBalance() != 150.0) {
                      throw new RuntimeException("Deposit failed: expected 150, got " + a.getBalance());
                  }
                  boolean ok = a.withdraw(30.0);
                  if (!ok || a.getBalance() != 120.0) {
                      throw new RuntimeException("Withdraw failed");
                  }
                  boolean fail = a.withdraw(999.0);
                  if (fail) {
                      throw new RuntimeException("Withdraw should fail for insufficient funds");
                  }
              }
          }
        hints:
