  - title: "From C++/Python to Java"
    instructions: |
      ## From C++/Python to Java: Your First Class

      > **Learning objective:** Map your existing C++ and Python knowledge to Java syntax and understand the "everything is a class" rule.

      You already know how to program. This tutorial won't re-teach loops or variables — instead, it focuses on **what's different** about Java and **why** Java made those choices.

      ### The Big Picture

      | Feature | Python | C++ | Java |
      |---------|--------|-----|------|
      | Entry point | `if __name__ == "__main__":` | `int main()` (free function) | `public static void main(String[] args)` (method in a class) |
      | Typing | Dynamic (`x = 42`) | Static (`int x = 42;`) | Static (`int x = 42;`) |
      | Memory | GC + reference counting | Manual (`new`/`delete`) or RAII | GC (generational) |
      | Free functions | Yes | Yes | **No** — everything lives in a class |
      | Multiple inheritance | Yes (MRO) | Yes | **No** — single class inheritance + interfaces |

      ### Decoding `public static void main(String[] args)`

      Every word in Java's entry point has a purpose:

      - **`public`** — accessible from outside the class (the JVM needs to call it)
      - **`static`** — no instance of the class is needed (the JVM won't `new` your class)
      - **`void`** — returns nothing (exit codes go through `System.exit()`)
      - **`main`** — the name the JVM looks for (by convention, like C's `main`)
      - **`String[] args`** — command-line arguments (like C++'s `argv`)

      > **Why so verbose?** Java was designed for large-scale, multi-team systems. Explicit declarations make code self-documenting and enable powerful IDE tooling. The verbosity is a tradeoff for safety and readability at scale.

      ### Quick Syntax Mapping

      ```java
      // Variables — like C++, you declare the type
      int count = 10;
      double pi = 3.14159;
      String name = "Alice";     // String is a class, not a primitive
      boolean done = false;      // not 'bool' (C++) or True/False (Python)

      // Printing — not cout, not print()
      System.out.println("Count: " + count);  // + concatenates with strings

      // Arrays — similar to C++, but .length is a field (no parentheses!)
      int[] scores = {90, 85, 92};
      System.out.println(scores.length);  // 3 — NOT .length() or len()

      // For loop — identical to C++
      for (int i = 0; i < scores.length; i++) {
          System.out.println(scores[i]);
      }

      // Enhanced for — like Python's "for x in list" or C++'s range-for
      for (int s : scores) {
          System.out.println(s);
      }
      ```

      ### Task

      Edit `Welcome.java` to complete the `main` method. It should:

      1. Create an `int` array called `grades` with values `{88, 95, 72, 91, 84}`
      2. Calculate and print the average as a `double`
      3. Print each grade that is above the average, one per line

      **Expected output format:**
      ```
      Average: 86.0
      88
      95
      91
      ```

    files:
      - path: "Welcome.java"
        content: |
          public class Welcome {
              public static void main(String[] args) {
                  // TODO: Create an int array 'grades' with {88, 95, 72, 91, 84}

                  // TODO: Calculate the average (hint: sum / (double) grades.length)

                  // TODO: Print "Average: " + average

                  // TODO: Print each grade above the average, one per line
              }
          }
        language: "java"

    open_file: "Welcome.java"

    solution:
      files:
        - path: "Welcome.java"
          content: |
            public class Welcome {
                public static void main(String[] args) {
                    int[] grades = {88, 95, 72, 91, 84};

                    int sum = 0;
                    for (int g : grades) {
                        sum += g;
                    }
                    double average = sum / (double) grades.length;

                    System.out.println("Average: " + average);

                    for (int g : grades) {
                        if (g > average) {
                            System.out.println(g);
                        }
                    }
                }
            }
          language: "java"
      explanation: |
        Notice `sum / (double) grades.length` — without the cast, Java performs **integer division** (like C++), truncating the result. This is the same behavior you know from C++ but different from Python 3's `/` which always returns a float.

        The enhanced for loop `for (int g : grades)` is Java's equivalent of Python's `for g in grades` or C++17's range-based for.

    tests:
      - description: "Prints the correct average"
        command: |
          public class __Test {
              public static void main(String[] args) {
                  Welcome.main(new String[]{});
              }
          }
        hints:
          - text: "Remember to cast to double before dividing: sum / (double) grades.length"
            condition: "code_missing: (double)"
          - text: "Use System.out.println to print each line"
            condition: "code_missing: System.out.println"


  # --------------------------------------------------------------------------
  # STEP 2 — The Identity Trap: == vs .equals()
  # Pedagogy: PRIMM — Predict (wrong), Run, Investigate, Modify, Make
  #           Fixer Upper — debug existing buggy code
  #           False Friend — highest priority misconception
  #           Bloom's: Analyze (identify why code produces wrong results)
  # --------------------------------------------------------------------------
  - title: "The Identity Trap: == vs .equals()"
    instructions: |
      ## The Identity Trap: `==` vs `.equals()`

      > **Learning objective:** Understand why `==` behaves differently for objects in Java than in Python or C++, and use `.equals()` for value comparison.

      > **⚠ False Friend — Unlearn This:** In Python, `==` compares values. In C++, `operator==` can be overloaded for value equality. In Java, `==` on objects compares **identity** (are these the exact same object in memory?), NOT value equality.

      ### Predict Before You Code

      **Before running the code**, predict the output of each comparison:

      ```java
      String a = "hello";
      String b = "hello";
      System.out.println(a == b);        // Prediction: ____

      String c = new String("hello");
      String d = new String("hello");
      System.out.println(c == d);        // Prediction: ____
      System.out.println(c.equals(d));   // Prediction: ____
      ```

      <details>
      <summary>Reveal the answers</summary>

      - `a == b` → `true` — but only because Java **interns** string literals (puts them in a pool). Don't rely on this!
      - `c == d` → `false` — `new` creates separate objects. `==` checks identity, not content.
      - `c.equals(d)` → `true` — `.equals()` checks value equality.

      </details>

      ### The Rule

      **Always use `.equals()` for object comparison in Java.** Use `==` only for primitives (`int`, `double`, `boolean`, `char`).

      ### The Integer Cache Trap

      Java caches `Integer` objects for values -128 to 127. This means `==` on boxed integers **sometimes works and sometimes doesn't**:

      ```java
      Integer x = 127;
      Integer y = 127;
      System.out.println(x == y);     // true (cached — same object!)

      Integer p = 128;
      Integer q = 128;
      System.out.println(p == q);     // false (not cached — different objects!)
      System.out.println(p.equals(q)); // true (value equality)
      ```

      This is one of the most dangerous bugs in Java — it works in testing (small numbers) and fails in production (large numbers).

      ### Task — Fix the Bug

      The `IdentityTrap.java` file contains a student registry that uses `==` to compare strings and integers. It has **three bugs** caused by using `==` instead of `.equals()`. Find and fix all three.

      The program should output:
      ```
      Found: Alice
      Found: Bob
      Same course: true
      ```

      But currently it prints wrong results because of identity comparison.

    files:
      - path: "IdentityTrap.java"
        content: |
          public class IdentityTrap {
              public static void main(String[] args) {
                  // Bug 1: String comparison with ==
                  String input = new String("Alice");
                  String stored = new String("Alice");
                  if (input == stored) {                  // BUG: should use .equals()
                      System.out.println("Found: Alice");
                  } else {
                      System.out.println("Not found: Alice");
                  }

                  // Bug 2: Another string comparison
                  String name1 = "B" + "ob";
                  String name2 = new String("Bob");
                  if (name1 == name2) {                   // BUG: should use .equals()
                      System.out.println("Found: Bob");
                  } else {
                      System.out.println("Not found: Bob");
                  }

                  // Bug 3: Integer comparison with ==
                  Integer courseA = 200;
                  Integer courseB = 200;
                  if (courseA == courseB) {                 // BUG: should use .equals()
                      System.out.println("Same course: true");
                  } else {
                      System.out.println("Same course: false");
                  }
              }
          }
        language: "java"

    open_file: "IdentityTrap.java"

    solution:
      files:
        - path: "IdentityTrap.java"
          content: |
            public class IdentityTrap {
                public static void main(String[] args) {
                    // Fixed: Use .equals() for String comparison
                    String input = new String("Alice");
                    String stored = new String("Alice");
                    if (input.equals(stored)) {
                        System.out.println("Found: Alice");
                    } else {
                        System.out.println("Not found: Alice");
                    }

                    // Fixed: Use .equals() for String comparison
                    String name1 = "B" + "ob";
                    String name2 = new String("Bob");
                    if (name1.equals(name2)) {
                        System.out.println("Found: Bob");
                    } else {
                        System.out.println("Not found: Bob");
                    }

                    // Fixed: Use .equals() for Integer comparison
                    Integer courseA = 200;
                    Integer courseB = 200;
                    if (courseA.equals(courseB)) {
                        System.out.println("Same course: true");
                    } else {
                        System.out.println("Same course: false");
                    }
                }
            }
          language: "java"
      explanation: |
        All three bugs used `==` on objects. In Java, `==` checks **reference identity** (same object in memory), not value equality:

        - **Strings:** `new String("Alice")` creates a fresh object each time, so `==` returns `false` even though the content is identical. Use `.equals()`.
        - **Integers above 127:** Java caches `Integer` values -128 to 127, so `==` works for small numbers by accident. For 200, it fails. Always use `.equals()` for wrapper types.

        **The golden rule:** Use `==` for primitives (`int`, `double`, `char`, `boolean`). Use `.equals()` for everything else.

    tests:
      - description: "Finds Alice using .equals()"
        command: |
          public class __Test {
              public static void main(String[] args) {
                  String input = new String("Alice");
                  String stored = new String("Alice");
                  if (!input.equals(stored)) {
                      throw new RuntimeException("Alice comparison failed");
                  }
                  IdentityTrap.main(new String[]{});
              }
          }
        hints:
          - text: "Replace == with .equals() when comparing String objects"
            condition: "code_contains: input == stored"
          - text: "Replace == with .equals() when comparing the second pair of strings too"
            condition: "code_contains: name1 == name2"
      - description: "Compares Integers using .equals()"
        command: |
          public class __Test {
              public static void main(String[] args) {
                  Integer a = 200;
                  Integer b = 200;
                  if (!a.equals(b)) {
                      throw new RuntimeException("Integer comparison failed");
                  }
              }
          }
        hints:
          - text: "Integer values > 127 are NOT cached. Use .equals() instead of == for Integer comparison"
            condition: "code_contains: courseA == courseB"

    quiz:
      title: "Identity vs Equality"
      min_score: 0.75
      shuffle: true
      questions:
        - question: "What does `==` do when applied to two `String` objects in Java?"
          options:
            - "Compares their character content (value equality)"
            - "Checks if they are the exact same object in memory (reference equality)"
            - "Calls the .equals() method automatically"
            - "Compares their hash codes"
          correct_index: 1
          explanation: "In Java, `==` on objects always checks reference identity — whether two variables point to the same object. Use `.equals()` for value comparison."
        - question: "`Integer x = 100; Integer y = 100; System.out.println(x == y);` prints `true`. What happens if you change 100 to 200?"
          options:
            - "Still prints true — integers are always compared by value"
            - "Prints false — Java only caches Integer objects for -128 to 127"
            - "Compile error — you can't use == on Integer"
            - "Throws NullPointerException"
          correct_index: 1
          explanation: "Java caches Integer objects for -128 to 127 (the Integer cache). Outside this range, `new` objects are created, so `==` returns false. This is why you must always use `.equals()` for wrapper types."
        - question: "In Python, `'hello' == 'hello'` compares values. Which Java expression achieves the same thing?"
          options:
            - "`\"hello\" == \"hello\"`"
            - "`\"hello\".equals(\"hello\")`"
            - "`String.compare(\"hello\", \"hello\")`"
            - "`\"hello\".compareTo(\"hello\") == 0`"
          correct_index: 1
          explanation: "`.equals()` is the standard way to compare object values in Java. While `compareTo` also works for strings, `.equals()` is the idiomatic choice for equality checks."


