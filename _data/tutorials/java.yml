  # STEP 4 — Classes & Encapsulation (with UML)
  # Pedagogy: UML-First Design — read the UML, then implement
  #           Behavior-First — emphasize methods over fields
  #           Transfer Tutor — Java vs C++ access modifiers
  #           Bloom's: Apply (implement from specification)
  # --------------------------------------------------------------------------
  - title: "Classes & Encapsulation"
    uml_files:
      - BankAccount.java
    view: uml_diagram
    instructions: |
      ## Classes & Encapsulation

      > **Learning objective:** Implement a Java class from a UML class diagram, using proper encapsulation with access modifiers.

      > **Partial Transfer from C++:** Java classes look similar to C++ but differ in key ways: no header files, no destructors (GC handles memory), default access is **package-private** (not private like C++), and there are **four** access levels (not three).

      > **Transfer from Python:** Python has no real access control — just `_` naming conventions. Java enforces access at compile time.

      ### Java's Four Access Levels

      | Modifier | Class | Package | Subclass | World |
      |----------|-------|---------|----------|-------|
      | `private` | ✓ | ✗ | ✗ | ✗ |
      | *(none)* = package-private | ✓ | ✓ | ✗ | ✗ |
      | `protected` | ✓ | ✓ | ✓ | ✗ |
      | `public` | ✓ | ✓ | ✓ | ✓ |

      > **⚠ False Friend from C++:** In C++, the default access in a `class` is `private`. In Java, the default is **package-private** — accessible to any class in the same package. Always be explicit.

      ### UML Class Diagram

      Implement the following `BankAccount` class. In UML, `-` means private, `+` means public:

      <div class="uml-class-diagram-container" data-uml-type="class" data-uml-spec='@startuml
      class BankAccount {
        - owner: String
        - balance: double
        + BankAccount(owner: String, initialBalance: double)
        + deposit(amount: double): void
        + withdraw(amount: double): boolean
        + getBalance(): double
        + getOwner(): String
        + toString(): String
      }
      @enduml'></div>

      **Design notes:**
      - `withdraw` returns `boolean`: `true` if successful, `false` if insufficient funds (balance cannot go negative)
      - `deposit` should ignore non-positive amounts
      - `toString` should return `"BankAccount[owner=Alice, balance=1000.0]"`

      ### Task

      Implement the `BankAccount` class according to the UML diagram above. The `main` method is provided for testing.

    files:
      - path: "BankAccount.java"
        content: |
          public class BankAccount {
              // TODO: Declare private fields: owner (String) and balance (double)


              // TODO: Constructor taking owner and initialBalance


              // TODO: deposit(double amount) — add to balance if amount > 0


              // TODO: withdraw(double amount) — subtract if sufficient funds, return success


              // TODO: getBalance() — return current balance


              // TODO: getOwner() — return owner name


              // TODO: toString() — return "BankAccount[owner=..., balance=...]"


              public static void main(String[] args) {
                  BankAccount acct = new BankAccount("Alice", 1000.0);
                  System.out.println(acct);

                  acct.deposit(500.0);
                  System.out.println("After deposit: " + acct.getBalance());

                  boolean ok = acct.withdraw(200.0);
                  System.out.println("Withdraw 200: " + ok + ", balance: " + acct.getBalance());

