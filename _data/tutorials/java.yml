  # STEP 3 — Java's Dual Type System
  # Pedagogy: Transfer Tutor — contrast with Python (everything is object)
  #           and C++ (value types but no autoboxing)
  #           Component Skill Isolation — focus on types alone
  #           Bloom's: Understand + Apply
  # --------------------------------------------------------------------------
  - title: "Java's Dual Type System"
    instructions: |
      ## Java's Dual Type System: Primitives & Wrappers

      > **Learning objective:** Understand why Java has both primitives and wrapper objects, and recognize the traps of autoboxing.

      > **Partial Transfer:** C++ has primitives but no autoboxing. Python has only objects (everything is an object). Java has **both** — and automatically converts between them, sometimes dangerously.

      ### Two Worlds of Types

      Java has **8 primitive types** that live on the stack (like C++ value types):

      | Primitive | Size | Default | Wrapper Class |
      |-----------|------|---------|---------------|
      | `byte` | 8-bit | 0 | `Byte` |
      | `short` | 16-bit | 0 | `Short` |
      | `int` | 32-bit | 0 | `Integer` |
      | `long` | 64-bit | 0L | `Long` |
      | `float` | 32-bit | 0.0f | `Float` |
      | `double` | 64-bit | 0.0 | `Double` |
      | `char` | 16-bit | '\u0000' | `Character` |
      | `boolean` | 1-bit | false | `Boolean` |

      ### Why Wrappers Exist

      Java generics use **type erasure** (more in Step 7), which means they only work with objects, not primitives. You **cannot** write `ArrayList<int>` — you must write `ArrayList<Integer>`.

      ```java
      // ILLEGAL — generics don't accept primitives
      // ArrayList<int> numbers = new ArrayList<>();

      // LEGAL — use the wrapper class
      ArrayList<Integer> numbers = new ArrayList<>();
      numbers.add(42);         // autoboxing: int 42 → Integer.valueOf(42)
      int first = numbers.get(0);  // unboxing: Integer → int
      ```

      ### The Autoboxing Traps

      **Trap 1: Null unboxing causes NullPointerException**
      ```java
      Integer count = null;
      int n = count;    // NullPointerException! Can't unbox null.
      ```

      **Trap 2: Performance in loops**
      ```java
      // BAD — creates millions of Integer objects
      Integer sum = 0;
      for (int i = 0; i < 1_000_000; i++) {
          sum += i;  // unbox sum, add i, box result — every iteration!
      }

      // GOOD — use primitive type for accumulation
      int sum = 0;
      for (int i = 0; i < 1_000_000; i++) {
          sum += i;  // pure arithmetic, no boxing
      }
      ```

      ### Task

      Complete `TypeSystem.java`:

      1. Create an `ArrayList<Integer>` called `scores` and add the values 95, 87, 42, 73, 61
      2. Write a method `countAbove` that takes an `ArrayList<Integer>` and an `int` threshold, returning the count of values above the threshold
      3. In `main`, call `countAbove(scores, 70)` and print the result as `"Above 70: " + count`
      4. Also print the sum of all scores as `"Sum: " + sum` (use a primitive `int` for the sum — avoid the autoboxing trap!)

    files:
      - path: "TypeSystem.java"
        content: |
          import java.util.ArrayList;

          public class TypeSystem {

              // TODO: Write a static method countAbove(ArrayList<Integer> list, int threshold)
              // that returns the number of elements strictly above the threshold.


              public static void main(String[] args) {
                  // TODO: Create an ArrayList<Integer> called scores
                  // and add: 95, 87, 42, 73, 61

                  // TODO: Call countAbove(scores, 70) and print "Above 70: " + result

                  // TODO: Calculate sum of all scores using a primitive int
                  // and print "Sum: " + sum
              }
          }
        language: "java"

    open_file: "TypeSystem.java"

    solution:
      files:
        - path: "TypeSystem.java"
          content: |
            import java.util.ArrayList;

            public class TypeSystem {

                public static int countAbove(ArrayList<Integer> list, int threshold) {
                    int count = 0;
                    for (int val : list) {
                        if (val > threshold) {
                            count++;
                        }
                    }
                    return count;
                }

                public static void main(String[] args) {
                    ArrayList<Integer> scores = new ArrayList<>();
                    scores.add(95);
                    scores.add(87);
                    scores.add(42);
                    scores.add(73);
                    scores.add(61);

                    int above = countAbove(scores, 70);
                    System.out.println("Above 70: " + above);

                    int sum = 0;
                    for (int s : scores) {
                        sum += s;
                    }
                    System.out.println("Sum: " + sum);
                }
            }
          language: "java"
      explanation: |
        Notice how the enhanced for loop `for (int val : list)` automatically **unboxes** each `Integer` to `int`. We use a primitive `int` for `sum` to avoid creating a new `Integer` object on every iteration.

        The `countAbove` method takes `ArrayList<Integer>` (not `ArrayList<int>`) because Java generics require wrapper types. The `int threshold` parameter stays primitive since it's not in a generic context.

    tests:
      - description: "countAbove returns correct count"
        command: |
          import java.util.ArrayList;
          public class __Test {
              public static void main(String[] args) {
                  ArrayList<Integer> test = new ArrayList<>();
                  test.add(95);
                  test.add(87);
                  test.add(42);
                  test.add(73);
                  test.add(61);
                  int result = TypeSystem.countAbove(test, 70);
                  if (result != 3) {
                      throw new RuntimeException("countAbove(scores, 70) should return 3, got " + result);
                  }
              }
          }
        hints:
          - text: "countAbove should count elements STRICTLY above the threshold (>, not >=)"
            condition: "code_missing: countAbove"
      - description: "Prints the correct sum"
        command: |
          public class __Test {
              public static void main(String[] args) {
                  TypeSystem.main(new String[]{});
              }
          }
        hints:
          - text: "Use a primitive int for the sum variable to avoid the autoboxing performance trap"
            condition: "code_contains: Integer sum"
          - text: "Create an ArrayList<Integer> and add each score with scores.add(value)"
            condition: "code_missing: ArrayList"


