  #   Worked Example     — full refactoring of NotificationRouter shown.
  #   Sub-goal Labels    — comments mark each design decision.
  #   Guide-and-Release  — read the example, then apply pattern independently.
  #   Spaced Review      — SRP question in quiz revisits Step 2/3 concepts.
