    solution:
      files:
        - path: "cloud_storage.py"
          content: |
            from __future__ import annotations
            from abc import ABC, abstractmethod
            from typing import Dict, List, Optional


            # ── Fat interface — all storage capabilities in one ABC ──────────
            class CloudStorage(ABC):
                """Abstract base class for cloud storage services.
                Defines ALL storage capabilities in a single interface."""

                @abstractmethod
                def upload(self, file: str) -> bool:
                    """Upload a file to cloud storage. Returns True on success."""
                    ...

                @abstractmethod
                def download(self, file_id: str) -> str:
                    """Download a file by ID. Returns the file name."""
                    ...

                @abstractmethod
                def sync(self, device: str) -> bool:
                    """Sync files to a device. Returns True on success."""
                    ...

                @abstractmethod
                def share(self, file_id: str, user: str) -> str:
                    """Share a file with another user. Returns a share link."""
                    ...

                @abstractmethod
                def encrypt(self, file_id: str) -> bool:
                    """Encrypt a file. Returns True on success."""
                    ...

                @abstractmethod
                def get_version_history(self, file_id: str) -> List[str]:
                    """Get version history for a file. Returns list of version IDs."""
                    ...


            # ── Premium tier — implements everything ─────────────────────────
            class PremiumStorage(CloudStorage):
                """Premium cloud storage with all features."""

                def __init__(self) -> None:
                    self._files: Dict[str, str] = {}
                    self._next_id: int = 1
                    self._shared: Dict[str, str] = {}
                    self._synced_devices: List[str] = []
                    self._encrypted: List[str] = []
                    self._versions: Dict[str, List[str]] = {}

                def upload(self, file: str) -> bool:
                    file_id: str = f"file_{self._next_id}"
                    self._next_id += 1
                    self._files[file_id] = file
                    self._versions[file_id] = ["v1"]
                    print(f"[PREMIUM] Uploaded '{file}' as {file_id}")
                    return True

                def download(self, file_id: str) -> str:
                    if file_id not in self._files:
                        raise ValueError(f"File {file_id} not found")
                    print(f"[PREMIUM] Downloaded {file_id}")
                    return self._files[file_id]

                def sync(self, device: str) -> bool:
                    self._synced_devices.append(device)
                    print(f"[PREMIUM] Synced to {device}")
                    return True

                def share(self, file_id: str, user: str) -> str:
                    if file_id not in self._files:
                        raise ValueError(f"File {file_id} not found")
                    link: str = f"https://cloud.example.com/share/{file_id}?user={user}"
                    self._shared[file_id] = user
                    print(f"[PREMIUM] Shared {file_id} with {user}: {link}")
                    return link

                def encrypt(self, file_id: str) -> bool:
                    if file_id not in self._files:
                        raise ValueError(f"File {file_id} not found")
                    self._encrypted.append(file_id)
                    print(f"[PREMIUM] Encrypted {file_id}")
                    return True

                def get_version_history(self, file_id: str) -> List[str]:
                    if file_id not in self._versions:
                        raise ValueError(f"File {file_id} not found")
                    return list(self._versions[file_id])


            # ── Free tier — stub implementation ────────────────────────────
            class FreeStorage(CloudStorage):
                """Free cloud storage — upload and download only.
                sync, share, encrypt, and version history are NOT available."""

                def __init__(self) -> None:
                    self._files: Dict[str, str] = {}
                    self._next_id: int = 1

                def upload(self, file: str) -> bool:
                    file_id: str = f"file_{self._next_id}"
                    self._next_id += 1
                    self._files[file_id] = file
                    print(f"[FREE] Uploaded '{file}' as {file_id}")
                    return True

                def download(self, file_id: str) -> str:
                    if file_id not in self._files:
                        raise ValueError(f"File {file_id} not found")
                    print(f"[FREE] Downloaded {file_id}")
                    return self._files[file_id]

                def sync(self, device: str) -> bool:
                    raise NotImplementedError("Upgrade to Premium")

                def share(self, file_id: str, user: str) -> str:
                    raise NotImplementedError("Upgrade to Premium")

                def encrypt(self, file_id: str) -> bool:
                    raise NotImplementedError("Upgrade to Premium")

                def get_version_history(self, file_id: str) -> List[str]:
                    raise NotImplementedError("Upgrade to Premium")


            # ── A function that depends on the fat interface ──────────────────
            def backup_service(storage: CloudStorage) -> bool:
                """Backs up files by syncing to a backup device.
                Expects ANY CloudStorage — but crashes for FreeStorage!"""
                print("[BACKUP] Starting backup...")
                storage.upload("backup_manifest.txt")
                result: bool = storage.sync("backup-server-01")
                print(f"[BACKUP] Sync result: {result}")
                return result


            # ── Demo ──────────────────────────────────────────────────────────
            if __name__ == "__main__":
                print("=== Premium Storage ===")
                premium: PremiumStorage = PremiumStorage()
                premium.upload("report.pdf")
                premium.sync("laptop")
                premium.share("file_1", "colleague@example.com")
                premium.encrypt("file_1")
                print(f"Version history: {premium.get_version_history('file_1')}")
                print()

                print("=== Free Storage ===")
                free: FreeStorage = FreeStorage()
                free.upload("notes.txt")
                free.download("file_1")
                print()

                print("=== Backup Service (Premium — works) ===")
                backup_service(premium)
                print()

                print("=== Backup Service (Free — crashes!) ===")
                try:
                    backup_service(free)
                except NotImplementedError as e:
                    print(f"CRASH: {e}")
          language: "python"

        - path: "smart_home.py"
          content: |
            from __future__ import annotations
            from abc import ABC, abstractmethod
            from typing import Optional


            # ── Fat interface (kept for reference) ────────────────────────
            class SmartDevice(ABC):
                """Original fat interface — all capabilities in one ABC."""

                def __init__(self, name: str) -> None:
                    self.name: str = name

                @abstractmethod
                def play_music(self, song: str) -> str: ...

                @abstractmethod
                def set_temperature(self, degrees: float) -> float: ...

                @abstractmethod
                def lock_door(self) -> bool: ...

                @abstractmethod
                def dim_lights(self, brightness: int) -> int: ...


            class SmartLightBad(SmartDevice):
                """Fat-interface light — forced to stub 3 irrelevant methods."""

                def __init__(self, name: str) -> None:
                    super().__init__(name)
                    self._brightness: int = 100

                def play_music(self, song: str) -> str:
                    raise NotImplementedError("A light bulb cannot play music!")

                def set_temperature(self, degrees: float) -> float:
                    raise NotImplementedError("A light bulb has no thermostat!")

                def lock_door(self) -> bool:
                    raise NotImplementedError("A light bulb cannot lock doors!")

                def dim_lights(self, brightness: int) -> int:
                    self._brightness = max(0, min(100, brightness))
                    print(f"[{self.name}] Brightness set to {self._brightness}%")
                    return self._brightness


            # ── Segregated role interfaces (ISP-compliant) ────────────────
            class Dimmable(ABC):
                """Role interface for devices that control lighting."""

                def __init__(self, name: str) -> None:
                    self.name: str = name

                @abstractmethod
                def dim_lights(self, brightness: int) -> int:
                    """Set light brightness (0-100). Returns the new level."""
                    ...


            class Playable(ABC):
                """Role interface for devices that play audio."""

                def __init__(self, name: str) -> None:
                    self.name: str = name

                @abstractmethod
                def play_music(self, song: str) -> str:
                    """Play a song. Returns now-playing message."""
                    ...


            class TemperatureControllable(ABC):
                """Role interface for devices that control temperature."""

                def __init__(self, name: str) -> None:
                    self.name: str = name

                @abstractmethod
                def set_temperature(self, degrees: float) -> float:
                    """Set the target temperature. Returns the new setting."""
                    ...


            class Lockable(ABC):
                """Role interface for devices that control locks."""

                def __init__(self, name: str) -> None:
                    self.name: str = name

                @abstractmethod
                def lock_door(self) -> bool:
                    """Lock the door. Returns True if locked."""
                    ...


            # ── Concrete devices — each implements only its role ──────────
            class SmartLight(Dimmable):
                """A smart light bulb — only implements Dimmable."""

                def __init__(self, name: str) -> None:
                    super().__init__(name)
                    self._brightness: int = 100

                def dim_lights(self, brightness: int) -> int:
                    self._brightness = max(0, min(100, brightness))
                    print(f"[{self.name}] Brightness set to {self._brightness}%")
                    return self._brightness


            class SmartSpeaker(Playable):
                """A smart speaker — only implements Playable."""

                def __init__(self, name: str) -> None:
                    super().__init__(name)

                def play_music(self, song: str) -> str:
                    message: str = f"[{self.name}] Now playing: {song}"
                    print(message)
                    return message


            class SmartThermostat(TemperatureControllable):
                """A smart thermostat — only implements TemperatureControllable."""

                def __init__(self, name: str) -> None:
                    super().__init__(name)
                    self._temperature: float = 72.0

                def set_temperature(self, degrees: float) -> float:
                    self._temperature = degrees
                    print(f"[{self.name}] Temperature set to {self._temperature}F")
                    return self._temperature


            class SmartLock(Lockable):
                """A smart lock — only implements Lockable."""

                def __init__(self, name: str) -> None:
                    super().__init__(name)
                    self._locked: bool = False

                def lock_door(self) -> bool:
                    self._locked = True
                    print(f"[{self.name}] Door locked")
                    return True


            # ── Demo ──────────────────────────────────────────────────────
            if __name__ == "__main__":
                print("=== ISP-Compliant Smart Home ===")
                light: SmartLight = SmartLight("Living Room Light")
                light.dim_lights(50)

                speaker: SmartSpeaker = SmartSpeaker("Kitchen Speaker")
                speaker.play_music("Bohemian Rhapsody")

                thermo: SmartThermostat = SmartThermostat("Bedroom Thermostat")
                thermo.set_temperature(68.0)

                lock: SmartLock = SmartLock("Front Door Lock")
                lock.lock_door()
          language: "python"

      explanation: |
        **The pain of a fat interface:**

        `FreeStorage` is forced to implement four methods (`sync`, `share`, `encrypt`, `get_version_history`) that it fundamentally cannot support. Each one raises `NotImplementedError("Upgrade to Premium")`.

        This is problematic for two reasons:

        1. **Runtime crashes:** `backup_service()` accepts any `CloudStorage`, calls `sync()`, and crashes when given a `FreeStorage` instance. The type system says it is valid — the runtime says otherwise.
        2. **LSP violation:** `FreeStorage` is a subtype of `CloudStorage` but cannot fulfill the full `CloudStorage` contract. Any code that depends on `CloudStorage` and calls `sync()` will break.

        **The ISP solution** (which you will apply in the exercise below) is to split `CloudStorage` into role-based interfaces: `Uploadable`, `Downloadable`, `Syncable`, etc. Then `FreeStorage` only implements `Uploadable` and `Downloadable`, and `backup_service()` would require `Syncable` — catching the mismatch at design time.

