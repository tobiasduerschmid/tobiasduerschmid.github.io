      - description: "Dependency injection is used (no direct instantiation of FileLogger/CsvReportWriter in service classes)"
        command: |
          import ast
          source: str = open('/tutorial/library_system.py').read()
          tree: ast.Module = ast.parse(source)

          violations: list[str] = []
          service_classes: set[str] = {
              'CheckoutService', 'NotificationService',
              'InventoryReporter', 'LibrarySystem',
          }

          for node in ast.walk(tree):
              if isinstance(node, ast.ClassDef) and node.name in service_classes:
                  for child in ast.walk(node):
                      if isinstance(child, ast.Call):
                          func = child.func
                          name: str = ""
                          if isinstance(func, ast.Name):
                              name = func.id
                          elif isinstance(func, ast.Attribute):
                              name = func.attr
                          if name in ('FileLogger', 'CsvReportWriter'):
                              violations.append(
                                  f"{node.name} directly instantiates "
                                  f"{name}()"
                              )

          assert len(violations) == 0, \
              "DIP violation: " + "; ".join(violations) + \
              ". Inject Logger and ReportWriter abstractions via " \
              "constructor parameters instead."
