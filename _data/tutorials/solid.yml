    solution:
      files:
        - path: "violations_gallery.py"
          content: |
            from abc import ABC, abstractmethod
            from typing import Optional


            # ── Snippet 1 ─────────────────────────────────────────────────────
            # DIAGNOSIS: SRP violation — this class formats messages AND writes
            # to files. The formatting actor (who decides timestamp/uppercase
            # policy) and the persistence actor (who decides where logs go) are
            # coupled. A format change breaks the writer and vice versa.
            class Logger:
                """Handles application logging."""

                def __init__(self, log_path: str) -> None:
                    self.log_path: str = log_path

                def log(self, message: str) -> None:
                    formatted: str = self._format_message(message)
                    self._write_to_file(formatted)

                def _format_message(self, message: str) -> str:
                    import datetime
                    timestamp: str = datetime.datetime.now().isoformat()
                    return f"[{timestamp}] {message.upper()}"

                def _write_to_file(self, formatted_message: str) -> None:
                    with open(self.log_path, "a") as f:
                        f.write(formatted_message + "\n")


            # ── Snippet 2 ─────────────────────────────────────────────────────
            # DIAGNOSIS: OCP violation — adding a new discount type (e.g.,
            # "holiday") requires modifying the if/elif chain inside this class
            # instead of extending it. A strategy or registry pattern would let
            # new discounts be added without touching existing code.
            class DiscountEngine:
                """Calculates discounts for an e-commerce store."""

                def calculate_discount(self, order_total: float, discount_type: str) -> float:
                    if discount_type == "seasonal":
                        return order_total * 0.10
                    elif discount_type == "clearance":
                        return order_total * 0.25
                    elif discount_type == "employee":
                        return order_total * 0.30
                    elif discount_type == "loyalty":
                        return order_total * 0.15
                    else:
                        raise ValueError(f"Unknown discount type: {discount_type}")


            # ── Snippet 3 ─────────────────────────────────────────────────────
            # DIAGNOSIS: LSP violation — PremiumUser cannot be substituted for
            # User because calling free_trial_signup() raises RuntimeError
            # instead of returning a string. Any code that iterates over a
            # list[User] and calls free_trial_signup() will crash on PremiumUser.
            class User:
                """Base class for application users."""

                def __init__(self, username: str, email: str) -> None:
                    self.username: str = username
                    self.email: str = email

                def login(self) -> str:
                    return f"{self.username} logged in"

                def free_trial_signup(self) -> str:
                    return f"{self.username} signed up for free trial"


            class PremiumUser(User):
                """A user with a paid subscription."""

                def __init__(self, username: str, email: str, plan: str) -> None:
                    super().__init__(username, email)
                    self.plan: str = plan

                def free_trial_signup(self) -> str:
                    raise RuntimeError(
                        f"{self.username} is already on the {self.plan} plan. "
                        "Premium users cannot sign up for a free trial."
                    )


            # ── Snippet 4 ─────────────────────────────────────────────────────
            # DIAGNOSIS: ISP violation — a simple database client that only needs
            # connect/query/disconnect is forced to implement cache_query(),
            # replicate(), and shard(). These are enterprise features that most
            # clients do not need. The interface should be split into smaller,
            # role-specific interfaces.
            class DatabaseClient(ABC):
                """Abstract interface for all database clients."""

                @abstractmethod
                def connect(self, connection_string: str) -> None: ...

                @abstractmethod
                def query(self, sql: str) -> list[dict[str, object]]: ...

                @abstractmethod
                def disconnect(self) -> None: ...

                @abstractmethod
                def cache_query(self, sql: str, ttl_seconds: int) -> list[dict[str, object]]: ...

                @abstractmethod
                def replicate(self, target_host: str) -> None: ...

                @abstractmethod
                def shard(self, shard_key: str, num_shards: int) -> None: ...


            # ── Snippet 5 ─────────────────────────────────────────────────────
            # DIAGNOSIS: DIP violation — ReportGenerator (high-level policy)
            # directly instantiates PdfRenderer and SqlConnection (low-level
            # details) in its __init__. It should depend on abstractions
            # (e.g., a Renderer ABC and a DataSource ABC) injected via the
            # constructor, not on concrete classes.
            class PdfRenderer:
                """Renders content to PDF format."""

                def render(self, content: str) -> bytes:
                    return f"<PDF>{content}</PDF>".encode()


            class SqlConnection:
                """Connects to a SQL database."""

                def fetch(self, query: str) -> list[dict[str, str]]:
                    return [{"id": "1", "data": "sample"}]


            class ReportGenerator:
                """Generates reports from database data."""

                def __init__(self) -> None:
                    self.renderer: PdfRenderer = PdfRenderer()
                    self.db: SqlConnection = SqlConnection()

                def generate(self, report_name: str) -> bytes:
                    data: list[dict[str, str]] = self.db.fetch(
                        f"SELECT * FROM {report_name}"
                    )
                    content: str = "\n".join(
                        str(row) for row in data
                    )
                    return self.renderer.render(content)


            # ── Snippet 6 ─────────────────────────────────────────────────────
            # DIAGNOSIS: No violation — UserValidator follows all five SOLID
            # principles:
            #   SRP: single responsibility (validate user input)
            #   OCP: new rules can be added without modifying UserValidator
            #   LSP: any ValidationRule subclass is safely substitutable
            #   ISP: ValidationRule has exactly one method — minimal interface
            #   DIP: UserValidator depends on the ValidationRule abstraction,
            #        not on concrete rule classes
            class ValidationRule(ABC):
                """Interface for a single validation rule."""

                @abstractmethod
                def validate(self, value: str) -> Optional[str]:
                    """Return an error message if invalid, None if valid."""
                    ...


            class NotEmptyRule(ValidationRule):
                def validate(self, value: str) -> Optional[str]:
                    if not value.strip():
                        return "Value must not be empty"
                    return None


            class MaxLengthRule(ValidationRule):
                def __init__(self, max_length: int) -> None:
                    self.max_length: int = max_length

                def validate(self, value: str) -> Optional[str]:
                    if len(value) > self.max_length:
                        return f"Value must be at most {self.max_length} characters"
                    return None


            class UserValidator:
                """Validates user input against a configurable set of rules."""

                def __init__(self, rules: list[ValidationRule]) -> None:
                    self.rules: list[ValidationRule] = rules

                def validate(self, value: str) -> list[str]:
                    errors: list[str] = []
                    for rule in self.rules:
                        error: Optional[str] = rule.validate(value)
                        if error is not None:
                            errors.append(error)
                    return errors
