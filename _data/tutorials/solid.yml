            - "    def send(self, user, message, channel_name):"
            - "        self._channels[channel_name].deliver(user, message)"
          distractors:
            - "    if channel_name == \"email\":"
            - "    elif channel_name == \"sms\":"
            - "        self._channels.append(channel_name)"
          explanation: |
            The correct order defines: (1) the ABC import, (2) the abstract `NotificationChannel` with a `deliver` method, (3) a concrete `EmailChannel` that implements `deliver`, and (4) a `NotificationRouter` that delegates to channel objects via a dictionary lookup.
            The distractors use if/elif chains and list appends — these are the old OCP-violating patterns. The polymorphic design replaces if/elif with dictionary dispatch and method delegation.

        - question: |
            In the refactored `ReportExporter`, you created separate classes for `CsvFormat`, `JsonFormat`, and `TextFormat`. **Thinking back to the Single Responsibility Principle (SRP):** does each format class have one reason to change?
          type: single
          options:
            - "No — each class handles both formatting and export coordination, which are two responsibilities"
            - "Yes — each class changes only when the serialization rules for its specific format change (e.g., CsvFormat changes only if CSV formatting rules change)"
            - "No — all three classes share the same abstract base class, so a change to ExportFormat forces all of them to change"
            - "Yes — but only because they are small classes; SRP does not apply to classes with fewer than 50 lines"
          correct_index: 1
          explanation: |
            Each concrete format class has exactly **one reason to change**: when the serialization rules for *that specific format* change. `CsvFormat` only changes if CSV formatting needs to change; `JsonFormat` only changes for JSON-related reasons. This is SRP in action.
            Sharing an abstract base class does not violate SRP — the ABC defines a *contract*, and adding a new abstract method is rare and deliberate. SRP applies regardless of class size.

        - question: |
            A teammate proposes adding a `MarkdownFormat` to the refactored `ReportExporter`. Which files or classes would they need to **modify**?
          type: single
          options:
            - "They must modify `ReportExporter.export()` to add a new elif branch for 'markdown'"
            - "They must modify `ExportFormat` to add a `to_markdown()` method alongside `format_report()`"
            - "They only need to create a new `MarkdownFormat` class extending `ExportFormat` and register it with the exporter — no existing code changes"
            - "They must modify all three existing format classes to ensure compatibility with the new format"
          correct_index: 2
          explanation: |
            This is the payoff of OCP. Adding a new format means writing a **new** `MarkdownFormat(ExportFormat)` class and registering it. The `ReportExporter` class, the `ExportFormat` ABC, and all existing format classes remain untouched.
            Compare this to Step 4, where adding Slack required editing the `NotificationRouter` class directly.

        - question: |
            Which of the following are **benefits** of the refactored polymorphic design over the original if/elif chain?
          type: multiple
          options:
            - "Each format can be unit-tested independently without loading unrelated format logic"
            - "New formats can be added without risking regressions in existing, tested formats"
            - "The ReportExporter class is shorter and easier to understand because it only handles dispatch, not serialization details"
            - "The polymorphic design uses less memory because abstract classes are more efficient than if/elif chains"
          correct_indices: [0, 1, 2]
          explanation: |
            The first three are genuine benefits of the OCP-compliant design. Each format class is independently testable (benefit 1), new formats do not touch existing code (benefit 2), and the exporter is simpler because it delegates details to the format objects (benefit 3).
            The fourth option is false — polymorphism does not inherently save memory, and in Python the difference is negligible. The benefits of OCP are about **maintainability and safety**, not performance.
  # --------------------------------------------------------------------------
  # STEP 6 — LSP: Broken Promises (Liskov Substitution Principle)
  # Pedagogy:
  #   Pain-first          — checkout() breaks when GiftCardProcessor is added.
  #   Predict-before-run  — students predict what fails before running tests.
  #   Worked Example       — split into PaymentProcessor / RefundableProcessor.
  #   Transfer Exercise    — MediaPlayer hierarchy with same LSP violation.
  #   Bloom's level        — Understand / Apply / Analyze / Evaluate (quiz).
  # --------------------------------------------------------------------------
  - title: "LSP — Broken Promises"
    instructions: |
      ## The Liskov Substitution Principle

      > **Learning objective:** After this step you will be able to **identify** LSP violations caused by strengthened preconditions or weakened postconditions, **explain** why returning a failure value still violates the contract, and **fix** a broken hierarchy by splitting interfaces.

      ### The Principle

      Barbara Liskov's rule (1987) boils down to one sentence:

      > *If S is a subtype of T, then objects of type T may be replaced with objects of type S without altering any desirable property of the program.*

      In everyday terms: **inheritance means preserving behavioral promises.** A subclass must:

      - **Accept AT LEAST what the parent accepts** (preconditions may be equal or *weaker*)
      - **Guarantee AT LEAST what the parent guarantees** (postconditions may be equal or *stronger*)

      Violate either rule and code that depends on the parent's contract will break when it encounters the subclass.

      ### The Payment Processing System

      Open `payments.py`. You will find a working payment system:

      - `PaymentProcessor` (ABC) — defines two methods:
        - `process_payment(amount)` — accepts any positive amount, returns `{"success": True, "txn_id": ...}`
        - `refund(txn_id)` — returns `{"success": True, "amount": ...}`
      - `CreditCardProcessor` — honors the full contract
      - `DebitCardProcessor` — honors the full contract
      - `checkout(processors, amounts)` — iterates processors polymorphically: processes all payments, stores transaction IDs, then refunds them all (simulating a test/rollback scenario)

      Run the tests now. They pass.

      ### Predict Before You Code

      Your task is to add a `GiftCardProcessor` that breaks the contract in two ways. Before writing it, predict: *which* of the two checkout operations (process or refund) will fail first, and why?

      ### Task

      Add a `GiftCardProcessor` class to `payments.py` that inherits from `PaymentProcessor` and:

      1. **Strengthens the precondition:** `process_payment(amount)` rejects amounts greater than the card's balance (even though the base class accepts any positive amount). Raise a `ValueError` with the message `"Insufficient gift card balance"`.
      2. **Weakens the postcondition:** `refund(txn_id)` returns `{"success": False, "error": "Gift cards are non-refundable"}` instead of actually refunding.

      Give the constructor a `balance` parameter (e.g., `GiftCardProcessor(balance=25.00)`).

      After adding `GiftCardProcessor`, update `test_checkout_with_refund()` in `test_payments.py` to include it in the processor list (with a balance of `25.00` and an amount of `50.00`). Watch the test fail.

      ### Why Is Returning `{"success": False}` a Violation?

      A common reaction: *"But I am returning a dict with the right keys — I am just setting success to False."*

      The postcondition of `refund()` is not merely "return a dict." It is **"successfully refund the transaction and return the refunded amount."** Callers depend on this guarantee. A function that silently fails while claiming to conform to the interface is *more dangerous* than one that raises an exception — because the caller has no reason to check for failure.

      ### The Fix: Split the Interface

      The root problem is that `GiftCardProcessor` is forced to implement `refund()` even though gift cards cannot be refunded. The fix:

      ```python
      from __future__ import annotations
      from abc import ABC, abstractmethod

      class PaymentProcessor(ABC):
          """Can process payments. No refund guarantee."""

          @property
          def max_amount(self) -> float | None:
              """Maximum amount this processor accepts. None means no limit."""
              return None

          @abstractmethod
          def process_payment(self, amount: float) -> dict[str, str | bool]:
              ...

      class RefundableProcessor(PaymentProcessor):
          """Can process payments AND refund them."""

          @abstractmethod
          def refund(self, txn_id: str) -> dict[str, str | float | bool]:
              ...
      ```

      Now:
      - `CreditCardProcessor` and `DebitCardProcessor` extend `RefundableProcessor`
      - `GiftCardProcessor` extends only `PaymentProcessor` and overrides `max_amount`
      - `checkout_with_refund()` accepts only `RefundableProcessor` instances
      - Code that only needs to charge (no refund) accepts any `PaymentProcessor`

      This is the **Interface Segregation Principle** (ISP) working hand-in-hand with LSP.

      ### Exercise: Fix the MediaPlayer Hierarchy

      Open `media_player.py`. A `MediaPlayer` ABC declares `play()`, `stop()`, `seek(position)`, and `get_duration()`. `AudioFilePlayer` and `VideoFilePlayer` work fine. But `LiveStreamPlayer` inherits all four methods and raises `NotImplementedError` on `seek()` and `get_duration()`.

      The `playlist_renderer(players)` function iterates all players and renders a progress bar using `get_duration()` and `seek()`. It crashes on live streams.

      **Your task:** Refactor the hierarchy so that `LiveStreamPlayer` does not pretend to support seeking or duration. A `render_playlist(players)` function should be able to handle all player types safely, rendering progress bars only for seekable players.

      **Hint:** Split `MediaPlayer` into a base with `play()`/`stop()`, and a `SeekablePlayer` subclass that adds `seek()`/`get_duration()`. Use `isinstance()` checks or separate lists in the renderer.

