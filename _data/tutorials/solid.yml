                    if guest_name not in self.invitations:
                        raise ValueError(f"No invitation sent to {guest_name}")
                    if status not in ("accepted", "declined"):
                        raise ValueError(f"Invalid RSVP status: {status}")
                    self.invitations[guest_name] = status

                def get_rsvp_summary(self) -> str:
                    """Return counts of sent, accepted, and declined."""
                    summary = {"sent": 0, "accepted": 0, "declined": 0}
                    for status in self.invitations.values():
                        summary[status] += 1
                    return summary


