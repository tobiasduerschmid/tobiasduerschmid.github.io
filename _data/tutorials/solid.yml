      files:
        - path: "notification_router.py"
          content: |
            from __future__ import annotations


            class NotificationRouter:
                """Routes notifications to the appropriate channel.

                Supports email, SMS, push, and Slack notification channels,
                each with its own formatting, rate limiting, and delivery logic.

                NOTE: This if/elif design works but violates the Open/Closed
                Principle. Every new channel forces us to modify this class.
                Step 5 will show a better approach.
                """

                def __init__(self) -> None:
                    self._send_counts = {
                        "email": 0,
                        "sms": 0,
                        "push": 0,
                        "slack": 0,
                    }
                    self._rate_limits = {
                        "email": 100,   # max 100 emails per hour
                        "sms": 50,      # max 50 SMS per hour
                        "push": -1,     # unlimited push notifications
                        "slack": 200,   # max 200 Slack messages per hour
                    }
                    self.last_sent_message = None  # for testing

                def send_notification(self, user: str, message: str, channel: str) -> str:
                    """Format, rate-check, and deliver a notification.

                    Args:
                        user: Recipient username or identifier.
                        message: The raw notification text.
                        channel: One of "email", "sms", "push", "slack".

                    Returns:
                        str describing the result, or an error message.
                    """
                    if channel == "email":
                        # --- Email formatting: wrap in HTML tags ---
                        formatted = (
                            f"<html><body>"
                            f"<h1>Notification</h1>"
                            f"<p>{message}</p>"
                            f"</body></html>"
                        )

                        # --- Email rate limiting: 100/hr ---
                        if self._rate_limits["email"] != -1:
                            if self._send_counts["email"] >= self._rate_limits["email"]:
                                return f"Rate limit exceeded for email (max {self._rate_limits['email']}/hr)"
                        self._send_counts["email"] += 1

                        # --- Email delivery ---
                        print(f"[EMAIL] Delivering to {user}: {formatted}")
                        self.last_sent_message = formatted
                        return f"Email sent to {user}"

                    elif channel == "sms":
                        # --- SMS formatting: truncate to 160 characters ---
                        if len(message) > 160:
                            formatted = message[:157] + "..."
                        else:
                            formatted = message

                        # --- SMS rate limiting: 50/hr ---
                        if self._rate_limits["sms"] != -1:
                            if self._send_counts["sms"] >= self._rate_limits["sms"]:
                                return f"Rate limit exceeded for sms (max {self._rate_limits['sms']}/hr)"
                        self._send_counts["sms"] += 1

                        # --- SMS delivery ---
                        print(f"[SMS] Delivering to {user}: {formatted}")
                        self.last_sent_message = formatted
                        return f"SMS sent to {user}"

                    elif channel == "push":
                        # --- Push formatting: add bell icon prefix ---
                        formatted = f"\U0001f514 {message}"

                        # --- Push rate limiting: unlimited ---
                        # (no rate limit check needed)
                        self._send_counts["push"] += 1

                        # --- Push delivery ---
                        print(f"[PUSH] Delivering to {user}: {formatted}")
                        self.last_sent_message = formatted
                        return f"Push notification sent to {user}"

                    elif channel == "slack":
                        # --- Slack formatting: bold header + clipboard emoji ---
                        lines = message.split("\n", 1)
                        header = f"*{lines[0]}*"
                        body = lines[1] if len(lines) > 1 else ""
                        formatted = f"{header}\n\U0001f4cb {body}" if body else f"{header}\n\U0001f4cb {lines[0]}"

                        # --- Slack rate limiting: 200/hr ---
                        if self._rate_limits["slack"] != -1:
                            if self._send_counts["slack"] >= self._rate_limits["slack"]:
                                return f"Rate limit exceeded for slack (max {self._rate_limits['slack']}/hr)"
                        self._send_counts["slack"] += 1

                        # --- Slack delivery ---
                        print(f"[SLACK] Delivering to {user}: {formatted}")
                        self.last_sent_message = formatted
                        return f"Slack notification sent to {user}"

                    else:
                        return f"Unknown channel: {channel}"


            # --- Quick smoke test ---
            if __name__ == "__main__":
                router = NotificationRouter()
                print(router.send_notification("alice", "Your order has shipped!", "email"))
                print(router.send_notification("bob", "Your package arrives today.", "sms"))
                print(router.send_notification("carol", "Flash sale — 50% off!", "push"))
                print(router.send_notification("dave", "Deploy complete\nAll services healthy.", "slack"))
          language: "python"
      explanation: |
        We added a `"slack"` elif branch that follows the same pattern as the other channels:

        1. **Formatting** — The first line of the message is bolded with Slack markdown (`*...*`) and the rest is prefixed with a clipboard emoji.
        2. **Rate limiting** — Checks against a 200/hr limit, same pattern as email and SMS.
        3. **Delivery** — Prints `[SLACK] Delivering to ...` to simulate sending.

        **This works, but notice the cost:** to add one channel we had to modify the `NotificationRouter` class, touch `__init__` (add to two dictionaries), and add ~15 lines inside `send_notification`. If we had 20 channels, this method would be hundreds of lines long, and every new channel risks accidentally breaking an existing one. This is exactly the problem the Open/Closed Principle addresses — and we will fix it in Step 5.

