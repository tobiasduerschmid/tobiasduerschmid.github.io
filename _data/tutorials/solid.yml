  # STEP 3 — "SRP — Refactor & Practice"
  # Pedagogy:
  #   Worked Example      — show the EmployeeManager refactoring with sub-goal labels.
  #   Faded Scaffolding   — provide class stubs with some methods, others as TODO.
  #   Transfer Task       — apply SRP to a new domain (event planning).
