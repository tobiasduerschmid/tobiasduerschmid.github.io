    quiz:
      title: "DIP — Knowledge Check"
      min_score: 0.75
      shuffle: true
      questions:

        - question: |
            What is the difference between the Dependency Inversion Principle (DIP) and Dependency Injection (DI)?
          type: single
          options:
            - "They are the same thing — different names for the same concept"
            - "DIP is a mechanism for passing dependencies; DI is an architectural decision"
            - "DIP is an architectural decision to depend on abstractions; DI is a mechanism for delivering dependencies (one way to implement DIP)"
            - "DIP only applies to databases; DI only applies to HTTP clients"
          correct_index: 2
          explanation: |
            **DIP** is *what*: depend on abstractions, not concretions. **DI** is *how*: deliver dependencies via constructor, setter, or container. DI is one way — the most common way — to implement DIP. But you can do DI without DIP (injecting a concrete class) and DIP without DI (using a factory or service locator). Mixing them up is the single biggest source of confusion around this principle.

        - question: |
            In the `WeatherDashboard` refactor, who should own the `WeatherProvider` abstraction — the dashboard module or the OpenWeatherMap module?
          type: single
          options:
            - "The OpenWeatherMap module — it's the one providing the data"
            - "The dashboard module — the abstraction describes what the high-level module needs"
            - "A separate 'abstractions' module that neither owns"
            - "It doesn't matter who owns it as long as it exists"
          correct_index: 1
          explanation: |
            The high-level module **owns** the abstraction. The interface is shaped by what *the dashboard needs to ask*, not by what OpenWeatherMap happens to offer. If OpenWeatherMap had an interface file, the dashboard could be trapped by its choices — it could never switch to a different provider without touching the interface. When the dashboard owns the abstraction, any provider must conform to *its* spec.

        - question: |
            A teammate says: "I added Dependency Inversion by making my class accept `PostgresDatabase` via its constructor instead of creating it inside the method."

            Is this actually DIP?
          type: single
          options:
            - "Yes — passing dependencies via the constructor is Dependency Inversion"
            - "No — this is Dependency Injection, but the class still depends on the concrete PostgresDatabase. To achieve DIP, the parameter should be an abstract interface like OrderRepository"
            - "Yes — as long as the constructor has a default value, it counts"
            - "No — DIP requires using a dependency injection framework like Spring"
          correct_index: 1
          explanation: |
            Classic misconception. Passing `PostgresDatabase` via constructor is **Dependency Injection** (delivering the dependency externally), but not **Dependency Inversion** (depending on an abstraction). To satisfy DIP, the parameter type should be an abstract interface (`OrderRepository`), not a concrete class. Your class should not know or care whether it's talking to Postgres, MySQL, or an in-memory fake.

        - question: |
            Which of the following are benefits of applying DIP to the `WeatherDashboard`?
          type: multiple
          options:
            - "Unit tests can verify caching logic without connecting to OpenWeatherMap or MongoDB"
            - "You can swap OpenWeatherMapClient for a different weather API without changing WeatherDashboardDIP"
            - "The code runs faster in production because abstractions are faster than concrete classes"
            - "You can use a Redis cache instead of MongoDB by implementing the WeatherCache interface"
          correct_indices: [0, 1, 3]
          explanation: |
            DIP gives you **testability** (use fakes instead of real services), **flexibility** (swap implementations without changing the high-level module), and **extensibility** (new providers or caches just implement the interface). It does **not** make code faster — abstractions add a tiny layer of indirection. The real win is being able to test properly and catch bugs early.

        - question: |
            A student "applies DIP" by extracting a `WeatherProvider` ABC that mirrors OpenWeatherMap's full API — identical method names and parameters, including obscure endpoints the dashboard never calls. Why is this still a DIP violation (in spirit)?
          type: single
          options:
            - "Because it has too many methods — DIP requires minimal interfaces"
            - "Because the abstraction is shaped by the low-level module's capabilities, not the high-level module's needs — the dependency still flows the wrong direction"
            - "Because ABCs shouldn't have the same method names as concrete classes"
            - "Because DIP requires using Protocols, not ABCs"
          correct_index: 1
          explanation: |
            This is the "indirection without inversion" trap. The *shape* of a true DIP abstraction comes from the high-level module's needs. If you start by mirroring the concrete class, you're still tied to its design decisions — swap the provider and you'll either carry dead interface methods or break something. The tell: if you ask "what does my high-level module actually call?" and the answer is a subset of the ABC you defined, the ABC is too wide.

  # --------------------------------------------------------------------------
  # STEP 10 — "Integration — Which Principle?"
  # Pedagogy:
  #   Interleaving         — mix all five principles in random order.
  #   Discrimination Tasks — students must distinguish which principle applies.
  #   Spaced Retrieval     — recall each principle from earlier steps.
  #   Bloom's level        — Analyze / Evaluate (quiz).
  # --------------------------------------------------------------------------
  - title: "Integration — Which Principle?"
    instructions: |
      ## Can You Spot the Violation?

      > **Learning objective:** After this step you will be able to **identify** which SOLID principle (if any) a given code snippet violates, and **justify** your diagnosis.

      ### Why This Matters

      In real code reviews, violations don't come with labels. You have to look at a class and *recognize the smell* from its structure alone. This exercise mixes all five principles so you practice **discrimination** — telling similar-looking problems apart.

      ### Your Task

      Open `violations_gallery.py`. It has six numbered classes. For each one:

      1. **Read** the class carefully.
      2. **Decide** which SOLID principle it violates — or whether it's actually well-designed.
      3. **Add a comment** at the top of each class with your diagnosis:

      ```python
      # DIAGNOSIS: <principle> violation — <one-sentence reason>
      # Example: "SRP violation — class handles both formatting and persistence"
      ```

      If a class follows all SOLID principles, write:

      ```python
      # DIAGNOSIS: No violation — <brief justification>
      ```

      **Hint:** Exactly one of the six classes has no violation. Don't assume everything is broken.

      ### Thinking Checklist

      For each class, run through these:
      - **SRP:** Does this class serve more than one actor?
      - **OCP:** Would I need to modify this class (not extend it) to add a new variant?
      - **LSP:** Could a subclass be swapped in for its parent without breaking things?
      - **ISP:** Are implementers forced to depend on methods they don't use?
      - **DIP:** Does a high-level module directly depend on a concrete low-level module?

    files:
