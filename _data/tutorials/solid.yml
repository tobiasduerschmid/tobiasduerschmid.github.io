title: "SOLID Design Principles: Writing Code That Welcomes Change"
description: "Learn the SOLID principles by feeling the pain of rigid code first, then refactoring step by step. Each principle is motivated by a realistic scenario where a simple change request exposes a design flaw — and the principle shows you how to fix it."

backend: pyodide

uml_diagram: true
require_tests: true
autosave_type: files

setup_commands:
  - "import sys; sys.path.insert(0, '/tutorial'); import abc"

steps:

  # --------------------------------------------------------------------------
  # STEP 1 — "Why Design Principles?" (Motivation)
  # Pedagogy:
  #   Productive Failure — students struggle with tangled code on purpose.
  #   Growth Mindset     — errors are expected and the point of this exercise.
  #   Bloom's level      — Apply / Analyze (quiz).
  # --------------------------------------------------------------------------
  - title: "Why Design Principles?"
    instructions: |
      ## When One Change Breaks Everything

      > **Learning objective:** After this step you will be able to **identify** the symptoms of rigid, tightly coupled code and **explain** why design principles exist.

      ### The Scenario

      You have inherited a `CourseManager` class from a colleague who left the company. It handles *everything*: student enrollment, grade calculation, GPA formatting, HTML report generation, and email notifications. It works — for now.

      Your manager has two change requests:

      1. **Finance Team:** Switch the grading scale from letter grades (A/B/C/D/F) to a **4.0 numeric scale** (4.0/3.0/2.0/1.0/0.0).
      2. **Registrar's Office:** Change the report format from **HTML** to **JSON**.

      ### Your Task

      Open `course_manager.py` and try to make **both changes**. You will discover a painful problem: the private helper `_format_grade()` is used by *both* `calculate_gpa()` *and* `generate_report()`. Changing it for one purpose breaks the other.

      **This is the point of the exercise.** You are meant to feel the friction. Do your best to make both changes work — any modification counts. There is no single "correct" answer here.

      ### A Note About Errors

      You will almost certainly break things while making these changes. That is completely normal and expected — in fact, it is the whole lesson. Every professional developer has inherited code like this. The errors you encounter are not a sign that you are doing something wrong; they are evidence of a design problem in the original code. Read error messages carefully and keep experimenting.

    files:
      - path: "course_manager.py"
        content: |
          from __future__ import annotations


          class CourseManager:
              """Monolithic class handling all course-related operations."""

              def __init__(self) -> None:
                  self._students = {}  # {student_id: {"name": str, "courses": {course: grade}}}
                  self._grade_weights = {"A": 4.0, "B": 3.0, "C": 2.0, "D": 1.0, "F": 0.0}
                  self._email_log = []

              # ── Enrollment ──────────────────────────────────────────────
              def enroll_student(self, student_id: str, name: str) -> None:
                  if student_id in self._students:
                      raise ValueError(f"Student {student_id} is already enrolled")
                  self._students[student_id] = {"name": name, "courses": {}}

              def add_grade(self, student_id: str, course: str, grade: str) -> None:
                  if student_id not in self._students:
                      raise ValueError(f"Student {student_id} not found")
                  if grade not in self._grade_weights:
                      raise ValueError(f"Invalid grade: {grade}. Must be one of {list(self._grade_weights.keys())}")
                  self._students[student_id]["courses"][course] = grade

              def get_student(self, student_id: str) -> dict[str, object]:
                  if student_id not in self._students:
                      raise ValueError(f"Student {student_id} not found")
                  return self._students[student_id]

              # ── Grade Calculation ──────────────────────────────────────
              def _format_grade(self, grade: str) -> str:
                  """Shared helper: formats a grade for display.
                  Used by BOTH calculate_gpa() and generate_report().
                  WARNING: changing this affects multiple features!"""
                  return f"{grade} ({self._grade_weights[grade]:.1f})"

              def calculate_gpa(self, student_id: str) -> float:
                  student = self.get_student(student_id)
                  courses = student["courses"]
                  if not courses:
                      return 0.0
                  total = sum(self._grade_weights[g] for g in courses.values())
                  gpa = total / len(courses)
                  return gpa

              def get_grade_summary(self, student_id: str) -> str:
                  student = self.get_student(student_id)
                  lines = []
                  for course, grade in student["courses"].items():
                      formatted = self._format_grade(grade)
                      lines.append(f"  {course}: {formatted}")
                  gpa = self.calculate_gpa(student_id)
                  lines.append(f"  GPA: {gpa:.2f}")
                  return "\n".join(lines)

              # ── GPA Formatting ────────────────────────────────────────
              def format_gpa_for_transcript(self, student_id: str) -> str:
                  gpa = self.calculate_gpa(student_id)
                  if gpa >= 3.5:
                      honors = " (Dean's List)"
                  elif gpa >= 3.0:
                      honors = " (Good Standing)"
                  else:
                      honors = ""
                  return f"Cumulative GPA: {gpa:.2f}{honors}"

              # ── HTML Report Generation ─────────────────────────────────
              def generate_report(self, student_id: str) -> str:
                  student = self.get_student(student_id)
                  name = student["name"]
                  html = f"<html><body><h1>Report for {name}</h1><table>"
                  html += "<tr><th>Course</th><th>Grade</th></tr>"
                  for course, grade in student["courses"].items():
                      formatted = self._format_grade(grade)
                      html += f"<tr><td>{course}</td><td>{formatted}</td></tr>"
                  gpa = self.calculate_gpa(student_id)
                  html += f"</table><p>GPA: {gpa:.2f}</p></body></html>"
                  return html

              # ── Email Notification (simulated) ─────────────────────────
              def send_grade_notification(self, student_id: str, course: str) -> None:
                  student = self.get_student(student_id)
                  grade = student["courses"].get(course)
                  if grade is None:
                      raise ValueError(f"No grade for {course}")
                  formatted = self._format_grade(grade)
                  message = f"Dear {student['name']}, your grade for {course} is {formatted}."
                  print(f"[EMAIL] To: {student_id} | {message}")
                  self._email_log.append({"to": student_id, "message": message})

              def get_email_log(self) -> list[dict[str, str]]:
                  return list(self._email_log)


          # ── Demo usage ─────────────────────────────────────────────────
          if __name__ == "__main__":
              mgr = CourseManager()
              mgr.enroll_student("S001", "Alice Johnson")
              mgr.add_grade("S001", "CS 101", "A")
              mgr.add_grade("S001", "MATH 201", "B")
              mgr.add_grade("S001", "ENG 101", "A")

              mgr.enroll_student("S002", "Bob Smith")
              mgr.add_grade("S002", "CS 101", "C")
              mgr.add_grade("S002", "MATH 201", "D")

              print("=== Grade Summary (Alice) ===")
              print(mgr.get_grade_summary("S001"))
              print()
              print("=== Transcript GPA (Alice) ===")
              print(mgr.format_gpa_for_transcript("S001"))
              print()
              print("=== HTML Report (Alice) ===")
              print(mgr.generate_report("S001"))
              print()
              print("=== Email Notification ===")
              mgr.send_grade_notification("S001", "CS 101")
        language: "python"

    open_file: "course_manager.py"

    tests:
      - description: "You modified the CourseManager code"
        command: |
          original_fragments = [
              '"A": 4.0, "B": 3.0, "C": 2.0, "D": 1.0, "F": 0.0',
              "<html><body><h1>Report for {name}</h1><table>",
          ]
          source = open('/tutorial/course_manager.py').read()
          changed = False
          for frag in original_fragments:
              if frag not in source:
                  changed = True
                  break
          assert changed, \
              "It looks like you haven't changed the code yet. Try modifying the grading scale or the report format — the goal is to experience the difficulty of changing tightly coupled code."
        hints:
          - text: "The task asks you to make two changes: (1) switch from letter grades to a 4.0 numeric scale, and (2) change the report from HTML to JSON. Start with whichever seems easier."
            condition: "default"

    quiz:
      title: "Why Design Principles? — Knowledge Check"
      min_score: 0.6
      shuffle: true
      questions:

        - question: |
            You tried to change the grading scale and the report format. What made this so painful?
          type: single
          options:
            - "The Python language does not support multiple output formats"
            - "The `_format_grade()` helper was shared between grading logic and report generation, so changing it for one purpose broke the other"
            - "The class had too few methods — if it had more methods, changes would be easier"
            - "The code was too short — longer code is always easier to modify"
          correct_index: 1
          explanation: |
            The core problem is **coupling**: `_format_grade()` serves two different purposes (grade calculation display and report rendering), so it cannot be changed for one without affecting the other. This is exactly the kind of pain that design principles help you avoid.

        - question: |
            **Coupling** in software design means:
          type: single
          options:
            - "Writing code in a single file instead of splitting it across multiple files"
            - "The degree to which one component depends on the internal details of another"
            - "Using inheritance instead of composition"
            - "Having too many classes in a project"
          correct_index: 1
          explanation: |
            Coupling measures how much one module depends on the internals of another. High coupling means a change in one place ripples through many others. The `CourseManager` has high *internal* coupling because its methods share helpers and data structures in ways that make independent changes impossible.

        - question: |
            How many distinct **actors** (stakeholders with different reasons to request changes) does the `CourseManager` class serve?
          type: single
          options:
            - "1 — it is one class, so it serves one actor"
            - "2 — students and instructors"
            - "At least 3 — enrollment/administration, grading/academics, and reporting/registrar"
            - "5 — one per method"
          correct_index: 2
          explanation: |
            The class serves at least three distinct actors: (1) the **administration** cares about enrollment, (2) the **academic department** cares about grade calculation, and (3) the **registrar's office** cares about reports and transcripts. When one class serves multiple actors, changes requested by one actor risk breaking functionality needed by another. This is the core motivation for the Single Responsibility Principle, which you will learn next.


  # --------------------------------------------------------------------------
  # STEP 2 — "SRP — Feel the Friction"
  # Pedagogy:
  #   Productive Failure — tax bracket change breaks pay stubs.
  #   Actor Analysis     — identify who requests changes.
  #   Guide-and-Release  — focused task with scaffolded discovery.
  #   Bloom's level      — Apply / Analyze (quiz).
  # --------------------------------------------------------------------------
  - title: "SRP — Feel the Friction"
    instructions: |
      ## The Single Responsibility Principle

      > **Learning objective:** After this step you will be able to **define** the Single Responsibility Principle in terms of actors and **identify** SRP violations in existing code.

      ### The Principle

      > *"A class should have only one reason to change."*
      > — Robert C. Martin

      A "reason to change" comes from an **actor**: a person or team that requests modifications. If a class serves multiple actors, changes requested by one actor can break functionality used by another — exactly what happened with `CourseManager` in Step 1.

      ### The Scenario

      Below is an `EmployeeManager` class used by three different teams at a company:

      | Actor | What they care about |
      |---|---|
      | **Finance Team** | Payroll calculation and tax brackets |
      | **HR Team** | Pay stub formatting and employee records |
      | **Compliance Team** | CSV export for audit reports |

      The Finance Team has requested an urgent change: **the 22% federal tax bracket must be updated to 24%** due to new tax legislation.

      ### Your Task

      Open `employee_manager.py` and update the tax calculation so that the 22% bracket becomes 24%. The tax brackets are:

      - Income up to $50,000: **10%**
      - Income from $50,001 to $100,000: **24%** (was 22%)
      - Income above $100,000: **32%**

      After making the change, run the code. Notice what happens to the pay stub formatting — does `_format_currency()` still work correctly for all callers?

      ### What to Look For

      Pay attention to how `_format_currency()` is used by both `calculate_payroll()` and `generate_pay_stub()`. Think about: if the HR Team later wants to change the currency format (e.g., adding thousands separators), would that change affect payroll calculations?

    files:
      - path: "employee_manager.py"
        content: |
          from __future__ import annotations


          class EmployeeManager:
              """Manages employees, payroll, pay stubs, and exports.
              Serves three actors: Finance, HR, and Compliance."""

              def __init__(self) -> None:
                  self._employees = {}  # {emp_id: {"name": str, "salary": float, "department": str}}

              # ── Employee Storage ────────────────────────────────────────
              def add_employee(self, emp_id: str, name: str, salary: float, department: str) -> None:
                  if emp_id in self._employees:
                      raise ValueError(f"Employee {emp_id} already exists")
                  self._employees[emp_id] = {
                      "name": name,
                      "salary": salary,
                      "department": department,
                  }

              def get_employee(self, emp_id: str) -> dict[str, object]:
                  if emp_id not in self._employees:
                      raise ValueError(f"Employee {emp_id} not found")
                  return self._employees[emp_id]

              def validate_employee_data(self, emp_id: str, name: str, salary: float, department: str) -> list[str]:
                  errors = []
                  if not name or not name.strip():
                      errors.append("Name cannot be empty")
                  if salary < 0:
                      errors.append("Salary cannot be negative")
                  if not department or not department.strip():
                      errors.append("Department cannot be empty")
                  return errors

              # ── Shared Helper ─────────────────────────────────────────
              def _format_currency(self, amount: float) -> str:
                  """Shared helper: formats a dollar amount for display.
                  Used by BOTH calculate_payroll() and generate_pay_stub().
                  WARNING: changing this affects multiple features!"""
                  return f"${amount:,.2f}"

              # ── Payroll Calculation (Finance Team) ─────────────────────
              def calculate_payroll(self, emp_id: str) -> dict[str, object]:
                  employee = self.get_employee(emp_id)
                  salary = employee["salary"]

                  # Federal tax brackets
                  if salary <= 50000:
                      tax_rate = 0.10
                  elif salary <= 100000:
                      tax_rate = 0.22   # TODO: Finance wants this changed to 0.24
                  else:
                      tax_rate = 0.32

                  tax = salary * tax_rate
                  net_pay = salary - tax

                  return {
                      "gross": salary,
                      "tax_rate": tax_rate,
                      "tax": tax,
                      "net_pay": net_pay,
                      "gross_formatted": self._format_currency(salary),
                      "tax_formatted": self._format_currency(tax),
                      "net_formatted": self._format_currency(net_pay),
                  }

              # ── Pay Stub Formatting (HR Team) ──────────────────────────
              def generate_pay_stub(self, emp_id: str) -> str:
                  employee = self.get_employee(emp_id)
                  payroll = self.calculate_payroll(emp_id)
                  stub = []
                  stub.append("=" * 40)
                  stub.append(f"  PAY STUB - {employee['name']}")
                  stub.append(f"  Department: {employee['department']}")
                  stub.append("=" * 40)
                  stub.append(f"  Gross Pay:  {self._format_currency(payroll['gross'])}")
                  stub.append(f"  Tax Rate:   {payroll['tax_rate']:.0%}")
                  stub.append(f"  Tax:        {self._format_currency(payroll['tax'])}")
                  stub.append(f"  Net Pay:    {self._format_currency(payroll['net_pay'])}")
                  stub.append("=" * 40)
                  return "\n".join(stub)

              # ── CSV Export (Compliance Team) ───────────────────────────
              def export_to_csv(self) -> str:
                  lines = ["emp_id,name,salary,department,tax_rate,net_pay"]
                  for emp_id, emp in self._employees.items():
                      payroll = self.calculate_payroll(emp_id)
                      lines.append(
                          f"{emp_id},{emp['name']},{emp['salary']},"
                          f"{emp['department']},{payroll['tax_rate']},{payroll['net_pay']}"
                      )
                  return "\n".join(lines)


          # ── Demo usage ─────────────────────────────────────────────────
          if __name__ == "__main__":
              mgr = EmployeeManager()
              mgr.add_employee("E001", "Alice Johnson", 75000, "Engineering")
              mgr.add_employee("E002", "Bob Smith", 45000, "Marketing")
              mgr.add_employee("E003", "Carol Davis", 120000, "Engineering")

              print("=== Payroll (Alice - $75k) ===")
              payroll = mgr.calculate_payroll("E001")
              print(f"  Gross: {payroll['gross_formatted']}")
              print(f"  Tax ({payroll['tax_rate']:.0%}): {payroll['tax_formatted']}")
              print(f"  Net: {payroll['net_formatted']}")
              print()

              print("=== Pay Stub (Bob - $45k) ===")
              print(mgr.generate_pay_stub("E002"))
              print()

              print("=== CSV Export ===")
              print(mgr.export_to_csv())
        language: "python"

    open_file: "employee_manager.py"

    solution:
      files:
        - path: "employee_manager.py"
          content: |
            from __future__ import annotations


            class EmployeeManager:
                """Manages employees, payroll, pay stubs, and exports.
                Serves three actors: Finance, HR, and Compliance."""

                def __init__(self) -> None:
                    self._employees = {}  # {emp_id: {"name": str, "salary": float, "department": str}}

                # ── Employee Storage ────────────────────────────────────────
                def add_employee(self, emp_id: str, name: str, salary: float, department: str) -> None:
                    if emp_id in self._employees:
                        raise ValueError(f"Employee {emp_id} already exists")
                    self._employees[emp_id] = {
                        "name": name,
                        "salary": salary,
                        "department": department,
                    }

                def get_employee(self, emp_id: str) -> dict[str, object]:
                    if emp_id not in self._employees:
                        raise ValueError(f"Employee {emp_id} not found")
                    return self._employees[emp_id]

                def validate_employee_data(self, emp_id: str, name: str, salary: float, department: str) -> list[str]:
                    errors = []
                    if not name or not name.strip():
                        errors.append("Name cannot be empty")
                    if salary < 0:
                        errors.append("Salary cannot be negative")
                    if not department or not department.strip():
                        errors.append("Department cannot be empty")
                    return errors

                # ── Shared Helper ─────────────────────────────────────────
                def _format_currency(self, amount: float) -> str:
                    """Shared helper: formats a dollar amount for display.
                    Used by BOTH calculate_payroll() and generate_pay_stub().
                    WARNING: changing this affects multiple features!"""
                    return f"${amount:,.2f}"

                # ── Payroll Calculation (Finance Team) ─────────────────────
                def calculate_payroll(self, emp_id: str) -> dict[str, object]:
                    employee = self.get_employee(emp_id)
                    salary = employee["salary"]

                    # Federal tax brackets (updated: 22% -> 24%)
                    if salary <= 50000:
                        tax_rate = 0.10
                    elif salary <= 100000:
                        tax_rate = 0.24   # Updated from 0.22 per Finance Team request
                    else:
                        tax_rate = 0.32

                    tax = salary * tax_rate
                    net_pay = salary - tax

                    return {
                        "gross": salary,
                        "tax_rate": tax_rate,
                        "tax": tax,
                        "net_pay": net_pay,
                        "gross_formatted": self._format_currency(salary),
                        "tax_formatted": self._format_currency(tax),
                        "net_formatted": self._format_currency(net_pay),
                    }

                # ── Pay Stub Formatting (HR Team) ──────────────────────────
                def generate_pay_stub(self, emp_id: str) -> str:
                    employee = self.get_employee(emp_id)
                    payroll = self.calculate_payroll(emp_id)
                    stub = []
                    stub.append("=" * 40)
                    stub.append(f"  PAY STUB - {employee['name']}")
                    stub.append(f"  Department: {employee['department']}")
                    stub.append("=" * 40)
                    stub.append(f"  Gross Pay:  {self._format_currency(payroll['gross'])}")
                    stub.append(f"  Tax Rate:   {payroll['tax_rate']:.0%}")
                    stub.append(f"  Tax:        {self._format_currency(payroll['tax'])}")
                    stub.append(f"  Net Pay:    {self._format_currency(payroll['net_pay'])}")
                    stub.append("=" * 40)
                    return "\n".join(stub)

                # ── CSV Export (Compliance Team) ───────────────────────────
                def export_to_csv(self) -> str:
                    lines = ["emp_id,name,salary,department,tax_rate,net_pay"]
                    for emp_id, emp in self._employees.items():
                        payroll = self.calculate_payroll(emp_id)
                        lines.append(
                            f"{emp_id},{emp['name']},{emp['salary']},"
                            f"{emp['department']},{payroll['tax_rate']},{payroll['net_pay']}"
                        )
                    return "\n".join(lines)


            # ── Demo usage ─────────────────────────────────────────────────
            if __name__ == "__main__":
                mgr = EmployeeManager()
                mgr.add_employee("E001", "Alice Johnson", 75000, "Engineering")
                mgr.add_employee("E002", "Bob Smith", 45000, "Marketing")
                mgr.add_employee("E003", "Carol Davis", 120000, "Engineering")

                print("=== Payroll (Alice - $75k) ===")
                payroll = mgr.calculate_payroll("E001")
                print(f"  Gross: {payroll['gross_formatted']}")
                print(f"  Tax ({payroll['tax_rate']:.0%}): {payroll['tax_formatted']}")
                print(f"  Net: {payroll['net_formatted']}")
                print()

                print("=== Pay Stub (Bob - $45k) ===")
                print(mgr.generate_pay_stub("E002"))
                print()

                print("=== CSV Export ===")
                print(mgr.export_to_csv())
          language: "python"
      explanation: |
        **The fix is a one-line change:** `0.22` becomes `0.24` in the `calculate_payroll()` method.

        But notice what this small change affects:
        - The **payroll calculation** now uses the correct 24% rate (Finance Team is happy).
        - The **pay stub** automatically reflects the new rate because it calls `calculate_payroll()` — but the HR Team never requested this change and might not expect it.
        - The **CSV export** also changes because it too depends on `calculate_payroll()`.

        This is an SRP violation in action: a change requested by one actor (Finance) silently propagates to outputs owned by other actors (HR, Compliance). In Step 3, you will refactor this class to isolate each actor's concerns.

    tests:
      - description: "Script runs without errors"
        command: |
          exec(open('/tutorial/employee_manager.py').read())
      - description: "The 24% tax rate is applied for salaries in the $50k-$100k bracket"
        command: |
          exec(open('/tutorial/employee_manager.py').read())
          mgr = EmployeeManager()
          mgr.add_employee("T001", "Test Employee", 75000, "Test")
          payroll = mgr.calculate_payroll("T001")
          assert abs(payroll["tax_rate"] - 0.24) < 0.001, \
              f"Expected tax rate of 0.24 (24%) for $75k salary, got {payroll['tax_rate']}"
        hints:
          - text: "Look for the tax bracket that handles salaries between $50,000 and $100,000. The rate there should be changed from 0.22 to 0.24."
            condition: "default"
      - description: "Tax amount is correctly calculated at 24%"
        command: |
          exec(open('/tutorial/employee_manager.py').read())
          mgr = EmployeeManager()
          mgr.add_employee("T002", "Test Employee", 80000, "Test")
          payroll = mgr.calculate_payroll("T002")
          expected_tax = 80000 * 0.24
          assert abs(payroll["tax"] - expected_tax) < 0.01, \
              f"Expected tax of ${expected_tax:,.2f} for $80k at 24%, got ${payroll['tax']:,.2f}"
        hints:
          - text: "Make sure you changed the tax_rate value, not just a comment. The actual numeric value 0.22 should become 0.24."
            condition: "default"
      - description: "Net pay is correctly calculated with the new rate"
        command: |
          exec(open('/tutorial/employee_manager.py').read())
          mgr = EmployeeManager()
          mgr.add_employee("T003", "Test Employee", 75000, "Test")
          payroll = mgr.calculate_payroll("T003")
          expected_net = 75000 - (75000 * 0.24)
          assert abs(payroll["net_pay"] - expected_net) < 0.01, \
              f"Expected net pay of ${expected_net:,.2f}, got ${payroll['net_pay']:,.2f}"
      - description: "The 10% bracket (under $50k) is unchanged"
        command: |
          exec(open('/tutorial/employee_manager.py').read())
          mgr = EmployeeManager()
          mgr.add_employee("T004", "Low Salary", 40000, "Test")
          payroll = mgr.calculate_payroll("T004")
          assert abs(payroll["tax_rate"] - 0.10) < 0.001, \
              f"The 10% bracket should be unchanged. Expected 0.10 for $40k salary, got {payroll['tax_rate']}"
      - description: "The 32% bracket (over $100k) is unchanged"
        command: |
          exec(open('/tutorial/employee_manager.py').read())
          mgr = EmployeeManager()
          mgr.add_employee("T005", "High Salary", 150000, "Test")
          payroll = mgr.calculate_payroll("T005")
          assert abs(payroll["tax_rate"] - 0.32) < 0.001, \
              f"The 32% bracket should be unchanged. Expected 0.32 for $150k salary, got {payroll['tax_rate']}"

    quiz:
      title: "SRP — Feel the Friction — Knowledge Check"
      min_score: 0.6
      shuffle: true
      questions:

        - question: |
            In the Single Responsibility Principle, a "reason to change" comes from:
          type: single
          options:
            - "A bug in the code"
            - "An actor — a person or team that requests a modification to the system"
            - "A new programming language feature"
            - "The number of methods in the class"
          correct_index: 1
          explanation: |
            Robert C. Martin defines "reason to change" in terms of **actors**: the people or teams who might request changes. A class that serves multiple actors will be pulled in different directions, leading to the kind of breakage you experienced.

        - question: |
            A class has 10 methods. Does this automatically mean it violates the Single Responsibility Principle?
          type: single
          options:
            - "Yes — any class with more than 5 methods violates SRP"
            - "No — SRP is about the number of actors served, not the number of methods. A class with 10 methods serving one actor may be fine"
            - "Yes — SRP requires each class to have exactly one method"
            - "No — SRP only applies to classes with inheritance"
          correct_index: 1
          explanation: |
            SRP is not a method-counting rule. A class can have many methods and still satisfy SRP if they all serve the same actor and change for the same reason. Conversely, a class with only 3 methods can violate SRP if those methods serve different actors.

        - question: |
            In the `EmployeeManager` class, which actors are served by which responsibilities?
          type: multiple
          options:
            - "The **Finance Team** cares about payroll calculation and tax brackets"
            - "The **HR Team** cares about pay stub formatting and employee records"
            - "The **Compliance Team** cares about CSV export for audits"
            - "All three teams share the same reasons for changing the code"
          correct_indices: [0, 1, 2]
          explanation: |
            Each team has a distinct reason to request changes: Finance changes tax rules, HR changes display formats, and Compliance changes export structure. When one class serves all three, a change for one team (like the tax bracket update) can affect outputs owned by the others. Separating these concerns into different classes is exactly what SRP prescribes.


