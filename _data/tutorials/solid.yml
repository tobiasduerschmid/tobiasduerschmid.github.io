                          f"LSP violation still present: {e}"
              else:
                  # Good: no checkout method — LSP solved by separation
                  assert hasattr(ref, 'browse') or not has_checkout, \
                      "ReferenceBook should either have browse() or " \
                      "a working checkout()"
          else:
              # Original code — just verify reference books exist
              lib = LibrarySystem()
              lib.add_book(Book("Encyclopedia", "Various", "ISBN-REF",
                                "reference"))
              assert lib.get_book("ISBN-REF") is not None
        hints:
          - text: "The LSP fix: make `ReferenceBook` a separate class (not a subclass of `Book`) with a `browse()` method instead of `checkout()`. This way it cannot be accidentally passed to `CheckoutService`."
            condition: "default"

      - description: "Dependency injection is used (no direct instantiation of FileLogger/CsvReportWriter in service classes)"
        command: |
          import ast
          source: str = open('/tutorial/library_system.py').read()
          tree: ast.Module = ast.parse(source)

          violations: list[str] = []
          service_classes: set[str] = {
              'CheckoutService', 'NotificationService',
              'InventoryReporter', 'LibrarySystem',
          }

          for node in ast.walk(tree):
              if isinstance(node, ast.ClassDef) and node.name in service_classes:
                  for child in ast.walk(node):
                      if isinstance(child, ast.Call):
                          func = child.func
                          name: str = ""
                          if isinstance(func, ast.Name):
                              name = func.id
                          elif isinstance(func, ast.Attribute):
                              name = func.attr
                          if name in ('FileLogger', 'CsvReportWriter'):
                              violations.append(
                                  f"{node.name} directly instantiates "
                                  f"{name}()"
                              )

          assert len(violations) == 0, \
              "DIP violation: " + "; ".join(violations) + \
              ". Inject Logger and ReportWriter abstractions via " \
              "constructor parameters instead."
        hints:
          - text: "Define `Logger` and `ReportWriter` ABCs. Have `CheckoutService` and other services accept these abstractions as constructor parameters. Create `FileLogger` and `CsvReportWriter` outside the service classes and pass them in."
            condition: "default"

    quiz:
      title: "Capstone — The Real World — Knowledge Check"
      min_score: 0.6
      shuffle: true
      questions:

        - question: |
            The over-engineered calculator uses `IAddable`, `ISubtractable`, `IMultipliable`, `IDivisible` interfaces, a `CalculationStrategyFactory`, and a `CalculationResult` wrapper — all for `2 + 3`. What is the core problem?
          type: single
          options:
            - "It violates the Open/Closed Principle because you cannot add new operations"
            - "It violates the Interface Segregation Principle because the interfaces are too small"
            - "It applies SOLID to a problem that does not have enough complexity to justify it — the abstractions add indirection without any benefit"
            - "It violates the Single Responsibility Principle because MathEngine does four things"
          correct_index: 2
          explanation: |
            SOLID principles solve **real problems**: code that changes for multiple reasons, types that break substitutability, interfaces that force unnecessary dependencies. A basic calculator has none of these problems — it is stable, simple, and unlikely to change. The four interfaces, factory, and result wrapper add cognitive overhead and indirection with **zero benefit**. SOLID is a tool for managing complexity, not a checklist to apply blindly.

        - question: |
            Which of the following are signs that you are **over-engineering** with SOLID?
          type: multiple
          options:
            - "You have an ABC with only one concrete implementation and no plans for a second"
            - "A 5-line function has become 50 lines spread across 4 classes"
            - "You created a Factory for objects that are only created in one place"
            - "You refactored a class with 8 methods serving 3 different actors into 3 focused classes"
          correct_indices: [0, 1, 2]
          explanation: |
            Options A, B, and C are classic over-engineering smells. An ABC with one implementation is **premature abstraction** — wait for the second variant. Exploding a simple function across many classes **obscures intent**. A Factory for single-site construction is **unnecessary indirection**. Option D, however, is a **valid SRP refactoring** — 3 actors justify 3 classes.

        - question: |
            In the refactored library system, `CheckoutService` calls `book.checkout()` without checking the book's type. This works because of a specific SOLID principle. Adding a new book format (e.g., `PodcastBook`) would require no changes to `CheckoutService`. Which principle relationship makes this possible?
          type: single
          options:
            - "SRP — each class has one reason to change, so CheckoutService does not need to know about formats"
            - "ISP — the Book interface is minimal, so new types implement only what they need"
            - "LSP enables OCP — because every Book subtype fulfills the same checkout contract (LSP), CheckoutService can handle new types without modification (OCP)"
            - "DIP — CheckoutService depends on an abstraction, so it does not know about concrete types"
          correct_index: 2
          explanation: |
            This is a **principle interconnection**: LSP guarantees that every `Book` subtype behaves consistently (no surprises from `checkout()`), which is what allows `CheckoutService` to be **closed for modification** (OCP) when new book types are added. Without LSP (e.g., if `ReferenceBook` threw an exception in `checkout()`), `CheckoutService` would need type-checking `if/elif` to guard against broken subtypes — defeating OCP. The principles reinforce each other.

        - question: |
            In the original `LibrarySystem`, the constructor directly created `FileLogger()` and `CsvReportWriter()`. After refactoring, these are injected as `Logger` and `ReportWriter` abstractions. What does this enable?
          type: single
          options:
            - "It makes the code run faster because abstract classes are optimized by Python"
            - "It enables substituting different logger and report writer implementations (e.g., for testing, or switching to a database logger) without changing CheckoutService — DIP enables OCP"
            - "It prevents anyone from ever using FileLogger or CsvReportWriter again"
            - "It satisfies ISP by splitting the logging interface into smaller pieces"
          correct_index: 1
          explanation: |
            **DIP enables OCP:** By depending on `Logger` (an abstraction) instead of `FileLogger` (a concretion), `CheckoutService` is open for extension — you can inject a `DatabaseLogger`, a `TestLogger` (for unit tests), or any future implementation — without modifying `CheckoutService` itself. This is exactly the same mechanism that makes the book type hierarchy work: depend on abstractions, and you can extend the system by adding new implementations rather than changing existing code.
