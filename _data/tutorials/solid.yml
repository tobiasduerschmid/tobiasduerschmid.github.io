        content: |
          """Media player hierarchy — LSP exercise.

          BUG: LiveStreamPlayer inherits seek() and get_duration() from
          MediaPlayer but cannot implement them. The playlist_renderer()
          function crashes when it encounters a live stream.

          YOUR TASK: Refactor the hierarchy so LiveStreamPlayer does not
          pretend to support seeking or duration queries. The renderer
          should handle all player types safely.
          """
          from abc import ABC, abstractmethod


          class MediaPlayer(ABC):
              """Base class for all media players."""

              def __init__(self, title: str) -> None:
                  self._title = title
                  self._playing = False

              @property
              def title(self) -> str:
                  return self._title

              @abstractmethod
              def play(self) -> None:
                  ...

              @abstractmethod
              def stop(self) -> None:
                  ...

              @abstractmethod
              def seek(self, position: int) -> None:
                  """Seek to a position in seconds."""
                  ...

              @abstractmethod
              def get_duration(self) -> str:
                  """Return total duration in seconds."""
                  ...


          class AudioFilePlayer(MediaPlayer):
              def __init__(self, title: str, duration: int) -> None:
                  super().__init__(title)
                  self._duration = duration

              def play(self) -> str:
                  self._playing = True

              def stop(self) -> str:
                  self._playing = False

              def seek(self, position: int) -> str:
                  if position < 0 or position > self._duration:
                      raise ValueError("Position out of range")

              def get_duration(self) -> str:
                  return self._duration


          class VideoFilePlayer(MediaPlayer):
              def __init__(self, title: str, duration: int, resolution="1080p") -> None:
                  super().__init__(title)
                  self._duration = duration
                  self._resolution = resolution

              def play(self) -> str:
                  self._playing = True

              def stop(self) -> str:
                  self._playing = False

              def seek(self, position: int) -> str:
                  if position < 0 or position > self._duration:
                      raise ValueError("Position out of range")

              def get_duration(self) -> str:
                  return self._duration


          class LiveStreamPlayer(MediaPlayer):
              """Live streams have no duration and cannot be seeked."""

              def __init__(self, title: str, stream_url="https://live.example.com") -> None:
                  super().__init__(title)
                  self._stream_url = stream_url

              def play(self) -> None:
                  self._playing = True

              def stop(self) -> None:
                  self._playing = False

              def seek(self, position: int) -> None:
                  raise NotImplementedError("Cannot seek a live stream")

              def get_duration(self) -> str:
                  raise NotImplementedError("Live streams have no duration")


          def playlist_renderer(players) -> None:
              """Render a playlist with progress bars for each player.

              Depends on the MediaPlayer contract:
              - get_duration() returns a number
              - seek() accepts a valid position

              Returns:
                  list of rendered playlist entries (dicts)
              """
              entries = []
              for player in players:
                  duration = player.get_duration()
                  midpoint = duration / 2
                  player.seek(midpoint)
                  entries.append({
                      "title": player.title,
                      "duration": duration,
                      "seeked_to": midpoint,
                      "has_progress_bar": True,
                  })
              return entries
        language: "python"

