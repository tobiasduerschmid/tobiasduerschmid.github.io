          content: |
            from abc import ABC, abstractmethod
            from dataclasses import dataclass, field
            from typing import Optional


            # ── Abstractions (DIP: depend on these, not concretions) ────────
            class Logger(ABC):
                """Abstraction for logging — DIP compliance."""

                @abstractmethod
                def log(self, message: str) -> None: ...


            class ReportWriter(ABC):
                """Abstraction for report writing — DIP compliance."""

                @abstractmethod
                def write(
                    self, title: str, rows: list[dict[str, str]]
                ) -> str: ...


            # ── Concrete Logger & ReportWriter ─────────────────────────────
            class FileLogger(Logger):
                """Logs messages to console (simulating a file)."""

                def log(self, message: str) -> None:
                    print(f"[LOG] {message}")


            class CsvReportWriter(ReportWriter):
                """Writes reports in CSV format."""

                def write(
                    self, title: str, rows: list[dict[str, str]]
                ) -> str:
                    if not rows:
                        return f"{title}\n(empty)"
                    headers: str = ",".join(rows[0].keys())
                    lines: list[str] = [f"# {title}", headers]
                    for row in rows:
                        lines.append(
                            ",".join(str(v) for v in row.values())
                        )
                    return "\n".join(lines)


            # ── Book Hierarchy (OCP + LSP) ─────────────────────────────────
            @dataclass
            class Book(ABC):
                """Abstract base for all books."""

                title: str
                author: str
                isbn: str

                @abstractmethod
                def checkout(self) -> str:
                    """Perform format-specific checkout logic."""
                    ...

                @abstractmethod
                def is_available(self) -> bool:
                    """Check if this book is available for checkout."""
                    ...


            @dataclass
            class PhysicalBook(Book):
                """A physical book with limited copies."""

                copies: int = 1

                def checkout(self) -> str:
                    if self.copies <= 0:
                        raise ValueError(
                            f"No copies of '{self.title}' available"
                        )
                    self.copies -= 1
                    return (
                        f"Checked out physical copy of '{self.title}'"
                    )

                def is_available(self) -> bool:
                    return self.copies > 0


            @dataclass
            class EBook(Book):
                """An electronic book with a download link."""

                download_link: str = ""

                def checkout(self) -> str:
                    link: str = (
                        self.download_link
                        or f"https://library.example.com/ebook/"
                           f"{self.isbn}"
                    )
                    return f"Download '{self.title}' at: {link}"

                def is_available(self) -> bool:
                    return True


            @dataclass
            class AudioBook(Book):
                """An audiobook with DRM licensing."""

                drm_license: str = ""

                def checkout(self) -> str:
                    if not self.drm_license:
                        raise ValueError(
                            f"No DRM license for '{self.title}'"
                        )
                    return (
                        f"Stream '{self.title}' with license: "
                        f"{self.drm_license}"
                    )

                def is_available(self) -> bool:
                    return bool(self.drm_license)


            @dataclass
            class ReferenceBook:
                """A reference-only book. NOT a subclass of Book — it has
                no checkout() method, which avoids the LSP violation.
                Reference books are browseable, not borrowable."""

                title: str
                author: str
                isbn: str

                def browse(self) -> str:
                    return (
                        f"'{self.title}' is available for in-library "
                        f"reference only"
                    )


            # ── Member ─────────────────────────────────────────────────────
            @dataclass
            class Member:
                member_id: str
                name: str
                email: str
                borrowed_isbns: list[str] = field(default_factory=list)


            # ── BookRepository (SRP: manages book storage only) ────────────
            class BookRepository:
                """Stores and retrieves books. Single responsibility:
                book storage."""

                def __init__(self) -> None:
                    self.books: dict[str, Book] = {}
                    self.reference_books: dict[str, ReferenceBook] = {}

                def add_book(self, book: Book) -> None:
                    if book.isbn in self.books:
                        if isinstance(book, PhysicalBook):
                            existing = self.books[book.isbn]
                            if isinstance(existing, PhysicalBook):
                                existing.copies += book.copies
                                return
                    self.books[book.isbn] = book

                def add_reference_book(
                    self, book: ReferenceBook
                ) -> None:
                    self.reference_books[book.isbn] = book

                def get_book(self, isbn: str) -> Book:
                    if isbn not in self.books:
                        raise ValueError(
                            f"Book with ISBN {isbn} not found"
                        )
                    return self.books[isbn]

                def get_reference_book(
                    self, isbn: str
                ) -> ReferenceBook:
                    if isbn not in self.reference_books:
                        raise ValueError(
                            f"Reference book with ISBN {isbn} not found"
                        )
                    return self.reference_books[isbn]

                def get_all_books(
                    self,
                ) -> list[Book]:
                    return list(self.books.values())

                def get_all_reference_books(
                    self,
                ) -> list[ReferenceBook]:
                    return list(self.reference_books.values())


            # ── MemberRegistry (SRP: manages member storage only) ──────────
            class MemberRegistry:
                """Stores and retrieves members. Single responsibility:
                member storage."""

                def __init__(self) -> None:
                    self.members: dict[str, Member] = {}

                def register(self, member: Member) -> None:
                    if member.member_id in self.members:
                        raise ValueError(
                            f"Member {member.member_id} already registered"
                        )
                    self.members[member.member_id] = member

                def get(self, member_id: str) -> Member:
                    if member_id not in self.members:
                        raise ValueError(
                            f"Member {member_id} not found"
                        )
                    return self.members[member_id]


            # ── NotificationService (SRP: handles notices only) ────────────
            class NotificationService:
                """Sends notices to members. Single responsibility:
                notifications."""

                def __init__(self, logger: Logger) -> None:
                    self.logger: Logger = logger

                def send_overdue_notice(
                    self, member: Member, book_title: str
                ) -> str:
                    notice: str = (
                        f"Dear {member.name}, '{book_title}' is overdue. "
                        f"Please return it to the library."
                    )
                    print(f"[NOTICE] {notice}")
                    self.logger.log(
                        f"Sent overdue notice to {member.name} "
                        f"for '{book_title}'"
                    )
                    return notice


            # ── CheckoutService (orchestrates using injected deps) ─────────
            class CheckoutService:
                """Orchestrates book checkouts.

                - OCP: new book types just need checkout() — no elif here.
                - DIP: depends on Logger abstraction, not FileLogger.
                - SRP: only handles checkout orchestration.
                """

                def __init__(
                    self,
                    book_repo: BookRepository,
                    member_registry: MemberRegistry,
                    logger: Logger,
                ) -> None:
                    self.book_repo: BookRepository = book_repo
                    self.member_registry: MemberRegistry = member_registry
                    self.logger: Logger = logger

                def checkout(
                    self, member_id: str, isbn: str
                ) -> str:
                    member: Member = self.member_registry.get(member_id)
                    book: Book = self.book_repo.get_book(isbn)

                    # OCP: no if/elif — polymorphic dispatch
                    result: str = book.checkout()
                    member.borrowed_isbns.append(isbn)

                    self.logger.log(
                        f"{member.name} checked out '{book.title}'"
                    )
                    return result


            # ── Inventory Report Helper ─────────────────────────────────────
            class InventoryReporter:
                """Generates inventory reports. DIP: depends on
                ReportWriter abstraction."""

                def __init__(
                    self,
                    book_repo: BookRepository,
                    writer: ReportWriter,
                ) -> None:
                    self.book_repo: BookRepository = book_repo
                    self.writer: ReportWriter = writer

                def generate(self) -> str:
                    rows: list[dict[str, str]] = []
                    for book in self.book_repo.get_all_books():
                        row: dict[str, str] = {
                            "isbn": book.isbn,
                            "title": book.title,
                            "author": book.author,
                            "type": type(book).__name__,
                        }
                        if isinstance(book, PhysicalBook):
                            row["copies"] = str(book.copies)
                        rows.append(row)
                    for ref in self.book_repo.get_all_reference_books():
                        rows.append({
                            "isbn": ref.isbn,
                            "title": ref.title,
                            "author": ref.author,
                            "type": "ReferenceBook",
                        })
                    return self.writer.write("Inventory Report", rows)


            # ── Demo ───────────────────────────────────────────────────────
            if __name__ == "__main__":
                logger: Logger = FileLogger()
                writer: ReportWriter = CsvReportWriter()

                book_repo = BookRepository()
                member_reg = MemberRegistry()
                notifier = NotificationService(logger)
                checkout_svc = CheckoutService(
                    book_repo, member_reg, logger
                )
                reporter = InventoryReporter(book_repo, writer)

                # Add books
                book_repo.add_book(PhysicalBook(
                    "The Pragmatic Programmer", "Hunt & Thomas",
                    "978-0135957059", copies=3,
                ))
                book_repo.add_book(EBook(
                    "Clean Code", "Robert C. Martin",
                    "978-0132350884",
                    download_link="https://example.com/clean",
                ))
                book_repo.add_book(AudioBook(
                    "Design Patterns", "GoF",
                    "978-0201633610",
                    drm_license="DRM-ABC-123",
                ))
                book_repo.add_reference_book(ReferenceBook(
                    "Encyclopedia Britannica", "Various",
                    "978-1593392925",
                ))

                # Register members
                member_reg.register(
                    Member("M001", "Alice", "alice@mail.com")
                )
                member_reg.register(
                    Member("M002", "Bob", "bob@mail.com")
                )

                # Checkouts
                print(checkout_svc.checkout("M001", "978-0135957059"))
                print(checkout_svc.checkout("M001", "978-0132350884"))
                print(checkout_svc.checkout("M002", "978-0201633610"))

                # Overdue notice
                print(notifier.send_overdue_notice(
                    member_reg.get("M001"),
                    "The Pragmatic Programmer",
                ))

                # Reference book browsing (no checkout)
                ref = book_repo.get_reference_book("978-1593392925")
                print(ref.browse())

                # Inventory report
                print()
                print(reporter.generate())
