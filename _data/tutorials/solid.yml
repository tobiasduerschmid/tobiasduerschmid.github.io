    quiz:
      title: "Liskov Substitution Principle — Knowledge Check"
      min_score: 0.75
      shuffle: true
      questions:

        - question: |
            The Liskov Substitution Principle says a subclass must:
          type: multiple
          options:
            - "Accept at least what the parent accepts (equal or weaker preconditions)"
            - "Guarantee at least what the parent guarantees (equal or stronger postconditions)"
            - "Override every method of the parent class"
            - "Add new methods that the parent does not have"
          correct_indices: [0, 1]
          explanation: |
            LSP is about **behavioral compatibility**. A subclass can't reject inputs the parent accepts (no strengthening preconditions) and can't break guarantees the parent makes (no weakening postconditions). Overriding every method or adding new methods are completely unrelated to LSP.

        - question: |
            A `PaymentProcessor` base class defines `refund(txn_id)` with the postcondition "returns `{"success": True, "amount": <float>}`." A `GiftCardProcessor` subclass returns `{"success": False, "error": "non-refundable"}` instead. A teammate argues: *"It still returns a dict with the right keys, so it follows the contract."*

            Why is this still an LSP violation?
          type: single
          options:
            - "Because the dict has an extra 'error' key that the parent does not define"
            - "Because the postcondition guarantees success=True and an amount — returning success=False weakens that guarantee"
            - "Because GiftCardProcessor should raise an exception instead of returning a dict"
            - "Because the base class should not have a refund method at all"
          correct_index: 1
          explanation: |
            The postcondition isn't just "return a dict" — it's "**actually refund** and return the amount." Returning `success=False` silently breaks that promise. Callers that trust the contract will keep going as if the refund worked. That's actually *worse* than crashing — at least a crash tells you something went wrong.

        - question: |
            Consider this code:

            ```python
            class Bird(ABC):
                @abstractmethod
                def fly(self) -> None:
                    ...

            class Penguin(Bird):
                def fly(self) -> None:
                    raise NotImplementedError("Penguins can't fly")
            ```

            Which statement is correct?
          type: single
          options:
            - "This is fine — Penguin honestly reports it cannot fly by raising an exception"
            - "This violates LSP — any code expecting a Bird to fly will crash when given a Penguin"
            - "This violates LSP only if fly() is called in a loop"
            - "This is fine — NotImplementedError is the standard way to indicate unsupported operations"
          correct_index: 1
          explanation: |
            If `Bird` promises `fly()` works, then `Penguin` breaking that promise will crash any code that loops over birds and calls `fly()`. The fix is the same pattern we've been using: split into `Bird` (base) and `FlyingBird` (adds `fly()`). Seeing `NotImplementedError` in a concrete subclass is basically a flashing neon sign saying "LSP violation here."

        - question: |
            A base class method `calculate_shipping(weight)` accepts any positive weight. A subclass overrides it to reject weights above 50 kg. This is an example of:
          type: single
          options:
            - "Strengthening a precondition — an LSP violation"
            - "Weakening a precondition — LSP-compliant"
            - "Strengthening a postcondition — LSP-compliant"
            - "Weakening a postcondition — an LSP violation"
          correct_index: 0
          explanation: |
            The base class accepts *any* positive weight. The subclass rejects weights above 50 kg — it accepts a *smaller* set of inputs. That's **strengthening** the precondition, which violates LSP. Code that passes 75 kg expecting it to work will blow up when it gets the subclass. Fix: declare the weight limit explicitly (e.g., a `max_weight` property) instead of silently restricting inputs.
  # --------------------------------------------------------------------------
  # STEP 7 — "ISP — Lean Interfaces"
  # Pedagogy:
  #   Productive Failure — fat CloudStorage interface forces meaningless stubs.
  #   Contrastive Case   — side-by-side fat vs. segregated interfaces.
  #   Bridge from LSP    — ISP prevents LSP violations structurally.
  #   Bloom's level      — Apply / Analyze / Create (quiz).
  # --------------------------------------------------------------------------
  - title: "ISP — Lean Interfaces"
    instructions: |
      ## The Interface Segregation Principle

      > **Learning objective:** After this step you will be able to **identify** fat interfaces that force clients to depend on methods they don't use, and **refactor** them into lean, role-based interfaces.

      ### The Principle

      > *"Clients should not be forced to depend on methods they do not use."*
      > — Robert C. Martin

      When an interface gets too thicc, implementers that only need a few of its methods are forced to write stub implementations — methods that do nothing or raise errors. This wastes effort, confuses anyone reading the code, and creates **latent bugs**: code that looks fine but crashes at runtime.

      ### Bridge from LSP

      Remember LSP from the previous step? ISP **prevents** LSP violations at the structural level. If `FreeStorage` never inherits a `sync()` method, it can never break the sync contract. Problem eliminated before it starts.

      ### The Scenario

      You're building a cloud storage service with two tiers: **Premium** and **Free**. Here's the current `CloudStorage` abstract base class with six capabilities:

      | Method | Premium | Free |
      |---|---|---|
      | `upload(file)` | Yes | Yes |
      | `download(file_id)` | Yes | Yes |
      | `sync(device)` | Yes | **No** |
      | `share(file_id, user)` | Yes | **No** |
      | `encrypt(file_id)` | Yes | **No** |
      | `get_version_history(file_id)` | Yes | **No** |

      `PremiumStorage` implements all six. Your task is to create a `FreeStorage` class that extends `CloudStorage`. But Free users can only upload and download — no sync, share, encrypt, or version history.

      ### Your Task

      Open `cloud_storage.py`. Implement `FreeStorage` so it inherits from `CloudStorage` and:

      1. Implements `upload()` to store the file and return `True`.
      2. Implements `download()` to return the stored file name.
      3. Implements `sync()`, `share()`, `encrypt()`, and `get_version_history()` to raise `NotImplementedError("Upgrade to Premium")`.

      After the tests pass, think about what happens if someone calls `backup_service(FreeStorage())`. The backup service **expects** any `CloudStorage` to support `sync()`, but `FreeStorage` explodes at runtime. That's what a fat interface does to you.

      ### What ISP Would Look Like

      Compare the fat interface approach with a segregated design:

      **Fat interface (current — problematic):**
      ```
      CloudStorage
      ├── upload()
      ├── download()
      ├── sync()
      ├── share()
      ├── encrypt()
      └── get_version_history()

      FreeStorage(CloudStorage)  ← must stub 4 methods
      PremiumStorage(CloudStorage)
      ```

      **Segregated interfaces (ISP-compliant):**
      ```
      Uploadable          ← upload()
      Downloadable        ← download()
      Syncable            ← sync()
      Shareable           ← share()
      Encryptable         ← encrypt()
      Versionable         ← get_version_history()

      FreeStorage(Uploadable, Downloadable)
      PremiumStorage(Uploadable, Downloadable, Syncable, Shareable, Encryptable, Versionable)
      ```

      With segregated interfaces, `FreeStorage` never inherits `sync()`, so `backup_service()` would require `Syncable` — and the type system (or a simple `isinstance` check) would catch the mismatch **before** runtime.

      ### Key Insight: ISP is not SRP

      - **SRP** = what a class does internally (one reason to change, one actor).
      - **ISP** = what a class exposes to its **clients** (no client should depend on methods it does not use).

      A class can satisfy SRP (single actor) while violating ISP (interface too broad for some clients). They address different concerns.

    files:
      - path: "cloud_storage.py"
        content: |
          from __future__ import annotations
          from abc import ABC, abstractmethod
          from typing import Dict, List, Optional


          # ── Fat interface — all storage capabilities in one ABC ──────────
          class CloudStorage(ABC):
              """Abstract base class for cloud storage services.
              Defines ALL storage capabilities in a single interface."""

              @abstractmethod
              def upload(self, file: str) -> bool:
                  """Upload a file to cloud storage. Returns True on success."""
                  ...

              @abstractmethod
              def download(self, file_id: str) -> str:
                  """Download a file by ID. Returns the file name."""
                  ...

              @abstractmethod
              def sync(self, device: str) -> bool:
                  """Sync files to a device. Returns True on success."""
                  ...

              @abstractmethod
              def share(self, file_id: str, user: str) -> str:
                  """Share a file with another user. Returns a share link."""
                  ...

              @abstractmethod
              def encrypt(self, file_id: str) -> bool:
                  """Encrypt a file. Returns True on success."""
                  ...

              @abstractmethod
              def get_version_history(self, file_id: str) -> List[str]:
                  """Get version history for a file. Returns list of version IDs."""
                  ...


          # ── Premium tier — implements everything ─────────────────────────
          class PremiumStorage(CloudStorage):
              """Premium cloud storage with all features."""

              def __init__(self) -> None:
                  self._files: Dict[str, str] = {}
                  self._next_id: int = 1
                  self._shared: Dict[str, str] = {}
                  self._synced_devices: List[str] = []
                  self._encrypted: List[str] = []
                  self._versions: Dict[str, List[str]] = {}

              def upload(self, file: str) -> bool:
                  file_id: str = f"file_{self._next_id}"
                  self._next_id += 1
                  self._files[file_id] = file
                  self._versions[file_id] = ["v1"]
                  print(f"[PREMIUM] Uploaded '{file}' as {file_id}")
                  return True

              def download(self, file_id: str) -> str:
                  if file_id not in self._files:
                      raise ValueError(f"File {file_id} not found")
                  print(f"[PREMIUM] Downloaded {file_id}")
                  return self._files[file_id]

              def sync(self, device: str) -> bool:
                  self._synced_devices.append(device)
                  print(f"[PREMIUM] Synced to {device}")
                  return True

              def share(self, file_id: str, user: str) -> str:
                  if file_id not in self._files:
                      raise ValueError(f"File {file_id} not found")
                  link: str = f"https://cloud.example.com/share/{file_id}?user={user}"
                  self._shared[file_id] = user
                  print(f"[PREMIUM] Shared {file_id} with {user}: {link}")
                  return link

              def encrypt(self, file_id: str) -> bool:
                  if file_id not in self._files:
                      raise ValueError(f"File {file_id} not found")
                  self._encrypted.append(file_id)
                  print(f"[PREMIUM] Encrypted {file_id}")
                  return True

              def get_version_history(self, file_id: str) -> List[str]:
                  if file_id not in self._versions:
                      raise ValueError(f"File {file_id} not found")
                  return list(self._versions[file_id])


          # ── Free tier — TODO: implement this class ───────────────────────
          class FreeStorage(CloudStorage):
              """Free cloud storage — upload and download only.
              sync, share, encrypt, and version history are NOT available."""

              def __init__(self) -> None:
                  self._files: Dict[str, str] = {}
                  self._next_id: int = 1

              # TODO: Implement upload() — store file in self._files, return True
              # TODO: Implement download() — return file name from self._files
              # TODO: Implement sync() — raise NotImplementedError("Upgrade to Premium")
              # TODO: Implement share() — raise NotImplementedError("Upgrade to Premium")
              # TODO: Implement encrypt() — raise NotImplementedError("Upgrade to Premium")
              # TODO: Implement get_version_history() — raise NotImplementedError("Upgrade to Premium")


          # ── A function that depends on the fat interface ──────────────────
          def backup_service(storage: CloudStorage) -> bool:
              """Backs up files by syncing to a backup device.
              Expects ANY CloudStorage — but crashes for FreeStorage!"""
              print("[BACKUP] Starting backup...")
              storage.upload("backup_manifest.txt")
              result: bool = storage.sync("backup-server-01")
              print(f"[BACKUP] Sync result: {result}")
              return result


          # ── Demo ──────────────────────────────────────────────────────────
          if __name__ == "__main__":
              print("=== Premium Storage ===")
              premium: PremiumStorage = PremiumStorage()
              premium.upload("report.pdf")
              premium.sync("laptop")
              premium.share("file_1", "colleague@example.com")
              premium.encrypt("file_1")
              print(f"Version history: {premium.get_version_history('file_1')}")
              print()

              print("=== Free Storage ===")
              free: FreeStorage = FreeStorage()
              free.upload("notes.txt")
              free.download("file_1")
              print()

              print("=== Backup Service (Premium — works) ===")
              backup_service(premium)
              print()

              print("=== Backup Service (Free — crashes!) ===")
              try:
                  backup_service(free)
              except NotImplementedError as e:
                  print(f"CRASH: {e}")
        language: "python"

      - path: "smart_home.py"
        content: |
          from __future__ import annotations
          from abc import ABC, abstractmethod
          from typing import Optional


          # ── Fat interface — all smart home capabilities in one ABC ──────
          class SmartDevice(ABC):
              """Abstract base class for ALL smart home devices.
              Every device must implement every method — even if it makes no sense."""

              def __init__(self, name: str) -> None:
                  self.name: str = name

              @abstractmethod
              def play_music(self, song: str) -> str:
                  """Play a song on the device."""
                  ...

              @abstractmethod
              def set_temperature(self, degrees: float) -> float:
                  """Set the thermostat temperature. Returns the new setting."""
                  ...

              @abstractmethod
              def lock_door(self) -> bool:
                  """Lock the door. Returns True if locked."""
                  ...

              @abstractmethod
              def dim_lights(self, brightness: int) -> int:
                  """Set light brightness (0-100). Returns the new level."""
                  ...


          # ── A device that is forced to implement everything ─────────────
          class SmartLightBad(SmartDevice):
              """A smart light bulb — but it is forced to 'play music',
              'set temperature', and 'lock doors' because of the fat interface."""

              def __init__(self, name: str) -> None:
                  super().__init__(name)
                  self._brightness: int = 100

              def play_music(self, song: str) -> str:
                  raise NotImplementedError("A light bulb cannot play music!")

              def set_temperature(self, degrees: float) -> float:
                  raise NotImplementedError("A light bulb has no thermostat!")

              def lock_door(self) -> bool:
                  raise NotImplementedError("A light bulb cannot lock doors!")

              def dim_lights(self, brightness: int) -> int:
                  self._brightness = max(0, min(100, brightness))
                  print(f"[{self.name}] Brightness set to {self._brightness}%")
                  return self._brightness


          # ── TODO: Segregate into role interfaces ─────────────────────────
          #
          # Replace the fat SmartDevice ABC with four lean role interfaces:
          #
          # 1. Dimmable(ABC)              — abstractmethod: dim_lights()
          # 2. Playable(ABC)              — abstractmethod: play_music()
          # 3. TemperatureControllable(ABC) — abstractmethod: set_temperature()
          # 4. Lockable(ABC)              — abstractmethod: lock_door()
          #
