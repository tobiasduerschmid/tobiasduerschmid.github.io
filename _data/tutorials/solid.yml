    quiz:
      title: "OCP — Refactor & Practice"
      min_score: 0.66
      shuffle: true
      questions:

        - question: |
            **Arrange** the code blocks to construct a polymorphic notification system following OCP. Drag the blocks into the correct order.
          type: parsons
          lines:
            - "from abc import ABC, abstractmethod"
            - "class NotificationChannel(ABC):"
            - "    @abstractmethod"
            - "    def deliver(self, user, message):"
            - "        ..."
            - "class EmailChannel(NotificationChannel):"
            - "    def deliver(self, user, message):"
            - "        print(f\"[EMAIL] {user}: {message}\")"
            - "class NotificationRouter:"
            - "    def __init__(self, channels):"
            - "        self._channels = {ch.name: ch for ch in channels}"
            - "    def send(self, user, message, channel_name):"
            - "        self._channels[channel_name].deliver(user, message)"
          distractors:
            - "    if channel_name == \"email\":"
            - "    elif channel_name == \"sms\":"
            - "        self._channels.append(channel_name)"
          explanation: |
            The correct order builds: (1) ABC import, (2) abstract `NotificationChannel` with `deliver`, (3) concrete `EmailChannel` implementing it, (4) a `NotificationRouter` that delegates via dictionary lookup. The distractors use if/elif chains and list appends — the old broken patterns. Polymorphism replaces all of that with dictionary dispatch and method delegation.

        - question: |
            In the refactored `ReportExporter`, you created separate classes for `CsvFormat`, `JsonFormat`, and `TextFormat`. **Thinking back to SRP:** does each format class have one reason to change?
          type: single
          options:
            - "No — each class handles both formatting and export coordination, which are two responsibilities"
            - "Yes — each class changes only when the serialization rules for its specific format change (e.g., CsvFormat changes only if CSV formatting rules change)"
            - "No — all three classes share the same abstract base class, so a change to ExportFormat forces all of them to change"
            - "Yes — but only because they are small classes; SRP does not apply to classes with fewer than 50 lines"
          correct_index: 1
          explanation: |
            Each format class has exactly **one reason to change**: when its specific serialization rules change. `CsvFormat` only changes for CSV reasons; `JsonFormat` only for JSON reasons. That's SRP working as intended. Sharing an abstract base class doesn't violate SRP — the ABC is a contract, and SRP applies regardless of class size.

        - question: |
            A teammate wants to add a `MarkdownFormat` to the refactored `ReportExporter`. What do they need to **modify**?
          type: single
          options:
            - "They must modify `ReportExporter.export()` to add a new elif branch for 'markdown'"
            - "They must modify `ExportFormat` to add a `to_markdown()` method alongside `format_report()`"
            - "They only need to create a new `MarkdownFormat` class extending `ExportFormat` and register it with the exporter — no existing code changes"
            - "They must modify all three existing format classes to ensure compatibility with the new format"
          correct_index: 2
          explanation: |
            This is the whole payoff of OCP. Adding Markdown means writing a **new** `MarkdownFormat(ExportFormat)` class and registering it. `ReportExporter`, `ExportFormat`, and all existing format classes stay untouched. Compare that to Step 4, where adding Slack meant surgery on the `NotificationRouter` itself.

        - question: |
            Which of the following are **benefits** of the refactored polymorphic design over the original if/elif chain?
          type: multiple
          options:
            - "Each format can be unit-tested independently without loading unrelated format logic"
            - "New formats can be added without risking regressions in existing, tested formats"
            - "The ReportExporter class is shorter and easier to understand because it only handles dispatch, not serialization details"
            - "The polymorphic design uses less memory because abstract classes are more efficient than if/elif chains"
          correct_indices: [0, 1, 2]
          explanation: |
            The first three are real benefits. Each format is independently testable, new formats can't break existing ones, and the exporter is cleaner because it just dispatches. The fourth is a myth — polymorphism doesn't inherently save memory, and in Python the difference is negligible. OCP is about **maintainability and safety**, not performance.
