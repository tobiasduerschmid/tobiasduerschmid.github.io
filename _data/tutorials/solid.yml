    quiz:
      title: "ISP — Lean Interfaces — Knowledge Check"
      min_score: 0.6
      shuffle: true
      questions:

        - question: |
            What is the difference between the Interface Segregation Principle (ISP) and the Single Responsibility Principle (SRP)?
          type: single
          options:
            - "They are the same principle with different names"
            - "SRP is about what a class does internally (one actor, one reason to change). ISP is about what a class exposes to its clients (no client should depend on methods it does not use)"
            - "SRP applies to concrete classes and ISP applies to abstract classes"
            - "ISP is a stricter version of SRP — every ISP-compliant class automatically satisfies SRP"
          correct_index: 1
          explanation: |
            SRP and ISP address different concerns. **SRP** says a class should serve one actor (internal cohesion). **ISP** says an interface should not force clients to depend on methods they do not use (external contract). A class can satisfy SRP (single actor) while violating ISP (exposing too many methods to certain clients), and vice versa.

        - question: |
            How does ISP help prevent LSP violations?
          type: single
          options:
            - "ISP eliminates the need for inheritance entirely"
            - "If a class does not inherit methods it cannot fulfill, it can never break those method contracts — the violation is impossible by design"
            - "ISP requires all methods to have default implementations, so nothing can crash"
            - "ISP and LSP are unrelated principles that solve different problems"
          correct_index: 1
          explanation: |
            ISP prevents LSP violations **structurally**. In the exercise, `FreeStorage` was forced to inherit `sync()` from `CloudStorage` and could only raise `NotImplementedError` — a clear LSP violation. With segregated interfaces, `FreeStorage` would not inherit `Syncable`, so it would be **impossible** for it to break the sync contract. The violation is eliminated at the design level, not patched at runtime.

        - question: |
            A colleague proposes splitting a 6-method interface into 6 single-method interfaces — one per method. Is this always a good idea?
          type: single
          options:
            - "Yes — the more interfaces, the better. Each method should always be its own interface"
            - "No — over-segregation creates an explosion of tiny interfaces that are hard to discover, compose, and maintain. Group methods by role or capability, not by count"
            - "Yes — ISP requires exactly one method per interface"
            - "No — ISP says you should never split interfaces at all"
          correct_index: 1
          explanation: |
            ISP is about **role-based** segregation, not mechanical splitting. Splitting into one-method-per-interface creates interface explosion: classes need long inheritance lists, developers struggle to discover which interfaces exist, and related operations get separated unnecessarily. The goal is to group methods that **change together** and are **used together** by the same clients. For example, `Uploadable` might reasonably include both `upload()` and `get_upload_status()` if every client that uploads also checks status.


  # --------------------------------------------------------------------------
  # STEP 8 — "DIP — Depend on Abstractions"
  # Pedagogy:
  #   Productive Failure — direct instantiation makes unit testing impossible.
  #   Contrastive Case   — DIP vs. DI distinction.
  #   Worked Example     — extract ABCs with sub-goal labels.
  #   Bloom's level      — Apply / Analyze / Evaluate (quiz).
  # --------------------------------------------------------------------------
  - title: "DIP — Depend on Abstractions"
    instructions: |
      ## The Dependency Inversion Principle

      > **Learning objective:** After this step you will be able to **distinguish** the Dependency Inversion Principle from Dependency Injection, **extract** abstractions owned by the high-level module, and **write** unit tests using mock implementations.

      ### The Principle

      > *"High-level modules should not depend on low-level modules. Both should depend on abstractions. Abstractions should not depend on details. Details should depend on abstractions."*
      > — Robert C. Martin

      ### Key Insight: DIP is not Dependency Injection

      These two concepts are often confused, but they are different:

      - **DIP** (Dependency Inversion Principle) = an **architectural decision** to depend on abstractions rather than concrete implementations. It dictates the direction of dependencies: high-level policy owns the interface, low-level details implement it.
      - **DI** (Dependency Injection) = a **mechanism** for passing dependencies via constructor, method parameters, or a framework. DI is one way to *achieve* DIP, but you can have DI without DIP (injecting a concrete class) and DIP without DI (using a factory or service locator).

      ### The Scenario

      You have an `OrderService` class that processes e-commerce orders. It directly instantiates three external dependencies in its `__init__`:

      - `PostgresDatabase()` — stores order data (simulated with `print()`)
      - `StripePaymentGateway()` — charges credit cards (simulated with `print()`)
      - `SendGridEmailer()` — sends confirmation emails (simulated with `print()`)

      ### Your Task

      Open `order_service.py`. Try to write a unit test for `place_order()` that verifies the order total is calculated correctly (items cost $29.99 and $49.99, total should be $79.98). You will find that your test **triggers all three external services** — database writes, payment charges, and emails — because `OrderService` directly creates these dependencies. There is no way to swap them out.

      Implement the `test_order_total_calculation()` function so that it:
      1. Creates an `OrderService` instance.
      2. Calls `place_order()` with two items.
      3. Asserts the returned total equals the expected sum.

      The test will "pass" in terms of the assertion, but notice all the `[POSTGRES]`, `[STRIPE]`, and `[SENDGRID]` print output — your "unit" test is hitting every external service.

      ### Worked Example: Applying DIP

      Here is how you would refactor `OrderService` to depend on abstractions. Study the sub-goal labels:

      ```python
      # Sub-goal 1: Define abstractions OWNED by the high-level module
      # The OrderService (high-level) defines what it needs.
      # Concrete implementations (low-level) adapt to fit.

      class OrderRepository(ABC):
          """Interface for order persistence — owned by OrderService."""
          @abstractmethod
          def save_order(self, order_id: str, items: list, total: float) -> None: ...

      class PaymentGateway(ABC):
          """Interface for payment processing — owned by OrderService."""
          @abstractmethod
          def charge(self, amount: float, token: str) -> bool: ...

      class OrderNotifier(ABC):
          """Interface for order notifications — owned by OrderService."""
          @abstractmethod
          def send_confirmation(self, order_id: str, email: str) -> None: ...

      # Sub-goal 2: Make concrete classes implement the abstractions
      class PostgresDatabase(OrderRepository):
          def save_order(self, order_id: str, items: list, total: float) -> None:
              print(f"[POSTGRES] Saved order {order_id}")

      class StripePaymentGateway(PaymentGateway):
          def charge(self, amount: float, token: str) -> bool:
              print(f"[STRIPE] Charged ${amount}")
              return True

      class SendGridEmailer(OrderNotifier):
          def send_confirmation(self, order_id: str, email: str) -> None:
              print(f"[SENDGRID] Sent confirmation for {order_id}")

      # Sub-goal 3: Inject dependencies via constructor
      class OrderService:
          def __init__(self, repo: OrderRepository,
                       payment: PaymentGateway,
                       notifier: OrderNotifier) -> None:
              self.repo = repo
              self.payment = payment
              self.notifier = notifier
      ```

      **Who owns the interface?** The high-level module (`OrderService`) defines `OrderRepository`, `PaymentGateway`, and `OrderNotifier`. The low-level modules (`PostgresDatabase`, `StripePaymentGateway`, `SendGridEmailer`) implement them. This is the "inversion" — instead of high-level depending on low-level, both depend on abstractions that the high-level module owns.

      **Why this matters for testing:** Now you can create `FakeRepository`, `FakePayment`, and `FakeNotifier` classes that implement the same ABCs — no database, no payment API, no email server. Pure, fast, isolated unit tests.

