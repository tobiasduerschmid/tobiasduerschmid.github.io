        Here is the diagnosis for each snippet:

        | # | Class | Violation | Why |
        |---|---|---|---|
        | 1 | `Logger` | **SRP** | Formats messages *and* writes to files — two actors (formatting policy vs. persistence policy) coupled in one class. |
        | 2 | `DiscountEngine` | **OCP** | Adding a new discount type requires modifying the `if/elif` chain instead of extending via a new class or strategy. |
        | 3 | `PremiumUser(User)` | **LSP** | `PremiumUser.free_trial_signup()` raises an exception instead of returning a string, so it cannot be substituted for `User` without breaking callers. |
        | 4 | `DatabaseClient` | **ISP** | Simple clients are forced to implement `cache_query()`, `replicate()`, and `shard()` — methods they do not need. The fat interface should be split. |
        | 5 | `ReportGenerator` | **DIP** | Directly instantiates `PdfRenderer` and `SqlConnection` — high-level policy depends on low-level details instead of abstractions. |
        | 6 | `UserValidator` | **None** | Follows all five principles: single responsibility, open for extension via new `ValidationRule` subclasses, substitutable rules, minimal interface, and depends on the `ValidationRule` abstraction. |

        The trick question (Snippet 6) is the most important learning moment. Recognizing well-designed code is just as valuable as spotting violations — it prevents the over-engineering trap of "fixing" code that is already correct.

