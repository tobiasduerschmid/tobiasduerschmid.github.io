    quiz:
      title: "DIP — Depend on Abstractions — Knowledge Check"
      min_score: 0.6
      shuffle: true
      questions:

        - question: |
            What is the difference between the Dependency Inversion Principle (DIP) and Dependency Injection (DI)?
          type: single
          options:
            - "They are the same thing — DIP and DI are interchangeable terms"
            - "DIP is an architectural principle (depend on abstractions, not concretions). DI is a mechanism (pass dependencies via constructor or parameters). You can have DI without DIP and DIP without DI"
            - "DI is the principle and DIP is the implementation technique"
            - "DIP only applies to databases and DI applies to all dependencies"
          correct_index: 1
          explanation: |
            **DIP** is the architectural decision: high-level modules should depend on abstractions, not concrete low-level modules. **DI** is a technique for delivering those dependencies (constructor injection, method injection, framework-based injection). You can inject a concrete class (DI without DIP) or use a factory to create abstractions (DIP without DI). They are complementary but distinct concepts.

        - question: |
            In DIP, who "owns" the interface (abstraction)?
          type: single
          options:
            - "The low-level module — it defines what it can do, and the high-level module adapts"
            - "The high-level module — it defines what it needs, and the low-level module adapts to fit"
            - "A separate 'interfaces' package that neither module owns"
            - "The framework or dependency injection container"
          correct_index: 1
          explanation: |
            This is the "inversion." In traditional layered architecture, high-level modules depend on low-level modules. With DIP, the high-level module defines the abstraction (`OrderRepository`, `PaymentGateway`) based on what **it** needs. The low-level module (`PostgresDatabase`, `StripePaymentGateway`) implements that abstraction. The dependency arrow is reversed: low-level depends on the abstraction defined by high-level.

        - question: |
            A colleague refactors a class to accept its database connection as a constructor parameter instead of creating it internally: `__init__(self, db: PostgresDatabase)`. Does this satisfy DIP?
          type: single
          options:
            - "Yes — passing a dependency via constructor is DIP"
            - "No — this is Dependency Injection but not Dependency Inversion. The class still depends on the concrete `PostgresDatabase` class, not an abstraction. DIP requires depending on an abstract interface like `OrderRepository`"
            - "Yes — any constructor parameter satisfies DIP"
            - "No — DIP requires using a dependency injection framework"
          correct_index: 1
          explanation: |
            This is a common misconception. Passing `PostgresDatabase` via constructor is **Dependency Injection** (the mechanism of providing dependencies externally), but not **Dependency Inversion** (the principle of depending on abstractions). To satisfy DIP, the parameter should be typed as an abstract interface (`OrderRepository`), not a concrete class. The class should not know or care whether it is talking to Postgres, MySQL, or an in-memory fake.

        - question: |
            Which of the following are benefits of applying DIP to the `WeatherDashboard`?
          type: multiple
          options:
            - "Unit tests can verify caching logic without connecting to OpenWeatherMap or MongoDB"
            - "You can swap OpenWeatherMapClient for a different weather API without changing WeatherDashboardDIP"
            - "The code runs faster in production because abstractions are faster than concrete classes"
            - "You can use a Redis cache instead of MongoDB by implementing the WeatherCache interface"
          correct_indices: [0, 1, 3]
          explanation: |
            DIP enables **testability** (use fakes instead of real services), **flexibility** (swap implementations without changing the high-level module), and **extensibility** (add new providers or caches by implementing the interface). It does **not** make code faster — abstractions add a tiny layer of indirection. The performance benefit comes from being able to test thoroughly and catch bugs early, not from runtime speed.
