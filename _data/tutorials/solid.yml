  - title: "DIP — Depend on Abstractions"
    instructions: |
      ## The Dependency Inversion Principle

      > **Learning objective:** After this step you will be able to **distinguish** the Dependency Inversion Principle from Dependency Injection, **extract** abstractions owned by the high-level module, and **write** unit tests using mock implementations.

      ### The Principle

      > *"High-level modules should not depend on low-level modules. Both should depend on abstractions."*
      > — Robert C. Martin

      ### DIP is NOT Dependency Injection

      People mix these up constantly, but they're different things:

      - **DIP** (Dependency Inversion Principle) = an **architectural decision** to depend on abstractions instead of concrete implementations. High-level policy owns the interface, low-level details implement it.
      - **DI** (Dependency Injection) = a **mechanism** for passing dependencies via constructor, method parameters, or a framework. DI is one way to *achieve* DIP, but you can have DI without DIP (injecting a concrete class) and DIP without DI (using a factory).

      ### The Scenario

      You have an `OrderService` class that processes e-commerce orders. It directly instantiates three external dependencies in its `__init__`:

      - `PostgresDatabase()` — stores order data (simulated with `print()`)
      - `StripePaymentGateway()` — charges credit cards (simulated with `print()`)
      - `SendGridEmailer()` — sends confirmation emails (simulated with `print()`)

      ### Your Task

      Open `order_service.py`. Try to write a unit test for `place_order()` that checks the order total (items cost $29.99 and $49.99, total should be $79.98). You'll discover your test **triggers all three external services** — database writes, payment charges, emails — because `OrderService` hard-codes its dependencies. There's no way to swap them out.

      Implement `test_order_total_calculation()` so it:
      1. Creates an `OrderService` instance.
      2. Calls `place_order()` with two items.
      3. Asserts the returned total equals the expected sum.

      The test will "pass" in terms of the assertion, but look at all the `[POSTGRES]`, `[STRIPE]`, and `[SENDGRID]` print spam — your "unit" test is hitting every external service. That's not a unit test, that's an integration test in disguise.

      ### Worked Example: Applying DIP

      Here is how you would refactor `OrderService` to depend on abstractions. Study the sub-goal labels:

      ```python
      # Sub-goal 1: Define abstractions OWNED by the high-level module
      # The OrderService (high-level) defines what it needs.
      # Concrete implementations (low-level) adapt to fit.

      class OrderRepository(ABC):
          """Interface for order persistence — owned by OrderService."""
          @abstractmethod
          def save_order(self, order_id: str, items: list, total: float) -> None: ...

      class PaymentGateway(ABC):
          """Interface for payment processing — owned by OrderService."""
          @abstractmethod
          def charge(self, amount: float, token: str) -> bool: ...

      class OrderNotifier(ABC):
          """Interface for order notifications — owned by OrderService."""
          @abstractmethod
          def send_confirmation(self, order_id: str, email: str) -> None: ...

      # Sub-goal 2: Make concrete classes implement the abstractions
      class PostgresDatabase(OrderRepository):
          def save_order(self, order_id: str, items: list, total: float) -> None:
              print(f"[POSTGRES] Saved order {order_id}")

      class StripePaymentGateway(PaymentGateway):
          def charge(self, amount: float, token: str) -> bool:
              print(f"[STRIPE] Charged ${amount}")
              return True

      class SendGridEmailer(OrderNotifier):
          def send_confirmation(self, order_id: str, email: str) -> None:
              print(f"[SENDGRID] Sent confirmation for {order_id}")

      # Sub-goal 3: Inject dependencies via constructor
      class OrderService:
          def __init__(self, repo: OrderRepository,
                       payment: PaymentGateway,
                       notifier: OrderNotifier) -> None:
              self.repo = repo
              self.payment = payment
              self.notifier = notifier
      ```

      **Who owns the interface?** The high-level module (`OrderService`) defines `OrderRepository`, `PaymentGateway`, and `OrderNotifier`. The low-level modules (`PostgresDatabase`, `StripePaymentGateway`, `SendGridEmailer`) implement them. This is the "inversion" — instead of high-level depending on low-level, both depend on abstractions that the high-level module owns.

      **Why this matters for testing:** Now you can create `FakeRepository`, `FakePayment`, and `FakeNotifier` classes that implement the same ABCs — no database, no payment API, no email server. Pure, fast, isolated unit tests.

