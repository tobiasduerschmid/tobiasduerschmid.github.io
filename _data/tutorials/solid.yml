            class GuestRegistry:
                """Manages the guest list. Actor: Event Coordinator."""

                def __init__(self) -> None:
                    self.guests = {}  # {name: {"email": str, "dietary": str}}

                def add(self, name: str, email: str, dietary="none") -> str:
                    """Add a guest with their email and dietary preference."""
                    self.guests[name] = {"email": email, "dietary": dietary}

                def remove(self, name: str) -> str:
                    """Remove a guest by name. Raise ValueError if not found."""
                    if name not in self.guests:
                        raise ValueError(f"Guest {name} not found")
                    del self.guests[name]

                def get(self, name: str) -> str:
                    """Return guest info dict. Raise ValueError if not found."""
                    if name not in self.guests:
