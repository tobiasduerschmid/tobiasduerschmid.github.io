  #   Authentic Task       — realistic library management domain.
  #   Full Transfer         — apply all five principles simultaneously.
  #   Anti-Pattern Warning — over-engineering example shows when to stop.
  #   Principle Interconnection — LSP enables OCP, DIP enables OCP, ISP reduces coupling.
  #   Bloom's level        — Analyze / Evaluate / Create (quiz).
