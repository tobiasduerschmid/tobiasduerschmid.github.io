      files:
        - path: "order_service.py"
          content: |
            from __future__ import annotations
            from abc import ABC, abstractmethod
            from typing import Dict, List, Optional


            # ── Abstractions owned by the high-level OrderService module ─────
            class OrderRepository(ABC):
                """What OrderService needs for persistence. Owned by this module."""

                @abstractmethod
                def save_order(self, order_id: str, items: List[str], total: float) -> None:
                    ...


            class PaymentGateway(ABC):
                """What OrderService needs for payments. Owned by this module."""

                @abstractmethod
                def charge(self, amount: float, token: str) -> bool:
                    ...


            class OrderNotifier(ABC):
                """What OrderService needs for notifications. Owned by this module."""

                @abstractmethod
                def send_confirmation(self, order_id: str, email: str) -> None:
                    ...


            # ── Low-level modules — now implement the abstractions ────────────
            class PostgresDatabase(OrderRepository):
                def __init__(self) -> None:
                    print("[POSTGRES] Connecting to database...")
                    self._orders: Dict[str, Dict] = {}

                def save_order(self, order_id: str, items: List[str], total: float) -> None:
                    print(f"[POSTGRES] INSERT INTO orders VALUES ('{order_id}', {len(items)} items, ${total:.2f})")
                    self._orders[order_id] = {"items": items, "total": total}


            class StripePaymentGateway(PaymentGateway):
                def __init__(self) -> None:
                    print("[STRIPE] Initializing payment gateway...")

                def charge(self, amount: float, token: str) -> bool:
                    print(f"[STRIPE] Charging ${amount:.2f} to card {token}")
                    return True


            class SendGridEmailer(OrderNotifier):
                def __init__(self) -> None:
                    print("[SENDGRID] Initializing email service...")

                def send_confirmation(self, order_id: str, email: str) -> None:
                    print(f"[SENDGRID] Sending order confirmation for {order_id} to {email}")


            # ── High-level module — depends only on abstractions ─────────────
            class OrderService:
                """Processes e-commerce orders using injected abstractions."""

                def __init__(
                    self,
                    repository: OrderRepository,
                    payment_gateway: PaymentGateway,
                    notifier: OrderNotifier,
                ) -> None:
                    self.db: OrderRepository = repository
                    self.payment: PaymentGateway = payment_gateway
                    self.emailer: OrderNotifier = notifier
                    self._next_order_id: int = 1

                def place_order(
                    self,
                    items: List[Dict[str, float]],
                    payment_token: str,
                    customer_email: str,
                ) -> Dict:
                    total: float = sum(item["price"] for item in items)
                    order_id: str = f"ORD-{self._next_order_id:04d}"
                    self._next_order_id += 1

                    item_names: List[str] = [item["name"] for item in items]
                    self.payment.charge(total, payment_token)
                    self.db.save_order(order_id, item_names, total)
                    self.emailer.send_confirmation(order_id, customer_email)

                    return {
                        "order_id": order_id,
                        "items": item_names,
                        "total": total,
                        "status": "confirmed",
                    }


            # ── Fakes for testing — no external services touched ─────────────
            class FakeOrderRepository(OrderRepository):
                def __init__(self) -> None:
                    self.saved: List[Dict] = []

                def save_order(self, order_id: str, items: List[str], total: float) -> None:
                    self.saved.append({"order_id": order_id, "items": items, "total": total})


            class FakePaymentGateway(PaymentGateway):
                def __init__(self) -> None:
                    self.charges: List[float] = []

                def charge(self, amount: float, token: str) -> bool:
                    self.charges.append(amount)
                    return True


            class FakeOrderNotifier(OrderNotifier):
                def __init__(self) -> None:
                    self.sent: List[str] = []

                def send_confirmation(self, order_id: str, email: str) -> None:
                    self.sent.append(order_id)


            def test_order_total_calculation() -> None:
                """Unit test — zero external calls, zero print spam."""
                service = OrderService(
                    repository=FakeOrderRepository(),
                    payment_gateway=FakePaymentGateway(),
                    notifier=FakeOrderNotifier(),
                )
                result = service.place_order(
                    items=[
                        {"name": "Wireless Mouse", "price": 29.99},
                        {"name": "USB-C Hub", "price": 49.99},
                    ],
                    payment_token="tok_test",
                    customer_email="test@example.com",
                )
                assert abs(result["total"] - 79.98) < 0.001, \
                    f"Expected total 79.98, got {result['total']}"


            if __name__ == "__main__":
                service = OrderService(
                    repository=PostgresDatabase(),
                    payment_gateway=StripePaymentGateway(),
                    notifier=SendGridEmailer(),
                )
                print(service.place_order(
                    items=[
                        {"name": "Wireless Mouse", "price": 29.99},
                        {"name": "USB-C Hub", "price": 49.99},
                    ],
                    payment_token="tok_visa_4242",
                    customer_email="customer@example.com",
                ))
                test_order_total_calculation()
                print("Unit test passed — no external services touched.")
