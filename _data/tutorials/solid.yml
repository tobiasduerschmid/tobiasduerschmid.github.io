    quiz:
      title: "SRP — Refactor & Practice — Knowledge Check"
      min_score: 0.6
      shuffle: true
      questions:

        - question: |
            After refactoring `EventPlanner` into four classes, the Finance actor wants to change how expenses are validated (e.g., adding category-based limits). Which class do they modify?
          type: single
          options:
            - "`VenueManager`"
            - "`GuestRegistry`"
            - "`BudgetTracker`"
            - "`InvitationSender`"
          correct_index: 2
          explanation: |
            With SRP applied, budget-related changes are isolated to `BudgetTracker`. The Finance actor modifies only this class, and no other class is affected. Before the refactoring, this change would have required modifying the monolithic `EventPlanner`, risking breakage in venue booking, guest management, or invitation logic.

        - question: |
            A colleague says: *"SRP means every class should have exactly one method."* Is this correct?
          type: single
          options:
            - "Yes — one responsibility means one method"
            - "No — SRP means one *reason to change* (one actor), not one method. A class can have many methods that all serve the same actor"
            - "Yes — if a class has multiple methods, it must have multiple responsibilities"
            - "No — SRP only applies to abstract classes, not concrete ones"
          correct_index: 1
          explanation: |
            SRP is about cohesion around a single actor, not about method count. `BudgetTracker` has three methods (`add_expense`, `get_remaining`, `get_summary`), but they all serve the Finance actor's needs. Having multiple methods that work together for one purpose is good design — it is splitting them across different classes that would be harmful.

        - question: |
            Which of the following are benefits of the SRP refactoring you just performed?
          type: multiple
          options:
            - "Each class can be tested independently without setting up the others"
            - "Changes for one actor cannot accidentally break another actor's functionality"
            - "The total number of lines of code is always reduced"
            - "Each class can be reused in different contexts (e.g., `BudgetTracker` for other events)"
          correct_indices: [0, 1, 3]
          explanation: |
            SRP often *increases* the total line count slightly (due to class definitions and boilerplate), but the trade-off is worth it: independent testability, isolated changes, and reusability. The refactored `BudgetTracker` could be used for any project that needs budget management, not just event planning. The code that serves different actors no longer risks breaking each other.
