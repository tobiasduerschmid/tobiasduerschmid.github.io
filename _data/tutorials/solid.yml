    quiz:
      title: "SRP — Feel the Friction — Knowledge Check"
      min_score: 0.6
      shuffle: true
      questions:

        - question: |
            In the Single Responsibility Principle, a "reason to change" comes from:
          type: single
          options:
            - "A bug in the code"
            - "An actor — a person or team that requests a modification to the system"
            - "A new programming language feature"
            - "The number of methods in the class"
          correct_index: 1
          explanation: |
            Robert C. Martin defines "reason to change" in terms of **actors** — the people or teams who ask for changes. A class serving multiple actors gets pulled in different directions, and that's how you end up with the breakage you just experienced.

        - question: |
            A class has 10 methods. Does this automatically mean it violates the Single Responsibility Principle?
          type: single
          options:
            - "Yes — any class with more than 5 methods violates SRP"
            - "No — SRP is about the number of actors served, not the number of methods. A class with 10 methods serving one actor may be fine"
            - "Yes — SRP requires each class to have exactly one method"
            - "No — SRP only applies to classes with inheritance"
          correct_index: 1
          explanation: |
            SRP is not about counting methods. A class with 10 methods can be totally fine if they all serve the same actor. Meanwhile, a class with just 3 methods can be an SRP disaster if those 3 methods serve 3 different teams. It's about *who* wants changes, not *how many* methods you have.

        - question: |
            In the `EmployeeManager` class, which actors are served by which responsibilities?
          type: multiple
          options:
            - "The **Finance Team** cares about payroll calculation and tax brackets"
            - "The **HR Team** cares about pay stub formatting and employee records"
            - "The **Compliance Team** cares about CSV export for audits"
            - "All three teams share the same reasons for changing the code"
          correct_indices: [0, 1, 2]
          explanation: |
            Each team wants different things: Finance changes tax rules, HR changes display formats, Compliance changes export structure. When one class tries to serve all three, a change for one team (like that tax bracket update) can ripple into the others' outputs. Splitting these into separate classes is exactly what SRP is about.


