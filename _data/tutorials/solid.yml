  - title: "Capstone — The Real World"
    instructions: |
      ## Putting It All Together: Library Management System

      > **Learning objective:** After this step you will be able to **identify** multiple simultaneous SOLID violations in a realistic system, **refactor** it to follow all five principles, and **recognize** when SOLID is being applied excessively.

      ### The Challenge

      You are given `library_system.py` — a monolithic library management system with **multiple SOLID violations baked in**. Your job:

      1. **Identify** every violation and label it with a comment (e.g., `# VIOLATION: OCP — ...`).
      2. **Refactor** the system into well-designed classes that follow SOLID.

      ### Violations to Find

      The system contains at least four violations — one each of SRP, OCP, LSP, and DIP. Read every method carefully before you start refactoring.

      ### Refactoring Guidelines

      Your refactored system should include:
      - A `BookRepository` class for managing books (adding, looking up, updating copies).
      - A `MemberRegistry` class for managing members (registering, looking up).
      - A `NotificationService` class (or protocol/ABC) for sending overdue notices.
      - A `CheckoutService` class that orchestrates checkouts by using the above classes.
      - Book subtypes that handle checkout logic polymorphically (physical copies, ebooks, audiobooks) — so `CheckoutService` does not need `if/elif` on book format.
      - A `ReferenceBook` that is handled properly without violating LSP (hint: separate the type hierarchy so reference books are not forced into a checkout interface they cannot fulfill).
      - Dependency injection for the logger and report writer — `CheckoutService` should accept abstractions, not instantiate `FileLogger()` or `CsvReportWriter()` directly.

      ### How the Principles Connect

      As you refactor, notice how the principles reinforce each other:
      - **LSP enables OCP:** Because every `Book` subtype fulfills the same checkout contract, `CheckoutService` can handle new book types without modification.
      - **DIP enables OCP:** Because `CheckoutService` depends on abstractions (logger, report writer), you can swap implementations without changing `CheckoutService`.
      - **ISP reduces coupling:** By keeping interfaces small (one ABC per concern), each class depends only on what it actually uses.

      ### A Warning: Over-Engineering

      After refactoring, take a look at this cautionary example. This is what happens when SOLID is applied **without judgment:**

      ```python
      # over_engineered.py — DO NOT DO THIS
      from abc import ABC, abstractmethod
      from typing import Protocol

      class IAddable(Protocol):
          def add(self, a: float, b: float) -> float: ...

      class ISubtractable(Protocol):
          def subtract(self, a: float, b: float) -> float: ...

      class IMultipliable(Protocol):
          def multiply(self, a: float, b: float) -> float: ...

      class IDivisible(Protocol):
          def divide(self, a: float, b: float) -> float: ...

      class CalculationResult:
          def __init__(self, value: float, operation: str) -> None:
              self.value = value
              self.operation = operation
          def unwrap(self) -> float:
              return self.value

      class CalculationStrategyFactory:
          @staticmethod
          def create(op: str) -> "MathEngine":
              return MathEngine()

      class MathEngine(IAddable, ISubtractable, IMultipliable, IDivisible):
          def add(self, a: float, b: float) -> float:
              return CalculationResult(a + b, "add").unwrap()
          def subtract(self, a: float, b: float) -> float:
              return CalculationResult(a - b, "subtract").unwrap()
          def multiply(self, a: float, b: float) -> float:
              return CalculationResult(a * b, "multiply").unwrap()
          def divide(self, a: float, b: float) -> float:
              if b == 0:
                  raise ZeroDivisionError("Cannot divide by zero")
              return CalculationResult(a / b, "divide").unwrap()

      # Usage — compare to: result = 2 + 3
      engine = CalculationStrategyFactory.create("add")
      result = engine.add(2, 3)
      ```

      Four interfaces, a factory, and a result wrapper — all for basic arithmetic. The original code (`2 + 3`) was already perfectly clear. **SOLID is a tool, not a religion.** Apply it when the complexity of the domain justifies it.

      ### When NOT to Apply SOLID

      - **Simple scripts and one-off tasks:** If the code will never change, do not invest in extension points.
      - **Prototypes and spikes:** Favor speed over structure — you will throw it away.
      - **When there is only one variant:** Do not create an ABC with a single implementation. Wait until you actually have two variants, then extract the abstraction.
      - **When it obscures intent:** If a 5-line function becomes 50 lines across 4 classes, the cure is worse than the disease.

