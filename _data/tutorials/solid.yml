                  print(f"[POSTGRES] INSERT INTO orders VALUES ('{order_id}', {len(items)} items, ${total:.2f})")
                  self._orders[order_id] = {"items": items, "total": total}

              def get_order(self, order_id: str) -> Optional[Dict]:
