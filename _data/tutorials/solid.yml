        - path: "weather_dashboard.py"
          content: |
            from __future__ import annotations
            from abc import ABC, abstractmethod
            from typing import Dict, List, Optional


            # ── Abstractions owned by the high-level module ────────────────
            class WeatherProvider(ABC):
                """Interface for weather data — owned by WeatherDashboard."""

                @abstractmethod
                def get_current(self, city: str) -> Dict[str, float]:
                    """Get current weather for a city."""
                    ...

                @abstractmethod
                def get_forecast(self, city: str, days: int) -> List[Dict[str, float]]:
                    """Get weather forecast for the next N days."""
                    ...


            class WeatherCache(ABC):
                """Interface for caching — owned by WeatherDashboard."""

                @abstractmethod
                def get(self, key: str) -> Optional[Dict]:
                    """Get a cached value by key. Returns None if not found."""
                    ...

                @abstractmethod
                def set(self, key: str, value: Dict, ttl_seconds: int) -> None:
                    """Cache a value with a time-to-live."""
                    ...


            # ── Low-level modules now implement the abstractions ───────────
            class OpenWeatherMapClient(WeatherProvider):
                """Simulates the OpenWeatherMap API client.
                Now implements the WeatherProvider abstraction."""

                def __init__(self) -> None:
                    print("[OPENWEATHER] Connecting to API...")

                def get_current(self, city: str) -> Dict[str, float]:
                    print(f"[OPENWEATHER] GET /weather?q={city}")
                    return {"temp": 72.5, "humidity": 45.0, "wind_speed": 8.3}

                def get_forecast(self, city: str, days: int) -> List[Dict[str, float]]:
                    print(f"[OPENWEATHER] GET /forecast?q={city}&cnt={days}")
                    return [{"temp": 70.0 + i, "humidity": 40.0 + i} for i in range(days)]


            class MongoDbCache(WeatherCache):
                """Simulates a MongoDB caching layer.
                Now implements the WeatherCache abstraction."""

                def __init__(self) -> None:
                    print("[MONGODB] Connecting to cache...")
                    self._cache: Dict[str, Dict] = {}

                def get(self, key: str) -> Optional[Dict]:
                    print(f"[MONGODB] GET {key}")
                    return self._cache.get(key)

                def set(self, key: str, value: Dict, ttl_seconds: int) -> None:
                    print(f"[MONGODB] SET {key} (TTL: {ttl_seconds}s)")
                    self._cache[key] = value


            # ── Original tightly coupled class (for reference) ─────────────
            class WeatherDashboard:
                """Displays weather data with caching.
                Problem: directly instantiates external dependencies."""

                def __init__(self) -> None:
                    self.api: OpenWeatherMapClient = OpenWeatherMapClient()
                    self.cache: MongoDbCache = MongoDbCache()

                def get_weather(self, city: str) -> Dict[str, float]:
                    cache_key: str = f"weather:{city}"
                    cached: Optional[Dict] = self.cache.get(cache_key)
                    if cached is not None:
                        print(f"[DASHBOARD] Cache hit for {city}")
                        return cached
                    print(f"[DASHBOARD] Cache miss for {city} — fetching from API")
                    data: Dict[str, float] = self.api.get_current(city)
                    self.cache.set(cache_key, data, ttl_seconds=300)
                    return data

                def get_forecast(self, city: str, days: int = 5) -> List[Dict[str, float]]:
                    cache_key: str = f"forecast:{city}:{days}"
                    cached: Optional[Dict] = self.cache.get(cache_key)
                    if cached is not None:
                        return cached
                    forecast: List[Dict[str, float]] = self.api.get_forecast(city, days)
                    self.cache.set(cache_key, {"data": forecast}, ttl_seconds=600)
                    return forecast


            # ── Refactored dashboard using DIP ─────────────────────────────
            class WeatherDashboardDIP:
                """Refactored dashboard that depends on abstractions."""

                def __init__(self, provider: WeatherProvider, cache: WeatherCache) -> None:
                    self.provider: WeatherProvider = provider
                    self.cache: WeatherCache = cache

                def get_weather(self, city: str) -> Dict[str, float]:
                    """Get current weather, using cache if available."""
                    cache_key: str = f"weather:{city}"
                    cached: Optional[Dict] = self.cache.get(cache_key)
                    if cached is not None:
                        return cached
                    data: Dict[str, float] = self.provider.get_current(city)
                    self.cache.set(cache_key, data, ttl_seconds=300)
                    return data

                def get_forecast(self, city: str, days: int = 5) -> List[Dict[str, float]]:
                    """Get weather forecast for the next N days."""
                    cache_key: str = f"forecast:{city}:{days}"
                    cached: Optional[Dict] = self.cache.get(cache_key)
                    if cached is not None:
                        return cached
                    forecast: List[Dict[str, float]] = self.provider.get_forecast(city, days)
                    self.cache.set(cache_key, {"data": forecast}, ttl_seconds=600)
                    return forecast


            # ── Test doubles ───────────────────────────────────────────────
            class FakeWeatherProvider(WeatherProvider):
                """Test double — returns predictable data, no network calls."""

                def __init__(self) -> None:
                    self.call_count: int = 0

                def get_current(self, city: str) -> Dict[str, float]:
                    self.call_count += 1
                    return {"temp": 75.0, "humidity": 50.0, "wind_speed": 5.0}

                def get_forecast(self, city: str, days: int) -> List[Dict[str, float]]:
                    self.call_count += 1
                    return [{"temp": 75.0, "humidity": 50.0} for _ in range(days)]


            class FakeWeatherCache(WeatherCache):
                """Test double — in-memory cache, no database."""

                def __init__(self) -> None:
                    self._data: Dict[str, Dict] = {}

                def get(self, key: str) -> Optional[Dict]:
                    return self._data.get(key)

                def set(self, key: str, value: Dict, ttl_seconds: int) -> None:
                    self._data[key] = value


            def test_dashboard_uses_cache() -> None:
                """Test that the dashboard returns cached data on second call."""
                provider: FakeWeatherProvider = FakeWeatherProvider()
                cache: FakeWeatherCache = FakeWeatherCache()
                dashboard: WeatherDashboardDIP = WeatherDashboardDIP(provider, cache)

                # First call — should hit the provider
                result1: Dict[str, float] = dashboard.get_weather("Seattle")
                assert provider.call_count == 1, \
                    f"First call should hit provider once, got {provider.call_count} calls"

                # Second call — should use cache, NOT hit provider again
                result2: Dict[str, float] = dashboard.get_weather("Seattle")
                assert provider.call_count == 1, \
                    f"Second call should use cache (provider still 1 call), got {provider.call_count} calls"

                # Both results should be identical
                assert result1 == result2, "Cached result should match original"


            # ── Demo ──────────────────────────────────────────────────────
            if __name__ == "__main__":
                print("=== Original (tightly coupled) ===")
                dash: WeatherDashboard = WeatherDashboard()
                print(dash.get_weather("Seattle"))
                print()
                print(dash.get_weather("Seattle"))  # Should be cached
          language: "python"
      explanation: |
        **The pain of tight coupling:**

        The `test_order_total_calculation()` function creates an `OrderService`, which immediately instantiates `PostgresDatabase()`, `StripePaymentGateway()`, and `SendGridEmailer()` in its constructor. Your "unit" test triggers database connections, payment API calls, and email sends — all simulated with `print()` here, but in production these would be real network calls that make tests slow, flaky, and dependent on external infrastructure.

        **The DIP solution (shown in the worked example and applied in the WeatherDashboard exercise):**

        1. **Define abstractions** (`WeatherProvider`, `WeatherCache`) that the high-level module owns.
        2. **Make concrete classes implement** those abstractions (`OpenWeatherMapClient` extends `WeatherProvider`).
        3. **Inject via constructor** — `WeatherDashboardDIP` receives its dependencies instead of creating them.
        4. **Test with fakes** — `FakeWeatherProvider` and `FakeWeatherCache` implement the same ABCs with no external dependencies. The test verifies caching logic purely in memory.

        **Who owns the interface?** The high-level module (`WeatherDashboardDIP`) defines what it needs. The low-level modules adapt to fit. This is the "inversion" — dependency arrows point toward abstractions, not toward concrete implementations.

