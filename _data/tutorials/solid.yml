          content: |
            """Tests for the media player hierarchy — post-fix."""
            import pytest
            from media_player import (
                AudioFilePlayer,
                VideoFilePlayer,
                LiveStreamPlayer,
                MediaPlayer,
                SeekablePlayer,
                playlist_renderer,
            )


            def test_audio_player_supports_seek() -> None:
                player = AudioFilePlayer("Song.mp3", duration=240)
                player.play()
                player.seek(120)
                assert player.get_duration() == 240
                player.stop()


            def test_video_player_supports_seek() -> None:
                player = VideoFilePlayer("Movie.mp4", duration=7200)
                player.play()
                player.seek(3600)
                assert player.get_duration() == 7200
                player.stop()


            def test_live_stream_plays_and_stops() -> None:
                player = LiveStreamPlayer("CNN Live")
                assert isinstance(player, MediaPlayer)
                player.play()
                player.stop()


            def test_live_stream_is_not_seekable() -> None:
                player = LiveStreamPlayer("CNN Live")
                assert not isinstance(player, SeekablePlayer), (
                    "LiveStreamPlayer must not inherit from SeekablePlayer — "
                    "it can't honor the seek contract."
                )


            def test_playlist_renders_all_types() -> None:
                players = [
                    AudioFilePlayer("Song.mp3", duration=240),
                    VideoFilePlayer("Movie.mp4", duration=7200),
                    LiveStreamPlayer("CNN Live"),
                ]
                entries = playlist_renderer(players)
                assert len(entries) == 3

                assert entries[0]["has_progress_bar"] is True
                assert entries[0]["duration"] == 240

                assert entries[1]["has_progress_bar"] is True
                assert entries[1]["duration"] == 7200

                assert entries[2]["has_progress_bar"] is False
                assert entries[2]["duration"] is None


            if __name__ == "__main__":
                pytest.main([__file__, "-v"])
          language: "python"
      explanation: |
        **The structural move — same pattern in both domains.**

        Payments: `PaymentProcessor` → split into `PaymentProcessor` (base, `process_payment` only) and `RefundableProcessor` (adds `refund`). `GiftCardProcessor` extends only the base. It cannot violate `refund()` because it doesn't have one.

        Media player: `MediaPlayer` → split into `MediaPlayer` (base, `play`/`stop` only) and `SeekablePlayer` (adds `seek`/`get_duration`). `LiveStreamPlayer` extends only the base. The `playlist_renderer` uses `isinstance(player, SeekablePlayer)` to decide whether a progress bar is appropriate.

        **The LSP rule of thumb:** if a subclass needs to raise `NotImplementedError`, return a failure sentinel, or silently restrict what the parent accepts, **it should not be a subclass of that parent**. Split the hierarchy so the contract stays honest.

        **Connection to the next step:** when you split one fat interface (`MediaPlayer` with `play/stop/seek/get_duration`) into two smaller role-specific interfaces (`MediaPlayer` and `SeekablePlayer`), you've just applied the **Interface Segregation Principle** — ISP — which is up next.

