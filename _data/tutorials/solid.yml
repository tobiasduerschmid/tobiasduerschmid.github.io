      explanation: |
        ### Violations Found and Fixed

        | Violation | Where | Fix |
        |---|---|---|
        | **SRP** | `LibrarySystem` managed books, members, notifications, *and* reports — four distinct responsibilities for different actors. | Split into `BookRepository`, `MemberRegistry`, `NotificationService`, `CheckoutService`, and `InventoryReporter`. |
        | **OCP** | `checkout()` had an `if/elif` chain for `"physical"`, `"ebook"`, `"audiobook"`. Adding a new format required modifying this method. | Created `Book` ABC with a `checkout()` method. Each format (`PhysicalBook`, `EBook`, `AudioBook`) implements its own logic. `CheckoutService` just calls `book.checkout()` — no branching. |
        | **LSP** | `ReferenceBook` was a `Book` with `format="reference"`, but `checkout()` raised `NotImplementedError` — breaking the contract that any `Book` can be checked out. | Made `ReferenceBook` a **separate class** (not a subclass of `Book`). It has a `browse()` method instead of `checkout()`. It cannot be passed to `CheckoutService`, which prevents the runtime error entirely. |
        | **DIP** | `LibrarySystem.__init__()` directly instantiated `FileLogger()` and `CsvReportWriter()`. | Defined `Logger` and `ReportWriter` ABCs. All services accept these abstractions via constructor injection. `FileLogger` and `CsvReportWriter` implement the ABCs. |

        ### How the Principles Reinforce Each Other

        - **LSP enables OCP:** Because `PhysicalBook`, `EBook`, and `AudioBook` all fulfill the `Book.checkout()` contract, `CheckoutService` works with any book type — including future ones — without modification.
        - **DIP enables OCP:** Because `CheckoutService` depends on the `Logger` abstraction (not `FileLogger`), you can swap to a `DatabaseLogger` or `SlackLogger` without touching `CheckoutService`.
        - **ISP reduces coupling:** Each ABC has exactly one method (`Logger.log()`, `ReportWriter.write()`, `Book.checkout()`). Classes depend only on the minimal interface they need.
        - **SRP makes testing easy:** Each class can be unit-tested independently. `CheckoutService` can be tested with a mock `Logger` and a pre-populated `BookRepository`.

