          content: |
            """Weather dashboard — DIP-compliant with student-designed abstractions."""
            from __future__ import annotations
            from abc import ABC, abstractmethod
            from typing import Dict, List, Optional


            # ── Abstractions owned by the dashboard module ──────────────────
            class WeatherProvider(ABC):
                """What WeatherDashboard needs from a weather source.
                Shape: driven by the dashboard's calls, not by OpenWeatherMap's API."""

                @abstractmethod
                def get_current(self, city: str) -> Dict[str, float]:
                    ...

                @abstractmethod
                def get_forecast(self, city: str, days: int) -> List[Dict[str, float]]:
                    ...


            class WeatherCache(ABC):
                """What WeatherDashboard needs from a cache."""

                @abstractmethod
                def get(self, key: str) -> Optional[Dict]:
                    ...

                @abstractmethod
                def set(self, key: str, value: Dict, ttl_seconds: int) -> None:
                    ...


            # ── Low-level modules — adapt to fit the dashboard's abstractions ─
            class OpenWeatherMapClient(WeatherProvider):
                def __init__(self) -> None:
                    print("[OPENWEATHER] Connecting to API...")

                def get_current(self, city: str) -> Dict[str, float]:
                    print(f"[OPENWEATHER] GET /weather?q={city}")
                    return {"temp": 72.5, "humidity": 45.0, "wind_speed": 8.3}

                def get_forecast(self, city: str, days: int) -> List[Dict[str, float]]:
                    print(f"[OPENWEATHER] GET /forecast?q={city}&cnt={days}")
                    return [{"temp": 70.0 + i, "humidity": 40.0 + i} for i in range(days)]


            class MongoDbCache(WeatherCache):
                def __init__(self) -> None:
                    print("[MONGODB] Connecting to cache...")
                    self._cache: Dict[str, Dict] = {}

                def get(self, key: str) -> Optional[Dict]:
                    print(f"[MONGODB] GET {key}")
                    return self._cache.get(key)

                def set(self, key: str, value: Dict, ttl_seconds: int) -> None:
                    print(f"[MONGODB] SET {key} (TTL: {ttl_seconds}s)")
                    self._cache[key] = value


            # ── High-level module — depends only on abstractions ───────────
            class WeatherDashboardDIP:
                """Dashboard that depends on abstractions owned by this module."""

                def __init__(self, provider: WeatherProvider, cache: WeatherCache) -> None:
                    self.provider: WeatherProvider = provider
                    self.cache: WeatherCache = cache

                def get_weather(self, city: str) -> Dict[str, float]:
                    cache_key: str = f"weather:{city}"
                    cached: Optional[Dict] = self.cache.get(cache_key)
                    if cached is not None:
                        return cached
                    data: Dict[str, float] = self.provider.get_current(city)
                    self.cache.set(cache_key, data, ttl_seconds=300)
                    return data

                def get_forecast(self, city: str, days: int = 5) -> List[Dict[str, float]]:
                    cache_key: str = f"forecast:{city}:{days}"
                    cached: Optional[Dict] = self.cache.get(cache_key)
                    if cached is not None:
                        return cached["data"]
                    forecast: List[Dict[str, float]] = self.provider.get_forecast(city, days)
                    self.cache.set(cache_key, {"data": forecast}, ttl_seconds=600)
                    return forecast


            # ── Test doubles ────────────────────────────────────────────────
            class FakeWeatherProvider(WeatherProvider):
                def __init__(self) -> None:
                    self.call_count: int = 0

                def get_current(self, city: str) -> Dict[str, float]:
                    self.call_count += 1
                    return {"temp": 75.0, "humidity": 50.0, "wind_speed": 5.0}

                def get_forecast(self, city: str, days: int) -> List[Dict[str, float]]:
                    self.call_count += 1
                    return [{"temp": 75.0, "humidity": 50.0} for _ in range(days)]


            class FakeWeatherCache(WeatherCache):
                def __init__(self) -> None:
                    self._data: Dict[str, Dict] = {}

                def get(self, key: str) -> Optional[Dict]:
                    return self._data.get(key)

                def set(self, key: str, value: Dict, ttl_seconds: int) -> None:
                    self._data[key] = value


            def test_dashboard_uses_cache() -> None:
                """Verify caching logic WITHOUT hitting any external service."""
                provider = FakeWeatherProvider()
                cache = FakeWeatherCache()
                dashboard = WeatherDashboardDIP(provider, cache)

                # First call: provider should be hit
                result1 = dashboard.get_weather("Seattle")
                assert provider.call_count == 1, f"Expected 1 call, got {provider.call_count}"

                # Second call: cache hit, provider must NOT be hit again
                result2 = dashboard.get_weather("Seattle")
                assert provider.call_count == 1, \
                    f"Provider should not be called again — got {provider.call_count} total calls"
                assert result1 == result2


            if __name__ == "__main__":
                test_dashboard_uses_cache()
                print("Unit test passed — no network, no database.")
          language: "python"
      explanation: |
        **Task 1 reveal:** The original `test_order_total_calculation()` passed its assertion, but you saw `[POSTGRES]`, `[STRIPE]`, and `[SENDGRID]` spam. That's the DIP violation showing up as untestability — a "unit test" that cannot isolate the unit from its collaborators.

        **Task 2 — the abstractions you designed:**

        - **`WeatherProvider`** — two methods (`get_current`, `get_forecast`), shaped by what the dashboard calls. Not a copy of OpenWeatherMap's full API. *Owned by the dashboard module.*
        - **`WeatherCache`** — two methods (`get`, `set(..., ttl_seconds)`). Not MongoDB's full interface — just what the dashboard needs.

        **Why ownership matters.** If OpenWeatherMap adds a `get_air_quality()` method next week, your abstraction doesn't change — the dashboard doesn't ask for air quality. If OpenWeatherMap *removes* `get_forecast()`, the abstraction still declares it, and you'd need a different provider (or an adapter) — which is exactly the signal you want: a spec mismatch at the boundary, not a silent change in behavior.

        **Why fakes unlock testing.** With `FakeWeatherProvider` and `FakeWeatherCache`, the cache-hit test takes microseconds, hits no network, and verifies the *behavior that matters*: "after the first call, the provider is not called again." That is a true unit test.

        **The "indirection without inversion" trap.** A common mistake is to make `WeatherProvider` mirror OpenWeatherMap's full API — same method names, same shape. That's *indirection* (an extra layer), not *inversion* (the caller owns the interface). Your interface should describe the caller's needs. If a method is there only because the concrete class has it, it probably doesn't belong.

