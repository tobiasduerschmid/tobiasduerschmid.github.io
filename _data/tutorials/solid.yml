        command: |
          g = {}
          exec(open('/tutorial/report_exporter.py').read(), g)
          EF = g['ExportFormat']
          RE = g['ReportExporter']

          # Dynamically create a new format class to prove extensibility
          class XmlFormat(EF):
              @property
              def name(self) -> str:
                  return "xml"
              def format_report(self, title: str, headers, rows) -> str:
                  lines = [f"<report title=\"{title}\">"]
                  for row in rows:
                      lines.append("  <row>")
                      for i, h in enumerate(headers):
                          lines.append(f"    <{h}>{row[i]}</{h}>")
                      lines.append("  </row>")
                  lines.append("</report>")
                  return "\n".join(lines)

          # Register XML without touching ReportExporter source
          exporter = RE([g['CsvFormat'](), g['JsonFormat'](), g['TextFormat'](), XmlFormat()])
          result = exporter.export("Test", ["A"], [["1"]], "xml")
          assert "<report" in result, \
              f"New XmlFormat should work without modifying ReportExporter. Got: {repr(result)}"
          assert "Unknown" not in result, \
              f"ReportExporter did not recognize the new format. Got: {repr(result)}"

