    quiz:
      title: "Liskov Substitution Principle — Knowledge Check"
      min_score: 0.75
      shuffle: true
      questions:

        - question: |
            The Liskov Substitution Principle says a subclass must:
          type: multiple
          options:
            - "Accept at least what the parent accepts (equal or weaker preconditions)"
            - "Guarantee at least what the parent guarantees (equal or stronger postconditions)"
            - "Override every method of the parent class"
            - "Add new methods that the parent does not have"
          correct_indices: [0, 1]
          explanation: |
            LSP is about **behavioral compatibility**. A subclass must not reject inputs the parent accepts (no strengthening preconditions) and must not weaken the guarantees the parent makes (no weakening postconditions). Overriding every method or adding new methods are unrelated to LSP.

        - question: |
            A `PaymentProcessor` base class defines `refund(txn_id)` with the postcondition "returns `{"success": True, "amount": <float>}`." A `GiftCardProcessor` subclass returns `{"success": False, "error": "non-refundable"}` instead. A teammate argues: *"It still returns a dict with the right keys, so it follows the contract."*

            Why is this still an LSP violation?
          type: single
          options:
            - "Because the dict has an extra 'error' key that the parent does not define"
            - "Because the postcondition guarantees success=True and an amount — returning success=False weakens that guarantee"
            - "Because GiftCardProcessor should raise an exception instead of returning a dict"
            - "Because the base class should not have a refund method at all"
          correct_index: 1
          explanation: |
            The postcondition is not just "return a dict" — it is "**successfully** refund and return the amount." Returning `success=False` silently breaks the contract. Callers that trust the postcondition will proceed as if the refund succeeded. This is actually *more* dangerous than raising an exception, because it fails silently.

        - question: |
            Consider this code:

            ```python
            class Bird(ABC):
                @abstractmethod
                def fly(self) -> None:
                    ...

            class Penguin(Bird):
                def fly(self) -> None:
                    raise NotImplementedError("Penguins can't fly")
            ```

            Which statement is correct?
          type: single
          options:
            - "This is fine — Penguin honestly reports it cannot fly by raising an exception"
            - "This violates LSP — any code expecting a Bird to fly will crash when given a Penguin"
            - "This violates LSP only if fly() is called in a loop"
            - "This is fine — NotImplementedError is the standard way to indicate unsupported operations"
          correct_index: 1
          explanation: |
            If `Bird` promises that `fly()` works, then `Penguin` violating that promise breaks any code that iterates over a list of `Bird` objects and calls `fly()`. The fix is the same pattern as our payment and media player examples: split into `Bird` (base) and `FlyingBird` (adds `fly()`). `NotImplementedError` in a concrete subclass is a strong code smell indicating an LSP violation.

        - question: |
            A base class method `calculate_shipping(weight)` accepts any positive weight. A subclass overrides it to reject weights above 50 kg. This is an example of:
          type: single
          options:
            - "Strengthening a precondition — an LSP violation"
            - "Weakening a precondition — LSP-compliant"
            - "Strengthening a postcondition — LSP-compliant"
            - "Weakening a postcondition — an LSP violation"
          correct_index: 0
          explanation: |
            The base class accepts *any* positive weight. The subclass rejects weights above 50 kg — it accepts a *smaller* set of inputs. This **strengthens** the precondition, which violates LSP. Code that passes 75 kg to a base-class reference will crash when it gets the subclass. The fix: declare the weight limit explicitly (e.g., a `max_weight` property) instead of silently restricting the input range.
  # --------------------------------------------------------------------------
  # STEP 7 — "ISP — Lean Interfaces"
  # Pedagogy:
  #   Productive Failure — fat CloudStorage interface forces meaningless stubs.
  #   Contrastive Case   — side-by-side fat vs. segregated interfaces.
  #   Bridge from LSP    — ISP prevents LSP violations structurally.
  #   Bloom's level      — Apply / Analyze / Create (quiz).
  # --------------------------------------------------------------------------
  - title: "ISP — Lean Interfaces"
    instructions: |
      ## The Interface Segregation Principle

      > **Learning objective:** After this step you will be able to **identify** fat interfaces that force clients to depend on methods they do not use, and **refactor** them into lean, role-based interfaces.

      ### The Principle

      > *"Clients should not be forced to depend on methods they do not use."*
      > — Robert C. Martin

      When an interface grows too large, implementers that only need a subset of its methods are forced to provide stub implementations — methods that do nothing or raise errors. This wastes developer effort, confuses readers, and creates **latent bugs**: code that compiles and type-checks but crashes at runtime.

      ### Bridge from LSP

      Remember the Liskov Substitution Principle from the previous step? ISP **prevents** LSP violations structurally. If `FreeStorage` does not inherit a `sync()` method, it can never break the sync contract. The problem is eliminated at the type level, not patched at the implementation level.

      ### The Scenario

      You are building a cloud storage service with two tiers: **Premium** and **Free**. Below is the current `CloudStorage` abstract base class. It defines six capabilities:

      | Method | Premium | Free |
      |---|---|---|
      | `upload(file)` | Yes | Yes |
      | `download(file_id)` | Yes | Yes |
      | `sync(device)` | Yes | **No** |
      | `share(file_id, user)` | Yes | **No** |
      | `encrypt(file_id)` | Yes | **No** |
      | `get_version_history(file_id)` | Yes | **No** |

      `PremiumStorage` implements all six methods. Your task is to create a `FreeStorage` class that also extends `CloudStorage`. But Free users can only upload and download — they cannot sync, share, encrypt, or view version history.

      ### Your Task

      Open `cloud_storage.py`. Implement the `FreeStorage` class so that it inherits from `CloudStorage` and:

      1. Implements `upload()` to store the file and return `True`.
      2. Implements `download()` to return the stored file name.
      3. Implements `sync()`, `share()`, `encrypt()`, and `get_version_history()` to raise `NotImplementedError("Upgrade to Premium")`.

      After you get the tests to pass, try calling `backup_service(FreeStorage())` in your head. What happens? The backup service **expects** any `CloudStorage` to support `sync()`, but `FreeStorage` explodes at runtime. This is the pain of a fat interface.

      ### What ISP Would Look Like

      Compare the fat interface approach with a segregated design:

      **Fat interface (current — problematic):**
      ```
      CloudStorage
      ├── upload()
      ├── download()
      ├── sync()
      ├── share()
      ├── encrypt()
      └── get_version_history()

      FreeStorage(CloudStorage)  ← must stub 4 methods
      PremiumStorage(CloudStorage)
      ```

      **Segregated interfaces (ISP-compliant):**
      ```
      Uploadable          ← upload()
      Downloadable        ← download()
      Syncable            ← sync()
      Shareable           ← share()
      Encryptable         ← encrypt()
      Versionable         ← get_version_history()

      FreeStorage(Uploadable, Downloadable)
      PremiumStorage(Uploadable, Downloadable, Syncable, Shareable, Encryptable, Versionable)
      ```

      With segregated interfaces, `FreeStorage` never inherits `sync()`, so `backup_service()` would require `Syncable` — and the type system (or a simple `isinstance` check) would catch the mismatch **before** runtime.

      ### Key Insight: ISP is not SRP

      - **SRP** = what a class does internally (one reason to change, one actor).
      - **ISP** = what a class exposes to its **clients** (no client should depend on methods it does not use).

      A class can satisfy SRP (single actor) while violating ISP (interface too broad for some clients). They address different concerns.

