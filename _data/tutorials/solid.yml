      explanation: |
        **The refactoring separates each actor's concern into its own class:**

        - **`VenueManager`** — Already provided. Handles only venue booking.
        - **`GuestRegistry`** — The `add()` method stores guest data in the dict. The `remove()` method checks for existence before deleting. Each method is straightforward because it only deals with guest data.
        - **`BudgetTracker`** — `add_expense()` checks the remaining budget before adding. `get_remaining()` returns the simple subtraction. No formatting or display logic leaks in.
        - **`InvitationSender`** — `record_rsvp()` validates both that an invitation exists and that the status is valid. `get_rsvp_summary()` counts statuses in a simple loop.

        **Key insight:** Each class can now change independently. The Finance actor can modify `BudgetTracker` without affecting guest management. The Communications actor can change invitation formatting without touching the budget. This is the Single Responsibility Principle in action.

