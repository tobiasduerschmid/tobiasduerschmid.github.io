    quiz:
      title: "SRP — Refactor & Practice — Knowledge Check"
      min_score: 0.6
      shuffle: true
      questions:

        - question: |
            After refactoring `EventPlanner` into four classes, the Finance actor wants to change how expenses are validated (e.g., adding category-based limits). Which class do they modify?
          type: single
          options:
            - "`VenueManager`"
            - "`GuestRegistry`"
            - "`BudgetTracker`"
            - "`InvitationSender`"
          correct_index: 2
          explanation: |
            With SRP, budget stuff lives in `BudgetTracker` and nowhere else. Finance changes only this class, and nothing else breaks. Before the refactoring, touching the monolithic `EventPlanner` for a budget change could've accidentally messed up venue booking, guest management, or invitation logic.

        - question: |
            A colleague says: *"SRP means every class should have exactly one method."* Is this correct?
          type: single
          options:
            - "Yes — one responsibility means one method"
            - "No — SRP means one *reason to change* (one actor), not one method. A class can have many methods that all serve the same actor"
            - "Yes — if a class has multiple methods, it must have multiple responsibilities"
            - "No — SRP only applies to abstract classes, not concrete ones"
          correct_index: 1
          explanation: |
            SRP is about cohesion around one actor, not about counting methods. `BudgetTracker` has three methods (`add_expense`, `get_remaining`, `get_summary`), but they all serve Finance. Multiple methods working together for one purpose = good design. Splitting them across random classes would actually make things worse.

        - question: |
            Which of the following are benefits of the SRP refactoring you just performed?
          type: multiple
          options:
            - "Each class can be tested independently without setting up the others"
            - "Changes for one actor cannot accidentally break another actor's functionality"
            - "The total number of lines of code is always reduced"
            - "Each class can be reused in different contexts (e.g., `BudgetTracker` for other events)"
          correct_indices: [0, 1, 3]
          explanation: |
            SRP often *increases* total line count slightly (more class definitions and boilerplate), but the payoff is massive: independent testability, isolated changes, and reusability. That `BudgetTracker` could be dropped into any project that needs budget management. And changes for one team can never accidentally break another team's code.
  # --------------------------------------------------------------------------
  # STEP 4 — OCP: Feel the Friction
  # Pedagogy:
  #   Feel the Pain     — students add a feature to a rigid design, feel the cost.
  #   Generation Effect  — predict what breaks before reading the explanation.
  #   Growth Mindset     — the bad feeling is the learning signal.
  #   Bloom's level      — Apply / Analyze (task + quiz).
  # --------------------------------------------------------------------------
  - title: "OCP — Feel the Friction"
    instructions: |
      ## The Open/Closed Principle — Part 1: Feel the Pain

      > **Learning objective:** After this step you will be able to **identify** code that violates the Open/Closed Principle and **explain** why adding features to if/elif chains is risky.

      ### The Scenario

      Your team runs an e-commerce platform. The `NotificationRouter` class sends notifications to customers through different channels — email, SMS, and push. Each channel has its own formatting, rate limits, and delivery logic.

      Open `notification_router.py` and read through the code. Notice how all three channels are stuffed into one method with an if/elif chain. It's basically a giant switch statement pretending to be architecture.

      ### Task 1: Add Slack Notifications

      Product team just dropped this in your DMs: **"We need Slack notifications for enterprise customers."**

      Slack notifications need:
      - **Formatting:** Wrap the message in Slack markdown — bold the first line as a header using `*...*` and prefix the body with a clipboard emoji
      - **Rate limiting:** Maximum 200 messages per hour
      - **Delivery:** Print `"[SLACK] Delivering to {user}: {formatted_message}"`

      Add a `"slack"` branch to `send_notification()` that implements these requirements.

      ### Task 2: Think Ahead

      Now imagine product comes back and also wants **Discord**, **Microsoft Teams**, **WhatsApp**, **Telegram**, and **Carrier Pigeon** (okay, maybe not that last one). For each new channel you'd have to:

      1. Open `notification_router.py`
      2. Read through *all* existing branches to understand the pattern
      3. Slap another `elif` at the bottom
      4. Pray you didn't accidentally break email or SMS while editing

      This is the pain the Open/Closed Principle is trying to save you from. We'll fix it properly in the next step.

    files:
      - path: "notification_router.py"
        content: |
          from __future__ import annotations


          class NotificationRouter:
              """Routes notifications to the appropriate channel.

              Supports email, SMS, and push notification channels,
              each with its own formatting, rate limiting, and delivery logic.
              """

              def __init__(self) -> None:
                  self._send_counts = {
                      "email": 0,
                      "sms": 0,
                      "push": 0,
                  }
                  self._rate_limits = {
                      "email": 100,   # max 100 emails per hour
                      "sms": 50,      # max 50 SMS per hour
                      "push": -1,     # unlimited push notifications
                  }
                  self.last_sent_message = None  # for testing

              def send_notification(self, user: str, message: str, channel: str) -> str:
                  """Format, rate-check, and deliver a notification.

                  Args:
                      user: Recipient username or identifier.
                      message: The raw notification text.
                      channel: One of "email", "sms", "push".

                  Returns:
                      str describing the result, or an error message.
                  """
                  if channel == "email":
                      # --- Email formatting: wrap in HTML tags ---
                      formatted = (
                          f"<html><body>"
                          f"<h1>Notification</h1>"
                          f"<p>{message}</p>"
                          f"</body></html>"
                      )

                      # --- Email rate limiting: 100/hr ---
                      if self._rate_limits["email"] != -1:
                          if self._send_counts["email"] >= self._rate_limits["email"]:
                              return f"Rate limit exceeded for email (max {self._rate_limits['email']}/hr)"
                      self._send_counts["email"] += 1

                      # --- Email delivery ---
                      print(f"[EMAIL] Delivering to {user}: {formatted}")
                      self.last_sent_message = formatted
                      return f"Email sent to {user}"

                  elif channel == "sms":
                      # --- SMS formatting: truncate to 160 characters ---
                      if len(message) > 160:
                          formatted = message[:157] + "..."
                      else:
                          formatted = message

                      # --- SMS rate limiting: 50/hr ---
                      if self._rate_limits["sms"] != -1:
                          if self._send_counts["sms"] >= self._rate_limits["sms"]:
                              return f"Rate limit exceeded for sms (max {self._rate_limits['sms']}/hr)"
                      self._send_counts["sms"] += 1

                      # --- SMS delivery ---
                      print(f"[SMS] Delivering to {user}: {formatted}")
                      self.last_sent_message = formatted
                      return f"SMS sent to {user}"

                  elif channel == "push":
                      # --- Push formatting: add bell icon prefix ---
                      formatted = f"\U0001f514 {message}"

                      # --- Push rate limiting: unlimited ---
                      # (no rate limit check needed)
                      self._send_counts["push"] += 1

                      # --- Push delivery ---
                      print(f"[PUSH] Delivering to {user}: {formatted}")
                      self.last_sent_message = formatted
                      return f"Push notification sent to {user}"

                  else:
                      return f"Unknown channel: {channel}"


          # --- Quick smoke test ---
          if __name__ == "__main__":
              router = NotificationRouter()
              print(router.send_notification("alice", "Your order has shipped!", "email"))
              print(router.send_notification("bob", "Your package arrives today.", "sms"))
              print(router.send_notification("carol", "Flash sale — 50% off!", "push"))
              print()
              print("TODO: Add slack channel support and test it here")
        language: "python"

    open_file: "notification_router.py"

    solution:
      files:
        - path: "notification_router.py"
          content: |
            from __future__ import annotations


            class NotificationRouter:
                """Routes notifications to the appropriate channel.

                Supports email, SMS, push, and Slack notification channels,
                each with its own formatting, rate limiting, and delivery logic.

                NOTE: This if/elif design works but violates the Open/Closed
                Principle. Every new channel forces us to modify this class.
                Step 5 will show a better approach.
                """

                def __init__(self) -> None:
                    self._send_counts = {
                        "email": 0,
                        "sms": 0,
                        "push": 0,
                        "slack": 0,
                    }
                    self._rate_limits = {
                        "email": 100,   # max 100 emails per hour
                        "sms": 50,      # max 50 SMS per hour
                        "push": -1,     # unlimited push notifications
                        "slack": 200,   # max 200 Slack messages per hour
                    }
                    self.last_sent_message = None  # for testing

                def send_notification(self, user: str, message: str, channel: str) -> str:
                    """Format, rate-check, and deliver a notification.

                    Args:
                        user: Recipient username or identifier.
                        message: The raw notification text.
                        channel: One of "email", "sms", "push", "slack".

                    Returns:
                        str describing the result, or an error message.
                    """
                    if channel == "email":
                        # --- Email formatting: wrap in HTML tags ---
                        formatted = (
                            f"<html><body>"
                            f"<h1>Notification</h1>"
                            f"<p>{message}</p>"
                            f"</body></html>"
                        )

                        # --- Email rate limiting: 100/hr ---
                        if self._rate_limits["email"] != -1:
                            if self._send_counts["email"] >= self._rate_limits["email"]:
                                return f"Rate limit exceeded for email (max {self._rate_limits['email']}/hr)"
                        self._send_counts["email"] += 1

                        # --- Email delivery ---
                        print(f"[EMAIL] Delivering to {user}: {formatted}")
                        self.last_sent_message = formatted
                        return f"Email sent to {user}"

                    elif channel == "sms":
                        # --- SMS formatting: truncate to 160 characters ---
                        if len(message) > 160:
                            formatted = message[:157] + "..."
                        else:
                            formatted = message

                        # --- SMS rate limiting: 50/hr ---
                        if self._rate_limits["sms"] != -1:
                            if self._send_counts["sms"] >= self._rate_limits["sms"]:
                                return f"Rate limit exceeded for sms (max {self._rate_limits['sms']}/hr)"
                        self._send_counts["sms"] += 1

                        # --- SMS delivery ---
                        print(f"[SMS] Delivering to {user}: {formatted}")
                        self.last_sent_message = formatted
                        return f"SMS sent to {user}"

                    elif channel == "push":
                        # --- Push formatting: add bell icon prefix ---
                        formatted = f"\U0001f514 {message}"

                        # --- Push rate limiting: unlimited ---
                        # (no rate limit check needed)
                        self._send_counts["push"] += 1

                        # --- Push delivery ---
                        print(f"[PUSH] Delivering to {user}: {formatted}")
                        self.last_sent_message = formatted
                        return f"Push notification sent to {user}"

                    elif channel == "slack":
                        # --- Slack formatting: bold header + clipboard emoji ---
                        lines = message.split("\n", 1)
                        header = f"*{lines[0]}*"
                        body = lines[1] if len(lines) > 1 else ""
                        formatted = f"{header}\n\U0001f4cb {body}" if body else f"{header}\n\U0001f4cb {lines[0]}"

                        # --- Slack rate limiting: 200/hr ---
                        if self._rate_limits["slack"] != -1:
                            if self._send_counts["slack"] >= self._rate_limits["slack"]:
                                return f"Rate limit exceeded for slack (max {self._rate_limits['slack']}/hr)"
                        self._send_counts["slack"] += 1

                        # --- Slack delivery ---
                        print(f"[SLACK] Delivering to {user}: {formatted}")
                        self.last_sent_message = formatted
                        return f"Slack notification sent to {user}"

                    else:
                        return f"Unknown channel: {channel}"


            # --- Quick smoke test ---
            if __name__ == "__main__":
                router = NotificationRouter()
                print(router.send_notification("alice", "Your order has shipped!", "email"))
                print(router.send_notification("bob", "Your package arrives today.", "sms"))
                print(router.send_notification("carol", "Flash sale — 50% off!", "push"))
                print(router.send_notification("dave", "Deploy complete\nAll services healthy.", "slack"))
          language: "python"
      explanation: |
        We added a `"slack"` elif branch that follows the same pattern as the other channels:

        1. **Formatting** — The first line of the message is bolded with Slack markdown (`*...*`) and the rest is prefixed with a clipboard emoji.
        2. **Rate limiting** — Checks against a 200/hr limit, same pattern as email and SMS.
        3. **Delivery** — Prints `[SLACK] Delivering to ...` to simulate sending.

        **This works, but notice the cost:** to add one channel we had to modify the `NotificationRouter` class, touch `__init__` (add to two dictionaries), and add ~15 lines inside `send_notification`. If we had 20 channels, this method would be hundreds of lines long, and every new channel risks accidentally breaking an existing one. This is exactly the problem the Open/Closed Principle addresses — and we will fix it in Step 5.

    tests:
      - description: "notification_router.py runs without errors"
        command: |
          output = __run_capture('/tutorial/notification_router.py')
      - description: "Slack channel is recognized (not 'Unknown channel')"
