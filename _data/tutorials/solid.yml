            class Playable(ABC):
                """Role interface for devices that play audio."""

                def __init__(self, name: str) -> None:
                    self.name: str = name

                @abstractmethod
                def play_music(self, song: str) -> str:
                    """Play a song. Returns now-playing message."""
                    ...


            class TemperatureControllable(ABC):
                """Role interface for devices that control temperature."""

                def __init__(self, name: str) -> None:
                    self.name: str = name

                @abstractmethod
                def set_temperature(self, degrees: float) -> float:
                    """Set the target temperature. Returns the new setting."""
                    ...


            class Lockable(ABC):
                """Role interface for devices that control locks."""

                def __init__(self, name: str) -> None:
                    self.name: str = name

                @abstractmethod
                def lock_door(self) -> bool:
                    """Lock the door. Returns True if locked."""
                    ...


            # ── Concrete devices — each implements only its role ──────────
            class SmartLight(Dimmable):
                """A smart light bulb — only implements Dimmable."""

                def __init__(self, name: str) -> None:
                    super().__init__(name)
                    self._brightness: int = 100

                def dim_lights(self, brightness: int) -> int:
                    self._brightness = max(0, min(100, brightness))
                    print(f"[{self.name}] Brightness set to {self._brightness}%")
                    return self._brightness


            class SmartSpeaker(Playable):
                """A smart speaker — only implements Playable."""

                def __init__(self, name: str) -> None:
                    super().__init__(name)

                def play_music(self, song: str) -> str:
                    message: str = f"[{self.name}] Now playing: {song}"
                    print(message)
                    return message


            class SmartThermostat(TemperatureControllable):
                """A smart thermostat — only implements TemperatureControllable."""

                def __init__(self, name: str) -> None:
                    super().__init__(name)
                    self._temperature: float = 72.0

                def set_temperature(self, degrees: float) -> float:
                    self._temperature = degrees
                    print(f"[{self.name}] Temperature set to {self._temperature}F")
                    return self._temperature


            class SmartLock(Lockable):
                """A smart lock — only implements Lockable."""

                def __init__(self, name: str) -> None:
                    super().__init__(name)
                    self._locked: bool = False

                def lock_door(self) -> bool:
                    self._locked = True
                    print(f"[{self.name}] Door locked")
                    return True


            # ── Demo ──────────────────────────────────────────────────────
            if __name__ == "__main__":
                print("=== ISP-Compliant Smart Home ===")
                light: SmartLight = SmartLight("Living Room Light")
                light.dim_lights(50)

                speaker: SmartSpeaker = SmartSpeaker("Kitchen Speaker")
                speaker.play_music("Bohemian Rhapsody")

                thermo: SmartThermostat = SmartThermostat("Bedroom Thermostat")
                thermo.set_temperature(68.0)

                lock: SmartLock = SmartLock("Front Door Lock")
                lock.lock_door()
          language: "python"

      explanation: |
        **The pain of a fat interface:**

        `FreeStorage` is forced to implement four methods (`sync`, `share`, `encrypt`, `get_version_history`) that it fundamentally cannot support. Each one raises `NotImplementedError("Upgrade to Premium")`.

        This is problematic for two reasons:

        1. **Runtime crashes:** `backup_service()` accepts any `CloudStorage`, calls `sync()`, and crashes when given a `FreeStorage` instance. The type system says it is valid — the runtime says otherwise.
        2. **LSP violation:** `FreeStorage` is a subtype of `CloudStorage` but cannot fulfill the full `CloudStorage` contract. Any code that depends on `CloudStorage` and calls `sync()` will break.

        **The ISP solution** (which you will apply in the exercise below) is to split `CloudStorage` into role-based interfaces: `Uploadable`, `Downloadable`, `Syncable`, etc. Then `FreeStorage` only implements `Uploadable` and `Downloadable`, and `backup_service()` would require `Syncable` — catching the mismatch at design time.

