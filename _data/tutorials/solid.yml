                  notice: str = (
                      f"Dear {member.name}, '{book.title}' is overdue. "
                      f"Please return it to the library."
                  )
                  print(f"[NOTICE] {notice}")
                  self.logger.log(
                      f"Sent overdue notice to {member.name} "
                      f"for '{book.title}'"
                  )
