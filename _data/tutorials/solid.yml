        command: |
          source = open('/tutorial/report_exporter.py').read()
          import ast
          tree = ast.parse(source)

          # Find the ReportExporter class
          exporter_cls = None
          for node in ast.walk(tree):
              if isinstance(node, ast.ClassDef) and node.name == 'ReportExporter':
                  exporter_cls = node
                  break
          assert exporter_cls is not None, "ReportExporter class not found"

          # Find the export method
          export_method = None
          for item in exporter_cls.body:
              if isinstance(item, (ast.FunctionDef, ast.AsyncFunctionDef)) and item.name == 'export':
                  export_method = item
                  break
          assert export_method is not None, "ReportExporter must have an export() method"

          # Count if/elif branches that check format strings
          format_checks = 0
          for node in ast.walk(export_method):
              if isinstance(node, ast.Compare):
                  for comparator in node.comparators:
                      if isinstance(comparator, ast.Constant) and isinstance(comparator.value, str):
                          if comparator.value in ("csv", "json", "txt", "text"):
                              format_checks += 1
