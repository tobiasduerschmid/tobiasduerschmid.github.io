      explanation: |
        **Payment system fix:**

        The key insight is that `GiftCardProcessor` cannot honestly fulfill the `refund()` contract. Instead of forcing it to lie, we split the hierarchy:

        - `PaymentProcessor` — base class with `process_payment()` and a `max_amount` property
        - `RefundableProcessor(PaymentProcessor)` — adds the `refund()` method
        - `GiftCardProcessor` extends only `PaymentProcessor`, so it is never asked to refund
        - `checkout_with_refund()` explicitly requires `RefundableProcessor`, catching misuse at the boundary rather than deep inside business logic

        **Media player fix:**

        Same pattern: split `MediaPlayer` into a base (play/stop) and `SeekablePlayer` (adds seek/get_duration). `LiveStreamPlayer` extends only `MediaPlayer`. The renderer checks `isinstance(player, SeekablePlayer)` to decide whether to render a progress bar.

        **The LSP rule of thumb:** If a subclass needs to raise `NotImplementedError`, return a failure sentinel, or restrict what the parent accepts, it should not be a subclass of that parent.

