        command: |
          source = open('/tutorial/course_manager.py').read()
          assert '"A": 4.0, "B": 3.0, "C": 2.0, "D": 1.0, "F": 0.0' not in source, \
              "The grading scale still uses the original letter-grade mapping. " \
              "Try switching to a 4.0 numeric scale (e.g., 4.0, 3.0, 2.0, 1.0, 0.0 as the grades themselves)."
        hints:
          - text: "The Finance Team wants a numeric scale: instead of letter grades A/B/C/D/F, use 4.0/3.0/2.0/1.0/0.0 as the grade values. Modify the `_grade_weights` dictionary and the `add_grade()` method."
            condition: "default"
      - description: "You changed the report format (JSON instead of HTML)"
        command: |
          source = open('/tutorial/course_manager.py').read()
          assert "<html><body><h1>Report for {name}</h1><table>" not in source, \
              "The report still uses the original HTML format. " \
              "Try switching generate_report() to produce JSON output instead."
        hints:
          - text: "The Registrar's Office wants JSON instead of HTML. Modify `generate_report()` to return a JSON string (e.g., using `json.dumps()`) instead of HTML tags."
            condition: "default"
      - description: "Your modified code still runs without errors"
        command: |
          exec(open('/tutorial/course_manager.py').read())
        hints:
          - text: "Your changes introduced a syntax or runtime error. Run the code and read the error message — it will tell you exactly what went wrong."
            condition: "default"

    quiz:
      title: "Why Design Principles? — Knowledge Check"
      min_score: 0.6
      shuffle: true
      questions:

        - question: |
            You tried to change the grading scale and the report format. What made this so painful?
          type: single
          options:
            - "The Python language does not support multiple output formats"
            - "The `_format_grade()` helper was shared between grading logic and report generation, so changing it for one purpose broke the other"
            - "The class had too few methods — if it had more methods, changes would be easier"
            - "The code was too short — longer code is always easier to modify"
          correct_index: 1
          explanation: |
            The core problem is **coupling**: `_format_grade()` does double duty for both grade calculation display and report rendering. You can't change it for one without breaking the other. It's like having one remote control for your TV and your neighbor's TV — change the channel and you change theirs too.

        - question: |
            **Coupling** in software design means:
          type: single
          options:
            - "Writing code in a single file instead of splitting it across multiple files"
            - "The degree to which one component depends on the internal details of another"
            - "Using inheritance instead of composition"
            - "Having too many classes in a project"
          correct_index: 1
          explanation: |
            Coupling measures how tangled your components are with each other's internals. High coupling = change one thing, break five others. The `CourseManager` is a coupling disaster — its methods share helpers and data in ways that make independent changes basically impossible.

        - question: |
            How many distinct **actors** (stakeholders with different reasons to request changes) does the `CourseManager` class serve?
          type: single
          options:
            - "1 — it is one class, so it serves one actor"
            - "2 — students and instructors"
            - "At least 3 — enrollment/administration, grading/academics, and reporting/registrar"
            - "5 — one per method"
          correct_index: 2
          explanation: |
            At least three different groups want different things from this class: (1) **administration** cares about enrollment, (2) the **academic department** cares about grade calculation, and (3) the **registrar** cares about reports and transcripts. When one class tries to make everyone happy, changes from one group break things for another. This is exactly why the Single Responsibility Principle exists — you'll learn it next.


  # --------------------------------------------------------------------------
  # STEP 2 — "SRP — Feel the Friction"
  # Pedagogy:
  #   Productive Failure — tax bracket change breaks pay stubs.
  #   Actor Analysis     — identify who requests changes.
  #   Guide-and-Release  — focused task with scaffolded discovery.
  #   Bloom's level      — Apply / Analyze (quiz).
  # --------------------------------------------------------------------------
  - title: "SRP — Feel the Friction"
    instructions: |
      ## The Single Responsibility Principle

      > **Learning objective:** After this step you will be able to **define** the Single Responsibility Principle in terms of actors and **identify** SRP violations in existing code.

      ### The Principle

      > *"A class should have only one reason to change."*
      > — Robert C. Martin

      A "reason to change" comes from an **actor** — a person or team that asks for modifications. If a class serves multiple actors, one team's change request can break another team's stuff. That's exactly the mess you just dealt with in Step 1.

      ### The Scenario

      Here's an `EmployeeManager` class that three different teams depend on:

      | Actor | What they care about |
      |---|---|
      | **Finance Team** | Payroll calculation and tax brackets |
      | **HR Team** | Pay stub formatting and employee records |
      | **Compliance Team** | CSV export for audit reports |

      The Finance Team just pinged you: **the 22% federal tax bracket needs to become 24%** because of new tax legislation. Urgent, apparently.

      ### Your Task

      Open `employee_manager.py` and update the tax calculation so that the 22% bracket becomes 24%. Here are the brackets:

      - Income up to $50,000: **10%**
      - Income from $50,001 to $100,000: **24%** (was 22%)
      - Income above $100,000: **32%**

      After making the change, run the code. Watch what happens to the pay stub — does `_format_currency()` still work correctly for everyone who calls it?

      ### What to Look For

      Notice how `_format_currency()` is shared between `calculate_payroll()` and `generate_pay_stub()`. Now think: if HR later wants to change the currency format (say, adding thousands separators), would that accidentally mess up the payroll calculations too?

    files:
      - path: "employee_manager.py"
        content: |
          from __future__ import annotations


          class EmployeeManager:
              """Manages employees, payroll, pay stubs, and exports.
              Serves three actors: Finance, HR, and Compliance."""

              def __init__(self) -> None:
                  self._employees = {}  # {emp_id: {"name": str, "salary": float, "department": str}}

              # ── Employee Storage ────────────────────────────────────────
              def add_employee(self, emp_id: str, name: str, salary: float, department: str) -> None:
                  if emp_id in self._employees:
                      raise ValueError(f"Employee {emp_id} already exists")
                  self._employees[emp_id] = {
                      "name": name,
                      "salary": salary,
                      "department": department,
                  }

              def get_employee(self, emp_id: str) -> dict[str, object]:
                  if emp_id not in self._employees:
                      raise ValueError(f"Employee {emp_id} not found")
                  return self._employees[emp_id]

              def validate_employee_data(self, emp_id: str, name: str, salary: float, department: str) -> list[str]:
                  errors = []
                  if not name or not name.strip():
                      errors.append("Name cannot be empty")
                  if salary < 0:
                      errors.append("Salary cannot be negative")
                  if not department or not department.strip():
                      errors.append("Department cannot be empty")
                  return errors

              # ── Shared Helper ─────────────────────────────────────────
              def _format_currency(self, amount: float) -> str:
                  """Shared helper: formats a dollar amount for display.
                  Used by BOTH calculate_payroll() and generate_pay_stub().
                  WARNING: changing this affects multiple features!"""
                  return f"${amount:,.2f}"

              # ── Payroll Calculation (Finance Team) ─────────────────────
              def calculate_payroll(self, emp_id: str) -> dict[str, object]:
                  employee = self.get_employee(emp_id)
                  salary = employee["salary"]

                  # Federal tax brackets
                  if salary <= 50000:
                      tax_rate = 0.10
                  elif salary <= 100000:
                      tax_rate = 0.22   # TODO: Finance wants this changed to 0.24
                  else:
                      tax_rate = 0.32

                  tax = salary * tax_rate
                  net_pay = salary - tax

                  return {
                      "gross": salary,
                      "tax_rate": tax_rate,
                      "tax": tax,
                      "net_pay": net_pay,
                      "gross_formatted": self._format_currency(salary),
                      "tax_formatted": self._format_currency(tax),
                      "net_formatted": self._format_currency(net_pay),
                  }

              # ── Pay Stub Formatting (HR Team) ──────────────────────────
              def generate_pay_stub(self, emp_id: str) -> str:
                  employee = self.get_employee(emp_id)
                  payroll = self.calculate_payroll(emp_id)
                  stub = []
                  stub.append("=" * 40)
                  stub.append(f"  PAY STUB - {employee['name']}")
                  stub.append(f"  Department: {employee['department']}")
                  stub.append("=" * 40)
                  stub.append(f"  Gross Pay:  {self._format_currency(payroll['gross'])}")
                  stub.append(f"  Tax Rate:   {payroll['tax_rate']:.0%}")
                  stub.append(f"  Tax:        {self._format_currency(payroll['tax'])}")
                  stub.append(f"  Net Pay:    {self._format_currency(payroll['net_pay'])}")
                  stub.append("=" * 40)
                  return "\n".join(stub)

              # ── CSV Export (Compliance Team) ───────────────────────────
              def export_to_csv(self) -> str:
                  lines = ["emp_id,name,salary,department,tax_rate,net_pay"]
                  for emp_id, emp in self._employees.items():
                      payroll = self.calculate_payroll(emp_id)
                      lines.append(
                          f"{emp_id},{emp['name']},{emp['salary']},"
                          f"{emp['department']},{payroll['tax_rate']},{payroll['net_pay']}"
                      )
                  return "\n".join(lines)


          # ── Demo usage ─────────────────────────────────────────────────
          if __name__ == "__main__":
              mgr = EmployeeManager()
              mgr.add_employee("E001", "Alice Johnson", 75000, "Engineering")
              mgr.add_employee("E002", "Bob Smith", 45000, "Marketing")
              mgr.add_employee("E003", "Carol Davis", 120000, "Engineering")

              print("=== Payroll (Alice - $75k) ===")
              payroll = mgr.calculate_payroll("E001")
              print(f"  Gross: {payroll['gross_formatted']}")
              print(f"  Tax ({payroll['tax_rate']:.0%}): {payroll['tax_formatted']}")
              print(f"  Net: {payroll['net_formatted']}")
              print()

              print("=== Pay Stub (Bob - $45k) ===")
              print(mgr.generate_pay_stub("E002"))
              print()

              print("=== CSV Export ===")
              print(mgr.export_to_csv())
        language: "python"

    open_file: "employee_manager.py"

    solution:
      files:
        - path: "employee_manager.py"
          content: |
            from __future__ import annotations


            class EmployeeManager:
                """Manages employees, payroll, pay stubs, and exports.
                Serves three actors: Finance, HR, and Compliance."""

                def __init__(self) -> None:
                    self._employees = {}  # {emp_id: {"name": str, "salary": float, "department": str}}

                # ── Employee Storage ────────────────────────────────────────
                def add_employee(self, emp_id: str, name: str, salary: float, department: str) -> None:
                    if emp_id in self._employees:
                        raise ValueError(f"Employee {emp_id} already exists")
                    self._employees[emp_id] = {
                        "name": name,
                        "salary": salary,
                        "department": department,
                    }

                def get_employee(self, emp_id: str) -> dict[str, object]:
                    if emp_id not in self._employees:
                        raise ValueError(f"Employee {emp_id} not found")
                    return self._employees[emp_id]

                def validate_employee_data(self, emp_id: str, name: str, salary: float, department: str) -> list[str]:
                    errors = []
                    if not name or not name.strip():
                        errors.append("Name cannot be empty")
                    if salary < 0:
                        errors.append("Salary cannot be negative")
                    if not department or not department.strip():
                        errors.append("Department cannot be empty")
                    return errors

                # ── Shared Helper ─────────────────────────────────────────
                def _format_currency(self, amount: float) -> str:
                    """Shared helper: formats a dollar amount for display.
                    Used by BOTH calculate_payroll() and generate_pay_stub().
                    WARNING: changing this affects multiple features!"""
                    return f"${amount:,.2f}"

                # ── Payroll Calculation (Finance Team) ─────────────────────
                def calculate_payroll(self, emp_id: str) -> dict[str, object]:
                    employee = self.get_employee(emp_id)
                    salary = employee["salary"]

                    # Federal tax brackets (updated: 22% -> 24%)
                    if salary <= 50000:
                        tax_rate = 0.10
                    elif salary <= 100000:
                        tax_rate = 0.24   # Updated from 0.22 per Finance Team request
                    else:
                        tax_rate = 0.32

                    tax = salary * tax_rate
                    net_pay = salary - tax

                    return {
                        "gross": salary,
                        "tax_rate": tax_rate,
                        "tax": tax,
                        "net_pay": net_pay,
                        "gross_formatted": self._format_currency(salary),
                        "tax_formatted": self._format_currency(tax),
                        "net_formatted": self._format_currency(net_pay),
                    }

                # ── Pay Stub Formatting (HR Team) ──────────────────────────
                def generate_pay_stub(self, emp_id: str) -> str:
                    employee = self.get_employee(emp_id)
                    payroll = self.calculate_payroll(emp_id)
                    stub = []
                    stub.append("=" * 40)
                    stub.append(f"  PAY STUB - {employee['name']}")
                    stub.append(f"  Department: {employee['department']}")
                    stub.append("=" * 40)
                    stub.append(f"  Gross Pay:  {self._format_currency(payroll['gross'])}")
                    stub.append(f"  Tax Rate:   {payroll['tax_rate']:.0%}")
                    stub.append(f"  Tax:        {self._format_currency(payroll['tax'])}")
                    stub.append(f"  Net Pay:    {self._format_currency(payroll['net_pay'])}")
                    stub.append("=" * 40)
                    return "\n".join(stub)

                # ── CSV Export (Compliance Team) ───────────────────────────
                def export_to_csv(self) -> str:
                    lines = ["emp_id,name,salary,department,tax_rate,net_pay"]
                    for emp_id, emp in self._employees.items():
                        payroll = self.calculate_payroll(emp_id)
                        lines.append(
                            f"{emp_id},{emp['name']},{emp['salary']},"
                            f"{emp['department']},{payroll['tax_rate']},{payroll['net_pay']}"
                        )
                    return "\n".join(lines)


            # ── Demo usage ─────────────────────────────────────────────────
            if __name__ == "__main__":
                mgr = EmployeeManager()
                mgr.add_employee("E001", "Alice Johnson", 75000, "Engineering")
                mgr.add_employee("E002", "Bob Smith", 45000, "Marketing")
                mgr.add_employee("E003", "Carol Davis", 120000, "Engineering")

                print("=== Payroll (Alice - $75k) ===")
                payroll = mgr.calculate_payroll("E001")
                print(f"  Gross: {payroll['gross_formatted']}")
                print(f"  Tax ({payroll['tax_rate']:.0%}): {payroll['tax_formatted']}")
                print(f"  Net: {payroll['net_formatted']}")
                print()

                print("=== Pay Stub (Bob - $45k) ===")
                print(mgr.generate_pay_stub("E002"))
                print()

                print("=== CSV Export ===")
                print(mgr.export_to_csv())
          language: "python"
      explanation: |
        **The fix is literally one line:** `0.22` becomes `0.24` in `calculate_payroll()`.

        But look at the blast radius of that tiny change:
        - **Payroll calculation** now uses the correct 24% rate — Finance is happy.
        - **Pay stubs** automatically show the new rate because they call `calculate_payroll()` — but HR never asked for this and might not even notice until someone complains.
        - **CSV export** also changes because it depends on `calculate_payroll()` too.

        This is what an SRP violation looks like in the wild: one team's change silently messes with other teams' outputs. In Step 3, you'll refactor this class so each team's concerns are properly isolated.

    tests:
      - description: "Script runs without errors"
        command: |
          exec(open('/tutorial/employee_manager.py').read())
      - description: "The 24% tax rate is applied for salaries in the $50k-$100k bracket"
        command: |
          exec(open('/tutorial/employee_manager.py').read())
          mgr = EmployeeManager()
          mgr.add_employee("T001", "Test Employee", 75000, "Test")
          payroll = mgr.calculate_payroll("T001")
          assert abs(payroll["tax_rate"] - 0.24) < 0.001, \
              f"Expected tax rate of 0.24 (24%) for $75k salary, got {payroll['tax_rate']}"
        hints:
          - text: "Look for the tax bracket that handles salaries between $50,000 and $100,000. The rate there should be changed from 0.22 to 0.24."
            condition: "default"
      - description: "Tax amount is correctly calculated at 24%"
        command: |
          exec(open('/tutorial/employee_manager.py').read())
          mgr = EmployeeManager()
          mgr.add_employee("T002", "Test Employee", 80000, "Test")
          payroll = mgr.calculate_payroll("T002")
          expected_tax = 80000 * 0.24
          assert abs(payroll["tax"] - expected_tax) < 0.01, \
              f"Expected tax of ${expected_tax:,.2f} for $80k at 24%, got ${payroll['tax']:,.2f}"
        hints:
          - text: "Make sure you changed the tax_rate value, not just a comment. The actual numeric value 0.22 should become 0.24."
            condition: "default"
      - description: "Net pay is correctly calculated with the new rate"
        command: |
          exec(open('/tutorial/employee_manager.py').read())
          mgr = EmployeeManager()
          mgr.add_employee("T003", "Test Employee", 75000, "Test")
          payroll = mgr.calculate_payroll("T003")
          expected_net = 75000 - (75000 * 0.24)
          assert abs(payroll["net_pay"] - expected_net) < 0.01, \
              f"Expected net pay of ${expected_net:,.2f}, got ${payroll['net_pay']:,.2f}"
      - description: "The 10% bracket (under $50k) is unchanged"
        command: |
          exec(open('/tutorial/employee_manager.py').read())
          mgr = EmployeeManager()
          mgr.add_employee("T004", "Low Salary", 40000, "Test")
          payroll = mgr.calculate_payroll("T004")
          assert abs(payroll["tax_rate"] - 0.10) < 0.001, \
