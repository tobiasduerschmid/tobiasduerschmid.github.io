        hints:
          - text: "You need to add an `elif channel == \"slack\":` branch inside `send_notification()`. Look at how the existing channels (email, sms, push) are structured."
            condition: "code_missing: slack"
          - text: "Good, you have 'slack' somewhere in your code. Make sure you have an `elif channel == \"slack\":` condition inside the `send_notification` method."
            condition: "code_contains: slack"
      - description: "Slack message is formatted with markdown bold header"
        command: |
          g = {}
          exec(open('/tutorial/notification_router.py').read(), g)
          router = g['NotificationRouter']()
          router.send_notification("testuser", "Deploy complete\nAll services healthy.", "slack")
          msg = router.last_sent_message
          assert msg is not None, "last_sent_message was not set — make sure your Slack branch sets self.last_sent_message"
          assert "*" in msg, \
              f"Slack formatting should use *bold* markdown. Got: {repr(msg)}"
          assert "Deploy complete" in msg, \
              f"Formatted message should contain the original text. Got: {repr(msg)}"
        hints:
          - text: "Slack uses `*text*` for bold formatting. The first line of the message should be wrapped in asterisks."
            condition: "code_missing: *"
      - description: "Slack delivery prints [SLACK] tag"
        command: |
          g = {}
          exec(open('/tutorial/notification_router.py').read(), g)
          router = g['NotificationRouter']()
          import io, sys
          captured = io.StringIO()
          old_stdout = sys.stdout
          sys.stdout = captured
          router.send_notification("dave", "Test message", "slack")
          sys.stdout = old_stdout
          output = captured.getvalue()
          assert "[SLACK]" in output, \
              f"Slack delivery should print with a [SLACK] tag. Got: {repr(output)}"
          assert "dave" in output, \
              f"Slack delivery should include the username. Got: {repr(output)}"
        hints:
          - text: "Your Slack branch needs a `print()` statement that includes `[SLACK]` and the user's name, similar to how email uses `[EMAIL]`."
      - description: "Slack rate limit is 200/hr"
        command: |
          g = {}
          exec(open('/tutorial/notification_router.py').read(), g)
          router = g['NotificationRouter']()
          # Check that rate limit data exists for slack
          assert "slack" in router._rate_limits, \
              "Add 'slack' to self._rate_limits in __init__"
          assert router._rate_limits["slack"] == 200, \
              f"Slack rate limit should be 200/hr, got {router._rate_limits['slack']}"
        hints:
          - text: "In `__init__`, add `\"slack\"` to both `self._send_counts` and `self._rate_limits` dictionaries. The Slack rate limit should be 200."
      - description: "Slack returns a success message (not 'Unknown channel')"
        command: |
          g = {}
          exec(open('/tutorial/notification_router.py').read(), g)
          router = g['NotificationRouter']()
          result = router.send_notification("eve", "Welcome!", "slack")
          assert "Unknown" not in result, \
              f"'slack' channel returned an error. Got: {repr(result)}"
          assert "sent" in result.lower(), \
              f"Expected a success message containing 'sent'. Got: {repr(result)}"

    quiz:
      title: "OCP — Feel the Friction"
      min_score: 0.66
      shuffle: true
      questions:

        - question: |
            Imagine the `NotificationRouter` grows to support 20 channels, all in one if/elif chain. A junior developer needs to add channel #21. Which of the following problems are they **likely** to face?
          type: multiple
          options:
            - "They must read and understand hundreds of lines of unrelated channel code to find the right place to insert their branch"
            - "A typo or indentation error in the new branch could break an existing channel that was previously working"
            - "Testing requires running the entire method, since all channels share a single code path and cannot be tested independently"
            - "The class will run out of memory because Python limits elif chains to 20 branches"
          correct_indices: [0, 1, 2]
          explanation: |
            Python doesn't limit elif chains (option 4 is made up). But the other three problems are real and they all come from the same root cause: **all channel logic is stuffed into one method**. Reading hundreds of lines to add a feature is painful. Editing shared code risks breaking stuff. And you can't test one channel without loading all the others.

        - question: |
            The Open/Closed Principle says a module should be **"open for extension, closed for modification."**

            What does **"closed for modification"** mean in practice?
          type: single
          options:
            - "The source file should be marked as read-only so no one can edit it"
            - "Once a class is tested and working, you should not need to change its existing code to add new behavior — new behavior is added by writing new code that plugs into the existing design"
            - "You should never change any code after it has been deployed to production, even to fix bugs"
            - "Classes should use private variables so external code cannot modify their internal state"
          correct_index: 1
          explanation: |
            "Closed for modification" doesn't mean the file is literally locked. It means the **design** lets you add new features (like a new notification channel) without touching the existing, tested code. You write *new* classes that plug into the system instead of editing the core logic. Bug fixes are still fine — this principle is about *feature additions*.

        - question: |
            You just added Slack support by modifying `NotificationRouter.send_notification()`. While editing, you accidentally changed the SMS truncation from 160 to 60 characters. The SMS tests still pass because they use a short message.

            This scenario illustrates a key risk of violating OCP. Which risk?
          type: single
          options:
            - "Performance degradation — the longer elif chain makes the method slower"
            - "Unintended side effects — modifying shared code to add a feature can silently break existing behavior that is not covered by tests"
            - "Memory leaks — each new elif branch allocates objects that are never freed"
            - "Type safety violations — Python cannot check that each branch returns the same type"
          correct_index: 1
          explanation: |
            Classic **regression risk**. When all channels share one method, editing *any* part puts *every* channel at risk. The SMS bug went undetected because test messages were short enough to pass with the wrong limit. With an OCP-compliant design, adding Slack wouldn't touch SMS code at all — this entire category of bug becomes impossible.

