    quiz:
      title: "Integration — Which Principle? — Knowledge Check"
      min_score: 0.6
      shuffle: true
      questions:

        - question: |
            **Snippet 1 — Logger:** This class formats messages (adding timestamps, uppercasing) and writes them to a file. Which principle does it violate?
          type: single
          options:
            - "Open/Closed Principle — you cannot add new log formats without modifying the class"
            - "Single Responsibility Principle — formatting policy and persistence policy are two separate reasons to change"
            - "Liskov Substitution Principle — Logger cannot be substituted for its parent"
            - "Interface Segregation Principle — the interface is too wide"
          correct_index: 1
          explanation: |
            `Logger` serves two actors: whoever decides the **formatting policy** (timestamps, uppercasing) and whoever decides the **persistence policy** (file path, writing strategy). Changing the format (e.g., switching to JSON) means touching the same class as changing the output (e.g., switching to a network socket). Textbook SRP violation.

        - question: |
            **Snippet 2 — DiscountEngine:** This class uses an if/elif chain to select discount logic based on a string type. Which principle does it violate?
          type: single
          options:
            - "Single Responsibility Principle — it handles too many discount types"
            - "Liskov Substitution Principle — discount types cannot be substituted for each other"
            - "Open/Closed Principle — adding a new discount type requires modifying the existing method"
            - "Dependency Inversion Principle — it depends on concrete strings instead of abstractions"
          correct_index: 2
          explanation: |
            Every time the business adds a new discount type (e.g., "holiday", "referral"), someone has to open `DiscountEngine` and slap on another `elif`. The class is **not closed for modification**. An OCP-compliant design would use a strategy pattern or discount registry so new types plug in without touching existing code.

        - question: |
            **Snippet 3 — PremiumUser(User):** `PremiumUser.free_trial_signup()` raises `RuntimeError` instead of returning a string. Which principle does it violate?
          type: single
          options:
            - "Interface Segregation Principle — PremiumUser should not inherit free_trial_signup()"
            - "Open/Closed Principle — PremiumUser modifies the behavior instead of extending it"
            - "Liskov Substitution Principle — PremiumUser cannot be used wherever User is expected because it raises an unexpected exception"
            - "Single Responsibility Principle — PremiumUser has more than one reason to change"
          correct_index: 2
          explanation: |
            Code that takes a `User` and calls `free_trial_signup()` expects a string back. `PremiumUser` throws an exception instead. It **cannot be substituted** for `User` without breaking callers — textbook LSP violation. Fix: either restructure the hierarchy so `free_trial_signup()` isn't in the shared interface, or have `PremiumUser` return something meaningful instead of exploding.

        - question: |
            **Snippet 4 — DatabaseClient ABC:** Simple clients must implement `cache_query()`, `replicate()`, and `shard()` even if they only need `connect()`, `query()`, and `disconnect()`. Which principle does it violate?
          type: single
          options:
            - "Dependency Inversion Principle — clients depend on concrete database details"
            - "Open/Closed Principle — you cannot extend the interface without modifying it"
            - "Interface Segregation Principle — clients are forced to depend on methods they do not use"
            - "Single Responsibility Principle — the interface has too many responsibilities"
          correct_index: 2
          explanation: |
            `DatabaseClient` bundles six methods into one interface, but most clients only need three (`connect`, `query`, `disconnect`). Forcing simple clients to implement `cache_query()`, `replicate()`, and `shard()` fills their code with useless stubs or `raise NotImplementedError`. Fix: split into a base `DatabaseClient` and separate `Cacheable`, `Replicable`, `Shardable` interfaces.

        - question: |
            **Snippet 5 — ReportGenerator:** This class directly instantiates `PdfRenderer()` and `SqlConnection()` in its constructor. Which principle does it violate?
          type: single
          options:
            - "Dependency Inversion Principle — the high-level ReportGenerator depends on concrete low-level classes instead of abstractions"
            - "Single Responsibility Principle — it generates reports and also manages database connections"
            - "Liskov Substitution Principle — PdfRenderer cannot be substituted for another renderer"
            - "Open/Closed Principle — you cannot add new report types without modifying this class"
          correct_index: 0
          explanation: |
            `ReportGenerator` is high-level policy (orchestrating report creation), but it hard-codes `PdfRenderer` and `SqlConnection` — concrete low-level details. Want HTML rendering or a NoSQL database? You'd have to modify `ReportGenerator` itself. Fix: define `Renderer` and `DataSource` abstractions and inject them via constructor. Then `ReportGenerator` depends only on abstractions.

        - question: |
            **Snippet 6 — UserValidator:** This class accepts a list of `ValidationRule` objects (an ABC) and runs each one. Does it violate any SOLID principle?
          type: single
          options:
            - "Yes — it violates OCP because you need to modify it to add new validation rules"
            - "Yes — it violates DIP because it depends on concrete rule classes like `NotEmptyRule`"
            - "Yes — it violates SRP because it validates multiple different things"
            - "No — it follows all SOLID principles: new rules extend the system without modifying UserValidator"
          correct_index: 3
          explanation: |
            `UserValidator` is well-designed:
            - **SRP:** One responsibility — orchestrating validation.
            - **OCP:** New rules are added by creating new `ValidationRule` subclasses, not by modifying `UserValidator`.
            - **LSP:** Any `ValidationRule` subclass can be substituted safely.
            - **ISP:** `ValidationRule` has exactly one method — a minimal interface.
            - **DIP:** `UserValidator` depends on the `ValidationRule` abstraction, not on `NotEmptyRule` or `MaxLengthRule` directly.

            Recognizing well-designed code is just as important as spotting violations — otherwise you'll "refactor" things that are already correct, which is just creating problems where there were none.


