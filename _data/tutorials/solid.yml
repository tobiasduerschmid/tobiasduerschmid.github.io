                    self.budget = budget
                    self.spent = 0.0

                def add_expense(self, description: str, amount: float) -> None:
                    """Add an expense. Raise ValueError if it exceeds remaining budget."""
                    remaining = self.budget - self.spent
                    if amount > remaining:
                        raise ValueError(
                            f"Cannot add expense: ${amount:,.2f} exceeds remaining ${remaining:,.2f}"
                        )
                    self.spent += amount

                def get_remaining(self) -> dict[str, str]:
                    """Return the remaining budget."""
                    return self.budget - self.spent

                def get_summary(self) -> dict[str, str]:
                    """Return a dict with total_budget, spent, and remaining."""
                    return {
                        "total_budget": self.budget,
                        "spent": self.spent,
