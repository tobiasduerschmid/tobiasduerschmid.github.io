            # ── Refactored classes ──────────────────────────────────────────

            class VenueManager:
                """Handles venue booking and availability. Actor: Venue Manager."""

                def __init__(self) -> None:
                    self.venue = None
                    self.venue_cost = 0.0

                def book(self, venue_name, cost) -> str:
                    """Book a venue with the given name and cost."""
                    self.venue = venue_name
                    self.venue_cost = cost

                def get_venue(self) -> str:
                    """Return the current venue name (or None if not booked)."""
                    return self.venue

                def get_cost(self) -> str:
                    """Return the venue cost."""
                    return self.venue_cost


            class GuestRegistry:
                """Manages the guest list. Actor: Event Coordinator."""

                def __init__(self) -> None:
                    self.guests = {}  # {name: {"email": str, "dietary": str}}

                def add(self, name: str, email: str, dietary="none") -> str:
                    """Add a guest with their email and dietary preference."""
                    self.guests[name] = {"email": email, "dietary": dietary}

                def remove(self, name: str) -> str:
                    """Remove a guest by name. Raise ValueError if not found."""
                    if name not in self.guests:
                        raise ValueError(f"Guest {name} not found")
                    del self.guests[name]

                def get(self, name: str) -> str:
                    """Return guest info dict. Raise ValueError if not found."""
                    if name not in self.guests:
                        raise ValueError(f"Guest {name} not found")
                    return self.guests[name]

                def count(self) -> float:
                    """Return the number of guests."""
                    return len(self.guests)

                def list_names(self) -> float:
                    """Return a list of all guest names."""
                    return list(self.guests.keys())


            class BudgetTracker:
                """Tracks event budget and expenses. Actor: Finance."""

                def __init__(self, budget: float) -> None:
                    self.budget = budget
                    self.spent = 0.0

                def add_expense(self, description: str, amount: float) -> None:
                    """Add an expense. Raise ValueError if it exceeds remaining budget."""
                    remaining = self.budget - self.spent
                    if amount > remaining:
                        raise ValueError(
                            f"Cannot add expense: ${amount:,.2f} exceeds remaining ${remaining:,.2f}"
                        )
                    self.spent += amount

                def get_remaining(self) -> dict[str, str]:
                    """Return the remaining budget."""
                    return self.budget - self.spent

                def get_summary(self) -> dict[str, str]:
                    """Return a dict with total_budget, spent, and remaining."""
                    return {
                        "total_budget": self.budget,
                        "spent": self.spent,
                        "remaining": self.budget - self.spent,
                    }


            class InvitationSender:
                """Sends invitations and tracks RSVPs. Actor: Communications."""

                def __init__(self, event_name) -> None:
                    self.event_name = event_name
                    self.invitations = {}  # {name: "sent" | "accepted" | "declined"}

                def send(self, guest_name, guest_email) -> float:
                    """Send an invitation to a guest."""
                    print(f"[EMAIL] Invitation to {self.event_name} sent to {guest_name} <{guest_email}>")
                    self.invitations[guest_name] = "sent"

                def record_rsvp(self, guest_name, status) -> float:
                    """Record an RSVP response."""
                    if guest_name not in self.invitations:
                        raise ValueError(f"No invitation sent to {guest_name}")
                    if status not in ("accepted", "declined"):
                        raise ValueError(f"Invalid RSVP status: {status}")
                    self.invitations[guest_name] = status

                def get_rsvp_summary(self) -> str:
                    """Return counts of sent, accepted, and declined."""
                    summary = {"sent": 0, "accepted": 0, "declined": 0}
                    for status in self.invitations.values():
                        summary[status] += 1
                    return summary


