    quiz:
      title: "DIP — Depend on Abstractions — Knowledge Check"
      min_score: 0.6
      shuffle: true
      questions:

        - question: |
            What is the difference between the Dependency Inversion Principle (DIP) and Dependency Injection (DI)?
          type: single
          options:
            - "They are the same thing — DIP and DI are interchangeable terms"
            - "DIP is an architectural principle (depend on abstractions, not concretions). DI is a mechanism (pass dependencies via constructor or parameters). You can have DI without DIP and DIP without DI"
            - "DI is the principle and DIP is the implementation technique"
            - "DIP only applies to databases and DI applies to all dependencies"
          correct_index: 1
          explanation: |
            **DIP** = architectural decision (depend on abstractions, not concretions). **DI** = delivery mechanism (pass dependencies via constructor or parameters). You can inject a concrete class (DI without DIP) or use a factory to create abstractions (DIP without DI). Related but different concepts.

        - question: |
            In DIP, who "owns" the interface (abstraction)?
          type: single
          options:
            - "The low-level module — it defines what it can do, and the high-level module adapts"
            - "The high-level module — it defines what it needs, and the low-level module adapts to fit"
            - "A separate 'interfaces' package that neither module owns"
            - "The framework or dependency injection container"
          correct_index: 1
          explanation: |
            This is where the "inversion" comes from. Traditionally, high-level depends on low-level. With DIP, the high-level module defines what it needs (`OrderRepository`, `PaymentGateway`), and the low-level module (`PostgresDatabase`, `StripePaymentGateway`) implements that interface. The dependency arrow flips — low-level now depends on the abstraction that high-level defined.

        - question: |
            A colleague refactors a class to accept its database connection as a constructor parameter instead of creating it internally: `__init__(self, db: PostgresDatabase)`. Does this satisfy DIP?
          type: single
          options:
            - "Yes — passing a dependency via constructor is DIP"
            - "No — this is Dependency Injection but not Dependency Inversion. The class still depends on the concrete `PostgresDatabase` class, not an abstraction. DIP requires depending on an abstract interface like `OrderRepository`"
            - "Yes — any constructor parameter satisfies DIP"
            - "No — DIP requires using a dependency injection framework"
          correct_index: 1
          explanation: |
            Classic misconception. Passing `PostgresDatabase` via constructor is **Dependency Injection** (delivering dependencies externally), but not **Dependency Inversion** (depending on abstractions). To actually satisfy DIP, the parameter should be an abstract interface (`OrderRepository`), not a concrete class. Your class shouldn't know or care whether it's talking to Postgres, MySQL, or an in-memory fake.

        - question: |
            Which of the following are benefits of applying DIP to the `WeatherDashboard`?
          type: multiple
          options:
            - "Unit tests can verify caching logic without connecting to OpenWeatherMap or MongoDB"
            - "You can swap OpenWeatherMapClient for a different weather API without changing WeatherDashboardDIP"
            - "The code runs faster in production because abstractions are faster than concrete classes"
            - "You can use a Redis cache instead of MongoDB by implementing the WeatherCache interface"
          correct_indices: [0, 1, 3]
          explanation: |
            DIP gives you **testability** (use fakes instead of real services), **flexibility** (swap implementations without changing the high-level module), and **extensibility** (new providers or caches just implement the interface). It does **not** make code faster — abstractions add a tiny layer of indirection. The real win is being able to test properly and catch bugs early.
  # --------------------------------------------------------------------------
  # STEP 9 — "Integration — Which Principle?"
  # Pedagogy:
  #   Interleaving         — mix all five principles in random order.
  #   Discrimination Tasks — students must distinguish which principle applies.
  #   Spaced Retrieval     — recall each principle from earlier steps.
  #   Bloom's level        — Analyze / Evaluate (quiz).
  # --------------------------------------------------------------------------
  - title: "Integration — Which Principle?"
    instructions: |
      ## Can You Spot the Violation?

      > **Learning objective:** After this step you will be able to **identify** which SOLID principle (if any) a given code snippet violates, and **justify** your diagnosis.

      ### Why This Matters

      In real code reviews, violations don't come with labels. You have to look at a class and *recognize the smell* from its structure alone. This exercise mixes all five principles so you practice **discrimination** — telling similar-looking problems apart.

      ### Your Task

      Open `violations_gallery.py`. It has six numbered classes. For each one:

      1. **Read** the class carefully.
      2. **Decide** which SOLID principle it violates — or whether it's actually well-designed.
      3. **Add a comment** at the top of each class with your diagnosis:

      ```python
      # DIAGNOSIS: <principle> violation — <one-sentence reason>
      # Example: "SRP violation — class handles both formatting and persistence"
      ```

      If a class follows all SOLID principles, write:

      ```python
      # DIAGNOSIS: No violation — <brief justification>
      ```

      **Hint:** Exactly one of the six classes has no violation. Don't assume everything is broken.

      ### Thinking Checklist

      For each class, run through these:
      - **SRP:** Does this class serve more than one actor?
      - **OCP:** Would I need to modify this class (not extend it) to add a new variant?
      - **LSP:** Could a subclass be swapped in for its parent without breaking things?
      - **ISP:** Are implementers forced to depend on methods they don't use?
      - **DIP:** Does a high-level module directly depend on a concrete low-level module?

    files:
      - path: "violations_gallery.py"
        content: |
          from abc import ABC, abstractmethod
          from typing import Optional


          # ── Snippet 1 ─────────────────────────────────────────────────────
          class Logger:
              """Handles application logging."""

              def __init__(self, log_path: str) -> None:
                  self.log_path: str = log_path

              def log(self, message: str) -> None:
                  formatted: str = self._format_message(message)
                  self._write_to_file(formatted)

              def _format_message(self, message: str) -> str:
                  import datetime
                  timestamp: str = datetime.datetime.now().isoformat()
                  return f"[{timestamp}] {message.upper()}"

              def _write_to_file(self, formatted_message: str) -> None:
                  with open(self.log_path, "a") as f:
                      f.write(formatted_message + "\n")


          # ── Snippet 2 ─────────────────────────────────────────────────────
          class DiscountEngine:
              """Calculates discounts for an e-commerce store."""

              def calculate_discount(self, order_total: float, discount_type: str) -> float:
                  if discount_type == "seasonal":
                      return order_total * 0.10
                  elif discount_type == "clearance":
                      return order_total * 0.25
                  elif discount_type == "employee":
                      return order_total * 0.30
                  elif discount_type == "loyalty":
                      return order_total * 0.15
                  else:
                      raise ValueError(f"Unknown discount type: {discount_type}")


          # ── Snippet 3 ─────────────────────────────────────────────────────
          class User:
              """Base class for application users."""

              def __init__(self, username: str, email: str) -> None:
                  self.username: str = username
                  self.email: str = email

              def login(self) -> str:
                  return f"{self.username} logged in"

              def free_trial_signup(self) -> str:
                  return f"{self.username} signed up for free trial"


          class PremiumUser(User):
              """A user with a paid subscription."""

              def __init__(self, username: str, email: str, plan: str) -> None:
                  super().__init__(username, email)
                  self.plan: str = plan

              def free_trial_signup(self) -> str:
                  raise RuntimeError(
                      f"{self.username} is already on the {self.plan} plan. "
                      "Premium users cannot sign up for a free trial."
                  )


          # ── Snippet 4 ─────────────────────────────────────────────────────
          class DatabaseClient(ABC):
              """Abstract interface for all database clients."""

              @abstractmethod
              def connect(self, connection_string: str) -> None: ...

              @abstractmethod
              def query(self, sql: str) -> list[dict[str, object]]: ...

              @abstractmethod
              def disconnect(self) -> None: ...

              @abstractmethod
              def cache_query(self, sql: str, ttl_seconds: int) -> list[dict[str, object]]: ...

              @abstractmethod
              def replicate(self, target_host: str) -> None: ...

              @abstractmethod
              def shard(self, shard_key: str, num_shards: int) -> None: ...


          # ── Snippet 5 ─────────────────────────────────────────────────────
          class PdfRenderer:
              """Renders content to PDF format."""

              def render(self, content: str) -> bytes:
                  return f"<PDF>{content}</PDF>".encode()


          class SqlConnection:
              """Connects to a SQL database."""

              def fetch(self, query: str) -> list[dict[str, str]]:
                  return [{"id": "1", "data": "sample"}]


          class ReportGenerator:
              """Generates reports from database data."""

              def __init__(self) -> None:
                  self.renderer: PdfRenderer = PdfRenderer()
                  self.db: SqlConnection = SqlConnection()

              def generate(self, report_name: str) -> bytes:
                  data: list[dict[str, str]] = self.db.fetch(
                      f"SELECT * FROM {report_name}"
                  )
                  content: str = "\n".join(
                      str(row) for row in data
                  )
                  return self.renderer.render(content)


          # ── Snippet 6 ─────────────────────────────────────────────────────
          class ValidationRule(ABC):
              """Interface for a single validation rule."""

              @abstractmethod
              def validate(self, value: str) -> Optional[str]:
                  """Return an error message if invalid, None if valid."""
                  ...


          class NotEmptyRule(ValidationRule):
              def validate(self, value: str) -> Optional[str]:
                  if not value.strip():
                      return "Value must not be empty"
                  return None


          class MaxLengthRule(ValidationRule):
              def __init__(self, max_length: int) -> None:
                  self.max_length: int = max_length

              def validate(self, value: str) -> Optional[str]:
                  if len(value) > self.max_length:
                      return f"Value must be at most {self.max_length} characters"
                  return None


          class UserValidator:
              """Validates user input against a configurable set of rules."""

              def __init__(self, rules: list[ValidationRule]) -> None:
                  self.rules: list[ValidationRule] = rules

              def validate(self, value: str) -> list[str]:
                  errors: list[str] = []
                  for rule in self.rules:
                      error: Optional[str] = rule.validate(value)
                      if error is not None:
                          errors.append(error)
                  return errors
        language: "python"

    open_file: "violations_gallery.py"

    solution:
      files:
        - path: "violations_gallery.py"
          content: |
            from abc import ABC, abstractmethod
            from typing import Optional


            # ── Snippet 1 ─────────────────────────────────────────────────────
            # DIAGNOSIS: SRP violation — this class formats messages AND writes
            # to files. The formatting actor (who decides timestamp/uppercase
            # policy) and the persistence actor (who decides where logs go) are
            # coupled. A format change breaks the writer and vice versa.
            class Logger:
                """Handles application logging."""

                def __init__(self, log_path: str) -> None:
                    self.log_path: str = log_path

                def log(self, message: str) -> None:
                    formatted: str = self._format_message(message)
                    self._write_to_file(formatted)

                def _format_message(self, message: str) -> str:
                    import datetime
                    timestamp: str = datetime.datetime.now().isoformat()
                    return f"[{timestamp}] {message.upper()}"

                def _write_to_file(self, formatted_message: str) -> None:
                    with open(self.log_path, "a") as f:
                        f.write(formatted_message + "\n")


            # ── Snippet 2 ─────────────────────────────────────────────────────
            # DIAGNOSIS: OCP violation — adding a new discount type (e.g.,
            # "holiday") requires modifying the if/elif chain inside this class
            # instead of extending it. A strategy or registry pattern would let
            # new discounts be added without touching existing code.
            class DiscountEngine:
                """Calculates discounts for an e-commerce store."""

                def calculate_discount(self, order_total: float, discount_type: str) -> float:
                    if discount_type == "seasonal":
                        return order_total * 0.10
                    elif discount_type == "clearance":
                        return order_total * 0.25
                    elif discount_type == "employee":
                        return order_total * 0.30
                    elif discount_type == "loyalty":
                        return order_total * 0.15
                    else:
                        raise ValueError(f"Unknown discount type: {discount_type}")


            # ── Snippet 3 ─────────────────────────────────────────────────────
            # DIAGNOSIS: LSP violation — PremiumUser cannot be substituted for
            # User because calling free_trial_signup() raises RuntimeError
            # instead of returning a string. Any code that iterates over a
            # list[User] and calls free_trial_signup() will crash on PremiumUser.
            class User:
                """Base class for application users."""

                def __init__(self, username: str, email: str) -> None:
                    self.username: str = username
                    self.email: str = email

                def login(self) -> str:
                    return f"{self.username} logged in"

                def free_trial_signup(self) -> str:
                    return f"{self.username} signed up for free trial"


            class PremiumUser(User):
                """A user with a paid subscription."""

                def __init__(self, username: str, email: str, plan: str) -> None:
                    super().__init__(username, email)
                    self.plan: str = plan

                def free_trial_signup(self) -> str:
                    raise RuntimeError(
                        f"{self.username} is already on the {self.plan} plan. "
                        "Premium users cannot sign up for a free trial."
                    )


            # ── Snippet 4 ─────────────────────────────────────────────────────
            # DIAGNOSIS: ISP violation — a simple database client that only needs
            # connect/query/disconnect is forced to implement cache_query(),
            # replicate(), and shard(). These are enterprise features that most
            # clients do not need. The interface should be split into smaller,
            # role-specific interfaces.
            class DatabaseClient(ABC):
                """Abstract interface for all database clients."""

                @abstractmethod
                def connect(self, connection_string: str) -> None: ...

                @abstractmethod
                def query(self, sql: str) -> list[dict[str, object]]: ...

                @abstractmethod
                def disconnect(self) -> None: ...

                @abstractmethod
                def cache_query(self, sql: str, ttl_seconds: int) -> list[dict[str, object]]: ...

                @abstractmethod
                def replicate(self, target_host: str) -> None: ...

                @abstractmethod
                def shard(self, shard_key: str, num_shards: int) -> None: ...


            # ── Snippet 5 ─────────────────────────────────────────────────────
            # DIAGNOSIS: DIP violation — ReportGenerator (high-level policy)
            # directly instantiates PdfRenderer and SqlConnection (low-level
            # details) in its __init__. It should depend on abstractions
            # (e.g., a Renderer ABC and a DataSource ABC) injected via the
            # constructor, not on concrete classes.
            class PdfRenderer:
                """Renders content to PDF format."""

                def render(self, content: str) -> bytes:
                    return f"<PDF>{content}</PDF>".encode()


            class SqlConnection:
                """Connects to a SQL database."""

                def fetch(self, query: str) -> list[dict[str, str]]:
                    return [{"id": "1", "data": "sample"}]


            class ReportGenerator:
                """Generates reports from database data."""

                def __init__(self) -> None:
                    self.renderer: PdfRenderer = PdfRenderer()
                    self.db: SqlConnection = SqlConnection()

                def generate(self, report_name: str) -> bytes:
                    data: list[dict[str, str]] = self.db.fetch(
                        f"SELECT * FROM {report_name}"
                    )
                    content: str = "\n".join(
                        str(row) for row in data
                    )
                    return self.renderer.render(content)


            # ── Snippet 6 ─────────────────────────────────────────────────────
            # DIAGNOSIS: No violation — UserValidator follows all five SOLID
            # principles:
            #   SRP: single responsibility (validate user input)
            #   OCP: new rules can be added without modifying UserValidator
            #   LSP: any ValidationRule subclass is safely substitutable
            #   ISP: ValidationRule has exactly one method — minimal interface
            #   DIP: UserValidator depends on the ValidationRule abstraction,
            #        not on concrete rule classes
            class ValidationRule(ABC):
                """Interface for a single validation rule."""

                @abstractmethod
                def validate(self, value: str) -> Optional[str]:
                    """Return an error message if invalid, None if valid."""
                    ...


            class NotEmptyRule(ValidationRule):
                def validate(self, value: str) -> Optional[str]:
                    if not value.strip():
                        return "Value must not be empty"
                    return None


            class MaxLengthRule(ValidationRule):
                def __init__(self, max_length: int) -> None:
                    self.max_length: int = max_length

                def validate(self, value: str) -> Optional[str]:
                    if len(value) > self.max_length:
                        return f"Value must be at most {self.max_length} characters"
                    return None


            class UserValidator:
                """Validates user input against a configurable set of rules."""

                def __init__(self, rules: list[ValidationRule]) -> None:
                    self.rules: list[ValidationRule] = rules

                def validate(self, value: str) -> list[str]:
                    errors: list[str] = []
                    for rule in self.rules:
                        error: Optional[str] = rule.validate(value)
                        if error is not None:
                            errors.append(error)
                    return errors
          language: "python"
      explanation: |
        Here is the diagnosis for each snippet:

        | # | Class | Violation | Why |
        |---|---|---|---|
        | 1 | `Logger` | **SRP** | Formats messages *and* writes to files — two actors (formatting policy vs. persistence policy) coupled in one class. |
        | 2 | `DiscountEngine` | **OCP** | Adding a new discount type requires modifying the `if/elif` chain instead of extending via a new class or strategy. |
        | 3 | `PremiumUser(User)` | **LSP** | `PremiumUser.free_trial_signup()` raises an exception instead of returning a string, so it cannot be substituted for `User` without breaking callers. |
        | 4 | `DatabaseClient` | **ISP** | Simple clients are forced to implement `cache_query()`, `replicate()`, and `shard()` — methods they do not need. The fat interface should be split. |
        | 5 | `ReportGenerator` | **DIP** | Directly instantiates `PdfRenderer` and `SqlConnection` — high-level policy depends on low-level details instead of abstractions. |
        | 6 | `UserValidator` | **None** | Follows all five principles: single responsibility, open for extension via new `ValidationRule` subclasses, substitutable rules, minimal interface, and depends on the `ValidationRule` abstraction. |

        The trick question (Snippet 6) is the most important one here. Being able to recognize code that's already well-designed is just as valuable as spotting violations — otherwise you fall into the over-engineering trap of "fixing" code that doesn't need fixing.

