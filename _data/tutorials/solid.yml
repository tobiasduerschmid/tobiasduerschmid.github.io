    solution:
      files:
        - path: "report_exporter.py"
          content: |
            from __future__ import annotations
            from abc import ABC, abstractmethod
            import json


            # --- Sub-goal 1: Define the ExportFormat contract ---
            class ExportFormat(ABC):
                """Abstract base class for report export formats."""

                @property
                @abstractmethod
                def name(self) -> str:
                    """Return the format name (e.g., 'csv', 'json')."""
                    ...

                @abstractmethod
                def format_report(self, title: str, headers: list[str], rows: list[list[str]]) -> str:
                    """Convert report data into a formatted string.

                    Args:
                        title: Report title string.
                        headers: List of column header strings.
                        rows: List of lists, each inner list is one data row.

                    Returns:
                        The formatted report as a string.
                    """
                    ...


            # --- Sub-goal 2: Implement concrete format classes ---

            class CsvFormat(ExportFormat):
                @property
                def name(self) -> str:
                    return "csv"

                def format_report(self, title: str, headers: list[str], rows: list[list[str]]) -> str:
                    lines = [",".join(headers)]
                    for row in rows:
                        lines.append(",".join(str(cell) for cell in row))
                    return "\n".join(lines)


            class JsonFormat(ExportFormat):
                @property
                def name(self) -> str:
                    return "json"

                def format_report(self, title: str, headers: list[str], rows: list[list[str]]) -> str:
                    records = []
                    for row in rows:
                        record = {}
                        for i, header in enumerate(headers):
                            record[header] = row[i]
                        records.append(record)
                    data = {"title": title, "records": records}
                    return json.dumps(data, indent=2)


            class TextFormat(ExportFormat):
                @property
                def name(self) -> str:
                    return "txt"

                def format_report(self, title: str, headers: list[str], rows: list[list[str]]) -> str:
                    col_widths = []
                    for i, h in enumerate(headers):
                        max_w = len(h)
                        for row in rows:
                            max_w = max(max_w, len(str(row[i])))
                        col_widths.append(max_w)

                    lines = [f"=== {title} ==="]
                    header_line = " | ".join(
                        h.ljust(col_widths[i]) for i, h in enumerate(headers)
                    )
                    lines.append(header_line)
                    lines.append("-" * len(header_line))
                    for row in rows:
                        lines.append(" | ".join(
                            str(cell).ljust(col_widths[i])
                            for i, cell in enumerate(row)
                        ))
                    return "\n".join(lines)


            # --- Sub-goal 3: Refactored ReportExporter — closed for modification ---
            class ReportExporter:
                """Exports tabular report data using pluggable format objects.

                To add a new format, create a class that extends ExportFormat
                and register it — no changes to ReportExporter needed.
                """

                def __init__(self, formats: list[ExportFormat] | None = None) -> None:
                    self._formats = {}
                    self.last_export = None
                    for f in (formats or []):
                        self.register_format(f)

                def register_format(self, fmt: ExportFormat) -> None:
                    self._formats[fmt.name] = fmt

                def export(self, title: str, headers: list[str], rows: list[list[str]], fmt_name: str) -> str:
                    if fmt_name not in self._formats:
                        return f"Unknown format: {fmt_name}"

                    fmt = self._formats[fmt_name]
                    result = fmt.format_report(title, headers, rows)
                    self.last_export = result
                    print(f"[{fmt_name.upper()}] Exported report: {title}")
                    return result


            # --- Quick demo ---
            if __name__ == "__main__":
                exporter = ReportExporter([CsvFormat(), JsonFormat(), TextFormat()])

                title = "Q4 Sales Report"
                headers = ["Region", "Revenue", "Units"]
                rows = [
                    ["North", "$12,400", "150"],
                    ["South", "$9,800", "98"],
                    ["East", "$15,200", "210"],
                ]

                print(exporter.export(title, headers, rows, "csv"))
                print()
                print(exporter.export(title, headers, rows, "json"))
                print()
                print(exporter.export(title, headers, rows, "txt"))
          language: "python"
      explanation: |
        The refactored design follows the Open/Closed Principle:

        1. **`ExportFormat` ABC** defines the contract: every format must have a `name` property and a `format_report()` method. This is the extension point.
        2. **`CsvFormat`, `JsonFormat`, `TextFormat`** each encapsulate their own serialization logic. They are self-contained — changing one cannot break another.
        3. **`ReportExporter`** holds a registry of format objects and delegates to them. Its `export()` method has **no if/elif chain** — it looks up the format by name and calls `format_report()`. To add XML or YAML export, you write a new class and register it. `ReportExporter` never changes.

        This is "open for extension" (new formats are easy) and "closed for modification" (existing code stays untouched).

