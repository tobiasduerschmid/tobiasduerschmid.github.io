      questions:

        - question: |
            After splitting `PaymentProcessor` into `PaymentProcessor` (base) and `RefundableProcessor` (extends base with `refund`), `checkout_with_refund()` is typed to accept `list[RefundableProcessor]`. What does this give us that the old design did not?
          type: multiple
          options:
            - "Misuse is caught at the function boundary — a GiftCardProcessor literally cannot be passed"
            - "Every processor in the list is guaranteed to have a working refund() method"
            - "The refund contract is honestly scoped to the processors that can honor it"
            - "It prevents anyone from ever using GiftCardProcessor for payments"
          correct_indices: [0, 1, 2]
          explanation: |
            The first three are the core wins. `GiftCardProcessor` can still be used for *payments* (option 4 is wrong) — it just cannot be used anywhere `refund()` is required, because it no longer claims to support it. The type signature of the function makes this explicit at the boundary.

        - question: |
            In the media player refactor, `LiveStreamPlayer` ended up with **no** `seek()` or `get_duration()` methods — not even stubs that raise. Why is removing them entirely better than keeping stubs that raise `NotImplementedError`?
          type: single
          options:
            - "It makes the code slightly faster because there is one less method in the class"
            - "A stub that raises is still LSP-violating in spirit — the method appears to exist but doesn't honor the parent's contract. Removing it lets `isinstance()` and type checks catch misuse at the boundary."
            - "Stubs that raise are a syntax error in Python 3"
            - "It reduces the line count of the file"
          correct_index: 1
          explanation: |
            The whole point of LSP is **honesty about capabilities**. A `seek()` that raises is a lie dressed as a method. Removing it moves the check from runtime (where it crashes *after* some work has already started) to load time (where `isinstance(player, SeekablePlayer)` returns False and the code goes down the non-seekable branch). Static type checkers like mypy can enforce this at CI time.

        - question: |
            Which of the following subclass behaviors would violate LSP? Select all that apply.
          type: multiple
          options:
            - "Overriding a method so it raises an exception the parent never raises"
            - "Overriding a method so it accepts *more* inputs than the parent (weaker precondition)"
            - "Overriding a method so it returns *less* detailed output than the parent (weaker postcondition)"
            - "Overriding a method so it runs faster than the parent's version"
          correct_indices: [0, 2]
          explanation: |
            - **New exceptions** (option 1): violates LSP — callers don't expect them.
            - **Weaker preconditions** (option 2): LSP-compliant — accepting *more* is always safe.
            - **Weaker postconditions** (option 3): violates LSP — you promised more than you're delivering.
            - **Faster** (option 4): LSP-compliant — performance improvements don't change the contract.

        - question: |
            You see this structure in a legacy codebase:

            ```python
            class Bird(ABC):
                @abstractmethod
                def fly(self): ...
                @abstractmethod
                def swim(self): ...

            class Penguin(Bird):
                def fly(self): raise NotImplementedError()
                def swim(self): return "Penguin swimming"

            class Eagle(Bird):
                def fly(self): return "Eagle flying"
                def swim(self): raise NotImplementedError()
            ```

            What is the minimal structural fix?
          type: single
          options:
            - "Make Penguin and Eagle both extend Bird but implement `fly()` and `swim()` with print statements"
            - "Split Bird into three classes: Bird (base), FlyingBird (adds fly), SwimmingBird (adds swim). Penguin extends SwimmingBird; Eagle extends FlyingBird."
            - "Delete the ABC and make Bird a concrete class"
            - "Rename Bird to Animal — the problem is the class name"
          correct_index: 1
          explanation: |
            Two Refused Bequests mean two extension interfaces are needed. `Bird` is the minimal common contract, `FlyingBird` adds `fly()`, `SwimmingBird` adds `swim()`. This mirrors the payments split (`PaymentProcessor` / `RefundableProcessor`). Any function that needs a flyer takes a `FlyingBird`; any function that needs a swimmer takes a `SwimmingBird`.

  # --------------------------------------------------------------------------
  # STEP 8 — "ISP — Lean Interfaces"
  # Pedagogy:
  #   Productive Failure — fat CloudStorage interface forces meaningless stubs.
  #   Contrastive Case   — side-by-side fat vs. segregated interfaces.
  #   Bridge from LSP    — ISP prevents LSP violations structurally.
  #   Bloom's level      — Apply / Analyze / Create (quiz).
  # --------------------------------------------------------------------------
  - title: "ISP — Lean Interfaces"
    instructions: |
      ## The Interface Segregation Principle

      > **Learning objective:** After this step you will be able to **identify** fat interfaces that force clients to depend on methods they don't use, and **refactor** them into lean, role-based interfaces.

      ### The Principle

      > *"Clients should not be forced to depend on methods they do not use."*
      > — Robert C. Martin

      When an interface gets too bloated, implementers that only need a few of its methods are forced to write stub implementations — methods that do nothing or raise errors. This wastes effort, confuses anyone reading the code, and creates **latent bugs**: code that looks fine but crashes at runtime.

      > **Struggling is the lesson.** ISP violations don't crash the compiler — they quietly plant `NotImplementedError` land mines that blow up at runtime, often far from the class that planted them. If the problem feels subtle, that's because it *is* subtle. The exercise below makes the latent crashes observable.

      ### Code Smell: *Fat Interface*

      A bloated interface with too many unrelated methods is called a **Fat Interface**. Close cousin: the *Refused Bequest* smell you met in the LSP step — when a fat interface forces a subclass to stub methods it cannot honor, you get LSP violations for free. ISP and LSP work together: segregating interfaces eliminates whole categories of LSP bugs before they can happen.

      ### Bridge from LSP

      Remember LSP from the previous step? ISP **prevents** LSP violations at the structural level. If `FreeStorage` never inherits a `sync()` method, it can never break the sync contract. Problem eliminated before it starts.

      ### The Scenario

      You're building a cloud storage service with two tiers: **Premium** and **Free**. Here's the current `CloudStorage` abstract base class with six capabilities:

      | Method | Premium | Free |
      |---|---|---|
      | `upload(file)` | Yes | Yes |
      | `download(file_id)` | Yes | Yes |
      | `sync(device)` | Yes | **No** |
      | `share(file_id, user)` | Yes | **No** |
      | `encrypt(file_id)` | Yes | **No** |
      | `get_version_history(file_id)` | Yes | **No** |

      `PremiumStorage` implements all six. Your task is to create a `FreeStorage` class that extends `CloudStorage`. But Free users can only upload and download — no sync, share, encrypt, or version history.

      ### Your Task

      Open `cloud_storage.py`. Implement `FreeStorage` so it inherits from `CloudStorage` and:

      1. Implements `upload()` to store the file and return `True`.
      2. Implements `download()` to return the stored file name.
      3. Implements `sync()`, `share()`, `encrypt()`, and `get_version_history()` to raise `NotImplementedError("Upgrade to Premium")`.

      After the tests pass, think about what happens if someone calls `backup_service(FreeStorage())`. The backup service **expects** any `CloudStorage` to support `sync()`, but `FreeStorage` explodes at runtime. That's what a fat interface does to you.

      ### What ISP Would Look Like

      Compare the fat interface approach with a segregated design:

      **Fat interface (current — problematic).** `FreeStorage` is forced to implement methods it cannot support:

      ```uml-class
      @startuml
      class CloudStorage {
        + upload()
        + download()
        + sync()
        + share()
        + encrypt()
        + get_version_history()
      }
      class FreeStorage {
        + upload()
        + download()
      }
      class PremiumStorage {
        + upload()
        + download()
        + sync()
        + share()
        + encrypt()
        + get_version_history()
      }
      FreeStorage --|> CloudStorage
      PremiumStorage --|> CloudStorage
      @enduml
      ```

      **Segregated interfaces (ISP-compliant).** Each capability is its own interface; classes only implement what they can actually support:

      ```uml-class
      @startuml
      interface Uploadable {
        + upload()
      }
      interface Downloadable {
        + download()
      }
      interface Syncable {
        + sync()
      }
      interface Shareable {
        + share()
      }
      interface Encryptable {
        + encrypt()
      }
      interface Versionable {
        + get_version_history()
      }
      class FreeStorage
      class PremiumStorage
      FreeStorage ..|> Uploadable
      FreeStorage ..|> Downloadable
      PremiumStorage ..|> Uploadable
      PremiumStorage ..|> Downloadable
      PremiumStorage ..|> Syncable
      PremiumStorage ..|> Shareable
      PremiumStorage ..|> Encryptable
      PremiumStorage ..|> Versionable
      @enduml
      ```

      With segregated interfaces, `FreeStorage` never inherits `sync()`, so `backup_service()` would require `Syncable` — and the type system (or a simple `isinstance` check) would catch the mismatch **before** runtime.

      ### Key Insight: ISP is NOT SRP

      The #1 ISP misconception is conflating it with SRP. They look similar, but they target different problems:

      - **SRP** = what a class does *internally* (one reason to change, one actor).
      - **ISP** = what a class exposes to its *clients* (no client should depend on methods it does not use).

      ### Discrimination Exercise — Which Principle?

      Study these two code sketches. Both look "wrong" at first glance, but they violate *different* principles. Before reading the answers below, think about each one.

      **Class A:**

      ```python
      class CustomerRecord:
          # Used by Sales, Finance, and Support teams
          def update_loyalty_points(self, points: int): ...        # Sales
          def calculate_lifetime_value(self): ...                   # Finance
          def generate_billing_invoice(self): ...                   # Finance
          def record_support_ticket(self, ticket: dict): ...        # Support
          def get_support_history(self): ...                        # Support
      ```

      Every method here is actually used — nobody is forced to implement stubs. But every team's concerns live in the same class, so a change requested by Support (e.g., new ticket fields) touches the same class that holds Finance's billing logic.

      **Class B:**

      ```python
      class MediaDevice(ABC):
          @abstractmethod
          def play_audio(self, track: str): ...
          @abstractmethod
          def play_video(self, file: str): ...
          @abstractmethod
          def record_audio(self, duration: int): ...
          @abstractmethod
          def record_video(self, duration: int): ...

      class MicrophoneSpeaker(MediaDevice):
          def play_audio(self, track): ...       # uses it
          def record_audio(self, duration): ...  # uses it
          def play_video(self, file):
              raise NotImplementedError
          def record_video(self, duration):
              raise NotImplementedError
      ```

      This class serves a single actor (the audio-device-using feature), but it's forced to implement video methods it can't honor. Stubs. Latent crashes.

      **Diagnoses:**

      - **Class A** violates **SRP** — multiple actors (Sales, Finance, Support) drive changes to the same class. No ISP violation — every client uses what it depends on. The fix is to split by actor into `LoyaltyTracker`, `BillingCalculator`, and `SupportTicketLog`.
      - **Class B** violates **ISP** — a single client is forced to depend on methods it can't implement. The interface is too fat. The fix is to split the interface into `AudioPlayable`, `AudioRecordable`, `VideoPlayable`, `VideoRecordable`, and have each device implement only what it can honor.

      **The rule of thumb:**

      - If the *class has multiple reasons to change* (multiple actors) → **SRP** violation.
      - If an *implementer is forced to stub or `NotImplementedError`* a method it doesn't need → **ISP** violation.
      - A single class can violate both. Fixing ISP often exposes an SRP violation underneath, and vice versa.

    files:
      - path: "cloud_storage.py"
        content: |
          from __future__ import annotations
          from abc import ABC, abstractmethod
          from typing import Dict, List, Optional


          # ── Fat interface — all storage capabilities in one ABC ──────────
          class CloudStorage(ABC):
              """Abstract base class for cloud storage services.
              Defines ALL storage capabilities in a single interface."""

              @abstractmethod
              def upload(self, file: str) -> bool:
                  """Upload a file to cloud storage. Returns True on success."""
                  ...

              @abstractmethod
              def download(self, file_id: str) -> str:
                  """Download a file by ID. Returns the file name."""
                  ...

              @abstractmethod
              def sync(self, device: str) -> bool:
                  """Sync files to a device. Returns True on success."""
                  ...

              @abstractmethod
              def share(self, file_id: str, user: str) -> str:
                  """Share a file with another user. Returns a share link."""
                  ...

              @abstractmethod
              def encrypt(self, file_id: str) -> bool:
                  """Encrypt a file. Returns True on success."""
                  ...

              @abstractmethod
              def get_version_history(self, file_id: str) -> List[str]:
                  """Get version history for a file. Returns list of version IDs."""
                  ...


          # ── Premium tier — implements everything ─────────────────────────
          class PremiumStorage(CloudStorage):
              """Premium cloud storage with all features."""

              def __init__(self) -> None:
                  self._files: Dict[str, str] = {}
                  self._next_id: int = 1
                  self._shared: Dict[str, str] = {}
                  self._synced_devices: List[str] = []
                  self._encrypted: List[str] = []
                  self._versions: Dict[str, List[str]] = {}

              def upload(self, file: str) -> bool:
                  file_id: str = f"file_{self._next_id}"
                  self._next_id += 1
                  self._files[file_id] = file
                  self._versions[file_id] = ["v1"]
                  print(f"[PREMIUM] Uploaded '{file}' as {file_id}")
                  return True

              def download(self, file_id: str) -> str:
                  if file_id not in self._files:
                      raise ValueError(f"File {file_id} not found")
                  print(f"[PREMIUM] Downloaded {file_id}")
                  return self._files[file_id]

              def sync(self, device: str) -> bool:
                  self._synced_devices.append(device)
                  print(f"[PREMIUM] Synced to {device}")
                  return True

              def share(self, file_id: str, user: str) -> str:
                  if file_id not in self._files:
                      raise ValueError(f"File {file_id} not found")
                  link: str = f"https://cloud.example.com/share/{file_id}?user={user}"
                  self._shared[file_id] = user
                  print(f"[PREMIUM] Shared {file_id} with {user}: {link}")
                  return link

              def encrypt(self, file_id: str) -> bool:
                  if file_id not in self._files:
                      raise ValueError(f"File {file_id} not found")
                  self._encrypted.append(file_id)
                  print(f"[PREMIUM] Encrypted {file_id}")
                  return True

              def get_version_history(self, file_id: str) -> List[str]:
                  if file_id not in self._versions:
                      raise ValueError(f"File {file_id} not found")
                  return list(self._versions[file_id])


          # ── Free tier — TODO: implement this class ───────────────────────
          class FreeStorage(CloudStorage):
              """Free cloud storage — upload and download only.
              sync, share, encrypt, and version history are NOT available."""

              def __init__(self) -> None:
                  self._files: Dict[str, str] = {}
                  self._next_id: int = 1

              # TODO: Implement upload() — store file in self._files, return True
              # TODO: Implement download() — return file name from self._files
              # TODO: Implement sync() — raise NotImplementedError("Upgrade to Premium")
              # TODO: Implement share() — raise NotImplementedError("Upgrade to Premium")
              # TODO: Implement encrypt() — raise NotImplementedError("Upgrade to Premium")
              # TODO: Implement get_version_history() — raise NotImplementedError("Upgrade to Premium")


          # ── A function that depends on the fat interface ──────────────────
          def backup_service(storage: CloudStorage) -> bool:
              """Backs up files by syncing to a backup device.
              Expects ANY CloudStorage — but crashes for FreeStorage!"""
              print("[BACKUP] Starting backup...")
              storage.upload("backup_manifest.txt")
              result: bool = storage.sync("backup-server-01")
              print(f"[BACKUP] Sync result: {result}")
              return result


          # ── Demo ──────────────────────────────────────────────────────────
          if __name__ == "__main__":
              print("=== Premium Storage ===")
              premium: PremiumStorage = PremiumStorage()
              premium.upload("report.pdf")
              premium.sync("laptop")
              premium.share("file_1", "colleague@example.com")
              premium.encrypt("file_1")
              print(f"Version history: {premium.get_version_history('file_1')}")
              print()

              print("=== Free Storage ===")
              free: FreeStorage = FreeStorage()
              free.upload("notes.txt")
              free.download("file_1")
              print()

