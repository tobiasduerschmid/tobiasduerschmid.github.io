      files:
        - path: "payments.py"
          content: |
            """Payment processing system — LSP-compliant version."""
            from abc import ABC, abstractmethod
            import uuid


            class PaymentProcessor(ABC):
                """Can process payments. No refund guarantee.

                Contract:
                    process_payment(amount):
                        Precondition:  0 < amount <= max_amount (if max_amount is set)
                        Postcondition: returns {"success": True, "txn_id": <str>}
                """

                @property
                def max_amount(self) -> float:
                    """Maximum accepted amount. None means no limit."""
                    return None

                @abstractmethod
                def process_payment(self, amount: float) -> None:
                    ...


            class RefundableProcessor(PaymentProcessor):
                """Can process payments AND refund them.

                Additional contract:
                    refund(txn_id):
                        Precondition:  txn_id was returned by a prior process_payment
                        Postcondition: returns {"success": True, "amount": <float>}
                """

                @abstractmethod
                def refund(self, txn_id: str) -> dict[str, object]:
                    ...


            class CreditCardProcessor(RefundableProcessor):
                """Processes credit card payments. Supports refunds."""

                def __init__(self) -> None:
                    self._transactions = {}

                def process_payment(self, amount: float) -> dict[str, object]:
                    if amount <= 0:
                        raise ValueError("Amount must be positive")
                    txn_id = str(uuid.uuid4())
                    self._transactions[txn_id] = amount
                    return {"success": True, "txn_id": txn_id}

                def refund(self, txn_id: str) -> dict[str, object]:
                    if txn_id not in self._transactions:
                        raise ValueError(f"Unknown transaction: {txn_id}")
                    amount = self._transactions.pop(txn_id)
                    return {"success": True, "amount": amount}


            class DebitCardProcessor(RefundableProcessor):
                """Processes debit card payments. Supports refunds."""

                def __init__(self, account_balance=1000.00) -> None:
                    self._balance = account_balance
                    self._transactions = {}

                def process_payment(self, amount: float) -> dict[str, object]:
                    if amount <= 0:
                        raise ValueError("Amount must be positive")
                    if amount > self._balance:
                        raise ValueError("Insufficient funds in debit account")
                    self._balance -= amount
                    txn_id = str(uuid.uuid4())
                    self._transactions[txn_id] = amount
                    return {"success": True, "txn_id": txn_id}

                def refund(self, txn_id: str) -> dict[str, object]:
                    if txn_id not in self._transactions:
                        raise ValueError(f"Unknown transaction: {txn_id}")
                    amount = self._transactions.pop(txn_id)
                    self._balance += amount
                    return {"success": True, "amount": amount}


            class GiftCardProcessor(PaymentProcessor):
                """Processes gift card payments. Non-refundable.

                Only implements PaymentProcessor (not RefundableProcessor)
                because gift cards cannot be refunded. The max_amount
                property explicitly declares the balance limit.
                """

                def __init__(self, balance: float = 0.0) -> None:
                    self._balance = balance
                    self._transactions = {}

                @property
                def max_amount(self) -> dict[str, object]:
                    return self._balance

                def process_payment(self, amount: float) -> dict[str, object]:
                    if amount <= 0:
                        raise ValueError("Amount must be positive")
                    if amount > self._balance:
                        raise ValueError("Insufficient gift card balance")
                    self._balance -= amount
                    txn_id = str(uuid.uuid4())
                    self._transactions[txn_id] = amount
                    return {"success": True, "txn_id": txn_id}


            def checkout(processors, amounts) -> list[str]:
                """Process payments through any PaymentProcessor.

                Does NOT require refund capability.
                """
                if len(processors) != len(amounts):
                    raise ValueError("processors and amounts must have same length")

                txn_ids = []
                for processor, amount in zip(processors, amounts):
                    if processor.max_amount is not None and amount > processor.max_amount:
                        raise ValueError(
                            f"Amount {amount} exceeds processor limit {processor.max_amount}"
                        )
                    result = processor.process_payment(amount)
                    assert result["success"], "process_payment must succeed"
                    txn_ids.append((processor, result["txn_id"]))

                return txn_ids


            def checkout_with_refund(processors, amounts) -> None:
                """Process payments and refund them all. Requires RefundableProcessor.

                Args:
                    processors: list of RefundableProcessor instances
                    amounts: list of amounts
                """
                if len(processors) != len(amounts):
                    raise ValueError("processors and amounts must have same length")

                for p in processors:
                    if not isinstance(p, RefundableProcessor):
                        raise TypeError(
                            f"{type(p).__name__} does not support refunds. "
                            f"Use checkout() instead, or pass only RefundableProcessor instances."
                        )

                txn_ids = []
                for processor, amount in zip(processors, amounts):
                    result = processor.process_payment(amount)
                    assert result["success"]
                    txn_ids.append((processor, result["txn_id"]))

                refund_results = []
                for processor, txn_id in txn_ids:
                    result = processor.refund(txn_id)
                    assert result["success"], f"refund must succeed, got: {result}"
                    refund_results.append(result)

                return refund_results
