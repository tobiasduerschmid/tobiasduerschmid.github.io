            from abc import ABC, abstractmethod
            from typing import Optional


            # ── Snippet 1 ─────────────────────────────────────────────────────
            # DIAGNOSIS: SRP violation — this class formats messages AND writes
            # to files. The formatting actor (who decides timestamp/uppercase
            # policy) and the persistence actor (who decides where logs go) are
            # coupled. A format change breaks the writer and vice versa.
            class Logger:
                """Handles application logging."""

                def __init__(self, log_path: str) -> None:
                    self.log_path: str = log_path

                def log(self, message: str) -> None:
                    formatted: str = self._format_message(message)
                    self._write_to_file(formatted)

                def _format_message(self, message: str) -> str:
                    import datetime
                    timestamp: str = datetime.datetime.now().isoformat()
                    return f"[{timestamp}] {message.upper()}"

                def _write_to_file(self, formatted_message: str) -> None:
                    with open(self.log_path, "a") as f:
                        f.write(formatted_message + "\n")


            # ── Snippet 2 ─────────────────────────────────────────────────────
            # DIAGNOSIS: OCP violation — adding a new discount type (e.g.,
            # "holiday") requires modifying the if/elif chain inside this class
            # instead of extending it. A strategy or registry pattern would let
            # new discounts be added without touching existing code.
            class DiscountEngine:
                """Calculates discounts for an e-commerce store."""

                def calculate_discount(self, order_total: float, discount_type: str) -> float:
                    if discount_type == "seasonal":
