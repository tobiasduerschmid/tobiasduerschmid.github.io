  - title: "Integration — Which Principle?"
    instructions: |
      ## Can You Spot the Violation?

      > **Learning objective:** After this step you will be able to **identify** which SOLID principle (if any) a given code snippet violates, and **justify** your diagnosis with a brief explanation.

      ### Why This Matters

      In real code reviews, violations do not come labelled. You need to look at a class or function and *recognize the smell* from its structure alone. This exercise interleaves all five principles so you practice **discrimination** — the skill of telling similar-looking problems apart.

      ### Your Task

      Open `violations_gallery.py`. It contains six numbered classes. For each one:

      1. **Read** the class carefully.
      2. **Decide** which SOLID principle it violates — or whether it is well-designed.
      3. **Add a comment** at the top of each class stating your diagnosis in this format:

      ```python
      # DIAGNOSIS: <principle> violation — <one-sentence reason>
      # Example: "SRP violation — class handles both formatting and persistence"
      ```

      If a class follows all SOLID principles, write:

      ```python
      # DIAGNOSIS: No violation — <brief justification>
      ```

      **Hint:** Exactly one of the six classes has no violation. Do not assume every class is broken.

      ### Thinking Checklist

      For each class, ask yourself:
      - **SRP:** Does this class serve more than one actor / have more than one reason to change?
      - **OCP:** Would I need to modify this class (not extend it) to add a new variant?
      - **LSP:** Could a subclass be substituted for its parent without breaking expectations?
      - **ISP:** Are implementers forced to depend on methods they do not use?
      - **DIP:** Does a high-level module directly instantiate or depend on a concrete low-level module?

