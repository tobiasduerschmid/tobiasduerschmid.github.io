          content: |
            """Tests for the payment processing system — with the contract encoded as asserts."""
            import pytest
            from payments import (
                CreditCardProcessor,
                DebitCardProcessor,
                GiftCardProcessor,
                checkout,
            )


            def test_credit_card_process_and_refund() -> None:
                cc = CreditCardProcessor()
                result = cc.process_payment(100.00)
                assert result["success"] is True
                refund_result = cc.refund(result["txn_id"])
                assert refund_result["success"] is True
                assert refund_result["amount"] == 100.00


            def test_debit_card_process_and_refund() -> None:
                debit = DebitCardProcessor(account_balance=500.00)
                result = debit.process_payment(200.00)
                assert result["success"] is True
                refund_result = debit.refund(result["txn_id"])
                assert refund_result["success"] is True
                assert refund_result["amount"] == 200.00


            # ── The Refund Contract (implemented) ─────────────────────────
            def refund_contract_holds(processor) -> None:
                """Encode the refund() postcondition as assert statements."""
                result = processor.process_payment(50.00)
                refund_result = processor.refund(result["txn_id"])
                # Contract assertion 1: refund result is a dict
                assert isinstance(refund_result, dict), (
                    f"refund() must return a dict; got {type(refund_result).__name__}"
                )
                # Contract assertion 2: success is True
                assert refund_result["success"] is True, (
                    f"refund() postcondition violated: success is not True "
                    f"(got {refund_result.get('success')})"
                )
                # Contract assertion 3: amount is numeric
                assert isinstance(refund_result.get("amount"), (int, float)), (
                    f"refund() postcondition violated: 'amount' must be numeric "
                    f"(got {refund_result.get('amount')!r})"
                )


            def test_refund_contract_for_all_processors() -> None:
                refund_contract_holds(CreditCardProcessor())
                refund_contract_holds(DebitCardProcessor(account_balance=500.00))
                # This one will FAIL — and that's the whole point.
                refund_contract_holds(GiftCardProcessor(balance=100.00))


            def test_checkout_with_refund() -> None:
                processors = [
                    CreditCardProcessor(),
                    DebitCardProcessor(account_balance=500.00),
                    GiftCardProcessor(balance=25.00),
                ]
                amounts = [75.00, 150.00, 50.00]

                # This will blow up in the refund phase for the GiftCard.
                refund_results = checkout(processors, amounts)
                assert len(refund_results) == len(processors)
                for result in refund_results:
                    assert result["success"] is True


            if __name__ == "__main__":
                pytest.main([__file__, "-v"])
          language: "python"

      explanation: |
        **What you just built — on purpose.**

        `GiftCardProcessor` now violates the `PaymentProcessor` contract in two separate ways:

        1. **Strengthened precondition** in `process_payment()`: the base class accepts any positive amount, but the gift card rejects `amount > balance`. Client code that assumes "any positive amount works" will crash.
        2. **Weakened postcondition** in `refund()`: the contract guarantees `success=True` and a numeric `amount`. The gift card returns `success=False` instead — the silent failure path.

        **The contract-as-assertions trick.** `refund_contract_holds()` encodes the postcondition as three plain `assert` statements. Running it against `CreditCardProcessor` and `DebitCardProcessor` passes. Running it against `GiftCardProcessor` fails with a message pointing at the exact postcondition that got broken. **Design-by-Contract** — the idea that method behavior is a formal contract between caller and callee — is one of the most useful lenses in software design, and it makes LSP mechanically observable.

        **The prediction check.** `checkout()` calls `process_payment()` first, then `refund()`. The gift card's balance was $25 and we tried to charge $50, so `process_payment()` raises first. If you predicted "refund fails first," you'd expect that — but the stronger precondition trips us up earlier. This is the point of prediction: the thing that *actually* breaks is often not what you'd guess.

        **What happens next.** In the next step, you'll fix this the right way: by splitting `PaymentProcessor` into two classes so that `GiftCardProcessor` never inherits a `refund()` method it cannot honor. You'll then apply the same pattern to a media player hierarchy.

