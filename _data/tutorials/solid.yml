          content: |
            """Media player hierarchy — LSP-compliant version."""
            from abc import ABC, abstractmethod


            class MediaPlayer(ABC):
                """Base class: can play and stop. No seeking guarantee."""

                def __init__(self, title: str) -> None:
                    self._title = title
                    self._playing = False

                @property
                def title(self) -> str:
                    return self._title

                @abstractmethod
                def play(self) -> None:
                    ...

                @abstractmethod
                def stop(self) -> None:
                    ...


            class SeekablePlayer(MediaPlayer):
                """A media player that supports seeking and has a known duration."""

                @abstractmethod
                def seek(self, position: int) -> None:
                    """Seek to a position in seconds."""
                    ...

                @abstractmethod
                def get_duration(self) -> str:
                    """Return total duration in seconds."""
                    ...


            class AudioFilePlayer(SeekablePlayer):
                def __init__(self, title: str, duration: int) -> None:
                    super().__init__(title)
                    self._duration = duration

                def play(self) -> str:
                    self._playing = True

                def stop(self) -> str:
                    self._playing = False

                def seek(self, position: int) -> str:
                    if position < 0 or position > self._duration:
                        raise ValueError("Position out of range")

                def get_duration(self) -> str:
                    return self._duration


            class VideoFilePlayer(SeekablePlayer):
                def __init__(self, title: str, duration: int, resolution="1080p") -> None:
                    super().__init__(title)
                    self._duration = duration
                    self._resolution = resolution

                def play(self) -> str:
                    self._playing = True

                def stop(self) -> str:
                    self._playing = False

                def seek(self, position: int) -> str:
                    if position < 0 or position > self._duration:
                        raise ValueError("Position out of range")

                def get_duration(self) -> str:
                    return self._duration


            class LiveStreamPlayer(MediaPlayer):
                """Live streams: play and stop only. No seeking, no duration."""

                def __init__(self, title: str, stream_url="https://live.example.com") -> None:
                    super().__init__(title)
                    self._stream_url = stream_url

                def play(self) -> None:
                    self._playing = True

                def stop(self) -> None:
                    self._playing = False


            def playlist_renderer(players) -> None:
                """Render a playlist that safely handles all player types.

                Seekable players get progress bars. Non-seekable players
                (like live streams) get a simple entry without a progress bar.
                """
                entries = []
                for player in players:
                    if isinstance(player, SeekablePlayer):
                        duration = player.get_duration()
                        midpoint = duration / 2
                        player.seek(midpoint)
                        entries.append({
                            "title": player.title,
                            "duration": duration,
                            "seeked_to": midpoint,
                            "has_progress_bar": True,
                        })
                    else:
                        entries.append({
                            "title": player.title,
                            "duration": None,
                            "seeked_to": None,
                            "has_progress_bar": False,
                        })
                return entries
