                          )
                      result = (
                          f"Stream '{book.title}' with license: "
                          f"{book.drm_license}"
                      )
                  else:
                      raise ValueError(f"Unknown format: {book.format}")

                  member.borrowed_isbns.append(isbn)
                  self.logger.log(
                      f"{member.name} checked out '{book.title}' "
