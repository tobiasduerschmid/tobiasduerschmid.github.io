      - description: "Text export includes the title"
        command: |
          g = {}
          exec(open('/tutorial/report_exporter.py').read(), g)
          txt_fmt = g['TextFormat']()
          result = txt_fmt.format_report("Sales Report", ["Region", "Revenue"], [["North", "$100"]])
          assert "Sales Report" in result, \
              f"Text export should include the report title. Got: {repr(result)}"
      - description: "ReportExporter delegates to format objects (no if/elif chain)"
        command: |
          source = open('/tutorial/report_exporter.py').read()
          import ast
          tree = ast.parse(source)

          # Find the ReportExporter class
          exporter_cls = None
          for node in ast.walk(tree):
              if isinstance(node, ast.ClassDef) and node.name == 'ReportExporter':
                  exporter_cls = node
                  break
          assert exporter_cls is not None, "ReportExporter class not found"

          # Find the export method
          export_method = None
          for item in exporter_cls.body:
              if isinstance(item, (ast.FunctionDef, ast.AsyncFunctionDef)) and item.name == 'export':
                  export_method = item
                  break
          assert export_method is not None, "ReportExporter must have an export() method"

          # Count if/elif branches that check format strings
          format_checks = 0
          for node in ast.walk(export_method):
              if isinstance(node, ast.Compare):
                  for comparator in node.comparators:
                      if isinstance(comparator, ast.Constant) and isinstance(comparator.value, str):
                          if comparator.value in ("csv", "json", "txt", "text"):
                              format_checks += 1
          assert format_checks <= 1, \
              f"ReportExporter.export() still has {format_checks} format-specific if/elif checks. " \
              f"Refactor to delegate to format objects instead of checking format strings."
        hints:
          - text: "Your ReportExporter.export() method should look up the format object by name (like using a dictionary) and call its `format_report()` method. Remove the if/elif chain that checks for 'csv', 'json', 'txt'."
            condition: "code_contains: elif"
      - description: "Adding a new format does not require modifying ReportExporter"
        command: |
          g = {}
          exec(open('/tutorial/report_exporter.py').read(), g)
          EF = g['ExportFormat']
          RE = g['ReportExporter']

          # Dynamically create a new format class to prove extensibility
          class XmlFormat(EF):
              @property
              def name(self) -> str:
                  return "xml"
              def format_report(self, title: str, headers, rows) -> str:
                  lines = [f"<report title=\"{title}\">"]
                  for row in rows:
                      lines.append("  <row>")
                      for i, h in enumerate(headers):
                          lines.append(f"    <{h}>{row[i]}</{h}>")
                      lines.append("  </row>")
                  lines.append("</report>")
                  return "\n".join(lines)

          # Register XML without touching ReportExporter source
          exporter = RE([g['CsvFormat'](), g['JsonFormat'](), g['TextFormat'](), XmlFormat()])
          result = exporter.export("Test", ["A"], [["1"]], "xml")
          assert "<report" in result, \
              f"New XmlFormat should work without modifying ReportExporter. Got: {repr(result)}"
          assert "Unknown" not in result, \
              f"ReportExporter did not recognize the new format. Got: {repr(result)}"

