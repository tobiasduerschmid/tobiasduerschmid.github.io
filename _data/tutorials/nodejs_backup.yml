            - "Node.js is single-threaded. It handles concurrency via the Event Loop and non-blocking I/O, not by spawning a thread per connection"
            - "Node.js is multi-threaded but only uses two threads: one for JavaScript and one for I/O"
            - "Node.js was multi-threaded in early versions but switched to single-threaded in v12"
          correct_index: 1
          explanation: "Node.js runs JavaScript on a SINGLE thread. Its high concurrency comes from the Event Loop + libuv's non-blocking I/O — not from threads. While libuv uses a small thread pool internally for some OS operations, the JavaScript code you write always runs on one thread. This is the core architectural insight from Step 1."

