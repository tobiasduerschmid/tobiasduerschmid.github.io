    quiz:
      title: "Capstone — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            Why is `Promise.all([fetchRoster(), fetchGrades()])` faster than awaiting each one sequentially?
          type: single
          options:
            - "`Promise.all` spawns a separate thread for each Promise, running both functions in true parallel on multiple CPU cores"
            - "`Promise.all` starts both Promises immediately; the Event Loop handles both concurrently, so total time is the max of the two"
            - "`Promise.all` bypasses the Event Loop and runs both functions synchronously in a single batch for efficiency"
            - "It is not faster — `Promise.all` is syntactic sugar that internally awaits each Promise sequentially in order"
          correct_index: 1
          explanation: "Both `setTimeout` timers start immediately when `fetchRoster()` and `fetchGrades()` are called. `Promise.all` simply waits for both to resolve. Since Node.js is single-threaded, there are no extra threads — the Event Loop manages both timers concurrently. Total wait is ~50ms (the slower one), not ~100ms."

        - question: |
            **Evaluate** this code for computing a student's average grade. What is the bug?
            ```javascript
            const avg = grades
                .filter(g => g.studentId == student.id)
                .map(g => g.grade)
                .reduce((sum, g) => sum + g) / grades.length;
            ```
          type: single
          options:
            - "`.reduce()` needs an initial value of `0` to handle empty arrays safely, and the division should use the filtered array's length, not `grades.length`"
            - "`.filter()` should use `.find()` instead — filter returns only one element"
            - "The `==` operator will crash because `studentId` and `id` are different types"
            - "There is no bug — this code is correct"
          correct_index: 0
          explanation: "Two bugs: (1) `.reduce((sum, g) => sum + g)` with no initial value throws on empty arrays — always pass `0` as the second argument. (2) Dividing by `grades.length` (all grades) instead of the filtered array's length gives the wrong average. Also, `==` should be `===` for strict comparison (Step 2)."

        - question: |
            **[Spaced Practice: Revisit Step 5]** In the capstone, `fetchRoster()` and `fetchGrades()` both use `setTimeout` with 50ms. If you `await fetchRoster()` first (line A) then `await fetchGrades()` (line B), what is the minimum total wait time?
          type: single
          options:
            - "~50ms — both timers run concurrently on the Event Loop"
            - "~100ms — the second timer does not start until the first `await` resolves"
            - "~0ms — `setTimeout` with small values resolves instantly"
            - "It depends on how fast the CPU is"
          correct_index: 1
          explanation: "When you `await` sequentially, the second call does not execute until the first Promise resolves. The first timer fires after ~50ms, then the second starts and fires after another ~50ms — total ~100ms. This is why `Promise.all` matters: it starts both timers at the same time."

        - question: |
            **[Technique Selection — Interleaving]** A Spotify-like app needs to: (1) fetch a user's playlists, (2) for each playlist, fetch its tracks, (3) display all track names. Which combination of array methods and async patterns is most appropriate?
          type: single
          options:
            - "`.filter()` to select playlists, then `await` each track fetch sequentially"
            - "`.map()` to transform playlists into fetch Promises, then `Promise.all()` to fetch all track lists concurrently, then `.flat()` to merge results"
            - "`.reduce()` to accumulate all tracks into one array, with `await` inside the reducer callback"
            - "A `for` loop with `setTimeout` to space out the requests"
          correct_index: 1
          explanation: "`.map()` transforms each playlist into a Promise (the fetch call). `Promise.all()` fires all fetches concurrently — much faster than sequential `await`. `.flat()` merges the nested arrays of tracks into one list. This combines Step 4 (`.map()`), Step 6 (`Promise.all`), and Step 5 (Event Loop concurrency)."

        - question: "**[Spaced Practice: Revisit Step 6]** A `try`/`catch` block wraps an `await` call, but the developer forgot to add `async` to the function declaration. What happens?"
          options:
            - "The code works fine — `async` is optional when using `await` inside `try`/`catch`"
            - "`await` is only valid inside `async` functions. Without `async`, JavaScript throws a SyntaxError before the code even runs"
            - "The `await` is silently ignored and the Promise object is assigned directly to the variable"
            - "The function runs synchronously, blocking the Event Loop until the Promise resolves"
          correct_index: 1
          explanation: "`await` can only appear inside an `async` function. If you forget `async`, JavaScript throws a SyntaxError at parse time — the code never executes. This is a common mistake when refactoring callback-style code to async/await. Always check that the enclosing function is marked `async`."
