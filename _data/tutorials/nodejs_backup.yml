  # --------------------------------------------------------------------------
  # STEP 6: From Callbacks to async/await
  # Pedagogy: Scaffold the three generations — feel callback pain first, then show the fix.
  #           Fixer Upper — refactor callback-style code to async/await.
  #           Transfer Tutor — async/await looks like synchronous Python/C++ code.
  #           Critical caveat: sequential await vs Promise.all() (from the research).
  # --------------------------------------------------------------------------
  - title: "From Callbacks to `async`/`await`"
    instructions: |
      ## What is a Promise?

      > You just conquered the Event Loop — the single hardest concept in Node.js. If it clicked, you are ahead of most JavaScript beginners. If it's still fuzzy, that is completely normal — revisit the Restaurant Metaphor whenever async code surprises you. It will keep making more sense with practice.

      > **Learning objective:** After this step you will be able to **refactor** callback-based code to use `async`/`await`, **explain** what a Promise represents, and **use** `try`/`catch` for async error handling.

      Before the generations, you need to know what a **Promise** is: an object representing a value that does not exist yet. Think of it like ordering food on a delivery app — you get a tracking number (the Promise) immediately, but the food (the value) arrives later.

      ```javascript
      // CREATING a Promise — this is how async operations are built under the hood:
      const promise = new Promise((resolve, reject) => {
          // The function you pass receives two callbacks:
          //   resolve(value) — call this when the work succeeds
          //   reject(error)  — call this when it fails
          setTimeout(() => resolve("data ready!"), 100);
      });

      // CONSUMING a Promise (you will do this constantly):
      promise.then(data => console.log(data));   // "data ready!" after 100ms
      ```

      The two arguments to `new Promise(...)` are just callbacks — the same concept you learned in step 3. `resolve` and `reject` are functions that the Promise machinery calls for you.

      > **In practice**: you rarely *create* Promises from scratch. You mostly *consume* them using `await` or `.then()`. The step 5 task provides `fetchStudents()` as a Promise-returning function (built this way) so you can see what it looks like — and then practice consuming it with `async`/`await`.

      ## The Three Generations of Async

      Node.js async syntax has evolved through three generations. You need to recognize all three — and write the third.

      ### Generation 1: Callbacks (Legacy — "Callback Hell")

      ```javascript
      fetchData('a', (err, dataA) => {            // Level 1
          if (err) throw err;
          fetchData('b', (err2, dataB) => {        // Level 2
              if (err2) throw err2;
              // Level 3... "Pyramid of Doom"
          });
      });
      ```

      Every nested async operation adds another indentation level. This is "Callback Hell." If this looks messy and hard to follow, that is exactly the right instinct — an entire generation of JavaScript developers struggled with exactly this pattern, which is why Promises and async/await were invented.

      ### Generation 2: Promises (Flattened)

      ```javascript
      // C++ analogy: std::future   |   Python analogy: concurrent.futures.Future
      fetchData('a')
          .then(dataA => fetchData('b'))
          .then(dataB => console.log(dataB))
          .catch(err  => console.error(err));
      ```

      ### Generation 3: async/await (Modern — looks like synchronous code)

      ```javascript
      async function loadData() {
          try {
              // 'await' suspends THIS function (non-blocking!) and lets other work proceed
              const dataA = await fetchData('a');
              const dataB = await fetchData('b');
              console.log(dataA, dataB);
          } catch (err) {
              console.error(err);
          }
      }
      loadData();
      ```

      This looks like synchronous C++/Python code — but it does **not** block the event loop. When JavaScript hits `await`, it suspends the async function, frees the call stack, and lets the Event Loop process other work. When the Promise resolves, execution resumes.

      > ⚠️ **Critical Caveat — Sequential vs Parallel:**
      > ```javascript
      > // SLOWER: sequential — total time = time(A) + time(B)
      > const a = await fetchA();
      > const b = await fetchB();
      >
      > // FASTER: parallel — total time = max(time(A), time(B))
      > const [a, b] = await Promise.all([fetchA(), fetchB()]);
      > ```
      > If two operations are independent, always prefer `Promise.all()`.

      ### Task: Rewrite Using async/await

      > **Before you start:** write a one-line comment at the top of `async.js` predicting what `await` does to the event loop. Does it block the Chef, or free the Chef? Check your prediction after running.

      Open `async.js`. It contains `fetchStudents()` — a function that returns a Promise (simulating a database or network call). Below it is a callback-style invocation that works but is messy.

      **Your job:** Delete the callback-style code *below* `fetchStudents()` (keep `fetchStudents` and `fetchFailing` — you need them!) and replace it with a clean `async` function that:
      - Uses `await` to get the student data
      - Logs each student's name and grade
      - Handles errors with `try`/`catch`

      No TODO comments this time — use the Generation 3 pattern from above as your reference. Click **▶ Run** to check your output.

      **Bonus — Test your error handling:** The starter file also includes `fetchFailing()`, which always rejects. After your async function works with `fetchStudents()`, temporarily change it to call `fetchFailing()` instead and verify that your `catch` block fires and prints the error message. Then switch it back.

