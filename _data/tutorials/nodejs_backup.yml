title: "Node.js Essentials: JavaScript for the Backend"
description: "A hands-on introduction to Node.js for students who already know Python and C++. Learn to run JavaScript, understand the event loop, and write modern async code — all in the browser."

backend: browser

require_tests: true
autosave_type: none

steps:
  # --------------------------------------------------------------------------
  # STEP 1: "Lay of the Land" — Hello, Node.js!
  # Pedagogy: "Lay of the Land" pattern — macro overview before syntax.
  #           Transfer Tutor — explicit Python/C++ comparison table.
  #           Guide-and-Release — brief explanation then immediate practice.
  # --------------------------------------------------------------------------
  - title: "Hello, Node.js!"
    instructions: |
      ## The Lay of the Land

      > **Learning objective:** After this step you will be able to **explain** how Node.js uses V8 and libuv to run JavaScript outside the browser and **write** a basic Node.js script.

      You already know two languages. JavaScript powers everything from Discord and Spotify's web player to Netflix's backend. Here is how it fits into your mental model:

      | | C++ | Python | JavaScript (Node.js) |
      |---|---|---|---|
      | Typing | Static | Dynamic | Dynamic |
      | Memory | Manual (`new`/`delete`) | GC (reference counting) | GC (V8 engine) |
      | Run with | Compile → `./app` | `python script.py` | `node script.js` |
      | I/O model | Synchronous (blocks) | Synchronous (blocks) | **Asynchronous** (non-blocking) |

      **Node.js** takes JavaScript out of the browser by wrapping two engines:
      - **V8** — Google's just-in-time (JIT) compiler that turns JavaScript into machine code (like `g++` for C++) right before you execute it.
      - **libuv** — A C library providing the **Event Loop** and non-blocking I/O access to the OS.
      
      Together, they let JavaScript write backend servers, CLI tools, and scripts — just like Python or C++.
      Thereby, Node.js powers production backends at Netflix, LinkedIn, Uber, and many more!


      ### Predict Before You Code

      Look at `hello.js` — this is our soon-to-be hello world program.
      In C++ your hello would would be `printf("Hello from C++!\n");`
      In Python it would be `print("Hello from Python!")`.
      What might it be for JavaScript running in Node.js? Maybe a mix of both?
      Not at all. JavaScript has its own syntax for printing to the console.

      ### Task: Your First Node.js Script

      Open `hello.js` in the editor. Add a line to print your greeting:

      ```javascript
      console.log("Hello from Node.js!");
      ```

      Click **▶ Run** to execute the script and see the output. This excutes `node hello.js` in background.
      In this tutorial you focus just on writing Node.js. We run these commands for you.

    files:
      - path: "hello.js"
        content: |
          // Your first Node.js script!
          // Task: Add a console.log() statement below to print "Hello from Node.js!"

        language: "javascript"

    open_file: "hello.js"

    solution:
      files:
        - path: "hello.js"
          content: |
            // Your first Node.js script!
            // Task: Add a console.log() statement below to print "Hello from Node.js!"
            console.log("Hello from Node.js!");
          language: "javascript"
      explanation: |
        **`console.log()`:** The Node.js equivalent of Python's `print()` and C++'s `printf()`. It writes to stdout with a trailing newline.

        The test checks two things: (1) the source contains `console.log`, and (2) the output includes `"Hello from Node.js"`. Both are satisfied by this one line.

        Node.js scripts run top-to-bottom like Python scripts — no `main()` function, no compilation step. V8 JIT-compiles the JavaScript at runtime.

    tests:
      - description: "hello.js contains a console.log statement"
        command: "assert(code.includes('console.log('), 'Add a console.log() call to hello.js')"
        hints:
          - text: "JavaScript's built-in function for printing is NOT `print()` like Python or `printf()` like C++. Look at the code comment in the instructions — what object and method does JavaScript use to write to stdout?"
            condition: "code_missing: console.log("
          - text: "Good — you have the right function. Make sure your file isn't empty and the syntax is complete (parentheses, quotes, semicolon)."
            condition: "code_contains: console.log("
      - description: "Output includes 'Hello from Node.js!'"
        command: "assert(output.includes('Hello from Node.js'), 'Your console.log should print \"Hello from Node.js!\"')"
        hints:
          - text: "Your code runs but the output doesn't match. The test checks for an exact string — compare your message character-by-character with the expected output in the instructions."
            condition: "code_contains: console.log("

    quiz:
      title: "Hello, Node.js! — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "JavaScript was originally designed to run only inside a web browser. Why can Node.js run on a server?"
          options:
            - "Node.js is a completely different language that only looks like JavaScript. A new special syntax was designed to enable server-side functionality."
            - "Node.js embeds a special engine plus libraries, giving JavaScript access to the operating system, filesystem, and networking outside the browser."
            - "Node.js compiles JavaScript to C++ before execution, which enables server usage just like any other program would."
            - "Browser vendors updated their runtimes to support server-side execution."
          correct_index: 1
          explanation: "Node.js bundles Google's V8 engine (which compiles JS to machine code) with libuv (a C library for async I/O). This gives JavaScript everything it needs to work as a backend runtime — file access, TCP sockets, and a non-blocking Event Loop."

        - question: "How do you run a Node.js script named `app.js`?"
          options:
            - "`./app.js`"
            - "`python app.js`"
            - "`node app.js`"
            - "`node --execute app.js`"
          correct_index: 2
          explanation: "`node <filename>` runs a JavaScript file, analogous to `python script.py`. Unlike C++, there is no separate compile step — V8 JIT-compiles the code at runtime."

        - question: "A student from a C++ background says: 'JavaScript is just a browser scripting language, it cannot power a real backend.' What is the flaw in this argument?"
          options:
            - "JavaScript is a compiled language and has always been able to run anywhere"
            - "Node.js gives JavaScript OS-level access via libuv."
            - "JavaScript has better memory management than C++ for server applications"
            - "The student is correct — Node.js is only suitable for front-end tooling"
          correct_index: 1
          explanation: "Node.js broke JavaScript out of the browser sandbox by providing OS-level access. Its non-blocking event loop makes it highly efficient for I/O-heavy workloads. Netflix, LinkedIn, and Uber all use Node.js for production backend services."

  # --------------------------------------------------------------------------
  # STEP 2: Variables, Types & The === Trap
  # Pedagogy: Fixer Upper — repair buggy code using == instead of ===.
  #           Transfer Tutor — C++ static types vs JS dynamic, Python f-strings → template literals.
  #           Targets negative transfer risk: the == coercion landmine.
  # --------------------------------------------------------------------------
  - title: "Variables, Types & The === Trap"
    instructions: |
      ## Bridging Your Mental Models

      > **Learning objective:** After this step you will be able to **declare** variables with `let`/`const`, **use** template literals, and **explain** why `===` should be preferred over `==`.

      JavaScript's type system *looks* like Python but hides a critical landmine.

      ### `let` and `const`

      Forget C++'s `int x = 5`. Modern JavaScript uses:

      ```javascript
      let count = 0;          // Mutable — like a regular Python variable
      const MAX_SIZE = 200;   // Immutable binding — like Python's ALL_CAPS convention, but enforced
      ```
      Mutable variables can be assigned different values afterwards. 
      This is useful when the value is expected to change, e.g. a counter.
      However, it also masks bugs that result from incorrect assignments.
      Use immuatable types (`const` in JS, `final` in Java, `const` in C++) when declaring constants that are not expect to change.

      > **Avoid using `var`** — it has "hoisting" scoping rules that violate everything you know from C++ and Python. Always use `let` or `const`.

      ### Template Literals (like Python's f-strings)

      ```javascript
      // Python:      f"Hello, {name}! You scored {grade}."
      // JavaScript:  `Hello, ${name}! You scored ${grade}.`
      //               ^backtick                  ^dollar-brace
      ```

      ### The `===` Trap ⚠️

      JavaScript has TWO equality operators with different semantics. To avoid surprises, **always use `===`:**

      ```javascript
      // SURPRISE: == triggers implicit type coercion — a JS-specific danger
      console.log(1 == "1");    // true  ← DANGEROUS SURPRISE
      console.log(0 == false);  // true  ← DANGEROUS SURPRISE

      // AS EXPECTED: === checks value AND type (behaves like == in Python and C++)
      console.log(1 === "1");   // false ← correct
      console.log(0 === false); // false ← correct
      ```

      This is **negative transfer**: your existing `==` intuition from C++ and Python does not transfer to JavaScript. Use `===` and it matches your expectation.

      > **Feeling confused by `==` vs `===`?** That is completely normal — this trips up experienced developers too. The fact that you are learning the distinction now puts you ahead of most JavaScript beginners.

      ### Predict Before You Run

      Before clicking Run on `types.js`, predict: will `userInput == expectedScore` (where `userInput` is the string `"42"` and `expectedScore` is the number `42`) be `true` or `false`? What would it be in Python?

      ### Task: Fix the Fixer-Upper

      Open `types.js`. It has **three bugs**:

      1. Two comparisons that produce wrong results because they do not type-check — fix them!
      2. A mutable declaration for a value that never changes — change it to be immutable.
      3. A messy string concatenation — replace it with a **template literal**.

      Click **▶ Run** to check your output. It should no longer show any `[BUG]` messages.

    files:
      - path: "types.js"
        content: |
          // FIXER-UPPER: This file has three bugs. Find and fix them all.

          // Does this comparison really make sense?
          let userInput = "42";
          let expectedScore = 42;
          if (userInput == expectedScore) {
              console.log("[BUG] String '42' should NOT equal number 42 here!");
          } else {
              console.log("Score check: types are different, correctly rejected.");
          }

          // How about this comparison?
          let isAdmin = false;
          if (isAdmin == 0) {
              console.log("[BUG] false should NOT equal the number 0 here!");
          } else {
              console.log("Admin check: false and 0 are different types, correctly rejected.");
          }

          // What if we accidently use the same name later on in the program, how could we ensure that we always find that bug?
          let MAX_STUDENTS = 200;

          // Bruh so many + and " characters. How could we simplify this?
          // Expected output format: "Student Alex scored 95 out of 200"
          let studentName = "Alex";
          let studentGrade = 95;
          let message = "Student " + studentName + " scored " + studentGrade + " out of " + MAX_STUDENTS;
          console.log(message);
        language: "javascript"

    open_file: "types.js"

    solution:
      files:
        - path: "types.js"
          content: |
            // FIXER-UPPER: Three bugs fixed.

            // BUG 1 FIXED: == changed to === (no type coercion)
            let userInput = "42";
            let expectedScore = 42;
            if (userInput === expectedScore) {
                console.log("[BUG] String '42' should NOT equal number 42 here!");
            } else {
                console.log("Score check: types are different, correctly rejected.");
            }

            // BUG 2 FIXED: == changed to ===
            let isAdmin = false;
            if (isAdmin === 0) {
                console.log("[BUG] false should NOT equal the number 0 here!");
            } else {
                console.log("Admin check: false and 0 are different types, correctly rejected.");
            }

            // BUG 3 FIXED: let changed to const (value never changes)
            const MAX_STUDENTS = 200;

            // TASK DONE: Replaced + concatenation with a template literal
            const studentName = "Alex";
            const studentGrade = 95;
            const message = `Student ${studentName} scored ${studentGrade} out of ${MAX_STUDENTS}`;
            console.log(message);
          language: "javascript"
      explanation: |
        **`===` instead of `==`:** JavaScript's `==` performs implicit type coercion — `"42" == 42` is `true` and `false == 0` is `true`. These are the dangerous surprises shown in the tutorial. `===` checks both value AND type, matching the behavior you expect from C++ and Python. After both fixes, neither `[BUG]` message appears in output.

        **`const MAX_STUDENTS`:** The value `200` never changes, so `const` is the correct declaration — it prevents accidental reassignment and signals intent to readers. The test checks `source.includes('const MAX_STUDENTS')`.

        **Bonus improvement:** The solution also changes `studentName`, `studentGrade`, and `message` from `let` to `const` — none are reassigned, so `const` is the better choice. This is not required by the task (only `MAX_STUDENTS` is listed as a bug), but it follows best practice #1: "default to `const`, use `let` only when reassigning."

        **Template literal:** Backtick strings with `${expression}` syntax replace the `+` concatenation. The test checks `source.includes('${')`. Template literals are the direct JavaScript equivalent of Python's f-strings.

        **Test: no `[BUG]` in output:** The test `assert(!output.includes('[BUG]'), ...)` verifies both `===` fixes worked — neither branch with `[BUG]` in its message should execute.

    tests:
      - description: "Fixed both == comparisons to === (no [BUG] messages in output)"
        command: "assert(!output.includes('[BUG]'), 'Fix both == comparisons to === — the [BUG] messages should disappear')"
        hints:
          - text: "The [BUG] messages appear because JavaScript's `==` silently converts types before comparing. What operator checks both value AND type? Look at the '=== Trap' section in the instructions."
            condition: "code_missing: ==="
          - text: "You've fixed at least one comparison — but there are TWO `==` bugs in the file. Search for every `==` and check if it should be `===`."
            condition: "code_contains: ==="
      - description: "MAX_STUDENTS is now declared with const"
        command: "assert(code.includes('const MAX_STUDENTS'), 'Change \"let MAX_STUDENTS\" to \"const MAX_STUDENTS\"')"
        hints:
          - text: "One of the bugs involves a variable declaration keyword. Is `MAX_STUDENTS` ever reassigned anywhere in the code? If not, which keyword signals 'this value is fixed'?"
            condition: "code_missing: const MAX_STUDENTS"
      - description: "Used a template literal (backtick with ${}) for the message"
        command: "assert(code.includes('${'), 'Replace the + concatenation with a template literal using backticks and ${}')"
        hints:
          - text: "The messy string concatenation with `+` can be replaced with JavaScript's equivalent of Python's f-strings. What kind of quotes (not single, not double) enable `${}` interpolation?"
            condition: "code_missing: ${"
      - description: "Code runs without errors"
        command: "assert(!output.toLowerCase().includes('error'), 'The code should run without any errors')"
        hints:
          - text: "Your code has a syntax error. Check for mismatched backticks, missing semicolons, or unclosed braces. The error message in the output may tell you the line number."

    quiz:
      title: "Variables, Types & The === Trap — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "Why does `1 == '1'` evaluate to `true` in JavaScript, when the same comparison in Python or C++ would be `false`?"
          options:
            - "JavaScript automatically converts (coerces) the string '1' to the number 1 before comparing with =="
            - "The string '1' and number 1 are actually the same type in JavaScript"
            - "This is a known bug in older JavaScript engines that has since been fixed"
            - "== in JavaScript compares memory addresses, which happen to be equal here"
          correct_index: 0
          explanation: "JavaScript's == performs *implicit type coercion* — it converts values to a common type before comparing. This creates traps: `0 == false`, `'' == false`, `null == undefined`. The === operator skips coercion and requires both value AND type to match, behaving exactly like == in Python and C++. Always use ===."

        - question: "A student writes `let MAX_RETRY = 3` but never reassigns it in 200 lines of code. Why is `const MAX_RETRY = 3` a better choice?"
          options:
            - "const variables execute faster than let variables at runtime"
            - "const prevents accidental reassignment and signals to readers that this value is intentionally fixed throughout the program"
            - "let variables are automatically garbage collected, while const variables persist in memory"
            - "There is no practical difference — const and let behave identically"
          correct_index: 1
          explanation: "`const` prevents accidental reassignment and communicates intent. It is the JavaScript equivalent of C++'s `const` keyword. Unlike C++ const, JavaScript's `const` for objects and arrays prevents rebinding the variable, but does not make the contents immutable."

        - question: "What is the JavaScript equivalent of Python's f-string `f\"Welcome, {name}! Score: {score}\"`?"
          options:
            - "`'Welcome, ${name}! Score: ${score}'`"
            - "`\"Welcome, \" + name + \"! Score: \" + score`"
            - "`` `Welcome, ${name}! Score: ${score}` ``"
            - "`\"Welcome, %s! Score: %d\" % (name, score)`"
          correct_index: 2
          explanation: "Template literals use backticks (`` ` ``) and `${expression}` for interpolation — a direct equivalent of Python's f-strings. Single or double quotes create plain strings with no interpolation. Note: `'Welcome, ${name}!'` in single quotes prints the literal text `${name}`, not the variable's value."

        - question: "Which behaviors of `var` violate the scoping rules you learned in C++ and Python? (Select all that apply)"
          type: multiple
          options:
            - "`var` declarations are hoisted to the top of their function, so they can be referenced before the line where they are declared"
            - "`var` ignores block scope (`if`, `for`, `while` blocks) and leaks into the enclosing function"
            - "`var` cannot hold string values — only numbers and booleans"
            - "`var` allows re-declaring the same variable name multiple times without any error"
          correct_indices:
            - 0
            - 1
            - 3
          explanation: "All three of these behaviors break the mental model from C++ and Python. C++ block scope (`{}`) strictly contains variables. Python raises a NameError if you use a variable before assignment. `var` violates both. `let` and `const` behave like C++/Python block-scoped variables — use them exclusively."

        - question: "A teammate's code has `if (userRole == 'admin')` and it works in all their tests. Should you flag this in code review? Why or why not?"
          options:
            - "No — both sides are strings so `==` and `===` behave identically, and there is no risk to flag"
            - "Yes — using `==` hides a habit of relying on coercion, and a future change to a numeric role ID would silently introduce a bug"
            - "Yes — `==` is measurably slower than `===` at runtime due to the type coercion step, which impacts performance"
            - "No — `==` and `===` are identical for same-type operands, and linters will only flag cross-type comparisons"
          correct_index: 1
          explanation: "When both operands are already the same type, `==` and `===` produce the same result. But using `===` consistently prevents future bugs when types change (e.g., role becomes a number). This is a defensive coding practice — the code review should flag it as a latent risk, not a current bug."

  # --------------------------------------------------------------------------
  # STEP 4: Arrow Functions & Callbacks
  # --------------------------------------------------------------------------
  - title: "Arrow Functions & Callbacks"
    http_client: true
    http_url: "http://localhost:3000/?message=Hello"
    instructions: |
      ## The Foundation of Async Programming

      > **Learning objective:** After this step you will be able to **write** arrow functions, **pass** functions as callbacks, and **use** `.filter()`.

      In C++, you've encountered function pointers. In Python, you've passed functions to `sorted(key=...)` or `map()`. JavaScript takes this further: **functions are just values**, exactly like numbers or strings.

      This is not merely a stylistic feature — it is the entire foundation of Node.js's asynchronous model. Understanding it now makes everything in the later steps obvious.

      ### Arrow Functions

      ```javascript
      // C++ equivalent: int add(int a, int b) { return a + b; }
      // Python equivalent: def add(a, b): return a + b

      // JavaScript (regular function):
      function add(a, b) { return a + b; }

      // JavaScript (arrow function — the modern preferred style):
      const add = (a, b) => a + b;

      // More examples:
      const greet  = (name) => `Hello, ${name}!`;
      const double = n => n * 2;   // Parentheses optional for a single parameter
      const hi     = () => "Hi!";  // Empty parentheses for no parameters
      ```

      ### Callbacks: Passing Functions as Arguments

      A **callback** is a function you pass as an argument to another function. The receiving function "calls it back" at the right time.

      ```javascript
      // Python equivalent: list(filter(lambda x: x > 2, [1, 2, 3, 4, 5]))
      const numbers = [1, 2, 3, 4, 5];

      const bigNums = numbers.filter(n => n > 2);        // [3, 4, 5]
      const evens   = numbers.filter(n => n % 2 === 0);  // [2, 4]
      ```

      `.filter()` takes a callback — an arrow function that returns `true` or `false` for each element. Only elements where the callback returns `true` are kept.

      ### Callbacks in Node.js: Express.js Handlers

      While Node.js has a built-in `http` module, almost everyone uses **Express.js** to build real apps. Express makes routing easy using callbacks:

      ```javascript
      const express = require('express');
      const app = express();

      // app.get(path, callback)
      // The arrow function IS the callback — called when / is hit.
      app.get('/', (req, res) => {
          res.send('Hello from Express!');
      });

      app.listen(3000);
      ```

      The mental model — *pass a function, get called back later* — is exactly the same as `addEventListener`, but for network events instead of mouse clicks.

      ### How to Complete This Step

      1. **Edit `functions.js`**: Complete the three `TODO` items in the editor.
      2. **Start the Server**: Click the **▶ Run** button. Check the terminal for the "Express server listening on port 3000" message.
      3. **Use the HTTP Client**:
         *   In the URL bar below, type a query parameter like `/?message=Hello`.
         *   Click the **Send** button.
      4. **Verify Your Results**:
         *   Look at the **Response** panel. It should display your message followed by the names of passing students.
         *   Try changing the message in the URL and clicking Send again — the response should update instantly!

    files:
      - path: "functions.js"
        content: |
          // Arrow Functions & Callbacks — complete the three TODOs below

          const students = [
              { name: "Alice", grade: 95 },
              { name: "Bob",   grade: 42 },
              { name: "Carol", grade: 78 },
              { name: "Dave",  grade: 55 },
              { name: "Eve",   grade: 88 },
          ];

          // TODO 1: Convert this to an arrow function assigned to a const
          function getLetterGrade(score) {
              if (score >= 90) return "A";
              if (score >= 80) return "B";
              if (score >= 70) return "C";
              if (score >= 60) return "D";
              return "F";
          }

          // TODO 2: Use .filter() with an arrow function to keep only passing students (grade >= 60)
          // Replace the line below — Bob (42) and Dave (55) should be excluded
          const passingStudents = students;

          console.log("=== Passing Students ===");
          passingStudents.forEach(s => console.log(`${s.name}: ${s.grade} (${getLetterGrade(s.grade)})`));

          // TODO 3: Create an Express server on port 3000
          // Use app.get("/", ...) to respond with: [req.query.message]: [passing names]
          // Example: GET /?message=Hi -> "Hi: Alice, Carol, Eve"
          const express = require('express');
          const app = express();
          app.get("/", (req, res) => {
              res.send("Implement me!");
          });
          app.listen(3000);
        language: "javascript"

    open_file: "functions.js"

    solution:
      files:
        - path: "functions.js"
          content: |
            // Arrow Functions & Callbacks — complete the three TODOs

            const students = [
                { name: "Alice", grade: 95 },
                { name: "Bob",   grade: 42 },
                { name: "Carol", grade: 78 },
                { name: "Dave",  grade: 55 },
                { name: "Eve",   grade: 88 },
            ];

            // TODO 1 DONE: Arrow function assigned to a const
            const getLetterGrade = (score) => {
                if (score >= 90) return "A";
                if (score >= 80) return "B";
                if (score >= 70) return "C";
                if (score >= 60) return "D";
                return "F";
            };

            // TODO 2 DONE: .filter() keeps only passing students (grade >= 60)
            const passingStudents = students.filter(student => student.grade >= 60);

            console.log("=== Passing Students ===");
            passingStudents.forEach(s => console.log(`${s.name}: ${s.grade} (${getLetterGrade(s.grade)})`));

            // TODO 3 DONE: Express server responds with query message and passing student names
            const express = require('express');
            const app = express();
            app.get("/", (req, res) => {
                const message = req.query.message || "Passed";
                const names = passingStudents.map(s => s.name).join(", ");
                res.send(`${message}: ${names}`);
            });
            app.listen(3000);
          language: "javascript"
      explanation: |
        **Arrow function:** `const getLetterGrade = (score) => { ... }` converts the `function` declaration to an arrow function assigned to a `const`. The test checks that the source no longer contains `function getLetterGrade` and does contain `=>`.

        **`.filter()`:** Receives an arrow function — Bob (42) and Dave (55) are excluded.

        **Express & Queries:** `req.query.message` accesses parameters from the URL (like `?message=Hi`). This allows your server to respond dynamically based on user input.

    tests:
      - description: "Converted getLetterGrade to an arrow function"
        command: "assert(!code.includes('function getLetterGrade'), 'Convert getLetterGrade to an arrow function assigned to const')"
      - description: "Used an arrow function (=> syntax)"
        command: "assert(code.includes('=>'), 'Use arrow function syntax (=>) in your solution')"
        hints:
          - text: "Arrow functions use the `=>` operator (sometimes called 'fat arrow'). Review the syntax examples in the instructions — how does `const add = (a, b) => a + b` differ from `function add(a, b) { return a + b; }`?"
            condition: "code_missing: =>"
      - description: "Used .filter() to select students"
        command: "assert(code.includes('.filter('), 'Use .filter() with an arrow function to select passing students')"
        hints:
          - text: "To select only certain elements from an array, you need a higher-order array method that takes a callback returning true/false. Which method from the instructions does this?"
            condition: "code_missing: .filter("
          - text: "Good — you're using `.filter()`. Now make sure your callback tests the right property. Each student object has a `grade` property — your condition should check whether it meets the passing threshold."
            condition: "code_contains: .filter("
      - description: "Output excludes Bob (grade 42) — he should fail the filter"
        command: "assert(!output.includes('Bob') && output.includes('Alice'), 'Bob (grade 42) should be filtered out — only students with grade >= 60 should appear')"
        hints:
          - text: "Bob (42) and Dave (55) should not appear in the output. Check your filter condition — are you comparing to the right threshold? Passing means grade >= 60."
            condition: "code_contains: .filter("
      - description: "Using Express.js (requires express and app.get)"
        command: "assert(code.includes('require(\\'express\\')') && code.includes('app.get'), 'Use require(\\'express\\') and app.get() to build the server')"
      - description: "Express listens on port 3000"
        command: "assert(code.includes('.listen(3000)') || code.includes('.listen(3000'), 'The server must listen on port 3000')"

    quiz:
      title: "Arrow Functions & Callbacks — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "What does it mean that functions are 'first-class values' in JavaScript?"
          options:
            - "Functions execute faster than other values at runtime"
            - "Functions can be stored in variables, passed as arguments to other functions, and returned from functions"
            - "Functions must always be declared before any other values in a file"
            - "Functions have a special protected memory region that prevents garbage collection"
          correct_index: 1
          explanation: "A first-class value is one that can be used anywhere any other value can: stored in a variable, passed as an argument, returned from a function, placed in an array. This is why `numbers.filter(n => n > 2)` works — you pass a function just like you'd pass a number. This is the key to callbacks and async programming."

        - question: "In Python, `sorted(items, key=lambda x: x['grade'])` sorts by grade. Which JavaScript expression is the direct equivalent?"
          options:
            - "`items.sort(key = x => x.grade)`"
            - "`items.sort((a, b) => a.grade - b.grade)`"
            - "`items.sort(function key(x) { return x.grade; })`"
            - "`items.sort(by='grade')`"
          correct_index: 1
          explanation: "JavaScript's `sort` takes a **comparator** function `(a, b) => ...` that returns negative (a before b), zero (equal), or positive (b before a). The Python `key=` and JS comparator are both callbacks — functions passed to another function. This is the Transfer Tutor connection between the two languages."

        - question: "Why is understanding callbacks essential *before* learning Node.js async programming?"
          options:
            - "Callbacks are only relevant for Node.js version 10 and earlier — newer versions don't use them"
            - "All of Node.js's async operations notify you they finished by calling a function you provided — without understanding callbacks, async code is incomprehensible"
            - "JavaScript cannot use any other pattern for async programming besides callbacks"
            - "Callbacks are required by the operating system's file system API directly"
          correct_index: 1
          explanation: "The entire Node.js async model is built on callbacks: 'start this operation, and when it finishes, call *this* function.' When you call `fs.readFile('data.txt', myCallback)`, you pass a function that Node.js will invoke once the file is ready. Callbacks are not just a style preference — they are how the Event Loop communicates results back to your code."

        - question: "What does `[1, 2, 3, 4, 5].filter(n => n > 3)` return?"
          options:
            - "`[1, 2, 3]`"
            - "`[4, 5]`"
            - "`[true, true, true, false, false]`"
            - "`3` (the count of elements that pass)"
          correct_index: 1
          explanation: "`.filter()` returns a **new array** containing only the elements where the callback returns `true`. Here, only `4` and `5` satisfy `n > 3`. The original array is unchanged. Note: `.filter()` always returns an array, never a count or boolean array."

        - question: |
            **Arrange** the lines to write a function that takes an array of numbers and returns only the ones divisible by 3, doubled.
          type: parsons
          lines:
            - "const doubleDivisibleBy3 = (nums) => {"
            - "    return nums"
            - "        .filter(n => n % 3 === 0)"
            - "        .map(n => n * 2);"
            - "};"
          distractors:
            - "        .reduce(n => n % 3 === 0)"
            - "        .filter(n => n / 3 === 0)"
          explanation: "First `.filter()` selects elements divisible by 3 (remainder `=== 0`), then `.map()` doubles each survivor. The distractor `.reduce()` is for accumulating a single value, not filtering. `n / 3 === 0` would check if the result of division is zero, which is wrong — `%` (modulo) gives the remainder."

