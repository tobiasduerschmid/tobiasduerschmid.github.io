  # STEP 5: Request Bodies & POST
  # --------------------------------------------------------------------------
  - title: "Request Bodies & POST"
    http_client: true
    http_url: "http://localhost:3000/"
    http_method: "POST"
    instructions: |
      ## Handling Data with POST & Request Bodies

      > **Learning objective:** After this step you will be able to **read** JSON data from an incoming `POST` request using `req.body`.

      In the previous step, you used **Query Parameters** (`?message=...`) which are part of the URL. This is fine for simple data, but for larger or more sensitive data (like sending a password or a complex object), we use **Request Bodies**.

      ### `GET` vs `POST`

      *   **GET**: Requests data from a server. Data is visible in the URL bar.
      *   **POST**: Sends data to a server. Data is hidden inside the request "body".

      ### Accessing the Body in Express

      In a real Express app, you would use `app.use(express.json())` to tell Express to parse incoming JSON. In this sandbox, it's done for you!

      ```javascript
      app.post('/', (req, res) => {
          // Data from the 'Request Body' panel is available in req.body
          const userMessage = req.body.message;
          res.send(`Received your background message: ${userMessage}`);
      });
      ```

      ### How to Complete This Step

      1. **Edit `functions.js`**:
         *   Change `app.get` to `app.post`.
         *   Instead of `req.query.message`, use `req.body.message`.
      2. **Start the Server**: Click **▶ Run**. Check the terminal for "listening...".
      3. **Use the HTTP Client**:
         *   Switch the dropdown from **GET** to **POST**.
         *   In the **Request Body** editor (below the URL), type your message as JSON: `{"message": "Super Secret Data"}`.
         *   Click **Send**.

    files:
      - path: "functions.js"
        content: |
          // Request Bodies & POST — modify the route to use req.body
          const express = require('express');
          const app = express();

          // TODO: Change this route to app.post and use req.body.message
          app.get("/", (req, res) => {
              res.send("Change me to use POST and req.body.message!");
          });

          app.listen(3000);
        language: "javascript"

    open_file: "functions.js"

    solution:
      files:
        - path: "functions.js"
          content: |
            // Request Bodies & POST
            const express = require('express');
            const app = express();

            // Correctly using POST and req.body
            app.post("/", (req, res) => {
                const msg = req.body.message || "No message";
                res.send(`Echo from Body: ${msg}`);
            });

            app.listen(3000);
          language: "javascript"
      explanation: |
        **POST method:** We changed `app.get` to `app.post`. This means the server now ignores GET requests to `/` and only responds to POST requests.

        **JSON Body:** In modern APIs, we send complex data as JSON in the request body. `req.body` allows you to access this data as a JavaScript object. This handles everything from simple messages to full user registration forms.

    tests:
      - description: "Using app.post for the route"
        command: "assert(code.includes('app.post'), 'Use app.post() to handle incoming POST requests')"
      - description: "Using req.body.message"
        command: "assert(code.includes('req.body.message'), 'Use req.body.message to access the JSON data sent in the request body')"
      - description: "Express listens on port 3000"
        command: "assert(code.includes('.listen(3000'), 'The server must listen on port 3000')"

  # --------------------------------------------------------------------------
  # STEP 5: Array Transformation & Destructuring
  # --------------------------------------------------------------------------
  - title: "Array Transformation & Destructuring"
    instructions: |
      ## Transforming Data with Array Methods

      > **Learning objective:** After this step you will be able to **use** `.map()` to transform arrays, `.reduce()` to accumulate values, and **destructure** objects and arrays.

      In Step 3 you learned `.filter()` — selecting elements. Now you will learn to **transform** them with `.map()` and **combine** them with `.reduce()`.

      ### `.map()` — Transform Every Element

      `.map()` creates a new array by applying a callback to each element:

      ```javascript
      // Python equivalent: list(map(lambda x: x * 2, [1, 2, 3]))
      const numbers = [1, 2, 3];
      const doubled = numbers.map(n => n * 2);     // [2, 4, 6]
      const labels  = numbers.map(n => `#${n}`);   // ["#1", "#2", "#3"]
      ```

      `.map()` always returns an array of the **same length**. `.filter()` can return fewer elements; `.map()` transforms every one.

      ### `.reduce()` — Accumulate a Single Value

      `.reduce()` combines all elements into one value:

      ```javascript
      const numbers = [1, 2, 3, 4, 5];
      const sum = numbers.reduce((accumulator, current) => accumulator + current, 0);
      // Step by step: 0+1=1, 1+2=3, 3+3=6, 6+4=10, 10+5=15 → result: 15
      ```

      The second argument (`0`) is the **initial value** of the accumulator. Always provide it — without it, `.reduce()` throws on empty arrays.

      ```javascript
      // Python equivalent: functools.reduce(lambda acc, n: acc + n, [1,2,3,4,5], 0)
      // Or simply: sum([1, 2, 3, 4, 5])
      ```

      ### Destructuring: Unpacking Values

      JavaScript has a compact syntax for extracting values from arrays and objects:

      **Array destructuring** — assign items by position:

      ```javascript
      const coords = [40.7, -74.0];
      const [lat, lng] = coords;    // lat = 40.7, lng = -74.0

      // Python equivalent: lat, lng = coords  (tuple unpacking — same idea)
      ```

      **Object destructuring** — extract properties by name:

      ```javascript
      const student = { name: "Alice", grade: 95 };
      const { name, grade } = student;   // name = "Alice", grade = 95

      // Works in function parameters — you will see this in every React component:
      function printStudent({ name, grade }) {
          console.log(`${name}: ${grade}`);
      }
      ```

      Destructuring is especially useful inside `.map()` callbacks:

      ```javascript
      const students = [{ name: "Alice", grade: 95 }, { name: "Bob", grade: 42 }];
      const names = students.map(({ name }) => name);  // ["Alice", "Bob"]
      ```

      ### Formatting Output: `.toFixed()` and `.padEnd()`

      Two small utilities you will need for formatting:

      ```javascript
      // .toFixed(n) — format a number to n decimal places (returns a string)
      const avg = 87.666;
      console.log(avg.toFixed(1));   // "87.7"

      // .padEnd(n) — pad a string with spaces to reach length n (left-aligns text)
      console.log("Alice".padEnd(7));   // "Alice  " (7 chars total)
      console.log("Bob".padEnd(7));     // "Bob    " (7 chars total)
      ```

      ### Predict Before You Code

      Predict: what does `[1, 2, 3].map(n => n * 10)` return? What about `[1, 2, 3].reduce((acc, n) => acc + n, 0)`? Write your predictions, then verify in the editor.

      ### Task: Build a Grade Report

      Open `transform.js`. The `getLetterGrade` arrow function from Step 3 is provided. Complete the three `TODO` items:

      1. **Use** `.map()` with **destructuring** `({ name, grade })` in the arrow function parameter to format each student as `"Name   | grade (Letter)"`. Use `getLetterGrade()` for the letter and `.padEnd(7)` to align names.
      2. **Use** `.reduce()` to compute the **sum** of all grades, then divide by the number of students to get the class average.
      3. **Print** the report and the class average formatted to 1 decimal place using `.toFixed(1)`.

      Click **▶ Run** to check your result.

    files:
      - path: "transform.js"
        content: |
          // Array Transformation — complete the three TODOs below

          const students = [
              { name: "Alice", grade: 95 },
              { name: "Bob",   grade: 42 },
              { name: "Carol", grade: 78 },
              { name: "Dave",  grade: 55 },
              { name: "Eve",   grade: 88 },
          ];

          // Provided: arrow function from Step 3 (already learned)
          const getLetterGrade = (score) => {
              if (score >= 90) return "A";
              if (score >= 80) return "B";
              if (score >= 70) return "C";
              if (score >= 60) return "D";
              return "F";
          };

          // TODO 1: Use .map() to format each student as "Name   | grade (Letter)".
          // Use destructuring ({ name, grade }) in the arrow function parameter.
          // Use getLetterGrade() for the letter and .padEnd(7) to align names.
          // Expected: "Alice   | 95 (A)"
          const report = students;

          // TODO 2: Use .reduce() to compute the sum of all grades.
          // Then divide by the number of students to get the class average.
          // Hint: students.reduce((acc, s) => acc + s.grade, 0)
          const classAverage = 0;

          // TODO 3: Print the report and the class average.
          // Format the average to 1 decimal place using .toFixed(1).
          console.log("=== Student Report ===");
          report.forEach(line => console.log(line));
          console.log(`Class average: ${classAverage}`);
        language: "javascript"

    open_file: "transform.js"

    solution:
      files:
        - path: "transform.js"
          content: |
            // Array Transformation — complete the three TODOs

            const students = [
                { name: "Alice", grade: 95 },
                { name: "Bob",   grade: 42 },
                { name: "Carol", grade: 78 },
                { name: "Dave",  grade: 55 },
                { name: "Eve",   grade: 88 },
            ];

            const getLetterGrade = (score) => {
                if (score >= 90) return "A";
                if (score >= 80) return "B";
                if (score >= 70) return "C";
                if (score >= 60) return "D";
                return "F";
            };

            // TODO 1 DONE: .map() with destructuring formats each student
            const report = students.map(({ name, grade }) =>
                `${name.padEnd(7)}| ${grade} (${getLetterGrade(grade)})`
            );

            // TODO 2 DONE: .reduce() computes class average
            const classAverage = students.reduce((acc, s) => acc + s.grade, 0) / students.length;

            // TODO 3 DONE: Print report and formatted average
            console.log("=== Student Report ===");
            report.forEach(line => console.log(line));
            console.log(`Class average: ${classAverage.toFixed(1)}`);
          language: "javascript"
      explanation: |
        **`.map()` with destructuring:** `({ name, grade })` in the arrow function parameter extracts the two properties from each student object — the destructuring shorthand covered in this step. `.padEnd(7)` left-aligns names to 7 characters for columnar output.

        **`getLetterGrade()` call:** The arrow function from Step 3 is provided and called inside the template literal. This reinforces that functions are values — here used as a helper inside `.map()`.

        **`.reduce()`:** `students.reduce((acc, s) => acc + s.grade, 0)` sums all grades. The `0` initial value is critical — without it, `.reduce()` throws on empty arrays. Dividing by `students.length` gives the average: (95+42+78+55+88)/5 = 71.6.

        **`.toFixed(1)`:** Formats the number `71.6` to one decimal place. `${classAverage.toFixed(1)}` is executable code inside a template expression — not a string — so `code.includes('.toFixed(')` correctly finds it.

    tests:
      - description: "Used .map() to transform the data"
        command: "assert(code.includes('.map('), 'Use .map() with an arrow function to format each student')"
        hints:
          - text: "`.filter()` selects elements (Step 3). To *transform* each element into a formatted string, you need a different array method. Which one creates a new array by applying a function to every element?"
            condition: "code_missing: .map("
          - text: "Good — you're using `.map()`. Remember to use destructuring `({ name, grade })` in the callback parameter to directly extract the properties."
            condition: "code_contains: .map("
      - description: "Used .reduce() to compute a value"
        command: "assert(code.includes('.reduce('), 'Use .reduce() to compute the sum of all grades')"
        hints:
          - text: "To combine all array elements into a single value (like a sum), you need the array method that 'accumulates' a result. It takes a callback with two parameters (accumulator, current) and an initial value."
            condition: "code_missing: .reduce("
          - text: "You have `.reduce()` — make sure you provide an initial value as the second argument (e.g., `0` for a sum). Without it, `.reduce()` can throw on empty arrays."
            condition: "code_contains: .reduce("
      - description: "Output includes formatted student lines"
        command: "assert(output.includes('Alice') && output.includes('95'), 'Your .map() should format each student with their name and grade')"
        hints:
          - text: "Your `.map()` callback should return a formatted string for each student. Use a template literal with `${name.padEnd(7)}` and include the grade. Check the expected output format in the instructions."
            condition: "code_contains: .map("
      - description: "Output includes correct class average (71.6)"
        command: "assert(output.includes('71.6'), 'The class average should be 71.6 — use .reduce() to sum grades, divide by student count, and format with .toFixed(1)')"
        hints:
          - text: "The average is sum divided by count. After `.reduce()` gives you the total, divide by `students.length`. The expected result is (95+42+78+55+88)/5. Does your math match?"
            condition: "code_contains: .reduce("
      - description: "Used .toFixed() for decimal formatting"
        command: "assert(code.includes('.toFixed('), 'Format the class average to 1 decimal place using .toFixed(1)')"
        hints:
          - text: "The average needs to display exactly one decimal place. JavaScript numbers have a method for this — check the 'Formatting Output' section. It takes the number of decimal places as an argument."
            condition: "code_missing: .toFixed("

    quiz:
      title: "Array Transformation & Destructuring — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "What does `const { name, grade } = student` do if `student = { name: 'Alice', grade: 95 }`?"
          options:
            - "Creates a new object with only the `name` and `grade` properties"
            - "Declares two new variables, `name = 'Alice'` and `grade = 95`, extracting them from the object"
            - "Modifies `student` so it only has `name` and `grade` properties"
            - "Throws an error — you cannot destructure an object into two variables at once"
          correct_index: 1
          explanation: "Object destructuring extracts named properties into local variables in one step. `const { name, grade } = student` is equivalent to writing `const name = student.name; const grade = student.grade;`. The original object is unchanged. This pattern is used in every React component that receives props."

        - question: "What does `[10, 20, 30].reduce((acc, n) => acc + n, 0)` evaluate to?"
          options:
            - "An array: `[10, 20, 30]`"
            - "The number `60`"
            - "The number `30` (only the last element)"
            - "An error — `.reduce()` requires at least 4 elements"
          correct_index: 1
          explanation: "`.reduce()` accumulates a single value. Starting with `acc = 0` (the second argument), it processes each element: `0 + 10 = 10`, `10 + 20 = 30`, `30 + 30 = 60`. The initial value `0` is critical — without it, `.reduce()` uses the first element as the initial accumulator and throws on empty arrays."

        - question: "What is the key difference between `.map()` and `.filter()`?"
          options:
            - "`.map()` transforms each element and returns a new array of the same length; `.filter()` selects elements and returns a shorter (or equal) array"
            - "`.map()` modifies the original array; `.filter()` creates a copy"
            - "`.map()` works with objects; `.filter()` only works with primitive values"
            - "There is no difference — they are aliases for the same operation"
          correct_index: 0
          explanation: "`.map()` applies a transformation to every element: `[1,2,3].map(n => n*2)` → `[2,4,6]` (same length). `.filter()` tests each element and keeps only those that pass: `[1,2,3].filter(n => n>1)` → `[2,3]` (shorter). Neither mutates the original array."

        - question: |
            **Arrange** the lines to compute the average grade from an array of student objects using destructuring, `.map()`, and `.reduce()`.
          type: parsons
          lines:
            - "const students = [{ name: 'A', grade: 80 }, { name: 'B', grade: 90 }];"
            - "const grades = students.map(({ grade }) => grade);"
            - "const sum = grades.reduce((acc, g) => acc + g, 0);"
            - "const avg = sum / grades.length;"
            - "console.log(avg.toFixed(1));"
          distractors:
            - "const grades = students.filter(({ grade }) => grade);"
            - "const sum = grades.reduce((acc, g) => acc + g);"
          explanation: "`.map()` with destructuring extracts just the grades. `.reduce()` sums them — the `0` initial value is critical (the distractor without it throws on empty arrays). `.filter()` selects elements, not transforms — wrong method for extracting grades."

        - question: "**[Spaced Practice: Revisit Step 3]** A student writes `numbers.filter(isEven)` where `isEven` is a function. Why does this work without calling `isEven()` with parentheses?"
          options:
            - "JavaScript automatically adds the parentheses at runtime"
            - "`isEven` without parentheses is a **reference to the function** — `.filter()` will call it for each element. Adding `()` would call it immediately and pass the *return value* instead"
            - "`.filter()` accepts both function references and function calls interchangeably"
            - "This is a bug — `isEven` without parentheses passes `undefined`"
          correct_index: 1
          explanation: "Functions are first-class values. `isEven` is the function itself; `isEven()` is the result of calling it. `.filter(isEven)` says 'here is a function — you call it.' `.filter(isEven())` says 'call isEven now and pass whatever it returns.' This distinction is fundamental to callbacks."

        - question: "**[Spaced Practice: Revisit Step 2]** A function receives a user ID from a form field. The code uses `if (userId == 42)` to check for the admin. The ID arrives as the string `'42'`. Will this check correctly identify the admin? Should you keep it as-is?"
          options:
            - "Yes, it works and is safe to keep — the comparison correctly identifies the admin"
            - "Yes, it works due to type coercion, but you should change it to `===` and explicitly convert the ID to a number — relying on coercion hides a fragile assumption"
            - "No, `==` will return `false` here because strings and numbers are never equal in JavaScript"
            - "No, the code will throw a TypeError at runtime"
          correct_index: 1
          explanation: "JavaScript's `==` coerces `'42'` to `42`, so the check works — but it is fragile. If the ID format changes (e.g., UUID strings), the coercion silently breaks. Using `===` with explicit conversion (`Number(userId) === 42`) makes the intent clear and safe."

  # --------------------------------------------------------------------------
  # STEP 6: The Blocked Chef — The Event Loop
  # --------------------------------------------------------------------------
  - title: "The Blocked Chef — The Event Loop"
    instructions: |
      ## The Most Important Concept in Node.js

      > **Learning objective:** After this step you will be able to **predict** the execution order of synchronous and asynchronous code and **explain** how the Event Loop, Call Stack, and Task Queue interact.

      This is the paradigm shift that trips up every C++ and Python developer. Read carefully — and expect to be surprised.

      > **Before you begin:** Rate your confidence: *"I understand how code execution order works"* — 1 (not sure) to 5 (very confident). Revisit this rating after completing the step.

      **JavaScript is single-threaded.** There is only one "chef" in the kitchen. This is how Discord handles millions of messages, how Spotify streams audio, and how Netflix serves content — all on a single thread per process.

      ### The Restaurant Metaphor

      | Kitchen Role | Node.js Equivalent | What It Does |
      |---|---|---|
      | **The Chef** | Call Stack | Executes one task at a time. If busy, everything else waits. |
      | **The Appliances** (oven, fryer) | libuv / OS | Handle slow work (file reads, network) in the background. Chef starts them and moves on. |
      | **The Waiter** | Task Queue | When an appliance finishes, the waiter puts the callback on a staging table to wait. |
      | **The Kitchen Manager** | Event Loop | Watches the Chef. Only when the Chef's hands are **completely empty** does the Manager hand over the next callback. |

      ```
      Key insight: setTimeout(fn, 0) does NOT mean "run immediately."
                   It means "run when the call stack is empty."
      ```

      ### Predict Before You Run

      Consider this code:

      ```javascript
      setTimeout(() => console.log("B"), 0);
      console.log("A");
      console.log("C");
      ```

      **Before looking at the output**, predict: what order do A, B, and C print?

      Most C++/Python developers predict A → B → C (top-to-bottom). The actual output is **A → C → B**.

      > **If your prediction was wrong, that is exactly the point.** The event loop violates the top-to-bottom intuition from every other language you know. Getting it wrong first makes the correct model stick — this is how experts learned it too.

      The synchronous code runs to completion before ANY callback fires — even with `0` ms delay. The Chef finishes all current tasks before the Manager hands over the next callback.

      ### Task: Experience the Blocked Chef

      Now open `event_loop.js`. It demonstrates this same principle with a long-running synchronous loop that "blocks the chef." The labels `[1]`, `[2]`, `[3]` show the actual execution order — not the source code order.

      1. Click **▶ Run** and observe: the `setTimeout` callback `[3]` fires LAST, even though it appears FIRST in the source code.
      2. **Your task**: At the END of the file, add a **second** `setTimeout` call with `0` ms delay that logs `"Event loop is free again!"`.

      Click **▶ Run** again. Observe the order: both `setTimeout` callbacks fire only after ALL synchronous code has finished.

    files:
      - path: "event_loop.js"
        content: |
          // The Blocked Chef Demo
          // PREDICT the output order BEFORE you run this file!
          //
          // Mental model check: does setTimeout(fn, 0) run "immediately"?

          // Schedule a callback — should run "right away" with 0ms delay, right?
          setTimeout(() => {
              console.log("[3] setTimeout fired — the chef is finally free!");
          }, 0);

          // Synchronous code: this runs first, blocking everything else
          console.log("[1] Starting synchronous work...");

          // Simulates a slow synchronous operation (like processing a large dataset)
          // The chef is stuck here — no callbacks can fire while this loop runs
          let total = 0;
          for (let i = 0; i < 5000000; i++) {
              total += i;
          }
          console.log(`[2] Synchronous work done. total = ${total}`);

          // TODO: Add a second setTimeout here that logs "Event loop is free again!"
          // with a 0ms delay.
          // Question to ponder: will it print before or after [3]?

        language: "javascript"

    open_file: "event_loop.js"

    solution:
      files:
        - path: "event_loop.js"
          content: |
            // The Blocked Chef Demo

            // Schedule a callback — should run "right away" with 0ms delay, right?
            setTimeout(() => {
                console.log("[3] setTimeout fired — the chef is finally free!");
            }, 0);

            // Synchronous code: this runs first, blocking everything else
            console.log("[1] Starting synchronous work...");

            // Simulates a slow synchronous operation
            let total = 0;
            for (let i = 0; i < 5000000; i++) {
                total += i;
            }
            console.log(`[2] Synchronous work done. total = ${total}`);

            // Second setTimeout added at the end
            setTimeout(() => {
                console.log("Event loop is free again!");
            }, 0);
          language: "javascript"
      explanation: |
        **Two `setTimeout` calls:** The test checks `(source.match(/setTimeout/g)||[]).length >= 2` — there must be at least two `setTimeout` calls in the file.

        **`"Event loop is free again!"`:** The test checks `output.includes('free again')`. Any second `setTimeout` with this message satisfies it.

        **Output order:** The test verifies `output.indexOf('[1]') < output.indexOf('[3]')` — synchronous log `[1]` must appear before the callback `[3]`. This demonstrates the core event loop principle: all synchronous code runs to completion before any callback fires, even with `0` ms delay.

        **The Event Loop model:** `setTimeout(fn, 0)` means "minimum 0ms delay" — the callback goes into the Task Queue. The Event Loop only dequeues it when the Call Stack is completely empty (after both `console.log` calls and the loop finish). The second `setTimeout` queues after the first and fires after `[3]`.

