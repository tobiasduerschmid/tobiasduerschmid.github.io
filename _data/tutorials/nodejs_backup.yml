          explanation: "An unhandled Promise rejection in an async function behaves like an uncaught exception. In modern Node.js (v15+), this crashes the process by default. Always wrap `await` calls in `try`/`catch` — just like you would use `try`/`catch` in C++ or `try`/`except` in Python for operations that can fail."

