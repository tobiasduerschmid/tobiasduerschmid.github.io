    quiz:
      title: "async/await — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "What does `await` actually do inside an `async` function?"
          options:
            - "It blocks the entire Node.js process until the Promise resolves, like a synchronous call in C++"
            - "It suspends only this async function and frees the call stack, letting the Event Loop process other work until the Promise resolves"
            - "It creates a new thread to wait for the Promise, similar to `std::thread` in C++"
            - "It converts the Promise into a synchronous value by canceling the async operation"
          correct_index: 1
          explanation: "`await` suspends the current async function — not the entire program. The call stack is freed, so the Event Loop can process other callbacks, timers, and requests. When the awaited Promise resolves, the function resumes where it left off. This is why async/await is non-blocking despite *looking* synchronous."

        - question: "Two independent API calls each take 100ms. Which approach is faster?\n```javascript\n// Option A\nconst a = await fetchA();\nconst b = await fetchB();\n\n// Option B\nconst [a, b] = await Promise.all([fetchA(), fetchB()]);\n```"
          options:
            - "Option A — sequential awaits are optimized by V8 to run in parallel"
            - "Both are the same — await does not affect execution time"
            - "Option B — `Promise.all` starts both operations concurrently, so total time is ~100ms instead of ~200ms"
            - "Option A — `Promise.all` adds overhead that makes it slower for only two Promises"
          correct_index: 2
          explanation: "Option A awaits fetchA first (100ms), then starts fetchB (another 100ms) — total ~200ms. Option B starts both immediately and waits for the slower one — total ~100ms. When operations are independent, always use `Promise.all()`. This is one of the most common async/await performance mistakes."

