        command: |
          var cards = frame.contentDocument.querySelectorAll('img');
          assert(cards.length >= 2,
            'Render both user cards, each with an avatar image. Found: ' + cards.length + ' image(s)');
      - description: "Avatar images are circular (border-radius applied)"
