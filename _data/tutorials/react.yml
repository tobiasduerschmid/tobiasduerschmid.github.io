  # STEP 7: Composition — Thinking in React
  # Pedagogy:
  #   Transfer Tutor     — C++ inheritance → React composition.
  #   Composition-over-Inheritance from OOP courses.
  #   "Thinking in React" decomposition methodology.
  #   Sub-Goal Labels    — worked example annotated.
