        content: |
          function Counter() {
            // BUG: Using a regular variable — React won't re-render when this changes
            let count = 0;

            function increment() {
              count = count + 1;   // BUG: Mutating a local variable has no effect on the UI
              console.log('count is now', count);  // This logs, but the display never updates!
            }

            return (
              <div className="p-8 text-center">
                <h2 className="text-5xl mb-6">{count}</h2>
                <div className="flex gap-3 justify-center">
                  <button className="px-6 py-2 text-lg rounded-lg bg-blue-600 text-white cursor-pointer" onClick={increment}>
                    +1
                  </button>
                  {/* Task: Add a −1 button and a Reset button */}
                </div>
              </div>
            );
          }

          const root = ReactDOM.createRoot(document.getElementById('root'));
          root.render(<Counter />);
        language: "javascript"

