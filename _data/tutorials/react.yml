          var combined = Array.from(src).map(function(s) { return s.textContent; }).join('\n');
          assert(combined.includes('Avatar') && combined.includes('StatBadge'),
            'Use both the Avatar and StatBadge components inside ProfileCard');

    quiz:
      title: "Composition — Knowledge Check"
      min_score: 0.75
      shuffle: true
      questions:
        - question: "React favors composition over inheritance. Which statement best explains why?"
          type: single
          options:
            - "JavaScript does not support class inheritance, so React has no choice"
            - "Deep class hierarchies in UI code are hard to reason about — composition using the `children` prop and smaller components gives more flexibility and avoids the 'fragile base class' problem"
            - "Inheritance is strictly slower than composition at runtime in JavaScript"
            - "Composition is only preferred for functional components; class components still use inheritance"
          correct_index: 1
          explanation: |
            Deep inheritance chains make it hard to understand or change one level without breaking another. React's component model encourages building a `Dialog` from a generic `Card`, passing specific content as `children` — rather than creating a `DialogCard extends Card` hierarchy. This is the same "prefer composition" principle from your OOP courses, applied to UI architecture.

        - question: "What does the `children` prop give you?"
          type: single
          options:
            - "A list of all child elements in the DOM tree below the component"
            - "The ability to nest arbitrary JSX between a component's opening and closing tags, letting it act as a generic container"
            - "A reference to the child component's internal state"
            - "An array of all React components currently mounted in the application"
          correct_index: 1
          explanation: |
            `children` is an implicit prop containing whatever JSX is placed between `<MyComponent>` and `</MyComponent>`. This is the foundation of composable container components — a `Card` can wrap a `Profile`, a `Form`, or any other content without knowing what it is. This is analogous to C++ templates or Python's `*args` — generic containers that work with any content.

        - question: "In 'Thinking in React', what is the correct order of steps when building a new component?"
          type: single
          options:
            - "Add state first, then add props, then figure out the component hierarchy"
            - "Break the UI into components → build a static version with props only → identify minimal state → add inverse data flow (callbacks)"
            - "Write all the state management first, then design the component tree around it"
            - "Start with the leaf components and work upward, adding state as needed"
          correct_index: 1
          explanation: |
            The official 'Thinking in React' methodology: (1) decompose the UI into a component hierarchy using the single-responsibility principle; (2) build a *static* version first — all props, no state, to establish data flow; (3) identify the *minimal* state needed (don't duplicate data that can be computed); (4) lift state to the smallest common ancestor and pass update callbacks down. Starting with state leads to over-engineering.

        - question: "You have a `<SearchBar>` inside `<ProductTable>`. The user types in `SearchBar` and the table should filter. Where should the `filterText` state live, and how does `SearchBar` update it?"
          type: single
          options:
            - "`filterText` lives in `SearchBar` — `ProductTable` reads it via a React ref"
            - "`filterText` lives in the common ancestor of both components — it's passed as a prop to `SearchBar`, which calls an `onFilterChange` callback prop to notify the parent"
            - "`filterText` is stored in the browser's `localStorage` so both components can access it independently"
            - "`filterText` lives in `ProductTable` — `SearchBar` directly imports and mutates `ProductTable`'s state"
          correct_index: 1
          explanation: |
            **Lifting state up**: state belongs in the *lowest common ancestor* of all components that need it. Here, both `SearchBar` (to show the current value) and `ProductTable` (to filter rows) need `filterText`, so it lives in their shared parent. `SearchBar` receives `filterText` as a prop and an `onFilterChange` function prop — it calls `onFilterChange(e.target.value)` on input change, and the parent updates state, triggering a re-render of both components.
