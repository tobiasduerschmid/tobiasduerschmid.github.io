title: "React Essentials: From Imperative to Declarative UI"
description: "A hands-on introduction to React for students who already know C++ and Python. Learn to think declaratively, build components, manage state, and compose real UIs — all live in your browser."

backend: react

require_tests: true

steps:

  # --------------------------------------------------------------------------
  # STEP 1: "Lay of the Land" — Hello, React!
  # Pedagogy: Lay of the Land — macro paradigm overview before syntax.
  #           Transfer Tutor — explicit imperative vs. declarative comparison.
  #           Guide-and-Release — short explanation, immediate hands-on task.
  # --------------------------------------------------------------------------
  - title: "Hello, React! — Declarative vs. Imperative"
    instructions: |
      ## The Paradigm Shift

      You know how to manipulate the DOM the **imperative** way — you tell the browser *how* to do it, step by step:

      ```javascript
      // Imperative: You write the HOW
      const h1 = document.getElementById('greeting');
      h1.textContent = 'Hello, CS 130!';
      h1.style.color = 'steelblue';
      ```

      React asks you to think **declaratively** — you describe *what* the UI should look like for a given moment, and React figures out the minimal DOM updates needed to get there:

      ```jsx
      // Declarative (React): You describe the WHAT
      function App() {
        return <h1 style={{color: 'steelblue'}}>Hello, CS 130!</h1>;
      }
      ```

      | | Imperative (Vanilla JS / C++) | Declarative (React) |
      |---|---|---|
      | **Mindset** | *How* to reach the state | *What* the state should look like |
      | **Analogy** | Turn-by-turn GPS directions | Dropping a pin on the destination |
      | **DOM updates** | You call `element.textContent = ...` | React diffs the Virtual DOM and patches only what changed |
      | **Bugs** | Easy to forget a step, leaving stale UI | React re-renders the whole component; inconsistent state is much harder |

      ### JSX: Describing UI in JavaScript

      The `<h1>...</h1>` syntax inside JavaScript is called **JSX**. It is *not* HTML — Babel compiles it to `React.createElement('h1', ...)` calls that build a lightweight JavaScript object tree (the Virtual DOM).

      Key rules to remember:
      1. **Component names start with a capital letter** — `<App />`, not `<app />`
      2. **One root element** — wrap siblings in `<div>` or the empty fragment `<>...</>`
      3. **`className` not `class`** — `class` is a reserved JS keyword
      4. **Embed JS with `{expression}`** — `<h1>{2 + 2}</h1>` renders `4`

      ### Task

      The preview shows a greeting component. Make three changes:

      1. Change `"World"` to your own name in the `name` variable
      2. Change the `color` from `'tomato'` to `'steelblue'`
      3. Add a `<p>` tag after the heading that displays the current year using `{new Date().getFullYear()}`

      The preview rebuilds automatically when you save (Ctrl+S). Use **↻ Refresh** if needed.

    files:
      - path: "App.jsx"
        content: |
          function App() {
            const name = "World";       // Task 1: Change this to your name
            const color = 'tomato';     // Task 2: Change the color

            return (
              <div style={{fontFamily: 'sans-serif', padding: '32px'}}>
                <h1 style={{color: color}}>
                  Hello, {name}!
                </h1>
                <p>Welcome to React.</p>
                {/* Task 3: Add a <p> showing the current year here */}
              </div>
            );
          }

          // Mount — you don't need to change this
          const root = ReactDOM.createRoot(document.getElementById('root'));
          root.render(<App />);
        language: "javascript"

    open_file: "App.jsx"

    tests:
      - description: "The heading no longer says 'World'"
        command: |
          var h1 = frame.contentDocument.querySelector('h1');
          assert(h1, 'No <h1> found in the preview');
          assert(h1.textContent.trim() !== 'Hello, World!',
            'Change the name variable from "World" to your own name');
      - description: "The heading color is not 'tomato'"
        command: |
          var h1 = frame.contentDocument.querySelector('h1');
          assert(h1, 'No <h1> found');
          assert(h1.style.color !== 'tomato',
            'Change the color variable to something other than "tomato"');
      - description: "A <p> element shows the current year"
        command: |
          var year = String(new Date().getFullYear());
          var paras = frame.contentDocument.querySelectorAll('p');
          assert(paras.length >= 2, 'Add a second <p> element showing the current year');
          var found = Array.from(paras).some(function(p) { return p.textContent.includes(year); });
          assert(found, 'One of the <p> elements should contain the current year: ' + year);

    quiz:
      title: "Hello, React! — Knowledge Check"
      min_score: 0.75
      shuffle: true
      questions:
        - question: "In vanilla JS you'd write `h1.textContent = newTitle` to update a heading. What is the declarative React equivalent?"
          type: single
          options:
            - "Call `React.update(h1, newTitle)` to tell React what changed"
            - "Update a state variable that holds the title — React re-renders the component and patches the DOM automatically"
            - "Use `document.querySelector` inside the component to directly update the DOM element"
            - "Manually traverse the Virtual DOM and apply diffs"
          correct_index: 1
          explanation: |
            React's mental model: you update **state**, not the DOM. When state changes, React calls your component function again, builds a new Virtual DOM tree, diffs it against the previous snapshot (O(n) diffing), and applies only the minimal set of real DOM changes. You describe *what*; React figures out *how*.

        - question: "A student writes `function card() { return <div>A card</div>; }` and uses `<card />`. It renders an empty box. Why?"
          type: single
          options:
            - "Components must be class-based — function components are not supported"
            - "React distinguishes HTML elements (lowercase) from React components (uppercase) — `<card />` is treated as an unknown HTML element, not the function"
            - "The function is missing a `return` keyword"
            - "JSX only supports standard HTML tag names"
          correct_index: 1
          explanation: |
            React uses the capitalization of a JSX tag to decide: lowercase → HTML element (passes to the browser's DOM), uppercase → React component (calls your function). `<card />` silently becomes an unknown HTML element. The fix: rename to `Card` and use `<Card />`.

        - question: "What does Babel compile `<h1 className='title'>Hello</h1>` into?"
          type: single
          options:
            - "A raw HTML string injected via `innerHTML`"
            - "`React.createElement('h1', { className: 'title' }, 'Hello')` — a plain JS object describing the UI node"
            - "A direct `document.createElement('h1')` call that creates a real DOM node immediately"
            - "A WebAssembly instruction that the browser renders natively"
          correct_index: 1
          explanation: |
            JSX is syntactic sugar. Babel transforms it to `React.createElement(type, props, ...children)` calls, which return plain JavaScript objects — the **Virtual DOM**. No real DOM nodes are created at this stage. React's reconciler does that later, and only for the parts that actually changed.

        - question: "Which of these are **correct** JSX? (Select all that apply)"
          type: multiple
          options:
            - "`<img src={url} alt='logo' />`"
            - "`<div class='container'>...</div>`"
            - "`<p>{user.name.toUpperCase()}</p>`"
            - "`<button onclick={handleClick}>Click</button>`"
          correct_indices:
            - 0
            - 2
          explanation: |
            `<img ... />` is correct — self-closing tags are required in JSX. `<p>{expression}</p>` is correct — any JS expression works inside `{}`. `class` is a JS reserved word; use `className`. Browser event handlers use camelCase in JSX: `onClick`, not `onclick`.

  # --------------------------------------------------------------------------
  # STEP 2: Components & JSX — Functions that Return UI
  # Pedagogy: Fixer-Upper — broken JSX syntax to repair.
  #           Transfer Tutor — map Python functions / C++ functions to components.
  #           PRIMM — Predict, then fix, then extend.
  # --------------------------------------------------------------------------
  - title: "Components & JSX — Fixer-Upper"
    instructions: |
      ## Components Are Just Functions

      In C++ and Python you build programs by composing functions. React works the same way, but functions return **JSX** (UI) instead of numbers or strings.

      ```jsx
      // Python function:           React component:
      def greet(name):              function Greet({ name }) {
          return f"Hello, {name}"     return <p>Hello, {name}!</p>;
                                    }
      ```

      Components let you **split a complex UI into small, reusable pieces** — exactly like how you extract a C++ helper function to avoid repeating code.

      ### Fixer-Upper: Four Classic JSX Bugs

      The file below has **four bugs** that prevent it from rendering correctly.

      **Common JSX gotchas for C++/Python developers:**

      | Bug | Wrong | Correct |
      |---|---|---|
      | HTML attribute for CSS class | `class="..."` | `className="..."` |
      | Self-closing tags | `<img src={u}>` | `<img src={u} />` |
      | Inline style is an **object** | `style="color:red"` | `style={{color: 'red'}}` |
      | Multiple root elements | `return <h1/><p/>` | `return <><h1/><p/></>` |

      ### Task

      1. Find and fix all **four JSX bugs** in `App.jsx`
      2. Once it renders, add a third `<Badge>` below the existing two, with a label of your choice and a different color

      The `Badge` component is already defined — you just need to use it.

    files:
      - path: "App.jsx"
        content: |
          // A reusable Badge component
          // Props: label (string), color (string — any CSS color)
          function Badge({ label, color }) {
            return (
              <span style="background: color; color: #222; padding: 6px 14px; borderRadius: 20px; fontWeight: 600;">
                {label}
              </span>
            );
          }

          function App() {
            return (
              // BUG: Multiple root elements without a wrapper
              <h1 class="app-title">My Badges</h1>
              <div style={{display: 'flex', gap: 12, marginTop: 16}}>
                <Badge label="React" color="#61dafb" />
                <Badge label="JavaScript" color="#f7df1e" />
                {/* Task: Add a third <Badge> here */}
              </div>
            );
          }

          const root = ReactDOM.createRoot(document.getElementById('root'));
          root.render(<App />);
        language: "javascript"

    preview_styles: |
      body { padding: 24px; }
      .app-title { font-family: sans-serif; color: #333; margin-bottom: 16px; }

    open_file: "App.jsx"

    tests:
      - description: "No JSX syntax errors — preview renders an <h1>"
        command: |
          var h1 = frame.contentDocument.querySelector('h1');
          assert(h1, 'Fix all JSX bugs so the component renders. No <h1> found yet.');
      - description: "Uses className instead of class"
        command: |
          var src = frame.contentDocument.querySelector('script[type="text/babel"]');
          var text = frame.contentDocument.body.innerHTML;
          assert(!frame.contentDocument.querySelector('[class]') ||
                  frame.contentDocument.querySelector('h1.app-title'),
            'Make sure you use className="app-title" (not class=)');
      - description: "Three or more Badge spans are rendered"
        command: |
          var spans = frame.contentDocument.querySelectorAll('span');
          assert(spans.length >= 3,
            'Add a third <Badge> component. Currently found: ' + spans.length + ' span(s)');
      - description: "Badge spans have a background color applied (style is an object, not a string)"
        command: |
          var spans = Array.from(frame.contentDocument.querySelectorAll('span'));
          var styled = spans.filter(function(s) { return s.style.background || s.style.backgroundColor; });
          assert(styled.length >= 2,
            'Fix the Badge style — use style={{background: color, ...}} (a JS object), not style="..." (a CSS string). Found ' + styled.length + ' styled span(s).');

    quiz:
      title: "Components & JSX — Knowledge Check"
      min_score: 0.75
      shuffle: true
      questions:
        - question: "Why does React use `className` instead of `class` for CSS classes?"
          type: single
          options:
            - "React invented its own HTML attribute names to distinguish itself from plain HTML"
            - "`class` is a reserved keyword in JavaScript, so JSX (which is valid JS) uses `className` to avoid a syntax conflict"
            - "React's virtual DOM uses a different internal representation where `class` has a different meaning"
            - "`className` is faster for the browser to process than `class`"
          correct_index: 1
          explanation: |
            JSX is JavaScript, and `class` is a reserved keyword in JavaScript (used for ES6 classes). Using `class` inside JSX would cause a syntax error. `className` maps directly to the DOM property `element.className`, so it works identically at runtime.

        - question: "Why must JSX components return a **single** root element?"
          type: single
          options:
            - "React can only diff trees that have one root; multiple roots would break the reconciliation algorithm"
            - "This is a browser limitation — the DOM only allows one child per script"
            - "React.createElement returns a single object, so a function returning multiple top-level JSX elements would be returning multiple objects, which isn't valid in JS without an array"
            - "It's a style convention, not a technical requirement — React ignores extra roots"
          correct_index: 2
          explanation: |
            JSX compiles to `React.createElement(...)`, which returns a single JS object. A function can't `return <A/><B/>` any more than it can `return 1 2` — only one expression is valid. Wrap siblings in a `<div>` or the zero-overhead **fragment** `<>...</>` (compiles to `React.Fragment`).

        - question: "How do you write an inline style with `font-size: 18px` and `color: red` in JSX?"
          type: single
          options:
            - '`style="font-size: 18px; color: red"`'
            - '`style={{ fontSize: "18px", color: "red" }}`'
            - '`style={{ "font-size": 18px, color: red }}`'
            - '`style={fontSize: "18px", color: "red"}`'
          correct_index: 1
          explanation: |
            The JSX `style` prop takes a **JavaScript object**, not a CSS string. CSS property names become camelCase (`fontSize`, not `font-size`). Values are strings (or numbers for unitless properties). The double braces `{{ }}` are: the outer `{}` for a JSX expression, the inner `{}` for the object literal.

        - question: "A `Badge` component is defined in the same file as `App`. Which of the following correctly uses it?"
          type: single
          options:
            - "`badge({ label: 'React', color: '#61dafb' })`"
            - '`<badge label="React" color="#61dafb" />`'
            - '`<Badge label="React" color="#61dafb" />`'
            - '`React.render(Badge, { label: "React" })`'
          correct_index: 2
          explanation: |
            React components must be used as JSX with a **capitalized** tag: `<Badge />`. Lowercase `<badge />` would be treated as an unknown HTML element by React. Calling it as a function `badge(...)` would work but bypasses React's rendering lifecycle (hooks, reconciliation, etc.).

  # --------------------------------------------------------------------------
  # STEP 3: Props — Parameterizing Components
  # Pedagogy: Transfer Tutor — function arguments / C++ struct → props.
  #           PRIMM — Predict rendered output before seeing it.
  #           Guide-and-Release — scaffolded start, open extension task.
  # --------------------------------------------------------------------------
  - title: "Props — Parameterizing Components"
    instructions: |
      ## Props Are Function Arguments

      A component with no props is like a function with no parameters — useful, but limited. **Props** let you pass data *into* a component, exactly like calling a function with arguments.

      ```jsx
      // C++:    void printCard(string name, double price) { ... }
      // Python: def render_card(name, price): ...

      // React — defining the component:
      function ProductCard({ name, price }) {      // ← destructure props
        return (
          <div>
            <h3>{name}</h3>
            <p>${price.toFixed(2)}</p>
          </div>
        );
      }

      // React — using the component (like calling a function with named args):
      <ProductCard name="Laptop" price={999.99} />
      <ProductCard name="Mouse"  price={29.99}  />
      ```

      ### Key Props Rules

      - **Props flow one way** — from parent to child, never the other direction
      - **Props are read-only** inside the component (like `const` function parameters in C++)
      - **Any JS value** can be a prop: string, number, boolean, object, array, function, or another component

      ### Task

      The `ProductCard` component skeleton is provided. Complete it so that it:

      1. Displays the product `name` as an `<h3>`
      2. Displays the `price` formatted to two decimal places (use `price.toFixed(2)`)
      3. Displays the `description` in a `<p>` tag
      4. Shows a "Sale!" badge (e.g. a red `<span>`) if the `onSale` prop is `true`

      The `App` function already passes the right props — you only need to build the card.

    files:
      - path: "App.jsx"
        content: |
          function ProductCard({ name, price, description, onSale }) {
            // Task: Build the card UI using the four props above.
            // Requirements:
            //   1. <h3> showing name
            //   2. Price formatted to 2 decimal places
            //   3. <p> showing description
            //   4. A "Sale!" badge (shown only if onSale is true)
            return (
              <div style={{
                border: '1px solid #ddd', borderRadius: 8,
                padding: 20, maxWidth: 280,
                fontFamily: 'sans-serif', boxShadow: '0 2px 8px rgba(0,0,0,0.08)'
              }}>
                {/* Your code here */}
              </div>
            );
          }

          function App() {
            return (
              <div style={{padding: 32, display: 'flex', gap: 24, flexWrap: 'wrap'}}>
                <ProductCard
                  name="Mechanical Keyboard"
                  price={129.99}
                  description="Tactile switches, RGB backlit, compact 75% layout."
                  onSale={true}
                />
                <ProductCard
                  name="USB-C Hub"
                  price={49.99}
                  description="7-in-1 hub: 4K HDMI, 3× USB-A, SD card, 100W PD."
                  onSale={false}
                />
              </div>
            );
          }

          const root = ReactDOM.createRoot(document.getElementById('root'));
          root.render(<App />);
        language: "javascript"

    open_file: "App.jsx"

    tests:
      - description: "Component renders two product cards (two <h3> elements)"
        command: |
          var h3s = frame.contentDocument.querySelectorAll('h3');
          assert(h3s.length >= 2,
            'Render at least one <h3> per card. Found: ' + h3s.length);
      - description: "Product name appears in an <h3>"
        command: |
          var h3s = frame.contentDocument.querySelectorAll('h3');
          var names = Array.from(h3s).map(function(el) { return el.textContent; });
          assert(names.some(function(n) { return n.includes('Keyboard'); }),
            '<h3> should display the product name. Got: ' + JSON.stringify(names));
      - description: "Price is displayed and formatted to two decimal places"
        command: |
          var text = frame.contentDocument.body.textContent;
          assert(text.includes('129.99') || text.includes('$129.99'),
            'Display the price with .toFixed(2). Text found: ' + text.slice(0, 200));
      - description: "'Sale!' badge appears for the keyboard (onSale=true) but not for the hub"
        command: |
          var text = frame.contentDocument.body.textContent;
          assert(text.toLowerCase().includes('sale'),
            'Show a "Sale!" badge when onSale is true. Not found in: ' + text.slice(0,200));

    quiz:
      title: "Props — Knowledge Check"
      min_score: 0.75
      shuffle: true
      questions:
        - question: "Inside a component, you have `function Card({ title }) { title = 'New'; ... }`. What is wrong with this?"
          type: single
          options:
            - "Nothing — props can be freely reassigned inside the component"
            - "Props are read-only (like const function parameters) — mutating them breaks React's one-way data flow and causes unpredictable behaviour"
            - "You must use `this.title` to access props in function components"
            - "The destructuring syntax `{ title }` is invalid — you must write `props.title`"
          correct_index: 1
          explanation: |
            Props are **immutable** inside a component. Mutating them would corrupt the parent's data and break the predictable top-down data flow that React relies on. If a component needs to change a value, it should use `useState` (local state) or call a function passed as a prop from the parent.

        - question: "Which of these is the correct way to pass a **number** prop to a component?"
          type: single
          options:
            - '`<Card price="99.99" />`'
            - '`<Card price={99.99} />`'
            - '`<Card price=99.99 />`'
            - '`<Card price=(99.99) />`'
          correct_index: 1
          explanation: |
            String literals can be passed directly: `label="Hello"`. All other values — numbers, booleans, objects, arrays, functions — must be wrapped in `{}`: `price={99.99}`, `active={true}`, `items={[1, 2, 3]}`. Without `{}`, React would interpret `99.99` as a malformed attribute, not a number.

        - question: "A `<UserCard>` component needs access to a `user` object from a grandparent component, passing through an intermediate `<Profile>` component that doesn't use `user` at all. What does this antipattern describe?"
          type: single
          options:
            - "The God Object pattern — storing all data in one place"
            - "Prop drilling — threading props through multiple layers of components that don't need them"
            - "Composition — combining components to build a larger UI"
            - "Lifting state up — moving state to a common ancestor"
          correct_index: 1
          explanation: |
            **Prop drilling** occurs when you pass props through intermediate components that don't use them, just to reach a deeply nested component. Solutions include the **React Context API** (for global/widely-shared state) or state management libraries. As a rule of thumb, if you're drilling more than 2–3 levels, it's time to reconsider the architecture.

  # --------------------------------------------------------------------------
  # STEP 4: useState — State & Interactivity
  # Pedagogy: Fixer-Upper — a broken counter that uses a regular variable.
  #           Transfer Tutor — C++ member variable / Python instance var → useState.
  #           Targets the most common React beginner misconception.
  # --------------------------------------------------------------------------
  - title: "useState — Making Components Remember"
    instructions: |
      ## Why Regular Variables Don't Work

      In C++, a class stores data in member variables that persist across method calls. In React, calling your component function is like constructing a fresh object each time — local variables are **reset on every render**.

      ```jsx
      // BROKEN — count is reset to 0 every time the button is clicked
      function Counter() {
        let count = 0;                         // ← destroyed on each re-render
        return <button onClick={() => count++}>{count}</button>;
      }
      ```

      React provides **`useState`** to give your component persistent memory:

      ```jsx
      function Counter() {
        const [count, setCount] = React.useState(0);   // ← survives re-renders
        return (
          <button onClick={() => setCount(count + 1)}>
            Clicked {count} times
          </button>
        );
      }
      ```

      `React.useState(initialValue)` returns a **pair**: the current value, and a **setter function**. Calling the setter triggers a re-render with the new value — exactly like assigning to a member variable in C++, but with automatic UI updates.

      ### Rules of Hooks (important!)

      1. **Only call hooks at the top level** — never inside `if`, `for`, or nested functions
      2. **Only call hooks from React components** — not from regular JS functions

      ### Fixer-Upper: Fix the Broken Counter

      The counter below has **two bugs**:

      1. It uses a regular `let` variable instead of `useState`
      2. It tries to mutate the variable directly — React won't re-render

      **Task:**
      1. Fix the counter so it actually updates the display when clicked
      2. Add a **"Reset"** button that sets the count back to `0`
      3. Add a **"−1"** button that decrements the count (don't let it go below 0)

    files:
      - path: "App.jsx"
        content: |
          function Counter() {
            // BUG: Using a regular variable — React won't re-render when this changes
            let count = 0;

            function increment() {
              count = count + 1;   // BUG: Mutating a local variable has no effect on the UI
              console.log('count is now', count);  // This logs, but the display never updates!
            }

            return (
              <div style={{fontFamily: 'sans-serif', padding: 32, textAlign: 'center'}}>
                <h2 style={{fontSize: 48, margin: '0 0 24px'}}>{count}</h2>
                <div style={{display: 'flex', gap: 12, justifyContent: 'center'}}>
                  <button onClick={increment}
                    style={{padding: '10px 24px', fontSize: 18, borderRadius: 8,
                            border: 'none', background: '#0078d4', color: '#fff', cursor: 'pointer'}}>
                    +1
                  </button>
                  {/* Task: Add a −1 button and a Reset button */}
                </div>
              </div>
            );
          }

          const root = ReactDOM.createRoot(document.getElementById('root'));
          root.render(<Counter />);
        language: "javascript"

    open_file: "App.jsx"

    tests:
      - description: "Uses React.useState (not a bare let variable)"
        command: |
          var src = frame.contentDocument.querySelector('[type="text/babel"]');
          assert(src, 'No Babel script found');
          assert(src.textContent.includes('useState'),
            'Replace the let variable with React.useState()');
      - description: "The +1 button and a Reset button are both present"
        command: |
          var buttons = frame.contentDocument.querySelectorAll('button');
          assert(buttons.length >= 2,
            'Add at least two buttons (+1 and Reset). Found: ' + buttons.length);
      - description: "A button with 'Reset' text exists"
        command: |
          var buttons = Array.from(frame.contentDocument.querySelectorAll('button'));
          var hasReset = buttons.some(function(b) {
            return b.textContent.toLowerCase().includes('reset');
          });
          assert(hasReset, 'Add a Reset button that sets count back to 0');
      - description: "A decrement (−1) button exists"
        command: |
          var buttons = Array.from(frame.contentDocument.querySelectorAll('button'));
          assert(buttons.length >= 3,
            'Add a −1 button. Found only ' + buttons.length + ' button(s)');

    quiz:
      title: "useState — Knowledge Check"
      min_score: 0.75
      shuffle: true
      questions:
        - question: "Why doesn't `let count = 0; count++;` cause the UI to update in React?"
          type: single
          options:
            - "You must use `var` instead of `let` to make React track the variable"
            - "React's reconciler only re-renders when state changes — mutating a local variable does nothing to signal React; `useState`'s setter is the trigger"
            - "Arrow functions prevent React from seeing variable assignments"
            - "React automatically batches all updates, so `count++` is delayed by 500ms"
          correct_index: 1
          explanation: |
            React knows nothing about your local variables. The only way to trigger a re-render is to call a **state setter** from `useState`. React's model: setter called → new state value → component function re-executed with new value → DOM diffed and patched. A bare `count++` is invisible to React.

        - question: "What is wrong with this code? `if (isLoggedIn) { const [user, setUser] = React.useState(null); }`"
          type: single
          options:
            - "useState cannot store `null` as an initial value"
            - "Hooks must be called at the top level of a component — calling useState conditionally breaks React's internal order-tracking and causes crashes"
            - "You cannot use const with array destructuring in React"
            - "There is nothing wrong with this code"
          correct_index: 1
          explanation: |
            React identifies hooks by their **call order**, not by name. Every render must call hooks in exactly the same order. If you conditionally call `useState`, the order changes between renders, and React's internal array of hook values gets misaligned — causing subtle, hard-to-debug crashes. Always call hooks unconditionally at the top of your component.

        - question: "You have `const [items, setItems] = React.useState([])`. How do you correctly add an item?"
          type: single
          options:
            - "`items.push(newItem)` — then React detects the array was mutated"
            - "`setItems(items.push(newItem))` — push returns the new length, passing it to setItems"
            - "`setItems([...items, newItem])` — create a new array with the spread operator and pass it to the setter"
            - "`items[items.length] = newItem; setItems(items)` — modify in place then re-set"
          correct_index: 2
          explanation: |
            React uses **reference equality** to detect state changes — if you mutate an array in-place (`push`, `splice`) and pass the same reference to `setItems`, React sees no change and skips the re-render. Always create a **new array**: `[...items, newItem]` (append), `items.filter(...)` (remove), `items.map(...)` (transform).

        - question: "A component calls `setCount(count + 1)` three times in a row inside one event handler. How many re-renders happen?"
          type: single
          options:
            - "Three — one for each setter call"
            - "One — React batches all state updates within the same event handler into a single re-render"
            - "Zero — React ignores duplicate setter calls"
            - "It depends on whether Strict Mode is enabled"
          correct_index: 1
          explanation: |
            React **batches** state updates within browser event handlers (React 18 also batches them in async code). All three `setCount` calls are collected, then React performs a single re-render with the final state. This is a major performance optimization. To safely queue multiple increments, use the **functional update form**: `setCount(prev => prev + 1)`.

  # --------------------------------------------------------------------------
  # STEP 5: Lists & Keys — Rendering Collections
  # Pedagogy: Transfer Tutor — C++ for-loop → .map(), pointer analogy for keys.
  #           Desirable Difficulty — PRIMM: predict key-less list behaviour.
  #           Guide-and-Release — student adds filter logic independently.
  # --------------------------------------------------------------------------
  - title: "Lists & Keys — Rendering Collections"
    instructions: |
      ## From `for` Loops to `.map()`

      In C++ you'd render a list with a `for` loop. In React, you use JavaScript's **`.map()`** to transform a data array into an array of JSX elements:

      ```jsx
      // C++:
      for (const auto& task : tasks) { renderTask(task); }

      // React:
      const taskElements = tasks.map(task =>
        <li key={task.id}>{task.text}</li>
      );
      return <ul>{taskElements}</ul>;
      ```

      ### The `key` Prop — React's Reconciliation Hint

      When React re-renders a list, it needs to know which items are **stable**, **added**, or **removed**. Without keys, it compares by position — which causes unnecessary re-renders and subtle UI bugs (like inputs losing focus).

      Think of `key` as a stable identifier, similar to a pointer address or a database primary key:

      | Scenario | Without `key` | With stable `key` |
      |---|---|---|
      | Insert item at start | React re-renders ALL items | React inserts only the new one |
      | Delete middle item | Items after the gap get wrong state | React removes only the deleted item |
      | Reorder items | State mismatches (e.g. checked checkboxes shift) | Each item keeps its own state |

      > **Never use array index as a key for dynamic lists.** If items are reordered or removed, the index changes — defeating the purpose. Use a stable, unique ID.

      ### Conditional Rendering

      React uses plain JavaScript conditions inside JSX:

      ```jsx
      // Short-circuit: only render the badge if there are new messages
      {newMessages > 0 && <span className="badge">{newMessages}</span>}

      // Ternary: show one of two alternatives
      {isComplete ? <span>✓ Done</span> : <span>Pending</span>}
      ```

      ### Task

      A task list is partially implemented. Your job:

      1. Replace the placeholder `<li>Task goes here</li>` with a `.map()` call over the `tasks` array
      2. Give each `<li>` a `key` prop using `task.id` (not the index!)
      3. Show a ✓ or ✗ icon based on `task.done` using a ternary or `&&`
      4. Add the filter buttons: "All", "Active", "Done" — clicking each filters the displayed tasks

    files:
      - path: "App.jsx"
        content: |
          const initialTasks = [
            { id: 1, text: 'Set up React development environment', done: true },
            { id: 2, text: 'Learn about components and JSX',       done: true },
            { id: 3, text: 'Understand props and data flow',       done: true },
            { id: 4, text: 'Master useState for interactivity',    done: false },
            { id: 5, text: 'Render lists with .map() and keys',    done: false },
            { id: 6, text: 'Build a real React app',               done: false },
          ];

          function TaskList() {
            const [filter, setFilter] = React.useState('all');  // 'all' | 'active' | 'done'

            // Task 4: Filter tasks based on the current filter state
            const visibleTasks = initialTasks; // Replace with filtered list

            return (
              <div style={{fontFamily: 'sans-serif', padding: 32, maxWidth: 520}}>
                <h2 style={{marginBottom: 16}}>React Learning Checklist</h2>

                {/* Task 4: Add filter buttons — "All", "Active", "Done" */}
                <div style={{display: 'flex', gap: 8, marginBottom: 16}}>
                  {/* Your filter buttons here */}
                </div>

                <ul style={{listStyle: 'none', padding: 0}}>
                  {/* Task 1–3: Replace this with a .map() call over visibleTasks */}
                  <li>Task goes here</li>
                </ul>

                <p style={{color: '#888', fontSize: 13, marginTop: 12}}>
                  {initialTasks.filter(t => t.done).length} / {initialTasks.length} complete
                </p>
              </div>
            );
          }

          const root = ReactDOM.createRoot(document.getElementById('root'));
          root.render(<TaskList />);
        language: "javascript"

    preview_styles: |
      body { background: #f8f9fa; }

    open_file: "App.jsx"

    tests:
      - description: "Uses .map() to render the tasks (not a hardcoded list)"
        command: |
          var src = frame.contentDocument.querySelector('[type="text/babel"]');
          assert(src && src.textContent.includes('.map('),
            'Use .map() to render the tasks array into JSX elements');
      - description: "All 6 tasks are rendered as <li> elements"
        command: |
          var lis = frame.contentDocument.querySelectorAll('li');
          assert(lis.length === 6,
            'Render all 6 tasks. Found ' + lis.length + ' <li> elements');
      - description: "Done/undone status is shown (✓ or ✗ or similar)"
        command: |
          var text = frame.contentDocument.body.textContent;
          var hasDoneIndicator = text.includes('✓') || text.includes('✗') ||
                                  text.includes('Done') || text.includes('done') ||
                                  text.includes('✅') || text.includes('❌') ||
                                  text.includes('complete');
          assert(hasDoneIndicator,
            'Show a done/undone indicator for each task (e.g. ✓ or ✗ using a ternary)');
      - description: "Filter buttons (All, Active, Done) are present"
        command: |
          var buttons = Array.from(frame.contentDocument.querySelectorAll('button'));
          var labels = buttons.map(function(b) { return b.textContent.toLowerCase(); });
          assert(labels.some(function(l) { return l.includes('all'); }),
            'Add an "All" filter button');
          assert(labels.some(function(l) { return l.includes('active') || l.includes('pending'); }),
            'Add an "Active" filter button');
          assert(labels.some(function(l) { return l.includes('done') || l.includes('complet'); }),
            'Add a "Done" filter button');

    quiz:
      title: "Lists & Keys — Knowledge Check"
      min_score: 0.75
      shuffle: true
      questions:
        - question: "Why is it dangerous to use the array index as a `key` for a dynamic list?"
          type: single
          options:
            - "Array indices are numbers, and React requires string keys"
            - "If items are reordered, inserted, or removed, the index of items changes — React maps keys to component instances, so incorrect keys cause wrong state to be associated with the wrong component"
            - "Using indices is slower because React must convert them to strings internally"
            - "Array indices are not unique across sibling lists, causing conflicts"
          correct_index: 1
          explanation: |
            Keys tell React *which* element is which across re-renders. If item at index 2 is deleted, items at index 3, 4, 5... all shift to 2, 3, 4... React sees those keys as "the same" elements, potentially mismatching stateful inputs (like checked checkboxes or text fields) with the wrong items. Use a stable, unique ID from your data source.

        - question: "What does `{showBadge && <Badge />}` render when `showBadge` is `false`?"
          type: single
          options:
            - "The text `false`"
            - "An empty `<div>` placeholder to preserve layout space"
            - "Nothing — `false` is not rendered by React (it's not a valid React node)"
            - "A `Badge` component with `visible={false}` passed automatically"
          correct_index: 2
          explanation: |
            React ignores `false`, `null`, `undefined`, and `true` — they render as nothing. `{showBadge && <Badge />}` works because when `showBadge` is `false`, JS short-circuits to `false`, which React ignores. When `showBadge` is `true`, JS evaluates `<Badge />` and React renders it. **Watch out**: `{count && <Badge />}` — if `count` is `0`, React renders the number `0`, not nothing! Use `{count > 0 && <Badge />}` to be safe.

        - question: "You need to render a list of user cards. Which key strategy is correct?"
          type: single
          options:
            - "`users.map((user, index) => <Card key={index} user={user} />)`"
            - "`users.map(user => <Card key={user.id} user={user} />)`"
            - "`users.map(user => <Card key={Math.random()} user={user} />)`"
            - "`users.map(user => <Card key={user} user={user} />)`"
          correct_index: 1
          explanation: |
            Use `key={user.id}` — a stable, unique identifier from the data. Avoid: index (breaks with reordering/deletion), `Math.random()` (changes every render, forcing React to unmount and remount every item — destroying any internal state), and object references (React uses string comparison for keys).

        - question: "Which of the following correctly renders different UI depending on whether `user` is null?"
          type: multiple
          options:
            - "`{user ? <Profile user={user} /> : <LoginPrompt />}`"
            - "`{user && <Profile user={user} />}`  // Only renders Profile, shows nothing if null"
            - "`if (user) { return <Profile />; } return <LoginPrompt />;`  inside JSX"
            - "`{user !== null ? <Profile user={user} /> : <LoginPrompt />}`"
          correct_indices:
            - 0
            - 1
            - 3
          explanation: |
            Ternaries and `&&` work inside JSX expressions `{}`. `if` statements do **not** work inside JSX — only expressions are valid (no statements). However, `if/else` works perfectly **before** the `return` statement to choose which JSX to return. Options A and D are equivalent ternaries. Option B uses `&&` (only shows Profile when user exists, shows nothing if null/undefined).

  # --------------------------------------------------------------------------
  # STEP 6: Composition — Thinking in React
  # Pedagogy: Unguided task (anti-Tutorial Hell) — given a spec, build it.
  #           Composition-over-Inheritance from the PDF.
  #           "Thinking in React" decomposition methodology.
  #           Single-responsibility principle — one component, one job.
  # --------------------------------------------------------------------------
  - title: "Composition — Building a Real UI"
    instructions: |
      ## Thinking in React

      React's official methodology for approaching a new UI:

      1. **Break the UI into a component hierarchy** — each component does one job (single-responsibility principle from your OOP courses)
      2. **Build a static version first** — no state, just props
      3. **Identify where state lives** — the smallest ancestor that owns the data
      4. **Add inverse data flow** — children call functions passed as props to notify parents

      ### Composition over Inheritance

      In C++ and Java, you used **inheritance** (`class Dog : Animal`) to reuse code. React uses **composition** — you build complex UIs by combining small, generic components:

      ```jsx
      // Generic "shell" component — accepts anything as children
      function Card({ children, className }) {
        return <div className={'card ' + (className || '')}>{children}</div>;
      }

      // Specific use — compose with children prop
      function ProfileCard({ user }) {
        return (
          <Card className="profile">    {/* ← Card is a generic wrapper */}
            <Avatar src={user.avatar} />
            <h3>{user.name}</h3>
          </Card>
        );
      }
      ```

      The `children` prop is React's `children` mechanism — it lets any content be nested inside a component, making it a composable container.

      ### Unguided Task: Build a GitHub-style Profile Page

      You are given the component structure below. Your job is to **implement it** from the specification — no step-by-step instructions.

      **Specification:**
      - `Avatar`: Renders a circular image (use the provided `avatarUrl`) and the user's `username`
      - `StatBadge`: Shows a `label` and a `value` side by side (e.g. "Repos  42")
      - `ProfileCard`: Uses `Avatar` and three `StatBadge` components to build the full card
      - `App`: Renders two `ProfileCard` components with the provided user data

      The preview should look like a simple but complete user profile card. Add styling using inline styles or the provided `preview_styles`.

      > **Break the tutorial hell cycle**: The specification is intentionally open-ended. There is no "correct" visual design — only the functional requirements tested below matter. Design it yourself.

    files:
