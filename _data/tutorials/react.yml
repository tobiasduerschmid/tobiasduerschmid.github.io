    quiz:
      title: "Composition — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "React favors composition over inheritance. Which statement best explains why?"
          type: single
          options:
            - "JavaScript does not support class inheritance, so React has no choice"
            - "Deep class hierarchies in UI code are hard to reason about — composition using the `children` prop and smaller components gives more flexibility and avoids the 'fragile base class' problem"
            - "Inheritance is strictly slower than composition at runtime in JavaScript"
            - "Composition is only preferred for functional components; class components still use inheritance"
          correct_index: 1
          explanation: |
            Deep inheritance chains make it hard to understand or change one level without breaking another. React's component model encourages building a `Dialog` from a generic `Card`, passing specific content as `children` — rather than creating a `DialogCard extends Card` hierarchy.

        - question: "What does the `children` prop give you?"
          type: single
          options:
            - "A list of all child elements in the DOM tree below the component"
            - "The ability to nest arbitrary JSX between a component's opening and closing tags, letting it act as a generic container"
            - "A reference to the child component's internal state"
            - "An array of all React components currently mounted in the application"
          correct_index: 1
          explanation: |
            `children` is an implicit prop containing whatever JSX is placed between `<MyComponent>` and `</MyComponent>`. This is the foundation of composable container components.

        - question: |
            A `<SearchBar>` and `<ProductTable>` are siblings. The user types in SearchBar and the table should filter. Where should `filterText` state live?
          type: single
          options:
            - "`filterText` lives in `SearchBar` — `ProductTable` reads it via a React ref"
            - "`filterText` lives in the common ancestor — passed as a prop to both; `SearchBar` calls an `onFilterChange` callback prop"
            - "`filterText` is stored in `localStorage` so both components can access it"
            - "`filterText` lives in `ProductTable` — `SearchBar` directly mutates it"
          correct_index: 1
          explanation: |
            **Lifting state up**: state belongs in the *lowest common ancestor* of all components that need it. `SearchBar` receives `filterText` as a prop and calls `onFilterChange(e.target.value)` on input. The parent updates state, triggering a re-render of both.

        - question: |
            A `<UserCard>` needs a `user` prop from a grandparent, passing through `<Profile>` which doesn't use it. What is this antipattern called?
          type: single
          options:
            - "The God Object pattern"
            - "Prop drilling — threading props through intermediate components that don't need them"
            - "Composition — combining components to build a larger UI"
            - "Lifting state up"
          correct_index: 1
          explanation: |
            **Prop drilling** occurs when you pass props through layers of components that don't use them. Solutions: React Context API (for widely-shared state) or state management libraries. Rule of thumb: if drilling more than 2-3 levels, reconsider.

        - question: |
            *(Spaced review — Step 5: Lists & Keys)*

            What happens if you use `key={Math.random()}` for list items?
          type: single
          options:
            - "Nothing — React's reconciler handles random keys efficiently by sorting them internally before diffing"
            - "React unmounts and remounts EVERY item on EVERY re-render — destroying internal state and killing performance, because the keys change every time"
            - "React ignores random keys and falls back to index-based comparison, which is the default behavior anyway"
            - "React throws a console warning about unstable keys but still renders the list correctly using fallback logic"
          correct_index: 1
          explanation: |
            `Math.random()` produces a new key every render. React sees all-new keys and assumes every
            item was removed and re-added — unmounting old components (destroying state like form inputs)
            and mounting new ones. This is both a performance disaster and a correctness bug.

  # --------------------------------------------------------------------------
  # STEP 8: Integration Project — Build a Mini Store
  # Pedagogy:
  #   Full Integration    — combines ALL skills from Steps 1-7.
  #   Fading: None        — only requirements given, no scaffolding.
  #   Interleaving        — learner must choose which pattern to apply.
  #   Anti-Tutorial Hell  — no step-by-step guidance.
  #   Bloom's level       — Create (exercise) / Evaluate + Analyze (quiz).
  # --------------------------------------------------------------------------
  - title: "Integration Project: Build a Mini Store"
    instructions: |
      > **Learning objective:** After this step you will be able to **design and implement** a complete React application that integrates components, props, state, lists, conditional rendering, and composition.

      ## Putting It All Together

      You now have all the component skills. This integration project combines them into a realistic app — with **no scaffolding**. You decide how to structure the components and where state lives.

      ### Requirements

      Build a **mini product store** with the following features:

      1. **Product list**: Display all products from the provided data using `.map()` with proper `key` props
      2. **Product card component**: Each product shows its name, price (formatted), category, and an "Add to Cart" button. Show a "Sale!" badge if `onSale` is true
      3. **Shopping cart**: Display the number of items in the cart. Use `useState` to track cart items
      4. **Category filter**: Add buttons to filter products by category ("All", "Electronics", "Accessories"). Use `useState` for the active filter
      5. **Cart total**: Show the total price of items in the cart
      6. **Composition**: Use at least 3 separate components (e.g. `ProductCard`, `CartSummary`, `FilterBar`)

      ### Thinking in React — Apply the Methodology

      Before coding, plan your component hierarchy:
      1. What components do you need? (single-responsibility principle)
      2. Build a static version first (no state — just props)
      3. What is the minimal state? (filter string, cart items array)
      4. Where does each piece of state live? (lowest common ancestor)

      ### Hints (only if stuck)

      - Cart state: `const [cart, setCart] = React.useState([])`
      - Add to cart: `setCart([...cart, product])`
      - Total: `cart.reduce((sum, item) => sum + item.price, 0).toFixed(2)`
      - Filter: same pattern as Step 6

    files:
      - path: "App.jsx"
        content: |
          // Integration Project: Build a mini product store.
          // No scaffolding — apply everything you have learned.

          const products = [
            { id: 1, name: 'Wireless Mouse',       price: 29.99,  category: 'Electronics',  onSale: false },
            { id: 2, name: 'Mechanical Keyboard',   price: 89.99,  category: 'Electronics',  onSale: true  },
            { id: 3, name: 'USB-C Hub',             price: 45.99,  category: 'Electronics',  onSale: false },
            { id: 4, name: 'Laptop Stand',          price: 34.99,  category: 'Accessories',  onSale: true  },
            { id: 5, name: 'Desk Mat',              price: 19.99,  category: 'Accessories',  onSale: false },
            { id: 6, name: 'Cable Management Kit',  price: 14.99,  category: 'Accessories',  onSale: false },
          ];

          // Build your components and App here

          function App() {
            return (
              <div className="p-8">
                <h1 className="text-2xl font-bold mb-4">Mini Store</h1>
                {/* Your implementation */}
              </div>
            );
          }

          const root = ReactDOM.createRoot(document.getElementById('root'));
          root.render(<App />);
        language: "javascript"

    open_file: "App.jsx"

    tests:
      - description: "All 6 products are displayed"
        command: |
          var text = frame.contentDocument.body.textContent;
          assert(text.includes('Wireless Mouse') && text.includes('Cable Management Kit'),
            'Display all 6 products from the data array');
      - description: "Products are rendered using .map() with keys"
        command: |
          var src = frame.contentDocument.querySelector('[type="text/babel"]');
          assert(src && src.textContent.includes('.map('),
            'Use .map() to render the products');
          assert(src.textContent.includes('key=') || src.textContent.includes('key =' ),
            'Add key props to mapped elements');
      - description: "Prices are displayed"
        command: |
          var text = frame.contentDocument.body.textContent;
          assert(text.includes('29.99') || text.includes('$29.99'),
            'Display product prices');
      - description: "'Add to Cart' buttons exist"
        command: |
          var buttons = Array.from(frame.contentDocument.querySelectorAll('button'));
          var hasAdd = buttons.some(function(b) {
            return b.textContent.toLowerCase().includes('add') || b.textContent.toLowerCase().includes('cart');
          });
          assert(hasAdd, 'Add an "Add to Cart" button to each product card');
      - description: "Category filter buttons exist"
        command: |
          var buttons = Array.from(frame.contentDocument.querySelectorAll('button'));
          var labels = buttons.map(function(b) { return b.textContent.toLowerCase(); });
          assert(labels.some(function(l) { return l.includes('all'); }),
            'Add an "All" category filter button');
          assert(labels.some(function(l) { return l.includes('electronics'); }) ||
                 labels.some(function(l) { return l.includes('accessor'); }),
            'Add category filter buttons');
      - description: "Uses useState for cart or filter state"
        command: |
          var src = frame.contentDocument.querySelector('[type="text/babel"]');
          assert(src && src.textContent.includes('useState'),
            'Use React.useState for cart items and/or filter state');
      - description: "Uses at least 3 component functions"
        command: |
          var src = frame.contentDocument.querySelector('[type="text/babel"]');
          var matches = src.textContent.match(/function\s+[A-Z]\w*\s*\(/g) || [];
          assert(matches.length >= 3,
            'Define at least 3 components (e.g. ProductCard, CartSummary, FilterBar). Found: ' + matches.length);

    quiz:
      title: "Integration — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: |
            **Evaluate** this code for a mini store. What are the bugs?
            ```jsx
            function App() {
              let cart = [];
              const addToCart = (product) => { cart.push(product); };
              return (
                <div>
                  {products.map(p => <ProductCard product={p} onAdd={addToCart} />)}
                  <p>Cart: {cart.length} items</p>
                </div>
              );
            }
            ```
          type: single
          options:
            - "The code is correct — it will work as expected"
            - "Two bugs: (1) `cart` is a local variable, not state — pushing to it won't trigger re-renders. (2) `.map()` is missing `key` props"
            - "The only bug is that `push` is slow — should use `concat` instead"
            - "`addToCart` should be defined outside the component for performance"
          correct_index: 1
          explanation: |
            (1) `let cart = []` resets on every render and `.push()` mutates in-place without triggering a re-render. Fix: `const [cart, setCart] = React.useState([])` and `setCart([...cart, product])`.
            (2) Each mapped element needs a `key` prop: `<ProductCard key={p.id} .../>`.

        - question: |
            **Analyze** the component design of a store app. A student puts product rendering, cart management, filtering, and the total calculation ALL in the `App` component. What is wrong with this approach?
          type: single
          options:
            - "Nothing wrong — keeping everything in one component is simpler and avoids the overhead of passing props between components"
            - "It violates single-responsibility: each concern (product display, cart, filters) should be its own component. A monolithic component is hard to test, hard to reuse, and hard to modify without breaking other features"
            - "React enforces a 100-line limit per component — exceeding this causes a build-time warning in strict mode"
            - "It is slower because React's Virtual DOM diffing algorithm has O(n²) complexity for components over 500 lines"
          correct_index: 1
          explanation: |
            Single-responsibility applies to components just as it does to C++ classes. A `ProductCard`
            can be tested and reused independently. A `CartSummary` can be modified without touching
            product display logic. This is Step 1 of "Thinking in React": decompose the UI into a
            component hierarchy where each component does one job.

        - question: |
            In the mini store, both `ProductCard` (to show "In Cart" status) and `CartSummary` (to show the total) need access to the cart array. Where should cart state live?
          type: single
          options:
            - "In `ProductCard` — each card tracks whether it's in the cart"
            - "In `CartSummary` — the cart summary owns the cart data"
            - "In the nearest common ancestor of both (likely `App`) — passed down as props with an `addToCart` callback"
            - "In a global variable outside all components"
          correct_index: 2
          explanation: |
            **Lifting state up**: the cart state belongs in the lowest common ancestor of all components
            that need it. `App` owns `[cart, setCart]`, passes `cart` to `CartSummary` and an
            `onAdd` callback to `ProductCard`. This is the same "Thinking in React" pattern from Step 7.

        - question: |
            *(Spaced review — Step 6: Conditional Rendering)*

            A product card should show "In Cart" only when the product is already in the cart array. Which JSX pattern is correct?
          type: single
          options:
            - "`{cart.includes(product) ? <span>In Cart</span>}` — ternary with one branch, since we only need the truthy case"
            - "`{cart.some(item => item.id === product.id) && <span>In Cart</span>}` — `&&` short-circuit with stable ID comparison"
            - "`{if (cart.includes(product)) return <span>In Cart</span>}` — use an if-statement inside the JSX expression braces"
            - "`<span visible={cart.includes(product)}>In Cart</span>` — use the built-in `visible` prop to toggle display"
          correct_index: 1
          explanation: |
            `&&` short-circuit is the correct pattern for show/hide. Use `.some()` with `item.id === product.id`
            for identity comparison (reference equality on objects is unreliable after state updates create new arrays).
            Option A is invalid syntax — ternary requires both branches. Option C is invalid — `if` statements
            cannot appear inside JSX expression braces.
