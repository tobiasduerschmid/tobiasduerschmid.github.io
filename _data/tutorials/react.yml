  # STEP 4: useState — State & Interactivity
  # Pedagogy:
  #   Productive Failure  — students try to fix with existing knowledge first.
  #   Fixer-Upper         — broken counter using a regular variable.
  #   Transfer Tutor      — C++ member variable → useState.
  #   Sub-Goal Labels     — worked example annotated.
  #   Negative Transfer   — OOP instincts that hurt; stale closure warning.
  #   Spaced Review       — quiz reviews JSX (Step 2).
