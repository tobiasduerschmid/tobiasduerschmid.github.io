      - path: "listcomp.py"
        content: |
          def mean(numbers):
              """Already implemented — returns the arithmetic mean."""
              return sum(numbers) / len(numbers)

          def above_average(numbers):
              """Return a list of numbers strictly greater than the mean."""
              avg = mean(numbers)
              # TODO: use a list comprehension with a condition
              pass

          def squares_up_to(n):
              """Return [1**2, 2**2, ..., n**2] using range() and **."""
              # TODO: use range() starting at 1 and ** in a list comprehension
              pass

          # --- Quick self-test ---
          data = [4, 8, 15, 16, 23, 42]
          print(f"Data:          {data}")
          print(f"Above average: {above_average(data)}")
          print(f"Squares to 5:  {squares_up_to(5)}")
        language: "python"

    open_file: "listcomp.py"

    tests:
      - description: "above_average returns numbers > mean (not >=)"
        command: |
          g = {}
          exec(open('/tutorial/listcomp.py').read(), g)
          result = g['above_average']([4, 8, 15, 16, 23, 42])
          expected = [23, 42]
          assert result == expected, f"Expected {expected}, got {result}"
      - description: "above_average uses a list comprehension (not a manual loop)"
        command: |
          import ast
          src = open('/tutorial/listcomp.py').read()
          tree = ast.parse(src)
          for node in ast.walk(tree):
              if isinstance(node, ast.FunctionDef) and node.name == 'above_average':
                  has_comp = any(isinstance(n, ast.ListComp) for n in ast.walk(node))
                  assert has_comp, "above_average should use a list comprehension [x for x in ...]"
      - description: "squares_up_to(5) == [1, 4, 9, 16, 25]"
        command: |
          g = {}
          exec(open('/tutorial/listcomp.py').read(), g)
          result = g['squares_up_to'](5)
          assert result == [1, 4, 9, 16, 25], f"Expected [1, 4, 9, 16, 25], got {result}"
      - description: "squares_up_to uses range() and ** operator"
        command: |
          import ast
          src = open('/tutorial/listcomp.py').read()
          tree = ast.parse(src)
          for node in ast.walk(tree):
              if isinstance(node, ast.FunctionDef) and node.name == 'squares_up_to':
                  has_pow = any(isinstance(n, ast.BinOp) and isinstance(n.op, ast.Pow)
                                for n in ast.walk(node))
                  assert has_pow, "squares_up_to should use ** (exponentiation operator)"

    quiz:
      title: "List Comprehensions — Knowledge Check"
      min_score: 0.67
