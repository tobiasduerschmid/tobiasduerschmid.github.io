        - path: "functions.py"
          content: |
            def mean(numbers: list[float]) -> float:
                """Return the arithmetic mean of a list of numbers."""
                return sum(numbers) / len(numbers)

            def label_score(score: int, threshold: int = 50) -> str:
                """Return 'pass' if score >= threshold, else 'fail'."""
                if score >= threshold:
                    return 'pass'
                else:
                    return 'fail'
