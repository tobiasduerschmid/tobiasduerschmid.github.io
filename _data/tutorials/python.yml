title: "Python Essentials: Scripting & Automation"
description: "A hands-on introduction to Python for students who already know C++ and shell scripting. Build a solid Python mental model by mapping every concept to what you already know — and spotting where the analogies break."

backend: pyodide
linter: true  # live pyflakes diagnostics in the Monaco gutter

# Time-travel debugger opt-in (per-tutorial, default off). Enables click-to-set
# breakpoints in the gutter, conditional breakpoints, watch expressions,
# hover-to-inspect, full step controls, and back-in-time stepping. See plan
# at .claude/plans/what-would-be-options-temporal-ritchie.md.
debugger: true

require_tests: true
autosave_type: files

# Global setup: add /tutorial to sys.path so imports work across steps
setup_commands:
  - "import sys; sys.path.insert(0, '/tutorial')"

steps:

  # --------------------------------------------------------------------------
  # STEP 1 — "Lay of the Land": Hello, Python
  # Pedagogy:
  #   Lay of the Land   — macro overview before diving into syntax.
  #   Transfer Tutor    — explicit C++ / shell comparison table.
  #   Guide-and-Release — short explanation, immediate hands-on task.
  #   Growth Mindset    — normalize errors; frame them as information.
  #   Bloom's level     — Remember / Understand / Evaluate (quiz).
  # --------------------------------------------------------------------------
  - title: "Hello, Python!"
    instructions: |
      ## The Lay of the Land

      > **Learning objective:** After this step you will be able to **explain** how Python's execution model differs from C++ and **write** a basic Python script.

      You already write C++ and shell scripts. Here is how Python fits into your toolkit:

      | | C++ | Bash | Python |
      |---|---|---|---|
      | Typing | Static (`int x`) | Untyped strings | **Dynamic** (`x = 5`) |
      | Memory | Manual (`new`/`delete`) | N/A | Garbage-collected |
      | Run with | Compile → `./app` | `bash script.sh` | `python3 script.py` |
      | Strength | Speed, systems code | Glue commands together | **Rapid prototyping, data, automation** |

      Python is the language of choice when you need to **get something done fast** — process a CSV, call an API, write a test harness, or prototype an algorithm before porting it to C++.
      Very large systems or systems with high performance requirements are often better implemented in statically typed, compiled languages like C++ or Rust to detect bugs earlier and to improve performance.
      However, Python has significantly grown in popularity in recent years and is now one of the **top 5 most widely used programming languages** in the world. 
      In some surveys it even ranks number 1.
      So **learning Python is a great investment of your time!**

      ### A Note About Errors

      You will see many error messages in this tutorial. That is completely normal — every programmer, from beginner to expert, spends a large part of their time reading errors and debugging. Error messages are Python telling you **exactly what to fix**. Read them carefully; they are your most useful debugging tool. If you are not stuck at least some of the time, you are not learning.

      ### Your First Python Script

      Python's `print()` is the equivalent of C++'s `printf()` / `cout` and Bash's `echo`:

      ```python
      # Bash:   echo "Hello, World!"
      # C++:    printf("Hello, World!\n");
      # Python:
      print("Hello, World!")
      ```

      Notice there are no semicolons, no `#include`, and no `main()` function. Python scripts run top-to-bottom like shell scripts.

      ### Predict Before You Run

      Before changing anything, look at `hello.py` and predict: what will Python print when you click **Run**? Try it now and compare.

      ### Task

      Open `hello.py`. Change the message so it prints:
      ```
      Hello, CS 35L!
      ```

      Then click **▶ Run** (or press `Ctrl+Enter`) to execute your script and see the output.

    files:
      - path: "hello.py"
        content: |
          # Task: Change the message to "Hello, CS 35L!"
          print("Hello, World!")
        language: "python"

    open_file: "hello.py"

    solution:
      files:
        - path: "hello.py"
          content: |
            # Task: Change the message to "Hello, CS 35L!"
            print("Hello, CS 35L!")
          language: "python"
      explanation: |
        **Why this is correct:**

        - **`print("Hello, CS 35L!")`:** Python's `print()` is the direct equivalent of C++'s `printf()` / `cout` and Bash's `echo`. The test checks that the exact string `"Hello, CS 35L!"` appears in the output.
        - Python scripts run top-to-bottom with no `main()` function, no `#include`, and no semicolons — unlike C++. This is the same execution model as a Bash script.
        - The string is surrounded by double quotes; Python accepts both single and double quotes interchangeably.

    tests:
      - description: "Script runs without errors"
        command: |
          output = __run_capture('/tutorial/hello.py')
      - description: "Output contains 'Hello, CS 35L!'"
        command: |
          output = __run_capture('/tutorial/hello.py')
          assert 'Hello, CS 35L!' in output, \
              f"Expected 'Hello, CS 35L!' in output but got: {repr(output)}"
        hints:
          - text: "Python has a built-in function for displaying text to the screen. What function did the step instructions mention?"
            condition: "code_missing: print("
          - text: "You still have `print()` — good. The test checks for an exact string match. Look carefully at the expected output — does every character (capitalization, punctuation, spacing) match yours?"
            condition: "code_contains: print("

    quiz:
      title: "Hello, Python! — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            A C++ programmer sees this Python file and says: *"This must be wrong — there's no `main()` function and no semicolons."*
            What should you tell them?
          type: single
          options:
            - "Python requires a main() function but it is inferred automatically"
            - "Python scripts execute top-to-bottom without a main() entry point; semicolons are replaced by newlines and indentation"
            - "Python is actually compiled, it just hides the main() function internally"
            - "The programmer is correct — Python requires semicolons in production code"
          correct_index: 1
          option_feedback:
            0: "Scripting languages (Python, Ruby, Bash) execute the file top-to-bottom — there is no inferred entry point. The `if __name__ == '__main__'` idiom is a *convention* for when a file is also imported as a module, not a required entry point. The C/C++/Java requirement of a `main()` is a language-design choice, not a property of all languages."
            2: "CPython does compile each script to `.pyc` bytecode at runtime, but transparently — the programmer never invokes a compiler, no `main()` is generated, and there is no separate build artifact to ship. C++ requires an explicit, ahead-of-time compile step that produces a native binary; Python does not."
            3: "There is no production-vs-script Python. Python's grammar accepts an optional `;` to put two statements on one line, but it is never *required*. A teammate insisting otherwise is recalling a different language (likely C, Java, or JavaScript)."
          explanation: |
            Python is an interpreted scripting language. Like Bash, it executes statements from top to bottom.
            There is no required `main()` entry point (though you can simulate one with `if __name__ == '__main__': ...`).
            Semicolons are optional in Python and almost never used.

        - question: |
            Which of the following statements about Python are **correct**?
          type: multiple
          options:
            - "Python is **garbage-collected**, so you never call `delete` or `free()`"
            - "Python is **dynamically typed** — you do not declare variable types"
            - "Python must be **compiled** before running, just like C++"
            - "Python is strong at **rapid prototyping**, **automation**, and **data processing**"
          correct_indices: [0,1,3]
          option_feedback:
            2: "CPython does produce `.pyc` bytecode, but transparently and at runtime — the programmer never invokes a compiler and there is no separate build artifact to ship. C++ requires an explicit, ahead-of-time compile step that produces a native binary; Python does not."
          explanation: |
            Python is an **interpreted** language — you run it directly with `python3 script.py` with no separate compile step.
            Behind the scenes CPython does compile to bytecode (`.pyc`), but this is invisible to the programmer.

        - question: |
            In which scenario is Python a **better** choice than a shell script?
          type: single
          options:
            - "Renaming 10 files using a simple glob pattern"
            - "Starting and stopping system services"
            - "Parsing a 50-column CSV, computing statistics, and writing a report"
            - "Chaining three Unix commands with a pipe"
          correct_index: 2
          explanation: |
            Shell scripts excel at chaining Unix commands. Python excels at anything involving
            **data structures, algorithms, or complex logic** — like parsing structured data, calling APIs,
            or processing text with conditionals and loops. The CSV/statistics task is exactly
            where Python shines over Bash.

        - question: |
            A teammate is choosing between Python and C++ for a new project. The project needs to process 10 GB of sensor data as fast as possible in real time, with strict latency requirements. Another teammate suggests Python because "it's easier."

            **Evaluate** both suggestions. Which response best captures the trade-off?
          type: single
          options:
            - "Python is always slower than C++, so C++ is the only correct choice for any project with performance requirements"
            - "Python is fine for real-time processing — modern hardware makes the speed difference between Python and C++ negligible"
            - "C++ is better for the real-time core due to speed, but Python is ideal for prototyping and non-latency-critical parts like config and visualization"
            - "They should use Bash — piping data between Unix tools is faster than either Python or C++ for data processing"
          correct_index: 2
          option_feedback:
            0: "Real systems are layered: a slow glue layer driving a fast hot path is the standard pattern (NumPy in Python wraps C; PyTorch wraps CUDA). Choosing C++ for *every* line because the hot path needs it picks the wrong scope for the decision — most code in any project isn't latency-critical."
            1: "CPython is roughly 30–100× slower than C++ for tight numeric loops; that gap is *intrinsic* to the interpreter, not something hardware closes over time. Real-time latency budgets (sub-millisecond) cannot absorb a 30× constant factor regardless of how fast the CPU gets."
            3: "Pipes are great for line-oriented text streams, but a 10 GB sensor stream with strict latency needs zero-copy buffer management, fixed-rate scheduling, and concurrency primitives — none of which `cat | awk | grep` provides. Unix tools shine when the data is text and the timing is loose; that's the opposite of this scenario."
          explanation: |
            This is a real-world trade-off. Python's strength is rapid development; C++'s strength is
            raw performance. For strict latency requirements, C++ is likely needed for the hot path.
            But Python is excellent for prototyping, data exploration, and glue code around the
            performance-critical core. Many real systems combine both.

  # --------------------------------------------------------------------------
  # STEP 2 — Variables, Types & f-Strings
  # Pedagogy:
  #   Transfer Tutor    — C++ declaration syntax → Python implicit typing.
  #   Guide-and-Release — write a formatted output script using f-strings.
  #   Predict-before-running — prediction prompt before task.
  #   Negative Transfer  — strong typing misconception (dynamic ≠ weak).
  #   Bloom's level      — Remember / Understand / Analyze (quiz).
  # --------------------------------------------------------------------------
  - title: "Variables, Types & f-Strings"
    instructions: |
      > **Learning objective:** After this step you will be able to **use** Python's dynamic typing and f-strings, and **explain** the difference between dynamic and weak typing.

      ## Bridging Your C++ Mental Model

      ### No Type Declarations

      In C++ every variable must be declared with its type:
      ```cpp
      int   score   = 95;
      float gpa     = 3.8;
      std::string name = "Alice";
      ```

      In Python, you just *assign*. Python infers the type:
      ```python
      score = 95        # int
      gpa   = 3.8       # float
      name  = "Alice"   # str
      ```

      You can always check the type at runtime: `print(type(score))` → `<class 'int'>`.

      ### String Quotes: `"..."` and `'...'` Are Interchangeable

      In C++, single quotes and double quotes mean different things: `'A'` is a `char`, while `"Alice"` is a `const char*` (or `std::string`). Mixing them up is a compile error.

      In Python, **single and double quotes are completely interchangeable** for strings — there is no `char` type:
      ```python
      name = "Alice"    # str
      name = 'Alice'    # also str — identical result
      ```

      This is handy when your string itself contains quotes:
      ```python
      msg = "It's easy"          # double quotes avoid escaping the apostrophe
      html = '<div class="box">' # single quotes avoid escaping the double quotes
      ```

      In C++ you'd have to escape: `"It\'s easy"` or `"<div class=\"box\">"`. Python lets you pick whichever quote style avoids the clash.

      > **Convention:** Most Python style guides (including PEP 8) accept either, but recommend picking one and being consistent. You'll see both in the wild.

      ### ⚠️ Dynamic ≠ Weak: Python Still Has Type Rules

      Python is **dynamically** typed (you don't declare types) but **strongly** typed (it won't silently convert between incompatible types). This trips up C++ programmers who assume "no declarations" means "no type errors":

      ```python
      x = "5" + 3    # TypeError: can only concatenate str to str
      ```

      Unlike JavaScript (which would give `"53"`), Python refuses to guess. You must be explicit: `int("5") + 3` → `8` or `"5" + str(3)` → `"53"`.

      ### f-Strings — Like C++'s `printf` but Readable

      ```python
      # C++:    printf("Student: %s, GPA: %.1f\n", name, gpa);
      # Python: (note the f prefix and {variable} syntax — same idea as shell's $variable)
      print(f"Student: {name}, GPA: {gpa:.1f}")
      ```

      The `f"..."` string is called an **f-string** (formatted string literal). It is Python's idiomatic way to embed expressions inside strings.

      ### Predict Before You Code

      Before writing any code, predict: what will `type(3.14)` return in Python? What about `type("3.14")`? Write your predictions down, then verify with `print(type(...))` in the editor.

      ### Task

      Complete `profile.py` by replacing the `print(...)` placeholder with an f-string that produces:
      ```
      Student: Alice | Year: 2 | Major: Computer Science | GPA: 3.82
      ```
      Use `:.2f` inside the braces to format the GPA to two decimal places.

    files:
      - path: "profile.py"
        content: |
          name  = "Alice"
          year  = 2
          gpa   = 3.819
          major = "Computer Science"

          print(f'The type of 3.14 is {type(3.14)}')
          print(f'The type of "3.14" is {type("3.14")}')


          # TODO: print the line below using a single f-string:
          # Student: Alice | Year: 2 | Major: Computer Science | GPA: 3.82
          # Hint: format gpa with :.2f inside the braces
          print(...)
        language: "python"

    open_file: "profile.py"

    solution:
      files:
        - path: "profile.py"
          content: |
            name  = "Alice"
            year  = 2
            gpa   = 3.819
            major = "Computer Science"

            # Using a single f-string with :.2f to format GPA
            print(f"Student: {name} | Year: {year} | Major: {major} | GPA: {gpa:.2f}")
          language: "python"
      explanation: |
        **Why this is correct:**

        - **`f"..."` prefix:** Marks the string as an f-string so `{variable}` expressions are evaluated and interpolated. The `f` prefix is analogous to backtick template literals in JavaScript or C++'s `printf` format specifiers.
        - **`{gpa:.2f}`:** The `:.2f` format specifier inside the braces tells Python to format `gpa` as a float with exactly two decimal places. `3.819` rounds to `3.82` in the output, which is what the test checks. The variable still holds the original value `3.819` — the formatting happens only at display time.
        - **Variables, not literals:** The test uses AST inspection to ensure you used the variable names (`name`, `year`, `major`, `gpa`) inside the f-string rather than hard-coding the values as strings.
        - **Dynamic vs. weak typing:** Python infers `year` as `int` and `gpa` as `float` from the assigned values — no type declarations needed. But Python will refuse `"Year: " + year` (a `TypeError`) because it won't silently coerce `int` to `str`.

    tests:
      - description: "Script runs without errors"
        command: |
          output = __run_capture('/tutorial/profile.py')
      - description: "Output contains 'Student: Alice'"
        command: |
          output = __run_capture('/tutorial/profile.py')
          assert 'Student: Alice' in output, \
              f"Expected 'Student: Alice' in output, got: {repr(output)}"
        hints:
          - text: "The test expects your output to contain specific text. How can you build a string that includes variable values? Re-read the section on f-strings above."
            condition: "code_missing: f\""
          - text: "You're using an f-string — good! Now check that the text around your variables matches the expected format exactly. What should come before the name?"
            condition: "code_contains: f\""
      - description: "Output contains 'Year: 2' and 'Major: Computer Science'"
        command: |
          output = __run_capture('/tutorial/profile.py')
          assert 'Year: 2' in output and 'Major: Computer Science' in output, \
              f"Expected 'Year: 2' and 'Major: Computer Science' in output, got: {repr(output)}"
        hints:
          - text: "The test checks for two pieces of information in your output. Which variables hold the year and major? How do you embed them in an f-string?"
      - description: "GPA is formatted to 2 decimal places (3.82)"
        command: |
          output = __run_capture('/tutorial/profile.py')
          assert '3.82' in output, \
              f"Expected GPA '3.82' in output, got: {repr(output)}"
        hints:
          - text: "The test expects `3.82` but the variable holds `3.819`. F-strings have a way to control how many decimal places a number displays — check the step instructions for the formatting syntax."
            condition: "output_missing: 3.82"
          - text: "Your output contains `3.82` — the formatting looks right. Is the rest of the output line in the exact expected format?"
            condition: "output_contains: 3.82"
      - description: "f-string uses variables, not hard-coded literals"
        command: |
          source = open('/tutorial/profile.py').read()
          import ast
          tree = ast.parse(source)
          fstrings = [n for n in ast.walk(tree) if isinstance(n, ast.JoinedStr)]
          assert fstrings, "Use an f-string (f\"...\") — a plain string literal was found instead"

          # Collect all variable names referenced inside f-string braces
          used_vars = set()
          for fstr in fstrings:
              used_vars.update(n.id for n in ast.walk(fstr) if isinstance(n, ast.Name))

          # All four variables must appear in the f-string braces
          for var in ('name', 'year', 'major', 'gpa'):
              assert var in used_vars, \
                  f"f-string must reference the variable '{var}' inside braces"
        hints:
          - text: "This test checks *how* your code is written, not just the output. The task says to use variables inside the string rather than typing the values directly. What prefix turns a regular string into one that can embed variables?"
            condition: "code_missing: f\""
          - text: "You have an f-string — good! The test checks that all four variables appear inside `{}` braces. Are any of the values still typed out as literal text instead of referencing the variable?"
            condition: "code_contains: f\""

    quiz:
      title: "Variables & Types — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            What does `type(3.14)` return in Python?
          type: single
          options:
            - "`double`"
            - "`float`"
            - "`decimal`"
            - "`number`"
          correct_index: 1
          explanation: |
            Python uses `float` (not C++'s `double`) for floating-point numbers.
            You can always use `type(x)` to inspect a variable's type at runtime —
            a handy debugging tool that does not exist in C++ without runtime type info (RTTI).

        - question: |
            Which of the following correctly uses an f-string to print `"Price: €12.50"`?
          type: single
          options:
            - '`print("Price: €" + price)`'
            - '`print(f"Price: €{price:.2f}")`'
            - '`printf("Price: €%.2f", price)`'
            - '`print("Price: %s" % price)`'
          correct_index: 1
          explanation: |
            f-strings use the `f"..."` prefix and embed expressions with `{expr}`.
            Format specifiers like `:.2f` (two decimal places) go *inside* the braces.
            The `%` operator (option D) is the old Python 2 way; f-strings are the modern idiom.

        - question: |
            A student runs `x = "5" + 3` in Python and gets a `TypeError`. They say: *"But Python is dynamically typed — it should convert automatically!"*

            **Analyze** their misunderstanding. What is wrong with their reasoning?
          type: single
          options:
            - "They are correct — dynamically typed languages should convert between types automatically, so this is a Python bug"
            - "Dynamic typing means types are checked at runtime, not that types don't exist. Python is *strongly* typed and refuses to implicitly convert `str` + `int`"
            - "The error happens because `x` was already declared as a string elsewhere, and Python does not allow reassignment to a different type"
            - "Python only allows concatenation through the explicit `concat()` function, not the `+` operator which is reserved for numbers"
          correct_index: 1
          option_feedback:
            0: "*Dynamic* and *weak* are independent properties: dynamic describes WHEN types are checked (runtime); weak describes HOW aggressively the language coerces between them. JavaScript is dynamic + weak (`\"5\" + 3` gives `\"53\"`); Python is dynamic + strong on purpose — silent coercion is a famous bug source."
            2: "In Python, types live on *values*, not on names — `x = \"5\"` then `x = 3` is fine. The error here is purely about the `+` operator's two operands at the moment of evaluation. Languages where a variable's type is fixed at declaration (C/C++/Java) make this rule look stricter than it actually is."
          explanation: |
            This is a critical distinction: **dynamic** typing (types checked at runtime, not compile time) is
            different from **weak** typing (implicit type coercion). Python is dynamic *and* strong.
            JavaScript is dynamic *and* weak (`"5" + 3` → `"53"`). C++ is static *and* strong.
            Understanding this prevents a whole class of bugs.

        - question: |
            A student writes `x = 42` in Python. What is the type of `x`?
          type: single
          options:
            - "`integer`"
            - "`int`"
            - "`number`"
            - "`float`"
          correct_index: 1
          explanation: |
            Python infers the type from the assigned value. Integer literals like `42` become `int`.
            Unlike C++, there is no explicit type declaration — Python does this automatically.
            You can verify with `type(x)`, which returns `<class 'int'>`.

  # --------------------------------------------------------------------------
  # STEP 3 — The Indentation Trap
  # Pedagogy:
  #   Negative Transfer  — the single most common mistake from C++ students.
  #   Fixer Upper        — deliberately broken code to diagnose and repair.
  #   Generation Effect   — students must find the bugs themselves.
  #   Bloom's level       — Remember / Understand / Evaluate (quiz).
  # --------------------------------------------------------------------------
  - title: "The Indentation Trap"
    instructions: |
      > **Learning objective:** After this step you will be able to **identify** and **fix** indentation errors caused by negative transfer from C++, and **explain** why Python uses indentation instead of braces.

      ## ⚠️ The Indentation Trap (Negative Transfer from C++)

      In C++, indentation is cosmetic — the compiler ignores it, `{}` defines blocks.
      **In Python, indentation IS the syntax.** Wrong indentation = `IndentationError`.

      ```python
      # C++ programmer's instinct (WRONG in Python):
      if score >= 90:
      print("A")          # IndentationError: expected an indented block

      # Correct Python:
      if score >= 90:
          print("A")      # 4 spaces (or 1 tab — never mix them!)
      ```

      > **Rule**: Use 4 spaces per indent level. Never mix tabs and spaces.

      Every block-opening statement (`if`, `elif`, `else`, `for`, `while`, `def`, `class`, ...)
      ends with a `:` and the body must be indented one level further.

      ### Task: Fixer Upper

      The file `grades.py` below has **two bugs**:
      1. An indentation error inside the `if` block
      2. A type error in one of the print statements

      Fix both bugs so the script prints the correct letter grade for each score.

    files:
      - path: "grades.py"
        content: |
          # Fixer Upper: Find and fix the two bugs in this script.
          # Bug 1: Indentation error
          # Bug 2: Type error in a print statement

          scores = [95, 83, 71, 62, 55]

          for score in scores:
              if score >= 90:
              print(f"Score {score}: A")
              elif score >= 80:
                  print("Score " + score + ": B")
              elif score >= 60:
                  print(f"Score {score}: C")
              else:
                  print(f"Score {score}: F")
        language: "python"

    open_file: "grades.py"

    solution:
      files:
        - path: "grades.py"
          content: |
            # Fixer Upper: both bugs fixed
            scores = [95, 83, 71, 62, 55]

            for score in scores:
                if score >= 90:
                    print(f"Score {score}: A")    # Bug 1 fixed: indented 8 spaces
                elif score >= 80:
                    print(f"Score {score}: B")    # Bug 2 fixed: f-string instead of + concatenation
                elif score >= 60:
                    print(f"Score {score}: C")
                else:
                    print(f"Score {score}: F")
          language: "python"
      explanation: |
        **Why this is correct:**

        - **Bug 1 — indentation error:** The original `print(f"Score {score}: A")` was at the same indentation level as `if score >= 90:`, which is an `IndentationError`. The body of an `if` block must be indented one level further. Python uses indentation (4 spaces) instead of `{}` to define blocks — this is the most common negative-transfer mistake from C++.
        - **Bug 2 — type error:** The original `print("Score " + score + ": B")` fails with `TypeError: can only concatenate str (not "int") to str`. Unlike C++, Python will not silently convert `score` (an `int`) to a string when concatenating. The fix is to use an f-string: `f"Score {score}: B"`, which handles the conversion automatically.
        - The tests verify that scores 95, 83, and 71 produce the correct letter grades A, B, and C respectively.

    tests:
      - description: "Script runs without errors"
        command: |
          output = __run_capture('/tutorial/grades.py')
      - description: "Score 95 is graded 'A'"
        command: |
          output = __run_capture('/tutorial/grades.py')
          assert 'Score 95: A' in output, f"Expected 'Score 95: A', got: {repr(output)}"
        hints:
          - text: "Think about what range of scores earns an A. What Python construct lets you check multiple conditions in sequence?"
            condition: "code_missing: elif"
          - text: "You still have `elif` — good. Python evaluates conditions top-to-bottom and stops at the first match. Does the order of your conditions matter? What happens if you check `>= 70` before `>= 90`?"
            condition: "code_contains: elif"
      - description: "Score 83 is graded 'B'"
        command: |
          output = __run_capture('/tutorial/grades.py')
          assert 'Score 83: B' in output, f"Expected 'Score 83: B', got: {repr(output)}"
        hints:
          - text: "Which range does 83 fall into? Do you have a branch that catches that range?"
      - description: "Score 71 is graded 'C'"
        command: |
          output = __run_capture('/tutorial/grades.py')
          assert 'Score 71: C' in output, f"Expected 'Score 71: C', got: {repr(output)}"
        hints:
          - text: "Which range does 71 fall into? Count your `elif` branches — do you have enough to cover all the grade letters?"

    quiz:
      title: "The Indentation Trap — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            A student writes the following Python and gets `IndentationError: expected an indented block`:
            ```python
            for item in inventory:
            print(item)
            ```
            What is the fix?
          type: single
          options:
            - "Add a semicolon at the end of the `for` line"
            - "Add braces: `for item in inventory: { print(item) }`"
            - "Indent `print(item)` with 4 spaces so it is inside the `for` block"
            - "Use `for (item in inventory)` C-style syntax"
          correct_index: 2
          explanation: |
            Python uses **indentation** to define blocks, not braces. Any statement inside a `for`, `if`, or `def`
            must be indented by at least one consistent level (4 spaces is the convention).
            Forgetting this is the most common mistake for students coming from C++ or Java.

        - question: |
            In Python, what marks the start of a new indented block (instead of `{` in C++)?
          type: single
          options:
            - "An opening brace `{` — same as C++ and Java"
            - "The `begin` keyword — like Pascal or Ruby"
            - "A colon `:` at the end of the control statement"
            - "A semicolon `;` followed by increased indentation"
          correct_index: 2
          explanation: |
            Every block-opening statement (`if`, `for`, `while`, `def`, `class`, ...) ends with a colon `:`.
            The body of the block is then indented one level. There are no braces — the indentation alone
            defines where the block ends. This is unlike C++, Java, or JavaScript.

        - question: |
            A student accidentally mixes tabs and spaces for indentation in the same Python file.
            What will happen when they run it?
          type: single
          options:
            - "Python auto-converts tabs to spaces and runs fine"
            - "The code runs but indented blocks are silently skipped"
            - "Python raises a `TabError` or `IndentationError`"
            - "Only the lines with tabs produce output"
          correct_index: 2
          option_feedback:
            0: "Python 3's parser refuses to *guess* whether a tab counts as 1, 4, or 8 spaces, because every guess could change the program's meaning. Auto-conversion would silently re-bind code to a different block — the language designers chose loud failure over silent miscompilation. (Editor settings can enforce a convention, but the parser still won't second-guess what's on disk.)"
            1: "Python halts on any indentation inconsistency at parse time, before *any* code runs — there is no partial execution where some blocks are skipped. The runtime never sees a half-broken program; it sees the SyntaxError instead."
            3: "Python parses the whole file before running anything; there is no per-line execution where some lines succeed and others fail. The whole script either parses or doesn't."
          explanation: |
            Mixing tabs and spaces is a syntax error in Python 3. Python raises `TabError: inconsistent use
            of tabs and spaces in indentation`. Always use 4 spaces (the universal Python convention) and
            configure your editor to insert spaces when you press Tab.

        - question: |
            A teammate argues: *"Python's indentation-as-syntax is worse than C++'s braces because you can't see block boundaries as clearly."*

            Another teammate replies: *"It's better because it forces everyone to format consistently."*

            **Evaluate** both claims. Which assessment is most accurate?
          type: single
          options:
            - "The first teammate is right — braces are always superior because you can collapse blocks and see structure without relying on whitespace"
            - "The second teammate is right — indentation-as-syntax is strictly better because it eliminates an entire category of bugs with zero tradeoffs"
            - "Both have valid points: indentation eliminates formatting inconsistency and reduces visual clutter, but it can cause subtle bugs when copy-pasting code or mixing editors with different tab settings"
            - "Neither is right — the choice of block syntax has no practical effect on code quality"
          correct_index: 2
          explanation: |
            This is a genuine trade-off. Python's indentation rule eliminates entire classes of
            formatting debates and ensures code *looks* like what it *does*. But it introduces risks
            when copy-pasting from web pages (which may mix tabs/spaces) or when editors silently
            convert between them. The key practice: configure your editor to insert 4 spaces for Tab.

