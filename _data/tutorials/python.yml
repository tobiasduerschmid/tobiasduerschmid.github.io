  # Pedagogy:
  #   Transfer Tutor     — C++ file I/O → Python `open()` + `with`.
  #   Lay of the Land    — Python's "batteries included" stdlib.
  #   Sub-Goal Labels    — worked example annotated with sub-goals.
  #   Fading: Less       — skeleton provided, fewer inline hints.
