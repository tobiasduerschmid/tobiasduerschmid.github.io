         *Hint: `sum()` and `len()` are built-in Python functions.*
      2. `running_total(numbers)` — returns a new list where each element is the cumulative sum up to that index.
         *Example: `running_total([1, 2, 3])` → `[1, 3, 6]`. Use a `for` loop.*

    files:
      - path: "functions.py"
        content: |
          def mean(numbers):
              """Return the arithmetic mean of a list of numbers."""
              # TODO: implement using sum() and len()
              pass

          def running_total(numbers):
              """Return a list of cumulative sums.
              Example: running_total([1, 2, 3]) == [1, 3, 6]
              """
              result = []
              total = 0
              for n in numbers:
                  # TODO: add n to total, then append total to result
                  pass
              return result

          # --- Quick self-test ---
          data = [4, 8, 15, 16, 23, 42]
          print(f"Data:          {data}")
          print(f"Mean:          {mean(data)}")
          print(f"Running total: {running_total(data)}")
        language: "python"

    open_file: "functions.py"

    tests:
      - description: "mean([4, 8, 15, 16, 23, 42]) == 18.0"
        command: |
          g = {}
          exec(open('/tutorial/functions.py').read(), g)
          result = g['mean']([4, 8, 15, 16, 23, 42])
          assert result == 18.0, f"Expected 18.0, got {result}"
      - description: "mean of a single-element list equals that element"
        command: |
          g = {}
          exec(open('/tutorial/functions.py').read(), g)
          assert g['mean']([7]) == 7, "mean([7]) should be 7"
      - description: "running_total([1, 2, 3]) == [1, 3, 6]"
        command: |
          g = {}
          exec(open('/tutorial/functions.py').read(), g)
          result = g['running_total']([1, 2, 3])
          assert result == [1, 3, 6], f"Expected [1, 3, 6], got {result}"
      - description: "running_total([10, 20]) == [10, 30]"
        command: |
          g = {}
          exec(open('/tutorial/functions.py').read(), g)
          result = g['running_total']([10, 20])
          assert result == [10, 30], f"Expected [10, 30], got {result}"

    quiz:
      title: "Functions & Loops — Knowledge Check"
      min_score: 0.67
      shuffle: true
      questions:

        - question: |
            What is the output of the following code?
            ```python
            def describe(item, label="unknown"):
                return f"{item} is {label}"

            print(describe("gold", "rare"))
            print(describe("rock"))
            ```
          type: single
          options:
            - "`gold is rare` then `rock is unknown`"
            - "`gold is rare` then `rock is rare`"
            - "SyntaxError — default parameters must come before non-default"
            - "`gold is unknown` then `rock is unknown`"
          correct_index: 0
          explanation: |
            `label="unknown"` is a **default parameter**. When `describe("rock")` is called without
            a second argument, `label` falls back to `"unknown"`. When `describe("gold", "rare")` is called,
            `label` is set to `"rare"`.

        - question: |
            Which of the following iterates over a list and gives both the index and the item?
          type: single
          options:
            - "`for i, x in index(nums):`"
            - "`for i, x in enumerate(nums):`"
            - "`for i in nums.keys():`"
            - "`for i in range(nums):`"
          correct_index: 1
          explanation: |
            `enumerate(iterable)` yields `(index, value)` pairs. Unpacking them into `i, x` gives you both
            at once. This is the Pythonic replacement for C++'s index-based `for (int i = 0; i < nums.size(); i++)`.

        - question: |
            What does `list(range(2, 8, 2))` evaluate to?
          type: single
          options:
            - "`[2, 4, 6, 8]`"
            - "`[2, 4, 6]`"
            - "`[2, 3, 4, 5, 6, 7]`"
            - "`[2, 8]`"
          correct_index: 1
          explanation: |
            `range(start, stop, step)` generates numbers from `start` up to but not including `stop`,
            counting by `step`. So `range(2, 8, 2)` → 2, 4, 6 (8 is excluded because stop is exclusive).
            This matches C++'s `for (int i = 2; i < 8; i += 2)`.

  # --------------------------------------------------------------------------
  # STEP 5 — List Comprehensions
  # Pedagogy:
  #   Beacon            — list comprehension as a recognisable Python pattern.
  #   Guide-and-Release — complete functions using the comprehension pattern.
  # --------------------------------------------------------------------------
  - title: "List Comprehensions"
    instructions: |
      ## ✨ Python Beacon: List Comprehensions

      A **list comprehension** is a compact way to build a list. Once you recognise the
      pattern, you will see it everywhere in Python code:

      ```python
      # C++ equivalent:
      # std::vector<int> squares;
      # for (int i = 1; i <= 5; i++) squares.push_back(i * i);

      # Python: one line — combines range() and **
      squares = [x**2 for x in range(1, 6)]          # [1, 4, 9, 16, 25]
      ```

      The general form is:
      ```
      [expression  for variable in iterable]
      ```

      ### Filtering with a Condition

      Add an `if` at the end to keep only items that match:

      ```python
      evens = [x for x in range(10) if x % 2 == 0]   # [0, 2, 4, 6, 8]
      nums  = [4, 8, 15, 16, 23, 42]
      big   = [x for x in nums if x > 20]             # [23, 42]
      ```

      ### Compared to a for-loop

      ```python
      # For-loop version:
      result = []
      for x in range(10):
          if x % 2 == 0:
              result.append(x)

      # List comprehension — same result, one line:
      result = [x for x in range(10) if x % 2 == 0]
      ```

      List comprehensions are preferred when the transformation is simple — they are a
      recognised Python idiom that experienced readers understand at a glance.

      ### Task

      Complete two functions in `listcomp.py`. `mean()` is already implemented for you.

      1. `above_average(numbers)` — returns a list of numbers **strictly greater than** the mean.
         *Use a list comprehension with a condition.*
      2. `squares_up_to(n)` — returns `[1, 4, 9, ..., n**2]`.
         *Use `range()` starting at 1 and `**` for exponentiation in a list comprehension.*

