  # STEP 4 — Functions
  # Pedagogy:
  #   Transfer Tutor     — C++ function signatures → Python `def`.
  #   Guide-and-Release  — partially-written function to complete.
  #   Component Skills   — functions isolated from loops (split from old Step 4).
  #   Fading: Medium     — function signatures given, body needs implementing.
  #   Bloom's level      — Remember / Apply / Analyze (quiz).
