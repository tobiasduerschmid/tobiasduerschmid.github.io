  - title: "sys.argv & stderr"
    has_args: true
    has_stderr: true
    instructions: |
      > **Learning objective:** After this step you will be able to **implement** command-line argument handling with `sys.argv` and **use** `sys.stderr` for error messages.

      ## Command-Line Arguments with `sys.argv`

      ```python
      import sys

      # SUB-GOAL: Parse command-line arguments
      # sys.argv is a list: ["script.py", "arg1", "arg2", ...]
      # C++ equivalent:  argv[0], argv[1], ...

      # SUB-GOAL: Validate arguments
      if len(sys.argv) < 2:
          print("Usage: python3 script.py <filename>", file=sys.stderr)
          sys.exit(1)              # Exit with non-zero code — just like in C++

      # SUB-GOAL: Use the argument
      filename = sys.argv[1]
      ```

      `sys.argv[0]` is always the script name itself. Extra arguments start at index 1.
      `sys.exit(1)` terminates the process with exit code 1 — the same convention as C's `exit(1)`.

      ### Writing to `stderr` with `print()`

      By default `print()` writes to **stdout**. Error and diagnostic messages should go to **stderr**,
      matching C++'s `std::cerr` and Bash's `>&2` redirect:

      ```python
      import sys

      # C++: std::cout << "Done." << std::endl;
      print("Done.")                                    # → stdout

      # C++: std::cerr << "Warning: file not found" << std::endl;
      print("Warning: file not found", file=sys.stderr) # → stderr
      ```

      Separating them lets callers redirect each stream independently:

      ```bash
      python3 script.py > output.txt 2> errors.txt
      ```

      ### Predict Before You Code

      Before writing any code, predict: if you run `python3 script.py` with no arguments, what is `sys.argv`? Is it an empty list, or does it contain something? Verify by adding `print(sys.argv)` to a test script.

      ### Task

      Write `safe_word_count.py` **from scratch**. (Note: type `data.txt` into the "args: " input box in the Output panel to add it to the program args to read this file). It should:
      1. If no filename argument is provided (`len(sys.argv) < 2`), print `Error: no filename given` to `sys.stderr` and call `sys.exit(1)`
      2. Read `filename = sys.argv[1]` and print `Reading: <filename>` to `sys.stderr`
      3. Count words and print `Total words: <count>` to stdout

    files:
      - path: "safe_word_count.py"
        content: |
          import sys

          # Write the complete script from scratch.
          # Requirements:
          #   1. Check sys.argv — error to stderr + exit(1) if no filename
          #   2. Print "Reading: <filename>" to stderr
          #   3. Count words, print "Total words: <count>" to stdout
        language: "python"

      - path: "data.txt"
        content: |
          the quick brown fox jumps over the lazy dog
          pack my box with five dozen big liquor jugs
          how vexingly quick daft zebras jump
        language: "plaintext"

    open_file: "safe_word_count.py"

    setup_commands:
      - "import os; os.chdir('/tutorial')"

    solution:
      files:
        - path: "safe_word_count.py"
          content: |
            import sys

            # 1. Check sys.argv — error to stderr + exit(1) if no filename
            if len(sys.argv) < 2:
                print("Error: no filename given", file=sys.stderr)
                sys.exit(1)

            # 2. Print "Reading: <filename>" to stderr
            filename = sys.argv[1]
            print(f"Reading: {filename}", file=sys.stderr)

            # 3. Count words, print "Total words: <count>" to stdout
            total = 0
            with open(filename) as f:
                for line in f:
                    total += len(line.split())

            print(f"Total words: {total}")
          language: "python"
      explanation: |
        **Why this is correct:**

        - **`sys.argv`:** A list where index `0` is the script name and index `1` onwards are the arguments. `len(sys.argv) < 2` means no filename was given. This mirrors C/C++'s `argc < 2` check.
        - **`print(..., file=sys.stderr)`:** The `file=` keyword argument redirects the print to `sys.stderr` instead of `sys.stdout`. This is Python's equivalent of C++'s `std::cerr` and Bash's `echo "error" >&2`. Mixing error messages into stdout would corrupt pipelines.
        - **`sys.exit(1)`:** Terminates the process with exit code 1 — the Unix convention for failure. The test captures this as a `SystemExit` exception.
        - **`print(f"Reading: {filename}", file=sys.stderr)`:** Diagnostic/progress messages go to stderr. The test captures stderr separately and checks for `'Reading: data.txt'`.
        - **`print(f"Total words: {total}")`:** Normal output goes to stdout (the default). The test checks stdout for `'Total words: 24'` when `data.txt` is passed. The word count logic is identical to Step 7.

    tests:
      - description: "Prints 'Reading: data.txt' to sys.stderr when given data.txt"
        command: |
          import sys, io, os; os.chdir('/tutorial')
          old_argv = sys.argv
          sys.argv = ['safe_word_count.py', 'data.txt']
          buf = io.StringIO()
          old_err = sys.stderr
          sys.stderr = buf
          try:
              exec(open('/tutorial/safe_word_count.py').read(), {"__name__": "__main__"})
          finally:
              sys.stderr = old_err
              sys.argv = old_argv
          assert 'Reading: data.txt' in buf.getvalue(), \
              f"Expected 'Reading: data.txt' in stderr, got: {repr(buf.getvalue())}"
        hints:
          - text: "Status messages should go to a different output stream than normal output. Which stream is for diagnostic messages? How does `print()` let you choose the destination?"
            condition: "code_missing: sys.stderr"
          - text: "You're printing to stderr — good. Is the message using the actual filename from the command-line argument, or is it hardcoded?"
            condition: "code_contains: sys.stderr"
      - description: "Counts words correctly (Total words: 24)"
        command: |
          import sys, os; os.chdir('/tutorial')
          old_argv = sys.argv
          sys.argv = ['safe_word_count.py', 'data.txt']
          try:
              output = __run_capture('/tutorial/safe_word_count.py')
          finally:
              sys.argv = old_argv
          assert 'Total words: 24' in output, \
              f"Expected 'Total words: 24', got: {repr(output)}"
        hints:
          - text: "The word-counting logic is the same as Step 7 — but which file should you open? Where does the filename come from in this version?"
      - description: "Exits with code 1 and prints error to stderr when no argument given"
        command: |
          import sys, io, os; os.chdir('/tutorial')
          old_argv = sys.argv
          sys.argv = ['safe_word_count.py']
          buf = io.StringIO()
          old_err = sys.stderr
          sys.stderr = buf
          exited = False
          try:
              exec(open('/tutorial/safe_word_count.py').read(), {"__name__": "__main__"})
          except SystemExit as e:
              exited = (e.code != 0)
          finally:
              sys.stderr = old_err
              sys.argv = old_argv
          assert exited, "Script should call sys.exit(1) when no argument is given"
          assert 'Error: no filename given' in buf.getvalue(), \
              "Expected 'Error: no filename given' in stderr"
        hints:
          - text: "What happens if the user runs your script without providing a filename? You need to detect this case early and exit gracefully. How can you check how many arguments were provided?"
            condition: "code_missing: sys.exit"
          - text: "You have an exit call — good. Does the check happen *before* you try to access the filename? And does the error message go to the right output stream?"
            condition: "code_contains: sys.exit"

    quiz:
      title: "sys.argv & stderr — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            A script is run with `python3 myscript.py hello world`. What is `sys.argv[0]`?
          type: single
          options:
            - "`\"hello\"`"
            - "`\"world\"`"
            - "`\"myscript.py\"`"
            - "`None`"
          correct_index: 2
          explanation: |
            `sys.argv[0]` is always the **script name** itself. Arguments start at index 1:
            `sys.argv[1]` is `"hello"`, `sys.argv[2]` is `"world"`.
            This mirrors C/C++'s `argv[0]` convention.

        - question: |
            Why should error messages be written to `sys.stderr` rather than printed normally?
          type: single
          options:
            - "stderr is faster than stdout in Python"
            - "stdout can only handle one line at a time"
            - "Separating stdout and stderr lets users redirect normal output and errors independently"
            - "Python automatically color-codes stderr messages in red"
          correct_index: 2
          explanation: |
            When stdout and stderr are separate streams, users can capture output (`> out.txt`) and errors
            (`2> err.txt`) independently. Mixing error messages into stdout breaks pipelines —
            a downstream command would receive the error text as data. This is the same reason C++ uses
            `std::cerr` and Bash scripts use `echo "error" >&2`.

        - question: |
            A script should exit with code `1` and print an error if the user provides no arguments.

            **Evaluate** these two approaches. Which is correct Python?

            **Approach A:**
            ```python
            import sys
            if len(sys.argv) == 1:
                print("Error: no arguments", file=sys.stderr)
                sys.exit(1)
            ```

            **Approach B:**
            ```python
            import sys
            if len(sys.argv) == 1:
                print("Error: no arguments")
                sys.exit(1)
            ```
          type: single
          options:
            - "Both are correct and equivalent"
            - "Only A is correct — errors must go to stderr so they don't contaminate stdout (which may be piped)"
            - "Only B is correct — `file=sys.stderr` is not valid Python syntax"
            - "Neither is correct — you should use `raise SystemExit(1)` instead"
          correct_index: 1
          explanation: |
            Approach A is correct. Error messages should go to `sys.stderr` so that if the user pipes
            stdout to another program or file, the error message doesn't contaminate the data stream.
            Approach B "works" but violates the Unix convention of separating output from diagnostics.

        - question: |
            *(Spaced review — Step 5: Loops)*

            A student writes this code to print each word with its position number. What is wrong?
            ```python
            words = ["apple", "banana", "cherry"]
            for i in words:
                print(f"{i}: {words[i]}")
            ```
          type: single
          options:
            - "Nothing is wrong — `for i in words` gives `i` as the index, and `words[i]` retrieves each element correctly"
            - "`i` is the word itself (not an index), so `words[i]` causes TypeError. Use `enumerate(words)` to get both index and value"
            - "The f-string syntax is incorrect — f-strings cannot contain variable references inside braces, so `{i}` fails at runtime"
            - "The loop should use `range(words)` instead — passing a list to `range()` automatically generates valid indices"
          correct_index: 1
          explanation: |
            Python's `for i in words` gives you the *elements*, not indices — this is
            different from C++'s `for (int i = 0; ...)`. Using `words['apple']` causes
            a TypeError. The Pythonic fix: `for i, word in enumerate(words):` gives both
            the index and the value. This is a common negative transfer trap from C++.

        - question: |
            *(Spaced review — Step 7: File I/O)*

            What happens if you forget the `with` keyword and write `f = open("data.txt")` instead?
          type: single
          options:
            - "The file opens but you must manually call `f.close()` — if an exception occurs before `close()`, the file stays open"
            - "Python raises a SyntaxError — `open()` can only be used with `with`"
            - "The file opens in read-only mode instead of read-write"
            - "Nothing different — `with` is just syntactic sugar with no functional effect"
          correct_index: 0
          explanation: |
            Without `with`, the file opens normally but there's no automatic cleanup.
            You must manually call `f.close()`. If an exception occurs between `open()` and
            `close()`, the file handle leaks — exactly the same problem as forgetting `fclose()`
            in C. The `with` statement guarantees cleanup via Python's context manager protocol.

        - question: |
            *(Spaced review — Step 2: String Quotes)*

            In C++, `'A'` is a `char` and `"Alice"` is a string — they are different types. What is the equivalent distinction in Python?
          type: single
          options:
            - "Python also distinguishes `'A'` as a character and `\"Alice\"` as a string"
            - "There is no distinction — Python has no `char` type. Single quotes (`'...'`) and double quotes (`\"...\"`) both create `str` objects and are fully interchangeable"
            - "Single quotes create byte strings, double quotes create Unicode strings"
            - "Single quotes are for single characters, but Python stores them as length-1 strings"
          correct_index: 1
          explanation: |
            Python has no `char` type at all. `'A'` and `"A"` are both `str` objects of length 1.
            This means you can freely choose whichever quote style avoids escaping —
            e.g., `"It's easy"` or `'<div class="box">'`. This is a key difference from C++
            where mixing up `'x'` and `"x"` is a compile error.

