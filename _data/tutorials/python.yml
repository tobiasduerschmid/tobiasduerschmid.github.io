            - "`[i**2 for i in range(1, 6)]`"
            - "`[i**2 for i in range(5)]`"
            - "`[i*i for i in range(1, 5)]`"
            - "`[i^2 for i in range(1, 6)]`"
          correct_index: 0
          explanation: |
            `range(1, 6)` generates `[1, 2, 3, 4, 5]` (start inclusive, stop exclusive).
            `i**2` is Python's exponentiation operator (C++ uses `pow()` or manual multiplication).
            `i^2` in Python is **bitwise XOR**, not exponentiation — a common negative-transfer mistake from math.

  # --------------------------------------------------------------------------
  # STEP 6 — Reading Files with open() and with
  # Pedagogy:
  #   Transfer Tutor    — C++ file I/O (fopen / fstream) → Python `open()` + `with`.
  #   Lay of the Land   — Python's "batteries included" stdlib.
  #   Guide-and-Release — complete a small data-processing script.
  # --------------------------------------------------------------------------
  - title: "Reading Files with open() and with"
    instructions: |
      ## Python's "Batteries Included" Philosophy

      One of Python's greatest strengths is its **standard library** — hundreds of modules
      ready to use with no installation:

      | Module | What it does | C++ / Bash equivalent |
      |---|---|---|
      | `os`, `pathlib` | File paths, directory traversal | `<filesystem>` / `ls`, `find` |
      | `sys` | Command-line args, exit codes | `argc/argv` / `$@` |
      | `json` | Parse/write JSON | Requires a library |
      | `re` | Regular expressions | `<regex>` / `grep` |
      | `csv` | Read/write CSV | Manual parsing |
      | `subprocess` | Run shell commands | `system()` / direct Bash |

      ### Reading Files with `open()` and `with`

      In C++ you `fopen`, check for `NULL`, process, and `fclose`. Python's `with` statement
      handles the close automatically — even if an exception occurs:

      ```python
      # C++:
      # FILE *f = fopen("data.txt", "r"); ... fclose(f);

      # Python — the 'with' block closes the file automatically:
      with open("data.txt") as f:
          for line in f:
              print(line.strip())   # .strip() removes the trailing newline
      ```

      The `with` statement is Python's **resource management** idiom — just like RAII in C++,
      the file is guaranteed to be closed when the block exits.

      ### Task

      Complete `word_count.py`. It should:
      1. Read every line from `data.txt`
      2. Split each line into words (`.split()` splits on whitespace)
      3. Count the **total number of words** across all lines
      4. Print: `Total words: <count>`

      The file `data.txt` is already created for you.

    files:
      - path: "word_count.py"
        content: |
          # Task: Count the total words in data.txt
          total = 0

          with open("data.txt") as f:
              for line in f:
                  words = line.split()   # split() splits on whitespace, returns a list
                  # TODO: add len(words) to total
                  pass

          # TODO: print the total word count in the format: "Total words: <count>"
          pass
        language: "python"

      - path: "data.txt"
        content: |
          the quick brown fox jumps over the lazy dog
          pack my box with five dozen liquor jugs
          how vexingly quick daft zebras jump
        language: "plaintext"

    open_file: "word_count.py"

    setup_commands:
      - "import os; os.chdir('/tutorial')"

    tests:
      - description: "Script runs without errors"
        command: |
          import os; os.chdir('/tutorial')
          output = __run_capture('/tutorial/word_count.py')
      - description: "Output contains 'Total words: 24'"
        command: |
          import os; os.chdir('/tutorial')
          output = __run_capture('/tutorial/word_count.py')
          # 9 + 9 + 6 = 24 words across the three lines
          assert 'Total words: 24' in output, \
              f"Expected 'Total words: 24', got: {repr(output)}"

    quiz:
      title: "Reading Files — Knowledge Check"
      min_score: 0.67
      shuffle: true
      questions:

        - question: |
            A student writes this code and asks why Python is better than C++ for this task:
            ```python
            with open("log.txt") as f:
                errors = [line for line in f if "ERROR" in line]
            ```
            What is the best answer?
          type: single
          options:
            - "Python runs faster than C++ for file I/O operations"
            - "Python's `with` statement, built-in file iteration, and list comprehensions make this 3-4 lines vs 20+ lines in C++ with error handling"
            - "C++ cannot open text files, only binary files"
            - "Python files never need to be closed because the OS does it automatically"
          correct_index: 1
          explanation: |
            This is Python's **scripting sweet spot**: the `with` statement handles resource cleanup,
            files are directly iterable (no manual buffering), and the list comprehension filters in one line.
            The equivalent C++ code would need `ifstream`, a `while(getline(...))` loop, string search,
            and explicit `close()` — easily 20+ lines for robust code.

        - question: |
            What does `line.strip()` do when reading lines from a file?
          type: single
          options:
            - "Removes all spaces from the middle of the line"
            - "Removes leading and trailing whitespace, including the newline character `\\n` at the end"
            - "Converts the line to lowercase"
            - "Splits the line into a list of characters"
          correct_index: 1
          explanation: |
            When you read a line from a file, it includes the trailing newline `\n`.
            `.strip()` removes **leading and trailing whitespace** (spaces, tabs, `\n`, `\r`).
            This is analogous to trimming a C++ `std::string`.

        - question: |
            What happens to a file opened with `with open("file.txt") as f:` when the `with` block finishes?
          type: single
          options:
            - "Nothing — you must call `f.close()` manually after the block"
            - "The file is automatically closed, even if an exception occurred inside the block"
            - "The file is deleted from disk"
            - "The file stays open until the Python interpreter exits"
          correct_index: 1
          explanation: |
            The `with` statement calls `f.__exit__()` (which closes the file) automatically when the block
            exits — whether normally or due to an exception. This is Python's answer to C++'s RAII pattern
            and eliminates the risk of forgetting to call `f.close()`.

  # --------------------------------------------------------------------------
  # STEP 7 — Regular Expressions in Python: the re module
  # Pedagogy:
  #   Transfer Tutor    — bridges the RegEx tutorial (grep/sed patterns) to Python re.
  #   Guide-and-Release — complete a log-parsing script using re.findall / re.sub.
  # --------------------------------------------------------------------------
  - title: "Regular Expressions in Python: the re Module"
    instructions: |
      ## From grep to Python

      In the RegEx tutorial you used patterns with `grep -E` and `sed`. Python's built-in
      `re` module gives you the same power inside a script — no subprocess needed:

      | Shell | Python `re` equivalent |
      |---|---|
      | `grep -E 'pattern' file` | `re.findall(r'pattern', text)` |
      | `grep -c 'pattern' file` | `len(re.findall(r'pattern', text))` |
      | `sed 's/old/new/g' file` | `re.sub(r'old', 'new', text)` |
      | Test if a match exists | `re.search(r'pattern', text)` |

      ### The three essential functions

      ```python
      import re

      text = "Error 404: page not found. Error 500: server crash."

      # re.search() — find the FIRST match; returns a match object or None
      m = re.search(r'Error \d+', text)
      if m:
          print(m.group())     # "Error 404"

      # re.findall() — find ALL non-overlapping matches; returns a list of strings
      codes = re.findall(r'\d+', text)
      print(codes)             # ['404', '500']

      # re.sub() — replace every match with a new string
      clean = re.sub(r'Error \d+', 'ERR', text)
      print(clean)             # "ERR: page not found. ERR: server crash."
      ```

      Raw strings (`r'...'`) are the standard for regex patterns in Python —
      they prevent Python from interpreting backslashes before `re` sees them.

      ### Task

      Complete `log_parser.py`. Given `log.txt` (a server log already provided):

      1. Read the entire file into a string with `f.read()`
      2. Use `re.findall(r'\d{2}:\d{2}:\d{2}', text)` to collect every timestamp
         and print `Timestamps found: <count>`
      3. Use `re.findall(r'ERROR.*', text)` to collect every ERROR line
         and print `Errors: <count>`
      4. Use `re.sub(r'\d+\.\d+\.\d+\.\d+', 'x.x.x.x', text)` to redact all
         IP addresses, then print `Redacted log:` followed by the redacted text

    files:
      - path: "log_parser.py"
        content: |
          import re

          with open("log.txt") as f:
              text = f.read()

          # 1. Extract all timestamps (HH:MM:SS)
          timestamps = re.findall(r'\d{2}:\d{2}:\d{2}', text)
          print(f"Timestamps found: {len(timestamps)}")

          # 2. TODO: use re.findall() to collect lines containing "ERROR"
          error_lines = []   # replace this with re.findall(r'ERROR.*', text)
          print(f"Errors: {len(error_lines)}")

          # 3. TODO: use re.sub() to replace IPv4 addresses with "x.x.x.x"
          #    Pattern: r'\d+\.\d+\.\d+\.\d+'
          redacted = text    # replace this with re.sub(...)
          print("Redacted log:")
          print(redacted)
        language: "python"

      - path: "log.txt"
        content: |
          2024-01-15 09:23:11 INFO  Server started on port 8080
          2024-01-15 09:23:45 ERROR Connection failed: timeout
          2024-01-15 09:24:02 INFO  Request from 192.168.1.42
          2024-01-15 09:24:18 WARNING Slow response: 2345ms
          2024-01-15 09:24:33 ERROR Disk usage at 94%
          2024-01-15 09:24:51 INFO  Request from 10.0.0.7
        language: "plaintext"

    open_file: "log_parser.py"

    setup_commands:
      - "import os; os.chdir('/tutorial')"

    tests:
      - description: "Script runs without errors"
        command: |
          import os; os.chdir('/tutorial')
          output = __run_capture('/tutorial/log_parser.py')
      - description: "Found all 6 timestamps"
        command: |
          import os; os.chdir('/tutorial')
          output = __run_capture('/tutorial/log_parser.py')
          assert 'Timestamps found: 6' in output, \
              f"Expected 'Timestamps found: 6', got: {repr(output)}"
      - description: "Counted 2 ERROR lines"
        command: |
          import os; os.chdir('/tutorial')
          output = __run_capture('/tutorial/log_parser.py')
          assert 'Errors: 2' in output, \
              f"Expected 'Errors: 2', got: {repr(output)}"
      - description: "Redacted IP addresses with re.sub()"
        command: |
          import os; os.chdir('/tutorial')
          output = __run_capture('/tutorial/log_parser.py')
          assert 'x.x.x.x' in output, \
              f"Expected 'x.x.x.x' in redacted output, got: {repr(output)}"
          assert '192.168.1.42' not in output, \
              "IP address 192.168.1.42 should have been redacted"

    quiz:
      title: "Regular Expressions in Python — Knowledge Check"
      min_score: 0.67
      shuffle: true
      questions:

        - question: |
            What does `re.findall(r'\d+', 'boot in 3... 2... 1...')` return?
          type: single
          options:
            - "`'3 2 1'`"
            - "`['3', '2', '1']`"
            - "`'321'`"
            - "`3`  (just the count)"
          correct_index: 1
          explanation: |
            `re.findall()` returns a **list of strings** — one string per non-overlapping match.
            `\d+` matches one or more digit characters, so it finds `'3'`, `'2'`, and `'1'`
            independently, returning `['3', '2', '1']`.

        - question: |
            You want to know *whether* a log line contains an IP address, but you don't need
            to extract it. Which function is most appropriate?
          type: single
          options:
            - "`re.findall()` — it returns all matches, so you can check `len() > 0`"
            - "`re.search()` — it returns a match object (truthy) or `None` (falsy) for a single check"
            - "`re.sub()` — it can test for a match while replacing"
            - "`re.compile()` — it tests patterns without needing a string"
          correct_index: 1
          explanation: |
            `re.search()` is the idiomatic choice for a yes/no existence check:
            ```python
            if re.search(r'\d+\.\d+\.\d+\.\d+', line):
                print("has IP")
            ```
            It short-circuits on the first match and returns `None` if there is none —
            exactly like `grep -q` in the shell.

        - question: |
            What is the Python `re.sub()` equivalent of the shell command
            `sed 's/foo/bar/g' file.txt`?
          type: single
          options:
            - "`re.search(r'foo', text, 'bar')`"
            - "`re.replace('foo', 'bar', text)`"
            - "`re.sub(r'foo', 'bar', text)`"
            - "`re.findall(r'foo', text).replace('bar')`"
          correct_index: 2
          explanation: |
            `re.sub(pattern, replacement, string)` replaces **every** occurrence (like `sed`'s `/g` flag).
            The argument order is pattern → replacement → string — remember it as
            "what to find, what to put instead, where to look".

        - question: |
            Why are raw strings (`r'\d+'`) preferred over regular strings (`'\\d+'`) for regex patterns?
          type: single
          options:
            - "Raw strings run faster because Python skips Unicode processing"
            - "Raw strings prevent Python from interpreting backslashes before the `re` module sees them, so `\\d` stays as two characters `\\` and `d`"
            - "The `re` module only accepts raw strings and will raise a TypeError otherwise"
            - "Raw strings automatically escape special regex characters like `.` and `*`"
          correct_index: 1
          explanation: |
            In a regular string, `'\d'` is just `'d'` (Python drops the unrecognised escape).
            In a raw string `r'\d'`, the backslash is preserved literally, so `re` receives the
            two-character sequence `\d` and interprets it as "any digit". Using raw strings avoids
            double-escaping (`'\\d+'`) and matches the pattern you see in `grep` or `sed`.

  # --------------------------------------------------------------------------
  # STEP 8 — sys.argv & stderr
  # Pedagogy:
  #   Transfer Tutor    — C argc/argv → sys.argv; std::cerr → sys.stderr.
  #   Guide-and-Release — complete a robust command-line script.
  # --------------------------------------------------------------------------
  - title: "sys.argv & stderr"
    instructions: |
      ## Command-Line Arguments with `sys.argv`

      ```python
      import sys
      # sys.argv is a list: ["script.py", "arg1", "arg2", ...]
      # C++ equivalent:  argv[0], argv[1], ...

      if len(sys.argv) < 2:
          print("Usage: python3 script.py <filename>")
          sys.exit(1)              # Exit with non-zero code — just like in C++

      filename = sys.argv[1]
      ```

      `sys.argv[0]` is always the script name itself. Extra arguments start at index 1.
      `sys.exit(1)` terminates the process with exit code 1 — the same convention as C's `exit(1)`.

      ### Writing to `stderr` with `print()`

      By default `print()` writes to **stdout**. Error and diagnostic messages should go to **stderr**,
      matching C++'s `std::cerr` and Bash's `>&2` redirect:

      ```python
      import sys

      # C++: std::cout << "Done." << std::endl;
      print("Done.")                                    # → stdout

      # C++: std::cerr << "Warning: file not found" << std::endl;
      print("Warning: file not found", file=sys.stderr) # → stderr
      ```

      Separating them lets callers redirect each stream independently:

      ```bash
      python3 script.py > output.txt 2> errors.txt
      ```

      ### Task

      Complete `safe_word_count.py`. It should:
      1. If no filename argument is provided (`len(sys.argv) < 2`), print `Error: no filename given` to `sys.stderr` and call `sys.exit(1)`
      2. Read `filename = sys.argv[1]` and print `Reading: <filename>` to `sys.stderr`
      3. Count words and print `Total words: <count>` to stdout

      The word-counting logic and file opening are already provided — focus on the argument check and the stderr output.

    files:
      - path: "safe_word_count.py"
        content: |
          import sys

          # TODO: if len(sys.argv) < 2, print "Error: no filename given" to sys.stderr
          #       and call sys.exit(1)

          filename = sys.argv[1]

          # TODO: print "Reading: <filename>" to sys.stderr

          total = 0
          with open(filename) as f:
              for line in f:
                  total += len(line.split())

          print(f"Total words: {total}")
        language: "python"

      - path: "data.txt"
        content: |
          the quick brown fox jumps over the lazy dog
          pack my box with five dozen liquor jugs
          how vexingly quick daft zebras jump
        language: "plaintext"

    open_file: "safe_word_count.py"

    setup_commands:
      - "import os; os.chdir('/tutorial')"

    tests:
      - description: "Prints 'Reading: data.txt' to sys.stderr when given data.txt"
        command: |
          import sys, io, os; os.chdir('/tutorial')
          old_argv = sys.argv
          sys.argv = ['safe_word_count.py', 'data.txt']
          buf = io.StringIO()
          old_err = sys.stderr
          sys.stderr = buf
          try:
              exec(open('/tutorial/safe_word_count.py').read(), {"__name__": "__main__"})
          finally:
              sys.stderr = old_err
              sys.argv = old_argv
          assert 'Reading: data.txt' in buf.getvalue(), \
              f"Expected 'Reading: data.txt' in stderr, got: {repr(buf.getvalue())}"
      - description: "Counts words correctly (Total words: 24)"
        command: |
          import sys, os; os.chdir('/tutorial')
          old_argv = sys.argv
          sys.argv = ['safe_word_count.py', 'data.txt']
          try:
              output = __run_capture('/tutorial/safe_word_count.py')
          finally:
              sys.argv = old_argv
          assert 'Total words: 24' in output, \
              f"Expected 'Total words: 24', got: {repr(output)}"
      - description: "Exits with code 1 and prints error to stderr when no argument given"
        command: |
          import sys, io, os; os.chdir('/tutorial')
          old_argv = sys.argv
          sys.argv = ['safe_word_count.py']
          buf = io.StringIO()
          old_err = sys.stderr
          sys.stderr = buf
          exited = False
          try:
              exec(open('/tutorial/safe_word_count.py').read(), {"__name__": "__main__"})
          except SystemExit as e:
              exited = (e.code != 0)
          finally:
              sys.stderr = old_err
              sys.argv = old_argv
          assert exited, "Script should call sys.exit(1) when no argument is given"
          assert 'Error' in buf.getvalue(), \
              f"Expected an error message in stderr, got: {repr(buf.getvalue())}"

    quiz:
      title: "sys.argv & stderr — Knowledge Check"
      min_score: 0.67
      shuffle: true
      questions:

        - question: |
            A script is run with `python3 myscript.py hello world`. What is `sys.argv[0]`?
          type: single
          options:
            - "`\"hello\"`"
            - "`\"world\"`"
            - "`\"myscript.py\"`"
            - "`None`"
          correct_index: 2
          explanation: |
            `sys.argv[0]` is always the **script name** itself. Arguments start at index 1:
            `sys.argv[1]` is `"hello"`, `sys.argv[2]` is `"world"`.
            This mirrors C/C++'s `argv[0]` convention.

        - question: |
            Why should error messages be written to `sys.stderr` rather than printed normally?
          type: single
          options:
            - "stderr is faster than stdout in Python"
            - "stdout can only handle one line at a time"
            - "Separating stdout and stderr lets users redirect normal output and errors independently"
            - "Python automatically color-codes stderr messages in red"
          correct_index: 2
          explanation: |
            When stdout and stderr are separate streams, users can capture output (`> out.txt`) and errors
            (`2> err.txt`) independently. Mixing error messages into stdout breaks pipelines —
            a downstream command would receive the error text as data. This is the same reason C++ uses
            `std::cerr` and Bash scripts use `echo "error" >&2`.

        - question: |
            A script should exit with code `1` and print an error if the user provides no arguments.
            Which Python code is correct?
          type: single
          options:
            - |
              ```python
              import sys
              if len(sys.argv) == 1:
                  print("Error: no arguments", file=sys.stderr)
                  sys.exit(1)
              ```
            - |
              ```python
              if argc == 0:
                  printf("Error\n");
                  exit(1);
              ```
            - |
              ```python
              import sys
              if sys.argv.length == 0:
                  sys.exit()
              ```
            - |
              ```python
              if no_args:
                  raise SystemError(1)
              ```
          correct_index: 0
          explanation: |
            `sys.argv` is a list; `sys.argv[0]` is always the script name, so checking
            `len(sys.argv) == 1` means no extra arguments were given.
            `sys.exit(1)` exits with code 1 (error), just like `exit(1)` in C.
            Printing to `sys.stderr` (not `sys.stdout`) is the correct convention for error messages.
