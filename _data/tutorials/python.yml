    quiz:
      title: "Data Classes — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            Which three dunder methods does `@dataclass` write for you **by default** (no extra kwargs)?
          type: single
          options:
            - "`__init__`, `__eq__`, `__repr__`"
            - "`__init__`, `__del__`, `__str__`"
            - "`__init__`, `__eq__`, `__hash__`"
            - "`__new__`, `__copy__`, `__format__`"
          correct_index: 0
          option_feedback:
            1: "`__del__` is for destructors (rare in Python — garbage collection handles it). `@dataclass` doesn't write either of these. `__repr__`, not `__str__`, is what `@dataclass` generates."
            2: "Close — but `__hash__` is **only** generated when you also pass `frozen=True` (or `eq=False`). By default, a non-frozen dataclass is unhashable to discourage using mutable objects as dict keys."
            3: "These aren't related. `@dataclass` focuses on the standard data-holder boilerplate: construction, equality, and string representation."
          explanation: |
            `@dataclass` writes `__init__` (so you can write `Point(3, 4)`), `__eq__` (structural
            equality based on fields), and `__repr__` (a readable string like `Point(x=3, y=4)`).
            `__hash__` is generated only with `frozen=True` (or `eq=False`).

        - question: |
            Given:
            ```python
            @dataclass(frozen=True)
            class Point:
                x: int
                y: int

            p = Point(3, 4)
            p.x = 99
            ```
            What does the assignment `p.x = 99` do?
          type: single
          options:
            - "It silently succeeds — `frozen=True` only affects equality, not assignment"
            - "It raises `AttributeError` — the field is read-only because it has no setter"
            - "It raises `FrozenInstanceError` — frozen dataclasses override `__setattr__` to forbid mutation"
            - "It raises `TypeError` — `99` is not declared `int` in this context"
          correct_index: 2
          option_feedback:
            0: "`frozen=True` is specifically about preventing mutation — that's its whole purpose. Equality is generated by `eq=True` (the default), separately."
            1: "`AttributeError` is what you get from `@property` without a setter, or from accessing a missing attribute. Frozen dataclasses raise their own dedicated exception."
            3: "Type annotations are not enforced at runtime (Step 5). The assignment fails because the class is frozen, not because of any type check."
          explanation: |
            `@dataclass(frozen=True)` overrides `__setattr__` to raise `FrozenInstanceError`
            on any attempt to assign to a field. This is what gives you immutability — and
            it's also why frozen dataclasses are hashable (immutable values can be safely
            put into sets and dict keys).

        - question: |
            Which of these statements about `@property` are **true**? *(Select all that apply.)*
          type: multiple
          options:
            - "It lets you read a method's result as an attribute, without parentheses"
            - "It makes the underlying field private — no callers can read it"
            - "It can be combined with a setter (using `@<name>.setter`) to control writes"
            - "It is a special form of `__getattr__`"
          correct_indices: [0, 2]
          option_feedback:
            1: "`@property` is purely about *interface shape* (`p.x` vs `p.x()`). It doesn't make anything private. Python's privacy convention is the underscore prefix (`_internal`), and even that is only a convention — there are no hard private fields."
            3: "`@property` is implemented as a *descriptor* on the class, not via `__getattr__`. `__getattr__` is the per-instance fallback for missing attributes — completely different mechanism."
          explanation: |
            `@property` lets a method *look like* an attribute on the outside (no parens).
            You can pair it with `@<name>.setter` to also control writes. It does **not**
            make the underlying state private — that's a Java/C# habit that doesn't translate.
            And it is a descriptor, not `__getattr__`.

        - question: |
            *(Spaced review — Step 7: List Comprehensions)*

            What is `points[2]` after this line?
            ```python
            points = [Point(x, x * 2) for x in range(5)]
            ```
          type: single
          options:
            - "`Point(2, 2)`"
            - "`Point(2, 4)`"
            - "`Point(4, 8)`"
            - "`(2, 4)` — a plain tuple, since list comprehensions don't return objects"
          correct_index: 1
          option_feedback:
            0: "`x * 2` for `x = 2` is `4`, not `2`. The y-coordinate is the doubled value."
            2: "Indexing is 0-based: `points[2]` corresponds to `x = 2`, not `x = 4`."
            3: "List comprehensions can absolutely produce class instances. `Point(x, x*2)` is a function call expression — it constructs a `Point` for each iteration."
          explanation: |
            `range(5)` yields 0, 1, 2, 3, 4. The list comprehension constructs a `Point`
            for each, with `y = x * 2`. So `points[2]` corresponds to `x = 2`, giving
            `Point(2, 4)`. List comprehensions compose just as well with custom classes
            as with primitives.

        - question: |
            **Evaluate.** For which use case is `@dataclass(frozen=True)` the **best** fit?
          type: single
          options:
            - "A shopping cart whose items are added and removed throughout the session"
            - "A 2D grid coordinate `(row, col)` used as a dictionary key"
            - "A database connection that holds a socket and a transaction state"
            - "A logger object that buffers messages and flushes them periodically"
          correct_index: 1
          option_feedback:
            0: "Shopping carts mutate over time — adding/removing items requires assignment to fields or methods that change state. A frozen dataclass would block all of that."
            2: "Connections have *identity* (this specific socket) and *changing internal state* (buffer, transaction). They are reference objects, not value objects. Frozen dataclasses fit values where two with equal fields are interchangeable — connections aren't."
            3: "Loggers buffer messages — internal state changes constantly. Also, two loggers with equal configuration aren't interchangeable; they have identity."
          explanation: |
            `frozen=True` is the right fit for **value objects**: small, conceptually
            immutable, where `Point(3, 4) == Point(3, 4)` should mean "the same value."
            Coordinates, money amounts, dates, RGB colors all fit this pattern. Things
            with *changing internal state* (carts, connections, loggers) are reference
            objects — use a regular class.

        - question: |
            *(Spaced review — Step 5: Type Hints)*

            Given:
            ```python
            @dataclass(frozen=True)
            class Point:
                x: int
                y: int
            ```
            What happens when you write `p = Point(3.5, 4.5)`?
          type: single
          options:
            - "Runtime: `TypeError` — Python rejects floats where ints are annotated."
            - "Runtime: `Point(3.5, 4.5)` is constructed (`p.x == 3.5`). `mypy`: would flag — `float` is not `int`."
            - "Runtime: `Point(3, 4)` (Python silently truncates floats). `mypy`: ok."
            - "Runtime: depends on whether `frozen=True` is set."
          correct_index: 1
          option_feedback:
            0: "Type annotations on dataclass fields are not enforced by Python at runtime — same rule as Step 5. The annotations only tell `@dataclass` what to put in the auto-generated `__init__` signature; they do not gate the values."
            2: "Python does not coerce floats to ints in dataclass construction — `p.x` stays `3.5`. The annotation is documentation, not a converter."
            3: "`frozen=True` controls *post-construction mutation*, not what types the constructor accepts. Annotations are inert at runtime regardless of `frozen`."
          explanation: |
            This is Step 5's lesson applied inside `@dataclass`: the field annotations
            (`x: int`) are read by the decorator to wire up `__init__`, but Python never
            enforces them at runtime. `Point(3.5, 4.5)` constructs cleanly; `mypy` would
            flag it. The runtime-vs-static distinction is the *same rule everywhere*
            annotations appear — function signatures (Step 5) or dataclass fields (here).
