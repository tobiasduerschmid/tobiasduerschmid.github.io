    solution:
      files:
        - path: "geometry.py"
          content: |
            from dataclasses import dataclass

            class PointManual:
                """The OLD way: hand-written __init__, __eq__, __repr__."""
                def __init__(self, x, y):
                    self.x = x
                    self.y = y
                def __eq__(self, other):
                    return isinstance(other, PointManual) and self.x == other.x and self.y == other.y
                def __repr__(self):
                    return f"PointManual(x={self.x}, y={self.y})"

            @dataclass(frozen=True)
            class Point:
                x: int
                y: int

                @property
                def distance_to_origin(self) -> float:
                    return (self.x ** 2 + self.y ** 2) ** 0.5

            @dataclass(frozen=True)
            class RGB:
                r: int
                g: int
                b: int

                @property
                def as_hex(self) -> str:
                    return f'#{self.r:02x}{self.g:02x}{self.b:02x}'

            # --- Quick self-test ---
            a = Point(3, 4)
            b = Point(3, 4)
            print(a == b)                # True
            print(a)                     # Point(x=3, y=4)
            print(a.distance_to_origin)  # 5.0
            print(RGB(255, 128, 0).as_hex)  # '#ff8000'
          language: "python"
      explanation: |
        **Why this is correct:**

        - **`@dataclass(frozen=True)`** writes three dunder methods for you: `__init__` (so `Point(3, 4)` works), `__eq__` (so `Point(3, 4) == Point(3, 4)` is `True`), and `__repr__` (so `print(p)` shows `Point(x=3, y=4)`). With `frozen=True` it also makes `Point` **hashable** and prevents assignment to fields after construction.
        - **`x: int` / `y: int`** are not just documentation — `@dataclass` reads these type hints (Step 5) to figure out what fields the class has. Without the annotations, `@dataclass` would not know to generate `__init__`.
        - **`frozen=True`** makes mutation raise `FrozenInstanceError`. The contract is: *"once constructed, a `Point` value never changes."* This is exactly what makes value-object equality safe and what makes the instance hashable.
        - **`@property`** turns `distance_to_origin` into a *read-as-attribute* method. The test reads `p.distance_to_origin` (no parens). Without `@property`, that expression would evaluate to a *bound method object*, not a number — a confusing error mode.
        - **`RGB.as_hex`** reuses every pattern from `Point` — frozen dataclass, typed `int` fields, `@property` returning a typed string. The f-string spec `f'{r:02x}'` (Step 2 spaced review) formats an int as a two-digit lowercase hex value. Same recipe, different field types and different return type — that's the point of this independent task.
        - **Mutable defaults are forbidden.** If you ever try `events: list = []`, Python rejects the class with `ValueError: mutable default <class 'list'> is not allowed`. Use a tuple, or `field(default_factory=list)` if you really need a list.
        - **`PointManual` stays in the file** as a contrast — it shows what the decorator saved you from writing.

    tests:
      - description: "Point is defined and constructible"
        command: |
          import sys
          sys.modules.pop('geometry', None)
          from geometry import Point
          p = Point(3, 4)
          assert p.x == 3 and p.y == 4, f"Point(3, 4) should have x=3, y=4; got x={p.x}, y={p.y}"
        hints:
          - text: "You need to define a class called `Point`. Use `@dataclass` so you don't have to write `__init__` by hand."
            condition: "code_missing: class Point"
          - text: "Have you imported `dataclass` from the `dataclasses` module? Look at the top of the file."
            condition: "code_missing: from dataclasses"

      - description: "Point uses @dataclass with frozen=True"
        command: |
          source = open('/tutorial/geometry.py').read()
          collapsed = source.replace(' ', '')
          assert '@dataclass(frozen=True)' in collapsed, \
              "Use @dataclass(frozen=True) on Point — frozen makes Point immutable, hashable, and gives safe value-object equality."
        hints:
          - text: "Pass `frozen=True` to the decorator: `@dataclass(frozen=True)`."
            condition: "code_missing: frozen"

      - description: "Two Points with equal fields compare equal (free __eq__)"
        command: |
          import sys
          sys.modules.pop('geometry', None)
          from geometry import Point
          assert Point(3, 4) == Point(3, 4), \
              "Point(3, 4) should equal Point(3, 4) — @dataclass writes a structural __eq__ for you."
          assert Point(3, 4) != Point(3, 5), \
              "Point(3, 4) should NOT equal Point(3, 5)."
        hints:
          - text: "If equality is failing, check that you used `@dataclass` — the decorator writes `__eq__` based on field values."

      - description: "Point is immutable: assignment raises FrozenInstanceError"
        command: |
          import sys
          sys.modules.pop('geometry', None)
          from dataclasses import FrozenInstanceError
          from geometry import Point
          p = Point(3, 4)
          try:
              p.x = 99
              raise AssertionError("Expected FrozenInstanceError when assigning to a frozen Point's field, but the assignment succeeded.")
          except FrozenInstanceError:
              pass
        hints:
          - text: "If `p.x = 99` succeeds silently, your `Point` is not frozen. Add `frozen=True` to the decorator: `@dataclass(frozen=True)`."

      - description: "distance_to_origin uses @property (not a method call)"
        command: |
          source = open('/tutorial/geometry.py').read()
          assert '@property' in source, \
              "Use @property on distance_to_origin so callers can read it as an attribute (`p.distance_to_origin`, no parens)."
        hints:
          - text: "How does the test access `distance_to_origin` — with or without parentheses? That is the clue: with `@property`, no parens; without, you have to call it as a method."
            condition: "code_missing: @property"

      - description: "Point(3, 4).distance_to_origin == 5.0"
        command: |
          import sys
          sys.modules.pop('geometry', None)
          from geometry import Point
          p = Point(3, 4)
          d = p.distance_to_origin
          # Read as an attribute, not a method — should be a float, not a bound method
          assert isinstance(d, float), \
              f"`p.distance_to_origin` should be a float; got {type(d).__name__}. Did you forget @property?"
          assert d == 5.0, \
              f"Expected 5.0 for the 3-4-5 triangle; got {d}"
        hints:
          - text: "The classic 3-4-5 triangle: sqrt(3**2 + 4**2) = sqrt(25) = 5.0. Use `**` for exponentiation and `** 0.5` for square root."
            condition: "code_missing: **"

      - description: "AST check: there is a class with a dataclass decorator"
        command: |
          import ast
          src = open('/tutorial/geometry.py').read()
          tree = ast.parse(src)
          found = False
          for node in ast.walk(tree):
              if isinstance(node, ast.ClassDef) and node.name == 'Point':
                  for dec in node.decorator_list:
                      # @dataclass — Name node
                      if isinstance(dec, ast.Name) and dec.id == 'dataclass':
                          found = True
                      # @dataclass(...) — Call node with func=Name('dataclass')
                      if isinstance(dec, ast.Call) and isinstance(dec.func, ast.Name) and dec.func.id == 'dataclass':
                          found = True
          assert found, "Point should be decorated with @dataclass (or @dataclass(frozen=True))"

      - description: "TODO 4: RGB is defined as a frozen dataclass with int fields r, g, b"
        command: |
          import sys
          sys.modules.pop('geometry', None)
          from dataclasses import FrozenInstanceError
          from geometry import RGB
          c = RGB(255, 128, 0)
          assert c.r == 255 and c.g == 128 and c.b == 0, \
              f"RGB(255, 128, 0) should have r=255, g=128, b=0; got r={c.r}, g={c.g}, b={c.b}"
          # Verify frozen
          try:
              c.r = 0
              raise AssertionError("RGB should be frozen — assignment to .r should raise FrozenInstanceError")
          except FrozenInstanceError:
