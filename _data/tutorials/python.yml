      questions:

        - question: |
            Which list comprehension correctly produces only the **odd** numbers from 1 to 9?
          type: single
          options:
            - "`[x for x in range(1, 10) if x % 2 != 0]`"
            - "`[x if x % 2 != 0 for x in range(1, 10)]`"
