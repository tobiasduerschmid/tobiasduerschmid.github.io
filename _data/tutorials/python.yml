            2: "Both arguments match the annotations and `'hi' * 3` is valid string repetition. Quiet on both sides."
            3: "mypy would flag this — but **Python also raises** `TypeError: can't multiply sequence by non-int of type 'str'`. The runtime error is real, just from `*`, not from the annotation. The question asks for cases where Python runs without raising; this one isn't."
