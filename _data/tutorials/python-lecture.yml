title: "Python Lecture"
description: "Interactive exercises accompanying the Python lecture. Practise the key concepts — print() keyword arguments, list comprehensions and unpacking, classes and __str__, and regex with named capture groups."

instructor_mode: true

backend: pyodide

require_tests: true
autosave_type: files

setup_commands:
  - "import sys; sys.path.insert(0, '/tutorial')"

steps:

  # --------------------------------------------------------------------------
  # STEP 1 — print() with keyword arguments
  # --------------------------------------------------------------------------
  - title: "print() with keyword arguments"
    instructions: |
      > **Learning objective:** After this step you will be able to **use** `print()`'s `sep` and `end` keyword arguments and **unpack** a list into separate arguments with `*`.

      ## The `print()` signature

      ```
      print(*args, sep=' ', end='\n', file=None, flush=False)
      ```

      | Argument | Default | Effect |
      |---|---|---|
      | `sep` | `' '` | String inserted **between** multiple positional arguments |
      | `end` | `'\n'` | String appended **after** the last argument |

      ### `sep` acts between arguments — use `*` to unpack a list

      When you pass multiple separate values, `sep` appears between them:

      ```python
      print("Hello", "World", sep='_')    # Hello_World
      ```

      To use `sep` with a list, prefix it with `*` to **unpack** it into separate arguments:

      ```python
      print(*["Hello", "World"], sep='_')  # Hello_World
      ```

      Without `*` the list is treated as a **single** argument, so `sep` has nothing to
      separate and Python prints the list's string representation instead:

      ```python
      print(["Hello", "World"], sep='_')  # ['Hello', 'World']
      ```

      ### Task

      Write one `print()` call that unpacks `["Hello", "World", "Students"]` with `*`,
      uses `sep='_'` and `end='!\n'`.

      Expected output:
      ```
      Hello_World_Students!
      ```

    files:
      - path: "hello.py"
        content: |
          # Write one print() call that unpacks the list with *
          # and uses sep='_' and end='!\n'
          # Expected output: Hello_World_Students!
        language: "python"

    open_file: "hello.py"

    setup_commands:
      - "import os; os.chdir('/tutorial')"

    solution:
      files:
        - path: "hello.py"
          content: |
            print(*["Hello", "World", "Students"], sep='_', end='!\n')
          language: "python"
      explanation: |
        **Why this is correct:**

        - **`*["Hello", "World", "Students"]`:** The `*` unpacks the list into three separate positional arguments: `"Hello"`, `"World"`, `"Students"`. Without `*`, the whole list would be one argument and `sep` would have nothing to separate.
        - **`sep='_'`:** Inserted between each pair of arguments, giving `Hello_World_Students`.
        - **`end='!\n'`:** Replaces the default `'\n'` with `'!\n'`, appending `!` before the newline.
        - **Output:** `Hello_World_Students!`

    tests:
      - description: "Script runs without errors"
        command: |
          import os; os.chdir('/tutorial')
          output = __run_capture('/tutorial/hello.py')
      - description: "Used print() with the list"
        command: |
          source = open('/tutorial/hello.py').read()
          assert 'print' in source, "Write a print() call."
          assert '"Hello"' in source or "'Hello'" in source, \
              "Pass the list [\"Hello\", \"World\", \"Students\"] to print()."
        hints:
          - text: "Write `print(*[\"Hello\", \"World\", \"Students\"], sep='_', end='!\\n')` — the `*` unpacks the list into separate arguments so that `sep` is inserted between them."
      - description: "Output is Hello_World_Students!"
        command: |
          import os; os.chdir('/tutorial')
          output = __run_capture('/tutorial/hello.py')
          assert "Hello_World_Students!" in output, \
              f"Expected \"Hello_World_Students!\" in output, got: {repr(output)}"
        hints:
          - text: "Use `*` before the list to unpack it: `print(*[\"Hello\", \"World\", \"Students\"], sep='_', end='!\\n')`. Without `*`, the list is one argument and `sep` has nothing to separate."

    quiz:
      title: "print() — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            What is the output of this statement?
            ```python
            print("A", "B", "C", sep='-', end='.')
            ```
          type: single
          options:
            - "`A B C.`"
            - "`A-B-C.`"
            - "`['A', 'B', 'C'].`"
            - "`A-B-C`  (with a newline at the end)"
          correct_index: 1
          explanation: |
            Three separate string arguments are passed, so `sep='-'` is inserted between them:
            `A-B-C`. The `end='.'` replaces the default newline with `.`, giving `A-B-C.`
            (no trailing newline). When multiple arguments are passed, `sep` clearly separates them.

        - question: |
            Why does `print(["A", "B", "C"], sep='-')` output `['A', 'B', 'C']` rather than `A-B-C`?
          type: single
          options:
            - "Lists are not supported by `print()` — you must convert to a string first"
            - "The list is one positional argument, so `sep` has nothing to separate. Python prints the list's string representation as a single unit."
            - "`sep='-'` only works with string arguments, not with lists"
            - "You need `sep='-'` before the list argument for it to apply to list elements"
          correct_index: 1
          explanation: |
            `sep` is placed **between** multiple positional arguments. One argument (the list)
            means there is no gap for `sep` to fill. Python calls `str()` on the list, producing
            `['A', 'B', 'C']`. To print list elements with a separator, unpack the list:
            `print(*["A", "B", "C"], sep='-')` → `A-B-C`.

        - question: |
            What does `end='\n'` do by default, and why would you change it?
          type: single
          options:
            - "`end='\\n'` prints a blank line after the output; change it to `end=''` to suppress blank lines"
            - "`end='\\n'` appends a newline after the last value; change it (e.g. to `end='!'`) to append a different string, or use `end=''` to suppress the newline entirely"
            - "`end='\\n'` is only used when printing to a file; for console output it has no effect"
            - "`end='\\n'` inserts a newline between arguments; `sep` appends a string at the end"
          correct_index: 1
          explanation: |
            By default, `print()` ends every call with a newline so the next output starts on a
            new line. You can override `end` to append any string — `end='!'` adds `!` before the
            newline, `end=''` produces no newline at all (useful when building output incrementally
            across multiple `print()` calls). `sep` and `end` are independent: `sep` goes *between*
            arguments, `end` comes *after* the last one.

  # --------------------------------------------------------------------------
  # STEP 2 — Sequences, List Comprehension & Unpacking
  # --------------------------------------------------------------------------
  - title: "Sequences, List Comprehension & Unpacking"
    instructions: |
      > **Learning objective:** After this step you will be able to **write** list comprehensions using `range()`, **apply** `min()`, `max()`, and `sum()` to lists, and **unpack** and **swap** variables with a single assignment.

      ## List comprehensions

      A list comprehension creates a new list by applying an expression to every element of a sequence:

      ```python
      [expr(x) for x in sequence]
      ```

      | Example | Result |
      |---|---|
      | `[x for x in range(1, 10)]` | `[1, 2, 3, 4, 5, 6, 7, 8, 9]` |
      | `[2*x for x in range(4)]` | `[0, 2, 4, 6]` |

      ## `range(start, end)` — integer sequences

      `range(start, end)` generates integers from `start` up to **`end - 1`** (the upper bound is exclusive).
      The default for `start` is `0`, so `range(4)` is the same as `range(0, 4)`.

      ## Built-in aggregation: `min`, `max`, `sum`

      These are built-in functions — no `import` needed:

      ```python
      nums = [3, 1, 4, 1, 5]
      print(min(nums))   # 1
      print(max(nums))   # 5
      print(sum(nums))   # 14
      ```

      ## Unpacking and swapping

      Python lets you **unpack** a list directly into named variables:

      ```python
      [a, b] = [1, 2]
      print(a)   # 1
      print(b)   # 2
      ```

      And you can **swap** two variables in one line — no temporary variable needed:

      ```python
      a, b = b, a
      print(a)   # 2
      print(b)   # 1
      ```

      Python evaluates the entire right-hand side first, then performs all assignments simultaneously.

      > *"Syntactic sugar"* refers to language features that make code easier to write without adding new capabilities.

      ### Task

      Complete the four TODOs in the starter code:

      1. Replace `evens = []` with a list comprehension using `2*x` that produces `[0, 2, 4, 6, 8]`.
      2. Print `min`, `max`, and `sum` of `evens`.
      3. Unpack the first two elements of `evens` into `a` and `b`.
      4. Swap `a` and `b` in one line.

      Expected output:
      ```
      [0, 2, 4, 6, 8]
      0
      8
      20
      Before swap: a=0, b=2
      After swap:  a=2, b=0
      ```

    files:
      - path: "sequences.py"
        content: |
          # 1. Create a list of even numbers 0, 2, 4, 6, 8 using a list comprehension
          #    Hint: [2*x for x in range(?)]   Expected: [0, 2, 4, 6, 8]
          evens = []  # TODO: replace with a list comprehension

          print(evens)

          # 2. TODO: print min(evens), max(evens), and sum(evens) — one call per line

          # 3. Unpack the first two elements of evens into a and b
          a = 0  # TODO: replace these two lines with  [a, b] = [evens[0], evens[1]]
          b = 0
          print(f"Before swap: a={a}, b={b}")

          # 4. Swap a and b in one line, then print again
          # TODO: replace this comment with  a, b = b, a
          print(f"After swap:  a={a}, b={b}")
        language: "python"

    open_file: "sequences.py"

    setup_commands:
      - "import os; os.chdir('/tutorial')"

    solution:
      files:
        - path: "sequences.py"
          content: |
            # 1. List comprehension: even numbers 0..8
            evens = [2*x for x in range(5)]
            print(evens)

            # 2. Aggregation functions
            print(min(evens))
            print(max(evens))
            print(sum(evens))

            # 3. Unpack first two elements
            [a, b] = [evens[0], evens[1]]
            print(f"Before swap: a={a}, b={b}")

            # 4. Swap in one line
            a, b = b, a
            print(f"After swap:  a={a}, b={b}")
          language: "python"
      explanation: |
        **Why this is correct:**

        - **`[2*x for x in range(5)]`:** `range(5)` is `range(0, 5)`, generating 0, 1, 2, 3, 4 (default start is 0). `2*x` doubles each value, giving `[0, 2, 4, 6, 8]`.
        - **`min`, `max`, `sum`:** Built-in aggregation functions — no import required. `min=0`, `max=8`, `sum=20`.
        - **`[a, b] = [evens[0], evens[1]]`:** Python unpacks the right-hand list, binding `a=0` and `b=2`.
        - **`a, b = b, a`:** Python evaluates the right-hand side first (`b=2`, `a=0`), packs them into a temporary tuple `(2, 0)`, then assigns `a=2` and `b=0` simultaneously — no explicit temporary variable needed.

    tests:
      - description: "Script runs without errors"
        command: |
          import os; os.chdir('/tutorial')
          output = __run_capture('/tutorial/sequences.py')
      - description: "List comprehension produces [0, 2, 4, 6, 8]"
        command: |
          import os; os.chdir('/tutorial')
          output = __run_capture('/tutorial/sequences.py')
          assert '[0, 2, 4, 6, 8]' in output, \
              f"Expected '[0, 2, 4, 6, 8]' in output, got: {repr(output)}"
        hints:
          - text: "Use `evens = [2*x for x in range(5)]`. `range(5)` gives 0, 1, 2, 3, 4 — doubling each gives 0, 2, 4, 6, 8."
      - description: "min is 0, max is 8, sum is 20"
        command: |
          import os; os.chdir('/tutorial')
          output = __run_capture('/tutorial/sequences.py')
          lines = output.strip().splitlines()
          assert '0' in lines, f"Expected min output '0' on its own line, got: {repr(output)}"
          assert '8' in lines, f"Expected max output '8' on its own line, got: {repr(output)}"
          assert '20' in lines, f"Expected sum output '20' on its own line, got: {repr(output)}"
        hints:
          - text: "Call `print(min(evens))`, `print(max(evens))`, and `print(sum(evens))` — three separate `print()` calls, no import needed."
      - description: "Swap produces 'After swap:  a=2, b=0'"
        command: |
          import os; os.chdir('/tutorial')
          output = __run_capture('/tutorial/sequences.py')
          assert 'Before swap: a=0, b=2' in output, \
              f"Expected 'Before swap: a=0, b=2' in output, got: {repr(output)}"
          assert 'After swap:  a=2, b=0' in output, \
              f"Expected 'After swap:  a=2, b=0' in output, got: {repr(output)}"
        hints:
          - text: "Unpack with `[a, b] = [evens[0], evens[1]]` to get `a=0, b=2`. Then swap with `a, b = b, a`. Python evaluates the right side before assigning, so both values are captured before either is overwritten."

    quiz:
      title: "Sequences — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            How many elements does `range(1, 10)` contain, and what is the last value?
          type: single
          options:
            - "10 elements — last value is 10"
            - "9 elements — last value is 9"
            - "10 elements — last value is 9"
            - "9 elements — last value is 10"
          correct_index: 1
          explanation: |
            `range(start, end)` generates integers from `start` up to **`end - 1`**.
            `range(1, 10)` → 1, 2, 3, …, 9 — that is 9 elements, and the last value is 9.
            The upper bound is always **exclusive** — the same convention Python uses for slice notation.

        - question: |
            What does `[2*x for x in range(4)]` evaluate to?
          type: single
          options:
            - "`[2, 4, 6, 8]`"
            - "`[0, 2, 4, 6]`"
            - "`[1, 2, 3, 4]`"
            - "`[0, 2, 4, 6, 8]`"
          correct_index: 1
          explanation: |
            `range(4)` is short for `range(0, 4)`, generating 0, 1, 2, 3 (default start is 0).
            The expression `2*x` doubles each value: 0→0, 1→2, 2→4, 3→6.
            Result: `[0, 2, 4, 6]`.

        - question: |
            After the following two lines, what are the values of `a` and `b`?
            ```python
            [a, b] = [10, 20]
            a, b = b, a
            ```
          type: single
          options:
            - "`a = 10, b = 20` — the swap has no effect without a temporary variable"
            - "`a = 20, b = 10` — Python evaluates the right-hand side before assigning"
            - "`a = 20, b = 20` — both variables receive the larger value"
            - "A `SyntaxError` — multiple assignment on one line is not allowed"
          correct_index: 1
          explanation: |
            Python evaluates the entire right-hand side of `a, b = b, a` **first**, capturing
            `(b, a)` = `(20, 10)` as a temporary tuple, then assigns `a=20` and `b=10`
            simultaneously. No explicit temporary variable is needed — this is one of Python's
            most convenient syntactic-sugar features.

  # --------------------------------------------------------------------------
  # STEP 3 — Classes and __str__
  # --------------------------------------------------------------------------
  - title: "Classes and __str__"
    instructions: |
      > **Learning objective:** After this step you will be able to **define** a Python class with `__init__` and `__str__`, and **explain** how `print()`, `str()`, and f-strings all invoke `__str__` automatically.

      ## Python classes

      ```python
      class Point:
          def __init__(self, x, y):  # constructor
              self.x = x    # instance attribute
              self.y = y

          def __str__(self):        # string representation
              return f'Point({self.x}, {self.y})'

      p = Point(3, 4)
      print(p)            # Point(3, 4)
      print(str(p))       # Point(3, 4)
      print(f"At: {p}")   # At: Point(3, 4)
      ```

      | Dunder method | Called automatically by |
      |---|---|
      | `__init__` | `Point(3, 4)` — object construction |
      | `__str__` | `print(obj)`, `str(obj)`, and f-strings `f"{obj}"` |

      All instance methods receive `self` as the first parameter — Python passes the object
      automatically when you call a method on an instance.

      ### Task

      The starter code gives you the `Book` class with `__init__` already complete.

      1. **Add a `__str__` method** inside the class that returns the book as a formatted string:
         ```
         "<title>" by <author> (<year>)
         ```
         Use an f-string. Note the literal double-quotes around the title.

      2. **Create an instance** below the class:
         ```python
         my_book = Book("Pride and Prejudice", "Jane Austen", 1813)
         ```

      3. **Print it three ways** and observe that all three invoke `__str__` automatically:
         ```python
         print(my_book)                        # 1. via print()
         print(str(my_book))                   # 2. via str()
         print(f"The book is: {my_book}")      # 3. via f-string
         ```

      Expected output:
      ```
      "Pride and Prejudice" by Jane Austen (1813)
      "Pride and Prejudice" by Jane Austen (1813)
      The book is: "Pride and Prejudice" by Jane Austen (1813)
      ```

    files:
      - path: "book.py"
        content: |
          class Book:
              """Represents a book with a title and an author."""

              def __init__(self, title, author, year):
                  self.title = title
                  self.author = author
                  self.year = year

              # Add your __str__ method here

          # Create an instance of the class
          my_book = Book("Pride and Prejudice", "Jane Austen", 1813)

          # Print my_book three ways below
        language: "python"

    open_file: "book.py"

    setup_commands:
      - "import os; os.chdir('/tutorial')"

    solution:
      files:
        - path: "book.py"
          content: |
            class Book:
                """Represents a book with a title and an author."""

                def __init__(self, title, author, year):
                    self.title = title
                    self.author = author
                    self.year = year

                def __str__(self):
                    """
                    Implements the str() operator (the user-friendly string representation).
                    This is what print() calls.
                    """
                    return f'"{self.title}" by {self.author} ({self.year})'

            # Create an instance of the class
            my_book = Book("Pride and Prejudice", "Jane Austen", 1813)

            # 1. Using print()
            print(my_book)

            # 2. Using the str() function explicitly
            print(str(my_book))

            # 3. Using in an f-string
            print(f"The book is: {my_book}")
          language: "python"
      explanation: |
        **Why this is correct:**

        - **`__str__(self)`:** Must be defined inside the class at the same indentation level as `__init__`. It takes only `self` and must `return` a string. Python calls it automatically whenever the object needs to be converted to a string.
        - **`return f'"{self.title}" by {self.author} ({self.year})'`:** The outer single quotes delimit the f-string; the `\"` inside produce literal double-quote characters around the title. `self.title`, `self.author`, and `self.year` are the instance attributes set in `__init__`.
        - **`__init__(self, title, author, year)`:** Called automatically when you write `Book("Pride and Prejudice", "Jane Austen", 1813)`. Stores the three values as instance attributes on `self`.
        - **All three print calls produce the same line** (modulo the `The book is:` prefix) because all three trigger `__str__`: `print(my_book)` implicitly, `str(my_book)` explicitly, and `f"{my_book}"` as part of f-string interpolation.

    tests:
      - description: "Script runs without errors"
        command: |
          import os; os.chdir('/tutorial')
          output = __run_capture('/tutorial/book.py')
        hints:
          - text: "Make sure `__str__` is defined inside the class (indented at the same level as `__init__`) and that it `return`s a string."
      - description: "Defined a __str__ method"
        command: |
          source = open('/tutorial/book.py').read()
          assert 'def __str__' in source, "Add a `__str__` method inside the Book class."
        hints:
          - text: "Add `def __str__(self):` inside the `Book` class, at the same indent level as `def __init__`. It should return the formatted string using an f-string."
      - description: "print(my_book) produces the correct string"
        command: |
          import os; os.chdir('/tutorial')
          output = __run_capture('/tutorial/book.py')
          expected = '"Pride and Prejudice" by Jane Austen (1813)'
          assert output.count(expected) >= 3, \
              f"Expected '{expected}' to appear at least 3 times in output, got: {repr(output)}"
        hints:
          - text: "Check the `__str__` return value: it should be `f'\"{self.title}\" by {self.author} ({self.year})'`. Make sure all three print statements use `my_book`."
      - description: "f-string output contains 'The book is:'"
        command: |
          import os; os.chdir('/tutorial')
          output = __run_capture('/tutorial/book.py')
          assert 'The book is:' in output, \
              f"Expected 'The book is:' in output, got: {repr(output)}"
        hints:
          - text: "The third print should be `print(f\"The book is: {my_book}\")`. When an object appears in `{}` in an f-string, Python calls `str()` on it, which calls `__str__`."

    quiz:
      title: "Classes — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            Without a `__str__` method, what does `print(my_book)` display?
          type: single
          options:
            - "Nothing — `print()` skips objects that have no string representation"
            - "A memory address like `<__main__.Book object at 0x10b3c2f50>`"
            - "The `__init__` parameter names: `title, author, year`"
            - "A `TypeError` because `print()` cannot handle class instances"
          correct_index: 1
          explanation: |
            Without `__str__`, Python falls back to the default object representation:
            `<__main__.Book object at 0x...>`. Defining `__str__` replaces this with a
            human-readable string. `print()` always calls `str(obj)` on its arguments — it
            never raises `TypeError` for an object that lacks `__str__`.

        - question: |
            All three calls below produce `"Pride and Prejudice" by Jane Austen (1813)`.
            What do they have in common?
            ```python
            print(my_book)
            print(str(my_book))
            print(f"The book is: {my_book}")  # ignoring prefix
            ```
          type: single
          options:
            - "They all call `repr(my_book)` to get the string"
            - "They all ultimately invoke `my_book.__str__()` to convert the object to a string"
            - "They all call `my_book.__init__()` to re-read the stored values"
            - "They produce identical output only when `__repr__` equals `__str__`"
          correct_index: 1
          explanation: |
            All three routes lead to `__str__`: `print(obj)` → `str(obj)` → `obj.__str__()`;
            `str(obj)` is the same path; and f-strings call `str()` on each interpolated value
            automatically. Defining `__str__` once gives you consistent, readable output
            across every Python construct that converts an object to a string.

        - question: |
            A student writes `__str__` like this:
            ```python
            def __str__(self):
                f'"{self.title}" by {self.author} ({self.year})'
            ```
            `print(my_book)` outputs `None`. What is the bug?
          type: single
          options:
            - "The f-string uses single quotes — it must use double quotes"
            - "The method has no `return` statement, so Python implicitly returns `None`; `print(None)` prints `None`"
            - "`__str__` cannot use f-strings — it must use `.format()` or `%` formatting"
            - "`self.title` is not accessible inside `__str__` — only `__init__` can read instance attributes"
          correct_index: 1
          explanation: |
            A function with no `return` statement always returns `None`. The f-string expression
            `f'...'` is evaluated but its value is thrown away. Adding `return` fixes it:
            `return f'"{self.title}" by {self.author} ({self.year})'`. This is a very common
            mistake — the f-string looks complete, but without `return` it produces nothing.

  # --------------------------------------------------------------------------
  # STEP 4 — Named Groups: Regex on a Requirements Document
  # --------------------------------------------------------------------------
  - title: "Named Groups: Regex on a Requirements Document"
    instructions: |
      > **Learning objective:** After this step you will be able to **apply** named capture groups, `re.compile()`, and `re.finditer()` to extract structured data from an HTML requirements document.

      ## Named capture groups

      So far you have used patterns that match a region of text and return the entire match.
      **Named groups** let you label sub-parts of a match and retrieve them by name:

      ```python
      import re

      text = "Error 404: page not found"

      m = re.search(r'Error (?P<code>\d+)', text)
      if m:
          print(m.group('code'))   # '404'
      ```

      The syntax `(?P<name>...)` is identical to a regular group `(...)` but each captured
      sub-string can be retrieved by name with `m.group('name')`.

      ## `re.compile()` + `re.finditer()`

      `re.compile(pattern, flags)` pre-compiles a pattern into a reusable object.
      Its `.finditer()` method returns an iterator of **match objects** so you can
      access named groups from each result:

      ```python
      text = "apple costs $1.20, banana costs $0.45"

      pattern = re.compile(r'(?P<fruit>\w+) costs \$(?P<price>[\d.]+)')
      for m in pattern.finditer(text):
          print(m.group('fruit'), '→', m.group('price'))
      # apple → 1.20
      # banana → 0.45
      ```

      ## New flag: `re.MULTILINE`

      By default, `^` matches only the very start of the whole string. Pass `re.MULTILINE`
      to `re.compile()` to make `^` match the start of **every line**:

      ```python
      text = "line one\nAs a user, I want X so that Y\nline three"

      # Without re.MULTILINE — ^ only anchors to the start of the string — no match
      pattern = re.compile(r'^As an? (?P<user>.+), I want to .+ so that .+')
      print(list(pattern.finditer(text)))   # []

      # With re.MULTILINE — ^ anchors to the start of each line
      pattern = re.compile(r'^As an? (?P<user>.+), I want to .+ so that .+', re.MULTILINE)
      for m in pattern.finditer(text):
          print(m.group('user'))   # user
      ```

      ## Matching across lines with `\n`

      A plain `.` does **not** match a newline. To span multiple lines, include `\n` explicitly:

      ```python
      text = "Given X is true\n    When Y happens\n    Then Z occurs"

      pattern = re.compile(r'Given (?P<given>.+)\n.* When (?P<when>.+)\n*.* Then (?P<then>.+)', re.MULTILINE)
      for m in pattern.finditer(text):
          print(m.group('given'), '/', m.group('when'), '/', m.group('then'))
      ```

      ### Task

      The starter file reads `requirements.html` into `content` and provides a `match_regex`
      helper that applies `re.MULTILINE` automatically. Define the four patterns and call
      `match_regex` to find:

      1. **User stories** — lines starting with `As a/an …, I want to … so that …`
         Pattern: `r'^As an? (?P<user>.+), I want to (?P<action>.+) so that (?P<reason>.+)'`
         Print: `User stories: <count>` then each `user` group on its own indented line

      2. **Headings** — all `<h1>…</h1>` tags
         Pattern: `r'<h1>(?P<heading>.+)</h1>'`
         Print: `Headings: <count>` then each heading text on its own indented line

      3. **Acceptance criteria** — three-line Given/When/Then blocks
         Pattern: `r'Given (?P<given>.+)\n.* When (?P<when>.+)\n*.* Then (?P<then>.+)'`
         Print: `Acceptance criteria: <count>` then for each: `Given:`, `When:`, `Then:` lines

      4. **File references** — things like `.pdf file`, `.zip file`
         Pattern: `r'(?P<ext>\.\w+) file'`
         Print: `File references: <count>` then each extension on its own indented line

