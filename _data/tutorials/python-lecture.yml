    solution:
      files:
        - path: "html_parser.py"
          content: |
            import re

            USER_REGEX     = r'^As an? (?P<user>.+), I want to (?P<action>.+) so that (?P<reason>.+)'
            HEADING_REGEX  = r'<h1>(?P<heading>.+)</h1>'
            CRITERIA_REGEX = r'Given (?P<given>.+)\n.* When (?P<when>.+)\n*.* Then (?P<then>.+)'
            FILE_REGEX     = r'(?P<ext>\.\w+) file'

            def match_regex(pattern):
                # re.MULTILINE makes ^ match the start of each line
                compiled_pattern = re.compile(pattern, re.MULTILINE)
                return list(compiled_pattern.finditer(content))

            with open('requirements.html', 'r', encoding='utf-8') as f:
                content = f.read()

            # 1. User stories
            user_matches = match_regex(USER_REGEX)
            print(f"User stories: {len(user_matches)}")
            for m in user_matches:
                print(f"  {m.group('user')}")

            # 2. Headings
            heading_matches = match_regex(HEADING_REGEX)
            print(f"Headings: {len(heading_matches)}")
            for m in heading_matches:
                print(f"  {m.group('heading')}")

            # 3. Acceptance criteria
            criteria_matches = match_regex(CRITERIA_REGEX)
            print(f"Acceptance criteria: {len(criteria_matches)}")
            for m in criteria_matches:
                print(f"  Given: {m.group('given')}")
                print(f"  When:  {m.group('when')}")
                print(f"  Then:  {m.group('then')}")

            # 4. File references
            file_matches = match_regex(FILE_REGEX)
            print(f"File references: {len(file_matches)}")
            for m in file_matches:
                print(f"  {m.group('ext')}")
          language: "python"
      explanation: |
        **Why this is correct:**

        - **`re.compile(pattern, re.MULTILINE)` in `match_regex`:** Pre-compiling the pattern with `re.compile()` produces a reusable compiled object. Passing `re.MULTILINE` makes `^` anchor to the start of every line, not just the start of the whole string — essential for the user-story pattern. For patterns without `^` the flag is harmless.
        - **`USER_REGEX` — `r'^As an? (?P<user>.+), I want to (?P<action>.+) so that (?P<reason>.+)'`:** `an?` matches `a` or `an`. Three named groups capture the role (`user`), the desired capability (`action`), and the business rationale (`reason`). There are 5 matching lines.
        - **`HEADING_REGEX` — `r'<h1>(?P<heading>.+)</h1>'`:** `.+` matches one or more characters between the tags. Because `.` doesn't match newlines, the pattern correctly stops at the end of each single-line heading. There are 5 `<h1>` elements.
        - **`CRITERIA_REGEX` — `r'Given (?P<given>.+)\n.* When (?P<when>.+)\n*.* Then (?P<then>.+)'`:** Explicit `\n` crosses line boundaries. `.*` before `When` and `Then` absorbs any leading whitespace (the 4-space indent). `\n*` between the `When` and `Then` clauses tolerates any number of blank lines between them. There are 7 Given/When/Then blocks.
        - **`FILE_REGEX` — `r'(?P<ext>\.\w+) file'`:** `\.` matches a literal dot (unescaped `.` would match any character). `\w+` matches the extension. The named group `ext` captures `.zip`, `.pdf`, `.jpg`. There are 3 file references.
        - **`re.finditer()` vs `re.findall()`:** `re.finditer()` yields match objects, giving access to named groups via `m.group('name')`. `re.findall()` with groups returns tuples of raw strings in group order, discarding the names.

