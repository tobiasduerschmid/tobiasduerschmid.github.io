  # STEP 3 — "Building Observer: Step by Step"
  # Pedagogy:
  #   Faded Worked Example — Subject is complete, students fill in observers.
  #   Sub-goal Labeling — numbered TODOs guide each sub-task.
  #   UML Inference — students see the class diagram build up as they code.
  #   Bloom's level — Understand (roles), Apply (implement).
