      files:
        - path: "observer_basics.py"
          content: |
            from abc import ABC, abstractmethod


            class Subject:
                """Base class for observable objects."""

                def __init__(self) -> None:
                    self._observers: list = []

                def attach(self, observer: 'Observer') -> None:
                    if observer not in self._observers:
                        self._observers.append(observer)
                        print(f"  Attached: {type(observer).__name__}")

                def detach(self, observer: 'Observer') -> None:
                    self._observers.remove(observer)
                    print(f"  Detached: {type(observer).__name__}")

                def notify(self) -> None:
                    for observer in self._observers:
                        observer.update(self)


            class Observer(ABC):
                @abstractmethod
                def update(self, subject: Subject) -> None:
                    pass


            class TemperatureSensor(Subject):
                def __init__(self) -> None:
                    super().__init__()
                    self._temperature: float = 0.0

                @property
                def temperature(self) -> float:
                    return self._temperature

                @temperature.setter
                def temperature(self, value: float) -> None:
                    self._temperature = value
                    print(f"\nSensor: Temperature set to {value}°F")
                    self.notify()


            class TemperatureLogger(Observer):
                def __init__(self) -> None:
                    self.readings: list[float] = []

                def update(self, subject: Subject) -> None:
                    temp = subject.temperature
                    self.readings.append(temp)
                    print(f"Logger: Recorded {temp}°F")


            class TemperatureAlert(Observer):
                def __init__(self, threshold: float = 90.0) -> None:
                    self.threshold: float = threshold

                def update(self, subject: Subject) -> None:
                    temp = subject.temperature
                    if temp > self.threshold:
                        print(f"ALERT: Temperature {temp}°F exceeds {self.threshold}°F!")
                    else:
                        print(f"Alert: {temp}°F is within safe range")


            def main() -> None:
                sensor = TemperatureSensor()
                logger = TemperatureLogger()
                alert = TemperatureAlert(threshold=90)

                sensor.attach(logger)
                sensor.attach(alert)

                sensor.temperature = 72
                sensor.temperature = 95
                sensor.temperature = 68


            if __name__ == "__main__":
                main()
          language: "python"
      explanation: |
        **How the Observer pattern works here:**

        1. `TemperatureSensor` inherits from `Subject`, gaining `attach()`, `detach()`, and `notify()`
        2. When you set `sensor.temperature = 72`, the property setter stores the value and calls `self.notify()`
        3. `notify()` iterates through all registered observers and calls `update(self)` on each
        4. Each observer's `update()` reads `subject.temperature` — this is the **Pull model** (observers pull data they need)

        **Key insight:** The sensor never imports, creates, or names `TemperatureLogger` or `TemperatureAlert`. It only knows the `Observer` interface. Check the UML diagram: the sensor connects to `Observer` (abstract), not to concrete classes.

