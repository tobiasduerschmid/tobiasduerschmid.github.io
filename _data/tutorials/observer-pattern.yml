title: "The Observer Pattern: Stop Hard-Coding Your Dependencies"
description: "Learn the most widely used behavioral design pattern by experiencing the pain of tightly coupled code first, then discovering how the Observer pattern makes your systems flexible and extensible. You will refactor a broken weather station into clean, decoupled architecture — guided by UML diagrams that update live as you code."

backend: pyodide
uml_diagram: true
require_tests: true
autosave_type: files

setup_commands:
  - "import sys; sys.path.insert(0, '/tutorial'); import abc"

steps:

  # --------------------------------------------------------------------------
  # STEP 1 — "When One Display Breaks the Whole System"
  # Pedagogy:
  #   Productive Failure (DIRR: Design-Implement phase) — students struggle
  #     with tightly coupled code on purpose.
  #   Growth Mindset — errors are expected and the point of the exercise.
  #   UML Inference — students see tight coupling visualized in the diagram.
  #   Bloom's level — Apply (add a class), Analyze (quiz on coupling).
  # --------------------------------------------------------------------------
  - title: "When One Display Breaks the Whole System"
    instructions: |
      ## The Scenario

      > **Learning objective:** After this step you will be able to **identify** the symptoms of tightly coupled code and **explain** why direct dependencies create maintenance headaches.

      You work at a weather company. Your `WeatherStation` collects temperature, humidity, and pressure data from sensors, and updates three displays:

      | Display | What it shows |
      |---|---|
      | **CurrentDisplay** | Current temperature and humidity |
      | **StatisticsDisplay** | Average, min, and max temperature |
      | **ForecastDisplay** | Weather forecast based on pressure |

      ### The Architecture Problem

      Look at the **UML Diagram** tab (bottom-right). Notice how `WeatherStation` has direct arrows to every single display. That means the station **hard-codes** every display it talks to:

      <div class="uml-class-diagram-container" data-uml-type="class" data-uml-spec='@startuml
      skinparam classAttributeIconSize 0
      class WeatherStation {
        + current: CurrentDisplay
        + stats: StatisticsDisplay
        + forecast: ForecastDisplay
        + new_measurement(temp, humidity, pressure)
      }
      class CurrentDisplay {
        + show(temp, humidity, pressure)
      }
      class StatisticsDisplay {
        - _temps: list
        + show(temp, humidity, pressure)
      }
      class ForecastDisplay {
        - _last_pressure: float
        + show(temp, humidity, pressure)
      }
      WeatherStation --> CurrentDisplay : creates and calls
      WeatherStation --> StatisticsDisplay : creates and calls
      WeatherStation --> ForecastDisplay : creates and calls
      note right of WeatherStation : Every display is a\ndirect dependency.\nAdding one = editing this class.
      @enduml'></div>

      The code works. Ship it, right? Not so fast. Your manager just dropped a new requirement:

      > **"Add a Heat Index Display that shows the computed heat index based on temperature and humidity."**

      ### Your Task

      Open `weather_station.py` and:

      1. **Create a `HeatIndexDisplay` class** with a `show(self, temp, humidity, pressure)` method. Use this simplified formula:
         ```
         heat_index = temp - 0.55 * (1 - humidity/100) * (temp - 58)
         ```
         Print: `[Heat]     Heat Index: {value:.1f}°F`

      2. **Integrate it into `WeatherStation`** so it gets called whenever new data arrives.

      3. **Run the code** and verify all four displays update.

      ### What to Notice

      Pay attention to **how many places you had to change** just to add one new display. Count them. Then check the **UML Diagram** tab — watch the new dependency arrow appear. That observation is the entire point of this exercise.

      ### Errors Are Expected

      If something breaks, good — that is the lesson. Tightly coupled code resists change. Read the error messages and fix them.

    uml_files:
      - weather_station.py

    files:
      - path: "weather_station.py"
        content: |
          class CurrentDisplay:
              """Shows current temperature and humidity."""

              def show(self, temp: float, humidity: float, pressure: float) -> None:
                  print(f"[Current]  {temp}°F, {humidity}% humidity")


          class StatisticsDisplay:
              """Shows average, min, max temperature."""

              def __init__(self) -> None:
                  self._temps: list[float] = []

              def show(self, temp: float, humidity: float, pressure: float) -> None:
                  self._temps.append(temp)
                  avg = sum(self._temps) / len(self._temps)
                  lo, hi = min(self._temps), max(self._temps)
                  print(f"[Stats]    Avg={avg:.1f}°F  Min={lo}°F  Max={hi}°F")


          class ForecastDisplay:
              """Shows forecast based on pressure changes."""

              def __init__(self) -> None:
                  self._last_pressure: float = 0.0

              def show(self, temp: float, humidity: float, pressure: float) -> None:
                  if pressure > self._last_pressure:
                      outlook = "Improving weather!"
                  elif pressure < self._last_pressure:
                      outlook = "Cooler, rainy weather"
                  else:
                      outlook = "More of the same"
                  self._last_pressure = pressure
                  print(f"[Forecast] {outlook}")


          class WeatherStation:
              """Collects weather data and updates all displays.

              NOTICE: This class directly creates and calls every display.
              To add a new display, you must modify THIS class."""

              def __init__(self) -> None:
                  self.current: CurrentDisplay = CurrentDisplay()
                  self.stats: StatisticsDisplay = StatisticsDisplay()
                  self.forecast: ForecastDisplay = ForecastDisplay()

              def new_measurement(self, temp: float, humidity: float, pressure: float) -> None:
                  """Called when sensors report new weather data."""
                  print(f"\n--- Measurement: {temp}°F, {humidity}%, {pressure} hPa ---")
                  self.current.show(temp, humidity, pressure)
                  self.stats.show(temp, humidity, pressure)
                  self.forecast.show(temp, humidity, pressure)


          # --- Demo ---
          if __name__ == "__main__":
              station = WeatherStation()
              station.new_measurement(80, 65, 1013.25)
              station.new_measurement(82, 70, 1012.50)
              station.new_measurement(78, 90, 1015.00)
        language: "python"

    open_file: "weather_station.py"

    solution:
      files:
        - path: "weather_station.py"
          content: |
            class CurrentDisplay:
                """Shows current temperature and humidity."""

                def show(self, temp: float, humidity: float, pressure: float) -> None:
                    print(f"[Current]  {temp}°F, {humidity}% humidity")


            class StatisticsDisplay:
                """Shows average, min, max temperature."""

                def __init__(self) -> None:
                    self._temps: list[float] = []

                def show(self, temp: float, humidity: float, pressure: float) -> None:
                    self._temps.append(temp)
                    avg = sum(self._temps) / len(self._temps)
                    lo, hi = min(self._temps), max(self._temps)
                    print(f"[Stats]    Avg={avg:.1f}°F  Min={lo}°F  Max={hi}°F")


            class ForecastDisplay:
                """Shows forecast based on pressure changes."""

                def __init__(self) -> None:
                    self._last_pressure: float = 0.0

                def show(self, temp: float, humidity: float, pressure: float) -> None:
                    if pressure > self._last_pressure:
                        outlook = "Improving weather!"
                    elif pressure < self._last_pressure:
                        outlook = "Cooler, rainy weather"
                    else:
                        outlook = "More of the same"
                    self._last_pressure = pressure
                    print(f"[Forecast] {outlook}")


            class HeatIndexDisplay:
                """Shows the computed heat index."""

                def show(self, temp: float, humidity: float, pressure: float) -> None:
                    heat_index = temp - 0.55 * (1 - humidity / 100) * (temp - 58)
                    print(f"[Heat]     Heat Index: {heat_index:.1f}°F")


            class WeatherStation:
                """Collects weather data and updates all displays."""

                def __init__(self) -> None:
                    self.current: CurrentDisplay = CurrentDisplay()
                    self.stats: StatisticsDisplay = StatisticsDisplay()
                    self.forecast: ForecastDisplay = ForecastDisplay()
                    self.heat_index: HeatIndexDisplay = HeatIndexDisplay()

                def new_measurement(self, temp: float, humidity: float, pressure: float) -> None:
                    """Called when sensors report new weather data."""
                    print(f"\n--- Measurement: {temp}°F, {humidity}%, {pressure} hPa ---")
                    self.current.show(temp, humidity, pressure)
                    self.stats.show(temp, humidity, pressure)
                    self.forecast.show(temp, humidity, pressure)
                    self.heat_index.show(temp, humidity, pressure)


            # --- Demo ---
            if __name__ == "__main__":
                station = WeatherStation()
                station.new_measurement(80, 65, 1013.25)
                station.new_measurement(82, 70, 1012.50)
                station.new_measurement(78, 90, 1015.00)
          language: "python"
      explanation: |
        **Why this matters:**

        To add ONE display, you changed `WeatherStation` in **two** places:
        1. `__init__` — create the new display
        2. `new_measurement` — call its `show()` method

        Check the UML diagram: there are now **four** dependency arrows from `WeatherStation`. Each one is a hard-coded coupling. Imagine 20 displays, or needing to add/remove displays at runtime. This design does not scale.

    tests:
      - description: "HeatIndexDisplay class exists with a show() method"
        command: |
          source = open('/tutorial/weather_station.py').read()
          ns = {}
          exec(source, ns)
          assert 'HeatIndexDisplay' in ns, \
              "Create a HeatIndexDisplay class in weather_station.py"
          display = ns['HeatIndexDisplay']()
          assert hasattr(display, 'show'), \
              "HeatIndexDisplay needs a show(self, temp, humidity, pressure) method"
        hints:
          - text: "Create a new class called `HeatIndexDisplay` with a `show(self, temp, humidity, pressure)` method. Use the formula: `heat_index = temp - 0.55 * (1 - humidity/100) * (temp - 58)`"
            condition: "default"

      - description: "HeatIndexDisplay computes the heat index correctly"
        command: |
          source = open('/tutorial/weather_station.py').read()
          ns = {}
          exec(source, ns)
          import io, contextlib
          d = ns['HeatIndexDisplay']()
          buf = io.StringIO()
          with contextlib.redirect_stdout(buf):
              d.show(80, 65, 1013.25)
          out = buf.getvalue()
          assert "Heat Index" in out, \
              "show() should print something containing 'Heat Index'"
          expected = 80 - 0.55 * (1 - 65/100) * (80 - 58)
          assert f"{expected:.1f}" in out, \
              f"Expected heat index of {expected:.1f}°F for temp=80, humidity=65"
        hints:
          - text: "The formula is: `heat_index = temp - 0.55 * (1 - humidity/100) * (temp - 58)`. Print with: `print(f'[Heat]     Heat Index: {heat_index:.1f}°F')`"
            condition: "default"

      - description: "WeatherStation calls HeatIndexDisplay on new measurements"
        command: |
          source = open('/tutorial/weather_station.py').read()
          ns = {}
          exec(source, ns)
          import io, contextlib
          station = ns['WeatherStation']()
          buf = io.StringIO()
          with contextlib.redirect_stdout(buf):
              station.new_measurement(80, 65, 1013.25)
          out = buf.getvalue()
          assert "Heat Index" in out, \
              "WeatherStation.new_measurement() should also update HeatIndexDisplay. Did you add it to __init__ AND new_measurement()?"
        hints:
          - text: "You need to modify WeatherStation in TWO places: (1) create a `HeatIndexDisplay` in `__init__`, and (2) call its `show()` method in `new_measurement()`. That is the pain point — notice how adding one display forces you to edit the station itself."
            condition: "default"

    quiz:
      title: "Tight Coupling — What Went Wrong?"
      min_score: 0.6
      shuffle: true
      questions:

        - question: |
            How many places in `WeatherStation` did you have to modify to add the HeatIndexDisplay?
          type: single
          options:
            - "0 — I just created the new class"
            - "1 — I only changed new_measurement()"
            - "2 — I changed both __init__() and new_measurement()"
            - "3 — I changed __init__(), new_measurement(), and added a new method"
          correct_index: 2
          explanation: |
            You had to modify `WeatherStation` in **two** places: creating the display in `__init__()` and calling it in `new_measurement()`. This means the station is **tightly coupled** to every display it serves. Look at the UML diagram — every arrow from WeatherStation is a dependency that makes the system harder to change.

        - question: |
            What is **tight coupling** in software design?
          type: single
          options:
            - "When classes are defined in the same file"
            - "When one class directly depends on the specific identity and interface of another class"
            - "When you use too many classes in your program"
            - "When your code has too many comments"
          correct_index: 1
          explanation: |
            Tight coupling means a class directly depends on the concrete details of other classes. In our weather station, the station *directly knows* about `CurrentDisplay`, `StatisticsDisplay`, `ForecastDisplay`, and now `HeatIndexDisplay` — by name, by type, by how they work. Change or remove any display, and you must edit the station.

        - question: |
            If a product manager asks you to remove the ForecastDisplay from the current version, what do you have to change?
          type: single
          options:
            - "Just delete the ForecastDisplay class — nothing else"
            - "Delete the class AND remove two lines from WeatherStation (__init__ and new_measurement)"
            - "You cannot remove it without rewriting the whole program"
            - "Just set forecast = None in __init__"
          correct_index: 1
          explanation: |
            Because the station directly references the forecast display, you cannot just delete the class — you would get a `NameError`. You must also clean up the two references in `WeatherStation`. This is the maintenance tax of tight coupling: every addition or removal forces you to edit the core class.

        - question: |
            Imagine the weather station needs to support 50 different display types, and users can enable or disable them while the program is running. What fundamental problem does the current design have?
          type: single
          options:
            - "Python can only handle up to 10 objects at once"
            - "The station would need 50 explicit references and 50 explicit method calls, and you cannot add or remove them at runtime"
            - "Each display would need its own weather station instance"
            - "The current design would actually work fine for 50 displays"
          correct_index: 1
          explanation: |
            With 50 displays, the station's `__init__` would have 50 lines creating displays, and `new_measurement` would have 50 lines calling them. Worse, you cannot add or remove displays while the program is running — everything is hard-coded at construction time. The station *should not care* how many displays exist or what they do.


  # --------------------------------------------------------------------------
  # STEP 2 — "Design Patterns: A Shared Vocabulary"
  # Pedagogy:
  #   Constructivism — anchor abstract pattern in YouTube subscription schema.
  #   PRIMM: Predict-Run — students predict output before running.
  #   Cognitive scaffolding — conceptual before procedural.
  #   Bloom's level — Remember (vocabulary), Understand (analogy).
  # --------------------------------------------------------------------------
  - title: "Design Patterns: A Shared Vocabulary"
    instructions: |
      ## What Are Design Patterns?

      > **Learning objective:** After this step you will be able to **define** what a design pattern is and **describe** the Observer pattern using a real-world analogy and its UML structure.

      ### The YouTube Analogy

      Think about how YouTube notifications work:

      1. A **creator** (like MrBeast) uploads a new video
      2. All **subscribers** automatically get notified
      3. The creator does not need to know who the subscribers are or what they will do
      4. Subscribers can **subscribe** or **unsubscribe** at any time without the creator changing anything

      This is exactly the **Observer Design Pattern**:

      | YouTube | Observer Pattern | Weather Station |
      |---|---|---|
      | Channel (MrBeast) | **Subject** | WeatherStation |
      | "Upload" event | **State change** | `new_measurement()` |
      | Subscribers | **Observers** | Display objects |
      | Subscribe button | **`attach()`** | Register a display |
      | Unsubscribe | **`detach()`** | Remove a display |
      | Push notification | **`notify()`** | Call `update()` on all displays |

      ### What Is a "Design Pattern"?

      A **design pattern** is a proven, reusable solution to a common software design problem. Design patterns are not code you copy-paste — they are **blueprints** for structuring your classes and objects to solve specific types of architectural problems.

      The most famous catalog comes from the 1994 book *Design Patterns* by Gamma, Helm, Johnson, and Vlissides — the **Gang of Four (GoF)**. They cataloged 23 patterns in three categories:

      | Category | What It Solves | Examples |
      |---|---|---|
      | **Creational** | How objects are created | Factory, Singleton, Builder |
      | **Structural** | How objects are composed | Adapter, Decorator, Facade |
      | **Behavioral** | How objects communicate | **Observer**, Strategy, State |

      The Observer is a **behavioral** pattern — it defines how objects talk to each other in a loosely coupled way.

      ### The Observer Pattern in UML

      Here is the formal structure. Compare this to the tightly coupled diagram from Step 1 — notice how `Subject` no longer points to specific concrete observers:

      <div class="uml-class-diagram-container" data-uml-type="class" data-uml-spec='@startuml
      skinparam classAttributeIconSize 0
      abstract class Subject {
        - _observers: list
        + attach(observer: Observer)
        + detach(observer: Observer)
        + notify()
      }
      abstract class Observer {
        + {abstract} update(subject: Subject)
      }
      class ConcreteSubject {
        - _state
        + get_state()
        + set_state(value)
      }
      class ConcreteObserverA {
        + update(subject: Subject)
      }
      class ConcreteObserverB {
        + update(subject: Subject)
      }
      Subject o--> "0..*" Observer : notifies
      ConcreteSubject --|> Subject
      ConcreteObserverA ..|> Observer
      ConcreteObserverB ..|> Observer
      note bottom of Subject : Only knows the Observer\ninterface — NOT concrete types
      note bottom of Observer : Dashed arrows = implements.\nAny class can become an observer.
      @enduml'></div>

      **Key UML relationships:**
      - **Solid line with open triangle** (`--|>`) = inheritance ("is-a")
      - **Dashed line with open triangle** (`..|>`) = implements interface
      - **Diamond arrow** (`o-->`) = aggregation ("has-a", loosely owned)

      ### Polling vs. Notification

      An alternative to Observer is **polling** — each display repeatedly asks the station "has anything changed?" This is like refreshing a web page over and over instead of getting push notifications. It works, but wastes resources and introduces delays.

      ### Predict Before You Run

      Look at `pattern_preview.py`. Before running it, **predict**:
      1. How many times will "Data changed!" print?
      2. Will `DashboardA` always print before `DashboardB`?

      Run it to check your predictions.

    files:
      - path: "pattern_preview.py"
        content: |
          # A tiny preview of the Observer pattern in action.
          # PREDICT: What will this print? In what order?

          class DataSource:
              """A simple Subject that notifies observers."""

              def __init__(self) -> None:
                  self._observers: list = []
                  self._value: int = 0

              def attach(self, observer) -> None:
                  self._observers.append(observer)

              def set_value(self, new_value: int) -> None:
                  self._value = new_value
                  print(f"Data changed! New value: {self._value}")
                  for obs in self._observers:
                      obs.update(self._value)


          class DashboardA:
              def update(self, value: int) -> None:
                  print(f"  Dashboard A sees: {value}")


          class DashboardB:
              def update(self, value: int) -> None:
                  print(f"  Dashboard B sees: {value * 2} (doubled)")


          source = DataSource()
          source.attach(DashboardA())
          source.attach(DashboardB())

          source.set_value(10)
          source.set_value(20)
        language: "python"

    open_file: "pattern_preview.py"

    tests:
      - description: "You ran the preview and observed the output"
        command: |
          import io, contextlib
          source = open('/tutorial/pattern_preview.py').read()
          ns = {}
          buf = io.StringIO()
          with contextlib.redirect_stdout(buf):
              exec(source, ns)
          out = buf.getvalue()
          assert "Dashboard A sees: 10" in out, "Run pattern_preview.py to see the Observer pattern in action"
          assert "Dashboard B sees: 40" in out, "DashboardB should double the value: 20 * 2 = 40"

    quiz:
      title: "Observer Concepts — Knowledge Check"
      min_score: 0.6
      shuffle: true
      questions:

        - question: |
            In the Observer pattern, the **Subject** is:
          type: single
          options:
            - "The object that watches for changes and reacts to them"
            - "The object that holds state and notifies others when it changes"
            - "A base class that all patterns must inherit from"
            - "The main() function that starts the program"
          correct_index: 1
          explanation: |
            The **Subject** holds state. When its state changes, it notifies all registered observers. In the YouTube analogy, it is the channel creator. In the UML diagram, the Subject has `attach()`, `detach()`, and `notify()` methods and maintains a list of Observer references.

        - question: |
            Why is the Observer pattern better than **polling** (each display repeatedly checking the station for changes)?
          type: single
          options:
            - "Polling is actually better because it is simpler"
            - "Observer uses less memory"
            - "Observer eliminates wasted checks — displays react only when data actually changes"
            - "Polling does not work in Python"
          correct_index: 2
          explanation: |
            Polling wastes CPU cycles checking for changes that have not happened yet. With Observer, the Subject pushes notifications exactly when state changes — no wasted work. This is like getting a push notification vs. manually refreshing your feed every 5 seconds.

        - question: |
            A design pattern is:
          type: single
          options:
            - "A specific block of code you copy-paste into every project"
            - "A proven blueprint for solving a common design problem, adapted to your specific context"
            - "A Python library you install with pip"
            - "A type of unit test"
          correct_index: 1
          explanation: |
            Design patterns are **not** copy-paste code or libraries. They are reusable solution blueprints — named, documented approaches to recurring design problems. You adapt them to your specific context. The GoF catalog describes 23 such patterns.

        - question: |
            In the UML diagram shown above, what does the **dashed line with an open triangle** from `ConcreteObserverA` to `Observer` mean?
          type: single
          options:
            - "ConcreteObserverA creates Observer objects"
            - "ConcreteObserverA implements the Observer interface"
            - "ConcreteObserverA contains an Observer"
            - "ConcreteObserverA deletes Observer objects"
          correct_index: 1
          explanation: |
            In UML, a **dashed arrow with an open triangle** (`..|>`) means "implements" or "realizes" an interface. `ConcreteObserverA` promises to provide the `update()` method declared in the `Observer` abstract class. A **solid** arrow with open triangle (`--|>`) means direct inheritance.

        - question: |
            Which category of GoF design patterns does the Observer belong to?
          type: single
          options:
            - "Creational — it creates objects"
            - "Structural — it composes objects"
            - "Behavioral — it defines how objects communicate"
            - "Architectural — it structures the entire application"
          correct_index: 2
          explanation: |
            Observer is a **behavioral** pattern because it defines how objects communicate: the Subject broadcasts state changes to registered Observers. Creational patterns (Factory, Builder) handle object creation. Structural patterns (Adapter, Decorator) handle object composition.


