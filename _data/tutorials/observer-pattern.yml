    quiz:
      title: "Design Judgment — Final Knowledge Check"
      min_score: 0.6
      shuffle: true
      questions:

        - question: |
            A developer learns Observer and starts using it for every function call. What is this anti-pattern called?
          type: single
          options:
            - "Premature optimization"
            - "Over-engineering — applying patterns where simple direct calls would suffice"
            - "Spaghetti code"
            - "This is actually good practice — patterns should be used everywhere"
          correct_index: 1
          explanation: |
            This is **over-engineering**, one of the most common mistakes after learning design patterns. Patterns add complexity (more classes, more indirection, harder debugging). They are worth it when the problem genuinely needs flexibility — but using Observer for a simple one-to-one method call is like using a sledgehammer to hang a picture frame.

        - question: |
            What is the **main trade-off** of the Observer pattern compared to direct method calls?
          type: single
          options:
            - "Observer is always slower"
            - "Observer makes the code shorter"
            - "Observer adds flexibility and decoupling, but makes control flow harder to trace and debug"
            - "Observer requires a database"
          correct_index: 2
          explanation: |
            The Observer pattern trades **traceability** for **flexibility**. You gain loose coupling (subject and observers evolve independently) and dynamic attach/detach. But you lose the ability to "follow the function call" from subject to observer — the indirection through the observer list makes control flow implicit. This matters during debugging.

        - question: |
            In the Pull model, `update(subject)` passes the entire subject. In the Push model, `update(temp=80, humidity=65)` passes data directly. Which statement is **correct**?
          type: single
          options:
            - "Push is always better because it is more efficient"
            - "Pull is always better because it is more flexible"
            - "Pull gives observers more flexibility (they choose what data to read), but creates more coupling to the subject API"
            - "There is no practical difference between Push and Pull"
          correct_index: 2
          explanation: |
            Both models have trade-offs. **Pull** is flexible (observers pick what they need) but couples them to the subject's getters. **Push** decouples observers from the subject (they just receive data) but the subject must guess what observers need. The choice depends on observer diversity — see the UML diagram comparing both approaches.

        - question: |
            You are debugging a bug where a UI widget shows stale data. The widget is an Observer of a data model. What is the MOST likely cause?
          type: single
          options:
            - "The widget was never attached to the subject"
            - "Python garbage collector deleted the observer"
            - "The Subject.notify() method calls observers in the wrong order"
            - "The Observer pattern does not support UI widgets"
          correct_index: 0
          explanation: |
            The most common Observer bug is forgetting to `attach()` the observer. If the widget was never registered, it never receives `update()` calls. Other common issues: (1) the widget was `detach()`-ed unintentionally, (2) the subject changed state but `notify()` was not called, or (3) the `update()` method has a bug.

        - question: |
            Consider this code:
            ```python
            station.attach(current_display)
            station.attach(stats_display)
            station.new_measurement(80, 65, 1013)
            ```
            Is `current_display` guaranteed to receive the update BEFORE `stats_display`?
          type: single
          options:
            - "Yes — observers are always notified in attachment order"
            - "No — the Observer pattern does NOT guarantee notification order"
            - "Yes — Python lists are always ordered, so it is guaranteed"
            - "It depends on the implementation — our list-based version preserves order, but the pattern itself makes no such guarantee"
          correct_index: 3
          explanation: |
            Our implementation uses a Python list, which preserves insertion order. But the **Observer pattern itself** does not guarantee order — different implementations might use sets, priority queues, or async dispatch. Your code should **never depend on notification order** between observers, because a future refactoring could change it.

        - question: |
            Looking at the UML diagrams from this tutorial, what is the most significant structural difference between the Step 1 (tightly coupled) and Step 4 (Observer) architectures?
          type: single
          options:
            - "Step 4 has more classes, which means it is more complex and worse"
            - "In Step 1, WeatherStation has direct arrows to every display. In Step 4, WeatherStation only connects to the abstract Observer interface through Subject — it has zero arrows to concrete displays"
            - "The diagrams look identical"
            - "Step 4 removes the inheritance hierarchy entirely"
          correct_index: 1
          explanation: |
            The critical UML difference: in Step 1, `WeatherStation` has a concrete dependency arrow to every display class. In Step 4, it connects only to the abstract `Observer` interface (via aggregation from `Subject`). The concrete displays implement `Observer` independently. This means you can add, remove, or change displays without touching the station. The UML makes this architectural improvement visually obvious.
