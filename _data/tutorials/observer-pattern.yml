    quiz:
      title: "The Refactoring — Knowledge Check"
      min_score: 0.6
      shuffle: true
      questions:

        - question: |
            How many lines of the `WeatherStation` class did you change to add `HeatIndexDisplay`?
          type: single
          options:
            - "0 — I did not touch WeatherStation at all"
            - "1 — I added one line in new_measurement()"
            - "2 — I added it in __init__ and new_measurement()"
            - "3 or more"
          correct_index: 0
          explanation: |
            **Zero.** That is the entire point. In Step 1, you had to modify `WeatherStation` in 2 places. With the Observer pattern, you create a new class that implements `Observer` and call `station.attach()`. The station never needs to know about `HeatIndexDisplay` by name. Check the UML: WeatherStation's connections did not change.

        - question: |
            Which of the following are **advantages** of the Observer pattern compared to the tightly coupled version? (Select all that apply)
          type: multiple
          options:
            - "New observers can be added without modifying the Subject"
            - "Observers can be added and removed at runtime"
            - "The Subject and Observers can be developed and tested independently"
            - "The code is always shorter and simpler"
          correct_indices: [0, 1, 2]
          explanation: |
            The first three are genuine advantages. However, the code is **not** always shorter — the Observer version has more classes and lines of code. The benefit is **flexibility and maintainability**, not brevity. Look at the UML diagrams: the Observer version has more boxes, but the arrows tell a cleaner story.

        - question: |
            A teammate says: *"Why do we need abstract classes? I can just call display methods directly — it is simpler."* What is the best response?
          type: single
          options:
            - "They are right — always prefer the simpler approach"
            - "Direct calls work for small, stable systems, but break down when you need dynamic add/remove or when multiple teams work on the codebase independently"
            - "The GoF book says to always use Observer, so we must follow it"
            - "Abstract classes make the code faster"
          correct_index: 1
          explanation: |
            Both approaches have their place. For a simple program with 2-3 displays that never change, direct calls *are* simpler. But Observer shines when: (1) the set of observers changes at runtime, (2) new types are added frequently, or (3) the subject and observers evolve independently. Patterns are tools for specific situations, not universal requirements.

        - question: |
            In the Observer UML diagram, `Subject o--> "0..*" Observer` uses a **diamond arrow** with a multiplicity label. What does this mean?
          type: single
          options:
            - "Subject creates 0 or more Observer objects"
            - "Subject has an aggregation relationship with 0 or more Observers — it holds references to them but does not own their lifecycle"
            - "Subject inherits from 0 or more Observer classes"
            - "Subject deletes 0 or more Observer objects"
          correct_index: 1
          explanation: |
            The open diamond (`o-->`) represents **aggregation**: the Subject *has* a collection of Observers, but the Observers can exist independently of the Subject. The `"0..*"` multiplicity means "zero or more." A *filled* diamond would be **composition** (stronger ownership). Observers are loosely associated — they can be attached to or detached from the Subject freely.


  # --------------------------------------------------------------------------
  # STEP 5 — "Know When to Hold 'Em: Design Judgment"
  # Pedagogy:
  #   Interleaved scenario analysis — students discriminate use cases.
  #   Over-engineering awareness (from Sommerlad research).
  #   Push vs. Pull design decision — architectural trade-off analysis.
  #   Bloom's level — Evaluate, Analyze.
  # --------------------------------------------------------------------------
  - title: "Design Judgment: When and When Not"
    instructions: |
      ## When Observer Is the Right Tool — and When It Is Not

      > **Learning objective:** After this step you will be able to **evaluate** whether the Observer pattern is appropriate for a given scenario, **explain** the Push vs. Pull trade-off, and **recognize** the danger of over-engineering.

      ### The Danger of Over-Engineering

      Design patterns are powerful, but they are not free. Every pattern adds:
      - More classes and interfaces (look at how many UML boxes we added)
      - Indirection that makes debugging harder (you cannot "follow" a method call from Subject to Observer by reading the code linearly)
      - Cognitive overhead for anyone reading the code

      The worst mistake after learning design patterns is applying them **everywhere**:

      > *"The best engineers focus on solving problems simply, not memorizing existing solutions."*

      ### When Observer Is Worth It

      | Use Observer when... | Skip Observer when... |
      |---|---|
      | One state change triggers updates in **multiple** objects | There is only **one** receiver that will never change |
      | Observers need to be added/removed **at runtime** | The relationship is **fixed** at design time |
      | Subject and observers should evolve **independently** | **Debugging** is critical and traceability matters most |
      | You expect **new observer types** over time | A simple direct method call would suffice |

      ### Push vs. Pull: A Design Decision

      You have used the **Pull model** (observers call `subject.temperature`). Here is the alternative:

      <div class="uml-class-diagram-container" data-uml-type="class" data-uml-spec='@startuml
      skinparam classAttributeIconSize 0
      package "Pull Model" {
        class Subject_Pull {
          + notify()
          + get_state()
        }
        abstract class Observer_Pull {
          + update(subject)
        }
        Subject_Pull o--> Observer_Pull
        note bottom of Observer_Pull : Observer calls\nsubject.get_state()\nto fetch data
      }
      package "Push Model" {
        class Subject_Push {
          + notify()
        }
        abstract class Observer_Push {
          + update(data)
        }
        Subject_Push o--> Observer_Push
        note bottom of Observer_Push : Subject sends data\ndirectly as arguments.\nObserver is simpler.
      }
      @enduml'></div>

      | Model | How it works | Pros | Cons |
      |---|---|---|---|
      | **Pull** | `update(subject)` — observer queries what it needs | Flexible; observers choose their data | More coupling to subject API |
      | **Push** | `update(temp=80, humidity=65)` — subject sends everything | Observers are simpler and independent | Subject must guess what observers need |

      ### Your Task — Scenario Analysis

      Open `design_judgment.py`. For each scenario, decide whether Observer is a good fit (`True`) or overkill (`False`). Set the variable and run to check.

    files:
      - path: "design_judgment.py"
        content: |
          # For each scenario, set the answer to True or False.
          # True  = Observer IS a good fit
          # False = Observer is OVERKILL or wrong for this case

          # --- Scenario 1 ---
          # A stock trading app shows live prices on a chart, a portfolio
          # summary, a news ticker, and push notifications. New display
          # widgets are added every sprint. Users configure their dashboard
          # dynamically.
          scenario_1 = None  # TODO: True or False?

          # --- Scenario 2 ---
          # A simple calculator app has one display that shows the result.
          # There will never be a second display. The display is created
          # once when the app starts and never changes.
          scenario_2 = None  # TODO: True or False?

          # --- Scenario 3 ---
          # A game engine physics system detects collisions. Multiple
          # systems react: sound effects, particles, damage, achievements.
          # Game modders should add collision handlers without editing
          # the physics engine source code.
          scenario_3 = None  # TODO: True or False?

          # --- Scenario 4 ---
          # A script reads a config file once at startup and passes the
          # values to three functions. The config never changes during
          # execution.
          scenario_4 = None  # TODO: True or False?

          # --- Scenario 5 ---
          # A chat application notifies all connected users when a new
          # message arrives. Users join and leave the chat dynamically
          # throughout the session.
          scenario_5 = None  # TODO: True or False?


          # --- Verification (do not edit below) ---
          answers = {
              "Scenario 1 (Stock trading dashboard)": (scenario_1, True),
              "Scenario 2 (Simple calculator)": (scenario_2, False),
              "Scenario 3 (Game collision events)": (scenario_3, True),
              "Scenario 4 (One-time config read)": (scenario_4, False),
              "Scenario 5 (Chat notifications)": (scenario_5, True),
          }
          correct = 0
          for name, (student, expected) in answers.items():
              if student is None:
                  print(f"  [ ] {name} -- not answered yet")
              elif student == expected:
                  print(f"  [+] {name} -- Correct!")
                  correct += 1
              else:
                  why = "Observer fits here" if expected else "Too simple for Observer"
                  print(f"  [X] {name} -- Incorrect. {why}.")
          print(f"\nScore: {correct}/{len(answers)}")
        language: "python"

    open_file: "design_judgment.py"

    solution:
      files:
        - path: "design_judgment.py"
          content: |
            scenario_1 = True   # Multiple dynamic displays, new widgets each sprint
            scenario_2 = False  # Single display, never changes -- direct call is fine
            scenario_3 = True   # Multiple systems react, modders add handlers
            scenario_4 = False  # Config read once, no runtime changes, no notifications
            scenario_5 = True   # Dynamic set of users, one-to-many notifications


            answers = {
                "Scenario 1 (Stock trading dashboard)": (scenario_1, True),
                "Scenario 2 (Simple calculator)": (scenario_2, False),
                "Scenario 3 (Game collision events)": (scenario_3, True),
                "Scenario 4 (One-time config read)": (scenario_4, False),
                "Scenario 5 (Chat notifications)": (scenario_5, True),
            }
            correct = 0
            for name, (student, expected) in answers.items():
                if student is None:
                    print(f"  [ ] {name} -- not answered yet")
                elif student == expected:
                    print(f"  [+] {name} -- Correct!")
                    correct += 1
                else:
                    why = "Observer fits here" if expected else "Too simple for Observer"
                    print(f"  [X] {name} -- Incorrect. {why}.")
            print(f"\nScore: {correct}/{len(answers)}")
          language: "python"
      explanation: |
        **The decision heuristic:**

        Observer is justified when: (1) **multiple** dependents exist, (2) the set changes **dynamically**, and (3) subject and observers should be **independent**.

        - **Scenario 1 (True):** Multiple displays, added each sprint, user-configured = classic Observer
        - **Scenario 2 (False):** One display, never changes = just call the method directly
        - **Scenario 3 (True):** Multiple game systems + modder extensibility = Observer (Game Programming Patterns approach)
        - **Scenario 4 (False):** One-time config read = no ongoing notifications needed
        - **Scenario 5 (True):** Users join/leave dynamically, one message notifies all = textbook Observer

