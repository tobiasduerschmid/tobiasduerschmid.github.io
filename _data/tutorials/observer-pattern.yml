    quiz:
      title: "Observer Mechanics — Knowledge Check"
      min_score: 0.6
      shuffle: true
      questions:

        - question: |
            In your implementation, `TemperatureSensor` never imports or references `TemperatureLogger` or `TemperatureAlert` by name. How does it communicate with them?
          type: single
          options:
            - "Through global variables"
            - "Through the Observer interface — it calls update() on objects in its list without knowing their concrete types"
            - "Through return values from the temperature setter"
            - "It does not — the observers poll the sensor"
          correct_index: 1
          explanation: |
            The sensor only knows the abstract `Observer` interface. It calls `update()` on each object in `self._observers` without knowing whether it is a logger, an alert, or something entirely new. In the UML diagram, the aggregation arrow goes from Subject to Observer (abstract) — **not** to any concrete class. This is **loose coupling**.

        - question: |
            In the code you wrote, observers get data by calling `subject.temperature` inside their `update()` method. This is called the **Pull model**. What is the alternative?
          type: single
          options:
            - "The **Push model**, where the subject sends the data directly as arguments to update()"
            - "The **Poll model**, where observers check for changes on a timer"
            - "The **Callback model**, where observers return data to the subject"
            - "There is no alternative — Pull is the only way"
          correct_index: 0
          explanation: |
            In the **Push model**, the subject passes changed data directly: `observer.update(temperature=72)`. In the **Pull model** (what you built), the subject passes itself: `observer.update(self)`, and observers query what they need. Pull is more flexible when observers need different subsets of data.

        - question: |
            What would happen if you call `sensor.temperature = 80` but forget to add `self.notify()` in the setter?
          type: single
          options:
            - "The program crashes with an error"
            - "The temperature changes internally, but no observers are notified — they still see the old value"
            - "The observers are notified automatically because of the @property decorator"
            - "The temperature does not change at all"
          correct_index: 1
          explanation: |
            Without `self.notify()`, the setter silently updates `self._temperature` but never tells observers. This is a common Observer bug: the state changes, but the world does not know. The `@property` decorator is just syntactic sugar for getters/setters — it does NOT trigger notifications automatically.

        - question: |
            In the UML diagram for this step, `TemperatureSensor --|> Subject` uses a **solid** line with an open triangle. What does this relationship mean?
          type: single
          options:
            - "TemperatureSensor creates Subject objects"
            - "TemperatureSensor inherits from Subject (is-a relationship)"
            - "TemperatureSensor contains a Subject"
            - "TemperatureSensor calls methods on Subject"
          correct_index: 1
          explanation: |
            In UML, a **solid line with an open triangle** (`--|>`) means **inheritance** (generalization). `TemperatureSensor` *is a* `Subject` — it inherits `attach()`, `detach()`, and `notify()`. Compare with the **dashed** line (`..|>`) used by `TemperatureLogger ..|> Observer`, which means "implements interface."


