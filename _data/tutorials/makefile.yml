title: "Makefiles for C Projects"
description: "Write Makefiles, understand dependency graphs, and automate C builds in an interactive terminal."

require_tests: true
autosave_type: none

setup_commands:
  - 'mkdir -p /tutorial/make_project'
  - 'sed -i "s/^exec //" /usr/bin/gcc'
  - 'printf "\nsleep 2\n" >> /usr/bin/gcc'

steps:
  # --------------------------------------------------------------------------
  # STEP 1: The "Pain Point" Sandbox
  # --------------------------------------------------------------------------
  - title: "Manual Compilation and Why It Scales Poorly"
    instructions: |
      Before learning *how* a Makefile works, it helps to see *why* it exists. Build tools solve a specific problem, and you will understand Makefiles faster if you first experience that problem directly.

      ### Task 1: Compile the project manually

      The project has three files: `main.c`, `math.c`, and `io.c`. Compile them directly with `gcc`:

      ```bash
      cd make_project
      gcc main.c math.c io.c -o app
      ```

      The compilation fails because `math.c` has a syntax error.

      ### Task 2: Fix the error and recompile

      1. Open `math.c` in the editor.
      2. Add the missing semicolon at the end of the `return` statement.
      3. Save the file.
      4. Press the Up arrow in the terminal and run the same `gcc` command again.

      Fixing one file required recompiling all three. `gcc` has no memory of prior builds — it reprocesses every file you hand it. In a 500-file project, fixing one typo means re-compiling every untouched file. A build tool fixes this.

    files:
      - path: "make_project/main.c"
        content: |
          #include <stdio.h>
          int add(int a, int b);
          void init_io();

          int main() {
              init_io();
              printf("Math test: 2 + 3 = %d\n", add(2, 3));
              return 0;
          }
        language: "c"
      - path: "make_project/math.c"
        content: |
          int add(int a, int b) {
              return a + b // BUG: missing semicolon
          }
        language: "c"
      - path: "make_project/io.c"
        content: |
          #include <stdio.h>
          void init_io() {
              printf("IO Initialized.\n");
          }
        language: "c"

    open_file: "make_project/math.c"

    watch_files:
      - "make_project/math.c"

    solution:
      files:
        - path: "make_project/math.c"
          content: |
            int add(int a, int b) {
                return a + b;   // Bug fixed: added the missing semicolon
            }
          language: "c"
      commands:
        - "cd /tutorial/make_project/"
        - "gcc main.c math.c io.c -o app"
      explanation: |
        - **Test 1:** `grep -q 'a + b;' math.c` — the semicolon must be present at the end of the `return` statement.
        - **Test 2:** `[ -f app ]` — the compiled executable `app` must exist.
        - **The pain of manual compilation:** After fixing the one-character bug, you had to re-type (or recall) the entire `gcc` command to recompile all three files — even `main.c` and `io.c` were untouched. This is the core problem Make solves: in a 500-file project, fixing one typo means recompiling everything.

    tests:
      - description: "The syntax error in math.c is fixed"
        command: "cd /tutorial/make_project && grep -q 'a + b;' math.c"
        hints:
          - text: "Look at the `return` statement in `math.c`. Every C statement must end with a character you are missing. Which one?"
            condition: "source_missing: a + b;"
          - text: "You wrote the semicolon, but the test still fails. Did you save the file? Open `math.c` again and check the line."
            condition: "source_contains: a + b;"
      - description: "The project compiled successfully into an executable named 'app'"
        command: "cd /tutorial/make_project && [ -f app ]"
        hints:
          - text: "Run `gcc main.c math.c io.c -o app` from inside the `make_project` directory. The `-o app` flag names the output file."
            condition: "default"
          - text: "If `gcc` prints errors, read the first one carefully — later errors are often consequences of the first. Fix the top error, then re-run the command."
            condition: "default"

    quiz:
      title: "The Pain of Manual Compilation — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "What is the main problem with using `gcc main.c math.c io.c -o app` every time you fix a bug?"
          options:
            - "gcc cannot compile more than two files at once"
            - "gcc recompiles ALL files, even the ones you didn't change"
            - "The output binary must always be named `a.out`"
            - "gcc requires files to be listed in alphabetical order"
          correct_index: 1
          explanation: "gcc has no memory — it blindly reprocesses every file you hand it. Fix one file? It still recompiles all three. In large projects, this means minutes-long rebuilds for single-line changes."

        - question: "In a 500-file C project, you fix a typo in one file and rerun the same gcc command. How many files does gcc recompile?"
          options:
            - "Only the 1 file you changed"
            - "The changed file plus any files that include it"
            - "All 500 files"
            - "None — gcc auto-detects unchanged files"
          correct_index: 2
          explanation: "gcc has no dependency tracking. It processes every file you list, every time. This is the core pain point that build tools like Make solve."

        - question: "What key capability does Make have that raw gcc does NOT?"
          options:
            - "Checking syntax errors before compilation"
            - "Automatically downloading missing libraries"
            - "Tracking which files changed since the last build"
            - "Compiling faster using parallel threads"
          correct_index: 2
          explanation: "Make tracks file modification timestamps (and a dependency graph) to determine which targets are out of date. It only rebuilds what's actually needed."

  # --------------------------------------------------------------------------
  # STEP 2: The Core Anatomy & The "Tab" Trap
  # --------------------------------------------------------------------------
  - title: "Your First Makefile and the Tab Requirement"
    instructions: |
      ### The Anatomy of a Rule

      A Makefile is a list of **rules** that describe a dependency graph. Each rule has this shape:

      ```make
      target: prerequisites
          recipe
      ```
      * **Target:** The file you want to build (e.g., your executable).
      * **Prerequisites:** The files the target depends on (e.g., your `.c` files).
      * **Recipe:** The shell command that produces the target.

      Make reads these rules, builds a graph of what depends on what, and only runs recipes when needed.

      ### Task 1: Run your first Make command

      A basic `Makefile` has been added to your project. Run it:

      ```bash
      make
      ```

      You should see the error: `Makefile:2: *** missing separator. Stop.`

      ### Task 2: Fix the indentation

      Makefile recipes **must** be indented with a real `Tab` character, not spaces.

      ```make
      target: prerequisites
      [TAB]recipe
      ```

      If the recipe is indented with 4 or 8 spaces, Make will refuse to parse it. Most GUI editors silently insert spaces when you press Tab, so you will often need to fix this from the terminal.

      `sed` is a stream editor that reads a file line by line, applies a substitution, and writes the result. Its substitution syntax is `s/pattern/replacement/`:

      ```bash
      # Replace the leading spaces on the recipe line with a real Tab:
      sed -i 's/^    /\t/' Makefile
      ```

      Breaking this down:
      - `s/^    /\t/` — replace four leading spaces (`^    `) with a tab character (`\t`)
      - `-i` — edit the file **in-place** (overwrite it directly)

      Run `cat -A Makefile` after — recipe lines starting with `^I` have a real Tab (`^I` is how `cat -A` displays the Tab character). Then run `make` again.

    setup_commands:
      - "rm -f /tutorial/make_project/app"

    files:
      - path: "make_project/Makefile"
        content: |
          app: main.c math.c io.c
              gcc main.c math.c io.c -o app
        language: "makefile"

    open_file: "make_project/Makefile"

    watch_files:
      - "make_project/Makefile"

    solution:
      files:
        - path: "make_project/Makefile"
          content: "app: main.c math.c io.c\n\tgcc main.c math.c io.c -o app\n"
          language: "makefile"
      commands:
        - "sed -i 's/^    /\t/' Makefile"
        - "make"
      explanation: |
        - **Test 1:** `grep -qP '^\tgcc' Makefile` — the recipe line must start with a real Tab character (`\t`), not spaces. `grep -P` uses Perl-compatible regex where `\t` matches a literal Tab.
        - **Test 2:** `[ -f app ]` — Make must have run successfully and produced the `app` executable.
        - **The Tab Trap:** Make's parser uses the Tab character specifically to identify recipe lines. Spaces look identical on screen but cause the infamous `missing separator. Stop.` error. Most editors silently convert Tab keypresses to spaces, which is why this trap catches beginners.
        - **`sed -i 's/^    /\t/'`:** `s/pattern/replacement/` substitutes the pattern. `^    ` matches four spaces only at the start of a line (`^` anchors to line start). `\t` is a Tab character. `-i` edits the file in-place.

    tests:
      - description: "The recipe uses a Tab character, not spaces"
        command: "cd /tutorial/make_project && grep -qP '^\\tgcc' Makefile"
        hints:
          - text: "Make prints `missing separator` when a recipe line starts with spaces instead of a Tab. What does your recipe line look like right now? Run `cat -A Makefile` — a real Tab shows as `^I`."
            condition: "default"
          - text: "If the recipe line starts with four spaces, replace them with a Tab. Run `sed -i 's/^    /\\t/' Makefile` from the instructions, then check again with `cat -A Makefile`."
            condition: "default"
          - text: "If you used a different number of spaces, adjust the pattern (`s/^  /\\t/` for 2 spaces, `s/^        /\\t/` for 8). Every recipe line must start with exactly one Tab."
            condition: "default"
      - description: "Make ran successfully and built 'app'"
        command: "cd /tutorial/make_project && [ -f app ]"
        hints:
          - text: "After fixing the indentation, run `make` from inside `make_project`. If the error persists, `cat -A Makefile` to confirm the recipe line starts with `^I` (a Tab)."
            condition: "default"

    quiz:
      title: "Your First Makefile & The Tab Trap — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "In a Makefile rule, what is the **recipe**?"
          options:
            - "The file you want to build (the target name)"
            - "The list of files the target depends on"
            - "The shell command(s) that create the target"
            - "A comment block describing what the rule does"
          correct_index: 2
          explanation: "A Makefile rule has three parts: `target: prerequisites` on the first line, then the **recipe** (the shell command) indented on the next line. The recipe is what actually runs to produce the target."

        - question: "What error does Make print when recipe lines use spaces instead of a real Tab character?"
          options:
            - "Segmentation fault (core dumped)"
            - "missing separator. Stop."
            - "command not found"
            - "permission denied"
          correct_index: 1
          explanation: "Make's parser uses a leading Tab character to identify recipe lines. Spaces look identical on screen but cause the cryptic `missing separator` error — one of Make's most famous gotchas."

        - question: "Which of the following correctly describes the three parts of a Makefile rule?"
          type: multiple
          options:
            - "The **target** is the file you want to build"
            - "**Prerequisites** are the files the target depends on"
            - "Recipe lines MUST start with a real Tab character, not spaces"
            - "Prerequisites must always be sorted alphabetically"
          correct_indices:
            - 0
            - 1
            - 2
          explanation: "A rule is `target: prerequisites` followed by a recipe on the next line. The recipe must use a literal Tab. Prerequisites can be in any order — Make builds a dependency graph from them."

        - question: "The command `sed -i 's/^    /\\t/' Makefile` is used to fix the Tab Trap. What does the `s/^    /\\t/` part mean?"
          options:
            - "Search for four spaces anywhere in the line and replace all occurrences with a tab"
            - "Replace the four leading spaces at the start of a line (`^`) with a real tab character"
            - "Delete four-space-indented lines from the file"
            - "Append a tab character after every line that starts with four spaces"
          correct_index: 1
          explanation: "`sed`'s `s/pattern/replacement/` syntax substitutes the pattern with the replacement. `^` anchors the match to the **start of the line**, so only leading spaces are replaced — not spaces that appear elsewhere on the line. `\\t` is the escape sequence for a real Tab character. The `-i` flag makes the edit in-place."

  # --------------------------------------------------------------------------
  # STEP 3: The "DRY" Refactor — Variables
  # --------------------------------------------------------------------------
  - title: "Don't Repeat Yourself (DRY) with Variables"
    instructions: |
      ### Enabling Incremental Builds

      The single-rule Makefile still recompiles every source file together. To let Make skip unchanged files, you compile each `.c` file into an **object file** (`.o`) separately, then **link** the `.o` files into the final executable.

      The new `Makefile` does exactly that — but notice the repetition: `gcc -Wall -std=c11` is written out four times. Switching to `clang` would require editing four lines. This violates the **DRY principle** (Don't Repeat Yourself).

      ### Task: Refactor using Variables

      In Makefiles, you define variables at the top and reference them with `$(VAR_NAME)`.

      1. Open `Makefile`.
      2. At the very top, define two variables (these are Make's standard names for C builds):
         ```make
         CC = gcc
         CFLAGS = -Wall -std=c11
         ```
      3. Replace all 4 instances of `gcc` with `$(CC)`.
      4. Replace all 4 instances of `-Wall -std=c11` with `$(CFLAGS)`.
      5. Save the file and run `make` to confirm it still compiles successfully.

      Now a compiler change is a one-line edit at the top of the file.

    setup_commands:
      - "rm -f /tutorial/make_project/*.o /tutorial/make_project/app"

    files:
      - path: "make_project/Makefile"
        content: |
          app: main.o math.o io.o
          	gcc -Wall -std=c11 main.o math.o io.o -o app

          main.o: main.c
          	gcc -Wall -std=c11 -c main.c

          math.o: math.c
          	gcc -Wall -std=c11 -c math.c

          io.o: io.c
          	gcc -Wall -std=c11 -c io.c
        language: "makefile"

    open_file: "make_project/Makefile"

    watch_files:
      - "make_project/Makefile"

    solution:
      files:
        - path: "make_project/Makefile"
          content: "CC = gcc\nCFLAGS = -Wall -std=c11\n\napp: main.o math.o io.o\n\t$(CC) $(CFLAGS) main.o math.o io.o -o app\n\nmain.o: main.c\n\t$(CC) $(CFLAGS) -c main.c\n\nmath.o: math.c\n\t$(CC) $(CFLAGS) -c math.c\n\nio.o: io.c\n\t$(CC) $(CFLAGS) -c io.c\n"
          language: "makefile"
      explanation: |
        - **Test 1:** `grep -q 'CC *=' Makefile` — the `CC` variable must be defined.
        - **Test 2:** `grep -q 'CFLAGS *=' Makefile` — the `CFLAGS` variable must be defined.
        - **Test 3:** `grep -q '\$(CC)' Makefile` — `$(CC)` must appear in the file (replacing the hardcoded `gcc`).
        - **Test 4:** `make && [ -f app ]` — the build must still succeed.
        - **DRY principle:** Before this refactor, `gcc -Wall -std=c11` appeared 4 times. With `CC = gcc` and `CFLAGS = -Wall -std=c11`, a switch from `gcc` to `clang` requires editing exactly one line. This is the same principle as C++ `#define` or Python constants.
        - **`$(CC)` syntax:** Make expands variables with `$(VAR_NAME)` or `${VAR_NAME}`. The parentheses (or braces) are required for multi-character variable names — `$CC` alone would be interpreted as `$C` followed by the literal character `C`.

    tests:
      - description: "Defined CC variable"
        command: "cd /tutorial/make_project && grep -q 'CC *=' Makefile"
        hints:
          - text: "Add `CC = gcc` on its own line, at the very top of the Makefile (before any rule)."
            condition: "source_missing: CC"
          - text: "You wrote `CC` somewhere, but the assignment needs a `=` sign. Check that your line looks like `CC = gcc` (spaces around `=` are optional)."
            condition: "source_contains: CC"
      - description: "Defined CFLAGS variable"
        command: "cd /tutorial/make_project && grep -q 'CFLAGS *=' Makefile"
        hints:
          - text: "Add a second line: `CFLAGS = -Wall -std=c11`. `CFLAGS` is the conventional name Make uses for compiler flags."
            condition: "source_missing: CFLAGS"
      - description: "Used $(CC) in recipes instead of hardcoded gcc"
        command: "cd /tutorial/make_project && grep -q '\\$(CC)' Makefile"
        hints:
          - text: "Defining `CC` is only half the job — you also need to use it. Replace every `gcc` in a recipe with `$(CC)`. Do the same for the flags: use `$(CFLAGS)` instead of `-Wall -std=c11`."
            condition: "default"
          - text: "Writing `$CC` (without parentheses) does not work — Make reads that as `$C` followed by the character `C`. Always use `$(CC)`."
            condition: "source_missing: $(CC)"
      - description: "Code still builds successfully"
        command: "cd /tutorial/make_project && make && [ -f app ]"
        hints:
          - text: "A common mistake when editing the Makefile is accidentally replacing the Tab at the start of a recipe. Run `cat -A Makefile` and make sure every recipe line starts with `^I`."
            condition: "default"
          - text: "If you see `missing separator` again, you broke the Tab. If you see `command not found`, the variable probably didn't expand — double-check `$(CC)` vs `$CC`."
            condition: "default"

    quiz:
      title: "DRY Variables — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "What is the correct syntax to expand a Makefile variable named `CFLAGS` inside a recipe?"
          options:
            - "%CFLAGS%"
            - "$(CFLAGS)"
            - "[CFLAGS]"
            - "#CFLAGS"
          correct_index: 1
          explanation: "Make uses `$(VAR)` or `${VAR}` to expand variables. `$(CFLAGS)` is the standard convention. Note that `%CFLAGS%` is Windows CMD syntax and has no meaning in Make."

        - question: "You define `CC = gcc` at the top of your Makefile and use `$(CC)` in all four recipes. You want to switch to `clang`. How many lines must you edit?"
          options:
            - "Four — one for each recipe line that calls the compiler"
            - "One — just the line where CC is defined"
            - "None — Make auto-detects installed compilers"
            - "Two — the definition and the first recipe"
          correct_index: 1
          explanation: "This is the DRY (Don't Repeat Yourself) principle in action. All four recipes reference `$(CC)`, so changing `CC = gcc` to `CC = clang` updates every recipe at once."

        - question: "Which of the following are benefits of using `CC` and `CFLAGS` variables in a Makefile? (Select all that apply)"
          type: multiple
          options:
            - "Switching compilers requires editing only one line"
            - "Changing compiler flags requires editing only one place"
            - "The build automatically becomes faster"
            - "Make no longer requires Tab characters in recipes"
          correct_indices:
            - 0
            - 1
          explanation: "Variables provide a single point of change for repeated values. They do NOT affect build speed or the Tab requirement — those are separate concerns entirely."

        - question: "In the rule `app: $(OBJS)`, which part is the **target**?"
          options:
            - "app"
            - "OBJS"
            - "gcc"
            - "The entire line"
          correct_index: 0
          explanation: "Even when using variables like `$(OBJS)`, the basic Rule structure remains `target: prerequisites`. Everything to the left of the colon is the target (what you want to build)."

        - question: "**[Interleaved: Revisit Step 1]** What is the core problem that Make solves compared to running a manual `gcc` command on all files?"
          options:
            - "Make automatically fixes syntax errors"
            - "Make recompiles every file in parallel by default"
            - "Make only rebuilds the files that actually changed (incremental builds)"
            - "Make compresses the binary to save disk space"
          correct_index: 2
          explanation: "As we felt in Step 1, manual compilation is slow because it rebuilds everything. Make's superpower is its ability to track changes and only run necessary commands."

  # --------------------------------------------------------------------------
  # STEP 4: Automatic Variables & Pattern Rules
  # --------------------------------------------------------------------------
  - title: "Automatic Variables and Pattern Rules"
    instructions: |
      ### The Repetition Problem

      The three `.o` rules in your current Makefile are almost identical:

      ```make
      main.o: main.c
      	$(CC) $(CFLAGS) -c main.c

      math.o: math.c
      	$(CC) $(CFLAGS) -c math.c

      io.o: io.c
      	$(CC) $(CFLAGS) -c io.c
      ```

      Each filename appears twice per rule. With 50 source files, you would have 50 nearly identical rules.

      ### Automatic Variables

      Make provides special variables that expand to parts of the *current* rule being evaluated:

      | Variable | Expands to |
      |----------|------------|
      | `$@` | The **target** name (left of the `:`) |
      | `$<` | The **first prerequisite** (first item after the `:`) |
      | `$^` | **All prerequisites** |

      ### Pattern Rules

      A **pattern rule** uses `%` as a wildcard that matches any filename stem:

      ```make
      %.o: %.c
      	$(CC) $(CFLAGS) -c $< -o $@
      ```

      This single rule tells Make: "to build any `.o` file, compile the matching `.c` file." It replaces all three of your explicit `.o` rules.

      ### Task: Refactor with OBJS, automatic variables, and a pattern rule

      1. At the very top (after `CFLAGS`), add an `OBJS` variable:
         ```make
         OBJS = main.o math.o io.o
         ```
      2. Update the `app` rule to use `$(OBJS)` and the automatic variable `$^` (all prereqs):
         ```make
         app: $(OBJS)
         	$(CC) $(CFLAGS) $^ -o $@
         ```
      3. **Delete** the three explicit `.o` rules (`main.o`, `math.o`, `io.o`).
      4. Replace them with **one** pattern rule:
         ```make
         %.o: %.c
         	$(CC) $(CFLAGS) -c $< -o $@
         ```
      5. Save and run `make` to confirm it still builds correctly.

      The Makefile shrinks from 14 lines to 8, and it now handles any number of source files without adding new rules.

    setup_commands:
      - "rm -f /tutorial/make_project/*.o /tutorial/make_project/app"

    files:
      - path: "make_project/Makefile"
        content: |
          CC = gcc
          CFLAGS = -Wall -std=c11

          app: main.o math.o io.o
          	$(CC) $(CFLAGS) main.o math.o io.o -o app

          main.o: main.c
          	$(CC) $(CFLAGS) -c main.c

          math.o: math.c
          	$(CC) $(CFLAGS) -c math.c

          io.o: io.c
          	$(CC) $(CFLAGS) -c io.c
        language: "makefile"

    open_file: "make_project/Makefile"

    watch_files:
      - "make_project/Makefile"

    solution:
      files:
        - path: "make_project/Makefile"
          content: "CC = gcc\nCFLAGS = -Wall -std=c11\nOBJS = main.o math.o io.o\n\napp: $(OBJS)\n\t$(CC) $(CFLAGS) $^ -o $@\n\n%.o: %.c\n\t$(CC) $(CFLAGS) -c $< -o $@\n"
          language: "makefile"
      explanation: |
        - **Test 1:** `grep -q 'OBJS *=' Makefile` — the `OBJS` variable must be defined.
        - **Test 2:** `grep -q '\$(OBJS)' Makefile` — `$(OBJS)` must appear in the `app` rule.
        - **Test 3:** `grep -qP '%\.o.*:.*%\.c' Makefile` — a pattern rule `%.o: %.c` must exist.
        - **Test 4:** `grep -qP '\$[<^@]' Makefile` — at least one automatic variable (`$<`, `$^`, or `$@`) must be used.
        - **Test 5:** `make && [ -f app ]` — build must succeed.
        - **`$^` (all prerequisites):** In the `app` rule, `$^` expands to `main.o math.o io.o` — all the files listed in `$(OBJS)`. This replaces the repetitive `main.o math.o io.o` in the recipe.
        - **`$@` (target name):** In the `app` rule, `$@` expands to `app`. In the pattern rule when building `math.o`, `$@` expands to `math.o`.
        - **`$<` (first prerequisite):** In the pattern rule, `$<` expands to the `.c` file (e.g., `math.c`). Using `$<` instead of `$^` compiles only the single matching source file.
        - **Pattern rule `%.o: %.c`:** The `%` wildcard matches any filename stem. This single rule replaces all three explicit `.o` rules. Adding `newfile.c` to `OBJS` is all that's needed — no new explicit rule required.

    tests:
      - description: "Defined OBJS variable"
        command: "cd /tutorial/make_project && grep -q 'OBJS *=' Makefile"
        hints:
          - text: "You already have `CC` and `CFLAGS`. A third variable can hold the list of object files so you don't have to repeat them. Where should it go, and what should it contain?"
            condition: "source_missing: OBJS"
          - text: "Add `OBJS = main.o math.o io.o` on its own line, just after `CFLAGS`. The variable name is a Make convention — use uppercase."
            condition: "source_missing: OBJS"
      - description: "Used $(OBJS) in the app rule"
        command: "cd /tutorial/make_project && grep -q '\\$(OBJS)' Makefile"
        hints:
          - text: "The `app` rule still lists the object files by name. Replace that list with a reference to the variable you just defined."
            condition: "default"
          - text: "Change `app: main.o math.o io.o` to `app: $(OBJS)`. Use `$(OBJS)`, not `$OBJS` — without parentheses Make reads it as `$O` followed by the letters `BJS`."
            condition: "default"
      - description: "Added a pattern rule (%.o: %.c)"
        command: "cd /tutorial/make_project && grep -qP '%\\.o.*:.*%\\.c' Makefile"
        hints:
          - text: "Three nearly identical rules for `.o` files can become one. What character does Make use as a wildcard to match any filename stem?"
            condition: "default"
          - text: "Delete the three rules for `main.o`, `math.o`, and `io.o`. Replace them with one pattern rule: `%.o: %.c` followed by a recipe line indented with a Tab."
            condition: "default"
          - text: "The `%` matches the filename stem on both sides of the colon. If the target matches `%.o` as `math.o`, the prerequisite becomes `math.c`. Extra spaces (like `%.o : %.c`) break the match."
            condition: "default"
      - description: "Used an automatic variable ($<, $^, or $@) in a recipe"
        command: "cd /tutorial/make_project && grep -qP '\\$[<^@]' Makefile"
        hints:
          - text: "Look at each recipe. Which filename is the target? Which is the source? Can you name them without typing the actual filename?"
            condition: "default"
          - text: "In the pattern rule, use `$<` for the source `.c` file and `$@` for the output `.o` file: `$(CC) $(CFLAGS) -c $< -o $@`."
            condition: "default"
          - text: "In the `app` link rule, `$^` expands to all prerequisites (every object file) and `$@` expands to `app`. Use them to avoid listing the object files twice."
            condition: "default"
      - description: "Project still builds correctly"
        command: "cd /tutorial/make_project && make && [ -f app ]"
        hints:
          - text: "Read the first line of the error — the rest usually cascades from it. `missing separator` points to a Tab problem; `No rule to make target` points to a prerequisite name mismatch."
            condition: "default"
          - text: "If you see `missing separator`, a recipe line lost its Tab. Run `cat -A Makefile` and look for a recipe line that does NOT start with `^I`."
            condition: "default"
          - text: "If Make says `No rule to make target 'main.o'`, check that your pattern rule has no extra spaces (`%.o: %.c`, not `%.o : %.c`) and that the `.c` files exist in the same folder as the Makefile."
            condition: "default"

    quiz:
      title: "Automatic Variables & Pattern Rules — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "In a Makefile recipe, what does `$@` expand to?"
          options:
            - "All prerequisite files (everything after the colon)"
            - "The first prerequisite only"
            - "The target name (the file to the left of the colon)"
            - "The shell's exit code from the last command"
          correct_index: 2
          explanation: "`$@` always expands to the **target** name. In `app: $(OBJS)`, using `$@` in the recipe gives you `app`. Think: `@` looks like a target symbol."

        - question: "The pattern rule `%.o: %.c` with recipe `$(CC) $(CFLAGS) -c $< -o $@` compiles `math.c`. What do `$<` and `$@` expand to?"
          options:
            - "$< = math.c, $@ = math.o"
            - "$< = math.o, $@ = math.c"
            - "$< = all .c files, $@ = math.o"
            - "$< = math.c, $@ = $(CC)"
          correct_index: 0
          explanation: "`$<` is the **first prerequisite** (here, `math.c`) and `$@` is the **target** (here, `math.o`). The `%` wildcard matches the common stem `math`, so `%.o` becomes `math.o` and `%.c` becomes `math.c`."

        - question: "After replacing explicit `.o` rules with one pattern rule, which of the following are true? (Select all that apply)"
          type: multiple
          options:
            - "One pattern rule handles any number of .c/.o file pairs"
            - "Adding a new source file still requires writing a new explicit rule"
            - "`$^` in the app rule expands to all object file prerequisites"
            - "`$<` in the pattern rule refers to the .c file being compiled"
          correct_indices:
            - 0
            - 2
            - 3
          explanation: "The pattern rule `%.o: %.c` handles **any** `.c`→`.o` compilation automatically. Adding `newfile.c` to `OBJS` is all you need — no new rule required. `$^` gives all prerequisites (all `.o` files for the app rule), and `$<` gives the first prerequisite (the `.c` file for each pattern match)."

        - question: "You use `%.o: %.c` and `$(CC) $(CFLAGS) -c $< -o $@`. You get `makefile:10: *** missing separator. Stop.` What is the most likely cause?"
          options:
            - "Missing Tab before the recipe line"
            - "Incorrect automatic variable syntax"
            - "The compiler 'gcc' is not installed"
            - "The file 'math.c' is missing"
          correct_index: 0
          explanation: "The 'missing separator' error is Make's cryptic way of saying it found spaces where it expected a Tab. This remains the #1 cause of build failures, even in advanced professional Makefiles."

        - question: "**[Interleaved: Revisit Step 2]** What invisible character is **required** at the start of every recipe line in a Makefile?"
          options:
            - "4 spaces"
            - "8 spaces"
            - "A Tab character"
            - "A semicolon"
          correct_index: 2
          explanation: "As you discovered in Step 2, the 'Tab Trap' is real! Make strictly requires a literal Tab character to identify recipe lines. Spaces will cause a 'missing separator' error."

  # --------------------------------------------------------------------------
  # STEP 5: Incremental Builds via Timestamps
  # --------------------------------------------------------------------------
  - title: "Incremental Builds in Action"
    instructions: |
      ### Timestamp Comparison

      Make decides whether to rebuild a target by comparing **last-modified timestamps**. If any prerequisite is *newer* than the target, the target is out of date and Make runs its recipe. Otherwise, it skips the recipe.

      This is how Make turns a multi-minute full rebuild into a few-second incremental one.

      ### Task 1: Check the current state

      Run `make`:
      ```bash
      make
      ```
      Make prints `make: 'app' is up to date.` because every target is newer than its prerequisites.

      ### Task 2: Simulate a file change

      The `touch` command updates a file's timestamp without changing its content, so Make treats it as edited.

      Update only `math.c`:
      ```bash
      touch math.c
      ```

      ### Task 3: Observe the incremental rebuild

      Run `make` once more:
      ```bash
      make
      ```

      Make compiles `math.c` → `math.o` and re-links `app`. It skips `main.c` and `io.c` because they are still up to date. On a large codebase, that's the difference between a build that takes seconds and one that takes hours.

    setup_commands:
      - "make -C /tutorial/make_project 2>/dev/null || true"

    solution:
      commands:
        - "make"
        - "touch math.c"
        - "make"
      explanation: |
        - **Test:** `[ math.o -nt main.o ]` — `math.o` must be newer than `main.o`. After `touch math.c` + `make`, only `math.c` → `math.o` was recompiled, so `math.o` has a newer timestamp than `main.o` (which was not recompiled).
        - **Make's timestamp heuristic:** Make compares the last-modified time of each target against its prerequisites. If a prerequisite is newer than the target, the target is out-of-date and its recipe runs.
        - **`touch math.c`:** Updates `math.c`'s modification timestamp without changing its content. Make sees `math.c` is now newer than `math.o` and recompiles just that one file, then re-links `app`. `main.c` and `io.c` are untouched.
        - **Why this matters:** In a large project, this turns a potential hours-long full rebuild into a seconds-long incremental one.

    tests:
      - description: "math.c was touched and recompiled (math.o is newer than main.o)"
        command: "cd /tutorial/make_project && [ math.o -nt main.o ]"
        hints:
          - text: "Run the three commands in order from inside `make_project`: `make`, then `touch math.c`, then `make` again."
            condition: "default"
          - text: "If all three object files rebuild, you probably ran `make clean` or deleted the `.o` files. Rebuild once with `make`, then `touch math.c`, then `make` — only `math.o` should be newer than the others."
            condition: "default"

    quiz:
      title: "Incremental Builds — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "How does Make decide whether to rebuild a target file?"
          options:
            - "It always rebuilds everything to be safe"
            - "It compares timestamps: if any prerequisite is newer than the target, it rebuilds"
            - "It checksums file contents to detect actual changes"
            - "It asks the user which files changed since last time"
          correct_index: 1
          explanation: "Make compares modification timestamps. If a prerequisite (e.g. `math.c`) is newer than the target (e.g. `math.o`), the target is considered out of date and its recipe runs. This simple heuristic enables powerful incremental builds."

        - question: "You run `touch math.c` (without changing its content) then immediately run `make`. What does Make do?"
          options:
            - "Nothing — `touch` doesn't change file content so Make skips everything"
            - "Rebuilds the entire project from scratch for safety"
            - "Recompiles only math.c → math.o, then re-links the final binary"
            - "Deletes math.o because it considers math.c corrupted"
          correct_index: 2
          explanation: "`touch` updates a file's timestamp, making it look newer than its dependent targets. Make sees `math.c` is newer than `math.o`, recompiles just that one file, then re-links `app` since `math.o` changed. `main.o` and `io.o` are untouched."

        - question: "After a successful build with no changes, you run `make` again. What message appears and why?"
          options:
            - "`Build complete` — Make always confirms success"
            - "`make: 'app' is up to date` — all prerequisites are older than the target"
            - "`No targets specified` — Make requires a target argument"
            - "`make: Nothing to do for 'all'` — the default target is missing"
          correct_index: 1
          explanation: "When all targets are newer than their prerequisites, Make prints `make: 'app' is up to date` and does nothing. This is the incremental build in action — skipping all work when nothing needs rebuilding."

        - question: "**[Interleaved: Revisit Step 3]** What is the correct syntax to reference a variable named `CC` inside a Makefile recipe?"
          options:
            - "`${CC}`"
            - "`$(CC)`"
            - "`$CC`"
            - "Both `$(CC)` and `${CC}` are valid"
          correct_index: 3
          explanation: "As we practiced in Step 3, Make uses either parentheses `( )` or curly braces `{ }` to expand variables. Both are technically correct, though `$(CC)` is the more common convention."

  # --------------------------------------------------------------------------
  # STEP 6: The .PHONY Sabotage
  # --------------------------------------------------------------------------
  - title: "Non-File Targets and .PHONY"
    instructions: |
      ### Targets That Are Not Files

      Make treats every target as a file to build. But some targets just run a command — `clean` deletes build artifacts, `test` runs the test suite — and produce no output file.

      ### Task 1: Add a clean target

      Add this to the very bottom of your `Makefile`:
      ```make
      clean:
      	rm -f *.o app
      ```
      Run `make clean` in the terminal. Your build artifacts are gone!

      ### Task 2: See what breaks when a file named `clean` exists

      Because Make assumes targets are files, the `clean` rule breaks if a file actually *named* `clean` is on disk:

      1. Create a dummy file named `clean`:
         ```bash
         touch clean
         ```
      2. Rebuild the project with `make app`.
      3. Try `make clean`.

      Make prints `make: 'clean' is up to date.` It found the file named `clean`, saw no prerequisites, decided the target was already "built," and did nothing.

      ### Task 3: Declare the target as `.PHONY`

      Tell Make that `clean` is a command name, not a filename. Add this line above the `clean:` target:
      ```make
      .PHONY: clean
      ```

      Save and run `make clean` again. Make now runs the recipe regardless of whether a file named `clean` exists.

    setup_commands:
      - "make -C /tutorial/make_project 2>/dev/null || true"

    watch_files:
      - "make_project/Makefile"

    solution:
      files:
        - path: "make_project/Makefile"
          content: "CC = gcc\nCFLAGS = -Wall -std=c11\nOBJS = main.o math.o io.o\n\napp: $(OBJS)\n\t$(CC) $(CFLAGS) $^ -o $@\n\n%.o: %.c\n\t$(CC) $(CFLAGS) -c $< -o $@\n\n.PHONY: clean\nclean:\n\trm -f *.o app\n"
          language: "makefile"
      explanation: |
        - **Test 1:** `grep -q '\.PHONY:.*clean' Makefile` — `.PHONY: clean` must appear in the file (before or after the `clean:` rule).
        - **Test 2:** `grep -q 'clean:' Makefile && make clean >/dev/null 2>&1 && [ ! -f app ] && ! ls *.o 2>/dev/null` — the `clean` target must exist, `make clean` must succeed, and afterwards no `app` or `.o` files should remain.
        - **The sabotage scenario:** If a file named `clean` exists in your project directory and `.PHONY` is absent, Make thinks `clean` is a real file target. Since `clean` has no prerequisites, Make sees it as always up-to-date and refuses to run the recipe (`make: 'clean' is up to date.`).
        - **`.PHONY: clean`:** Tells Make that `clean` is a command name, not a filename. Make ignores any file on disk named `clean` and always runs the recipe. Always declare non-file targets (like `clean`, `test`, `all`) as `.PHONY`.
        - **`rm -f *.o app`:** `-f` suppresses errors when files don't exist. Without it, `make clean` would fail if called when already clean.

    tests:
      - description: "Added .PHONY: clean to Makefile"
        command: "cd /tutorial/make_project && grep -q '\\.PHONY:.*clean' Makefile"
        hints:
          - text: "Add a line `.PHONY: clean` somewhere in the Makefile (conventionally right above the `clean:` rule). The dot at the front is required — `PHONY` alone is not a built-in directive."
            condition: "source_missing: .PHONY"
          - text: "You wrote `.PHONY` somewhere, but it needs `clean` as the target name: `.PHONY: clean`."
            condition: "source_contains: .PHONY"
      - description: "The clean target exists in Makefile and removes 'app' and '.o' files"
        command: "cd /tutorial/make_project && grep -q 'clean:' Makefile && make clean >/dev/null 2>&1 && [ ! -f app ] && ! ls *.o 2>/dev/null"
        hints:
          - text: "The `clean:` rule needs a recipe (indented with a Tab) that deletes the build artifacts. `rm` is the shell command you want — what glob pattern matches every object file?"
            condition: "default"
          - text: "Use `rm -f *.o app`. The `-f` flag silences errors if the files are already gone, so `make clean` works even on a fresh build."
            condition: "default"
          - text: "If `make clean` prints `'clean' is up to date`, a file literally named `clean` still exists and `.PHONY` is missing or mis-spelled. Run `ls clean` to check, then confirm `.PHONY: clean` is in the Makefile."
            condition: "default"

    quiz:
      title: ".PHONY — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "What is the primary purpose of `.PHONY`?"
          options:
            - "To make the build faster"
            - "To tell Make that a target is a command name, not a physical file on disk"
            - "To encrypt the Makefile for security"
            - "To allow spaces instead of Tabs in recipes"
          correct_index: 1
          explanation: "`.PHONY` tells Make to ignore any files on disk with the same name as the target. This ensures that commands like `make clean` always run, even if a file named `clean` happens to exist."

        - question: "What happens if a target name (like `test`) matches a directory name in your project, but is NOT declared `.PHONY`?"
          options:
            - "Make will delete the directory and replace it with a file"
            - "Make will encounter a fatal error and stop"
            - "Make will assume the target is up-to-date (since the directory exists) and will NOT run the recipe"
            - "Make will always execute the recipe because directories are always considered 'new'"
          correct_index: 2
          explanation: "By default, Make looks for a file OR directory matching the target name. If a directory named `test` exists and has no dependencies, Make thinks its job is done. `.PHONY: test` forces it to run the recipe regardless."

        - question: "How can you use Phony targets to bundle multiple independent builds together?"
          options:
            - "By creating a phony target (like `all`) and listing the other targets as its prerequisites"
            - "By listing the phony target inside every other rule's recipe"
            - "By using the `bundle:` keyword instead of `.PHONY:`"
            - "Make cannot group multiple targets into one command"
          correct_index: 0
          explanation: "The conventional `all` target is usually a phony target that depends on every program you want to build. Running `make all` triggers all those prerequisites in sequence (or parallel)."

        - question: "Why is it generally a bad idea to make a real file target (like `app`) depend on a `.PHONY` target?"
          options:
            - "It will cause the Makefile to be deleted"
            - "The real target will be re-built every single time you run make, defeating incremental builds"
            - "Make will refuse to run if real and phony targets are mixed"
            - "It makes the resulting executable much slower"
          correct_index: 1
          explanation: "Because a Phony target is NEVER up-to-date, any real file that depends on it will also be considered out-of-date every time. This forces constant, unnecessary recompilation."

        - question: "**[Interleaved: Revisit Step 4]** In the pattern rule `%.o: %.c`, which automatic variable expands to the **target** (the `.o` file)?"
          options:
            - "`$<`"
            - "`$^`"
            - "`$@`"
            - "`$*`"
          correct_index: 2
          explanation: "As we used in Step 4, `$@` is the target (think '@' = 'at the target'). `$<` is the first prerequisite (the `.c` file)."

  # --------------------------------------------------------------------------
  # STEP 7: Summary & Best Practices
  # --------------------------------------------------------------------------
  - title: "Summary and Best Practices"
    instructions: |
      You now know the essentials of Make. You can:
      - Indent recipes with a real Tab character.
      - Use variables for DRY (Don't Repeat Yourself) builds.
      - Write pattern rules and use automatic variables for scalable automation.
      - Rely on the timestamp-based dependency graph for incremental builds.
      - Declare non-file targets with `.PHONY` so they always run.

      ### A Note on Recursive Make

      As a project grows, it is tempting to put a Makefile in every subdirectory and call `make -C subdir` from a top-level Makefile. This pattern is called **Recursive Make**.

      > [!WARNING]
      > Recursive Make breaks the global view of the dependency graph: each sub-make sees only its own targets, so files sometimes aren't rebuilt when they should be. For larger projects, a single non-recursive Makefile that `include`s sub-files is usually easier to maintain — see Peter Miller's paper *"Recursive Make Considered Harmful."*

    solution:
      files:
        - path: "make_project/Makefile"
          content: "CC = gcc\nCFLAGS = -Wall -std=c11\nOBJS = main.o math.o io.o\n\napp: $(OBJS)\n\t$(CC) $(CFLAGS) $^ -o $@\n\n%.o: %.c\n\t$(CC) $(CFLAGS) -c $< -o $@\n\n.PHONY: clean\nclean:\n\trm -f *.o app\n"
          language: "makefile"
      commands:
        - "make clean"
        - "make"
      explanation: |
        No file edits are required for this step — it is a review and summary.

        - This Makefile demonstrates every concept from the tutorial in 10 lines:
          - **Variables (`CC`, `CFLAGS`, `OBJS`):** DRY principle — change the compiler or flags in one place.
          - **`$(OBJS)` prerequisite:** Declarative dependency graph — Make knows which `.o` files `app` needs.
          - **`$^` and `$@`:** Automatic variables — no repetition of filenames in the link command.
          - **Pattern rule `%.o: %.c`:** One rule handles all source files; adding `newfile.c` just requires adding `newfile.o` to `OBJS`.
          - **`.PHONY: clean`:** Guarantees `make clean` always runs regardless of filesystem state.
          - **Tab characters on recipe lines:** The invisible but critical requirement that separates Make from all other config formats.

        **Key concept connections:**

        | Makefile feature | Why it matters |
        |---|---|
        | Tab trap | Parser requirement — spaces cause `missing separator` error |
        | Variables (`CC`, `CFLAGS`) | DRY — one-line change to switch compilers |
        | Pattern rule `%.o: %.c` | Scalable — one rule for any number of source files |
        | Automatic variables `$@`, `$<`, `$^` | No filename repetition in recipes |
        | Timestamp-based DAG | Incremental builds — only recompiles what changed |
        | `.PHONY` | Non-file targets always run, even if a same-named file exists |
