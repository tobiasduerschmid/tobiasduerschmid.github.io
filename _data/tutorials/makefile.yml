title: "Makefiles: From Pain to Power (C Edition)"
description: "Learn how to write Makefiles, understand dependency graphs, and automate your C builds through hands-on practice in an interactive terminal."

# Authoring-time Bloom-verb objectives. Not yet rendered to students.
learning_objectives:
  - "Explain why running `gcc` by hand on every change is wasteful, and what dependency tracking gives you."
  - "Apply Makefile rule syntax (target / prerequisites / recipe) and recognize the Tab Trap."
  - "Refactor a verbose Makefile to use variables, automatic variables (`$@`, `$<`, `$^`), pattern rules, and `OBJS`."
  - "Predict whether `make` will rebuild a given target based on timestamps."
  - "Use `.PHONY` to mark non-file targets like `clean`."

require_tests: true
autosave_type: none

# Live dependency-graph pane. Renders the DAG `make -n` would walk —
# targets, prerequisites, order-only edges, phony targets, staleness flags.
# Refreshes automatically on Makefile save and after every shell command.
# See js/make-graph.js for the renderer and the tutorial-authoring skill
# for the schema reference.
make_dag: /tutorial/make_project

setup_commands:
  - 'mkdir -p /tutorial/make_project'
  - 'sed -i "s/^exec //" /usr/bin/gcc'
  - 'printf "\nsleep 2\n" >> /usr/bin/gcc'

steps:
  # --------------------------------------------------------------------------
  # STEP 1: The "Pain Point" Sandbox
  # --------------------------------------------------------------------------
  # Pedagogy: productive failure (Bjork) — feel the pain before learning the tool
  - title: "The Pain of Manual Compilation"
    # step_dir: drop the user's interactive terminal directly into the project
    # directory when this step opens. Saves the friction of `cd make_project`
    # every time. Wired through TutorialCode._runStepDir → _runSilent (the same
    # bash session as the user's terminal, so the cd persists for everything
    # they type next). See js/tutorial-code.js step_dir handling.
    step_dir: /tutorial/make_project
    instructions: |
      ### Why this matters

      Before you care *how* a Makefile works, you need to feel *why* it exists. Every build tool exists to solve a real pain — and you'll appreciate Make's design only after you've suffered through manual compilation. Let's feel that pain first.

      ### Prerequisites

      You should be comfortable reading C source code at the level of "a function that takes parameters and returns a value." You don't need to know what `static` does or how pointers work — the C in this tutorial is deliberately tiny. **If C is rusty, the [C for C++ Programmers tutorial](/SEBook/tools/c-tutorial) is a focused warm-up that complements this one.**

      You also need shell basics: `cd`, `ls`, running an executable. No prior Make exposure required.

      Total time: **~60 min** for all 7 chapters.

      ### 🎯 You will learn to

      - Apply `gcc` to compile a multi-file C project by hand
      - Analyze why manual recompilation does not scale beyond a handful of files

      ### Task 1: Compile the project manually

      We have a small C project with three files: `main.c`, `math.c`, and `io.c` — your terminal is already inside `make_project/` (check the prompt). Let's compile them the hard way:

      ```bash
      gcc main.c math.c io.c -o app
      ```

      **Oh no!** The compilation failed. There is a syntax error in `math.c`.

      ### Task 2: Fix the error and recompile

      1. Open `math.c` in the editor.
      2. Fix the missing semicolon at the end of the `return` statement.
      3. Save the file.
      4. Go back to the terminal and **re-type the entire `gcc` command from scratch** (don't shortcut with Up arrow on this attempt — feel the friction of typing all three filenames again).

      Notice what just happened: to fix **one file**, you had to recompile **all three**. `gcc` has no memory — it blindly reprocesses everything you hand it. In a 500-file project, fixing a single typo means a minutes-long recompile of every untouched file. We need a smarter tool.

      <details markdown="1"><summary>📖 Yes, you can press Up arrow next time</summary>

      Real shells let you scroll through history with the Up arrow. We made you re-type the command on purpose — the typing time *is* the lesson. In real projects, the typing time per command is small but the *recompile* time per command is huge, and the recompile time is what makes manual builds untenable. Once you've felt that, use Up arrow / `Ctrl-R` / shell aliases as much as you like.

      </details>

    files:
      - path: "make_project/main.c"
        content: |
          #include <stdio.h>
          int add(int a, int b);
          void init_io();

          int main() {
              init_io();
              printf("Math test: 2 + 3 = %d\n", add(2, 3));
              return 0;
          }
        language: "c"
      - path: "make_project/math.c"
        content: |
          int add(int a, int b) {
              return a + b // BUG: missing semicolon
          }
        language: "c"
      - path: "make_project/io.c"
        content: |
          #include <stdio.h>
          void init_io() {
              printf("IO Initialized.\n");
          }
        language: "c"

    open_file: "make_project/math.c"

    watch_files:
      - "make_project/math.c"

    solution:
      files:
        - path: "make_project/math.c"
          content: |
            int add(int a, int b) {
                return a + b;   // Bug fixed: added the missing semicolon
            }
          language: "c"
      commands:
        - "cd /tutorial/make_project/"
        - "gcc main.c math.c io.c -o app"
      explanation: |
        - **Test 1:** `grep -q 'a + b;' math.c` — the semicolon must be present at the end of the `return` statement.
        - **Test 2:** `[ -f app ]` — the compiled executable `app` must exist.
        - **The pain of manual compilation:** After fixing the one-character bug, you had to re-type (or recall) the entire `gcc` command to recompile all three files — even `main.c` and `io.c` were untouched. This is the core problem Make solves: in a 500-file project, fixing one typo means recompiling everything.

    tests:
      - description: "The syntax error in math.c is fixed"
        command: "cd /tutorial/make_project && grep -q 'a + b;' math.c"
        hints:
          - title: "Layer 1 — orientation"
            text: "Look at the gcc error message — it points at the line and column. C's `return` statement (like every other statement) needs a terminator. Which character?"
          - title: "Layer 2 — strategy"
            text: "Open `math.c` in the editor. The `return a + b` line is missing a semicolon at the end. Add it, save, and re-run the gcc command."
            condition: "code_missing: a + b;"
      - description: "The project compiled successfully into an executable named 'app'"
        command: "cd /tutorial/make_project && [ -f app ]"
        hints:
          - title: "Layer 1 — orientation"
            text: "After fixing the syntax error, recompile by re-typing (or pressing Up arrow) the same gcc command. Notice that gcc happily reprocesses *every* file — even the two you didn't touch."
          - title: "Layer 2 — strategy"
            text: "The exact command (your terminal is already in `/tutorial/make_project`) is: `gcc main.c math.c io.c -o app`. The `-o app` flag names the output binary."
            condition: "output_missing: app"

    quiz:
      title: "Step 1 — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "What is the main problem with using `gcc main.c math.c io.c -o app` every time you fix a bug?"
          options:
            - "gcc cannot compile more than two files at once"
            - "gcc recompiles ALL files, even the ones you didn't change"
            - "The output binary must always be named `a.out`"
            - "gcc requires files to be listed in alphabetical order"
          correct_index: 1
          option_feedback:
            0: "gcc compiles however many files you list — there's no built-in limit. The pain isn't capacity; it's that gcc has no memory of what changed since last time."
            2: "`-o app` overrides the default. `a.out` is what you'd get *without* `-o`, but you can name the binary anything. The pain isn't naming."
            3: "There's no alphabetical rule. gcc compiles in the order you list. The pain is rebuilding *all* of them every time."
          explanation: "gcc has no memory — it blindly reprocesses every file you hand it. Fix one file? It still recompiles all three. In large projects, this means minutes-long rebuilds for single-line changes."

        - question: "In a 500-file C project, you fix a typo in one file and rerun the same gcc command. How many files does gcc recompile?"
          options:
            - "Only the 1 file you changed"
            - "The changed file plus any files that include it"
            - "All 500 files"
            - "None — gcc auto-detects unchanged files"
          correct_index: 2
          option_feedback:
            0: "That's what a smart build tool would do. gcc itself has no idea which files changed — it compiles every file you list, every run."
            1: "That's what `make` (or another dependency tracker) does. gcc has no view of `#include` graphs across the build; it just compiles what's on the command line."
            3: "gcc has no auto-detection. That's the whole reason `make` exists — to add the change-detection layer gcc lacks."
          explanation: "gcc has no dependency tracking. It processes every file you list, every time. This is the core pain point that build tools like Make solve."

        - question: "What key capability does Make have that raw gcc does NOT?"
          options:
            - "Checking syntax errors before compilation"
            - "Automatically downloading missing libraries"
            - "Tracking which files changed since the last build"
            - "Compiling faster using parallel threads"
          correct_index: 2
          option_feedback:
            0: "Both gcc and Make catch syntax errors at compile time — Make just orchestrates calls to gcc. Syntax checking belongs to the compiler."
            1: "Library downloading is a package manager's job (apt, brew, vcpkg, conan). Make runs commands you've written; it doesn't fetch dependencies."
            3: "Make can run jobs in parallel (`make -j`), but that's a bonus. Even with `-j 1`, Make's superpower — timestamp-based skipping — still applies."
          explanation: "Make tracks file modification timestamps (and a dependency graph) to determine which targets are out of date. It only rebuilds what's actually needed."

        - question: |
            A teammate suggests "we don't need Make — I'll just write a shell alias `build='gcc main.c math.c io.c -o app'` and we'll all use it." What's the most important thing this *doesn't* solve?
          options:
            - "Aliases don't work in zsh, only bash"
            - "Aliases can't pass arguments, so it can't compile other projects"
            - "Aliases still recompile every file every time — they have no memory of what changed"
            - "Aliases are slower than Makefiles by about 2× per invocation"
          correct_index: 2
          option_feedback:
            0: "Aliases work in both bash and zsh. The shell isn't the issue."
            1: "Aliases *can* pass arguments via shell expansion, and even if they couldn't, that's a feature gap — not the *core* problem Make exists to solve."
            3: "Speed isn't the issue. Both invocations call `gcc` once. The difference is *what* gcc compiles — Make can skip files that didn't change; an alias can't."
          explanation: "Aliases (and shell scripts, and IDE 'run' buttons) just save you typing. They don't track which files changed. The core capability Make adds is the *dependency graph + timestamp comparison* — and no amount of shell-level tooling reproduces that without re-implementing Make."

  # --------------------------------------------------------------------------
  # STEP 2: The Core Anatomy & The "Tab" Trap
  # --------------------------------------------------------------------------
  # Pedagogy: PRIMM — Run, then Investigate the cryptic Tab Trap error
  - title: "Your First Makefile & The Tab Trap"
    step_dir: /tutorial/make_project
    instructions: |
      ### Why this matters

      A Makefile is just a list of **rules** describing a dependency graph — and learning the rule anatomy is the gateway to every other Make feature. But Make hides one infamous trap right at the start: recipe lines must be indented with a real Tab, not spaces. Stumbling into that trap once will save you hours of confusion later.

      ### 🎯 You will learn to

      - Apply Makefile rule syntax (`target: prerequisites` followed by an indented recipe)
      - Analyze the cryptic `missing separator. Stop.` error and recognize the Tab Trap
      - Apply `sed -i` to substitute leading spaces with a Tab character

      ### The Anatomy of a Rule

      Makefiles are made of **rules** that describe a dependency graph. A rule looks like this:

      ```make
      target: prerequisites
          recipe
      ```
      * **Target:** The file you want to build (e.g., your executable).
      * **Prerequisites:** The files the target depends on (e.g., your `.c` files).
      * **Recipe:** The shell command to create the target.

      Make reads these rules, builds a graph of what depends on what, and only runs the recipes that are needed.

      ### Task 1: Run your first Make command

      A basic `Makefile` has been added to your project. Try running it:

      ```bash
      make
      ```

      **Error!** You should see: `Makefile:2: *** missing separator. Stop.`

      ### Task 2: Fix the Tab Trap

      Makefiles have one notoriously strict, invisible rule: **Recipes MUST be indented with a true `Tab` character, not spaces!**

      ```make
      target: prerequisites
      [TAB]recipe
      ```

      If you see 4 or 8 spaces, it will NOT work. Most GUI editors silently insert spaces when you press Tab — so you need to fix it in the terminal.

      **`sed` to the rescue.** `sed` is a stream editor: it reads a file line by line, applies a substitution, and writes the result. The substitution syntax is `s/pattern/replacement/`:

      ```bash
      # Replace the leading spaces on the recipe line with a real Tab:
      sed -i 's/^    /\t/' Makefile
      ```

      Breaking this down:
      - `s/^    /\t/` — replace four leading spaces (`^    `) with a tab character (`\t`)
      - `-i` — edit the file **in-place** (overwrite it directly)

      Run `cat -A Makefile` after — recipe lines starting with `^I` have a real Tab (`^I` is how `cat -A` displays the Tab character). Then run `make` again.

    setup_commands:
      - "rm -f /tutorial/make_project/app"

    files:
      - path: "make_project/Makefile"
        content: |
          app: main.c math.c io.c
              gcc main.c math.c io.c -o app
        language: "makefile"

    open_file: "make_project/Makefile"

    watch_files:
      - "make_project/Makefile"

    solution:
      files:
        - path: "make_project/Makefile"
          content: "app: main.c math.c io.c\n\tgcc main.c math.c io.c -o app\n"
          language: "makefile"
      commands:
        - "sed -i 's/^    /\t/' Makefile"
        - "make"
      explanation: |
        - **Test 1:** `grep -qP '^\tgcc' Makefile` — the recipe line must start with a real Tab character (`\t`), not spaces. `grep -P` uses Perl-compatible regex where `\t` matches a literal Tab.
        - **Test 2:** `[ -f app ]` — Make must have run successfully and produced the `app` executable.
        - **The Tab Trap:** Make's parser uses the Tab character specifically to identify recipe lines. Spaces look identical on screen but cause the infamous `missing separator. Stop.` error. Most editors silently convert Tab keypresses to spaces, which is why this trap catches beginners.
        - **`sed -i 's/^    /\t/'`:** `s/pattern/replacement/` substitutes the pattern. `^    ` matches four spaces only at the start of a line (`^` anchors to line start). `\t` is a Tab character. `-i` edits the file in-place.

    tests:
      - description: "The recipe uses a Tab character, not spaces"
        command: "cd /tutorial/make_project && grep -qP '^\\tgcc' Makefile"
        hints:
          - title: "Layer 1 — orientation"
            text: "Make's parser looks for a literal Tab byte at the start of recipe lines. Spaces look identical on screen but trigger the cryptic `*** missing separator. Stop.` error. The fix has to put a real Tab there."
          - title: "Layer 2 — strategy"
            text: "Most editors auto-convert Tab keypresses to spaces. The simplest fix is `sed -i 's/^    /\\t/' Makefile` — replace four leading spaces with a Tab on every line of the file."
            condition: "output_contains: missing separator"
          - title: "Layer 3 — verify"
            text: "Run `cat -A Makefile` after the sed. Recipe lines should start with `^I` (that's how `cat -A` displays a Tab). If you see `        ` instead, the spaces weren't replaced."
            condition: "code_missing: \\tgcc"
      - description: "Make ran successfully and built 'app'"
        command: "cd /tutorial/make_project && [ -f app ]"
        hints:
          - title: "Layer 1 — orientation"
            text: "Run `make` from inside `make_project/`. With a working Makefile, it should print one line per command and produce an `app` binary."
          - title: "Layer 2 — strategy"
            text: "If Make prints `*** missing separator`, the Tab isn't fixed yet. If it runs gcc but gcc errors, the previous step's syntax bug may have come back — re-check `math.c`."
            condition: "output_contains: separator"

    quiz:
      title: "Step 2 — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "In a Makefile rule, what is the **recipe**?"
          options:
            - "The file you want to build (the target name)"
            - "The list of files the target depends on"
            - "The shell command(s) that create the target"
            - "A comment block describing what the rule does"
          correct_index: 2
          option_feedback:
            0: "That's the *target* — what's to the left of the colon. The recipe is the shell command beneath."
            1: "Those are the *prerequisites* — what's to the right of the colon. The recipe is the indented shell line beneath."
            3: "Comments in Makefiles start with `#` and aren't part of the rule structure. The recipe is executable shell, not documentation."
          explanation: "A Makefile rule has three parts: `target: prerequisites` on the first line, then the **recipe** (the shell command) indented on the next line. The recipe is what actually runs to produce the target."

        - question: "What error does Make print when recipe lines use spaces instead of a real Tab character?"
          options:
            - "Segmentation fault (core dumped)"
            - "missing separator. Stop."
            - "command not found"
            - "permission denied"
          correct_index: 1
          option_feedback:
            0: "Segfaults come from runtime memory bugs, not a parser disagreeing with you about indentation. Make never gets to running anything; the file rejects parsing first."
            2: "That's a shell error you'd get if you tried to run a non-existent program. Make's parser fails before any shell command runs."
            3: "Permission errors come from the OS refusing to execute. The file is readable; Make's parser just rejects spaces where it expected a Tab."
          explanation: "Make's parser uses a leading Tab character to identify recipe lines. Spaces look identical on screen but cause the cryptic `missing separator` error — one of Make's most famous gotchas."

        - question: "Which of the following correctly describes the three parts of a Makefile rule?"
          type: multiple
          options:
            - "The **target** is the file you want to build"
            - "**Prerequisites** are the files the target depends on"
            - "Recipe lines MUST start with a real Tab character, not spaces"
            - "Prerequisites must always be sorted alphabetically"
          correct_indices:
            - 0
            - 1
            - 2
          option_feedback:
            3: "Prerequisites can appear in any order — Make builds a dependency graph from them, not a sorted list. Ordering matters only when *you* care about it (e.g., to control link order)."
          explanation: "A rule is `target: prerequisites` followed by a recipe on the next line. The recipe must use a literal Tab. Prerequisites can be in any order — Make builds a dependency graph from them."

        - question: |
            A teammate's editor uses **2-space** indentation, so their Makefile recipes start with 2 spaces instead of 4. They run the `sed` command from this step verbatim:

            ```bash
            sed -i 's/^    /\t/' Makefile
            ```

            What happens, and why?
          type: single
          options:
            - "It silently inserts a Tab and the build now works"
            - "It does nothing — the regex matches 4 leading spaces, but the file has 2 — and Make still complains about `missing separator`"
            - "Sed errors out because the file doesn't match the pattern"
            - "It doubles each leading space, producing 4 spaces, then a Tab"
          correct_index: 1
          option_feedback:
            0: "The substitution only fires on lines that *match the pattern*. 2 leading spaces ≠ 4 leading spaces — sed leaves those lines alone, and Make still rejects the indentation."
            2: "Sed doesn't error when the pattern doesn't match — it just doesn't substitute. No-match-means-no-change is sed's default mode (use the `q` flag to make it complain)."
            3: "Sed's substitute does *replacement*, not multiplication. Without a match, no change."
          explanation: "The pattern `^    ` (four leading spaces) is *literally* four spaces. If the editor used a different indentation width, the pattern doesn't match. Two fixes: (1) widen the regex to `^ +` (one or more leading spaces), or (2) use a more robust tool like `expand --tabs=4 -i Makefile | sed 's/^    /\\t/'`. The general lesson: a fix tied to a specific indentation width is brittle — better to detect the actual leading whitespace and replace it with a Tab regardless of count."

  # --------------------------------------------------------------------------
  # STEP 3: The "DRY" Refactor — Variables
  # --------------------------------------------------------------------------
  # Pedagogy: PRIMM — Modify a working Makefile to remove duplication
  - title: "Don't Repeat Yourself (DRY) with Variables"
    step_dir: /tutorial/make_project
    instructions: |
      ### Why this matters

      A single-rule Makefile recompiles everything any time anything changes. To unlock incremental builds in later steps, you first need to split compilation into per-file rules — and the moment you do, duplication explodes. Variables are how Make lets you express the build configuration in one place and reuse it everywhere, so a compiler swap is one edit instead of four.

      ### 🎯 You will learn to

      - Apply Make variables (`CC`, `CFLAGS`) to eliminate repeated literals
      - Evaluate the trade-off between recursive (`=`) and simple (`:=`) variable assignment

      ### Enabling Incremental Builds

      Our single-rule Makefile still recompiles everything together. To let Make skip unchanged files, we must compile each `.c` file into an **object file** (`.o`) separately, then **link** the `.o` files into the final executable.

      Look at the new `Makefile`. It does this — but notice the problem: `gcc -Wall -std=c11` is hardcoded **four times**. If we ever switch to `clang`, we'd have to edit four lines. This violates the **DRY principle** (Don't Repeat Yourself).

      ### Task: Refactor using Variables

      In Makefiles, you define variables at the top and reference them with `$(VAR_NAME)`.

      1. Open `Makefile`.
      2. At the very top, define two variables (these are Make's standard names for C builds):
         ```make
         CC = gcc
         CFLAGS = -Wall -std=c11
         ```
      3. Replace all 4 instances of `gcc` with `$(CC)`.
      4. Replace all 4 instances of `-Wall -std=c11` with `$(CFLAGS)`.
      5. Save the file and run `make` to confirm it still compiles successfully.

      <details markdown="1"><summary>📖 `=` vs `:=` — recursive vs simple expansion</summary>

      Make has *two* assignment operators. They look almost identical and behave very differently:

      ```make
      CC  = gcc                  # Recursive — re-evaluated every time CC is used
      CC := gcc                  # Simple — evaluated once, at the moment of the assignment
      ```

      The difference bites when one variable references another:

      ```make
      VERSION = 1.0
      ARCHIVE = app-$(VERSION).tar.gz
      VERSION = 2.0              # ARCHIVE expands to "app-2.0.tar.gz" because = is lazy

      VERSION := 1.0
      ARCHIVE := app-$(VERSION).tar.gz
      VERSION := 2.0             # ARCHIVE is still "app-1.0.tar.gz" — captured at assignment time
      ```

      Recursive (`=`) evaluates the right-hand side every time the variable is *used*; simple (`:=`) evaluates it once, at the *assignment*. Use `:=` when you want a snapshot — especially for shell commands like `$(shell date +%s)` (you don't want a different timestamp every time the variable is read).

      For this tutorial we use `=` everywhere — the simpler one to learn first. In real-world Makefiles, `:=` is often the safer default for anything that involves shell calls or builds incrementally on prior values.

      </details>

      Now a compiler change is a one-line edit at the top of the file.

    setup_commands:
      - "rm -f /tutorial/make_project/*.o /tutorial/make_project/app"

    files:
      - path: "make_project/Makefile"
        content: |
          app: main.o math.o io.o
          	gcc -Wall -std=c11 main.o math.o io.o -o app

          main.o: main.c
          	gcc -Wall -std=c11 -c main.c

          math.o: math.c
          	gcc -Wall -std=c11 -c math.c

          io.o: io.c
          	gcc -Wall -std=c11 -c io.c
        language: "makefile"

    open_file: "make_project/Makefile"

    watch_files:
      - "make_project/Makefile"

    solution:
      files:
        - path: "make_project/Makefile"
          content: "CC = gcc\nCFLAGS = -Wall -std=c11\n\napp: main.o math.o io.o\n\t$(CC) $(CFLAGS) main.o math.o io.o -o app\n\nmain.o: main.c\n\t$(CC) $(CFLAGS) -c main.c\n\nmath.o: math.c\n\t$(CC) $(CFLAGS) -c math.c\n\nio.o: io.c\n\t$(CC) $(CFLAGS) -c io.c\n"
          language: "makefile"
      explanation: |
        - **Test 1:** `grep -q 'CC *=' Makefile` — the `CC` variable must be defined.
        - **Test 2:** `grep -q 'CFLAGS *=' Makefile` — the `CFLAGS` variable must be defined.
        - **Test 3:** `grep -q '\$(CC)' Makefile` — `$(CC)` must appear in the file (replacing the hardcoded `gcc`).
        - **Test 4:** `make && [ -f app ]` — the build must still succeed.
        - **DRY principle:** Before this refactor, `gcc -Wall -std=c11` appeared 4 times. With `CC = gcc` and `CFLAGS = -Wall -std=c11`, a switch from `gcc` to `clang` requires editing exactly one line. This is the same principle as C++ `#define` or Python constants.
        - **`$(CC)` syntax:** Make expands variables with `$(VAR_NAME)` or `${VAR_NAME}`. The parentheses (or braces) are required for multi-character variable names — `$CC` alone would be interpreted as `$C` followed by the literal character `C`.

    tests:
      - description: "Defined CC variable"
        command: "cd /tutorial/make_project && grep -q 'CC *=' Makefile"
        hints:
          - title: "Layer 1 — orientation"
            text: "Add a line at the top of the Makefile that names the compiler. The convention is `CC = gcc` (this is Make's standard variable name for the C compiler)."
          - title: "Layer 2 — strategy"
            text: "Variables are written *before* any rules. The first three lines of the Makefile should be:\n```make\nCC = gcc\nCFLAGS = -Wall -std=c11\n\n```\nThen the rules follow."
            condition: "code_missing: CC ="
      - description: "Defined CFLAGS variable"
        command: "cd /tutorial/make_project && grep -q 'CFLAGS *=' Makefile"
        hints:
          - title: "Layer 1 — orientation"
            text: "After `CC = gcc`, add `CFLAGS = -Wall -std=c11` on the next line. CFLAGS is Make's standard name for compiler flags."
            condition: "code_missing: CFLAGS"
      - description: "Used $(CC) in every recipe and removed every hardcoded `gcc` from recipes"
        command: |
          cd /tutorial/make_project
          # Positive: $(CC) appears at least 4 times (link + 3 .o rules)
          cc_count=$(grep -c '\$(CC)' Makefile)
          if [ "$cc_count" -lt 4 ]; then
            echo "Found only $cc_count uses of \$(CC). Replace 'gcc' with \$(CC) in all 4 recipes."
            exit 1
          fi
          # Negative: no recipe still has a literal `gcc` call (recipes start with a Tab)
          if grep -qE '^\t.*\bgcc\b' Makefile; then
            echo "A recipe still calls 'gcc' directly. Replace every 'gcc' in a recipe with \$(CC)."
            exit 1
          fi
      - description: "Used $(CFLAGS) in every recipe and removed every hardcoded `-Wall -std=c11` from recipes"
        command: |
          cd /tutorial/make_project
          cflags_count=$(grep -c '\$(CFLAGS)' Makefile)
          if [ "$cflags_count" -lt 4 ]; then
            echo "Found only $cflags_count uses of \$(CFLAGS). Replace '-Wall -std=c11' with \$(CFLAGS) in all 4 recipes."
            exit 1
          fi
          # Negative: no recipe still has a literal `-Wall -std=c11`
          if grep -qE '^\t.*-Wall.*-std=c11' Makefile; then
            echo "A recipe still has '-Wall -std=c11' hardcoded. Replace it with \$(CFLAGS)."
            exit 1
          fi
      - description: "Code still builds successfully"
        command: "cd /tutorial/make_project && make && [ -f app ]"

    quiz:
      title: "Step 3 — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "What is the correct syntax to expand a Makefile variable named `CFLAGS` inside a recipe?"
          options:
            - "%CFLAGS%"
            - "$(CFLAGS)"
            - "[CFLAGS]"
            - "#CFLAGS"
          correct_index: 1
          option_feedback:
            0: "`%VAR%` is Windows CMD/batch syntax. Make doesn't recognize it; the % character has a different meaning (pattern wildcard)."
            2: "Square brackets aren't a Make syntax for anything. They're sometimes used in shell case-statement patterns but never for variable expansion."
            3: "`#` starts a comment in Make. Anything after `#` is ignored."
          explanation: "Make uses `$(VAR)` or `${VAR}` to expand variables. `$(CFLAGS)` is the standard convention. Note that `%CFLAGS%` is Windows CMD syntax and has no meaning in Make."

        - question: "You define `CC = gcc` at the top of your Makefile and use `$(CC)` in all four recipes. You want to switch to `clang`. How many lines must you edit?"
          options:
            - "Four — one for each recipe line that calls the compiler"
            - "One — just the line where CC is defined"
            - "None — Make auto-detects installed compilers"
            - "Two — the definition and the first recipe"
          correct_index: 1
          option_feedback:
            0: "That'd be the case *without* the variable — exactly the problem the DRY refactor solves. With `$(CC)` everywhere, only the definition needs changing."
            2: "Make has no compiler-detection logic. You decide which compiler is `CC`."
            3: "Recipes don't need separate edits — they reference `$(CC)`, so they pick up the new value automatically."
          explanation: "This is the DRY (Don't Repeat Yourself) principle in action. All four recipes reference `$(CC)`, so changing `CC = gcc` to `CC = clang` updates every recipe at once."

        - question: "Which of the following are benefits of using `CC` and `CFLAGS` variables in a Makefile? (Select all that apply)"
          type: multiple
          options:
            - "Switching compilers requires editing only one line"
            - "Changing compiler flags requires editing only one place"
            - "The build automatically becomes faster"
            - "Make no longer requires Tab characters in recipes"
          correct_indices:
            - 0
            - 1
          option_feedback:
            2: "Variables don't change build speed — that's a Step-5 (incremental builds) concern. They organize the Makefile, not the executions."
            3: "Variables and the Tab Trap are independent concerns. Recipe lines still need a literal Tab regardless of how many variables you use."
          explanation: "Variables provide a single point of change for repeated values. They do NOT affect build speed or the Tab requirement — those are separate concerns entirely."

        - question: "In the rule `app: $(OBJS)`, which part is the **target**?"
          options:
            - "app"
            - "OBJS"
            - "gcc"
            - "The entire line"
          correct_index: 0
          option_feedback:
            1: "`OBJS` (after the colon) is part of the *prerequisites*, not the target. Targets sit on the left of the colon."
            2: "`gcc` doesn't appear in the rule line at all (the recipe goes on the next line). Even when it does, it's a *command*, not a target."
            3: "Within a rule, target and prerequisites have distinct roles separated by the colon. Calling 'the whole line' the target loses that structure."
          explanation: "Even when using variables like `$(OBJS)`, the basic Rule structure remains `target: prerequisites`. Everything to the left of the colon is the target (what you want to build)."

        - question: "**[Interleaved: Revisit Step 1]** What is the core problem that Make solves compared to running a manual `gcc` command on all files?"
          options:
            - "Make automatically fixes syntax errors"
            - "Make recompiles every file in parallel by default"
            - "Make only rebuilds the files that actually changed (incremental builds)"
            - "Make compresses the binary to save disk space"
          correct_index: 2
          option_feedback:
            0: "Make doesn't fix code — only the compiler can do that. Make orchestrates *which* files the compiler sees."
            1: "Parallelism requires `-j` and isn't on by default (single-threaded `make` is the default). The core win is *skipping* work, not parallelizing it."
            3: "Binary size is the linker's domain (with strip/optimizer flags). Make doesn't post-process binaries."
          explanation: "As we felt in Step 1, manual compilation is slow because it rebuilds everything. Make's superpower is its ability to track changes and only run necessary commands."

  # --------------------------------------------------------------------------
  # STEP 4: Automatic Variables & Pattern Rules
  # --------------------------------------------------------------------------
  # Pedagogy: PRIMM — Modify three near-identical rules into one pattern rule
  - title: "Smarter Rules: Automatic Variables & Patterns"
    # The graph topology expands in this step: the .o intermediate nodes
    # appear between app and the .c sources. Defaulting to the DAG view
    # makes the structural change visually obvious.
    view: make_dag
    step_dir: /tutorial/make_project
    instructions: |
      ### Why this matters

      Three near-identical rules for `main.o`, `math.o`, and `io.o` is annoying at three files and unbearable at fifty. Pattern rules and automatic variables (`$@`, `$<`, `$^`) are Make's mechanism for expressing "do the same thing for any matching pair" — they shrink your Makefile while letting it scale to arbitrary numbers of source files with no edits.

      ### 🎯 You will learn to

      - Apply automatic variables (`$@`, `$<`, `$^`) to eliminate filename repetition
      - Create a pattern rule (`%.o: %.c`) that compiles any source file
      - Analyze how an `OBJS` list combines with pattern rules to scale to N files

      ### The Repetition Problem

      Look at your current Makefile. The three `.o` rules are almost identical:

      ```make
      main.o: main.c
      	$(CC) $(CFLAGS) -c main.c

      math.o: math.c
      	$(CC) $(CFLAGS) -c math.c

      io.o: io.c
      	$(CC) $(CFLAGS) -c io.c
      ```

      Each filename appears **twice** per rule. With 50 source files you'd have 50 nearly identical rules. There must be a better way.

      ### ✏️ Predict before you read on

      Make has three "automatic variables" that solve this. Their names use punctuation, not words. From the names alone, guess which one means what.

      Given the rule `app: main.o math.o io.o`, what should each of these expand to *inside the recipe*?

      - `$@` → ?
      - `$<` → ?
      - `$^` → ?

      Pick from: `app` · `main.o` · `main.o math.o io.o` · `gcc`. Commit to a mapping (you can guess from the punctuation — `@` looks like a target, `<` looks like an arrow pointing into the rule, `^` looks like… something).

      <details markdown="1"><summary>⚠️ Open after you've committed</summary>

      - `$@` → `app` — the **target** (mnemonic: `@` looks like the target reticule).
      - `$<` → `main.o` — the **first prerequisite** (mnemonic: `<` is an arrow pointing into the rule from the left).
      - `$^` → `main.o math.o io.o` — **all prerequisites** (mnemonic: think "caret" → "carry-all").

      The most common bug: confusing `$<` with `$^` in compile-vs-link rules. In a per-file rule (`%.o: %.c`), you want `$<` (single source). In the link rule (`app: main.o math.o io.o`), you want `$^` (all objects). Hit the wrong one and you'll either re-compile every file at link time (`$^` in pattern rule) or link only the first object (`$<` in link rule).

      </details>

      ### Automatic Variables

      Here's the table — match it against your guesses above:

      | Variable | Expands to |
      |----------|------------|
      | `$@` | The **target** name (left of the `:`) |
      | `$<` | The **first prerequisite** (first item after the `:`) |
      | `$^` | **All prerequisites** |

      ### Pattern Rules

      A **pattern rule** uses `%` as a wildcard to match any filename stem:

      ```make
      %.o: %.c
      	$(CC) $(CFLAGS) -c $< -o $@
      ```

      This **single rule** tells Make: "to build *any* `.o` file, compile the matching `.c` file." It replaces all three of your explicit `.o` rules.

      ### Task: Refactor with OBJS, automatic variables, and a pattern rule

      1. At the very top (after `CFLAGS`), add an `OBJS` variable:
         ```make
         OBJS = main.o math.o io.o
         ```
      2. Update the `app` rule to use `$(OBJS)` and the automatic variable `$^` (all prereqs):
         ```make
         app: $(OBJS)
         	$(CC) $(CFLAGS) $^ -o $@
         ```
      3. **Delete** the three explicit `.o` rules (`main.o`, `math.o`, `io.o`).
      4. Replace them with **one** pattern rule:
         ```make
         %.o: %.c
         	$(CC) $(CFLAGS) -c $< -o $@
         ```
      5. Save and run `make` to confirm it still builds correctly.

      Your Makefile shrinks from 14 lines to 8 — and it handles **any** number of source files with zero changes to the rules.

    setup_commands:
      - "rm -f /tutorial/make_project/*.o /tutorial/make_project/app"

    files:
      - path: "make_project/Makefile"
        content: |
          CC = gcc
          CFLAGS = -Wall -std=c11

          app: main.o math.o io.o
          	$(CC) $(CFLAGS) main.o math.o io.o -o app

          main.o: main.c
          	$(CC) $(CFLAGS) -c main.c

          math.o: math.c
          	$(CC) $(CFLAGS) -c math.c

          io.o: io.c
          	$(CC) $(CFLAGS) -c io.c
        language: "makefile"

    open_file: "make_project/Makefile"

    watch_files:
      - "make_project/Makefile"

    solution:
      files:
        - path: "make_project/Makefile"
          content: "CC = gcc\nCFLAGS = -Wall -std=c11\nOBJS = main.o math.o io.o\n\napp: $(OBJS)\n\t$(CC) $(CFLAGS) $^ -o $@\n\n%.o: %.c\n\t$(CC) $(CFLAGS) -c $< -o $@\n"
          language: "makefile"
      explanation: |
        - **Test 1:** `grep -q 'OBJS *=' Makefile` — the `OBJS` variable must be defined.
        - **Test 2:** `grep -q '\$(OBJS)' Makefile` — `$(OBJS)` must appear in the `app` rule.
        - **Test 3:** `grep -qP '%\.o.*:.*%\.c' Makefile` — a pattern rule `%.o: %.c` must exist.
        - **Test 4:** `grep -qP '\$[<^@]' Makefile` — at least one automatic variable (`$<`, `$^`, or `$@`) must be used.
        - **Test 5:** `make && [ -f app ]` — build must succeed.
        - **`$^` (all prerequisites):** In the `app` rule, `$^` expands to `main.o math.o io.o` — all the files listed in `$(OBJS)`. This replaces the repetitive `main.o math.o io.o` in the recipe.
        - **`$@` (target name):** In the `app` rule, `$@` expands to `app`. In the pattern rule when building `math.o`, `$@` expands to `math.o`.
        - **`$<` (first prerequisite):** In the pattern rule, `$<` expands to the `.c` file (e.g., `math.c`). Using `$<` instead of `$^` compiles only the single matching source file.
        - **Pattern rule `%.o: %.c`:** The `%` wildcard matches any filename stem. This single rule replaces all three explicit `.o` rules. Adding `newfile.c` to `OBJS` is all that's needed — no new explicit rule required.

    tests:
      - description: "Defined OBJS variable"
        command: "cd /tutorial/make_project && grep -q 'OBJS *=' Makefile"
        hints:
          - title: "Layer 1 — orientation"
            text: "Add an `OBJS = main.o math.o io.o` line near the top, after `CFLAGS`. This is the standard Make idiom: a variable holding the list of object files the executable depends on."
            condition: "code_missing: OBJS"
      - description: "Used $(OBJS) in the app rule"
        command: "cd /tutorial/make_project && grep -q '\\$(OBJS)' Makefile"
        hints:
          - title: "Layer 1 — orientation"
            text: "Replace the explicit `main.o math.o io.o` in the `app:` rule with `$(OBJS)` so the rule reads from the variable."
            condition: "code_missing: $(OBJS)"
      - description: "Added a pattern rule (%.o: %.c)"
        command: "cd /tutorial/make_project && grep -qP '%\\.o.*:.*%\\.c' Makefile"
        hints:
          - title: "Layer 1 — orientation"
            text: "A pattern rule uses `%` as a wildcard. The line `%.o: %.c` tells Make: 'to build any `.o` file, use the matching `.c` file as input'. One rule replaces the three explicit ones."
          - title: "Layer 2 — strategy"
            text: "Skeleton:\n```make\n%.o: %.c\n\t$(CC) $(CFLAGS) -c $< -o $@\n```\n`$<` is the first prerequisite (the `.c` file), `$@` is the target (the `.o` file). Don't forget the literal Tab before `$(CC)`."
            condition: "code_missing: %.o"
      - description: "Used an automatic variable ($<, $^, or $@) in a recipe"
        command: "cd /tutorial/make_project && grep -qP '\\$[<^@]' Makefile"
        hints:
          - title: "Layer 1 — orientation"
            text: "Automatic variables let Make plug in the right filename without you naming it. `$@` = target name. `$<` = first prerequisite. `$^` = all prerequisites. Use them in the recipe, not in the rule header."
            condition: "code_missing: $@"
      - description: "Removed the explicit per-file .o rules (replaced by the pattern rule)"
        command: |
          cd /tutorial/make_project
          if grep -qE '^(main|math|io)\.o[[:space:]]*:' Makefile; then
            echo "An explicit '.o' rule (main.o:, math.o:, or io.o:) is still in the Makefile. Delete the three explicit rules — the pattern rule '%.o: %.c' replaces them."
            exit 1
          fi
      - description: "Project still builds correctly"
        command: "cd /tutorial/make_project && make && [ -f app ]"

    quiz:
      title: "Step 4 — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "In a Makefile recipe, what does `$@` expand to?"
          options:
            - "All prerequisite files (everything after the colon)"
            - "The first prerequisite only"
            - "The target name (the file to the left of the colon)"
            - "The shell's exit code from the last command"
          correct_index: 2
          option_feedback:
            0: "That's `$^` — all prerequisites. The `^` mnemonic is 'caret = up = the top half (target side)? — no, opposite — `^` is *all* prereqs.'"
            1: "That's `$<` — the first prerequisite. The `<` looks like an arrow pointing into the rule from the left."
            3: "Make doesn't expose shell exit codes in its variable namespace. `$?` in shell is the exit code; `$?` in Make is 'all newer-than-target prereqs'. Different namespaces."
          explanation: "`$@` always expands to the **target** name. In `app: $(OBJS)`, using `$@` in the recipe gives you `app`. Think: `@` looks like a target symbol."

        - question: "The pattern rule `%.o: %.c` with recipe `$(CC) $(CFLAGS) -c $< -o $@` compiles `math.c`. What do `$<` and `$@` expand to?"
          options:
            - "$< = math.c, $@ = math.o"
            - "$< = math.o, $@ = math.c"
            - "$< = all .c files, $@ = math.o"
            - "$< = math.c, $@ = $(CC)"
          correct_index: 0
          option_feedback:
            1: "Reversed. `$<` is the *first prerequisite* — the right-hand side input. `$@` is the *target* — the left-hand side output."
            2: "`$<` is *first* prerequisite (singular), not all. For all prereqs you'd use `$^`."
            3: "Variables expand to file names from the rule, not to other variables. `$@` is the rule's target — `math.o` here."
          explanation: "`$<` is the **first prerequisite** (here, `math.c`) and `$@` is the **target** (here, `math.o`). The `%` wildcard matches the common stem `math`, so `%.o` becomes `math.o` and `%.c` becomes `math.c`."

        - question: "After replacing explicit `.o` rules with one pattern rule, which of the following are true? (Select all that apply)"
          type: multiple
          options:
            - "One pattern rule handles any number of .c/.o file pairs"
            - "Adding a new source file still requires writing a new explicit rule"
            - "`$^` in the app rule expands to all object file prerequisites"
            - "`$<` in the pattern rule refers to the .c file being compiled"
          correct_indices:
            - 0
            - 2
            - 3
          option_feedback:
            1: "That's the *whole point* of pattern rules — adding a new `.c` file means *just* dropping it into `OBJS`. The pattern rule auto-handles compilation."
          explanation: "The pattern rule `%.o: %.c` handles **any** `.c`→`.o` compilation automatically. Adding `newfile.c` to `OBJS` is all you need — no new rule required. `$^` gives all prerequisites (all `.o` files for the app rule), and `$<` gives the first prerequisite (the `.c` file for each pattern match)."

        - question: "You use `%.o: %.c` and `$(CC) $(CFLAGS) -c $< -o $@`. You get `makefile:10: *** missing separator. Stop.` What is the most likely cause?"
          options:
            - "Missing Tab before the recipe line"
            - "Incorrect automatic variable syntax"
            - "The compiler 'gcc' is not installed"
            - "The file 'math.c' is missing"
          correct_index: 0
          option_feedback:
            1: "If automatic-variable syntax were wrong, Make would report it more specifically (e.g., 'invalid variable name'). 'missing separator' is Make's signature for the Tab problem."
            2: "Missing gcc would surface as 'gcc: command not found' from the *shell*, after Make tries to run the recipe. The 'missing separator' error happens at parse time, before any commands run."
            3: "Missing source files are reported as 'No rule to make target' at execution time. 'missing separator' is a parser-level error, not an I/O one."
          explanation: "The 'missing separator' error is Make's cryptic way of saying it found spaces where it expected a Tab. This remains the #1 cause of build failures, even in advanced professional Makefiles."

        - question: |
            **[Interleaved: Revisit Step 2]** Pattern rules use the same `target: prerequisites` structure you learned in Step 2. In the rule below, identify the **target**, the **prerequisites**, and the **recipe**:

            ```make
            %.o: %.c %.h
            	$(CC) $(CFLAGS) -c $< -o $@
            ```
          type: single
          options:
            - "Target: `%.c %.h` · Prerequisites: `%.o` · Recipe: the line below"
            - "Target: `%.o` · Prerequisites: `%.c %.h` · Recipe: the line below"
            - "Target: `$@` · Prerequisites: `$<` · Recipe: `$(CC) $(CFLAGS) -c`"
            - "Target: the whole rule · Prerequisites: the colon · Recipe: the variables"
          correct_index: 1
          option_feedback:
            0: "Reversed. The **target** sits to the *left* of the colon — that's `%.o`. Prerequisites sit to the *right*."
            2: "`$@` and `$<` are *automatic variables* that *expand to* the target and first prerequisite at recipe-execution time — but the target *itself* (in the rule header) is `%.o`, not `$@`."
            3: "The colon doesn't change roles between simple rules and pattern rules — it's still the divider. Target on the left, prerequisites on the right, recipe indented below."
          explanation: "Step 2's rule structure (`target: prerequisites` / Tab + recipe) is unchanged in pattern rules — only the name on either side becomes a wildcard (`%`). `%.o: %.c %.h` says 'to build any `.o`, the matching `.c` AND the matching `.h` must both exist.' Adding `%.h` is also how you'd tell Make about the header dependency we covered in the footgun callout in Step 5."

  # --------------------------------------------------------------------------
  # STEP 5: Proving the Magic of the DAG
  # --------------------------------------------------------------------------
  # Pedagogy: PRIMM — Predict, Run, Investigate Make's timestamp heuristic
  - title: "The Magic of Incremental Builds"
    # Default this step to the Make DAG view so students see the graph
    # update live as they touch files. They can flip back to Editor any time.
    view: make_dag
    step_dir: /tutorial/make_project
    instructions: |
      ### Why this matters

      This is the payoff for everything you've built so far. Make's timestamp-based dependency graph is what turns a multi-hour full rebuild into a few seconds of incremental work — and it's the single feature that makes Make worth its quirks. You'll watch Make skip work it doesn't need to do, and learn the one footgun (header dependencies) that catches even seasoned C developers.

      ### 🎯 You will learn to

      - Analyze Make's timestamp heuristic to predict which targets will rebuild
      - Apply `touch` to simulate a file edit and observe selective recompilation
      - Evaluate when implicit header dependencies will silently sabotage a build

      ### The Core Idea: a Dependency Graph + Timestamps

      Make's central trick is brutally simple: it builds a **dependency graph** from your rules, then walks the graph comparing the **last-modified timestamp** of each target against its prerequisites. If a prerequisite is *newer* than the target, the target is out of date and Make runs its recipe. Otherwise, it skips it.

      For our 3-file project, the graph Make builds from your Makefile looks like:

      ```mermaid
      flowchart TD
          app["app"] --> mainO["main.o"]
          app --> mathO["math.o"]
          app --> ioO["io.o"]
          mainO --> mainC["main.c"]
          mathO --> mathC["math.c"]
          ioO --> ioC["io.c"]
      ```

      When you run `make`, Make starts at the top (`app`), walks down to the leaves (`.c` files), and rebuilds any node whose timestamp is older than at least one of its prerequisites. **Make is a graph algorithm, not a script.**

      ### 📈 The graph on the right is *your* graph

      Look at the **Make DAG** pane next to the editor — that's not a static diagram from this tutorial, that's the dependency graph computed live from *your current Makefile* in `/tutorial/make_project`. Every time you edit the Makefile or run a `make` / `touch` command, the graph re-renders:

      - **Solid green ✓** — target is up to date
      - **Pulsing red ●** — target is stale (`make` would rebuild it)
      - **Dashed border** — phony target (always considered stale)
      - **Dashed arrow** — order-only prerequisite

      Click any node to jump to its rule in the Makefile. Use the **Editor / Make DAG** toggle at the top-right to flip between the two views.

      This timestamp-on-a-DAG heuristic is what turns a 2-hour full rebuild into a 2-second incremental one.

      ### Your new best friend: `make -n` (dry run)

      Before we run any `make` command for real, let's introduce **dry-run mode** — the single most useful Make flag for debugging build behavior:

      ```bash
      make -n          # show what `make` would do, without running anything
      ```

      `-n` (short for `--dry-run`) prints the recipe lines `make` *would* execute, but doesn't run them. It's read-only and risk-free. Use it whenever you're about to type `make` and aren't 100% sure what's about to happen — especially before destructive commands like `make clean install`.

      A close cousin is `make --trace`, which runs the build for real but also prints *why* each command runs (e.g. "target X is older than prerequisite Y"). Both flags surface the otherwise-invisible reasoning Make is doing.

      ### Task 1: Check if up to date

      Run `make` right now:
      ```bash
      make
      ```
      Make should tell you: `make: 'app' is up to date.` It skipped all work because the `.o` files and `app` are all newer than the `.c` files.

      ### Task 2: Simulate a file change

      The `touch` command updates a file's timestamp without changing its content — it tricks Make into thinking you just edited it.

      Run this to "update" only `math.c`:
      ```bash
      touch math.c
      ```

      ### ✏️ Predict before you run `make`

      You're about to run `make`. Commit to a number, then run it.

      How many `gcc` invocations will Make produce?

      - (a) 0 — `touch` doesn't change content, so Make should skip everything.
      - (b) 1 — only `math.c` → `math.o`.
      - (c) 2 — `math.c` → `math.o` *and* the link step that produces `app`.
      - (d) 4 — Make plays it safe and rebuilds the whole project.

      <details markdown="1"><summary>⚠️ Open after you've committed</summary>

      The answer is **(c)**. `math.c` is now newer than `math.o`, so Make recompiles it (1). That makes `math.o` newer than `app`, so Make also re-links (2). `main.c` and `io.c` are untouched, so their `.o` files stay valid and aren't recompiled.

      The trap is (a): "but the content didn't change, so why rebuild?" Make doesn't *read* file contents — it compares timestamps. From its point of view, "you touched this file" and "you edited this file" look identical. This is a feature, not a bug: a content-aware Make would have to checksum every file every build, which would be slow. Modern build tools like Bazel *do* checksum, paying that cost in exchange for false-positive immunity.

      </details>

      ### Task 3: Observe the magic

      Run `make` one more time:
      ```bash
      make
      ```

      Look closely at the output! Make compiled `math.c` → `math.o` and then re-linked `app`. **It completely skipped `main.c` and `io.c`.** They were still up to date — so Make left them alone. In a massive codebase this is the difference between waiting seconds and waiting hours.

      ### Task 4: Modify — try it on a different file

      Now `touch main.c` and run `make`. Predict first: which files get recompiled this time? (Hint: the dependency graph hasn't changed — only which leaf was touched.) **Verify your prediction with `make -n` *before* running `make`** — it'll print the commands without executing them. Then run `make` for real and confirm `make -n`'s prediction matched what actually happened.

      Then try `touch Makefile` and predict again, again checking with `make -n` first. (Surprise: the Makefile itself isn't a prerequisite of any rule, so nothing rebuilds. The dependency graph is *only* what's written between colons. `make -n` would print nothing.)

      ### Task 5: Try `--trace` to see *why*

      Reset to a known state, then re-run with `--trace`:

      ```bash
      touch math.c
      make --trace
      ```

      Notice the extra lines like `Makefile:7: target 'math.o' does not exist` or `target 'app' is older than prerequisite 'math.o'`. `--trace` is what you reach for when `make` rebuilds something you didn't expect *and* you can't figure out which prerequisite tripped it. It prints the causal reason at every node.

      **Habit to build:** when in doubt, `make -n` first. When `make -n` itself surprises you, escalate to `make --trace`. These two flags are your X-ray vision into the dependency graph — and you'll reach for them often once you start writing real Makefiles.

      <details markdown="1"><summary>⚠️ The classic dependency-tracking footgun: header-file changes</summary>

      Make's incremental rebuild only tracks the dependencies *you tell it about*. The Makefile says `main.o: main.c` — so editing `main.c` rebuilds `main.o`. But what if `main.c` does `#include "math.h"` and you edit `math.h`?

      **`main.o` will *not* rebuild.** Your Makefile never told Make that `main.o` depends on `math.h`. The compiled object is now out of sync with the header it was built against — sometimes catastrophically (struct layout mismatches → silent memory corruption), sometimes obviously (compile errors at link time).

      In real C/C++ projects, this is solved with auto-generated dependency files:

      ```make
      # gcc's -MMD flag emits .d files that list every header each .c includes
      %.o: %.c
      	$(CC) $(CFLAGS) -MMD -c $< -o $@

      -include $(OBJS:.o=.d)   # pull in the generated .d files
      ```

      We don't do that here — it's beyond essentials. But know: **plain Makefiles silently miss header dependencies.** If you ever wonder "why does my code segfault even though everything compiled?", a stale `.o` against a changed `.h` is the #1 suspect. Always run `make clean && make` after pulling header changes from a teammate.

      </details>

    setup_commands:
      - "make -C /tutorial/make_project 2>/dev/null || true"
      # Record main.o's baseline mtime so we can later assert it didn't change.
      # This catches "make clean && make" (full rebuild) where math.o is still
      # newer than main.o by gcc compile order — the existing -nt test alone
      # accepts that wrong solution.
      - "stat -c %Y /tutorial/make_project/main.o > /tmp/.makefile_step5_main_o_baseline 2>/dev/null || echo 0 > /tmp/.makefile_step5_main_o_baseline"

    solution:
      commands:
        - "make"
        - "touch math.c"
        - "make"
      explanation: |
        - **Test 1:** `[ math.o -nt main.o ]` — `math.o` must be newer than `main.o`. After `touch math.c` + `make`, only `math.c` → `math.o` was recompiled, so `math.o` has a newer timestamp.
        - **Test 2:** `main.o`'s mtime must equal the baseline recorded in `setup_commands`. This catches the wrong solution `make clean && make` — that produces a *full* rebuild where math.o is still newer than main.o (by gcc compile order), but main.o's mtime has changed from the baseline.
        - **Make's timestamp heuristic:** Make compares the last-modified time of each target against its prerequisites. If a prerequisite is newer than the target, the target is out-of-date and its recipe runs.
        - **`touch math.c`:** Updates `math.c`'s modification timestamp without changing its content. Make sees `math.c` is now newer than `math.o` and recompiles just that one file, then re-links `app`. `main.c` and `io.c` are untouched.
        - **Why this matters:** In a large project, this turns a potential hours-long full rebuild into a seconds-long incremental one.

    tests:
      - description: "math.c was touched and recompiled (math.o is newer than main.o)"
        command: "cd /tutorial/make_project && [ math.o -nt main.o ]"
      - description: "Make did NOT do a full rebuild — main.o is unchanged from the original build"
        command: |
          cd /tutorial/make_project
          if [ ! -f /tmp/.makefile_step5_main_o_baseline ]; then
            echo "Baseline mtime not recorded. Reload the step to re-run setup_commands."
            exit 1
          fi
          current=$(stat -c %Y main.o)
          baseline=$(cat /tmp/.makefile_step5_main_o_baseline)
          if [ "$current" != "$baseline" ]; then
            echo "main.o's mtime changed from $baseline to $current — that means main.o was recompiled."
            echo "If you ran 'make clean && make' (full rebuild), undo that. The lesson is incremental: just touch math.c and run make, so ONLY math.o gets rebuilt."
            exit 1
          fi

    quiz:
      title: "Step 5 — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "How does Make decide whether to rebuild a target file?"
          options:
            - "It always rebuilds everything to be safe"
            - "It compares timestamps: if any prerequisite is newer than the target, it rebuilds"
            - "It checksums file contents to detect actual changes"
            - "It asks the user which files changed since last time"
          correct_index: 1
          option_feedback:
            0: "Always-rebuild defeats the entire purpose of Make. The whole performance argument from Step 1 is that Make *skips* unnecessary work."
            2: "Newer build tools (like Bazel, Buck) checksum files. Classic Make uses timestamps — fast to check, but false-positives if you `touch` a file."
            3: "Make never asks. It deduces from timestamps alone — that's why it's a sealed automation tool, not a chatbot."
          explanation: "Make compares modification timestamps. If a prerequisite (e.g. `math.c`) is newer than the target (e.g. `math.o`), the target is considered out of date and its recipe runs. This simple heuristic enables powerful incremental builds."

        - question: "You run `touch math.c` (without changing its content) then immediately run `make`. What does Make do?"
          options:
            - "Nothing — `touch` doesn't change file content so Make skips everything"
            - "Rebuilds the entire project from scratch for safety"
            - "Recompiles only math.c → math.o, then re-links the final binary"
            - "Deletes math.o because it considers math.c corrupted"
          correct_index: 2
          option_feedback:
            0: "Make doesn't look at content; it looks at timestamps. `touch` updates the timestamp, so Make treats the file as 'changed' from its perspective."
            1: "Full rebuild only happens after `make clean`. Make is conservative: only files newer than their target trigger work."
            3: "`touch` doesn't trigger any deletion. There's no integrity-check in Make."
          explanation: "`touch` updates a file's timestamp, making it look newer than its dependent targets. Make sees `math.c` is newer than `math.o`, recompiles just that one file, then re-links `app` since `math.o` changed. `main.o` and `io.o` are untouched."

        - question: "After a successful build with no changes, you run `make` again. What message appears and why?"
          options:
            - "`Build complete` — Make always confirms success"
            - "`make: 'app' is up to date` — all prerequisites are older than the target"
            - "`No targets specified` — Make requires a target argument"
            - "`make: Nothing to do for 'all'` — the default target is missing"
          correct_index: 1
          option_feedback:
            0: "Make is terse — it doesn't print success banners. If it has nothing to do, it says so explicitly with the 'up to date' message."
            2: "If no target argument is given, Make uses the *first* target in the Makefile. There's an explicit error for true 'no target available' situations, but that's not this scenario."
            3: "That message appears for `make all` if a default `all:` target is *missing*. With a defined target like `app:`, Make's no-op message is 'is up to date'."
          explanation: "When all targets are newer than their prerequisites, Make prints `make: 'app' is up to date` and does nothing. This is the incremental build in action — skipping all work when nothing needs rebuilding."

        - question: |
            You're about to run `make install` on a project you're unfamiliar with. You want to see what it'll *do* before it actually does it. Which command answers that?
          options:
            - "`make --check install` — Make has a built-in safety mode for checking commands"
            - "`make -n install` — print the recipe lines without executing them"
            - "`make install --read-only` — runs in observe mode"
            - "There's no way to preview; you have to run it and hope"
          correct_index: 1
          option_feedback:
            0: "There's no `--check` flag. `-n` (or `--dry-run` / `--just-print`) is the actual flag."
            2: "`--read-only` isn't a Make flag. The dry-run flag is `-n`."
            3: "Make explicitly supports preview via `-n`. The whole point is to *not* have to hope."
          explanation: "`make -n` (also spelled `--dry-run` or `--just-print`) prints the recipe Make *would* run without executing it. This is the safest way to check unfamiliar Makefiles before they touch your filesystem. Habit: when in doubt, `-n` first."

        - question: |
            You ran `make` and a target rebuilt that you didn't expect to. You want to know *why* — which prerequisite tripped the rebuild. Which flag tells you?
          options:
            - "`make -n` — dry-run shows everything"
            - "`make --trace` — explains which prerequisite triggered each recipe"
            - "`make --quiet` — suppresses noise so the cause is obvious"
            - "Read the timestamps with `ls -l` and reason it out manually"
          correct_index: 1
          option_feedback:
            0: "`-n` shows *what* would run, not *why*. Useful for prediction, but doesn't print the causal explanation."
            2: "`--quiet` (or `-s`) hides the recipe lines as they run. That's the opposite of what you need for diagnosis."
            3: "You can do this — and you'll need to occasionally — but `--trace` automates the reasoning Make is already doing internally. Cheaper than reasoning by hand."
          explanation: "`make --trace` runs the build *and* prints the prerequisite that triggered each recipe (e.g. `target 'app' is older than prerequisite 'math.o'`). When `-n` shows you something surprising, escalate to `--trace` to get the causal reason."

        - question: "**[Interleaved: Revisit Step 3]** What is the correct syntax to reference a variable named `CC` inside a Makefile recipe?"
          options:
            - "`${CC}`"
            - "`$(CC)`"
            - "`$CC`"
            - "Both `$(CC)` and `${CC}` are valid"
          correct_index: 3
          option_feedback:
            0: "`${CC}` works fine, but it's not the *only* answer — both forms are valid in Make."
            1: "`$(CC)` works fine, but again — both forms are valid. The question asks for what's correct."
            2: "`$CC` is *not* valid for multi-character names — Make would parse it as `$C` followed by literal `C`. Single-character variable names (`$X`) work without parens; multi-character names must be parenthesized."
          explanation: "As we practiced in Step 3, Make uses either parentheses `( )` or curly braces `{ }` to expand variables. Both are technically correct, though `$(CC)` is the more common convention."

  # --------------------------------------------------------------------------
  # STEP 6: The .PHONY Sabotage
  # --------------------------------------------------------------------------
  # Pedagogy: mistake-based familiarization — sabotage `clean` to surface the .PHONY rationale
  - title: "The .PHONY Sabotage"
    step_dir: /tutorial/make_project
    instructions: |
      ### Why this matters

      Every real-world Makefile has command-style targets like `clean`, `test`, or `install` — and every one of them can silently break the day someone creates a file or directory with the same name. `.PHONY` is the one-line declaration that immunizes those targets, and seeing the sabotage in action is the only way to remember to use it.

      ### 🎯 You will learn to

      - Analyze why a same-named file on disk causes Make to skip a command target
      - Apply `.PHONY` to declare command targets that always run

      ### Non-File Targets

      Make is fundamentally about building files. But sometimes we want a target that just runs a command — like cleaning up build artifacts. There's no output file; you just want the action.

      ### Task 1: Add a clean target

      Add this to the very bottom of your `Makefile`:
      ```make
      clean:
      	rm -f *.o app
      ```
      Run `make clean` in the terminal. Your build artifacts are gone!

      ### Task 2: The Sabotage

      Because Make assumes targets are files, what happens when a file actually *named* `clean` exists?

      1. Create a dummy file named clean:
         ```bash
         touch clean
         ```
      2. Run `make app` to generate the build files again.
      3. Try running `make clean`.

      **It fails!** Make says `make: 'clean' is up to date.` It finds the file named `clean`, sees it has no prerequisites, decides it's already "built," and does nothing.

      ### Task 3: The Fix — .PHONY

      We must tell Make that `clean` is a *phony* target — a command name, not a filename.

      Right above the `clean:` target, add:
      ```make
      .PHONY: clean
      ```

      Save and run `make clean` again. Even though a file named `clean` exists, Make ignores it and correctly removes your build files.

      ### Task 4: Generalize — add an `all` phony target

      One phony target is enough to learn the concept. Two is enough to *generalize* it: every real Makefile has multiple phony targets (`clean`, `all`, `test`, `install`, `run`). Conventionally they're declared together on a single `.PHONY:` line.

      Add a second phony target `run` that builds *and* executes the program. The convention for phony targets that depend on real ones is to list the prerequisites on the rule line:

      ```make
      .PHONY: clean run
      run: app
      	./app
      ```

      Now `make run` will (1) build `app` if it's out of date — Make follows the prerequisite graph — and (2) execute it. That's the same `.PHONY` mechanism applied to a different command verb.

      Don't forget to also delete the dummy `clean` file you created in Task 2 (`rm clean`) — otherwise it sticks around forever.

      ### ⚠️ One recipe line, one shell — the `cd` trap

      Before you write more complex recipes, lock in this rule: **each recipe line runs in its own fresh shell.** State doesn't survive across lines.

      That means a recipe like this *doesn't* do what it looks like:

      ```make
      run: app
      	cd build
      	./app          # WRONG — `cd build` was in a different shell
      ```

      The first line `cd build` runs in shell A and exits. The second line `./app` starts shell B in the *original* working directory — `cd` from shell A had no effect on shell B. Your build-directory recipe will silently look for `./app` in the wrong place.

      The fix is to chain commands with `&&` *inside one shell line*:

      ```make
      run: app
      	cd build && ./app   # ✔ both commands share one shell
      ```

      You'll meet this trap the moment you start using subdirectories or environment variables (`CFLAGS=-O2; gcc ...` on two lines doesn't export the flag). Make has a `.ONESHELL:` directive that flips the model — but treat that as an advanced override; the standard mental model is "one recipe line = one shell".

    setup_commands:
      - "make -C /tutorial/make_project 2>/dev/null || true"

    watch_files:
      - "make_project/Makefile"

    solution:
      files:
        - path: "make_project/Makefile"
          content: "CC = gcc\nCFLAGS = -Wall -std=c11\nOBJS = main.o math.o io.o\n\napp: $(OBJS)\n\t$(CC) $(CFLAGS) $^ -o $@\n\n%.o: %.c\n\t$(CC) $(CFLAGS) -c $< -o $@\n\n.PHONY: clean run\nrun: app\n\t./app\n\nclean:\n\trm -f *.o app\n"
          language: "makefile"
      commands:
        - "rm -f /tutorial/make_project/clean"
      explanation: |
        - **Test 1:** `grep -q '\.PHONY:.*clean' Makefile` — `.PHONY: clean` must appear in the file (before or after the `clean:` rule).
        - **Test 2:** `make clean` must succeed and remove `app` and `.o` files.
        - **Test 3:** `.PHONY:.*run` — the second phony target must also be declared, demonstrating the generalization to multiple phony targets.
        - **The sabotage scenario:** If a file named `clean` exists in your project directory and `.PHONY` is absent, Make thinks `clean` is a real file target. Since `clean` has no prerequisites, Make sees it as always up-to-date and refuses to run the recipe (`make: 'clean' is up to date.`).
        - **`.PHONY: clean run`:** Conventionally, all phony targets are declared on one `.PHONY:` line. Adding `run` shows that the same mechanism applies to *any* command-style target — `test`, `install`, `lint`, `docs`, you name it.
        - **`run: app`:** Phony targets *can* depend on real ones. Make builds `app` first if it's out of date, then runs `./app`. This is why `make run` is "do whatever's needed to build, then execute" in one command.
        - **`rm -f *.o app`:** `-f` suppresses errors when files don't exist. Without it, `make clean` would fail if called when already clean.

    tests:
      - description: "Added .PHONY declaration covering both `clean` and `run`"
        command: |
          cd /tutorial/make_project
          grep -q '\.PHONY:.*clean' Makefile \
            || { echo "Missing `.PHONY: clean` — Make needs to know clean is a command, not a file."; exit 1; }
          grep -q '\.PHONY:.*run' Makefile \
            || { echo "Add `run` to your `.PHONY:` line. Convention: one .PHONY: line listing every phony target — e.g. `.PHONY: clean run`."; exit 1; }
        hints:
          - title: "Layer 1 — orientation"
            text: "Add a `.PHONY: clean run` line. This single declaration immunizes both phony targets against same-named files on disk."
            condition: "code_missing: .PHONY"
          - title: "Layer 2 — strategy"
            text: "Conventionally a Makefile has *one* `.PHONY:` line listing every phony target: `.PHONY: clean run`. Some projects spread it across two lines instead — both are accepted by Make."
            condition: "code_missing: run"
      - description: "The `run` rule depends on `app` and executes `./app`"
        command: |
          cd /tutorial/make_project
          # Find the run rule — must depend on app
          grep -qE '^run:[[:space:]]*app' Makefile \
            || { echo "The `run:` rule should depend on `app` so Make builds it first if needed."; exit 1; }
          # The recipe should call ./app
          if ! awk '/^run:/{flag=1; next} /^[a-zA-Z._]/{flag=0} flag' Makefile | grep -q '\./app'; then
            echo "The `run:` recipe should call `./app`."
            exit 1
          fi
        hints:
          - title: "Layer 1 — orientation"
            text: "The `run` target should build the program if needed, then execute it. In Make terms: depend on `app`, recipe is `./app`."
            condition: "code_missing: run"
          - title: "Layer 2 — strategy"
            text: "Skeleton:\n```make\nrun: app\n\t./app\n```\nThe Tab before `./app` is non-negotiable (Step 2)."
            condition: "code_missing: ./app"
      - description: "The clean target exists in Makefile and removes 'app' and '.o' files"
        command: "cd /tutorial/make_project && rm -f clean && grep -q 'clean:' Makefile && make clean >/dev/null 2>&1 && [ ! -f app ] && ! ls *.o 2>/dev/null"
        hints:
          - title: "Layer 1 — orientation"
            text: "The `clean:` rule needs no prerequisites and one recipe line. The recipe should remove all `.o` files and the `app` binary."
          - title: "Layer 2 — strategy"
            text: "Skeleton:\n```make\n.PHONY: clean\nclean:\n\trm -f *.o app\n```\nThe `-f` flag suppresses errors when files don't exist (so `make clean` succeeds even on a fresh checkout)."
            condition: "code_missing: clean:"

    quiz:
      title: "Step 6 — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "What is the primary purpose of `.PHONY`?"
          options:
            - "To make the build faster"
            - "To tell Make that a target is a command name, not a physical file on disk"
            - "To encrypt the Makefile for security"
            - "To allow spaces instead of Tabs in recipes"
          correct_index: 1
          option_feedback:
            0: "`.PHONY` doesn't change build speed — it changes *whether* a target is considered up-to-date. Performance comes from incremental rebuilding (Step 5)."
            2: "Make has no encryption features. The file is plain text and parsed by Make's grammar, no obfuscation."
            3: "Sadly no — there's no Make directive that fixes the Tab Trap. `.PHONY` is about target names, not indentation."
          explanation: "`.PHONY` tells Make to ignore any files on disk with the same name as the target. This ensures that commands like `make clean` always run, even if a file named `clean` happens to exist."

        - question: "What happens if a target name (like `test`) matches a directory name in your project, but is NOT declared `.PHONY`?"
          options:
            - "Make will delete the directory and replace it with a file"
            - "Make will encounter a fatal error and stop"
            - "Make will assume the target is up-to-date (since the directory exists) and will NOT run the recipe"
            - "Make will always execute the recipe because directories are always considered 'new'"
          correct_index: 2
          option_feedback:
            0: "Make never auto-deletes anything. It just refuses to run the recipe."
            1: "No fatal error — Make's behavior is silent and easy to miss. That's exactly why this trap is dangerous."
            3: "Reverse — directories with no prerequisites are considered up-to-date, *not* always-new. The whole problem is Make thinks the work is done."
          explanation: "By default, Make looks for a file OR directory matching the target name. If a directory named `test` exists and has no dependencies, Make thinks its job is done. `.PHONY: test` forces it to run the recipe regardless."

        - question: "How can you use Phony targets to bundle multiple independent builds together?"
          options:
            - "By creating a phony target (like `all`) and listing the other targets as its prerequisites"
            - "By listing the phony target inside every other rule's recipe"
            - "By using the `bundle:` keyword instead of `.PHONY:`"
            - "Make cannot group multiple targets into one command"
          correct_index: 0
          option_feedback:
            1: "Phony targets aren't 'inserted' into recipes — they're targets in their own right. The trick is making them *depend on* other targets so Make builds those as prerequisites."
            2: "There's no `bundle:` keyword in Make. The bundling pattern uses `.PHONY: all` + `all: target1 target2`."
            3: "Make absolutely supports grouping. The phony-target-with-prerequisites pattern is canonical."
          explanation: "The conventional `all` target is usually a phony target that depends on every program you want to build. Running `make all` triggers all those prerequisites in sequence (or parallel)."

        - question: "Why is it generally a bad idea to make a real file target (like `app`) depend on a `.PHONY` target?"
          options:
            - "It will cause the Makefile to be deleted"
            - "The real target will be re-built every single time you run make, defeating incremental builds"
            - "Make will refuse to run if real and phony targets are mixed"
            - "It makes the resulting executable much slower"
          correct_index: 1
          option_feedback:
            0: "Make is non-destructive in that sense — it never deletes Makefiles or anything else. The danger is performance, not data loss."
            2: "Make happily mixes real and phony targets. The grand `all` target is itself phony, depending on real ones. Mixing is the *point*."
            3: "Phony deps don't slow the produced binary — they slow the *build* (constant unnecessary rebuilding)."
          explanation: "Because a Phony target is NEVER up-to-date, any real file that depends on it will also be considered out-of-date every time. This forces constant, unnecessary recompilation."

        - question: |
            A teammate writes this rule, expecting it to build `app` inside the `build/` subdirectory:

            ```make
            run: app
            	cd build
            	./app
            ```

            They run `make run` and get `bash: ./app: No such file or directory`. What's wrong?
          options:
            - "Make is buggy — `cd` should work fine in recipes"
            - "Each recipe line runs in its own fresh shell — `cd build` happens in shell A, `./app` runs in shell B starting from the original directory"
            - "Make doesn't support shell built-ins like `cd`; only external commands"
            - "The recipe needs `.ONESHELL:` to be added at the top of the Makefile"
          correct_index: 1
          option_feedback:
            0: "Make's behavior here is by design (and POSIX-standard). The recipe model is one-line-one-shell, not one-script-one-shell."
            2: "`cd` works in recipes — but only within the line where it appears. Make doesn't filter built-ins; it just spawns a new shell each line."
            3: "`.ONESHELL:` *is* an escape hatch that fixes this case, but it's not the *standard* mental model. The conventional fix is `cd build && ./app` on one line."
          explanation: "Each recipe line spawns a new shell. State (working directory, environment variables, shell variables) doesn't carry across lines. The conventional fix is to chain commands with `&&` on one line: `cd build && ./app`. `.ONESHELL:` does change the model globally for the Makefile, but most Makefiles in the wild assume the one-line-one-shell convention, so it's the model to internalize."

        - question: |
            Your Makefile has `.PHONY: clean` (single phony target). You decide to add `test` and `install` as phony targets too. Which of these is the **idiomatic** declaration?
          options:
            - "Three separate `.PHONY:` lines: one for each target"
            - "One `.PHONY: clean test install` line listing all phony targets together"
            - "Wrap them in a list: `.PHONY: [clean, test, install]`"
            - "Phony targets can't be combined — each needs its own `.PHONY:` block"
          correct_index: 1
          option_feedback:
            0: "Make accepts multiple `.PHONY:` lines, but the convention is one consolidated declaration. Spreading them out makes it harder to scan for which targets are phony."
            2: "Make doesn't use list literals — `[...]` would be parsed as part of a target name. Phony targets are space-separated, like prerequisites."
            3: "They absolutely can be combined. The whole point of one `.PHONY:` line is that you can list all phony targets at once."
          explanation: "The conventional form is `.PHONY: clean test install` — space-separated, single line. As you add more phony targets (`run`, `lint`, `docs`, `format`...), you extend that one line rather than adding new declarations."

        - question: "**[Interleaved: Revisit Step 4]** In the pattern rule `%.o: %.c`, which automatic variable expands to the **target** (the `.o` file)?"
          options:
            - "`$<`"
            - "`$^`"
            - "`$@`"
            - "`$*`"
          correct_index: 2
          option_feedback:
            0: "`$<` is the *first prerequisite* — for `%.o: %.c`, that's the `.c` file (the input)."
            1: "`$^` is *all prerequisites* — for `%.o: %.c`, just the one `.c` file. Same as `$<` here, but you'd use `$@` for the *output*."
            3: "`$*` is the matched stem — for building `math.o`, `$*` is `math` (no extension). Useful but not what 'target' means."
          explanation: "As we used in Step 4, `$@` is the target (think '@' = 'at the target'). `$<` is the first prerequisite (the `.c` file)."

  # --------------------------------------------------------------------------
  # STEP 7: Summary & Best Practices
  # --------------------------------------------------------------------------
  # Pedagogy: PRIMM — Make: synthesize the pieces and look at real-world Makefiles
  - title: "Mastering Make"
    # Open with the full graph: app + run (phony) + clean (phony) + all .o + .c.
    # Synthesis at a glance.
    view: make_dag
    step_dir: /tutorial/make_project
    instructions: |
      ### Why this matters

      Knowing each Make feature in isolation is not the same as knowing how they fit together. This synthesis step shows the entire Makefile in its final form — every concept from Steps 1–6 in ten lines — and points to the next gotcha you'll meet when you scale beyond a single directory.

      ### 🎯 You will learn to

      - Evaluate a complete Makefile and explain how each feature contributes
      - Analyze when Recursive Make is appropriate versus harmful

      You've mastered the essentials of Make! You can now:
      - Navigate the **Tab Trap** with confidence.
      - Use **Variables** for DRY (Don't Repeat Yourself) builds.
      - Leverage **Pattern Rules** and **Automatic Variables** for scalable automation.
      - Understand the **Incremental Build** magic via the Dependency Graph.
      - Use **.PHONY** to create reliable command shortcuts.

      ### Your debugging toolkit

      Most Make problems aren't *syntax* problems — they're *graph reasoning* problems ("why did this rebuild?", "why didn't this rebuild?", "why did `-j` break my build?"). These six flags are the X-ray machines that surface what Make is doing internally:

      | Flag | What it does | Reach for it when… |
      |---|---|---|
      | `make -n` (or `--dry-run`) | Prints recipes without running them | About to run an unfamiliar / risky `make` command |
      | `make --trace` | Runs and prints *which prerequisite* triggered each recipe | A target rebuilt and you don't know why |
      | `make -p` | Dumps Make's internal database — every rule, variable, and pattern it knows about | Wondering "is there an implicit rule fighting mine?" |
      | `make --warn-undefined-variables` | Warns when an undefined variable is referenced (typo catcher) | Tracking down a typo like `$(CFLAS)` instead of `$(CFLAGS)` |
      | `make -j N` | Runs N recipes in parallel | Speeding up a clean rebuild on a multi-core machine |
      | `make -j N --shuffle=random` | Parallel + randomized prerequisite order | Stress-testing for missing prerequisites — see below |

      Memorize `-n` and `--trace` first; the rest you'll meet on demand.

      ### The `--shuffle` stress test

      Here's a deceptively important habit. After your Makefile *seems* to work, run:

      ```bash
      make clean && make -j4 --shuffle=random
      ```

      `--shuffle=random` randomizes the order in which Make picks prerequisites at each node. **A correct Makefile produces the same result regardless of order; an incorrect one — one with missing prerequisite declarations — produces failures that look random.** This is the cheapest way to surface "I forgot to declare that `app` depends on `lib.o`" bugs that hide silently when prerequisites happen to be processed in a lucky order. CI pipelines for serious build systems run this in their pre-merge checks for exactly this reason.

      ### Going further: two ideas worth exploring

      <details markdown="1"><summary>📖 Idea 1: Order-only prerequisites for build directories</summary>

      Real projects don't dump `.o` files next to source files — they put them in a `build/` directory. The naive way to add a dir prerequisite causes Make to over-rebuild because directory timestamps update whenever a file is added. The fix is **order-only prerequisites** — listed *after* a `|` separator:

      ```make
      $(BUILD)/%.o: %.c | $(BUILD)
      	$(CC) $(CFLAGS) -c $< -o $@

      $(BUILD):
      	mkdir -p $(BUILD)
      ```

      The `| $(BUILD)` says: "this directory must exist before the recipe runs, but don't rebuild me just because the directory's timestamp changed." This separates "must exist" from "must be newer." It's one of the highest-leverage tricks in real-world Makefiles.

      </details>

      <details markdown="1"><summary>📖 Idea 2: Auto-generated header dependencies (`-MMD`)</summary>

      The footgun from Step 5 — header changes don't trigger rebuilds — is solved in the real world with auto-generated `.d` files. Two changes:

      ```make
      CFLAGS = -Wall -std=c11 -MMD -MP        # gcc emits .d files alongside .o

      -include $(OBJS:.o=.d)                   # pull them in (- means: don't error if missing)
      ```

      The first time you compile, gcc's `-MMD` flag writes out a `.d` file per `.o` containing all the headers each `.c` includes. The `-include` line pulls those into the Makefile on subsequent runs. Now `make` *automatically* knows that `main.o` depends on `math.h` — no manual maintenance.

      `-MP` adds phony targets for each header so deleting a header doesn't break the build. Both flags together are the production-grade way to handle C/C++ header dependencies.

      </details>

      ### Final Pro-Tip: Recursive Make
      As your projects grow, you might be tempted to put a Makefile in every subdirectory and call `make -C subdir` from a top-level Makefile. This is known as **Recursive Make**.

      > [!WARNING]
      > **Recursive Make is often considered harmful.** It breaks the global visibility of the dependency graph, which can lead to subtle bugs where files aren't recompiled when they should be. For larger projects, consider modern alternatives or a single, "non-recursive" top-level Makefile that includes sub-makefiles.

    solution:
      files:
        - path: "make_project/Makefile"
          content: "CC = gcc\nCFLAGS = -Wall -std=c11\nOBJS = main.o math.o io.o\n\napp: $(OBJS)\n\t$(CC) $(CFLAGS) $^ -o $@\n\n%.o: %.c\n\t$(CC) $(CFLAGS) -c $< -o $@\n\n.PHONY: clean run\nrun: app\n\t./app\n\nclean:\n\trm -f *.o app\n"
          language: "makefile"
      commands:
        - "make clean"
        - "make"
      explanation: |
        This step is a review — the canonical solution shows the complete Makefile from Steps 1–6 in its final form. The tests below verify your work from previous steps is still intact.

        - This Makefile demonstrates every concept from the tutorial in ~13 lines:
          - **Variables (`CC`, `CFLAGS`, `OBJS`):** DRY principle — change the compiler or flags in one place.
          - **`$(OBJS)` prerequisite:** Declarative dependency graph — Make knows which `.o` files `app` needs.
          - **`$^` and `$@`:** Automatic variables — no repetition of filenames in the link command.
          - **Pattern rule `%.o: %.c`:** One rule handles all source files; adding `newfile.c` just requires adding `newfile.o` to `OBJS`.
          - **`.PHONY: clean`:** Guarantees `make clean` always runs regardless of filesystem state.
          - **Tab characters on recipe lines:** The invisible but critical requirement that separates Make from all other config formats.

        **Key concept connections:**

        | Makefile feature | Why it matters |
        |---|---|
        | Tab trap | Parser requirement — spaces cause `missing separator` error |
        | Variables (`CC`, `CFLAGS`) | DRY — one-line change to switch compilers |
        | Pattern rule `%.o: %.c` | Scalable — one rule for any number of source files |
        | Automatic variables `$@`, `$<`, `$^` | No filename repetition in recipes |
        | Timestamp-based DAG | Incremental builds — only recompiles what changed |
        | `.PHONY` | Non-file targets always run, even if a same-named file exists |

    tests:
      - description: "Your Makefile contains every concept from the tutorial: variables, $(OBJS), pattern rule, automatic variable, .PHONY"
        command: |
          cd /tutorial/make_project
          # Variables (CC, CFLAGS) from Step 3
          grep -q 'CC *=' Makefile || { echo "Missing CC variable (Step 3 work seems lost)."; exit 1; }
          grep -q 'CFLAGS *=' Makefile || { echo "Missing CFLAGS variable (Step 3)."; exit 1; }
          # OBJS + pattern rule + automatic variables from Step 4
          grep -q 'OBJS *=' Makefile || { echo "Missing OBJS variable (Step 4)."; exit 1; }
          grep -qP '%\.o.*:.*%\.c' Makefile || { echo "Missing pattern rule %.o: %.c (Step 4)."; exit 1; }
          grep -qP '\$[<^@]' Makefile || { echo "No automatic variable found (Step 4)."; exit 1; }
          # .PHONY clean from Step 6
          grep -q '\.PHONY:.*clean' Makefile || { echo "Missing .PHONY: clean (Step 6)."; exit 1; }
      - description: "The full build still works (`make clean && make` produces an `app` binary)"
        command: "cd /tutorial/make_project && make clean >/dev/null 2>&1 && make >/dev/null 2>&1 && [ -f app ]"

    quiz:
      title: "Step 7 — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: |
            **[Synthesis — Steps 3 + 4]** Your final Makefile uses `OBJS = main.o math.o io.o` and the pattern rule `%.o: %.c`. A teammate adds a new source file `parser.c` to the project. What is the **minimal** change to integrate it into the build?
          options:
            - "Add `parser.o` to the `OBJS` line — the pattern rule handles the rest"
            - "Write a new explicit `parser.o: parser.c` rule and add it to OBJS"
            - "Re-run `make clean` so Make discovers the new file automatically"
            - "Add `parser.c` to the prerequisites of the `app:` rule directly"
          correct_index: 0
          option_feedback:
            1: "That's what you'd do *without* the pattern rule. The whole point of `%.o: %.c` (Step 4) is that one rule handles every source file — explicit per-file rules are now redundant."
            2: "`make clean` deletes build artifacts; it doesn't scan for source files. Make doesn't auto-discover anything — it builds exactly the dependency graph you write."
            3: "Then `app` would depend on a `.c` file, and the link step (`$(CC) $(CFLAGS) $^ -o $@`) would try to link a `.c` file directly. The link step expects `.o` files; compilation goes through OBJS."
          explanation: "Add `parser.o` to `OBJS` — that's it. The pattern rule `%.o: %.c` handles compilation, the `app:` rule sees `parser.o` as a prerequisite via `$(OBJS)`, and the automatic variable `$^` feeds it to the linker. This is what scalability looks like — the design from Step 4 pays off here."

        - question: |
            **[Step 5 + Step 6]** A teammate writes `app: clean $(OBJS)` so that `make app` always starts fresh. What goes wrong?
          options:
            - "Nothing — this is a smart way to ensure clean builds"
            - "`app` will be re-linked on every single `make` invocation, even when nothing changed — the incremental-build benefit is gone"
            - "Make refuses to mix phony and real prerequisites and emits an error"
            - "The build only fails on the first run; subsequent runs are fine"
          correct_index: 1
          option_feedback:
            0: "Defeats the purpose of Make. The whole tutorial has been about *avoiding* unnecessary rebuilds (Step 5)."
            2: "Make happily mixes real and phony targets. The bug is silent and behavioral, not syntactic."
            3: "It happens *every* run. Phony targets are never up-to-date, so the rule whose prerequisites include them is also never up-to-date."
          explanation: "Phony targets (Step 6) are *never* considered up-to-date. A real target depending on a phony one inherits that property — so `app` is always considered stale, and Make re-links every time. This silently destroys the incremental-build property from Step 5. The right pattern: keep `clean` separate, run `make clean && make` when you actually want a fresh build."

        - question: |
            **[Step 2 + Step 4]** You write the following pattern rule and run `make`:

            ```make
            %.o: %.c
                $(CC) $(CFLAGS) -c $< -o $@
            ```

            (Where the recipe line was indented in your editor with 4 spaces.) What error does Make emit?
          options:
            - "`pattern rule must use $@ and $<`"
            - "`missing separator. Stop.`"
            - "`No rule to make target '%.o'`"
            - "`undefined automatic variable`"
          correct_index: 1
          option_feedback:
            0: "There's no such error — `$@`/`$<` aren't required for pattern rules to parse."
            2: "That's what you'd see if the *target* couldn't be matched, not for an indentation problem. The parser doesn't even get that far."
            3: "Automatic variables don't need to be defined; they're built in. The error happens at parse time, before any variable evaluation."
          explanation: "Pattern rules don't escape the Tab Trap. Make's parser identifies recipe lines by a literal Tab byte at column 0 — applies to every rule, simple or pattern, every time. The fix is the same as Step 2: replace the leading spaces with a Tab. Most editors silently auto-convert, which is why this trap stays dangerous even for advanced authors."

        - question: |
            **[Step 5 footgun]** Your project uses the final Makefile. You edit `math.h` (a header included by `main.c` and `math.c`) but don't touch any `.c` file. You run `make`. What happens?
          options:
            - "Make rebuilds `main.o` and `math.o` because they include `math.h`"
            - "Make says `'app' is up to date` and skips everything — even though the header changed"
            - "Make rebuilds the entire project to be safe"
            - "Make refuses to build and warns about an untracked dependency"
          correct_index: 1
          option_feedback:
            0: "That's what you'd *want*, but only if header dependencies were declared. The plain Makefile has `main.o: main.c` — no mention of `math.h`."
            2: "Make never builds 'to be safe'. It builds exactly what its declared dependency graph says is out of date — and that graph never knew about the header."
            3: "Make has no dependency-discovery features. Whatever isn't on the prerequisites line, it can't see."
          explanation: "This is the silent footgun from the Step 5 `<details>` callout. The Makefile only knows what you wrote on the prerequisites line — `main.o: main.c` doesn't mention `math.h`. So Make happily reports 'up to date' while your `.o` files are now built against a stale header. Real-world fix: `gcc -MMD` to auto-emit `.d` dependency files (Step 5 callout). Cultural fix: always run `make clean && make` after pulling header changes from a teammate."

        - question: |
            **[Analyze]** Your Makefile builds successfully under `make -j1` (serial), but `make -j8 --shuffle=random` sometimes fails with errors like `gcc: error: main.o: No such file or directory`. What's the most likely cause?
          options:
            - "Make has a known race condition with `-j` greater than 4"
            - "`--shuffle` is broken in newer versions of Make and produces nondeterministic results"
            - "Your dependency graph is incomplete — a prerequisite isn't declared, so under random order Make sometimes tries to link before all `.o` files exist"
            - "Parallel builds aren't supposed to work for C projects; only Rust/Go support them safely"
          correct_index: 2
          option_feedback:
            0: "Make's `-j` is reliable when the dependency graph is correct. Race-like failures are *symptoms* of incomplete prerequisites, not Make bugs."
            1: "`--shuffle` is intentional and well-tested. The point is to expose YOUR bugs, not introduce new ones."
            3: "Parallel C/C++ builds work fine when prerequisites are fully declared. `make -j8` is how every serious C codebase builds."
          explanation: "When prerequisites are missing, the build *appears* to work in serial mode because Make happens to process targets in source order — which is often correct by accident. `--shuffle=random` randomizes the order, so any unlucky permutation surfaces the missing prerequisite. The fix is *not* to avoid `--shuffle` — it's to declare every prerequisite your recipes actually need. Real CI pipelines run with shuffle exactly to catch these bugs before merge."

        - question: |
            **[Apply — debugging toolkit]** You wrote `$(CFLAS)` (typo: missing `G`) instead of `$(CFLAGS)` somewhere in your Makefile. The build still runs but flags like `-Wall` are silently dropped. Which flag would catch this typo?
          options:
            - "`make -n`"
            - "`make --warn-undefined-variables`"
            - "`make -j 1`"
            - "There's no flag — Make accepts undefined variables silently as the empty string and never complains"
          correct_index: 1
          option_feedback:
            0: "`-n` shows what *would* run — and `$(CFLAS)` would expand to the empty string in the printed command, but no warning. You'd have to spot the missing `-Wall` yourself."
            2: "`-j 1` controls parallelism, not variable validation."
            3: "Make *does* expand undefined variables to empty by default — that's exactly the silent-failure problem. But it has an opt-in flag (`--warn-undefined-variables`) to flip that to a warning."
          explanation: "`make --warn-undefined-variables` makes Make warn whenever you reference a variable that hasn't been defined. It's noisy by default (since Make's built-in rules reference many implicit variables), so you usually grep for warnings in *your own* code. But for hunting a stubborn typo bug, it's gold."

        - question: |
            **[Create — Parsons synthesis]** Reconstruct the final Makefile in correct order. The result should compile a 3-file C project (`main.c`, `math.c`, `io.c`) into `app` with incremental builds, a `clean` target, and a `run` phony target. (Recipe lines have a literal Tab character — represented here as `\\t` for clarity.)
          type: parsons
          lines:
            - "CC = gcc"
            - "CFLAGS = -Wall -std=c11"
            - "OBJS = main.o math.o io.o"
            - "app: $(OBJS)"
            - "\\t$(CC) $(CFLAGS) $^ -o $@"
            - "%.o: %.c"
            - "\\t$(CC) $(CFLAGS) -c $< -o $@"
            - ".PHONY: clean run"
            - "run: app"
            - "\\t./app"
            - "clean:"
            - "\\trm -f *.o app"
          distractors:
            - "$(CC) $(CFLAGS) main.o math.o io.o -o app"
            - "main.o: main.c"
            - "all: app clean"
          explanation: "Variables at top (`CC`, `CFLAGS`, `OBJS` — Steps 3 + 4), then the link rule using `$(OBJS)` and `$^`/`$@` (Step 4), then the pattern rule (Step 4) replacing the three explicit `.o` rules, then `.PHONY: clean run` covering both phony targets (Step 6 generalization), then the `run` and `clean` rules. The distractor `$(CC) $(CFLAGS) main.o math.o io.o -o app` re-introduces the filename repetition Step 4 eliminated. `main.o: main.c` is one of the explicit rules the pattern rule replaces. `all: app clean` would make `all` depend on a phony — the bug from question 2."
