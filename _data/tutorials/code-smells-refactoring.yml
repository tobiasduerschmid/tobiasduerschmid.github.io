          correct_indices: [0, 1, 2]
          option_feedback:
            3: "Feature Envy is when a method uses the data of *another* class. add_to_playlist uses self.playlist — its own state."
            4: "PlaylistManager has two responsibilities (playlist + queue), but they're closely related and the class is small. Not a God Class — yet."
            5: "Speculative generality is over-eager abstraction. add_to_playlist has the opposite problem (under-abstracted)."
            6: "No `if cond: return True else: return False` pattern in this snippet."
