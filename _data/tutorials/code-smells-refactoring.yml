          content: |
            # Truth table for `play_decision`

            | is_logged_in | is_offline | original returns      | naive `A and not B` returns |
            |--------------|------------|-----------------------|------------------------------|
            | False        | False      | error_login_required  | error_login_required         |
            | False        | True       | error_login_required  | error_login_required         |
            | True         | False      | stream                | stream                       |
            | True         | True       | play_cached           | error_login_required ← BREAKS |
          language: "markdown"
      explanation: |
        **Three smells, three rewrites.**

        - `is_trial_expired` returns the comparison directly. The if/else around a boolean comparison was pure ceremony.
        - `stream_quality` uses a single `if/else`. The duplicate-condition pattern was an artifact of "let me handle the negation just to be safe" — a cousin of the redundancy-for-safety smell.
        - `play_decision` was correctly simplified using a guard clause + ternary. The naive `if A and not B` collapse would have dropped the `is_offline=True` branch entirely. The four-row parametrize table catches it.

        **The general principle.** Any "simplification" of nested boolean control flow has to be checked against the **full truth table** of its inputs. Two boolean inputs → 4 rows. Three booleans → 8 rows. If your test table has fewer rows than the input space, the simplification is unverified.

    tests:
      - description: "Sub-task A — is_trial_expired returns the comparison directly"
        command: |
          import ast
          tree = ast.parse(open('/tutorial/gates.py').read())
          classes = {n.name: n for n in tree.body if isinstance(n, ast.ClassDef)}
          assert 'PlaybackGates' in classes, "PlaybackGates class must remain defined"
          fn = next(m for m in classes['PlaybackGates'].body
                    if isinstance(m, ast.FunctionDef) and m.name == 'is_trial_expired')
          # Skip a leading docstring before counting body statements — students
          # who add a docstring shouldn't be penalised.
          body = list(fn.body)
          if (body and isinstance(body[0], ast.Expr)
              and isinstance(body[0].value, ast.Constant)
              and isinstance(body[0].value.value, str)):
              body = body[1:]
          assert len(body) == 1, \
              "Body (after any docstring) should be a single return statement"
          assert isinstance(body[0], ast.Return), \
              "The single statement should be a return"
          # The returned expression should be a Compare (e.g., `x <= 0`),
          # not a Constant (`return True`/`return False`) and not an IfExp
          # (`return True if cond else False` is just the same anti-pattern).
          ret_value = body[0].value
          if isinstance(ret_value, ast.IfExp):
              raise AssertionError(
                  "`return True if cond else False` is the same anti-pattern. "
                  "Just `return cond` — the comparison is already a boolean."
              )
          assert isinstance(ret_value, ast.Compare), \
              "Return the comparison directly: `return free_trial_days_left <= 0`"
        hints:
          - text: "Replace the entire if/else with one line: `return free_trial_days_left <= 0`."
            condition: "code_contains: return True"
          - text: "The condition itself is already a boolean — wrapping it in if/else just adds noise."
            condition: "default"

      - description: "Sub-task B — stream_quality uses a single if/else (or guard clause)"
        command: |
          import ast
          tree = ast.parse(open('/tutorial/gates.py').read())
          classes = {n.name: n for n in tree.body if isinstance(n, ast.ClassDef)}
          fn = next(m for m in classes['PlaybackGates'].body
                    if isinstance(m, ast.FunctionDef) and m.name == 'stream_quality')
          # Skip a leading docstring.
          body = list(fn.body)
          if (body and isinstance(body[0], ast.Expr)
              and isinstance(body[0].value, ast.Constant)
              and isinstance(body[0].value.value, str)):
              body = body[1:]
          ifs = [s for s in body if isinstance(s, ast.If)]
          assert len(ifs) == 1, \
              "Use a single if (with else, or with a fall-through return). " \
              "The 'confusing else' pattern uses two separate ifs with mutually-exclusive conditions — that's what should go away."
          # Two valid simplified forms:
          #   (a) `if cond: return X` + `else: return Y`  (orelse is non-empty)
          #   (b) `if cond: return X` + `return Y`        (guard-clause form: orelse is empty,
          #                                                followed by a top-level return)
          if_node = ifs[0]
          form_a = bool(if_node.orelse)
          # form (b): the single if is followed by a Return statement at the same level.
          if_index = body.index(if_node)
          form_b = (
              not if_node.orelse
              and if_index + 1 < len(body)
              and isinstance(body[if_index + 1], ast.Return)
          )
          assert form_a or form_b, \
              "After simplifying, the function should use either (a) `if cond: return X / else: return Y` " \
              "or (b) a guard-clause form `if cond: return X` followed by a final `return Y`. " \
              "The original had two ifs with mutually-exclusive conditions; collapse to one."
        hints:
          - text: "Replace the second `if not is_premium:` with `else:` on the first if. (A guard-clause form `if cond: return X` followed by `return Y` also counts.)"
            condition: "code_contains: if not is_premium"

      - description: "Sub-task C — truth table filled in (TODO rows replaced)"
        command: |
          tt = open('/tutorial/truth_table.md').read()
          assert 'TODO' not in tt, \
              "Two rows of truth_table.md still say TODO. Read the original nested " \
              "play_decision and fill in what it returns for (True, False) and (True, True)."
          assert '← BREAKS' in tt or 'BREAKS' in tt, \
              "Mark the row where the naive simplification would diverge with `← BREAKS`."
        hints:
          - text: "Open truth_table.md. Trace what the original play_decision returns for each (is_logged_in, is_offline) combination. The (True, True) row is the IfsMerged trap."
            condition: "default"

      - description: "Sub-task C — play_decision covers all four truth combinations"
        command: |
          import ast
          tree = ast.parse(open('/tutorial/test_gates.py').read())
          fn = next(n for n in tree.body if isinstance(n, ast.FunctionDef) and n.name == 'test_play_decision')
          rows = 0
          for dec in fn.decorator_list:
              if isinstance(dec, ast.Call) and isinstance(dec.func, ast.Attribute) and dec.func.attr == 'parametrize':
                  if len(dec.args) >= 2 and isinstance(dec.args[1], (ast.List, ast.Tuple)):
                      rows = len(dec.args[1].elts)
          assert rows >= 4, \
              f"test_play_decision parametrize table has {rows} rows. You need 4 — one per truth combination of (is_logged_in, is_offline)."
        hints:
          - text: "The four combinations are: (False, False), (False, True), (True, False), (True, True). Add the three missing rows."
            condition: "default"

      - description: "Sub-task C — play_decision behavior is correct on all four rows"
        command: |
          source = open('/tutorial/gates.py').read()
          ns = {}
          exec(source, ns)
          gates = ns['PlaybackGates']()
          # The ground-truth table that the original nested if produced.
          assert gates.play_decision(False, False) == "error_login_required", \
              "(logged_in=F, offline=F) should return 'error_login_required'"
          assert gates.play_decision(False, True)  == "error_login_required", \
              "(logged_in=F, offline=T) should return 'error_login_required'"
          assert gates.play_decision(True,  False) == "stream", \
              "(logged_in=T, offline=F) should return 'stream'"
          assert gates.play_decision(True,  True)  == "play_cached", \
              "(logged_in=T, offline=T) should return 'play_cached'  ← this is the IfsMerged row"
        hints:
          - text: "If your simplified play_decision returned 'error_login_required' for (True, True), the naive `if A and not B` collapse drops the else path. That's the IfsMerged trap."
            condition: "code_contains: is_logged_in and not is_offline"
          - text: "Try a guard clause: `if not is_logged_in: return 'error_login_required'`. Then handle the (True, *) cases with the original `is_offline` distinction."
            condition: "default"

      - description: "Pytest passes"
