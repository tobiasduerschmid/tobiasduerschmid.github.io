title: "Code Smells & Refactoring — A Music Streaming App"
description: "Identify smells in real Python code and apply named refactorings safely. The first refactoring you do by hand to anchor the safety dance; the rest you drive with Monaco's tool support so you can spend your time thinking instead of typing. Tests stay green throughout. Live UML class diagrams make the structural change visible. Built around a music streaming codebase you incrementally clean up over ten steps."

# Authoring-time Bloom-verb objectives. Not yet rendered to students.
learning_objectives:
  - "Identify common code smells (duplicated code, long methods, long parameter lists, feature envy, god classes, boolean traps, deep conditional nesting)."
  - "Apply named refactorings (Extract Function, Move Method, Extract Class, Replace Conditional with Polymorphism, Introduce Parameter Object) safely while keeping tests green."
  - "Use Monaco's refactoring tool support (extract / rename / inline) instead of error-prone hand edits."
  - "Read live UML class diagrams to verify a refactoring preserved behavior while changing structure."
  - "Evaluate where to invest refactoring effort using hotspot analysis and the Boy Scout Rule."

backend: pyodide
linter: true  # live pyflakes diagnostics in the Monaco gutter
debugger: true
pytest: true

# Show source code (left) and tests (right) side by side. Files prefixed
# `test_` auto-route to the right pane; everything else lands on the left.
# This makes the safety dance — green-tests → change → green-tests — visible
# at a glance: the student edits the source on the left and watches the test
# results come from the right without ever switching tabs.
editor_split: true

# Compact output strip below the editors — pytest's pass/fail summary is
# usually the only thing that needs to be visible there.
output_height: "25%"

# Tests are run by the student via the Run button when relevant; not every
# step gates on `pytest passes`. Some steps gate on AST-shape assertions,
# others on quiz score.
require_tests: false

# Layout: code on top-left, tests on top-right (split editors).
# `uml_position: right` puts the live class diagram on the bottom-right (below editors).
# `output_position: bottom-left` (independent flag) hoists the Output panel into
# the left column (below instructions). Combined, these give the recommended
# refactoring-tutorial layout: instructions + test output on the left, code +
# class diagram on the right.
uml_diagram: true
uml_position: right
output_position: bottom-left
uml_default_view: true
uml_default_type: class
uml_class_layout: landscape

# Override the Run button label — this tutorial runs pytest, not arbitrary code.
run_label: "Test"

autosave_type: files

# Setup: install pytest, expose /tutorial on sys.path, patch the pytest module
# cache so re-imports between steps see fresh source instead of stale modules.
# The module name list MUST include every project module the student edits.
setup_commands:
  - "import pyodide_js; await pyodide_js.loadPackage('pytest')"
  - "import sys; sys.path.insert(0, '/tutorial')"
  # Never cache bytecode in this session: a stale .pyc could mask test edits.
  - "import sys; sys.dont_write_bytecode = True"
  - |
    import pytest as _pytest, sys as _sys, importlib as _importlib
    def _make_pytest_patch():
        _orig = _pytest.main
        _sysmod = _sys
        _imp = _importlib
        _project_modules = (
            # Domain classes the student edits per step.
            'royalty', 'player', 'track', 'streaming_app', 'billing_manager',
            'tracks', 'filters', 'playlist', 'memo', 'gates', 'media', 'helpers',
            # Caller / driver modules — production code that USES the domain classes.
            # These let the student feel the cost of Move Method / Extract Class:
            # callers must be updated when methods move or signatures change.
            'payouts', 'playback_session', 'play_controller', 'search_handler',
            'playback_ui', 'app_runner', 'playback_loop', 'importer',
        )
        def _patched(*a, **kw):
            # Clear any cached test_* / project modules so a re-run picks up edits.
            for m in list(_sysmod.modules):
                if m.startswith('test_') or m in _project_modules:
                    del _sysmod.modules[m]
            # Force the import system to re-stat .py files (catches edits even
            # when the filesystem doesn't bump mtime).
            _imp.invalidate_caches()
            # Disable pytest's collection cache (.pytest_cache) — it would otherwise
            # persist between runs and could mask edits to expected values.
            args = list(a[0]) if a and isinstance(a[0], (list, tuple)) else []
            if 'no:cacheprovider' not in ' '.join(str(x) for x in args):
                args = args + ['-p', 'no:cacheprovider']
            new_a = (args,) + a[1:]
            return _orig(*new_a, **kw)
        return _patched
    _pytest.main = _make_pytest_patch()

steps:

  # ==========================================================================
  # STEP 1 — The Cost of Duplication You Didn't Notice
  # Pedagogy: mistake-based familiarization (Tan & Poskitt 2024).
  # The student does not refactor — they DIAGNOSE. They feel the cost of
  # duplication by fixing the same bug three times. The cure waits until Step 4.
  # ==========================================================================
  - title: "The Cost of Duplication You Didn't Notice"
    instructions: |
      ## Welcome — what this tutorial trains

      You already know Python and pytest. You haven't yet learned the *discipline* of changing existing code without breaking it. That discipline has a name — **refactoring** — and a lot of structure to it. Over the next ten steps you'll learn:

      - How to recognize a handful of high-impact **code smells** in real Python.
      - How to apply named **refactorings** that fix each smell safely.
      - How **tests** give you the safety net to change structure without changing behavior.
      - How to **judge** when a refactoring is worth doing, and when it isn't.

      The codebase grows over the tutorial: you start with three small functions and end with a small music streaming app. Most of the typing is done by Monaco's refactoring tools — you'll select code, pick a refactoring, and judge the diff. The *thinking* is yours.

      > **Prerequisite:** [Testing Foundations](/SEBook/tools/testing-foundations-tutorial) — pytest discovery, `assert`, and `@pytest.mark.parametrize`. If those feel new, do that one first.

      ## Step 1 — A Bug, in Triplicate

      > **Learning objective.** After this step you will be able to (a) define refactoring as **behavior-preserving structural change**, and (b) explain *operationally* why duplicated code multiplies the cost of every future bug.

      Open `royalty.py`. The `RoyaltyCalculator` class has three methods that calculate the creator's share of streaming royalties for three different track types — songs, podcasts, audiobooks. They all use the same formula: **plays × rate × 0.7** (the platform takes 30%, creators get 70%).

      ```python
      class RoyaltyCalculator:
          def royalty_song(self, plays: int, rate: float) -> float:
              return plays * rate * 0.7

          def royalty_podcast(self, plays: int, rate: float) -> float:
              return plays + rate * 0.7   # ← bug

          def royalty_audiobook(self, plays: int, rate: float) -> float:
              return plays + rate * 0.7   # ← bug
      ```

      Two of the three have the same bug — `+` where there should be `*`. The bug ships unnoticed because the test suite only covers `royalty_song`. (You can already see the class in the **UML diagram** in the bottom-left — three methods, one box.)

      ### Your task

      1. **Run** the existing tests in `test_royalty.py`. `test_royalty_song` passes — the song formula is correct. But `test_monthly_payouts_sums_across_track_types` already **fails**: that's an integration test summing royalties across all three track types via the `MonthlyPayouts` caller, and the buggy podcast / audiobook formulas produce a wildly wrong total. The bug propagates *upward* through every caller of the broken methods.
      2. **Extend** the parametrize table in `test_royalty.py` to cover `royalty_podcast` and `royalty_audiobook` with at least two `(plays, rate)` cases each. Use the formula `plays * rate * 0.7` to compute the expected values. Two new tests will turn red — the bug is now visible at the *unit* level too, not just at the integration level.
      3. **Fix** the bug in `royalty.py`. You have to fix it in **two separate places** because the logic is duplicated. After the fix, all three test layers pass: the per-method unit tests, the integration test, and (in production) any future caller.

      You will not yet refactor the duplication away. That waits until Step 4. The point of this step is to *feel the cost*: a single bug, fixed in N places, where N is the number of duplicates.

      ### Refactoring, defined

      Throughout this tutorial we use **Martin Fowler's** definition (*Refactoring*, 2018):

      > **Refactoring** is a *disciplined* technique for restructuring an existing body of code, *altering its internal structure without changing its external behavior*.

      The two halves are equally important. **Structural change** without behavior preservation is a rewrite; **behavior preservation** without structural change is unnecessary churn. A refactoring is both at once.

      ### Not every triplet is a smell

      Visual similarity isn't the diagnostic — *bug-coupling* is. Look at this counter-example:

      ```python
      def round_currency_usd(amount: float) -> float:
          return round(amount, 2)            # cents: 2 decimal places

      def round_currency_jpy(amount: float) -> float:
          return round(amount, 0)            # yen: no fractional unit

      def round_currency_kwd(amount: float) -> float:
          return round(amount, 3)            # Kuwaiti dinar: 3 decimal places
      ```

      Three near-identical functions, but each captures a *real domain rule* (ISO 4217 minor-unit precision per currency). Consolidating these into one function with a precision parameter would *not* remove a bug coupling — there are no shared bugs to fix in three places, because each precision is independent. The visual similarity is a coincidence of the API shape, not duplicated knowledge.

      The rule of thumb: if changing one of the functions would also force you to change the others (in lockstep), that's duplication. If they evolve independently, leave them alone. Step 4 returns to this trade-off — for now, hold the distinction in mind.

    files:
      - path: "royalty.py"
        content: |
          """Streaming royalty calculations.

          The platform takes 30% commission; creators get 70% of plays * rate.
          """


          class RoyaltyCalculator:
              """Computes creator royalty payouts per track type."""

              def royalty_song(self, plays: int, rate: float) -> float:
                  return plays * rate * 0.7

              def royalty_podcast(self, plays: int, rate: float) -> float:
                  return plays + rate * 0.7

              def royalty_audiobook(self, plays: int, rate: float) -> float:
                  return plays + rate * 0.7
        language: "python"

      - path: "payouts.py"
        content: |
          """Monthly creator-payout aggregator — uses RoyaltyCalculator across all track types.

          This is the *production caller* that exercises the three royalty methods.
          The bug in royalty_podcast / royalty_audiobook propagates through here:
          MonthlyPayouts.total_creator_earnings will return wildly wrong totals
          until the underlying calculator is fixed.
          """
          from typing import List, Tuple
          from royalty import RoyaltyCalculator


          class MonthlyPayouts:
              """Aggregates monthly creator earnings across songs, podcasts, audiobooks."""

              def __init__(self, calculator: RoyaltyCalculator) -> None:
                  self.calculator: RoyaltyCalculator = calculator

              def total_creator_earnings(
                  self,
                  song_plays: List[Tuple[int, float]],
                  podcast_plays: List[Tuple[int, float]],
                  audiobook_plays: List[Tuple[int, float]],
              ) -> float:
                  """Sum royalties across all three track types for one month."""
                  total: float = 0.0
                  for plays, rate in song_plays:
                      total += self.calculator.royalty_song(plays, rate)
                  for plays, rate in podcast_plays:
                      total += self.calculator.royalty_podcast(plays, rate)
                  for plays, rate in audiobook_plays:
                      total += self.calculator.royalty_audiobook(plays, rate)
                  return total
        language: "python"

      - path: "test_royalty.py"
        content: |
          """Tests for streaming royalty calculations and the MonthlyPayouts caller."""
          import pytest
          from royalty import RoyaltyCalculator
          from payouts import MonthlyPayouts


          @pytest.fixture
          def calc() -> RoyaltyCalculator:
              return RoyaltyCalculator()


          @pytest.mark.parametrize("plays,rate,expected", [
              (100, 0.01, 0.7),
              (1000, 0.005, 3.5),
          ])
          def test_royalty_song(calc: RoyaltyCalculator, plays: int, rate: float, expected: float) -> None:
              assert calc.royalty_song(plays, rate) == pytest.approx(expected)


          # TODO: extend the parametrize table to cover royalty_podcast and
          # royalty_audiobook with at least two cases each. Use the formula
          # plays * rate * 0.7 to compute the expected values.


          def test_monthly_payouts_sums_across_track_types(calc: RoyaltyCalculator) -> None:
              """Integration test: the bug in any royalty_* method also breaks this aggregate."""
              payouts: MonthlyPayouts = MonthlyPayouts(calc)
              total: float = payouts.total_creator_earnings(
                  song_plays=[(100, 0.01), (1000, 0.005)],   # 0.7 + 3.5  = 4.2
                  podcast_plays=[(100, 0.02)],               # 1.4        = 1.4
                  audiobook_plays=[(200, 0.02)],             # 2.8        = 2.8
              )
              assert total == pytest.approx(8.4)

        language: "python"

    open_file: "test_royalty.py"
    run_file: "test_royalty.py"

    solution:
      files:
        - path: "royalty.py"
          content: |
            """Streaming royalty calculations.

            The platform takes 30% commission; creators get 70% of plays * rate.
            """


            class RoyaltyCalculator:
                """Computes creator royalty payouts per track type."""

                def royalty_song(self, plays: int, rate: float) -> float:
                    return plays * rate * 0.7

                def royalty_podcast(self, plays: int, rate: float) -> float:
                    return plays * rate * 0.7

                def royalty_audiobook(self, plays: int, rate: float) -> float:
                    return plays * rate * 0.7
          language: "python"

        - path: "test_royalty.py"
          content: |
            """Tests for streaming royalty calculations and the MonthlyPayouts caller."""
            import pytest
            from royalty import RoyaltyCalculator
            from payouts import MonthlyPayouts


            @pytest.fixture
            def calc() -> RoyaltyCalculator:
                return RoyaltyCalculator()


            @pytest.mark.parametrize("plays,rate,expected", [
                (100, 0.01, 0.7),
                (1000, 0.005, 3.5),
            ])
            def test_royalty_song(calc: RoyaltyCalculator, plays: int, rate: float, expected: float) -> None:
                assert calc.royalty_song(plays, rate) == pytest.approx(expected)


            @pytest.mark.parametrize("plays,rate,expected", [
                (100, 0.02, 1.4),
                (500, 0.01, 3.5),
            ])
            def test_royalty_podcast(calc: RoyaltyCalculator, plays: int, rate: float, expected: float) -> None:
                assert calc.royalty_podcast(plays, rate) == pytest.approx(expected)


            @pytest.mark.parametrize("plays,rate,expected", [
                (100, 0.05, 3.5),
                (200, 0.02, 2.8),
            ])
            def test_royalty_audiobook(calc: RoyaltyCalculator, plays: int, rate: float, expected: float) -> None:
                assert calc.royalty_audiobook(plays, rate) == pytest.approx(expected)


            def test_monthly_payouts_sums_across_track_types(calc: RoyaltyCalculator) -> None:
                """Integration test: the bug in any royalty_* method also breaks this aggregate."""
                payouts: MonthlyPayouts = MonthlyPayouts(calc)
                total: float = payouts.total_creator_earnings(
                    song_plays=[(100, 0.01), (1000, 0.005)],
                    podcast_plays=[(100, 0.02)],
                    audiobook_plays=[(200, 0.02)],
                )
                assert total == pytest.approx(8.4)

          language: "python"
      explanation: |
        **Two halves of the lesson.**

        - The bug fix is the easy part — change `+` to `*` in two places. Notice the *number* of places: with three duplicated functions, one bug becomes three fixes. With ten duplicates, one bug becomes ten fixes — and any one of those ten places might be missed.
        - The new test cases are the discipline part. The original suite passed because it only exercised one of the three functions. Coverage gaps don't announce themselves; you find them by widening your test cases until every public function is exercised.

        **What you did NOT do.** You didn't extract the common formula into a helper. That's the obvious next move, but it isn't this step's lesson — and doing it now, *before* fixing the bug, would have *propagated the buggy formula into the helper*. You'd then have one buggy place instead of three, but the bug would still be there. **Fix first, refactor second** is the rule. Step 4 will do the extraction.

    tests:
      - description: "Both buggy methods are fixed — behavior check on non-trivial inputs"
        command: |
          # Behavior-based check: instantiate RoyaltyCalculator and verify each method
          # returns the correct multiplicative formula on inputs where * and + diverge.
          # The buggy `plays + rate * 0.7` for (100, 0.01) gives ~100.007;
          # the correct `plays * rate * 0.7` gives 0.7. Off by orders of magnitude.
          source = open('/tutorial/royalty.py').read()
          ns = {}
          exec(source, ns)
          assert 'RoyaltyCalculator' in ns, "RoyaltyCalculator class must remain defined"
          calc = ns['RoyaltyCalculator']()
          for method_name in ('royalty_song', 'royalty_podcast', 'royalty_audiobook'):
              assert hasattr(calc, method_name), \
                  f"{method_name} must remain a method of RoyaltyCalculator"
              method = getattr(calc, method_name)
              # Two probe inputs where buggy + and correct * disagree by ~143×.
              result_a = method(100, 0.01)
              expected_a = 100 * 0.01 * 0.7  # 0.7
              assert abs(result_a - expected_a) < 1e-6, \
                  f"{method_name}(100, 0.01) returned {result_a}, expected {expected_a}. " \
                  f"The formula is plays * rate * 0.7. Check for `+` where there should be `*`."
              result_b = method(1000, 0.005)
              expected_b = 1000 * 0.005 * 0.7  # 3.5
              assert abs(result_b - expected_b) < 1e-6, \
                  f"{method_name}(1000, 0.005) returned {result_b}, expected {expected_b}. " \
                  f"Check the operators in the formula."
        hints:
          - text: "Two of the three royalty methods have `+` where there should be `*`. Find them and fix them."
            condition: "code_contains: plays + rate"
          - text: "Read the comment at the top of royalty.py — the formula is plays × rate × 0.7. The `+` is the bug."
            condition: "default"

      - description: "Test suite covers all three methods with non-trivial values"
        command: |
          import ast
          tree = ast.parse(open('/tutorial/test_royalty.py').read())
          test_funcs = {n.name: n for n in tree.body if isinstance(n, ast.FunctionDef) and n.name.startswith('test_')}
          assert 'test_royalty_podcast' in test_funcs, \
              "Add a test_royalty_podcast function with a @pytest.mark.parametrize table"
          assert 'test_royalty_audiobook' in test_funcs, \
              "Add a test_royalty_audiobook function with a @pytest.mark.parametrize table"
          # Each new test must have a parametrize decorator with at least 2 rows
          # AND at least one row where plays > 1 and rate > 0 — otherwise the buggy
          # `plays + rate * 0.7` formula could pass the test (e.g., (0, 0, 0) gives 0
          # under both buggy and correct formulas).
          for fname in ('test_royalty_podcast', 'test_royalty_audiobook'):
              fn = test_funcs[fname]
              rows = []
              for dec in fn.decorator_list:
                  if isinstance(dec, ast.Call) and isinstance(dec.func, ast.Attribute) and dec.func.attr == 'parametrize':
                      if len(dec.args) >= 2 and isinstance(dec.args[1], (ast.List, ast.Tuple)):
                          rows = dec.args[1].elts
              assert len(rows) >= 2, \
                  f"{fname} needs @pytest.mark.parametrize with at least 2 cases"
              # Check for at least one non-trivial row where the bug would be exposed.
              has_nontrivial = False
              for row in rows:
                  if not isinstance(row, (ast.Tuple, ast.List)) or len(row.elts) < 2:
                      continue
                  plays_node, rate_node = row.elts[0], row.elts[1]
                  try:
                      plays_val = ast.literal_eval(plays_node)
                      rate_val = ast.literal_eval(rate_node)
                      if plays_val > 1 and rate_val > 0:
                          has_nontrivial = True
                          break
                  except Exception:
                      continue
              assert has_nontrivial, \
                  f"{fname} needs at least one row where plays > 1 and rate > 0. " \
                  f"All-zero or all-trivial inputs let the buggy `plays + rate * 0.7` " \
                  f"formula pass the test silently."
        hints:
          - text: "Copy the structure of test_royalty_song. Add two more test functions with their own @pytest.mark.parametrize decorators."
            condition: "code_missing: test_royalty_podcast"
          - text: "Each parametrize table needs at least 2 rows AND at least one row with plays>1 and rate>0 (e.g., (100, 0.02, 1.4))."
            condition: "default"

      - description: "Pytest passes after the fix"
        command: |
          import pytest, io, sys
          old = sys.stdout
          sys.stdout = buf = io.StringIO()
          code = pytest.main(['/tutorial/test_royalty.py', '-v', '--tb=short'])
          sys.stdout = old
          output = buf.getvalue()
          print(output)
          assert code == 0, f"pytest failed:\n{output}"

    quiz:
      title: "Step 1 — The Cost of Duplication"
      min_score: 0.7
      shuffle: true
      questions:

        - question: |
            **Retrieval.** Which operator was wrong in two of the three royalty functions, and what should it have been?
          type: single
          options:
            - "`+` was wrong; should have been `*`"
            - "`*` was wrong; should have been `+`"
            - "`/` was wrong; should have been `*`"
            - "`-` was wrong; should have been `+`"
          correct_index: 0
          option_feedback:
            1: "The formula in the docstring is plays × rate × 0.7 — multiplication is correct. The bug was the reverse: two functions had `+` where the formula calls for `*`."
          explanation: |
            The docstring stated the formula as plays × rate × 0.7. Two of the three functions had `plays + rate * 0.7`, which silently returns garbage values for any non-trivial input. Naming the bug operator from memory anchors the smell — when you next see "three near-identical functions," the very next thought should be "what bug might be hiding in just two of them?"

        - question: |
            Which of the following best matches Fowler's definition of **refactoring**?
          type: single
          options:
            - "Rewriting code from scratch in a cleaner style"
            - "Restructuring existing code without changing its external behavior"
            - "Adding new features while improving the existing code"
            - "Removing unused code paths and dead branches"
          correct_index: 1
          option_feedback:
            0: "A rewrite typically does change behavior in subtle ways and starts from a blank slate. Refactoring is incremental and behavior-preserving — the external contract is unchanged."
            2: "Adding features mixes refactoring with feature work. Discipline says do one or the other — refactor under the safety net of tests, then add the feature on the cleaner foundation."
            3: "Removing dead code can be part of a refactor, but the term refers more broadly to any structural improvement that preserves behavior, not specifically to deletion."
          explanation: |
            Refactoring has two halves: structural change AND behavior preservation. Without the second half, it's a rewrite. Without the first, it's churn. Both halves are non-negotiable.

        - question: |
            You discover the same bug in three near-identical copies of a function. Which order do you apply?
          type: single
          options:
            - "Refactor first to remove the duplication, then fix the bug in one place"
            - "Fix the bug in all three places, then refactor to remove the duplication"
            - "Fix in one place; let the duplication remain — the others are unused"
            - "Either order is equivalent; the result is identical code"
          correct_index: 1
          option_feedback:
            0: "Tempting, but dangerous: extracting the common code *with the bug intact* would propagate the buggy formula into the helper. The duplication would be gone, but the bug would remain. Fix-then-refactor preserves the safety property: every step has a passing test suite."
            3: "Order matters because of the test safety net. Fix-then-refactor verifies the fix in each location with a green test before changing structure. Refactor-then-fix can hide the original bug inside the new abstraction."
          explanation: |
            **Fix-then-refactor.** Fix the bug in each duplicate first, with tests passing for each location. Only then refactor to consolidate — the consolidated helper now contains the corrected formula. This is one of the most useful sequencing rules in the refactoring toolkit.

        - question: |
            **Transfer — operational cost of duplication.** Next month the team adds two more royalty methods, both copying the same buggy formula from the existing duplicates. **No refactor happens in between.** When a developer finally notices the bug after that, how many code lines must they touch to fix every broken method?
          type: single
          options:
            - "1 — the bug lives in shared code, so one fix propagates everywhere"
            - "2 — only the methods that were already broken today need fixing; the new ones stay wrong"
            - "4 — every method that contains the bug must be edited separately"
            - "0 — the test suite reverts the duplicates automatically"
          correct_index: 2
          option_feedback:
            0: "There is no shared helper yet — that is exactly what Step 4's **Extract Function** introduces. Until then, the formula lives independently in each method and N copies means N edits."
            1: "All four methods contain the same broken formula and all four affect production payouts. Leaving the new ones uncorrected ships a known regression."
            3: "Tests run code; they don't rewrite it. The N-edit cost falls on the developer every time."
          explanation: |
            Cost-of-fix scales **linearly** with the number of buggy duplicates (N). Today N is 2; two more copies makes N = 4. Step 4's **Extract Function** collapses N to 1 — one helper, one fix, no matter how many callers depend on the formula. That gap — N edits before, 1 edit after, summed across every future bug in the shared logic — is the operational reason duplication multiplies the cost of every future bug.


  # ==========================================================================
  # STEP 2 — Long Method → Extract Function (manual, the only typing step)
  # Pedagogy: one slow, deliberate manual extraction so the tool's later
  # behavior is recognizable. Worked example for the first extraction;
  # checklist-guided for the second; independent for the third.
  # ==========================================================================
  - title: "Long Method → Extract Function (by hand)"
    instructions: |
      ## Long Method, the smell

      > **Learning objective.** After this step you will be able to (a) recognize a Long Method by its sub-goal structure, (b) apply **Extract Function** while keeping tests green, and (c) explain the safety dance — the test discipline that makes refactoring safe.

      Open `player.py`. The original `Streaming.process_play_event(user, track)` was **about 35 lines** doing five different things. Sub-goal 1 (the subscription check) has already been extracted as a worked example — the file you opened starts from there. The method body still inlines four more sub-goals:

      1. Verify the user's subscription
      2. Check that the track is available in the user's region
      3. Compute royalty for the play
      4. Update the play count
      5. Append to the user's history

      The comments label these sub-goals — that's a hint that the method is doing **too much**. A coherent method does one thing and is named for it. A method that does five things needs five names, which means five separate methods.

      ## The safety dance

      Refactoring without tests is a coin flip. Refactoring with tests is reliable. The discipline:

      | Step | Action |
      |---|---|
      | 1 | **Run** the tests. They should pass. *Now you have a baseline.* |
      | 2 | **Make** one structural change. Do not change behavior. |
      | 3 | **Run** the tests again. They must still pass. *If they fail, the change broke something — undo and try again.* |
      | 4 | Repeat from (2) until the structure is clean. |

      The rhythm is **green → change → green → change → green**. You are never more than one undo away from a known-good state.

      ## Predict before reading

      The first sub-goal of `process_play_event` is the subscription check (lines tagged `# 1.`). **Before** you read the worked example below, write down the function name *you* would choose for that block. One word or short phrase. Hold your choice in mind. After you see the worked example, compare to the name we chose — and ask yourself whether yours is clearer, equivalent, or worse.

      Naming is the load-bearing micro-decision in every Extract Function. Generating a name yourself first — even if you change it after — anchors the schema better than reading our name first.

      ## Worked example — extracting the first sub-goal

      Look at the first comment block in `process_play_event`:

      ```python
      # 1. Verify the user's subscription
      if user.subscription_tier == "free":
          if user.daily_plays >= 5:
              raise PermissionError("Free tier daily limit reached")
      elif user.subscription_tier == "premium":
          pass  # unlimited
      else:
          raise ValueError(f"Unknown tier: {user.subscription_tier}")
      ```

      Five lines doing one thing. That's a perfect Extract Method candidate.

      **The mechanics, narrated.**

      1. **Cut** the five lines.
      2. **Write** a new helper method on the `Streaming` class:
         ```python
         def _check_subscription(self, user: User) -> None:
             """Raise an exception if the user is not allowed to play."""
             if user.subscription_tier == "free":
                 if user.daily_plays >= 5:
                     raise PermissionError("Free tier daily limit reached")
             elif user.subscription_tier == "premium":
                 pass  # unlimited
             else:
                 raise ValueError(f"Unknown tier: {user.subscription_tier}")
         ```
      3. **Replace** the cut block in `process_play_event` with a call:
         ```python
         self._check_subscription(user)
         ```
      4. **Run** the tests. Green.

      Three things to notice:

      - The helper has a **type-annotated signature**. `user: User` and the `-> None` return tell future readers what it consumes and what it produces. The annotation is part of the refactoring, not optional polish.
      - The helper has a **leading underscore** in its name. Convention: `_name` means "internal — not part of the public API." `process_play_event` is public; helpers it depends on are internal.
      - The helper's name **describes what it does**, not how. `_check_subscription` is a coherent sub-goal; `_block_one` would not be.

      ## Your task

      Two more sub-goals are still inline in `process_play_event`. Extract them as methods on `Streaming`. The file already has the worked-example extraction applied; you continue from there.

      - Sub-goal **2: geo-restriction**. Extract `_check_geo_restriction(self, user: User, track: Track) -> None` (raises on failure).
      - Sub-goal **3: royalty calculation**. Extract `_compute_royalty(self, track: Track) -> float` returning the royalty amount.

      Run the tests after each extraction. They should stay green throughout. Watch the **UML diagram** in the bottom-left grow with each extraction — `Streaming` gains methods, `process_play_event`'s body shrinks.

      > **Why we do this manually one time.** Steps 4–8 will use Monaco's tool to do extractions for you with two clicks. Doing one slow extraction by hand right now anchors the *mechanics* in your fingers. When the tool acts later, you'll recognize what it did because you'll have done it yourself.

