    quiz:
      title: "Step 9 — Hotspots & The Boy Scout Rule"
      min_score: 0.7
      shuffle: true
      questions:

        - question: |
            **Retrieval.** Which of these scenarios would you **defer** refactoring for?
          type: multiple
          options:
            - "Code in a file that hasn't been touched in two years and isn't on your roadmap"
            - "Code you're about to add a feature to next sprint"
            - "Code with frequent bug fixes in the last six months"
            - "Code with no tests"
            - "A class with three different smells that co-occur"
          correct_indices: [0]
          optional_indices: [3]
          option_feedback:
            1: "Code about to be changed is the textbook hotspot — refactor while editing it. Boy Scout rule."
            2: "Frequent bug fixes are a strong hotspot signal. The smelly structure is *causing* the bugs; refactoring reduces future bug rates."
            3: "Lack of tests is a *concern* before refactoring (write characterization tests first), but not a reason to defer indefinitely. Address the test gap and then refactor."
            4: "Co-occurring smells in one class are exactly what the empirical research flags as the highest-cost configuration. Don't defer; address."
          explanation: |
            **Cold code is the only one to defer.** Hotspots, soon-to-be-touched code, and co-occurring-smell hotspots all justify refactoring effort. Lack of tests is a side-quest (write tests first), not a deferral.

        - question: |
            What's wrong with the rule "always refactor when you see a smell"?
          type: single
          options:
            - "It produces too much code churn"
            - "It leads to speculative generality — abstractions for extensions that never come"
            - "It's too lenient — the rule should be stricter"
            - "Smells are subjective; you can't always agree what's a smell"
          correct_index: 1
          option_feedback:
            0: "Churn is a *consequence* of the deeper problem. The deeper problem is that not every smell warrants a fix in every context."
            2: "Stricter rules don't help — strict + wrong produces speculative generality faster."
            3: "Smell subjectivity is real but it's not the failure mode of 'always refactor.' The failure mode is that some smells are not actually problems in their context."
          explanation: |
            **Speculative generality and premature abstraction.** "Always refactor" produces abstractions that anticipate extension that never arrives. The reader pays the cost of the abstraction every day; the imagined benefit may never come.

        - question: |
            What's wrong with the rule "never refactor working code"?
          type: single
          options:
            - "It produces ugly code that's hard to read"
            - "It lets hotspots accrue debt that compounds with every change"
            - "It violates the Boy Scout Rule"
            - "All of the above"
          correct_index: 3
          option_feedback:
            0: "True, but partial — ugliness alone isn't the structural problem."
            1: "True — and the most actionable version. Hotspot code keeps changing; without cleanup, each change becomes harder than the last."
            2: "True — Robert Martin's rule says leave each campground (any file being touched) cleaner. 'Never refactor' is the opposite of that discipline."
          explanation: |
            **All three are facets of the same failure.** Pure "never refactor" produces compounding debt in exactly the places where reducing it pays back the most.

        - question: |
            The **Boy Scout Rule**, applied to code, says:
          type: single
          options:
            - "Refactor every file you touch, completely, before committing"
            - "Leave each file you touch a little cleaner than you found it"
            - "Never commit code that lints with warnings"
            - "Always rewrite code that you don't understand"
          correct_index: 1
          option_feedback:
            0: "Complete refactors are big risky changes. The Boy Scout rule is *small* improvements bundled with whatever work was already happening."
            2: "Linter compliance is a different discipline (style, not structure). The Boy Scout rule is about structural quality, not surface style."
            3: "Rewriting unfamiliar code is dangerous — there's no safety net of a working baseline. Read, write tests, then refactor incrementally."
          explanation: |
            **Small, incremental, concurrent.** The Boy Scout rule trades coordinated big-bang refactors for many small per-task improvements. Combined with the hotspot rule, it covers most of the value of refactoring at almost none of the coordination cost.

        - question: |
            **Loop-replacement misconception.** Consider:
            ```python
            # Original
            total = 0
            for i in range(0, len(values), 2):
                total += values[i]
            ```
            A reviewer suggests replacing it with:
            ```python
            # Suggested
            total = 0
            for v in values:
                total += v
            ```
            Is the suggested replacement a safe refactoring?
          type: single
          options:
            - "Yes — it's the same loop with cleaner syntax"
            - "Yes — the type checker would catch any difference"
            - "No — the original strides by 2; the replacement sums every element"
            - "Only if `values` is a list, not a tuple"
          correct_index: 2
          option_feedback:
            0: "The two loops *look* similar but the original uses `range(0, len(values), 2)` — the third argument is the stride. The replacement loses that, summing every element instead of every other one."
            1: "Type checkers detect type errors, not semantic ones. Both loops have the same types in and out; the difference is in *which elements* get summed."
            3: "The container type is unrelated to the stride semantics. The bug is the same whether `values` is a list, tuple, or generator."
          explanation: |
            **Strided loops aren't interchangeable with foreach.** Before simplifying a loop, ask what the index was doing. Strided, reversed, paired-with-another-sequence, or used-for-position — all four patterns break under naive `for x in iterable` replacement. This is a documented misconception (Oliveira/Keuning/Jeuring 2023) that survives all the way into professional code.


  # ==========================================================================
  # STEP 10 — The Refactoring Memo (Synthesis)
  # Mistake-based-via-judgment. Multi-smell snippet, two plausible refactorings,
  # full memo authoring before any code, cumulative quiz drawing from all
  # earlier steps. Includes interleaved diagnosis warmup.
  # ==========================================================================
  - title: "The Refactoring Memo (Synthesis)"
    instructions: |
      ## Putting it all together

      > **Learning objective.** After this step you will be able to (a) **diagnose** multiple smells coexisting in a piece of unfamiliar code, (b) **choose** which refactoring to apply first based on the dependencies between smells, and (c) **defend** the choice in a four-field refactoring memo before touching any code.

      Open `playlist.py`. The class `PlaylistManager` has multiple smells stacked together. Your job is to (a) diagnose them, (b) choose **one** refactoring to apply, (c) write the memo, and only then (d) execute the refactoring with the tool.

      ## Warm-up — interleaved diagnosis

      Before you look at `playlist.py`, name the smell and refactoring that fits each of the four snippets below. **No code changes** — just diagnose. Each snippet has exactly one dominant smell from earlier steps.

      ### Snippet A
      ```python
      def shuffle_score(
          plays: int,
          age: int,
          last_played: int,
          mood: str,
          weather: str,
          time_of_day: str,
      ) -> float:
          base: float = 0.0
          if mood == "energetic" and weather == "sunny":
              base = plays / age
          elif mood == "calm":
              base = plays / (age + last_played)
          # ... 8 more elifs ...
          return base
      ```

      ### Snippet B
      ```python
      def update_metadata(
          track: Track,
          title: str,
          artist: str,
          album: str,
          year: int,
          genre: str,
          label: str,
      ) -> None:
          track.title = title
          track.artist = artist
          ...
      ```

      ### Snippet C
      ```python
      class Statistics:
          def avg_track_length(self, tracks: List[Track]) -> float:
              total: int = sum(t.duration_sec for t in tracks)
              return total / len(tracks)
      ```

      ### Snippet D
      ```python
      def is_hi_res(track: Track) -> bool:
          if track.bitrate >= 1411:
              return True
          else:
              return False
      ```

      ### Snippet E (the foil)
      ```python
      class StripeProcessor:
          def charge(self, amount_cents: int, currency: str) -> bool:
              return self._gateway.charge(amount_cents, currency)

      class PayPalProcessor:
          def charge(self, amount_cents: int, currency: str) -> bool:
              return self._gateway.charge(amount_cents, currency)
      ```
      Two near-identical classes — same method shape, same body. Tempting to extract a base class or polymorphism, but **this might be fine**. Each processor has its own SDK, error handling, and configuration that isn't shown here. The visual similarity is shallow.

      Hold all five diagnoses in your head as you read on. The quiz will check whether you can discriminate *real* smells from *looks-similar-but-fine*.

      ## The synthesis snippet — `playlist.py`

      `PlaylistManager.add_to_playlist(...)` is the function we'll refactor. Smells stacked in it (in plain English):

      1. **Long Parameter List** — eight parameters, several of which travel as a clump.
      2. **Long Method** — three sub-goals (validation, deduplication, persistence) jammed together.
      3. **Duplicated Code** — the validation block is duplicated in `add_to_queue`.

      ### Two plausible refactorings — pick ONE

      | Option | What it tackles first | Trade-off |
      |---|---|---|
      | **A: Introduce Parameter Object** on the eight parameters first | Long Parameter List | Cleaner signatures, but the duplicated validation block is still duplicated |
      | **B: Extract Function** on the validation block first | Long Method + Duplication | Smaller methods, both `add_to_playlist` and `add_to_queue` deduped, but the eight-parameter signature is still long |

      Either choice is defensible. The tutorial doesn't grade which choice you make — it grades the **memo** you write to defend it.

      ## The memo — fully blank this time

      Open `memo.md`. All four sections are empty. **You write all four:**

      - **Issue** — name the smell(s) in plain English.
      - **Rationale** — explain why your chosen refactoring is the right *first* step. (You can mention follow-up refactorings, but commit to *one* first move.)
      - **Invariant** — what behavior must be preserved across the refactor?
      - **Tests** — which tests in `test_playlist.py` confirm the invariant?

      A reference card at the bottom of `memo.md` defines each field in one sentence in case you need to refresh.

      ## Then execute

      After writing the memo, **invoke the appropriate tool action**:

      - For Option A: place cursor in the parameter list, **Refactor: Introduce Parameter Object**, name it `TrackInfo`, bundle the four album-related parameters.
      - For Option B: select the validation block in `add_to_playlist`, **Refactor: Extract Function/Method**, name it `_validate_track_data`. Then replace the duplicated block in `add_to_queue` with a call to the new helper.

      Run the tests after the refactor. They must still pass.

      ## Pause and reckon: which option costs more, and why?

      Before you finish this step, look at the test file. Notice that **none** of the tests call `pm.add_to_playlist(...)` or `pm.add_to_queue(...)` directly. They all go through `TrackImporter`. The tests don't depend on which option you picked.

      Now think about what *did* have to change for each option:

      - **Option B (Extract Function)** preserves the public signatures of `add_to_playlist` and `add_to_queue`. The internal validation logic moves into a private `_validate_track_data` helper. **No callers change. `importer.py` is untouched. `test_playlist.py` is untouched.** This is the same dynamic you saw in Step 6 (Move Method) and Step 7 (Extract Class) — the refactor stayed inside the class's existing public surface.
      - **Option A (Introduce Parameter Object)** changes the public signatures of `add_to_playlist` and `add_to_queue`. **`importer.py`'s `_add_to_*_one` helpers MUST be updated** to construct a `TrackInfo` for the new shape. This is the same dynamic as Step 5 — bundling parameters means every caller has to follow.

      In Step 5 the cost landed on the test file. Here, *because the tests already go through a stable wrapper*, the cost lands on the wrapper instead. That's the lesson restated one more time: **a refactor's cost is paid wherever the changed signature is referenced.** Tests are exempt only when they reference *some other* stable interface that absorbs the change.

      Take 30 seconds before moving on: which option did you pick, and which file(s) did *that* choice force you to edit beyond `playlist.py`? Add one line to your memo's *Rationale* naming those files.

      ## What's next after this tutorial

      You've covered method-level smells (Long Method, Duplication, Boolean anti-patterns), data-level smells (Long Parameter List, Feature Envy), and class-level smells (God Class, type-conditional dispatch). The next layer is **design principles** — the rules of thumb that make smells less likely to appear in the first place. Two suggested follow-ups:

      - **[SOLID design principles tutorial](/SEBook/tools/solid-tutorial)** — single-responsibility, open/closed, Liskov substitution, interface segregation, dependency inversion. The vocabulary the smells in this tutorial implicitly invoked.
      - **[Observer pattern tutorial](/SEBook/designpatterns/observer-tutorial)** — one of many design patterns; an example of how design principles solidify into reusable structural recipes.

    files:
      - path: "playlist.py"
        content: |
          """The playlist manager — multiple smells stacked together."""
          from typing import Dict, List


          class PlaylistManager:
              def __init__(self) -> None:
                  self.playlist: List[Dict] = []
                  self.queue: List[Dict] = []

              def add_to_playlist(
                  self,
                  title: str,
                  artist: str,
                  album: str,
                  year: int,
                  genre: str,
                  duration_sec: int,
                  bpm: int,
                  isrc: str,
              ) -> Dict:
                  # Validation
                  if not title or not isinstance(title, str):
                      raise ValueError("title is required")
                  if duration_sec <= 0:
                      raise ValueError("duration_sec must be positive")
                  if bpm <= 0:
                      raise ValueError("bpm must be positive")

                  # Deduplication
                  for existing in self.playlist:
                      if existing["isrc"] == isrc:
                          return existing

                  # Persistence
                  record: Dict = {
                      "title": title, "artist": artist, "album": album,
                      "year": year, "genre": genre, "duration_sec": duration_sec,
                      "bpm": bpm, "isrc": isrc,
                  }
                  self.playlist.append(record)
                  return record

              def add_to_queue(
                  self,
                  title: str,
                  artist: str,
                  album: str,
                  year: int,
                  genre: str,
                  duration_sec: int,
                  bpm: int,
                  isrc: str,
              ) -> Dict:
                  # Validation (DUPLICATED from add_to_playlist)
                  if not title or not isinstance(title, str):
                      raise ValueError("title is required")
                  if duration_sec <= 0:
                      raise ValueError("duration_sec must be positive")
                  if bpm <= 0:
                      raise ValueError("bpm must be positive")

                  record: Dict = {
                      "title": title, "artist": artist, "album": album,
                      "year": year, "genre": genre, "duration_sec": duration_sec,
                      "bpm": bpm, "isrc": isrc,
                  }
                  self.queue.append(record)
                  return record
        language: "python"

      - path: "importer.py"
        content: |
          """Bulk-imports tracks into a PlaylistManager.

          If the chosen refactoring is Option A (Introduce Parameter Object), every
          call site here will need to pass a `TrackInfo` instead of four flat album
          fields — exactly the same kind of cost you paid in Step 5 with `AlbumInfo`.
          If the chosen refactoring is Option B (Extract Function on validation),
          the call shape here stays the same and only `playlist.py` changes.

          Tests in `test_playlist.py` go entirely through `TrackImporter`'s
          `import_to_playlist` and `import_to_queue` methods. Their signatures are
          stable across either option.
          """
          from typing import Any, Dict, List
          from playlist import PlaylistManager


          class TrackImporter:
              """Bulk-imports a list of track records into a playlist or queue."""

              def __init__(self, manager: PlaylistManager) -> None:
                  self.manager: PlaylistManager = manager

              def import_to_playlist(self, tracks: List[Dict[str, Any]]) -> List[Dict]:
                  """Add each record to the underlying playlist; return the inserted records."""
                  return [self._add_to_playlist_one(t) for t in tracks]

              def import_to_queue(self, tracks: List[Dict[str, Any]]) -> List[Dict]:
                  """Add each record to the underlying queue; return the inserted records."""
                  return [self._add_to_queue_one(t) for t in tracks]

              # ---- Internal call sites: these may need to change after the refactor ----

              def _add_to_playlist_one(self, t: Dict[str, Any]) -> Dict:
                  return self.manager.add_to_playlist(
                      title=t["title"],
                      artist=t["artist"],
                      album=t["album"],
                      year=t["year"],
                      genre=t["genre"],
                      duration_sec=t["duration_sec"],
                      bpm=t["bpm"],
                      isrc=t["isrc"],
                  )

              def _add_to_queue_one(self, t: Dict[str, Any]) -> Dict:
                  return self.manager.add_to_queue(
                      title=t["title"],
                      artist=t["artist"],
                      album=t["album"],
                      year=t["year"],
                      genre=t["genre"],
                      duration_sec=t["duration_sec"],
                      bpm=t["bpm"],
                      isrc=t["isrc"],
                  )
