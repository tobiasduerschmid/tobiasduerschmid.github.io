          import re
          memo = open('/tutorial/memo.md').read()
          # Stop section parsing at the next ## OR at the --- separator that
          # introduces the reference card. Strip multi-line HTML comments
          # before checking content.
          for section in ('Issue', 'Rationale', 'Invariant', 'Tests'):
              m = re.search(rf'## {section}\s*\n(.*?)(?=\n##|\n---|\Z)', memo, re.S)
              assert m, f"Memo is missing the ## {section} section"
              stripped = re.sub(r'<!--.*?-->', '', m.group(1), flags=re.S)
              assert stripped.strip(), \
                  f"Fill in the {section} field — the memo is the deliverable for this step."

      - description: "Refactoring applied: at least one of the two valid options"
        command: |
          import ast
          tree = ast.parse(open('/tutorial/playlist.py').read())
          classes = {n.name: n for n in tree.body if isinstance(n, ast.ClassDef)}
          assert 'PlaylistManager' in classes, "PlaylistManager must remain"
          methods = {m.name: m for m in classes['PlaylistManager'].body if isinstance(m, ast.FunctionDef)}

          # Option A: a parameter-object class (TrackInfo or similar) exists at module level.
          # Accept any name that isn't PlaylistManager and is decorated with @dataclass
          # OR has at least 3 annotated fields.
          def _is_param_object(cls: ast.ClassDef) -> bool:
              if cls.name == 'PlaylistManager':
                  return False
              has_dataclass = any(
                  (isinstance(d, ast.Name) and d.id == 'dataclass') or
                  (isinstance(d, ast.Attribute) and d.attr == 'dataclass') or
                  (isinstance(d, ast.Call)
                   and ((isinstance(d.func, ast.Name) and d.func.id == 'dataclass')
                        or (isinstance(d.func, ast.Attribute) and d.func.attr == 'dataclass')))
                  for d in (cls.decorator_list or [])
              )
              n_annotated = sum(
                  1 for s in cls.body
                  if isinstance(s, ast.AnnAssign) and isinstance(s.target, ast.Name)
              )
              return has_dataclass or n_annotated >= 3

          option_a = any(_is_param_object(n) for n in tree.body if isinstance(n, ast.ClassDef))

          # Option B: a validation helper exists that performs at least one of the three
          # documented checks (title / duration_sec / bpm) AND signals failure via either
          # `raise` or `assert`. Accept any helper name.
          def _has_validation(method: ast.FunctionDef) -> bool:
              # Walk the body; require a Raise OR Assert node, AND at least one
              # reference to one of the validated field names.
              has_raise_or_assert = False
              has_field_ref = False
              for node in ast.walk(method):
                  if isinstance(node, (ast.Raise, ast.Assert)):
                      has_raise_or_assert = True
                  if isinstance(node, ast.Name) and node.id in ('title', 'duration_sec', 'bpm'):
                      has_field_ref = True
              return has_raise_or_assert and has_field_ref

          option_b = False
          for name, m in methods.items():
              if name in ('__init__', 'add_to_playlist', 'add_to_queue'):
                  continue
              if _has_validation(m):
                  option_b = True
                  break

          assert option_a or option_b, (
              "Apply at least ONE refactoring. "
              "Option A: introduce a parameter-object dataclass (e.g., TrackInfo) bundling the album fields. "
              "Option B: extract a validation helper method that raises (or asserts) on bad input."
          )

      - description: "Behavior preserved: pytest passes"
