          def section_content(memo: str, name: str) -> str:
              m = re.search(rf'## {name}\s*\n(.*?)(?=\n##|\Z)', memo, re.S)
              assert m, f"Memo is missing the ## {name} section"
              raw = m.group(1)
              stripped = re.sub(r'<!--.*?-->', '', raw, flags=re.S)
              return stripped.strip()
