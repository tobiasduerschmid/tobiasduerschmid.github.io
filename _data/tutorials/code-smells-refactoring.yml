            condition: "code_missing: def _apply_filter"

      - description: "Both public filter methods delegate to a helper (instead of duplicating the body)"
        command: |
          import ast
          tree = ast.parse(open('/tutorial/filters.py').read())
          classes = {n.name: n for n in tree.body if isinstance(n, ast.ClassDef)}
          methods = {m.name: m for m in classes['MusicLibrary'].body if isinstance(m, ast.FunctionDef)}
          # The set of method names that count as "originals" (NOT helpers).
          ORIGINALS = {'apply_genre_filter', 'apply_artist_filter', '__init__'}
          for name in ('apply_genre_filter', 'apply_artist_filter'):
              assert name in methods, f"{name} must remain a method of MusicLibrary"
              fn = methods[name]
              # Delegation = at least one Call node of the form `self.<some_helper>(...)`
              # where <some_helper> is NOT one of the originals. This works regardless
              # of what the student named the helper.
              delegates = False
              for node in ast.walk(fn):
                  if not isinstance(node, ast.Call):
                      continue
                  func = node.func
                  if (isinstance(func, ast.Attribute)
                      and isinstance(func.value, ast.Name)
                      and func.value.id == 'self'
                      and func.attr not in ORIGINALS):
                      delegates = True
                      break
              assert delegates, (
                  f"{name} should delegate to a helper method via `self.<helper>(...)` "
                  f"instead of duplicating the filter/sort/paginate body. "
                  f"You can name the helper whatever you like."
              )
              # Also assert the body is short — a delegating method shouldn't have
              # the full original implementation hanging around.
              # Skip docstring before counting.
              body = list(fn.body)
              if (body and isinstance(body[0], ast.Expr)
                  and isinstance(body[0].value, ast.Constant)
                  and isinstance(body[0].value.value, str)):
                  body = body[1:]
              assert len(body) <= 2, (
                  f"{name} still has {len(body)} statements after the docstring — "
                  f"a delegating method should be one or two lines (just the call/return)."
              )
