            **Three smells stacked: Long Parameter List + Long Method + Duplicated Code.** Recognizing them simultaneously is the synthesis skill. Each previous step taught one in isolation; here they coexist.

        - question: |
            **Interleaved warmup retrieval.** Snippet A (the `shuffle_score` function with `if mood == "energetic" and weather == "sunny"` branches) most resembles which smell from this tutorial?
          type: single
          options:
            - "Long Method (Step 2)"
            - "Boolean anti-pattern (Step 3)"
            - "Long Parameter List (Step 5)"
            - "Type-conditional dispatch — Replace Conditional with Polymorphism (Step 8)"
          correct_index: 3
          option_feedback:
            0: "Long Method is the secondary smell, but the dominant pattern is the conditional dispatch — multiple branches choosing behavior."
            1: "The if/and/elif structure isn't simplifiable to a boolean return — the branches do different *things*, not just return different booleans."
            2: "Six parameters is borderline-long but not the dominant smell. The dominant pattern is the dispatch."
          explanation: |
            **Type-conditional dispatch.** When `if mood == "X"` chooses behavior, you have a polymorphism candidate. Each mood/weather pair is dispatching to different scoring logic — same shape as the `track_kind` example in Step 8.

        - question: |
            **Interleaved warmup retrieval.** Snippet B (`update_metadata` with seven parameters that travel together) most resembles which smell?
          type: single
          options:
            - "Long Parameter List + data clump (Step 5)"
            - "Feature Envy (Step 6)"
            - "Long Method (Step 2)"
            - "Speculative Generality (Step 9)"
          correct_index: 0
          option_feedback:
            1: "Feature Envy would require the method to use only foreign data. update_metadata uses both `track` (foreign) and the parameters; it's the parameters' shape that's the smell, not the method's location."
            2: "The method is short — it's just assignments. Length isn't the issue."
            3: "Speculative generality is about unused abstractions. Here the abstraction is missing entirely."
          explanation: |
            **Long Parameter List with a data clump.** Six of the seven parameters describe album metadata — they always travel together. The fix is Introduce Parameter Object.

        - question: |
            **Interleaved warmup retrieval.** Snippet D (`is_hi_res` with `if track.bitrate >= 1411: return True else: return False`) most resembles which smell?
          type: single
          options:
            - "Long Method"
            - "Boolean-return anti-pattern (Step 3)"
            - "Feature Envy (Step 6)"
            - "Long Parameter List"
          correct_index: 1
          option_feedback:
            0: "Three lines isn't long."
            2: "Feature Envy *might* be relevant — `is_hi_res` uses only `track` data — but the dominant smell here is the boolean wrapping."
            3: "One parameter isn't long."
          explanation: |
            **Classic boolean-return anti-pattern.** The condition is already a boolean; wrapping it in if/else with `return True / return False` adds nothing. Simplify to `return track.bitrate >= 1411`. (And maybe also Move Method onto Track, but that's secondary — Snippet D's *primary* smell is boolean.)

        - question: |
            **Snippet C (Statistics class) retrieval.** `Statistics.avg_track_length(tracks)` uses zero `Statistics` state — it iterates over the parameter `tracks` and computes a sum. Which earlier-step smell does this most resemble?
          type: single
          options:
            - "Long Method (Step 2)"
            - "Long Parameter List (Step 5)"
            - "Feature Envy (Step 6)"
            - "God Class (Step 7)"
          correct_index: 2
          option_feedback:
            0: "The body is short — three lines of computation. Length isn't the issue."
            1: "One parameter — the opposite of long parameter list."
            3: "A class with one method isn't a God Class; it's the opposite (small, focused, possibly Lazy)."
          explanation: |
            **Feature Envy.** The method uses zero state of its host (`Statistics`) and only data from the parameter `tracks`. Step 6's diagnostic — "uses zero host state" — fires cleanly here. The likely fix is Move Method onto whichever class owns the track collection.

        - question: |
            **Snippet E (the foil) — discrimination check.** Two near-identical processor classes (`StripeProcessor`, `PayPalProcessor`) with the same `charge` signature and similar body. Should you extract a common base class or apply Replace Conditional with Polymorphism?
          type: single
          options:
            - "Yes — duplicated code is always a smell"
            - "Yes — the Open/Closed Principle requires polymorphism here"
            - "Probably not — each processor likely has different SDK/error/config concerns the visual similarity hides"
            - "Yes — this is exactly the case Step 8 trained for"
          correct_index: 2
          option_feedback:
            0: "Visual similarity isn't bug-coupling. Step 1's currency-rounding non-example showed the same pattern: three look-alike functions with independent domain rules. Extract only when the variation is one stable dimension and a real change forces lockstep edits in both copies."
            1: "Open/Closed says be open to extension; it doesn't require *every* type-similar pair to share a base class. If the processors evolve independently, a shared base is over-coupling, not abstraction."
            3: "Step 8 trained for cases where each branch reads/writes *different* fields and the dispatch on a string-typed `kind` is the smell. Two classes that already exist, with their own state and SDK, aren't the same shape."
          explanation: |
            **Variation Theory in action.** "Looks duplicated" can mean three different things: (1) actual duplication that should be extracted; (2) visual similarity over independent domain rules (currency rounding from Step 1); or (3) parallel infrastructure with hidden differences (this snippet). Discriminating between them is the judgment Step 9's hotspot/Boy-Scout framing was for. **When in doubt, wait for the third occurrence and a real bug-coupling signal before extracting.**

        - question: |
            **Step 1 callback — fix-then-refactor.** During the synthesis you spot a bug in one of the duplicated validation blocks of `playlist.py`. What's the right discipline?
          type: single
          options:
            - "Refactor first to extract the validation; the helper now needs only one fix"
            - "Fix the bug in both duplicated locations first; then refactor to extract"
            - "Fix one location and leave the other; it's about to be deleted by the refactor anyway"
            - "Run the tests; if they pass, the bug isn't real"
          correct_index: 1
          option_feedback:
            0: "Extracting *with the bug intact* consolidates the bug into the helper — same bug, harder-to-spot location. The helper now contains corrupt logic that future readers will trust."
            2: "Tempting reasoning, but the moment between 'one fix done, refactor in progress' and 'refactor complete' is exactly when a teammate might pull the branch and run the buggy duplicate."
            3: "Passing tests don't mean the bug isn't real — they mean the bug isn't in the test cases yet. Step 1's lesson was that test coverage and bug presence are independent."
          explanation: |
            **Fix-then-refactor.** Step 1's load-bearing rule generalizes across the entire toolkit: never refactor over a known bug. Fix in each location with green tests, then consolidate. This sequencing is one of the strongest rules in the discipline.

        - question: |
            **Memo synthesis.** Why is the memo important — couldn't you just refactor and let the diff speak for itself?
          type: single
          options:
            - "The memo is required for the assessment in this tutorial"
            - "The memo captures the *reasoning* behind the change, which the diff alone cannot show"
            - "Without the memo, the tool refuses to apply the refactoring"
            - "Memos are a CS convention; every PR must include one"
          correct_index: 1
          option_feedback:
            0: "True for this step, but it's not the deeper reason. The memo is also valuable in industry settings — code reviewers, future maintainers, and a future self all benefit."
            2: "The tool doesn't read memos. The memo is for humans."
            3: "Memo conventions vary by team. The discipline of *naming the invariant* is what generalizes."
          explanation: |
            **The memo answers questions a diff can't.** What smell? Why this refactoring? What invariant? Which tests confirm? A reviewer reading the diff sees *what* changed; the memo tells them *why* the change is correct. That's the difference between a reviewable refactor and a trust-me one.
