          User = ns['User']
          for klass_name, kwargs, expected in [
              ('Song',      dict(track_id='s', duration_sec=1),                     'playing song'),
              ('Podcast',   dict(track_id='p', duration_sec=1, last_position=0),    'resuming podcast'),
              ('Audiobook', dict(track_id='a', duration_sec=1, playback_speed=1.0), 'playing audiobook'),
          ]:
              klass = ns[klass_name]
              try:
                  instance = klass(**kwargs)
              except TypeError as e:
                  raise AssertionError(
                      f"{klass_name} cannot be instantiated — its play() method may be missing. "
                      f"Original error: {e}"
                  )
              result = instance.play(User('u1'))
              assert isinstance(result, str), f"{klass_name}.play(user) must return a string"
              assert expected in result, \
                  f"{klass_name}.play(user) should mention '{expected}' but returned {result!r}"

