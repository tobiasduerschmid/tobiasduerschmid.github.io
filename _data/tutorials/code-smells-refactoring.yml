      - description: "Each subclass implements play() with non-stub body"
        command: |
          import ast
          tree = ast.parse(open('/tutorial/tracks.py').read())
          classes = {n.name: n for n in tree.body if isinstance(n, ast.ClassDef)}

          def _is_stub_body(body: list) -> bool:
              """A body is a stub if, after stripping a leading docstring, what
              remains is empty, just `pass`, or just `...` — none of these
              actually do any work."""
              stmts = list(body)
              # Strip a leading docstring.
              if (stmts and isinstance(stmts[0], ast.Expr)
                  and isinstance(stmts[0].value, ast.Constant)
                  and isinstance(stmts[0].value.value, str)):
                  stmts = stmts[1:]
              if not stmts:
                  return True  # docstring only
              if len(stmts) == 1:
                  s = stmts[0]
                  if isinstance(s, ast.Pass):
                      return True
                  if (isinstance(s, ast.Expr) and isinstance(s.value, ast.Constant)
                      and s.value.value is Ellipsis):
                      return True
                  # `return None` (explicit) or `return` (implicit None) is also a stub.
                  if isinstance(s, ast.Return):
                      v = s.value
                      if v is None:
                          return True
                      if isinstance(v, ast.Constant) and v.value is None:
                          return True
              return False

          for sub in ('Song', 'Podcast', 'Audiobook'):
              methods = {m.name: m for m in classes[sub].body if isinstance(m, ast.FunctionDef)}
              assert 'play' in methods, f"{sub} needs a play() method"
              assert not _is_stub_body(methods['play'].body), \
                  f"{sub}.play() must have a real body — `pass`, `...`, `return None`, or " \
                  f"a docstring-only body don't implement the contract."

      - description: "Original if/elif over track_kind is gone"
        command: |
          import ast
          tree = ast.parse(open('/tutorial/tracks.py').read())
          # Walk for any If whose test compares track_kind == "song" / "podcast" / "audiobook".
          bad = []
          for node in ast.walk(tree):
              if isinstance(node, ast.Compare) and len(node.ops) == 1 and isinstance(node.ops[0], ast.Eq):
                  if (isinstance(node.left, ast.Name) and node.left.id == 'track_kind'
                      and len(node.comparators) == 1 and isinstance(node.comparators[0], ast.Constant)
                      and node.comparators[0].value in ('song', 'podcast', 'audiobook')):
                      bad.append(node.comparators[0].value)
          assert not bad, \
              f"Found leftover `track_kind == {bad[0]!r}` comparison(s). Replace the conditional with `track.play(user)`."

