    quiz:
      title: "Step 3 — Boolean Anti-Patterns"
      min_score: 0.7
      shuffle: true
      questions:

        - question: |
            **Retrieval / prediction.** In a truth table over `(is_logged_in, is_offline)`, which row does the naive `if is_logged_in and not is_offline` collapse get **wrong**?
          type: single
          options:
            - "(False, False)"
            - "(False, True)"
            - "(True, False)"
            - "(True, True)"
          correct_index: 3
          option_feedback:
            0: "(False, False) returns 'error_login_required' in both the original and the naive version — the outer `if not is_logged_in` guard handles it identically."
            1: "(False, True) is also handled identically — when `is_logged_in` is False, both versions return 'error_login_required' regardless of `is_offline`."
            2: "(True, False) returns 'stream' in both versions. This is the happy-path row — and the only one a single-test suite would check."
          explanation: |
            **(True, True) is the IfsMerged row.** Original code returns `"play_cached"`; the naive `if A and not B` collapse returns `"error_login_required"`. The bug is invisible to any test that doesn't include this exact input. Truth-table tests are not optional for boolean logic — they're load-bearing.

        - question: |
            Which of the following is the **simplest correct** simplification of `if cond: return True else: return False`?
          type: single
          options:
            - "`return cond is True`"
            - "`return bool(cond)`"
            - "`return cond`"
            - "`if cond: return True; return False`"
          correct_index: 2
          option_feedback:
            0: "`is True` checks identity, not truthiness. For a comparison like `x <= 0`, identity-comparison can fail surprisingly when the result is a numpy bool or similar non-True-singleton."
            1: "`bool(cond)` is correct but redundant when `cond` is already a comparison — comparisons return `bool`. It's useful only when the input might be non-boolean (a list, an int) and explicit coercion is desired."
            3: "Removing the `else` keeps the same anti-pattern. The redundancy is the if/else *plus* the True/False literals, not just the else."
          explanation: |
            **The condition IS the answer.** Comparisons (`<=`, `==`, `in`, etc.) already return booleans. Wrapping them in `if/return True/return False` adds no information.

        - question: |
            You see this code:
            ```python
            if is_active:
                process()
            if not is_active:
                skip()
            ```
            What's the smell, and what's the fix?
          type: single
          options:
            - "Speculative generality — fix is to inline the helpers"
            - "Confusing else — fix is to use a single if/else"
            - "Long Method — fix is Extract Function"
            - "There's no smell; this is fine because the conditions are exclusive"
          correct_index: 1
          option_feedback:
            0: "Speculative generality is about unused abstractions, not about conditional structure."
            2: "These four lines are too short to be a Long Method. The smell is in the *shape* of the conditional, not the length."
            3: "Logically the conditions are exclusive, but the structure invites two separate evaluations of `is_active` — and silently breaks if a third branch is later added (e.g., `is_active is None`). The if/else makes the exclusivity explicit and atomic."
          explanation: |
            **Confusing else** is the official name (cf. anti-patterns catalogs). Two `if`s with mutually-exclusive conditions are an `if/else` in disguise. The fix removes the duplicate condition evaluation and makes the structure more change-resistant.

        - question: |
            Which of these is the safest way to verify a boolean refactoring?
          type: single
          options:
            - "Run the existing happy-path test once"
            - "Add one new test for the simplified version"
            - "Run a parametrize table covering all input combinations"
            - "Manually inspect the diff for syntactic similarity"
          correct_index: 2
          option_feedback:
            0: "Happy-path tests pass on naive simplifications that drop branches — the IfsMerged trap demonstrates this exactly."
            1: "Adding one test catches one bug (if it happens to test the right input). Adding a *full table* catches every behavior change."
            3: "Syntactic similarity is not behavioral equivalence. The IfsMerged collapse looks similar to the original but evaluates differently on one of four rows."
          explanation: |
            For boolean code, a **truth-table parametrize** is the only sound oracle. Two-input booleans need 4 rows; three-input need 8; n-input need 2^n. If the table has fewer rows than the input space, the verification is incomplete.


