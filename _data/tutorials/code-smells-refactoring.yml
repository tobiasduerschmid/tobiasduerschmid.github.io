        command: |
          import ast
          tree = ast.parse(open('/tutorial/streaming_app.py').read())
          classes = {n.name: n for n in tree.body if isinstance(n, ast.ClassDef)}

          def _instance_attributes(cls: ast.ClassDef) -> set:
              """Collect instance attribute names declared on a class.
              Supports three idiomatic forms:
                (a) `self.X = ...` inside __init__       (plain class)
                (b) `X: T` at class level                (dataclass / annotated)
                (c) `X = ...` at class level             (default-valued, no annotation)
              """
              attrs = set()
              # Form (b) and (c): class-level annotations / assignments
              for stmt in cls.body:
                  if isinstance(stmt, ast.AnnAssign) and isinstance(stmt.target, ast.Name):
                      attrs.add(stmt.target.id)
                  elif isinstance(stmt, ast.Assign):
                      for tgt in stmt.targets:
                          if isinstance(tgt, ast.Name):
                              attrs.add(tgt.id)
              # Form (a): self.X = ... inside __init__
              init = next((m for m in cls.body
                           if isinstance(m, ast.FunctionDef) and m.name == '__init__'), None)
              if init is not None:
                  for node in ast.walk(init):
                      if (isinstance(node, ast.Assign)):
                          for tgt in node.targets:
                              if (isinstance(tgt, ast.Attribute)
                                  and isinstance(tgt.value, ast.Name)
                                  and tgt.value.id == 'self'):
                                  attrs.add(tgt.attr)
                      elif (isinstance(node, ast.AnnAssign)
                            and isinstance(node.target, ast.Attribute)
                            and isinstance(node.target.value, ast.Name)
                            and node.target.value.id == 'self'):
                          attrs.add(node.target.attr)
              return attrs

          billing_attrs = _instance_attributes(classes['BillingManager'])
          for required in ('subscription_tier', 'payment_method', 'invoice_list'):
              assert required in billing_attrs, \
                  f"BillingManager must declare a `{required}` attribute (via self.{required} = ... in __init__, " \
                  f"a class-level annotation `{required}: T = ...`, or a @dataclass field)."

          app_attrs = _instance_attributes(classes['StreamingApp'])
          for moved in ('subscription_tier', 'payment_method', 'invoice_list'):
              assert moved not in app_attrs, \
                  f"self.{moved} should be on BillingManager, not StreamingApp."
