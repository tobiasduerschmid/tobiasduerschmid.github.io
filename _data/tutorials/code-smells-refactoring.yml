    quiz:
      title: "Step 6 — Feature Envy"
      min_score: 0.7
      shuffle: true
      questions:

        - question: |
            **Prediction (before reading the body).** `Player.compute_remaining_seconds(track)` returns a number of seconds. Without reading the body, which class is most likely to be the right home for this method?
          type: single
          options:
            - "Player — the method already lives there"
            - "Track — methods that compute properties of a track usually belong on Track"
            - "User — playback decisions ultimately serve a user"
            - "It depends on the body; you can't predict from the name"
          correct_index: 1
          option_feedback:
            0: "Existing location is the *least* trustworthy heuristic — it shows where the method has been, not where it should be. Feature Envy is the smell of methods being in the wrong place."
            2: "User-level decisions belong on User-level methods. Computing remaining seconds of a Track is at the Track level."
            3: "Method *names* are usually a strong signal. `compute_remaining_seconds` of a track is a property of the track. Read the body to confirm, but the name pre-commits."
          explanation: |
            **The noun is the receiver.** A method named "compute X of Y" is usually a method on Y. Reading the body confirms — uses zero `Player` state, all `Track` state. Move Method.

        - question: |
            What's the rule that diagnoses Feature Envy?
          type: single
          options:
            - "The method is more than 10 lines long"
            - "The method uses zero state of its host class (only foreign state)"
            - "The method has too many parameters"
            - "The method's name doesn't match its containing class"
          correct_index: 1
          option_feedback:
            0: "Length is a different smell (Long Method). Feature Envy can affect very short methods."
            2: "Parameter count is the Long Parameter List smell. Feature Envy is independent of parameter count."
            3: "Name mismatch is a heuristic but not the diagnostic. The diagnostic is *body inspection* — what state does the body actually touch?"
          explanation: |
            **"Uses zero state of host class"** is the precise diagnostic. A method that doesn't touch `self` (other than to read it) is suspicious; a method that touches `self` only to delegate to another object is suspicious; a method that uses *only* foreign state is unambiguously Feature Envy.

        - question: |
            **Step 3 callback.** Why simplify `is_finished` from `if cond: return True else: return False` to `return cond`?
          type: single
          options:
            - "Because it makes the file shorter"
            - "Because the if/else around a comparison adds no information beyond the comparison itself"
            - "Because Python's bytecode runs faster on `return cond`"
            - "Because the original form is a syntax error in newer Python versions"
          correct_index: 1
          option_feedback:
            0: "Shorter for its own sake isn't a goal. The simplification removes *redundant cognitive structure*, not lines."
            2: "Bytecode performance is roughly identical. The reason to simplify is readability, not speed."
            3: "The original form is valid Python at every version. It's just bad style."
          explanation: |
            The condition (`self.current_position >= self.duration_sec`) is already a `bool`. Wrapping it in if/else with literal `True` and `False` returns is pure ceremony — same anti-pattern from Step 3, now in a method context.

        - question: |
            Could you instead **move the data** (`Track`'s fields) into `Player`, leaving the method where it is?
          type: single
          options:
            - "Yes — moving data to the method is symmetric to moving the method to the data"
            - "Yes — but only if Track has no other methods that use those fields"
            - "No — Track has many other methods that use duration_sec and current_position; moving the data scatters them"
            - "No — Python's class system doesn't allow moving fields between classes"
          correct_index: 2
          option_feedback:
            0: "Logically symmetric, practically not. Data tends to have many users; methods tend to have few. Moving data breaks more code."
            1: "Even *if* Track had no other users right now, designing for the move would create future-coupling that's hard to undo. Move the method, not the data."
            3: "Fields can be moved technically. The reason not to is structural, not syntactic."
          explanation: |
            **Methods are easier to move than data.** A method has one home and a few callers; a field tends to have many readers and writers. Moving fields shotgun-surgeries the codebase. Moving methods tightens it.

        - question: |
            **Variation Theory — non-example.** A `Catalog.build_default_track()` method on a `Catalog` class uses no `self` state and only returns a new `Track` from a few constants. Is this Feature Envy?
          type: single
          options:
            - "Yes — it uses no Catalog state, so it should be moved to Track"
            - "No — factory methods that don't use host state but synthesize new objects belong on the class that exposes the API"
            - "Yes — and the fix is to delete the method since it does nothing"
            - "Only if the method takes any parameters"
          correct_index: 1
          option_feedback:
            0: "The diagnostic is necessary but not sufficient. A method that uses zero host state is a *candidate* for Feature Envy, but factories, validators, and pure-rule synthesizers can legitimately live on the class that exposes them as API."
            2: "The method does plenty — it produces a Track. It's a factory, not dead code."
            3: "Parameter count is unrelated. Factories with parameters, factories with none — both can legitimately live on the calling class."
          explanation: |
            **The diagnostic catches Feature Envy candidates, but judgment decides.** "Uses zero host state" makes a method *a candidate for Move Method*, not *a guaranteed instance of the smell*. Factories, default constructors, and pure-policy synthesizers live where the API surface is, not where the data is.

        - question: |
            **Variation Theory — Feature Envy vs Inappropriate Intimacy.** `Player.adjust_for_track(track)` reads several `track` fields *and* writes `track.last_play_volume`. `Track.adjust_for_player(player)` reads `player.volume` *and* writes `player.eq_preset`. What's the smell, and what's the right fix?
          type: single
          options:
            - "Feature Envy on both sides — apply Move Method twice"
            - "Inappropriate Intimacy — Move Method just relocates the problem; the fix is structural (mediating object, or merge if they're really one concept)"
            - "Neither — mutual writes between domain objects are normal in OO design"
            - "Long Parameter List — introduce a `PlaybackContext` parameter object"
          correct_index: 1
          option_feedback:
            0: "Move Method is the fix for *one-sided* envy. With two-sided coupling, moving each method to the other class produces *two* envious methods on swapped homes. The smell isn't where the methods live — it's that two classes know each other's internals."
            2: "Tightly coupled mutual writes are a maintenance hazard: every change to one class can ripple into the other unpredictably. OO designs that survive long-term keep cross-class writes thin and explicit."
            3: "Parameter clumps are a different smell. Here the issue isn't the call shape; it's that the bodies of both methods reach across the class boundary in opposite directions."
          explanation: |
            **One arrow vs two.** Feature Envy is one-sided — a method on the wrong class. Move Method fixes it. Inappropriate Intimacy has arrows in *both* directions — moving one method just makes the other class envious. The structural fix is different: introduce a mediator that owns the cross-cutting logic, or, when the two classes are really one concept, merge them. Diagnose before you reach for the tool.

        - question: |
            **Mid-tutorial mix — Step 1 callback.** You've just discovered that two functions have the same arithmetic bug. According to what you practiced in Step 1, what's the correct order of operations?
          type: single
          options:
            - "Refactor first to remove the duplication, then fix the bug in the helper"
            - "Fix the bug in both places, then refactor to remove the duplication"
            - "Fix in one place; the second one isn't actually called"
            - "Run the tests; if they pass, the duplication isn't a problem"
          correct_index: 1
          option_feedback:
            0: "Fix-then-refactor. Extracting *with the bug intact* would consolidate the bug into the helper — same bug, harder-to-spot location."
            2: "If a duplicate is genuinely uncalled, that's *dead code*, a different smell. The Step 1 lesson assumes both copies are reachable."
            3: "Running tests is the right discipline, but passing tests don't mean the duplication isn't a maintenance cost. The bug count *will* equal the duplicate count when the next bug arrives."
          explanation: |
            **Fix-then-refactor.** The Step 1 lesson generalizes: never refactor over a known bug. Fix in each location with green tests, *then* consolidate. This is the highest-leverage sequencing rule in the toolkit.

        - question: |
            **Mid-tutorial mix — Step 4 callback.** Two near-duplicate functions were just written this morning. The third occurrence isn't on the roadmap. The variation between the two copies is **subtle** — you'd have to study them to be sure what's common. What does the **Rule of Three** suggest as the *default*?
          type: single
          options:
            - "Extract immediately — duplication is always a smell"
            - "Wait for the third occurrence — when variation isn't obvious, the third copy reveals what's truly common"
            - "Refuse to extract until tests are added for both copies"
            - "Extract only if the two functions live in the same file"
          correct_index: 1
          option_feedback:
            0: "Eager extraction at two duplicates is a real pattern, but it backfires when the third occurrence reveals a different variation than the first two implied (the wrong-abstraction trap). Step 4 noted that the *default* is to wait."
            2: "Tests-first is correct discipline before *any* refactor, but it's not what Rule of Three says. Rule of Three is about the third *occurrence*, not the third *test*."
            3: "Co-location is unrelated to Rule of Three."
          explanation: |
            **The Rule of Three is the *default*, not an absolute.** Step 4 made the nuance explicit: when the variation is *obvious and stable* (like a predicate), extracting at two duplicates is fine. When the variation is subtle (this question's setup), the rule's default — wait for three — saves you from a wrong-abstraction trap.


