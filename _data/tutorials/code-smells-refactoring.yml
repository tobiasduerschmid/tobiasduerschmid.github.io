    quiz:
      title: "Step 8 — Replace Conditional with Polymorphism"
      min_score: 0.7
      shuffle: true
      questions:

        - question: |
            **Retrieval / dispatch.** When `play(user)` is called on a `Podcast` instance, **which** method runs?
          type: single
          options:
            - "Track.play (the abstract base method)"
            - "Podcast.play (the override)"
            - "Both — Track.play runs first, then Podcast.play"
            - "Neither — abstract methods raise NotImplementedError"
          correct_index: 1
          option_feedback:
            0: "The abstract method's body never runs — it's a contract, not an implementation. Subclasses must override; the override is what runs."
            2: "MRO doesn't 'chain' calls. Without an explicit `super().play(user)` in the override, only the override runs."
            3: "Abstract methods raise `TypeError` at *instantiation*, not `NotImplementedError` at call. And only if no override exists."
          explanation: |
            **The override runs.** `Podcast.play` overrides `Track.play`, so the dynamic dispatch from `track.play(user)` resolves to `Podcast.play`. This is the same mechanism C++ calls "virtual"; Python's methods are virtual by default.

        - question: |
            Is polymorphism **always** the right fix for `if/elif` chains over a type field?
          type: single
          options:
            - "Yes — type-conditionals are always a smell"
            - "No — for a small closed set of types with no shared state, a `match` statement is simpler"
            - "Yes — Python's match statement is just syntactic sugar for polymorphism"
            - "Only if the conditional is more than 5 branches long"
          correct_index: 1
          option_feedback:
            0: "Always-rules in design are usually wrong. Type-conditionals over closed, stable, stateless type sets (e.g., HTTP status code categories: informational/success/redirect/error) are fine as `match`."
            2: "`match` and polymorphism are different mechanisms. `match` is structural pattern matching at the call site; polymorphism is dynamic dispatch via inheritance. They have different change-locality properties."
            3: "Length is a heuristic, not a rule. Three branches that each carry state can be polymorphism; ten branches that each return one value can be `match`."
          explanation: |
            **It depends on extension and state.** Polymorphism wins when the type set will grow and each type carries its own state. `match` wins when the type set is closed and the branches are pure dispatch. Both can be valid; choose based on the change vector.

        - question: |
            What does `@abstractmethod` actually *enforce*?
          type: single
          options:
            - "Subclasses MUST override it; trying to instantiate a subclass that doesn't raises TypeError"
            - "The method body must be empty"
            - "Subclasses cannot call super() on an abstract method"
            - "The method can only be called via the abstract base class"
          correct_index: 0
          option_feedback:
            1: "The body can have any content (often a docstring or `...`). The body is sometimes used as a default implementation called from a subclass via `super()`."
            2: "Subclasses *can* call `super().method()` on an abstract method to access a default implementation, if the abstract base provided one."
            3: "Once a subclass overrides the abstract method, calling on the subclass instance dispatches normally."
          explanation: |
            **Enforcement is at instantiation.** `@abstractmethod` makes the abstract base un-instantiable; subclasses without all required overrides are *also* un-instantiable. The error message names the missing methods, which is far better than discovering at call time that the method does nothing.

        - question: |
            **Spacing back to Step 6.** Why is moving each conditional branch into its corresponding subclass a special case of **Move Method**?
          type: single
          options:
            - "It's not — polymorphism is a different refactoring entirely"
            - "Each branch uses only data of one kind of track — Feature Envy on the subclass"
            - "Move Method requires concrete classes; abstract subclasses don't qualify"
            - "Polymorphism is a structural change; Move Method is a behavioral change"
          correct_index: 1
          option_feedback:
            0: "It is the same shape: a method body that uses only foreign data is moved closer to that data. Polymorphism just generalizes 'foreign class' to 'subtype.'"
            2: "Move Method works fine across an inheritance hierarchy. The receiving classes are concrete subclasses (`Song`, `Podcast`, `Audiobook`).
"
            3: "Both refactorings are structural — they change *where* code lives without changing *what* it does. Behavior preservation is the rule for both."
          explanation: |
            **Same diagnostic, different host.** Step 6's Feature Envy ("uses zero state of host class") generalized: each branch of the conditional uses only state of its respective subclass. Polymorphism is Move Method dispatched by type.


