    solution:
      files:
        - path: "player.py"
          content: |
            """The streaming player — orchestrates a single play event."""
            from dataclasses import dataclass, field
            from typing import List


            @dataclass
            class User:
                user_id: str
                subscription_tier: str
                region: str
                daily_plays: int = 0
                history: List[str] = field(default_factory=list)


            @dataclass
            class Track:
                track_id: str
                title: str
                duration_sec: int
                available_regions: List[str]
                rate: float
                play_count: int = 0


            class Streaming:
                """Orchestrates streaming play events for users and tracks."""

                def _check_subscription(self, user: User) -> None:
                    """Raise if the user is not allowed to play right now."""
                    if user.subscription_tier == "free":
                        if user.daily_plays >= 5:
                            raise PermissionError("Free tier daily limit reached")
                    elif user.subscription_tier == "premium":
                        pass
                    else:
                        raise ValueError(f"Unknown tier: {user.subscription_tier}")

                def _check_geo_restriction(self, user: User, track: Track) -> None:
                    """Raise if the track isn't licensed for the user's region."""
                    if track.available_regions and user.region not in track.available_regions:
                        raise PermissionError(f"Track not available in {user.region}")

                def _compute_royalty(self, track: Track) -> float:
                    """Per-play royalty for a single play (creator gets 70%)."""
                    return 1 * track.rate * 0.7

                def process_play_event(self, user: User, track: Track) -> float:
                    """Run one play: returns the royalty paid to the creator."""
                    self._check_subscription(user)
                    self._check_geo_restriction(user, track)
                    royalty: float = self._compute_royalty(track)
                    track.play_count += 1
                    user.daily_plays += 1
                    user.history.append(track.track_id)
                    return royalty
          language: "python"
      explanation: |
        **Three new helpers, one shorter `process_play_event`.**

        Each helper has:
        - A type-annotated signature that documents what it consumes and produces.
        - A docstring naming the sub-goal in human terms.
        - A leading underscore signalling "internal."

        `process_play_event` is now **seven lines of orchestration**. A reader can scan it top-to-bottom and understand the play sequence without diving into any of the helpers. The helpers are there if a reader needs the details.

        **The safety dance held throughout.** Tests passed before the first extraction, after each individual extraction, and at the end. If any one extraction had broken behavior, you'd have caught it within seconds and reverted only the bad change.

        **What you didn't do.** You didn't extract `_update_play_count(user, track)` or `_record_history(user, track)` — those are one-liners. Extract Function pays back when the extracted block has a coherent name; extracting individual lines with weak names just trades one smell for another (call-site ping-pong). The "Rule of Three" (Step 4) and the "comments-as-deodorant" trap (this step's quiz) cover when extraction stops paying.

    tests:
      - description: "Sub-goals 2 and 3 are extracted into TWO DISTINCT helper methods on Streaming"
        command: |
          import ast
          tree = ast.parse(open('/tutorial/player.py').read())
          classes = {n.name: n for n in tree.body if isinstance(n, ast.ClassDef)}
          assert 'Streaming' in classes, "Streaming class must remain defined"
          methods = {m.name: m for m in classes['Streaming'].body if isinstance(m, ast.FunctionDef)}

          # Strip docstrings before pattern-matching helper bodies (so a helper
          # that mentions `available_regions` only in a docstring does not count).
          def _body_without_docstring(fn):
              body = list(fn.body)
              if (body and isinstance(body[0], ast.Expr)
                  and isinstance(body[0].value, ast.Constant)
                  and isinstance(body[0].value.value, str)):
                  body = body[1:]
              return body

          geo_helper = None
          royalty_helper = None
          for name, fn in methods.items():
              if name in ('process_play_event', '_check_subscription'):
                  continue
              # Ignore the docstring when matching content patterns.
              substantive_src = '\n'.join(ast.unparse(s) for s in _body_without_docstring(fn))
              if 'available_regions' in substantive_src:
                  geo_helper = name
              if 'rate' in substantive_src and '0.7' in substantive_src:
                  royalty_helper = name
          assert geo_helper is not None, \
              "Extract a geo-restriction helper method (e.g., _check_geo_restriction) on Streaming. It should reference track.available_regions and raise PermissionError."
          assert royalty_helper is not None, \
              "Extract a royalty-computation helper method (e.g., _compute_royalty) on Streaming. It should multiply track.rate by 0.7."
          # Critical: the two responsibilities must be in DIFFERENT helpers, not
          # crammed into one mega-helper that just happens to mention both topics.
          assert geo_helper != royalty_helper, \
              f"Both responsibilities are in the same helper `{geo_helper}`. The lesson is to split sub-goals into separate helpers — extract them as TWO methods, not one."
        hints:
          - text: "Cut the geo-check `if` block from process_play_event into a new method `_check_geo_restriction(self, user: User, track: Track) -> None` on the Streaming class."
            condition: "code_missing: def _check_geo"
          - text: "The royalty line `royalty: float = 1 * track.rate * 0.7` is sub-goal 3. Extract it into `_compute_royalty(self, track: Track) -> float`."
            condition: "code_missing: def _compute_royalty"

      - description: "Extracted helper methods have type-annotated signatures and return types"
        command: |
          import ast
          tree = ast.parse(open('/tutorial/player.py').read())
          classes = {n.name: n for n in tree.body if isinstance(n, ast.ClassDef)}
          methods = {m.name: m for m in classes['Streaming'].body if isinstance(m, ast.FunctionDef)}
          checked = 0
          for name, fn in methods.items():
              if not name.startswith('_') or name.startswith('__'):
                  continue
              # Skip self when counting annotated params.
              non_self = [a for a in fn.args.args if a.arg != 'self']
              annotated = sum(1 for a in non_self if a.annotation is not None)
              assert annotated == len(non_self) or len(non_self) == 0, \
                  f"{name}: every non-self parameter must be type-annotated (got {annotated}/{len(non_self)})"
              assert fn.returns is not None, \
                  f"{name}: missing return type annotation (e.g., `-> None` or `-> float`)"
              checked += 1
          assert checked >= 3, \
              "Expected at least 3 underscore-prefixed helper methods (sub-goals 1, 2, 3) on Streaming"

      - description: "process_play_event delegates to at least 3 distinct helper methods"
        command: |
          import ast
          tree = ast.parse(open('/tutorial/player.py').read())
          classes = {n.name: n for n in tree.body if isinstance(n, ast.ClassDef)}
          fn = next(m for m in classes['Streaming'].body
                    if isinstance(m, ast.FunctionDef) and m.name == 'process_play_event')
          # Count distinct underscore-prefixed self-method calls inside the body.
          # The point of the refactoring is delegation, not flat-statement reduction —
          # so we measure delegation directly. Three helpers = three sub-goals extracted.
          helper_calls = set()
          for node in ast.walk(fn):
              if isinstance(node, ast.Call):
                  f = node.func
                  if (isinstance(f, ast.Attribute)
                      and isinstance(f.value, ast.Name)
                      and f.value.id == 'self'
                      and f.attr.startswith('_')
                      and not f.attr.startswith('__')):
                      helper_calls.add(f.attr)
          assert len(helper_calls) >= 3, (
              f"process_play_event currently delegates to only {len(helper_calls)} helper(s) "
              f"({sorted(helper_calls)}). Extract sub-goals 2 (geo check) and 3 (royalty) "
              f"into separate self._X helper methods so the body becomes orchestration over three+ helpers."
          )
          # Also reject the body keeping inline if/while/for/try blocks — those are
          # the sub-goals that should have moved into helpers.
          control_flow = [n for n in fn.body
                          if isinstance(n, (ast.If, ast.While, ast.For, ast.Try))]
          assert not control_flow, (
              f"process_play_event still contains {len(control_flow)} inline control-flow block(s). "
              f"Each branch / loop should move into a dedicated helper method."
          )
        hints:
          - text: "If process_play_event still has inline `if track.available_regions ...:` or `if user.region ...`, you haven't extracted the geo sub-goal yet."
            condition: "code_contains: available_regions"
          - text: "Each sub-goal should become a self._helper(...) call. The body should read like an outline."
            condition: "default"

      - description: "Behavior preserved: pytest passes"
        command: |
          import pytest, io, sys
          old = sys.stdout
          sys.stdout = buf = io.StringIO()
          code = pytest.main(['/tutorial/test_player.py', '-v', '--tb=short'])
          sys.stdout = old
          output = buf.getvalue()
          print(output)
          assert code == 0, f"pytest failed:\n{output}"

    quiz:
      title: "Step 2 — Long Method"
      min_score: 0.7
      shuffle: true
      questions:

        - question: |
            **Retrieval.** What's the *minimum* test discipline a refactoring requires?
          type: single
          options:
            - "Run the tests once at the end to confirm nothing broke"
            - "Run the tests between every two structural changes — green, change, green"
            - "Write new tests after each refactoring to cover the new structure"
            - "No tests are needed if the IDE supports the refactoring"
          correct_index: 1
          option_feedback:
            0: "Running tests only at the end means a single failure indicates *some* change broke behavior — but not *which* one. Refactoring relies on small steps, each individually verified."
            2: "Refactoring is by definition behavior-preserving — the existing tests should still cover the unchanged behavior. New tests follow new behavior, not refactorings."
            3: "Even tool-driven refactorings can fail in edge cases (missed call sites, dynamic references). The test suite is the safety net regardless of how the structural change happens."
          explanation: |
            **Green → change → green** is the rhythm. The "green" *after* one change is the "green" *before* the next, so the cost is one test run per change, not two. If the second green ever turns red, you know exactly which change to revert.

        - question: |
            Which of the following is the **best** sign that a function is too long?
          type: single
          options:
            - "It exceeds 50 lines"
            - "It contains nested loops or conditionals"
            - "Its body has multiple sub-goals labeled with comments"
            - "It uses no helper functions of its own"
          correct_index: 2
          option_feedback:
            0: "Line count is a heuristic, not a rule. A 60-line function with one coherent purpose is fine; a 20-line function with five sub-goals is too long."
            1: "Nested control flow is its own smell (Complex Class), but a function can be long and flat — many sequential blocks rather than nesting."
            3: "Many short functions delegate to helpers; many short functions don't. The presence of helpers is independent of length."
          explanation: |
            **Comments-as-section-headers are the diagnostic.** When a reader needs `# 1. Validate`, `# 2. Compute`, `# 3. Format` to navigate a function, the function is doing those three things and should be three functions. The comment names *become* the new function names.

        - question: |
            You add a comment to a long method explaining what each section does. Have you fixed the smell?
          type: single
          options:
            - "Yes — the function is now self-documenting"
            - "Yes, as long as each comment is one line"
            - "No — comments document a smell that should be fixed structurally"
            - "Only if the comments use a standard format like reStructuredText"
          correct_index: 2
          option_feedback:
            0: "Comments help readers; they don't change the structural problem. The function still has five sub-goals jammed together; the next change still risks breaking unrelated logic."
            1: "Length doesn't change the lesson. A one-line comment can label a sub-goal, but the sub-goal is still inline. **Extract the function** — let the function's *name* be the comment."
          explanation: |
            **Comments-as-deodorant.** Section-header comments are a sign the code wants to be split. The fix isn't tighter comments; it's named functions whose call sites read like an outline. After Extract Function, the comment in the call site is the helper's *name*.

        - question: |
            After extracting one sub-goal into a helper, you run the tests. They pass. What do you do *next*?
          type: single
          options:
            - "Commit the change and continue with the next sub-goal"
            - "Run the tests again to be sure"
            - "Manually inspect the helper for any subtle differences from the original"
            - "Add a new test for the helper before extracting more sub-goals"
          correct_index: 0
          optional_indices: [3]
          option_feedback:
            1: "Re-running the same test command rarely surfaces new information. The first green run is the signal."
            2: "If the test passed, the extraction preserved behavior. Suspicion that the test is too weak points to a separate problem (oracle strength) — manually inspecting every change papers over the gap rather than addressing it."
          explanation: |
            **Trust the tests, then move on.** The whole point of behavior preservation tests is that they make manual inspection unnecessary. Each green run is a small commit point. Adding new tests for the helper is *optional* — the existing tests cover the public behavior, which is what matters.


  # ==========================================================================
  # STEP 3 — Boolean Anti-Patterns + IfsMerged trap
  # Pedagogy: productive failure (Bjork). Naive collapse passes happy-path
  # test → parametrize expansion exposes the bug. Three sub-tasks, with the
  # IfsMerged sub-task as the load-bearing one.
  # ==========================================================================
  - title: "Boolean Anti-Patterns — and the trap that costs you everything"
    instructions: |
      ## Three boolean smells

      > **Learning objective.** After this step you will be able to (a) simplify three common boolean anti-patterns, (b) recognize the **IfsMerged trap** — a dangerous "simplification" that silently drops a branch — and (c) use a **`@pytest.mark.parametrize` truth table** to detect behavior change in boolean code.

      Open `gates.py`. The `PlaybackGates` class has three small methods that guard playback. All three have boolean smells. Two are safe to simplify; one looks safe but isn't.

      ### Sub-task A — boolean return

      ```python
      def is_trial_expired(self, free_trial_days_left: int) -> bool:
          if free_trial_days_left <= 0:
              return True
          else:
              return False
      ```

      The body is `if condition: return True else: return False`. The condition is **already a boolean** — wrapping it in an if/else does nothing. Simplify to:

      ```python
      def is_trial_expired(self, free_trial_days_left: int) -> bool:
          return free_trial_days_left <= 0
      ```

      This is the most common conditional anti-pattern in novice Python — about **30%** of conditional anti-patterns in one large empirical study (Naude et al., 2024).

      ### Sub-task B — confusing else

      ```python
      def stream_quality(self, is_premium: bool) -> str:
          if is_premium:
              return "high"
          if not is_premium:
              return "low"
          return "low"  # unreachable, but the type checker insists
      ```

      Two `if`s with mutually-exclusive conditions and a "just in case" return at the end. The intent is `if/else`. Simplify to:

      ```python
      def stream_quality(self, is_premium: bool) -> str:
          if is_premium:
              return "high"
          else:
              return "low"
      ```

      ### Sub-task C — the IfsMerged trap

      Here's the method:

      ```python
      def play_decision(self, is_logged_in: bool, is_offline: bool) -> str:
          if is_logged_in:
              if not is_offline:
                  return "stream"
              else:
                  return "play_cached"
          return "error_login_required"
      ```

      A colleague reviewing the code proposes this simplification:

      ```python
      def play_decision(self, is_logged_in: bool, is_offline: bool) -> str:
          if is_logged_in and not is_offline:
              return "stream"
          return "error_login_required"
      ```

      It compiles. The existing happy-path test (`assert gates.play_decision(True, False) == "stream"`) passes. **Before reading on, decide for yourself — is this simplification behavior-preserving?** Take 30 seconds. Sketch a 4-row truth table over `(is_logged_in, is_offline)` covering all four combinations. Walk both versions through each row. Find a row where they disagree — or convince yourself they never do.

      *(Don't peek. The reveal is in the next paragraph.)*

      ---

      The colleague's simplification is **wrong**. The original returns `"play_cached"` for `(is_logged_in=True, is_offline=True)`. The simplified version returns `"error_login_required"` for the same input. The branch where you're logged in *and* offline got silently dropped. That's the **IfsMerged trap**: collapsing nested `if`s into a single `and` is safe *only when* the inner `else` returns the same value as the outer fall-through. Here it doesn't — the inner `else` returns `"play_cached"`, but the outer fall-through returns `"error_login_required"`.

      If you missed it during the prediction: that's the point. Empirical studies of code review show this is one of the most common classes of regression introduced *during simplification* — exactly because the change *looks* obvious. The truth table is the safety net.

      ## Why a happy-path test misses this

      A single test like `assert gates.play_decision(True, False) == "stream"` exercises one of four possible truth-value combinations of `(is_logged_in, is_offline)`. Three remain unchecked, and the bug lives in one of those three.

      The fix is a **truth table** — a parametrize over all four combinations:

      ```python
      @pytest.mark.parametrize("is_logged_in,is_offline,expected", [
          (False, False, "error_login_required"),
          (False, True,  "error_login_required"),
          (True,  False, "stream"),
          (True,  True,  "play_cached"),
      ])
      def test_play_decision(gates: PlaybackGates, is_logged_in: bool, is_offline: bool, expected: str) -> None:
          assert gates.play_decision(is_logged_in, is_offline) == expected
      ```

      Four rows. Two columns of input. One expected output per row. Any behavior change in the function shows up *somewhere* in the table.

      > **Mini warmup — `parametrize` in 5 lines.** If `@pytest.mark.parametrize` is unfamiliar, the syntax is `("name1,name2", [(value1a, value2a), (value1b, value2b), ...])`. Each tuple becomes one test case; the test function receives the tuple's values as named parameters. That's it.

      ## Your task

      1. **Sub-task A:** simplify `is_trial_expired`.
      2. **Sub-task B:** rewrite `stream_quality` as a clean `if/else`.
      3. **Sub-task C — fill the truth table FIRST, then refactor.** Open `truth_table.md`. Two of the four rows are pre-filled. **Fill the other two** by reading the *original nested* `play_decision` (in `gates.py`). Then circle (with a `← BREAKS` comment) the row where the naive `if is_logged_in and not is_offline: return "stream"` simplification would diverge from the original. Only after the table is complete, write the **correct** simplified version of `play_decision` and extend the parametrize table in `test_play_decision` to cover all four rows.

      The lesson is **not** "the original was unsimplifiable" — it *can* be simplified, but only if the simplification preserves the four-row truth table. The elegant version that does:

      ```python
      def play_decision(self, is_logged_in: bool, is_offline: bool) -> str:
          if not is_logged_in:
              return "error_login_required"
          return "play_cached" if is_offline else "stream"
      ```

      Externalizing the truth table on paper before touching the function is the load-bearing move: it converts a 6-element working-memory task (4 truth combinations × 2 versions to compare) into a written artifact you can stare at.

