  # STEP 5: UPDATE + DELETE + DROP TABLE — modifying and removing data
  # Added: Safe failure simulation (DELETE without WHERE), faded scaffolding
  #   (less hand-holding in TODO comments), metacognitive reflection
  # Bloom's: Apply / Evaluate
  # --------------------------------------------------------------------------
  - title: "Modifying & Cleaning Up"
    instructions: |
      ## UPDATE, DELETE, and DROP TABLE

      > **Learning objective:** After this step you will be able to **write** `UPDATE` to modify rows, `DELETE` to remove rows, and `DROP TABLE` to remove an entire table — and **evaluate** the safety of data-modifying operations.

      ### Safe failure experiment

      Before reading further, try this experiment: in your editor, write `SELECT * FROM students;` and run it. Count the rows. Now write `DELETE FROM students;` (no WHERE clause) and run it. Run the SELECT again. What happened?

      Don't worry — the setup re-runs when you reload the page, so the data will come back. But in production, there is no reload button. This is why the patterns below matter.

      ### UPDATE — changing existing rows

      ```sql
      UPDATE students SET gpa = 3.95 WHERE name = 'Alice';
      ```

      `UPDATE` without a `WHERE` clause modifies **every row in the table** — a common and painful mistake in production. The safe habit: write and test the equivalent `SELECT ... WHERE ...` first, then convert it to `UPDATE`.

      ### DELETE — removing rows

      ```sql
      DELETE FROM students WHERE gpa < 3.0;
      ```

      `DELETE FROM students` with no `WHERE` removes every row. The table schema remains — only the data is gone.

      ### DROP TABLE — removing the table itself

      ```sql
      DROP TABLE IF EXISTS courses;
      ```

      `DROP TABLE` permanently removes both the data and the schema. There is no undo.

      | Statement | Removes | Schema remains? |
      |---|---|---|
      | `DELETE FROM t WHERE ...` | Matching rows | Yes |
      | `DELETE FROM t` | All rows | Yes |
      | `DROP TABLE t` | All rows + schema | No |

      ### pandas comparison

      | SQL | pandas |
      |-----|--------|
      | `UPDATE students SET gpa = 3.6 WHERE name = 'Eve'` | `students.loc[students['name'] == 'Eve', 'gpa'] = 3.6` |
      | `DELETE FROM students WHERE year = 4` | `students = students[students['year'] != 4]` |
      | `DROP TABLE courses` | `del courses` |

      Notice that SQL modifies data **in place** — the table is permanently changed. pandas operations often produce new DataFrames (unless you use `inplace=True`). In SQL, `UPDATE` and `DELETE` without `WHERE` are permanent and dangerous. In pandas, you can always re-read the original CSV.

      ### Task

      Complete `cleanup.sql`:

      1. Update Eve's GPA from 3.50 to 3.60
      2. Delete all year-4 students
      3. Drop the `courses` table you created in Step 4

      How confident are you that your WHERE clauses are correct? If you are not sure, run the equivalent SELECT first to preview which rows will be affected — that is the professional workflow.

    files:
      - path: "cleanup.sql"
        content: |
          -- 1. Update Eve's GPA to 3.6

          -- 2. Delete all year-4 students

          -- 3. Drop the courses table
        language: "sql"

    open_file: "cleanup.sql"

    solution:
      files:
        - path: "cleanup.sql"
          content: |
            -- 1. Update Eve's GPA to 3.6
            UPDATE students SET gpa = 3.6 WHERE name = 'Eve';

            -- 2. Delete all year-4 students
            DELETE FROM students WHERE year = 4;

            -- 3. Drop the courses table
            DROP TABLE IF EXISTS courses;
          language: "sql"
      explanation: |
        **Task 1:** `UPDATE ... SET ... WHERE` modifies only the rows matching the WHERE clause. Without `WHERE name = 'Eve'`, every student's GPA would become 3.6.

        **Task 2:** `DELETE FROM ... WHERE year = 4` removes Dan and Hank. Without the `WHERE`, all 9 students would be deleted.

        **Task 3:** `DROP TABLE IF EXISTS` is safer than plain `DROP TABLE` — it avoids an error if the table was already dropped or never created. After this, `SELECT * FROM courses` would produce an error (the table no longer exists), while `DELETE FROM courses` without WHERE would leave the table empty but still queryable.

    tests:
      - description: "cleanup.sql uses UPDATE"
        command: |
          var src = __read_file('cleanup.sql').toLowerCase();
          assert(src.indexOf('update') !== -1, "Task 1 should use an UPDATE statement");
      - description: "cleanup.sql uses DELETE"
        command: |
          var src = __read_file('cleanup.sql').toLowerCase();
          assert(src.indexOf('delete') !== -1, "Task 2 should use a DELETE statement");
      - description: "Eve's GPA has been updated to 3.6"
        command: |
          var rows = __run_query("SELECT gpa FROM students WHERE name = 'Eve'");
          assert(rows.length > 0, "Eve should still be in the table");
          assert(Math.abs(rows[0].gpa - 3.6) < 0.001, "Eve's GPA should be 3.6 after UPDATE, got " + rows[0].gpa);
      - description: "Year-4 students have been deleted"
        command: |
          var rows = __run_query("SELECT * FROM students WHERE year = 4");
          assert(rows.length === 0, "Expected no year-4 students — write a DELETE WHERE year = 4");
      - description: "courses table has been dropped"
        command: |
          var rows = __run_query("SELECT name FROM sqlite_master WHERE type='table' AND name='courses'");
          assert(rows.length === 0, "Expected courses table to be gone — write DROP TABLE IF EXISTS courses");

    quiz:
      title: "Modifying & Cleaning Up — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            A developer runs:
            ```sql
            DELETE FROM orders;
            ```
            What is the result?
          type: single
          options:
            - "The orders table is removed from the database"
            - "All rows are deleted but the table structure remains"
            - "An error — DELETE requires a WHERE clause"
            - "Only rows matching the implicit WHERE TRUE condition are deleted"
          correct_index: 1
          explanation: |
            `DELETE FROM orders` without a `WHERE` deletes every row but leaves the table schema intact. The table still exists — it is just empty. To remove the schema too, use `DROP TABLE orders`. SQL does not require a `WHERE` clause on `DELETE`, which makes this mistake easy to make in production.

        - question: |
            What is the safest way to remove a table that may or may not exist, without causing an error?
          type: single
          options:
            - "`REMOVE TABLE IF EXISTS courses;`"
            - "`DELETE TABLE courses;`"
            - "`DROP TABLE IF EXISTS courses;`"
            - "`TRUNCATE TABLE IF EXISTS courses;`"
          correct_index: 2
          explanation: |
            `DROP TABLE IF EXISTS tablename` is the idiomatic safe form. Plain `DROP TABLE tablename` raises an error if the table doesn't exist. `DELETE TABLE` is not valid SQL. `TRUNCATE` removes all rows (like `DELETE`) but keeps the schema, and is not supported by all databases (including SQLite).

        - question: |
            Before running an `UPDATE` on a production table, what should you do first?
          type: single
          options:
            - "Run EXPLAIN to check the query plan"
            - "Run the equivalent SELECT with the same WHERE clause to preview which rows will change"
            - "Create a backup (or use a transaction) so you can roll back if wrong"
            - "Both B and C are good production practices"
          correct_index: 3
          explanation: |
            Both are correct. Running `SELECT ... WHERE ...` first lets you verify exactly which rows the `UPDATE` will touch before it happens. Wrapping the `UPDATE` in a transaction (`BEGIN; UPDATE ...; SELECT ...; COMMIT;` or `ROLLBACK;`) gives you a safety net. Many developers do both.

        - question: |
            After running `DROP TABLE courses`, what happens if you run `SELECT * FROM courses`?
          type: single
          options:
            - "It returns an empty result set (no rows, but the columns are shown)"
            - "The database raises an error — the table no longer exists"
            - "It returns NULL for every column"
            - "It returns the data that was in the table before the DROP"
          correct_index: 1
          explanation: |
            `DROP TABLE` removes both the data **and the schema**. The table no longer exists in the database at all, so any query referencing it fails with an error. Compare this with `DELETE FROM courses` (no WHERE), which removes all rows but keeps the table structure intact — `SELECT * FROM courses` would return an empty result set, not an error.
