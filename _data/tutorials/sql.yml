        command: |
          var src = __read_file('filter.sql').toLowerCase().split('\n').filter(function(l){ return l.trim().indexOf('--') !== 0; }).join('\n');
          assert(/\bis\s+null\b/.test(src), "Query 3 must handle NULL explicitly — `IS NULL` is the only portable test for unknown values");
          var rows = __run_query("SELECT name FROM students WHERE major != 'CS' OR major IS NULL ORDER BY name");
