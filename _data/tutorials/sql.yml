    quiz:
      title: "Filtering & Sorting — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            A student writes:
            ```sql
            WHERE status != 'Active'
            ```
            The `status` column has some `NULL` values. What happens to those rows?
          type: single
          options:
            - "They are included — NULL is not equal to 'Active'"
            - "They are excluded — `NULL != 'Active'` is UNKNOWN, not TRUE"
            - "They cause a runtime error"
            - "They are included only if NULL is listed as a valid status"
          correct_index: 1
          option_feedback:
            0: "Intuitively *true*, but SQL doesn't agree. NULL means 'unknown' — comparing it to anything (even with `!=`) yields UNKNOWN, and `WHERE` keeps only TRUE rows."
            2: "No error. `WHERE` silently drops UNKNOWN-evaluating rows; that silent drop is exactly the bug to watch for."
            3: "There's no 'list of valid statuses' anywhere. NULL handling is governed by 3VL, not by a list."
          explanation: |
            In SQL's Three-Valued Logic, `NULL != 'Active'` evaluates to **UNKNOWN** — not TRUE. `WHERE` only keeps rows where the predicate is TRUE. UNKNOWN rows are silently discarded. To include NULL rows, write: `WHERE status != 'Active' OR status IS NULL`.

        - question: |
            Which expression correctly tests whether a column value is missing (NULL)?
          type: single
          options:
            - "`WHERE credits = NULL`"
            - "`WHERE credits == NULL`"
            - "`WHERE credits IS NULL`"
            - "`WHERE ISNULL(credits) = 1`"
          correct_index: 2
          option_feedback:
            0: "`= NULL` evaluates to UNKNOWN — never TRUE. SQL has a special operator for this case precisely because `=` doesn't work on NULL."
            1: "`==` is not valid SQL — it borrows from C-family languages. SQL uses single `=` for equality, and even then `IS NULL` for NULL tests."
            3: "Some dialects offer `ISNULL()` (and Oracle has `NVL()`), but they're non-standard extensions. `IS NULL` is the portable answer."
          explanation: |
            `NULL = NULL` evaluates to UNKNOWN, not TRUE — so `WHERE credits = NULL` never matches any row. The only portable, standard-SQL way to test for NULL is `IS NULL`. `== NULL` is not valid SQL syntax (SQL uses `=`, not `==`). `ISNULL()` is a non-standard extension.

        - question: |
            In SQL's logical execution order, the `SELECT` clause is written first. When is it actually evaluated?
          type: single
          options:
            - "First — it defines what data to retrieve"
            - "Second — immediately after FROM determines the source table"
            - "Fifth — after FROM, WHERE, GROUP BY, and HAVING"
            - "Last — after ORDER BY and LIMIT"
          correct_index: 2
          option_feedback:
            0: "Reading order is misleading. SELECT is *written* first but logically runs after the row-filtering and grouping clauses."
            1: "FROM identifies the source, but WHERE filters before SELECT projects. Otherwise, an alias used in SELECT couldn't reference filtered-out rows."
            3: "ORDER BY runs *after* SELECT (so it can refer to SELECT's aliases). LIMIT is the absolute last step."
          explanation: |
            `SELECT` is evaluated **fifth**: FROM -> WHERE -> GROUP BY -> HAVING -> **SELECT** -> ORDER BY -> LIMIT. This is why an alias defined in `SELECT` cannot be used in `WHERE` — the alias doesn't exist until after `WHERE` has already filtered the rows.

        - question: |
            What does `SELECT name, gpa FROM students` do?
          type: single
          options:
            - "It filters the table to only include rows that have a name and a gpa"
            - "It returns all rows but only the name and gpa columns"
            - "It creates new columns called name and gpa"
            - "It sorts the table by name and then by gpa"
          correct_index: 1
          option_feedback:
            0: "That's *row* filtering — the job of `WHERE`. SELECT picks columns, not rows."
            2: "Those columns must already exist on the table. SELECT doesn't create columns; it projects existing ones (or computes expressions over them)."
            3: "Sorting is `ORDER BY name, gpa`. SELECT alone has no implicit ordering — that's why you saw the first quiz warn about row order."
          explanation: |
            `SELECT` projects (selects) **columns**, not rows. `SELECT name, gpa FROM students` returns all rows but shows only the `name` and `gpa` columns. To filter *rows*, you need a `WHERE` clause. This is a common point of confusion — `SELECT` chooses columns, `WHERE` chooses rows.

        - question: |
            **Arrange** the clauses to find CS students with GPA above 3.5, sorted highest first.
          type: parsons
          lines:
            - "SELECT name, gpa"
            - "FROM students"
            - "WHERE major = 'CS' AND gpa > 3.5"
            - "ORDER BY gpa DESC;"
          distractors:
            - "HAVING gpa > 3.5"
            - "SORT BY gpa DESC;"
          explanation: |
            The logical execution order is FROM -> WHERE -> SELECT -> ORDER BY. `HAVING` filters *groups* (after GROUP BY), not individual rows. `SORT BY` is not valid SQL — use `ORDER BY`. The distractor `HAVING` is a common confusion point; it only applies after `GROUP BY`.

        - question: |
            A student writes two queries. Which one is more likely to produce unexpected results in production, and why?

            **Query A:** `SELECT * FROM users WHERE role != 'admin'`
            **Query B:** `SELECT id, name FROM users WHERE role != 'admin' OR role IS NULL`
          type: single
          options:
            - "Query A — silently drops NULL roles, plus uses `SELECT *`"
            - "Query B — the extra `OR` clause makes it slower"
            - "Both are equally safe in production"
            - "Query A — `SELECT *` causes a syntax error"
          correct_index: 0
          option_feedback:
            1: "The extra OR is constant cost — and on indexed columns, both queries optimize similarly. Correctness beats microseconds anyway."
            2: "They differ on both projection (`*` vs explicit columns) and on how NULL roles are treated. They are not equally safe."
            3: "`SELECT *` is valid SQL — that's part of the trap. It compiles fine; it's just brittle as columns get added/dropped."
          explanation: |
            Query A has two production risks: (1) `SELECT *` breaks if columns are added or removed, and (2) `!= 'admin'` silently drops rows where role is NULL. Query B is safer: it names specific columns and explicitly handles NULL. This combines two lessons — explicit projection and NULL-safe predicates.

