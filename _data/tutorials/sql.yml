title: "SQL Essentials"
description: "A hands-on introduction to SQL using SQLite, running entirely in your browser. Start by querying an existing database, then learn to filter, aggregate, create your own tables, and modify data — no installation required."

backend: sql

require_tests: true
autosave_type: commands-and-files

# Pre-populate a students table that query steps read from.
# Safe to re-run: DROP TABLE IF EXISTS handles re-loads.
setup_commands:
  - |
    DROP TABLE IF EXISTS students;
    CREATE TABLE students (
      id      INTEGER PRIMARY KEY,
      name    TEXT    NOT NULL,
      year    INTEGER,
      major   TEXT,
      gpa     REAL
    );
    INSERT INTO students VALUES
      (1, 'Alice',  2, 'CS',      3.90),
      (2, 'Bob',    3, 'Math',    3.40),
      (3, 'Carol',  1, 'CS',      3.70),
      (4, 'Dan',    4, 'Physics', 2.80),
      (5, 'Eve',    2, 'CS',      3.50),
      (6, 'Frank',  3, 'Math',    3.10),
      (7, 'Grace',  1, 'Physics', 3.60),
      (8, 'Hank',   4, 'CS',      3.20),
      (9, 'Iris',   3, NULL,      3.00);

steps:

  # --------------------------------------------------------------------------
  # STEP 1: SELECT — exploring an existing table
  # Pedagogy: Conceptual before Procedural, PRIMM, low intrinsic load
  # Growth mindset: normalize struggle at the start
  # Bloom's: Remember / Understand / Apply
  # --------------------------------------------------------------------------
  - title: "Exploring Data"
    instructions: |
      ## Describe What You Want, Not How

      > **Learning objective:** After this step you will be able to **write** `SELECT` queries to retrieve data from an existing table and **explain** the difference between imperative and declarative programming.

      SQL can feel strange at first. Unlike Python or JavaScript, you do not tell the computer *how* to solve a problem step by step. Instead, you describe *what* you want, and the database engine figures out the rest. This shift — from **imperative** to **declarative** — is the single most important idea in this tutorial.

      If you find yourself confused, that is normal. Even experienced developers need time to rewire their thinking for SQL. Stick with it — each step builds on the last, and it clicks faster than you expect.

      ### The students table

      A `students` table has already been set up for you. Here is its schema (keep this reference handy — you will use it throughout the tutorial):

      | Column | Type    | Constraints |
      |--------|---------|-------------|
      | `id`   | INTEGER | PRIMARY KEY |
      | `name` | TEXT    | NOT NULL    |
      | `year` | INTEGER |             |
      | `major`| TEXT    |             |
      | `gpa`  | REAL    |             |

      The table contains 9 rows. Your first task: explore it.

      ### SELECT — reading data

      ```sql
      -- Sub-goal: Retrieve every column and row
      SELECT * FROM students;

      -- Sub-goal: Retrieve only specific columns
      SELECT name, gpa FROM students;
      ```

      `SELECT` names the columns you want. `FROM` names the table. `*` means "all columns".

      Think of `SELECT` as a projection — like Python's list comprehension `[s['name'] for s in students]` or JavaScript's `.map(s => s.name)`.

      If you have used **pandas**, the equivalents are even more direct:

      | SQL | pandas |
      |-----|--------|
      | `SELECT * FROM students` | `students` (the whole DataFrame) |
      | `SELECT name, gpa FROM students` | `students[['name', 'gpa']]` |

      ### Two things to notice about SQL tables

      1. **No guaranteed order** — rows may come back in any sequence. Unlike a Python list, there is no "row 0". If order matters, you must explicitly request it (you will learn how in Step 2).
      2. **Strict schema** — every row has exactly the same columns with declared types. No mixed-type columns, no missing keys. (Some values can be `NULL`, meaning unknown — more on that in Step 2.)

      ### Predict before you run

      Before clicking **Run**, predict the output of each query. How many rows will `SELECT * FROM students` return? How many columns? Write your prediction down, then run and compare. Predicting before running builds stronger mental models than passively reading output.

      ### Task

      Write two queries in `query.sql`:

      1. `SELECT *` to retrieve **all columns** from the `students` table
      2. A `SELECT` that retrieves **only** the `name` and `major` columns

      After running both, try one more experiment: write `SELECT major, name FROM students` (columns reversed). Does the output change? This kind of tinkering builds intuition faster than reading.

    files:
      - path: "query.sql"
        content: |
          -- TODO 1: Select all columns from students
          -- Predict first: how many rows and columns will you see?

          -- TODO 2: Select only the name and major columns
        language: "sql"

    open_file: "query.sql"

    solution:
      files:
        - path: "query.sql"
          content: |
            -- All columns, all rows
            SELECT * FROM students;

            -- Only name and major
            SELECT name, major FROM students;
          language: "sql"
      explanation: |
        `SELECT *` returns all 9 rows and all 5 columns (id, name, year, major, gpa). `SELECT name, major` returns the same 9 rows but only 2 columns. Notice that `SELECT` chooses **columns**, not rows — to choose rows, you will need `WHERE` (Step 2).

    tests:
      - description: "query.sql contains a SELECT * query"
        command: |
          var src = __read_file('query.sql').toLowerCase();
          assert(src.indexOf('select *') !== -1 || src.indexOf('select*') !== -1, "query.sql should contain a SELECT * query to retrieve all columns");
      - description: "query.sql selects specific columns (name and major)"
        command: |
          var src = __read_file('query.sql').toLowerCase();
          assert(src.indexOf('select') !== -1 && (src.indexOf('name') !== -1 && src.indexOf('major') !== -1), "query.sql should contain a SELECT that retrieves the name and major columns");
      - description: "students table has 9 rows"
        command: |
          var rows = __run_query("SELECT COUNT(*) AS n FROM students");
          assert(rows[0].n === 9, "The students table should have 9 rows");
      - description: "students table has 5 columns"
        command: |
          var info = __run_query("PRAGMA table_info(students)");
          assert(info.length === 5, "The students table should have 5 columns: id, name, year, major, gpa");

    quiz:
      title: "Exploring Data — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            A Python programmer says: *"A SQL table is just like a Python list of dictionaries."*
            What is the most important difference they are missing?
          type: single
          options:
            - "SQL tables are stored on disk; Python lists live in memory"
            - "SQL tables enforce a rigid schema with fixed types, and rows have no guaranteed order"
            - "SQL tables cannot be modified after creation"
            - "Python lists can hold more data than SQL tables"
          correct_index: 1
          explanation: |
            The two critical differences are (1) **rigid schema** — every column has a declared type and every row must conform, and (2) **unordered set semantics** — unlike a Python list, there is no "row 0". You retrieve rows by filtering their content, not by index.

        - question: |
            Without an `ORDER BY` clause, in what order does SQL return rows?
          type: single
          options:
            - "In insertion order — the order rows were added"
            - "In primary key order — ascending by id"
            - "Alphabetically by the first column"
            - "In no guaranteed order — the database may return rows in any sequence"
          correct_index: 3
          explanation: |
            A SQL table is a **set**, not a list. Without `ORDER BY` the database may return rows in any order based on storage layout, index usage, or query plan. Never rely on implicit ordering. If order matters, always add `ORDER BY`.

        - question: |
            In Python you write `students[0]` to get the first student. What is the SQL equivalent?
          type: single
          options:
            - "`SELECT * FROM students WHERE id = 0`"
            - "`SELECT * FROM students[0]`"
            - "There is no equivalent — SQL rows have no position, you filter by content"
            - "`SELECT FIRST FROM students`"
          correct_index: 2
          explanation: |
            SQL tables have no concept of position. Rows are identified by their **content** (using a `WHERE` clause), not by an index. This is a fundamental difference from arrays and lists. You will learn `WHERE` in the next step.

  # --------------------------------------------------------------------------
  # STEP 2: WHERE + ORDER BY — declarative filtering and sorting
  # Audit fix: Moved error taxonomy out (was overloading this step).
  #   Now focuses on WHERE, ORDER BY, NULL/3VL only (~4 interacting elements).
  # Added: = vs == negative transfer, single-quote convention,
  #   Investigate/Modify (PRIMM), metacognitive prompt
  # Bloom's: Apply / Analyze
  # --------------------------------------------------------------------------
  - title: "Filtering & Sorting"
    instructions: |
      ## WHERE and ORDER BY — The filter() and sort() of SQL

      > **Learning objective:** After this step you will be able to **write** `WHERE` clauses using boolean predicates and `ORDER BY` to sort results, and **explain** SQL's three-valued logic (3VL) and why it matters for NULL handling.

      ### Generation challenge — try before you read

      Before reading further, try to answer this question using only what you learned in Step 1: *"How would you retrieve only the CS students from the students table?"* Write your best guess in the editor — even if it fails, the attempt will make the explanation below stick better.

      ### SQL's functional cousins

      You already know JavaScript's array methods — and if you know pandas, the mapping is even closer:

      | JavaScript | pandas | SQL |
      |---|---|---|
      | `arr.filter(x => x.gpa > 3.5)` | `df[df['gpa'] > 3.5]` | `WHERE gpa > 3.5` |
      | `arr.map(x => x.name)` | `df[['name']]` | `SELECT name` |
      | `arr.sort((a,b) => b.gpa - a.gpa)` | `df.sort_values('gpa', ascending=False)` | `ORDER BY gpa DESC` |

      A `SELECT` query is roughly equivalent to chaining `.filter().map().sort()` in JS, or method-chaining in pandas — but expressed declaratively, with the optimizer choosing the execution strategy.

      ### WHERE predicates

      ```sql
      -- Sub-goal: Numeric comparison
      WHERE gpa >= 3.5
      -- Sub-goal: String equality (NOTE: SQL uses single quotes, not double)
      WHERE major = 'CS'
      -- Sub-goal: Compound predicate
      WHERE major = 'CS' AND gpa > 3.7
      -- Sub-goal: Set membership
      WHERE major IN ('CS', 'Math')
      -- Sub-goal: Pattern match (% = any characters)
      WHERE name LIKE 'A%'
      ```

      Two syntax traps for Python/JS developers:
      - **Single quotes for strings.** SQL uses `'CS'`, not `"CS"`. Double quotes have a different meaning in SQL (they quote identifiers like column names).
      - **Single `=` for equality.** SQL uses `=`, not `==`. Writing `WHERE major == 'CS'` is a syntax error.

      ### NULL and Three-Valued Logic — the biggest trap

      In Python and JavaScript, boolean logic is two-valued: `true` or `false`. In SQL it is **three-valued**: `TRUE`, `FALSE`, and `UNKNOWN`.

      `NULL` does not mean zero or empty string. It means **unknown value**. Comparing anything to `NULL` — even another `NULL` — yields `UNKNOWN`:

      ```sql
      -- WRONG: silently excludes rows where major is NULL
      WHERE major != 'CS'

      -- RIGHT: explicitly handle NULL
      WHERE major != 'CS' OR major IS NULL

      -- Testing for NULL
      WHERE major IS NULL       -- value is unknown
      WHERE major IS NOT NULL   -- value is known
      ```

      `WHERE` only keeps rows where the predicate is `TRUE`. Rows evaluating to `UNKNOWN` are silently discarded — a common source of hard-to-trace bugs.

      This is genuinely difficult. Even experienced developers get tripped up by NULL logic. If it feels confusing, you are in good company — take it slow and re-read the examples above.

      In Python, `None != "Active"` evaluates to `True`. In SQL, `NULL != 'Active'` evaluates to `UNKNOWN`. This difference catches many students transitioning from Python.

      **pandas note:** pandas uses `NaN`, which behaves differently again. `df[df['major'] != 'CS']` in pandas *does* exclude NaN rows (similar to SQL), but `df['major'].isna()` is the pandas equivalent of `IS NULL`. The three-way comparison:

      | Operation | Python | pandas | SQL |
      |-----------|--------|--------|-----|
      | Test for missing | `x is None` | `df['col'].isna()` | `col IS NULL` |
      | Filter not equal | `x != 'CS'` is `True` when `x` is `None` | `df[df['col'] != 'CS']` excludes NaN | `WHERE col != 'CS'` excludes NULL |

      ### ORDER BY

      ```sql
      SELECT name, gpa FROM students
      ORDER BY gpa DESC;   -- highest first (ASC is the default)
      ```

      `ORDER BY` is the **only guarantee of row order**. Without it the database may return rows in any order.

      ### The logical execution order

      SQL does **not** execute top-to-bottom like Python. The database evaluates clauses in this fixed order:

      ```
      1. FROM      — which tables to read
      2. WHERE     — filter rows
      3. GROUP BY  — group rows            (Step 3)
      4. HAVING    — filter groups         (Step 3)
      5. SELECT    — project columns  ← written first, evaluated fifth
      6. ORDER BY  — sort the result
      7. LIMIT     — truncate the result
      ```

      This is why you cannot use a `SELECT` alias inside a `WHERE` clause — the alias doesn't exist yet when `WHERE` is evaluated.

      ### Task

      Write three queries in `filter.sql` against the `students` table:

      1. All CS students with a GPA above 3.5, ordered by GPA descending
      2. All students in year 1 or year 2
      3. All students whose major is **not** `'CS'` — one student has a NULL major! Write a NULL-safe predicate.

      After finishing, try one **investigation**: change Query 3 to `WHERE major != 'CS'` (without the IS NULL part) and re-run. How many rows do you get? Where did Iris go?

    files:
      - path: "filter.sql"
        content: |
          -- Query 1: CS students with GPA > 3.5, highest GPA first
          -- TODO

          -- Query 2: Students in year 1 or year 2
          -- TODO

          -- Query 3: Students NOT in CS (NULL-safe — include NULL majors)
          -- Hint: use OR major IS NULL
          -- TODO
        language: "sql"

    open_file: "filter.sql"

    solution:
      files:
        - path: "filter.sql"
          content: |
            -- Query 1: CS students with GPA > 3.5, highest GPA first
            SELECT * FROM students
            WHERE major = 'CS' AND gpa > 3.5
            ORDER BY gpa DESC;

            -- Query 2: Students in year 1 or year 2
            SELECT * FROM students
            WHERE year = 1 OR year = 2;

            -- Query 3: Students NOT in CS (NULL-safe)
            SELECT * FROM students
            WHERE major != 'CS' OR major IS NULL;
          language: "sql"
      explanation: |
        **Query 1** returns Alice (3.9) and Carol (3.7). The `AND` combines two conditions, and `ORDER BY gpa DESC` sorts highest-first.

        **Query 2** returns 4 students (Alice, Carol, Eve, Grace). You could also write `WHERE year IN (1, 2)`.

        **Query 3** is the critical one. Without `OR major IS NULL`, Iris (whose major is NULL) is silently dropped. `NULL != 'CS'` evaluates to UNKNOWN, not TRUE, so WHERE discards her. The `OR major IS NULL` catches this edge case.

    tests:
      - description: "filter.sql uses WHERE"
        command: |
          var src = __read_file('filter.sql').toLowerCase();
          assert(src.indexOf('where') !== -1, "Your queries should use WHERE clauses to filter rows");
      - description: "filter.sql uses ORDER BY"
        command: |
          var src = __read_file('filter.sql').toLowerCase();
          assert(src.indexOf('order by') !== -1, "Query 1 should use ORDER BY to sort results");
      - description: "CS + GPA > 3.5 returns 2 students (Alice 3.9, Carol 3.7)"
        command: |
          var rows = __run_query("SELECT name FROM students WHERE major = 'CS' AND gpa > 3.5 ORDER BY gpa DESC");
          assert(rows.length === 2, "Expected 2 CS students with GPA > 3.5: Alice (3.9) and Carol (3.7)");
          assert(rows[0].name === 'Alice', "Alice (3.9) should be first when ordered by GPA DESC");
      - description: "Year 1 or 2 returns 4 students"
        command: |
          var rows = __run_query("SELECT * FROM students WHERE year = 1 OR year = 2");
          assert(rows.length === 4, "Expected 4 students in year 1 or 2: Alice, Carol, Eve, Grace");
      - description: "Non-CS (NULL-safe) returns 5 students"
        command: |
          var src = __read_file('filter.sql').toLowerCase();
          assert(src.indexOf('is null') !== -1, "Query 3 must handle NULL — use OR major IS NULL");
          var rows = __run_query("SELECT * FROM students WHERE major != 'CS' OR major IS NULL");
          assert(rows.length === 5, "Expected 5 non-CS students: Bob, Dan, Frank, Grace, and Iris (NULL major)");

    quiz:
      title: "Filtering & Sorting — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            A student writes:
            ```sql
            WHERE status != 'Active'
            ```
            The `status` column has some `NULL` values. What happens to those rows?
          type: single
          options:
            - "They are included — NULL is not equal to 'Active'"
            - "They are excluded — `NULL != 'Active'` evaluates to UNKNOWN, and WHERE discards UNKNOWN rows"
            - "They cause a runtime error"
            - "They are included only if NULL is explicitly listed as a valid status"
          correct_index: 1
          explanation: |
            In SQL's Three-Valued Logic (3VL), `NULL != 'Active'` evaluates to **UNKNOWN** — not TRUE. `WHERE` only keeps rows where the predicate is TRUE. Rows where the predicate is UNKNOWN are silently discarded. To include NULL rows, write: `WHERE status != 'Active' OR status IS NULL`.

        - question: |
            Which expression correctly tests whether a column value is missing (NULL)?
          type: single
          options:
            - "`WHERE credits = NULL`"
            - "`WHERE credits == NULL`"
            - "`WHERE credits IS NULL`"
            - "`WHERE ISNULL(credits) = 1`"
          correct_index: 2
          explanation: |
            `NULL = NULL` evaluates to UNKNOWN, not TRUE — so `WHERE credits = NULL` never matches any row. The only portable, standard-SQL way to test for NULL is `IS NULL`. `== NULL` is not valid SQL syntax (SQL uses `=`, not `==`). `ISNULL()` is a non-standard extension.

        - question: |
            In SQL's logical execution order, the `SELECT` clause is written first. When is it actually evaluated?
          type: single
          options:
            - "First — it defines what data to retrieve"
            - "Second — immediately after FROM determines the source table"
            - "Fifth — after FROM, WHERE, GROUP BY, and HAVING"
            - "Last — after ORDER BY and LIMIT"
          correct_index: 2
          explanation: |
            `SELECT` is evaluated **fifth**: FROM -> WHERE -> GROUP BY -> HAVING -> **SELECT** -> ORDER BY -> LIMIT. This is why an alias defined in `SELECT` cannot be used in `WHERE` — the alias doesn't exist until after `WHERE` has already filtered the rows.

        - question: |
            What does `SELECT name, gpa FROM students` do?
          type: single
          options:
            - "It filters the table to only include rows that have a name and a gpa"
            - "It returns all rows but only the name and gpa columns"
            - "It creates new columns called name and gpa"
            - "It sorts the table by name and then by gpa"
          correct_index: 1
          explanation: |
            `SELECT` projects (selects) **columns**, not rows. `SELECT name, gpa FROM students` returns all rows but shows only the `name` and `gpa` columns. To filter *rows*, you need a `WHERE` clause. This is a common point of confusion — `SELECT` chooses columns, `WHERE` chooses rows.

  # --------------------------------------------------------------------------
  # STEP 3: GROUP BY + HAVING — the reduce() of SQL
  # Added: generation challenge, Investigate prompt, metacognitive prompt
  # Bloom's: Apply / Analyze
  # --------------------------------------------------------------------------
  - title: "Aggregating Data"
    instructions: |
      ## GROUP BY — The reduce() of SQL

      > **Learning objective:** After this step you will be able to **write** aggregate queries using `COUNT`, `AVG`, and `SUM` with `GROUP BY`, and **explain** why `HAVING` is needed instead of `WHERE` for aggregate conditions.

      ### Generation challenge

      Using what you know so far, how would you find out *how many students are in each major*? Try writing a query — even a wrong one — before reading further. (Hint: there is no way to do this with just SELECT and WHERE. You need something new.)

      ### Aggregation maps to reduce()

      JavaScript's `.reduce()` collapses a collection into a single value:

      ```javascript
      const total = students.reduce((sum, s) => sum + s.gpa, 0);
      ```

      SQL's `GROUP BY` does the same, but computes aggregates **per group** in one query:

      ```sql
      -- Sub-goal: Choose grouping column and aggregate functions
      SELECT   major,
               COUNT(*) AS student_count,
               AVG(gpa)  AS avg_gpa
      -- Sub-goal: Specify the source table
      FROM     students
      -- Sub-goal: Define how rows are grouped
      GROUP BY major;
      ```

      If you know pandas, the mapping is tight:

      | SQL | pandas |
      |-----|--------|
      | `SELECT major, COUNT(*) FROM students GROUP BY major` | `students.groupby('major').size()` |
      | `SELECT major, AVG(gpa) FROM students GROUP BY major` | `students.groupby('major')['gpa'].mean()` |
      | `... HAVING AVG(gpa) > 3.3` | `result[result > 3.3]` (filter after `.mean()`) |

      ### The GROUP BY rule

      Every column in `SELECT` must be either:
      1. Listed in `GROUP BY` (a grouping column), or
      2. Inside an aggregate function (`COUNT`, `AVG`, `SUM`, `MIN`, `MAX`)

      ```sql
      -- WRONG: name is in SELECT but not in GROUP BY and not aggregated
      SELECT major, name, COUNT(*) FROM students GROUP BY major;

      -- RIGHT
      SELECT major, COUNT(*) AS n FROM students GROUP BY major;
      ```

      Research on SQL errors shows that illegal or insufficient grouping is the single most frequent type of error in aggregate queries. The rule is strict: if you `GROUP BY major`, then `name` is undefined (there are multiple names per major). SQLite silently picks an arbitrary row instead of raising an error — PostgreSQL and strict-mode MySQL correctly reject this.

      ### WHERE vs HAVING — the most common mistake

      `WHERE` filters individual rows **before** grouping. `HAVING` filters groups **after** aggregation. You cannot use aggregate functions inside `WHERE`.

      ```sql
      -- Sub-goal: Filter rows before grouping
      -- Sub-goal: Group and aggregate
      -- Sub-goal: Filter groups after aggregation
      SELECT   major, COUNT(*) AS n
      FROM     students
      WHERE    year > 1             -- filter individual rows first
      GROUP BY major
      HAVING   COUNT(*) >= 2;       -- filter groups after counting
      ```

      `WHERE AVG(gpa) > 3.5` is always an error. The average doesn't exist yet when `WHERE` runs.

      ### COUNT(*) vs COUNT(column)

      - `COUNT(*)` — counts every row in the group, including rows with NULL in other columns
      - `COUNT(gpa)` — counts only rows where `gpa` is **not NULL**

      ### Task

      Write two aggregate queries in `aggregate.sql`:

      1. Count students per major, ordered by count descending
      2. The average GPA per major — but only include majors where the average GPA is above 3.3

      After finishing, **investigate**: modify Query 2 to use `WHERE AVG(gpa) > 3.3` instead of `HAVING`. What error do you get? This is the single most common aggregation mistake.

    files:
      - path: "aggregate.sql"
        content: |
          -- Query 1: count students per major, most students first

          -- Query 2: average GPA per major, only majors with avg GPA > 3.3
          -- Use GROUP BY, AVG(), and HAVING
        language: "sql"

    open_file: "aggregate.sql"

    solution:
      files:
        - path: "aggregate.sql"
          content: |
            -- Query 1: count students per major, most students first
            SELECT major, COUNT(*) AS student_count
            FROM students
            GROUP BY major
            ORDER BY student_count DESC;

            -- Query 2: average GPA per major, only where avg > 3.3
            SELECT major, AVG(gpa) AS avg_gpa
            FROM students
            GROUP BY major
            HAVING AVG(gpa) > 3.3;
          language: "sql"
      explanation: |
        **Query 1** produces 4 groups: CS (4), Math (2), Physics (2), and NULL (1). The `ORDER BY student_count DESC` sorts by the alias.

        **Query 2** returns only CS (avg 3.575). The other majors fall below 3.3. Note: you must use `HAVING` (not `WHERE`) because `AVG(gpa)` is an aggregate that doesn't exist until after grouping.

    tests:
      - description: "aggregate.sql uses GROUP BY"
        command: |
          var src = __read_file('aggregate.sql').toLowerCase();
          assert(src.indexOf('group by') !== -1, "Your queries should use GROUP BY to aggregate data");
      - description: "aggregate.sql uses HAVING"
        command: |
          var src = __read_file('aggregate.sql').toLowerCase();
          assert(src.indexOf('having') !== -1, "Query 2 should use HAVING to filter groups by aggregate condition");
      - description: "4 groups exist (CS, Math, Physics, and one NULL major)"
        command: |
          var rows = __run_query("SELECT major, COUNT(*) AS n FROM students GROUP BY major ORDER BY n DESC");
          assert(rows.length === 4, "Expected 4 groups: CS (4), Math (2), Physics (2), and NULL (1)");
      - description: "CS has the most students (4) and appears first"
        command: |
          var rows = __run_query("SELECT major, COUNT(*) AS n FROM students GROUP BY major ORDER BY n DESC");
          assert(rows[0].major === 'CS' && rows[0].n === 4, "CS should have 4 students and appear first");
      - description: "Only CS has an average GPA above 3.3"
        command: |
          var rows = __run_query("SELECT major FROM students GROUP BY major HAVING AVG(gpa) > 3.3");
          assert(rows.length === 1, "Expected 1 major with average GPA > 3.3 (only CS at 3.575)");
          assert(rows[0].major === 'CS', "CS (avg 3.575) is the only major above 3.3");

    quiz:
      title: "Aggregation — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            A student writes:
            ```sql
            SELECT major, name, COUNT(*) AS n
            FROM students
            GROUP BY major;
            ```
            What is wrong?
          type: single
          options:
            - "COUNT(*) is not a valid aggregate function"
            - "`name` is in SELECT but not in GROUP BY or inside an aggregate — this violates the grouping rule"
            - "GROUP BY must appear before SELECT in the written query"
            - "You cannot mix a non-aggregate column and an aggregate in the same SELECT"
          correct_index: 1
          explanation: |
            The **grouping rule**: every column in `SELECT` must either appear in `GROUP BY` or be wrapped in an aggregate. `name` is neither — there are multiple names per major, so it's undefined which one to return. SQLite may pick an arbitrary name; PostgreSQL and strict-mode MySQL reject this entirely.

        - question: |
            Which clause filters **groups** based on an aggregate condition?
          type: single
          options:
            - "`WHERE`"
            - "`HAVING`"
            - "`FILTER`"
            - "`SELECT ... WHERE`"
          correct_index: 1
          explanation: |
            `WHERE` filters individual rows *before* grouping. `HAVING` filters groups *after* aggregation. `WHERE COUNT(*) > 5` is always an error because the count doesn't exist yet when `WHERE` runs. Use `HAVING COUNT(*) > 5`.

        - question: |
            If 3 out of 10 students have a NULL value in the `gpa` column, what does each of these return?
            `COUNT(*)` vs `COUNT(gpa)`
          type: single
          options:
            - "Both return 10 — COUNT always includes every row"
            - "Both return 7 — COUNT skips NULL rows"
            - "`COUNT(*)` returns 10; `COUNT(gpa)` returns 7"
            - "`COUNT(*)` returns 7; `COUNT(gpa)` returns 10"
          correct_index: 2
          explanation: |
            `COUNT(*)` counts every row regardless of NULLs. `COUNT(column)` counts only rows where that column is **not NULL**. The distinction is critical whenever a column is optional — use the right one depending on whether you want to count the group size or the number of known values.

        - question: |
            A query uses `WHERE year > 2` to filter rows before grouping. If a student has `year` set to NULL, are they included in the grouped results?
          type: single
          options:
            - "Yes — NULL is treated as 0, which is not greater than 2"
            - "Yes — WHERE passes all rows to GROUP BY by default"
            - "No — `NULL > 2` evaluates to UNKNOWN, and WHERE discards UNKNOWN rows before grouping"
            - "It depends on the database engine"
          correct_index: 2
          explanation: |
            Remember from Step 2: any comparison with NULL yields UNKNOWN, and WHERE only keeps rows where the predicate is TRUE. So `NULL > 2` evaluates to UNKNOWN, and the row is silently dropped **before grouping even begins**. This means your counts and averages may not include every row in the table — always consider whether NULL values in filtered columns affect your aggregates.

