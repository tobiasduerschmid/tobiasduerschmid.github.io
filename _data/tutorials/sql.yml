title: "SQL Essentials"
description: "A hands-on introduction to SQL using SQLite, running entirely in your browser. Start by querying an existing database, then learn to filter, aggregate, create your own tables, and modify data — no installation required."

backend: sql

require_tests: true
autosave_type: files

# Pre-populate students + majors tables that query steps read from.
# Safe to re-run: DROP TABLE IF EXISTS handles re-loads.
setup_commands:
  - |
    DROP TABLE IF EXISTS students;
    CREATE TABLE students (
      id      INTEGER PRIMARY KEY,
      name    TEXT    NOT NULL,
      year    INTEGER,
      major   TEXT,
      gpa     REAL
    );
    INSERT INTO students VALUES
      (1, 'Mango',      2, 'CS',      3.90),
      (2, 'Watermelina',3, 'Math',    3.40),
      (3, 'Bananito',   1, 'CS',      3.70),
      (4, 'Coconick',   4, 'Physics', 2.80),
      (5, 'Kiwi',       2, 'CS',      3.50),
      (6, 'Grapenzo',   3, 'Math',    3.10),
      (7, 'Cherrita',   1, 'Physics', 3.60),
      (8, 'Orangelo',   4, 'CS',      3.20),
      (9, 'Blue Bella', 3, NULL,      3.00);

    DROP TABLE IF EXISTS majors;
    CREATE TABLE majors (
      code       TEXT PRIMARY KEY,
      department TEXT NOT NULL,
      advisor    TEXT NOT NULL
    );
    INSERT INTO majors VALUES
      ('CS',      'Engineering',   'Dr. Hopper'),
      ('Math',    'Sciences',      'Dr. Noether'),
      ('Physics', 'Sciences',      'Dr. Curie'),
      ('Bio',     'Life Sciences', 'Dr. McClintock');

steps:

  # --------------------------------------------------------------------------
  # STEP 1: SELECT — exploring an existing table
  # Pedagogy: Conceptual before Procedural, PRIMM, low intrinsic load
  # Growth mindset: normalize struggle at the start
  # Bloom's: Remember / Understand / Apply
  # --------------------------------------------------------------------------
  - title: "Exploring Data"
    instructions: |
      ## Describe What You Want, Not How

      > **Learning objective:** After this step you will be able to **retrieve the specific slice of an existing dataset that a caller actually needs**, and **explain** why *describing what you want* (declarative) scales better than *describing how to compute it* (imperative).

      In Python or JavaScript, you tell the machine *how* to solve a problem step by step. In SQL, you describe *what* you want, and the database engine figures out the rest. This **imperative → declarative** shift is the most important idea in this tutorial.

      If it feels strange, that is normal — even experienced developers need time to rewire.

      ### The students table

      A `students` table is set up for you. Schema (keep handy):

      | Column | Type    | Constraints |
      |--------|---------|-------------|
      | `id`   | INTEGER | PRIMARY KEY |
      | `name` | TEXT    | NOT NULL    |
      | `year` | INTEGER |             |
      | `major`| TEXT    |             |
      | `gpa`  | REAL    |             |

      9 rows. Your first task: explore it.

      ### SELECT — reading data

      ```sql
      -- Sub-goal: explore the whole table (good for learning, not production)
      SELECT * FROM students;

      -- Sub-goal: project only the columns the caller needs
      SELECT name, gpa FROM students;
      ```

      `SELECT` names the columns; `FROM` names the table; `*` means "all columns".

      `SELECT *` is fine when exploring — but in production code, **always list the columns you need**. It prevents bugs when the schema changes and reduces data transferred. Think of `import *` in Python: convenient at the REPL, dangerous in a real project.

      `SELECT` is a projection — like Python's `[s['name'] for s in students]` or JS's `.map(s => s.name)`. The mapping to pandas is especially tight:

      | SQL | pandas | Notice |
      |-----|--------|--------|
      | `SELECT * FROM students` | `students` | 9 rows, 5 columns |
      | `SELECT name, gpa FROM students` | `students[['name','gpa']]` | Same 9 rows, 2 columns |

      **Two things that are not like a Python list:** (1) rows come back in *no guaranteed order* — there is no "row 0"; if order matters, you will ask for it in Step 3. (2) Every row has exactly the declared columns and types — values can be `NULL` (unknown), but a column cannot disappear.

      ### Predict → Run → Investigate → Modify

      This tutorial uses a **PRIMM** rhythm in every step: you **Predict** before you run, **Run** to compare, **Investigate** a small tweak, then **Modify** the code to fix the bug. The real skill gap is diagnosing *why* a query is wrong — not recalling syntax.

      **Predict.** Before clicking Run: how many rows will `SELECT * FROM students` return? How many columns?

      **Task — Run and Modify.** Open `query.sql`. Two working queries; neither errors out, but each is the *wrong tool for its stated job*.

      - **Query 1 — exploration.** `SELECT *` is correct here. Write your row/column prediction as a comment, then Run and verify.
      - **Query 2 — production.** It works, but fetches more columns than needed. Tighten it to return **only** `name` and `major`, and add a one-line comment explaining why specific-column selects are safer than `SELECT *`.

      **Investigate (optional).** After both pass, append `SELECT major, name FROM students`. Does the output order of the columns change? This kind of tinkering builds intuition faster than reading.

    files:
      - path: "query.sql"
        content: |
          -- Step 1 — Exploring data with SELECT
          -- Two queries below. Predict, then run and verify.

          -- Query 1: exploration. Runs correctly.
          -- Predict the row count and column count on the next line.
          SELECT * FROM students;

          -- Query 2: works, but not production-quality.
          -- It fetches more columns than the caller needs.
          -- Tighten it to return only name and major, and add a one-line
          -- comment explaining why specific columns are safer than SELECT *.
          SELECT id, name, year, major, gpa FROM students;
        language: "sql"

    open_file: "query.sql"

    solution:
      files:
        - path: "query.sql"
          content: |
            -- All columns, all rows
            SELECT * FROM students;

            -- Only name and major
            SELECT name, major FROM students;
          language: "sql"
      explanation: |
        `SELECT *` returns all 9 rows and all 5 columns. `SELECT name, major` returns the same 9 rows but only 2 columns. `SELECT` chooses **columns**, not rows — to choose rows you will need `WHERE` (Step 3).

    tests:
      - description: "query.sql contains a SELECT * query"
        command: |
          // Strip SQL line-comments so matches in comments don't produce false positives.
          var src = __read_file('query.sql').toLowerCase().split('\n').filter(function(l){ return l.trim().indexOf('--') !== 0; }).join('\n');
          assert(/\bselect\s*\*/i.test(src), "query.sql should contain a SELECT * query to retrieve all columns");
        hints:
          - text: "To see everything in a table, you need a keyword that means 'all columns'. What single character could replace listing every column name?"
            condition: "code_missing: select"
          - text: "Your SELECT is there — one of your queries should retrieve *all* columns, not just specific ones."
            condition: "code_contains: select"
      - description: "query.sql contains a SELECT that projects only name and major"
        command: |
          var src = __read_file('query.sql').toLowerCase().split('\n').filter(function(l){ return l.trim().indexOf('--') !== 0; }).join('\n');
          // Look for a SELECT statement that names both 'name' and 'major' but NOT 'id', 'year', or 'gpa'.
          var matches = src.match(/select\s+([^;]*?)\s+from\s+students/g) || [];
          var tight = matches.some(function(stmt){
            var cols = stmt.replace(/select\s+/, '').replace(/\s+from.*/, '');
            return cols.indexOf('name') !== -1 && cols.indexOf('major') !== -1
                && cols.indexOf('*') === -1
                && cols.indexOf('id') === -1
                && cols.indexOf('year') === -1
                && cols.indexOf('gpa') === -1;
          });
          assert(tight, "One SELECT should project only the name and major columns — no others, no wildcard.");
        hints:
          - text: "For Query 2, list only the column names the caller actually needs. The schema table above lists every column."
            condition: "code_missing: name"
          - text: "You have 'name' and 'major' — but your SELECT still includes other columns. Drop the ones the caller did not ask for."
            condition: "code_contains: name"
          - text: "Still using `*`? That is the habit you are being asked to break here. Replace the wildcard with an explicit column list."
            condition: "code_contains: *"
      - description: "students table has the expected 9 rows"
        command: |
          var rows = __run_query("SELECT COUNT(*) AS n FROM students");
          assert(rows[0].n === 9, "The students table should have 9 rows");
      - description: "students table has the expected 5 columns"
        command: |
          var info = __run_query("PRAGMA table_info(students)");
          var names = info.map(function(r){ return r.name; }).sort().join(',');
          assert(info.length === 5, "students should have 5 columns, got " + info.length);
          assert(names === 'gpa,id,major,name,year', "students columns should be id, name, year, major, gpa — got: " + names);

    quiz:
      title: "Exploring Data — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            A Python programmer says: *"A SQL table is just like a Python list of dictionaries."*
            What is the most important difference they are missing?
          type: single
          options:
            - "SQL tables are stored on disk; Python lists live in memory"
            - "SQL tables enforce a rigid schema with fixed types, and rows have no guaranteed order"
            - "SQL tables cannot be modified after creation"
            - "Python lists can hold more data than SQL tables"
          correct_index: 1
          explanation: |
            SQL tables have a **rigid schema** and **no guaranteed row order**. The other options are false or irrelevant.

        - question: |
            Without an `ORDER BY` clause, in what order does SQL return rows?
          type: single
          options:
            - "In insertion order — the order rows were added"
            - "In primary key order — ascending by id"
            - "Alphabetically by the first column"
            - "In no guaranteed order — the database may return rows in any sequence"
          correct_index: 3
          explanation: |
            A SQL table is a **set**, not a list. Without `ORDER BY`, order depends on storage and query plan — never rely on it.

        - question: |
            In Python you write `students[0]` to get the first student. What is the SQL equivalent?
          type: single
          options:
            - "`SELECT * FROM students WHERE id = 0`"
            - "`SELECT * FROM students[0]`"
            - "There is no equivalent — SQL rows have no position, you filter by content"
            - "`SELECT FIRST FROM students`"
          correct_index: 2
          explanation: |
            SQL rows have no position — you identify them by their **content** (`WHERE` clause), not by an index.

        - question: |
            **Arrange** the fragments to write a query that retrieves only the `name` and `gpa` columns from the `students` table.
          type: parsons
          display: inline
          lines:
            - "SELECT "
            - "name, gpa "
            - "FROM "
            - "students;"
          distractors:
            - "WHERE "
            - "* "
          explanation: |
            `SELECT` names the columns, `FROM` names the table. `*` is wrong (not just those two); `WHERE` filters rows, not columns.

  # --------------------------------------------------------------------------
  # STEP 2: JOIN — combining rows from two tables
  # Pedagogy: Threshold concept (set-based combination). PRIMM. Lean syntax:
  #   INNER JOIN + ON + table aliases only. LEFT JOIN mentioned but not drilled.
  # Negative-transfer target: Cartesian-product trap (missing ON).
  # Bloom's: Understand / Apply / Analyze
  # --------------------------------------------------------------------------
  - title: "Joining Tables"
    instructions: |
      ## JOIN — Combining Tables by a Shared Key

      > **Learning objective:** After this step you will be able to **answer questions that span two tables** — like *"who is Mango's advisor?"* — by combining rows on a shared key, and **recognize** when a query has accidentally paired every row with every row.

      Real data is rarely in one table. The `students` table has a `major` column (`'CS'`, `'Math'`, ...), but the *department* and *advisor* for each major live in a separate `majors` table:

      | `majors.code` | `majors.department` | `majors.advisor` |
      |---------------|---------------------|------------------|
      | CS            | Engineering         | Dr. Hopper       |
      | Math          | Sciences            | Dr. Noether      |
      | Physics       | Sciences            | Dr. Curie        |
      | Bio           | Life Sciences       | Dr. McClintock   |

      To answer *"who is Mango's advisor?"*, you need both tables. `JOIN` combines them on a shared column — here, `students.major = majors.code`.

      ### INNER JOIN syntax

      ```sql
      -- Sub-goal: name the driving table and give it a short alias
      SELECT s.name, m.department, m.advisor
      FROM students AS s
      -- Sub-goal: attach the second table on the shared key
      INNER JOIN majors AS m ON s.major = m.code;
      ```

      - **Aliases (`AS s`, `AS m`)** are not optional once more than one table is in play — without them you write `students.name` everywhere, and self-joins are impossible. Treat aliases as mandatory from day one.
      - **`ON`** states the relationship. It is a predicate, evaluated per-pair.
      - **`INNER`** is the default and can be omitted, but writing it makes the intent explicit.

      `INNER JOIN` keeps only rows where the `ON` predicate is true for *both* sides. Blue Bella's major is `NULL`, so she has no match in `majors` and drops out. `'Bio'` exists in `majors` but no student has it, so it too drops out. This is a feature, not a bug — but it is easy to forget.

      ### The Cartesian-product trap

      If you list two tables but forget the `ON` clause, the database has no rule for pairing rows — so it pairs *every* row with *every* row. 9 students × 4 majors = 36 rows of mostly-nonsense.

      ```sql
      -- WRONG: no ON clause — produces 9 × 4 = 36 rows
      SELECT s.name, m.advisor FROM students s, majors m;
      ```

      The old comma-join syntax (`FROM a, b WHERE a.x = b.y`) makes this trap even easier to fall into — delete the `WHERE` during a refactor and silently ship a Cartesian product. Use the explicit `INNER JOIN ... ON ...` form so the relationship and the filter are separate.

      *There are other join types (`LEFT JOIN` keeps unmatched rows from the left side, useful when you want to include Blue Bella even without a major). Mentioning it here so the word rings a bell later — you do not need it for this step.*

      ### Predict → Run → Investigate → Modify

      **Predict.** Before opening the file: if you `INNER JOIN` `students` to `majors` on `major = code`, how many rows come back? Remember Blue Bella (NULL major) and Bio (no students).

      **Task — Run and Modify.** `joins.sql` contains two queries — one silently broken, one that runs but leaks too much data.

      - **Query 1 — the Cartesian trap.** Runs without error but returns 36 rows instead of the ~8 you expected. Find the missing piece and convert it to explicit `INNER JOIN ... ON ...`.
      - **Query 2 — over-selection.** Works, but returns every column from both tables. Tighten it to project just the student name and their advisor, using aliases.

      **Investigate (optional).** After Query 1 passes, count how many students appear in the result. Is Blue Bella there? Why not? (Write the answer as a one-line comment — forces retrieval.)

    files:
      - path: "joins.sql"
        content: |
          -- Step 2 — Joining students to majors
          -- Predict row counts before you run.

          -- Query 1: intended "student name + advisor" — returns 36 rows.
          -- Identify the bug, then rewrite as an explicit INNER JOIN ... ON.
          SELECT s.name, m.advisor
          FROM students s, majors m;

          -- Query 2: works but over-selects.
          -- Tighten to project only student name and advisor, using aliases.
          SELECT *
          FROM students
          INNER JOIN majors ON students.major = majors.code;
        language: "sql"

    open_file: "joins.sql"

    solution:
      files:
        - path: "joins.sql"
          content: |
            -- Query 1: student name + advisor, explicit INNER JOIN
            SELECT s.name, m.advisor
            FROM students AS s
            INNER JOIN majors AS m ON s.major = m.code;

            -- Query 2: same shape, tightened to two columns with aliases
            SELECT s.name, m.advisor
            FROM students AS s
            INNER JOIN majors AS m ON s.major = m.code;
          language: "sql"
      explanation: |
        Both queries return 8 rows (all students except Blue Bella, whose `major` is NULL and has no match). The explicit `INNER JOIN ... ON` form makes the relationship visible and survives refactors — the old comma-join + `WHERE` form silently becomes a Cartesian product if the `WHERE` is removed.

    tests:
      - description: "joins.sql uses explicit INNER JOIN ... ON syntax"
        command: |
          var src = __read_file('joins.sql').toLowerCase().split('\n').filter(function(l){ return l.trim().indexOf('--') !== 0; }).join('\n');
          assert(/\bjoin\b/.test(src), "Your queries must use JOIN to combine students and majors");
          assert(/\bon\b/.test(src), "Every JOIN needs an ON clause — without it you get a Cartesian product");
          // Disallow the implicit comma-join form.
          assert(!/from\s+students\s*,\s*majors/.test(src) && !/from\s+majors\s*,\s*students/.test(src),
            "Use explicit INNER JOIN ... ON instead of the comma-join form (FROM students, majors)");
        hints:
          - text: "The comma form `FROM students, majors` is exactly the trap Query 1 starts from. What keyword replaces the comma, and what keyword names the relationship?"
            condition: "code_missing: join"
          - text: "You have JOIN — but every JOIN needs a predicate that says *how* the two tables line up. Which keyword introduces that predicate?"
            condition: "code_missing: on"
          - text: "Looks like you still have a comma between the two table names. Delete it and use JOIN ... ON instead — that is the whole point of the refactor."
            condition: "code_contains: ,"
      - description: "joins.sql tightens the second query to name + advisor only"
        command: |
          var src = __read_file('joins.sql').toLowerCase().split('\n').filter(function(l){ return l.trim().indexOf('--') !== 0; }).join('\n');
          // At least one JOIN statement must project exactly name + advisor (no *, no extra cols).
          var stmts = src.match(/select\s+[\s\S]*?from[\s\S]*?(?:;|$)/g) || [];
          var tight = stmts.some(function(stmt){
            var cols = (stmt.match(/select\s+([\s\S]*?)\s+from/) || [])[1] || '';
            return cols.indexOf('name') !== -1 && cols.indexOf('advisor') !== -1
                && cols.indexOf('*') === -1
                && cols.indexOf('gpa') === -1
                && cols.indexOf('department') === -1
                && /join/.test(stmt);
          });
          assert(tight, "One JOIN query should project only the student name and advisor — no wildcards, no extra columns.");
        hints:
          - text: "Query 2 still uses `SELECT *`. Replace the wildcard with the two columns the caller actually needs."
            condition: "code_contains: *"
          - text: "When two tables both have columns like 'name', SQL needs to know which table. Prefix each column with its table alias."
            condition: "code_missing: advisor"
      - description: "Query produces 8 rows (all students with a matching major)"
        command: |
          var rows = __run_query("SELECT s.name, m.advisor FROM students s INNER JOIN majors m ON s.major = m.code");
          assert(rows.length === 8, "Expected 8 rows — every student except Blue Bella (whose major is NULL). Got " + rows.length);
      - description: "Blue Bella is excluded because her major is NULL (no match in majors)"
        command: |
          var rows = __run_query("SELECT s.name FROM students s INNER JOIN majors m ON s.major = m.code WHERE s.name = 'Blue Bella'");
          assert(rows.length === 0, "Blue Bella should NOT appear — INNER JOIN drops rows whose join key has no match");
      - description: "Mango's advisor is Dr. Hopper (smoke test the relationship)"
        command: |
          var rows = __run_query("SELECT m.advisor FROM students s INNER JOIN majors m ON s.major = m.code WHERE s.name = 'Mango'");
          assert(rows.length === 1 && rows[0].advisor === 'Dr. Hopper', "Mango's advisor should be Dr. Hopper (CS → Dr. Hopper)");

    quiz:
      title: "Joining Tables — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            You write `SELECT * FROM students s, majors m;` with no `WHERE` or `ON`. What do you get?
          type: single
          options:
            - "An error — SQL requires an ON clause"
            - "Only rows where students.major equals majors.code"
            - "Every student paired with every major — a Cartesian product"
            - "An empty result set"
          correct_index: 2
          explanation: |
            With no join predicate, SQL pairs every row from `students` with every row from `majors`: 9 × 4 = 36 rows. This is the #1 accidental bug in multi-table queries.

        - question: |
            An `INNER JOIN ... ON s.major = m.code` between `students` (9 rows) and `majors` (4 rows) returns 8 rows. Why not 9?
          type: single
          options:
            - "INNER JOIN always drops one row"
            - "One student has a NULL major, which matches nothing"
            - "One major has no students — and that row drops"
            - "Aliases hide one row from the output"
          correct_index: 1
          explanation: |
            `INNER JOIN` keeps only pairs where the `ON` predicate is TRUE for both sides. Blue Bella has `major = NULL`; `NULL = anything` is UNKNOWN, so she has no match and drops.

        - question: |
            **Arrange** the fragments to list each student's name and their department.
          type: parsons
          lines:
            - "SELECT s.name, m.department"
            - "FROM students AS s"
            - "INNER JOIN majors AS m"
            - "ON s.major = m.code;"
          distractors:
            - "FROM students, majors"
            - "WHERE s.major = m.code"
          explanation: |
            The comma form + `WHERE` is the old trap. Use explicit `INNER JOIN ... ON` so the relationship is visible and survives refactors.

        - question: |
            Why are table aliases (`AS s`, `AS m`) strongly recommended even in simple two-table joins?
          type: single
          options:
            - "SQL refuses to run without them"
            - "They make the query shorter and disambiguate columns like `name` that exist in both tables"
            - "They improve performance"
            - "They prevent NULL values"
          correct_index: 1
          explanation: |
            Aliases disambiguate same-named columns (both tables could have `name`) and keep queries readable. They are also required for self-joins.

  # --------------------------------------------------------------------------
  # STEP 3: WHERE + ORDER BY — declarative filtering and sorting
  # Audit fix: Moved error taxonomy out (was overloading this step).
  #   Now focuses on WHERE, ORDER BY, NULL/3VL only (~4 interacting elements).
  # Added: = vs == negative transfer, single-quote convention,
  #   Investigate/Modify (PRIMM), metacognitive prompt
  # Bloom's: Apply / Analyze
  # --------------------------------------------------------------------------
  - title: "Filtering & Sorting"
    instructions: |
      ## WHERE and ORDER BY — The filter() and sort() of SQL

      > **Learning objective:** After this step you will be able to **narrow a result set to exactly the rows that answer a specific question**, **order** the output for presentation, and **avoid the silent bugs** that unknown values (NULL) introduce into filters.

      NULL/3VL is genuinely difficult. If it feels confusing, you are in good company — experienced developers still get tripped up by it.

      ### SQL's functional cousins

      You already know JavaScript's array methods — pandas' mapping is even closer:

      | JavaScript | pandas | SQL |
      |---|---|---|
      | `arr.filter(x => x.gpa > 3.5)` | `df[df['gpa'] > 3.5]` | `WHERE gpa > 3.5` |
      | `arr.map(x => x.name)` | `df[['name']]` | `SELECT name` |
      | `arr.sort((a,b) => b.gpa - a.gpa)` | `df.sort_values('gpa', ascending=False)` | `ORDER BY gpa DESC` |

      A `SELECT` query is roughly `.filter().map().sort()` chained — but declarative, with the optimizer picking the execution strategy.

      ### WHERE predicates

      ```sql
      -- Sub-goal: numeric comparison
      WHERE gpa >= 3.5
      -- Sub-goal: string equality (single quotes, not double)
      WHERE major = 'CS'
      -- Sub-goal: compound predicate
      WHERE major = 'CS' AND gpa > 3.7
      -- Sub-goal: set membership
      WHERE major IN ('CS', 'Math')
      -- Sub-goal: pattern match (% = any characters)
      WHERE name LIKE 'A%'
      ```

      Two syntax traps for Python/JS developers:
      - **Single quotes for strings.** `'CS'`, not `"CS"`. Double quotes quote *identifiers* in SQL.
      - **Single `=` for equality.** `=`, not `==`. `WHERE major == 'CS'` is a syntax error.

      ### NULL and Three-Valued Logic — the biggest trap

      SQL booleans are **three-valued**: `TRUE`, `FALSE`, and `UNKNOWN`. `NULL` means *unknown value* — comparing anything to `NULL` (even another `NULL`) yields `UNKNOWN`:

      ```sql
      -- WRONG: silently excludes rows where major is NULL
      WHERE major != 'CS'

      -- RIGHT: explicitly handle NULL
      WHERE major != 'CS' OR major IS NULL

      -- Testing for NULL
      WHERE major IS NULL       -- value is unknown
      WHERE major IS NOT NULL   -- value is known
      ```

      `WHERE` keeps rows where the predicate is `TRUE`. Rows evaluating to `UNKNOWN` are silently discarded. In Python, `None != "Active"` is `True`; in SQL, `NULL != 'Active'` is `UNKNOWN`.

      pandas' `NaN` behaves closer to SQL (`df[df['col'] != 'CS']` excludes NaN), but the idiomatic test is `df['col'].isna()` ≡ `col IS NULL`.

      ### ORDER BY

      ```sql
      SELECT name, gpa FROM students
      ORDER BY gpa DESC;   -- highest first (ASC is the default)
      ```

      `ORDER BY` is the **only guarantee of row order**. Without it, order is whatever the engine finds convenient.

      ### Predict → Run → Investigate → Modify

      **Predict.** Before opening the file: how would you retrieve only the CS students? Write your guess — even a wrong one helps the explanation stick.

      **Task — Run and Modify.** `filter.sql` has **three broken queries**. Each fails in a different way. For each one:

      1. **Predict** what the query actually returns (or what error it raises) *before* you run it.
      2. **Classify** the bug — **syntax** (grammar), **semantic** (valid SQL, wrong reference), or **logical** (runs fine, wrong rows). Write the classification as a comment.
      3. **Fix** the query so it answers the intended question.

      Logical errors (category 3) are the hardest and most persistent class of SQL mistakes in the research literature. Query 3 is deceptively easy — the bug only appears when you reason about NULL carefully.

      **Investigate.** After Query 3 passes, comment out your `IS NULL` branch and re-run. How many rows now? Where did Blue Bella go? This one-line toggle makes the NULL trap concrete.

    files:
      - path: "filter.sql"
        content: |
          -- Step 3 — Filtering rows with WHERE and sorting with ORDER BY
          -- Three broken queries. Classify each as syntax / semantic / logical, then fix.

          -- Query 1. Intended: CS students with GPA above 3.5, highest GPA first.
          -- Runs without error, but returns the wrong rows in the wrong order.
          -- Two independent bugs hide here. Find both, classify them, then fix.
          SELECT * FROM students
          WHERE major = 'CS' OR gpa > 3.5
          ORDER BY gpa ASC;

          -- Query 2. Intended: students in year 1 or year 2.
          -- Runs without error. Why does it return zero rows?
          SELECT * FROM students
          WHERE year = 1 AND year = 2;

          -- Query 3. Intended: students whose major is NOT 'CS'.
          -- Runs without error, but quietly drops a student. Who, and why?
          -- Hint: one student has a NULL major. Reason about 3VL before fixing.
          SELECT * FROM students
          WHERE major != 'CS';
        language: "sql"

    open_file: "filter.sql"

    solution:
      files:
        - path: "filter.sql"
          content: |
            -- Query 1: CS students with GPA > 3.5, highest GPA first
            SELECT * FROM students
            WHERE major = 'CS' AND gpa > 3.5
            ORDER BY gpa DESC;

            -- Query 2: Students in year 1 or year 2
            SELECT * FROM students
            WHERE year = 1 OR year = 2;

            -- Query 3: Students NOT in CS (NULL-safe)
            SELECT * FROM students
            WHERE major != 'CS' OR major IS NULL;
          language: "sql"
      explanation: |
        **Query 1** returns Mango (3.9) and Bananito (3.7). `AND` combines both conditions; `ORDER BY gpa DESC` sorts highest first.

        **Query 2 — the "natural-language AND" trap.** In English, *"in year 1 and year 2"* means *"either"*. In SQL, `AND` requires **both conditions true in the same row** — impossible for a single column. This misconception is the most-cited language-based negative transfer in SQL research (Ahadi et al., 2016; Taipalus et al., 2018). Whenever a filter returns zero rows against a plausible question, check this trap first. You could also write `WHERE year IN (1, 2)`.

        **Query 3** is the NULL trap. Without `OR major IS NULL`, Blue Bella (whose major is NULL) is silently dropped. `NULL != 'CS'` evaluates to UNKNOWN, not TRUE, so WHERE discards her.

    tests:
      - description: "filter.sql uses WHERE clauses"
        command: |
          var src = __read_file('filter.sql').toLowerCase().split('\n').filter(function(l){ return l.trim().indexOf('--') !== 0; }).join('\n');
          assert(/\bwhere\b/.test(src), "Your queries should use WHERE clauses to filter rows");
        hints:
          - text: "SELECT chooses *columns*. To choose *rows* that match a condition, you need a different clause. Which one?"
            condition: "code_missing: where"
      - description: "filter.sql uses ORDER BY"
        command: |
          var src = __read_file('filter.sql').toLowerCase().split('\n').filter(function(l){ return l.trim().indexOf('--') !== 0; }).join('\n');
          assert(/\border\s+by\b/.test(src), "Query 1 should use ORDER BY to sort results");
        hints:
          - text: "Query 1 asks for results sorted by GPA. Without an explicit ordering clause, SQL returns rows in *no guaranteed sequence*."
            condition: "code_missing: order by"
          - text: "You have ORDER BY — but the task asks for *highest first*. Check whether you used ASC (the default) or the keyword that means descending."
            condition: "code_contains: order by"
      - description: "CS + GPA > 3.5 returns exactly Mango (3.9) then Bananito (3.7)"
        command: |
          var rows = __run_query("SELECT name, gpa FROM students WHERE major = 'CS' AND gpa > 3.5 ORDER BY gpa DESC");
          assert(rows.length === 2, "Expected 2 CS students with GPA > 3.5 (Mango, Bananito). Got " + rows.length);
          assert(rows[0].name === 'Mango' && rows[1].name === 'Bananito', "Expected order: Mango then Bananito (highest GPA first). Got: " + rows.map(function(r){return r.name;}).join(', '));
        hints:
          - text: "Two conditions must both be true for the same row: the major *and* the GPA threshold. What boolean operator enforces 'both'?"
            condition: "code_missing: and"
          - text: "Got zero rows with AND? Double-check that you did not combine it with an OR that widens the filter, and that the GPA comparison uses `>` on the right column."
            condition: "code_contains: and"
      - description: "Year 1 or year 2 returns 4 students (Bananito, Cherrita, Kiwi, Mango)"
        command: |
          var rows = __run_query("SELECT name FROM students WHERE year = 1 OR year = 2 ORDER BY name");
          assert(rows.length === 4, "Expected 4 students. Got " + rows.length + ". This is the 'natural-language AND' trap — re-read Query 2's comment.");
          var got = rows.map(function(r){return r.name;}).sort().join(',');
          assert(got === 'Bananito,Cherrita,Kiwi,Mango', "Expected Bananito, Cherrita, Kiwi, Mango. Got: " + got);
        hints:
          - text: "English 'and' is not the same as SQL `AND`. A single row cannot have `year = 1` and `year = 2` at the same time. Which operator means 'either condition matches'?"
            condition: "code_contains: and"
          - text: "`WHERE year IN (1, 2)` is a valid alternative if you prefer — both map to the same set-membership idea."
            condition: "code_missing: or"
      - description: "Non-CS students are returned NULL-safely (5 rows including Blue Bella)"
        command: |
          var src = __read_file('filter.sql').toLowerCase().split('\n').filter(function(l){ return l.trim().indexOf('--') !== 0; }).join('\n');
          assert(/\bis\s+null\b/.test(src), "Query 3 must handle NULL explicitly — `IS NULL` is the only portable test for unknown values");
          var rows = __run_query("SELECT name FROM students WHERE major != 'CS' OR major IS NULL ORDER BY name");
          assert(rows.length === 5, "Expected 5 non-CS students including Blue Bella (NULL major). Got " + rows.length);
          var names = rows.map(function(r){return r.name;}).sort().join(',');
          assert(names === 'Blue Bella,Cherrita,Coconick,Grapenzo,Watermelina', "Expected Blue Bella, Cherrita, Coconick, Grapenzo, Watermelina. Got: " + names);
        hints:
          - text: "Getting 4 rows instead of 5? One student has an unknown major. Comparing NULL to anything yields UNKNOWN, not TRUE — so plain `!=` silently drops that row."
            condition: "code_missing: is null"
          - text: "You're handling NULL — but check that your predicate covers *both* cases: rows where major is not CS, **and** rows where major is unknown. Combine them with OR."
            condition: "code_contains: is null"
          - text: "Avoid `= NULL` — it always evaluates to UNKNOWN and matches nothing. `IS NULL` is the portable, standard test."
            condition: "code_contains: = null"

    quiz:
      title: "Filtering & Sorting — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            A student writes:
            ```sql
            WHERE status != 'Active'
            ```
            The `status` column has some `NULL` values. What happens to those rows?
          type: single
          options:
            - "They are included — NULL is not equal to 'Active'"
            - "They are excluded — `NULL != 'Active'` evaluates to UNKNOWN, and WHERE discards UNKNOWN rows"
            - "They cause a runtime error"
            - "They are included only if NULL is explicitly listed as a valid status"
          correct_index: 1
          explanation: |
            In SQL's Three-Valued Logic (3VL), `NULL != 'Active'` evaluates to **UNKNOWN** — not TRUE. `WHERE` only keeps rows where the predicate is TRUE. Rows where the predicate is UNKNOWN are silently discarded. To include NULL rows, write: `WHERE status != 'Active' OR status IS NULL`.

        - question: |
            Which expression correctly tests whether a column value is missing (NULL)?
          type: single
          options:
            - "`WHERE credits = NULL`"
            - "`WHERE credits == NULL`"
            - "`WHERE credits IS NULL`"
            - "`WHERE ISNULL(credits) = 1`"
          correct_index: 2
          explanation: |
            `NULL = NULL` evaluates to UNKNOWN, not TRUE — so `WHERE credits = NULL` never matches any row. The only portable, standard-SQL way to test for NULL is `IS NULL`. `== NULL` is not valid SQL syntax (SQL uses `=`, not `==`). `ISNULL()` is a non-standard extension.

        - question: |
            In SQL's logical execution order, the `SELECT` clause is written first. When is it actually evaluated?
          type: single
          options:
            - "First — it defines what data to retrieve"
            - "Second — immediately after FROM determines the source table"
            - "Fifth — after FROM, WHERE, GROUP BY, and HAVING"
            - "Last — after ORDER BY and LIMIT"
          correct_index: 2
          explanation: |
            `SELECT` is evaluated **fifth**: FROM -> WHERE -> GROUP BY -> HAVING -> **SELECT** -> ORDER BY -> LIMIT. This is why an alias defined in `SELECT` cannot be used in `WHERE` — the alias doesn't exist until after `WHERE` has already filtered the rows.

        - question: |
            What does `SELECT name, gpa FROM students` do?
          type: single
          options:
            - "It filters the table to only include rows that have a name and a gpa"
            - "It returns all rows but only the name and gpa columns"
            - "It creates new columns called name and gpa"
            - "It sorts the table by name and then by gpa"
          correct_index: 1
          explanation: |
            `SELECT` projects (selects) **columns**, not rows. `SELECT name, gpa FROM students` returns all rows but shows only the `name` and `gpa` columns. To filter *rows*, you need a `WHERE` clause. This is a common point of confusion — `SELECT` chooses columns, `WHERE` chooses rows.

        - question: |
            **Arrange** the clauses to find CS students with GPA above 3.5, sorted highest first.
          type: parsons
          lines:
            - "SELECT name, gpa"
            - "FROM students"
            - "WHERE major = 'CS' AND gpa > 3.5"
            - "ORDER BY gpa DESC;"
          distractors:
            - "HAVING gpa > 3.5"
            - "SORT BY gpa DESC;"
          explanation: |
            The logical execution order is FROM -> WHERE -> SELECT -> ORDER BY. `HAVING` filters *groups* (after GROUP BY), not individual rows. `SORT BY` is not valid SQL — use `ORDER BY`. The distractor `HAVING` is a common confusion point; it only applies after `GROUP BY`.

        - question: |
            A student writes two queries. Which one is more likely to produce unexpected results in production, and why?

            **Query A:** `SELECT * FROM users WHERE role != 'admin'`
            **Query B:** `SELECT id, name FROM users WHERE role != 'admin' OR role IS NULL`
          type: single
          options:
            - "Query A — it silently drops NULL-role users and fetches unnecessary columns"
            - "Query B — the OR clause makes it slower"
            - "Both are equally safe"
            - "Query A — SELECT * causes a syntax error in production"
          correct_index: 0
          explanation: |
            Query A has two production risks: (1) `SELECT *` breaks if columns are added/removed, and (2) `!= 'admin'` silently drops rows where role is NULL. Query B is safer: it names specific columns and explicitly handles NULL. This combines two lessons — explicit projection and NULL-safe predicates.

  # --------------------------------------------------------------------------
  # STEP 4: GROUP BY + HAVING — the reduce() of SQL
  # Added: generation challenge, Investigate prompt, metacognitive prompt,
  #   logical execution order (moved from old Step 2), a priori planning prompt,
  #   execution-plan Parsons (confirms declarative threshold crossing).
  # Bloom's: Apply / Analyze
  # --------------------------------------------------------------------------
  - title: "Aggregating Data"
    instructions: |
      ## GROUP BY — The reduce() of SQL

      > **Learning objective:** After this step you will be able to **turn row-level data into per-category summaries** — the counts, averages, and totals behind every dashboard and report — and **distinguish** filtering applied to individual rows from filtering applied to whole groups.

      Every time Spotify shows "Your top artists this month" or Instagram shows "4 people liked this" — that is a `GROUP BY` + `COUNT` running against millions of rows in milliseconds.

      ### SQL's logical execution order — why this step needs it

      SQL clauses do **not** run top-to-bottom as written. The engine evaluates them in a fixed order:

      ```
      1. FROM      — which tables to read
      2. WHERE     — filter rows
      3. GROUP BY  — group rows
      4. HAVING    — filter groups
      5. SELECT    — project columns  ← written first, evaluated fifth
      6. ORDER BY  — sort the result
      7. LIMIT     — truncate the result
      ```

      This order *is* the theory. It explains (a) why you cannot use a `SELECT` alias inside `WHERE` — the alias does not exist yet — and (b) why `WHERE` cannot contain an aggregate — the groups do not exist yet. Keep this 7-line list visible while you work the task.

      ### Aggregation maps to reduce()

      JavaScript's `.reduce()` collapses a collection into a single value. SQL's `GROUP BY` does the same — but **per group**, in one query:

      ```sql
      -- Sub-goal: choose the grouping column and aggregate functions
      SELECT   major,
               COUNT(*) AS student_count,
               AVG(gpa)  AS avg_gpa
      -- Sub-goal: name the source table
      FROM     students
      -- Sub-goal: define how rows are grouped
      GROUP BY major;
      ```

      pandas mapping:

      | SQL | pandas |
      |-----|--------|
      | `SELECT major, COUNT(*) FROM students GROUP BY major` | `students.groupby('major').size()` |
      | `SELECT major, AVG(gpa) FROM students GROUP BY major` | `students.groupby('major')['gpa'].mean()` |
      | `... HAVING AVG(gpa) > 3.3` | `result[result > 3.3]` (filter after `.mean()`) |

      ### The GROUP BY rule

      Every column in `SELECT` must either (1) appear in `GROUP BY`, or (2) be wrapped in an aggregate (`COUNT`, `AVG`, `SUM`, `MIN`, `MAX`).

      ```sql
      -- WRONG: name is neither grouped nor aggregated
      SELECT major, name, COUNT(*) FROM students GROUP BY major;

      -- RIGHT
      SELECT major, COUNT(*) AS n FROM students GROUP BY major;
      ```

      SQLite silently picks an arbitrary `name` here — PostgreSQL and strict-mode MySQL correctly reject it. Treat SQLite's quiet acceptance as a trap, not a blessing.

      ### WHERE vs HAVING

      `WHERE` filters individual rows **before** grouping. `HAVING` filters groups **after** aggregation. Aggregates cannot appear in `WHERE`.

      ```sql
      -- Sub-goal: filter rows before grouping
      -- Sub-goal: group and aggregate
      -- Sub-goal: filter groups after aggregation
      SELECT   major, COUNT(*) AS n
      FROM     students
      WHERE    year > 1             -- rows first
      GROUP BY major
      HAVING   COUNT(*) >= 2;       -- groups after
      ```

      `COUNT(*)` counts every row in the group; `COUNT(gpa)` counts only rows where `gpa` is not NULL.

      ### Predict → Plan → Run → Modify

      **Plan before you type.** Research on SQL education shows that even 30 seconds of *a priori* planning — writing down which clauses you need, in what order, before touching the keyboard — substantially cuts errors on aggregate queries (Taipalus, 2019). For each query in the task, write a one-line plan like `FROM students → WHERE year>1 → GROUP BY major → HAVING count ≥ 2 → SELECT major, count` *as a comment above your fix*.

      **Task.** `aggregate.sql` contains two queries, each exhibiting one of the two most-common aggregation mistakes in the literature (illegal grouping; `WHERE`-with-aggregate). For each:

      1. **Predict** what happens — a crash, a silent wrong answer, or a confusing SQLite-lenient result.
      2. **Explain** in a one-line comment *why* it is wrong. Name the rule it violates.
      3. **Fix** it.

      **Investigate.** After you pass, temporarily change your fixed Query 2 back to `WHERE AVG(gpa) > 3.3` and read the exact error message. You want to recognize it instantly in a future code review.

    files:
      - path: "aggregate.sql"
        content: |
          -- Step 4 — Aggregation with GROUP BY and HAVING
          -- Plan each query in one comment line before you fix it.

          -- Query 1. Intended: count students per major, most students first.
          -- Violates the grouping rule — why? What does SQLite do about it?
          SELECT major, name, COUNT(*) AS student_count
          FROM students
          GROUP BY major
          ORDER BY student_count DESC;

          -- Query 2. Intended: average GPA per major, only majors with avg GPA > 3.3.
          -- Uses the wrong clause for an aggregate condition. Fix it.
          SELECT major, AVG(gpa) AS avg_gpa
          FROM students
          WHERE AVG(gpa) > 3.3
          GROUP BY major;
        language: "sql"

    open_file: "aggregate.sql"

    solution:
      files:
        - path: "aggregate.sql"
          content: |
            -- Query 1: count students per major, most students first
            SELECT major, COUNT(*) AS student_count
            FROM students
            GROUP BY major
            ORDER BY student_count DESC;

            -- Query 2: average GPA per major, only where avg > 3.3
            SELECT major, AVG(gpa) AS avg_gpa
            FROM students
            GROUP BY major
            HAVING AVG(gpa) > 3.3;
          language: "sql"
      explanation: |
        **Query 1** produces 4 groups: CS (4), Math (2), Physics (2), and NULL (1). The `ORDER BY student_count DESC` sorts by the alias.

        **Query 2** returns only CS (avg 3.575). The other majors fall below 3.3. Note: you must use `HAVING` (not `WHERE`) because `AVG(gpa)` is an aggregate that doesn't exist until after grouping.

    tests:
      - description: "aggregate.sql uses GROUP BY"
        command: |
          var src = __read_file('aggregate.sql').toLowerCase().split('\n').filter(function(l){ return l.trim().indexOf('--') !== 0; }).join('\n');
          assert(/\bgroup\s+by\b/.test(src), "Your queries should use GROUP BY to aggregate data");
        hints:
          - text: "To compute one result *per category* (like count per major), you need to tell SQL how to partition the rows into groups. What clause does that?"
            condition: "code_missing: group by"
      - description: "aggregate.sql uses HAVING with an aggregate condition"
        command: |
          var src = __read_file('aggregate.sql').toLowerCase().split('\n').filter(function(l){ return l.trim().indexOf('--') !== 0; }).join('\n');
          assert(/\bhaving\b/.test(src), "Query 2 should use HAVING to filter groups by an aggregate condition");
          // HAVING should precede an aggregate function, not a bare column.
          var havingMatch = src.match(/having\s+([^\n;]+)/);
          assert(havingMatch && /(count|avg|sum|min|max)\s*\(/.test(havingMatch[1]),
            "HAVING should use an aggregate function (COUNT, AVG, SUM, MIN, MAX) — not a bare column");
          // WHERE should NOT contain an aggregate.
          var whereMatch = src.match(/where\s+([^\n;]+)/);
          assert(!whereMatch || !/(count|avg|sum|min|max)\s*\(/.test(whereMatch[1]),
            "Aggregate functions belong in HAVING, not WHERE — groups do not exist yet when WHERE runs");
        hints:
          - text: "You need to filter *after* grouping. WHERE runs before groups exist — there's a different clause for filtering aggregated results."
            condition: "code_missing: having"
          - text: "You have HAVING — but the condition inside it should use an aggregate function (like AVG or COUNT), not a bare column."
            condition: "code_contains: having"
          - text: "`WHERE AVG(...) > ...` is the classic error: the average does not exist yet when WHERE runs. Move the aggregate condition into a HAVING clause instead."
            condition: "code_contains: where avg"
      - description: "Query 1 groups correctly (CS=4, Math=2, Physics=2, NULL=1), CS first"
        command: |
          var rows = __run_query("SELECT major, COUNT(*) AS n FROM students GROUP BY major ORDER BY n DESC, major");
          assert(rows.length === 4, "Expected 4 groups (CS, Math, Physics, and NULL). Got " + rows.length);
          assert(rows[0].major === 'CS' && rows[0].n === 4, "CS should have 4 students and be first when ordered by count DESC");
          var total = rows.reduce(function(acc, r){ return acc + r.n; }, 0);
          assert(total === 9, "Group counts should sum to 9 (the full students table). Got " + total);
        hints:
          - text: "Remember NULL is its own group. If one student has no major, GROUP BY creates a separate group for NULL — that brings you to 4 groups, not 3."
            condition: "code_contains: group by"
          - text: "To show the largest group first, sort by the count column in descending order. You can use the column alias from SELECT."
            condition: "code_missing: order by"
      - description: "Query 1 SELECT respects the grouping rule (only grouped column + aggregate)"
        command: |
          var src = __read_file('aggregate.sql').toLowerCase().split('\n').filter(function(l){ return l.trim().indexOf('--') !== 0; }).join('\n');
          // First SELECT with GROUP BY must not include 'name' (the classic violation).
          var firstStmt = (src.match(/select[\s\S]*?group\s+by[^;]*?;/) || [])[0] || '';
          var selectCols = (firstStmt.match(/select\s+([\s\S]*?)\s+from/) || [])[1] || '';
          assert(selectCols.indexOf('name') === -1, "Query 1 should not include `name` — it is neither grouped nor aggregated. The grouping rule forbids it.");
      - description: "Query 2 returns only CS (only group whose avg GPA exceeds 3.3)"
        command: |
          var rows = __run_query("SELECT major FROM students GROUP BY major HAVING AVG(gpa) > 3.3");
          assert(rows.length === 1, "Expected exactly 1 major with avg GPA > 3.3 (CS at 3.575). Got " + rows.length);
          assert(rows[0].major === 'CS', "CS (avg 3.575) is the only major above 3.3");
        hints:
          - text: "Use AVG() inside HAVING to compare each group's average GPA to the threshold."
            condition: "code_missing: avg"

    quiz:
      title: "Aggregation — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            A student writes:
            ```sql
            SELECT major, name, COUNT(*) AS n
            FROM students
            GROUP BY major;
            ```
            What is wrong?
          type: single
          options:
            - "COUNT(*) is not a valid aggregate function"
            - "`name` is in SELECT but not in GROUP BY or inside an aggregate — this violates the grouping rule"
            - "GROUP BY must appear before SELECT in the written query"
            - "You cannot mix a non-aggregate column and an aggregate in the same SELECT"
          correct_index: 1
          explanation: |
            The **grouping rule**: every column in `SELECT` must either appear in `GROUP BY` or be wrapped in an aggregate. `name` is neither — there are multiple names per major, so it's undefined which one to return. SQLite may pick an arbitrary name; PostgreSQL and strict-mode MySQL reject this entirely.

        - question: |
            Which clause filters **groups** based on an aggregate condition?
          type: single
          options:
            - "`WHERE`"
            - "`HAVING`"
            - "`FILTER`"
            - "`SELECT ... WHERE`"
          correct_index: 1
          explanation: |
            `WHERE` filters individual rows *before* grouping. `HAVING` filters groups *after* aggregation. `WHERE COUNT(*) > 5` is always an error because the count doesn't exist yet when `WHERE` runs. Use `HAVING COUNT(*) > 5`.

        - question: |
            If 3 out of 10 students have a NULL value in the `gpa` column, what does each of these return?
            `COUNT(*)` vs `COUNT(gpa)`
          type: single
          options:
            - "Both return 10 — COUNT always includes every row"
            - "Both return 7 — COUNT skips NULL rows"
            - "`COUNT(*)` returns 10; `COUNT(gpa)` returns 7"
            - "`COUNT(*)` returns 7; `COUNT(gpa)` returns 10"
          correct_index: 2
          explanation: |
            `COUNT(*)` counts every row regardless of NULLs. `COUNT(column)` counts only rows where that column is **not NULL**. The distinction is critical whenever a column is optional — use the right one depending on whether you want to count the group size or the number of known values.

        - question: |
            A query uses `WHERE year > 2` to filter rows before grouping. If a student has `year` set to NULL, are they included in the grouped results?
          type: single
          options:
            - "Yes — NULL is treated as 0, which is not greater than 2"
            - "Yes — WHERE passes all rows to GROUP BY by default"
            - "No — `NULL > 2` evaluates to UNKNOWN, and WHERE discards UNKNOWN rows before grouping"
            - "It depends on the database engine"
          correct_index: 2
          explanation: |
            From Step 3: `NULL > 2` evaluates to UNKNOWN, and WHERE discards UNKNOWN rows before grouping even begins. Always check whether NULLs in filtered columns are affecting your aggregates.

        - question: |
            **Arrange** the clauses to count students per major, but only show majors with more than 2 students.
          type: parsons
          lines:
            - "SELECT major, COUNT(*) AS n"
            - "FROM students"
            - "GROUP BY major"
            - "HAVING COUNT(*) > 2;"
          distractors:
            - "WHERE COUNT(*) > 2;"
            - "ORDER BY major"
          explanation: |
            `WHERE` cannot hold aggregates — the count does not exist yet when WHERE runs. `HAVING` filters *after* grouping.

        - question: |
            **Arrange** the steps in the order the database *actually executes* them, for this query:
            ```sql
            SELECT major, COUNT(*) AS n FROM students
            WHERE year > 1 GROUP BY major HAVING COUNT(*) >= 2 ORDER BY n DESC;
            ```
          type: parsons
          lines:
            - "1. FROM students — read the source rows"
            - "2. WHERE year > 1 — drop rows where year is 1 or NULL"
            - "3. GROUP BY major — partition surviving rows into groups"
            - "4. HAVING COUNT(*) >= 2 — drop groups smaller than 2"
            - "5. SELECT major, COUNT(*) AS n — project the final columns"
            - "6. ORDER BY n DESC — sort groups by count"
          distractors:
            - "1. SELECT major, COUNT(*) AS n — project columns first"
            - "2. ORDER BY n DESC — sort before filtering"
          explanation: |
            SELECT is written first but evaluated fifth. This is why aliases defined in SELECT cannot be used in WHERE, and why aggregates in WHERE always fail.

        - question: |
            *[Review from Step 3]* A table has a nullable `status` column. Which query correctly finds all rows where status is either `'inactive'` or unknown?
          type: single
          options:
            - "`WHERE status = 'inactive' OR status = NULL`"
            - "`WHERE status = 'inactive' OR status IS NULL`"
            - "`WHERE status IN ('inactive', NULL)`"
            - "`WHERE status != 'active'`"
          correct_index: 1
          explanation: |
            `= NULL` and `IN (..., NULL)` both silently miss NULL rows (internally they use `=`). `!= 'active'` drops NULL rows too. Only `IS NULL` works.

  # --------------------------------------------------------------------------
  # STEP 5: CREATE TABLE + INSERT INTO — designing and populating a table
  # Audit fix: Error taxonomy moved here from former Step 2 (WHERE, now Step 3),
  #   plus the 4th "constraint violation" category called out for Insert C.
  # Added: Bloom's Create-level quiz question, scaffold fading (lighter hints)
  # Bloom's: Understand / Apply / Create
  # --------------------------------------------------------------------------
  - title: "Designing Your Own Table"
    instructions: |
      ## CREATE TABLE and INSERT INTO

      > **Learning objective:** After this step you will be able to **design a table that protects its own integrity** — so bad data cannot enter in the first place — **populate** it reliably, and **classify** query errors so you can debug them efficiently.

      You have been querying an existing table for four steps. Now it is time to build your own. If constraint syntax feels fiddly at first, that is normal — the payoff is that the database catches bad data before it becomes a bug in your application.

      ### Tables are not arrays

      Two differences from a Python list of dictionaries:

      1. **Strict schema** — every row has the declared columns and types.
      2. **Constraints are enforced** — `NOT NULL` rejects inserts that omit the column; `PRIMARY KEY` rejects duplicates.

      ### CREATE TABLE

      `CREATE TABLE` is like declaring a `struct` — it defines the shape, not an instance:

      ```sql
      -- Sub-goal: name the table and open the column list
      CREATE TABLE books (
        -- Sub-goal: identity column — unique, never NULL
        id     INTEGER PRIMARY KEY,
        -- Sub-goal: required fields — rejects inserts that omit them
        title  TEXT    NOT NULL,
        author TEXT    NOT NULL,
        -- Sub-goal: optional field — nullable by default
        pages  INTEGER
      );
      ```

      | SQL type  | Python / JS |
      |-----------|-------------|
      | `INTEGER` | `int`       |
      | `REAL`    | `float`     |
      | `TEXT`    | `str`       |
      | `BLOB`    | `bytes`     |

      `PRIMARY KEY` = unique + non-null + indexed. `NOT NULL` = required.

      **SQLite quirk:** standard SQL makes `PRIMARY KEY` imply `NOT NULL`; SQLite does not. Add `NOT NULL` explicitly if the portability matters.

      ### INSERT INTO

      ```sql
      -- Sub-goal: name the table and the columns you're supplying
      INSERT INTO books (id, title, author, pages) VALUES
        -- Sub-goal: one tuple per row; comma-separate multiple rows
        (1, 'SICP', 'Abelson & Sussman', 657);
      ```

      Omitting a `NOT NULL` column (with no default) fails. Nullable columns can be skipped.

      After any DDL or DML, run a quick `SELECT` to verify — a real workflow habit.

      ### pandas comparison

      | SQL | pandas |
      |-----|--------|
      | `CREATE TABLE books (id INTEGER PRIMARY KEY, title TEXT NOT NULL, ...)` | `books = pd.DataFrame(columns=['id', 'title', 'author', 'pages'])` |
      | `INSERT INTO books VALUES (1, 'SICP', 'Abelson', 657)` | `books.loc[len(books)] = [1, 'SICP', 'Abelson', 657]` |

      pandas accepts anything silently — wrong types, missing required fields. SQL *enforces* the schema and catches those bugs at insert time.

      ### Three types of SQL errors (+ one special case)

      1. **Syntax error** — grammar violated (missing comma, misspelled keyword). Refuses to run.
      2. **Semantic error** — grammatically valid but refers to something that does not exist (wrong column name). Returns an error at parse time.
      3. **Logical error** — runs and returns a result, but the *wrong* result (e.g., the NULL trap from Step 3). No error message — the hardest to catch.
      4. **Constraint violation** — a special sub-case: the query is grammatically and semantically valid, and it would run — but it violates a `PRIMARY KEY`, `NOT NULL`, `UNIQUE`, or `FOREIGN KEY` rule at execution time. The database rejects it with a runtime error.

      Semantic + logical errors together outnumber syntax errors roughly 2:1 (Presler-Marshall et al., 2021).

      ### Predict → Plan → Run → Modify

      A teammate has given you two files. Neither was reviewed. Your job: bring them up to production quality.

      **1. `schema.sql` — strengthen.** It compiles, but it has no integrity constraints. Compare against the intended columns below and add the missing type declarations and constraints.

      | Column   | Type    | Constraints              |
      |----------|---------|--------------------------|
      | `id`     | INTEGER | PRIMARY KEY              |
      | `code`   | TEXT    | NOT NULL                 |
      | `name`   | TEXT    | NOT NULL                 |
      | `credits`| INTEGER | (nullable — leave as is) |

      Write a one-line comment above each constraint naming *the bug it prevents* (e.g., `-- prevents duplicate course IDs`). Naming the failure mode is how real schema review works.

      **2. `populate.sql` — classify and repair.** Three `INSERT` statements. Two fail against the strengthened schema. For each failing insert, decide which error category fits (syntax, semantic, logical, or constraint violation). Fix the fixable ones, replace the unfixable ones with a valid row. End with `SELECT * FROM courses;` to verify. Aim for at least 3 rows.

    files:
      - path: "schema.sql"
        content: |
          -- Step 5a — Designing a schema that protects its own data.
          -- The CREATE below runs, but it has NO constraints.
          -- Add the missing types + constraints from the table in the instructions.
          -- For each constraint you add, leave a one-line comment naming the bug it prevents.
          DROP TABLE IF EXISTS courses;

          CREATE TABLE courses (
            id,
            code,
            name,
            credits
          );
        language: "sql"
      - path: "populate.sql"
        content: |
          -- Step 5b — Populating the strengthened schema.
          -- Classify each broken INSERT (syntax / semantic / logical / constraint violation), then fix.
          DELETE FROM courses;

          -- Insert A — the model row. Matches the schema exactly.
          INSERT INTO courses (id, code, name, credits) VALUES
            (1, 'CS 35L', 'Software Construction', 4);

          -- Insert B — predict what breaks when the schema enforces NOT NULL
          INSERT INTO courses (id, code, credits) VALUES
            (2, 'CS 111', 4);

          -- Insert C — all values look plausible. What does the strengthened schema
          -- reject here? Look carefully at how this row compares to Insert A.
          INSERT INTO courses (id, code, name, credits) VALUES
            (1, 'MATH 61', 'Discrete Structures', 4);

          -- Verify your data. Leave this line as the last statement.
          SELECT * FROM courses;
        language: "sql"

    open_file: "schema.sql"

    solution:
      files:
        - path: "schema.sql"
          content: |
            DROP TABLE IF EXISTS courses;

            CREATE TABLE courses (
              id      INTEGER PRIMARY KEY,
              code    TEXT    NOT NULL,
              name    TEXT    NOT NULL,
              credits INTEGER
            );
          language: "sql"
        - path: "populate.sql"
          content: |
            DELETE FROM courses;

            INSERT INTO courses (id, code, name, credits) VALUES
              (1, 'CS 35L',  'Software Construction', 4),
              (2, 'CS 111',  'Operating Systems',     4),
              (3, 'MATH 61', 'Discrete Structures',   4);

            SELECT * FROM courses;
          language: "sql"
      explanation: |
        `CREATE TABLE` declares the shape; `INSERT INTO` adds rows that must conform. The final `SELECT * FROM courses` verifies the data. `DROP TABLE IF EXISTS` at the top makes `schema.sql` safe to re-run.

        **On Insert C:** all four values looked plausible in isolation, but `id = 1` is already taken by Insert A. The strengthened schema has `id INTEGER PRIMARY KEY`, which enforces uniqueness — so the database raises a **constraint violation** at execution time. The fix is to give the new row a distinct `id` (e.g., `3, 'MATH 61', 'Discrete Structures', 4`). Constraint violations sit between semantic errors (caught at parse time) and logical errors (never caught): the database catches them, but only when the statement runs.

    tests:
      - description: "courses table exists with the expected 4 columns"
        command: |
          var tbl = __run_query("SELECT name FROM sqlite_master WHERE type='table' AND name='courses'");
          assert(tbl.length === 1, "Expected a table named 'courses' — run your CREATE TABLE statement first");
          var info = __run_query("PRAGMA table_info(courses)");
          var cols = info.map(function(r){ return r.name; }).sort().join(',');
          assert(cols === 'code,credits,id,name', "Expected columns id, code, name, credits — got: " + cols);
        hints:
          - text: "You need a statement that defines a new table's structure. It starts with two keywords and lists column-type-constraint triples inside parentheses."
            condition: "code_missing: create table"
          - text: "Your CREATE TABLE is there — check that the column names exactly match the table in the instructions: id, code, name, credits."
            condition: "code_contains: create table"
      - description: "id is declared PRIMARY KEY"
        command: |
          var info = __run_query("PRAGMA table_info(courses)");
          var idCol = info.filter(function(r){ return r.name === 'id'; })[0];
          assert(idCol, "Missing 'id' column");
          assert(idCol.pk === 1, "The 'id' column should be declared PRIMARY KEY — that is what guarantees uniqueness per row");
        hints:
          - text: "Every row needs a unique identifier. Which two keywords, applied to a column, enforce both uniqueness and non-nullness on standard databases?"
            condition: "code_missing: primary key"
      - description: "code and name are declared NOT NULL"
        command: |
          var info = __run_query("PRAGMA table_info(courses)");
          var code = info.filter(function(r){ return r.name === 'code'; })[0];
          var name = info.filter(function(r){ return r.name === 'name'; })[0];
          assert(code && code.notnull === 1, "The 'code' column should be NOT NULL — prevents unlabeled courses");
          assert(name && name.notnull === 1, "The 'name' column should be NOT NULL — prevents nameless courses");
        hints:
          - text: "Which constraint, added after the type declaration, rejects inserts that omit this column?"
            condition: "code_missing: not null"
          - text: "You have NOT NULL somewhere — but check that *both* `code` and `name` carry it. `credits` should stay nullable."
            condition: "code_contains: not null"
      - description: "credits remains nullable (optional field)"
        command: |
          var info = __run_query("PRAGMA table_info(courses)");
          var credits = info.filter(function(r){ return r.name === 'credits'; })[0];
          assert(credits && credits.notnull === 0, "The 'credits' column should remain nullable — the instructions mark it optional");
      - description: "courses has at least 3 valid rows (populate.sql was repaired)"
        command: |
          var rows = __run_query("SELECT COUNT(*) AS n FROM courses");
          assert(rows[0].n >= 3, "Expected at least 3 rows — Insert B needs a name, Insert C needs a new id. Got " + rows[0].n);
          var bad = __run_query("SELECT * FROM courses WHERE code IS NULL OR name IS NULL");
          assert(bad.length === 0, "No row may have a NULL code or name (the NOT NULL constraints should prevent this).");
        hints:
          - text: "Insert B is missing the `name` value — that violates NOT NULL. Add a course name."
            condition: "code_missing: insert"
          - text: "Still getting fewer than 3 rows? Check that Insert C has a *unique* id — it currently collides with Insert A's id=1 (that's the constraint violation)."
            condition: "code_contains: insert"
      - description: "course ids are unique (PRIMARY KEY enforced)"
        command: |
          var rows = __run_query("SELECT id, COUNT(*) AS n FROM courses GROUP BY id HAVING COUNT(*) > 1");
          assert(rows.length === 0, "Two rows share the same id — that is the Insert C constraint violation. Change Insert C's id.");
      - description: "students table is still intact (do not disturb data from Steps 1–4)"
        command: |
          var rows = __run_query("SELECT COUNT(*) AS n FROM students");
          assert(rows[0].n === 9, "The students table should have 9 rows — do not modify it");

    quiz:
      title: "Creating Tables — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            What does `PRIMARY KEY` guarantee about a column's values?
          type: single
          options:
            - "Values are sorted in ascending order"
            - "The column cannot contain text"
            - "Each value is unique and non-null across all rows"
            - "The column is indexed for faster lookups only"
          correct_index: 2
          explanation: |
            `PRIMARY KEY` enforces two things: uniqueness (no two rows share the same value) and non-nullability. It also creates an implicit index, but its core purpose is to uniquely identify every row.

        - question: |
            What happens if you `INSERT INTO` a row but omit a column declared `NOT NULL` with no default?
          type: single
          options:
            - "The column is automatically set to 0 or an empty string"
            - "The row is inserted with NULL in that column"
            - "The database raises an error and the row is not inserted"
            - "The row is inserted but flagged as incomplete"
          correct_index: 2
          explanation: |
            A `NOT NULL` column with no default value **requires** an explicit value. Omitting it in the `INSERT` causes an error — the database enforces the constraint and refuses the row.

        - question: |
            A student writes:
            ```sql
            SELECT full_name FROM students WHERE full_name = 'Mango';
            ```
            The column is actually named `name`, not `full_name`. What *type* of SQL error is this?
          type: single
          options:
            - "Logical error — the query is valid SQL but returns the wrong data"
            - "Semantic error — the query is syntactically valid but references a non-existent column"
            - "Syntax error — the SQL grammar rules are violated"
            - "Runtime error — the database ran out of memory"
          correct_index: 1
          explanation: |
            A **semantic error** is a query that is grammatically correct SQL but references something that doesn't exist (wrong column name, wrong table). A syntax error violates grammar (wrong clause order, missing parentheses). A logical error is when the query runs but returns the wrong answer. Research shows semantic and logical errors together outnumber syntax errors roughly 2:1 (Presler-Marshall et al., 2021).

        - question: |
            You need to store a library's book collection. Each book has a title, author, year published, and an optional page count. Which schema is best?
          type: single
          options:
            - "`CREATE TABLE books (title TEXT, author TEXT, year INTEGER, pages INTEGER)`"
            - "`CREATE TABLE books (id INTEGER PRIMARY KEY, title TEXT NOT NULL, author TEXT NOT NULL, year INTEGER, pages INTEGER)`"
            - "`CREATE TABLE books (id INTEGER, title TEXT, author TEXT, year TEXT, pages TEXT)`"
            - "`CREATE TABLE books (book_data TEXT)`"
          correct_index: 1
          explanation: |
            Option B is best: it has a `PRIMARY KEY` for unique identification, `NOT NULL` on required fields (title, author), appropriate types (INTEGER for year, not TEXT), and leaves optional fields (pages) nullable. Option A lacks a primary key. Option C makes everything TEXT, losing type safety. Option D stores everything in one column — no schema enforcement at all.

        - question: |
            **Arrange** the lines to create a `songs` table with a primary key and a required title.
          type: parsons
          lines:
            - "CREATE TABLE songs ("
            - "  id INTEGER PRIMARY KEY,"
            - "  title TEXT NOT NULL,"
            - "  artist TEXT,"
            - "  plays INTEGER"
            - ");"
          distractors:
            - "  id INTEGER UNIQUE,"
            - "  title TEXT NULL,"
          explanation: |
            `PRIMARY KEY` provides uniqueness *and* identification — `UNIQUE` alone lacks the "identity" role. `NOT NULL` on title ensures every song has a name. `TEXT NULL` is redundant (columns are nullable by default) and wrong for a required field.

        - question: |
            *[Review]* What is the **correct logical execution order** of these SQL clauses?
          type: parsons
          lines:
            - "FROM"
            - "WHERE"
            - "GROUP BY"
            - "HAVING"
            - "SELECT"
            - "ORDER BY"
          distractors:
            - "LIMIT"
          explanation: |
            The logical execution order is FROM -> WHERE -> GROUP BY -> HAVING -> SELECT -> ORDER BY. This is why you cannot use a SELECT alias in WHERE (the alias doesn't exist yet) and why WHERE cannot use aggregate functions (groups don't exist yet). LIMIT comes after ORDER BY but was not required by the question.

  # --------------------------------------------------------------------------
  # STEP 6: UPDATE + DELETE + DROP TABLE — modifying and removing data
  # Added: Safe failure simulation (DELETE without WHERE), faded scaffolding
  #   (less hand-holding in TODO comments), metacognitive reflection,
  #   "Where to go next" epilogue (LEFT JOIN, CTEs, N+1).
  # Bloom's: Apply / Evaluate
  # --------------------------------------------------------------------------
  - title: "Modifying & Cleaning Up"
    instructions: |
      ## UPDATE, DELETE, and DROP TABLE

      > **Learning objective:** After this step you will be able to **change or remove data without damaging the rest of the database**, **recognize** destructive statements before they run, and **apply** the professional habit of previewing impact before committing.

      Destructive SQL is where careful habits pay off. If you have ever run a shell command and watched the wrong files disappear, you already know the feeling — these patterns exist so you do not have that feeling in production.

      ### Safe failure experiment

      Run `SELECT * FROM students;` and note the row count. Now run `DELETE FROM students;` (no WHERE). Run the SELECT again. The table is empty. The page reload restores the seed data — in production there is no reload button, which is why the patterns below matter.

      ### UPDATE — changing existing rows

      ```sql
      -- Sub-goal: name the table and the columns to change
      UPDATE students
      -- Sub-goal: assign new values
      SET    gpa = 3.95
      -- Sub-goal: restrict to the intended rows — NEVER skip this
      WHERE  name = 'Mango';
      ```

      Without `WHERE`, `UPDATE` modifies **every row**. The safe habit: write and test the equivalent `SELECT ... WHERE ...` first, then convert it.

      ### DELETE — removing rows

      ```sql
      -- Sub-goal: restrict the delete with a predicate — NEVER skip this
      DELETE FROM students WHERE gpa < 3.0;
      ```

      Without `WHERE`, `DELETE` empties the table. The schema remains; only the data is gone.

      ### DROP TABLE — removing the table itself

      ```sql
      -- Sub-goal: guard against "table doesn't exist" errors in re-runnable scripts
      DROP TABLE IF EXISTS courses;
      ```

      `DROP TABLE` removes both data *and* schema. No undo.

      | Statement | Removes | Schema remains? |
      |---|---|---|
      | `DELETE FROM t WHERE ...` | Matching rows | Yes |
      | `DELETE FROM t` | All rows | Yes |
      | `DROP TABLE t` | All rows + schema | No |

      ### pandas comparison

      | SQL | pandas |
      |-----|--------|
      | `UPDATE students SET gpa = 3.6 WHERE name = 'Kiwi'` | `students.loc[students['name'] == 'Kiwi', 'gpa'] = 3.6` |
      | `DELETE FROM students WHERE year = 4` | `students = students[students['year'] != 4]` |
      | `DROP TABLE courses` | `del courses` |

      SQL modifies in place; pandas often returns a new frame. In SQL, forgetting `WHERE` is permanent. In pandas, you can always re-read the CSV.

      ### Predict → Run → Investigate → Modify

      A teammate pushed `cleanup.sql` to a PR. It is scheduled to run on production in an hour. **Do not approve it as-is.**

      For each statement:

      1. **Predict** what it *actually* does — not what the comment claims.
      2. **Preview with a SELECT.** Write the `SELECT ... WHERE ...` that would reveal the affected rows, *leave it as a comment* above the fixed statement so the next reviewer sees your reasoning.
      3. **Fix** the statement to match its stated intent.

      That trail — claim, preview, confirm — is how destructive SQL actually gets approved on a real team.

      **Stated intents (verify each against the code):**

      1. Update Kiwi's GPA from 3.50 to 3.60.
      2. Delete all year-4 students.
      3. Drop the `courses` table from Step 5.

      ### Where to go next (after you finish)

      This tutorial covers the ~90% of SQL that 90% of code needs — but three topics deserve your next hour:

      - **`LEFT JOIN` and the outer-join family.** Step 2 taught `INNER JOIN`, which drops rows with no match (Blue Bella with NULL major). `LEFT JOIN` keeps them and fills the right side with NULL — essential whenever "missing data is data."
      - **Common Table Expressions (`WITH ... AS (...)`) — CTEs.** The declarative equivalent of declaring a local variable. Complex queries collapse from unreadable nested subqueries into top-to-bottom readable pipelines — exactly how you already think in Python.
      - **The N+1 query problem.** The #1 antipattern at the Python/JS ↔ SQL boundary: your application loops over a list, firing one query per element. Learn to batch with `WHERE id IN (...)` or an explicit JOIN. The cost is almost always network latency, not the database.

    files:
      - path: "cleanup.sql"
        content: |
          -- Step 6 — Review a teammate's destructive PR before it runs in production.
          -- For each statement: predict, preview with a commented SELECT, then fix.

          -- 1. Intended: raise Kiwi's GPA to 3.6.
          --    Targets the wrong student. A second trap hides here too:
          --    drop the WHERE clause and every student ends up at 3.6.
          UPDATE students SET gpa = 3.6 WHERE name = 'Mango';

          -- 2. Intended: delete all year-4 students.
          --    Wrong column referenced. Would this even run? If yes, what does it delete?
          DELETE FROM students WHERE gpa = 4;

          -- 3. Intended: drop the courses table.
          --    Works most of the time. When would this statement crash the deploy,
          --    and how do you make it safe to re-run?
          DROP TABLE courses;
        language: "sql"

    open_file: "cleanup.sql"

    solution:
      files:
        - path: "cleanup.sql"
          content: |
            -- 1. Update Kiwi's GPA to 3.6
            UPDATE students SET gpa = 3.6 WHERE name = 'Kiwi';

            -- 2. Delete all year-4 contestants
            DELETE FROM students WHERE year = 4;

            -- 3. Drop the courses table
            DROP TABLE IF EXISTS courses;
          language: "sql"
      explanation: |
        **Task 1:** `UPDATE ... SET ... WHERE` modifies only the rows matching the WHERE clause. Without `WHERE name = 'Kiwi'`, every student's GPA would become 3.6.

        **Task 2:** `DELETE FROM ... WHERE year = 4` removes Coconick and Orangelo. Without the `WHERE`, all 9 students would be deleted.

        **Task 3:** `DROP TABLE IF EXISTS` is safer than plain `DROP TABLE` — it avoids an error if the table was already dropped or never created. After this, `SELECT * FROM courses` would produce an error (the table no longer exists), while `DELETE FROM courses` without WHERE would leave the table empty but still queryable.

    tests:
      - description: "cleanup.sql contains UPDATE, DELETE, and DROP statements"
        command: |
          var src = __read_file('cleanup.sql').toLowerCase().split('\n').filter(function(l){ return l.trim().indexOf('--') !== 0; }).join('\n');
          assert(/\bupdate\b/.test(src), "Task 1 should use an UPDATE statement");
          assert(/\bdelete\b/.test(src), "Task 2 should use a DELETE statement");
          assert(/\bdrop\s+table\b/.test(src), "Task 3 should use a DROP TABLE statement");
        hints:
          - text: "To change a value in an existing row you need a statement that *sets* a column — restricted to the right row by a WHERE clause."
            condition: "code_missing: update"
          - text: "To remove rows you need a statement that deletes — and almost always with a WHERE clause, unless you mean to empty the table."
            condition: "code_missing: delete"
          - text: "To remove a table entirely (data *and* structure) you need a different statement — not DELETE. Which one, and which keyword makes it safe to re-run?"
            condition: "code_missing: drop"
      - description: "Every destructive statement is scoped (has a WHERE or the IF EXISTS guard)"
        command: |
          var src = __read_file('cleanup.sql').toLowerCase().split('\n').filter(function(l){ return l.trim().indexOf('--') !== 0; }).join('\n');
          // Any UPDATE or DELETE without a WHERE on the same statement is dangerous.
          var stmts = src.split(';');
          stmts.forEach(function(s){
            if (/\bupdate\b/.test(s) && !/\bwhere\b/.test(s)) {
              throw new Error("UPDATE without WHERE would overwrite every row. Add a WHERE clause.");
            }
            if (/\bdelete\s+from\b/.test(s) && !/\bwhere\b/.test(s)) {
              throw new Error("DELETE without WHERE would empty the table. Add a WHERE clause.");
            }
          });
        hints:
          - text: "Run a SELECT with the same WHERE clause first as a sanity check. Every UPDATE and DELETE in this file should have a WHERE."
            condition: "code_contains: update"
      - description: "DROP TABLE uses IF EXISTS (safe to re-run)"
        command: |
          var src = __read_file('cleanup.sql').toLowerCase().split('\n').filter(function(l){ return l.trim().indexOf('--') !== 0; }).join('\n');
          assert(/drop\s+table\s+if\s+exists\b/.test(src),
            "Use `DROP TABLE IF EXISTS courses;` — plain DROP TABLE crashes if the table was already removed, breaking idempotent deploys");
        hints:
          - text: "Plain `DROP TABLE courses` raises an error if `courses` has already been dropped. Two words, inserted between `TABLE` and the name, make the statement idempotent."
            condition: "code_missing: if exists"
      - description: "Kiwi's GPA is now exactly 3.6 (and nobody else was disturbed)"
        command: |
          var rows = __run_query("SELECT name, gpa FROM students WHERE name = 'Kiwi'");
          assert(rows.length === 1, "Kiwi should still be in the table");
          assert(Math.abs(rows[0].gpa - 3.6) < 0.001, "Kiwi's GPA should be 3.6 after UPDATE, got " + rows[0].gpa);
          // Safety check: the other CS student GPAs should still be their seed values (not 3.6).
          var mango = __run_query("SELECT gpa FROM students WHERE name = 'Mango'");
          assert(Math.abs(mango[0].gpa - 3.9) < 0.001,
            "Mango's GPA changed from 3.9 to " + mango[0].gpa + " — the original UPDATE targeted the wrong student. Your fix should only touch Kiwi.");
        hints:
          - text: "Your UPDATE is there but Kiwi's GPA isn't 3.6 yet. Check the WHERE clause — are you targeting the right student?"
            condition: "code_contains: update"
          - text: "Mango's GPA changed when it should not have. The original UPDATE used `name = 'Mango'`. Change the predicate to target Kiwi."
            condition: "code_contains: mango"
      - description: "All year-4 contestants are gone; no earlier-year contestants were deleted"
        command: |
          var year4 = __run_query("SELECT * FROM students WHERE year = 4");
          assert(year4.length === 0, "Expected no year-4 contestants. Got " + year4.length);
          // Safety check: the other years should still be intact (year 1..3 counts should sum to 7 = 9 - 2 year-4).
          var remaining = __run_query("SELECT COUNT(*) AS n FROM students");
          assert(remaining[0].n === 7, "Expected 7 contestants remaining (9 minus 2 year-4). Got " + remaining[0].n + ". Your DELETE may be matching the wrong column.");
        hints:
          - text: "The original DELETE references `gpa` — that is the wrong column. Which column records the contestant's year?"
            condition: "code_contains: gpa = 4"
      - description: "courses table has been dropped"
        command: |
          var rows = __run_query("SELECT name FROM sqlite_master WHERE type='table' AND name='courses'");
          assert(rows.length === 0, "Expected courses table to be gone — use `DROP TABLE IF EXISTS courses;`");

    quiz:
      title: "Modifying & Cleaning Up — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            A developer runs:
            ```sql
            DELETE FROM orders;
            ```
            What is the result?
          type: single
          options:
            - "The orders table is removed from the database"
            - "All rows are deleted but the table structure remains"
            - "An error — DELETE requires a WHERE clause"
            - "Only rows matching the implicit WHERE TRUE condition are deleted"
          correct_index: 1
          explanation: |
            `DELETE FROM orders` without a `WHERE` deletes every row but leaves the table schema intact. The table still exists — it is just empty. To remove the schema too, use `DROP TABLE orders`. SQL does not require a `WHERE` clause on `DELETE`, which makes this mistake easy to make in production.

        - question: |
            What is the safest way to remove a table that may or may not exist, without causing an error?
          type: single
          options:
            - "`REMOVE TABLE IF EXISTS courses;`"
            - "`DELETE TABLE courses;`"
            - "`DROP TABLE IF EXISTS courses;`"
            - "`TRUNCATE TABLE IF EXISTS courses;`"
          correct_index: 2
          explanation: |
            `DROP TABLE IF EXISTS tablename` is the idiomatic safe form. Plain `DROP TABLE tablename` raises an error if the table doesn't exist. `DELETE TABLE` is not valid SQL. `TRUNCATE` removes all rows (like `DELETE`) but keeps the schema, and is not supported by all databases (including SQLite).

        - question: |
            Before running an `UPDATE` on a production table, what should you do first?
          type: single
          options:
            - "Run the UPDATE and check the result in the UI"
            - "Run the equivalent SELECT with the same WHERE clause to preview which rows will change"
            - "Add `ORDER BY` to the UPDATE so the order is deterministic"
            - "Change WHERE to WHERE TRUE so every row is visible"
          correct_index: 1
          explanation: |
            Running `SELECT ... WHERE ...` with the same predicate lets you *see* exactly which rows the UPDATE will touch — before the change is permanent. This is the claim/preview/confirm trail the task demonstrated.

        - question: |
            After running `DROP TABLE courses`, what happens if you run `SELECT * FROM courses`?
          type: single
          options:
            - "It returns an empty result set (no rows, but the columns are shown)"
            - "The database raises an error — the table no longer exists"
            - "It returns NULL for every column"
            - "It returns the data that was in the table before the DROP"
          correct_index: 1
          explanation: |
            `DROP TABLE` removes both the data **and the schema**. The table no longer exists in the database at all, so any query referencing it fails with an error. Compare this with `DELETE FROM courses` (no WHERE), which removes all rows but keeps the table structure intact — `SELECT * FROM courses` would return an empty result set, not an error.

        - question: |
            **Arrange** the steps for safely updating Kiwi's GPA. The professional workflow: preview first, then modify.
          type: parsons
          lines:
            - "-- Step 1: Preview which rows will change"
            - "SELECT * FROM students WHERE name = 'Kiwi';"
            - "-- Step 2: Modify"
            - "UPDATE students SET gpa = 3.6 WHERE name = 'Kiwi';"
          distractors:
            - "UPDATE students SET gpa = 3.6;"
            - "DELETE FROM students WHERE name = 'Kiwi';"
          explanation: |
            Always preview with SELECT before modifying production data. The distractor `UPDATE students SET gpa = 3.6;` is missing the WHERE clause — it would change *every* student's GPA to 3.6. The DELETE distractor removes the row entirely instead of updating it.

        - question: |
            *[Review from Step 4]* What is the difference between `COUNT(*)` and `COUNT(email)`?
          type: single
          options:
            - "`COUNT(*)` counts all rows; `COUNT(email)` counts only rows where `email` is not NULL"
            - "`COUNT(*)` is slower; `COUNT(email)` is optimized"
            - "They are equivalent — both count all rows"
            - "`COUNT(*)` counts columns; `COUNT(email)` counts rows"
          correct_index: 0
          explanation: |
            `COUNT(*)` counts every row regardless of NULL. `COUNT(column)` counts only rows where that column is not NULL.

        - question: |
            *[Review from Step 3]* Which statement correctly removes every student whose `major` is NULL?
          type: single
          options:
            - "`DELETE FROM students WHERE major = NULL`"
            - "`DELETE FROM students WHERE major IS NULL`"
            - "`DELETE FROM students WHERE major != 'CS'`"
            - "`DELETE FROM students WHERE major`"
          correct_index: 1
          explanation: |
            `= NULL` always evaluates to UNKNOWN and matches no rows — the delete would silently do nothing. Only `IS NULL` tests for unknown values.
