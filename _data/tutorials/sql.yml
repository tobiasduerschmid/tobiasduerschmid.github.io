  - title: "Aggregating Data"
    instructions: |
      ## GROUP BY — The reduce() of SQL

      > **Learning objective:** Turn row-level data into per-category summaries (counts, averages, totals), and distinguish filtering individual rows from filtering whole groups.

      Every time Spotify shows "Your top artists this month" or Instagram shows "4 people liked this" — that is a `GROUP BY` + `COUNT` running against millions of rows in milliseconds.

      ### Logical execution order

      SQL clauses do **not** run top-to-bottom as written:

      ```
      1. FROM      — which tables to read
      2. WHERE     — filter rows
      3. GROUP BY  — group rows
      4. HAVING    — filter groups
      5. SELECT    — project columns  ← written first, evaluated fifth
      6. ORDER BY  — sort
      7. LIMIT     — truncate
      ```

      This explains (a) why you cannot use a `SELECT` alias inside `WHERE` — the alias does not exist yet — and (b) why `WHERE` cannot contain an aggregate — the groups do not exist yet. Keep this list visible while you work the task — even experienced developers reference it.

      ### GROUP BY syntax

      **`GROUP BY` is *aggregation*** — it partitions rows into buckets per category, then applies summary functions (`COUNT`, `AVG`, `SUM`, `MIN`, `MAX`) to each bucket. The result has one row per bucket, not per original row.

      ```sql
      SELECT   major,
               COUNT(*) AS student_count,
               AVG(gpa)  AS avg_gpa
      FROM     students
      GROUP BY major;
      ```

      ### The GROUP BY rule

      Every column in `SELECT` must either (1) appear in `GROUP BY`, or (2) be wrapped in an aggregate (`COUNT`, `AVG`, `SUM`, `MIN`, `MAX`).

      ```sql
      -- WRONG: name is neither grouped nor aggregated
      SELECT major, name, COUNT(*) FROM students GROUP BY major;

      -- RIGHT
      SELECT major, COUNT(*) AS n FROM students GROUP BY major;
      ```

      SQLite silently picks an arbitrary `name` here — PostgreSQL and strict-mode MySQL reject it. Treat SQLite's quiet acceptance as a trap, not a blessing.

      ### WHERE vs HAVING

      **`HAVING` is *group-level filtering*** — the aggregate-aware analog of `WHERE`. `WHERE` filters individual rows **before** grouping; `HAVING` filters groups **after** aggregation. Aggregates cannot appear in `WHERE` because the groups don't exist yet.

      ```sql
      SELECT   major, COUNT(*) AS n
      FROM     students
      WHERE    year > 1             -- rows first
      GROUP BY major
      HAVING   COUNT(*) >= 2;       -- groups after
      ```

      `COUNT(*)` counts every row in the group; `COUNT(gpa)` counts only rows where `gpa` is not NULL.

      ### Task

      `aggregate.sql` has two queries, each making one of the two most common aggregation mistakes (illegal grouping; `WHERE`-with-aggregate). For each:

      1. **Plan** before typing: write a one-line comment with the clauses in evaluation order, e.g. `FROM students → WHERE year>1 → GROUP BY major → HAVING count ≥ 2 → SELECT major, count`. Even 30 seconds of planning catches most aggregation bugs before you write them.
      2. **Predict** what happens — a crash, a silent wrong answer, or a confusing SQLite-lenient result.
      3. **Explain** in a one-line comment *why* it is wrong, then **fix** it.

      **Investigate.** After you pass, temporarily change your fixed Query 2 back to `WHERE AVG(gpa) > 3.3` and read the exact error message. You want to recognize it instantly in a future code review.

      <details markdown="1"><summary>Translating to pandas</summary>

      | SQL | pandas |
      |-----|--------|
      | `SELECT major, COUNT(*) FROM students GROUP BY major` | `students.groupby('major').size()` |
      | `SELECT major, AVG(gpa) FROM students GROUP BY major` | `students.groupby('major')['gpa'].mean()` |
      | `... HAVING AVG(gpa) > 3.3` | `result[result > 3.3]` (filter after `.mean()`) |

      JavaScript's `.reduce()` collapses a collection into a single value. SQL's `GROUP BY` does the same — but **per group**, in one query.

      </details>

    files:
      - path: "aggregate.sql"
        content: |
          -- Step 4 — Aggregation with GROUP BY and HAVING
          -- Plan each query in one comment line before you fix it.

          -- Query 1. Intended: count students per major, most students first.
          -- Violates the grouping rule — why? What does SQLite do about it?
          SELECT major, name, COUNT(*) AS student_count
          FROM students
          GROUP BY major
          ORDER BY student_count DESC;

          -- Query 2. Intended: average GPA per major, only majors with avg GPA > 3.3.
          -- Uses the wrong clause for an aggregate condition. Fix it.
          SELECT major, AVG(gpa) AS avg_gpa
          FROM students
          WHERE AVG(gpa) > 3.3
          GROUP BY major;
        language: "sql"

    open_file: "aggregate.sql"

    solution:
      files:
        - path: "aggregate.sql"
          content: |
            -- Query 1: count students per major, most students first
            SELECT major, COUNT(*) AS student_count
            FROM students
            GROUP BY major
            ORDER BY student_count DESC;

            -- Query 2: average GPA per major, only where avg > 3.3
            SELECT major, AVG(gpa) AS avg_gpa
            FROM students
            GROUP BY major
            HAVING AVG(gpa) > 3.3;
          language: "sql"
      explanation: |
        **Query 1** produces 4 groups: CS (4), Math (2), Physics (2), and NULL (1). The `ORDER BY student_count DESC` sorts by the alias.

        **Query 2** returns only CS (avg 3.575). The other majors fall below 3.3. Note: you must use `HAVING` (not `WHERE`) because `AVG(gpa)` is an aggregate that doesn't exist until after grouping.

    tests:
      - description: "aggregate.sql uses GROUP BY"
        command: |
          var src = __read_file('aggregate.sql').toLowerCase().split('\n').filter(function(l){ return l.trim().indexOf('--') !== 0; }).join('\n');
          assert(/\bgroup\s+by\b/.test(src), "Your queries should use GROUP BY to aggregate data");
        hints:
          - text: "To compute one result *per category* (like count per major), you need to tell SQL how to partition the rows into groups. What clause does that?"
            condition: "code_missing: group by"
      - description: "aggregate.sql uses HAVING with an aggregate condition"
        command: |
          var src = __read_file('aggregate.sql').toLowerCase().split('\n').filter(function(l){ return l.trim().indexOf('--') !== 0; }).join('\n');
          assert(/\bhaving\b/.test(src), "Query 2 should use HAVING to filter groups by an aggregate condition");
          // HAVING should precede an aggregate function, not a bare column.
          var havingMatch = src.match(/having\s+([^\n;]+)/);
          assert(havingMatch && /(count|avg|sum|min|max)\s*\(/.test(havingMatch[1]),
            "HAVING should use an aggregate function (COUNT, AVG, SUM, MIN, MAX) — not a bare column");
          // WHERE should NOT contain an aggregate.
          var whereMatch = src.match(/where\s+([^\n;]+)/);
          assert(!whereMatch || !/(count|avg|sum|min|max)\s*\(/.test(whereMatch[1]),
            "Aggregate functions belong in HAVING, not WHERE — groups do not exist yet when WHERE runs");
        hints:
          - text: "You need to filter *after* grouping. WHERE runs before groups exist — there's a different clause for filtering aggregated results."
            condition: "code_missing: having"
          - text: "You have HAVING — but the condition inside it should use an aggregate function (like AVG or COUNT), not a bare column."
            condition: "code_contains: having"
          - text: "`WHERE AVG(...) > ...` is the classic error: the average does not exist yet when WHERE runs. Move the aggregate condition into a HAVING clause instead."
            condition: "code_contains: where avg"
      - description: "Query 1 groups correctly (CS=4, Math=2, Physics=2, NULL=1), CS first"
        command: |
          var rows = __run_query("SELECT major, COUNT(*) AS n FROM students GROUP BY major ORDER BY n DESC, major");
          assert(rows.length === 4, "Expected 4 groups (CS, Math, Physics, and NULL). Got " + rows.length);
          assert(rows[0].major === 'CS' && rows[0].n === 4, "CS should have 4 students and be first when ordered by count DESC");
          var total = rows.reduce(function(acc, r){ return acc + r.n; }, 0);
          assert(total === 9, "Group counts should sum to 9 (the full students table). Got " + total);
        hints:
          - text: "Remember NULL is its own group. If one student has no major, GROUP BY creates a separate group for NULL — that brings you to 4 groups, not 3."
            condition: "code_contains: group by"
          - text: "To show the largest group first, sort by the count column in descending order. You can use the column alias from SELECT."
            condition: "code_missing: order by"
      - description: "Query 1 SELECT respects the grouping rule (only grouped column + aggregate)"
        command: |
          var src = __read_file('aggregate.sql').toLowerCase().split('\n').filter(function(l){ return l.trim().indexOf('--') !== 0; }).join('\n');
          // First SELECT with GROUP BY must not include 'name' (the classic violation).
          var firstStmt = (src.match(/select[\s\S]*?group\s+by[^;]*?;/) || [])[0] || '';
          var selectCols = (firstStmt.match(/select\s+([\s\S]*?)\s+from/) || [])[1] || '';
          assert(selectCols.indexOf('name') === -1, "Query 1 should not include `name` — it is neither grouped nor aggregated. The grouping rule forbids it.");
      - description: "Query 2 returns only CS (only group whose avg GPA exceeds 3.3)"
        command: |
          var rows = __run_query("SELECT major FROM students GROUP BY major HAVING AVG(gpa) > 3.3");
          assert(rows.length === 1, "Expected exactly 1 major with avg GPA > 3.3 (CS at 3.575). Got " + rows.length);
          assert(rows[0].major === 'CS', "CS (avg 3.575) is the only major above 3.3");
        hints:
          - text: "Use AVG() inside HAVING to compare each group's average GPA to the threshold."
            condition: "code_missing: avg"

    quiz:
      title: "Aggregation — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            A student writes:
            ```sql
            SELECT major, name, COUNT(*) AS n
            FROM students
            GROUP BY major;
            ```
            What is wrong?
          type: single
          options:
            - "COUNT(*) is not a valid aggregate function"
            - "`name` is in SELECT but not in GROUP BY or any aggregate"
            - "GROUP BY must appear before SELECT in the written query"
            - "Non-aggregate columns and aggregates cannot mix in one SELECT"
          correct_index: 1
          option_feedback:
            0: "`COUNT(*)` is the canonical row-count aggregate — it appears in every SQL textbook and is the *most* widely-supported function in SQL. The problem isn't that aggregate; it's the bare column next to it."
            2: "Clauses *appear* in a fixed order in the written query (SELECT → FROM → WHERE → GROUP BY), but they are *evaluated* in a different order: FROM → WHERE → GROUP BY → SELECT. This question is about a semantic violation, not a syntactic one."
            3: "Aggregates and non-aggregates *can* mix — that's the whole point of GROUP BY. The rule is: every non-aggregate column must appear in GROUP BY so the database knows it has one value per group. Here `name` doesn't, so the database has multiple names per major and no rule for which to pick."
          explanation: |
            The **grouping rule**: every column in `SELECT` must either appear in `GROUP BY` or be wrapped in an aggregate. `name` is neither — there are multiple names per major, so it's undefined which one to return. SQLite may pick an arbitrary name; PostgreSQL and strict-mode MySQL reject this entirely.

        - question: |
            Which clause filters **groups** based on an aggregate condition?
          type: single
          options:
            - "`WHERE`"
            - "`HAVING`"
            - "`FILTER`"
            - "`SELECT ... WHERE`"
          correct_index: 1
          option_feedback:
            0: "WHERE filters *rows* before grouping — at WHERE-time, the aggregates don't exist yet. `WHERE COUNT(*) > 5` is always an error."
            2: "FILTER exists in some dialects (SQL:2003 introduced `FILTER (WHERE ...)` for inline aggregate filtering), but it's per-aggregate. Group-level filtering is HAVING's job."
            3: "There's no `SELECT ... WHERE` clause structure for groups — SELECT projects, WHERE filters rows, HAVING filters groups. Three different jobs, three different keywords."
          explanation: |
            `WHERE` filters individual rows *before* grouping. `HAVING` filters groups *after* aggregation. `WHERE COUNT(*) > 5` is always an error because the count doesn't exist yet when `WHERE` runs. Use `HAVING COUNT(*) > 5`.

        - question: |
            If 3 out of 10 students have a NULL value in the `gpa` column, what does each of these return?
            `COUNT(*)` vs `COUNT(gpa)`
          type: single
          options:
            - "Both return 10 — COUNT always includes every row"
            - "Both return 7 — COUNT skips NULL rows"
            - "`COUNT(*)` returns 10; `COUNT(gpa)` returns 7"
            - "`COUNT(*)` returns 7; `COUNT(gpa)` returns 10"
          correct_index: 2
          option_feedback:
            0: "`COUNT(*)` does count every row, but `COUNT(column)` is a *different aggregate* that filters NULLs. The two forms exist precisely to give you a choice between \"how many rows in the group?\" and \"how many known values in this column?\""
            1: "This collapses the two forms into one. The distinction is intentional: when the column is the *answer* (\"how many students have a known GPA?\") use `COUNT(column)`; when you want the group's size regardless of nullness use `COUNT(*)`."
            3: "Backwards. `COUNT(*)` always sees the row even if every column is NULL — only the *row's existence* matters. `COUNT(gpa)` is the one that drops the NULLs."
          explanation: |
            `COUNT(*)` counts every row regardless of NULLs. `COUNT(column)` counts only rows where that column is **not NULL**. The distinction is critical whenever a column is optional — use the right one depending on whether you want to count the group size or the number of known values.

        - question: |
            A query uses `WHERE year > 2` to filter rows before grouping. If a student has `year` set to NULL, are they included in the grouped results?
          type: single
          options:
            - "Yes — NULL is treated as 0, which is not greater than 2"
            - "Yes — WHERE passes all rows to GROUP BY by default"
            - "No — `NULL > 2` is UNKNOWN, and WHERE discards UNKNOWN rows"
            - "It depends on the database engine"
          correct_index: 2
          option_feedback:
            0: "SQL treats NULL as *unknown*, not *zero*: `NULL > 2`, `NULL = 0`, `NULL = NULL` all evaluate to UNKNOWN — never TRUE, never FALSE. Spreadsheets coerce blank cells to 0, which sets up the wrong intuition for SQL."
            1: "WHERE applies its predicate to *every* row, including NULL ones. There is no \"pass-through\" rule; the predicate just gets a NULL operand and produces UNKNOWN, which WHERE then drops."
            3: "NULL handling in WHERE is one of the *most* consistent parts of SQL across engines — three-valued logic (TRUE/FALSE/UNKNOWN) is in the ANSI standard and every major database implements it the same way. Other things vary; this doesn't."
          explanation: |
            From Step 3: `NULL > 2` evaluates to UNKNOWN, and `WHERE` discards UNKNOWN rows before grouping even begins. Always check whether NULLs in filtered columns are affecting your aggregates.

        - question: |
            **Arrange** the clauses to count students per major, but only show majors with more than 2 students.
          type: parsons
          lines:
            - "SELECT major, COUNT(*) AS n"
            - "FROM students"
            - "GROUP BY major"
            - "HAVING COUNT(*) > 2;"
          distractors:
            - "WHERE COUNT(*) > 2;"
            - "ORDER BY major"
          explanation: |
            `WHERE` cannot hold aggregates — the count does not exist yet when WHERE runs. `HAVING` filters *after* grouping.

        - question: |
            **Arrange** the steps in the order the database *actually executes* them, for this query:
            ```sql
            SELECT major, COUNT(*) AS n FROM students
            WHERE year > 1 GROUP BY major HAVING COUNT(*) >= 2 ORDER BY n DESC;
            ```
          type: parsons
          lines:
            - "FROM students — read the source rows"
            - "WHERE year > 1 — drop rows where year is 1 or NULL"
            - "GROUP BY major — partition surviving rows into groups"
            - "HAVING COUNT(*) >= 2 — drop groups smaller than 2"
            - "SELECT major, COUNT(*) AS n — project the final columns"
            - "ORDER BY n DESC — sort groups by count"
          distractors:
            - "SELECT first, then filter rows in WHERE"
            - "ORDER BY runs before HAVING"
          explanation: |
            SELECT is written first but evaluated fifth. This is why aliases defined in SELECT cannot be used in WHERE, and why aggregates in WHERE always fail.

        - question: |
            *[Review from Step 3]* A table has a nullable `status` column. Which query correctly finds all rows where status is either `'inactive'` or unknown?
          type: single
          options:
            - "`WHERE status = 'inactive' OR status = NULL`"
            - "`WHERE status = 'inactive' OR status IS NULL`"
            - "`WHERE status IN ('inactive', NULL)`"
            - "`WHERE status != 'active'`"
          correct_index: 1
          option_feedback:
            0: "The first half is fine, but `status = NULL` always evaluates to UNKNOWN — it never matches. SQL has `IS NULL` precisely because `=` doesn't work on NULL."
            2: "`IN (a, b)` desugars to `status = a OR status = b`. The NULL inside expands to `status = NULL`, which is UNKNOWN, so it silently misses NULL rows."
            3: "`!= 'active'` drops NULL rows the same way `= 'inactive'` does — three-valued logic strikes again. You'd need `OR status IS NULL` regardless."
          explanation: |
            `= NULL` and `IN (..., NULL)` both silently miss NULL rows (internally they use `=`). `!= 'active'` drops NULL rows too. Only `IS NULL` works.

  # --------------------------------------------------------------------------
  # STEP 5: CREATE TABLE + INSERT INTO — designing and populating a table
  # Audit fix: Error taxonomy moved here from former Step 2 (WHERE, now Step 3),
  #   plus the 4th "constraint violation" category called out for Insert C.
  # Added: Bloom's Create-level quiz question, scaffold fading (lighter hints)
  # Bloom's: Understand / Apply / Create
  # --------------------------------------------------------------------------
  - title: "Designing Your Own Table"
    instructions: |
      ## CREATE TABLE and INSERT INTO

      > **Learning objective:** Design a table that protects its own integrity — so bad data cannot enter in the first place — and classify query errors so you can debug them efficiently.

      You have been querying an existing table for four steps. Now it is time to build your own. If constraint syntax feels fiddly at first, that is normal — the payoff is that the database catches bad data before it becomes a bug.

      ### CREATE TABLE

      **`CREATE TABLE` is *schema declaration*** — it defines the shape and integrity rules of a table (columns, types, constraints), not the data. Like declaring a `struct`, not creating an instance.

      ```sql
      CREATE TABLE books (
        id     INTEGER PRIMARY KEY,    -- identity: unique + non-null
        title  TEXT    NOT NULL,       -- required
        author TEXT    NOT NULL,       -- required
        pages  INTEGER                 -- optional (nullable by default)
      );
      ```

      - `PRIMARY KEY` = unique + non-null + indexed.
      - `NOT NULL` = required.
      - Types: `INTEGER`, `REAL`, `TEXT`, `BLOB`.

      **SQLite quirk:** standard SQL makes `PRIMARY KEY` imply `NOT NULL`; SQLite does not. Add `NOT NULL` explicitly if portability matters.

      ### INSERT INTO

      **`INSERT INTO` is *row insertion*** — it adds new rows that must conform to the schema's types and constraints.

      ```sql
      INSERT INTO books (id, title, author, pages) VALUES
        (1, 'SICP', 'Abelson & Sussman', 657);
      ```

      Omitting a `NOT NULL` column (with no default) fails. Nullable columns can be skipped. After any insert/update, run a quick `SELECT` to verify.

      ### Four kinds of SQL errors

      1. **Syntax** — grammar violated. Refuses to run.
      2. **Semantic** — valid grammar, references something that does not exist (wrong column name). Errors at parse time.
      3. **Logical** — runs and returns a result, but the *wrong* result (e.g., the NULL trap from Step 3). No error message — the hardest to catch.
      4. **Constraint violation** — grammatically and semantically valid, but violates `PRIMARY KEY` / `NOT NULL` / `UNIQUE` / `FOREIGN KEY` at execution time.

      ### Predict before you run

      Read the two files (`schema.sql` and `populate.sql`) before touching either. Then write down (in a comment in the file or on paper):

      1. *Which* of the three INSERT statements will succeed against the **strengthened** schema (the one with the constraints from the table below)?
      2. For each insert that fails, *which constraint* will it violate — and which of the four error categories does that map to?

      Once you have written your prediction, then strengthen the schema and run the inserts. Compare the actual failures to your prediction. The point isn't to be right; it's to *commit* to a hypothesis before the database tells you the answer.

      ### Task

      A teammate handed you two unreviewed files. Bring them up to production quality.

      **1. `schema.sql` — strengthen.** It compiles, but has no integrity constraints. Add the missing types + constraints:

      | Column   | Type    | Constraints              |
      |----------|---------|--------------------------|
      | `id`     | INTEGER | PRIMARY KEY              |
      | `code`   | TEXT    | NOT NULL                 |
      | `name`   | TEXT    | NOT NULL                 |
      | `credits`| INTEGER | (nullable — leave as is) |

      Above each constraint, write a one-line comment naming *the bug it prevents* (e.g., `-- prevents duplicate course IDs`).

      **2. `populate.sql` — classify and repair.** Three `INSERT` statements. Two fail against the strengthened schema. For each failing insert, decide which error category fits, then fix it (or replace with a valid row). End with `SELECT * FROM courses;`. Aim for at least 3 rows.

      <details markdown="1"><summary>Translating to pandas</summary>

      | SQL | pandas |
      |-----|--------|
      | `CREATE TABLE books (id INTEGER PRIMARY KEY, title TEXT NOT NULL, ...)` | `books = pd.DataFrame(columns=['id', 'title', 'author', 'pages'])` |
      | `INSERT INTO books VALUES (1, 'SICP', 'Abelson', 657)` | `books.loc[len(books)] = [1, 'SICP', 'Abelson', 657]` |

      pandas accepts anything silently — wrong types, missing required fields. SQL *enforces* the schema and catches those bugs at insert time.

      </details>

    files:
      - path: "schema.sql"
        content: |
          -- Step 5a — Designing a schema that protects its own data.
          -- The CREATE below runs, but it has NO constraints.
          -- Add the missing types + constraints from the table in the instructions.
          -- For each constraint you add, leave a one-line comment naming the bug it prevents.
          DROP TABLE IF EXISTS courses;

          CREATE TABLE courses (
            id,
            code,
            name,
            credits
          );
        language: "sql"
      - path: "populate.sql"
        content: |
          -- Step 5b — Populating the strengthened schema.
          -- Classify each broken INSERT (syntax / semantic / logical / constraint violation), then fix.
          DELETE FROM courses;

          -- Insert A — the model row. Matches the schema exactly.
          INSERT INTO courses (id, code, name, credits) VALUES
            (1, 'CS 35L', 'Software Construction', 4);

          -- Insert B — predict what breaks when the schema enforces NOT NULL
          INSERT INTO courses (id, code, credits) VALUES
            (2, 'CS 111', 4);

          -- Insert C — all values look plausible. What does the strengthened schema
          -- reject here? Look carefully at how this row compares to Insert A.
          INSERT INTO courses (id, code, name, credits) VALUES
            (1, 'MATH 61', 'Discrete Structures', 4);

          -- Verify your data. Leave this line as the last statement.
          SELECT * FROM courses;
        language: "sql"

    open_file: "schema.sql"

    solution:
      files:
        - path: "schema.sql"
          content: |
            DROP TABLE IF EXISTS courses;

            CREATE TABLE courses (
              id      INTEGER PRIMARY KEY,
              code    TEXT    NOT NULL,
              name    TEXT    NOT NULL,
              credits INTEGER
            );
          language: "sql"
        - path: "populate.sql"
          content: |
            DELETE FROM courses;

            INSERT INTO courses (id, code, name, credits) VALUES
              (1, 'CS 35L',  'Software Construction', 4),
              (2, 'CS 111',  'Operating Systems',     4),
              (3, 'MATH 61', 'Discrete Structures',   4);

            SELECT * FROM courses;
          language: "sql"
      explanation: |
        `CREATE TABLE` declares the shape; `INSERT INTO` adds rows that must conform. The final `SELECT * FROM courses` verifies the data. `DROP TABLE IF EXISTS` at the top makes `schema.sql` safe to re-run.

        **On Insert C:** all four values looked plausible in isolation, but `id = 1` is already taken by Insert A. The strengthened schema has `id INTEGER PRIMARY KEY`, which enforces uniqueness — so the database raises a **constraint violation** at execution time. The fix is to give the new row a distinct `id` (e.g., `3, 'MATH 61', 'Discrete Structures', 4`). Constraint violations sit between semantic errors (caught at parse time) and logical errors (never caught): the database catches them, but only when the statement runs.

    tests:
      - description: "courses table exists with the expected 4 columns"
        command: |
          var tbl = __run_query("SELECT name FROM sqlite_master WHERE type='table' AND name='courses'");
          assert(tbl.length === 1, "Expected a table named 'courses' — run your CREATE TABLE statement first");
          var info = __run_query("PRAGMA table_info(courses)");
          var cols = info.map(function(r){ return r.name; }).sort().join(',');
          assert(cols === 'code,credits,id,name', "Expected columns id, code, name, credits — got: " + cols);
        hints:
          - text: "You need a statement that defines a new table's structure. It starts with two keywords and lists column-type-constraint triples inside parentheses."
            condition: "code_missing: create table"
          - text: "Your CREATE TABLE is there — check that the column names exactly match the table in the instructions: id, code, name, credits."
            condition: "code_contains: create table"
      - description: "id is declared PRIMARY KEY"
        command: |
          var info = __run_query("PRAGMA table_info(courses)");
          var idCol = info.filter(function(r){ return r.name === 'id'; })[0];
          assert(idCol, "Missing 'id' column");
          assert(idCol.pk === 1, "The 'id' column should be declared PRIMARY KEY — that is what guarantees uniqueness per row");
        hints:
          - text: "Every row needs a unique identifier. Which two keywords, applied to a column, enforce both uniqueness and non-nullness on standard databases?"
            condition: "code_missing: primary key"
      - description: "code and name are declared NOT NULL"
        command: |
          var info = __run_query("PRAGMA table_info(courses)");
          var code = info.filter(function(r){ return r.name === 'code'; })[0];
          var name = info.filter(function(r){ return r.name === 'name'; })[0];
          assert(code && code.notnull === 1, "The 'code' column should be NOT NULL — prevents unlabeled courses");
          assert(name && name.notnull === 1, "The 'name' column should be NOT NULL — prevents nameless courses");
        hints:
          - text: "Which constraint, added after the type declaration, rejects inserts that omit this column?"
            condition: "code_missing: not null"
          - text: "You have NOT NULL somewhere — but check that *both* `code` and `name` carry it. `credits` should stay nullable."
            condition: "code_contains: not null"
      - description: "credits remains nullable (optional field)"
        command: |
          var info = __run_query("PRAGMA table_info(courses)");
          var credits = info.filter(function(r){ return r.name === 'credits'; })[0];
          assert(credits && credits.notnull === 0, "The 'credits' column should remain nullable — the instructions mark it optional");
      - description: "courses has at least 3 valid rows (populate.sql was repaired)"
        command: |
          var rows = __run_query("SELECT COUNT(*) AS n FROM courses");
          assert(rows[0].n >= 3, "Expected at least 3 rows — Insert B needs a name, Insert C needs a new id. Got " + rows[0].n);
          var bad = __run_query("SELECT * FROM courses WHERE code IS NULL OR name IS NULL");
          assert(bad.length === 0, "No row may have a NULL code or name (the NOT NULL constraints should prevent this).");
        hints:
          - text: "Insert B is missing the `name` value — that violates NOT NULL. Add a course name."
            condition: "code_missing: insert"
          - text: "Still getting fewer than 3 rows? Check that Insert C has a *unique* id — it currently collides with Insert A's id=1 (that's the constraint violation)."
            condition: "code_contains: insert"
      - description: "course ids are unique (PRIMARY KEY enforced)"
        command: |
          var rows = __run_query("SELECT id, COUNT(*) AS n FROM courses GROUP BY id HAVING COUNT(*) > 1");
          assert(rows.length === 0, "Two rows share the same id — that is the Insert C constraint violation. Change Insert C's id.");
      - description: "students table is still intact (do not disturb data from Steps 1–4)"
        command: |
          var rows = __run_query("SELECT COUNT(*) AS n FROM students");
          assert(rows[0].n === 9, "The students table should have 9 rows — do not modify it");

    quiz:
      title: "Creating Tables — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            What does `PRIMARY KEY` guarantee about a column's values?
          type: single
          options:
            - "Values are sorted in ascending order"
            - "The column cannot contain text"
            - "Each value is unique and non-null across all rows"
            - "The column is indexed for faster lookups only"
          correct_index: 2
          option_feedback:
            0: "Storage may *happen* to keep PK rows ordered (B-tree indexes do this), but logically there's no sort guarantee. Result-set order still requires `ORDER BY`."
            1: "PRIMARY KEY can be on any type — INTEGER, TEXT, BLOB. The constraint is uniqueness, not the column type."
            3: "An implicit index *is* created, but that's a side effect. The defining contract is uniqueness + non-null, which is what 'identifying every row' requires."
          explanation: |
            `PRIMARY KEY` enforces two things: uniqueness (no two rows share the same value) and non-nullability. It also creates an implicit index, but its core purpose is to uniquely identify every row.

        - question: |
            What happens if you `INSERT INTO` a row but omit a column declared `NOT NULL` with no default?
          type: single
          options:
            - "The column is automatically set to 0 or an empty string"
            - "The row is inserted with NULL in that column"
            - "The database raises an error and the row is not inserted"
            - "The row is inserted but flagged as incomplete"
          correct_index: 2
          option_feedback:
            0: "There's no implicit default of 0 or `''` unless you declared one. Without `DEFAULT`, the column has no fallback."
            1: "That'd defeat the purpose of `NOT NULL`. The constraint says the column may *never* be NULL — including at insert time."
            3: "There's no 'incomplete' state. A row either satisfies all constraints or the insert is rejected outright."
          explanation: |
            A `NOT NULL` column with no default value **requires** an explicit value. Omitting it in the `INSERT` causes an error — the database enforces the constraint and refuses the row.

        - question: |
            A student writes:
            ```sql
            SELECT full_name FROM students WHERE full_name = 'Mango';
            ```
            The column is actually named `name`, not `full_name`. What *type* of SQL error is this?
          type: single
          options:
            - "Logical error — the query runs but returns wrong rows"
            - "Semantic error — valid grammar, but references something that does not exist"
            - "Syntax error — the SQL grammar rules are violated"
            - "Constraint violation — a NOT NULL or PRIMARY KEY rule was broken"
          correct_index: 1
          option_feedback:
            0: "A logical error runs *successfully* but produces the wrong result. Here the query never runs — the column lookup fails before execution."
            2: "Syntax errors are about grammar (missing parentheses, misplaced clauses). The grammar is fine here; the *meaning* is broken."
            3: "Constraints are about row-level data validity (NOT NULL, PRIMARY KEY, FOREIGN KEY). This is a *naming* problem at parse time."
          explanation: |
            A **semantic error** is a query that is grammatically correct SQL but references something that doesn't exist (wrong column name, wrong table). A syntax error violates grammar (wrong clause order, missing parentheses). A logical error is when the query runs but returns the wrong answer.

        - question: |
            You need to store a library's book collection. Each book has a title, author, year published, and an optional page count. Which schema is best?
          type: single
          options:
            - "`CREATE TABLE books (title TEXT, author TEXT, year INTEGER, pages INTEGER)`"
            - "`CREATE TABLE books (id INTEGER PRIMARY KEY, title TEXT NOT NULL, author TEXT NOT NULL, year INTEGER, pages INTEGER)`"
            - "`CREATE TABLE books (id INTEGER, title TEXT, author TEXT, year TEXT, pages TEXT)`"
            - "`CREATE TABLE books (book_data TEXT)`"
          correct_index: 1
          option_feedback:
            0: "Missing a `PRIMARY KEY` — without one there's no guaranteed way to uniquely identify each book, making updates and deletes ambiguous."
            2: "Storing `year` as `TEXT` instead of `INTEGER` loses type safety — you can't sort or range-query correctly, and the column accepts non-year strings."
            3: "Storing all data in a single `TEXT` column gives up all schema enforcement: no types, no `NOT NULL` constraints, and no ability to query individual fields."
          explanation: |
            The best schema has a `PRIMARY KEY` for unique identification, `NOT NULL` on required fields (title, author), appropriate types (`INTEGER` for year, not `TEXT`), and leaves optional fields (`pages`) nullable.

        - question: |
            **Arrange** the lines to create a `songs` table with a primary key and a required title.
          type: parsons
          lines:
            - "CREATE TABLE songs ("
            - "  id INTEGER PRIMARY KEY,"
            - "  title TEXT NOT NULL,"
            - "  artist TEXT,"
            - "  plays INTEGER"
            - ");"
          distractors:
            - "  id INTEGER UNIQUE,"
            - "  title TEXT NULL,"
          explanation: |
            `PRIMARY KEY` provides uniqueness *and* identification — `UNIQUE` alone lacks the "identity" role. `NOT NULL` on title ensures every song has a name. `TEXT NULL` is redundant (columns are nullable by default) and wrong for a required field.

        - question: |
            *[Review]* What is the **correct logical execution order** of these SQL clauses?
          type: parsons
          lines:
            - "FROM"
            - "WHERE"
            - "GROUP BY"
            - "HAVING"
            - "SELECT"
            - "ORDER BY"
          distractors:
            - "SORT BY"
            - "FILTER"
          explanation: |
            The logical execution order is FROM → WHERE → GROUP BY → HAVING → SELECT → ORDER BY. This is why you cannot use a SELECT alias in WHERE (the alias doesn't exist yet) and why WHERE cannot use aggregate functions (groups don't exist yet). `SORT BY` is not valid SQL (use `ORDER BY`); `FILTER` is not a standalone clause.

  # --------------------------------------------------------------------------
  # STEP 6: UPDATE + DELETE + DROP TABLE — modifying and removing data
  # Added: Safe failure simulation (DELETE without WHERE), faded scaffolding
  #   (less hand-holding in TODO comments), metacognitive reflection,
  #   "Where to go next" epilogue (LEFT JOIN, CTEs, N+1).
  # Bloom's: Apply / Evaluate
  # --------------------------------------------------------------------------
  - title: "Modifying & Cleaning Up"
    instructions: |
      ## UPDATE, DELETE, and DROP TABLE

      > **Learning objective:** Change or remove data without damaging the rest of the database, recognize destructive statements before they run, and apply the professional habit of previewing impact before committing.

      Destructive SQL is where careful habits pay off. If you have ever run a shell command and watched the wrong files disappear, you already know the feeling — these patterns exist so you do not have it in production.

      ### Safe failure experiment

      Run `SELECT * FROM students;` and note the row count. Now run `DELETE FROM students;` (no WHERE). Run the SELECT again — the table is empty. The page reload restores the seed data; production has no reload button.

      ### UPDATE, DELETE, DROP

      All three are *destructive* — they change the database state, in irreversible ways without a backup.

      - **`UPDATE` modifies values in existing rows.** Scoped by `WHERE`.
      - **`DELETE` removes rows.** Scoped by `WHERE`. Schema stays.
      - **`DROP TABLE` removes the table itself** — data *and* schema. No undo.

      ```sql
      UPDATE students SET gpa = 3.95 WHERE name = 'Mango';
      DELETE FROM students WHERE gpa < 3.0;
      DROP TABLE IF EXISTS courses;
      ```

      Without `WHERE`, `UPDATE` modifies **every row** and `DELETE` empties the table. Safe habit: write `SELECT ... WHERE ...` first, then convert.

      | Statement | Removes | Schema remains? |
      |---|---|---|
      | `DELETE FROM t WHERE ...` | Matching rows | Yes |
      | `DELETE FROM t` | All rows | Yes |
      | `DROP TABLE t` | All rows + schema | No |

      ### Task

      A teammate pushed `cleanup.sql` to a PR. It is scheduled to run on production in an hour. **Do not approve it as-is.**

      For each statement:

      1. **Predict** what it *actually* does — not what the comment claims.
      2. **Preview with a SELECT.** Write the `SELECT ... WHERE ...` that would reveal the affected rows; leave it as a comment above the fixed statement so the next reviewer sees your reasoning.
      3. **Fix** the statement to match its stated intent.

      That trail — claim, preview, confirm — is how destructive SQL actually gets approved.

      **Stated intents:**

      1. Update Kiwi's GPA from 3.50 to 3.60.
      2. Delete all year-4 students.
      3. Drop the `courses` table from Step 5.

      <details markdown="1"><summary>Translating to pandas</summary>

      | SQL | pandas |
      |-----|--------|
      | `UPDATE students SET gpa = 3.6 WHERE name = 'Kiwi'` | `students.loc[students['name'] == 'Kiwi', 'gpa'] = 3.6` |
      | `DELETE FROM students WHERE year = 4` | `students = students[students['year'] != 4]` |
      | `DROP TABLE courses` | `del courses` |

      SQL modifies in place; pandas often returns a new frame. In SQL, forgetting `WHERE` is permanent.

      </details>

      <details markdown="1"><summary>🎓 Where to go next</summary>

      This tutorial covers the ~90% of SQL that 90% of code needs. Three topics deserve your next hour:

      - **`LEFT JOIN` and the outer-join family.** Step 2 taught `JOIN`, which drops rows with no match (Blue Bella with NULL major). `LEFT JOIN` keeps them and fills the right side with NULL.
      - **Common Table Expressions (`WITH ... AS (...)`).** Complex queries collapse from unreadable nested subqueries into top-to-bottom readable pipelines.
      - **The N+1 query problem.** The #1 antipattern at the app ↔ SQL boundary: looping over a list, firing one query per element. Batch with `WHERE id IN (...)` or an explicit JOIN.

      </details>

    files:
      - path: "cleanup.sql"
        content: |
          -- Step 6 — Review a teammate's destructive PR before it runs in production.
          -- For each statement: predict, preview with a commented SELECT, then fix.

          -- 1. Intended: raise Kiwi's GPA to 3.6.
          --    Read this UPDATE carefully. Does it actually do what the comment promises?
          --    Preview by running a SELECT with the same WHERE clause first.
          UPDATE students SET gpa = 3.6 WHERE name = 'Mango';

          -- 2. Intended: delete all year-4 students.
          --    Wrong column referenced. Would this even run? If yes, what does it delete?
          DELETE FROM students WHERE gpa = 4;

          -- 3. Intended: drop the courses table.
          --    Works most of the time. When would this statement crash the deploy,
          --    and how do you make it safe to re-run?
          DROP TABLE courses;
        language: "sql"

    open_file: "cleanup.sql"

    solution:
      files:
        - path: "cleanup.sql"
          content: |
            -- 1. Update Kiwi's GPA to 3.6
            UPDATE students SET gpa = 3.6 WHERE name = 'Kiwi';

            -- 2. Delete all year-4 contestants
            DELETE FROM students WHERE year = 4;

            -- 3. Drop the courses table
            DROP TABLE IF EXISTS courses;
          language: "sql"
      explanation: |
        **Task 1:** `UPDATE ... SET ... WHERE` modifies only the rows matching the WHERE clause. Without `WHERE name = 'Kiwi'`, every student's GPA would become 3.6.

        **Task 2:** `DELETE FROM ... WHERE year = 4` removes Coconick and Orangelo. Without the `WHERE`, all 9 students would be deleted.

        **Task 3:** `DROP TABLE IF EXISTS` is safer than plain `DROP TABLE` — it avoids an error if the table was already dropped or never created. After this, `SELECT * FROM courses` would produce an error (the table no longer exists), while `DELETE FROM courses` without WHERE would leave the table empty but still queryable.

    tests:
      - description: "cleanup.sql contains UPDATE, DELETE, and DROP statements"
        command: |
          var src = __read_file('cleanup.sql').toLowerCase().split('\n').filter(function(l){ return l.trim().indexOf('--') !== 0; }).join('\n');
          assert(/\bupdate\b/.test(src), "Task 1 should use an UPDATE statement");
          assert(/\bdelete\b/.test(src), "Task 2 should use a DELETE statement");
          assert(/\bdrop\s+table\b/.test(src), "Task 3 should use a DROP TABLE statement");
        hints:
          - text: "To change a value in an existing row you need a statement that *sets* a column — restricted to the right row by a WHERE clause."
            condition: "code_missing: update"
          - text: "To remove rows you need a statement that deletes — and almost always with a WHERE clause, unless you mean to empty the table."
            condition: "code_missing: delete"
          - text: "To remove a table entirely (data *and* structure) you need a different statement — not DELETE. Which one, and which keyword makes it safe to re-run?"
            condition: "code_missing: drop"
      - description: "Every destructive statement is scoped (has a WHERE or the IF EXISTS guard)"
        command: |
          var src = __read_file('cleanup.sql').toLowerCase().split('\n').filter(function(l){ return l.trim().indexOf('--') !== 0; }).join('\n');
          // Any UPDATE or DELETE without a WHERE on the same statement is dangerous.
          var stmts = src.split(';');
          stmts.forEach(function(s){
            if (/\bupdate\b/.test(s) && !/\bwhere\b/.test(s)) {
              throw new Error("UPDATE without WHERE would overwrite every row. Add a WHERE clause.");
            }
            if (/\bdelete\s+from\b/.test(s) && !/\bwhere\b/.test(s)) {
              throw new Error("DELETE without WHERE would empty the table. Add a WHERE clause.");
            }
          });
        hints:
          - text: "Stuck? Every UPDATE and DELETE should specify *which* rows it affects — that's what WHERE is for."
            condition: "code_missing: where"
          - text: "Sanity check: before running an UPDATE, write the equivalent SELECT first (`SELECT * FROM students WHERE …`) to see exactly which rows you'll change. If you see more rows than you meant, your WHERE is too loose."
            condition: "output_contains: without WHERE"
      - description: "DROP TABLE uses IF EXISTS (safe to re-run)"
        command: |
          var src = __read_file('cleanup.sql').toLowerCase().split('\n').filter(function(l){ return l.trim().indexOf('--') !== 0; }).join('\n');
          assert(/drop\s+table\s+if\s+exists\b/.test(src),
            "Use `DROP TABLE IF EXISTS courses;` — plain DROP TABLE crashes if the table was already removed, breaking idempotent deploys");
        hints:
          - text: "Plain `DROP TABLE courses` raises an error if `courses` has already been dropped. Two words, inserted between `TABLE` and the name, make the statement idempotent."
            condition: "code_missing: if exists"
      - description: "Kiwi's GPA is now exactly 3.6 (and nobody else was disturbed)"
        command: |
          var rows = __run_query("SELECT name, gpa FROM students WHERE name = 'Kiwi'");
          assert(rows.length === 1, "Kiwi should still be in the table");
          assert(Math.abs(rows[0].gpa - 3.6) < 0.001, "Kiwi's GPA should be 3.6 after UPDATE, got " + rows[0].gpa);
          // Safety check: the other CS student GPAs should still be their seed values (not 3.6).
          var mango = __run_query("SELECT gpa FROM students WHERE name = 'Mango'");
          assert(Math.abs(mango[0].gpa - 3.9) < 0.001,
            "Mango's GPA changed from 3.9 to " + mango[0].gpa + " — the original UPDATE targeted the wrong student. Your fix should only touch Kiwi.");
        hints:
          - text: "Your UPDATE is there but Kiwi's GPA isn't 3.6 yet. Check the WHERE clause — are you targeting the right student?"
            condition: "code_contains: update"
          - text: "Mango's GPA changed when it should not have. The original UPDATE used `name = 'Mango'`. Change the predicate to target Kiwi."
            condition: "code_contains: mango"
      - description: "All year-4 contestants are gone; no earlier-year contestants were deleted"
        command: |
          var year4 = __run_query("SELECT * FROM students WHERE year = 4");
          assert(year4.length === 0, "Expected no year-4 contestants. Got " + year4.length);
          // Safety check: the other years should still be intact (year 1..3 counts should sum to 7 = 9 - 2 year-4).
          var remaining = __run_query("SELECT COUNT(*) AS n FROM students");
          assert(remaining[0].n === 7, "Expected 7 contestants remaining (9 minus 2 year-4). Got " + remaining[0].n + ". Your DELETE may be matching the wrong column.");
        hints:
          - text: "The original DELETE references `gpa` — that is the wrong column. Which column records the contestant's year?"
            condition: "code_contains: gpa = 4"
      - description: "courses table has been dropped"
        command: |
          var rows = __run_query("SELECT name FROM sqlite_master WHERE type='table' AND name='courses'");
          assert(rows.length === 0, "Expected courses table to be gone — use `DROP TABLE IF EXISTS courses;`");

    quiz:
      title: "Modifying & Cleaning Up — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            A developer runs:
            ```sql
            DELETE FROM orders;
            ```
            What is the result?
          type: single
          options:
            - "The orders table is removed from the database"
            - "All rows are deleted but the table structure remains"
            - "An error — DELETE requires a WHERE clause"
            - "Only rows matching the implicit WHERE TRUE condition are deleted"
          correct_index: 1
          option_feedback:
            0: "DELETE removes *rows*, not the table itself. To remove the schema too, use DROP TABLE."
            2: "SQL doesn't require WHERE on DELETE — that's *exactly* what makes this footgun dangerous. The query runs cleanly and empties the table."
            3: "There's no implicit WHERE TRUE concept — DELETE without WHERE just deletes everything by design. The framing in this option implies a safety net that doesn't exist."
          explanation: |
            `DELETE FROM orders` without a `WHERE` deletes every row but leaves the table schema intact. The table still exists — it is just empty. To remove the schema too, use `DROP TABLE orders`. SQL does not require a `WHERE` clause on `DELETE`, which makes this mistake easy to make in production.

        - question: |
            What is the safest way to remove a table that may or may not exist, without causing an error?
          type: single
          options:
            - "`REMOVE TABLE IF EXISTS courses;`"
            - "`DELETE TABLE courses;`"
            - "`DROP TABLE IF EXISTS courses;`"
            - "`TRUNCATE TABLE IF EXISTS courses;`"
          correct_index: 2
          option_feedback:
            0: "There's no `REMOVE TABLE` keyword in SQL. The keyword is `DROP`."
            1: "`DELETE TABLE` is invalid syntax. `DELETE FROM` removes rows; `DROP TABLE` removes the table itself."
            3: "`TRUNCATE` removes rows (like DELETE without WHERE) but keeps the schema. Also, SQLite doesn't support TRUNCATE at all — and `TRUNCATE TABLE IF EXISTS` isn't standard."
          explanation: |
            `DROP TABLE IF EXISTS tablename` is the idiomatic safe form. Plain `DROP TABLE tablename` raises an error if the table doesn't exist. `DELETE TABLE` is not valid SQL. `TRUNCATE` removes all rows (like `DELETE`) but keeps the schema, and is not supported by all databases (including SQLite).

        - question: |
            Before running an `UPDATE` on a production table, what should you do first?
          type: single
          options:
            - "Run the UPDATE and check the result in the UI"
            - "Run a SELECT with the same WHERE clause to preview affected rows"
            - "Add `ORDER BY` to the UPDATE so the order is deterministic"
            - "Change WHERE to WHERE TRUE so every row is visible"
          correct_index: 1
          option_feedback:
            0: "By the time you check the UI, the change is committed. The whole point is to preview *before* the destructive action."
            2: "ORDER BY on UPDATE doesn't preview anything — and it's not even standard. The point is to verify *which rows* are affected, not what order they're processed in."
            3: "WHERE TRUE matches *every* row — the opposite of safe. You want to verify the *specific* rows the UPDATE will hit."
          explanation: |
            Running `SELECT ... WHERE ...` with the same predicate lets you *see* exactly which rows the UPDATE will touch — before the change is permanent. This is the claim/preview/confirm trail the task demonstrated.

        - question: |
            After running `DROP TABLE courses`, what happens if you run `SELECT * FROM courses`?
          type: single
          options:
            - "It returns an empty result set (no rows, but the columns are shown)"
            - "The database raises an error — the table no longer exists"
            - "It returns NULL for every column"
            - "It returns the data that was in the table before the DROP"
          correct_index: 1
          option_feedback:
            0: "Empty result requires the schema to still exist (so columns are known). DROP removes the schema too — there's nothing to project."
            2: "NULL implies columns existing but values being unknown. After DROP, the columns themselves don't exist."
            3: "DROP doesn't soft-delete or version data. The table is gone; old data isn't recoverable from SQL alone."
          explanation: |
            `DROP TABLE` removes both the data **and the schema**. The table no longer exists in the database at all, so any query referencing it fails with an error. Compare this with `DELETE FROM courses` (no WHERE), which removes all rows but keeps the table structure intact — `SELECT * FROM courses` would return an empty result set, not an error.

        - question: |
            **Arrange** the steps for safely updating Kiwi's GPA. The professional workflow: preview first, then modify.
          type: parsons
          lines:
            - "-- Preview the rows you're about to change"
            - "SELECT * FROM students WHERE name = 'Kiwi';"
            - "-- Then apply the change"
            - "UPDATE students SET gpa = 3.6 WHERE name = 'Kiwi';"
          distractors:
            - "UPDATE students SET gpa = 3.6;"
            - "DELETE FROM students WHERE name = 'Kiwi';"
          explanation: |
            Always preview with SELECT before modifying production data. `UPDATE students SET gpa = 3.6;` is missing the WHERE clause — it would change *every* student's GPA to 3.6. The DELETE distractor removes the row entirely instead of updating it.

        - question: |
            *[Review from Step 4]* What is the difference between `COUNT(*)` and `COUNT(email)`?
          type: single
          options:
            - "`COUNT(*)` counts all rows; `COUNT(email)` counts only rows where `email` is not NULL"
            - "`COUNT(*)` is slower; `COUNT(email)` is optimized"
            - "They are equivalent — both count all rows"
            - "`COUNT(*)` counts columns; `COUNT(email)` counts rows"
          correct_index: 0
          option_feedback:
            1: "Performance is roughly identical for both — engines optimize them similarly. The semantic difference (NULL handling) is what matters."
            2: "They differ on rows where the named column is NULL. If `email` is nullable and some rows are NULL, the two return different counts."
            3: "Both count *rows*. `*` is a special form meaning 'count any row'; `COUNT(column)` filters rows where the column is non-NULL."
          explanation: |
            `COUNT(*)` counts every row regardless of NULL. `COUNT(column)` counts only rows where that column is not NULL.

        - question: |
            *[Review from Step 3]* Which statement correctly removes every student whose `major` is NULL?
          type: single
          options:
            - "`DELETE FROM students WHERE major = NULL`"
            - "`DELETE FROM students WHERE major IS NULL`"
            - "`DELETE FROM students WHERE major != 'CS'`"
            - "`DELETE FROM students WHERE major`"
          correct_index: 1
          option_feedback:
            0: "`= NULL` evaluates to UNKNOWN, never TRUE. The DELETE would run but match no rows — silently doing nothing, exactly the trap that motivates `IS NULL`."
            2: "`!= 'CS'` would *also* drop NULL rows by 3VL — but it would *also* delete every non-CS student with a known major. Way too broad."
            3: "Bare `WHERE major` (without an operator) treats `major` as a boolean — implicit conversion that's not portable. It's not what you want for NULL semantics."
          explanation: |
            `= NULL` always evaluates to UNKNOWN and matches no rows — the delete would silently do nothing. Only `IS NULL` tests for unknown values.

  # --------------------------------------------------------------------------
  # STEP 7 (Capstone): Putting It Together
  # Pedagogy: Backward-design enduring understanding — compose ONE query that
  #   uses every construct learned. WHERE (row filter, Step 3) + JOIN
  #   (Step 2) + GROUP BY + HAVING (group filter) + aggregates (Step 4) +
  #   ORDER BY DESC (Step 3) + explicit columns (Step 1) + aliases (Step 2).
  # Bloom: Analyze (decompose the natural-language ask) + Apply (compose) +
  #   Evaluate (verify it answers the question).
  # ICAP: Constructive — student generates from scratch, no template.
  # CLT: HIGH intrinsic load (8 interacting clauses). Scaffolding via expected
  #   output schema (feed-up) and a phrase→construct mapping table.
  # Robust to data state: question yields 2 rows with CS first in both pre-
  #   and post-Step-6 states.
  # --------------------------------------------------------------------------
  - title: "Putting It Together"
    instructions: |
      ## Capstone — One Query, Six Steps' Worth of Tools

      > **Learning objective:** Compose a single query that combines `JOIN`, `WHERE`, `GROUP BY`/`HAVING`, aggregates, and `ORDER BY` to answer a real-world question — and recognize which construct each part of the question maps to.

      You've spent six steps learning the building blocks separately. **This step is *composition*** — chaining those blocks into one query that answers a real-world question.

      ### The dean's request

      The dean wants a snapshot of **upperclassmen** (year 2 and above) by major. List each major that has **at least 2 such students**, showing:

      - the major code
      - its department
      - the advisor
      - the average GPA among those students
      - the student count

      Sort by average GPA, **highest first**.

      ### Decomposing the request

      Each phrase of a real-world ask maps to a SQL construct. Identifying these mappings *before* you type is the skill this capstone builds.

      | Phrase in the request | Construct |
      |---|---|
      | "by major" | `GROUP BY` (Step 4) |
      | "year 2 and above" — row filter | `WHERE` (Step 3) |
      | "department, advisor" — needs `majors` table | `JOIN` (Step 2) |
      | "at least 2 such students" — group filter | `HAVING COUNT(*) >= 2` (Step 4) |
      | "average GPA", "student count" | `AVG()`, `COUNT()` (Step 4) |
      | "highest first" | `ORDER BY ... DESC` (Step 3) |
      | (production hygiene) | Explicit columns + aliases (Steps 1, 2) |

      ### Plan, then type

      In `final.sql`, sketch the clauses in **execution order** as a comment, then write the query. Naming the constructs you'll need is the highest-leverage habit for aggregation queries.

      One query. No `SELECT *`. Run before you celebrate.

      ### Predict before you run

      Before you submit your query, work this out by hand:

      1. **Open the data.** The students table has 9 rows. Walk through every student's `year` and `major`. Tally per major: how many year-2-or-above students does each major have?
      2. **Apply the dean's filter** ("year ≥ 2 *and* COUNT(*) ≥ 2 per major"). Cross out any major that doesn't meet both conditions.
      3. **Now commit (on paper) to all three:**
         - The exact **number of rows** your query will return.
         - The **major** that appears in row 1 (highest avg GPA).
         - The **major** that appears in row 2.

      Then run. The fastest way to know whether your query is correct isn't "does it run?" — it's "does it return *exactly the row count, ordering, and majors I predicted?*" If your number matches but the majors are wrong, your `ORDER BY` direction is reversed. If the count is off by one, your `HAVING` threshold is wrong. Predicting *before* running converts a vague "looks fine" into a sharp diagnostic.

      <details markdown="1"><summary>⚠️ Open after you've committed to all three answers</summary>

      Two majors qualify: **CS** (Mango 3.9, Bananito 3.7, Coconick 3.4 → year≥2 count is 3, avg ≈ 3.67) and **Math** (Watermelina 3.6, Grapenzo 3.5 → year≥2 count is 2, avg = 3.55). Engineering and the NULL-major student fail one filter each. Sorted highest-first: CS, then Math.

      If your prediction matched, great — your mental model of the data + the filters + the ordering is solid. If it didn't, *that's the lesson*: pin down which step (counting / filtering / sorting / averaging) was wrong before you debug the SQL. The query is downstream of the model.

      </details>

    files:
      - path: "final.sql"
        content: |
          -- Capstone: one query that combines everything from Steps 1–6.
          -- Plan first as a comment in execution order:
          --   FROM ... → JOIN ... → WHERE ... → GROUP BY ... → HAVING ...
          --   → SELECT ... → ORDER BY ...
          -- Expected output: 2 rows, columns major | department | advisor | avg_gpa | n
          -- Then write the query below.

        language: "sql"

    open_file: "final.sql"

    solution:
      files:
        - path: "final.sql"
          content: |
            -- Plan: students JOIN majors → WHERE year >= 2 → GROUP BY major
            --     → HAVING count >= 2 → SELECT code, dept, advisor, AVG, COUNT
            --     → ORDER BY avg DESC
            SELECT s.major     AS major,
                   m.department,
                   m.advisor,
                   AVG(s.gpa)  AS avg_gpa,
                   COUNT(*)    AS n
            FROM students AS s
            JOIN majors AS m ON s.major = m.code
            WHERE s.year >= 2
            GROUP BY s.major, m.department, m.advisor
            HAVING COUNT(*) >= 2
            ORDER BY avg_gpa DESC;
          language: "sql"
      explanation: |
        Every prior step is in this query:

        - **`JOIN ... ON ...`** (Step 2) connects students to their major's department + advisor.
        - **`WHERE s.year >= 2`** (Step 3) filters rows *before* grouping — only upperclassmen reach the GROUP BY.
        - **`GROUP BY`** (Step 4) collapses surviving rows into per-major buckets.
        - **`HAVING COUNT(*) >= 2`** (Step 4) filters those buckets — only majors with at least 2 upperclassmen.
        - **`AVG`, `COUNT`** (Step 4) produce the summary statistics.
        - **`ORDER BY avg_gpa DESC`** (Step 3) presents highest-average first.
        - **Aliases + explicit columns** (Steps 1, 2) keep the query production-clean.

        Note the standard-SQL grouping rule: every non-aggregate column in `SELECT` must appear in `GROUP BY`. `m.department` and `m.advisor` are functionally dependent on `s.major` (each major has one department and advisor) — but standard SQL doesn't reason about functional dependencies, so they go in the `GROUP BY`. SQLite would let you omit them; PostgreSQL and strict-mode MySQL would reject the query.

    tests:
      - description: "final.sql contains a SELECT statement"
        command: |
          var src = __read_file('final.sql').toLowerCase().split('\n').filter(function(l){ return l.trim().indexOf('--') !== 0; }).join('\n');
          assert(/\bselect\b/.test(src), "Need a SELECT statement");
        hints:
          - text: "Open `final.sql` and write your capstone query. Start with SELECT and the columns the dean asked for."
            condition: "code_missing: select"

      - description: "Query uses explicit JOIN ... ON (no comma-join)"
        command: |
          var src = __read_file('final.sql').toLowerCase().split('\n').filter(function(l){ return l.trim().indexOf('--') !== 0; }).join('\n');
          assert(/\bjoin\b/.test(src), "The dean's request spans both tables — you need to combine them");
          assert(/\bon\b/.test(src), "Every JOIN needs an ON predicate");
          assert(!/from\s+students\s*,\s*majors/.test(src) && !/from\s+majors\s*,\s*students/.test(src),
            "Use explicit JOIN ... ON, not the comma-join form (Step 2's Cartesian trap)");
        hints:
          - text: "Department and advisor live in `majors`; gpa and year in `students`. JOIN them on the shared key."
            condition: "code_missing: join"

      - description: "Query uses WHERE for the row-level year filter"
        command: |
          var src = __read_file('final.sql').toLowerCase().split('\n').filter(function(l){ return l.trim().indexOf('--') !== 0; }).join('\n');
          assert(/\bwhere\b/.test(src), "Filtering individual rows is WHERE's job — the year filter belongs there");
          assert(/year\s*(>=|>)\s*[12]/.test(src), "Filter for year 2 and above (`year >= 2`)");
        hints:
          - text: "'Year 2 and above' is a *row-level* filter — it runs before grouping. Which clause does that?"
            condition: "code_missing: where"

      - description: "Query uses GROUP BY and HAVING with a COUNT predicate"
        command: |
          var src = __read_file('final.sql').toLowerCase().split('\n').filter(function(l){ return l.trim().indexOf('--') !== 0; }).join('\n');
          assert(/\bgroup\s+by\b/.test(src), "Per-major aggregation needs GROUP BY");
          assert(/\bhaving\b/.test(src), "Filtering on a group count belongs in HAVING (not WHERE)");
          assert(/having\s+[^\n;]*count\s*\(/.test(src), "HAVING should reference COUNT to enforce 'at least 2 students'");
        hints:
          - text: "'Per major' = GROUP BY major. 'At least 2 such students' is a *group-level* filter — that's HAVING with COUNT."
            condition: "code_missing: having"
          - text: "If you wrote `WHERE COUNT(*) >= 2`, you'd hit Step 4's classic trap — aggregates don't exist when WHERE runs."
            condition: "code_contains: where count"

      - description: "Query computes AVG(gpa) and COUNT(*)"
        command: |
          var src = __read_file('final.sql').toLowerCase().split('\n').filter(function(l){ return l.trim().indexOf('--') !== 0; }).join('\n');
          assert(/\bavg\s*\(/.test(src), "Average GPA needs AVG()");
          assert(/\bcount\s*\(/.test(src), "Student count needs COUNT()");
        hints:
          - text: "Two aggregates: AVG over gpa for the average; COUNT(*) for the size of each group."
            condition: "code_missing: avg"

      - description: "Query uses ORDER BY ... DESC (highest avg GPA first)"
        command: |
          var src = __read_file('final.sql').toLowerCase().split('\n').filter(function(l){ return l.trim().indexOf('--') !== 0; }).join('\n');
          assert(/\border\s+by\b/.test(src), "Without ORDER BY, row order is unspecified — the dean wants highest first");
          assert(/\bdesc\b/.test(src), "Highest-first means descending — `ORDER BY ... DESC`");
        hints:
          - text: "ASC is the default. To present highest-first, use the keyword that means descending."
            condition: "code_contains: order by"

      - description: "Query projects explicit columns (no SELECT *)"
        command: |
          var src = __read_file('final.sql').toLowerCase().split('\n').filter(function(l){ return l.trim().indexOf('--') !== 0; }).join('\n');
          assert(!/select\s*\*/.test(src), "No `SELECT *` in production code — name your columns explicitly (Step 1)");
        hints:
          - text: "Drop the `*` and list the 5 columns the dean asked for."
            condition: "code_contains: *"

      - description: "Result places CS first then Math (only those two majors qualify), with correct avg_gpa and n"
        command: |
          var rows = __run_query(__read_file('final.sql'));
          assert(rows.length === 2, "Expected exactly 2 rows (only CS and Math have year-2+ students with COUNT(*) ≥ 2). Got " + rows.length + ". Re-check your WHERE (year ≥ 2) and HAVING (COUNT(*) ≥ 2).");

          // Row 1 — CS first (higher avg GPA)
          var r0 = Object.values(rows[0]).map(function(v){ return String(v); });
          assert(r0.indexOf('CS') !== -1, "Row 1 should contain 'CS' (highest avg GPA among qualifying majors). Got: " + r0.join(', '));
          assert(r0.indexOf('Engineering') !== -1, "Row 1 should also include 'Engineering' (CS's department from the JOIN)");
          assert(r0.indexOf('Dr. Hopper') !== -1, "Row 1 should also include 'Dr. Hopper' (CS's advisor from the JOIN)");

          // Row 2 — Math second
          var r1 = Object.values(rows[1]).map(function(v){ return String(v); });
          assert(r1.indexOf('Math') !== -1, "Row 2 should contain 'Math' (the other qualifying major). Got: " + r1.join(', '));

          // Numeric checks: avg_gpa and n. The test queries the canonical answer once, then asserts the student's row matches.
          var ref = __run_query(
            "SELECT s.major, d.department, d.advisor, ROUND(AVG(s.gpa), 4) AS avg_gpa, COUNT(*) AS n " +
            "FROM students s JOIN majors d ON s.major = d.code " +
            "WHERE s.year >= 2 GROUP BY s.major, d.department, d.advisor " +
            "HAVING COUNT(*) >= 2 ORDER BY avg_gpa DESC"
          );
          // The student's avg_gpa rounding may differ — accept anything within 0.05.
          function findNum(r) { return Object.values(r).map(Number).filter(function(v){ return !isNaN(v) && v > 0 && v < 5; }); }
          var studentNums0 = findNum(rows[0]);
          var refNums0 = findNum(ref[0]);
          var avgMatch0 = studentNums0.some(function(s){ return refNums0.some(function(r){ return Math.abs(s - r) < 0.05; }); });
          assert(avgMatch0, "Row 1's avg_gpa doesn't match the canonical CS average. Expected ≈ " + refNums0[0] + ". Check your AVG().");
          // Sanity: row counts must match canonical (exact equality)
          var studentCounts0 = Object.values(rows[0]).map(Number).filter(function(v){ return Number.isInteger(v) && v >= 1 && v <= 100; });
          var refCounts0 = Object.values(ref[0]).map(Number).filter(function(v){ return Number.isInteger(v) && v >= 1 && v <= 100; });
          var nMatch0 = studentCounts0.some(function(s){ return refCounts0.indexOf(s) !== -1; });
          assert(nMatch0, "Row 1's COUNT (n) doesn't match. Expected " + refCounts0.join(' or ') + ". Got numbers: " + studentCounts0.join(', '));
        hints:
          - text: "If your first row isn't CS, check your ORDER BY direction — should be DESC, not ASC."
            condition: "code_contains: order by"
          - text: "Got more than 2 rows? Your HAVING filter isn't catching every major with fewer than 2 qualifying students. Use `HAVING COUNT(*) >= 2`."
            condition: "code_missing: having"
          - text: "Got fewer than 2 rows? Your WHERE may be over-restrictive. Year filter should be `WHERE s.year >= 2` (year-2+, not exactly year 2)."
            condition: "code_missing: >= 2"

    quiz:
      title: "Capstone — Cumulative Check"
      min_score: 0.7
      shuffle: true
      questions:

        - question: |
            Two engineers debate. Engineer A writes:
            ```sql
            SELECT major, AVG(gpa) FROM students GROUP BY major HAVING COUNT(*) >= 2;
            ```
            Engineer B writes:
            ```sql
            SELECT major, AVG(gpa) FROM students WHERE COUNT(*) >= 2 GROUP BY major;
            ```
            Which one runs correctly?
          type: single
          options:
            - "A — `WHERE` cannot reference an aggregate; that condition belongs in HAVING"
            - "B — `WHERE` runs first, so it filters faster than HAVING"
            - "Both run; SQLite is permissive about this"
            - "Neither — both need a JOIN"
          correct_index: 0
          option_feedback:
            1: "WHERE *does* run before grouping — and that's exactly why it can't reference COUNT(*). The count doesn't exist yet at WHERE time."
            2: "SQLite is more permissive than other engines on some things (e.g., the GROUP BY rule), but it still rejects aggregates in WHERE. Both rejections are universal."
            3: "Neither query needs a JOIN — students alone holds enough data. The bug is the placement of `COUNT(*)`, not the absence of a JOIN."
          explanation: |
            Engineer A is right. `WHERE COUNT(*) >= 2` always errors because aggregates don't exist when `WHERE` runs (the logical execution order from Step 4). Filtering on aggregates is `HAVING`'s job.

        - question: |
            *[Review from Step 3]* In your capstone query, you wrote `WHERE year >= 2`. If a future student has `year` set to NULL, are they included in the result?
          type: single
          options:
            - "Yes — NULL is treated as 0"
            - "No — `NULL >= 2` is UNKNOWN, and WHERE discards UNKNOWN rows"
            - "Yes — WHERE includes NULL by default"
            - "It depends on the database engine"
          correct_index: 1
          option_feedback:
            0: "SQL treats NULL as *unknown*, not zero. Spreadsheet intuition (blank → 0) doesn't carry over."
            2: "There's no NULL-pass-through default. WHERE applies its predicate to every row, and NULL operands always produce UNKNOWN."
            3: "3VL is in the ANSI SQL standard. Every major engine treats NULL comparisons identically — it's one of the most consistent parts of SQL."
          explanation: |
            Three-Valued Logic (Step 3): comparing `NULL` to anything yields UNKNOWN, and `WHERE` keeps only TRUE rows. The principle matters whenever a filtered column is nullable.

        - question: |
            *[Review from Step 4]* The grouping rule states that every column in `SELECT` must either appear in `GROUP BY` or be wrapped in an aggregate. Why?
          type: single
          options:
            - "It's a stylistic convention to keep queries readable"
            - "Without it, multiple values map to one group with no defined choice — the result is undefined"
            - "GROUP BY only supports indexed columns"
            - "The SQL standard prohibits mixing aggregates and non-aggregates in the same SELECT"
          correct_index: 1
          option_feedback:
            0: "It's a *semantic* requirement, not stylistic. Standard-compliant engines reject violations; SQLite silently picks an arbitrary value, which is worse."
            2: "GROUP BY works on any column type. Indexes affect performance, not whether grouping is allowed."
            3: "The standard *does* allow mixing — that's the entire point of GROUP BY. The constraint is that non-aggregate columns must be in GROUP BY too."
          explanation: |
            If a column is neither grouped nor aggregated, multiple row values collapse into one group with no rule for which to return. Standard SQL rejects this; SQLite picks arbitrarily — silent corruption, not a feature.

        - question: |
            **Arrange** the clauses of your capstone query in the order the database *actually executes* them.
          type: parsons
          lines:
            - "FROM students JOIN majors"
            - "WHERE year >= 2"
            - "GROUP BY major"
            - "HAVING COUNT(*) >= 2"
            - "SELECT major, AVG(gpa), COUNT(*)"
            - "ORDER BY avg_gpa DESC"
          distractors:
            - "WHERE year >= 2 AND COUNT(*) >= 2"
            - "SORT BY avg_gpa DESC"
          explanation: |
            FROM/JOIN → WHERE → GROUP BY → HAVING → SELECT → ORDER BY. SELECT is written first but evaluated fifth — which is why aggregates belong in HAVING (after grouping), never in WHERE. The distractors fail two ways: mixing an aggregate into WHERE, and using `SORT BY` (not valid SQL).
