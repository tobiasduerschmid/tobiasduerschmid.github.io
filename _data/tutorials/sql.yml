  # STEP 4: CREATE TABLE + INSERT INTO — designing and populating a table
  # Audit fix: Error taxonomy moved here from Step 2 (where it overloaded).
  # Added: Bloom's Create-level quiz question, scaffold fading (lighter hints)
  # Bloom's: Understand / Apply / Create
  # --------------------------------------------------------------------------
  - title: "Designing Your Own Table"
    instructions: |
      ## CREATE TABLE and INSERT INTO

      > **Learning objective:** After this step you will be able to **create** a table with appropriate types and constraints, **insert** rows into it, and **classify** SQL errors as syntax, semantic, or logical.

      ### Tables are not arrays

      You have been querying the `students` table for three steps. Now it is time to build your own. Two critical differences between a SQL table and a Python list of dictionaries:

      1. **Strict schema** — every row must have exactly the same columns with declared types. No mixed-type columns, no missing keys.
      2. **Constraints are enforced** — if a column is `NOT NULL`, the database rejects any insert that omits it. If a column is `PRIMARY KEY`, no two rows may share the same value.

      ### CREATE TABLE

      `CREATE TABLE` is SQL's equivalent of defining a `struct` — not creating an instance, just declaring the shape:

      ```sql
      CREATE TABLE books (
        id     INTEGER PRIMARY KEY,
        title  TEXT    NOT NULL,
        author TEXT    NOT NULL,
        pages  INTEGER
      );
      ```

      | SQL type  | Python / JS equivalent |
      |-----------|------------------------|
      | `INTEGER` | `int`                  |
      | `REAL`    | `float`                |
      | `TEXT`    | `str` / `string`       |
      | `BLOB`    | `bytes` / `Buffer`     |

      `PRIMARY KEY` guarantees uniqueness — no two rows may share the same value, and it cannot be NULL. `NOT NULL` prevents missing values in that column.

      **SQLite quirk:** In standard SQL, `PRIMARY KEY` implies `NOT NULL`. In SQLite, it does not — a `PRIMARY KEY` column can technically hold NULL (unless you add `NOT NULL` explicitly). This is a well-known deviation.

      ### Adding rows: INSERT INTO

      ```sql
      INSERT INTO books (id, title, author, pages) VALUES
        (1, 'SICP', 'Abelson & Sussman', 657);
      ```

      `NOT NULL` columns that are omitted and have no default will cause an error. Nullable columns (like `pages`) can be omitted from the insert list.

      ### Verify with SELECT

      You already know `SELECT` — use it to check your work. This is a real workflow habit: after any DDL or DML operation, run a quick `SELECT` to confirm the result.

      ### pandas comparison

      If you know pandas, notice how SQL separates *defining* the schema from *adding* data — pandas bundles both together:

      | SQL | pandas |
      |-----|--------|
      | `CREATE TABLE books (id INTEGER PRIMARY KEY, title TEXT NOT NULL, ...)` | `books = pd.DataFrame(columns=['id', 'title', 'author', 'pages'])` |
      | `INSERT INTO books VALUES (1, 'SICP', 'Abelson', 657)` | `books.loc[len(books)] = [1, 'SICP', 'Abelson', 657]` |

      The key difference: SQL *enforces* the schema (wrong types or missing NOT NULL values cause an error). pandas accepts anything — a string in an integer column, a missing value in a required field — silently. SQL's strictness catches bugs early; pandas' flexibility makes exploration fast.

      ### Three types of SQL errors

      As your queries grow more complex, you will encounter three distinct types of errors:

      1. **Syntax errors** — the SQL grammar is violated (missing comma, misspelled keyword, wrong clause order). The database refuses to run the query.
      2. **Semantic errors** — the SQL is grammatically valid but references something that does not exist (wrong column name, wrong table name). The database returns an error.
      3. **Logical errors** — the query runs and returns a result, but it is the *wrong* result for the intended question. These are the hardest to catch because there is no error message.

      The NULL trap from Step 2 is a classic logical error. Research shows that semantic and logical errors together account for roughly 2 out of every 3 student mistakes — far more than syntax errors (Presler-Marshall et al., 2021).

      ### Task

      This step has two files:

      1. **`schema.sql`** — Create a `courses` table with four columns: `id` (integer, primary key), `code` (text, not null), `name` (text, not null), `credits` (integer, nullable).
      2. **`populate.sql`** — Insert at least **3 courses**, then verify with a SELECT.

    files:
      - path: "schema.sql"
        content: |
          -- Create a courses table.
          -- DROP IF EXISTS makes this safe to re-run.
          DROP TABLE IF EXISTS courses;

          -- Write your CREATE TABLE statement below.
        language: "sql"
      - path: "populate.sql"
        content: |
          -- Clear previous data so this is safe to re-run.
          DELETE FROM courses;

          -- Insert at least 3 courses.
          INSERT INTO courses (id, code, name, credits) VALUES
            (1, 'CS 35L', 'Software Construction', 4);

          -- Add 2+ more ...

          -- Verify your data.
        language: "sql"

    open_file: "schema.sql"

    solution:
      files:
        - path: "schema.sql"
          content: |
            DROP TABLE IF EXISTS courses;

            CREATE TABLE courses (
              id      INTEGER PRIMARY KEY,
              code    TEXT    NOT NULL,
              name    TEXT    NOT NULL,
              credits INTEGER
            );
          language: "sql"
        - path: "populate.sql"
          content: |
            DELETE FROM courses;

            INSERT INTO courses (id, code, name, credits) VALUES
              (1, 'CS 35L',  'Software Construction', 4),
              (2, 'CS 111',  'Operating Systems',     4),
              (3, 'MATH 61', 'Discrete Structures',   4);

            SELECT * FROM courses;
          language: "sql"
      explanation: |
        `CREATE TABLE` defines the schema — column names, types, and constraints. `INSERT INTO` adds rows that must conform to that schema. The final `SELECT * FROM courses` verifies the data. Notice that `DROP TABLE IF EXISTS` at the top makes `schema.sql` safe to re-run without errors.

    tests:
      - description: "courses table exists"
        command: |
          var rows = __run_query("SELECT name FROM sqlite_master WHERE type='table' AND name='courses'");
          assert(rows.length === 1, "Expected a table named 'courses' — run your CREATE TABLE statement first");
      - description: "courses has an 'id' column"
        command: |
          var info = __run_query("PRAGMA table_info(courses)");
          var cols = info.map(function(r) { return r.name; });
          assert(cols.indexOf('id') !== -1, "Expected a column named 'id'");
      - description: "courses has a 'code' column"
        command: |
          var info = __run_query("PRAGMA table_info(courses)");
          var cols = info.map(function(r) { return r.name; });
          assert(cols.indexOf('code') !== -1, "Expected a column named 'code'");
      - description: "courses has a 'name' column"
        command: |
          var info = __run_query("PRAGMA table_info(courses)");
          var cols = info.map(function(r) { return r.name; });
          assert(cols.indexOf('name') !== -1, "Expected a column named 'name'");
      - description: "courses has a 'credits' column"
        command: |
          var info = __run_query("PRAGMA table_info(courses)");
          var cols = info.map(function(r) { return r.name; });
          assert(cols.indexOf('credits') !== -1, "Expected a column named 'credits'");
      - description: "courses has at least 3 rows"
        command: |
          var rows = __run_query("SELECT COUNT(*) AS n FROM courses");
          assert(rows[0].n >= 3, "Expected at least 3 rows in courses — insert 2 more courses");
      - description: "all courses have non-null code and name"
        command: |
          var rows = __run_query("SELECT * FROM courses WHERE code IS NULL OR name IS NULL");
          assert(rows.length === 0, "All courses must have a non-null code and name (NOT NULL constraint)");
      - description: "students table is still intact"
        command: |
          var rows = __run_query("SELECT COUNT(*) AS n FROM students");
          assert(rows[0].n === 9, "The students table should have 9 rows — do not modify it");

    quiz:
      title: "Creating Tables — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            What does `PRIMARY KEY` guarantee about a column's values?
          type: single
          options:
            - "Values are sorted in ascending order"
            - "The column cannot contain text"
            - "Each value is unique and non-null across all rows"
            - "The column is indexed for faster lookups only"
          correct_index: 2
          explanation: |
            `PRIMARY KEY` enforces two things: uniqueness (no two rows share the same value) and non-nullability. It also creates an implicit index, but its core purpose is to uniquely identify every row.

        - question: |
            What happens if you `INSERT INTO` a row but omit a column declared `NOT NULL` with no default?
          type: single
          options:
            - "The column is automatically set to 0 or an empty string"
            - "The row is inserted with NULL in that column"
            - "The database raises an error and the row is not inserted"
            - "The row is inserted but flagged as incomplete"
          correct_index: 2
          explanation: |
            A `NOT NULL` column with no default value **requires** an explicit value. Omitting it in the `INSERT` causes an error — the database enforces the constraint and refuses the row.

        - question: |
            A student writes:
            ```sql
            SELECT full_name FROM students WHERE full_name = 'Alice';
            ```
            The column is actually named `name`, not `full_name`. What *type* of SQL error is this?
          type: single
          options:
            - "Logical error — the query is valid SQL but returns the wrong data"
            - "Semantic error — the query is syntactically valid but references a non-existent column"
            - "Syntax error — the SQL grammar rules are violated"
            - "Runtime error — the database ran out of memory"
          correct_index: 1
          explanation: |
            A **semantic error** is a query that is grammatically correct SQL but references something that doesn't exist (wrong column name, wrong table). A syntax error violates grammar (wrong clause order, missing parentheses). A logical error is when the query runs but returns the wrong answer. Research shows semantic and logical errors together outnumber syntax errors roughly 2:1 (Presler-Marshall et al., 2021).

        - question: |
            You need to store a library's book collection. Each book has a title, author, year published, and an optional page count. Which schema is best?
          type: single
          options:
            - "`CREATE TABLE books (title TEXT, author TEXT, year INTEGER, pages INTEGER)`"
            - "`CREATE TABLE books (id INTEGER PRIMARY KEY, title TEXT NOT NULL, author TEXT NOT NULL, year INTEGER, pages INTEGER)`"
            - "`CREATE TABLE books (id INTEGER, title TEXT, author TEXT, year TEXT, pages TEXT)`"
            - "`CREATE TABLE books (book_data TEXT)`"
          correct_index: 1
          explanation: |
            Option B is best: it has a `PRIMARY KEY` for unique identification, `NOT NULL` on required fields (title, author), appropriate types (INTEGER for year, not TEXT), and leaves optional fields (pages) nullable. Option A lacks a primary key. Option C makes everything TEXT, losing type safety. Option D stores everything in one column — no schema enforcement at all.

