title: "SQL Essentials"
description: "A hands-on introduction to SQL using SQLite, running entirely in your browser. Start by querying an existing database, then learn to filter, aggregate, create your own tables, and modify data — no installation required."

# Authoring-time Bloom-verb objectives. Not yet rendered to students.
learning_objectives:
  - "Apply `SELECT`, `JOIN`, `WHERE`, `GROUP BY`, `HAVING`, and `ORDER BY` to write queries that answer real questions."
  - "Explain three-valued logic (NULL semantics) and use `IS NULL` correctly — comparing NULL with `=` always yields UNKNOWN."
  - "Distinguish row-filtering (`WHERE`) from group-filtering (`HAVING`)."
  - "Evaluate two queries against each other for correctness and efficiency."
  - "Compose a multi-table aggregation query from a natural-language ask."

backend: sql

require_tests: true
autosave_type: files

# Pre-populate students + majors tables that query steps read from.
# Safe to re-run: DROP TABLE IF EXISTS handles re-loads.
setup_commands:
  - |
    DROP TABLE IF EXISTS students;
    CREATE TABLE students (
      id      INTEGER PRIMARY KEY,
      name    TEXT    NOT NULL,
      year    INTEGER,
      major   TEXT,
      gpa     REAL
    );
    INSERT INTO students VALUES
      (1, 'Mango',      2, 'CS',      3.90),
      (2, 'Watermelina',3, 'Math',    3.40),
      (3, 'Bananito',   1, 'CS',      3.70),
      (4, 'Coconick',   4, 'Physics', 2.80),
      (5, 'Kiwi',       2, 'CS',      3.50),
      (6, 'Grapenzo',   3, 'Math',    3.10),
      (7, 'Cherrita',   1, 'Physics', 3.60),
      (8, 'Orangelo',   4, 'CS',      3.20),
      (9, 'Blue Bella', 3, NULL,      3.00);

    DROP TABLE IF EXISTS majors;
    CREATE TABLE majors (
      code       TEXT PRIMARY KEY,
      department TEXT NOT NULL,
      advisor    TEXT NOT NULL
    );
    INSERT INTO majors VALUES
      ('CS',      'Engineering',   'Dr. Hopper'),
      ('Math',    'Sciences',      'Dr. Noether'),
      ('Physics', 'Sciences',      'Dr. Curie'),
      ('Bio',     'Life Sciences', 'Dr. McClintock');

steps:

  # --------------------------------------------------------------------------
  # STEP 1: SELECT — exploring an existing table
  # Pedagogy: Conceptual before Procedural, PRIMM, low intrinsic load
  # Growth mindset: normalize struggle at the start
  # Bloom's: Remember / Understand / Apply
  # --------------------------------------------------------------------------
  - title: "Exploring Data"
    instructions: |
      ## Describe What You Want, Not How

      > **Learning objective:** Retrieve the slice of a dataset a caller needs, and explain why *describing what you want* (declarative) scales better than *describing how to compute it* (imperative).

      In Python or JavaScript, you tell the machine *how* to solve a problem step by step. In SQL, you describe *what* you want and the engine figures out the rest. If this **imperative → declarative** shift feels strange, that is normal.

      ### The students table

      A `students` table is set up for you (9 rows):

      | Column | Type    | Constraints |
      |--------|---------|-------------|
      | `id`   | INTEGER | PRIMARY KEY |
      | `name` | TEXT    | NOT NULL    |
      | `year` | INTEGER |             |
      | `major`| TEXT    |             |
      | `gpa`  | REAL    |             |

      ### SELECT — reading data

      **`SELECT` is *projection*** — it chooses which *columns* of a table to return. (To choose which *rows*, you'll use `WHERE` in Step 3.)

      ```sql
      -- Explore the whole table (good for learning, not production)
      SELECT * FROM students;

      -- Project only the columns the caller needs
      SELECT name, gpa FROM students;
      ```

      `SELECT` names the columns, `FROM` names the table, `*` means "all columns". Use `SELECT *` while exploring; in production code, **always list the columns you need** so schema changes do not silently break callers.

      <details markdown="1"><summary>SQL is a *multiset*, not a set — DISTINCT removes duplicates</summary>

      Set theory says `{CS, CS, Math}` is the same as `{CS, Math}` — duplicates collapse. SQL is *not* a set. It's a **multiset** (sometimes called a "bag"): duplicates stick around unless you ask for them to be removed.

      ```sql
      -- 9 rows: every student's major, including duplicates
      SELECT major FROM students;

      -- 4 rows: each distinct major listed once
      SELECT DISTINCT major FROM students;
      ```

      Why does this matter? If you want to count *distinct* majors, the obvious-looking `SELECT COUNT(*) FROM students` gives 9 (all rows). The intended query is `SELECT COUNT(DISTINCT major) FROM students`, which gives 4. Forgetting `DISTINCT` is one of the top-5 SQL gotchas.

      </details>

      ### Task

      Open `query.sql`. Two queries; neither errors, but each is the wrong tool for its stated job.

      - **Query 1 — exploration.** `SELECT *` is correct here. Predict the row and column count as a comment, then Run.
      - **Query 2 — production.** Tighten it to return **only** `name` and `major`.

      **Investigate (optional).** After both pass, append `SELECT major, name FROM students`. Does the column order in the output change?

      <details markdown="1"><summary>Translating to Python or pandas</summary>

      `SELECT` is a projection — like `[s['name'] for s in students]` or `.map(s => s.name)`. pandas mapping:

      | SQL | pandas |
      |-----|--------|
      | `SELECT * FROM students` | `students` |
      | `SELECT name, gpa FROM students` | `students[['name','gpa']]` |

      Two things that differ from a Python list: (1) rows come back in *no guaranteed order* — there is no "row 0"; if order matters, ask for it with `ORDER BY` (Step 3). (2) Every row has exactly the declared columns and types — values can be `NULL`, but a column cannot disappear.

      </details>

      <details markdown="1"><summary>How this tutorial works (PRIMM)</summary>

      Every step uses the same rhythm: **Predict** what a query will do, **Run** to compare, **Investigate** with a tweak, then **Modify** to fix the bug. The hard skill is diagnosing *why* a query is wrong — not recalling syntax.

      </details>

    files:
      - path: "query.sql"
        content: |
          -- Step 1 — Exploring data with SELECT
          -- Two queries below. Predict, then run and verify.

          -- Query 1: exploration. Runs correctly.
          -- Predict the row count and column count on the next line.
          SELECT * FROM students;

          -- Query 2: works, but not production-quality.
          -- It fetches more columns than the caller needs.
          -- Tighten it to return only name and major, and add a one-line
          -- comment explaining why specific columns are safer than SELECT *.
          SELECT id, name, year, major, gpa FROM students;
        language: "sql"

    open_file: "query.sql"

    solution:
      files:
        - path: "query.sql"
          content: |
            -- All columns, all rows
            SELECT * FROM students;

            -- Only name and major
            SELECT name, major FROM students;
          language: "sql"
      explanation: |
        `SELECT *` returns all 9 rows and all 5 columns. `SELECT name, major` returns the same 9 rows but only 2 columns. `SELECT` chooses **columns**, not rows — to choose rows you will need `WHERE` (Step 3).

    tests:
      - description: "query.sql contains a SELECT * query"
        command: |
          // Strip SQL line-comments so matches in comments don't produce false positives.
          var src = __read_file('query.sql').toLowerCase().split('\n').filter(function(l){ return l.trim().indexOf('--') !== 0; }).join('\n');
          assert(/\bselect\s*\*/i.test(src), "query.sql should contain a SELECT * query to retrieve all columns");
        hints:
          - text: "To see everything in a table, you need a keyword that means 'all columns'. What single character could replace listing every column name?"
            condition: "code_missing: select"
          - text: "Your SELECT is there — one of your queries should retrieve *all* columns, not just specific ones."
            condition: "code_contains: select"
      - description: "query.sql contains a SELECT that projects only name and major"
        command: |
          var src = __read_file('query.sql').toLowerCase().split('\n').filter(function(l){ return l.trim().indexOf('--') !== 0; }).join('\n');
          // Look for a SELECT statement that names both 'name' and 'major' but NOT 'id', 'year', or 'gpa'.
          var matches = src.match(/select\s+([^;]*?)\s+from\s+students/g) || [];
          var tight = matches.some(function(stmt){
            var cols = stmt.replace(/select\s+/, '').replace(/\s+from.*/, '');
            return cols.indexOf('name') !== -1 && cols.indexOf('major') !== -1
                && cols.indexOf('*') === -1
                && cols.indexOf('id') === -1
                && cols.indexOf('year') === -1
                && cols.indexOf('gpa') === -1;
          });
          assert(tight, "One SELECT should project only the name and major columns — no others, no wildcard.");
        hints:
          - text: "For Query 2, list only the column names the caller actually needs. The schema table above lists every column."
            condition: "code_missing: name"
          - text: "You have 'name' and 'major' — but your SELECT still includes other columns. Drop the ones the caller did not ask for."
            condition: "code_contains: name"
          - text: "Still using `*`? That is the habit you are being asked to break here. Replace the wildcard with an explicit column list."
            condition: "code_contains: *"
      - description: "students table has the expected 9 rows"
        command: |
          var rows = __run_query("SELECT COUNT(*) AS n FROM students");
          assert(rows[0].n === 9, "The students table should have 9 rows");
      - description: "students table has the expected 5 columns"
        command: |
          var info = __run_query("PRAGMA table_info(students)");
          var names = info.map(function(r){ return r.name; }).sort().join(',');
          assert(info.length === 5, "students should have 5 columns, got " + info.length);
          assert(names === 'gpa,id,major,name,year', "students columns should be id, name, year, major, gpa — got: " + names);

    quiz:
      title: "Exploring Data — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            A Python programmer says: *"A SQL table is just like a Python list of dictionaries."*
            What is the most important difference they are missing?
          type: single
          options:
            - "SQL tables are stored on disk; Python lists live in memory"
            - "SQL tables enforce a rigid schema; rows have no guaranteed order"
            - "Rows are accessed by 1-based index instead of 0-based"
            - "Python lists can hold more data than SQL tables"
          correct_index: 1
          option_feedback:
            0: "Disk vs. memory is incidental — modern Python streams from disk and SQL can run in-memory. The deeper gap is that SQL rows have no positional access at all."
            2: "There's no `students[0]` in SQL. Rows aren't indexed by position — you identify them by content (`WHERE`). 1-based vs 0-based isn't the issue; *no* positional access is."
            3: "Capacity isn't the difference. Both can hold large data. The conceptual gap is that a SQL table is a *set* (no order, schema-enforced), not a list."
          explanation: |
            SQL tables have a **rigid schema** (fixed columns and types) and **no guaranteed row order** — there is no `students[0]`. Storage location is incidental; the indexing distractor is the misconception this step is built to dismantle.

        - question: |
            Without an `ORDER BY` clause, in what order does SQL return rows?
          type: single
          options:
            - "In insertion order — the order rows were added"
            - "In primary key order — ascending by id"
            - "Alphabetically by the first column"
            - "In no guaranteed order — depends on storage and query plan"
          correct_index: 3
          option_feedback:
            0: "Insertion order isn't guaranteed. Small tables may happen to come back that way, but the engine is free to return rows in any order it likes."
            1: "The primary key *uniquely identifies* rows; it doesn't dictate result-set order. SQLite, Postgres, MySQL — none guarantee PK order without `ORDER BY`."
            2: "There's no default-alphabetical rule. Result order depends on storage layout, indexes, and the query planner — not on column types or names."
          explanation: |
            A SQL table is a **set**, not a list. Without `ORDER BY`, order depends on storage and query plan — never rely on it.

        - question: |
            In Python you write `students[0]` to get the first student. What is the SQL equivalent?
          type: single
          options:
            - "`SELECT * FROM students WHERE id = 0`"
            - "`SELECT * FROM students[0]`"
            - "There is no equivalent — SQL rows have no position"
            - "`SELECT FIRST FROM students`"
          correct_index: 2
          option_feedback:
            0: "`id = 0` references a *value*, not a position. Even if a row had id 0, that's content-based lookup — not the same as Python's `students[0]`, which asks for position 0."
            1: "Not valid SQL — tables aren't subscriptable. SQL doesn't expose row position."
            3: "No `FIRST` keyword in standard SQL. Some dialects have `LIMIT 1` paired with `ORDER BY`, but that's still content-based — picking 'first' requires defining an ordering."
          explanation: |
            SQL rows have no position — you identify them by their **content** (`WHERE` clause), not by an index.

        - question: |
            **Arrange** the fragments to write a query that retrieves only the `name` and `gpa` columns from the `students` table.
          type: parsons
          display: inline
          lines:
            - "SELECT "
            - "name, gpa "
            - "FROM "
            - "students;"
          distractors:
            - "WHERE "
            - "* "
          explanation: |
            `SELECT` names the columns, `FROM` names the table. `*` is wrong (not just those two); `WHERE` filters rows, not columns.

        - question: |
            The `students` table has 9 rows but only 4 distinct majors. What does `SELECT major FROM students` return?
          type: single
          options:
            - "4 rows — duplicates are removed by default"
            - "9 rows — one for each student, with duplicate majors included"
            - "9 rows, but pre-deduplicated by the query optimizer when storage allows"
            - "An error — projecting only `major` is ambiguous when multiple students share one"
          correct_index: 1
          option_feedback:
            0: "Set theory wants `{CS, CS, Math}` to collapse to `{CS, Math}`. SQL is a *multiset* — duplicates stick around unless you ask for them to be removed with `DISTINCT`."
            2: "Optimizers don't silently change the row count. `SELECT major` always returns one row per source row; deduplication requires explicit `DISTINCT`."
            3: "No ambiguity — every row contributes its own `major` value to the projection. The grouping rule (Step 4) only applies once `GROUP BY` enters the picture."
          explanation: |
            SQL tables are **multisets** (bags), not sets. `SELECT major FROM students` returns one row per source row, including all duplicates. To collapse duplicates, write `SELECT DISTINCT major FROM students`. To count distinct majors, write `SELECT COUNT(DISTINCT major) FROM students` — `COUNT(*)` would return 9 (the row count), not 4.

        - question: |
            Two teammates need every column from `students` for a debugging session. **Alice** writes:

            ```sql
            SELECT * FROM students;
            ```

            **Bob** writes:

            ```sql
            SELECT id, name, year, major, gpa FROM students;
            ```

            Both queries return identical results today. **Six months later**, the team adds a new column `phone_number` to `students` and a new column `ssn` later still. Whose code ages better — and why?
          type: single
          options:
            - "Alice's — `SELECT *` automatically adapts to schema changes"
            - "Bob's — explicit columns isolate his code from accidental data leaks (PII like `ssn`) and from breaking when downstream code expects exactly 5 columns"
            - "Tie — both forms are equivalent; SQL's optimizer flattens any difference"
            - "Alice's — fewer characters means smaller network payloads and faster execution"
          correct_index: 1
          option_feedback:
            0: "*That's the bug, not the feature.* Alice's code starts returning `phone_number` and later `ssn` to every caller. If any caller wasn't expecting them — log files, JSON exports, downstream services — Alice has just created a privacy incident."
            2: "Optimizers can't read your *intent*. Both queries have identical execution plans *today*, but they have very different consequences when the schema evolves. Choose explicit columns at write time."
            3: "Network payload differences are negligible compared to the maintenance and security cost. Production codebases ban `SELECT *` from non-exploratory code precisely because of the schema-evolution risk."
          explanation: |
            **`SELECT *` is fine for *exploration* and dangerous in *production*.** When the schema changes, Alice's downstream code starts receiving columns it never asked for — most commonly leaking PII (`ssn`, `phone_number`) into logs/exports, but also breaking code that expects a specific column count. Bob's explicit list is **self-documenting** (it says exactly what the caller depends on) and **change-isolating** (a new column doesn't silently propagate). The trade-off — three extra seconds of typing — is what makes seasoned engineers refuse `SELECT *` in code review every time.

  # --------------------------------------------------------------------------
  # STEP 2: JOIN — combining rows from two tables
  # Pedagogy: Threshold concept (set-based combination). PRIMM. Lean syntax:
  #   JOIN + ON + table aliases only. LEFT JOIN mentioned but not drilled.
  # Negative-transfer target: Cartesian-product trap (missing ON).
  # Bloom's: Understand / Apply / Analyze
  # --------------------------------------------------------------------------
  - title: "Joining Tables"
    instructions: |
      ## JOIN — Combining Tables by a Shared Key

      > **Learning objective:** Answer questions that span two tables (e.g. *"who is Mango's advisor?"*) by combining rows on a shared key, and recognize when a query has accidentally paired every row with every row.

      Real data is rarely in one table. The `students` table has a `major` column, but each major's *department* and *advisor* live in a separate `majors` table:

      | `majors.code` | `majors.department` | `majors.advisor` |
      |---------------|---------------------|------------------|
      | CS            | Engineering         | Dr. Hopper       |
      | Math          | Sciences            | Dr. Noether      |
      | Physics       | Sciences            | Dr. Curie        |
      | Bio           | Life Sciences       | Dr. McClintock   |

      To answer *"who is Mango's advisor?"*, you need both tables. `JOIN` combines them on a shared column — here, `students.major = majors.code`.

      ### JOIN syntax

      **`JOIN` is *relational join*** — it combines rows from two tables that share a key, producing one output row per matching pair.

      ```sql
      SELECT s.name, m.department, m.advisor
      FROM students AS s
      JOIN majors AS m ON s.major = m.code;
      ```

      - **Aliases (`AS s`, `AS m`)** — required as soon as two tables are in play, and required for self-joins.
      - **`ON`** — the predicate that says *how* the two tables line up. Evaluated per pair.
      - **Match-only** — rows where `ON` is TRUE for both sides survive; the rest are dropped. Blue Bella (NULL major) and Bio (no students) both drop out.

      ### The Cartesian-product trap

      Without `ON`, the database pairs *every* row with *every* row. 9 students × 4 majors = 36 rows of nonsense.

      ```sql
      -- WRONG: no ON clause — produces 9 × 4 = 36 rows
      SELECT s.name, m.advisor FROM students s, majors m;
      ```

      The old comma-join syntax (`FROM a, b WHERE a.x = b.y`) makes this easy: delete the `WHERE` during a refactor and silently ship a Cartesian product. Use explicit `JOIN ... ON ...` so the relationship and the filter are separate.

      ### Task

      `joins.sql` has two queries — one silently broken, one that runs but leaks too much data.

      - **Query 1 — the Cartesian trap.** Returns 36 rows instead of ~8. Convert it to explicit `JOIN ... ON ...`.
      - **Query 2 — over-selection.** Tighten it to project just the student name and their advisor, using aliases.

      **Predict** before you Run: how many rows comes back from the corrected Query 1? Remember Blue Bella (NULL major) and Bio (no students).

      **Investigate (optional).** After Query 1 passes, is Blue Bella in the result? Why not?

      <details markdown="1"><summary>🎓 What about LEFT JOIN?</summary>

      `LEFT JOIN` keeps unmatched rows from the left side — useful when you *want* to include Blue Bella even without a major. Not needed for this step; flagging the keyword so it rings a bell later.

      </details>

    files:
      - path: "joins.sql"
        content: |
          -- Step 2 — Joining students to majors
          -- Predict row counts before you run.

          -- Query 1: intended "student name + advisor" — returns 36 rows.
          -- Identify the bug, then rewrite as an explicit JOIN ... ON.
          SELECT s.name, m.advisor
          FROM students s, majors m;

          -- Query 2: works but over-selects.
          -- Tighten to project only student name and advisor, using aliases.
          SELECT *
          FROM students
          JOIN majors ON students.major = majors.code;
        language: "sql"

    open_file: "joins.sql"

    solution:
      files:
        - path: "joins.sql"
          content: |
            -- Query 1: student name + advisor, explicit JOIN
            SELECT s.name, m.advisor
            FROM students AS s
            JOIN majors AS m ON s.major = m.code;

            -- Query 2: same shape, tightened to two columns with aliases
            SELECT s.name, m.advisor
            FROM students AS s
            JOIN majors AS m ON s.major = m.code;
          language: "sql"
      explanation: |
        Both queries return 8 rows (all students except Blue Bella, whose `major` is NULL and has no match). The explicit `JOIN ... ON` form makes the relationship visible and survives refactors — the old comma-join + `WHERE` form silently becomes a Cartesian product if the `WHERE` is removed.

    tests:
      - description: "joins.sql uses explicit JOIN ... ON syntax"
        command: |
          var src = __read_file('joins.sql').toLowerCase().split('\n').filter(function(l){ return l.trim().indexOf('--') !== 0; }).join('\n');
          assert(/\bjoin\b/.test(src), "Your queries must use JOIN to combine students and majors");
          assert(/\bon\b/.test(src), "Every JOIN needs an ON clause — without it you get a Cartesian product");
          // Disallow the implicit comma-join form.
          assert(!/from\s+students\s*,\s*majors/.test(src) && !/from\s+majors\s*,\s*students/.test(src),
            "Use explicit JOIN ... ON instead of the comma-join form (FROM students, majors)");
        hints:
          - text: "The comma form `FROM students, majors` is exactly the trap Query 1 starts from. What keyword replaces the comma, and what keyword names the relationship?"
            condition: "code_missing: join"
          - text: "You have JOIN — but every JOIN needs a predicate that says *how* the two tables line up. Which keyword introduces that predicate?"
            condition: "code_missing: on"
          - text: "Looks like you still have a comma between the two table names. Delete it and use JOIN ... ON instead — that is the whole point of the refactor."
            condition: "code_contains: ,"
      - description: "joins.sql tightens the second query to name + advisor only"
        command: |
          var src = __read_file('joins.sql').toLowerCase().split('\n').filter(function(l){ return l.trim().indexOf('--') !== 0; }).join('\n');
          // At least one JOIN statement must project exactly name + advisor (no *, no extra cols).
          var stmts = src.match(/select\s+[\s\S]*?from[\s\S]*?(?:;|$)/g) || [];
          var tight = stmts.some(function(stmt){
            var cols = (stmt.match(/select\s+([\s\S]*?)\s+from/) || [])[1] || '';
            return cols.indexOf('name') !== -1 && cols.indexOf('advisor') !== -1
                && cols.indexOf('*') === -1
                && cols.indexOf('gpa') === -1
                && cols.indexOf('department') === -1
                && /join/.test(stmt);
          });
          assert(tight, "One JOIN query should project only the student name and advisor — no wildcards, no extra columns.");
        hints:
          - text: "Query 2 still uses `SELECT *`. Replace the wildcard with the two columns the caller actually needs."
            condition: "code_contains: *"
          - text: "When two tables both have columns like 'name', SQL needs to know which table. Prefix each column with its table alias."
            condition: "code_missing: advisor"
      - description: "Query produces 8 rows (all students with a matching major)"
        command: |
          var rows = __run_query("SELECT s.name, m.advisor FROM students s JOIN majors m ON s.major = m.code");
          assert(rows.length === 8, "Expected 8 rows — every student except Blue Bella (whose major is NULL). Got " + rows.length);
      - description: "Blue Bella is excluded because her major is NULL (no match in majors)"
        command: |
          var rows = __run_query("SELECT s.name FROM students s JOIN majors m ON s.major = m.code WHERE s.name = 'Blue Bella'");
          assert(rows.length === 0, "Blue Bella should NOT appear — JOIN drops rows whose join key has no match");
      - description: "Mango's advisor is Dr. Hopper (smoke test the relationship)"
        command: |
          var rows = __run_query("SELECT m.advisor FROM students s JOIN majors m ON s.major = m.code WHERE s.name = 'Mango'");
          assert(rows.length === 1 && rows[0].advisor === 'Dr. Hopper', "Mango's advisor should be Dr. Hopper (CS → Dr. Hopper)");

    quiz:
      title: "Joining Tables — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            You write `SELECT * FROM students s, majors m;` with no `WHERE` or `ON`. What do you get?
          type: single
          options:
            - "An error — SQL requires an ON clause"
            - "Only rows where `students.major = majors.code`"
            - "Every student paired with every major (36 rows)"
            - "An empty result set"
          correct_index: 2
          option_feedback:
            0: "SQL is happy to silently produce a Cartesian product — the comma syntax is a *valid join* (a CROSS JOIN), just rarely the one you wanted. The DBMS has no way to know your intent, so it gives you what you literally asked for."
            1: "Plain SQL never infers a join condition; you must spell out `ON s.major = m.code` (or `WHERE s.major = m.code`). ORMs that auto-join on declared relationships add this convenience on top — but the SQL standard itself does no such inference."
            3: "Cross-product is the algebraic *default*, not an empty set. An empty result would require all rows to fail some predicate — but here there is no predicate to fail."
          explanation: |
            With no join predicate, SQL pairs every row from `students` with every row from `majors`: 9 × 4 = 36 rows. This is the #1 accidental bug in multi-table queries.

        - question: |
            A `JOIN ... ON s.major = m.code` between `students` (9 rows) and `majors` (4 rows) returns 8 rows. Why not 9?
          type: single
          options:
            - "JOIN always drops one row"
            - "One student has a NULL major, which matches nothing"
            - "One major has no students — and that row drops"
            - "Aliases hide one row from the output"
          correct_index: 1
          option_feedback:
            0: "JOINs don't have a fixed-cost arithmetic; they keep every pair where `ON` is TRUE. The number of rows lost depends on the data, not on a constant rule."
            2: "An *inner* JOIN is symmetric — a major with zero students does drop, but that doesn't change the *student* count on the left side. The 9 students you started with stay unless their predicate fails."
            3: "Aliases (`AS s`, `AS m`) are syntactic shorthand only — they rename tables for the rest of the query, but never filter rows. They do not affect cardinality."
          explanation: |
            `JOIN` keeps only pairs where the `ON` predicate is TRUE for both sides. Blue Bella has `major = NULL`; `NULL = anything` is UNKNOWN, so she has no match and drops.

        - question: |
            **Arrange** the fragments to list each student's name and their department.
          type: parsons
          lines:
            - "SELECT s.name, m.department"
            - "FROM students AS s"
            - "JOIN majors AS m"
            - "ON s.major = m.code;"
          distractors:
            - "FROM students, majors"
            - "WHERE s.major = m.code"
          explanation: |
            The comma form + `WHERE` is the old trap. Use explicit `JOIN ... ON` so the relationship is visible and survives refactors.

        - question: |
            Why are table aliases (`AS s`, `AS m`) strongly recommended even in simple two-table joins?
          type: single
          options:
            - "SQL refuses to run without them"
            - "They disambiguate same-named columns across tables"
            - "They improve query performance"
            - "They prevent NULL values in the result"
          correct_index: 1
          option_feedback:
            0: "Aliases are optional in SQL — the query runs fine without them when no column names collide. They become *required* when you self-join a table to itself."
            2: "Aliases are pure syntax; the query planner ignores them. Performance comes from indexes, joins, and predicates."
            3: "NULLs come from the *data* (or from outer joins), not from how you name tables. Aliases don't filter."
          explanation: |
            Aliases disambiguate same-named columns (both `students` and `majors` could have `name`) and keep queries readable. They are also required for self-joins. They do not affect performance or NULL handling.

        - question: |
            For an **INNER** JOIN, do these two queries return the same rows?

            **Query A:** `SELECT * FROM students s JOIN majors m ON s.major = m.code AND s.year > 1;`
            **Query B:** `SELECT * FROM students s JOIN majors m ON s.major = m.code WHERE s.year > 1;`
          type: single
          options:
            - "Yes — the result is identical for an INNER JOIN"
            - "No — predicate placement always changes the result"
            - "Yes, but only if `year` has no NULLs"
            - "No — Query A pre-filters and is therefore always faster"
          correct_index: 0
          option_feedback:
            1: "For an *outer* join, placement absolutely matters. For *inner* joins specifically, both forms produce the same row set — the join keeps a row only when both predicates are TRUE."
            2: "NULL handling is identical here — `NULL > 1` is UNKNOWN, and both queries drop the row. The 3VL behavior doesn't differ between ON-clause filters and WHERE filters."
            3: "Modern optimizers reorder predicates regardless of where you wrote them. A query planner sees both forms and produces the same plan."
          explanation: |
            **For INNER JOINs**, `ON ... AND ...` and `WHERE ...` are equivalent — both predicates must be TRUE for a row to survive. **For LEFT/RIGHT OUTER JOINs**, placement matters: an `ON` filter applies during matching (unmatched left rows still appear with NULLs), while a `WHERE` filter applies after the join (an unmatched left row that fails the WHERE is dropped). This subtlety is the #1 cause of "missing rows" in outer-join queries.

