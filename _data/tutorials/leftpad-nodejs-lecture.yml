    solution:
      files:
        - path: "left-pad.js"
          content: |
            // The eleven-line module that broke the internet, rewritten
            // in one line of ES2017. Same contract, same tests, fewer
            // moving parts.

            module.exports = leftpad;
            function leftpad (str, length, paddingCharacter) {
              return String(str).padStart(length, paddingCharacter);
            }
          language: "javascript"
      explanation: |
        **Why this is correct:**

        - **`String(str)`** — the explicit coercion idiom. Called *without* `new` (which would build a wrapper object). For any value of `str`, `String(str)` returns a primitive string: `String(123)` → `'123'`, `String(null)` → `'null'`, `String(undefined)` → `'undefined'`. This is exactly what the original module did on its first line.
        - **`.padStart(length, paddingCharacter)`** — the ES2017 built-in. Default `paddingCharacter` is `' '` per spec, no truncation when already long enough, repeats `paddingCharacter` as needed to fill the gap.
        - **One line.** Sit with that for a moment.

        The contract the tests encode is preserved end-to-end. The implementation moved from 11 lines of user code in 2016 to 1 line of language built-in in 2017. Three takeaways:

        1. Watch the spec. New ECMAScript revisions ship every June; standard-library additions can eliminate whole packages.
        2. Be skeptical of micro-dependencies. `npm install left-pad` was the right call in 2014 and the wrong call in 2017 — same code, different ecosystem.
        3. Keep the tests. The test suite outlived three implementations. That's not a coincidence — that's *what tests are for*.

