      - path: "package.json"
        content: |
          {
            "name": "left-pad-lecture",
            "version": "1.0.0",
            "scripts": {
              "test": "jest",
              "dev": "node main.js"
            },
            "devDependencies": {
              "jest": "^30.2.0"
            }
          }
        language: "json"

    open_file: "left-pad.js"

    solution:
      files:
        - path: "left-pad.js"
          content: |
            // Naive ES2017 replacement — drops the String() coercion.
            // Six of nine tests pass; the numeric / null / undefined tests
            // throw because (n).padStart, (null).padStart, and (undefined).padStart
            // are all undefined.

            module.exports = leftpad;
            function leftpad (str, length, paddingCharacter = ' ') {
              return str.padStart(length, paddingCharacter);
            }
          language: "javascript"
      explanation: |
        **Why six of nine pass:** `String.prototype.padStart(targetLength, padString)` matches the original module's main contract — default pad is `' '`, no-truncation when already long enough, single-character padding to a wider target, empty-string handling. The standard library was *designed* to absorb this use case.

        **Why three break:** `(123).padStart`, `null.padStart`, and `undefined.padStart` are all `undefined` (or throw, in the case of `null` / `undefined`). Numbers do not inherit from `String.prototype`. The original module hid this by calling `String(str)` first; the naive swap discards that line. The failing tests' messages read roughly `TypeError: str.padStart is not a function` — the JS engine's polite way of saying "you called a string method on a non-string."

        Step 3 restores the coercion in a way that keeps the one-liner spirit.

    quiz:
      title: "Step 2 — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            Why does the naive replacement `return str.padStart(length, paddingCharacter);` cause `leftpad(123, 5, '0')` to throw rather than return `'00123'`?
          options:
            - "`padStart` is not defined in the version of Node.js that ships with WebContainer"
            - "Numbers do not inherit from `String.prototype`, so `(123).padStart` is `undefined` and calling `undefined(...)` throws `TypeError`"
            - "`padStart` requires the target length to exceed the input's `toString()` length — `123` becomes `'123'` (length 3) and `3 < 5` triggers a runtime check that fails"
            - "`padStart` always throws when the first argument is not literally a string literal — even `String(123).padStart(5)` would fail"
          correct_index: 1
          option_feedback:
            0: "`padStart` is ES2017 — Node 8+ ships it, WebContainer runs Node 18+, so the method exists. The issue is *which prototype* it lives on."
            2: "`padStart` accepts any string. There is no length-vs-target precondition that throws."
            3: "`String(123).padStart(5)` works fine — `padStart` only requires the *receiver* to be a string (or a value coercible to one via the `String.prototype` method dispatch)."
          explanation: |
