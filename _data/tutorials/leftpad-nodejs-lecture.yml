            Why does the lecture write `String(str)` instead of `new String(str)`?
          options:
            - "Stylistic preference — they produce identical values"
            - "`new String(str)` returns a `String` wrapper *object*, not a primitive string — and `wrapperObj.padStart(...)` works, but `===` comparisons against primitives fail. The `String(...)` call (no `new`) returns a primitive"
            - "`new String(str)` throws when `str` is a number"
