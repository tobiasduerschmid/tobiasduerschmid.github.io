      questions:

        - question: |
            Why does the lecture write `String(str)` instead of `new String(str)`?
          options:
            - "Stylistic preference — they produce identical values"
            - "`String(str)` returns a primitive string; `new String(str)` returns a wrapper object"
            - "`new String(str)` throws when `str` is a number"
            - "`new String(str)` is deprecated and removed in modern Node.js"
          correct_index: 1
          option_feedback:
            0: "They're *not* identical. `typeof String(123)` is `'string'`; `typeof new String(123)` is `'object'`. `expect(...).toBe(...)` uses `Object.is`, which would distinguish them."
            2: "Both forms accept any input. The difference is what they *return*, not what they accept."
            3: "It's a misfeature, not a removed feature — `new String()` still works, it just produces something almost no one wants."
          explanation: |
            `String(value)` (no `new`) is the canonical explicit-coercion idiom — it returns a primitive string. `new String(value)` is a constructor call that wraps the primitive in a boxed `String` object; the wrapper has all the prototype methods (so `wrapperObj.padStart(...)` would work), but it fails `===` against primitives and behaves surprisingly in boolean contexts (`new String('')` is *truthy*). Almost every JavaScript style guide recommends `String(value)` for this reason.

        - question: |
            *(Spaced review — step 1)* What does `leftpad('foobar', 3)` return under **all three** implementations the lecture walks through?
