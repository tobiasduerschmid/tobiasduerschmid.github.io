          - title: "Almost-spoiler — apply the AAA shape"
            text: "Each brittle test reaches into private state. Rewrite it using only the public methods.\n```python\ndef test_<behavior>():\n    queue = PlaylistQueue()\n    queue.add(<title>, <duration>)\n    assert <something_via_public_api> == <expected>\n```\nFor `test_add_track_internal_list`, the observable behaviors are *the title appears when you ask for titles* and *the duration appears when you ask for durations* — `queue.titles()` and `queue.durations()` give you both via the public API. For `test_internal_list_length`, the observable behavior is *the count goes up when you add tracks*."
      - description: "Test file still contains at least 4 test functions"
