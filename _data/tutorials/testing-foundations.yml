          option_feedback:
            0: "$0 and $100 sit deep inside the *no-discount* and *yes-discount* partitions — they don't pin down where the boundaries are. The spec defines the discount cutoffs at $50 (`>` flips) and $500 (`≤` flips); your boundary tests must straddle those exact values."
            1: "Correct. $50/$51 straddles the `> $50` flip and $500/$501 straddles the `≤ $500` flip — one just-below and one at-or-just-above each boundary, which is exactly where `>` vs `>=` bugs surface."
            2: "This is \"spread your bets across the input range\" — useful for a smoke test, useless for catching off-by-one bugs. Off-by-one bugs *only* manifest at the boundary itself; quartile samples will all behave correctly even when the comparison operator is wrong."
            3: "Decimal-precision boundaries are a separate class of bug (and rarely the dominant risk for whole-dollar specs). The *primary* off-by-one risk is `> vs >=` and `<= vs <`, which lives at the integer boundary. Test 50/51 and 500/501 first; reach for cents only if the spec actually distinguishes them."
          explanation: |
            Test *just on each side* of every boundary: 50/51 (where `> 50` flips) and 500/501
            (where `≤ 500` flips). Catches the canonical off-by-one (`>= 50` vs `> 50`).

        - question: |
            A developer's test suite has 12 tests for `squad_name_valid`. Every test uses a name of length 5, 6, 7, or 8. All tests pass. Can you trust the suite?
          type: single
          options:
            - "Yes — 12 tests is plenty of coverage, and they all exercise the function with realistic inputs"
            - "No — every test is in the middle of the same partition. Boundaries (2, 3, 12, 13) and invalid inputs are untested, so off-by-one bugs would slip through"
            - "Yes — as long as the tests pass, the function is guaranteed correct for all inputs in the tested range"
            - "No — 12 tests is too few for any real function; you need at least 50 tests to be confident"
          correct_index: 1
          option_feedback:
            0: "Test *count* is not a measure of test *quality*. 12 tests in the same partition is roughly equivalent to one test repeated 12 times — they all hit the same code path and miss the same bugs. One boundary test catches more than ten middle-of-partition tests."
            1: "Right. All 12 tests cluster in the middle of the valid partition (lengths 5–8). The boundaries at 2, 3, 12, and 13 are entirely untested — a `len < 12` bug instead of `len <= 12` would pass every test and slip to production."
            2: "Passing tests prove the function works *for the inputs tested*, never for inputs the suite never exercises. The classic boundary bug at length 12 (`len < 12` instead of `len <= 12`) sits *exactly* in the gap this suite leaves uncovered."
            3: "There's no magic test-count threshold for confidence. A 5-test suite with one test per partition + boundary will catch more bugs than a 50-test suite that all clusters in the middle. Quality of input choice beats quantity."
          explanation: |
            The tests cover the middle of *one* partition only. A bug like `len < 12` instead of
            `len <= 12` would pass all 12 tests but fail in production at length 12. One test per
            boundary catches far more bugs than many tests clustered in the easy middle.

        - question: |
            An equivalence partition is:
          type: single
          options:
            - "A set of inputs that the function processes in parallel on multi-core hardware"
            - "A set of inputs that should all produce the same *kind* of behavior, so one representative usually suffices for the middle of the set"
            - "A set of inputs that are mathematically equal (e.g., `1.0` and `1`)"
            - "A sub-range of inputs created by dividing the domain into equal-sized chunks"
          correct_index: 1
          option_feedback:
            0: "This is conflating *partition* (a testing concept — a group of inputs with the same expected behavior) with *parallelism* (a runtime concept — work happening simultaneously). The two ideas have nothing in common; the word \"partition\" is overloaded across CS subfields."
            1: "Correct. Inputs that all produce the same kind of behavior form one equivalence partition — testing one representative per partition is enough for the *middle*, and you spend your test budget on the *boundaries* between partitions."
            2: "Mathematical equality (`1.0 == 1`) is about value, not about *behavioral expectation*. Equivalence partitioning groups inputs that should *behave the same* under the function — different values can still be in the same partition (e.g. `\"alice\"` and `\"bob\"` are both length-5 valid usernames)."
            3: "This describes equal-width binning (a statistics concept). Equivalence partitions are defined by *behavioral boundary* — wherever the function's output classification flips — not by chopping the domain into uniform chunks."
          explanation: |
            Equivalence partitions group inputs by *expected behavior*, not by value. If `"abc"`
            is accepted, `"abcd"` almost certainly is too — same partition. Spend your test
            budget on the *boundaries between* partitions, not the middles.

        - question: |
            **(Spaced review — Step 2)** A teammate writes `assert squad_name_valid("epic")` (no `is True`). The test passes against the current code. Why is this oracle still weak?
          type: single
          options:
            - "It is not weak — the test passes, so the oracle is doing its job"
            - "It is weak because it would also pass for any *truthy* return — `1`, `\"yes\"`, or even `[1, 2]` would all satisfy it. Use `is True` to pin the exact Boolean"
            - "It is weak because pytest assertions need an explicit message string after the comma"
            - "It is weak because the input string is too short to be representative"
          correct_index: 1
          option_feedback:
            0: "*Currently passing* is a weaker claim than *correctly testing*. A bare `assert squad_name_valid(\"epic\")` passes today only because `squad_name_valid` happens to return `True`. The day someone refactors it to return the name string `\"epic\"` (still truthy!), the oracle will still pass — but now it's verifying nothing meaningful."
            1: "Right. A bare `assert <expr>` passes for any truthy return — `1`, `\"epic\"`, `[True]` would all pass, even though none of them are `True`. `is True` uses identity comparison and accepts *only* the `True` singleton."
            2: "pytest assertion messages are optional. The oracle's strength has nothing to do with whether you supplied a failure message; it has everything to do with which return values would *fail* the assertion. Bare `assert <expr>` is satisfied by every truthy value, which is the weakness here."
            3: "The input length isn't the issue — `\"epic\"` is a perfectly valid length-4 input. The oracle weakness is structural: `assert <expr>` (no comparison) accepts any truthy return value, regardless of the input."
          explanation: |
            A bare `assert <expr>` succeeds for any truthy value. If `squad_name_valid` were
            (incorrectly) refactored to return the name string itself instead of `True`,
            this oracle would still pass. `is True` (identity comparison) is the strong form
            for Boolean returns.

        - question: |
            **(Spaced review — Step 1)** Recall the bug in `streak_badge`: `days > 100` instead of `days >= 100`. Classify this bug.
          type: single
          options:
            - "A type error — `days` should be a float but is being compared as an integer"
            - "A boundary bug — it fails only at one exact value (100) on the edge between two partitions"
            - "A logic error — the wrong branch of the `if` statement is being taken"
            - "A regression — the function worked correctly before someone introduced the bug"
          correct_index: 1
          option_feedback:
            0: "The type is not the issue here: `days` is compared as an integer in both the spec (`>= 100`) and the buggy code (`> 100`). The bug is in the comparison operator."
            1: "Correct. The bug only surfaces at exactly `days == 100` — the single boundary value where the `> 100` operator gives the wrong answer. That one-specific-value signature is the definition of a boundary bug."
            2: "It's tempting to call any wrong-`if` bug a logic error, but that's too coarse. Boundary bug is the more precise classification: this bug only manifests at *one specific value* (100), which is the diagnostic signature of a `>` vs `>=` mistake. That precision is what Step 3 is about."
            3: "*Regression* describes how a bug enters a codebase (re-introducing something previously fixed), not what kind of bug it is. The bug here might or might not be a regression — but its *type* is a boundary bug."
          explanation: |
            Boundary bugs manifest only at the exact value where partitions meet.
            `days > 100` works for 101, 150, 365 — but fails at 100 itself. This is exactly
            the kind of bug that Boundary Value Analysis is designed to expose, and it
            is why you test values *just on each side* of every boundary in a spec.


  # --------------------------------------------------------------------------
  # STEP 4 — Test Behavior, Not Implementation
  # Pedagogy:
  #   Threshold concept   — tests verify WHAT, not HOW.
  #   Contrasting cases   — brittle vs robust on the same class.
  #   AAA pattern         — scaffolded structure for robust tests.
  #   Coverage ≠ quality  — demo with a deliberately weak 100% suite vs a strong 80% suite.
  #   Bloom's level       — Analyze / Evaluate.
  # --------------------------------------------------------------------------
  - title: "Test Behavior, Not Implementation"
    instructions: |
      > 🎯 **Goal:** Test **WHAT** a function does, not **HOW** it does it.
      > 🧠 **Bloom's level:** *Analyze* (spot brittle tests) and *Evaluate* (judge them against the public-API contract).

      ⚙️ **Task** (`test_brittle_audit.py`): Four tests for a `PlaylistQueue` (think Spotify / Apple Music queue). All four currently pass. You'll *discover* which are **brittle** (break on pure refactoring even when behavior is unchanged) and which are **robust** (survive any refactoring that preserves the public behavior).

      1. **Read the four tests** in `test_brittle_audit.py`. Before running anything: *classify each test* — does it access internal state (looks inside the object) or only the public interface (calls methods that don't start with `_`)? Write your classification as a comment next to each test.
      2. **Run the suite as-is** — all four tests pass. Good. Now do the experiment:
      3. **Refactor the production code without changing behavior**: in `playlist.py`, rename the private attribute `self._tracks` to `self._queue` (everywhere — the constructor and the five methods). There are exactly 6 occurrences; use find/replace to catch all of them. The class's public behavior is unchanged: `add`, `total_duration`, `track_count`, `titles`, `durations` still produce the same outputs.
      4. **Before re-running:** predict how many tests will fail and which ones.
      5. **Re-run the suite**. The tests that fail are brittle — they coupled to the implementation detail (the attribute name). The ones that survived only touched the public API. Compare to your prediction. Whether you were right or wrong: write one sentence tracing the causal chain — from "I renamed `_tracks`" to "exactly these tests fail." The explanation should work without running the code.
      6. **Rewrite each broken test** using only the public API — methods that don't start with `_`. The public surface of `PlaylistQueue` is: `add`, `track_count()`, `titles()`, `durations()`, `total_duration`. Anything starting with `_` is internal and off-limits to tests. When all four pass against the refactored code, your suite is robust.

      <details markdown="1"><summary>📦 Two Python tools used in this step: <code>@dataclass</code> and <code>@property</code></summary>

      **`@dataclass` — auto-generated value objects**

      `playlist.py` stores each track as a `Track` instance declared with `@dataclass(frozen=True)`:

      ```python
      from dataclasses import dataclass

      @dataclass(frozen=True)
      class Track:
          title: str
          duration_seconds: int
      ```

      `@dataclass` reads the annotated fields and auto-generates `__init__`, `__repr__`, and `__eq__`. `frozen=True` makes instances immutable — a `Track` can't have its title changed after creation, and two `Track`s with identical fields compare equal with `==` out of the box.

      Without `@dataclass` you'd write all this by hand:
      ```python
      class Track:
          def __init__(self, title: str, duration_seconds: int) -> None:
              self.title = title
              self.duration_seconds = duration_seconds
          def __eq__(self, other): ...
          def __repr__(self): ...
      ```
      Same result, far more boilerplate.

      **`@property` — a method that reads like an attribute**

      `PlaylistQueue.total_duration` is declared with `@property`:

      ```python
      @property
      def total_duration(self) -> int:
          return sum(t.duration_seconds for t in self._tracks)
      ```

      Because of `@property`, callers write `queue.total_duration` (no parentheses) instead of `queue.total_duration()`. Use `@property` for *derived* values — ones that are computed from stored state rather than stored themselves — that read naturally as a noun.

      Contrast with `track_count()`, `titles()`, and `durations()`, which are regular methods. Rule of thumb: if the value *feels like a fixed attribute of the object* (total duration is a property of the queue's current state), make it a `@property`. If it *feels like an action or a lookup with side effects*, keep it a method.

      You'll see `@dataclass` and `@property` again in the TDD tutorial — where `ScoringEvent`, `BattleReport`, and `total_damage` follow the same patterns.
      </details>

      💡 **Why this matters**: When a test only touches the public API, the production code stays free to evolve internally. The experiment you just ran is a live demonstration of the Refactoring Litmus Test (expand below to name what you discovered).

      💡 **This principle extends beyond classes.** For top-level functions: the "public contract" is the return value. Don't assert on intermediate variables or module-level state the function happens to touch internally — those are implementation details too, just without the `_` prefix signal. Assert on what callers observe: the return value.

      <details markdown="1"><summary>🔬 The Refactoring Litmus Test — name what you just discovered</summary>

      > **If you refactor the internals of a function and all tests still pass → your tests are robust.**
      > **If tests break after a pure refactoring (no behavior change) → they're testing implementation.**

      That breakage is the symptom; the fix is to rewrite the tests, not to revert the refactor.

      Both types of test were checking the same observable behavior: *the track was added*. They differed only in **how** they verified it. The brittle test peeked at implementation details (`_tracks[0].title`). The robust test used the public interface (`titles()`). Compare that to this pair:

      ```python
      # 🚨 BRITTLE — peeks at private state
      assert board._scores[0] == ("alice", 1000)

      # ✅ ROBUST — uses the public API
      assert board.top_player() == "alice"
      ```

      The brittle version breaks the moment `_scores` is renamed, restructured, or replaced — even if the top-player behavior is unchanged. The robust version only breaks when the **behavior itself** changes — which is exactly when you *want* it to fail.
      </details>

      <details markdown="1"><summary>📊 What the experiment reveals — expand after completing step 5</summary>

      The rename changed the *implementation* but **not** the public behavior, yet only the robust tests survive:

      ```mermaid
      flowchart TB
          subgraph before["BEFORE — all tests pass"]
              direction LR
              b1["Brittle test<br/>queue._tracks[0].title"]:::brittle
              b2["Robust test<br/>queue.titles()"]:::robust
              b1 --> bp1["✓"]:::good
              b2 --> bp2["✓"]:::good
          end
          subgraph after["AFTER — _tracks renamed to _queue"]
              direction LR
              a1["Brittle test<br/>queue._tracks[0].title"]:::brittle
              a2["Robust test<br/>queue.titles()"]:::robust
              a1 --> ap1["✗ AttributeError"]:::bad
              a2 --> ap2["✓ still passes"]:::good
          end
          before --> after
          classDef brittle fill:#fff3e0,stroke:#e65100,color:#bf360c
          classDef robust fill:#e8f5e9,stroke:#2e7d32,color:#1b5e20
          classDef good fill:#e8f5e9,stroke:#2e7d32,color:#1b5e20
          classDef bad fill:#ffebee,stroke:#c62828,color:#b71c1c
      ```
      </details>

      <details markdown="1"><summary>📖 Arrange-Act-Assert (AAA) — the structure of a clean test</summary>

      ```python
      def test_total_duration_sums_track_lengths():
          # Arrange — set up the world
          queue = PlaylistQueue()
          queue.add("Espresso", 175)
          queue.add("Vampire", 218)

          # Act — read the ONE derived value under test
          result = queue.total_duration   # property — no ()

          # Assert — verify the observable outcome
          assert result == 393
      ```

      Every robust test fits this shape. If you can't separate Arrange from Act cleanly, the function under test is doing too much.
      </details>

      ### 🎓 Coverage ≠ quality

      **Suite A — 100% line coverage, weak oracle:**
      ```python
      def test_total_duration_runs():
          q = PlaylistQueue(); q.add("Espresso", 175); q.add("Vampire", 218)
          assert q.total_duration is not None   # passes for any non-None return
      ```

      **Suite B — 80% coverage, strong oracle:**
      ```python
      def test_total_duration_sums_track_lengths():
          q = PlaylistQueue(); q.add("Espresso", 175); q.add("Vampire", 218)
          assert q.total_duration == 393
      ```

      If a bug makes `total_duration()` return `0`, **Suite A still passes** (`0 is not None`). Suite B catches it. Coverage measures which lines *ran*, not whether you *checked* their behavior. The same logic explains why Step 4's brittle tests passed before the rename: running the assertion is not the same as verifying the right thing.

      🧭 **Reflect before moving on.** In your own words, without scrolling back: what is the structural difference between a brittle test and a robust one? Give a concrete example — not the `PlaylistQueue` one you just worked through. Then trace the *causal chain*: what needs to be true about how the production code changes for a brittle test to break while a robust test survives? The explanation should work for any class or function, not just this one.


    files:
      - path: "playlist.py"
        content: |
          from dataclasses import dataclass


          @dataclass(frozen=True)
          class Track:
              title: str
              duration_seconds: int


          class PlaylistQueue:
              """A Spotify/Apple-Music-style queue: add tracks, ask for total duration."""

              def __init__(self) -> None:
                  self._tracks: list[Track] = []

              def add(self, title: str, duration_seconds: int) -> None:
                  self._tracks.append(Track(title, duration_seconds))

              @property
              def total_duration(self) -> int:
                  return sum(t.duration_seconds for t in self._tracks)

              def track_count(self) -> int:
                  return len(self._tracks)

              def titles(self) -> list[str]:
                  return [t.title for t in self._tracks]

              def durations(self) -> tuple[int, ...]:
                  """Public, ordered, immutable view of per-track durations (seconds)."""
                  return tuple(t.duration_seconds for t in self._tracks)
        language: "python"

