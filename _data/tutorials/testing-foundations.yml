    quiz:
      title: "pytest Basics — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            Which file name will pytest **automatically discover** as a test file?
          type: single
          options:
            - "`testing_leveling.py`"
            - "`test_leveling.py`"
            - "`check_leveling.py`"
            - "`leveling_tests.py`"
          correct_index: 1
          option_feedback:
            0: "pytest discovers files starting with `test_` (note the underscore) or ending with `_test.py`. `testing_leveling.py` matches *neither* pattern — pytest will silently skip it."
            2: "There's no convention `check_*` in pytest. The discovery rule is `test_*` prefix or `*_test.py` suffix only."
            3: "Close — but pytest looks for `*_test.py` (singular) or `test_*` prefix. `leveling_tests.py` (plural \"tests\") doesn't match either."
          explanation: |
            pytest discovers files whose names start with `test_` or end with `_test.py`.
            Functions inside must also start with `test_`.

        - question: |
            What does this pytest output mean?
            ```
            test_math.py::test_addition PASSED
            test_math.py::test_division FAILED
            ```
          type: single
          options:
            - "Both tests ran and produced output, but only `test_addition` returned the value pytest expected as a success signal"
            - "The assertions in `test_addition` all held; at least one assertion in `test_division` did not"
            - "The test file has a syntax error in `test_division` that prevented it from being collected by the test runner"
            - "`test_division` was skipped because it depends on `test_addition` completing first and pytest enforces execution order"
          correct_index: 1
          option_feedback:
            0: "pytest's PASSED/FAILED is not about return values. Test functions don't return anything that pytest reads — pytest only checks whether any `assert` statement raised `AssertionError`. PASSED = no assertion failed; FAILED = at least one did."
            2: "A syntax error would have been reported during *collection*, not run. The fact that the line says `test_division FAILED` means the function *did* run; an assertion inside it just didn't hold."
            3: "pytest does not enforce dependency or order between tests by default — each runs independently. Test functions are isolated unless you explicitly opt into ordering plugins."
          explanation: |
            PASSED means the assertions in that test function all held. FAILED means at least
            one assertion in `test_division` was `False`. pytest will show the exact line and
            values that caused the failure.

        - question: |
            Two tests check the same function. Which assertion is **strongest** (most likely to catch a bug)?

            **A.**
            ```python
            def test_add_a():
                result = add(2, 3)
                assert isinstance(result, int)
            ```

            **B.**
            ```python
            def test_add_b():
                result = add(2, 3)
                assert result == 5
            ```
          type: single
          options:
            - "A — it checks the return type, which catches the widest possible category of bugs"
            - "B — it checks the exact expected value, failing for any wrong answer. A passes even if `add` returns 42"
            - "Both are equally strong — both are `True` for a correctly-implemented `add`"
            - "Neither — strong oracles always require multiple assertions, not just one"
          correct_index: 1
          option_feedback:
            0: "This inverts the right intuition. A type check is *cheap* but doesn't catch wrong values — `add(2, 3)` returning `0`, `42`, or any other int still passes. The \"widest category of bugs\" is exactly what `isinstance` *fails* to catch."
            2: "They are not equally strong. The whole point of *oracle strength* is that two assertions on the same function call can differ wildly in what bugs they expose. `assert isinstance(result, int)` is satisfied by infinitely many wrong values; `assert result == 5` is satisfied by exactly one correct value."
            3: "Strong oracles do not require multiple assertions — they require one *precise* assertion. A single `assert result == 5` already pins the expected behavior exactly. Padding with extra `isinstance` checks doesn't strengthen the oracle, it just adds noise."
          explanation: |
            A is a **weak oracle**: `add(2, 3)` returning `0`, `42`, or `5` all pass. B is a
            **strong oracle**: only `5` satisfies it. Weak oracles look green but verify
            nothing — the *Liar test* anti-pattern.

        - question: |
            **(Spaced review — Step 1)** A developer finishes a feature and deletes the tests because "the feature is done and working." What principle does this violate?
          type: single
          options:
            - "The DRY principle — tests duplicate the code's logic unnecessarily"
            - "The safety-net principle — passing tests stay in place to catch regressions, not disposable scaffolding to be removed once a feature ships"
            - "The YAGNI principle — tests are speculative code that may not be needed"
            - "No principle — deleting tests after a feature ships is standard practice"
          correct_index: 1
          option_feedback:
            0: "Tests do *encode* the same intent as the code they verify, but that's not duplication in the DRY sense — DRY is about avoiding *the same logic in two places that must change together*. Tests describe *what should happen*; code describes *how it happens*. Different concerns, both worth keeping."
            2: "YAGNI (\"You Aren't Gonna Need It\") cautions against speculative *features*, not against tests for shipped behavior. A test guarding shipped behavior is the opposite of speculative — that behavior is already in production."
            3: "Deleting passing tests is *not* standard practice on any team that treats tests as a safety net. Anyone proposing this is misunderstanding the role of the test suite. The whole point is that tests stay in place to catch the regression no one anticipated."
          explanation: |
            Each passing test stays in place to catch regressions. Deleting passing tests cuts
            holes in the safety net: if someone later modifies the code and introduces a
            regression, there is no test to catch it.


  # --------------------------------------------------------------------------
  # STEP 3 — Choosing What to Test: Partitions & Boundaries
  # Pedagogy:
  #   Black-box thinking  — derive tests from spec, not implementation.
  #   Callback to Step 1  — the streak bug WAS a boundary bug (retrieval).
  #   Variation Theory    — partition structure held constant, boundaries vary.
  #   Worked example      — two tests given (happy + boundary-just-below).
  #   Faded scaffold      — student writes 4 more boundary tests.
  #   Bloom's level       — Understand / Apply / Analyze (quiz).
  # --------------------------------------------------------------------------
  - title: "Choosing What to Test: Partitions & Boundaries"
    instructions: |
      > 🎯 **Goal:** Stop guessing inputs. Choose a small set that systematically catches off-by-one bugs.

      💡 **The principle**: an **equivalence partition** is a set of inputs that should behave the same. **Boundaries** are the values where partitions meet — and where most bugs live (remember the `> 100` vs `>= 100` streak bug from Step 1).

      Today's function: `squad_name_valid(name)` — checking if a Fortnite / Roblox / Discord squad name is the right length. Rule: `3 ≤ len ≤ 12` characters. The **4 boundary points** sit *exactly* where partitions transition:

      ```mermaid
      flowchart LR
          L2["len 2<br/>❌ reject"]:::bad
          L3["len 3<br/>✅ accept"]:::good
          Mid["...middle of valid<br/>partition..."]:::neutral
          L12["len 12<br/>✅ accept"]:::good
          L13["len 13<br/>❌ reject"]:::bad
          L2 --> L3 --> Mid --> L12 --> L13
          classDef good fill:#e8f5e9,stroke:#2e7d32,color:#1b5e20
          classDef bad fill:#ffebee,stroke:#c62828,color:#b71c1c
          classDef neutral fill:#fafafa,stroke:#bdbdbd,color:#757575
      ```

      Notice how the 4 critical tests pin down both transitions; the *middle* of the valid partition isn't covered by these — and doesn't need to be (one representative is enough there). Why this works:

      | Length | Expected | What this catches |
      |---|---|---|
      | **2** | reject | A `< 3` written as `<= 3` (off-by-one below) |
      | **3** | accept | A `<= 3` written as `< 3` |
      | **12** | accept | A `<= 12` written as `< 12` |
      | **13** | reject | A `< 13` written as `<= 13` (off-by-one above) |

      ⚙️ **Task** (`test_squad.py`): Two worked tests are provided.

      💬 **Self-explain first** (do this *before* writing): Read the two provided tests carefully. *Why* does the first one assert `is True` and the second `is False`? *Why* did the author pick length `5` for "valid representative" and `2` for "just below min"? Articulating the design choices primes you to make your own.

      Now **write four more tests**. The four stubs in the file name what each test must check; you decide the input and the expected return value.

      | Test name | What partition or boundary it pins down |
      |---|---|
      | `test_boundary_min_valid` | the **smallest** length the spec says is valid |
      | `test_boundary_max_valid` | the **largest** length the spec says is valid |
      | `test_too_long_just_above_max` | one length **past** the upper bound |
      | `test_empty_string` | the empty string |

      For each, decide from the spec `3 ≤ len ≤ 12`:

      - What concrete input string has the right length?
      - Should `squad_name_valid` return `True` or `False` for it? (Read the rule — don't guess.)
      - Then write the assertion.

      💡 **Strong oracles on a Boolean return**: `squad_name_valid` returns `True`/`False`. `assert squad_name_valid("epic") is True` is strong (identity comparison — only `True` itself passes). `assert squad_name_valid("epic")` with no comparison is weak — `1`, `"yes"`, or any truthy value would slip through.

      <details markdown="1"><summary>📖 Equivalence partitioning — the deeper "why"</summary>

      The input space splits into three regions, each with the **same expected behavior**:

      ```mermaid
      flowchart LR
          A["<b>too short</b><br/>len 0, 1, 2<br/>↦ reject"]:::bad
          B["<b>valid</b><br/>len 3 ... 12<br/>↦ accept"]:::good
          C["<b>too long</b><br/>len 13+<br/>↦ reject"]:::bad
          A --- B --- C
          classDef good fill:#e8f5e9,stroke:#2e7d32,color:#1b5e20
          classDef bad fill:#ffebee,stroke:#c62828,color:#b71c1c
      ```

      If `"a"` (length 1) is rejected, `"ab"` (length 2) probably is too — same partition, same expected behavior. So **one representative per partition** is enough for the *middle* of the partition. Spend your test budget on the **boundaries** instead — that's where `> 12` vs `>= 12` bugs hide.

      **Heuristic for any range `[min, max]`**:
      1. *Partition* the input space.
      2. *Pick one representative* per partition.
      3. *Test every boundary* — last invalid before each transition, first valid after.
      </details>


    files:
      - path: "squad.py"
        content: |
          def squad_name_valid(name):
              """Return True iff len(name) is between 3 and 12 inclusive (typical
              gaming-platform username rule — Fortnite / Roblox / Discord-style)."""
              return 3 <= len(name) <= 12
        language: "python"

      - path: "test_squad.py"
