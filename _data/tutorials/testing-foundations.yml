    open_file: "test_discount.py"
    run_file: "test_discount.py"

    solution:
      files:
        - path: "test_discount.py"
          content: |
            import pytest
            from discount import apply_discount


            def test_platinum_gets_10_percent_off():
                assert apply_discount(100, "platinum") == 90.0


            def test_gold_gets_5_percent_off():
                assert apply_discount(100, "gold") == 95.0


            def test_no_membership_no_discount():
                assert apply_discount(100, "regular") == 100.0


            def test_empty_string_no_discount():
                assert apply_discount(100, "") == 100.0


            if __name__ == "__main__":
                pytest.main(["-v"])
          language: "python"
      explanation: |
        Three partitions: platinum, gold, other. One test per partition gets you to 3.
        Strong oracles pin the exact expected value (90.0, 95.0, 100.0). The empty string
        is an extra edge case inside the "other" partition.

    tests:
      - description: "At least 3 test functions defined"
        command: |
          source = open('/tutorial/test_discount.py').read()
          count = source.count('def test_')
          assert count >= 3, \
              f"Write at least 3 test functions (found {count}). The function has 3 partitions of `member_status` — one test per partition is the floor. Each partition deserves its own named function so a failure tells you exactly which case broke."
      - description: "Tests cover the 'platinum' partition"
        command: |
          source = open('/tutorial/test_discount.py').read()
          assert 'platinum' in source, \
              "No test references 'platinum'. The 10%-off branch is one of the three partitions — leaving it untested means a regression in that branch ships silently."
      - description: "Tests cover the 'gold' partition"
        command: |
          source = open('/tutorial/test_discount.py').read()
          assert 'gold' in source, \
              "No test references 'gold'. The 5%-off branch needs at least one test — same reasoning as platinum."
      - description: "Tests cover the 'other' (no-discount) partition"
        command: |
          import re
          source = open('/tutorial/test_discount.py').read()
          pattern = r'apply_discount\s*\([^)]*,\s*[\'"](?!platinum|gold)[^\'"]*[\'"]\s*\)'
          has_other = bool(re.search(pattern, source))
          assert has_other, \
              "All your tests use 'platinum' or 'gold'. The third partition is *everything else* (\"\", \"silver\", \"regular\", None-stringified, …). One representative is enough — try \"regular\" with expected `== price`."
      - description: "Tests use strong oracles (no weak 'is not None' / isinstance)"
        command: |
          source = open('/tutorial/test_discount.py').read()
          weak = 'is not None' in source or 'isinstance(' in source
          assert not weak, \
              "You used a weak oracle (`is not None` or `isinstance`). These pass for almost any return value — the exact bug Step 2 warned about. Replace with the precise expected number: 100*0.90 == 90.0 for platinum, 100*0.95 == 95.0 for gold, and == price for 'other'."
      - description: "All tests pass against the reference implementation"
        command: |
          import pytest, io, sys
          old = sys.stdout; sys.stdout = buf = io.StringIO()
          code = pytest.main(['/tutorial/test_discount.py', '-v', '--tb=short', '--no-header'])
          sys.stdout = old; output = buf.getvalue(); print(output)
          assert code == 0, f"Some tests failed:\n{output}"
        hints:
          - title: "What partitions?"
            text: "Three: `\"platinum\"`, `\"gold\"`, and *everything else*. Each deserves at least one test. `\"\"` is a nice extra edge case."
          - title: "Strong-oracle reminder"
            text: "Don't write `assert apply_discount(100, \"gold\") is not None`. Write `apply_discount(100, \"gold\") == 95.0` — pin the *exact* value. (10% off 100 = 90.0; 5% off 100 = 95.0; no discount = 100.)"
          - title: "Spoiler — full passing suite"
            text: "```python\nfrom discount import apply_discount\n\ndef test_platinum_gets_10_percent_off():\n    assert apply_discount(100, \"platinum\") == 90.0\n\ndef test_gold_gets_5_percent_off():\n    assert apply_discount(100, \"gold\") == 95.0\n\ndef test_no_membership_no_discount():\n    assert apply_discount(100, \"regular\") == 100.0\n\ndef test_empty_string_no_discount():\n    assert apply_discount(100, \"\") == 100.0\n```"

    quiz:
      title: "Wrap-up — Knowledge Check"
      min_score: 0.75
      shuffle: true
      questions:

        - question: |
            **(Spaced review — all steps)** A function ships free for orders **≥ $50** and charges $5 otherwise. Which test pair is the *single most important*?
          type: single
          options:
            - "`order = $25` and `order = $200` — one in the middle of each partition"
            - "`order = $49.99` and `order = $50` — one just below the boundary, one exactly at it"
            - "`order = $0` and `order = $1,000,000` — the extreme edges"
            - "`order = $50` only — one boundary test is enough"
          correct_index: 1
          explanation: |
            The boundary is $50. Testing $49.99 (just below) and $50 (exactly at) catches the
            classic `>=` vs `>` off-by-one bug — the same family as the calculate_grade bug
            from Step 1.

        - question: |
            A teammate adds `assert result is not None` for `calculate_total()` and says, "Great — the function works." What's the right response?
          type: single
          options:
            - "Agree — passing tests prove the function works."
            - "That's a *weak oracle*. It passes for any non-`None` value (including `0.0` or `\"banana\"`). Replace with `assert result == <expected_value>`."
            - "Disagree because we don't have 100% line coverage yet."
            - "Disagree — the test is fine but the function name should change."
          correct_index: 1
          explanation: |
            Weak oracles look productive but verify nothing. The fix is the *strong oracle*:
            pin the exact expected value.

        - question: |
            What is the **single most important shift** in how you now think about testing, compared to before this tutorial?
          type: single
          options:
            - "Tests are something you write *after* code is done, to check it works."
            - "Tests *specify behavior* — they describe what the code should do, lock in progress, and let you change code without fear."
            - "Tests are mainly about hitting 100% line coverage."
            - "Tests are an academic exercise that doesn't apply in real projects."
          correct_index: 1
          explanation: |
            This is the threshold concept. Once tests become **specifications of behavior**
            (rather than after-the-fact correctness checks), you start writing them earlier
            and treating them as design artifacts.
