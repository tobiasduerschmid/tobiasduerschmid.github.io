        content: |
          class PlaylistQueue:
              """A Spotify/Apple-Music-style queue: add tracks, ask for total duration."""

              def __init__(self):
                  self._tracks = []

              def add(self, title, duration_seconds):
                  self._tracks.append({"title": title, "duration": duration_seconds})

              def total_duration(self):
                  return sum(t["duration"] for t in self._tracks)

              def track_count(self):
                  return len(self._tracks)

              def titles(self):
                  return [t["title"] for t in self._tracks]
        language: "python"

