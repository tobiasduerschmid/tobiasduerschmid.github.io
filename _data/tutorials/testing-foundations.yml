    quiz:
      title: "Partitions & Boundaries — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            A spec reads: *"A discount applies for orders of strictly more than $50 and up to $500 inclusive."*

            Which four values are the **most important** boundaries to test?
          type: single
          options:
            - "$0, $50, $100, $500 — round numbers at each end of the range"
            - "$50, $51, $500, $501 — one on each side of each boundary (just-below and just-above)"
            - "$1, $25, $250, $1000 — one sample from each quartile to get wide coverage"
            - "$49.99, $50.01, $499.99, $500.01 — cents around each boundary to check decimal precision"
          correct_index: 1
          option_feedback:
            0: "$0 and $100 sit deep inside the *no-discount* and *yes-discount* partitions — they don't pin down where the boundaries are. The spec defines the discount cutoffs at $50 (`>` flips) and $500 (`≤` flips); your boundary tests must straddle those exact values."
            2: "This is \"spread your bets across the input range\" — useful for a smoke test, useless for catching off-by-one bugs. Off-by-one bugs *only* manifest at the boundary itself; quartile samples will all behave correctly even when the comparison operator is wrong."
            3: "Decimal-precision boundaries are a separate class of bug (and rarely the dominant risk for whole-dollar specs). The *primary* off-by-one risk is `> vs >=` and `<= vs <`, which lives at the integer boundary. Test 50/51 and 500/501 first; reach for cents only if the spec actually distinguishes them."
          explanation: |
            Test *just on each side* of every boundary: 50/51 (where `> 50` flips) and 500/501
            (where `≤ 500` flips). Catches the canonical off-by-one (`>= 50` vs `> 50`).

        - question: |
            A developer's test suite has 12 tests for `squad_name_valid`. Every test uses a name of length 5, 6, 7, or 8. All tests pass. Can you trust the suite?
          type: single
          options:
            - "Yes — 12 tests is plenty of coverage, and they all exercise the function with realistic inputs"
            - "No — every test is in the middle of the same partition. Boundaries (2, 3, 12, 13) and invalid inputs are untested, so off-by-one bugs would slip through"
            - "Yes — as long as the tests pass, the function is guaranteed correct for all inputs in the tested range"
            - "No — 12 tests is too few for any real function; you need at least 50 tests to be confident"
          correct_index: 1
          option_feedback:
            0: "Test *count* is not a measure of test *quality*. 12 tests in the same partition is roughly equivalent to one test repeated 12 times — they all hit the same code path and miss the same bugs. One boundary test catches more than ten middle-of-partition tests."
            2: "Passing tests prove the function works *for the inputs tested*, never for inputs the suite never exercises. The classic boundary bug at length 12 (`len < 12` instead of `len <= 12`) sits *exactly* in the gap this suite leaves uncovered."
            3: "There's no magic test-count threshold for confidence. A 5-test suite with one test per partition + boundary will catch more bugs than a 50-test suite that all clusters in the middle. Quality of input choice beats quantity."
          explanation: |
            The tests cover the middle of *one* partition only. A bug like `len < 12` instead of
            `len <= 12` would pass all 12 tests but fail in production at length 12. One test per
            boundary catches far more bugs than many tests clustered in the easy middle.

        - question: |
            An equivalence partition is:
          type: single
          options:
            - "A set of inputs that the function processes in parallel on multi-core hardware"
            - "A set of inputs that should all produce the same *kind* of behavior, so one representative usually suffices for the middle of the set"
            - "A set of inputs that are mathematically equal (e.g., `1.0` and `1`)"
            - "A sub-range of inputs created by dividing the domain into equal-sized chunks"
          correct_index: 1
          option_feedback:
            0: "This is conflating *partition* (a testing concept — a group of inputs with the same expected behavior) with *parallelism* (a runtime concept — work happening simultaneously). The two ideas have nothing in common; the word \"partition\" is overloaded across CS subfields."
            2: "Mathematical equality (`1.0 == 1`) is about value, not about *behavioral expectation*. Equivalence partitioning groups inputs that should *behave the same* under the function — different values can still be in the same partition (e.g. `\"alice\"` and `\"bob\"` are both length-5 valid usernames)."
            3: "This describes equal-width binning (a statistics concept). Equivalence partitions are defined by *behavioral boundary* — wherever the function's output classification flips — not by chopping the domain into uniform chunks."
          explanation: |
            Equivalence partitions group inputs by *expected behavior*, not by value. If `"abc"`
            is accepted, `"abcd"` almost certainly is too — same partition. Spend your test
            budget on the *boundaries between* partitions, not the middles.

        - question: |
            **(Spaced review — Step 2)** A teammate writes `assert squad_name_valid("epic")` (no `is True`). The test passes against the current code. Why is this oracle still weak?
          type: single
          options:
            - "It is not weak — the test passes, so the oracle is doing its job"
            - "It is weak because it would also pass for any *truthy* return — `1`, `\"yes\"`, or even `[1, 2]` would all satisfy it. Use `is True` to pin the exact Boolean"
            - "It is weak because pytest assertions need an explicit message string after the comma"
            - "It is weak because the input string is too short to be representative"
          correct_index: 1
          option_feedback:
            0: "*Currently passing* is a weaker claim than *correctly testing*. A bare `assert squad_name_valid(\"epic\")` passes today only because `squad_name_valid` happens to return `True`. The day someone refactors it to return the name string `\"epic\"` (still truthy!), the oracle will still pass — but now it's verifying nothing meaningful."
            2: "pytest assertion messages are optional. The oracle's strength has nothing to do with whether you supplied a failure message; it has everything to do with which return values would *fail* the assertion. Bare `assert <expr>` is satisfied by every truthy value, which is the weakness here."
            3: "The input length isn't the issue — `\"epic\"` is a perfectly valid length-4 input. The oracle weakness is structural: `assert <expr>` (no comparison) accepts any truthy return value, regardless of the input."
          explanation: |
            A bare `assert <expr>` succeeds for any truthy value. If `squad_name_valid` were
            (incorrectly) refactored to return the name string itself instead of `True`,
            this oracle would still pass. `is True` (identity comparison) is the strong form
            for Boolean returns.

        - question: |
            **(Spaced review — Step 1)** Recall the bug in `streak_badge`: `days > 100` instead of `days >= 100`. Classify this bug.
          type: single
          options:
            - "A type error — `days` should be a float but is being compared as an integer"
            - "A boundary bug — it fails only at one exact value (100) on the edge between two partitions"
            - "A logic error — the wrong branch of the `if` statement is being taken"
            - "A regression — the function worked correctly before someone introduced the bug"
          correct_index: 1
          option_feedback:
            0: "There's no type confusion here — `days` is being compared as an integer in both the spec (`>= 100`) and the buggy code (`> 100`). The bug is in the comparison operator, not the type."
            2: "It's tempting to call any wrong-`if` bug a logic error, but that's too coarse. Boundary bug is the more precise classification: this bug only manifests at *one specific value* (100), which is the diagnostic signature of a `>` vs `>=` mistake. That precision is what Step 3 is about."
            3: "*Regression* describes how a bug enters a codebase (re-introducing something previously fixed), not what kind of bug it is. The bug here might or might not be a regression — but its *type* is a boundary bug."
          explanation: |
            Boundary bugs manifest only at the exact value where partitions meet.
            `days > 100` works for 101, 150, 365 — but fails at 100 itself. This is exactly
            the kind of bug that Boundary Value Analysis is designed to expose, and it
            is why you test values *just on each side* of every boundary in a spec.


  # --------------------------------------------------------------------------
  # STEP 4 — Test Behavior, Not Implementation
  # Pedagogy:
  #   Threshold concept   — tests verify WHAT, not HOW.
  #   Contrasting cases   — brittle vs robust on the same class.
  #   AAA pattern         — scaffolded structure for robust tests.
  #   Coverage ≠ quality  — demo with a deliberately weak 100% suite vs a strong 80% suite.
  #   Bloom's level       — Analyze / Evaluate.
  # --------------------------------------------------------------------------
  - title: "Test Behavior, Not Implementation"
    instructions: |
      > 🎯 **Goal:** Test **WHAT** a function does, not **HOW** it does it.

      💡 **Brittle vs robust** — *same observable behavior, two ways to verify it.* Imagine a `Leaderboard` class for a game. Both tests below check the exact same thing: *after recording two scores, alice is the top player.* They differ only in **how** they verify it:

      ```python
      # Same setup for both
      board = Leaderboard()
      board.record("alice", 1000)
      board.record("bob", 500)

      # 🚨 BRITTLE — peeks at private state to confirm alice is on top
      assert board._scores[0] == ("alice", 1000)

      # ✅ ROBUST — uses the public API to confirm alice is on top
      assert board.top_player() == "alice"
      ```

      The two assertions are *checking the same behavior*. But the brittle one breaks the moment someone renames `_scores`, changes its tuple shape (say to `("alice", 1000, timestamp)`), or switches storage to a heap — even though the top-player behavior is unchanged. The robust one only breaks when the **top-player behavior itself** changes — which is exactly when you *want* the test to fail.

      ### 🔬 The Refactoring Litmus Test

      > **If you refactor the internals of a function and all tests still pass → your tests are robust.**
      > **If tests break after a pure refactoring (no behavior change) → they're testing implementation.**

      That breakage is the symptom; the fix is to rewrite the tests, not to revert the refactor.

      ⚙️ **Task** (`test_brittle_audit.py`): Four tests for a `PlaylistQueue` (think Spotify / Apple Music queue). Two are brittle, two are robust — but they aren't labeled. You'll *discover* which is which.

      1. **Run the suite as-is** — all four tests pass. Good. Now do the experiment:
      2. **Refactor the production code without changing behavior**: in `playlist.py`, rename the private attribute `self._tracks` to `self._queue` (everywhere — the constructor and the three methods). The class's public behavior is unchanged: `add`, `total_duration`, `track_count`, `titles` still produce the same outputs.
      3. **Re-run the suite**. Two tests now fail. **Those are the brittle ones** — they were testing implementation details (the name of a private attribute), not behavior. The robust ones survive the refactor because they only touch the public API.
      4. **Rewrite each broken test** using only the public API (the methods that *don't* start with `_`). When all four pass against the refactored code, your suite is robust.
      5. Optional: revert `_queue` back to `_tracks` and confirm your fixed tests still pass — robust tests survive both directions.

      💡 **Why this matters**: Robust tests are the contract a class promises its callers. When the test only touches the public API, the production code stays free to evolve internally. The Refactoring Litmus Test (above) is now something you've *experienced*, not just read.

      Here's what the experiment showed — the rename changed the *implementation* but **not** the public behavior, yet only the robust test survives:

      ```mermaid
      flowchart TB
          subgraph before["BEFORE — both tests pass"]
              direction LR
              b1["Brittle test<br/>queue._tracks[0]"]:::brittle
              b2["Robust test<br/>queue.titles()"]:::robust
              b1 --> bp1["✓"]:::good
              b2 --> bp2["✓"]:::good
          end
          subgraph after["AFTER — _tracks renamed to _queue"]
              direction LR
              a1["Brittle test<br/>queue._tracks[0]"]:::brittle
              a2["Robust test<br/>queue.titles()"]:::robust
              a1 --> ap1["✗ AttributeError"]:::bad
              a2 --> ap2["✓ still passes"]:::good
          end
          before --> after
          classDef brittle fill:#fff3e0,stroke:#e65100,color:#bf360c
          classDef robust fill:#e8f5e9,stroke:#2e7d32,color:#1b5e20
          classDef good fill:#e8f5e9,stroke:#2e7d32,color:#1b5e20
          classDef bad fill:#ffebee,stroke:#c62828,color:#b71c1c
      ```

      <details markdown="1"><summary>📖 Arrange-Act-Assert (AAA) — the structure of a clean test</summary>

      ```python
      def test_total_duration_sums_track_lengths():
          # Arrange — set up the world
          queue = PlaylistQueue()
          queue.add("Espresso", 175)
          queue.add("Vampire", 218)

          # Act — invoke the ONE behavior under test
          result = queue.total_duration()

          # Assert — verify the observable outcome
          assert result == 393
      ```

      Every robust test fits this shape. If you can't separate Arrange from Act cleanly, the function under test is doing too much.
      </details>

      <details markdown="1"><summary>🎓 Going deeper: Coverage ≠ quality</summary>

      **Suite A — 100% line coverage, weak oracle:**
      ```python
      def test_total_duration_runs():
          q = PlaylistQueue(); q.add("Espresso", 175); q.add("Vampire", 218)
          assert q.total_duration() is not None   # passes for any non-None return
      ```

      **Suite B — 80% coverage, strong oracle:**
      ```python
      def test_total_duration_sums_track_lengths():
          q = PlaylistQueue(); q.add("Espresso", 175); q.add("Vampire", 218)
          assert q.total_duration() == 393
      ```

      If a bug makes `total_duration()` return `0`, **Suite A still passes** (`0 is not None`). Suite B catches it. Coverage measures which lines *ran*, not whether you *checked* their behavior.
      </details>


    files:
