    quiz:
      title: "Behavior vs Implementation — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            A `UserProfile` class stores user data. Two tests check that a name is stored after creation. Which test is **more robust**?

            **Test A:**
            ```python
            def test_a():
                profile = UserProfile("alice")
                assert profile._data["name"] == "alice"
            ```

            **Test B:**
            ```python
            def test_b():
                profile = UserProfile("alice")
                assert profile.get_name() == "alice"
            ```
          type: single
          options:
            - "Test A — directly reading the storage is the most reliable way to verify the value was saved"
            - "Test B — it verifies behavior through the public API; Test A breaks if the storage key or structure changes internally"
            - "Both are equally robust since both assertions check the same underlying fact"
            - "Neither — storing a name should be tested by checking the return value of the constructor itself"
          correct_index: 1
          option_feedback:
            0: "Direct storage access (`_data`) is exactly the brittleness we saw with `_tracks`. The underscore signals 'implementation detail.' The day someone renames `_data` to `_store`, or changes the structure, Test A breaks even though the observable behavior (you can retrieve the name you stored) is unchanged."
            1: "Right. Test B verifies through the public contract (`get_name()`). Internal storage can be restructured freely without breaking it. Test A is coupled to `_data` — a pure rename breaks it even when behavior is unchanged."
            2: "They differ fundamentally under refactoring. Test A is coupled to the dict structure `_data[\"name\"]`. Test B is coupled only to the observable contract: 'after creating a profile with \"alice\", `get_name()` returns \"alice\".' One breaks during internal restructuring; the other survives it."
            3: "Constructors in Python return `None`. Testing through the constructor's return value isn't the right path. The observable behavior is what you can read back via the public interface — that's what `get_name()` provides."
          explanation: |
            Test A peeks at `_data`, an internal implementation detail. If someone refactors
            `UserProfile` to store data differently, Test A breaks — even though the behavior
            is unchanged. Test B tests through the public method `get_name()`, which is the
            contract the class makes with callers. The Refactoring Litmus Test: does it
            survive a pure internal refactor? Test B does. Test A does not.

        - question: |
            You refactor a function's internal algorithm (from bubble sort to quicksort) without changing its return value. Two of your tests break. What does this tell you?
          type: single
          options:
            - "The refactoring introduced a bug — changing the algorithm likely changed the output in a subtle way"
            - "The broken tests are testing implementation details rather than behavior. They should be rewritten to assert on outputs"
            - "You should revert the refactoring since passing tests must never be broken, even temporarily"
            - "The tests are too strict — you should lower the assertion precision or add tolerance margins"
          correct_index: 1
          option_feedback:
            0: "The premise of the question is \"without changing its return value\" — i.e., behavior is unchanged. So a behavior bug is ruled out. The test failures must be telling you something *other* than \"the new code is wrong\" — and that something is: the broken tests were verifying *how* the function works, not *what* it does."
            1: "Correct. Tests breaking on a pure refactor are the diagnostic signature of brittle tests — they're coupled to the implementation (internal variable names, algorithm choice) rather than the observable behavior. Rewrite them; keep the refactor."
            2: "Reverting a sound refactor because *the tests* are too tightly coupled inverts who's in charge. The refactor is correct; the tests are the problem. Keep the refactor, fix the tests to assert on observable behavior, and you end up with cleaner code *and* a stronger suite."
            3: "Loosening assertions or adding tolerance is exactly the wrong direction — that hides the brittleness rather than fixing it. The tests aren't *too strict* in what they assert; they're asserting on *the wrong thing* (implementation, not behavior). Rewrite, don't dilute."
          explanation: |
            If the function's behavior (inputs → outputs) is unchanged but tests break,
            those tests are coupled to the implementation. The fix is to rewrite the tests
            to assert on observable behavior, not internal details.

        - question: |
            A test you wrote needs **40 lines of setup code** before the single `assert` statement. What is this test telling you?
          type: single
          options:
            - "Nothing — large setups are fine as long as the assertion verifies the right thing in the end"
            - "The Arrange section is too big — this is the *Excessive Setup* smell, signaling that the production code has too many dependencies. Refactor the design"
            - "You should move the setup into a helper function so the test file looks shorter; the underlying design is fine"
            - "You should add more assertions to make the heavy setup feel justified — one assert is not enough for 40 lines of arrangement"
          correct_index: 1
          option_feedback:
            0: "Tests are *also* a design signal, not just a verifier. A test that needs 40 lines of setup is shouting that the function under test has too many dependencies — every collaborator the function reaches forces a corresponding fixture. Ignoring the smell keeps the pain."
            1: "Correct. Excessive Setup is a design smell pointing at the *production* code — too many dependencies crammed into one function. The test is feedback; the fix belongs in the production design, not in hiding the setup behind a helper."
            2: "A helper *hides* the smell without addressing it. The test file looks shorter, but the underlying coupling is unchanged — the helper just centralizes the setup-heavy fact. The right response is to listen to what the test is telling you about the *production* design."
            3: "Adding more assertions doesn't compensate for hard-to-arrange tests; it makes them slower to run, harder to read, and more prone to verifying multiple unrelated things in one function. The number of assertions should match the number of behaviors under test, not the size of the Arrange block."
          explanation: |
            *Excessive Setup* is a test smell. When Arrange dominates, the function under test
            is too coupled. Fix the *production code*, not the test — the test is architectural
            feedback. Hiding it in a helper just hides the pain.

        - question: |
            Two suites test the same function. Suite A has **100% line coverage** but every assertion is `assert result is not None`. Suite B has **80% line coverage** but every assertion checks an exact expected value. Which statement is correct?
          type: single
          options:
            - "Suite A is stronger — 100% coverage objectively beats 80%, regardless of assertion quality"
            - "Suite B is stronger — coverage measures only which lines *ran*, not whether their behavior was verified. A weak oracle with full coverage catches no bugs"
            - "Both are equally strong — both execute the function, which is all that matters for catching bugs"
            - "Neither is strong — industry standard is ≥95% coverage AND mutation testing, so anything less is unacceptable"
          correct_index: 1
          option_feedback:
            0: "Coverage is a necessary condition, not a sufficient one. 100% coverage with `assert result is not None` exercises every line *but verifies almost nothing* — any non-`None` return value passes, including `0`, `\"\"`, `[]`, the wrong number entirely. A higher number doesn't beat a meaningful assertion."
            1: "Right. Coverage measures which lines *ran*; strong oracles determine whether the behavior at those lines was actually *verified*. Suite A ran everything and checked almost nothing. Suite B ran 80% and checked every result precisely."
            2: "The two suites do *not* catch the same bugs. Suite A passes for any non-`None` return — a bug that flips a return value from `42` to `0` slips through silently. Suite B catches that same bug because the value differs from the asserted expected one. Same lines exercised, vastly different bug-catching power."
            3: "Mutation testing is a great deeper technique, but the question isn't asking which *industry* metric is best — it's asking which of *these two suites* is stronger. Suite B answers that even before mutation testing enters the picture, because it exposes the foundational issue: weak oracles on full coverage verify nothing."
          explanation: |
            A suite can run every line and still verify nothing if its assertions are weak.
            Coverage is a necessary ceiling (you cannot
            test what you never ran) but it is not sufficient for quality. Strong oracles
            on the critical paths beat weak oracles everywhere.

        - question: |
            **(Spaced review — Step 2)** Which assertion is the *strongest* oracle for `compute_total([1.50, 2.00])`?
          type: single
          options:
            - "`assert compute_total([1.50, 2.00]) is not None`"
            - "`assert isinstance(compute_total([1.50, 2.00]), float)`"
            - "`assert compute_total([1.50, 2.00]) > 0`"
            - "`assert compute_total([1.50, 2.00]) == 3.50`"
          correct_index: 3
          option_feedback:
            0: "`is not None` is the canonical *weak oracle*. Any non-`None` return passes — `0.0`, `\"banana\"`, `[]`. It tells you the function returned *something*, not whether it returned *the right thing*."
            1: "Type checks catch type errors only. The function could return `42.0` (wrong sum) and `isinstance` is happy. Step 2 named this the *medium-strength* oracle — better than `is not None`, still wrong-value-blind."
            2: "`> 0` is a property check, not a value check. The function could return `0.01`, `42.0`, `1000000.0` — all positive, all wrong. Property assertions are useful when you genuinely don't know the exact expected value, but for a deterministic function whose answer you can compute, pin the value."
            3: "Exactly. `== 3.50` is the only strong oracle here — any wrong return value (`0.0`, `1.5`, `42.0`) would fail it. The other options accept large families of wrong answers."
          explanation: |
            A strong oracle pins the exact expected value — only `3.50` satisfies it. The
            others would still pass if the function returned `0.0`, `42.0`, or any positive
            float — exactly the *Liar test* anti-pattern from Step 2.

        - question: |
            **(Spaced review — Step 3)** For a function `charge_fee(amount)` with rule *"fee is 2% if amount is 100 or more, else free"*, which test pair exposes the most bugs?
          type: single
          options:
            - "`amount = 50` and `amount = 200` — one value on each side, well away from the boundary"
            - "`amount = 99` and `amount = 100` — one just below and one at the boundary, catching `>` vs `>=` off-by-one errors"
            - "`amount = 0` and `amount = 1000000` — extreme values at the edges of the representable range"
            - "`amount = 1` and `amount = 2` — two adjacent low values to check precision at the small end"
          correct_index: 1
          option_feedback:
            0: "$50 and $200 are both *deep inside* their partitions — both will pass under either `> 100` or `>= 100`, since 50 is clearly free and 200 clearly charges the fee. Boundary bugs *only* manifest at the boundary; values away from it never expose them."
            1: "Right. 99 and 100 straddle the `>= 100` threshold. The canonical boundary bug here is `> 100` vs `>= 100` — it produces the wrong answer at exactly `amount = 100` and nowhere else."
            2: "Extreme-value tests catch overflow / representation bugs (rare in this kind of spec) but completely miss the off-by-one risk at $100. The most common bug here — confusing `>= 100` with `> 100` — produces correct behavior at $0 and $1,000,000. You'd ship the bug."
            3: "$1 and $2 are both in the *same partition* (free), so they verify the same path twice and never approach the boundary. This is the same anti-pattern as the previous Step 3 quiz: many tests crowded in one partition is roughly one test repeated."
          explanation: |
            The boundary is at 100. Testing 99 and 100 catches the canonical off-by-one
            (`> 100` vs `>= 100`). Picking values far from the boundary misses exactly
            the bugs that Boundary Value Analysis is designed to expose.

        - question: |
            **(Spaced review — Step 3)** A test reads `assert is_age_valid(18) == True`. A colleague says to use `is True` instead. What is the reason?

            ```python
            # Option A (current):
            assert is_age_valid(18) == True

            # Option B:
            assert is_age_valid(18) is True
            ```
          type: single
          options:
            - "No difference — `== True` and `is True` behave identically for Boolean-returning functions"
            - "`is True` catches the case where the function returns a truthy non-Boolean (like `1` or `\"yes\"`) — `== True` accepts `1 == True`, but `1 is True` fails"
            - "`is True` is faster at runtime, which matters in large test suites"
            - "`== True` is a syntax error in pytest; `is True` is the required form"
          correct_index: 1
          option_feedback:
            0: "They behave the same *if the function returns exactly `True` or `False`*. But if someone refactors `is_age_valid` to return `1` (truthy but not Boolean), `== True` still passes (`1 == True` is `True` in Python) while `is True` fails. For a function whose contract is 'returns Boolean', that's the gap you want covered."
            1: "Correct. `is True` uses identity — only the exact `True` singleton passes. `== True` uses equality — `1 == True` evaluates to `True` in Python, so truthy non-Booleans slip through. For specs that say 'returns Boolean', `is True` is the precise form."
            2: "Runtime performance is not the reason. The reason is oracle precision: `is` checks identity (is this the exact `True` object?), while `==` checks equality (is this value equal to `True`?). For booleans these differ on truthy non-Boolean values."
            3: "`== True` is valid pytest syntax. The distinction is about precision, not syntax. Both forms compile and run; only their bug-catching power differs."
          explanation: |
            `is True` uses identity comparison — only the literal `True` object passes.
            `== True` uses equality — `1`, `True`, and any value where `v == True` all pass.
            For functions whose spec says "returns a Boolean", use `is True` / `is False`
            so the test catches both wrong values *and* wrong return types.


  # --------------------------------------------------------------------------
  # STEP 5 — Putting It All Together
  # Pedagogy:
  #   Variation Theory FUSION  — partitions + oracles + behavior in one task.
  #   Bloom's Create level     — design a suite from scratch.
  #   Dehaene Pillar 4         — consolidation: name what changed.
  #   Transfer test            — novel domain forces generalization.
  #   Metacognitive prompt     — self-monitoring of skill gaps.
  # --------------------------------------------------------------------------
  - title: "Putting It All Together"
    instructions: |
      > 🎯 **Goal:** Design a complete test suite **from scratch** — combining everything from Steps 1–4.
      > 🧠 **Bloom's level:** *Create* — synthesize partitions, oracle strength, and behavior-vs-implementation into a working suite.

      ✍️ **Before reading on, write your own recap.** In one or two sentences each, answer from memory (no scrolling back):

      1. What did Step 1 teach you about *what tests are for*?
      2. What did Step 2 teach you about *the assertion*?
      3. What did Step 3 teach you about *which inputs to pick*?
      4. What did Step 4 teach you about *what to assert against*?

      Write all four sentences *before* expanding the disclosure below — the comparison is only useful if you retrieved first, not read first.

      Once you've written your four sentences, expand the box below and compare. If your version names the same ideas in different words, you've consolidated the schema. If a step is fuzzy, that's where to revisit.

      <details markdown="1"><summary>📖 Compare with our recap</summary>

      - **Step 1 — what tests are for**: tests are *executable specifications of behavior* and a *safety net* against regressions, not "checking your homework."
      - **Step 2 — the assertion**: oracle strength is one independent dimension. A strong oracle pins the exact expected value; weak oracles pass for almost any return.
      - **Step 3 — which inputs to pick**: partition the input space, then test the *boundaries* between partitions — the off-by-one zone where most bugs live.
      - **Step 4 — what to assert against**: the public API, not implementation details. Robust tests survive refactors.

      The skill underneath all four: *making the gap between what code does and what it should do visible and automatic*.
      </details>

      ⚙️ **Final challenge** — `streaming.py` defines `streaming_price(price, plan)` — the kind of pricing logic Spotify, Netflix, and YouTube Premium actually run:

      | `plan` | Discount |
      |---|---|
      | `"student"` | 50% off |
      | `"family"` | 30% off |
      | anything else | none |

      In `test_streaming.py`, **design a test suite from scratch**:

      1. **Articulate first** *(before any code)*: at the top of `test_streaming.py`, write a comment listing the partitions you see in the spec, like this:
         ```
         # Partitions of plan:
         # 1) ...
         # 2) ...
         ```
         The validator will check that this comment exists with at least two named partitions before it grades your tests. (This is the part most engineers skip — and it's where most bugs slip through.)
      2. Pick a representative input for each partition.
      3. For each input, **compute** the expected return value and write a test with a **strong oracle** (an exact `==` on the computed value, not an `is not None` check).

      You are now applying everything from Steps 1–4: behavior specification (1), pytest + oracle strength (2), partitions (3), and testing through the public function rather than internals (4).

      💡 **No numeric range, so no boundary values — but partitions still apply.** Step 3's boundary heuristic needed an *ordered* domain: lengths, ages, scores. Here `plan` is categorical — `"student"`, `"family"`, anything else — no numeric ordering, so there are no `>=` / `>` comparison operators and therefore no off-by-one boundary values to probe. But equivalence partitioning still applies: you test one representative per category. This is a Separation of two ideas you've used together: boundaries are a *special case* of partitioning that kicks in only when the domain is ordered.

      Ask yourself: for `streaming_price`, are there any "edge-of-category" inputs worth testing beyond the three named categories? What about an unexpected string like `"premium"`, or an empty string `""`? These are the categorical equivalents of boundary probing — checking the edges of the decision logic for inputs the spec doesn't explicitly name.

      💡 **Two-parameter functions:** When a function takes two parameters, partition each dimension independently, then pick deliberate combinations — not all combinations (that grows exponentially), but enough to represent each partition at least once. Here, `price` has no spec-defined constraints, so any representative value (e.g., 20) works across all plan tests. If `price` had its own threshold (e.g., "discount only for orders ≥ $5"), you'd apply boundary testing to that dimension too.

      💡 **Floating-point equality:** When the expected value is computed by multiplication (e.g., `20 * 0.50`), standard `==` usually works for simple fractions, but for arbitrary floats use `assert result == pytest.approx(expected)` to avoid rounding surprises (e.g., `assert streaming_price(13.99, "student") == pytest.approx(6.995)`).

      🪞 **Recalibrate**: At the start of Step 1 you rated your confidence (1–10) for designing a test suite from scratch. Re-rate yourself now. The gap between those numbers is what you actually learned — the *feeling* of progress is unreliable; the gap is data.

      🧭 **Threshold check** — compare then and now: look back at the first test you encountered in Step 1. What did that test *specify* about the function? Now look at the tests you just wrote. What do they *specify*? Write one sentence naming what changed in how you think about what a test is *for*. Then explain *why* that shift matters for the next function you write — what will you do differently tomorrow that you wouldn't have done before this tutorial?

      ### 🪞 Two independent dimensions of test design

      Across this tutorial, two *separate* dimensions of test design have been mixed together. Naming them apart makes both clearer:

      ```mermaid
      flowchart LR
          subgraph Dim1["DIMENSION 1 — what to test (input choice)"]
              direction TB
              D1A["Boundaries<br/>partition transitions"]
              D1B["Representative<br/>middle of partition"]
              D1C["Special cases<br/>empty, None, zero"]
          end
          subgraph Dim2["DIMENSION 2 — how strong the assertion (oracle)"]
              direction TB
              D2A["Strong<br/>== exact value"]
              D2B["Medium<br/>type / range check"]
              D2C["Weak<br/>is not None"]
          end
          Dim1 -.->|"a good test<br/>gets BOTH right"| Dim2
      ```

      A test can be *strong on input choice* (boundary-aware) but *weak on oracle* (`is not None`) — and vice versa. **Excellence is the cross-product**: pick a meaningful input *and* assert the precise expected outcome. That's why the streaming-price task above checks both partitions covered AND oracles strong.

      <details markdown="1"><summary>🧰 When to reach for which technique (a quick decision guide)</summary>

      You'll meet new functions in the wild. Use this to decide which testing tool to pull out:

      | If the function… | Reach for… | Pattern from |
      |---|---|---|
      | Takes a numeric input with a valid range (`min ≤ x ≤ max`) | **Boundary value analysis** — test `min-1, min, max, max+1` | Step 3 |
      | Takes an input from a small set of categories (`"student"`, `"family"`, …) | **Equivalence partitioning** — one test per category | Step 3 + Step 5 |
      | Returns a value (vs. mutates state) | **Strong-oracle equality** — `assert result == expected` | Step 2 |
      | Returns a float computed by multiplication/division | **`pytest.approx`** — `assert result == pytest.approx(expected)` to avoid floating-point rounding surprises | Step 2 + real projects |
      | Should raise an exception for certain inputs | **`pytest.raises`** — `with pytest.raises(ValueError): func(bad_input)` | Next tutorial |
      | Returns a list or dict | **Collection equality** — `assert result == [1, 2, 3]`; for order-independent: `assert sorted(result) == sorted(expected)` | Real projects |
      | Mutates an object's state | **Public API behavior tests** — `obj.observable() == expected` | Step 4 |
      | Has internal state you're tempted to peek at | **Don't.** Add a public method instead, then test through it | Step 4 |
      | Is "trivial" and you think it doesn't need a test | It deserves at least one regression test — *today's* trivial is *tomorrow's* surprise dependency | from research |

      Most real functions hit several rows at once. Apply them all.
      </details>

      <details markdown="1"><summary>🎲 Want a different problem? (autonomy / choice)</summary>

      The `streaming_price` task is the recommended path. If you'd rather practice on a different shape of function, edit `streaming.py` and replace the function with **one** of:

      ```python
      # Option A — numeric boundaries (more like Step 3)
      def shipping_fee(weight_kg: float) -> int:
          """Free if 0 < weight <= 1; $5 if 1 < weight <= 10; $20 above."""
          if weight_kg <= 0: return 0
          if weight_kg <= 1: return 0
          if weight_kg <= 10: return 5
          return 20

      # Option B — state-changing (more like Step 4)
      class StreakCounter:
          def __init__(self) -> None: self._n: int = 0
          def increment(self) -> None: self._n += 1
          def value(self) -> int: return self._n
      ```

      Then write tests that match the shape of the chosen function. The test-quality checks (strong oracles, multiple partitions, ≥ 3 functions, all pass) still apply.
      </details>

      <details markdown="1"><summary>🚀 What's next — pytest features you'll meet in your next project</summary>

      You now have the *foundations* of testing. The pytest features below build on what you've learned — they don't replace it. None of them are needed for what you just did, but you'll see them everywhere in real codebases:

      | Feature | What it solves | When you'll want it |
      |---|---|---|
      | **`@pytest.fixture`** + `conftest.py` | Repeated Arrange logic across many tests (e.g. database connection, sample objects, mock services) | When two tests start with the same 5 lines of setup. |
      | **`@pytest.mark.parametrize`** | A family of similar tests on different inputs — *one function, many cases* | When you'd otherwise copy-paste the same test for `test_age_18`, `test_age_19`, `test_age_20`. The boundary-and-partition logic from Step 3 fits this perfectly. |
      | **`unittest.mock` / `pytest-mock`** | Testing code that calls external services (HTTP, database, file I/O) without actually hitting them | When the function under test would otherwise require network or disk to run. |
      | **`pytest-cov`** (coverage) | Measuring *which* lines of production code your tests execute | When you suspect a partition is missing — coverage shows untested branches. (Reminder from Step 4: coverage ≠ quality.) |
      | **Property-based testing** (`hypothesis`) | Auto-generating thousands of inputs to find edge cases your boundary tests missed | When the input space is too large for case-by-case enumeration. |

      Next pedagogical step: the **Test-Driven Development (TDD)** tutorial — where you write the test *before* the production code, and let failing tests drive the design. Everything from this tutorial (oracle strength, partitions, behavior testing) becomes a foundation that TDD layers a discipline on top of.

      Where to apply these in your own work: every new function you write deserves at least one boundary test and one partition representative test, with a strong oracle, through the public API. That's the four skills of this tutorial in 30 seconds per function — and it pays for itself the first time a refactor would have shipped a regression.
      </details>


    files:
      - path: "streaming.py"
        content: |
          def streaming_price(price: float, plan: str) -> float:
              """Apply a streaming-service plan discount.

              student -> 50% off  (Spotify Student / YouTube Premium Student style)
              family  -> 30% off  (Spotify Family / Apple Music Family style)
              other   -> no discount  (Individual, free, etc.)
              """
              if plan == "student":
                  return price * 0.50
              if plan == "family":
                  return price * 0.70
              return price
        language: "python"

      - path: "test_streaming.py"
        content: |
          """Design your own test suite for streaming_price.

          Apply what you've learned:
            - pytest conventions (function names start with test_)
            - strong oracles (assert exact expected values, not 'is not None')
            - partition the input space (student / family / other)
          """
          import pytest
          from streaming import streaming_price

          # TODO: Write at least 3 tests covering all three partitions of plan.


        language: "python"

    open_file: "test_streaming.py"
    run_file: "test_streaming.py"

    solution:
      files:
        - path: "test_streaming.py"
          content: |
            # Partitions of plan:
            # 1) "student" — 50% off
            # 2) "family" — 30% off
            # 3) anything else (e.g., "individual", "", None) — no discount
            import pytest
            from streaming import streaming_price


            def test_student_gets_half_off():
                assert streaming_price(20, "student") == 10.0


            def test_family_gets_30_percent_off():
                assert streaming_price(20, "family") == 14.0


            def test_individual_no_discount():
                assert streaming_price(20, "individual") == 20


            def test_empty_string_no_discount():
                assert streaming_price(20, "") == 20


          language: "python"
      explanation: |
        Three partitions: student, family, other. One test per partition gets you to 3.
        Strong oracles pin the exact expected value (10.0, 14.0, 20). The empty string
        is an extra edge case inside the "other" partition.

    tests:
      - description: "Partitions named in a comment (articulation before code)"
        command: |
          import re
          source = open('/tutorial/test_streaming.py').read()
          # Look for a "Partitions" comment header, then count enumerated lines (e.g. "# 1) ..." or "# - ...").
          header_match = re.search(r'#\s*[Pp]artitions?\b', source)
          assert header_match, \
              "Add a `# Partitions of plan:` comment at the top of test_streaming.py before writing tests. Naming the partitions in your own words is the design move that prevents bugs from slipping through — engineers who skip this step write suites that miss whole categories of input."
          # Count enumerated partition lines after the header (numbered, dashed, or bulleted).
          after = source[header_match.end():]
          partition_lines = re.findall(r'^\s*#\s*(?:[1-9][\)\.]|[-*])\s*\S', after, re.MULTILINE)
          assert len(partition_lines) >= 2, \
              f"Found a Partitions header but only {len(partition_lines)} partition entries listed. Name at least 2 (the spec defines more than that — re-read the table)."
      - description: "At least 3 test functions defined"
        command: |
          source = open('/tutorial/test_streaming.py').read()
          count = source.count('def test_')
          assert count >= 3, \
              f"Write at least 3 test functions (found {count}). The function has 3 partitions of `plan` — one test per partition is the floor. Each partition deserves its own named function so a failure tells you exactly which case broke."
      - description: "Tests cover the 'student' partition"
        command: |
          source = open('/tutorial/test_streaming.py').read()
          assert 'student' in source, \
              "No test references 'student'. The 50%-off branch is one of the three partitions — leaving it untested means a regression in that branch ships silently."
      - description: "Tests cover the 'family' partition"
        command: |
          source = open('/tutorial/test_streaming.py').read()
          assert 'family' in source, \
              "No test references 'family'. The 30%-off branch needs at least one test — same reasoning as student."
      - description: "Tests cover the 'other' (no-discount) partition"
        command: |
          import re
          source = open('/tutorial/test_streaming.py').read()
          pattern = r'streaming_price\s*\([^)]*,\s*[\'"](?!student|family)[^\'"]*[\'"]\s*\)'
          has_other = bool(re.search(pattern, source))
          assert has_other, \
              "All your tests use 'student' or 'family'. Check your partition list — what should the function return for a plan it doesn't recognize? Add one test for that case: pick any representative input that isn't 'student' or 'family', compute the expected return value from the spec, and assert it."
      - description: "Tests use strong oracles (no weak 'is not None' / isinstance)"
        command: |
          source = open('/tutorial/test_streaming.py').read()
          weak = 'is not None' in source or 'isinstance(' in source
          assert not weak, \
              "You used a weak oracle (`is not None` or `isinstance`). These pass for almost any return value — the exact bug Step 2 warned about. For each test: choose a concrete `price` input, compute the expected post-discount value yourself from the spec table, and assert that exact value with `==`."
      - description: "All tests pass against the reference implementation"
        command: |
          import pytest, io, sys
          old = sys.stdout; sys.stdout = buf = io.StringIO()
          code = pytest.main(['/tutorial/test_streaming.py', '-v', '--tb=short', '--no-header'])
          sys.stdout = old; output = buf.getvalue(); print(output)
          assert code == 0, f"Some tests failed:\n{output}"
        hints:
          - title: "What partitions?"
            text: "Three: `\"student\"`, `\"family\"`, and *everything else*. Each deserves at least one test. `\"\"` is a nice extra edge case."
          - title: "Strong-oracle reminder"
            text: "Don't write `assert streaming_price(20, \"family\") is not None` — that passes for almost any return. Pin the *exact* value with `==`. The spec table above tells you the discount percentage for each partition; compute the post-discount price for a chosen input yourself."
          - title: "Almost-spoiler — compute, don't copy"
            text: "Pick your representative price (e.g., a $20 streaming subscription). For each partition, compute the expected return value from the spec: 50% off ⇒ price × 0.50; 30% off ⇒ price × 0.70; no discount ⇒ price. Then write one test per partition with `assert streaming_price(price, plan) == <your_number>`. The shape is the same as Step 2's tests — only the function and partitions differ."

    quiz:
      title: "Wrap-up — Knowledge Check"
      min_score: 0.75
      shuffle: true
      questions:

        - question: |
            **(Spaced review — all steps)** A function ships free for orders **≥ $50** and charges $5 otherwise. Which test pair is the *single most important*?
          type: single
          options:
            - "`order = $25` and `order = $200` — one in the middle of each partition"
            - "`order = $49.99` and `order = $50` — one just below the boundary, one exactly at it"
            - "`order = $0` and `order = $1,000,000` — the extreme edges"
            - "`order = $50` only — one boundary test is enough"
          correct_index: 1
          option_feedback:
            0: "$25 and $200 are deep inside their partitions. They both behave correctly under either `>= 50` or `> 50`, since 25 clearly charges and 200 clearly ships free. Boundary bugs *only* surface at the boundary itself."
            1: "Right. $49.99 and $50 straddle the `>= $50` threshold — the same test-pair structure as the streak bug at day 100. Two values straddling a threshold expose the `>` vs `>=` family of bugs."
            2: "$0 and $1,000,000 catch a different category of bugs (representation issues, overflow). They miss the dominant off-by-one risk at $50, which is where 99% of bugs in this kind of spec live. Boundary tests come first; extreme-value tests come second."
            3: "One boundary test isn't enough; two values straddling the boundary are what expose `>` versus `>=`. With only `order = $50`, the test cannot tell whether the function is using the right operator because it observes only one side of the threshold."
          explanation: |
            The boundary is $50. Testing $49.99 (just below) and $50 (exactly at) catches the
            classic `>=` vs `>` off-by-one bug — the same family as the streak_badge bug
            from Step 1.

        - question: |
            A teammate adds `assert result is not None` for `calculate_total()` and says, "Great — the function works." What's the right response?
          type: single
          options:
