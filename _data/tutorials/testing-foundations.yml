        language: "python"

      - path: "test_oracle_drill.py"
        content: |
          """Fill-in-the-Oracle drill — write the STRONGEST assertion possible.

          Arrange and Act are done for you. Replace the weak oracle below each
          `result = ...` line with the strongest possible assertion on `result`.
          """
          import pytest
          from leveling import xp_to_level


          def test_oracle_weak_example():
              # Arrange + Act
              result = xp_to_level(0)
              # Weak oracle (provided as a bad example):
              assert result is not None   # passes for almost any return value


          def test_oracle_strong_starter():
              # Arrange + Act
              result = xp_to_level(0)
              # The spec says: 0 XP → level 0.  The expected value is 0.
              # TODO: replace this weak oracle with the strongest possible assertion.
              assert isinstance(result, int)


          def test_oracle_strong_max():
              # Arrange + Act
              result = xp_to_level(10000)
              # The spec says: 10 000 XP ÷ 100 = level 100.  The expected value is 100.
              # TODO: replace this weak oracle with the strongest possible assertion.
              assert isinstance(result, int)


        language: "python"

    open_file: "test_leveling.py"
    run_file: "test_leveling.py"

    solution:
      files:
        - path: "test_leveling.py"
          content: |
            """Tests for the leveling module."""
            import pytest
