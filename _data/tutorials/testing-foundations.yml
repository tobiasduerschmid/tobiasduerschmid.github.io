          assert '._tracks' not in source and '._queue' not in source, \
              "Your tests still touch `_tracks` or `_queue`. The leading underscore is Python's signal: 'this is internal — could be renamed any day.' Tests that depend on internals break whenever someone refactors — even when behavior is unchanged. Instead, verify through the same interface a real caller would use. Check the class for public methods (those not starting with `_`)."
        hints:
