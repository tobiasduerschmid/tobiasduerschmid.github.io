    quiz:
      title: "Wrap-up — Knowledge Check"
      min_score: 0.75
      shuffle: true
      questions:

        - question: |
            **(Spaced review — all steps)** A function ships free for orders **≥ $50** and charges $5 otherwise. Which test pair is the *single most important*?
          type: single
          options:
            - "`order = $25` and `order = $200` — one in the middle of each partition"
            - "`order = $49.99` and `order = $50` — one just below the boundary, one exactly at it"
            - "`order = $0` and `order = $1,000,000` — the extreme edges"
            - "`order = $50` only — one boundary test is enough"
          correct_index: 1
          option_feedback:
            0: "$25 and $200 are deep inside their partitions. They both behave correctly under either `>= 50` or `> 50`, since 25 clearly charges and 200 clearly ships free. Boundary bugs *only* surface at the boundary itself."
            2: "$0 and $1,000,000 catch a different category of bugs (representation issues, overflow). They miss the dominant off-by-one risk at $50, which is where 99% of bugs in this kind of spec live. Boundary tests come first; extreme-value tests come second."
            3: "One boundary test isn't enough — you need two values *straddling* the boundary to detect `>` vs `>=` confusion. With only `order = $50`, you can't tell whether the function is using the right operator: it might return either pass-or-charge depending on how the bug shakes out, but you can't disambiguate from one data point."
          explanation: |
            The boundary is $50. Testing $49.99 (just below) and $50 (exactly at) catches the
            classic `>=` vs `>` off-by-one bug — the same family as the streak_badge bug
            from Step 1.

        - question: |
            A teammate adds `assert result is not None` for `calculate_total()` and says, "Great — the function works." What's the right response?
          type: single
          options:
            - "Agree — passing tests prove the function works."
            - "That's a *weak oracle*. It passes for any non-`None` value (including `0.0` or `\"banana\"`). Replace with `assert result == <expected_value>`."
            - "Disagree because we don't have 100% line coverage yet."
            - "Disagree — the test is fine but the function name should change."
          correct_index: 1
          option_feedback:
            0: "Tests passing only tells you what their *assertions* held. `assert result is not None` holds for any non-`None` value, including buggy ones. The teammate is reading the green dot and skipping the question of *what was actually verified*."
            2: "Coverage isn't the issue here — the issue is *oracle strength*. The function might be running with full coverage *and* returning the wrong value entirely; this assertion couldn't tell you. Push back on the assertion, not on coverage."
            3: "The function name might also need work, but that's a separate critique. The immediate problem is that the test doesn't verify the function's behavior in any meaningful way — even a perfect function name wouldn't fix a `is not None` oracle."
          explanation: |
            Weak oracles look productive but verify nothing. The fix is the *strong oracle*:
            pin the exact expected value.

        - question: |
            What is the **single most important shift** in how you now think about testing, compared to before this tutorial?
          type: single
          options:
            - "Tests are something you write *after* code is done, to check it works."
            - "Tests *specify behavior* — they describe what the code should do, lock in progress, and let you change code without fear."
            - "Tests are mainly about hitting 100% line coverage."
            - "Tests are an academic exercise that doesn't apply in real projects."
          correct_index: 1
          option_feedback:
            0: "This is the *pre-tutorial* mindset — the one you started with. If you still feel this way, revisit Step 1 and Step 5's threshold-check prompts. Tests-as-after-the-fact-checks miss the design-feedback role tests play during development."
            2: "Coverage is a metric, not a mindset. You can have 100% coverage and still ship bugs (Step 4 showed exactly this with weak oracles). Coverage is at most a floor — what *moves the needle* is treating tests as specifications."
            3: "This is the cynical version of the *post-hoc* misconception. The streak-badge bug at the start of Step 1 was a real-world example of why tests matter; the discount task in Step 5 was a real-world example of how to design them. If those felt academic, that's worth a second pass through the tutorial — the framing is meant to land *because* these are the kinds of functions students actually ship."
          explanation: |
            This is the threshold concept. Once tests become **specifications of behavior**
            (rather than after-the-fact correctness checks), you start writing them earlier
            and treating them as design artifacts.
