            """AUDIT: Fixed brittle tests — behavior not implementation."""
            import pytest
            from shopping_cart import ShoppingCart


            def test_add_item_updates_count():
                cart = ShoppingCart()
                cart.add("Apple", 1.50)
                assert cart.item_count() == 1


            def test_add_item_via_public_api():
                cart = ShoppingCart()
                cart.add("Apple", 1.50)
                assert "Apple" in cart.items()


            def test_total_sums_prices():
                cart = ShoppingCart()
                cart.add("Apple", 1.50)
                cart.add("Bread", 2.00)
                assert cart.total() == 3.50


            def test_item_count_via_public_api():
                cart = ShoppingCart()
                cart.add("Apple", 1.50)
                cart.add("Bread", 2.00)
                assert cart.item_count() == 2
          language: "python"
      explanation: |
        Replace direct `._items` access with public API calls (items(), item_count()).
        Robust tests verify what the class DOES (its observable behavior via the public
        API), not HOW it stores state internally.

