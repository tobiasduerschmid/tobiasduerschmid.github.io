title: "Testing Foundations with pytest"
description: "Build the core testing skills you need BEFORE learning TDD: write meaningful assertions, choose test cases using partitions and boundaries, and test behavior instead of implementation."

backend: pyodide

# Show code (left) and tests (right) side by side — students can toggle back
# to tabbed view with the button above the editors. Files prefixed `test_`
# route to the right pane automatically; everything else lands on the left.
editor_split: true

# Keep the output panel compact — most interaction happens in the editors,
# and students only need a short strip to skim pytest's pass/fail summary.
output_height: "25%"

require_tests: true
autosave_type: files

# Global setup: install pytest, add /tutorial to sys.path, patch module cache
setup_commands:
  - "import pyodide_js; await pyodide_js.loadPackage('pytest')"
  - "import sys; sys.path.insert(0, '/tutorial')"
  - |
    import pytest as _pytest, sys as _sys
    def _make_pytest_patch():
        _orig = _pytest.main
        _sysmod = _sys
        def _patched(*a, **kw):
            for m in list(_sysmod.modules):
                if m.startswith('test_') or m in ('streaks','leveling','squad','playlist','streaming'):
                    del _sysmod.modules[m]
            return _orig(*a, **kw)
        return _patched
    _pytest.main = _make_pytest_patch()

steps:

  # --------------------------------------------------------------------------
  # STEP 1 — Why Test? The Bug That Got Away
  # Pedagogy:
  #   Generation Effect     — predict outputs before running.
  #   Worked-example effect — students READ pre-written pytest tests before
  #                           being asked to write any (faded scaffolding
  #                           continues into Step 2 where they write the oracle).
  #   Productive failure    — one calibrated RED test, with a specific message,
  #                           on the boundary value the student just predicted.
  #   Safety-net metaphor   — tests catch regressions before they reach production.
  #   Forward-pointer       — streak bug IS a boundary bug (covered in Step 3).
  #   Bloom's level         — Remember / Understand / Analyze (quiz).
  # (Note: this is testing, NOT TDD. TDD has its own tutorial: tdd.yml.)
  # --------------------------------------------------------------------------
  - title: "Why Test? The Bug That Got Away"
    instructions: |
      > 📣 **The kind of bug that ships.** Imagine you've kept your Duolingo streak alive for **100 days straight**. You open the app expecting the 💯 badge — and it shows you 🔥 instead. One missing `=` sign in the badge logic, and the milestone you actually earned silently disappeared. The code runs cleanly, prints no error, and a million 100-day-streakers feel slightly betrayed. *That* is what tests prevent.

      > 🎯 **Goal:** Find the bug in `streak_badge`, watch a real test catch it, then fix the code so the test passes.

      > 🧭 **Heads-up — a shift coming.** By the end of this tutorial you'll think about tests differently than most beginners do: not as *"checking your homework"* but as *executable specifications of behavior*. Notice the shift as it happens.

      ### 💡 Why test?

      Many students think testing is about **finding bugs after you write code**. That's half the story. Tests also:

      - **Specify behavior** — a test says *"this function should do X"*
      - **Prevent regressions** — a *regression* is a bug that comes back after being fixed; once a passing test guards a behavior, any future change that breaks that behavior immediately fails the test
      - **Enable fearless refactoring** — change code confidently because the suite catches breakage immediately

      Think of tests as a **safety net**: once a test passes, it stays in place to catch you. If a future change breaks the behavior the test guards, the test fails — the regression is caught before users feel it.

      ### 🔍 Predict first

      Don't run anything yet. Open `streaks.py` and read it.

      - What will `streak_badge(150)` return? *(deep into 💯 territory)*
      - And `streak_badge(50)`? *(in the 🔥 zone)*
      - And `streak_badge(100)` — exactly on the line between 🔥 and 💯?

      Hold those three predictions in your head.

      ### 📂 What you have

      Two files are already set up for you:

      - **`streaks.py`** — the production code (with a real bug).
      - **`test_streaks.py`** — three tests, **already written for you**. Each is a Python function whose name starts with `test_`. That naming is how `pytest` finds and runs them. Each body **calls** `streak_badge` and **asserts** what it should return. *(In Step 2 you'll write your own from scratch.)*

      ⚙️ **Task**:

      1. **Read `test_streaks.py`.** What behavior is each test checking? Notice the third test pins down `streak_badge(100)` — the spec says 100 days and up earns 💯.
      2. **Run the tests** (Run button). One test will fail. **That's a win** 🎯 — the test just caught a real bug. Read the failure carefully: pytest tells you exactly which assertion failed and what value came back instead.
      3. **Fix `streaks.py`** so all three tests pass. *Don't touch the test file* — production code is what we change; tests describe what the code *should* do.
      4. **Run again.** Three green checks. The fix is now permanently guarded by the test — if anyone ever reverts to the old comparison, the safety net catches it instantly.

      That whole loop is the rhythm you'll see in every later step:

      ```mermaid
      flowchart LR
          predict["1. Predict<br/>(don't run yet)"]:::neutral
          red["2. Run pytest<br/>see RED ✗"]:::bad
          fix["3. Fix streaks.py<br/>(production code, not the test)"]:::neutral
          green["4. Run pytest<br/>see GREEN ✓"]:::good
          guard["5. Test guards behavior<br/>future regressions caught"]:::good
          predict --> red --> fix --> green --> guard
          classDef good fill:#e8f5e9,stroke:#2e7d32,color:#1b5e20
          classDef bad fill:#ffebee,stroke:#c62828,color:#b71c1c
          classDef neutral fill:#fafafa,stroke:#bdbdbd,color:#424242
      ```

      🪞 **Calibrate yourself** (1 second, mental note): On a scale of 1–10, how confident are you right now that you could *design a test suite from scratch* for an unfamiliar function? Remember the number — you'll re-check at the end.

      <details markdown="1"><summary>🎯 Why this bug matters (read after solving)</summary>

      The bug lives at *exactly* `100` days — the line between 🔥 and 💯. That's no coincidence. Bugs love **boundaries** — the values where behavior changes. They're the natural home of off-by-one errors (`>` vs `>=`, `<` vs `<=`). You'll hunt boundaries systematically in **Step 3**.
      </details>

      🧭 **Pause — name what just happened.** Right now, does writing tests feel like *checking your own homework*, or like *writing a specification of behavior*? Whichever it is, name what would have to shift to make it feel more like the latter. Stay with the discomfort if you're unsure — that's the threshold this tutorial is built around.

    files:
      - path: "streaks.py"
        content: |
          def streak_badge(days):
              """Pick the streak badge for a daily-app streak (Duolingo / Snapchat / BeReal style).

              Spec:
                days >= 100 -> "💯"   (century club)
                days >=  30 -> "🔥"   (on fire)
                days >=   7 -> "⚡"   (lit week)
                days >=   1 -> "✨"   (just started)
                else        -> ""     (no streak)
              """
              if days > 100:
                  return "💯"
              if days >= 30:
                  return "🔥"
              if days >= 7:
                  return "⚡"
              if days >= 1:
                  return "✨"
              return ""
        language: "python"

      - path: "test_streaks.py"
        content: |
          """Tests for streaks.streak_badge — pre-written for you in this step.
          In Step 2 you'll write your own from scratch."""
          import pytest
          from streaks import streak_badge


          def test_well_above_century_is_diamond():
              # 150 days is deep in the 💯 range — this should never be in doubt.
              assert streak_badge(150) == "💯"


          def test_inside_fire_range_is_fire():
              # 50 days is comfortably in the 🔥 range (30-99).
              assert streak_badge(50) == "🔥"


          def test_exactly_at_century_boundary_is_diamond():
              # The spec says: 100 days and up earns 💯.
              # 100 is the *boundary* — the value where 🔥 turns into 💯.
              # Boundary bugs (off-by-one) love values like this. (More in Step 3.)
              assert streak_badge(100) == "💯"


          if __name__ == "__main__":
              pytest.main(["-v"])
        language: "python"

    open_file: "streaks.py"
    run_file: "test_streaks.py"

    solution:
      files:
        - path: "streaks.py"
          content: |
            def streak_badge(days):
                """Pick the streak badge for a daily-app streak (Duolingo / Snapchat / BeReal style).

                Spec:
                  days >= 100 -> "💯"   (century club)
                  days >=  30 -> "🔥"   (on fire)
                  days >=   7 -> "⚡"   (lit week)
                  days >=   1 -> "✨"   (just started)
                  else        -> ""     (no streak)
                """
                if days >= 100:
                    return "💯"
                if days >= 30:
                    return "🔥"
                if days >= 7:
                    return "⚡"
                if days >= 1:
                    return "✨"
                return ""
          language: "python"
      explanation: |
        The bug was `days > 100` instead of `days >= 100`. The spec says 100
        days earns 💯, but the buggy comparison let exactly-100 fall through
        to the 🔥 branch. We fixed `streaks.py` — never the test file. Tests
        describe what the code *should* do; production code is what we change.

    tests:
      - description: "Boundary fix: `days >= 100` replaces `days > 100` in streaks.py"
        command: |
          import re
          source = open('/tutorial/streaks.py').read()
          assert re.search(r'days\s*>=\s*100', source), \
              "The 💯 branch should compare with `>=`, not `>`. Change the first `if` so that `days >= 100` is what selects 💯 — that includes 100 itself."
          assert not re.search(r'days\s*>\s*100(?!=)', source), \
              "Looks like `days > 100` is still in the file. Change it to `days >= 100` so day 100 earns 💯."
        hints:
          - title: "Small nudge"
            text: "Look at the comparison operator on the very first `if`. What happens at *exactly* `100`?"
          - title: "Strategic hint"
            text: "Trace `streak_badge(100)` by hand. Which `if` branch does it enter, and which one *should* it enter?"
          - title: "Spoiler — full fix"
            text: "Change `days > 100` to `days >= 100`. The original comparison excluded `100` itself, so it fell through to the 🔥 branch."
      - description: "All three pre-written tests pass"
        command: |
          import pytest, io, sys
          old = sys.stdout; sys.stdout = buf = io.StringIO()
          code = pytest.main(['/tutorial/test_streaks.py', '-v', '--tb=short', '--no-header'])
          sys.stdout = old; output = buf.getvalue(); print(output)
          assert code == 0, f"Some tests still fail — pytest output:\n\n{output}\n\nFix `streaks.py` so that `streak_badge(100) == '💯'`."

    quiz:
      title: "Why Test? — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            A teammate says: *"I only write tests after I finish all my code, to check for bugs."*

            What is the main limitation of this approach?
          type: single
          options:
            - "There is no real limitation — writing tests after code is the industry standard, and the test suite ends up identical either way since you cover the same behaviors"
            - "Post-hoc tests verify what you *think* the code does, not what it *should* do. They also can't guide your design during development"
            - "Writing tests afterward is fine as long as you achieve 100% coverage, which ensures all behavior is verified"
            - "The main problem is that it takes slightly longer because you have to context-switch back to code you already wrote"
          correct_index: 1
          option_feedback:
            0: "This claim ignores the order in which tests are written. Tests written *after* the code reflect what the code *happens to do* — including any bugs the author baked in. Tests written *before* (or alongside) reflect what the code *should* do. The two suites look identical only when the implementation already happens to be correct."
            2: "Coverage measures which lines *ran*, not whether their behavior was *checked*. A weak oracle (`assert result is not None`) hits 100% coverage and verifies almost nothing. You'll see this exact failure mode in Step 2."
            3: "Context-switching is a minor cost compared with the real issue — post-hoc tests can only confirm your implementation matches itself, not that it matches the spec. They also can't act as a safety net during the development that already happened."
          explanation: |
            Post-hoc tests verify *your implementation* rather than *intended behavior*.
            They also cannot serve as a safety net during development because they don't exist yet.

        - question: |
            What does this code do?
            ```python
            assert len(result) == 3, "Expected 3 items"
            ```
          type: single
          options:
            - "It prints 'Expected 3 items' to the console, then continues execution normally"
            - "It checks that `result` has 3 elements; if not, it raises an `AssertionError` with the message"
            - "It creates a new list called `result` and populates it with exactly 3 items"
            - "It evaluates the condition but silently continues even if the condition is `False`"
          correct_index: 1
          option_feedback:
            0: "`assert` is not a print statement. The string after the comma is the *failure message* — it only appears when the assertion is `False` and Python raises an `AssertionError`."
            2: "`assert` doesn't create or modify variables — it just evaluates a condition. The `result` here must already exist when `assert` runs, or you'd get a `NameError` first."
            3: "A `False` assertion does *not* silently continue — it raises `AssertionError`. (Python's `-O` flag *does* strip asserts, but in normal execution they always raise on failure.)"
          explanation: |
            `assert condition, message` evaluates the condition. If `True`, nothing happens and
            execution continues. If `False`, Python raises an `AssertionError` with the message.

        - question: |
            Which of the following is **not** a benefit of automated tests?
          type: single
          options:
            - "They prevent regressions — bugs that were fixed from coming back"
            - "They enable fearless refactoring by catching breakage immediately"
            - "They guarantee your code has zero bugs"
            - "They specify expected behavior as executable documentation"
          correct_index: 2
          option_feedback:
            0: "This *is* a real benefit — once a passing test guards a behavior, a future change that breaks that behavior fails the test. The question asks for the **non-benefit**."
            1: "Fearless refactoring *is* a real benefit — that's the safety-net property. The question asks for the **non-benefit**."
            3: "Tests-as-documentation *is* a real benefit — the test name plus its assertion together describe what the code is supposed to do. The question asks for the **non-benefit**."
          explanation: |
            Tests **reduce** bugs and catch **regressions**, but they cannot guarantee zero bugs.
            Dijkstra famously said: "Testing can show the presence of bugs, but never their absence."

        - question: |
            The "safety net" metaphor for testing means:
          type: single
          options:
            - "Tests should be run automatically on every commit, like a security camera scanning each code change"
            - "Each passing test stays in place to catch regressions — you can refactor and add features fearlessly because the net catches breakage"
            - "You should aim for 100% test coverage as a safety baseline before each release"
            - "Tests should be written in a strict mechanical order: unit tests first, then integration, then end-to-end"
          correct_index: 1
          option_feedback:
            0: "This describes *continuous integration* (running tests automatically on every commit) — that's about the trigger, not the metaphor. The safety-net image is about what each *passing* test does for you: it stays in place to catch later breakage."
            2: "The safety-net image isn't about a coverage number. A test suite with 100% line coverage but weak oracles is full of holes; a smaller suite with strong oracles on the critical paths is a tighter net. Coverage and the safety-net principle are different ideas (more in Step 4)."
            3: "This describes the *testing pyramid* (a way of layering test types), not the safety-net metaphor. The safety net is about *passing tests as permanent guards against regression*, regardless of what level of the pyramid they sit at."
          explanation: |
            The safety-net metaphor (popular in Harry Percival's "Obey the Testing Goat") captures
            the key psychological benefit of testing: each passing test stays in place to catch
            regressions you might otherwise introduce. With a thick safety net of tests, you can
            refactor and add features fearlessly — if you break something, the net catches it
            before users do.


  # --------------------------------------------------------------------------
  # STEP 2 — Your First pytest Test + Oracle Strength
  # Pedagogy:
  #   Guide-and-Release     — explain conventions, then immediate hands-on.
  #   Variation Theory      — weak / medium / strong oracles held against the
  #                           same function to make "assertion strength" discernible.
  #   Fill-in-the-Oracle    — Arrange+Act given; student writes only Assert.
  #   Bloom's level         — Remember / Apply / Analyze.
  # --------------------------------------------------------------------------
  - title: "Your First pytest Test"
    instructions: |
      > 🎯 **Goal:** Write pytest tests, and learn to spot a *weak oracle* — an assertion that passes even when the code is wrong.

      🔍 **Read first** (don't write yet). Open `test_leveling.py`. For each test stub, predict in your head: *what behavior is this test claiming?* Run it once to see pytest's output format.

      ⚙️ **Task 1 — write the assertions** (file: `test_leveling.py`):

      A pytest test is just a function whose name starts with `test_`, containing one or more plain `assert` statements. Here's the shape, demonstrated on a *different* function so you can see the pattern without seeing today's answer:

      ```python
      # The function under test (in some module):
      def add(a, b):
          return a + b

      # The pytest test for it:
      def test_add_two_positives():
          assert add(2, 3) == 5
      ```

      Three things to notice:

      - The test is just a regular function — no class, no boilerplate.
      - The body **calls** the function under test and **asserts** the expected return value with `==`.
      - The test name reads like a one-line bug report (*"add_two_positives FAILED"* tells the next reader exactly what broke).

      **pytest convention**: both the **file name** and **function names** must start with `test_`.

      Now apply that shape to `xp_to_level` — a classic JRPG / Pokemon-style level calculator. Three test stubs are waiting in `test_leveling.py`. For each one:

      1. **Read the spec** in `leveling.py`'s docstring + body to find the leveling formula.
      2. **Decide what input the test name pins down** (`starter_with_zero_xp` references a fresh account; `first_level_up` references the moment you cross from level 0 to 1; `max_level_cap` references the legendary level 100).
      3. **Compute** the expected return value yourself, then write the assertion.

      The third stub (`test_max_level_cap`) doesn't exist yet — you write it from scratch. **Level 100 is the max level in countless JRPGs** (Pokemon, Final Fantasy, Dragon Quest, …). What XP value puts you at *exactly* level 100? Compute it, then pin it down with a test.

      ### 💡 Oracle strength — the central idea of Task 2

      The **oracle** is the assertion that decides pass/fail. The same function call can be checked with a *weak*, *medium*, or *strong* oracle — and weakness is invisible until a bug slips through:

      | Strength | Assertion | What breaks it? |
      |---|---|---|
      | **Weak** | `assert result is not None` | Almost nothing — `42`, `"hi"`, `0` all pass |
      | **Medium** | `assert isinstance(result, int)` | Type errors only — wrong numbers slip through |
      | **Strong** | `assert result == 0` | *Any* incorrect value |

      Weak oracles look productive but verify nothing. Rushed students and AI assistants default to them because they almost always succeed — the *Liar test* anti-pattern.

      ### 🎯 Two independent dimensions of test design

      Notice what the table above isolates: *the input is held constant* (`xp_to_level(0)` in every row). Only the **assertion** varies. This is one whole dimension of test quality — *how strong is the oracle?* — and it lives **independently** of the other big dimension you'll meet in Step 3: *which inputs do I pick?*

      | Dimension 1 — what input to test | Dimension 2 — how strong the assertion |
      |---|---|
      | boundary, representative, special-case | strong (`==` exact), medium (type/range), weak (`is not None`) |
      | (Step 3's job) | (this step's job) |

      A great test gets *both* right; a bad test can fail on either lever. Keep this two-dimension picture in mind through the rest of the tutorial — Step 5 will recombine them.

      ⚙️ **Task 2 — make the oracle strong** (file: `test_oracle_drill.py`):

      Each test has `result = xp_to_level(...)` already done. Replace the **weak** `assert isinstance(result, int)` with the **strongest** possible assertion (one that fails for *any* wrong value).

      💬 **Articulate it**: Before fixing each weak oracle, add a Python comment above explaining *what bug the weak version would miss*. Writing this out beats just thinking it.

      <details markdown="1"><summary>📖 Test names ARE documentation</summary>

      Notice that good test names *describe the behavior they verify*: `test_starter_with_zero_xp`, `test_max_level_cap`, `test_oracle_strong_max`. A failing test should read like a one-line bug report: *"max_level_cap FAILED — assert 99 == 100"*. If you can read your test names without opening the code and still know what the suite covers, your tests double as documentation.

      Anti-example: `test_1`, `test_xp`, `test_works`. These tell the next reader nothing.
      </details>

      <details markdown="1"><summary>📖 Why pytest beats raw `assert`</summary>

      Raw `assert` halts at the first failure; you only learn about one bug at a time. pytest discovers all tests, runs them all, names each one, and shows the *exact* mismatched value when one fails — e.g. `assert 4 == 5  where 4 = func(3)`.

      No classes, no boilerplate — just functions starting with `test_`.
      </details>


    files:
      - path: "leveling.py"
        content: |
          """Player leveling utilities — JRPG / Pokemon style."""


          def xp_to_level(xp):
              """Convert raw experience points to player level.

              Spec: every 100 XP earns one level (integer division by 100).
              Level cap is conventionally 100 in mainline JRPGs; this function
              doesn't enforce a cap — that's a separate design decision.
              """
              return xp // 100


          def level_to_min_xp(level):
              """The minimum XP required to be AT a given level."""
              return level * 100
        language: "python"

      - path: "test_leveling.py"
        content: |
          """Tests for the leveling module — three stubs, fill them in.

          The leveling spec is in leveling.py."""
          import pytest
          from leveling import xp_to_level, level_to_min_xp


          def test_starter_with_zero_xp():
              # TODO: pin down what xp_to_level returns for a brand-new account (xp = 0).
              pass


          def test_first_level_up():
              # TODO: same idea — but at the moment you cross from level 0 to level 1.
              # Look up the spec: how much XP gets you to level 1 *exactly*?
              pass


          # TODO: Add a third test from scratch named  def test_max_level_cap():
          # Level 100 is the famous JRPG max. What XP gets you there exactly?
          # Why is 100 worth its own test?


          if __name__ == "__main__":
              pytest.main(["-v"])
        language: "python"

      - path: "test_oracle_drill.py"
        content: |
          """Fill-in-the-Oracle drill — write the STRONGEST assertion possible.

          Arrange and Act are done for you. Replace the weak oracle below each
          `result = ...` line with the strongest possible assertion on `result`.
          """
          import pytest
          from leveling import xp_to_level


          def test_oracle_weak_example():
              # Arrange + Act
              result = xp_to_level(0)
              # Weak oracle (provided as a bad example):
              assert result is not None   # passes for almost any return value


          def test_oracle_strong_starter():
              # Arrange + Act
              result = xp_to_level(0)
              # TODO: replace this weak oracle with the strongest possible assertion.
              assert isinstance(result, int)


          def test_oracle_strong_max():
              # Arrange + Act
              result = xp_to_level(10000)
              # TODO: replace this weak oracle with the strongest possible assertion.
              assert isinstance(result, int)


          if __name__ == "__main__":
              pytest.main(["-v"])
        language: "python"

    open_file: "test_leveling.py"
    run_file: "test_leveling.py"

    solution:
      files:
        - path: "test_leveling.py"
          content: |
            """Tests for the leveling module."""
            import pytest
            from leveling import xp_to_level, level_to_min_xp


            def test_starter_with_zero_xp():
                assert xp_to_level(0) == 0


            def test_first_level_up():
                assert xp_to_level(100) == 1


            def test_max_level_cap():
                assert xp_to_level(10000) == 100


            if __name__ == "__main__":
                pytest.main(["-v"])
          language: "python"
        - path: "test_oracle_drill.py"
          content: |
            """Fill-in-the-Oracle drill — solved."""
            import pytest
            from leveling import xp_to_level


            def test_oracle_weak_example():
                result = xp_to_level(0)
                assert result is not None


            def test_oracle_strong_starter():
                result = xp_to_level(0)
                assert result == 0


            def test_oracle_strong_max():
                result = xp_to_level(10000)
                assert result == 100


            if __name__ == "__main__":
                pytest.main(["-v"])
          language: "python"
      explanation: |
        Replace the weak `isinstance` check with a strong equality oracle: `result == 0`
        for the starter case and `result == 100` for the max-level case. The strong oracle
        would fail if the function returned any wrong number, not just the wrong type.

    tests:
      - description: "test_leveling.py runs without errors"
        command: |
          output = __run_capture('/tutorial/test_leveling.py')
      - description: "test_starter_with_zero_xp has a real assertion (not just pass)"
        command: |
          source = open('/tutorial/test_leveling.py').read()
          body = source.split('test_starter_with_zero_xp')[1].split('def ')[0]
          assert 'assert' in body, \
              "test_starter_with_zero_xp still has 'pass'. A test with no assertion can never fail — meaning it can never catch a bug. Replace 'pass' with: assert xp_to_level(0) == 0"
      - description: "test_first_level_up has a real assertion"
        command: |
          source = open('/tutorial/test_leveling.py').read()
          body = source.split('test_first_level_up')[1].split('def ')[0]
          assert 'assert' in body, \
              "test_first_level_up still has 'pass'. The spec says every 100 XP is one level — what input gets you to level 1?"
      - description: "test_max_level_cap function exists"
        command: |
          source = open('/tutorial/test_leveling.py').read()
          assert 'def test_max_level_cap' in source, \
