    solution:
      files:
        - path: "test_brittle_audit.py"
          content: |
            """AUDIT: Fixed brittle tests — behavior not implementation."""
            import pytest
            from playlist import PlaylistQueue


            def test_add_track_updates_count():
                queue = PlaylistQueue()
                queue.add("Espresso", 175)
                assert queue.track_count() == 1


            def test_add_track_via_public_api():
                queue = PlaylistQueue()
                queue.add("Espresso", 175)
                assert "Espresso" in queue.titles()
                assert queue.durations()[0] == 175


            def test_total_duration_sums_track_lengths():
                queue = PlaylistQueue()
                queue.add("Espresso", 175)
                queue.add("Vampire", 218)
                assert queue.total_duration == 393


            def test_track_count_via_public_api():
                queue = PlaylistQueue()
                queue.add("Espresso", 175)
                queue.add("Vampire", 218)
                assert queue.track_count() == 2
          language: "python"
      explanation: |
        Replace direct `._tracks` access with public API calls (titles(), durations(),
        track_count()). The duration assertion still holds — but now via durations()[0]
        instead of _tracks[0].duration_seconds, so the rename experiment leaves it
        green. Robust tests verify what the class DOES (its observable behavior via
        the public API), not HOW it stores state internally.

