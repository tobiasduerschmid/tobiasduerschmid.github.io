title: "Testing Foundations with pytest"
description: "Build the core testing skills you need BEFORE learning TDD: write meaningful assertions, choose test cases using partitions and boundaries, and test behavior instead of implementation."

backend: pyodide

# Show code (left) and tests (right) side by side — students can toggle back
# to tabbed view with the button above the editors. Files prefixed `test_`
# route to the right pane automatically; everything else lands on the left.
editor_split: true

# Keep the output panel compact — most interaction happens in the editors,
# and students only need a short strip to skim pytest's pass/fail summary.
output_height: "25%"

require_tests: true
autosave_type: files

# Global setup: install pytest, add /tutorial to sys.path, patch module cache
setup_commands:
  - "import pyodide_js; await pyodide_js.loadPackage('pytest')"
  - "import sys; sys.path.insert(0, '/tutorial')"
  - |
    import pytest as _pytest, sys as _sys
    def _make_pytest_patch():
        _orig = _pytest.main
        _sysmod = _sys
        def _patched(*a, **kw):
            for m in list(_sysmod.modules):
                if m.startswith('test_') or m in ('grades','temperature','username','shopping_cart'):
                    del _sysmod.modules[m]
            return _orig(*a, **kw)
        return _patched
    _pytest.main = _make_pytest_patch()

steps:

  # --------------------------------------------------------------------------
  # STEP 1 — Why Test? The Bug That Got Away
  # Pedagogy:
  #   Generation Effect   — predict the bug before running.
  #   Growth Mindset      — normalize errors and debugging.
  #   Ratchet metaphor    — tests lock in progress.
  #   Forward-pointer     — grade bug IS a boundary bug (covered in Step 3).
  #   Bloom's level       — Remember / Understand / Analyze (quiz).
  # --------------------------------------------------------------------------
  - title: "Why Test? The Bug That Got Away"
    instructions: |
      > 📣 **The kind of bug that ships.** Imagine a grade calculator that silently gives a `B` to anyone scoring *exactly* `90`. One missing `=` sign — and a student who earned an `A` doesn't get one. The bug runs cleanly, prints no error, and lurks until someone notices. *That* is what tests prevent.

      > 🎯 **Goal:** Find that bug in `calculate_grade`, fix it, and lock the fix in with `assert` so it can never sneak back.

      > 🧭 **Heads-up — a shift coming.** By the end of this tutorial you'll think about tests differently than most beginners do: not as *"checking your homework"* but as *executable specifications of behavior*. Notice the shift as it happens.

      ### 💡 Why test?

      Many students think testing is about **finding bugs after you write code**. That's half the story. Tests also:

      - **Specify behavior** — a test says *"this function should do X"*
      - **Prevent regressions** — once a bug is fixed, a test ensures it never returns
      - **Enable fearless refactoring** — change code confidently because tests catch breakage

      Think of tests as a **ratchet**: once a test passes, your progress is locked in. You can never accidentally slip backward.

      ### 📖 Vocabulary you'll meet across this tutorial

      | Term | Meaning |
      |---|---|
      | **Oracle** | the assertion that decides pass vs fail |
      | **Boundary** | the exact value where behavior changes (e.g., `90` between B and A) |
      | **Partition** | a set of inputs that should all behave the same |
      | **Brittle test** | breaks when *implementation* changes (bad) |
      | **Robust test** | only breaks when *behavior* changes (good) |
      | **Regression** | a bug that comes back after being fixed |

      ### 🔍 Predict first

      Don't run yet. Read `grades.py`. What will `calculate_grade(90)` return? What about `calculate_grade(85)`?

      ⚙️ **Task**:
      1. **Run** `grades.py`. Was your prediction right?
      2. **Add 3 `assert` statements** at the bottom of the file, one per line, verifying:
         - `calculate_grade(95)` returns `"A"`
         - `calculate_grade(85)` returns `"B"`
         - `calculate_grade(72)` returns `"C"`
      3. **Run again.** Your asserts should fail. That's a *win* 🎯 — your test just caught the bug.
      4. **Fix** `calculate_grade()` so all three asserts pass.

      An `assert` looks like this:

      ```python
      assert calculate_grade(95) == "A", "95 should be an A"
      ```

      If the condition is `True`, Python continues silently. If `False`, it raises an `AssertionError` with the message.

      🪞 **Calibrate yourself** (1 second, mental note): On a scale of 1–10, how confident are you right now that you could *design a test suite from scratch* for an unfamiliar function? Remember the number — you'll re-check at the end.

      <details markdown="1"><summary>🎯 Why this bug matters (read after solving)</summary>

      The bug lives at *exactly* `90` — the line between a B and an A. That's no coincidence. Bugs love **boundaries** (the values where behavior changes). You'll hunt them systematically in **Step 3**.
      </details>

    files:
      - path: "grades.py"
        content: |
          def calculate_grade(score):
              """Convert a numeric score (0-100) to a letter grade."""
              if score > 90:
                  return "A"
              if score >= 80:
                  return "B"
              if score >= 70:
                  return "C"
              if score >= 60:
                  return "D"
              return "F"


          if __name__ == "__main__":
              # Try it out — predict the output before running!
              print("grade(95) =", calculate_grade(95))
              print("grade(85) =", calculate_grade(85))
              print("grade(90) =", calculate_grade(90))
              print("grade(45) =", calculate_grade(45))

              # TODO: Add three assert statements below to verify:
              #   calculate_grade(95) == "A"
              #   calculate_grade(85) == "B"
              #   calculate_grade(72) == "C"
        language: "python"

    open_file: "grades.py"
    run_file: "grades.py"

    solution:
      files:
        - path: "grades.py"
          content: |
            def calculate_grade(score):
                """Convert a numeric score (0-100) to a letter grade."""
                if score >= 90:
                    return "A"
                if score >= 80:
                    return "B"
                if score >= 70:
                    return "C"
                if score >= 60:
                    return "D"
                return "F"


            if __name__ == "__main__":
                print("grade(95) =", calculate_grade(95))
                print("grade(85) =", calculate_grade(85))
                print("grade(90) =", calculate_grade(90))
                print("grade(45) =", calculate_grade(45))

                assert calculate_grade(95) == "A"
                assert calculate_grade(85) == "B"
                assert calculate_grade(72) == "C"
          language: "python"
      explanation: |
        The bug is `score > 90` which excludes 90 itself. Change it to `score >= 90`.
        Then add three assert statements to lock in the fix.

    tests:
      - description: "Script runs without errors"
        command: |
          output = __run_capture('/tutorial/grades.py')
      - description: "Contains assert: calculate_grade(95) == 'A'"
        command: |
          import re
          source = open('/tutorial/grades.py').read()
          pattern = r'assert\s+calculate_grade\s*\(\s*95\s*\)\s*==\s*[\'"][Aa][\'"]'
          assert re.search(pattern, source), \
              "Add: assert calculate_grade(95) == \"A\". This is the *strong oracle* — it pins the exact expected return. A weaker form like `assert calculate_grade(95)` would pass for any truthy return."
      - description: "Contains assert: calculate_grade(85) == 'B'"
        command: |
          import re
          source = open('/tutorial/grades.py').read()
          pattern = r'assert\s+calculate_grade\s*\(\s*85\s*\)\s*==\s*[\'"][Bb][\'"]'
          assert re.search(pattern, source), \
              "Add: assert calculate_grade(85) == \"B\". Same shape as the previous assert — pin the exact expected value."
      - description: "Contains assert: calculate_grade(72) == 'C'"
        command: |
          import re
          source = open('/tutorial/grades.py').read()
          pattern = r'assert\s+calculate_grade\s*\(\s*72\s*\)\s*==\s*[\'"][Cc][\'"]'
          assert re.search(pattern, source), \
              "Add: assert calculate_grade(72) == \"C\". Three asserts total — one per grade letter you're verifying."
      - description: "All assertions pass (function is correct)"
        command: |
          output = __run_capture('/tutorial/grades.py')
          assert 'AssertionError' not in output and 'Error' not in output, \
              f"AssertionError raised — your test is doing its job and *catching the bug* (this is a win, not a failure). Now go fix `calculate_grade`: change `score > 90` on line 3 to `score >= 90`, then re-run.\n\nFull output:\n{output}"
        hints:
          - title: "Small nudge"
            text: "Look at the comparison operators on each `if`. What happens at *exactly* `90`?"
          - title: "Strategic hint"
            text: "Trace `calculate_grade(90)` by hand. Which `if` branch does it enter, and which one *should* it enter?"
          - title: "Spoiler — full fix"
            text: "Change `score > 90` to `score >= 90` on line 3. The bug excluded `90` itself from grade A."

    quiz:
      title: "Why Test? — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            A teammate says: *"I only write tests after I finish all my code, to check for bugs."*

            What is the main limitation of this approach?
          type: single
          options:
            - "There is no real limitation — writing tests after code is the industry standard, and the test suite ends up identical either way since you cover the same behaviors"
            - "Post-hoc tests verify what you *think* the code does, not what it *should* do. They also can't guide your design during development"
            - "Writing tests afterward is fine as long as you achieve 100% coverage, which ensures all behavior is verified"
            - "The main problem is that it takes slightly longer because you have to context-switch back to code you already wrote"
          correct_index: 1
          explanation: |
            Post-hoc tests verify *your implementation* rather than *intended behavior*.
            They also cannot serve as a safety net during development because they don't exist yet.

        - question: |
            What does this code do?
            ```python
            assert len(result) == 3, "Expected 3 items"
            ```
          type: single
          options:
            - "It prints 'Expected 3 items' to the console, then continues execution normally"
            - "It checks that `result` has 3 elements; if not, it raises an `AssertionError` with the message"
            - "It creates a new list called `result` and populates it with exactly 3 items"
            - "It evaluates the condition but silently continues even if the condition is `False`"
          correct_index: 1
          explanation: |
            `assert condition, message` evaluates the condition. If `True`, nothing happens and
            execution continues. If `False`, Python raises an `AssertionError` with the message.

        - question: |
            Which of the following is **not** a benefit of automated tests?
          type: single
          options:
            - "They prevent regressions — bugs that were fixed from coming back"
            - "They enable fearless refactoring by catching breakage immediately"
            - "They guarantee your code has zero bugs"
            - "They specify expected behavior as executable documentation"
          correct_index: 2
          explanation: |
            Tests **reduce** bugs and catch **regressions**, but they cannot guarantee zero bugs.
            Dijkstra famously said: "Testing can show the presence of bugs, but never their absence."

        - question: |
            The "ratchet metaphor" for testing means:
          type: single
          options:
            - "Tests should be run frequently and automatically, like a ratchet clicking on every code change"
            - "Once a test passes, it locks in that progress — you can never accidentally slip backward on that behavior"
            - "You should ratchet up test coverage incrementally, aiming for 100% before each release"
            - "Tests should be written in a strict mechanical order: unit tests first, then integration, then end-to-end"
          correct_index: 1
          explanation: |
            The ratchet metaphor (from Harry Percival's "Obey the Testing Goat") captures the key
            psychological benefit of testing: each passing test is a permanent checkpoint.


  # --------------------------------------------------------------------------
  # STEP 2 — Your First pytest Test + Oracle Strength
  # Pedagogy:
  #   Guide-and-Release     — explain conventions, then immediate hands-on.
  #   Variation Theory      — weak / medium / strong oracles held against the
  #                           same function to make "assertion strength" discernible.
  #   Fill-in-the-Oracle    — Arrange+Act given; student writes only Assert.
  #   Bloom's level         — Remember / Apply / Analyze.
  # --------------------------------------------------------------------------
  - title: "Your First pytest Test"
    instructions: |
      > 🎯 **Goal:** Write pytest tests, and learn to spot a *weak oracle* — an assertion that passes even when the code is wrong.

      🔍 **Read first** (don't write yet). Open `test_temperature.py`. For each test stub, predict in your head: *what behavior is this test claiming?* Run it once to see pytest's output format.

      ⚙️ **Task 1 — write the assertions** (file: `test_temperature.py`):

      A pytest test is just a function whose name starts with `test_`, containing a plain `assert`. Like this:

      ```python
      def test_freezing_point():
          assert celsius_to_fahrenheit(0) == 32.0
      ```

      Now you do it:
      1. Fill in `test_freezing_point` — assert `celsius_to_fahrenheit(0) == 32.0`
      2. Fill in `test_boiling_point` — assert `celsius_to_fahrenheit(100) == 212.0`
      3. Write `test_negative_forty` from scratch — assert `celsius_to_fahrenheit(-40) == -40.0` *(the unique crossover where °C = °F)*

      **pytest convention**: both the **file name** and **function names** must start with `test_`.

      ### 💡 Oracle strength — the central idea of Task 2

      The **oracle** is the assertion that decides pass/fail. The same function call can be checked with a *weak*, *medium*, or *strong* oracle — and weakness is invisible until a bug slips through:

      | Strength | Assertion | What breaks it? |
      |---|---|---|
      | **Weak** | `assert result is not None` | Almost nothing — `42`, `"hi"`, `32.0` all pass |
      | **Medium** | `assert isinstance(result, float)` | Type errors only — wrong numbers slip through |
      | **Strong** | `assert result == 32.0` | *Any* incorrect value |

      Weak oracles look productive but verify nothing. Rushed students and AI assistants default to them because they almost always succeed — the *Liar test* anti-pattern.

      ⚙️ **Task 2 — make the oracle strong** (file: `test_oracle_drill.py`):

      Each test has `result = celsius_to_fahrenheit(...)` already done. Replace the **weak** `assert isinstance(result, float)` with the **strongest** possible assertion (one that fails for *any* wrong value).

      💬 **Articulate it**: Before fixing each weak oracle, add a Python comment above explaining *what bug the weak version would miss*. Writing this out beats just thinking it.

      <details markdown="1"><summary>📖 Test names ARE documentation</summary>

      Notice that good test names *describe the behavior they verify*: `test_freezing_point`, `test_negative_forty`, `test_oracle_strong_boil`. A failing test should read like a one-line bug report: *"freezing_point FAILED — assert 31.0 == 32.0"*. If you can read your test names without opening the code and still know what the suite covers, your tests double as documentation.

      Anti-example: `test_1`, `test_temp`, `test_works`. These tell the next reader nothing.
      </details>

      <details markdown="1"><summary>📖 Why pytest beats raw `assert`</summary>

      Raw `assert` halts at the first failure; you only learn about one bug at a time. pytest discovers all tests, runs them all, names each one, and shows the *exact* mismatched value when one fails — e.g. `assert 4 == 5  where 4 = func(3)`.

      No classes, no boilerplate — just functions starting with `test_`.
      </details>


    files:
      - path: "temperature.py"
        content: |
          """Temperature conversion utilities."""


          def celsius_to_fahrenheit(celsius):
              """Convert Celsius to Fahrenheit."""
              return celsius * 9 / 5 + 32


          def fahrenheit_to_celsius(fahrenheit):
              """Convert Fahrenheit to Celsius."""
              return (fahrenheit - 32) * 5 / 9
        language: "python"

      - path: "test_temperature.py"
        content: |
          """Tests for the temperature module."""
          import pytest
          from temperature import celsius_to_fahrenheit, fahrenheit_to_celsius


          def test_freezing_point():
              # TODO: assert that celsius_to_fahrenheit(0) returns 32.0
              pass


          def test_boiling_point():
              # TODO: assert that celsius_to_fahrenheit(100) returns 212.0
              pass


          # TODO: Write a test_negative_forty function from scratch.
          # Assert that celsius_to_fahrenheit(-40) returns -40.0


          if __name__ == "__main__":
              pytest.main(["-v"])
        language: "python"

      - path: "test_oracle_drill.py"
        content: |
          """Fill-in-the-Oracle drill — write the STRONGEST assertion possible.

          Arrange and Act are done for you. Replace the weak oracle below each
          `result = ...` line with the strongest possible assertion on `result`.
          """
          import pytest
          from temperature import celsius_to_fahrenheit


          def test_oracle_weak_example():
              # Arrange + Act
              result = celsius_to_fahrenheit(0)
              # Weak oracle (provided as a bad example):
              assert result is not None   # passes for almost any return value


          def test_oracle_strong_freeze():
              # Arrange + Act
              result = celsius_to_fahrenheit(0)
              # TODO: replace this weak oracle with the strongest possible assertion.
              assert isinstance(result, float)


          def test_oracle_strong_boil():
              # Arrange + Act
              result = celsius_to_fahrenheit(100)
              # TODO: replace this weak oracle with the strongest possible assertion.
              assert isinstance(result, float)


          if __name__ == "__main__":
              pytest.main(["-v"])
        language: "python"

    open_file: "test_temperature.py"
    run_file: "test_temperature.py"

    solution:
      files:
        - path: "test_temperature.py"
          content: |
            """Tests for the temperature module."""
            import pytest
            from temperature import celsius_to_fahrenheit, fahrenheit_to_celsius


            def test_freezing_point():
                assert celsius_to_fahrenheit(0) == 32.0


            def test_boiling_point():
                assert celsius_to_fahrenheit(100) == 212.0


            def test_negative_forty():
                assert celsius_to_fahrenheit(-40) == -40.0


            if __name__ == "__main__":
                pytest.main(["-v"])
          language: "python"
        - path: "test_oracle_drill.py"
          content: |
            """Fill-in-the-Oracle drill — solved."""
            import pytest
            from temperature import celsius_to_fahrenheit


            def test_oracle_weak_example():
                result = celsius_to_fahrenheit(0)
                assert result is not None


            def test_oracle_strong_freeze():
                result = celsius_to_fahrenheit(0)
                assert result == 32.0


            def test_oracle_strong_boil():
                result = celsius_to_fahrenheit(100)
                assert result == 212.0


            if __name__ == "__main__":
                pytest.main(["-v"])
          language: "python"
      explanation: |
        Replace the weak `isinstance` check with a strong equality oracle: `result == 32.0`
        for freezing and `result == 212.0` for boiling. The strong oracle would fail if the
        function returned any wrong value, not just the wrong type.

    tests:
      - description: "test_temperature.py runs without errors"
        command: |
          output = __run_capture('/tutorial/test_temperature.py')
      - description: "test_freezing_point has a real assertion (not just pass)"
        command: |
          source = open('/tutorial/test_temperature.py').read()
          body = source.split('test_freezing_point')[1].split('def ')[0]
          assert 'assert' in body, \
              "test_freezing_point still has 'pass'. A test with no assertion can never fail — meaning it can never catch a bug. Replace 'pass' with: assert celsius_to_fahrenheit(0) == 32.0"
      - description: "test_boiling_point has a real assertion"
        command: |
          source = open('/tutorial/test_temperature.py').read()
          body = source.split('test_boiling_point')[1].split('def ')[0]
          assert 'assert' in body, \
              "test_boiling_point still has 'pass'. Replace it with: assert celsius_to_fahrenheit(100) == 212.0"
      - description: "test_negative_forty function exists"
        command: |
          source = open('/tutorial/test_temperature.py').read()
          assert 'def test_negative_forty' in source, \
              "Write a new function `def test_negative_forty():` — it tests the unique crossover point where °C == °F. Hint: the expected value is -40.0."
      - description: "All temperature tests pass"
        command: |
          import pytest, io, sys
          old = sys.stdout; sys.stdout = buf = io.StringIO()
          code = pytest.main(['/tutorial/test_temperature.py', '-v', '--tb=short', '--no-header'])
          sys.stdout = old; output = buf.getvalue(); print(output)
          assert code == 0, f"Some temperature tests failed:\n{output}"
        hints:
          - title: "Small nudge"
            text: "Inside each test function, write `assert <function call> == <expected value>`. The function is `celsius_to_fahrenheit`."
          - title: "Strategic hint"
            text: "Mirror this pattern:\n```python\ndef test_freezing_point():\n    assert celsius_to_fahrenheit(0) == 32.0\n```\n`test_negative_forty` needs a `def` line too."
          - title: "Spoiler — full answer"
            text: "All three: `assert celsius_to_fahrenheit(0) == 32.0`, `assert celsius_to_fahrenheit(100) == 212.0`, `assert celsius_to_fahrenheit(-40) == -40.0`."
      - description: "Oracle drill — strong freeze oracle replaces the weak isinstance check"
        command: |
          source = open('/tutorial/test_oracle_drill.py').read()
          freeze_body = source.split('test_oracle_strong_freeze')[1].split('def ')[0]
          assert '32' in freeze_body and 'isinstance' not in freeze_body, \
              "test_oracle_strong_freeze should assert equality with 32.0, not just isinstance"
      - description: "Oracle drill — strong boil oracle replaces the weak isinstance check"
        command: |
          source = open('/tutorial/test_oracle_drill.py').read()
          boil_body = source.split('test_oracle_strong_boil')[1].split('def ')[0]
          assert '212' in boil_body and 'isinstance' not in boil_body, \
              "test_oracle_strong_boil should assert equality with 212.0, not just isinstance"
      - description: "Oracle drill tests all pass"
        command: |
          import pytest, io, sys
          old = sys.stdout; sys.stdout = buf = io.StringIO()
          code = pytest.main(['/tutorial/test_oracle_drill.py', '-v', '--tb=short', '--no-header'])
          sys.stdout = old; output = buf.getvalue(); print(output)
          assert code == 0, f"Oracle drill tests failed:\n{output}"
        hints:
          - title: "Strong-oracle nudge"
            text: "A *strong* oracle pins the result to one exact value. `isinstance(result, float)` accepts any float — what does it *not* check?"
          - title: "Spoiler — full answer"
            text: "Replace `assert isinstance(result, float)` with `assert result == 32.0` (freeze) and `assert result == 212.0` (boil)."

    quiz:
      title: "pytest Basics — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            Which file name will pytest **automatically discover** as a test file?
          type: single
          options:
            - "`testing_temperature.py`"
            - "`test_temperature.py`"
            - "`check_temperature.py`"
            - "`temperature_tests.py`"
          correct_index: 1
          explanation: |
            pytest discovers files whose names start with `test_` or end with `_test.py`.
            Functions inside must also start with `test_`.

        - question: |
            What does this pytest output mean?
            ```
            test_math.py::test_addition PASSED
            test_math.py::test_division FAILED
            ```
          type: single
          options:
            - "Both tests ran and produced output, but only `test_addition` returned the value pytest expected as a success signal"
            - "The assertions in `test_addition` all held; at least one assertion in `test_division` did not"
            - "The test file has a syntax error in `test_division` that prevented it from being collected by the test runner"
            - "`test_division` was skipped because it depends on `test_addition` completing first and pytest enforces execution order"
          correct_index: 1
          explanation: |
            PASSED means the assertions in that test function all held. FAILED means at least
            one assertion in `test_division` was `False`. pytest will show the exact line and
            values that caused the failure.

        - question: |
            Two tests check the same function. Which assertion is **strongest** (most likely to catch a bug)?

            **A.**
            ```python
            def test_add_a():
                result = add(2, 3)
                assert isinstance(result, int)
            ```

            **B.**
            ```python
            def test_add_b():
                result = add(2, 3)
                assert result == 5
            ```
          type: single
          options:
            - "A — it checks the return type, which catches the widest possible category of bugs"
            - "B — it checks the exact expected value, failing for any wrong answer. A passes even if `add` returns 42"
            - "Both are equally strong — both are `True` for a correctly-implemented `add`"
            - "Neither — strong oracles always require multiple assertions, not just one"
          correct_index: 1
          explanation: |
            A is a **weak oracle**: `add(2, 3)` returning `0`, `42`, or `5` all pass. B is a
            **strong oracle**: only `5` satisfies it. Weak oracles look green but verify
            nothing — the *Liar test* anti-pattern.

        - question: |
            **(Spaced review — Step 1)** A developer finishes a feature and deletes the tests because "the feature is done and working." What principle does this violate?
          type: single
          options:
            - "The DRY principle — tests duplicate the code's logic unnecessarily"
            - "The ratchet principle — passing tests are permanent safety nets that prevent regression, not disposable scaffolding"
            - "The YAGNI principle — tests are speculative code that may not be needed"
            - "No principle — deleting tests after a feature ships is standard practice"
          correct_index: 1
          explanation: |
            The ratchet metaphor means tests lock in progress permanently. Deleting passing
            tests removes the safety net: if someone later modifies the code and introduces
            a regression, there is no test to catch it.


  # --------------------------------------------------------------------------
  # STEP 3 — Choosing What to Test: Partitions & Boundaries
  # Pedagogy:
  #   Black-box thinking  — derive tests from spec, not implementation.
  #   Callback to Step 1  — the grade bug WAS a boundary bug (retrieval).
  #   Variation Theory    — partition structure held constant, boundaries vary.
  #   Worked example      — two tests given (happy + boundary-just-below).
  #   Faded scaffold      — student writes 4 more boundary tests.
  #   Bloom's level       — Understand / Apply / Analyze (quiz).
  # --------------------------------------------------------------------------
  - title: "Choosing What to Test: Partitions & Boundaries"
    instructions: |
      > 🎯 **Goal:** Stop guessing inputs. Choose a small set that systematically catches off-by-one bugs.

      💡 **The principle**: an **equivalence partition** is a set of inputs that should behave the same. **Boundaries** are the values where partitions meet — and where most bugs live (remember the `> 90` vs `>= 90` bug from Step 1).

      For `validate_username` with rule `3 ≤ len ≤ 12`, the **4 boundary points** sit *exactly* where partitions transition:

      ```mermaid
      flowchart LR
          L2["len 2<br/>❌ reject"]:::bad
          L3["len 3<br/>✅ accept"]:::good
          Mid["...middle of valid<br/>partition..."]:::neutral
          L12["len 12<br/>✅ accept"]:::good
          L13["len 13<br/>❌ reject"]:::bad
          L2 --> L3 --> Mid --> L12 --> L13
          classDef good fill:#e8f5e9,stroke:#2e7d32,color:#1b5e20
          classDef bad fill:#ffebee,stroke:#c62828,color:#b71c1c
          classDef neutral fill:#fafafa,stroke:#bdbdbd,color:#757575
      ```

      Notice how the 4 critical tests pin down both transitions; the *middle* of the valid partition isn't covered by these — and doesn't need to be (one representative is enough there). Why this works:

      | Length | Expected | What this catches |
      |---|---|---|
      | **2** | reject | A `< 3` written as `<= 3` (off-by-one below) |
      | **3** | accept | A `<= 3` written as `< 3` |
      | **12** | accept | A `<= 12` written as `< 12` |
      | **13** | reject | A `< 13` written as `<= 13` (off-by-one above) |

      ⚙️ **Task** (`test_username.py`): Two worked tests are provided.

      💬 **Self-explain first** (do this *before* writing): Read the two provided tests carefully. *Why* does the first one assert `is True` and the second `is False`? *Why* did the author pick length `5` for "valid representative" and `2` for "just below min"? Articulating the design choices primes you to make your own.

      Now **write four more**, one per remaining boundary:

      - `test_boundary_min_valid` — length 3 is accepted
      - `test_boundary_max_valid` — length 12 is accepted
      - `test_too_long_just_above_max` — length 13 is rejected
      - `test_empty_string` — length 0 is rejected

      🔁 **Interleaved recall** (don't skip): Before writing your tests, recall from **Step 2**: what makes an oracle *strong*? Apply it here — `assert validate_username("abc") is True` is strong, `assert validate_username("abc")` (no comparison) is weak.

      <details markdown="1"><summary>📖 Equivalence partitioning — the deeper "why"</summary>

      The input space splits into three regions, each with the **same expected behavior**:

      ```mermaid
      flowchart LR
          A["<b>too short</b><br/>len 0, 1, 2<br/>↦ reject"]:::bad
          B["<b>valid</b><br/>len 3 ... 12<br/>↦ accept"]:::good
          C["<b>too long</b><br/>len 13+<br/>↦ reject"]:::bad
          A --- B --- C
          classDef good fill:#e8f5e9,stroke:#2e7d32,color:#1b5e20
          classDef bad fill:#ffebee,stroke:#c62828,color:#b71c1c
      ```

      If `"a"` (length 1) is rejected, `"ab"` (length 2) probably is too — same partition, same expected behavior. So **one representative per partition** is enough for the *middle* of the partition. Spend your test budget on the **boundaries** instead — that's where `> 12` vs `>= 12` bugs hide.

      **Heuristic for any range `[min, max]`**:
      1. *Partition* the input space.
      2. *Pick one representative* per partition.
      3. *Test every boundary* — last invalid before each transition, first valid after.
      </details>


