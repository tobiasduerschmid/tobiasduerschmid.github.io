        content: |
          def apply_discount(price, member_status):
              """Apply a member discount.

              platinum -> 10% off
              gold     -> 5% off
              other    -> no discount
              """
              if member_status == "platinum":
                  return price * 0.90
              if member_status == "gold":
                  return price * 0.95
              return price
