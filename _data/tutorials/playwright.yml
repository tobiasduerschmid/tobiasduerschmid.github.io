      - path: "tests/all-done.spec.js"
        language: "javascript"
        content: |
          import { test, expect } from '@playwright/test';

          // ─────────────────────────────────────────────────────────────
          // From-scratch capstone. Two tests, both written by you, both
          // following the spec at the top of the step. No TODOs, no stubs.
          //
          // Spec recap (write this as a comment block before each test):
          //   Promise: marking all todos done makes the count read 0,
          //            and all items remain visible.
          //   Path 1:  add 3 todos, mark all 3 done, expect count = 0
          //            and 3 listitems still visible.
          //   Path 2:  add 2 todos, mark both done, unmark one,
          //            expect count = 1, both listitems visible.
          // ─────────────────────────────────────────────────────────────

    open_file: "tests/all-done.spec.js"

    solution:
      files:
        - path: "tests/all-done.spec.js"
          language: "javascript"
          content: |
            import { test, expect } from '@playwright/test';

            test('marking every todo done shows count 0 and keeps all items visible', async ({ page }) => {
              await page.goto('/');

              for (const t of ['Milk', 'Bread', 'Eggs']) {
                await page.getByRole('textbox', { name: /todo item/i }).fill(t);
                await page.getByRole('button', { name: /add todo/i }).click();
              }

              for (const t of ['Milk', 'Bread', 'Eggs']) {
                await page.getByRole('button', { name: t }).click();
              }

              await expect(page.getByRole('status')).toContainText('0');
              await expect(page.getByRole('listitem')).toHaveCount(3);
            });

            test('unmarking one todo restores the count to 1, both items still visible', async ({ page }) => {
              await page.goto('/');

              for (const t of ['Milk', 'Bread']) {
                await page.getByRole('textbox', { name: /todo item/i }).fill(t);
                await page.getByRole('button', { name: /add todo/i }).click();
              }

              const milkToggle = page.getByRole('button', { name: 'Milk' });
              const breadToggle = page.getByRole('button', { name: 'Bread' });

              await milkToggle.click();
              await breadToggle.click();
              await milkToggle.click();   // un-mark Milk

              await expect(page.getByRole('status')).toContainText('1');
              await expect(page.getByRole('listitem')).toHaveCount(2);
              await expect(milkToggle).toHaveAttribute('aria-pressed', 'false');
              await expect(breadToggle).toHaveAttribute('aria-pressed', 'true');
            });
      explanation: |
        Two tests, two promises, no scaffolding. Notice every choice the Spec Card forced you to commit to: semantic locators (`getByRole` everywhere), per-promise specificity (`toContainText('0')` for the count — the *number* is the contract, the wording around it isn't; `toHaveCount` for "items still in the list" — exact count IS the contract), and the use of `aria-pressed` to verify the toggle state semantically rather than via `.todo-done` class.

        If you wrote a test that pins the count to the literal string `"0 items remaining"`, your test passes today but breaks when product changes the wording to "Nothing left to do" — over-specified. If you wrote `toBeVisible()` on the listitems instead of `toHaveCount(3)`, your test passes when 3 items become 1 — under-specified. The Spec Card was the tool that made each of those choices visible *before* you typed.

    tests:
      - description: "tests/all-done.spec.js exists and has the import line"
        command: |
          const spec = files['tests/all-done.spec.js'] || '';
          assert(/import\s*\{\s*test\s*,\s*expect\s*\}\s+from\s+['"]@playwright\/test['"]/.test(spec),
            'tests/all-done.spec.js needs the import line: `import { test, expect } from \'@playwright/test\';`. Don\\'t delete the existing one.');

      - description: "You wrote two tests from scratch — neither name overlaps with the Step 7 fixtures"
        command: |
          const spec = files['tests/all-done.spec.js'] || '';
          // Count test('...') invocations
          const matches = spec.match(/^\s*test\s*\(\s*['"]/gm) || [];
          assert(matches.length >= 2,
            'Write at least two tests in tests/all-done.spec.js (one per user path in the spec). Got ' + matches.length + '.');

      - description: "Every test in your file uses semantic locators (`getByRole`, `getByLabel`, or `getByText`) — no CSS-class locators"
        command: |
          const spec = files['tests/all-done.spec.js'] || '';
          assert(/getByRole|getByLabel|getByText/.test(spec),
            'Use semantic locators (getByRole / getByLabel / getByText). The whole tutorial built toward this — falling back to CSS-class locators here defeats the purpose.');
          // Reject CSS-class locators in the from-scratch tests.
          if (/\.locator\s*\(\s*['"]\./.test(spec) && !/\.locator\s*\(\s*['"]:/.test(spec)) {
            throw new Error('Found a CSS-class locator (`.locator(\".something\")`) in tests/all-done.spec.js. Step 5 covered why those are brittle. Use getByRole instead.');
          }

      - description: "Every assertion uses the web-first `await expect(...)` form (no synchronous expect-await-isVisible)"
        command: |
          const spec = files['tests/all-done.spec.js'] || '';
          assert(/await\s+expect\s*\(/.test(spec),
            'Every assertion should be `await expect(locator).toX(...)`. The web-first form auto-waits and retries.');
          // Reject the canonical anti-pattern.
          if (/expect\s*\(\s*await\s+[^)]*\.isVisible\s*\(\s*\)\s*\)\s*\.toBe\s*\(/.test(spec)) {
            throw new Error('Anti-pattern: `expect(await x.isVisible()).toBe(true)`. That looks like Jest but runs once and races. Use `await expect(x).toBeVisible()`.');
          }

      - description: "Each test navigates the page (await page.goto) before interacting"
        command: |
          const spec = files['tests/all-done.spec.js'] || '';
          // Find each test block and assert it contains a goto.
          const tests = spec.split(/\btest\s*\(/).slice(1);
          tests.forEach((body, i) => {
            // Extract just this test's body (until the next 'test(' or end-of-file)
            assert(/await\s+page\.goto\s*\(/.test(body),
              `Test #${i + 1} doesn't call \`await page.goto(...)\`. Every Playwright test needs to navigate before interacting.`);
          });

      - description: "Each test contains at least one `await expect(...)` assertion"
        command: |
          const spec = files['tests/all-done.spec.js'] || '';
          const tests = spec.split(/\btest\s*\(/).slice(1);
          tests.forEach((body, i) => {
            assert(/await\s+expect\s*\(/.test(body),
              `Test #${i + 1} has no await-expect assertion. A test that asserts nothing proves nothing.`);
          });

      - description: "Both tests pass against the live app"
        playwright:
          enabled: true
          test_files:
            - "tests/all-done.spec.js"
        hints:
          - title: "Layer 1 — orientation"
            text: "If your tests fail, run them and read the actual failure. Don't guess. Compare the failure to your prediction (you wrote one in the Spec Card, right?). The gap is the lesson."
          - title: "Layer 2 — strategy"
            text: "Most likely failure: assertion specificity wrong. If `toHaveText('0 items remaining')` failed because the count is `0` and the actual rendered text is `0 items remaining` (with leading zero, etc.) — switch to `toContainText('0')`. The number is the contract; the surrounding wording isn't."
            condition: "output_contains: AssertionError"
          - title: "Layer 3 — locator skeleton"
            text: |
              Each toggle is a button whose accessible name is the todo's text:
              ```js
              const milkToggle = page.getByRole('button', { name: 'Milk' });
              await milkToggle.click();
              await expect(milkToggle).toHaveAttribute('aria-pressed', 'true');
              ```
              The status (`role="status"` in the JSX) gives you the count — query it with `page.getByRole('status')` and `toContainText`.
            condition: "code_missing: getByRole"

    quiz:
      title: "Step 8 — Knowledge Check"
      min_score: 0.8
      shuffle: false
      questions:

        - question: |
            You finished writing the tests from scratch. Looking back at the *full sequence* of this tutorial — Steps 1–7 building scaffolding, Step 8 removing it — which is the most accurate description of why the from-scratch step was necessary?
          type: single
          options:
            - "The from-scratch step is just for assessment — to grade whether you mastered the prior steps"
            - "Without writing a complete test from a blank file at least once, you never confront the *blank-file problem* — choosing where to start, what to assert, what locators to use — which is exactly the moment most engineers freeze in real work"
            - "It's a tradition in tutorials; not all of them include it"
            - "It's there to make the tutorial feel more like a real exam"
          correct_index: 1
          option_feedback:
            0: "Assessment is a side effect, not the main goal. The main goal is to *fill the gap between guided exercises and real-work performance* — which only the empty-file experience does."
            2: "It's not a tradition — it's a structural fix for the canonical \"Tutorial Hell\" problem (CS-tutorial-design literature). Many tutorials skip it; this one didn't, deliberately."
            3: "Exam vibes aren't the goal. The from-scratch step exists because the literature on programming pedagogy is unambiguous: students who only ever fill in TODOs in tutorials freeze when given a blank file at work."
          explanation: |
            The blank-file moment is the one most tutorials miss. By writing a complete test from a Spec Card alone — `import` to closing `});` — you've crossed the gap that scaffolded exercises can't cross for you. Everything you wrote is the same shape as the tests you'd write at work; the difference is, you wrote them yourself.

        - question: |
            What's the single most useful artifact you produced in this step?
          type: single
          options:
            - "The two passing tests"
            - "The Spec Card you filled in *before* writing the tests — that's the artifact you'll reuse on every test you write at work"
            - "The locator queries"
            - "The assertion patterns"
          correct_index: 1
          option_feedback:
            0: "The tests are the *output*. The Spec Card is the *method* that produced them. The output is one feature; the method scales to every feature you'll ever test."
            2: "Locator queries are tactics, not strategy. Without the Spec Card to drive *which* locator to use, you're guessing each time."
            3: "Assertion patterns are tactics. The Spec Card decides which assertion pattern fits which promise — that's the higher-order skill."
          explanation: |
            Tests are downstream of decisions. The Spec Card is the upstream artifact that made every decision visible *before* you typed. Carry the habit. On your first job's first PR, the difference between writing a brittle test and a robust one is whether you wrote the Spec Card before opening the test file.
