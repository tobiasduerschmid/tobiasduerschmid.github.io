    open_file: "tests/todo.spec.js"

    tests:
      - description: "The strengthened assertion catches the empty-text bug (the test now fails)"
        playwright:
          title: "adding a todo shows it in the list"
          should_fail: true

      - description: "Your test asserts the item's text content (not just the count)"
        command: |
          const spec = files['tests/todo.spec.js'] || '';
          assert(spec.includes('toHaveText') || spec.includes('toContainText'),
            'Use toHaveText or toContainText so your assertion verifies the rendered text — not just the count.');
          assert(spec.includes("'Milk'") || spec.includes('"Milk"') || spec.includes('Milk'),
            'Pin the actual user input (\"Milk\") in the assertion.');
        hints:
          - title: "Layer 1 — orientation"
            text: "The current assertion only counts list items — it would pass for an empty `<li></li>`. Strengthen it so the test verifies the *user-visible content*, not just structure."
          - title: "Layer 2 — strategy"
            text: "Chain a content-checking matcher onto the listitem locator. Two options: `toHaveText('Milk')` pins exact text; `toContainText('Milk')` pins a substring. Since the spec promises the user's input appears verbatim, exact match is fine."
            condition: "code_missing: toHaveText"
          - title: "Layer 3 — skeleton"
            text: |
              ```js
              await expect(page.getByRole('listitem')).toHaveText('Milk');
              ```
              Same locator as before, stronger matcher.
            condition: "code_missing: 'Milk'"

      - description: "The test still uses web-first assertion form (await expect)"
        command: |
          const spec = files['tests/todo.spec.js'] || '';
          assert(/await\s+expect\(/.test(spec),
            'Use `await expect(...)` — web-first assertions retry, manual `expect(await locator.isVisible()).toBe(true)` does not.');
        hints:
          - title: "Layer 1 — orientation"
            text: "Playwright's web-first assertions (`await expect(locator).toX(...)`) auto-retry until the condition holds — no hand-coded waits needed."
          - title: "Layer 2 — strategy"
            text: "Anti-pattern: `expect(await locator.isVisible()).toBe(true)` looks similar but runs *once*. If the page hasn't finished rendering, your test flakes. Always start with `await expect(locator)...`."
            condition: "code_contains: .isVisible()"

