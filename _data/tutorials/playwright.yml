      explanation: |
        The strengthened assertion uses `toHaveText('Milk')` — it now pins the *content* of the list item, not just its existence. Against the buggy app (which renders an empty `<li>`), this assertion fails as it should: the user's promise ("the item shows up in the list") was broken, and the test now reflects that.

    quiz:
      title: "Step 4 — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            Which assertion would catch a bug where the "Mark complete" toggle *visually* updates (the item gets a strikethrough) but the underlying "remaining" counter does **not** decrement?
          type: single
          options:
            - "`await expect(page.getByRole('listitem').first()).toHaveCSS('text-decoration', /line-through/)`"
            - "`await expect(page.getByRole('status')).toContainText('2 items remaining')`"
            - "`await expect(page.locator('.completed')).toBeVisible()`"
            - "`await expect(page.getByRole('listitem')).toHaveCount(3)`"
          correct_index: 1
          option_feedback:
            0: "This catches the *visual* effect (strikethrough) — exactly the surface that **does** update in the buggy scenario. It would pass while the counter stays wrong. A green test here is a liar test."
            1: "Right. The counter is the **promise** — the user contract is \"remaining decrements when you mark something done.\" Asserting on `<p role=\"status\">` content directly catches a counter bug whether or not the visual style changed."
            2: "`.completed` is a CSS class — that's plumbing, not promise. Even if it asserts visibility, it doesn't verify the counter (which is the regression we'd miss)."
            3: "The total count of list items doesn't change when you mark one done (it changes if you *delete*). This assertion is testing a different behavior entirely."
          explanation: |
            "Assert the promise, not the plumbing." The promise here is that the counter reflects remaining items. If your assertion only checks visual side-effects (strikethrough, CSS classes), you've written a liar test: it passes for a render that's correct in *appearance* but wrong in *meaning*.

        - question: |
            Which of these is a Playwright **anti-pattern** that the official best-practices docs explicitly call out?
          type: single
          options:
            - "`await expect(page.getByText('Saved')).toBeVisible()`"
            - "`expect(await page.getByText('Saved').isVisible()).toBe(true)`"
            - "`await page.getByRole('button', { name: 'Save' }).click()`"
            - "`await page.goto('/dashboard')`"
          correct_index: 1
          option_feedback:
            0: "This is the **correct** form — web-first assertion that auto-waits and retries until the condition holds or the timeout expires. The Playwright docs recommend this everywhere."
            1: "Right. `isVisible()` returns immediately — no auto-wait, no retry. If the element renders 200ms later, this fails. The Playwright docs explicitly call this out as an anti-pattern. Use `await expect(locator).toBeVisible()` instead."
            2: "`click()` on a Playwright locator auto-waits for the element to be actionable (visible, stable, enabled). This is the recommended way to click a button."
            3: "`page.goto('/path')` is the standard way to navigate. Nothing wrong here."
          explanation: |
            The Playwright best-practices guide is direct: *"Don't use manual assertions that are not awaiting the expect."* Always use `await expect(locator).matcher()` so your test gets auto-waiting and retrying — the whole point of Playwright's web-first assertions.

        - question: |
            **(Spaced review — Step 3)** A test uses `page.locator('.add-todo-btn')` to find the Add button. The team renames the CSS class to `.primary-btn`. The behavior is unchanged. The test fails. What's the most accurate label for this failure?
          type: single
          options:
            - "A real regression — the team broke the test by renaming"
            - "A false alarm — the test was coupled to implementation, not behavior"
            - "Operator error — someone forgot to update the CSS class name"
            - "Flaky test — re-running it will probably pass"
          correct_index: 1
          option_feedback:
            0: "A regression is when the *behavior* breaks. The behavior here is unchanged — the user can still click Add. The test broke because it pinned a styling decision (CSS class), not the behavior. That's a brittle test, not a regression catch."
            1: "Right. The test failed for a refactor that didn't change user-visible behavior. That's the textbook **false alarm** — wasted CI time and eroded trust in the suite. A role-based locator (`getByRole('button', { name: /add/i })`) wouldn't have broken."
            2: "It's not operator error — the test should have been written so a CSS rename couldn't break it. The fix is the locator strategy, not constantly renaming the test."
            3: "Flakiness is intermittent failure. This is a deterministic failure caused by a deterministic implementation change. Re-running won't help; the locator needs to change."
          explanation: |
            From Step 5 onward (next!), we'll see this pattern in action — running tests against deliberate refactors and identifying which failures are real regressions vs false alarms. The preview: a test that breaks under a behavior-preserving refactor is brittle, not catching a bug.


  # ==========================================================================
  # STEP 5 — Behavior, not implementation: the brittleness gauntlet (locator side)
  # LO4 part 1: locator-side brittleness made tactile.
  # CLT element-interactivity: 2 novel elements (gauntlet idea, locator-coupling
  # diagnosis).
  # Variation Theory: contrast — same behavior, two locator strategies; refactor
  # varies; behavior held constant.
  # ==========================================================================
  # Pedagogy: Variation Theory contrast — refactor varies, behavior held constant
  - title: "Behavior, Not Implementation: The Brittleness Gauntlet"
    instructions: |
      ### Why this matters

      Every brittle test on a real codebase trains the team to ignore the suite — and once trust is gone, the suite's value collapses. The fix is not to write *more* tests; it's to make sure each test breaks for the *right* reason. This step makes that distinction tactile by having you edit the app yourself and watch one locator survive a refactor while another shatters.

      ### 🎯 You will learn to

      - Analyze a failing test and classify the break as a **real regression** or a **false alarm**
      - Apply the locator ladder under pressure: predict which tests survive each refactor before running them
      - Evaluate a brittle locator and rewrite it into one coupled to behavior, not styling

      ### 🧠 Quick recall

      From Step 3 — which two locator strategies survive a CSS class rename?

      *(In your head: it's `getByRole` and `getByTestId`. CSS-class locators don't.)*

      Now we're going to make the brittleness **tactile**. You'll edit the app yourself and watch tests break.

      ### Two tests, same behavior, two locator strategies

      You have two test files in `tests/`:

      - `tests/css-locator.spec.js` — uses `page.locator('.add-todo-btn')` (Rung 5)
      - `tests/role-locator.spec.js` — uses `page.getByRole('button', { name: /add/i })` (Rung 1)

      Both verify the **same behavior**: clicking Add adds a todo. Both pass against the current `App.jsx`.

      ### 🎬 Predict — Round 1: CSS class rename

      Imagine the design team does a styling pass and renames the button's CSS class:

      ```diff
      - <button className="add-todo-btn" onClick={addTodo}>Add todo</button>
      + <button className="primary-btn"  onClick={addTodo}>Add todo</button>
      ```

      The user-visible behavior is **identical** — the button still says "Add todo" and still adds a todo.

      Predict (in your head, before editing):

      1. Will `tests/css-locator.spec.js` still pass?
      2. Will `tests/role-locator.spec.js` still pass?
      3. If either breaks, is the break a **real regression** or a **false alarm**?

      ### ✏️ Edit App.jsx (one line)

      Open `src/App.jsx`. Find the line:

      ```jsx
      <button className="add-todo-btn" onClick={addTodo}>Add todo</button>
      ```

      Change `add-todo-btn` to `primary-btn`. Just that one identifier. Save the file.

      ### ▶ Run

      Click **Test**. **You will see one ❌ red and one ✓ green** — that's the design of this step. Do **not** "fix" the red one by reverting the rename; the red is the *lesson*. If you see two greens, the rename didn't take effect (recheck `App.jsx`); if you see two reds, you broke something else (revert other changes and try again).

      The gate below specifically asserts that `tests/css-locator.spec.js` is failing — passing the gate requires the css-locator test to be in its broken state.

      ### 🔍 Investigate

      | Test | Result | What it tells us |
      | --- | --- | --- |
      | `tests/css-locator.spec.js` | ❌ Fails | The test was *coupled to a styling decision*. The user-facing behavior didn't change, but the test broke. This is a **false alarm** — wasted CI time and eroded trust in the suite. |
      | `tests/role-locator.spec.js` | ✓ Passes | The test was *coupled to the user-visible role + name*. Styling changed; behavior didn't; the test correctly didn't notice. |

      The role-based test honors what's *stable* about the UI: the button has an accessible name "Add todo." Styling is incidental. The CSS-based test pinned the incidental thing.

      ### 🔄 Mini-gauntlet, Round 2: button text change

      Now imagine Marketing changes the button text:

      ```diff
      - <button ...>Add todo</button>
      + <button ...>Add</button>
      ```

      Predict: will `tests/role-locator.spec.js` (using `name: /add/i`) still pass?

      *(Answer: yes — the regex `/add/i` matches both "Add todo" and "Add". A `name: 'Add todo'` (exact) would have failed.)*

      Discussion: was that a regression or a rewording? **Depends on whether "Add todo" specifically is part of the spec.** If the spec is "user can add a todo," the rewording is harmless. If the spec is "the button says exactly 'Add todo' for branding consistency," the rewording is a regression.

      → That ambiguity is the trade-off Step 6 will tackle.

      ### 📝 House rule

      A test that **breaks under a refactor it shouldn't have broken under** is **brittle**. Brittleness is the cost of coupling tests to implementation details. The Spec Card's **"Should pass when"** field is your defense — write down the changes the test should survive *before* you write the test, then make sure your locators honor it.

