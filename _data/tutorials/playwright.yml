    solution:
      files:
        - path: "src/App.jsx"
          language: "javascript"
          content: |
            function App() {
              const [items, setItems] = React.useState([]);
              const [text, setText] = React.useState('');

              function addTodo() {
                const trimmed = text.trim();
                if (!trimmed) return;
                setItems([...items, trimmed]);
                setText('');
              }

              // Off-by-one bug introduced for the brittleness scenario.
              const remainingCount = items.length + 1;

              return (
                <main className="todo-shell">
                  <section className="todo-panel">
                    <p className="eyebrow">Todo Lab</p>
                    <h1>Todo Lab</h1>

                    <div className="todo-form">
                      <label htmlFor="todo-input">Todo item</label>
                      <div className="todo-row">
                        <input
                          id="todo-input"
                          value={text}
                          onChange={(event) => setText(event.target.value)}
                          placeholder="Buy milk"
                        />
                        <button onClick={addTodo}>Add todo</button>
                      </div>
                    </div>

                    <p role="status" className="status-line">
                      {remainingCount} items remaining
                    </p>

                    <ul aria-label="Todo list" className="todo-list">
                      {items.map((item, index) => (
                        <li key={index}>{item}</li>
                      ))}
                    </ul>
                  </section>
                </main>
              );
            }
      explanation: |
        With the off-by-one bug, the brittle and Goldilocks tests both fail — both pinned the count, and the count is now wrong. The loose test still passes — it only verified the status region exists, never the count. That's the lesson: a stronger assertion isn't always better, but an assertion that doesn't pin the spec at all is *worse* than no test. The Goldilocks assertion is on the diagonal: loose enough to survive a wording change, tight enough to catch a real regression.

    quiz:
      title: "Step 6 — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            A test asserts:

            ```javascript
            await expect(page.getByRole('status')).toHaveText(
              'Welcome back, Ada! You have 5 unread messages waiting.'
            );
            ```

            The product spec says: *"After login, show the user a welcome message and their unread message count."*

            What's the most accurate critique?
          type: single
          options:
            - "It's correctly strict — it pins everything the spec promises"
            - "It's over-specified — it pins wording, the user's name interpolation, plurality, and surrounding copy that the spec doesn't promise. Marketing can rephrase it and break the test for nothing."
            - "It's under-specified — it should also pin the URL and page title"
            - "It's wrong because it uses `toHaveText` instead of `toBeVisible`"
          correct_index: 1
          option_feedback:
            0: "Strictness isn't free. The spec promises two things (welcome message, unread count) but this assertion pins about seven (exact wording, name interpolation, plurality grammar, sentence structure). When wording changes, the test breaks for reasons the spec doesn't care about — the over-specification trap."
            1: "Right. The spec is loose (\"show a welcome message and unread count\"); the assertion is tight (exact full-sentence match). When marketing changes \"Welcome back\" to \"Hi\" or \"5 unread messages\" to \"5 messages waiting,\" the test breaks even though the *spec* is still satisfied. False alarm waiting to happen."
            2: "The spec doesn't promise anything about URL or page title. Adding assertions for those pins MORE implementation, not less — making the test more brittle, not less."
            3: "`toHaveText` is the right tool for asserting on specific text content. The problem isn't the matcher — it's *what* is being matched (over-specified text). A better fix is `toContainText` with a regex covering the bits the spec actually cares about."
          explanation: |
            The principle: pin exactly what the spec promises — no more, no less. Stronger assertions aren't always better; they can over-specify and create false alarms. The best assertion *matches* the spec's specificity.

        - question: |
            Which strategy BEST avoids both false alarms AND missed regressions for the spec *"the page shows the user's order ID"*?
          type: single
          options:
            - "`await expect(page.getByText('Order ID: 12345 — placed at 3:42 PM')).toBeVisible()`"
            - "`await expect(page.getByRole('region', { name: /order id/i })).toContainText(orderId)`"
            - "`await expect(page.getByRole('region', { name: /order id/i })).toBeVisible()`"
            - "`await expect(page.getByText('order')).toBeVisible()`"
          correct_index: 1
          option_feedback:
            0: "Pinning the timestamp and the surrounding sentence is over-specification — those aren't in the spec. A wording or layout change breaks the test for reasons the spec doesn't care about."
            1: "Right. The spec promises the *order ID* (the actual value), in a region the user can identify. Asserting that the order-ID region contains the actual order ID pins exactly that — no more, no less. The wording (\"Order ID: …\" vs \"Order #…\") is incidental and the test will survive it."
            2: "Asserting only that the region is visible doesn't verify what's *inside* it. The spec promises the order ID specifically; a region with the wrong ID (or no ID) would pass this assertion. Under-specified."
            3: "`getByText('order')` is too loose (matches any element with the word \"order\") and `toBeVisible()` doesn't verify content. Two ways under-specified at once."
          explanation: |
            The diagonal of the 2×2 grid: tight spec (the actual ID matters) → tight assertion (verify the ID). The framing region uses a *role* locator with a regex name so the wording around the ID can change without breaking the test. The ID itself is pinned because the spec says so.

        - question: |
            **(Spaced review — Step 5)** A test fails after a CSS class rename. The behavior is unchanged. The team then changes the class back to silence the test. What's the underlying problem?
          type: single
          options:
            - "The team's solution is correct — keeping CSS class names stable is essential for tests to work"
            - "The team patched the symptom (test failure) instead of the cause (test was coupled to implementation, not behavior)"
            - "The test is correct; the team should add the old CSS class as an alias"
            - "Reverting the CSS rename was the right call — never let a refactor break tests"
          correct_index: 1
          option_feedback:
            0: "This is the brittle-test lock-in trap. If you keep CSS class names stable just for tests, you accumulate technical debt — class names that no longer reflect the design, retained only because tests grip them. The cause isn't the rename; it's the test."
            1: "Right. The test was a CSS-locator test (Step 5 brittleness). Patching the symptom (revert rename) keeps the brittle test passing today but ensures the same trap fires again the next time someone refactors. The fix is to rewrite the locator using a stable contract (`getByRole` or a semantic `getByTestId`)."
            2: "Aliasing is even worse — now you're maintaining two class names, one of which is dead-weight. The spec didn't change; the test should have been written against a stable locator."
            3: "Tests should adapt to the codebase, not freeze it. Refactors are how codebases stay healthy. A test that breaks under a refactor with no behavior change is brittle — fix the test, don't ban the refactor."
          explanation: |
            From Step 5: brittle tests fail under refactors that don't break behavior. The fix is to rewrite the test against a stable contract, not to revert the refactor or freeze internal naming.


