              await page.getByRole('textbox', { name: /todo item/i }).fill('Milk');
              await page.getByRole('button', { name: /add todo/i }).click();
              await expect(page.getByRole('listitem')).toHaveText('Milk');
            });

            test('rung 2: getByLabel finds the input via its label', async ({ page }) => {
              await page.goto('/');
              await page.getByLabel(/todo item/i).fill('Bread');
              await page.getByRole('button', { name: /add todo/i }).click();
              await expect(page.getByRole('listitem')).toHaveText('Bread');
            });

            test('rung 3: getByText finds the button by visible text', async ({ page }) => {
              await page.goto('/');
              await page.getByRole('textbox', { name: /todo item/i }).fill('Eggs');
              await page.getByText('Add todo').click();
              await expect(page.getByRole('listitem')).toHaveText('Eggs');
            });

            test('rung 4: getByTestId finds the button via data-testid', async ({ page }) => {
              await page.goto('/');
              await page.getByRole('textbox', { name: /todo item/i }).fill('Cheese');
              await page.getByTestId('add-todo').click();
              await expect(page.getByRole('listitem')).toHaveText('Cheese');
            });

            test('rung 5: brittle CSS locator (rewrite me)', async ({ page }) => {
              await page.goto('/');
              await page.getByRole('textbox', { name: /todo item/i }).fill('Butter');
              await page.getByRole('button', { name: /add todo/i }).click();
              await expect(page.getByRole('listitem')).toHaveText('Butter');
            });
      explanation: |
        Rung 5 was rewritten to use the role + accessible-name locator (Rung 1). Same behavior verified, but the test no longer depends on the CSS class `.add-todo-btn`. Step 5 will demonstrate why this matters when the team renames CSS classes.

    quiz:
      title: "Step 3 — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            Which of these is the BEST locator for "the user's primary save button" — assuming the button has the visible text "Save" today, but the team has *announced* it will be renamed to "Submit" next quarter?
          type: single
          options:
            - "`page.getByRole('button', { name: /save/i })`"
            - "`page.getByText('Save')`"
            - "`page.locator('.btn-primary')`"
            - "`page.getByTestId('save-action')`"
          correct_index: 3
          option_feedback:
            0: "`getByRole` with `name: /save/i` is great today, but next quarter when the button becomes \"Submit\", every test using this locator breaks **for a wording change** — that's a false alarm, not a regression. (You could use `name: /save|submit/i` to bridge, but that's a maintenance smell — the locator should reflect what's *stable*.)"
            1: "`getByText('Save')` ties the test to the exact visible text. The planned rename to \"Submit\" will break every test that uses it. The test would *correctly* fail if save broke — but also fail for a harmless rewording."
            2: "CSS class locators are the most brittle option on the ladder. They depend on styling decisions, not user-visible facts. A designer changing `.btn-primary` to `.btn-action` breaks the test for no good reason."
            3: "Right. When the team has *announced* that wording will change but the *action* is stable, `data-testid` is the right tool: the contract becomes \"this is the save action\" rather than \"the button labeled Save.\" But the test ID has to be *semantically* named — `data-testid=\"save-action\"`, not `data-testid=\"blue-btn\"`."
          explanation: |
            The locator ladder isn't "always pick option 1." It's "pick the rung that matches the **stable contract** for this UI element." When wording is stable, `getByRole` is best. When wording will change but the action is permanent, `getByTestId` is right. The choice depends on *what about this UI is the promise*.

        - question: |
            Two versions of `data-testid` for the same Add Todo button — which is BETTER, and why?

            Version A: `<button data-testid="primary-blue-btn-right-column">`
            Version B: `<button data-testid="add-todo-action">`
          type: single
          options:
            - "Version A — it's more descriptive"
            - "Version B — it names the **action**, not the styling/layout. A is just CSS coupling under another name."
            - "They're equivalent — both are test IDs"
            - "Version A — Playwright recommends descriptive IDs"
          correct_index: 1
          option_feedback:
            0: "Descriptive about *what*? Version A describes color (`blue`), styling (`primary`), and layout position (`right-column`). When the designer changes the color or moves the button, the test ID is wrong even though the behavior is unchanged."
            1: "Right. The `data-testid` is supposed to be a *stable contract*. Naming it after styling (`primary-blue-btn`) or layout (`right-column`) means the contract drifts every time the design changes. Naming it after the **action** (`add-todo-action`) keeps the contract semantic — the test ID changes only when the *behavior* changes, which is exactly what tests should track."
            2: "Both are syntactically test IDs, but they're not behaviorally equivalent. The whole point of `data-testid` is to be a stable contract; A pegs the contract to styling, B pegs it to behavior. Different contracts = different durability."
            3: "Playwright's docs recommend test IDs that survive design changes. \"Descriptive\" without the right anchor (action vs styling) is worse than no test ID at all — it gives a false sense of stability."
          explanation: |
            Test IDs are only as durable as their *naming*. A test ID named after styling or layout is functionally equivalent to a CSS-class locator — it pins implementation. A test ID named after the action or the semantic role (`save-action`, `cart-checkout-button`) is what the docs intend: a stable contract that the test can rely on indefinitely.

        - question: |
            **(Spaced review — Step 2)** Your team is debating: should "rejecting whitespace-only input" have **its own** e2e test, or can it be tested in the same test as "rejecting empty input"?
          type: single
          options:
            - "They should always be in separate tests for clarity"
            - "It depends on how `addTodo` validates — if both go through the same code path (trim then check empty), they're in the same partition and one representative test is enough"
            - "Whitespace cases are too edge-case for e2e and should be skipped"
            - "Always merge edge cases into the happy-path test to save time"
          correct_index: 1
          option_feedback:
            0: "Separate tests aren't *always* needed. If two scenarios are in the same behavioral partition (i.e., the code processes them identically), one test covers both. Adding a redundant test costs maintenance time without adding confidence."
            1: "Right. The Spec Card and partition discipline tell us: if `addTodo` calls `.trim()` before checking emptiness, then `\"\"` and `\"   \"` end up in the *same partition* — both produce `\"\"` after trimming. One representative test per partition is the rule from foundations."
            2: "Skipping the case isn't the answer. Whitespace input is a real partition (real users hit it), and a test should cover it. The question is *where* — same test, same file, or its own — and the partition rule says: same partition, one test."
            3: "Cramming multiple partitions into one test makes failures harder to diagnose (which scenario caused the failure?) and tends to mask issues. One test per behavioral partition keeps failures targeted."
          explanation: |
            Partitions are the unit of test design, not individual inputs. Two inputs are in the same partition if the system processes them the same way. One representative per partition is sufficient — adding more is wasted effort, removing one is missed coverage.


