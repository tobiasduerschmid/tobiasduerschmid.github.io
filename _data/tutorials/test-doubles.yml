      files:
        - path: "test_quest_service.py"
          content: |
            """Step 2 solution — both tests pin strong oracles."""
            from datetime import datetime
            from clock import FrozenClock
            from quest_service import DailyQuestService


            class StubQuestApiClient:
                def __init__(self, canned_quests):
                    self._canned = canned_quests

                def fetch_quests(self, user_id):
                    return self._canned


            def test_tuesday_picks_tuesday_quest():
                clock = FrozenClock(datetime(2026, 4, 28, 12, 0))
                api = StubQuestApiClient([
                    {"weekday": "Monday",    "title": "Slay the Slime Lord"},
                    {"weekday": "Tuesday",   "title": "Find the Lost Amulet"},
                    {"weekday": "Wednesday", "title": "Defeat the Dragon"},
                ])
                service = DailyQuestService(clock, api)
                assert service.daily_quest_title("u123") == "Find the Lost Amulet"


            def test_thursday_picks_thursday_quest():
                clock = FrozenClock(datetime(2026, 4, 30, 12, 0))
                api = StubQuestApiClient([
                    {"weekday": "Monday",   "title": "Slay the Slime Lord"},
                    {"weekday": "Thursday", "title": "Battle the Lich King"},
                    {"weekday": "Sunday",   "title": "Save the Princess"},
                ])
                service = DailyQuestService(clock, api)
                assert service.daily_quest_title("u456") == "Battle the Lich King"


            # Generation task — fully written test for the no-Friday-quest partition.
            def test_friday_with_no_friday_quest_returns_no_quests_today():
                clock = FrozenClock(datetime(2026, 5, 1, 12, 0))   # 2026-05-01 is a Friday
                api = StubQuestApiClient([
                    {"weekday": "Monday",  "title": "Slay the Slime Lord"},
                    {"weekday": "Tuesday", "title": "Find the Lost Amulet"},
                    {"weekday": "Sunday",  "title": "Save the Princess"},
                ])
                service = DailyQuestService(clock, api)
                assert service.daily_quest_title("u789") == "No quests today"
          language: "python"
      explanation: |
        Faded test — 2026-04-30 is a Thursday → "Battle the Lich King".
        Generation test — 2026-05-01 is a Friday with no Friday entry →
        the SUT falls through the loop and returns "No quests today".
        Same SUT, two new partitions; the conceptual move is *what the
        assertion pins*, not the syntax of the stub.

    tests:
      - description: "FILL_IN_HERE was replaced with a real title"
        command: |
          source = open('/tutorial/test_quest_service.py').read()
          assert 'FILL_IN_HERE' not in source, \
              "Replace `\"FILL_IN_HERE\"` in test_thursday_picks_thursday_quest with the exact title the SUT should return. Read the spec and the canned API data — what's the Thursday quest?"
      - description: "The Thursday assertion pins exactly the right title — using `==`, not a weak substring oracle"
        command: |
          import re
          source = open('/tutorial/test_quest_service.py').read()
          if 'def test_thursday_picks_thursday_quest' not in source:
              raise AssertionError("Couldn't find test_thursday_picks_thursday_quest. Did you rename it?")
          body = source.split('def test_thursday_picks_thursday_quest')[1].split('def ')[0]

          # Catch the "Liar test" trap — `assert "Battle the Lich King" in str(...)`
          # passes for many wrong return values. Step 2's whole point is that the
          # assertion *shape* matters, not just the string.
          if re.search(r'in\s+str\s*\(', body) or re.search(r'"Battle the Lich King"\s+in\s+', body):
              raise AssertionError(
                  "Your assertion uses a substring check (`in str(...)` or `\"...\" in ...`). "
                  "That's a *weak oracle* — it would pass if the SUT returned 'Battle the Lich King 2' "
                  "or '... has been Battle the Lich King-d ...'. Use `==` for an exact match: "
                  "`assert service.daily_quest_title(\"u456\") == \"Battle the Lich King\"`."
              )

          # Strong oracle: the assertion uses == and pins the exact title.
          if not re.search(r"daily_quest_title\([^)]*\)\s*==\s*['\"]Battle the Lich King['\"]", body):
              raise AssertionError(
                  "The assertion should pin the exact Thursday title using `==`: "
                  "`assert service.daily_quest_title(\"u456\") == \"Battle the Lich King\"`. "
                  "(The clock is frozen to a Thursday and that's the only Thursday entry in the canned quest list.)"
              )
      - description: "Generation task — `test_friday_with_no_friday_quest_returns_no_quests_today` exists, constructs FrozenClock + StubQuestApiClient + DailyQuestService, and asserts == \"No quests today\""
        command: |
          import re
          source = open('/tutorial/test_quest_service.py').read()
          if 'def test_friday_with_no_friday_quest_returns_no_quests_today' not in source:
              raise AssertionError(
                  "Add a new test function named `test_friday_with_no_friday_quest_returns_no_quests_today`. "
                  "It should construct a FrozenClock for a Friday (e.g. datetime(2026, 5, 1, 12, 0)), "
                  "a StubQuestApiClient with NO Friday entry, a DailyQuestService, and assert "
                  "`service.daily_quest_title(\"<some-user>\") == \"No quests today\"` with `==`."
              )
          body = source.split('def test_friday_with_no_friday_quest_returns_no_quests_today')[1].split('def ')[0]
          if 'FrozenClock' not in body:
              raise AssertionError("Your generation test should construct a FrozenClock so the wall clock is controlled.")
          if 'StubQuestApiClient' not in body:
              raise AssertionError("Your generation test should construct a StubQuestApiClient with the canned quest list.")
          if 'DailyQuestService' not in body:
              raise AssertionError("Your generation test should construct a DailyQuestService — that's the SUT.")
          if not re.search(r"==\s*['\"]No quests today['\"]", body):
              raise AssertionError(
                  "Pin the assertion exactly with `==`: "
                  "`assert service.daily_quest_title(\"<user>\") == \"No quests today\"`. "
                  "Substring matching (`in`) is a weak oracle — Step 2's whole point is that the assertion shape matters."
              )
          # Sanity: there must be no Friday entry in the canned list — otherwise the
          # SUT would return that title and the assertion would fail.
          if re.search(r"['\"]Friday['\"]", body):
              raise AssertionError(
                  "Your canned quest list contains a Friday entry — but the partition we're testing is "
                  "*Friday with NO Friday quest*. Remove the Friday entry so the SUT falls through to "
