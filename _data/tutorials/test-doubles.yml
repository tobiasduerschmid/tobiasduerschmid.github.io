    quiz:
      title: "Step 2 — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            Which best describes a **Test Stub**?
          type: single
          options:
            - "A real implementation that's been simplified for performance"
            - "An object that returns canned values for the SUT's indirect inputs"
            - "An object that records every method call so the test can verify them later"
            - "An object that throws exceptions on every call to detect missing error handling"
          correct_index: 1
          option_feedback:
            0: "That's closer to a *[Fake Object](http://xunitpatterns.com/Fake%20Object.html)* (Meszaros) — a working but lightweight implementation, like an in-memory database. A Stub doesn't 'work' in the usual sense; it just returns the canned answer it was given."
            1: "Right. A [Test Stub](http://xunitpatterns.com/Test%20Stub.html) (Meszaros) provides controlled indirect inputs — it answers the SUT's questions with values *you* chose, so the SUT's behavior under those inputs is what gets tested."
            2: "That describes a *[Test Spy](http://xunitpatterns.com/Test%20Spy.html)* (Meszaros), the topic of Step 3. A spy adds *call recording* on top of stub-like behavior — but a stub on its own doesn't track calls."
            3: "That's a specific *use* of a stub (the `side_effect=ConnectionError` pattern from Step 4), but it's not the defining role. The defining role is providing canned answers; raising exceptions is just one kind of canned answer."
          explanation: |
            Stub = canned answers. The SUT calls the stub; the stub returns
            whatever the test configured. Used to control what the SUT *receives*,
            not to inspect what the SUT *does*. (Step 3 covers the latter — that's
            a Spy.)

        - question: |
            Why is hardcoded `datetime.now()` (used directly inside the SUT) **not** a stub?
          type: single
          options:
            - "Because `datetime.now()` is a function, and a stub must be a class"
            - "Because the test cannot control what `datetime.now()` returns"
            - "Because `datetime.now()` is too fast — stubs must add latency"
            - "Because Python's standard library functions can't be doubled"
          correct_index: 1
          option_feedback:
            0: "A stub doesn't have to be a class — it just has to satisfy the contract the SUT expects. The defining property is *control*, not *type*. A function or a lambda can stub a function-shaped collaborator perfectly well."
            1: "Right. The defining property of a stub is that *the test* controls what it returns — the wall clock changes every microsecond and is shared across processes. That's exactly why we replaced it with a `FrozenClock`."
            2: "Latency is irrelevant to the stub vs not-stub distinction. Stubs are typically faster than the real thing because they skip work, but the defining property is control, not speed."
            3: "Python's standard library is no harder to double than your own code — `datetime.datetime` accepts a default override, modules can be patched, etc. The reason `datetime.now()` is the *opposite* of a stub is that the test can't control what it returns; nothing about Python prohibits doubling it."
          explanation: |
            Stub = under the test's control. `datetime.now()` is the opposite —
            the wall clock is shared, mutable, and impossible for the test to
            pin. Replacing it with `FrozenClock(...)` is what makes the
            indirect input controllable.

        - question: |
            **(Spaced review — Testing Foundations Step 3)** A teammate writes:
            ```python
            assert service.daily_quest_title("u123") is not None
            ```
            after stubbing the clock and the API. Is the assertion strong?
          type: single
          options:
            - "Yes — the test passes, so the SUT must be returning the right title"
            - "No — `is not None` is weak; pin the exact value with `==`"
            - "Yes — `is not None` is the recommended assertion when stubbing dependencies"
            - "It's strong if the SUT's return type is documented as a string"
          correct_index: 1
          option_feedback:
            0: "Tests passing only tells you the *assertion* held. `is not None` holds for *any* non-`None` value, including ones that violate the spec. The Liar test from Testing Foundations Step 3 still applies — being inside a stubbed test doesn't make it stronger."
            1: "Right. Stubbing collaborators makes the test *deterministic*; it doesn't make weak oracles strong. `is not None` accepts wrong values just as readily as right ones — including the wrong title, an empty string, or `False`. Pin the exact expected title with `==`."
            2: "There's no special rule for assertions in stubbed tests. Stubs control inputs; oracles check outputs. The two are independent design dimensions, exactly as Testing Foundations Step 5 spelled out."
            3: "Documentation doesn't make `is not None` precise. The function returns *one specific string* per partition — pinning that exact string with `==` is the strong oracle. `is not None` is a structural assertion (\"some object came back\"), not a behavioral one (\"the right object came back\")."
          explanation: |
            Stubs and strong oracles solve *independent* problems. Stubs make
            indirect inputs controllable; oracles make assertions precise. You
            need both. Putting a weak oracle inside a stubbed test is a Liar
            test wearing a stub's clothes.

        - question: |
            When would a **Fake Object** (in-memory implementation) be a better choice than a **Test Stub**?
          type: single
          options:
            - "When the test only needs to control one canned return value"
            - "When the SUT calls the collaborator multiple times and expects stateful answers"
            - "When the test needs to verify that the SUT actually called the collaborator"
            - "Whenever you're testing a service class — Stubs are only for free functions"
          correct_index: 1
          option_feedback:
            0: "One canned answer is exactly what a Stub is for. A Fake's added complexity (an in-memory store, mutating state) is overkill when you only need one return value."
            1: "Right. A Fake's value is *consistent stateful behavior across a test sequence*. If the SUT does `api.add_quest(...)` then `api.fetch_quests(...)` and expects to see the added quest back, a Stub would have to be manually re-configured between calls — a Fake just *works*."
            2: "That's a Spy or a Mock (Step 3 / Step 5), not a Fake. A Fake doesn't track calls — it just behaves like a simplified version of the real collaborator."
            3: "Stub vs Fake has nothing to do with whether you're testing a class or a function. The choice is about how much *state* the test needs the double to manage; the SUT's shape is irrelevant."
          explanation: |
            Stub: one canned answer per call.
            Fake: working in-memory implementation, useful when the SUT needs
            consistent stateful behavior across multiple calls (add → fetch →
            update → fetch again, etc.). Step 6's decision guide covers when
            each fits.

        - question: |
            **Pick the right tool for the test.**

            Your `notify_user(user_id)` function calls `email_gateway.send(user_id, "Welcome")` and returns nothing. The test must verify that **the email was sent to user `"u1"` exactly once with the welcome subject**. The real `email_gateway.send` actually delivers an email — you cannot run it in tests.

            Which test double is the right tool? (One choice from Step 1's vocabulary table.)
          type: single
          options:
            - "Stub — return a canned value to drive the SUT down a partition"
            - "Spy — replace `email_gateway.send` and assert on the recorded calls afterward"
            - "Fake — write a working in-memory email gateway"
            - "No double — just call the real `email_gateway.send` and check the inbox"
          correct_index: 1
          option_feedback:
            0: "A stub returns canned *inputs* to drive the SUT. But here `email_gateway.send` doesn't return anything that the SUT branches on — the SUT calls it for *side effect*, not for a return value. The test cares whether the call *happened*, which is a spy's job."
            2: "A Fake is overkill — there's no stateful behavior to simulate, just a single fire-and-forget call. Fakes are for SUTs that interact with the collaborator multiple times and expect consistent state (Step 2's discussion of stubs vs. fakes)."
            3: "Hitting the real gateway breaks the test's determinism (a real email is sent on every run) and slows the suite to a crawl. Tests must not have observable side effects on production systems."
          explanation: |
            **Spy.** When the SUT calls a collaborator for *side effect* (no meaningful return value the SUT acts on), the test needs to *record the call* and assert on it afterward — that's the spy role. Skeleton:
            ```python
            def test_welcomes_new_user():
                spy = SpyEmailGateway()
                notify_user("u1", gateway=spy)
                assert spy.calls == [("u1", "Welcome")]
            ```
            Compare the wrong choices: a stub answers a question the SUT asked; a fake provides a working alternate; the real one sends a real email. Step 3 will show you how to hand-roll spies of this exact shape.


  # --------------------------------------------------------------------------
  # STEP 3 — Hand-Rolled Spy: Did the Ledger Actually Get the Gold?
  # Pedagogy:
  #   Threshold concept #2   — observe indirect *output* (vs Step 2's input control).
  #   Spaced retrieval       — Liar oracle from Testing Foundations Step 3 returns,
  #                            now applied to call-recording instead of return values.
  #   Worked → faded         — Liar (full), Goldilocks (full), Faded (student fills
  #                            in the EXPECTED CALL list).
  #   Concept over syntax    — student writes ONE tuple. The lesson is "how much
  #                            of a call to pin."
  # --------------------------------------------------------------------------
  - title: "Hand-Rolled Spy: Verifying Indirect Outputs"
    instructions: |
      ### Why this matters

      Plenty of real methods return `None` and do their work as a side effect — `ledger.credit(user_id, gold)`, `notifier.send(...)`, `cache.invalidate(...)`. A stub can't help: there's no return value to assert on. You need a **Test Spy** that records calls so the test can ask, after the fact, *did the SUT actually credit the right user the right amount?* The hard part isn't writing the spy — it's pinning *exactly the right amount of detail* in the assertion: enough to catch real bugs, loose enough to survive harmless refactors.

      ### 🎯 You will learn to

      - Apply the [Test Spy](http://xunitpatterns.com/Test%20Spy.html) role (Meszaros) by writing one in plain Python
      - Evaluate "Goldilocks" assertions that pin only what the spec demands
      - Analyze why fire-and-forget methods are invisible without a spy

      🧭 **Bridge from Step 2.** A stub *answers* the SUT's questions. A spy *also records* what the SUT did. The new conceptual move:

      | Aspect | Stub (Step 2) | Spy (Step 3) |
      |---|---|---|
      | What the test asserts on | The SUT's **return value** | The recorded **calls** on the spy |
      | What the SUT looks like | A function that returns something | Often a method that returns `None` (fire-and-forget) |
      | Verification kind | **[State Verification](http://xunitpatterns.com/State%20Verification.html)** | **State** verification *of the spy* — Step 5 will introduce the third kind |

      The new collaborator is `RewardLedger` — its job is to credit gold to a user. The SUT calls `ledger.credit(user_id, gold)` and that's the *only* observable effect. The SUT itself returns nothing useful — the call to credit IS the contract. To verify it, we need a spy.

      ### 📖 What is a [Test Spy](http://xunitpatterns.com/Test%20Spy.html)? (Meszaros, *xUnit Test Patterns*)

      A **Test Spy** behaves like a stub *and* records every call made to it. The test runs the SUT, then inspects the spy's recorded-call list. Same SUT/collaborator structure as Step 2; what changes is *what the test asserts on*.

      ```mermaid
      flowchart LR
          T["Test"]:::test --> S["DailyQuestService"]:::sut
          S -->|"clock.now()"| C1["FrozenClock<br/>📅 STUB"]:::stub
          S -->|"api.fetch_quests(...)"| C2["StubQuestApiClient<br/>📋 STUB"]:::stub
          S -->|"ledger.credit(u1, 100)"| C3["SpyLedger<br/>🎙️ SPY<br/><i>records every call</i>"]:::spy
          T -.->|"asserts on spy.calls"| C3
          classDef test fill:#e3f2fd,stroke:#1565c0,color:#0d47a1
          classDef sut fill:#fff3e0,stroke:#e65100,color:#bf360c
          classDef stub fill:#e8f5e9,stroke:#2e7d32,color:#1b5e20
          classDef spy fill:#f3e5f5,stroke:#6a1b9a,color:#4a148c
      ```

      Notice the test now asserts on `spy.calls`, not on the SUT's return value. The contract being verified is *"the SUT called credit with these arguments"*.

      ### 📖 The hard part isn't writing the spy — it's writing the *assertion*

      A spy is even simpler than a stub: a class with a list and an append. The interesting test-design move is **how much of each call to pin**.

      | Assertion | What still passes (i.e., what it misses) | Pattern |
      |---|---|---|
      | `assert len(spy.calls) >= 0` | Everything. Always passes. **Liar test.** | Weak — same family as `result is not None` from Testing Foundations |
      | `assert spy.calls == [("u1", 100, "2026-04-28T12:00:00Z", {"meta": "blob"})]` | Nothing. Breaks if the SUT later calls credit with cleaner arguments — even when the contract is unchanged. **Brittle.** | Over-specified |
      | `assert spy.calls == [("u1", 100)]` | A wrong user_id, a wrong gold amount, no call at all, two calls. **Goldilocks.** | Strong, behaviorally-bounded |

      Same lesson as Testing Foundations Step 4: **assert on exactly what the spec says — no less, no more.** The spec for `complete_quest`: "credit the user the gold for the completed quest." That maps to a 2-tuple `(user_id, gold)`. Anything beyond that is over-specification; anything less is a Liar.

      ⚙️ **Task** — four moves:

      1. **Read** `test_complete_quest_LIAR_oracle`. The assertion is `assert len(spy.calls) >= 0` — it *always passes*, regardless of whether the SUT called the spy at all. **Add a Python comment** above the assertion explaining (in your own words) why this is a *Liar test* — use the phrase "Liar test" or "weak oracle". Don't change the assertion; the test stays a Liar so the lesson is preserved.
      2. **Read and run** `test_complete_quest_credits_correct_gold` — fully written, pins the exact 2-tuple. This is the Goldilocks shape.
      3. **Fill in the assertion** in `test_award_streak_bonus_5_days`. The streak-bonus rule: **10 gold per day, capped at 100**. The student passes `days=5`. Compute the gold; pin the call.
      4. ✍️ **Write your own test — `test_award_streak_bonus_caps_at_100_for_long_streaks`.** Use `days=12` (above the cap). Wire up `SpyLedger` + `DailyQuestService` and pin `spy.calls == [("u3", 100)]`. No scaffold.

      <details markdown="1"><summary>📖 Why fire-and-forget methods need spies</summary>

      `complete_quest` returns `None`. From the SUT's caller's perspective, *nothing happens* — the function is "void". Yet the SUT did do something important: it told the ledger to credit gold. Without a spy, that work is invisible to the test.

      A spy makes invisible side effects visible. In every language: Java mocks (`Mockito.verify(...)`), JavaScript spies (`jest.fn()` + `expect(spy).toHaveBeenCalledWith(...)`), Python's `unittest.mock` recorded calls — the *idea* is the same. This is **the only way to test fire-and-forget methods**.
      </details>

      <details markdown="1"><summary>🌍 The same idea in another language</summary>

      **JavaScript with Jest:**
      ```javascript
      const spy = jest.fn();          // creates a function spy
      service.completeQuest('u1', 'Slay the Slime');
      expect(spy).toHaveBeenCalledWith('u1', 100);
      ```

      **Java with Mockito:**
      ```java
      RewardLedger spy = mock(RewardLedger.class);   // also acts as a spy
      service.completeQuest("u1", "Slay the Slime");
      verify(spy).credit("u1", 100);
      ```

      Same role; different syntax. The hand-rolled `SpyLedger` class makes the recording mechanism *visible*; framework spies (Step 4) hide the boilerplate.
      </details>

      ### 🪞 What this test proves — and doesn't

      ✏️ **Predict first:** the spy verified that `credit` was *called* with the right arguments. Name one thing the SUT could *still* be broken about that this test would not catch. Commit to an answer in your head, then check below.

      | Claim | What it means |
      |---|---|
      | **Proves** | The SUT *did* call `ledger.credit(user_id, gold)` with the exact `(user_id, gold)` pair the spec mandates. |
      | **Does not prove** | That the real `RewardLedger.credit(...)` actually persists the credit, handles duplicate writes idempotently, or recovers from a database failure mid-write. |
      | **Remaining risk** | The spy intercepts the call but cannot verify what would have happened *downstream* of it. **Complementary check:** an integration test against the real `RewardLedger` (against a sandbox or test database) to confirm the credit lands and persists. |

      🔭 **Coming in Step 4:** Hand-rolling spies gets repetitive — you're writing the same `self.calls.append(...)` boilerplate every time. Python's `unittest.mock.Mock` *generates the entire SpyLedger class for you in a single line*. But it's the *same conceptual object* — just less typing.

