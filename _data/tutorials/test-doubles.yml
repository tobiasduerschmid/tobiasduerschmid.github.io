title: "Test Doubles — Stubs, Spies, and Mocks"
description: "Learn to test code that depends on a clock, an HTTP service, a database, or a notification system — without actually hitting them. Concepts first; the Python+pytest syntax is provided so you can focus on the test-design decisions."

# Authoring-time Bloom-verb objectives. Not yet rendered to students.
learning_objectives:
  - "Distinguish Dummy / Stub / Spy / Mock / Fake (Meszaros' taxonomy) by *role*, given a concrete scenario."
  - "Apply dependency injection to introduce a *seam* in code that hard-codes a collaborator (clock, HTTP, DB)."
  - "Differentiate the conceptual role of a `unittest.mock.Mock` object from its tool-class identity, given a code sample — `Mock()` the class can play any role; the role is determined by *how* the test uses it."
  - "Evaluate whether a passing test actually verifies anything (vs. tautologically agreeing with itself because both sides ask the same uncontrolled source)."
  - "Justify the choice to *not* use a test double — fakes for stateful collaborators, real objects for pure logic."
  - "Create a test from scratch that uses an appropriate double (stub, spy, or mock) for a previously-unseen SUT, with a strong oracle."
  - "Explain what a doubled unit test does *not* prove, then name the contract or integration check that covers the remaining risk."

backend: pyodide
linter: true
debugger: true
pytest: true

# Show production code (left) and tests (right) side by side. Files prefixed
# `test_` route to the right pane automatically; everything else lands on
# the left.
editor_split: true

# Compact output panel — the action lives in the editors. The strip below
# the editors is just for skimming pytest's pass/fail summary.
output_height: "25%"

require_tests: true
autosave_type: files

# Global setup: install pytest, expose /tutorial on sys.path, patch the
# pytest module cache so each pytest.main(...) call sees fresh source.
# The eviction list is computed by globbing /tutorial/*.py at run-time so
# adding a new student-editable module never requires editing this YAML
# (a hard-coded list previously caused stale-import bugs that looked like
# flaky tests whenever an author forgot to update it).
setup_commands:
  - "import pyodide_js; await pyodide_js.loadPackage('pytest')"
  - "import sys; sys.path.insert(0, '/tutorial')"
  - |
    import os as _os, pytest as _pytest, sys as _sys
    _TUTORIAL_DIR = '/tutorial'
    def _make_pytest_patch():
        _orig = _pytest.main
        _sysmod = _sys
        def _patched(*a, **kw):
            try:
                tutorial_modules = {f[:-3] for f in _os.listdir(_TUTORIAL_DIR) if f.endswith('.py')}
            except FileNotFoundError:
                tutorial_modules = set()
            for m in list(_sysmod.modules):
                if m.startswith('test_') or m in tutorial_modules:
                    del _sysmod.modules[m]
            return _orig(*a, **kw)
        return _patched
    _pytest.main = _make_pytest_patch()

steps:

  # --------------------------------------------------------------------------
  # STEP 1 — The Test That Lied: Why Your Quest Test Passes Today and Fails Tomorrow
  # Pedagogy:
  #   Generation Effect      — predict-then-run; flakiness made visceral.
  #   Productive failure     — the test PASSES today but is fundamentally broken.
  #   Schema-building        — SUT, collaborator, indirect input, seam.
  #   Threshold concept      — "this dependency is uncontrolled" is a NEW way of
  #                            seeing code; it's not visible from the function body.
  #   Concept over syntax    — the only fill-in is adding a `clock` parameter (one
  #                            symbol). The lesson is the SEAM, not the syntax.
  # --------------------------------------------------------------------------
  - title: "The Test That Lied: A Test That Passes Today and Fails Tomorrow"
    instructions: |
      ### Why this matters

      Some tests ship green and rot on a schedule. A teammate writes a test on April 28 asserting `is_today_event_day("2026-04-28")` returns `True`, the PR merges, and the next day — without a single code change — CI turns red. The hidden dependency is the *wall clock*; the test never really verified the function's behavior. Recognizing those uncontrolled collaborators (clocks, HTTP, databases) and carving out a *seam* to substitute them is the foundation every other test-double technique builds on.

      ### 🎯 You will learn to

      - Diagnose when a real collaborator makes a test non-deterministic
      - Apply Dependency Injection to introduce a *seam* the test can swap out
      - Analyze the difference between a test that passes and one that actually verifies behavior

      📐 *Two panes:* production code is on the **left**; tests are on the **right**. Files prefixed `test_` route to the right pane automatically; everything else lands on the left.

      ### 🧭 What you already know — and what's about to shift

      From [Testing Foundations](/SEBook/testing/testing-foundations-tutorial) you know how to write a strong oracle, choose partition + boundary inputs, and avoid peeking at private state. From [TDD](/SEBook/testing/tdd-tutorial) you know the Red-Green-Refactor rhythm. Every example so far has had one thing in common: the *function under test was self-contained*. Pass it inputs, observe the output, done.

      Real code is rarely like that. Real functions **talk to collaborators** — clocks, network APIs, databases, payment gateways, email services. Each of those collaborators turns a deterministic test into a *flaky* test, a *slow* test, or — worst — a test that *appears* green but actually never exercised the behavior you cared about. This entire tutorial is about that problem.

      ### 🔑 The four questions every test double answers

      Before any vocabulary lands, lock in the four questions that decide which double fits. Every kind of double exists to answer exactly one of these:

      | Question the test is asking | What the double provides | Role (you'll meet by Step 5) |
      |---|---|---|
      | "What should this collaborator return so I can drive the SUT down a specific branch?" | **Control** over *indirect input* | Stub |
      | "Did the SUT actually call this collaborator, and with what arguments?" | **Observation** of *indirect output* | Spy |
      | "Does the SUT follow the expected collaboration protocol — call this once, with these args?" | **Verification** of interaction | Mock Object |
      | "I need a working-but-cheap replacement that behaves like the real collaborator across many calls." | **Substitution** with simpler behavior | Fake |

      Memorize the *questions*, not the role names — the role names are answers, and answers are easier to look up than questions. Across the next six steps you'll use this table as a touchstone: every time you reach for a double, name which of the four questions you're answering, and the role falls out.

      ### 📖 New vocabulary (visible glossary)

      | Term | Meaning |
      |---|---|
      | **System Under Test (SUT)** | The code being tested. Here: `is_today_event_day`. |
      | **Collaborator** | Anything the SUT calls into. Here: `datetime.now()`. |
      | **Indirect input** | A value the SUT *receives* from a collaborator (rather than from its caller). Here: today's date from the clock. |
      | **Indirect output** | An effect the SUT *produces through* a collaborator (rather than via its return value). You'll meet this in Step 3. |
      | **Seam** | A point where you can substitute a collaborator at test time without changing production behavior. We're about to introduce one. |
      | **Dependency Injection** | The technique: pass the collaborator in as a parameter instead of hard-coding it. *(Meszaros, [Dependency Injection](http://xunitpatterns.com/Dependency%20Injection.html).)* |

      <details markdown="1"><summary>🌍 The same vocabulary in another language</summary>

      These terms come from `xUnit Test Patterns` (Meszaros, 2007). They're language-agnostic. JavaScript+Jest, Java+Mockito, C#+Moq, Ruby+RSpec — all use *the same words for the same roles*. What changes between languages is the **syntax** of how you express a stub or a mock. The **role** doesn't change.
      </details>

      <details markdown="1"><summary>📋 The full Meszaros taxonomy (preview)</summary>

      You'll meet four named test doubles in this tutorial — Stub, Spy, Mock, and Fake — plus one you'll see in passing:

      | Role | What it does | First encountered in |
      |---|---|---|
      | **[Dummy](http://xunitpatterns.com/Dummy%20Object.html)** | A placeholder object that's *never actually used*. Passed only to satisfy a constructor or method signature when the test doesn't care about that collaborator. | Step 5's `_service(Mock(), Mock())` helper — those args are dummies. |
      | **[Stub](http://xunitpatterns.com/Test%20Stub.html)** | Returns canned indirect *inputs* to the SUT. The SUT reads from it; the test doesn't verify how. | Step 2 — a `FrozenClock` that always returns the same datetime. |
      | **[Spy](http://xunitpatterns.com/Test%20Spy.html)** | Records the SUT's outgoing *calls* so the test can assert on them later. | Step 3 — a ledger spy that captures `(user_id, gold)` tuples. |
      | **[Mock](http://xunitpatterns.com/Mock%20Object.html)** *(Meszaros sense — the "noun")* | A spy + behavior verification: the test sets *expectations* up-front, and the mock fails if they aren't met. | Step 4 — `unittest.mock` + `assert_called_once_with`. |
      | **[Fake](http://xunitpatterns.com/Fake%20Object.html)** | A working alternate implementation, simpler than production (e.g., an in-memory database for a test). | Step 6 — when stubs/spies become unwieldy. |

      Five roles, *one* taxonomy. The role is determined by *how the test uses* the object, not by what class instantiated it.
      </details>

      ⚙️ **Task** — three small moves:

      1. **Read** `quest_service.py` and `test_quest_service.py`. The test asserts that `is_today_event_day("2026-04-28") is True`. The test was written on 2026-04-28 and merged green that day.

         ✏️ **Predict before you run.** What happens when you run `test_april_28_is_event_day` *today*?

         - **(a)** Pass — the function returns `True` whenever its argument is a valid date string.
         - **(b)** Pass — the date string in the assertion (`"2026-04-28"`) matches the value stored in the test, so equality holds.
         - **(c)** Fail — `is_today_event_day("2026-04-28")` returns `False` because the function compares against today's wall clock, which is no longer 2026-04-28.
         - **(d)** Error — the function raises an exception because `2026-04-28` is in the past.

         Commit to a letter. *Then* run the test.

         <details markdown="1"><summary>Reveal (after committing)</summary>

         **(c)** is the answer. The trap is **(b)** — students who haven't yet thought about *where the function gets "today" from* assume both sides of the `==` come from the same source. They don't. The left side comes from `datetime.now()` (the wall clock); the right side is a hardcoded string. Two different sources, two different rates of change. The test rotted overnight.

         </details>

      2. **Run** the test. The **FAIL** is the lesson — the test was correct on the day it was written; the *world* changed beneath it. Tests that depend on the wall clock matching a specific date rot on a schedule.
      3. **Refactor `is_today_event_day`** to accept a `clock` parameter (default `datetime.datetime`). This *creates the seam* — but you don't use it yet. Adding the seam alone won't fix `test_april_28_is_event_day` (it still calls `is_today_event_day("2026-04-28")` without injecting a clock). **Don't be alarmed when that one test stays red after the refactor** — the gate tests below check the seam itself, not the original test. Step 2 will use the seam to *control* the clock so the test is deterministic.

      ```mermaid
      flowchart LR
          subgraph before["BEFORE — no seam"]
              direction TB
              S1["is_today_event_day(date_str)"]:::sut
              S1 --> C1["datetime.now()<br/>📅 wall clock"]:::bad
          end
          subgraph after["AFTER — seam introduced"]
              direction TB
              S2["is_today_event_day(date_str, clock)"]:::sut
              S2 --> C2["clock.now()<br/>↑ caller decides<br/>what clock"]:::good
          end
          before --> after
          classDef sut fill:#e3f2fd,stroke:#1565c0,color:#0d47a1
          classDef good fill:#e8f5e9,stroke:#2e7d32,color:#1b5e20
          classDef bad fill:#ffebee,stroke:#c62828,color:#b71c1c
      ```

      💡 **Concept over syntax.** Your code change is a single keyword (`clock`) and one default. The point is the *idea* — "this function used to depend on the wall clock; now its caller decides what 'now' means." That's the foundation of every test double in this tutorial. (The default value `clock=datetime.datetime` keeps existing call sites working — the seam is *non-intrusive*.)

      🔭 **Coming in Step 2:** You created a seam. Now we'll actually use it — by passing in a `FrozenClock` object that always says it's Tuesday. Same SUT, same test shape, but now *fully deterministic*.

    files:
      - path: "quest_service.py"
        content: |
          """QuestForge — daily quest event service."""
          from datetime import datetime


          def is_today_event_day(event_date_str: str) -> bool:
              """Return True if today is the event date.

              event_date_str is in YYYY-MM-DD format.

              ⚠️ This function calls datetime.now() directly. Tests that pin a
              specific date will pass on that date and fail on every other day.
              That hidden non-determinism is what we're about to fix.
              """
              today = datetime.now().strftime("%Y-%m-%d")
              return today == event_date_str
        language: "python"

      - path: "test_quest_service.py"
        content: |
          """Test for is_today_event_day.

          ⚠️ This test was written on 2026-04-28 and passed that day.
          Today, unless the calendar still reads 2026-04-28, it FAILS —
          `is_today_event_day("2026-04-28")` returns False because the wall
          clock no longer matches the hardcoded date. That failure is the
          lesson: a test that depends on `datetime.now()` matching a specific
          string rots the moment the date passes. Step 2 will fix it by
          *controlling* the clock instead of asking the OS.
          """
          from quest_service import is_today_event_day


          def test_april_28_is_event_day():
              # Test author assumed today would always be 2026-04-28 when this ran.
              # Reality: this test passes on exactly one calendar day.
              assert is_today_event_day("2026-04-28") is True
        language: "python"

    open_file: "quest_service.py"
    run_file: "test_quest_service.py"

    solution:
      files:
        - path: "quest_service.py"
          content: |
            """QuestForge — daily quest event service."""
            import datetime


            def is_today_event_day(event_date_str: str, clock=datetime.datetime) -> bool:
                """Return True if today is the event date.

                event_date_str is in YYYY-MM-DD format.

                The `clock` parameter is the SEAM — by default it uses the real
                datetime class (so production behavior is unchanged), but a test
                can pass in a controlled clock to make the function deterministic.
                """
                today = clock.now().strftime("%Y-%m-%d")
                return today == event_date_str
          language: "python"
      explanation: |
        We added one parameter — `clock` — with a default of `datetime.datetime`
        (the class itself, which has a `now()` classmethod). Production code
        that calls `is_today_event_day("2026-04-28")` still works exactly the
        same. But now a test *can* pass in a fake clock instead. That single
        signature change is what unlocks the entire rest of this tutorial.

    tests:
      - description: "is_today_event_day accepts a `clock` parameter"
        command: |
          import re
          source = open('/tutorial/quest_service.py').read()
          match = re.search(r'def\s+is_today_event_day\s*\(([^)]*)\)', source)
          assert match, "Couldn't find `def is_today_event_day(...)`. Did you delete or rename it?"
          params = match.group(1)
          assert 'clock' in params, \
              "Add a `clock` parameter to `is_today_event_day`. The signature should look like: `def is_today_event_day(event_date_str: str, clock=datetime.datetime) -> bool`. The default keeps the test passing without modification — but the SEAM is now available."
      - description: "The default clock is datetime.datetime (preserves backwards compatibility)"
        command: |
          import re
          source = open('/tutorial/quest_service.py').read()
          match = re.search(r'def\s+is_today_event_day\s*\(([^)]*)\)', source)
          params = match.group(1)
          # Look for a default value on `clock`.
          assert re.search(r'clock\s*=', params), \
              "Give `clock` a default value so existing code keeps working. Use `clock=datetime.datetime` (the datetime class — its classmethod `now()` returns the current datetime)."
      - description: "The function uses clock.now() instead of a hard-coded datetime.now()"
        command: |
          source = open('/tutorial/quest_service.py').read()
          assert 'clock.now()' in source, \
              "The function body should call `clock.now()` (using the parameter) — not `datetime.now()` directly. The whole point of the seam is to USE the parameter."
      - description: "Default clock preserves the function's contract (calling without `clock` works and stays date-aware)"
        command: |
          import sys
          for _m in ('quest_service',):
              sys.modules.pop(_m, None)
          from quest_service import is_today_event_day
          # Calling without a `clock` argument should use the default datetime.datetime.
          # Today is unlikely to be 2099-12-31, so the result is False — but the call
          # must NOT raise. That confirms the default value is correct.
          result = is_today_event_day("2099-12-31")
          assert isinstance(result, bool), \
              "is_today_event_day should return a boolean. Did the default clock break the comparison?"
          assert result is False, \
              "is_today_event_day('2099-12-31') should return False today (today isn't 2099-12-31). If it raised, your default value for `clock` is wrong — use `clock=datetime.datetime` so calling with no arg uses the real datetime class."
          # Note: the existing test in test_quest_service.py is *expected* to fail today —
          # that failure is the pedagogical point. Step 2 will fix it by injecting a
          # controlled clock through the seam you just created.
      - description: "(Info) test_april_28_is_event_day SHOULD still be red — that's the lesson, not a problem"
        command: |
          import sys
          for _m in ('quest_service', 'test_quest_service'):
              sys.modules.pop(_m, None)
          from quest_service import is_today_event_day
          # Confirm the original test is still failing as expected.
          original_result = is_today_event_day("2026-04-28")
          if original_result is True:
              # The wall clock happens to be 2026-04-28 — the lesson is harder to
              # see today, but the principle stands.
              print("ℹ️ Today happens to be 2026-04-28 — `test_april_28_is_event_day` passes by coincidence.")
              print("   The seam you created lets future tests stay deterministic regardless of the date.")
          else:
              print("✓ Confirmed: `test_april_28_is_event_day` is failing because the wall clock no longer reads 2026-04-28.")
              print("  This failure is the lesson — a test that depends on the wall clock rots on a schedule.")
              print("  In Step 2, we'll use the seam you just created to inject a `FrozenClock` and make the test deterministic.")
        hints:
          - title: "Add the parameter, then use it in the body"
            text: "The signature is `def is_today_event_day(event_date_str: str, clock=datetime.datetime) -> bool:`. Then inside the function, replace `datetime.now()` with `clock.now()`."
          - title: "Use the `datetime` class as the default value"
            text: "Two changes: (1) add `clock=datetime.datetime` as a second parameter with the default value; (2) change the body to use `clock.now()` instead of `datetime.now()`. The default value is the `datetime` class — its classmethod `now()` returns the current datetime, which is what the original code did."
          - title: "Fill in the blanks"
            text: "```python\nimport datetime\n\ndef is_today_event_day(event_date_str: str, clock=___) -> bool:\n    today = clock.___().strftime('%Y-%m-%d')\n    return today == event_date_str\n```\nFill the two blanks. Hints: (1) the default for `clock` is the datetime *class* (it has a `.now()` classmethod) — *not* the module and not a function. (2) The body should use the parameter `clock`, not the imported module directly. Note the top-level `import datetime` (the module), so you can reference `datetime.datetime` as the default."

    quiz:
      title: "Step 1 — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            Which of these collaborators are likely to make a test **flaky** (sometimes pass, sometimes fail without code changes)?
          type: multiple
          options:
            - "`datetime.now()` — the system clock"
            - "An HTTP call to a third-party weather API"
            - "A function that reverses a list in memory"
            - "A query against a remote database"
          correct_indices: [0, 1, 3]
          option_feedback:
            0: "Right. The clock changes every microsecond — any test that pins a specific date or time becomes a wall-clock dependency. That's the canonical flaky-test recipe."
            1: "Right. Third-party APIs go down, rate-limit, change their JSON shape, and time out. Every one of those failures is invisible from the test code itself."
            2: "In-memory list reversal is deterministic — same input, same output, every time. No flakiness. *This* is the kind of operation that can be tested with no double at all."
            3: "Right. Remote databases add latency, can be unavailable on CI, and their state can drift between test runs. Same flakiness risk as the HTTP call."
          explanation: |
            Flakiness comes from collaborators that the test cannot fully control:
            wall clocks, network calls, remote databases, file systems, randomness.
            Pure in-memory operations (list reversal, arithmetic) are deterministic
            and don't need a double.

        - question: |
            What is an **indirect input** to the System Under Test?
          type: single
          options:
            - "Any input passed via keyword argument instead of positional"
            - "A value the SUT gets from a collaborator instead of its arguments"
            - "An argument that's transformed before being used (e.g., `str.lower()`)"
            - "A global variable defined in another module"
          correct_index: 1
          option_feedback:
            0: "The keyword/positional distinction is just Python syntax. Indirect input is about *where the value comes from* — the caller's arguments versus a collaborator the SUT calls into."
            1: "Right. The SUT's *direct* inputs are its parameters; *indirect* inputs are values it gets by calling a collaborator. `datetime.now()` is the canonical indirect input — the SUT pulls it in, no caller passed it. Controlling indirect inputs is exactly what stubs are for."
            2: "Transformation doesn't change whether an input is direct or indirect. `str.lower()` operates on a value the caller passed in — still direct. Indirect inputs are pulled from collaborators *behind* the public signature."
            3: "Module-level globals can act as indirect inputs (since they aren't part of the call signature), but they aren't the *defining* example. The textbook indirect input is a value pulled from a collaborator's method call — like `clock.now()`."
          explanation: |
            Indirect input = a value the SUT obtains from a collaborator rather than
            from its caller. `clock.now()`, `db.fetch_user(id)`, `api.get_weather()` —
            each returns an indirect input that the SUT then uses. Stubs control these.

        - question: |
            **(Spaced review — Testing Foundations)** A test asserts `result is not None` after refactoring the SUT to accept a clock parameter. Is that a strong oracle?
          type: single
          options:
            - "Yes — the test passes, so the refactor is verified"
            - "No — `is not None` is weak; pin the exact expected value with `==`"
            - "Yes — `is not None` is the recommended assertion for boolean-returning functions"
            - "It's irrelevant — once you introduce a seam, oracle strength stops mattering"
          correct_index: 1
          option_feedback:
            0: "Tests passing only tells you what their *assertions* held. `is not None` holds for any non-`None` value — including ones that violate the spec. Same Liar-test family from Testing Foundations Step 3."
            1: "Right. `is not None` accepts any non-`None` return — including `False`, `[]`, or even a wrong date string. Pair it with the seam refactor and the test still verifies almost nothing. Pin the exact expected value with `==` (or `is True`/`is False` for booleans)."
            2: "There's no special rule for boolean-returning functions. The strong oracle for booleans is `is True` / `is False` — `is not None` is *strictly weaker* (it accepts `True`, `False`, and every other non-`None` value)."
            3: "Oracle strength matters in *every* test, regardless of whether you're using a real collaborator or a double. A strong oracle paired with a stub is what makes a test simultaneously *deterministic* and *meaningful*. Doubles don't replace strong oracles; they enable them."
          explanation: |
            Oracle strength is independent of whether collaborators are doubled.
            `is not None` is the canonical weak oracle in any context. Even after
            you replace a real clock with a stub, the assertion still has to pin
            exactly what the spec mandates.

        - question: |
            Why is **dependency injection** the right move *before* introducing any test doubles?
          type: single
          options:
            - "It's a Python convention required by pytest"
            - "It creates the *seam* the doubles will use later"
            - "It improves runtime performance"
            - "It's only needed when you're using `unittest.mock` — for hand-rolled stubs you can patch globals instead"
          correct_index: 1
          option_feedback:
            0: "Pytest doesn't require dependency injection. The technique pre-dates pytest by decades. The reason to do it is *design*, not framework compliance."
            1: "Right. [Dependency Injection](http://xunitpatterns.com/Dependency%20Injection.html) (Meszaros) is the pattern that makes substitution possible. Once a collaborator is a parameter, any test can pass in a stub, spy, or mock. Without that seam, your only option is module-level patching — heavier and easier to get wrong."
            2: "Performance is a non-issue at this scale. The benefit of DI is *testability*: the SUT becomes a unit you can isolate from its collaborators."
            3: "Hand-rolled stubs use the same seam as `unittest.mock` doubles — both pass an object in at the parameter level (or replace it via patching). DI is universally useful regardless of which double-style you reach for."
          explanation: |
            Dependency Injection is the design move that makes test doubles
            *possible*. Pass the collaborator as a parameter; now any test can
            substitute a controlled version. (Same principle in Java with
            constructor injection, in C# with interfaces, in JavaScript with
            options-object patterns. The pattern is language-agnostic.)


  # --------------------------------------------------------------------------
  # STEP 2 — Hand-Rolled Stub: A Clock That Always Says Tuesday
  # Pedagogy:
  #   Bruner spiral #1       — hand-roll the double IN PLAIN PYTHON before any
  #                            framework. The stub IS the conceptual definition
  #                            made literal — five lines, no library.
  #   Verbatim sentence      — "`Mock` is a tool class; stub, spy, and mock are
  #                            test-design roles" lands here for the first time.
  #   Worked → faded         — example 1 fully written; example 2 only requires
  #                            student to fill in the EXPECTED VALUE (strong oracle).
  #   Concept over syntax    — student writes ONE string. The lesson is "a stub
  #                            is a controlled answer to a question."
  #   Spaced review          — Testing Foundations strong-oracle muscle reused.
  # --------------------------------------------------------------------------
  - title: "Hand-Rolled Stub: A Clock That Always Says Tuesday"
    instructions: |
      ### Why this matters

      A seam is only useful if you have something to plug into it. The simplest something is a **Test Stub** — a tiny hand-written class that always answers questions the same way. Hand-rolling one (in plain Python, no library) makes the *role* visible: a stub is just a controlled answer to a question. Once you've built one yourself, every framework-generated stub you meet later is just less typing for the same idea.

      ### 🎯 You will learn to

      - Apply the [Test Stub](http://xunitpatterns.com/Test%20Stub.html) role (Meszaros) by writing one in plain Python
      - Analyze how canned values drive the SUT down a specific behavior partition
      - Evaluate state verification — asserting on the SUT's return value, not on the stubs

      🧭 **Bridge from Step 1.** You created a seam: `DailyQuestService(clock, api)` accepts its collaborators as parameters. Now we'll *use* the seam — by passing in objects that **always answer the same way**. That's a stub.

      ### 📖 The verbatim teaching sentence

      > **"`Mock` is a tool class; stub, spy, and mock are test-design *roles*. Same in Python, JavaScript, and Java — the role is what matters; the class name is just syntax."**

      Read that twice. Most confusion about test doubles in Python comes from conflating Python's `unittest.mock.Mock` *class* with the conceptual *Mock role*. They're not the same thing. We'll dismantle that confusion in Step 4. For now, lock in this: **the role is the question; the syntax is the answer**.

      ### 📖 What is a [Test Stub](http://xunitpatterns.com/Test%20Stub.html)? (Meszaros, *xUnit Test Patterns*)

      A **Test Stub** replaces a collaborator with a hand-controlled object that **answers questions with canned values**. It does *not* record what was asked of it; it does *not* enforce a contract. It just answers.

      ```mermaid
      flowchart LR
          T["Test"]:::test --> S["DailyQuestService<br/>(SUT)"]:::sut
          S -->|"clock.now()"| C1["FrozenClock<br/>📅 STUB<br/><i>always returns<br/>April 28, noon</i>"]:::stub
          S -->|"api.fetch_quests(...)"| C2["StubQuestApiClient<br/>📋 STUB<br/><i>always returns<br/>the canned quest list</i>"]:::stub
          T -.->|"asserts on return value"| S
          classDef test fill:#e3f2fd,stroke:#1565c0,color:#0d47a1
          classDef sut fill:#fff3e0,stroke:#e65100,color:#bf360c
          classDef stub fill:#e8f5e9,stroke:#2e7d32,color:#1b5e20
      ```

      Notice what the test asserts on: the **SUT's return value**, not the stubs. That's **state verification** — we observe the *result* of calling the SUT, not whether it *talked* to anyone. Stubs make state verification possible by removing the variability the real collaborators would have introduced.

      ⚙️ **Task** — three moves, getting progressively harder:

      1. **Read** the worked example `test_tuesday_picks_tuesday_quest`. The `FrozenClock`, the `StubQuestApiClient`, and the assertion are all written for you. **Predict** the test's outcome before running. Then run it — green.
      2. **Fill in the assertion** in `test_thursday_picks_thursday_quest`. The clock is frozen to a Thursday; the canned API quests include a Thursday entry. **Compute** the expected value from the spec — don't run-and-paste. Replace `"FILL_IN_HERE"` with the exact title the SUT should return.
      3. ✍️ **Write your own test — `test_friday_with_no_friday_quest_returns_no_quests_today`.** Friday clock (`datetime(2026, 5, 1, 12, 0)`), canned list with **no** Friday entry, assert `== "No quests today"`. No scaffold — wire up the stubs yourself.

      💡 **The conceptual move.** A stub *answers questions* — it doesn't decide what those answers should be. *You* decide. Your decision drives the SUT down whichever behavior branch the test is meant to exercise. The canned quest list and the frozen weekday together form a precise input partition; the assertion locks in what the SUT does for *that* partition.

      <details markdown="1"><summary>📖 Why we wrote `StubQuestApiClient` as a class with one method, not as a function</summary>

      `DailyQuestService` calls `self._api.fetch_quests(user_id)` — it expects a `fetch_quests` method on the api object. So our stub must be an object *with that method*. A function alone wouldn't have a `.fetch_quests` attribute.

      In Python this is *duck typing*: any object with a `fetch_quests(self, user_id)` method that returns a list of quest dicts is acceptable. The real `QuestApiClient` does it. Our stub does it. The SUT can't tell them apart — that's the whole point.

      In Java, you'd give both classes a common interface. In TypeScript, you'd type the parameter as `{ fetchQuests: (userId: string) => Quest[] }`. The mechanism differs; the *idea* (stub satisfies the same contract as the real collaborator) is universal.
      </details>

      <details markdown="1"><summary>🧠 Stub vs Fake — the cousin you'll meet briefly</summary>

      A **[Fake Object](http://xunitpatterns.com/Fake%20Object.html)** (Meszaros) is the next-of-kin to a stub: a working but lightweight implementation. Where `StubQuestApiClient` returns the *same* canned list no matter what `user_id` is passed, a `FakeQuestApiClient` could keep an in-memory dict of `{user_id: [quests]}` and return different lists for different users.

      ```python
      class FakeQuestApiClient:
          def __init__(self):
              self._data = {}
          def add_quests_for(self, user_id, quests):
              self._data[user_id] = quests
          def fetch_quests(self, user_id):
              return self._data.get(user_id, [])
      ```

      **When to reach for a Fake instead of a Stub:** when one canned answer isn't enough — typically when *multiple* SUTs share the collaborator, or when the test sequence depends on state that the stub would have to manually thread.

      We won't use Fakes in the worked exercises (one canned list per test is plenty here), but it's worth knowing they exist. Step 6's decision guide covers when each one fits.
      </details>

      <details markdown="1"><summary>🌍 The same idea in another language</summary>

      `FrozenClock` is just a class with a hard-coded method. Every language has a way to write that.

      **JavaScript (no framework):**
      ```javascript
      const frozenClock = {
        now: () => new Date('2026-04-28T12:00:00')
      };
      ```

      **Java:**
      ```java
      Clock frozenClock = Clock.fixed(
        Instant.parse("2026-04-28T12:00:00Z"),
        ZoneOffset.UTC
      );
      ```

      Same role; different syntax. Frameworks (`unittest.mock`, Jest, Mockito) generate these objects more concisely — but that's *boilerplate reduction*, not a different idea.
      </details>

      ### 🪞 What this test proves — and doesn't

      ✏️ **Before you read the table — commit to a one-sentence answer:** *"This test would still pass even if ___ were wrong about the real `QuestApiClient`."* Fill in the blank from your own head, then compare to the breakdown below.

      | Claim | What it means |
      |---|---|
      | **Proves** | Given a Tuesday clock and a canned quest list with one Tuesday entry, `daily_quest_title` returns that entry's title. |
      | **Does not prove** | That the real `QuestApiClient` actually returns dicts shaped `{"weekday": ..., "title": ...}` — only that *if* it does, the SUT picks the right one. |
      | **Remaining risk** | The stub encodes our assumption about the API's response shape. If the real API ships `{"day_of_week": ..., "name": ...}` instead, this test still passes while production breaks. **Complementary check:** a contract test or one sandbox-integration test against the real `QuestApiClient`. |

      Every doubled unit test creates this gap. Naming it explicitly is what separates a thoughtful test plan from a green-CI illusion.

      🔭 **Coming in Step 3:** A stub *answers* questions. What if your SUT's interesting behavior is *whom it asks* — like a `complete_quest` that should call `ledger.credit(user_id, gold)`? That's where **Test Spy** comes in.

    files:
      - path: "clock.py"
        content: |
          """Reusable test helper: a clock that always says it's `fixed_dt`."""
          from datetime import datetime


          class FrozenClock:
              """A stub clock — always returns the datetime it was constructed with."""

              def __init__(self, fixed_dt: datetime):
                  self._fixed_dt = fixed_dt

              def now(self) -> datetime:
                  return self._fixed_dt
        language: "python"

      - path: "quest_api.py"
        content: |
          """The REAL HTTP client — don't call this in tests.

          Instantiating QuestApiClient and calling fetch_quests() would actually
          hit the network. Tests that exercise `DailyQuestService` should pass
          a stub instead.
          """
          import urllib.request
          import json


          class QuestApiClient:
              def fetch_quests(self, user_id: str) -> list[dict]:
                  url = f"https://questforge.example.com/quests/{user_id}"
                  with urllib.request.urlopen(url) as r:
                      return json.loads(r.read())
        language: "python"

      - path: "quest_service.py"
        content: |
          """QuestForge — daily quest service.

          DailyQuestService takes a clock and an API client as constructor
          parameters (Dependency Injection). At test time we pass in stubs;
          in production the caller passes the real ones.
          """
          import datetime


          def is_today_event_day(event_date_str: str, clock=datetime.datetime) -> bool:
              today = clock.now().strftime("%Y-%m-%d")
              return today == event_date_str


          class DailyQuestService:
              """Picks today's daily quest title for a user."""

              def __init__(self, clock, api):
                  self._clock = clock
                  self._api = api

              def daily_quest_title(self, user_id: str) -> str:
                  """Return today's quest title, or 'No quests today' if none match."""
                  try:
                      quests = self._api.fetch_quests(user_id)
                  except ConnectionError:
                      return "No quests today"
                  if not quests:
                      return "No quests today"
                  weekday = self._clock.now().strftime("%A")
                  for quest in quests:
                      if quest["weekday"] == weekday:
                          return quest["title"]
                  return "No quests today"
        language: "python"

      - path: "test_quest_service.py"
        content: |
          """Step 2 — Hand-rolled stubs for DailyQuestService.

          Two stubs are used here. FrozenClock is imported from clock.py.
          StubQuestApiClient is defined right below — because it's a regular
          class, not anything special. (Step 4 will show that `unittest.mock`
          generates the same conceptual object in a single line — but the *idea*
          is what we're locking in here, not the syntax.)
          """
          from datetime import datetime
          from clock import FrozenClock
          from quest_service import DailyQuestService


          class StubQuestApiClient:
              """A Test Stub (Meszaros, http://xunitpatterns.com/Test%20Stub.html) — returns canned quests regardless of user_id."""

              def __init__(self, canned_quests: list[dict]):
                  self._canned = canned_quests

              def fetch_quests(self, user_id: str) -> list[dict]:
                  return self._canned


          # ===== WORKED EXAMPLE 1 — fully written =====
          # Read carefully. Predict the assertion's outcome BEFORE running.
          def test_tuesday_picks_tuesday_quest():
              clock = FrozenClock(datetime(2026, 4, 28, 12, 0))   # 2026-04-28 is a Tuesday
              api = StubQuestApiClient([
                  {"weekday": "Monday",    "title": "Slay the Slime Lord"},
                  {"weekday": "Tuesday",   "title": "Find the Lost Amulet"},
                  {"weekday": "Wednesday", "title": "Defeat the Dragon"},
              ])
              service = DailyQuestService(clock, api)
              assert service.daily_quest_title("u123") == "Find the Lost Amulet"


          # ===== FADED EXAMPLE 2 — student fills in the expected value =====
          # The stub class, the FrozenClock, and the canned data are all provided.
          # YOUR JOB: replace "FILL_IN_HERE" with the EXACT title the SUT should return.
          # Compute it from the spec; don't run-and-paste.
          def test_thursday_picks_thursday_quest():
              clock = FrozenClock(datetime(2026, 4, 30, 12, 0))   # 2026-04-30 is a Thursday
              api = StubQuestApiClient([
                  {"weekday": "Monday",   "title": "Slay the Slime Lord"},
                  {"weekday": "Thursday", "title": "Battle the Lich King"},
                  {"weekday": "Sunday",   "title": "Save the Princess"},
              ])
              service = DailyQuestService(clock, api)
              # TODO — pin the exact title with `==` (strong oracle, Testing Foundations Step 3).
              assert service.daily_quest_title("u456") == "FILL_IN_HERE"
        language: "python"

