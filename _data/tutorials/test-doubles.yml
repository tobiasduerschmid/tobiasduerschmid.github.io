    solution:
      files:
        - path: "test_celebrate.py"
          content: |
            """Step 5 solution — patch target fixed to where the SUT looks up the name."""
            from unittest.mock import Mock, patch
            from datetime import datetime
            from clock import FrozenClock
            from quest_service import DailyQuestService


            def _service():
                return DailyQuestService(FrozenClock(datetime(2026, 4, 28, 12, 0)), Mock(), Mock())


            def test_celebrate_milestone_sends_push():
                service = _service()
                # quest_service.py does `from push_notifier import send_push`.
                # That binds the name in quest_service's namespace — so we patch THERE.
                with patch("quest_service.send_push") as mock_send:
                    service.celebrate_milestone("u1", 7)
                mock_send.assert_called_once_with("u1", "🎉 7-day streak!")


            def test_loose_mock_accepts_wrong_call():
                with patch("quest_service.send_push") as mock_send:
                    mock_send("u1")
                mock_send.assert_called_once_with("u1")


            def test_autospec_rejects_wrong_call():
                with patch("quest_service.send_push", autospec=True) as mock_send:
                    try:
                        mock_send("u1")
                        assert False
                    except TypeError as e:
                        print(f"✅ autospec caught it: {e}")
          language: "python"
      explanation: |
        The patch target is `"quest_service.send_push"`, NOT
        `"push_notifier.send_push"`. The reason:

          1. `quest_service.py` does `from push_notifier import send_push`.
          2. After that import, `send_push` is *bound in `quest_service`'s namespace*.
          3. When `celebrate_milestone` calls `send_push(...)`, Python looks
             up `send_push` in `quest_service`'s namespace.
          4. `patch("push_notifier.send_push")` only replaces the binding in
             `push_notifier`'s namespace — but `quest_service` already has its
             own reference, so the patch has no effect.

        Tests B and C demonstrate the autospec defense: a loose Mock accepts
        any call signature, while autospec=True enforces the real function's
        signature and raises TypeError on a mismatch.

    tests:
      - description: "Patch target points to quest_service.send_push, not push_notifier.send_push"
        command: |
          import re
          source = open('/tutorial/test_celebrate.py').read()
          body = source.split('def test_celebrate_milestone_sends_push')[1].split('def ')[0]
          assert '"push_notifier.send_push"' not in body and "'push_notifier.send_push'" not in body, \
              "Still patching `push_notifier.send_push` — that's where the function was DEFINED, not where the SUT LOOKS IT UP. Change the string to `\"quest_service.send_push\"` (the SUT's namespace)."
          assert re.search(r'patch\(\s*[\'\"]quest_service\.send_push[\'\"]', body), \
              "The patch target should be `\"quest_service.send_push\"`. Read `quest_service.py`: it does `from push_notifier import send_push`, which binds `send_push` in *quest_service's* namespace. That's where the SUT looks the name up — and that's where you patch."
      - description: "All three tests pass after the fix"
        command: |
          import pytest, io, sys
          old = sys.stdout; sys.stdout = buf = io.StringIO()
          code = pytest.main(['/tutorial/test_celebrate.py', '-v', '--tb=short', '--no-header'])
          sys.stdout = old; output = buf.getvalue(); print(output)
          assert code == 0, f"Some tests are still failing:\n{output}"
        hints:
          - title: "`from ... import` creates a local reference"
            text: "Look at quest_service.py's top: `from push_notifier import send_push`. That import gives `quest_service` its OWN reference to the function. The SUT's `send_push(...)` call uses that local reference."
          - title: "Patch the importing module's namespace, not the defining one"
            text: "Patch the namespace where the SUT will *resolve* the name at runtime. The SUT is `quest_service.celebrate_milestone`; the name `send_push` was imported INTO `quest_service`'s namespace. So the target string is `\"quest_service.send_push\"`."
            condition: "code_contains: patch(\"push_notifier.send_push\")"
          - title: "Fill in the namespace"
            text: |
              The patch target string has the form `\"<module>.<name>\"`. The `<name>` is `send_push`. The `<module>` is the *importing* module (the one whose namespace the SUT looks up the name in), not the *defining* module:
              ```python
              with patch(\"___.send_push\") as mock_send:
              ```
              Read `quest_service.py`'s top: `from push_notifier import send_push`. After that line, in *which* module's namespace does the name `send_push` live? That's your blank.
            condition: "code_contains: patch(\"push_notifier.send_push\")"

    quiz:
      title: "Step 5 — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            `quest_service.py` does:
            ```python
            from push_notifier import send_push
            ```
            and `celebrate_milestone` calls `send_push(...)`. Which patch target intercepts the call?
          type: single
          options:
            - "`patch(\"push_notifier.send_push\")` — patch where the function is *defined*"
            - "`patch(\"quest_service.send_push\")` — patch where the SUT *looks up* the name"
            - "Either one works; both refer to the same function"
            - "Neither — `from X import Y` makes the function un-patchable"
          correct_index: 1
          option_feedback:
            0: "Patches the binding in `push_notifier`'s namespace — but `quest_service` already has its own reference (created by the `from ... import` line). The SUT's call ignores the patched binding and uses the local reference. Real function runs; mock is never called. Test fails (or worse, passes silently if no mock-call assertion)."
            1: "Right. After `from push_notifier import send_push`, the name `send_push` is bound in `quest_service`'s namespace. The SUT's `send_push(...)` call resolves *there*. Patching that exact namespace replaces the SUT's reference — the patch intercepts."
            2: "They refer to the same *underlying function object* but they are *distinct namespace bindings*. Patching one does not affect the other. This is the entire essence of the where-to-patch trap."
            3: "It's absolutely patchable — you just have to patch the right namespace. Python's `from ... import` doesn't disable patching; it just creates a binding the patch has to target precisely."
          explanation: |
            The rule: **patch where the SUT looks up the name**, not where it
            was defined. After `from X import Y`, the name `Y` is bound in the
            *importing* module — that's where the SUT will resolve it. The same
            principle applies to JavaScript CommonJS, Java static imports, and
            any language with import scoping.

        - question: |
            What does **`autospec=True`** primarily defend against?
          type: single
          options:
            - "Typos in `assert_*` method names like `assrt_called_once_with`"
            - "Calling the patched function with the wrong number or types of arguments"
            - "Slow tests — autospec speeds up Mock construction"
            - "Forgetting to call `mock.reset_mock()` between tests"
          correct_index: 1
          option_feedback:
            0: "Half-myth. `autospec` constrains the Mock to the *real object's* attributes; `assert_*` methods are part of *Mock's* interface, not the real function's. Whether autospec catches `assrt_called_once_with` depends on subtle interactions in different Python versions. The reliable typo defense is mypy/pylint."
            1: "Right. With `autospec=True`, the Mock's `__call__` enforces the patched function's signature. `mock_send(\"u1\")` for a function that needs `(user_id, message)` raises TypeError immediately. This catches signature-drift bugs that a loose Mock would silently accept."
            2: "Autospec is *slower* than a loose Mock (it inspects the real object's signature on construction). The benefit is correctness, not speed."
            3: "`reset_mock` and autospec are independent concerns. Autospec is about call signatures; `reset_mock` is about clearing recorded state between assertions."
          explanation: |
            `autospec=True` is the **default-safe habit for patched callables**:
            it makes the mock as strict as the real thing it's replacing.
            Signature drift (the most common refactoring bug) gets caught
            immediately. Use it unless you have a reason not to.

        - question: |
            What's the relationship between **[Test Double](http://xunitpatterns.com/Test%20Double.html)** (the umbrella name) and Stub / Spy / Mock / Fake / Dummy?
          type: single
          options:
            - "Test Double is a synonym for Mock — they refer to the same kind of object"
            - "Test Double is the *umbrella*; Dummy, Stub, Spy, Mock, and Fake are five specialized roles"
            - "Test Double is just Meszaros' branding — modern Python uses 'mock' to cover all of them"
            - "Test Double is the umbrella, but it only includes Stub, Spy, and Mock — Fake and Dummy are unrelated patterns"
          correct_index: 1
          option_feedback:
            0: "Test Double is the umbrella (replaces the real thing — like a stunt double in a film); Mock Object is one specific role *within* that umbrella. Conflating them is exactly the colloquial confusion this tutorial fights."
            1: "Right. Meszaros' [Test Double](http://xunitpatterns.com/Test%20Double.html) is the umbrella (named after a stunt double in film); each named role — [Dummy](http://xunitpatterns.com/Dummy%20Object.html), [Stub](http://xunitpatterns.com/Test%20Stub.html), [Spy](http://xunitpatterns.com/Test%20Spy.html), [Mock](http://xunitpatterns.com/Mock%20Object.html), [Fake](http://xunitpatterns.com/Fake%20Object.html) — addresses a different test-design need."
            2: "Test Double pre-dates `unittest.mock`'s rise (Meszaros 2007). The umbrella isn't a brand — it's a stable, language-agnostic taxonomy used in Java/Mockito, JS/Jest, C#/Moq, Ruby/RSpec."
            3: "All five are subtypes of Test Double in Meszaros' taxonomy. [Fake](http://xunitpatterns.com/Fake%20Object.html) (in-memory implementations) and [Dummy](http://xunitpatterns.com/Dummy%20Object.html) (objects passed but never used) are explicit named patterns alongside Stub/Spy/Mock."
          explanation: |
            **Test Double** is the umbrella — five specialized roles below it.
            When you say "I added a mock," you're naming the *Mock Object* role
            within the *Test Double* umbrella, not the umbrella itself. See
            Meszaros' [Test Double](http://xunitpatterns.com/Test%20Double.html)
            for the full taxonomy.

        - question: |
            **(Spaced review — Step 4)** A `Mock` is patched in for the SUT's collaborator. The test asserts `mock.method.assert_called_once_with("u1", 100)`. What **role** is this Mock playing?
          type: single
          options:
            - "Stub — the collaborator returns a Mock object"
            - "Spy — the test asserts on what the SUT *did* (the recorded call), inspecting after the fact"
            - "Mock Object — the test sets a strict expectation on the call"
            - "Either Spy or Mock Object — `unittest.mock` blurs the line"
          correct_index: 3
          option_feedback:
            0: "Stub provides canned input *to* the SUT. This test isn't using the Mock to feed an answer in — it's verifying a call went out. Wrong direction."
            1: "Defensible. The `assert_called_*` style is post-execution inspection of recorded calls, which is closer to a Spy. (Some authors put `assert_called_*` cleanly in the Spy camp.)"
            2: "Also defensible. The single-call expectation `assert_called_once_with(...)` IS a strict expectation on a specific interaction — Meszaros' Mock Object territory. (Some authors put `assert_called_*` in the Mock Object camp.)"
            3: "Right. The boundary depends on whether the expectation is configured up-front (Mock Object) or inspected after the fact via `assert_called_*` (Spy-leaning) — fuzzier in `unittest.mock` than in Meszaros' original taxonomy because the same Mock class can do either. Step 4's lesson — \"the role isn't determined by the class\" — applies again here."
          explanation: |
            `unittest.mock` blurs the Spy/Mock-Object line that Meszaros drew
            crisply. Both are forms of *behavior verification*; they differ
            mainly in whether the expectation is set up-front (mockist style)
            or read after-the-fact (spy style). For your day-to-day work:
            don't worry too much about which side of the line you're on —
            worry about whether the test actually verifies the contract.

        - question: |
            **(Spaced review — Steps 1 & 2)** In Step 1 you injected `clock=datetime.datetime` as a constructor parameter (Dependency Injection). In this step you patched `"quest_service.send_push"` via `unittest.mock.patch`. When is each technique the right choice?
          type: single
          options:
            - "DI is always preferred — `patch()` is only for legacy code you can't modify"
            - "DI when the collaborator is a parameter; `patch()` for module-level imports"
            - "They're interchangeable — pick based on how much typing each one takes"
            - "`patch()` is always preferred — DI requires more boilerplate"
          correct_index: 1
          option_feedback:
            0: "DI isn't always available. If the SUT calls `send_push` (a module-level function imported at the top of the file), there's no parameter to inject — you'd have to reshape the SUT's signature. `patch()` exists exactly for that situation."
            1: "Right. DI is the cleaner default: parameter-level seams are explicit, easy to reason about, and don't depend on Python's import machinery. `patch()` is the heavier tool for module-level names you can't reshape without breaking other callers — it brings the where-to-patch trap (this whole step) along for the ride. Reach for DI first; fall back to `patch()` when DI isn't available."
            2: "They have different trade-offs. DI makes the seam visible in the SUT's signature; `patch()` reaches into namespaces at runtime. The choice is structural, not stylistic."
            3: "DI requires the SUT to accept the collaborator as a parameter — that's not boilerplate, it's the seam being visible. `patch()` is the workaround for cases where DI can't be used; preferring it universally is how teams end up with patch-strings scattered across their suites."
          explanation: |
            Two techniques for two situations:
            **DI** when the SUT can take the collaborator as a parameter (Step 1's
            `clock=datetime.datetime`). Cleanest, most testable.
            **`patch()`** when the SUT imports the name at module level and you
            can't change that without disrupting other callers (Step 5's
            `quest_service.send_push`). Heavier, but works when DI doesn't.
            The same role-vs-syntax distinction from Step 4 applies: stub/spy/mock
            are *roles*; DI and `patch()` are *delivery vehicles* for those roles.

        - question: |
            **(Spaced review — Step 4 typo trap)** What's the **most reliable defense** against typos like `mock.assrt_called_once_with(...)` silently passing?
          type: single
          options:
            - "Always use `autospec=True`"
            - "Run a static type checker (mypy / pyright) or linter"
            - "Memorize the spelling of every `assert_*` method"
            - "Use `Mock(spec_set=True)` — it makes Mock immutable"
          correct_index: 1
          option_feedback:
            0: "Autospec primarily catches *call-signature drift* — wrong number/types of arguments to the patched callable. Whether it catches typos in `assert_*` methods is version-dependent and not reliable. Don't lean on autospec for this."
            1: "Right. mypy / pyright understand Mock's typing and flag the missing attribute on `Mock`. pylint catches the typo statically. Code review catches what tooling misses. This combination is robust — autospec adds defense-in-depth but isn't sufficient on its own."
            2: "Memorization is fragile and doesn't help when you're tired or rushed. Static tooling is what scales — let the computer remember the right spelling."
            3: "`spec_set=True` blocks setting *new* attributes (so `m.foo = ...` would fail). It doesn't reliably block reading nonexistent attributes (so `m.assrt_called_once_with(...)` may still slip through depending on the spec). Use mypy/pyright."
          explanation: |
            Static tooling > runtime defense for spelling. mypy / pyright
            understand `unittest.mock`'s type stubs and catch typos like
            `assrt_called_once_with` at edit time, before the test ever runs.


  # --------------------------------------------------------------------------
  # STEP 6 — When NOT to Use a Double: The Decision Guide
  # Pedagogy:
  #   Synthesis              — combat over-mocking; brittleness diagnosis;
  #                            "only mock what you own."
  #   Variation Theory       — over-mocked test vs clean test, side-by-side;
  #                            the only thing varying is "did we add unnecessary doubles?"
  #   Spaced retrieval       — quizzes pull from every prior step + Testing
  #                            Foundations + TDD.
  #   Concept over syntax    — student writes ZERO test code. Fills in:
  #                            (a) a critique comment, (b) classification answers,
  #                            (c) a residual-risk recommendation.
  #   Transfer / consolidation
  #                          — final pass; closes the loop on "what kind of design
  #                            decision is choosing a double?"
  # --------------------------------------------------------------------------
  - title: "When NOT to Use a Double — The Decision Guide"
    instructions: |
      ### Why this matters

      A test double is a *tool* — not a default, not a sign of professionalism, not a coverage strategy. The right number of doubles for many tests is zero. Reaching for `Mock` reflexively produces brittle tests that break under harmless refactors and assert on choreography instead of behavior. This step builds the judgment to *not* reach for a double when a real collaborator would do — and to name the integration risk that remains when a double *is* the right tool.

      ### 🎯 You will learn to

      - Evaluate an over-mocked test and diagnose where it broke from the spec
      - Apply a decision guide to classify scenarios as no-double / stub / spy / mock / fake / adapter / contract check
      - Analyze the "mock what you own" heuristic and the Adapter wrap-and-mock pattern
      - Justify what a doubled unit test proves, what it does not prove, and what complementary check covers the gap

      🧭 **The whole arc, in one sentence.** A test double is a *tool you reach for when a real collaborator would make the test flaky, slow, or unable to verify the right thing*. It is not a default. It is not a sign of professionalism. It is not a coverage strategy. *The right number of doubles for many tests is zero.*

      ### 📖 The decision flow

      ```mermaid
      flowchart TD
          A["What does this test need to verify?"]:::neutral --> B{"Does the SUT have collaborators<br/>worth doubling?<br/>(slow/flaky/unavailable)"}
          B -->|"No — pure function"| NO["No double<br/>Just call it"]:::good
          B -->|"Yes"| C{"Do you control the test's input<br/>via a collaborator?"}
          C -->|"Yes — control input"| STUB["Stub<br/>(canned answers)"]:::good
          C -->|"No — verify a call happened"| D{"Inspect after the fact<br/>or set up-front?"}
          D -->|"After"| SPY["Spy<br/>(record + assert)"]:::good
          D -->|"Up-front strict"| MOCK["Mock Object<br/>(behavior verification)"]:::good
          B -->|"Yes — but stateful + multi-call"| FAKE["Fake<br/>(in-memory implementation)"]:::good
          B -->|"Third-party library<br/>you don't own"| ADAPT["Wrap in an Adapter<br/>then double the adapter"]:::warn
          classDef good fill:#e8f5e9,stroke:#2e7d32,color:#1b5e20
          classDef warn fill:#fff3e0,stroke:#e65100,color:#bf360c
          classDef neutral fill:#fafafa,stroke:#bdbdbd,color:#424242
      ```

      ### 📖 Three antipatterns to recognize on sight

      | Antipattern | Symptom | Why it happens | Fix |
      |---|---|---|---|
      | **Over-mocking** | Every internal helper is mocked; the test asserts only on the mocks. | "Isolation feels safe; more mocks = more tested." | Mock at the *architectural boundary* (HTTP, DB, clock), not at every internal function. |
      | **Mocking what you don't own** | A third-party library's API is mocked directly, scattered across many tests. | The library is brittle and the team doesn't want to wait for real responses. | Wrap the third-party in an *Adapter* (Adapter pattern); mock the Adapter. The third-party's internals stay invisible to your tests. |
      | **Coverage chasing** | Every line of the SUT runs in some test, but assertions are weak (`is not None`) or mocked-on-mocks. | Coverage is misread as a quality signal. | Stronger oracles, real collaborators where possible, fewer tests that test more meaningfully. *Coverage ≠ correctness* (Testing Foundations Step 3). |

      ### 📖 Named test-double smells (Meszaros / van Deursen)

      The antipatterns above are the broad strokes; the literature names finer-grained smells you'll see in real code review. Naming them sharpens the eye:

      | Smell | What it looks like | Why it hurts |
      |---|---|---|
      | **The Mockery** | A test with so many mocks that nearly every line of the SUT is replaced. | Verifies orchestration, not behavior. Pure refactors break it. |
      | **Counting on Spies** | The test pins `assert_called_once_with(...)` after every internal call. | Couples the test to the SUT's call sequence; refactoring becomes brittle. |
      | **Unnecessary Stubs** | Stubs configured for calls the SUT does not make in this path. | Adds maintenance burden; misleads readers about what the test exercises. |
      | **Mystery Guest** | The test reads from an external file, fixture, or DB row not visible in the test method. | The reader cannot tell from the test alone what was set up or why. |
      | **Eager Test** | A single test exercises many behaviors of the SUT at once. | When it fails, the failure does not localize *which* behavior broke. |
      | **Assertion Roulette** | Many unexplained assertions in one test, none with messages. | A failure tells you the test broke; figuring out *which* assertion requires reading the code. |

      You don't have to memorize every name — the value of the catalog is *recognition*. When a teammate says "this test is a Mockery" in code review, you and they should mean the same thing.

      ## Part 1 — Read the over-mocked vs clean tests

      Open `xp_calculator.py`. The function `compute_total_xp(quests)` is **pure**: it takes a list, computes a number, returns it. No clock, no HTTP, no database. *No collaborators worth doubling*. Yet `test_xp_overmocked.py` mocks every internal helper.

      ⚙️ **Task 1:** read both `test_xp_overmocked.py` and `test_xp_clean.py`. In `test_xp_clean.py`, **uncomment the docstring at the top** and **fill in your one-line answer** to: *"What did the over-mocked version mock unnecessarily — and what did that cost?"*

      <details markdown="1"><summary>📖 What the over-mocked test actually verifies (look only after writing your answer)</summary>

      Look at `test_xp_overmocked.py`. The mocks intercept `_filter_completed`, `_apply_multipliers`, and `_sum_xp`. With those internals replaced by Mocks returning canned values, the test only verifies that **`compute_total_xp` calls the helpers in some order and returns the last one's result**. That's *not* the spec. The spec is "given these quest dicts, return the total XP."

      Worse: if a teammate refactors the internals (rename `_apply_multipliers` to `_apply_modifiers`; merge two helpers into one; inline a helper away entirely), every one of those changes preserves the function's *behavior* — but breaks the over-mocked test. **Brittleness without protection.** The clean test never breaks under those refactors because it asserts on the spec, not on the implementation choreography.

      Same lesson as Testing Foundations Step 4 ("test behavior, not implementation"), now applied to mocks instead of internal state access. The principle is one principle.
      </details>

      ## Part 2 — Classify six scenarios

      Open `scenarios.py`. For each of the six scenarios, set the variable to the **best single recommendation** from this list:

      ```
      "no_double"   "stub"   "spy"   "mock"   "fake"   "adapter"   "contract"
      ```

      The validator accepts any *defensible* answer for each scenario (some scenarios have more than one defensible answer — e.g., spy and mock are often interchangeable for a single outbound call). It rejects clearly wrong choices.

      <details markdown="1"><summary>🧰 Quick decision rubric (use, don't memorize)</summary>

      | If the SUT… | Reach for… |
      |---|---|
      | …is a pure function — same input always yields same output, no collaborators | **No double** |
      | …calls a clock, a remote service, or any non-deterministic source | **Stub** |
      | …needs to verify a fire-and-forget outbound call (e.g., `notifier.send(...)`) | **Spy** or **Mock** |
      | …needs to round-trip with a stateful collaborator (write then read) | **Fake** |
      | …calls a third-party library you don't own | **Adapter** wrapper → double the adapter |
      | …is just simple math/string/list manipulation | **No double** (don't make work) |
      | …already uses a fake or adapter, and you need confidence it still matches the real collaborator | **Contract / integration check** against the real boundary |
      </details>

      ## Part 3 — Name the remaining risk

      Every double trades reality for control. That is usually the right trade in a unit test, but it leaves a gap: a stub might not match the real API, a fake might drift from the real database, and an adapter mock cannot prove the third-party service accepts your actual request. A professional test plan says both halves out loud:

      - **This unit test proves:** the SUT behaves correctly given a controlled collaborator.
      - **This unit test does not prove:** the real collaborator still speaks the same contract.
      - **Complementary check:** a contract test, sandbox integration test, or adapter-level test that exercises the real boundary at lower frequency.

      In `scenarios.py`, classify Scenario 6 with the best recommendation for that leftover risk.

      <details markdown="1"><summary>🌍 The same decision in another language</summary>

      The decision is purely about *test design*, not about syntax. JavaScript, Java, C#, Ruby, Go — every language with serious testing culture has the same five-or-so doubles, the same antipatterns, and the same heuristic: *only mock what you own; only mock what's actually a collaborator; pure functions don't need doubles*.

      The frameworks differ; the design judgment doesn't.
      </details>

      ## Part 4 — Forward pointers

      You now have the **conceptual vocabulary** to read any test in any modern Python codebase and recognize what role each double is playing — even when the author called everything a "mock." That recognition transfers across languages.

      🔭 **Where this leads in the rest of the curriculum:**
      - **[SOLID Tutorial](/SEBook/tools/solid-tutorial)** — *Dependency Inversion* makes doubles trivial: define an interface, have the SUT depend on it, swap implementations at test time. Most painful mocks are caused by skipped DIP.
      - **[TDD](/SEBook/testing/tdd-tutorial)** — the next natural sequel: TDD where the SUT *has* collaborators from the start. Red phase becomes "decide what to double, then write the failing test."

      🪞 **Recalibrate.** Look back at Step 1 — the test that passed today and would have failed tomorrow. Your toolkit now has six things to do instead of "ship and pray":

      1. Recognize a flaky/slow/opaque collaborator (Step 1).
      2. Inject the collaborator as a parameter (Step 1).
      3. Substitute a [stub](http://xunitpatterns.com/Test%20Stub.html) when you need to control input (Step 2).
      4. Substitute a [spy](http://xunitpatterns.com/Test%20Spy.html) when you need to verify a call (Step 3).
      5. Reach for `unittest.mock` when boilerplate gets tedious (Step 4) — but recognize the role you're playing.
      6. Use `patch()` carefully — *where the SUT looks the name up* — and prefer `autospec=True` (Step 5).
      7. Choose **no double** when the real collaborator is fast, deterministic, and safe.
      8. State what the double does **not** prove, then cover important gaps with a contract or integration check.

      Those final judgments — when to skip a double, and when to back one up with a real-boundary check — are what make you good at this.

    files:
      - path: "xp_calculator.py"
        content: |
          """A PURE function for computing XP earned across quests.

          No collaborators. No clock. No HTTP. No database.
          Helper functions are private (underscore prefix) — implementation detail.
          """


          def _filter_completed(quests: list[dict]) -> list[dict]:
              return [q for q in quests if q.get("completed")]


          def _apply_multipliers(quests: list[dict]) -> list[tuple[str, int]]:
              return [(q["title"], q["xp"] * q.get("multiplier", 1)) for q in quests]


          def _sum_xp(items: list[tuple[str, int]]) -> int:
              return sum(xp for _title, xp in items)


          def compute_total_xp(quests: list[dict]) -> int:
              """Return the total XP earned from completed quests, with multipliers applied.

              Each quest is a dict with keys: title (str), xp (int), completed (bool),
              and an optional multiplier (int, default 1).
              """
              completed = _filter_completed(quests)
              with_multipliers = _apply_multipliers(completed)
              return _sum_xp(with_multipliers)
        language: "python"

      - path: "test_xp_overmocked.py"
        content: |
          """SMELL — every internal helper is mocked. Read this and recoil.

          Notice what's actually verified: nothing about the SUT's behavior.
          The mocks made up the answer; the SUT just orchestrated them.
          """
          from unittest.mock import patch
          from xp_calculator import compute_total_xp


          def test_total_xp_overmocked_brittle():
              with patch("xp_calculator._filter_completed") as mock_filter, \
                   patch("xp_calculator._apply_multipliers") as mock_apply, \
                   patch("xp_calculator._sum_xp") as mock_sum:
                  mock_filter.return_value = "<canned>"
                  mock_apply.return_value = "<canned>"
                  mock_sum.return_value = 200

                  result = compute_total_xp([{"completed": True, "xp": 50}])

                  assert result == 200
                  # The "test" passes whether or not the SUT correctly filters,
                  # multiplies, or sums — because we mocked all three.
                  # If a teammate renames _apply_multipliers, this test breaks
                  # for the WRONG reason (refactor, not behavior change).
        language: "python"

      - path: "test_xp_clean.py"
        content: |
          """Clean: no doubles. compute_total_xp is a pure function — exercise it directly."""
          # TODO: in your own words, in ONE LINE, answer the question below.
          # The validator just checks that this docstring is no longer empty.
          """The over-mocked version mocked: ___ FILL IN ___
          What that cost: ___ FILL IN ___"""

          from xp_calculator import compute_total_xp


          def test_total_xp_for_two_completed_quests():
              quests = [
                  {"title": "Slay",   "xp":  50, "completed": True,  "multiplier": 2},
                  {"title": "Find",   "xp":  30, "completed": False, "multiplier": 1},
                  {"title": "Defeat", "xp": 100, "completed": True,  "multiplier": 1},
              ]
              # 50*2 + (Find skipped: not completed) + 100*1 = 200
              assert compute_total_xp(quests) == 200


          def test_total_xp_for_no_completed_quests():
              quests = [{"title": "Skip", "xp": 999, "completed": False}]
              assert compute_total_xp(quests) == 0
        language: "python"

      - path: "scenarios.py"
        content: |
          """Classify each scenario by the BEST single recommendation.

          Allowed values:
            "no_double" — the SUT is pure (or close enough); call it directly
            "stub"      — control indirect input with canned values
            "spy"       — verify a fire-and-forget call after the fact
            "mock"      — strict behavior verification of a single contract call
            "fake"      — stateful in-memory implementation across multiple calls
            "adapter"   — wrap a third-party library, then double the adapter
            "contract"  — complementary contract/integration check for real boundary
          """

          # Scenario 1: A pure function `compute_tax(price: float, rate: float) -> float`
          # that returns price * rate. No collaborators.
          SCENARIO_1_BEST = "FILL_IN"

          # Scenario 2: A function `is_coupon_expired(coupon)` that calls datetime.now()
          # internally to compare against `coupon.expires_at`. We want a deterministic test.
          SCENARIO_2_BEST = "FILL_IN"

          # Scenario 3: `process_order(order)` POSTs to a payment gateway. The test must
          # verify the gateway was called exactly once with the right amount.
          SCENARIO_3_BEST = "FILL_IN"

          # Scenario 4: A `UserRepository` reads/writes user records to Postgres.
          # The SUT under test does many round-trips: register a user, then look them up,
          # then update their email, then look them up again. Tests run on CI without a DB.
          SCENARIO_4_BEST = "FILL_IN"

          # Scenario 5: Throughout the codebase, many modules call `requests.get(...)`
          # directly. Patching `requests` everywhere is fragile; the tests are slow.
          SCENARIO_5_BEST = "FILL_IN"

          # Scenario 6: You used a FakeUserRepository for fast unit tests. Now you
          # need confidence that the fake and the real Postgres-backed repository
          # still honor the same save/find/update behavior.
          SCENARIO_6_BEST = "FILL_IN"
        language: "python"

