      - description: "test_c plays the spy role correctly — it asserts the SUT *called* the collaborator (not just that pytest is happy)"
        command: |
          import re
          source = open('/tutorial/test_quest_service.py').read()
          if 'def test_c_mock_as_spy' not in source:
              raise AssertionError("Couldn't find test_c_mock_as_spy. Did you rename it?")
          body = source.split('def test_c_mock_as_spy')[1].split('def ')[0]

          # The spy role REQUIRES verifying a call happened. Without an assert_called_*
          # assertion, the test is a fake-spy — it would pass even if the SUT never
          # touched the collaborator.
          if not re.search(r'assert_called_once_with|assert_called_with|assert_called\(\)|call_count\s*==', body):
              raise AssertionError(
                  "test_c is supposed to verify the SUT *called* api.fetch_quests with the right args — "
                  "that's the spy role. Add an assertion like `api.fetch_quests.assert_called_once_with(\"u1\")`. "
                  "Without a call-verification assertion, the test passes whether or not the SUT actually used the collaborator — "
                  "and that defeats the entire point of using a Mock here."
              )

          # Defensive guard against `assert True` / `pass` shortcut: every spy test
          # must contain at least one assertion (the call-verification covers this,
          # but flagged explicitly so the error message is clear).
          if not re.search(r'\bassert(_|\s)', body):
              raise AssertionError(
                  "test_c has no assertion at all. The spy role still needs a verification — "
                  "use one of `assert_called_once_with`, `assert_called_with`, or `call_count == N`."
              )

