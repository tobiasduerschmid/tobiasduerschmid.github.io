          correct_index: 1
          option_feedback:
            0: "This is the most common confusion in Python testing. The *class* is `Mock`, but the *role* is determined by how the test uses the object — not by the class name. Here, `api` is configured to return a canned value; that's a stub role."
            1: "Right. `return_value` provides a controlled indirect input to the SUT. Same role as `StubQuestApiClient` from Step 2 — just generated by Mock instead of declared as a class. (Yes, Mock *also* records calls, but here the test never asserts on them. The role is determined by the test's intent.)"
            2: "Mock objects do auto-record calls, so the *capability* is there — but role is determined by what the test *uses*. This test only configures `return_value` and asserts on the SUT's return value (state verification). No call assertions are made on `api`, so its spy capability is unused — it's playing stub."
            3: "A [Fake](http://xunitpatterns.com/Fake%20Object.html) (Meszaros) has a working but lightweight implementation — typically with internal state (an in-memory dict, for example). Mock has no internal logic; it just returns whatever you configured. So this isn't a Fake."
          explanation: |
            `Mock(return_value=X)` is the framework's way of writing what
            you wrote by hand as `class StubX: def method(self): return X`.
            Same role; less typing. The class is `Mock`; the role is stub.
            (Verbatim teaching sentence in action.)

        - question: |
            When should you reach for **`side_effect`** instead of **`return_value`**?
          type: single
          options:
            - "Never — they're interchangeable; pick whichever reads better"
            - "When the collaborator should raise, vary across calls, or be computed from arguments"
            - "When you want the test to be slower (`side_effect` adds latency)"
            - "When `return_value` doesn't exist on the version of `unittest.mock` you're using"
          correct_index: 1
          option_feedback:
            0: "They are *not* interchangeable. `return_value` always returns the same canned answer; `side_effect` lets the answer vary by call (or raise an exception, or be computed from arguments). Different behaviors, different test-design uses."
            1: "Right. `side_effect` covers three patterns `return_value` cannot: (1) raise on call → exercise the SUT's `except` branch; (2) iterable → return different values on consecutive calls; (3) callable → compute return value from the args. Each one corresponds to a distinct test-design need."
            2: "Speed is a non-issue at this scale. The choice between `return_value` and `side_effect` is about *behavioral capability*, not performance."
            3: "Both have been in `unittest.mock` since at least Python 3.3. Versioning isn't the reason to prefer one over the other."
          explanation: |
            `return_value`: one canned answer for every call.
            `side_effect`: dynamic — exception-raising, sequenced returns,
            or computed-from-args. Pick based on what the *test* needs the
            collaborator to do, not by what looks shorter.

        - question: |
            A teammate writes:
            ```python
            ledger.credit.assrt_called_once_with("u1", 100)   # typo
            ```
            and the test passes. What actually happened?
          type: single
          options:
            - "Mock corrected the typo internally and called the right assert method"
            - "Mock auto-created a child mock and called *it* — no assertion ran"
            - "Mock raised an `AttributeError` and pytest caught it as a passing test"
            - "Python's interpreter detected the typo and warned via stderr"
          correct_index: 1
          option_feedback:
            0: "Mock has no auto-correct mechanism. It also has no idea you intended `assert_called_once_with` — to Mock, `assrt_called_once_with` is just another attribute name to auto-create."
            1: "Right. This is the **typo trap** — one of the most dangerous Mock pitfalls. Every attribute access on a vanilla Mock returns a new child Mock; calling `.assrt_called_once_with(...)` on that child just records *another* call, returns a new Mock, and produces no assertion. The test silently passes regardless of behavior. Step 5 introduces `autospec=True` as one defense (it restricts attribute access to the real object's interface)."
            2: "There's no `AttributeError` because Mock auto-creates attributes. That's the whole problem — the failure mode is *silent*."
            3: "Python doesn't warn about typo'd method names — to the language, `assrt_called_once_with` is a perfectly valid attribute name. Static analyzers (mypy, pylint) might flag it; the runtime won't."
          explanation: |
            **The typo trap.** Mock's auto-attribute behavior — convenient for
            quickly stubbing nested attribute chains — also silently swallows
            typos in `assert_*` method names. The test passes; the assertion
            never ran. Step 5's `autospec=True` is one defense; using mypy or
            calling `assert_called_once_with` (no underscore typo) carefully
            is another.

        - question: |
            **(Spaced review — TDD)** During the **Red-Green-Refactor** cycle, when do you typically introduce a Mock?
          type: single
          options:
            - "Before Red — Mocks must exist before the test is written"
            - "During Red — choosing which double to use is part of test design"
            - "During Refactor only — Mocks are exclusively a code-cleanup tool"
            - "Never — TDD forbids Mocks"
          correct_index: 1
          option_feedback:
            0: "There's nothing to mock until you write the test — and the test names which collaborators it needs to control. Setting up Mocks before the test exists is putting the cart before the horse."
            1: "Right. The Red phase is where you *design the test* — including which collaborators to double and what role each should play. Green just makes the SUT pass; Refactor improves the code under a green safety net. The double choice is a Red-phase test-design decision."
            2: "Mocks aren't a refactor-only tool. They're a test-design tool that supports refactoring (by making behavior verifiable in isolation) — but the choice happens during Red."
            3: "TDD doesn't forbid Mocks; it just emphasizes that *the test* drives design. Mocks are one of the design moves available — used judiciously when the SUT genuinely depends on collaborators."
          explanation: |
            Red is the test-design moment. Choosing stub/spy/mock/fake/no-double
            is a Red-phase decision because it shapes both the test's structure
            *and* (often) the production design that emerges in Green. (Step 6
            covers when *not* to double — also a Red-phase decision.)

        - question: |
            Why is pytest's `monkeypatch` fixture **automatically restoring** the original value an important property?
          type: single
          options:
            - "It makes monkeypatch faster than `unittest.mock`"
            - "Without it, a patched value would leak into later tests"
            - "It's a Python 3.11+ feature for memory management"
            - "It's only needed when you're patching `__builtins__`"
          correct_index: 1
          option_feedback:
            0: "Speed is irrelevant. The benefit is *correctness across a test suite*, not microseconds per test."
            1: "Right. Test isolation is non-negotiable: a test that mutates global state and forgets to clean up corrupts every test that runs after it — silently breaking tests that don't even know they're using a patched value. monkeypatch (and `unittest.mock.patch` as a context manager / decorator) automate the cleanup, so you can't forget."
            2: "monkeypatch has been in pytest for many years; it's not a Python 3.11 feature. And cleanup is a *correctness* concern, not a memory-management one."
            3: "monkeypatch can patch any attribute — module functions, class methods, instance attributes, dictionary entries. It's not limited to `__builtins__`."
          explanation: |
            Test isolation. A test that patches a module attribute and
            forgets to restore it leaves a time bomb for every subsequent
            test. `monkeypatch` and `with patch(...)` both handle restoration
            for you; manual `setattr`/`delattr` does not. Always prefer the
            framework-managed forms.


  # --------------------------------------------------------------------------
  # STEP 5 — True Mock + the #1 Python Pitfall: Patch Where It's Looked Up
  # Pedagogy:
  #   Threshold concept #3   — Behavior verification: the call IS the spec.
  #   Productive failure     — wrong patch target lets the real function run;
  #                            student observes the failure and corrects.
  #   Concept generalization — namespace scoping is universal (Python's
  #                            `from x import y` is JS's `const { y } = require('x')`).
  #   Concept over syntax    — student fills in ONE patch-target string. The
  #                            insight is "where does the SUT look this name up?"
  #   Variation Theory       — two tests on the same SUT, only the patch target
  #                            varies — so the patch target stands out as the
  #                            consequential dimension.
  # --------------------------------------------------------------------------
  - title: "Where to Patch — The #1 Python Pitfall, and Why autospec Defends You"
    instructions: |
      ### Why this matters

      The single most common Python-mocking bug is patching the *wrong namespace*. Your test runs, no error is raised, but `mock_send` was never called and the real `send_push` ran behind the scenes. The rule is one sentence — *patch where the SUT looks the name up, not where it was defined* — but the trap catches everyone at least once. Pair that with `autospec=True` (a guardrail that makes your Mock as strict as the real callable it's replacing) and you've defused two of the production-only failure modes of `unittest.mock`.

      ### 🎯 You will learn to

      - Apply the rule "patch where the SUT looks up the name" to pick the right `patch()` target
      - Evaluate when `autospec=True` is needed to defend against signature drift
      - Analyze [behavior verification](http://xunitpatterns.com/Behavior%20Verification.html) (Meszaros) versus the [state verification](http://xunitpatterns.com/State%20Verification.html) of Steps 2-3

      🧭 **Bridge from Step 4.** Step 4 used Mocks at constructor parameters — `DailyQuestService(clock, api, ledger)` accepts the doubles directly. Sometimes that's not possible: the SUT might call a *module-level function* directly, with no constructor parameter to swap. Then we use `unittest.mock.patch()` — and confront the canonical Python pitfall: **where in the namespace does the patch belong?**

      ### 📖 The new SUT — `celebrate_milestone`

      Look at `quest_service.py`. There's a new method `celebrate_milestone(user_id, days)` that calls `send_push(...)` from `push_notifier`. The import line in `quest_service.py` is:

      ```python
      from push_notifier import send_push
      ```

      That single line is **the source of every where-to-patch confusion in Python**. After this import, `send_push` is bound *in `quest_service`'s namespace*. The `quest_service` module now has its *own reference* to the function — separate from `push_notifier`'s.

      ```mermaid
      flowchart LR
          subgraph push_mod["push_notifier module"]
              P_DEF["send_push<br/>= &lt;real function&gt;"]:::neutral
          end
          subgraph quest_mod["quest_service module"]
              Q_REF["send_push<br/>= &lt;ref to real function&gt;"]:::neutral
              Q_USE["celebrate_milestone<br/>calls send_push(...)<br/>looks up 'send_push' HERE"]:::sut
              Q_REF -.->|"looked up in<br/>this namespace"| Q_USE
          end
          P_DEF -->|"from push_notifier import send_push<br/>copies the reference"| Q_REF
          classDef neutral fill:#fafafa,stroke:#bdbdbd,color:#424242
          classDef sut fill:#fff3e0,stroke:#e65100,color:#bf360c
      ```

      ### 📜 The rule

      > **Patch where the SUT *looks up* the name — not where it was originally *defined*.**

      `celebrate_milestone` does `send_push(...)`. Python finds that name by looking it up in `quest_service`'s namespace (the importing module). So the patch target is `"quest_service.send_push"`, **not** `"push_notifier.send_push"`. Patching the latter does nothing — `quest_service` already has its own reference.

      ## Part A — Predict and fix the patch target

      ⚙️ **Task:** open `test_celebrate.py`. The patch target is currently **wrong**. Run the test (it fails). Read the failure carefully — `mock_send` was *never called*, even though the SUT *did* run `celebrate_milestone`. That's the signature of a wrong-namespace patch.

      Then **fix it**: change the patch target string to the right one. Re-run.

      💡 **Pedagogical note.** Your fix is one string change. The conceptual move is *naming where the SUT looks the name up*. That insight ports to JavaScript (CommonJS' `const { y } = require('x')` has the same trap) and Java (static imports have a similar effect). Once you internalize the rule, you stop being trapped by the syntax.

      ## Part B — autospec is a design guardrail, not a syntactic flourish

      Read the *second pair of tests* in the file: `test_loose_mock_accepts_wrong_call` and `test_autospec_rejects_wrong_call`. Both run successfully — but they verify *very different* things.

      | Concern | Loose Mock (no spec) | Autospec'd Mock |
      |---|---|---|
      | Setup | `with patch("X") as m:` | `with patch("X", autospec=True) as m:` |
      | What `m(wrong_args)` does | Silently records the call | Raises `TypeError` because the real function's signature is enforced |
      | What `m.assrt_called_once_with(...)` (typo) does | Silently auto-creates an attribute, returns yet another Mock | Same in current Mock — `autospec` defends primarily against *call-signature drift*, not assertion-method typos. Use linters / mypy for the typo defense. |
      | When you'd want it | Quick exploratory test where signature isn't a concern | **Default-safe habit** for any patched callable — catches signature drift the moment a teammate's refactor breaks the contract |

      The pedagogical takeaway: **`autospec=True` is a design guardrail.** It says "make this Mock as strict as the real thing it's replacing." Without it, your test silently accepts calls that the real function would reject — until production catches it for you, which is the worst place to find out.

      <details markdown="1"><summary>📖 Behavior verification — the third kind</summary>

      Steps 2 and 3 used **state verification**: stubs feed inputs, the test asserts on the SUT's return value or on the spy's recorded list. The SUT's *internal call sequence* was incidental.

      `test_celebrate_milestone_sends_push` (after you fix the patch target) is different. The SUT returns `None`. Nothing in its observable state changes. The *call itself* is the entire contract. We assert that `mock_send` was called once with specific arguments. That's **[behavior verification](http://xunitpatterns.com/Behavior%20Verification.html)** (Meszaros).

      A `Mock` configured with call assertions is, in Meszaros' strict sense, a **[Mock Object](http://xunitpatterns.com/Mock%20Object.html)**. The role isn't "what class did you instantiate" — it's "what does the test verify, and how?"

      | Role | What the test verifies | Verification kind |
      |---|---|---|
      | [Stub](http://xunitpatterns.com/Test%20Stub.html) | The SUT's return value (driven by canned indirect inputs) | [State](http://xunitpatterns.com/State%20Verification.html) |
      | [Spy](http://xunitpatterns.com/Test%20Spy.html) | The recorded call list, after the fact | [State](http://xunitpatterns.com/State%20Verification.html) (of the spy) |
      | [Mock Object](http://xunitpatterns.com/Mock%20Object.html) | The interaction itself, often with strict expectations | **[Behavior](http://xunitpatterns.com/Behavior%20Verification.html)** |
      </details>

      <details markdown="1"><summary>🌍 The same idea in another language</summary>

      **JavaScript with Jest (CommonJS):** *Same trap exists.*
      ```javascript
      // questService.js
      const { sendPush } = require('./pushNotifier');
      function celebrateMilestone(...) { sendPush(...); }
      ```
      `jest.mock('./pushNotifier')` works because Jest hoists this and intercepts at the require boundary. But if the consumer destructures and you only mock the original module, ES module imports can desync — same family of problem.

      **Java with Mockito static imports:** Less prone to this since Java imports are class-level and Mockito patches at the type level. But `PowerMock` for static methods has its own where-to-patch dance.

      **The general lesson, language-independent:** *a name lives in the namespace of the module that introduces it*. Patch there.
      </details>

      <details markdown="1"><summary>📖 `spec`, `spec_set`, `autospec`, `seal` — four progressively-stricter guardrails</summary>

      Python's `unittest.mock` offers a small family of guardrails that *all* solve the same broad problem (a vanilla `Mock()` accepts every attribute access and every call), but at different levels of strictness:

      | Guardrail | What it restricts | Catches |
      |---|---|---|
      | `Mock(spec=Foo)` | Attribute *access* — `mock.bogus_method` raises `AttributeError` | Calls to methods the real class doesn't have |
      | `Mock(spec_set=Foo)` | Attribute access AND attribute *assignment* — `mock.new_attr = 5` also fails | The above, plus tests that accidentally add bogus state to the mock |
      | `patch(..., autospec=True)` / `create_autospec(Foo)` | All of the above, *plus* call-signature enforcement | Calls with the wrong number/types of arguments — signature drift |
      | `mock.seal(m)` | Stops further auto-attribute creation on an *existing* Mock tree from that point onward | Late additions of bogus attributes after partial configuration |

      Use `autospec` (or `create_autospec`) as the default for patched callables. Reach for `spec_set` when you want strict attribute control without paying the cost of full signature inspection. Reach for `seal` when you've configured a Mock with a few legitimate attributes and want everything *else* on it to fail loudly.

      None of these are silver bullets — they catch signature and attribute drift, not assertion-method typos. For typos, mypy/pyright and linters are still the right answer.
      </details>

      <details markdown="1"><summary>🧠 The typo trap and `autospec` — the precise truth</summary>

      A common claim: "autospec catches typos like `assrt_called_once_with`." Half-true. Here's the precise picture.

      `autospec=True` constrains the Mock to the *spec of the patched object* — its arguments, its attributes (if it's a class), its method signatures. **For attribute access**, autospec does restrict the Mock to attributes the real object has — but `assert_*` methods are part of the *Mock's* interface, not the real object's. So `mock.assrt_called_once_with` may or may not be caught depending on Python version and exact patching shape.

      **The reliable defense against `assrt_called_once_with` typos:** mypy or pylint, not autospec. Don't rely on autospec for typo prevention.

      **The reliable defense against signature drift** (calling `send_push("u1")` when the real function needs `send_push("u1", "msg")`): **autospec catches this immediately**. That's the use case worth the keystrokes.
      </details>

      ### 🪞 What this test proves — and doesn't

      ✏️ **Predict first:** the patched test confirmed the SUT *makes the call* with the right arguments. What real-world failure mode does the test still not catch — even with the patch target correct and `autospec=True` enabled? Commit to an answer in your head, then check below.

      | Claim | What it means |
      |---|---|
      | **Proves** | The SUT looks `send_push` up in `quest_service`'s namespace and calls it with the right arguments when the streak hits a multiple of 7. `autospec=True` (Test C) also proves the signature matches the real callable's. |
      | **Does not prove** | That the real `push_notifier.send_push` actually dispatches a notification to APNS/FCM, handles delivery failures, or respects rate limits. |
      | **Remaining risk** | The patch intercepts the *call*; it cannot verify what would have happened *through* the call. **Complementary check:** an integration test that uses a real (sandbox) APNS endpoint, or — more commonly — an adapter test where `push_notifier` is wrapped in a class your code owns, and the adapter has its own contract tests against the real third-party (Step 6 covers this pattern). |

      🔭 **Coming in Step 6:** You can build any of the three roles and you know the patching pitfalls. The harder skill is choosing which one — *and choosing none at all when over-mocking would brittlify the test*.

    files:
