          - title: "Match each scenario to one rubric row"
            text: "Use the decision rubric in the instructions. Pure function = no double. Clock = stub. Fire-and-forget call = mock/spy. Stateful round-trip = fake. Third-party = adapter. Fake drift / real-boundary confidence = contract."
            condition: "code_missing: adapter"
          - title: "The rubric, with no answers attached"
            text: |
              You'll classify six scenarios into one of these categories. Match each scenario by what the *test* needs from the collaborator:

              - `"no_double"` — the collaborator is a pure function (no I/O, no state). Use the real one.
              - `"stub"` — the test only needs the collaborator to *return* a canned value (or raise).
              - `"spy"` — the test needs to verify the collaborator *was called* (with what args).
              - `"mock"` — same as spy but with up-front behavior expectations (Meszaros-strict sense).
              - `"fake"` — the test needs the collaborator to behave like a real one but cheaper (e.g., in-memory DB).
              - `"adapter"` — the collaborator is a third-party library you don't own; wrap it, then mock the wrapper.
              - `"contract"` — a double is already useful, but you need a complementary check that the fake/adapter still matches the real boundary.

              Now read each scenario and pick the smallest tool that does the job. Don't reach for the answer key — work through the rubric.
            condition: "code_missing: adapter"

    quiz:
      title: "Step 6 — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            A test mocks every internal helper of the SUT and asserts only on the mocks' return values. Which **antipattern** is this?
          type: single
          options:
            - "Behavior verification — the test checks how the SUT works"
            - "Over-mocking — the test verifies orchestration, not behavior"
            - "Solitary unit testing — the canonical and recommended style"
            - "Liar test — the assertions don't actually run"
          correct_index: 1
          option_feedback:
            0: "This is over-mocking, not behavior verification. [Behavior verification](http://xunitpatterns.com/Behavior%20Verification.html) (Meszaros) is *one* call against an architectural-boundary collaborator — not every internal helper. Mocking internals couples the test to implementation choreography rather than to the spec."
            1: "Right. Mocks should sit at architectural boundaries (HTTP, DB, clock, notifier) — not at every internal helper. A pure refactor that renames or merges any internal helper breaks the test even though behavior is unchanged. Same lesson as Testing Foundations Step 4 (\"behavior, not implementation\"), in mock-shaped clothing."
            2: "Solitary testing means \"isolate the SUT from external collaborators (DBs, clocks, networks).\" It does *not* mean \"mock every internal helper.\" Internal helpers belong to the SUT's own module — mocking them is over-mocking. Solitary doesn't endorse this."
            3: "Liar tests have weak oracles (`is not None`). The over-mocked test's assertions ARE running and are technically strong (`==` against a canned value). The problem is what they assert *about* — implementation details, not the spec."
          explanation: |
            Mock at the architectural boundary; let internal helpers be real.
            The line "this collaborator is worth doubling" runs through the
            *boundary* between your code and the unpredictable world (clock,
            HTTP, DB, queue) — not through every function-call edge inside
            your own module.

        - question: |
            **(Cumulative review)** Match each scenario to the **best single double**:

            - A: A pure function that adds two integers
            - B: A function that calls `datetime.now()` to decide an expiration
            - C: A function that POSTs to a payment gateway, fire-and-forget
            - D: A function that round-trips with a Postgres user table 5 times
          type: single
          options:
            - "A: stub, B: stub, C: mock, D: fake"
            - "A: no_double, B: stub, C: mock (or spy), D: fake"
            - "A: mock, B: mock, C: mock, D: mock — all are mocks"
            - "A: spy, B: spy, C: spy, D: spy — spies are universally safe"
          correct_index: 1
          option_feedback:
            0: "A is wrong. A pure integer-adding function has no collaborator — there's no place to plug a stub. Doubling it is pure ceremony with no benefit."
            1: "Right. A: pure function → no double. B: clock → stub. C: outbound call → mock or spy (interchangeable in `unittest.mock`). D: stateful round-trip → fake."
            2: "Conflating `Mock` the class with `Mock` the role. Pure functions don't need any double; clock stubs return canned values (stub role), not strict expectations (mock role); stateful round-trips need fakes."
            3: "Spies record calls. A pure function doesn't make outbound calls (nothing to record). A clock-dependency test wants to *control input* (stub), not *observe output*. Spy isn't universally safe; it's specifically for fire-and-forget output verification."
          explanation: |
            The rubric: pure → no double; non-deterministic → stub; outbound
            call → spy/mock; stateful sequence → fake. Memorize the rubric
            shape (the diagram in the instructions); the words follow.

        - question: |
            You use a `FakeUserRepository` so unit tests can run without Postgres. Those tests pass. What **remaining risk** should the test plan cover?
          type: single
          options:
            - "No remaining risk — a passing fake-based unit test proves the real repository works too"
            - "The fake may drift from the real repository — add a contract or integration check"
            - "The unit test needs more mocks around the fake's internal dictionary"
            - "The fake should be deleted immediately; fakes are never appropriate for repositories"
          correct_index: 1
          option_feedback:
            0: "A fake trades reality for speed and control. Passing fake-based unit tests prove the SUT's behavior against the fake, not the real repository's schema, constraints, transactions, or adapter wiring."
            1: "Right. Fakes are useful, but they are promises. A shared contract test or sandbox integration test against the real boundary keeps the fake and the real repository's save/find/update contract aligned."
            2: "Mocking the fake's internals would make the test more coupled without checking the real risk. The risk is fake-vs-real drift at the repository boundary, not how the fake stores state internally."
            3: "Fakes are often the cleanest choice for stateful collaborators. The professional move is not 'never fake'; it is 'fake for fast unit feedback, then cover important fake-vs-real gaps with contract or integration checks.'"
          explanation: |
            Every double creates a gap from reality. With a fake, the gap is
            behavioral drift: the in-memory version may stop matching the real
            repository. Cover that gap with a shared contract test or a
            lower-frequency integration test against the real boundary.

        - question: |
            **"Don't mock what you don't own."** What does this rule *actually* mean?
          type: single
          options:
            - "Never use `unittest.mock` — only roll your own classes"
            - "Wrap third-party libraries in your own Adapter; then mock the Adapter"
            - "Only mock objects you instantiated yourself in the test"
            - "Don't share mocks between test files"
          correct_index: 1
          option_feedback:
            0: "`unittest.mock` is fine — you can use it on objects you own. The rule is about *what you mock*, not which library you use."
            1: "Right. Wrap third-party libraries in your own thin Adapter class (Adapter pattern) so your code depends on *your* type, then mock that type. Benefits: tests don't break when the third-party releases a new version; the mock surface is tiny and stable; you can swap the underlying library if needed. Hynek Schlawack's essay \"Don't Mock What You Don't Own\" lays this out crisply."
            2: "Object-instance ownership isn't the rule. The rule is about *interface* ownership — whose contract you're depending on."
            3: "Sharing mocks across test files is its own concern (often a bad idea), but it's unrelated to the \"mock what you own\" rule."
          explanation: |
            \"Mock what you own\" is shorthand for \"depend on interfaces you
            control, then mock those interfaces.\" The Adapter pattern from
            classical OO (and the Adapter pattern in design-patterns
            literature) is exactly the maneuver this rule recommends.

        - question: |
            **(Spaced review — TDD)** During Red-Green-Refactor, when do you typically decide *which double* to use?
          type: single
          options:
            - "Refactor — you start with real collaborators and double them later"
            - "Red — double choice is test design, decided as you write the test"
            - "Green — you add doubles when the test is red and you need to make it pass"
            - "It doesn't matter which phase — doubles are an implementation detail"
          correct_index: 1
          option_feedback:
            0: "Refactor changes structure under a green safety net. Choosing a double mid-refactor would change what the test verifies, which violates the safety net principle."
            1: "Right. Red is the test-design moment. The choice of stub vs spy vs mock vs fake vs no-double shapes both the test's structure AND (often) the production design that emerges in Green. Choosing late means rewriting the test."
            2: "Green is just \"make the failing test pass with the smallest code change.\" Adding a double during Green would mean modifying the test, which corrupts the discipline (you're chasing the test rather than letting it drive)."
            3: "It does matter. The double choice is a *test-design* decision that affects what the test verifies and how the production code is shaped. Treating it as an implementation detail leads to over-mocking and brittle suites."
          explanation: |
            Choosing a double is part of test design; test design happens in
            Red. Same lesson as Testing Foundations Step 5: input choice and
            oracle strength are independent test-design dimensions, both
            decided when you *write the test*. Add \"choice of double\" as a
            third independent dimension.

        - question: |
            **(Spaced review — Step 3)** Step 3's `test_complete_quest_LIAR_oracle` was left in the file *intentionally* — `assert len(spy.calls) >= 0` passes regardless of behavior, and Step 3 asked you to comment on it rather than fix it. Why keep a known-broken test in the file?
          type: single
          options:
            - "It shouldn't be kept — leaving broken tests in the suite is always wrong"
            - "Leaving it as a durable artifact trains the eye to spot the pattern in real codebases"
            - "The Liar test technically passes, so it provides regression coverage for the SUT"
            - "Refactoring it into a strong assertion would change what the test verifies"
          correct_index: 1
          option_feedback:
            0: "In a real production suite, you'd fix or delete it. In a *teaching* file, the Liar serves as a **durable artifact** — students return to the file and re-encounter the bad pattern alongside the good ones. That recognition skill is exactly what's needed when reading a real codebase, where Liar tests are common."
            1: "Right. Real-world codebases are full of Liar tests committed by tired engineers under deadline. The Liar shape is recognizable; the skill of *spotting* one on sight is what the Step 3 file builds. Pattern-recognition through durable bad-example artifacts is a deliberate pedagogical move — same family as showing students misspelled words alongside correct ones in language education."
            2: "A test that always passes provides *no* regression coverage — that's the entire definition of a Liar. The fact that it never goes red is the bug, not a feature."
            3: "True for *that* specific test (it would no longer be a Liar after refactor), but irrelevant to why we leave Liars in teaching files. The reason is pattern-recognition, not preservation of intent."
          explanation: |
            Most testing tutorials only show good tests. Real codebases have
            both. Keeping a Liar in the file alongside a Goldilocks test
            trains the eye to discriminate — a skill students need on day 1
            of a real job, where most tests they read will be imperfect.
            (Same reasoning behind Step 6's `test_xp_overmocked.py` — kept
            in the file as a recognizable bad example, not deleted.)

        - question: |
            **(Spaced review — Step 5)** Why is `autospec=True` worth almost always reaching for when you patch a callable?
          type: single
          options:
            - "It runs the patched function in a separate process for safety"
            - "It enforces the real callable's signature on the Mock, catching drift"
            - "It catches typos in `assert_*` method names reliably"
            - "It's required by the Mock library — without it, patches don't apply"
          correct_index: 1
          option_feedback:
            0: "No process isolation involved. autospec is a runtime introspection of the patched object's signature."
            1: "Right. The moment a teammate's refactor changes the production signature, the test's calls to the mock raise `TypeError` immediately instead of silently accepting drift. autospec is a design guardrail — \"make the mock as strict as the real thing.\" Signature drift is the most common refactoring bug; autospec catches it the moment the test runs. The cost is a few extra characters; the benefit is a real-world bug class entirely defended."
            2: "Half-myth. autospec primarily enforces *call signatures*, not assertion-method spelling. The reliable typo defense is mypy/pylint."
            3: "Patches work without autospec — they just don't enforce signatures. autospec is a safety strict-mode, not a requirement."
          explanation: |
            Default-safe habit: use `autospec=True` whenever you're patching
            a callable. It costs nothing at edit time, catches a real-world
            bug class at test time, and makes refactoring safer in the long
            run.


