      - description: "test_d uses ConnectionError as side_effect (the exception the SUT catches)"
        command: |
          import re
          source = open('/tutorial/test_quest_service.py').read()
          body = source.split('def test_d_side_effect_simulates_api_failure')[1].split('def ')[0]
          assert 'ValueError' not in body, \
