title: "Defensive Programming in Python"
description: "A 75-90 minute Python tutorial for students who already know functions, classes, exceptions, and basic pytest. You will practice rejecting bad input clearly, preserving valid state, and keeping failure information visible instead of quietly hiding caller bugs."

# Authoring-time Bloom-verb objectives. Not yet rendered to students.
learning_objectives:
  - "Classify inputs into valid edge cases, malformed values, out-of-range values, and wrong-type values before writing validation code."
  - "Apply precise Python exception types so caller mistakes fail with actionable signals."
  - "Evaluate when defensive code should reject input instead of silently repairing it."
  - "Enforce object invariants at construction time and preserve them through public methods."
  - "Translate external failures into domain-specific exceptions without hiding the original cause."
  - "Create a small parser whose validation, exception behavior, and postconditions are all covered by tests."

backend: pyodide
pytest: true
linter: true
editor_split: true
output_height: "25%"
require_tests: true
autosave_type: files

setup_commands:
  - "import pyodide_js; await pyodide_js.loadPackage('pytest')"
  - "import sys; sys.path.insert(0, '/tutorial')"
  - |
    import pytest as _pytest, sys as _sys
    def _make_pytest_patch():
        _orig = _pytest.main
        _sysmod = _sys
        def _patched(*a, **kw):
            for m in list(_sysmod.modules):
                if m.startswith('test_') or m in (
                    'percentages',
                    'repeat_text',
                    'ranges',
                    'intervals',
                    'config_loader',
                    'ports',
                ):
                    del _sysmod.modules[m]
            return _orig(*a, **kw)
        return _patched
    _pytest.main = _make_pytest_patch()

steps:

  # Pedagogy: PRIMM — classify examples and non-examples before implementing.
  - title: "Behavior From Examples"
    instructions: |
      ### Why this matters

      Defensive programming starts before the first `if`: you decide which inputs belong to the function's contract and which ones are caller mistakes. Good examples and non-examples keep validation focused instead of turning it into guesswork.

      ### 🎯 You will learn to

      - Analyze valid and invalid examples as partitions of the input space.
      - Convert examples into a small contract before writing code.
      - Distinguish wrong type, malformed value, out-of-range value, and valid edge case.

      ### Predict the contract

      Study this intended function:

      ```python
      def parse_percentage(text: str) -> float:
          ...
      ```

      It should accept these strings:

      - `"0%"` returns `0.0`
      - `"25%"` returns `25.0`
      - `"100%"` returns `100.0`
      - `" 7% "` returns `7.0`

      It should reject these values:

      - `""`, because there is no percentage text
      - `"25"`, because the percent sign is missing
      - `"-1%"`, because the value is below the valid range
      - `"101%"`, because the value is above the valid range
      - `"abc%"`, because the numeric part is not a number
      - `25`, because the value has the wrong type

      Before you continue, write one sentence that describes the contract. A strong version says something like: "The caller must pass a string that, after surrounding whitespace is ignored, is a numeric percentage with a percent sign and a value from 0 through 100."

      ### Why no code yet?

      This first step is a classification checkpoint. If you cannot sort an input into the right failure category, the implementation usually becomes either too permissive (`"25"` becomes accepted) or too vague (`ValueError` for everything, including wrong types).

    files:
      - path: "percentages.py"
        language: "python"
        content: |
          def parse_percentage(text: str) -> float:
              """Return the numeric value in a percentage string.

              Contract draft:
                - caller passes a string
                - surrounding whitespace is ignored
                - the cleaned value ends with "%"
                - the number before "%" is in the inclusive range 0..100
              """
              raise NotImplementedError("You will implement validation in later steps.")

    open_file: "percentages.py"
    run_file: "percentages.py"

    quiz:
      title: "Step 1 — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - type: single
          difficulty: basic
          question: |
            `parse_percentage(25)` is invalid for which reason?
          options:
            - "Wrong type: the function contract asks for a string."
            - "Malformed value: the percent sign is missing."
            - "Out of range: 25 is too large."
            - "Valid edge case: 25 means 25 percent."
          correct_index: 0
          option_feedback:
            1: "Malformed-value checks happen after the caller has supplied the right kind of value. Here the caller supplied an `int`, not a `str`."
            2: "The value 25 would be in range if it came from a valid percentage string. The first problem is the type."
            3: "Accepting a bare number would silently expand the contract. This function is specifically parsing percentage strings."
          explanation: "The caller violated the type part of the contract. Defensive code should report that as a type problem, not try to reinterpret the integer."

        - type: single
          difficulty: basic
          question: |
            `parse_percentage("25")` is invalid for which reason?
          options:
            - "Wrong type: the input is not a string."
            - "Malformed value: the required percent sign is missing."
            - "Out of range: 25 is outside 0 through 100."
            - "Valid edge case: 25 is exactly on a boundary."
          correct_index: 1
          option_feedback:
            0: "`\"25\"` is a string, so the type part of the contract is satisfied. The shape of the string is the problem."
            2: "The numeric value 25 is inside the allowed range. Range checks happen after the string has the required form."
            3: "The boundary values are 0 and 100. This input also lacks the percent sign the parser promises to require."
          explanation: "The value has the right type but the wrong shape. A parser that accepts both `\"25\"` and `\"25%\"` is no longer enforcing the stated contract."

        - type: single
          difficulty: basic
          question: |
            `parse_percentage("101%")` is invalid for which reason?
          options:
            - "Wrong type: strings cannot represent percentages."
            - "Malformed value: `101` is not numeric."
            - "Out of range: the numeric value is above 100."
            - "Valid edge case: the percent sign is present."
          correct_index: 2
          option_feedback:
            0: "Strings are exactly what this parser accepts. The type is not the issue."
            1: "`101` can be parsed as a number. The problem appears after parsing, when the value is compared with the allowed range."
            3: "Having a percent sign is necessary, but not sufficient. The numeric value still has to be between 0 and 100 inclusive."
          explanation: "This is a range violation: the input has the right type and shape, but the parsed numeric value is outside the contract."

        - type: single
          difficulty: intermediate
          question: |
            Which input is a valid edge case for this contract?
          options:
            - "`\"0%\"`"
            - "`\"-1%\"`"
            - "`\"abc%\"`"
            - "`\"\"`"
          correct_index: 0
          option_feedback:
            1: "A value just below the lower boundary is useful to test, but it belongs in the rejected partition."
            2: "The percent sign is present, but the numeric part cannot be parsed as a number."
            3: "The empty string is malformed because it has no number and no percent sign."
          explanation: "`\"0%\"` sits exactly on the lower boundary and is included by the contract. Boundary values are worth testing precisely because one wrong comparison can reject them."

        - type: single
          difficulty: intermediate
          question: |
            Four programmers each propose a different implementation strategy for `parse_percentage`. Which strategy is the most defensive — and why?
          options:
            - "Reject non-strings with `TypeError`, reject malformed/out-of-range strings with `ValueError`, return the value only after every check passes."
            - "Coerce anything that looks numeric: `float(str(text).rstrip('%')) / 100.0`. Always return a number."
            - "Wrap the body in `try: ... except Exception: return 0.0` so the caller never sees an exception."
            - "Return `None` for any input that doesn't parse cleanly; let the caller check the result."
          correct_index: 0
          option_feedback:
            1: "Coercion silently widens the contract. `parse_percentage(None)` would become `parse_percentage(\"None\")` and then fail somewhere deeper, far from the actual mistake."
            2: "Broad exception swallowing hides the *kind* of failure (empty string vs malformed number vs out-of-range) behind one indistinguishable return value. The caller has no way to repair the input."
            3: "Sentinel returns force every caller to add a check, and they confuse 'unparseable' with 'legitimately 0.0%'. Explicit exceptions are easier for callers to handle correctly."
          explanation: "Defensive programming is about *making the failure tell the caller what to fix*. Distinct exception classes do that — they make the kind of mistake (wrong type vs wrong shape vs wrong value) visible at the point of failure. The other three strategies all silently broaden, swallow, or flatten the failure signal."

  # Pedagogy: worked example with fading — students implement precise exception branches from tests.
  - title: "Precise Exceptions"
    instructions: |
      ### Why this matters

      Defensive code is more useful when the failure tells the caller what kind of mistake they made. Python already has a useful split: `TypeError` for the wrong kind of value, `ValueError` for the right kind of value with an unacceptable value.

      ### 🎯 You will learn to

      - Apply `TypeError` and `ValueError` to different validation failures.
      - Use `pytest.raises` to verify the exact exception type.
      - Reject `bool` where an integer count is required.

      ### Your task

      Open `repeat_text.py`. Implement:

      ```python
      def repeat(text: str, times: int) -> str:
          ...
      ```

      Contract:

      - `text` must be a `str`; otherwise raise `TypeError`.
      - `times` must be an `int`, but not `bool`; otherwise raise `TypeError`.
      - `times` must be non-negative; otherwise raise `ValueError`.
      - Valid inputs return `text * times`.

      The tests check exact exception classes. A subclass or a broad `Exception` is not enough because the exception choice is the learning target here.

    files:
      - path: "repeat_text.py"
        language: "python"
        content: |
          def repeat(text: str, times: int) -> str:
              """Return text repeated times times."""
              return text * times

      - path: "test_repeat_text.py"
        language: "python"
        content: |
          import pytest
          from repeat_text import repeat


          def test_repeats_text_for_valid_count():
              assert repeat("ha", 3) == "hahaha"
              assert repeat("ha", 0) == ""


          def test_wrong_text_type_is_type_error():
              with pytest.raises(TypeError) as excinfo:
                  repeat(123, 2)
              assert excinfo.type is TypeError


          def test_wrong_times_type_is_type_error():
              with pytest.raises(TypeError) as excinfo:
                  repeat("ha", "3")
              assert excinfo.type is TypeError


          def test_negative_times_is_value_error():
              with pytest.raises(ValueError) as excinfo:
                  repeat("ha", -1)
              assert excinfo.type is ValueError

    open_file: "repeat_text.py"
    run_file: "test_repeat_text.py"

    tests:
      - description: "Valid repetition works and invalid calls raise precise exception types"
        command: |
          import pytest, io, sys
          old = sys.stdout
          sys.stdout = buf = io.StringIO()
          code = pytest.main(['/tutorial/test_repeat_text.py', '-v', '--tb=short', '--no-header'])
          sys.stdout = old
          output = buf.getvalue()
          print(output)
          assert code == 0, output

          from repeat_text import repeat
          with pytest.raises(TypeError) as excinfo:
              repeat("ha", True)
          assert excinfo.type is TypeError, "Treat bool as the wrong kind of value for an integer repeat count."
        hints:
          - title: "Separate kind from value"
            text: "Ask two questions before multiplying: are the arguments the right kinds of objects, and is the count acceptable?"
          - title: "Check bool deliberately"
            text: "In Python, `bool` is a subclass of `int`. If the contract says an integer count, reject `True` and `False` explicitly before accepting `int`."
            condition: "code_missing: bool"
          - title: "Raise before multiplying"
            text: "The validation should happen before `text * times`; otherwise Python may raise its own less focused exception before your contract checks run."
            condition: "code_missing: raise"

    solution:
      files:
        - path: "repeat_text.py"
          language: "python"
          content: |
            def repeat(text: str, times: int) -> str:
                """Return text repeated times times."""
                if not isinstance(text, str):
                    raise TypeError("text must be a string")
                if isinstance(times, bool) or not isinstance(times, int):
                    raise TypeError("times must be an integer")
                if times < 0:
                    raise ValueError("times must be non-negative")
                return text * times
      explanation: |
        The implementation checks the type part of the contract first, then the value constraint. That keeps the exception type aligned with the caller's mistake.

    quiz:
      title: "Step 2 — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - type: single
          difficulty: basic
          question: |
            `repeat("ha", "3")` raises `TypeError` rather than `ValueError`. Why is `TypeError` the right choice here?
          options:
            - "Because `\"3\"` is the wrong *kind* of object — the contract wanted an integer, not a string."
            - "Because the string `\"3\"` can't be converted to an integer."
            - "Because `TypeError` is always preferred over `ValueError` for safety."
            - "Because Python forces `TypeError` whenever string × string is attempted."
          correct_index: 0
          option_feedback:
            1: "`\"3\"` *can* be converted with `int(\"3\")` — but the contract doesn't ask the function to do that coercion. The kind mismatch is the violation."
            2: "There's no general rule that `TypeError` is safer. The split has semantic meaning: kind vs value. Both belong in defensive code at the right places."
            3: "Python would raise `TypeError` on `\"ha\" * \"3\"` *eventually*, but with a confusing message about strings. Catching the kind mismatch first gives the caller a clear diagnostic."
          explanation: "`TypeError` signals 'wrong kind of object'; `ValueError` signals 'right kind, unacceptable value'. The two carry distinct information for the caller — and choosing the right one is part of the defensive contract."

        - type: single
          difficulty: intermediate
          question: |
            `repeat("ha", True)` raises `TypeError` even though `True` is an `int` in Python. What is this defending against?
          options:
            - "The bool-as-int trap: `isinstance(True, int)` returns `True`, so a check that accepts integers would silently accept booleans — almost never what the caller meant."
            - "A bug in CPython where booleans corrupt string multiplication."
            - "The risk that `True` evaluates to `0` in arithmetic contexts."
            - "Nothing — the test is overly strict and should be removed."
          correct_index: 0
          option_feedback:
            1: "There's no such bug. `\"ha\" * True` is well-defined Python — it returns `\"ha\"`. The defense is against *caller confusion*, not language brokenness."
            2: "`True` evaluates to `1` in arithmetic, not `0`. And that's exactly the trap: `repeat(\"ha\", True)` would silently return `\"ha\"` instead of raising — likely hiding a caller bug."
            3: "The test is enforcing a contract distinction the language doesn't enforce for you. That's the whole point of defensive programming."
          explanation: "Python's `bool` is a subclass of `int`, so `isinstance(True, int)` is `True`. The defensive check `isinstance(x, bool) or not isinstance(x, int)` catches `True`/`False` before accepting them as counts — because passing a boolean to a function that wants a count is almost certainly a caller mistake."

        - type: single
          difficulty: intermediate
          question: |
            A reviewer suggests collapsing all three checks in `repeat` into one line: `if not (isinstance(text, str) and isinstance(times, int) and times >= 0): raise ValueError("invalid input")`. What does this change cost you?
          options:
            - "It collapses three distinct failure messages into one undifferentiated 'invalid input', and it raises `ValueError` even when the failure was a *type* problem."
            - "Nothing — it's cleaner and behaves identically."
            - "It makes the function slower because of short-circuit evaluation."
            - "It breaks `pytest.raises` because the test framework can't parse compound conditions."
          correct_index: 0
          option_feedback:
            1: "Behavior is *not* identical — the failure message and the exception class both lose information. The caller can no longer tell whether they passed a string instead of an int, or a negative count."
            2: "Short-circuit evaluation makes it marginally *faster*, not slower. Performance isn't the issue here."
            3: "`pytest.raises` works fine. The cost is pedagogical/diagnostic, not technical."
          explanation: "Defensive programming is about *information at the failure site*. Collapsing checks erases the distinction between 'wrong kind' and 'wrong value' — the very signal the caller needs to fix their code."

  # Pedagogy: mistake-based familiarization — reject a plausible "helpful" repair.
  - title: "Rejecting Quiet Repairs"
    instructions: |
      ### Why this matters

      Defensive programming is not the same as making every bad call work somehow. Quietly repairing a caller bug can move the failure far away from the cause, which makes the next bug harder to debug.

      ### 🎯 You will learn to

      - Evaluate when an automatic repair hides a caller mistake.
      - Reject invalid relationships between arguments.
      - Preserve the contract of a small numeric helper.

      ### Your task

      `clamp(value, lower, upper)` should return `value` limited to the inclusive range `[lower, upper]`.

      Valid examples:

      ```python
      clamp(5, 0, 10)    # 5
      clamp(-2, 0, 10)   # 0
      clamp(12, 0, 10)   # 10
      ```

      The starter code tries to be helpful by swapping the bounds when `lower > upper`. Delete that behavior. The contract should reject reversed bounds with `ValueError`; callers need to know they passed the arguments in the wrong order.

    files:
      - path: "ranges.py"
        language: "python"
        content: |
          def clamp(value: float, lower: float, upper: float) -> float:
              """Return value limited to the inclusive interval [lower, upper]."""
              if lower > upper:
                  # This hides the caller's bug. Replace it with a clear failure.
                  lower, upper = upper, lower
              if value < lower:
                  return lower
              if value > upper:
                  return upper
              return value

      - path: "test_ranges.py"
        language: "python"
        content: |
          import pytest
          from ranges import clamp


          def test_value_inside_range_is_unchanged():
              assert clamp(5, 0, 10) == 5


          def test_value_below_range_returns_lower_bound():
              assert clamp(-2, 0, 10) == 0


          def test_value_above_range_returns_upper_bound():
              assert clamp(12, 0, 10) == 10


          def test_reversed_bounds_are_rejected():
              with pytest.raises(ValueError) as excinfo:
                  clamp(5, 10, 0)
              assert excinfo.type is ValueError

    open_file: "ranges.py"
    run_file: "test_ranges.py"

    tests:
      - description: "Clamp preserves valid behavior and rejects reversed bounds"
        command: |
          import pytest, io, sys
          old = sys.stdout
          sys.stdout = buf = io.StringIO()
          code = pytest.main(['/tutorial/test_ranges.py', '-v', '--tb=short', '--no-header'])
          sys.stdout = old
          output = buf.getvalue()
          print(output)
          assert code == 0, output

          from ranges import clamp
          with pytest.raises(ValueError) as excinfo:
              clamp(7, 9, 3)
          assert excinfo.type is ValueError, "Do not silently swap reversed bounds; reject the bad call."
        hints:
          - title: "Find the quiet repair"
            text: "The starter code has one branch that changes caller input before continuing. That is the behavior to replace."
            condition: "code_contains: lower, upper = upper, lower"
          - title: "Reject the invalid relationship"
            text: "The relationship `lower <= upper` is part of the contract. Check it before doing any clamping."
            condition: "code_missing: raise ValueError"
          - title: "Leave ordinary clamping alone"
            text: "After the bounds are known to be ordered, the lower-bound and upper-bound cases can stay almost exactly as they are."

    solution:
      files:
        - path: "ranges.py"
          language: "python"
          content: |
            def clamp(value: float, lower: float, upper: float) -> float:
                """Return value limited to the inclusive interval [lower, upper]."""
                if lower > upper:
                    raise ValueError("lower must be less than or equal to upper")
                if value < lower:
                    return lower
                if value > upper:
                    return upper
                return value
      explanation: |
        The function still helps valid callers by clamping values, but it refuses to reinterpret a reversed range. That keeps the failure close to the caller's mistake.

    quiz:
      title: "Step 3 — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - type: single
          difficulty: intermediate
          question: |
            Why is silently swapping reversed bounds in `clamp(7, 9, 3)` worse than raising `ValueError`?
          options:
            - "It hides a caller bug. The next time the caller passes `(value, max, min)` instead of `(value, min, max)`, the function appears to work — but the caller's mental model is broken, and the next bug will be harder to find."
            - "It violates Python's style guide."
            - "It costs measurable performance because of the tuple unpacking."
            - "It changes the return type from `float` to `tuple[float, float]`."
          correct_index: 0
          option_feedback:
            1: "PEP 8 doesn't mention this. The harm is semantic, not stylistic — and far more serious than a lint warning."
            2: "Performance is irrelevant at this scale. The cost is *correctness*: a broken caller passes tests and ships."
            3: "The return type doesn't change. The harm is in the caller's invisible-to-tests confusion about argument order."
          explanation: "Defensive programming is partly about *preserving the visibility of bugs*. Silent repair shifts a bug from 'detected immediately' to 'detected weeks later in production', which is the worst possible move."

        - type: single
          difficulty: advanced
          question: |
            **Postel's Law** ("be liberal in what you accept, conservative in what you send") is a famous internet design principle. A web framework's URL router silently strips trailing slashes from URLs before matching. Is this the *same anti-pattern* as `clamp`'s silent swap?
          options:
            - "No — the trailing-slash strip is at a *trust boundary* (untrusted user input from HTTP) where normalization is intentional and is usually logged. `clamp` is an *internal contract* between trusted code where silent repair hides programmer mistakes."
            - "Yes — any silent transformation of input is always bad."
            - "No — Postel's Law was deprecated by RFC 8546, so neither pattern is acceptable."
            - "Yes — but only because URLs and numeric ranges are fundamentally different domains."
          correct_index: 0
          option_feedback:
            1: "This is the canonical Postel's Law misconception. There's a meaningful distinction between *boundary tolerance* (normalize HTTP input, web forms, file encodings) and *interior strictness* (function arguments between trusted modules)."
            2: "RFC 8546 (2019) does push back on Postel's Law, but the practical rule that emerged isn't 'never normalize' — it's 'normalize at the boundary, be strict in the interior.' Modern HTTP frameworks still strip trailing slashes."
            3: "The domain isn't the point. The point is *who* is on the other side of the call: an untrusted HTTP client (normalize) or another part of your own program (fail loud)."
          explanation: "Defensive programming has a *location* dimension: at the system boundary (HTTP input, file parsing, command-line args), liberal acceptance with documented normalization is often correct. *Inside* trusted code, silent repair hides bugs and should be rejected — exactly what `clamp` enforces."

        - type: single
          difficulty: intermediate
          question: |
            A teammate proposes that `clamp(value, lower, upper)` *also* coerce non-numeric inputs: `clamp(\"5\", 0, 10)` would try `float(\"5\")` and continue. Is this a good defensive addition?
          options:
            - "No — it silently widens the contract. The next caller who passes a string by mistake will see `clamp` 'work', and the actual bug (wrong variable being passed) goes undetected."
            - "Yes — being more accepting makes the function more robust."
            - "Yes — `float(\"5\")` is a cheap conversion, so the cost is negligible."
            - "No — but only because `float(\"5e1\")` would also succeed, which is unexpected."
          correct_index: 0
          option_feedback:
            1: "This is the *exact same anti-pattern* as the silent bound-swap, just dressed up as 'helpfulness'. Robustness ≠ accepting any input — it means responding to bad input in a way that *helps* the caller fix their code."
            2: "Conversion cost isn't the issue. The issue is the contract: `clamp` is documented to accept floats, and silently expanding to strings means the documentation lies."
            3: "`float(\"5e1\")` succeeding is a curiosity, not the main problem. The main problem is that the contract no longer matches the docstring."
          explanation: "The pattern in this step generalizes: any time a function silently expands the set of inputs it accepts, it's hiding caller bugs. The right move is to reject early with a precise exception, not to coerce."

  # Pedagogy: worked example with fading — preserve an invariant in a small value object.
  - title: "State Integrity"
    instructions: |
      ### Why this matters

      Defensive programming is not only about function inputs. Objects also need valid state, and the easiest time to protect that state is at construction.

      ### 🎯 You will learn to

      - Enforce a class invariant in `__post_init__`.
      - Validate construction-time state before methods rely on it.
      - Reject method inputs that do not belong to the public contract.

      ### Your task

      Open `intervals.py`. The class represents a closed interval, meaning both endpoints are included. Its invariant is:

      ```python
      start <= end
      ```

      Implement two pieces:

      - `__post_init__` rejects invalid construction with `ValueError`.
      - `contains(value)` returns whether an integer value is inside the interval, and raises `TypeError` for non-integers or `bool`.

      The class is `frozen=True`, so valid instances cannot be edited after construction. That makes the construction check especially important.

    files:
      - path: "intervals.py"
        language: "python"
        content: |
          from dataclasses import dataclass


          @dataclass(frozen=True, slots=True)
          class ClosedInterval:
              start: int
              end: int

              def __post_init__(self) -> None:
                  # Enforce the invariant here.
                  pass

              def contains(self, value: int) -> bool:
                  # Return True when value is between start and end inclusive.
                  return False

      - path: "test_intervals.py"
        language: "python"
        content: |
          import pytest
          from intervals import ClosedInterval


          def test_valid_interval_contains_endpoints_and_middle():
              interval = ClosedInterval(3, 7)
              assert interval.contains(3) is True
              assert interval.contains(5) is True
              assert interval.contains(7) is True


          def test_valid_interval_rejects_outside_values():
              interval = ClosedInterval(3, 7)
              assert interval.contains(2) is False
              assert interval.contains(8) is False


          def test_reversed_interval_cannot_be_constructed():
              with pytest.raises(ValueError) as excinfo:
                  ClosedInterval(7, 3)
              assert excinfo.type is ValueError


          def test_contains_rejects_non_integer_values():
              interval = ClosedInterval(3, 7)
              with pytest.raises(TypeError) as excinfo:
                  interval.contains("5")
              assert excinfo.type is TypeError

    open_file: "intervals.py"
    run_file: "test_intervals.py"

    tests:
      - description: "ClosedInterval enforces construction and contains-input invariants"
        command: |
          import pytest, io, sys
          old = sys.stdout
          sys.stdout = buf = io.StringIO()
          code = pytest.main(['/tutorial/test_intervals.py', '-v', '--tb=short', '--no-header'])
          sys.stdout = old
          output = buf.getvalue()
          print(output)
          assert code == 0, output

          from intervals import ClosedInterval
          with pytest.raises(TypeError) as excinfo:
              ClosedInterval(1, 3).contains(True)
          assert excinfo.type is TypeError, "Treat bool as outside the integer-value contract."
        hints:
          - title: "Put the invariant at the boundary"
            text: "The boundary for object state is construction. `__post_init__` runs right after the dataclass fills `start` and `end`."
            condition: "code_missing: raise"
          - title: "Test inclusion with two comparisons"
            text: "A value is inside a closed interval when it is greater than or equal to `start` and less than or equal to `end`."
            condition: "code_contains: return False"
          - title: "Reject bool before int"
            text: "As with the repeat-count example, `bool` is an `int` subclass in Python. Check for `bool` explicitly before accepting integers."
            condition: "code_missing: bool"

    solution:
      files:
        - path: "intervals.py"
          language: "python"
          content: |
            from dataclasses import dataclass


            @dataclass(frozen=True, slots=True)
            class ClosedInterval:
                start: int
                end: int

                def __post_init__(self) -> None:
                    if not isinstance(self.start, int) or isinstance(self.start, bool):
                        raise TypeError("start must be an integer")
                    if not isinstance(self.end, int) or isinstance(self.end, bool):
                        raise TypeError("end must be an integer")
                    if self.start > self.end:
                        raise ValueError("start must be less than or equal to end")

                def contains(self, value: int) -> bool:
                    if not isinstance(value, int) or isinstance(value, bool):
                        raise TypeError("value must be an integer")
                    return self.start <= value <= self.end
      explanation: |
        The object rejects invalid state once, at construction, and each method can rely on the invariant after that. Method-specific validation is still needed for new caller input.

    quiz:
      title: "Step 4 — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - type: single
          difficulty: intermediate
          question: |
            Why does `ClosedInterval` validate `start <= end` in `__post_init__` rather than inside `contains`?
          options:
            - "Because validating once at construction means every method can trust the invariant afterward; re-checking in every method would be redundant and would scale badly with more methods."
            - "Because Python doesn't allow validation inside dataclass methods."
            - "Because `__post_init__` runs slightly faster than method calls."
            - "Because dataclasses can't have method bodies that raise."
          correct_index: 0
          option_feedback:
            1: "Dataclasses can validate anywhere; nothing in Python forces the check into `__post_init__`. The reason is pedagogical: the invariant only needs to be established once."
            2: "Performance isn't relevant at this scale. The reason is structural: avoiding redundant checks across many methods."
            3: "Dataclasses can absolutely raise inside methods. The reason for the constructor check is about *where* the invariant is established."
          explanation: "Construction is the *one stable time* when invalid state is possible. After `__post_init__`, the invariant is established — and because the class is `frozen=True`, it can't be broken later. Every method can rely on `start <= end` without re-checking."

        - type: single
          difficulty: intermediate
          question: |
            The `contains(value)` method *still* validates that `value` is a non-bool integer, even though the interval itself is already a valid object. Why?
          options:
            - "Because `value` is a *new* caller input — it's not part of the interval's invariant. Method arguments need their own validation; the object's invariant only protects the object's own state."
            - "Because Python's type hints aren't checked at runtime, so validation must run twice."
            - "Because `contains` could be called before `__post_init__` finishes."
            - "Because `frozen=True` doesn't protect against attribute changes via reflection."
          correct_index: 0
          option_feedback:
            1: "Type hints not being runtime-checked is true, but unrelated. The distinction is between *object invariants* (state of `self`) and *method preconditions* (incoming arguments)."
            2: "`__post_init__` runs as part of `__init__`, before the constructor returns. `contains` can't be called before that finishes."
            3: "`frozen=True` is bypassable, yes — but that's not why `contains` validates `value`. `value` is a fresh argument from the caller and has no relationship to the existing invariant."
          explanation: "Invariants protect *object state*. Preconditions protect *method arguments*. They're two distinct concerns: the invariant is about what `self` looks like; the precondition is about what the caller just handed you."

        - type: single
          difficulty: basic
          question: |
            `ClosedInterval(True, 5)` raises `TypeError` even though `True` is technically an `int`. This is the same trap as Step 2's `repeat(\"ha\", True)`. What is being defended against in *both* cases?
          options:
            - "The `bool`-as-`int` subclass trap: passing a boolean where the contract documents an integer is almost certainly a caller mistake — likely a confused conditional or a return value from `==` used in the wrong place."
            - "A CPython implementation bug in `isinstance`."
            - "An ambiguity in `True * 5` vs `5 * True`."
            - "The risk that booleans take up more memory than integers."
          correct_index: 0
          option_feedback:
            1: "There's no such bug. `isinstance(True, int)` returns `True` *by design* — that's exactly the trap."
            2: "Both operations are well-defined and return `5`. The harm is *semantic*, not arithmetic."
            3: "`bool` and `int` use the same memory representation. Memory isn't the concern."
          explanation: "Both `repeat` and `ClosedInterval` defend the same way: explicitly check `isinstance(x, bool)` *before* accepting `isinstance(x, int)`. The pattern is worth memorizing — almost every Python function that wants 'an integer (and not a bool)' uses it."

  # Pedagogy: negative example and repair — translate external failures without hiding causes.
  - title: "Visible Error Causes"
    instructions: |
      ### Why this matters

      `except Exception: return {}` looks friendly until production starts using the empty default after a missing file or broken JSON document. Defensive code should translate low-level failures into domain language while preserving the original cause for debugging.

      ### 🎯 You will learn to

      - Replace broad exception swallowing with targeted exception handling.
      - Raise a domain-specific exception with `raise ... from exc`.
      - Preserve useful failure information without leaking low-level details into callers.

      ### Your task

      Open `config_loader.py`. Replace the broad fallback with a clear contract:

      - `load_json_config(path)` returns a JSON object as a `dict`.
      - Missing or unreadable files raise `ConfigError(...) from exc`.
      - Invalid JSON raises `ConfigError(...) from exc`.
      - Valid JSON that is not an object raises `ConfigError` without pretending it is a usable config.

      Do not catch `Exception` or `BaseException`. Catch the failures you can translate.

      ### 🔍 How the hidden check works

      A pytest assertion that simply *looks at behavior* could miss a sneaky `except Exception:` that happens to translate to the right exception in the test cases. To guard against that, the hidden check parses your code's **Abstract Syntax Tree** (AST) and explicitly rejects any `except` handler whose type is `Exception` or `BaseException`. This is the same technique used in real-world code review tools (Bandit, Ruff's `BLE001`) — and it's worth knowing as a defensive-programming technique in its own right: when you can't trust behavior alone, parse the structure.

    files:
      - path: "config_loader.py"
        language: "python"
        content: |
          import json
          from pathlib import Path
          from typing import Any


          class ConfigError(RuntimeError):
              """Raised when an application config file cannot be loaded."""


          def load_json_config(path: Path) -> dict[str, Any]:
              """Load a JSON config object from path."""
              try:
                  with Path(path).open(encoding="utf-8") as config_file:
                      return json.load(config_file)
              except Exception:
                  return {}

      - path: "test_config_loader.py"
        language: "python"
        content: |
          import json
          import pytest
          from pathlib import Path
          from config_loader import ConfigError, load_json_config


          def test_valid_config_file_returns_dict():
              path = Path("/tutorial/app-config.json")
              path.write_text(json.dumps({"debug": True, "port": 8080}), encoding="utf-8")
              assert load_json_config(path) == {"debug": True, "port": 8080}


          def test_missing_file_raises_config_error_with_cause():
              path = Path("/tutorial/does-not-exist.json")
              with pytest.raises(ConfigError) as excinfo:
                  load_json_config(path)
              assert isinstance(excinfo.value.__cause__, OSError)


          def test_invalid_json_raises_config_error_with_cause():
              path = Path("/tutorial/broken-config.json")
              path.write_text("{not valid json", encoding="utf-8")
              with pytest.raises(ConfigError) as excinfo:
                  load_json_config(path)
              assert isinstance(excinfo.value.__cause__, json.JSONDecodeError)

    open_file: "config_loader.py"
    run_file: "test_config_loader.py"

    tests:
      - description: "Config loading translates targeted failures and preserves their causes"
        command: |
          import ast, pytest, io, sys
          source = open('/tutorial/config_loader.py').read()
          tree = ast.parse(source)
          for node in ast.walk(tree):
              if isinstance(node, ast.ExceptHandler):
                  handler = node.type
                  catches_broad_exception = (
                      isinstance(handler, ast.Name) and handler.id in ("Exception", "BaseException")
                  )
                  assert not catches_broad_exception, "Catch targeted file and JSON failures, not broad Exception/BaseException."

          old = sys.stdout
          sys.stdout = buf = io.StringIO()
          code = pytest.main(['/tutorial/test_config_loader.py', '-v', '--tb=short', '--no-header'])
          sys.stdout = old
          output = buf.getvalue()
          print(output)
          assert code == 0, output

          from pathlib import Path
          from config_loader import ConfigError, load_json_config
          list_path = Path("/tutorial/list-config.json")
          list_path.write_text("[1, 2, 3]", encoding="utf-8")
          with pytest.raises(ConfigError):
              load_json_config(list_path)
        hints:
          - title: "Catch only what you can explain"
            text: "File read failures are `OSError` family failures. JSON syntax failures are `json.JSONDecodeError`. Catch each one separately, not the broad `Exception`."
            condition: "code_contains: except Exception"
          - title: "Keep the original exception"
            text: "When translating a file or JSON failure, bind it as `exc` and use `raise ConfigError(...) from exc`. The `from exc` chains the cause into `__cause__` so debuggers can still see the underlying failure."
            condition: "code_missing: from exc"
          - title: "Validate the loaded shape"
            text: "After `json.load` or `json.loads`, check that the result is a `dict`. A JSON list is valid JSON, but it is not a config object for this function."
            condition: "code_missing: isinstance(data, dict)"

    solution:
      files:
        - path: "config_loader.py"
          language: "python"
          content: |
            import json
            from pathlib import Path
            from typing import Any


            class ConfigError(RuntimeError):
                """Raised when an application config file cannot be loaded."""


            def load_json_config(path: Path) -> dict[str, Any]:
                """Load a JSON config object from path."""
                config_path = Path(path)
                try:
                    text = config_path.read_text(encoding="utf-8")
                except OSError as exc:
                    raise ConfigError(f"could not read config file: {config_path}") from exc

                try:
                    data = json.loads(text)
                except json.JSONDecodeError as exc:
                    raise ConfigError(f"invalid JSON config file: {config_path}") from exc

                if not isinstance(data, dict):
                    raise ConfigError("config file must contain a JSON object")
                return data
      explanation: |
        The loader now catches only the failures it can translate. `raise ... from exc` keeps the low-level exception in `__cause__`, so debugging tools still show the real source of the failure.

    quiz:
      title: "Step 5 — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - type: single
          difficulty: intermediate
          question: |
            The original buggy `load_json_config` did `except Exception: return {}`. What is the worst long-term harm of this pattern in production?
          options:
            - "Every caller now thinks 'empty config' and 'unreadable file' look identical, so failure modes that should be fatal (missing config) get silently treated as benign (no overrides). The bug surfaces as wrong behavior, far from the cause."
            - "It catches `KeyboardInterrupt`, which can crash the interpreter."
            - "It returns the wrong type — `dict` instead of `list`."
            - "It causes a memory leak because the exception traceback is never freed."
          correct_index: 0
          option_feedback:
            1: "`Exception` does *not* catch `KeyboardInterrupt` (that's `BaseException` and not a subclass of `Exception`). The real harm is information loss, not interpreter safety."
            2: "The return type is correct (`dict`). The harm is *semantic* — the dict is empty because of a *failure*, indistinguishable from an empty dict that legitimately had no entries."
            3: "Python's garbage collector handles exception tracebacks fine. The harm is informational: the cause is gone."
          explanation: "Broad-except + sentinel return is the canonical 'silent corruption' anti-pattern. Failures that should *stop the program* become failures that *change its behavior in subtle ways* — far harder to debug than a clean crash."

        - type: single
          difficulty: intermediate
          question: |
            What does `raise ConfigError(...) from exc` give callers that `raise ConfigError(...)` alone does not?
          options:
            - "It preserves the original `OSError` or `JSONDecodeError` in `ConfigError.__cause__`, so the full chain shows up in tracebacks and tools like `pytest` and Sentry can drill into the *real* root cause."
            - "It makes the exception faster to raise."
            - "It changes the exception class to a subclass of the original."
            - "It allows the exception to be caught by `except OSError:` blocks."
          correct_index: 0
          option_feedback:
            1: "Both forms have the same raise cost. The difference is informational — what shows up in the traceback."
            2: "The class is still `ConfigError`. `from exc` only sets the `__cause__` attribute; it doesn't change the class hierarchy."
            3: "`ConfigError` is its own class. `from exc` doesn't make it polymorphic with `OSError`. The chain is purely diagnostic."
          explanation: "`raise X from Y` sets `X.__cause__ = Y`, which Python prints as 'The above exception was the direct cause of the following exception...' in tracebacks. The caller catches `ConfigError` (the right abstraction), but a debugger can still see the underlying file I/O or JSON parse failure that actually caused it."

        - type: single
          difficulty: intermediate
          question: |
            The solution checks `if not isinstance(data, dict): raise ConfigError(...)`. Why is this validation step necessary even after `json.load` succeeded?
          options:
            - "Because valid JSON can be a list, number, string, boolean, or null at the top level — not just an object. The function's contract specifically promises a `dict` config, and `json.load` returning a JSON array is a contract violation, not a parse error."
            - "Because `json.load` can return `None` if the file is empty."
            - "Because `isinstance(data, dict)` defends against the bool-subclass-of-int trap."
            - "Because Python's `json` module is unreliable on Windows."
          correct_index: 0
          option_feedback:
            1: "An empty JSON file would be a `JSONDecodeError`, not `None`. The issue isn't empty files — it's *valid JSON of the wrong shape*."
            2: "The bool trap is about integer arguments, not JSON parsing. This check is about top-level JSON shape."
            3: "The `json` module is cross-platform stable. The issue is the JSON spec itself: any JSON value (array, number, string, boolean, null, object) is a valid top-level value."
          explanation: "JSON has six top-level value types; only one is a `dict` (a JSON 'object'). `[1, 2, 3]` is valid JSON. So is `\"hello\"`. `json.load` succeeds for all of them, then hands you something that's *not* the dict your function promised. That gap between 'parses cleanly' and 'matches the contract' is exactly where shape validation lives."

  # Pedagogy: capstone — independent integration of partitions, precise exceptions, and postconditions.
  - title: "Port Range Parser"
    instructions: |
      ### Why this matters

      Real defensive programming combines the pieces: classify input, reject invalid forms, choose precise exceptions, and guarantee that valid results obey a postcondition. A small parser is enough to practice the full loop without adding domain clutter.

      ### 🎯 You will learn to

      - Create a parser that rejects wrong types, malformed strings, out-of-range values, and reversed ranges.
      - Apply postcondition reasoning to returned tuples.
      - Test boundary values around a finite numeric domain.

      ### Your task

      Implement:

      ```python
      def parse_port_range(spec: str) -> tuple[int, int]:
          ...
      ```

      Accepted forms:

      - `"8080"` returns `(8080, 8080)`.
      - `"8000-8080"` returns `(8000, 8080)`.
      - Surrounding whitespace around the whole spec is okay.

      Rejected forms:

      - wrong type: raise `TypeError`
      - malformed string: raise `ValueError`
      - port outside `0..65535`: raise `ValueError`
      - reversed range such as `"9000-8000"`: raise `ValueError`

      Postcondition for every successful call: the result is a pair of integers where `0 <= start <= end <= 65535`.

      ---

      ### 🎓 After this capstone — *should* you always program defensively?

      Across this tutorial you've built a complete defensive vocabulary: classify inputs into partitions, raise the right exception class, reject silent repair, protect object invariants, translate boundary failures into domain errors, and combine all of it into a parser whose contract is verifiable from the outside.

      That's the right toolkit at a **system boundary** — anywhere your code receives data from a user, a network call, a file, a database, or another team's API. The further you go from that boundary, between trusted modules you wrote yourself, the more the same checks start to feel like noise that compounds across a large codebase.

      Bertrand Meyer (who coined the term in the 1980s) argued *against* applying defensive programming uniformly. His alternative — **Design by Contract** — asks a sharper question: instead of "how do I reject bad input?", *whose job was this?* That single shift changes what code looks like in the interior of a system.

      **Next:** the [Design by Contract in Python](/SEBook/development_practices/design-by-contract-tutorial) tutorial picks up where this one ends. It uses the same Python and the same techniques you just practiced, but reframes them around responsibility allocation — and gives you a criterion for deciding where defensive programming earns its keep and where it costs more than it gives.

    files:
      - path: "ports.py"
        language: "python"
        content: |
          def parse_port_range(spec: str) -> tuple[int, int]:
              """Parse a single port or inclusive port range."""
              raise NotImplementedError("parse the port range")

      - path: "test_ports.py"
        language: "python"
        content: |
          import pytest
          from ports import parse_port_range


          def assert_valid_port_range(result):
              assert isinstance(result, tuple)
              assert len(result) == 2
              start, end = result
              assert isinstance(start, int)
              assert isinstance(end, int)
              assert 0 <= start <= end <= 65535


          def test_single_port_becomes_one_point_range():
              result = parse_port_range("8080")
              assert result == (8080, 8080)
              assert_valid_port_range(result)


          def test_range_preserves_start_and_end():
              result = parse_port_range("8000-8080")
              assert result == (8000, 8080)
              assert_valid_port_range(result)


          def test_boundary_ports_are_valid():
              assert parse_port_range("0") == (0, 0)
              assert parse_port_range("65535") == (65535, 65535)
              assert parse_port_range("0-65535") == (0, 65535)


          def test_wrong_type_is_type_error():
              with pytest.raises(TypeError) as excinfo:
                  parse_port_range(8080)
              assert excinfo.type is TypeError


          def test_malformed_specs_are_value_error():
              for spec in ["", "abc", "80/http", "80-", "-90", "80-90-100"]:
                  with pytest.raises(ValueError):
                      parse_port_range(spec)


          def test_out_of_range_ports_are_value_error():
              for spec in ["-1", "65536", "80-70000"]:
                  with pytest.raises(ValueError):
                      parse_port_range(spec)


          def test_reversed_range_is_value_error():
              with pytest.raises(ValueError):
                  parse_port_range("9000-8000")

    open_file: "ports.py"
    run_file: "test_ports.py"

    tests:
      - description: "Port parser covers valid forms, invalid partitions, exact exception types, and postconditions"
        command: |
          import pytest, io, sys
          old = sys.stdout
          sys.stdout = buf = io.StringIO()
          code = pytest.main(['/tutorial/test_ports.py', '-v', '--tb=short', '--no-header'])
          sys.stdout = old
          output = buf.getvalue()
          print(output)
          assert code == 0, output

          from ports import parse_port_range

          for spec in [" 443 ", " 8000-8080 "]:
              start, end = parse_port_range(spec)
              assert isinstance(start, int) and isinstance(end, int)
              assert 0 <= start <= end <= 65535

          for spec in ["80 - 90", "http-https", "22-"]:
              with pytest.raises(ValueError):
                  parse_port_range(spec)

          with pytest.raises(TypeError) as excinfo:
              parse_port_range(None)
          assert excinfo.type is TypeError
        hints:
          - title: "Normalize the whole string first"
            text: "Reject non-strings, then call `.strip()` on the spec. Empty strings are malformed."
            condition: "code_missing: isinstance(spec, str)"
          - title: "Parse one form at a time"
            text: "The single-port form has no hyphen. The range form has exactly one hyphen and two numeric parts."
            condition: "code_missing: -"
          - title: "Check the postcondition before returning"
            text: "After parsing integers, validate both ports are in range (`0..65535`) and `start <= end`. Then return `(start, end)`."
            condition: "code_missing: 65535"

    quiz:
      title: "Step 6 — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - type: single
          difficulty: intermediate
          question: |
            A student implementation turns `"9000-8000"` into `(8000, 9000)` so the returned tuple is ordered. What is the main problem?
          options:
            - "It hides a caller bug by silently repairing a reversed range."
            - "It should return a list instead of a tuple."
            - "It should raise `TypeError` because the values are strings."
            - "It fails only because 9000 is outside the valid port range."
          correct_index: 0
          option_feedback:
            1: "The contract promises a tuple, and the tuple shape is not the failure. The issue is accepting an invalid relationship between the two endpoints."
            2: "The function receives a string specification by design. Wrong type would be something like `None` or an integer argument."
            3: "Both 8000 and 9000 are valid port numbers. The invalid part is their order in a range."
          explanation: "Reversed ranges are caller mistakes. Silently swapping them repeats the quiet-repair problem from `clamp`."

        - type: single
          difficulty: intermediate
          question: |
            Which assertion best captures the postcondition of a successful `parse_port_range` call?
          options:
            - "`result is not None` and both tuple slots can be indexed"
            - "`result` is a 2-item tuple and `0 <= start <= end <= 65535`"
            - "`str(result).startswith('(')` and the string contains a comma"
            - "`result[0] < result[1]` so endpoints are strictly ordered"
          correct_index: 1
          option_feedback:
            0: "A non-`None` result could still be malformed, reversed, or out of range. That oracle is too weak."
            2: "String formatting is not the contract. A list or invalid tuple could still produce a parenthesized-looking string."
            3: "A single port such as `\"8080\"` should return `(8080, 8080)`, where equality is valid."
          explanation: "The postcondition includes tuple shape, integer endpoints, range limits, and ordering with equality allowed."

        - type: single
          difficulty: basic
          question: |
            Which failure should be a `TypeError` rather than a `ValueError`?
          options:
            - "`parse_port_range(None)`"
            - "`parse_port_range(\"abc\")`"
            - "`parse_port_range(\"65536\")`"
            - "`parse_port_range(\"9000-8000\")`"
          correct_index: 0
          option_feedback:
            1: "`\"abc\"` has the right type but cannot be parsed as the required string form, so it is a value problem."
            2: "`\"65536\"` has the right type and shape but is outside the valid port range, so it is a value problem."
            3: "`\"9000-8000\"` has the right type and numeric parts, but the endpoint relationship is invalid, so it is a value problem."
          explanation: "`TypeError` is for the wrong kind of argument. The malformed, out-of-range, and reversed examples are all strings, so they are `ValueError` cases."

        - type: single
          difficulty: intermediate
          question: |
            **Retrieval from Step 3**: a teammate proposes that `parse_port_range(\"9000-8000\")` should silently swap to `(8000, 9000)` because \"the user obviously meant the lower port first.\" What principle from `clamp` (Step 3) applies here?
          options:
            - "Silent repair hides caller bugs. The next time someone writes `parse_port_range(f\"{max_port}-{min_port}\")` because they confused the variable order, the function appears to work — and the actual bug surfaces somewhere far away, much later."
            - "Silent repair is fine because the result is mathematically equivalent."
            - "Silent repair is fine here because port ranges are commutative."
            - "Silent repair is acceptable as long as the function logs a warning."
          correct_index: 0
          option_feedback:
            1: "Mathematical equivalence isn't the question. The question is *whether the caller knows they passed the arguments wrong*. Silent repair means they don't."
            2: "Port ranges are *not* commutative — `\"9000-8000\"` is malformed by the contract, regardless of whether the resulting set of ports would be the same."
            3: "Logging is a partial mitigation, but at the *internal* contract boundary, raising is still the right move. (Logging-and-continuing is sometimes acceptable at the *system* boundary — see Step 3's Postel's Law question.)"
          explanation: "This is the same pattern as `clamp`'s reversed-bounds swap. The harm is preserving the *visibility of the bug* — silent repair shifts caller errors from 'detected immediately' to 'detected weeks later in production.'"

        - type: single
          difficulty: intermediate
          question: |
            **Retrieval from Step 5**: imagine `parse_port_range` was extended to read its input from a config file — `port_range = json.load(...)\\[\"ports\"\\]`. Which defensive pattern from `load_json_config` (Step 5) should re-enter the picture?
          options:
            - "Catch only the *specific* failures you can translate (`OSError`, `json.JSONDecodeError`), use `raise ConfigError(...) from exc` to preserve the cause, then validate the loaded *shape* before handing it to the parser."
            - "Wrap the whole flow in `except Exception: return None` so the program never crashes."
            - "Skip JSON validation — `parse_port_range` will validate anyway."
            - "Disable the AST check from Step 5, since this is a different file."
          correct_index: 0
          option_feedback:
            1: "Broad except + sentinel return is the exact anti-pattern Step 5 trained you to avoid. It would convert 'missing config file' and 'malformed JSON' and 'wrong shape' into one indistinguishable `None`."
