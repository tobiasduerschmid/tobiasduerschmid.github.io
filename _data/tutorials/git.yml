  # --------------------------------------------------------------------------
  # STEP 13: Working with Remotes
  # --------------------------------------------------------------------------
  - title: "Working with Remotes"
    instructions: |
      ### Time to go online

      Everything so far has been local — just you and your machine.
      But in the real world, code lives on **remote repositories**
      like GitHub, GitLab, or Bitbucket. This is where collaboration
      happens: pull requests, code reviews, and shipping to production.

      The remote workflow adds three key commands to what you already know:

      ### The remote workflow

      ```
      ┌──────────────┐  git add/commit  ┌──────────────┐    git push    ┌──────────────┐
      │   Working    │ ───────────────▶ │    Local     │ ─────────────▶ │    Remote    │
      │  Directory   │ ◀─────────────── │     Repo     │ ◀───────────── │     Repo     │
      └──────────────┘   git restore    └──────────────┘    git pull    └──────────────┘
                                          (your machine)                  (e.g. GitHub)
      ```

      - **`git clone <url>`** — Download a full copy of a remote repository
        (including its entire history) to your machine
      - **`git push`** — Upload your local commits to the remote repository
      - **`git pull`** — Download and merge new commits from the remote into
        your local branch

      ### Task 1: Simulate a remote with a bare repository

      We can simulate a remote repository right here using a "bare" repo
      (a repository with no working directory — just the `.git` data):

      ```bash
      cd /tutorial
      git init --bare remote-repo.git
      ```

      ### Task 2: Connect your project to the remote

      ```bash
      cd /tutorial/myproject
      git remote add origin /tutorial/remote-repo.git
      ```

      `origin` is the conventional name for your primary remote.

      ### Task 3: Push your work

      > **Before you run:** Think about what `git push` will do. Will it
      > send only the latest commit, or the entire branch history?

      ```bash
      git push -u origin main
      ```

      The `-u` flag sets `origin/main` as the upstream tracking branch,
      so future pushes only need `git push`.

      ### Task 4: Simulate a colleague's change

      Clone the remote into a separate directory (like a teammate would):

      ```bash
      cd /tutorial
      git clone remote-repo.git colleague-copy
      cd colleague-copy
      ```

      Make a change as your "colleague":

      ```bash
      echo "# Contributing Guide" > CONTRIBUTING.md
      git add CONTRIBUTING.md
      git commit -m "Add contributing guide"
      git push
      ```

      ### Task 5: Pull your colleague's changes

      Switch back to your original project and pull:

      ```bash
      cd /tutorial/myproject
      git pull
      ```

      Check that the new file arrived:

      ```bash
      ls CONTRIBUTING.md
      git log --oneline -3
      ```

      You now have your colleague's work in your local repository.
      That's the complete Git collaboration cycle:
      **branch → commit → push → pull → merge**. This is literally
      how teams at every tech company ship code every day.

    solution:
      commands:
        - "cd /tutorial && git init --bare remote-repo.git"
        - "cd /tutorial/myproject && git remote add origin /tutorial/remote-repo.git"
        - "git push -u origin main"
        - "cd /tutorial && git clone remote-repo.git colleague-copy"
        - "cd /tutorial/colleague-copy"
        - "echo '# Contributing Guide' > CONTRIBUTING.md"
        - "git add CONTRIBUTING.md"
        - "git commit -m 'Add contributing guide'"
        - "git push"
        - "cd /tutorial/myproject && git pull"
        - "ls CONTRIBUTING.md"
      explanation: |
        - **`git init --bare`:** Creates a repository without a working directory — exactly what servers like GitHub host. It only stores the `.git` data.
        - **`git remote add origin`:** Registers a remote repository under the name `origin`. You can have multiple remotes (e.g., `upstream` for a fork's parent).
        - **`git push -u origin main`:** Uploads all commits on `main` to the remote. `-u` sets the upstream, so future `git push` and `git pull` know which remote branch to sync with.
        - **`git clone`:** Creates a full copy of the remote repository, including its complete history. Your "colleague" gets everything.
        - **`git pull`:** Fetches new commits from the remote and merges them into your current branch. It's equivalent to `git fetch` + `git merge`.

    tests:
      - description: "Remote 'origin' is configured"
        command: "cd /tutorial/myproject && git remote | grep -q 'origin'"
      - description: "main branch has been pushed to origin"
        command: "cd /tutorial/myproject && git log origin/main --oneline | grep -q '.'"
      - description: "CONTRIBUTING.md exists after pull"
        command: "cd /tutorial/myproject && [ -f CONTRIBUTING.md ]"

    quiz:
      title: "Working with Remotes — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "What does `git clone` do?"
          options:
            - "Creates an empty repository on the remote server"
            - "Downloads a full copy of a remote repository including its entire commit history"
            - "Copies only the latest version of the files without any history"
            - "Creates a symbolic link to the remote repository"
          correct_index: 1
          explanation: "`git clone` creates a complete, independent copy of the repository — including every commit, branch, and tag. You get the full history, not just the latest snapshot."

        - question: "What is the difference between `git push` and `git pull`?"
          options:
            - "`push` uploads your local commits to the remote; `pull` downloads and merges remote commits into your local branch"
            - "`push` creates a new branch on the remote; `pull` deletes a branch from the remote"
            - "`push` sends files to your teammates directly; `pull` requests their files"
            - "They are synonyms — both sync your repository with the remote"
          correct_index: 0
          explanation: "`git push` sends your local commits upstream. `git pull` fetches new commits from the remote and merges them into your local branch. Together, they keep your local and remote repositories in sync."

        - question: "**[Interleaved: Revisit Step 12]** A colleague pushed a broken commit to `main`. Which command should you use to undo it safely on the shared branch?"
          options:
            - "`git reset --hard HEAD~1` then `git push -f`"
            - "`git revert HEAD`"
            - "`git restore HEAD`"
            - "`git checkout HEAD~1`"
          correct_index: 1
          explanation: "`git revert` creates a safe anti-commit. On shared branches, never use `git reset --hard` + force-push — it rewrites history and breaks every teammate's local copy."

        - question: "Your team has a choice: everyone pushes directly to `main`, or everyone works on feature branches and merges via pull requests. What are the trade-offs?"
          options:
            - "Direct push is always better — pull requests add unnecessary overhead"
            - "Feature branches add overhead but provide isolation, code review opportunities, and protect `main` from broken code"
            - "Pull requests are only needed for open-source projects, not internal teams"
            - "There is no difference — both approaches produce identical results"
          correct_index: 1
          explanation: "Feature branches + pull requests are the industry standard because they provide isolation (broken code doesn't affect `main`), enable code review before merging, and create a clear history of what was reviewed and approved. The trade-off is process overhead, which is worth it for most teams."

        - question: "During a large merge, you know that **all** conflicting lines should be resolved in favour of the incoming feature branch. Which command avoids manual conflict resolution while still combining non-conflicting changes normally?"
          options:
            - "`git merge feature -X ours` — keeps your current branch's version on every conflict"
            - "`git merge feature -X theirs` — keeps the incoming branch's version on every conflict"
            - "`git merge --abort` — cancels the merge so you can resolve conflicts later"
            - "`git merge feature --no-ff` — forces a merge commit but does not auto-resolve conflicts"
          correct_index: 1
          explanation: "`-X theirs` tells Git to automatically resolve every conflict by keeping the incoming branch's version. Non-conflicting changes from both branches are still combined normally. `-X ours` does the opposite — keeps the current branch's version. These flags are useful when one side is clearly authoritative, saving you from resolving each conflict marker by hand."

  # --------------------------------------------------------------------------
  # STEP 14: Review and best practices
  # --------------------------------------------------------------------------
  - title: "Review and Best Practices"
    instructions: |
      ### You made it!

      Seriously, nice work. You've gone from zero to a solid Git workflow.
      Let's review everything you've picked up:

      ### Commands you now know

      | Command | Purpose |
      |---|---|
      | `git init` | Create a new repository |
      | `git config` | Set your identity |
      | `git add <file>` | Stage specific files |
      | `git add .` | Stage all changes |
      | `git commit -m "msg"` | Save a snapshot |
      | `git status` | Check what's changed |
      | `git log` | View commit history |
      | `git diff` | See uncommitted changes |
      | `git show` | Inspect a commit |
      | `git restore --staged` | Unstage a file |
      | `git restore` | Discard working-directory changes |
      | `git branch` | List branches |
      | `git switch <branch>` | Switch to an existing branch |
      | `git switch -c <branch>` | Create and switch to a new branch |
      | `git merge` | Combine branch histories |
      | `git revert <hash>` | Safely undo a commit (adds anti-commit) |

      ### Best practices for professional use

      1. **Write meaningful commit messages** — explain *what* and *why*,
         not just "fix" or "update"
      2. **Commit small and often** — each commit should be one logical
         change
      3. **Use `.gitignore` early** — set it up before your first commit
      4. **Never commit secrets** — no API keys, passwords, or `.env` files
      5. **Pull frequently** — fetch remote changes early to avoid big
         conflicts

      ### Capstone challenge: Put it all together

      Time to prove your skills! Complete this mini-project using
      everything you've learned — **without step-by-step instructions**.
      Refer back to earlier steps if you get stuck.

      1. **Create** a new branch called `feature-power`
      2. **Add** a `power` function to `calculator.py`:
         ```python
         def power(a, b):
             """Return a raised to the power of b."""
             return a ** b
         ```
      3. **Commit** your change with a meaningful message
      4. **Switch** back to `main`
      5. **Merge** `feature-power` into `main`
      6. **Verify** by running `git log --oneline --graph --all`

      <details>
      <summary>Hint 1 — creating a branch and switching to it</summary>
      Revisit Step 8: there is a single <code>git switch</code> flag that creates a
      branch and immediately switches to it in one command.
      </details>

      <details>
      <summary>Hint 2 — staging and committing the change</summary>
      Revisit Steps 2–4: the two-step workflow is <code>git add &lt;file&gt;</code> then
      <code>git commit -m "message"</code>. Use a descriptive message.
      </details>

      <details>
      <summary>Hint 3 — merging back into main</summary>
      Revisit Step 9: switch to the branch you want to merge <em>into</em>
      before running <code>git merge</code>. Preview changes first with
      <code>git diff main..feature-power</code>.
      </details>

      This exercises branching, committing, merging, and log inspection
      — all without scaffolding. If you can do this independently,
      you're ready for real-world Git usage.

      ```bash
      cat calculator.py
      ```

      From an empty folder to a version-controlled Python project with
      branching, merge conflict resolution, and independent feature
      work — that's a whole journey. You should feel good about this.

    solution:
      files:
        - path: "myproject/calculator.py"
          content: |
            """A simple calculator module."""


            def add(a, b):
                """Return the sum of a and b (with type checking and logging)."""
                if not isinstance(a, (int, float)) or not isinstance(b, (int, float)):
                    raise TypeError("Arguments must be numbers")
                print(f"Adding {a} + {b}")
                return a + b


            def subtract(a, b):
                """Return the difference of a and b."""
                return a - b


            def multiply(a, b):
                """Return the product of a and b."""
                return a * b


            def divide(a, b):
                """Return the quotient of a and b."""
                if b == 0:
                    raise ValueError("Cannot divide by zero")
                return a / b


            def power(a, b):
                """Return a raised to the power of b."""
                return a ** b
          language: "python"
      commands:
        - "git switch -c feature-power"
        - "git add calculator.py"
        - "git commit -m \"Add power function\""
        - "git switch main"
        - "git merge feature-power"
        - "git log --oneline --graph --all"
        - "cat calculator.py"
      explanation: |
        - **Test 1:** `[ $(git log --oneline | wc -l) -ge 10 ]` — at least 10 commits in total.
        - **Test 2:** All five functions must be present in the final `calculator.py`.
        - **Test 3:** `.gitignore` must be in the commit history.
        - **Capstone test:** The `power` function must exist and be committed on `main`.

        **The final `calculator.py`:**

        ```python
        """A simple calculator module."""


        def add(a, b):
            """Return the sum of a and b (with type checking and logging)."""
            if not isinstance(a, (int, float)) or not isinstance(b, (int, float)):
                raise TypeError("Arguments must be numbers")
            print(f"Adding {a} + {b}")
            return a + b


        def subtract(a, b):
            """Return the difference of a and b."""
            return a - b


        def multiply(a, b):
            """Return the product of a and b."""
            return a * b


        def divide(a, b):
            """Return the quotient of a and b."""
            if b == 0:
                raise ValueError("Cannot divide by zero")
            return a / b
        ```

        **Git workflow summary:** The complete workflow practiced in this tutorial:

        ```
        git init          → create repository
        git add           → stage changes (post editor)
        git commit        → save snapshot (hit "Post")
        git status        → check current state
        git log           → view history
        git diff          → see what changed
        git switch -c     → create and switch to branch
        git merge         → combine branches
        git restore       → discard uncommitted changes
        git revert        → safely undo a committed change
        ```

    tests:
      - description: "Repository has at least 10 commits"
        command: "cd /tutorial/myproject && [ $(git log --oneline | wc -l) -ge 10 ]"
      - description: "calculator.py has add, subtract, multiply, divide, and power functions"
        command: "cd /tutorial/myproject && grep -q 'def add' calculator.py && grep -q 'def subtract' calculator.py && grep -q 'def multiply' calculator.py && grep -q 'def divide' calculator.py && grep -q 'def power' calculator.py"
      - description: ".gitignore exists and is committed"
        command: "cd /tutorial/myproject && git log --oneline -- .gitignore | grep -q '.'"
      - description: "power function is committed on main"
        command: "cd /tutorial/myproject && git show main:calculator.py | grep -q 'def power'"

