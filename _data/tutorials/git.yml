  # --------------------------------------------------------------------------
  # BONUS STEP: Remote workflow (conceptual)
  # --------------------------------------------------------------------------
  - title: "Bonus: Working with Remotes"
    instructions: |
      ### Beyond your local machine

      Everything you've learned so far works on your local repository.
      In the real world, teams share code through **remote repositories**
      hosted on platforms like GitHub, GitLab, or Bitbucket.

      The remote workflow adds three key commands to what you already know:

      ### The remote workflow

      ```
      ┌──────────┐    git push    ┌──────────┐    git push    ┌──────────┐
      │  Working  │ ──────────▶  │  Local   │ ──────────▶  │  Remote  │
      │ Directory │ ◀──────────  │   Repo   │ ◀──────────  │   Repo   │
      └──────────┘    git pull    └──────────┘    git pull    └──────────┘
                                  (your machine)              (e.g. GitHub)
      ```

      - **`git clone <url>`** — Download a full copy of a remote repository
        (including its entire history) to your machine
      - **`git push`** — Upload your local commits to the remote repository
      - **`git pull`** — Download and merge new commits from the remote into
        your local branch

      ### Task 1: Simulate a remote with a bare repository

      We can simulate a remote repository right here using a "bare" repo
      (a repository with no working directory — just the `.git` data):

      ```bash
      cd /tutorial
      git init --bare remote-repo.git
      ```

      ### Task 2: Connect your project to the remote

      ```bash
      cd /tutorial/myproject
      git remote add origin /tutorial/remote-repo.git
      ```

      `origin` is the conventional name for your primary remote.

      ### Task 3: Push your work

      > **Before you run:** Think about what `git push` will do. Will it
      > send only the latest commit, or the entire branch history?

      ```bash
      git push -u origin main
      ```

      The `-u` flag sets `origin/main` as the upstream tracking branch,
      so future pushes only need `git push`.

      ### Task 4: Simulate a colleague's change

      Clone the remote into a separate directory (like a teammate would):

      ```bash
      cd /tutorial
      git clone remote-repo.git colleague-copy
      cd colleague-copy
      ```

      Make a change as your "colleague":

      ```bash
      echo "# Contributing Guide" > CONTRIBUTING.md
      git add CONTRIBUTING.md
      git commit -m "Add contributing guide"
      git push
      ```

      ### Task 5: Pull your colleague's changes

      Switch back to your original project and pull:

      ```bash
      cd /tutorial/myproject
      git pull
      ```

      Check that the new file arrived:

      ```bash
      ls CONTRIBUTING.md
      git log --oneline -3
      ```

      You now have your colleague's work in your local repository.
      This is the complete Git collaboration cycle:
      **branch → commit → push → pull → merge**.

    solution:
      commands:
        - "cd /tutorial && git init --bare remote-repo.git"
        - "cd /tutorial/myproject && git remote add origin /tutorial/remote-repo.git"
        - "git push -u origin main"
        - "cd /tutorial && git clone remote-repo.git colleague-copy"
        - "cd /tutorial/colleague-copy"
        - "echo '# Contributing Guide' > CONTRIBUTING.md"
        - "git add CONTRIBUTING.md"
        - "git commit -m 'Add contributing guide'"
        - "git push"
        - "cd /tutorial/myproject && git pull"
        - "ls CONTRIBUTING.md"
      explanation: |
        - **`git init --bare`:** Creates a repository without a working directory — exactly what servers like GitHub host. It only stores the `.git` data.
        - **`git remote add origin`:** Registers a remote repository under the name `origin`. You can have multiple remotes (e.g., `upstream` for a fork's parent).
        - **`git push -u origin main`:** Uploads all commits on `main` to the remote. `-u` sets the upstream, so future `git push` and `git pull` know which remote branch to sync with.
        - **`git clone`:** Creates a full copy of the remote repository, including its complete history. Your "colleague" gets everything.
        - **`git pull`:** Fetches new commits from the remote and merges them into your current branch. It's equivalent to `git fetch` + `git merge`.

    tests:
      - description: "Remote 'origin' is configured"
        command: "cd /tutorial/myproject && git remote | grep -q 'origin'"
      - description: "main branch has been pushed to origin"
        command: "cd /tutorial/myproject && git log origin/main --oneline | grep -q '.'"
      - description: "CONTRIBUTING.md exists after pull"
        command: "cd /tutorial/myproject && [ -f CONTRIBUTING.md ]"

    quiz:
      title: "Working with Remotes — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "What does `git clone` do?"
          options:
            - "Creates an empty repository on the remote server"
            - "Downloads a full copy of a remote repository including its entire commit history"
            - "Copies only the latest version of the files without any history"
            - "Creates a symbolic link to the remote repository"
          correct_index: 1
          explanation: "`git clone` creates a complete, independent copy of the repository — including every commit, branch, and tag. You get the full history, not just the latest snapshot."

        - question: "What is the difference between `git push` and `git pull`?"
          options:
            - "`push` uploads your local commits to the remote; `pull` downloads and merges remote commits into your local branch"
            - "`push` creates a new branch on the remote; `pull` deletes a branch from the remote"
            - "`push` sends files to your teammates directly; `pull` requests their files"
            - "They are synonyms — both sync your repository with the remote"
          correct_index: 0
          explanation: "`git push` sends your local commits upstream. `git pull` fetches new commits from the remote and merges them into your local branch. Together, they keep your local and remote repositories in sync."

        - question: "**[Interleaved: Revisit Step 13]** A colleague pushed a broken commit to `main`. Which command should you use to undo it safely on the shared branch?"
          options:
            - "`git reset --hard HEAD~1` then `git push -f`"
            - "`git revert HEAD`"
            - "`git restore HEAD`"
            - "`git checkout HEAD~1`"
          correct_index: 1
          explanation: "`git revert` creates a safe anti-commit. On shared branches, never use `git reset --hard` + force-push — it rewrites history and breaks every teammate's local copy."

        - question: "**[Evaluate]** Your team has a choice: everyone pushes directly to `main`, or everyone works on feature branches and merges via pull requests. What are the trade-offs?"
          options:
            - "Direct push is always better — pull requests add unnecessary overhead"
