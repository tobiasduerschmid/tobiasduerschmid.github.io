            - "--cached"
            - "notes.txt"
          distractors:
            - "restore"
            - "--staged"
            - "add"
            - "-f"
          explanation: "`git rm --cached <file>` removes a file from the index (staging area) while leaving the file on disk. The next commit will record the file as deleted. This is the complement of `git restore --staged`: both manipulate the index without touching the working tree, but in opposite directions."

        - question: |
            **Construct** the command that resets your working directory to **exactly match the latest commit**, restoring any files that were deleted from disk.
          type: parsons
