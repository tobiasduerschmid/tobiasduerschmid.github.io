  - title: "Git Mastery — Final Review"
    instructions: |
      ### Congratulations — you've completed the Git tutorial!

      From an empty folder to a version-controlled Python project with
      branching, merge conflict resolution, remote collaboration, and
      independent feature work — that's a serious achievement.

      Take a moment to appreciate what you can now do:

      - Initialize repositories and configure your identity
      - Stage, commit, and inspect changes with precision
      - Branch, merge, and resolve conflicts like a professional
      - Undo mistakes safely on shared branches
      - Collaborate through remotes with push and pull

      Before you go, let's do one final knowledge check to cement
      everything. This quiz covers the entire tutorial — all 14 steps.
      Good luck!

    tests: []

    quiz:
      title: "Git Mastery — Final Comprehensive Review"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "Which scenarios call for `git revert` rather than `git restore`? (Select all that apply)"
          type: multiple
          options:
            - "You accidentally staged `config.py` and want to remove it from the staging area"
            - "You committed a bug to a shared `main` branch that teammates have already pulled"
            - "You edited `main.py` but haven't staged it yet and want to discard the change"
            - "You need to undo a commit that was already pushed to the team's remote repository"
          correct_indices:
            - 1
            - 3
          explanation: "`git revert` is the tool for safely undoing **committed, shared history**. `git restore --staged` handles accidentally staged files. `git restore <file>` discards uncommitted working-directory edits. `git reset --hard` on a shared branch rewrites history and would break teammates who already pulled."

        - question: "**[Interleaved: Revisit Step 6]** A teammate says: 'I'll add `.gitignore` later — for now I'll just manually remember not to stage `.env`.' What is the hidden risk?"
          options:
            - "No risk — Git never tracks files without an explicit `git add`"
            - "Risky — one accidental `git add .` by anyone on the team permanently commits the secret with no retroactive fix"
            - "No risk — Git automatically detects files containing API keys and refuses to stage them"
            - "Risky — but only if the remote repository is public"
          correct_index: 1
          explanation: "As Step 6 showed, `.gitignore` **cannot retroactively remove** files already committed. One careless `git add .` — by any developer, on any machine — permanently exposes a secret in history. Even deleting the file in a later commit doesn't help: the secret lives in every prior commit, accessible to anyone who clones. This is why `.gitignore` must exist **before** the first `git add`."

        - question: "You want to see the full history graph including all branches in one compact view. Which command is correct?"
          options:
            - "`git log --oneline`"
            - "`git log --oneline --graph --all`"
            - "`git branch -a`"
            - "`git diff --stat HEAD`"
          correct_index: 1
          explanation: "`--graph` draws ASCII art showing branch structure and merge points. `--all` includes all branches, not just the current one. `--oneline` keeps it readable. Together they give the most complete overview of your repository's entire history."

        - question: "A colleague shares a project folder via USB — it has source files but no `.git` directory. `git status` reports 'not a git repository'. What is the single command needed before you can start tracking changes?"
          options:
            - "`git init` — creates the hidden `.git` directory that turns the folder into a repository"
            - "`git config --global` — registers the folder with Git's global settings"
            - "`git clone` — downloads the repository history from a remote"
            - "`git add .` — starts tracking all files immediately without initialising"
          correct_index: 0
          explanation: "Without `.git/`, the folder is not a repository — `git init` creates it. `git clone` only works with a remote URL. `git add` requires a repository to already exist. The error 'not a git repository' always means `git init` (or `git clone`) needs to run first."

        - question: "You've modified 5 files but only want 2 of them in your next commit. Which staging approach gives you the most precise control?"
          options:
            - "`git add .` — stage everything, then unstage the ones you don't want"
            - "`git add file1.py file2.py` — stage only the specific files by name"
            - "`git commit -a` — commit all modifications at once"
            - "`git add --all` — stage everything including untracked files"
          correct_index: 1
          explanation: "Staging files by name is the most direct way to control what enters each commit — the core lesson from Step 4. While `git add .` followed by `git restore --staged` would also work, naming files explicitly is simpler and less error-prone."

        - question: "**[Interleaved: Revisit Step 11]** You resolved the conflict in `app.py` and ran `git add app.py`. `git status` then shows a second file, `config.py`, also marked 'both modified'. Can you run `git commit` now?"
          options:
            - "Yes — `git commit` will finish the merge and ignore the unresolved file"
            - "No — every conflicting file must be resolved and `git add`-ed before `git commit` will succeed"
            - "Yes — Git auto-resolves remaining conflicts when you commit"
            - "No — you must run `git merge --abort` and start over"
          correct_index: 1
          explanation: "Git requires **all** conflicting files to be resolved and staged before the merge commit can be created. Running `git commit` with any 'unmerged paths' remaining will fail with an error. Fix each conflict, `git add` each file, then commit once."

        - question: "You ran `git add .` and accidentally staged `secrets.env` alongside your real changes. You need to unstage **only** that file while keeping everything else staged and your edits intact. What do you run?"
          options:
            - "`git restore secrets.env` — unstages and discards the file's edits"
            - "`git restore --staged secrets.env` — moves only that file off the staging area, preserving edits"
            - "`git reset --hard` — resets all staged and unstaged changes"
            - "`git rm secrets.env` — deletes the file from the repository"
          correct_index: 1
          explanation: "`git restore --staged <file>` is surgical: it moves one file off the post editor while leaving the rest of your staged changes untouched. Without `--staged`, `git restore` would also discard the working-directory edits — a destructive difference."

        - question: "Without a staging area, `git commit` would have to snapshot every modified file at once. What capability would you lose?"
          options:
            - "The ability to push to a remote repository"
            - "The ability to create focused, logical commits from a messy working directory with many in-progress edits"
            - "The ability to see the diff of uncommitted changes"
            - "The ability to create branches"
          correct_index: 1
          explanation: "The staging area is the mechanism that decouples 'what you're working on' from 'what you're ready to commit'. Without it, every commit would be an all-or-nothing snapshot, making it impossible to create clean, single-purpose history entries from a working directory in flux."

        - question: "You want to see the **line-by-line** differences of what you've modified but **not yet staged**. Which command do you use?"
          options:
            - "`git status`"
            - "`git log`"
            - "`git diff`"
            - "`git show`"
          correct_index: 2
          explanation: "`git diff` compares the working directory to the staging area."

        - question: "Which command shows a chronological list of all commits, their authors, and their unique SHA-1 hashes?"
          options:
            - "`git status`"
            - "`git diff --history`"
            - "`git log`"
            - "`git cat-file`"
          correct_index: 2
          explanation: "`git log` prints the full chain of snapshots — each entry shows the unique commit hash, author, timestamp, and message. Add `--oneline` to compress to one line per commit, `--graph` to draw ASCII branch structure, and `--all` to include every branch. You used this in Step 7 to inspect commits and in Steps 10–11 to verify merges and track history."

        - question: "Creating a branch takes ~41 bytes and is nearly instant, even in a 10-year-old repository with thousands of files. What explains this?"
          options:
            - "Git copies only recently modified files, so large old repositories are fast"
            - "A branch is just a tiny file containing one commit hash — creating it involves no copying at all"
            - "Git uses aggressive network compression when creating branches"
            - "Branches store a diff from `main`, not full file copies"
          correct_index: 1
          explanation: "A branch is a 41-byte text file in `.git/refs/heads/` that holds a single SHA hash. 'Creating a branch' means writing that one file — regardless of how many commits or files exist. This is why Git can have hundreds of branches at virtually no cost."

        - question: "When you merge two branches that have **diverged** (both have unique commits), what kind of commit does Git create to combine them?"
          options:
            - "A fast-forward commit"
            - "A merge commit (with two parents)"
            - "A rebase commit"
            - "A duplicate commit"
          correct_index: 1
          explanation: "When two branches have diverged (each has unique commits since the split), Git finds their **common ancestor** commit, then compares both tips against it. Changes that don't overlap are combined automatically; lines changed differently by both branches become a conflict. The result is a **merge commit with two parents** — visible as a join point in `git log --oneline --graph`. You set this up and experienced it in Steps 10–11."

        - question: "A teammate asks: 'Can I use `git merge --abort` to cancel the whole merge after I've already fixed half the conflicts?' What do you tell them?"
          options:
            - "No — once you start resolving, you must finish; abort is disabled"
            - "Yes — `git merge --abort` can be run at any point to cancel the merge and restore both branches to their pre-merge state"
            - "Yes — but only if fewer than half the conflicts are resolved"
            - "No — you must commit the partial resolution first, then revert"
          correct_index: 1
          explanation: "`git merge --abort` cancels an in-progress merge at any point — even mid-resolution — restoring your working directory and staging area to the state before `git merge` was run. It is the safe escape hatch if you decide the merge strategy needs rethinking."

        - question: "Which command is the **safest** way to undo a mistake that has already been committed and potentially shared with a team?"
          options:
            - "`git reset --hard`"
            - "`git revert <hash>`"
            - "`git checkout <hash>`"
            - "`git clean -fd`"
          correct_index: 1
          explanation: "`git revert` is the safe undo for committed, shared work: it creates a new commit that applies the **exact inverse** of the target commit, leaving all existing history untouched. `git reset --hard`, by contrast, destroys commits by moving the branch pointer backward and requires a force-push on shared branches — breaking every teammate who already pulled. You practiced this distinction directly in Step 12."

        - question: "Six months ago, `.env` containing database credentials was accidentally committed to `main`. You've since added `.env` to `.gitignore` and committed. Is the secret safe from someone who clones the repository today?"
          options:
            - "Yes — `.gitignore` retroactively scrubs the file from all past commits"
            - "Yes — Git encrypts committed secrets when `.gitignore` is added"
            - "No — `.gitignore` only prevents **future** tracking; the secret still lives in history and requires tools like `git filter-repo` or BFG Repo Cleaner to fully remove"
            - "No — but `git rm .env` will delete it from all historical commits automatically"
          correct_index: 2
          explanation: "`.gitignore` only affects future `git add` and `git status` behaviour — it never rewrites history. A cloned repository receives the full commit history including the commit that added `.env`. This is why Step 6 emphasised creating `.gitignore` **before** your first commit."

        - question: "Why does `git switch` sometimes change the files you see in your file explorer?"
          options:
            - "Because Git is downloading them from a server"
            - "Because Git updates your working directory to match the snapshot the branch points to"
            - "Because Git is deleting your old files to save space"
            - "Because you have a virus"
          correct_index: 1
          explanation: "Git's 'Time Machine' capability replaces your files with the versions from the target snapshot."

        - question: "You staged `app.py` with `git add`. Which command shows you exactly what will be in the **next commit** — before you actually commit?"
          options:
            - "`git diff`"
            - "`git diff --staged`"
            - "`git show HEAD`"
            - "`git log --oneline`"
          correct_index: 1
          explanation: "`git diff --staged` compares the staging area to the last commit — showing precisely what `git commit` would snapshot. `git diff` without flags shows only unstaged changes (which would be nothing here). `git show HEAD` inspects what was already committed."

        - question: "You are about to run `git merge feature` from `main`. Name the **three** things you should check first. (Select all that apply)"
          type: multiple
          options:
            - "Confirm you are on the correct target branch (`git branch --show-current`)"
            - "Preview what the merge will introduce (`git diff main..feature`)"
            - "Ensure your working directory is clean — no uncommitted changes that could complicate a conflict (`git status`)"
            - "Run `git push` first to sync with the remote"
          correct_indices:
            - 0
            - 1
            - 2
          explanation: "Before merging: (1) be on the right branch, (2) preview the incoming changes, (3) start from a clean working directory so you don't mix in-progress work with conflict resolution. Pushing first is unrelated to the merge — you push *after* the merge is complete."

        - question: "Which sequence correctly describes the full local Git workflow from editing a file to having it permanently saved in history?"
          type: multiple
          options:
            - "Edit file in working directory"
            - "`git add <file>` — move to staging area"
            - "`git push` — upload to remote"
            - "`git commit -m 'message'` — create permanent snapshot"
          correct_indices:
            - 0
            - 1
            - 3
          explanation: "The local workflow is **edit → stage → commit**. `git push` uploads to a remote and is a separate step that happens *after* committing. A commit is permanent in the local repository regardless of whether you ever push."

        - question: "A teammate always commits directly to `main` without creating feature branches. Which professional best practice does this violate, and what does the team lose?"
          options:
            - "Nothing — committing to `main` is standard for solo projects and small teams"
            - "Isolation — changes land on the shared branch immediately with no review window; broken work-in-progress blocks teammates and rollback becomes harder"
            - "Only a naming convention — branches must follow the `feature-*` pattern"
            - "The commit frequency rule — all commits must happen at least daily"
          correct_index: 1
          explanation: "Feature branches provide **isolation**: your in-progress work never touches the stable shared branch until it is ready and reviewed. Without branching, one broken commit immediately affects every teammate. Branches also enable pull-request code review and make reverting a logical unit of work trivial — as you practiced throughout Steps 8–13."

        - question: "Which of the following are **best practices** for professional Git usage covered in this tutorial? (Select all that apply)"
          type: multiple
          options:
            - "Write commit messages that describe what changed and why"
            - "Create `.gitignore` before the first commit to prevent accidental secret exposure"
            - "Use `git push -f` regularly to keep the remote history clean"
            - "Use `git revert` instead of `git reset --hard` to undo mistakes on shared branches"
          correct_indices:
            - 0
            - 1
            - 3
          explanation: "`git push -f` rewrites shared history and breaks every teammate who already pulled — the opposite of a best practice on shared branches. The other three were explicitly taught throughout this tutorial: descriptive messages (Step 2), `.gitignore` first (Step 6), and safe undo with `git revert` (Step 12)."

        - question: "After running `git push -u origin main`, a teammate clones the repository and makes two commits. You run `git pull`. What does `git pull` actually do under the hood?"
          options:
            - "It downloads the remote repository and replaces your local files"
            - "It runs `git fetch` (download new commits) followed by `git merge` (integrate them into your current branch)"
            - "It creates a new branch with the remote's changes and switches to it"
            - "It only updates `git log` to show the remote commits — your files are unchanged until you run `git merge`"
          correct_index: 1
          explanation: "`git pull` is shorthand for two operations: `git fetch` downloads new commits from the remote without touching your working directory, then `git merge` integrates those commits into your current branch. Understanding this two-step process helps when you need finer control — for example, running `git fetch` first to inspect incoming changes before merging."
