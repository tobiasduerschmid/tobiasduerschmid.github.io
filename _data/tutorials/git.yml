title: "Version Control with Git"
description: "Learn Git through hands-on practice — from your first commit to resolving merge conflicts, all inside an interactive Linux environment"

require_tests: true
allow_autosave: false

setup_commands:
  - "git config --global user.email 'student@cs.ucla.edu'"
  - "git config --global user.name 'Diligent Student'"
  - "git config --global init.defaultBranch main"

steps:
  # --------------------------------------------------------------------------
  # STEP 1: Why Version Control? + git init + git config
  # --------------------------------------------------------------------------
  - title: "Your First Repository"
    instructions: |
      Welcome to the **Git Tutorial**! On the right you have a code editor
      (top) and a real Linux terminal (bottom). Files you edit are
      automatically synced to the VM.

      ### Why version control?

      Imagine working on a project and saving files like
      `report_final_v2_REALLY_final.txt`. Version control solves this chaos.
      It lets you:

      - **Track every change** — see exactly what changed, when, and by whom
      - **Undo mistakes** — roll back to any previous version
      - **Work in parallel** — multiple people can edit without overwriting each other

      Imagine you and a teammate are both editing `calculator.py`. You add a
      `multiply` function while they rewrite the `add` function. Without version
      control, whoever saves last silently overwrites the other's work. Git
      solves this — it lets both changes coexist on separate **branches** and
      helps you combine them safely. We'll see exactly how later in this tutorial.

      Git is the most widely used version control system in the world. Let's
      learn it by building a small Python project.

      Before we start, understand Git's core architecture — every file
      lives in one of **three states**:

      ```
      ┌──────────────┐     git add     ┌──────────────┐   git commit  ┌──────────────┐
      │   Working    │ ──────────────▶ │   Staging    │ ────────────▶ │    Local     │
      │  Directory   │                 │  Area (Index)│               │  Repository  │
      └──────────────┘                 └──────────────┘               └──────────────┘
            You edit                     You review                    Permanently
           files here                  what will be in                  saved as a
                                      the next snapshot                  snapshot
      ```

      Think of it like packing a shipping box:
      - **Working Directory** = the warehouse floor (your messy workspace)
      - **Staging Area** = the loading dock (you arrange items to ship)
      - **Commit** = the truck drives away (a permanent snapshot is saved)

      ### Task 1: Initialize a repository

      Your Git identity has already been configured for you. You can verify this anytime with `git config user.name`.

      Now create a new Git repository:

      ```bash
      git init myproject
      cd myproject
      ```

      `git init` creates a hidden `.git` folder that stores all version
      history. You now have an empty repository!

      ### Task 2: Explore what was created

      Run this command to see the hidden `.git` directory:

      ```bash
      ls -la
      ```

      You should see a `.git/` folder — this is where Git stores everything.
      Your working directory is clean and empty, ready for your first file.

    solution:
      commands:
        - "git init myproject"
        - "cd myproject"
        - "ls -la"
      explanation: |
        - **`git init myproject`:** Creates a new directory `myproject/` and initializes a `.git/` folder inside it. The `.git/` folder is the entire repository — it stores all history, branches, and configuration. Without it, the directory is just a regular folder.
        - The tests check: (1) `git config user.name` returns a non-empty value (already configured by the tutorial setup), (2) `git config user.email` returns a value, and (3) `/tutorial/myproject/.git` exists as a directory.
        - Internally, `git init` creates low-level object store directories (`objects/`, `refs/`) that all other commands build on.

    tests:
      - description: "Git user name is configured"
        command: "git config user.name | grep -q '.'"
      - description: "Git user email is configured"
        command: "git config user.email | grep -q '.'"
      - description: "myproject directory exists and is a Git repository"
        command: "[ -d /tutorial/myproject/.git ]"

    quiz:
      title: "Your First Repository — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "In Git's three-state model, what is the purpose of the **Staging Area**?"
          options:
            - "Where Git permanently stores committed snapshots"
            - "Where you review and select exactly which changes will go into the next commit"
            - "Where you write and save your source code files"
            - "A remote server where you back up your work"
          correct_index: 1
          explanation: "The Staging Area (loading dock) is Git's way of letting you precisely control what goes into each commit. You can stage some changes but not others, creating clean, focused snapshots."

        - question: "What does `git init` create inside your project directory?"
          options:
            - "A new branch called `main` on GitHub"
            - "A hidden `.git` directory that stores all version history"
            - "A remote repository on a server"
            - "A commit containing all existing files"
          correct_index: 1
          explanation: "`git init` creates a hidden `.git/` directory containing the full version history database, configuration, and branch pointers. This is the entire repository — no network access required."

        - question: "Which problems does version control solve? (Select all that apply)"
          type: multiple
          options:
            - "Tracking exactly who changed what, and when"
            - "Rolling back to any previous version of your project"
            - "Automatically fixing bugs and syntax errors"
            - "Allowing multiple developers to work in parallel without overwriting each other"
          correct_indices:
            - 0
            - 1
            - 3
          explanation: "Version control tracks history, enables rollbacks, and supports parallel work. It does NOT fix bugs — that part is still up to you!"

  # --------------------------------------------------------------------------
  # STEP 2: First commit — git add, git commit
  # --------------------------------------------------------------------------
  - title: "Your First Commit"
    instructions: |
      ### Creating and tracking files

      Unlike other version control systems that track "Deltas" (changes
      between versions), **Git takes Snapshots**. Every commit is a full
      picture of what all your files looked like at that moment. You'll see
      this in action when you make your first commit below.

      Now let's create our first Python file. A file in your working
      directory starts as **untracked** — Git doesn't know about it yet.

      > **Before you run:** We've saved `calculator.py` to disk but haven't
      > told Git about it yet. Will `git status` show it as *tracked* or
      > *untracked*? What color do you expect? Form your answer, then continue:

      ### Task 1: Create a file and check status

      The editor shows `calculator.py` — a simple calculator module.
      It has already been saved to the VM. Now run:

      ```bash
      git status
      ```

      You should see `calculator.py` listed as an **untracked file** in red.
      Git sees the file but isn't tracking it yet.

      ### Reading `git status` output

      `git status` is the command you'll run most often. Learn to read its
      three sections:

      | Section heading | Color | Meaning |
      |---|---|---|
      | **Changes to be committed** | Green | Staged — will be in the next commit |
      | **Changes not staged for commit** | Red | Modified tracked files — not yet staged |
      | **Untracked files** | Red | Brand new files Git has never seen |

      Right now you should see the third section: `calculator.py` as an
      untracked file. After staging, it will move to the first section.

      > If the staging area feels confusing — you're not alone. Even Git's
      > own designers have acknowledged that some of its concepts could be
      > clearer (Perez De Rosso & Jackson, 2016). The two-step add/commit
      > flow exists because it gives you fine-grained control over *exactly*
      > what goes into each snapshot. That power is worth the initial
      > learning curve.

      ### Task 2: Stage the file

      Move the file from the Working Directory to the Staging Area:

      ```bash
      git add calculator.py
      ```

      Now run `git status` again. The file should appear in green under
      "Changes to be committed". It's on the loading dock, ready to ship!

      ### Task 3: Commit the snapshot

      Save this snapshot permanently to the repository:

      ```bash
      git commit -m "Add calculator module with add and subtract"
      ```

      The `-m` flag lets you write a message describing *what* and *why*.
      Good commit messages help your future self (and teammates) understand
      the history.

      Run `git status` one more time — it should say "nothing to commit,
      working tree clean". Your file is safely stored!

      > **Self-check:** In your own words, explain the difference between
      > the Working Directory, the Staging Area, and the Repository. If you
      > can describe the shipping analogy from Step 1 without looking back,
      > you've got it.

    files:
      - path: "myproject/calculator.py"
        content: |
          """A simple calculator module."""


          def add(a, b):
              """Return the sum of a and b."""
              return a + b


          def subtract(a, b):
              """Return the difference of a and b."""
              return a - b
        language: "python"

    open_file: "myproject/calculator.py"

    watch_files:
      - "myproject/calculator.py"

    solution:
      commands:
        - "cd /tutorial/myproject"
        - "git status"
        - "git add calculator.py"
        - "git status"
        - "git commit -m \"Add calculator module with add and subtract\""
        - "git status"
      explanation: |
        - **`git add calculator.py`:** Moves the file from the Working Directory to the Staging Area. Before `git add`, the file is "untracked" — Git sees it but doesn't track it. After, it's "staged" (green in `git status`).
        - **`git commit -m "Add calculator module with add and subtract"`:** Creates a permanent snapshot. The test checks `git log --oneline | head -1 | grep -qi 'calc\|add'` — so the commit message must contain "calc" or "add" (case-insensitive).
        - The test also verifies `git log --oneline -- calculator.py | grep -q '.'` — `calculator.py` must appear in at least one commit's history.
        - **Why the two-step add/commit?** The Staging Area lets you precisely control what goes into each commit. You can edit 10 files but commit only 3 as one logical change.

    tests:
      - description: "calculator.py exists in the repository"
        command: "[ -f /tutorial/myproject/calculator.py ]"
      - description: "calculator.py is tracked by Git (has been committed)"
        command: "cd /tutorial/myproject && git log --oneline -- calculator.py | grep -q '.'"
      - description: "Commit message mentions 'calculator' or 'add'"
        command: "cd /tutorial/myproject && git log --oneline | head -1 | grep -qi 'calc\\|add'"

    quiz:
      title: "Your First Commit — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "What does `git status` show for a file that exists in your working directory but has never been added to Git?"
          options:
            - "Modified (red)"
            - "Staged (green)"
            - "Untracked (red)"
            - "Committed"
          correct_index: 2
          explanation: "An **untracked** file is one Git has never been told to follow. It shows up in red under 'Untracked files'. Once you run `git add`, it moves to the staging area and Git begins tracking it."

        - question: "**[Interleaved: Revisit Step 1]** What is the very first command you ran to turn your folder into a Git repository?"
          options:
            - "`git commit`"
            - "`git add`"
            - "`git init`"
            - "`git config`"
          correct_index: 2
          explanation: "`git init` creates the hidden `.git` folder and initializes the metadata structures that allow Git to start tracking your project."

        - question: "Which sequence of commands correctly stages and commits a new file called `app.py`?"
          options:
            - "`git commit app.py` then `git add app.py`"
            - "`git add app.py` then `git commit -m 'Add app module'`"
            - "`git stage app.py` then `git save 'Add app module'`"
            - "`git track app.py` then `git commit`"
          correct_index: 1
          explanation: "The correct two-step flow is **add** (move to staging area) then **commit** (save the snapshot). `git commit` only commits what's in the staging area, so you must `git add` first."

        - question: "Which of the following are characteristics of a **good commit message**? (Select all that apply)"
          type: multiple
          options:
            - "Describes what changed and why"
            - "Is specific enough that your future self understands the context"
            - "Uses a single letter like 'f' or 'x' for brevity"
            - "Treats each commit as one logical, focused change"
          correct_indices:
            - 0
            - 1
            - 3
          explanation: "Good commit messages are descriptive, explain intent, and accompany small, focused changes. Cryptic single-letter messages make history useless for debugging and code review."

  # --------------------------------------------------------------------------
  # STEP 3: Making changes — edit, diff, add, commit cycle
  # --------------------------------------------------------------------------
  - title: "The Edit-Stage-Commit Cycle"
    instructions: |
      ### Modifying tracked files

      Git now tracks `calculator.py`. When you edit a tracked file, Git
      notices the difference between what's in your working directory and
      what was last committed.

      ### Task 1: Add a multiply function

      Open `calculator.py` in the editor and add this function at the
      bottom of the file:

      ```python
      def multiply(a, b):
          """Return the product of a and b."""
          return a * b
      ```

      Save the file (**Ctrl+S**), then run in the terminal:

      ```bash
      
      git status
      ```

      You'll see `calculator.py` is now listed as **modified** (in red).
      The file is tracked, but your new changes haven't been staged yet.

      ### Task 2: See exactly what changed

      > **Before you run:** `git diff` compares two areas. You've modified
      > `calculator.py` but haven't staged it yet. Which two areas will it
      > compare — working directory vs. staging area, or staging area vs. last
      > commit? Will your new `multiply` function appear with a `+` or `-`?

      Before staging, review your changes:

      ```bash
      git diff
      ```

      `git diff` compares your **working directory** to the **staging area**.
      Lines starting with `+` are additions; `-` are removals. This is your
      chance to review before committing.

      ### Task 3: Stage and commit

      Now complete the cycle:

      ```bash
      git add calculator.py
      git commit -m "Add multiply function to calculator"
      ```

      ### Task 4: Review your history

      See all your commits so far:

      ```bash
      git log
      ```

      Each commit shows: a unique hash (ID), the author, date, and your
      message. Press `q` to exit the log viewer.

      > **Self-check:** You just ran `git diff` and saw lines marked with
      > `+`. Without looking back, explain to yourself: what two things did
      > `git diff` compare to produce that output? If you're unsure, re-read
      > the explanation above — this distinction matters in every future step.

    watch_files:
      - "myproject/calculator.py"

    solution:
      files:
        - path: "myproject/calculator.py"
          content: |
            """A simple calculator module."""


            def add(a, b):
                """Return the sum of a and b."""
                return a + b


            def subtract(a, b):
                """Return the difference of a and b."""
                return a - b


            def multiply(a, b):
                """Return the product of a and b."""
                return a * b
          language: "python"
      commands:
        - "git status"
        - "git diff"
        - "git add calculator.py"
        - "git commit -m \"Add multiply function to calculator\""
        - "git log"
      explanation: |
        - **Test 1:** `grep -q 'def multiply' calculator.py` — the `multiply` function must exist in the file.
        - **Test 2:** `git log --oneline | grep -qi 'multiply'` — the commit message must contain "multiply" (case-insensitive). The sample message `"Add multiply function to calculator"` satisfies this.
        - **Test 3:** `[ $(git log --oneline | wc -l) -ge 2 ]` — the repository must have at least 2 commits total.
        - **`git diff` before staging:** Compares the Working Directory to the Staging Area. Since nothing is staged yet, the staging area still matches the last commit — so `git diff` shows your `multiply` function as new lines with `+`.

    tests:
      - description: "calculator.py contains a multiply function"
        command: "cd /tutorial/myproject && grep -q 'def multiply' calculator.py"
      - description: "The multiply function has been committed"
        command: "cd /tutorial/myproject && git log --oneline | grep -qi 'multiply'"
      - description: "Repository has at least 2 commits"
        command: "cd /tutorial/myproject && [ $(git log --oneline | wc -l) -ge 2 ]"

    quiz:
      title: "Edit-Stage-Commit Cycle — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "You modified `calculator.py` but have NOT yet run `git add`. What does `git diff` compare?"
          options:
            - "Staging area vs. last commit"
            - "Working directory vs. last commit"
            - "Working directory vs. staging area"
            - "Last commit vs. second-to-last commit"
          correct_index: 2
          explanation: "`git diff` (with no arguments) compares your **working directory** to the **staging area**. Since nothing is staged yet, the staging area still matches the last commit, so you see all your unstaged modifications."

        - question: "**[Interleaved: Revisit Step 2]** If you run `git commit` without running `git add` first on a new file, what happens?"
          options:
            - "Git automatically adds the file and commits it"
            - "Git ignores the new file and nothing is committed"
            - "Git shows an error and stops the commit"
            - "Git asks if you'd like to include the file"
          correct_index: 1
          explanation: "Git only commits what is currently in the **staging area**. New files must be explicitly added with `git add` to be included in a commit snapshot."

        - question: "**[Interleaved: Revisit Step 1]** Which hidden directory does `git init` create to store all version history?"
          options:
            - ".git/"
            - ".config/"
            - ".history/"
            - ".git-init/"
          correct_index: 0
          explanation: "The hidden `.git/` folder contains your entire repository data. As we learned in Step 1, this is what `git init` creates to start versioning your project."

        - question: "In `git diff` output, what does a line starting with `+` indicate?"
          options:
            - "A line that was deleted"
            - "A line that was added"
            - "A line that is unchanged"
            - "A file that was renamed"
          correct_index: 1
          explanation: "In diff output, lines starting with `+` are **additions** and lines starting with `-` are **deletions**. Unchanged context lines have no prefix symbol."

        - question: "Which `git diff` variants compare which areas? (Select all correct pairs)"
          type: multiple
          options:
            - "`git diff` → working directory vs. staging area"
            - "`git diff --staged` → staging area vs. last commit"
            - "`git diff HEAD` → staging area vs. second-to-last commit"
            - "`git diff HEAD~1 HEAD` → previous commit vs. latest commit"
          correct_indices:
            - 0
            - 1
            - 3
          explanation: "`git diff` compares working dir to staging; `git diff --staged` compares staging to last commit; `git diff HEAD~1 HEAD` compares two commits. `git diff HEAD` actually compares working directory (including unstaged changes) to the last commit — not the staging area to an older commit."

  # --------------------------------------------------------------------------
  # STEP 4: Staging strategies — individual, wildcard, directory, all
  # --------------------------------------------------------------------------
  - title: "Staging Strategies"
    instructions: |
      ### Controlling what goes into a commit

      The staging area lets you carefully choose *exactly* which changes
      become part of each commit. Several new files have been added to your
      project — run `git status` to see them.

      ### Task 1: Stage files selectively

      Stage just one specific file and check the result:

      ```bash
      git add README.md
      git status
      ```

      Notice: `README.md` is green (staged), while the others are still
      red (untracked). You have precise control! You can also stage by
      pattern — try `git add test_*.py` to stage both test files at once.

      ### Task 2: Stage everything and commit

      Stage all remaining files and commit:

      ```bash
      git add .
      git commit -m "Add test files, README, and project notes"
      ```

      The `.` means "current directory and everything in it".

      ### Staging reference

      You now know several ways to stage:
      - **Individual file:** `git add README.md`
      - **Wildcard pattern:** `git add test_*.py`
      - **Current directory:** `git add .`
      - **All tracked + untracked:** `git add --all` (or `-A`)

    files:
      - path: "myproject/test_calc.py"
        content: |
          """Tests for calculator."""
        language: "python"
      - path: "myproject/test_utils.py"
        content: |
          """Tests for utilities."""
        language: "python"
      - path: "myproject/README.md"
        content: |
          # My Calculator Project
          A simple calculator
        language: "markdown"
      - path: "myproject/notes.txt"
        content: |
          TODO: add division
          DONE: add multiply

    open_file: "myproject/notes.txt"

    solution:
      commands:
        - "git status"
        - "git add README.md"
        - "git add test_*.py"
        - "git add ."
        - "git commit -m \"Add test files, README, and project notes\""
      explanation: |
        - **`git add README.md`:** Stages only `README.md`.
        - **`git add test_*.py`:** The shell glob expands to `test_calc.py test_utils.py`. Both are staged.
        - **`git add .`:** Stages everything in the current directory and subdirectories — including `notes.txt`.
        - **Four staging strategies:** Individual file, wildcard, current directory (`git add .`), all tracked+untracked (`git add --all`). All achieve the same end result here but give different levels of control.

    tests:
      - description: "README.md has been committed"
        command: "cd /tutorial/myproject && git log --all --oneline -- README.md | grep -q '.'"
      - description: "test_calc.py has been committed"
        command: "cd /tutorial/myproject && git log --all --oneline -- test_calc.py | grep -q '.'"
      - description: "test_utils.py has been committed"
        command: "cd /tutorial/myproject && git log --all --oneline -- test_utils.py | grep -q '.'"
      - description: "notes.txt has been committed"
        command: "cd /tutorial/myproject && git log --all --oneline -- notes.txt | grep -q '.'"

    quiz:
      title: "Staging Strategies — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "You have three modified files: `main.py`, `test_main.py`, and `config.json`. You only want to commit the test file. Which command stages **only** `test_main.py`?"
          options:
            - "`git add .`"
            - "`git add test_main.py`"
            - "`git add --all`"
            - "`git commit test_main.py`"
          correct_index: 1
          explanation: "Naming the file explicitly (`git add test_main.py`) stages only that file. `git add .` and `git add --all` would stage everything, making it impossible to create a focused commit."

        - question: "**[Interleaved: Revisit Step 3]** Which command shows you the differences that are **already staged** for the next commit?"
          options:
            - "`git diff`"
            - "`git diff --staged`"
            - "`git status`"
            - "`git show`"
          correct_index: 1
          explanation: "`git diff --staged` (or `--cached`) shows what would be in the next commit if you ran `git commit` right now."

        - question: "**[Interleaved: Revisit Step 2]** What color does `git status` use for a file that is **modified but not yet staged**?"
          options:
            - "Green"
            - "Red"
            - "Yellow"
            - "Blue"
          correct_index: 1
          explanation: "In `git status`, red indicates untracked or modified files (not in the staging area), while green indicates staged files. This was the core change loop introduced in Step 2."

        - question: "What is the key advantage of Git's staging area over a simple 'save everything' commit model?"
          options:
            - "It makes commits faster because fewer files are processed"
            - "It lets you select exactly which changes belong together in one logical commit"
            - "It automatically writes commit messages for you"
            - "It prevents you from committing files with syntax errors"
          correct_index: 1
          explanation: "The staging area gives you **fine-grained control**: you can make many edits in your working directory, then assemble them into clean, focused commits that each represent one logical change. This keeps history readable and makes it easier to find bugs later."

        - question: "Which staging commands match their descriptions? (Select all correct pairs)"
          type: multiple
          options:
            - "`git add README.md` — stages one specific file"
            - "`git add test_*.py` — stages all files matching a glob pattern"
            - "`git add .` — stages only files that are already tracked (not new files)"
            - "`git add --all` — stages all tracked changes and new untracked files"
          correct_indices:
            - 0
            - 1
            - 3
          explanation: "`git add .` stages ALL changes in the current directory — including new untracked files, modifications, and deletions. It is NOT limited to tracked files. `git add --all` does the same but from any working directory location."

  # --------------------------------------------------------------------------
  # STEP 5: Unstaging and undoing changes
  # --------------------------------------------------------------------------
  - title: "Unstaging and Undoing Changes"
    instructions: |
      ### Everyone makes mistakes

      What if you stage a file by accident? Or make changes you want to
      throw away? Git has tools for both.

      > **Challenge — try before you learn:** You're about to stage a
      > broken change by accident. Before reading ahead, think: if you
      > needed to *unstage* a file (move it back from green to red in
      > `git status`), what command might you try? What about *discarding*
      > changes entirely? Take a guess — even a wrong guess makes the
      > answer stick better when you see it.

      ### Task 1: Make a change and stage it

      Let's edit a file and then undo our staging:

      ```bash
      echo "BROKEN CODE" >> calculator.py
      git add calculator.py
      git status
      ```

      You'll see `calculator.py` is staged (green). But wait — we don't
      actually want to commit "BROKEN CODE"!

      ### Task 2: Unstage the file

      Remove the file from the staging area **without** losing your edits:

      ```bash
      git restore --staged calculator.py
      git status
      ```

      The file is now **modified but unstaged** (red again). Your edit is
      still in the working directory — `git restore --staged` only moves it
      off the loading dock; it doesn't delete anything.

      ### Task 3: Discard working directory changes

      Now let's throw away the change entirely and restore the file to its
      last committed version:

      ```bash
      git restore calculator.py
      git status
      ```

      The "BROKEN CODE" line is gone. The file matches the last commit.

      **Warning:** `git restore` (without `--staged`) permanently discards
      uncommitted changes. There is no undo for this — the changes were
      never committed, so Git has no record of them.

      ### Summary

      | Command | Effect |
      |---|---|
      | `git restore --staged <file>` | Unstage (move off loading dock, keep edits) |
      | `git restore <file>` | Discard working directory changes (permanent!) |
      | `git reset --hard` | Discard ALL uncommitted changes (nuclear option) |

    watch_files:
      - "myproject/calculator.py"

    solution:
      commands:
        - "echo \"BROKEN CODE\" >> calculator.py"
        - "git add calculator.py"
        - "git status"
        - "git restore --staged calculator.py"
        - "git status"
        - "git restore calculator.py"
        - "git status"
      explanation: |
        - **Test 1:** `! grep -q 'BROKEN CODE' calculator.py` — the "BROKEN CODE" line must NOT be in the file. `git restore calculator.py` restores it to the last committed version.
        - **Test 2:** `git diff --quiet && git diff --cached --quiet` — both the working directory and the staging area must be clean (no uncommitted changes).
        - **`git restore --staged`:** Moves the file from staged → modified-but-unstaged. Edits are preserved — they stay in the working directory.
        - **`git restore` (without `--staged`):** Discards working directory changes permanently. There is no undo — the file was never committed, so Git has no record of the "BROKEN CODE" version.
        - **Warning:** `git reset --hard` would discard ALL uncommitted changes across all files — the nuclear option. Use it only when you're sure.

    tests:
      - description: "calculator.py does NOT contain 'BROKEN CODE'"
        command: "cd /tutorial/myproject && ! grep -q 'BROKEN CODE' calculator.py"
      - description: "Working tree is clean (no uncommitted changes)"
        command: "cd /tutorial/myproject && git diff --quiet && git diff --cached --quiet"

    quiz:
      title: "Unstaging and Undoing — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "You accidentally staged `config.py` with `git add`. Which command removes it from the staging area **without** discarding your edits?"
          options:
            - "`git restore config.py`"
            - "`git restore --staged config.py`"
            - "`git reset --hard`"
            - "`git restore config.py`"
          correct_index: 1
          explanation: "`git restore --staged <file>` unstages the file — it moves it off the loading dock back to the working directory. Your edits are **preserved**. Without `--staged`, `git restore` would discard the edits entirely."

        - question: "**[Interleaved: Revisit Step 2]** Why is the Staging Area (or 'index') a core part of the Git workflow?"
          options:
            - "It speeds up the upload to GitHub"
            - "It allows you to group related changes together into clean, logical commits"
            - "It acts as a temporary backup in case your computer crashes"
            - "It is where Git stores your final history"
          correct_index: 1
          explanation: "The staging area gives you **fine-grained control**: you can make many changes and then 'assemble' them into focused snapshots."

        - question: "You run `git restore calculator.py` (without `--staged`). What happens to your unsaved edits?"
          options:
            - "They are moved to the staging area for review"
            - "They are saved to a temporary stash automatically"
            - "They are permanently discarded — there is no undo"
            - "They are committed as a 'WIP' commit"
          correct_index: 2
          explanation: "`git restore <file>` replaces the working directory version with the last committed version. Because the changes were never committed, Git has **no record** of them — they are gone permanently with no way to recover them."

        - question: "Which statements about `git reset --hard` are true? (Select all that apply)"
          type: multiple
          options:
            - "It discards ALL uncommitted changes in the working directory and staging area"
            - "It is safe to use on a shared branch because it creates a new revert commit"
            - "It moves the branch pointer backward, rewriting history"
            - "It should be used with caution because it permanently destroys committed work that others may depend on"
          correct_indices:
            - 0
            - 2
            - 3
          explanation: "`git reset --hard` is powerful but destructive: it discards all uncommitted changes and rewrites branch history by moving the pointer. It does **not** create a safe revert commit — that's what `git revert` is for."

  # --------------------------------------------------------------------------
  # STEP 6: .gitignore
  # --------------------------------------------------------------------------
  - title: "Ignoring Files with .gitignore"
    instructions: |
      ### Not everything belongs in version control

      > **Real-world note:** In professional projects, you'd create
      > `.gitignore` *before* your very first commit — so secrets and
      > generated files are never tracked, even accidentally. We deferred
      > it here to focus on the core workflow first.

      Some files should **never** be committed:
      - **Compiled files** (`.pyc`, `__pycache__/`) — generated from source
      - **Environment files** (`.env`) — contain secrets like API keys
      - **OS files** (`.DS_Store`, `Thumbs.db`) — system clutter
      - **Dependencies** (`node_modules/`, `venv/`) — downloaded, not authored

      ### Task 1: See the problem

      Let's simulate what happens without a `.gitignore`:

      ```bash
      mkdir -p __pycache__
      echo "bytecode" > __pycache__/calculator.cpython-311.pyc
      echo "SECRET_KEY=abc123" > .env
      echo "debug log" > debug.log
      git status
      ```

      Git wants to track all of these! Committing `.env` would expose your
      secrets to anyone who can see the repository.

      ### Task 2: Create a .gitignore file

      Open the `.gitignore` file in the editor and add the following patterns.
      Each line is a pattern that tells Git to pretend matching files don't exist:

      ```
      __pycache__/
      *.pyc
      .env
      *.log
      ```

      Save the file, then check the status:

      ```bash
      git status
      ```

      The ignored files have vanished from the status output! Only
      `.gitignore` itself appears as a new untracked file.

      ### Task 3: Commit the .gitignore

      The `.gitignore` file itself *should* be committed — it's a project
      configuration that all contributors benefit from:

      ```bash
      git add .gitignore
      git commit -m "Add .gitignore to exclude compiled and secret files"
      ```

    files:
      - path: "myproject/.gitignore"
        content: ""

    open_file: "myproject/.gitignore"

    watch_files:
      - "myproject/.gitignore"

    solution:
      files:
        - path: "myproject/.gitignore"
          content: |
            __pycache__/
            *.pyc
            .env
            *.log
      commands:
        - "mkdir -p __pycache__"
        - "echo \"bytecode\" > __pycache__/calculator.cpython-311.pyc"
        - "echo \"SECRET_KEY=abc123\" > .env"
        - "echo \"debug log\" > debug.log"
        - "git status"
        - "git add .gitignore"
        - "git commit -m \"Add .gitignore to exclude compiled and secret files\""
      explanation: |
        - **Tests verify each pattern:** `grep -q '__pycache__' .gitignore`, `grep -q '.env' .gitignore`, `grep -q '\*.pyc' .gitignore`.
        - **`.gitignore` is committed:** `git log --oneline -- .gitignore | grep -q '.'` — the file must appear in history.
        - **`.env` is not tracked:** `! git ls-files --cached | grep -q '.env'` — the secret file must never have been staged or committed.
        - **`__pycache__/`:** The trailing `/` matches only directories named `__pycache__`, not a hypothetical file with that name.
        - **`*.pyc`:** A glob that matches any file ending in `.pyc` in any subdirectory.
        - **Why commit `.gitignore`?** Sharing it ensures all contributors automatically get the same ignore rules — including protection against accidentally committing `.env` secrets.

    tests:
      - description: ".gitignore file exists"
        command: "[ -f /tutorial/myproject/.gitignore ]"
      - description: ".gitignore excludes __pycache__/"
        command: "cd /tutorial/myproject && grep -q '__pycache__' .gitignore"
      - description: ".gitignore excludes .env"
        command: "cd /tutorial/myproject && grep -q '.env' .gitignore"
      - description: ".gitignore excludes *.pyc"
        command: "cd /tutorial/myproject && grep -q '\\*.pyc' .gitignore"
      - description: ".gitignore has been committed"
        command: "cd /tutorial/myproject && git log --oneline -- .gitignore | grep -q '.'"
      - description: ".env is not tracked by Git"
        command: "cd /tutorial/myproject && ! git ls-files --cached | grep -q '.env'"

    quiz:
      title: "Ignoring Files — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "Which type of file is the **most dangerous** to accidentally commit to a public repository?"
          options:
            - "A compiled `.pyc` bytecode file"
            - "An `.env` file containing API keys and database passwords"
            - "An OS-generated `.DS_Store` file"
            - "A `node_modules/` directory with downloaded packages"
          correct_index: 1
          explanation: "Committing a `.env` file exposes **secrets** (API keys, passwords, tokens) to anyone who can see the repository — even after deletion, the secret remains in Git history. The others are wasteful but not security risks."

        - question: "After adding `*.log` to `.gitignore`, you run `git status`. Which statement is true?"
          options:
            - "All `.log` files are automatically deleted from your filesystem"
            - "`.log` files are no longer shown as untracked in `git status`"
            - "`.log` files are moved to a quarantine folder"
            - "Git will error if you try to add a `.log` file"
          correct_index: 1
          explanation: "`.gitignore` tells Git to **pretend matching files don't exist** for tracking purposes. The files remain on disk — they simply won't appear in `git status` as untracked, and `git add .` won't stage them."

        - question: "**[Interleaved: Revisit Step 4]** If you want to ignore most `.log` files but stage **one specific** log file, what should you do?"
          options:
            - "Delete the other log files first"
            - "Use `git add -f <file>` or stage it specifically by name before running `git add .`"
            - "Remove `.log` from `.gitignore` temporarily"
            - "It's impossible to stage an ignored file"
          correct_index: 1
          explanation: "Explicitly naming a file in `git add` overrides the ignore rule. Alternatively, you can Hunk-stage (`git add -p`) to be very selective."

        - question: "**[Interleaved: Revisit Step 1]** Is a Git commit better described as a 'backup diff' or a 'permanent snapshot'?"
          options:
            - "A backup diff — it only stores what changed since the last version"
            - "A permanent snapshot — Git stores a complete picture of your project at that moment"
            - "A floating patch — it can be applied to any branch automatically"
            - "A temporary log — it is deleted after 30 days"
          correct_index: 1
          explanation: "Git stores **snapshots**, not just deltas. If a file hasn't changed, Git simply links to the version it already has. This makes operations like branching and switching extremely fast."

        - question: "Why should the `.gitignore` file itself be committed to the repository? (Select all that apply)"
          type: multiple
          options:
            - "All contributors automatically get the same ignore rules"
            - "It prevents secrets from being checked in on any team member's machine"
            - "It makes `.gitignore` patterns apply to all future clones of the project"
            - "It removes ignored files from everyone's filesystem"
          correct_indices:
            - 0
            - 1
            - 2
          explanation: "Committing `.gitignore` shares the ignore rules with the whole team and every future clone. This prevents accidental secret commits by anyone and keeps the repo free of generated/OS clutter. It does **not** delete files from anyone's filesystem."

  # --------------------------------------------------------------------------
  # STEP 7: Inspecting history — git log, git diff HEAD, git show
  # --------------------------------------------------------------------------
  - title: "Inspecting History"
    instructions: |
      ### Reading the story of your project

      Git's log is a detailed journal of every snapshot you've saved. Let's
      learn to read it effectively.

      ### Task 1: View the commit log

      ```bash
      git log
      ```

      Press `q` to exit. Each entry shows:
      - **Commit hash** — a unique 40-character ID for this snapshot (SHA-1 today; Git is actively migrating to SHA-256 to address hash-collision vulnerabilities)
      - **Author** — who made the commit
      - **Date** — when it was made
      - **Message** — what it describes

      ### Task 2: Compact log view

      For a summary, use:

      ```bash
      git log --oneline
      ```

      This shows just the first 7 characters of the hash and the message.
      Much easier to scan!

      ### Task 3: See what a commit changed

      Pick any commit hash from the log and inspect it:

      ```bash
      git show HEAD
      ```

      `HEAD` always refers to the latest commit. `git show` displays the
      full diff of what changed in that commit.

      ### Task 4: Compare commits

      See what changed between the second-to-last commit and the latest:

      ```bash
      git diff HEAD~1 HEAD
      ```

      `HEAD~1` means "one commit before HEAD". You can use `HEAD~2` for
      two commits back, and so on.

      ### Understanding git diff variants

      ```
      git diff              → Working Directory vs. Staging Area
      git diff HEAD         → Working Directory vs. Last Commit
      git diff HEAD~1 HEAD  → Previous Commit vs. Last Commit
      git diff --staged     → Staging Area vs. Last Commit
      ```

      ### Visualizing your history

      Try this command to see an ASCII art graph of your commit history:

      ```bash
      git log --oneline --graph --all
      ```

      This visual representation becomes essential once you start
      branching. As you work through the rest of this tutorial, consider
      running this command after each `git commit` or `git merge` to watch
      the history graph grow.

    solution:
      commands:
        - "git log"
        - "git log --oneline"
        - "git show HEAD"
        - "git diff HEAD~1 HEAD"
      explanation: |
        - **Test:** `[ $(git log --oneline | wc -l) -ge 3 ]` — the repository must have at least 3 commits. By this step, you have: initial commit (Step 2), multiply commit (Step 3), and gitignore commit (Step 6).
        - **`git log`:** Shows hash, author, date, and message for each commit. The hash is a 40-character SHA-1 identifier for each snapshot.
        - **`git show HEAD`:** Displays the metadata plus the complete diff of the most recent commit. `HEAD` is a symbolic reference that always points to the currently checked-out commit.
        - **`HEAD~1`:** Relative syntax for "one commit before HEAD". `HEAD~2` is two commits back, etc.
        - **`git diff` variants to know:**
          - `git diff` — Working Directory vs. Staging Area (unstaged changes)
          - `git diff HEAD` — Working Directory vs. Last Commit (all uncommitted changes)
          - `git diff --staged` — Staging Area vs. Last Commit (what would be committed)
          - `git diff HEAD~1 HEAD` — Previous commit vs. latest commit

    tests:
      - description: "Repository has at least 3 commits"
        command: "cd /tutorial/myproject && [ $(git log --oneline | wc -l) -ge 3 ]"

    quiz:
      title: "Inspecting History — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "You run `git show` on your **first commit** and see every line of every file listed as an addition (`+`). Which explanation is correct?"
          options:
            - "Git stores deltas but displays full content for the first commit as a special case"
            - "Every commit is a full snapshot; the first commit has no parent to compare against, so all content appears as 'added'"
            - "`git show` always displays files in full — it ignores the diff format entirely"
            - "Git stored a delta here, but reconstructs full content for display"
          correct_index: 1
          explanation: "Git stores **snapshots**, not deltas. `git show` compares a commit to its parent. The first commit has no parent, so every line appears as a new addition — not a special case, but a natural consequence of the snapshot model introduced in Step 1."

        - question: "What does `HEAD~2` refer to in a Git command like `git diff HEAD~2 HEAD`?"
          options:
            - "The second branch in your repository"
            - "The commit two steps before the latest commit"
            - "The second file changed in the latest commit"
            - "The commit with index 2 in the log"
          correct_index: 1
          explanation: "`HEAD` points to the latest commit. `HEAD~1` is one commit before it, `HEAD~2` is two commits back, and so on. This relative notation lets you reference commits without copying their hash."

        - question: "**[Interleaved: Revisit Step 5]** Which command removes a file from the **Staging Area** without discarding your edits in the working directory?"
          options:
            - "`git restore`"
            - "`git restore --staged`"
            - "`git reset --hard`"
            - "`git rm`"
          correct_index: 1
          explanation: "`git restore --staged` (from Step 5) is the 'undo' for `git add`. It moves your changes off the loading dock but keeps them in your warehouse floor (working directory)."

        - question: "You want to see the full diff of what changed **in** the latest commit (not comparing to working directory). Which command is correct?"
          options:
            - "`git diff`"
            - "`git diff HEAD`"
            - "`git show HEAD`"
            - "`git log --oneline`"
          correct_index: 2
          explanation: "`git show HEAD` displays the commit metadata plus the complete diff of that commit. `git diff HEAD` compares your working directory to the last commit — it would show your *uncommitted* changes, not the committed diff."

        - question: "Which pieces of information does `git log` display for each commit? (Select all that apply)"
          type: multiple
          options:
            - "A unique commit hash (SHA)"
            - "The author's name and email"
            - "The date and time of the commit"
            - "The exact lines that were changed in each file"
          correct_indices:
            - 0
            - 1
            - 2
          explanation: "`git log` shows the hash, author, date, and commit message for each commit. It does **not** show the file diffs — for that you need `git show <hash>` or `git diff`."

  # --------------------------------------------------------------------------
  # STEP 8: Branching — git branch, git switch
  # --------------------------------------------------------------------------
  - title: "Branching"
    instructions: |
      ### Parallel development

      Branches let you develop features in isolation without affecting the
      main codebase. A branch is just a lightweight **pointer** to a commit
      — creating one is nearly instant and costs almost nothing.

      ```
      Before branching:

        main:  [C1] ← [C2] ← [C3]  ← HEAD

      After creating feature branch:

        main:  [C1] ← [C2] ← [C3]
                                ↑
        feature:             (points here too)  ← HEAD
      ```

      The branch is just a sticky note (pointer) on a commit — not a copy
      of your entire project!

      ### Task 1: See your current branch

      ```bash
      git branch
      ```

      You should see `* main`. The `*` indicates which
      branch HEAD is currently pointing to.

      ### Task 2: Create and switch to a new branch

      ```bash
      git switch -c feature-divide
      ```

      This creates a new branch called `feature-divide` and switches to it.
      (`-c` means "create the branch"). Run `git branch` to confirm you're
      on the new branch.

      ### Task 3: Make changes on the feature branch

      Add a `divide` function to `calculator.py`. Open it in the editor and
      add at the bottom:

      ```python
      def divide(a, b):
          """Return the quotient of a and b."""
          if b == 0:
              raise ValueError("Cannot divide by zero")
          return a / b
      ```

      Save, then stage and commit:

      ```bash
      git add calculator.py
      git commit -m "Add divide function with zero-division check"
      ```

      ### Task 4: Switch back to main

      > **Before you run:** When you switch back to `main`, will the `divide`
      > function still be visible in `calculator.py`? Why or why not? Think
      > about what a branch pointer actually represents, then check your answer.

      ```bash
      git switch main
      ```

      Now look at `calculator.py` in the terminal:

      ```bash
      cat calculator.py
      ```

      The `divide` function is **gone**! It only exists on the
      `feature-divide` branch. Your `main` branch is untouched. This is
      the power of branching.

      Switch back to see it again:

      ```bash
      git switch feature-divide
      cat calculator.py
      ```

      The function is back. Each branch is a separate timeline.

    watch_files:
      - "myproject/calculator.py"

    solution:
      files:
        - path: "myproject/calculator.py"
          content: |
            """A simple calculator module."""


            def add(a, b):
                """Return the sum of a and b."""
                return a + b


            def subtract(a, b):
                """Return the difference of a and b."""
                return a - b


            def multiply(a, b):
                """Return the product of a and b."""
                return a * b


            def divide(a, b):
                """Return the quotient of a and b."""
                if b == 0:
                    raise ValueError("Cannot divide by zero")
                return a / b
          language: "python"
      commands:
        - "git branch"
        - "git switch -c feature-divide"
        - "git branch"
        - "git add calculator.py"
        - "git commit -m \"Add divide function with zero-division check\""
        - "git switch main"
        - "cat calculator.py"
        - "git switch feature-divide"
        - "cat calculator.py"
      explanation: |
        - **Test 1:** `git branch | grep -q 'feature-divide'` — the branch must exist.
        - **Test 2:** `git show feature-divide:calculator.py | grep -q 'def divide'` — the divide function must exist on the feature branch.
        - **Test 3:** `git log feature-divide --oneline | grep -qi 'divide'` — the commit message must reference "divide".
        - **`git switch -c feature-divide`:** `-c` creates and switches in one command.
        - **Disappearing divide function:** When you `git switch main`, Git updates your working directory to match the snapshot that `main` points to — the `divide` function was never committed to `main`, so it vanishes. This is the power of branches as separate timelines.

    tests:
      - description: "Branch 'feature-divide' exists"
        command: "cd /tutorial/myproject && git branch | grep -q 'feature-divide'"
      - description: "calculator.py has a divide function on feature-divide"
        command: "cd /tutorial/myproject && git show feature-divide:calculator.py | grep -q 'def divide'"
      - description: "The divide function has been committed on feature-divide"
        command: "cd /tutorial/myproject && git log feature-divide --oneline | grep -qi 'divide'"
      - description: "Currently on feature-divide branch"
        command: "cd /tutorial/myproject && git branch --show-current | grep -q 'feature-divide'"

    quiz:
      title: "Branching — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "You're on `feature-x` and have **staged** (but not committed) a change to `app.py`. You run `git switch main`. What happens to your staged change?"
          options:
            - "Git commits the staged change to `feature-x` automatically before switching"
            - "The staged change carries over into `main`'s workspace if it doesn't conflict with files that differ between branches"
            - "Git always refuses to switch branches when there are staged changes"
            - "All staged changes are permanently discarded when switching branches"
          correct_index: 1
          explanation: "The staging area is **not per-branch** — it's a shared workspace. `git switch` carries staged changes to the target branch if no conflict arises with files that must change during the switch. If there is a conflict, Git refuses and asks you to commit or stash. This reinforces the three-state model from Step 1."

        - question: "You are on `feature-x` and run `git switch main`. What happens to the files in your working directory?"
          options:
            - "Your working directory is untouched — branches share the same files"
            - "Git updates your working directory to match the state of the `main` branch"
            - "Your changes are automatically committed to `feature-x`"
            - "Git merges `feature-x` changes into `main`"
          correct_index: 1
          explanation: "When you switch branches, Git **updates your working directory** to match the commit that the target branch points to. Files unique to `feature-x` disappear; files in `main` (but not `feature-x`) reappear. This is why branches feel like separate timelines."

        - question: "**[Evaluate]** Your teammate says: 'Branches are just copies of the project, so creating too many wastes disk space.' Is this correct? Why or why not?"
          options:
            - "Correct — each branch duplicates the entire project directory"
            - "Incorrect — a branch is a lightweight pointer to a commit, not a copy; creating one uses ~41 bytes"
            - "Partially correct — branches copy only modified files, so they use some disk space"
            - "Correct — Git uses compression, but each branch still requires a full snapshot copy"
          correct_index: 1
          explanation: "This is a common misconception. A branch is just a tiny pointer file, not a copy. You can create hundreds of branches with negligible disk cost. Understanding this changes how you think about branching strategy — branches should be cheap and frequent, not rare and expensive."

  # --------------------------------------------------------------------------
  # STEP 9: Branch Internals & Detached HEAD
  # --------------------------------------------------------------------------
  - title: "Branch Internals and Detached HEAD"
    instructions: |
      ### What is a branch, really?

      In the last step you saw branches behave like separate timelines.
      Now let's look under the hood to understand *why*.

      A branch is not a copy of your project — it's a **41-byte text file**
      containing a single commit hash. Prove it:

      ### Task 1: See the branch pointers

      ```bash
      cat .git/refs/heads/main
      cat .git/refs/heads/feature-divide
      ```

      Each file contains the SHA of the commit that branch currently points to.
      Now inspect `HEAD` itself:

      ```bash
      cat .git/HEAD
      ```

      You'll see `ref: refs/heads/feature-divide` — HEAD is a *symbolic
      reference* that points to a branch pointer, not directly to a commit.
      When you make a commit, Git moves the branch pointer forward and HEAD
      follows automatically.

      ### Task 2: Inspecting individual commits (Detached HEAD)

      Sometimes you need to inspect an old commit without being on any branch.
      Use `--detach` with a commit hash or relative reference:

      ```bash
      git switch --detach HEAD~1
      cat .git/HEAD
      ```

      Now `HEAD` contains a raw SHA hash instead of a branch ref — this is
      **detached HEAD state**. You can look around freely, but:

      > If "detached HEAD" sounds alarming — you're not alone. The name is
      > genuinely confusing, but the concept is simple: you're looking at a
      > specific commit without any branch "bookmark" tracking your position.

      **Warning:** Any commits you make here are not anchored to any branch.
      If you switch away without creating a new branch first, those commits
      become orphaned and will eventually be garbage-collected by Git.

      Always return to a branch before doing real work:

      ```bash
      git switch feature-divide
      ```

    solution:
      commands:
        - "cat .git/refs/heads/main"
        - "cat .git/refs/heads/feature-divide"
        - "cat .git/HEAD"
        - "git switch --detach HEAD~1"
        - "cat .git/HEAD"
        - "git switch feature-divide"
      explanation: |
        - **Branch pointers:** A branch is just a 41-byte file in `.git/refs/heads/` containing the current commit's SHA. Creating a branch is nearly instantaneous.
        - **HEAD:** A symbolic reference that normally contains `ref: refs/heads/<branch>`. It tells Git which branch you're on.
        - **Detached HEAD:** When HEAD contains a raw SHA hash instead of a branch ref. Commits made here are orphaned — no branch pointer tracks them. Always create a branch (`git switch -c new-branch`) before committing if you want to keep the work.

    tests:
      - description: "Currently on feature-divide branch (not in detached HEAD)"
        command: "cd /tutorial/myproject && git branch --show-current | grep -q 'feature-divide'"

    quiz:
      title: "Branch Internals — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "What is a Git branch, physically speaking?"
          options:
            - "A full copy of all project files stored separately"
            - "A lightweight pointer (a 41-byte text file) containing a commit hash"
            - "A separate network connection to a remote server"
            - "A compressed archive of your working directory"
          correct_index: 1
          explanation: "A branch is just a tiny file in `.git/refs/heads/` containing a 40-character SHA hash. Creating a branch is nearly instantaneous and uses almost no storage — it's not a copy of your files."

        - question: "Which statements about **Detached HEAD** state are true? (Select all that apply)"
          type: multiple
          options:
            - "HEAD points directly to a commit hash instead of a branch name"
            - "You can safely make new commits here — they are automatically saved to the nearest branch"
            - "Any commits made in detached HEAD state are not anchored to a branch and may be garbage-collected"
            - "You should create a new branch before making commits if you want to keep the work"
          correct_indices:
            - 0
            - 2
            - 3
          explanation: "In detached HEAD, `HEAD` contains a raw SHA instead of a branch ref. Commits here are orphaned — no branch pointer tracks them. Git will eventually garbage-collect them. Always create a branch (`git switch -c new-branch`) before committing if you want to keep the work."

        - question: "**[Interleaved: Revisit Step 2]** Which command actually saves your staged changes permanently into the current branch history?"
          options:
            - "`git add`"
            - "`git commit`"
            - "`git push`"
            - "`git save`"
          correct_index: 1
          explanation: "`git commit` takes everything currently in the staging area and wraps it into a permanent snapshot with a message and author info."

  # --------------------------------------------------------------------------
  # STEP 10: Merging — fast-forward and three-way merge (was Step 9)
  # --------------------------------------------------------------------------
  - title: "Merging Branches"
    instructions: |
      ### Integrating your work

      When a feature is complete, you merge it back into the main branch.
      Git has two strategies depending on the history.

      **Fast-forward merge** — when `main` has no new commits since the branch
      was created, Git simply slides the `main` pointer forward. No merge
      commit is created; the history stays linear:

      ```
      Before:

        main:  [C1] ← [C2] ← [C3]
                                ↑ main
                                └── feature-divide: [C4]

      After fast-forward merge:

        main:  [C1] ← [C2] ← [C3] ← [C4]  ← HEAD (main, feature-divide)
      ```

      **Three-way merge** — when both branches have diverged (each has new
      commits the other doesn't), Git compares both branch tips against their
      common ancestor and creates a new **merge commit** with two parents:

      ```
      Before:

        main:           [C1] ← [C2] ← [C3] ← [C5]
                                         \
        feature:                          [C4]

      After three-way merge:

        main:           [C1] ← [C2] ← [C3] ← [C5] ← [M]  ← HEAD
                                         \              ↑
        feature:                          [C4] ─────────┘
      ```

      This is exactly what happened in Steps 11–12: both `main` and
      `update-add-function` had diverging changes, so Git created a merge
      commit. Understanding the difference matters later when you learn
      `git rebase`, which replays commits to produce a clean linear history
      instead of a merge commit.

      The merge in this step will be a **fast-forward** since `main` has no
      new commits since we branched off.

      > **Before you run:** Will this merge create a new merge commit, or
      > will Git just slide the `main` pointer forward? Look at the diagrams
      > above and think about whether `main` has diverged from
      > `feature-divide`. Form your prediction, then try it.

      ### Task 1: Switch to main and merge

      First, switch to the branch you want to merge **into** (main):

      ```bash
      git switch main
      ```

      Now merge the feature branch:

      ```bash
      git merge feature-divide
      ```

      ### Task 2: Verify the merge

      Check that the divide function is now on main:

      ```bash
      cat calculator.py
      git log --oneline
      ```

      You should see the divide function in the file and the commit from
      `feature-divide` in your log. The feature has been integrated!

      ### Task 3: Clean up

      After merging, you can optionally delete the feature branch since its
      work is now part of main:

      ```bash
      git branch -d feature-divide
      ```

      The `-d` flag safely deletes a branch only if it's been fully merged.
      This keeps your branch list tidy.

    watch_files:
      - "myproject/calculator.py"

    solution:
      commands:
        - "git switch main"
        - "git merge feature-divide"
        - "cat calculator.py"
        - "git log --oneline"
        - "git branch -d feature-divide"
      explanation: |
        - **Test 1:** `git branch --show-current | grep -q 'main'` — you must be on main.
        - **Test 2:** `grep -q 'def divide' calculator.py` — the divide function must be in the working file on main after the merge.
        - **Test 3:** `git log main --oneline | grep -qi 'divide'` — the divide commit must be in main's history.
        - **Fast-forward merge:** Because `main` had no new commits since `feature-divide` was created, Git simply slides the `main` pointer forward to the same commit as `feature-divide`. No merge commit is created; the history stays perfectly linear.
        - **`git branch -d feature-divide`:** The `-d` flag safely deletes only if the branch is fully merged. Its work is now part of `main`, so this is tidy cleanup.

    tests:
      - description: "Currently on main branch"
        command: "cd /tutorial/myproject && git branch --show-current | grep -q 'main'"
      - description: "calculator.py on main has the divide function"
        command: "cd /tutorial/myproject && git switch main 2>/dev/null; grep -q 'def divide' calculator.py"
      - description: "Merge commit or fast-forward is in the log"
        command: "cd /tutorial/myproject && git log main --oneline | grep -qi 'divide'"

    quiz:
      title: "Merging Branches — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "Before merging `feature-x` into `main`, you want to see **exactly which changes** will be introduced. Which command is correct?"
          options:
            - "`git diff`"
            - "`git show feature-x`"
            - "`git diff main..feature-x`"
            - "`git log feature-x`"
          correct_index: 2
          explanation: "`git diff main..feature-x` shows all changes that are in `feature-x` but NOT yet in `main` — precisely what the merge would introduce. `git diff` (no args) only compares working directory to staging area, not branches. `git log` shows commits, not file diffs."

        - question: "When does Git perform a **fast-forward merge** instead of creating a merge commit?"
          options:
            - "When the branches have conflicting changes"
            - "When the target branch (e.g., main) has no new commits since the feature branch was created"
            - "When you pass the `--fast-forward` flag explicitly"
            - "When both branches have the same number of commits"
          correct_index: 1
          explanation: "A fast-forward merge is possible only when the target branch hasn't diverged — it's directly 'behind' the feature branch in history. Git simply slides the pointer forward. No merge commit is created and the history stays linear."

        - question: "In a **three-way merge**, what are the three 'points' Git compares?"
          options:
            - "The working directory, the staging area, and the last commit"
            - "The current branch tip, the incoming branch tip, and their common ancestor commit"
            - "HEAD, HEAD~1, and HEAD~2"
            - "The local branch, the remote branch, and the global config"
          correct_index: 1
          explanation: "Git finds the **common ancestor** (the commit where the two branches diverged), then compares both branch tips against it. This three-point comparison lets Git automatically combine non-overlapping changes and flag conflicts only where the same lines were changed."

        - question: "**[Interleaved: Revisit Step 3]** Before merging, which command should you run to verify exactly what changes exist on the feature branch that aren't on `main`?"
          options:
            - "`git diff main..feature-branch`"
            - "`git status`"
            - "`git show`"
            - "`git log`"
          correct_index: 0
          explanation: "`git diff` with branch names lets you see the delta between two timelines. This is essential 'reconnaissance' before a merge."

        - question: "Which statements about merging are correct? (Select all that apply)"
          type: multiple
          options:
            - "You must switch to the branch you want to merge **into** before running `git merge`"
            - "A fast-forward merge produces a clean linear history with no extra merge commit"
            - "After merging, you should always immediately delete the feature branch"
            - "A three-way merge creates a new commit with two parent commits"
          correct_indices:
            - 0
            - 1
            - 3
          explanation: "You always merge *into* your current branch, so switch first. Fast-forwards keep history linear; three-way merges create a merge commit with two parents. Deleting the feature branch after merging is optional (tidy but not required)."

        - question: "**[Evaluate]** Your team lead says: 'We should always use `git merge --no-ff` (no fast-forward) even when a fast-forward is possible, so every feature leaves a merge commit in the log.' What is the trade-off?"
          options:
            - "There is no trade-off — `--no-ff` is strictly better and should always be used"
            - "It preserves branch history (you can see where features started/ended) but adds extra merge commits that make the log busier"
            - "It prevents merge conflicts from ever occurring"
            - "It makes merging slower because Git has to create extra objects"
          correct_index: 1
          explanation: "This is a real professional debate. `--no-ff` forces a merge commit even when Git could fast-forward, preserving the fact that work happened on a branch. The trade-off is a busier log. Many teams prefer this for feature branches but not for trivial changes. There is no single correct answer — it depends on team workflow."

  # --------------------------------------------------------------------------
  # STEP 11: Create a branch for merge conflict setup (was Step 10)
  # --------------------------------------------------------------------------
  - title: "Preparing for a Merge Conflict"
    instructions: |
      ### When merges go wrong (and that's OK!)

      A **merge conflict** happens when two branches modify the **same
      lines** of the same file. Git can't decide which version to keep, so
      it asks you — the human — to resolve it.

      This is **not** an error. It's Git being careful and asking for help.
      Let's create this situation intentionally so you know exactly how to
      handle it.

      ### Task 1: Create a new branch and modify calculator.py

      ```bash
      git switch -c update-add-function
      ```

      Now open `calculator.py` in the editor and **change the `add`
      function** to include a type check:

      ```python
      def add(a, b):
          """Return the sum of a and b (integers only)."""
          if not isinstance(a, (int, float)) or not isinstance(b, (int, float)):
              raise TypeError("Arguments must be numbers")
          return a + b
      ```

      Save, stage, and commit:

      ```bash
      git add calculator.py
      git commit -m "Add type checking to add function"
      ```

      ### Task 2: Switch back to main

      ```bash
      git switch main
      ```

      Verify that main still has the **original** `add` function
      (without type checking):

      ```bash
      head -8 calculator.py
      ```

      **Important:** Stay on `main` and proceed to the next step. In the
      next step, we'll make a *different* change to the same `add` function
      on main, setting up a conflict!

    watch_files:
      - "myproject/calculator.py"

    solution:
      files:
        - path: "myproject/calculator.py"
          content: |
            """A simple calculator module."""


            def add(a, b):
                """Return the sum of a and b (integers only)."""
                if not isinstance(a, (int, float)) or not isinstance(b, (int, float)):
                    raise TypeError("Arguments must be numbers")
                return a + b


            def subtract(a, b):
                """Return the difference of a and b."""
                return a - b


            def multiply(a, b):
                """Return the product of a and b."""
                return a * b


            def divide(a, b):
                """Return the quotient of a and b."""
                if b == 0:
                    raise ValueError("Cannot divide by zero")
                return a / b
          language: "python"
      commands:
        - "git switch -c update-add-function"
        - "git add calculator.py"
        - "git commit -m \"Add type checking to add function\""
        - "git switch main"
        - "head -8 calculator.py"
      explanation: |
        - **Test 1:** `git branch | grep -q 'update-add-function'` — the branch must exist.
        - **Test 2:** `git log update-add-function --oneline | grep -qi 'type\|check\|add'` — the commit message must reference "type", "check", or "add".
        - **Test 3:** `git branch --show-current | grep -q 'main'` — you must end on `main`.
        - **Why this creates a conflict:** The `update-add-function` branch changed the `add` function. In the next step, you'll make a *different* change to the same function on `main`. When you then merge, both branches have diverging changes to the same lines — triggering a conflict.

    tests:
      - description: "Branch 'update-add-function' exists"
        command: "cd /tutorial/myproject && git branch | grep -q 'update-add-function'"
      - description: "update-add-function branch has the type checking commit"
        command: "cd /tutorial/myproject && git log update-add-function --oneline | grep -qi 'type\\|check\\|add'"
      - description: "Currently on main branch"
        command: "cd /tutorial/myproject && git branch --show-current | grep -q 'main'"

    quiz:
      title: "Preparing for a Merge Conflict — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "What is the **root cause** of a merge conflict in Git?"
          options:
            - "One branch has more commits than the other"
            - "Two branches modified the **same lines** of the same file"
            - "The feature branch was not created from the latest commit"
            - "The commit messages on the two branches are identical"
          correct_index: 1
          explanation: "A conflict occurs when Git cannot automatically reconcile two changes because they touch the **exact same lines** in a file. If different lines were changed, Git merges them silently without any conflict."

        - question: "**[Interleaved: Revisit Step 8]** Which command is the fastest way to create a new branch and switch to it immediately?"
          options:
            - "`git branch -n`"
            - "`git switch -c`"
            - "`git checkout -b`"
            - "`git merge -n`"
          correct_index: 1
          explanation: "`git switch -c <name>` (introduced in Step 8) handles creating and switching in one go. You'll use this often before starting new work to keep branches clean."

        - question: "You are setting up a merge conflict scenario. You made changes on `update-add-function` and are now on `main`. What is the correct **next step** to trigger the conflict?"
          options:
            - "Run `git merge update-add-function` immediately"
            - "Make a **different** change to the same lines on `main`, commit it, then merge"
            - "Delete the `update-add-function` branch and start over"
            - "Run `git conflict update-add-function` to preview conflicts"
          correct_index: 1
          explanation: "To create a conflict, both branches must have **diverging changes** to the same lines. If you merge without making a competing change on main, Git will just fast-forward. Making a different edit to the same lines on main sets up a true three-way conflict."

        - question: "Which scenarios will **definitely cause** a merge conflict? (Select all that apply)"
          type: multiple
          options:
            - "Branch A adds a new function at the end of a file; Branch B also adds a different function at the end"
            - "Branch A changes line 5 to say X; Branch B changes line 5 to say Y"
            - "Branch A adds a new file; Branch B modifies an existing different file"
            - "Branch A and Branch B both change the same function's body in different ways"
          correct_indices:
            - 1
            - 3
          explanation: "Conflicts happen when the **same lines** are changed differently on two branches. Adding different content at the same location (both adding to end of file) can also conflict if they overlap. Adding different files or editing completely separate files never conflicts."

  # --------------------------------------------------------------------------
  # STEP 12: Resolving a merge conflict (was Step 11)
  # --------------------------------------------------------------------------
  - title: "Resolving a Merge Conflict"
    instructions: |
      ### The conflict

      In the previous step, you changed the `add` function on the
      `update-add-function` branch. Now we'll make a *different* change to
      the same function on `main`, creating a conflict.

      ### Task 1: Modify add on main

      Make sure you're on main:

      ```bash
      git switch main
      ```

      Open `calculator.py` in the editor and change the `add` function to
      log its inputs:

      ```python
      def add(a, b):
          """Return the sum of a and b (with logging)."""
          print(f"Adding {a} + {b}")
          return a + b
      ```

      Save, stage, and commit:

      ```bash
      git add calculator.py
      git commit -m "Add logging to add function"
      ```

      ### Task 2: Attempt the merge

      > **Before you run:** Both branches changed the `add` function.
      > What do you think will happen when you try to merge? Will Git
      > combine them automatically, or will it need your help? Why?

      Now try to merge the other branch:

      ```bash
      git merge update-add-function
      ```

      Git will report a **CONFLICT**! It found that both branches changed
      the same lines in `calculator.py` and can't automatically combine
      them.

      ### Task 3: Read the conflict markers

      Open `calculator.py` in the editor (or run `cat calculator.py`).
      You'll see something like:

      ```
      <<<<<<< HEAD
          """Return the sum of a and b (with logging)."""
          print(f"Adding {a} + {b}")
          return a + b
      =======
          """Return the sum of a and b (integers only)."""
          if not isinstance(a, (int, float)) or not isinstance(b, (int, float)):
              raise TypeError("Arguments must be numbers")
          return a + b
      >>>>>>> update-add-function
      ```

      - `<<<<<<< HEAD` — your current branch's version (main)
      - `=======` — separator
      - `>>>>>>> update-add-function` — the incoming branch's version

      ### Task 4: Resolve the conflict

      > **Challenge — try before reading the solution:** Look at the two
      > versions above. Can you figure out how to combine them into one
      > function that has *both* the type checking AND the logging? Try
      > writing the merged version yourself before looking at the example
      > below.

      Edit `calculator.py` to combine both changes. Remove ALL conflict
      markers (`<<<<<<<`, `=======`, `>>>>>>>`) and write the merged
      version you want to keep. For example, keep both the logging and the
      type check:

      ```python
      def add(a, b):
          """Return the sum of a and b (with type checking and logging)."""
          if not isinstance(a, (int, float)) or not isinstance(b, (int, float)):
              raise TypeError("Arguments must be numbers")
          print(f"Adding {a} + {b}")
          return a + b
      ```

      ### Task 5: Complete the merge

      After editing, mark the conflict as resolved and commit:

      ```bash
      git add calculator.py
      git commit -m "Merge update-add-function: combine type checking and logging"
      ```

      Congratulations — you've resolved a merge conflict! This is a skill
      that even experienced developers practice regularly.

    watch_files:
      - "myproject/calculator.py"

    setup_commands:
      - " cd /tutorial/myproject && git switch main 2>/dev/null; true"

    solution:
      files:
        - path: "myproject/calculator.py"
          content: |
            """A simple calculator module."""


            def add(a, b):
                """Return the sum of a and b (with type checking and logging)."""
                if not isinstance(a, (int, float)) or not isinstance(b, (int, float)):
                    raise TypeError("Arguments must be numbers")
                print(f"Adding {a} + {b}")
                return a + b


            def subtract(a, b):
                """Return the difference of a and b."""
                return a - b


            def multiply(a, b):
                """Return the product of a and b."""
                return a * b


            def divide(a, b):
                """Return the quotient of a and b."""
                if b == 0:
                    raise ValueError("Cannot divide by zero")
                return a / b
          language: "python"
      commands:
        - "git switch main"
        - "git add calculator.py"
        - "git commit -m \"Add logging to add function\""
        - "git merge update-add-function"
        - "git add calculator.py"
        - "git commit -m \"Merge update-add-function: combine type checking and logging\""
      explanation: |
        - **Test 1:** `! grep -q '<<<<<<<\|=======\|>>>>>>>' calculator.py` — all conflict markers must be removed. Leaving even one marker in the file is a bug.
        - **Test 2:** `! git status | grep -q 'Unmerged\|both modified'` — no unmerged paths remain.
        - **Test 3:** `grep -q 'isinstance' calculator.py` — the type-checking code from `update-add-function` must be present.
        - **Test 4:** `grep -q 'print' calculator.py` — the logging code from `main` must be present.
        - **Conflict markers explained:** `<<<<<<< HEAD` is your current branch's version; `=======` is the separator; `>>>>>>> branch-name` is the incoming version. You must edit the file to the version you want and remove all three marker types.
        - **`git add` after resolution:** Signals to Git that the conflict is resolved AND stages the content. Without it, `git commit` refuses with "unmerged paths". This is the same `git add` as always — it just takes on this extra role during a merge.

    tests:
      - description: "calculator.py has no conflict markers"
        command: "cd /tutorial/myproject && ! grep -q '<<<<<<<\\|=======\\|>>>>>>>' calculator.py"
      - description: "The merge has been completed (no unmerged paths)"
        command: "cd /tutorial/myproject && ! git status | grep -q 'Unmerged\\|both modified'"
      - description: "calculator.py contains type checking (isinstance)"
        command: "cd /tutorial/myproject && grep -q 'isinstance' calculator.py"
      - description: "calculator.py contains logging (print)"
        command: "cd /tutorial/myproject && grep -q 'print' calculator.py"

    quiz:
      title: "Resolving a Merge Conflict — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "After editing `calculator.py` to remove all conflict markers, why do you run `git add calculator.py` BEFORE `git commit`?"
          options:
            - "It's redundant — `git commit` automatically detects resolved conflicts"
            - "`git add` signals to Git that the conflict is resolved AND stages the content; without it, Git still marks the file as 'unresolved'"
            - "`git add` re-indexes the file so Git can re-parse the merge diff"
            - "Without `git add`, Git won't detect that you removed the `<<<<<<<` markers"
          correct_index: 1
          explanation: "`git add <file>` after a conflict serves a **dual role**: it stages the resolved content AND clears Git's internal 'unresolved conflict' flag for that file. Without it, `git commit` refuses with 'You have unmerged paths'. This is the same `git add` from Step 2 — it just takes on this extra responsibility during a merge."

        - question: "In conflict markers, what does the section between `<<<<<<< HEAD` and `=======` represent?"
          options:
            - "The version from the branch being merged in"
            - "The common ancestor version before either branch made changes"
            - "Your current branch's version of the conflicting lines"
            - "Git's automatically suggested resolution"
          correct_index: 2
          explanation: "The `<<<<<<< HEAD` section shows **your current branch's** version. The section after `=======` (up to `>>>>>>>`) shows the **incoming branch's** version. You must choose between them, combine them, or write something entirely new — then remove all markers."

        - question: "After manually editing a file to resolve a conflict, what is the correct sequence of commands to complete the merge?"
          options:
            - "`git merge --continue` then `git push`"
            - "`git add <resolved-file>` then `git commit`"
            - "`git resolve <file>` then `git merge --done`"
            - "`git conflict --resolved` then `git commit -m 'fixed'`"
          correct_index: 1
          explanation: "After editing the conflict away, you mark it resolved with `git add <file>` (which tells Git the conflict in that file is fixed), then `git commit` to create the merge commit. There is no `git resolve` command."

        - question: "Which statements about merge conflicts are true? (Select all that apply)"
          type: multiple
          options:
            - "A merge conflict is a Git error that indicates something went wrong with the repository"
            - "You must remove all `<<<<<<<`, `=======`, and `>>>>>>>` markers before committing"
            - "A merge conflict is Git's way of asking a human to decide which change to keep"
            - "The resolved file can combine content from both conflicting versions"
          correct_indices:
            - 1
            - 2
            - 3
          explanation: "Conflicts are **not errors** — they are Git's deliberate safety mechanism asking for human judgment. You must remove all markers (leaving them in is a bug). The resolution can be either version, a combination, or even entirely new code."

        - question: "**[Interleaved: Revisit Step 2]** After you've resolved a conflict in your editor, what is the **first command** you must run to tell Git the file is ready to be committed?"
          options:
            - "`git commit`"
            - "`git add <file>`"
            - "`git resolve <file>`"
            - "`git status`"
          correct_index: 1
          explanation: "Just like any other change, a resolved conflict must be **staged** with `git add` before it can be committed as part of the merge."

        - question: "**[Evaluate]** Your team frequently has merge conflicts. A teammate suggests: 'Let's all work on one branch to avoid conflicts.' Evaluate this suggestion."
          options:
            - "Good idea — one branch eliminates conflicts entirely"
            - "Bad idea — it eliminates branching benefits (isolation, parallel work) and introduces a worse problem: developers directly overwriting each other's uncommitted work"
            - "Good idea — but only if the team has fewer than 5 people"
            - "Bad idea — Git doesn't allow multiple people to push to the same branch"
          correct_index: 1
          explanation: "Merge conflicts are a feature, not a bug — they prevent silent data loss. Working on one branch means no isolation: any commit immediately affects everyone, broken code blocks the whole team, and parallel feature development becomes impossible. The real fix is to merge *more often* (keep branches short-lived) and communicate about who's editing which files."

  # --------------------------------------------------------------------------
  # STEP 13: Safe undo with git revert (was Step 12)
  # --------------------------------------------------------------------------
  - title: "Safe Undo with git revert"
    instructions: |
      ### Undoing committed mistakes safely

      `git restore` only works on uncommitted changes. What if you've already
      committed a mistake — or even merged it into `main`? You need a
      different tool: `git revert`.

      `git revert` creates a **new commit** that applies the exact inverse of
      a previous commit, neutralising its changes while keeping the full
      history intact. Think of it like an accountant's ledger: instead of
      erasing the wrong entry (forbidden), you write a new correcting entry
      that cancels it out.

      ```
      Before revert:

        main:  [C1] ← [C2] ← [C3]  ← HEAD
                              (bad commit)

      After git revert HEAD:

        main:  [C1] ← [C2] ← [C3] ← [C4]  ← HEAD
                              (bad)   (anti-commit: undoes C3)
      ```

      Compare this to `git reset --hard`, which *destroys* commits by
      moving the branch pointer backward — a sledgehammer approach that
      is dangerous on any shared branch:

      | Command | Effect | Safe on shared branches? |
      |---|---|---|
      | `git revert <hash>` | New commit that undoes the target | **Yes** |
      | `git reset --hard <hash>` | Destroys commits, rewrites history | Never |

      ### Task 1: Introduce a bug commit

      ```bash
      echo "print('debug: this should not be here')" >> calculator.py
      git add calculator.py
      git commit -m "Accidentally add debug print"
      git log --oneline
      ```

      You can see the bad commit at the top of the log.

      ### Task 2: Revert it

      > **Before you run:** Will `git revert HEAD` *remove* the bad commit
      > from history, or will it *add* something new? Think about the
      > accountant's ledger analogy above, then check your answer.

      Undo the last commit safely:

      ```bash
      git revert HEAD --no-edit
      ```

      `--no-edit` accepts the default commit message without opening an
      editor. Git creates a new commit that reverses the debug line.

      ### Task 3: Verify the result

      ```bash
      git log --oneline
      cat calculator.py
      ```

      You'll see **two new commits** in the log: the bad commit and the
      revert commit. The debug line is gone from the file, but the full
      history of what happened is preserved — exactly as it should be.

    watch_files:
      - "myproject/calculator.py"

    solution:
      commands:
        - "echo \"print('debug: this should not be here')\" >> calculator.py"
        - "git add calculator.py"
        - "git commit -m \"Accidentally add debug print\""
        - "git log --oneline"
        - "git revert HEAD --no-edit"
        - "git log --oneline"
        - "cat calculator.py"
      explanation: |
        - **Test 1:** `git log --oneline | grep -qi 'revert'` — a revert commit must exist in the log (Git's default message is "Revert '...'").
        - **Test 2:** `! grep -q 'debug: this should not be here' calculator.py` — the debug line must be gone from the file.
        - **Test 3:** `[ $(git log --oneline | wc -l) -ge 8 ]` — the repository must have at least 8 commits by now.
        - **`git revert HEAD --no-edit`:** Creates a new commit that applies the exact inverse of `HEAD`. `--no-edit` accepts the default message without opening a text editor.
        - **Why NOT `git reset --hard`:** `reset --hard` destroys commits by moving the branch pointer backward — rewriting history. On a shared branch where teammates have already pulled, this would cause severe conflicts and require a force-push. `git revert` is always safe because it only adds new commits and never changes existing history.

    tests:
      - description: "A revert commit exists in the log"
        command: "cd /tutorial/myproject && git log --oneline | grep -qi 'revert'"
      - description: "calculator.py does not contain the debug print"
        command: "cd /tutorial/myproject && ! grep -q 'debug: this should not be here' calculator.py"
      - description: "Repository has at least 8 commits"
        command: "cd /tutorial/myproject && [ $(git log --oneline | wc -l) -ge 8 ]"

    quiz:
      title: "Safe Undo with git revert — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "A bug was committed **3 commits ago** (hash `a1b2c3`) to a shared `main` branch that **5 teammates have already pulled**. Which approach is safe?"
          options:
            - "`git restore HEAD~3` — restores files to that state but creates no commit"
            - "`git reset --hard a1b2c3` — moves the branch pointer back, removing 3 commits"
            - "`git revert a1b2c3` — creates a new commit that undoes that specific commit"
            - "`git restore --source=a1b2c3 .` then `git commit`"
          correct_index: 2
          explanation: "On a **shared branch**, only `git revert` is safe — it adds a new anti-commit without touching existing history. `git reset --hard` rewrites history and would require a force-push, breaking everyone who already pulled. `git restore` without committing is also incomplete. This contrasts directly with the uncommitted-change scenario in Step 5 where `git restore` was the right tool."

        - question: "What does `git revert HEAD` do?"
          options:
            - "Deletes the latest commit and all its changes permanently"
            - "Creates a new commit that applies the **inverse** of the latest commit"
            - "Moves the branch pointer back one commit, rewriting history"
            - "Opens the latest commit for editing so you can fix the mistake"
          correct_index: 1
          explanation: "`git revert` creates an **anti-commit** — a new commit that exactly undoes the target commit's changes. The original bad commit remains in history. This is safe because it never rewrites history."

        - question: "**[Interleaved: Revisit Step 7]** Which `git log` flag shows each commit as a single line with just the hash and message?"
          options:
