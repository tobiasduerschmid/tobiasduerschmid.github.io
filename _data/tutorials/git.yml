            - "notes.txt"
          distractors:
            - "rm"
            - "--cached"
            - "add"
            - "reset"
          explanation: "`git restore --staged <file>` copies the version of the file from the last commit back into the index, effectively removing it from staging. Your working-directory edits are completely untouched. Without `--staged`, `git restore` would discard your working-directory edits instead."

        - question: |
            **Construct** the command that removes `notes.txt` from the **index only** (staging the deletion) without deleting anything from the filesystem.
          type: parsons
          display: inline
