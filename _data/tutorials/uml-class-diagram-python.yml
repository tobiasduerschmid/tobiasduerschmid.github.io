    quiz:
      title: "The God Class"
      min_score: 0.6
      shuffle: true
      questions:

        - question: |
            How can you spot a God Class in a UML diagram?
          type: single
          options:
            - "It has too many arrows pointing to other classes"
            - "It is one large box with many attributes and methods, surrounded by few or no other classes"
            - "It has abstract methods"
            - "It uses private visibility on all attributes"
          correct_index: 1
          explanation: |
            A God Class appears as a **single massive box** with dozens of attributes and methods, with few or no collaborating classes around it. The lack of relationships in the diagram signals that one class is doing everything — the opposite of good object-oriented design.

        - question: |
            How does UML help you detect design problems that are hard to see in code?
          type: single
          options:
            - "UML runs the code and finds bugs automatically"
            - "UML shows the visual structure — bloated classes and missing relationships become obvious at a glance"
            - "UML translates the code into a different programming language"
            - "UML counts the lines of code in each class"
          correct_index: 1
          explanation: |
            UML makes architecture **visible**. A God Class is invisible in 500 lines of Python — you might not notice the bloat. But in a UML diagram, one enormous box surrounded by nothing is immediately obvious. UML is a thinking tool, not just documentation.


  # --------------------------------------------------------------------------
  # STEP 10 — "From Diagram to Code: Build a System"
  # Pedagogy:
  #   Scaffold fully faded — no step-by-step guidance.
  #   Full Integration — combines all learned concepts.
  #   Bloom's level — Create (design from specification).
  # --------------------------------------------------------------------------
  - title: "From Diagram to Code: Build a System"
    instructions: |
      ## The Final Challenge

      > **Learning objective:** Given a complete UML class diagram, you will **implement** a multi-class system that uses inheritance, abstraction, composition, association, visibility, types, and multiplicity.

      ### Your Mission

      You have learned to read every element of a UML class diagram. Now prove it: implement an entire system from a UML specification alone. No step-by-step guidance — just the diagram and your skills.

      ### Your Target Diagram

      <div class="uml-class-diagram-container" data-uml-type="class" data-uml-spec='@startuml
      class User {
        + name: str
        - __email: str
        + __init__(name: str, email: str): None
        + get_email(): str
      }
      abstract class Task {
        + title: str
        + description: str
        + assignee: User
        + status: str
        + __init__(title: str, description: str, assignee: User, status: str): None
        + {abstract} priority(): str
        + get_summary(): str
      }
      class Bug {
        + severity: str
        + __init__(title: str, description: str, assignee: User, severity: str): None
        + priority(): str
      }
      class Feature {
        + business_value: int
        + __init__(title: str, description: str, assignee: User, business_value: int): None
        + priority(): str
      }
      class TaskManager {
        + tasks: list
        + __init__(): None
        + add_task(task: Task): None
        + get_tasks_by_assignee(user: User): list
        + get_high_priority(): list
      }
      Bug --|> Task
      Feature --|> Task
      TaskManager o-- "*" Task
      Task --> User
      @enduml'></div>

      ### Reading the Diagram

      This diagram uses every concept from this tutorial:

      - **Visibility:** `User.__email` is private (`-`), most other attributes are public (`+`)
      - **Types:** All attributes and methods show explicit types
      - **Inheritance:** `Bug` and `Feature` extend `Task`
      - **Abstract:** `Task` is abstract with an abstract `priority()` method
      - **Composition:** `TaskManager` owns `Task` objects (filled diamond, `0..*`)
      - **Association:** Each `Task` references a `User` (its assignee)

      ### Implementation Notes

      - `Bug.priority()`: return `"high"` if severity is `"critical"`, else `"medium"`
      - `Feature.priority()`: return `"high"` if business_value > 7, else `"low"`
      - `Task.get_summary()`: return `"[priority] title (assignee: user.name)"`
      - `TaskManager.get_high_priority()`: return all tasks where `priority()` is `"high"`

      Build it. Watch the diagram grow. Match the target.

    uml_files:
      - task_manager.py

    files:
      - path: task_manager.py
        content: |
          from abc import ABC, abstractmethod

          # Implement the entire system from the UML diagram.
          #
          # Classes needed:
          #   User         — name (public), __email (private), get_email()
          #   Task (ABC)   — title, description, assignee (User), status,
          #                  abstract priority(), get_summary()
          #   Bug(Task)    — severity, implements priority()
          #   Feature(Task)— business_value, implements priority()
          #   TaskManager  — tasks (list), add_task(), get_tasks_by_assignee(),
          #                  get_high_priority()
          #
          # Relationships:
          #   Bug --|> Task          (inheritance)
          #   Feature --|> Task      (inheritance)
          #   TaskManager *-- Task   (composition, 0..*)
          #   Task --> User          (association)
        language: python

    open_file: task_manager.py

    solution:
      files:
        - path: task_manager.py
          content: |
            from abc import ABC, abstractmethod


            class User:
                def __init__(self, name: str, email: str) -> None:
                    self.name: str = name
                    self.__email: str = email

                def get_email(self) -> str:
                    return self.__email


            class Task(ABC):
                def __init__(self, title: str, description: str,
                             assignee: User, status: str = "open") -> None:
                    self.title: str = title
                    self.description: str = description
                    self.assignee: User = assignee
                    self.status: str = status

                @abstractmethod
                def priority(self) -> str:
                    pass

                def get_summary(self) -> str:
                    return f"[{self.priority()}] {self.title} (assignee: {self.assignee.name})"


            class Bug(Task):
                def __init__(self, title: str, description: str,
                             assignee: User, severity: str) -> None:
                    super().__init__(title, description, assignee)
                    self.severity: str = severity

                def priority(self) -> str:
                    return "high" if self.severity == "critical" else "medium"


            class Feature(Task):
                def __init__(self, title: str, description: str,
                             assignee: User, business_value: int) -> None:
                    super().__init__(title, description, assignee)
                    self.business_value: int = business_value

                def priority(self) -> str:
                    return "high" if self.business_value > 7 else "low"


            class TaskManager:
                def __init__(self) -> None:
                    self.tasks: list[Task] = []

                def add_task(self, task: Task) -> None:
                    self.tasks.append(task)

                def get_tasks_by_assignee(self, user: User) -> list:
                    return [t for t in self.tasks if t.assignee is user]

                def get_high_priority(self) -> list:
                    return [t for t in self.tasks if t.priority() == "high"]


            if __name__ == "__main__":
                alice = User("Alice", "alice@company.com")
                bob = User("Bob", "bob@company.com")

                mgr = TaskManager()
                mgr.add_task(Bug("Login crash", "App crashes on login", alice, "critical"))
                mgr.add_task(Bug("Typo in footer", "Minor text error", bob, "minor"))
                mgr.add_task(Feature("Dark mode", "Add dark theme", alice, 9))
                mgr.add_task(Feature("Export CSV", "Export data as CSV", bob, 4))

                print("All tasks:")
                for t in mgr.tasks:
                    print(f"  {t.get_summary()}")

                print(f"\nHigh priority: {len(mgr.get_high_priority())}")
                print(f"Alice's tasks: {len(mgr.get_tasks_by_assignee(alice))}")
          language: python
      explanation: |
        Congratulations — you just implemented a complete system from a UML specification!

        This diagram used **every concept** from this tutorial:
        - **Three compartments** — class name, attributes, methods
        - **Visibility** — User's `__email` is private (`-`)
        - **Type hints** — all attributes and methods are explicitly typed
        - **Inheritance** — Bug and Feature extend Task
        - **Abstract classes** — Task is abstract with `priority()` as `@abstractmethod`
        - **Composition** — TaskManager creates and owns Task objects
        - **Association** — Task holds a reference to User
        - **Multiplicity** — TaskManager has 0 or more Tasks

        UML class diagrams are a **communication tool**. You just proved you can both *read* a diagram and *implement* one. In professional software engineering, this skill lets you understand and discuss system architecture before writing a single line of code.

    tests:
      - description: "Task is abstract and Bug/Feature are concrete subclasses"
        command: |
          source = open('/tutorial/task_manager.py').read()
          ns = {}
          exec(source, ns)
          assert 'Task' in ns, "Create an abstract Task class"
          assert 'Bug' in ns, "Create a Bug class"
          assert 'Feature' in ns, "Create a Feature class"
          try:
              ns['Task']('t', 'd', ns['User']('x', 'x@x.com'))
              assert False, "Task should be abstract — it should raise TypeError"
          except TypeError:
              pass
          assert issubclass(ns['Bug'], ns['Task']), "Bug must inherit from Task"
          assert issubclass(ns['Feature'], ns['Task']), "Feature must inherit from Task"
        hints:
          - text: "Make Task inherit from ABC, mark `priority()` with `@abstractmethod`, then make Bug and Feature inherit from Task with `class Bug(Task):`."
            condition: "default"

      - description: "User has private email with getter"
        command: |
          source = open('/tutorial/task_manager.py').read()
          ns = {}
          exec(source, ns)
          u = ns['User']('Alice', 'a@b.com')
          assert u.name == 'Alice', "User needs a public 'name' attribute"
          assert u.get_email() == 'a@b.com', \
              "get_email() should return the private email"
          assert hasattr(u, '_User__email'), \
              "email should be private: use self.__email"
        hints:
          - text: "Store email as `self.__email: str = email` (private) and add `def get_email(self) -> str:` returning `self.__email`."
            condition: "default"

      - description: "Bug and Feature implement priority() correctly"
        command: |
          source = open('/tutorial/task_manager.py').read()
          ns = {}
          exec(source, ns)
          u = ns['User']('X', 'x@x.com')
          bug_crit = ns['Bug']('b1', 'd', u, 'critical')
          bug_minor = ns['Bug']('b2', 'd', u, 'minor')
          feat_high = ns['Feature']('f1', 'd', u, 9)
          feat_low = ns['Feature']('f2', 'd', u, 4)
          assert bug_crit.priority() == 'high', \
              "Critical bugs should have 'high' priority"
          assert bug_minor.priority() == 'medium', \
              "Non-critical bugs should have 'medium' priority"
          assert feat_high.priority() == 'high', \
              "Features with business_value > 7 should have 'high' priority"
          assert feat_low.priority() == 'low', \
              "Features with business_value <= 7 should have 'low' priority"
        hints:
          - text: "Bug.priority(): return `'high'` if `self.severity == 'critical'` else `'medium'`. Feature.priority(): return `'high'` if `self.business_value > 7` else `'low'`."
            condition: "default"

      - description: "TaskManager works with composition and filtering"
        command: |
          source = open('/tutorial/task_manager.py').read()
          ns = {}
          exec(source, ns)
          u = ns['User']('Alice', 'a@b.com')
          mgr = ns['TaskManager']()
          mgr.add_task(ns['Bug']('b1', 'd', u, 'critical'))
          mgr.add_task(ns['Feature']('f1', 'd', u, 3))
          assert len(mgr.tasks) == 2, \
              "After adding 2 tasks, TaskManager should have 2 tasks"
          high = mgr.get_high_priority()
          assert len(high) == 1, \
              f"Should have 1 high-priority task (the critical bug), got {len(high)}"
          by_user = mgr.get_tasks_by_assignee(u)
          assert len(by_user) == 2, \
              "Both tasks are assigned to the same user"
        hints:
          - text: "TaskManager needs `add_task(self, task: Task)` appending to `self.tasks`, `get_high_priority()` filtering by `t.priority() == 'high'`, and `get_tasks_by_assignee(user)` filtering by `t.assignee is user`."
            condition: "default"

    quiz:
      title: "UML Comprehensive Review"
      min_score: 0.6
      shuffle: true
      questions:

        - question: |
            Match the UML notation to its meaning: a **solid line with a filled diamond** on one end.
          type: single
          options:
            - "Inheritance — one class extends another"
            - "Aggregation — the part can exist independently"
            - "Composition — the part's lifecycle is bound to the whole"
            - "Dependency — one class temporarily uses another"
          correct_index: 2
          explanation: |
            A filled diamond means **composition** — the whole exclusively owns the part, and the part is destroyed when the whole is destroyed. A hollow diamond would mean aggregation (independent lifecycle).

        - question: |
            Looking at the TaskManager diagram, why is `Task --> User` an **association** rather than composition?
          type: single
          options:
            - "Because Task and User are in different files"
            - "Because a User exists independently of any Task — deleting a Task does not destroy the User"
            - "Because User is abstract"
            - "Because there is no multiplicity notation"
          correct_index: 1
          explanation: |
            A `User` exists independently — they are created outside of `Task` and passed in. Deleting a task does not delete the user. This is a reference, not ownership, so it is an **association** (plain arrow) rather than composition (filled diamond).

        - question: |
            What is the most important purpose of a UML class diagram?
          type: single
          options:
            - "To generate code automatically"
            - "To replace code documentation"
            - "To communicate the structure and relationships of a system visually"
            - "To test the code for bugs"
          correct_index: 2
          explanation: |
            The primary purpose of UML is **communication**. A class diagram lets developers understand and discuss the architecture of a system — what classes exist, how they relate, and what contracts they define — without reading every line of code. It is a thinking and communication tool, not a replacement for code.
