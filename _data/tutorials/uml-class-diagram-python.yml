title: "UML Class Diagrams in Python"
description: "Learn to read and create UML class diagrams by writing Python code that matches target diagrams. Starting from single classes and building to full system architectures, you will discover how UML makes invisible design decisions visible."

backend: pyodide
uml_diagram: true
uml_position: right
uml_default_view: true
uml_class_layout: landscape
require_tests: true
autosave_type: files

setup_commands:
  - "import sys; sys.path.insert(0, '/tutorial'); import abc"

steps:

  # --------------------------------------------------------------------------
  # STEP 1 — "Your First Class Diagram"
  # Pedagogy:
  #   Worked Example — walk through the mapping from UML to Python.
  #   Component Skill Isolation (CLT) — only the class box, nothing else.
  #   Bloom's level — Remember (identify compartments), Apply (write class).
  # --------------------------------------------------------------------------
  - title: "Your First Class Diagram"
    uml_hide:
      - visibility
    instructions: |
      ## Welcome to UML Class Diagrams

      > **Learning objective:** After this step you will be able to **identify** the three compartments of a UML class box and **write** a Python class that matches a given diagram.

      ### What Is a UML Class Diagram?

      A UML class diagram is a visual blueprint of your software's structure. It shows what classes exist, what data they hold, what behavior they provide, and how they relate to each other. Think of it as a floor plan — you can understand the building without inspecting every brick.

      ### The Three Compartments

      Every class in UML is drawn as a box with three sections:

      | Compartment | Contains | Python Equivalent |
      |---|---|---|
      | **Top** | Class name | `class ClassName:` |
      | **Middle** | Attributes (data) | Instance variables in `__init__` |
      | **Bottom** | Methods (behavior) | Method definitions |

      ### Your Target Diagram

      Write Python code until the live diagram below matches this target:

      <div class="uml-class-diagram-container" data-uml-type="class" data-uml-spec='@startuml
      class Student {
        name
        student_id
        __init__(name, student_id)
        get_info()
      }
      @enduml'></div>

      ### Reading the Diagram

      - **Top:** The class name is `Student` → `class Student:`
      - **Middle:** Two attributes `name` and `student_id` → instance variables set in `__init__`
      - **Bottom:** One method `get_info()` → a method definition

      That is all there is to it — the diagram is a visual summary of the class.

      > **Note:** You may see symbols like `+`, `-`, and types like `: str` in other UML diagrams. We will cover those in the next steps. For now, focus on the three compartments.

      ### Your Task

      Open `student.py` and create a `Student` class that:

      1. Accepts `name` and `student_id` in `__init__`
      2. Stores both as instance attributes (`self.name = name`)
      3. Has a `get_info()` method returning `"name (student_id)"` — for example `"Alice (S001)"`

      Watch the **UML Diagram** panel — it updates live as you type!

    uml_files:
      - student.py

    files:
      - path: student.py
        content: |
          # Your task: create a Student class that matches the target diagram.
          #
          # The class needs:
          #   - An __init__ that accepts name and student_id
          #   - Both stored as instance attributes
          #   - A get_info() method returning "name (student_id)"
        language: python

    open_file: student.py

    solution:
      files:
        - path: student.py
          content: |
            class Student:
                def __init__(self, name, student_id):
                    self.name = name
                    self.student_id = student_id

                def get_info(self):
                    return f"{self.name} ({self.student_id})"


            if __name__ == "__main__":
                s = Student("Alice", "S001")
                print(s.get_info())
          language: python
      explanation: |
        Each section of the UML box maps directly to Python:

        - **Top (class name):** `Student` → `class Student:`
        - **Middle (attributes):** `name`, `student_id` → `self.name = name`, `self.student_id = student_id`
        - **Bottom (methods):** `get_info()` → `def get_info(self):`

        The diagram is simply a visual summary of the class structure. In the next steps we will add visibility markers (who can access what) and type annotations (what kind of data flows where).

    tests:
      - description: "Student class exists"
        command: |
          source = open('/tutorial/student.py').read()
          ns = {}
          exec(source, ns)
          assert 'Student' in ns, \
              "Define a class called Student"
        hints:
          - text: "Start with `class Student:` and add an `__init__` method."
            condition: "default"

      - description: "Student has name and student_id attributes"
        command: |
          source = open('/tutorial/student.py').read()
          ns = {}
          exec(source, ns)
          s = ns['Student']('Alice', 'S001')
          assert hasattr(s, 'name'), \
              "Student needs a 'name' attribute — use self.name = name in __init__"
          assert s.name == 'Alice', \
              "self.name should store the name passed to __init__"
          assert hasattr(s, 'student_id'), \
              "Student needs a 'student_id' attribute — use self.student_id = student_id"
          assert s.student_id == 'S001', \
              "self.student_id should store the student_id passed to __init__"
        hints:
          - text: "In `__init__`, store both parameters as instance attributes: `self.name = name` and `self.student_id = student_id`"
            condition: "default"

      - description: "get_info() returns the correct format"
        command: |
          source = open('/tutorial/student.py').read()
          ns = {}
          exec(source, ns)
          s = ns['Student']('Alice', 'S001')
          assert hasattr(s, 'get_info'), \
              "Student needs a get_info() method"
          result = s.get_info()
          assert result == 'Alice (S001)', \
              f"get_info() should return 'Alice (S001)' but got '{result}'"
        hints:
          - text: "Use an f-string: `return f\"{self.name} ({self.student_id})\"`"
            condition: "default"

    quiz:
      title: "The Class Box"
      min_score: 0.6
      shuffle: true
      questions:

        - question: |
            What does the **middle** compartment of a UML class box show?
          type: single
          options:
            - "The class name"
            - "The attributes (data) of the class"
            - "The methods (behavior) of the class"
            - "The relationships to other classes"
          correct_index: 1
          explanation: |
            The three compartments are: **top** = class name, **middle** = attributes, **bottom** = methods. Relationships are shown as arrows *between* class boxes, not inside them.

        - question: |
            A Python class has `self.x = 10` in `__init__` and a `def calculate(self)` method. How many items appear in the UML class box?
          type: single
          options:
            - "1 — just the class name"
            - "2 — the class name and the method"
            - "3 — the class name, one attribute, and one method"
            - "4 — the class name, self, the attribute, and the method"
          correct_index: 2
          explanation: |
            The UML box has three compartments: the class name at the top, `x` in the attributes section (middle), and `calculate()` in the methods section (bottom). `self` is not shown in UML — it is implicit.


  # --------------------------------------------------------------------------
  # STEP 2 — "Visibility: Who Can See What?"
  # Pedagogy:
  #   Constructivism — bridge Python _ and __ conventions to UML symbols.
  #   Negative Transfer — Python devs think visibility doesn't matter;
  #     UML forces explicit design decisions about encapsulation.
  #   Bloom's level — Understand (explain mapping), Apply (rename attrs).
  # --------------------------------------------------------------------------
  - title: "Visibility: Who Can See What?"
    instructions: |
      ## Visibility Markers

      > **Learning objective:** After this step you will be able to **map** UML visibility symbols to Python naming conventions and **explain** why encapsulation is a design decision.

      ### The Four Visibility Levels

      UML uses symbols to show *who* can access each attribute or method:

      | UML Symbol | Meaning | Python Convention |
      |---|---|---|
      | `+` | **Public** — accessible to all | `self.name` (no prefix) |
      | `-` | **Private** — only this class | `self.__name` (double underscore) |
      | `#` | **Protected** — this class and subclasses | `self._name` (single underscore) |
      | `~` | **Package** — same module | (no standard Python equivalent) |

      ### Python Naming Conventions in Detail

      Unlike C++ or Java, Python does not have `private` or `protected` keywords. Instead, it uses **naming conventions** — prefixes that signal intent to other developers:

      **No prefix → Public (`+`)**
      ```python
      self.name = "Alice"       # Anyone can read and write this
      ```
      This is the default. Any code anywhere can access `obj.name`.

      **Single underscore `_` → Protected (`#`)**
      ```python
      self._internal_cache = []  # "Hey, this is internal — use at your own risk"
      ```
      The underscore is a **social contract**: it says "this is an implementation detail, not part of the public interface." Python does not prevent access — it is a polite warning. Subclasses are expected to use `_` attributes, but external code should not.

      **Double underscore `__` → Private (`-`)**
      ```python
      self.__password = "secret"  # Python actively discourages outside access
      ```
      Python applies **name mangling**: it renames `__password` internally to `_ClassName__password`. This makes accidental access from outside the class difficult (though not impossible). It is the closest Python gets to true private access.

      ```python
      account = BankAccount(100)
      account.__balance         # AttributeError! (mangled name)
      account._BankAccount__balance  # Works, but you should never do this
      ```

      ### Why This Matters

      Python does not *enforce* visibility — but UML forces you to **decide** what *should* be accessible. This is a design decision, not a language feature. When you model a class in UML, you are making a deliberate architectural choice about which parts are the public interface and which are internal implementation details that could change without warning.

      ### Your Target Diagram

      <div class="uml-class-diagram-container" data-uml-type="class" data-uml-spec='@startuml
      class BankAccount {
        - __balance: float
        + __init__(initial_balance: float): None
        + deposit(amount: float): None
        + withdraw(amount: float): bool
        + get_balance(): float
        # _validate_amount(amount: float): bool
      }
      @enduml'></div>

      ### Your Task

      The starter code has a `BankAccount` where everything is public. Refactor it:

      1. Make `balance` **private** → rename to `__balance` (matches `-` in UML)
      2. Make `validate_amount` **protected** → rename to `_validate_amount` (matches `#`)
      3. Keep `deposit`, `withdraw`, and `get_balance` **public** (they stay as-is)
      4. Update all internal references to use the new names

      Watch the UML diagram update — the visibility markers should change from `+` to `-` and `#`.

    uml_files:
      - bank_account.py

    files:
      - path: bank_account.py
        content: |
          class BankAccount:
              """A bank account — but everything is public!
              Your job: apply proper visibility using Python naming conventions."""

              def __init__(self, initial_balance: float) -> None:
                  self.balance: float = initial_balance  # Should be private (-)

              def deposit(self, amount: float) -> None:
                  if self.validate_amount(amount):       # Update reference
                      self.balance += amount              # Update reference

              def withdraw(self, amount: float) -> bool:
                  if self.validate_amount(amount) and self.balance >= amount:
                      self.balance -= amount              # Update reference
                      return True
                  return False

              def get_balance(self) -> float:
                  return self.balance                     # Update reference

              def validate_amount(self, amount: float) -> bool:  # Should be protected (#)
                  return amount > 0


          if __name__ == "__main__":
              account = BankAccount(100.0)
              account.deposit(50.0)
              print(f"Balance: ${account.get_balance():.2f}")
              account.withdraw(30.0)
              print(f"Balance: ${account.get_balance():.2f}")
        language: python

    open_file: bank_account.py

    solution:
      files:
        - path: bank_account.py
          content: |
            class BankAccount:
                """A bank account with proper visibility."""

                def __init__(self, initial_balance: float) -> None:
                    self.__balance: float = initial_balance

                def deposit(self, amount: float) -> None:
                    if self._validate_amount(amount):
                        self.__balance += amount

                def withdraw(self, amount: float) -> bool:
                    if self._validate_amount(amount) and self.__balance >= amount:
                        self.__balance -= amount
                        return True
                    return False

                def get_balance(self) -> float:
                    return self.__balance

                def _validate_amount(self, amount: float) -> bool:
                    return amount > 0


            if __name__ == "__main__":
                account = BankAccount(100.0)
                account.deposit(50.0)
                print(f"Balance: ${account.get_balance():.2f}")
                account.withdraw(30.0)
                print(f"Balance: ${account.get_balance():.2f}")
          language: python
      explanation: |
        The renaming maps directly to UML visibility:

        - `self.balance` → `self.__balance` makes the UML show `-` (private)
        - `self.validate_amount` → `self._validate_amount` makes the UML show `#` (protected)
        - Public methods keep their names → UML shows `+`

        **Key insight:** Python lets you access *anything*, but that does not mean you *should*. The UML diagram documents your **design intent** — which parts are the public interface and which are internal implementation details.

    tests:
      - description: "balance is private (uses __ prefix)"
        command: |
          source = open('/tutorial/bank_account.py').read()
          ns = {}
          exec(source, ns)
          account = ns['BankAccount'](100.0)
          assert hasattr(account, '_BankAccount__balance'), \
              "Rename self.balance to self.__balance to make it private"
          assert not hasattr(account, 'balance'), \
              "Remove the public self.balance — use self.__balance instead"
        hints:
          - text: "Replace every `self.balance` with `self.__balance` — the double underscore triggers Python name mangling, which maps to UML private (`-`)."
            condition: "default"

      - description: "validate_amount is protected (uses _ prefix)"
        command: |
          source = open('/tutorial/bank_account.py').read()
          ns = {}
          exec(source, ns)
          account = ns['BankAccount'](100.0)
          assert hasattr(account, '_validate_amount'), \
              "Rename validate_amount to _validate_amount (single underscore = protected)"
        hints:
          - text: "Rename `def validate_amount` to `def _validate_amount` and update all calls to it."
            condition: "default"

      - description: "Public methods still work correctly"
        command: |
          source = open('/tutorial/bank_account.py').read()
          ns = {}
          exec(source, ns)
          account = ns['BankAccount'](100.0)
          account.deposit(50.0)
          assert account.get_balance() == 150.0, \
              f"After depositing 50 into 100, balance should be 150 but got {account.get_balance()}"
          result = account.withdraw(200.0)
          assert result == False, \
              "Withdrawing more than the balance should return False"
          assert account.get_balance() == 150.0, \
              "Balance should not change after a failed withdrawal"
        hints:
          - text: "Make sure you updated ALL references to `self.balance` and `self.validate_amount` inside the methods too — not just the definitions."
            condition: "default"

    quiz:
      title: "Visibility Notation"
      min_score: 0.6
      shuffle: true
      questions:

        - question: |
            In UML, what does the `-` symbol before an attribute mean?
          type: single
          options:
            - "The attribute is public"
            - "The attribute is private"
            - "The attribute is static"
            - "The attribute is optional"
          correct_index: 1
          explanation: |
            `-` means **private** — only accessible within the class itself. In Python, this maps to the double-underscore prefix (`__`), which triggers name mangling.

        - question: |
            A Python method named `_calculate_tax` would appear in UML with which visibility marker?
          type: single
          options:
            - "`+` (public)"
            - "`-` (private)"
            - "`#` (protected)"
            - "`~` (package)"
          correct_index: 2
          explanation: |
            A single leading underscore (`_`) is the Python convention for **protected** members, which maps to `#` in UML. Double underscores (`__`) map to private (`-`).


  # --------------------------------------------------------------------------
  # STEP 3 — "Types Matter: Explicit Contracts"
  # Pedagogy:
  #   Constructivism — bridge duck typing to explicit UML types.
  #   Desirable Difficulty (Generation) — students must infer types.
  #   Bloom's level — Understand (why types matter), Apply (add hints).
  # --------------------------------------------------------------------------
  - title: "Types Matter: Explicit Contracts"
    instructions: |
      ## Explicit Types in UML

      > **Learning objective:** After this step you will be able to **add** Python type hints that make UML diagrams show complete type information and **explain** why explicit types improve software design.

      ### What Are Type Hints?

      You may not have seen Python **type hints** before. They are optional annotations that tell both humans and tools what type a variable or return value should be:

      ```python
      # Without type hints (what you are used to):
      def __init__(self, name, price):
          self.name = name

      # With type hints:
      def __init__(self, name: str, price: float) -> None:
          self.name: str = name
      ```

      | Syntax | Meaning | Example |
      |---|---|---|
      | `param: Type` | Parameter has this type | `name: str` |
      | `self.x: Type = value` | Attribute has this type | `self.name: str = name` |
      | `-> Type` | Method returns this type | `def get_price(self) -> float:` |
      | `-> None` | Method returns nothing | `def __init__(self, ...) -> None:` |

      Type hints do **not** change how Python runs your code — Python ignores them at runtime. But they serve two critical purposes:

      1. **UML diagrams** — the live diagram renderer reads type hints to show types. Without them, the diagram only shows names.
      2. **Communication** — type hints document the contracts of your class for other developers.

      > **Advanced:** In professional projects, you can enforce type hints using tools like **mypy** (a static type checker). Running `mypy your_file.py` catches type errors without running the code — similar to a compiler in C++ or Java. You can integrate mypy into your build pipeline using **tox** (`tox -e mypy`) to automatically check types across your entire project.

      ### The Problem with Duck Typing

      Python is dynamically typed — you can write `def get_price(self)` without ever specifying that it returns a `float`. This flexibility is convenient, but it hides the **contracts** between components. Another developer reading your code has to trace through the logic to figure out what types flow where.

      UML does not allow this ambiguity. Every attribute must show its type, and every method must show its parameter types and return type.

      ### UML Type Notation

      | UML | Python |
      |---|---|
      | `- name: str` | `self.__name: str = name` |
      | `+ get_price(): float` | `def get_price(self) -> float:` |
      | `+ apply_discount(percent: float): float` | `def apply_discount(self, percent: float) -> float:` |

      ### Your Target Diagram

      <div class="uml-class-diagram-container" data-uml-type="class" data-uml-spec='@startuml
      class Product {
        - __name: str
        - __price: float
        - __in_stock: bool
        + __init__(name: str, price: float, in_stock: bool): None
        + get_name(): str
        + get_price(): float
        + is_available(): bool
        + apply_discount(percent: float): float
      }
      @enduml'></div>

      ### Your Task

      The starter code works perfectly — but has **zero type hints**. The UML diagram shows the class without any type information. Add type hints to:

      1. All `__init__` parameters
      2. All instance attributes (e.g., `self.__name: str = name`)
      3. All method return types (e.g., `-> float`)
      4. All method parameters (e.g., `percent: float`)

      Watch the UML diagram fill in with types as you add annotations.

    uml_files:
      - product.py

    files:
      - path: product.py
        content: |
          class Product:
              """A product in an online store.
              Everything works — but there are no type hints!
              Add type annotations so the UML diagram shows types."""

              def __init__(self, name, price, in_stock):
                  self.__name = name
                  self.__price = price
                  self.__in_stock = in_stock

              def get_name(self):
                  return self.__name

              def get_price(self):
                  return self.__price

              def is_available(self):
                  return self.__in_stock

              def apply_discount(self, percent):
                  discount = self.__price * (percent / 100)
                  return self.__price - discount


          if __name__ == "__main__":
              p = Product("Laptop", 999.99, True)
              print(f"{p.get_name()}: ${p.get_price():.2f}")
              print(f"After 10% off: ${p.apply_discount(10):.2f}")
              print(f"In stock: {p.is_available()}")
        language: python

    open_file: product.py

    solution:
      files:
        - path: product.py
          content: |
            class Product:
                """A product in an online store — now with full type hints."""

                def __init__(self, name: str, price: float, in_stock: bool) -> None:
                    self.__name: str = name
                    self.__price: float = price
                    self.__in_stock: bool = in_stock

                def get_name(self) -> str:
                    return self.__name

                def get_price(self) -> float:
                    return self.__price

                def is_available(self) -> bool:
                    return self.__in_stock

                def apply_discount(self, percent: float) -> float:
                    discount = self.__price * (percent / 100)
                    return self.__price - discount


            if __name__ == "__main__":
                p = Product("Laptop", 999.99, True)
                print(f"{p.get_name()}: ${p.get_price():.2f}")
                print(f"After 10% off: ${p.apply_discount(10):.2f}")
                print(f"In stock: {p.is_available()}")
          language: python
      explanation: |
        Type hints serve double duty:
        1. They make the UML diagram complete — every attribute and method shows its type.
        2. They document the **contracts** of your class — what goes in and what comes out.

        Without type hints, another developer must read your implementation to know that `apply_discount` expects a percentage as a float and returns a float. With type hints (and the corresponding UML), this is immediately visible.

    tests:
      - description: "Instance attributes have type hints"
        command: |
          source = open('/tutorial/product.py').read()
          assert 'self.__name: str' in source, \
              "Add a type hint to __name: self.__name: str = name"
          assert 'self.__price: float' in source, \
              "Add a type hint to __price: self.__price: float = price"
          assert 'self.__in_stock: bool' in source, \
              "Add a type hint to __in_stock: self.__in_stock: bool = in_stock"
        hints:
          - text: "Change `self.__name = name` to `self.__name: str = name` — add `: Type` before the `=`."
            condition: "default"

      - description: "Methods have return type hints"
        command: |
          source = open('/tutorial/product.py').read()
          assert '-> str' in source, \
              "Add return type hints like -> str to get_name()"
          assert '-> float' in source, \
              "Add return type hints like -> float to get_price() and apply_discount()"
          assert '-> bool' in source, \
              "Add return type hint -> bool to is_available()"
        hints:
          - text: "Add `-> ReturnType` before the colon in method definitions: `def get_name(self) -> str:`"
            condition: "default"

      - description: "apply_discount parameter has type hint"
        command: |
          source = open('/tutorial/product.py').read()
          ns = {}
          exec(source, ns)
          import inspect
          sig = inspect.signature(ns['Product'].apply_discount)
          params = sig.parameters
          assert 'percent' in params, \
              "apply_discount should have a 'percent' parameter"
          assert params['percent'].annotation == float, \
              "The percent parameter needs a type hint: percent: float"
        hints:
          - text: "Change `def apply_discount(self, percent)` to `def apply_discount(self, percent: float) -> float:`"
            condition: "default"

    quiz:
      title: "Types in UML"
      min_score: 0.6
      shuffle: true
      questions:

        - question: |
            Why does UML require explicit types on all attributes and methods?
          type: single
          options:
            - "Because UML only works with statically typed languages"
            - "To make diagrams look more professional"
            - "To make the contracts between components explicit and unambiguous"
            - "Because Python requires type hints to run"
          correct_index: 2
          explanation: |
            UML forces explicit types to document the **contracts** — what data flows between components and in what form. This is a design decision that improves communication, regardless of whether the language enforces it.

        - question: |
            How does the UML notation `+ apply_discount(percent: float): float` map to Python?
          type: single
          options:
            - "`def apply_discount(percent: float) -> float:`"
            - "`def apply_discount(self, percent: float) -> float:`"
            - "`def apply_discount(self, percent) -> float:`"
            - "`float apply_discount(float percent)`"
          correct_index: 1
          explanation: |
            Python methods always include `self` as the first parameter, but UML omits it (it is implied). The return type goes after `->` in Python, and after `:` in UML. Both `percent: float` parameter annotations match directly.


  # --------------------------------------------------------------------------
  # STEP 4 — "Inheritance: Is-A Relationships"
  # Pedagogy:
  #   Desirable Difficulty (Generation) — refactor duplicated code.
  #   Common Mistake — arrow direction (Chren et al., 2019).
  #   Bloom's level — Apply (refactor), Analyze (quiz on arrow direction).
  # --------------------------------------------------------------------------
  - title: "Inheritance: Is-A Relationships"
    instructions: |
      ## The Generalization Arrow

      > **Learning objective:** After this step you will be able to **refactor** duplicated classes into an inheritance hierarchy and **draw** the correct generalization arrow direction.

      ### Inheritance in UML

      When a class **extends** another class (an "is-a" relationship), UML draws a solid line with a **hollow triangle** pointing at the **parent** (superclass):

      Child <span class="uml-sym" data-diagram="class" data-sym="--|>"></span> Parent

      **Common mistake:** Students often draw the arrow pointing *away* from the parent. Remember: the triangle is like an arrowhead — it points at the thing being extended.

      ### Your Target Diagram

      <div class="uml-class-diagram-container" data-uml-type="class" data-uml-spec='@startuml
      class Shape {
        + color: str
        + __init__(color: str): None
        + area(): float
        + describe(): str
      }
      class Circle {
        + radius: float
        + __init__(color: str, radius: float): None
        + area(): float
      }
      class Rectangle {
        + width: float
        + height: float
        + __init__(color: str, width: float, height: float): None
        + area(): float
      }
      Circle --|> Shape
      Rectangle --|> Shape
      @enduml'></div>

      Notice: `Circle` and `Rectangle` only list their **own** attributes. They inherit `color` and `describe()` from `Shape` — they do not repeat them.

      ### Your Task

      The starter code has three **independent** classes with duplicated `color` and `describe()`. Refactor them:

      1. Make `Shape` the base class with `color`, `area()`, and `describe()`
      2. Make `Circle` and `Rectangle` **inherit** from `Shape` using `class Circle(Shape):`
      3. Remove the duplicated `color` attribute and `describe()` method from the subclasses
      4. Each subclass should call `super().__init__(color)` and override `area()`

      Watch the inheritance arrows appear in the live diagram.

