      min_score: 0.6
      shuffle: true
      questions:

        - question: |
            In a UML class diagram, which direction does the inheritance arrow point?
          type: single
          options:
            - "From the parent to the child"
            - "From the child to the parent"
            - "Both directions (bidirectional)"
            - "It depends on the programming language"
          correct_index: 1
          explanation: |
            The generalization arrow always points **from the child to the parent** — the hollow triangle is at the parent end. Think of it as the child "reaching up" to the thing it extends.

        - question: |
            If `Circle` inherits `describe()` from `Shape`, where does `describe()` appear in the UML diagram?
          type: single
          options:
            - "In both the Shape and Circle boxes"
            - "Only in the Shape box"
            - "Only in the Circle box"
            - "Nowhere — inherited methods are not shown"
          correct_index: 1
          explanation: |
            Inherited members appear only in the **parent** class box. The child class only lists members it **adds** or **overrides**. The inheritance arrow tells you that everything in the parent is available in the child.


  # --------------------------------------------------------------------------
  # STEP 5 — "Association: Classes That Know Each Other"
  # Pedagogy:
  #   Key Insight — UML makes implicit references explicit.
  #   Constructivism — bridge from "storing a string" to "storing an object."
  #   Bloom's level — Understand (when associations arise), Apply (refactor).
  # --------------------------------------------------------------------------
  - title: "Association: Classes That Know Each Other"
    uml_hide:
      - multiplicity
    instructions: |
      ## Association Arrows

      > **Learning objective:** After this step you will be able to **identify** when a UML association exists between two classes and **refactor** string-based references into proper object associations.

      ### What Is an Association?

      An association means one class **stores a reference** to another class as an instance variable. In UML, this is drawn as a solid arrow <span class="uml-sym" data-diagram="class" data-sym="-->"></span> from the class that holds the reference to the class it references.

      **The key rule:** If a class stores another object as a persistent instance variable (`self.instructor: Instructor`), that is an **association**. If it only uses another class temporarily inside a method, that is a weaker relationship (a dependency, which we will skip for now).

      ### Your Target Diagram

      <div class="uml-class-diagram-container" data-uml-type="class" data-uml-spec='@startuml
      class Instructor {
        + name: str
        + department: str
        + __init__(name: str, department: str): None
        + get_title(): str
      }
      class Course {
        + name: str
        + instructor: Instructor
        + __init__(name: str, instructor: Instructor): None
        + get_instructor_name(): str
      }
      Course --> Instructor
      @enduml'></div>

      Notice the association arrow from `Course` to `Instructor` — it appears because `Course` has an `instructor: Instructor` attribute.

      ### Your Task

      The starter code stores the instructor as a plain string (`instructor_name: str`). This hides the relationship — the UML shows no connection between the classes.

      1. **Create an `Instructor` class** with `name: str`, `department: str`, and a `get_title()` method returning `"name (department)"`
      2. **Refactor `Course`** to accept and store an `Instructor` object instead of a string
      3. **Update `get_instructor_name()`** to return `self.instructor.name`

      Watch the association arrow appear in the UML diagram!

    uml_files:
      - enrollment.py

    files:
      - path: enrollment.py
        content: |
          class Course:
              """A course — but the instructor is just a string!
              There is no Instructor class, so the UML shows no relationship."""

              def __init__(self, name: str, instructor_name: str) -> None:
                  self.name: str = name
                  self.instructor_name: str = instructor_name  # Just a string!

              def get_instructor_name(self) -> str:
                  return self.instructor_name


          # TODO: Create an Instructor class with name, department, and get_title()
          # TODO: Refactor Course to store an Instructor object instead of a string


          if __name__ == "__main__":
              # After your refactoring, this code should work:
              # instructor = Instructor("Dr. Smith", "Computer Science")
              # course = Course("CS 101", instructor)
              # print(f"{course.name} taught by {course.get_instructor_name()}")

              course = Course("CS 101", "Dr. Smith")
              print(f"{course.name} taught by {course.get_instructor_name()}")
        language: python

    open_file: enrollment.py

    solution:
      files:
        - path: enrollment.py
          content: |
            class Instructor:
                def __init__(self, name: str, department: str) -> None:
                    self.name: str = name
                    self.department: str = department

                def get_title(self) -> str:
                    return f"{self.name} ({self.department})"


            class Course:
                def __init__(self, name: str, instructor: Instructor) -> None:
                    self.name: str = name
                    self.instructor: Instructor = instructor

                def get_instructor_name(self) -> str:
                    return self.instructor.name


            if __name__ == "__main__":
                instructor = Instructor("Dr. Smith", "Computer Science")
                course = Course("CS 101", instructor)
                print(f"{course.name} taught by {course.get_instructor_name()}")
                print(f"Instructor: {instructor.get_title()}")
          language: python
      explanation: |
        **Before:** `Course` stored `instructor_name: str` — the UML showed two isolated boxes with no connection. The relationship was invisible.

        **After:** `Course` stores `instructor: Instructor` — the UML shows an association arrow. The structural relationship is now explicit and visible to anyone reading the diagram.

        This is the core value of UML: **making invisible relationships visible**. In a large codebase, you would have to trace through constructor code to discover that Course depends on Instructor. The UML diagram shows this at a glance.

    tests:
      - description: "Instructor class exists with name and department"
        command: |
          source = open('/tutorial/enrollment.py').read()
          ns = {}
          exec(source, ns)
          assert 'Instructor' in ns, \
              "Create an Instructor class"
          i = ns['Instructor']('Dr. Smith', 'Computer Science')
          assert i.name == 'Dr. Smith', \
              "Instructor needs a 'name' attribute"
          assert i.department == 'Computer Science', \
              "Instructor needs a 'department' attribute"
        hints:
          - text: "Create a class: `class Instructor:` with `__init__(self, name: str, department: str)` storing both as typed attributes."
            condition: "default"

      - description: "Course stores an Instructor object (not a string)"
        command: |
          source = open('/tutorial/enrollment.py').read()
          ns = {}
          exec(source, ns)
          i = ns['Instructor']('Dr. Smith', 'CS')
          c = ns['Course']('CS 101', i)
          assert hasattr(c, 'instructor'), \
              "Course needs an 'instructor' attribute (not 'instructor_name')"
          assert isinstance(c.instructor, ns['Instructor']), \
              "Course.instructor should be an Instructor object, not a string"
        hints:
          - text: "Change `__init__(self, name: str, instructor_name: str)` to `__init__(self, name: str, instructor: Instructor)` and store it as `self.instructor: Instructor = instructor`."
            condition: "default"

      - description: "get_instructor_name() returns the instructor's name"
        command: |
          source = open('/tutorial/enrollment.py').read()
          ns = {}
          exec(source, ns)
          i = ns['Instructor']('Dr. Smith', 'CS')
          c = ns['Course']('CS 101', i)
          result = c.get_instructor_name()
          assert result == 'Dr. Smith', \
              f"get_instructor_name() should return 'Dr. Smith' but got '{result}'"
        hints:
          - text: "Update `get_instructor_name()` to return `self.instructor.name` instead of `self.instructor_name`."
            condition: "default"

    quiz:
      title: "Associations"
      min_score: 0.6
      shuffle: true
      questions:

        - question: |
            When does an association arrow appear between two classes in a UML diagram?
          type: single
          options:
            - "When one class imports another"
            - "When one class stores a reference to another as an instance variable"
            - "When two classes are in the same file"
            - "When one class calls a method on another"
          correct_index: 1
          explanation: |
            An association arrow appears when a class **stores** another object as a **persistent instance variable** (e.g., `self.instructor: Instructor`). Simply importing or calling a method creates a weaker *dependency*, not an association.

        - question: |
            Why is storing `instructor_name: str` worse than `instructor: Instructor` from a design perspective?
          type: single
          options:
            - "Strings use more memory than objects"
            - "The structural relationship is hidden — UML cannot show the connection"
            - "Python does not allow storing strings as attributes"
            - "Strings cannot be printed"
          correct_index: 1
          explanation: |
            When you use a string, the **relationship between Course and Instructor is invisible** — both in the code and in the UML diagram. Using an `Instructor` object makes the dependency explicit, allowing UML to show the arrow and helping other developers understand the system structure at a glance.


  # --------------------------------------------------------------------------
  # STEP 6 — "Composition vs Aggregation"
  # Pedagogy:
  #   Metaphor — rm -rf (composition) vs symlinks (aggregation).
  #   C++ Bridge — unique_ptr vs raw pointer.
  #   Bloom's level — Analyze (distinguish lifecycle dependency).
  #   Note: multiplicity hidden — introduced in the next step.
  # --------------------------------------------------------------------------
  - title: "Composition vs Aggregation"
    uml_hide:
      - multiplicity
    instructions: |
      ## Ownership and Lifecycle

      > **Learning objective:** After this step you will be able to **distinguish** composition from aggregation and **implement** both patterns correctly in Python.

      ### Two Kinds of "Has-A"

      Both composition and aggregation model a "whole-part" relationship. The difference is **ownership and lifecycle**:

      | | Composition (filled diamond) | Aggregation (hollow diamond) |
      |---|---|---|
      | **Symbol** | <span class="uml-sym" data-diagram="class" data-sym="*--"></span> filled diamond | <span class="uml-sym" data-diagram="class" data-sym="o--"></span> hollow diamond |
      | **Ownership** | Whole **owns** the part exclusively | Whole **references** the part |
      | **Lifecycle** | Part is destroyed with the whole | Part survives independently |
      | **Python pattern** | Part created **inside** `__init__` | Part **passed in** from outside |

      ### The File System Metaphor

      - **Composition** = a directory and its files. If you run `rm -rf directory/`, the files inside are destroyed. Their lifecycle is bound to the directory.
      - **Aggregation** = a directory containing symbolic links. If you delete the directory, the symlinks vanish but the original files they pointed to survive.

      ### Your Target Diagram

      <div class="uml-class-diagram-container" data-uml-type="class" data-uml-spec='@startuml
      class Professor {
        + name: str
        + field: str
        + __init__(name: str, field: str): None
      }
      class Department {
        + name: str
        + professors: list[Professor]
        + __init__(name: str): None
        + add_professor(prof: Professor): None
      }
      class University {
        + name: str
        + departments: list[Department] 
        + __init__(name: str): None
        + add_department(dept_name: str): None
        + get_department(name: str): Department
      }
      University *--> Department
      Department o--> Professor
      @enduml'></div>

      Notice the two different diamonds:
      - **Filled diamond** <span class="uml-sym" data-diagram="class" data-sym="*--"></span> between University and Department → composition. The university creates its departments. If the university ceases to exist, so do its departments.
      - **Hollow diamond** <span class="uml-sym" data-diagram="class" data-sym="o--"></span> between Department and Professor → aggregation. Professors are independent people who are assigned to departments. If a department is dissolved, the professors still exist.

      > **Note:** You may notice that the live diagram does not show *how many* departments or professors participate. Those numbers (called **multiplicity**) are covered in the next step.

      ### Your Task

      Complete the starter code:

      1. **`University.add_department(dept_name)`** should **create** a new `Department` internally (composition — the part is born inside the whole)
      2. **`Department.add_professor(prof)`** should **receive** an existing `Professor` from outside (aggregation — the part exists independently)

    uml_files:
      - university.py

    files:
      - path: university.py
        content: |
          class Professor:
              def __init__(self, name: str, field: str) -> None:
                  self.name: str = name
                  self.field: str = field


          class Department:
              def __init__(self, name: str) -> None:
                  self.name: str = name
                  self.professors: list[Professor] = []

              def add_professor(self, prof: Professor) -> None:
                  # TODO: Store the professor (aggregation — received from outside)
                  pass


          class University:
              def __init__(self, name: str) -> None:
                  self.name: str = name
                  self.departments: list[Department] = []

              def add_department(self, dept_name: str) -> None:
                  # TODO: Create a new Department and add it (composition — created inside)
                  pass

              def get_department(self, name: str) -> Department:
                  for dept in self.departments:
                      if dept.name == name:
                          return dept
                  raise ValueError(f"Department '{name}' not found")


          if __name__ == "__main__":
              # Professors exist independently — they are created outside
              prof_alice = Professor("Dr. Alice", "AI")
              prof_bob = Professor("Dr. Bob", "Systems")

              # University creates its own departments (composition)
              uni = University("State University")
              uni.add_department("Computer Science")
              uni.add_department("Mathematics")

              # Professors are assigned to departments (aggregation)
              cs = uni.get_department("Computer Science")
              cs.add_professor(prof_alice)
              cs.add_professor(prof_bob)

              print(f"{uni.name} has {len(uni.departments)} departments")
              print(f"CS has {len(cs.professors)} professors")
        language: python

    open_file: university.py

    solution:
      files:
        - path: university.py
          content: |
            class Professor:
                def __init__(self, name: str, field: str) -> None:
                    self.name: str = name
                    self.field: str = field


            class Department:
                def __init__(self, name: str) -> None:
                    self.name: str = name
                    self.professors: list[Professor] = []

                def add_professor(self, prof: Professor) -> None:
                    self.professors.append(prof)


            class University:
                def __init__(self, name: str) -> None:
                    self.name: str = name
                    self.departments: list[Department] = []

                def add_department(self, dept_name: str) -> None:
                    dept = Department(dept_name)
                    self.departments.append(dept)

                def get_department(self, name: str) -> Department:
                    for dept in self.departments:
                        if dept.name == name:
                            return dept
                    raise ValueError(f"Department '{name}' not found")


            if __name__ == "__main__":
                prof_alice = Professor("Dr. Alice", "AI")
                prof_bob = Professor("Dr. Bob", "Systems")

                uni = University("State University")
                uni.add_department("Computer Science")
                uni.add_department("Mathematics")

                cs = uni.get_department("Computer Science")
                cs.add_professor(prof_alice)
                cs.add_professor(prof_bob)

                print(f"{uni.name} has {len(uni.departments)} departments")
                print(f"CS has {len(cs.professors)} professors")
          language: python
      explanation: |
        The critical difference is **where the object is created**:

        - **Composition:** `add_department` creates `Department(dept_name)` *inside* the method. The University controls the lifecycle — departments cannot exist without a university.
        - **Aggregation:** `add_professor` receives a `Professor` that was created *outside*. The Department only holds a reference — the professor existed before and survives after.

        **Code pattern to remember:**
        - Composition: `self.parts.append(Part(...))` — created internally
        - Aggregation: `self.parts.append(part)` — passed in from outside

    tests:
      - description: "University creates departments internally (composition)"
        command: |
          source = open('/tutorial/university.py').read()
          ns = {}
          exec(source, ns)
          uni = ns['University']('Test U')
          uni.add_department('CS')
          assert len(uni.departments) == 1, \
              "After add_department('CS'), university should have 1 department"
          assert uni.departments[0].name == 'CS', \
              "The created department should have the name 'CS'"
        hints:
          - text: "In `add_department`, create a new Department: `dept = Department(dept_name)` then `self.departments.append(dept)`."
            condition: "default"

      - description: "Department receives professors from outside (aggregation)"
        command: |
          source = open('/tutorial/university.py').read()
          ns = {}
          exec(source, ns)
          prof = ns['Professor']('Dr. Test', 'AI')
          dept = ns['Department']('CS')
          dept.add_professor(prof)
          assert len(dept.professors) == 1, \
              "After add_professor(), department should have 1 professor"
          assert dept.professors[0] is prof, \
              "The professor in the department should be the SAME object that was passed in (not a copy)"
        hints:
          - text: "In `add_professor`, just append the received professor: `self.professors.append(prof)`."
            condition: "default"

      - description: "Full system works end-to-end"
        command: |
          source = open('/tutorial/university.py').read()
          ns = {}
          exec(source, ns)
          prof = ns['Professor']('Dr. Alice', 'AI')
          uni = ns['University']('State U')
          uni.add_department('CS')
          cs = uni.get_department('CS')
          cs.add_professor(prof)
          assert len(cs.professors) == 1
          assert cs.professors[0].name == 'Dr. Alice'
        hints:
          - text: "Make sure both `add_department` and `add_professor` append to their respective lists."
            condition: "default"

    quiz:
      title: "Composition vs Aggregation"
      min_score: 0.6
      shuffle: true
      questions:

        - question: |
            A `Car` creates its own `Engine` in `__init__`. If the car is scrapped, the engine goes with it. What UML relationship is this?
          type: single
          options:
            - "Association (plain arrow)"
            - "Aggregation (hollow diamond)"
            - "Composition (filled diamond)"
            - "Inheritance (hollow triangle)"
          correct_index: 2
          explanation: |
            This is **composition** (filled diamond). The engine is created *inside* the car and its lifecycle is bound to the car. If the car is destroyed, the engine is too. The key indicator: the part is created internally, not passed in.

        - question: |
            A `Team` holds references to `Player` objects that were created outside the team. Players can be traded to other teams. What UML relationship is this?
          type: single
          options:
            - "Composition (filled diamond)"
            - "Aggregation (hollow diamond)"
            - "Dependency (dashed arrow)"
            - "Inheritance (hollow triangle)"
          correct_index: 1
          explanation: |
            This is **aggregation** (hollow diamond). Players exist independently of any team — they were created outside, passed in, and can move to another team. The team holds a reference but does not control the player's lifecycle.

        - question: |
            What Python code pattern signals **composition**?
          type: single
          options:
            - "`def __init__(self, part: Part)` — receiving the part as a parameter"
            - "`def add(self, part: Part)` — receiving an existing object"
            - "`self.part = Part(...)` — creating the part inside the class"
            - "`import Part` — importing the part's module"
          correct_index: 2
          explanation: |
            Composition means the whole **creates** the part internally: `self.part = Part(...)`. The part's lifecycle is tied to the whole. Aggregation means the part is **passed in** from outside: `def __init__(self, part: Part)`.


  # --------------------------------------------------------------------------
  # STEP 7 — "Multiplicity: How Many?"
  # Pedagogy:
  #   Reading heuristic — "read it as a sentence."
  #   Common Mistake — reversed multiplicity placement (Chren et al.).
  #   Bloom's level — Understand (read notation), Apply (implement list).
  # --------------------------------------------------------------------------
  - title: "Multiplicity: How Many?"
    instructions: |
      ## Multiplicity Notation

      > **Learning objective:** After this step you will be able to **read** multiplicity notation on UML associations and **implement** one-to-many relationships using Python lists.

      ### What Is Multiplicity?

      Multiplicity tells you **how many** instances participate in a relationship. It is written as a number or range next to each end of an association line.

      | Notation | Meaning |
      |---|---|
      | `1` | Exactly one |
      | `0..1` | Zero or one (optional) |
      | `*` or `0..*` | Zero or more |
      | `1..*` | One or more |

      ### Reading Multiplicity as a Sentence

      Read from each end toward the other. The arrow <span class="uml-sym" data-diagram="class" data-sym="-->"></span> connects the two classes, with numbers on each side:

      Playlist <span class="uml-sym" data-diagram="class" data-sym="-->"></span> **"*"** Song

      - Left to right: "One Playlist contains zero or more Songs"
      - Right to left: "Each Song belongs to one Playlist"

      **Placement rule:** The number is placed next to the class it **quantifies**. The `*` goes next to `Song` because there are many songs, not many playlists.

      ### Your Target Diagram

      <div class="uml-class-diagram-container" data-uml-type="class" data-uml-spec='@startuml
      class Song {
        + title: str
        + artist: str
        + duration_sec: int
        + __init__(title: str, artist: str, duration_sec: int): None
      }
      class Playlist {
        + name: str
        + songs: list[Song]
        + __init__(name: str): None
        + add_song(song: Song): None
        + get_total_duration(): int
        + get_song_count(): int
      }
      Playlist  o--> "*" Song
      @enduml'></div>

      ### Your Task

      The starter code has a `Playlist` that holds a single `Song`. Refactor it to hold **many** songs:

      1. Change `self.song` to `self.songs: list[Song] = []` (a list of songs)
      2. Add an `add_song(song: Song)` method that appends to the list
      3. Add `get_total_duration()` returning the sum of all song durations
      4. Add `get_song_count()` returning the number of songs

      The `*` multiplicity means the playlist can have zero or more songs.

    uml_files:
      - playlist.py

    files:
      - path: playlist.py
        content: |
          class Song:
              def __init__(self, title: str, artist: str, duration_sec: int) -> None:
                  self.title: str = title
                  self.artist: str = artist
                  self.duration_sec: int = duration_sec


          class Playlist:
              """Currently holds a single song. Refactor to hold many songs!"""

              def __init__(self, name: str, song: Song) -> None:
                  self.name: str = name
                  self.song: Song = song  # Only ONE song — change to a list!


          if __name__ == "__main__":
              s1 = Song("Bohemian Rhapsody", "Queen", 354)
              p = Playlist("Road Trip", s1)
              print(f"Playlist: {p.name}")
        language: python

    open_file: playlist.py

    solution:
      files:
        - path: playlist.py
          content: |
            class Song:
                def __init__(self, title: str, artist: str, duration_sec: int) -> None:
                    self.title: str = title
                    self.artist: str = artist
                    self.duration_sec: int = duration_sec


            class Playlist:
                def __init__(self, name: str) -> None:
                    self.name: str = name
                    self.songs: list[Song] = []

                def add_song(self, song: Song) -> None:
                    self.songs.append(song)

                def get_total_duration(self) -> int:
                    return sum(s.duration_sec for s in self.songs)

                def get_song_count(self) -> int:
                    return len(self.songs)


            if __name__ == "__main__":
                p = Playlist("Road Trip")
                p.add_song(Song("Bohemian Rhapsody", "Queen", 354))
                p.add_song(Song("Hotel California", "Eagles", 391))
                p.add_song(Song("Stairway to Heaven", "Led Zeppelin", 482))
                print(f"Playlist: {p.name}")
                print(f"Songs: {p.get_song_count()}")
                print(f"Total duration: {p.get_total_duration()}s")
          language: python
      explanation: |
        The multiplicity `*` maps directly to Python's `list`:
        - `add_song()` allows adding any number of songs (the `*`)
        - The `Song` objects exist independently — they are not created inside Playlist

        **Heuristic:** When you see a `list` attribute in Python code, that is a strong signal of a `*` multiplicity in the UML diagram. Conversely, when you see `*` in a UML diagram, implement it as a list in Python.

    tests:
      - description: "Playlist stores a list of songs (not a single song)"
        command: |
          source = open('/tutorial/playlist.py').read()
          ns = {}
          exec(source, ns)
          p = ns['Playlist']('Test')
          assert hasattr(p, 'songs'), \
              "Playlist needs a 'songs' attribute (a list) instead of 'song'"
          assert isinstance(p.songs, list), \
              "songs should be a list, not a single Song object"
        hints:
          - text: "Replace `self.song: Song = song` with `self.songs: list = []` and remove `song` from the constructor parameters."
            condition: "default"

      - description: "add_song() works and get_song_count() is correct"
        command: |
          source = open('/tutorial/playlist.py').read()
          ns = {}
          exec(source, ns)
          p = ns['Playlist']('Test')
          s1 = ns['Song']('A', 'B', 100)
          s2 = ns['Song']('C', 'D', 200)
          p.add_song(s1)
          p.add_song(s2)
          assert p.get_song_count() == 2, \
              f"After adding 2 songs, get_song_count() should return 2 but got {p.get_song_count()}"
        hints:
          - text: "Add `def add_song(self, song: Song) -> None:` that calls `self.songs.append(song)`, and `def get_song_count(self) -> int:` returning `len(self.songs)`."
            condition: "default"

      - description: "get_total_duration() sums all song durations"
        command: |
          source = open('/tutorial/playlist.py').read()
          ns = {}
          exec(source, ns)
          p = ns['Playlist']('Test')
          p.add_song(ns['Song']('A', 'B', 100))
          p.add_song(ns['Song']('C', 'D', 250))
          total = p.get_total_duration()
          assert total == 350, \
              f"Total duration of 100 + 250 should be 350, got {total}"
        hints:
          - text: "Use `sum(s.duration_sec for s in self.songs)` to compute the total duration."
            condition: "default"

    quiz:
      title: "Multiplicity"
      min_score: 0.6
      shuffle: true
      questions:

        - question: |
            In UML, `Department "1" --> "1..*" Employee` — where is the `*` placed and why?
          type: single
          options:
            - "Next to Department, because one department has many employees"
            - "Next to Employee, because there are many employees per department"
            - "In the middle of the line"
            - "Above the arrow"
          correct_index: 1
          explanation: |
            The multiplicity is placed **next to the class it quantifies**. There are many **employees** per department, so `1..*` goes next to `Employee`. There is one **department** per group, so `1` goes next to `Department`.

        - question: |
            What does the multiplicity `0..1` mean?
          type: single
          options:
            - "Exactly zero"
            - "Exactly one"
            - "Zero or one (optional)"
            - "Zero or more"
          correct_index: 2
          explanation: |
            `0..1` means the relationship is **optional** — there can be zero or one instance. For example, a `Person` might have `0..1` `Passport` — not everyone has a passport, but no one has two.


  # --------------------------------------------------------------------------
  # STEP 8 — "Abstract Classes: Designing for Extension"
  # Pedagogy:
  #   Constructivism — bridge Python abc to UML italic notation.
  #   Bloom's level — Understand (abstract meaning), Apply (use abc).
  # --------------------------------------------------------------------------
  - title: "Abstract Classes: Designing for Extension"
    instructions: |
      ## Abstract Classes in UML

      > **Learning objective:** After this step you will be able to **implement** abstract classes using Python's `abc` module and **recognize** italic notation in UML diagrams.

      ### What Is an Abstract Class?

      An abstract class is a class that **cannot be instantiated directly** — it serves as a blueprint that subclasses must complete. In UML, abstract classes and abstract methods are shown in *italics*.

      ### Python's `abc` Module

      Python does not have an `abstract` keyword like Java or C++. Instead, you use the `abc` (Abstract Base Classes) module:

      ```python
      from abc import ABC, abstractmethod

      class Shape(ABC):                    # Inherit from ABC
          @abstractmethod                  # Mark as abstract
          def area(self) -> float:
              pass                         # No implementation
      ```

      Trying to instantiate `Shape()` directly will raise a `TypeError`.

      ### Your Target Diagram

      <div class="uml-class-diagram-container" data-uml-type="class" data-uml-spec='@startuml
      abstract class PaymentMethod {
        + {abstract} process(amount: float): bool
        + {abstract} get_name(): str
      }
      class CreditCard {
        + card_number: str
        + __init__(card_number: str): None
        + process(amount: float): bool
        + get_name(): str
      }
      class BankTransfer {
        + account_number: str
        + __init__(account_number: str): None
        + process(amount: float): bool
        + get_name(): str
      }
      CreditCard --|> PaymentMethod
      BankTransfer --|> PaymentMethod
      @enduml'></div>

      Notice: `PaymentMethod` and its methods appear in *italics* — this signals they are abstract.

      ### Your Task

      The starter code has a concrete `PaymentMethod` base class. Make it abstract:

      1. Import `ABC` and `abstractmethod` from the `abc` module
      2. Make `PaymentMethod` inherit from `ABC`
      3. Mark `process()` and `get_name()` with `@abstractmethod`
      4. Complete the `CreditCard` and `BankTransfer` subclasses

    uml_files:
      - payments.py

    files:
      - path: payments.py
        content: |
          # TODO: Import ABC and abstractmethod from the abc module


          class PaymentMethod:
              """This should be abstract — you should NOT be able to create
              a plain PaymentMethod(). Make it inherit from ABC."""

              def process(self, amount: float) -> bool:
                  # This should be abstract — mark with @abstractmethod
                  return False

              def get_name(self) -> str:
                  # This should be abstract — mark with @abstractmethod
                  return "Unknown"


          class CreditCard(PaymentMethod):
              def __init__(self, card_number: str) -> None:
                  self.card_number: str = card_number

              # TODO: Implement process() — print and return True
              # TODO: Implement get_name() — return "Credit Card"


          class BankTransfer(PaymentMethod):
              def __init__(self, account_number: str) -> None:
                  self.account_number: str = account_number

              # TODO: Implement process() — print and return True
              # TODO: Implement get_name() — return "Bank Transfer"


          if __name__ == "__main__":
              cc = CreditCard("4111-1111-1111-1111")
              bt = BankTransfer("DE89370400440532013000")
              print(f"Paying with {cc.get_name()}: {cc.process(49.99)}")
              print(f"Paying with {bt.get_name()}: {bt.process(150.00)}")
        language: python

    open_file: payments.py

    solution:
      files:
        - path: payments.py
          content: |
            from abc import ABC, abstractmethod


            class PaymentMethod(ABC):
                @abstractmethod
                def process(self, amount: float) -> bool:
                    pass

                @abstractmethod
                def get_name(self) -> str:
                    pass


            class CreditCard(PaymentMethod):
                def __init__(self, card_number: str) -> None:
                    self.card_number: str = card_number

                def process(self, amount: float) -> bool:
                    print(f"Charging ${amount:.2f} to card {self.card_number[-4:]}")
                    return True

                def get_name(self) -> str:
                    return "Credit Card"


            class BankTransfer(PaymentMethod):
                def __init__(self, account_number: str) -> None:
                    self.account_number: str = account_number

                def process(self, amount: float) -> bool:
                    print(f"Transferring ${amount:.2f} from account {self.account_number[-4:]}")
                    return True

                def get_name(self) -> str:
                    return "Bank Transfer"


            if __name__ == "__main__":
                cc = CreditCard("4111-1111-1111-1111")
                bt = BankTransfer("DE89370400440532013000")
                print(f"Paying with {cc.get_name()}: {cc.process(49.99)}")
                print(f"Paying with {bt.get_name()}: {bt.process(150.00)}")
          language: python
      explanation: |
        By making `PaymentMethod` abstract:
        - It **cannot be instantiated** — `PaymentMethod()` raises `TypeError`
        - It **defines a contract** — any subclass MUST implement `process()` and `get_name()`
        - The UML shows this with **italics** on the class name and abstract methods

        This is a powerful design tool: you can write code that works with *any* `PaymentMethod` without knowing the specific type. You could add `PayPal`, `CryptoCurrency`, or `ApplePay` later without changing any code that uses the `PaymentMethod` interface.

    tests:
      - description: "PaymentMethod is abstract (cannot be instantiated)"
        command: |
          source = open('/tutorial/payments.py').read()
          ns = {}
          exec(source, ns)
          try:
              ns['PaymentMethod']()
              assert False, \
                  "PaymentMethod() should raise TypeError — make it inherit from ABC and mark methods with @abstractmethod"
          except TypeError:
              pass  # Good — abstract class cannot be instantiated
        hints:
          - text: "Add `from abc import ABC, abstractmethod` at the top, change `class PaymentMethod:` to `class PaymentMethod(ABC):`, and add `@abstractmethod` above both `process()` and `get_name()`."
            condition: "default"

      - description: "CreditCard implements all abstract methods"
        command: |
          source = open('/tutorial/payments.py').read()
          ns = {}
          exec(source, ns)
          cc = ns['CreditCard']('4111-1111-1111-1111')
          assert cc.get_name() == 'Credit Card', \
              f"CreditCard.get_name() should return 'Credit Card' but got '{cc.get_name()}'"
          result = cc.process(49.99)
          assert result == True, \
              "CreditCard.process() should return True"
        hints:
          - text: "Implement `def process(self, amount: float) -> bool:` in CreditCard that prints a message and returns `True`, and `def get_name(self) -> str:` returning `'Credit Card'`."
            condition: "default"

      - description: "BankTransfer implements all abstract methods"
        command: |
          source = open('/tutorial/payments.py').read()
          ns = {}
          exec(source, ns)
          bt = ns['BankTransfer']('DE89370400440532013000')
          assert bt.get_name() == 'Bank Transfer', \
              f"BankTransfer.get_name() should return 'Bank Transfer' but got '{bt.get_name()}'"
          result = bt.process(150.00)
          assert result == True, \
              "BankTransfer.process() should return True"
        hints:
          - text: "Implement `process()` and `get_name()` in BankTransfer, similar to CreditCard but returning `'Bank Transfer'`."
            condition: "default"

    quiz:
      title: "Abstract Classes"
      min_score: 0.6
      shuffle: true
      questions:

        - question: |
            What does italic text on a class name in UML indicate?
          type: single
          options:
            - "The class is deprecated"
            - "The class is abstract — it cannot be instantiated directly"
            - "The class is private"
            - "The class is a singleton"
          correct_index: 1
          explanation: |
            Italic text in UML indicates **abstract** — the class (or method) cannot be used directly and must be implemented by a subclass. In Python, this is achieved using `ABC` and `@abstractmethod`.

        - question: |
            What happens if a Python class inherits from an abstract class but does NOT implement all abstract methods?
          type: single
          options:
            - "The code runs normally with default behavior"
            - "Python prints a warning but allows instantiation"
            - "Python raises a TypeError when you try to instantiate the class"
            - "The methods are automatically implemented as empty"
          correct_index: 2
          explanation: |
            Python raises a `TypeError` at instantiation time if any `@abstractmethod` is not implemented. This enforces the contract defined by the abstract class — you cannot create an incomplete implementation.


  # --------------------------------------------------------------------------
  # STEP 9 — "The Fixer-Upper: Diagnose a Bad Design"
  # Pedagogy:
  #   Fixer Upper Pattern — find and fix flaws in existing architecture.
  #   ICAP Interactive — refactoring forces architectural analysis.
  #   Bloom's level — Analyze (identify anti-pattern), Create (refactor).
  # --------------------------------------------------------------------------
  - title: "The Fixer-Upper: Diagnose a Bad Design"
    instructions: |
      ## The God Class Anti-Pattern

      > **Learning objective:** After this step you will be able to **identify** the God Class anti-pattern in a UML diagram and **refactor** a monolithic class into cohesive, collaborating classes.

      ### Spotting the Problem

      Look at the UML diagram for the starter code. You will see ONE massive class with dozens of attributes and methods, and no other classes at all. This is called a **God Class** (also known as "The Blot") — a single class that tries to do everything.

      In a UML diagram, the God Class is easy to spot: one huge box surrounded by nothing. No relationships, no collaboration, no distribution of responsibility.

      ### Why It Matters

      A God Class is invisible in 500 lines of Python — you might not realize how bloated it is until you try to modify it. But in a UML diagram, the problem **screams at you**. This is one of the most valuable uses of UML: making bad architecture visible before it becomes a maintenance nightmare.

      ### Your Target Diagram

      Refactor the monolithic `OnlineStore` into this well-structured system:

      <div class="uml-class-diagram-container" data-uml-type="class" data-uml-spec='@startuml
        class Product {
          +name: str
          +price: float
          +stock: int
          +__init__(name: str, price: float, stock: int): None
          +is_available(): bool
          +reduce_stock(): None
        }
        class Customer {
          +name: str
          +email: str
          +__init__(name: str, email: str): None
        }
        class Order {
          +items: list[Product]
          +total: float
          +__init__(customer: Customer): None
          +add_item(product: Product): None
        }
        class OnlineStore {
          +products: list[Product]
          +orders: list[Order]
          +__init__(): None
          +add_product(product: Product): None
          +place_order(customer: Customer, product_names: list): Order
        }
        Order o--> "*" Product
        Order --> "1" Customer
        OnlineStore *--> "*" Order
        OnlineStore o--> "*" Product
        OnlineStore ..> Customer
        @enduml
      '></div>

      ### Your Task

      The starter code is a single `OnlineStore` class that manages products, customers, orders, and notifications all by itself. Refactor it:

      1. **Extract `Product`** — name, price, stock, `is_available()`, `reduce_stock()`
      2. **Extract `Customer`** — name, email
      3. **Extract `Order`** — stores customer and items, calculates total
      4. **Slim down `OnlineStore`** — coordinates the other classes

      Watch the UML diagram transform from a single blob into an interconnected network.

    uml_files:
      - store.py

    files:
      - path: store.py
        content: |
          class OnlineStore:
              """THE GOD CLASS — does everything, knows everything, fears nothing.
              Look at the UML diagram: one giant box, no collaborators.

              Your mission: extract Product, Customer, and Order classes."""

              def __init__(self) -> None:
                  # Product data (should be its own class)
                  self._product_names: list[str] = []
                  self._product_prices: list[float] = []
                  self._product_stocks: list[int] = []

                  # Order data (should be its own class)
                  self._order_customer_names: list[str] = []
                  self._order_customer_emails: list[str] = []
                  self._order_items: list[Product] = []
                  self._order_totals: list[float] = []

              # ── Product management ──────────────────────────────────
              def add_product(self, name: str, price: float, stock: int) -> None:
                  self._product_names.append(name)
                  self._product_prices.append(price)
                  self._product_stocks.append(stock)

              def is_product_available(self, name: str) -> bool:
                  idx = self._product_names.index(name)
                  return self._product_stocks[idx] > 0

              def get_product_price(self, name: str) -> float:
                  idx = self._product_names.index(name)
                  return self._product_prices[idx]

              def reduce_product_stock(self, name: str) -> None:
                  idx = self._product_names.index(name)
                  self._product_stocks[idx] -= 1

              # ── Order management ────────────────────────────────────
              def place_order(self, customer_name: str, customer_email: str,
                              product_names: list) -> int:
                  total = 0.0
                  for pname in product_names:
                      total += self.get_product_price(pname)
                      self.reduce_product_stock(pname)

                  self._order_customer_names.append(customer_name)
                  self._order_customer_emails.append(customer_email)
                  self._order_items.append(product_names)
                  self._order_totals.append(total)

                  order_id = len(self._order_totals) - 1
                  print(f"[EMAIL] To: {customer_email} | Order #{order_id} confirmed: ${total:.2f}")
                  return order_id

              def get_order_total(self, order_id: int) -> float:
                  return self._order_totals[order_id]


          if __name__ == "__main__":
              store = OnlineStore()
              store.add_product("Laptop", 999.99, 5)
              store.add_product("Mouse", 29.99, 50)
              store.add_product("Keyboard", 79.99, 30)

              order_id = store.place_order("Alice", "alice@example.com",
                                           ["Laptop", "Mouse"])
              print(f"Order total: ${store.get_order_total(order_id):.2f}")
        language: python

    open_file: store.py

    solution:
      files:
        - path: store.py
          content: |
            class Product:
                def __init__(self, name: str, price: float, stock: int) -> None:
                    self.name: str = name
                    self.price: float = price
                    self.stock: int = stock

                def is_available(self) -> bool:
                    return self.stock > 0

                def reduce_stock(self) -> None:
                    self.stock -= 1


            class Customer:
                def __init__(self, name: str, email: str) -> None:
                    self.name: str = name
                    self.email: str = email


            class Order:
                def __init__(self, customer: Customer) -> None:
                    self.customer: Customer = customer
                    self.items: list[Product] = []
                    self.total: float = 0.0

                def add_item(self, product: Product) -> None:
                    self.items.append(product)
                    self.total += product.price
                    product.reduce_stock()


            class OnlineStore:
                def __init__(self) -> None:
                    self.products: list[Product] = []
                    self.orders: list[Order] = []

                def add_product(self, product: Product) -> None:
                    self.products.append(product)

                def place_order(self, customer: Customer, product_names: list) -> Order:
                    order = Order(customer)
                    for name in product_names:
                        for p in self.products:
                            if p.name == name and p.is_available():
                                order.add_item(p)
                                break
                    self.orders.append(order)
                    print(f"[EMAIL] To: {customer.email} | Order confirmed: ${order.total:.2f}")
                    return order


            if __name__ == "__main__":
                store = OnlineStore()
                store.add_product(Product("Laptop", 999.99, 5))
                store.add_product(Product("Mouse", 29.99, 50))
                store.add_product(Product("Keyboard", 79.99, 30))

                customer = Customer("Alice", "alice@example.com")
                order = store.place_order(customer, ["Laptop", "Mouse"])
                print(f"Order total: ${order.total:.2f}")
          language: python
      explanation: |
        **Before:** One God Class with 10+ attributes stored as parallel lists — the UML showed a single massive box with no structure.

        **After:** Four cohesive classes with clear responsibilities:
        - `Product` knows about itself (name, price, stock)
        - `Customer` holds identity data
        - `Order` manages a collection of products for a customer
        - `OnlineStore` coordinates the system

        The UML diagram now shows a network of relationships — composition (`*--`), associations (`-->`), and clear data flow. This is the power of UML: it makes the difference between good and bad architecture **immediately visible**.

    tests:
