        content: |
          const { useState } = React;

          // Each Counter instance has its own isolated state.
          // React only updates the DOM node for the counter you click.
          function Counter({ label, initialCount }) {
            const [count, setCount] = useState(initialCount);
            return (
              <div className="border rounded p-3 mb-3" style={{ maxWidth: '260px' }}>
                <p className="mb-1"><strong>{label}</strong></p>
                <p className="h4 mb-2">{count}</p>
                <button
                  className="btn btn-outline-primary btn-sm"
                  onClick={() => setCount(count + 1)}
                >
                  Increment
                </button>
              </div>
            );
          }

          function App() {
            return (
              <div className="p-4">
                <h2>Virtual DOM Demo</h2>
                <p className="text-muted mb-3">
                  Each counter has its own state. React only re-renders the counter you click.
                </p>
                <Counter label="Page Views" initialCount={42} />
                <Counter label="Likes" initialCount={7} />
                {/* Task: Add a third Counter here */}
              </div>
            );
          }

          const root = ReactDOM.createRoot(document.getElementById('root'));
          root.render(<App />);
