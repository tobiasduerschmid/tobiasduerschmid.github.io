        content: |
          const { useState } = React;

          const MAX_HOUSES = 4;

          // Converts house count to visual building icons
          function renderBuildings(houses) {
            if (houses === 0) return "No buildings";
            if (houses > MAX_HOUSES) return HOTEL_EMOJI;
            return HOUSE_EMOJI.repeat(houses);
          }

          const INITIAL_PROPERTIES = [
            { name: "Royce Hall",       price: 400, colorGroup: "ucla-blue",  rent: 50 },
            { name: "Powell Library",   price: 350, colorGroup: "ucla-blue",  rent: 35 },
            { name: "Kerckhoff Hall",   price: 200, colorGroup: "ucla-gold",  rent: 25 },
            { name: "Janss Steps",      price: 150, colorGroup: "ucla-gold",  rent: 20 },
            { name: "Bruin Bear",       price: 100, colorGroup: "ucla-blue",  rent: 10 },
            { name: "Sculpture Garden", price: 60,  colorGroup: "ucla-gold",  rent: 6 },
          ];

          function PropertyCard({ property, wallet, onBuy, onBuildHouse }) {
            const { name, price, colorGroup, rent, owned, houses } = property;
            const isMaxed = houses > MAX_HOUSES;
            const rentNow = rent + houses * 10;

            return (
              <div style={cardStyle}>
                <div style={getHeaderStyle(colorGroup)}></div>
                <div style={bodyStyle}>
                  <h4 style={{ margin: "4px 0" }}>{name}</h4>
                  <p style={{ margin: "2px 0" }}><strong>${price}</strong></p>
                  {owned ? (
                    <>
                      <p style={{ margin: "2px 0", fontSize: "11px", color: "#666" }}>
                        Rent: ${rentNow}
                      </p>
                      <div style={{ fontSize: "20px", minHeight: "28px" }}>
                        {renderBuildings(houses)}
                      </div>
                      <button
                        onClick={onBuildHouse}
                        disabled={isMaxed || wallet < HOUSE_COST}
                        style={{
                          ...buttonStyle,
                          ...((isMaxed || wallet < HOUSE_COST)
                            ? { background: "#999", cursor: "default" } : {}),
                        }}
                      >
                        {isMaxed ? "Fully Upgraded!" : "Build House ($" + HOUSE_COST + ")"}
                      </button>
                    </>
                  ) : (
                    <button
                      onClick={onBuy}
                      disabled={wallet < price}
                      style={{
                        ...buttonStyle,
                        background: wallet >= price ? "#2774AE" : "#999",
                      }}
                    >
                      Buy (${price})
                    </button>
                  )}
                </div>
              </div>
            );
          }

          function App() {
            const [wallet, setWallet] = useState(1500);
            const [properties, setProperties] = useState(
              INITIAL_PROPERTIES.map(p => ({ ...p, owned: false, houses: 0 }))
            );

            const buyProperty = (index) => {
              const prop = properties[index];
              if (!prop.owned && wallet >= prop.price) {
                setWallet(wallet - prop.price);
                const updated = [...properties];
                updated[index] = { ...prop, owned: true };
                setProperties(updated);
              }
            };

            const buildHouse = (index) => {
              const prop = properties[index];
              if (prop.owned && prop.houses <= MAX_HOUSES && wallet >= HOUSE_COST) {
                setWallet(wallet - HOUSE_COST);
                const updated = [...properties];
                updated[index] = { ...prop, houses: prop.houses + 1 };
                setProperties(updated);
              }
            };

            const totalRent = properties
              .filter(p => p.owned)
              .reduce((sum, p) => sum + p.rent + p.houses * 10, 0);

            const collectRent = () => {
              // TODO: Add totalRent to the wallet using setWallet
            };

            const ownedCount = properties.filter(p => p.owned).length;

            return (
              <div style={{ padding: "16px", fontFamily: "'Georgia', serif" }}>
                <h2 style={{ marginBottom: "4px" }}>UCLA Monopoly</h2>
                <div style={walletBarStyle}>
                  <span><strong>Wallet:</strong> ${wallet}</span>
                  <span><strong>Properties:</strong> {ownedCount}/{properties.length}</span>
                  <span><strong>Rent/turn:</strong> ${totalRent}</span>
                  <button
                    onClick={collectRent}
                    disabled={totalRent === 0}
                    style={{
                      ...buttonStyle,
                      background: totalRent > 0 ? "#2774AE" : "#999",
                      marginTop: 0,
                    }}
                  >
                    Collect Rent
                  </button>
                </div>
                <div style={{ display: "flex", flexWrap: "wrap" }}>
                  {properties.map((prop, index) => (
                    <PropertyCard
                      key={index}
                      property={prop}
                      wallet={wallet}
                      onBuy={() => buyProperty(index)}
                      onBuildHouse={() => buildHouse(index)}
                    />
                  ))}
                </div>
              </div>
            );
          }

          const root = ReactDOM.createRoot(document.getElementById('root'));
          root.render(<App />);
