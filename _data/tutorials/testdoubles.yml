                  self.temperature = temperature

              def get_temperature(self, city):
                  # TODO: Return the pre-configured temperature
                  pass


          # SUB-GOAL: Write tests using the stub

          def test_hot_day():
              """Temperature > 30 should produce 'Hot day ahead!'"""
              # TODO: Create a stub with temperature=35
              # TODO: Create a WeatherReporter with the stub
              # TODO: Call daily_summary and assert the result
              pytest.fail("TODO: implement this test")

          def test_pleasant_day():
              """Temperature 16-30 should produce 'Pleasant weather.'"""
              # TODO: stub with temperature=22, assert result
              pytest.fail("TODO: implement this test")

          def test_cold_day():
              """Temperature <= 15 should produce 'Bundle up, it's cold!'"""
              # TODO: stub with temperature=5, assert result
              pytest.fail("TODO: implement this test")


          if __name__ == "__main__":
              pytest.main(["-v"])
        language: "python"

    open_file: "test_weather_stub.py"

    tests:
      - description: "StubWeatherService returns the configured temperature"
        command: |
          g = {}
          exec(open('/tutorial/test_weather_stub.py').read(), g)
          stub = g['StubWeatherService'](temperature=42)
          assert stub.get_temperature("any") == 42, \
              "StubWeatherService.get_temperature() should return self.temperature"
      - description: "test_hot_day passes"
        command: |
          import pytest, io, sys
          old = sys.stdout; sys.stdout = buf = io.StringIO()
          code = pytest.main(['/tutorial/test_weather_stub.py::test_hot_day', '-v', '--tb=short', '--no-header'])
          sys.stdout = old; output = buf.getvalue()
          assert code == 0, f"test_hot_day failed:\n{output}"
      - description: "test_pleasant_day passes"
        command: |
          import pytest, io, sys
          old = sys.stdout; sys.stdout = buf = io.StringIO()
          code = pytest.main(['/tutorial/test_weather_stub.py::test_pleasant_day', '-v', '--tb=short', '--no-header'])
          sys.stdout = old; output = buf.getvalue()
          assert code == 0, f"test_pleasant_day failed:\n{output}"
      - description: "test_cold_day passes"
        command: |
          import pytest, io, sys
          old = sys.stdout; sys.stdout = buf = io.StringIO()
          code = pytest.main(['/tutorial/test_weather_stub.py::test_cold_day', '-v', '--tb=short', '--no-header'])
          sys.stdout = old; output = buf.getvalue()
          assert code == 0, f"test_cold_day failed:\n{output}"

    quiz:
      title: "Test Stubs — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            A test creates a `StubDatabase` that always returns `[{"amount": 100}]` when `get_sales()` is called. The test then asserts that `ReportGenerator.generate_daily_report()` returns `{"total": 100}`. What type of verification is this?
          type: single
          options:
            - "Behavior verification — the test checks how the SUT called the database"
            - "State verification — the test checks the SUT's return value, not how it interacted with the stub"
            - "Mock verification — the stub automatically verified the correct calls"
            - "Integration verification — the test checks the real database connection"
          correct_index: 1
          explanation: |
            The test checks the SUT's **output** (the return value), not the interaction with the stub.
            This is **state verification** — the hallmark of stub-based testing.
            The stub only provides data; the `assert` does all the checking.

        - question: |
            **Analyze** this test. Is the stub being used correctly?
            ```python
            def test_report():
                stub_db = StubDatabase(sales=[{"amount": 50}])
                generator = ReportGenerator(stub_db)
                result = generator.generate_report("2024-01-15")
                assert stub_db.get_sales_called_with == "2024-01-15"  # ← checks the stub
            ```
          type: single
          options:
            - "Yes — the test correctly verifies the SUT passes the right date to the database"
            - "No — a stub should NOT be used for verification. This test is checking how the SUT called the stub (implementation) rather than what the SUT returned (behavior). Use a spy or mock for call verification"
            - "No — the stub should return more realistic data"
            - "Yes — stubs always track their arguments for assertion"
          correct_index: 1
          explanation: |
            This is a subtle but important distinction: a **stub** only provides data.
            If you start asserting on *how* the stub was called, you've turned it into a spy.
            The test should assert on `result` (the SUT's output), not on the stub's internals.
            This reinforces the "test behavior, not implementation" principle from TDD.

        - question: |
            **Arrange** the lines to write a test using a stub. The test should create a stub, inject it, exercise the SUT, and assert on the return value.
          type: parsons
          lines:
            - "stub = StubWeatherService(temperature=35)"
            - "reporter = WeatherReporter(stub)"
            - "result = reporter.daily_summary('LA')"
            - "assert result == 'Hot day ahead!'"
          distractors:
            - "stub.get_temperature.assert_called_once()"
          explanation: |
            The test follows the **Arrange-Act-Assert** pattern: create the stub (Arrange),
            inject it and call the SUT (Act), then assert on the return value (Assert).
            The distractor `assert_called_once()` is spy/mock behavior — stubs do NOT verify calls.

        - question: |
            **(Spaced review — TDD)** A developer writes a test, runs it, sees it fail (RED), then writes code to make it pass (GREEN). Now she notices duplicated logic and cleans it up. Which TDD phase is she in?
          type: single
          options:
            - "RED — she is writing a new failing test"
            - "GREEN — she is making the test pass"
            - "REFACTOR — she is improving code structure while keeping tests green"
            - "She broke TDD discipline by changing code after GREEN"
          correct_index: 2
          explanation: |
            Cleaning up duplicated logic without changing behavior is a textbook REFACTOR.
            The key: all tests still pass. RED → GREEN → REFACTOR is the TDD heartbeat.


