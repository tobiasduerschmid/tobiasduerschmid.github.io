        content: |
          """InvoiceProcessor with a mix of internal helpers and external deps."""

          class InvoiceProcessor:
              def __init__(self, payment_gateway, email_sender):
                  self.gateway = payment_gateway
                  self.email = email_sender

              def _calculate_tax(self, amount, rate=0.08):
                  """Internal pure function — no side effects."""
                  return round(amount * rate, 2)

              def _format_currency(self, amount):
                  """Internal pure function — no side effects."""
                  return f"${amount:.2f}"

              def process_invoice(self, customer_email, amount):
                  """Process an invoice: calculate tax, charge, and email receipt."""
                  tax = self._calculate_tax(amount)
                  total = amount + tax

                  # External boundary: charge the payment
                  charge_result = self.gateway.charge(customer_email, total)
                  if not charge_result["success"]:
                      return {"status": "failed", "reason": charge_result["error"]}

                  # External boundary: send receipt email
                  self.email.send(
                      to=customer_email,
                      subject="Invoice Receipt",
                      body=f"Charged: {self._format_currency(total)}"
                  )

                  return {"status": "paid", "total": total}
