            - "service = UserService(email_sender=mock)"
            - "service.register('alice@example.com')"
            - "mock.verify()"
          distractors:
            - "assert mock.sent_emails[0]['to'] == 'alice@example.com'"
          explanation: |
            Mock-based tests set expectations BEFORE execution (`MockEmailSender(expected_to=...)`),
            exercise the SUT, then call `mock.verify()` to confirm all expectations were met.
            The distractor assertion is the SPY pattern (assert on recorded data after execution) —
            that belongs in a procedural verification test, not an expected behavior specification test.

        - question: |
            **(Spaced review — Step 3)** A test needs to verify that `send_notification()` was called during execution. The developer uses a spy. Where do the assertions appear?
          type: single
          options:
            - "Before the SUT executes — assertions are pre-programmed into the spy"
            - "After the SUT executes — the test retrieves recorded calls from the spy and asserts on them"
            - "During execution — the spy checks automatically as each call is made"
            - "In a separate verification file that runs after the test suite"
          correct_index: 1
          explanation: |
            Spies use **Procedural Behavior Verification** — they record calls silently,
            and the test asserts on the recorded data AFTER execution. This keeps assertions
            visible in the test method. Contrast with mocks, which verify DURING execution.


