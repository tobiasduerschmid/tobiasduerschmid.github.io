  - title: "Mock Objects — Expected Behavior Specification"
    instructions: |
      > **Learning objective:** After this step you will be able to **contrast** procedural verification (spy) with expected behavior specification (mock) and **evaluate** the trade-offs.

      ## Spy vs Mock: Two Approaches to the Same Problem

      Both spies and mocks verify the SUT's indirect outputs. The difference is *when* and *how* they verify:

      | | **Spy** (Procedural Verification) | **Mock** (Expected Behavior Specification) |
      |---|---|---|
      | When are expectations set? | After execution (in assertions) | Before execution (pre-programmed) |
      | When does verification happen? | After execution (your `assert`) | During execution (mock checks itself) |
      | What fails the test? | Your `assert` statement | The mock object itself |
      | Flexibility | High — assert only what matters | Lower — must specify all expected calls upfront |

      ## The Same Test, Two Ways

      Here is the **spy version** (from Step 3):
      ```python
      def test_welcome_email_spy():
          spy = SpyEmailSender()
          service = UserService(email_sender=spy)

          service.register("alice@example.com")          # Exercise

          # Verify AFTER — the test controls what to check
          assert len(spy.sent_emails) == 1
          assert spy.sent_emails[0]["to"] == "alice@example.com"
      ```

      And the **mock version**:
      ```python
      def test_welcome_email_mock():
          mock = MockEmailSender(
              expected_calls=[
                  ("send", {"to": "alice@example.com"})  # Expectation set BEFORE
              ]
          )
          service = UserService(email_sender=mock)

          service.register("alice@example.com")          # Exercise

          mock.verify()  # ← Mock checks itself: were all expectations met?
      ```

      ### Which Should You Prefer?

      Martin Fowler, Kent Beck, and DHH — three of the most influential voices in software testing — all "claimed to almost never use mocks." Why?

      - **Spies are more flexible:** You assert only on what matters for THIS test
      - **Spies give better error messages:** When an assertion fails, you see the actual vs expected values
      - **Mocks are more brittle:** If the SUT makes an unexpected call (even a harmless one), the mock fails

      The general recommendation: **prefer spies (and stubs) over mocks** unless you specifically need to verify that something was NOT called.

      ### Predict Before You Code

      If the SUT calls `mock.send()` with `to="bob@example.com"` instead of `"alice@example.com"`, what happens with the spy approach? What happens with the mock approach?

      ### Task

      Open `test_mock_vs_spy.py`. It contains a `UserService` that sends a welcome email when a user registers.

