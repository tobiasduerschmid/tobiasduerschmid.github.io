    quiz:
      title: "@patch — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            A module `report.py` contains `from datetime import datetime`. To patch `datetime.now()` in a test, which `@patch` target is correct?
          type: single
          options:
            - "`@patch('datetime.datetime.now')`"
            - "`@patch('report.datetime')`"
            - "`@patch('datetime.now')`"
            - "`@patch('report.now')`"
          correct_index: 1
          explanation: |
            **Patch where it's looked up, not where it's defined.**
            `from datetime import datetime` copies the name `datetime` into `report`'s namespace.
            You must patch `report.datetime`, not `datetime.datetime`.

        - question: |
            What does `mock.get_price.side_effect = [100, 200, 300]` do?
          type: single
          options:
            - "It calls `get_price()` three times with values 100, 200, 300"
            - "Each successive call to `get_price()` returns the next value in the list: first call → 100, second → 200, third → 300"
            - "It sets the return value to the list `[100, 200, 300]`"
            - "It raises an exception containing the values 100, 200, 300"
          correct_index: 1
          explanation: |
            `side_effect` with a list makes the mock return a different value on each call.
            This is useful for testing functions that call a dependency multiple times
            (like fetching prices for multiple symbols). After the list is exhausted,
            further calls raise `StopIteration`.

        - question: |
            **Arrange** the lines to use `@patch` and `side_effect` to test error handling when an API call fails.
          type: parsons
          lines:
            - "@patch('my_module.requests.get')"
            - "def test_handles_api_error(mock_get):"
            - "    mock_get.side_effect = ConnectionError('timeout')"
            - "    result = fetch_data('http://api.example.com')"
            - "    assert result == 'fallback-value'"
          distractors:
            - "    mock_get.return_value = ConnectionError('timeout')"
          explanation: |
            `side_effect` RAISES the exception when the mock is called.
            The distractor uses `return_value`, which would RETURN the exception object
            as a value instead of raising it — a subtle but critical difference.
            `@patch` goes first (decorator), then the test function receives the mock as a parameter.

        - question: |
            **(Spaced review — Step 4)** A test uses a mock pre-programmed with expected calls. During execution, the SUT calls a method the mock didn't expect. What happens?
          type: single
          options:
            - "The mock silently records the unexpected call for later inspection"
            - "The mock raises an error immediately — this is Expected Behavior Specification"
            - "The mock ignores unexpected calls and only checks expected ones"
            - "The test passes because mocks only verify at the end"
          correct_index: 1
          explanation: |
            A true mock uses **Expected Behavior Specification** — it fails immediately
            on unexpected interactions. This is stricter than a spy, which records
            everything and lets the test decide what to assert on.


  # --------------------------------------------------------------------------
  # STEP 7 — When NOT to Mock: The Over-Mocking Trap
  # Pedagogy:
  #   Fixer Upper          — diagnose over-mocked tests.
  #   Anti-pattern Gallery  — examples of bad mocking.
  #   Bloom's level        — Evaluate / Analyze (quiz).
  # --------------------------------------------------------------------------
  - title: "When NOT to Mock — The Over-Mocking Trap"
    instructions: |
      > **Learning objective:** After this step you will be able to **evaluate** whether a test is over-mocked and **apply** the Mock Skeptic's Checklist.

      ## The #1 Test Doubles Mistake

      Spadini et al. (2017) studied mocking in real-world projects and found: *"The use of mocking introduces a strong coupling between test code and production code."*

      The mistake is not using mocks — it is **over-mocking**: replacing so many dependencies with mocks that your test verifies the mock configuration, not the actual code.

      ### The Mock Skeptic's Checklist

      Before creating a test double, ask yourself:

      | Question | If YES... |
      |----------|----------|
      | Can I test this WITHOUT a mock? | Use real objects — simpler and less brittle |
      | Am I verifying call order or specific argument formats? | You're testing implementation, not behavior |
      | Does my mock setup mirror my implementation? | You're duplicating code, not testing it |
      | Would a pure refactoring break this test? | The test is over-mocked |

      ### The Assumption Trap (Tiwari et al., 2024)

      Every test double encodes an **assumption** about how the real dependency behaves. If that assumption diverges from reality, your tests pass but your system is broken. For example:

      ```python
      # Your test assumes the API returns {"status": 200, "data": [...]}
      mock_api.get.return_value = {"status": 200, "data": [{"name": "repo-a"}]}
      # But the real API now returns {"code": 200, "results": [...]}
      # Your tests pass. Your production code crashes.
      ```

      This is why **`spec=True` matters** — it constrains the mock to the real interface. And it is why integration tests (which use real dependencies) remain important even when unit tests use doubles.

      ### Unnecessary Stubs (Fazzini et al., 2022)

      An empirical study of 2,365 test doubles found that **unnecessary stubs** — stubs whose return values are never used by the test — are a common problem. They indicate "superfluous, dead, or outdated code in the tests." If you create a stub and the test passes even without it, remove it.

      ### What TO Mock (Boundaries)

      Mock things that cross **system boundaries**:
      - HTTP APIs (slow, unreliable, costs money)
      - Databases (slow, requires setup, non-deterministic)
      - File system (side effects, permissions)
      - Time/randomness (non-deterministic)
      - Email/SMS services (side effects, costs money)

      ### What NOT to Mock (Internals)

      Do NOT mock your own code's internals:
      - Value objects and data classes
      - Pure functions and simple helpers
      - Internal methods of the class under test
      - Anything that is fast, deterministic, and has no side effects

      ### Example: Over-Mocked vs. Appropriate

      ```python
      # ✗ OVER-MOCKED — tests mock configuration, not behavior
      def test_calculate_total_overmocked():
          mock_tax = MagicMock()
          mock_tax.return_value = 8.0       # Duplicates the tax logic!
          mock_discount = MagicMock()
          mock_discount.return_value = 10.0  # Duplicates the discount logic!
          result = calculate_total(100, tax_fn=mock_tax, discount_fn=mock_discount)
          assert result == 98.0
          mock_tax.assert_called_once_with(100)
          mock_discount.assert_called_once_with(100)
          # This test passes even if calculate_total() is completely wrong!
          # The mocks pre-determined all the intermediate values.

      # ✓ APPROPRIATE — tests with real objects, mocks only at boundary
      def test_calculate_total_real():
          result = calculate_total(100, tax_rate=0.08, discount=10)
          assert result == 98.0
          # No mocks needed! tax_rate and discount are simple values.
      ```

      ### Task: Fixer Upper

      Open `test_invoice_audit.py`. It contains 6 tests for an `InvoiceProcessor`:
      - 3 tests are **appropriately mocked** (they mock real external boundaries)
      - 3 tests are **over-mocked** (they mock internals unnecessarily)

      Your job:
      1. Add a `# VERDICT:` comment to each test: "appropriate" or "over-mocked"
      2. For over-mocked tests, explain WHY in the comment
      3. Rewrite the 3 over-mocked tests to use real objects instead

