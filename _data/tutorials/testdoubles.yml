  - title: "unittest.mock — The Framework"
    instructions: |
      > **Learning objective:** After this step you will be able to **use** `MagicMock`, `return_value`, and `assert_called` to replace manual test doubles with `unittest.mock`.

      ## From Manual to Framework

      You have built stubs, spies, and mocks by hand. Now meet `unittest.mock` — Python's standard library that generates them automatically.

      The key insight: **`unittest.mock` doesn't do anything you couldn't do manually**. It just writes the boilerplate for you. Every `MagicMock` is a stub + spy + mock in one object.

      ### The Mapping

      | Manual Concept | `unittest.mock` Equivalent |
      |---|---|
      | Stub with canned return | `mock.method.return_value = value` |
      | Stub that raises exception | `mock.method.side_effect = Exception(...)` |
      | Spy recording calls | `mock.method.call_args_list` |
      | Mock verifying calls | `mock.method.assert_called_once_with(...)` |
      | Typed double (respects interface) | `MagicMock(spec=RealClass)` |

      ### Example: Manual Stub → MagicMock

      **Manual (from Step 2):**
      ```python
      class StubWeatherService:
          def __init__(self, temperature):
              self.temperature = temperature
          def get_temperature(self, city):
              return self.temperature

      def test_hot_day():
          stub = StubWeatherService(temperature=35)
          reporter = WeatherReporter(stub)
          assert reporter.daily_summary("LA") == "Hot day ahead!"
      ```

      **With `unittest.mock`:**
      ```python
      from unittest.mock import MagicMock

      def test_hot_day():
          mock_service = MagicMock()
          mock_service.get_temperature.return_value = 35      # ← stub behavior
          reporter = WeatherReporter(mock_service)
          assert reporter.daily_summary("LA") == "Hot day ahead!"
          # Optionally verify the call (spy/mock behavior):
          mock_service.get_temperature.assert_called_once_with("LA")
      ```

      ### ⚠️ Always Use `spec=True`

      Without `spec`, a `MagicMock` accepts ANY attribute — even typos:
      ```python
      mock = MagicMock()
      mock.get_temperture.return_value = 35  # ← Typo! No error raised!
      ```

      With `spec`, the mock mirrors the real class's interface:
      ```python
      mock = MagicMock(spec=WeatherService)
      mock.get_temperture.return_value = 35  # ← AttributeError! Typo caught!
      ```

      **Rule: Always pass `spec=RealClass`** when creating mocks. This catches bugs that silent mocks would hide.

      ### If the API Feels Overwhelming

      `unittest.mock` has a large API with many methods. That is completely normal to find intimidating. You don't need to memorize everything — just three things: `return_value` (stub), `assert_called_once_with` (spy/mock), and `spec=` (safety). Everything else is a convenience on top of these three.

      ### Predict Before You Code

      Before writing any code, predict: if you write `mock = MagicMock()` and then call `mock.any_method_name()`, what happens? Does it raise an error? What if you use `MagicMock(spec=WeatherService)` instead?

      ### Task

      Open `test_framework.py`. Rewrite two of your earlier manual tests using `unittest.mock.MagicMock`:

      1. `test_hot_day_with_mock` — use `MagicMock(spec=...)` to replace `StubWeatherService`
      2. `test_order_logged_with_mock` — use `MagicMock` to replace `SpyLogger`

      For each test, add a `assert_called` verification to practice the spy/mock behavior.

