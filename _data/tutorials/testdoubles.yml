        - question: |
            A mock is pre-programmed with: "expect `send()` to be called with `to='alice@example.com'`". During execution, the SUT calls `send(to='bob@example.com')`. What happens?
          type: single
          options:
            - "Nothing — the mock silently records the mismatch for later inspection"
            - "The mock raises an error IMMEDIATELY during execution, failing the test at the point of the wrong call"
            - "The mock converts the argument to match the expectation automatically"
