  # STEP 3 — Test Spies: Observing Indirect Outputs
  # Pedagogy:
  #   Transfer Tutor      — builds on stub, adds recording.
  #   Compare-and-Contrast — stub vs spy side-by-side.
  #   Bloom's level        — Apply / Analyze (quiz).
  # --------------------------------------------------------------------------
  - title: "Test Spies — Observing Indirect Outputs"
    instructions: |
      > **Learning objective:** After this step you will be able to **implement** a manual test spy and **explain** the difference between controlling inputs (stub) and observing outputs (spy).

      ## The Limitation of Stubs

      In Step 2, you tested what `WeatherReporter` *returns* — that is an indirect **input** flowing through the stub into the SUT, producing an observable return value.

      But what if the SUT performs an **action** that has no return value? For example:
      - Sending an email
      - Writing to a log
      - Posting to an API

      A stub cannot tell us whether `send()` was actually called, or what arguments it received. We need an **observation point** — a Test Spy.

      ## What Is a Test Spy?

      A Test Spy extends a Test Stub:
      - It **provides values** back to the SUT (like a stub)
      - It also **records all method calls** made by the SUT

      After the SUT executes, the test retrieves the recorded calls and asserts on them. This is called **Procedural Behavior Verification** — assertions come AFTER execution, in the test method itself.

      ## Worked Example: Spying on Email

      The spy lifecycle has four phases (from Meszaros):

      ```python
      # SUB-GOAL: Build a manual spy that records calls
      class SpyEmailSender:
          def __init__(self):
              self.sent_emails = []    # ← records every call

          def send(self, to, subject, body):
              self.sent_emails.append({
                  "to": to,
                  "subject": subject,
                  "body": body
              })

      def test_sends_welcome_email():
          # PHASE 1: Install the spy in place of the DOC
          spy = SpyEmailSender()
          service = UserService(email_sender=spy)

          # PHASE 2: Exercise the SUT
          service.register("alice@example.com")

          # PHASE 3: Retrieve recorded information from the spy
          recorded = spy.sent_emails

          # PHASE 4: Use standard assertions to verify
          assert len(recorded) == 1
          assert recorded[0]["to"] == "alice@example.com"
          assert "Welcome" in recorded[0]["subject"]
      ```

      > **Note:** Not every spy needs to return data. In this example, `send()` has no return value — the spy only records. When the SUT *does* need a return value from the DOC (like a database query), the spy acts as both stub (provides data) and spy (records calls).

      Notice the key difference from stubs:

      | | **Stub** | **Spy** |
      |---|---------|---------|
      | Controls indirect inputs? | ✓ | ✓ |
      | Records calls for verification? | ✗ | ✓ |
      | Where is verification done? | `assert` on SUT's return value | `assert` on spy's recorded calls |
      | What is verified? | SUT's output (state) | SUT's actions (behavior, procedurally) |

      ### Predict Before You Code

      If `UserService.register()` sends TWO emails (a welcome email and a verification email), what would `len(spy.sent_emails)` be after calling `register()`?

      ### Task

      Complete `test_order_spy.py`:

