    quiz:
      title: "Test Spies — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            A test uses a spy to verify that `send_email()` was called with `to="boss@company.com"`. The assertion is written AFTER the SUT executes:
            ```python
            assert spy.sent_emails[0]["to"] == "boss@company.com"
            ```
            What verification technique is this?
          type: single
          options:
            - "State verification — it checks the SUT's return value"
            - "Procedural behavior verification — the spy records calls and the test asserts on them after execution"
            - "Expected behavior specification — the spy was pre-programmed with expectations"
            - "Mock verification — the spy fails the test automatically on wrong arguments"
          correct_index: 1
          explanation: |
            The spy **records** calls and the test **asserts** on them after execution.
            This is **procedural behavior verification** — the test procedure includes
            explicit assertions on the recorded data. Contrast with mocks (Step 4),
            which use **expected behavior specification** (pre-programmed expectations).

        - question: |
            What is the key difference between a Test Stub and a Test Spy?
          type: single
          options:
            - "A stub is faster to execute than a spy"
            - "A stub only controls indirect inputs; a spy also records the SUT's calls for later assertion"
            - "A spy requires `unittest.mock` while a stub can be written manually"
            - "A stub is used for unit tests; a spy is used for integration tests"
          correct_index: 1
          explanation: |
            Both can be written manually (as you've done). The distinction is what they do:
            **Stub** = provides data (controls inputs). **Spy** = provides data AND records
            calls (observes outputs). A spy is a "stub with a recording device."

        - question: |
            **Arrange** the spy test lifecycle (Meszaros's 4 phases) into the correct order.
          type: parsons
          lines:
            - "spy = SpyEmailSender()"
            - "service = UserService(email_sender=spy)"
            - "service.register('alice@example.com')"
            - "recorded = spy.sent_emails"
            - "assert recorded[0]['to'] == 'alice@example.com'"
          distractors:
            - "spy.verify()"
          explanation: |
            The four phases are: (1) Install the spy, (2) Inject and exercise the SUT,
            (3) Retrieve the recorded data, (4) Assert using standard assertions.
            The distractor `spy.verify()` is mock behavior (Expected Behavior Specification),
            not spy behavior (Procedural Verification). Spies use YOUR assertions, not self-verification.

        - question: |
            **(Spaced review — Step 2)** A test creates `StubWeatherService(temperature=35)` and injects it into `WeatherReporter`. The test then asserts the return value of `daily_summary()`. Is this testing **behavior** or **implementation**?
          type: single
          options:
            - "Implementation — it tests how the SUT calls the stub"
            - "Behavior — it checks what the SUT returns (its observable output) given a controlled input"
            - "Neither — stubs cannot be used for behavior testing"
            - "Both — stubs always test behavior and implementation simultaneously"
          correct_index: 1
          explanation: |
            The test checks the SUT's **return value** — its observable behavior.
            It does NOT check how the SUT called the stub internally.
            This is exactly the "test behavior, not implementation" principle from TDD.


