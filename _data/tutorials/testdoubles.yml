    quiz:
      title: "Over-Mocking — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            A test mocks `_calculate_tax()` (an internal pure function) and asserts that it was called with `(100, 0.08)`. Is this appropriate?
          type: single
          options:
            - "Yes — every dependency should be mocked for true unit isolation"
            - "No — `_calculate_tax()` is an internal pure function with no side effects. Mock it and you're testing your mock configuration, not the actual tax calculation. Test the real function instead"
            - "Yes — mocking internal functions makes the test faster"
            - "No — but only because the function name starts with an underscore"
          correct_index: 1
          explanation: |
            The Mock Skeptic's Checklist, question 1: "Can I test this WITHOUT a mock?"
            Yes — `_calculate_tax()` is pure, fast, and deterministic. Using the real function
            gives you a meaningful test. Mocking it means your test only verifies that
            `process_invoice` calls `_calculate_tax` — not that the calculation is correct.

        - question: |
            Which of the following dependencies should be replaced with test doubles? (Select all that apply)
          type: multiple
          options:
            - "An HTTP client that calls a third-party payment API"
            - "A `datetime.now()` call that returns the current timestamp"
            - "A helper function `def calculate_tax(amount): return amount * 0.08`"
            - "An SMTP email sender that sends real emails to customers"
          correct_indices: [0, 1, 3]
          explanation: |
            Mock at **system boundaries**: the payment API (slow, unreliable), `datetime.now()`
            (non-deterministic), and the email sender (irreversible side effect). The `calculate_tax`
            helper is a fast, deterministic pure function — use it as-is.

        - question: |
            **Arrange** the lines to write a well-structured test for `InvoiceProcessor` that mocks ONLY the external boundaries and uses real internal logic.
          type: parsons
          lines:
            - "mock_gateway = MagicMock()"
            - "mock_gateway.charge.return_value = {'success': True}"
            - "mock_email = MagicMock()"
            - "processor = InvoiceProcessor(mock_gateway, mock_email)"
            - "result = processor.process_invoice('alice@test.com', 100.00)"
            - "assert result['total'] == 108.0"
          distractors:
            - "with patch.object(processor, '_calculate_tax', return_value=8.0):"
            - "mock_gateway.charge.assert_called_once()"
          explanation: |
            The correct test mocks only the external boundaries (payment gateway, email sender)
            and lets the real `_calculate_tax()` run — verifying the actual total is 108.0.
            The first distractor patches the internal `_calculate_tax` — over-mocking! The second
            distractor verifies call details — testing implementation, not behavior. The `assert`
            on the return value is sufficient.

        - question: |
            **(Spaced review — Step 5)** What does `MagicMock(spec=PaymentGateway)` do that `MagicMock()` does not?
          type: single
          options:
            - "It makes the mock return realistic payment data"
            - "It constrains the mock to only accept attributes that `PaymentGateway` actually has — catching typos and API mismatches"
            - "It automatically stubs all methods with sensible defaults"
            - "It requires the `PaymentGateway` class to be importable at test time"
          correct_index: 1
          explanation: |
            `spec=PaymentGateway` mirrors the real class's interface. If you write
            `mock.chrage(...)` (typo), it raises `AttributeError`. Without `spec`,
            `MagicMock` silently accepts any attribute — hiding bugs.


  # --------------------------------------------------------------------------
  # STEP 8 — Capstone: Test a REST Client
  # Pedagogy:
  #   Full scaffolding removal — requirements only.
  #   Integration              — combines ALL skills from Steps 1-7.
  #   Interleaving             — student must choose which technique.
  #   Bloom's level            — Create / Evaluate (quiz).
  # --------------------------------------------------------------------------
  - title: "Capstone: Test a REST Client"
    instructions: |
      > **Learning objective:** After this step you will be able to **design** a test doubles strategy and **implement** a complete test suite for a multi-dependency system.

      ## Putting It All Together

      You now have all the component skills:
      - **Stubs** to control indirect inputs (Step 2)
      - **Spies** to observe indirect outputs (Step 3)
      - **Mocks** for expected behavior specification (Step 4)
      - **`MagicMock`** and **`@patch`** for framework-based doubles (Steps 5-6)
      - **The Mock Skeptic's Checklist** to avoid over-mocking (Step 7)

      This capstone integrates them into a real-world testing scenario — with **no scaffolding**.

      ### Task

      `github_client.py` contains a `GitHubClient` class that interacts with a (simulated) GitHub-like API. It has four methods:
      1. `list_repos(username)` — fetches repos via HTTP GET (indirect input)
      2. `create_issue(repo, title, body)` — creates an issue via HTTP POST (indirect output)
      3. `fetch_with_retry(url, max_retries)` — retries on failure (needs `side_effect`)
      4. All methods log their actions via `self.logger` (indirect output)

      Write a complete test suite in `test_github.py`:

      **Required tests:**
      1. `test_list_repos` — stub the API response, verify the returned repo names
      2. `test_create_issue` — verify the correct HTTP POST was made (spy/mock behavior)
      3. `test_retry_on_failure` — use `side_effect` to simulate failure then success
      4. `test_logs_api_calls` — verify that API calls are logged
      5. `test_api_error_handling` — use `side_effect` to raise an exception, verify graceful handling

      **Requirements:**
      - Use `MagicMock(spec=...)` for the HTTP client
      - Use `MagicMock()` for the logger
      - Add a `# STRATEGY:` comment at the top explaining your test doubles strategy
      - Apply the Mock Skeptic's Checklist: only mock external boundaries

    files:
      - path: "github_client.py"
        content: |
          """GitHubClient — a REST client with multiple dependencies."""

          class GitHubClient:
              def __init__(self, http_client, logger):
                  self.http = http_client
                  self.logger = logger

              def list_repos(self, username):
                  """Fetch a user's repositories."""
                  self.logger.log(f"Fetching repos for {username}")
                  response = self.http.get(f"/users/{username}/repos")
                  if response["status"] != 200:
                      raise ConnectionError(f"API error: {response['status']}")
                  return [repo["name"] for repo in response["data"]]

              def create_issue(self, repo, title, body):
                  """Create an issue in a repository."""
                  self.logger.log(f"Creating issue in {repo}: {title}")
                  response = self.http.post(
                      f"/repos/{repo}/issues",
                      data={"title": title, "body": body}
                  )
                  if response["status"] != 201:
                      raise ConnectionError(f"Failed to create issue: {response['status']}")
                  return response["data"]

              def fetch_with_retry(self, url, max_retries=3):
                  """Fetch a URL with retries on failure."""
                  for attempt in range(max_retries):
                      self.logger.log(f"Attempt {attempt + 1}: {url}")
                      try:
                          response = self.http.get(url)
                          if response["status"] == 200:
                              return response["data"]
                      except Exception:
                          if attempt == max_retries - 1:
                              raise
                  raise ConnectionError(f"Failed after {max_retries} retries")
