          explanation: |
            This is the defining characteristic of **Expected Behavior Specification** —
            the mock verifies during execution and fails immediately on mismatch.
            A spy, by contrast, would silently record the call and let the test's
            `assert` statements catch the mismatch after execution.

        - question: |
            Martin Fowler, Kent Beck, and DHH all "claimed to almost never use mocks." Why do they prefer spies/stubs?
          type: single
          options:
            - "Mocks are slower to execute than spies"
            - "Spies are more flexible — they let the test assert only on what matters, while mocks require specifying ALL expected interactions upfront, making tests brittle"
            - "Spies are part of the Python standard library; mocks require a third-party package"
            - "Mocks do not support dependency injection"
          correct_index: 1
          explanation: |
            Mocks require you to specify every expected interaction before execution.
            If the SUT makes a harmless call you didn't expect, the mock fails.
            Spies record everything but let the test assert only on what matters.
            This makes spy-based tests more resilient to minor implementation changes.

        - question: |
