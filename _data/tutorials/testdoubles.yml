          explanation: |
            `return_value` configures stub behavior, `assert_called_once_with` provides spy/mock
            verification, and `spec=` constrains the mock to a real class's interface.
            Option D is wrong — mocks do not automatically detect test failures; you must
            write assertions (or use `assert_called` methods) explicitly.

        - question: |
            **(Spaced review — Step 3)** You need to verify that `process_order()` called `logger.log("Order placed")`. Which approach keeps the assertion visible in the test method?
          type: single
          options:
            - "Mock — pre-program the expectation and let the mock verify during execution"
            - "Spy — record the call and assert on the recorded data after execution"
            - "Stub — configure the return value and check the SUT's output"
            - "All three approaches keep assertions visible in the test"
          correct_index: 1
          explanation: |
            A spy records the call and your explicit `assert` statement verifies it —
            the assertion is right there in the test method, easy to read.
            A mock verifies during execution (less visible). A stub only provides data.


  # --------------------------------------------------------------------------
  # STEP 6 — @patch and Patching Strategies
  # Pedagogy:
  #   Fading: Medium       — less scaffolding, multiple techniques.
  #   Negative Transfer    — "patch where it's looked up" rule.
  #   Bloom's level        — Apply / Analyze (quiz).
  # --------------------------------------------------------------------------
  - title: "@patch and Patching Strategies"
    instructions: |
      > **Learning objective:** After this step you will be able to **apply** `@patch` to replace module-level dependencies and **explain** the "patch where it's looked up" rule.

      ## When You Cannot Inject

      Dependency injection works great when you design for it. But sometimes the SUT uses a module-level import that you cannot inject:

      ```python
      # daily_report.py
      from datetime import datetime

      def generate_report():
          today = datetime.now()     # ← How do you control this?
          return f"Report for {today.strftime('%Y-%m-%d')}"
      ```

      You cannot inject `datetime` without changing the function signature. Instead, use `@patch` to temporarily replace it during the test.

      ## The `@patch` Decorator

      ```python
      from unittest.mock import patch

      @patch('daily_report.datetime')    # ← patches WHERE it's looked up
      def test_report_date(mock_dt):
          mock_dt.now.return_value = datetime(2024, 1, 15)
          result = generate_report()
          assert result == "Report for 2024-01-15"
      ```

      ### ⚠️ The #1 Mistake: Patching the Wrong Location

      > **Rule: Patch where the name is LOOKED UP, not where it's DEFINED.**

      ```python
      # daily_report.py
      from datetime import datetime     # ← 'datetime' is now in daily_report's namespace

      # WRONG: @patch('datetime.datetime')          ← patches the definition
      # RIGHT: @patch('daily_report.datetime')       ← patches the lookup location
      ```

      This is the single most common `@patch` mistake. The import `from datetime import datetime` copies the name into `daily_report`'s namespace. You must patch it *there*.

      ### Predict Before You Code

      Before writing any code, predict: what happens if you use `@patch('datetime.datetime')` instead of `@patch('daily_report.datetime')`? Will the test fail? Will it silently pass while testing the wrong thing? Write your prediction, then try it in the editor.

      ### `side_effect` — Dynamic Responses

      Use `side_effect` for more complex scenarios:

      ```python
      # Raise an exception
      mock.get.side_effect = ConnectionError("timeout")

      # Return different values on successive calls
      mock.get.side_effect = [200, 500, 200]
      # First call returns 200, second returns 500, third returns 200

      # Call a function instead
      mock.get.side_effect = lambda url: {"status": 200} if "valid" in url else {"status": 404}
      ```

      ### Task

      Complete `test_daily_report.py`:

      1. `test_report_uses_todays_date` — patch `datetime.now()` to return a fixed date, verify the report contains that date
      2. `test_report_file_not_found` — patch `builtins.open` to raise `FileNotFoundError`, verify the function handles it gracefully
      3. `test_report_with_side_effect` — use `side_effect` to make a mock return different values on successive calls

