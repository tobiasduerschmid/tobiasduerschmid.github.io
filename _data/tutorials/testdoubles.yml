      questions:

        - question: |
            You are testing a `GitHubClient.create_issue()` method that makes an HTTP POST. Which test double type is MOST appropriate for the HTTP client dependency?
          type: single
          options:
            - "A stub — just return canned data; don't verify the POST"
            - "A spy or mock — you need to verify the correct endpoint and data were sent (indirect output), not just the return value"
            - "No test double — use the real GitHub API for accurate testing"
            - "A fake — implement a full in-memory GitHub API server"
          correct_index: 1
          explanation: |
            `create_issue()` performs an **indirect output** — it sends data to the API.
            You need to verify that the correct endpoint, title, and body were sent.
            This is observation/verification territory — a spy or mock, not just a stub.
            Using the real API would be slow, flaky, and would create real GitHub issues!

        - question: |
            A student's test for `fetch_with_retry()` uses `side_effect = [ConnectionError(), ConnectionError(), {"status": 200, "data": "ok"}]`. What does this simulate?
          type: single
          options:
            - "Three successful responses followed by a failure"
            - "Two failures followed by a success on the third attempt — testing the retry logic"
            - "A single response containing all three values"
            - "An error because `side_effect` cannot mix exceptions and return values"
          correct_index: 1
          explanation: |
            `side_effect` with a list returns each item in order. Exceptions in the list
            are raised (not returned). So: first call → raises `ConnectionError`,
            second call → raises `ConnectionError`, third call → returns the dict.
            This perfectly simulates "two failures then a success" for retry testing.

        - question: |
            **Arrange** the lines to write a retry test using `side_effect` that simulates two failures followed by a success.
          type: parsons
          lines:
            - "mock_http = MagicMock()"
            - "mock_http.get.side_effect = [Exception('fail'), Exception('fail'), {'status': 200, 'data': 'ok'}]"
            - "mock_logger = MagicMock()"
            - "client = GitHubClient(mock_http, mock_logger)"
            - "result = client.fetch_with_retry('/test', max_retries=3)"
            - "assert result == 'ok'"
          distractors:
            - "mock_http.get.return_value = [Exception('fail'), {'status': 200}]"
          explanation: |
            `side_effect` with a list returns each element in order — exceptions are RAISED,
            not returned. The distractor uses `return_value`, which would return the LIST itself
            as a single value on the first call, never raising any exception.
            The test verifies that the retry logic recovers after two failures.

        - question: |
            **(Spaced review — Step 7)** A teammate's test mocks the `logger` dependency and asserts that `logger.log` was called exactly 3 times with specific messages in a specific order. Apply the Mock Skeptic's Checklist. Is this appropriate?
          type: single
          options:
            - "Yes — logging is an external boundary that should always be mocked and fully verified"
            - "Partially — mocking the logger is fine (it's a boundary), but asserting exact message text and call order tests implementation details. Verify that logging happened, but don't over-specify the format"
            - "No — loggers should never be mocked under any circumstances"
            - "Yes — verifying exact log messages ensures the code produces the correct audit trail"
          correct_index: 1
          explanation: |
            Mocking the logger is appropriate (it's a boundary dependency).
            But asserting exact message text and call ORDER couples the test to
            implementation details. If someone rephrases a log message or reorders
            two independent operations, the test breaks. Verify that logging *happened*
            for key events, but don't over-specify the exact strings or sequence.
