title: "Test Doubles: Stubs, Spies & Mocks"
description: "Learn to isolate code under test using test doubles. Build manual stubs, spies, and mocks by hand before graduating to unittest.mock — so you understand what the framework does, not just how to call it."

backend: pyodide

require_tests: true

# Global setup: install pytest, add /tutorial to sys.path, patch module cache
setup_commands:
  - "import pyodide_js; await pyodide_js.loadPackage('pytest')"
  - "import sys; sys.path.insert(0, '/tutorial')"
  - |
    import pytest as _pytest, sys as _sys
    _orig_main = _pytest.main
    def _patched_main(*a, **kw):
        for m in list(_sys.modules):
            if m.startswith('test_') or m in (
                'weather_reporter','weather_service','notification_service',
                'email_sender','user_service','order_processor','logger',
                'payment_processor','invoice_processor','github_client',
                'report_generator','daily_report'):
                del _sys.modules[m]
        return _orig_main(*a, **kw)
    _pytest.main = _patched_main

steps:

  # --------------------------------------------------------------------------
  # STEP 1 — The Dependency Problem
  # Pedagogy:
  #   Lay of the Land    — why test doubles exist before any mechanics.
  #   Generation Effect   — "how would YOU test this?" before the answer.
  #   Growth Mindset      — normalize that this is genuinely hard.
  #   Bloom's level       — Understand / Analyze (quiz).
  # --------------------------------------------------------------------------
  - title: "The Dependency Problem"
    instructions: |
      ## The Lay of the Land

      > **Learning objective:** After this step you will be able to **explain** why external dependencies make tests unreliable and **identify** the dependencies in a function that need isolation.

      ### Prerequisites

      This tutorial assumes you have completed the **TDD & Testing with pytest** tutorial. You should be comfortable with:
      - Writing `pytest` test functions with `assert`
      - The Red-Green-Refactor cycle
      - The principle: "test behavior, not implementation"

      ### The Problem You Cannot Solve (Yet)

      Look at the code in `weather_reporter.py`. The `WeatherReporter` class produces a weather summary for a city.

      ### Predict Before You Run

      **Before clicking Run**, read `weather_reporter.py` and predict: if you call `daily_summary("Los Angeles")` twice in a row, will the output be the same both times? Write your prediction down.

      Now click **Run** on `weather_reporter.py`. Was your prediction correct? Run it again — does the output change?

      ### Try (and Fail) to Test It

      Now think about this question:

      > How would you write a pytest test for `daily_summary()` that is fast, reliable, and works offline?

      Try it — open `test_weather.py` and write a test. You will quickly discover the problem. That frustration is the point.

      ### Why Tests Need Isolation

      The function depends on an external HTTP API. This makes tests:
      - **Slow** — network calls take hundreds of milliseconds
      - **Flaky** — the API might be down, rate-limited, or return different data
      - **Non-deterministic** — the weather changes! Today's test might fail tomorrow
      - **Impossible offline** — no Wi-Fi = no test

      The core issue is that `daily_summary()` has a **dependency** it cannot control. In testing vocabulary:

      | Term | Definition |
      |------|-----------|
      | **SUT** (System Under Test) | The code you are testing — `WeatherReporter.daily_summary()` |
      | **DOC** (Depended-On Component) | The external component the SUT uses — the weather API |
      | **Test Double** | A replacement for the DOC that you control — like a "stunt double" in cinema |

      ### The Meszaros Taxonomy

      Gerard Meszaros coined the term "Test Double" and defined five types. This tutorial covers the three most important:

      | Type | What it does | Controls inputs? | Records outputs? | Verifies calls? |
      |------|-------------|-----------------|-----------------|----------------|
      | **Stub** | Returns pre-configured data | ✓ | ✗ | ✗ |
      | **Spy** | Records all calls for later assertion | ✓ | ✓ | ✗ |
      | **Mock** | Verifies expected calls during execution | ✓ | ✓ | ✓ |

      We will learn them in this order — each builds on the last.

      ### The Enabling Technique: Dependency Injection

      To replace a dependency with a test double, the SUT must **accept** the dependency rather than create it internally. This is called **dependency injection**:

      ```python
      # HARD TO TEST — creates its own dependency
      class WeatherReporter:
          def daily_summary(self, city):
              response = requests.get(f"https://api.weather.com/{city}")  # ← hard-coded
              ...

      # EASY TO TEST — accepts the dependency
      class WeatherReporter:
          def __init__(self, weather_service):     # ← injected
              self.service = weather_service

          def daily_summary(self, city):
              temp = self.service.get_temperature(city)  # ← uses the injected service
              ...
      ```

      With injection, tests can pass in a test double instead of the real service.

      ### A Note About Difficulty

      Test doubles are one of the hardest topics in software testing. If the vocabulary feels overwhelming right now, that is completely normal — every developer goes through this. We will build understanding one concept at a time, starting with the simplest type (stubs) and working up.

      ### Task

      Open `report_generator.py`. It has a `ReportGenerator` class with three dependencies: `database`, `email_sender`, and `logger`.

      In `test_report.py`, complete the analysis comments:
      1. For each dependency, identify whether it provides **indirect input** (data the SUT reads) or receives **indirect output** (actions the SUT performs)
      2. Explain why each dependency would make a test unreliable if left as-is

      This is a **pure analysis** task — no stubs or mocks yet. Understanding the problem comes before the solution.

    files:
      - path: "weather_reporter.py"
        content: |
          """A weather reporter that depends on an external API.
          Try to test daily_summary() — you'll see the problem."""

          class WeatherReporter:
              def daily_summary(self, city):
                  # In real code, this would call requests.get(...)
                  # For this exercise, it simulates an unreliable API
                  import random
                  temp = random.randint(-10, 45)  # Non-deterministic!
                  if temp > 30:
                      return "Hot day ahead!"
                  elif temp > 15:
                      return "Pleasant weather."
                  else:
                      return "Bundle up, it's cold!"

          if __name__ == "__main__":
              reporter = WeatherReporter()
              print(reporter.daily_summary("Los Angeles"))
              print(reporter.daily_summary("Los Angeles"))  # Different result!
        language: "python"

      - path: "report_generator.py"
        content: |
          """ReportGenerator with three dependencies.
          Your task: analyze each dependency."""

          class ReportGenerator:
              def __init__(self, database, email_sender, logger):
                  self.db = database
                  self.email = email_sender
                  self.logger = logger

              def generate_daily_report(self, date):
                  # Uses database to READ sales data (indirect input)
                  sales = self.db.get_sales(date)
                  total = sum(item['amount'] for item in sales)

                  # Uses logger to WRITE a log message (indirect output)
                  self.logger.info(f"Report generated: {total:.2f}")

                  # Uses email_sender to SEND the report (indirect output)
                  self.email.send(
                      to="team@company.com",
                      subject=f"Daily Report: {date}",
                      body=f"Total sales: ${total:.2f}"
                  )

                  return {"date": date, "total": total}
        language: "python"

      - path: "test_report.py"
        content: |
          """Dependency Analysis — no test doubles yet, just analysis."""

          # TASK: For each dependency of ReportGenerator, answer:
          #   1. Does it provide INDIRECT INPUT or receive INDIRECT OUTPUT?
          #   2. Why would it make tests unreliable if we used the real thing?

          # database:
          #   Direction: ??? (indirect input / indirect output)
          #   Why unreliable: ???

          # email_sender:
          #   Direction: ??? (indirect input / indirect output)
          #   Why unreliable: ???

          # logger:
          #   Direction: ??? (indirect input / indirect output)
          #   Why unreliable: ???


          def test_analysis_complete():
              """This test just checks you filled in the analysis."""
              source = open('/tutorial/test_report.py').read()
              # Check that placeholder '???' has been replaced
              assert source.count('???') == 0, \
                  "Replace all '???' placeholders with your analysis"
              # Check that key terms appear
              assert 'indirect input' in source.lower() or 'indirect output' in source.lower(), \
                  "Use the terms 'indirect input' and/or 'indirect output' in your analysis"
        language: "python"

      - path: "test_weather.py"
        content: |
          """Try to write a reliable test for WeatherReporter.
          You will discover the problem — that's the point!"""
          from weather_reporter import WeatherReporter

          def test_daily_summary():
              reporter = WeatherReporter()
              result = reporter.daily_summary("Los Angeles")
              # What do you assert here?
              # The result is random — you can't predict it!
              assert isinstance(result, str)  # This passes but tests nothing useful
        language: "python"

    open_file: "test_report.py"

    tests:
      - description: "Analysis is complete (no ??? placeholders remain)"
        command: |
          source = open('/tutorial/test_report.py').read()
          assert source.count('???') == 0, \
              "Replace all '???' placeholders with your analysis"
      - description: "Analysis uses correct terminology"
        command: |
          source = open('/tutorial/test_report.py').read().lower()
          assert 'indirect input' in source or 'indirect output' in source, \
              "Use the terms 'indirect input' and/or 'indirect output'"
      - description: "Database identified as providing indirect input"
        command: |
          source = open('/tutorial/test_report.py').read().lower()
          # Find the database section and check it mentions input
          db_section = source[source.find('database'):source.find('email_sender')]
          assert 'input' in db_section, \
              "The database provides indirect INPUT (data the SUT reads)"

    quiz:
      title: "The Dependency Problem — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            A test for a function that sends SMS messages passes on Monday but fails on Tuesday. The function's code has not changed. What is the most likely cause?
          type: single
          options:
            - "The test framework has a bug that causes intermittent failures"
            - "The test depends on a real external service (the SMS provider) that was unavailable or rate-limited on Tuesday"
            - "The test was written incorrectly and the Monday pass was a false positive"
            - "Python's random seed changes daily, causing different execution paths"
          correct_index: 1
          explanation: |
            This is a **flaky test** — it depends on a real external service that can be unavailable,
            slow, or rate-limited. The fix: replace the real SMS provider with a test double that
            you control. This is the core problem test doubles solve.

        - question: |
            In the Meszaros taxonomy, what does **SUT** stand for, and what is the **DOC**?
          type: single
          options:
            - "SUT = Software Under Testing, DOC = Dependency Object Class"
            - "SUT = System Under Test (the code you're testing), DOC = Depended-On Component (the external dependency)"
            - "SUT = Standard Unit Test, DOC = Direct Object Connector"
            - "SUT = Stub Under Test, DOC = Double-Object Controller"
          correct_index: 1
          explanation: |
            The **SUT** is the code you're testing. The **DOC** is the external component
            it depends on. A **Test Double** replaces the DOC so you can control the test environment.

        - question: |
            Why is **dependency injection** essential for using test doubles?
          type: single
          options:
            - "It makes the code run faster by avoiding object creation overhead"
            - "It allows tests to pass in a test double instead of the real dependency, because the SUT receives its dependency from outside rather than creating it internally"
            - "It is required by pytest — tests cannot run without dependency injection"
            - "It automatically generates test doubles for all dependencies"
          correct_index: 1
          explanation: |
            If a class creates its own dependency internally (e.g., `requests.get()` inside the method),
            there is no way for a test to substitute a double. Dependency injection means the dependency
            is passed in from outside — the test can pass a stub, spy, or mock instead of the real thing.

        - question: |
            The `ReportGenerator` class uses `self.db.get_sales(date)` to read data and `self.email.send(...)` to send a report. Which dependency provides an **indirect input** and which receives an **indirect output**?
          type: single
          options:
            - "Both are indirect inputs — the SUT reads from both"
            - "`database` provides indirect input (data flows IN to the SUT); `email_sender` receives indirect output (an action flows OUT from the SUT)"
            - "`email_sender` provides indirect input; `database` receives indirect output"
            - "Neither is indirect — they are both direct inputs via function parameters"
          correct_index: 1
          explanation: |
            **Indirect input:** The database returns sales data that the SUT uses — data flows in.
            **Indirect output:** The email sender receives a send command — an action flows out.
            This distinction matters because stubs control inputs and spies/mocks observe outputs.

        - question: |
            Which of the following are valid reasons to replace a real dependency with a test double? (Select all that apply)
          type: multiple
          options:
            - "The dependency is a network API that may be unavailable or rate-limited"
            - "The dependency performs an irreversible side effect (sending a real email)"
            - "The dependency is a simple helper function that adds two numbers"
            - "The dependency introduces non-determinism (randomness, current time)"
          correct_indices: [0, 1, 3]
          explanation: |
            Test doubles replace dependencies that are **slow, flaky, non-deterministic, or have side effects**.
            A simple helper function that adds two numbers is fast, deterministic, and side-effect-free —
            use the real thing. This foreshadows Step 7's "Mock Skeptic's Checklist."


  # --------------------------------------------------------------------------
  # STEP 2 — Test Stubs: Controlling Indirect Inputs
  # Pedagogy:
  #   Worked Example      — full stub with sub-goal labels.
  #   PRIMM               — predict → run → modify.
  #   Fading: Heavy       — signature given, body to complete.
  #   Bloom's level       — Understand / Apply (quiz).
  # --------------------------------------------------------------------------
  - title: "Test Stubs — Controlling Indirect Inputs"
    instructions: |
      > **Learning objective:** After this step you will be able to **implement** a manual test stub and **use** dependency injection to isolate a SUT from its dependencies.

      ## What Is a Test Stub?

      A Test Stub replaces a DOC to **control indirect inputs** — the values the SUT receives from its dependency. The stub returns pre-configured data, allowing you to test the SUT's behavior under specific conditions.

      Key properties of a stub:
      - It **provides data** to the SUT (controls indirect inputs)
      - It does **NOT verify** anything — your `assert` statements do the verification
      - This is **state verification**: you check the SUT's *return value* or *final state*

      ## Worked Example: WeatherReporter with a Stub

      Let's fix the untestable `WeatherReporter` from Step 1. We will:
      1. Refactor the SUT to accept an injectable dependency
      2. Build a manual stub
      3. Write tests that use the stub

      ```python
      # SUB-GOAL: Define the SUT with an injectable dependency
      class WeatherReporter:
          def __init__(self, weather_service):
              self.service = weather_service

          def daily_summary(self, city):
              temp = self.service.get_temperature(city)  # ← indirect input
              if temp > 30:
                  return "Hot day ahead!"
              elif temp > 15:
                  return "Pleasant weather."
              else:
                  return "Bundle up, it's cold!"

      # SUB-GOAL: Build a manual stub that controls the indirect input
      class StubWeatherService:
          def __init__(self, temperature):
              self.temperature = temperature

          def get_temperature(self, city):
              return self.temperature  # ← always returns our configured value

      # SUB-GOAL: Write the test using the stub (Arrange-Act-Assert)
      def test_hot_day():
          stub = StubWeatherService(temperature=35)      # Arrange: create stub
          reporter = WeatherReporter(stub)               # Arrange: inject stub
          result = reporter.daily_summary("LA")          # Act
          assert result == "Hot day ahead!"              # Assert: check SUT's output
      ```

      Notice: the stub has **no knowledge of the test's assertions**. It simply provides data. The test's `assert` does all the verification. This is **state verification** — we check what the SUT *returns*, not how it called the stub.

      ### Predict Before You Code

      Before implementing anything, trace through the worked example mentally: if `StubWeatherService(temperature=10)` is injected, what will `daily_summary("NYC")` return?

      ### Task

      Complete the files:

      1. **`weather_service.py`**: The `WeatherReporter` class is already refactored with dependency injection. Read and understand it.
      2. **`test_weather_stub.py`**: Complete the `StubWeatherService` class (the `get_temperature` method) and write three tests:
         - `test_hot_day` — temperature > 30 → "Hot day ahead!"
         - `test_pleasant_day` — temperature between 16 and 30 → "Pleasant weather."
         - `test_cold_day` — temperature ≤ 15 → "Bundle up, it's cold!"

    files:
      - path: "weather_service.py"
        content: |
          """WeatherReporter — refactored with dependency injection."""

          class WeatherReporter:
              def __init__(self, weather_service):
                  """Accept the weather service as a dependency."""
                  self.service = weather_service

              def daily_summary(self, city):
                  """Return a human-readable weather summary for a city."""
                  temp = self.service.get_temperature(city)
                  if temp > 30:
                      return "Hot day ahead!"
                  elif temp > 15:
                      return "Pleasant weather."
                  else:
                      return "Bundle up, it's cold!"
        language: "python"

      - path: "test_weather_stub.py"
        content: |
