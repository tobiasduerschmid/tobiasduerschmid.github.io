title: "Shell Scripting"
description: "Master shell scripting through hands-on exercises in an interactive Linux environment — from your first script to building real automation tools"

steps:
  - title: "Hello, Shell!"
    instructions: |
      Welcome to the **Shell Scripting Tutorial**! On the top is a code
      editor; on the bottom is a real Linux terminal. 

      ### Why learn shell scripting?

      Every time you repeat a task in the terminal — processing files, checking
      log files, running complex builds — you are a candidate for automation. A
      shell script captures those commands in a file so you can re-run,
      share, and schedule them without retyping anything.  So learning shell scripting can supercharge your productivity as a developer.

      Shell scripts are the foundation of Continuous Integration / Continuous
      Delivery (CI/CD) pipelines, Docker entrypoints, deployment scripts,
      and system administration. The skills you learn here transfer directly
      to real production workflows.

      ### Two lines every script needs

      Open `morning.sh` in the editor. It already has:

      ```bash
      #!/bin/bash
      set -e
      ```

      **Line 1 — the shebang (`#!`):** When you run a file, Linux reads the
      first two bytes to decide how to execute it. `#!` followed by a path
      tells the OS which interpreter to use. Without it, the OS guesses —
      and often guesses wrong. `#!/bin/bash` is the standard choice when
      Bash is at `/bin/bash` (true on most Linux systems). For maximum
      portability across systems where Bash may live elsewhere, you can also
      use `#!/usr/bin/env bash`, which finds the first `bash` in your `$PATH`.

      **Line 2 — the safety net (`set -e`):** By default, Bash happily
      continues running after a failed command. `set -e` exits the script
      when a command fails, preventing a cascade of confusing failures.
      Always include it. Note: `set -e` does **not** trigger for commands
      used as an `if` condition, for commands negated with `!`, or for
      commands that are not the last in a `&&`/`||` list — those are
      intentional control-flow patterns. The final command in a `&&`/`||`
      chain can still trigger `set -e` if it fails.

      ### New Concept: Command Substitution
      You can capture the output of a command and use it as a string by wrapping it in `$(...)`. 
      Try running this in your terminal right now: `echo "I am $(whoami)"`

      ### Your task

      Add three commands to `morning.sh`:

      1. Print the literal string "Good morning!" using `echo`.
      2. Print "Today is " followed by the current day. (Hint: the command `date +%A` outputs the day of the week. Use command substitution!)
      3. Print "You are logged in as: " followed by your username. (Hint: use the `whoami` command).

      Then save (**Ctrl+S** / **Cmd+S**) and run in the terminal:

      ```bash
      chmod +x morning.sh
      ./morning.sh
      ```

      **Breaking it down:**
      - `chmod +x` grants execute permission. Linux requires this explicit
        step before running a file as a program — a deliberate security
        feature so files don't accidentally become executable.
      - `./morning.sh` — the `./` prefix means "look in the current
        directory." The shell only searches directories listed in `$PATH`
        for commands; your local folder is not in `$PATH` by default.
      - `$(date +%A)` is *command substitution*: the shell runs `date +%A`
        first, captures its output, and injects the result into your string.
        Any command can go inside `$(...)` — this is one of Bash's most
        useful features.
    files:
      - path: "morning.sh"
        print_language: bash
        content: |
          #!/bin/bash
          set -e

    open_file: "morning.sh"
    tests:
      - description: "morning.sh starts with the shebang (#!/bin/bash)"
        command: "head -1 morning.sh | grep -q '#!/bin/bash'"
      - description: "morning.sh includes set -e for safety"
        command: "grep -q 'set -e' morning.sh"
      - description: "Script prints a greeting"
        command: "bash morning.sh | grep -qi 'morning'"
      - description: "Script prints the day of the week"
        command: "bash morning.sh | grep -qiE 'monday|tuesday|wednesday|thursday|friday|saturday|sunday'"
      - description: "Script prints who you are logged in as"
        command: "bash morning.sh | grep -qi 'root'"
      - description: "morning.sh is executable"
        command: "[ -x morning.sh ]"

    quiz:
      title: "Hello, Shell! — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "What is the purpose of the **shebang** line (`#!/bin/bash`) at the top of a shell script?"
          options:
            - "It is a comment that documents the script author"
            - "It tells the OS which interpreter to use when executing the file"
            - "It enables error handling and stops the script on failures"
            - "It sets the default working directory for the script"
          correct_index: 1
          explanation: "The shebang (`#!` followed by an interpreter path) is read by the OS kernel when you run a file. It tells the kernel to execute the file using the specified interpreter (here, `/bin/bash`). Without it, the OS may guess the wrong interpreter."

        - question: "What does `set -e` do in a shell script?"
          options:
            - "Enables strict variable quoting rules"
            - "Sets the script's encoding to UTF-8"
            - "Stops the script immediately when any command returns a non-zero exit code"
            - "Enables extended glob patterns"
          correct_index: 2
          explanation: "By default, Bash continues executing even after a command fails. `set -e` (exit on error) exits the script when a command fails, preventing a cascade of confusing failures. Key exceptions: `set -e` does not trigger for commands used as an `if` condition, commands negated with `!`, or commands that are not the last in a `&&`/`||` list — those are intentional control-flow patterns. The final command of a `&&`/`||` chain can still trigger `set -e` if it fails."

        - question: "Which statements about `$(...)` command substitution are true? (Select all that apply)"
          type: multiple
          options:
            - "The shell runs the command inside `$(...)` and replaces it with the command's output"
            - "It can be nested — you can put `$(...)` inside another `$(...)`"
            - "It requires the `eval` keyword to work correctly"
            - "It is used in `$(date +%A)` to embed the day of the week in a string"
          correct_indices:
            - 0
            - 1
            - 3
          explanation: "Command substitution `$(cmd)` runs `cmd` and injects its stdout into the surrounding expression. It can be nested arbitrarily and does NOT require `eval`. It is one of Bash's most powerful and widely-used features."

  - title: "Pipes — Connecting Commands"
    instructions: |
      The **pipe** operator `|` is one of the most powerful ideas in Unix.
      It connects programs so that the output of one becomes the input of
      the next, letting you build data-processing pipelines from small,
      single-purpose tools. Data flows through memory from one process to
      the next — no intermediate files needed.

      ### Your toolkit

      **`wc -l`** — count lines of input

      ```bash
      wc -l < /etc/hosts   # how many entries are in /etc/hosts?
      ```

      **`grep PATTERN file`** — print only lines that match a pattern

      ```bash
      grep "WARN" server_log.txt   # show only warning lines
      ```

      **`sort`** — sort lines alphabetically; add `-n` for numeric order,
      `-r` to reverse

      ```bash
      echo -e "banana\napple\ncherry" | sort   # → apple, banana, cherry
      ```

      **`uniq -c`** — collapse *consecutive* duplicate lines and prefix each
      with its count *(always sort first so duplicates are adjacent)*

      ```bash
      echo -e "cat\ncat\ndog" | uniq -c   # →  2 cat   1 dog
      ```

      **`cut -d' ' -f<n>`** — extract the *n*-th space-separated field

      ```bash
      cut -d' ' -f3 server_log.txt   # extract the third word on each line
      ```

      **`head -n`** — show only the first *n* lines

      ```bash
      sort names.txt | head -5   # the 5 alphabetically first names
      ```

      **`find path -name PATTERN | xargs COMMAND`** — find files and run a command on each

      ```bash
      find . -name "*.log" | xargs rm   # find and delete all log files
      ```
      *Note: `xargs` takes the output from the pipe and turns it into arguments for the next command.*

      ### Explore the data

      A file called `server_log.txt` is provided. Browse it first:

      ```bash
      cat server_log.txt
      ```

      ### Redirection: saving output to files

      Pipes connect commands to commands. **Redirection** connects commands
      to files:

      ```bash
      grep "INFO" server_log.txt > info_only.txt   # create/overwrite
      echo "extra line" >> info_only.txt             # append (safe)
      wc -l < info_only.txt                          # read from file
      ```

      ### Pipeline exercises

      For each question, build a pipeline and **save the result to the named
      file** using `>`. The tests below will check every file.

      1. **Count total lines:** Feed `server_log.txt` into `wc -l`.
         Save to `line_count.txt`.
      2. **Filter errors:** Print only lines containing "ERROR".
         Save to `errors_only.txt`.
      3. **Count errors:** Pipe your ERROR filter into `wc -l`.
         Save to `error_count.txt`.
      4. **Extract timestamps:** Extract just the first field (the timestamps).
         Save to `timestamps.txt`.
      5. **Top message types:** Find the 2 most frequent message types.
         *(Build step by step: extract field 2 → sort → count duplicates →
         sort by count descending → top 2)*
         Save to `top_message_types.txt`.
    files:
      - path: "server_log.txt"
        content: |
          08:12:01 INFO server started on port 8080
          08:12:03 INFO database connection established
          08:14:22 WARN high memory usage detected (82%)
          08:15:45 ERROR failed to process request /api/users
          08:16:01 INFO request completed in 230ms
          08:18:33 ERROR database timeout after 30s
          08:19:02 WARN disk usage above threshold (91%)
          08:20:15 INFO cache refreshed successfully
          08:22:47 ERROR connection refused by upstream service
          08:23:01 INFO retry succeeded for /api/users
          08:25:00 INFO scheduled backup completed
          08:27:12 WARN deprecated API endpoint called: /v1/legacy
          08:30:00 INFO health check passed
          08:31:44 ERROR out of memory on worker-3
          08:32:01 INFO worker-3 restarted
    open_file: "server_log.txt"
    tests:
      - description: "line_count.txt contains the total number of log entries (15)"
        command: "[ $(cat line_count.txt) -eq 15 ]"
      - description: "errors_only.txt contains exactly 4 ERROR lines"
        command: "[ -f errors_only.txt ] && [ $(grep -c 'ERROR' errors_only.txt) -eq 4 ]"
      - description: "error_count.txt contains 4 (the number of errors)"
        command: "[ $(cat error_count.txt) -eq 4 ]"
      - description: "timestamps.txt has one timestamp per log entry (15 lines)"
        command: "[ -f timestamps.txt ] && [ $(wc -l < timestamps.txt) -eq 15 ]"
      - description: "top_message_types.txt lists INFO (8) and ERROR (4) with correct counts, and excludes WARN"
        command: "[ -f top_message_types.txt ] && grep -q '8\\s*INFO' top_message_types.txt && grep -q '4\\s*ERROR' top_message_types.txt && ! grep -q 'WARN' top_message_types.txt"

    quiz:
      title: "Pipes — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "**[Revisit Step 1]** Your script uses `set -e`. You run this pipeline: `cat big.log | grep ERROR | wc -l`. The file has no errors so `grep` exits with code 1. Does `set -e` catch this and exit the script?"
          options:
            - "Yes — `set -e` catches any non-zero exit code, including inside pipelines"
            - "No — by default `set -e` only checks the exit code of the **last** command in a pipeline; `grep` failing mid-pipeline is silently ignored"
            - "Yes — pipe operators automatically propagate non-zero exit codes"
            - "No — `grep` returning 1 for no matches is not treated as a failure by Bash"
          correct_index: 1
          explanation: "By default, `set -e` only checks the exit code of the **last** command in a pipeline. If `grep` fails in the middle, Bash sees only `wc -l`'s exit code (0) and happily continues. To catch mid-pipeline failures, you need `set -o pipefail` in addition to `set -e`."

        - question: "In the pipeline `grep 'ERROR' server_log.txt | wc -l`, what does the `|` operator do?"
          options:
            - "Runs the two commands simultaneously in parallel and sums their output"
            - "Passes the output of `grep` as a filename argument to `wc`"
            - "Connects the stdout of `grep` to the stdin of `wc`"
            - "Writes the `grep` output to a temporary file, then passes the filename to `wc`"
          correct_index: 2
          explanation: "The pipe `|` connects the **stdout of the left command directly to the stdin of the right command**, through memory. No intermediate file is created. This is the Unix philosophy: compose small, single-purpose tools into powerful pipelines."

        - question: "What is the difference between `>` and `>>` for output redirection?"
          options:
            - "`>` appends to a file; `>>` creates a new file or overwrites"
            - "`>` creates or overwrites a file; `>>` appends to an existing file (or creates it)"
            - "Both do the same thing — the number of `>` characters doesn't matter"
            - "`>` redirects stdout; `>>` redirects both stdout and stderr"
          correct_index: 1
          explanation: "`>` **creates or overwrites** the file without warning — existing content is lost. `>>` **appends** new content after existing content. Always prefer `>>` when preserving existing data matters."

        - question: "What does `grep 'WARN' server_log.txt | head -n 3 | sort -r` do?"
          options:
            - "It finds all the 'WARN' lines in the file, sorts all of them in reverse alphabetical order, and then shows you the top 3 from that sorted list."
            - "It goes to the bottom of the file, finds the last 3 'WARN' logs, and displays them."
            - "It extracts the first 3 lines containing 'WARN', sorts them backward, and saves the sorted lines back into `server_log.txt`"
            - "It grabs the very first 3 lines in server_log.txt that contain 'WARN', and prints those 3 specific lines in reverse alphabetical order (Z to A)"
          correct_index: 1
          explanation: "`grep 'WARN' server_log.txt` searches the file from top to bottom and streams out every line containing the word 'WARN'. `| head -n 3` acts as a gatekeeper. It accepts the first 3 lines it receives from grep and then immediately closes the gate, discarding the rest of the matches. `| sort -r:`  receives only those 3 lines. It sorts those specific three lines in reverse alphabetical order and prints the final result to your screen."

  - title: "Variables & The Quoting Trap"
    instructions: |
      Variables store values for reuse. In Bash, you assign with `=` and
      read with `$`.

      ### The spaces rule — easy to break, hard to debug

      ```bash
      color="blue"      # correct
      color = "blue"    # WRONG — shell sees three words: "color", "=", "blue"
      ```
      There must be **no spaces** around `=`. The shell interprets `color = "blue"` as running a command named `color` with arguments `=` and `blue`. 

      ### The quoting problem

      When you write `$variable`, the shell replaces it with the value —
      then *word-splits* the result on any characters in `$IFS` (the
      Internal Field Separator, which defaults to space, tab, and newline).
      This causes chaos when values contain spaces:

      ```bash
      file="my report.txt"
      wc -l $file      # shell splits into: wc -l my report.txt  (TWO args!)
      wc -l "$file"    # correct: one argument, treated as a unit
      ```

      **Rule: always double-quote your variables** unless you have a
      specific reason not to.

      ### See the bug (Active Debugging)

      `buggy.sh` has a deliberate quoting mistake. Run it first in the terminal to see the error, and read the error carefully. 

      **Fix it:**
      1. Open `buggy.sh` in the editor.
      2. Diagnose why `wc -l` is throwing an error based on what you just learned.
      3. Fix the syntax and run the script again.

      ### Build your own

      Open `inventory.sh` and write a script from scratch that:
      1. Declares a variable for a **project name** and another for a **version number**.
      2. Uses command substitution `$(...)` to dynamically count the number of `.sh` files in the current directory and save it to a variable. (Hint: combine `ls *.sh` with `wc -l`).
      3. Uses `echo` to print a single string combining all three variables, e.g., `Project: mytools v1.0 — 5 scripts found`
    files:
      - path: "buggy.sh"
        print_language: bash
        content: |
          #!/bin/bash
          set -e
          # This script has a quoting bug — can you find it?

          filename="my report.txt"
          echo "creating a test file..."
          echo "important data" > "$filename"

          # BUG: the variable below is not quoted!
          line_count=$(wc -l $filename)
          echo "Line count: $line_count"

          rm "$filename"
      - path: "inventory.sh"
        print_language: bash
        content: |
          #!/bin/bash
          set -e
          # Create variables for a project name and version, then count .sh files

    open_file: "buggy.sh"
    tests:
      - description: "The bug in buggy.sh is fixed (wc -l uses quoted variable)"
        command: "grep 'wc -l' buggy.sh | grep -q '\"\\$filename\"'"
      - description: "buggy.sh runs without error after the fix"
        command: "bash buggy.sh"
      - description: "inventory.sh defines at least two variables"
        command: "[ $(grep -cE '^[[:space:]]*[a-zA-Z_][a-zA-Z0-9_]*=' inventory.sh) -ge 2 ]"
      - description: "inventory.sh uses command substitution $(…)"
        command: "grep -q '\\$(' inventory.sh"
      - description: "inventory.sh output mentions a version"
        command: "bash inventory.sh | grep -qiE 'v[0-9]|version'"
      - description: "inventory.sh output includes a script count"
        command: "bash inventory.sh | grep -qE '[0-9]+ script'"

    quiz:
      title: "Variables & Quoting — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "**[Revisit Step 2]** You want to count only lines containing `ERROR` in `server.log` and save that number to a variable. Which is correct?"
          options:
            - "`count=grep -c ERROR server.log`"
            - "`count=$(grep -c ERROR server.log)`"
            - "`count=| grep -c ERROR server.log`"
            - "`count=\"${grep ERROR server.log}\"`"
          correct_index: 1
          explanation: "Command substitution `$(...)` captures a command's **stdout** into a variable. The `|` pipe connects two commands' stdin/stdout — it can't assign to a variable by itself. `${...}` is for variable/parameter expansion, not command execution."

        - question: "Which variable assignment is **syntactically correct** in Bash?"
          options:
            - "`name = \"Alice\"`"
            - "`name= \"Alice\"`"
            - "`name=\"Alice\"`"
            - "`$name = Alice`"
          correct_index: 2
          explanation: "Bash requires **no spaces** around `=` in variable assignment."

        - question: "A variable `dir` contains the value `my documents`. What happens when you run `ls $dir` (unquoted)?"
          options:
            - "Bash lists the directory named `my documents` correctly"
            - "Bash word-splits on the space, running `ls my documents` — two separate arguments"
            - "Bash produces a syntax error and stops"
            - "Bash automatically quotes the variable to handle the space"
          correct_index: 1
          explanation: "Without quotes, Bash **word-splits** the expanded value on spaces. `ls $dir` becomes `ls my documents` — two arguments. The fix is always `\"$dir\"`."

        - question: "**[Interleaved: Revisit Step 1]** What does the `#!/bin/bash` line at the very top of a script tell the Operating System?"
          options:
            - "It is a comment for documentation"
            - "It specifies the interpreter that should execute the file"
            - "It enables strict error checking"
            - "It sets the script's permissions to executable"
          correct_index: 1
          explanation: "As we saw in Step 1, the shebang (`#!`) followed by a path tells the OS which program to use to run the script. Without it, the OS might guess the wrong interpreter."

  - title: "Conditionals — Making Decisions"
    instructions: |
      Scripts need to react to different situations. Bash's `if` statement
      runs commands conditionally based on whether a *test* succeeds.

      ### Syntax

      ```bash
      if [ condition ]; then
          # runs when condition is true
      elif [ other_condition ]; then
          # runs when first is false but this is true
      else
          # runs when all conditions are false
      fi
      ```

      ### Why the spaces inside `[ ]` are mandatory

      `[` is a shell **builtin** command (a synonym for `test`) — not special
      syntax. Like any command, its arguments must be separated by spaces:

      ```bash
      [ -f "$file" ]    # correct: "[" receives "-f" and "$file" as args
      [-f "$file"]      # WRONG: shell tries to run a command named "[-f"
      ```

      You can confirm this with `type -a [`, which shows both the builtin
      and the external `/usr/bin/[` binary. Bash always uses the builtin.

      ### Common tests (Your Toolbox)

      | Test | Meaning |
      |------|---------|
      | `-f path` | Path exists and is a regular file |
      | `-z "$var"` | String is empty (zero length) |
      | `"$a" = "$b"` | Strings are equal |
      | `$x -eq $y` | Integers are equal |
      | `$x -gt $y` | Integer greater than |
      | `! condition` | Logical NOT |

      **Important:** use `-eq`, `-lt`, `-gt` for numbers; use `=` and `!=`
      for strings. Mixing them gives wrong results silently!

      ### Pro Tip: `[[ ]]` vs `[ ]`
      While `[ ]` is the standard POSIX way, Bash also provides `[[ ]]`. It is more powerful because:
      - It doesn't require quoting variables to prevent word splitting.
      - It supports Regex matching with `=~`.
      - It's less prone to subtle syntax errors.
      For Bash scripts, `[[ ]]` is generally preferred.

      ### Your task

      We are providing a skeleton file `health_check.sh`. To help you structure your thinking, we've left blanks (`_____`) where the tests should go. Look at the "Common tests" toolbox above to fill them in logically:

      1. First blank: We want to exit if the file does **not** exist. How do you negate a file existence check?
      2. Second blank: We want to mark CRITICAL if `error_count` is **greater than 3**.
      3. Third blank: We want to mark WARNING if `error_count` is **greater than 0**.

      ```bash
      chmod +x health_check.sh
      ./health_check.sh server_log.txt    # should report CRITICAL (4 errors)
      ./health_check.sh nonexistent.txt   # should print an error and exit 1
      ```
    files:
      - path: "health_check.sh"
        print_language: bash
        content: |
          #!/bin/bash
          set -e

          file="${1:-server_log.txt}"

          # Step 1: Check if the file exists
          if [ _____ ]; then
              echo "Error: $file not found" >&2
              exit 1
          fi

          # Step 2: Count ERROR lines
          error_count=$(grep -c "ERROR" "$file")

          # Step 3: Decide severity
          if [ _____ ]; then
              echo "CRITICAL: $error_count errors found"
          elif [ _____ ]; then
              echo "WARNING: $error_count errors found"
          else
              echo "OK: no errors found"
          fi
    open_file: "health_check.sh"
    tests:
      - description: "Reports errors for server_log.txt (which has 4 errors)"
        command: "bash health_check.sh server_log.txt | grep -qiE 'critical.*4|4.*error'"
      - description: "Exits with code 1 for a missing file"
        command: "! bash health_check.sh __does_not_exist__ 2>/dev/null"
      - description: "Error message for missing file goes to stderr"
        command: "bash health_check.sh __does_not_exist__ 2>&1 >/dev/null | grep -qi 'not found'"
      - description: "Uses -gt or -ge for numeric comparison"
        command: "grep -qE '\\-gt|\\-ge' health_check.sh"

    quiz:
      title: "Conditionals — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "Inside a Bash `if` statement, you want to check whether `server.log` has **more than 100 lines**. Which is syntactically correct?"
          options:
            - "`if [ $(cat server.log) -gt 100 ]`"
            - "`if [ $(wc -l < server.log) -gt 100 ]`"
            - "`if [ grep -c \"\" server.log -gt 100 ]`"
            - "`if | wc -l server.log > 100`"
          correct_index: 1
          explanation: "`$(wc -l < server.log)` uses command substitution and redirection to capture the **line count** as a plain integer for arithmetic comparison. Using `$(cat server.log)` would capture the file's entire *content*, not a count. The `grep -c` and pipe variants are syntactically invalid here — `[` is a command and its arguments must follow command syntax."

        - question: "Why are spaces **required** inside `[ ]` test brackets, like `[ -f \"$file\" ]`?"
          options:
            - "Bash style convention only — omitting spaces still works"
            - "`[` is an actual command, and its arguments must be separated by spaces like any command"
            - "Without spaces, the shell treats the entire bracket expression as a string"
            - "Spaces are only required when using string comparisons, not file tests"
          correct_index: 1
          explanation: "`[` is a shell builtin command (synonym for `test`) — not special syntax. Like any command, arguments must be separated by spaces. You can verify with `type -a [`, which shows both the builtin and the external `/usr/bin/[` binary; Bash uses the builtin by default."

        - question: "You want to compare two **integer** variables `$count` and `$max` in a Bash conditional. Which test is correct?"
          options:
            - "`[ \"$count\" = \"$max\" ]`"
            - "`[ $count == $max ]`"
            - "`[ $count -eq $max ]`"
            - "`[ $count === $max ]`"
          correct_index: 2
          explanation: "Bash uses **`-eq`, `-lt`, `-gt`, `-le`, `-ge`, `-ne`** for integer comparisons. The `=` and `==` operators do string comparison."

        - question: "**[Interleaved: Revisit Step 2]** Which operator is used to **append** output to an existing file without overwriting it?"
          options:
            - "`>`"
            - "`>>`"
            - "`|`"
            - "`<`"
          correct_index: 1
          explanation: "As we learned in Step 2, `>` overwrites a file, while `>>` appends to it. Both are forms of output redirection."

  - title: "Loops — Repeating Work"
    instructions: |
      Loops eliminate repetition. Let's look at iterating over globs (file expansions).

      ```bash
      for f in *.sh; do # expands to all matching filenames
          echo "Found: $f"
      done
      ```

      ### Accumulating totals

      A common pattern is keeping running counts across loop iterations using arithmetic expansion `$(( ... ))`:

      ```bash
      passed=0
      # ... inside loop:
      passed=$((passed + 1))
      ```

      ### Your task

      Write `batch_check.sh` from scratch. Combine your knowledge of variables, file expansion (`*.sh`), `head`, conditionals, and arithmetic expansion.

      **Requirements:**
      1. Initialize two variables tracking `passed` and `failed` counts.
      2. Loop over every `.sh` file in the current directory.
      3. For each file, read its first line and capture it in a variable. *(Hint: `first=$(head -1 "$f")`)*
      4. If that variable equals exacty `#!/bin/bash`, print `pass <filename>` and increment your `passed` counter. 
      5. Otherwise, print `fail <filename> (missing shebang)` and increment `failed`.
      6. After the loop, print: `Checked N files: P passed, F failed` (where N is passed + failed).

      ```bash
      chmod +x batch_check.sh
      ./batch_check.sh
      ```
    files:
      - path: "batch_check.sh"
        print_language: bash
        content: |
          #!/bin/bash
          set -e
      - path: "no_shebang.sh"
        print_language: bash
        content: |
          set -e

    open_file: "batch_check.sh"
    tests:
      - description: "Script uses a for or while loop"
        command: "grep -qE 'for |while ' batch_check.sh"
      - description: "Output includes a pass marker for morning.sh"
        command: "bash batch_check.sh | grep -E 'morning' | grep -qE 'pass|ok|OK|PASS'"
      - description: "Output includes a fail marker for no_shebang.sh"
        command: "bash batch_check.sh | grep -E 'no_shebang' | grep -qE 'fail|missing shebang'"
      - description: "Output includes a summary with a count"
        command: "bash batch_check.sh | grep -qiE 'Checked 6 files: 5 passed, 1 failed'"
      - description: "Script examines the first line of files (uses head)"
        command: "grep -qE 'head' batch_check.sh"

    quiz:
      title: "Loops — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "You write `for f in *.log; do wc -l $f; done`. One of the log files is named `error log.txt` (with a space). What happens when the loop processes it?"
          options:
            - "`wc` correctly counts the lines in `error log.txt`"
            - "The shell word-splits `$f` on the space, passing `error` and `log.txt` as two separate arguments"
            - "Bash automatically handles spaces in filenames when iterating with `for`"
            - "The loop silently skips any filenames that contain spaces"
          correct_index: 1
          explanation: "Without quotes, `$f` undergoes **word-splitting** on IFS characters (space, tab, newline). `wc - l error log.txt` becomes two arguments. The fix is always `\"$f\"`. This is the exact same quoting rule from the Variables step — it applies everywhere variables are used."

        - question: "In a `for f in *.sh` loop, when does the shell substitute `*.sh`?"
          options:
            - "Inside the loop body, each time `$f` is referenced"
            - "Before the loop runs — the shell expands `*.sh` to a list of matching filenames first"
            - "After the loop completes, to validate the filenames used"
            - "Only when running with `bash -e` safety flag enabled"
          correct_index: 1
          explanation: "Shell glob expansion happens **before** the loop executes. The shell replaces `*.sh` with the list of matching filenames, and the loop iterates over that fixed list."

        - question: "What does `$((counter + 1))` do in Bash?"
          options:
            - "Runs the command `counter + 1` and substitutes its output"
            - "Evaluates the integer arithmetic expression and substitutes the result"
            - "Concatenates the string `counter` with `+ 1`"
            - "Increments `counter` in place and returns the new value"
          correct_index: 1
          explanation: "`$(( ))` is **arithmetic expansion** — Bash evaluates the expression and substitutes the result as a string. The expression `$((counter + 1))` does **not** change `counter`; you must assign it back: `counter=$((counter + 1))`. Expressions that use assignment operators like `$((counter++))` or `$((counter += 1))` *do* modify the variable in place as a side effect, but for the simple `a + b` form shown here, you always assign back."

        - question: "**[Interleaved: Revisit Step 3]** Inside a loop, you use `wc -l $f`. If a file is named `data 2024.txt`, how does Bash interpret the unquoted `$f`?"
          options:
            - "It correctly processes the single file `data 2024.txt`"
            - "It word-splits the name into two separate arguments: `data` and `2024.txt`"
            - "It produces a syntax error because of the space"
            - "It automatically adds quotes to handle the space"
          correct_index: 1
          explanation: "As we learned in Step 3, unquoted variables undergo **word-splitting**. The space in the filename breaks it into two arguments, likely causing `wc` to fail. Always use `\"$f\"` to treat the value as a single unit."

  - title: "Arguments & Special Variables"
    instructions: |
      When you run `./script.sh one two three`, the shell sets special
      variables automatically:

      | Variable | Contains |
      |----------|----------|
      | `$0` | The script's own name (great for usage messages) |
      | `$1`, `$2`, ... | Positional arguments |
      | `$#` | Total number of arguments passed |
      | `$@` | All positional arguments (properly word-safe only when quoted as `"$@"`) |

      ### Looping over arguments

      `"$@"` expands to all arguments as separate, properly-quoted words. You can loop over them like this:

      ```bash
      for f in "$@"; do
          echo "Processing: $f"
      done
      ```

      ### Your task

      Now we remove the training wheels. Write `file_info.sh` completely from scratch. 

      **Requirements:**
      1. **Input Validation:** Check if the number of arguments (`$#`) is equal to 0. If it is, print a usage message (e.g., `echo "Usage: $0 <file1>..."`) and `exit 1`.
      2. **Iteration:** Loop over all arguments passed to the script using a `for` loop and `"$@"`.
      3. **Conditionals:** Inside the loop, for each file:
         - Check if it is a directory (`-d`). If so, print `<name>: directory`.
         - Otherwise, check if the file does NOT exist (`! -f`). If so, print `<name>: not found`.
         - Else (it's a real file), use `wc -l < "$f"` to count the lines and print `<name>: <N> lines`.

      *Tip: Think about the flow of data. Combine what you learned in the Conditionals step with the `for` loop shown above.*

      Test your script with:
      ```bash
      chmod +x file_info.sh
      ./file_info.sh server_log.txt morning.sh /tmp nope.txt
      ```
    files:
      - path: "file_info.sh"
        print_language: bash
        content: |
          #!/bin/bash
          set -e
          # Write your code below!

    open_file: "file_info.sh"
    tests:
      - description: "Shows usage and exits with code 1 when called with no arguments"
        command: "! bash file_info.sh 2>/dev/null && bash file_info.sh 2>&1 | grep -qi 'usage'"
      - description: "Reports 'not found' for a missing file"
        command: "bash file_info.sh __nope__ 2>&1 | grep -qi 'not found'"
      - description: "Reports 'directory' for /tmp"
        command: "bash file_info.sh /tmp | grep -qi 'directory'"
      - description: "Reports line count for an existing file"
        command: "bash file_info.sh server_log.txt | grep -qE '15 lines|server_log.*lines'"
      
    quiz:
      title: "Arguments & Special Variables — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "**[Revisit Step 4]** Your script receives a filename as `$1`. You want to check if the file exists before processing it. Which conditional is correct?"
          options:
            - "`if $1 -f; then`"
            - "`if [ -f \"$1\" ]; then`"
            - "`if exists \"$1\"; then`"
            - "`if file \"$1\"; then`"
          correct_index: 1
          explanation: "`-f` tests whether a path exists and is a regular file. `\"$1\"` must be quoted to safely handle filenames with spaces. Together `[ -f \"$1\" ]` is the standard idiom — applying the file-test knowledge from Step 4 to incoming script arguments."
        - question: "What does `$#` contain when a script is called as `./deploy.sh app v1.2`?"
          options:
            - "The string `app v1.2`"
            - "The number `2` (the count of arguments)"
            - "The number `3` (including the script name)"
            - "The exit code of the last command"
          correct_index: 1
          explanation: "`$#` is the **count of positional arguments**, not counting the script name (`$0`). For `./deploy.sh app v1.2`, `$#` is `2`."

        - question: "Why use `\"$@\"` (quoted) instead of `$@` (unquoted) when looping over arguments?"
          options:
            - "Quoting `$@` makes the loop run faster"
            - "Unquoted `$@` word-splits arguments containing spaces, potentially breaking them into separate words"
            - "Quoted `$@` includes the script name as the first element"
            - "There is no practical difference between `\"$@\"` and `$@`"
          correct_index: 1
          explanation: "Without quotes, `$@` is subject to word splitting. `\"$@\"` preserves each argument as a single unit, regardless of spaces."

  - title: "Functions — Reusable Building Blocks"
    instructions: |
      Functions let you name a block of code and call it anywhere, just like external commands.

      ```bash
      greet() {
          local name="$1"
          echo "Hello, ${name}!"
      }

      greet "engineer"   # → Hello, engineer!
      ```

      **Rule of Thumb:** Always use `local` for variables declared inside a function so they don't leak out and overwrite global variables. 
      Functions receive `$1`, `$2`, etc. independently of the script's own arguments.

      ### Return Values
      Functions exit with a numeric status code (0–255) set by `return`.
      By convention, `return 0` means success and any non-zero value means
      failure — which lets you use functions directly in `if` statements.
      You can return specific non-zero codes (e.g., `return 2` for bad
      arguments) to give callers richer information. To return *data*
      (strings, numbers), use `echo` inside the function and capture it
      outside with `$(...)` — `return` only carries an exit code, not data.

      ### Your task

      Write `toolkit.sh` and create these three functions:

      1. **`to_upper`**: Echoes its argument converted to uppercase.
         *(Tool hint: `echo "$1" | tr '[:lower:]' '[:upper:]'`)*
      2. **`file_ext`**: Echoes the file extension of its argument.
         *(Tool hint: `echo "${1##*.}"` strips everything up to the last dot)*
      3. **`is_number`**: Checks if its argument is a valid integer using the Regex test `[[ "$1" =~ ^-?[0-9]+$ ]]`. If true, `return 0`. Else, `return 1`.

      Write a small script below the functions to test them, ensuring they work!
    files:
      - path: "toolkit.sh"
        print_language: bash
        content: |
          #!/bin/bash
          set -e
          
    open_file: "toolkit.sh"
    tests:
      - description: "Defines at least three functions"
        command: "[ $(grep -cE '^[a-zA-Z_][a-zA-Z0-9_]*\\s*\\(\\)' toolkit.sh) -ge 3 ]"
      - description: "to_upper converts text to uppercase"
        command: "bash -c 'source toolkit.sh; to_upper hello' 2>/dev/null | grep -q 'HELLO' || bash toolkit.sh | grep -q 'HELLO'"
      - description: "is_number succeeds for a valid integer"
        command: "bash -c 'source toolkit.sh; is_number 42'"
      - description: "Uses 'local' for variable scoping"
        command: "grep -q 'local ' toolkit.sh"

    quiz:
      title: "Functions — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "**[Revisit Step 5]** A function `process_all` is called as `process_all file1.txt \"my report.txt\"`. Inside, it runs `for f in $@; do`. How many iterations does the loop perform?"
          options:
            - "2 — the two properly-separated arguments"
            - "3 — word-splitting on the space inside `my report.txt` creates a third element"
            - "1 — the entire argument list is treated as one string"
            - "0 — `$@` is empty inside functions; use `$*` instead"
          correct_index: 1
          explanation: "Without quotes, `$@` undergoes **word-splitting**, breaking `my report.txt` into `my` and `report.txt`. The fix is `\"$@\"` — the same quoting rule from the Variables step applies everywhere, including inside functions. Always write `for f in \"$@\"; do`."

        - question: "What problem does the `local` keyword solve inside a Bash function?"
          options:
            - "It makes the function run faster by caching its variables"
            - "It prevents a function's internal variables from leaking into and overwriting global script variables"
            - "It allows the function to accept more than 9 arguments"
            - "It makes the function available to child processes (subshells)"
          correct_index: 1
          explanation: "Without `local`, any variable set inside a function modifies the global scope. `local` constrains the variable to the function's scope."

        - question: "A function `count_words` should return a number to the caller. Which is the correct Bash pattern?"
          options:
            - "Use `return 42` and capture it with `result=$(count_words)`"
            - "Use `echo 42` inside the function and capture with `result=$(count_words)`"
            - "Use `return 42` and read it from `$?` with `result=$?`"
            - "Assign directly to a global variable inside the function"
          correct_index: 1
          explanation: "In Bash, `return` only carries exit codes (0–255). To pass **data** back, the function should `echo` the value and the caller captures it with `$(...)`."

  - title: "Case Statements & Exit Codes"
    instructions: |
      ### case — readable multi-way branching

      When you need to check one variable against many possible values,
      `case` is cleaner than `if/elif`:

      ```bash
      case "$input" in
          start)   echo "Starting..."  ;;
          stop)    echo "Stopping..."  ;;
          *)       echo "Unknown: $input" ;;
      esac
      ```

      ### Exit codes: the language of success and failure

      Every command exits with a number. **0 always means success**; any
      other value means failure. 

      ```bash
      exit 0    # success
      exit 1    # general error
      exit 2    # misuse / wrong arguments
      ```

      ### Your task

      Write `service.sh` — a simulated service controller. 
      Use a `case` statement to check the first argument `$1`.
      
      **Requirements:**
      - If `start` — print `Starting service...`, exit 0.
      - If `stop` — print `Stopping service...`, exit 0.
      - If `status` — check if `/tmp/my_service.pid` exists (`-f`).
        If yes: print `Service is running`, exit 0.
        If no: print `Service is stopped`, exit 1.
      - Anything else (or empty) — print usage instructions to stderr (`>&2`) and exit 2.

    files:
      - path: "service.sh"
        print_language: bash
        content: |
          #!/bin/bash
          set -e

    open_file: "service.sh"
    tests:
      - description: "Prints usage to stderr and exits 2 with no arguments"
        command: "bash service.sh 2>&1 >/dev/null | grep -qi 'usage' && exit_code=0; bash service.sh 2>/dev/null; exit_code=$?; [ $exit_code -eq 2 ]"
      - description: "'start' prints a start message and exits 0"
        command: "bash service.sh start | grep -qi 'start'"
      - description: "'status' reports whether the service is running or stopped"
        command: "bash service.sh status 2>&1 | grep -qiE 'running|stopped'"
      - description: "Script uses a case statement"
        command: "grep -q 'case' service.sh && grep -q 'esac' service.sh"

    quiz:
      title: "Case Statements & Exit Codes — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:
        - question: "Your script uses `set -e`. Inside a `case` branch you run `count=$(grep -c ERROR app.log)`. The file has **zero** errors, so `grep` exits with code 1. What happens?"
          options:
            - "The script continues with `count` set to 0"
            - "`set -e` triggers and the script exits immediately because `grep` returned non-zero"
            - "The `case` statement suppresses exit codes from sub-commands"
            - "Bash internally treats `grep -c` exit code 1 as a count of 1, not a failure"
          correct_index: 1
          explanation: "`grep -c` exits with **code 1** when it finds no matches — this is not a crash, it is the prescribed POSIX behavior for 'no matches'. But `set -e` treats *any* non-zero exit as fatal. FIX: `count=$(grep -c ERROR app.log || true)`. The `|| true` ensures the overall expression exits 0 even if grep finds nothing."

        - question: "A function `count_errors` should return a **large number** to the caller. A teammate writes `return $(grep -c ERROR log.txt)`. What is the bug?"
          options:
            - "Nothing — `return` can carry any integer value"
            - "`return` only carries exit codes (0–255); counts above 255 are silently truncated"
            - "`grep -c` is not allowed inside Bash functions"
            - "`return` requires a string argument, not a number"
          correct_index: 1
          explanation: "Bash's `return` carries only a numeric **exit code** in the range 0–255. A count of 300 would be silently truncated to 44 (300 mod 256). To return data from a function, use `echo` inside the function and capture with `result=$(count_errors file.log)`."

        - question: "In a Bash `case` statement, what does the `*` pattern in the last branch do?"
          options:
            - "It matches only numeric input"
            - "It acts as a wildcard catch-all, matching any input not matched by earlier branches"
            - "It is a syntax error — `case` does not support wildcards"
            - "It matches the empty string only"
          correct_index: 1
          explanation: "`*` in a `case` branch acts as a **catch-all default**, matching any value that didn't match the earlier patterns."

        - question: "What is the universal meaning of **exit code 0** in Unix/Linux?"
          options:
            - "The script ran but produced no output"
            - "The command or script succeeded without errors"
            - "The script exited before finishing all commands"
            - "Zero is falsy — it means the condition was false"
          correct_index: 1
          explanation: "Exit code **0 always means success** in Unix. Non-zero values indicate failure. This contrasts with how most languages evaluate boolean truthiness in code (where `0` is false and non-zero is true), even though languages like C and Java also use `return 0` / `exit(0)` to indicate process success to the OS."

        - question: "**[Interleaved: Revisit Step 6]** Which special variable contains the **number of arguments** passed to the script?"
          options:
            - "`$@`"
            - "`$#`"
            - "`$0`"
            - "`$*`"
          correct_index: 1
          explanation: "As we practiced in Step 6, `$#` gives you the count of arguments, which is essential for input validation before your script starts its work."

  - title: "Build a Log Monitor"
    instructions: |
      Time to combine everything into a real tool. This is a **retrieval practice** exercise: you have all the knowledge, now you must retrieve it from memory and synthesize it.

      ### Challenge

      Write `monitor.sh` — a log-monitoring tool that analyzes
      `server_log.txt` and produces a complete status report.

      **Requirements:**

      1. Accept an optional filename argument. If not provided, default to `server_log.txt`.
      2. Validate that the file exists; if not, print to stderr and exit.
      3. Print a header: `=== Log Monitor Report ===`
      4. **Summary section:**
         - Find the total number of entries
         - Find the count of `ERROR` entries
      5. **Error details:** Print the actual text of the lines containing `ERROR`.
      6. Exit with code 0 if no errors are found, and code 1 if errors are present.

      ### Design Approach
      Don't just write code immediately. In learning science, planning reduces cognitive load. 
      Sketch your script out in comments first:

      ```bash
      # 1. Handle arguments and default file
      # 2. Check if file exists
      # 3. Print Header
      # 4. Calculate counts using grep/wc
      # ...
      ```
      Once your structure is clear, write the bash code.
    files:
      - path: "monitor.sh"
        print_language: bash
        content: |
          #!/bin/bash
          set -e
          
    open_file: "monitor.sh"
    tests:
      - description: "Script is executable"
        command: "[ -x monitor.sh ]"
      - description: "Report header is displayed"
        command: "bash monitor.sh 2>&1 | grep -qi 'log monitor\\|report'"
      - description: "Shows total entry count"
        command: "bash monitor.sh 2>&1 | grep -qE '15|[Tt]otal'"
      - description: "Shows ERROR count"
        command: "bash monitor.sh 2>&1 | grep -qi 'ERROR'"
      - description: "Displays error details"
        command: "bash monitor.sh 2>&1 | grep -qE 'timeout|upstream|memory|failed'"
      - description: "Exits with code 1 when errors are present"
        command: "bash monitor.sh; [ $? -eq 1 ]"

    quiz:
      title: "Shell Scripting Mastery — Final Comprehensive Review"
      min_score: 0.8
      shuffle: true
      questions:
        - question: |
            **[Interleaved: Revisit Step 1]** **Scenario:** A script performs two steps: 1) Downloads a database dump, 2) Wipes the current database to prepare for import. 
            The download step fails because the network drops. 
            **Question:** If you forgot to include `set -e` at the top of this script, what catastrophic event will happen next?
          options:
            - "The script will pause and wait for the network to return"
            - "The script will continue and wipe the current database despite having no new data to import"
            - "Bash will automatically detect the failure and stop the script"
            - "The second step will be skipped automatically"
          correct_index: 1
          explanation: "Without `set -e`, Bash continues to the next line even if a previous command failed. This can lead to data loss if a destructive command (like wiping a DB) runs after a failed prerequisite (like downloading a backup)."

        - question: |
            **[Interleaved: Revisit Step 2]** **Scenario:** You need to find out how many times a user named "admin" triggered a "WARN" event. 
            **Question:** Write a pipeline that first filters `server.log` for lines containing "WARN", then pipes that into a second `grep` for "admin", and finally counts those resulting lines.
          options:
            - "`grep \"WARN\" admin server.log | wc -l`"
            - "`grep \"WARN\" server.log | grep \"admin\" | wc -l`"
            - "`cat server.log > grep \"WARN\" | grep \"admin\" > wc -l`"
            - "`grep \"WARN\" | grep \"admin\" < server.log | wc -l`"
          correct_index: 1
          explanation: "Pipes (`|`) pass the output of one command as the input to the next. This sequence correctly narrows down the lines step-by-step."

        - question: |
            **Scenario:** A junior developer on your team wrote a script to set up a database connection. It fails immediately with the error: `line 3: DB_PORT: command not found`.
            ```bash
            #!/bin/bash
            DB_HOST=\"localhost\"
            DB_PORT = \"5432\"
            ```
            **Question:** Identify the exact syntax error on line 3 and explain why Bash thinks `DB_PORT` is a command.
          options:
            - "The quotes around \"5432\" are not needed for numbers"
            - "Spaces around the `=` sign cause Bash to treat `DB_PORT` as a command name and `=` as its first argument"
            - "The variable name `DB_PORT` must be lowercase"
            - "Line 3 is missing a semicolon"
          correct_index: 1
          explanation: "In Bash assignment, there **must be no spaces** around the `=` sign. Adding spaces makes Bash think you are trying to execute a program named `DB_PORT`."

        - question: |
            **Scenario:** Your deployment script checks for configuration files using this logic:
            `if [ -d \"app_config\" ]; then echo \"Config found!\"; fi`
            You know for a fact that `app_config` exists in the folder as a standard text file. 
            **Question:** Will the script print \"Config found!\"? Why or why not? What flag should be used instead?
          options:
            - "Yes, because `-d` stands for 'data exists'"
            - "No, because `-d` specifically checks for a **directory**. Use `-f` for a regular file."
            - "Yes, because Git treats all files as directories internally"
            - "No, because you need to use `[[ ... ]]` for file checks"
          correct_index: 1
          explanation: "`-d` tests if a path is a directory. To check if a path is a regular file, use `-f`."

        - question: |
            **Scenario:** You wrote a script to process user uploads: `for f in *.csv; do wc -l $f; done`. 
            A user uploads a file named `Q1 Financial Report.csv`. 
            **Question:** Because you forgot to quote `$f`, what three distinct \"files\" will the `wc -l` command try (and fail) to look for?
          options:
            - "`Q1`, `Financial`, and `Report.csv`"
            - "`Q1 Financial`, `Report`, and `.csv`"
            - "It will only fail on the spaces, not the words"
            - "Bash will automatically escape the spaces"
          correct_index: 0
          explanation: "Without quotes, Bash performs **word-splitting** on the expanded variable. It treats the spaces as delimiters, passing three separate arguments to `wc`."

        - question: |
            **Scenario:** You are writing a deployment script that *must* receive exactly three arguments to work safely: `<environment> <version> <region>`.
            **Question:** Using the special variable `$#`, which `if` condition will trigger an error if the user provides too few or too many arguments?
          options:
            - "`if [ $# -eq 3 ]; then`"
            - "`if [ $# -ne 3 ]; then`"
            - "`if [ args != 3 ]; then`"
            - "`if [ $1 -and $2 -and $3 ]; then`"
          correct_index: 1
          explanation: "`$#` is the count of arguments. `-ne` (not equal) is used to detect if the count is anything other than the required 3."

        - question: |
            **Scenario:** Trace the output of the following script.
            ```bash
            target_dir=\"/var/www/html\"
            setup_temp() {
              target_dir=\"/tmp/workspace\"
              echo \"Setting up $target_dir\"
            }
            setup_temp
            echo \"Deploying to $target_dir\"
            ```
            **Question:** Because the developer forgot the `local` keyword inside the function, what will the final `echo` statement print?
          options:
            - "Deploying to /var/www/html"
            - "Deploying to /tmp/workspace"
            - "Deploying to (empty string)"
            - "The script will crash with a scope error"
          correct_index: 1
          explanation: "Without `local`, variables inside functions are **global** by default. Reassigning `target_dir` inside the function overwrites the outside variable."

        - question: |
            **Scenario:** You have a script running on a server every night to back up logs. If the backup fails, you want your monitoring dashboard to trigger a pager alert. 
            **Question:** What specific command must be executed at the end of your script's error-handling block to ensure the monitoring system knows the script failed?
          options:
            - "`echo \"FAILURE\"`"
            - "`exit 1` (or any non-zero code)"
            - "`return 0`"
            - "`stop script`"
          correct_index: 1
          explanation: "Monitoring systems and CI/CD pipelines rely on **exit codes**. A code of `0` means success; any non-zero code (usually `1`) signals a failure."

        - question: |
            **Scenario:** You are reading a colleague's script and see this line: `LOG_LEVEL=\"${1:-INFO}\"`.
            **Question:** If you run the script as `./start.sh DEBUG`, what is the value of `LOG_LEVEL`? (And what if you run it with no arguments?)
          options:
            - "`DEBUG` (and `INFO` if no arguments)"
            - "`INFO` (and `DEBUG` if no arguments)"
            - "`${1:-INFO}` (it treats it as literal text)"
            - "It depends on the user's environment variables"
          correct_index: 0
          explanation: "The `${var:-default}` syntax provides a fallback. If `$1` is provided, it uses that; otherwise, it uses 'INFO'."

        - question: |
            **Scenario:** You wrote a script with `set -e` enabled. It checks a log file for errors: `error_count=$(grep -c \"ERROR\" server.log)`. 
            Your server had a perfect day; there are zero errors in the log. However, your CI/CD pipeline reports that your script crashed. 
            **Question:** Explain why a perfect log file caused `set -e` to kill your script.
          options:
            - "Bash cannot handle a variable containing the character '0'"
            - "When `grep` finds zero matches, it exits with code 1. `set -e` sees this non-zero exit and immediately kills the script."
            - "The `$(...)` syntax is incompatible with `set -e`"
            - "Zero-length strings are treated as fatal errors in Bash"
          correct_index: 1
          explanation: "`grep` returns code 0 if found, and code 1 if not found. To fix this, use `error_count=$(grep -c \"ERROR\" server.log || true)`."
