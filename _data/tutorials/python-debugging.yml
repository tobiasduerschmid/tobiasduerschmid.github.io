    quiz:
      title: "Case 1 — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            Which of these would be a **root-cause fix** for this bug, as opposed to a workaround?
          type: single
          options:
            - "Change the failing test to use `max_steps=11` so it passes"
            - "Edit `BATTERY_LIMIT_MAZE` to add an extra row of open cells"
            - "Move the `if current == goal:` check to run before the cutoff check"
            - "Catch the `None` return in `find_path` and re-run DFS with `max_steps + 1`"
          correct_index: 2
          option_feedback:
            0: "This makes the test pass without changing the code's behavior — the same bug would still reject any future user who calls `find_path` with the exact required budget. That's a workaround, not a fix."
            1: "Editing the data makes the bug invisible for *this* maze. The next maze with a path equal to its budget would have the same problem. That's a workaround."
            3: "Calling DFS twice is more code, doesn't address why the first call rejected a valid path, and is twice as slow. The actual bug — wrong check ordering in `_dfs` — is still present."
          explanation: |
            The root cause is the *order* of the two early checks in `_dfs`. Reordering them is a one-line, minimal change that addresses the cause directly. Every other option here is a workaround: it makes the symptom disappear without fixing the underlying logic.

        - question: |
            A student fixes `_dfs` by loosening the cutoff to `steps_used > max_steps` instead of swapping the check order. The `test_path_found_when_battery_limit_is_exact` test now passes. Is this a correct fix?
          type: single
          options:
            - "Yes — it works for this case, so it is correct"
            - "No — it accepts paths that *exceed* the budget. `test_path_rejected_when_battery_too_small` would now fail, because a path longer than `max_steps` would no longer be rejected."
            - "Yes — `>` and `>=` are interchangeable in boundary checks"
            - "No — we should have used `<` instead"
          correct_index: 1
          option_feedback:
            0: "Making one test pass is not the same as fixing the bug. `steps_used > max_steps` means the cutoff fires only when `steps_used` *exceeds* the budget — so a path of length `max_steps + 1` would be accepted. Try the `test_path_rejected_when_battery_too_small` test with this 'fix' applied."
            2: "`>` and `>=` differ at exactly the boundary value — the very value this bug is about. `steps_used >= max_steps` rejects `steps_used == max_steps`; `steps_used > max_steps` accepts it. They are not interchangeable when the boundary case is the target."
            3: "`steps_used < max_steps` inverts the cutoff entirely, accepting any path that used *fewer* steps than the budget and rejecting everything at or above. That would reject even the small-maze two-step path."
          explanation: |
            The root-cause fix is **check ordering** — goal first, cutoff second — not loosening the comparator. Loosening `>=` to `>` makes the exact-budget test pass but breaks the under-budget-rejection test, because a path one step over budget is now accepted. A fix that passes the newly-passing test while breaking a previously-passing test is a **regression**, not a fix. This is exactly why Verify means rerunning the *whole* suite.

        - question: |
            *True or false:* Once you've fixed the boundary bug in `_dfs`, you can verify the fix is correct by rerunning **only** `test_path_found_when_battery_limit_is_exact` (the previously failing test).
          type: single
          options:
            - "True — the other tests already passed, so they're fine"
            - "False — verify means rerun all tests, including the ones that were already green, to catch regressions"
          correct_index: 1
          option_feedback:
            0: "Fixing one test can break another — `test_path_rejected_when_battery_too_small` is exactly the kind of case a too-aggressive fix could break. The only reliable verification is rerunning the entire suite."
          explanation: |
            **Verification means rerunning the whole suite.** Specifically: after the goal-first fix, `test_path_rejected_when_battery_too_small` (max_steps=9) must still pass. If you accidentally over-loosen the cutoff, this test will catch you — but only if you rerun it.


