      - path: "checkout_app/checkout_service.py"
        language: "python"
        content: |
          from __future__ import annotations

          from .models import (
              CheckoutReceipt,
              DomainEvent,
              EventKind,
              OrderDraft,
              OutOfStockError,
          )


          class CheckoutService:
              """Coordinates payment, inventory, event publication, and receipts."""

              def __init__(self, catalog, promotions, payment_gateway, inventory, bus):
                  self._catalog = catalog
                  self._promotions = promotions
                  self._payment_gateway = payment_gateway
                  self._inventory = inventory
                  self._bus = bus
                  self._next_order_number = 1000

              def checkout(self, request):
                  order = self._create_order_draft(request)
                  authorization = self._payment_gateway.authorize(order.order_id, order.amount_cents)
                  self._bus.publish(DomainEvent(EventKind.PAYMENT_AUTHORIZED, order.order_id, authorization))

                  try:
                      reservation = self._inventory.reserve(order.order_id, order.items)
                  except OutOfStockError:
                      self._bus.publish(DomainEvent(EventKind.ORDER_REJECTED, order.order_id, request.items))
                      raise

                  self._bus.publish(DomainEvent(EventKind.INVENTORY_RESERVED, order.order_id, reservation))
                  self._payment_gateway.capture(authorization)
                  self._bus.publish(DomainEvent(EventKind.ORDER_CONFIRMED, order.order_id, reservation))
                  return CheckoutReceipt(
                      order_id=order.order_id,
                      amount_cents=order.amount_cents,
                      authorization_id=authorization.authorization_id,
                      reservation_id=reservation.reservation_id,
                  )

              def _create_order_draft(self, request):
                  self._next_order_number += 1
                  amount = self._catalog.price_items(request.items)
                  amount = self._promotions.apply_coupon(amount, request.coupon_code)
                  return OrderDraft(
                      order_id=f"order-{self._next_order_number}",
                      customer_id=request.customer_id,
                      items=request.items,
                      amount_cents=amount,
                  )

