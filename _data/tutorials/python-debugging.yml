        language: "python"
        content: |
          """Ledger reconciliation case study.

          This program has a deliberately seeded reconciliation bug. The point of
          the case is to use conditional breakpoints and `repr()` to localize it.
          """

          import csv
          import logging
          from dataclasses import dataclass
          from decimal import Decimal

          logger = logging.getLogger(__name__)

          VALID_KINDS = {"DEPOSIT", "WITHDRAWAL", "REFUND", "REVERSAL", "FEE"}


          @dataclass(frozen=True)
          class Transaction:
              id: str
              account: str
              kind: str
              amount_cents: int


          def parse_money(text):
              """Convert a dollars-and-cents string to integer cents."""
              return int(Decimal(text) * 100)


          def load_transactions(path):
              transactions = []
              with open(path, newline="", encoding="utf-8") as csv_file:
                  reader = csv.DictReader(csv_file)
                  for row in reader:
                      transactions.append(
                          Transaction(
                              id=row["id"],
                              account=row["account"],
                              kind=row["type"].upper(),
                              amount_cents=parse_money(row["amount"]),
                          )
                      )
              return transactions


          def apply_transaction(balances, tx):
              before = balances.get(tx.account, 0)

              if tx.kind == "DEPOSIT":
                  after = before + tx.amount_cents
              elif tx.kind == "WITHDRAWAL":
                  after = before - tx.amount_cents
              elif tx.kind == "FEE":
                  after = before - tx.amount_cents
              elif tx.kind == "REFUND":
                  after = before + tx.amount_cents
              elif tx.kind == "REVERSAL":
                  after = before + tx.amount_cents
              else:
                  # Realistic but dangerous legacy behavior: old exports used blank
                  # types for card charges, so unknown types are treated as
                  # withdrawals.
                  after = before - tx.amount_cents

              balances[tx.account] = after


          def reconcile(transactions):
              balances = {}
              for tx in transactions:
                  apply_transaction(balances, tx)
              return balances

