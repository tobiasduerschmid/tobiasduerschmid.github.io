title: "Debugging Python: From Symptom to Fix"
description: "Learn debugging as a distinct, learnable skill — not as accidental tinkering. You'll work three real Python bugs (recursive boundary, data-representation, temporal ordering) using a hypothesis-driven process and the time-travel debugger's breakpoints, conditional breakpoints, watch expressions, and history scrubber. Ends with an interleaved triage drill and an independent transfer challenge."

# Authoring-time Bloom-verb objectives. Not yet rendered to students.
learning_objectives:
  - "Apply hypothesis-driven debugging: predict, observe, narrow, fix — *no edit happens before stage 6*."
  - "Use the time-travel debugger's tools (breakpoints, conditional breakpoints, watch expressions, history scrubber) to investigate state changes without re-running the program."
  - "Distinguish four bug families (algorithmic boundary, data representation, temporal/state, wiring/protocol) and select the right tool for each."
  - "Recognize and avoid workaround fixes (defensive guards, hardcoded outputs, weakened tests) that mask root causes."
  - "Evaluate which debugging technique fits a given symptom, and explain why."

backend: pyodide
linter: true  # live pyflakes diagnostics in the Monaco gutter
debugger: true
pytest: true

debugger_options:
  back_in_time: true
  max_history: 20000
  snapshot_depth: 4
  filter_globals: true

require_tests: true
autosave_type: files
editor_split: true
output_height: "30%"

# Live git visualization next to the editor — students can commit each
# debugging cycle (symptom → fix → verify) and watch the DAG grow as they
# work through cases. The embedded terminal accepts a small set of git
# commands.
git_graph: /tutorial
git_setup:
  - "git config user.name 'Student'"
  - "git config user.email 'student@example.com'"

setup_commands:
  - "import pyodide_js; await pyodide_js.loadPackage('pytest')"
  - "import sys; sys.path.insert(0, '/tutorial')"
  - |
    import pytest as _pytest, sys as _sys
    def _make_pytest_patch():
        _orig = _pytest.main
        _sysmod = _sys
        _ours = ('greet','pathfinder','maze_data','ledger','waitlist','tagger','tour','checkout_main')
        def _patched(*a, **kw):
            for m in list(_sysmod.modules):
                if (m.startswith('test_')
                        or m in _ours
                        or m == 'checkout_app'
                        or m.startswith('checkout_app.')):
                    del _sysmod.modules[m]
            return _orig(*a, **kw)
        return _patched
    _pytest.main = _make_pytest_patch()

steps:

  # ===========================================================================
  # STEP 1 — The Debugging Process (worked example on a tiny off-by-one bug)
  # Pedagogy:
  #   Worked example       — instructor narrates each stage of the cycle.
  #   Generation effect    — predict outputs before running.
  #   Retrieval practice   — quiz at end requires recalling the 7 stages.
  #   Bloom's level        — Understand / Apply.
  # ===========================================================================
  - title: "The Debugging Process"
    instructions: |
      > 🎯 **Goal:** Apply the 7-stage debugging cycle to a tiny off-by-one bug.

      ### 📖 Recap from lecture: the four phases of debugging

      Lecture 10 framed debugging as a **systematic process** with four phases:

      1. **Investigating symptoms** to *reproduce the bug*
      2. **Locating** the faulty code
      3. **Determining the root cause** of the bug
      4. **Implementing and verifying** a fix

      Inside that frame, each phase has its own moves. The 7-stage cycle below is the *zoomed-in* version of those four phases — same process, more resolution. The four phases tell you *what* to do; the seven stages tell you *how*.

      | Lecture phase | This tutorial's stages |
      | --- | --- |
      | 1. Investigate symptoms / Reproduce | **Symptom** + **Predict** + **Evidence** |
      | 2. Locate the faulty code | **Localize** |
      | 3. Determine root cause | **Hypothesis** |
      | 4. Implement & verify fix | **Fix** + **Verify** |

      ### 🐞 Lecture vocabulary you should keep straight

      The lecture distinguished three terms that get sloppily blurred in everyday speech:

      | Term | Definition | Where it lives |
      | --- | --- | --- |
      | **Fault** | The erroneous *location in the code* (e.g., `range(1, ...)` skipping index 0). | In source code. |
      | **Error** | An *incorrect program state* during execution (e.g., the loop variable `i` starts at the wrong value). | In memory at runtime. |
      | **Failure** | The observed *outside behavior* (e.g., `greet([\"Ada\", \"Linus\", \"Grace\"])` returns `\"Hello, Linus, Grace!\"` instead of including Ada). | What the user / test sees. |

      Flow: **Fault** → (program execution) → **Error** → (error reaches the system boundary) → **Failure**.

      A useful question the lecture leaves you with: *"How can we prevent this error from becoming a failure?"* — assertions and defensive checks are exactly that prevention. The bug you're about to fix demonstrates this chain end-to-end.

      ### 🔄 The hypothesis-driven cycle (refines the lecture's 4 phases)

      The process below is what the research calls a **hypothesis-driven debugging cycle**. It applies to every bug you'll ever fix.

      If you currently *tinker* (edit, run, hope, repeat), that's the default everyone starts with — including most professional engineers under pressure. The cycle below is what replaces it. You aren't expected to internalize it *yet*; you'll practice it across the next seven steps.

      ```mermaid
      flowchart TD
          A[1. Symptom — what's wrong?] --> B[2. Predict — what should the state be?]
          B --> C[3. Evidence — collect data with the right tool]
          C --> D[4. Hypothesis — one sentence cause]
          D --> E[5. Localize — first wrong line]
          E --> F[6. Fix — minimal change]
          F --> G[7. Verify — rerun ALL tests]
      ```

      No edit happens until stage 6. That's the central discipline.

      <details markdown="1"><summary>📋 Reproducing the bug — what the lecture said about Step 1</summary>

      The lecture spent extra time on the *first* phase ("Reproduce the bug") because everything downstream depends on it. Two pieces to reproduce:

      - **Problem environment** — the *setting* in which the bug occurs: hardware, OS, settings, runtime dependencies, software versions. Try to re-create it on a different machine.
      - **Problem history** — the *steps* needed to recreate the failure: the sequence of data inputs, user interactions, communications with other components. Plus timing, randomness, physical influences.

      And whenever possible, **write an automated bug reproduction test** — a test that fails on the bug and passes after the fix. Run it repeatedly during debugging so "did I fix it yet?" is one click, not five minutes of manual reproduction. After the fix, *keep* the test in the suite for **regression testing** — re-running existing tests after later code changes to make sure the bug doesn't sneak back in.

      In this tutorial the bug reproduction is already automated for you (the failing pytest test *is* the reproduction). Notice that we never click "I think I fixed it" without re-running the test — that's the lecture's discipline in action.

      Reference: Andreas Zeller, *Why Programs Fail – A Guide to Systematic Debugging* (2009).

      </details>

      ### 📂 What you have

      Two files: `greet.py` (production code, has a bug) and `test_greet.py` (three pytest tests, one of which fails). Don't run anything yet.

      ### 🔍 1. Symptom — predict, then run

      Open `greet.py`. Read it. Predict what each of these returns:

      - `greet(["Ada", "Linus", "Grace"])`
      - `greet([])`
      - `greet(["Solo"])`

      Now click **Run**. Read the failing assertion — the mismatch *is* the symptom. State it in your own words.

      ### 🧠 2. Predict the state

      Before opening the debugger, predict: at the moment the loop body first executes, what should `i` be? What is `names[i]` supposed to be? Hold the answer.

      ### 🔬 3. Evidence — your first breakpoint

      A breakpoint is already set on line 4 (the `for` line). Click **Debug** (next to Run). Execution pauses *before* the marked line runs. The **Variables** tab shows `names`. The **Watch** tab is empty — add `i` to it (you'll see `<not yet defined>` since the loop hasn't started).

      Now click **Step Over** (F10) once. The loop has started one iteration. Look at `i` in Watch. Look at `names[i]`. Compare with your prediction.

      ### 🔎 4. Hypothesis (one sentence)

      Don't fix yet. Write your hypothesis as a single sentence — *what* is wrong and *where* it lives.

      <details><summary>Compare with a sample sentence</summary>

      *"The loop starts at index 1, so `names[0]` is never appended to `parts`."*

      Did yours name *which iteration* is wrong and *what consequence* follows? That's the schema.
      </details>

      ### 📍 5. Localize

      Three candidates: the test, the `return`, the `range(...)`. Pick the **first divergence** — the earliest line whose behavior contradicts your hypothesis. Justify in one sentence why the other two are not it.

      ### 🩹 6. Minimal fix

      Now you may edit. **Smallest possible change.** Don't refactor the whole function. Don't add a special case for empty lists. Just fix the iteration range.

      ### ✅ 7. Verify

      Click **Run**. *All three* tests must pass — the one that was failing AND the two that already passed. Verification means *no regressions*. Confusing those is the **local-verification** trap.

    files:
      - path: "greet.py"
        language: "python"
        content: |
          def greet(names):
              parts = ["Hello"]
              for i in range(1, len(names)):
                  parts.append(names[i])
              return ", ".join(parts) + "!"

      - path: "test_greet.py"
        language: "python"
        content: |
          from greet import greet


          def test_three_names_all_appear():
              assert greet(["Ada", "Linus", "Grace"]) == "Hello, Ada, Linus, Grace!"


          def test_empty_list_just_says_hello():
              assert greet([]) == "Hello!"


          def test_single_name_appears():
              assert greet(["Solo"]) == "Hello, Solo!"

    open_file: "greet.py"
    run_file: "test_greet.py"

    solution:
      files:
        - path: "greet.py"
          language: "python"
          content: |
            def greet(names):
                parts = ["Hello"]
                for i in range(0, len(names)):
                    parts.append(names[i])
                return ", ".join(parts) + "!"
      explanation: |
        Fix is `range(0, len(names))` (or `range(len(names))`).

        Notice: we didn't *also* refactor to `for name in names:` even though that's nicer. A bug fix is not a license to clean up the surrounding code. Smaller fixes are safer to review and easier to revert if they introduce a new problem.

    tests:
      - description: "All three tests pass"
        command: |
          import pytest, io, sys
          old = sys.stdout; sys.stdout = buf = io.StringIO()
          code = pytest.main(['/tutorial/test_greet.py', '-v', '--tb=short', '--no-header'])
          sys.stdout = old; output = buf.getvalue(); print(output)
          assert code == 0, f"Some tests still fail. pytest output:\n\n{output}\n\nRead the failing assertion: which name is missing? Use that observation as your Symptom, then open the debugger."
        hints:
          - title: "Small nudge"
            text: "Look carefully at the `range(...)` call. What's the first index it produces?"
          - title: "Strategic hint"
            text: "Trace `greet([\"Ada\", \"Linus\", \"Grace\"])` by hand. What value of `i` does the first iteration use? What index *should* it use to include `\"Ada\"`?"
            condition: "code_contains: range(1, len"
          - title: "Spoiler — full fix"
            text: "Change `range(1, len(names))` to `range(0, len(names))` (or `range(len(names))`). The original skipped index 0."
            condition: "code_contains: range(1, len"

      - description: "Workaround guard — test file unchanged"
        command: |
          source = open('/tutorial/test_greet.py').read()
          assert '"Hello, Ada, Linus, Grace!"' in source, \
              "Don't change the test file — production code is what we change. Revert `test_greet.py`."
          assert '"Hello!"' in source, \
              "Don't change the test file — production code is what we change. Revert `test_greet.py`."

    quiz:
      title: "The Debugging Process — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            A teammate says: *"I added `print(repr(x))` and saw the value had a leading space."*

            Which stage of the debugging cycle is this?
          type: single
          options:
            - "Hypothesis"
            - "Evidence collection"
            - "Localize"
            - "Verification"
          correct_index: 1
          option_feedback:
            0: "A hypothesis is a *one-sentence proposed cause* (e.g., \"the input has invisible whitespace\"). Adding a `print` and observing a value is the *evidence* you'd use to test such a hypothesis."
            2: "Localize is identifying the *line* where intended and actual diverge. Observing a value reveals *what* is wrong; localization is the next move (which line first produced this value?)."
            3: "Verification is rerunning the test suite *after* a fix. The `print(repr(x))` happened before any edit, so it's earlier in the cycle."
          explanation: |
            Adding instrumentation and observing values is **evidence collection** (stage 3). The hypothesis comes *after* you have evidence — and the fix and verification come later still. Naming the stage you're in helps you avoid skipping straight to fixing.

        - question: |
            A student fixes their failing test, runs `pytest test_failing.py` (just that one file) and sees green. They mark the bug fixed and move on. What stage did they skip?
          type: single
          options:
            - "Verification — they should rerun **all** tests, not only the previously failing one"
            - "Hypothesis — they should have written down their proposed cause first"
            - "Localization — they should have identified the exact line"
            - "Nothing — running the previously-failing test is sufficient verification"
          correct_index: 0
          option_feedback:
            1: "Hypothesis is important, but the student got past it — they identified a fix that worked. The skip happened *after* the fix, when they didn't rerun the rest of the suite."
            2: "Localization happened — they fixed something. The skip was *after* the fix, in the verification phase."
            3: "This is the **local-verification trap** — judging the whole program by checking only the part you just touched. A fix can break tests that were previously passing, and the only way to catch that is rerunning the whole suite."
          explanation: |
            Verification means rerunning the **entire** test suite — including tests that previously passed. A fix in one place can introduce a regression somewhere else, and that's exactly the kind of regression a quick "did the failing test go green?" check will miss.

        - question: |
            A debugger user types `len(parts)` into the Watch panel during a paused session and sees `2`, when they expected `3`. Which stage of the cycle is this?
          type: single
          options:
            - "Predict"
            - "Evidence"
            - "Localize"
            - "Verify"
          correct_index: 1
          option_feedback:
            0: "Predict happens *before* the debugger pauses — it's holding a value in your head. Watching a live value during a pause is collecting *evidence* against the prediction."
            2: "Localize is identifying the line where intended and actual diverge. Watching a value confirms a *value* is wrong; localization is the next move (which line first produced this value?)."
            3: "Verify happens *after* a fix — rerunning the test suite. The student here hasn't fixed anything yet; they're still gathering data."
          explanation: |
            Reading a watched value during a pause is **evidence collection**. Predict happens upstream (before the run); Localize and Verify happen downstream (after a hypothesis or fix). Naming the stage you're in is what keeps the cycle from collapsing into tinkering.

        - question: |
            `total(items)` returns $5 too high for one user. You discover the discount-loading function reads the wrong database column, so that user's discount is never applied.

            Which is the *symptom* and which is the *cause*?
          type: single
          options:
            - "Symptom: discount-loading reads wrong column. Cause: total is $5 too high."
            - "Symptom: total is $5 too high. Cause: discount-loading reads wrong column."
            - "They are the same thing — the user's bill is wrong."
            - "Neither — both are bugs and need separate fixes."
          correct_index: 1
          option_feedback:
            0: |
              **This is the canonical symptom-vs-cause swap.** Calling the column-read the *symptom* would push you to "fix" the visible total (`if user_id == BAD_USER: total -= 5`) — and leave the actual broken function untouched. Every other user who hits the same column read still gets wrong totals; the next column rename will silently break it again. The thing the user *experiences* is the symptom; the thing in the code that *produces* it is the cause. Mixing them up is exactly how programs accumulate `if BAD_USER` patches that no one understands six months later.
            2: "Symptom and cause are different concepts. The symptom is what you observe (a wrong total). The cause is the broken thing that produces the symptom (the wrong column)."
            3: "There is one root cause (the wrong column) producing one symptom (the wrong total). Treating them as separate bugs leads to symptom-patching — e.g., subtracting $5 from the total — without fixing the actual problem."
          explanation: |
            The symptom is what you *observe* (the wrong total). The cause is the *reason* it happens (the discount-loading function reading the wrong column). Symptom-patching — e.g., inserting a special `if user_id == BAD_USER: total -= 5` check — would make one test green without fixing the underlying bug, and would fail on any other user affected by the same column read.


  # ===========================================================================
  # STEP 2 — Debugger Tour (tool fluency anchored to questions, no bug)
  # Pedagogy:
  #   Tool subordinated to question — each tool move answers a debugging
  #     question, not a feature menu.
  #   Faded scaffolding — students click through with concrete prompts; later
  #     cases ask the same moves with no prompts.
  #   Bloom's level — Remember / Apply.
  # ===========================================================================
  - title: "Debugger Tour"
    instructions: |
      > 🎯 **Goal:** Build minimum tool fluency. Each section below pairs a **debugging question** with the **smallest tool move** that answers it. There's no bug to fix — `tour.py` runs correctly.

      Click **Debug** (not Run) to start each section.

      ### 1. *"Where is execution right now?"* → Breakpoint

      Click the gutter next to **line 8** in `tour.py` (the line `total += score`). A breakpoint marker appears — that's the breakpoint you'll edit later.

      Click **Debug**. Execution pauses *before* line 8 runs; the debugger reports the current paused line, and sighted users also see an arrow marker in the gutter. The current line is highlighted.

      ### 2. *"What does this variable hold right now?"* → Variables tab + hover

      Look at the **Variables** tab. You'll see locals like `score` and `total`. Each value has a type badge (`int`, `list`, `dict`).

      Now **hover over `score`** in the editor. A tooltip shows the value. The same trick works on any identifier in the source — no need to dig through the panel.

      ### 3. *"What value will an expression have at this point?"* → Watch

      Open the **Watch** tab. Click ➕ and add `total + score`. The expression evaluates *as if it ran right now*. Click **Step Over** (F10). The value updates.

      Watches are how you ask "what would `len(items) * factor` be at this exact moment?" without editing the program to add a `print`.

      ### 4. *"Which iteration first violates an invariant?"* → Conditional breakpoint

      Right-click the breakpoint marker you placed on line 8 → **Edit Breakpoint** → enter `score < 0` as the condition. Click **Continue** (F5).

      Execution flies through every iteration where `score >= 0` and pauses *only* at the iteration where `score < 0` (line 8). That's the iteration where the invariant first fails.

      Without conditional breakpoints, you'd step 9 times through normal iterations to reach the one you care about. With one, the debugger does the filtering.

      ### 5. *"How did we get here?"* → Call Stack

      Open the **Call Stack** tab. You'll see `process_scores → main`. Click each frame to inspect that scope's locals. The stack tells the story of how this line got executed.

      For recursive code, the stack is a *vertical history of decisions*. You'll use it heavily in Case 1.

      ### 6. *"What was this variable BEFORE this line ran?"* → History scrubber

      Drag the **History** scrubber backward by 5-10 ticks. Watch `total` rewind in the Variables tab. Drag forward — it advances. The debugger switches from live execution to a rewound history state; sighted users also see the gutter marker change appearance.

      This is the time-travel feature. You can move to any moment in the program's history without restarting.

      ### 7. *"Are these two variables actually the same object?"* → Aliasing badge

      `register_score` has a `students=[]` default argument. **Predict:** does `register_score` create a fresh student list on each call, or reuse the same list every time? After `main()` finishes, what do you expect the default `students` argument to contain — and how many entries?

      Now run to completion (Continue twice). In the Variables tab, expand `defaults` and the inner `students` list inside `register_score`. They share an `oid` and a `↔` alias badge — they're the same list. Compare to your prediction.

      If your prediction was wrong, complete this sentence before moving on: *"I assumed the list was ___, but the debugger shows ___ because ___."* That sentence is a hypothesis about your own mental model of how Python default arguments work.

      ### 🪞 Reflect

      Close the editor. From memory, list the seven moves. For each, name the **debugging question** it answers. If you can't, that move isn't yet yours — flag it for revisit.

      Carry this forward: for any new debugger feature you encounter, name the question it answers. If you can't, you don't need it yet.

    files:
      - path: "tour.py"
        language: "python"
        content: |
          # Tour program — no bug. Exercise the debugger UI here.

          def compute_score(raw):
              return sum(raw) / len(raw)

          def process_scores(scores):
              total = 0
              for score in scores:
                  total += score
              return total / len(scores)

          def register_score(name, value, students=[]):
              students.append({"name": name, "score": value})
              return students

          def main():
              raw = [
                  ("Ada", [95, 88, 92]),
                  ("Linus", [72, 81, 78]),
                  ("Grace", [98, 95, 91]),
                  ("Alan", [-3, 55, 70]),     # negative — used by §4
                  ("Margaret", [85, 89, 87]),
              ]
              scores = []
              defaults = []
              for name, raw_scores in raw:
                  score = compute_score(raw_scores)
                  defaults = register_score(name, score)
                  scores.append(score)
              average = process_scores(scores)
              print(f"average score: {average:.2f}")
              return average

          main()

    open_file: "tour.py"

    require_tests: false

    solution:
      explanation: |
        There's no fix to apply — this step is procedural drill. The aliasing trap on line 14 (`students=[]` default argument shared across calls) is a real Python gotcha worth remembering: default arguments are evaluated **once** at function-definition time, not on each call. The standard fix in production code is `students=None` plus `if students is None: students = []`. We don't fix it here; we just notice that the debugger's `↔` badge would tell us about it.

    quiz:
      title: "Tour — Quick Retrieval"
      min_score: 0.75
      shuffle: true
      questions:

        - question: |
            "I want to know which iteration of a 10,000-item loop is the first one to break the invariant." Which tool answers it?
          type: single
          options:
            - "Step Over until it breaks"
            - "Conditional breakpoint with the invariant as the predicate"
            - "Hover over the variable"
            - "Call Stack"
          correct_index: 1
          option_feedback:
            0: "Stepping through 10,000 iterations works in principle but is prohibitive. A conditional breakpoint runs the same check at every iteration inside the debugger's engine — effectively free per iteration — and pauses only when the predicate is true."
            2: "Hover shows the value at *this* paused moment. It can't filter across iterations."
            3: "Call Stack shows *how* you got to the current line, not *which iteration* first violated something."
          explanation: |
            **Conditional breakpoints filter.** The condition runs at every loop pass; the debugger pauses only when it's true.

        - question: |
            "I want to inspect what `total` was 5 lines ago." Which tool answers it?
          type: single
          options:
            - "Add a Watch and rerun"
            - "Drag the History scrubber backward"
            - "Set a breakpoint earlier and restart"
            - "Hover the variable"
          correct_index: 1
          option_feedback:
            0: "Watch shows the *current* value at the paused moment, not historical values."
            2: "This works but requires re-executing the entire program from scratch. If the program takes 30 seconds — or an hour — to run, you pay that cost every time you want to inspect a different moment. The scrubber rewinds through the recorded trace instantly, no rerun needed."
            3: "Hover is the same as Watch — it shows the value at the current pause, not the past."
          explanation: |
            **Time-travel.** The scrubber lets you slide back through any moment in the run without re-executing.

        - question: |
            "I just changed `x` and `y` looks different too — are they secretly the same object?" Which tool answers it?
          type: single
          options:
            - "Hover both variables and compare values"
            - "Check the `oid` and `↔` badge in the Variables tab"
            - "Set a conditional breakpoint"
            - "Drag the History scrubber"
          correct_index: 1
          option_feedback:
            0: "Identical values can come from different objects (e.g., two equal lists). Identity is a stronger property than value equality."
            2: "A conditional breakpoint pauses on a predicate; it doesn't surface object identity."
            3: "The scrubber shows past values; aliasing is about *current* identity."
          explanation: |
            **Object identity ≠ equality.** The `↔` alias badge and matching `oid` mean two names point at the *same* object — modifying one will appear to modify the other.

        - question: |
            The tour file's line-14 `def enroll(student, students=[])` lights up the `↔` aliasing badge across calls. Why?
          type: single
          options:
            - "Each call gets its own fresh empty list — the `↔` badge is reporting incorrect state"
            - "Default argument values are evaluated **once at function-definition time**, so every call that uses the default shares one list"
            - "The interpreter caches all empty lists as the same object for memory efficiency"
            - "Python's parameter passing is by-reference, so mutations leak across calls"
          correct_index: 1
          option_feedback:
            0: "The `↔` badge is correct — the bug is real. Try it: run `enroll(\"Ada\")` twice and the second call's `students` already contains \"Ada\" from the first."
            2: "Python doesn't intern lists. `[] is []` returns False — every literal `[]` makes a new object. The trap is *only* with default arguments, because the default expression runs once at `def` time."
            3: "Python is pass-by-reference for objects, but a fresh local variable inside each function call wouldn't share state across calls. The aliasing here is specifically because the *default value object* is reused."
          explanation: |
            **Default argument values are evaluated exactly once, at function-definition time.** The `students=[]` creates one list, bound to the function as its default. Every subsequent call that doesn't override the parameter reuses *that same list*. Standard fix: `def enroll(student, students=None): students = students if students is not None else []`. The `↔` badge is the time-travel debugger's way of pointing at exactly this aliasing — saving you 30 minutes of head-scratching.


  # ===========================================================================
  # STEP 3 — Case 1: Maze Pathfinder (Boundary Bug)
  # Source: debugging_case_studies/case1_maze_breakpoints/
  # Pedagogy:
  #   Apply the cycle from Step 1 — full debugging form scaffold.
  #   Worked-example fade — Step 1 was fully narrated; here you drive.
  #   Variation — same cycle, different surface (recursion + call stack).
  #   Bloom's level — Apply / Analyze.
  # ===========================================================================
  - title: "Case 1 — Maze Pathfinder (Boundary Bug)"
    instructions: |
      > 🎯 **Goal:** A maze has a valid 10-step path from `S` to `G`, but the pathfinder returns `None` when called with `max_steps=10`. Find why.

      ### 📂 What you have

