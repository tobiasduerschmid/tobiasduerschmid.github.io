          old = sys.stdout; sys.stdout = buf = io.StringIO()
          code = pytest.main(['/tutorial/test_checkout.py', '-v', '--tb=short', '--no-header'])
          sys.stdout = old; output = buf.getvalue(); print(output)
          assert code == 0, f"Some tests still fail. pytest output:\n\n{output}\n\nThe fix should re-wire the fulfillment subscription in workflow_config.py."
        hints:
          - title: "Small nudge"
