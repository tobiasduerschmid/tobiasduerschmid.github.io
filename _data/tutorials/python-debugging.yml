          from __future__ import annotations

          from .models import InventoryReservation, OutOfStockError


          class InventoryService:
              def __init__(self, stock_by_sku):
                  self._stock_by_sku = dict(stock_by_sku)
                  self._reservation_number = 300

              def reserve(self, order_id, items):
                  shortages = []
                  for item in items:
                      available = self._stock_by_sku.get(item.sku, 0)
                      if available < item.qty:
                          shortages.append(f"{item.sku}: requested {item.qty}, available {available}")
                  if shortages:
                      raise OutOfStockError("; ".join(shortages))

                  for item in items:
                      self._stock_by_sku[item.sku] -= item.qty
                  self._reservation_number += 1
                  return InventoryReservation(
                      order_id=order_id,
                      reservation_id=f"res-{self._reservation_number}",
                      items=items,
                  )

              def snapshot(self):
                  return dict(self._stock_by_sku)

