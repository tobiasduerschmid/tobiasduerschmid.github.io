    solution:
      files:
        - path: "checkout_app/workflow_config.py"
          language: "python"
          content: |
            from __future__ import annotations

            from .event_bus import HandlerRegistration
            from .models import EventKind


            class WorkflowConfig:
                """Centralized event wiring — fixed."""

                @staticmethod
                def registrations(audit, notifier, fulfillment):
                    return [
                        HandlerRegistration(EventKind.PAYMENT_AUTHORIZED, audit.record, "audit payment"),
                        HandlerRegistration(EventKind.INVENTORY_RESERVED, audit.record, "audit inventory"),
                        HandlerRegistration(EventKind.ORDER_CONFIRMED, audit.record, "audit confirmed"),
                        HandlerRegistration(EventKind.ORDER_REJECTED, audit.record, "audit rejected"),
                        HandlerRegistration(EventKind.PAYMENT_AUTHORIZED, notifier.send_payment_hold_email, "payment hold email"),
                        HandlerRegistration(EventKind.ORDER_CONFIRMED, notifier.send_confirmation_email, "customer confirmation"),
                        HandlerRegistration(EventKind.ORDER_REJECTED, notifier.send_rejection_email, "customer rejection"),
                        # FIXED: pick a ticket only after inventory is reserved.
                        HandlerRegistration(EventKind.INVENTORY_RESERVED, fulfillment.prepare_pick_ticket, "warehouse pick ticket"),
                    ]
      explanation: |
        The fix is a single-token change in `checkout_app/workflow_config.py`: the last `HandlerRegistration` subscribes `fulfillment.prepare_pick_ticket` to `EventKind.INVENTORY_RESERVED` instead of `EventKind.PAYMENT_AUTHORIZED`. After the change:

        - Payment authorization no longer triggers fulfillment.
        - Fulfillment runs only when inventory has actually been reserved.
        - The out-of-stock path raises `OutOfStockError` *before* `INVENTORY_RESERVED` is published, so no pick ticket is ever created for a rejected order.

        **The bug-shape rule worth remembering:** when a side effect appears far from any obvious call to it, the cause is usually *wiring* (subscription topics, dependency injection, middleware order), not algorithm. The sequence diagram earned its place because *no single source file* contained the call chain — the diagram linearized the runtime story so the first impossible arrow popped out visually.

        Common wrong fixes (and why they're wrong):

        - **Defensive guard inside `prepare_pick_ticket`** (`if event.kind != EventKind.INVENTORY_RESERVED: return`) — works, but moves the policy from the wiring layer to the handler. Now every new handler needs the same defensive boilerplate. The wiring is the right place to enforce protocol invariants.
        - **Special-case the out-of-stock SKU in `app_factory.build_app`** — hardcodes a fix for a single SKU. The next out-of-stock SKU breaks again.
        - **Catch the `OutOfStockError` in `prepare_pick_ticket` and pop the ticket back off** — the ticket was already enqueued. Even if you remove it later, downstream consumers (warehouse log, inventory holds, etc.) may have already acted on it. The fix is to never enqueue in the first place.
        - **Edit the test** to expect the rejected ticket. The test correctly states the behavior; the wiring is wrong.

    tests:
