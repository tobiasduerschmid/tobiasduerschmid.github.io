          - title: "Strategic hint"
            text: "The bug is in event-bus wiring, not in any method body. Open `checkout_app/workflow_config.py` and look at the last `HandlerRegistration`. What event topic is `fulfillment.prepare_pick_ticket` subscribed to? What event topic *should* it be subscribed to?"
            condition: "code_contains: PAYMENT_AUTHORIZED, fulfillment.prepare_pick_ticket"
          - title: "Spoiler — full fix"
            text: "In `checkout_app/workflow_config.py`, change the last registration's first argument from `EventKind.PAYMENT_AUTHORIZED` to `EventKind.INVENTORY_RESERVED`. One identifier, one line."
            condition: "code_contains: PAYMENT_AUTHORIZED, fulfillment.prepare_pick_ticket"

      - description: "Workaround guard — fix is at the wiring layer"
        command: |
          source = open('/tutorial/checkout_app/workflow_config.py').read()
          # The correct wiring must be present.
          assert 'INVENTORY_RESERVED, fulfillment.prepare_pick_ticket' in source.replace(' ', '').replace('EventKind.', ''), \
              "Wire `fulfillment.prepare_pick_ticket` to `EventKind.INVENTORY_RESERVED` in `WorkflowConfig.registrations`."
          # The wrong wiring must be gone.
          assert 'PAYMENT_AUTHORIZED, fulfillment.prepare_pick_ticket' not in source.replace(' ', '').replace('EventKind.', ''), \
              "Remove the `EventKind.PAYMENT_AUTHORIZED` subscription for `fulfillment.prepare_pick_ticket` — that's the buggy wiring."

      - description: "Workaround guard — handler body unchanged (no defensive `if event.kind …` check inside the handler)"
        command: |
          import ast
          source = open('/tutorial/checkout_app/shipping.py').read()
          try:
              tree = ast.parse(source)
          except SyntaxError as e:
              raise AssertionError(f"shipping.py has a syntax error: {e}")

          # Find every prepare_pick_ticket function (top-level or nested).
          ppt_funcs = [
              n for n in ast.walk(tree)
              if isinstance(n, (ast.FunctionDef, ast.AsyncFunctionDef)) and n.name == 'prepare_pick_ticket'
          ]
          assert ppt_funcs, (
              "Couldn't find a function named `prepare_pick_ticket` in shipping.py. "
              "Did you rename it? Restore the original name — the wiring fix shouldn't touch the handler."
          )

          # Walk each handler body for `if`/`elif`/`assert` tests that mention `event.kind`.
          for fn in ppt_funcs:
              for stmt in ast.walk(fn):
                  test_node = None
                  if isinstance(stmt, ast.If):
                      test_node = stmt.test
                  elif isinstance(stmt, ast.Assert):
                      test_node = stmt.test
                  if test_node is None:
                      continue
                  test_src = ast.unparse(test_node)
                  if 'event.kind' in test_src or 'event_kind' in test_src:
                      raise AssertionError(
                          "Found a defensive check on `event.kind` inside `prepare_pick_ticket`: "
                          f"`{test_src}`. Don't add it — the right fix is at the wiring layer "
                          "(`workflow_config.py`). Subscribing to the correct event topic makes the "
                          "filter unnecessary; defensive filters in every handler is the antipattern this case is teaching against."
                      )

      - description: "Workaround guard — test expectations unchanged"
        command: |
          source = open('/tutorial/test_checkout.py').read()
          assert 'app.shipping_queue.pending_order_ids() == []' in source, \
              "Don't change the test's expected empty-shipping-queue assertion. The test correctly states the spec."
          assert 'app.shipping_queue.pending_order_ids() == [\"order-1001\"]' in source, \
              "Don't weaken the in-stock test. Revert `test_checkout.py`."

    quiz:
      title: "Case 4 — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            Source-reading `CheckoutService.checkout()` was unusually unhelpful for finding this bug. Why?
          type: single
          options:
            - "The method had no side effects, so there was nothing to trace"
            - "`CheckoutService` never directly calls `ShippingQueue.enqueue` — the side effect is delivered through the event bus, so a single-file source read can't follow the chain"
            - "The method was too long to read carefully"
            - "Python static type checkers can't detect this kind of bug"
          correct_index: 1
          option_feedback:
            0: "The method does have side effects (it publishes events). The point is that the buggy side effect — enqueueing a pick ticket for a rejected order — happens in a *different file*, triggered by an event subscription."
            2: "Length wasn't the issue. The method is short. The issue is that the relevant call chain crosses files and is reconstructed at runtime by the event bus."
            3: "Type checkers verify type signatures, not runtime call ordering. Even a perfectly type-checked program can subscribe a handler to the wrong event topic — the types match either way."
          explanation: |
            **The event bus decouples publishers from subscribers — that's the point.** The trade-off is that you can't follow a single source file to know what runs in response to a published event. Source-reading is fine for direct call chains; for indirect ones, you need a tool that *runs* the program and shows you what actually happened — which is exactly what a sequence diagram is.

        - question: |
            Where in the codebase did the actual bug live?
          type: single
          options:
            - "`checkout_service.py` (orchestration logic)"
            - "`shipping.py` (the `prepare_pick_ticket` handler body)"
            - "`workflow_config.py` (event subscription topic)"
            - "`inventory.py` (the `reserve` method)"
          correct_index: 2
          option_feedback:
            0: "The orchestrator's `checkout` method is fine — it publishes events in the right order. The bug is in *which handler* responds to *which event*."
            1: "The handler body is correct — given any event, it builds a pick ticket. The bug is that the wiring asks the handler to react to the wrong event topic."
            3: "`InventoryService.reserve` correctly raises `OutOfStockError` when stock is insufficient. The bug is that fulfillment ran *before* `reserve` was even called."
          explanation: |
            **The bug is in the wiring** — a single `HandlerRegistration` subscribes `fulfillment.prepare_pick_ticket` to `EventKind.PAYMENT_AUTHORIZED` instead of `EventKind.INVENTORY_RESERVED`. When configuration data is the source of truth for runtime behavior, configuration data is where this class of bug lives. Treat config files (subscriptions, DI containers, route tables) as code — they are.

        - question: |
            Two engineers propose fixes:

            **A.** Edit `workflow_config.py` to subscribe `prepare_pick_ticket` to `INVENTORY_RESERVED` instead of `PAYMENT_AUTHORIZED`.

            **B.** Add a defensive guard at the top of `prepare_pick_ticket`: `if event.kind != EventKind.INVENTORY_RESERVED: return`.

            Both make the failing test pass. Which is the better fix?
          type: single
          options:
            - "B — defensive checks make the code safer regardless"
            - "A — the wiring is the right layer; B turns every new handler into a place where someone has to remember the same defensive boilerplate"
            - "Both are equally good"
            - "Neither — only changing the test would be acceptable"
          correct_index: 1
          option_feedback:
            0: "Defensive checks have their place — at trust boundaries (user input, network requests). For a system you control end-to-end, defensive checks at every handler turn into noise that future readers must mentally subtract. The wiring layer is *the* place to enforce which handler runs on which event."
            2: "B looks defensive in isolation but creates a maintenance trap. The next handler someone writes needs the same `if event.kind == ...` boilerplate, or the same bug recurs. With A, the wiring layer guarantees the invariant once for everyone."
            3: "Editing the test to match the bug is symptom-patching at the spec layer — the worst kind. Don't do that."
          explanation: |
            **Fix at the layer that *names* the invariant.** The invariant here is *"fulfillment runs only after inventory is reserved."* That invariant lives in `workflow_config.py` — the wiring layer is literally the file whose job is to say *which handler runs on which event*. Adding a defensive `if` inside the handler moves the invariant out of the layer that names it and scatters it across handlers, where it's easy for future code to drift away. A general principle: **prefer fixing where the invariant is most directly expressible**, not where it's noticeable.

        - question: |
            Which kinds of bugs is sequence-diagram inference particularly good for?
          type: multiple
          options:
            - "Bugs where the side effect happens via event-bus / pub-sub indirection"
            - "Bugs where dependency-injection wiring orders calls in the wrong sequence"
            - "Bugs in a 5-line pure function with no calls"
            - "Bugs in middleware where the order of `before/after` hooks matters"
          correct_indices: [0, 1, 3]
          option_feedback:
            2: "A 5-line pure function with no external calls produces no interesting sequence diagram — one lifeline, no arrows. Ordinary breakpoints + watches are faster there. Sequence diagrams earn their cost on *protocol* and *interaction* problems, where the question is \"who calls whom in what order?\""
          explanation: |
            **Sequence diagrams are interaction-focused tools.** They earn their cost when the bug is about *who calls whom in what order across many objects*:

            - **Event-bus / pub-sub indirection.** When `ShippingQueue.enqueue` is triggered by an event message rather than a direct call, no single source file shows the full chain. The diagram traces the runtime call order across all files, making the indirect delivery visible.
            - **Dependency-injection wiring.** DI containers determine which implementation each component receives. If the wrong implementation is injected, calls arrive in the wrong sequence — and the diagram shows *which* constructors and methods actually ran.
            - **Middleware pipelines.** `before` and `after` hooks fire in a defined order; if a hook is missing or registered in the wrong order, the diagram reveals the actual ordering vs. what the protocol requires.

            For local algorithmic bugs (boundary conditions, off-by-ones, arithmetic), ordinary stepping is faster — the lone wrong-option above belongs in that category.


  # ===========================================================================
  # STEP 7 — Interleaved Technique-Selection Drill
  # Pedagogy:
  #   Interleaving — mixed scenarios force discrimination of bug families.
  #   Retrieval practice — quiz-only step, no editing, anchored on judgment.
  #   Anti-tinkering — explicit prompt about what to do when stuck.
  #   Bloom's level — Analyze.
  # ===========================================================================
  - title: "Triage Drill — Pick the Right Technique"
    instructions: |
      > 🎯 **Goal:** Match each scenario to the right *first move*. The point isn't speed; it's discriminating between bug families.

      Try the drill from memory. Pass threshold: **0.85**. After the quiz, you'll see a recap of the cue→technique mapping for spaced retrieval next time.

      ### 🦆 Two debugging moves the lecture covered that you haven't drilled yet

      Before the quiz, lock these in. They're cheap, ubiquitous in real practice, and the triage drill will mention them.

      <details markdown="1"><summary>🦆 Rubber Duck Debugging — your most valuable root-cause tool</summary>

      The lecture called this the "most valuable root-cause analysis tool" — and the call-out wasn't ironic.

      **The Curse of Knowledge.** When you've held a mental model of your code in your head for the past hour, you read what you *intended* to write, not what you *actually* wrote. Your eyes skip the bug because your model says it's not there. This is why staring at the same five lines for 20 minutes rarely uncovers anything new.

      **The technique.**

      1. Place a rubber duck (or any silent object — a coffee mug, a textbook, a sympathetic stuffed animal) on your desk.
      2. Explain to the duck **what your code is supposed to do, line by line**. Out loud. Slowly.
      3. At some point — typically a third of the way through — you'll tell the duck what your code *should* be doing next, and realize that's not what it's *actually* doing.

      That's the moment your mental model and the actual code diverge. The bug lives in that gap.

      **Why it works.** Verbalization forces you to *retrieve* and *articulate* each intermediate step instead of skimming over it. The duck doesn't help you; *explaining* helps you. The duck just keeps you from looking like you're talking to yourself.

      Practice tip: when you don't have a duck, write the explanation as a comment in the code (you can delete it after). Same effect.

      </details>

      <details markdown="1"><summary>📝 After the fix — document and regression-test (don't skip this)</summary>

      The lecture closed phase 4 (Implement & verify a fix) with three moves you should plan to do *every* time:

      - **Add nearby assertions.** When you find a bug, related bugs are often hiding in the same neighborhood. `assert x is not None`, `assert len(items) > 0`, `assert response.status_code == 200` — assertions catch errors before they become failures.
      - **Document why the fix was necessary** in a code comment, in the git commit message, and in the bug report. Future-you (and future-teammate) will need to understand *why* this line exists; "fix bug" is not enough.
      - **Keep the bug-reproduction test in the suite for regression testing.** Re-running existing tests after later code changes is how you make sure today's fix doesn't get silently undone next month. Every bug fix should leave behind a test.

      The triage quiz below assumes you'll do all three after picking the right *first* move.

      </details>

    files:
      - path: "notes.txt"
        language: "plaintext"
        content: |
          This step is a quiz only. No code to edit.

          Take your time on each scenario — the goal is matching cues to
          techniques, not memorizing pairs.

    open_file: "notes.txt"

    require_tests: false

    solution:
      explanation: |
        What you practiced here is **technique selection** — reading the cue in a bug description and reaching for the right tool. For spaced retrieval next time, here is the canonical mapping:

        | Bug cue | First move |
        |---|---|
        | Boundary / off-by-one | Ordinary breakpoint + watch the boundary expression |
        | One item in a long stream | Conditional breakpoint with a discriminating predicate |
        | Symptom appears later than the cause | Run to completion, scrub backward, then breakpoint on the suspected event |
        | Wiring / protocol violation across files | Sequence diagram — linearize who calls whom |
        | Aliasing / shared-state surprise | Inspect `oid` badges in Variables |
        | Failure not reproducing | Reproducibility first — write a discriminating test |
        | Stuck >15 minutes | Stop. Externalize the failure description. |

    quiz:
      title: "Debugging Triage Drill"
      # Lowered from 0.85 → 0.78 (audit fix): with 9 questions, 0.85 means at most
      # 1 wrong (8/9 = 0.89 passes; 7/9 = 0.78 passes). Borderline-discrimination
      # items shouldn't fail an otherwise-competent student.
      min_score: 0.78
      shuffle: true
      questions:

        - question: |
            A function processes 50,000 log lines and produces a wrong total. You've confirmed the bug is consistent run-to-run. Which technique most efficiently localizes it?
          type: single
          options:
            - "Set a normal breakpoint inside the loop and step through, watching the running total"
            - "Set a conditional breakpoint that pauses only when the running total exceeds the maximum plausible value (or whatever invariant is broken)"
            - "Add print statements after every line in the function and read the 50,000 lines of output"
            - "Run with `pdb.set_trace()` before the loop and step through it manually"
          correct_index: 1
          option_feedback:
            0: "Stepping through 50,000 iterations is exactly the kind of work the debugger should save you. With a conditional, the debugger pauses only on the iteration of interest."
            2: "Reading 50,000 lines by eye is human-impossible. If you must use prints, filter them with a predicate so only the relevant ones print — at which point you've reinvented a conditional breakpoint, more clumsily."
            3: "`pdb.set_trace()` is a real and common move, but it leaves you stepping through 50,000 iterations the same way option 0 does. The debugger has filters; use them."
          explanation: |
            Long streams want **conditional** breakpoints. The condition is whatever invariant you suspect is broken (`running_total > 1e9`, `line.startswith('ERROR')`, etc.). The debugger filters; you only see the iterations that matter.

        - question: |
            A recursive function returns the wrong answer for one specific input. The function is small (12 lines) and you have a clear test case that reproduces it. Which technique fits best?
          type: single
          options:
            - "Conditional breakpoint with a complex predicate"
            - "Back-in-time scrubbing of the entire program execution"
            - "Ordinary breakpoint at the top of the function plus a Watch expression on the parameter and any boundary expression"
            - "Add a `print()` inside the recursion to trace each call"
          correct_index: 2
          option_feedback:
            0: "A conditional breakpoint is overkill here — the function is small and the input is specific. An ordinary breakpoint plus stepping plus the call stack gives you everything you need."
            1: "Back-in-time scrubbing shines when the symptom appears far from the cause. Here, the function is 12 lines and the symptom is in the return value — it's not a temporal-distance problem."
            3: "Print-tracing works but modifies the source for every probe. Ordinary breakpoints + watches give you the same information non-invasively, and the call stack tells you what print can't (which recursion path you're on)."
          explanation: |
            For small, well-localized buggy functions, **ordinary breakpoint + step + watch + call stack** is the simplest and fastest combination. Reach for fancier tools (conditional breakpoints, back-in-time) only when the simpler tool is genuinely insufficient.

        - question: |
            Final cart total is wrong; a discount appears to have been applied to the wrong line item. The cart processed 8 events (add item, apply coupon, etc.) and the wrong-line discount happened somewhere in the middle. Which technique fits best?
          type: single
          options:
            - "Set a conditional breakpoint on the discount-application line that pauses if the wrong line is being modified"
            - "Run to completion, then scrub the History scrubber backward to find the first event where the discount went to the wrong line"
            - "Use `git bisect` on the cart's commit history"
            - "Step forward through every event from the start"
          correct_index: 1
          option_feedback:
            0: "This works *if* you already know which expression characterizes 'wrong line.' Often you don't — that's exactly what scrubbing helps you discover. Once scrubbing has identified the suspicious moment, *then* a breakpoint can pinpoint it."
            2: "`git bisect` finds the *commit* that introduced a regression. Useful for a *different* class of debugging problem (a bug that worked before some commit). It's not the right tool when you have one buggy version and want to know *which event* in a single run caused the symptom."
            3: "Forward stepping through 8 events is fine in a pinch but wasteful — events 1, 2, 3 likely produced correct partial state. Anchoring on the wrong final state and rewinding is faster."
          explanation: |
            **Back-in-time / scrubbing** is the right first move when symptom and cause are temporally distant within a single run. After scrubbing localizes the suspicious event, an ordinary breakpoint can give you line-level precision.

        - question: |
            A function has two parameters that should be independent. After running, you find that modifying one of them mysteriously changes the other. Which technique fits best?
          type: single
          options:
            - "Add print statements to track every modification"
            - "Set a conditional breakpoint on every line that touches either parameter"
            - "Inspect the `oid` badges in the Variables tab — if both names share the same `oid`, they're the same object in memory"
            - "Use back-in-time scrubbing"
          correct_index: 2
          option_feedback:
            0: "Print debugging is a fallback. The debugger has dedicated UI for spotting aliasing — use it."
            1: "Brute force, and you'll discover the same answer the `oid` badge tells you in one glance."
            3: "Scrubbing tells you *when* state diverged. The `oid` badge tells you *why* (they're the same object). For aliasing specifically, `oid` is the more direct cue."
          explanation: |
            Mysterious co-mutation is the signature of **aliasing**. The most efficient first move is checking the Variables tab: if two names share an `oid`, they reference the same object, and modifying one will appear to "modify" the other. The classic Python instance is mutable default arguments — exactly what you saw in Step 2's `register_score`.

        - question: |
            You've spent 20 minutes setting and clearing breakpoints, making small edits, and rerunning tests. Nothing has worked, and you're starting to feel frustrated. What's the right next move?
          type: single
          options:
            - "Push through — debugging always feels this way; just keep iterating"
            - "Restart the file from scratch with a fresh implementation"
            - "Stop. Write down — in plain words — the symptom (expected vs actual) and what hypotheses you've ruled out so far. Then re-pick a technique"
            - "Ask a teammate to fix it for you"
          correct_index: 2
          option_feedback:
            0: "Trying edit after edit without new evidence is a frustrating cycle that rarely ends productively. Stop and externalize: write down the symptom in plain words, list what hypotheses you've already ruled out and how, then re-pick a technique deliberately. The act of writing usually surfaces the next move."
            1: "A rewrite occasionally helps for tiny scripts, but it's overkill here. The bug is hard because you don't have a clear hypothesis yet — not because the code is structurally broken. Externalize the failure first."
            3: "Asking a teammate is a good *follow-up* move. Before that, externalize what you know. The act of writing the symptom and the ruled-out hypotheses often reveals the next move to you — and if it doesn't, you now have a precise question rather than a vague one."
          explanation: |
            **When the cycle stalls, the move is to externalize.** Write down the failure precisely, list hypotheses you've ruled out (and *how*), and re-pick a technique deliberately. This isn't about willpower — it's about getting the problem out of your head and onto a surface where you can reason about it. Research on debugging found that simply forcing this articulation helped students solve bugs they otherwise would have escalated.

        - question: |
            A test passes locally on your laptop but fails on the autograder. You've reproduced the failure on the autograder twice. What's the most useful first move?
          type: single
          options:
            - "Set a conditional breakpoint inside the function — clearly the issue is data-dependent"
            - "Drag the History scrubber backward — clearly the symptom appears late"
            - "First, find a way to reproduce the failure locally. Without local reproduction, you can't use any debugger technique productively"
            - "Email the instructor for an autograder log"
          correct_index: 2
          option_feedback:
            0: "A conditional breakpoint can't help if you can't reproduce the bug locally — the breakpoint never fires."
            1: "Same problem — scrubbing requires running the program; if it doesn't fail locally, you have nothing to scrub through."
            3: "An autograder log is useful, but the larger question is *why* environments differ. Sometimes the answer is OS, Python version, locale, or random seed. Reproducing locally is the necessary first step before any other technique becomes useful."
          explanation: |
            **Reproducibility is upstream of every debugging technique.** A bug you can't reproduce is a bug you can't debug — none of breakpoints, scrubbing, or watches help if the failure isn't in front of you. The first move is to find what differs between environments (Python version? OS? data? seed?) and either fix the discrepancy or simulate the autograder's environment locally.

        - question: |
            A test that previously passed now fails after a change you just made. The previous test still passes. What does this tell you?
          type: single
          options:
            - "You introduced a regression. The bug is in the change you just made; revert and re-apply more carefully"
            - "The test was wrong all along; update its expected value"
            - "You should add `time.sleep(1)` to make the test more deterministic"
            - "You should ignore this — you're focused on the previously-failing test"
          correct_index: 0
          option_feedback:
            1: "If the test previously passed and the only change is yours, the test isn't suddenly wrong — the test caught a real regression. Updating the expected value is a workaround that hides the regression."
            2: "Sleeps mask race conditions, but they don't fix logic regressions. Adding sleeps to make tests pass is a known anti-pattern."
            3: "Ignoring a regression because you're focused elsewhere is exactly how regressions ship to production. Fix it now while the change is fresh in your head."
          explanation: |
            A previously-passing test that newly fails after your change is a **regression** — your change broke a behavior that was correct. Revert and re-apply more carefully (smaller change, more thought). This is exactly why "verify means rerun the **whole** suite" — to catch regressions, not just confirm the one fix.

        - question: |
            A payment processor handles 10,000 transactions. Two adjacent transactions produce totals that are slightly off — but only when a specific merchant ID appears. The failure is consistent run-to-run, and the wrong calculation fires *exactly* when the bad merchant ID is processed. Which technique fits best?
          type: single
          options:
            - "Run to completion, then scrub the History scrubber backward — the symptom appears in the middle of the run"
            - "Set a conditional breakpoint with the predicate `tx.merchant_id == SUSPECT_ID`"
            - "Inspect `oid` badges in the Variables tab — the totals might be aliased objects"
            - "Step forward through all 10,000 transactions"
          correct_index: 1
          option_feedback:
            0: "Scrubbing works well when the symptom and cause are in *different, temporally-separated* moments — you need to rewind past several events that look fine. Here, the wrong calculation fires *exactly when* the bad merchant ID is processed: the symptom and cause are at the same moment. A conditional breakpoint that pauses only for that merchant ID is more direct."
            2: "The symptom is a wrong value, not co-mutation of two names. Aliasing is the signature of two variables moving together unexpectedly — not of a single wrong calculation on one specific input."
            3: "10,000 manual steps is precisely what conditional breakpoints are designed to avoid."
          explanation: |
            **Conditional breakpoints vs. back-in-time scrubbing depend on temporal distance.** Scrubbing earns its cost when symptom and cause are separated by time (many events happen between the bug and when you notice it). Here, the symptom co-occurs with the cause — the bad calculation fires exactly when the suspicious merchant ID is processed. A conditional breakpoint that pauses only on that ID is the direct move.

        - question: |
            Which of these counts as **evidence** in the debugging cycle?
          type: multiple
          options:
            - "A specific value of a variable observed at a specific line, e.g., `i = 1` at the start of the loop"
            - "A failing test's exact assertion message"
            - "A vague hunch that 'something feels off about the loop'"
            - "A `repr()` of a string showing a hidden whitespace character"
          correct_indices: [0, 1, 3]
          option_feedback:
            2: "A hunch is a *seed for a hypothesis*, not evidence. Evidence is observable, specific, and reproducible. Until the hunch is converted to a discriminating test or observation, it's not yet evidence."
          explanation: |
            **Evidence is observable, specific, and reproducible.** Variable values at specific lines, exact failure messages, and `repr()` outputs all qualify. Hunches are valuable as the *starting point* for hypothesis generation, but they don't yet count as evidence — they need to be tested against observations before they earn that status. Distinguishing the two clearly is one of the highest-leverage moves an experienced debugger makes.


  # ===========================================================================
  # STEP 8 — Transfer Challenge + Reflection
  # Pedagogy:
  #   Transfer — same conceptual bug family as Case 2 (data-representation),
  #     different surface code. Tests that the student can apply the cycle
  #     without scaffolded prompts.
  #   Faded scaffolds — only the debugging-log template; no step-by-step.
  #   Self-monitoring — final reflection question.
  #   Bloom's level — Apply / Create / Evaluate.
  # ===========================================================================
  - title: "Transfer Challenge — You're On Your Own"
    instructions: |
      > 🎯 **Goal:** Find and fix a bug in unfamiliar code without step-by-step prompts. You pick the technique. You type the debugging log.

      *Compare to Cases 1–3: there, we numbered each stage of the cycle. Here, you do.*

      ### 📂 What you have

      A small program: `tagger.py` reads `articles.txt` (each line is `"Title|tag"`) and returns the most common tag.

      Two pytest tests in `test_tagger.py`:

      - `test_python_is_most_common` — fails (returns the wrong value).
      - `test_no_whitespace_in_result` — fails (the result contains whitespace).

      ### 📋 Your debugging log

      Open `debugging_log.md` and **fill each field as you work.**

      ### 🚨 Resist the obvious

      You may recognize the bug family — but verify with the debugger before assuming. Pattern-matching without evidence is the trap of Step 7's tinkering item.

      ### 🔗 After fixing — before the quiz

      The Transfer Challenge is intentionally in the same bug family as one of the four cases. Before reading the solution or the quiz:

      - Which case is it most similar to structurally?
      - Write one sentence: *"Both bugs share ___ even though the surface is different because ___."*
      - Write one sentence: *"The surface difference is ___ — which is what makes this feel new."*

      Commit to those sentences. Quiz Q1 asks you to defend the match.

      ### 🌐 Far-transfer probe — while you debug

      Pick one codebase you've worked on recently. Where does external data enter (a file read, an API call, a form submission, a database query)? At that entry point: is normalization happening at the boundary, or are downstream consumers doing it — or not doing it at all? Spend 30 seconds answering for one entry point before you start the debugger.

      ### Hint of last resort

      If you haven't found it *yet* after 10 minutes, the test output already tells you what `repr(...)` would tell you on a paused breakpoint. Re-read the failing assertion of `test_no_whitespace_in_result`.

      ### 🪞 Self-check — after you fix it

      Before this tutorial, which mode would you have defaulted to on this bug?

      - **Tinkering** — try `.strip()`, `.replace('\n', '')`, and other edits until something worked.
      - **Print-first** — add `print(tag)` everywhere. (The trailing `\n` prints as a literal newline, easy to miss; `repr()` makes it impossible to miss.)
      - **Hypothesis-driven** — breakpoint, inspect `repr(tag)`, name the cause, fix at the load boundary.
      - **Honestly not sure** — depends on the day and how stuck you felt.

      Name which one. That's the metacognitive skill: knowing your default mode is how you know when to override it.

    files:
      - path: "tagger.py"
        language: "python"
        content: |
          """Article tag analyzer.

          Reads a file where each line is `"Title|tag"`, returns the most
          common tag (uppercased) across all articles.

          There is a bug. Both tests in test_tagger.py fail.
          """

          from collections import Counter


          def top_tag(articles_path):
              counts = Counter()
              with open(articles_path) as f:
                  for line in f:
                      title, tag = line.split("|", 1)
                      counts[tag.upper()] += 1
              return counts.most_common(1)[0][0]

      - path: "articles.txt"
        language: "plaintext"
        content: |
          Why Python rocks|python
          JavaScript closures|javascript
          Decorators in Python|python
          Async Python explained|python
          Rust intro|rust

      - path: "test_tagger.py"
        language: "python"
        content: |
          from tagger import top_tag


          def test_python_is_most_common():
              # Three of five articles are tagged "python", so PYTHON should win.
              assert top_tag('/tutorial/articles.txt') == "PYTHON"


          def test_no_whitespace_in_result():
              result = top_tag('/tutorial/articles.txt')
              assert result == result.strip(), \
                  f"Result {result!r} contains whitespace — tags should be normalized at load time."

      - path: "debugging_log.md"
        language: "markdown"
        content: |
          # Debugging log

          Fill each field as you work. Fields 1, 2, 6, 7 are labeled for you.
          Fields 3–5 are not — name the stage yourself, then fill in the content.

          1. **Symptom** (one sentence — expected vs actual): _..._
          2. **Predict** (what should the state be at the suspect line?): _..._
          3. **[Stage name?]** (technique chosen and why — write: "I used [tool] because [cue]"): _..._
          4. **[Stage name?]** (one sentence — *what* is wrong, *where* it lives): _..._
          5. **[Stage name?]** (the line where intended and actual first diverge): _..._
          6. **Fix** (file, line, minimal change): _..._
          7. **Verify** (which tests pass now; any regressions?): _..._

          <details><summary>Field labels 3–5 (open only after completing the log)</summary>

          3. Evidence
          4. Hypothesis
          5. Localize
          </details>

    open_file: "tagger.py"
    run_file: "test_tagger.py"

    solution:
      files:
        - path: "tagger.py"
          language: "python"
          content: |
            """Article tag analyzer — fixed."""

            from collections import Counter


            def top_tag(articles_path):
                counts = Counter()
                with open(articles_path) as f:
                    for line in f:
                        title, tag = line.split("|", 1)
                        counts[tag.strip().upper()] += 1
                return counts.most_common(1)[0][0]
      explanation: |
        **The bug** is that `for line in f` yields each line *with its trailing newline included*. So `tag` becomes `'python\n'`, and `tag.upper()` becomes `'PYTHON\n'`. The Counter accumulates under that key, and the function returns `'PYTHON\n'` — which the tests, expecting `'PYTHON'`, correctly reject.

        **The fix** is `tag.strip().upper()` (or call `.rstrip()` / `.rstrip('\n')` if you want to be more specific). Strip-and-validate at the boundary is the same pattern as Case 2's ledger fix.

        **The case-isomorphism is intentional.** This bug is the same family as Case 2 — input data has invisible whitespace; the bug fires *because* normalization wasn't applied at load time; the fix is in the loading layer. The surface is completely different (file iteration with `for line in f` vs `csv.DictReader`), but the cycle and the cure are the same. That's *transfer* — the same mental model applies despite a different surface.

        Notice what makes this bug family so common in real codebases: every layer that reads external data is a possible source. CSV imports. JSON parses. HTTP request bodies. Database VARCHAR columns. User text input. The defensive habit is *strip-and-normalize at the boundary*; once data is inside your domain, trust it.

    tests:
      - description: "Both tagger tests pass"
        command: |
          import pytest, io, sys
          old = sys.stdout; sys.stdout = buf = io.StringIO()
          code = pytest.main(['/tutorial/test_tagger.py', '-v', '--tb=short', '--no-header'])
          sys.stdout = old; output = buf.getvalue(); print(output)
          assert code == 0, f"Some tests still fail. pytest output:\n\n{output}\n\nNormalize the tag at load time."
        hints:
          - title: "Small nudge"
            text: "Set a breakpoint inside the loop, click Debug, and inspect `repr(tag)` in the Variables/Watch tab. What's there that you can't see by just `print(tag)`?"
          - title: "Strategic hint"
            text: "When you iterate `for line in f`, each `line` includes its trailing newline. After `line.split('|', 1)`, the trailing `\\n` ends up on `tag`. The fix belongs in the loader, *before* `tag.upper()`."
            condition: "code_missing: .strip()"
          - title: "Spoiler — full fix"
            text: "Change `counts[tag.upper()] += 1` to `counts[tag.strip().upper()] += 1`. Same pattern as Case 2's fix to `load_transactions`."
            condition: "code_missing: .strip()"

      - description: "Workaround guard — fix is at the load boundary"
        command: |
          source = open('/tutorial/tagger.py').read()
          stripped = source.replace(' ', '')
          # Must call strip on `tag` somewhere, AND the fix must be inside the loader,
          # not on the return value (which would be a post-process workaround).
          loader_block = source[source.find('def top_tag'):]
          assert ('.strip()' in loader_block) or ('.rstrip(' in loader_block), \
              "Strip on the input field, not the return value — fix at the load boundary, like Case 2."
          # Specifically reject `most_common(1)[0][0].strip()` style post-processing
          assert '][0].strip()' not in stripped and '][0].rstrip(' not in stripped, \
              "Post-processing the return value masks the bug. Strip the *input* in the loop, not the output."

      - description: "Workaround guard — articles.txt unchanged"
        command: |
          source = open('/tutorial/articles.txt').read()
          assert 'Why Python rocks|python' in source and 'Async Python explained|python' in source, \
              "Don't edit `articles.txt` — real article exports often have stray whitespace; your code should handle it. Revert the data file."

      - description: "Workaround guard — test expectations unchanged"
        command: |
          source = open('/tutorial/test_tagger.py').read()
          assert '== "PYTHON"' in source, \
              "Don't change the test's expected value to match the bug. Revert `test_tagger.py`."

    quiz:
      title: "Transfer & Reflection"
      # Audit fix: bumped from 0.5 → 0.75. The 7-stage retrieval question (Q2) is
      # the *only* recall test for the cycle in the entire tutorial, and at 0.5
      # a student could pass with that exact item wrong. Expanded from 2 to 5
      # questions to make 0.75 forgiving of one borderline answer (4/5 = 0.80 passes).
      min_score: 0.75
      shuffle: false
      questions:

        - question: |
            Which of the three earlier cases is this bug **most structurally similar to**?
          type: single
          options:
            - "Case 1 (Maze Pathfinder, boundary bug in `_dfs`)"
            - "Case 2 (Ledger Reconciliation, hidden-whitespace in CSV import)"
            - "Case 3 (Course Waitlist, FIFO vs LIFO ordering)"
            - "None of them — this is a totally new bug family"
          correct_index: 1
          option_feedback:
            0: "Case 1 was a *boundary / off-by-one* bug — `>=` rejecting an exact-budget path. This bug isn't about boundaries; it's about input data having a hidden character (a `\\n`) that broke equality with the expected key."
            2: "Case 3 was about *order of admission* (FIFO vs LIFO). This bug isn't about ordering; the bug fires regardless of when the offending line is processed."
            3: "Surface looks different (file iteration vs CSV) but the *family* is identical: input data carries a stray whitespace character, normalization is missing at the loading layer, fix is `strip()` at the boundary. This is exactly Case 2."
          explanation: |
            This bug is the **same family as Case 2** in different clothes. Both: external data (CSV row in Case 2, file line here) carries a stray whitespace character; the loading code doesn't normalize it; the fix is to strip-and-validate at the data boundary. Recognizing isomorphism across surfaces is what *transfer* means in the research literature.

        - question: |
            *(Final retrieval — spaced from Step 1.)* Place these debugging-cycle stages in order:

            A. Verify
            B. Symptom
            C. Hypothesis
            D. Fix
            E. Evidence
            F. Localize
            G. Predict
          type: single
          options:
            - "B → G → E → C → F → D → A"
            - "B → D → A → C → E → F → G"
            - "G → B → C → E → F → D → A"
            - "B → E → G → C → F → D → A"
          correct_index: 0
          option_feedback:
            1: "Fix and Verify before Hypothesis is the *tinkering* anti-cycle: edit, run, hope, repeat. The whole point of hypothesis-driven debugging is that the fix comes near the end of the process."
            2: "Predict before Symptom inverts the order. You can't predict what *should* happen until you know what *is* happening. The Symptom is what triggers the cycle in the first place."
            3: "Predict before Evidence is closer to right but *very* close to wrong. Predict comes from understanding the spec; Evidence comes from running the program. The order is: Symptom (run) → Predict (what *should* the state be) → Evidence (collect actual state) → Hypothesis."
          explanation: |
            **Symptom → Predict → Evidence → Hypothesis → Localize → Fix → Verify.** The order matters: each stage produces what the next stage needs. Skipping or reordering creates known anti-patterns: tinkering (Fix-first), local verification (skipping Verify of the full suite), or pattern-matching wrong fixes (Localize without Hypothesis).

            🪞 **Final reflection (no graded answer):** *Which stage is hardest for you to slow down on?* If your honest answer is "Fix" — i.e., you skip ahead to editing — you're in good company. That's the most common failure mode. The remedy is not willpower; it's the explicit form of the cycle plus practice. You just did three rounds of practice.

        - question: |
            *(Spaced retrieval — Step 1's "no edit until stage 6" rule.)* You're 30 seconds into investigating a bug. You think you see the problem. What does the discipline say to do *right now*?
          type: single
          options:
            - "Make the edit immediately while the insight is fresh"
            - "Form an explicit hypothesis (in words) before touching the code"
            - "Run the failing test 3 more times to make sure it's reproducible"
            - "Consult the time-travel debugger first; insight without evidence is a hallucination"
          correct_index: 1
          option_feedback:
            0: "Edit-first is the *anti-pattern* this tutorial is built to dismantle. Bugs that 'felt obvious' are exactly where confirmation bias lives — the discipline is to verbalize the hypothesis first."
            2: "You should already have a reproducible failure (Step 1's discipline) before you ever entered the investigation. Running the test more times is not the next move; *committing* to a hypothesis is."
            3: "TT-debugger is a *tool for evidence-gathering*, not a substitute for the hypothesis stage. Form the hypothesis first, then use the debugger to test it."
          explanation: |
            "No edit until stage 6" is the central rule. Even a 5-second hypothesis ("I think it's the off-by-one in the range call") forces you to articulate what you believe before you commit to a fix. Without articulation, you fix-and-hope, which can take 10× longer than verbalize-then-fix.

        - question: |
            *(Transfer — apply the cycle to a new case.)* A teammate reports: *"My function `expand_aliases` is supposed to look up names in `aliases.json`, but every key returns `None`."* Which stage of the debugging cycle did your teammate just do, and what's the *next* stage?
          type: single
          options:
            - "They gave a Symptom; the next stage is Predict"
            - "They gave a Hypothesis; the next stage is Localize"
            - "They gave Evidence; the next stage is Verify"
            - "They gave a Fix; the next stage is to confirm it works"
          correct_index: 0
          option_feedback:
            1: "A hypothesis names a *cause* — e.g., 'I think the JSON is failing to parse.' Your teammate described what they observe (a symptom), not why it's happening."
            2: "Evidence is *concrete observation* (e.g., 'I added `print(repr(key))` and saw `\"name\\n\"`'). 'Every key returns None' is a symptom — the externally visible fault — not the underlying evidence."
            3: "No fix has been proposed. They reported a problem; the cycle starts at Symptom and works forward."
          explanation: |
            **Symptom** = the externally visible fault ("returns None"). The next stage is **Predict** — *what should happen* per the spec? Then **Evidence** — what *is* happening (use the debugger or `print(repr(...))`). Then **Hypothesis**. Skipping Predict is the most common shortcut and the most expensive one — without a written prediction, you can't tell whether observation matches expectation.

        - question: |
            *(Spaced — Step 2's aliasing badge.)* Your code does:
            ```python
            def add_to(items=[]):
                items.append("x")
                return items

            print(add_to())   # ['x']
            print(add_to())   # ['x', 'x']  ←  surprise
            ```
            Which Python rule is biting you?
          type: single
          options:
            - "Lists are immutable — calling `.append` actually creates a new list each time"
            - "Default arguments are evaluated **once** at function-definition time, so the *same* list is reused across calls"
            - "Function calls inside a script always share their parameter memory unless `copy.deepcopy` is used"
            - "Python caches small lists; `[]` always points to the same canonical empty list"
          correct_index: 1
          option_feedback:
            0: "Lists are *mutable* (`.append` mutates in place). The bug here is real and the second call sees the first call's mutation."
            2: "Function parameter scoping is normal — local in scope, separate per call. The trap is *only* with mutable default values, because the default object is created once."
            3: "Python doesn't intern empty lists. `[] is []` returns False (try it). Default mutable args is a separate, well-documented Python footgun."
          explanation: |
            **Default argument values are evaluated once, at function-definition time.** The `items=[]` creates one list, bound to the function as its default. Every call that uses the default reuses *that same list*. The fix is `def add_to(items=None): items = items or []` (or `if items is None: items = []`). This is one of Python's top-5 gotchas — the time-travel debugger's *aliasing badge* (Step 2) lights up on this exact pattern.
