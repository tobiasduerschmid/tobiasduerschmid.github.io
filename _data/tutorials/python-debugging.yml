    solution:
      files:
        - path: "waitlist.py"
          language: "python"
          content: |
            """Course waitlist simulator — bug fixed (FIFO enforced)."""

            from dataclasses import dataclass, field


            @dataclass
            class CourseState:
                capacity: int
                enrolled: list = field(default_factory=list)
                waitlist: list = field(default_factory=list)

                @property
                def open_seats(self):
                    return self.capacity - len(self.enrolled)


            @dataclass(frozen=True)
            class Event:
                step: int
                kind: str
                course: str
                student: str = None


            def initial_state():
                return {
                    "CS201": CourseState(capacity=2, enrolled=["Ava Chen", "Ben Ortiz"]),
                    "MATH220": CourseState(capacity=1, enrolled=["Iris Long"]),
                }


            def sample_events():
                return [
                    Event(1, "join_waitlist", "CS201", "Mina Patel"),
                    Event(2, "join_waitlist", "CS201", "Theo Rios"),
                    Event(3, "join_waitlist", "CS201", "Jules Kim"),
                    Event(4, "drop", "CS201", "Ben Ortiz"),
                    Event(5, "join_waitlist", "MATH220", "Noor Ali"),
                    Event(6, "join_waitlist", "CS201", "Kai Morgan"),
                    Event(7, "drop", "MATH220", "Iris Long"),
                    Event(8, "drop", "CS201", "Ava Chen"),
                    Event(9, "join_waitlist", "CS201", "Sam Lee"),
                ]


            def apply_event(state, event):
                course = state[event.course]
                if event.kind == "join_waitlist":
                    _handle_join(course, event.student)
                elif event.kind == "drop":
                    _handle_drop(event.course, course, event.student)
                else:
                    raise ValueError(f"unknown event kind {event.kind!r}")


            def _handle_join(course, student):
                if student in course.enrolled or student in course.waitlist:
                    raise ValueError(f"duplicate student in course state: {student}")

                if course.open_seats > 0:
                    course.enrolled.append(student)
                else:
                    course.waitlist.append(student)


            def _handle_drop(course_name, course, student):
                if student in course.enrolled:
                    course.enrolled.remove(student)
                    allocate_next(course_name, course)
                elif student in course.waitlist:
                    course.waitlist.remove(student)


            def allocate_next(course_name, course):
                """Fill open seats from the waitlist (FIFO)."""
                while course.open_seats > 0 and course.waitlist:
                    next_student = course.waitlist.pop(0)
                    course.enrolled.append(next_student)


            def run_events(events=None, state=None):
                if state is None:
                    state = initial_state()
                if events is None:
                    events = sample_events()
                for event in events:
                    apply_event(state, event)
                return state
      explanation: |
        The fix is `course.waitlist.pop(0)` instead of `course.waitlist.pop()`. Python's `list.pop()` with no argument removes the **last** element (LIFO / stack behavior). For a FIFO queue you need `pop(0)` to remove the **first** element.

        The history-scrubber technique was the key to localization. The final state (CS201 enrolled = `['Ava Chen', 'Jules Kim']` — wrong) is several events after the *first* bad transition (event 4: drop Ben Ortiz). Stepping forward from the start would have meant inspecting state at every event — the scrubber lets you instead anchor on the wrong final state and rewind backward to the moment things first diverged from the spec.

        For a production-quality version, prefer `collections.deque`:

        ```python
        from collections import deque
        # In CourseState: waitlist: deque = field(default_factory=deque)
        # In allocate_next: next_student = course.waitlist.popleft()
        ```

        `deque.popleft()` is O(1) where `list.pop(0)` is O(n) (the rest of the list has to shift). At a small scale it doesn't matter, but the bigger win is **readability**: `popleft()` *says* "this is a queue" in a way `pop(0)` doesn't.

        Common wrong fixes (and why they're wrong):

        - **Sorting `waitlist` alphabetically before pop.** This produces deterministic-looking output that happens to match the test by coincidence (Mina, Theo come before Jules alphabetically). It is unrelated to FIFO.
        - **Special-casing Jules Kim or specific names.** Hardcodes a fix to *this* event stream; any new event ordering breaks again.
        - **Reordering `sample_events()`.** Editing the input data to match the bug.
        - **Changing the test's expected lists to LIFO.** Editing the spec to match the bug.

    tests:
      - description: "Both waitlist tests pass"
        command: |
          import pytest, io, sys
          old = sys.stdout; sys.stdout = buf = io.StringIO()
          code = pytest.main(['/tutorial/test_waitlist.py', '-v', '--tb=short', '--no-header'])
          sys.stdout = old; output = buf.getvalue(); print(output)
          assert code == 0, f"Some tests still fail. pytest output:\n\n{output}\n\nThe fix should make `allocate_next` admit students in FIFO order."
        hints:
          - title: "Small nudge"
            text: "Look at `allocate_next` — specifically the call to `pop()`. Which end of the list does `pop()` with no argument remove from?"
          - title: "Strategic hint"
            text: "Set a breakpoint on the `next_student = course.waitlist.pop()` line. When paused, watch `course.waitlist[0]` and `course.waitlist[-1]`. Step over. Which one became `next_student`? Which one *should* have, given FIFO policy?"
          - title: "Spoiler — full fix"
            text: "Change `course.waitlist.pop()` to `course.waitlist.pop(0)` in `allocate_next`. (Or better: use `collections.deque` and `popleft()` — but `pop(0)` is enough to make tests pass.)"

      - description: "Workaround guard — fix is FIFO removal in allocate_next"
        command: |
          source = open('/tutorial/waitlist.py').read()
          alloc_block = source[source.find('def allocate_next'):source.find('def run_events')]
          assert 'pop(0)' in alloc_block or 'popleft' in alloc_block, \
              "The fix should change `pop()` to `pop(0)` (or use `deque.popleft()`) inside `allocate_next`. That's the line where FIFO policy lives."

      - description: "Workaround guard — events unchanged"
        command: |
          source = open('/tutorial/waitlist.py').read()
          assert 'Event(1, "join_waitlist", "CS201", "Mina Patel"),' in source, \
              "Don't reorder `sample_events()` — the events represent real student actions. Revert the event list."
          assert 'Event(3, "join_waitlist", "CS201", "Jules Kim"),' in source, \
              "Don't change the event stream. The bug is in `allocate_next`, not the events."

      - description: "Workaround guard — test expectations unchanged"
        command: |
          source = open('/tutorial/test_waitlist.py').read()
          assert '["Mina Patel", "Theo Rios"]' in source, \
              "Don't change the expected enrolled list — FIFO is the spec. Revert `test_waitlist.py`."
          assert '["Jules Kim", "Kai Morgan", "Sam Lee"]' in source, \
              "Don't change the expected waitlist — FIFO is the spec. Revert `test_waitlist.py`."

      - description: "Workaround guard — no alphabetical sort hack"
        command: |
          source = open('/tutorial/waitlist.py').read()
          alloc_block = source[source.find('def allocate_next'):source.find('def run_events')]
          assert 'sort' not in alloc_block.lower(), \
              "Don't sort the waitlist alphabetically — the test happens to be alphabetical by coincidence, but the spec is FIFO (insertion order), not alphabetical."

      - description: "Workaround guard — _handle_join still appends"
        command: |
          source = open('/tutorial/waitlist.py').read()
          join_block = source[source.find('def _handle_join'):source.find('def _handle_drop')]
          assert 'course.waitlist.append(student)' in join_block, \
              "`_handle_join` should still APPEND new waitlisted students to the end. The bug was on the *removal* side (allocate_next), not the *insertion* side."

    quiz:
      title: "Case 3 — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            For a Python list `xs = ['a', 'b', 'c', 'd']`, what does `xs.pop()` return, and what is `xs` afterward?
          type: single
          options:
            - "Returns `'a'`; `xs` becomes `['b', 'c', 'd']`"
            - "Returns `'d'`; `xs` becomes `['a', 'b', 'c']`"
            - "Returns the entire list; `xs` becomes `[]`"
            - "Raises an error — `pop()` requires an index"
          correct_index: 1
          option_feedback:
            0: "That would be `xs.pop(0)`, which removes from the front. With no argument, `pop()` removes from the end."
            2: "`pop` removes a single element, not the whole list. For a single-element list, that element happens to *be* the whole list, but in general only one element is returned."
            3: "`pop()` works without an argument — it defaults to `-1`, the last element. `pop(0)` and `pop(-1)` are both valid."
          explanation: |
            `list.pop()` with no argument removes and returns the **last** element. This is LIFO (stack) behavior. For FIFO (queue) behavior, use `pop(0)` (or `collections.deque.popleft()` for O(1) performance).

        - question: |
            Which of these is the **correct** fix to enforce FIFO admission policy?
          type: single
          options:
            - "Sort `course.waitlist` alphabetically before calling `pop()`"
            - "Special-case Jules Kim and Mina Patel in `allocate_next`"
            - "Change `course.waitlist.pop()` to `course.waitlist.pop(0)` in `allocate_next`"
            - "Reorder `sample_events()` so Jules Kim joins last"
          correct_index: 2
          option_feedback:
            0: "Alphabetical order happens to match FIFO order in this specific test by coincidence (Mina, Theo come before Jules). Change one student's name and the test breaks. The spec is FIFO (insertion order), not alphabetical — these are different concepts."
            1: "Hardcoding student names is the textbook *symptom-patch* anti-pattern. The next event stream with different names breaks again. The bug isn't about which students; it's about which *end* of the list is admitted first."
            3: "Editing the input data to match the bug is a workaround. Real registrar systems can't reorder real student actions to make their code happy."
          explanation: |
            The bug is in *how a student is removed from the waitlist*, not in any of the data. `pop()` removes from the back; `pop(0)` removes from the front. FIFO requires removing from the front.

        - question: |
            You discover the symptom (CS201 enrolls the wrong students) at the **end** of the program, but the cause is in **event 4** (drop Ben Ortiz, which triggers `allocate_next`). Which technique most directly localizes the bug?
          type: single
          options:
            - "Step from event 1, watching state after each event, until something looks wrong"
            - "Set a breakpoint on the failing test's assertion and inspect the final state"
            - "Run to completion, then drag the History scrubber backward to find the first event where state diverged from the spec"
            - "Add `print(state)` after every event and read the output"
          correct_index: 2
          option_feedback:
            0: "Forward stepping works but is wasteful — events 1, 2, 3 produce no symptom. You'd inspect them anyway because you don't know which event is the bad one until you reach it. Backward navigation lets you anchor on the *known* wrong final state and rewind to the divergence."
            1: "The final state inspection only confirms the symptom you already knew about (the test failed). It doesn't help localize *which event* caused it."
            3: "Adding prints is a viable fallback when no time-travel debugger is available. With one available, scrubbing is faster, leaves no print debris in the code, and lets you skim 9 snapshots in seconds."
          explanation: |
            **Back-in-time / history-scrubbing is built for exactly this bug shape.** When the symptom appears later than the cause, scrubbing backward from the symptom — instead of stepping forward from the start — directly walks you to the divergence point. Forward stepping spends time on events that produced no observable change.

        - question: |
            *(Bonus — code communication.)* Which choice best **communicates** that a list is being used as a FIFO queue?
          type: single
          options:
            - "`my_list.pop(0)` (Python `list`)"
            - "`my_deque.popleft()` (`collections.deque`)"
            - "`my_list[0]; del my_list[0]`"
            - "`heapq.heappop(my_heap)`"
          correct_index: 1
          option_feedback:
            0: "It works, but `pop(0)` doesn't tell the next reader \"queue.\" Many lists in real code use `pop(0)` for non-queue reasons. The reader has to infer intent from context."
            2: "Functionally equivalent but harder to read. `popleft()` says queue in one word."
            3: "`heapq` is a priority queue, not a FIFO queue. Order is by *priority*, not insertion."
          explanation: |
            `collections.deque.popleft()` is the idiomatic, readable choice. It tells the next reader: *this is a FIFO queue*. `list.pop(0)` works but doesn't communicate intent (and is O(n) for large lists). For a debugging tutorial, the takeaway is broader: **fixes that document intent are easier to get right and easier to maintain** than fixes that merely produce the right output.


