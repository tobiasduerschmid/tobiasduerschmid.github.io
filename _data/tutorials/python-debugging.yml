          from __future__ import annotations

          from dataclasses import dataclass

          from .audit import AuditTrail
          from .catalog import Catalog
          from .checkout_service import CheckoutService
          from .event_bus import EventBus
          from .inventory import InventoryService
          from .notifications import CustomerNotifier
          from .payment import PaymentGateway
          from .promotions import PromotionEngine
          from .shipping import FulfillmentScheduler, ShippingQueue
          from .workflow_config import WorkflowConfig


          @dataclass
          class CheckoutApp:
              checkout_service: CheckoutService
              inventory: InventoryService
              bus: EventBus
              audit: AuditTrail
              notifier: CustomerNotifier
              shipping_queue: ShippingQueue
              payment_gateway: PaymentGateway


          def build_app(stock_by_sku=None):
              catalog = Catalog({"USB-CABLE": 1299, "LAPTOP-STAND": 4200, "NOISE-CANCEL-CASE": 1800})
              promotions = PromotionEngine({"TENOFF": 1000, "FREESHIP": 500})
              payment_gateway = PaymentGateway()
              inventory = InventoryService(stock_by_sku or {"USB-CABLE": 5, "LAPTOP-STAND": 3, "NOISE-CANCEL-CASE": 0})
              bus = EventBus()
              audit = AuditTrail()
              notifier = CustomerNotifier()
              shipping_queue = ShippingQueue()
              fulfillment = FulfillmentScheduler(shipping_queue)

              bus.install(WorkflowConfig.registrations(audit, notifier, fulfillment))

              checkout_service = CheckoutService(catalog, promotions, payment_gateway, inventory, bus)
              return CheckoutApp(
                  checkout_service=checkout_service,
                  inventory=inventory,
                  bus=bus,
                  audit=audit,
                  notifier=notifier,
                  shipping_queue=shipping_queue,
                  payment_gateway=payment_gateway,
              )

