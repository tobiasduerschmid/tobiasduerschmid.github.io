title: "Debugging Python: From Symptom to Fix"
description: "Learn debugging as a distinct, learnable skill — not as accidental tinkering. You'll work three real Python bugs (recursive boundary, data-representation, temporal ordering) using a hypothesis-driven process and the time-travel debugger's breakpoints, conditional breakpoints, watch expressions, and history scrubber. Ends with an interleaved triage drill and an independent transfer challenge."

backend: pyodide
debugger: true
pytest: true

debugger_options:
  back_in_time: true
  max_history: 20000
  snapshot_depth: 4
  filter_globals: true

require_tests: true
autosave_type: files
editor_split: true
output_height: "30%"

setup_commands:
  - "import pyodide_js; await pyodide_js.loadPackage('pytest')"
  - "import sys; sys.path.insert(0, '/tutorial')"
  - |
    import pytest as _pytest, sys as _sys
    def _make_pytest_patch():
        _orig = _pytest.main
        _sysmod = _sys
        _ours = ('greet','pathfinder','maze_data','ledger','waitlist','tagger','tour')
        def _patched(*a, **kw):
            for m in list(_sysmod.modules):
                if m.startswith('test_') or m in _ours:
                    del _sysmod.modules[m]
            return _orig(*a, **kw)
        return _patched
    _pytest.main = _make_pytest_patch()

steps:

  # ===========================================================================
  # STEP 1 — The Debugging Process (worked example on a tiny off-by-one bug)
  # Pedagogy:
  #   Worked example       — instructor narrates each stage of the cycle.
  #   Generation effect    — predict outputs before running.
  #   Retrieval practice   — quiz at end requires recalling the 7 stages.
  #   Bloom's level        — Understand / Apply.
  # ===========================================================================
  - title: "The Debugging Process"
    instructions: |
      > 🎯 **Goal:** Learn the 7-stage debugging cycle by watching it applied to a tiny bug, then apply the last steps yourself.
      > 🧠 **Bloom's level:** *Understand / Apply.*

      ### 💡 Why this tutorial exists

      Most CS classes treat debugging as something that *just happens* when you write code. It isn't. Studies of novice debuggers consistently find a small set of unproductive habits — *tinkering* (random edits), *symptom-patching* (adding `+1` to make the output match), and *local verification* ("the line I just wrote looks fine, so the program must be fine"). These habits are not personality flaws. They're the absence of a **process**.

      The process below is what the research calls a **hypothesis-driven debugging cycle**. It applies to every bug you'll ever fix:

      ```mermaid
      flowchart TD
          A[1. Symptom — what's wrong?] --> B[2. Predict — what should the state be?]
          B --> C[3. Evidence — collect data with the right tool]
          C --> D[4. Hypothesis — one sentence cause]
          D --> E[5. Localize — first wrong line]
          E --> F[6. Fix — minimal change]
          F --> G[7. Verify — rerun ALL tests]
          G --> H[8. Reflect — what would I do differently?]
      ```

      Notice what is **not** in the diagram: editing code. No edit happens until stage 6. That's the central discipline.

      ### 📂 What you have

      Two files: `greet.py` (production code, has a bug) and `test_greet.py` (three pytest tests, one of which fails). Don't run anything yet.

      ### 🔍 1. Symptom — predict, then run

      Open `greet.py`. Read it. Then **predict**, in your head:

      - What will `greet(["Ada", "Linus", "Grace"])` return?
      - What will `greet([])` return?
      - What will `greet(["Solo"])` return?

      Hold those predictions. Now click **Run**. One test fails. Read the failure carefully — pytest tells you the exact mismatch. *That mismatch is the symptom.* Write it in your head: **expected** `"Hello, Ada, Linus, Grace!"`, **actual** `"Hello, Linus, Grace!"`.

      ### 🧠 2. Predict the state

      Before opening the debugger, predict: at the moment the loop body first executes, what should `i` be? What is `names[i]` supposed to be? Hold the answer.

      ### 🔬 3. Evidence — your first breakpoint

      A breakpoint is already set on line 4 (the `for` line). Click **Debug** (next to Run). Execution pauses *before* the marked line runs. The **Variables** tab shows `names`. The **Watch** tab is empty — add `i` to it (you'll see `<not yet defined>` since the loop hasn't started).

      Now click **Step Over** (F10) once. The loop has started one iteration. Look at `i` in Watch. Look at `names[i]`. Compare with your prediction.

      ### 🔎 4. Hypothesis (one sentence)

      Don't fix yet. Write the hypothesis in your head, ideally as a single sentence: *"The loop starts at index 1, so `names[0]` is never appended to `parts`."*

      ### 📍 5. Localize

      Which line is the **first divergence** between intended and actual behavior? It's not the test (the test is correct). It's not the `return` (it returns what it has). It's the `range(...)` call.

      ### 🩹 6. Minimal fix

      Now you may edit. **Smallest possible change.** Don't refactor the whole function. Don't add a special case for empty lists. Just fix the iteration range.

      ### ✅ 7. Verify

      Click **Run**. *All three* tests must pass — the one that was failing AND the two that already passed. Verification means *no regressions*, not just *the failing test now passes*. Confusing those two is the **local-verification** trap.

      ### 🪞 8. Reflect

      Notice what just happened: you did not look at the code first and try to spot the bug. You ran the tests, named the symptom, predicted the state, collected evidence, formed a hypothesis, then fixed. Six stages of *not editing* before one stage of editing. That ratio is the difference between debugging and tinkering.

    files:
      - path: "greet.py"
        language: "python"
        content: |
          def greet(names):
              parts = ["Hello"]
              # BUG is somewhere on the next line.
              for i in range(1, len(names)):
                  parts.append(names[i])
              return ", ".join(parts) + "!"

      - path: "test_greet.py"
        language: "python"
        content: |
          from greet import greet


          def test_three_names_all_appear():
              assert greet(["Ada", "Linus", "Grace"]) == "Hello, Ada, Linus, Grace!"


          def test_empty_list_just_says_hello():
              assert greet([]) == "Hello!"


          def test_single_name_appears():
              assert greet(["Solo"]) == "Hello, Solo!"

    open_file: "greet.py"
    run_file: "test_greet.py"

    solution:
      files:
        - path: "greet.py"
          language: "python"
          content: |
            def greet(names):
                parts = ["Hello"]
                for i in range(0, len(names)):
                    parts.append(names[i])
                return ", ".join(parts) + "!"
      explanation: |
        The fix is `range(0, len(names))` (or equivalently `range(len(names))`). Mapping back to the cycle:

        - **Symptom** — `test_three_names_all_appear` failed; `Ada` was missing.
        - **Predict** — at loop start, `i` should be `0` and `names[i]` should be `"Ada"`.
        - **Evidence** — Step Over once with the breakpoint on the `for` line; `i` was `1`, not `0`.
        - **Hypothesis** — the loop starts at index 1, skipping `names[0]`.
        - **Localize** — line 4, the `range(...)` call.
        - **Fix** — change `range(1, ...)` to `range(0, ...)`.
        - **Verify** — all three tests pass after the fix.

        Notice: we didn't *also* refactor to `for name in names:` even though that's nicer. A bug fix is not a license to clean up the surrounding code. Smaller fixes are safer to review and easier to revert if they introduce a new problem.

    tests:
      - description: "All three tests pass"
        command: |
          import pytest, io, sys
          old = sys.stdout; sys.stdout = buf = io.StringIO()
          code = pytest.main(['/tutorial/test_greet.py', '-v', '--tb=short', '--no-header'])
          sys.stdout = old; output = buf.getvalue(); print(output)
          assert code == 0, f"Some tests still fail. pytest output:\n\n{output}\n\nFix the loop range so `names[0]` is included."
        hints:
          - title: "Small nudge"
            text: "Look carefully at the `range(...)` call. What's the first index it produces?"
          - title: "Strategic hint"
            text: "Trace `greet([\"Ada\", \"Linus\", \"Grace\"])` by hand. What value of `i` does the first iteration use? What index *should* it use to include `\"Ada\"`?"
          - title: "Spoiler — full fix"
            text: "Change `range(1, len(names))` to `range(0, len(names))` (or `range(len(names))`). The original skipped index 0."

      - description: "Workaround guard — test file unchanged"
        command: |
          source = open('/tutorial/test_greet.py').read()
          assert '"Hello, Ada, Linus, Grace!"' in source, \
              "Don't change the test file — production code is what we change. Revert `test_greet.py`."
          assert '"Hello!"' in source, \
              "Don't change the test file — production code is what we change. Revert `test_greet.py`."

    quiz:
      title: "The Debugging Process — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            A teammate says: *"I added `print(repr(x))` and saw the value had a leading space."*

            Which stage of the debugging cycle is this?
          type: single
          options:
            - "Hypothesis"
            - "Evidence collection"
            - "Fix"
            - "Verification"
          correct_index: 1
          option_feedback:
            0: "A hypothesis is a *one-sentence proposed cause* (e.g., \"the input has invisible whitespace\"). Adding a `print` and observing a value is the *evidence* you'd use to test such a hypothesis."
            2: "A fix is an edit that addresses the cause. Observing a value via `print(repr(...))` is gathering data — no edit has happened yet."
            3: "Verification is rerunning the test suite *after* a fix. The `print(repr(x))` happened before any edit, so it's earlier in the cycle."
          explanation: |
            Adding instrumentation and observing values is **evidence collection** (stage 3). The hypothesis comes *after* you have evidence — and the fix and verification come later still. Naming the stage you're in helps you avoid skipping straight to fixing.

        - question: |
            A student fixes their failing test, runs `pytest test_failing.py` (just that one file) and sees green. They mark the bug fixed and move on. What stage did they skip?
          type: single
          options:
            - "Verification — they should rerun **all** tests, not only the previously failing one"
            - "Hypothesis — they should have written down their proposed cause first"
            - "Localization — they should have identified the exact line"
            - "Nothing — running the previously-failing test is sufficient verification"
          correct_index: 0
          option_feedback:
            1: "Hypothesis is important, but the student got past it — they identified a fix that worked. The skip happened *after* the fix, when they didn't rerun the rest of the suite."
            2: "Localization happened — they fixed something. The skip was *after* the fix, in the verification phase."
            3: "This is the **local-verification trap** — judging the whole program by checking only the part you just touched. A fix can break tests that were previously passing, and the only way to catch that is rerunning the whole suite."
          explanation: |
            Verification means rerunning the **entire** test suite — including tests that previously passed. A fix in one place can introduce a regression somewhere else, and that's exactly the kind of regression a quick "did the failing test go green?" check will miss.

        - question: |
            Which statement matches what professional debugging research consistently recommends?
          type: single
          options:
            - "If your code compiles, the bug must be a logic error in your code."
            - "If your code compiles, then the surface-level structure is OK — but compilation says nothing about correctness."
            - "If your code compiles, your tests should also pass."
            - "If your code compiles cleanly with no warnings, you can skip the test suite for that change."
          correct_index: 1
          option_feedback:
            0: "Compilation rules out *some* errors (typos, missing imports) but not all bugs. Logic, semantic, type, and data-representation bugs all compile cleanly."
            2: "Tests can fail even when code compiles. Compilation and behavior are different properties — confusing them is a common error pattern documented across novice debugging studies."
            3: "Compiling cleanly is necessary but not sufficient. The test suite verifies behavior, which is a strictly stronger property than \"compiles.\""
          explanation: |
            **Compilation says nothing about correctness.** It rules out a small subset of errors (typos, missing imports). Many of the most expensive bugs in real systems compile cleanly, run, and produce wrong output. Confusing "compiles" with "works" is one of the top recurring patterns flagged in the debugging-education literature.

        - question: |
            Which of these is the *symptom*, and which is the *cause*?

            Scenario: A function `total(items)` should sum prices, but for one specific user it returns a value that's $5 too high. You discover that the user's profile has a discount field that was never being applied because the discount-loading function reads the wrong column from the database.
          type: single
          options:
            - "Symptom: discount-loading reads wrong column. Cause: total is $5 too high."
            - "Symptom: total is $5 too high. Cause: discount-loading reads wrong column."
            - "They are the same thing — the user's bill is wrong."
            - "Neither — both are bugs and need separate fixes."
          correct_index: 1
          option_feedback:
            0: "These are flipped. The thing the user *experiences* is the wrong total — that's the symptom. The thing in the code that produces it is the wrong-column read — that's the cause."
            2: "Symptom and cause are different concepts. The symptom is what you observe (a wrong total). The cause is the broken thing that produces the symptom (the wrong column)."
            3: "There is one root cause (the wrong column) producing one symptom (the wrong total). Treating them as separate bugs leads to symptom-patching — e.g., subtracting $5 from the total — without fixing the actual problem."
          explanation: |
            The symptom is what you *observe* (the wrong total). The cause is the *reason* it happens (the discount-loading function reading the wrong column). Symptom-patching — e.g., always subtracting $5 from totals for that user — would make the test green without fixing the underlying bug.


  # ===========================================================================
  # STEP 2 — Debugger Tour (tool fluency anchored to questions, no bug)
  # Pedagogy:
  #   Tool subordinated to question — each tool move answers a debugging
  #     question, not a feature menu.
  #   Faded scaffolding — students click through with concrete prompts; later
  #     cases ask the same moves with no prompts.
  #   Bloom's level — Remember / Apply.
  # ===========================================================================
  - title: "Debugger Tour"
    instructions: |
      > 🎯 **Goal:** Build minimum tool fluency so you have a hand on the wheel before the next three cases hit. There's no bug here — `tour.py` runs correctly.
      > 🧠 **Bloom's level:** *Remember / Apply.*

      ### 🎚️ How this step is organized

      Each section pairs a **debugging question** with the **smallest tool move** that answers it. That ordering matters: the research is explicit that tool-first instruction (here are 12 buttons!) produces superficial clicking. Tools become *useful* only when subordinated to a real question.

      Click **Debug** (not Run) to start each section.

      ### 1. *"Where is execution right now?"* → Breakpoint

      Click the gutter (the empty space to the left of the line numbers) next to **line 8** in `tour.py` (the line `total += score`). A red dot appears — that's a breakpoint.

      Click **Debug**. Execution pauses *before* line 8 runs, with a yellow arrow in the gutter. The current line is highlighted.

      ### 2. *"What does this variable hold right now?"* → Variables tab + hover

      Look at the **Variables** tab (right side). You'll see locals like `score` and `total`. Each value has a type badge (`int`, `list`, `dict`).

      Now **hover over `score`** in the editor. A tooltip shows the value. The same trick works on any identifier in the source — no need to dig through the panel.

      ### 3. *"What value will an expression have at this point?"* → Watch

      Open the **Watch** tab. Click ➕ and add `total + score`. The expression evaluates *as if it ran right now*. Click **Step Over** (F10). The value updates.

      Watches are how you ask "what would `len(items) * factor` be at this exact moment?" without editing the program to add a `print`.

      ### 4. *"Which iteration first violates an invariant?"* → Conditional breakpoint

      Right-click the red dot on line 8 → **Edit Breakpoint** → enter `score < 0` as the condition. Click **Continue** (F5).

      Execution flies through every iteration where `score >= 0` and pauses *only* at the iteration where `score < 0` (line 8). That's the iteration where the invariant first fails.

      Without conditional breakpoints, you'd step 9 times through normal iterations to reach the one you care about. With one, the debugger does the filtering.

      ### 5. *"How did we get here?"* → Call Stack

      Open the **Call Stack** tab. You'll see `process_scores → main`. Click each frame to inspect that scope's locals. The stack tells the story of how this line got executed.

      For recursive code, the stack is a *vertical history of decisions*. You'll use it heavily in Case 1.

      ### 6. *"What was this variable BEFORE this line ran?"* → History scrubber

      Drag the **History** scrubber (the timeline at the bottom) backward by 5-10 ticks. Watch `total` rewind in the Variables tab. Drag forward — it advances. The arrow gutter turns gray when you're rewound (you're not at "live" execution anymore).

      This is the time-travel feature. You can move to any moment in the program's history without restarting.

      ### 7. *"Are these two variables actually the same object?"* → Aliasing badge

      `tour.py` deliberately includes a classic Python pitfall: `register_score` uses a *shared default list*. Run to completion (Continue twice). In the Variables tab, look at `defaults` and the inner `students` list inside `register_score`. They share an `oid` and a `↔` alias badge — they're literally the same list in memory.

      That's how you spot aliasing bugs *before* they bite.

      ### 🪞 Reflect

      You haven't fixed any bug here. You've practiced the seven smallest moves the debugger offers. The next three steps will ask you to use them on real bugs — and the most important habit is: **for each move, name the question it answers.** If you can't, you don't need that move yet.

    files:
      - path: "tour.py"
        language: "python"
        content: |
          # Tour program — no bug. Exercise the debugger UI here.

          def compute_score(raw):
              return sum(raw) / len(raw)

          def process_scores(scores):
              total = 0
              for score in scores:
                  total += score
              return total / len(scores)

          # Classic shared-default-list aliasing trap.
          def register_score(name, value, students=[]):
              students.append({"name": name, "score": value})
              return students

          def main():
              raw = [
                  ("Ada", [95, 88, 92]),
                  ("Linus", [72, 81, 78]),
                  ("Grace", [98, 95, 91]),
                  ("Alan", [-3, 55, 70]),     # negative — used by §4
                  ("Margaret", [85, 89, 87]),
              ]
              scores = []
              defaults = []
              for name, raw_scores in raw:
                  score = compute_score(raw_scores)
                  defaults = register_score(name, score)
                  scores.append(score)
              average = process_scores(scores)
              print(f"average score: {average:.2f}")
              return average

          main()

    open_file: "tour.py"

    require_tests: false

    solution:
      explanation: |
        There's no fix to apply — this step is procedural drill. The aliasing trap on line 14 (`students=[]` default argument shared across calls) is a real Python gotcha worth remembering: default arguments are evaluated **once** at function-definition time, not on each call. The standard fix in production code is `students=None` plus `if students is None: students = []`. We don't fix it here; we just notice that the debugger's `↔` badge would tell us about it.


  # ===========================================================================
  # STEP 3 — Case 1: Maze Pathfinder (Boundary Bug)
  # Source: debugging_case_studies/case1_maze_breakpoints/
  # Pedagogy:
  #   Apply the cycle from Step 1 — full debugging form scaffold.
  #   Worked-example fade — Step 1 was fully narrated; here you drive.
  #   Variation — same cycle, different surface (recursion + call stack).
  #   Bloom's level — Apply / Analyze.
  # ===========================================================================
  - title: "Case 1 — Maze Pathfinder (Boundary Bug)"
    instructions: |
      > 🎯 **Goal:** A maze has a valid 10-step path from `S` to `G`, but the pathfinder returns `None` when called with `max_steps=10`. Find why.
      > 🧠 **Bloom's level:** *Apply / Analyze.*

      ### 📂 What you have

      A small delivery robot has a battery measured in grid steps. `find_path(maze, max_steps)` should return a path if one exists using **at most** `max_steps` moves, otherwise `None`.

      Three pytest tests in `test_pathfinder.py`:

      - `test_tiny_maze_found_with_extra_budget` — passes.
      - `test_path_rejected_when_battery_too_small` — passes (max_steps=9, no 9-step path).
      - `test_path_found_when_battery_limit_is_exact` — **fails** (max_steps=10, but a 10-step path exists).

      The bug is **not** in the maze data. It is in the search logic.

      ### 1. Symptom — run and read

      Click **Run**. Read the failing assertion. Write the symptom in your head:
      *expected: a list of 11 positions; actual: `None`.*

      ### 2. Predict before debugging

      Open `pathfinder.py`. Read `_dfs` carefully — especially these two checks at the top of the function (lines ~13-17):

      ```python
      if steps_used >= max_steps:
          return None

      if current == goal:
          return path.copy()
      ```

      **Predict, before running anything:** at the moment a recursive call has just stepped onto the goal cell using exactly the budget, what are `steps_used` and `max_steps`? Which of the two checks above runs first? What does it return?

      Write the answer in your head before continuing.

      ### 3. Set evidence — breakpoint and watches

      Click the gutter beside **line 11** of `pathfinder.py` (`steps_used = len(path) - 1`). In the **Watch** tab, add these expressions, in order:

      - `current`
      - `goal`
      - `current == goal`
      - `steps_used`
      - `max_steps`

      ### 4. Drive

      Click **Debug**. The first pause is on the very first call (start cell). Use **Continue** (F5) to advance to the next call. Repeat. As recursion deepens, the **Call Stack** tab grows — click frames to inspect each level's locals.

      **Don't fix yet.** Continue until `current == goal` is `True` in the Watch tab.

      ### 5. The first wrong decision

      At the moment `current == goal` is `True`, look at `steps_used` and `max_steps`. Which conditional fires first when the body of `_dfs` runs at this point — the cutoff or the goal check?

      That is the **first divergence** between intended behavior ("we reached the goal, return the path") and actual behavior ("we hit the budget, return None").

      ### 6. Hypothesis

      State it in one sentence in your head: *"The cutoff check rejects exact-budget arrivals before the goal check can accept them."*

      ### 7. Minimal fix

      Edit `_dfs` so the goal check runs **before** the cutoff check. (Equivalently: make the cutoff accept the case where `current == goal`. The goal-first ordering is clearer because reaching the goal is terminal and valid regardless of how many steps it took.)

      ### 8. Verify

      Click **Run**. All three tests must pass — including `test_path_rejected_when_battery_too_small`. If that one breaks, your fix is too aggressive.

    files:
      - path: "maze_data.py"
        language: "python"
        content: |
          # Mazes used by the pathfinder case.

          # Shortest valid path from S to G is exactly 10 steps.
          # Chosen to expose an off-by-one boundary bug.
          BATTERY_LIMIT_MAZE = [
              "#########",
              "#S..#..G#",
              "#.#.#.#.#",
              "#.#...#.#",
              "#.#####.#",
              "#.......#",
              "#########",
          ]

          # Sanity maze whose shortest path is 2 steps.
          TINY_MAZE = [
              "#####",
              "#S.G#",
              "#####",
          ]

      - path: "pathfinder.py"
        language: "python"
        content: |
          """Depth-first maze pathfinder with a deliberately seeded boundary bug.

          The bug is not in the maze data. It is in the search logic.
          """

          def find_marker(maze, marker):
              for row_index, row in enumerate(maze):
                  col_index = row.find(marker)
                  if col_index != -1:
                      return row_index, col_index
              raise ValueError(f"marker {marker!r} not found")


          def is_open(maze, position):
              row, col = position
              return maze[row][col] != "#"


          def neighbors(maze, position):
              """Yield neighbors in a deterministic order so traces are repeatable."""
              row, col = position
              for next_position in [
                  (row, col + 1),  # east
                  (row + 1, col),  # south
                  (row, col - 1),  # west
                  (row - 1, col),  # north
              ]:
                  if is_open(maze, next_position):
                      yield next_position


          def find_path(maze, max_steps):
              """Return a path from S to G using at most max_steps moves.

              A path includes both the start and goal positions, so:
                steps_used == len(path) - 1
              """
              start = find_marker(maze, "S")
              goal = find_marker(maze, "G")
              return _dfs(
                  maze=maze,
                  current=start,
                  goal=goal,
                  max_steps=max_steps,
                  path=[start],
                  seen={start},
              )


          def _dfs(maze, current, goal, max_steps, path, seen):
              steps_used = len(path) - 1

              # Stop searching when the path has used the available battery budget.
              if steps_used >= max_steps:
                  return None

              if current == goal:
                  return path.copy()

              for next_position in neighbors(maze, current):
                  if next_position in seen:
                      continue
                  seen.add(next_position)
                  path.append(next_position)
                  result = _dfs(maze, next_position, goal, max_steps, path, seen)
                  if result is not None:
                      return result
                  path.pop()
                  seen.remove(next_position)

              return None

      - path: "test_pathfinder.py"
        language: "python"
        content: |
          from maze_data import BATTERY_LIMIT_MAZE, TINY_MAZE
          from pathfinder import find_path


          def test_tiny_maze_found_with_extra_budget():
              path = find_path(TINY_MAZE, max_steps=3)
              assert path is not None
              assert len(path) - 1 == 2


          def test_path_rejected_when_battery_too_small():
              path = find_path(BATTERY_LIMIT_MAZE, max_steps=9)
              assert path is None


          def test_path_found_when_battery_limit_is_exact():
              path = find_path(BATTERY_LIMIT_MAZE, max_steps=10)
              assert path is not None, "A 10-step path exists and should be accepted."
              assert len(path) - 1 == 10

    open_file: "pathfinder.py"
    run_file: "test_pathfinder.py"

    solution:
      files:
        - path: "pathfinder.py"
          language: "python"
          content: |
            """Depth-first maze pathfinder — boundary bug fixed."""

            def find_marker(maze, marker):
                for row_index, row in enumerate(maze):
                    col_index = row.find(marker)
                    if col_index != -1:
                        return row_index, col_index
                raise ValueError(f"marker {marker!r} not found")


            def is_open(maze, position):
                row, col = position
                return maze[row][col] != "#"


            def neighbors(maze, position):
                row, col = position
                for next_position in [
                    (row, col + 1),
                    (row + 1, col),
                    (row, col - 1),
                    (row - 1, col),
                ]:
                    if is_open(maze, next_position):
                        yield next_position


            def find_path(maze, max_steps):
                start = find_marker(maze, "S")
                goal = find_marker(maze, "G")
                return _dfs(
                    maze=maze,
                    current=start,
                    goal=goal,
                    max_steps=max_steps,
                    path=[start],
                    seen={start},
                )


            def _dfs(maze, current, goal, max_steps, path, seen):
                steps_used = len(path) - 1

                # Goal check FIRST — reaching the goal is terminal and valid
                # regardless of how many steps it took.
                if current == goal:
                    return path.copy()

                if steps_used >= max_steps:
                    return None

                for next_position in neighbors(maze, current):
                    if next_position in seen:
                        continue
                    seen.add(next_position)
                    path.append(next_position)
                    result = _dfs(maze, next_position, goal, max_steps, path, seen)
                    if result is not None:
                        return result
                    path.pop()
                    seen.remove(next_position)

                return None
      explanation: |
        Swap the order of the two checks at the top of `_dfs` so the goal check runs first. When the recursion lands on the goal cell with `steps_used == max_steps`, we now correctly return the path instead of bailing out one step too soon.

        Why goal-first is preferred over the alternative (loosening the cutoff to `>` or to `> max_steps if current != goal`): reaching the goal is a **terminal valid state**. Treating it that way reads more clearly than special-casing the cutoff condition. The two are functionally equivalent in this maze, but the goal-first version generalizes better — for any future cutoff predicate, the goal acceptance still works.

        Common wrong fixes (and why they're wrong):

        - **Raising `max_steps` in the test.** That's editing the spec to match the bug, not fixing the code.
        - **Editing the maze.** Same issue — the test was correct.
        - **Removing the cutoff entirely.** Now the path-rejection test (max_steps=9) breaks. The cutoff was correct *as a concept*; only its ordering was wrong.

    tests:
