            0: "This hardcodes a one-time correction. The next CSV with the same shape will be wrong again. The bug is that the loader doesn't normalize whitespace — that's where the fix belongs."
            1: "Editing the data hides the symptom for *this* CSV but doesn't fix the loader. Real CSV imports often have stray whitespace; a robust loader strips it."
            3: "This rewrites the spec to match the bug's symptom. The REVERSAL arithmetic is correct (a reversal cancels a charge — addition). The bug is that the kind field never had a chance to *match* `\"REVERSAL\"`."
          explanation: |
            The bug is that the CSV row had a leading space, so `kind` became `' REVERSAL'` instead of `'REVERSAL'`. The fix belongs in `load_transactions` because that's where data flows from external (untrusted) format into internal representation. Strip-and-validate at the boundary, then trust the data inside.

        - question: |
            Why is `repr(tx.kind)` more useful than `print(tx.kind)` when investigating this bug?
          type: single
          options:
            - "`repr()` runs faster than `print()`"
            - "`repr()` shows quotes and escape characters around the string, making invisible characters (like leading spaces) visible"
            - "`print()` doesn't work inside the debugger"
            - "`repr()` returns an integer, which is easier to compare"
          correct_index: 1
          option_feedback:
            0: "Speed isn't the issue. The two are roughly equivalent in performance for short strings."
            2: "`print()` works fine in the debugger console. The relevant difference is what each function shows — `repr()` exposes invisible characters that `print()` strips."
            3: "`repr()` returns a *string*, not an integer. The string includes quotes and escape sequences so you can see characters that would otherwise be invisible."
          explanation: |
            `repr('REVERSAL')` returns `\"'REVERSAL'\"` — including the surrounding quotes — while `repr(' REVERSAL')` returns `\"' REVERSAL'\"`. The leading space jumps out because `repr()` shows the string *as a Python literal*, with quotes around its contents. `print()` displays the string's content without delimiters, so leading and trailing whitespace becomes invisible. This is the canonical Python trick for spotting whitespace bugs.

        - question: |
            You have a 30-iteration loop where one specific iteration produces a wrong result. Which technique most efficiently locates the bad iteration?
          type: single
          options:
            - "Set a normal breakpoint inside the loop and click Continue 30 times"
            - "Set a conditional breakpoint with a predicate that's true ONLY for the suspicious iteration"
            - "Add `print(...)` to every line of the function and read the output"
            - "Comment out lines until the loop produces the right answer"
          correct_index: 1
          option_feedback:
            0: "This works but is exactly the kind of mechanical drudgery the debugger is meant to eliminate. With 30 iterations it's tolerable; with 30,000 it's hopeless."
            2: "This produces a flood of output you'd have to skim by eye. A conditional breakpoint puts the filtering logic inside the debugger so it stops only on the iteration you care about."
            3: "This is *tinkering* — random edits to see what changes. It can occasionally land on the answer but it teaches the wrong habit and breaks badly on bigger programs."
          explanation: |
            **Conditional breakpoints scale.** They turn the debugger into a filter: only stop when this expression is true. The cost is the same regardless of whether the loop has 30 or 30,000 iterations. This is one of the highest-leverage debugger features and the reason "set a conditional breakpoint" is one of the first moves an experienced debugger reaches for in long-running data-processing code.


