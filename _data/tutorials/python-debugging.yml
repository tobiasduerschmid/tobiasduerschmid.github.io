  # STEP 6 — Interleaved Technique-Selection Drill
  # Pedagogy:
  #   Interleaving — mixed scenarios force discrimination of bug families.
  #   Retrieval practice — quiz-only step, no editing, anchored on judgment.
  #   Anti-tinkering — explicit prompt about what to do when stuck.
  #   Bloom's level — Analyze.
  # ===========================================================================
  - title: "Triage Drill — Pick the Right Technique"
    instructions: |
      > 🎯 **Goal:** Match each scenario to the right *first move*. The point isn't speed; it's discriminating between bug families. The cues that tell you which technique to reach for are the same cues that distinguish a confident debugger from a flailing one.
      > 🧠 **Bloom's level:** *Analyze.*

      ### 🧭 Refresher

      | Bug structure | Best first move |
      |---|---|
      | Boundary / off-by-one | Ordinary breakpoint + watch the boundary expression |
      | Bug fires for one item in a long stream | Conditional breakpoint with a discriminating predicate |
      | Symptom appears later than the cause | Run to completion, scrub backward, then breakpoint on the suspected event |
      | Aliasing / shared-state surprise | Inspect `oid` badges in Variables tab |
      | Failure not reproducing | Test design problem first — write a discriminating test |
      | Stuck after >15 minutes of edits | **Stop. Write down the failure description.** This is the anti-tinkering move. |

      ### 📝 Drill

      Below is a knowledge check with several scenarios, all interleaved. For each, pick the technique whose *cue structure* matches the scenario. Wrong answers come with feedback explaining why a different technique would be a worse fit *for that specific scenario*.

      Pass threshold: **0.85**. Aim higher than usual — the discrimination skill is the whole point.

    files:
      - path: "notes.txt"
        language: "plaintext"
        content: |
          This step is a quiz only. No code to edit.

          Take your time on each scenario — the goal is matching cues to
          techniques, not memorizing pairs.

    open_file: "notes.txt"

    require_tests: false

    solution:
      explanation: |
        There's no code to fix here. The point of the step is the quiz: noticing what *cue* in a bug description tells you which technique to reach for. Cues to internalize:

        - "wrong by an exact amount" / "off by one" → boundary, single breakpoint + watches.
        - "long stream / many iterations / processes thousands" → conditional breakpoint or filtered logging.
        - "final state wrong but events seemed fine" / "symptom appears late" → back-in-time scrubbing.
        - "two variables changed when only one should have" / "shared state" → aliasing — check `oid`.
        - "intermittent" / "passes locally fails on CI" → reproducibility problem first.
        - "20 minutes of edits, no progress" → stop, write down the failure. Don't keep tinkering.

    quiz:
      title: "Debugging Triage Drill"
      min_score: 0.85
      shuffle: true
      questions:

        - question: |
            A function processes 50,000 log lines and produces a wrong total. You've confirmed the bug is consistent run-to-run. Which technique most efficiently localizes it?
          type: single
          options:
            - "Set a normal breakpoint inside the loop and step through, watching the running total"
            - "Set a conditional breakpoint that pauses only when the running total exceeds the maximum plausible value (or whatever invariant is broken)"
            - "Add print statements after every line in the function and read the 50,000 lines of output"
            - "Restart the program with the debugger attached and just hope it pauses at the right place"
          correct_index: 1
          option_feedback:
            0: "Stepping through 50,000 iterations is exactly the kind of work the debugger should save you. With a conditional, the debugger pauses only on the iteration of interest."
            2: "Reading 50,000 lines by eye is human-impossible. If you must use prints, filter them with a predicate so only the relevant ones print — at which point you've reinvented a conditional breakpoint, more clumsily."
            3: "Hope is not a debugging strategy. The debugger is a tool with controls; use them deliberately."
          explanation: |
            Long streams want **conditional** breakpoints. The condition is whatever invariant you suspect is broken (`running_total > 1e9`, `line.startswith('ERROR')`, etc.). The debugger filters; you only see the iterations that matter.

        - question: |
            A recursive function returns the wrong answer for one specific input. The function is small (12 lines) and you have a clear test case that reproduces it. Which technique fits best?
          type: single
          options:
            - "Conditional breakpoint with a complex predicate"
            - "Back-in-time scrubbing of the entire program execution"
            - "Ordinary breakpoint at the top of the function plus a Watch expression on the parameter and any boundary expression"
            - "Add 30 print statements to make sure no detail is missed"
          correct_index: 2
          option_feedback:
            0: "A conditional breakpoint is overkill here — the function is small and the input is specific. An ordinary breakpoint plus stepping plus the call stack gives you everything you need."
            1: "Back-in-time scrubbing shines when the symptom appears far from the cause. Here, the function is 12 lines and the symptom is in the return value — it's not a temporal-distance problem."
            3: "Print debugging works but is heavyweight for a 12-line function. Ordinary breakpoints + watches give you the same information without modifying the source."
          explanation: |
            For small, well-localized buggy functions, **ordinary breakpoint + step + watch + call stack** is the simplest and fastest combination. Reach for fancier tools (conditional breakpoints, back-in-time) only when the simpler tool is genuinely insufficient.

        - question: |
            Final cart total is wrong; a discount appears to have been applied to the wrong line item. The cart processed 8 events (add item, apply coupon, etc.) and the wrong-line discount happened somewhere in the middle. Which technique fits best?
          type: single
          options:
            - "Set a conditional breakpoint on the discount-application line that pauses if the wrong line is being modified"
            - "Run to completion, then scrub the History scrubber backward to find the first event where the discount went to the wrong line"
            - "Use `git bisect` on the cart's commit history"
            - "Step forward through every event from the start"
          correct_index: 1
          option_feedback:
            0: "This works *if* you already know which expression characterizes 'wrong line.' Often you don't — that's exactly what scrubbing helps you discover. Once scrubbing has identified the suspicious moment, *then* a breakpoint can pinpoint it."
            2: "`git bisect` finds the *commit* that introduced a regression. Useful for a *different* class of debugging problem (a bug that worked before some commit). It's not the right tool when you have one buggy version and want to know *which event* in a single run caused the symptom."
            3: "Forward stepping through 8 events is fine in a pinch but wasteful — events 1, 2, 3 likely produced correct partial state. Anchoring on the wrong final state and rewinding is faster."
          explanation: |
            **Back-in-time / scrubbing** is the right first move when symptom and cause are temporally distant within a single run. After scrubbing localizes the suspicious event, an ordinary breakpoint can give you line-level precision.

        - question: |
            A function has two parameters that should be independent. After running, you find that modifying one of them mysteriously changes the other. Which technique fits best?
          type: single
          options:
            - "Add print statements to track every modification"
            - "Set a conditional breakpoint on every line that touches either parameter"
            - "Inspect the `oid` badges in the Variables tab — if both names share the same `oid`, they're the same object in memory"
            - "Use back-in-time scrubbing"
          correct_index: 2
          option_feedback:
            0: "Print debugging is a fallback. The debugger has dedicated UI for spotting aliasing — use it."
            1: "Brute force, and you'll discover the same answer the `oid` badge tells you in one glance."
            3: "Scrubbing tells you *when* state diverged. The `oid` badge tells you *why* (they're the same object). For aliasing specifically, `oid` is the more direct cue."
          explanation: |
            Mysterious co-mutation is the signature of **aliasing**. The most efficient first move is checking the Variables tab: if two names share an `oid`, they reference the same object, and modifying one will appear to "modify" the other. The classic Python instance is mutable default arguments — exactly what you saw in Step 2's `register_score`.

        - question: |
            You've spent 20 minutes setting and clearing breakpoints, making small edits, and rerunning tests. Nothing has worked, and you're starting to feel frustrated. What's the right next move?
          type: single
          options:
            - "Push through — debugging always feels this way; just keep iterating"
            - "Restart the file from scratch with a fresh implementation"
            - "Stop. Write down — in plain words — the symptom (expected vs actual) and what hypotheses you've ruled out so far. Then re-pick a technique"
            - "Ask a teammate to fix it for you"
          correct_index: 2
          option_feedback:
            0: "This is the *tinkering* habit research repeatedly identifies as unproductive. It feels like progress because edits keep happening, but the edits aren't grounded in evidence. Twenty minutes of unfounded edits commonly produces *more* bugs, not fewer."
            1: "A rewrite occasionally helps for tiny scripts but is overkill here. The reason the bug is hard isn't because the code is broken structurally — it's because you don't have a clear hypothesis. Address the hypothesis problem first."
            3: "Asking is a *follow-up* move. Before that, externalize what you know. The act of writing down the symptom, your hypotheses, and what you've ruled out often reveals the next move *to you*. If it doesn't, you now have a clear question to ask."
          explanation: |
            **Tinkering is the antithesis of debugging.** When the cycle has stalled, the right move is to externalize: write down the failure precisely, list hypotheses you've ruled out (and *how*), and re-pick a technique deliberately. Murphy and colleagues' "debugging form" research found that simply forcing this articulation helped students solve bugs they otherwise would have escalated to staff.

        - question: |
            A test passes locally on your laptop but fails on the autograder. You've reproduced the failure on the autograder twice. What's the most useful first move?
          type: single
          options:
            - "Set a conditional breakpoint inside the function — clearly the issue is data-dependent"
            - "Drag the History scrubber backward — clearly the symptom appears late"
            - "First, find a way to reproduce the failure locally. Without local reproduction, you can't use any debugger technique productively"
            - "Email the instructor for an autograder log"
          correct_index: 2
          option_feedback:
            0: "A conditional breakpoint can't help if you can't reproduce the bug locally — the breakpoint never fires."
            1: "Same problem — scrubbing requires running the program; if it doesn't fail locally, you have nothing to scrub through."
            3: "An autograder log is useful, but the larger question is *why* environments differ. Sometimes the answer is OS, Python version, locale, or random seed. Reproducing locally is the necessary first step before any other technique becomes useful."
          explanation: |
            **Reproducibility is upstream of every debugging technique.** A bug you can't reproduce is a bug you can't debug — none of breakpoints, scrubbing, or watches help if the failure isn't in front of you. The first move is to find what differs between environments (Python version? OS? data? seed?) and either fix the discrepancy or simulate the autograder's environment locally.

        - question: |
            A test that previously passed now fails after a change you just made. The previous test still passes. What does this tell you?
          type: single
          options:
            - "You introduced a regression. The bug is in the change you just made; revert and re-apply more carefully"
            - "The test was wrong all along; update its expected value"
            - "You should add `time.sleep(1)` to make the test more deterministic"
            - "You should ignore this — you're focused on the previously-failing test"
          correct_index: 0
          option_feedback:
            1: "If the test previously passed and the only change is yours, the test isn't suddenly wrong — the test caught a real regression. Updating the expected value is a workaround that hides the regression."
            2: "Sleeps mask race conditions, but they don't fix logic regressions. Adding sleeps to make tests pass is a known anti-pattern."
            3: "Ignoring a regression because you're focused elsewhere is exactly how regressions ship to production. Fix it now while the change is fresh in your head."
          explanation: |
            A previously-passing test that newly fails after your change is a **regression** — your change broke a behavior that was correct. Revert and re-apply more carefully (smaller change, more thought). This is exactly why "verify means rerun the **whole** suite" — to catch regressions, not just confirm the one fix.

        - question: |
            Which of these counts as **evidence** in the debugging cycle?
          type: multiple
          options:
            - "A specific value of a variable observed at a specific line, e.g., `i = 1` at the start of the loop"
            - "A failing test's exact assertion message"
            - "A vague hunch that 'something feels off about the loop'"
            - "A `repr()` of a string showing a hidden whitespace character"
          correct_indices: [0, 1, 3]
          option_feedback:
            2: "A hunch is a *seed for a hypothesis*, not evidence. Evidence is observable, specific, and reproducible. Until the hunch is converted to a discriminating test or observation, it's not yet evidence."
          explanation: |
            **Evidence is observable, specific, and reproducible.** Variable values at specific lines, exact failure messages, and `repr()` outputs all qualify. Hunches are valuable as the *starting point* for hypothesis generation, but they don't yet count as evidence — they need to be tested against observations before they earn that status. Distinguishing the two clearly is one of the highest-leverage moves an experienced debugger makes.


  # ===========================================================================
  # STEP 7 — Transfer Challenge + Reflection
  # Pedagogy:
  #   Transfer — same conceptual bug family as Case 2 (data-representation),
  #     different surface code. Tests that the student can apply the cycle
  #     without scaffolded prompts.
  #   Faded scaffolds — only the debugging-log template; no step-by-step.
  #   Self-monitoring — final reflection question.
  #   Bloom's level — Apply / Create / Evaluate.
  # ===========================================================================
  - title: "Transfer Challenge — You're On Your Own"
    instructions: |
      > 🎯 **Goal:** Find and fix a bug in unfamiliar code without step-by-step prompts. You pick the technique. You write the debugging log.
      > 🧠 **Bloom's level:** *Apply / Create.*

      ### 📂 What you have

      A small program: `tagger.py` reads a file `articles.txt` where each line is `"Title|tag"` and returns the most common tag across all articles.

      Two pytest tests in `test_tagger.py`:

      - `test_python_is_most_common` — fails (returns the wrong value).
      - `test_no_whitespace_in_result` — fails (the result contains whitespace).

      That's all the framing you get. **No numbered scaffold this time.**

      ### 📋 Your debugging log

      As you work, fill in the log mentally. After your fix, you'll articulate it through the final quiz.

      ```
      1. Failure (one sentence, expected vs actual): ...
      2. Hypothesis (before any debugger move): ...
      3. Technique chosen and why: ...
      4. Evidence found (one observation that confirmed or killed the hypothesis): ...
      5. Minimal fix (line and change): ...
      6. Verification (which tests now pass that didn't before): ...
      ```

      ### 🚨 Resist the obvious

      You will recognize the bug family. **Don't pattern-match without evidence** — the *shape* may resemble something you've seen, but verify with the debugger before assuming. Fast pattern-matching is what produces "the suspicious line is probably the bug" wrong fixes.

      ### Hint of last resort

      If you genuinely stall after 10 minutes, the test output already tells you what `repr(...)` would tell you on a paused breakpoint. Re-read the failing assertion of `test_no_whitespace_in_result`.

    files:
      - path: "tagger.py"
        language: "python"
        content: |
          """Article tag analyzer.

          Reads a file where each line is `"Title|tag"`, returns the most
          common tag (uppercased) across all articles.

          There is a bug. Both tests in test_tagger.py fail.
          """

          from collections import Counter


          def top_tag(articles_path):
              counts = Counter()
              with open(articles_path) as f:
                  for line in f:
                      title, tag = line.split("|", 1)
                      counts[tag.upper()] += 1
              return counts.most_common(1)[0][0]

      - path: "articles.txt"
        language: "plaintext"
        content: |
          Why Python rocks|python
          JavaScript closures|javascript
          Decorators in Python|python
          Async Python explained|python
          Rust intro|rust

      - path: "test_tagger.py"
        language: "python"
        content: |
          from tagger import top_tag


          def test_python_is_most_common():
              # Three of five articles are tagged "python", so PYTHON should win.
              assert top_tag('/tutorial/articles.txt') == "PYTHON"


          def test_no_whitespace_in_result():
              result = top_tag('/tutorial/articles.txt')
              assert result == result.strip(), \
                  f"Result {result!r} contains whitespace — tags should be normalized at load time."

    open_file: "tagger.py"
    run_file: "test_tagger.py"

    solution:
      files:
        - path: "tagger.py"
          language: "python"
          content: |
            """Article tag analyzer — fixed."""

            from collections import Counter


            def top_tag(articles_path):
                counts = Counter()
                with open(articles_path) as f:
                    for line in f:
                        title, tag = line.split("|", 1)
                        counts[tag.strip().upper()] += 1
                return counts.most_common(1)[0][0]
      explanation: |
        **The bug** is that `for line in f` yields each line *with its trailing newline included*. So `tag` becomes `'python\n'`, and `tag.upper()` becomes `'PYTHON\n'`. The Counter accumulates under that key, and the function returns `'PYTHON\n'` — which the tests, expecting `'PYTHON'`, correctly reject.

        **The fix** is `tag.strip().upper()` (or call `.rstrip()` / `.rstrip('\n')` if you want to be more specific). Strip-and-validate at the boundary is the same pattern as Case 2's ledger fix.

        **The case-isomorphism is intentional.** This bug is the same family as Case 2 — input data has invisible whitespace; the bug fires *because* normalization wasn't applied at load time; the fix is in the loading layer. The surface is completely different (file iteration with `for line in f` vs `csv.DictReader`), but the cycle and the cure are the same. That's *transfer* — the same mental model applies despite a different surface.

        Notice what makes this bug family so common in real codebases: every layer that reads external data is a possible source. CSV imports. JSON parses. HTTP request bodies. Database VARCHAR columns. User text input. The defensive habit is *strip-and-normalize at the boundary*; once data is inside your domain, trust it.

    tests:
      - description: "Both tagger tests pass"
        command: |
          import pytest, io, sys
          old = sys.stdout; sys.stdout = buf = io.StringIO()
          code = pytest.main(['/tutorial/test_tagger.py', '-v', '--tb=short', '--no-header'])
          sys.stdout = old; output = buf.getvalue(); print(output)
          assert code == 0, f"Some tests still fail. pytest output:\n\n{output}\n\nNormalize the tag at load time."
        hints:
          - title: "Small nudge"
            text: "Set a breakpoint inside the loop, click Debug, and inspect `repr(tag)` in the Variables/Watch tab. What's there that you can't see by just `print(tag)`?"
          - title: "Strategic hint"
            text: "When you iterate `for line in f`, each `line` includes its trailing newline. After `line.split('|', 1)`, the trailing `\\n` ends up on `tag`. The fix belongs in the loader, *before* `tag.upper()`."
          - title: "Spoiler — full fix"
            text: "Change `counts[tag.upper()] += 1` to `counts[tag.strip().upper()] += 1`. Same pattern as Case 2's fix to `load_transactions`."

      - description: "Workaround guard — fix is in tagger.py with strip"
        command: |
          source = open('/tutorial/tagger.py').read()
          assert '.strip()' in source or '.rstrip(' in source, \
              "The fix should call `.strip()` (or `.rstrip()`) on `tag` before counting. Don't post-process the return value."

      - description: "Workaround guard — articles.txt unchanged"
        command: |
          source = open('/tutorial/articles.txt').read()
          assert 'Why Python rocks|python' in source and 'Async Python explained|python' in source, \
              "Don't edit `articles.txt` — real article exports often have stray whitespace; your code should handle it. Revert the data file."

      - description: "Workaround guard — test expectations unchanged"
        command: |
          source = open('/tutorial/test_tagger.py').read()
          assert '== "PYTHON"' in source, \
              "Don't change the test's expected value to match the bug. Revert `test_tagger.py`."

    quiz:
      title: "Transfer & Reflection"
      min_score: 0.8
      shuffle: false
      questions:

        - question: |
            Which of the three earlier cases is this bug **most structurally similar to**?
          type: single
          options:
            - "Case 1 (Maze Pathfinder, boundary bug in `_dfs`)"
            - "Case 2 (Ledger Reconciliation, hidden-whitespace in CSV import)"
            - "Case 3 (Course Waitlist, FIFO vs LIFO ordering)"
            - "None of them — this is a totally new bug family"
          correct_index: 1
          option_feedback:
            0: "Case 1 was a *boundary / off-by-one* bug — `>=` rejecting an exact-budget path. This bug isn't about boundaries; it's about input data having a hidden character (a `\\n`) that broke equality with the expected key."
            2: "Case 3 was about *order of admission* (FIFO vs LIFO). This bug isn't about ordering; the bug fires regardless of when the offending line is processed."
            3: "Surface looks different (file iteration vs CSV) but the *family* is identical: input data carries a stray whitespace character, normalization is missing at the loading layer, fix is `strip()` at the boundary. This is exactly Case 2."
          explanation: |
            This bug is the **same family as Case 2** in different clothes. Both: external data (CSV row in Case 2, file line here) carries a stray whitespace character; the loading code doesn't normalize it; the fix is to strip-and-validate at the data boundary. Recognizing isomorphism across surfaces is what *transfer* means in the research literature.

        - question: |
            Be honest with yourself. Before working through this tutorial, would you have found this bug by:
          type: single
          options:
            - "Tinkering — randomly trying `.strip()` and `.replace('\\n', '')` and other edits until something worked"
            - "Adding `print(tag)` everywhere — but the newline would have been invisible without `repr`"
            - "Hypothesis-driven debugging — set a breakpoint, inspect `repr(tag)`, form the hypothesis, fix at the load boundary"
            - "I genuinely don't know — depends on the day"
          correct_index: 2
          option_feedback:
            0: "Tinkering is the habit research most consistently identifies as unproductive. The fact that it occasionally lands on `.strip()` doesn't justify it — most of the time it produces *more* bugs and reinforces a non-strategic mental model."
            1: "`print(tag)` would have shown `python` for the python lines. The trailing `\\n` would have been printed as a literal newline (the next print appears on a new line) but you might not consciously notice. `repr()` makes it impossible to miss."
            3: "This option models the deliberate process of the tutorial. It's also longer in setup but faster overall — the fix gets identified once, applied minimally, and verified, with no need to undo a sequence of failed tinkering edits."
            4: "Honest answer. The tutorial isn't here to make you claim you've internalized the cycle in 90 minutes — it's here to give you a vocabulary for noticing which mode you're in. That's the win."
          explanation: |
            There is no *graded* correct answer here — but noticing which mode you defaulted to before the tutorial and which mode you used during it is itself the metacognitive skill the literature recommends. If you used hypothesis-driven debugging this time, you've taken the most important step. If you tinkered, you now know the name for it and what to do differently next time.

        - question: |
            *(Final retrieval — spaced from Step 1.)* Place these debugging-cycle stages in order:

            A. Verify
            B. Symptom
            C. Hypothesis
            D. Fix
            E. Evidence
            F. Localize
            G. Predict
          type: single
          options:
            - "B → G → E → C → F → D → A"
            - "B → D → A → C → E → F → G"
            - "G → B → C → E → F → D → A"
            - "B → E → G → C → F → D → A"
          correct_index: 0
          option_feedback:
            1: "Fix and Verify before Hypothesis is the *tinkering* anti-cycle: edit, run, hope, repeat. The whole point of hypothesis-driven debugging is that the fix comes near the end of the process."
            2: "Predict before Symptom inverts the order. You can't predict what *should* happen until you know what *is* happening. The Symptom is what triggers the cycle in the first place."
            3: "Predict before Evidence is closer to right but *very* close to wrong. Predict comes from understanding the spec; Evidence comes from running the program. The order is: Symptom (run) → Predict (what *should* the state be) → Evidence (collect actual state) → Hypothesis."
          explanation: |
            **Symptom → Predict → Evidence → Hypothesis → Localize → Fix → Verify.** The order matters: each stage produces what the next stage needs. Skipping or reordering creates known anti-patterns: tinkering (Fix-first), local verification (skipping Verify of the full suite), or pattern-matching wrong fixes (Localize without Hypothesis).

            🪞 **Final reflection (no graded answer):** *Which stage is hardest for you to slow down on?* If your honest answer is "Fix" — i.e., you skip ahead to editing — you're in good company. That's the most common failure mode. The remedy is not willpower; it's the explicit form of the cycle plus practice. You just did three rounds of practice.
