          assert '["Jules Kim", "Kai Morgan", "Sam Lee"]' in source, \
              "Don't change the expected waitlist — FIFO is the spec. Revert `test_waitlist.py`."

      - description: "Workaround guard — no alphabetical sort hack"
        command: |
          source = open('/tutorial/waitlist.py').read()
          alloc_block = source[source.find('def allocate_next'):source.find('def run_events')]
          assert 'sort' not in alloc_block.lower(), \
              "Don't sort the waitlist alphabetically — the test happens to be alphabetical by coincidence, but the spec is FIFO (insertion order), not alphabetical."

      - description: "Workaround guard — _handle_join still appends"
        command: |
          source = open('/tutorial/waitlist.py').read()
          join_block = source[source.find('def _handle_join'):source.find('def _handle_drop')]
          assert 'course.waitlist.append(student)' in join_block, \
              "`_handle_join` should still APPEND new waitlisted students to the end. The bug was on the *removal* side (allocate_next), not the *insertion* side."

    quiz:
      title: "Case 3 — Knowledge Check"
      min_score: 0.8
      shuffle: true
      questions:

        - question: |
            For a Python list `xs = ['a', 'b', 'c', 'd']`, what does `xs.pop()` return, and what is `xs` afterward?
          type: single
          options:
            - "Returns `'a'`; `xs` becomes `['b', 'c', 'd']`"
            - "Returns `'d'`; `xs` becomes `['a', 'b', 'c']`"
            - "Returns the entire list; `xs` becomes `[]`"
            - "Raises an error — `pop()` requires an index"
          correct_index: 1
          option_feedback:
            0: "That would be `xs.pop(0)`, which removes from the front. With no argument, `pop()` removes from the end."
            2: "`pop` removes a single element, not the whole list. For a single-element list, that element happens to *be* the whole list, but in general only one element is returned."
            3: "`pop()` works without an argument — it defaults to `-1`, the last element. `pop(0)` and `pop(-1)` are both valid."
          explanation: |
            `list.pop()` with no argument removes and returns the **last** element. This is LIFO (stack) behavior. For FIFO (queue) behavior, use `pop(0)` (or `collections.deque.popleft()` for O(1) performance).

        - question: |
            Which of these is the **correct** fix to enforce FIFO admission policy?
          type: single
          options:
            - "Sort `course.waitlist` alphabetically before calling `pop()`"
            - "Special-case Jules Kim and Mina Patel in `allocate_next`"
            - "Change `course.waitlist.pop()` to `course.waitlist.pop(0)` in `allocate_next`"
            - "Reorder `sample_events()` so Jules Kim joins last"
          correct_index: 2
          option_feedback:
            0: "Alphabetical order happens to match FIFO order in this specific test by coincidence (Mina, Theo come before Jules). Change one student's name and the test breaks. The spec is FIFO (insertion order), not alphabetical — these are different concepts."
            1: "Hardcoding student names is the textbook *symptom-patch* anti-pattern. The next event stream with different names breaks again. The bug isn't about which students; it's about which *end* of the list is admitted first."
            3: "Editing the input data to match the bug is a workaround. Real registrar systems can't reorder real student actions to make their code happy."
          explanation: |
            The bug is in *how a student is removed from the waitlist*, not in any of the data. `pop()` removes from the back; `pop(0)` removes from the front. FIFO requires removing from the front.

        - question: |
            You discover the symptom (CS201 enrolls the wrong students) at the **end** of the program, but the cause is in **event 4** (drop Ben Ortiz, which triggers `allocate_next`). Which technique most directly localizes the bug?
          type: single
          options:
            - "Step from event 1, watching state after each event, until something looks wrong"
            - "Set a breakpoint on the failing test's assertion and inspect the final state"
            - "Run to completion, then drag the History scrubber backward to find the first event where state diverged from the spec"
            - "Add `print(state)` after every event and read the output"
          correct_index: 2
          option_feedback:
            0: "Forward stepping works but is wasteful — events 1, 2, 3 produce no symptom. You'd inspect them anyway because you don't know which event is the bad one until you reach it. Backward navigation lets you anchor on the *known* wrong final state and rewind to the divergence."
            1: "The final state inspection only confirms the symptom you already knew about (the test failed). It doesn't help localize *which event* caused it."
            3: "Adding prints is a viable fallback when no time-travel debugger is available. With one available, scrubbing is faster, leaves no print debris in the code, and lets you skim 9 snapshots in seconds."
          explanation: |
            **Back-in-time / history-scrubbing is built for exactly this bug shape.** When the symptom appears later than the cause, scrubbing backward from the symptom — instead of stepping forward from the start — directly walks you to the divergence point. Forward stepping spends time on events that produced no observable change.

        - question: |
            *(Bonus — code communication.)* Which choice best **communicates** that a list is being used as a FIFO queue?
          type: single
          options:
            - "`my_list.pop(0)` (Python `list`)"
            - "`my_deque.popleft()` (`collections.deque`)"
            - "`my_list[0]; del my_list[0]`"
            - "`heapq.heappop(my_heap)`"
          correct_index: 1
          option_feedback:
            0: "`pop(0)` works but doesn't tell the next reader \"queue\" — many lists use `pop(0)` for non-queue reasons, so intent must be inferred from context. It also costs O(n) time because Python shifts every remaining element left after removing index 0. `deque.popleft()` communicates intent and runs in O(1)."
            2: "Functionally equivalent but harder to read. `popleft()` names the operation in one word."
            3: "`heapq` is a priority queue — it returns the *smallest* element regardless of insertion order. That's not FIFO."
          explanation: |
            `collections.deque.popleft()` is the idiomatic, readable choice. It tells the next reader: *this is a FIFO queue*. `list.pop(0)` works but doesn't communicate intent (and is O(n) for large lists). For a debugging tutorial, the takeaway is broader: **fixes that document intent are easier to get right and easier to maintain** than fixes that merely produce the right output.


  # ===========================================================================
  # STEP 6 — Case 4: Event-Driven Checkout (Sequence Diagram Inference)
  # Source: debugging_case_studies/case4_sequence_diagram_checkout/
  #   - The case study's `trace_uml.py` and `generate_sequence_diagram.py`
  #     are intentionally NOT included — the tutorial's built-in sequence
  #     diagram analyzer traces from `if __name__ == "__main__":` instead.
  # Pedagogy:
  #   New technique — sequence diagram inference for protocol/wiring bugs.
  #   The bug is in event subscription, not in any imperative call chain —
  #     source reading is genuinely inefficient here, by design.
  #   Variation — same cycle, fourth surface (event-bus indirection).
  #   Bloom's level — Apply / Analyze / Evaluate.
  # ===========================================================================
  - title: "Case 4 — Event-Driven Checkout (Sequence Diagram)"
    instructions: |
      > 🎯 **Goal:** A checkout service correctly raises `OutOfStockError` for an out-of-stock cart, but the warehouse still receives a pick ticket. The bug is in event-bus wiring, not in any one method body. Use the **Sequence Diagram** panel — it makes the runtime call order visible.

      > 🔀 **Before you start:** In Cases 1–3, you could trace the bug by reaching the right function with a breakpoint. Will that approach work here — where the symptom is a side effect that "shouldn't" exist? Predict: what new kind of tool might be needed?
      >
      > <details><summary>The contrast — read after step 3</summary>
      >
      > Cases 1–3 had bugs in a specific function body you could reach with a breakpoint. This one is a *protocol/wiring* bug — no single function body is wrong. The side effect arrives through an event bus, so `CheckoutService` never directly calls the shipping code. Source-reading one file is genuinely not enough. You need a tool that traces the runtime call order across all files — the Sequence Diagram.
      > </details>

      ### 📂 What you have

      An event-driven checkout service spread across many small files in `checkout_app/`. The sequence diagram will guide you to where the bug lives — don't try to read all the files up-front.

      - **Start here:** `checkout_app/checkout_service.py` (the orchestrator) and the **Sequence Diagram** tab.
      - **Tests + entry point:** `test_checkout.py`, `checkout_main.py`.

      Plus a **Sequence Diagram** tab, refreshed live as you edit.

      ### 1. Symptom

      Click **Test**. The first test fails:

      ```text
      AssertionError: assert [] == ['order-1001']
      ```

      The order was correctly rejected with `OutOfStockError`, but `'order-1001'` is still in the shipping queue. The warehouse is being told to ship a rejected order.

      ### 2. Predict before reading code

      Read the rejection logic in `checkout_app/checkout_service.py`. Specifically:

      ```python
      try:
          reservation = self._inventory.reserve(order.order_id, order.items)
      except OutOfStockError:
          self._bus.publish(DomainEvent(EventKind.ORDER_REJECTED, order.order_id, request.items))
          raise
      ```

      Predict: which line in `CheckoutService.checkout()` is responsible for placing the rejected order onto the shipping queue?

      ### 3. Search the source

      Use Ctrl-F in the editor to search `checkout_app/checkout_service.py` for any direct call to `ShippingQueue.enqueue`. What do you find?

      <details><summary>What the search reveals — and why it matters</summary>

      There is no such call. `CheckoutService` never directly calls `ShippingQueue.enqueue`. The side effect is delivered through the event bus — `CheckoutService` publishes events, subscribed handlers receive them, and one of those handlers calls `ShippingQueue.enqueue`.

      Source-reading is now stuck. You'd need to follow the event flow across `event_bus.py`, `workflow_config.py`, and `shipping.py` to reconstruct who calls what. **There is a faster way.**
      </details>

      ### 4. Open the Sequence Diagram panel

      Look to the right (or click the **Sequence Diagram** tab). The panel shows the actual runtime call order, traced from `checkout_main.py`'s `__main__` block. Read it top to bottom.

      Find these two arrows:

      - The arrow into `FulfillmentScheduler.prepare_pick_ticket(...)`.
      - The arrow into `InventoryService.reserve(...)`.

      ### 5. The first impossible arrow

      The protocol is *reserve first, then ship*. In the diagram, **which arrow violates that order?** Don't read the next section until you've found it.

      <details><summary>Click to compare with the sample answer</summary>

      The diagram shows `prepare_pick_ticket` firing **before** `InventoryService.reserve` runs. By the time `reserve` raises `OutOfStockError`, the warehouse has already been told to pack the order. That's the protocol violation — the bug.
      </details>

      ### 6. Compare prediction to observation

      Look at the sequence diagram and find:
      - The arrow into `FulfillmentScheduler.prepare_pick_ticket(...)`.
      - The arrow into `InventoryService.reserve(...)`.

      **Predict:** in the correct protocol, which fires first? Now find the actual order in the diagram. Which arrow is in the wrong position?

      <details><summary>What the comparison reveals</summary>

      `prepare_pick_ticket` fires *before* `InventoryService.reserve`. By the time `reserve` raises `OutOfStockError`, the warehouse has already been told to pack the order. If you predicted reserve-first, your model of the protocol was right — and the wiring was wrong.
      </details>

      ### 7. Hypothesis

      Write your one-sentence hypothesis. Name the *handler* and the *topic mismatch*.

      <details><summary>Compare with a sample sentence</summary>

      *"The `FulfillmentScheduler.prepare_pick_ticket` handler is subscribed to the wrong event topic — `PAYMENT_AUTHORIZED` instead of `INVENTORY_RESERVED`."*

      The hypothesis isn't *about* the handler's code — its body is correct. The bug is that the *configuration* asks the handler to react to the wrong event. Naming the layer correctly is half the fix.
      </details>

      ### 8. Evaluate two candidate fixes

      Imagine two engineers each propose a fix that makes the failing test pass:

      - **A.** Re-wire the subscription in `workflow_config.py` so `prepare_pick_ticket` listens for `INVENTORY_RESERVED` instead of `PAYMENT_AUTHORIZED`.
      - **B.** Add a defensive guard at the top of `prepare_pick_ticket`: `if event.kind != EventKind.INVENTORY_RESERVED: return`.

      Both make the test green. Write your one-sentence justification for which is better *before moving on* — quiz Q3 will ask you to defend it. **The principle:** *prefer fixing where the invariant is most directly expressible.*

      ### 9. Localize

      Open `checkout_app/workflow_config.py` and find the row that registers `fulfillment.prepare_pick_ticket`.

      ### 10. Minimal fix

      Change the topic for the fulfillment registration from `EventKind.PAYMENT_AUTHORIZED` to `EventKind.INVENTORY_RESERVED`. **One identifier.** Don't add defensive checks inside `prepare_pick_ticket` — the wiring is the right layer to fix.

      ### 🪞 Reflect — before you verify

      **Bug family:** Wiring/protocol bugs hide in event buses, plugin systems, dependency injection containers, middleware pipelines, route tables, message queues, observer hooks. Name one place where the bug *could not* be found by reading any single function — only by tracing the runtime story.

      **Which file did you instinctively open first?** Was it `checkout_service.py`? If so, what made you realize that wasn't the right place — and what was the signal that pointed you to `workflow_config.py`?

      ### 11. Verify — and reread the diagram

      Click **Test**. Both tests turn green. Now look at the **Sequence Diagram** panel again — the impossible arrow is gone, and the call order matches the protocol.

