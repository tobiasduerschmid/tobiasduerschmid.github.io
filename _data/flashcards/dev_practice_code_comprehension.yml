title: "Code Comprehension Flashcards"
description: "Cognitive load, mental models, comprehension metrics, architecture-code alignment, and practical strategies for making code easier to understand."
active: true
cards:
  - id: 1
    difficulty: basic
    bloom: remember
    question: "What are the three kinds of cognitive load in code comprehension?"
    answer: "**Intrinsic load** is the unavoidable difficulty of the domain or algorithm. **Extraneous load** is unnecessary effort caused by poor presentation, inconsistent names, tangled control flow, or bad tooling. **Germane load** is productive effort spent building durable mental models of the system."
    explanation: "The engineering goal is not to eliminate all difficulty. It is to reduce extraneous load so the reader has working-memory capacity left for intrinsic and germane load."

  - id: 2
    difficulty: basic
    bloom: understand
    question: "How do bottom-up and top-down comprehension differ?"
    answer: "**Bottom-up comprehension** starts with statements and builds larger chunks from control flow and data flow. **Top-down comprehension** starts with a hypothesis about the system's purpose and looks for beacons that confirm, refine, or reject it."
    explanation: "Bottom-up is useful when the reader lacks context or when the code is genuinely unfamiliar. Top-down is faster when the reader has relevant schemas and the code exposes reliable cues."

  - id: 3
    difficulty: basic
    bloom: analyze
    question: "What are the four components of the integrated meta-model of program comprehension?"
    answer: "The model combines a **situational model** of system functions, a low-level **program model** of control flow, a **top-down domain model**, and the programmer's **knowledge base**. Developers move among these models opportunistically."
    explanation: "The point of the integrated model is that real developers rarely use only one reading strategy. They switch levels as their hypotheses succeed or fail."

  - id: 4
    difficulty: basic
    bloom: apply
    question: "What should a reviewer do during the orientation phase before reading a complex diff?"
    answer: "Read the PR description, issue, tests, and design notes to establish the **why** and **what** of the change. Then form a hypothesis about the expected design before comparing the implementation against it."
    explanation: "Starting from the diff forces bottom-up reconstruction. Starting from intent gives the reviewer a specification layer that makes the diff easier to evaluate."

  - id: 5
    difficulty: basic
    bloom: evaluate
    question: "Why can cyclomatic complexity under-predict human difficulty?"
    answer: "Cyclomatic complexity counts branches, but it treats many branch shapes as equally difficult. Humans find deep nesting, long data-flow dependencies, and large visual blocks more costly than a flat set of familiar branches."
    explanation: "Cognitive complexity metrics try to better match human effort by penalizing nesting and interruptions to linear reading."

  - id: 6
    difficulty: basic
    bloom: analyze
    question: "What is the architecture-code gap?"
    answer: "It is the mismatch between the architect's intensional view of components, layers, constraints, and design decisions and the developer's extensional view of files, classes, packages, and statements."
    explanation: "When this gap is unmanaged, maintainers make local code changes that satisfy the immediate task while eroding the system's intended architecture."

  - id: 7
    difficulty: basic
    bloom: evaluate
    question: "Why can excessive abstraction make code harder to understand?"
    answer: "Abstraction hides detail, but too many shallow layers force readers to jump across files and reconstruct interactions that no one layer explains. This can overload working memory even when each class is individually small."
    explanation: "The useful target is not maximum abstraction. It is deep modules: simple interfaces that hide meaningful complexity and match how readers need to reason."

  - id: 8
    difficulty: basic
    bloom: apply
    question: "Name three practices that make code easier to comprehend top-down."
    answer: "Use domain-rich identifiers, expose architectural intent through package and module structure, and write comments that explain **why** an approach was chosen. Deep modules, stable interfaces, and tests-as-specifications also help."
    explanation: "These practices give future readers beacons. A reader can verify a hypothesis quickly instead of tracing every line from scratch."

