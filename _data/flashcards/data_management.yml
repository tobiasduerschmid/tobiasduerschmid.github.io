title: "Data Management Flashcards"
description: "Retrieval practice for DBMS concepts, SQL, relational algebra, transactions, ACID, CAP, and NoSQL trade-offs."
active: true
cards:
  - id: 1
    difficulty: basic
    question: "What **four problems** does a DBMS solve that an application manipulating its own files does not solve by itself?"
    answer: "(1) **Partial writes** on crash. (2) **Concurrent access** — two writers corrupting each other. (3) **Hardware loss** — disk failure destroying the only copy. (4) **Scale** — slow linear scans over growing data. A DBMS solves each of these *once* instead of re-solving them in every application."
    explanation: "Keep this list ready. Almost every feature a DBMS offers (transactions, locking, replication, indexes, query optimization) maps to one of these four motivations."

  - id: 2
    difficulty: basic
    question: "What does it mean to say SQL is **declarative**? Why does it matter?"
    answer: "You describe *what* data you want; the DBMS decides *how* to get it — which indexes to use, which order to join tables in, how to parallelize. This separation lets the DBMS optimize a query without the programmer rewriting it, and lets the same query keep working as data grows or schemas change."
    explanation: "Compare to an imperative file-scan loop, where the *how* is hard-wired into your code. The declarativeness of SQL is one of the single most important ideas in data management."

  - id: 3
    difficulty: basic
    question: "What does an **ER diagram** depict, and what are its three main notational elements?"
    answer: "An ER (Entity-Relationship) diagram depicts the *things* in the world the system must represent and how they relate. Peter Chen's (1976) notation uses **rectangles for entities** (things: `Student`, `Course`), **ovals for attributes** (what we know about them: `name`, `UID`), and **diamonds for relationships** between entities (`is enrolled`)."
    explanation: "ER diagrams are *design artifacts*, not databases. The next step is to translate entities and relationships into tables, primary keys, and foreign keys."

  - id: 4
    difficulty: intermediate
    question: "What does the **multiplicity** `N` to `M` mean on an ER relationship, and what does it force you to add to your schema?"
    answer: "`N` to `M` means *many-to-many*: many entities on each side can be associated with many on the other (one student takes many courses; one course has many students). Many-to-many cannot be stored as a single foreign-key column — it forces the introduction of a **join table** (also called a *bridge* or *associative* table), typically with a composite primary key from the two foreign keys."
    explanation: "Spotting many-to-many relationships is one of the most valuable skills in database design. If you see `N`–`M` multiplicity in the ER diagram, a join table is coming."

  - id: 5
    difficulty: basic
    question: "Define **primary key** and **foreign key** in one sentence each. What is the critical difference?"
    answer: "A **primary key** is a column (or combination of columns) that **uniquely identifies a row within a table**. A **foreign key** is a column whose values must match some row's primary key **in another table**, keeping cross-table references valid. Primary keys are about *intra-table* uniqueness; foreign keys are about *inter-table* referential integrity."
    explanation: "A single table has exactly one primary key but can have many foreign keys (each referencing a different parent table)."

  - id: 6
    difficulty: intermediate
    question: "When would you use a **composite primary key**, and give one realistic example."
    answer: "When no single column is unique on its own, but a combination is. Example: in an `Enrollment(student_id, course_id, quarter)` table, neither `student_id` nor `course_id` alone is unique (a student takes many courses; a course has many students). The unique combination — the triple `(student_id, course_id, quarter)` — is the primary key."
    explanation: "Composite keys are standard in join tables that implement many-to-many relationships; they directly encode the uniqueness rule of the relationship."

  - id: 7
    difficulty: basic
    question: "Name the **four core relational-algebra operations** and one-line intuition for each."
    answer: "**Join (⋈)** — combine rows from two tables that match on a key. **Selection (σ)** — keep only rows that satisfy a condition (filter rows). **Projection (Π)** — keep only specified columns (drop columns). **Group-By (γ)** — partition rows into groups and compute an aggregate (`COUNT`, `SUM`, `AVG`, …) per group."
    explanation: "Most practical SQL queries are a composition of these four. Mapping: `JOIN` → ⋈, `WHERE` → σ, `SELECT col1, col2` → Π, `GROUP BY` → γ."

  - id: 8
    difficulty: basic
    question: "How do the four relational-algebra operations map to SQL clauses?"
    answer: "`JOIN` → **Join (⋈)**; `WHERE` → **Selection (σ)**; the column list in `SELECT` → **Projection (Π)**; `GROUP BY` (plus aggregates) → **Group-By (γ)**."
    explanation: "Knowing the algebra-to-SQL mapping is the lever for reasoning about queries *abstractly*: it decouples 'what a query computes' from 'how this specific DBMS's SQL spells it'."

  - id: 9
    difficulty: basic
    question: "What is a **transaction**?"
    answer: "A **sequence of database operations treated as a single atomic unit of work.** Either all of the operations are applied (the transaction **commits**) or none of them are (it is **rolled back**). From outside, a transaction looks instantaneous — intermediate states are invisible to other transactions."
    explanation: "Transactions are the DBMS's primary tool for giving the application simple correctness guarantees in the face of crashes and concurrency."

  - id: 10
    difficulty: basic
    question: "What do **`COMMIT`** and **`ROLLBACK`** do?"
    answer: "`COMMIT` tells the DBMS to make all the transaction's changes permanent and visible. `ROLLBACK` tells it to discard all of the transaction's changes, leaving the database exactly as it was before the transaction started. A crash before `COMMIT` is equivalent to `ROLLBACK`."
    explanation: "This 'all or nothing at commit time' is the mechanism behind the Atomicity and Consistency guarantees of ACID."

  - id: 11
    difficulty: basic
    question: "State the **four ACID properties** and a one-sentence intuition for each."
    answer: "**A — Atomicity**: all operations in a transaction succeed, or none do. **C — Consistency**: committed transactions never violate declared constraints. **I — Isolation**: concurrent transactions behave as if they were serialized, not interleaved. **D — Durability**: once committed, changes survive any subsequent crash."
    explanation: "Memorize the letters, the one-sentence intuition, and *what each protects against* — that's the unit you'll reason with on real systems."

  - id: 12
    difficulty: intermediate
    question: "For each ACID letter, what class of failure does it **protect against**?"
    answer: "**Atomicity** protects against *partial writes* — a crash mid-transaction leaving half-applied state. **Consistency** protects against *invalid data* — constraint violations (negative balances, dangling foreign keys). **Isolation** protects against *concurrency anomalies* — lost updates, phantom reads, inconsistent snapshots. **Durability** protects against *losing acknowledged writes* to a power or process failure."
    explanation: "This failure-to-property mapping is often what a scenario question is really asking for. Practice it both directions: property → failure, and failure → property."

  - id: 15
    difficulty: basic
    question: "State the **three properties** named by the CAP theorem."
    answer: "**Consistency (C)** — every read returns the most recent committed write (or an error). This is *linearizability*, not the ACID-C of constraint preservation. **Availability (A)** — every request receives a (non-error) response, though not necessarily the latest data. **Partition Tolerance (P)** — the system keeps functioning even when the network between its nodes drops or delays messages arbitrarily."
    explanation: "CAP-C is a property of *the global view across replicas*. ACID-C is a property of *the schema and constraints*. They share a name but not a meaning."

  - id: 16
    difficulty: intermediate
    question: "State the **CAP theorem** precisely (not the 'pick 2 out of 3' slogan)."
    answer: "**When a network partition occurs** in a distributed system, the system must sacrifice either **Consistency** or **Availability** — it cannot keep both. Networks do partition in practice, so `P` is effectively mandatory, and the real operational choice is **CP** (refuse requests during a partition to stay correct) vs. **AP** (keep serving, accept staleness)."
    explanation: "Conjectured by Eric Brewer (2000), formally proved by Gilbert and Lynch (2002). The 'pick 2' slogan is memorable but misleading: C and A are only in tension *during* a partition."

  - id: 17
    difficulty: intermediate
    question: "What is the difference between a **CP** and an **AP** system? Give a canonical example of each."
    answer: "A **CP** system *refuses requests* on the side of a partition that cannot reach the majority of replicas, to avoid stale reads. Example: majority-write MongoDB, HBase, ZooKeeper, classical RDBMS with synchronous replication. An **AP** system *keeps serving* on both sides, accepting that reads may be stale until the partition heals. Example: Amazon DynamoDB (default), Apache Cassandra, CouchDB, Riak."
    explanation: "CP = correctness over uptime; AP = uptime over correctness. Both are defensible choices — the right one depends on what the application can tolerate."

  - id: 18
    difficulty: intermediate
    question: "What is **eventual consistency**, and with which CAP choice is it typically paired?"
    answer: "**Eventual consistency** guarantees that *if no new writes occur, all replicas will eventually converge to the same state* — but gives no bound on when. It is the typical consistency model of **AP** systems: during a partition, replicas diverge; after the partition heals, they reconcile."
    explanation: "Many AP systems pair eventual consistency with *conflict resolution rules* — last-writer-wins, vector clocks, CRDTs — that determine how divergent replicas reconverge."

  - id: 19
    difficulty: advanced
    question: "Why is **ACID-Consistency ≠ CAP-Consistency** one of the most important distinctions in data management?"
    answer: "Because the two mean different things: **ACID-C** = *declared schema constraints are never violated by a committed transaction* (a property of a single logical database). **CAP-C** = *every read returns the latest written value across replicas* (a property of a distributed system). A relational DBMS with asynchronous replication honors ACID-C on the primary yet still serves stale reads from replicas — violating CAP-C. 'Strongly consistent because we use SQL' confuses the two."
    explanation: "This is the single most common misconception in the chapter. Whenever you see 'consistency', ask: which one?"

  - id: 20
    difficulty: advanced
    question: "What is wrong with the claim that ATMs 'have all three' of CAP? What do ATMs actually demonstrate?"
    answer: "ATMs are **AP with eventual consistency**, not a system that defies CAP. During a WAN outage to the bank, many ATMs continue to allow withdrawals up to a *cached daily limit*, and the resulting transactions are reconciled once the link returns — sometimes producing *temporary overdrafts* that the bank absorbs. ATMs demonstrate a **deliberate Availability-over-Consistency** business choice: staying open is worth occasional post-hoc reconciliation cost."
    explanation: "ATMs are the motivating *counterexample* for CAP, not its exception. Banks explicitly accept the inconsistency because availability is more valuable than perfect correctness at withdrawal time."

  - id: 21
    difficulty: advanced
    question: "List the **four NoSQL families** with one representative system and one typical fit each."
    answer: "**Document** (MongoDB, CouchDB) — nested JSON-like records; good for content with optional or variable fields. **Key-value** (Redis, DynamoDB, Riak) — simple `key → value` lookups; good for caches, session stores. **Wide-column** (Cassandra, HBase, ScyllaDB) — rows with families of sparse columns; good for time-series and very-wide denormalized data. **Graph** (Neo4j, Neptune, JanusGraph) — nodes and typed edges; good for social graphs, fraud detection, knowledge graphs."
    explanation: "The right NoSQL family is determined by **data shape and query pattern**, not by generic 'scale' or 'NoSQL-ness'."

  - id: 22
    difficulty: advanced
    question: "What was 'NoSQL' originally reacting against, and what was it later redefined to mean?"
    answer: "It emerged (c. 2008–2012) against two constraints of traditional RDBMSs: **strict schemas** that do not fit rapidly-changing or semi-structured data, and **ACID across many nodes** becoming expensive in distributed settings. It was later redefined as **'Not Only SQL'** — many NoSQL systems have their own query languages and some even support SQL-like syntax. The name is about dropping the *relational* assumption, not about banning SQL."
    explanation: "The 'No' is *architectural*, not *lexical*. Read it as 'non-relational', not 'anti-SQL'."

  - id: 23
    difficulty: intermediate
    question: "Sweet spot of **RDBMS** vs. sweet spot of **NoSQL** — state each in one sentence."
    answer: "**RDBMS**: well-structured data with cross-row invariants, where multi-row ACID transactions, referential integrity, and joins matter (finance, bookings, inventory of record). **NoSQL**: large, loosely-structured data where flexible schemas, horizontal scale, and availability matter more than strict consistency and transactional joins (feeds, catalogs, logs, caches)."
    explanation: "Most real production systems use *both*: a relational store for the transactional core, and a NoSQL store for high-volume side paths (search indices, caches, user-generated content)."

  - id: 24
    difficulty: advanced
    question: "Why is 'we use SQL so we can swap databases at any time' an oversimplification?"
    answer: "The **ISO/IEC 9075 core** of SQL (basic DML/DDL, joins, group-by) is largely portable — but real applications rely on vendor-specific extensions: stored-procedure languages (PL/pgSQL vs. T-SQL vs. PL/SQL), window-function dialects, JSON operators, types, indexes, extensions. Migration of a non-trivial application across dialects almost always takes real engineering effort."
    explanation: "'SQL-compatible' ≠ 'drop-in replaceable'. Plan for the dialect work even when the core queries look identical."

  - id: 25
    difficulty: advanced
    question: "Give the scenario-to-property mapping for CAP choices: for each application below, which property is primary?"
    answer: "(a) *Never double-spend money* → **Consistency (CP)**. (b) *Stale reads are fine; a 500 error is expensive* → **Availability (AP)**. (c) *Globally distributed service must survive transcontinental network failures* → **Partition Tolerance** (mandatory, combine with CP or AP as the application allows). (d) *ATM dispensing cash during a bank-link outage* → **Availability (AP)** with later reconciliation."
    explanation: "This mapping is the real payoff of CAP: a vocabulary for *picking* the right database for a requirement, not a Venn diagram to memorize."
