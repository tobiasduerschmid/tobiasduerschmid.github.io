title: "Test Doubles"
description: "Retrieval practice for Meszaros's test-double taxonomy — SUT, DOC, indirect inputs vs outputs, the five kinds of double (Dummy, Fake, Stub, Spy, Mock), procedural vs expected-behavior verification, and how to choose. Cards span Remember through Evaluate."
active: true
cards:
  - id: 1
    difficulty: basic
    question: "Define **SUT** and **DOC**, and why the distinction matters."
    answer: "**SUT** — *System Under Test*, the unit you want to verify. **DOC** — *Depended-On Component*, something the SUT calls into. Replacing a DOC with a double is what lets the SUT be tested in isolation."
    explanation: "When you reach for a mock or stub, naming the SUT and the DOC keeps the test honest: you are checking the SUT's behavior, and you are controlling or observing the DOC's role in it. Confusion between the two is the root of many over-mocked, brittle suites."

  - id: 2
    difficulty: basic
    question: "Difference between an **indirect input** to the SUT and an **indirect output** from the SUT? One example each."
    answer: "**Indirect input** — a value the SUT *receives from* a DOC (return, exception). Example: DB query result. **Indirect output** — an effect the SUT *produces through* a DOC. Example: SMS sent."
    explanation: "The choice of test double follows from which direction matters: control indirect inputs with a **Stub**; observe indirect outputs with a **Spy** or **Mock**. Tests that try to do both with one double are often the ones that feel tangled — separate the concerns and the test usually clarifies."

  - id: 3
    difficulty: basic
    question: "Name all five kinds of test double in Meszaros's taxonomy and what each one is for."
    answer: "**Dummy** — fills a parameter, never used. **Fake** — working implementation with shortcuts (in-memory DB). **Stub** — returns canned values. **Spy** — records calls for after-the-fact assertion. **Mock** — pre-programmed expectations, fails *during* execution."
    explanation: "The five live on two axes: which direction of data flow they control (input vs output) and when verification happens (after vs during). Knowing the full taxonomy keeps you from reaching for a Mock when a Stub or Spy is closer to what you actually need."

  - id: 4
    difficulty: intermediate
    question: "You need to drive the SUT down its error-handling branch — the one where the payment gateway returns `Status.TIMEOUT`. Which double, and why?"
    answer: "A **Stub**. You need to control what the SUT *receives* from the gateway (indirect input) to force the path. You don't need to observe what the SUT sent."
    explanation: "Stubs shine for exercising paths that are hard to trigger with real DOCs — error responses, slow paths, rare states. If you also need to verify *what message the SUT sent in response* to the timeout, you would add a Spy or Mock — but the *input control* always belongs to a Stub."

  - id: 5
    difficulty: intermediate
    question: "Compare **Spy** and **Mock**: when does failure occur, and what style of test does each produce?"
    answer: "**Spy** records calls quietly; test asserts on the recording *after* the SUT runs (*procedural verification*). **Mock** is pre-programmed with expectations; fails *during* the SUT's execution if a call doesn't match (*expected behavior specification*)."
    explanation: "Spy-based tests put assertions in the test method, so the reader sees what is verified next to the act step; Mock-based tests push expectations into setup. Spies are friendlier when you can't predict all attributes of the interaction up front; mocks fail faster, at the call site, when you can specify the contract precisely."

  - id: 6
    difficulty: intermediate
    question: "What is a **Fake**? Canonical example? How is it different from a Stub?"
    answer: "A **Fake** is a *working* alternative implementation with shortcuts unsuitable for production (e.g. in-memory DB satisfying the real interface). A **Stub** returns canned values for specific calls; a Fake actually implements the behavior."
    explanation: "Fakes are ideal when you want realistic behavior at high speed — write a row, read it back, query by index — without standing up the real dependency. They cost more to build but pay back across many tests. Stubs are cheap and case-specific; Fakes are richer and scenario-general."

  - id: 7
    difficulty: advanced
    question: "A junior engineer asserts `mock.method.assert_called_once_with(...)` after every line of the SUT's body. Diagnose."
    answer: "The test has crossed from *checking behavior* to *encoding the implementation*. Any refactor that changes how the SUT calls its collaborators breaks the test — even when user-visible behavior is preserved. The test is testing the mock, not the system."
    explanation: "This is the most common Mock anti-pattern. Interaction checks are useful when the interaction *is* the contract ('exactly one receipt email after payment succeeds') and harmful when they merely freeze the current implementation's wiring. The remedy is usually to assert on the SUT's outputs or persisted state instead, reserving interaction assertions for the cases where collaboration is the behavior."

  - id: 8
    difficulty: advanced
    question: "Your SUT calls `notifier.send(channel, body)` four times in a single workflow, in a data-dependent order. You want to assert each call had the right channel but can't predict the order. Which double fits best?"
    answer: "A **Spy**. Let the SUT run, retrieve the recorded calls, sort or group them, and assert each. A Mock with strict-order expectations would fail on the first reorder; a Spy collects everything for flexible after-the-fact assertion."
    explanation: "Procedural verification with a Spy is well suited when you cannot predict all attributes of the interactions up front or when assertions need richer logic (grouping, sorting, set comparisons). The cost is that errors are detected at assertion time, not the moment they happen — but you trade that for flexibility the Mock model lacks."

  - id: 9
    difficulty: intermediate
    question: "Pick a double for: *'My SUT's constructor requires a `loader`, but this behavior never calls `loader.load_config()`.'*"
    answer: "A **Dummy** suffices — the loader satisfies the signature but is never used in this path. If the SUT *does* read fields from `loader.load_config()`, escalate to a **Stub** returning a specific config."
    explanation: "Reaching for a Mock or Spy here would over-specify the test. The minimum-viable-double rule says pick the simplest double that lets the test do its job — a Dummy exists only to satisfy the signature, and anything heavier is extra coupling for no benefit."

  - id: 10
    difficulty: advanced
    question: "Sketch the **procedural verification** lifecycle of a Spy-based test in four steps."
    answer: "(1) Install the **Spy** in place of the DOC. (2) **Exercise** the SUT. (3) Retrieve recorded calls from the Spy. (4) Use ordinary assertions to compare recorded vs expected values."
    explanation: "This is the chapter's four-step lifecycle. The contrast with mocks is the *placement of the verification*: spies make it explicit in the test body (visible, flexible, late); mocks make it implicit in setup (terse, strict, early). Both are valid; each suits a different shape of test."

  - id: 11
    difficulty: advanced
    question: |
      A controller test does this:

      ```python
      user_repo = Mock()
      user_repo.get.return_value = User(id=1)
      email_service = Mock()
      controller = Controller(user_repo, email_service)
      controller.signup(email='a@b.c')
      email_service.send.assert_called_once_with('a@b.c', subject='Welcome')
      ```

      Classify each `Mock()` instance by the role it actually plays.
    answer: "`user_repo` acts as a **Stub** (returns canned `User`, no call assertion). `email_service` is on the **Spy / Mock Object** boundary: the test verifies an outbound call after execution with `assert_called_once_with`, so the important classification is behavior verification, not the `Mock()` class name."
    explanation: "Mock libraries blur the taxonomy — `unittest.mock.Mock` plays every role, so naming the role each instance plays is what keeps the test honest. Rule of thumb: configured return values → Stub; post-execution call assertions → Spy-style behavior verification; up-front strict expectations → Mock Object. A single object can even combine roles within one test."

  - id: 12
    difficulty: advanced
    question: |
      Module `app/report.py` does `from services.users import fetch_user` and then calls `fetch_user(user_id)`. Which `patch()` target intercepts the call from a test of `app.report` — `"services.users.fetch_user"` or `"app.report.fetch_user"`? Why?
    answer: "`\"app.report.fetch_user\"`. After `from services.users import fetch_user`, the name `fetch_user` is bound in `app.report`'s namespace; the SUT looks it up *there*. Patching `services.users.fetch_user` leaves `app.report`'s local reference untouched."
    explanation: "**Patch where the SUT looks up the name, not where it was defined.** This is the #1 Python mocking pitfall. The same principle applies to JavaScript CommonJS (`const { y } = require('x')` creates a similar local binding) and to Java static imports — names live in the namespace of the module that introduces them."

  - id: 13
    difficulty: advanced
    question: |
      Your SUT catches `ConnectionError` and returns a fallback value. Sketch the `Mock()` configuration that drives the SUT down that branch deterministically. Why does setting `return_value` not work?
    answer: |
      Set `side_effect` to the exception class:

      ```python
      api.fetch.side_effect = ConnectionError
      ```

      `side_effect = <exception class>` makes the mock *raise* the exception on call — driving the SUT into its `except` branch. `return_value = ConnectionError()` would *return* an instance of the exception, which the SUT receives as a value rather than as a raise.
    explanation: "`side_effect` is `Mock`'s lever for behavior beyond returning a canned value: set it to an exception class to raise; set it to an iterable to return different values across consecutive calls; set it to a callable to compute the return value from the arguments. `return_value` and `side_effect` answer different test-design needs and are *not* interchangeable."

  - id: 14
    difficulty: advanced
    question: |
      A team's tests directly mock `requests.get` in twelve different modules. A `requests` version upgrade just broke 30 of those tests. What's the structural fix — and what's the principle?
    answer: "Wrap `requests` in a thin **Adapter** class (e.g., `HttpClient`) that exposes only the methods the codebase needs. Have all twelve modules depend on `HttpClient`. Mock the Adapter, not `requests` directly. Principle: **don't mock what you don't own.**"
    explanation: "When tests depend on a third-party's API directly, every library upgrade can ripple through the suite. The Adapter pattern (named in design-patterns literature) flips the dependency direction: the codebase depends on an interface the team controls, and tests double that interface. The third-party stays invisible to the test suite."

  - id: 15
    difficulty: expert
    question: |
      You use a `FakeUserRepository` (in-memory dict) for fast unit tests. The unit tests pass. Production then fails because the real `PostgresUserRepository` raises `IntegrityError` on a duplicate email, while the Fake had been raising `ValueError`. How do you keep the Fake's speed *and* defend against this drift?
    answer: "Write a **shared contract test** that both `FakeUserRepository` and `PostgresUserRepository` must pass — including the duplicate-email exception class. Run it against the Fake every commit (fast) and against the real repository on a schedule, against a sandbox database (slower)."
    explanation: "Every Fake is a *promise* that it behaves enough like the real collaborator, and that promise can break silently. A contract test captures the behavioral expectations once and runs against both implementations, so the Fake keeps its speed while drift becomes visible the moment one side changes."

  - id: 16
    difficulty: intermediate
    question: |
      Diagnose the test smell:

      ```python
      def test_processes_orders():
          loader = Mock()
          loader.load.return_value = open("/tmp/test_orders.csv").read()
          processor = OrderProcessor(loader)
          processor.process_all()
          assert processor.summary == "5 orders, $1240 total"
      ```
    answer: "**Mystery Guest**. The test depends on the contents of `/tmp/test_orders.csv` — an external file invisible from the test body. A reader cannot tell what `5 orders, $1240 total` is computed *from*, only that the assertion exists."
    explanation: "Mystery Guest is one of several named test-double smells. Neighbors to keep distinct: **The Mockery** (so many mocks the test verifies orchestration, not behavior); **Counting on Spies** (asserting every internal call, freezing the implementation); **Unnecessary Stubs** (stubs for calls the SUT never makes); **Eager Test** (one test, many behaviors). Naming the smell makes it easier to spot in review."
