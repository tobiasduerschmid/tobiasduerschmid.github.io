title: "Test Quality"
description: "Retrieval practice for evaluating a whole test suite — coverage vs. quality, oracle types, mutation testing, flakiness, test smells, and the quality rubric. Cards mix Remember, Understand, Apply, Analyze, and Evaluate."
active: true
cards:
  - id: 1
    difficulty: basic
    question: "Why is coverage a *map* rather than a *grade* of test quality?"
    answer: "Coverage tells you which lines/branches were **executed**. It does not tell you whether the test **checked the right result** — high coverage can coexist with weak assertions and missing boundaries."
    explanation: "Coverage has only low-to-moderate correlation with suite effectiveness once suite size is controlled. Treat coverage as a navigational tool ('what didn't I exercise yet?') not as a quality target ('we hit 90, ship it'). Once coverage becomes the goal, students and teams learn to satisfy the metric instead of the specification."

  - id: 2
    difficulty: basic
    question: "Define **mutation testing** in one sentence, and name the question a *surviving* mutant asks of your suite."
    answer: "Mutation testing creates many small faulty versions of the program and asks whether existing tests detect them. A **surviving mutant** asks: *Is an assertion too weak, did we forget a boundary, or is this code underspecified?*"
    explanation: "Mutation testing creates many small faulty versions of the program and checks whether the tests catch them. Mutant detection correlates with real-fault detection independently of code coverage — a stronger signal than coverage alone. Treat the mutation score as a diagnostic, not a moral scoreboard."

  - id: 3
    difficulty: basic
    question: "Name the five oracle types from the chapter."
    answer: "**Exact value** (compare to known result); **state** (check observable state after); **interaction** (verify a collaboration when *that* is the contract); **exception** (specified failure mode); **property** (invariant across many inputs)."
    explanation: "Use the strongest oracle you can afford. Property oracles shine when one exact value matters less than a rule that should hold over a large input space — QuickCheck (Claessen & Hughes 2000) and its descendants generate inputs automatically. Interaction oracles are appropriate sparingly — overusing them produces tests that freeze how the current implementation happens to collaborate internally."

  - id: 4
    difficulty: advanced
    question: "List at least four of the recurring causes of flaky tests."
    answer: "**Asynchronous waiting** (sleeps); **concurrency** (races); **test-order dependencies** (leaked state); **time assumptions** (real clock); **randomness** (unseeded); **external resources** (network, FS, real DB)."
    explanation: "Analyses of fixed flaky tests across large open-source projects show async waiting is by far the most common cause. Each cause has a structural fix — wait on observable conditions, isolate state, control the clock and randomness — rather than a retry. Flakiness damages the social contract: a red test should mean *investigate*, not *rerun*."

  - id: 5
    difficulty: intermediate
    question: "Name three classic *test smells* from the van Deursen catalog."
    answer: "**Excessive setup** (fixture drowns the actual behavior); **assertion roulette** (many bare assertions, no diagnostic); **mystery guest** (depends on hidden file/object); **eager test** (one test, many unrelated behaviors)."
    explanation: "Test-code smells are well catalogued, and studies find they are widespread in real projects and that their presence harms comprehension and maintenance. Test code is production code for confidence — it needs the same design care."

  - id: 6
    difficulty: advanced
    question: "Diagnose this: *'Coverage is 88%, suite passes consistently, but engineers report being afraid to refactor module X because they don't trust the tests.'*"
    answer: "Likely **weak oracles and over-coupling to implementation** — tests pass when code runs, but engineers know from experience that real bugs slip through and that refactors trigger false failures."
    explanation: "This is the textbook gap between coverage as a measurement and quality as an experience. Engineer fear is a real signal — it usually traces to assertions that don't catch the bugs that matter (weak oracles) or assertions that catch refactors that don't matter (over-coupling). Mutation testing diagnoses the first; reviewing what each test asserts on diagnoses the second."

  - id: 7
    difficulty: intermediate
    question: "Choose between an example-based test and a property-based test for: *'CSV parser round-trip — `parse(format(rows)) == rows` for any rows.'* Which is stronger here?"
    answer: "**Property-based**. The round-trip is naturally `∀ rows: parse(format(rows)) == rows`, and a generator produces input shapes (embedded commas, quotes, Unicode) a human author would never write."
    explanation: "Round-trip is one of the canonical patterns property-based testing exploits, alongside identity, commutativity, associativity, and idempotence. The generator finds boundary cases the author didn't think of. Pair the property with two or three hand-chosen example tests for cases you care about specifically — properties and examples complement each other."

  - id: 8
    difficulty: advanced
    question: "Mutation testing reports 95% on a service module, but a postmortem finds a real bug no test caught. What does that contradict, and what does it really tell you?"
    answer: "Not a contradiction. Mutation tests **small syntactic faults**; real bugs often live at higher-level seams — wrong spec, missed boundary, missing scenario — that no syntactic mutant exercises."
    explanation: "Mutation score correlates with real-fault detection but explains only part of it. Treat mutation as one signal in a dashboard: coverage (what wasn't visited), mutation/seeded-fault detection (oracle strength), flake rate (trust), bug-regression rate (real escapes), runtime by layer (fast feedback). No single metric captures test quality."

  - id: 9
    difficulty: expert
    question: "Sketch a quality rubric a reviewer should walk through when reviewing a test suite — at least five dimensions."
    answer: "Behavioral relevance · oracle strength · input selection (boundaries, invalid) · fault-revealing ability · determinism · diagnosis quality · maintainability · speed and layering."
    explanation: "The rubric in the chapter is structured this way deliberately — each row has a *strong evidence* description and a *warning sign*. Use it as a checklist when reviewing PRs or auditing a suite. The point is not to score; it is to make weakness diagnosable, so concrete fixes follow."

  - id: 10
    difficulty: expert
    question: "Dashboard: coverage 92% (up from 88%), mutation score steady at 80%, escaped-bug count doubled in three months. Diagnose."
    answer: "Coverage rose without oracle strength — new tests *execute* new code without *checking* it. The static mutation score with rising coverage and rising escapes is the tell: new tests are not killing new mutants."
    explanation: "Tying release gates or performance metrics to coverage creates pressure for execution without verification — exactly the failure mode here. The remedy is to weight mutation/seeded-fault scores or to peer-review oracle strength on each new test, and to keep asking whether the suite would fail if the system broke in a way users care about."

  - id: 11
    difficulty: expert
    question: "Why is using one test suite for both *formative* fast feedback and *summative* release sign-off risky?"
    answer: "The two goals pull opposite ways — fast suites need isolation and mocks; release gates need realism and breadth. Conflating them makes the fast suite slow *and* the release gate narrow. Separate them into layers."
    explanation: "This mirrors the formative-vs-summative distinction in assessment. A 'one suite to rule them all' design forces tradeoffs that hurt both purposes. The healthier model is to keep the fast feedback loop trustworthy and quick, and treat the larger gate as a *separate* artifact with its own runtime and scope expectations."

  - id: 12
    difficulty: expert
    question: "Critique: *'We require 100% line coverage on every PR; tests are reviewed only by the author.'* Name at least three failure modes this invites."
    answer: "(1) **Coverage gaming** — execute lines without assertions. (2) **Weak oracles unreviewed** — vacuous assertions slip through. (3) **Hostile refactoring** — tests pin implementation details. (4) **Slowed feedback** — exhaustive coverage forces slow tests."
    explanation: "Goodhart's Law in test design: when a measure becomes a target, it ceases to be a good measure. A healthier policy specifies *what the suite must demonstrate* (behavior coverage for new features, mutation kills on critical modules) and includes test review as part of code review. Coverage is one signal among several, not the sole release gate."
