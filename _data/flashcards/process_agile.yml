title: "Software Process & Agile Flashcards"
description: "Concepts, history, and trade-offs of software processes — Waterfall, Agile, the Manifesto, iterative-incremental development, and major Agile frameworks (Scrum, XP, Lean)."
active: true
cards:
  - id: 1
    difficulty: basic
    question: "What is the **Waterfall** model, and why did it fall out of favor?"
    answer: "A sequential development process where requirements → design → implementation → verification → maintenance happen as strictly ordered phases, each fully complete before the next begins. It assumes requirements are stable and predictable. It fell out of favor because in most domains requirements *evolve*, customer feedback arrives only at the end of multi-year cycles, and discovered errors are catastrophically expensive to fix late."
    explanation: "Waterfall isn't universally bad — it works well in domains with genuinely stable requirements (some embedded systems, regulatory-compliance work). But for most commercial software, the stability assumption fails and the late-feedback failure mode dominates."

  - id: 2
    difficulty: basic
    question: "What are the four **values** of the Agile Manifesto?"
    answer: "**(1)** Individuals and interactions *over* processes and tools. **(2)** Working software *over* comprehensive documentation. **(3)** Customer collaboration *over* contract negotiation. **(4)** Responding to change *over* following a plan. The Manifesto acknowledges value in the right-hand items but insists the left-hand items are more critical in complex environments."
    explanation: "The 'over' wording matters: it says *more critical than*, not *instead of*. Agile teams still document, plan, and use processes and tools — they just don't let those activities dominate when working software, adaptability, individual judgment, and customer collaboration would be better served."

  - id: 3
    difficulty: basic
    question: "What does **iterative and incremental development** mean?"
    answer: "Work is broken into short, time-boxed periods (often called **sprints** or **iterations**), typically 1–4 weeks. At the end of each iteration, the team delivers a **working increment** of the product, demonstrated to the customer to gather rapid feedback. The next iteration's priorities can shift based on what was learned."
    explanation: "This is the structural innovation that lets Agile honor 'responding to change' and 'customer collaboration.' Without iterations, there's no opportunity for fast feedback; with them, course-correction is cheap because only one iteration's worth of work is at risk at any time."

  - id: 4
    difficulty: intermediate
    question: "Why is **late customer feedback** Waterfall's most costly failure mode?"
    answer: "Defects (a wrong requirement, a missed integration, a flawed assumption) are most expensive to fix at the end of the cycle, when most other code already depends on them. By the time the customer sees Waterfall's output, months or years of work has been built on whatever was wrong, so fixing the foundation often costs as much as the original build."
    explanation: "Boehm's cost-of-defects research famously showed defect-fix cost rising 10x–100x as defects move from requirements → design → implementation → testing → production. Agile's short iterations are designed to catch defects within hours or days, when they're still cheap."

  - id: 5
    difficulty: intermediate
    question: "Distinguish **iterative** from **incremental** delivery."
    answer: "**Iterative:** repeatedly refining the *same* deliverable based on feedback (sketch → rough → polished). **Incremental:** building the system in *additive slices* over time (login, then dashboard, then reports). Agile combines both — each iteration both refines existing increments based on feedback and adds new ones."
    explanation: "Pure iterative without incremental = endlessly polishing one tiny piece. Pure incremental without iterative = building each slice exactly once and never revising. The combination is what gives Agile its responsiveness *and* progress."

  - id: 6
    difficulty: basic
    question: "Name three of the **key Agile principles** beyond the four values."
    answer: "**Customer satisfaction** through early and continuous delivery of valuable software. **Simplicity** — the art of maximizing the amount of work *not* done. **Technical excellence** — continuous attention to good design to enhance long-term agility. **Self-organizing teams** — empowering developers to decide how to best organize their work."
    explanation: "There are twelve principles in total. These four are the most cited and the ones most often violated in cargo-cult Agile: teams that demo only at the end (no customer satisfaction), pile up technical debt (no technical excellence), gold-plate features (no simplicity), or treat developers as order-takers (no self-organization)."

  - id: 7
    difficulty: intermediate
    question: "Compare **Scrum**, **XP**, and **Lean Software Development**."
    answer: "**Scrum:** most popular Agile framework — emphasizes workflow and roles (Scrum Master, Product Owner, Developers) and ceremonies (sprints, standups, reviews, retrospectives). **XP:** focuses on **technical excellence** through extreme versions of good engineering practices (TDD, pair programming, CI, collective ownership). **Lean:** derived from Toyota manufacturing — focused on **eliminating waste** in the value stream."
    explanation: "These are complementary, not alternatives. Many teams combine Scrum's workflow with XP's engineering practices, or use Lean continuous-improvement on top of Scrum. Choose by which dimension your team most needs to strengthen (process clarity → Scrum; engineering quality → XP; waste reduction → Lean)."

  - id: 8
    difficulty: advanced
    question: "When is **Waterfall** still the right choice?"
    answer: "When (a) requirements are genuinely stable and well-understood up front (some embedded systems, regulatory-compliance work), (b) the system is safety-critical and software cannot be incrementally deployed (spacecraft, certified medical devices, aircraft control), (c) integration with hardware development timelines requires phase alignment, or (d) contractual / regulatory frameworks mandate a phased deliverable schedule."
    explanation: "Agile is the right default for most modern commercial software, but it isn't universally superior. The honest engineering response is to match process to context. Picking Agile for a Mars rover or Waterfall for a consumer web product are both common failures of process-context fit."

  - id: 9
    difficulty: intermediate
    question: "What is **cargo-cult Agile**?"
    answer: "Adopting the visible *rituals* of Agile (standups, sprints, retrospectives, Scrum Master roles) without the underlying *values* (responsiveness, customer collaboration, working software early, technical excellence). The team feels Agile, but the work behaves like Waterfall — and customers see broken software at the end, just as in pure Waterfall."
    explanation: "Common symptoms: 150-page upfront requirements docs, refusing to change requirements mid-sprint, demos only at the end of long engagements, no actual customer in the loop, technical debt ignored. The fix is to start with the values and let ceremonies serve them — not the reverse."

  - id: 10
    difficulty: intermediate
    question: "What does **'responding to change over following a plan'** actually mean for a working team?"
    answer: "Plans exist and are valuable, but they are treated as **hypotheses to be revised** based on what each iteration reveals — not as commitments to be followed regardless of evidence. When the customer or the iteration's results contradict the plan, the team has a conversation about the trade-off and updates the plan rather than executing the wrong work."
    explanation: "Agile teams that interpret this as 'no plan' produce chaos. Teams that interpret it as 'plan but adjust' produce direction with adaptability. The middle path is harder than either extreme but is what the Manifesto authors intended."

  - id: 11
    difficulty: intermediate
    question: "Why does **simplicity** (maximizing the work *not* done) appear as an Agile principle?"
    answer: "Because every feature has carrying cost (maintenance, complexity, security surface, test burden) and most projected features are never used. Building the simplest thing that delivers the value, and waiting to see real demand before adding more, is the most economical path to a useful product."
    explanation: "This is YAGNI ('You Aren't Gonna Need It') as a principle. Agile teams resist speculative complexity — adding features for hypothetical future users — because they know each one will need to be maintained whether used or not. Simplicity here is engineering economy, not minimalism for aesthetics."

  - id: 12
    difficulty: advanced
    question: "Why must Agile teams invest in **technical excellence** even though working software is the primary measure of progress?"
    answer: "Working software measures *current* output; technical excellence determines *future* output. A team that ships fast but accumulates technical debt will eventually slow to a crawl as every change costs more than the last. Agile's iteration model only works if each iteration is approximately as fast and safe as the previous — which requires continuous design attention."
    explanation: "This is why the 12th Agile principle says 'continuous attention to technical excellence and good design enhances agility.' Skipping refactoring, ignoring code smells, or letting tests degrade trades a few weeks of velocity for years of pain. Healthy Agile teams treat REFACTOR (in TDD), refactoring sprints, and architecture work as non-optional."

  - id: 13
    difficulty: basic
    question: "What is a **Sprint** (in Scrum) or **Iteration** (in XP)?"
    answer: "A short, time-boxed development cycle (typically 1–4 weeks) at the end of which the team delivers a working increment of the product. The iteration is the unit of planning, execution, and customer feedback in Agile processes."
    explanation: "The boundaries of iterations create natural rhythms for planning, demo, retrospective, and re-prioritization. Without time-boxing, work tends to expand to whatever space is available; the iteration boundary forces a discipline of 'what can we deliver in N weeks?'"

  - id: 14
    difficulty: basic
    question: "What is the role of **self-organizing teams** in Agile?"
    answer: "Agile empowers developers to decide *how* to best organize their own work — task allocation, technical approach, tooling — because the people doing the work have the best context about trade-offs, dependencies, and risks. Leadership sets *what* (priorities, strategy) and *why* (business value); the team decides *how*."
    explanation: "The opposite is treating developers as 'coding monkeys' executing orders from above. Self-organization isn't anarchy — it's pushing decisions to the level where information is best, raising both quality (better decisions) and morale (autonomy is a motivator)."

  - id: 15
    difficulty: expert
    question: "Why is choosing the right software process a **context-dependent** decision, not a universal answer?"
    answer: "Every process is engineered around assumptions about (a) requirement stability, (b) team size and locality, (c) deployment cadence, (d) cost of failure, (e) customer accessibility. When the assumptions hold, the process produces its promised benefits; when they don't, the process produces friction without the benefits. There is no universally best process — only processes that fit some contexts better than others."
    explanation: "The honest engineering response: match process to context. Agile + XP for evolving-requirements, redeployable, small-team software. SAFe or LeSS for very large teams. V-model or formal methods for safety-critical. Waterfall for genuinely stable requirements or regulatory-mandated phases. The reflexive 'always Agile' or 'always Waterfall' positions both fail when the assumptions don't match."
