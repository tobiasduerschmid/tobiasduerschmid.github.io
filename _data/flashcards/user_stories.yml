title: "User Stories & INVEST Principle Flashcards"
description: "Test your knowledge on Agile user stories and the criteria for creating high-quality requirements!"
active: true
cards:
  - id: 1
    difficulty: basic
    question: "What is the primary purpose of Acceptance Criteria in a user story?"
    answer: "To define the specific conditions that must be met for a user story to be considered 'Done'. They define the scope of the user story."
    explanation: "They give a feature clear, objective boundaries, which removes ambiguity about what to build and forms the basis for testing whether the story delivers its value. This is also what makes a story testable and estimable."
  - id: 2
    difficulty: basic
    question: "What is the standard template for writing a User Story?"
    answer: "'As a [role], I want [feature/action], so that [benefit/value].'"
    explanation: "This structure ensures the team always understands **who** they are building for, **what** they are building, and **why** it matters to the business or user."
  - id: 3
    difficulty: basic
    question: "What does the acronym INVEST stand for?"
    answer: "Independent, Negotiable, Valuable, Estimable, Small, and Testable."
    explanation: "The **INVEST criteria** are a widely used checklist for assessing the quality and readiness of a user story before it enters a sprint."
  - id: 4
    difficulty: basic
    question: "What does 'Independent' mean in the INVEST principle?"
    answer: "A user story should not overlap with or depend on other stories; it should be possible to schedule, implement, and test it on its own."
    explanation: "**Dependencies and overlap** make prioritization, planning, and estimation difficult. If stories are tightly coupled, the team should look for ways to combine them, split them along different boundaries, or make an unavoidable dependency explicit."
  - id: 5
    difficulty: basic
    question: "Why must a user story be 'Negotiable'?"
    answer: "Because a user story describes requirements, not implementation details or design decisions."
    explanation: "Developers and product owners collaborate and **negotiate the implementation details** just-in-time, allowing for better, more flexible solutions."
  - id: 6
    difficulty: basic
    question: "What makes a user story 'Estimable'?"
    answer: "The development team must have enough information to roughly gauge the effort required to complete it."
    explanation: "If a story isn't estimable, it usually means it is **too large** or **poorly understood**. The team needs more discussion or a technical spike to clarify the requirements."
  - id: 7
    difficulty: basic
    question: "Why is it crucial for a user story to be 'Small'?"
    answer: "It must be appropriately sized to be completed within a single Agile iteration or sprint while still delivering meaningful user value."
    explanation: "Smaller stories reduce delivery risk, provide faster feedback loops, and make estimation much more accurate. If a story is too big, it becomes an epic that should be broken down; if it becomes a tiny 'bag of leaves,' it may need to be combined with related work."
  - id: 8
    difficulty: basic
    question: "How do you ensure a user story is 'Testable'?"
    answer: "By defining clear, objective Acceptance Criteria."
    explanation: "A story is only 'Done' when it can be verified. If you cannot test a story, you cannot prove that it successfully delivers the intended **value** to the user."
  - id: 9
    difficulty: basic
    question: "What is the widely used format for writing Acceptance Criteria?"
    answer: "The 'Given [pre-condition] / When [action] / Then [post-condition]' format."
    explanation: "This format structures criteria as clear scenarios: **Given** a specific context or starting state, **When** a specific action is performed, **Then** a specific, measurable outcome or result occurs."
  - id: 10
    difficulty: intermediate
    question: "What is the difference between the main body of the User Story and Acceptance Criteria?"
    answer: "A User Story summarizes the **who**, **what**, and **why** of a feature; Acceptance Criteria define the observable conditions that determine whether the story is actually 'Done'."
    explanation: "Think of the User Story as the goal statement and the Acceptance Criteria as the decision driver for scope. When the two disagree, the acceptance criteria usually determine what implementation will be accepted, so they must capture the essential behavior that delivers the story's value."
