<!DOCTYPE html>
<html class="dark-mode" lang="en">
<head>
  <meta charset="utf-8">
  <title>UML Diagram</title>
  <link rel="stylesheet" href="{{ '/css/tutorial.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/css/uml-diagram.css' | relative_url }}">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    body { display: flex; flex-direction: column; }
    .popup-wrap { flex: 1; min-height: 0; display: flex; flex-direction: column; }
    .popup-status {
      flex: 1; display: flex; align-items: center; justify-content: center;
      color: #666; font-size: 13px; line-height: 1.5; padding: 24px; text-align: center;
    }
    html:not(.dark-mode) body { background: #fff; }
    #diagramContent { cursor: grab; }
    #diagramContent.panning { cursor: grabbing; }
  </style>
</head>
<body>
  <div class="tvm-uml-left-view" style="height:100%">
    <div class="tvm-diagram-toolbar">
      <button class="tvm-diagram-type-btn active" data-type="class">Class Diagram</button>
      <button class="tvm-diagram-type-btn" data-type="sequence">Sequence Diagram</button>
      <div class="tvm-diagram-zoom-controls">
        <button class="tvm-diagram-zoom-btn" data-zoom="out" title="Zoom out">&#8722;</button>
        <span class="tvm-diagram-zoom-label">100%</span>
        <button class="tvm-diagram-zoom-btn" data-zoom="in" title="Zoom in">+</button>
        <button class="tvm-diagram-zoom-btn" data-zoom="reset" title="Reset zoom">&#x2715;</button>
      </div>
      <label class="tvm-diagram-color-btn" title="Diagram accent color">
        <span class="sr-only">Diagram accent color</span>
        <input type="color" class="tvm-diagram-color-input" value="#4060a0" aria-label="Diagram accent color">
      </label>
      <button class="tvm-diagram-color-reset-btn" title="Reset to default color">&#x21bb;</button>
    </div>
    <div class="popup-wrap">
      <div class="tvm-diagram-content" id="diagramContent" style="display:none"></div>
      <div class="popup-status" id="popupStatus">Waiting for diagram from tutorial&hellip;</div>
    </div>
  </div>

  <script src="{{ '/js/ArchUML/uml-bundle.js' | relative_url }}"></script>
  <script>
  (function () {
    var params    = new URLSearchParams(location.search);
    var chName    = params.get('channel') || 'uml-sync';
    var channel   = new BroadcastChannel(chName);

    var contentEl = document.getElementById('diagramContent');
    var statusEl  = document.getElementById('popupStatus');
    var state     = null;
    var activeType = 'class';
    var zoom      = 1;
    var panX      = 0;
    var panY      = 0;
    var customColor = null;

    // ── Transform (zoom + pan) ───────────────────────────────────────────
    function applyTransform() {
      var label = document.querySelector('.tvm-diagram-zoom-label');
      if (label) label.textContent = Math.round(zoom * 100) + '%';
      var svg = contentEl.querySelector('svg');
      if (svg) svg.style.transform = 'translate(' + panX + 'px,' + panY + 'px) scale(' + zoom + ')';
    }

    function applyZoom(z) {
      zoom = Math.min(4, Math.max(0.1, parseFloat(z.toFixed(2))));
      applyTransform();
    }

    // ── Pan (mouse drag) ─────────────────────────────────────────────────
    var isPanning = false, panStartX = 0, panStartY = 0, panOriginX = 0, panOriginY = 0;

    contentEl.addEventListener('mousedown', function (e) {
      if (e.button !== 0) return;
      isPanning = true;
      panStartX = e.clientX;
      panStartY = e.clientY;
      panOriginX = panX;
      panOriginY = panY;
      contentEl.classList.add('panning');
      e.preventDefault();
    });

    document.addEventListener('mousemove', function (e) {
      if (!isPanning) return;
      panX = panOriginX + (e.clientX - panStartX);
      panY = panOriginY + (e.clientY - panStartY);
      applyTransform();
    });

    document.addEventListener('mouseup', function () {
      if (!isPanning) return;
      isPanning = false;
      contentEl.classList.remove('panning');
    });

    // ── Color ────────────────────────────────────────────────────────────
    function applyColor(color) {
      customColor = color;
      var input = document.querySelector('.tvm-diagram-color-input');
      if (input) input.value = color || '#4060a0';
      if (color) {
        var r = parseInt(color.slice(1,3), 16);
        var g = parseInt(color.slice(3,5), 16);
        var b = parseInt(color.slice(5,7), 16);
        contentEl.style.setProperty('--uml-stroke',         color);
        contentEl.style.setProperty('--uml-line',           color);
        contentEl.style.setProperty('--uml-header-fill',    'rgba('+r+','+g+','+b+',0.18)');
        contentEl.style.setProperty('--uml-secondary-fill', 'rgba('+r+','+g+','+b+',0.09)');
        contentEl.style.setProperty('--uml-label-stroke',   'rgba('+r+','+g+','+b+',0.25)');
        contentEl.style.setProperty('--uml-label-fill',     'rgba(255,255,255,0.94)');
      } else {
        ['--uml-stroke','--uml-line','--uml-header-fill',
         '--uml-secondary-fill','--uml-label-stroke','--uml-label-fill']
          .forEach(function(p){ contentEl.style.removeProperty(p); });
      }
    }

    // ── Render ───────────────────────────────────────────────────────────
    function render() {
      if (!state) return;
      var spec = activeType === 'sequence' ? state.sequenceDiagram : state.classDiagram;
      if (!spec) {
        contentEl.style.display = 'none';
        statusEl.textContent = activeType === 'sequence'
          ? 'No sequence diagram available for this step.'
          : 'No class diagram available for this step.';
        statusEl.style.display = '';
        return;
      }
      statusEl.style.display = 'none';
      contentEl.style.display = '';
      contentEl.innerHTML = '';
      applyColor(customColor);
      if (activeType === 'sequence' && window.UMLSequenceDiagram) {
        UMLSequenceDiagram.render(contentEl, spec);
      } else if (activeType === 'class' && window.UMLClassDiagram) {
        UMLClassDiagram.render(contentEl, spec);
      }
      applyTransform();
    }

    // ── Type buttons ─────────────────────────────────────────────────────
    document.querySelectorAll('.tvm-diagram-type-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        activeType = btn.dataset.type;
        document.querySelectorAll('.tvm-diagram-type-btn').forEach(function(b) {
          b.classList.toggle('active', b.dataset.type === activeType);
        });
        render();
      });
    });

    // ── Zoom buttons ──────────────────────────────────────────────────────
    document.querySelectorAll('.tvm-diagram-zoom-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var dir = btn.dataset.zoom;
        if (dir === 'in')       applyZoom(zoom + 0.15);
        else if (dir === 'out') applyZoom(zoom - 0.15);
        else { panX = 0; panY = 0; applyZoom(1); }
      });
    });

    // Scroll-wheel zoom
    contentEl.addEventListener('wheel', function(e) {
      e.preventDefault();
      applyZoom(e.deltaY < 0 ? zoom + 0.05 : zoom - 0.05);
    }, { passive: false });

    // ── Color picker ──────────────────────────────────────────────────────
    document.querySelector('.tvm-diagram-color-input').addEventListener('input', function(e) {
      applyColor(e.target.value);
      render();
    });
    document.querySelector('.tvm-diagram-color-reset-btn').addEventListener('click', function() {
      applyColor(null);
      render();
    });

    // ── BroadcastChannel ─────────────────────────────────────────────────
    channel.addEventListener('message', function(e) {
      if (e.data.type !== 'uml-update') return;
      state = e.data;
      if (e.data.activeType) {
        activeType = e.data.activeType;
        document.querySelectorAll('.tvm-diagram-type-btn').forEach(function(b) {
          b.classList.toggle('active', b.dataset.type === activeType);
        });
      }
      if (e.data.color !== undefined) applyColor(e.data.color);
      if (typeof e.data.darkMode === 'boolean') {
        document.documentElement.classList.toggle('dark-mode', e.data.darkMode);
      }
      render();
    });

    // Ping for current state; retry once in case the main page wasn't ready yet
    channel.postMessage({ type: 'uml-ready' });
    setTimeout(function() { channel.postMessage({ type: 'uml-ready' }); }, 400);
  })();
  </script>
</body>
</html>
