plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-scholar

env: production

# Feature flags
personal_gym: true
bookmarks: true
tutorial_autosave: false

# SE Gym milestone thresholds (cumulative questions answered)
gym_milestone_bronze: 20
gym_milestone_silver: 100
gym_milestone_gold: 500
gym_milestone_diamond: 1000

sass:
  style: compressed

# Site settings
# timezone: US/Los_Angeles




baseurl: "" # the subpath of your site, e.g. /blog/
url: "https://tobiasduerschmid.github.io/" # the base hostname & protocol for your site

google_site_verification: PsUhrtR2-1XWZ0diQcCbt0egBzKjidLDPTl5WB3s-2E # jekyll-seo-tag outputs this as a meta tag

title: Tobias Dürschmid
author: Tobias Dürschmid
social:
  github:    tobiasduerschmid
  twitter:  TDurschmid
  linkedin: tobias-duerschmid
  google_scholar: tmE8FjQAAAAJ
  orcid: 0000-0001-8612-1767

authorexplainname : How to spell my name?
authorexplain: >
  The umlaut <strong>ü</strong> in my last name Dürschmid is significant for the pronunciation and the spelling. 
  <br>
  The valid ASCII spelling is <strong>Tobias Duerschmid</strong>, not Tobias Durschmid. 
  <br>
  To correctly typeset my name in LaTeX or BibTeX please use <strong>D{\"u}rschmid</strong> or <a href="https://stackoverflow.com/questions/1252998/how-can-i-compile-latex-in-utf8" target="_blank">use UTF-8 encoding</a>.

portrait: "/img/tobi.jpg"

languages: [ 'en' ]

description: > # this means to ignore newlines until "baseurl:"
    Tobias Dürschmid - Assistant Teaching Professor at UCLA.
subheading: > # this means to ignore newlines until "baseurl:"
    I am an <span class="text-danger">Assistant Teaching Professor in Computer Science</span> at <a href="http://www.cs.ucla.edu/" target="_blank">UCLA</a>. 
    I am mainly interested in  <span class="text-danger">teaching how to systematically design, construct, and evaluate complex software systems</span>.
    I usually teach CS 35L Software Construction, CS 130 Software Engineering, and CS 131 Programming Languages.
    
    <br><br>
    I received my <span class="text-danger">PhD in Software Engineering</span> from Carnegie Mellon University’s <a href="http://www.scs.cmu.edu/" target="_blank">School of Computer Science</a>. 
    I was fortunate to be co-advised by <a href="https://clairelegoues.com/" target="_blank">Claire Le Goues</a> and <a href="http://www.cs.cmu.edu/~garlan/" target="_blank">David Garlan</a>.
    I earned my Bachelor of Science in IT-Systems Engineering from <a href="https://www.hpi.de/en/" target="_blank">Hasso Plattner Institute</a> / University of Potsdam, Germany.
    <br><br>
    My research interests include <span class="text-danger">software engineering, computer science education, and pedagogy</span>.
    I do <span class="text-danger">not</span> currently accept PhD students. 
    
defaults:
  - scope:
      path: ''
    values:
      lang: en
  - scope:
      path: 'de'
    values:
      lang: de
  - scope:
      path: 'en'
    values:
      lang: en

# Handling Reading
# Set safe to false so local builds can load custom plugins
# (needed for the bibtex-ruby Ruby 3 compatibility patch).
safe: false
encoding: utf-8

# Exclude VM build scripts from site output (but include assets/v86 and vm/dist)
exclude:
  - vm/setup.sh
  - vm/build-rootfs.sh
  - vm/overlay
  - vm/Makefile

# Build settings
strongdown: kramdown

# Syntax highlighting
# Use Rouge (default for modern Jekyll) and configure kramdown to support fenced code blocks
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'

# Collections
collections:
  blog:
    output: true
    permalink: /blog/:slug/

scholar:
  style: harvard-cite-them-right
  locale: en-US
  source: ./_bibliography
  bibliography: references.bib
  # Prefix each reference with the formatted in-text citation, e.g. "(Shen & Tamkin, 2026)"
  bibliography_template: "{% if entry.url %}<a href='{{ entry.url }}' target='_blank' class='bib-link'>{% elsif entry.doi %}<a href='https://doi.org/{{ entry.doi }}' target='_blank' class='bib-link'>{% endif %}{{ reference }}{% if entry.url or entry.doi %}</a>{% endif %}"
  sort_by: author
  order: ascending
  # Turn inline citations into links to the bibliography section
  # (you can override link behavior later if needed)
  details_link: "References"
