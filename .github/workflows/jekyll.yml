name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  # The full WCAG 2.2 AA audit takes 30–75 minutes. Gate it on a commit-message
  # marker so most pushes/PRs stay fast. Add "[WCAG audit]" to the head commit
  # message to opt in. Deploys still go out when the audit is skipped — the
  # deploy job's `if:` treats a skipped audit as a pass.
  decide-audit:
    runs-on: ubuntu-latest
    outputs:
      run_audit: ${{ steps.check.outputs.run_audit }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check head commit message for "[WCAG audit]" marker
        id: check
        run: |
          msg="$(git log -1 --pretty=%B)"
          echo "Head commit message:"
          echo "$msg"
          if printf '%s' "$msg" | grep -qF '[WCAG audit]'; then
            echo "Marker found — will run WCAG audit."
            echo "run_audit=true" >> "$GITHUB_OUTPUT"
          else
            echo "Marker not found — skipping WCAG audit."
            echo "run_audit=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Initialize submodules
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3.0'
          bundler-cache: true

      - name: Setup Pages
        if: github.event_name == 'push'
        uses: actions/configure-pages@v4

      - name: Build with Jekyll
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3

  audit-accessibility:
    needs: decide-audit
    if: needs.decide-audit.outputs.run_audit == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Initialize submodules
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3.0'
          bundler-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci || npm install

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build site for audit
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Run WCAG 2.2 AA audit
        run: npx playwright test tests/wcag22-complete-audit.spec.js tests/wcag22-source-implementation-sweep.spec.js tests/accessibility.spec.js
        env:
          WCAG_AUDIT_FULL_SWEEP: '1'
          CI: 'true'

      # Interactive features (gym, quizzes, tutorials) only render some of
      # their UI after a learner drives the page — the static URL sweep above
      # cannot see those post-interaction states. The behavior tests for those
      # features already reach every state, and the `A11Y_INTERACTIVE_CHECKS`
      # flag asks them to run an axe pass at each one. Default off; turned on
      # here so the full audit covers post-interaction screens too.
      - name: Run interactive-state a11y sweep (gym, quizzes, tutorials)
        run: npx playwright test tests/se-gym.spec.js tests/quiz.spec.js tests/git-tutorial.spec.js tests/git-advanced-tutorial.spec.js tests/python-tutorial.spec.js tests/java-tutorial.spec.js tests/c-tutorial.spec.js tests/nodejs-tutorial.spec.js tests/react-tutorial.spec.js tests/shell-tutorial.spec.js tests/sql-tutorial.spec.js tests/tdd-tutorial.spec.js tests/testing-foundations-tutorial.spec.js tests/playwright-tutorial.spec.js tests/prolog-tutorial.spec.js tests/makefile-tutorial.spec.js
        env:
          A11Y_INTERACTIVE_CHECKS: '1'
          WCAG_AUDIT_FULL_SWEEP: '1'
          CI: 'true'

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wcag-audit-report
          path: tmp/wcag22-*.json
          if-no-files-found: warn

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: warn

  deploy:
    # Deploy to Pages when:
    #   - the event is a push to master AND
    #   - the build succeeded AND
    #   - the audit either succeeded or was skipped (no marker in commit message)
    if: |
      always()
      && github.event_name == 'push'
      && github.ref == 'refs/heads/master'
      && needs.build.result == 'success'
      && (needs.audit-accessibility.result == 'success' || needs.audit-accessibility.result == 'skipped')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: [build, audit-accessibility]
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
