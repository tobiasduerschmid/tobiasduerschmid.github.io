<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Git Graph &mdash; Tutorial</title>
  <script>
    (function () {
      var p = new URLSearchParams(location.search);
      if (p.get('dark') === '1') document.documentElement.classList.add('dark-mode');
    })();
  </script>
  <link rel="stylesheet" href="{{ '/css/tutorial.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/css/git-graph.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/css/tutorial-popouts.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/css/print-light.css' | relative_url }}">
</head>
<body>
  <main aria-label="Git graph popout">
  <h1 class="sr-only">Git Graph popout</h1>
  <div class="top-bar">
    <span class="kind-name">Git Graph</span>
    <span class="stat" id="statusEl" role="status" aria-live="polite">Connecting&hellip;</span>
  </div>
  <div class="wrap">
    <div class="graph-host">
      <div class="tvm-git-graph-container" id="graphEl"></div>
    </div>
    <div class="overlay" id="overlayEl">Waiting for tutorial&hellip;</div>
  </div>
  </main>

  <script src="{{ '/js/tutorial-popout-client.js' | relative_url }}"></script>
  <script>
  (function () {
    var graphEl = document.getElementById('graphEl');
    var overlayEl = document.getElementById('overlayEl');
    var statusEl = document.getElementById('statusEl');

    var client = SebookPopoutClient.connect({
      role: 'graph',
      statusEl: statusEl,
      statusClass: 'stat',
      overlayEl: overlayEl,
      onMessage: handleMessage,
    });

    document.title = 'Git Graph — ' + client.tutorialTitle;

    function applyHTML(html) {
      graphEl.innerHTML = html || '';
      client.markConnected();
    }

    function handleMessage(msg) {
      switch (msg.type) {
        case 'graph-snapshot':
          if (typeof msg.darkMode === 'boolean') {
            document.documentElement.classList.toggle('dark-mode', msg.darkMode);
          }
          applyHTML(msg.html);
          break;
        case 'graph-update':
          applyHTML(msg.html);
          break;
      }
    }
  })();
  </script>
</body>
</html>
