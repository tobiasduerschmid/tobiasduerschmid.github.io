<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Instructions &mdash; Tutorial</title>
  <script>
    (function () {
      var p = new URLSearchParams(location.search);
      if (p.get('dark') === '1') document.documentElement.classList.add('dark-mode');
    })();
  </script>
  <link rel="stylesheet" href="{{ '/css/tutorial.css' | relative_url }}">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    body { display: flex; flex-direction: column; }
    main { flex: 1; min-height: 0; display: flex; flex-direction: column; }
    .tip-bar {
      display: flex; align-items: center; gap: 10px;
      padding: 6px 12px; background: #161618; border-bottom: 1px solid #2a2a2e;
      flex-shrink: 0; font-size: 12.5px; color: #aaa;
    }
    html:not(.dark-mode) .tip-bar { background: #f3f3f3; border-bottom-color: #d4d4d4; color: #555; }
    /* WCAG 1.4.3: light-mode variants must clear 4.5:1 on #f3f3f3. */
    .tip-status { margin-left: auto; }
    .tip-status.ok { color: #4caf50; }
    .tip-status.warn { color: #d4a017; }
    .tip-status.bad { color: #ff8a8a; }
    html:not(.dark-mode) .tip-status.ok { color: #1f7a35; }
    html:not(.dark-mode) .tip-status.warn { color: #75591a; }
    html:not(.dark-mode) .tip-status.bad { color: #c0392b; }
    .tvm-instructions-panel {
      flex: 1; min-height: 0; display: flex; flex-direction: column;
      background: var(--instr-bg, #14141c); width: 100%; max-width: 100%; min-width: 0;
    }
    html:not(.dark-mode) .tvm-instructions-panel { background: #fafafa; }
    .tip-overlay {
      position: absolute; inset: 0; background: rgba(20,20,28,0.86);
      color: #ddd; display: flex; align-items: center; justify-content: center;
      font-size: 14px; z-index: 999;
    }
    html:not(.dark-mode) .tip-overlay { background: rgba(255,255,255,0.92); color: #333; }
    .tip-wrap { flex: 1; min-height: 0; position: relative; display: flex; flex-direction: column; }
  </style>
</head>
<body>
  <main aria-label="Tutorial instructions popout">
  <h1 class="sr-only">Instructions popout</h1>
  <div class="tip-bar">
    <span>Instructions</span>
    <span class="tip-status" id="statusEl" role="status" aria-live="polite">Connecting&hellip;</span>
  </div>
  <div class="tip-wrap">
    <div class="tvm-instructions-panel" id="panelRoot">
      <div class="tvm-steps-view" style="flex:1; min-height:0; display:flex; flex-direction:column;">
        <div class="tvm-step-nav-bar"><div class="tvm-step-nav" id="stepNavEl"></div></div>
        <div class="tvm-step-content-wrap" style="flex:1; min-height:0; overflow:auto;">
          <div class="tvm-step-content" id="stepContentEl"></div>
        </div>
        <div class="tvm-quiz-panel" id="quizPanelEl" style="display:none; flex:1; min-height:0; overflow:auto;"></div>
        <div class="tvm-step-controls-bar"><div class="tvm-step-controls" id="stepControlsEl"></div></div>
      </div>
    </div>
    <div class="tip-overlay" id="overlayEl">Waiting for tutorial&hellip;</div>
  </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script src="{{ '/js/mermaid-theme.js' | relative_url }}"></script>
  <script src="{{ '/js/tutorial-popout-client.js' | relative_url }}"></script>
  <script src="{{ '/js/tutorial-quiz.js' | relative_url }}"></script>
  <script src="{{ '/js/tutorial-inline-markdown.js' | relative_url }}"></script>
  <script>
  (function () {
    var els = {
      stepNav:      document.getElementById('stepNavEl'),
      stepContent:  document.getElementById('stepContentEl'),
      stepControls: document.getElementById('stepControlsEl'),
      quizPanel:    document.getElementById('quizPanelEl'),
      stepContentWrap: document.querySelector('.tvm-step-content-wrap'),
      overlay:      document.getElementById('overlayEl'),
      status:       document.getElementById('statusEl'),
    };

    // Mirror of the most recent state snapshot — populated on first
    // state-snapshot, mutated on step-change / nav-state / test-result.
    var snapshot = null;

    var client = SebookPopoutClient.connect({
      role: 'instructions',
      statusEl: els.status,
      statusClass: 'tip-status',
      overlayEl: els.overlay,
      onMessage: handleMessage,
    });

    document.title = 'Instructions — ' + client.tutorialTitle;

    // ── Rendering ────────────────────────────────────────────────────────
    function escapeHtml(str) {
      var d = document.createElement('div'); d.textContent = str || '';
      return d.innerHTML.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function renderInlineMarkdown(str) {
      return window.SebookInlineMarkdown
        ? window.SebookInlineMarkdown.render(str || '')
        : escapeHtml(str || '');
    }

    function renderNav(steps, currentStep, unlocked) {
      els.stepNav.innerHTML = '';
      (steps || []).forEach(function (step, i) {
        var btn = document.createElement('button');
        var isUnlocked = unlocked && unlocked.indexOf(i) !== -1;
        btn.className = 'tvm-step-btn' + (i === currentStep ? ' active' : '') + (isUnlocked ? '' : ' locked');
        btn.textContent = (i + 1);
        btn.title = isUnlocked ? (step.title || '') : ((step.title || '') + ' (locked)');
        if (isUnlocked) {
          btn.addEventListener('click', function () { client.post('request-step-change', { stepIndex: i }); });
        } else {
          btn.disabled = true;
        }
        els.stepNav.appendChild(btn);
      });
    }

    function renderControls(snap) {
      var hasPrev = snap.currentStep > 0;
      var hasNext = snap.currentStep < (snap.steps || []).length - 1;
      var html = '';
      html += hasPrev ? '<button class="tvm-btn tvm-btn-prev">← Previous</button>' : '<span></span>';
      html += snap.hasTests ? '<button class="tvm-btn tvm-btn-test">✓ Test My Work</button>' : '<span></span>';
      html += hasNext
        ? '<button class="tvm-btn tvm-btn-next"' + (snap.nextLocked ? ' disabled title="Pass all tests to continue"' : '') + '>Next →</button>'
        : '<span></span>';
      els.stepControls.innerHTML = html;

      var prev = els.stepControls.querySelector('.tvm-btn-prev');
      var next = els.stepControls.querySelector('.tvm-btn-next');
      var test = els.stepControls.querySelector('.tvm-btn-test');
      if (prev) prev.addEventListener('click', function () { client.post('request-prev-step'); });
      if (next) next.addEventListener('click', function () {
        if (!next.disabled) client.post('request-next-step');
      });
      if (test) test.addEventListener('click', function () { client.post('request-run-tests'); });
    }

    function renderContent(stepData) {
      if (!stepData) { els.stepContent.innerHTML = ''; return; }
      els.stepContent.innerHTML = '<h2>' + (stepData.titleHTML || renderInlineMarkdown(stepData.title || '')) + '</h2>'
        + '<div class="tvm-step-instructions">' + (stepData.instructionsHTML || '') + '</div>';
      els.stepContent.scrollTop = 0;
      // Render inline ```mermaid blocks via the shared SebookMermaid theme
      // (same renderer as the main page — visual parity with ArchUML diagrams).
      if (window.SebookMermaid) window.SebookMermaid.render(els.stepContent);
      // Re-attach last test result panel if one was broadcast on this step.
      if (snapshot && snapshot.lastTestResultHTML) showTestPanel(snapshot.lastTestResultHTML);
    }

    function showTestPanel(innerHtml) {
      var panel = els.stepContent.querySelector('.tvm-test-panel');
      if (!panel) {
        panel = document.createElement('div');
        panel.className = 'tvm-test-panel';
        panel.setAttribute('role', 'status');
        panel.setAttribute('aria-live', 'polite');
        panel.setAttribute('aria-atomic', 'true');
        els.stepContent.appendChild(panel);
      }
      panel.innerHTML = innerHtml;
      panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function renderAll(snap) {
      if (!snap) return;
      snapshot = snap;
      if (typeof snap.darkMode === 'boolean') {
        document.documentElement.classList.toggle('dark-mode', snap.darkMode);
      }
      renderNav(snap.steps || [], snap.currentStep, snap.stepsUnlocked || []);
      renderContent((snap.steps || [])[snap.currentStep]);
      renderControls(snap);
      client.markConnected();
    }

    function applyStepChange(msg) {
      if (!snapshot) snapshot = { steps: [] };
      snapshot.currentStep = msg.stepIndex;
      if (Array.isArray(msg.stepsUnlocked)) snapshot.stepsUnlocked = msg.stepsUnlocked;
      // hasTests + nextLocked MUST follow the new step or the popup keeps
      // the previous step's enable/disable state and the user can click a
      // now-stale Next button that main then silently no-ops.
      if (typeof msg.hasTests === 'boolean') snapshot.hasTests = msg.hasTests;
      if (typeof msg.nextLocked === 'boolean') snapshot.nextLocked = msg.nextLocked;
      if (msg.stepData && Array.isArray(snapshot.steps)) {
        snapshot.steps[msg.stepIndex] = Object.assign({}, snapshot.steps[msg.stepIndex] || {}, msg.stepData);
      }
      // New step starts fresh — drop any cached test panel.
      snapshot.lastTestResultHTML = null;
      renderAll(snapshot);
    }

    // ── Role-specific message routing ────────────────────────────────────
    function handleMessage(msg) {
      switch (msg.type) {
        case 'state-snapshot':
          if (msg.instructions) renderAll(msg.instructions);
          break;
        case 'step-change':
          applyStepChange(msg);
          break;
        case 'nav-state':
          if (snapshot) {
            if (Array.isArray(msg.stepsUnlocked)) snapshot.stepsUnlocked = msg.stepsUnlocked;
            if (typeof msg.nextLocked === 'boolean') snapshot.nextLocked = msg.nextLocked;
            renderAll(snapshot);
          }
          break;
        case 'test-started':
          showTestPanel('<div class="tvm-test-running">Running tests&hellip;</div>');
          break;
        case 'test-result':
          if (msg.resultsHTML) {
            if (snapshot) snapshot.lastTestResultHTML = msg.resultsHTML;
            showTestPanel(msg.resultsHTML);
          }
          break;
        case 'quiz-show':
          showQuiz(msg);
          break;
        case 'quiz-hide':
          hideQuiz();
          break;
      }
    }

    // ── Quiz mounting (uses shared SebookQuiz engine) ─────────────────────
    function showQuiz(msg) {
      if (!window.SebookQuiz) return;
      if (els.stepContentWrap) els.stepContentWrap.style.display = 'none';
      els.quizPanel.style.display = '';
      // Mirror main's "Back / Question N / M" controls so the popup feels
      // identical to main during the quiz.
      els.stepControls.innerHTML =
        '<button class="tvm-btn tvm-btn-prev tvm-quiz-back">← Back to Step</button>'
        + '<span class="tvm-quiz-status" role="status" aria-live="polite" aria-atomic="true">Loading…</span>'
        + '<span></span>';
      var back = els.stepControls.querySelector('.tvm-quiz-back');
      if (back) back.addEventListener('click', hideQuiz);
      window.SebookQuiz.mount({
        hostEl: els.quizPanel,
        controlsEl: els.stepControls,
        stepIndex: msg.stepIndex,
        quizHTML: msg.quizHTML,
        minScore: msg.minScore,
        isFinalQuiz: !!msg.isFinalQuiz,
        onPass: function (idx) {
          // Source-of-truth quizPassed/_stepsUnlocked + advance step lives
          // in main — tell it the popup completed the quiz.
          client.post('quiz-passed', { stepIndex: idx });
        },
      });
    }
    function hideQuiz() {
      els.quizPanel.style.display = 'none';
      els.quizPanel.innerHTML = '';
      if (els.stepContentWrap) els.stepContentWrap.style.display = '';
      // Restore step controls (Prev / Test / Next) from current snapshot.
      if (snapshot) renderControls(snapshot);
    }
  })();
  </script>
</body>
</html>
