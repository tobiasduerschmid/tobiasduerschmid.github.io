<body>
  <a class="skip-link archuml-python-skip" href="#generated-python-workspace">Skip to generated Python workspace</a>

  <main id="main-content">

    </div>
  </main>

  <script src="{{ '/js/monaco-sebook-langs.js' | relative_url }}"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js" crossorigin="anonymous"></script>
  <script src="{{ '/js/mermaid-theme.js' | relative_url }}"></script>
  <script src="{{ '/js/ArchUML/uml-bundle.js' | relative_url }}"></script>
  <script src="{{ '/js/uml-auto-describe.js' | relative_url }}"></script>
  <script src="{{ '/js/tutorial-refactorings.js' | relative_url }}"></script>
  <script src="{{ '/js/tutorial-popout-manager.js' | relative_url }}"></script>
  <script src="{{ '/js/tutorial-quiz.js' | relative_url }}"></script>
  <script src="{{ '/js/tutorial-inline-markdown.js' | relative_url }}"></script>
  <script src="{{ '/js/tutorial-code.js' | relative_url }}"></script>
  <script>
    (function () {
      var statusEl = document.getElementById('generated-python-status');
      var workspaceEl = document.getElementById('generated-python-workspace');
      var payloadStorageKey = 'archuml-generated-python-payload';
      var payloadWindowNamePrefix = 'archuml-generated-python-payload:';
      var payloadReceived = false;
      var readyTimer = null;

      function setStatus(message, isError) {
        statusEl.textContent = message;
        statusEl.classList.toggle('error', !!isError);
      }

      function escapeHtml(value) {
        return String(value == null ? '' : value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function announce(type, extra) {
        if (!window.opener || window.opener.closed) return;
        var message = Object.assign({ type: type }, extra || {});
        window.opener.postMessage(message, window.location.origin);
      }

      function storePayloadForReload(payload) {
        var serialized = JSON.stringify(payload);
        var stored = false;
        try {
          sessionStorage.setItem(payloadStorageKey, serialized);
          stored = true;
        } catch (err) {}
        try {
          window.name = payloadWindowNamePrefix + serialized;
          stored = true;
        } catch (err) {}
        return stored;
      }

      function readStoredPayload() {
        try {
          var raw = sessionStorage.getItem(payloadStorageKey);
          if (raw) {
            clearStoredPayload();
            return JSON.parse(raw);
          }
        } catch (err) {}
        try {
          if (String(window.name || '').indexOf(payloadWindowNamePrefix) === 0) {
            var fromName = String(window.name).slice(payloadWindowNamePrefix.length);
            clearStoredPayload();
            return JSON.parse(fromName);
          }
        } catch (nameErr) {}
        clearStoredPayload();
        return null;
      }

      function clearStoredPayload() {
        try { sessionStorage.removeItem(payloadStorageKey); } catch (err) {}
        try {
          if (String(window.name || '').indexOf(payloadWindowNamePrefix) === 0) {
            window.name = '';
          }
        } catch (err) {}
      }

      function registerIsolationWorkerThenReload(payload) {
        if (!storePayloadForReload(payload)) {
          startTutorial(payload);
          return;
        }
        setStatus('Preparing Python debugger...');
        if (!('serviceWorker' in navigator)) {
          startTutorial(payload);
          return;
        }

        var reloaded = false;
        function reloadOnce() {
          if (reloaded) return;
          reloaded = true;
          window.location.reload();
        }

        navigator.serviceWorker.addEventListener('controllerchange', reloadOnce);
        navigator.serviceWorker.register('{{ "/coi-serviceworker.js" | relative_url }}')
          .then(function (reg) {
            reg.update();
            if (reg.installing) {
              reg.installing.addEventListener('statechange', function () {
                if (this.state === 'installed' || this.state === 'activated') reloadOnce();
              });
            } else if (reg.waiting || reg.active) {
              reloadOnce();
            }
            window.setTimeout(reloadOnce, 4000);
          })
          .catch(function () {
            startTutorial(payload);
          });
      }

      function shouldReloadForIsolation() {
        return !window.crossOriginIsolated
          && 'serviceWorker' in navigator
          && !navigator.serviceWorker.controller;
      }

      function bootPayload(payload, fromReload) {
        if (!fromReload && shouldReloadForIsolation()) {
          registerIsolationWorkerThenReload(payload);
          return;
        }
        startTutorial(payload);
      }

      function startTutorial(payload) {
        clearStoredPayload();
        var filename = payload.filename || 'archuml_generated.py';
        var code = String(payload.code || '');
        if (!code.trim()) throw new Error('The generated Python payload was empty.');

        payloadReceived = true;
        window.__archUmlGeneratedPythonCode = code;
        window.__archUmlGeneratedPythonFilename = filename;
        announce('archuml-python-workspace-received');
        setStatus('Loading Python runtime...');

        var instructionsHTML = [
          '<h2>Generated Python</h2>',
          '<p><strong>' + escapeHtml(filename) + '</strong> was generated from the saved ArchUML class and sequence diagrams.</p>',
          '<p>Sequence guards, loops, parallel branches, references, responses, notes, found and lost messages, creation, and destruction are preserved as executable helpers or structured comments where Python needs domain-specific intent.</p>',
          '<p>The UML Diagram tab is inferred live from this Python file, so edits in Monaco can round-trip back into a fresh class or sequence view.</p>'
        ].join('');

        var tutorial = new TutorialCode(workspaceEl, {
          backend: 'pyodide',
          tutorialId: 'archuml-generated-python',
          tutorialTitle: 'Generated Python Tutorial',
          steps: [{
            title: 'Generated Python',
            instructionsHTML: instructionsHTML,
            files: [{
              path: filename,
              language: 'python',
              content: code,
              pane: 'editor'
            }],
            open_file: filename,
            run_file: filename
          }],
          requireTests: false,
          autosaveType: null,
          resetType: 'files',
          instructorMode: false,
          disableQuiz: true,
          workerPath: '{{ "/js/pyodide-worker.js" | relative_url }}',
          linter: true,
          uml_diagram: true,
          uml_position: 'right',
          uml_default_view: false,
          uml_default_type: 'class',
          uml_class_layout: 'portrait',
          debugger: true,
          debuggerOptions: {},
          run_label: 'Run',
          outputHeight: '36%',
          tabPopupUrl: '{{ "/tutorial-tab-popup.html" | relative_url }}',
          instructionsPopupUrl: '{{ "/tutorial-instructions-popup.html" | relative_url }}',
          panePopupUrl: '{{ "/tutorial-pane-popup.html" | relative_url }}',
          outputPopupUrl: '{{ "/tutorial-output-popup.html" | relative_url }}',
          debuggerPopupUrl: '{{ "/tutorial-debugger-popup.html" | relative_url }}'
        });

        window.__archUmlGeneratedPythonTutorial = tutorial;
        window.__archUmlGeneratedPythonStartPromise = tutorial.start().then(function () {
          if (tutorial._umlDiagramEnabled && typeof tutorial._refreshUMLDiagram === 'function') {
            tutorial._refreshUMLDiagram();
          }
          if (!workspaceEl.querySelector('.tvm-error')) setStatus('Ready');
        });
      }

      function handleMessage(event) {
        if (event.origin !== window.location.origin) return;
        var data = event.data || {};
        if (data.type !== 'archuml-generated-python') return;
        if (payloadReceived) {
          announce('archuml-python-workspace-received');
          return;
        }
        try {
          if (readyTimer) window.clearInterval(readyTimer);
          bootPayload(data, false);
        } catch (err) {
          var message = err && err.message ? err.message : String(err);
          setStatus(message, true);
          announce('archuml-python-workspace-error', { message: message });
        }
      }

      window.addEventListener('message', handleMessage);

      var storedPayload = readStoredPayload();
      if (storedPayload) {
        payloadReceived = true;
        window.setTimeout(function () {
          try {
            bootPayload(storedPayload, true);
          } catch (err) {
            setStatus(err && err.message ? err.message : String(err), true);
          }
        }, 0);
        return;
      }

      function ready() {
        if (payloadReceived) return;
        announce('archuml-python-workspace-ready');
      }

      ready();
      readyTimer = window.setInterval(ready, 500);
      window.setTimeout(function () {
        if (!payloadReceived) {
          setStatus('Waiting for generated Python from the UML editor...');
        }
      }, 2500);
    })();
  </script>
</body>
